  .vazio { color: var(--texto2); font-style: italic; padding: 12px 0; }

const D = {"gerado_em": "17/06/2026 23:21", "stats": {"noticias_total": 1280, "resumos_total": 64, "sem_topico": 0, "ultima_coleta": "2026-06-17T13:18:12Z"}, "rotulos_topico": {"politica_nacional": "Política Nacional", "politica_internacional": "Política Internacional", "cultura": "Cultura", "ciencia_tecnologia": "Ciência & Tecnologia"}, "topicos": ["politica_nacional", "politica_internacional", "cultura", "ciencia_tecnologia"], "sinteses": {"ciencia_tecnologia": "A Amazon está preparando-se para o seu Prime Day, que ocorrerá a partir do dia 23 de junho. Antecipadamente, varejistas como Walmart e Amazon estão oferecendo descontos notáveis com produtos da Apple, incluindo auriculares sem fio e relógios inteligentes. Em outro desenvolvimento na área tecnológica, a Solar Foods recebeu um pacote de financiamento no valor de €77,8 milhões para apoiar a construção e comissionamento da Factory 02. Por outro lado, hackers afirmaram ter roubado mais de um terabyte de dados da Novo Nordisk e estão considerando vender parte desses dados. A Thread Networks lançou o aplicativo Diagnostics Tools em beta, que oferece uma ferramenta para visualizar redes smart home baseadas em Thread. O Jackery lançou o FridgeGuard, descrito como a 'mais fina' bateria-refrigeradora do mundo, projetada para uso doméstico. Além disso, o protocolo de rede inteligente Thread está introduzindo uma nova maneira de configurar dispositivos sem a necessidade de um roteador Thread border, chamada Thread Direct. O Google Home Speaker, que é o primeiro novo alto-falante inteligente da empresa em seis anos, começa a ser enviado no dia 29 de junho. LinkedIn está lançando uma nova funcionalidade chamada 'apps conectadas', que permite aos usuários vincular vários aplicativos suportados ao seu perfil. A Tryll, uma empresa que desenvolve um motor de IA para jogos de vídeo executado localmente, levantou uma rodada de pré-series de financiamento no valor de $600.000 da Early Game Ventures. Por fim, a empresa chinesa Circuit Fabology Microelectronics Equipment (CFMEE) planeja realizar uma oferta inicial de ações em Hong Kong na próxima semana, pretendendo arrecadar até 410 milhões de dólares ao oferecer mais de 12,8 milhões de ações.", "cultura": "A seleção argentina de futebol venceu a Argélia por 3-0 na Copa do Mundo 2026 qualificatório, com três gols marcados pelo jogador Lionel Messi. Este resultado fortalece o time durante sua reconstrução e consolida a história do atleta nas Copas do Mundo. A atuação de Messi foi destacada pelos principais meios internacionais como 'fenômeno', 'rey' e 'goles magistrais'. O jogador norueguês Erling Haaland, após o jogo, escreveu em sua conta do Snapchat que Messi é 'um demente'. Em outro evento cultural importante, a 26ª edição do Festival Internacional de Animação de Annecy será historicamente significativa com mais de 18.300 participantes confirmados de 118 países, sendo o primeiro a ter Class A status reconhecido pela International Federation of Film Producers Association. O YouTube India anunciou que a Connected TV se tornou seu formato de conteúdo mais rápido em crescimento na Índia, atingindo mais de 75 milhões de adultos, e apresentou uma estratégia com três pilares para parcerias com o setor de mídia e entretenimento local durante a conferência APOS. O congresso da Aapresid, com o tema 'Nossos solos, nossa voz', ocorrerá em Rosário de 4 a 6 de agosto no Salão Metropolitano. A diretora do Marché International du Film d’Animation (MIFA) de Annecy, Véronique Encrenaz, afirmou que o evento continuará a crescer mesmo com uma contracção na indústria da animação - um contraste que definirá o MIFA neste ano. Por fim, a artista Diana Beltrán Herrera cria esculturas de papel bordadas que imitam plantas e vida selvagem, descrevendo o fio como uma forma de desenho, conexão e construção de formas.", "politica_internacional": "O presidente dos Estados Unidos, Donald Trump, declarou que o acordo com a Irã ainda não está finalizado e continua sendo  "The Hill", "pais": "EUA", "classe": "B"}, {"id": 195, "titulo": "Robles destaca el compromiso de España con la seguridad colectiva en el ejercicio MILEX 26", "url": "https://www.infobae.com/espana/agencias/2026/06/17/robles-destaca-el-compromiso-de-espana-con-la-seguridad-colectiva-en-el-ejercicio-milex-26/", "fonte_id": "infobae", "data_pub": "2026-06-17T13:17:00Z", "texto_pt": "Robles enfatizou o compromisso da Espanha com a segurança coletiva durante o exercício MILEX 26. O evento destaca a cooperação militar entre países participantes.", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 196, "titulo": "Un episodio persistente de mucho calor elevará desde el domingo el peligro de incendios", "url": "https://www.infobae.com/espana/agencias/2026/06/17/un-episodio-persistente-de-mucho-calor-elevara-desde-el-domingo-el-peligro-de-incendios/", "fonte_id": "infobae", "data_pub": "2026-06-17T13:17:00Z", "texto_pt": "Um episódio persistente de calor intenso está elevando o risco de incêndios a partir do domingo. As condições climáticas desfavoráveis estão aumentando as preocupações relacionadas aos incêndios florestais e agrícolas.", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}], "cultura": [{"id": 1248, "titulo": "Annecy’s MIFA Bets on Cross-IP, AI and Global Growth Amid Animation Financing Squeeze", "url": "https://variety.com/2026/film/focus/annecys-mifa-2026-1236782136/", "fonte_id": "variety", "data_pub": "2026-06-17T13:20:00Z", "texto_pt": "O Festival de Annecy continuará a crescer mesmo com uma contracção na indústria da animação - um contraste que definirá o Marché International du Film d’Animation (MIFA) neste ano, que ocorre de 23 a 26 de junho. Segundo a diretora do MIFA, Véronique Encrenaz, o que se chama de crise na animação é essencialmente uma crise de financiamento.", "veiculo": "Variety", "pais": "EUA", "classe": "B"}, {"id": 1249, "titulo": "Box Office: ‘Toy Story 5’ Eyes Record $150 Million-Plus Opening Weekend", "url": "https://variety.com/2026/film/box-office/toy-story-5-box-office-opening-weekend-estimates-1236782521/", "fonte_id": "variety", "data_pub": "2026-06-17T13:15:00Z", "texto_pt": "Toy Story 5", "veiculo": "Variety", "pais": "EUA", "classe": "B"}, {"id": 1250, "titulo": "‘Minions & Monsters’ Opens Annecy 2026 as Festival Eyes Record Crowds, New Class A Status and a Global Animation Spotlight", "url": "https://variety.com/2026/film/focus/annecy-2026-1236782107/", "fonte_id": "variety", "data_pub": "2026-06-17T13:15:00Z", "texto_pt": "O Festival Internacional de Animação de Annecy anunciou que sua edição de 2026, marcada para junho, será historicamente significativa com mais de 18.300 participantes confirmados de 118 países. Este evento será o primeiro a ser reconhecido pela International Federation of Film Producers Association como tendo Class A status.", "veiculo": "Variety", "pais": "EUA", "classe": "B"}, {"id": 266, "titulo": "Lionel Messi hizo tres goles, quedó en la historia de los Mundiales y alimentó la fe de un equipo en reconstrucción", "url": "https://www.lanacion.com.ar/deportes/futbol/lionel-messi-hizo-tres-goles-quedo-en-la-historia-de-los-mundiales-y-alimento-la-fe-de-un-equipo-en-nid17062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-17T13:13:00Z", "texto_pt": "A seleção argentina venceu a Argélia por 3-0, com três gols marcados pelo jogador número 10 Lionel Messi. O resultado fortalece o time durante sua reconstrução e consolida a história do atleta nas Copas do Mundo.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 267, "titulo": "Un verdadero héroe nacional: ¿quién fue y qué hizo Martín Miguel de Güemes?", "url": "https://www.lanacion.com.ar/sociedad/un-verdadero-heroe-nacional-quien-fue-y-que-hizo-martin-miguel-de-guemes-nid15062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-17T13:13:00Z", "texto_pt": "Martín Miguel de Güemes é lembrado por sua contribuição na luta pela independência do território nacional. Durante sua breve vida, liderou um exército conhecido como Los Infernales na causa independence.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 268, "titulo": "Juicio por Loan: la insólita excusa del imputado que no se presentó en la primera audiencia", "url": "https://www.lanacion.com.ar/seguridad/juicio-por-loan-la-insolita-excusa-del-imputado-que-no-se-presento-en-la-primera-audiencia-nid17062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-17T13:12:00Z", "texto_pt": "O Tribunal Oral Federal de Corrientes determinou a detenção do psicólogo Esteban Rossi Colombo, acusado no caso Loan, após ele não comparecer à primeira audiência. Rossi Colombo se conectou por videoconferência desde Tucumán.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 269, "titulo": "Mundial 2026: los medios internacionales se hacen eco de la actuación de Messi ante Argelia", "url": "https://www.lanacion.com.ar/deportes/futbol/mundial-2026-los-medios-internacionales-se-hacen-eco-de-la-actuacion-de-messi-ante-argelia-nid17062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-17T13:12:00Z", "texto_pt": "Os principais meios internacionais destacaram a atuação de Messi como fundamental para a vitória da Argentina contra Argélia, utilizando termos como 'fenômeno', 'rey' e 'goles magistrais'.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 270, "titulo": "Mundial 2026: Haaland habló de Messi tras su actuación con la selección ante Argelia", "url": "https://www.lanacion.com.ar/deportes/futbol/mundial-2026-haaland-hablo-de-messi-tras-su-actuacion-con-la-seleccion-ante-argelia-nid17062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-17T13:10:00Z", "texto_pt": "O jogador norueguês Erling Haaland, após o jogo contra Argélia onde Lionel Messi marcou três gols pela seleção argentina, escreveu em sua conta do Snapchat que Messi é 'um demente'.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}], "ciencia_tecnologia": [{"id": 771, "titulo": "The best Apple deals you can already get ahead of Prime Day", "url": "https://www.theverge.com/gadgets/949350/amazon-prime-day-sale-best-apple-deals-2026", "fonte_id": "the_verge", "data_pub": "2026-06-17T13:21:00Z", "texto_pt": "A partir do dia 23 de junho, a Amazon realizará o seu Prime Day, mas já estão surgindo algumas promoções notáveis com produtos da Apple. Varejistas como Walmart e Amazon estão oferecendo descontos significativos em itens como auriculares sem fio e relógios inteligentes antes do evento de vendas.", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 1038, "titulo": "Solar Foods wins €77.8M funding package for Factory 02 expansion", "url": "https://tech.eu/2026/06/17/solar-foods-wins-77-8m-funding-package-for-factory-02-expansion/", "fonte_id": "tech_eu", "data_pub": "2026-06-17T13:12:00Z", "texto_pt": "Solar Foods recebeu um pacote de financiamento no valor de €77,8 milhões, composto por uma subvenção de €39,6 milhões e um empréstimo de €38,1 milhões, para apoiar a construção e comissionamento da Factory 02.", "veiculo": "Tech.eu", "pais": "Bélgica", "classe": "B"}, {"id": 871, "titulo": "STAT+: Pharmalittle: We’re reading about hackers extorting Novo, an FDA about-face, and more", "url": "https://www.statnews.com/pharmalot/2026/06/17/hackers-extorting-novo-fda-about-face-on-uniqure-drug/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-17T13:09:00Z", "texto_pt": "Um grupo de hackers afirmou ter roubado mais de um terabyte de dados da Novo Nordisk e está considerando vender parte desses dados.", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 772, "titulo": "Got Thread problems? There’s an app for that", "url": "https://www.theverge.com/tech/949001/thread-network-diagnostic-tools-app-troubleshooting-matter-smart-home", "fonte_id": "the_verge", "data_pub": "2026-06-17T13:00:00Z", "texto_pt": "O aplicativo Diagnostics Tools da Thread Networks, desenvolvido pela Thread Group, responsável pelos protocolos de IoT sem fio, foi lançado em beta hoje. O app, disponível para iOS e já no alpha para Android há algumas semanas, oferece a primeira ferramenta dedicada para visualizar redes smart home baseadas em Thread.", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 773, "titulo": "Jackery announces ‘world’s slimmest’ fridge battery", "url": "https://www.theverge.com/tech/949683/jackery-fridgeguard-worlds-slimmest-fridge-battery", "fonte_id": "the_verge", "data_pub": "2026-06-17T13:00:00Z", "texto_pt": "Jackery lançou o FridgeGuard, descrito como a 'mais fina' bateria-refrigeradora do mundo. Diferente das estações de energia tradicionais, que geralmente remetem a ambientes profissionais, essa nova opção é projetada para ser mais estética e adequada para uso doméstico.", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 774, "titulo": "Thread Direct looks to solve Matter’s biggest setup headache", "url": "https://www.theverge.com/tech/950732/thread-direct-thread-2-0-smart-home-apple-google", "fonte_id": "the_verge", "data_pub": "2026-06-17T13:00:00Z", "texto_pt": "O protocolo de rede inteligente Thread está introduzindo uma nova maneira de configurar dispositivos sem a necessidade de um roteador Thread border. A funcionalidade, chamada Thread Direct, permite que os usuários configurem dispositivos com suporte ao Thread - como tomadas inteligentes e travessas inteligentes - usando apenas um telefone ou dispositivo móvel equipado com uma radiofrequência Thread.", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 775, "titulo": "GuliKit’s new mobile Switch 2 dock lets you play with or without a TV", "url": "https://www.theverge.com/tech/950827/gulikit-tv-docking-station-switch-2-oled-console-hdmi", "fonte_id": "the_verge", "data_pub": "2026-06-17T13:00:00Z", "texto_pt": "GuliKit lançou uma nova versão de sua TV Docking Station que agora suporta o Switch 2, além das versões anteriores do console, incluindo a original e o modelo OLED. O novo dock mantém um design semelhante ao da primeira geração.", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 776, "titulo": "Google’s first smart speaker in six years arrives next week", "url": "https://www.theverge.com/tech/951147/google-home-speaker-gemini-launch-date-price-specs-features", "fonte_id": "the_verge", "data_pub": "2026-06-17T13:00:00Z", "texto_pt": "O primeiro novo alto-falante inteligente da Google em seis anos começa a ser enviado no dia 29 de junho, perdendo o lançamento previsto para o primavera. As pré-vendas do Google Home Speaker começam hoje, 17 de junho. Nenhuma mudança foi feita no hardware desde que o alto-falante de R$99 foi anunciado há nove meses, mantendo sua designação ligeiramente alongada e botões tácteis.", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}]}, "noticias": [{"id": 1280, "fonte_id": "washington_post_world", "titulo": "After news of Iran peace deal, Lebanese return home to assess wreckage", "url": "https://www.washingtonpost.com/world/2026/06/15/after-news-iran-peace-deal-lebanese-return-home-assess-wreckage/", "data_pub": "2026-06-15T15:28:00Z", "topico": "politica_internacional", "veiculo": "Washington Post - World", "pais": "EUA", "classe": "A"}, {"id": 1279, "fonte_id": "washington_post_world", "titulo": "Israelis denounce Trump’s deal with Iran", "url": "https://www.washingtonpost.com/world/2026/06/15/israelis-denounce-trumps-deal-with-iran/", "data_pub": "2026-06-15T20:45:00Z", "topico": "politica_internacional", "veiculo": "Washington Post - World", "pais": "EUA", "classe": "A"}, {"id": 1278, "fonte_id": "washington_post_world", "titulo": "Russia’s war in Ukraine comes back into Trump’s focus with no end in sight", "url": "https://www.washingtonpost.com/world/2026/06/17/trump-meets-zelensky-g-7-voices-frustration-over-russia-ongoing-war/", "data_pub": "2026-06-17T12:10:00Z", "topico": "politica_internaciona const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => `<div class="item">
           <h3><a href="${esc(n.url)}" target="_blank">${esc(n.titulo)}</a></h3>
           <div class="meta">
             <span class="tag">${esc(n.veiculo)}</span>
             ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             ${n.classe ? `<span class="tag">${esc(n.classe)}</span>` : ""}
           </div>
           <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
         </div>`).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
      <div class="card"><div class="num">${st.sem_topico}</div><div class="rot">aguardando classificação</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const rot = n.topico ? (D.rotulos_topico[n.topico] || n.topico) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      return `<div class="noticia" data-topico="${esc(n.topico || '')}">
        <a href="${esc(n.url)}" target="_blank">${esc(n.titulo)}</a>
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
ativar("resumo");
</script>
