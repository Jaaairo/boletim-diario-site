<html lang="pt-BR">
<head>
<meta charset="utf-8">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 28/06/2026 16:58 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">

    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">

  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>

      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "28/06/2026 16:58", "stats": {"noticias_novas": 606, "resumos_gerados": 282}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O Supremo Tribunal Federal está atualmente operando num modo de sobrevivência, com seus membros priorizando a própria preservação acima da proteção à Constituição, conforme relatado pela Folha de S. Paulo. Este cenário não é exclusivo do STF e se estende a outras instituições brasileiras. Paralelamente, o senador Flávio Bolsonaro (PL-RJ) foi alvo de novas pesquisas eleitorais que testaram suas chances contra o ex-presidente Lula, além de investigações sobre possíveis repasses feitos pelo ex-banqueiro Daniel Vorcaro ao filme 'Dark Horse', retratando Jair Bolsonaro. O número de pessoas na fila do INSS atingiu seu menor nível em quatro meses, com 1,9 milhão de pedidos pendentes. A nova presidente Ana Cristina Silveira espera uma redução gradual nos próximos meses. Além disso, o governo federal considera reduzir os benefícios do microempreendedor individual (MEI) para garantir a sustentabilidade da Previdência Social, enquanto especialistas recomendam essa medida.", "mundo": "Os terremotos na costa venezuelana continuam causando devastação, com o número de mortes chegando a 1.450 e as chances de encontrar sobreviventes se tornando cada vez menores. Dois meninos de 11 anos foram resgatados após estarem enterrados nos escombros por dias, enquanto cães treinados auxiliam na busca. O governo venezuelano realiza os resgates sob condições precárias e relata a coleta de 20 corpos por hora. Em contraste, o presidente dos Estados Unidos acusa o Irã de violar um acordo framework, levando a tensões entre Washington e Teerã. A Turquia apoia a posição política dos armênios em Israel e defende os palestinos.\n\nO Irã intensificou suas atividades geopolíticas após os ataques americanos no Estreito de Ormuz. Em resposta, atacou Bahrain e Kuwait. O chanceler iraniano Abbas Araqchi afirmou que o país vai controlar totalmente o acesso ao estreito por 30 dias, rejeitando intervenções estrangeiras. Além disso, ameaçou paralisar as negociações em resposta às recentes operações militares dos Estados Unidos. As tensões entre os dois países continuam a aumentar, com o acordo de cessar-fogo estabelecido há 10 dias em risco por diferentes interpretações do memorando de entendimento. Paralelamente, a Ucrânia intensificou seus ataques com drones contra instalações energéticas russas no sul do país, causando incêndios e resultando na morte de pelo menos duas pessoas. A crise regional continua a afetar o Estreito de Ormuz, que demorará um mês para recuperar sua capacidade pré-crise, segundo declarações do chanceler iraniano.", "economia": "A economia global enfrenta diversos desafios e oportunidades. A Yuanta, empresa de consultoria financeira, elevou a previsão do crescimento do PIB da Taiwan para 11,05%, refletindo um otimismo sobre o mercado local. Em outro desenvolvimento, a bolsa de valores do Japão está sendo reformada para acomodar mais investidores, impulsionada por uma alta significativa no capital estrangeiro e pela eliminação das taxas de corretagem. No Brasil, os gastos de turistas internacionais atingiram R$ 25 bilhões entre janeiro e maio deste ano, crescendo 11% em comparação com o mesmo período do ano anterior. Além disso, a Confederação Nacional da Indústria (CNI) acionou o Supremo Tribunal Federal (STF) questionando a constitucionalidade de mudanças na NR-1, que obriga as empresas a gerenciar riscos psicossociais no trabalho. O Banco Central (BC) não reduzirá as taxas de juros Selic até que os efeitos do El Niño e a estabilidade dos preços do petróleo sejam observados, segundo o economista Adauto Lima da Franklin Templeton.", "tecnologia": "A empresa Anthropic recebeu permissão para usar seu novo modelo de inteligência artificial (IA) de forma limitada, enquanto a TechCrunch Mobility destaca o foco da Tesla na direção autônoma. No entanto, as preocupações com segurança cibernética levantadas pelo Exame sobre os avanços chineses em IA e as restrições dos EUA ao setor, combinadas com o investimento europeu na infraestrutura de IA, indicam um cenário complexo para o desenvolvimento tecnológico. A Meta enfrentou dificuldades ao usar o modelo Gemini da Google, refletindo as dificuldades das maiores empresas de IA em termos de infraestrutura. Além disso, a Procuradoria utilizou logs do ChatGPT como evidência em um caso de incêndio florestal na Califórnia, demonstrando o uso crescente da IA em investigações criminais. O Exame também destaca que os jovens da geração Z usam a IA diariamente, mas estão cada vez mais desconfiados sobre sua utilização, enquanto a BlackBerry se reestrutura com foco em robótica e software de inteligência artificial.", "ciencia": "Um estudo recente publicado no periódico Science Advances revela que o rover Perseverance detectou matéria orgânica em rochas marcianas, uma descoberta significativa na busca por evidências de vida passada ou presente em Marte. As amostras foram coletadas na cratera Jezero e lideraram um grupo de 62 cientistas. A descoberta reforça a importância do programa espacial na compreensão da história geológica e biológica de Marte. Além disso, pesquisadores do Terasaki Institute for Biomedical Innovation desenvolveram um hidrogel injetável feito de proteínas de seda e um composto extraído de kudzu que promoveu a cicatrização completa das feridas em 72 horas nos testes laboratoriais. Este material inovador pode ter aplicações significativas na medicina, especialmente para tratamentos de lesões graves.", "cultura": "O Rock in Rio Lisboa encerrou suas atividades no último dia 28 de outubro, com um produto específico que esgotou nas vendas. Em Santiago do Chile, a Marcha do Orgulho reuniu mais de 100 mil pessoas em 2026, exigindo reformas na legislação e combate a discursos de ódio contra os direitos LGBTIQ+. No Brasil, o novo espaço cultural do Sesc em Paraty deve triplicar os atendimentos a partir da sua inauguração em agosto. Em outro contexto, a escritora Alex Da Corte revela ter sido membro do clube de fãs de Mariah Carey na década de 1980 e ter escrito cartas para ela desde que podia.", "sociedade": "Um casal faleceu após despencar de um viaduto na Barra da Tijuca, caindo no mar e ficando submerso. As razões exatas para a perda de controle ainda não foram identificadas. No mesmo contexto de tragédias, o Papa Léo 14 expressou solidariedade às vítimas do terremoto na Venezuela, que já causou mais de 1.430 mortes, durante um encontro com o Colégio dos Cardeais. O Brasil enviou um quarto voo humanitário para a Venezuela com 35 bombeiros militares dos estados de São Paulo e Minas Gerais, auxiliando nas operações de busca e resgate após o terremoto que atingiu o país em 24 de março. Além disso, a França registrou mais de mil mortes a mais durante uma onda de calor recorde, com 85% dessas mortes ocorrendo entre pessoas com 65 anos ou mais, conforme informou a agência de saúde pública do país.", "meio_ambiente": "Uma onda de calor extremo atingiu a Europa, causando mais de 1.300 mortes na região, conforme relataram diversos artigos. Na França, foram registradas mil mortes relacionadas ao calor, com a maioria sendo idosos. Em outros países europeus como Alemanha, Tchecoslováquia, Polônia e Hungria, temperaturas recordes acima de 40°C foram observadas durante esta onda que afetou mais de 191 milhões de pessoas na Europa. No Estados Unidos, incêndios florestais causaram a morte de três bombeiros na fronteira entre Colorado e Utah. Na França, um ministério estimou que mil pessoas morreram em apenas três dias durante uma onda de calor extremo. Além disso, trabalhadores do comércio eletrônico em países como Índia enfrentaram problemas de saúde devido à exposição ao ar poluído. Na China, rótulos de carbon footprint foram introduzidos nas embalagens de chá para aumentar a transparência sobre o impacto ambiental dos produtos. Um workshop internacional sobre a tragédia nuclear de Fukushima foi realizado na cidade japonesa de Futaba com a participação de oficiais e especialistas reguladores nucleares de diversos países.", "direitos_humanos": "No Dia do Orgulho LGBTQIA+ celebrado no Brasil neste domingo (28/6), marcas de moda voltaram a apoiar o movimento após períodos mais conservadores. A coluna destacou cinco momentos relevantes para o movimento. Em Istambul, Turquia, policiais detiveram pelo menos 50 pessoas, incluindo um jornalista, durante um evento Gay Pride, mesmo com uma proibição local e do lockdown em pontos importantes da cidade. No Brasil, a ONU estima que cerca de 50 mil pessoas estejam desaparecidas após terremotos na Venezuela, enquanto no Distrito Federal são registrados diariamente 9 mil idosos com direitos humanos violados."}, "resumo_do_dia": {"politica_nacional": [{"id": 23735, "titulo": "Por que perdoar militares pelo 8/1 seria um ‘tapa na cara’ da democracia, segundo analistas", "url": "https://veja.abril.com.br/politica/por-que-perdoar-militares-pelo-8-1-seria-um-tapa-na-cara-da-democracia-segundo-analistas/", "fonte_id": "veja", "data_pub": "2026-06-28T18:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Flávio Bolsonaro, Romeu Zema e Ronaldo Caiado anunciaram anistia para militares condenados pelo golpe no STF. Analistas argumentam que isso seria um 'tapa na cara' da democracia.", "titulo_pt": "Por que perdoar militares pelo 8/1 seria um ‘tapa na cara’ da democracia, segundo analistas", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 23669, "titulo": "O STF em modo sobrevivência", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/marcus-melo/2026/06/o-stf-em-modo-sobrevivencia.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T18:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal opera atualmente em um modo de sobrevivência, com seus membros priorizando a própria preservação acima da proteção à Constituição. Este padrão não é exclusivo do STF e se estende a outras instituições brasileiras.", "titulo_pt": "O STF em modo de sobrevivência", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 23741, "titulo": "Nova pesquisa AtlasIntel testa Flávio x Haddad após crises no clã Bolsonaro e no PT", "url": "https://veja.abril.com.br/politica/nova-pesquisa-atlasintel-testa-flavio-x-haddad-apos-crises-no-cla-bolsonaro-e-no-pt/", "fonte_id": "veja", "data_pub": "2026-06-28T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A pesquisa AtlasIntel incluiu o ex-ministro da Fazenda na simulação presidencial e avaliou como se sairiam Flávio Bolsonaro e Michelle Bolsonaro. O estudo ocorreu após crises recentes no clã Bolsonaro e no PT.", "titulo_pt": "Nova pesquisa testa Flávio x Haddad após crises nos dois principais partidos", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 23670, "titulo": "Pré-campanha de Flávio é procurada por mulheres para contribuir com programa de governo", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/pre-campanha-de-flavio-e-procurada-por-mulheres-para-contribuir-com-programa-de-governo.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T17:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ex-presidente da Caixa Econômica Federal Daniella Marques, que coordena a pré-campanha de Flávio Bolsonaro, tem recebido ofertas de mulheres para contribuir com o programa de governo do senador.", "titulo_pt": "Pré-campanha de Flávio busca mulheres para ajudar no programa de governo", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 23747, "titulo": "Pesquisas eleitorais: como está a disputa Lula x Flávio às vésperas da nova AtlasIntel", "url": "https://veja.abril.com.br/politica/pesquisas-eleitorais-como-esta-a-disputa-lula-x-flavio-as-vesperas-da-nova-atlasintel/", "fonte_id": "veja", "data_pub": "2026-06-28T17:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A AtlasIntel será a primeira instituição a realizar pesquisas eleitorais que considerarão os possíveis impactos de dois eventos relevantes recentemente ocorridos no cenário político. O Instituto testará simultaneamente esses efeitos nos possíveis resultados entre Lula e Flávio.", "titulo_pt": "Pesquisas eleitorais: como está a disputa Lula x Flávio às vésperas da nova AtlasIntel", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 23678, "titulo": "Fila do INSS cai a menor patamar desde 2024, e nova presidente vê redução gradual nos próximos meses", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/fila-do-inss-cai-a-menor-patamar-desde-2024-e-nova-presidente-ve-reducao-gradual-nos-proximos-meses.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-28T15:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A fila do INSS reduziu-se pelo quarto mês consecutivo e atingiu 1,9 milhão de pedidos nesta quinta-feira (25), o menor nível desde outubro de 2024. A nova presidente do INSS, Ana Cristina Silveira, espera uma redução gradual nos próximos meses.", "titulo_pt": "Fila do INSS atinge menor patamar desde outubro de 2024, e nova presidente vê redução gradual", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 23700, "titulo": "Mendonça deve enviar à PGR nesta semana pedido para investigar financiamento de Vorcaro ao filme 'Dark Horse'", "url": "https://g1.globo.com/politica/noticia/2026/06/28/mendonca-deve-enviar-a-pgr-nesta-semana-investigacao-sobre-financiamento-de-vorcaro-ao-filme-dark-horse.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-28T13:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro André Mendonça, do Supremo Tribunal Federal (STF), deve enviar nesta semana para a Procuradoria-Geral da República um pedido de investigação sobre repasses feitos pelo ex-banqueiro Daniel Vorcaro ao filme 'Dark Horse', que retrata o ex-presidente Jair Bolsonaro. A PGR avaliará se há necessidade de abertura de inquérito ou se são necessárias diligências preliminares, ou se o caso deve ser arquivado.", "titulo_pt": "Mendonça envia pedido para investigar repasses de Vorcaro ao filme 'Dark Horse'", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 23671, "titulo": "Flávio diz que exerce mandato de forma ativa e comprometida, apesar de não participar de 43% das votações", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/blogs/brasilia-hoje/2026/06/flavio-diz-que-exerce-mandato-de-forma-ativa-e-comprometida-apesar-de-nao-participar-de-43-das-votacoes.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T13:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio Bolsonaro afirmou que exerce seu mandato de forma ativa, apesar da ausência em 43% das votações no Senado. Segundo o levantamento da Folha, ele só faltou a três sessões este ano.", "titulo_pt": "Flávio Bolsonaro afirma exercer mandato ativamente, mesmo com alta taxa de abstenção em votações", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 23672, "titulo": "Ministério Público de SP e União brigam por quase R$ 170 milhões de Maluf", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/ministerio-publico-de-sp-e-uniao-brigam-por-quase-r-170-milhoes-de-maluf.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério Público de São Paulo solicitou ao STF a liberação de ações e recursos financeiros relacionados a Paulo Maluf, totalizando quase R$ 168 milhões, para compensar prejuízos à prefeitura da capital.", "titulo_pt": "MP SP e União discutem cerca de R$ 168 milhões de Maluf", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 23227, "titulo": "Republicanos e PL apoiam candidatos rivais em Roraima e dividem a direita", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/republicanos-e-pl-apoiam-candidatos-rivais-em-roraima-e-dividem-a-direita.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os Republicanos e o PL apoiam candidatos diferentes na eleição de Roraima, causando divisões entre as forças da direita. A campanha de Flávio Bolsonaro (PL) busca ainda o apoio do Republicanos para a disputa presidencial.", "titulo_pt": "Republicanos e PL apóiam candidatos rivais em Roraima e dividem a direita", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 23326, "titulo": "Constituição promete, política não entrega e cortes avançam ao centro do poder", "url": "https://www.jota.info/opiniao-e-analise/artigos/constituicao-promete-politica-nao-entrega-e-cortes-avancam-ao-centro-do-poder", "fonte_id": "jota", "data_pub": "2026-06-28T08:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Constituição promete direitos e garantias, mas a política não consegue entregar esses benefícios na prática. Os cortes judiciais têm se tornado um elemento central no exercício do poder em ambos os países.", "titulo_pt": "Constituição promete, política não entrega e cortes avançam ao centro do poder", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 23269, "titulo": "Moraes avalia domiciliar de Bolsonaro após manifestação de PGR e defesa", "url": "https://www.cnnbrasil.com.br/politica/arma-apreendida-vira-peca-chave-sobre-domiciliar-de-bolsonaro/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T07:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O juiz federal Sérgio Morais está avaliando a possibilidade de manter o presidente Jair Bolsonaro em prisão domiciliar humanitária. A Procuradoria-Geral da República defendeu aguardar o resultado da investigação policial, enquanto a defesa do presidente negou a existência de uma falta grave e pediu a manutenção da prisão domiciliar.", "titulo_pt": "Moraes avaliará domiciliar de Bolsonaro após posicionamento de PGR e defesa", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 23233, "titulo": "Especialistas veem MEI com custo elevado e recomendam reduzir benefício; governo quer ampliar limite e contratações", "url": "https://g1.globo.com/economia/noticia/2026/06/28/especialistas-veem-mei-com-custo-elevado-e-recomendam-reduzir-beneficio-governo-quer-ampliar-limite-e-contratacoes.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-28T07:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Especialistas recomendam reduzir os benefícios do microempreendedor individual (MEI) para garantir a sustentabilidade da Previdência Social, devido ao custo elevado aos cofres públicos. O governo pretende ampliar o limite e as contratações do MEI.", "titulo_pt": "Especialistas veem MEI com custo alto e recomendam reduzir benefícios; governo quer expandir programa", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 23234, "titulo": "A um mês das convenções, presidenciáveis negociam vice pensando em reduzir resistências do eleitorado e em tempo de TV", "url": "https://g1.globo.com/politica/noticia/2026/06/28/a-um-mes-das-convencoes-presidenciaveis-negociam-vice-pensando-em-reduzir-resistencias-do-eleitorado-e-em-tempo-de-tv.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-28T05:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A menos de um mês das convenções partidárias, os pré-candidatos presidenciais estão negociando nomes para vice-candidatos com o objetivo de reduzir resistências do eleitorado. Os candidatos buscam alianças que possam atrair votos de diferentes seções da população.", "titulo_pt": "A um mês das convenções, pré-candidatos buscam vices para reduzir resistências do eleitorado", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 22508, "titulo": "Governo de SC acusa Lula de xenofobia e aciona PGR", "url": "https://www.metropoles.com/brasil/governo-de-sc-diz-que-vai-acionar-pgr-por-fala-de-lula-sobre", "fonte_id": "metropoles", "data_pub": "2026-06-28T02:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo de Santa Catarina acusou o ex-presidente Lula de xenofobia após um comentário feito durante um evento em Itajaí. O governo entendeu que houve uma discriminação.", "titulo_pt": "Governo de SC acusa Lula de xenofobia", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 22408, "titulo": "Flávio Bolsonaro se ausentou em 43% das votações nominais do Senado este ano", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/flavio-bolsonaro-se-ausentou-em-43-das-votacoes-nominais-do-senado-este-ano.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio Bolsonaro (PL-RJ) não votou em 43% das deliberações nominais do Senado neste ano, de acordo com um levantamento da Folha. Ele é o quinto parlamentar que mais se ausentou nas votações, entre as 49 matérias analisadas até 22 de junho.", "titulo_pt": "Flávio Bolsonaro se ausentou em 43% das votações nominais do Senado este ano", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 24186, "titulo": "Iran attacks Bahrain and Kuwait following US strikes", "url": "https://www.taipeitimes.com/News/front/archives/2026/06/29/2003859908", "fonte_id": "taipei_times", "data_pub": "2026-06-29T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Irã criticou e atacou Bahrain e Kuwait após operações militares realizadas pelos Estados Unidos. As ações do Irã foram vistas como uma resposta às recentes atividades dos EUA na região.", "titulo_pt": "Irã critica e ataca Bahrain e Kuwait após operações dos EUA", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 23703, "titulo": "Sobe para 1.450 o número de mortos por terremotos na Venezuela", "url": "https://www.cartacapital.com.br/mundo/sobe-para-1-450-o-numero-de-mortos-por-terremotos-na-venezuela/", "fonte_id": "cartacapital", "data_pub": "2026-06-28T18:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As Nações Unidas estimam que cerca de 50.000 pessoas estejam desaparecidas. O número de mortos por terremotos na Venezuela subiu para 1.450.", "titulo_pt": "Número de mortos por terremotos na Venezuela sobe para 1.450", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 23969, "titulo": "Venezuela Live Updates: Window to Find Survivors Is Closing as Rescuers Battle Through Aftershocks", "url": "https://www.nytimes.com/live/2026/06/28/world/venezuela-earthquake", "fonte_id": "nyt_world", "data_pub": "2026-06-28T18:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de três dias após os terremotos que devastaram a costa venezuelana, o esforço de vavel_duplicata_de": null, "texto_pt": "O primeiro jogo das eliminatórias do Mundial de 2026 enfrenta uma das anfitriãs contra o time africano. A partida será transmitida ao vivo.", "titulo_pt": "Mundial de 2026, em direto: África do Sul - Canadá, ao vivo", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 24075, "titulo": "Eleven killed after plane carrying skydivers crashes in eastern France", "url": "https://www.bbc.co.uk/news/articles/c5yz9yj9x74o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-28T18:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um avião que transportava praticantes de skydiving caiu no leste da França, resultando na morte do piloto e de 10 passageiros, incluindo cinco primeiros-timers.", "titulo_pt": "Onze mortos após avião com praticantes de skydive cair em França", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 24132, "titulo": "Meloni, contro Roccella commenti ignobili e disumani. Superato il limite", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/28/meloni-contro-roccella-commenti-ignobili-e-disumani.-superato-il-limite_46b1f1a4-78b9-47ed-8ef5-3811e3cd7e8f.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-28T18:22:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Meloni enfrentou comentários ignobis e desumanos em Roccella. Isso ocorreu num clima venenoso que alguns mantiveram por muito tempo.", "titulo_pt": "Meloni, confrontada com comentários ignobres e desumanos em Roccella", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 24171, "titulo": "Ukraine drone assault ignites Russian oil refinery as Putin recognises ‘difficult period’", "url": "https://www.scmp.com/news/world/russia-central-asia/article/3358675/ukraine-drone-assault-ignites-russian-oil-refinery-putin-recognises-difficult-period?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T18:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ucrânia intensificou seus ataques com drones, causando incêndio em uma refinaria de petróleo russa no sul do país e deixando pelo menos duas mortes. O presidente russo Vladimir Putin reconheceu que o país está passando por um período difícil.", "titulo_pt": "Ataque ucraniano com drones causa incêndio em refinaria russa e Putin reconhece período difícil", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 23838, "titulo": "Irã ataca Bahrein e Kuwait em resposta aos EUA e ameaça paralisar negociações", "url": "https://www.infomoney.com.br/mundo/ira-ataca-bahrein-e-kuwait-em-resposta-aos-eua-e-ameaca-paralisar-negociacoes/", "fonte_id": "infomoney", "data_pub": "2026-06-28T18:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Guarda Revolucionária do Irã atacou Bahrein e Kuwait como resposta a bombardeios americanos, agravando a crise no Estreito de Ormuz. O Irã ameaçou paralisar as negociações em consequência dessas ações.", "titulo_pt": "Irã ataca Bahrein e Kuwait em resposta aos EUA e ameaça paralisar negociações", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 24119, "titulo": "Aramco helicopter crashes at Saudi port", "url": "https://www.ft.com/content/6be8c3fd-5f1d-4659-afee-43db76a36fd6", "fonte_id": "financial_times", "data_pub": "2026-06-28T18:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um acidente de helicóptero ocorreu no porto de Ras Tanura, na Arábia Saudita, resultando em pelo menos 14 mortes. O incidente aconteceu poucas horas após ataques dos EUA e Irã ameaçarem um frágil acordo para reabrir o Estreito de Ormuz.", "titulo_pt": "Acidente de helicóptero no porto de Ras Tanura", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 23689, "titulo": "Migrantes nos EUA com visto temporário devem solicitar residência ou deixar o país, diz secretário de Trump", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/migrantes-nos-eua-com-visto-temporario-devem-solicitar-residencia-ou-deixar-o-pais-diz-secretario-de-trump.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-28T18:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Secretário de Segurança Interna dos EUA, Markwayne Mullin, informou que migrantes com visto temporário devem buscar a residência permanente ou retornar aos seus países de origem. Esta declaração foi feita em 28 de junho de 2026.", "titulo_pt": "Migrantes nos EUA com visto temporário devem solicitar residência permanente ou deixar o país, diz secretário", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 24016, "titulo": "U.S. and Iran exchange strikes, underscoring the fragility of the ceasefire", "url": "https://www.npr.org/2026/06/28/g-s1-130748/us-iran-israel-lebanon-hormuz-strikes-bahrain-kuwait", "fonte_id": "npr_news", "data_pub": "2026-06-28T18:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente Trump acusou a Irã de violar o acordo framework, e Teerã ameaçou interromper totalmente as negociações com os Estados Unidos. Por outro lado, a violência continuava entre Israel e Hezbollah.", "titulo_pt": "Estados Unidos e Irã trocam acusações, reforçando a fragilidade do cessar-fogo", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 23690, "titulo": "Número de mortes após terremotos na Venezuela sobe para 1.450", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/numero-de-mortes-apos-terremotos-na-venezuela-sobe-para-1450.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-28T17:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O número de mortes após os terremotos na Venezuela aumentou para 1.450, conforme anunciado pelo presidente da Assembleia Nacional, Jorge Rodríguez. O anúncio foi feito neste domingo (28).", "titulo_pt": "Número de mortos após terremotos na Venezuela chega a 1.450", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 23839, "titulo": "Estreito de Ormuz demorará um mês para retomar capacidade pré-crise, diz Irã", "url": "https://www.infomoney.com.br/mundo/estreito-de-ormuz-demorara-um-mes-para-retomar-capacidade-pre-crise-diz-ira/", "fonte_id": "infomoney", "data_pub": "2026-06-28T17:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O chanceler iraniano Abbas Araqchi afirmou que o Estreito de Ormuz levará aproximadamente um mês para recuperar sua capacidade pré-crise. Ele enfatizou o controle do país sobre a região e criticou intervenções estrangeiras após os recentes confrontos entre Teerã e Washington.", "titulo_pt": "Estreito de Ormuz demorará um mês para recuperar capacidade pré-crise, afirma Irã", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 24143, "titulo": "The aftermath of Venezuela’s deadly earthquake", "url": "https://www.aljazeera.com/video/newsfeed/2026/6/28/the-aftermath-of-venezuelas-deadly-earthquake?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-28T17:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As buscas por sobreviventes continuam na Venezuela após um terremoto poderoso que deixou centenas de mortos e milhares desaparecidos.", "titulo_pt": "O pós-escala do terrível terremoto na Venezuela", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}], "mundo__eventos": [], "economia": [{"id": 24183, "titulo": "Defense net may be finished this year", "url": "https://www.taipeitimes.com/News/front/archives/2026/06/29/2003859905", "fonte_id": "taipei_times", "data_pub": "2026-06-29T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O sistema de defesa pode estar concluído este ano.", "titulo_pt": "Rede de Defesa Poderia Terminar Este Ano", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 24184, , "texto_pt": "A Ferbasa recebeu um financiamento de R$ 43,8 milhões do BNDES para construir uma nova planta de produção de carvão vegetal em Maracás, na Bahia. O projeto está localizado a 350 km de Salvador.", "titulo_pt": "Ferbasa obtém R$ 43,8 milhões para produção de carvão vegetal", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 23822, "titulo": "ETFs de renda fixa atraem fluxo recorde de investidores", "url": "https://www.cnnbrasil.com.br/economia/investimentos/etfs-de-renda-fixa-atraem-fluxo-recorde-de-investidores/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O fluxo de investimentos para ETFs de renda fixa atingiu um recorde, refletindo a busca pelos investidores por praticidade, diversificação e benefícios tributários.", "titulo_pt": "ETFs de renda fixa captam fluxo recorde de investidores", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 23823, "titulo": "Ter dinheiro fora do Brasil vale a pena? Conheça formas de investir", "url": "https://www.cnnbrasil.com.br/economia/negocios/ter-dinheiro-fora-do-brasil-vale-a-pena-conheca-formas-de-investir/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Mais de US$ 654 bilhões estão investidos por brasileiros no exterior, refletindo a crescente preferência por estratégias internacionais que oferecem proteção cambial e acesso a mercados globais.", "titulo_pt": "Ter dinheiro fora do Brasil vale a pena? Conheça formas de investir", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 23677, "titulo": "Soberania não se copia", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/ronaldolemos/2026/06/soberania-nao-se-copia.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-28T17:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Europa alterou sua postura sobre tecnologia nos últimos meses, passando de uma abordagem regulação-centrada para uma atitude mais proativa. Agora, o continente busca autonomia tecnológica criando suas próprias leis e regulamentos.", "titulo_pt": "Soberania não se copia", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 23697, "titulo": "Gastos de turistas estrangeiros no Brasil soma R$ 25 bi em cinco meses", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/gastos-de-turistas-estrangeiros-no-brasil-soma-r-25-bi-em-cinco-meses", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-28T15:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os gastos de turistas internacionais no Brasil atingiram R$ 25 bilhões entre janeiro e maio deste ano, crescendo 11% em comparação com o mesmo período do ano anterior. Em maio, os gastos foram ainda mais altos, alcançando R$ 4,08 bilhões, um aumento de 19% em relação ao mesmo mês de 2025.", "titulo_pt": "Gastos de turistas estrangeiros no Brasil somam R$ 25 bi em cinco meses", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 23679, "titulo": "Entusiasmo excessivo pela IA pode resultar em uma longa crise de investimentos, alerta o BIS", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/entusiasmo-excessivo-pela-ia-pode-resultar-em-uma-longa-crise-de-investimentos-alerta-o-bis.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-28T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O BIS alertou que os investimentos excessivos das grandes empresas de tecnologia na inteligência artificial podem levar a uma crise prolongada dos investimentos, com impacto nos mercados financeiros e na economia global.", "titulo_pt": "Excesso de entusiasmo nas investidas de IA pode gerar longa crise de investimentos, avisa o BIS", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 23766, "titulo": "Essa empresa subiu mais de 1.000% na bolsa — e criou um novo bilionário", "url": "https://exame.com/invest/mercados/essa-empresa-subiu-mais-de-1-000-na-bolsa-e-criou-um-novo-bilionario/", "fonte_id": "exame", "data_pub": "2026-06-28T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A empresa Bloom Energy, que operou sem lucro por quase duas décadas, viu seu valor na bolsa aumentar mais de 1.000%. A companhia fechou contratos com grandes empresas como Oracle e Brookfield.", "titulo_pt": "Essa empresa subiu mais de 1.000% na bolsa — e criou um novo bilionário", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 23769, "titulo": "Com alta de 70% em um ano, bolsa do Japão arruma casa para receber mais investidores", "url": "https://exame.com/invest/mercados/com-alta-de-70-em-um-ano-bolsa-do-japao-arruma-casa-para-receber-mais-investidores/", "fonte_id": "exame", "data_pub": "2026-06-28T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A bolsa de valores do Japão está sendo reformada para acomodar mais investidores, impulsionada por uma alta significativa no capital estrangeiro, pelo iene enfraquecido e pela eliminação das taxas de corretagem.", "titulo_pt": "Com alta de 70% em um ano, bolsa do Japão se prepara para receber mais investidores", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 24128, "titulo": "If you think China needs to dethrone U.S. dollar, you don't understand how it is waging global currency war", "url": "https://www.cnbc.com/2026/06/28/china-doesnt-need-to-de-throne-dollar-to-win-global-currency-war.html", "fonte_id": "cnbc_international", "data_pub": "2026-06-28T13:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "É equivocado pensar que o renminbi da China vai substituir o dólar americano. Pequim já está com sucesso reduzindo a dependência do sistema global centrado no dólar.", "titulo_pt": "Pensar que o wound closure in laboratory tests", "url": "https://phys.org/news/2026-06-silk-kudzu-hydrogel-wound-closure.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores do Terasaki Institute for Biomedical Innovation desenvolveram um hidrogel injetável feito de proteínas de seda e um composto extraído de uma planta. Nas provas laboratoriais, o material promoveu a cicatrização completa das feridas em 72 horas.", "titulo_pt": "Hidrogel injetável de seda e kudzu atinge fechamento completo de feridas em testes laboratoriais", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23801, "titulo": "Planeta rosa pode ter nuvens de sal, revelam observações do James Webb", "url": "https://www.metropoles.com/ciencia/planeta-rosa-nuvens-de-sal", "fonte_id": "metropoles", "data_pub": "2026-06-28T18:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O exoplaneta GJ 504b, descoberto em 2013, apresentou sinais de nuvens de sal nas observações realizadas pelo Telescópio James Webb.", "titulo_pt": "Planeta rosa pode ter nuvens de sal, revelam observações do James Webb", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 24230, "titulo": "Reanalysis suggests 'Phoebe' is a variable star, not a primordial black hole", "url": "https://phys.org/news/2026-06-reanalysis-phoebe-variable-star-primordial.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T18:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma nova análise sugere que a estrela conhecida como 'Fofea' não é uma buraco negro primordial, mas sim uma estrela comum que varia sua luminosidade naturalmente ao longo do tempo. A reanálise dos dados da câmera Dark Energy Camera (DECam) mostrou que as observações anteriores podem ter sido enganosas.", "titulo_pt": "Reanálise sugere que 'Fofea' é uma estrela variável, não um buraco negro primordial", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24231, "titulo": "12 billion years old, this interstellar comet is older than our solar system", "url": "https://phys.org/news/2026-06-billion-years-interstellar-comet-older.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em julho de 2025, astrônomos descobriram um novo objeto interestelar movendo-se pelo sistema solar. O objeto foi detectado pelo Sistema de Alerta de Impacto Terrestre do Asteroides (ATLAS) e rapidamente identificado como algo especial.", "titulo_pt": "12 bilhões de anos velho, este cometa interestelar é mais antigo que nosso sistema solar", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23833, "titulo": "Doença rara e silenciosa em bebês pode ser evitada com teste do pezinho", "url": "https://www.cnnbrasil.com.br/saude/doenca-rara-e-silenciosa-em-bebes-pode-ser-evitada-com-teste-do-pezinho/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T17:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A fenilcetonúria, uma doença rara e silenciosa em bebês, pode ser evitada com o teste do pezinho. Sem tratamento, a doença pode comprometer irreversivelmente o desenvolvimento cognitivo e motor dos infantes devido ao acúmulo de substâncias tóxicas no organismo.", "titulo_pt": "Doença rara e silenciosa em bebês pode ser evitada com teste do pezinho", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 24232, "titulo": "Ancient algal defenses against UV may have helped plants conquer land", "url": "https://phys.org/news/2026-06-ancient-algal-defenses-uv-conquer.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo recente ilumina como os ancestrais das plantas terrestres modernas superaram um dos aspectos mais desafiadores da vida fora d'água: a exposição à radiação ultravioleta (UV) prejudicial. Através do exame de uma microalga relacionada às primeiras plantas terrestres, os pesquisadores descobriram um sistema sofisticado e dinâmico para lidar com queimaduras solares, provavelmente contribuindo para a colonização das plantas na terra há mais de 500 milhões de anos.", "titulo_pt": "Defesas antigas contra UV podem ter auxiliado nas plantas dominarem as terras", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24233, "titulo": "Better unemployment welfare could curb rise of populism", "url": "https://phys.org/news/2026-06-unemployment-welfare-curb-populism.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T16:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A pesquisa, conduzida pelos pesquisadores Chase Foster (King's College London) e Jeffry Frieden (Columbia University), analisou 134 eleições nacionais em 16 países entre 1990 e 2021, além de dados de 11 ondas da Enquete Social Europeia. Os resultados foram publicados na revista European Union Politics.", "titulo_pt": "Melhor assistência ao desemprego poderia reduzir o aumento do populismo", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24247, "titulo": "SpaceX sends 24 Starlink satellites into Earth orbit on Falcon 9 launch from California (video)", "url": "https://www.space.com/space-exploration/launches-spacecraft/spacex-starlink-17-40-b1088-vsfb-ocisly", "fonte_id": "space_com", "data_pub": "2026-06-28T16:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um foguete Falcon 9 da SpaceX lançou 24 satélites Starlink do Base Aérea Vandenberg, no estado da Califórnia, em 28 de junho de 2026.", "titulo_pt": "SpaceX lança 24 satélites Starlink a partir da Califórnia", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 24234, "titulo": "Australia boosts shark-spotting drone coverage at Sydney beaches", "url": "https://phys.org/news/2026-06-australia-boosts-shark-drone-coverage.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T15:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A partir de 1º de julho, a Austrália vai expandir o uso de drones para monitorar tubarões nas praias de Sydney e regiões adjacentes ao longo do ano inteiro. Esta medida foi tomada em resposta ao aumento no número de ataques e observações de tubarões.", "titulo_pt": "Austrália ampliará cobertura de drones para monitoramento de tubarões nas praias de Sydney", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24235, "titulo": "Shining blue light on gold-graphene nanodots achieves wound healing trifecta", "url": "https://phys.org/news/2026-06-blue-gold-graphene-nanodots-wound.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T15:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Através da exposição a uma luz azul brilhante, nanodotinhos de ouro grafeno podem atingir um triunvirato na cura de feridas, fornecendo três componentes necessários: um para matar bactérias, outro para limpar a ferida e um para promover a recuperação.", "titulo_pt": "Luz azul brilhante sobre nanodotinhos de ouro grafeno realiza triunvirato na cura de feridas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24236, "titulo": "NASA races to save Swift telescope from falling back to Earth with daring rescue mission", "url": "https://phys.org/news/2026-06-nasa-swift-telescope-falling-earth.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T15:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA está realizando uma missão ousada para evitar que um telescópio velho caia na Terra.", "titulo_pt": "NASA corre para salvar telescopio Swift de cair na Terra com missão arriscada", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23764, "titulo": "Alemanha bate recorde de calor e atinge 41,7 ºC", "url": "https://exame.com/mundo/alemanha-bate-recorde-de-calor-e-atinge-417-oc/", "fonte_id": "exame", "data_pub": "2026-06-28T15:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Alemanha registrou um novo recorde de calor com 41,7 ºC. Altas temperaturas também foram observadas na Tchéquia e Polônia, levando a mais de 1.300 mortes em todo o continente europeu.", "titulo_pt": "Alemanha bate recorde de calor com 41,7 ºC", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 24237, "titulo": "More than 1,300 excess deaths recorded in Europe heat wave: WHO", "url": "https://phys.org/news/2026-06-excess-deaths-europe.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T15:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Organização Mundial da Saúde relatou que mais de 1.300 mortes a mais foram registradas em Europa desde o dia 21 de junho, associadas à onda de calor recorde que atingiu grande parte do continente.", "titulo_pt": "Mais de 1.300 mortes a mais registradas na Europa durante onda de calor: OMS", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24238, "titulo": "Everyone experiences loss and grief, but that doesn't make it any easier to talk with kids about it", "url": "https://phys.org/news/2026-06-loss-grief-doesnt-easier-kids.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O pai de uma menina de 4 anos veio à escola informar a sua professora sobre um acidente envolvendo a mãe da criança. Ele não conversou com a filha, apenas passou informações sobre a retirada do aluno antes de correr para o hospital.", "titulo_pt": "Todos experimentam perda e luto, mas isso não torna mais fácil conversar com crianças sobre isso", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24248, "titulo": "'Superman Returns' at 20: Is it a sequel? Is it a reboot? Two decades on, we're still not sure", "url": "https://www.space.com/entertainment/space-movies-shows/superman-returns-at-20-is-it-a-sequel-is-it-a-reboot-two-decades-on-were-still-not-sure", "fonte_id": "space_com", "data_pub": "2026-06-28T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Superman Returns de 2006 é mais do que apenas um tributo à versão clássica dirigida por Richard Donner.", "titulo_pt": "Superman Returns aos 20: É uma continuação? É uma renovação? Vinte anos depois, ainda não estamos certos.", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 24239, "titulo": "The sun's outbursts may briefly weaken rain and snow events across North America", "url": "https://phys.org/news/2026-06-sun-outbursts-briefly-weaken-events.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Estudos da Universidade do Novo Hampshire mostraram que, nas horas e dias seguintes a uma tempestade solar, partes da América do Norte podem experimentar mudanças drásticas no clima, como diminuições na precipitação. A intensidade da tempestade solar está associada ao tamanho dessas mudanças climáticas.", "titulo_pt": "Eruptions solares podem temporariamente fraco chuvas e nevões em partes do Norte América", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 23733, "titulo": "O curioso produto que esgotou nas vendas do Rock in Rio Lisboa", "url": "https://veja.abril.com.br/coluna/veja-gente/o-curioso-produto-que-esgotou-nas-vendas-do-rock-in-rio-lisboa/", "fonte_id": "veja", "data_pub": "2026-06-28T18:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Rock in Rio Lisboa encerra suas atividades no último dia, 28 de outubro. Um produto específico esgotou nas vendas durante o evento.", "titulo_pt": "Produto curioso esgota nas vendas do Rock in Rio Lisboa", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 24080, "titulo": "French research thrown into turmoil by a multifaceted crisis", "url": "https://www.lemonde.fr/en/science/article/2026/06/28/french-research-thrown-into-turmoil-by-a-multifaceted-crisis_6754955_10.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-28T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A comunidade científica francesa enfrenta diversos desafios, incluindo recursos financeiros limitados, ataques ideológicos e a ascensão da inteligência artificial. Isso está preocupando os pesquisadores em um momento em que a França também está perdendo terreno na publicação científica.", "titulo_pt": "Investigação francesa mergulha em turbulências diante de uma crise multifacetada", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 23932, "titulo": "Marina Lambertini: la ingeniera agrónoma detrás de un trabajo poco conocido y que es clave para uno de los principales alimentos", "url": "https://www.lanacion.com.ar/economia/campo/marina-lambertini-la-ingeniera-agronoma-detras-de-un-trabajo-poco-conocido-y-que-define-uno-de-los-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T17:56:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Marina Lambertini é uma engenheira agrônoma que conselha produtores hortícolas de diferentes regiões do país, focando na compartilhamento de conhecimentos, tecnologias e tracabilidade. Ela trabalha em um campo menos conhecido mas crucial para alguns dos alimentos mais importantes.", "titulo_pt": "Marina Lambertini: a engenheira agrônoma por trás de um trabalho pouco conhecido e que é essencial para um dos principais alimentos", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 23933, "titulo": "Conrado Estol sobre las relaciones personales y la longevidad: “La base de todo son los vínculos”", "url": "https://www.lanacion.com.ar/sociedad/conrado-estol-sobre-las-relaciones-personales-y-la-longevidad-la-base-de-todo-son-los-vinculos-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T17:55:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O neurologista Conrado Estol questiona a ideia de que o sucesso profissional é responsável pela felicidade. Segundo ele, a qualidade dos relacionamentos humanos é fundamental para uma vida longa e satisfeita.", "titulo_pt": "Conrado Estol sobre relações pessoais e longevidade: 'A base de tudo são os vínculos'", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 23950, "titulo": "Vodanovic duda de mesa de diálogo en el Senado por megarreforma: “La voluntad política la tienen los ministros”", "url": "https://www.latercera.com/politica/noticia/vodanovic-duda-de-mesa-de-dialogo-en-el-senado-por-megarreforma-la-voluntad-politica-la-tienen-los-ministros/", "fonte_id": "la_tercera", "data_pub": "2026-06-28T17:54:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Vodanovic expressou dúvidas sobre a mesa de diálogo proposta pelo Senado para discutir a megareforma, afirmando que não sabe quanto poder essa instância teria se o governo não concordasse. O parlamentar questiona a força política dessa medida.", "titulo_pt": "Vodanovic duvida da mesa de diálogo no Senado sobre megareforma", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 23828, "titulo": "Relembre 10 personagens LGBT+ que fizeram história nas telas do streaming", "url": "https://www.cnnbrasil.com.br/pop/streaming/relembre-10-personagens-lgbt-que-fizeram-historia-nas-telas-do-streaming/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T17:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Dia Internacional do Orgulho, comemorado neste domingo (28), é lembrado pela CNN Brasil através de 10 personagens LGBT+ que trouxeram representatividade para o audiovisual. A lista inclui figuras que marcaram presença em diferentes plataformas de streaming.", "titulo_pt": "Relembre 10 personagens LGBT+ que fizeram história nas telas do streaming", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 24274, "titulo": "L-shaped roofs create \"generous shadows\" over Los Cabos residence", "url": "https://www.dezeen.com/2026/06/28/casa-en-palmilla-los-cabos-estudio-ignacio-urquiza-ana-paula-de-alba/", "fonte_id": "dezeen", "data_pub": "2026-06-28T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A casa em Los Cabos, no México, projetada pelo Estúdio Ignacio Urquiza Ana Paula, possui dois tetos leves e L-formados que cobrem quatro volumes. Esses tetos criam sombras generosas sobre a residência.", "titulo_pt": "Telhados L-formados criam 'sombras generosas' sobre residência em Los Cabos", "veiculo": "Dezeen (design e arquitetura)", "pais": "Reino Unido", "classe": "B"}, {"id": 24218, "titulo": "The Cube is Jim Henson’s little-known proto-Black Mirror masterpiece", "url": "https://www.theverge.com/entertainment/958757/jim-henson-the-cube-black-mirror-tv-movie-review", "fonte_id": "the_verge", "data_pub": "2026-06-28T16:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "The Cube é um teleplays de 1969 produzido por Jim Henson para uma série de televisão chamada Experiment in Television. É menos conhecido do que suas outras obras, mas aborda temas mais maduros.", "titulo_pt": "O Cubo: o pouco conhecido primor de Jim Henson antes da Black Mirror", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 23683, "titulo": "Por que a Broadway, em fase difícil, não consegue estrear mais musicais originais", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/por-que-a-broadway-em-fase-dificil-nao-consegue-estrear-mais-musicais-originais.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-28T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Após a pandemia, a Broadway estreou 14 musicais novos durante as temporadas de 2024 e 2025, mas quase todos foram fracassos. Na temporada passada, apenas seis novos musicais estrearam, sendo que dois rapidamente falharam.", "titulo_pt": "Por que a Broadway, em fase difícil, não consegue estrear mais musicais originais", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 23701, "titulo": "Novo espaço cultural do Sesc deve triplicar atendimentos em Paraty", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/novo-espaco-cultural-do-sesc-deve-triplicar-atendimentos-em-paraty", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-28T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A cidade de Paraty, no Rio de Janeiro, tornou-se um importante destino cultural nos últimos anos. Uma nova unidade do Sesc será inaugurada em agosto no bairro Caborê para atender ainda mais produtores e artistas locais e promover práticas culturais.", "titulo_pt": "Novo espaço cultural do Sesc deve triplicar atendimentos em Paraty", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 23945, "titulo": "Marcha del Orgullo 2026 congrega a más 100 mil asistentes en el centro de Santiago", "url": "https://www.latercera.com/nacional/noticia/marcha-del-orgullo-2026-congrega-a-mas-100-mil-asistentes-en-el-centro-de-santiago/", "fonte_id": "la_tercera", "data_pub": "2026-06-28T16:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Marcha do Orgulho 2026 reuniu mais de 100 mil pessoas no centro de Santiago. Os organizadores pediram por reformas na legislação e combate a discursos de ódio, alertando sobre ameaças aos direitos LGBTIQ+ tanto no Chile quanto internacionalmente. Houve incidentes isolados entre grupos de manifestantes.", "titulo_pt": "Marcha do Orgulho 2026 reúne mais de 100 mil pessoas em Santiago", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 23684, "titulo": "K-pop no Rock in Rio é uma forma de aproximá-lo do público, diz Roberta Medina", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/k-pop-no-rock-in-rio-e-uma-forma-de-aproxima-lo-do-publico-diz-roberta-medina.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-28T15:37:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A vice-presidente do Rock in Rio, Roberta Medina, comentou sobre a apresentação do Stray Kids no festival, que será a primeira vez que K-pop aparece na história do evento. Ela mencionou como o rock inicialmente era visto com desconfiança quando o Rock in Rio foi fundado.", "titulo_pt": "K-pop no Rock in Rio aproxima o evento do público, diz Roberta Medina", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 24168, "titulo": "Ukraine can’t afford a breakup with Poland over history", "url": "https://www.japantimes.co.jp/commentary/2026/06/29/world/ukraine-poland-history/", "fonte_id": "japan_times", "data_pub": "2026-06-28T15:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Ucrânia não pode se permitir romper relações com a Polônia devido ao passado histórico. Este é um jogo político doméstico perigoso para ambos os lados, mas apenas a Polônia está em guerra.", "titulo_pt": "Ucrânia não pode se afastar da Polônia por questões históricas", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 23685, "titulo": "Escritor afirma que seu nome foi usado em livro feito por IA sem autorização", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/escritor-afirma-que-seu-nome-foi-usado-em-livro-feito-por-ia-sem-autorizacao.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-28T14:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O escritor e viajante francês Julien Blanc-Gras denunciou que a Amazon estava vendendo um livro gerado por inteligência artificial assinado com seu nome, sem sua autorização.", "titulo_pt": "Escritor francês denuncia uso indevido de seu nome em livro criado por IA", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 23686, "titulo": "Silvia Abravanel se despede do SBT para disputar vaga na Câmara: 'Missão dada por -lgbtqiap-o-ano-todo/", "fonte_id": "exame", "data_pub": "2026-06-28T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Através de práticas contínuas, empresas grandes promovem a inclusão LGBTQIAP+ durante todo o ano, ao invés de se limitarem a campanhas sazonais. Estas organizações estruturam programas fixos voltados para diversidade e equidade.", "titulo_pt": "Como grandes empresas promovem a inclusão LGBTQIAP+ o ano inteiro", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 24226, "titulo": "France records 1,000 excess deaths during record-breaking heatwave", "url": "https://www.koreaherald.com/article/10790710", "fonte_id": "korea_herald", "data_pub": "2026-06-28T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A França registrou 1.000 mortes a mais durante a onda de calor recordista que atinge Europa, conforme informou o agente de saúde pública. A entidade prevê que o número real possa ser maior à medida que informações adicionais sobre mortes em lares de idosos e domicílios sejam avaliadas.", "titulo_pt": "França registra 1.000 mortes a mais durante onda de calor recordista", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 24196, "titulo": "Carbon footprint labels added to tea products: station", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/29/2003859923", "fonte_id": "taipei_times", "data_pub": "2026-06-29T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Etiquetas de rastro de carbono foram adicionadas a produtos de chá. Esta medida visa aumentar a transparência sobre o impacto ambiental desses produtos.", "titulo_pt": "Etiquetas de rastro de carbono para produtos de chá", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 24198, "titulo": "Officials monitor Wanli River amid heavy rain", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/29/2003859925", "fo
