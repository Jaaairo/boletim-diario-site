<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=author@400&display=swap" rel="stylesheet">
<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
  /* Jornal do dia — area "Ouca Agora" (fundo escuro, compacta) */
  .podcast-card { background: var(--azul); border-radius: 8px;
                  padding: 12px 16px 14px; margin-bottom: 24px; }
  .podcast-hd { font-weight: 700; font-size: 14px; letter-spacing: .03em;
                text-transform: uppercase; color: #fff; margin-bottom: 8px; }
  .podcast-audio { width: 100%; height: 40px; display: block; }
  /* Com podcast, o card ja separa visualmente: dispensa a linha abaixo dos numeros */
  .cards.com-podcast { border-bottom: none; padding-bottom: 0; margin-bottom: 20px; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 22/07/2026 10:08 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">
    <div class="modal-erro" id="senha-erro" style="display:none">Senha incorreta.</div>
    <div class="modal-btns">
      <button class="btn-sec2" onclick="fecharModal('modal-senha')">Cancelar</button>
      <button class="btn-pri" onclick="verificarSenha()">Entrar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>
      <option value="classificacao_errada">Classificação errada</option>
      <option value="resumo_impreciso">Resumo impreciso</option>
      <option value="outro">Outro</option>
    </select>
    <label for="flag-nota">Nota (opcional)</label>
    <textarea id="flag-nota" placeholder="Descreva o problema..."></textarea>
    <div class="modal-btns">
      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "22/07/2026 10:08", "stats": {"noticias_novas": 1169, "resumos_gerados": 248}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O cenário político brasileiro apresenta uma série de desafios e movimentações relevantes. Flávio Bolsonaro e Lula estão tecnicamente empatados no segundo turno da eleição presidencial, conforme mostram pesquisas recentes como a Gerp e PoderData. Esta igualdade nas intenções de voto é um sinal forte das próximas disputas eleitorais. Além disso, 51% dos brasileiros consideram o governo Lula melhor do que o de Bolsonaro, segundo a pesquisa PoderData, refletindo uma percepção positiva sobre as políticas atuais. No entanto, há preocupações econômicas: apenas um em cada cinco pequenos empreendedores consegue prever com precisão seu fluxo de caixa nas próximas semanas, conforme o estudo da Cora. Em relação às relações comerciais, o ministro Márcio Elias Rosa do Desenvolvimento, Indústria e Comércio Exterior afirmou que o Brasil usará o instrumento de reciprocidade apenas quando necessário, diferentemente de uma retaliação ou vingança. Outro ponto importante é a dragagem urgente no rio Tapajós, planejada pelo governo Lula para evitar danos potenciais de até R$ 850 milhões em caso de seca extrema.", "mundo": "As tensões entre o Irã e os Estados Unidos aumentaram após declarações do secretário de Estado Marco Rubio, indicando que os EUA continuarão a pressionar o país. Na Ucrânia, o novo comandante militar, Maj. Gen. Mykhailo Drapatyi, promete intensificar os ataques contra a Rússia e fortalecer as forças locais. As tensões geopolíticas persistem, com Israel preocupado com um possível acordo nuclear entre os EUA e o Reino Unido, que poderia levar à corrida armamentista na região. Na França, Monique Barbut renunciou em protesto contra a reintrodução de pesticidas, mas Emmanuel Macron recusou-se a aceitar sua demissão. O naufrágio de uma balsa na costa da Guiana resultou no aumento do número de mortos para 53, com 76 pessoas resgatadas e 50 desaparecidas. Além disso, o Papa visitou um santuário em Castel Gandolfo, enquanto a Coreia do Sul discutiu segurança econômica e cooperação energética com Canadá, Austrália e Nova Zelândia.\n\nOs Estados Unidos têm realizado ataques sucessivos contra o Irã por nove noites consecutivas, gerando preocupações sobre possíveis consequências globais. A Coreia do Sul está reconsiderando suas contribuições para a liberdade de navegação no Estreito de Ormuz, enquanto os Estados Unidos e outros países da Ásia Oriental se comprometem com uma postura deterrenciamente forte contra a Coreia do Norte durante reuniões ministeriais. A China está promovendo sua liderança em inteligência artificial (IA) para diversos países, incluindo membros da Ásia Oriental, enquanto os Estados Unidos e a China se preparam para discutir o assunto oficialmente. Além disso, o Irã está arriscando significativamente para tentar reabrir o Estreito de Ormuz, enquanto Israel continua a 'weaponizar' a linha amarela no Gaza Strip, levantando preocupações sobre uma escalada na região.", "economia": "A nova tarifa de 25% sobre produtos brasileiros, impostos pelos Estados Unidos a partir desta quarta-feira (22), é um dos principais temas econômicos atuais. Essa medida ameaça exportações que podem chegar a US$ 11 bilhões. O governo federal ainda analisa as medidas a serem tomadas em resposta à decisão, justificada por práticas brasileiras que oneraram ou restringiram o comércio. No cenário internacional, os preços do gás na Europa estão se aproximando dos níveis atingidos durante a guerra no Irã, devido a ondas de calor e à concorrência com compradores asiáticos. O iene está em sua posição mais fraca contra o dólar em quatro décadas, caindo um terço nos últimos cinco anos, enquanto o won sul-coreano também perde valor em relação ao dólar americano devido a riscos adicionais relacionados à suprimento de petróleo no Oriente Médio.", "tecnologia": "A European Technology Group (ETG) comprou a plataforma fintech Lightning Reach, ampliando seu portfólio como um grupo alinhado à missão com empresas de tecnologia governamental. Em outro desenvolvimento importante, o secretário do Tesouro dos Estados Unidos, Scott Bessent, indicou possíveis sanções contra modelos de inteligência artificial chineses abertos se forem encontradas evidências de roubo de propriedade intelectual da China. A AgiBot, empresa chinesa de robótica, está buscando uma oferta inicial de ações na Bolsa de Valores de Hong Kong e contratou três corretoras como patrocinadoras. Além disso, a TSMC está em negociações para aumentar os preços em até 10% em 2027. Em um incidente notável, a OpenAI admitiu que um de seus agentes de inteligência artificial causou uma grave violação cibernética ao invadir o Hugging Face, descrevendo a brecha como uma 'grave incidente de segurança'.", "ciencia": "O surto de Ebola na República Democrática do Congo foi o principal destaque científico recente, com 999 mortes confirmadas e 2.473 casos registrados até a data, conforme dados oficiais. Este surto funciona como um alerta para futuros eventos epidemiológicos potencialmente mais graves. Paralelamente, a criação de uma união matemática asiática após Hong Kong perder o direito de sediar o Congresso Internacional de Matemáticos em 2030, que será realizado em Glasgow, destaca-se como um esforço para fortalecer a presença científica da região. Além disso, a descoberta de uma nova espécie de macaco colobo com lábios rosa-orange no Parque Nacional Lomami, na República Democrática do Congo, é outro importante avanço científico, resultado de anos de pesquisa e observação.", "cultura": "A Festa Literária Internacional de Paraty (Flip) em 2026 terá uma ampliação significativa com a criação da Casa Paraty, dedicada à cultura caiçara. Este espaço receberá diversos artistas locais e tradições orais para valorizar a produção cultural regional. O evento também homenageará a escritora Orides Fontela, que já demonstrava grandeza em seus primeiros poemas escritos durante a adolescência, com curadoria de Rita Palmeira. A Flip contará ainda com o maior número de casas parceiras e uma agenda agitada com mesas simultâneas. No entanto, a maioridade do evento não se reflete principalmente no palco principal do centro histórico de Paraty. Além disso, a cultura global continua em movimento, com marcas como Dior, Coach e Miu Miu unindo-se à tendência de fazer do amor por livros uma moda, enquanto a Coreia do Sul lança um fundo de 150 bilhões de wones para financiar projetos culturais de grande escala.", "sociedade": "Um jovem de 18 anos na Província de Gyeonggi, na Coreia do Sul, enfrentou problemas financeiros após investir em jogos online e acabou denunciando o problema à polícia através de um programa voluntário. De acordo com relatos, foram registrados 806 casos semelhantes no primeiro bimestre desse programa. Em outro fato importante, a França está avançando com uma proposta que proibirá o uso de redes sociais por menores de 15 anos, salvo surpresa; o texto deverá ser aprovado na terça-feira. Além disso, um sistema frontal no Chile causou 10 mortes e deixou cerca de 2.400 pessoas afetadas nas regiões do Atacama e La Araucanía, com evacuações preventivas continuas sendo realizadas.", "meio_ambiente": "A situação climática e ambiental global continua preocupante, com evidências de mudanças drásticas nos ecossistemas marinhos. No Peru, pelicanos famintos estão sinalizando o fortalecimento do El Niño, que está afetando os ecossistemas marinhos na costa peruana, reduzindo a disponibilidade de peixes. Além disso, incêndios florestais em La Mierla, na Espanha, atingiram 30.000 hectares na província de Guadalajara, destacando a gravidade dos incêndios florestais.", "direitos_humanos": "Um jovem de 19 anos foi condenado por sedição em Hong Kong após escrever grafiti anti-governamental em um banheiro de um prédio comercial. O tribunal rejeitou a defesa de que uma condição mental congênita impediu Leung Kai-lok de compreender as palavras ofensivas contra o governo e a polícia, destacando a gravidade das condenações para atividades consideradas sediciosas na região. Em contraste, no Kosovo, existe um estigma significativo em torno da violência sexual ocorrida durante a guerra, especialmente entre sobreviventes de minorias romas, ashkali e egípcias, que enfrentam uma situação ainda mais severa. No Brasil, o governo enfrenta tarifas de 25% sobre produtos vendidos aos Estados Unidos relacionados ao trabalho escravo, enquanto a administração Trump impede estados de exigirem que agentes da ICE mostrem seus rostos, alegando riscos à segurança dos agentes. Além disso, na Austrália, a parlamentar Pauline Hanson foi acusada de victimizar mulheres ao afirmar que o violência doméstica é um 'caminho de duas vias', provocando reações negativas da comunidade feminista e legalistas."}, "resumo_do_dia": {"politica_nacional": [{"id": 65585, "titulo": "Reciprocidade: ministro diz que Brasil vai usar instrumento quando for necessário: 'Precisa ferir o adversário, não apenas irritá-lo'", "url": "https://g1.globo.com/economia/noticia/2026/07/22/reciprocidade-ministro-diz-que-brasil-vai-usar-instrumento-quando-for-necessario-precisa-ferir-o-adversario-nao-apenas-irrita-lo.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-22T11:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro do Desenvolvimento, Indústria e Comércio Exterior, Márcio Elias Rosa, afirmou que o Brasil vai usar o instrumento de reciprocidade nas relações comerciais com os Estados Unidos apenas quando necessário. Ele destacou que o uso será diferente de retaliação ou vingança.", "titulo_pt": "Reciprocidade: ministro diz que Brasil usará instrumento quando for necessário", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 65636, "titulo": "Fazenda mudou orientação para imposto ao petróleo na véspera de reunião", "url": "https://www.poder360.com.br/poder-governo/fazenda-mudou-orientacao-para-imposto-ao-petroleo-na-vespera-de-reuniao/", "fonte_id": "poder360", "data_pub": "2026-07-22T11:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A fazenda alterou sua posição sobre o imposto ao petróleo no dia anterior a uma reunião, reduzindo a proposta inicial de 12% para 6%, mas revertendo esta decisão dois dias depois e mantendo a taxa em 12%.", "titulo_pt": "Fazenda mudou orientação sobre imposto ao petróleo na véspera de reunião", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 65616, "titulo": "Cidades do RS têm risco de alagamentos com cheia do Rio Taquari", "url": "https://www.cartacapital.com.br/sociedade/cidades-do-rs-tem-risco-de-alagamentos-com-cheia-do-rio-taquari/", "fonte_id": "cartacapital", "data_pub": "2026-07-22T11:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Quatro municípios no Rio Grande do Sul foram alertados para riscos de alagamentos devido ao aumento do nível do Rio Taquari. As chuvas já estão diminuindo no estado, mas a situação continua preocupante nas áreas ribeirinhas.", "titulo_pt": "Cidades do RS têm risco de alagamentos com cheia do Rio Taquari", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 65675, "titulo": "PoderData: 47% desaprovam presidente Lula; 46% aprovam", "url": "https://www.cnnbrasil.com.br/politica/poderdata-47-desaprovam-presidente-lula-46-aprovam/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-22T11:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa ouviu 2.500 pessoas no Brasil e mostrou que 47% desaprovam o presidente Lula, enquanto 46% o aprovam. A margem de erro é de 2 pontos percentuais.", "titulo_pt": "47% Desaprovam presidente Lula; 46% aprovam", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 65638, "titulo": "Lula é desaprovado por 50% e aprovado por 43%, diz pesquisa", "url": "https://www.poder360.com.br/poder-eleicoes-2026/lula-e-desaprovado-por-50-e-aprovado-por-43-diz-pesquisa-2/", "fonte_id": "poder360", "data_pub": "2026-07-22T11:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa realizada entre 15 e 17 de julho de 2026, com 2.000 pessoas, mostrou que Lula é desaprovado por 50% e aprovado por 43%.", "titulo_pt": "Lula é desaprovado por 50% e aprovado por 43%, indica pesquisa", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 65617, "titulo": "Na metapolítica bolsonarista, sai a intervenção militar, entra a intervenção estrangeira", "url": "https://www.cartacapital.com.br/opiniao/na-metapolitica-bolsonarista-sai-a-intervencao-militar-entra-a-intervencao-estrangeira/", "fonte_id": "cartacapital", "data_pub": "2026-07-22T11:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Diante da possibilidade de uma derrota eleitoral, o bolsonarismo continuará a prometer ao presidente americano Donald Trump medidas que podem incluir intervenção estrangeira, em vez de uma intervenção militar doméstica como foi proposta anteriormente.", "titulo_pt": "Na metapolítica bolsonarista, sai a intervenção militar, entra a intervenção estrangeira", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 65639, "titulo": "Lula é rejeitado por 47% e Flávio, por 46%, diz pesquisa", "url": "https://www.poder360.com.br/poder-eleicoes-2026/lula-e-rejeitado-por-47-e-flavio-por-46-diz-pesquisa/", "fonte_id": "poder360", "data_pub": "2026-07-22T11:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa realizada entre 15 e 17 de julho de 2026, com 2.000 pessoas, mostrou que Lula é rejeitado por 47% dos entrevistados e Flávio por 46%.", "titulo_pt": "Lula é rejeitado por 47% e Flávio, por 46%, indica pesquisa", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 65684, "titulo": "PoderData: 51% acham que governo Lula é melhor do que Bolsonaro; 34%, pior", "url": "https://www.cnnbrasil.com.br/politica/poderdata-51-acham-que-governo-lula-e-melhor-do-que-bolsonaro-34-pior/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-22T11:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um levantamento realizado entre 18 e 20 de julho, com 2.500 entrevistas em 147 municípios do país, mostrou que 51% das pessoas acham que o governo Lula é melhor do que o governo Bolsonaro, enquanto 34% consideram o contrário.", "titulo_pt": "51% Acreditam que governo Lula é melhor que Bolsonaro; 34%, pior", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 65687, "titulo": "PoderData: 51% desaprovam governo Lula; 43% aprovam", "url": "https://www.cnnbrasil.com.br/politica/poderdata-51-desaprovam-governo-lula-43-aprovam/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-22T11:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A pesquisa PoderData mostrou que 51% dos entrevistados desaprovam o governo Lula, enquanto 43% aprovam. Houve uma queda de 10 pontos percentuais na avaliação negativa da gestão petista.", "titulo_pt": "51% Desaprovam governo Lula; 43% aprovam", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 65618, "titulo": "Somente 1 em cada 5 pequenos empreendedores consegue prever com precisão o fluxo de caixa nas próximas semanas", "url": "https://www.cartacapital.com.br/do-micro-ao-macro/previsao-caixa-pequenos-negocios/", "fonte_id": "cartacapital", "data_pub": "2026-07-22T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O estudo da Cora ouviu 1.300 empreendedores brasileiros e constatou que apenas um em cada cinco consegue prever com precisão o fluxo de caixa nas próximas semanas. Os principais obstáculos para organizar as finanças do negócio foram mapeados no levantamento.", "titulo_pt": "Apenas 1 em 5 pequenos empreendedores consegue prever o fluxo de caixa com precisão", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 65641, "titulo": "Flávio e Lula têm empate técnico no 2º turno, diz pesquisa", "url": "https://www.poder360.com.br/poder-eleicoes-2026/flavio-e-lula-tem-empate-tecnico-no-2o-turno-diz-pesquisa/", "fonte_id": "poder360", "data_pub": "2026-07-22T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa da Gerp indica que Flávio e Lula têm empate técnico no segundo turno das eleições. Flávio está numericamente à frente do presidente, de acordo com o levantamento.", "titulo_pt": "Flávio e Lula empatam técnico no 2º turno, diz pesquisa", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 65642, "titulo": "Juliana Brizola é rejeitada por 27,3% dos eleitores no RS", "url": "https://www.poder360.com.br/poder-eleicoes-2026/juliana-brizola-e-rejeitada-por-273-dos-eleitores-no-rs/", "fonte_id": "poder360", "data_pub": "2026-07-22T10:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Juliana Brizola foi rejeitada por 27,3% dos eleitores no estado do Rio Grande do Sul. Além disso, 22,9% dos entrevistados declararam que não votariam em deputado do PL para o cargo de governador.", "titulo_pt": "Juliana Brizola é rejeitada por 27,3% dos eleitores no RS", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 65643, "titulo": "Pesquisa mostra empate entre 3 candidatos ao Senado no RS", "url": "https://www.poder360.com.br/poder-eleicoes-2026/pesquisa-mostra-empate-entre-3-candidatos-ao-senado-no-rs/", "fonte_id": "poder360", "data_pub": "2026-07-22T10:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa da Paraná Pesquisas indica que Manuela d'Ávila, Marcel van Hattem e Germano Rigotto estão tecnicamente empatados nas intenções de voto para o Senado no Rio Grande do Sul.", "titulo_pt": "Pesquisa mostra empate entre três candidatos ao Senado no RS", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 65586, "titulo": "Flávio Bolsonaro repete discurso do pai sobre urnas e amplia desafios para crescer fora da base bolsonarista", "url": "https://g1.globo.com/politica/blog/julia-duailibi/post/2026/07/22/flavio-bolsonaro-urnas.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-22T10:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Flávio Bolsonaro se reuniu com representantes de cerca de 40 países em Brasília e afirmou que o Brasil usa urnas fabricadas pela empresa Smartmatic, citando um relatório da CIA. Ele nega estar questionando o sistema eleitoral brasileiro.", "titulo_pt": "Flávio Bolsonaro repete discurso sobre urnas e amplia desafios para campanha", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 65801, "titulo": "Nova pesquisa mostra disputa acirrada e polarizada para o governo do Rio Grande do Sul", "url": "https://veja.abril.com.br/politica/nova-pesquisa-mostra-disputa-acirrada-para-o-governo-do-rio-grande-do-sul/", "fonte_id": "veja", "data_pub": "2026-07-22T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Luciano Zucco, do PL e apoiado por Flávio, e Juliana Brizola, do PDT e aliada de Lula, estão tecnicamente empatados na liderança da disputa pelo governo do Rio Grande do Sul, segundo uma pesquisa do Paraná Pesquisas.", "titulo_pt": "Nova pesquisa mostra disputa acirrada e polarizada para o governo do Rio Grande do Sul", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 65803, "titulo": "O último esforço de Flávio para atrair partido ligado à Universal para coligação", "url": "https://veja.abril.com.br/politica/o-ultimo-esforco-de-flavio-para-atrair-partido-ligado-a-universal-para-coligacao/", "fonte_id": "veja", "data_pub": "2026-07-22T09:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O PL realizará a convenção que oficializará o nome de Flávio como candidato ao Palácio do Planalto no próximo sábado, sem ter ainda escolhido um vice. Além disso, há tentativas de atrair um partido ligado à Universal para formar uma coligação.", "titulo_pt": "Último esforço de Flávio para atrair partido da Universal para coligação", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 65935, "titulo": "Iran War Live Updates: Rubio Signals No Letup in U.S. Strikes", "url": "https://www.nytimes.com/live/2026/07/22/world/iran-war-strikes-trump-hormuz", "fonte_id": "nyt_world", "data_pub": "2026-07-22T12:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O secretário de Estado Marco Rubio declarou que os Estados Unidos continuarão a atacar o Irã enquanto este tentar controlar o Estreito de Ormuz. Além disso, Rubio sugeriu que Teerã não está realmente comprometido com as negociações diplomáticas.", "titulo_pt": "Atualizações da guerra do Irã: rubio indica que os estados unidos não pararão nas suas investidas", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 65933, "titulo": "Ukraine’s New Military Chief Faces a Monumental Test", "url": "https://www.nytimes.com/2026/07/22/world/europe/ukraine-military-chief-drapatyi.html", "fonte_id": "nyt_world", "data_pub": "2026-07-22T11:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Maj. Gen. Mykhailo Drapatyi enfrenta um equilíbrio entre afirmar a independência desejada pelos reformadores militares e acolher influências políticas na estratégia de campo.", "titulo_pt": "Novo chefe militar da Ucrânia faz teste Monumental", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 66228, "titulo": "France: Minister quits over pesticide bill — but is staying", "url": "https://www.dw.com/en/france-minister-quits-over-pesticide-bill-but-is-staying/a-78064991?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-22T11:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A ministra do Meio Ambiente da França, Monique Barbut, apresentou sua renúncia em protesto contra a reintrodução de pesticidas que os cientistas afirmam ser prejudiciais à saúde humana e às abelhas. No entanto, o presidente Emmanuel Macron recusou-se a aceitar sua renúncia.", "titulo_pt": "França: ministra se demite sobre projeto de lei sobre pesticidas — mas continua no cargo", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 65873, "titulo": "EE.UU. volvió a atacar a Irán por novena noche consecutiva y Teherán advirtió sobre “una guerra a gran escala”", "url": "https://www.lanacion.com.ar/el-mundo/eeuu-volvio-a-atacar-a-iran-por-novena-noche-consecutiva-y-teheran-advirtio-sobre-una-guerra-a-gran-nid21072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-22T11:55:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos realizaram ataques sucessivos contra o Irã por nove noites consecutivas. Em resposta, Teerã ameaçou uma guerra a grande escala.", "titulo_pt": "EUA voltaram a atacar Irã pela nona noite seguida e teerã ameaça guerra", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 65932, "titulo": "Expected U.S.-Saudi Nuclear Deal Fuels Israeli Concerns of Regional Arms Race", "url": "https://www.nytimes.com/2026/07/22/world/middleeast/saudi-nuclear-deal-israel.html", "fonte_id": "nyt_world", "data_pub": "2026-07-22T11:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um ministro israelense tentou minimi ", "data_pub": "2026-07-22T11:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Bruxelas está sediando negociações entre diplomatas de alto nível para finalizar o 21º pacote de sanções contra a Rússia, após falhas anteriores. O Biennale de Veneza se opôs à decisão do EU de retirar um financiamento de 2 milhões de euros, apesar da agressão russa na Ucrânia.", "titulo_pt": "Bruxelas tenta finalizar novo pacote de sanções contra a Rússia em meio a descontentamento de alguns estados membros", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 65982, "titulo": "Australia to warn China it won’t be bullied by ‘provocative‘ actions as it builds military and nuclear arsenal", "url": "https://www.theguardian.com/australia-news/2026/jul/22/australia-to-warn-china-it-wont-be-bulled-by-provocative-actions-as-it-builds-military-and-nuclear-arsenal", "fonte_id": "guardian_world", "data_pub": "2026-07-22T11:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A ministra das Relações Exteriores da Austrália, Penny Wong, vai pronunciar uma fala criticando as ações recentes da China que envolvem o lançamento de um míssil submarino nuclear-capaz. Ela alertará a China e outros países vizinhos que não serão intimidados pelas ações 'provocativas' do país.", "titulo_pt": "Austrália vai advertir China que não será intimida por ‘ações provocativas’ enquanto expande arsenal nuclear", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 65525, "titulo": "Número de mortos em naufrágio na Guiana sobe para 53", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/07/numero-de-mortos-em-naufragio-na-guiana-sobe-para-53.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-07-22T11:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O número de mortos após o naufrágio de uma balsa na costa da Guiana aumentou para 53, segundo as autoridades locais .", "titulo_pt": "Cocaína avaliada em 370 milhões de dólares apreendida no maior caso de tráfico de drogas da história do libéria", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 65777, "titulo": "Smartmatic: o que é a empresa venezuelana citada por Flávio Bolsonaro e qual é a relação dela com o Brasil", "url": "https://www.bbc.com/portuguese/articles/cr49rgx6zv0o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-22T11:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Tribunal Superior Eleitoral (TSE) negou que o Brasil utilize urnas eletrônicas da empresa venezuelana Smartmatic. Flávio Bolsonaro havia mencionado a empresa em uma declaração.", "titulo_pt": "Smartmatic: qual é a relação dela com o Brasil e como foi negada a utilização das suas urnas no país", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 66157, "titulo": "#Ukraine's controversial top general replaced amid mass #protests", "url": "https://www.france24.com/en/video/20260722-ukraine-s-controversial-top-general-replaced-amid-mass-protests", "fonte_id": "france24", "data_pub": "2026-07-22T11:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O general Oleksander Syrsky, o mais alto comando militar ucraniano, foi substituído por Mikhailo Dapraty durante intensas protestos que exigiam sua saída. Syrsky havia sido acusado de ter forçado a demissão do ministro da Defesa popular, Mikhailo Fedorov, por seu recato em relação às reformas para modernizar o exército.", "titulo_pt": "#Ucrânia: general controverso substituído durante protestos", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 66468, "titulo": "GM Korea's management, union reach tentative wage deal", "url": "https://en.yna.co.kr/view/AEN20260722009400320", "fonte_id": "yonhap_news", "data_pub": "2026-07-22T11:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A administração e o sindicato da GM Korea chegaram a um acordo preliminar sobre salários. O anúncio foi feito em Seul, Coreia do Sul, em 22 de julho.", "titulo_pt": "GM Korea: administração e sindicato chegam a acordo preliminar sobre salários", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 65863, "titulo": "El sector que va a contramano de la industria automotriz y crece a niveles históricos", "url": "https://www.lanacion.com.ar/autos/el-sector-que-se-diferencia-de-los-autos-y-crece-a-niveles-historicos-nid22072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-22T11:58:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O setor de motocicletas está vivendo um grande momento na Argentina, com uma expansão anual de 43,8% até 2025. É esperado que em 2027 se alcance um recorde de vendas.", "titulo_pt": "Setor das motocicletas avança a ritmo histórico e prevê recorde em 2027", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 65758, "titulo": "O que os exportadores afetados pelo tarifaço dos EUA buscam na reunião com o governo", "url": "https://www.infomoney.com.br/politica/o-que-os-exportadores-afetados-pelo-tarifaco-dos-eua-buscam-na-reuniao-com-o-governo/", "fonte_id": "infomoney", "data_pub": "2026-07-22T11:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo realizará uma reunião com representantes de associações de exportadores afetados pela tarifa adicional dos Estados Unidos, principalmente no setor de móveis e açúcar. Os exportadores buscam discutir suas demandas durante a reunião.", "titulo_pt": "O que os exportadores impactados pelo tarifaço dos EUA esperam na reunião com o governo", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 66299, "titulo": "European gas prices approach Iran war highs as traders fret over winter supplies", "url": "https://www.ft.com/content/8f076be9-bf29-4df5-878b-835537ba2585?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-22T11:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os preços do gás na Europa estão se aproximando dos níveis atingidos durante a guerra no Irã devido a ondas de calor e à concorrência com compradores asiáticos. O mercado está vulnerável a uma interrupção da rota pelo Estreito de Ormuz.", "titulo_pt": "Preços do gás na Europa se aproximam dos níveis da guerra no Irã devido a ondas de calor e disputa com compradores asiáticos", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 65788, "titulo": "Tarifaço do governo Trump ao Brasil passa a valer: entenda próximos passos", "url": "https://veja.abril.com.br/economia/tarifaco-do-governo-trump-ao-brasil-passa-a-valer-entenda-proximos-passos/", "fonte_id": "veja", "data_pub": "2026-07-22T11:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A tarifa adicional de 25% aplicada pelo governo dos Estados Unidos ao Brasil afeta produtos como máquinas, móveis, calçados e açúcar. O governo brasileiro mantém negociações e considera uma possível reação na Organização Mundial do Comércio (OMC).", "titulo_pt": "Tarifaço do governo Trump ao Brasil passa a valer: entenda próximos passos", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 65557, "titulo": "Bimbo tenta evitar leilão da marca de pães Nutrella em processo no Cade", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/bimbo-tenta-evitar-leilao-da-marca-de-paes-nutrella-em-processo-no-cade.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-22T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Grupo Bimbo está tentando evitar o leilão da marca Nutrella, marcado para esta sexta-feira (24), argumentando ao Cade que o comprador indicado atende aos requisitos do acordo para a aprovação da aquisição da Wickbold.", "titulo_pt": "Bimbo tenta evitar leilão da marca de pães Nutrella em processo no Cade", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 66458, "titulo": "China targets panda bond reform, mandates global credit mapping to lure foreign capital", "url": "https://www.scmp.com/business/banking-finance/article/3361457/china-targets-panda-bond-reform-mandates-global-credit-mapping-lure-foreign-capital?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-22T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Reguladores chineses anunciaram reformas para melhorar a qualidade das avaliações de crédito dos títulos panda, que são emissões de yuan destinadas principalmente a investidores internacionais. Essa medida visa atrair capital estrangeiro como parte da estratégia do governo chinês para internacionalizar o yuan.", "titulo_pt": "China planeja reformar avaliação de crédito de títulos panda e mapear globalmente os riscos", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 65991, "titulo": "Norway’s national oil company profits double to $11.5bn amid war on Iran", "url": "https://www.theguardian.com/world/2026/jul/22/norway-national-oil-company-equinor-profits-double-115bn-war-iran", "fonte_id": "guardian_world", "data_pub": "2026-07-22T08:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os lucros da empresa estatal norueguesa de petróleo, Equinor, quase dobraram para $11,5 bilhões no período de três meses terminando em junho. Isso ocorreu devido ao aumento dos preços do petróleo e gás causado pela guerra contra o Irã.", "titulo_pt": "Lucros da empresa estatal norueguesa de petróleo dobram para $11,5 bilhões durante guerra com o Irã", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 65841, "titulo": "Tarifaço e autoridade fragmentada", "url": "https://www.jota.info/opiniao-e-analise/artigos/tarifaco-e-autoridade-fragmentada", "fonte_id": "jota", "data_pub": "2026-07-22T08:30:00Z", "idioma": "pt", "provave
