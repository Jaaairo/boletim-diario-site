<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=author@400&display=swap" rel="stylesheet">
<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 28/06/2026 20:50 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">
    <div class="modal-erro" id="senha-erro" style="display:none">Senha incorreta.</div>
    <div class="modal-btns">
      <button class="btn-sec2" onclick="fecharModal('modal-senha')">Cancelar</button>
      <button class="btn-pri" onclick="verificarSenha()">Entrar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>
      <option value="classificacao_errada">Classificação errada</option>
      <option value="resumo_impreciso">Resumo impreciso</option>
      <option value="outro">Outro</option>
    </select>
    <label for="flag-nota">Nota (opcional)</label>
    <textarea id="flag-nota" placeholder="Descreva o problema..."></textarea>
    <div class="modal-btns">
      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "28/06/2026 20:50", "stats": {"noticias_novas": 376, "resumos_gerados": 267}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O Brasil enfrenta diversos desafios políticos e sociais. André Ceciliano, ex-presidente da Assembleia Legislativa do Rio de Janeiro, que não foi preso neste século, busca retornar à Alerj como candidato a deputado estadual em 2027. Em outra frente política, o senador Flávio Bolsonaro (PL-RJ) se ausentou em 43% das votações nominais no Senado este ano, apesar de afirmar que exerce seu mandato de forma ativa e comprometida. A Polícia Federal realizou uma operação nas instalações das Lojas Americanas, bloqueando até R$ 54 bilhões de bens da empresa, indicando um possível reaberto do caso de fraude na companhia. Além disso, a Constituição promete direitos e garantias que não são sempre entregues na prática, com cortes judiciais se tornando elementos centrais no exercício do poder.", "mundo": "Na Venezuela, as buscas por sobreviventes após os terremotos continuam sendo desafiadoras. O número de mortos aumentou para 1.450, com La Guaira sendo a área mais afetada. Neste fim de semana, equipes internacionais resgataram 33 pessoas e milhares ainda estão desaparecidos. As famílias venezuelanas lideram as buscas por corpos nas proximidades de Caracas, enquanto voluntários locais usam martelos e picaretas para quebrar concreto em busca de sobreviventes. O Irã lançou novas operações com drones e mísseis contra Bahrain e Kuwait após ataques americanos recentes, ameaçando interromper as negociações e fechar o Estreito de Ormuz se os Estados Unidos continuarem seus ataques. Além disso, empresas de combustíveis fósseis são acusadas de vender seus produtos a crianças, enquanto o primeiro-ministro de Vanuatu, Jotham Napat, visita Canberra para buscar assinatura do Acordo Nakamal após negociações prolongadas. As eleições locais em Nova Caledônia no domingo são cruciais para determinar o futuro político e a relação do território com a França, influenciado por questões de descolonização e demografia.\n\nO Irã atacou Bahrain e Kuwait após operações militares realizadas pelos Estados Unidos, aumentando a tensão na região do Estreito de Ormuz. As ações iranianas foram vistas como uma resposta direta às recentes atividades americanas no local. Além disso, a Coreia do Norte condenou as manobras conjuntas entre Japão e Estados Unidos, chamando-as de 'repetição de guerra'. Em outro desenvolvimento importante, a Ucrânia intensificou seus ataques com drones contra a Rússia, causando incêndio em uma refinaria russa no sul do país. O presidente russo, Vladimir Putin, admitiu que o país está passando por um período difícil devido aos ataques ucranianos. As tensões na região persistem, refletindo a instabilidade geopolítica e as acusações mútuas entre potências globais.", "economia": "A economia global e brasileira mostrou sinais de recuperação e crescimento. Em 2022, o lucro líquido agregado aumentou, e a Yuanta prevê um crescimento do PIB da Taiwan de 11,05% no próximo ano. O Brasil recebeu investimentos estrangeiros no valor de R$ 25 bilhões nos primeiros cinco meses do ano, batendo recorde. No entanto, o tipo oficial do dólar subiu quase 5% em junho, prejudicando os investidores que apostavam na moeda local. A Micron atingiu um valor de mercado de US$ 1 trilhão devido à escassez de chips para inteligência artificial. Além disso, o setor automotivo está vendendo menos veículos nos Estados Unidos, indicando uma mudança significativa no mercado americano. No Brasil, a Desenvolve SP destinou R$ 400 milhões a empresas lideradas por mulheres entre janeiro de 2023 e maio de 2026, um aumento de 30% em relação ao total financiado para empreendedoras desde sua criação.", "tecnologia": "Um supercomputador chinês chamado LineShine foi classificado como o mais rápido do mundo, superando os modelos norte-americanos. Este feito ocorre em um momento de intensa rivalidade tecnológica entre EUA e China, com Washington buscando limitar o acesso de Pequim a tecnologias avançadas. Em outro desenvolvimento, a empresa chinesa Zhipu AI lançou seu modelo GLM-5.2, que se iguala ao Mythos em certos cenários de detecção de bugs e segurança cibernética. Além disso, a Ford recontratou engenheiros mais experientes após os sistemas de inteligência artificial falharem na produção de um produto de alta qualidade, reconhecendo que a simples introdução da IA não garante resultados imediatos de alta qualidade. Estes eventos refletem o avanço rápido e as complexidades das tecnologias emergentes em diversos campos.", "ciencia": "A pesquisa sobre o exoplaneta GJ 504b, descoberto em 2013, revelou a presença de nuvens de sal nas observações do Telescópio James Webb. Este achado é significativo para entender o clima desses corpos celestes distantes e pode oferecer insights sobre os ambientes atmosféricos dos exoplanetas. Um estudo recente publicado na revista Nature Communications apresenta uma nova metodologia que permite projetar e controlar precisamente a 'grau de desordem' em arranjos nanopadrão usando filmes finos de copolímero bloco infiltrado metálico. Este avanço tecnológico tem potencial para aplicação em dispositivos onduladores de ondas, trazendo inovações significativas na área da física e química.", "cultura": "A cinebiografia 'Michael', produzida pela Lionsgate, se tornou a maior bilheteria de todos os tempos, superando 'Oppenheimer', com um rendimento global excepcional. Na televisão e no streaming, a comédia 'Tomando Rumo' ganha destaque, retratando uma viagem inusitada de adolescentes em busca de amizade e aventura. O K-pop retornou ao Rock in Rio Lisboa, que foi eletrizante para a plateia, conforme declarou Roberta Medina, vice-presidente do evento. No cenário cultural brasileiro, Silvia Abravanel se despede do SBT para disputar uma vaga na Câmara dos Deputados, enquanto o Quilombo Urbano Mineiro Pau celebra tradições centenárias em homenagem aos padroeiros São Pedro e São Paulo. Em Santiago, Chile, a marcha do Orgulho 2026 reuniu mais de 100 mil pessoas no centro da cidade, com os organizadores pedindo reformas na legislação LGBT+. Ainda em discussão, o autor Julien Blanc-Gras denuncia que seu nome foi usado sem autorização para vender um livro gerado por inteligência artificial. No teatro, a Broadway enfrenta dificuldades para estrear musicais originais após a pandemia, com quase todos os novos shows falhando nas temporadas de 2024 e 2025.", "sociedade": "A situação humanitária na Venezuela continua sendo um problema grave. A UNICEF estimou que 680 mil crianças necessitam de assistência. Paralelamente, a França registrou 1.000 mortes adicionais durante uma onda de calor recorde, com 85% dessas mortes ocorrendo em pessoas acima dos 65 anos. O governo brasileiro resgatou 13 brasileiros da Venezuela após terremotos no país. Durante um encontro com o Colégio de Cardeais, o Papa Francisco expressou solidariedade às vítimas do terremoto na Venezuela. Diante dessas crises, a sociedade enfrenta diversos desafios, como a pobreza entre os idosos em Hong Kong, a reação à tentativa de homicídio contra um tenente da Rota e a preocupação com a solidão e saúde mental dos jovens na Geração Z no trabalho. Além disso, a situação da comunidade haitiana no Chile ressurge com o caso de 64 crianças supostamente desaparecidas, reacendendo traumas antigos de estigma e invisibilidade.", "meio_ambiente": "Uma onda de calor extremo atinge a Europa, causando ao menos 1.300 mortes e afetando mais de 191 milhões de pessoas. Registros de temperaturas recordes foram registrados na Alemanha, Tchecoslováquia, Polônia e Hungria. Na França, mais de mil pessoas morreram por causa do calor, com a maioria sendo idosos. As autoridades estão monitorando o Rio Wanli em Taiwan devido às fortes chuvas. Em outros países, um terremoto na Venezuela deixou 1.450 mortos e incêndios florestais nos Estados Unidos mataram três bombeiros na fronteira entre Colorado e Utah. No entanto, a França experimentou uma onda de frio após o calor extremo, com ciclones e frentes frias causando temporais no sul do país. Além disso, trabalhadores em gig nas cidades da Índia estão expostos ao ar poluído, comprometendo sua saúde.", "direitos_humanos": "No Dia do Orgulho LGBTQIA+, celebrado no último domingo (28/6), várias marcas de moda, como Zara, H&M, Nike e Adidas, voltaram a apoiar o movimento após períodos mais conservadores. Em contraste, em Istambul, Turquia, autoridades proibiram um evento Gay Pride e detiveram pelo menos 50 pessoas, incluindo um jornalista, que foram liberados posteriormente. No entanto, o pai de um palestiniano foi informado apenas 18 meses depois que seu filho, Majdi Nour Abu Ara, havia sido morto durante um bombardeio israelense no norte de Tubas. Este incidente ilustra a persistência de violações aos direitos humanos em diversos contextos globais."}, "resumo_do_dia": {"politica_nacional": [{"id": 24277, "titulo": "Professor da Universidade do ABC é cotado para ser suplente de Simone Tebet", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/professor-da-universidade-do-abc-e-cotado-ser-suplente-de-simone-tebet.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T20:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O professor de Economia da Universidade do ABC, Ramatis Jacino, é um dos nomes cotados para ser suplente de Simone Tebet (PSB) na corrida ao Senado. Ele conta com apoio de parte da militância do PT em São Paulo.", "titulo_pt": "Professor da Unabc é cotado como suplente de Simone Tebet", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 24278, "titulo": "Único ex-presidente da Assembleia do RJ que não foi preso neste século costura retorno em 2027", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/unico-ex-presidente-da-assembleia-do-rj-que-nao-foi-preso-neste-seculo-costura-retorno-em-2027.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T20:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "André Ceciliano, ex-presidente da Assembleia Legislativa do Rio de Janeiro que não foi preso neste século, está tentando retornar à Alerj como candidato a deputado estadual em 2027.", "titulo_pt": "Único ex-presidente da Alerj que não foi preso neste século busca retorno em 2027", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 24279, "titulo": "Segurança agride deputada do PT no Rio Grande do Norte; Janja afasta agente", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/seguranca-agride-deputada-do-pt-no-rio-grande-do-norte-janja-afasta-agente.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T19:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um segurança agrediu uma deputada estadual do PT no Rio Grande do Norte durante um evento sobre combate à violência contra as mulheres. A primeira-dama Janja da Silva estava presente no encontro.", "titulo_pt": "Segurança agride deputada do PT no RN; Janja afasta agente", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 24280, "titulo": "Datafolha: 38% dizem não saber ou lembrar voto para governador em 2022", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/datafolha-38-dizem-nao-saber-ou-lembrar-voto-para-governador-em-2022.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T19:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa Datafolha revelou que 38% dos brasileiros afirmaram não se lembrar de quem votaram para governador em 2022.", "titulo_pt": "38% dizem não saber ou lembrar voto para governador em 2022", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 23735, "titulo": "Por que perdoar militares pelo 8/1 seria um ‘tapa na cara’ da democracia, segundo analistas", "url": "https://veja.abril.com.br/politica/por-que-perdoar-militares-pelo-8-1-seria-um-tapa-na-cara-da-democracia-segundo-analistas/", "fonte_id": "veja", "data_pub": "2026-06-28T18:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Flávio Bolsonaro, Romeu Zema e Ronaldo Caiado anunciaram anistia para militares condenados pelo golpe no STF. Analistas argumentam que isso seria um 'tapa na cara' da democracia.", "titulo_pt": "Por que perdoar militares pelo 8/1 seria um ‘tapa na cara’ da democracia, segundo analistas", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 23669, "titulo": "O STF em modo sobrevivência", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/marcus-melo/2026/06/o-stf-em-modo-sobrevivencia.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T18:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal opera atualmente em um modo de sobrevivência, com seus membros priorizando a própria preservação acima da proteção à Constituição. Este padrão não é exclusivo do STF e se estende a outras instituições brasileiras.", "titulo_pt": "O STF em modo de sobrevivência", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 23741, "titulo": "Nova pesquisa AtlasIntel testa Flávio x Haddad após crises no clã Bolsonaro e no PT", "url": "https://veja.abril.com.br/politica/nova-pesquisa-atlasintel-testa-flavio-x-haddad-apos-crises-no-cla-bolsonaro-e-no-pt/", "fonte_id": "veja", "data_pub": "2026-06-28T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A pesquisa AtlasIntel incluiu o ex-ministro da Fazenda na simulação presidencial e avaliou como se sairiam Flávio Bolsonaro e Michelle Bolsonaro. O estudo ocorreu após crises recentes no clã Bolsonaro e no PT.", "titulo_pt": "Nova pesquisa testa Flávio x Haddad após crises nos dois principais partidos", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 23670, "titulo": "Pré-campanha de Flávio é procurada por mulheres para contribuir com programa de governo", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/pre-campanha-de-flavio-e-procurada-por-mulheres-para-contribuir-com-programa-de-governo.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T17:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ex-presidente da Caixa Econômica Federal Daniella Marques, que coordena a pré-campanha de Flávio Bolsonaro, tem recebido ofertas de mulheres para contribuir com o programa de governo do senador.", "titulo_pt": "Pré-campanha de Flávio busca mulheres para ajudar no programa de governo", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 23747, "titulo": "Pesquisas eleitorais: como está a disputa Lula x Flávio às vésperas da nova AtlasIntel", "url": "https://veja.abril.com.br/politica/pesquisas-eleitorais-como-esta-a-disputa-lula-x-flavio-as-vesperas-da-nova-atlasintel/", "fonte_id": "veja", "data_pub": "2026-06-28T17:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A AtlasIntel será a primeira instituição a realizar pesquisas eleitorais que considerarão os possíveis impactos de dois eventos relevantes recentemente ocorridos no cenário político. O Instituto testará simultaneamente esses efeitos nos possíveis resultados entre Lula e Flávio.", "titulo_pt": "Pesquisas eleitorais: como está a disputa Lula x Flávio às vésperas da nova AtlasIntel", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 23678, "titulo": "Fila do INSS cai a menor patamar desde 2024, e nova presidente vê redução gradual nos próximos meses", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/fila-do-inss-cai-a-menor-patamar-desde-2024-e-nova-presidente-ve-reducao-gradual-nos-proximos-meses.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-28T15:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A fila do INSS reduziu-se pelo quarto mês consecutivo e atingiu 1,9 milhão de pedidos nesta quinta-feira (25), o menor nível desde outubro de 2024. A nova presidente do INSS, Ana Cristina Silveira, espera uma redução gradual nos próximos meses.", "titulo_pt": "Fila do INSS atinge menor patamar desde outubro de 2024, e nova presidente vê redução gradual", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 23700, "titulo": "Mendonça deve enviar à PGR nesta semana pedido para investigar financiamento de Vorcaro ao filme 'Dark Horse'", "url": "https://g1.globo.com/politica/noticia/2026/06/28/mendonca-deve-enviar-a-pgr-nesta-semana-investigacao-sobre-financiamento-de-vorcaro-ao-filme-dark-horse.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-28T13:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro André Mendonça, do Supremo Tribunal Federal (STF), deve enviar nesta semana para a Procuradoria-Geral da República um pedido de investigação sobre repasses feitos pelo ex-banqueiro Daniel Vorcaro ao filme 'Dark Horse', que retrata o ex-presidente Jair Bolsonaro. A PGR avaliará se há necessidade de abertura de inquérito ou se são necessárias diligências preliminares, ou se o caso deve ser arquivado.", "titulo_pt": "Mendonça envia pedido para investigar repasses de Vorcaro ao filme 'Dark Horse'", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 23671, "titulo": "Flávio diz que exerce mandato de forma ativa e comprometida, apesar de não participar de 43% das votações", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/blogs/brasilia-hoje/2026/06/flavio-diz-que-exerce-mandato-de-forma-ativa-e-comprometida-apesar-de-nao-participar-de-43-das-votacoes.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T13:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio Bolsonaro afirmou que exerce seu mandato de forma ativa, apesar da ausência em 43% das votações no Senado. Segundo o levantamento da Folha, ele só faltou a três sessões este ano.", "titulo_pt": "Flávio Bolsonaro afirma exercer mandato ativamente, mesmo com alta taxa de abstenção em votações", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 23672, "titulo": "Ministério Público de SP e União brigam por quase R$ 170 milhões de Maluf", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/ministerio-publico-de-sp-e-uniao-brigam-por-quase-r-170-milhoes-de-maluf.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério Público de São Paulo solicitou ao STF a liberação de ações e recursos financeiros relacionados a Paulo Maluf, totalizando quase R$ 168 milhões, para compensar prejuízos à prefeitura da capital.", "titulo_pt": "MP SP e União discutem cerca de R$ 168 milhões de Maluf", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 23227, "titulo": "Republicanos e PL apoiam candidatos rivais em Roraima e dividem a direita", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/republicanos-e-pl-apoiam-candidatos-rivais-em-roraima-e-dividem-a-direita.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os Republicanos e o PL apoiam candidatos diferentes na eleição de Roraima, causando divisões entre as forças da direita. A campanha de Flávio Bolsonaro (PL) busca ainda o apoio do Republicanos para a disputa presidencial.", "titulo_pt": "Republicanos e PL apóiam candidatos rivais em Roraima e dividem a direita", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 23326, "titulo": "Constituição promete, política não entrega e cortes avançam ao centro do poder", "url": "https://www.jota.info/opiniao-e-analise/artigos/constituicao-promete-politica-nao-entrega-e-cortes-avancam-ao-centro-do-poder", "fonte_id": "jota", "data_pub": "2026-06-28T08:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Constituição promete direitos e garantias, mas a política não consegue entregar esses benefícios na prática. Os cortes judiciais têm se tornado um elemento central no exercício do poder em ambos os países.", "titulo_pt": "Constituição promete, política não entrega e cortes avançam ao centro do poder", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 23269, "titulo": "Moraes avalia domiciliar de Bolsonaro após manifestação de PGR e defesa", "url": "https://www.cnnbrasil.com.br/politica/arma-apreendida-vira-peca-chave-sobre-domiciliar-de-bolsonaro/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T07:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O juiz federal Sérgio Morais está avaliando a possibilidade de manter o presidente Jair Bolsonaro em prisão domiciliar humanitária. A Procuradoria-Geral da República defendeu aguardar o resultado da investigação policial, enquanto a defesa do presidente negou a existência de uma falta grave e pediu a manutenção da prisão domiciliar.", "titulo_pt": "Moraes avaliará domiciliar de Bolsonaro após posicionamento de PGR e defesa", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 24275, "titulo": "Famílias lideram buscas de corpos na Venezuela e se revoltam com autoridades", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/familias-lideram-buscas-de-corpos-na-venezuela-e-se-revoltam-com-autoridades.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-28T22:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Famílias venezuelanas estão realizando buscas por corpos nas proximidades de Caracas após um acidente. Até recentemente, a área era conhecida como uma praia popular para os moradores da capital.", "titulo_pt": "Famílias lideram buscas por corpos e se revoltam com autoridades na Venezuela", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 24317, "titulo": "Análise: Nenhum acordo feito em junho interrompeu os combates no Líbano", "url": "https://www.cnnbrasil.com.br/internacional/analise-nenhum-acordo-feito-em-junho-interrompeu-os-combates-no-libano/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T22:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Quatro tratados foram assinados no mês de junho, mas os conflitos entre Israel e o Hezbollah continuam na região.", "titulo_pt": "Análise: Nenhum acordo de junho interrompeu os combates no Líbano", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 24634, "titulo": "N. Korea slams Japan-U.S. military drills as 'war rehearsal'", "url": "https://en.yna.co.kr/view/AEN20260629000800315", "fonte_id": "yonhap_news", "data_pub": "2026-06-28T22:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Seoul, 29 de junho (Yonhap) -- Coreia do Norte condenou as manobras militares conjuntas entre Japão e Estados Unidos como uma 'repetição de guerra'.", "titulo_pt": "Coreia do Norte critica exercícios militares japoneses-européus como 'rehearsal para guerra'", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 24596, "titulo": "Video: Israeli forces using a bulldozer to destroy Palestinian olive groves", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/video-israeli-forces-using-bulldozer-destroy-palestinian-olive-groves", "fonte_id": "middle_east_eye", "data_pub": "2026-06-28T22:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Forças israelenses estão utilizando um derradeirão para destruir plantações de oliveiras palestinas. O vídeo foi publicado no Instagram.", "titulo_pt": "Vídeo: Forças israelenses destruindo plantações de oliveiras palestinas com derradeirão", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 24480, "titulo": "Australia politics live: Vanuatu PM in Canberra as hopes rise over treaty; fossil fuel companies accused of marketing to children", "url": "https://www.theguardian.com/australia-news/live/2026/jun/29/australia-politics-live-vanuatu-nakamal-treaty-pacific-china-anthony-albanese-jotham-napat-one-nation-coalition-pauline-hanson-angus-taylor-royal-commission-antisemitism-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-06-28T22:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O primeiro-ministro de Vanuatu, Jotham Napat, está visitando Canberra, aumentando as esperanças de que o país possa assinar o Acordo Nakamal após longas negociações. Além disso, empresas de combustíveis fósseis são acusadas de vender seus produtos a crianças.", "titulo_pt": "Política australiana em tempo real: primeiro-ministro de Vanuatu visita Canberra e espera assinatura de tratado; empresas de combustíveis fósseis acusadas de marketing para crianças", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 24469, "titulo": "In Venezuela, a Community Comes Together to Search for Earthquake Survivors", "url": "https://www.nytimes.com/2026/06/28/world/americas/caracas-venezuela-earthquake-rescue.html", "fonte_id": "nyt_world", "data_pub": "2026-06-28T22:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Voluntários de uma vizinhança de classe média em Caracas usaram martelos e picaretas para quebrar concreto, tentando encontrar sobreviventes em necessidade de resgate.", "titulo_pt": "Em Venezuela, uma Comunidade se Reúne para Buscar Sobreviventes de Terremotos", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 24587, "titulo": "Corina Machado, 'è arrivato il momento che io torni in Venezuela'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/29/corina-machado-e-arrivato-il-momento-che-io-torni-in-venezuela_6160ae98-4629-4c7a-8c5f-c1ec4164c658.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-28T22:31:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Corina Machado afirmou que chegou o momento dela retornar à Venezuela. A administração dos Estados Unidos não está satisfeita com essa solicitação.", "titulo_pt": "Corina Machado: 'Chegou o momento de eu voltar para a Venezuela'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 24617, "titulo": "Iran warns ships not to bypass its chosen Hormuz route", "url": "https://www.scmp.com/news/world/middle-east/article/3358681/iran-warns-ships-not-bypass-its-chosen-hormuz-route?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T22:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O chefe da diplomacia iraniana advertiu que qualquer tentativa de navios desviarem do caminho preferencial pela Estreito de Ormuz aumentaria as tensões no Oriente Médio. As trocas de acusações entre Estados Unidos e Irã refletem a instabilidade persistente após um acordo paquistanês para encerrar uma guerra iniciada em fevereiro, que interrompeu o comércio marítimo na região e abalou os mercados globais de energia.", "titulo_pt": "Irã avisa navios sobre rota preferencial no Estreito de Ormuz", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 24637, "titulo": "(EDITORIAL from Korea Herald on June 29)", "url": "https://en.yna.co.kr/view/AEN20260629000500315", "fonte_id": "yonhap_news", "data_pub": "2026-06-28T22:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mapas industriais às vezes são confundidos com mapas políticos. O artigo discute o mapa industrial mais recente da Coreia do Sul, que é semi...", "titulo_pt": "Editorial: Mapas Industriais vs. Políticos", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 24561, "titulo": "Armed conflict threatens Ethiopia’s ancient monasteries", "url": "https://www.france24.com/en/armed-conflict-threatens-ethiopia-s-ancient-monasteries", "fonte_id": "france24", "data_pub": "2026-06-28T22:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Lake Tana, uma vez um destino turístico popular na região de Amhara, Étiopía, com suas belas margens e mosteiros do século XIV, está agora em perigo devido a um conflito armado entre as milícias Fano e as forças do governo federal desde 2023. O futuro desses mosteiros antigos é incerto.", "titulo_pt": "Conflito armado ameaça mosteiros antigos no Lago Tana, Étiopía", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 24458, "titulo": "Con la designación del secretario de Prensa, 13 exfuncionarios de Pro ocupan cargos centrales en el gobierno de Milei", "url": "https://www.lanacion.com.ar/politica/con-la-designacion-del-secretario-de-prensa-12-exfuncionarios-de-pro-ocupan-cargos-centrales-en-el-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T21:57:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A designação do secretário de Prensa deixa 13 ex-funcionários da Pro ocupando cargos centrais no governo de Milei, mesmo com a relação entre o Presidente e Mauricio Macri não estando boa. A maioria dos ministérios está sob a responsabilidade de figuras com passado em administrações amarillas, como Santilli e Devitt.", "titulo_pt": "Com a Designação do Secretário de Prensa, 13 Ex-Funcionários da Pro Ocupam Cargos Centrais no Governo de Milei", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 24467, "titulo": "At a Caracas Morgue, Families and Officials Try to Identify More Than 100 Victims", "url": "https://www.nytimes.com/2026/06/28/world/americas/venezuela-earthquake-caracas-morgue.html", "fonte_id": "nyt_world", "data_pub": "2026-06-28T21:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A identificação de vítimas tem sido difícil devido aos corpos que ficaram gravemente esmagados sob prédios derrubados.", "titulo_pt": "Em uma Morgue em Caracas, Famílias e Autoridades Tentam Identificar Mais de 100 Vítimas", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 24471, "titulo": "Iran Risks Peace Talks With U.S. to Maintain Leverage Over Strait", "url": "https://www.nytimes.com/2026/06/28/world/europe/iran-us-strait-of-hormuz-peace-talks.html", "fonte_id": "nyt_world", "data_pub": "2026-06-28T21:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Irã vê seu controle sobre o Estreito de Ormuz como uma peça crucial nas negociações com os Estados Unidos. O país parece disposto a correr o risco de um cessar-fogo para manter essa influência.", "titulo_pt": "Irã Corre Riscos de Conversações Com EUA Para Manter Poder no Estreito de Ormuz", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}], "mundo__eventos": [{"titulo": "Putin reconhece problemas de abastecimento de combustível devido a ataques de drones ucranianos", "sumario": "O presidente Putin admitiu que a Rússia enfrenta escassezes de combustíveis devido a ataques com drones ucranianos nas refinarias. O presidente russo afirmou durante uma reunião de altos funcionários que uma força-tarefa foi criada para garantir a fornecimento adequado de combustível em todo o país. O presidente russo, Vladimir Putin, admitiu que ataques ucranianos estão causando uma 'certa escassez' de combustível no país.", "artigos": [{"id": 24569, "titulo": "Putin says Russia faces fuel shortages as Ukrainian drones strike refineries", "url": "https://www.ft.com/content/b6a405a1-876d-4844-8ca9-8bc19b58a2b2", "fonte_id": "financial_times", "data_pub": "2026-06-28T22:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente Putin admitiu que a Rússia enfrenta escassezes de combustíveis devido a ataques com drones ucranianos nas refinarias.", "titulo_pt": "Putin reconhece problemas de abastecimento de combustível devido a ataques de drones ucranianos", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 24322, "titulo": "Putin reconhece escassez de combustível, mas minimiza ataques ucranianos", "url": "https://www.cnnbrasil.com.br/internacional/putin-reconhece-escassez-de-combustivel-mas-minimiza-ataques-ucranianos/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T22:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente russo afirmou durante uma reunião de altos funcionários que uma força-tarefa foi criada para garantir a fornecimento adequado de combustível em todo o país. Putin reconheceu a escassez, mas minimizou os ataques ucranianos relacionados.", "titulo_pt": "Putin reconhece escassez de combustível, mas minimiza ataques ucranianos", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 24481, "titulo": "Putin admits Ukrainian strikes driving Russian fuel shortages", "url": "https://www.theguardian.com/world/2026/jun/28/putin-admits-ukrainian-strikes-driving-russian-fuel-shortages", "fonte_id": "guardian_world", "data_pub": "2026-06-28T21:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente russo, Vladimir Putin, admitiu que ataques ucranianos estão causando uma 'certa escassez' de combustível no país. Kyiv afirma que os ataques são uma forma de vingança pelos bombardeios russos em infraestrutura e civis ucranianos desde fevereiro de 2022.", "titulo_pt": "Putin reconhece escassez de combustível na Rússia devido a ataques ucranianos", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}]}], "economia": [{"id": 24183, "titulo": "Defense net may be finished this year", "url": "https://www.taipeitimes.com/News/front/archives/2026/06/29/2003859905", "fonte_id": "taipei_times", "data_pub": "2026-06-29T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O sistema de defesa pode estar concluído este ano.", "titulo_pt": "Rede de Defesa Poderia Terminar Este Ano", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 24184, "titulo": "Yuanta upgrades Taiwan’s GDP growth to 11.05%", "url": "https://www.taipeitimes.com/News/front/archives/2026/06/29/2003859906", "fonte_id": "taipei_times", "data_pub": "2026-06-29T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Yuanta, uma empresa de consultoria financeira, elevou a previsão do crescimento do PIB da Taiwan para 11,05%.", "titulo_pt": "Yuanta aumenta previsão de crescimento econômico da Taiwan para 11,05%", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 24204, "titulo": "Aggregate net profit up last year", "url": "https://www.taipeitimes.com/News/biz/archives/2026/06/29/2003859889", "fonte_id": "taipei_times", "data_pub": "2026-06-29T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O lucro líquido agregado aumentou no ano passado.", "titulo_pt": "Lucro líquido agregado aumentou no ano passado", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 24616, "titulo": "Chinese farmer’s forest of cameras fails to bear fruit in compensation bid", "url": "https://www.scmp.com/news/china/science/article/3358657/chinese-farmers-forest-cameras-fails-bear-fruit-compensation-bid?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T22:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um agricultor chinês plantou mais de 170 câmeras de segurança no seu terreno com o objetivo de aumentar a compensação em um programa de compra de terras. A instalação foi divulgada nas redes sociais e gerou especulações sobre as razões para tanto aparato de vigilância.", "titulo_pt": "Agricultor chinês planta floresta de câmeras de segurança em busca de maior compensação", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 24455, "titulo": "La suba del dólar cortó el carry trade por primera vez desde las elecciones y reactivó la intervención oficial", "url": "https://www.lanacion.com.ar/economia/la-suba-del-dolar-corto-el-carry-trade-por-primera-vez-desde-las-elecciones-y-reactivo-la-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T22:07:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O tipo de câmbio oficial do dólar subiu quase 5% em junho, resultando em perdas para os investidores que apostavam na moeda local; o BCRA reduziu a taxa de compra de divisas e houve uma maior atividade nos futuros e bonos ligados ao dólar para controlar a volatilidade.", "titulo_pt": "A subida do dólar cortou o carry trade pela primeira vez desde as eleições e reativou a intervenção oficial", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 24283, "titulo": "Micron supera US$ 1 trilhão em valor diante de escassez de chips para IA", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/micron-supera-us-1-trilhao-em-valor-diante-de-escassez-de-chips-para-ia.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-28T21:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Micron, gigante da indústria de chips, registrou um aumento quase 15 vezes nos lucros trimestrais. Como resultado, as ações do grupo valendo US$ 1,3 trilhão dispararam e impulsionaram os mercados globais na última quinta-feira (25).", "titulo_pt": "Micron supera US$ 1 trilhão em valor diante de escassez de chips para IA", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 24638, "titulo": "Financial sector's overseas real estate investment up in Q4", "url": "https://en.yna.co.kr/view/AEN20260627000800320", "fonte_id": "yonhap_news", "data_pub": "2026-06-28T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O investimento do setor financeiro coreano no exterior em imóveis aumentou no quarto trimestre. Os detalhes específicos sobre o volume ou localização desses investimentos não foram fornecidos nesta notícia.", "titulo_pt": "Investimento do setor financeiro coreano em imóveis no exterior cresce no 4º quadrimestre", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 24353, "titulo": "Calendário econômico da semana: dados de trabalho nos EUA e no Brasil serão foco", "url": "https://www.infomoney.com.br/mercados/calendario-economico-da-semana-dados-de-trabalho-nos-eua-e-no-brasil-serao-foco/", "fonte_id": "infomoney", "data_pub": "2026-06-28T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A atenção dos investidores estará voltada para os dados sobre o mercado de trabalho nos Estados Unidos e no Brasil durante a próxima semana. O calendário econômico semanal destaca esses indicadores como pontos-chave.", "titulo_pt": "Calendário econômico da semana: foco em dados do mercado de trabalho dos EUA e do Brasil", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 24284, "titulo": "Como os CEOs conciliam os treinos com a carga de trabalho", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/como-os-ceos-conciliam-os-treinos-com-a-carga-de-trabalho.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-28T19:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Muitos CEOs afirmam que realizam treinos matinais às 5 da manhã, tornando-se praticamente um ritual para eles. O texto original não fornece mais detalhes sobre esses treinos ou como os executivos conciliam essa atividade com suas cargas de trabalho.", "titulo_pt": "Como os CEOs integram treinos matinais nas suas rotinas", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 24288, "titulo": "Nove apostas acertam Quina de São João e vão receber R$ 26,6 milhões", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/nove-apostas-acertam-quina-de-sao-joao-e-vao-receber-r-266-milhoes", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-28T19:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Nove apostas acertaram a Quina de São João, concurso 7051, e receberão R$ 26,6 milhões cada. As cidades vencedoras são Brasília, Fortaleza, Alexânia (GO), Contagem (MG), Aripuana (MT), Paranavaí (PR), Campos dos Goytacazes (RJ) e Indaiatuba (SP).", "titulo_pt": "Nove apostas acertam Quina de São João e vão receber R$ 26,6 milhões", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 23812, "titulo": "Aluguéis sobem acima da inflação com mercado imobiliário aquecido", "url": "https://www.cnnbrasil.com.br/economia/mercado/alugueis-sobem-acima-da-inflacao-com-mercado-imobiliario-aquecido/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T18:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os alugueis têm aumentado acima da inflação devido ao mercado imobiliário aquecido, com a redução da taxa de vacância sendo um fator principal na elevação dos preços.", "titulo_pt": "Aluguéis sobem acima da inflação com mercado imobiliário aquecido", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 23676, "titulo": "Ferbasa recebe R$ 43,8 milhões para produção de carvão vegetal", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/06/ferbasa-recebe-r-438-milhoes-para-producao-de-carvao-vegetal.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-28T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Ferbasa recebeu um financiamento de R$ 43,8 milhões do BNDES para construir uma nova planta de produção de carvão vegetal em Maracás, na Bahia. O projeto está localizado a 350 km de Salvador.", "titulo_pt": "Ferbasa obtém R$ 43,8 milhões para produção de carvão vegetal", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 23822, "titulo": "ETFs de renda fixa atraem fluxo recorde de investidores", "url": "https://www.cnnbrasil.com.br/economia/investimentos/etfs-de-renda-fixa-atraem-fluxo-recorde-de-investidores/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O fluxo de investimentos para ETFs de renda fixa atingiu um recorde, refletindo a busca pelos investidores por praticidade, diversificação e benefícios tributários.", "titulo_pt": "ETFs de renda fixa captam fluxo recorde de investidores", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 23823, "titulo": "Ter dinheiro fora do Brasil vale a pena? Conheça formas de investir", "url": "https://www.cnnbrasil.com.br/economia/negocios/ter-dinheiro-fora-do-brasil-vale-a-pena-conheca-formas-de-investir/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Mais de US$ 654 bilhões estão investidos por brasileiros no exterior, refletindo a crescente preferência por estratégias internacionais que oferecem proteção cambial e acesso a mercados globais.", "titulo_pt": "Ter dinheiro fora do Brasil vale a pena? Conheça formas de investir", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 23677, "titulo": "Soberania não se copia", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/ronaldolemos/2026/06/soberania-nao-se-copia.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-28T17:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Europa alterou sua postura sobre tecnologia nos últimos meses, passando de uma abordagem regulação-centrada para uma atitude mais proativa. Agora, o continente busca autonomia tecnológica criando suas próprias leis e regulamentos.", "titulo_pt": "Soberania não se copia", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 24364, "titulo": "Estrangeiros gastam R$ 25 bilhões no Brasil em cinco meses e batem recorde", "url": "https://exame.com/economia/estrangeiros-gastam-r-25-bilhoes-no-brasil-em-cinco-meses/", "fonte_id": "exame", "data_pub": "2026-06-28T16:37:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil recebeu investimentos estrangeiros no valor de R$ 25 bilhões nos primeiros cinco meses do ano, batendo recorde. Cerca de 5 milhões de visitantes internacionais entraram no país durante o mesmo período.", "titulo_pt": "Estrangeiros gastam R$ 25 bilhões e atingem novo recorde em cinco meses", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}], "economia__eventos": [], "tecnologia": [{"id": 24207, "titulo": "Anthropic gets nod to allow limited use of new model", "url": "https://www.taipeitimes.com/News/biz/archives/2026/06/29/2003859892", "fonte_id": "taipei_times", "data_pub": "2026-06-29T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa Anthropic recebeu autorização para permitir o uso limitado de seu novo modelo.", "titulo_pt": "Anthropic recebe green light para uso restrito do novo modelo", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 24559, "titulo": "'Better an imperfect digital euro than no digital euro at all'", "url": "https://www.lemonde.fr/en/opinion/article/2026/06/29/better-an-imperfect-digital-euro-than-no-digital-euro-at-all_6754958_23.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-28T22:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Parlamento Europeu analisa uma proposta para criar um sistema de pagamento mais rápido e menos custoso, com o objetivo de fortalecer a autonomia financeira da UE e se libertar do lobby bancário. O autor, Jézabel Couppey-Soubeyran, escreve para Le Monde sobre este assunto.", "titulo_pt": "Melhor um euro digital imparfeito do que nenhum euro digital", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 24630, "titulo": "China’s Z.ai claims it can match Mythos on cybersecurity", "url": "https://www.theverge.com/ai-artificial-intelligence/958804/chinas-z-ai-glm-52-mythos-cybersecurity", "fonte_id": "the_verge", "data_pub": "2026-06-28T21:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Zhipu AI (Z.ai), uma empresa chinesa, lançou seu modelo GLM-5.2 e alguns pesquisadores afirmam que ele se iguala ao Mythos em certos cenários de detecção de bugs e segurança cibernética.", "titulo_pt": "China's Z.ai claims it can match Mythos on cybersecurity", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 24632, "titulo": "California law targeting loud streaming ads takes effect on July 1", "url": "https://techcrunch.com/2026/06/28/california-law-targeting-loud-streaming-ads-takes-effect-on-july-1/", "fonte_id": "techcrunch", "data_pub": "2026-06-28T21:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A lei californiana que visa reduzir anúncios de streaming barulhentos entra em vigor em julho. Streaming ads might be getting a lot quieter.", "titulo_pt": "Lei californiana sobre anúncios de streaming barulhentos entra em vigor em julho", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 24334, "titulo": "Supercomputador chinês supera modelos norte-americanos em ranking mundial", "url": "https://www.cnnbrasil.com.br/economia/negocios/supercomputador-chines-supera-modelos-norte-americanos-em-ranking-mundial/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T20:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um supercomputador chinês chamado LineShine alcançou um ranking mundial superior aos modelos norte-americanos. Este sucesso ocorre em um momento de intensificação da rivalidade tecnológica entre EUA e China, com Washington buscando limitar o acesso de Pequim a tecnologias avançadas.", "titulo_pt": "Supercomputador chinês supera modelos norte-americanos em ranking mundial", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 24336, "titulo": "Anatel busca sinais de celulares para ajudar resgates na Venezuela", "url": "https://www.cnnbrasil.com.br/politica/anatel-busca-sinais-de-celulares-para-ajudar-resgates-na-venezuela/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T20:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Técnicos da Anatel estão utilizando equipamentos para localizar celulares em áreas afetadas por terremotos na Venezuela, auxiliando as equipes de resgate.", "titulo_pt": "Anatel busca sinais de celulares para orientar resgates na Venezuela", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 24631, "titulo": "Suno launches Spark incubator program to feed independent artists to its AI machine", "url": "https://www.theverge.com/ai-artificial-intelligence/958801/suno-launches-spark-incubator-program-to-feed-independent-artists-to-its-ai-machine", "fonte_id": "the_verge", "data_pub": "2026-06-28T20:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Suno lançou um programa de incubação chamado Spark para apoiar artistas independentes, oferecendo bolsas, mentorias e suporte de marketing. O objetivo é promover novos talentos e transformar Suno em uma plataforma de streaming.", "titulo_pt": "Suno lança programa Spark para apoiar artistas independentes", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 24633, "titulo": "Ford rehires ‘gray beard’ engineers after AI falls short", "url": "https://techcrunch.com/2026/06/28/ford-rehires-gray-beard-engineers-after-ai-falls-short/", "fonte_id": "techcrunch", "data_pub": "2026-06-28T19:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Ford recontratou engenheiros mais experientes após os sistemas de inteligência artificial falharem na produção de um produto de alta qualidade. A empresa admitiu que acreditava erroneamente de que a introdução da IA por si só garantiria um resultado de alta qualidade.", "titulo_pt": "Ford recontrata engenheiros mais experientes após falha na AI", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 24629, "titulo": "Why did this journal retract two 1940s papers by Max Planck?", "url": "https://arstechnica.com/science/2026/06/why-did-this-journal-retract-two-1940s-papers-by-max-planck/", "fonte_id": "ars_technica", "data_pub": "2026-06-28T18:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dois artigos publicados no início dos anos 1940 pelo físico alemão Max Planck foram retraídos por uma revista. Agora, clicando nos links para esses artigos, os leitores encontram páginas em branco e arquivos PDF vazios.", "titulo_pt": "Por que essa revista reteve dois artigos dos anos 1940 de Max Planck?", "veiculo": "Ars Technica", "pais": "EUA", "classe": "B"}, {"id": 24213, "titulo": "Writer Ian Bogost says ‘The Small Stuff’ can help us reclaim our lives from dematerialization", "url": "https://techcrunch.com/2026/06/28/writer-ian-bogost-says-the-small-stuff-can-help-us-reclaim-our-lives-from-dematerialization/", "fonte_id": "techcrunch", "data_pub": "2026-06-28T17:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ian Bogost, um escritor, afirma que 'The Small Stuff' pode nos ajudar a reivindicar nossas vidas da dematerialização. A pergunta subjacente é se a Silicon Valley tem estado criando as coisas erradas.", "titulo_pt": "Escritor Ian Bogost diz que 'The Small Stuff' pode nos auxiliar a recuperar nossas vidas da dematerialização", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 24214, "titulo": "TechCrunch Mobility: All eyes on Tesla FSD", "url": "https://techcrunch.com/2026/06/28/techcrunch-mobility-all-eyes-on-tesla-fsd/", "fonte_id": "techcrunch", "data_pub": "2026-06-28T16:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A TechCrunch Mobility retorna com foco no futuro do transporte, destacando a importância crescente do uso da IA. A atenção está voltada para o sistema de direção autônoma (FSD) da Tesla.", "titulo_pt": "TechCrunch Mobilidade: Todo Mundo Olhando Para o FSD da Tesla", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 24367, "titulo": "Wayve desafia Tesla e Waymo na corrida da direção autônoma", "url": "https://exame.com/tecnologia/wayve-desafia-tesla-e-waymo-na-corrida-da-direcao-autonoma/", "fonte_id": "exame", "data_pub": "2026-06-28T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A empresa britânica Wayve está ganhando força no mercado de direção autônoma ao oferecer seu sistema como software, atraiu grandes montadoras e investidores globais. Isso representa uma concorrência significativa para empresas como Tesla e Waymo.", "titulo_pt": "Wayve desafia Tesla e Waymo na corrida da direção autônoma", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 23760, "titulo": "Avanço da IA da China reduz vantagem dos EUA em cibersegurança", "url": "https://exame.com/inteligencia-artificial/avanco-da-ia-da-china-reduz-vantagem-dos-eua-em-ciberseguranca/", "fonte_id": "exame", "data_pub": "2026-06-28T15:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Sistemas da Zhipu já competem com modelos americanos em testes de cibersegurança. Restrições dos EUA aumentam a pressão sobre o setor.", "titulo_pt": "Avanço da IA chinesa reduz vantagem dos EUA em cibersegurança", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 23761, "titulo": "Sem gigantes de tecnologia, Europa aposta em bancos e infraestrutura para capturar ganhos da IA", "url": "https://exame.com/invest/mercados/sem-gigantes-de-tecnologia-europa-aposta-em-bancos-e-infraestrutura-para-capturar-ganhos-da-ia/", "fonte_id": "exame", "data_pub": "2026-06-28T15:42:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Empresas que fornecem infraestrutura para data centers e instituições financeiras estão se destacando como novas apostas relacionadas à inteligência artificial na Europa. Sem a presença de gigantes de tecnologia, esses setores são vistos como potenciais ganhos no cenário da IA.", "titulo_pt": "Sem gigantes de tecnologia, Europa aposta em bancos e infraestrutura para capturar ganhos da IA", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 23763, "titulo": "Startup fecha parceria com Nvidia para construir data center de IA e mira US$ 30 bi", "url": "https://exame.com/inteligencia-artificial/startup-fecha-parceria-com-nvidia-para-construir-data-center-de-ia-e-mira-us-30-bi/", "fonte_id": "exame", "data_pub": "2026-06-28T15:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A startup construirá um data center de IA com a parceria da Nvidia, que terá uma capacidade de 360 MW e deve começar a operar no ano de 2027. O projeto reforça a expansão da infraestrutura de IA da Nvidia na Ásia.", "titulo_pt": "Startup fecha parceria com Nvidia para construir data center de IA e mira US$ 30 bi", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 23680, "titulo": "Meta pede ao Google mais capacidade para uso de IA; e dona do Gemini diz 'não'", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/meta-pede-ao-google-mais-capacidade-para-uso-de-ia-e-dona-do-gemini-diz-nao.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-28T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Google limitou o uso do modelo de inteligência artificial Gemini pela Meta após a empresa social pedir mais capacidade computacional do que o rival podia fornecer. Este episódio ilustra as dificuldades enfrentadas pelos maiores provedores de IA em termos de infraestrutura.", "titulo_pt": "Meta pede mais capacidade para uso de IA; Google nega", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 24640, "titulo": "Bird flu is deadly for backyard chickens—and even cats. A vet expert explains", "url": "https://phys.org/news/2026-06-bird-flu-deadly-backyard-chickens.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T22:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A cepa letal H5N1 da gripe aviária foi encontrada em aves marinhas em dois estados australianos. Essa doença é mortal para galinheiros domésticos e até mesmo gatos.", "titulo_pt": "Gripe aviária letal é encontrada em aves marinhas na Austrália", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24641, "titulo": "The solar gravitational lens could map white dwarfs and black holes", "url": "https://phys.org/news/2026-06-solar-gravitational-lens-white-dwarfs.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo artigo de Dr. Slava Turyshev, publicado no arXiv, destaca a utilidade do Prisma Gravitacional Solar (SGL) para imagens além dos exoplanetas distantes. O SGL pode ser útil na mapeamento de white dwarfs e buracos negros, além das descobertas já conhecidas em exoplanetas.", "titulo_pt": "O prisma gravitacional solar poderia mapear white dwarfs e buracos negros", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24642, "titulo": "Europe swelters as heat wave moves east", "url": "https://phys.org/news/2026-06-europe-swelters-east.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T20:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A onda de calor letal na Europa se movimentou para leste no domingo, com centenas de milhões de pessoas ainda suportando as altas temperaturas, apesar de alívios temporários das chuvas noturnas em França e Bélgica.", "titulo_pt": "Europa sufoca enquanto onda de calor avança para leste", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24643, "titulo": "Nanopattern method unlocks precise control of disorder for wave-guiding devices", "url": "https://phys.org/news/2026-06-nanopattern-method-precise-disorder-devices.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de pesquisa desenvolveu uma metodologia para projetar e controlar precisamente o 'grau de desordem' em arranjos nanopadrão usando filmes finos de copolímero bloco infiltrado metálico. O estudo foi publicado na revista Nature Communications e selecionado como Destaque dos Editores no campo da matéria e química.", "titulo_pt": "Método de nanopatrões libera controle preciso do grau de desordem para dispositivos guia de ondas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24229, "titulo": "Injectable silk-kudzu hydrogel achieves complete wound closure in laboratory tests", "url": "https://phys.org/news/2026-06-silk-kudzu-hydrogel-wound-closure.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores do Terasaki Institute for Biomedical Innovation desenvolveram um hidrogel injetável feito de proteínas de seda e um composto extraído de uma planta. Nas provas laboratoriais, o material promoveu a cicatrização completa das feridas em 72 horas.", "titulo_pt": "Hidrogel injetável de seda e kudzu atinge fechamento completo de feridas em testes laboratoriais", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23801, "titulo": "Planeta rosa pode ter nuvens de sal, revelam observações do James Webb", "url": "https://www.metropoles.com/ciencia/planeta-rosa-nuvens-de-sal", "fonte_id": "metropoles", "data_pub": "2026-06-28T18:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O exoplaneta GJ 504b, descoberto em 2013, apresentou sinais de nuvens de sal nas observações realizadas pelo Telescópio James Webb.", "titulo_pt": "Planeta rosa pode ter nuvens de sal, revelam observações do James Webb", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 24230, "titulo": "Reanalysis suggests 'Phoebe' is a variable star, not a primordial black hole", "url": "https://phys.org/news/2026-06-reanalysis-phoebe-variable-star-primordial.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T18:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma nova análise sugere que a estrela conhecida como 'Fofea' não é uma buraco negro primordial, mas sim uma estrela comum que varia sua luminosidade naturalmente ao longo do tempo. A reanálise dos dados da câmera Dark Energy Camera (DECam) mostrou que as observações anteriores podem ter sido enganosas.", "titulo_pt": "Reanálise sugere que 'Fofea' é uma estrela variável, não um buraco negro primordial", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24231, "titulo": "12 billion years old, this interstellar comet is older than our solar system", "url": "https://phys.org/news/2026-06-billion-years-interstellar-comet-older.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em julho de 2025, astrônomos descobriram um novo objeto interestelar movendo-se pelo sistema solar. O objeto foi detectado pelo Sistema de Alerta de Impacto Terrestre do Asteroides (ATLAS) e rapidamente identificado como algo especial.", "titulo_pt": "12 bilhões de anos velho, este cometa interestelar é mais antigo que nosso sistema solar", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23833, "titulo": "Doença rara e silenciosa em bebês pode ser evitada com teste do pezinho", "url": "https://www.cnnbrasil.com.br/saude/doenca-rara-e-silenciosa-em-bebes-pode-ser-evitada-com-teste-do-pezinho/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T17:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A fenilcetonúria, uma doença rara e silenciosa em bebês, pode ser evitada com o teste do pezinho. Sem tratamento, a doença pode comprometer irreversivelmente o desenvolvimento cognitivo e motor dos infantes devido ao acúmulo de substâncias tóxicas no organismo.", "titulo_pt": "Doença rara e silenciosa em bebês pode ser evitada com teste do pezinho", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 24232, "titulo": "Ancient algal defenses against UV may have helped plants conquer land", "url": "https://phys.org/news/2026-06-ancient-algal-defenses-uv-conquer.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo recente ilumina como os ancestrais das plantas terrestres modernas superaram um dos aspectos mais desafiadores da vida fora d'água: a exposição à radiação ultravioleta (UV) prejudicial. Através do exame de uma microalga relacionada às primeiras plantas terrestres, os pesquisadores descobriram um sistema sofisticado e dinâmico para lidar com queimaduras solares, provavelmente contribuindo para a colonização das plantas na terra há mais de 500 milhões de anos.", "titulo_pt": "Defesas antigas contra UV podem ter auxiliado nas plantas dominarem as terras", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24365, "titulo": "A Califórnia está mais perto de um grande terremoto? Estudo traz novo alerta",
