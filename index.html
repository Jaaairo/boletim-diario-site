  </div>
</div>

<script>
const D = {"gerado_em": "17/07/2026 02:26", "stats": {"noticias_novas": 226, "resumos_gerados": 205}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "As inscrições para o Fies terminam nesta sexta-feira, 17 de julho, com cerca de 44.9 mil vagas disponíveis. Em outra notícia política, Caiado criticou a declaração de Marco Rubio sobre Lula, chamando-a de 'infeliz'. O senador Flávio Bolsonaro negou uma suposta foto com um 'sicario' e publicou imagens dele fazendo exercícios, semelhantes às recentes postagens do presidente Lula. Soraya afirmou que Lula confirmou seu apoio à sua reeleição para o Senado. O governo brasileiro expandiu o programa Move Brasil para incluir a compra de carros seminovos, além dos novos veículos. Além disso, o TSE firmou acordos com grandes plataformas digitais para combater desinformação durante as eleições de 2026.", "mundo": "O presidente dos Estados Unidos, Donald Trump, tem continuado a fazer acusações sobre supostos esforços estrangeiros para interferir nas eleições americanas. Em um discurso recente na televisão, Trump voltou a resgatar o boato de fraude eleitoral de 2020 e acusou a China de ter influenciado sua derrota, apesar das contradições das informações fornecidas pela inteligência americana. O governo Trump também reimplantou tarifas de importação derrubadas pela Suprema Corte, enquanto o Parlamento japonês aprovou mudanças nas regras de sucessão imperial, permitindo que parentes masculinos distantes se integrem à família real e mantendo o banimento de mulheres como imperatrizes. Além disso, Zelenskyy nomeou um novo chefe de defesa em uma tentativa de resolver a crise política na Ucrânia, enquanto o governo japonês estabeleceu regras mais rígidas para vistos de estudante que afetarão mais de 13.000 coreanos residentes nos EUA.\n\nOs Estados Unidos intensificaram suas hostilidades contra o Irã, lançando novos ataques que atingiram aeroportos e pontes no país, conforme relatos do jornal Carta Capital. As tensões entre as duas nações aumentaram após um acordo preliminar ter sido assinado há um mês, com os confrontos iniciados em fevereiro com ataques significativos realizados pelos Estados Unidos e Israel contra o Irã, de acordo com informações da South China Morning Post (SCMP). Em resposta, o Irã afirmou que o Estreito de Ormuz não retornará ao estado pré-guerra. Além disso, durante um discurso à nação, o presidente dos Estados Unidos, Donald Trump, reivindicou a desclassificação de dados de inteligência sugerindo que a China adquiriu ilegalmente 220 milhões de arquivos eleitorais americanos, contrariando investigações que não encontraram evidências de interferência nas últimas eleições. A Argentina também se posicionou em relação às relações internacionais, destacando a necessidade de alinhamento interno para implementar políticas independentes dos caprichos do momento, conforme noticiado pelo La Nación Argentino.", "economia": "As medidas econômicas e comerciais internacionais têm dominado os cenários recentes. O maior IPO da Índia, liderado por investidores institucionais, arrecadou mais de 31 bilhões de dólares. Em outro destaque, o setor químico brasileiro prevê um gasto extra de US$ 66 milhões em 2026 devido ao tarifaço dos Estados Unidos. O dólar encerrou a quinta-feira cotado a R$ 5,10, influenciado pelo tarifaço e pela tensão global. As ações da Yum Brands, detentora do Taco Bell, caíram após relatos sobre uma investigação relacionada a um surto de ciclosporíase nos Estados Unidos. O governo federal anunciou que retomará um programa de apoio aos setores empresariais afetados pelo tarifaço, enquanto o vice-presidente Geraldo Alckmin (PSB) afirmou que o Brasil usará a Lei de Reciprocidade para retaliar barreiras comerciais no momento adequado. Além disso, as exportações chinesas de veículos leves sofreram um declínio significativo no primeiro semestre de 2026, com as vendas de carros particulares caindo 20% em comparação ao mesmo período do ano anterior, e a SMBC contratou Kunal Maini para fortalecer suas operações globais de vendas e trading.", "tecnologia": "O presidente chinês Xi Jinping estabeleceu metas para a liderança global da China na inteligência artificial (IA), buscando fortalecer sua influência nos padrões tecnológicos. Um desenvolvimento importante ocorreu quando a empresa de semicondutores SK Group sugeriu um modelo 'memória como serviço' para a SK Hynix, indicando que a empresa precisa diversificar seu negócio além da fabricação e venda de chips. A TSMC anunciou investimentos adicionais de 100 bilhões de dólares nos Estados Unidos, financiando várias fábricas de wafers de 2nm, refletindo o crescimento das demandas de grandes clientes americanos e a pressão para expandir sua presença global. Além disso, a empresa Moonshot AI lançou um modelo de IA chamado Kimi K3 com 2,8 trilhões de parâmetros, reduzindo a diferença entre sistemas gratuitos baixáveis e os principais modelos proprietários da indústria para seu ponto mais próximo até agora.", "ciencia": "As pesquisas sobre as antigas princesas egípcias mostram que algumas podem ter sido guerreiras, usando armas de guerra durante o Reino Médio, desafiando a ideia de que esses artefatos eram apenas simbólicos. Em outro desenvolvimento científico, um estudo da NASA confirmou que a Sérvia se juntou aos Acordos Artemis, se tornando a 69ª nação comprometida com a exploração espacial pacífica e responsável. Um projeto importante é o PathSay, do Brigham Young University, que usa inteligência artificial para coletar dados de línguas menos representadas, visando preservar heranças linguísticas e melhorar ferramentas de tradução em comunidades negligenciadas. Além disso, um relatório da ONU oferece diretrizes para o desenvolvimento de economias azuis sustentáveis, enquanto pesquisadores descobriram uma comunidade rara de conchas d'água doce no Rio Moosup, na Rhode Island, EUA, destacando a importância da preservação ambiental.", "cultura": "A terceira temporada de 'A Casa do Dragão' mantém a atenção do público com quatro episódios emocionantes, após uma pausa. O documentário 'Jesy Nelson: Life Changing', sobre Jesy Nelson, ex-membro do Little Mix, destaca-se ao retratar sua luta pessoal durante o nascimento de seus gêmeos prematuros. A capitã Sheila Barbosa da Polícia Militar venceu a Casa do Patrão com um prêmio de R$ 1,1 milhão. No Rio de Janeiro, o rock expande seu palco Mundo e cria um setor mais caro para eventos exclusivos. Globalmente, as exportações de álbuns de k-pop da Coreia do Sul atingem um recorde histórico, com US$ 257,48 milhões nos primeiros seis meses de 2023. A cultura hereditária sul-coreana ganha nova vida através dos K-dramas e K-pop, que incorporam o patrimônio cultural do país em produções globais. O artista Pat Oleszko venceu um prêmio de US$ 100 mil no Whitney Biennial com sua obra inflável, enquanto a editora Steidl enfrenta problemas financeiros e insolvência. No cenário cultural, o ator Cauã Reymond se aventura como diretor em 'Jogada de Risco', do Globoplay, após protagonizar novelas populares recentemente.", "sociedade": "A morte de um homem electrocutado por um poste energizado em Cerro Navia, Chile, levanta dúvidas sobre a segurança do sistema elétrico e sugere a possibilidade de intervenções externas. Em outro caso, o advogado Pedro Ely foi visto nas câmeras de segurança antes de ser encontrado morto no interior de uma adega em São Paulo, Brasil. No Distrito Industrial de Manaus, um vazamento de gás estireno levou 16 pessoas a serem atendidas em unidades de saúde e mobilizou o gabinete de crise local. A demógrafa Elza Berquó, referência em estudos populacionais no Brasil, faleceu aos 100 anos. Em Rondônia, Flávio Bolsonaro lidera as intenções de voto para presidente com uma vantagem significativa sobre Lula. O ministro de Segurança visitou o Hospital Base de Valdivia após um cabo primeiro ser baleado durante uma operação policial, anunciando novos cargos contra um detento envolvido no incidente. A UNICEF e parceiros lançaram uma aliança para ampliar empregos verdes no Brasil, visando potencialmente 1 milhão de vagas, enquanto a Coreia do Sul registrou um aumento na utilização inconsistente de anticoncepcional entre adolescentes sexualmente ativas.", "meio_ambiente": "As altas temperaturas e fumaça dos incêndios florestais estão causando danos significativos à saúde, conforme alerta da Japan Times. O fenômeno El Niño está sendo monitorado com preocupação na Austrália, potencialmente se tornando o mais forte na história, de acordo com o Guardian World. Em Chile, um temporal de chuva e vento intensificou-se, causando três mortes e afetando cerca de 555 mil pessoas sem energia elétrica, informa a La Tercera. No Brasil, uma análise publicada na revista Science indica que o fim da Moratória da Soja aumentará o desmatamento da Amazônia em 17% na próxima década (2025-2035), em comparação com os anos anteriores (2014-2024). A França enfrenta uma 'doradeira excepcional' devido a sucessivas ondas de calor, enquanto Toronto registrou a pior qualidade do ar entre as maiores cidades do mundo em 15 de julho, devido à fumaça proveniente dos incêndios florestais no norte-oeste do Ontario. Além disso, o Canadá enfrenta problemas com óleo contaminado e a Europa questiona as reduções nas emissões de gases poluentes atribuídas às minas de carvão, conforme relatos da Anvisa, Al Jazeera, Le Monde e Euronews.", "direitos_humanos": "A Corte Penal Internacional e o governo australiano expressaram preocupação com as acusações menores relacionadas à morte por envenenamento de metanol de duas jovens turistas no Laos. Em Hong Kong, o político Lai expressou solidariedade aos livradores que foram detidos. Trabalhadores migrantes indonésios enfrentam abuso e exploração no setor pesqueiro global, atraídos por promessas de emprego que acabam sendo enganosas. O naufrágio envolvendo refugiados rohingya na Mianmar pode ter resultado em mais de 500 mortes, enquanto um incêndio em uma instituição de assistência a crianças no Alexandria, Argélia, deixou 17 pessoas mortas e 19 feridas. Em Hong Kong, cinco pessoas foram presas em operações relacionadas a livrarias independentes acusadas de venderem supostos materiais seditivos."}, "resumo_do_dia": {"politica_nacional": [{"id": 56119, "titulo": "Fies: inscrições terminam nesta sexta-feira (17/7)", "url": "https://www.metropoles.com/brasil/fies-inscricoes-terminam-sexta", "fonte_id": "metropoles", "data_pub": "2026-07-17T04:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As inscrições para o Fies terminam nesta sexta-feira, 17 de julho. Serão oferecidas aproximadamente 44,9 mil vagas neste edital.", "titulo_pt": "Inscrições fies: prazo final nesta sexta-feira (17/7)", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 56122, "titulo": "Caiado diz que fala de Marco Rubio sobre Lula foi \"infeliz\"", "url": "https://www.metropoles.com/brasil/caiado-diz-que-fala-de-marco-rubio-sobre-lula-foi-infeliz", "fonte_id": "metropoles", "data_pub": "2026-07-17T03:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Caiado afirmou que a declaração de Marco Rubio sobre Lula foi 'infeliz', mas disse que a tarifa proposta atende aos interessos políticos do presidente Lula.", "titulo_pt": "Caiado critica declaração de Marco Rubio sobre Lula", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 56117, "titulo": "Flávio nega foto com “Sicário” e diz que imagem é feita por IA", "url": "https://www.poder360.com.br/poder-eleicoes/flavio-nega-foto-com-sicario-e-diz-que-imagem-e-feita-por-ia/", "fonte_id": "poder360", "data_pub": "2026-07-17T02:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio Bolsonaro negou a autenticidade de uma foto supostamente com um 'Sicário' e afirmou que não conhece Luiz Phillipi Mourão. Ele questionou a veracidade da imagem divulgada pelo ICL.", "titulo_pt": "Flávio nega foto com ‘Sicário’ e diz que imagem é feita por IA", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 56128, "titulo": "Soraya afirma que Lula confirmou apoio à sua reeleição ao Senado", "url": "https://www.metropoles.com/brasil/soraya-afirma-que-lula-confirmou-apoio-a-sua-reeleicao-ao-senado", "fonte_id": "metropoles", "data_pub": "2026-07-17T02:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Soraya afirmou que Lula confirmou seu apoio à reeleição para o Senado. Isso ocorreu após um convite do deputado Vander Loubet (PT-MS) para compor uma chapa como suplente, proposta que foi recusada.", "titulo_pt": "Soraya diz que Lula confirmou apoio à sua reeleição ao Senado", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 55128, "titulo": "Após vídeos de Lula, Flávio aparece malhando em publicação", "url": "https://www.poder360.com.br/poder-gente/apos-videos-de-lula-flavio-aparece-malhando-em-publicacao/", "fonte_id": "poder360", "data_pub": "2026-07-17T02:13:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Flávio Bolsonaro (PL) publicou imagens de si mesmo malhando, semelhantes a vídeos recentes do presidente Lula que mostravam rotinas de exercícios. Essas postagens parecem seguir uma linha similar às de Lula.", "titulo_pt": "Após vídeos de Lula, Flávio aparece malhando em publicação", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 56139, "titulo": "O que documentos recém-divulgados por Trump dizem sobre as eleições nos EUA", "url": "https://www.cnnbrasil.com.br/internacional/o-que-documentos-recem-divulgados-por-trump-dizem-sobre-as-eleicoes-nos-eua/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T02:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os documentos recém-divulgados por Trump tratam principalmente de vulnerabilidades eleitorais conhecidas há anos, que autoridades eleitorais nos Estados Unidos vêm tentando corrigir.", "titulo_pt": "O que os novos documentos de Trump dizem sobre as eleições nos EUA", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 54979, "titulo": "Família Bolsonaro traz entraves para exportações do agronegócio", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/vaivem/2026/07/familia-bolsonaro-traz-entraves-para-exportacoes-do-agronegocio.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A família Bolsonaro está aumentando pressões políticas na relação comercial entre Estados Unidos e Brasil, o que pode levar a medidas mais rigorosas contra o agronegócio brasileiro no futuro. Isso se deve aos pedidos dos filhos de Bolsonaro para sanções ao Brasil em troca da libertação do pai.", "titulo_pt": "Família Bolsonaro cria obstáculos para exportações do agronegócio", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 55031, "titulo": "AGU tenta reverter decisão que deu acesso a dados de honorários à Transparência Brasil", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/agu-tenta-reverter-decisao-que-deu-acesso-a-dados-de-honorarios-a-transparencia-brasil.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-17T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A AGU solicitou a revisão da decisão que permitiu o acesso aos dados sobre os honorários de sucumbência distribuídos pela União, mantendo as informações restritas. Após informar inicialmente que atenderia ao pedido da Transparência Brasil em maio, a AGU enviou um pedido à CGU para reverter esta decisão.", "titulo_pt": "AGU tenta reverter decisão sobre acesso aos dados de honorários", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 55032, "titulo": "A opacidade das renúncias fiscais estaduais", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/transparencia-publica/2026/07/a-opacidade-das-renuncias-fiscais-estaduais.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-17T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo da Federação Nacional do Fisco Estadual e Distrital (Fenafisco) revela que as renúncias fiscais estaduais aumentaram triplicando de R$ 88 bilhões em 2015 para uma estimativa de R$ 267 bilhões em 2025. No entanto, a transparência dessas renúncias não acompanhou o crescimento.", "titulo_pt": "Opacidade das renúncias fiscais estaduais", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 55129, "titulo": "Influenciador vira réu por dizer que pobres não deveriam votar", "url": "https://www.poder360.com.br/poder-justica/influenciador-vira-reu-por-dizer-que-pobres-nao-deveriam-votar/", "fonte_id": "poder360", "data_pub": "2026-07-17T01:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O juiz proibiu Leonardo Marcondes de fazer novas publicações preconceituosas, mas negou o pedido para remover seu perfil nas redes sociais. Marcondes é acusado por ter dito que os pobres não deveriam votar.", "titulo_pt": "Influenciador vira réu após afirmar que pobres não deveriam votar", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 55161, "titulo": "Comissões do Congresso cobram negociação e criticam reciprocidade aos EUA", "url": "https://www.cnnbrasil.com.br/politica/comissoes-do-congresso-cobram-negociacao-e-criticam-reciprocidade-aos-eua/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T01:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Comissões do Congresso pressionam por negociações e criticam a reciprocidade com os EUA. O governo afirma ter tratado sobre tarifas com os Estados Unidos, mas o presidente Lula nega qualquer justificativa para as sobretaxas impostas pelo presidente Trump.", "titulo_pt": "Comissões do Congresso cobram negociação e criticam reciprocidade aos EUA", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 55082, "titulo": "PGE-RJ cobra Grupo Master por prejuízo de R$ 640 mi ao Rioprevidência", "url": "https://www.cartacapital.com.br/justica/pge-rj-cobra-grupo-master-por-prejuizo-de-r-640-mi-ao-rioprevidencia/", "fonte_id": "cartacapital", "data_pub": "2026-07-17T01:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Procuradoria Geral de Estado do Rio de Janeiro (PGE-RJ) está cobrando o Grupo Master por um prejuízo no valor de R$ 640 milhões ao fundo de investimento Rioprevidência. As ações focam em investimentos realizados em dois fundos vinculados ao Grupo Master: Revolution e Texas I FIA.", "titulo_pt": "PGE-RJ cobra Grupo Master por prejuízo de R$ 640 mi ao Rioprevidência", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 55165, "titulo": "Flávio diz que defender mulher é pauta da direita e anuncia propostas; veja", "url": "https://www.cnnbrasil.com.br/politica/flavio-diz-que-defender-mulher-e-pauta-da-direita-e-anuncia-propostas-veja/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T01:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio defendeu a pauta feminina ao lado de Daniella Marques, apresentando o projeto 'Brasil por Elas', que se concentra em autonomia e proteção para mulheres. Ele afirmou que defender mulheres é uma questão da direita e anunciou novas propostas nessa área.", "titulo_pt": "Flávio defende pauta feminina como questão de direita e apresenta propostas", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 55267, "titulo": "Esquerda precisa disputar hegemonia, não só eleição, afirma historiador e cientista político", "url": "https://www.brasildefato.com.br/podcast/brasil-de-fato-entrevista/2026/07/16/esquerda-precisa-disputar-hegemonia-nao-so-eleicao-afirma-historiador-e-cientista-politico/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-17T01:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O livro 'Ideias para Renovar as Esquerdas', de Juliano Medeiros, sugere que a esquerda deve se concentrar na construção de uma hegemonia ideológica além das eleições. O autor argumenta que o objetivo é formar uma maioria social que adote a visão de mundo da esquerda.", "titulo_pt": "Esquerda precisa disputar hegemonia, não só eleição, afirma historiador e cientista político", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 55170, "titulo": "Governo amplia Move Brasil e passa a permitir compra de carros seminovos", "url": "https://www.cnnbrasil.com.br/auto/governo-amplia-move-brasil-e-passa-a-permitir-compra-de-carros-seminovos/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T01:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O programa Move Brasil foi ampliado para incluir a compra de carros seminovos além dos veículos novos. Lançado em junho deste ano, o programa prevê até R$ 30 bilhões em financiamentos para motoristas de aplicativo, taxistas e entregadores.", "titulo_pt": "Governo amplia Move Brasil permitindo compra de carros seminovos", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 55190, "titulo": "Flávio: “estancar Michelle”? Chamem-se Lacan e Santa Lee ou a Polícia?", "url": "https://www.metropoles.com/colunas/reinaldo-azevedo/flavio-estancar-michelle-chamem-se-lacan-e-santa-lee-ou-a-policia", "fonte_id": "metropoles", "data_pub": "2026-07-17T01:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto discute a fala do Zero Um com perspectivas de um dicionarista, um psicanalista e uma figura religiosa. Não há uma hipótese válida sobre o assunto, mas uma das fontes mencionadas mantém-se envolvida no caso.", "titulo_pt": "Flávio: 'estancar Michelle'? Chame-se Lacan, Santa Lee ou Polícia?", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 56222, "titulo": "Trump Still Hasn’t Found What He’s Looking For", "url": "https://www.theatlantic.com/politics/2026/07/trump-election-fraud-speech/687950/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-07-17T04:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O discurso presidencial na faixa de tempo de maior audiência não demonstrou o que o presidente buscava, segundo a matéria.", "titulo_pt": "Trump ainda não encontrou o que procura", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 56193, "titulo": "He Was a Russian Political Survivor, Until the Masked Men Appeared", "url": "https://www.nytimes.com/2026/07/17/world/europe/russia-politics-election-nadezhdin.html", "fonte_id": "nyt_world", "data_pub": "2026-07-17T04:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Boris B. Nadezhdin, um contrarrevolucionário aberto da guerra na Ucrânia, afirma que sabe o motivo do seu detenção: “Na nossa liderança há pânico e caos”.", "titulo_pt": "Ele era um sobrevivente político russo, até os homens mascarados apareceram", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 56194, "titulo": "How Andy Burnham Becomes Britain’s New Prime Minister", "url": "https://www.nytimes.com/2026/07/17/world/europe/burnham-prime-minister-explainer.html", "fonte_id": "nyt_world", "data_pub": "2026-07-17T04:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Andy Burnham está programado para oficialmente se tornar o próximo primeiro-ministro da Grã-Bretanha na próxima segunda-feira, mas vários eventos ainda precisam ocorrer antes disso. A seguir está como tudo isso deve acontecer conforme as expectativas atuais.", "titulo_pt": "Como Andy Burnham vai se tornar o novo primeiro-ministro da grã-bretanha", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 56244, "titulo": "Abdul El-Sayed on AIPAC spending, ‘Defund the Police’ and why he’s not a socialist", "url": "https://www.politico.com/video/2026/07/16/abdul-el-sayed-on-aipac-spending-defund-the-police-and-why-hes-not-a-socialist-2121739", "fonte_id": "politico", "data_pub": "2026-07-17T03:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Abdul El-Sayed discursou sobre o gasto da AIPAC, a proposta de 'Desfinanciar a Polícia' e explicou por que ele não se considera socialista.", "titulo_pt": "Abdul El-Sayed sobre gastos da AIPAC, 'desfinanciar a polícia' e sua posição política", "veiculo": "Politico", "pais": "EUA", "classe": "A"}, {"id": 56261, "titulo": "Trump revives claims of election interference during address to nation", "url": "http://www.euronews.com/2026/07/17/trump-revives-claims-of-election-interference-during-address-to-nation", "fonte_id": "euronews", "data_pub": "2026-07-17T03:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente dos Estados Unidos, Trump, afirmou que desclassificará dados de inteligência que sugerem que a China adquiriu ilegalmente 220 milhões de arquivos eleitorais americanos. Sua afirmação contradiz investigações que não encontraram evidências de interferência nas eleições passadas.", "titulo_pt": "Trump reaviva acusações de interferência eleitoral durante discurso à nação", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 56254, "titulo": "Japan changes imperial succession law but keeps ban on female emperor", "url": "https://www.france24.com/en/asia-pacific/20260717-japan-imperial-succession-law-female-emperor-ban", "fonte_id": "france24", "data_pub": "2026-07-17T03:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A parlamênto japonês aprovou mudanças nas regras de sucessão imperial, permitindo que parentes masculinos distantes se integrem à família real e que mulheres mantenham seu status real após casarem-se com cidadãos comuns. No entanto, o banimento de mulheres como imperatrizes permanece, apesar do apoio público expressivo a essa mudança.", "titulo_pt": "Japão altera regras de sucessão imperial mas mantém proibição de rainhas", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 56224, "titulo": "Trump Dooms His Own Party", "url": "https://www.theatlantic.com/ideas/2026/07/trump-message-despair/687951/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-07-17T03:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A mensagem egoísta do presidente não beneficiará os republicanos nas urnas.", "titulo_pt": "Trump destroi sua própria parte", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 56285, "titulo": "Giappone rivede legge imperiale, successione solo agli uomini", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/17/giappone-rivede-legge-imperiale-successione-solo-agli-uomini_b0650b1e-e7fc-4204-adb5-fc9f05510af6.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-17T03:26:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O Parlamento japonês aprovou uma modificação na lei imperial que exclui ainda mais as mulheres da sucessão ao trono. A exclusão das mulheres como herdeiras presenças permanece inalterada.", "titulo_pt": "Japão revisa lei imperial, mantendo sucessão masculina", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 56255, "titulo": "China's Xi urges global cooperation on AI, warns against single-country dominance", "url": "https://www.france24.com/en/asia-pacific/20260717-china-s-xi-urges-global-cooperation-on-ai-warns-against-single-country-dominance", "fonte_id": "france24", "data_pub": "2026-07-17T03:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente chinês Xi Jinping enfatizou a necessidade de cooperação internacional na desenvolvimento e governança da inteligência artificial, alertando contra o domínio desta tecnologia por qualquer país. Suas declarações ocorreram em um importante evento em Shanghai, quando empresas chinesas de AI competem com as americanas e crescem preocupações sobre o uso militar, cibernético e terrorista dessa tecnologia.", "titulo_pt": "Xi jinping chama pela cooperação internacional na AI e alerta contra domínio unilateral", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 56143, "titulo": "Trump acusa a Venezuela de intentar alterar los resultados electorales mediante urnas electrónicas", "url": "https://elpais.com/internacional/2026-07-17/trump-acusa-a-venezuela-de-intentar-alterar-los-resultados-electorales-mediante-urnas-electronicas.html", "fonte_id": "elpais_america", "data_pub": "2026-07-17T03:12:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Trump acusa a Venezuela de tentar alterar os resultados eleitorais por meio de urnas eletrônicas. Um relatório da CIA não confirmou um fraude eletrônica em massa nas eleições venezuelanas de 2020.", "titulo_pt": "Trump acusa Venezuela de tentar manipular resultados eleitorais com urnas eletrônicas", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 56249, "titulo": "More than 500 Rohingya vanished at sea - what happened?", "url": "https://www.bbc.co.uk/news/articles/cr59n096mrmo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-17T03:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Duas embarcações transportando aproximadamente 530 rohingyas desapareceram desde que saíram da Myanamar no dia 29 de junho.", "titulo_pt": "Mais de 500 rohingyas desapareceram no mar - o que aconteceu?", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 56136, "titulo": "Hugo defende uso da Lei da Reciprocidade contra novo tarifaço dos EUA", "url": "https://www.cnnbrasil.com.br/politica/hugo-defende-uso-da-lei-da-reciprocidade-contra-novo-tarifaco-dos-eua/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T03:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente da Câmara dos Deputados criticou a decisão do governo dos Estados Unidos de aplicar tarifas adicionais aos produtos brasileiros e afirmou que barreiras comerciais não devem ser usadas como instrumento político.", "titulo_pt": "Hugo defende uso da Lei da Reciprocidade contra novo tarifaço dos EUA", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 56289, "titulo": "China lauds Papua New Guinea over decision to shut Taiwan office", "url": "https://www.japantimes.co.jp/news/2026/07/17/asia-pacific/papua-new-guinea-taiwan-office/", "fonte_id": "japan_times", "data_pub": "2026-07-17T03:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A repúblicaTaiwanela ministra dos negócios estrangeiros disse que a decisão foi tomada sem consultá-los e protocolaram uma protesto formal com Papuá-Nova Guiné. A delegação taiwanesa continuou suas operações normais.", "titulo_pt": "China elogia papuá-nova Guiné por fechar escritório de Taiwan", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 56123, "titulo": "EUA conclui 6ª noite de ataques consecutivos ao Irã", "url": "https://www.metropoles.com/mundo/eua-conclui-6a-noite-ataques-ira", "fonte_id": "metropoles", "data_pub": "2026-07-17T03:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Autoridades iranianas relatam que os ataques dos Estados Unidos nos últimos seis dias causaram mais de 35 mortes. Os EUA continuam com ataques consecutivos ao Irã por sexta noite seguida.", "titulo_pt": "EUA concluem 6ª noite consecutiva de ataques ao Irã", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 56215, "titulo": "Geopolítica nacional: una oportunidad para desplegar nuestra estrategia", "url": "https://www.lanacion.com.ar/opinion/geopolitica-nacional-una-oportunidad-para-desplegar-nuestra-estrategia-nid17072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-17T03:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "É necessário que a Argentina se alinhe internamente em algumas políticas de Estado, aquelas que não dependem dos caprichos do momento.", "titulo_pt": "Geopolítica nacional: uma oportunidade para definir nossa estratégia", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 56251, "titulo": "Trump threatens TV broadcast licenses after networks skip speech", "url": "https://www.axios.com/2026/07/17/trump-speech-tv-broadcast-licenses", "fonte_id": "axios", "data_pub": "2026-07-17T02:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Trump ameaçou revogar as licenças de transmissão da ABC e NBC após essas redes decidirem não interromper seus programas programados regularmente para cobrir sua fala sobre integridade das eleições. Isso pode ter consequências significativas para o negócio, já que a FCC já está investigando as emissoras por supostamente violar os padrões de interesse público.", "titulo_pt": "Trump ameaça revogar licenças de transmissão após redes evitar cobertura", "veiculo": "Axios", "pais": "EUA", "classe": "B"}], "mundo__eventos": [], "economia": [{"id": 56272, "titulo": "India's biggest IPO this year rakes in bids worth $31 billion, powered by institutional frenzy", "url": "https://www.cnbc.com/2026/07/17/indias-biggest-ipo-this-year-rakes-in-bids-worth-31-billion-powered-by-institutional-frenzy.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-17T03:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A IPO da maior gestora de ativos da Índia encerrou na quinta-feira, recebendo propostas significativas de investidores institucionais. O valor total das propostas superou 31 bilhões de dólares.", "titulo_pt": "IPO da maior gestora de ativos da Índia atraiu propostas no valor de 31 bilhões de dólares", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 54978, "titulo": "Não fossem mudanças climáticas, renda do agro seria R$ 200 bi maior", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/braulio-borges/2026/07/nao-fossem-mudancas-climaticas-renda-do-agro-seria-r-200-bi-maior.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo do BID, realizado por Steven Helfand e colaboradores, analisou a produtividade da agropecuária brasileira. O relatório sugere que as mudanças climáticas poderiam ter resultado em uma renda adicional de R$ 200 bilhões para o setor agrícola.", "titulo_pt": "Se não fossem as mudanças climáticas, renda do agro seria R$ 200 bi maior", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 55731, "titulo": "SMBC bolsters global sales and trading push with macro hire", "url": "https://www.japantimes.co.jp/business/2026/07/17/companies/smbc-hire-global-sales/", "fonte_id": "japan_times", "data_pub": "2026-07-17T01:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A SMBC contratou Kunal Maini, que anteriormente era o chefe de negócios fixos renda, moedas e commodities da América do Norte na BNP Paribas, para fortalecer suas operações globais de vendas e trading.", "titulo_pt": "SMBC reforça sua estratégia global de vendas e trading com nova contratação", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 55632, "titulo": "Oil rises as Iran threatens retaliation if Trump targets country's critical infrastructure", "url": "https://www.cnbc.com/2026/07/17/oil-price-today-brent-wti.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-17T01:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os preços do petróleo subiram na sexta-feira à medida que investidores avaliavam ameaças crescentes entre Estados Unidos e Irã. O Irã ameaçou retaliar se os EUA alvejarem infraestrutura crítica do país.", "titulo_pt": "Preços do petróleo sobem diante de ameaças entre EUA e Irã", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 55914, "titulo": "China auto sales slump deepens as exports face rising trade scrutiny", "url": "https://www.digitimes.com/news/a20260717PD202/sales-market-exports-vehicle-2026.html", "fonte_id": "digitimes", "data_pub": "2026-07-17T01:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O mercado de veículos leves na China registrou o maior declínio nos últimos anos no primeiro semestre de 2026, com as vendas de carros particulares caindo 20% em comparação com o mesmo período do ano anterior. As exportações passaram a ser o principal suporte para as montadoras, mas também expuseram o setor a riscos geopolíticos crescentes.", "titulo_pt": "Vendas de automóveis da china declinam fortemente e exportações se tornam principal apoio", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 55064, "titulo": "As medidas que podem ajudar um dos setores mais afetados pelo tarifaço", "url": "https://veja.abril.com.br/economia/as-medidas-que-podem-ajudar-um-dos-setores-mais-afetados-pelo-tarifaco/", "fonte_id": "veja", "data_pub": "2026-07-17T01:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A diretora de Comércio Exterior da Abimaq analisa os desafios causados pelas novas tarifas e discute possíveis caminhos sugeridos pela indústria.", "titulo_pt": "Medidas para ajudar setor afetado pelo tarifaço", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 55191, "titulo": "Caixa muda dia de sorteios das loterias dos fins de semana. Entenda", "url": "https://www.metropoles.com/brasil/caixa-muda-dia-de-sorteios-das-loterias-dos-fins-de-semana-entenda", "fonte_id": "metropoles", "data_pub": "2026-07-17T00:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Caixa alterou a data dos sorteios das loterias aos fins de semana, transferindo-os para domingos a partir do dia 19 de julho de 2026. Antes, os concursos ocorriam aos sábados.", "titulo_pt": "Caixa muda dia dos sorteios de loterias aos fins de semana", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 54980, "titulo": "Ações da dona do Taco Bell caem após notícia sobre investigação por surto de ciclosporíase nos EUA", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/acoes-da-dona-do-taco-bell-caem-apos-noticia-sobre-investigacao-por-surto-de-ciclosporiase-nos-eua.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T00:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As ações da Yum Brands, empresa detentora do Taco Bell, caíram desde terça-feira após uma reportagem indicar que autoridades dos EUA estavam investigando se a alface servida na rede poderia estar relacionada a um surto de ciclosporíase.", "titulo_pt": "Ações da yum brands declinam após investigação sobre surto de ciclosporíase em Taco Bell", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 55065, "titulo": "Como Brasil pode aumentar seu poder de barganha em meio ao tarifaço dos EUA", "url": "https://veja.abril.com.br/economia/como-brasil-pode-aumentar-seu-poder-de-barganha-em-meio-ao-tarifaco-dos-eua/", "fonte_id": "veja", "data_pub": "2026-07-17T00:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um representante da Confederação Nacional da Indústria (CNI) analisa as estratégias possíveis para o Brasil aumentar sua influência no cenário comercial diante do aumento das tarifas imposto pelos Estados Unidos. O estudo aborda os efeitos dessas medidas sobre a indústria brasileira.", "titulo_pt": "Como o Brasil pode ampliar seu poder de barganha frente ao tarifaço dos EUA", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 55634, "titulo": "Seven & i shares jump 4% on report of stake talks with Polish convenience chain Zabka", "url": "https://www.cnbc.com/2026/07/17/seven-i-zabka-investment-poland.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-17T00:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações da Seven & i Holdings subiram 4% após um relatório do Nikkei indicar que haveria negociações sobre aquisição de stake na Zabka Group, uma cadeia de conveniência polonesa.", "titulo_pt": "Ações da seven & i sobem 4% com relatório sobre negociação de stake com a Zabka", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 55179, "titulo": "Novo tarifaço: Setor químico estima gasto extra de US$ 66 milhões em 2026", "url": "https://www.cnnbrasil.com.br/economia/negocios/novo-tarifaco-setor-quimico-estima-gasto-extra-de-us-66-milhoes-em-2026/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T00:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O setor químico estima um gasto extra de US$ 66 milhões em 2026. Entre os produtos mais impactados estão tintas, vernizes e lacas; fibras têxteis sintéticas; e sabões, detergentes e produtos de perfumaria.", "titulo_pt": "Novo tarifaço: setor químico estima gasto extra de US$ 66 milhões em 2026", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 55760, "titulo": "Cabinet okays new housing loan plan", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/17/2003860899", "fonte_id": "taipei_times", "data_pub": "2026-07-17T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O gabinete aprovou um novo plano de financiamento imobiliário.", "titulo_pt": "Gabinete aprova novo plano de financiamento imobiliário", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 55767, "titulo": "Economy to stay strong: banks", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/17/2003860862", "fonte_id": "taipei_times", "data_pub": "2026-07-17T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A economia manter-se-á forte de acordo com as instituições financeiras.", "titulo_pt": "Economia manter-se-á forte: bancos", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 55769, "titulo": "South Korea to pause listings of single-stock ETFs", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/17/2003860864", "fonte_id": "taipei_times", "data_pub": "2026-07-17T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Coreia do Sul planeja pausar as listagens de ETFs individuais de ações. A decisão visa melhorar a transparência e a competitividade dos produtos financeiros no país.", "titulo_pt": "Coreia do sul vai pausar listagem de ETFs individuais de ações", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 55637, "titulo": "One of China's top investors says finance, not AI, is the country's biggest bottleneck", "url": "https://www.cnbc.com/2026/07/17/primavera-capital-fred-hu-china-economy-wall-street-finance-private-equity-.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-16T23:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Fred Hu, fundador da Primavera Capital, afirma que finanças são o principal obstáculo para China em uma longa rivalidade com os Estados Unidos. Segundo ele, os Estados Unidos têm o mercado de capitais mais profundo do mundo.", "titulo_pt": "Um dos principais investidores chineses diz que finanças, e não IA, são o maior gargalo do país", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 54981, "titulo": "Moody's rebaixa nota da Cosan e mantém perspectiva negativa", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://aovivo.folha.uol.com.br/mercado/2026/07/01/6533-dolar-empresas-e-bolsas-acompanhe-ao-vivo-o-mercado.shtml#post466177", "fonte_id": "folha_mercado", "data_pub": "2026-07-16T23:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A agência de classificação de risco Moody's rebaixou o rating corporativo da Cosan e as notas sênior sem garantia da Cosan Overseas. A classificação foi alterada de Ba3 para B1.", "titulo_pt": "Moody's rebaixa nota da Cosan e mantém perspectiva negativa", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 56284, "titulo": "Xi lays out China’s global AI leadership ambitions", "url": "https://www.ft.com/content/ddb316b4-c6ae-4b9b-9d4a-63d63201d4fc?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-17T03:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente chinês Xi Jinping estabeleceu aspirações para a liderança global da China em inteligência artificial. A capital Beijing busca fortalecer sua influência sobre os padrões tecnológicos.", "titulo_pt": "Xi define ambições de liderança global da China em IA", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 56314, "titulo": "Tata's India chip debut reportedly to lean on 90nm, a humbler start than its 28nm pledge", "url": "https://www.digitimes.com/news/a20260717VL209/tata-group-28nm-90nm-wafer-fab-technology.html", "fonte_id": "digitimes", "data_pub": "2026-07-17T03:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A primeira fábrica de wafers em larga escala da Índia começará a produzir usando tecnologia 90nm, ao invés do 28nm anunciado publicamente pela empresa Tata. Isso reflete o desafio que a Índia enfrenta para construir sua própria indústria de chips, mesmo com novos investimentos bilionários do governo.", "titulo_pt": "Debuto da chipografia na Índia usará tecnologia 90nm em vez do 28nm prometido pela tata", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 56315, "titulo": "Nvidia unveils Thor-based modules for robots and edge AI", "url": "https://www.digitimes.com/news/a20260716PR202/nvidia-hardware-commercial-launch-demand.html", "fonte_id": "digitimes", "data_pub": "2026-07-17T03:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Nvidia lançou novos módulos baseados no Thor projetados para alimentar robôs e máquinas autônomas à medida que elas se expandem para uso comercial mais amplo. O lançamento reflete a crescente demanda global por hardware de IA compacto e eficiente que pode executar modelos fundamentais avançados localmente, auxiliando as empresas na implementação de sistemas mais inteligentes com menor latência e menor dependência da nuvem.", "titulo_pt": "Nvidia apresenta módulos baseados no thor para robôs e IA em bordo", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 56316, "titulo": "SK Group chair floats 'memory as a service' model for SK Hynix", "url": "https://www.digitimes.com/news/a20260716VL226/sk-group-sk-hynix-chairman-infrastructure-manufacturing.html", "fonte_id": "digitimes", "data_pub": "2026-07-17T03:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O chairman do SK Group, Chey Tae-won, sugeriu um modelo de 'memória como serviço' para a SK Hynix, indicando que a empresa precisa desenvolver um negócio com maior valor além da fabricação e venda de chips.", "titulo_pt": "SK Group sugere modelo 'memória como serviço' para SK Hynix", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 56317, "titulo": "Exclusive: PC brands reportedly rush to secure CXMT memory as orders extend to end-2027", "url": "https://www.digitimes.com/news/a20260717PD219/cxmt-ipo-pc-dram.html", "fonte_id": "digitimes", "data_pub": "2026-07-17T03:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Initial Public Offering (IPO) da fabricante chinesa de DRAM ChangXin Memory Technology (CXMT) está na fase final, gerando grande interesse no mercado. Empresas do setor de PCs estariam correndo para garantir fornecimento de memória CXMT, com encomendas agendadas até o fim de 2027.", "titulo_pt": "Fabricante chinesa de dram entra na fase final da ipo e empresas de pcs pressionam por suprimentos", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 56318, "titulo": "Hygon forecasts higher first-half 2026 revenue and profit", "url": "https://www.digitimes.com/news/a20260717PR202/it-revenue-profit-2026-forecast.html", "fonte_id": "digitimes", "data_pub": "2026-07-17T03:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Hygon Information Technology prevê que seus resultados do primeiro semestre de 2026 aumentarão significativamente, indicando uma demanda continua por processadores nacionais de alta gama devido às tendências de inteligência artificial, computação em nuvem e localização nas cadeias de suprimentos tecnológicas globais. A previsão é preliminar e não auditada.", "titulo_pt": "Hygon projeta aumento expressivo dos resultados do primeiro semestre de 2026", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 56319, "titulo": "TSMC welcomes EMIB relief as MediaTek pressure eases", "url": "https://www.digitimes.com/news/a20260717PD213/tsmc-packaging-mediatek-intel-technology.html", "fonte_id": "digitimes", "data_pub": "2026-07-17T03:35:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente do TSMC, C.C. Wei, declarou em uma chamada de resultados que a empresa bem-vindos a maior flexibilidade na cadeia de suprimentos se mais concorrentes puderem oferecer soluções de embalagem avançadas que atendam às necessidades dos clientes. Ele sugeriu que o crescimento dos clientes já está um pouco limitado devido à capacidade restrita de back-end de embalagem.", "titulo_pt": "TSMC celebra alívio em EMIB com redução da pressão de MediaTek", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 56121, "titulo": "SpaceX cancela voo do Starship após falha", "url": "https://www.metropoles.com/mundo/spacex-cancela-voo-do-starship-apos-falha", "fonte_id": "metropoles", "data_pub": "2026-07-17T03:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A SpaceX cancelou o voo do Starship devido a uma falha, com dois motores a serem substituídos. Uma nova tentativa de lançamento está programada para a próxima semana.", "titulo_pt": "Spacex cancela voo do Starship após falha", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 56320, "titulo": "TSMC boosts US manufacturing as Taiwan chip designers wait on moving production", "url": "https://www.digitimes.com/news/a20260717PD217/tsmc-production-manufacturing-taiwan-ic-design.html", "fonte_id": "digitimes", "data_pub": "2026-07-17T03:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A TSMC anunciou oficialmente em 16 de julho que investirá adicionalmente US$100 bilhões nos Estados Unidos, financiando várias fábricas de wafers de 2nm e tecnologias mais avançadas para suprir a forte demanda de grandes clientes americanos. A empresa também planeja construir plantas de embalagem avançada.", "titulo_pt": "TSMC aumenta produção nos EUA enquanto designers de chips taiwaneses aguardam", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 56321, "titulo": "TSMC's US$100 billion bet: AI growth, US pressure and the cost of staying ahead", "url": "https://www.digitimes.com/news/a20260717PD210/tsmc-manufacturing-ai-usa-cost-growth.html", "fonte_id": "digitimes", "data_pub": "2026-07-17T02:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A TSMC apresentou resultados de lucro recorde no segundo trimestre de 2026 e aumentou suas projeções de receita para o ano, projetando um crescimento superior a 40%. A empresa também elevou sua previsão de gastos de capital para US$ 60-64 bilhões em 2026. No entanto, os investidores se concentraram mais na perspectiva mais fraca da margem bruta para o terceiro trimestre, no investimento adicional de US$ 100 bilhões planejado para a Arizona e na estratégia global de produção em evolução.", "titulo_pt": "Aposta de US$ 100 bilhões da tsmc: crescimento do AI, pressão dos EUA e custos para se manter à frente", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 56290, "titulo": "India’s space sector takes off as private rocket readies launch", "url": "https://www.japantimes.co.jp/news/2026/07/17/asia-pacific/science-health/india-private-rocket-readies-launch/", "fonte_id": "japan_times", "data_pub": "2026-07-17T02:43:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O setor espacial indiano expandiu rapidamente desde que o setor foi aberto para investimentos privados em 2020, atingindo um valor de mercado de US$ 8,4 bilhões.", "titulo_pt": "Setor espacial do Brasil decola com lançamento de foguete privado programado", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 56311, "titulo": "What Mirae Asset's Korbit acquisition means for Korea", "url": "https://www.koreaherald.com/article/10811962", "fonte_id": "korea_herald", "data_pub": "2026-07-17T02:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mirae Asset Financial Group adquiriu a exchange de criptomoedas Korbit, sendo esta a primeira aquisição de uma plataforma de ativos digitais por um grupo financeiro na Coreia do Sul. A transação indica que as reguladoras estão cada vez mais dispostas a permitir que grupos financeiros tradicionais expandam seus negócios para incluir ativos digitais.", "titulo_pt": "O que a aquisição da Korbit pela Mirae Asset significa para a Coreia do sul", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 56322, "titulo": "EU orders Google to open Android AI features, share Search data with rivals under DMA", "url": "https://www.digitimes.com/news/a20260717VL204/google-android-ai-data-european-commission.html", "fonte_id": "digitimes", "data_pub": "2026-07-17T02:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Comissão Europeia ordenou que a Google abra recursos-chave do Android para assistentes de inteligência artificial concorrentes e compartilhe parte dos dados da pesquisa do Google com outros motores de busca, como parte das medidas mais significativas até agora para limitar o poder de mercado das grandes tecnológicas sob a Digital Markets Act (DMA).", "titulo_pt": "Ue ordena que Google abra recursos Android e compartilhe dados de pesquisa com concorrentes", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 56323, "titulo": "Microsoft reportedly readies AI-powered security tool to automate bug hunting and remediation", "url": "https://www.digitimes.com/news/a20260717VL206/microsoft-ai-cybersecurity-software-anthropic.html", "fonte_id": "digitimes", "data_pub": "2026-07-17T02:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Microsoft estaria preparando um novo produto de segurança cibernética baseado em IA para identificar vulnerabilidades em software e corrigi-las automaticamente. A empresa expandiria seus esforços na segurança empresarial impulsionada por inteligência artificial.", "titulo_pt": "Microsoft planeja lançar produto de segurança cibernética com IA para automatizar busca e correção de bugs", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 56291, "titulo": "Chipmaker Kioxia’s market value halves from peak on AI selloff", "url": "https://www.japantimes.co.jp/business/2026/07/17/companies/kioxia-market-value-halves/", "fonte_id": "japan_times", "data_pub": "2026-07-17T02:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa de fabricação de chips Kioxia viu seu valor de mercado cair pela metade desde o pico, devido à venda de ações relacionada à inteligência artificial. Investidores estão examinando mais cuidadosamente as empresas de chip globalmente, questionando se os lucros esperados com gastos em IA justificam suas altas avaliações.", "titulo_pt": "Valor de mercado da Kioxia cai pela metade em vendas relacionadas à AI", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 56324, "titulo": "Japan steps up sovereign AI ambitions as Noetra launches multimodal AI project, plans infrastructure of 27,500 Nvidia Rubin GPUs", "url": "https://www.digitimes.com/news/a20260717PR204/japan-ai-development-infrastructure.html", "fonte_id": "digitimes", "data_pub": "2026-07-17T02:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa Noetra iniciou um projeto de R&D completo para uma base multimodal de IA desenvolvida no Japão, que pode moldar o futuro da robótica de IA, automação industrial e AI física. Este movimento reflete a intenção do Japão em promover a soberania na IA, com implicações na construção e controle de infraestrutura e dados avançados de IA por países.", "titulo_pt": "Japão intensifica esforços para IA autônoma com projeto da Noetra usando 27.500 GPUs Nvidia Rubin", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 56330, "titulo": "A Tide-Fueled Trove of Biodiversity in Guinea-Bissau", "url": "https://science.nasa.gov/earth/earth-observatory/a-tide-fueled-trove-of-biodiversity-in-guinea-bissau/", "fonte_id": "nasa_news", "data_pub": "2026-07-17T04:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As vastas manguezais, praias arenosas e planícies de lama do arquipélago Bijagós abrigam uma diversidade de aves migratórias e numerosas tartarugas marinhas.", "titulo_pt": "Um acervo de biodiversidade movido por marés em guiné-bissau", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 56326, "titulo": "Bones reveal ancient Egyptian princesses born 4,000 years ago used weapons", "url": "https://phys.org/news/2026-07-bones-reveal-ancient-egyptian-princesses.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um reassessment de cinco mummificações reais de mulheres do Reino Médio revelou que algumas princesas enterradas com armas podem ter usado essas armas. Durante décadas, os cientistas discutiram se as armas encontradas nos túmulos dessas princesas eram simbólicas ou ferramentas práticas.", "titulo_pt": "Ossos revelam que princesas egípcias antigas usavam armas há 4.000 anos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 56329, "titulo": "Ancient Egyptian princesses knew their way around weapons of war", "url": "https://www.sciencenews.org/article/ancient-egyptian-princesses-weapons-war", "fonte_id": "science_news", "data_pub": "2026-07-17T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo de seis momífiados egípcios antigos desafia a ideia de que arcos e facas enterradas com algumas rainhas eram apenas cerimoniais. Os artefatos militares encontrados sugerem que as princesas egípcias tinham conhecimento sobre o uso de armas de guerra.", "titulo_pt": "Princesas egípcias antigas sabiam usar armas de guerra", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 56331, "titulo": "Ancient Egyptian princesses buried with weapons may have been fighters", "url": "https://www.newscientist.com/article/2579773-ancient-egyptian-princesses-buried-with-weapons-may-have-been-fighters/?utm_campaign=RSS|NSNS&utm_content=home&utm_medium=RSS&utm_source=NSNS", "fonte_id": "new_scientist", "data_pub": "2026-07-17T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Morfologias ósseas encontradas nos cadáveres mumificados das filhas dos faraós, que viveram há milhares de anos, indicam que elas podem ter lutado com arcos e facas. Esses achados sugerem que as princesas egípcias poderiam ter sido guerreiras.", "titulo_pt": "Princesas egípcias antigas enterradas com armas podem ter sido lutas", "veiculo": "New Scientist", "pais": "Reino Unido", "classe": "B"}, {"id": 56327, "titulo": "EU's AI 'guardrails' cannot absorb rapid changes in technology, study warns", "url": "https://phys.org/news/2026-07-eu-ai-guardrails-absorb-rapid.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T03:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma nova pesquisa publicada na Big Data & Society alerta que as 'guardrails' estabelecidas pela União Europeia para regular a inteligência artificial não são ambiciosas o suficiente e estão mal executadas, tornando-se pesadas demais para adaptar-se às rápidas mudanças tecnológicas.", "titulo_pt": "Estudo avisa que 'guardrails' da ue para a IA não conseguem absorver mudanças rápidas na tecnologia", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 56328, "titulo": "Golf generates nearly €630 million in societal benefits in Finland", "url": "https://phys.org/news/2026-07-golf-generates-million-societal-benefits.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T02:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo publicado na Frontiers in Sports and Active Living indica que os jogadores de golfe finlandeses gastam aproximadamente €330 milhões por ano no esporte, gerando benefícios sociais estimados em cerca de €630 milhões.", "titulo_pt": "Golfe gera quase €630 milhões em benefícios sociais na finlândia", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 55930, "titulo": "UN report offers roadmap for sustainable blue economies", "url": "https://phys.org/news/2026-07-roadmap-sustainable-blue-economies.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T01:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um relatório da ONU, co-escrito por pesquisadores da Universidade de Portsmouth, oferece um guia prático para o desenvolvimento de economias azuis sustentáveis. A pressão crescente de poluição, mudanças climáticas e perda de biodiversidade sobre os ecossistemas marinhos e fluviais que suportam bilhões de pessoas e uma economia oceanográfica global avaliada em US$ 2,2 trilhões fornece o contexto para a necessidade deste guia.", "titulo_pt": "Relatório da ONU oferece roteiro para economias azuis sustentáveis", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 55931, "titulo": "PathSay Project uses AI to cross language barriers", "url": "https://phys.org/news/2026-07-pathsay-ai-language-barriers.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T01:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores e estudantes da Brigham Young University estão trabalhando no projeto Pathsay para coletar dados de áudio e texto de línguas com baixa recursos, com o objetivo de preservar a herança linguística e melhorar o acesso a ferramentas de tradução para comunidades frequentemente negligenciadas pela tecnologia mainstream.", "titulo_pt": "Projeto pathsay usa IA para superar barreiras lingüísticas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 55932, "titulo": "For older women, water offers more than just physical health benefits", "url": "https://phys.org/news/2026-07-older-women-physical-health-benefits.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T00:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Áustria sugere que a água desempenha um papel mais complexo e profundo na vida de mulheres idosas do que se pensava anteriormente.", "titulo_pt": "Água oferece benefícios além da saúde física para mulheres idosas, sugere áustria", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 55933, "titulo": "Researchers discover rare freshwater mussels in Moosup River", "url": "https://phys.org/news/2026-07-rare-freshwater-mussels-moosup-river.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores da Universidade do Rhode Island descobriram uma comunidade de conchas d'água doce no Rio Moosup recentemente. Este foi o primeiro registro documentado desses moluscos na bacia hidrográfica em mais de 30 anos, incluindo espécies nativas raras consideradas indicadores sensíveis da saúde do rio.", "titulo_pt": "Pesquisadores descobrem conchas d'água doce raras no rio Moosup", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 56129, "titulo": "Surto de diarreia nos EUA pode ser maior do que os números indicam", "url": "https://exame.com/ciencia/surto-de-diarreia-nos-eua-pode-ser-maior-do-que-os-numeros-indicam/", "fonte_id": "exame", "data_pub": "2026-07-16T23:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Especialistas alertam que a infecção por Cyclospora pode estar sendo subdiagnosticada e contaminar alimentos frescos em várias regiões dos Estados Unidos.", "titulo_pt": "Surto de diarreia nos EUA pode ser maior do que os números indicam", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 55780, "titulo": "Chinese scientists have bad news on having babies in space. But there is a silver lining", "url": "https://www.scmp.com/news/china/science/article/3360680/chinese-scientists-have-bad-news-having-babies-space-there-silver-lining?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-16T23:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo realizado por cientistas chineses descobriu que células reprodutivas humanas não se desenvolvem tão bem no espaço quanto na Terra. Isso sugere que a perpetuação da espécie humana em outros planetas pode ser mais difícil do que se esperava.", "titulo_pt": "Cientistas chineses trazem notícias ruins sobre ter filhos no espaço, mas há um lado positivo", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 55934, "titulo": "For biodiversity to thrive across Europe, laws should treat wildlife as individuals capable of suffering, experts argue", "url": "https://phys.org/news/2026-07-biodiversity-europe-laws-wildlife-individuals.html", "fonte_id": "phys_org", "data_pub": "2026-07-16T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os especialistas argumentam que os quadros de proteção da biodiversidade na União Europeia e no Reino Unido precisam ser implementados de forma mais forte e consistente, reconhecendo os animais como indivíduos capazes de sofrerem, não apenas como ativos ecológicos.", "titulo_pt": "Para que a biodiversidade floresça na Europa, as leis devem considerar os seres selvagens como indivíduos capazes de sofrer", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [{"titulo": "Spacex cancela lançamento do Starship Flight 13", "sumario": "A SpaceX cancelou o lançamento do teste Starship Flight 13 no dia 16 de julho, quando alguns dos motores do veículo falharam em acender. SpaceX tentou lançar sua nave Starship durante seu trezeavo teste orbital, mas a operação foi abortada imediatamente antes do decolagem. A SpaceX cancelou o lançamento do voo 13 de seu foguete Starship no último segundo na quinta-feira (16 de julho).", "artigos": [{"id": 55974, "titulo": "SpaceX aborts Starship Flight 13 launch attempt", "url": "https://spacenews.com/spacex-aborts-starship-flight-13-launch-attempt/", "fonte_id": "spacenews", "data_pub": "2026-07-17T00:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A SpaceX cancelou o lançamento do teste Starship Flight 13 no dia 16 de julho, quando alguns dos motores do veículo falharam em acender. O voo foi interrompido antes da decolagem.", "titulo_pt": "Spacex cancela lançamento do Starship Flight 13", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 55965, "titulo": "SpaceX’s latest Starship launch attempt ends in a scrub", "url": "https://www.scientificamerican.com/article/spacexs-latest-starship-launch-attempt-ends-in-a-scrub/", "fonte_id": "scientific_american", "data_pub": "2026-07-16T23:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "SpaceX tentou lançar sua nave Starship durante seu trezeavo teste orbital, mas a operação foi abortada imediatamente antes do decolagem.", "titulo_pt": "Último lançamento da Starship da spacex é abortado", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 56006, "titulo": "SpaceX's Starship Flight 13 test launch aborts at last second (video)", "url": "https://www.space.com/space-exploration/launches-spacecraft/spacexs-starship-flight-13-test-launch-aborts-at-last-second-video", "fonte_id": "space_com", "data_pub": "2026-07-16T23:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A SpaceX cancelou o lançamento do voo 13 de seu foguete Starship no último segundo na quinta-feira (16 de julho). Não está claro quando a empresa tentará novamente.", "titulo_pt": "Teste de lançamento do Starship da spacex é abortado no último segundo", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}]}], "cultura": [{"id": 56332, "titulo": "‘I used to do acid on a Wednesday. I don’t have time for that now’: alt-pop star Steve Lacy on his struggle to follow huge hit Bad Habit", "url": "https://www.theguardian.com/music/2026/jul/17/i-used-to-do-acid-on-a-wednesday-i-dont-have-time-for-that-now-alt-pop-star-steve-lacy-on-his-struggle-to-follow-huge-hit-bad-habit", "fonte_id": "guardian_culture", "data_pub": "2026-07-17T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Steve Lacy, um artista de pop alternativo que ganhou uma indicação ao Grammy aos 17 anos e teve um hit número 1 nos EUA, lançou seu novo álbum 'Oh Yeah?' após quatro anos. Durante esse tempo, ele enfrentou trauma e dor emocional que influenciaram o álbum.", "titulo_pt": "Eu usava ácido às terças-feiras. Não tenho mais tempo para isso agora: Steve Lacy sobre sua luta para seguir seu grande sucesso Bad Habit", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 56333, "titulo": "Jesy Nelson: Life Changing review – you just want to reach through the screen and hug the Little Mix star", "url": "https://www.theguardian.com/tv-and-radio/2026/jul/17/jesy-nelson-life-changing-review-prime-video", "fonte_id": "guardian_culture", "data_pub": "2026-07-17T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O documentário começa como uma típica visão sobre a vida de uma celebridade, mas muda drasticamente quando Jesy Nelson, ex-membro do Little Mix, é diagnosticada com um problema sério para seus recém-nascidos gêmeos. A presença das câmeras durante este momento mais difícil da vida dela foi pura coincidência, pois a Prime Video estava apenas documentando sua vida após sair do grupo e o nascimento de suas filhas prematuras.", "titulo_pt": "Jesy Nelson: avaliação transformadora – você quer apenas abraçá-la através da tela", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 56113, "titulo": "Capitã da PM Shiela Barbosa é a vencedora da Casa do Patrão e leva R$ 1,1 milhão", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/televisao/2026/07/capita-da-pm-shiela-barbosa-e-a-vencedora-da-casa-do-patrao-e-leva-r-11-milhao.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-17T03:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A capitã Sheila dos Santos Barbosa, da Polícia Militar, venceu a Casa do Patrão com 64,79% dos votos e recebeu um prêmio de aproximadamente R$ 1,1 milhão.", "titulo_pt": "Capitã da PM sheila Barbosa é a vencedora da Casa do Patrão e leva R$ 1,1 milhão", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 56200, "titulo": "La final “calienta” las redes sociales de dos grandes museos en España y la Argentina: salen a la cancha el Prado y el Malba", "url": "https://www.lanacion.com.ar/cultura/la-final-calienta-las-redes-sociales-de-dos-grandes-museos-en-espana-y-la-argentina-salen-a-la-nid17072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-17T03:32:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Prado e o Malba, dois grandes museus de arte de Espanha e Argentina, participaram da final do Mundial de Futebol ao compartilhar obras alegóricas das suas respectivas coleções baseadas em dez palavras que representam as fortalezas dos seus países.", "titulo_pt": "Final do mundial ‘aquece’ redes sociais com exposição virtual dos museus Prado e Malba", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 56296, "titulo": "Hong Kong taxi driver dies after crashing into railing in Tsuen Wan", "url": "https://www.scmp.com/news/hong-kong/transport/article/3360872/hong-kong-taxi-driver-dies-after-crashing-railing-tsuen-wan?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-17T03:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um motorista de táxi em Hong Kong morreu após o seu veículo colidir com uma grade em Tsuen Wan. De acordo com a polícia, o acidente ocorreu por volta das 23h45 de quinta-feira na Ma Tau Pa Road, quando o condutor perdeu o controle do carro e bateu em uma grade enquanto se dirigia para o Parque Tsuen Wan Riviera.", "titulo_pt": "Taxista morre após colidir com grade em Tsuen Wan", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 56203, "titulo": "Fundaron un restaurante en un pueblo aislado y se convirtió en el atractivo perfecto para escapadas", "url": "https://www.lanacion.com.ar/revista-lugares/fundo-un-restaurante-en-un-pueblo-aislado-y-se-convirtio-en-el-atractivo-perfecto-para-escapadas-nid17072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-17T03:15:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um restaurante foi fundado em um pequeno povoado isolado, se tornando um destino atraente para férias. A cozinha mediterrânea do restaurante, liderada por Franco Malacisa, destaca-se pela sua abordagem lenta e pelo acolhimento familiar.", "titulo_pt": "Eles abriram um restaurante em um vilarejo isolado e transformaram-no em um destino ideal para férias", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 56208, "titulo": "Messi no nos representa", "url": "https://www.lanacion.com.ar/opinion/messi-no-nos-representa-nid17072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-17T03:05:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O texto destaca que Lionel Messi possui características como constância, disciplina, resiliência e humildade, que o tornaram o melhor jogador do mundo. No entanto, questiona-se se essas qualidades são compartilhadas por todos os argentinos ou se servem apenas como modelo a ser seguido com grandes sacrifícios.", "titulo_pt": "Messi não nos representa", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 56211, "titulo": "Abrieron la primera fábrica de cubiertos de plata del país y hoy siguen ligados a la mesa de los argentinos", "url": "https://www.lanacion.com.ar/sabado/abrieron-la-primera-fabrica-de-cubiertos-de-plata-del-pais-y-fueron-pioneros-en-la-innovacion-en-el-nid17072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-17T03:02:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Moisés Perel trouxe do Polônia a arte de fabricar cubiertos, fundando uma empresa familiar que se tornou parte da identidade argentina. A fábrica é a primeira do país e continua sendo usada nas mesas dos argentinos.", "titulo_pt": "Abriram a primeira fábrica de pratos de prata do país e continuam ligados à mesa dos argentinos", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 55003, "titulo": "Terceira temporada de 'A Casa do Dragão' testa a atenção do público", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/colunas/lucianacoelho/2026/07/terceira-temporada-de-a-casa-do-dragao-testa-a-atencao-do-publico.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-17T02:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Casa do Dragão retornou com sua terceira temporada, prometendo mais emoção nos quatro primeiros episódios. No entanto, o público que não acompanhou a obra anteriormente pode encontrar dificuldades em seguir a trama devido ao grande número de personagens e laços familiares complexos.", "titulo_pt": "Terceira temporada de 'A Casa do Dragão' desafia A atenção do público", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 55004, "titulo": "Como a união de Xande de Pilares e Revelação ajudou a redefinir os rumos do pagode", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/07/como-a-uniao-de-xande-de-pilares-e-revelacao-ajudou-a-redefinir-os-rumos-do-pagode.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-17T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Xande de Pilares retornou ao palco como vocalista do Revelação após uma separação de 12 anos. A última vez que ele atuou com o grupo foi em 2014, marcando o fim de uma era bem-sucedida no pagode brasileiro.", "titulo_pt": "Como a união de Xande de Pilares e Revelação ajudou a redefinir os rumos do pagode", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 55006, "titulo": "'Xica da Silva', com Zezé Motta, retorna aos cinemas 50 anos após sucesso original", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/07/xica-da-silva-com-zeze-motta-retorna-aos-cinemas-50-anos-apos-sucesso-original.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-17T02:00:0
