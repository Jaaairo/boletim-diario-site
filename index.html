<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 21/07/2026 01:16 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">

    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">

</div>

<div class="modal-overlay" id="modal-flag">

</div>

<div class="modal-overlay" id="modal-relatorio">

    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "21/07/2026 01:16", "stats": {"noticias_novas": 1216, "resumos_gerados": 262}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O presidente Lula está considerando não participar dos debates com outros candidatos durante o primeiro turno da campanha presidencial, uma decisão que divide a cúpula do PT. Em outro desenvolvimento, Renan Santos oficializou sua candidatura à Presidência pelo partido Missão após receber ameaças de facções criminosas, antecipando a convenção para garantir sua segurança. A defesa de Jair Bolsonaro apresentou um recurso ao ministro Alexandre de Moraes tentando reverter a decisão que suspendeu as visitas do filho Flávio ao ex-presidente em prisão domiciliar. Além disso, o governo do Amapá admitiu um rombo financeiro de quase R$ 1 bilhão no caixa apenas 44 dias após contratar um empréstimo de R$ 536 milhões com garantia do Tesouro Nacional. O presidente dos Estados Unidos, Donald Trump, assinou um decreto para ajustar as tarifas sobre importações de alumínio, afirmando que a produção nacional é insuficiente. Finalmente, o ministro Alexandre de Moraes arquivou uma investigação sobre a 'Abin paralela', envolvendo Jair Bolsonaro e outros, após considerar que os fatos já foram analisados em outro processo resultando em condenações.", "mundo": "Os Estados Unidos continuam realizando operações militares intensivas na Irã, com ataques aéreos que já se estendem por 10 noites consecutivas. Essas ações visam diminuir as capacidades iranianas de atacar navios no Estreito de Ormuz e foram justificadas como uma resposta às mortes de soldados americanos. Em meio a essas tensões, Donald Trump ameaça que a Irã pagará pelo assassinato de civis durante conflitos. As relações comerciais entre Estados Unidos e Canadá também estão sob pressão, com tarifas de 50% impostas sobre produtos canadenses em resposta às retaliações canadenses contra tarifas americanas anteriores.\n\nOs Estados Unidos e o Irã estão envolvidos em uma escalada de tensões militares, com ataques recíprocos e danos a infraestruturas. De acordo com relatos, os EUA realizaram ataques durante dez noites consecutivas contra alvos iranianos, enquanto o Irã afirmou ter atacado estados do Golfo Pérsico e que dois navios-tanque estavam em chamas no Estreito de Ormuz. Além disso, o Corpo de Guardas Revolucionários Islâmicos (IRGC) atacou infraestruturas militares dos EUA no Kuwait, causando danos a sistemas de defesa antimísseis e radionavegação. As tensões comerciais também estão em alta, com tarifas de 50% impostas pelo governo dos Estados Unidos sobre produtos canadenses, levantando preocupações sobre um potencial agravamento das relações bilaterais.", "economia": "Os mercados asiáticos e globais enfrentam diversos desafios econômicos. Na Coreia do Sul, o tribunal de falências prorrogou a recuperação judicial da empresa Homeplus após um recurso, enquanto as ações de Seul recuperaram-se das perdas iniciais graças às compras de oportunidade. No Japão, a segunda maior instituição financeira está expandindo seus produtos e assumindo riscos maiores para impulsionar o crescimento econômico. Em contraste, a BCE rejeitou oferecer uma taxa de juros reduzida para investimentos verdes, enquanto a China garantiu financiamento a baixo custo para esses investimentos. Na América do Norte, os Estados Unidos impuseram tarifas de 50% sobre uma ampla gama de produtos canadenses em retaliação, enquanto a Coreia do Sul registrou um aumento significativo nas exportações de chips nos primeiros 20 dias de julho. No Brasil, o presidente Lula sancionou a lei do Complexo Econômico-Industrial da Saúde, oferecendo incentivos fiscais e linhas de crédito para o setor, enquanto a indústria de caminhões observa uma queda nas vendas apesar dos recursos do programa federal Move Brasil. Além disso, o Nubank anunciou a compra do Banco Porto Real de Investimentos com o objetivo de adquirir uma licença bancária, e o Ministério da Fazenda flexibilizou regras de empréstimo para o estado do Amapá após um default recente.", "tecnologia": "A China lidera no desenvolvimento de hardware para inteligência artificial (IA), com investimentos em supernós, interconexões ópticas e sistemas de nuvem escaláveis. A empresa chinesa Moonshot, fundada por Yang Zhilin, teve sucesso em seu modelo grande de IA, beneficiando tanto o setor chinês quanto seu fundador. Yang agora dirige o desenvolvimento da tecnologia no país. Por sua vez, a Samsung está expandindo sua presença na robótica, criando uma divisão liderada pelo CEO com o objetivo de transformar essa área em um negócio comercial. Em outra notícia, a Hyundai Motor Group anunciou o lançamento global do seu serviço Vehicle-to-Everything (V2X), que permite comunicação entre veículos e diversos dispositivos. A Coreia do Sul planeja lançar um programa piloto de liquidação contínua do won sul-coreano no exterior para melhorar o acesso de investidores estrangeiros ao mercado financeiro local. Além disso, a expansão da fábrica de semicondutores da TSMC nos Estados Unidos custará cerca de 100 bilhões de dólares e é impulsionada pelo crescimento na adoção de IA.", "ciencia": "A NASA e a SpaceX estão planejando missões para a Estação Espacial Internacional e a Lua, respectivamente. A agência espacial americana e seus parceiros vão discutir os detalhes da missão Crew-13 em duas conferências de imprensa marcadas para o dia 3 de agosto. Paralelamente, astrônomos se preparam para observar um pedaço errante de um foguete SpaceX que vai impactar a Lua. Na pesquisa científica, cientistas do Centro Científico e Educacional da Universidade Estatal do Sul dos Urais desenvolveram um reator eletroquímico capaz de remover completamente corantes têxteis da água em 90 minutos, contribuindo para a limpeza ambiental. Outros estudos abordam temas variados como resistência antimicrobiana global, impacto de incêndios florestais e inteligência dos neandertais, demonstrando o amplo espectro da ciência atual.", "cultura": "O Museu de Arte Moderna de São Paulo reabre suas portas após dois anos de obras de restauração, com uma instalação luminosa da artista Carmela Gross atraindo visitantes a partir do mês de setembro. A programação da 24ª Flip, que ocorrerá entre os dias 23 e 26 de julho, inclui debates com escritores consagrados e pensadores globais, destacando nomes como Angela Davis e Wole Soyinka. Além disso, a exposição 'Água da Mata', de Miguel Penha Chiquitano, apresenta pinturas que incorporam estudos e memórias ancestrais em São Paulo até agosto, enquanto o filme brasileiro 'London' é selecionado para a competição da 41ª Semana Internacional da Crítica de Veneza.", "sociedade": "O Brasil enfrenta questões sociais complexas, como a distribuição gratuita de alimentos em Florida até 24 de julho e o aumento do Bolsa Família para julho. No Chile, uma frente fria causou 10 mortes e deixou mais de 2.400 pessoas deslocadas nas regiões de Atacama e La Araucanía. Em Cuba, um barco da ONG Open Arms trouxe 7 toneladas de ajuda humanitária para um hospital pediátrico. Na França, a terceira ola de calor desde maio levou à frustração entre jovens que se sentem desamparados diante do clima. No Rio de Janeiro, a polícia realiza uma megaoperação para capturar assassinos de policiais civis, e na Baixada Fluminense, oito em cada dez brasileiros reconhecem sintomas do câncer colorretal. Além disso, o governo federal avança com uma proposta que proibirá o uso de redes sociais por menores de 15 anos no Brasil.", "meio_ambiente": "A região de Ontário, no Canadá, enfrenta um aumento significativo nos incêndios florestais, com 190 focos ativos e cerca de 1.800 pessoas evacuadas em áreas rurais. O fumo dos incêndios está persistindo em partes dos Estados Unidos. No Brasil, o país avança na produção de combustível sustentável para aviação: a empresa Acelen, apoiada pelo fundo árabe Mubadala, investiu R$ 15 bilhões na compra de óleo de soja para produção em uma unidade localizada no estado da Bahia. Em Sri Lanka, o país enfrenta a pior epidemia de dengue em quase uma década, com mais de 76.000 infecções e 53 mortes. Drones da força aérea e militares estão sendo usados para identificar os criadouros do mosquito transmissor da doença.", "direitos_humanos": "Crianças continuam a ser mortas ou feridas em ataques em todo o território ucraniano, conforme denunciado pela UNICEF. Em Hong Kong, um tribunal ordenou a soltura de 14 acusados no caso envolvendo o assassinato supostamente cometido por um ex-membro de uma tribo criminosa há cinco anos, após determinar que os procuradores não conseguiram provar as lesões fatais. Em Sumba, na Indonésia, a escravidão continua sendo uma realidade diária para pessoas nascidas em situações servil, muitas das quais trabalham sem remuneração e podem ser violentadas por seus senhores. A ONG MSF exigiu que Israel liberte profissionais de saúde palestinos detidos, enquanto manifestações continuam em Houston, Texas, após o assassinato do homem mexicano Lorenzo Salgado Araujo pela ICE. As restrições de viagem impostas pelos Estados Unidos e Congo podem dificultar a resposta humanitária à epidemia de Ebola, ameaçando retardar o deslocamento e a rotação de profissionais médicos necessários para contê-la."}, "resumo_do_dia": {"politica_nacional": [{"id": 62683, "titulo": "Planalto incentiva ministros a darem entrevistas, mas pede cautela para não ferirem lei eleitoral", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/planalto-incentiva-ministros-a-darem-entrevistas-mas-pede-cautela-para-nao-ferirem-lei-eleitoral.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-21T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ministra da Casa Civil, Miriam Belchior, incentivou os ministros a concederem entrevistas sobre as ações do governo Lula durante uma reunião na semana passada. No entanto, ela enfatizou a necessidade de evitar que essas entrevistas possam ser consideradas propaganda eleitoral.", "titulo_pt": "Planalto incentiva ministros a darem entrevistas com cautela para não violar lei eleitoral", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 62684, "titulo": "Lula avalia faltar a debates na TV durante a campanha, e tema divide cúpula do PT", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/lula-avalia-faltar-a-debates-na-tv-durante-a-campanha-e-tema-divide-cupula-do-pt.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-21T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Lula está avaliando não participar dos debates com outros candidatos durante o primeiro turno da campanha. Este tema divide a cúpula do PT.", "titulo_pt": "Lula considera não comparecer a debates na TV e divisão no PT", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 62766, "titulo": "Amapá admitiu rombo de quase R$ 1 bi no caixa 44 dias após tomar crédito com garantia da União", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/amapa-admitiu-rombo-de-quase-r-1-bi-no-caixa-44-dias-apos-tomar-credito-com-garantia-da-uniao.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-21T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo do Amapá anunciou um rombo financeiro de quase R$ 1 bilhão no caixa, apenas 44 dias após contratar um empréstimo de R$ 536 milhões com garantia do Tesouro Nacional. O crédito foi concedido para garantir os pagamentos em caso de inadimplência.", "titulo_pt": "Amapá admite rombo de quase R$ 1 bi no caixa 44 dias após contratar empréstimo com garantia da União", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 62770, "titulo": "Um plano fiscal para o Brasil: da comunicação com o povo à reforma orçamentária", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/um-plano-fiscal-para-o-brasil-da-comunicacao-com-o-povo-a-reforma-orcamentaria.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-21T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O artigo é o quinto e último da série que aborda a gestão fiscal no Brasil, desde a comunicação com o público até as reformas orçamentárias.", "titulo_pt": "Um plano fiscal para o Brasil: da comunicação ao ajuste orçamentário", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 62855, "titulo": "O fator que pode fazer o eleitor recorrer ao voto útil na eleição presidencial de 2026", "url": "https://veja.abril.com.br/politica/o-fator-que-pode-fazer-eleitor-recorrer-ao-voto-util-na-eleicao-presidencial-de-2026/", "fonte_id": "veja", "data_pub": "2026-07-21T01:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um cientista político destaca uma mudança no comportamento do eleitorado que pode influenciar a dinâmica da disputa presidencial de 2026 nas próximas semanas.", "titulo_pt": "Fator que pode fazer o eleitor recorrer ao voto útil na eleição presidencial de 2026", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 62886, "titulo": "Milei na Convenção do PL e Dudu com “green card”: o caminho das pedras", "url": "https://www.metropoles.com/colunas/reinaldo-azevedo/milei-na-convencao-do-pl-e-dudu-com-green-card-o-caminho-das-pedras", "fonte_id": "metropoles", "data_pub": "2026-07-21T01:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto destaca a importância de não mudar o rumo do bolsonarismo, afirmando que isso seria melhor para o Brasil. Além disso, é mencionado um possível 'green card' para Dudu e Milei na Convenção do PL.", "titulo_pt": "Bolsonarismo deve manter rumo: declarações sobre Convenção e 'green card'", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 62906, "titulo": "Governo e indústria de SC articulam medidas para mitigar efeito do tarifaço", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/governo-e-industria-de-sc-articulam-medidas-para-mitigar-efeito-do-tarifaco/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-21T00:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo de Santa Catarina e a indústria do estado estabeleceram medidas para mitigar os efeitos do tarifaço. Em 2025, a gestão estadual implementou um pacote emergencial para auxiliar setores mais afetados.", "titulo_pt": "Governo e indústria de SC articulam medidas para mitigar efeito do tarifaço", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 62704, "titulo": "Câmara responde STF sobre emendas e diz que indicações seguiram regras e são transparentes", "url": "https://g1.globo.com/politica/noticia/2026/07/20/camara-responde-stf-sobre-emendas-e-diz-que-indicacoes-seguiram-regras-e-sao-transparentes.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-21T00:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Câmara dos Deputados enviou ao Supremo Tribunal Federal uma manifestação sobre o processo de indicação das emendas parlamentares de comissão, afirmando que o procedimento é regular e transparente. O montante total da rubrica de emendas de comissão para 2026 é de R$ 12,1 bilhões.", "titulo_pt": "Câmara responde STF sobre processos de indicação de emendas parlamentares", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 62685, "titulo": "Tarcísio exalta Bolsonaro em convenção de União Brasil e PP de SP ao lado de Flávio", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/tarcisio-exalta-bolsonaro-em-convencao-de-uniao-brasil-e-pp-de-sp-ao-lado-de-flavio.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-21T00:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governador de São Paulo, Tarcísio de Freitas (Republicanos), fez um discurso exaltando Jair Bolsonaro durante a convenção do União Brasil e PP em São Paulo. Este foi o primeiro evento onde Flávio Bolsonaro participou ao lado do pai desde o anúncio do tarifaço pelo governo americano.", "titulo_pt": "Tarcísio exalta Bolsonaro em convenção de União Brasil e PP de SP ao lado de Flávio", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 62994, "titulo": "Ameaça de possível membro de facção motivou Renan Santos a antecipar candidatura", "url": "https://www.jota.info/eleicoes/eleicoes-2026/ameaca-de-possivel-membro-de-faccao-motivou-renan-santos-a-antecipar-candidatura", "fonte_id": "jota", "data_pub": "2026-07-20T23:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Renan Santos, candidato à Presidência pelo partido Missão, oficializou sua candidatura nesta segunda-feira (20/7) e solicitou a presença da Polícia Federal como proteção. A decisão foi motivada por uma possível ameaça relacionada a um membro de facção criminosa.", "titulo_pt": "Candidato à presidência antecipa inscrição após possível ameaça", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 62705, "titulo": "Flávio Bolsonaro diz ter esperança de receber apoio da federação formada por União Brasil e PP", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/07/20/flavio-bolsonaro-apoio-federacao-uniao-brasil-e-pp.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-20T23:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Flávio Bolsonaro, pré-candidato à Presidência pelo PL, participou da convenção estadual da federação União Progressista em São Paulo após ser convidado por telefone. Ele expressou esperança de receber apoio dessa formação partidária.", "titulo_pt": "Flávio Bolsonaro diz ter esperança de receber apoio da federação formada por União Brasil e PP", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 62686, "titulo": "Lula rebate fala de Marco Rubio e usa defesa da soberania em convenção que sela apoio do PDT", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/lula-rebate-fala-de-marco-rubio-e-usa-defesa-da-soberania-em-convencao-que-sela-apoio-do-pdt.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-20T23:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Lula rebatizou Marco Rubio, secretário de Estado dos Estados Unidos e auxiliar de Donald Trump, que acusou a gestão petista de má-fé nas negociações contra taxação. Durante uma convenção do PDT, Lula usou o discurso para defender a soberania nacional.", "titulo_pt": "Lula rebatiza Marco Rubio em convenção do PDT", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 62706, "titulo": "Nunes Marques será relator no TSE de representação sobre suposta rede de perfis contra Flávio Bolsonaro", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/07/20/nunes-marques-tse-representacao-rede-de-perfis-contra-flavio-bolsonaro.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-20T23:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Kassio Nunes Marques, presidente do TSE, será o relator de uma representação sobre supostos perfis nas redes sociais atacando Flávio Bolsonaro. O Partido Liberal protocolou a representação e o coordenador de campanha do senador esteve no tribunal para discutir o assunto.", "titulo_pt": "Nunes Marques será relator no TSE de representação sobre suposta rede de perfis contra Flávio Bolsonaro", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 62707, "titulo": "Lula diz que se Marco Rubio quiser apoiar candidatura de Flávio Bolsonaro 'que venha, que monte um comitê': 'vamos derrotar todos'", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/07/20/lula-diz-que-se-marco-rubio-quiser-vir-ao-brasil-apoiar-candidatura-de-flavio-bolsonaro-que-venha-vamos-derrotar-todos.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-20T23:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Luiz Inácio Lula da Silva afirmou que se Marco Rubio, secretário de Estado americano, quiser apoiar a candidatura de Flávio Bolsonaro à Presidência do Brasil, 'que venha e monte um comitê', afirmando que o seu partido vai derrotar todos os adversários em defesa da democracia.", "titulo_pt": "Lula desafia Marco Rubio a apoiar candidatura de Flávio Bolsonaro", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 62687, "titulo": "Flávio Bolsonaro se reúne com aliados no Guarujá e sobrevoa região", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/flavio-bolsonaro-se-reune-com-aliados-no-guaruja-e-sobrevoa-regiao.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-20T22:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio Bolsonaro se reuniu com aliados no Guarujá, em São Paulo, e sobrevoou a região. Ele também gravou peças para um programa eleitoral focado no combate ao crime organizado.", "titulo_pt": "Flávio Bolsonaro reúne-se com aliados e sobrevoa região no Guarujá", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 62709, "titulo": "Voto em trânsito 2026: como solicitar nas eleições em AL", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/07/20/voto-em-transito-2026-como-solicitar-nas-eleicoes-em-al.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-20T22:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Eleitores de Alagoas que irão viajar no dia das eleições podem solicitar o voto em trânsito a partir desta segunda-feira (20). O serviço permite que os cidadãos votem em local escolhido caso não estejam no domicílio eleitoral no dia do pleito.", "titulo_pt": "Voto em trânsito 2026: como solicitar nas eleições em alagoas", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 63523, "titulo": "I fratelli Tate restano in detenzione, battaglia su richiesta Gb di estradizione", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/21/i-fratelli-tate-restano-in-detenzione-battaglia-su-richiesta-gb-di-estradizione_83713c66-10b7-4638-8566-ca0d307bf6eb.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-21T03:06:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Os irmãos Tate permanecem detidos e haverá uma audiência sobre a medida cautelar. Eles são acusados de estupro e tráfico sexual.", "titulo_pt": "Irmãos Tate permanecem em detenção, aguardam audiência sobre custódia", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 63613, "titulo": "Guyana launches criminal probe as crews scour waters for survivors after ferry capsizes", "url": "https://www.koreaherald.com/article/10814962", "fonte_id": "korea_herald", "data_pub": "2026-07-21T03:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em Georgetown, Guyana, equipes de resgate continuam procurando sobreviventes após um ferry naufragar ao se acreditar que estava sobrecarregado. As autoridades iniciaram uma investigação e relataram que pelo menos 32 dos 67 passageiros resgatados não estavam listados no manifesto oficial.", "titulo_pt": "Guiana inicia investigação após ferry naufragar com tripulantes desaparecidos", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 63660, "titulo": "S. Korea retrieves 73 pct of bailout funds since 1997 financial crisis", "url": "https://en.yna.co.kr/view/AEN20260721003000320", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T03:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo sul-coreano recuperou 73% dos fundos de resgate desde a crise financeira de 1997.", "titulo_pt": "Coreia do sul recupera 73% dos fundos de resgate desde a crise financeira de 1997", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 63115, "titulo": "‘Bertha’ se convierte en tormenta tropical frente a las costas de Alabama y Florida", "url": "https://elpais.com/us/2026-07-21/bertha-se-convierte-en-tormenta-tropical-frente-a-las-costas-de-alabama-y-florida.html", "fonte_id": "elpais_america", "data_pub": "2026-07-21T02:51:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Bertha se tornou uma tormenta tropical e há previsões de inundações, fortes ventos e marés altas nas costas do Alabama e Florida.", "titulo_pt": "Bertha se torna tormenta tropical frente às costas do Alabama e Florida", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 63487, "titulo": "US hits civilian area in Iran's Abdanan, state media reports", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/us-hits-civilian-area-irans-abdanan-state-media-reports", "fonte_id": "middle_east_eye", "data_pub": "2026-07-21T02:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "De acordo com relatos da mídia estatal iraniana, os Estados Unidos atacaram uma área civilizada nas margens da cidade de Abdanan. O governador Behzad Noormohammadi informou que a operação envolveu o lançamento de um míssil e não resultou em vítimas fatais, mas uma investigação está sendo realizada.", "titulo_pt": "EUA atacam área civil na cidade iraniana de Abdanan, relata mídia estatal", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 63400, "titulo": "Live: US launches 10th night of airstrikes on Iran after attacks on Bahrain, Kuwait", "url": "https://www.france24.com/en/middle-east/20260721-live-lebanon-s-aoun-to-meet-trump-as-pressure-builds-to-disarm-hezbollah", "fonte_id": "france24", "data_pub": "2026-07-21T02:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Exército dos Estados Unidos concluiu sua décima noite consecutiva de ataques aéreos na Irã, afirmando que atingiu centros de comando militar, sites de lançamento de mísseis e drones, capacidades marítimas e sistemas de defesa aérea. Os últimos bombardeios duraram aproximadamente cinco horas.", "titulo_pt": "EUA realiza décima noite consecutiva de ataques aéreos na Irã", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 63488, "titulo": "IRGC targets more US army infrastructure in Kuwait", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/irgc-targets-more-us-army-infrastructure-kuwait", "fonte_id": "middle_east_eye", "data_pub": "2026-07-21T02:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Corpo de Guardas Revolucionários Islâmicos (IRGC) atacou mais infraestruturas militares dos EUA no Kuwait, conforme informado pela agência estatal IRNA. Segundo a declaração, mísseis e drones atingiram e destruíram sistemas de defesa antimíssil, radionavegação e receptores de satélite no país, além de um hangar de drone MQ9 na base Ali al-Salem.", "titulo_pt": "IRGC ataca mais infraestruturas militares dos EUA no Kuwait", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 62894, "titulo": "EUA concluem a décima noite consecutiva de ataques contra o Irã", "url": "https://www.cnnbrasil.com.br/internacional/eua-concluem-a-decima-noite-consecutiva-de-ataques-contra-o-ira/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-21T02:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos realizaram ataques durante uma décima noite consecutiva, atingindo centros de comando militar, capacidades marítimas, locais de lançamento de mísseis e drones e sistemas de defesa aérea do Irã.", "titulo_pt": "EUA concluem a décima noite consecutiva de ataques contra o Irã", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 63332, "titulo": "US launches fresh strikes on Iran, as Trump warns of retaliation for deaths of soldiers", "url": "https://www.bbc.co.uk/news/articles/cx25wg2x26do?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-21T02:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos realizaram novas operações militares com o objetivo de diminuir as capacidades da Irã de atacar navios no Estreito de Ormuz. O presidente Trump advertiu sobre possíveis retaliações em resposta às mortes de soldados americanos.", "titulo_pt": "EUA realiza novas operações contra a Irã, após advertência de Trump sobre retaliações", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 63541, "titulo": "Chinese warship holds rare live-fire exercise inside Japan’s EEZ", "url": "https://www.japantimes.co.jp/news/2026/07/21/japan/china-live-fire-exercise-japan-eez/", "fonte_id": "japan_times", "data_pub": "2026-07-21T02:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em uma primeira vez, a capitalização da manobra foi feita pelo Tokyo, que divulgou imagens de um destroyer disparando uma metralhadora perto da ilha Okinotorishima no fim de semana. O treino ocorreu dentro da Zona Econômica Exclusiva (EEZ) de Japan.", "titulo_pt": "Navio de guerra chinês realiza raro exercício de tiro vivo dentro da EEZ do Japão", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 63190, "titulo": "Epidemics and Rage", "url": "https://www.nytimes.com/2026/07/20/world/epidemics-rage-ebola-first-responders.html", "fonte_id": "nyt_world", "data_pub": "2026-07-21T02:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sociedades sempre enfrentaram reações hostis a trabalhadores de saúde durante epidemias. O artigo explora por que isso acontece.", "titulo_pt": "Epidemias e raiva", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 63389, "titulo": "Ships shun Strait of Hormuz as renewed fighting strains key oil corridor", "url": "https://www.cnbc.com/2026/07/21/strait-of-hormuz-traffic-renewed-us-iran-conflict-chokes-hormuz.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-21T02:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O tráfego marítimo pelo Estreito de Ormuz diminuiu desde que o bloqueio imposto pela presidência dos Estados Unidos, sob Donald Trump, entrou em vigor há uma semana.", "titulo_pt": "Navios evitam estreito de Ormuz com novos conflitos na rota crucial do petróleo", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 63006, "titulo": "Trump impõe tarifa de 50% sobre produtos do Canadá às vésperas de taxas entrarem em vigor contra o Brasil", "url": "https://www.bbc.com/portuguese/articles/c3w0epjepz1o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-21T02:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo americano impôs tarifas de 50% sobre produtos canadenses às vésperas da aplicação de taxas contra o Brasil. A justificativa americana foi o tratamento desigual dado pelo Canadá a bens dos Estados Unidos.", "titulo_pt": "Trump impõe tarifa de 50% sobre produtos do Canadá às vésperas de taxas entrarem em vigor contra o Brasil", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 63196, "titulo": "Donald Trump to impose 50% tariff on most Canadian goods, White House says", "url": "https://www.theguardian.com/us-news/2026/jul/20/trump-canada-tariffs", "fonte_id": "guardian_world", "data_pub": "2026-07-21T02:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo dos Estados Unidos impôs tarifas de 50% sobre a maioria dos produtos canadenses em resposta às retaliações canadenses contra as tarifas americanas anteriores. O Canadá foi acusado de discriminar injustamente os veículos, bebidas alcoólicas e produtos leiteiros americanos.", "titulo_pt": "Trump anuncia tarifa de 50% sobre a maioria dos produtos canadenses", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 63178, "titulo": "Inside the Deadly U.S. Airstrike on a Shadow Fleet Tanker", "url": "https://www.nytimes.com/2026/07/20/world/middleeast/inside-the-deadly-us-airstrike-on-a-shadow-fleet-tanker.html", "fonte_id": "nyt_world", "data_pub": "2026-07-21T02:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Evidências sugerem que o navio no qual três marinheiros indianos morreram não estava em movimento quando foi atingido no Golfo da Omã, mas havia estado envolvido em transferências de óleo de alto risco em águas abertas.", "titulo_pt": "Dentro do ataque letal dos estados unidos ao navio-tanque Shadow Fleet", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 63544, "titulo": "Diplomatic efforts seek to avert Trump split with U.N. refugee agency, sources say", "url": "https://www.japantimes.co.jp/news/2026/07/21/world/politics/trump-un-refugee-agency/", "fonte_id": "japan_times", "data_pub": "2026-07-21T02:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As discussões nos Estados Unidos sobre a possibilidade de sair da Agência das Nações Unidas para Refugiados (UNHCR), criada após a Segunda Guerra Mundial, seguem um desacordo sobre o nomeação do vice-comissário adjunto.", "titulo_pt": "Esforços diplomáticos buscam evitar divisão entre Trump e agência da ONU para refugiados", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 63662, "titulo": "Court extends Homeplus' rehabilitation process after appeal", "url": "https://en.yna.co.kr/view/AEN20260721005100315", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T02:43:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um tribunal de falências na Coreia do Sul prorrogou o processo de recuperação judicial da empresa Homeplus após um recurso. A sentença anterior foi anulada.", "titulo_pt": "Tribunal prorroga processo de recuperação judicial da Homeplus", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 63663, "titulo": "Seoul stocks erase early losses late Tues. morning on bargain hunting", "url": "https://en.yna.co.kr/view/AEN20260721005000320", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T02:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações de Seul recuperaram-se das perdas iniciais e estavam negociando no início da tarde de terça-feira, impulsionadas por compras de oportunidade.", "titulo_pt": "Ações de seul eliminam perdas iniciais na tarde de terça-feira", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 63545, "titulo": "Credit Suisse veteran shakes up SMBC in new era for Japan banks", "url": "https://www.japantimes.co.jp/business/2026/07/21/companies/smbc-japan-banks-pivot-to-riskier-deals/", "fonte_id": "japan_times", "data_pub": "2026-07-21T02:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A segunda maior instituição financeira do Japão está expandindo seus produtos e se movendo para negócios mais arriscados e de maior rendimento relacionados a títulos estruturados de crédito.", "titulo_pt": "Ex-veterano da credit Suisse revoluciona SMBC em nova era para bancos japoneses", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 63546, "titulo": "Toyota head vows to enhance ties with business partners", "url": "https://www.japantimes.co.jp/business/2026/07/21/companies/toyota-kenta-kon-interview/", "fonte_id": "japan_times", "data_pub": "2026-07-21T02:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente da Toyota, Kenta Kon, afirmou que a empresa vai intensificar suas relações com parceiros de negócios. A Toyota também planeja manter a produção anual de 3 milhões de veículos no Japão para ajudar a manter os setores relacionados locais em funcionamento.", "titulo_pt": "Presidente da toyota promete fortalecer laços com parceiros de negócios", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 63666, "titulo": "Sales of equity-linked securities decline in H1 on wild volatility", "url": "https://en.yna.co.kr/view/AEN20260721004300320", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T02:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As vendas de títulos ligados ao mercado acionário (ELS), incluindo opções e contratos futuros, diminuíram no primeiro semestre devido à volatilidade descontrolada.", "titulo_pt": "Vendas de títulos ligados ao mercado acionário declinam no primeiro semestre devido à volatilidade", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 62768, "titulo": "Prazo para implementação da reforma tributária é insuficiente, diz setor de tecnologia ao governo", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/prazo-para-implementacao-da-reforma-tributaria-e-insuficiente-diz-setor-de-tecnologia-ao-governo.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-21T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Aproximadamente cinco meses antes da implementação prevista dos novos tributos IBS e CBS, representantes do setor de tecnologia enviaram um ofício ao Ministério da Fazenda, à Receita Federal e ao CGIBS alertando que a concretização do novo modelo está em risco.", "titulo_pt": "Prazo para implementação da reforma tributária é insuficiente, diz setor de tecnologia", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 62773, "titulo": "Com o fim dos recursos, indústria de caminhões busca seguir em frente sem o Move Brasil", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/com-o-fim-dos-recursos-industria-de-caminhoes-busca-seguir-em-frente-sem-o-move-brasil.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-21T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Com o fim do primeiro semestre, a indústria de caminhões observou que os recursos do programa federal Move Brasil 2 amenizaram a queda nas vendas, mas não foram suficientes para melhorar significativamente o desempenho do setor no país.", "titulo_pt": "Com término dos recursos, indústria de caminhões enfrenta dificuldades após Move Brasil", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 63356, "titulo": "Climate change: Why the ECB refuses to create a lower interest rate for green investments", "url": "https://www.lemonde.fr/en/economy/article/2026/07/21/climate-change-why-the-ecb-refuses-to-create-a-lower-interest-rate-for-green-investments_6755672_19.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-21T01:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A BCE não oferece uma taxa de juros reduzida para investimentos verdes, contrariamente à China, que garante financiamento a baixo custo para esses investimentos. A BCE, apesar de ser uma das lideranças na mudança climática, ainda não utiliza essa ferramenta.", "titulo_pt": "Mudança climática: por que a bce rejeita criar uma taxa de juros menor para investimentos verdes", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 63552, "titulo": "Weak yen gives Tokyo edge in global startup race, Koike says", "url": "https://www.japantimes.co.jp/business/2026/07/21/economy/koike-weak-yen-foreign-startups/", "fonte_id": "japan_times", "data_pub": "2026-07-21T01:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sob a liderança de Koike, Tóquio lançou iniciativas para se estabelecer como um centro financeiro global e um hub de startups com o objetivo de impulsionar o crescimento econômico. O fraco iene está dando a Tóquio uma vantagem na corrida global por startups.", "titulo_pt": "Fraco iene dá vantagem a tóquio na corrida global por startups, diz Koike", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 63671, "titulo": "(LEAD) Exports up 52 pct in first 20 days of July on robust chips", "url": "https://en.yna.co.kr/view/AEN20260721001951320", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T00:25:00Z", "idioma": "en", "provavel_duplicata_de": 63634, "texto_pt": "As exportações da Coreia do Sul aumentaram 52,3% nos primeiros 20 dias de julho, impulsionadas por uma demanda robusta para chips.", "titulo_pt": "Exportações sul-coreanas crescem 52% nos primeiros 20 dias de julho, impulsionadas por chipsets", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 63424, "titulo": "US to hit Canada with 50% tariffs on wide range of goods", "url": "https://www.ft.com/content/0b507e93-877f-4cf7-904b-639eb390c4bf?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-21T00:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos planejam aplicar tarifas de 50% sobre uma ampla gama de bens canadenses. Washington acusa o Canadá de práticas comerciais desiguais, o que poderia reavivar uma guerra comercial.", "titulo_pt": "EUA impondrá tarifas de 50% em diversos produtos do canadá", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 63674, "titulo": "(URGENT) Seoul stocks open higher on bargain hunting", "url": "https://en.yna.co.kr/view/AEN20260721001300320", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T00:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As bolsas de valores de Seul abriram com ganhos, impulsionadas por compradores procurando oportunidades de compra.", "titulo_pt": "Seoul abre em alta por conta da procura por barganha", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 62774, "titulo": "EUA anunciam tarifas de 50% sobre ampla gama de produtos do Canadá", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/eua-anunciam-tarifas-de-50-sobre-ampla-gama-de-produtos-do-canada.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-20T22:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos anunciaram tarifas de 50% sobre uma ampla gama de produtos do Canadá, em um movimento que pode reacender a guerra comercial iniciada pelo presidente Donald Trump.", "titulo_pt": "EUA anunciam tarifas de 50% sobre diversos produtos do Canadá", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 62995, "titulo": "Lula sanciona lei do Complexo Econômico-Industrial da Saúde", "url": "https://www.jota.info/saude/lula-sanciona-lei-do-complexo-economico-industrial-da-saude", "fonte_id": "jota", "data_pub": "2026-07-20T22:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A lei do Complexo Econômico-Industrial da Saúde, sancionada pelo presidente Lula, prevê incentivos fiscais, regras especiais para licitações e linhas de crédito oferecidas pelo Banco Nacional de Desenvolvimento Econômico e Social (BNDES).", "titulo_pt": "Lula sanciona lei do Complexo Econômico-Industrial da Saúde", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 62775, "titulo": "Justiça dos EUA aprova acordo de US$ 1,5 bilhão da Anthropic em processo de direitos autorais", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/tec/2026/07/justica-dos-eua-aprova-acordo-de-us-15-bilhao-da-anthropic-em-processo-de-direitos-autorais.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-20T22:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma juíza federal de San Francisco aprovou um acordo de US$ 1,5 bilhão (R$ 7,6 bi) entre a empresa Anthropic e autores que acusaram a empresa de usar indevidamente seus livros para treinar seu chatbot de IA. O acordo resolve uma ação coletiva movida por escritores sobre o uso não autorizado dos seus trabalhos.", "titulo_pt": "Justiça dos EUA aprova acordo de US$ 1,5 bilhão da Anthropic em processo de direitos autorais", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 63558, "titulo": "U.S. sets 50% tariff on some Canadian goods over retaliation claim", "url": "https://www.japantimes.co.jp/business/2026/07/21/us-50-tariff-canadian-goods-retaliation/", "fonte_id": "japan_times", "data_pub": "2026-07-20T22:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos impuseram uma tarifa de 50% sobre alguns produtos canadenses como retaliação. Certain key imports such as energy, fish and critical minerals will be excluded.", "titulo_pt": "EUA impostam tarifa de 50% em bens canadenses por razões retaliatórias", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 63659, "titulo": "BOK chief to attend Asia-Pacific central bankers' meeting in Singapore", "url": "https://en.yna.co.kr/view/AEN20260721002200320", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T03:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O chefe do Banco Central sul-coreano será presente no encontro de governadores centrais da Ásia-Pacífico em Singapura.", "titulo_pt": "Chefe do banco central sul-coreano participará do encontro de governadores centrais da ásia-pacífico em singapura", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 63614, "titulo": "Samsung sets up CEO-led robotics division to reach market", "url": "https://www.koreaherald.com/article/10814959", "fonte_id": "korea_herald", "data_pub": "2026-07-21T02:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Samsung criou uma divisão de robótica liderada pelo CEO, com o objetivo de transformar a robótica em um negócio comercial. A nova divisão RX será responsável pela estratégia e comercialização dos produtos de robótica da empresa.", "titulo_pt": "Samsung estabelece divisão de robótica sob liderança do ceo", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 63661, "titulo": "LIG D&A, Airbus sign MOU on next-generation unmanned aircraft", "url": "https://en.yna.co.kr/view/AEN20260721005300320", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T02:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa sul-coreana de defesa LIG D&A e a Airbus assinaram um Memorando de Entendimentos (MOU) sobre o desenvolvimento de aviação não-motorizada geracional. O evento ocorreu em Seul, Coreia do Sul, no dia 21 de julho.", "titulo_pt": "LIG D&A e Airbus assinam MOU sobre aeronaves não-motorizadas geracionais", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 63676, "titulo": "China's AI supernode race seeks systems edge through optics, packaging, and cloud scale", "url": "https://www.digitimes.com/news/a20260720VL218/china-ai-chips-hardware-optics-packaging.html", "fonte_id": "digitimes", "data_pub": "2026-07-21T02:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A corrida chinesa de hardware de inteligência artificial está mudando para supernós, interconexões ópticas, embalagens avançadas e sistemas de escala de nuvem. Este movimento busca vantagens no sistema como um todo.", "titulo_pt": "Corrida chinesa de AI busca vantagem nos supernós, interconexões ópticas e sistemas escalonáveis", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 63540, "titulo": "Chinese AI sensation Moonshot’s gamble on big models pays off", "url": "https://www.japantimes.co.jp/business/2026/07/21/tech/chinese-ai-moonshot-gamble/", "fonte_id": "japan_times", "data_pub": "2026-07-21T02:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A ascensão da Moonshot é uma vitória tanto para o setor de IA da China quanto para seu fundador, Yang Zhilin, que agora está novamente à frente do desenvolvimento da tecnologia no país.", "titulo_pt": "Sobressalto chinês em AI obtém sucesso", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 63618, "titulo": "BOK to launch pilot program for 24-hour offshore won settlement network in Sept.", "url": "https://www.koreaherald.com/article/10814922", "fonte_id": "korea_herald", "data_pub": "2026-07-21T02:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Bank of Korea (BOK) planeja lançar um programa piloto de uma rede de liquidação do won sul-coreano 24 horas por dia no exterior em setembro, como parte dos esforços para melhorar o acesso de investidores estrangeiros ao mercado financeiro local. A BOK está testando o sistema, chamado Rede Internacional de Transferências de Won da BOK, com quatro bancos locais: Kookmin Bank, Woori Bank, Hana Bank e Shinhan Bank. As revisões nas regulamentações relacionadas serão concluídas em agosto.", "titulo_pt": "BOK lançará programa piloto de liquidação diurna do won no exterior em setembro", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 63619, "titulo": "Uber rides Baemin back into Korea's delivery race. What's at stake now?", "url": "https://www.koreaherald.com/article/10814920", "fonte_id": "korea_herald", "data_pub": "2026-07-21T02:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uber está retornando a Seul, sete anos após sua plataforma falhar na conquista do grande mercado de entrega de comida da Ásia. A empresa fará isso através de uma parceria com Baemin, que é operado pela Delivery Hero e tem um valor de fusão estimado em cerca de 14,8 bilhões de dólares.", "titulo_pt": "Uber retorna a seoul por meio de fusão com Baemin", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 63543, "titulo": "Power and water needs test South Korea’s push to build AI chip hub", "url": "https://www.japantimes.co.jp/news/2026/07/21/asia-pacific/power-water-south-korea-ai-chip-hub/", "fonte_id": "japan_times", "data_pub": "2026-07-21T02:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "South Korea pretende criar um novo hub de semicondutores na sua região sul ocidental em quatro anos, mas a oposição local às grandes necessidades de energia elétrica e água para o projeto podem ser os principais obstáculos.", "titulo_pt": "Poder e necessidade de água testam esforço sul-coreano para criar hub de chips inteligentes", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 63665, "titulo": "Global chip equipment market forecast to hit record high in 2028 on AI infrastructure investment", "url": "https://en.yna.co.kr/view/AEN20260721004400320", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T02:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O mercado global de equipamentos para fabricação de semicondutores está previsto para atingir um recorde em 2028, impulsionado por investimentos na infraestrutura de inteligência artificial.", "titulo_pt": "Mercado global de equipamentos para fabricação de semicondutores previsto para atingir recorde em 2028 com investimento em IA", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 63669, "titulo": "Hyundai Motor launches global vehicle-to-everything service", "url": "https://en.yna.co.kr/view/AEN20260721002300320", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T00:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Hyundai Motor Group anunciou que lançará um serviço de veículo para tudo globalmente. O anúncio foi feito em Seul, Coreia do Sul, no dia 21 de julho.", "titulo_pt": "Hyundai Motor lança serviço global veículo para tudo", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 63634, "titulo": "Exports up 52% in first 20 days of July on robust chips", "url": "https://www.koreaherald.com/article/10814464", "fonte_id": "korea_herald", "data_pub": "2026-07-21T00:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As exportações sul-coreanas aumentaram 52,3% no primeiro vigésimo dia de julho, impulsionadas pelo crescimento quase triplamente das exportações de semicondutores, refletindo o boom da inteligência artificial. As importações também cresceram 20% no período.", "titulo_pt": "Exportações saltam 52% nos primeiros 20 dias de julho por causa do boom de chips", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 63605, "titulo": "AI boom drives US$100bn TSMC Arizona buildout", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/21/2003861082", "fonte_id": "taipei_times", "data_pub": "2026-07-21T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A expansão da fábrica de semicondutores da TSMC no Arizona, Estados Unidos, está estimada em US$100 bilhões. Este projeto é impulsionado pelo boom na adoção de inteligência artificial.", "titulo_pt": "Boom de IA impulsiona construção US$100bi da TSMC no Arizona", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 62861, "titulo": "China diz já concentrar mais da metade dos robôs humanoides do mundo", "url": "https://veja.abril.com.br/coluna/giro-pelo-oriente/china-diz-ja-concentrar-mais-da-metade-dos-robos-humanoides-do-mundo/", "fonte_id": "veja", "data_pub": "2026-07-20T23:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "De acordo com dados do governo chinês, o país concentra mais da metade dos robôs humanoides globais e lidera as vendas de robôs quadrúpedes. A China também está acelerando a expansão de tecnologias como IA, 5G e testes de 6G.", "titulo_pt": "China lidera em robôs humanoides e quadrúpedes e impulsiona avanços tecnológicos", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 63571, "titulo": "Chinese robot makers’ lament: if we only had a better ‘brain’, and more data", "url": "https://www.scmp.com/tech/article/3361243/chinese-robot-makers-lament-if-we-only-had-better-brain-and-more-data?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-20T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As empresas chinesas de robótica enfrentam dificuldades por falta de dados suficientes e de um 'cérebro' avançado para melhorar a interação de seus produtos com o mundo físico, segundo insiders da World Artificial Intelligence Conference em Shanghai. O principal desafio do setor de IA embutida é integrar hardware, dados, modelos e cenários reais num sistema iterativo fechado.", "titulo_pt": "Desafios das empresas chinesas de robótica: falta de dados e cérebro avançado", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 63649, "titulo": "Here are the 30,000 songs Sony is suing Udio’s AI music generator over", "url": "https://www.theverge.com/tech/968375/sony-udio-lawsuit-songs-ai-copyright", "fonte_id": "the_verge", "data_pub": "2026-07-20T22:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sony Music Entertainment acionou a Justiça nos Estados Unidos por supostas violações de direitos autorais cometidas pelo gerador de música baseado em IA da Udio, que teria usado mais de 30.000 faixas da Sony, incluindo hits de artistas como Elvis Presley, Beyoncé e Harry Styles.", "titulo_pt": "Aqui estão as 30.000 músicas que a Sony está processando o gerador de música IA da Udio por", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 63650, "titulo": "The FCC is planning to retroactively ban disguised DJI gadgets", "url": "https://www.theverge.com/news/968310/fcc-dji-drone-camera-ban-skyrover-xtra", "fonte_id": "the_verge", "data_pub": "2026-07-20T22:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A FCC está prestes a usar sua autoridade para banir gadgets já aprovados e comercializados nos Estados Unidos, focando possíveis empresas-fachada da DJI. Isso ocorre após a agência ter concedido poderes para revogar aprovações anteriores.", "titulo_pt": "A FCC planeja banir retroativamente gadgets disfarçados da DJI", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 63548, "titulo": "Japan team eyes world’s first pig-kidney transplant to human fetus", "url": "https://www.japantimes.co.jp/news/2026/07/21/japan/science-health/pig-kidneys-fetus-research/", "fonte_id": "japan_times", "data_pub": "2026-07-21T01:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um time japonês está considerando realizar a primeira transplante de rim de porco para um feto humano como método terapêutico temporário até que o bebê possa se submeter a diálise.", "titulo_pt": "Time japonês planeja primeiro transplante de rim de porco para feto humano", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 63601, "titulo": "New antibody offers possible dengue fever relief", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/21/2003861114", "fonte_id": "taipei_times", "data_pub": "2026-07-21T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo anticorpo oferece possibilidades de alívio para a febre amarela. Estudos indicam que ele pode ser eficaz na tratamento da doença.", "titulo_pt": "Novo anticorpo oferece possibilidade de alívio para febre amarela", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 62860, "titulo": "Café: estudo
