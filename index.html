<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: none; border: 1px solid var(--border); border-radius: 4px;
             color: var(--texto2); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { border-color: var(--acento); color: var(--texto); }
  .tts-bar[hidden] { display: none; }
</style>
</head>

<div class="modal-overlay" id="modal-relatorio">

      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>

</div>

<script>
const D = {"gerado_em": "04/07/2026 20:22", "stats": {"noticias_novas": 148, "resumos_gerados": 72}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "Michelle Bolsonaro defendeu a Política Nacional de Educação Bilíngue de Surdos, lançada pelo governo Lula, afirmando que está acima de considerações ideológicas. Este posicionamento veio após críticas dos bolsonaristas. Em outro desenvolvimento, o ex-presidente Jair Bolsonaro teve seu porte de armas revogado e 11 armas foram apreendidas por ordem do ministro Moraes. A morte de Waldemar Borges, um quadro histórico da esquerda pernambucana, uniu políticos como João Campos e Raquel Lyra em homenagens. Além disso, o Instituto Nacional de Meteorologia (Inmet) emitiu alertas para chuvas intensas em regiões do Nordeste e Norte do Brasil.", "mundo": "O Irã celebrou o funeral do ex-líder supremo Ayatollah Ali Khamenei, que ocorreu no primeiro dia da guerra dos Estados Unidos e Israel contra o país. Muitos homenageadores, incluindo representantes de Hamas, Hezbollah e os Houthis do Iêmen, compareceram às cerimônias em Teerã. No Brasil, uma carga humanitária foi enviada à Venezuela após terremotos que deixaram 2.954 mortos e 16.592 feridos no país. No Canadá, a umidade está causando problemas para os organizadores de eventos do Dia da Independência dos Estados Unidos, enquanto na Rússia, estudantes estão sendo empregados em operações militares na Ucrânia sem treinamento adequado.\n\nA geopolítica global enfrenta diversos desafios e tensões. Na Ásia, a China mantém patrulhas marítimas que são criticadas pelo Taiwan, refletindo tensões territoriais na região. O Irã celebrou o funeral do líder supremo Ali Khamenei com um evento histórico, repleto de aliados e rivais, enquanto os Estados Unidos comemoraram seu bicentésimo quinto aniversário de independência, enfrentando controvérsias em torno da celebração. No Leste Europeu, a Ucrânia intensificou ataques com drones contra São Petersburgo, enquanto a Rússia nega ter controlado uma cidade estratégica na Ucrânia. Além disso, Israel enviou ajuda humanitária à Venezuela após terremotos, demonstrando que relações diplomáticas podem não impedir cooperação em situações de emergência. A geopolítica regional e global continua complexa, com desafios econômicos, militares e políticos que afetam a estabilidade internacional.", "economia": "A economia global enfrenta diversos desafios e oportunidades. A Ásia, que consome intensamente energia, deve aprender com a crise iraniana para se adaptar aos novos cenários energéticos (Taiwan Times). No Brasil, a dívida dos EUA continua sendo uma preocupação, mas também foi um marco revolucionário na consolidação financeira do país, liderada por Alexander Hamilton (Infomoney). A Madesa planeja expandir suas operações internacionais para representar 40% de seu faturamento atualmente em 20%, investindo R$ 51 milhões em um centro de distribuição (Folha Mercado). No Paraguai, o país registra um crescimento econômico médio de 5% nos últimos três anos, apresentando um dos cenários macroeconômicos mais favoráveis da América do Sul (BBC Brasil).", "tecnologia": "O Brasil recentemente lançou seu primeiro foguete movido a propulsão líquida, chamado FTL-Perseu. Este evento coloca o país entre as poucas nações com capacidade para desenvolver motores de alta precisão. Paralelamente, empresas como Samsung e Xiaomi estão oferecendo smartphones em promoção, incluindo os modelos Galaxy A57 e Redmi com até 256GB de armazenamento, respectivamente. Além disso, a empresa chinesa GWM reduziu o preço do seu modelo Ora 03 após a chegada do concorrente GWM Ora 05 ao mercado brasileiro, tornando-o mais acessível para os consumidores. A tecnologia de inteligência artificial também está ganhando destaque com a Midjourney buscando revelar detalhes sobre o uso de AI por estúdios cinematográficos e a possibilidade de um IPO da SpaceX que pode levar à dispersão de talentos importantes, segundo observações do Gavekal.", "ciencia": "A Space.com comemorou os 250 anos dos Estados Unidos destacando o progresso espacial americano desde a independência, além de possíveis direções futuras. Um avanço científico notável foi a descoberta internacional do DNA humano de pelo menos 2.000 anos em cavernas da Espanha e Portugal, publicado na revista Nature. O estudo sobre a peste antiga também merece destaque, com evidências datando do período mais remoto, cerca de 5.500 anos atrás na Sibéria. As inundações extremas causadas pelo aumento dos níveis do mar, que agora ocorrem 12 vezes mais frequentemente, também ganharam atenção, afetando comunidades costeiras globalmente.", "cultura": "Um espetáculo teatral de Taiwan está sendo apresentado no Festival Off Avignon na França, durante três semanas. A atriz e os atores taiwaneses participam de um evento cultural que inclui uma apresentação inaugural seguida por desfiles. Em outro destaque, avena e trigo foram cultivados com sucesso perto do glaciar Perito Moreno em uma experiência inédita no país, registrando rendimentos próximos a 3500 kg/ha de avena e 3000 kg/ha de trigo. Além disso, o bairro boêmio da Lapa, no Rio de Janeiro, foi transformado em um Distrito de Arte e Cultura através de um decreto, com a implantação do Boulevard Selarón ao redor da Escadaria Selarón, visando tornar o local mais acessível para moradores e visitantes. Estes eventos destacam a diversidade cultural e inovação em diferentes áreas, desde o teatro até a agricultura e o desenvolvimento urbano artístico.", "sociedade": "A sociedade enfrenta diversos desafios em diferentes regiões. Em Nablus, na Cisjordânia ocupada pelo Israel, a economia e os padrões de vida têm diminuído significativamente devido ao controle financeiro israelense e aos bloqueios militares, refletindo um cenário de crescente pobreza. No Brasil, segundo levantamento do Datafolha, 70% dos entrevistados apoiam a punição de adolescentes como adultos. Por outro lado, o estado do Piauí exige que as empresas reservem vagas para ex-presidiários, visando à reintegração social. Em contraste, em Taiwan há necessidade de reformar o sistema de trânsito, e na Argentina, o governo continua negociando mudanças na Lei de Propriedade Privada, levantando preocupações sobre a soberania nacional.", "meio_ambiente": "O número de vagas para trabalhos verdes, conhecidos como 'green-collar', atingiu um recorde, destacando a crescente demanda por profissionais nas áreas ambientais e sustentáveis. Paralelamente, o Ministério realizou um fórum sobre economia circular, focado em estratégias de uso eficiente dos recursos para promover a sustentabilidade. O Brasil enfrentou uma onda de calor extremo, com temperaturas chegando a 46°C no Chile, afetando as comemorações do Dia da Independência e colocando diversos eventos públicos sob risco. Além disso, terremotos na Venezuela causaram a morte de mais de 2.600 pessoas, enquanto um incêndio florestal no norte de Portugal mobilizou mais de mil bombeiros e resultou em pelo menos nove feridos. A onda de calor também impactou as culturas de arroz na Itália, levando a preocupações sobre a produção agrícola.", "direitos_humanos": "O Papa Leão visitou a ilha de Lampedusa na Itália para lembrar a crise migratória global e apelar contra a indiferença mundial em relação aos imigrantes. Durante sua missa, ele reforçou o pedido para que os Estados Unidos e a Europa acolham e ajudem os refugiados. Em outro evento, atores, ativistas, intelectuais e comediantes se uniram para alertar sobre a fragilidade da democracia americana sob o governo de Trump. Além disso, a China detalhou suas estratégias de repressão no exterior após implementar uma nova lei que proíbe atos que 'minem a unidade étnica'. Em outros casos, uma menina de 12 anos morreu em consequência de um deslizamento de terra em Panamá. Na República Democrática do Congo, o número de mortes por ebola aumentou para 473. Na Bolívia, um bebê de seis meses faleceu em um caso que revelou uma suposta rede de tráfico infantil destinada a mendicidade."}, "resumo_do_dia": {"politica_nacional": [{"id": 35932, "titulo": "Michelle x Flávio: vereadora pivô de crise diz não alimentar conflitos", "url": "https://www.metropoles.com/brasil/michelle-x-flavio-vereadora-pivo-de-crise-diz-nao-alimentar-conflitos", "fonte_id": "metropoles", "data_pub": "2026-07-04T22:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A vereadora Priscila Costa afirmou publicamente seu apoio ao senador Flávio Bolsonaro, pré-candidato à Presidência. Ela enfatizou que não alimenta conflitos relacionados a essa aliança política.", "titulo_pt": "Priscila Costa defende apoio a Flávio Bolsonaro", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35928, "titulo": "Itaú diz que instabilidade no sistema foi resolvida", "url": "https://www.poder360.com.br/poder-economia/itau-diz-que-instabilidade-no-sistema-foi-resolvida/", "fonte_id": "poder360", "data_pub": "2026-07-04T22:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Itaú informou que a instabilidade no sistema foi resolvida e o acesso para todos os clientes está retornando gradativamente.", "titulo_pt": "Itaú anuncia que instabilidade no sistema foi resolvida", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35945, "titulo": "Hom 5303, "texto_pt": "O presidente nacional do PSol, Juliano Medeiros, solicitou à MPSP (Ministério Público de São Paulo) a abertura de um inquérito para investigar o uso da estrutura pública pelo governador Tarcísio para beneficiar a Sabesp.", "titulo_pt": "PSol pede investigação contra Tarcísio por propaganda da Sabesp", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35322, "titulo": "Ônibus com romeiros tomba no Ceará e provoca morte de duas pessoas", "url": "https://www.cartacapital.com.br/sociedade/onibus-com-romeiros-tomba-no-ceara-e-provoca-morte-de-duas-pessoas/", "fonte_id": "cartacapital", "data_pub": "2026-07-04T20:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um ônibus com peregrinos tombou no estado do Ceará, resultando na morte de duas pessoas. Os viajantes estavam dirigindo-se para um santuário em Canindé após saírem de Brejo Santo.", "titulo_pt": "Ônibus com peregrinos tomba no Ceará e causa mortes", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 35338, "titulo": "Morre Waldemar Borges, marido da ministra Luciana Santos", "url": "https://www.poder360.com.br/poder-brasil/morre-waldemar-borges-marido-da-ministra-luciana-santos/", "fonte_id": "poder360", "data_pub": "2026-07-04T20:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Waldemar Borges, deputado estadual pelo PSB e marido da ministra Luciana Santos, faleceu aos 67 anos após lutar contra um câncer.", "titulo_pt": "Morre Waldemar Borges, marido da ministra Luciana Santos", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35474, "titulo": "Carlos visita Bolsonaro em domiciliar e diz que pai “está ciente de tudo”", "url": "https://www.cnnbrasil.com.br/politica/carlos-visita-bolsonaro-em-domiciliar-e-diz-que-pai-esta-ciente-de-tudo/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T20:26:00Z", "idioma": "pt", "provavel_duplicata_de": 35341, "texto_pt": "Carlos Bolsonaro visitou o pai Jair Bolsonaro em residência domiciliar. O encontro ocorre no contexto de divergências entre os filhos do presidente e Michelle Bolsonaro, ex-primeira-dama.", "titulo_pt": "Carlos visita Bolsonaro em domicílio e diz que pai ‘está ciente de tudo’", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 35323, "titulo": "Michelle Bolsonaro responde críticas por elogiar iniciativa de Lula: ‘acima de ideologia’", "url": "https://www.cartacapital.com.br/politica/michelle-bolsonaro-responde-criticas-por-elogiar-iniciativa-de-lula-acima-de-ideologia/", "fonte_id": "cartacapital", "data_pub": "2026-07-04T20:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Michelle Bolsonaro comentou sobre a Política Nacional de Educação Bilíngue de Surdos, criada pelo Ministério da Educação. Ela defendeu o projeto, afirmando que está acima de considerações ideológicas.", "titulo_pt": "Michelle Bolsonaro responde críticas ao elogiar iniciativa de Lula", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 35339, "titulo": "Moraes manda apreender 11 armas de Bolsonaro; leia a lista", "url": "https://www.poder360.com.br/poder-justica/moraes-manda-apreender-11-armas-de-bolsonaro-leia-a-lista/", "fonte_id": "poder360", "data_pub": "2026-07-04T19:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro Moraes revogou o porte de armas do ex-presidente Bolsonaro, mas manteve a prisão domiciliar humanitária. Foram apreendidas 11 armas de propriedade do ex-presidente.", "titulo_pt": "Moraes ordena apreensão de 11 armas de Bolsonaro; mantém prisão domiciliar", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 35726, "titulo": "MAC condemns China’s sea patrols", "url": "https://www.taipeitimes.com/News/front/archives/2026/07/05/2003860246", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A MAC (provavelmente uma abreviação para alguma autoridade ou instituição) condenou as patrulhas marítimas da China. O contexto sugere que há tensões relacionadas a controle territorial ou soberania nas águas.", "titulo_pt": "MAC condena patrulhas marítimas chinesas", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35748, "titulo": "EDITORIAL: Taiwan anchors First Island Chain", "url": "https://www.taipeitimes.com/News/editorials/archives/2026/07/05/2003860237", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo discute a posição estratégica de Taiwan no Primeiro Círculo da Ilha. A passagem destaca o papel crucial desempenhado por Taiwan nesta estrutura geopolítica.", "titulo_pt": "Editorial: Taiwan é o Pilar do Primeiro Círculo da Ilha", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35750, "titulo": "Taiwan risks losing out in region", "url": "https://www.taipeitimes.com/News/editorials/archives/2026/07/05/2003860239", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Taiwan corre o risco de ser marginalizada na região. O país enfrenta desafios significativos que podem afetar sua influência e posição no contexto regional.", "titulo_pt": "Taiwan corre risco de perder influência na região", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 36032, "titulo": "Australia news live: Albanese to target rightwing ‘axis of grievance’ at NSW Labor conference; first east coast bird flu case confirmed", "url": "https://www.theguardian.com/australia-news/live/2026/jul/05/australia-news-live-albanese-labor-nsw-h5-bird-flu-angus-taylor-liberal-coalition-pauline-hanson-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-07-04T22:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O estado da Nova Gales do Sul registrou seu primeiro caso confirmado de gripe aviária H5N1, uma grande petrel encontrada no norte de Newcastle em Hawks Nest. O novo líder do Partido Laborista australiano, Anthony Albanese, planeja alvo o bloco direitista conhecido como 'eixo da queixa' durante sua conferência na costa leste.", "titulo_pt": "Notícias da Austrália: Albanese vai alvo bloco direitista 'eixo da queixa' em conferência; primeiro caso de gripe aviária H5N1 confirmado no estado da Nova Gales do Sul", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 35925, "titulo": "Brasil envia seis toneladas de vacinas, medicamentos e insumos à Venezuela", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/07/brasil-envia-seis-toneladas-de-vacinas-medicamentos-e-insumos-a-venezuela.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-07-04T22:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil enviou uma carga de seis toneladas de vacinas, medicamentos e insumos à Venezuela no sábado (4). A Venezuela enfrenta 2.954 mortes e 16.592 feridos após terremotos que atingiram regiões do país, principalmente o estado de La Guaira.", "titulo_pt": "Brasil envia seis toneladas de vacinas, medicamentos e insumos à Venezuela", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 35927, "titulo": "Putin deseja “sucesso” a Trump em carta pelos 250 anos dos EUA", "url": "https://www.poder360.com.br/250-anos-dos-eua/putin-deseja-sucesso-a-trump-em-carta-pelos-250-anos-dos-eua/", "fonte_id": "poder360", "data_pub": "2026-07-04T22:42:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente russo, Putin, enviou uma carta desejando sucesso ao presidente americano, Trump, pelos 250 anos dos Estados Unidos. O tom da mensagem foi conciliador e indicou um desejo de fortalecer as relações entre os dois países.", "titulo_pt": "Putin deseja ‘sucesso’ a Trump em cartas pelos 250 anos dos EUA", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35975, "titulo": "Crece el conflicto entre La Rioja y San Juan por un territorio limítrofe que albergará un proyecto minero", "url": "https://www.lanacion.com.ar/politica/crece-el-conflicto-entre-la-rioja-y-san-juan-por-un-territorio-limitrofe-que-albergara-un-proyecto-nid04072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-04T22:35:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "As duas províncias de La Rioja e San Juan aprovaram leis recentemente para promover o desenvolvimento do projeto minero na área fronteiriça. Houve discussões entre os funcionários das duas regiões sobre a iniciativa.", "titulo_pt": "Conflito cresce entre La Rioja e San Juan por território que abrigará projeto minero", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 36069, "titulo": "N. Korea's Kim observes weapons tests from naval destroyer Kang Kon", "url": "https://en.yna.co.kr/view/AEN20260705000400315", "fonte_id": "yonhap_news", "data_pub": "2026-07-04T22:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O líder norte-coreano Kim Jong-un supervisionou testes de armamentos a bordo do navio-destruidor Kang Kon.", "titulo_pt": "Kim Jong-un observa testes de armas a bordo do navio-destruidor Kang Kon", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 36055, "titulo": "Trump speaks with Putin and Zelensky ahead of NATO summit", "url": "https://www.lemonde.fr/en/international/article/2026/07/05/trump-speaks-with-putin-and-zelensky-ahead-of-nato-summit_6755156_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-04T22:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Trump conversou com Putin e Zelensky antes do encontro da NATO, embora ambos afirmassem que as chamadas fossem para marcar o aniversário de 250 anos dos Estados Unidos. Os assuntos discutidos incluíram também a Ucrânia e, durante a chamada com o Kremlin, o Irã.", "titulo_pt": "Trump fala com Putin e Zelensky antes da cimeira da NATO", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 36056, "titulo": "US influence challenged by changing global order: Paolo von Schirach", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/4/us-influence-challenged-by-changing-global-order-paolo-von-schirach?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T22:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A influência dos Estados Unidos está sendo desafiada por um novo ordenamento global, conforme afirma Paolo von Schirach.", "titulo_pt": "Influência dos EUA ameaçada pelo novo ordenamento global: Paolo von Schirach", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 36048, "titulo": "Beating the heat is now part of hosting", "url": "https://www.politico.com/live-updates/2026/07/04/world-cup-2026/heat-two-canada-morocco-who-humid-dry-health-00987008", "fonte_id": "politico", "data_pub": "2026-07-04T22:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Canadá enfrenta a umidade este semana, enquanto planejadores se antecipam para um desafio de calor muito diferente no Marrocos em 2030.", "titulo_pt": "Superando o calor agora faz parte da hospedagem", "veiculo": "Politico", "pais": "EUA", "classe": "A"}, {"id": 36060, "titulo": "Iran says Khamenei commemoration drew delegates from 70 countries", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/iran-says-khamenei-commemoration-drew-delegates-70-countries", "fonte_id": "middle_east_eye", "data_pub": "2026-07-04T21:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Ministro das Relações Exteriores do Irã, Abbas Araghchi, informou que representantes de mais de 70 países participaram das comemorações pelo falecimento do líder supremo iraniano Ali Khamenei. Araghchi descreveu o evento como histórico e disse que ele será lembrado na relação entre as nações presentes.", "titulo_pt": "Irã afirma que comemoração de Khamenei reuniu delegados de 70 países", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 35926, "titulo": "Milei enfrenta contradições entre discurso de campanha e realidade do poder", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/colunas/sylvia-colombo/2026/07/milei-enfrenta-contradicoes-entre-discurso-de-campanha-e-realidade-do-poder.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-07-04T21:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Argentina continua sendo o centro das atenções na política da América do Sul, enquanto o Peru e a Colômbia enfrentaram eleições tumultuadas e a Venezuela sofreu um terremoto que deixou milhares de vítimas.", "titulo_pt": "Milei enfrenta contradições entre discurso de campanha e realidade do poder", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 36053, "titulo": "Funeral of Iran's former supreme leader 'intensely political moment'", "url": "https://www.bbc.co.uk/news/videos/c23y22z4ppxo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-04T21:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Autoridades esperam que até 20 milhões de pessoas participem das cerimônias fúnebres do ex-líder supremo da Irã, tanto no país quanto na Írlanda do Norte nos próximos dias.", "titulo_pt": "Enterro do ex-líder supremo da Irã é momento politicamente intenso", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 35953, "titulo": "Blue Angels no céu de NY, 5 mil guardas, calor: EUA celebram independência", "url": "https://www.cnnbrasil.com.br/internacional/blue-angels-no-ceu-de-ny-5-mil-guardas-calor-eua-celebram-independencia/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T21:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos celebram o seu bicentésimo quinto aniversário de independência com shows aéreos da Frotinha Azul e uma parada naval em Nova York, enquanto Washington tem um forte esquema de segurança e o 4 de Julho mais quente na história da capital.", "titulo_pt": "Frotinha Azul no céu de NY, 5 mil guardas, calor: EUA comemoram independência", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 35862, "titulo": "Denmark’s century-old Fourth of July party looks different this year.", "url": "https://www.nytimes.com/live/2026/07/04/us/america-250-celebrations-fourth-july/denmarks-century-old-fourth-of-july-party-looks-different-this-year", "fonte_id": "nyt_world", "data_pub": "2026-07-04T21:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O evento de comemoração do Dia da Independência dos Estados Unidos na Dinamarca, que tem uma história centenária, teve um ano diferente este ano. A ausência de autoridades americanas no programa e a chegada de protestos refletiram o foco nas ameaças de Trump sobre a posse de Groenlândia.", "titulo_pt": "A festa da independência dos EUA na Dinamarca, com 100 anos, toma um rumo diferente este ano", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 35746, "titulo": "Energy-hungry Asia must learn from Iran crisis", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/05/2003860235", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ásia, que consome muita energia, deve aprender com a crise iraniana. O artigo sugere que o continente precisa se adaptar e buscar soluções devido aos desafios energéticos atuais.", "titulo_pt": "Ásia, consumidora de energia, deve aprender com a crise iraniana", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35958, "titulo": "PSOL e Rede acionam MP-SP contra Tarcísio por posts sobre a Sabesp", "url": "https://www.infomoney.com.br/politica/psol-e-rede-acionam-mp-sp-contra-tarcisio-por-posts-sobre-a-sabesp/", "fonte_id": "infomoney", "data_pub": "2026-07-04T22:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O PSOL e a Rede acionaram o Ministério Público de São Paulo contra Tarcísio por publicações sobre a Sabesp. A federação pede investigação sobre o uso da estrutura governamental para promover a empresa após sua privatização.", "titulo_pt": "PSOL e Rede acionam MP-SP contra Tarcísio por posts sobre a Sabesp", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 35959, "titulo": "Egito descobre cidade perdida da era bizantina no deserto", "url": "https://www.infomoney.com.br/mundo/egito-descobre-cidade-perdida-da-era-bizantina-no-deserto/", "fonte_id": "infomoney", "data_pub": "2026-07-04T22:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Escavações arqueológicas no deserto do Egito revelaram um assentamento do século IV, várias moedas e 18 tumbas em dois sítios arqueológicos perdidos.", "titulo_pt": "Egito descobre cidade perdida da era bizantina no deserto", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 35919, "titulo": "‘Overcapacity’ talk reflects a West irked by China’s industrial rise", "url": "https://www.scmp.com/opinion/world-opinion/article/3358751/overcapacity-talk-reflects-west-irked-chinas-industrial-rise?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T21:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A discussão sobre a suposta 'overcapacity' na indústria de energia limpa da China é paradoxal. Enquanto Europa deseja mais e mais rápido desenvolvimento de energias renováveis, critica a produção chinesa de painéis solares, turbinas eólicas, baterias e veículos elétricos que tornam essa expansão possível.", "titulo_pt": "Discussão sobre 'overcapacity' reflete irritação ocidental diante do avanço industrial chinês", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 35890, "titulo": "'Ireland's GDP trends reflect global strategies of a handful of multinationals more than the actual state of the economy'", "url": "https://www.lemonde.fr/en/opinion/article/2026/07/04/ireland-s-gdp-trends-reflect-global-strategies-of-a-handful-of-multinationals-more-than-the-actual-state-of-the-economy_6755154_23.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-04T21:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A economia irlandesa registrou uma queda de 12% no primeiro trimestre devido ao aumento das tarifas imposto por Donald Trump, mas isso se deve principalmente à evasão fiscal da Irlanda das regras internacionais do comércio por parte de algumas multinacionais.", "titulo_pt": "Tendências do PIB da Irlanda refletem estratégias globais de poucas multinacionais mais do que o estado real da economia", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 35820, "titulo": "A dívida dos EUA virou fonte de preocupação, mas já foi um marco revolucionário", "url": "https://www.infomoney.com.br/business/global/a-divida-dos-eua-virou-fonte-de-preocupacao-mas-ja-foi-um-marco-revolucionario/", "fonte_id": "infomoney", "data_pub": "2026-07-04T21:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A dívida dos EUA foi um marco revolucionário na consolidação financeira do país, liderada por Alexander Hamilton. No entanto, atualmente, ela está reacendendo preocupações sobre a solvência americana.", "titulo_pt": "Dívida dos EUA: de marco revolucionário a fonte de preocupação", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 35289, "titulo": "Madesa planeja fazer operação internacional chegar a 40% do faturamento", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/07/madesa-planeja-fazer-operacao-internacional-chegar-a-40-do-faturamento.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-04T21:00:00Z", "idioma": "pt", "provavel_duplicata fonte_id": "canaltech", "data_pub": "2026-07-04T19:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Escolher uma câmera de celular é desafiador, pois especificações técnicas não são o único fator determinante da qualidade das fotos. A fotografia em smartphones depende de vários elementos, incluindo a qualidade do sensor e do processamento.", "titulo_pt": "Como saber se a câmera do celular é boa antes de comprar?", "veiculo": "Canaltech", "pais": "Brasil", "classe": "C"}], "tecnologia__eventos": [], "ciencia": [{"id": 35761, "titulo": "When companies face hostile takeover threats, they turn to ESG, and the whole community benefits", "url": "https://phys.org/news/2026-06-companies-hostile-takeover-threats-esg.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Quando uma empresa enfrenta a ameaça de uma fusão hostil, seu conselho pode recorrer a defesas anti-fusão tradicionais. Por exemplo, 'poison pills' permitem que os acionistas existentes comprem ações adicionais com desconto, diluindo o stake do potencial adquirente e tornando o alvo mais caro de ser absorvido.", "titulo_pt": "Quando empresas enfrentam ameaças de fusões hostis, recorrem a ESG e toda a comunidade se beneficia", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 35298, "titulo": "DNA humano de ao menos 2.000 anos é achado em paredes de cavernas", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/dna-humano-de-ao-menos-2000-anos-e-achado-em-paredes-de-cavernas.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-04T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Cientistas internacionais identificaram DNA humano de pelo menos 2.000 anos em cavernas da Espanha e Portugal. A pesquisa, publicada na revista Nature, indica que as paredes rochosas podem preservar material genético humano por milhares de anos.", "titulo_pt": "DNA humano de ao menos 2.000 anos é encontrado nas paredes de cavernas da Espanha e Portugal", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 35762, "titulo": "Optical writing of antiferromagnets points toward new storage devices and energy efficient information systems", "url": "https://phys.org/news/2026-07-optical-antiferromagnets-storage-devices-energy.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de pesquisa alemão-japonês, envolvendo a Universidade de Augsburg, conseguiu escrever informações magnéticas pela primeira vez usando apenas pulsos laser ultrarrapazes. Este método não requer correntes elétricas ou campos magnéticos.", "titulo_pt": "Escrita óptica de antiferromagnetismos abre caminho para novos dispositivos de armazenamento e sistemas de informação mais eficientes energicamente", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 35763, "titulo": "Europe's baked rice bowl seeks escape from drought", "url": "https://phys.org/news/2026-07-europe-rice-bowl-drought.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A região mais importante para a produção de arroz da Europa enfrenta uma seca precoce, com plantações irrigadas estressadas e plantas daninhas dominando os campos em Pavia, na província italiana.", "titulo_pt": "Prato de arroz da Europa busca escape do drought", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 35764, "titulo": "Ancient teeth from Siberia rewrite the plague's timeline, dating back to over 5,500 years ago", "url": "https://phys.org/news/2026-06-ancient-teeth-siberia-rewrite-plague.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T18:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas encontraram evidências da peste mais antigas do que se pensava, datando de há cerca de 964, "titulo": "Terremoto en Venezuela: sin esperanza de hallar más sobrevivientes, ahora acecha el riesgo de epidemias", "url": "https://www.clarin.com/mundo/terremoto-venezuela-esperanza-hallar-sobrevivientes-ahora-acecha-riesgo-epidemias_0_0kyKhKTqAR.html", "fonte_id": "clarin", "data_pub": "2026-07-04T22:11:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Mais de dez dias após o terremoto que afetou Caracas e outras regiões da Venezuela, a OMS alerta para o risco de epidemias. Os habitantes continuam buscando sobreviventes nas ruínas usando ferramentas rudimentares.", "titulo_pt": "Terremoto na Venezuela: sem esperança de encontrar mais sobreviventes, teme-se por possíveis epidemias", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 35951, "titulo": "ANP monitora combustíveis na Região Norte para reduzir impacto do El Niño", "url": "https://www.cnnbrasil.com.br/infra/anp-monitora-abastecimento-de-combustiveis-na-regiao-norte-para-reduzir-impacto-do-el-nino/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T21:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Agência Nacional do Petróleo, Gás Natural e Biocombustíveis (ANP) está monitorando os combustíveis na Região Norte para mitigar os impactos do El Niño. A agência busca prever riscos logísticos devido à diminuição da navegabilidade dos rios da região, contribuindo assim para a segurança do abastecimento nacional de combustíveis.", "titulo_pt": "ANP monitora combustíveis na Região Norte para reduzir impacto do El Niño", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 35809, "titulo": "PMDF resgata 22 aves silvestres mantidas ilegalmente em cativeiro", "url": "https://www.metropoles.com/distrito-federal/pmdf-resgata-22-aves-silvestres-mantidas-ilegalmente-em-cativeiro", "fonte_id": "metropoles", "data_pub": "2026-07-04T21:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Militar do Distrito Federal (PMDF) resgatou 22 aves silvestres mantidas ilegalmente em cativeiro. Os animais foram encontrados em nove residências e os proprietários responderão por crime ambiental.", "titulo_pt": "PMDF resgata 22 aves silvestres mantidas ilegalmente em cativeiro", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35366, "titulo": "Com sensação de 46°C, EUA têm onda de calor no Dia da Independência", "url": "https://www.metropoles.com/mundo/com-sensacao-de-46c-eua-tem-onda-de-calor-no-dia-da-independencia", "fonte_id": "metropoles", "data_pub": "2026-07-04T21:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A onda de calor extremo nos Estados Unidos, com temperaturas chegando a 46°C, obrigou autoridades a cancelar feiras e shows das comemorações do Dia da Independência, que marcou os 250 anos do evento.", "titulo_pt": "Com sensação térmica de 46°C, EUA cancelam eventos no Dia da Independência", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35368, "titulo": "MG registra três tremores de terra em apenas quatro dias", "url": "https://www.metropoles.com/minas-gerais/mg-registra-tres-tremores-de-terra-em-apenas-quatro-dias", "fonte_id": "metropoles", "data_pub": "2026-07-04T21:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em Minas Gerais, foram registrados três tremores de terra entre segunda-feira (30/6) e quinta-feira (2/7), em Pirajuba, Planura e Sete Lagoas.", "titulo_pt": "MG registra três tremores de terra em quatro dias", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35664, "titulo": "Climate change: 'We cannot meet the challenge of adapting housing with the tools of the past. A thorough overhaul is needed'", "url": "https://www.lemonde.fr/en/economy/article/2026/07/04/climate-change-we-cannot-meet-the-challenge-of-adapting-housing-with-the-tools-of-the-past-a-thorough-overhaul-is-needed_6755153_19.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-04T20:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Christophe Rodriguez, diretor do Instituto Francês de Eficiência Energética dos Edifícios, explica à Le Monde a urgência de reformar as instituições para implementar o 'projeto do século' – a renovação da carteira imobiliária francesa. É necessário um overhaul significativo para enfrentar o desafio de adaptar o abrigamento às mudanças climáticas.", "titulo_pt": "Mudanças climáticas: não podemos enfrentar o desafio de adaptar habitações com ferramentas do passado", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 35476, "titulo": "Calor extremo nos EUA impacta comemorações do 4 de julho e cancela eventos", "url": "https://www.cnnbrasil.com.br/internacional/calor-extremo-nos-eua-impacta-comemoracoes-do-4-de-julho-e-cancela-eventos/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T20:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A onda de calor extremo nos Estados Unidos atingirá o pico durante as comemorações do 4 de julho, com temperaturas acima de 37°C e risco de tempestades. Eventos públicos podem ser afetados por causa dessas condições climáticas.", "titulo_pt": "Calor extremo impacta comemorações do 4 de julho nos EUA", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 35344, "titulo": "Número de mortos após terremotos na Venezuela vai a 2.645", "url": "https://www.poder360.com.br/poder-internacional/numero-de-mortos-apos-terremotos-na-venezuela-vai-a-2-645/", "fonte_id": "poder360", "data_pub": "2026-07-04T18:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Terremotos de magnitudes 7,2 e 7,5 ocorreram na Venezuela em 24 de junho, causando a morte de 2.645 pessoas.", "titulo_pt": "Número de mortos após terremotos na Venezuela chega a 2.645", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35814, "titulo": "Número de mortos em terremotos na Venezuela sobe para quase 3 mil", "url": "https://exame.com/mundo/numero-de-mortos-em-terremotos-na-venezuela-sobe-para-quase-3-mil/", "fonte_id": "exame", "data_pub": "2026-07-04T18:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O número de mortos causados por terremotos na Venezuela aumentou para quase 3 mil, conforme novo balanço do governo. O estado de La Guaira foi severamente afetado pelos tremores.", "titulo_pt": "Número de mortos em terremotos na Venezuela sobe para quase 3 mil", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 35400, "titulo": "Incêndio florestal mobiliza mais de 1.000 bombeiros em Portugal", "url": "https://exame.com/mundo/incendio-florestal-mobiliza-mais-de-1-000-bombeiros-em-portugal/", "fonte_id": "exame", "data_pub": "2026-07-04T16:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um incêndio florestal no norte de Portugal mobilizou mais de mil bombeiros e resultou em pelo menos nove feridos. O governo português pediu apoio internacional devido à onda de calor extremo.", "titulo_pt": "Incêndio florestal mobiliza mais de mil bombeiros em Portugal", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 35148, "titulo": "MG: 2 vilas disputam selo da ONU entre as melhores do turismo mundial", "url": "https://www.metropoles.com/minas-gerais/mg-2-vilas-disputam-selo-da-onu-entre-as-melhores-do-turismo-mundial", "fonte_id": "metropoles", "data_pub": "2026-07-04T14:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Conceição de Ibitipoca e Delfinópolis estão entre os sete destinos brasileiros indicados para o reconhecimento internacional pelo Programa das Nações Unidas para o Meio Ambiente (PNUMA).", "titulo_pt": "MG: 2 vilas disputam selo da ONU entre as melhores do turismo mundial", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 34847, "titulo": "Italian rice crops suffer in drought, worst European heatwave ever", "url": "https://www.scmp.com/news/world/europe/article/3359427/italian-rice-crops-suffer-drought-worst-european-heatwave-ever?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T12:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em uma das piores ondas de calor da Europa, culturas de arroz na região mais importante para a produção do grão na Itália estão sofrendo. Sharon Angoli, de 22 anos, observa campos secos e sem perspectivas de recuperação mesmo com chuvas abundantes.", "titulo_pt": "Cultivos de arroz na Itália sofrem com onda de calor extremamente severa", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 34795, "titulo": "Firefighters race to contain flames in northeastern Spain", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/4/firefighters-race-to-contain-flames-in-northeastern-spain?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T12:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Incêndios florestais estão ocorrendo no nordeste da Espanha e bombeiros estão trabalhando para conter as chamas.", "titulo_pt": "Bombeiros correm contra o tempo para controlar incêndios na Espanha", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 34532, "titulo": "Casal morre em colisão com caminhão elétrico da Tesla nos EUA", "url": "https://www.infomoney.com.br/consumo/caminhao-eletrico-tesla-semi-colisao/", "fonte_id": "infomoney", "data_pub": "2026-07-04T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um casal morreu em uma colisão envolvendo um Volkswagen Beetle e um caminhão elétrico Tesla Semi nos Estados Unidos. Este é o primeiro acidente registrado com o Tesla Semi desde que ele começou a ser utilizado.", "titulo_pt": "Casal morre em colisão com caminhão elétrico da Tesla nos EUA", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 35731, "titulo": "Official lays out Beijing’s overseas repression tactics", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/05/2003860256", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo chinês detalhou suas estratégias de repressão no exterior. O texto não fornece mais detalhes sobre os métodos específicos utilizados, focando apenas na divulgação dessas táticas por parte do governo chinês.", "titulo_pt": "Governo chinês expõe técnicas de repressão no exterior", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 36030, "titulo": "Bebé de seis meses muere en Bolivia y caso revela presunta red de trata infantil para mendicidad", "url": "https://www.latercera.com/nacional/noticia/bebe-de-seis-meses-muere-en-bolivia-y-caso-revela-presunta-red-de-trata-infantil-para-mendicidad/", "fonte_id": "la_tercera", "data_pub": "2026-07-04T22:11:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um bebê de seis meses morreu na Bolívia, e a investigação revelou uma suposta rede de tráfico infantil para mendicidade. A criança teria sido entregue por sua mãe em troca de 150 bolivianos, e durante as investigações foram resgatados outros quatro crianças que também seriam usadas para pedir dinheiro nas ruas.", "titulo_pt": "Bebe de seis meses morre na Bolívia e caso revela suposta rede de tráfico infantil para mendicidade", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 36031, "titulo": "Niña de 12 años muere tras deslizamiento de tierra provocado por lluvias en Panamá", "url": "https://www.latercera.com/mundo/noticia/nina-de-12-anos-muere-tras-deslizamiento-de-tierra-provocado-por-lluvias-en-panama/", "fonte_id": "la_tercera", "data_pub": "2026-07-04T22:09:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Uma menina de 12 anos morreu após um deslizamento de terra provocado pelas chuvas na região de Finca 4, em Changuinola, província de Bocas del Toro. As autoridades mantêm operações de emergência por inundações e derrubadas de árvores em várias partes do país.", "titulo_pt": "Menina de 12 anos morre após deslizamento de terra causado pelas chuvas na Panamá", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 35597, "titulo": "Fiscalía ratifica prisión preventiva para Dayonis Orozco, alto mando de “Los Piratas de Aragua”", "url": "https://www.latercera.com/nacional/noticia/fiscalia-ratifica-prision-preventiva-para-dayonis-orozco-alto-mando-de-los-piratas-de-aragua/", "fonte_id": "la_tercera", "data_pub": "2026-07-04T20:16:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A fiscalia confirmou a prisão preventiva de Dayonis Orozco, que ocupa um alto cargo na organização criminosa conhecida como 'Los Piratas de Aragua'. A medida foi tomada em relação à sua suposta participação em uma célula criminal ligada ao assassinato de Ronald Ojeda.", "titulo_pt": "Fiscalia confirma prisão preventiva para Dayonis Orozco, líder de 'Os Piratas de Aragua'", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 35389, "titulo": "Papa Leão reza por imigrantes e manda recado aos EUA e à Europa", "url": "https://www.brasildefato.com.br/2026/07/04/papa-leao-reza-por-imigrantes-e-manda-recado-aos-eua-e-a-europa/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-04T18:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Papa Leão 14 visitou a ilha de Lampedusa, na Itália, no dia do aniversário da independência dos Estados Unidos, para celebrar uma missa e relembrar a crise migratória global. Durante a celebração, ele fez um apelo contra a indiferença mundial em relação aos imigrantes.", "titulo_pt": "Papa Leão 14 reza por imigrantes durante visita à Lampedusa", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 35607, "titulo": "Aumentan a 473 muertes por ébola en República Democrática del Congo y casos superan los 1.500", "url": "https://www.latercera.com/mundo/noticia/aumentan-a-473-muertes-por-ebola-en-republica-democratica-del-congo-y-casos-superan-los-1500/", "fonte_id": "la_tercera", "data_pub": "2026-07-04T18:42:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O número de mortes por ebola na República Democrática do Congo aumentou para 473, e o número total de casos superou os 1.500. Atualmente, 628 pacientes estão sob a 'isolamento' ou 'hospitalização', enquanto outras 213 pessoas já se recuperaram da doença.", "titulo_pt": "Número de mortes por ebola na República Democrática do Congo aumenta para 473 e casos superam 1.500", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 35261, "titulo": "Gobierno concreta tercer envío de ayuda humanitaria a Venezuela: 35 mil vacunas y 13 toneladas de carga", "url": "https://www.latercera.com/nacional/noticia/gobierno-concreta-tercer-envio-de-ayuda-humanitaria-a-venezuela-35-mil-vacunas-y-13-toneladas-de-carga/", "fonte_id": "la_tercera", "data_pub": "2026-07-04T14:26:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O governo confirmou o terceiro envio de ajuda humanitária para Venezuela, incluindo 35 mil vacinas e 13 toneladas de suprimentos. A operação também visa o retorno dos 45 bombeiros chilenos que estavam em missão no país.", "titulo_pt": "Governo concretiza terceiro envio de ajuda humanitária a Venezuela: 35 mil vacinas e 13 toneladas de carga", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 35128, "titulo": "Watch Mark Ruffalo, Sarah Jessica Parker, Margaret Atwood, Judd Apatow and More Give Instructions to Combat Trump’s Tyranny on July 4th", "url": "https://variety.com/2026/politics/news/july-4-trump-warning-mark-ruffalo-sarah-jessica-parker-margaret-atwood-judd-apatow-1236801648/", "fonte_id": "variety", "data_pub": "2026-07-04T13:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de atores, ativistas, intelectuais e comediantes se uniram para emitir um alerta sobre a fragilidade da democracia americana. Timothy Snyder, historiador e autor best-seller especializado em fascismo, reuniu diversas figuras proeminentes para ler trechos de sua obra.", "titulo_pt": "Veja Mark Ruffalo, Sarah Jessica Parker, Margaret Atwood, Judd Apatow e Outros Dar Instruções para Combater a Tirania de Trump no Dia 4 de Julho", "veiculo": "Variety", "pais": "EUA", "classe": "C"}, {"id": 35119, "titulo": "Pope Leo urges migrant protection, integration on visit to Lampedusa", "url": "https://www.aljazeera.com/news/2026/7/4/pope-urges-protection-integration-of-migrants-on-visit-to-island-frontier?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T12:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Papa Leão encoraja a Europa e os Estados Unidos a acolherem e ajudarem migrantes durante uma viagem simbólica à ilha italiana de Lampedusa.", "titulo_pt": "Papa Leo incentiva proteção e integração de migrantes em visita a Lampedusa", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 34681, "titulo": "‘The situation is terrible’: aid workers on life in Sudanese city pummelled by drone strikes", "url": "https://www.theguardian.com/world/2026/jul/04/el-obeid-aid-workers-sudan-war-drone-strikes", "fonte_id": "guardian_world", "data_pub": "2026-07-04T11:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A cidade de El Obeid, no Sudão, está sendo atacada por drones das forças armadas do país e dos paramilitares RSF. Nesses ataques recentes, mais de 20 pessoas, incluindo estudantes, foram mortas em escolas e estações de combustível.", "titulo_pt": "A situação é terrível: trabalhadores humanitários relatam os ataques por drones na cidade do Sudão", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 34467, "titulo": "Análise: China pressiona minorias com nova lei de unidade", "url": "https://www.cnnbrasil.com.br/internacional/analise-china-pressiona-minorias-com-nova-lei-de-unidade/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T11:00:00Z", "idioma": " por startups", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 35146, "fonte_id": "veja", "titulo": "‘Poesia completa’: livro reúne toda a obra de Horácio em português e latim", "url": "https://veja.abril.com.br/coluna/veja-recomenda/poesia-completa-livro-reune-toda-a-obra-de-horacio-em-portugues-e-latim/", "data_pub": "2026-07-04T14:00:00Z", "topico": "cultura", "idioma": "pt", "titulo_pt": "‘Poesia completa’: livro reúne toda a obra de Horácio em português e latim", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}], "destaque": {"titulo_evento": "Funeral de Ali Khamenei e Desdobramentos", "texto_pt": "O funeral do líder supremo iraniano, Ayatollah Ali Khamenei, realizado em Teerã em 28 de fevereiro, foi um evento de grande relevância que atravessou múltiplas editorias do boletim. Cerca de cem mil pessoas participaram das exequias no primeiro dia, com milhões previstas para comparecerem durante os seis dias oficiais de luto. O fato central é a morte do líder iraniano em um suposto ataque aéreo realizado por Israel e Estados Unidos, que ocorreu no contexto de uma intensa tensão geopolítica na região do Oriente Médio. As cerimônias visavam transmitir mensagens de estabilidade e unidade tanto para o exterior quanto para os inimigos internos, enquanto também marcaram um momento crucial na sucessão liderantil iraniana. O novo líder supremo, Ayatollah Mojtaba Khamenei, não foi visto publicamente desde março, após a morte do seu pai. Em meio à tensão com os Estados Unidos e Israel, o funeral reuniu uma grande multidão no Irã, com lideres estrangeiros também presentes para mostrar apoio ao regime iraniano. Além disso, em Gaza, ataques israelenses continuaram, resultando na morte de um child e ferimento de outro por ataque a drone. Este evento tem implicações significativas nas relações internacionais, especialmente com os Estados Unidos e Israel, e pode influenciar futuras decisões políticas e estratégias militares no conflito regional.", "data_edicao": "2026-07-04", "artigos": [{"id": 35553, "titulo": "The Funeral of Iran’s Supreme Leader, Ali Khamenei", "url": "https://www.nytimes.com/2026/07/04/world/middleeast/the-funeral-of-irans-supreme-leader-ali-khamenei.html", "fonte_id": "nyt_world", "data_pub": "2026-07-04T20:22:00Z", "topico": "politica_internacional", "idioma": "en", "texto_resumo": "A nova liderança do Irã está realizando um funeral para o Ayatollah Ali Khamenei, ocorrido no primeiro dia da guerra dos Estados Unidos e de Israel contra o país. Este funeral é inédito em termos recentes.", "titulo_pt": "O Funeral do Líder Supremo do Irã, Ali Khamenei", "texto_pt": "A nova liderança do Irã está realizando um funeral para o Ayatollah Ali Khamenei, ocorrido no primeiro dia da guerra dos Estados Unidos e de Israel contra o país. Este funeral é inédito em termos recentes.", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 35521, "titulo": "Irán hace una exhibición de fuerza ante Estados Unidos con un funeral masivo por Ali Jameneí", "url": "https://elpais.com/internacional/2026-07-04/iran-hace-una-exhibicion-de-fuerza-ante-estados-unidos-con-un-funeral-masivo-para-ali-jamenei.html", "fonte_id": "elpais_america", "data_pub": "2026-07-04T17:58:00Z", "topico": "politica_internacional", "idioma": "es", "texto_resumo": "O Irã realizou um funeral massivo para seu líder supremo, Ali Jameneí, que faleceu em um bombardeio de Israel e dos Estados Unidos no dia 28 de fevereiro. Cerca de cem mil pessoas participaram das exequias no primeiro dia do evento.", "titulo_pt": "Irã realiza funeral massivo para seu líder supremo Ali Jameneí", "texto_pt": "O Irã realizou um funeral massivo para seu líder supremo, Ali Jameneí, que faleceu em um bombardeio de Israel e dos Estados Unidos no dia 28 de fevereiro. Cerca de cem mil pessoas participaram das exequias no primeiro dia do evento.", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 35315, "titulo": "Aliados do regime do Irã se reúne const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">
      <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
      <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
      <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
      <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
    </div>` : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;
