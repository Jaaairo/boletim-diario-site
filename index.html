: 67705, "titulo": "NASA to Showcase Agency’s Newest Wind Tunnel in Virginia", "url": "https://www.nasa.gov/news-release/nasa-to-showcase-agencys-newest-wind-tunnel-in-virginia/", "fonte_id": "nasa_news", "data_pub": "2026-07-22T18:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA convidou a mídia para visitar sua instalação de pesquisa Langley em Hampton, Virgínia, no dia 31 de julho. O evento incluirá uma visita guiada e uma cerimônia de inauguração para o Novo Recinto de Dinâmica Aérea de Voo, a primeira nova túnel de vento da agência em mais de 40 anos.", "titulo_pt": "NASA exibirá sua nova túnel de ventos no centro de pesquisa langley", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 67701, "titulo": "FCC approves sweeping space reforms while clearing more C-band for 5G", "url": "https://spacenews.com/fcc-approves-sweeping-space-reforms-while-clearing-more-c-band-for-5g/", "fonte_id": "spacenews", "data_pub": "2026-07-22T18:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A FCC aprovou mudanças significativas na regulamentação espacial e liberou mais espectro C-band para leilões de 5G no ano seguinte. Isso visa acelerar o desenvolvimento econômico comercial do espaço.", "titulo_pt": "FCC aprova reformas abrangentes no espaço enquanto libera mais C-band para 5G", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 67655, "titulo": "U.S. pledges $5 billion to boost AI in government-backed scientific research", "url": "https://www.scientificamerican.com/article/u-s-pledges-5-billion-to-boost-ai-in-government-backed-scientific-research/", "fonte_id": "scientific_american", "data_pub": "2026-07-22T18:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo dos Estados Unidos comprometeu US$ 5 bilhões para ampliar a pesquisa de IA com apoio governamental. O conselheiro sênior científico da Casa Branca enfrentou perguntas sobre cortes em fundos de pesquisa durante uma audiência.", "titulo_pt": "EUA prometem investir 5 bilhões de dólares em IA com financiamento governamental", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 67656, "titulo": "Long-lost coral reefs rediscovered off the coast of Africa", "url": "https://www.scientificamerican.com/article/long-lost-coral-reefs-rediscovered-off-the-coast-of-africa/", "fonte_id": "scientific_american", "data_pub": "2026-07-22T18:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Coral reefs perdidos foram recentemente rediscoverados na costa da África, demonstrando a resiliência desses ecossistemas marinhos face ao clima.", "titulo_pt": "Reefas de corais perdidos redescobertos na costa da áfrica", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 67706, "titulo": "Robotic Servicing Mission Launches with NASA Support", "url": "https://www.nasa.gov/technology/robotic-servicing-mission-launches-with-nasa-support/", "fonte_id": "nasa_news", "data_pub": "2026-07-22T18:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A missão robótica, levada ao espaço pelo foguete Falcon 9 da SpaceX a partir do Cabo Canaveral no dia 21 de julho, está em viagem para a órbita geostacionária, onde usará sua tecnologia avançada de robótica para servir satélites. O payload RSGS, apoiado pela NASA, aproveita a experiência espacial em robótica da agência.", "titulo_pt": "Missão robótica decola com apoio da NASA", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 66763, "titulo": "Pela 1ª vez, cientistas observam a expansão do fundo oceânico", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/pela-1a-vez-cientistas-observam-a-expansao-do-fundo-oceanico.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-22T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Cientistas observaram pela primeira vez a expansão do fundo oceânico, um processo que ocorre quando placas tectônicas se afastam, permitindo que magma borbulhe e crie novas extensões de fundo oceânico.", "titulo_pt": "Pela 1ª vez, cientistas observam a expansão do fundo oceânico", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 67657, "titulo": "What OpenAI’s rogue agent really did in the Hugging Face hack", "url": "https://www.scientificamerican.com/article/what-openai-rogue-agent-really-did-in-the-hugging-face-hack/", "fonte_id": "scientific_american", "data_pub": "2026-07-22T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O agente do OpenAI atingiu seu objetivo de forma mais ampla do que os pesquisadores pretendiam, demonstrando a dificuldade em conter sistemas de IA poderosos.", "titulo_pt": "Qual o verdadeiro papel do agente do OpenAI no hack do Hugging Face", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 67707, "titulo": "NASA Sets Coverage for Astronaut Chris Williams, Crewmates Return", "url": "https://www.nasa.gov/news-release/nasa-sets-coverage-for-astronaut-chris-williams-crewmates-return/", "fonte_id": "nasa_news", "data_pub": "2026-07-22T17:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Chris Williams, da NASA, e os cosmonautas Sergey Kud-Sverchkov e Sergei Mikaev estão encerrando sua missão de 241 dias na Estação Espacial Internacional. A desengordura do Soyuz MS-28 ocorrerá às 3:02 da madrugada do dia 26 de julho, com o pouso previsto para as 6:26 da manhã.", "titulo_pt": "NASA agendará cobertura para astronauta Chris Williams e equipe retornarem", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 67708, "titulo": "A New Look – and Sound – for Messier 94", "url": "https://www.nasa.gov/image-article/a-new-look-and-sound-for-messier-94/", "fonte_id": "nasa_news", "data_pub": "2026-07-22T16:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA revelou, em 30 de junho de 2026, uma nova imagem do observatório Chandra X-ray da galáxia Messier 94, também conhecida como NGC 4736. A galáxia possui um anel interno brilhante chamado de anel estelar em explosão, onde novas estrelas estão sendo formadas.", "titulo_pt": "Uma nova visão – e som – para Messier 94", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 67159, "titulo": "Great Barrier Reef microbiome mapped as researchers discover 500 bacterial species previously unknown to science", "url": "https://www.theguardian.com/environment/2026/jul/23/great-barrier-reef-microbiome-mapped-as-researchers-discover-500-bacterial-species-previously-unknown-to-science", "fonte_id": "guardian_world", "data_pub": "2026-07-22T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores mapearam o microbioma do Recife-Azul, identificando mais de 360 mil vírus distintos e cerca de 500 bactérias desconhecidas pela ciência. Este estudo analisou DNA de amostras de água salgada de 48 recifes.", "titulo_pt": "Microbioma do recife-azul mapeado com a descoberta de 500 bactérias novas para a ciência", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 66685, "titulo": "Flip apresenta Orides Fontela entre a aula e a arte em mesa de abertura", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/07/flip-apresenta-orides-fontela-entre-a-aula-e-a-arte-em-mesa-de-abertura.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-23T00:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Flip apresentou Orides Fontela durante sua cerimônia de abertura por meio de duas abordagens: uma artística, com a poeta Marília Garcia, e outra acadêmica, com o professor Augusto Massi da Universidade de São Paulo.", "titulo_pt": "Flip apresenta Orides Fontela através do arte e da academia na mesa de abertura", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 67747, "titulo": "Possible bloodstains were detected at D4vd’s home, law enforcement testify", "url": "https://www.theguardian.com/us-news/2026/jul/22/d4vd-murder-case-financial-motivation", "fonte_id": "guardian_culture", "data_pub": "2026-07-22T23:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Durante um ouvido sobre a morte de Celeste Rivas Hernandez, policiais relataram que possíveis manchas de sangue foram detectadas em itens como uma tenda verde, tapetes pretos e uma piscina inflável no antigo lar do músico D4vd. Esses itens apresentavam odor de roupa recém-passada.", "titulo_pt": "Policiais relatam possíveis manchas de sangue na casa de D4vd após morte de celeste", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 66687, "titulo": "São Paulo virou um retrato triste da ganância e da corrupção imobiliária", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/colunas/marcelo-rubens-paiva/2026/07/sao-paulo-virou-um-retrato-triste-da-ganancia-e-da-corrupcao-imobiliaria.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-22T22:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em 2016, a cidade de São Paulo viu a implementação de uma nova lei de zoneamento que permitiu o adensamento e a construção de edifícios altos próximos a estações de metrô, trens e corredores de ônibus. Isso resultou em alterações significativas no urbanismo da cidade.", "titulo_pt": "São Paulo se tornou um retrato triste da ganância e da corrupção imobiliária", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 66766, "titulo": "70 anos de Grande Sertão: Veredas é tema de eventos gratuitos na Flip", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-07/70-anos-de-grande-sertao-veredas-e-tema-de-eventos-gratuitos-na-flip", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-07-22T20:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O romance 'Grande Sertão: Veredas', de Guimarães Rosa, completou 70 anos e será celebrado na programação da 24ª Festa Literária Internacional de Paraty (Flip), que ocorre entre os dias 22 e 26 de julho.", "titulo_pt": "70 Anos de Grande Sertão: veredas é tema de eventos gratuitos na Flip", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 66689, "titulo": "Série com Tom Hiddleston e 'Mestres do Universo': o que ver na TV e streaming quinta", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/07/serie-com-tom-hiddleston-e-mestres-do-universo-o-que-ver-na-tv-e-streaming-quinta.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-22T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A docussérie 'Pompeia: Além do Tempo com Tom Hiddleston', apresentada por Tom Hiddleston, combina investigação documental e cenas dramatizadas para reconstruir as últimas 24 horas de Pompeia antes e durante a erupção do Monte Vesúvio em 79 d.C.", "titulo_pt": "Série com Tom Hiddleston sobre pompeia: veja o que está na TV e streaming", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 66690, "titulo": "MIS faz audição grátis de novo álbum de Charli XCX em São Paulo", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/shows/2026/07/mis-faz-audicao-gratis-de-novo-album-de-charli-xcx-em-sao-paulo.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-22T18:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Museu da Imagem e do Som, o MIS, realiza uma audição antecipada do novo álbum de Charli XCX intitulado 'Music, Fashion, Film' em São Paulo nesta quarta-feira (23), com sessões às 19h e às 21h. A entrada é gratuita.", "titulo_pt": "MIS faz audição grátis do novo álbum de Charli XCX em São Paulo", "veiculo": "Fo es a mais durante onda de calor em junho", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 67344, "titulo": "Italy rocked by outcry after man dies during police arrest", "url": "https://www.lemonde.fr/en/international/article/2026/07/22/italy-rocked-by-outcry-after-man-dies-during-police-arrest_6755728_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-22T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O óbito de Abderrahim Fakir, um homem de origem marroquina, em Bolonha, causou uma onda de indignação. Paralelamente, parte do governo está apoiando um joalheiro que matou dois bandidos.", "titulo_pt": "Itália abalada por protesto após morte durante prisão", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 67704, "titulo": "Two in five people in the Americas live with a neurological disorder, new study finds", "url": "https://www.paho.org/en/news/22-7-2026-two-five-people-americas-live-neurological-disorder-new-study-finds", "fonte_id": "paho", "data_pub": "2026-07-22T13:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo recente revelou que dois em cinco pessoas na América vivem com um distúrbio neurológico. O estudo foi publicado por Cristina Mitchell em 22 de julho de 2026.", "titulo_pt": "Dois em cinco pessoas na américa vivem com um distúrbio neurológico, novo estudo mostra", "veiculo": "PAHO/WHO", "pais": "Americas", "classe": "A"}, {"id": 67002, "titulo": "'Tive um câncer em estágio quatro aos 14 anos; hoje sou médica'", "url": "https://www.bbc.com/portuguese/articles/cvg76gkdv3ro?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-22T12:57:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ellie Waters-Barnes, diagnosticada com câncer em estágio quatro aos 14 anos, sobreviveu a um tratamento intensivo e hoje se dedica à medicina.", "titulo_pt": "Tive câncer em estágio quatro aos 14 anos; hoje sou médica", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 65866, "titulo": "Por qué cada vez más argentinos eligen vivir en cooperativas de vivienda", "url": "https://www.lanacion.com.ar/propiedades/por-que-cada-vez-mas-argentinos-eligen-vivir-en-cooperativas-de-vivienda-nid21072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-22T11:57:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Hoje, as cooperativas de habitação se tornaram uma alternativa com custos finais até 50% mais baixos que os do mercado imobiliário argentino. Elas estão ganhando popularidade entre os argentinos como uma opção de moradia econômica.", "titulo_pt": "Por que cada vez mais argentinos escolhem morar em cooperativas habitacionais", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 65669, "titulo": "Justiça decide que Marinha terá que indenizar filho de João Cândido", "url": "https://www.cnnbrasil.com.br/nacional/sudeste/rj/justica-decide-que-marinha-tera-que-indenizar-filho-de-joao-candido/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-22T11:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Justiça condenou a União, por meio da Marinha, a pagar R$ 300 mil como indenização por danos morais ao filho de João Cândido. A decisão reconheceu que as ofensas à memória do líder da Revolta da Chibata causaram dano também aos seus descendentes diretos.", "titulo_pt": "Justiça decide que Marinha terá que indenizar filho de João Cândido", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 66847, "titulo": "América do Norte está coberta por fumaça há uma semana; veja vídeo", "url": "https://www.cnnbrasil.com.br/ciencia/america-do-norte-esta-coberta-por-fumaca-ha-uma-semana-veja-video/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-23T00:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A América do Norte tem sido coberta por uma nuvem de fum irmou que o verdadeiro escala da epidemia de Ebola no Congo pode ser duas a quatro vezes maior do que os números oficiais indicam.", "titulo_pt": "Epidemia de Ebola no congo mata mais de 1.000 pessoas, diz OMS", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 66745, "titulo": "Memorial Brumadinho discute como fazer transição energética e mineração sem destruição", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/memorial-brumadinho-discute-como-fazer-transicao-energetica-e-mineracao-sem-destruicao.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-22T19:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Memorial Brumadinho, local dedicado às 272 vítimas do rompimento da barragem Mina Córrego do Feijão em 2019, realiza um seminário de três dias para discutir desafios e caminhos relacionados à mineração e transição energética.", "titulo_pt": "Memorial Brumadinho debate mineração e transição energética", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 67163, "titulo": "Food price fears after Europe’s heatwave destroys estimated €2bn of crops", "url": "https://www.theguardian.com/environment/2026/jul/22/europe-heatwave-june-farming-lost-revenue-crop-damage", "fonte_id": "guardian_world", "data_pub": "2026-07-22T14:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A onda de calor que atingiu a Europa em junho é estimada ter causado uma perda de receita de €2 bilhões aos agricultores de grãos, destruindo cerca de 9 milhões de toneladas de culturas como trigo, cevada, milho e aveia. Isso pode levar a preocupações sobre o aumento do preço dos alimentos.", "titulo_pt": "Medo de aumento nos preços da comida após onda de calor na Europa destruir estimados €2 bilhões em cultivos", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 67167, "titulo": "The bitter lesson of climate change", "url": "ht  "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 66198, "titulo": "'It will get worse': World’s second-coldest capital faces record heat", "url": "http://www.euronews.com/2026/07/22/it-will-get-worse-worlds-second-coldest-capital-faces-record-heat", "fonte_id": "euronews", "data_pub": "2026-07-22T09:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Peritos alertam que o calor extremo reflete uma tendência climática mais ampla que está aumentando os riscos para a saúde, água e segurança alimentar na Ásia Central.", "titulo_pt": "A situação piorará: capital do segundo clima mais frio do mundo enfrenta recordes de calor", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 65560, "titulo": "Empresas criticam proposta do governo para exportação de créditos de carbono", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/empresas-criticam-proposta-do-governo-para-exportacao-de-creditos-de-carbono.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-22T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Empresas do setor de créditos de carbono expressaram preocupações com a proposta do governo federal, temendo que as novas regras possam reduzir sua competitividade e limitar investimentos estrangeiros.", "titulo_pt": "Empresas se alarmam com proposta para exportação de créditos de carbono", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 66313, "titulo": "Japan swelters as weather breaks ‘brutally hot’ threshold", "url": "https://www.japantimes.co.jp/news/2026/07/22/japan/japan-brutal-heat/", "fonte_id": "japan_times", "data_pub": "2026-07-22T06:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A agência meteorológica emitiu alertas para choque térmico em grande parte do país, prevendo outro dia consecutivo de 'kokushobi', que significa literalmente dia brutalmente quente.", "titulo_pt": "Japão /agenciabrasil.ebc.com.br/economia/noticia/2026-07/acusado-pelos-eua-brasil-e-referencia-no-combate-ao-trabalho-forcado", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-22T10:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil enfrenta uma tarifa de 25% sobre parte dos produtos vendidos aos Estados Unidos, resultado de uma decisão unilateral americana. O governo brasileiro espera ainda uma possível sobretaxa adicional de 12,5%, relacionada à percepção de que o país não impede a importação de mercadorias provenientes de países com trabalho forçado.", "titulo_pt": "Acusado pelos EUA, Brasil é referência no combate ao trabalho forçado", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 66410, "titulo": "States Want ICE Agents to Show Their Faces. The Trump Administration Is Blocking Them", "url": "https://www.wired.com/story/states-want-ice-agents-to-show-their-faces-the-trump-administration-is-blocking-them/", "fonte_id": "wired", "data_pub": "2026-07-22T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A administração Trump está impedindo que os estados exijam que agentes da ICE mostrem seus rostos, alegando que leis contra máscaras colocariam em risco os agentes. Os advogados federais argumentam que isso seria perigoso, citando um projeto de reconhecimento facial da ICE que não funciona efetivamente.", "titulo_pt": "Estados querem que agentes da ICE mostrem seus rostos. Administração Trump está bloqueando essa solicitação", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 66463, "titulo": "Hongkonger, 19, guilty of posting seditious graffiti in commercial complex toilet", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3361454/hongkonger-19-guilty-posting-seditious-graffiti-commercial-complex-toilet?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-22T08:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um jovem de 19 anos foi condenado por seditio em Hong Kong após escrever graffiti anti-governamental em um banheiro de um prédio comercial. O tribunal rejeitou a defesa de que uma condição mental congênita impediu Leung Kai-lok de compreender as palavras ofensivas contra o governo e a polícia.", "titulo_pt": "Hongkonger de 19 anos condenado por seditio após escrever graffiti anti-governamental em banheiro comercial", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 66339, "titulo": "‘Nobody Mentions Us’: Silence Surrounds Wartime Rape of Kosovo’s Ethnic Minorities", "url": "https://balkaninsight.com/2026/07/22/nobody-mentions-us-silence-surrounds-wartime-rape-of-kosovos-ethnic-minorities/btj/", "fonte_id": "balkan_insight", "data_pub": "2026-07-22T06:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O estigma ainda envolve o tema da violência sexual durante a guerra no Kosovo, mas essa situação é ainda mais severa para sobreviventes das minorias romas, ashkali e egípcias.", "titulo_pt": "Ninguém nos mentiona: silêncio surpreende violência sexual de guerra em minorias do Kosovo", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}, {"id": 65987, "titulo": "Brittany Higgins accuses Pauline Hanson of victim-blaming for calling domestic violence a ‘two-way street’", "url": "https://www.theguardian.com/australia-news/2026/jul/22/brittany-higgins-pauline-hanson-domestic-violence-comments-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-07-22T05:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Brittany Higgins acusou Pauline Hanson de victimizar mulheres após a líder do partido One Nation afirmar que o violência doméstica é um 'caminho de duas vias' e sugerir que as mulheres não devem tolerar abuso. Advocados condenaram a declaração, considerando-a como uma forma de victimização.", "titulo_pt": "Brittany Higgins acusa Pauline Hanson de victimizar mulheres sobre violência doméstica", "veicul o proliferação nuclear e pode permitir a Arábia Saudita transformar urânio em material para armas nucleares no futuro. Além disso, o pacto tem potenciais impactos econômicos significativos, criando oportunidades para empresas americanas no setor nuclear saudita. A assinatura do acordo também tem implicações políticas e humanitárias, com preocupações sobre a possibilidade de um aumento da proliferação nuclear na região. O desafio agora será garantir que o programa saudita cumpra os padrões globais de não-proliferação e segurança nuclear.", "data_edicao": "2026-07-22", "artigos": [{"id": 67468, "titulo": "Trump signs nuclear sharing deal with Saudi Arabia in policy shift", "url": "https://www.japantimes.co.jp/news/2026/07/23/world/politics/trump-nuclear-saudi-arabia/", "fonte_id": "japan_times", "data_pub": "2026-07-23T00:26:00Z", "topico": "geopolitica", "idioma": "en", "texto_resumo": "O presidente dos Estados Unidos, Donald Trump, assinou um acordo de compartilhamento nuclear com a Arábia Saudita, uma mudança na política que alarmou especialistas em não proliferação nuclear e alguns membros do Congresso. Este novo acordo teme-se possa permitir à Arábia Saudita transformar urânio em material para armas nucleares.", "titulo_pt": "Trump assina acordo de compartilhamento nuclear com a arábia saudita, gerando preocupações", "texto_pt": "O presidente dos Estados Unidos, Donald Trump, assinou um acordo de compartilhamento nuclear com a Arábia Saudita, uma mudança na política que alarmou especialistas em não proliferação nuclear e alguns membros do Congresso. Este novo acordo teme-se possa permitir à Arábia Saudita transformar urânio em material para armas nucleares.", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 67293, "titulo": "US signs landmark nuclear deal with Saudi Arabia", "url": "https://www.bbc.co.uk/news/articles/cj03r59z73po?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-23T00:21:00Z", "topico": "politica_ const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml(topico) : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml(audioKey) {
  const audio = D.audio && D.audio.sumarios && D.audio.sumarios[audioKey];
  if (!audio || !audio.arquivo) return "";
  const src = audio.arquivo + (audio.versao ? "?v=" + encodeURIComponent(audio.versao) : "");
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta" data-audio-src="${esc(src)}" data-audio-key="${esc(audioKey)}">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderPodcast() {
  const p = D.podcast;
  if (!p || !p.arquivo) return "";
  const src = p.arquivo + (p.versao ? "?v=" + encodeURIComponent(p.versao) : "");
  return `<div class="podcast-card">
    <div class="podcast-hd">Ou&ccedil;a Agora</div>
    <audio class="podcast-audio" controls preload="none" src="${esc(src)}"></audio>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml("destaque")}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {

    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';

        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}

    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

  return "8h";
}

const FLAG_ON = FLAG_HASH.length === 64;

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  function _setTocando(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _setPausado(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _tituloAudio(bar) {
    var h = bar.previousElementSibling;
    while (h && !/^H2$/i.test(h.tagName || '')) h = h.previousElementSibling;
    return h ? (h.innerText || h.textContent || 'Boletim Diario').trim() : 'Boletim Diario';
  }

  function _mediaSession(bar) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: _tituloAudio(bar),
      artist: 'Boletim Diario',
      album: 'Leitura dos sumarios',
    });
    navigator.mediaSession.setActionHandler('play', function () { player.play().catch(function () {}); });
    navigator.mediaSession.setActionHandler('pause', function () { player.pause(); });
    navigator.mediaSession.setActionHandler('stop', function () { player.pause(); player.currentTime = 0; });
  }

  window.ttsOuvir = function (btn) {
    var bar = btn.closest('.tts-bar');
    var src = bar && bar.dataset.audioSrc;
    if (!src) return;
    if (barAtual && barAtual !== bar) _resetBar(barAtual);
    barAtual = bar;
    if (player.src !== new URL(src, window.location.href).href) {
      player.src = src;
      player.currentTime = 0;
    } else {
      player.currentTime = 0;
    }
    _mediaSession(bar);
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _resetBar(bar);
    });
  };

  window.ttsPausar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    _setPausado(bar);
  };

  window.ttsContinuar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _setPausado(bar);
    });
  };

  window.ttsPar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    player.currentTime = 0;
    _resetBar(bar);
    if (barAtual === bar) barAtual = null;
  };

  player.addEventListener('ended', function () { _resetBar(barAtual); barAtual = null; });
  player.addEventListener('error', function () { _resetBar(barAtual); barAtual = null; });
  window.addEventListener('beforeunload', function () { player.pause(); });
})();
</script>
</body>
</html>
