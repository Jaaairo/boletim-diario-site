<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=author@400&display=swap" rel="stylesheet">
<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: none; border: 1px solid var(--border); border-radius: 4px;
             color: var(--texto2); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { border-color: var(--acento); color: var(--texto); }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 04/07/2026 19:20 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">
    <div class="modal-erro" id="senha-erro" style="display:none">Senha incorreta.</div>
    <div class="modal-btns">
      <button class="btn-sec2" onclick="fecharModal('modal-senha')">Cancelar</button>

    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>
      <option value="classificacao_errada">Classificação errada</option>
      <option value="resumo_impreciso">Resumo impreciso</option>
      <option value="outro">Outro</option>
    </select>
    <label for="flag-nota">Nota (opcional)</label>
    <textarea id="flag-nota" placeholder="Descreva o problema..."></textarea>
    <div class="modal-btns">
      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "04/07/2026 19:20", "stats": {"noticias_novas": 121, "resumos_gerados": 162}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "A morte do deputado Waldemar Borges, ex-representante da esquerda pernambucana e marido da ministra Luciana Santos, uniu lideranças políticas em luto. O ministro Fachin, ex-presidente do STF, interrompeu o julgamento do marco temporal para garantir uma análise conjunta com outro processo que discute a reintegração de posse de terras. A pesquisa Datafolha sobre a disputa pelo governo de São Paulo será divulgada na madrugada deste domingo, enquanto a Justiça autorizou a quebra do sigilo do celular do ex-vereador Jairinho, que está preso por condenação na morte de Henry Borel. O Papa Leão XIV expressou preocupação com a situação dos migrantes, criticando medidas restritivas adotadas pelo governo Trump.", "mundo": "Houve várias notícias importantes recentemente. Em Teerã, Irão, ocorreu um funeral grandioso para o Ayatollah Ali Khamenei, que faleceu durante ataques dos Estados Unidos e Israel contra o país, com a participação de representantes de Hamas, Hezbollah e Houthis do Iêmen, formando a 'eixo da resistência'. Na Dinamarca, o evento tradicional de comemoração do Dia da Independência dos EUA teve um ano diferente, marcado pela ausência de autoridades americanas e protestos relacionados à ameaça de posse de Groenlândia por Trump. Em Washington, a onda de calor dificultou as comemorações do 4 de julho nos Estados Unidos, levando a cancelamentos e adiamentos de eventos. O presidente paraguaio Santiago Peña evitou retornar perto do estádio após sua viagem aos EUA para o primeiro jogo de sua equipe, declarando um feriado em casa. A Rússia recorreu a estudantes para suprir as baixas na Ucrânia, empregando-os sem treinamento adequado, enquanto a crise de combustível na Rússia continua devido aos ataques de drones ucranianos à infraestrutura energética.\n\nA geopolítica global está em evidência com diversos eventos de destaque. Em primeiro lugar, a China intensificou suas patrulhas marítimas no Mar da China Meridional, levando à condenação da Autoridade de Controladoria de Macau (MAC). Este incidente reflete as crescentes tensões entre as duas potências asiáticas em relação ao controle territorial e soberania nas águas. Em segundo lugar, os Estados Unidos comemoram seu 250º aniversário, mas o evento está repleto de controvérsias, com o presidente Donald Trump buscando influenciar a celebração. No Irã, o funeral do ex-Líder Supremo Ali Khamenei reuniu milhões de iranianos em meio à tensão com os Estados Unidos, enquanto divisões internas na cúpula iraniana se aprofundaram. A Rússia continua intensificando sua presença militar na Ucrânia, recrutando estudantes para o Exército e realizando ataques noturnos com drones contra São Petersburgo, causando preocupações sobre a escalada da guerra em território europeu.", "economia": "A economia global enfrenta diversos desafios e oportunidades, como destacam os artigos. A Ásia, que consome intensamente energia, deve aprender com a crise iraniana para se adaptar aos desafios atuais na área energética, segundo o Taipei Times. Em contraste, a discussão sobre sobrecapacidade na indústria de energia limpa da China gera paradoxos: enquanto a Europa e os Estados Unidos criticam a produção chinesa, buscam desenvolver rapidamente as energias renováveis (SCMP). A economia irlandesa registrou uma queda de 12% no primeiro trimestre devido à evasão fiscal por parte de algumas multinacionais, destacou o Le Monde En. Na América do Sul, o Paraguai experimenta um crescimento econômico médio de 5% nos últimos três anos, refletindo um dos cenários macroeconômicos mais favoráveis da região (BBC Brasil). No cenário nacional, a dívida dos EUA continua sendo uma preocupação, mas foi um marco revolucionário na consolidação financeira do país, liderada por Alexander Hamilton. A Madesa planeja expandir suas operações internacionais para representar 40% de seu faturamento atual, investindo R$ 51 milhões em um centro de distribuição (Folha Mercado).", "tecnologia": "O Brasil realizou o lançamento do seu primeiro foguete movido por propulsão líquida, chamado FTL-Perseu. Este feito coloca o país entre as poucas nações que dominam motores de alta precisão e controle. A Samsung lançou a linha Vision AI com três modelos de TV de alta tecnologia: dois NEO QLED e um OLED. Estes produtos estão disponíveis com descontos na Amazon. Midjourney está sendo processada por Disney, Universal e Warner por usar personagens protegidos para treinar a inteligência artificial, buscando provar que os estúdios também utilizam técnicas semelhantes. A Matic aumentará o preço do seu robô aspirador de pó em 250 dólares a partir de setembro, refletindo uma mudança na estratégia de preços da empresa.", "ciencia": "Um estudo publicado na revista Nature identificou DNA humano de pelo menos 2.000 anos em cavernas da Espanha e Portugal, revelando a preservação do material genético humano por milhares de anos nas paredes rochosas dessas cavernas. Em um desenvolvimento tecnológico promissor, cientistas alemães e japoneses usaram pulsos laser ultrarrapazados para escrever informações magnéticas em antiferromagnets pela primeira vez. Isso pode levar ao desenvolvimento de novos dispositivos de armazenamento e sistemas informatizados mais eficientes. Além disso, a NASA's Hubble Space Telescope capturou uma imagem representando um fureteiro brilhante no céu noturno em comemoração à independência dos Estados Unidos, destacando os avanços tecnológicos na observação do cosmos.", "cultura": "Taiwan está participando de um espetáculo teatral no Festival Off Avignon, com uma apresentação inaugural que incluiu um desfile. Em outro evento cultural, o vilarejo de Little Women, a 20 minutos de Boston, inspirou o livro homônimo escrito por Louisa May Alcott, cuja casa onde ela viveu ainda está preservada no local. No Rio de Janeiro, o bairro boêmio da Lapa foi transformado em um Distrito de Arte e Cultura através de um decreto, com a implantação do Boulevard Selarón ao redor da Escadaria Selarón, tornando-o mais acessível para moradores e visitantes. Além disso, a professora baiana Vera Lacerda criou o bloco Ara Ketu e o instituto Ara Ketu em 1980 no bairro de Periperi, Salvador, com o objetivo de gerar impacto social através da música e do carnaval. Estes eventos destacam a importância da arte, cultura e preservação histórica em diferentes partes do mundo.", "sociedade": "Um jovem de 18 anos faleceu após sofrer uma descompensação no boliche Wabi Fun Club, em Mendoza, Argentina. O incidente ocorreu logo após ele assistir ao jogo da seleção argentina. Em outro caso, uma jovem professora de 26 anos foi assassinada a facadas na sua casa em Las Heras, na Grande Mendoza; seu namorado dominicano fugiu durante a noite e se entregou nas montanhas de Potrerillos neste sábado. No Brasil, uma jovem tentou colidir duas vezes o carro contra a casa de um homem de 68 anos, resultando em ferimentos graves para o suspeito que foi levado ao hospital mas não resistiu às lesões, causando grande comoção no país. A Venezuela registrou 2.954 mortos por terremotos, com 16.309 pessoas deixando suas casas e 16.592 ficando feridas, conforme balanço oficial do governo. O número de mortes em terremotos na Venezuela aumentou em 309 pessoas desde o último relatório. A Lei do Piauí obriga as empresas a reservar vagas para ex-presidiários, promovendo a reintegração social e profissional desses indivíduos. No Ceará, um acidente de ônibus com mais de 40 peregrinos resultou em duas mortes e vários feridos na CE-456, em Juá, zona rural de Canindé.", "meio_ambiente": "Um fórum sobre economia circular foi realizado no Ministério, focando em estratégias para promover a sustentabilidade. O número de vagas para trabalhos verdes, conhecidos como 'green-collar', atingiu um recorde, destacando a crescente demanda por profissionais em áreas ambientais e sustentáveis. Em Minas Gerais, três terremotos ocorreram entre 30 de junho e 2 de julho, causando preocupação sobre a segurança das estruturas locais. Um incêndio florestal no norte de Portugal mobilizou mais de mil bombeiros, resultando em pelo menos nove feridos, com o governo pedindo apoio internacional devido à onda de calor extremo. No Brasil, 88% das casas no Rio Grande do Sul foram afetadas pelas cheias, impactando tanto a estrutura quanto o bem-estar psicológico da população. Além disso, o Great Barrier Reef na Austrália evitou ser listado como em perigo pela Unesco, apesar dos desafios ambientais enfrentados.", "direitos_humanos": "A China implementou uma nova legislação que entrou em vigor no dia 1º de julho, proibindo atos que 'minem a unidade étnica' e exigindo lealdade ao Partido Comunista Chinês. A lei visa pressionar as minorias etnícnicas do país, levantando preocupações sobre direitos humanos. Além disso, a ONU condenou a execução extrajudicial de um palestiniano acusado de colaborar com forças israelenses em Gaza, como parte de uma série de violações legais e supostas."}, "resumo_do_dia": {"politica_nacional": [{"id": 35802, "titulo": "Morte de Waldemar Borges, quadro histórico da esquerda de PE, une João Campos e Raquel Lyra", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*h ": "Brasil", "classe": "A"}, {"id": 35806, "titulo": "Políticos lamentam a morte de Waldemar Borges", "url": "https://www.poder360.com.br/poder-brasil/politicos-lamentam-morte-do-deputado-estadual-waldemar-borges/", "fonte_id": "poder360", "data_pub": "2026-07-04T21:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O deputado estadual Waldemar Borges, que representava Pernambuco, faleceu aos 67 anos. Ele era casado com a ministra Luciana Santos.", "titulo_pt": "Políticos lamentam a morte do deputado Waldemar Borges", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35369, "titulo": "Sumiço de acervo do palácio do governador será denunciado à PF", "url": "https://www.metropoles.com/minas-gerais/sumico-de-acervo-do-palacio-do-governador-sera-denunciado-a-pf", "fonte_id": "metropoles", "data_pub": "2026-07-04T21:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma comissão da Assembleia Legislativa de Minas Gerais (ALMG) planeja denunciar ao Ministério Público Federal (MPF) o sumiço de parte do acervo do Palácio do Governo do Estado, que inclui obras de artistas como Tarsila do Amaral e Di Cavalcanti.", "titulo_pt": "Sumiço de acervo do palácio do governador será denunciado à PF", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35300, "titulo": "Pré-candidato a deputado, Jucá volta à política com críticas às pautas-bomba: 'uma insanidade'", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/pre-candidato-a-deputado-juca-volta-a-politica-com-criticas-as-pautas-bomba-uma-insanidade.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-04T21:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ex-senador Romero Jucá, pré-candidato a deputado federal pelo MDB-RR, criticou as pautas-bomba aprovadas no Senado e afirmou que, se eleito, priorizará o debate sobre os gastos públicos.", "titulo_pt": "Jucá critica pautas-bomba "Morre Waldemar Borges, marido da ministra Luciana Santos", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35323, "titulo": "Michelle Bolsonaro responde críticas por elogiar iniciativa de Lula: ‘acima de ideologia’", "url": "https://www.cartacapital.com.br/politica/michelle-bolsonaro-responde-criticas-por-elogiar-iniciativa-de-lula-acima-de-ideologia/", "fonte_id": "cartacapital", "data_pub": "2026-07-04T20:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Michelle Bolsonaro comentou sobre a Política Nacional de Educação Bilíngue de Surdos, criada pelo Ministério da Educação. Ela defendeu o projeto, afirmando que está acima de considerações ideológicas.", "titulo_pt": "Michelle Bolsonaro responde críticas ao elogiar iniciativa de Lula", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 35339, "titulo": "Moraes manda apreender 11 armas de Bolsonaro; leia a lista", "url": "https://www.poder360.com.br/poder-justica/moraes-manda-apreender-11-armas-de-bolsonaro-leia-a-lista/", "fonte_id": "poder360", "data_pub": "2026-07-04T19:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro Moraes revogou o porte de armas do ex-presidente Bolsonaro, mas manteve a prisão domiciliar humanitária. Foram apreendidas 11 armas de propriedade do ex-presidente.", "titulo_pt": "Moraes ordena apreensão de 11 armas de Bolsonaro; mantém prisão domiciliar", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35324, "titulo": "Papa Leão XIV pede que Europa proteja os migrantes", "url": "https://www.cartacapital.com.br/mundo/papa-leao-xiv-pede-que-europa-proteja-os-migrantes/", "fonte_id": "cartacapital", "data_pub": "2026-07-04T19:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O papa Leão XIV expressou sua preocupação com a situação dos migrantes, criticando medidas restritivas e classificando o tratamento dado aos imigrantes pelo governo Trump como desumano. Ele já havia se manifestado anteriormente contra políticas de repressão à migração.", "titulo_pt": "Papa Leão XIV pede que Europa proteja os migrantes", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 35341, "titulo": "Carlos visita Bolsonaro e diz que o pai está “ciente de tudo”", "url": "https://www.poder360.com.br/poder-eleicoes/carlos-visita-bolsonaro-e-diz-que-o-pai-esta-ciente-de-tudo/", "fonte_id": "poder360", "data_pub": "2026-07-04T19:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ex-vereador Carlos relatou nas redes sociais que visitou o ex-presidente Bolsonaro, que está sob prisão domiciliar. Durante a visita, Bolsonaro afirmou estar 'ciente de tudo'.", "titulo_pt": "Carlos visita Bolsonaro e diz que o pai está ‘ciente de tudo’", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35342, "titulo": "Acidente com ônibus de romeiros mata 2 no Ceará", "url": "https://www.poder360.com.br/poder-brasil/acidente-com-onibus-de-romeiros-mata-2-no-ceara/", "fonte_id": "poder360", "data_pub": "2026-07-04T19:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um acidente envolvendo um ônibus de romeiros ocorreu no Ceará, resultando na morte de duas pessoas. Pelo menos 23 passageiros foram levados ao hospital após o veículo seguir rumo ao Santuário de São Francisco das Chagas, em Canindé.", "titulo_pt": "Acidente com ônibus de romeiros mata 2 no Ceará", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35343, "titulo": "Michelle diz que pauta de surdos está acima de ideologia", "url": "https://www.poder360.com.br/poder-gente/michelle-diz-que-pauta-de-surdos-esta-acima-de-ideologia/", "fonte_id": "poder360", "data_pub": "2026-07-04T19:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Michelle, ex-primeira-dama do Brasil, elogiou o programa de educação bilíngue para surdos lançado pelo governo Lula.", "titulo_pt": "Michelle elogia pauta de surdos acima de ideologia", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35355, "titulo": "O objetivo de Kassab ao insistir em chapa puro-sangue do PSD ao Planalto", "url": "https://veja.abril.com.br/politica/o-objetivo-de-kassab-ao-insistir-em-chapa-puro-sangue-do-psd-ao-planalto/", "fonte_id": "veja", "data_pub": "2026-07-04T19:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Internamente, há a percepção de que a aliança entre Caiado e Kassab tenha baixas chances de sucesso nas eleições. O objetivo de Kassab é manter uma chapa pura do PSD para o Planalto.", "titulo_pt": "O propósito de Kassab em manter chapa puro-sangue do PSD para a presidência", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 35726, "titulo": "MAC condemns China’s sea patrols", "url": "https://www.taipeitimes.com/News/front/archives/2026/07/05/2003860246", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A MAC (provavelmente uma abreviação para alguma autoridade ou instituição) condenou as patrulhas marítimas da China. O contexto sugere que há tensões relacionadas a controle territorial ou soberania nas águas.", "titulo_pt": "MAC condena patrulhas marítimas chinesas", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35748, "titulo": "EDITORIAL: Taiwan anchors First Island Chain", "url": "https://www.taipeitimes.com/News/editorials/archives/2026/07/05/2003860237", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo discute a posição estratégica de Taiwan no Primeiro Círculo da Ilha. A passagem destaca o papel crucial desempenhado por Taiwan nesta estrutura geopolítica.", "titulo_pt": "Editorial: Taiwan é o Pilar do Primeiro Círculo da Ilha", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35750, "titulo": "Taiwan risks losing out in region", "url": "https://www.taipeitimes.com/News/editorials/archives/2026/07/05/2003860239", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Taiwan corre o risco de ser marginalizada na região. O país enfrenta desafios significativos que podem afetar sua influência e posição no contexto regional.", "titulo_pt": "Taiwan corre risco de perder influência na região", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35862, "titulo": "Denmark’s century-old Fourth of July party looks different this year.", "url": "https://www.nytimes.com/live/2026/07/04/us/america-250-celebrations-fourth-july/denmarks-century-old-fourth-of-july-party-looks-different-this-year", "fonte_id": "nyt_world", "data_pub": "2026-07-04T21:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O evento de comemoração do Dia da Independência dos Estados Unidos na Dinamarca, que tem uma história centenária, teve um ano diferente este ano. A ausência de autoridades americanas no programa e a chegada de protestos refletiram o foco nas ameaças de Trump sobre a posse de Groenlândia.", "titulo_pt": "A festa da independência dos EUA na Dinamarca, com 100 anos, toma um rumo diferente este ano", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 35804, "titulo": "Onda de calor nos EUA atrapalha comemorações do 4 de Julho e sobrecarrega rede elétrica", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/ambiente/2026/07/onda-de-calor-nos-eua-atrapalha-comemoracoes-do-4-de-julho-e-sobrecarrega-rede-eletrica.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-07-04T21:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma onda de calor tem dificultado as comemorações do 4 de Julho em várias regiões dos Estados Unidos, forçando cancelamentos e adiamentos de eventos. Autoridades na capital e em outros locais tiveram que modificar planos para desfiles, shows e queima de fogos.", "titulo_pt": "Onda de calor atrapalha comemorações do 4 de Julho nos EUA", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 35892, "titulo": "Iran’s funeral diplomacy: The Quran verses that ranked allies, rivals and sent Saudi Arabia a message", "url": "https://www.middleeasteye.net/news/irans-funeral-diplomacy-quran-verses-ranked-allies-rivals-and-message-saudi-arabia", "fonte_id": "middle_east_eye", "data_pub": "2026-07-04T21:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Na cerimônia de funeral do líder supremo iraniano Ali Khamenei, versículos do Alcorão foram recitados que destacaram aliados e rivais, enviando uma mensagem sutil à Arábia Saudita. O evento revelou um tom vitorioso em vez de luto.", "titulo_pt": "Diplomacia no funeral: Versículos do Alcorão classificaram aliados e rivais e enviaram uma mensagem à Arábia Saudita", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 35689, "titulo": "Masses of Iranians defy heatwave on second day of Khamenei’s funeral", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/4/masses-of-iranians-defy-heatwave-on-second-day-of-khameneis-funeral?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T21:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As multidões iranianas continuaram a participar nos funerais do antigo líder supremo Ali Khamenei em sua segunda jornada. A cerimônia está sendo realizada em meio a uma onda de calor.", "titulo_pt": "Massas iranianas desafiam calor em segundo dia dos funerais de Khamenei", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 35432, "titulo": "Como expansão territorial e populacional dos EUA em 250 anos transformou o país em uma potência marcada por divisões", "url": "https://www.bbc.com/portuguese/articles/cgevppylv24o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-04T20:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Nos 250 anos desde a declaração de independência, os Estados Unidos expandiram-se de pequenos assentamentos para uma potência global que abrange um continente inteiro e além.", "titulo_pt": "Como expansão territorial e populacional dos EUA em 250 anos transformou o país em uma potência marcada por divisões", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 35336, "titulo": "Drones ucranianos atingem terminal e porto de petróleo na Rússia", "url": "https://www.poder360.com.br/poder-internacional/drones-ucranianos-atingem-terminal-e-porto-de-petroleo-na-russia/", "fonte_id": "poder360", "data_pub": "2026-07-04T20:49:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo russo afirmou ter abatido 72 drones e que a ofensiva perto de São Petersburgo não resultou em vítimas. O presidente ucraniano, Zelensky, reivindicou a autoria da operação.", "titulo_pt": "Drones ucranianos atingem terminal e porto de petróleo na Rússia", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35616, "titulo": "The most superstitious man in Paraguayan politics", "url": "https://www.politico.com/live-updates/2026/07/04/world-cup-2026/santiago-penas-paraguay-president-last-chance-superstition-00987014", "fonte_id": "politico", "data_pub": "2026-07-04T20:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Presidente paraguaio Santiago Peña evitou retornar perto do estádio após viagem aos Estados Unidos para o primeiro jogo de sua equipe, mas declarou um feriado de casa.", "titulo_pt": "O político mais supersticioso do Paraguai", "veiculo": "Politico", "pais": "EUA", "classe": "A"}, {"id": 35551, "titulo": "Huge Crowds Mass in Tehran for Ayatollah’s State Funeral", "url": "https://www.nytimes.com/2026/07/04/world/middleeast/iran-ayatollah-funeral.html", "fonte_id": "nyt_world", "data_pub": "2026-07-04T20:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Há multidões em Teerã para o funeral do Ayatollah Ali Khamenei, que morreu no início dos ataques dos Estados Unidos e Israel. Cerimônias de luto pública começaram.", "titulo_pt": "Multidões se aglomeram em Teerã para o funeral do Ayatollah", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 35613, "titulo": "In Mount Rushmore speech, Trump veers from U.S. exceptionalism to warnings about communism", "url": "https://www.npr.org/2026/07/04/g-s1-132025/mount-rushmore-speech-trump-july-4-250", "fonte_id": "npr_news", "data_pub": "2026-07-04T20:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em seu discurso no Mount Rushmore, o presidente Trump abordou temas políticos de forma mais direta do que é comum, passando de ideias sobre a excepcionalismo dos Estados Unidos para alertas sobre o comunismo.", "titulo_pt": "Em discurso no Mount Rushmore, Trump mistura excepcionalismo americano com advertências sobre o comunismo", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 35718, "titulo": "Putin visits military installation, vowing to take more of Ukraine", "url": "https://www.washingtonpost.com/world/2026/07/04/putin-visits-military-installation-vowing-take-more-ukraine/", "fonte_id": "washington_post_world", "data_pub": "2026-07-04T20:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente russo visitou uma instalação militar e prometeu tomar mais território na Ucrânia, tentando contrariar a ideia de que Moscou está tendo dificuldades em sua guerra após drones ucranianos causarem uma grave escassez de combustível.", "titulo_pt": "Putin visita instalação militar e promete avançar mais na Ucrânia", "veiculo": "Washington Post - World", "pais": "EUA", "classe": "A"}, {"id": 35666, "titulo": "Hezbollah, Hamas and Houthi officials attend funeral ceremonies for Iran's Khamenei", "url": "https://www.france24.com/en/middle-east/20260704-hezbollah-hamas-and-houthi-officials-attend-funeral-ceremonies-for-iran-s-khamenei", "fonte_id": "france24", "data_pub": "2026-07-04T20:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Muitos homenageadores compareceram à Mesquita Grande Mosalla em Teerã no sábado para prestar homenagem ao ex-líder supremo Ayatollah Ali Khamenei. Entre os presentes estavam representantes de Hamas, Hezbollah e os Houthis do Iêmen, membros da 'eixo da resistência' que o Irã tem apoiado há anos em sua longa luta contra Israel.", "titulo_pt": "Hezbollah, Hamas e Houthis participam das cerimônias fúnebres para Ayatollah Ali Khamenei", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 35552, "titulo": "Prince Harry Will Travel to London, but Without His Family", "url": "https://www.nytimes.com/2026/07/04/world/europe/prince-harry-london-trip-meghan-children.html", "fonte_id": "nyt_world", "data_pub": "2026-07-04T20:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Prince Harry planeja viajar a Londres, mas sem sua família. No entanto, seu marido, Meghan, e seus filhos podem se juntar a ele para outras partes do viagem fora da capital, segundo uma fonte próxima à família.", "titulo_pt": "Príncipe Harry Viajará a Londres, Mas Sem Sua Família", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 35553, "titulo": "The Funeral of Iran’s Supreme Leader, Ali Khamenei", "url": "https://www.nytimes.com/2026/07/04/world/middleeast/the-funeral-of-irans-supreme-leader-ali-khamenei.html", "fonte_id": "nyt_world", "data_pub": "2026-07-04T20:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A nova liderança do Irã está realizando um funeral para o Ayatollah Ali Khamenei, ocorrido no primeiro dia da guerra dos Estados Unidos e de Israel contra o país. Este funeral é inédito em termos recentes.", "titulo_pt": "O Funeral do Líder Supremo do Irã, Ali Khamenei", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 35746, "titulo": "Energy-hungry Asia must learn from Iran crisis", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/05/2003860235", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ásia, que consome muita energia, deve aprender com a crise iraniana. O artigo sugere que o continente precisa se adaptar e buscar soluções devido aos desafios energéticos atuais.", "titulo_pt": "Ásia, consumidora de energia, deve aprender com a crise iraniana", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35919, "titulo": "‘Overcapacity’ talk reflects a West irked by China’s industrial rise", "url": "https://www.scmp.com/opinion/world-opinion/article/3358751/overcapacity-talk-reflects-west-irked-chinas-industrial-rise?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T21:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A discussão sobre a suposta 'overcapacity' na indústria de energia limpa da China é paradoxal. Enquanto Europa deseja mais e mais rápido desenvolvimento de energias renováveis, critica a produção chinesa de painéis solares, turbinas eólicas, baterias e veículos elétricos que tornam essa expansão possível.", "titulo_pt": "Discussão sobre 'overcapacity' reflete irritação ocidental diante do avanço industrial chinês", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 35890, "titulo": "'Ireland's GDP trends reflect global strategies of a handful of multinationals more than the actual state of the economy'", "url": "https://www.lemonde.fr/en/opinion/article/2026/07/04/ireland-s-gdp-trends-reflect-global-strategies-of-a-handful-of-multinationals-more-than-the-actual-state-of-the-economy_6755154_23.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-04T21:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A economia irlandesa registrou uma queda de 12% no primeiro trimestre devido ao aumento das tarifas imposto por Donald Trump, mas isso se deve principalmente à evasão fiscal da Irlanda das regras internacionais do comércio por parte de algumas multinacionais.", "titulo_pt": "Tendências do PIB da Irlanda refletem estratégias globais de poucas multinacionais mais do que o estado real da economia", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 35820, "titulo": "A dívida dos EUA virou fonte de preocupação, mas já foi um marco revolucionário", "url": "https://www.infomoney.com.br/business/global/a-divida-dos-eua-virou-fonte-de-preocupacao-mas-ja-foi-um-marco-revolucionario/", "fonte_id": "infomoney", "data_pub": "2026-07-04T21:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A dívida dos EUA foi um marco revolucionário na consolidação financeira do país, liderada por Alexander Hamilton. No entanto, atualmente, ela está reacendendo preocupações sobre a solvência americana.", "titulo_pt": "Dívida dos EUA: de marco revolucionário a fonte de preocupação", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 35289, "titulo": "Madesa planeja fazer operação internacional chegar a 40% do faturamento", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/07/madesa-planeja-fazer-operacao-internacional-chegar-a-40-do-faturamento.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-04T21:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Madesa investiu R$ 51 milhões na construção de um centro de distribuição com 31 mil metros quadrados para apoiar sua expansão internacional. A empresa almeja que as vendas externas representem 40% do faturamento, atualmente em 20%, e tem uma receita anual de aproximadamente R$ 1 bilhão.", "titulo_pt": "Madesa planeja aumentar operações internacionais para 40% do faturamento", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 35290, "titulo": "Associaç eiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 35763, "titulo": "Europe's baked rice bowl seeks escape from drought", "url": "https://phys.org/news/2026-07-europe-rice-bowl-drought.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A região mais importante para a produção de arroz da Europa enfrenta uma seca precoce, com plantações irrigadas estressadas e plantas daninhas dominando os campos em Pavia, na província italiana.", "titulo_pt": "Prato de arroz da Europa busca escape do drought", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 35764, "titulo": "Ancient teeth from Siberia rewrite the plague's timeline, dating back to over 5,500 years ago", "url": "https://phys.org/news/2026-06-ancient-teeth-siberia-rewrite-plague.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T18:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas encontraram evidências da peste mais antigas do que se pensava, datando de há cerca de 5.500 anos na Sibéria. Isso significa que a pandemia da peste começou cerca de 200 anos antes do que era previsto.", "titulo_pt": "Incêndios antigos da Sibéria reescrevem cronologia da peste, datando de mais de 5.500 anos atrás", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 35775, "titulo": "America 250: From 1776 to the moon and beyond (A Space.com series)", "url": "https://www.space.com/space-exploration/america-250-from-1776-to-the-moon-and-beyond-a-space-com-series", "fonte_id": "space_com", "data_pub": "2026-07-04T18:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Space.com revisou os avanços americanos no espaço desde 1776 e explorou possíveis direções futuras. O artigo celebra o 250º aniversário dos Estados Unidos.", "titulo_pt": "América 250: Do século XVIII à lua e além (Série Space.com)", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 35765, "titulo": "Common nanostructures may explain shared photoproperties in two widespread dark materials", "url": "https://phys.org/news/2026-06-common-nanostructures-photoproperties-widespread-dark.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo quadro de compreensão das propriedades fotônicas tanto da matéria orgânica natural quanto do eumelanina, um pigmento natural responsável pelos tons escuros em organismos, pode inspirar tecnologias sustentáveis avançadas, conforme afirmam os cientistas.", "titulo_pt": "Nanoestruturas comuns podem explicar propriedades fotônicas compartilhadas entre dois materiais escuros amplamente distribuídos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 35399, "titulo": "Calor extremo cancela desfiles e altera celebrações dos 250 anos da Independência dos EUA", "url": "https://exame.com/mundo/calor-extremo-cancela-desfiles-e-altera-celebracoes-dos-250-anos-da-independencia-dos-eua/", "fonte_id": "exame", "data_pub": "2026-07-04T17:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Temperaturas extremas de até 38°C e sensação térmica próxima de 46°C levaram ao cancelamento de eventos dos 250 anos da Independência dos EUA em Washington, Filadélfia e outras cidades. Milhões de americanos permanecem sob alerta de calor.", "titulo_pt": "Calor extremo cancela celebrações dos 250 anos da Independência nos EUA", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 35766, "titulo": "BC and Alberta fall behind on fracking safety distances for residents", "url": "https://phys.org/news/2026-07-bc-alberta-fall-fracking-safety.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em maio, o Prime minister Mark Carney anunciou planos para duplicar a capacidade da rede elétrica canadense até 2050, usando gás natural sob o nome de 'energizar o Canadá forte'. A maioria do gás natural a/ley-propiedad-privada-cgt-iglesia-suman-presion-oficialismo-sigue-negociando-cambios-aprobacion_0_yT00Cw8USG.html", "fonte_id": "clarin", "data_pub": "2026-07-04T19:25:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O projeto de lei elimina as restrições para a compra de terras por estrangeiros, gerando preocupações sobre a soberania nacional. A CGT e a Igreja estão pressionando contra o projeto, enquanto o governo continua negociando mudanças para sua aprovação.", "titulo_pt": "Lei de Propriedade Privada: CGT e Igreja pressionam enquanto governo negocia mudanças", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 35490, "titulo": "Número de mortos em terremotos na Venezuela sobe para 2.954, diz governo", "url": "https://www.cnnbrasil.com.br/internacional/numero-de-mortos-em-terremotos-na-venezuela-sobe-para-2-954-diz-governo/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T19:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O número de mortos em terremotos na Venezuela aumentou para 2.954, conforme informado pelo governo. A atualização representa um aumento de 309 pessoas em relação ao relato anterior, embora críticos afirmem que as cifras podem estar subestimadas.", "titulo_pt": "Número de mortos em terremotos na Venezuela sobe para 2.954, diz governo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 35467, "titulo": "Suicidio adolescente: las señales que no conviene ignorar", "url": "https://www.clarin.com/sociedad/suicidio-adolescente-senales-conviene-ignorar_0_DLb5TUx00i.html", "fonte_id": "clarin", "data_pub": "2026-07-04T19:12:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Especialistas, órgãos públicos e uma ONG composta por sobreviventes de tentativas de suicídio concordam que é importante perguntar sobre o suicídio apesar do medo, ouvir sem julgar e não diminuir o apoio após a primeira crise parecer ter passado.", "titulo_pt": "Suicídio adolescente: sinais que n rum sobre economia circular", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35741, "titulo": "‘Green-collar’ job openings hit high", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/05/2003860266", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O número de vagas para trabalhos verdes, conhecidos como 'green-collar', atingiu um recorde. Esses empregos estão relacionados a áreas ambientais e sustentáveis.", "titulo_pt": "Vagas de trabalho verde batem recorde", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35809, "titulo": "PMDF resgata 22 aves silvestres mantidas ilegalmente em cativeiro", "url": "https://www.metropoles.com/distrito-federal/pmdf-resgata-22-aves-silvestres-mantidas-ilegalmente-em-cativeiro", "fonte_id": "metropoles", "data_pub": "2026-07-04T21:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Militar do Distrito Federal (PMDF) resgatou 22 aves silvestres mantidas ilegalmente em cativeiro. Os animais foram encontrados em nove residências e os proprietários responderão por crime ambiental.", "titulo_pt": "PMDF resgata 22 aves silvestres mantidas ilegalmente em cativeiro", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35366, "titulo": "Com sensação de 46°C, EUA têm onda de calor no Dia da Independência", "url": "https://www.metropoles.com/mundo/com-sensacao-de-46c-eua-tem-onda-de-calor-no-dia-da-independencia", "fonte_id": "metropoles", "data_pub": "2026-07-04T21:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A onda de calor extremo nos Estados Unidos, com temperaturas chegando a 46°C, obrigou autoridades a cancelar feiras e shows das comemorações do Dia da Independência, que marcou os 250 anos do evento.", "titulo_pt": "Com sensação térmica de 46°C, EUA cancelam eventos no Dia da Independência", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35368, "titulo": "MG registra três tremores de terra em apenas quatro dias", "url": "https://www.metropoles.com/minas-gerais/mg-registra-tres-tremores-de-terra-em-apenas-quatro-dias", "fonte_id": "metropoles", "data_pub": "2026-07-04T21:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em Minas Gerais, foram registrados três tremores de terra entre segunda-feira (30/6) e quinta-feira (2/7), em Pirajuba, Planura e Sete Lagoas.", "titulo_pt": "MG registra três tremores de terra em quatro dias", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35664, "titulo": "Climate change: 'We cannot meet the challenge of adapting housing with the tools of the past. A thorough overhaul is needed'", "url": "https://www.lemonde.fr/en/economy/article/2026/07/04/climate-change-we-cannot-meet-the-challenge-of-adapting-housing-with-the-tools-of-the-past-a-thorough-overhaul-is-needed_6755153_19.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-04T20:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Christophe Rodriguez, diretor do Instituto Francês de Eficiência Energética dos Edifícios, explica à Le Monde a urgência de reformar as instituições para implementar o 'projeto do século' – a renovação da carteira imobiliária francesa. É necessário um overhaul significativo para enfrentar o desafio de adaptar o abrigamento às mudanças climáticas.", "titulo_pt": "Mudanças climáticas: não podemos enfrentar o desafio de adaptar habitações com ferramentas do passado", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 35476, "titulo": "Calor extremo nos EUA impacta comemorações do 4 de julho e cancela eventos", "url": "https://www.cnnbrasil.com.br/internacional/calor-extremo-nos-eua-impacta-comemoracoes-do-4-de-julho-e-cancela-eventos/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T20:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A onda de calor extremo nos Estados Unidos atingir emo.", "titulo_pt": "Incêndio florestal mobiliza mais de mil bombeiros em Portugal", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 35148, "titulo": "MG: 2 vilas disputam selo da ONU entre as melhores do turismo mundial", "url": "https://www.metropoles.com/minas-gerais/mg-2-vilas-disputam-selo-da-onu-entre-as-melhores-do-turismo-mundial", "fonte_id": "metropoles", "data_pub": "2026-07-04T14:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Conceição de Ibitipoca e Delfinópolis estão entre os sete destinos brasileiros indicados para o reconhecimento internacional pelo Programa das Nações Unidas para o Meio Ambiente (PNUMA).", "titulo_pt": "MG: 2 vilas disputam selo da ONU entre as melhores do turismo mundial", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 34847, "titulo": "Italian rice crops suffer in drought, worst European heatwave ever", "url": "https://www.scmp.com/news/world/europe/article/3359427/italian-rice-crops-suffer-drought-worst-european-heatwave-ever?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T12:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em uma das piores ondas de calor da Europa, culturas de arroz na região mais importante para a produção do grão na Itália estão sofrendo. Sharon Angoli, de 22 anos, observa campos secos e sem perspectivas de recuperação mesmo com chuvas abundantes.", "titulo_pt": "Cultivos de arroz na Itália sofrem com onda de calor extremamente severa", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 34795, "titulo": "Firefighters race to contain flames in northeastern Spain", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/4/firefighters-race-to-contain-flames-in-northeastern-spain?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T12:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Incêndios florestais estão ocorrendo no nordeste da Espanha e bombeiros titulo": "Watch Mark Ruffalo, Sarah Jessica Parker, Margaret Atwood, Judd Apatow and More Give Instructions to Combat Trump’s Tyranny on July 4th", "url": "https://variety.com/2026/politics/news/july-4-trump-warning-mark-ruffalo-sarah-jessica-parker-margaret-atwood-judd-apatow-1236801648/", "fonte_id": "variety", "data_pub": "2026-07-04T13:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de atores, ativistas, intelectuais e comediantes se uniram para emitir um alerta sobre a fragilidade da democracia americana. Timothy Snyder, historiador e autor best-seller especializado em fascismo, reuniu diversas figuras proeminentes para ler trechos de sua obra.", "titulo_pt": "Veja Mark Ruffalo, Sarah Jessica Parker, Margaret Atwood, Judd Apatow e Outros Dar Instruções para Combater a Tirania de Trump no Dia 4 de Julho", "veiculo": "Variety", "pais": "EUA", "classe": "C"}, {"id": 35119, "titulo": "Pope Leo urges migrant protection, integration on visit to Lampedusa", "url": "https://www.aljazeera.com/news/2026/7/4/pope-urges-protection-integration-of-migrants-on-visit-to-island-frontier?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T12:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Papa Leão encoraja a Europa e os Estados Unidos a acolherem e ajudarem migrantes durante uma viagem simbólica à ilha italiana de Lampedusa.", "titulo_pt": "Papa Leo incentiva proteção e integração de migrantes em visita a Lampedusa", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 34681, "titulo": "‘The situation is terrible’: aid workers on life in Sudanese city pummelled by drone strikes", "url": "https://www.theguardian.com/world/2026/jul/04/el-obeid-aid-workers-sudan-war-drone-strikes", "fonte_id": "guardian_world", "data_pub": "2026-07-04T11:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A cidade de El Obeid, no Sudão, está sendo atacada por drones das forças armadas do pa const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">
      <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
      <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
      <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
      <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
    </div>` : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>

    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {

      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">

        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>

    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");

  b.onclick = () => ativar(id);

  nav.appendChild(b);
});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

  flags[_fUrl] = {

    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices().filter(function(v) { return v.lang === 'pt-BR' || v.lang.startsWith('pt'); });
    return vs[0] || null;
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // sempre a .sumario imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
