<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
</style>
</head>

<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>

</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">

    <label for="inp-senha">Senha</label>

  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>

    <select id="flag-tipo">

      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "27/06/2026 13:47", "stats": {"noticias_novas": 93, "resumos_gerados": 293}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O clã Bolsonaro enfrenta novos desafios internos e externos. Michelle Bolsonaro criticou um vídeo publicado por ela mesma, levantando questionamentos sobre o apoio a Ciro Gomes sem autorização do presidente Jair Bolsonaro. Em outro evento político em Goiânia, Flávio Dino lançou sua candidatura, dois dias após ser alvo de críticas de Bolsonaro na internet. No cenário econômico, a empresa Marcopolo planeja expandir seu negócio no transporte urbano do Rio de Janeiro. Na política nacional, André Mendonça assume o controle do inquérito sobre o filme 'Dark Horse', enquanto Tarcísio de Freitas nomeia um coronel do Exército para melhorar as relações com prefeitos da região de Campinas. A administração pública paulista enfrenta críticas por dificuldades em converter planos em resultados tangíveis, e pesquisas sobre a eleição presidencial de 2026 devem ser divulgadas na próxima semana.", "mundo": "O mundo enfrenta uma série de crises e conflitos que afetam diversos países. No Brasil, o governo anunciou a envio de um terceiro avião com ajuda humanitária para a Venezuela, reforçando esforços internacionais para auxiliar as vítimas dos terremotos recentes no país. Em contraste, na região do Oriente Médio, ataques múltiplos entre Irã e Estados Unidos no Estreito de Ormuz levaram a um acirramento das tensões. No Afeganistão, um forte terremoto atingiu regiões próximas ao Paquistão, causando preocupações sobre danos potenciais. Na América Latina, a Venezuela enfrenta desafios políticos e sociais, com cidadãos resgatados sob escombros após tempestades e um cachorro que salvou 12 pessoas ganhando destaque como herói. Em contraste, na Europa, o calor extremo em França resultou em quatro mortes infantis, enquanto a ONU alerta para um potencial impacto de 6,8 milhões de pessoas afetadas por tremores sísmicos na Venezuela.\n\nA tensão geopolítica está se intensificando na região do Oriente Médio e em todo o mundo. Primeiramente, a Ucrânia intensificou seus ataques com drones contra complexos industriais russos em Volgogrado e Sumy, visando reduzir as receitas da Rússia para financiar a guerra. Paralelamente, o Irã acusou os Estados Unidos de violar um acordo nuclear, respondendo com ataques acentuados contra alvos militares americanos em sua área, incluindo Bahrein. O conflito entre essas duas nações reavivou dúvidas sobre a manutenção do Estreito de Ormuz aberto e levantou novas preocupações sobre a estabilidade global. Além disso, o Irã afirmou ter atacado alvos dos Estados Unidos após uma ação norte-americana no Estreito de Ormuz, marcando as primeiras acusações mútuas de violar um cessar-fogo desde que foi assinado um memorando de entendimento. Em outro desenvolvimento, o Irã também afirmou que mais navios estão solicitando permissões para passar pelo Estreito de Ormuz após a expedição de disparos de advertência. Por fim, Israel acusou o Líbano de tentar provocar uma guerra civil no país, em resposta ao acordo recentemente assinado entre Israel e os Estados Unidos.", "economia": "O governo Lula lançou uma iniciativa para refinanciar R$ 12,4 bilhões de dívidas de microempreendedores individuais (MEIs) inadimplentes, oferecendo descontos de até 70% nos juros e encargos. Este programa visa beneficiar cerca de 3,5 milhões de MEIs. Paralelamente, a Bolívia encerrou sua paridade cambial com o dólar após 15 anos, implementando um sistema de câmbio flexível para desvalorizar sua moeda e tentar restaurar a estabilidade econômica do país. No mercado imobiliário brasileiro, espera-se investimentos de R$ 2 trilhões em tecnologias digitais até 2029, com destaque para os data centers. Além disso, o Brasil pode beneficiar da demanda dos EUA por carne bovina mais magra, enquanto a empresa CMPC redefiniu prazos para obter permissões ambientais em um grande projeto no país.", "tecnologia": "A utilização da inteligência artificial (IA) para combater doenças e melhorar a segurança cibernética ganhou destaque recentemente. Connor Christou, um fundador que enfrenta câncer, usou IA para analisar dados relacionados à sua saúde, buscando combater o mal. Além disso, a Apple anunciou aumentos de preços em seus produtos, justificando essa decisão com as necessidades de investimento na IA. No cenário tecnológico, a BYD, uma fabricante chinesa de veículos elétricos, declarou que será o maior fabricante de automóveis do mundo em cinco anos, desafiando gigantes como a Toyota. A IA também está sendo usada para decifrar textos antigos, como um rolo carbonizado encontrado na Grécia, com a ajuda da tecnologia. Em outro desenvolvimento importante, empresas asiáticas estão lançando modelos de IA semelhantes ao Mythos, evitando riscos legais associados às exportações.", "ciencia": "Um estudo recente publicado na Scientific American destacou o biólogo e neurocientista brasileiro Kauê Costa como uma figura emergente no campo da ciência, com 36 anos. Esta menção ocorreu em sua lista de jovens cientistas promissores publicada pela revista americana voltada à divulgação científica. Paralelamente, pesquisadores do grupo liderado pelo Professor Joongoo Lee, da Universidade de Ciência e Tecnologia de Pohang (POSTECH), desenvolveram um método automatizado e modular para montar sistemas celulares reconstituídos, reduzindo o custo em 95% na produção de proteínas fora das células vivas. Este avanço tem potencial para impactar significativamente várias áreas da biotecnologia. Além disso, a NASA utilizou um drone para transportar um rim humano não viável para transplante além da linha de visão, com o objetivo de testar a viabilidade desse método para entregas futuras a pacientes. Este avanço pode revolucionar o transporte de órgãos para transplantes em regiões remotas ou afetadas por catástrofes naturais.", "cultura": "Maria Bethânia completa 80 anos como referência na música brasileira, mantendo-se presente desde a ditadura militar. A cantora e compositora estreou no 'Show do Opinião' em 1965, quando ainda se chamava Nara Leão, e continua influente no cenário cultural nacional. Paralelamente, o Festival Gourmet do Pátio Higienópolis promove um fim de semana com música ao vivo e pratos gastronômicos na região central de São Paulo. Na literatura, a americana Joan Didion é explorada pela autora Maggie McKinley no conceito de nostalgia futurista, enquanto o iraniano Shohreh Laici reflete sobre sua experiência durante tempos de guerra. No universo da cultura pop, 'Jackass' encerra suas atividades com Jeff Tremaine explicando que a série não continuará por causa das lesões e trauma dos atores.", "sociedade": "Um terremoto devastador na Venezuela resultou em muitas vítimas e o governo local enfrenta dificuldades para resgatar sobreviventes. Segundo um relatório do Instituto Pensi, os brasileiros demonstraram grande solidariedade em causas sociais, enquanto a ONU trabalha para auxiliar animais afetados pelo sismo. Em Hong Kong, um menino faleceu após sofrer de febre do calor durante uma atividade esportiva. No Chile, a qualidade do sono é considerada baixa devido ao estilo de vida e horários desorganizados. Na Venezuela, o governo enfrenta críticas por ter emitido um falso alerta pela Defesa Civil, que foi exposto como vulnerável à segurança cibernética.", "meio_ambiente": "A Europa está enfrentando um período de calor intenso, que está batendo recordes e causando preocupações. A Alemanha registrou temperaturas de 41,3°C no verão deste ano, superando o recorde anterior de 2019. Em simultâneo, a Itália também enfrentou condições extremas com temperaturas acima dos 40°C, enquanto a Dinamarca registrou suas temperaturas mais altas desde 1874. Essa onda de calor, que já se estendeu para o leste da Europa, levanta preocupações sobre as mudanças climáticas e os impactos do aquecimento global. Na Venezuela, terremotos contínuos estão causando danos extensos, dificultando as operações de resgate e afetando negativamente a Cruz Vermelha. No sul do Brasil, o fenômeno El Niño trouxe chuvas intensas que podem levar a inundações.", "direitos_humanos": "O Supremo Tribunal dos Estados Unidos decidiu encerrar o Status de Proteção Temporária (TPS) para haitianos e sírios, uma decisão que foi criticada por defensores das migrações. A medida, tomada após três julgamentos sem vereditos, pode levar à deportação de milhares de imigrantes. Em outro desenvolvimento, o número de mortes causadas pelo terremoto na Venezuela atingiu 920, segundo a Assembleia Nacional do país. O Itamaraty confirmou a morte de cidadãos brasileiros no terramoto e a OAB manifestou solidariedade. Organizações não governamentais pedem a libertação de presos políticos na Venezuela após os desastres naturais, enquanto a FIFA confirma a exibição da bandeira do arco-íris durante um jogo entre Egito e Irã, em meio a tensões com equipes que se opõem à promoção de símbolos LGBT."}, "resumo_do_dia": {"politica_nacional": [{"id": 22314, "titulo": "Alcides Fernandes chama de 'infeliz' vídeo publicado por Michelle e diz que Bolsonaro autorizou apoio a Ciro no Ceará", "url": "https://g1.globo.com/ce/ceara/eleicoes/2026/noticia/2026/06/27/alcides-fernandes-chama-de-infeliz-video-publicado-por-michelle-e-diz-que-bolsonaro-autorizou-apoio-a-ciro-no-ceara.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-27T15:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O deputado Alcides Fernandes criticou um vídeo da filha do presidente Jair Bolsonaro, Michelle. Ele chamou o conteúdo como 'infeliz' e afirmou que Michelle demonstra ignorância sobre o Ceará. Além disso, ele desafiou a tese de que o apoio ao candidato Ciro Gomes está sendo feito sem autorização do presidente Jair Bolsonaro.", "titulo_pt": "Alcides Fernandes chama de 'infeliz' vídeo publicado por Michelle e diz que Bolsonaro autorizou apoio a Ciro no Ceará", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 22324, "titulo": "Neymar deve ser reserva do Brasil em jogo contra o Japão; entenda motivos", "url": "https://www.cnnbrasil.com.br/esportes/futebol/selecao-brasileira/neymar-deve-ser-reserva-do-brasil-em-jogo-contra-o-japao-entenda-motivos/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-27T15:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O atacante Neymar, que entrou no segundo tempo do jogo contra a Escócia, é provávelmente escalado como reserva para o próximo compromisso da seleção brasileira diante do Japão. Esse planejamento reflete as preferências técnicas e estratégicas da equipe.", "titulo_pt": "Neymar deve ser reserva da Seleção em jogo contra o Japão; veja os motivos", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 22143, "titulo": "Flávio e PL de Goiás lançam candidaturas em evento de apoio mútuo", "url": "https://www.metropoles.com/brasil/flavio-e-pl-de-goias-lancam-candidaturas-em-evento-de-apoio-mutuo", "fonte_id": "metropoles", "data_pub": "2026-06-27T15:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio Dino, que concorreu à Presidência da República, lançou sua candidatura em um evento político em Goiânia, dois dias após ser criticado pelo presidente Jair Bolsonaro na internet por meio de um vídeo.", "titulo_pt": "Flávio e PL de Goiás Lançam Candidaturas no Evento de Apoio Mútuo", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 22057, "titulo": "Três Poderes: André Mendonça é o vencedor da semana; Flávio Bolsonaro, o perdedor", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/tres-poderes-andre-mendonca-e-o-vencedor-da-semana-flavio-bolsonaro-o-perdedor.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-27T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro André Mendonça do STF (Supremo Tribunal Federal) será responsável pela análise do inquérito sobre o filme 'Dark Horse', retirando-o da competência de Alexandre de Moraes. Isso marca a semana para André Mendonça, enquanto Flávio Bolsonaro é considerado o perdedor.", "titulo_pt": "Três Poderes: André Mendonça é o vencedor da semana; Flávio Bolsonaro, o perdedor", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 22078, "titulo": "Marcopolo colhe os frutos de sua aposta no Rio", "url": "https://veja.abril.com.br/coluna/radar-economico/marcopolo-colhe-os-frutos-de-sua-aposta-no-rio/", "fonte_id": "veja", "data_pub": "2026-06-27T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A empresa Marcopolo pretende ter mais de 800 carretas privadas até 2030, baseando-se em sua estratégia para o mercado do transporte urbano na cidade do Rio de Janeiro.", "titulo_pt": "Marcopolo colhe os frutos de sua aposta no Rio", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 22058, "titulo": "Diretor da FGV assume presidência do Conselho do movimento Livres", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/diretor-da-fgv-assume-presidencia-do-conselho-do-movimento-livres.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-27T14:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O economista André Portela, professor universitário, será o novo presidente do Conselho Acadêmico do movimento de ideias Livres. O Livres é um grupo que defende posições liberais na sociedade brasileira.", "titulo_pt": "Ex-diretor da FGV assume presidência do Conselho Acadêmico do Livres", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 22158, "titulo": "CPTM terá operação especial para o jogo do Brasil nesta segunda (29/6)", "url": "https://www.metropoles.com/sao-paulo/cptm-tera-operacao-especial-para-o-jogo-do-brasil-nesta-segunda-29-6", "fonte_id": "metropoles", "data_pub": "2026-06-27T13:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A CPTM (Companhia Paulista de Trens Metropolitanos) implantará um horário de pico a partir das 12h, em preparo para o jogo entre Brasil e Japão marcado para às 14h na segunda fase do campeonato.", "titulo_pt": "CPTM terá operação especial para jogo do Brasil", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 21205, "titulo": "Consignado CLT: entenda o uso do FGTS como garantia em empréstimo", "url": "https://g1.globo.com/economia/noticia/2026/06/27/entenda-consignado-clt-credito-fgts-garantia-emprestimo.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-27T11:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Comitê Gestor das Operações de Crédito Consignado regulamentou o uso de parte do FGTS como garantia no Consignado CLT, permitindo que trabalhadores ofereçam até 10% do saldo do FGTS, 100% da multa rescisória e 35% das verbas rescisórias como garantia em empréstimos. A taxa de juros dessas operações não foi especificada no trecho fornecido.", "titulo_pt": "Consignado CLT com FGTS: entenda o uso do fundo como garantia em empréstimo", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 21221, "titulo": "Tarcísio nomeia coronel do Exército para dialogar com prefeitos da região de Campinas" e Bolsonaros: antes de Michelle x Flávio, Carlos já enfrentou Rogéria, a própria mãe; relembre", "url": "https://g1.globo.com/podcast/o-assunto/noticia/2026/06/27/embate-de-bolsonaros-antes-de-michelle-x-flavio-carlos-ja-enfrentou-rogeria-a-propria-mae-relembre.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-27T07:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O conflito entre Michelle Bolsonaro e o senador Flávio Bolsonaro levantou antigos desentendimentos dentro do clã, incluindo um episódio envolvendo Carlos Bolsonaro e sua tia Rogéria.", "titulo_pt": "Conflitos familiares no clã Bolsonaro: Carlos enfrentou Rogéria antes de Michelle e Flávio", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 21275, "titulo": "Lula x Flávio: as duas pesquisas sobre a eleição presidencial que devem sair na próxima semana", "url": "https://veja.abril.com.br/politica/lula-x-flavio-as-duas-pesquisas-sobre-a-eleicao-presidencial-que-devem-sair-na-proxima-semana/", "fonte_id": "veja", "data_pub": "2026-06-27T02:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Duas pesquisas de intenção de voto, uma da Nexus e outra da AtlasIntel, estão programadas para serem divulgadas nos dias 29 e 30 de junho, fornecendo novos dados sobre a disputa presidencial de 2026.", "titulo_pt": "Lula x Flávio: as duas pesquisas sobre a eleição presidencial que devem sair na próxima semana", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 21222, "titulo": "Comissão do Senado pede que Itamaraty viabiliza telemedicina brasileira aos venezuelanos", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/comissao-do-senado-pede-que-itamaraty-viabiliza-telemedicina-brasileira-aos-venezuelanos.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-27T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A presidente da Comissão de Direitos Humanos do Senado, Damares Alves, enviou um ofício ao Ministério das Relações Exteriores pedindo que o governo ofereça telemedicina brasileira às pessoas afetadas pelos terremotos na Venezuela.", "titulo_pt": "Comissão do Senado solicita ao Itamaraty implementação de telemedicina para vítimas de terremotos na Venezuela", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 21223, "titulo": "Na mira da PF, Ciro Nogueira tenta blindar projeto de reeleição e intensifica campanha no Piauí", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/na-mira-da-pf-ciro-nogueira-tenta-blindar-projeto-de-reeleicao-e-intensifica-campanha-no-piaui.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-27T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Ciro Nogueira, líder do centrão e presidente nacional do PP, aumentou sua agenda política no Piauí e busca proteger seu projeto de reeleição ao Senado após ser alvo de uma operação policial relacionada ao caso Banco Master.", "titulo_pt": "Ciro Nogueira intensifica campanha e tenta blindar reeleição após operação da PF", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 21224, "titulo": "Votos no STF esvaziam tese sobre penduricalhos, dizem entidades", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/votos-no-stf-esvaziam-tese-sobre-penduricalhos-dizem-entidades.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-27T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Entidades da sociedade civil avaliam que a tese do STF sobre penduricalhos, formulada há três meses, já sofre um processo de esvaziamento pelos próprios ministros da corte.", "titulo_pt": "Votos no STF estariam esvaziando tese sobre penduricalhos, afirmam entidades", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 22368, "titulo": "La muerte de Ernestina Pais: se conoció el resultado preliminar de la autopsia", "url": "https://www.lanacion.com.ar/seguridad/la-muerte-de-ernestina-pais-se-conocio-el-resultado-preliminar-de-la-autopsia-nid27062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-27T15:41:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "De acordo com o informe médico, a jornalista e atriz Ernestina Pais sofreu um trauma sério ao cérebro.", "titulo_pt": "Ernestina Pais: resultado preliminar da autópsia revela traumatismo grave no crânio", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 22318, "titulo": "Petroleiro é atingido em Ormuz em meio a ataques entre Irã e EUA", "url": "https://agenciabrasil.ebc.com.br/internacional/noticia/2026-06/petroleiro-e-atingido-em-ormuz-em-meio-ataques-entre-ira-e-eua", "fonte_id": "agencia_brasil_intl", "data_pub": "2026-06-27T15:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um navio-tanque informou ter sido atingido por um projétil no Estreito de Ormuz neste sábado. Os Estados Unidos e o Irã lançaram ataques mútuos, acusando-se mutuamente de violar um acordo de paz assinado duas semanas atrás. Washington afirmou ter atingido alvos iranianos durante a madrugada, enquanto o Irã declarou ter atacado alvos ligados às forças norte-americanas neste sábado.", "titulo_pt": "Petroleiro é atingido no Estreito de Ormuz durante ataques iraniano-eua", "veiculo": "Agência Brasil - Internacional", "pais": "Brasil", "classe": "A"}, {"id": 22370, "titulo": "La trágica muerte de Ernestina Pais: dónde fue el accidente del Tren de la Costa", "url": "https://www.lanacion.com.ar/sociedad/la-tragica-muerte-de-ernestina-pais-donde-fue-el-accidente-del-tren-de-la-costa-nid26062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-27T15:34:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A jornalista Ernestina Pais, com 54 anos, faleceu após ser atingida por um carro quando atravessava uma via elevada do Tren da Costa. Ela estava usando a passarela baixa.", "titulo_pt": "A trágica morte de Ernestina Pais: onde ocorreu o acidente do Tren da Costa", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 22401, "titulo": "Vannacci, sondaggi? Li guardo ma preferisco metodo Churchill andando tra la gente", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/27/vannacci-sondaggi-li-guardo-ma-preferisco-metodo-churchill-andando-tra-la-gente_b5279670-c13c-49bb-a175-4537733eef1a.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-27T15:31:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O texto original menciona Vannacci e sondagens. O resumo baseia-se apenas nas informações sobre a conexão de ambos serem militares sem fazer análises ou referências à fonte original em italiano.", "titulo_pt": "Vannacci, pesquisas? Eu vi, prefiro o método Churchill andando entre as pessoas", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 22316, "titulo": "Tragédias como a da Venezuela sempre tiveram impacto na política latina", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/colunas/sylvia-colombo/2026/06/tragedias-como-a-da-venezuela-sempre-tiveram-impacto-na-politica-latina.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-27T15:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Desastres naturais, como o ocorrido na Venezuela, não só causam danos materiais e físicos, mas também levantam questões sobre os sistemas de resgate governamentais. Após esses eventos trágicos, outros problemas políticos podem afetar governos latino-americanos.", "titulo_pt": "Tragédias como a da Venezuela sempre tiveram impacto na política latino-americana", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 22385, "titulo": "A qué hora y dónde ver a Jordania vs. Argentina en TV y streaming", "url": "https://www.latercera.com/servicios/noticia/a-que-hora-y-donde-ver-a-jordania-vs-argentina-en-tv-y-streaming/", "fonte_id": "la_tercera", "data_pub": "2026-06-27T15:30:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O jogo entre Jordânia e Argentina ocorre como um dos últimos jogos da terceira rodada do Mundial. A partida será transmitida por televisão e streaming.", "titulo_pt": "A hora e onde assistir ao jogo entre Jordânia x Argentina na TV e streaming", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 22403, "titulo": "These homes rose out of Venezuela’s socialist revolution. Now they’re rubble.", "url": "https://www.washingtonpost.com/world/2026/06/27/these-homes-rose-out-venezuelas-socialist-revolution-now-theyre-rubble/", "fonte_id": "washington_post_world", "data_pub": "2026-06-27T15:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Diante de falta de auxílio governamental, cidadãos comuns na Venezuela buscaram por familiares sob os escombros das tempestades semanais.", "titulo_pt": "Estes casarões surgiram da revolução socialista venezuelana. Agora, estão em pedaços.", "veiculo": "Washington Post - World", "pais": "EUA", "classe": "A"}, {"id": 22383, "titulo": "The scale of destruction heralds a larger death toll to come, a top U.N. official says.", "url": "https://www.nytimes.com/live/2026/06/27/world/venezuela-earthquake/the-scale-of-destruction-heralds-a-larger-death-toll-to-come-a-top-un-official-says", "fonte_id": "nyt_world", "data_pub": "2026-06-27T15:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um alto oficial da ONU afirmou que as consequências da destruição observadas indicam um aumento no número de vítimas fatais. A declaração foi feita em resposta às recentes violações humanitárias.", "titulo_pt": "A escala de destruição anuncia um maior número de mortes a vir", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 22398, "titulo": "US-Iran ceasefire threatened by renewed strikes", "url": "https://www.france24.com/en/us-iran-ceasefire-threatened-by-renewed-strikes", "fonte_id": "france24", "data_pub": "2026-06-27T15:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Força Aérea israelense realizou um ataque aéreo no sábado na área de Nabatiyeh do sul da Líbia, após o anúncio dos EUA de um acordo entre Israel e Líbia. O anúncio ocorre enquanto Teerã acusa os Estados Unidos de uma 'violação flagrante' do acordo de paz depois das últimas ataques americanos em suas instalações defensivas sul.", "titulo_pt": "Acordo entre Estados Unidos e Irã ameaçado por novas ataques", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 22317, "titulo": "Cão resgatado de maus-tratos vira herói após salvar 12 pessoas em terremoto na Venezuela", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://f5.folha.uol.com.br/bichos/2026/06/cao-resgatado-de-maus-tratos-vira-heroi-apos-salvar-12-pessoas-em-terremoto-na-venezuela.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-27T15:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um cachorro que foi resgatado de condições desumanas ganhou destaque após ajudar a salvar 12 pessoas em uma região atingida por um forte terremoto na Venezuela. As buscas prosseguem no terceiro dia desde o ocorrido, com o animal destacando-se como figura de heroísmo.", "titulo_pt": "Cão resgatado de maus-tratos se torna herói ao salvar 12 pessoas durante terremoto na Venezuela", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 22281, "titulo": "First Budapest Pride since Orbán ousted from office", "url": "https://www.france24.com/en/video/20260627-first-budapest-pride-since-orb%C3%A1n-ousted-from-office", "fonte_id": "france24", "data_pub": "2026-06-27T15:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Este ano, a marcha de Pride celebra seu retorno após 16 anos de restrições impostas durante o governo de Viktor Orbán. Com temperaturas quentes, milhares participaram da manifestação. O novo Primeiro-Ministro eleito, Péter Magyar, que não se posicionou claramente sobre questões LGBTQ+, também não participa do evento.", "titulo_pt": "Primeira Marcha de Prídia em Budapeste desde que Orbán deixou o poder", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 22220, "titulo": "Irán ataca intereses de Washington en Baréin en respuesta al último bombardeo estadounidense", "url": "https://elpais.com/internacional/2026-06-27/iran-ataca-intereses-de-washington-en-barein-en-respuesta-al-ultimo-bombardeo-estadounidense.html", "fonte_id": "elpais_america", "data_pub": "2026-06-27T15:08:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A pressão sobre o alto-falante do cessar-fogo frágil aumenta novamente. Um navio que utilizava a rota sul de Ormuz foi alvo de um projétil", "titulo_pt": "Irã ataca interesses dos EUA no Baréin após último bombardeo", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 22063, "titulo": "França: onda de calor adia Marchas do Orgulho e reacende discurso da extrema-direita", "url": "https://www.cartacapital.com.br/mundo/franca-onda-de-calor-adia-marchas-do-orgulho-e-reacende-discurso-da-extrema-direita/", "fonte_id": "cartacapital", "data_pub": "2026-06-27T15:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Adiamentos e cancelamentos de eventos importantes na França sinalizam os impactos da crise climática, que já ultrapassou limites ambientais e sanitários. A onda de calor adiou Marchas do Orgulho, reacendendo discussões sobre extrema-direita.", "titulo_pt": "França: Onda de calor adia Marchas do Orgulho e reacende discurso da extrema-direita", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 22285, "titulo": "Rome celebrates 80 years of Italy's iconic Vespa scooter", "url": "https://www.dw.com/en/rome-celebrates-80-years-of-italy-s-iconic-vespa-scooter/a-77735061?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-27T14:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Milhares de motociclistas Vespa desfilaram pelas ruas de Roma em comemoração ao seu 80º aniversário. O pequeno scooter 'vikinga' se tornou um símbolo do renascimento da Itália após a Segunda Guerra Mundial.", "titulo_pt": "Roma comemora o 80º aniversário da Vespa, scooter icônico da Itália", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 22234, "titulo": "Deal With Israel Divides Lebanese, Fueling Protests in Beirut", "url": "https://www.nytimes.com/2026/06/27/world/middleeast/lebanon-israel-deal-divisions-protests-beirut.html", "fonte_id": "nyt_world", "data_pub": "2026-06-27T14:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Apoiadores elogiaram o acordo como um passo para limitar a influência do Irã na Líbia, enquanto outros saíram às ruas chamando-o de uma derrota. O acerto gerou protestos em Beirute.", "titulo_pt": "Acordo com Israel Divide Líbano, Fomenta Protestos em Beirute", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 22054, "titulo": "Venezuela recebe ajuda estrangeira para força-tarefa de resgate após prazo de 48 h crucial para sobreviventes", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/venezuela-recebe-ajuda-estrangeira-para-forca-tarefa-de-resgate-apos-prazo-de-48-h-crucial-para-sobreviventes.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-27T14:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo da Venezuela anunciou que mais de 1.600 membros de equipes de resgate estrangeiras chegaram ao país, auxiliando nas buscas por sobreviventes dos dois terremotos que causaram pelo menos 920 mortes. O prazo para a busca foi considerado crucial.", "titulo_pt": "Venezuela recebe ajuda internacional para força-tarefa de resgate após prazo crítico de busca por sobreviventes", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 22371, "titulo": "El Banco Nación suma un crédito UVA para afrontar la mora en los hogares", "url": "https://www.lanacion.com.ar/economia/el-banco-nacion-suma-un-credito-uva-para-afrontar-la-mora-en-los-hogares-nid27062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-27T15:32:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Banco Nação introduziu um novo recurso financeiro chamado Crédito UVA, que permite refinanciar dívidas de consumo em situação irregular com prazo até 120 meses e taxa fixa de 12%.", "titulo_pt": "Banco Nación adiciona crédito UVA para enfrentar dívidas domésticas", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 22286, "titulo": "Why investors may want to prioritize bond markets outside the U.S.", "url": "https://www.cnbc.com/2026/06/27/inflation-as-major-reason-to-invest-in-global-bond-markets.html", "fonte_id": "cnbc_international", "data_pub": "2026-06-27T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Allspring Global Investments está encorajando seus clientes a se concentrarem em países onde as autoridades monetárias estão aumentando suas taxas de juros ou têm dinâmicas de inflação diferentes.", "titulo_pt": "Por que investidores podem querer priorizar os mercados de títulos fora dos EUA", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 22148, "titulo": "Mais rico que o rei Charles: fortuna de William é de R$ 8,2 bilhões", "url": "https://www.metropoles.com/colunas/claudia-meireles/mais-rico-que-o-rei-charles-fortuna-de-william-e-de-r-82-bilhoes", "fonte_id": "metropoles", "data_pub": "2026-06-27T14:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "De acordo com as contas anuais do Ducado da Conualha, o príncipe William possui uma fortuna superior à do seu pai, o rei Charles III. Esta cifra equivale a aproximadamente R$ 8,2 bilhões.", "titulo_pt": "Mais rico que o rei Charles: fortuna de William é de R$ 8,2 bilhões", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 22164, "titulo": "OAB e Jusbrasil lançam plataforma gratuita que identifica prompt injection em petições", "url": "https://www.jota.info/justica/oab-e-jusbrasil-lancam-plataforma-gratuita-que-identifica-prompt-injection-em-peticoes", "fonte_id": "jota", "data_pub": "2026-06-27T14:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A OAB (Ordem dos Advogados do Brasil) e a Jusbrasil, uma empresa de conteúdo jurídico, lançaram uma plataforma gratuita para detectar tentativas de manipulação de sistemas de IA no Judiciário. A ferramenta foi criada para identificar o 'prompt injection', um tipo de ataque que pode ser usado para alterar as petições enviadas ao sistema.", "titulo_pt": "OAB e Jusbrasil lançam plataforma gratuita que identifica prompt injection em petições", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 22052, "titulo": "Governo Trump libera modelo de IA da Anthropic para grupo restrito de parceiros", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/tec/2026/06/governo-trump-libera-modelo-de-ia-da-anthropic-para-grupo-restrito-de-parceiros.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-27T13:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo dos Estados Unidos liberou um novo modelo da empresa Anthropic para um grupo limitado de parceiros, após tensões com o setor da inteligência artificial por causa das políticas regulatórias do governo. O anúncio ocorreu durante a gestão de Donald Trump.", "titulo_pt": "Governo Trump permite uso restrito de modelo de IA da Anthropic", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 22053, "titulo": "Onda de calor na Europa aumenta o custo de adiar a adaptação", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/onda-de-calor-na-europa-aumenta-o-custo-de-adiar-a-adaptacao.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-27T13:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A onda de calor intensa na Europa está testando os sistemas atuais e levantando questões sobre como suportar temperaturas mais altas ou investir em adaptações para um futuro com maior quente. As condições climáticas extremas estão sobrecarregando muitos sistemas, aumentando o custo de adiar a implementação de soluções adaptativas.", "titulo_pt": "Onda de calor na Europa aumenta custo de adiar adaptação", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 22023, "titulo": "The memory shortage shaking Apple and Microsoft is 'existential crisis' for smaller players", "url": "https://www.cnbc.com/2026/06/27/memory-crunch-shaking-apple-and-microsoft-existential-for-small-guys.html", "fonte_id": "cnbc_international", "data_pub": "2026-06-27T13:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A escassez global de chips de memória está afetando o setor de eletrônicos de consumo. Apple e Microsoft conseguem repassar o aumento dos custos elevando os preços de seus principais dispositivos, mas empresas menores do setor enfrentam dificuldades severas para lidar com essa alta de custos.", "titulo_pt": "A escassez de memória que sacode Apple e Microsoft é uma 'crise existencial' para empresas menores", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 22022, "titulo": "SpaceX stock has cooled. Hiring for jobs in the space economy hasn't", "url": "https://www.cnbc.com/2026/06/27/spacex-jobs-stem-careers-labor-economy.html", "fonte_id": "cnbc_international", "data_pub": "2026-06-27T13:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Apesar do entusiasmo com o IPO da SpaceX ter diminuído, ainda há tendência de contratações para empregos relacionados à economia espacial em um mercado de trabalho onde outros setores têm reduzido suas contratações.", "titulo_pt": "IPO da SpaceX está desacelerado, mas empregos no setor espacial continuam a atrair candidatos", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 21839, "titulo": "Agências de viagem investem em pacotes e roteiros personalizados para quem tem mais de 50 anos", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/agencias-de-viagem-investem-em-pacotes-e-roteiros-personalizados-para-quem-tem-mais-de-50-anos.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-27T13:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Turistas com mais de 50 anos têm buscado viagens personalizadas, aproveitando a baixa temporada e priorizando conforto e segurança. Com mais tempo disponível após a aposentadoria, esse público tem crescido na procura por pacotes adaptados às suas necessidades.", "titulo_pt": "Agências de viagem apostam em pacotes e roteiros personalizados para idosos", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 21840, "titulo": "Mercado imobiliário visa data centers e R$ 2 tri em investimento em tecnologia digital", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/06/mercado-imobiliario-visa-data-centers-e-r-2-tri-em-investimento-em-tecnologia-digital.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-27T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil espera receber R$ 2 trilhões em investimentos em tecnologias digitais até 2029, com os data centers assumindo o protagonismo nas áreas de investimento. O mercado imobiliário nacional está prestando atenção nesta tendência.", "titulo_pt": "Brasil deve receber R$ 2 trilhões em investimentos em tecnologias digitais até 2029, com data centers liderando os aportes", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 21940, "titulo": "Las tasas de financiamiento Pyme bajan, pero las empresas priorizan la supervivencia sobre el crecimiento", "url": "https://www.lanacion.com.ar/economia/las-tasas-de-financiamiento-pyme-bajan-pero-las-empresas-priorizan-la-supervivencia-sobre-el-nid27062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-27T12:50:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O novo Índice de Financiamento de PMEs registrou uma queda no custo do crédito em maio na Argentina. No entanto, dados setoriais mostram que os recursos obtidos estão sendo destinados principalmente a cobrir despesas operacionais do dia a dia, e não a investimentos para expansão.", "titulo_pt": "As taxas de financiamento para PMEs caem, mas as empresas priorizam a sobrevivência em vez do crescimento", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 21869, "titulo": "EUA precisam de carne bovina mais “magra” e Brasil pode se beneficiar", "url": "https://www.cnnbrasil.com.br/agro/eua-precisam-de-carne-bovina-mais-magra-e-brasil-pode-se-beneficiar/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-27T12:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Com o menor rebanho de matrizes nos últimos anos, os EUA continuam batendo recordes de produtividade e mantendo um consumo per capita resiliente, altamente dependente da carne moída. Essa situação oferece oportunidades para o Brasil.", "titulo_pt": "EUA precisam de carne bovina mais 'magra' e Brasil pode se beneficiar", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 22024, "titulo": "Berkshire CEO Greg Abel sworn in as U.S. citizen at baseball game", "url": "https://www.cnbc.com/2026/06/27/berkshire-ceo-greg-abel-sworn-in-as-us-citizen-at-baseball-game.html", "fonte_id": "cnbc_international", "data_pub": hoes-e-mira-expansao-nos-eua/", "fonte_id": "exame", "data_pub": "2026-06-27T11:04:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A startup Monkey já conseguiu movimentar R$ 200 bilhões com suas operações de antecipação de recebíveis. Com objetivo de expandir sua atuação, a empresa planeja aumentar ainda mais seu fluxo de caixa para alcançar R$ 100 bilhões até 2026 no mercado internacional.", "titulo_pt": "Startup de antecipação de recebíveis já movimentou R$ 200 bilhões e mira expansão nos EUA", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}], "economia__eventos": [], "tecnologia": [{"id": 22303, "titulo": "The fittest founder in the room got cancer. Here’s how he used AI to fight back.", "url": "https://techcrunch.com/2026/06/27/the-fittest-founder-in-the-room-got-cancer-heres-how-he-used-ai-to-fight-back/", "fonte_id": "techcrunch", "data_pub": "2026-06-27T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Confrontado com câncer, Connor Christou enviou todos os dados relacionados à sua rotina — resultados de sangue, dados de imagem, saídas de dispositivos fitness e registros pessoais — para o Claude. Usando a inteligência artificial, ele busca combater o câncer.", "titulo_pt": "O melhor fundador do local enfrentou câncer. Aqui está como ele usou IA para lutar.", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 22305, "titulo": "Why is Apple asking me to pay more for Big Tech’s AI obsession?", "url": "https://www.theverge.com/report/958678/apple-consumer-price-increase-ai-big-tech", "fonte_id": "the_verge", "data_pub": "2026-06-27T13:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Tim Cook recentemente afirmou que aumentos de preços são inevitáveis e descreveu as tarifas como 'insustentáveis'. O preço do MacBook Pro de 16 polegadas subiu $300. O iPad Air de 11 polegadas passou de $599 para $749. Incluso o HomePod Mini teve um aumento de $30, chegando a $129. Cook atribuiu diretamente essa responsabilidade aos...", "titulo_pt": "Por que a Apple está pedindo mais dinheiro para o amor da Big Tech pelas Inteligências Artificiais?", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 22041, "titulo": "Inside the room where the smart home industry is still betting on Matter", "url": "https://www.theverge.com/tech/958008/matter-unify-conference-csa-apple-google-amazon-samsung-smart-home-interoperability", "fonte_id": "the_verge", "data_pub": "2026-06-27T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Quatro anos atrás, na Amsterdã, a indústria de casa inteligente lançou o Matter, um padrão interoperável que visa resolver os problemas da indústria. Este padrão foi desenvolvido com base em tecnologias existentes e abertas, resultado de uma colaboração entre rivais tradicionais como Apple, Google e Amazon.", "titulo_pt": "Dentro da sala onde a indústria de casa inteligente ainda aposta no Matter", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 21942, "titulo": "Wang Chuanfu, presidente de BYD: “Seremos el fabricante de automóviles número uno del mundo en 5 años”", "url": "https://www.lanacion.com.ar/autos/el-presidente-de-byd-aseguro-que-sera-la-automotriz-mas-grande-del-mundo-nid24062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-27T12:48:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O desafio para a BYD será superar a Toyota, que vende atualmente mais do que o dobro dos veículos na China, diante de uma queda nas ações e uma desaceleração nas vendas no país.", "titulo_pt": "Wang Chuanfu, presidente da BYD: 'Seremos o fabricante de automóveis número um do mundo em 5 anos'", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 22000, "titulo": "Scoop: Powerful Anthropic model, Fable 5, on track to return soon", "url": "https://www.axios.com/2026/06/27/anthropic-fable-5-return-soon", "fonte_id": "axios", "data_pub": "2026-06-27T12:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo dos Estados Unidos está próximo de permitir que a Anthropic reactive o acesso ao seu modelo poderoso Fable 5, que ficou offline por 15 dias devido a preocupações de segurança. Segundo fontes próximas à situação, as limitações impostas pelo governo podem ser removidas na próxima semana.", "titulo_pt": "Scoop: Modelo poderoso Fable 5 da Anthropic prestes a retornar", "veiculo": "Axios", "pais": "EUA", "classe": "B"}, {"id": 21977, "titulo": "Australia to double penalty for social media ban breaches to $99m as tech giants accused of ‘not doing enough’", "url": "https://www.theguardian.com/australia-news/2026/jun/27/australia-under-16-social-media-ban-tech-companies-penalty-double", "fonte_id": "guardian_world", "data_pub": "2026-06-27T12:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo australiano vai dobrar as penas para violações da proibição de redes sociais para jovens, chegando a R$ 99 milhões. O comissário eSafety agora está investigando potenciais infrações das grandes empresas de tecnologia Facebook, Instagram, Snapchat, TikTok e YouTube.", "titulo_pt": "Austrália aumentará multa por infrações à proibição de redes sociais para jovens para R$ 99 milhões", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 21870, "titulo": "Golpe do WhatsApp usa fatura falsa como isca para hackear dispositivos", "url": "https://www.cnnbrasil.com.br/economia/negocios/golpe-do-whatsapp-usa-fatura-falsa-como-isca-para-hackear-dispositivos/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-27T12:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma nova fraude foi identificada pela Kaspersky e compartilhada com a CNN Money. O golpe envolve uma fatura falsa usada como isca para hackear dispositivos do WhatsApp, alertando usuários sobre problemas de pagamento.", "titulo_pt": "Golpe do WhatsApp usa fatura falsa como isca para hackear dispositivos", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 21779, "titulo": "Asian AI startups launch Mythos-like models as Anthropic’s export ban drags on", "url": "https://techcrunch.com/2026/06/27/asian-ai-startups-launch-mythos-like-models-as-anthropics-export-ban-drags-on/", "fonte_id": "techcrunch", "data_pub": "2026-06-27T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Empresas de IA asiáticas estão lançando novos modelos que prometem capacidades semelhantes à Mythos sem o risco de um banimento de exportação. Isso pode significar que os laboratórios de IA nos EUA podem nunca mais recuperar esse mercado enorme.", "titulo_pt": "Novos modelos lançados na Ásia prometem capacidades semelhantes às do Mythos, sem medo de banimento de exportação. Lábios de AI nos EUA podem nunca mais recuperar esse enorme mercado.", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 21313, "titulo": "IA pode destravar infraestrutura no Brasil, diz ex-presidente do BNDES", "url": "https://www.infomoney.com.br/economia/ia-pode-destravar-infraestrutura-no-brasil-diz-ex-presidente-do-bndes/", "fonte_id": "infomoney", "data_pub": "2026-06-27T11:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Gustavo Montezano, ex-presidente do BNDES, afirmou que juros altos, déficit de projetos e escassez de mão de obra estão ampliando o impacto da inteligência artificial no país.", "titulo_pt": "IA pode desbloquear infraestrutura no Brasil, afirma ex-presidente do BNDES", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 21782, "titulo": "Duer’s Wear-Everywhere Pants Are on Sale This Weekend", "url": "https://www.wired.com/story/save-on-some-stellar-pants-during-a-rare-duer-sale/", "fonte_id": "wired", "data_pub": "2026-06-27T11:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "É raro encontrar descontos na empresa canadense Duer, conhecida por produzir roupas de desempenho discreta e estilosa voltada para atividade
