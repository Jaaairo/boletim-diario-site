", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 23220, "titulo": "Bahrain calls on residents to seek shelter after warning", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/bahrain-sounds-sirens-after-iranian-claims-gulf-attacks", "fonte_id": "middle_east_eye", "data_pub": "2026-06-28T04:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo do Bahrein solicitou que os residentes buscassem abrigo após a ativação de sirenes de alerta. A advertência ocorreu em resposta a ataques recentes dos Estados Unidos a instalações militares iranianas.", "titulo_pt": "Bahrein pede aos residentes para buscar abrigo após aviso", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 23221, "titulo": "Netanyahu says 'there is no room for two states'", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/netanyahu-says-there-no-room-two-states", "fonte_id": "middle_east_eye", "data_pub": "2026-06-28T04:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Benjamin Netanyahu declarou que não há espaço para um estado palestino se ele retornar ao poder nas próximas eleições israelenses. Segundo ele, entre o mar e o rio Jordão, não cabem dois estados.", "titulo_pt": "Netanyahu diz 'não há lugar para dois estados'", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 23211, "titulo": "A Mayor Is Taking Maternity Leave in Japan. Some Men Are Furious.", "url": "https://www.nytimes.com/2026/06/28/world/asia/japan-mayor-maternity-leave.html", "fonte_id": "nyt_world", "data_pub": "2026-06-28T04:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Shoko Kawata é a primeira prefeita a tirar licença maternidade na história do Japão. Sua decisão levantou debates sobre discriminação de gênero no ambiente de trabalho.", "titulo_pt": "Prefeita Adota Licença Maternidade no Japão, Gerando Debate", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 23224, "titulo": "Pakistan rattles India with new Chinese-built stealth submarine", "url": "https://www.scmp.com/week-asia/politics/article/3358523/pakistan-rattles-india-new-chinese-built-stealth-submarine?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pakistão entregou seu primeiro submarino de classe Hangor, construído na China, no porto de Karachi. Este evento marca uma nova fase nas operações subaquáticas do navy pakistão e representa um desafio para a India, que havia derrotado o navio submarino do Pakistão há 55 anos.", "titulo_pt": "Pakistão choca a Índia com novo submarino chinês", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 23212, "titulo": "Drones Used to Fight Mosquitoes as Dengue Fever Surges in Sri Lanka", "url": "https://www.nytimes.com/2026/06/28/world/asia/sri-lanka-dengue-mosquito-drones-military.html", "fonte_id": "nyt_world", "data_pub": "2026-06-28T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O exército de Sri Lanka está sendo utilizado para combater mosquitos, enquanto a dengue se espalha na região. O surto de doenças está sobrecarregando os hospitais em um país já afetado por escassez de energia causada pela Guerra do Irã.", "titulo_pt": "Drones Usados para Combater Mosquitos como Dengue Surta Sri Lanka", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 23155, "titulo": "(LEAD) S. Korea, Japan agree to continue defense exchanges, cooperation, including in AI: Seoul", "url": "https://en.yna.co.kr/view/AEN20260628002200315", "fonte_id": "yonhap_news", "data_pub": "2026-06-28T03:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O chefe de defesa sul-coreano e japonês concordaram em continuar as trocas e cooperação nas áreas de defesa, incluindo a inteligência artificial.", "titulo_pt": "Coreia do Sul e Japão concordam em manter trocas de defesa e colaboração, incluindo AI", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 23154, "titulo": "US says no casualties reported in Bahrain and Kuwait attacks by Iran", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/us-says-no-casualties-reported-bahrain-and-kuwait-attacks-iran", "fonte_id": "middle_east_eye", "data_pub": "2026-06-28T03:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Nenhuma morte americana, impacto significativo ou dano a instalações americanas foi relatado após os ataques atribuídos à Guarda Revolucionária Islâmica do Irã em Bahrain e Kuwait. A situação permanece incerta.", "titulo_pt": "EUA não registram baixos nos ataques do Irã em Bahrein e Kuwait", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 23219, "titulo": "Gulf countries attacked after US launches second round of strikes on Iran", "url": "https://www.aljazeera.com/video/newsfeed/2026/6/28/gulf-countries-attacked-after-us-launches-second-round-of-strikes-on-iran?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-28T03:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Países do Golfo foram atacados após os Estados Unidos realizar uma segunda rodada de ataques contra a Irã.", "titulo_pt": "Países do Golfo atacados após EUA lançarem segundo round de strikes na Irã", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 23114, "titulo": "Netanyahu calls Lebanon deal a ‘massive blow’ to Iran", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/netanyahu-calls-lebanon-deal-massive-blow-iran", "fonte_id": "middle_east_eye", "data_pub": "2026-06-28T03:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O primeiro-ministro israelense Benjamin Netanyahu descreveu o acordo com Líbano como uma 'marcante vitória' e um 'grande golpe' contra a Irã e Hezbollah. Segundo Netanyahu, o entendimento alcançado reconhece o direito de Israel manter uma zona de segurança no sul do Líbano por tempo indeterminado até que as forças armadas como o Hezbollah não representem mais uma ameaça.", "titulo_pt": "Netanyahu chama acordo com Líbano de 'golpe grande' contra Irã", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 23115, "titulo": "Iran resisting US pressure over Hormuz routes, analyst says", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/iran-resisting-us-pressure-over-hormuz-routes-analyst-says", "fonte_id": "middle_east_eye", "data_pub": "2026-06-28T03:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um analista iraniano disse que Teerã está resistindo à pressão dos Estados Unidos sobre os caminhos marítimos do Estreito de Ormuz. De acordo com Abas Aslani, o Irã trabalha com outros países regionais para novos arranjos e rejeita propostas de corredores alternativos por parte dos EUA.", "titulo_pt": "Irão resistindo à pressão dos Estados Unidos sobre rotas no Estreito de Ormuz, analista diz", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 23057, "titulo": "Lula e novo presidente da Colômbia devem ter relação pragmática, avalia diplomacia do Brasil", "url": "https://g1.globo.com/politica/noticia/2026/06/28/lula-e-novo-presidente-da-colombia-devem-ter-relacao-pragmatica-avalia-diplomacia-do-brasil.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-28T03:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Diplomatas brasileiros esperam uma relação pragmática entre o presidente Luiz Inácio Lula da Silva e Abelardo de la Espriella, novo presidente eleito da Colômbia. Lula parabenizou a eleição do colombiano e destacou a importância da relação bilateral.", "titulo_pt": "Lula e novo presidente da Colômbia devem ter relação pragmática, diz diplomacia", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 22728, "titulo": "Capturan en Colombia a presunto líder del Tren del Coro buscado por femicidio y otros graves delitos en Chile", "url": "https://www.latercera.com/mundo/noticia/capturan-en-colombia-a-presunto-lider-del-tren-del-coro-buscado-por-femicidio-y-otros-graves-delitos-en-chile/", "fonte_id": "la_tercera", "data_pub": "2026-06-28T02:57:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um cidadão venezolano suspeito de ser o líder do Tren del Coro, procurado por um femicídio e outros graves delitos no Chile, foi capturado em Medellín. Ele estava usando uma identidade falsa e agora enfrentará um processo de extradição para responder à justiça chilena.", "titulo_pt": "Capturado em Colômbia suspeito de liderar Tren del Coro, envolvido com femicídio no Chile", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 22850, "titulo": "US strikes more targets in Iran as fragile ceasefire comes under renewed strain", "url": "https://www.france24.com/en/middle-east/20260628-us-strikes-more-targets-in-iran-as-fragile-ceasefire-comes-under-renewed-strain", "fonte_id": "france24", "data_pub": "2026-06-28T02:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Exército dos Estados Unidos realizou ataques em 10 alvos militares do Irã, conforme determinação do presidente Donald Trump, estendendo as operações apesar de um cessar-fogo frágil. Os alvos incluíram infraestrutura de vigilância, sistemas de comunicação, sites de defesa aérea, armazéns de drones e capacidades de minagem em várias localizações próximas ao Estreito de Ormuz.", "titulo_pt": "EUA realizam novos ataques em alvos do Irã enquanto cessar-fogo frágil se encontra sob nova tensão", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 23103, "titulo": "Colombia se abre camino entre los grandes", "url": "https://elpais.com/america-colombia/2026-06-28/colombia-se-abre-camino-entre-los-grandes.html", "fonte_id": "elpais_america", "data_pub": "2026-06-28T02:55:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Colômbia encerrou a fase de grupos do Mundial com uma boa performance contra o Portugal, diferente das participações anteriores quando celebrava empates com equipes europeias.", "titulo_pt": "Colômbia avança entre as grandes", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 22622, "titulo": "Venezuela entra em dia 'crucial' para resgate de sobreviventes enquanto número de mortos nos terremotos ultrapassa 1.400", "url": "https://www.bbc.com/portuguese/articles/cjwgy617zelo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-28T02:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os esforços de resgate continuam no terceiro dia após dois terremotos consecutivos que atingiram a Venezuela, deixando mais de 3.200 feridos e ultrapassando o número de mortos para 1.400.", "titulo_pt": "Venezuela entra em dia crucial para resgate de sobreviventes enquanto número de mortos nos terremotos ultrapassa 1.400", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 22919, "titulo": "U.S. and Iran clash, putting fragile deal under growing strain", "url": "https://www.japantimes.co.jp/news/2026/06/28/world/us-iran-clash-deal-under-strain/", "fonte_id": "japan_times", "data_pub": "2026-06-28T02:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos e Irã estão em conflito, colocando o acordo frágil alcançado duas semanas atrás para encerrar o conflito de 4 meses sob crescente tensão. Cada lado acusa o outro de ter violado o acordo.", "titulo_pt": "EUA e Irã se confrontam, ameaçando acordo frágil", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 22651, "titulo": "Volver o no ahora a los mercados para tomar deuda, el debate que divide a los especialistas", "url": "https://www.lanacion.com.ar/economia/volver-o-no-ahora-a-los-mercados-para-tomar-deuda-el-debate-que-divide-a-los-especialistas-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T03:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A redução do riesgo país e a melhoria das classificações de crédito da Argentina criam uma oportunidade para que o país emita novos títulos no exterior nos próximos meses. Economistas estão debatendo as vantagens e desvantagens dessa possibilidade, bem como o nível atual da dívida externa.", "titulo_pt": "Voltar ou não agora aos mercados para tomar dívida, debate que divide especialistas", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 22957, "titulo": "Gas prices fall under 2,000 won for 1st time in nearly 2 months", "url": "https://www.koreaherald.com/article/10790463", "fonte_id": "korea_herald", "data_pub": "2026-06-28T02:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O preço médio do combustível na Coreia do Sul caiu para abaixo de 2.000 won pela primeira vez em quase dois meses, atingindo R$ 1,30 por litro. Isso marcou o segundo dia consecutivo que a média ficou abaixo deste valor.", "titulo_pt": "Preços do combustível caem abaixo de 2,000 won pela primeira vez em cerca de 2 meses", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 22449, "titulo": "Presidente da FecomercioSP critica fim da 6x1 e questiona voto de quem recebe Bolsa Família", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/monicabergamo/2026/06/presidente-da-fecomerciosp-critica-fim-da-6x1-e-questiona-voto-de-quem-recebe-bolsa-familia.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-28T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Abram Szajman, ex-presidente da FecomercioSP, deixou o cargo após 42 anos. Ivo Dall'Acqua Júnior foi eleito novo presidente e assume representar os interesses de 1,8 milhão de empresários durante debates sobre a mudança nas relações de trabalho, incluindo o fim da escala 6x1.", "titulo_pt": "Novo presidente da FecomercioSP assume em meio ao debate sobre fim da escala 6x1", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 22451, "titulo": "Entenda quanto é US$ 1 trilhão, quantia que fez de Musk a pessoa mais rica da história do capitalismo", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/entenda-quanto-e-us-1-trilhao-quantia-que-fez-de-musk-a-pessoa-mais-rica-da-historia-do-capitalismo.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-28T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A empresa aeroespacial SpaceX listada na bolsa de valores elevou seu CEO, Elon Musk, à posição de pessoa mais rica da história recente. Este marco considera o período iniciado no final do século 19, com a consolidação da economia de mercado.", "titulo_pt": "Entenda quanto é US$ 1 trilhão, quantia que fez de Musk a pessoa mais rica da história do capitalismo", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 22941, "titulo": "Financial products or illicit gambling? Can Hong Kong regulate prediction markets?", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3358613/financial-products-or-illicit-gambling-can-hong-kong-regulate-prediction-markets?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T01:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A legalidade dos mercados de previsões em Hong Kong está sendo questionada, após pelo menos uma empresa de corretagem internacional operar um tal plataforma na cidade. O regulador do mercado afirmou que algumas atividades podem ser consideradas 'produtos financeiros', enquanto advogados divergem sobre a clareza da distinção entre produtos financeiros e apostas ilegais, dada a natureza dos mercados de previsões.", "titulo_pt": "Produtos financeiros ou jogo ilegal? Regulador questiona legalidade de mercados de previsões em Hong Kong", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 22452, "titulo": "A Bolsa brasileira está barata?", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/blogs/de-grao-em-grao/2026/06/a-bolsa-brasileira-esta-barata.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-27T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Bolsa brasileira pode parecer caro a primeira vista, mas seu valor potencial de investimento deve ser avaliado considerando fatores como rentabilidade e qualidade das empresas listadas.", "titulo_pt": "A Bolsa brasileira está cara?", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 22453, "titulo": "Estado de São Paulo concentra 30% dos inadimplentes recorrentes, diz levantamento", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/06/estado-de-sao-paulo-concentra-30-dos-inadimplentes-recorrentes-diz-levantamento.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-27T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O estado de São Paulo concentra quase 30% dos inadimplentes recorrentes do país, segundo um levantamento da datatech Assertiva. O estudo identificou 8,1 milhões de CPFs endividados no estado em 2025, totalizando 27,6 milhões de cadastros consultados nacionalmente.", "titulo_pt": "São Paulo concentra quase 30% dos inadimplentes recorrentes do país, diz levantamento", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 22907, "titulo": "UK’s Bridgepoint nears deal to buy real estate unit in bet on US property", "url": "https://www.ft.com/content/567ba6a4-809f-4e8e-a8f3-03855beb9a48", "fonte_id": "financial_times", "data_pub": "2026-06-27T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Bridgepoint, um grupo de buyout baseado em Londres, está prestes a fechar um acordo para comprar uma unidade imobiliária nos Estados Unidos. O grupo busca expandir suas operações além do seu especialismo tradicional em compras corporativas.", "titulo_pt": "Bridgepoint perto de fechar acordo por unidade imobiliária nos EUA", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 22457, "titulo": "Criadora de bairros em SP, a centenária Cia. City planeja 'retrofit de tudo', diz CEO", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/06/criadora-de-bairros-em-sp-a-centenaria-cia-city-planeja-retrofit-de-tudo-diz-ceo.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-27T17:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Cia. City, empresa centenária que criou bairros em São Paulo, planeja um 'retrofit de tudo' segundo o CEO Leonardo Paranaguá. O executivo busca recuperar partes da história da empresa, fundada em 1911, explorando arquivos preservados em Ibiúna-MG.", "titulo_pt": "Criadora de bairros em SP, a centenária Cia. City planeja 'retrofit de tudo', diz CEO", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 22458, "titulo": "Agência dos EUA investiga Polymarket, empresa ligada ao filho de Trump", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/agencia-dos-eua-investiga-polymarket-empresa-ligada-ao-filho-de-trump.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-27T16:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma agência financeira federal dos Estados Unidos está investigando a Polymarket, uma empresa de mercado de previsões associada ao filho do presidente americano, Donald Trump Jr. As dúvidas sobre a legalidade das operações da empresa foram reavivadas pela investigação.", "titulo_pt": "Agência dos EUA investiga Polymarket, ligada ao filho de Trump", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 22371, "titulo": "El Banco Nación suma un crédito UVA para afrontar la mora en los hogares", "url": "https://www.lanacion.com.ar/economia/el-banco-nacion-suma-un-credito-uva-para-afrontar-la-mora-en-los-hogares-nid27062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-27T15:32:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Banco Nação introduziu um novo recurso financeiro chamado Crédito UVA, que permite refinanciar dívidas de consumo em situação irregular com prazo até 120 meses e taxa fixa de 12%.", "titulo_pt": "Banco Nación adiciona crédito UVA para enfrentar dívidas domésticas", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 22286, "titulo": "Why investors may want to prioritize bond markets outside the U.S.", "url": "https://www.cnbc.com/2026/06/27/inflation-as-major-reason-to-invest-in-global-bond-markets.html", "fonte_id": "cnbc_international", "data_pub": "2026-06-27T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Allspring Global Investments está encorajando seus clientes a se concentrarem em países onde as autoridades monetárias estão aumentando suas taxas de juros ou têm dinâmicas de inflação diferentes.", "titulo_pt": "Por que investidores podem querer priorizar os mercados de títulos fora dos EUA", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 22148, "titulo": "Mais rico que o rei Charles: fortuna de William é de R$ 8,2 bilhões", "url": "https://www.metropoles.com/colunas/claudia-meireles/mais-rico-que-o-rei-charles-fortuna-de-william-e-de-r-82-bilhoes", "fonte_id": "metropoles", "data_pub": "2026-06-27T14:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "De acordo com as contas anuais do Ducado da Conualha, o príncipe William possui uma fortuna superior à do seu pai, o rei Charles III. Esta cifra equivale a aproximadamente R$ 8,2 bilhões.", "titulo_pt": "Mais rico que o rei Charles: fortuna de William é de R$ 8,2 bilhões", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 22164, "titulo": "OAB e Jusbrasil lançam plataforma gratuita que identifica prompt injection em petições", "url": "https://www.jota.info/justica/oab-e-jusbrasil-lancam-plataforma-gratuita-que-identifica-prompt-injection-em-peticoes", "fonte_id": "jota", "data_pub": "2026-06-27T14:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A OAB (Ordem dos Advogados do Brasil) e a Jusbrasil, uma empresa de conteúdo jurídico, lançaram uma plataforma gratuita para detectar tentativas de manipulação de sistemas de IA no Judiciário. A ferramenta foi criada para identificar o 'prompt injection', um tipo de ataque que pode ser usado para alterar as petições enviadas ao sistema.", "titulo_pt": "OAB e Jusbrasil lançam plataforma gratuita que identifica prompt injection em petições", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 22052, "titulo": "Governo Trump libera modelo de IA da Anthropic para grupo restrito de parceiros", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/tec/2026/06/governo-trump-libera-modelo-de-ia-da-anthropic-para-grupo-restrito-de-parceiros.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-27T13:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo dos Estados Unidos liberou um novo modelo da empresa Anthropic para um grupo limitado de parceiros, após tensões com o setor da inteligência artificial por causa das políticas regulatórias do governo. O anúncio ocorreu durante a gestão de Donald Trump.", "titulo_pt": "Governo Trump permite uso restrito de modelo de IA da Anthropic", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 22053, "titulo": "Onda de calor na Europa aumenta o custo de adiar a adaptação", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/onda-de-calor-na-europa-aumenta-o-custo-de-adiar-a-adaptacao.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-27T13:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A onda de calor intensa na Europa está testando os sistemas atuais e levantando questões sobre como suportar temperaturas mais altas ou investir em adaptações para um futuro com maior quente. As condições climáticas extremas estão sobrecarregando muitos sistemas, aumentando o custo de adiar a implementação de soluções adaptativas.", "titulo_pt": "Onda de calor na Europa aumenta custo de adiar adaptação", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 23137, "titulo": "(URGENT) Top defense chiefs of S. Korea, Japan agree to continue defense cooperation, including in AI technology: Seoul", "url": "https://en.yna.co.kr/view/AEN20260628002100315", "fonte_id": "yonhap_news", "data_pub": "2026-06-28T03:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O chefe de defesa sul-coreano e o chefe de defesa japonês concordaram em continuar a cooperação militar, incluindo no desenvolvimento de tecnologia de inteligência artificial.", "titulo_pt": "(URGENTE) Chefs de defesa de Coreia do Sul e Japão concordam em manter cooperação na área da defesa, incluindo AI", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 22935, "titulo": "China’s big trucks go electric and abroad as subsidies help pave road to net-zero freight", "url": "https://www.scmp.com/business/china-business/article/3358516/chinas-big-trucks-go-electric-and-abroad-subsidies-help-pave-road-net-zero-freight?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T03:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Fabricantes chineses de caminhões pesados estão se beneficiando da aceleração da eletrificação nas estradas do país, graças a avanços tecnológicos e custos de propriedade mais baixos. A venda internacional desses veículos elétricos está crescendo, especialmente em regiões como Ásia Oriental e África, onde as empresas já possuem centros de montagem fora do país.", "titulo_pt": "Caminhões elétricos chineses ganham espaço no exterior com auxílio de subsídios", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 22507, "titulo": "Drone com tecnologia de \"calor humano\" flagra motoristas bêbados", "url": "https://www.metropoles.com/brasil/drone-com-tecnologia-de-calor-humano-flagra-motoristas-bebados", "fonte_id": "metropoles", "data_pub": "2026-06-28T02:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Guarda Municipal de Florianópolis tem utilizado uma tecnologia que detecta calor humano nas fiscalizações de motoristas bêbados há menos de um mês.", "titulo_pt": "Drone com tecnologia de 'calor humano' flagra motoristas bêbados", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 23007, "titulo": "Apple's first foldable iPhone reportedly on track for September 2026 launch", "url": "https://www.digitimes.com/news/a20260625VL215/apple-foldable-iphone-2026-launch.html", "fonte_id": "digitimes", "data_pub": "2026-06-28T02:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O iPhone dobrável da Apple, que há tempos é rumoreado, continua programado para ser lançado no mês de setembro de 2026. Apesar de relatos anteriores sugerirem que problemas relacionados ao mecanismo de abertura podem atrasar o lançamento do dispositivo, o cronograma permanece inalterado.", "titulo_pt": "Primeiro iPhone dobrável da Apple deve ser lançado em setembro de 2026", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 23113, "titulo": "Chinese tech hub’s shift into robotaxis leaves drivers by the wayside", "url": "https://www.ft.com/content/b1445598-e5e3-4530-9e82-e0155c44106b", "fonte_id": "financial_times", "data_pub": "2026-06-28T02:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Shenzhen está expandindo o uso de veículos autônomos, enquanto a automação crescente ameaça o trabalho dos motoristas na economia colaborativa. O movimento para robotaxis está deixando os motoristas de aplicativos de lado em uma cidade que historicamente foi um centro tecnológico chinês.", "titulo_pt": "Hub tecnológico chinês expande robotaxis, colocando trabalhadores da gig economy de lado", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 23008, "titulo": "Rakuten, AST SpaceMobile JV aims to break Starlink's grip on Japan's satellite market", "url": "https://www.digitimes.com/news/a20260625VL219/ast-starlink-leo-2026-communications.html", "fonte_id": "digitimes", "data_pub": "2026-06-28T02:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Rakuten Group, do Japão, planeja formar uma nova joint venture com a AST SpaceMobile dos Estados Unidos em 2026 para construir uma rede de comunicações via satélite de baixa órbita dedicada para o Japão. O projeto visa competir com a Starlink no mercado japonês.", "titulo_pt": "Rakuten e AST SpaceMobile JV buscam desafiar o domínio da Starlink no mercado japonês de satélites", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 23009, "titulo": "LG Chem weighs CCL expansion as AI chip demand strains supply", "url": "https://www.digitimes.com/news/a20260625VL221/lg-chem-ccl-expansion-demand-ai-chip.html", "fonte_id": "digitimes", "data_pub": "2026-06-28T02:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "LG Chem está considerando expandir a produção de laminado condutor de cobre, ou CCL, um material essencial na embalagem de semicondutores, devido ao aumento da demanda por chips de inteligência artificial.", "titulo_pt": "LG Chem Avalia Expansão de Produção de CCL Diante da Demanda por Chips de Inteligência Artificial", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 23010, "titulo": "Kaori fuel cell orders extend to 1 year; expanding capacity in Taiwan and overseas", "url": "https://www.digitimes.com/news/a20260624PD210/fuel-cell-kaori-taiwan-capacity-demand.html", "fonte_id": "digitimes", "data_pub": "2026-06-28T02:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As células combustíveis estão se tornando uma das soluções-chave para o futuro da suprimento de energia. A Kaori Heat Treatment, fornecedora na cadeia de suprimentos da Bloom Energy, anunciou que a visibilidade dos pedidos de suas células combustíveis foi estendida de seis meses para um ano. Para atender à crescente demanda por células combustíveis, sistemas de resfriamento líquido e trocadores de calor em placas, a empresa planeja expandir simultaneamente sua capacidade em Kaohsiung, Taoyuan, Taiwan, e Tailândia.", "titulo_pt": "Pedidos de células combustíveis da Kaori estendem-se para 12 meses; expansão de capacidade no Taiwan e no exterior", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 23011, "titulo": "2nm advanced process waste surges 13x, Techzone targets semiconductor ESG waste treatment market", "url": "https://www.digitimes.com/news/a20260624PD211/2nm-market-28nm-3nm.html", "fonte_id": "digitimes", "data_pub": "2026-06-28T02:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A demanda por tratamento de resíduos líquidos químicos está aumentando drasticamente devido ao rápido avanço das processos semicondutores para nódulos 28nm, 3nm e 2nm. As empresas de semicondutores estão adotando duas abordagens principais: contratar canais de tratamento de resíduos externos ou construir centros zero-waste internos para processar os resíduos dentro das próprias instalações, ambas envolvendo cooperação estreita com a Techzone.", "titulo_pt": "Demanda por tratamento de resíduos químicos líquidos aumenta 13 vezes, Techzone almeja mercado ESG de tratamento de resíduos semicondutores", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 23012, "titulo": "Trusval reports record 2025 profit, eyes global growth in 2026", "url": "https://www.digitimes.com/news/a20260624PD215/trusval-profit-revenue-2026.html", "fonte_id": "digitimes", "data_pub": "2026-06-28T02:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Trusval Technology relatou receita e lucro recordes para 2025, indicando uma maior demanda por sistemas relacionados a semicondutores usados em construções e indústrias que afetam cadeias de suprimentos globais. A empresa taiwanesa planeja entrar com cautela em 2026, expandindo soluções verdes para fábricas, projetos internacionais e atualizações tecnológicas.", "titulo_pt": "Trusval relata lucros recordes de 2025 e projeta crescimento global em 2026", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 23013, "titulo": "Sunrise builds integrated energy platform as AI data center demand rises", "url": "https://www.digitimes.com/news/a20260624PD216/data-center-efficiency-electricity-green-energy.html", "fonte_id": "digitimes", "data_pub": "2026-06-28T02:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Sunrise, uma empresa da Sino-American Silicon (SAS) Products, está expandindo sua plataforma integrada de energia inteligente em resposta à crescente demanda por computação de alto desempenho e centrais de dados. Isso é impulsionado pela necessidade mundial de energia elétrica maior, especialmente para aplicações de inteligência artificial (IA).", "titulo_pt": "Sunrise expande plataforma integrada de energia inteligente com aumento da demanda por IA e centrais de dados", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 23014, "titulo": "Smartwatch sales return to growth as AI and health features lift demand", "url": "https://www.digitimes.com/news/a20260626PD208/smartwatch-shipments-growth-apple-watch-market.html", "fonte_id": "digitimes", "data_pub": "2026-06-28T02:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As vendas de relógios inteligentes diminuíram em 2024, mas a demanda global retornou ao crescimento em 2025 e as vendas no primeiro trimestre de 2026 ainda estão aumentando em comparação com o ano anterior. Para os consumidores do mundo inteiro, isso sugere que a adoção de AI, monitoramento de saúde e melhorias premium está ajudando a categoria resistir à fraqueza mais ampla nos mercados de eletrônicos para consumo.", "titulo_pt": "Vendas de relógios inteligentes retornam ao crescimento com AI e recursos de saúde", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 23015, "titulo": "AI attacks scale up as annual security checks lag", "url": "https://www.digitimes.com/news/a20260626PD207/security-cybersecurity-data-design.html", "fonte_id": "digitimes", "data_pub": "2026-06-28T02:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A inteligência artificial está remodelando ofensivas e defesas cibernéticas a um ritmo sem precedentes, reduzindo o tempo necessário para preparar ataques que antes levavam semanas ou meses. Como resultado, as empresas enfrentam um ambiente de ameaças mais complexo e menos previsível, enquanto as verificações de segurança anuais estão cada vez mais incapazes de acompanhar essa evolução.", "titulo_pt": "Ataques de IA escalam enquanto verificações de segurança anuais caem para trás", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 23016, "titulo": "Aleees shifts to in-house manufacturing after US order opens North American push", "url": "https://www.digitimes.com/news/a20260626PD204/aleees-manufacturing-demand-licensing-production.html", "fonte_id": "digitimes", "data_pub": "2026-06-28T02:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa taiwanesa Aleees está mudando sua estratégia de produção após ganhar um importante pedido dos Estados Unidos, passando a produzir tecnologia internamente ao invés de licenciar. Essa mudança reflete as demandas mais apertadas da cadeia de suprimentos dos EUA, o aumento da demanda para armazenamento de energia e centros de dados inteligentes artificiais, além da crescente competição entre fornecedores não chineses globalmente.", "titulo_pt": "Aleees adota produção interna após ganhar pedido dos Estados Unidos", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 23017, "titulo": "CALIN shifts into land, sea, air and space markets as Starlink samples move forward", "url": "https://www.digitimes.com/news/a20260626PD201/revenue-taiwan-optical-lens-growth-2026.html", "fonte_id": "digitimes", "data_pub": "2026-06-28T02:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A CALIN está expandindo sua operação além dos produtos ópticos convencionais, buscando atender mercados terrestre, marítimo, aéreo e espacial para apoiar o crescimento à medida que suas linhas de produto mais antigas se estabilizam. A empresa taiwanesa de lentes afirmou que essa estratégia pode ser importante para clientes globais interessados em drones, satélites, agricultura e tecnologias de monitoramento industrial.", "titulo_pt": "CALIN avança para mercados terrestre, marítimo, aéreo e espacial com amostras do Starlink", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 22959, "titulo": "Can humans fall in love with AI?", "url": "https://www.koreaherald.com/article/10790444", "fonte_id": "korea_herald", "data_pub": "2026-06-28T02:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 2013, o filme de ficção científica 'Her' apresentou a ideia de pessoas se apaixonando por um sistema operacional de IA gentil e carinhoso. Dezessete anos depois, essa concepção parece menos fantástica à medida que as pessoas passam mais tempo com a IA, que se torna cada vez mais respon­siva, ouvindo, lembrando-se e oferecendo consolo de maneira às vezes mais empática do que os humanos.", "titulo_pt": "Poderão humanos se apaixonar por inteligência artificial?", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 23139, "titulo": "Analysis-Earthquake shifts political ground for Rodriguez", "url": "https://www.koreaherald.com/article/10790500", "fonte_id": "korea_herald", "data_pub": "2026-06-28T03:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um terremoto de magnitude superior a 7,0 na Venezuela é o maior desafio para a liderança inicial da interina Delcy Rodríguez, mas também pode permitir que ela estabeleça sua autoridade em um governo fragmentado e comece a reconstruir o país. A gravidade do dano só será totalmente clara após semanas.", "titulo_pt": "Análise: Terremoto desafia liderança de Rodríguez na Venezuela", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 22921, "titulo": "Japan aims to reduce annual heatstroke deaths to below 1,000", "url": "https://www.japantimes.co.jp/news/2026/06/28/japan/heatstroke-death-reduction-number-aim/", "fonte_id": "japan_times", "data_pub": "2026-06-28T01:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo japonês planeja reduzir o número anual de mortes por calor abaixo de 1.000, uma vez que as temperaturas extremas elevaram a média de cinco anos para mais de 1.500.", "titulo_pt": "Japão visa reduzir mortalidade por calor abaixo de 1.000 ao ano", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 22923, "titulo": "Spent nuclear fuel storage rate reaches up to 90% of capacity at some Japan reactors", "url": "https://www.japantimes.co.jp/news/2026/06/28/japan/spent-nuclear-fuel-amount/", "fonte_id": "japan_times", "data_pub": "2026-06-28T00:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Até 90% da capacidade de armazenamento de combustível nuclear usado está cheia em alguns reatores japoneses. Cinco reatores em nove usinas foram reiniciados desde o desastre de Fukushima em 2011.", "titulo_pt": "Taxa de armazenamento de combustível nuclear usado atinge até 90% da capacidade em alguns reatores japoneses", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 22924, "titulo": "Magnitude 6.1 earthquake strikes off coast of Iwate", "url": "https://www.japantimes.co.jp/news/2026/06/28/japan/iwate-earthquake-june-28/", "fonte_id": "japan_times", "data_pub": "2026-06-28T00:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um terremoto de magnitude 6.1 ocorreu perto da costa do estado de Iwate, no Japão. A intensidade foi registrada como 5 na escala sísmica japonesa de 7 em Hachinohe, Aomori Prefecture. Não houve alerta de tsunami emitido.", "titulo_pt": "Terremoto de magnitude 6.1 atinge costa de Iwate", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 22983, "titulo": "New bat and bird species found on Green Island", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/28/2003859877", "fonte_id": "taipei_times", "data_pub": "2026-06-28T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Nova espécie de morcego e pássaro foram descobertas na Ilha Verde.", "titulo_pt": "Novas espécies de morcegos e pássaros encontradas na Ilha Verde", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 22929, "titulo": "More temperature records shattered in Europe as deadly heat wave moves east", "url": "https://www.japantimes.co.jp/environment/2026/06/28/climate-change/temperature-records-europe/", "fonte_id": "japan_times", "data_pub": "2026-06-27T23:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em vários países da Europa, marcas de temperatura recordes foram quebradas no sábado, incluindo novos registros para todos os tempos na Alemanha, Dinamarca e República Tcheca, além de um novo recorde para o mês de junho em Suíça.", "titulo_pt": "Mais recordes de temperatura batidos na Europa com onda de calor que se move para leste", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 23018, "titulo": "Female baboons keep family bonds strong: Research reveals the benefits", "url": "https://phys.org/news/2026-06-female-baboons-family-bonds-strong.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Babuínos são um dos grupos de primatas mais comuns na África. Eles se espalharam por uma ampla área geográfica, desde a África subsaariana até o Peninsular Arábico, graças à sua adaptabilidade e variedade alimentar.", "titulo_pt": "Babuínos mantêm laços familiares fortes: pesquisa revela benefícios", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23019, "titulo": "When the rapid adaptation of sales channels pays off", "url": "https://phys.org/news/2026-06-rapid-sales-channels-pays.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T21:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A maior agilidade no sistema de vendas, ou seja, a capacidade de uma empresa adaptar rapidamente seus canais de venda às condições do mercado em mudança, está associada a maiores lucros operacionais, mas apenas sob certas condições. Este resultado foi obtido por meio de um estudo observacional baseado em pesquisas envolvendo 356 empresas europeias predominantemente europeias.", "titulo_pt": "Quando a agilidade nos canais de vendas paga dividendos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23020, "titulo": "Peptide alternative to antibiotics could combat antimicrobial resistance crisis", "url": "https://phys.org/news/2026-06-peptide-alternative-antibiotics-combat-antimicrobial.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um time de pesquisa da Universidade de Alberta desenvolveu um peptídeo promissor como alternativa para tratar infecções resistentes a antibióticos. O peptídeo, chamado D-GK17, foi testado pré-clinicamente e demonstrou ser estável e não tóxico para humanos, atacando as superfícies de células bacterianas ou fúngicas que formam biofilmes, estruturas adesivas frequentemente impenetráveis por tratamentos antibióticos.", "titulo_pt": "Peptídeo alternativo aos antibióticos pode combater a crise da resistência antimicrobiana", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23021, "titulo": "Burned-home soils showed uneven lead, arsenic contamination after Los Angeles wildfires", "url": "https://phys.org/news/2026-06-home-soils-uneven-arsenic-contamination.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma análise química de solos e cinzas residenciais na área afetada pelos incêndios de floresta de Eaton e Palisades, no início de 2025, em California, revelou uma grande variação na contaminação por elementos potencialmente prejudiciais, incluindo chumbo e arsênico. Os resultados foram compartilhados com o Departamento de Saúde Pública de Los Angeles ao longo do estudo.", "titulo_pt": "Solos das casas queimadas mostraram contaminação variada de chumbo e arsênico após os incêndios florestais em Los Angeles", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23022, "titulo": "New research identifies types of dishonesty that occur in a relationship—and their consequences", "url": "https://phys.org/news/2026-06-dishonesty-relationship-consequences.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A pesquisa da Universidade de Copenhague identificou diferentes tipos de desonestidade em relacionamentos românticos, como 'mentiras inocentes' e infidelidades. Embora a desonestidade geralmente cause desconfiança e ressentimento entre os parceiros, ela pode também auxiliar na resolução de problemas e no fortalecimento do vínculo entre os cônjuges em certos casos.", "titulo_pt": "Novas pesquisas identificam tipos de desonestidade em relacionamentos românticos e suas consequências", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23023, "titulo": "World's largest particle smasher halts for upgrade to boost hunt for dark matter", "url": "https://phys.org/news/2026-06-world-largest-particle-smasher-halts.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T19:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O maior acelerador de partículas do mundo vai interromper as operações por quatro anos a partir da próxima segunda-feira para renovações que visam aumentar significativamente a capacidade de colisão e a possibilidade de descobrir um dos mistérios mais grandes do universo: a matéria escura.", "titulo_pt": "O maior acelerador de partículas do mundo pausa por quatro anos para melhorias na busca pela matéria escura", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23024, "titulo": "Lithium-doped carbon nanorings show promise for next-generation optical devices", "url": "https://phys.org/news/2026-06-lithium-doped-carbon-nanorings-generation.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T18:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas utilizaram modelagem computacional para demonstrar que a adição de um átomo de lítio à superfície de uma molécula de carbono composta por 12 anéis de benzeno cria um material com respostas ópticas excepcionalmente fortes. Este material tem potencial para ser usado em dispositivos ópticos avançados do futuro.", "titulo_pt": "Anéis de carbono dopados com lítio mostram promessa para dispositivos ópticos futuros", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23025, "titulo": "Newly identified fossil sheds light on evolutionary history of saber-toothed cats", "url": "https://phys.org/news/2026-06-newly-fossil-evolutionary-history-saber.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um fóssil de gato-sabre-dente, anteriormente identificado apenas como 'feline', foi reidentificado por um paleontólogo da UC Berkeley. O crânio praticamente completo desse gato antigo e enigmático ajuda a esclarecer o desenvolvimento desses felinos com grandes dentes de presa ao longo dos milhares de anos antes do seu extinção há aproximadamente 10.000 anos.", "titulo_pt": "Novo fóssil identificado oferece insights sobre a história evolutiva dos gatos-sabre-dente", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23026, "titulo": "Laser-based 3D imaging system enables precise detection and quantification of methane leakage", "url": "https://phys.org/news/2026-06-laser-based-3d-imaging-enables.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de pesquisa liderado pelo Prof. Zhang Zhirong, dos Institutos de Ciência Física de Hefei da Academia Chinesa de Ciências, desenvolveu um sistema de imagens tridimensionais baseadas em laser que permite a visualização de microfugas, localização precisa das fontes de fuga e recuperação quantitativa das taxas de emissão.", "titulo_pt": "Sistema de imagens 3D com laser habilita detecção precisa e medição de fugas de metano", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23027, "titulo": "New millisecond pulsar discovered with the Murchison Widefield Array", "url": "https://phys.org/news/2026-06-millisecond-pulsar-murchison-widefield-array.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T16:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Astrônomos descobriram uma nova pulsar de milissegundos usando o Murchison Widefield Array (MWA) durante a pesquisa SMART (Southern-sky MWA Rapid Two-metre). O trabalho foi publicado em um artigo no arXiv e aceito para publicação na The Astrophysical Journal Letters.", "titulo_pt": "Nova pulsar de milissegundos descoberta com o Murchison Widefield Array", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 23225, "titulo": "Le Sserafim, Illit, Katseye collaboration finds global success beyond fandoms", "url": "https://www.koreaherald.com/article/10790520", "fonte_id": "korea_herald", "data_pub": "2026-06-28T04:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A colaboração 'Iconic by Mistake', entre Le Sserafim, Illit e Katseye, continua a ganhar momentum nas paradas globais, se tornando um dos lançamentos de K-pop feminino mais bem-sucedidos do ano. O single digital subiu quatro posições para o 21º lugar na parada semanal global da Spotify no período de 19 a 25 de junho.", "titulo_pt": "Le Sserafim, Illit e Katseye: Colaboração alcança sucesso global além dos fãs", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 23223, "titulo": "Why are Chinese audiences going for Korean musicals rather than Western shows?", "url": "https://www.scmp.com/news/china/diplomacy/article/3358591/why-are-chinese-audiences-going-korean-musicals-rather-western-shows?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A plateia chinesa tem preferido musicals coreanos a produções ocidentais. Tina Zhang, de 39 anos, assistiu à adaptação chinesa da peça 'Entrevista' e apreciou sua estrutura e envolvimento psicológico.", "titulo_pt": "Por que as plateias chinesas preferem musicals coreanos a shows ocidentais?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 23134, "titulo": "LGBTQ+ families are building lives Japanese lawmakers still struggle to see", "url": "https://www.japantimes.co.jp/news/2026/06/28/japan/society/lgbtq-family-rights/", "fonte_id": "japan_times", "data_pub": "2026-06-28T03:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "No Japão, casais LGBTQ+ não recebem os mesmos direitos e benefícios legais que os casados. Os legisladores japoneses ainda têm dificuldade em reconhecer essas famílias.", "titulo_pt": "Famílias LGBTQ+ estão construindo vidas enquanto legisladores japoneses enfrentam desafios para reconhecê-las", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 22655, "titulo": "Un país que incluya a todos", "url": "https://www.lanacion.com.ar/economia/un-pais-que-incluya-a-todos-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T03:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Nenhuma sociedade pode ser contra a redução da pobreza e o aumento das oportunidades de progresso, mas não há um modelo que tenha incluído todos os cidadãos na Argentina nas últimas décadas.", "titulo_pt": "Um país que inclua a todos", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 22656, "titulo": "La llama eterna de un tal Ray Bradbury", "url": "https://www.lanacion.com.ar/conversaciones-de-domingo/la-llama-eterna-de-un-tal-ray-bradbury-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T03:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Leitores continuam a se debruçar sobre os relatos fantásticos de Ray Bradbury, mesmo antes de dormir. O escritor é descrito como único.", "titulo_pt": "A Chama Eterna de um Tal Ray Bradbury", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 22657, "titulo": "Lecturas: un fragmento de Dos extraños, de Luis Gusmán", "url": "https://www.lanacion.com.ar/conversaciones-de-domingo/lecturas-un-fragmento-de-dos-extranos-de-luis-gusman-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T03:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Publica-se aqui um fragmento da nova novela do escritor e psicanalista argentino, recentemente lançada pela edit s' na Amazônia que desafiam a agricultura moderna", "url": "https://www.bbc.com/portuguese/articles/cm2ry174142o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-27T22:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Este sistema indígena de agricultura, com mais de 4.500 anos, não utiliza agrotóxicos e retorna as áreas cultivadas à floresta após cinco anos. Ele oferece uma alternativa à agricultura moderna.", "titulo_pt": "As 'fazendas' na Amazônia que desafiam a agricultura moderna", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 22844, "titulo": "France counts 74 drowning deaths since June 18 amid record-breaking heatwave", "url": "https://www.lemonde.fr/en/international/article/2026/06/27/france-counts-74-drowning-deaths-since-june-18-amid-record-breaking-heatwave_6754934_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-27T21:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A França registrou 74 mortes por afogamento desde junho de 18, coincidindo com uma onda de calor extremamente atípica para o verão. Grandes partes da Europa ocidental têm estado sob um 'dome de calor' esta semana.", "titulo_pt": "França registra 74 mortes por afogamento durante onda de calor recorde desde junho", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 22894, "titulo": "Tropical Storm Mekkhala leaves Taiwan underwater", "url": "https://www.aljazeera.com/video/newsfeed/2026/6/27/tropical-storm-mekkhala-leaves-taiwan-underwater?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-27T17:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Tropical Storm Mekkhala causou inundações severas em várias partes da Taiwan.", "titulo_pt": "Tropical Storm Mekkhala deixa a Taiwan submersa", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 22394, "titulo": "Germany and Italy swelter in heatwave as records tumble across Europe", "url": "https://www.theguardian.com/world/2026/jun/27/germany-italy-heatwave-records-tumble-across-europe", "fonte_id": "guardian_world", "data_pub": "2026-06-27T15:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Alemanha e a Itália enfrentaram condições de calor intenso no sábado, enquanto um calorão relacionado a várias mortes em regiões ocidentais da Europa se espalhou para o leste. Temperaturas acima de 40°C (104°F) quebraram recordes em ambos os países. Em Dinamarca, registraram-se as temperaturas mais altas de sua história nos registros desde 1874.", "titulo_pt": "Alemanha e Itália sofrem com calor extremo, registrando recordes de temperatura", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 22329, "titulo": "Onda de calor avança em direção ao leste da Europa", "url": "https://www.cnnbrasil.com.br/internacional/onda-de-calor-avanca-em-direcao-ao-leste-da-europa/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-27T14:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Alertas foram emitidos por Praga e Budapeste para moradores e turistas. Temperaturas chegaram a 37°C em ambos os lugares neste sábado, podendo aumentar nos próximos dias.", "titulo_pt": "Onda de calor avança para o leste da Europa", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 22588, "titulo": "Terremoto na Venezuela: ONU estima que 6,8 milhões de pessoas foram afetadas", "url": "https://exame.com/mundo/terremoto-na-venezuela-onu-estima-que-68-milhoes-de-pessoas-foram-afetadas/", "fonte_id": "exame", "data_pub": "2026-06-27T14:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Organização Internacional para as Migrações estima que 6,8 milhões de pessoas foram afetadas pelo terremoto na Venezuela. A tragédia já registrou 920 mortos, milhares de feridos e dezenas de milhares desaparecidos.", "titulo_pt": "Terremoto na Venezuela: ONU estima que 6,8 milhões foram afetados", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 22098, "titulo": "Réplicas de terremotos na Venezuela atrapalham operações de resgate", "url": "https://www.cnnbrasil.com.br/internacional/replicas-de-terremotos-na-venezuela-atrapalham-operacoes-de-resgate/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-27T14:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Tremores contínuos e danos extensos causados por um terremoto na Venezuela geraram preocupação entre as equipes de socorro. Isso afetou negativamente as operações da Cruz Vermelha, que enfrentam desafios para lidar com a situação.", "titulo_pt": "Réplicas de terremotos na Venezuela atrapalham operações de resgate", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 22101, "titulo": "Afogamentos e recorde de calor: Clima extremo na Europa só tende a piorar", "url": "https://www.cnnbrasil.com.br/internacional/afogamentos-e-recorde-de-calor-clima-extremo-na-europa-so-tende-a-piorar/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-27T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Cientistas alertam que a queima de combustíveis fósseis é a principal causa do fenômeno. Infraestrutura continental também contribui para aumentar o calor.", "titulo_pt": "Afogamentos e calor recorde: O clima extremo na Europa só piora", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 22084, "titulo": "Terremotos na Venezuela deixam cerca de mil mortos e mais de 3.000 feridos", "url": "https://veja.abril.com.br/mundo/terremotos-na-venezuela-deixam-cerca-de-mil-mortos-e-mais-de-3-000-feridos/", "fonte_id": "veja", "data_pub": "2026-06-27T13:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Quase setenta horas após os terremotos, equipes de resgate de vários países intensificaram suas buscas por sobreviventes esmagados pelos escombros.", "titulo_pt": "Terremotos na Venezuela deixam cerca de mil mortos e mais de 3.000 feridos", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 22110, "titulo": "Crustáceos acumulados em navios ameaçam normalização da navegação em Ormuz", "url": "https://www.cnnbrasil.com.br/internacional/crustaceos-acumulados-em-navios-ameacam-normalizacao-da-navegacao-em-ormuz/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-27T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Navios-tanques, que ficaram parados por meses em Ormuz, agora enfrentam problemas causados pela acumulação de bioincrustações. Essas substâncias precisam ser removidas para que as rotas marítimas possam retornar ao normal.", "titulo_pt": "Centenas de navios-tanque parados por meses acumularam bioincrustações e precisam de remoção para retomar a navegação", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 22131, "titulo": "El Niño muda o tempo e leva chuva forte ao Sul neste fim de semana", "url": "https://exame.com/brasil/el-nino-muda-o-tempo-e-leva-chuva-forte-ao-sul-neste-fim-de-semana/", "fonte_id": "exame", "data_pub": "2026-06-27T11:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Após dias de frio intenso e geadas, um sistema de instabilidade avança pelo Rio Grande do Sul e se espalha pelos demais estados da região sul do país.", "titulo_pt": "El Niño altera o clima e traz fortes chuvas ao Sul neste fim de semana", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 22014, "titulo": "Woman rescued after car plunges into flooded sinkhole", "url": "http://www.euronews.com/video/2026/06/27/woman-rescued-after-car-plunges-into-flooded-sinkhole", "fonte_id": "euronews", "data_pub": "2026-06-27T11:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma policial salvou uma mulher ao recolhê-la da direção do seu veículo que caiu num poço causado por um vazamento de tubulação de água na Virgínia, EUA. Câmeras de segurança mostram pessoas ajudando a estabilizar a policial enquanto ela resgatava a vítima.", "titulo_pt": "Mulher resgatada após carro cair em poço de água subterrânea", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}], "meio_ambiente__eventos": [{"titulo": "Número de mortos por terremotos na Venezuela sobe para 1.430", "sumario": "O número de mortos por terremotos na Venezuela subiu para 1.430, conforme atualização feita pelo líder parlamentar Jorge Rodríguez na tarde deste sábado. O número de mortos pelos terremotos na Venezuela aumentou para 1.430, conforme informado pelo presidente da Assembleia Nacional, Jorge Rodríguez. O número de mortos após os terremotos na Venezuela chegou a 1.430.", "artigos": [{"id": 22467, "titulo": "Sobe para 1.430 o número de mortos por terremotos na Venezuela", "url": "https://www.cartacapital.com.br/cartaexpressa/sobe-para-1-430-o-numero-de-mortos-por-terremotos-na-venezuela/", "fonte_id": "cartacapital", "data_pub": "2026-06-27T19:04:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O número de mortos por terremotos na Venezuela subiu para 1.430, conforme atualização feita pelo líder parlamentar Jorge Rodríguez na tarde deste sábado. Os feridos somam 3.230.", "titulo_pt": "Número de mortos por terremotos na Venezuela sobe para 1.430", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 22530, "titulo": "Número de mortos por terremotos na Venezuela sobe para 1.430 no terceiro dia de buscas", "url": "https://www.brasildefato.com.br/2026/06/27/numero-de-mortos-por-terremotos-na-venezuela-sobe-para-1430-no-terceiro-dia-de-buscas/", "fonte_id": "brasil_de_fato", "data_pub": "2026-06-27T18:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O número de mortos pelos terremotos na Venezuela aumentou para 1.430, conforme informado pelo presidente da Assembleia Nacional, Jorge Rodríguez. A contagem de feridos atinge 3.238 e a atividade sísmica continua intensa.", "titulo_pt": "Número de mortos por terremotos na Venezuela sobe para 1.430 no terceiro dia de buscas", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 22585, "titulo": "Número de mortos após terremotos na Venezuela chega a 1.430", "url": "https://exame.com/mundo/numero-de-mortos-apos-terremotos-na-venezuela-chega-a-1-430/", "fonte_id": "exame", "data_pub": "2026-06-27T15:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O número de mortos após os terremotos na Venezuela chegou a 1.430. Além disso, foram relatados 3.238 feridos e 3.142 desabrigados.", "titulo_pt": "Número de mortos após terremotos na Venezuela chega a 1.430", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}]}], "direitos_humanos": [{"id": 23104, "titulo": "Crisis de natalidad, inmigrantes y xenofobia", "url": "https://www.ciperchile.cl/2026/06/27/crisis-de-natalidad-inmigrantes-y-xenofobia/?utm_source=rss&utm_medium=rss&utm_campaign=crisis-de-natalidad-inmigrantes-y-xenofobia", "fonte_id": "ciper_chile", "data_pub": "2026-06-28T03:21:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O texto discute questões relacionadas à crise demográfica, imigração e xenofobia.", "titulo_pt": "Crise de natalidade, imigrantes e xenofobia", "veiculo": "CIPER Chile", "pais": "Chile", "classe": "A"}, {"id": 22487, "titulo": "Transparência Internacional: caso Master revela nível preocupante de infiltração do crime", "url": "https://veja.abril.com.br/politica/transparencia-internacional-caso-master-revela-nivel-preocupante-de-infiltracao-do-crime/", "fonte_id": "veja", "data_pub": "2026-06-28T00:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O caso Master revelou um nível de infiltração do crime organizado nas instituições brasileiras que é considerado preocupante. O escândalo financeiro mostrou uma vulnerabilidade alarmante dessas organizações.", "titulo_pt": "Caso Master: infiltração criminal e vulnerabilidade das instituições brasileiras", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 22843, "titulo": "'I just want to know if he's still alive': The long ordeal of families searching for loved ones lost at sea", "url": "https://www.lemonde.fr/en/international/article/2026/06/28/i-just-want-to-know-if-he-s-still-alive-the-long-ordeal-of-families-searching-for-loved-ones-lost-at-sea_6754938_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-28T00:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Desde o início do ano, naufrágios no Mediterrâneo e Atlântico aumentaram, deixando amigos e familiares sem notícias de quem tenta atravessar essas águas.", "titulo_pt": "Eu apenas quero saber se ele ainda está vivo: a longa angústia das famílias buscando por parentes perdidos no mar", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 23031, "titulo": "UNICEF: 680,000 children estimated to be in need of humanitarian assistance after Venezuela earthquakes", "url": "https://www.unicef.org/press-releases/unicef-680000-children-estimated-be-need-humanitarian-assistance-after-venezuela", "fonte_id": "unicef", "data_pub": "2026-06-28T00:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A UNICEF enviou uma aeronave com assistência humanitária para Venezuela, incluindo suprimentos médicos, água e itens de saneamento. Estima-se que cerca de 680 mil crianças estejam em necessidade de assistência humanitária após os terremotos no país.", "titulo_pt": "UNICEF: Aproximadamente 680 mil crianças precisam de assistência humanitária após os terremotos na Venezuela", "veiculo": "UNICEF Global", "pais": "Global", "classe": "A"}, {"id": 22470, "titulo": "Neonazista brasileiro condenado por assassinato é preso na Itália", "url": "https://www.cartacapital.com.br/carta-capital/neonazista-brasileiro-condenado-por-assassinato-e-preso-na-italia/", "fonte_id": "cartacapital", "data_pub": "2026-06-27T17:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "João Guilherme Correa, um neonazista brasileiro condenado por assassinato e foragido desde março de 2025, foi preso na It const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${artsHtml ? `<div class="destaque-fontes">
      <h3>Fontes desta edição</h3>
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();
