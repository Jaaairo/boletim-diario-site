<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 12/07/2026 16:55 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">

    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">

</div>

<div class="modal-overlay" id="modal-flag">

    <select id="flag-tipo">

      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "12/07/2026 16:55", "stats": {"noticias_novas": 578, "resumos_gerados": 217}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "A Polícia Federal (PF) investiga supostos esquemas de Eduardo Cunha, ex-deputado federal, que teriam o 'pleno aval' da Presidência da Câmara. De acordo com a PF, uma servidora estava envolvida no direcionamento de emendas para beneficiar Cunha, que é próximo do atual presidente da Casa, Hugo Motta. O governador do Maranhão, Flávio Dino, bloqueou R$ 6,1 milhões de Cunha por suspeita de desvios de recursos. A PF descobriu que uma servidora contava com o aval de Eduardo Motta para manipular emendas parlamentares destinadas a Cunha. O ex-deputado nega irregularidades e afirma que questionará o bloqueio de seus bens no STF. Além disso, a PF apontou uma ligação entre um sargento investigado por envolvimento com o Comando Vermelho e a morte deste em São Paulo. O ministro Alexandre de Moraes concedeu prisão domiciliar ao pastor Márcio Poncio, alvo de operação da Polícia Federal, devido à sua condição médica grave.", "mundo": "A Ucrânia realizou uma reorganização do governo recente, com a primeira-ministra Yuliia Svyrydenko renunciando após um ano no cargo. Esta mudança faz parte de um pacote mais amplo proposto pelo presidente Volodymyr Zelensky, que também promoveu outras reformas ministeriais. Em outro desenvolvimento, as eleições nacionais em Israel serão realizadas no dia 27 de outubro, conforme anunciado pelo líder da coalizão. Além disso, o governo americano recusou-se a oferecer ajuda financeira a alguns países africanos, que consideram essa oferta inadequada e desigual. Na Europa, os trabalhadores dos aplicativos de entrega em Florença, Itália, entraram em greve por causa das baixas remunerações e do clima quente. No Chile, seis pessoas morreram após serem atropeladas durante uma feira em Viña del Mar.\n\nO Oriente Médio enfrenta tensões geopolíticas agravadas por ataques e confrontos entre Estados Unidos, Irã e outros países. O papa Francisco pediu diálogo para terminar as guerras no Oriente Médio e na Ucrânia, enquanto o secretário-geral da ONU, António Guterres, também chamou para um fim imediato às escaladas de ataques no Golfo. Em meio a esses desafios, o Irã relatou novos ataques perto do Estreito de Ormuz e realizou 140 ataques a alvos militares nos Estados Unidos após o fim do cessar-fogo anunciado por Donald Trump em 2020. Por outro lado, Israel intensificou operações na Faixa de Gaza, matando mais de mil palestinos desde outubro de 2023. O senador republicano Lindsey Graham faleceu aos 71 anos, deixando um legado controverso no cenário político americano e internacional.", "economia": "A crise no setor automotivo está afetando os engenheiros jovens na Alemanha, com muitos enfrentando dificuldades de emprego e redução de oportunidades. Outra notícia econômica importante é que o Brasil intensifica suas estratégias para mitigar os efeitos da guerra comercial liderada pelo ex-presidente dos Estados Unidos, Donald Trump, buscando novos mercados. No cenário internacional, o Reino Unido anunciou a alocação de 2 bilhões de libras em financiamentos para pequenas e médias empresas (PMEs). No setor imobiliário, as letras imobiliárias garantidas são apresentadas como ativos isentos do imposto de renda para pessoas físicas. Além disso, jovens brasileiros estão se tornando cada vez mais importantes para o setor turístico, realizando pelo menos duas viagens por ano e financiando suas próprias férias sem depender de datas específicas.", "tecnologia": "O Google Maps está evoluindo para um assistente de viagem com a integração do Gemini, permitindo perguntas mais complexas e sugestões baseadas em múltiplos locais. A função 'Perguntar ao Maps' e o recurso Navegação Imersiva usam inteligência artificial para fornecer informações durante a direção de forma interativa. Além disso, a Amazon está oferecendo diversos produtos tecnológicos em promoção, incluindo roteadores Wi-Fi, smart speakers com Alexa, caixas de som Bluetooth e câmeras de segurança, proporcionando soluções para melhorar o conforto e a segurança doméstica. A hiperautomação, impulsionada pela evolução da inteligência artificial e análise de dados, está se tornando uma nova fronteira na competitividade empresarial, promovendo a integração entre sistemas e transformando processos operacionais.", "ciencia": "Um estudo publicado no Proceedings of the National Academy of Sciences mostrou que as golfinhas-águia do norte dos Estados Unidos e Canadá estão mais vulneráveis devido ao aquecimento global, em comparação com as da região sul. Este achado, liderado por pesquisadores da Cornell University, analisou quase 95.000 ninhos ao longo de cinco décadas e ressaltou a urgência de medidas para mitigar os impactos climáticos na biodiversidade. Além disso, a NASA superou seu recorde de visualizações ao atingir 149 milhões durante a missão Artemis II, afetando positivamente milhões de pessoas. Esses eventos destacam avanços científicos em biologia e tecnologia espacial.", "cultura": "A exposição na Casa Fiat de Cultura em Belo Horizonte reúne veículos históricos, como o carro do Papa e um Uno pertencente a Ayrton Senna, para comemorar 50 anos da fabricante. O evento abrange desde a inauguração da fábrica em Betim até lançamentos futuros, mostrando a trajetória da empresa ao longo dessas décadas. Além disso, a Casa Fiat celebra não apenas a história automobilística brasileira, mas também a influência global da marca, com um foco especial nos veículos associados a figuras icônicas do esporte e da política nacional.", "sociedade": "A Venezuela continua recebendo ajuda humanitária após terremotos que afetaram mais de 86 mil famílias no país. A presidente interina Delcy Rodríguez visitou um hospital de campanha em Caracas, oferecido pelo Catar. No Brasil, o envelhecimento populacional desafia o modelo tradicional de cuidado familiar, com a Casa Branca criticando um museu que aborda a história dos Estados Unidos por sua narrativa controversa. Em Hong Kong, a série 'Idade em Hong Kong' explora o crescente isolamento social entre os idosos e seus riscos à saúde. Além disso, o número de suicídios confirmados entre jovens atingiu um recorde de 10 anos no ano passado. A população idosa de Hong Kong também está aumentando, levantando questões sobre se isso deve causar preocupação na cidade.", "meio_ambiente": "Um supertufão chamado Bavi atingiu a China com ventos de até 145 km/h, forçando a evacuação de cerca de 2 milhões de pessoas. O tufão já havia causado danos em Filipinas, Japão e Taiwan antes de chegar à China. Paralelamente, um forte El Niño pode ser o mais intenso desde 1950, com impactos variados no Brasil. A França desligou temporariamente três reatores nucleares devido ao calor extremo, enquanto a Alemanha registrou 9 mortes afogadas em sua maior onda de calor em décadas. Em outro desenvolvimento, um ginkgo centenário na Coreia do Sul está prestes a morrer após supostamente ser envenenado por um museu vizinho para evitar o bloqueio de vias. Além disso, 90% dos projetos renováveis de energia em 2025 foram mais baratos que as usinas fósseis e a China enfrenta um novo tufão desclassificado após evacuar quase 2 milhões de pessoas. No Brasil, o Instituto Federal do Amazonas implementará um sistema de inteligência artificial para prever incêndios florestais na Amazônia 14 dias antes da intensificação da seca em agosto.", "direitos_humanos": "Os ataques israelenses causaram ao menos seis mortes no Gaza Strip, incluindo uma menina de 9 anos, segundo autoridades palestinas. O incidente ocorreu durante um tiroteio em um acampamento de refugiados em Al-Bureij e em um ataque aéreo em uma fábrica metálica no bairro Sabra de Gaza City. No Senegal, a aprovação de uma lei que aumenta as penas para relações entre pessoas do mesmo sexo tem causado medo constante à comunidade LGBTQ+, segundo relatos de membros da comunidade. Além disso, a UNICEF alertou para a necessidade urgente de proteger as dietas dos jovens em Afghanistan, onde 3,7 milhões de crianças estão em risco aumentado de malnutrição devido à insegurança alimentar e nutricional. Por fim, um levantamento realizado por uma organização cívica sul-coreana mostrou que 37,3% dos meninos vítimas de crimes sexuais não relataram o ocorrido, enquanto a vítima do 'chute circular' em Busan em 2022 se opôs à abolição pelo governo do direito da procuradoria de realizar investigações suplementares."}, "resumo_do_dia": {"politica_nacional": [{"id": 48044, "titulo": "PF: servidora contava com aval de Motta para promover desvios de emendas para Cunha", "url": "https://www.infomoney.com.br/politica/pf-servidora-contava-com-aval-de-motta-para-promover-desvios-de-emendas-para-cunha/", "fonte_id": "infomoney", "data_pub": "2026-07-12T18:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal identificou que uma servidora contava com o aval do ex-deputado Eduardo Motta para promover desvios de emendas parlamentares destinadas ao ex-presidente da Câmara, Eduardo Cunha. Foram identificados pelo menos 21 emendas indicadas por Cunha em 2025.", "titulo_pt": "PF: servidora contava com aval de Motta para promover desvios de emendas para Cunha", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 48049, "titulo": "Dino dá 10 dias para Hugo Motta enviar documentos de emendas sob suspeita", "url": "https://www.infomoney.com.br/politica/dino-da-10-dias-para-hugo-motta-enviar-documentos-de-emendas-sob-suspeita/", "fonte_id": "infomoney", "data_pub": "2026-07-12T18:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governador do Maranhão, Flávio Dino, deu 10 dias ao presidente da Câmara Municipal de São Luís, Hugo Motta, para enviar os documentos das emendas orçamentárias sob suspeita. A decisão determina que a documentação deve ser encaminhada individualmente e organizada por emenda.", "titulo_pt": "Dino dá 10 dias para Motta enviar documentos de emendas suspeitas", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 48061, "titulo": "Cunha nega irregularidade em emendas e diz que questionará bloqueio de bens", "url": "https://www.cnnbrasil.com.br/politica/cunha-nega-irregularidade-em-emendas-e-diz-que-questionara-bloqueio-de-bens/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-12T18:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ex-deputado federal Eduardo Cunha negou irregularidades em relação às emendas e afirmou que questionará o bloqueio de seus bens no STF. Ele justificou a medida como uma 'legítima interlocução política'.", "titulo_pt": "Cunha nega irregularidade em emendas e diz que questionará bloqueio de bens", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 48005, "titulo": "PF vê \"pleno aval\" da Presidência da Câmara a emendas de Eduardo Cunha", "url": "https://www.metropoles.com/brasil/pf-ve-pleno-aval-da-presidencia-da-camara-a-emendas-de-eduardo-cunha", "fonte_id": "metropoles", "data_pub": "2026-07-12T18:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal (PF) apontou um suposto 'pleno aval' da Presidência da Câmara aos esquemas de Eduardo Cunha. Segundo a investigação, uma servidora atuava no direcionamento de emendas para beneficiar o ex-deputado, que é próximo do atual presidente da Casa, Hugo Motta.", "titulo_pt": "PF vê 'pleno aval' da Presidência da Câmara a esquemas de Eduardo Cunha", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 47945, "titulo": "Moraes autoriza prisão domiciliar ao pastor Márcio Poncio e impõe medidas cautelares", "url": "https://www.cartacapital.com.br/justica/moraes-autoriza-prisao-domiciliar-ao-pastor-marcio-poncio-sob-medidas-cautelares/", "fonte_id": "cartacapital", "data_pub": "2026-07-12T18:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O juiz federal Sérgio Moraes autorizou a prisão domiciliar para o pastor Márcio Poncio e impôs medidas cautelares, incluindo o uso de tornozeleira eletrônica. A decisão foi tomada em consideração ao estado de saúde do investigado.", "titulo_pt": "Moraes autoriza prisão domiciliar e medidas cautelares para pastor Márcio Poncio", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 48010, "titulo": "Sargento investigado por envolvimento com CV é executado a tiros no RJ", "url": "https://www.metropoles.com/distrito-federal/na-mira/sargento-investigado-por-envolvimento-com-cv-e-executado-a-tiros-no-rj", "fonte_id": "metropoles", "data_pub": "2026-07-12T18:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um sargento foi executado a tiros na madrugada deste domingo (12/7) no Rio de Janeiro. Em 2023, a Polícia Civil apontou uma ligação entre o sargento e o Comando Vermelho.", "titulo_pt": "Sargento investigado por envolvimento com CV é executado no RJ", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 47975, "titulo": "Moraes concede prisão domiciliar humanitária ao pastor Márcio Poncio, alvo de operação da PF", "url": "https://veja.abril.com.br/brasil/moraes-concede-prisao-domiciliar-humanitaria-ao-pastor-marcio-poncio-alvo-de-operacao-da-pf/", "fonte_id": "veja", "data_pub": "2026-07-12T18:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O juiz federal Sérgio Moraes concedeu prisão domiciliar humanitária ao pastor Márcio Poncio, que é alvo de uma operação da Polícia Federal. Ele deve usar tornozeleira eletrônica e seguir outras medidas cautelares, como entregar seu passaporte à Justiça e não utilizar redes sociais.", "titulo_pt": "Moraes concede prisão domiciliar humanitária ao pastor Márcio Poncio, alvo de operação da PF", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 48011, "titulo": "\"Mineiros enrolados\", reclamou Cunha em diálogo sobre emendas", "url": "https://www.metropoles.com/brasil/mineiros-enrolados-reclamou-cunha-em-dialogo-sobre-emendas", "fonte_id": "metropoles", "data_pub": "2026-07-12T18:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Eduardo Cunha, pré-candidato à Câmara dos Deputados por Minas Gerais, reclamou sobre mineiros enrolados durante um diálogo interceptado pela Polícia Federal em uma investigação sobre emendas.", "titulo_pt": "Cunha reclama de mineiros enrolados em diálogo interceptado", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 48013, "titulo": "Pacote com rojões e bilhete é deixado em prédio da Justiça na Paulista", "url": "https://www.metropoles.com/sao-paulo/pacote-rojoes-bilhete-predio-paulista", "fonte_id": "metropoles", "data_pub": "2026-07-12T18:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um pacote contendo rojões e um bilhete foi deixado em um prédio da Justiça na Avenida Paulista. A Polícia Militar e o Corpo de Bombeiros foram acionados após a suspeita de bomba, e o caso está sendo investigado pela Polícia Federal.", "titulo_pt": "Pacote com rojões e bilhete é deixado em prédio da Justiça na Paulista", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 47937, "titulo": "O teorema de Buscetta: 'mob lawyers' e facções judiciais", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/marcus-melo/2026/07/o-teorema-de-buscetta-mob-lawyers-e-faccoes-judiciais.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-12T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro André Mendonça comentou sobre o escândalo Master, afirmando que há indícios de máfia e crime organizado envolvidos. Ele destaca que o caso vai além do típico crime de colarinho branco, envolvendo fraudes, corrupção, lavagem de dinheiro e crimes contra o sistema financeiro.", "titulo_pt": "O teorema de Buscetta: 'advogados da máfia' e facções judiciais", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 47962, "titulo": "Decisão sobre penduricalhos não vai afetar a AGU, diz Anafe", "url": "https://www.poder360.com.br/poder-justica/decisao-sobre-penduricalhos-nao-vai-afetar-a-agu-diz-anafe/", "fonte_id": "poder360", "data_pub": "2026-07-12T17:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Vitor Chaves, da Anafe, afirmou que a decisão sobre penduricalhos não afetará diretamente a Advocacia-Geral da União. Ele comentou sobre honorários advocatícios e mudanças na carreira dos integrantes da advocacia pública.", "titulo_pt": "Decisão sobre penduricalhos não impacta AGU, diz Anafe", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 47946, "titulo": "Dino determina bloqueio de 6,1 milhões de Eduardo Cunha por suspeita de desvio de emendas", "url": "https://www.cartacapital.com.br/justica/dino-determina-bloqueio-de-61-milhoes-de-eduardo-cunha-por-suspeita-de-desvio-de-emendas/", "fonte_id": "cartacapital", "data_pub": "2026-07-12T17:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ex-deputado Eduardo Cunha teve bloqueados 6,1 milhões de reais por suspeita de desvio de emendas. A investigação aponta que ele teria interferido na destinação dos recursos sem estar em cargo parlamentar.", "titulo_pt": "Dino determina bloqueio de 6,1 milhões a Eduardo Cunha por suspeita de desvio de emendas", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 47963, "titulo": "Prefeito de Cuiabá compartilha ligação e ironiza alegação de paternidade", "url": "https://www.poder360.com.br/poder-brasil/prefeito-de-cuiaba-compartilha-ligacao-e-ironiza-alegacao-de-paternidade/", "fonte_id": "poder360", "data_pub": "2026-07-12T17:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma mulher afirmou ter uma filha de 33 anos com Abílio Brunini, prefeito de Cuiabá. O prefeito respondeu ironizando que tinha apenas 9 anos no período em questão.", "titulo_pt": "Prefeito de Cuiabá ironiza alegação de paternidade", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 47965, "titulo": "Novas regras restringem publicidade de bets no Brasil", "url": "https://www.poder360.com.br/poder-justica/novas-regras-restringem-publicidade-de-bets-no-brasil/", "fonte_id": "poder360", "data_pub": "2026-07-12T17:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em 17 de julho, novas regras entraram em vigor no Brasil e proíbem anúncios de bets que sugiram ganhos fáceis ou enriquecimento rápido. Essa medida visa restringir a publicidade desse tipo de serviço.", "titulo_pt": "Novas regras restringem publicidade de apostas no Brasil", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 47938, "titulo": "Com Ibaneis fora da disputa ao Senado, ex-primeira-dama prepara candidatura a federal", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/com-ibaneis-fora-da-disputa-ao-senado-ex-primeira-dama-prepara-candidatura-a-federal.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-12T17:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ibaneis Rocha, ex-governador do Distrito Federal, está fora das eleições para o Senado. Sua esposa, Mayara Noronha Rocha, do Podemos-DF, se prepara para concorrer a uma vaga na Câmara dos Deputados.", "titulo_pt": "Com Ibaneis fora da disputa ao Senado, ex-primeira-dama prepara candidatura a federal", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 48054, "titulo": "‘Brasil quer saber aonde foi parar o dinheiro do Master’: PT diz que carta de Bolsonaro sobre Flávio é manobra para desviar foco", "url": "https://www.brasildefato.com.br/2026/07/12/brasil-quer-saber-aonde-foi-parar-o-dinheiro-do-master-pt-diz-que-carta-de-bolsonaro-sobre-flavio-e-manobra-para-desviar-foco/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-12T17:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O secretário nacional de Comunicação do PT, Éden Valadares, considera que a carta escrita por Jair Bolsonaro, apontando Flávio Bolsonaro como porta-voz, é uma manobra da extrema direita para desviar o foco das preocupações dos brasileiros. O PT afirma que essa ação visa esconder outros assuntos importantes.", "titulo_pt": "PT diz que carta de Bolsonaro sobre Flávio é manobra para desviar foco", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 48414, "titulo": "Taiwan, US not chip competitors, US researcher says", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/13/2003860663", "fonte_id": "taipei_times", "data_pub": "2026-07-13T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um pesquisador dos Estados Unidos afirmou que Taiwan e os EUA não são concorrentes no setor de chips. O estudo aborda a relação comercial entre as duas nações em termos de produção de semicondutores.", "titulo_pt": "Taiwan, EUA não são concorrentes de chips, diz pesquisador americano", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 48416, "titulo": "FDA to adjust food safety measures", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/13/2003860665", "fonte_id": "taipei_times", "data_pub": "2026-07-13T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A FDA (Food and Drug Administration) planeja ajustar suas medidas de segurança alimentar. Essas mudanças visam melhorar a eficácia das atuais políticas de segurança alimentar.", "titulo_pt": "FDA vai ajustar medidas de segurança alimentar", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 48200, "titulo": "Live Updates: Cease-Fire Unraveling as U.S. and Iran Trade Strikes Again", "url": "https://www.nytimes.com/live/2026/07/12/us/iran-war-trump-hormuz", "fonte_id": "nyt_world", "data_pub": "2026-07-12T18:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos realizaram novas ações de ataque neste domingo, continuando uma dinâmica familiar de confrontos recíprocos alimentados por disputas sobre o Estreito de Ormuz.", "titulo_pt": "Atualizações em tempo real: parada de fogo desmontado com novas ações dos EUA e Irã", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 48348, "titulo": "Pope urges diplomacy as US-Iran attacks fuel ‘winds of war’", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/pope-urges-diplomacy-us-iran-attacks-fuel-winds-war", "fonte_id": "middle_east_eye", "data_pub": "2026-07-12T18:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O papa pediu por novas diplomacias diante dos últimos ataques entre EUA e Irã, que aprofundaram a violência no Oriente Médio. Ele alertou que os 'ventos da guerra' estão espalhando violência, terrorismo e morte na região e em outros lugares.", "titulo_pt": "Papa apela por diplomacia diante dos 'ventos da guerra' entre EUA e Irã", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 48310, "titulo": "Hundreds evacuated from Paris suburb after weapons found near synagogue", "url": "https://www.france24.com/en/france/20260712-hundreds-evacuated-from-paris-suburb-after-weapons-found-near-synagogue", "fonte_id": "france24", "data_pub": "2026-07-12T18:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Aproximadamente 300 pessoas foram evacuadas de uma área em Sarcelles, próximo a Paris, após relatos de um veículo suspeito que foi descoberto contendo armas, incluindo 'uma arma de grade militar'. Uma investigação foi aberta pelos procuradores franceses antiterroristas.", "titulo_pt": "Milhares evacuados em bairro perto de Paris após encontrar armas perto de sinagoga", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 48047, "titulo": "Eleições nacionais em Israel serão realizadas em 27 de outubro, diz líder da coalizão", "url": "https://www.infomoney.com.br/mundo/eleicoes-nacionais-em-israel-serao-realizadas-em-27-de-outubro-diz-lider-da-coalizao/", "fonte_id": "infomoney", "data_pub": "2026-07-12T18:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As eleições nacionais em Israel serão realizadas no dia 27 de outubro, conforme anunciado pelo líder da coalizão. A data foi confirmada após o Parlamento israelense votar pela dissolução em maio.", "titulo_pt": "Eleições nacionais em Israel serão realizadas em 27 de outubro, diz líder da coalizão", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 48004, "titulo": "Zelensky anuncia substituição de premiê e promove reforma no governo", "url": "https://www.metropoles.com/mundo/zelensky-premie-reforma-governo", "fonte_id": "metropoles", "data_pub": "2026-07-12T18:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente da Ucrânia, Zelensky, anunciou a substituição do premiê e promoveu reformas no governo. Yuliia Svyrydenko confirmou sua saída do cargo.", "titulo_pt": "Zelensky anuncia substituição de premier e promove reforma no governo", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 48094, "titulo": "Por que alguns países da África recusam ajuda financeira de Trump", "url": "https://www.bbc.com/portuguese/articles/cx2wk5q00ylo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-12T18:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo americano vê a ajuda financeira como algo transacional, enquanto críticos afirmam que os Estados Unidos não oferecem uma troca justa. Alguns países da África recusaram essa ajuda.", "titulo_pt": "Por que alguns países da África rejeitam ajuda financeira de Trump", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 48311, "titulo": "Macron calls for 'constant vigilance' against antisemitism as France honors Alfred Dreyfus", "url": "https://www.france24.com/en/france/20260712-macron-calls-for-constant-vigilance-against-antisemitism-as-france-honors-alfred-dreyfus", "fonte_id": "france24", "data_pub": "2026-07-12T18:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente francês Emmanuel Macron inaugurou uma estátua em homenagem a Alfred Dreyfus, que foi injustamente condenado no século XIX por traição, revelando preconceitos anti-judeus na França. Macron destacou a necessidade de vigilância contínua contra o antisemitismo.", "titulo_pt": "Macron chama para 'vigilância constante' contra antisemitismo em homenagem a Alfred Dreyfus", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 48396, "titulo": "'Paghe basse e troppo caldo', i rider in sciopero a Firenze", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/12/paghe-basse-e-troppo-caldo-i-rider-in-sciopero-a-firenze_9f2eede6-5400-4206-b174-eaab96276f62.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-12T18:25:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Fattorini de Glovo e Deliveroo entraram em greve no dia 15 de julho por causa das baixas remunerações e do clima quente.", "titulo_pt": "Salários baixos e calor excessivo levam entregadores a greve em florença", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 48371, "titulo": "Thousands gather to bid farewell to Qatar’s Father Emir Sheik ?", "url": "https://www.infomoney.com.br/minhas-financas/quanto-custa-nao-planejar-viagem/", "fonte_id": "infomoney", "data_pub": "2026-07-12T18:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Realizar viagens sem planejamento pode resultar em custos maiores. O post original discute os gastos associados a viagens feitas de última hora.", "titulo_pt": "Quanto custa não planejar uma viagem?", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 48063, "titulo": "Canetas emagrecedoras ampliam incertezas para redes de farmácia", "url": "https://www.cnnbrasil.com.br/economia/negocios/canetas-emagrecedoras-ampliam-incertezas-para-redes-de-farmacia/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-12T18:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Canetas emagrecedoras estão aumentando a incerteza no mercado para as redes de farmácias, enquanto mudanças na distribuição e avanço da concorrência pressionam as ações das farmacêuticas. Isso também cria oportunidades para fabricantes.", "titulo_pt": "Canetas emagrecedoras ampliam incertezas para redes de farmácia", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 47921, "titulo": "Obra de megaponte na Bahia começa com pendências em projeto e desafios na engenharia", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/obra-de-megaponte-na-bahia-comeca-com-pendencias-em-projeto-e-desafios-na-engenharia.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-12T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A construção da megaponte Salvador-Itaparica começou oficialmente no litoral de Vera Cruz, Bahia, em julho de 2026. O projeto foi idealizado em 2009 e o contrato foi assinado em 2020, sendo repactuado em 2025 com um consórcio chineses.", "titulo_pt": "Obra da megaponte salvador-itaparica inicia com pendências no projeto e desafios técnicos", "veiculo": "Folha de S.Paulo - a relaxar, sugere estudo", "url": "https://www.metropoles.com/colunas/e-o-bicho/baleias-maes-ficam-de-barriga-para-cima-para-relaxar-sugere-estudo", "fonte_id": "metropoles", "data_pub": "2026-07-12T18:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo com baleias-francas-austrais observou que as fêmeas assumem uma posição invertida para se relaxarem após as funções da maternidade. O comportamento foi identificado como um método de descanso.", "titulo_pt": "Baleias mães ficam de barriga para cima para se relaxarem, sugere estudo", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 48451, "titulo": "We assessed dozens of programs for men who use violence. Here's what we learned", "url": "https://phys.org/news/2026-07-dozens-men-violence.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T18:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A violência doméstica e familiar é um problema grave, declarado como uma crise nacional pelo primeiro-ministro em 2024. Estudos demonstram que a maioria das agressões são cometidas por homens.", "titulo_pt": "Nós avaliamos várias programas para homens que usam violência. Aqui está o que aprendemos.", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48452, "titulo": "Autonomous drones measure volcanic gas clouds, offering clearer eruption warning signs", "url": "https://phys.org/news/2026-07-autonomous-drones-volcanic-gas-clouds.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores da Technische Universität München desenvolveram um novo sistema de medição que usa laser e drones para mapear concentrações de gases volcânicos, incluindo níveis elevados de dióxido de carbono. Essa técnica pode fornecer indicadores importantes para prever erupções vulcânicas.", "titulo_pt": "Drones autônomos medem nuvens de gás vulcânico, oferecendo sinais mais claros de erupção", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48075, "titulo": "Via Láctea pode ser maior do que o estimado, diz estudo", "url": "https://www.cnnbrasil.com.br/ciencia/via-lactea-pode-ser-maior-do-que-o-estimado-diz-estudo/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-12T17:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores utilizaram explosões de raios gama para medir a extensão dos braços espirais da Via Láctea, descobrindo que o galáxia pode ser maior do que se pensava.", "titulo_pt": "Via Láctea pode ser maior do que estimado, diz estudo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 48453, "titulo": "Neil the seal is more than a viral animal. He's become a global folk hero", "url": "https://phys.org/news/2026-07-neil-viral-animal-global-folk.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Neil, um lobo-marinho que vive na cidade de Hobart, tornou-se uma figura globalmente conhecida por seu comportamento selvagem e ações hilárias. Muitos moradores da cidade viajaram até uma praia próxima para assisti-lo.", "titulo_pt": "Neil o lobo-marinho é mais do que um animal viral. Ele se tornou um herói popular global", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48454, "titulo": "Scientists decipher how a psychedelic substance is created, then engineer a plant to produce several at once", "url": "https://phys.org/news/2026-07-scientists-decipher-psychedelic-substance.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores do Instituto Weizmann de Ciência descobriram como produzir cinco substâncias psicodélicas e engenheiraram uma planta que pode produzir todas essas substâncias ao mesmo tempo. Essas substâncias, historicamente usadas em rituais, práticas terapêuticas e tratamento de saúde mental, agora podem ser sintetizadas em um único organismo.", "titulo_pt": "Cientistas decifram a produção de psicodélicos e engenheiram uma planta para produzir várias delas ao mesmo tempo", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48455, "titulo": "Self‑building molecular rings bring next‑generation drug delivery and smart materials closer", "url": "https://phys.org/news/2026-07-selfbuilding-molecular-nextgeneration-drug-delivery.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T16:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Rotaxanes são moléculas em forma de bastão com segmentos interligados, onde um ou mais anéis são passados pela seção linear chamada eixo. Para manter os anéis no lugar, são adicionados grupos volumosos nos extremos do eixo, conhecidos como parafusos.", "titulo_pt": "Anéis auto-construídos aproximam a entrega de medicamentos avançada e materiais inteligentes", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48456, "titulo": "Patterned frozen soils get their shape from gravity and funky physics", "url": "https://phys.org/news/2026-07-patterned-frozen-soils-gravity-funky.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T16:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Hilóspitos nas regiões árticas com solos congelados podem apresentar uma variedade de padrões geométricos, como círculos, listras e terrenos poligonais. Também podem ter padrões de soliflução, que são marcas deixadas quando o permafrost parcialmente derretido escorrega e flui pela ladeira, formando esteps planas e lobos redondos de solo no fundo das etapas.", "titulo_pt": "Padrões congelados nas encostas do ártico formam-se graças à gravidade e a física incomum", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48475, "titulo": "Why space games still struggle with the scale of the universe", "url": "https://www.space.com/entertainment/space-games/why-space-games-still-struggle-with-the-scale-of-the-universe", "fonte_id": "space_com", "data_pub": "2026-07-12T16:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O espaço é grande demais para ser adequadamente representado em jogos espaciais, desafiando desenvolvedores a criar experiências realistas.", "titulo_pt": "Por que os jogos espaciais ainda lutam com a escala do universo", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 48457, "titulo": "In deep oceans, evolution is supercharged. This diversity could help unlock humanity's greatest challenges", "url": "https://phys.org/news/2026-07-deep-oceans-evolution-supercharged-diversity.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T15:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O fundo do oceano, uma das maiores e menos exploradas habitats na Terra, é frio, escuro e sob pressão, mas abriga uma grande quantidade de vida ainda não descoberta. Aqui, a evolução pode ser acelerada, promovendo diversidade biológica que poderia ajudar a enfrentar os desafios mais complexos da humanidade.", "titulo_pt": "Na profundidade do oceano, a evolução é supercargada. Esta diversidade poderia auxiliar os maiores desafios da humanidade", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 47936, "titulo": "Livro recupera história de curandeiras tidas como bruxas durante ascensão da medicina", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/livro-recupera-historia-de-curandeiras-tidas-como-bruxas-durante-ascensao-da-medicina.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-12T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O livro 'Bruxas, Parteiras e Enfermeiras: uma História de Mulheres que Curam', escrito por Deirdre English e Barbara Ehrenreich, resgata a história das curandeiras que foram tidas como bruxas durante o desenvolvimento da medicina moderna até os anos 1960.", "titulo_pt": "Livro recupera história de curandeiras consideradas bruxas na ascensão da medicina", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 48458, "titulo": "Low-cost genome sequencing approach is powering genetics research on mental illness and many other studies", "url": "https://phys.org/news/2026-07-genome-sequencing-approach-powering-genetics.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um método de sequenciamento genômico chamado Blended Genome Exome (BGE) reduziu o custo do sequenciamento genômico em 75%, facilitando estudos genéticos em larga escala sobre doenças, incluindo transtornos mentais. Este método está se tornando uma das abordagens mais utilizadas no Broad Institute.", "titulo_pt": "Abordagem de baixo custo em sequenciamento genômico impulsiona pesquisas genéticas sobre doenças mentais e outros estudos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48459, "titulo": "Gravitational waves reveal hidden populations within black hole mergers", "url": "https://phys.org/news/2026-07-gravitational-reveal-hidden-populations-black.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T14:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Desde a detecção das primeiras ondas gravitacionais em 2015, instrumentos como LIGO, Virgo e KAGRA têm detectado sinais contínuos de buracos negros colidindo, formando uma base de dados composta por centenas desses eventos. No entanto, apesar desta riqueza de informações, permanece um questionamento fundamental: como esses buracos negros se formam.", "titulo_pt": "Ondas gravitacionais revelam populações ocultas em fusões de buracos negros", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48460, "titulo": "Creating synthetic life in a lab? SpudCell falls short of the goal, but raises even more useful questions", "url": "https://phys.org/news/2026-07-synthetic-life-lab-spudcell-falls.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A criação de vida sintética no laboratório, embora não tenha alcançado o objetivo com a SpudCell, levanta questões mais importantes sobre os aspectos benéficos e potencialmente prejudiciais da biologia. Natureza é bela, poderosa e essencial, mas também pode causar danos como infecções, câncer e pragas agrícolas.", "titulo_pt": "Criar vida sintética no laboratório? Spudcell não atinge o objetivo, mas suscita perguntas mais valiosas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48476, "titulo": "149 million views! Artemis II moon mission breaks NASA's streaming record", "url": "https://www.space.com/space-exploration/artemis/149-million-views-artemis-ii-moon-mission-breaks-nasas-streaming-record", "fonte_id": "space_com", "data_pub": "2026-07-12T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A missão Artemis II superou o recorde de streaming da NASA, alcançando 149 milhões de visualizações. Astronautas da missão tiveram um impacto potencial em centenas de milhões de pessoas.", "titulo_pt": "149 Milhões de visualizações! Missão artemis II quebra recorde de streaming da NASA", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 48097, "titulo": "6 palavras de origem japonesa que o brasileiro adotou no vocabulário", "url": "https://www.bbc.com/portuguese/articles/c982neqe70qo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-12T18:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O artigo destaca que existem palavras de origem japonesa no vocabulário brasileiro além do sushi e karatê, embora algumas dessas palavras não tenham uma conexão direta com a língua japonesa.", "titulo_pt": "6 Palavras de origem japonesa adotadas pelo português brasileiro", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 48484, "titulo": "Emerging Directors Need to Be ‘Brave,’ ‘Curious,’ ‘Pushy’ and ‘Fearless,’ Say Industry Leaders Behind Future Frames Program", "url": "https://variety.com/2026/film/global/directors-brave-curious-karlovy-vary-1236806946/", "fonte_id": "variety", "data_pub": "2026-07-12T18:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Durante a 60ª edição do Festival Internacional de Cinema de Karlovy Vary, Variety organizou um painel sobre o programa Future Frames, que apoia diretores emergentes europeus. O painel abordou temas como as qualidades necessárias para os novos diretores.", "titulo_pt": "Diretores emergentes precisam ser 'corajosos', 'curiosos', 'persistentes' e 'incrédulos', dizem líderes do programa Future Frames", "veiculo": "Variety", "pais": "EUA", "classe": "C"}, {"id": 48170, "titulo": "La lección jurídica de Messi", "url": "https://www.clarin.com/opinion/leccion-juridica-messi_0_Fc1psuDFdf.html", "fonte_id": "clarin", "data_pub": "2026-07-12T18:17:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Lionel Messi vence o tempo e o espaço, mas a melhor parte é que ele o faz dentro das regras do jogo, de um modo inusitado para muitos.", "titulo_pt": "A lição jurídica de Messi", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 48065, "titulo": "Do carro do Papa ao Uno do Senna: exposição resgata 50 anos da Fiat", "url": "https://www.cnnbrasil.com.br/auto/do-carro-do-papa-ao-uno-do-senna-exposicao-resgata-50-anos-da-fiat/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-12T18:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A exposição na Casa Fiat de Cultura em Belo Horizonte reúne veículos históricos e conceitos para celebrar 50 anos da fabricante, abrangendo desde o carro do Papa até um Uno pertencente a Ayrton Senna. O evento apresenta a trajetória da empresa desde a inauguração de sua fábrica em Betim até lançamentos futuros.", "titulo_pt": "Do carro do Papa ao Uno do Senna: exposição comemora 50 anos da Fiat", "veicu s", "provavel_duplicata_de": null, "texto_pt": "O ministro do Trabalho, Tomás Rau, destaca as medidas propostas pelo governo para combater a crescente desocupação. Ele enfatiza que é importante olhar para o futuro e não se acusar mutuamente.", "titulo_pt": "Tomás Rau: 'há uma crise de emprego autoinferida há 41 meses, mas chegou o momento de parar de se acusar'", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 47834, "titulo": "‘I’m lonely’: why are 50% of Hong Kong’s elderly socially isolated – and what can help?", "url": "https://www.scmp.com/news/hong-kong/society/article/3360245/im-lonely-why-are-50-hong-kongs-elderly-socially-isolated-and-what-can-help?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-12T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A série de saúde e bem-estar 'Idade em Hong Kong', da primeira parte de cinco, investiga a crescente isolamento social entre os idosos na cidade. Fiona Sun explora os riscos de saúde significativos associados ao isolamento social e como atividades e apoio comunitário ajudam os idosos a manterem-se engajados socialmente.", "titulo_pt": "‘Estou sozinho’: por que 50% dos idosos de Hong Kong estão isolados socialmente – e o que pode ajudar?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 48243, "titulo": "The forgotten success story of America’s teenagers", "url": "https://www.vox.com/future-perfect/495059/america-teenagers-1990s-suicide-teen-pregnancy-drugs-violence", "fonte_id": "vox", "data_pub": "2026-07-12T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A sensação atual é nostálgica, lembrando o ano 1995. Músicas antigas e moda da era Y2K estão retornando de forma inusitada.", "titulo_pt": "A esquecida história de sucesso dos jovens americanos", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 47880, "titulo": "Woman jailed for stalking ex-boyfriend via money transfers, food delivery", "url":  por terremotos que devastaram um projeto habitacional. Antes do desastre, a região era conhecida como um ponto forte do apoio ao regime populista de Hugo Chávez.", "titulo_pt": "Uma revolução em ruínas: fúria no meio dos escombros de um projeto habitacional atingido por terremotos na Venezuela", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 47333, "titulo": "Ageing in Hong Kong - should you fear it?", "url": "https://www.scmp.com/article/3357058/ageing-hong-kong?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-12T04:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A população idosa de Hong Kong está aumentando, e a questão é se isso deve causar preocupação. O artigo discute os desafios e oportunidades associados ao envelhecimento populacional na cidade.", "titulo_pt": "Idade na Hong Kong - você deveria temer?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 48046, "titulo": "China: tufão Bavi enfraquece, mas ainda provoca ventos fortes e chuva", "url": "https://www.infomoney.com.br/mundo/china-tufao-bavi-enfraquece-mas-ainda-provoca-ventos-fortes-e-chuva/", "fonte_id": "infomoney", "data_pub": "2026-07-12T18:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O tufão Bavi enfraqueceu, mas ainda causa ventos fortes e chuva na China. Mais de 2,2 milhões de pessoas foram evacuadas no Zhejiang devido ao tufão.", "titulo_pt": "Tufão Bavi enfraquece, mas ainda provoca ventos fortes e chuva", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 47981, "titulo": "Vídeo: Com ventos de 145 km/h, supertufão Bavi atinge China e força evacuação de 2 milhões", "url": "https://veja.abril.com.br/mundo/video-com-ventos-de-145-km-h-supertufao-bavi-atinge-china-e-forca-evacuacao-de-2-milhoes/", "fonte_id": "veja", "data_pub": "2026-07-12T16:49:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O supertufão Bavi atingiu a China com ventos de até 145 km/h, forçando a evacuação de cerca de 2 milhões de pessoas. Antes de chegar à China, o ciclone causou danos em Filipinas, Japão e Taiwan.", "titulo_pt": "Vídeo: com ventos de 145 km/h, supertufão Bavi atinge China e força evacuação de 2 milhões", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 48020, "titulo": "Espanha anuncia que conteve grande incêndio no sul do país", "url": "https://exame.com/mundo/espanha-anuncia-que-conteve-grande-incendio-no-sul-do-pais/", "fonte_id": "exame", "data_pub": "2026-07-12T15:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um grande incêndio ocorreu no sul da Espanha, forçando mais de 1.500 pessoas a deixarem suas casas. O fogo começou na quinta-feira.", "titulo_pt": "Espanha anuncia que contém grande incêndio no sul do país", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 48306, "titulo": "France powers down several nuclear reactors due to extreme heat", "url": "https://www.lemonde.fr/en/france/article/2026/07/12/france-powers-down-several-nuclear-reactors-due-to-extreme-heat_6755404_7.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-12T15:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Três reatores nucleares foram temporariamente desligados e outros oito operaram a baixa potência devido ao calor extremo, informou a principal fornecedora de energia da França.", "titulo_pt": "França desliga vários reatores nucleares devido ao calor extremo", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 48214, "titulo": "Germany records nearly 100 drowning deaths, many of them young men, in June heatwave", "url": "https://www.theguardian.com/world/2026/jul/12/germany-drowning-deaths-heatwave-paris-france-spain", "fonte_id": "guardian_world", "data_pub": "2026-07-12T15:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Nove pessoas morreram afogadas em junho na Alemanha, o maior número de vítimas desde há mais de 20 anos. As temperaturas extremas registradas no país atingiram picos de até 41,7°C.", "titulo_pt": "Alemanha registra quase 100 mortes por afogamento em junho de verão extremo", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 48308, "titulo": "Pauline Vilain-Carlotti, geographer: 'The intensity of wildfires, which seems unprecedented, could become the new norm'", "url": "https://www.lemonde.fr/en/opinion/article/2026/07/12/pauline-vilain-carlotti-geographer-the-intensity-of-wildfires-which-seems-unprecedented-could-become-the-new-norm_6755401_23.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-12T12:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A especialista em gerenciamento ambiental, Pauline Vilain-Carlotti, afirma em entrevista ao Le Monde que os riscos de incêndios florestais, até agora principalmente limitados à região Mediterrânea, provavelmente aumentarão e se espalharão pela França. Ela considera a intensidade dos incêndios, que parece inédita, como potencialmente se tornando a nova normalidade.", "titulo_pt": "Pauline Vilain-Carlotti, geógrafa: 'a intensidade dos incêndios, que parece sem precedentes, pode se tornar a nova normalidade'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 48242, "titulo": "I care a lot about climate change. Does that mean I can never ever fly?", "url": "https://www.vox.com/future-perfect/395173/climate-change-flying-air-travel-emissions-ethics", "fonte_id": "vox", "data_pub": "2026-07-12T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O autor discute se a preocupação com o clima é compatível com o uso de aviação. O texto original foi publicado em janeiro de 2025 e oferece uma abordagem incomum para pensar em dilemas morais.", "titulo_pt": "Cuido muito do clima. Isso significa que nunca posso viajar de avião?", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 47530, "titulo": "El Niño pode ser o mais forte desde 1950; entenda efeitos no agro", "url": "https://www.cnnbrasil.com.br/agro/el-nino-pode-ser-o-mais-forte-desde-1950-entenda-efeitos-no-agro/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-12T11:37:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O fenômeno El Niño pode ser o mais forte desde 1950, mas seus efeitos não serão uniformes no Brasil. Além disso, esses efeitos devem ser monitorados não apenas localmente, mas também no mercado global.", "titulo_pt": "El Niño pode ser o mais forte desde 1950; entenda os impactos", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 47564, "titulo": "Los terremotos en Venezuela están formando un volcán frente a Trinidad y Tobago", "url": "https://www.clarin.com/internacional/terremotos-venezuela-formando-volcan-frente-trinidad-tobago_0_qhjfyj41pd.html", "fonte_id": "clarin", "data_pub": "2026-07-12T11:03:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um novo terreno subaquático está se elevando devido a terremotos na Venezuela, alcançando cerca de 4 metros acima do fundo marino. Parte do fundo do mar foi empurrada para o nível do mar.", "titulo_pt": "Terremotos na Venezuela estão formando um vulcão próximo a Trinidad e Tobago", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 47892, "titulo": "Typhoon makes landfall in China, downgraded to severe tropical storm", "url": "https://phys.org/news/2026-07-typhoon-landfall-china-downgraded-severe.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T08:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O furacão Bavi foi desclassificado para uma tempestade tropical severa após atingir a costa leste da China, onde as autoridades haviam evacuado quase 2 milhões de pessoas em seu caminho.", "titulo_pt": "Furacão chega ao continente chinês e é desclassificado", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 47490, "titulo": "90% dos projetos renováveis foram mais baratos que usinas fósseis em 2025", "url": "https://exame.com/esg/90-dos-projetos-renovaveis-foram-mais-baratos-que-usinas-fosseis-em-2025/", "fonte_id": "exame", "data_pub": "2026-07-12T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Nos projetos renováveis de 2025, 90% foram mais econômicos do que as usinas fósseis. A energia solar e eólica continuaram com vantagem econômica em novos empreendimentos, enquanto os sistemas com baterias aumentaram sua presença no mercado.", "titulo_pt": "90% Dos projetos renováveis foram mais baratos que usinas fósseis em 2025", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 47471, "titulo": "IA contra o fogo: tecnologia prevê queimadas na Amazônia 14 dias antes", "url": "https://www.metropoles.com/brasil/ia-contra-o-fogo-tecnologia-preve-queimadas-na-amazonia-14-dias-antes", "fonte_id": "metropoles", "data_pub": "2026-07-12T07:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Até agosto, o Instituto Federal do Amazonas implementará um sistema de inteligência artificial (IA) que prevê incêndios florestais na Amazônia 14 dias antes. Este sistema será ativado durante a intensificação da seca no mês de agosto.", "titulo_pt": "IA contra o fogo: tecnologia prevê queimadas na Amazônia 14 dias antes", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 47473, "titulo": "Maior do século: risco de super El Niño cresce e liga alerta no Brasil", "url": "https://www.metropoles.com/brasil/risco-super-el-nino-alerta-brasil", "fonte_id": "metropoles", "data_pub": "2026-07-12T07:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O risco de um super El Niño está aumentando, levantando alerta no Brasil. Este fenômeno pode causar enchentes, tempestades, secas e calor extremo com impactos variados em diferentes regiões do país.", "titulo_pt": "Maior do século: risco de super El Niño cresce e liga alerta no Brasil", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 47881, "titulo": "Poisoned Buam-dong ginkgo tree on brink of death", "url": "https://www.koreaherald.com/article/10806003", "fonte_id": "korea_herald", "data_pub": "2026-07-12T05:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um ginkgo centenário em Buam-dong, Seul, está prestes a morrer após supostamente ser envenenado por um museu vizinho para evitar o bloqueio de vias. Apesar dos esforços para salvá-lo, sua situação permanece crítica.", "titulo_pt": "Ginkgo centenário em Buam-dong ameaçado de morte após suposto envenenamento", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 47890, "titulo": "KMA issues 1st heat wave emergency warning in southeastern region", "url": "https://www.koreaherald.com/article/10805977", "fonte_id": "korea_herald", "data_pub": "2026-07-12T04:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Administração Meteorológica da Coreia emitiu uma advertência de onda de calor emergencial para Gyeongsan e Pohang, na província nordeste de Gyeongsang, às 10h do domingo. Esta é a primeira vez que o nível mais alto de alerta é usado desde que o sistema de advertências de calor foi revisado em junho.", "titulo_pt": "KMA emite primeiro aviso emergencial de onda de calor para região sudeste", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 47355, "titulo": "1st 'grave' heat wave warnings issued for Gyeongsan, Pohang", "url": "https://www.koreaherald.com/article/10805967", "fonte_id": "korea_herald", "data_pub": "2026-07-12T04:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Coreia do Sul emitiu pela primeira vez avisos de 'grave calor' para as cidades sulistas de Gyeongsan e Pohang, sob um novo sistema de alerta mais alto introduzido há um mês. As temperaturas chegaram a 39,9°C em Gyeongsan e 37,2°C em Pohang no dia anterior, levando à ativação dos avisos.", "titulo_pt": "1ª advertência 'grave' de cal ver for me': Senegal's LGBTQ+ community lives in daily fear of repression", "url": "https://www.lemonde.fr/en/international/article/2026/07/12/if-they-catch-me-it-s-over-for-me-senegal-s-lgbtq-community-lives-in-daily-fear-of-repression_6755411_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-12T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em março, Senegal aprovou uma lei que aumenta as penas para relações entre pessoas do mesmo sexo, causando medo constante à comunidade LGBTQ+. Muitos membros dessa comunidade relataram viver com grande incerteza e ansiedade sobre possíveis prisões.", "titulo_pt": "Se eles me pegarem, está tudo perdido para mim: a comunidade LGBTQ+ de senegal vive em temor diário de repressão", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 48434, "titulo": "Israeli gunfire in Gaza refugee camp kills 6, including 9-year-old girl", "url": "https://www.scmp.com/news/world/middle-east/article/3360294/israeli-gunfire-gaza-refugee-camp-kills-6-including-9-year-old-girl?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-12T15:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Israeli ataques causaram pelo menos seis mortes no Gaza Strip, incluindo uma menina de 9 anos, segundo autoridades palestinas. Um tiroteio israelense atingiu um acampamento em tendas na aldeia refugiada Al-Bureij, enquanto um ataque aéreo em uma fábrica metálica no bairro Sabra de Gaza City também resultou em mortes.", "titulo_pt": "Tiroteios israelenses em campo de refugiados do Gaza causam seis mortes, incluindo uma menina de 9 anos", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 48469, "titulo": "UNICEF calls for urgent action as peak wasting season nears and child food and nutrition insecurity puts 3.7 million children in Afghanistan at heightened risk of malnutrition", "url": "https://www.unicef.org/press-releases/unicef-calls-urgent-action-peak-wastin
