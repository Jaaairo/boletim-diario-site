<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>
</head>

<script>
const D = {"gerado_em": "20/06/2026 18:26", "stats": {"noticias_total": 8101, "resumos_total": 1274, "sem_topico": 0, "ultima_coleta": "2026-06-20T20:41:06Z"}, "rotulos_topico": {"politica_nacional": "Política Nacional", "politica_internacional": "Política Internacional", "cultura": "Cultura", "ciencia_tecnologia": "Ciência & Tecnologia"}, "topicos": ["politica_nacional", "politica_internacional", "cultura", "ciencia_tecnologia"], "sinteses": {"ciencia_tecnologia": "O bloqueio orçamentário de R$ 300 milhões no CNPq, equivalente a 15% do seu orçamento para este ano, pode afetar aproximadamente 80% dos 102 mil bolsistas da fundação nos próximos meses. Paralelamente, pesquisadores estão investigando indivíduos raros que parecem ter resistência natural ao HIV, buscando entender como seus corpos combatem o vírus para desenvolver novas terapias. A empresa Astrobotic decidiu vender para a Voyager Technologies com o objetivo de escalonar rapidamente suas operações para atender à demanda projetada pela iniciativa lunar da NASA.  Em outro campo, especialistas debatem se medicamentos para perda de peso GLP-1s podem ser considerados doping após facilitarem o retorno de Serena Williams ao tênis. Enquanto isso, Salome Mikadze-Struk, filha de refugiados, fundou uma empresa de desenvolvimento de software durante a pandemia de COVID-19 e manteve o negócio funcionando mesmo com o início da guerra na Ucrânia. Agora, ela usa suas experiências para mentorar fundadores de startups de tecnologia e falar sobre a importância da resiliência no empreendedorismo.", "cultura": "A cidade de Paris se prepara para receber mais de dois milhões de pessoas na tradicional Festa da Música francesa, que já dura mais de 40 anos e é considerada a maior manifestação cultural do país. A festa acontecerá neste domingo, com medidas de segurança reforçadas devido ao grande número de participantes vindos do Reino Unido e às previsões de temperaturas recorde. Enquanto isso, o mundo da cultura se movimenta em diversos outros fronts.  A artista Juçara Marçal está sendo destaque em diversas publicações, com foco em como sua recusa à repetição se tornou um elemento fundamental em sua obra. O cineasta László Nemes afirma que o cinema não deveria ser usado como ferramenta política, e seu novo filme 'O Órfão', disponível na Mubi, aborda a busca de uma criança pelo pai desaparecido durante o Holocausto.  A revista literária Granta decidiu não mais publicar os vencedores do prêmio Commonwealth de contos após acusações generalizadas de uso de inteligência artificial. A autora Candice Carty-Williams discute a possibilidade de abandonar a adaptação para TV do seu primeiro romance e explica por que considera o momento ideal para escrever um segundo livro.  No mundo da moda, a Dolce & Gabbana apresentou um desfile masculino em Milão que enfatizou a estética 'molto sexy' da marca com roupas extravagantes e, às vezes, reveladoras. Ralph Lauren voltou a usar gravatas em seu desfile solo de menswear em Milão, o acessório que lançou seu império em 1967. A série Killing Eve trouxe reconhecimento para a atriz Sandra Oh, que falou sobre como encontrou seu ritmo na carreira e como o sucesso da série mudou tudo.", "politica_internacional": "O Irã anunciou o fechamento do Estreito de Hormuz em resposta aos bombardeios israelenses no Líbano, alegando que os ataques violam um acordo entre Teerã e os Estados Unidos para encerrar a guerra. O exército israelense matou 25 pessoas no Líbano, apesar do anúncio de cessar-fogo. A decisão iraniana aumenta as tensões na região e ameaça o fluxo de navios pelo estreito, uma via vital para o transporte de petróleo.  Em outro conflito internacional, o presidente ucraniano Volodymyr Zelensky retornou a Ordem da Águia Branca, a maior honraria da Polônia, em meio a um desacordo com Varsóvia que remonta à Segunda Guerra Mundial. Zelensky pediu à Polônia para mostrar mais respeito na relação bilateral. Enquanto isso, os Estados Unidos e Irã continuam negociando um acordo de paz, apesar das tensões recentes. O enviado especial dos EUA para o Irã, Robert Malley, partiu para a Suíça para se reunir com representantes iranianos e discutir o acordo nuclear de 2015.  Em outros eventos internacionais, a esposa do primeiro-ministro espanhol enfrenta um julgamento por corrupção, enquanto um tribunal em Madrid decidiu que há evidências suficientes contra Begoña Gómez. Na Albânia, protestos contra a corrupção do governo se intensificaram após uma proposta de desenvolvimento imobiliário por Jared Kushner. Os manifestantes exigem a renúncia do primeiro-ministro Edi Rama e o fim da corrupção.", "politica_nacional": "Uma pesquisa Datafolha divulgada pela Folha de S. Paulo mostra que 38% dos brasileiros avaliam o governo do presidente Lula como ruim ou péssimo, enquanto 32% consideram ótimo ou bom.  A pesquisa também indica que 1% dos entrevistados não soube ou não quis responder. A avaliação se manteve estável em relação à pesquisa anterior, realizada em maio.  O caso 'Dark Horse', as investigações do Banco Master no campo petista e a atuação da máquina do governo influenciam as campanhas de Lula e Flávio Bolsonaro, que estão se posicionando como candidatos para um possível segundo turno das eleições. O senador Flávio Bolsonaro afirmou que não queria ser candidato em 2026, mas que recebeu uma 'missão' do pai, Jair Bolsonaro. Durante um evento em Guarulhos, ele usou o slogan 'Esperança vai vencer o medo'. A campanha de Flávio busca se diferenciar do presidente Lula nesse tema, especialmente em relação à segurança pública, como evidenciado durante um evento em São Paulo onde Flávio enfatizou promessas nesse setor.  A Polícia Federal abriu uma investigação preliminar para apurar o envio de alertas extremos falsos por uma plataforma da Defesa Civil. Segundo a PF, a plataforma sofreu uma invasão e notificações falsas foram enviadas para celulares em pelo menos sete estados na madrugada deste sábado. O secretário nacional de Proteção e Defesa Civil, Wolnei Wolff, afirmou que 10 alertas extremos falsos foram disparados e acredita que o ataque tenha origem em um ataque hacker. Uma invasão hacker na plataforma de alertas da Defesa Civil Nacional resultou na distribuição de uma mensagem estranha para usuários na noite de sexta-feira, 20/06.  O Tribunal Superior Eleitoral (TSE) firmou um acordo com os partidos políticos para assegurar o cumprimento das cotas destinadas a mulheres, pessoas negras e indígenas nas candidaturas."}, "resumo_do_dia": {"politica_nacional": [{"id": 7644, "titulo": "Datafolha: 38% avaliam governo Lula como ruim ou péssimo; para 32%, é ótimo ou bom", "url": "https://g1.globo.com/politica/eleicoes/2026/pesquisa-eleitoral/noticia/2026/06/20/datafolha-avaliacao-lula-junho.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T20:33:00Z", "idioma": "pt", "texto_pt": "Uma pesquisa Datafolha divulgada pelo jornal Folha de S.Paulo mostra que 38% dos brasileiros avaliam o governo do presidente Lula como ruim ou péssimo.  32% consideram o governo ótimo ou bom, enquanto 29% o classificam como regular. As avaliações se mantiveram estáveis em relação à pesquisa anterior, realizada em maio.", "titulo_pt": "Datafolha: 38% avaliam governo Lula como ruim ou péssimo; para 32%, é ótimo ou bom", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 7625, "titulo": "Datafolha: Aliados de Flávio esperam melhora após efeito Jaques Wagner; campanha de Lula minimiza", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/datafolha-aliados-de-flavio-esperam-melhora-apos-efeito-jaques-wagner-campanha-de-lula-minimiza.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-20T20:00:00Z", "idioma": "pt", "texto_pt": "Aliados de Flávio Bolsonaro acreditam que a diferença entre ele e Lula, segundo pesquisas do Datafolha, pode ser superada com o início da campanha. Eles esperam também que os efeitos da operação da PF contra Jaques Wagner melhorem o desempenho bolsonarista em futuras pesquisas.", "titulo_pt": "Datafolha: Aliados de Flávio Bolsonaro esperam melhora após efeito Jaques Wagner; campanha de Lula minimiza", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 7626, "titulo": "Datafolha: Avaliação negativa do governo Lula se mantém em 38%, e positiva, 32%", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/datafolha-avaliacao-negativa-do-governo-lula-se-mantem-em-38-e-positiva-32.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-20T20:00:00Z", "idioma": "pt", "texto_pt": "Uma nova pesquisa Datafolha mostra que 38% dos eleitores brasileiros avaliam negativamente o trabalho do presidente Lula.  32% consideram a gestão positiva e 29% classificam como regular. A pesquisa foi divulgada em 20 de junho de 2026.", "titulo_pt": "Datafolha: Avaliação negativa do governo Lula se mantém em 38%, e positiva, 32%", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 7627, "titulo": "O novo PowerPoint do Master", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/celso-rocha-de-barros/2026/06/o-novo-powerpoint-do-master.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-20T20:00:00Z", "idioma": "pt", "texto_pt": "A operação contra o líder do governo no Senado, Jaques Wagner (PT-BA), é vista como uma oportunidade para revisar as informações sobre o caso Master.  Mais detalhes serão divulgados em 06/20/2026 às 17h00.", "titulo_pt": "O Novo PowerPoint do Caso Master", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 7628, "titulo": "Com pai feito por IA em evento, Flávio promete ser radical na segurança pública", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/com-pai-feito-por-ia-no-palco-flavio-promete-ser-radical-na-seguranca-publica.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-20T19:26:00Z", "idioma": "pt", "texto_pt": "O senador Flávio Bolsonaro enfatizou promessas de segurança pública durante um evento em São Paulo. Ele busca se diferenciar do presidente Lula nesse tema. O evento foi para o lançamento da pré-candidatura ao Senado do deputado estadual André do Prado.", "titulo_pt": "Flávio Bolsonaro promete medidas radicais na segurança pública", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 7645, "titulo": "Gasolina com 32% de etanol será aprovada na quarta-feira (24), diz Alckmin", "url": "https://g1.globo.com/mt/mato-grosso/noticia/2026/06/20/gasolina-com-32percent-de-etanol-sera-aprovado-na-quarta-feira-24-diz-alckmin.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T19:05:00Z", "idioma": "pt", "texto_pt": "O Conselho Nacional de Política Energética (CNPE) aprovará a mistura de 32% de etanol na gasolina (E32) a partir de 24 de agosto. O vice-presidente Geraldo Alckmin anunciou a medida durante visita a Mato Grosso e afirmou que o aumento deve reduzir o preço da gasolina, além de trazer benefícios ambientais e impulsionar o setor agroindustrial brasileiro.", "titulo_pt": "Gasolina com 32% de etanol será aprovada quarta-feira, diz Alckmin", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 7646, "titulo": "Zema mira segundo turno com 'união' da direita e fala sobre indicações de Lula ao STF em entrevista", "url": "https://g1.globo.com/ms/mato-grosso-do-sul/noticia/2026/06/20/zema-mira-segundo-turno-com-uniao-da-direita-e-fala-sobre-indicacoes-de-lula-ao-stf-em-entrevista.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T18:17:00Z", "idioma": "pt", "texto_pt": "Romeu Zema criticou Flávio Bolsonaro após vazamento de áudios com Daniel Vorcaro. Zema afirmou que mantém a crítica feita anteriormente sobre o relacionamento entre Flávio Bolsonaro e Daniel Vorcaro durante uma entrevista no podcast Cortadas do Firmino.", "titulo_pt": "Zema mira segundo turno com 'união' da direita e fala sobre indicações de Lula ao STF em entrevista", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 7647, "titulo": "Flávio Bolsonaro elogia Neymar e critica Lula após brincadeira sobre home office: 'Presidente turista'", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/06/20/flavio-bolsonaro-elogia-neymar-e-critica-lula-apos-brincadeira-sobre-home-office-presidente-turista.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T18:10:00Z", "idioma": "pt", "texto_pt": "O senador Flávio Bolsonaro criticou uma fala do presidente Lula que ironizou a ausência de Neymar em jogos da Seleção Brasileira. Lula, durante um discurso, afirmou que Neymar é 'o primeiro convocado home office do mundo'.  Flávio Bolsonaro chamou Lula de 'presidente turista'.", "titulo_pt": "Flávio Bolsonaro elogia Neymar e critica Lula após brincadeira sobre home office: 'Presidente turista'", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 7629, "titulo": "86% dos projetos apresentados no Congresso restringem liberdade econômica, diz estudo", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/86-dos-projetos-apresentados-no-congresso-restringem-liberdade-economica-diz-estudo.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-20T18:00:00Z", "idioma": "pt", "texto_pt": "Um estudo do Índice Legislativo de Liberdade Econômica aponta que 86% dos projetos apresentados ao Congresso Nacional em 2025 restringiam a liberdade econômica. O estudo foi realizado pelo Ranking dos Políticos em parceria com o Centro Mackenzie de Liberdade Econômica e com o Fé & Trabalho.", "titulo_pt": "86% dos projetos no Congresso restringem liberdade econômica, diz estudo", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 7648, "titulo": "Flávio diz que é candidato a presidente porque 'missão foi dada' e usa slogan de Lula: 'Esperança vai vencer o medo'", "url": "https://g1.globo.com/sp/sao-paulo/eleicoes/2026/noticia/2026/06/20/flavio-volta-adotar-bandeiras-e-slongan-de-lula-e-diz-que-vai-acabar-com-a-fome-a-esperanca-vai-vencer-o-medo-esse-ano.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T17:21:00Z", "idioma": "pt", "texto_pt": "O pré-candidato à Presidência Flávio Bolsonaro afirmou que não queria ser candidato em 2026, mas que recebeu uma 'missão' do pai, Jair Bolsonaro. Durante um evento em Guarulhos, ele usou o slogan", "titulo_pt": "Flávio Bolsonaro diz que é candidato porque 'missão foi dada' e usa slogan de Lula", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 7797, "titulo": "INSS: termina neste sábado prazo para contestar descontos indevidos", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/inss-termina-neste-sabado-prazo-para-contestar-descontos-indevidos", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-20T16:29:00Z", "idioma": "pt", "texto_pt": "O prazo para aposentados e pensionistas do INSS contestarem a cobrança de mensalidades associativas sem autorização termina neste sábado (20). A contestação é obrigatória para que os beneficiários possam aderir ao acordo extrajudicial proposto pelo governo federal para agilizar a restituição dos valores descontados ilegalmente.", "titulo_pt": "INSS: prazo para contestar descontos indevidos termina neste sábado", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 7649, "titulo": "PF abre investigação preliminar para apurar alertas falsos enviados por sistema da Defesa Civil", "url": "https://g1.globo.com/politica/noticia/2026/06/20/pf-abre-investigacao-preliminar-para-apurar-alertas-extremos-enviados-por-sistema-da-defesa-civil.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T16:18:00Z", "idioma": "pt", "texto_pt": "A Polícia Federal abriu uma investigação preliminar para apurar o envio de alertas extremos falsos por uma plataforma da Defesa Civil.  Segundo a PF, a plataforma sofreu uma invasão e notificações falsas foram enviadas para celulares em pelo menos sete estados na madrugada deste sábado.", "titulo_pt": "PF investiga alertas falsos enviados por sistema da Defesa Civil", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 7650, "titulo": "Datafolha: apoio de Trump a um candidato à Presidência do Brasil não faria diferença para 65% dos eleitores", "url": "https://g1.globo.com/politica/eleicoes/2026/pesquisa-eleitoral/noticia/2026/06/20/datafolha-apoio-donald-trump-candidato-presidencia-nao-faria-diferenca-65-eleitores.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T15:49:00Z", "idioma": "pt", "texto_pt": "Uma pesquisa Datafolha indica que 65% dos eleitores brasileiros considerariam indiferente um apoio do presidente americano Donald Trump a um candidato nas eleições presidenciais de 2026.  17% dos entrevistados afirmaram que o endosso aumentaria a vontade de votar no candidato, enquanto 15% disseram que diminuiria a intenção de voto.", "titulo_pt": "Datafolha: Apoio de Trump a Candidato à Presidência Não Influenciaria 65% dos Eleitores", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 7651, "titulo": "Datafolha 2º turno: Lula tem 47%, e Flávio Bolsonaro, 43%", "url": "https://g1.globo.com/politica/eleicoes/2026/pesquisa-eleitoral/noticia/2026/06/20/datafolha-2o-turno-lula-tem-47-e-flavio-bolsonaro-43.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T15:05:00Z", "idioma": "pt", "texto_pt": "Uma nova pesquisa Datafolha mostra que Lula teria 47% dos votos e Flávio Bolsonaro 43% em um eventual segundo turno das eleições. Os resultados são os mesmos de uma pesquisa realizada há um mês. O levantamento também indica que 1% dos entrevistados não soube ou não quis responder.", "titulo_pt": "Datafolha: Lula tem 47%, e Flávio Bolsonaro, 43% no 2º turno", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 7652, "titulo": "Datafolha: Lula lidera com 41% no 1º turno, e Flávio Bolsonaro tem 31%", "url": "https://g1.globo.com/politica/eleicoes/2026/pesquisa-eleitoral/noticia/2026/06/20/datafolha-lula-tem-41percent-e-flavio-bolsonaro-31percent-das-intencoes-de-voto-no-1o-turno.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T15:04:00Z", "idioma": "pt", "texto_pt": "A pesquisa Datafolha mostra que Lula lidera as intenções de voto para o primeiro turno com 41%, seguido por Flávio Bolsonaro com 31%. O levantamento anterior também indicava Lula na liderança, com 40% das intenções de voto, e Flávio Bolsonaro com 31%.", "titulo_pt": "Datafolha: Lula lidera com 41% no primeiro turno, Flávio Bolsonaro tem 31%", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 7630, "titulo": "Três Poderes: big techs são as vencedoras da semana; Wagner, o perdedor", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/tres-poderes-big-techs-sao-as-vencedoras-da-semana-wagner-o-perdedor.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-20T15:00:00Z", "idioma": "pt", "texto_pt": "As grandes empresas de tecnologia (big techs) foram beneficiadas por uma decisão do Supremo Tribunal Federal (STF) que permite a remoção de conteúdo caso haja dúvida razoável sobre a necessidade de mantê-lo online. O grupo Wagner foi considerado o perdedor da semana.", "titulo_pt": "Três Poderes: Big techs vencem a semana; Wagner, o perdedor", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}], "politica_internacional": [{"id": 7639, "titulo": "Trump sugere que EUA podem cobrar pedágio no estreito de Hormuz", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/trump-sugere-que-eua-podem-cobrar-pedagio-no-estreito-de-hormuz.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-20T20:39:00Z", "idioma": "pt", "texto_pt": "Donald Trump sugeriu que os Estados Unidos poderiam cobrar um pedágio de passagem pelo estreito de Hormuz se não houver acordo com o Irã nas negociações de paz. A sugestão foi feita neste sábado (20). As negociações entre os dois países estão em andamento.", "titulo_pt": "Trump sugere que EUA podem cobrar pedágio no Estreito de Hormuz", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 7960, "titulo": "DOJ memo stokes fear among disability advocates of a return to institutionalization", "url": "https://www.npr.org/2026/06/20/nx-s1-5865100/doj-memo-trump-disability-civil-rights-institutionalization", "fonte_id": "npr_news", "data_pub": "2026-06-20T20:33:00Z", "idioma": "en", "texto_pt": "Um memorando do Departamento de Justiça desafia as proteções aos direitos civis que há muito tratam a institucionalização de americanos com deficiência como último recurso.  Defensores de pessoas com deficiência temem que o memorando possa levar a um aumento na institucionalização e uma redução dos serviços comunitários.", "titulo_pt": "Memorando do DOJ aumenta o medo entre defensores de pessoas com deficiência de um retorno à institucionalização", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 8004, "titulo": "Vance parte per la Svizzera per i colloqui con l'Iran", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/20/vance-parte-per-la-svizzera-per-i-colloqui-con-liran_a48e85c4-31c6-43c4-8c0c-dbf13ddd1d9e.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-20T20:33:00Z", "idioma": "it", "texto_pt": "O enviado especial dos EUA para o Irã, Robert Malley, partiu para a Suíça.  Malley se reunirá com representantes iranianos para discutir o acordo nuclear de 2015. O anúncio foi feito pelo grupo de jornalistas que acompanha Malley.", "titulo_pt": "Vance viaja para a Suíça para conversas com o Irã", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 7938, "titulo": "Pauline Hanson’s stance on paid parental leave and childcare could turn clock back by decades, economists warn", "url": "https://www.theguardian.com/australia-news/2026/jun/21/pauline-hanson-women-working-mothers-paid-parental-leave-childcare-income-gender-gap-economy-one-nation-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-06-20T20:00:00Z", "idioma": "en", "texto_pt": "Economistas alertaram que o One Nation pode reverter décadas de avanços para mães trabalhadoras, prejudicar a produtividade e piorar a desigualdade de gênero. Durante um discurso no National Press Club, Pauline Hanson sugeriu que mulheres não deveriam receber pagamento dos empregadores durante a licença maternidade e mencionou mudanças potenciais no sistema de creche.", "titulo_pt": "Posição de Pauline Hanson sobre licença parental remunerada e creche pode retroceder décadas, alertam economistas", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 7817, "titulo": "Última hora de la guerra de Estados Unidos e Israel contra Irán, en directo | Vance asegura que las conversaciones de paz con Irán siguen abiertas: “Las cosas va bien”", "url": "https://elpais.com/internacional/2026-06-20/ultima-hora-de-la-guerra-de-estados-unidos-e-israel-contra-iran-en-directo.html", "fonte_id": "elpais_america", "data_pub": "2026-06-20T19:53:00Z", "idioma": "es", "texto_pt": "O ministro das Relações Exteriores do Irã viaja para a Suíça para exigir dos EUA o cumprimento do acordo de paz. Teerã anunciou o fechamento do Estreito de Ormuz devido aos ataques contra o Líbano.", "titulo_pt": "Última hora da guerra entre Estados Unidos e Israel contra o Irã, ao vivo | Vance afirma que conversas de paz com o Irã continuam abertas: 'As coisas estão indo bem'", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 7819, "titulo": "Países Bajos saca el mazo contra Suecia, se libera y, al fin, se divierte", "url": "https://elpais.com/deportes/mundial-futbol/2026-06-20/paises-bajos-saca-el-mazo-contra-suecia-se-libera-y-al-fin-se-divierte.html", "fonte_id": "elpais_america", "data_pub": "2026-06-20T19:52:00Z", "idioma": "es", "texto_pt": "A Holanda derrotou a Suécia com dois gols de Brobbey e Gakpo. A seleção holandesa jogou bem e marcou os gols no primeiro tempo. A Suécia demorou para entrar no jogo.", "titulo_pt": "Holanda vence a Suécia, se liberta e finalmente se diverte", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 7640, "titulo": "Equador transforma emergência em forma de governo sob Daniel Noboa", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/colunas/sylvia-colombo/2026/06/equador-transforma-emergencia-em-forma-de-governo-sob-daniel-noboa.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-20T19:50:00Z", "idioma": "pt", "texto_pt": "O presidente do Equador, Daniel Noboa, possui 45,9% de aprovação, segundo pesquisa da agência Comunicaliza.  A emergência deixou de ser apenas uma resposta a crises e passou a se transformar em forma de governo na América Latina.", "titulo_pt": "Equador transforma emergência em forma de governo sob Daniel Noboa", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 7821, "titulo": "Milei contra todos en la defensa de su jefe de Gabinete, evasor y sospechoso de corrupción", "url": "https://elpais.com/argentina/2026-06-20/milei-contra-todos-en-la-defensa-de-su-jefe-de-gabinete-evasor-y-sospechoso-de-corrupcion.html", "fonte_id": "elpais_america", "data_pub": "2026-06-20T19:23:00Z", "idioma": "es", "texto_pt": "O presidente argentino Javier Milei mantém Manuel Adorni no cargo de chefe de gabinete, apesar das acusações de evasão fiscal e corrupção.  Adorni foi destituído da função de porta-voz.", "titulo_pt": "Milei se defende do chefe de gabinete, acusado de evasão e corrupção", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 7905, "titulo": "Wife of Spanish Prime Minister to Stand Trial for Corruption", "url": "https://www.nytimes.com/2026/06/20/world/europe/gomez-spain-trial-corruption.html", "fonte_id": "nyt_world", "data_pub": "2026-06-20T19:11:00Z", "idioma": "en", "texto_pt": "Begoña Gómez, esposa do Primeiro Ministro espanhol, enfrenta acusações de peculato, corrupção, desvio de fundos e favorecimento para ajudar empresas favoritas a vencer contratos públicos.", "titulo_pt": "Esposa do Primeiro Ministro Espanhol será julgada por corrupção", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 7981, "titulo": "Terror police probe suspected anti-Muslim attacks in Edinburgh", "url": "https://www.dw.com/en/terror-police-probe-suspected-anti-muslim-attacks-in-edinburgh/a-77639385?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-20T18:59:00Z", "idioma": "en", "texto_pt": "Cinco homens ficaram feridos após uma série de ataques violentos na capital escocesa. A polícia antiterrorismo assumiu o caso para investigar as motivações dos ataques.", "titulo_pt": "Polícia antiterrorista investiga suspeitas de ataques anti-muçulmanos em Edimburgo", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 7982, "titulo": "Are Ukraine drones really exposing gaps in Russia's defense?", "url": "https://www.dw.com/en/are-ukraine-drones-really-exposing-gaps-in-russia-s-defense/a-77639467?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-20T18:56:00Z", "idioma": "en", "texto_pt": "As defesas aéreas russas, antes consideradas quase impenetráveis, agora estão sob crescente pressão por drones ucranianos. Um recente ataque a Moscou reacendeu o debate sobre as vulnerabilidades russas.", "titulo_pt": "Drones ucranianos realmente estão expondo falhas na defesa russa?", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 7970, "titulo": "A deal in 'dire straits'? Israel's former Prime Minister Ehud Olmert talks to France 24", "url": "https://www.france24.com/en/tv-shows/spotlight/20260620-a-deal-in-dire-straits-israel-s-former-prime-minister-ehud-olmert-talks-to-france-24", "fonte_id": "france24", "data_pub": "2026-06-20T18:55:00Z", "idioma": "en", "texto_pt": "Elementos do acordo de paz entre os Estados Unidos e Irã parecem estar se desfazendo. Teerã anunciou o fechamento do Estreito de Ormuz, apesar de uma cláusula no acordo garantir a passagem segura de navios comerciais.", "titulo_pt": "Um acordo em 'situação delicada'? Ex-primeiro-ministro israelense Ehud Olmert fala à France 24", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 8005, "titulo": "23enne investita da un'auto, ragazzo gira video e ride 'è morta'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/20/23enne-investita-da-unauto-ragazzo-gira-video-e-ride-e-morta_c54547e6-16de-4a7b-b1d6-ef3b4e6769c0.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-20T18:45:00Z", "idioma": "it", "texto_pt": "Uma mulher de 23 anos foi atropelada por um carro. O motorista, uma jovem recém-habilitada, foi denunciada por homicídio doloso. Um homem filmou o ocorrido e riu ao dizer 'ela morreu' no vídeo.", "titulo_pt": "Mulher de 23 anos atropelada por carro, rapaz filma e ri 'ela morreu'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 7963, "titulo": "Iran says Strait of Hormuz will be closed over Israel attacks on Lebanon", "url": "https://www.bbc.com/news/articles/cwyekkwm1mmo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-20T18:39:00Z", "idioma": "en", "texto_pt": "O Irã afirmou que os ataques contínuos de Israel no Líbano violam o acordo entre Teerã e os EUA para encerrar a guerra. O Irã anunciou que fechara o Estreito de Hormuz como resposta aos ataques israelenses.", "titulo_pt": "Irã diz que fechará Estreito de Ormuz por ataques de Israel ao Líbano", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 7808, "titulo": "Irã acusa EUA e Israel de violar novo acordo de cessar-fogo e anuncia fechamento do estreito de Ormuz", "url": "https://www.bbc.com/portuguese/articles/czxqwn510wvo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-20T18:38:00Z", "idioma": "pt", "texto_pt": "O governo iraniano afirmou que os Estados Unidos cometeram uma 'violação flagrante' de sua promessa de encerrar a guerra. O Irã também anunciou o fechamento do Estreito de Ormuz. Os EUA negaram que o Irã tenha fechado o estreito.", "titulo_pt": "Irã acusa EUA e Israel de violar novo acordo de cessar-fogo e anuncia fechamento do Estreito de Ormuz", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 8017, "titulo": "Zelenskyy returns Polish state medal in escalating dispute with ally", "url": "https://www.ft.com/content/e19012a8-d5ee-472f-a319-12c1a5f64a4a", "fonte_id": "financial_times", "data_pub": "2026-06-20T18:33:00Z", "idioma": "en", "texto_pt": "O presidente ucraniano, Volodymyr Zelensky, retornou uma medalha estatal polonesa ao governo de Varsóvia. A ação ocorre em meio a um desacordo entre Ucrânia e Polônia que remonta à Segunda Guerra Mundial. Zelensky pediu à Polônia para mostrar mais respeito na relação bilateral.", "titulo_pt": "Zelensky retorna medalha estatal polonesa em disputa crescente com aliado", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}], "cultura": [{"id": 7634, "titulo": "'A Casa do Dragão' e Larry David: o que ver na TV e no streaming nesta semana", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/a-casa-do-dragao-e-larry-david-o-que-ver-na-tv-e-no-streaming-nesta-semana.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-20T20:00:00Z", "idioma": "pt", "texto_pt": "A terceira temporada de 'A Casa do Dragão' estreia. A guerra chamada Dança dos Dragões se torna mais violenta e devastadora, espalhando-se por diferentes regiões de Westeros. Além disso, há novos lançamentos para assistir na TV e no streaming.", "titulo_pt": "'A Casa do Dragão' e Larry David: o que assistir na TV e no streaming esta semana", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 7939, "titulo": "Nothing succeeds like excess at Dolce & Gabbana’s Milan menswear show", "url": "https://www.theguardian.com/fashion/2026/jun/20/nothing-succeeds-like-excess-at-dolce-gabbanas-milan-menswear-show", "fonte_id": "guardian_world", "data_pub": "2026-06-20T18:55:00Z", "idioma": "en", "texto_pt": "A Dolce & Gabbana apresentou um desfile masculino em Milão que enfatizou a estética 'molto sexy' da marca com roupas extravagantes e, às vezes, reveladoras. O desfile contou com peças como coletes justos e shorts minúsculos, criando uma atmosfera de verão europeu amplificada.", "titulo_pt": "Nada Prevalece como o Excesso no Desfile Masculino da Dolce & Gabbana em Milão", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 7635, "titulo": "Rio de Janeiro cria o Dia de Machado de Assis, em 21 de junho", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/rio-de-janeiro-cria-o-dia-de-machado-de-assis-em-21-de-junho.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-20T18:00:00Z", "idioma": "pt", "texto_pt": "O Rio de Janeiro celebra pela primeira vez o Dia de Machado de Assis, instituído pela prefeitura da cidade. A data foi criada para reconhecer a capacidade do escritor de retratar a sociedade brasileira e carioca de seu tempo.", "titulo_pt": "Rio de Janeiro cria o Dia de Machado de Assis, em 21 de junho", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 7636, "titulo": "Personagens cativantes explicam sucesso de 'Toy Story' ao longo das décadas", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/personagens-cativantes-explicam-sucesso-de-toy-story-ao-longo-das-decadas.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-20T18:00:00Z", "idioma": "pt", "texto_pt": "O quinto filme da franquia 'Toy Story' estreou na quarta-feira (17). O sucesso da saga de 30 anos é atribuído ao carisma dos personagens, como Woody, Buzz Lightyear e Jessie.  O novo filme apresenta os brinquedos enfrentando a ameaça dos mundos das telas para a infância.", "titulo_pt": "Personagens cativantes explicam sucesso de 'Toy Story' ao longo das décadas", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 7979, "titulo": "Bétharram Catholic school abuse scandal: Independent commission recommends financial compensation for victims", "url": "https://www.lemonde.fr/en/france/article/2026/06/20/betharram-catholic-school-abuse-scandal-independent-commission-recommends-financial-compensation-for-victims_6754704_7.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-20T16:07:00Z", "idioma": "en", "texto_pt": "Uma comissão independente estimou que o número de vítimas de violência sexual e física na instituição privada no sudoeste da França pode chegar a 1.500. O relatório, publicado no sábado, destaca o impacto duradouro do trauma nas vidas dos ex-alunos.", "titulo_pt": "Escândalo de abuso na escola católica de Bétharram: Comissão independente recomenda compensação financeira para vítimas", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 7637, "titulo": "Juçara Marçal transformou a recusa da repetição em seu próprio método artístico", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/jucara-marcal-transformou-a-recusa-da-repeticao-em-seu-proprio-metodo-artistico.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-20T16:00:00Z", "idioma": "pt", "texto_pt": "A artista Juçara Marçal está sendo destaque em diversas publicações. Uma nova matéria sobre ela foi publicada no dia 06 de junho de 2026 às 13h00. O foco da matéria é como a recusa de Marçal à repetição se tornou um elemento fundamental em sua obra.", "titulo_pt": "Juçara Marçal transformou a recusa à repetição em seu próprio método artístico", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 7638, "titulo": "Marquise do parque Ibirapuera ganha restaurante com cardápio de Jefferson Rueda", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/passeios/2026/06/marquise-do-parque-ibirapuera-ganha-restaurante-com-cardapio-de-jefferson-rueda.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-20T15:00:00Z", "idioma": "pt", "texto_pt": "O espaço dentro da marquise do parque Ibirapuera, projetado por Oscar Niemeyer, abrigará o restaurante Marquise a partir de outubro. O restaurante retoma uma função prevista desde o projeto original do conjunto.", "titulo_pt": "Marquise do parque Ibirapuera ganha restaurante com cardápio de Jefferson Rueda", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 7904, "titulo": "Why Adventure Matters", "url": "https://www.theatlantic.com/newsletters/2026/06/adventure-taking-risks/687653/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-20T14:46:00Z", "idioma": "en", "texto_pt": "A aventura pode ter mais a ver com a sua disposição para deixar o familiar para trás do que com o lugar para onde você vai.  O artigo explora a importância da aventura na vida humana.", "titulo_pt": "Por Que Aventura Importa", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 7354, "titulo": "Estudo aponta que 85% dos brasileiros vão participar de festas juninas", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/estudo-aponta-que-85-dos-brasileiros-vao-participar-de-festas-juninas", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-20T13:12:00Z", "idioma": "pt", "texto_pt": "Uma pesquisa do Instituto Locomotiva revelou que 85% dos brasileiros maiores de 18 anos planejam participar das festas juninas este ano. O número é maior que o interesse em festas juninas em 2025 (81%), mas próximo à margem de erro da pesquisa (3%). O estudo foi realizado entre 29 de abril e 6 de maio, seguindo os parâmetros da Pesquisa Nacional por Amostra de Domicílios (PNAD/IBGE).", "titulo_pt": "Estudo: 85% dos brasileiros vão participar de festas juninas", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 7353, "titulo": "O cinema não deveria ser uma ferramenta política, diz o cineasta László Nemes", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/o-cinema-nao-deveria-ser-uma-ferramenta-politica-diz-o-cineasta-laszlo-nemes.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-20T13:00:00Z", "idioma": "pt", "texto_pt": "László Nemes, diretor húngaro conhecido por filmes como 'O Filho de Saul', afirma que o cinema não deveria ser usado como ferramenta política.  Seu novo filme, 'O Órfão', disponível na Mubi, aborda a busca de uma criança pelo pai desaparecido durante o Holocausto.", "titulo_pt": "O cinema não deve ser uma ferramenta política, diz o cineasta László Nemes", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 7355, "titulo": "Rádio Animada celebra Bethânia e Dia Nacional do Orgulho Autista", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/radio-animada-celebra-bethania-e-dia-nacional-do-orgulho-autista", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-20T12:30:00Z", "idioma": "pt", "texto_pt": "O programa Rádio Animada deste domingo (21) abordará os 80 anos de Maria Bethânia, a conscientização sobre a preservação da água e o combate à seca. O dia também será dedicado ao Dia Nacional do Orgulho Autista.", "titulo_pt": "Rádio Animada celebra Bethânia e Dia Nacional do Orgulho Autista", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 7545, "titulo": "The Eternal Allure of the Rabbit Hole", "url": "https://www.theatlantic.com/technology/2026/06/jfk-assassination-epstein-ufo-conspiracy-theories/687577/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-20T12:00:00Z", "idioma": "en", "texto_pt": "Durante a pesquisa sobre uma mulher que se aprofundou na conspiração sobre a morte de JFK, o autor também foi atraído para esse mundo. O texto explora como a busca por respostas pode levar a um mergulho profundo em teorias e informações controversas.", "titulo_pt": "O Encanto Eterno do Buraco do Coelho", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 7618, "titulo": "‘Once my tummy stopped shaking, I was absorbed by the scale, spectacle and wonder’: your Steven Spielberg film favourites", "url": "https://www.theguardian.com/film/2026/jun/20/readers-favourite-spielberg-films-close-encounters-et-raiders-hook", "fonte_id": "guardian_culture", "data_pub": "2026-06-20T12:00:00Z", "idioma": "en", "texto_pt": "O The Guardian pediu aos leitores para compartilharem seus filmes favoritos do diretor Steven Spielberg. O artigo apresenta relatos de leitores sobre suas experiências com os filmes de Spielberg, incluindo a primeira vez que viram um filme dele no cinema e como se sentiram durante a experiência.", "titulo_pt": "'Depois que meu estômago parou de tremer, fiquei absorvido pela escala, espetáculo e maravilha': seus filmes favoritos do Steven Spielberg", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 7539, "titulo": "Ralph Lauren bridges generations with menswear tie-up in Milan", "url": "https://www.theguardian.com/fashion/2026/jun/20/ralph-lauren-milan-fashion-week-menswear-ties", "fonte_id": "guardian_world", "data_pub": "2026-06-20T11:21:00Z", "idioma": "en", "texto_pt": "No segundo desfile solo de menswear em Milão, Ralph Lauren voltou a usar gravatas, o acessório que lançou seu império em 1967. Gravatas finas de seda com estampas sutis foram usadas como toque final para ternos elegantes em listras, enquanto gravata mais coloridas ou listradas foram usadas como se estivessem saindo de baixo de peças de tricô e camisas de rugby.", "titulo_pt": "Ralph Lauren une gerações com colaboração de peças masculinas em Milão", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 7617, "titulo": "‘How do I deal with my rage? I put it in everything I do’: Killing Eve’s Sandra Oh on fury, friendship and hitting her prime in midlife", "url": "https://www.theguardian.com/tv-and-radio/2026/jun/20/sandra-oh-interview-killing-eve-theatre", "fonte_id": "guardian_culture", "data_pub": "2026-06-20T11:00:00Z", "idioma": "en", "texto_pt": "Sandra Oh está em Londres para uma peça no National Theatre. A atriz de 54 anos falou sobre como encontrou seu ritmo na carreira e como o sucesso da série Killing Eve mudou tudo. Ela também mencionou receber conselhos de celebridades e a decisão de se dedicar ao teatro.", "titulo_pt": "'Como lido com minha raiva? Coloco tudo no que faço': Sandra Oh de Killing Eve sobre fúria, amizade e atingir seu auge na meia-idade", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 7105, "titulo": "German government stokes up the memory wars surrounding the 'displaced persons' of 1945", "url": "https://www.lemonde.fr/en/international/article/2026/06/20/german-government-stokes-up-the-memory-wars-surrounding-the-displaced-persons-of-1945_6754696_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-20T10:58:00Z", "idioma": "en", "texto_pt": "O governo cristão-democrata da Alemanha está comemorando o Dia Internacional dos Refugiados, lembrando os 12 milhões de alemães expulsos da Europa Central e Oriental após a Segunda Guerra Mundial. Sob pressão do extremismo direito, o governo optou por tratar o assunto através do Ministério do Interior em vez do Ministério da Cultura.", "titulo_pt": "Alemanha reaviva debate sobre 'deslocados' após a Segunda Guerra Mundial", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}], "ciencia_tecnologia": [{"id": 7809, "titulo": "As extraordinárias pessoas resistentes ao HIV - e como elas podem ser peça-chave no combate ao vírus", "url": "https://www.bbc.com/portuguese/articles/cq5p563j3w9o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-20T19:58:00Z", "idioma": "pt", "texto_pt": "Cientistas estão pesquisando indivíduos raros que parecem ter resistência natural ao HIV. O objetivo é entender como esses corpos combatem o vírus para desenvolver novas terapias.", "titulo_pt": "As pessoas resistentes ao HIV e como elas podem ajudar a combater o vírus", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 8085, "titulo": "Astrobotic says sale to Voyager will allow it to scale up", "url": "https://spacenews.com/astrobotic-says-sale-to-voyager-will-allow-it-to-scale-up/", "fonte_id": "spacenews", "data_pub": "2026-06-20T19:51:00Z", "idioma": "en", "texto_pt": "A desenvolvedora de módulos lunares Astrobotic decidiu vender para a Voyager Technologies. A empresa busca escalonar rapidamente suas operações para atender à demanda projetada pela iniciativa lunar da NASA.", "titulo_pt": "Astrobotic diz que venda para Voyager permitirá expansão", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 7643, "titulo": "Por que os peixes não têm pelos?", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/06/por-que-os-peixes-nao-tem-pelos.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-20T15:00:00Z", "idioma": "pt", "texto_pt": "Golfinhos, salmões e leões-marinhos são vertebrados aquáticos com diferenças significativas na pele. O salmão possui escamas e muco, o golfinho tem pele lisa e o leão-marinho uma pelagem densa.", "titulo_pt": "Por que os peixes não têm pelos?", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 7543, "titulo": "Are GLP-1s Performance-Enhancing Drugs?", "url": "https://www.theatlantic.com/health/2026/06/glp1-weight-loss-doping-sports-serena-williams/687634/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-20T13:00:00Z", "idioma": "en", "texto_pt": "A medicação para perda de peso facilitou o retorno de Serena Williams ao tênis. Especialistas não concordam se isso conta como doping.", "titulo_pt": "GLP-1s Serão Drogas Aprimoradoras de Performance?", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 7609, "titulo": "War Taught this Ukrainian Entrepreneur the Value of Resilience", "url": "https://spectrum.ieee.org/mikadze-struk-resilience-in-entrepreneurship", "fonte_id": "ieee_spectrum", "data_pub": "2026-06-20T13:00:00Z", "idioma": "en", "texto_pt": "Salome Mikadze-Struk, filha de refugiados, fundou uma empresa de desenvolvimento de software durante a pandemia de COVID-19. Ela manteve o negócio funcionando mesmo com o início da guerra na Ucrânia. Agora, ela usa suas experiências para mentorar fundadores de startups de tecnologia e falar sobre a importância da resiliência no empreendedorismo.", "titulo_pt": "Guerra Ensinou essa Empreendedora Ucraniana o Valor da Resiliência", "veiculo": "IEEE Spectrum", "pais": "EUA", "classe": "A"}, {"id": 7615, "titulo": "Silicon Valley's longevity biohackers are engaged in a dangerous experiment", "url": "https://www.scientificamerican.com/article/silicon-valleys-longevity-biohackers-are-engaged-in-a-dangerous-experiment/", "fonte_id": "scientific_american", "data_pub": "2026-06-20T12:00:00Z", "idioma": "en", "texto_pt": "Influenciadores e pessoas ultra-ricas que desejam prolongar sua vida estão compartilhando dicas e truques sobre como ganhar mais anos. Essas práticas, consideradas biohacking de longevidade, são discutidas em grupos online e eventos exclusivos.", "titulo_pt": "Biohackers do Vale do Silício buscam longevidade em experimento perigoso", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 7293, "titulo": "Home Batteries: How They're Installed and How Much They Cost", "url": "https://www.wired.com/story/how-to-buy-a-home-battery/", "fonte_id": "wired", "data_pub": "2026-06-20T11:00:00Z", "idioma": "en", "texto_pt": "Após instalar uma bateria em minha residência, este artigo explica por que você pode querer ter uma bateria doméstica, como elas funcionam e quais fatores considerar, além de fornecer algumas dicas de instalação.", "titulo_pt": "Baterias Domésticas: Como Elas são Instaladas e Qual é o Custo", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 7319, "titulo": "Is NASA falling out of love with Mars?", "url": "https://www.sciencenews.org/article/nasa-mars-exploration-july-2026-ed-note", "fonte_id": "science_news", "data_pub": "2026-06-20T11:00:00Z", "idioma": "en", "texto_pt": "A editora-chefe Nancy Shute discute a relação instável da NASA com as explorações no Marte.", "titulo_pt": "NASA estaria perdendo interesse na exploração do Marte?", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 7594, "titulo": "Did Anthropic talk its way into an AI export ban?", "url": "https://www.ft.com/content/16ace46c-aeac-40c9-8598-3c01fa4481cb", "fonte_id": "financial_times", "data_pub": "2026-06-20T11:00:00Z", "idioma": "en", "texto_pt": "Uma análise do Financial Times mostra que a empresa Anthropic alertou sobre os perigos da inteligência artificial avançada mais vezes este ano do que sua rival, a OpenAI. Essa série de advertências pode ter contribuído para uma possível proibição de exportação de IA para a Anthropic.", "titulo_pt": "Anthropic teria se auto-banido de exportação de IA?", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 7616, "titulo": "Attachment style may influence how many kids people have", "url": "https://www.scientificamerican.com/article/attachment-style-may-influence-how-many-kids-people-have/", "fonte_id": "scientific_american", "data_pub": "2026-06-20T11:00:00Z", "idioma": "en", "texto_pt": "Um estudo recente descobriu que pessoas com estilos de apego inseguros 'temerosos' ou 'preocupados' tiveram mais filhos. Por outro lado, pessoas com apego seguro tiveram menos filhos.", "titulo_pt": "Estilo de apego pode influenciar o número de filhos que as pessoas têm", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 7295, "titulo": "16 Best Greens Powders (2026): Taste-Tested for Months", "url": "https://www.wired.com/gallery/best-greens-powders/", "fonte_id": "wired", "data_pub": "2026-06-20T10:31:00Z", "idioma": "en", "texto_pt": "O autor realizou pesquisa e testes de gosto para identificar os melhores pó verdes valiosos em termos de qualidade. Bloom Nutrition’s Superfood Greens Powder foi seu escolhido preferido.", "titulo_pt": "16 Melhores Pó Verdes Testados em Gosto (2026)", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 6756, "titulo": "Herbívoros domésticos não substituem megafauna, afirma pesquisa", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/colunas/reinaldojoselopes/2026/06/herbivoros-domesticos-nao-substituem-megafauna-afirma-pesquisa.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-20T10:00:00Z", "idioma": "pt", "texto_pt": "Uma pesquisa concluiu que os ecossistemas brasileiros, apesar de serem considerados maravilhosos, estão 'esburacados' do ponto de vista ecológico e que herbívoros domésticos não podem substituir a megafauna.", "titulo_pt": "Pesquisa afirma que herbívoros domésticos não substituem megafauna", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 7296, "titulo": "Siri AI Hands On: A Smart, Helpful Assistant", "url": "https://www.wired.com/story/siri-ai-hands-on-iphone/", "fonte_id": "wired", "data_pub": "2026-06-20T10:00:00Z", "idioma": "en", "texto_pt": "O novo Siri AI é conversacional, presente em todo lugar e realmente útil.", "titulo_pt": "Testando o Novo Siri AI: Um Assistente Inteligente e Auxiliar", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 7297, "titulo": "Hackers Claim to Leak Stolen Madison Square Garden Data"   const drillId = "drill-" + (++drillCounter);
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const rot = n.topico ? (D.rotulos_topico[n.topico] || n.topico) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(n.topico || '')}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
</body>
</html>
