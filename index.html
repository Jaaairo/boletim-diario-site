<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>
</head>

<script>
const D = {"gerado_em": "19/06/2026 16:27", "stats": {"noticias_total": 6333, "resumos_total": 765, "sem_topico": 0, "ultima_coleta": "2026-06-19T19:00:17Z"}, "rotulos_topico": {"politica_nacional": "Política Nacional", "politica_internacional": "Política Internacional", "cultura": "Cultura", "ciencia_tecnologia": "Ciência & Tecnologia"}, "topicos": ["politica_nacional", "politica_internacional", "cultura", "ciencia_tecnologia"], "sinteses": {"ciencia_tecnologia": "A indústria de tecnologia e ciência está em constante evolução, com destaque para avanços significativos em inteligência artificial (IA) e espaço. A IEEE Spectrum anunciou um curso virtual sobre grandes modelos de linguagem, que estão se integrando cada vez mais na prática técnica diária, ajudando a identificar vulnerabilidades no código-fonte e transformar discussões projetuais fragmentadas em especificações técnicas rigorosas. Em outra notícia, a MDA Space adquiriu a Blue Canyon Technologies por 620 milhões de dólares, expandindo sua presença no mercado lucrativo dos Estados Unidos. No campo da astrofísica, pesquisadores descobriram possíveis restos de uma supernova irmã do Jellyfish Nebula, enquanto a NASA planeja investigar como a meteorologia espacial interfere na atmosfera da Terra. Além disso, a técnica desenvolvida por pesquisadores da USP promete fornecer novos insights sobre a evolução dos sistemas planetários ao identificar estrelas que engoliram planetas. No âmbito das empresas tecnológicas, a ElevationSpace Inc. arrecadou 40 milhões de dólares em sua rodada B de financiamento, elevando o total para 63,5 milhões, enquanto a startup Subquadrática resolveu um obstáculo matemático que tem impedido o desenvolvimento de modelos de aprendizado de máquina de grande porte.", "cultura": "A Academia Brasileira de Letras (ABL) premiou o escritor Cristóvão Tezza com o Prêmio Machado de Assis, sua maior honraria, reconhecendo o conjunto de sua obra em uma cerimônia programada para 23 de julho. Em comemoração ao Dia do Cinema Brasileiro, a sala de cinema Belas Artes em São Paulo oferece ingressos por R$10 para filmes nacionais, validando-se apenas para quem comparecer à bilheteria usando uma camiseta verde ou amarela. A Feira Literária Conta Conto ─ Voz das Periferias, realizada na Biblioteca Parque de Manguinhos no Rio de Janeiro, reúne literatura, gastronomia, música e outras manifestações artísticas em uma programação gratuita com o objetivo de fortalecer a conexão entre artistas e comunidade nas periferias. Além disso, a TV Brasil estreia nesta sexta-feira (19) a série chinesa 'Rumo ao Maravilhoso', transmitindo os episódios até sábado (27) às 20h, enquanto Helena Gao, artista da Dinamarca com origens chinesas, lança sua própria carreira solo após escrever cerca de 90% do álbum de estreia de Zara Larsson, que resultou em um Grammy.", "politica_internacional": "A política internacional enfrenta diversos desafios e eventos significativos. Os Estados Unidos anunciaram a redução gradual do apoio para prevenção e tratamento do HIV na África do Sul, uma medida que reflete preocupações sobre a proteção da minoria Afrikaner no país. Em outro desenvolvimento, Israel e Hezbollah concordaram em um cessar-fogo após relatos de mais ataques no Líbano, o que pode fortalecer as negociações entre Estados Unidos e Irã para encerrar conflitos regionais. A Argentina anunciou a mudança na chefia de gabinete de Manuel Adorni, após uma investigação envolvendo suposta corrupção na Fundação Faro. Outro evento notável foi o cancelamento do Business Forum Itália-USA em Miami, refletindo tensões diplomáticas entre os países.", "politica_nacional": "O presidente Luiz Inácio Lula da Silva assinou um decreto que prevê o bloqueio de fundos de empresas de apostas ilegais, com os recursos sendo direcionados ao Fundo Nacional de Segurança Pública. Além disso, a nova pesquisa Datafolha sobre as intenções de voto para presidente e avaliação do governo Lula será divulgada no sábado (20). O ex-ministro da Educação Camilo Santana é apontado como favorito para assumir a liderança do governo no Senado caso Jaques Wagner deixe o cargo. A investigação sobre Jaques Wagner, que abalou a estratégia do governo em relação ao escândalo Master, continua com novas revelações e pressões para que ele se afaste da liderança do governo no Senado."}, "resumo_do_dia": {"politica_nacional": [{"id": 5656, "titulo": "Lula assina decreto que prevê bloqueio de recursos de bets ilegais", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/lula-assina-decreto-que-preve-bloqueio-de-recursos-de-bets-ilegais", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-19T18:58:00Z", "idioma": "pt", "texto_pt": "O presidente Luiz Inácio Lula da Silva assinou um decreto que prevê o bloqueio imediato de fundos de empresas de apostas ilegais, com os recursos sendo direcionados ao Fundo Nacional de Segurança Pública para combate ao crime organizado.", "titulo_pt": "Lula assina decreto para bloqueio de recursos de apostas ilegais", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 5623, "titulo": "Camilo é tido como favorito para assumir liderança do governo no Senado caso Wagner deixe o cargo", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/camilo-e-tido-como-favorito-para-assumir-lideranca-do-governo-no-senado-caso-wagner-deixe-o-cargo.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T18:43:00Z", "idioma": "pt", "texto_pt": "O ex-ministro da Educação Camilo Santana (PT-CE) tem sido apontado como favorito para assumir a liderança do governo no Senado, caso o senador Jaques Wagner (PT-BA) deixe o cargo.", "titulo_pt": "Camilo é visto como favorito para liderar governo no Senado se Wagner sair", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 5624, "titulo": "Datafolha: Nova pesquisa sobre eleição presidencial é divulgada neste sábado (20)", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/datafolha-nova-pesquisa-sobre-eleicao-presidencial-e-divulgada-neste-sabado-20.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T18:01:00Z", "idioma": "pt", "texto_pt": "Uma nova pesquisa Datafolha será lançada neste sábado (20), trazendo informações sobre as intenções de voto para presidente e a avaliação do governo Lula.", "titulo_pt": "Datafolha divulga nova pesquisa sobre eleição presidencial neste sábado", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 5625, "titulo": "Fachin fala sobre penduricalhos e cita pagamentos exorbitantes sem justificativa", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/fachin-fala-sobre-penduricalhos-e-cita-pagamentos-exorbitantes-sem-justificativa.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T17:18:00Z", "idioma": "pt", "texto_pt": "O presidente do STF, Edson Fachin, admitiu a existência de pagamentos acima do teto constitucional para magistrados sem justificativa durante uma fala sobre o grupo de trabalho criado pelo CNJ para revisar os penduricalhos no Poder Judiciário.", "titulo_pt": "Fachin reconhece pagamentos exorbitantes a magistrados", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 5626, "titulo": "Lula evita falar de Jaques Wagner, mas faz sinal positivo ao ser questionado se ele segue líder do governo", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/lula-sinaliza-que-jaques-wagner-segue-na-lideranca-do-governo-apos-operacao-da-pf.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T16:38:00Z", "idioma": "pt", "texto_pt": "O presidente Lula não comentou diretamente sobre a permanência de Jaques Wagner como líder do governo no Senado, mas fez um gesto positivo quando questionado sobre o assunto.", "titulo_pt": "Lula evita comentar sobre Jaques Wagner, mas faz sinal positivo", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 5644, "titulo": "Zema diz que 'nunca foi próximo' de Flávio Bolsonaro e volta a criticar o STF: 'Poder incendiário'", "url": "https://g1.globo.com/pe/pernambuco/eleicoes/2026/noticia/2026/06/19/zema-diz-que-nunca-foi-proximo-de-flavio-bolsonaro-e-volta-a-criticar-o-stf-poder-incendiario.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T16:38:00Z", "idioma": "pt", "texto_pt": "O ex-governador de Minas Gerais Romeu Zema, pré-candidato à Presidência, declarou que nunca foi próximo ao senador Flávio Bolsonaro. Durante uma entrevista em Recife, Zema também criticou o Supremo Tribunal Federal, chamando-o de 'poder incendiário'.", "titulo_pt": "Zema afirma não ter sido próximo a Flávio Bolsonaro e critica STF", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 5646, "titulo": "Imposto do pecado: governo quer manter carga tributária sobre bebidas e cigarro enquanto durar período de transição", "url": "https://g1.globo.com/economia/noticia/2026/06/19/imposto-do-pecado-ideia-e-manter-em-transicao-o-atual-peso-de-tributos-para-bebidas-alcoolicas-e-cigarros-diz-ministro-da-fazenda.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T16:21:00Z", "idioma": "pt", "texto_pt": "O ministro da Fazenda, Dario Durigan, afirmou que não há intenção de adiar a implementação do imposto seletivo, conhecido como 'imposto do pecado', previsto para 2027. A ideia é manter a atual carga tributária sem aumento durante um período de transição.", "titulo_pt": "Imposto do pecado: governo quer manter carga tributária sobre bebidas e cigarro durante período de transição", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 5627, "titulo": "Indenizações da Toyota expõem carreira de Kassio Nunes Marques", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/blogs/frederico-vasconcelos/2026/06/indenizacoes-da-toyota-expoem-carreira-de-kassio-nunes-marques.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T16:16:00Z", "idioma": "pt", "texto_pt": "O Tribunal de Justiça do Piauí adiou uma sessão que julgaria, nesta sexta-feira (19), um recurso da Toyota do Brasil relacionado a uma indenização de R$ 18 milhões por suposto defeito em um veículo.", "titulo_pt": "Indenizações da Toyota levantam questionamentos sobre a carreira de Kassio Nunes Marques", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 5628, "titulo": "Caiado tem pelotão de 51 policiais militares para segurança pessoal e de familiares", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/caiado-tem-pelotao-de-51-policiais-militares-para-seguranca-pessoal-e-de-familiares.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T16:00:00Z", "idioma": "pt", "texto_pt": "O pré-candidato do PSD à Presidência, Ronaldo Caiado, tem à disposição 51 policiais militares de Goiás para garantir sua segurança e a de seus familiares em São Paulo.", "titulo_pt": "Caiado dispõe de 51 policiais militares para segurança pessoal e de familiares", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 5647, "titulo": "Influencers que divulgarem apostas ilegais serão responsabilizados, diz governo", "url": "https://g1.globo.com/economia/noticia/2026/06/19/influencers-que-divulgarem-apostas-ilegais-serao-responsabilizados-diz-governo.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T15:52:00Z", "idioma": "pt", "texto_pt": "O governo federal informou que influenciadores digitais que promovam plataformas de apostas ilegais serão responsabilizados tributariamente, com cobrança de Imposto de Renda e PIS/Cofins além das sanções administrativas.", "titulo_pt": "Influenciadores que divulgarem apostas ilegais serão responsabilizados tributariamente", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 5648, "titulo": "Governo vai propor subir limite do MEI para R$ 130 mil escalonado até 2028, mas afasta corrigir outras faixas do Simples, diz ministro", "url": "https://g1.globo.com/economia/noticia/2026/06/19/governo-vai-propor-subir-limite-do-mei-para-r-130-mil-escalonado-ate-2028-mas-afasta-corrigir-outras-faixas-do-simples-diz-ministro.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T15:46:00Z", "idioma": "pt", "texto_pt": "O ministro da Fazenda, Dario Durigan, anunciou que o governo enviará um projeto de lei para aumentar o limite do microempreendedor individual (MEI) em etapas até R$ 130 mil em 2028. No entanto, os limites dos demais programas do Simples Nacional não serão revisados neste momento.", "titulo_pt": "Governo vai propor aumento do limite do MEI para R$ 130 mil até 2028, mas não corrigirá outros limites do Simples", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 5649, "titulo": "'Neymar é o primeiro convocado home office do mundo', brinca Lula ao mencionar post nas redes", "url": "https://g1.globo.com/politica/noticia/2026/06/19/neymar-e-o-primeiro-convocado-home-office-do-mundo-diz-lula.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T15:38:00Z", "idioma": "pt", "texto_pt": "O presidente Luiz Inácio Lula da Silva fez uma piada ao mencionar que Neymar é 'o primeiro convocado home office do mundo' durante um discurso em Belo Horizonte, provocando risadas na plateia.", "titulo_pt": "Lula brinca sobre Neymar ser o primeiro convocado home office", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 5657, "titulo": "Empregadores têm até sábado para enviar dados ao eSocial", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/empregadores-tem-ate-sabado-para-enviar-dados-ao-esocial", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-19T15:30:00Z", "idioma": "pt", "texto_pt": "Os empregadores têm até o próximo sábado (20) para enviar informações sobre vínculos empregatícios ao eSocial para o ano-base 2024. O objetivo é garantir a identificação dos trabalhadores aptos a receber o abono salarial em outubro de 2026.", "titulo_pt": "Prazo para envio de dados ao eSocial termina neste sábado", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 5658, "titulo": "Motoristas de apps e taxistas já podem pedir financiamento", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/motoristas-de-apps-e-taxistas-ja-podem-pedir-financiamento", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-19T15:29:00Z", "idioma": "pt", "texto_pt": "Começa nesta sexta-feira (19) o período para motoristas de aplicativos e taxistas solicitarem financiamento de veículos zero quilômetro por meio do programa Move Brasil, voltado à renovação da frota de transporte individual no país.", "titulo_pt": "Motoristas de apps e taxistas podem pedir financiamento para veículos novos", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 5650, "titulo": "25 milhões de pessoas usam plataformas ilegais de apostas online, diz ministro da Justiça", "url": "https://g1.globo.com/economia/noticia/2026/06/19/25-milhoes-de-pessoas-usam-plataformas-ilegais-de-apostas-online-diz-ministro-da-justica.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T15:09:00Z", "idioma": "pt", "texto_pt": "O ministro da Justiça e Segurança Pública do Brasil informou que 25,2 milhões de brasileiros fazem apostas por meio de plataformas ilegais. O governo anunciou a intenção de bloquear recursos dessas bets e direcioná-los para o fundo de segurança pública.", "titulo_pt": "25 milhões de pessoas usam plataformas ilegais de apostas online, diz ministro", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 5629, "titulo": "Brecha em regra permite a senadores embolsar diárias não gastas em missões oficiais", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/brecha-em-regra-permite-a-senadores-embolsar-diarias-nao-gastas-em-missoes-oficiais.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T15:00:00Z", "idioma": "pt", "texto_pt": "O Senado não possui regras para a devolução de dinheiro destinado às despesas de viagens oficiais quando as despesas não são realizadas. O senador Jaques Wagner (PT-BA) afirmou que valores encontrados em sua residência, cerca de R$ 471 mil, são sobras de diárias recebidas por missões oficiais.", "titulo_pt": "Brecha na regra permite que senadores embolsuem diárias não gastas em missões oficiais", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}], "politica_internacional": [{"id": 5974, "titulo": "U.S. to End AIDS Funding for South Africa", "url": "https://www.nytimes.com/2026/06/19/world/africa/southafrica-aids-pepfar.html", "fonte_id": "nyt_world", "data_pub": "2026-06-19T18:53:00Z", "idioma": "en", "texto_pt": "O Departamento de Estado dos EUA anunciou que vai reduzir gradualmente o apoio para prevenção e tratamento do HIV na África do Sul.", "titulo_pt": "EUA anunciam fim do financiamento para combate ao HIV na África do Sul", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 5973, "titulo": "Woman Receives 12-Year Sentence for 1978 Scalding Death of Stepdaughter, 5", "url": "https://www.nytimes.com/2026/06/19/world/europe/janice-nix-scalding-killing-london-1978.html", "fonte_id": "nyt_world", "data_pub": "2026-06-19T18:52:00Z", "idioma": "en", "texto_pt": "Janice Nix foi condenada por homicídio culposo após seu sobrinho revelar que ela havia forçado sua irmã mais nova a tomar um banho quente como castigo em sua casa, em South London, no ano de 1978.", "titulo_pt": "Mulher é Condenada a 12 Anos de Prisão pelo Morticínio de Sua Enteada em 1978", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 5989, "titulo": "Milei cambia a su portavoz, acorralado por un caso de presunta corrupción", "url": "https://elpais.com/argentina/2026-06-19/milei-cambia-a-su-portavoz-acorralado-por-un-caso-de-presunta-corrupcion.html", "fonte_id": "elpais_america", "data_pub": "2026-06-19T18:38:00Z", "idioma": "es", "texto_pt": "Manuel Adorni, também chefe de Gabinete argentino, anuncia que perde um cargo em função de um ultradireitista da Fundação Faro envolvido em um caso de suposta corrupção.", "titulo_pt": "Milei troca sua porta-voz, pressionado por caso de suposta corrupção", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 6158, "titulo": "Israel and Hizbollah agree ceasefire", "url": "https://www.ft.com/content/ad95de96-4849-479e-b4e5-c5f15fcad581", "fonte_id": "financial_times", "data_pub": "2026-06-19T18:37:00Z", "idioma": "en", "texto_pt": "O preço do petróleo caiu devido às esperanças de que o acordo possa fortalecer a negociação entre Estados Unidos e Irã.", "titulo_pt": "Israel e Hizbollah concordam com cessar-fogo", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 6063, "titulo": "Israel and Hezbollah agree ceasefire, US says, as more Lebanon strikes reported", "url": "https://www.bbc.com/news/articles/cwyk7kkygj5o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-19T18:34:00Z", "idioma": "en", "texto_pt": "Houve um acordo entre Israel e Hezbollah após preocupações de que a continuidade dos confrontos ameaçasse o pacto para encerrar a guerra entre Estados Unidos e Irã. Relatos indicam mais ataques em território libanês.", "titulo_pt": "Israel e Hezbollah concordam com cessar-fogo, diz EUA, enquanto relatos de novos ataques no Líbano são relatados", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 5987, "titulo": "Mundial de 2026, en directo: Estados Unidos - Australia, en vivo | Los de Pochettino buscan seguir enrachados ante la correosa Australia", "url": "https://elpais.com/deportes/mundial-futbol/2026-06-19/mundial-de-2026-en-directo-estados-unidos-australia-en-vivo.html", "fonte_id": "elpais_america", "data_pub": "2026-06-19T18:25:00Z", "idioma": "es", "texto_pt": "O jogo entre Estados Unidos e Austrália no Mundial de 2026 é um confronto sem favorito claro, com o objetivo de avançar para os 16avos de final.", "titulo_pt": "Mundial de 2026, ao vivo: Estados Unidos - Austrália | Os de Pochettino buscam seguir encarnados contra a tenaz Austrália", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 6149, "titulo": "Trump, 'non voglio Meloni come fan, non c'era per Hormuz'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/19/trump-non-voglio-meloni-come-fan-non-cera-per-hormuz_3cfe9a9e-c418-4dbd-9e79-4561e6636263.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-19T18:24:00Z", "idioma": "it", "texto_pt": "Em uma entrevista à NBC, Trump expressou que não deseja ser seguido por Giorgia Meloni e mencionou a passagem pelo Estreito de Ormuz.", "titulo_pt": "Trump, 'não quero Meloni como fã, não havia para Hormuz'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 5975, "titulo": "How Cubans Are Living in the Dark", "url": "https://www.nytimes.com/video/world/americas/100000010937059/how-cubans-are-living-in-the-dark.html", "fonte_id": "nyt_world", "data_pub": "2026-06-19T18:22:00Z", "idioma": "en", "texto_pt": "Lisette Poole González, fotógrafa do The New York Times, conversa com Jack Nicas, chefe da repartição de México City do jornal, sobre a fotografia noturna em Havana durante uma crise energética.", "titulo_pt": "Como os cubanos estão vivendo na escuridão", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 6150, "titulo": "Scontro tra due treni a nord di Londra, in azione i soccorsi", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/19/scontro-tra-due-treni-a-nord-di-londra-in-azione-i-soccorsi_628c58d8-6f92-40b9-86ca-5b894237a3fd.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-19T18:13:00Z", "idioma": "it", "texto_pt": "A British Transport Police relata um conflito envolvendo dois trens no norte de Londres. As equipes de resgate estão ativas no local.", "titulo_pt": "Conflito entre dois trens no norte de Londres, equipes de resgate em ação", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 5966, "titulo": "Moscow Refinery Blast May Have Been Caused by Friendly Fire, Video Suggests", "url": "https://www.nytimes.com/2026/06/19/world/europe/russia-moscow-missile-refinery.html", "fonte_id": "nyt_world", "data_pub": "2026-06-19T17:57:00Z", "idioma": "en", "texto_pt": "Vídeos mostram um míssil de defesa aérea russo se movendo em direção a uma silo de combustível, que explode no mesmo momento aproximadamente.", "titulo_pt": "Explosão na Refinaria de Moscou Pode Ter Sido Causada por Fogo Amigo, Vídeo Sugere", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 5967, "titulo": "Catherine, Princess of Wales Questions Digital Screens’ Role in Children’s Lives", "url": "https://www.nytimes.com/2026/06/19/world/europe/princess-kate-uk-children-social-media-ban.html", "fonte_id": "nyt_world", "data_pub": "2026-06-19T17:49:00Z", "idioma": "en", "texto_pt": "A princesa Catriona publicou um artigo alertando contra uma infância 'mediada por telas', alguns dias após o Reino Unido anunciar uma proibição de redes sociais para crianças menores de 16 anos.", "titulo_pt": "Princesa de Gales questiona o papel das telas digitais na vida das crianças", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 5613, "titulo": "Argentina emite alerta nacional após sumiço de cápsula com césio-137, diz jornal", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/argentina-emite-alerta-nacional-apos-sumico-de-capsula-com-cesio-137-diz-jornal.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-19T17:36:00Z", "idioma": "pt", "texto_pt": "Autoridades da Argentina emitiram um alerta nacional após a desaparição de uma cápsula contendo césio-137, um material radioativo, que estava armazenada em um instituto médico na cidade de Rosário.", "titulo_pt": "Argentina emite alerta nacional após sumiço de cápsula com césio-137", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 6072, "titulo": "How armed groups in Colombia are using TikTok to recruit young people", "url": "https://www.france24.com/en/tv-shows/the-observers/20260619-armed-groups-colombia-tiktok-recruit-young-people", "fonte_id": "france24", "data_pub": "2026-06-19T17:36:00Z", "idioma": "en", "texto_pt": "A intensificação do conflito na Colômbia tem visto grupos armados aumentarem sua presença no TikTok com vídeos destinados a atrair novos recrutas, principalmente jovens.}", "titulo_pt": "Grupos armados na Colômbia estão usando o TikTok para recrutar jovens", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 5907, "titulo": "67 asesores de parlamentarios fueron finiquitados e indemnizados, salieron a hacer campaña y luego los recontrataron", "url": "https://www.ciperchile.cl/2026/06/19/67-asesores-de-parlamentarios-fueron-finiquitados-e-indemnizados-salieron-a-hacer-campana-y-luego-los-recontrataron/?utm_source=rss&utm_medium=rss&utm_campaign=67-asesores-de-parlamentarios-fueron-finiquitados-e-indemnizados-salieron-a-hacer-campana-y-luego-los-recontrataron", "fonte_id": "ciper_chile", "data_pub": "2026-06-19T17:31:00Z", "idioma": "es", "texto_pt": "O relatório informa que 67 assessores de parlamentares receberam finiquitos e indenizações, participaram das campanhas e posteriormente foram recontratados.", "titulo_pt": "67 assessorias de parlamentares foram finalizadas e indenizadas, saíram para fazer campanha e depois foram readmitidas", "veiculo": "CIPER Chile", "pais": "Chile", "classe": "A"}, {"id": 6068, "titulo": "Pétanque player, 68, dies after being 'hit in head with metal boule'", "url": "https://www.bbc.com/news/articles/cvgmny9v14no?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-19T17:30:00Z", "idioma": "en", "texto_pt": "Um jogador de 68 anos faleceu após supostamente ser atingido na cabeça por uma bola metálica durante um jogo. O adversário, de 81 anos, foi preso.", "titulo_pt": "Jogador de pétanca, de 68 anos, morre após ser atingido na cabeça com bola metálica", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 5982, "titulo": "Global framework for reparatory justice adopted at landmark conference in Ghana", "url": "https://www.theguardian.com/news/2026/jun/19/global-framework-reparations-justice-adopted-at-landmark-conference-in-accra-ghana", "fonte_id": "guardian_world", "data_pub": "2026-06-19T17:26:00Z", "idioma": "en", "texto_pt": "Um quadro global de justiça reparatória foi adotado durante uma conferência em Accra, Ghana. Representantes de governos e autoridades internacionais aprovaram um roadmap com 18 pontos para compensar as consequências da escravidão e aliviar os cargos de dívida.", "titulo_pt": "Quadro global de justiça reparatória adotado em conferência histórica no Ghana", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}], "cultura": [{"id": 5659, "titulo": "TV Brasil transmite festas juninas da Bahia e de Pernambuco", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/tv-brasil-transmite-festas-juninas-da-bahia-e-de-pernambuco", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-19T18:36:00Z", "idioma": "pt", "texto_pt": "A TV Brasil exibe shows musicais na faixa Arraiá Brasil, transmitindo performances de Salvador, Amargosa (Bahia) e Petrolina (Pernambuco), além de Caruaru (Pernambuco) e Mossoró e Assú (Rio Grande do Norte).", "titulo_pt": "TV Brasil transmite festas juninas da Bahia e de Pernambuco", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 5631, "titulo": "Homem se liberta ao abandonar família no romance 'O Aniversário'", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/homem-se-liberta-ao-abandonar-familia-no-romance-o-aniversario.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T18:00:00Z", "idioma": "pt", "texto_pt": "Um homem mudou completamente sua vida há dez anos, alterando seu número de telefone, endereço e até continente. Desde então, ele não mais teve contato com seus pais e considera esses dez anos como os melhores de sua existência.", "titulo_pt": "Homem se liberta ao abandonar família no romance 'O Aniversário'", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5632, "titulo": "Amazon desiste de filme de Luca Guadagnino sobre a história do CEO da OpenAI", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/amazon-desiste-de-filme-de-luca-guadagnino-sobre-o-ceo-da-openai.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T17:45:00Z", "idioma": "pt", "texto_pt": "A Amazon MGM Studios abandonou a produção do filme baseado na história do CEO da OpenAI, Sam Altman, originalmente dirigido por Luca Guadagnino e estrelado por Andrew Garfield, oferecendo o projeto a outros estúdios.", "titulo_pt": "Amazon desiste de filme sobre Sam Altman", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5633, "titulo": "Funkeiro foragido por fraudes eletrônicas alcança 16º lugar no topo do Spotify", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/funkeiro-foragido-por-fraudes-eletronicas-alcanca-16a-posicao-no-spotify.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T17:35:00Z", "idioma": "pt", "texto_pt": "MC Negão Original, funkeiro foragido da polícia, está na 16ª posição das músicas mais ouvidas no Spotify desta semana com a canção 'Cuida do Pet', em parceria com outros artistas.", "titulo_pt": "Funkeiro foragido por fraudes eletrônicas atinge 16º lugar no Spotify", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5660, "titulo": "ABL reconhece obra de Cristóvão Tezza com Prêmio Machado de Assis", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/abl-reconhece-obra-de-cristovao-tezza-com-premio-machado-de-assis", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-19T16:58:00Z", "idioma": "pt", "texto_pt": "A Academia Brasileira de Letras (ABL) premiou o escritor Cristóvão Tezza com o Prêmio Machado de Assis, sua maior honraria, em reconhecimento ao conjunto de sua obra. A cerimônia de entrega ocorrerá no dia 23 de julho.", "titulo_pt": "Academia Brasileira de Letras concede Prêmio Machado de Assis a Cristóvão Tezza", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 5635, "titulo": "No Dia do Cinema Brasileiro, filmes nacionais têm ingresso a R$ 10 em sala de São Paulo", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/cinema/2026/06/no-dia-do-cinema-brasileiro-filmes-nacionais-tem-ingresso-a-r-10-em-sala-de-sao-paulo.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T16:29:00Z", "idioma": "pt", "texto_pt": "Em comemoração ao Dia do Cinema Brasileiro, a sala de cinema Belas Artes em São Paulo oferece ingressos por R$ 10 para filmes nacionais. O desconto é válido apenas para quem comparecer à bilheteria usando uma camiseta verde ou amarela.", "titulo_pt": "No Dia do Cinema Brasileiro, ingressos a R$ 10 para filmes nacionais em sala de São Paulo", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5636, "titulo": "Choro da Quitanda apresenta obra de Armando Neves em show gratuito em São Paulo", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/blogs/musica-em-letras/2026/06/choro-da-quitanda-apresenta-obra-de-armando-neves-em-show-gratuito-em-sao-paulo.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T16:09:00Z", "idioma": "pt", "texto_pt": "Neste domingo (21), às 11h, no palco Éden do Centro Cultural Vila Itororó, em São Paulo, ocorrerá um show gratuito com o grupo Choro da Quitanda apresentando o álbum 'O Dono da Bola: Choro da Quitanda revê Armando Neves'.", "titulo_pt": "Choro da Quitanda apresenta obra de Armando Neves em show gratuito em São Paulo", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5637, "titulo": "No livro 'Sub/Emerso', obra de Bob Wolfenson surge ressignificada", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/no-livro-subemerso-obra-de-bob-wolfenson-surge-ressignificada.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T16:00:00Z", "idioma": "pt", "texto_pt": "O autor destaca que rios transbordam naturalmente, mas a ocupação não planejada da cidade de São Paulo e o aquecimento global contribuíram para as grandes enchentes. As margens dos rios Pinheiros e Tietê foram retificadas e impermeabilizadas ao longo das décadas, desrespeitando o ciclo natural de cheia e vazante.", "titulo_pt": "No livro 'Sub/Emerso', obra de Bob Wolfenson surge ressignificada", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5638, "titulo": "Lorena em 'Três Graças', Alanis Guillen deve ficar fora da TV até o ano que vem", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/lorena-em-tres-gracas-alanis-guillen-deve-ficar-fora-da-tv-ate-o-ano-que-vem.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T15:59:00Z", "idioma": "pt", "texto_pt": "Alanis Guillen, que teve sucesso como Lorena em 'Três Graças', está se afastando da televisão para descansar a imagem e não retornará até o próximo ano, recusando convites para trabalhos imediatos.", "titulo_pt": "Alanis Guillen deve ficar fora da TV até o ano que vem após 'Três Graças'", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5639, "titulo": "Katie Kitamura, autora que virá à Flip, descortina o jogo de cena por trás das famílias", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/katie-kitamura-autora-que-vira-a-flip-descortina-o-jogo-de-cena-por-tras-das-familias.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T15:50:00Z", "idioma": "pt", "texto_pt": "Katie Kitamura desejava criar um romance como uma ilusão de ótica, que pode ser interpretado de diferentes maneiras dependendo do ângulo de visão.", "titulo_pt": "Katie Kitamura, autora que participará da Flip, revela a inspiração por trás de seu romance", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 6097, "titulo": "Mozart manuscript discovered at French National Library to be performed for the first time", "url": "https://www.lemonde.fr/en/culture/article/2026/06/19/mozart-manuscript-discovered-at-french-national-library-to-be-performed-for-the-first-time_6754674_30.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-19T15:30:00Z", "idioma": "en", "texto_pt": "Um caderno musical encontrado nos arquivos da biblioteca datado do período final de estadia de Mozart em Paris, em 1778, contém sete peças curtas para flauta e harpa. Essas composições serão transmitidas pela primeira vez no dia 22 de junho pelo rádio France Musique.", "titulo_pt": "Manuscrito de Mozart descoberto na Biblioteca Nacional Francesa será apresentado pela primeira vez", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 5640, "titulo": "Manuscrito perdido de Mozart é descoberto após 248 anos, em Paris", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/manuscrito-perdido-de-mozart-e-descoberto-apos-248-anos-em-paris.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T15:20:00Z", "idioma": "pt", "texto_pt": "Um caderno de composição de Wolfgang Amadeus Mozart, contendo sete peças para harpa e flauta, foi encontrado por um curador da Biblioteca Nacional da França em Paris. A instituição anunciou a descoberta nesta sexta-feira.", "titulo_pt": "Manuscrito perdido de Mozart é descoberto após 248 anos, em Paris", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 6284, "titulo": "Camdenwalla review – one long night of fear and defiance in 90s London", "url": "https://www.theguardian.com/stage/2026/jun/19/camdenwalla-review-camden-peoples-theatre-london", "fonte_id": "guardian_culture", "data_pub": "2026-06-19T15:16:00Z", "idioma": "en", "texto_pt": "Trata-se do debut de Jonny Khan, um play que retrata um tio e sobrinha atendendo chamados em um serviço de resgate durante ataques racistas. O trabalho tem atuações bem executadas mas carece de tensão dramática.", "titulo_pt": "Revisão de Camdenwalla – uma noite longa cheia de medo e desafio na Londres dos anos 90", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 6286, "titulo": "Reports of the blockbuster exhibition’s death are premature as Tate’s Kahlo show breaks ticket record", "url": "https://www.theguardian.com/artanddesign/2026/jun/19/blockbuster-exhibition-tate-modern-frida-kahlo-advance-ticket-record", "fonte_id": "guardian_culture", "data_pub": "2026-06-19T14:00:00Z", "idioma": "en", "texto_pt": "A exposição 'Frida: A Formação de uma Ícone' no Tate Modern já vendeu mais de 41.000 ingressos, tornando-se a exposição com maior pré-venda da galeria. Mesmo assim, o interesse público pela artista mexicana Frida Kahlo continuou além das expectativas iniciais.", "titulo_pt": "Relatos sobre a morte da exposição blockbuster são prematuros, diz Tate com relação à mostra de Kahlo que bate recorde de vendas de ingressos", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 6332, "titulo": "Three Horses", "url": "https://www.theparisreview.org/blog/2026/06/19/three-horses/", "fonte_id": "paris_review", "data_pub": "2026-06-19T14:00:00Z", "idioma": "en", "texto_pt": "O autor destaca a diferença entre os cavalos imateriais que passaram por sua leitura e os cavalos materiais que ele encontra durante caminhadas no campo.", "titulo_pt": "Três Cavaleiros", "veiculo": "The Paris Review", "pais": "EUA", "classe": "A"}, {"id": 5641, "titulo": "Diretor diz que seu filme com Armie Hammer foi banido na Alemanha", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/diretor-diz-que-seu-filme-com-armie-hammer-foi-banido-na-alemanha.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T13:35:00Z", "idioma": "pt", "texto_pt": "O diretor Uwe Boll afirmou ao Daily Telegraph que seu filme de ação 'Citizen Vigilante', estrelado por Armie Hammer, foi banido na Alemanha devido à sua violência extrema e suposta mensagem anti-imigração.", "titulo_pt": "Diretor alemão diz que filme com Armie Hammer foi proibido na Alemanha", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}], "ciencia_tecnologia": [{"id": 6222, "titulo": "IEEE Rolls Out Large Language Models Virtual Training Course", "url": "https://spectrum.ieee.org/large-language-models-ieee-course", "fonte_id": "ieee_spectrum", "data_pub": "2026-06-19T18:00:00Z", "idioma": "en", "texto_pt": "Grandes modelos de linguagem saíram dos laboratórios de pesquisa e se integram ao fluxo diário de trabalho dos engenheiros. Eles são usados como motores de raciocínio para orquestrar tarefas complexas, incluindo a identificação de vulnerabilidades no código-fonte e a transformação de discussões projetuais fragmentadas em especificações técnicas rigorosas. A demanda por esse conhecimento está aumentando à medida que os modelos de IA se integram cada vez mais na prática técnica.", "titulo_pt": "IEEE Lança Curso Virtual de Treinamento sobre Grandes Modelos de Linguagem", "veiculo": "IEEE Spectrum", "pais": "EUA", "classe": "A"}, {"id": 6254, "titulo": "Scientists pop the cork on the hidden chemistry inside wine bottles", "url": "https://www.scientificamerican.com/article/scientists-pop-the-cork-on-the-hidden-chemistry-inside-wine-bottles/", "fonte_id": "scientific_american", "data_pub": "2026-06-19T18:00:00Z", "idioma": "en", "texto_pt": "Um novo estudo explora como carvalho, vinho e ar interagem ao longo do tempo dentro das garrafas. A pesquisa captura os detalhes da complexa química envolvida nesse processo.", "titulo_pt": "Cientistas abrem o champagne sobre a química oculta dentro das garrafas de vinho", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 5997, "titulo": "How to Think About AI Before It’s Too Late", "url": "https://www.theatlantic.com/podcasts/2026/06/how-to-think-about-ai-before-its-too-late/687644/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-19T17:00:00Z", "idioma": "en", "texto_pt": "O artigo discute a necessidade de refletir sobre as implicações da Inteligência Artificial antes que seu impacto seja irreversível. O autor sugere uma abordagem cautelosa e informada em relação às expectativas exageradas acerca das capacidades atuais e futuras da IA.", "titulo_pt": "Como Pensar Sobre IA Antes que Seja Tarde demais", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 6258, "titulo": "MDA Space to buy Blue Canyon Technologies to gain foothold in U.S. market", "url": "https://spacenews.com/mda-space-to-buy-blue-canyon-technologies-to-gain-foothold-in-u-s-market/", "fonte_id": "spacenews", "data_pub": "2026-06-19T16:03:00Z", "idioma": "en", "texto_pt": "A MDA Space está comprando a fabricante de satélites pequenos Blue Canyon Technologies por 620 milhões de dólares, expandindo assim sua presença no mercado lucrativo dos Estados Unidos.", "titulo_pt": "MDA Space adquire Blue Canyon Technologies para ampliar presença no mercado americano", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 6272, "titulo": "DeBriefed 19 June 2026: Bonn talks end in ‘gridlock’ | Energy’s ‘new era’ | Oceans in climate negotiations", "url": "https://www.carbonbrief.org/debriefed-19-june-2026-bonn-talks-end-in-gridlock-energys-new-era-oceans-in-climate-negotiations/", "fonte_id": "carbon_brief", "data_pub": "2026-06-19T15:39:00Z", "idioma": "en", "texto_pt": "O relatório desta semana do Carbon Brief aborda as conversações em Bonn que terminaram em impasse, a nova era da energia e o papel dos oceanos nos debates climáticos.", "titulo_pt": "DeBriefed 19 de junho de 2026: Conversações em Bonn terminam em 'impasse' | Nova era da energia | Oceanos nas negociações climáticas", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 6273, "titulo": "Bonn climate talks: Key outcomes from the June 2026 UN climate conference", "url": "https://www.carbonbrief.org/bonn-climate-talks-key-outcomes-from-the-june-2026-un-climate-conference/", "fonte_id": "carbon_brief", "data_pub": "2026-06-19T15:16:00Z", "idioma": "en", "texto_pt": "Duas semanas de negociações tensas nas Nações Unidas em Bonn, Alemanha, resultaram em poucos avanços concretos...", "titulo_pt": "Reuniões climáticas de Bonn: Principais resultados da conferência das Nações Unidas sobre clima de junho de 2026", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 5612, "titulo": "Nova técnica identifica estrelas que engoliram planetas", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/06/nova-tecnica-identifica-estrelas-que-engoliram-planetas.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-19T15:00:00Z", "idioma": "pt", "texto_pt": "Uma equipe internacional, liderada por pesquisadores da Universidade de São Paulo (USP), desenvolveu um método para detectar estrelas que engoliram planetas ao seu redor, baseado na variação da abundância do berílio. A técnica promete fornecer novos insights sobre a evolução dos sistemas planetários.", "titulo_pt": "Nova técnica identifica estrelas que engoliram planetas", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 6259, "titulo": "ElevationSpace Secures US $40 Million in Series B Funding, Bringing Total Raised to US $63.5 Million", "url": "https://spacenews.com/elevationspace-secures-us-40-million-in-series-b-funding-bringing-total-raised-to-us-63-5-million/", "fonte_id": "spacenews", "data_pub": "2026-06-19T14:52:00Z", "idioma": "en", "texto_pt": "A ElevationSpace Inc., com CEO Ryohei Kobayashi, que desenvolve transporte Espaço-Terrestre e uma Plataforma de Uso e Recuperação do Ambiente Espacial, arrecadou US$ 40 milhões em sua rodada B de financiamento, elevando o total arrecadado para US$ 63,5 milhões.", "titulo_pt": "ElevationSpace Conseguiu US$ 40 Milhões na Rodada B de Financiamento, Elevando o Total Arrecadado para US$ 63,5 Milhões", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 6221, "titulo": "The Most Promising Ebola Vaccine Has Been Sitting on the Shelf for 15 Years", "url": "https://www.wired.com/story/ebola-vaccine-sitting-on-shelf-for-15-years/", "fonte_id": "wired", "data_pub": "2026-06-19T14:23:00Z", "idioma": "en", "texto_pt": "Depois de anos desde os primeiros testes, pesquisadores estão agora correndo para verificar se uma vacina desenvolvida em 2011 pode ajudar a combater a atual epidemia de Bundibugyo na Congo.", "titulo_pt": "A Vacina Mais Promissora contra a Ébola Estava Pronta há 15 Anos", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 6249, "titulo": "STAT+: Up and down the ladder: The latest comings and goings", "url": "https://www.statnews.com/pharmalot/2026/06/19/up-and-down-the-ladder-jobs-bristol-novartis-pfizer-moderna-astrazeneca/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-19T14:00:00Z", "idioma": "en", "texto_pt": "Este relatório abrange as últimas n", "texto_pt": "Astrônomos podem ter encontrado os restos de duas estrelas falecidas há muito tempo que eram irmãs. Eles suspeitam que uma dessas estrelas explodiu como supernova, deixando trás os restos detectados.", "titulo_pt": "Cientistas descobrem restos da 'irmã' supernova do Nebuloso dos Moluscos", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 6261, "titulo": "The MEO durability crisis: why LEO hardware will fail the new orbital economy", "url": "https://spacenews.com/the-meo-durability-crisis-why-leo-hardware-will-fail-the-new-orbital-economy/", "fonte_id": "spacenews", "data_pub": "2026-06-19T13:00:00Z", "idioma": "en", "texto_pt": "O espaço é visto por alguns como a última fronteira, mas na realidade existem várias fronteiras espaciais uma vez que se sai da atmosfera terrestre. O post discute a crise de durabilidade da MEO e explica por que o hardware da LEO pode falhar na nova economia orbital.", "titulo_pt": "A crise de durabilidade da MEO: por que o hardware da LEO falhará na nova economia orbital", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 5583, "titulo": "What Amazon’s Astro Taught Me About Giving Robots a Soul", "url": "https://spectrum.ieee.org/amazon-astro-robot-sound", "fonte_id": "ieee_spectrum", "data_pub": "2026-06-19T12:24:00Z", "idioma": "en", "texto_pt": "Em 2018, a Amazon contratou o autor como designer de som UX principal para o Astro, seu primeiro robô doméstico consumista. O Astro usava câmeras e sensores para mapear e navegar em casa e no trabalho, podendo patrulhar proativamente, verificar os entes queridos e transportar pequenos itens usando um compartimento integrado. Inicialmente, não havia direção de personagem definida.", "titulo_pt": "O que o Astro da Amazon Me Ensina Sobre Dar Alma a Robôs", "veiculo": "IEEE Spectrum", "pais": "EUA", "classe": "A"}, {"id": 5573, "titulo": "The Download: AI bottleneck debates, and BCI trials take off", "url": "https://www.technologyreview.com/2026/06 const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const rot = n.topico ? (D.rotulos_topico[n.topico] || n.topico) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(n.topico || '')}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
</body>
