oles", "pais": "Brasil", "classe": "B"}, {"id": 13409, "titulo": "Living under Paris's zinc roofs in 40°C heat: 'One day, the people living there will look for those responsible'", "url": "https://www.lemonde.fr/en/economy/article/2026/06/23/living-under-paris-s-zinc-roofs-in-40-c-heat-one-day-the-people-living-there-will-look-for-those-responsible_6754804_19.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-23T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Com o calor extremo na França, muitos desses espaços no topo dos edifícios se tornaram inabitáveis. Alguns moradores formaram grupos para exigir aos seus proprietários, vizinhos e autoridades locais que resolvam suas condições de vida.", "titulo_pt": "Vivendo sob os telhados de zinco de Paris com 40°C: 'Um dia, as pessoas que moram lá procurarão os responsáveis'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 13046, "titulo": "Câmera flagrou mulher agredindo filha de Oswaldo Eustáquio no DF", "url": "https://www.metropoles.com/colunas/mirelle-pinheiro/camera-flagrou-mulher-agredindo-filha-de-oswaldo-eustaquio-no-df", "fonte_id": "metropoles", "data_pub": "2026-06-23T17:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Mariana Eustáquio, filha do jornalista Oswaldo Eustáquio, foi agredida em 13 de junho em um bar em Brasília. A agressão foi registrada por câmeras de segurança. O caso está sendo investigado.", "titulo_pt": "Câmera flagrou mulher agredindo filha de Oswaldo Eustáquio no DF", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 12866, "titulo": "Jogo tem hora marcada. A violência também?", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/deborah-bizarria/2026/06/jogo-tem-hora-marcada-a-violencia-tambem.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-23T15:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Quando o Brasil jogar contra a Escócia amanhã às 19h, as cidades pararão para assistir à partida. A paixão pelo futebol pode gerar pertencimento e memória coletiva, mas resultados inesperados podem aumentar o risco de violência doméstica.", "titulo_pt": "Jogo tem hora marcada. E a violência?", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 12090, "titulo": "As brigas familiares que abalam jogadores, esposas e parentes: de Endrick a Raphinha", "url": "https://veja.abril.com.br/esporte/as-brigas-familiares-que-abalam-jogadores-esposas-e-parentes-de-endrick-a-raphinha/", "fonte_id": "veja", "data_pub": "2026-06-23T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Mães, pais e ex-mulheres de atletas têm protagonizado conflitos públicos com os jogadores.  Indretas e alfinetadas públicas são comuns em casos envolvendo figuras como Endrick e Raphinha.", "titulo_pt": "As brigas familiares que abalam jogadores, esposas e parentes: de Endrick a Raphinha", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 12197, "titulo": "Epidemia de solidão: o que é e quais os impactos na saúde", "url": "https://www.bbc.co.uk/portuguese/articles/c70y13rp410o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-23T09:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Centenas de milhares de pessoas morrem anualmente devido à solidão. Estar desconectado da sociedade tem efeitos na saúde comparáveis a fumar 15 cigarros por dia.", "titulo_pt": "Epidemia de Solidão: O Que É e Quais os Impactos na Saúde", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 12680, "titulo": "Women in electronic music face long-term career hurdles, panelists say", "url": "https://www.koreaherald.com/article/10785695", "fonte_id": "korea_herald", "data_pub": "2026-06-23T09:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Durante um painel no evento Fete de la Musique+, especialistas afirmaram que a sustentabilidade continua sendo um grande desafio para mulheres buscando carreiras duradouras na música eletrônica. O painel, moderado pela musicista francesa Oriane Dessaux, examinou o papel das mulheres na cultura contemporânea e os obstáculos que enfrentam para manterem suas carreiras musicais.  Artistas como S.Telecom e Haihm, além de Alexis Leger, fundadora da Posture Clu, participaram do debate.", "titulo_pt": "Mulheres na música eletrônica enfrentam obstáculos para carreiras de longo prazo, dizem especialistas", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 12480, "titulo": "Seven injured, including two children, after vehicle mounts bar terrace in Malaga", "url": "http://www.euronews.com/my-europe/2026/06/23/seven-injured-including-two-children-after-vehicle-mounts-bar-terrace-in-malaga", "fonte_id": "euronews", "data_pub": "2026-06-23T08:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um carro atingiu clientes em um terraço de bar na cidade de Málaga.  Polícia investiga se o motorista teve um problema de saúde ao volante. Sete pessoas ficaram feridas, incluindo duas crianças.", "titulo_pt": "Sete feridos, incluindo duas crianças, após veículo invadir terraço de bar em Málaga", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 12238, "titulo": "Transformação positiva do Estado e redução de desigualdades no serviço público federal", "url": "https://www.jota.info/opiniao-e-analise/artigos/transformacao-positiva-do-estado-e-reducao-de-desigualdades-no-servico-publico-federal", "fonte_id": "jota", "data_pub": "2026-06-23T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A consolidação da carreira ATPE é vista como um avanço na organização da força de trabalho do Estado brasileiro. O objetivo é promover uma transformação positiva do Estado e reduzir desigualdades no serviço público federal.", "titulo_pt": "Transformação Positiva do Estado e Redução de Desigualdades no Serviço Público Federal", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 13624, "titulo": "Drills aim to prepare public for 40°C heat", "url": "https://www.taipeitimes.com/News/front/archives/2026/06/24/2003859628", "fonte_id": "taipei_times", "data_pub": "2026-06-24T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Taiwan está realizando simulações para treinar as autoridades e o público para lidar com temperaturas que podem chegar a 40°C. O objetivo é garantir uma resposta rápida e eficaz em caso de ondas de calor intensas. As simulações incluem exercícios de gerenciamento de energia, atendimento médico e apoio à população.", "titulo_pt": "Simulações visam preparar a população para calor de 40°C", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 13627, "titulo": "Europe heat wave closes schools, threatens health", "url": "https://www.taipeitimes.com/News/front/archives/2026/06/24/2003859631", "fonte_id": "taipei_times", "data_pub": "2026-06-24T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma onda de calor está atingindo a Europa, levando ao fechamento de escolas em vários países. As altas temperaturas também representam um risco para a saúde pública, com recomendações de precaução emitidas pelas autoridades.", "titulo_pt": "Ondas de calor na Europa fecham escolas e ameaçam a saúde", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 13637, "titulo": "Evacuations advised after barrier lake spotted in Hualien", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/24/2003859647", "fonte_id": "taipei_times", "data_pub": "2026-06-24T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma barragem natural foi identificada em Hualien, Taiwan. As autoridades recomendaram evacuações preventivas para áreas próximas ao lago devido ao risco de rompimento. O nível do lago está sendo monitorado.", "titulo_pt": "Evacuações recomendadas após formação de lago barreira em Hualien", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 14219, "titulo": "France's succession of scorching spells reignites the battle for window shutters in major cities", "url": "https://www.lemonde.fr/en/france/article/2026/06/24/france-s-succession-of-scorching-spells-reignites-the-battle-for-window-shutters-in-major-cities_6754811_7.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-23T23:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Quase 40% das casas na França não possuem proteção solar adequada contra o calor.  Funcionários locais e inquilinos estão exigindo que os proprietários instalem soluções para proteger os apartamentos do excesso de calor.", "titulo_pt": "Sequência de ondas de calor na França reacende disputa por persianas nas grandes cidades", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 14248, "titulo": "Europe wilts under record heat as AC sales soar", "url": "https://www.euractiv.com/news/europe-wilts-under-record-heat-as-ac-sales-soar/", "fonte_id": "euractiv", "data_pub": "2026-06-23T23:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Padrões atmosféricos estão aprisionando o ar quente por dias, elevando as temperaturas constantemente. Especialistas dizem que esse fenômeno é agravado pelo aquecimento global.", "titulo_pt": "Europa sofre com calor recorde enquanto vendas de ar condicionado aumentam", "veiculo": "Euractiv", "pais": "Europa", "classe": "B"}, {"id": 14343, "titulo": "CCC: Faster electrification of UK will ‘put money back into people’s pockets’", "url": "https://www.carbonbrief.org/ccc-faster-electrification-of-uk-will-put-money-back-into-peoples-pockets/", "fonte_id": "carbon_brief", "data_pub": "2026-06-23T23:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Segundo o Comitê Consultivo de Clima (CCC), a eletrificação acelerada é a melhor maneira de garantir contas de energia mais baixas e uma segurança energética mais forte. O CCC argumenta que essa medida colocará dinheiro de volta nos bolsos das pessoas e ajudará a atingir os objetivos climáticos do Reino Unido.", "titulo_pt": "CCC: Eletrificação mais rápida do Reino Unido 'devolverá dinheiro aos bolsos das pessoas'", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 13990, "titulo": "Chuva provoca alagamentos em São Paulo e alerta vermelho na ZL", "url": "https://www.cnnbrasil.com.br/nacional/sudeste/sp/chuva-provoca-alagamentos-em-sao-paulo-e-alerta-vermelho-na-zl/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-23T22:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Chuvas intensas, causadas por uma frente fria, atingiram São Paulo durante a noite de terça-feira (23). O temporal provocou alagamentos na cidade, especialmente na Zona Leste. O CGE informa que a frente fria continua atuando na região com variações de intensidade.", "titulo_pt": "Chuva causa alagamentos em São Paulo e alerta vermelho na Zona Leste", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 14293, "titulo": "US's climate.gov site, taken down by Trump, relaunched by nonprofit", "url": "https://arstechnica.com/science/2026/06/uss-climate-gov-site-taken-down-by-trump-relaunched-by-nonprofit/", "fonte_id": "ars_technica", "data_pub": "2026-06-23T22:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O site climate.us foi restaurado e agora contém todo o conteúdo que havia sido removido pelo governo durante a administração de Donald Trump. O site é agora mantido por uma organização sem fins lucrativos.", "titulo_pt": "Site climático do governo americano, retirado por Trump, é relançado por organização sem fins lucrativos", "veiculo": "Ars Technica", "pais": "EUA", "classe": "B"}, {"id": 14246, "titulo": "Massive fire rips through Indonesia sandal factory", "url": "https://www.aljazeera.com/video/newsfeed/2026/6/23/massive-fire-rips-through-indonesia-sandal-factory?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-23T21:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio de grandes proporções destruiu uma fábrica de sandálias em Tangerang, Indonésia. O fogo se espalhou para uma área de armazenamento de gás, agravando os danos.", "titulo_pt": "Incêndio devastador atinge fábrica de sandálias na Indonésia", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 13190, "titulo": "Se aproxima una ciclogénesis que traerá el pico de frío más alto de la semana, tormentas y ráfagas de 90 km/h: las zonas afectadas", "url": "https://www.lanacion.com.ar/sociedad/se-aproxima-una-ciclogenesis-que-traera-el-pico-de-frio-mas-alto-de-la-semana-tormentas-y-rafagas-de-nid23062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-23T21:03:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Após dias com temperaturas extremas, uma mudança climática pode trazer chuvas intensas, ventos fortes e uma nova onda de ar polar em diferentes regiões do país. As condições climáticas mais severas estão previstas para o pico da semana.", "titulo_pt": "Ciclogênese se aproxima trazendo pico de frio, tempestades e rajadas de 90 km/h: áreas afetadas", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 14013, "titulo": "Sob calor recorde e ceticismo, semana do clima em Londres reúne 75 mil e cobra ação", "url": "https://exame.com/esg/sob-calor-recorde-e-ceticismo-semana-do-clima-em-londres-reune-75-mil-e-cobra-acao/", "fonte_id": "exame", "data_pub": "2026-06-23T19:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A London Climate Action Week, a maior edição até o momento, reuniu 75 mil pessoas em Londres. O evento focou na pressão por ações concretas para combater as mudanças climáticas, em vez de convencer sobre a necessidade da ação.", "titulo_pt": "Sob calor recorde e ceticismo, semana do clima em Londres reúne 75 mil e cobra ação", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 13319, "titulo": "France records hottest day ever as 40 people drown across country", "url": "https://www.theguardian.com/world/2026/jun/23/heatwave-france-spain-italy-europe", "fonte_id": "guardian_world", "data_pub": "2026-06-23T16:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A França registrou seu dia mais quente desde que os registros começaram em 1947. Pelo menos 40 pessoas morreram afogadas enquanto nadavam em áreas não supervisionadas nos últimos dias.", "titulo_pt": "França registra dia mais quente já registrado enquanto 40 pessoas se afogam no país", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 13314, "titulo": "Tasmanian devils, swift parrots, black swans: the animals at risk if bird flu takes off in Australia", "url": "https://www.theguardian.com/australia-news/2026/jun/24/h5n1-bird-flu-australia-native-bird-mammal-species-at-risk", "fonte_id": "guardian_world", "data_pub": "2026-06-23T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de 150 espécies de aves nativas e únicas da Austrália foram avaliadas como estando em “muito alto risco” de extinção ou declínio significativo se contraírem a cepa H5N1 da gripe aviária. O estudo do governo federal sobre as 800 diferentes aves e 350 mamíferos da Austrália reflete o alto nível de preocupação entre os especialistas com a chegada da H5N1.", "titulo_pt": "Diablos-da-tasmânia, papagaios-rapidos e cisnes negros: os animais em risco se a gripe aviária se espalhar na Austrália", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 13776, "titulo": "Cited 23 June 2026: Project Cosmos launch | Science ‘under attack’ at Bonn | Emissions inequality", "url": "https://www.carbonbrief.org/cited-23-june-project-cosmos-launch-science-under-attack-at-bonn-emissions-inequality/", "fonte_id": "carbon_brief", "data_pub": "2026-06-23T14:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Carbon Brief publica um resumo de pesquisas climáticas recentes. O artigo destaca o lançamento do Projeto Cosmos, a percepção de que a ciência está sendo atacada em Bonn e as disparidades na distribuição das emissões.", "titulo_pt": "Lançamento do Projeto Cosmos | Ciência 'sob ataque' em Bonn | Desigualdade nas Emissões", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 13777, "titulo": "Prof Philippe Ciais: The world’s most highly cited climate scientist", "url": "https://www.carbonbrief.org/prof-philippe-ciais-the-worlds-most-highly-cited-climate-scientist/", "fonte_id": "carbon_brief", "data_pub": "2026-06-23T13:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Philippe Ciais dedica quase quatro décadas a pesquisar o ciclo de carbono do planeta. Ele é considerado o cientista climático mais citado do mundo.  O Carbon Brief publicou uma matéria sobre sua trajetória.", "titulo_pt": "Prof. Philippe Ciais: O cientista climático mais citado do mundo", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 13778, "titulo": "Prof Detlef van Vuuren: The climate scientist most cited by the IPCC", "url": "https://www.carbonbrief.org/prof-detlef-van-vuuren-the-climate-scientist-most-cited-by-the-ipcc/", "fonte_id": "carbon_brief", "data_pub": "2026-06-23T13:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Detlef van Vuuren é um dos principais modeladores climáticos do mundo. Ele é frequentemente citado pelo Grupo Intergovernamental de Especialistas sobre Mudança Climática (IPCC). Van Vuuren contribui para o entendimento das mudanças climáticas e seus impactos.", "titulo_pt": "Prof. Detlef van Vuuren: O cientista climático mais citado pelo IPCC", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 13416, "titulo": "Saudi Arabia has executed 100 people so far this year", "url": "https://www.lemonde.fr/en/international/article/2026/06/23/saudi-arabia-has-executed-100-people-so-far-this-year_6754805_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-23T18:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Arábia Saudita executou 100 pessoas até o momento em 2023.  65 das execuções foram por condenações relacionadas a crimes de drogas, segundo a Agence France-Presse.", "titulo_pt": "Arábia Saudita Executou 100 Pessoas Este Ano", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 13600, "titulo": "Harassed GSDF member’s PTSD recognized as on-duty illness", "url": "https://www.japantimes.co.jp/news/2026/06/23/japan/ptsd-on-duty-illness-gsdf/", "fonte_id": "japan_times", "data_pub": "2026-06-23T11:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um membro masculino do Exército de Autodefesa do Japão (GSDF) teve seu Transtorno de Estresse Pós-Traumático (TEPT) reconhecido como uma doença ocupacional. Ele afirmou ter sido forçado por colegas superiores a usar roupas femininas e expor suas partes íntimas desde que ingressou no serviço em 2006.", "titulo_pt": "Doença do Trauma de Guerra Reconhecida como Acidente de Trabalho de Membro da GSDF Acusado de Assédio", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 12462, "titulo": "'Palestinian children deliberately targeted' by Israel in ongoing 'genoicide,' says UN report", "url": "https://www.lemonde.fr/en/international/article/2026/06/23/palestinian-children-deliberately-targeted-by-israel-in-ongoing-genoicide-says-un-report_6754785_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-23T10:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um relatório publicado na terça-feira pela Comissão Internacional Independente de Investigação da ONU concluiu que as operações militares israelenses em grande escala e sistemáticas resultaram em mortes, ferimentos e traumas 'sem precedentes' em crianças palestinianas. O relatório afirma que o nível e a natureza sistemática das operações militares israelenses tiveram um impacto desproporcional nas crianças palestinianas.", "titulo_pt": "'Crianças palestinianas deliberadamente alvo' do Israel em genocídio em curso, diz relatório da ONU", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 12627, "titulo": "Israel targeted Palestinian children resulting in genocide, U.N. inquiry reports", "url": "https://www.japantimes.co.jp/news/2026/06/23/world/israel-gaza-children-target-un-report/", "fonte_id": "japan_times", "data_pub": "2026-06-23T08:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma comissão da ONU afirmou que crianças palestinianas foram mortas deliberadamente durante a guerra, incluindo após o cessar-fogo entrar em vigor em outubro de 2025. O relatório afirma que essas ações constituem genocídio.", "titulo_pt": "Relatório da ONU: Israel visou crianças palestinianas, resultando em genocídio", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 12619, "titulo": "Cruel Journey: How Frozen Migrants Seeking New Life Lost Limbs in Bosnia", "url": "https://balkaninsight.com/2026/06/23/cruel-journey-how-frozen-migrants-seeking-new-life-lost-limbs-in-bosnia/bi/", "fonte_id": "balkan_insight", "data_pub": "2026-06-23T08:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Três migrantes sudaneses tiveram as pernas amputadas após sofrerem congelamento enquanto tentavam atravessar uma montanha da Bósnia para a União Europeia. Os migrantes aparentemente foram abandonados pelo sistema de saúde da Bósnia.", "titulo_pt": "Viagem Cruel: Como Migrantes Congelados em Busca de Nova Vida Perderam Membros na Bósnia", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}, {"id": 12631, "titulo": "81 years on, ex-Okinawa wartime student nurse urges no more war", "url": "https://www.japantimes.co.jp/news/2026/06/23/japan/okinawa-wartime-student-nurse/", "fonte_id": "japan_times", "data_pub": "2026-06-23T07:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em Okinawa, que celebra o 81º aniversário do fim da batalha terrestre, Onaga, residente de Naha, faz um apelo por paz em meio às crescentes tensões internacionais. Ela é uma ex-enfermeira de guerra do período da Segunda Guerra Mundial.", "titulo_pt": "Após 81 anos, ex-enfermeira de guerra do Okinawa pede fim para mais guerras", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 12370, "titulo": "Whistleblower investigating Ecuadorian president’s family business was murdered, activists say", "url": "https://www.theguardian.com/world/2026/jun/23/monika-silva-koniuszek-ecuador-president-family-business", "fonte_id": "guardian_world", "data_pub": "2026-06-23T06:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Monika Silva Koniuszek, uma ativista polaca contra a corrupção de 41 anos, morreu na sua casa em Montañita, Equador. Uma autópsia revelou que ela morreu por um golpe na cabeça e estrangulamento, apesar da afirmação do governo de suicídio. Ativistas no Equador dizem que ela foi assassinada para silenciá-la.", "titulo_pt": "Informante investigando negócio da família do presidente equatoriano foi assassinado, dizem ativistas", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 12464, "titulo": "Amnesty slams EU migration cooperation with 'xenophobic and racist' Libya", "url": "https://www.lemonde.fr/en/le-monde-africa/article/2026/06/23/amnesty-slams-eu-migration-cooperation-with-xenophobic-and-racist-libya_6754773_124.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-23T05:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Amnistia Internacional afirmou que a União Europeia já é 'cómplice de violações e abusos horríveis' devido ao seu apoio financeiro para a guarda costeira libanesa. A guarda costeira libanesa intercepta regularmente embarcações com migrantes.", "titulo_pt": "Amnistia critica cooperação da UE com a Líbia, chamando-a de 'xenofóbica e racista'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 11824, "titulo": "Lawmakers plan bill to provide aid to civilian victims of World War II", "url": "https://www.japantimes.co.jp/news/2026/06/23/japan/civilian-victims-aid-bill/", "fonte_id": "japan_times", "data_pub": "2026-06-23T03:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um projeto de lei será apresentado ao parlamento japonês para auxiliar as vítimas civis da Segunda Guerra Mundial.  Será a primeira iniciativa desse tipo em 38 anos.", "titulo_pt": "Deputados planejam projeto para ajudar vítimas civis da Segunda Guerra Mundial", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 12465, "titulo": "Ten years after MP Jo Cox's assassination, 'lessons have not been learned' in the UK", "url": "https://www.lemonde.fr/en/international/article/2026/06/23/ten-years-after-mp-jo-cox-s-assassination-lessons-have-not-been-learned-in-the-united-kingdom_6754770_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-23T02:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A deputada trabalhista britânica Jo Cox foi assassinada por um neonazista e supremacista branco em 16 de junho de 2016.  Homenagens à sua memória se multiplicaram, especialmente da sua irmã mais nova, que assumiu seu trabalho e foi eleita no mesmo distrito.", "titulo_pt": "Dez anos após assassinato de Jo Cox, 'lições não foram aprendidas' no Reino Unido", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 11750, "titulo": "Ukrainian photographer Vic Bakin captures the traces of war left on the bodies and landscapes left behind", "url": "https://www.lemonde.fr/en/m-le-mag/article/2026/06/23/ukrainian-photographer-vic-bakin-captures-the-traces-of-war-left-on-the-bodies-and-landscapes-left-behind_6754768_117.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-23T01:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Vic Bakin começou a registrar o conflito na Ucrânia através de fotografias em fevereiro de 2022. Sua série 'Epitome', composta por imagens pessoais e às vezes alteradas, mistura retratos de jovens ucranianos. A série recebeu vários prêmios desde então.", "titulo_pt": "Fotógrafo ucraniano Vic Bakin registra as marcas da guerra nos corpos e paisagens deixadas para trás", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 11342, "titulo": "Aumenta a 52 la cifra de niños haitianos ubicados y PDI descarta pasividad ante situaciones “inusuales”", "url": "https://www.latercera.com/nacional/noticia/aumenta-a-52-la-cifra-de-ninos-haitianos-ubicados-y-pdi-descarta-pasividad-ante-situaciones-inusuales/", "fonte_id": "la_tercera", "data_pub": "2026-06-23T01:07:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O número total de crianças haitianas encontradas e registradas no Chile chegou a 52.  De acordo com o diretor nacional da PDI, todos os menores estavam acompanhados de responsáveis legais e matriculados em escolas. A polícia chilena afirmou que todas as crianças entraram no país com documentação válida.", "titulo_pt": "Número de crianças haitianas localizadas no Chile chega a 52", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 11456, "titulo": "Indian man jailed for molesting flight attendant on Singapore Airlines plane", "url": "https://www.scmp.com/news/asia/southeast-asia/article/3357984/indian-man-jailed-molesting-flight-attendant-singapore-airlines-plane?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-23T00:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um passageiro de um voo da Singapore Airlines importunou uma comissária de bordo, enquanto seus amigos riam. O homem seguiu a comissária até a cozinha do avião e a aprisionou. O capitão do voo relatou o incidente para a polícia, que prendeu o homem ao chegar no Aeroporto Changi.", "titulo_pt": "Homem indiano preso por importunar comissária de bordo em voo da Singapore Airlines", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 10718, "titulo": "Military company commander indicted for racist verbal abuse", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/23/2003859584", "fonte_id": "taipei_times", "data_pub": "2026-06-23T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um comandante militar foi indiciado por abuso verbal racista contra soldados. O caso ocorreu no quartel da 2ª Brigada de Infantaria Mecanizada do Exército em Taiwan.  O comandante fez comentários racistas durante uma reunião.", "titulo_pt": "Comandante militar indiciado por abuso verbal racista", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}], "direitos_humanos__eventos": []}, "noticias": [{"id": 13624, "fonte_id": "taipei_times", "titulo": "Drills aim to prepare public for 40°C heat", "url": "https://www.taipeitimes.com/News/front/archives/2026/06/24/2003859628", "data_pub": "2026-06-24T00:00:00Z", "topico": "meio_ambiente", "idioma": "en", "titulo_pt": "Simulações visam preparar a população para calor de 40°C", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 13627, "fonte_id": "taipei_times", "titulo": "Europe heat wave closes schools, threatens health", "url": "https://www.taipeitimes.com/News/front/archives/2026/06/24/2003859631", "data_pub": "2026-06-24T00:00:00Z", "topico": "meio_ambiente", "idioma": "en", "titulo_pt": "Ondas de calor na Europa fecham escolas e ameaçam a saúde", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 13637, "fonte_id": "taipei_times", "titulo": "Evacuations advised after barrier lake spotted in Hualien", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/24/2003859647", "data_pub": "2026- sobre centros de dados orbitais", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 12694, "fonte_id": "korea_herald", "titulo": "Divorced men fear asset split, women fear losing freedom: survey", "url": "https://www.koreaherald.com/article/10785484", "data_pub": "2026-06-23T06:29:00Z", "topico": "sociedade", "idioma": "en", "titulo_pt": "Homens divorciados temem divisão de bens, mulheres perdem a liberdade: pesquisa", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 12567, "fonte_id": "euractiv", "titulo": "HARVEST: The ‘three Fs’ challenge", "url": "https://www.euractiv.com/news/harvest-the-three-fs-challenge/", "data_pub": "2026-06-23T06:13:00Z", "topico": "meio_ambiente", "idioma": "en", "titulo_pt": "COLHEITA: O desafio dos 'três Fs'", "veiculo": "Euractiv", "pais": "Europa", "classe": "B"}, {"id": 12620, "fonte_id": "balkan_insight", "titulo": "Russian Despatch: Can Balkan Advances Offset Losses on Other Fronts?", "url": "https://balkaninsight.com/2026/06/23/russian-despatch-can-balkan-advances-offset-losses-on-other-fronts/bi/", "data_pub": "2026-06-23T06:01:00Z", "topico": "geopolitica", "idioma": "en", "titulo_pt": "Avanços na Bálcãs Compensam Perdas em Outros Fronts?", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}, {"id": 12370, "fonte_id": "guardian_world", "titulo": "Whistleblower investigating Ecuadorian president’s family business was murdered, activists say", "url": "https://www.theguardian.com/world/2026/jun/23/monika-silva-koniuszek-ecuador-president-family-business", "data_pub": "2026-06-23T06:00:00Z", "topico": "direitos_humanos", "idioma": "en", "titulo_pt": "Informante investigando negócio da família do presidente equatoriano foi assassinado, dizem ativistas", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 12621, "fonte_id": "balkan_insight", "titulo": "BIRN Investigation into OnlyFans Management Agency Leads to Charges in Czechia", "url": "https://balkaninsight.com/2026/06/23/birn-investigation-into-onlyfans-management-agency-leads-to-charges-in-czechia/rd/", "data_pub": "2026-06-23T05:59:00Z", "topico": "politica_internacional", "idioma": "en", "titulo_pt": "Investigação sobre agência de gestão do OnlyFans leva a acusações na República Checa", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}]};
const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
