pital", "pais": "Brasil", "classe": "B"}, {"id": 69339, "titulo": "Corpo de empresário sequestrado e morto em Carapicuíba é velado", "url": "https://www.metropoles.com/sao-paulo/empresario-morto-carapicuiba-velado", "fonte_id": "metropoles", "data_pub": "2026-07-24T12:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O corpo de um empresário sequestrado e morto foi encontrado pela Polícia Militar em Carapicuíba no dia 23 de julho. O velório e o sepultamento ocorrerão localmente.", "titulo_pt": "Corpo de empresário sequestrado e morto em Carapicuíba é velado", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 70704, "titulo": "Ministry aims to boost offshore wind generation", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/25/2003861327", "fonte_id": "taipei_times", "data_pub": "2026-07-25T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Ministério tem como objetivo aumentar a geração de energia eólica offshore.", "titulo_pt": "Ministério visa aumentar geração de energia eólica offshore", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 70583, "titulo": "Tens of thousands flee forest wildfires in France and Spain", "url": "https://www.lemonde.fr/en/international/article/2026/07/24/tens-of-thousands-flee-forest-wildfires-in-france-and-spain_6755802_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-24T17:43:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Aproximadamente 44 mil pessoas deixaram a península de Cap Ferret, famosa por seus moradores ricos, localizada ao sul da Bordeaux. Ambos os países, França e Espanha, solicitaram ajuda de combate a incêndios do EU.", "titulo_pt": "Cerca de 44 mil pessoas fogem das florestas em chamas na França e Espanha", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 70215, "titulo": "El Niño atinge intensidade jamais vista para julho e reforça risco de evento histórico", "url": "https://veja.abril.com.br/agenda-verde/el-nino-atinge-intensidade-jamais-vista-para-julho-e-reforca-risco-de-evento-historico/", "fonte_id": "veja", "data_pub": "2026-07-24T17:13:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O fenômeno El Niño está alcançando intensidade sem precedentes para o mês de julho, superando marcas de +2°C meses antes do observado em episódios mais intensos registrados. Isso aumenta o risco de um evento histórico.", "titulo_pt": "El Niño atinge intensidade jamais vista para julho e reforça risco de evento histórico", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 70251, "titulo": "Desmatamento na Amazônia tem menor nível para um 1º semestre em oito anos", "url": "https://www.cnnbrasil.com.br/nacional/brasil/desmatamento-na-amazonia-tem-menor-nivel-para-um-1o-semestre-em-oito-anos/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-24T17:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os dados do Imazon indicam que o desmatamento na Amazônia teve um menor nível para um primeiro semestre em oito anos, representando uma redução de 10% em comparação com 2025 e uma queda significativa de 76% em relação ao recorde de 2022.", "titulo_pt": "Desmatamento na Amazônia atinge nível mais baixo para um primeiro semestre em oito anos", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 70624, "titulo": "Yemen’s valleys and farms are full of dangerous plastic waste", "url": "https://www.aljazeera.com/features/2026/7/24/yemens-valleys-and-farms-are-full-of-dangerous-plastic-waste?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-24T16:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Na vila de Wadi Dawan, na região leste do Iêmen, a beleza natural das valles e campos está ameaçada pela presença significativa de resíduos plásticos perigosos.", "titulo_pt": "Valleys e fazendas do iêmen estão cheias de resíduos plásticos perigosos", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 70298, "titulo": "COP31: Austrália destina quatro vezes mais recursos a fósseis do que a renováveis", "url": "https://exame.com/esg/cop31-australia-destina-quatro-vezes-mais-recursos-a-fosseis-do-que-a-renovaveis/", "fonte_id": "exame", "data_pub": "2026-07-24T14:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Austrália destina quase quatro vezes mais recursos a setores fósseis do que a energias renováveis, mantendo um investimento anual de cerca de US$ 14,1 bilhões no setor fóssil. Ao mesmo tempo, seus parceiros comerciais estão acelerando a transição para fontes de energia mais limpas.", "titulo_pt": "Austrália destina quatro vezes mais recursos a fósseis do que a renováveis", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 70796, "titulo": "Factcheck: No, Europe’s heatwaves are not being ‘caused’ by declining air pollution", "url": "https://www.carbonbrief.org/factcheck-no-europes-heatwaves-are-not-being-caused-by-declining-air-pollution", "fonte_id": "carbon_brief", "data_pub": "2026-07-24T14:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Este verão, a Europa enfrentou uma série de ondas de calor recordes. O post 'Factcheck: Não, as ondas de calor na Europa não estão sendo causadas por uma redução da poluição do ar' discute esse assunto.", "titulo_pt": "Factcheck: não, as ondas de calor na Europa não estão sendo causadas por uma redução da poluição do ar", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 69329, "titulo": "Nevasca deixa 39 mineradores presos em acampamento remoto no Chile", "url": "https://www.metropoles.com/mundo/nevasca-chile-mineradores-presos", "fonte_id": "metropoles", "data_pub": "2026-07-24T12:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um nevão deixou 39 mineradores presos em um acampamento remoto no Chile. Enquanto a empresa afirma que os trabalhadores estão bem e têm instalações funcionando, os mineradores denunciam falta de condições mínimas.", "titulo_pt": "Nevasca deixa 39 mineradores presos em acampamento remoto no Chile", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 69480, "titulo": "Un feroz incendio azota Madrid y el sur de Francia: al menos 80 mil evacuados", "url": "https://www.lanacion.com.ar/el-mundo/un-feroz-incendio-azota-madrid-y-el-sur-de-francia-al-menos-80-mil-evacuados-nid24072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-24T12:49:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O governo espanhol declarou a emergência nacional após um incêndio severo atingir Madrid e o sul da França, obrigando ao menos 80 mil pessoas a serem evacuadas. A onda histórica de calor está intensificando os incêndios em toda a Europa.", "titulo_pt": "Feroz incêndio assola Madrid e sul da França: pelo menos 80 mil evacuados", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 69361, "titulo": "Espanha declara estado de emergência nacional devido aos incêndios florestais", "url": "https://www.infomoney.com.br/mundo/espanha-declara-estado-de-emergencia-nacional-devido-aos-incendios-florestais/", "fonte_id": "infomoney", "data_pub": "2026-07-24T12:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Espanha declarou estado de emergência nacional devido aos incêndios florestais, que ameaçam comunidades próximas a Madri e Ávila em meio a condições climáticas extremas. Este é um dos períodos mais letais para incêndios florestais nos últimos décadas no país.", "titulo_pt": "Espanha declara estado de emergência nacional devido aos incêndios florestais", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 69805, "titulo": "Spain declares national emergency over wildfires", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/24/spain-declares-national-emergency-over-wildfires?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-24T12:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pelo menos 10 mil pessoas foram evacuadas devido a incêndios florestais na região central de Madrid.", "titulo_pt": "Espanha declara estado de emergência por causa dos incêndios", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 69309, "titulo": "França manda esvaziar península inteira por incêndio e 40.000 fogem das chamas; veja fotos", "url": "https://veja.abril.com.br/mundo/franca-manda-esvaziar-peninsula-inteira-por-incendio-e-40-000-fogem-das-chamas-veja-fotos/", "fonte_id": "veja", "data_pub": "2026-07-24T12:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A França ordenou o esvaziamento de toda a península de Cap Ferret, um destino turístico popular na costa do Atlântico, devido a incêndios que consumiram 10.000 hectares de área. Quarenta mil pessoas tiveram que fugir das chamas. O calor extremo no sul da Europa persiste e contribui para as condições propícias aos incêndios.", "titulo_pt": "França ordena esvaziamento total de península por incêndio; 40.000 fogem das chamas", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 69638, "titulo": "Smoky Skies Are Coming Back", "url": "https://www.theatlantic.com/technology/2026/07/what-aqi-readings-really-mean/688048/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-07-24T11:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A qualidade do ar está melhorando, mas ainda há preocupações sobre quando é seguro sair ao ar livre.", "titulo_pt": "Vai voltar o aquecimento das nuvens", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 69613, "titulo": "France orders total evacuation of Cap Ferret peninsula as wildfire spreads", "url": "https://www.theguardian.com/world/2026/jul/24/france-evacuation-cap-ferret-peninsula-wildfire", "fonte_id": "guardian_world", "data_pub": "2026-07-24T11:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A França ordenou o total deslocamento de mais de 40 mil pessoas da península de Cap Ferret, na costa atlântica, devido a uma 'chama intensa e altamente imprevisível'. O incêndio avança em um dos principais destinos de férias do país. A Espanha também declarou estado de emergência nacional por causa de uma série de incêndios fora do controle que ameaçam áreas próximas a Madri, devido ao clima extremo causado pela crise climática.", "titulo_pt": "França ordena total deslocamento da península de Cap Ferret diante de incêndio", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 70057, "titulo": "Access to finance ‘strengthens climate resilience’ among sub-Saharan women", "url": "https://www.carbonbrief.org/access-to-finance-strengthens-climate-resilience-among-sub-saharan-women", "fonte_id": "carbon_brief", "data_pub": "2026-07-24T11:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma nova pesquisa indica que a capacitação financeira das mulheres na África subsaariana pode fortalecer a resiliência familiar face aos choques climáticos. O acesso maior à financiamento poderia melhorar a capacidade das famílias se adaptarem e resistirem a eventos climáticos adversos.", "titulo_pt": "Acesso ao crédito 'fortalece a resiliência climática' entre mulheres da áfrica subsaariana", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 70058, "titulo": "State of the climate: Rapidly developing El Niño raises chance of record-warm 2026", "url": "https://www.carbonbrief.org/state-of-the-climate-rapidly-developing-el-nino-raises-chance-of-record-warm-2026", "fonte_id": "carbon_brief", "data_pub": "2026-07-24T10:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O El Niño está se desenvolvendo rapidamente, aumentando as chances de 2026 ser o ano mais quente desde registros meteorológicos. O fenômeno climático já está em sua metade inicial deste ano.", "titulo_pt": "Estado do clima: El Niño em rápida evolução aumenta probabilidades de 2026 ser o ano mais quente", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 70508, "titulo": "Tribunal acoge solicitud de la defensa de Karen Rojo y abona a su condena 1.463 días que estuvo recluida en Países Bajos", "url": "https://www.latercera.com/nacional/noticia/tribunal-acoge-solicitud-de-la-defensa-de-karen-rojo-y-abona-1463-dias-que-estuvo-recluida-en-paises-bajos/", "fonte_id": "la_tercera", "data_pub": "2026-07-24T15:58:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O tribunal acatou a solicitação da defesa de Karen Rojo, reduzindo sua condenação para 1.463 dias. Com isso, ela teria cerca de um ano a menos para cumprir sua pena.", "titulo_pt": "Tribunal aceita pedido de defesa e diminui condenação de Karen Rojo", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 69917, "titulo": "Malaysia’s refugee registration halt risks ‘ultimate disaster’ for new arrivals", "url": "https://www.scmp.com/week-asia/politics/article/3361746/malaysias-refugee-registration-halt-risks-ultimate-disaster-new-arrivals?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-24T09:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Malásia ordenou ao Alto Comissariado das Nações Unidas para os Refugiados (ACNUR) paralisar o registro de novos refugiados enquanto constrói um sistema de identificação biométrica. Especialistas em direitos humanos alertam que essa medida pode colocar em risco a capacidade dos recém-chegados comprovar sua necessidade de proteção.", "titulo_pt": "Paralisação do registro de refugiados em malásia pode ser 'disaster'", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 69512, "titulo": "Violência digital de gênero precisa ser tratada como questão de segurança internacional", "url": "https://www.jota.info/opiniao-e-analise/colunas/direitos-tecnologias/violencia-digital-de-genero-precisa-ser-tratada-como-questao-de-seguranca-internacional", "fonte_id": "jota", "data_pub": "2026-07-24T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "É necessária uma resposta transnacional à violência digital de gênero, onde a perspectiva de gênero não seja mais tratada como um tema secundário.", "titulo_pt": "Violência digital de gênero precisa ser tratada como questão de segurança internacional", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 67965, "titulo": "O dado que explica por que o feminicídio continua crescendo no Brasil", "url": "https://veja.abril.com.br/brasil/o-dado-que-explica-por-que-o-feminicidio-continua-crescendo-no-brasil/", "fonte_id": "veja", "data_pub": "2026-07-24T01:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O dado indica que os assassinatos de mulheres no Brasil são antecedidos por uma escalada de violência, muitas vezes já registrada pelas autoridades. Isso sugere um padrão de negligência ou falta de ação preventiva das instituições.", "titulo_pt": "Dados revelam que assassinatos de mulheres são precedidos por escalada de violência", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 68220, "titulo": "EE. UU. confirma nuevo arancel de 12,5% a Chile por “trabajo forzoso”; condenan con 167 años de cárcel a facción del Tren de Aragua, y Codina quiere cobrar por el rescate a aislados del Cajón del Maipo", "url": "https://www.ciperchile.cl/2026/07/23/radar-23-07-2026/?utm_source=rss&utm_medium=rss&utm_campaign=radar-23-07-2026", "fonte_id": "ciper_chile", "data_pub": "2026-07-24T00:37:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos confirmaram um novo arancel de 12,5% para Chile a partir do 'trabalho forçado'. Além disso, uma facção do Tren de Aragua foi condenada a 167 anos de prisão. Por fim, Codina propôs cobrar pelo resgate de pessoas isoladas no Cajón del Maipo.", "titulo_pt": "EE.UU. Confirma novo arancel de 12,5% a Chile por ‘trabalho forçado’; condenam facção do Tren de Aragua e Codina quer cobrar pelo resgate", "veiculo": "CIPER Chile", "pais": "Chile", "classe": "A"}, {"id": 68422, "titulo": "Una multa de US$ 1,8 millones y 15 días para pagar: las duras sanciones con las que Trump busca acelerar la salida de migrantes de EE.UU.", "url": "https://www.latercera.com/mundo/noticia/una-multa-de-us-18-millones-y-15-dias-para-pagar-las-duras-sanciones-con-las-que-trump-busca-acelerar-la-salida-de-migrantes-de-eeuu/", "fonte_id": "la_tercera", "data_pub": "2026-07-24T00:35:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Mais de 100.000 pessoas foram notificadas pelo Departamento de Segurança Nacional que devem pagar uma multa ou sair dos Estados Unidos, enquanto o governo recorre a agências de cobrança e confisca devoluções de impostos. Os EUA estão usando medidas duras para acelerar a saída de migrantes do país.", "titulo_pt": "Multa de US$ 1,8 milhões e prazo de 15 dias: as severas sanções usadas pelo governo Trump para expulsar imigrantes", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 68201, "titulo": "¿Aplica para venezolanos y cubanos? A qué migrantes cubre la norma judicial de permisos de trabajo con TPS y asilo", "url": "https://www.lanacion.com.ar/estados-unidos/migraciones/aplica-para-venezolanos-y-cubanos-a-que-migrantes-cubre-la-norma-judicial-de-permisos-de-trabajo-con-nid23072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-24T00:30:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O artigo explora quais migrantes estão protegidos pelo julgamento que impede a revogação de permissões de trabalho para TPS (Programa Temporário de Proteção) e asilo. Ele também discute a situação específica de venezuelanos e cubanos.", "titulo_pt": "Quem está protegido pela decisão contra a revogação de TPS e asilo? E o que acontece com venezuelanos e cubanos?", "veiculo":     ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml(topico) : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml(audioKey) {
  const audio = D.audio && D.audio.sumarios && D.audio.sumarios[audioKey];
  if (!audio || !audio.arquivo) return "";
  const src = audio.arquivo + (audio.versao ? "?v=" + encodeURIComponent(audio.versao) : "");
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta" data-audio-src="${esc(src)}" data-audio-key="${esc(audioKey)}">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderPodcast() {
  const p = D.podcast;
  if (!p || !p.arquivo) return "";
  const src = p.arquivo + (p.versao ? "?v=" + encodeURIComponent(p.versao) : "");
  return `<div class="podcast-card">
    <div class="podcast-hd">Ou&ccedil;a Agora</div>
    <div class="pod-player">
      <button class="pod-btn" onclick="podToggle(this)" aria-label="Tocar">&#9654;</button>
      <span class="pod-cur">0:00</span>
      <div class="pod-track" onclick="podSeek(event, this)"><div class="pod-fill"></div></div>
      <span class="pod-dur">0:00</span>
      <audio class="pod-audio" preload="metadata" src="${esc(src)}"
        onloadedmetadata="podMeta(this)" ontimeupdate="podTick(this)" onended="podEnd(this)"></audio>
    </div>
  </div>`;
}

function _podFmt(s) {
  s = Math.max(0, Math.floor(s || 0));
  return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
}
function podToggle(btn) {
  const a = btn.parentElement.querySelector(".pod-audio");
  if (a.paused) { a.play(); btn.innerHTML = "&#10073;&#10073;"; btn.setAttribute("aria-label", "Pausar"); }
  else { a.pause(); btn.innerHTML = "&#9654;"; btn.setAttribute("aria-label", "Tocar"); }
}
function podMeta(a) {
  a.closest(".pod-player").querySelector(".pod-dur").textContent = _podFmt(a.duration);
}
function podTick(a) {
  const p = a.closest(".pod-player");
  p.querySelector(".pod-cur").textContent = _podFmt(a.currentTime);
  p.querySelector(".pod-fill").style.width = (a.duration ? a.currentTime / a.duration * 100 : 0) + "%";
}
function podEnd(a) {
  const b = a.closest(".pod-player").querySelector(".pod-btn");
  b.innerHTML = "&#9654;"; b.setAttribute("aria-label", "Tocar");
}
function podSeek(e, track) {
  const a = track.parentElement.querySelector(".pod-audio");
  if (!a.duration) return;
  const r = track.getBoundingClientRect();
  a.currentTime = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width)) * a.duration;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml("destaque")}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    const temPodcast = D.podcast && D.podcast.arquivo;
    return `<div class="cards${temPodcast ? ' com-podcast' : ''}">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderPodcast()}
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";

};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {

function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — audio pre-renderizado por Piper
(function () {
  var player = document.createElement('audio');
  player.preload = 'auto';
  player.setAttribute('playsinline', '');
  document.body.appendChild(player);
  var barAtual = null;

  function _resetBar(bar) {
    if (!bar) return;
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  function _setTocando(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _setPausado(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _tituloAudio(bar) {
    var h = bar.previousElementSibling;
    while (h && !/^H2$/i.test(h.tagName || '')) h = h.previousElementSibling;
    return h ? (h.innerText || h.textContent || 'Boletim Diario').trim() : 'Boletim Diario';
  }

  function _mediaSession(bar) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: _tituloAudio(bar),
      artist: 'Boletim Diario',
      album: 'Leitura dos sumarios',
    });
    navigator.mediaSession.setActionHandler('play', function () { player.play().catch(function () {}); });
    navigator.mediaSession.setActionHandler('pause', function () { player.pause(); });
    navigator.mediaSession.setActionHandler('stop', function () { player.pause(); player.currentTime = 0; });
  }

  window.ttsOuvir = function (btn) {
    var bar = btn.closest('.tts-bar');
    var src = bar && bar.dataset.audioSrc;
    if (!src) return;
    if (barAtual && barAtual !== bar) _resetBar(barAtual);
    barAtual = bar;
    if (player.src !== new URL(src, window.location.href).href) {
      player.src = src;
      player.currentTime = 0;
    } else {
      player.currentTime = 0;
    }
    _mediaSession(bar);
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _resetBar(bar);
    });
  };

  window.ttsPausar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    _setPausado(bar);
  };

  window.ttsContinuar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _setPausado(bar);
    });
  };

  window.ttsPar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    player.currentTime = 0;
    _resetBar(bar);
    if (barAtual === bar) barAtual = null;
  };

  player.addEventListener('ended', function () { _resetBar(barAtual); barAtual = null; });
  player.addEventListener('error', function () { _resetBar(barAtual); barAtual = null; });
  window.addEventListener('beforeunload', function () { player.pause(); });
})();
</script>
