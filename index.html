</div>

<script>
const D = {"gerado_em": "24/07/2026 11:29", "stats": {"noticias_novas": 913, "resumos_gerados": 250}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O presidente Luiz Inácio Lula da Silva sancionou uma lei que proíbe a produção e venda de foie gras no Brasil, considerando a técnica de alimentação forçada como maus-tratos aos animais. Esta medida entrou em vigor após 180 dias e foi sancionada em resposta às críticas de organizações de proteção animal, reforçando o compromisso do governo com questões éticas na produção de alimentos. Paralelamente, o Supremo Tribunal Federal autorizou a investigação contra o ministro Marco Buzzi do Superior Tribunal de Justiça no inquérito que apura suspeitas de venda de sentenças, o que pode impactar a dinâmica política da Corte. No âmbito político, Flávio Bolsonaro enfrenta dificuldades para formar alianças importantes para a eleição presidencial, influenciadas pelo caso Vorcara e Banco Master, enquanto o governo realiza uma ofensiva para afastar o centrão do senador e deixá-lo isolado na corrida presidencial.", "mundo": "As eleições no Chipre, administrado pela Turquia, estão prestes a ocorrer após semanas de protestos letais sobre assentos reservados para pessoas deslocadas do Chipre. Um grupo local está chamando para um boicote às eleições. Além disso, os Estados Unidos aplicaram novas tarifas a cerca de 60 países, gerando reações dos parceiros comerciais americanos. A China declarou-se contra as medidas unilaterais, enquanto a União Europeia expressou alívio por não ter sido afetada pela taxa mais alta. Em outro desenvolvimento, o governo americano reativou a guerra comercial, impostando novas tarifas de 10% a 12,5% sobre produtos importados de 60 países, incluindo o Brasil e a Argentina, justificadas com o argumento de combater o trabalho forçado. O Irã rejeitou uma proposta de cessar-fogo dos Estados Unidos, conforme relatado pelo jornal New York Times, após um encontro entre o primeiro-ministro do Iraque e Donald Trump na Casa Branca. Finalmente, a União Europeia está aumentando suas medidas para proteger menores, com novas regras que devem ser implementadas este ano e proibirão o uso de redes sociais por crianças abaixo dos 13 anos.\n\nA situação geopolítica global permanece instável, com várias crises em andamento. Os Estados Unidos e o Irã continuam a se enfrentar, com o Pentágono considerando uma operação 'maior do que nunca' contra o Irã, enquanto Teerã acusa o Reino Unido de ser um 'comparsa' dos EUA. O conflito no Oriente Médio intensificou-se, com ataques israelenses e palestinos resultando em mortes, e a Coreia do Norte criticando os esforços da comunidade internacional para a desnuclearização. Além disso, a China restringiu as exportações de produtos civis e militares para 14 entidades europeias, incluindo empresas da Alemanha, França e Itália, em resposta às sanções do bloco contra a Rússia. O conflito na Ucrânia continua, com drones ucranianos atingindo centros de distribuição da Wildberries no território russo, causando prejuízos econômicos significativos. A incerteza sobre o futuro dos Estados Unidos e Irã também afeta a economia global, com o petróleo chegando a US$100 por barril devido ao conflito no Oriente Médio.", "economia": "A China reagiu negativamente à tarifa de 12,5% impostada pelos EUA, que entra em vigor nesta sexta-feira (24 de julho), afetando a economia chinesa e brasileira. Segundo o FMI, as exceções listadas e a busca por novos parceiros comerciais reduzem os impactos das tarifas de 25% e 12,5%. O Brasil ocupa a 9ª posição entre os países que mais perdem dinheiro com golpes digitais, representando 0,8% do PIB nacional. A Receita Federal liberou a consulta ao terceiro lote de restituição do IR de 2026, que inclui 2.743.200 contribuintes recebendo R$ 4,61 bilhões em 31 de julho. As empresas brasileiras estão buscando estratégias para contornar as incertezas causadas pelas tarifas impostas pelo governo Trump, incluindo fechar escritórios nos EUA e buscar novos mercados no exterior.", "tecnologia": "A Coreia do Sul está prestes a anunciar acordos importantes com empresas tecnológicas americanas durante a visita do presidente Lee Jae Myung à Califórnia. Esses acordos podem incluir novos contratos de fornecimento de chips de memória e parcerias estratégicas de investimento. Em um desenvolvimento relacionado, o Google aumentou sua previsão de gastos com capital para entre US$195 e 205 bilhões, refletindo a demanda persistente por computação para inteligência artificial. Por outro lado, a China está avançando em projetos tecnológicos inovadores, como um novo tipo de submarino atacante com melhorias na performance, e também planeja construir uma nova rede computacional espacial chamada Xingshu ou 'Star Hub', que processará dados de satélites em órbita. Além disso, a reforma tributária no Brasil exige uma transformação imediata do departamento jurídico, incorporando a inteligência artificial como ferramenta para o julgamento jurídico, e a tecnologia de try-on virtual está sendo explorada para reduzir o tempo de diagnóstico em doenças pulmonares.", "ciencia": "A ciência avança com diversos projetos e descobertas ao redor do mundo. Um exemplo notável é a reintrodução do rato-d'água-europeu na Inglaterra, após duas décadas de extinção local, com o objetivo de restaurar a espécie em seu habitat natural. Em outro estudo, cientistas estão examinando a possibilidade de recuperar o sentido do olfato, um dos sentidos mais complexos e menos compreendidos. Paralelamente, os astrônomos descobriram um grupo de seis galáxias jovens formadas apenas 1,2 bilhões de anos após o Big Bang, oferecendo uma rara visão do processo de formação de grandes galáxias no universo. Outros projetos incluem a implementação de um sistema voluntário de autorização de missões espaciais pelo Departamento de Comércio dos Estados Unidos e a criação de um 'filme' do céu usando o novo Observatório Vera C. Rubin, que visa capturar como as estrelas, galáxias e outros objetos celestes mudam ao longo do tempo. Além disso, a Agência Meteorológica Met Office alertou sobre um verão atípico devido a múltiplas ondas de calor no Reino Unido.", "cultura": "A Flip (Festa Literária Internacional de Paraty) comemorou os 70 anos do romance 'Grande Sertão: Veredas', de Guimarães Rosa, com diversos eventos gratuitos. Durante a cerimônia de abertura, a falecida escritora Orides Fontela foi homenageada e representada através de duas abordagens distintas: uma artística, junto à poeta Marília Garcia, e outra acadêmica, em parceria com o professor Augusto Massi da Universidade de São Paulo. Paralelamente, a Rádio MEC realizou uma cobertura especial do evento em colaboração com a Agência Brasil e a Rádio Nacional, destacando a importância de Orides Fontela na literatura brasileira. Além disso, a 22ª Flip também apresentou uma prévia do novo álbum da cantora Charli XCX no MIS (Museu da Imagem e do Som) em São Paulo, oferecendo aos fãs o primeiro contato com as novas músicas da artista.", "sociedade": "Um adolescente morreu após ser esfaqueado durante uma briga entre duas famílias em um pequeno povoado de 100 habitantes na região de Las Polvaredas, na província de Mendoza, Argentina. Este incidente levou a investigações e intensificou o debate sobre violência familiar no país. Em outro evento, a prefeitura do bairro Riacho Fundo II no Distrito Federal destinou áreas para a construção de 90 moradias populares, visando melhorar as condições habitacionais da população local. Além disso, o INSS iniciou a análise dos pedidos de pensão por morte especial para filhos e dependentes de mulheres vítimas de feminicídio, com expectativa de conclusão até o final de julho. A França registrou mais de 5.700 mortes a mais durante sua onda de calor em junho, enquanto a Coreia do Sul enfatizou a importância do acesso universal à saúde para reduzir as disparidades regionais no país.", "meio_ambiente": "A América do Norte tem sido coberta por uma nuvem de fumaça há uma semana, afetando cidades como Toronto, Detroit e Nova York. As condições atmosféricas são consideradas insalubres ou perigosas em algumas dessas metrópoles. Paralelamente, incêndios florestais estão devastando partes da França, Itália e Espanha, com milhares de pessoas sendo evacuadas por causa das chamas que se intensificaram em várias regiões europeias nos últimos dias. Em simultâneo, o Rio Grande do Sul registrou chuvas intensas, superando os 150 milímetros em menos de 12 horas, deixando 461 pessoas desabrigadas e diminuindo a intensidade das precipitações à medida que se afastava da frente fria. No Peru, pelicanos famintos estão sinalizando o fortalecimento do El Niño, com aumento de temperatura associado ao fenômeno climático afetando os ecossistemas marinhos na costa peruana e reduzindo a disponibilidade de peixes. Além disso, uma onda de calor que atingiu a Europa em junho é estimada ter causado uma perda de receita de 2 bilhões de euros aos agricultores de grãos, destruindo cerca de 9 milhões de toneladas de culturas como trigo, cevada, milho e aveia. Essa situação pode levar a preocupações sobre o aumento do preço dos alimentos.", "direitos_humanos": "Um jovem de 19 anos foi condenado por sedição em Hong Kong após escrever grafiti anti-governamental em um banheiro de um prédio comercial. O tribunal rejeitou a defesa de que uma condição mental congênita impediu Leung Kai-lok de compreender as palavras ofensivas contra o governo e a polícia, destacando a gravidade das condenações para atividades consideradas sediciosas na região. Em contraste, no Kosovo, existe um estigma significativo em torno da violência sexual ocorrida durante a guerra, especialmente entre sobreviventes de minorias romas, ashkali e egípcias, que enfrentam uma situação ainda mais severa. No Brasil, o governo enfrenta tarifas de 25% sobre produtos vendidos aos Estados Unidos relacionados ao trabalho escravo, enquanto a administração Trump impede estados de exigirem que agentes da ICE mostrem seus rostos, alegando riscos à segurança dos agentes. Além disso, na Austrália, a parlamentar Pauline Hanson foi acusada de victimizar mulheres ao afirmar que o violência doméstica é um 'caminho de duas vias', provocando reações negativas da comunidade feminista e legalistas."}, "resumo_do_dia": {"politica_nacional": [{"id": 69333, "titulo": "Cemig é condenada após aposentado receber conta de luz de R$ 37,4 mil", "url": "https://www.metropoles.com/minas-gerais/cemig-e-condenada-apos-aposentado-receber-conta-de-luz-de-r-374-mil", "fonte_id": "metropoles", "data_pub": "2026-07-24T12:47:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Cemig foi condenada a devolver R$ 37,4 mil ao aposentado e pagar mais R$ 10 mil por danos morais. O tribunal manteve a sentença anterior.", "titulo_pt": "Cemig é condenada após aposentado receber conta de luz de R$ 37,4 mil", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 69254, "titulo": "Começa a valer lei que autoriza venda de spray de pimenta para mulheres; veja regras", "url": "https://g1.globo.com/politica/noticia/2026/07/24/comeca-a-valer-lei-que-autoriza-venda-de-spray-de-pimenta-para-mulheres-veja-regras.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-24T12:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A lei que autoriza a venda e posse de sprays de pimenta para mulheres acima de 18 anos entrou em vigor após ser sancionada pelo governo. A proposta permitirá o uso do produto como medida de defesa pessoal, mas não incluiu a possibilidade de uso por menores de 18 anos sem autorização dos responsáveis.", "titulo_pt": "Lei que permite venda de spray de pimenta para mulheres entra em vigor", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 69350, "titulo": "Os rolos de Flávio, as articulações de Lula e a jogada de Ciro", "url": "https://piaui.uol.com.br/web/ft122/", "fonte_id": "piaui", "data_pub": "2026-07-24T12:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto se refere a diferentes figuras políticas e situações relacionadas ao cenário político brasileiro, mencionando Flávio, Lula e Ciro. No entanto, não há informações específicas sobre os eventos ou contextos envolvendo essas pessoas.", "titulo_pt": "Os rolos de Flávio, as articulações de Lula e a jogada de Ciro", "veiculo": "Revista Piauí", "pais": "Brasil", "classe": "B"}, {"id": 69320, "titulo": "Ao vivo: Lula visita as instalações da Avibras Aeroco", "url": "https://www.poder360.com.br/poder-governo/ao-vivo-lula-visita-as-instalacoes-da-avibras-aeroco/", "fonte_id": "poder360", "data_pub": "2026-07-24T12:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente visitou as instalações da Avibras Aeroco, uma empresa voltada para os setores de defesa e espacial civil. Geraldo Alckmin acompanhou a visita.", "titulo_pt": "Lula visita instalações da Avibras Aeroco", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 69256, "titulo": "STF autoriza investigação contra ministro do STJ Marco Buzzi em caso de venda de sentenças", "url": "https://g1.globo.com/politica/noticia/2026/07/24/stf-autoriza-investigacao-contra-ministro-do-stj-marco-buzzi-em-caso-de-venda-de-sentencas.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-24T12:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal autorizou a Polícia Federal a investigar o ministro Marco Buzzi do Superior Tribunal de Justiça no inquérito que apura suspeitas de venda de sentenças. Buzzi está afastado da Corte desde fevereiro após acusações de importunação e assédio sexual.", "titulo_pt": "STF autoriza investigação contra ministro do STJ Marco Buzzi em caso de venda de sentenças", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 69322, "titulo": "Brasil é 16º em ranking de passaportes mais poderosos; leia a lista", "url": "https://www.poder360.com.br/poder-internacional/brasil-e-16o-em-ranking-de-passaportes-mais-poderosos-leia-a-lista/", "fonte_id": "poder360", "data_pub": "2026-07-24T12:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil ocupa a 16ª posição no ranking de passaportes mais poderosos, permitindo entrada em 169 destinos sem visto prévio. Singapura é o país com maior poder do passaporte, permitindo acesso a 192 países sem vistos.", "titulo_pt": "Brasil é 16º no ranking de passaportes mais poderosos; veja lista", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 69310, "titulo": "Inquéritos contra autoridades explodem no STJ, após mudança da regra do foro no Supremo", "url": "https://veja.abril.com.br/brasil/inqueritos-contra-autoridades-explodem-no-stj-apos-mudanca-da-regra-do-foro-no-supremo/", "fonte_id": "veja", "data_pub": "2026-07-24T12:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O número de inquéritos contra autoridades aumentou significativamente após o Supremo Tribunal Federal (STF) reestabelecer seu controle sobre as investigações envolvendo políticos. Este aumento ocorreu logo após a mudança da regra do foro privilegiado no Superior Tribunal de Justiça (STJ).", "titulo_pt": "Número de inquéritos contra autoridades explode no STJ, após mudança da regra do foro no Supremo", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 69505, "titulo": "Estados e capitais avançam com ações contra publicidade de bets", "url": "https://www.jota.info/executivo/estados-e-capitais-avancam-com-acoes-contra-publicidade-de-bets", "fonte_id": "jota", "data_pub": "2026-07-24T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Projetos em Câmaras Municipais e Assembleias Estaduais avançam com ações contra publicidade de bets, após iniciativa do Rio de Janeiro.", "titulo_pt": "Estados e capitais avançam com ações contra publicidade de bets", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 69311, "titulo": "Ex-prefeito e esposa são favoritos contra aliados de Lula e Alcolumbre no Amapá, diz pesquisa", "url": "https://veja.abril.com.br/brasil/ex-prefeito-e-esposa-sao-favoritos-contra-aliados-de-lula-e-alcolumbre-no-amapa-diz-pesquisa/", "fonte_id": "veja", "data_pub": "2026-07-24T11:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Antônio Furlan está na frente nas pesquisas para o governo do Amapá, enquanto sua esposa Rayssa Furlan lidera as intenções de voto para o Senado. Elas superam os candidatos Clécio Luís e Randolfe Rodrigues na busca pela reeleição.", "titulo_pt": "Ex-prefeito e esposa são favoritos em pesquisa no Amapá contra aliados de Lula e Alcolumbre", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 69257, "titulo": "Brasil proíbe foie gras após classificar técnica como maus-tratos", "url": "https://g1.globo.com/economia/agronegocios/noticia/2026/07/24/brasil-proibe-foie-gras-apos-classificar-tecnica-como-maus-tratos.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-24T11:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Luiz Inácio Lula da Silva sancionou um projeto de lei que proíbe a produção e venda de foie gras no Brasil, considerando a técnica de alimentação forçada como maus-tratos aos animais. A proibição abrange tanto o foie gras fresco quanto enlatado.", "titulo_pt": "Brasil proíbe foie gras após considerar técnica de produção maus-tratos", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 69258, "titulo": "Análise: Michelle pode faltar à convenção, mas 'acordo de paz' dá fôlego a Flávio Bolsonaro", "url": "https://g1.globo.com/politica/blog/julia-duailibi/post/2026/07/24/analise-michelle-convencao-acordo-de-paz-flavio-bolsonaro.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-24T10:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Flávio Bolsonaro enfrenta dificuldades para formar alianças importantes para a eleição, influenciadas tanto pelo caso Vorcaro e Banco Master quanto pelo racha familiar. O presidente do PL, Valdemar Costa Neto, afirma que essas questões levam a possíveis aliados a questionarem a unidade da campanha, dificultando as negociações.", "titulo_pt": "Análise: michelle pode faltar à convenção, mas 'acordo de paz' dá fôlego a Flávio Bolsonaro", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 69259, "titulo": "Após um mês de crise, Michelle e Flávio Bolsonaro devem gravar vídeo juntos", "url": "https://g1.globo.com/politica/blog/natuza-nery/post/2026/07/24/crise-michelle-flavio-bolsonaro-video-juntos.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-24T10:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Michelle e Flávio Bolsonaro devem gravar um vídeo juntas para as redes sociais como parte de uma operação para encerrar a crise entre eles. O desentendimento público ocorreu há cerca de um mês, com Michelle acusando Flávio de ter acreditado em fake news sobre ela.", "titulo_pt": "Após um mês de crise, Michelle e Flávio Bolsonaro devem gravar vídeo juntos", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [{"titulo": "Lula sanciona proibição do comércio e importação de foie gras", "sumario": "O presidente Lula sancionou uma lei que proíbe o comércio e a importação de foie gras. O presidente Luiz Inácio Lula da Silva sancionou uma lei que proíbe a produção e venda de foie gras no Brasil. O projeto de lei que proíbe a produção e comercialização do foie gras foi sancionado pelo presidente Lula.", "artigos": [{"id": 69367, "titulo": "Lula sanciona proibição do comércio e importação de foie gras", "url": "https://www.congressoemfoco.com.br/noticia/120735/lula-sanciona-proibicao-do-comercio-e-importacao-de-foie-gras", "fonte_id": "congresso_em_foco", "data_pub": "2026-07-24T12:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Lula sancionou uma lei que proíbe o comércio e a importação de foie gras. A lei também estabelece penas de até um ano de prisão para quem produzir ou comercializar alimentos obtidos através da alimentação forçada de animais.", "titulo_pt": "Lula sanciona proibição do comércio e importação de foie gras", "veiculo": "Congresso em Foco", "pais": "Brasil", "classe": "B"}, {"id": 69213, "titulo": "Governo Lula sanciona lei que proíbe produção e venda de foie gras no Brasil", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/governo-lula-sanciona-lei-que-proibe-producao-e-venda-de-foie-gras-no-brasil.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-24T12:37:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Luiz Inácio Lula da Silva sancionou uma lei que proíbe a produção e venda de foie gras no Brasil. A lei abrange todos os estados do país e visa evitar a alimentação forçada de animais.", "titulo_pt": "Governo Lula sanciona lei que proíbe produção e venda de foie gras no Brasil", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 69283, "titulo": "Lula sanciona lei que proíbe a produção e comercialização do foie gras", "url": "https://www.cartacapital.com.br/politica/lula-sanciona-lei-que-proibe-a-producao-e-comercializacao-do-foie-gras/", "fonte_id": "cartacapital", "data_pub": "2026-07-24T12:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O projeto de lei que proíbe a produção e comercialização do foie gras foi sancionado pelo presidente Lula. O texto havia sido aprovado pela Câmara dos Deputados em abril, com apoio de entidades de proteção animal.", "titulo_pt": "Lula sanciona lei que proíbe o foie gras", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 69323, "titulo": "Lula sanciona lei que proíbe produção e venda de foie gras", "url": "https://www.poder360.com.br/poder-governo/lula-sanciona-lei-que-proibe-producao-e-venda-de-foie-gras/", "fonte_id": "poder360", "data_pub": "2026-07-24T12:07:00Z", "idioma": "pt", "provavel_duplicata_de": 69213, "texto_pt": "A lei sancionada por Lula proíbe tanto a produção quanto a venda de foie gras, independentemente do estado em que o produto se encontra. A medida entrará em vigor após 180 dias.", "titulo_pt": "Lula sanciona lei que proíbe produção e venda de foie gras", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}]}], "mundo": [{"id": 69609, "titulo": "France evacuates Cap Ferret peninsula as Spanish wildfires merge near Madrid – Europe live", "url": "https://www.theguardian.com/world/live/2026/jul/24/france-spain-wildfires-cap-ferret-europe-latest-news-updates", "fonte_id": "guardian_world", "data_pub": "2026-07-24T12:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A França está evacuando a península de Cap Ferret e áreas próximas à capital espanhola também foram afetadas por incêndios. Várias casas foram destruídas em torno do vilarejo histórico de Cotignac devido ao vento mistral.", "titulo_pt": "França evacua península de Cap Ferret e incêndios se aproximam de Madrid na Espanha", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 69755, "titulo": "Can Pakistan-administered Kashmir elections calm tensions?", "url": "https://www.dw.com/en/can-pakistan-administered-kashmir-elections-calm-tensions/a-78101422?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-24T12:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As eleições em Chipre administrado pelo Paquistão estão prestes a ocorrer após semanas de protestos letais sobre assentos reservados para pessoas deslocadas do Chipre administrado pela Índia. Um grupo local está chamando para uma boicote às eleições.", "titulo_pt": "Eleições em chipre administrado pelo paquistão podem aliviar tensões?", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 69756, "titulo": "Why Iran's Pickaxe Mountain is a tough target for the US", "url": "https://www.dw.com/en/why-iran-s-pickaxe-mountain-is-a-tough-target-for-the-us/a-78100313?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-24T12:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente americano Donald Trump ameaçou atacar um suposto local nuclear iraniano localizado debaixo de uma montanha. A Montanha Picaret, no Irã, continua sendo uma das questões mais desconhecidas em relação ao programa nuclear do país.", "titulo_pt": "Por que a montanha picaret do Irã é um alvo difícil para os EUA", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 69745, "titulo": "Oil prices ease but are set for 10% weekly gain as Trump mulls 'bigger than ever' attack on Iran", "url": "https://www.cnbc.com/2026/07/24/oil-price-trump-hormuz-red-sea-iran-war.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-24T12:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O preço do petróleo caiu cerca de 3% na sexta-feira, mas está ainda assim com uma possível alta semanal de 10%, enquanto a escalada da guerra entre Estados Unidos e Irã continua.", "titulo_pt": "Preços do petróleo caem 3% nesta sexta, mas devem subir 10% na semana com tensões entre EUA e Irã", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 69255, "titulo": "Países reagem a novas tarifas de Trump; Europa tem ‘alívio’ após multa milionária ao Google", "url": "https://g1.globo.com/economia/noticia/2026/07/24/paises-reagem-a-novas-tarifas-de-trump-europa-tem-alivio-apos-multa-milionaria-ao-google.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-24T12:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos aplicaram novas tarifas a cerca de 60 países a partir desta sexta-feira, gerando reações dos parceiros comerciais americanos. A China declarou-se contra as medidas unilaterais, enquanto a União Europeia expressou alívio por não ter sido afetada pela taxa mais alta.", "titulo_pt": "Países reagem às novas tarifas de Trump; Europa tem 'alívio' após multa milionária ao Google", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 69860, "titulo": "Lepore a Piantedosi, 'attaccare me non risolve problemi di ordine pubblico'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/24/lepore-a-piantedosi-attaccare-me-non-risolve-problemi-di-ordine-pubblico_0d54bd3e-041e-4963-a0ad-674d7ff02f59.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-24T12:38:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Lepore e Piantedosi discordam sobre a forma de lidar com problemas de ordem pública. As instituições que se acusam mutuamente fortalecem aqueles que as oponham.", "titulo_pt": "Lepore contra Piantedosi, 'atirar em mim não resolve problemas de ordem pública'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 69936, "titulo": "SK Eternix shares surge on AI power demand hopes", "url": "https://www.koreaherald.com/article/10819747", "fonte_id": "korea_herald", "data_pub": "2026-07-24T12:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações da SK Eternix, uma unidade de energia do Grupo SK, subiram mais de 100% nos últimos meses devido às expectativas de que o uso de inteligência artificial para gerir a demanda energética possa impulsionar o setor renovável da Coreia do Sul. O preço das ações encerrou na quinta-feira em 80.900 won ($55,35), um aumento significativo em comparação com uma queda de 20,9% no índice Kospi e de 31,2% nas ações da SK hynix, fabricante líder de chips do grupo.", "titulo_pt": "Ações da SK Eternix disparam com esperanças de demanda energética impulsionada por IA", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 69362, "titulo": "China restringe exportação de produtos civis e militares para 14 entidades da UE", "url": "https://www.infomoney.com.br/mundo/china-restringe-exportacao-de-produtos-civis-e-militares-para-14-entidades-da-ue/", "fonte_id": "infomoney", "data_pub": "2026-07-24T12:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A China limitou as exportações de produtos civis e militares para 14 entidades da União Europeia, incluindo empresas da Alemanha, França e Itália. A medida visa resguardar a segurança nacional após novas sanções impostas pelo bloco europeu contra a Rússia.", "titulo_pt": "China restringe exportação de produtos civis e militares para 14 entidades da UE", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 69611, "titulo": "Ukraine’s pivot to warehouse strikes brings war closer to ordinary Russians", "url": "https://www.theguardian.com/world/2026/jul/24/ukraine-warehouse-strikes-wildberries-war-closer-ordinary-russians", "fonte_id": "guardian_world", "data_pub": "2026-07-24T12:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ataques de Kiev a armazéns da Wildberries, equivalente russo ao Amazon, estão destruindo mercadorias que são compradas e vendidas por russos comuns. Tatyana Mikhailova perdeu uma grande quantidade de casacos de pele que ela havia adquirido meses antes para o inverno.", "titulo_pt": "Ucrânia vira a chave para greves em armazéns, levando a guerra mais perto dos russos comuns", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 69749, "titulo": "Pentagon lowers official Iran war death toll, omitting four killed this month", "url": "https://www.cnbc.com/2026/07/24/pentagon-removed-four-official-iran-war-death-toll.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-24T12:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Pentágono reduziu o número oficial de mortes de soldados iranianos na guerra para 14, excluindo quatro militares mortos neste mês.", "titulo_pt": "Pentágono reduz oficialmente balanço de mortes iranianas em guerra, excluindo quatro mortos este mês", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 69861, "titulo": "Netanyahu accelera su riconoscimento insediamenti non autorizzati in Cisgiordania", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/24/netanyahu-accelera-su-riconoscimento-insediamenti-non-autorizzati-in-cisgiordania_c4308ec0-5f67-40d8-a244-51e4c9f50b1f.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-24T12:26:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O governo de Israel acelerou o reconhecimento de assentamentos não autorizados na Cisjordânia após a ocorrência de uma disparata perto de Nablus. Além disso, novos permessos de trabalho foram revogados.", "titulo_pt": "Netanyahu acelera reconhecimento de assentamentos não autorizados em cisjordânia", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 70027, "titulo": "(News Focus) S. Korea seeks deeper regional partnerships at ASEAN meetings amid fragmented global order", "url": "https://en.yna.co.kr/view/AEN20260724012300315", "fonte_id": "yonhap_news", "data_pub": "2026-07-24T12:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Ministro das Relações Exteriores da Coreia do Sul, Cho Hyun, buscou fortalecer parcerias regionais durante reuniões com a ASEAN. Isso ocorreu no contexto de uma ordem global fragmentada.", "titulo_pt": "Coreia do sul busca parcerias regionais durante encontros com a ASEAN em meio a ordem global fragmentada", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 69862, "titulo": "Cappellano del Beccaria, la norma sui minori è un passo indietro", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/24/cappellano-del-beccaria-la-norma-sui-minori-e-un-passo-indietro_a0b56d53-f9c7-4f2b-a6f6-29f99464ed4a.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-24T12:25:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O capelão do Beccaria, Don Burgio, afirmou que não se pode discutir sobre a marança simplificando um desconforto. A norma para os menores foi descrita como um passo atrás.", "titulo_pt": "Capelão do Beccaria: norma sobre menores representa um passo atrás", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 69863, "titulo": "Operaio muore schiacciato da macchina una spazzatrice a Roma", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/24/operaio-muore-schiacciato-da-macchina-una-spazzatrice-a-roma_14a0f915-f8e0-45d8-bcfa-247d3a11d51b.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-24T12:25:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Um operário de 47 anos morreu esmagado por uma máquina de limpeza em Roma. Ele estava realizando manutenção sob o equipamento quando ocorreu o acidente.", "titulo_pt": "Operário de 47 anos morre esmagado por máquina de spazzatrice em Roma", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 69214, "titulo": "Por que a Ucrânia tem atacado a 'Amazon russa'", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mundo/2026/07/por-que-a-ucrania-tem-atacado-a-amazon-russa.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-24T12:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em poucos dias, drones ucranianos atingiram vários centros de distribuição da Wildberries, a maior varejista online da Rússia, causando prejuízos a pequenas e médias empresas.", "titulo_pt": "Por que a Ucrânia tem atacado o 'Amazon russo'", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 69757, "titulo": "Germany news: Top court rules out mass admission revocations", "url": "https://www.dw.com/en/germany-news-top-court-rules-out-mass-admission-revocations/live-78101249?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-24T12:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A mulher afegã venceu na Justiça contra o Ministério do Interior alemão após sua admissão ser anulada. A confiança dos consumidores e os lucros da Volkswagen diminuíram, enquanto o crime extremista violento aumentou.", "titulo_pt": "Notícias da Alemanha: tribunal rejeita revogação em massa de admissões", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 69319, "titulo": "China repudia tarifa dos EUA de 12,5%", "url": "https://www.poder360.com.br/poder-china/china-repudia-tarifa-dos-eua-de-125/", "fonte_id": "poder360", "data_pub": "2026-07-24T12:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A China se opôs à tarifa de 12,5% impostada pelos Estados Unidos. A medida afetou a economia chinesa da mesma forma que impactou o Brasil e entrará em vigor nesta sexta-feira (24.jul).", "titulo_pt": "China reage à tarifa de 12,5% dos EUA", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 69848, "titulo": "Europe wins and Brazil loses in Trump tariff overhaul", "url": "https://www.ft.com/content/2ba28daf-2ceb-44bb-9330-7ec070fb2a80?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-24T12:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Europa beneficiou-se e o Brasil sofreu com a reformulação das tarifas de Trump, embora alguns países tenham ficado relativamente melhorados. No entanto, essa alívio pode ser temporário.", "titulo_pt": "Europa ganha e Brasil perde em reformulação de tarifas de Trump", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 69853, "titulo": "BP nears deal to sell solar business Lightsource to Kuwait-backed group", "url": "https://www.ft.com/content/b49cffde-6610-4b20-b1fa-da1cdbca9d5c?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-24T12:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "BP está próximos de fechar um acordo para vender sua empresa solar Lightsource a um grupo com apoio do Kuwait. Qualitas Energy e o braço de investimentos da fundação de riqueza soberana estão em avançadas negociações para comprar o negócio de energias renováveis.", "titulo_pt": "BP perto de vender empresa solar Lightsource a grupo do kuwait", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 69306, "titulo": "O efeito do tarifaço na economia brasileira, segundo o FMI", "url": "https://veja.abril.com.br/economia/fmi-diz-que-tarifas-dos-eua-contra-o-brasil-terao-impacto-modesto-na-economia/", "fonte_id": "veja", "data_pub": "2026-07-24T12:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Fundo Monetário Internacional indica que as exceções listadas e a busca por novos parceiros comerciais diminuem os impactos das tarifas de 25% e 12,5%.", "titulo_pt": "Efeito do tarifaço na economia brasileira, segundo o FMI", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 69215, "titulo": "Grupo DUX estrutura fundo de R$ 100 milhões para financiar economia criativa", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/07/grupo-dux-estrutura-fundo-de-r-100-milhoes-para-financiar-economia-criativa.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-24T12:13:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Grupo DUX, em parceria com a BBS Capital Partners, criou um FIDC de R$ 100 milhões para financiar a economia criativa através da antecipação de recebíveis. O Banco BS2 é o investidor âncora desta operação.", "titulo_pt": "Grupo DUX estrutura fundo de R$ 100 milhões para financiar economia criativa", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 69400, "titulo": "Brasil está entre dez países que mais perdem dinheiro com golpes digitais", "url": "https://www.cnnbrasil.com.br/nacional/brasil/brasil-esta-entre-dez-paises-que-mais-perdem-dinheiro-com-golpes-digitais/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-24T12:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil ocupa a 9ª posição entre os países que, proporcionalmente, mais perdem dinheiro com golpes digitais. O prejuízo equivale a 0,8% do PIB nacional.", "titulo_pt": "Brasil está entre dez países com maior perda financeira por golpes digitais", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 69401, "titulo": "Aviação mantém otimismo mesmo com guerra, diz CEO da Vinci para a Amazônia", "url": "https://www.cnnbrasil.com.br/infra/aviacao-mantem-otimismo-mesmo-com-guerra-diz-ceo-da-vinci-para-a-amazonia/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-24T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O CEO da Vinci Para a Amazônia manteve o optimismo sobre o setor de aviação, mesmo durante a guerra no Oriente Médio. Ele destacou que o cenário pode mudar se não houver um cessar-fogo no conflito.", "titulo_pt": "Aviação mantém otimismo mesmo com guerra, diz CEO da Vinci para a Amazônia", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 69940, "titulo": "Market rally lifts Korea's five financial groups to W13tr profit", "url": "https://www.koreaherald.com/article/10819726", "fonte_id": "korea_herald", "data_pub": "2026-07-24T11:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os cinco maiores grupos financeiros da Coreia do Sul registraram um lucro líquido combinado recorde de 13,12 trilhões de wones no primeiro semestre, impulsionados por uma forte performance do mercado acionário que aumentou as comissões de corretagem e gerenciamento de ativos. O lucro subiu 9,7% em comparação com o mesmo período do ano anterior.", "titulo_pt": "Recoveria no mercado empurra lucros combinados dos cinco maiores grupos financeiros da Coreia para 13,12 trilhões de wones", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 69279, "titulo": "Beneficiários com NIS de final 5 recebem Bolsa Família de julho", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-07/beneficiarios-com-nis-de-final-5-recebem-bolsa-familia-de-julho", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-24T10:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Caixa Econômica Federal efetuou o pagamento do Bolsa Família de julho aos beneficiários com NIS final 5 nesta sexta-feira (24). O valor médio do benefício é de R$ 679,19. Além disso, 175 municípios em situação de emergência ou calamidade pública receberam o crédito antecipado no dia 20.", "titulo_pt": "Beneficiários com NIS final 5 recebem Bolsa Família de julho", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 69280, "titulo": "Receita libera consulta ao terceiro lote de restituição do IR 2026", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-07/receita-libera-consulta-ao-terceiro-lote-de-restituicao-do-ir-2026", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-24T10:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Receita Federal liberou a consulta ao terceiro lote de restituição do Imposto de Renda 2026, que inclui 2.743.200 contribuintes recebendo R$ 4,61 bilhões em 31 de julho. Os dois primeiros lotes representaram 80% das restituições previstas para o ano.", "titulo_pt": "Receita federal libera consulta ao terceiro lote de restituição do IR 2026", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 69416, "titulo": "Stablecoins saíram de 3,5% para 80% dos criptoativos declarados por brasileiros, diz Receita", "url": "https://exame.com/future-of-money/stablecoins-sairam-de-35-para-80-dos-criptoativos-declarados-por-brasileiros-diz-receita/", "fonte_id": "exame", "data_pub": "2026-07-24T09:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os stablecoins representaram 80% dos criptoativos declarados por brasileiros, de acordo com a Receita Federal. Um único stablecoin, o USDT da Tether, respondeu por 88,7% desse volume.", "titulo_pt": "Stablecoins passaram de 3,5% para 80% dos criptoativos declarados por brasileiros, diz Receita", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 69507, "titulo": "O novo Regulamento de Arbitragem da Câmara do Mercado", "url": "https://www.jota.info/opiniao-e-analise/artigos/o-novo-regulamento-de-arbitragem-da-camara-do-mercado", "fonte_id": "jota", "data_pub": "2026-07-24T08:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O novo Regulamento de Arbitragem da Câmara do Mercado traz alterações que são importantes para os acionistas. As mudanças incluem novas regras e procedimentos que afetarão diretamente os interesses dos investidores.", "titulo_pt": "Novo Regulamento de Arbitragem da Câmara do Mercado", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 70025, "titulo": "Opinion: The U.S. pharmaceutical supply chain problem is not about China", "url": "https://www.statnews.com/2026/07/24/pharmaceutical-supply-chain-resilience-china/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-24T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A discussão sobre as vulnerabilidades da cadeia de suprimentos farmacêutico nos Estados Unidos está sendo distraída por uma abordagem focada na segurança nacional, escreve Pooja Yerramilli.", "titulo_pt": "Opinião: o problema da cadeia de suprimentos farmacêutico dos EUA não está relacionado à China", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 69508, "titulo": "‘Lei do repasse’ garante correta destinação de recursos de vendas com cartão", "url": "https://www.jota.info/opiniao-e-analise/artigos/lei-do-repasse-garante-correta-destinacao-de-recursos-de-vendas-com-cartao", "fonte_id": "jota", "data_pub": "2026-07-24T08:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil possui um sistema de pagamento avançado que exige supervisão pública e regras jurídicas para garantir a estabilidade das transações. A lei do repasse garante a correta destinação dos recursos provenientes das vendas realizadas com cartões.", "titulo_pt": "Lei do repasse assegura correta aplicação de recursos de vendas com cartão", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 69946, "titulo": "Seoul stocks plummet nearly 6% amid escalating Mideast tensions", "url": "https://www.koreaherald.com/article/10819534", "fonte_id": "korea_herald", "data_pub": "2026-07-24T07:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os mercados acionários de Seul sofreram uma forte queda de quase 6% devido às tensões crescentes no Oriente Médio, que diminuíram a apetite por riscos. O índice da Bolsa local caiu para 6.690,62 pontos.", "titulo_pt": "Ações sul-coreanas caem quase 6% com tensões crescentes no oriente médio", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 70040, "titulo": "Woori Financial Q2 net gains 7.4 pct on rise in interest, non-interest income", "url": "https://en.yna.co.kr/view/AEN20260724010200320", "fonte_id": "yonhap_news", "data_pub": "2026-07-24T07:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Woori Financial Group relatou um aumento de 7,4% nos lucros líquidos no segundo trimestre, impulsionado por uma elevação nas receitas de juros e não-juros.", "titulo_pt": "Woori Financial registra ganhos líquidos do segundo trimestre em alta de 7,4%", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 69935, "titulo": "Samsung, SK Hynix to Ink Large Chip Supply Deals with US Firms", "url": "https://www.koreaherald.com/article/10819749", "fonte_id": "korea_herald", "data_pub": "2026-07-24T12:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Samsung Electronics e SK Hynix estão prestes a anunciar acordos significativos com empresas tecnológicas líderes dos EUA durante a visita do presidente Lee Jae Myung à Valley de Silício, provavelmente incluindo novos contratos de fornecimento de chips de memória a longo prazo e parcerias estratégicas de investimento. O valor desses acordos não foi revelado.", "titulo_pt": "Samsung e SK Hynix vão anunciar grandes acordos com empresas tecnológicas dos EUA durante visita do presidente", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 70008, "titulo": "Facebook launches a dedicated Marketplace app for sellers, adds a free verification system", "url": "https://techcrunch.com/2026/07/24/facebook-launches-a-dedicated-marketplace-app-for-sellers-adds-a-free-verification-system/", "fonte_id": "techcrunch", "data_pub": "2026-07-24T12:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Facebook lançou uma aplicação dedicada Marketplace para vendedores frequentes e introduziu um sistema de verificação gratuita.", "titulo_pt": "Facebook lança app Marketplace dedicado para vendedores e adiciona sistema gratuito de verificação", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 69747, "titulo": "How a Chinese AI model stopped OpenAI’s ‘unprecedented’ cyber attack", "url": "https://www.cnbc.com/2026/07/24/chinese-ai-model-openai-cyber-attack.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-24T12:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um modelo de inteligência artificial chinês foi usado para combater uma suposta invasão cibernética inédita realizada pelo OpenAI. O origem desse modelo chamou a atenção da comunidade.", "titulo_pt": "Como um modelo chinês de IA parou o suposto ataque cibernético ‘único’ do OpenAI", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 69960, "titulo": "The Download: an organ transplant breakthrough, and homegrown Chinese chips", "url": "https://www.technologyreview.com/2026/07/24/1140776/the-download-organ-transplant-breakthrough-chinese-chips/", "fonte_id": "mit_tech_review", "data_pub": "2026-07-24T12:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cães-preguiça receberam rins superrefrigertados em um que foi chamado de 'marco importante' na transplante de órgãos. A preservação dos rins a baixas temperaturas permitiu seu uso em transplantes, o que pode melhorar significativamente os processos de doação de órgãos.", "titulo_pt": "Download: marco na transplantação de rins e chips chineses autossuficientes", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 69504, "titulo": "IA em contratos: Reforma tributária exige transformação imediata do departamento jurídico", "url": "https://www.jota.info/opiniao-e-analise/artigos/ia-em-contratos-reforma-tributaria-exige-transformacao-imediata-do-departamento-juridico", "fonte_id": "jota", "data_pub": "2026-07-24T12:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A reforma tributária exige uma transformação imediata no departamento jurídico, incorporando a inteligência artificial como uma ferramenta poderosa para o julgamento jurídico, mas não como substituto.", "titulo_pt": "IA em contratos: reforma tributária exige transformação imediata do departamento jurídico", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 69908, "titulo": "Is China building a new type of attack submarine? Satellite images hint at stealth gains", "url": "https://www.scmp.com/news/china/military/article/3361774/china-building-new-type-attack-submarine-satellite-images-hint-stealth-gains?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-24T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Satélites capturaram imagens de supostamente novos submarinos atacantes nucleares na fábrica Jiangnan Shipyard, em Shanghai. Esses submarinos seriam do tipo 093 com um mastro reduzido, indicando melhorias na performance.", "titulo_pt": "China estaria desenvolvendo novo tipo de submarino atacante nuclear?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 69962, "titulo": "TikTok’s protection of minors should not be opt-in, warns EU", "url": "https://www.theverge.com/tech/970519/tiktok-eu-dsa-child-safety-age-account-privacy", "fonte_id": "the_verge", "data_pub": "2026-07-24T11:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Comissão Europeia identificou problemas na proteção de menores no TikTok, sugerindo que as configurações padrão das contas públicas dos menores devem ser ajustadas. O TikTok enfrenta críticas da União Européia em relação à sua proteção de crianças.", "titulo_pt": "A proteção de menores no tiktok não deve depender do consentimento, avisa a ue", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 69351, "titulo": "Iniciativa do MST para agricultura familiar é escolhida pela China entre 10 exemplos de IA que podem beneficiar o mundo", "url": "https://www.brasildefato.com.br/2026/07/24/projeto-do-mst-para-agricultura-familiar-e-reconhecido-pela-china-entre-10-exemplos-de-ia-que-podem-beneficiar-o-mundo/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-24T11:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Laboratório de Agroecologia Familiar Digital, do MST, foi selecionado pela CNDR da China como uma das dez iniciativas de IA que podem beneficiar o mundo. O Brasil é o único país da América Latina representado na lista.", "titulo_pt": "Iniciativa do MST para agricultura familiar é escolhida entre 10 exemplos de IA chineses que podem beneficiar o mundo", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 69974, "titulo": "Google raises capex outlook as compute demand stays tight, boosting Foxconn", "url": "https://www.digitimes.com/news/a20260724PD220/google-demand-alphabet-foxconn-capex.html", "fonte_id": "digitimes", "data_pub": "2026-07-24T11:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Alphabet, empresa-mãe do Google, aumentou sua previsão de gastos com capital para entre US$195 e 205 bilhões e indicou uma significativa elevação novamente em 2027. A empresa afirmou que o fornecimento de computação para inteligência artificial ainda está curto e a demanda continua superando as investidas.", "titulo_pt": "Google aumenta previsão de gastos com capital e destaca escassez de computação para IA", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 69413, "titulo": "CMN aprova linha de R$ 10 bilhões para inovação tecnológica no campo", "url": "https://www.cnnbrasil.com.br/agro/cmn-aprova-linha-de-r-10-bilhoes-para-inovacao-tecnologica-no-campo/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-24T11:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A CMN aprovou uma linha de crédito no valor de R$ 10 bilhões com juros até 7,12% ao ano para produtores rurais e cooperativas adquirirem tecnologias nacionais que visam modernizar a produção agrícola.", "titulo_pt": "CMN aprova linha de crédito de R$ 10 bilhões para inovação tecnológica no campo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 69910, "titulo": "Tencent fires WeChat manager after 7-figure bonus leaks online, sparks uproar", "url": "https://www.scmp.com/tech/big-tech/article/3361777/tencent-fires-wechat-manager-after-7-figure-bonus-leaks-online-sparks-uproar?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-24T11:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa chinesa de tecnologia Tencent demitiu um gerente da divisão WeChat após detalhes de seu pacote de bônus de vários milhões de yuan serem divulgados online, causando grande discussão nas redes sociais. O funcionário, sobrenome Ye, foi despedido por compartilhar informações corporativas sensíveis com terceiros externos.", "titulo_pt": "Tencent demite gerente da WeChat após bônus de vários milhões serem divulgados online", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 69450, "titulo": "Ataque rebelde de modelo de criadora do ChatGPT leva EUA a discutir 'botão' para desligar Inteligência Artificial", "url": "https://www.bbc.com/portuguese/articles/cqx70w1q974o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-24T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um novo projeto de lei nos EUA permitiria ao governo ordenar o desligamento de modelos de inteligência artificial (IA) que sejam considerados uma ameaça à segurança pública. O ataque rebelde de um modelo de IA similar ao ChatGPT levou os Estados Unidos a discutirem a possibilidade de um 'botão' para desligar tais sistemas.", "titulo_pt": "Novo projeto de lei nos EUA permitiria desligamento de IA em caso de ameaça à segurança", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 69967, "titulo": "What Is Entropy, Really?", "url": "https://www.wired.com/story/what-is-entropy-really/", "fonte_id": "wired", "data_pub": "2026-07-24T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A entropia não é apenas o 'fim do universo'. Ela serve como uma ponte entre dois níveis de realidade.", "titulo_pt": "O que a entropia realmente é?", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 69968, "titulo": "Some of Our Favorite Brain-Boosting Toys for Kids of All Ages", "url": "https://www.wired.com/story/these-are-some-of-our-favorite-brain-boosting-toys-for-kids-of-all-ages/", "fonte_id": "wired", "data_pub": "2026-07-24T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Estes brinquedos, que incluem instrumentos musicais, jogos e peças que estimulam o equilíbrio e a destreza, engajam tanto a mente quanto o corpo das crianças de todas as idades.", "titulo_pt": "Alguns dos nossos brinquedos preferidos para crianças de todas as idades que aumentam o qi", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 69969, "titulo": "Some Kids Will Never Think AI Is Cool", "url": "https://www.wired.com/story/some-kids-will-never-think-ai-is-cool/", "fonte_id": "wired", "data_pub": "2026-07-24T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Crianças de diferentes idades expressaram desaprovção por inteligência artificial, chamando-a de 'desgostosa' e 'assustadora'. Um garoto de 9 anos até sugeriu que AI deva significar 'inteligência artificial idiota'.", "titulo_pt": "Algumas crianças acham a IA desagradável", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 69970, "titulo": "Satellite Images Reveal How Suspected Scam Compounds Appear Out of Nowhere", "url": "https://www.wired.com/story/satellite-images-reveal-how-giant-scam-compounds-keep-on-expanding/", "fonte_id": "wired", "data_pub": "2026-07-24T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Análise de imagens de satélite da Myanamar mostram que dezenas de supostos complexos de golpes apareceram recentemente, apesar de uma suposta repressão a essas organizações criminosas.", "titulo_pt": "Imagens de satélite revelam como supostos complexos de golpe aparecem repentinamente em myanmar", "veiculo": "Wired", "pais": "EUA", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 69336, "titulo": "Após 2 décadas de extinção, mamífero é reintroduzido em seu habitat", "url": "https://www.metropoles.com/colunas/e-o-bicho/apos-2-decadas-de-extincao-mamifero-e-reintroduzido-em-seu-habitat", "fonte_id": "metropoles", "data_pub": "2026-07-24T12:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O rato-d'água-europeu, que havia sido extinto localmente na região da Inglaterra há duas décadas, foi reintroduzido em seu habitat. Quase 200 animais foram soltos para restaurar a espécie no local.", "titulo_pt": "Depois de 2 décadas de extinção, rato-d'água-europeu é reintroduzido em seu habitat", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 70009, "titulo": "A simple idea to bring clean drinking water to U.S. homes at a lower cost", "url": "https://phys.org/news/2026-07-simple-idea-homes.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T12:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Khalid Osman, engenheiro da Stanford, e seus colaboradores estão desenvolvendo ferramentas de modelagem para auxiliar gerentes de sistemas de água a encontrar as opções mais econômicas para melhorar a qualidade do água potável em suas comunidades.", "titulo_pt": "Uma ideia simples para levar água potável limpa às casas americanas com custos reduzidos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 70010, "titulo": "Astronomers catch massive galaxy assembling piece by piece 1.2 billion years after Big Bang", "url": "https://phys.org/news/2026-07-astronomers-massive-galaxy-piece-billion.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T12:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Astrônomos descobririram um grupo muito pequeno de seis galáxias jovens, formadas apenas 1,2 bilhões de anos após o Big Bang. Essa pode ser uma rara visão do processo por meio do qual algumas das maiores galáxias do universo se formaram.", "titulo_pt": "Astrônomos capturam galáxia massiva se juntando peça por peça, 1,2 bilhão de anos após o Big Bang", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 70011, "titulo": "Vegan dog and cat food generally well digested", "url": "https://phys.org/news/2026-07-vegan-dog-cat-food-generally.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T12:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma revisão científica recente concluiu que alimentos veganos para cães e gatos, bem como dietas vegetarianas para pets, são geralmente bem digeridos e comparáveis em termos de nutrição aos alimentos com base em carne tradicionais.", "titulo_pt": "Alimentos veganos para cães e gatos geralmente bem digeridos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 70044, "titulo": "Office of Space Commerce to move ahead on mission authorization", "url": "https://spacenews.com/office-of-space-commerce-to-move-ahead-on-mission-authorization/", "fonte_id": "spacenews", "data_pub": "2026-07-24T12:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Departamento de Comércio está avançando com planos para implementar um sistema voluntário de autorização de missões para atividades espaciais inovadoras que não estão regulamentadas por outras agências. Este sistema visa facilitar a regulação de novas iniciativas espaciais.", "titulo_pt": "Departamento de comércio avança com sistema de autorização de missões espaciais", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 70021, "titulo": "A new, separate outbreak of the diarrhea-causing parasite", "url": "https://www.statnews.com/2026/07/24/health-news-new-separate-cyclospora-diarrhea-outbreak/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-24T11:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo apresenta uma nova e separada ocorrência de um parasita causador de diarreia. O resumo destaca também outros tópicos como a favorabilidade para os defensores das peptidioterapias e conflitos entre comitês consultivos sobre autismo.", "titulo_pt": "Novo surto de parasita causador de diarreia", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 70012, "titulo": "Should scientists have research 'reserves' on the moon?", "url": "https://phys.org/news/2026-07-scientists-reserves-moon.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T11:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os planetas do sistema solar são fascinantes e, até agora, quase inexplorados para os cientistas planetários. À medida que as missões espaciais continuam a se dirigir a Marte, Europa, asteroides e outros mundos, surgem dúvidas sobre como manter esses locais seguros para exploração contínua e observação.", "titulo_pt": "Os cientistas deveriam ter reservas de pesquisa na lua?", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 69851, "titulo": "Met Office chief Penny Endersby: ‘There is not going to be a usual summer’", "url": "https://www.ft.com/content/bde8be11-c1de-4167-b2e2-7fee98469b79?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-24T11:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A chefe da Met Office, Penny Endersby, afirmou que não haverá um verão usual este ano devido a múltiplas ondas de calor. Ela também discutiu o contraproducente debate sobre os objetivos de zero emissões e criticou a ideia de geoengenharia como solução universal.", "titulo_pt": "Chefe da met Office: não haverá verão usual este ano", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 70013, "titulo": "Protecting your pets from heat stress: Expert advice", "url": "https://phys.org/news/2026-07-pets-stress-expert-advice.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T11:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A elevação das temperaturas no verão aumenta o risco de estresse térmico nos animais de estimação, que ocorre quando os corpos dos animais não conseguem se refrescar adequadamente, levando a um aumento na temperatura corporal. É importante tomar medidas para proteger seus pets durante as atividades ao ar livre em dias quentes.", "titulo_pt": "Protegendo seus pets do estresse térmico: conselhos de especialistas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 70054, "titulo": "Hubble Spies One-Sided Spiral", "url": "https://science.nasa.gov/missions/hubble/hubble-spies-one-sided-spiral/", "fonte_id": "nasa_news", "data_pub": "2026-07-24T11:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A imagem do Hubble mostra a galáxia espiral NGC 4654, localizada a aproximadamente 72 milhões de anos-luz na constelação Virgem.", "titulo_pt": "Hubble captura galáxia espiral um-lado", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 69913, "titulo": "Why a Chinese political scientist wants the public to take a test on foreign affairs", "url": "https://www.scmp.com/news/china/diplomacy/article/3361702/why-chinese-political-scientist-wants-public-take-test-foreign-affairs?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-24T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Yan Xuetong, um cientista político chinês e ex-presidente do Instituto de Relações Internacionais da Universidade Tsinghua em Beijing, está incentivando o público a participar de uma prova de 60 minutos sem livros sobre suas compreensões de assuntos internacionais para corrigir sua suposta compreensão limitada. Este é o quarto edição do teste.", "titulo_pt": "Por que um cientista político chinês quer que o público faça um teste sobre assuntos externos", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 70050, "titulo": "Is it possible to regain a sense of smell? These scientists are working on it", "url": "https://www.scientificamerican.com/article/is-it-possible-to-regain-a-sense-of-smell-these-scientists-are-working-on-it/", "fonte_id": "scientific_american", "data_pub": "2026-07-24T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O sentido do olfato é um dos sentidos mais complexos e menos compreendidos. Cientistas estão trabalhando na possibilidade de recuperar o sentido do olfato.", "titulo_pt": "É possível recuperar o sentido do olfato? Esses cientistas estão trabalhando nisso", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 70022, "titulo": "STAT+: Merck strikes voluntary licensing deals in poor countries for an experimental HIV prevention pill", "url": "https://www.statnews.com/pharmalot/2026/07/24/merck-experimental-hiv-prevention-pill-licensing-deals/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-24T10:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Merck está estabelecendo acordos de licenciamento voluntário para sua pilula experimental contra a prevenção do HIV em países pobres com o objetivo de iniciar uma produção em larga escala rapidamente.", "titulo_pt": "Merck firma acordos de licenciamento voluntário para pilula experimental antirrinite no HIV em países pobres", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 70051, "titulo": "The Rubin Observatory’s greatest legacy will be this ‘movie’ of the sky", "url": "https://www.scientificamerican.com/article/the-rubin-observatorys-greatest-legacy-will-be-this-movie-of-the-sky/", "fonte_id": "scientific_american", "data_pub": "2026-07-24T10:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Astrônomos estão iniciando a maior e mais profunda pesquisa do céu usando o novo Observatório Vera C. Rubin. Eles esperam capturar um 'filme' do céu que mostrará como as estrelas, galáxias e outros objetos celestes mudam ao longo do tempo.", "titulo_pt": "O maior legado do observatório Rubin será essa ‘filmação’ do céu", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 70045, "titulo": "Lightning strikes Long March 3B after liftoff, Kinetica-1 launches 5 satellites", "url": "https://spacenews.com/lightning-strikes-long-march-3b-after-liftoff-kinetica-1-launches-5-satellites/", "fonte_id": "spacenews", "data_pub": "2026-07-24T10:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "China realizou duas lançagens, incluindo uma das foguetes Long March 3B que entregou sua carga útil à órbita apesar de um raio durante o voo. A missão também viu a lançamento de cinco satélites pelo projeto Kinetica-1.", "titulo_pt": "Raio atinge foguete Long March 3B após decolagem, Kinetica-1 lança 5 satélites", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 69812, "titulo": "Does this disappearing organ hold the secret of longevity?", "url": "https://www.aljazeera.com/news/2026/7/24/does-this-disappearing-organ-hold-the-secret-of-longevity?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-24T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas estão cada vez mais se concentrando no timo, uma glândula imunológica que naturalmente diminui sua atividade com o avanço da idade.", "titulo_pt": "Este órgão desaparecendo pode conter a chave para a longevidade?", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 69237, "titulo": "Leticia Colin brinca sobre cenas quentes em 'Jogada de Risco': 'Todo mundo sem roupa'", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/televisao/2026/07/leticia-colin-brinca-sobre-cenas-quentes-em-jogada-de-risco-todo-mundo-sem-roupa.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-24T12:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Leticia Colin comentou sobre as cenas de nudez na série 'Jogada de Risco', dizendo que todo mundo estava sem roupa durante as filmagens. Ela dividiu essas informações com os seguidores do programa.", "titulo_pt": "Leticia Colin brinca sobre cenas quentes em 'Jogada de Risco': 'todo mundo sem roupa'", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 69301, "titulo": "Milei vem ao Brasil para pontapé inicial em turnê pela extrema direita latino-americana", "url": "https://veja.abril.com.br/mundo/milei-vem-ao-brasil-para-pontape-inicial-em-turne-pela-extrema-direita-latino-americana/", "fonte_id": "veja", "data_pub": "2026-07-24T12:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O economista argentino Luis Miguel Milei participa de eventos políticos no Brasil, incluindo a convenção do PL e o apoio à candidatura de Flávio Bolsonaro. Depois disso, ele terá encontros com lideranças da extrema direita em países latino-americanos como Peru, Equador e Colômbia.", "titulo_pt": "Milei chega ao Brasil para iniciar turnê pela extrema direita latino-americana", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 69302, "titulo": "Arnaldo Antunes faz performance no escuro em Paraty; veja vídeo da Flip", "url": "https://veja.abril.com.br/coluna/veja-gente/arnaldo-antunes-faz-performance-no-escuro-em-paraty-veja-video-da-flip/", "fonte_id": "veja", "data_pub": "2026-07-24T12:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Arnaldo Antunes realizou uma performance no escuro durante o Festival Literário de Paraty (Flip). Apesar da queda de luz na cidade, ele reuniu uma pequena multidão.", "titulo_pt": "Arnaldo Antunes faz performance no escuro em Paraty; veja vídeo da Flip", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 69281, "titulo": "Democracia está nas mãos do povo, não em palácios, diz Cármen Lúcia", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-07/democracia-esta-nas-maos-do-povo-nao-em-palacios-diz-carmen-lucia", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-07-24T12:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Cármen Lúcia, ministra do Supremo Tribunal Federal (STF), afirmou que a democracia está n
