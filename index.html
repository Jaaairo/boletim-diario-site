viços de teste e análise de semicondutores Hongkang iniciou um investimento em uma plataforma de análise optoeletrônica de wafers e chips de fotônica de silício. O primeiro sistema está previsto para ser instalado antes de agosto de 2026, seguido por um segundo e terceiro sistema até o final de 2026 e início de 2027, respectivamente.", "titulo_pt": "Hongkang aumenta investimento em testes de fotônica de silício", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 9690, "titulo": "Robot batteries diverge from EVs as A-PRO backs swap systems", "url": "https://www.digitimes.com/news/a20260618PD221/robot-battery-design-electricity-management.html", "fonte_id": "digitimes", "data_pub": "2026-06-21T23:43:00Z", "idioma": "en", "texto_pt": "A fabricante sul-coreana de equipamentos para baterias A-PRO afirma que o design das baterias robóticas difere significativamente das baterias de veículos elétricos (EVs).  Soluções como substituição rápida de baterias, configurações de bateria dupla e gestão de energia autônoma estão emergindo como soluções chave para manter as máquinas funcionando por mais tempo e reduzir os tempos de inatividade. A empresa apresentou sua estratégia no seminário de verão 2026 do Instituto Coreano de Veículos Elétricos (KIEV).", "titulo_pt": "Baterias robóticas divergem das EVs, A-PRO apoia sistemas de troca", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 9691, "titulo": "Tongtai expands aerospace, AI and semiconductor push under new board", "url": "https://www.digitimes.com/news/a20260618PD219/tongtai-manufacturing-chairman-semiconductors-revenue.html", "fonte_id": "digitimes", "data_pub": "2026-06-21T23:42:00Z", "idioma": "en", "texto_pt": "A Tongtai Machine & Tool está acelerando sua transformação para a fabricação de alto valor, aproveitando as oportunidades crescentes em servidores de IA, semicondutores e aeroespacial.  Durante a assembleia geral anual, os acionistas aprovaram todas as propostas e elegeram uma nova diretoria que inclui vários veteranos da indústria aeroespacial, destacando o compromisso da empresa em expandir para setores de fabricação avançada.", "titulo_pt": "Tongtai amplia investimentos em aeroespacial, IA e semicondutores sob nova diretoria", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 9692, "titulo": "FineMat pivots beyond metal masks with AI cooling, semiconductor, and drone push", "url": "https://www.digitimes.com/news/a20260618PD218/finemat-cooling-drone-metal-mask-revenue-supply-chain.html", "fonte_id": "digitimes", "data_pub": "2026-06-21T23:42:00Z", "idioma": "en", "texto_pt": "A FineMat Applied Materials está reduzindo seu foco no negócio de máscaras metálicas devido à crescente localização da cadeia de suprimentos na China. A empresa está acelerando a transição para refrigeração por IA, semicondutores e drones. Os produtos de refrigeração líquida da empresa para aplicações de IA já estão sendo testados por clientes finais e devem começar a ser enviados no segundo semestre de 2026.", "titulo_pt": "FineMat se concentra em refrigeração por IA, semicondutores e drones após queda no mercado de máscaras metálicas", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}], "ciencia": [{"id": 9793, "titulo": "Un estudio explica cómo se construyeron las pirámides egipcias para resistir terremotos", "url": "https://www.lanacion.com.ar/propiedades/construccion-y-diseno/un-estudio-explica-como-se-construyeron-las-piramides-egipcias-para-resistir-terremotos-nid20062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-22T01:55:00Z", "idioma": "es", "texto_pt": "Pesquisadores identificaram características estruturais na Grande Pirâmide de Gizé que dissipam vibrações sísmicas e evitam danos graves. Essas características permitiram que a pirâmide sobrevivesse a vários tremores ao longo dos séculos.", "titulo_pt": "Estudo explica como pirâmides egípcias foram construídas para resistir terremotos", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 9412, "titulo": "Estudo encontra fungo Sporothrix em animais atropelados no PR", "url": "https://www.cnnbrasil.com.br/ciencia/estudo-encontra-fungo-sporothrix-em-animais-atropelados-no-pr/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-22T01:10:00Z", "idioma": "pt", "texto_pt": "Um estudo detectou o fungo Sporothrix em 11 de 81 vertebrados silvestres mortos em rodovias na região da Mata Atlântica, no Paraná.  A pesquisa foi realizada com animais atropelados e analisou a presença do fungo responsável pela esporotricose.", "titulo_pt": "Estudo encontra fungo Sporothrix em animais atropelados no Paraná", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 9656, "titulo": "Chinese woman suffers red, itchy skin after extreme full-face coverage, sunscreen use", "url": "https://www.scmp.com/news/people-culture/trending-china/article/3357409/chinese-woman-suffers-red-itchy-skin-after-extreme-full-face-coverage-sunscreen-use?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-22T01:00:00Z", "idioma": "en", "texto_pt": "Uma mulher da província de Jiangsu, na China oriental, desenvolveu erupções cutâneas e coceira após aplicar medidas extremas de proteção solar. Ela usou protetor solar no rosto antes de colocar um chapéu e uma máscara que cobrem o rosto inteiro para se proteger do sol forte. No final do dia, ela sentiu calor e vermelhidão na pele facial.", "titulo_pt": "Mulher chinesa sofre com vermelhidão e coceira na pele após uso extremo de cobertura facial e protetor solar", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 9713, "titulo": "The giant viruses that orchestrate life in the polar regions", "url": "https://phys.org/news/2026-06-giant-viruses-orchestrate-life-polar.html", "fonte_id": "phys_org", "data_pub": "2026-06-22T00:30:00Z", "idioma": "en", "texto_pt": "Vírus desempenham um papel importante no funcionamento dos ecossistemas. Eles influenciam profundamente a dinâmica das comunidades microbianas, o fluxo de matéria e os ciclos biogeoquímicos globais. Apesar da sua abundância e importância ecológica, muitos deles permaneceram invisíveis à ciência por muito tempo.", "titulo_pt": "Os gigantes vírus que orquestram a vida nas regiões polares", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 9627, "titulo": "Mysterious whale 'necropolis' discovered at the bottom of the Indian Ocean", "url": "https://www.lemonde.fr/en/science/article/2026/06/22/mysterious-whale-necropolis-discovered-at-the-bottom-of-the-indian-ocean_6754728_10.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-22T00:24:00Z", "idioma": "en", "texto_pt": "Uma equipe de pesquisadores descobriu centenas de restos fósseis de baleias na costa sudoeste da Austrália.  Essa área, que se estende por 1.200 quilômetros, é o maior, mais profundo e antigo cemitério de ossos de cetáceos já observado.", "titulo_pt": "Necrópole misteriosa de baleias encontrada no fundo do Oceano Índico", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 9714, "titulo": "El Niño is underway, satellite observations show", "url": "https://phys.org/news/2026-06-el-nio-underway-satellite.html", "fonte_id": "phys_org", "data_pub": "2026-06-21T23:00:00Z", "idioma": "en", "texto_pt": "O El Niño, caracterizado por temperaturas da água mais quentes que o normal em partes do Pacífico equatorial, retornou em junho de 2026. Observações da altura da superfície do mar do satélite Sentinel-6 Michael Freilich naquele mês indicaram que o evento de 2026 continuava a se fortalecer.", "titulo_pt": "El Niño está em curso, mostram observações de satélite", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 9715, "titulo": "Quantum mechanics theory may work without imaginary numbers, new analysis suggests", "url": "https://phys.org/news/2026-06-quantum-mechanics-theory-imaginary-analysis.html", "fonte_id": "phys_org", "data_pub": "2026-06-21T22:20:00Z", "idioma": "en", "texto_pt": "Físicos da Universidade Heinrich Heine de Düsseldorf (HHU) e do Centro Aeroespacial Alemão (DLR) examinaram uma propriedade fundamental da mecânica quântica.  Um artigo publicado no Physical Review Letters mostra que a teoria não precisa ser formulada com números imaginários, pois números reais também podem ser usados.", "titulo_pt": "Teoria da mecânica quântica pode funcionar sem números imaginários, sugere nova análise", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 9716, "titulo": "If you're feeling down, maybe don't pet your cat, new study suggests", "url": "https://phys.org/news/2026-06-youre-dont-pet-cat.html", "fonte_id": "phys_org", "data_pub": "2026-06-21T22:00:00Z", "idioma": "en", "texto_pt": "Um estudo sugere que gatos podem não ser os melhores companheiros para consolar pessoas tristes. Enquanto cães geralmente demonstram alegria ao ver seus donos, gatos podem reagir com hostilidade ou indiferença quando estão sendo procurados por conforto.", "titulo_pt": "Se você está se sentindo mal, talvez não queira acariciar seu gato, sugere novo estudo", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 9717, "titulo": "Engineered bacterial spores reveal new protein targets for enzymes and vaccines", "url": "https://phys.org/news/2026-06-bacterial-spores-reveal-protein-enzymes.html", "fonte_id": "phys_org", "data_pub": "2026-06-21T21:00:00Z", "idioma": "en", "texto_pt": "Pesquisadores da Tufts descobriram novas maneiras de expandir o potencial do uso de esporos bacterianos como catalisadores para reações químicas, produção de biocombustíveis ou decomposição de poluentes. A pesquisa utiliza processos biológicos aprimorados por milhões de anos de evolução para criar medicamentos, produtos químicos e outros itens que melhoram a vida humana.", "titulo_pt": "Esporos bacterianos engenheirados revelam novos alvos para enzimas e vacinas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}], "cultura": [{"id": 9773, "titulo": "Katinguelê e Moacyr Franco cantam em festa julina grátis no parque da Mooca, em SP", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/passeios/2026/06/katinguele-e-moacyr-franco-cantam-em-festa-julina-gratis-no-parque-da-mooca-em-sp.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T02:00:00Z", "idioma": "pt", "texto_pt": "O grupo Katinguelê e o cantor Moacyr Franco se apresentarão em shows durante uma festa junina no Parque da Mooca, em São Paulo. O evento será gratuito nos dias 11 e 12 de julho.", "titulo_pt": "Katinguelê e Moacyr Franco cantam em festa junina gratuita no parque da Mooca, em SP", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9774, "titulo": "Paranoia, que já é uma commodity social e política, criou uma epidemia sistêmica", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/colunas/luizfelipeponde/2026/06/paranoia-que-ja-e-uma-commodity-social-e-politica-criou-uma-epidemia-sistemica.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T02:00:00Z", "idioma": "pt", "texto_pt": "O texto afirma que vivemos em uma sociedade paranoica. A causa dessa paranoia é apresentada como complexa, mas a resposta seria fácil. O artigo será publicado em 21 de junho de 2026 às 23h.", "titulo_pt": "Paranoia, já uma commodity social e política, criou epidemia sistêmica", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9775, "titulo": "Calvos podem assistir a 'Toy Story 5' grátis nesta segunda-feira; veja como retirar ingressos", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/cinema/2026/06/calvos-podem-assistir-a-toy-story-5-gratis-nesta-segunda-feira-veja-como-retirar-ingressos.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T02:00:00Z", "idioma": "pt", "texto_pt": "Pessoas com calvície podem assistir ao filme 'Toy Story 5' gratuitamente na Cinesystem em todo o Brasil nesta segunda-feira (22). O filme estreou nos cinemas no dia 18 de junho.", "titulo_pt": "Calvos podem assistir a 'Toy Story 5' gratuitamente nesta segunda-feira; veja como retirar ingressos", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9370, "titulo": "Demi Moore faz homenagem ao ator Bruce Willis no Dia dos Pais dos Estados Unidos", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/demi-moore-faz-homenagem-ao-ator-bruce-willis-no-dia-dos-pais-dos-estados-unidos.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T21:37:00Z", "idioma": "pt", "texto_pt": "A atriz Demi Moore publicou uma homenagem ao ator Bruce Willis no Instagram neste domingo (21).  Moore e Willis foram casados e tiveram três filhos juntos. A publicação foi feita em celebração ao Dia dos Pais nos Estados Unidos.", "titulo_pt": "Demi Moore homenageia Bruce Willis no Dia dos Pais", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9063, "titulo": "Roda Viva de Gilmar Mendes e 'O Profeta': o que ver na TV e no streaming na segunda", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/roda-viva-de-gilmar-mendes-e-o-profeta-o-que-ver-na-tv-e-no-streaming-na-segunda.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T20:00:00Z", "idioma": "pt", "texto_pt": "A segunda temporada de 'A Agência' estreia. O personagem de Michael Fassbender, um agente duplo, enfrenta sua missão mais perigosa quando a mulher que ama é presa politicamente no Sudão.", "titulo_pt": "Roda Viva com Gilmar Mendes e 'O Profeta': o que ver na TV e no streaming na segunda", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9064, "titulo": "O filme de 1975 que o famoso diretor Wim Wenders tirou de cartaz por ter topless de atriz de 13 anos", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/o-filme-de-1975-que-o-famoso-diretor-wim-wenders-tirou-de-cartaz-por-ter-topless-de-atriz-de-13-anos.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T19:41:00Z", "idioma": "pt", "texto_pt": "O diretor alemão Wim Wenders afirmou que vai restringir o acesso ao seu filme de 1975 'Movimento Em Falso' após pedidos da atriz que aparece sem blusa no longa quando tinha 13 anos.  Wenders foi indicado três vezes ao Oscar.", "titulo_pt": "O filme de 1975 que o diretor Wim Wenders tirou de cartaz por ter topless de atriz de 13 anos", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9162, "titulo": "Por que cada vez mais mulheres chinesas preferem usar roupas masculinas?", "url": "https://www.bbc.com/portuguese/articles/c3eynwjgwedo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-21T18:26:00Z", "idioma": "pt", "texto_pt": "O guarda-roupa das jovens chinesas está mudando. Discussões sobre o tema têm destacado vantagens de roupas masculinas, como modelagem, bolsos maiores e preços mais baixos.", "titulo_pt": "Por que cada vez mais mulheres chinesas preferem roupas masculinas?", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 8315, "titulo": "Morre Robson Barros, empresário que foi paquito da Xuxa, aos 57 anos", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/morre-robson-barros-empresario-que-foi-paquito-da-xuxa-aos-57-anos.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T16:57:00Z", "idioma": "pt", "texto_pt": "Robson Barros, ex-paquito do programa 'Xou da Xuxa', morreu aos 57 anos. A família confirmou a morte nas redes sociais, mas não divulgou a causa. O velório e o sepultamento acontecem neste domingo em São Paulo.", "titulo_pt": "Morre Robson Barros, empresário que foi paquito da Xuxa, aos 57 anos", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 8316, "titulo": "'Toy Story 5', com US$ 160 mi de bilheteria, é a maior estreia do ano nos EUA", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/toy-story-5-com-us-160-mi-de-bilheteria-e-a-maior-estreia-do-ano-nos-eua.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T16:03:00Z", "idioma": "pt", "texto_pt": "O filme de animação 'Toy Story 5' arrecadou cerca de US$ 160 milhões (R$ 825 milhões) em sua estreia nos cinemas americanos. Esse valor supera o de 'Super Mario Galaxy', que faturou US$ 131,7 milhões (R$ 678,5 milhões). O filme se tornou a maior estreia do ano nos Estados Unidos.", "titulo_pt": "'Toy Story 5' é a maior estreia do ano nos EUA", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 8317, "titulo": "Livro reconstrói o terror de campo de concentração no Chile da ditadura Pinochet", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/livro-reconstroi-o-terror-de-campo-de-concentracao-no-chile-da-ditadura-pinochet.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T16:00:00Z", "idioma": "pt", "texto_pt": "O livro aborda dois episódios trágicos na história do Chile, separados por quase um século, que ocorreram na ilha Dawson, no estreito de Magalhães. O ambiente subantártico da ilha foi palco desses eventos históricos.", "titulo_pt": "Livro reconstrui o terror do campo de concentração no Chile da ditadura Pinochet", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 8661, "titulo": "Imperfect Ghazal on Weightless Living", "url": "https://www.theatlantic.com/books/2026/06/poem-ayesha-asad-imperfect-ghazal/687625/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-21T16:00:00Z", "idioma": "en", "texto_pt": "O artigo apresenta um poema Ghazal que explora a sensação de leveza e liberdade. O poeta utiliza metáforas para descrever a experiência de se sentir livre das preocupações e da gravidade física. A obra evoca uma atmosfera contemplativa e introspectiva.", "titulo_pt": "Ghazal Imperfeito sobre Viver sem Peso", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 8733, "titulo": "Paris's Quai Branly Museum turns 20: A look back at its turbulent history", "url": "https://www.lemonde.fr/en/culture/article/2026/06/21/paris-s-quai-branly-museum-turns-20-a-look-back-at-its-turbulent-history_6754721_30.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-21T15:03:00Z", "idioma": "en", "texto_pt": "O museu em Paris está celebrando seu aniversário com grande festa neste fim de semana. Apesar das festividades, o museu continua enfrentando muitos desafios, principalmente econômicos. O museu foi inaugurado em 2003.", "titulo_pt": "Museu Quai Branly de Paris comemora 20 anos: Uma retrospectiva de sua história turbulenta", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 8318, "titulo": "Taís Araujo fará nova temporada de 'Mudando de Pele' em São Paulo", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/teatro/2026/06/tais-araujo-fara-nova-temporada-de-mudando-de-pele-em-sao-paulo.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T15:00:00Z", "idioma": "pt", "texto_pt": "Taís Araújo irá apresentar novas temporadas da peça 'Mudando de Pele' em São Paulo. Após o sucesso da temporada no Sesc 14 Bis, a atriz estreará no Teatro Faap em 13 de agosto.", "titulo_pt": "Taís Araújo fará nova temporada de 'Mudando de Pele' em São Paulo", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 8319, "titulo": "Dua Lipa usou vestido de casamento da Chanel com 25 mil plumas; veja detalhes", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/dua-lipa-usou-vestido-de-casamento-da-chanel-com-25-mil-penas-veja-detalhes.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T14:52:00Z", "idioma": "pt", "texto_pt": "A cantora Dua Lipa divulgou fotos do seu casamento com o ator Callum Turner, realizado na Sicília. O casamento teve três noites de festa com mais de 300 convidados e foi fotografado por David Sims.", "titulo_pt": "Dua Lipa usa vestido de noiva da Chanel com 25 mil penas; veja detalhes", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 8332, "titulo": "União da Orquestra Ouro Preto com Carlinhos Brown traz criação inédita", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/uniao-da-orquestra-ouro-preto-com-carlinhos-brown-traz-criacao-inedita", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-21T14:25:00Z", "idioma": "pt", "texto_pt": "A Orquestra Ouro Preto (OOP) lançou dois volumes do álbum 'Afrossinfonicidade' em parceria com o cantor e compositor Carlinhos Brown. O primeiro volume já está disponível nas plataformas digitais e o segundo será lançado em 26 de junho.  O maestro Rodrigo Toffolo descreveu a colaboração como um encontro afro sinfônico autêntico.", "titulo_pt": "União da Orquestra Ouro Preto com Carlinhos Brown resulta em criação inédita", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 9306, "titulo": "'Despite the tracksuits, we have brains': The French youth staging literary battles in housing projects", "url": "https://www.lemonde.fr/en/m-le-mag/article/2026/06/21/despite-the-tracksuits-we-have-brains-the-french-youth-staging-literary-battles-in-housing-projects_6754720_117.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-21T14:04:00Z", "idioma": "en", "texto_pt": "Um clube do livro em conjuntos habitacionais francês chamado 'Geronimo' está se tornando popular nas redes sociais. O grupo desafia leitores com confrontos entre autores como Zola e Flaubert, e pensadores como Adam Smith e Karl Marx, usando humor. A iniciativa busca aproximar escritores e sociólogos de novos públicos.", "titulo_pt": "'Apesar dos macacões, temos cérebro': Jovens franceses protagonizam batalhas literárias em conjuntos habitacionais", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}], "sociedade": [{"id": 9791, "titulo": "California lanza el “pasaporte laboral” que puede ayudar a conseguir empleo sin título universitario", "url": "https://www.lanacion.com.ar/estados-unidos/california/california-lanza-el-pasaporte-laboral-que-puede-ayudar-a-conseguir-empleo-sin-titulo-universitario-nid21062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-22T01:58:00Z", "idioma": "es", "texto_pt": "A Califórnia está testando um 'passaporte laboral' digital para contratar pessoas qualificadas sem diploma universitário. O objetivo é facilitar o acesso ao mercado de trabalho para profissionais com experiência e habilidades valiosas, mesmo sem formação acadêmica formal.", "titulo_pt": "Califórnia lança 'passaporte laboral' que pode ajudar a conseguir emprego sem título universitário", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 9493, "titulo": "Lo anunció JB Pritzker en Illinois: quiénes pueden recibir los pagos únicos de US$400 para familias que perdieron SNAP", "url": "https://www.lanacion.com.ar/estados-unidos/illinois/lo-anuncio-jb-pritzker-en-illinois-quienes-pueden-recibir-los-pagos-unicos-de-us400-para-familias-nid21062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-22T01:01:00Z", "idioma": "es", "texto_pt": "O governador do Illinois, JB Pritzker, anunciou pagamentos únicos de US$400 para famílias que perderam o benefício do programa SNAP. Os pagamentos serão destinados a famílias elegíveis que tiveram suas inscrições no SNAP canceladas ou suspensas em 2023.", "titulo_pt": "JB Pritzker anuncia pagamentos únicos de US$400 para famílias que perderam o SNAP no Illinois", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 9586, "titulo": "Sala cuna universal: redistribuir, no cargar", "url": "https://www.latercera.com/cartas-al-director/noticia/sala-cuna-universal-redistribuir-no-cargar/", "fonte_id": "la_tercera", "data_pub": "2026-06-22T00:50:00Z", "idioma": "es", "texto_pt": "O artigo discute a proposta de um berço universal como forma de garantir o acesso à segurança e bem-estar infantil para todas as crianças. A ideia é que os recursos sejam redistribuídos para esse fim, em vez de serem acumulados por uma pequena parcela da população.", "titulo_pt": "Berço universal: redistribuir, não carregar", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 9481, "titulo": "Henry Ford: \"Prefiero que 20.000 empleados estén contentos y bien alimentados a que unos pocos se hagan millonarios\"", "url": "https://www.clarin.com/estados-unidos/henry-ford-prefiero-20000-empleados-contentos-bien-alimentados-pocos-hagan-millonarios_0_I5GukOYQEo.html", "fonte_id": "clarin", "data_pub": "2026-06-22T00:35:00Z", "idioma": "es", "texto_pt": "O empresário Henry Ford afirmou preferir que 20 mil empregados estivessem satisfeitos e bem alimentados ao invés de poucos ficarem ricos.  Ford acreditava que essa visão colocava o bem-estar dos trabalhadores acima da acumulação de riqueza individual.", "titulo_pt": "Henry Ford: 'Prefiro que 20 mil empregados estejam contentes e bem alimentados a que alguns se tornem milionários'", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 9483, "titulo": "Salva Orellana, electricista: \"Con 17 años empecé a trabajar 18 horas al día, de lunes a lunes. Fue entonces cuando me di cuenta de que tenía que estudiar algo\"", "url": "https://www.clarin.com/estados-unidos/salva-orellana-electricista-17-anos-empece-trabajar-18-horas-dia-lunes-lunes-entonces-di-cuenta-estudiar_0_IKthzqJbU9.html", "fonte_id": "clarin", "data_pub": "2026-06-22T00:33:00Z", "idioma": "es", "texto_pt": "O empreendedor espanhol Salva Orellana trabalhava como eletricista desde os 17 anos, fazendo 18 horas de trabalho por dia. Essa experiência o fez perceber a importância de estudar.", "titulo_pt": "Salva Orellana, eletricista: 'Com 17 anos comecei a trabalhar 18 horas por dia, de segunda a segunda. Foi então que percebi que tinha que estudar algo'", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 9486, "titulo": "La psicología dice que los adultos que son amables pero carecen de relaciones sólidas a menudo descubren que ser abordado por la gente no es lo mismo que ser elegido por ella, y que una vida llena de interacciones afectuosas puede resultar solitaria", "url": "https://www.clarin.com/estados-unidos/psicologia-dice-adultos-amables-carecen-relaciones-solidas-menudo-descubren-abordado-gente-mismo-elegido-vida-llena-interacciones-afectuosas-puede-resultar-solitaria_0_dXf46yqZLn.html", "fonte_id": "clarin", "data_pub": "2026-06-22T00:31:00Z", "idioma": "es", "texto_pt": "Especialistas apontam que a quantidade de interações sociais não sempre indica a profundidade dos vínculos. Adultos amáveis, porém sem relacionamentos fortes, podem descobrir que serem abordados por pessoas é diferente de serem escolhidos como amigos.", "titulo_pt": "Psicólogos dizem que adultos simpáticos, mas sem relacionamentos sólidos, podem sentir solidão apesar de muitas interações", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 9396, "titulo": "A aposta da Fundação Rockefeller no Brasil, referência em merenda escolar", "url": "https://veja.abril.com.br/coluna/veja-gente/a-aposta-da-fundacao-rockefeller-no-brasil-referencia-em-merenda-escolar/", "fonte_id": "veja", "data_pub": "2026-06-21T22:00:00Z", "idioma": "pt", "texto_pt": "Lyana Latorre, vice-presidente para a América Latina e o Caribe da Fundação Rockefeller, considera o Brasil uma referência mundial em alimentação escolar. A Fundação vê potencial no país para promover práticas de nutrição em escolas.", "titulo_pt": "Aposta da Fundação Rockefeller no Brasil, Referência em Merenda Escolar", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}], "meio_ambiente": [{"id": 9487, "titulo": "Los ingenieros no dan crédito: Nuevo México inaugura el parque eólico más grande de Estados Unidos, equipado con 916 turbinas de viento y capaz de generar 3.650 megavatios, suficiente para abastecer simultáneamente a un millón de hogares en verano", "url": "https://www.clarin.com/estados-unidos/ingenieros-dan-credito-nuevo-mexico-inaugura-parque-eolico-grande-estados-unidos-equipado-916-turbinas-viento-capaz-generar-3650-megavatios-suficiente-abastecer-simultaneamente-millon-hogares-verano_0_zoIJ9sb4I4.html", "fonte_id": "clarin", "data_pub": "2026-06-22T00:23:00Z", "idioma": "es", "texto_pt": "O parque eólico SunZia foi inaugurado em Novo México. O parque possui 916 turbinas de vento e é capaz de gerar 3.650 megawatts de energia. Isso representa 45% da capacidade eólica de Novo México.", "titulo_pt": "Engenheiros não dão crédito: Novo México inaugura o parque eólico mais grande dos Estados Unidos, equipado com 916 turbinas de vento e capaz de gerar 3.650 megawatts, suficiente para abastecer simultaneamente um milhão de lares no verão", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}], "direitos_humanos": [{"id": 9842, "titulo": "(URGENT) Investigators seek arrest warrant for Shincheonji sect leader Lee Man-hee", "url": "https://en.yna.co.kr/view/AEN20260622004900315", "fonte_id": "yonhap_news", "data_pub": "2026-06-22T02:08:00Z", "idioma": "en", "texto_pt": "Investigações na Coreia do Sul procuram um mandado de prisão para o líder da seita Shincheonji, Lee Man-hee. A investigação está relacionada ao surto de COVID-19 que teve origem em uma igreja da seita.", "titulo_pt": "Investigadores buscam mandado de prisão para líder da seita Shincheonji, Lee Man-hee", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 9812, "titulo": "Chile ante el desplazamiento forzado: más allá de la urgencia", "url": "https://www.latercera.com/mundo/noticia/chile-ante-el-desplazamiento-forzado-mas-alla-de-la-urgencia/", "fonte_id": "la_tercera", "data_pub": "2026-06-22T02:00:00Z", "idioma": "es", "texto_pt": "O Chile enfrenta o desafio do deslocamento forçado, buscando soluções que vão além de medidas emergenciais. O país busca implementar políticas e programas a longo prazo para abordar as causas raiz do problema.  Especialistas defendem uma abordagem multidimensional que inclua direitos humanos, proteção social e desenvolvimento sustentável.", "titulo_pt": "Chile frente ao deslocamento forçado: além da urgência", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 9829, "titulo": "Moving the goalposts won’t fix sources of Hong Kong poverty", "url": "https://www.scmp.com/opinion/hong-kong-opinion/article/3357680/moving-goalposts-wont-fix-sources-hong-kong-poverty?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-22T01:30:00Z", "idioma": "en", "texto_pt": "Xia Baolong, responsável por assuntos de Hong Kong e Macau em Pequim, visitou a cidade para revisar o progresso do governo local. Antes da visita de Xia, o governo lançou uma consulta pública sobre o primeiro plano quinquenal da cidade. Após a visita de Xia, o governo publicou um relatório sobre o impacto de suas ações para aliviar a pobreza.", "titulo_pt": "Mover as metas não resolverá as causas da pobreza em Hong Kong", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 9504, "titulo": "Asilo en EE.UU.: las tarifas que ya se aplican y quedan fijas desde el 29 de junio", "url": "https://www.lanacion.com.ar/estados-unidos/migraciones/asilo-en-eeuu-las-tarifas-que-ya-se-aplican-y-quedan-fijas-desde-el-29-de-junio-nid21062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-22T00:02:00Z", "idioma": "es", "texto_pt": "Um novo listado de taxas para solicitantes de asilo nos Estados Unidos foi publicado. As novas tarifas entr const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];

           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">

             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>

         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const rot = n.topico ? (D.rotulos_topico[n.topico] || n.topico) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(n.topico || '')}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
</body>
</html>
