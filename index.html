is Week: LastPass Users Had Their Data Stolen—Again", "url": "https://www.wired.com/story/security-news-this-week-lastpass-users-had-their-data-stolen-again/", "fonte_id": "wired", "data_pub": "2026-06-27T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "John Bolton, ex-aliado nacional de segurança, se declarou culpable em um caso envolvendo materiais classificados. A Microsoft colaborou para derrubar uma infraestrutura significativa utilizada por cibercriminosos para roubar informações.", "titulo_pt": "Notícias de Segurança desta Semana: Usuários do LastPass Tiveram Seus Dados Roubados Novamente", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 21719, "titulo": "AI K-pop video pulled after anti-drug message backfires for Hong Kong prison service", "url": "https://www.scmp.com/news/hong-kong/society/article/3358606/ai-k-pop-video-pulled-after-anti-drug-message-backfires-hong-kong-prison-service?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-27T10:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A corregedoria dos serviços penitenciários de Hong Kong removeu um vídeo anti-drogas que apresentava uma girl group virtual gerada por inteligência artificial e o revisou após críticas online sobre sua semelhança com campanhas promocionais de substâncias ilegais.", "titulo_pt": "Vídeo anti-drogas com AI de K-pop é retirado do ar pela prisão de Hong Kong após críticas", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 21701, "titulo": "Should we fear an AI bubble bust?", "url": "https://www.japantimes.co.jp/business/2026/06/27/markets/ai-bubble-fears/", "fonte_id": "japan_times", "data_pub": "2026-06-27T09:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Recentes flutuações nos valores das empresas de tecnologia estão reacendendo o medo de uma bolha na área da inteligência artificial, e alguns especialistas alertam que se essa bolha explodir, os efeitos poderiam ser mais graves do que qualquer coisa vistas no mercado de Wall Street.", "titulo_pt": "Deveríamos temer uma bolha de IA?", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 22404, "titulo": "How everyone pays the cost for patents on seeds, and private companies get rich from keeping them secret", "url": "https://phys.org/news/2026-06-pays-patents-seeds-private-companies.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T15:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "No Estados Unidos, que é um dos poucos países onde as empresas podem obter patentes sobre variedades de plantas, algumas grandes corporações têm o poder de suprimir concorrência no setor de sementes, inibir a inovação e transformar subvenções públicas destinadas aos agricultores em lucros para as empresas privadas.", "titulo_pt": "Como todos pagam pelo custo das patentes sobre sementes e empresas privadas se tornam ricas mantendo-as secretas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 22056, "titulo": "Scientific American inclui brasileiro em lista de jovens cientistas em ascensão", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/06/scientific-american-inclui-brasileiro-em-lista-de-jovens-cientistas-em-ascensao.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-27T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A revista científica Scientific American destacou um biólogo e neurocientista brasileiro, Kauê Costa, com 36 anos, como uma figura emergente no campo da ciência. Esta menção ocorreu em sua lista de jovens cientistas promissores que foi publicada na edição mais recente da revista americana voltada à divulgação científica.", "titulo_pt": "Scientific American inclui cientista brasileiro na lista de jovens cientistas em ascensão", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 22306, "titulo": "Non-Hermitian geometry reveals when quantum amplification depends only on start and end points", "url": "https://phys.org/news/2026-06-hermitian-geometry-reveals-quantum-amplification.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A geometria da mecânica quântica tem se mostrado uma ferramenta poderosa para entender fenômenos como condução elétrica e supercondutividade. Uma direção de pesquisa busca estender esses conceitos geométricos a mecânica quântica não-hermitiana, onde sistemas podem trocar energia com seu ambiente. Isso inclui a generalização da fase de Berry, uma quantidade geométrica crucial, para o caso não-hermitiano.", "titulo_pt": "Geometria não-hermitiana revela quando a amplificação quântica depende apenas dos pontos de início e fim", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 22326, "titulo": "Galáxia “Shadow Blaster” pode ter enviado partícula fantasma à Terra", "url": "https://www.cnnbrasil.com.br/ciencia/galaxia-shadow-blaster-pode-ter-enviado-particula-fantasma-a-terra/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-27T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Astrônomos acreditam ter rastreado a origem de um neutrino, uma partícula subatômica, que veio da Galáxia Shadow Blaster, distante aproximadamente 11 bilhões de anos-luz. Este avanço pode levar à compreensão mais profunda das interações fundamentais do universo.", "titulo_pt": "Galáxia 'Shadow Blaster' pode ter enviado partícula fantasma à Terra", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 22146, "titulo": "Tecnologia identifica risco de infarto antes dos primeiros sintomas", "url": "https://www.metropoles.com/saude/tecnologia-identifica-risco-infarto", "fonte_id": "metropoles", "data_pub": "2026-06-27T14:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O sistema disponível no Brasil analisa placas de gordura durante cateterismo e ajuda médicos a identificar pacientes com maior risco de infarto, permitindo um atendimento mais preciso.", "titulo_pt": "Tecnologia identifica risco de infarto antes dos primeiros sintomas", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 22307, "titulo": "Research team cuts cost of building reconstituted cell-free systems by 95%", "url": "https://phys.org/news/2026-06-team-reconstituted-cell-free.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de pesquisa liderado pelo Professor Joongoo Lee, da Departamento de Engenharia Química na POSTECH (Universidade de Ciência e Tecnologia de Pohang), desenvolveu um método automatizado e modular para montar sistemas celulares reconstituídos. Esses sistemas test-tube podem produzir proteínas fora das células vivas, com custo reduzido em 95%.", "titulo_pt": "Pesquisa desenvolve método automatizado para reconstituir sistemas celulares sem vida com custo reduzido", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 22309, "titulo": "SpaceCamp at 40: A wish-fulfillment fantasy brought down to earth by NASA's real-life disaster", "url": "https://www.space.com/entertainment/space-movies-shows/spacecamp-at-40-a-wish-fulfillment-fantasy-brought-down-to-earth-by-nasas-real-life-disaster", "fonte_id": "space_com", "data_pub": "2026-06-27T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Depois do acidente do Challenger, ninguém queria assistir a um filme sobre cinco crianças em uma aventura espacial. Este trecho original refere-se à falta de interesse após o trágico incidente envolvendo a espaçonave Challenger, que resultou na morte de todos os passageiros no vôo 51-L da NASA.", "titulo_pt": "SpaceCamp de 40 anos: Fantasia de realização de sonhos destruída por desastre real da NASA", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 22308, "titulo": "Coastal and estuarine carbon removal technique may backfire when pushed too far", "url": "https://phys.org/news/2026-06-coastal-estuarine-carbon-technique-backfire.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T13:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores descobriram que adicionando demais alcalinidade à água salgada para neutralizar ácidos, pode acelerar reações químicas que anulam o processo de remoção de dióxido de carbono do ar.", "titulo_pt": "Técnica de remoção de carbono do mar para combate ao aquecimento global pode ter efeitos contrários se exagerada", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 22042, "titulo": "Saturday Citations: Predicting earthquakes; two types of water; observing event horizons", "url": "https://phys.org/news/2026-06-saturday-citations-earthquakes-event-horizons.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T13:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Moscos, anteriormente considerados uma espécie transplantada, são na verdade nativos do Colorado. Um duplo digital do cérebro de um bebê de dois anos revelou sinais neurais associados ao autismo. Além disso, um novo tratamento com gel para cordas espinhais cortadas restabeleceu a mobilidade em animais de laboratório.", "titulo_pt": "Sábado Citações: Prevendo terremotos; dois tipos de água; observando horizontes eventuais", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 21974, "titulo": "El cerebro puede seguir mejorando hasta los 90 años, según un reciente estudio", "url": "https://www.latercera.com/tendencias/noticia/el-cerebro-puede-seguir-mejorando-hasta-los-90-anos-segun-un-reciente-estudio/", "fonte_id": "la_tercera", "data_pub": "2026-06-27T13:02:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa liderada por cientistas da Universidade de Texas acompanhou mais de 3.900 adultos entre 19 e 94 anos durante três anos e concluiu que a saúde cerebral pode ser melhorada proativamente em qualquer idade.", "titulo_pt": "Cérebro pode melhorar até os 90 anos, sugere estudo recente", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 22043, "titulo": "Lamprey brain atlas reveals 450-million-year blueprint of vertebrate brains", "url": "https://phys.org/news/2026-06-lamprey-brain-atlas-reveals-million.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Para entender o que era o primeiro cérebro complexo vertebrado, cientistas estudaram a estrutura cerebral do lambari, um peixe sem maxilar e parecido com uma arraia que manteve sua estrutura básica há cerca de 360 milhões de anos.", "titulo_pt": "Atlas do cérebro de lamprey revela blueprint do primeiro cérebro vertebrado complexo há 450 milhões de anos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 22047, "titulo": "Blue Origin plans to fly New Glenn rocket again this year despite massive rocket explosion (video)", "url": "https://www.space.com/space-exploration/launches-spacecraft/blue-origin-working-around-the-clock-to-repair-damaged-launch-pad-after-new-glenn-rocket-explosion-video", "fonte_id": "space_com", "data_pub": "2026-06-27T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "De acordo com o CEO Dave Limp, a Blue Origin pretende concluir as reparos e colocar outro fogueto New Glenn na plataforma de lançamento antes do final de 2026, apesar da explosão recente.", "titulo_pt": "Blue Origin planeja voar o foguete New Glenn novamente este ano apesar da explosão massiva (vídeo)", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 22044, "titulo": "Swiss glaciers facing drastic loss from heat wave: Expert", "url": "https://phys.org/news/2026-06-swiss-glaciers-drastic-loss-expert.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T12:40:00Z", "idioma": "en", "provavel_duplicata_de": 21709, "texto_pt": "Os glaciares da Suíça estão prestes a perder uma quantidade enorme de gelo devido à onda de calor atingindo a Europa, conforme informou o chefe do Monitoramento de Glaciares da Suíça (GLAMOS) à AFP.", "titulo_pt": "Glaciares suíços enfrentam perdas drásticas devido à onda de calor", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 22338, "titulo": "Mãe, veterana, dona do próprio tempo: na volta de Serena a Wimbledon, o troféu é o que menos importa", "url": "https://exame.com/esg/mae-veterana-dona-do-proprio-tempo-na-volta-de-serena-a-wimbledon-o-trofeu-e-o-que-menos-importa/", "fonte_id": "exame", "data_pub": "2026-06-27T12:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Aos 44 anos, a tenista mais rica da história desafia a média de aposentadoria no circuito e responde a anos de racismo e sexismo. Ela retorna a Wimbledon como uma atleta independente.", "titulo_pt": "Mãe, veterana, dona do próprio tempo: na volta de Serena a Wimbledon, o troféu é o que menos importa", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 22045, "titulo": "New driving model predicts split-second crash avoidance with humanlike accuracy", "url": "https://phys.org/news/2026-06-humanlike-accuracy.html", "fonte_id": "phys_org", "data_pub": "2026-06-27T12:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas da Universidade Técnica de Delft, em colaboração com a Waymo, desenvolveram um novo modelo que prevê com alta precisão como os motoristas humanos reagem a situações de tráfego perigosas. O modelo combina pela primeira vez diferentes tipos de comportamento de evitação de colisões em uma única abordagem e será publicado no dia 10 de junho na Nature Communications.", "titulo_pt": "Novo modelo prediz evitação de colisões em situações perigosas com alta precisão", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 22339, "titulo": "Sonda Einstein registra possível buraco negro despedaçando uma anã branca", "url": "https://exame.com/ciencia/sonda-einstein-registra-possivel-buraco-negro-despedacando-uma-ana-branca/", "fonte_id": "exame", "data_pub": "2026-06-27T12:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Sonda Einstein capturou um padrão incomum de raios X que pode indicar a existência de um buraco negro separamdo uma anã branca. Este fenômeno é considerado extremamente raro na astrofísica.", "titulo_pt": "Sonda Einstein registra possível buraco negro despedaçando uma anã branca", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 22386, "titulo": "Un acuerdo para crecer, no para una “cambiatón tributaria”", "url": "https://www.latercera.com/opinion/noticia/un-acuerdo-para-crecer-no-para-una-cambiaton-tributaria/", "fonte_id": "la_tercera", "data_pub": "2026-06-27T15:20:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Foram anunciados acordos para o crescimento econômico sem a implementação de um plano significativamente tributário. O foco é no desenvolvimento do país através de medidas que não afetariam diretamente os impostos.", "titulo_pt": "Um acordo para crescer, não para uma 'cambiatón tributaria'", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 22375, "titulo": "Qué significa que los pájaros vuelen todos juntos", "url": "https://www.lanacion.com.ar/lifestyle/que-significa-que-los-pajaros-vuelen-todos-juntos-nid27062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-27T15:15:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Este comportamento é comum em várias espécies e desempenha uma função importante na natureza; detalhes não fornecidos.", "titulo_pt": "O que significa voar juntos todos os pássaros", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 22209, "titulo": "Pymes: entre correr contra el reloj y encontrar el rumbo", "url": "https://www.lanacion.com.ar/opinion/pymes-entre-correr-contra-el-reloj-y-encontrar-el-rumbo-nid27062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-27T14:45:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Dia das Pymes, inventado na Argentina em junho de 27, serve para uma pergunta incômoda: o que construímos vai para algum lugar ou estamos simplesmente correndo mais rápido para ficar no mesmo lugar? A história inclui um fundador que aprendeu a soltar e as filhas que assumiram o comando.", "titulo_pt": "Pymes: entre correr contra o relógio e encontrar um rumo", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 22247, "titulo": "A qué hora y dónde ver a Colombia vs. Portugal en TV y streaming", "url": "https://www.latercera.com/servicios/noticia/a-que-hora-y-donde-ver-a-colombia-vs-portugal-en-tv-y-streaming/", "fonte_id": "la_tercera", "data_pub": "2026-06-27T14:30:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O jogo da terceira rodada decide quem será o líder do Grupo K no Mundial de 2026. O duelo será transmitido em vários canais de televisão e plataformas de streaming.", "titulo_pt": "A hora e o canal para assistir a partida entre Colômbia e Portugal na TV e streaming", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 22211, "titulo": "Qué dice la psicología sobre las personas que duermen con una luz prendida", "url": "https://www.lanacion.com.ar/lifestyle/que-dice-la-psicologia-sobre-las-personas-que-duermen-con-una-luz-prendida-nid27062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-27T14:19:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Psicólogos alertam que deixar focos ligados durante a noite altera os ritmos circadianos. Esta prática está associada à baixa qualidade do sono e possíveis afecções físicas ao longo do tempo.", "titulo_pt": "O que a psicologia diz sobre as pessoas que dormem com luz acesa", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 22051, "titulo": "Morre Alexei Bueno, poeta, editor e tradutor de Edgar Allan Poe, aos 63 anos", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/morre-alexei-bueno-poeta-editor-e-tradutor-de-edgar-allan-poe-aos-63-anos.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-27T14:04:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O poeta, ensaísta, tradutor e editor Alexei Bueno faleceu aos 63 anos no Rio de Janeiro. Ele lutava contra um câncer e sua morte foi confirmada por Marco Chchesi, presidente da Fundação Biblioteca Nacional, e pela Editora Lume.", "titulo_pt": "Alexei Bueno, poeta e editor de Edgar Allan Poe, falece aos 63 anos", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 22311, "titulo": "‘Jackass’: Why This Time Really Is the End", "url": "https://www.indiewire.com/features/interviews/why-jackass-best-and-last-end-1235202589/", "fonte_id": "indiewire", "data_pub": "2026-06-27T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O diretor Jeff Tremaine explicou que 'Jackass' não continuará com um novo elenco, devido a lesões cerebrais e ao trauma sofrido após uma cena sugerindo que Johnny Knoxville havia morrido. A nova gravação do vídeo foi usada como argumento para o fim da série.", "titulo_pt": "'Jackass': Por Que Essa Vez Realmente É o Fim", "veiculo": "IndieWire (cinema)", "pais": "EUA", "classe": "B"}, {"id": 22216, "titulo": "Terremotos en Venezuela: furia y denuncias por la lenta ayuda oficial y se reportan más réplicas", "url": "https://www.lanacion.com.ar/el-mundo/terremotos-en-venezuela-furia-y-denuncias-por-la-lenta-ayuda-oficial-y-se-reportan-mas-replicas-nid27062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-27T13:56:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O governo de Delcy Rodríguez militarizou a região para acelerar a ajuda após o terremoto; cerca de mil pessoas morreram. Mais réplicas foram reportadas.", "titulo_pt": "Terremotos na Venezuela: Fúria e denúncias sobre a lentidão da assistência oficial, com mais réplicas reportadas", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 22249, "titulo": "¿Cuántos récords ha batido Messi en el Mundial?", "url": "https://www.latercera.com/videos/noticia/cuantos-records-ha-batido-messi-en-el-mundial/", "fonte_id": "la_tercera", "data_pub": "2026-06-27T13:51:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Messi continua fazendo história. Através de sua carreira, ele se supera a si mesmo e eleva o nível das conquistas. Apesar do falhar em um pênalti contra Áustria, ele alcançou um recorde de 3 pênaltis perdidos no Mundial. Com isso, Messi passou seu colega de seleção alemão Miroslav Klose com 16 gols marcados. Após marcar dois gols na última partida, ele se tornou o maior goleador em competições planetárias com 18 gols.", "titulo_pt": "Quais recordes Messi quebrou no Mundial?", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 22244, "titulo": "A 10 años de la Copa América Centenario: la discusión entre Pizzi y el plantel que abrió el camino de la Roja al título", "url": "https://www.latercera.com/el-deportivo/noticia/a-10-anos-de-la-copa-america-centenario-la-discusion-entre-pizzi-y-el-plantel-que-abrio-el-camino-de-la-roja-al-titulo/", "fonte_id": "la_tercera", "data_pub": "2026-06-27T13:24:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Uma reunião entre o treinador e os referentes da Geração Dourada foi determinante para a história da Seleção em seu segundo troféu continental. Esta discussão influenciou significativamente o desempenho da equipe durante a Copa América Centenário.", "titulo_pt": "10 anos após a Copa América Centenário: discussão entre Pizzi e o plantel que abriu caminho para a seleção na conquista", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 22112, "titulo": "Maria Bethânia chega aos 80 anos como referência da música plicata_de": null, "texto_pt": "Durante a última partida da fase de grupos do Mundial de 2026, entre Argentina e Jordânia, uma nutricionista chamada Nadia Hrycyk alertou que os fiambres não são alimentos saudáveis. Ela disse que a incidência desses alimentos é muito maior.", "titulo_pt": "Nutricionista alerta sobre riscos ocultos de comer fiambres durante o Mundial: 'A incidência é muito maior'", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 21865, "titulo": "Equipes de El Salvador resgatam menina e cachorro em escombros na Venezuela", "url": "https://www.cnnbrasil.com.br/internacional/equipes-de-el-salvador-resgatam-menina-e-cachorro-em-escombros-na-venezuela/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-27T12:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma menina e seu cachorro foram resgatados sob escombros após um edifício colapsar no 9º andar devido a terremotos que atingiram La Guaira, na Venezuela. A jovem estava presa há dias.", "titulo_pt": "Equipes de El Salvador resgatam menina e cachorro em escombros na Venezuela", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 21873, "titulo": "Resgates de sobreviventes entram em fase crítica após terremotos na Venezuela", "url": "https://www.infomoney.com.br/mundo/resgates-de-sobreviventes-entram-em-fase-critica-apos-terremotos-na-venezuela/", "fonte_id": "infomoney", "data_pub": "2026-06-27T12:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Diante da escassez de socorristas governamentais, venezuelanos procuraram por parentes desaparecidos. Os resgates de sobreviventes entraram em situação crítico após os terremotos na Venezuela.", "titulo_pt": "Resgates de sobreviventes entram em fase crítica após terremotos na Venezuela", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 22039, "titulo": "Boy dies after suspected heatstroke at Tseung Kwan O Sports Ground in Hong Kong", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3358614/boy-dies-after-suspected-heatstroke-tseung-kwan-o-sports-ground-hong-kong?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-27T12:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um menino de 10 a 12 anos foi levado ao hospital inconsciente após vomitar e apresentar sintomas de febre do calor na área principal de um complexo esportivo em Tseung Kwan O, em Hong Kong. Ele foi declarado morto no hospital às 18h50.", "titulo_pt": "Menino morre após suspeita de febre do calor no Tseung Kwan O Sports Ground, em Hong Kong", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 21867, "titulo": "Organização brasileira chega à Venezuela para resgate de animais", "url": "https://www.cnnbrasil.com.br/nacional/brasil/organizacao-brasileira-chega-a-venezuela-para-resgate-de-animais/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-27T12:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma organização especializada em responder a desastres foi chamada pela Organização das Nações Unidas (ONU) na Venezuela, após dois terremotos devastadores. Ela atendeu ao pedido de ajuda local e agora está trabalhando no resgate de animais afetados pelo sismo.", "titulo_pt": "Organização brasileira chega à Venezuela para resgate de animais", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 21874, "titulo": "Cachorro Tsunami vira herói ao resgatar vítimas de terremotos na Venezuela", "url": "https://www.infomoney.com.br/mundo/cachorro-tsunami-vira-heroi-ao-resgatar-vitimas-de-terremotos-na-venezuela/", "fonte_id": "infomoney", "data_pub": "2026-06-27T12:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Tsunami, um cão farejador especializado em deslizamentos de escombros na Venezuela, salvou vidas durante os recentes terremotos. Ele é uma das poucas certificadas nessa função no país.", "titulo_pt": "Tsunami se torna herói ao resgatar vítimas de terremotos na Venezuela", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 21902, "titulo": "Una empresa pagó casi US$ 700 de más por error a sus empleados, muchos gastaron ese excedente y ahora estalló una huelga", "url": "https://www.clarin.com/internacional/empresa-pago-us-700-error-empleados-gastaron-excedente-ahora-estallo-huelga_0_WNdSU7p1tj.html", "fonte_id": "clarin", "data_pub": "2026-06-27T12:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Uma empresa na fábrica Epta Costan realizou uma errônea liquidação que resultou em um pagamento extra de aproximadamente US$ 700 para alguns funcionários. Muitos desses empregados gastaram o excesso e agora houve uma greve, demonstrando insatisfação com a situação.", "titulo_pt": "Empresa pagou mais de US$ 700 por erro a funcionários, muitos gastaram o excesso e agora houve uma greve", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 21282, "titulo": "Levantamento mostra o nível de solidariedade dos brasileiros", "url": "https://www.cnnbrasil.com.br/lifestyle/levantamento-mostra-o-nivel-de-solidariedade-dos-brasileiros/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-27T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um levantamento do Instituto Pensi, com acesso antecipado da CNN Brasil, examina como os brasileiros agem de forma altruísta e as razões que os motivam a contribuir para causas sociais.", "titulo_pt": "Pesquisa mostra o nível de solidariedade dos brasileiros", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 21359, "titulo": "Terremoto: saiba quem era o pastor mineiro que morreu na Venezuela", "url": "https://www.metropoles.com/minas-gerais/terremoto-saiba-quem-era-o-pastor-mineiro-que-morreu-na-venezuela", "fonte_id": "metropoles", "data_pub": "2026-06-27T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O pastor mineiro e sua esposa foram à Venezuela para comemorar seu aniversário e vis titulo": "Germany and Italy swelter in heatwave as records tumble across Europe", "url": "https://www.theguardian.com/world/2026/jun/27/germany-italy-heatwave-records-tumble-across-europe", "fonte_id": "guardian_world", "data_pub": "2026-06-27T15:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Alemanha e a Itália enfrentaram condições de calor intenso no sábado, enquanto um calorão relacionado a várias mortes em regiões ocidentais da Europa se espalhou para o leste. Temperaturas acima de 40°C (104°F) quebraram recordes em ambos os países. Em Dinamarca, registraram-se as temperaturas mais altas de sua história nos registros desde 1874.", "titulo_pt": "Alemanha e Itália sofrem com calor extremo, registrando recordes de temperatura", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 22329, "titulo": "Onda de calor avança em direção ao leste da Europa", "url": "https://www.cnnbrasil.com.br/internacional/onda-de-calor-avanca-em-direcao-ao-leste-da-europa/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-27T14:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Alertas foram emitidos por Praga e Budapeste para moradores e turistas. Temperaturas chegaram a 37°C em ambos os lugares neste sábado, podendo aumentar nos próximos dias.", "titulo_pt": "Onda de calor avança para o leste da Europa", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 22098, "titulo": "Réplicas de terremotos na Venezuela atrapalham operações de resgate", "url": "https://www.cnnbrasil.com.br/internacional/replicas-de-terremotos-na-venezuela-atrapalham-operacoes-de-resgate/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-27T14:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Tremores contínuos e danos extensos causados por um terremoto na Venezuela geraram preocupação entre as equipes de socorro. Isso afetou negativamente as operações da Cruz Vermelha, que enfrentam desafios para lidar com a situaçã ", "titulo_pt": "Centenas de navios-tanque parados por meses acumularam bioincrustações e precisam de remoção para retomar a navegação", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 22131, "titulo": "El Niño muda o tempo e leva chuva forte ao Sul neste fim de semana", "url": "https://exame.com/brasil/el-nino-muda-o-tempo-e-leva-chuva-forte-ao-sul-neste-fim-de-semana/", "fonte_id": "exame", "data_pub": "2026-06-27T11:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Após dias de frio intenso e geadas, um sistema de instabilidade avança pelo Rio Grande do Sul e se espalha pelos demais estados da região sul do país.", "titulo_pt": "El Niño altera o clima e traz fortes chuvas ao Sul neste fim de semana", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 22014, "titulo": "Woman rescued after car plunges into flooded sinkhole", "url": "http://www.euronews.com/video/2026/06/27/woman-rescued-after-car-plunges-into-flooded-sinkhole", "fonte_id": "euronews", "data_pub": "2026-06-27T11:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma policial salvou uma mulher ao recolhê-la da direção do seu veículo que caiu num poço causado por um vazamento de tubulação de água na Virgínia, EUA. Câmeras de segurança mostram pessoas ajudando a estabilizar a policial enquanto ela resgatava a vítima.", "titulo_pt": "Mulher resgatada após carro cair em poço de água subterrânea", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 21362, "titulo": "Calor intenso: Alemanha bate recorde e registra 41,3 °C", "url": "https://www.metropoles.com/mundo/calor-alemanha-bate-recorde-registra-413-c", "fonte_id": "metropoles", "data_pub": "2026-06-27T11:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O recorde de temperatura mais alto registrado na Alemanha foi superado com uma marca de 41,3 °C no verão deste ano. Este valor ultrapassa a marca registrada em julho de 2019, quando as temperaturas chegaram no país caribenho. A Comissão Europeia anunciou este fato.", "titulo_pt": "Buscas continuam para sobreviventes do terremoto na Venezuela", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 21544, "titulo": "Snow and ice on Swiss glaciers melting at alarming rate amid heatwave, expert says", "url": "https://www.theguardian.com/environment/2026/jun/27/snow-and-ice-on-swiss-glaciers-melting-at-alarming-rate-amid-heatwave-expert-says", "fonte_id": "guardian_world", "data_pub": "2026-06-27T02:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os glaciais da Suíça estão prestes a perder toda a neve e gelo acumulado no último inverno devido ao calor que atinge Europa. Segundo o chefe do Glacier Monitoring na Suíça (Glamos), os picos de derretimento dos glaciais suíços, marcados como dia de perda de glaciais, estão a chegar mais cedo do que era esperado. Este fenômeno está ocorrendo em um ritmo alarmante e marca o segundo menor tempo desde registros.", "titulo_pt": "Neve e gelo nos glaciais suíços derrete a uma taxa alarmante durante o calor europeu, especialista afirma", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 21709, "titulo": "Swiss glaciers facing drastic loss from heat wave", "url": "https://www.japantimes.co.jp/news/2026/06/27/world/swiss-glaciers-loss-heat-wave/", "fonte_id": "japan_times", "data_pub": "2026-06-27T02:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A geleia e o gelo acumulados nas glaciares suíços durante a última primavera estão previstos para ter desaparecido completamente até segunda-feira. A perda rápida do gelo pode representar sérias consequências climáticas na região.", "titulo_pt": "Glaciers da Suíça enfrentam perda drástica devido a onda de calor", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 20460, "titulo": "Heavy rains flood Taiwan, leaving at least two dead", "url": "https://www.taipeitimes.com/News/front/archives/2026/06/27/2003859816", "fonte_id": "taipei_times", "data_pub": "2026-06-27T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Chuvas intensas atingiram Taiwan, causando inundações e deslizamentos de terra. Pelo menos duas pessoas morreram como resultado das chuvas. As autoridades estão trabalhando para fornecer ajuda às áreas afetadas.", "titulo_pt": "Chuvas torrenciais causam inundações em Taiwan, deixando pelo menos duas pessoas mortas", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 22155, "titulo": "Contratado por marido para matar amante de mulher é preso no Entorno", "url": "https://www.metropoles.com/distrito-federal/na-mira/contratado-por-marido-para-matar-amante-de-mulher-e-preso-no-entorno", "fonte_id": "metropoles", "data_pub": "2026-06-27T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um homem foi preso após ser contratado pelo marido de uma mulher para matar o amante dessa última. O crime ocorreu em Cristalina, Goiás.", "titulo_pt": "Contratado por marido para matar amante de mulher é preso no entorno", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 22255, "titulo": "Investigan femicidio en Labranza: Fiscalía pedirá ampliar detención de imputado", "url": "https://www.latercera.com/nacional/noticia/investigan-femicidio-en-labranza-fiscalia-pedira-ampliar-detencion-de-imputado/", "fonte_id": "la_tercera", "data_pub": "2026-06-27T13:50:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "De acordo com a Fiscalia, existia uma denúncia antecipada e uma cautelar que impedia o acusado de se aproximar ou comunicar-se com a vítima.", "titulo_pt": "Investigam feminicídio em Labranza: Promotoria pedirá ampliar detenção do imputado", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 22111, "titulo": "ChatGPT está morrendo ou ficando complexo demais para o usuário comum?", "url": "https://www.cnnbrasil.com.br/te const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${artsHtml ? `<div class="destaque-fontes">
      <h3>Fontes desta edição</h3>
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}
</script>
