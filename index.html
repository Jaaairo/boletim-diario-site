 alface iceberg fornecida ao Taco Bell", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 56962, "titulo": "Ancient Egyptian princesses were ‘powerful’ weapon users, new analysis suggests", "url": "https://www.scientificamerican.com/article/ancient-egyptian-princesses-were-powerful-weapon-users-new-analysis-suggests/", "fonte_id": "scientific_american", "data_pub": "2026-07-17T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Novo estudo sugere que as princesas egípcias eram usuárias 'poderosas' de armas, desafiando a crença longamente aceita sobre os objetos encontrados em sítios arqueológicos femininos.", "titulo_pt": "Princesas egípcias eram ‘potentes’ usuárias de armas, sugere novo estudo", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 56982, "titulo": "Why the upcoming eclipse is still vital in the age of solar probes", "url": "https://www.newscientist.com/article/2533621-why-the-upcoming-eclipse-is-still-vital-in-the-age-of-solar-probes/?utm_campaign=RSS|NSNS&utm_content=home&utm_medium=RSS&utm_source=NSNS", "fonte_id": "new_scientist", "data_pub": "2026-07-17T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Experiências durante a eclipses de agosto irão aproveitar essa oportunidade para obter mais conhecimentos sobre o sol e a Terra, com um custo relativamente baixo.", "titulo_pt": "Por que a próxima eclipses ainda é vital na era dos sondas solares", "veiculo": "New Scientist", "pais": "Reino Unido", "classe": "B"}, {"id": 56957, "titulo": "Why affirming trans identities can be critical for suicide prevention counseling", "url": "https://www.statnews.com/2026/07/17/trevor-project-suicide-prevention-counseling-for-trans-youth/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-17T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Advogados estão preocupados que excluir jovens transexuais de certos serviços de orientação LGBTQ+ através da linha de crise 988 possa ser prejudicial. O título em português é: Por que afirmar identidades trans pode ser crucial para a prevenção do suicídio.", "titulo_pt": "Por que afirmar identidades trans pode ser crucial para a prevenção do suicídio", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 56357, "titulo": "Economia do cuidado é tema de novo episódio de Afiadas desta sexta", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-07/economia-do-cuidado-e-tema-de-novo-episodio-de-afiadas-desta-sexta", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-07-17T10:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O quarto episódio de Afiadas, exibido pela TV Brasil nesta sexta-feira (17) às 23h, aborda o tema Economia do cuidado. O programa acompanha a rotina do salão de beleza de Dona Márcia e discute maternidade, divisão do trabalho doméstico e as responsabilidades associadas às mulheres.", "titulo_pt": "Economia do cuidado é tema do novo episódio de Afiadas desta sexta", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 56402, "titulo": "O melhor de tudo da Odisseia: todos falam de uma história de 2,8 mil anos", "url": "https://veja.abril.com.br/coluna/mundialista/o-melhor-de-tudo-da-odisseia-todos-falam-de-uma-historia-de-28-mil-anos/", "fonte_id": "veja", "data_pub": "2026-07-17T10:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O filme de Christopher Nolan baseado na Odisseia de Homero apresenta personagens como Helena negra e um personagem vivido por uma pessoa trans, mas o foco principal é a continuidade da história ao longo dos 2.800 anos.", "titulo_pt": "O melhor de tudo da Odisseia: todos falam de uma história de 2.800 anos", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 56992, "titulo": "Note Design Studio looks to traditional farmsteads for villa in southern Sweden", "url": "https://www.dezeen.com/2026/07/17/note-design-studio-villa-osterlen-sweden/", "fonte_id": "dezeen", "data_pub": "2026-07-17T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Note Design Studio concluiu a Villa Österlen, uma casa de férias na Suécia do sul projetada como uma interpretação contemporânea das casas rurais tradicionais da região de Skåne. A residência pode acolher grandes reuniões familiares e está localizada em um paisagismo verde, com vista para campos, florestas e um vilarejo próximo.", "titulo_pt": "Note Design Studio busca inspiração em casas rurais tradicionais para villa na suécia do sul", "veiculo": "Dezeen (design e arquitetura)", "pais": "Reino Unido", "classe": "B"}, {"id": 57010, "titulo": "Lit Hub Daily: July 17, 2026", "url": "https://lithub.com/lit-hub-daily-july-17-2026/", "fonte_id": "lithub", "data_pub": "2026-07-17T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Henry Power aborda uma questão antiga: quantos Homers existiram realmente? Rose expressa sua ansiedade pelo próximo conto da história de Odisseu.", "titulo_pt": "Henry power explora a quantidade de homers reais | lit Hub história", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 56860, "titulo": "China student discovered on video platform shines as heroine in acclaimed film ‘Dear You’", "url": "https://www.scmp.com/news/people-culture/trending-china/article/3360974/china-student-discovered-video-platform-shines-heroine-acclaimed-film-dear-you?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-17T10:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A atriz Li Sitong, que interpretou Zia Lamgi no filme baixo orçamento 'Dear You', um drama teocês sobre migração que se tornou um dos maiores sucessos de bilheteria da China em verão, disse após formatura que deseja continuar sua carreira como atriz. O filme, dirigido por Lan Hongchun, narra a história de um jovem teocês que viaja para Tailândia em busca do seu avô afastado Ten Baksheng e descobre que este já havia falecido há muito tempo.", "titulo_pt": "Estudante chinesa se torna protagonista de grande sucesso cinematográfico", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 56644, "titulo": "Tu mano dominante podría no estar determinada al nacer, según un estudio", "url": "https://www.latercera.com/tendencias/noticia/tu-mano-dominante-podria-no-estar-determinada-al-nacer-segun-un-estudio/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T10:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um estudo liderado por cientistas da UCLA questiona a crença de que a mão dominante é determinada apenas pelo cérebro. A pesquisa sugere que outros fatores podem desempenhar um papel na definição da mão preferida.", "titulo_pt": "A mão dominante pode não ser definida apenas no nascimento, diz estudo", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 56983, "titulo": "Planned Charlie Kirk Statue Gets Trolled", "url": "https://hyperallergic.com/planned-charlie-kirk-statue-gets-trolled/", "fonte_id": "hyperallergic", "data_pub": "2026-07-17T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um projeto de estátua do Charlie Kirk foi vítima de uma brincadeira. Também, Trump reduziu o tamanho de dois monumentos nacionais no Utah em 90%.", "titulo_pt": "Plano de estátua do Charlie Kirk é vítima de brincadeira", "veiculo": "Hyperallergic (arte)", "pais": "EUA", "classe": "B"}, {"id": 56993, "titulo": "ZHA 3D-prints voluptuous chair from recycled plastic", "url": "https://www.dezeen.com/2026/07/17/echo-chair-3d-printed-zha-nagami/", "fonte_id": "dezeen", "data_pub": "2026-07-17T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A arquitetura de estúdios ZHA, anteriormente conhecida como Zaha Hadid Architects, colaborou com a marca espanhola Nagami para lançar a cadeira 3D-impressa Echo feita de plástico reciclado. A cadeira escultórica, projetada usando software de design paramétrico, possui um encosto arqueado que se estende até o chão em uma superfície plana e assento que encaixa os lados do sentador.", "titulo_pt": "ZHA 3d-imprime cadeira voluptuosa feita de plástico reciclado", "veiculo": "Dezeen (design e arquitetura)", "pais": "Reino Unido", "classe": "B"}, {"id": 56994, "titulo": "Italy's former head of motorways sentenced to 12 years over Ponte Morandi collapse", "url": "https://www.dezeen.com/2026/07/17/ponte-morandi-bridge-collapse-sentence/", "fonte_id": "dezeen", "data_pub": "2026-07-17T09:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Giovanni Castellucci, ex-dirigente da operadora de estradas Autostrade per l'Italia, foi condenado a 12 anos de prisão por complicitar no acidente que causou o colapso do Ponte Morandi em 2018, na cidade de Gênova, que resultou na morte de 43 pessoas. Ele recebeu a pena mais severa entre os condenados no caso.", "titulo_pt": "Ex-dirigente das estradas italianas condenado a 12 anos por colapso da Ponte Morandi", "veiculo": "Dezeen (design e arquitetura)", "pais": "Reino Unido", "classe": "B"}, {"id": 56995, "titulo": "Contemporary Room Dividing Screens by Fold Studio", "url": "https://www.dezeen.com/2026/07/17/contemporary-room-dividing-screens-fold-studio-dezeen-showroom/", "fonte_id": "dezeen", "data_pub": "2026-07-17T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A marca de design australiana Fold Studio lançou uma série de telas dobráveis freestanding feitas com quadros de madeira endurecida esticados com tecidos ou cordas interligadas. As coleções Woven-Fold e Fabric-Fold compartilham estruturas de quadro de carvalho branco americano, carvalho preto americano ou carvalho americano e dobradiças em latão cru.", "titulo_pt": "Telas dobráveis modernas da Fold Studio", "veiculo": "Dezeen (design e arquitetura)", "pais": "Reino Unido", "classe": "B"}, {"id": 57011, "titulo": "Nostos, or Homecoming: Why I Keep Returning to the Odyssey", "url": "https://lithub.com/nostos-or-homecoming-why-i-keep-returning-to-the-odyssey/", "fonte_id": "lithub", "data_pub": "2026-07-17T09:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O autor relembra sua primeira leitura do Ódisseia, quando tinha 16 anos. Ele foi atraído pela natureza fantástica das criaturas, culturas estranhas e pelo herói astuto em sua busca incansável por casa.", "titulo_pt": "Nostos, ou retorno: por que eu continuo volvendo-me para a ódisseia", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 57012, "titulo": "Who, Exactly, Were All Those Girls in Renoir’s Paintings?", "url": "https://lithub.com/who-exactly-were-all-those-girls-in-renoirs-paintings/", "fonte_id": "lithub", "data_pub": "2026-07-17T09:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Museu de Arte de São Paulo Assis Chateaubriand (MASP) está suspenso acima da Avenida Paulista, com tráfego e árvores. Por meio de uma magia arquitetônica de concreto e vidro, as pinturas dentro do museu estão alinhadas.", "titulo_pt": "Quem exatamente eram todas essas mulheres nas pinturas de Renoir?", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 57013, "titulo": "What Writing About Bobby Kennedy Taught Me About Male Power", "url": "https://lithub.com/what-writing-about-bobby-kennedy-taught-me-about-male-power/", "fonte_id": "lithub", "data_pub": "2026-07-17T09:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O autor estava escrevendo um romance sobre Bobby Kennedy durante o verão, enquanto a Suprema Corte decidia sobre a legalidade do aborto. O contexto pessoal do autor como mulher no século XXI influenciava sua escrita.", "titulo_pt": "O que escrever sobre Bobby Kennedy Me ensinou sobre poder masculino", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 57014, "titulo": "A Chorus of Poets: On the Possible Existence of Multiple Homers", "url": "https://lithub.com/a-chorus-of-poets-on-the-possible-existence-of-multiple-homers/", "fonte_id": "lithub", "data_pub": "2026-07-17T09:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O autor observa o amanhecer e se lembra de uma tarefa doméstica esquecida. Ao ligar a rádio, ouve notícias sobre homens poderosos com egos frágeis que estão causando instabilidade no mundo.", "titulo_pt": "Um coro de poetas: sobre a possível existência de vários Homers", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 57015, "titulo": "Nine Feminist Mythological Reimaginings to Read After You Watch The Odyssey", "url": "https://lithub.com/nine-feminist-mythological-reimaginings-to-read-after-you-watch-the-odyssey/", "fonte_id": "lithub", "data_pub": "2026-07-17T09:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O texto menciona que mitologias de todo o mundo contêm histórias centradas em heróis, como Gilgamesh, a Ilíada, o Mahabharata e o Shahnameh. Geralmente, as mulheres associadas a esses heróis são submetidas ao segundo plano.", "titulo_pt": "Nove reinterpretações feministas mitológicas para ler depois de assistir à odisséia", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 56352, "titulo": "'Quem Ama Cuida': Mariana Ximenes ganha mais espaço em novela após aprovação do público", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/07/quem-ama-cuida-mariana-ximenes-ganha-mais-espaco-em-novela-apos-aprovacao-do-publico.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-17T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A novela 'Quem Ama Cuida' vai aumentar o tempo de tela da personagem Dora, interpretada por Mariana Ximenes, nas próximas semanas. Dora tem sido bem recebida pelo público no grupo de discussão da trama das nove da Globo.", "titulo_pt": "Quem Ama Cuida': mariana Ximenes ganha mais espaço após aprovação do público", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}], "cultura__eventos": [], "sociedade": [{"id": 56639, "titulo": "El mejor programa social", "url": "https://www.latercera.com/opinion/noticia/el-mejor-programa-social/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T11:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O texto se refere ao melhor programa social, mas não fornece detalhes adicionais sobre qual programa é mencionado ou quais são suas características.", "titulo_pt": "Melhor programa social", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 56400, "titulo": "Mulheres que tiveram filhos poderão ter adicional de até 15% na aposentadoria", "url": "https://veja.abril.com.br/economia/mulheres-que-tiveram-filhos-poderao-ter-adicional-de-ate-15-na-aposentadoria/", "fonte_id": "veja", "data_pub": "2026-07-17T10:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A proposta do partido Podemos, com relatoria do PSOL, foi aprovada pela Comissão da Câmara dos Deputados. Essa medida pode permitir que mulheres que tenham tido filhos tenham um adicional de até 15% na aposentadoria.", "titulo_pt": "Mulheres que tiveram filhos poderão ter adicional de até 15% na aposentadoria", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 56425, "titulo": "Donos de distribuidora usada para o tráfico de drogas são alvo da PCDF", "url": "https://www.metropoles.com/distrito-federal/na-mira/distribuidora-de-fachada-usada-para-o-trafico-de-drogas-e-alvo-da-pcdf", "fonte_id": "metropoles", "data_pub": "2026-07-17T10:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Civil do Distrito Federal (PCDF) alvou os donos de uma distribuidora e funcionários que usavam o estabelecimento como fachada para tráfico de drogas em Ceilândia, DF.", "titulo_pt": "Donos de distribuidora usada para o tráfico de drogas são alvo da PCDF", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 56646, "titulo": "Liceos de Santiago han expulsado a 41 estudiantes por faltas graves en lo que va del año, 40 de ellos a través de Aula Segura", "url": "https://www.latercera.com/nacional/noticia/liceos-de-santiago-han-expulsado-a-41-estudiantes-por-faltas-graves-en-lo-que-va-del-ano-40-de-ellos-a-traves-de-aula-segura/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T10:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Em Santiago, 41 estudantes foram expulsos devido a faltas graves desde o início do ano, sendo que 40 desses casos ocorreram através do programa Aula Segura. Das 109 investigações por infrações graves e gravíssimas, 37,6% resultaram em expulsões.", "titulo_pt": "Liceus de Santiago expulsam 41 alunos por faltas graves", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 56433, "titulo": "PMs são alvo de operação após mortes de jovem e adolescente na Bahia", "url": "https://www.metropoles.com/colunas/mirelle-pinheiro/pms-sao-alvo-de-operacao-apos-mortes-de-jovem-e-adolescente-na-bahia", "fonte_id": "metropoles", "data_pub": "2026-07-17T09:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Militar é alvo de uma operação que cumpre mandados de prisão e busca e apreensão em residências e locais de trabalho dos investigados após mortes de jovem e adolescente na Bahia.", "titulo_pt": "Pms são alvo de operação após mortes de jovem e adolescente na Bahia", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 56479, "titulo": "PMs investigados por homicídios são alvos de operação na Bahia", "url": "https://www.cnnbrasil.com.br/nacional/nordeste/ba/pms-investigados-por-homicidios-sao-alvos-de-operacao-na-bahia/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T09:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Foram cumpridos mandados de prisão e busca e apreensão em residências e locais funcionais de seis policiais militares investigados por crimes de homicídios qualificados e fraude processual.", "titulo_pt": "Pms suspeitos de homicídios são alvos de operação na Bahia", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 56805, "titulo": "Why is Pakistan’s Sindh province facing a major child HIV outbreak?", "url": "https://www.aljazeera.com/news/2026/7/17/why-is-pakistans-sindh-province-facing-a-major-child-hiv-outbreak?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-17T07:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo surto de HIV entre crianças está ligado a um hospital em Karachi, Sindh, Paquistão. Especialistas afirmam que este surto reflete falhas sistêmicas.", "titulo_pt": "Por que o estado de Sindh do paquistão está enfrentando uma grave epidemia de HIV infantil?", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 56491, "titulo": "Fies: Estudantes têm até esta sexta (17) para se inscrever no programa", "url": "https://www.cnnbrasil.com.br/educacao/fies-estudantes-tem-ate-esta-sexta-17-para-se-inscrever-no-programa/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T07:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os estudantes têm até esta sexta-feira, 17 de junho, para se inscrever no programa Fies pelo Portal Único de Acesso. O resultado da seleção será divulgado em 30 de julho.", "titulo_pt": "Fies: estudantes têm até esta sexta (17) para se inscrever", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 56878, "titulo": "Boy, 14, arrested after allegedly knocking classmate unconscious", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3360916/boy-14-arrested-after-allegedly-knocking-classmate-unconscious?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-17T07:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um adolescente de 14 anos foi detido por suspeita de lesão corporal após supostamente empurrar um colega de classe, que permanece em estado grave há duas semanas. A polícia informou que o suspeito foi preso na segunda-feira após uma investigação aprofundada e será solto sob fiança, devendo comparecer à delegacia no fim de julho.", "titulo_pt": "Menino de 14 anos detido após supostamente empurrar colega e deixá-lo gravemente ferido", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 56880, "titulo": "Trump’s China election-interference claims spark scapegoat fears among Asian-Americans", "url": "https://www.scmp.com/news/china/diplomacy/article/3360909/trumps-china-election-interference-claims-spark-scapegoat-fears-among-asian-americans?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-17T06:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente dos Estados Unidos, Donald Trump, acusou China de interferência nas eleições americanas. Essa acusação levantou preocupações na comunidade chinesa-americana, que teme ser alvo de responsabilização se os resultados das eleições parlamentares não agradarem à Casa Branca.", "titulo_pt": "Acusações de trump sobre interferência chinesa nas eleições geram medo de responsabilização na comunidade asiática-americana", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 56214, "titulo": "¿Plaga o habitante legítima? Las cotorras se adaptaron, coparon la ciudad y generan fricciones", "url": "https://www.lanacion.com.ar/revista-jardin/plaga-o-habitante-legitima-las-cotorras-se-adaptaron-coparon-la-ciudad-y-generan-fricciones-nid17072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-17T03:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "As cotorras se adaptaram à cidade e estão causando conflitos com os moradores. Elas ocupam espaços públicos e privados, gerando disputas sobre o uso do espaço urbano.", "titulo_pt": "Plaga ou habitante legítima? As cotorras dominaram a cidade e criaram fricções", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 56218, "titulo": "Alcalde de Cerro Navia apunta a una posible intervención de terceros tras muerte de hombre electrocutado por un poste energizado", "url": "https://www.latercera.com/nacional/noticia/alcalde-de-cerro-navia-apunta-a-una-posible-intervencion-de-terceros-tras-muerte-de-hombre-electrocutado-por-un-poste-energizado/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T02:57:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O prefeito de Cerro Navia apontou a possibilidade de uma intervenção de terceiros após a morte de um homem que foi electrocutado por um poste energizado. Segundo ele, o poste é antigo e pertence ao Transantiago, não sendo da Enel, e as perícias serão realizadas para determinar se houve uma conexão ilegal à rede elétrica.", "titulo_pt": "Prefeito de Cerro Navia suspeita de intervenção de terceiros após morte por electrocussão", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 56312, "titulo": "1 in 3 Korean teens are inconsistent with birth control use", "url": "https://www.koreaherald.com/article/10811960", "fonte_id": "korea_herald", "data_pub": "2026-07-17T02:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo mostrou que cerca de um terço das adolescentes sexualmente ativas na Coreia do Sul não utilizaram anticoncepcionais consistentemente no último ano, com muitas delas relatando a inexistência de contraceptivos ou influências dos parceiros. Em 2025, 67,3% das respostantes adolescentes disseram ter usado anticoncepcionais sempre durante o sexo nos últimos 12 meses.", "titulo_pt": "Um em três adolescentes coreanos não são consistentes no uso de contracepção", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 55188, "titulo": "Pedro Turra será julgado por forçar adolescente a ingerir álcool", "url": "https://www.metropoles.com/distrito-federal/pedro-turra-sera-julgado-por-forcar-adolescente-a-ingerir-alcool", "fonte_id": "metropoles", "data_pub": "2026-07-17T01:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Justiça aceitou a denúncia contra Pedro Turra e determinou a realização da audiência de instrução e do julgamento sobre o caso em que ele foi acusado de forçar uma adolescente a ingerir álcool.", "titulo_pt": "Pedro Turra será julgado por forçar adolescente a consumir álcool", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 55173, "titulo": "Câmeras flagram advogado entrando em adega antes de ser encontrado morto SP", "url": "https://www.cnnbrasil.com.br/nacional/sudeste/sp/cameras-flagram-advogado-entrando-em-adega-antes-de-ser-encontrado-morto-sp/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T00:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um advogado chamado Pedro Ely foi visto por câmeras de segurança com outro homem por volta das 2h50 da madrugada de sexta-feira antes de ser encontrado morto. O local do incidente envolve uma adega.", "titulo_pt": "Câmeras flagram advogado entrando em adega antes de ser encontrado morto em SP", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 55457, "titulo": "El temporal demográfico", "url": "https://www.latercera.com/cartas-al-director/noticia/el-temporal-demografico/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T00:54:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O artigo discute sobre o aumento populacional, sem entrar em detalhes específicos ou análises.", "titulo_pt": "O temporal demográfico", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 56478, "titulo": "Empresa é autuada em mais de R$ 4,5 milhões por vazamento de gás em Manaus", "url": "https://www.cnnbrasil.com.br/nacional/norte/am/empresa-e-autuada-em-mais-de-r-45-milhoes-por-vazamento-de-gas-em-manaus/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T09:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A empresa foi multada em mais de R$ 4,5 milhões após um vazamento de gás em Manaus. Vários bairros foram afetados e o nível de poluição ultrapassou a tolerância humana.", "titulo_pt": "Empresa é autuada em mais de R$ 4,5 milhões por vazamento de gás em Manaus", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 56712, "titulo": "Summer is smoke season now", "url": "https://www.axios.com/2026/07/17/summer-smoke-season-wildfires", "fonte_id": "axios", "data_pub": "2026-07-17T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A fumaça proveniente de incêndios florestais no norte do Minnesota e Canadá está poluindo o ar em vários Estados dos Estados Unidos e províncias canadenses, emitindo alertas de qualidade do ar. A situação serve como um lembrete preocupante sobre as mudanças climáticas.", "titulo_pt": "Verão é a estação da fumaça agora", "veiculo": "Axios", "pais": "EUA", "classe": "B"}, {"id": 56898, "titulo": "Agriculture ministry holds emergency meeting ahead of heavy downpours", "url": "https://en.yna.co.kr/view/AEN20260717003700320", "fonte_id": "yonhap_news", "data_pub": "2026-07-17T07:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A ministra da Agricultura realizou uma reunião de emergência antes das fortes chuvas. O encontro teve como objetivo preparar medidas para enfrentar as precipitações previstas.", "titulo_pt": "Ministério da agricultura realiza reunião de emergência ante fortes chuvas", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 56202, "titulo": "Continúan los cierres parciales del parque nacional por la aparición de un yaguareté en los senderos públicos", "url": "https://www.lanacion.com.ar/revista-lugares/continuan-los-cierres-parciales-del-parque-nacional-por-la-aparicion-de-un-yaguarete-en-los-senderos-nid17072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-17T03:15:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O dilema do yaguareté continua afetando a agenda turística, com os senderos do Parque Nacional ainda fechados duas semanas após o incidente. Os prestadores de serviço em Carlos Pellegrini aumentaram suas reclamações diretamente à autoridade máxima da Administração de Parques Nacionais durante as férias invernosas.", "titulo_pt": "Continuam os fechamentos parciais do parque nacional devido à presença de um yaguareté nos senderos públicos", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 55732, "titulo": "Heat and wildfire smoke become a dangerous new climate reality", "url": "https://www.japantimes.co.jp/environment/2026/07/17/climate-change/heat-wildfire-smoke-climate-reality/", "fonte_id": "japan_times", "data_pub": "2026-07-17T01:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As altas temperaturas combinadas com fumaça de incêndios florestais podem causar danos significativos à saúde. O perigo associado a cada um desses fatores pode ser aumentado quando ocorrem simultaneamente.", "titulo_pt": "Calor e fumaça de incêndios florestais se tornam uma nova realidade climática perigosa", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 55451, "titulo": "Temporal de lluvia y viento arriba con fuerza a la zona central: tres fallecidos, marejadas, evacuaciones y 555 mil personas sin luz", "url": "https://www.latercera.com/nacional/noticia/temporal-de-lluvia-y-viento-arriba-con-fuerza-a-la-zona-central-un-fallecido-marejadas-evacuaciones-y-555-mil-personas-sin-luz/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T01:05:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O temporal de chuva e vento intensificou-se na região central do Chile, causando três mortes em Negrete (Biobío), Temuco (La Araucanía) e Cerro Navia (Região Metropolitana). O governo declarou a suspensão das aulas entre Atacama e La Araucanía devido às condições meteorológicas. Além disso, houve marejadas, evacuações e 555 mil pessoas sem energia elétrica.", "titulo_pt": "Temporal intensifica na região central do chile: três mortes, evacuações e interrupção no fornecimento de energia", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 55753, "titulo": "Two more contaminated oil batches found: FDA", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/17/2003860892", "fonte_id": "taipei_times", "data_pub": "2026-07-17T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Agência Americana de Alimentos e Medicamentos (FDA) encontrou mais duas loteações de óleo contaminadas.", "titulo_pt": "Dois novos lotes de óleo contaminado descobertos: FDA", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 55441, "titulo": "‘We are waiting with bated breath’: gathering El Niño could be the strongest on record, BoM says", "url": "https://www.theguardian.com/environment/2026/jul/17/record-el-nino-forecast-2027-hottest-year-on-record-bom-says", "fonte_id": "guardian_world", "data_pub": "2026-07-16T23:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O fenômeno El Niño, que já está estabelecido no Oceano Pacífico e está associado a recordes de temperaturas globais, pode se desenvolver para se tornar o mais forte na história, segundo o Bureau of Meteorology da Austrália. Climatologistas estão monitorando intensamente esse sistema em fortalecimento com crescente preocupação.", "titulo_pt": "Aguardamos com ansiedade: El Niño poderia ser o mais forte já registrado, diz BoM", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 55467, "titulo": "Ministra de Energía informa que más de 555 mil clientes permanecen sin suministro eléctrico por sistema frontal", "url": "https://www.latercera.com/nacional/noticia/ministra-de-energia-informa-que-mas-de-555-mil-clientes-permanecen-sin-suministro-electrico-por-sistema-frontal/", "fonte_id": "la_tercera", "data_pub": "2026-07-16T22:59:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A ministra de Energía, Ximena Rincón, informou que mais de 555 mil clientes permanecem sem energia elétrica em regiões como La Araucanía, Los Ríos e Biobío devido a um sistema frontal. A recuperação será mais lenta devido aos ventos fortes e ao risco para as equipes de reparo.", "titulo_pt": "Maior de 555 mil clientes permanecem sem energia elétrica em regiões chilenas", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 55436, "titulo": "Air quality plummets in 20 US states as smoke from Canadian wildfires spreads", "url": "https://www.theguardian.com/us-news/2026/jul/16/smoke-canadian-wildfires-air-quality", "fonte_id": "guardian_world", "data_pub": "2026-07-16T22:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A qualidade do ar piorou em 20 estados dos EUA devido ao fumaça proveniente das queimadas no Canadá. Autoridades recomendam que as pessoas permaneçam em ambientes internos para evitar condições de ar consideradas indesejáveis.", "titulo_pt": "Qualidade do ar deteriora-se em 20 estados americanos devido às chamas canadenses", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 56263, "titulo": "Spain battles major Aragon wildfire amid heatwave", "url": "http://www.euronews.com/video/2026/07/16/spain-battles-major-aragon-wildfire-amid-heatwave-and-climate-fears", "fonte_id": "euronews", "data_pub": "2026-07-16T21:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de 400 bombeiros e 19 aeronaves foram empregados para combater um incêndio florestal rápido no nordeste da Espanha, na região de Aragão. Até 16 de julho, as chamas haviam consumido aproximadamente 7.600 hectares.", "titulo_pt": "Espanha enfrenta grande incêndio florestal em aragão durante onda de calor", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 56378, "titulo": "Tarifaço: ministro do Meio Ambiente diz que argumentos dos EUA para justificar novas taxas são 'absolutamente improcedentes'", "url": "https://g1.globo.com/economia/noticia/2026/07/16/tarifaco-ministro-do-meio-ambiente-diz-que-argumentos-dos-eua-para-justificar-novas-taxas-sao-absolutamente-improcedentes.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-16T20:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro do Meio Ambiente, João Paulo Capobianco, declarou que os argumentos dos Estados Unidos sobre desmatamento no Brasil utilizados para justificar tarifas são 'absolutamente improcedentes'. Segundo ele, esses argumentos não têm fundamento técnico e não estão baseados em informações comprováveis.", "titulo_pt": "Ministro do Meio Ambiente diz que argumentos dos EUA sobre desmatamento no Brasil são 'absolutamente improcedentes'", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 56265, "titulo": "Fire at Algerian orphanage kills 11 children, injures 19", "url": "http://www.euronews.com/2026/07/16/fire-at-algerian-orphanage-kills-11-children-injures-19", "fonte_id": "euronews", "data_pub": "2026-07-16T18:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio em um orfanato na Argélia resultou na morte de 11 crianças e deixou outras 19 feridas. O incidente ocorreu durante uma onda de calor que causou quase mil incêndios.", "titulo_pt": "Incêndio em orfanato na argélia mata 11 crianças e lesiona 19", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 54997, "titulo": "Fim da Moratória da Soja aumentará desmate da amazônia em 17% na próxima década, diz análise", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/fim-da-moratoria-da-soja-aumentara-desmate-da-amazonia-em-17-na-proxima-decada-diz-analise.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-16T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A análise publicada na revista Science indica que o fim da Moratória da Soja aumentará o desmatamento da Amazônia brasileira em 17% na próxima década (2025-2035) em relação aos anos anteriores (2014-2024). O desmatamento ameaçará áreas florestais equivalentes ao tamanho de Portugal e Itália juntos.", "titulo_pt": "Fim da Moratória da Soja aumentará desmate da amazônia em 17% na próxima década, diz análise", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 56266, "titulo": "Algeria investigates Mohammadia orphanage fire that killed 11 people", "url": "http://www.euronews.com/video/2026/07/16/algeria-investigates-mohammadia-orphanage-fire-that-killed-11-people", "fonte_id": "euronews", "data_pub": "2026-07-16T17:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio ocorrido num orfanato perto de Argel, Albânia, no dia 16 de julho matou pelo menos 11 pessoas e feriu 19. O incidente aconteceu durante uma onda de calor e um aumento recente de mais de mil focos de incêndio.", "titulo_pt": "Albânia investiga incêndio letal em orfanato que matou 11 pessoas", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 55629, "titulo": "Canadian wildfire smoke chokes US cities from Midwest to Northeast", "url": "https://www.lemonde.fr/en/environment/article/2026/07/16/canadian-wildfire-smoke-chokes-us-cities-from-midwest-to-northeast_6755550_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-16T16:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Incêndios florestais fora de controle no Ontário enviaram fumaça perigosa para os Estados Unidos, cobrindo cidades do Meio-Oeste ao Nordeste e levando a avisos sobre a qualidade do ar em Minnesota e Nova York.", "titulo_pt": "Fumaça de incêndios canadenses atinge cidades dos estados unidos", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 56751, "titulo": "19 men charged in mass rapes case among 'libertines' in France", "url": "https://www.lemonde.fr/en/france/article/2026/07/17/19-men-charged-in-mass-rapes-case-among-libertines-in-france_6755571_7.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-17T10:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dezenove homens foram acusados de participar de casos de estupro em massa, incluindo um homem identificado como Christophe B., que é acusado de ter forçado seis ex-parceiros a participarem de encontros sexuais violentos com dezenas de homens recrutados online ao longo de mais de 20 anos sob o pretexto de 'libertinagem'.", "titulo_pt": "19 Homens acusados em caso de estupros em massa entre 'libertinos' na França", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 56656, "titulo": "ICE arrests human rights lawyer who fled Chinese crackdown", "url": "https://www.theguardian.com/us-news/2026/jul/17/ice-arrests-human-rights-lawyer-wu-shaoping-fled-chinese-crackdown", "fonte_id": "guardian_world", "data_pub": "2026-07-17T09:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Wu Shaoping, um advogado de direitos humanos chinês que fugiu da repressão no país no final de 2019, foi detido pela ICE nos Estados Unidos. Ele havia pedido asilo e ainda aguarda uma decisão sobre seu pedido.", "titulo_pt": "Detenção de advogado de direitos humanos chines pela ICE causa preocupações", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 56869, "titulo": "Ex-primary school IT technician jailed 11 years for molesting 3 boys on campus", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3360939/ex-primary-school-it-technician-jailed-11-years-molesting-3-boys-campus?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-17T08:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um ex-técnico de informática de uma escola primária em Hong Kong foi condenado a 11 anos de prisão após confessar o abuso sexual de três meninos na const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml() : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml() {
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml()}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices().filter(function(v) { return v.lang === 'pt-BR' || v.lang.startsWith('pt'); });
    return vs[0] || null;
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // .sumario ou .destaque-analise imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
