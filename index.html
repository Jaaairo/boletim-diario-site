<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=author@400&display=swap" rel="stylesheet">
<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 06/07/2026 20:29 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">

    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">

  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>

      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "06/07/2026 20:29", "stats": {"noticias_novas": 566, "resumos_gerados": 85}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O cenário político e social brasileiro está em destaque com pesquisas eleitorais e ações governamentais. A pesquisa Datafolha divulgada neste domingo (5) indica que Tarcísio Meira lidera a corrida pelo governo de São Paulo, com 46% das intenções de voto contra 30% de Fernando Haddad, o que tem gerado preocupação no partido petista. Em contrapartida, Tarcísio é apontado como aprovado por 63% dos entrevistados na capital paulista, enquanto sua administração é avaliada como 'ótima' ou 'boa' por 45% dos eleitores. O Tribunal Superior Eleitoral (TSE) também destaca a participação do eleitorado no exterior e o lançamento de cartilhas pelo Sesi e Senai para conscientizar sobre os riscos das betamesetamfetaminas. Além disso, o STF deve discutir temas relevantes para as eleições, incluindo o Código de Ética e questões relacionadas a Bolsonaro no segundo semestre. O governo do estado de São Paulo investirá R$ 64 bilhões nas universidades entre 2023 e 2026, com destaque para o Fundo de Amparo à Pesquisa do Estado de São Paulo (Fapesp), que receberá R$ 5 bilhões para financiar estudos por meio de bolsas e auxílio à pesquisa.", "mundo": "O calor extremo está alimentando incêndios florestais na Europa, com focos registrados na França, Espanha e Portugal. Centenas de bombeiros estão trabalhando para combater os focos de incêndio em meio ao clima quente. Em outro desenvolvimento, o presidente dos Estados Unidos, Donald Trump, ofereceu ajuda ao presidente russo Vladimir Putin para alcançar um acordo de paz antes da cúpula da OTAN, sugerindo uma colaboração entre os dois líderes para terminar a guerra na Ucrânia. O funeral do Ayatollah Ali Khamenei em Teerã registrou 3 milhões de viagens no metrô local, enquanto Israel convidou a Coreia do Sul para o funeral, mas posteriormente cancelou a proposta. Sobre a Irã, os três filhos do falecido líder iraniano compareceram ao funeral, mas seu sucessor não esteve presente. O Japão está considerando relaxar suas restrições de viagem para a Irã, em um movimento que reflete o retorno gradual das atividades comerciais no Oriente Médio.\n\nA geopolítica global está passando por um momento crítico, com várias tensões e conflitos em diferentes regiões. Na Ucrânia, a Rússia intensificou os ataques contra Kiev no dia anterior à cúpula da NATO na Turquia, resultando em pelo menos 14 mortes e danos significativos. O presidente ucraniano Zelenskyy pediu aos aliados para enviar interceptores Patriot para proteger o país. Em Ancara, líderes da OTAN se reúnem em meio a tensões entre EUA e Europa, lacunas na defesa e apoio à resiliência militar ucrainiana. A China realizou um teste de míssil de longo alcance no Pacífico Sul, gerando críticas da Austrália, enquanto o presidente da Finlândia afirmou que os ataques com drones modificaram as perspectivas dos EUA sobre a guerra e beneficiaram Kiev. O encontro também aborda questões como a criação de um mercado de defesa próprio para a NATO e a necessidade de confiança entre aliados.", "economia": "A Ásia, que consome uma quantidade significativa de energia, deve aprender com a crise iraniana e buscar soluções para se adaptar aos desafios energéticos atuais. O incidente iraniano sublinha a importância da diversificação das fontes de energia e do desenvolvimento de estratégias resilientes para enfrentar possíveis interrupções no abastecimento global de combustíveis.", "tecnologia": "A China se estabeleceu como um centro global de inovação robótica, com o Vale dos Robôs na cidade de Shenzhen abrigando mais de 200 empresas e universidades. Em outro desenvolvimento tecnológico, a Google lançou um comercial que imagina os fundadores dos Estados Unidos utilizando ferramentas de colaboração e inteligência artificial do Gemini para redigir a Declaração de Independência, resultando em cenas consideradas constrangedoras. O mercado de stablecoins tem movimentado valores equivalentes ao PIB brasileiro em um trimestre, refletindo o crescimento das criptomoedas e a necessidade de soluções financeiras mais eficientes. Além disso, a Coreia do Sul planeja criar um novo fundo de investimento financiado por uma receita tributária proveniente do boom nas semicondutores, direcionado para projetos de inteligência artificial e manufatura avançada.", "ciencia": "Um estudo recente publicado no Scientific American sugere que a falta de sono pode levar ao ganho de peso e maior sedentarismo, especialmente quando se perde até 90 minutos do tempo normal de descanso. Em outro desenvolvimento notável, a empresa Vertex Pharmaceuticals adquiriu a Crinetics Pharmaceuticals por 10 bilhões de dólares em uma tendência crescente de fusões e aquisições no setor biotecnológico. A Blue Origin continua seu trabalho nos módulos lunares Blue Moon, apesar de uma explosão na plataforma New Glenn há mais de um mês, com sete veículos em produção. Um novo medicamento aprovado pela FDA promete melhorar a imunoterapia para o carcinoma fibrolamelar, um tipo raro e difícil de tratar de câncer hepático. Além disso, um estudo japonês revela que o número de pessoas que tentaram cocaína atingiu um novo recorde no Japão em 2025, com 804 prisões relacionadas à droga no mesmo ano. Por fim, a China realizou com sucesso uma missão espacial para coletar amostras de asteroides após uma jornada de 1 bilhão de quilômetros, enquanto cientistas buscam entender os fenômenos que ocorrem no cérebro durante experiências próximas à morte. Um ensaio clínico está sendo realizado na República do Congo para testar um tratamento combinado contra a ebola, com mais de 500 mortes registradas até o momento.", "cultura": "George Clooney será homenageado com o Leão de Ouro honorário no próximo Festival de Veneza, reconhecendo sua carreira. Em outra notícia cultural, Jack Johnson anuncia três shows no Brasil em fevereiro de 2027, fazendo parte da turnê 'Surfilmusic'. No entanto, a canção 'Noventa milhões em ação', que embalou a Seleção Brasileira durante o período da ditadura militar entre 1964 e 1985, ainda divide opiniões. Além disso, a atriz criada por inteligência artificial Tilly Norwood estrelará seu primeiro longa-metragem intitulado 'Misaligned', desenvolvido pelo estúdio Particle 6, explorando temas de identidade e tecnologia. O Centro Cultural Alternativo em Praga, um importante ponto de encontro cultural alternativo, está em conflito com a possibilidade de encerramento.", "sociedade": "Taiwan enfrenta desafios significativos no sistema de trânsito que exigem reformas para melhorar as condições atuais. Paralelamente, pais em Keelung protestaram contra uma creche local, embora não sejam fornecidos detalhes específicos sobre o motivo do protesto.", "meio_ambiente": "O ministério realizou um fórum sobre economia circular, focando em discussões e estratégias para promover a sustentabilidade através do uso eficiente dos recursos. Paralelamente, o número de vagas para trabalhos verdes, conhecidos como 'green-collar', atingiu um recorde. Esses empregos estão relacionados a áreas ambientais e sustentáveis, refletindo uma crescente demanda pelo setor.", "direitos_humanos": "A entidade das Nações Unidas para os direitos humanos exigiu a libertação do médico palestiniano Hussam Abu Safia, que estava detido pelo Israel. Em outro caso, o ministro dos Esportes da França e o jogador Kylian Mbappé condenaram fortes declarações racistas feitas por uma senadora paraguaia após o Paraguai ser eliminado de um torneio. Além disso, um juiz manteve a justa causa contra um ex-funcionário negro da empresa Coco Bambu que ofendeu um colega de forma racista, destacando que as manifestações racistas não podem ser consideradas apenas brincadeiras. No contexto da violência política de gênero, redes sociais e inteligência artificial estão sendo usados para perpetuar velhos problemas de gênero na esfera política."}, "resumo_do_dia": {"politica_nacional": [], "politica_nacional__eventos": [], "mundo": [{"id": 39288, "titulo": "News live: Marles says Australia has expressed concern over China missile test as Taiwan criticises ‘provocation’", "url": "https://www.theguardian.com/australia-news/live/2026/jul/07/australia-news-live-penny-wong-china-missile-test-pacific-anthony-albanese-solomon-islands-defence-royal-commission-antisemitism-meta-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-07-06T22:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Marles afirmou que a Austrália expressou preocupação sobre o teste de mísseis chineses no Pacífico, enquanto Taiwan criticou a atitude como uma 'provação'. Wong descreveu o teste como um 'atéque instável' que poderia levar a uma 'miscalculação'.", "titulo_pt": "Notícias em tempo real: Marles diz que Austrália expressou preocupação sobre teste de mísseis chineses no Pacífico, enquanto Taiwan critica como 'provação'", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 39458, "titulo": "(EDITORIAL from Korea JoongAng Daily on July 7)", "url": "https://en.yna.co.kr/view/AEN20260707000800320", "fonte_id": "yonhap_news", "data_pub": "2026-07-06T21:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A indústria de semicondutores da Coreia do Sul tem impulsionado o crescimento econômico mais forte, mas...", "titulo_pt": "Editorial sobre a indústria de semicondutores da Coreia do Sul", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 39293, "titulo": "What to Expect at the 2026 NATO Summit", "url": "https://foreignpolicy.com/2026/07/06/nato-leaders-summit-trump-defense-spending-iran-russia-ukraine/", "fonte_id": "foreign_policy", "data_pub": "2026-07-06T21:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O momento é incerto para a maior aliança militar do mundo.", "titulo_pt": "O que se espera no summit da NATO de 2026", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 39318, "titulo": "A Sad Kind of Convenience", "url": "https://www.theatlantic.com/technology/2026/07/playstation-ends-discs/687770/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-07-06T19:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A era dos meios físicos está se encerrando e pode ser que, quando isso ocorrer, nos demos conta do quanto os apreciamos.", "titulo_pt": "Uma Triste Conveniência", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 38509, "titulo": "Are U.S.-India Ties Really Thawing?", "url": "https://foreignpolicy.com/2026/07/06/us-india-trade-deal-thaw-trump-modi/", "fonte_id": "foreign_policy", "data_pub": "2026-07-06T17:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As duas partes estão próximas de concluir um acordo comercial, mas ainda existem alguns pontos controversos.", "titulo_pt": "As Relações entre EUA e Índia Estão Realmente Melhorando?", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 38510, "titulo": "Why This Year’s NATO Summit Is Different for Ukraine", "url": "https://foreignpolicy.com/2026/07/06/nato-summit-ankara-ukraine-zelensky-russia-war/", "fonte_id": "foreign_policy", "data_pub": "2026-07-06T17:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O encarregado das relações exteriores da Ucrânia fala sobre por que este ano o encontro do NATO é diferente para a Ucrânia.", "titulo_pt": "Por Que Este Ano o Encontro do NATO É Diferente para a Ucrânia", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 38475, "titulo": "Canada to buy 12 hi-tech German submarines after bidding war", "url": "https://www.theguardian.com/world/2026/jul/06/canada-buys-12-tkms-german-norwegian-submarines-after-bidding-war", "fonte_id": "guardian_world", "data_pub": "2026-07-06T16:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Canadá escolheu uma consórdia alemã para construir 12 submarinos avançados em um dos maiores contratos de defesa do país, que fortalecerá as relações do Canadá com o Norte Atlântico antes de uma cúpula crucial esta semana. O anúncio foi feito pelo primeiro-ministro, Mark Carney, após uma disputa concorrida pela concessão multibilionária para substituir sua frota de submarinos antigos.", "titulo_pt": "Canadá adquire 12 submarinos avançados da Alemanha em disputa por contrato milionário", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 38644, "titulo": "Zelenskyy says ‘battle in the sky’ will decide outcome of war with Russia", "url": "https://www.ft.com/content/6ca8de40-15e4-470e-a258-6dd2d8d9d83e", "fonte_id": "financial_times", "data_pub": "2026-07-06T16:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O líder ucraniano Zelenskyy afirmou que a batalha no céu será crucial para o resultado da guerra contra a Rússia. Ele também disse que Donald Trump mudou de ideia sobre o conflito.", "titulo_pt": "Zelenskyy diz que 'batalha no céu' decidirá guerra contra a Rússia e Trump mudou de ideia", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 38180, "titulo": "Rússia realiza ataque massivo contra Kiev em retaliação à nova ofensiva ucraniana na véspera de cúpula da Otan", "url": "https://www.brasildefato.com.br/2026/07/06/russia-realiza-ataque-massivo-contra-kiev-em-retaliacao-a-nova-ofensiva-ucraniana-na-vespera-de-cupula-da-otan/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-06T16:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Ucrânia lançou 625 drones, dos quais 613 foram abatidos pelas forças russas. A Rússia realizou um ataque massivo contra Kiev em retaliação à nova ofensiva ucraniana na véspera de uma cúpula da Otan.", "titulo_pt": "Rússia realiza ataque massivo contra Kiev em resposta à nova ofensiva ucraniana", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 38617, "titulo": "Ukraine's gas stations are increasingly targeted by Russian drones", "url": "https://www.lemonde.fr/en/international/article/2026/07/06/ukraine-s-gas-stations-increasingly-targeted-by-russian-drones_6755204_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-06T16:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de 150 estações de serviço ucranianas foram alvo de drones russos nos últimos dois meses. Kyiv intensificou os ataques a refinarias russas, levando a restrições e escassez de combustível e causando insatisfação pública.", "titulo_pt": "Estações de serviço ucranianas são cada vez mais alvo de drones russos", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 38709, "titulo": "Israeli army says it targeted vehicle near southern Lebanon 'security zone'", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/israeli-army-says-it-targeted-vehicle-near-southern-lebanon-security", "fonte_id": "middle_east_eye", "data_pub": "2026-07-06T15:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Exército israelense afirmou que atingiu um veículo perto da zona de segurança no sul do Líbano, afirmando que quatro suspeitos representavam uma ameaça às forças israelenses. Anteriormente, quatro pessoas foram mortas em um ataque israelense a um veículo na área vizinha Nabatieh al-Fawqa.", "titulo_pt": "Exército israelense diz ter atacado veículos perto da zona de segurança no sul do Líbano", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 38690, "titulo": "Is NATO at breaking point as it meets in Turkiye?", "url": "https://www.aljazeera.com/news/2026/7/6/is-nato-at-breaking-point-as-it-meets-in-turkiye?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-06T15:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Líderes da OTAN se reúnem em Ancara para discutir tensões entre EUA e Europa, lacunas na defesa e apoio à resiliência militar ucraniana.", "titulo_pt": "OTAN está no ponto de quebra enquanto se reúne em Turquia?", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 38645, "titulo": "Nato backs Ukraine’s push to hit Russia harder, says Finnish president", "url": "https://www.ft.com/content/b5590af8-b60e-4270-90cf-862d0a5e28cd", "fonte_id": "financial_times", "data_pub": "2026-07-06T13:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente da Finlândia, Alexander Stubb, afirmou à Financial Times que os ataques com drones de longo alcance modificaram as perspectivas dos Estados Unidos sobre a guerra e colocaram Kiev em sua melhor posição desde 2022.", "titulo_pt": "NATO apoia push ucraniano para aumentar pressão sobre a Rússia, diz presidente finlandês", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 38616, "titulo": "Hamas says it has dissolved its governing bodies in the Gaza Strip", "url": "https://www.lemonde.fr/en/international/article/2026/07/06/hamas-says-it-has-dissolved-its-governing-bodies-in-the-gaza-strip_6755197_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-06T13:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Hamas anunciou a dissolução de seus órgãos de governo na Faixa de Gaza, o que pode permitir que o território seja administrado por um comitê técnico já formado, cuja tarefa é assegurar a representação palestiniana em instituições.", "titulo_pt": "Hamas anuncia dissolução de órgãos de governo na Faixa de Gaza", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 38511, "titulo": "Israel Belongs in the New Saudi-Iranian Order", "url": "https://foreignpolicy.com/2026/07/06/saudi-iran-order-israel-palestine/", "fonte_id": "foreign_policy", "data_pub": "2026-07-06T12:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Israel está se posicionando contra os acordos abraâmicos. Isso seria um erro significativo.", "titulo_pt": "Israel Pertence ao Novo Ordenamento Saudita-Irani", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 38512, "titulo": "War Has Become Pointless", "url": "https://foreignpolicy.com/2026/07/06/war-iran-ukraine-israel-united-states-russia-pointless/", "fonte_id": "foreign_policy", "data_pub": "2026-07-06T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O conflito militar sempre existiu, mas agora parecia ter perdido seu propósito.", "titulo_pt": "Guerra se Tornou Sem Sentido", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}], "mundo__eventos": [], "economia": [], "economia__eventos": [], "tecnologia": [], "tecnologia__eventos": [], "ciencia": [{"id": 39463, "titulo": "Too many sleepless nights may lead to weight gain", "url": "https://www.scientificamerican.com/article/too-many-sleepless-nights-may-lead-to-weight-gain/", "fonte_id": "scientific_american", "data_pub": "2026-07-06T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo descobriu que ficar até 90 minutos menos do que o normal de sono pode levar ao ganho de peso e à maior sedentarismo.", "titulo_pt": "Poucas noites sem dormir podem levar a ganho de peso", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 39465, "titulo": "STAT+: Vertex acquires Crinetics Pharmaceuticals for $10 billion as biotech M&A booms", "url": "https://www.statnews.com/2026/07/06/vertex-acquires-crinetics-pharmaceuticals/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-06T20:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa Vertex Pharmaceuticals adquiriu a Crinetics Pharmaceuticals e seu medicamento para um distúrbio endócrino raro por 10 bilhões de dólares. Esta aquisição ocorre em um período de aumento das transações no setor biotecnológico.", "titulo_pt": "Vertex adquire Crinetics Pharmaceuticals por 10 bilhões de dólares", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 39470, "titulo": "Blue Origin continues work on lunar landers during recovery from New Glenn explosion", "url": "https://spacenews.com/blue-origin-continues-work-on-lunar-landers-during-recovery-from-new-glenn-explosion/", "fonte_id": "spacenews", "data_pub": "2026-07-06T20:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Blue Origin está continuando o desenvolvimento de seus módulos lunares Blue Moon, com sete veículos em produção, enquanto se recupera de uma explosão na plataforma New Glenn há mais de um mês.", "titulo_pt": "Blue Origin continua desenvolvendo módulos lunares durante a recuperação da explosão do New Glenn", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 39466, "titulo": "Obamacare rolls shrank dramatically in many states over the past year, new federal data shows", "url": "https://www.statnews.com/2026/07/06/obamacare-rolls-shrank-dramatically-affordable-care-act-states/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-06T19:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Novos dados federais mostram que o número de pessoas cobertas pela Lei de Saúde Affordable Care Act (Obamacare) diminuiu dramaticamente em vários estados nos últimos doze meses.", "titulo_pt": "Planos Obamacare registraram significativa redução no número de segurados em muitos estados no último ano", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 37443, "titulo": "El fármaco aprobado por la FDA que podría combatir un tipo raro de cáncer de hígado", "url": "https://www.latercera.com/tendencias/noticia/el-farmaco-aprobado-por-la-fda-que-podria-combatir-un-tipo-raro-de-cancer-de-higado/", "fonte_id": "la_tercera", "data_pub": "2026-07-06T10:02:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O carcinoma fibrolamelar é um tipo raro de câncer hepático difícil de tratar, geralmente diagnosticado quando já se disseminou. Um novo estudo indica que um medicamento aprovado pela FDA poderia melhorar a inmunoterapia para este tipo de câncer.", "titulo_pt": "Fármaco aprovado pela FDA pode combater câncer raro do fígado", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 37803, "titulo": "Number of people who have tried cocaine reaches new high in Japan, study shows", "url": "https://www.japantimes.co.jp/news/2026/07/06/japan/crime-legal/cocaine-usage/", "fonte_id": "japan_times", "data_pub": "2026-07-06T08:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo mostrou que o número de pessoas que tentaram cocaína atingiu um novo recorde no Japão. No ano de 2025, também houve um recorde de 804 prisões relacionadas à posse da droga.", "titulo_pt": "Número de pessoas que tentaram cocaína atinge novo recorde no Japão, mostra estudo", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 37944, "titulo": "China's space probe reaches asteroid after 1-billion-kilometer chase for first sample return", "url": "https://phys.org/news/2026-07-china-space-probe-asteroid-billion.html", "fonte_id": "phys_org", "data_pub": "2026-07-06T08:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O módulo espacial chinês Tianwen-2 atingiu seu alvo de asteroides após percorrer 1 bilhão de quilômetros ao longo de mais de um ano, con                 const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml() : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml() {
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml()}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices().filter(function(v) { return v.lang === 'pt-BR' || v.lang.startsWith('pt'); });
    return vs[0] || null;
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // .sumario ou .destaque-analise imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
