<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>

r deliberadamente' crianças palestinas na Faixa de Gaza, afirmando que o que ocorre no território configura um genocídio. Em outros eventos internacionais, a Alemanha teve seu sistema ferroviário nacional paralisado por mais de duas horas devido a um problema técnico em seu sistema de informação. A empresa chinesa Alibaba está processando o Departamento de Defesa dos EUA após ser adicionada a uma lista de empresas com ligações ao exército chinês. O presidente francês Emmanuel Macron homenageou o historiador Marc Bloch como um\n\nO fechamento do Estreito de Ormuz por navios mercantes, com cerca de 1,2 mil embarcações e US$ 125 bilhões em bens presos, causa preocupação global sobre o futuro do comércio marítimo. Essa situação inédita é vista como um alerta para a fragilidade das cadeias de suprimentos globais, que se mostram vulneráveis a crises geopolíticas. Paralelamente, a China se consolida como líder em supercomputadores, ultrapassando os Estados Unidos e demonstrando seu avanço tecnológico. O país investe fortemente no desenvolvimento próprio de chips, desafiando o domínio americano nesse campo. Em resposta à crescente influência chinesa, os Estados Unidos e seus aliados europeus anunciaram um acordo para reduzir a dependência de fornecedores chineses de inteligência artificial, buscando fortalecer a inovação tecnológica ocidental.", "economia": "A SpaceX perdeu US$ 400 bilhões em valor de mercado após a alta de estreia na bolsa de valores entrar em reversão. A queda ocorreu na segunda-feira (22), logo após a empresa ter feito sua histórica estreia na bolsa de Wall Street. Essa volatilidade é comum para empresas recém-listadas, mas o declínio da SpaceX demonstra a sensibilidade do mercado às flutuações no setor tecnológico. Em outros mercados globais, as quedas na Wall Street se espalharam, impulsionadas por uma queda nas ações de grandes empresas de tecnologia como Apple e Microsoft.  Em contraste com essa situação, a economia argentina manteve um ritmo de crescimento no primeiro trimestre de 2026, com alta de 2,3% no PIB em relação ao mesmo período do ano anterior. As exportações impulsionaram o crescimento, apesar de sinais de deterioração no poder de compra e emprego. No Brasil, a ata do Copom divulgada nesta terça-feira (23) não esclareceu todas as dúvidas sobre a trajetória da taxa Selic, reforçando um cenário de cautela dos investidores. Por outro lado, o Banco Central Europeu (BCE) recebeu o apoio do Parlamento para criar o euro digital, um meio de pagamento eletrônico que visa reduzir a dependência da zona do euro em cartões de crédito dos EUA.", "tecnologia": "A União Europeia intensificará uma investigação contra a Meta, alegando que o design dos produtos da empresa é viciante para crianças. O bloco afirma que a interface dos produtos da Meta é projetada de forma a causar dependência e aumenta a pressão regulatória sobre as grandes empresas tecnológicas americanas. Em outro evento significativo, a OpenAI lançou uma nova iniciativa para ajudar na identificação e correção de vulnerabilidades em projetos de código aberto. O objetivo é abordar questões de segurança da comunidade de software open source, garantindo um ambiente mais seguro para desenvolvedores e usuários.  A LG Magna e-Powertrain voltou a ser lucrativa no primeiro trimestre de 2026, impulsionada pelo aumento da utilização de sua fábrica no México. A empresa planeja aumentar os gastos com pesquisa e desenvolvimento, especialmente em motores de alta velocidade, para se destacar na competição global. No setor de inteligência artificial, a Nvidia está oferecendo software e semicondutores que permitirão aos humanoides interagir verdadeiramente com as pessoas, incluindo a possibilidade de contato físico. A empresa busca tornar os robôs mais seguros e naturais em suas interações humanas.", "ciencia": "Pesquisadores da Universidade Curtin, na Austrália, usaram técnicas inovadoras para datar uma cratera de impacto com três bilhões de anos na região de Pilbara, na Austrália Ocidental. Esse evento ocorreu durante a era Arqueana, entre 4 e 2,5 bilhões de anos atrás, quando as placas tectônicas estavam começando a se formar e a vida primitiva estava surgindo. Em outra descoberta, astrônomos utilizando o Telescópio Espacial Hubble da NASA descobriram luz ultravioleta proveniente de uma galáxia que existiu apenas 1,4 bilhão de anos após o Big Bang. Essa descoberta é inesperada, pois a luz ultravioleta geralmente é emitida por estrelas jovens e galáxias em formação. A NASA nomeou Sean Gallagher como diretor-chefe de informação da agência, responsável por todo o portfólio de produtos e serviços de Tecnologia da Informação.  A empresa Ubotica Technologies captou US$ 11 milhões para aumentar as vendas comerciais de sua plataforma de inteligência marítima, Live Maritime. A plataforma utiliza inteligência artificial para coletar e analisar dados marítimos em tempo real, visando fornecer informações valiosas para empresas e organizações que atuam no setor marítimo. Por fim, a Organização Pan-Americana da Saúde (PAHO) lançou um guia para jornalistas e criadores de conteúdo sobre como identificar e combater a desinformação sobre vacinas.", "cultura": "A 24ª edição da Festa Literária Internacional de Paraty (Flip) acontecerá de 22 a 26 de julho e divulgou seu programa completo. A poeta Orides Fontela será homenageada, e o evento contará com mesas literárias sobre temas contemporâneos, curadoria de Rita Palmeira.  Em outra novidade do mundo literário, a revista Granta decidiu encerrar sua parceria com o Commonwealth Short Story Prize após um dos vencedores da edição de 2026 ser acusado de usar inteligência artificial na escrita do conto premiado. O livro 'Por que São Tão Lindos os Cavalos?', de Julieta Correa, explora a temática da demência materna durante a pandemia de Covid-19 e aborda as perdas e as novas descobertas linguísticas na tentativa de reconstruir o passado após o colapso.  O filme 'Uma Infância Alemã', dirigido por Fatih Akin, conta a história de um menino que vive em uma família nazista durante a Segunda Guerra Mundial. O filme é baseado na infância do ator alemão Hark Bohm e foi escrito por ele. Após as filmagens, Akin afirmou sentir-se responsável por todas as ações humanas.", "sociedade": "Um acidente trágico aconteceu na Avenida Mar del Plata, onde um ônibus atropelou sete pessoas, causando a morte de uma delas. As vítimas foram levadas para o Hospital Interzonal General de Agudos. A hipótese mais provável é que o sistema de direção do ônibus tenha falhado. O motorista foi detido em relação ao acidente. Paralelamente, a solidão se apresenta como um problema crescente, com centenas de milhares de pessoas morrendo anualmente devido à falta de conexão social. A BBC analisa os impactos da solidão nas grandes cidades, destacando que estar desconectado da sociedade tem efeitos na saúde equivalentes a fumar 15 cigarros por dia. O crime organizado é apontado como um fator que mina a confiança pública nas instituições e prejudica a união social. O artigo discute medidas para combater esse problema e fortalecer a coesão social. A violência doméstica também surge como uma preocupação.", "meio_ambiente": "Uma onda de calor extremo está atingindo diversos países da Europa, levando ao fechamento de escolas e representando um risco para a saúde pública. A França registrou seu dia mais quente desde 1947, com temperaturas ultrapassando os 40 graus Celsius em algumas regiões. O governo francês convocou uma reunião de emergência após relatos de mortes por calor e restringiu o consumo de álcool ao ar livre para aliviar a pressão sobre os serviços de emergência. A Grã-Bretanha também enfrenta um calor intenso, com o Met Office emitido um raro alerta vermelho para a Inglaterra, onde as temperaturas podem chegar a 40°C.  Paralelamente, Taiwan está realizando simulações para preparar autoridades e população a lidar com temperaturas que podem atingir 40°C. Os exercícios incluem gerenciamento de energia, atendimento médico e apoio à população. Em Hualien, Taiwan, uma barragem natural foi identificada como risco de rompimento, levando às recomendações de evacuações preventivas para áreas próximas ao lago.", "direitos_humanos": "A União Europeia está sendo acusada de ser 'cómplice de violações e abusos horríveis' devido ao apoio financeiro que fornece à guarda costeira libanesa, responsável por interceptações regulares de embarcações com migrantes. A Amnistia Internacional criticou a cooperação da UE com a Líbia, afirmando que ela contribui para o sofrimento dos migrantes. Em outro caso, três migrantes sudaneses tiveram as pernas amputadas após sofrerem congelamento enquanto tentavam atravessar uma montanha na Bósnia em busca de um novo lar. Os migrantes aparentemente foram abandonados pelo sistema de saúde da Bósnia.  Em Israel, um relatório da ONU afirma que crianças palestinas foram mortas deliberadamente durante a guerra, incluindo após o cessar-fogo entrar em vigor em outubro de 2025. O relatório afirma que essas ações constituem genocídio. Em Okinawa, onde se celebra o 81º aniversário do fim da batalha terrestre, Onaga, uma ex-enfermeira de guerra da Segunda Guerra Mundial residente em Naha, faz um apelo por paz."}, "resumo_do_dia": {"politica_nacional": [{"id": 14060, "titulo": "Possíveis irregularidades do Digimais foram antecipadas em disputa com a Yards Capital", "url": "https://www.jota.info/justica/supostas-irregularidades-do-digimais-foram-antecipadas-em-disputa-com-a-yards-capital", "fonte_id": "jota", "data_pub": "2026-06-23T23:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A gestora Yards Capital acusou o banco de Edir Macedo, Digimais, de inflar o patrimônio de um fundo com títulos sem lastro. A acusação se assemelha à denúncia contra o Banco Master.", "titulo_pt": "Possíveis irregularidades do Digimais foram antecipadas em disputa com a Yards Capital", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 13947, "titulo":
