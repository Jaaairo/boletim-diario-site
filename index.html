<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>

  <h1>pan<span class="logo-o">o</span>rama</h1>

<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">

    <label for="inp-senha">Senha</label>

</div>

<div class="modal-overlay" id="modal-flag">

  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">

    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

respeito à soberania desses países, pedindo o fim da escalada militar e a retomada de negociações diplomáticas.\n\nNo contexto crescente de tensão geopolítica no Oriente Médio, o Irã realizou uma série de ataques contra bases militares nos países vizinhos, incluindo Jordânia, Kuwait e Bahrein. Essas ações foram em resposta aos recentes bombardeios americanos na Irã, que foram considerados os mais intensos desde um acordo recentemente assinado entre as partes. O fechamento temporário do Estreito de Ormuz pelo Irã também aumentou a tensão na região estratégica, com o Oriente Médio enfrentando a possibilidade de uma escalada prolongada das hostilidades. Além disso, o Papa Francisco apelou para um diálogo e diplomacia para encerrar as guerras no Oriente Médio e na Ucrânia, salientando a urgência de dissipar os 'ventos de guerra' através do diálogo.", "economia": "O Brasil está intensificando estratégias para mitigar os efeitos da guerra comercial liderada por Donald Trump, buscando contratos que possam abrir novos mercados e aumentar o alcance de suas exportações. No entanto, a economia enfrenta desafios como o aumento contínuo dos preços das refeições, apesar do alívio na inflação. As empresas têm mudado seus nomes para aproveitar a tendência da inteligência artificial, mas os ganhos nas ações não se mantêm por muito tempo. O Banco Central está avaliando limitar o acesso ao Pix após uma série de ataques cibernéticos, enquanto o Conselho Administrativo de Recursos Fiscais (Carf) aprovou o ágio na operação de fusão entre Getnet e Santander no setor de meios de pagamento. Além disso, empresas como SK hynix planejam injetar uma grande quantidade de dólares no mercado cambial sul-coreano após levantar fundos através de uma oferta pública de títulos em Nasdaq, o que deve fortalecer a economia local.", "tecnologia": "A discussão sobre a expansão da infraestrutura de inteligência artificial (IA) tem dominado os debates tecnológicos recentes. Destaque-se o anúncio da Samsung Electronics, que avançou na produção de chips de memória para atender à crescente demanda por IA. A empresa planeja iniciar as operações de sua primeira fábrica de semicondutores no complexo de Yongin um a dois anos antes do previsto, em 2029, alinhado com o desenvolvimento estratégico do Complexo Nacional Industrial de Yongin. Em outro front, a KT lançou um conselho de consultoria em proteção de informações para fortalecer suas capacidades de segurança cibernética diante das ameaças causadas pela IA e transformação digital. Na área de segurança, a Palo Alto Networks destacou que o uso de agências de inteligência artificial está transformando as operações empresariais e elevando novos riscos cibernéticos, com 99% das empresas utilizando ferramentas de IA autônomas.", "ciencia": "A empresa californiana Auxilium Biotechnologies realizou uma façanha inédita ao bioprintar tecidos renais e hepáticos no espaço. Este avanço na medicina espacial pode revolucionar a pesquisa em transplantes e terapias celulares. Paralelamente, o inventor do LED Shuji Nakamura, vencedor do Nobel de Física em 2014, planeja construir uma usina nuclear que usa laser para gerar energia limpa de forma infinita, contribuindo para a busca por fontes renováveis sustentáveis. Em outro desenvolvimento notável, cientistas chineses propõem usar a lua para realizar o sonho de Nikola Tesla de transmitir energia sem fio, focando na região sul da lua onde as crateras recebem luz solar quase continuamente e suspeitas de conter água gelada valiosa. Estes avanços tecnológicos e científicos têm potencial significativo para transformar diversos campos, desde a saúde até a energia nuclear.", "cultura": "A Coreia do Sul registrou um recorde nas vendas de ingressos para teatro no primeiro semestre, impulsionado pela popularidade das produções baseadas em propriedades intelectuais globais. Em contraste, a atriz Grace Kelly se casou com Rainiero de Mônaco em 1956, descrevendo a experiência como caótica e estressante. A Fundação Proa, Andreani e Ungallery promovem exposições na Boca do Rio, destacando obras de artistas renomados. Na Europa, a série 'Parceiras no Crime' estreou no Prime Video, abordando a força das mulheres acima dos 50 anos em produções de ação. O Louvre implementa medidas para lidar com o excesso de visitantes, enquanto a exposição de LS Lowry desafia a percepção tradicional do artista como ingênuo e sem cultura. A série 'The Westies' é um drama violento sobre uma gangue irlandesa-americana dos anos 80, remetendo a produções como 'Peaky Blinders' e 'Os Sopranos'.", "sociedade": "A sociedade enfrenta diversos desafios recentemente. Na China e Hong Kong, há preocupações significativas com o isolamento social dos idosos e a alta taxa de suicídios entre jovens. Em Hong Kong, 50% dos idosos estão socialmente isolados, enquanto no ano passado foram registrados 46 casos confirmados de suicídio entre jovens de 10 a 19 anos - um recorde em dez anos. Além disso, na China, as mulheres grávidas que trabalham enfrentam situações complexas e difíceis. Em termos de segurança pública, o Rio de Janeiro registrou cinco mortes durante confrontos entre facções no bairro de Cordovil. Na Venezuela, a insatisfação com o governo aumentou após terremotos devastarem um projeto habitacional. Por fim, na Síria, duas crianças morreram em um acidente envolvendo uma balsa que colidiu com uma ponte. Em Hong Kong, os pais de Yuanjian, paralisado por um erro médico há 16 anos, aceitaram uma penalidade mas prometeram continuar a luta pela responsabilização do profissional responsável.", "meio_ambiente": "O fenômeno El Niño pode estar entre os mais intensos desde 1950, segundo relatos da CNN Brasil. Isso levanta alertas sobre possíveis impactos no agronegócio e no mercado global. O risco de um super El Niño também está aumentando, conforme informado pela Metrópoles, com potenciais consequências variadas para diferentes regiões do Brasil, incluindo enchentes, tempestades, secas e calor extremo. Em outros países, a Coreia do Sul emitiu avisos de onda de calor emergencial e gravíssimos, enquanto o Instituto Federal do Amazonas implementará um sistema de inteligência artificial para prever incêndios florestais na Amazônia 14 dias antes da sua ocorrência. Além disso, metade das novas inscrições de veículos no primeiro semestre de 2023 foram de carros ecológicos na Coreia do Sul, indicando um aumento nas iniciativas sustentáveis.", "direitos_humanos": "Um levantamento realizado por uma organização cívica sul-coreana mostrou que 37,3% dos meninos vítimas de crimes sexuais não relataram o ocorrido. Além disso, 27% das vítimas informadas no estudo evitaram denunciar os abusos. Em outro desenvolvimento, descendentes de africanos escravizados no Ghana afirmam que simbólicas compensações não podem reparar as gerações de perdas e injustiças. Por fim, a vítima do ataque conhecido como 'chute circular de Busan' em 2022 se opôs à abolição pelo governo da autoridade da procuradoria para realizar investigações suplementares, argumentando que essas investigações revelaram intenções criminosas no seu caso. A investigação policial inicial concluiu que o incidente era um caso de lesão corporal qualificada, mas a procuradoria encontrou evidências indicativas de tentativa de estupro e assassinato."}, "resumo_do_dia": {"politica_nacional": [{"id": 47506, "titulo": "Eleitor não quer presidente que precise de aval de outra liderança, diz Caiado", "url": "https://www.infomoney.com.br/politica/eleitor-nao-quer-presidente-que-precise-de-aval-de-outra-lideranca-diz-caiado/", "fonte_id": "infomoney", "data_pub": "2026-07-12T12:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governador de Goiás, Ronaldo Caiado, comentou nas redes sociais sobre a postura do filho Flávio Bolsonaro durante um evento. Caiado afirmou que Flávio leu uma carta do pai ao vivo e declarou que está pronto para ser presidente.", "titulo_pt": "Eleitor não deseja presidente que precise de aval de outra liderança, diz Caiado", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 47509, "titulo": "Rogéria, Michelle e Ana Cristina: rixas marcam vida política de mulheres de Bolsonaro", "url": "https://www.infomoney.com.br/politica/rogeria-michelle-e-ana-cristina-rixas-marcam-vida-politica-de-mulheres-de-bolsonaro/", "fonte_id": "infomoney", "data_pub": "2026-07-12T12:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ex-presidente Jair Bolsonaro colocou Rogéria, Ana Cristina e Michelle em diferentes cargos públicos, o que resultou em disputas dentro da própria família.", "titulo_pt": "Rogéria, Michelle e Ana Cristina: conflitos marcam vida política das mulheres de Bolsonaro", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 47458, "titulo": "Interdição no Túnel Rei Pelé altera trânsito neste domingo (12/7)", "url": "https://www.metropoles.com/distrito-federal/interdicao-no-tunel-rei-pele-altera-transito-neste-domingo-12-7", "fonte_id": "metropoles", "data_pub": "2026-07-12T12:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O túnel Rei Pelé será interditado entre as 9h e 12h deste domingo (12/7) para um simulado de atendimento a emergências com produtos perigosos.", "titulo_pt": "Interdição no Túnel Rei Pelé altera trânsito neste domingo (12/7)", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 47433, "titulo": "Lindbergh pede revogação da prisão domiciliar de Bolsonaro após carta", "url": "https://www.poder360.com.br/poder-congresso/lindbergh-pede-revogacao-da-prisao-domiciliar-de-bolsonaro-apos-carta/", "fonte_id": "poder360", "data_pub": "2026-07-12T12:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O deputado Lindbergh Farias pediu ao Supremo Tribunal Federal a revogação da prisão domiciliar do presidente Jair Bolsonaro, após ler uma carta que Bolsonaro enviou à corte. Segundo ele, o documento fere as medidas cautelares e sugere que há tentativas de testar o poder do Supremo.", "titulo_pt": "Lindbergh pede revogação da prisão domiciliar de Bolsonaro após ler carta", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 47435, "titulo": "Antioxidante do tomate também está em frutas cítricas", "url": "https://www.poder360.com.br/poder-saude/antioxidante-do-tomate-tambem-esta-em-frutas-citricas/", "fonte_id": "poder360", "data_pub": "2026-07-12T11:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O licopeno, um antioxidante encontrado no tomate, também está presentes nas toranas e laranjas cara-cara. Este composto auxilia na proteção cardiovascular.", "titulo_pt": "Antioxidante do tomate presente em frutas cítricas", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 47436, "titulo": "Férias escolares de 2027 coincidirão com Copa Feminina no Brasil", "url": "https://www.poder360.com.br/poder360/ferias-escolares-de-2027-coincidirao-com-copa-feminina-no-brasil/", "fonte_id": "poder360", "data_pub": "2026-07-12T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As férias escolares de 2027 estarão alinhadas com a Copa Feminina no Brasil, conforme estabelecido por uma lei. O governo federal também poderá decretar feriados nacionais nos dias em que a seleção brasileira jogar.", "titulo_pt": "Férias escolares de 2027 coincidirão com Copa Feminina e governo pode decretar feriados", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 47446, "titulo": "O avanço do outsider: Renan Santos defende cartilha ultraliberal e não poupa críticas a Lula e a Flávio", "url": "https://veja.abril.com.br/politica/o-avanco-do-outsider-renan-santos-defende-cartilha-ultraliberal-e-nao-poupa-criticas-a-lula-e-a-flavio/", "fonte_id": "veja", "data_pub": "2026-07-12T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Renan Santos, candidato que cresce fora da polarização entre Lula e Flávio, defende cartilhas ultraliberais. Ele não poupa críticas a ambos os principais concorrentes.", "titulo_pt": "Avanço do outsider: renan Santos defende cartilha ultraliberal e critica Lula e Flávio", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 47451, "titulo": "A estratégia do PT para tentar minar a hegemonia da oposição entre os evangélicos", "url": "https://veja.abril.com.br/politica/a-estrategia-do-pt-para-tentar-minar-a-hegemonia-da-oposicao-entre-os-evangelicos/", "fonte_id": "veja", "data_pub": "2026-07-12T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O PT busca reduzir os danos causados pela tendência favorável a Flávio no grupo evangélico, entendendo que inverter essa tendência seria quase impossível.", "titulo_pt": "A estratégia do PT para mitigar o impacto da preferência evangélica por flávio", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 47437, "titulo": "Elevação da Antártida impulsionou congelamento", "url": "https://www.poder360.com.br/poder-sustentavel/elevacao-da-antartida-impulsionou-congelamento/", "fonte_id": "poder360", "data_pub": "2026-07-12T10:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo publicado na revista Science demonstrou que ondas no manto terrestre contribuíram para o aumento das geleiras na Antártida. Essas ondas favoreceram a formação de geleiras, impulsionando o congelamento na região.", "titulo_pt": "Elevação da Antártida acelerou o congelamento", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 47438, "titulo": "Defensores públicos pedem regras rígidas para publicidade de bets", "url": "https://www.poder360.com.br/poder-economia/defensores-publicos-pedem-regras-rigidas-para-publicidade-de-bets/", "fonte_id": "poder360", "data_pub": "2026-07-12T10:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Defensores públicos sugerem regras estritas para a publicidade de apostas. O objetivo é diminuir o endividamento familiar e aliviar transtornos mentais relacionados.", "titulo_pt": "Defensores públicos solicitam regras rígidas para publicidade de apostas", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 47439, "titulo": "Damares deixa equipe do plano de governo de Flávio, diz site", "url": "https://www.poder360.com.br/poder-eleicoes/damares-deixa-equipe-do-plano-de-governo-de-flavio-diz-site/", "fonte_id": "poder360", "data_pub": "2026-07-12T10:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Damares deixou a equipe do plano de governo de Flávio após ser alvo de ataques por aliados do pré-candidato do PL nas redes sociais.", "titulo_pt": "Damares deixa equipe do plano de governo de Flávio, diz site", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 47430, "titulo": "Tarot do dia: previsão para os 12 signos em 12/07/2026", "url": "https://www.cartacapital.com.br/astrologia/tarot-do-dia-previsao-para-os-12-signos-em-12-07-2026/", "fonte_id": "cartacapital", "data_pub": "2026-07-12T10:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O equilíbrio entre razão e emoção será crucial para lidar com os desafios e aproveitar as oportunidades neste domingo. As previsões indicam encerramentos necessários, crescimento, estabilidade e fortalecimento das relações.", "titulo_pt": "Tarot do dia: previsão para os 12 signos em 15/07/2026", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 47440, "titulo": "Bancada do agro e governo discordam sobre dívidas rurais", "url": "https://www.poder360.com.br/poder-agro/bancada-do-agro-e-governo-discordam-sobre-dividas-rurais/", "fonte_id": "poder360", "data_pub": "2026-07-12T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A bancada do agronegócio e o governo estão em desacordo sobre dívidas rurais, com impasses relacionados a critérios de enquadramento dos produtores, taxas de juros e prazo de carência.", "titulo_pt": "Bancada do agro e governo discutem sobre dívidas rurais", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 47466, "titulo": "MP do TCU questiona aval para ministro de Lula atuar em estatal", "url": "https://www.metropoles.com/colunas/igor-gadelha/mp-do-tcu-questiona-aval-para-ministro-de-lula-atuar-em-estatal", "fonte_id": "metropoles", "data_pub": "2026-07-12T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A MP do TCU questiona se o ministro da Educação pode acumular um cargo no governo Lula com uma função remunerada em um conselho de estatal no Ceará.", "titulo_pt": "MP do TCU questiona se ministro de Lula pode acumular cargos", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 47441, "titulo": "Edição genética de embriões humanos reacende debate ético", "url": "https://www.poder360.com.br/poder-saude/edicao-genetica-de-embrioes-humanos-reacende-debate-etico/", "fonte_id": "poder360", "data_pub": "2026-07-12T09:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo sobre a edição genética de embriões humanos foi publicado sem passar por revisão por pares, levantando novas discussões éticas entre os pesquisadores. A técnica divide opiniões entre aqueles que a veem como promissora e aquelas que se preocupam com os limites éticos.", "titulo_pt": "Edição genética de embriões humanos reacende debate ético", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 47442, "titulo": "Rio terá política de ordenamento urbano nas praias da zona sul", "url": "https://www.poder360.com.br/poder-brasil/rio-tera-politica-de-ordenamento-urbano-nas-praias-da-zona-sul/", "fonte_id": "poder360", "data_pub": "2026-07-12T09:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A cidade do Rio de Janeiro implementará uma política de ordenamento urbano nas praias da zona sul a partir da próxima quinta-feira (16/7), com o objetivo de recuperar espaços públicos e impedir atividades não autorizadas.", "titulo_pt": "Rio terá política de ordenamento urbano nas praias da zona sul", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 47660, "titulo": "Irán ataca bases estadounidenses en Omán, Jordania y Qatar en medio de tensión creciente con EE.UU.", "url": "https://www.latercera.com/mundo/noticia/iran-ataca-bases-estadounidenses-en-oman-jordania-y-qatar-en-medio-de-tension-creciente-con-eeuu/", "fonte_id": "la_tercera", "data_pub": "2026-07-12T12:18:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "As autoridades iranianas afirmaram que os Estados Unidos estavam 'impondo sua vontade ao governo do Reino de Omã', o que levou a várias embarcações a criarem uma rota ilegal no sul do Estreito de Ormuz. Irã ataca bases dos EUA em Omã, Jordânia e Qatar durante tensão crescente entre as partes.", "titulo_pt": "Irã ataca bases americanas em omã, jordânia e Qatar em meio a crescente tensão com os EUA", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 47606, "titulo": "U.K. Police Make New Arrest in Killing of Ex-Lawmaker", "url": "https://www.nytimes.com/2026/07/12/world/europe/ann-widdecombe-arrest-uk.html", "fonte_id": "nyt_world", "data_pub": "2026-07-12T12:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um homem de 28 anos foi detido no sábado em conexão com a morte da ex-parlamentar Ann Widdecombe, conforme informaram as polícias. Um outro homem que foi preso na sexta-feira foi liberado posteriormente.", "titulo_pt": "Polícia britânica realiza nova prisão no caso do assassinato de ex-deputada", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 47733, "titulo": "Ukraine's Zelensky proposes new PM in Ukraine government reshuffle", "url": "https://www.france24.com/en/europe/20260712-ukraine-s-zelensky-proposes-new-pm-in-ukraine-government-reshuffle", "fonte_id": "france24", "data_pub": "2026-07-12T12:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente ucraniano Volodymyr Zelensky propôs a substituição da primeira-ministra Yulia Svyrydenko como parte de uma reorganização governamental mais ampla com o objetivo de implementar uma 'estratégia política atualizada'.", "titulo_pt": "Zelensky sugere novo PM em reformulação do governo ucraniano", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 47782, "titulo": "Qatar mourns Father Emir Sheikh Hamad bin Khalifa Al Thani", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/12/qatar-mourns-father-emir-sheikh-hamad-bin-khalifa-al-thani?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-12T12:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Qatar está em luto pelo antigo Emir Sheikh Hamad bin Khalifa Al Thani, que faleceu recentemente.", "titulo_pt": "Qatar lamenta o antigo Emir Sheikh Hamad bin Khalifa Al Thani", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 47524, "titulo": "Leão XIV pede diálogo para fim de guerras no Oriente Médio e na Ucrânia", "url": "https://www.cnnbrasil.com.br/internacional/leao-xiv-pede-dialogo-para-fim-de-guerras-no-oriente-medio-e-na-ucrania/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-12T12:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Papa Francisco pediu diálogo e diplomacia para terminar as guerras no Oriente Médio e na Ucrânia. Ele apelou para dissipar os 'ventos de guerra' através do diálogo.", "titulo_pt": "Papa francisco pede diálogo para fim de guerras no Oriente Médio e na Ucrânia", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 47512, "titulo": "Trump volta a atacar imprensa dos Estados Unidos e exalta vitória eleitoral", "url": "https://www.infomoney.com.br/mundo/trump-volta-a-atacar-imprensa-dos-estados-unidos-e-exalta-vitoria-eleitoral/", "fonte_id": "infomoney", "data_pub": "2026-07-12T12:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Donald Trump voltou a criticar a imprensa dos Estados Unidos e exaltou sua vitória eleitoral. A mensagem foi publicada após o republicano comentar sobre seus resultados em exames físico e cognitivo.", "titulo_pt": "Trump ataca imprensa americana e celebra vitória eleitoral", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 47818, "titulo": "South Korea asks the North to help search for missing sailor", "url": "https://www.japantimes.co.jp/news/2026/07/12/asia-pacific/south-korea-north-missing-sailor/", "fonte_id": "japan_times", "data_pub": "2026-07-12T12:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Coreia do Sul pediu à Coreia do Norte que ajude nas buscas por um marinheiro desaparecido. O marinheiro sumiu no domingo de manhã durante uma patrulha perto da Linha do Limites do Norte, na costa leste da Coreia do Sul.", "titulo_pt": "Coreia do sul pede ajuda à Coreia do norte para buscar marinheiro desaparecido", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 47527, "titulo": "Batalha interna pelo Cartel de Sinaloa agrava crise de violência no México", "url": "https://www.cnnbrasil.com.br/internacional/batalha-interna-pelo-cartel-de-sinaloa-agrava-crise-de-violencia-no-mexico/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-12T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A captura de 'El Mayo' Zambada intensificou a disputa entre facções do Cartel de Sinaloa, 'Los Mayos' e 'Los Chapitos', por seu comando.", "titulo_pt": "Batalha interna pelo Cartel de Sinaloa aprofunda crise de violência no México", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 47776, "titulo": "A three-way nuclear arms race", "url": "https://www.ft.com/content/e7ff97e3-a4a2-4237-af16-de7115296ca6", "fonte_id": "financial_times", "data_pub": "2026-07-12T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Hoje, o mundo apresenta alarmantes semelhanças com a era antes do controle das armas nucleares.", "titulo_pt": "Uma corrida nuclear triplicada", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 47633, "titulo": "New anti-racism standard will force Australian universities to use definitions of antisemitism and Islamophobia", "url": "https://www.theguardian.com/australia-news/2026/jul/12/new-anti-racism-standard-will-force-australian-universities-to-use-definitions-of-antisemitism-and-islamophobia-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-07-12T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A partir de 2024, as universidades australianas terão que adotar definições legais sobre antissemitismo, islamofobia e racismo contra povos indígenas aborígenes e torres estraitianas. Detalhes desse novo padrão anti-racismo serão divulgados na próxima semana durante audiências perante uma comissão real que investiga o antisemitismo e a coesão social.", "titulo_pt": "Novo padrão anti-racismo obriga universidades australianas a adotar definições de antissemitismo, islamofobia e racismo contra povos indígenas", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 47775, "titulo": "The great reinvention of Hunter Biden", "url": "https://www.ft.com/content/8e22b012-9f0f-45a5-b87f-a838e325ddc2", "fonte_id": "financial_times", "data_pub": "2026-07-12T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O texto discute as habilidades de Hunter Biden em provocar controvérsias.", "titulo_pt": "A grande reinvenção de Hunter Biden", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 47513, "titulo": "Países do Golfo condenam ataques do Irã e cobram respeito à soberania após tensões", "url": "https://www.infomoney.com.br/mundo/paises-do-golfo-condenam-ataques-do-ira-e-cobram-respeito-a-soberania-apos-tensoes/", "fonte_id": "infomoney", "data_pub": "2026-07-12T11:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Governos dos países do Golfo condenaram os ataques do Irã e exigiram respeito à soberania desses países. Eles também pediram o fim da escalada militar e a retomada das negociações diplomáticas.", "titulo_pt": "Países do Golfo condenam ataques do Irã e cobram respeito à soberania", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 47735, "titulo": "US senator and Trump ally Lindsey Graham dies aged 71", "url": "https://www.france24.com/en/video/20260712-us-senator-and-trump-ally-lindsey-graham-dies-aged-71", "fonte_id": "france24", "data_pub": "2026-07-12T11:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O senador dos Estados Unidos Lindsey Graham, um aliado chave do ex-presidente Donald Trump, faleceu aos 71 anos de uma 'doença repentina e breve', conforme informou seu gabinete no domingo.", "titulo_pt": "Senador americano e aliado de Trump morre aos 71 anos", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 47690, "titulo": "A Bible passage is at the center of a debate over how the U.S. should treat immigrants", "url": "https://www.npr.org/2026/07/12/nx-s1-5885947/a-bibe-passage-is-at-the-center-of-a-debate-over-how-the-u-s-should-treat-immigrants", "fonte_id": "npr_news", "data_pub": "2026-07-12T11:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um debate sobre o versículo bíblico Mateus 25 está polarizando pastores mainline, protestantes negros e o papa contra políticos evangélicos que estão se defendendo das políticas do presidente Trump em relação aos imigrantes.", "titulo_pt": "Versículo bíblico centraliza debate sobre tratamento de imigrantes nos EUA", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 47514, "titulo": "Rota sul de Ormuz segue aberta apesar de anúncio do Irã, diz órgão marítimo", "url": "https://www.infomoney.com.br/mundo/rota-sul-de-ormuz-segue-aberta-apesar-de-anuncio-do-ira-diz-orgao-maritimo/", "fonte_id": "infomoney", "data_pub": "2026-07-12T11:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A rota sul do Estreito ull, "texto_pt": "A justiça de São Paulo absolveu Thiago Brennand da condenação de oito anos por estupro. A decisão foi tomada em maio, por dois votos a um.", "titulo_pt": "Justiça de SP absolve Thiago Brennand de condenação de oito anos por estupro", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 47510, "titulo": "“Não gosto de ser chamada de Paulo Guedes de saia”, diz cotada para vice de Flávio", "url": "https://www.infomoney.com.br/politica/nao-gosto-de-ser-chamada-de-paulo-guedes-de-saia-diz-cotada-para-vice-de-flavio/", "fonte_id": "infomoney", "data_pub": "2026-07-12T12:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma conselheira econômica do candidato do PL, cotada para ser vice de Flávio Bolsonaro, afirmou que pesquisas indicam que a crise entre Michelle e Flávio foi superada. Ela propôs um ajuste de gastos de 1,5% do PIB e sugeriu uma corresponsabilidade fiscal entre os poderes.", "titulo_pt": "Não gosto de ser chamada de Paulo Guedes de saia", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 47511, "titulo": "Com mais autonomia, brasileiros 60+ se tornam mais importantes para setor de turismo", "url": "https://www.infomoney.com.br/consumo/com-mais-autonomia-brasileiros-60-se-tornam-mais-importantes-para-setor-de-turismo/", "fonte_id": "infomoney", "data_pub": "2026-07-12T12:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os brasileiros acima de 60 anos, mais independentes, realizam pelo menos duas viagens por ano e financiam suas próprias férias. Eles não dependem de datas específicas para viajar.", "titulo_pt": "Com mais autonomia, brasileiros 60+ se tornam mais importantes para setor de turismo", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 47830, "titulo": "Chinese state-owned firms set up semiconductor funds amid calls for ‘patient’ capital", "url": "https://www.scmp.com/tech/article/3360269/chinese-state-owned-firms-set-semiconductor-funds-amid-calls-patient-capital?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-12T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Empresas estatais e governamentais chinesas anunciaram novos fundos para o setor de semicondutores, uma vez que o país busca capital mais 'paciência'. A China Life Insurance, maior seguradora do país, em parceria com o governo central, planeja criar um fundo de 5 bilhões de yuan dedicado ao investimento na indústria de semicondutores.", "titulo_pt": "Empresas estatais chinesas criam fundos para semicondutores buscando capital 'paciência'", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 47452, "titulo": "Em meio à guerra comercial de Trump, Brasil acelera estratégias para reduzir danos", "url": "https://veja.abril.com.br/economia/em-meio-a-guerra-comercial-de-trump-brasil-acelera-estrategias-para-reduzir-danos/", "fonte_id": "veja", "data_pub": "2026-07-12T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil está intensificando suas estratégias para mitigar os efeitos da guerra comercial liderada pelo presidente americano, Donald Trump. O país busca contratos que possam abrir novos mercados e aumentar o alcance de suas exportações.", "titulo_pt": "No meio da guerra comercial de Trump, Brasil acelera estratégias para reduzir danos", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 47537, "titulo": "Prato feito: Preço da refeição sobe no Brasil apesar de alívio na inflação", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/prato-feito-preco-da-refeicao-sobe-no-brasil-apesar-de-alivio-na-inflacao/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-12T10:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O custo médio de uma refeição no Brasil é de R$ 31,90, variando entre as regiões, com o Sul liderando. Apesar do alívio na inflação, os preços das refeições continuam aumentando.", "titulo_pt": "Prato feito: preço da refeição sobe no Brasil apesar do alívio na inflação", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 47556, "titulo": "Carf aprova ágio em operação entre Getnet e Santander no setor de meios de pagamento", "url": "https://www.jota.info/tributos/carf-aprova-agio-em-operacao-entre-getnet-e-santander-no-setor-de-meios-de-pagamento", "fonte_id": "jota", "data_pub": "2026-07-12T09:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Conselho Administrativo de Recursos Fiscais (Carf) aprovou o ágio na operação de fusão entre Getnet e Santander no setor de meios de pagamento. O conselho rejeitou acusações sobre a existência de uma empresa veículo que teria sido usada para aproveitar benefícios fiscais.", "titulo_pt": "Carf aprova ágio na operação entre Getnet e Santander no setor de meios de pagamento", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 47421, "titulo": "Empresas trocam de nome para surfar onda da IA, mas alta das ações dura pouco", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/empresas-trocam-de-nome-para-surfar-onda-da-ia-mas-alta-das-acoes-dura-pouco.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-12T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Dezenas de empresas listadas nos Estados Unidos alteraram seus nomes para aproveitar a tendência da inteligência artificial, mas a valorização das ações não se manteve por muito tempo.", "titulo_pt": "Empresas mudam de nome para aproveitar onda da IA, mas valorização temporária", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 47480, "titulo": "Vida Imobiliária: A geração que prefere mobilidade a grandes apartamentos", "url": "https://exame.com/mercado-imobiliario/vida-imobiliaria-a-geracao-que-prefere-mobilidade-a-metragem/", "fonte_id": "exame", "data_pub": "2026-07-12T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt" itulo": "Hiperautomação: a nova fronteira da competitividade empresarial", "url": "https://olhardigital.com.br/2026/07/12/colunistas/hiperautomacao-a-nova-fronteira-da-competitividade-empresarial/", "fonte_id": "olhar_digital", "data_pub": "2026-07-12T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A hiperautomação é impulsionada pela evolução da inteligência artificial, análise de dados e integração entre sistemas. Ela representa uma nova fronteira na competitividade empresarial.", "titulo_pt": "Hiperautomação: a nova fronteira da competitividade empresarial", "veiculo": "Olhar Digital", "pais": "Brasil", "classe": "C"}, {"id": 47555, "titulo": "A sinergia entre conectividade e segurança inteligente no novo varejo de rua", "url": "https://canaltech.com.br/colunas/a-sinergia-entre-conectividade-e-seguranca-inteligente-no-novo-varejo-de-rua/", "fonte_id": "canaltech", "data_pub": "2026-07-12T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Nos últimos anos, o varejo físico teve que reavaliar suas prioridades e redesenhar sua operação devido a uma economia instável, especialmente impactada pela crise sanitária de 2020. A tecnologia passou a ser vista como um componente essencial para reduzir riscos, incluindo incidentes de roubo e furto, que são cruciais para gerenciar perdas financeiras.", "titulo_pt": "Sinergia entre conectividade e segurança inteligente no novo varejo físico", "veiculo": "Canaltech", "pais": "Brasil", "classe": "C"}, {"id": 47861, "titulo": "Scientists’ Side Hustle? Using AI and Quantum Computing to Generate New Peptides", "url": "https://www.wired.com/story/scientists-using-ai-and-quantum-computing-to-generate-new-peptides/", "fonte_id": "wired", "data_pub": "2026-07-12T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas conseguiram financiamento e tempo para demonstrar como a computação quântica poderia auxiliar no desenvolvimento de medicamentos para populações subaten a 14 dias depois, reuniu 600 convidados na catedral e 1500 no jantar, mas ela descreveu a experiência como caótica e estressante.", "titulo_pt": "Grace Kelly e Rainiero de mônaco: do romance que conquistou o mundo ao casamento tumultuado", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 47566, "titulo": "Fundación Proa, Andreani y Ungallery: un recorrido por las mejores exposiciones de La Boca", "url": "https://www.clarin.com/cultura/fundacion-proa-andreani-ungallery-recorrido-mejores-exposiciones-boca_0_PDVtfHMgrb.html", "fonte_id": "clarin", "data_pub": "2026-07-12T11:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A mostra da Fundación Proa apresenta obras de artistas como Andy Warhol, Agnes Martin e James Turrell. A Fundación Andreani, por sua vez, explora a interseção entre fotografia, ciência e arte textil. O passeio confirma La Boca como um destino importante para quem busca experiências culturais.", "titulo_pt": "Fundação Proa, Andreani e Ungallery: uma viagem pelas melhores exposições de La Boca", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 47426, "titulo": "'Filhos do Divino' não agrada, e Globo ainda busca título para sequência de 'Avenida Brasil'", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/07/filhos-do-divino-nao-agrada-e-globo-ainda-busca-titulo-para-sequencia-de-avenida-brasil.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-12T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Globo ainda não decidiu o título da sequência de 'Avenida Brasil', que estreará no horário nobre da emissora a partir de janeiro de 2027. A ideia é buscar um nome relacionado à novela original.", "titulo_pt": "Globo busca título para sequência de 'Avenida Brasil'", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 47444, "titulo": "Filme mais impactante do Oscar 2026 acaba de e age of apps", "url": "https://www.theguardian.com/books/2026/jul/12/people-treat-each-other-as-disposable-dating-columnist-turned-novelist-annie-lord-on-love-and-sex-in-the-age-of-apps", "fonte_id": "guardian_culture", "data_pub": "2026-07-12T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Annie Lord, ex-colunista de relacionamentos que se tornou autora, fala sobre sua vida solteira, o compartilhamento excessivo e por que ainda acredita em encontrar amor na era das apps. Seu romance contém uma cena familiar para jovens frequentadores de bares e clubes que lamentam a qualidade do mercado de relacionamentos.", "titulo_pt": "‘Pessoas tratam-se como descartáveis’: autora Annie Lord fala sobre amor e sexo no mundo das apps", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 47899, "titulo": "Why do free speech debates make us so angry?", "url": "https://www.theguardian.com/books/2026/jul/12/why-do-free-speech-debates-make-us-so-angry", "fonte_id": "guardian_culture", "data_pub": "2026-07-12T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em janeiro de 2015, dois membros da al-Qaida assassinaram cartunistas do jornal satírico francês Charlie Hebdo após a publicação de cartoons do profeta Maomé. Nas semanas seguintes, a página do autor no Facebook se dividiu entre amigos de infância que expressavam tristeza pela morte dos artistas e preocupação com o declínio da liberdade de expressão.", "titulo_pt": "Por que debates sobre liberdade de expressão nos deixam tão irritados?", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 47688, "titulo": "The Surprising Source of America’s Success", "url": "https://www.theatlantic.com/ideas/2026/07/america-birthday-250-roadtrip/687877/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-07-12T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A solidão criou a primeira nação na história em que qu const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml() : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml() {
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml()}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices().filter(function(v) { return v.lang === 'pt-BR' || v.lang.startsWith('pt'); });
    return vs[0] || null;
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // .sumario ou .destaque-analise imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
