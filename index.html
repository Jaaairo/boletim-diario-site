<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>

<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>

<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">

</div>

<div class="modal-overlay" id="modal-relatorio">

    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

egião permanece tenso, com a Ucrânia retaliando contra alvos russos. Em outro evento notável, um ferry com 116 passageiros naufragou na costa da Guiana, resultando em 53 pessoas resgatadas e causando preocupações sobre a segurança marítima no país.\n\nO conflito entre Estados Unidos e Irã continua a intensificar, com novos ataques aéreos dos EUA contra instalações militares iranianas. Segundo relatos, os Estados Unidos realizaram ataques noturnos por oitavo dia consecutivo, focando na região sul do Irã. A escalada das tensões levou o Irã a retaliar com ataques em Kuwait e Bahrein. Especialistas temem que o conflito possa sair de controle e levar a uma guerra regional. Além disso, a Rússia intensificou seus ataques contra Kiev, lançando 41 mísseis de diferentes tipos, causando danos significativos na capital ucraniana. A situação geopolítica global permanece volátil, com outros conflitos e tensões em países como o Líbano também merecendo atenção.", "economia": "Os preços do gás estão subindo novamente nos Estados Unidos, prejudicando a narrativa republicana sobre a inflação e as eleições de meio mandato. O colapso do acordo nuclear com o Irã também aumenta preocupações sobre os preços do petróleo e do gás. No Brasil, especialistas afirmam que a expansão da inteligência artificial (IA) está pressionando os preços antes de trazer ganhos de produtividade para a economia. A Abiec está avaliando os impactos das tarifas chinesas sobre a carne bovina brasileira, enquanto o Conselho Administrativo de Recursos Fiscais (Carf) permitiu que empresas possam creditar PIS/Cofins sobre royalties de sementes geneticamente modificadas. Além disso, a Boeing está abrindo uma nova linha de produção para atender à forte demanda pelo seu 737 Max, enquanto o Federal Reserve enfrenta desafios na decisão de quando e como aumentar os juros diante da pressão inflacionária.", "tecnologia": "O Império do Meio contra-ataca (em inteligência artificial): Nos últimos dias, a liderança dos Estados Unidos na inteligência artificial sofreu um revés, com o Brasil desempenhando um papel nesse cenário. O diretor Christopher Nolan, de 'Odyssey', considera a IA como um claro 'cavalo de Troia'. A Current AI, uma entidade sem fins lucrativos, está avançando em diversos campos, incluindo dispositivos e assistentes virtuais baseados em inteligência artificial. O governo australiano está elaborando novas regras para o uso da IA na tomada de decisões automatizadas por departamentos e agências governamentais. As gigantes tecnológicas chinesas estão intensificando seus esforços em IA para empresas, lançando soluções voltadas para o mercado empresarial durante a World Artificial Intelligence Conference (WAIC) em Shanghai. A Nvidia enfrenta concorrência de clientes que começam a desenvolver seus próprios chips e o ceticismo dos investidores na bolsa de valores de Nova York. O Brasil está utilizando um sistema de alerta meteorológico baseado em IA criado pela China para melhor preparar-se para desastres naturais como furacões e temporais, conhecido por Mazu. A administração Trump abriu os mercados americanos para futuros perpetuos altamente alavancados, levando day traders nos Estados Unidos a se movimentarem no produto mais perigoso do mercado de criptomoedas. O James Webb identificou um disco nuclear em formação a 9 bilhões de anos-luz, o mais distante já observado, confirmando que as galáxias amadureceram muito mais rapidamente do que se imaginava antes. A ChangXin Memory Technologies, da China, está realizando uma oferta inicial de ações avaliada em aproximadamente 8,5 bilhões de dólares com o objetivo de desafiar as empresas dominantes Samsung Electronics, SK hynix e Micron Technology. O governo australiano está elaborando novas regras para proteger os consumidores no uso da IA na tomada de decisões automatizadas por departamentos e agências governamentais. A inteligência artificial não substituiu os médicos na radiologia, mas transformou o campo dessa forma, conforme afirmado pelo nobel Geoffrey Hinton. As gigantes tecnológicas chinesas estão intensificando seus esforços em IA para empresas, lançando soluções voltadas para o mercado empresarial durante a World Artificial Intelligence Conference (WAIC) em Shanghai. A Nvidia enfrenta concorrência de clientes que começam a desenvolver seus próprios chips e o ceticismo dos investidores na bolsa de valores de Nova York. O Brasil está utilizando um sistema de alerta meteorológico baseado em IA criado pela China para melhor preparar-se para desastres naturais como furacões e temporais, conhecido por Mazu. A administração Trump abriu os mercados americanos para futuros perpetuos altamente alavancados, levando day traders nos Estados Unidos a se movimentarem no produto mais perigoso do mercado de criptomoedas.", "ciencia": "A descoberta de uma nova linhagem de marsupiais na Austrália, identificada através de fósseis da Queensland, reescreve a história do desenvolvimento das espécies únicas desse continente. Isso desafia a ideia de que todos os marsupiais descendem de uma única linhagem ancestral. Em outro avanço na pesquisa sobre doenças crônicas, um novo teste sanguíneo baseado em inteligência artificial da Universidade de Hong Kong pode prever problemas cardíacos e circulatórios graves 15 anos antes do evento real. Além disso, pesquisadores do Helmholtz-Zentrum Dresden-Rossendorf desenvolveram processos para degradar substâncias perfluoradas (PFAS), químicos industriais extremamente resistentes à degradação química, utilizando cavitação hidrodinâmica e plasma atmosférico frio. Estas descobertas destacam avanços significativos em diversas áreas da ciência, desde a evolução dos mamíferos até a saúde cardiovascular.", "cultura": "A UNESCO realiza uma sessão histórica da 48ª sessão do Comitê do Patrimônio Mundial em Busan, na Coreia do Sul, pela primeira vez desde que o país se juntou à Convenção do Patrimônio Mundial em 1988. A reunião, esperada para reunir cerca de 3.000 delegados de 196 países e organizações internacionais, é a maior conferência internacional sobre inscrição, conservação e gestão do Patrimônio Mundial. Entre as candidaturas analisadas está o projeto dos teatros da Amazônia, proposto pelo Brasil. Em outro destaque cultural, a UNESCO também examinará 30 novas candidaturas a Patrimônio Mundial durante os dias 24 e 26 de julho.", "sociedade": "A fundação propôs reformas educacionais com o objetivo de melhorar o sistema de ensino. Essa iniciativa visa trazer mudanças significativas para a qualidade do ensino e aprendizagem, buscando adequar as metodologias atuais às necessidades contemporâneas da sociedade. As sugestões incluem aprimoramentos na estrutura curricular, maior investimento em tecnologia educacional e fortalecimento de programas de apoio aos estudantes em situação de vulnerabilidade. Essas medidas visam garantir uma educação mais equitativa e eficaz para todos os alunos.", "meio_ambiente": "O governo brasileiro prevê a intensificação do fenômeno El Niño, que aumenta o risco de queimadas nos estados do Amazonas, Pará, Tocantins, Maranhão e Mato Grosso entre agosto e outubro. Essa previsão eleva as preocupações com os impactos ambientais na região amazônica durante esse período. De forma paralela, pesquisadores brasileiros defendem a importância dos tubarões nas costas do país, sugerindo medidas de conservação para preservar esses animais cruciais para o ecossistema marinho.", "direitos_humanos": "Um turista argentino foi condenado à prisão por injúria racial no estado da Bahia após filmar-se imitando um macaco para dois brasileiros, durante a vitória da Argentina na semifinal da Copa. Após o caso ser divulgado, ele fugiu do país. Em outra notícia, os Estados Unidos modificaram uma regra importante da Lei de Espécies em Perigo, eliminando a proteção automática para espécies classificadas como 'amenazadas', o que aumentou o temor de novas extinções entre ambientalistas. Além disso, imigrantes nos EUA criaram um plano para proteger seus filhos caso a ICE os abordasse, incluindo memorizar números de telefone importantes, ensinar às crianças a não abrir a porta da casa e reunir documentos necessários."}, "resumo_do_dia": {"politica_nacional": [{"id": 60453, "titulo": "Qual a melhor motosserra para podas domésticas? Veja o que considerar", "url": "https://www.cartacapital.com.br/toquetec/qual-a-melhor-motosserra-para-podas-domesticas-veja-o-que-considerar/", "fonte_id": "cartacapital", "data_pub": "2026-07-19T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ferramentas compactas e baterias estão ganhando popularidade para podas domésticas devido à sua praticidade e conforto. Essas ferramentas são ideais para cuidar de jardins, pomares e pequenas áreas externas.", "titulo_pt": "Qual a melhor motosserra compacta para podas domésticas? Veja o que considerar", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 60454, "titulo": "Oasis Device: o anel inteligente que aposta em gestos para reduzir o uso do celular", "url": "https://www.cartacapital.com.br/toquetec/oasis-device-o-anel-inteligente-que-aposta-em-gestos-para-reduzir-o-uso-do-celular/", "fonte_id": "cartacapital", "data_pub": "2026-07-19T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Oasis Device é um anel inteligente que oferece controle discreto do celular e computador por meio de toques e gestos, embora ainda dependa da evolução da versão comercial.", "titulo_pt": "Oasis Device: o anel inteligente que aposta em gestos para reduzir o uso do celular", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 60455, "titulo": "Qual filtro de água é ideal para sua casa? Veja vantagens e desvantagens de cada tipo", "url": "https://www.cartacapital.com.br/toquetec/qual-filtro-de-agua-e-ideal-para-sua-casa-veja-vantagens-e-desvantagens-de-cada-tipo/", "fonte_id": "cartacapital", "data_pub": "2026-07-19T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A qualidade da água proveniente das torneiras não é sempre garantida, e existem várias opções de filtros de água disponíveis para uso doméstico, cada um com suas próprias vantagens e desvantagens. Estas soluções tecnológicas permitem a purificação da água em ambientes residenciais, adaptando-se a diferentes necessidades e espaços.", "titulo_pt": "Qual filtro de água é ideal para sua casa? Conheça as vantagens e desvantagens de cada tipo", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 60456, "titulo": "Após fala de Messi sobre dificuldade econômica de argentinos, Milei dá razão ao atacante: ‘totalmente verdade’.", "url": "https://www.cartacapital.com.br/politica/apos-fala-de-messi-sobre-dificuldade-economica-de-argentinos-milei-da-razao-ao-atacante-totalmente-verdade/", "fonte_id": "cartacapital", "data_pub": "2026-07-19T15:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O jogador Lionel Messi comentou sobre a situação econômica difícil do povo argentino, afirmando que o dinheiro não chega ao fim do mês. Em resposta, um membro do governo, Gustavo Milei, concordou com as declarações de Messi, considerando-as 'totalmente verdade'.", "titulo_pt": "Depois de Messi falar sobre a economia difícil dos argentinos, Milei concorda: ‘totalmente verdade’", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 60463, "titulo": "Soroterapia sem indicação clínica pode trazer riscos à saúde", "url": "https://www.poder360.com.br/poder-saude/soroterapia-sem-indicacao-clinica-pode-trazer-riscos-a-saude/", "fonte_id": "poder360", "data_pub": "2026-07-19T15:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O uso de soroterapia sem indicação clínica pode trazer riscos à saúde, e o uso intravenoso de vitaminas deve ser restrito a deficiências diagnosticadas e acompanhado por profissional habilitado.", "titulo_pt": "Soroterapia sem indicação clínica pode trazer riscos à saúde", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 60444, "titulo": "Eleições: prazo para convenções partidárias começa nesta segunda-feira", "url": "https://agenciabrasil.ebc.com.br/politica/noticia/2026-07/eleicoes-prazo-para-convencoes-partidarias-comeca-nesta-segunda-feira", "fonte_id": "agencia_brasil_politica", "data_pub": "2026-07-19T15:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Começa nesta segunda-feira (20) o prazo para os partidos políticos realizarem suas convenções, onde definem seus candidatos. Os partidos terão até 5 de agosto para enviar as informações dos candidatos ao TSE.", "titulo_pt": "Eleições: prazo para convenções partidárias começa nesta segunda-feira", "veiculo": "Agência Brasil - Política", "pais": "Brasil", "classe": "A"}, {"id": 60473, "titulo": "Presidentes de partido vão desmentir no STF fala de Valdemar sobre emendas", "url": "https://veja.abril.com.br/brasil/presidentes-de-partido-vao-desmentir-no-stf-fala-de-valdemar-sobre-emendas/", "fonte_id": "veja", "data_pub": "2026-07-19T15:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O líder do partido PL afirmou que presidentes de partidos tinham acesso a emendas orçamentárias, mas depois revidou essa afirmação. Valdemar, supostamente citado no caso, também deve desmentir essa fala no Supremo Tribunal Federal (STF).", "titulo_pt": "Líder do pl vai desmentir no STF declaração sobre emendas de Valdemar", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 60457, "titulo": "Vagas temporárias crescem com férias e alta estação em julho", "url": "https://www.cartacapital.com.br/do-micro-ao-macro/vagas-temporarias-ferias-alta-estacao/", "fonte_id": "cartacapital", "data_pub": "2026-07-19T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em julho, o comércio, hotelaria e turismo aumentam suas equipes para atender a demanda durante as férias e alta estação. Especialistas explicam como empresas e candidatos podem aproveitar esse período.", "titulo_pt": "Vagas temporárias crescem com férias e alta estação em julho", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 60499, "titulo": "Eleitores poderão solicitar voto em trânsito a partir de 20/7", "url": "https://www.metropoles.com/distrito-federal/eleitores-poderao-solicitar-voto-em-transito-a-partir-de-20-7", "fonte_id": "metropoles", "data_pub": "2026-07-19T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os eleitores poderão solicitar o voto em trânsito a partir de 20 de julho, com pedido possível até 20 de agosto, tanto pela internet quanto presencialmente. A medida é válida para quem estiver fora do seu município no dia das eleições.", "titulo_pt": "Eleitores poderão solicitar voto em trânsito a partir de 20/7", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 60464, "titulo": "Estádio da final da Copa custou R$ 8,2 bilhões", "url": "https://www.poder360.com.br/copa-2026/estadio-da-final-da-copa-custou-r-82-bilhoes/", "fonte_id": "poder360", "data_pub": "2026-07-19T14:57:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O MetLife Stadium, local da final da Copa, é o terceiro estádio mais caro do torneio. Nove dos dez estádios mais custosos estão situados nos Estados Unidos.", "titulo_pt": "Estádio da final da Copa custou R$ 8,2 bilhões", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 60476, "titulo": "Michelle fecha porta para Zema e mantém suspense sobre candidatura ao Senado", "url": "https://veja.abril.com.br/politica/michelle-chapa-vice-zema-suspense-candidatura-senado/", "fonte_id": "veja", "data_pub": "2026-07-19T14:42:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Michelle afirmou que não há possibilidade de ser vice do ex-governador de Minas Gerais, Eduardo Zema, pré-candidato a presidente. Ela mantém aberta a possibilidade de concorrer ao Senado.", "titulo_pt": "Michelle fecha porta para Zema e mantém suspense sobre candidatura ao Senado", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 60465, "titulo": "9 em cada 10 incêndios em SP são provocados por ação humana", "url": "https://www.poder360.com.br/poder-sustentavel/acao-humana-e-a-principal-causa-de-incendios-leia-dicas-da-defesa-civil/", "fonte_id": "poder360", "data_pub": "2026-07-19T14:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O período de junho a outubro é considerado 'fase vermelha' por causa da seca, com alto risco de incêndios provocados pela ação humana. Multas podem chegar a R$ 3.000 por hectare.", "titulo_pt": "9 Em cada 10 incêndios em SP são causados por ação humana", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 60458, "titulo": "Soraya Thronicke tentará reeleição ao Senado com apoio do presidente Lula", "url": "https://www.cartacapital.com.br/politica/soraya-thronicke-tentara-reeleicao-ao-senado-com-apoio-do-presidente-lula/", "fonte_id": "cartacapital", "data_pub": "2026-07-19T14:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Soraya Thronicke, ex-candidata de Bolsonaro em 2018 e parlamentar do Mato Grosso do Sul, confirmou sua pré-candidatura à reeleição ao Senado pela aliança entre PT e PSB. O presidente Lula apoiará sua candidatura.", "titulo_pt": "Soraya Thronicke tentará reeleição ao Senado com apoio de Lula", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 60517, "titulo": "\"Eu sei que errei\", diz Renata Vieira após briga com entregador", "url": "https://www.congressoemfoco.com.br/noticia/120600/eu-sei-que-errei--diz-renata-vieira-apos-briga-com-entregador", "fonte_id": "congresso_em_foco", "data_pub": "2026-07-19T14:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Renata Vieira admitiu ter cometido um erro durante uma briga com um entregador, mas manteve sua versão de que foi atacada antes da reação registrada em vídeo.", "titulo_pt": "Eu sei que errei", "veiculo": "Congresso em Foco", "pais": "Brasil", "classe": "B"}, {"id": 60467, "titulo": "13,5 milhões de crianças ficam sem vacina no 1º ano de vida", "url": "https://www.poder360.com.br/poder-saude/135-milhoes-de-criancas-ficam-sem-vacina-no-1o-ano-de-vida/", "fonte_id": "poder360", "data_pub": "2026-07-19T14:04:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo revela que a cobertura vacinal global melhorou, mas a imunização contra o sarampo ainda não atinge a meta de segurança. Além disso, cerca de 13,5 milhões de crianças não receberam todas as vacinas necessárias no primeiro ano de vida.", "titulo_pt": "13,5 Milhões de crianças ficam sem vacina no primeiro ano de vida", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 60468, "titulo": "Prova de eficácia lidera exigências de anunciantes na América Latina", "url": "https://www.poder360.com.br/poder-midia/prova-de-eficacia-lidera-exigencias-de-anunciantes-na-america-latina/", "fonte_id": "poder360", "data_pub": "2026-07-19T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Dados da eMarketer indicam que a comprovação do investimento publicitário passou a ser uma exigência no mercado latino-americano. Provas de eficácia agora lideram as demandas dos anunciantes na região.", "titulo_pt": "Prova de eficácia se torna exigência para anunciantes na América Latina", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 60686, "titulo": "Iran War Live Updates: U.S. and Iran Edge Closer to Wider War After U.S. Service Members Killed", "url": "https://www.nytimes.com/live/2026/07/19/world/iran-war-strikes-trump-hormuz", "fonte_id": "nyt_world", "data_pub": "2026-07-19T15:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Exército dos Estados Unidos afirmou ter atacado forças iranianas responsáveis por um ataque a uma base no Iêmen que deixou dois soldados americanos mortos e um desaparecido. Aproxima-se o risco de uma escalada para um conflito mais amplo entre os dois países.", "titulo_pt": "Atualizações da guerra do Irã: estados unidos e Irã se aproximam de conflito mais extenso após mortes de servidores militares", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 60762, "titulo": "🔴 Denmark's Jonas Vingegaard, in second place in Tour de France, withdraws after fall", "url": "https://www.france24.com/en/sport/20260719-denmark-s-jonas-vingegaard-withdraws-from-tour-de-france-after-fall", "fonte_id": "france24", "data_pub": "2026-07-19T15:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O ciclista dinamarquês Jonas Vingegaard, que ocupava a segunda posição no Tour de France, retirou-se após cair durante uma corrida.", "titulo_pt": "Jonas Vingegaard, em segundo lugar no Tour de France, se retira após queda", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 60738, "titulo": "How the United Bid became the Trump Trophy", "url": "https://www.politico.com/live-updates/2026/07/19/world-cup-2026/fifa-trump-political-history-01004365", "fonte_id": "politico", "data_pub": "2026-07-19T15:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo discute como a proposta de candidatura dos Estados Unidos se transformou no Troféu Trump.", "titulo_pt": "Como a proposta do Bid virou o troféu Trump", "veiculo": "Politico", "pais": "EUA", "classe": "A"}, {"id": 60825, "titulo": "F1:Belgio;presidente Aci La Russa 'doppietta perfetta, Italia assoluta padrona Circus'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/19/f1belgiopresidente-aci-la-russa-doppietta-perfetta-italia-assoluta-padrona-circus_822b4b3b-e3e1-4bc7-923a-a26c0fdf672b.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-19T15:00:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O presidente da Aci La Russa, Antonelli, obteve um duplo triunfo na Bélgica. A Itália se destacou como a principal força no campeonato de Fórmula 1.", "titulo_pt": "F1: bélg olfo expressam preocupação com a escalada recente dos ataques entre as duas potências.", "titulo_pt": "Análise: conflito EUA x Irã ameaça virar guerra regional", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 60856, "titulo": "US Marshals arrest the Tate brothers in Miami", "url": "https://www.theverge.com/policy/967651/us-marshals-arrest-the-tate-brothers-in-miami", "fonte_id": "the_verge", "data_pub": "2026-07-19T14:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os influenciadores do manosphere Andrew e Tristan Tate foram presos pela Polícia Federal dos Estados Unidos em Miami no sábado, em relação a novas acusações de estupro e tráfico sexual na Inglaterra. De acordo com a Associated Press, autoridades britânicas buscam a extradição dos irmãos.", "titulo_pt": "US Marshals prendem os irmãos Tate em Miami", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 60814, "titulo": "Why is China protesting about the nationalisation of British Steel?", "url": "https://www.aljazeera.com/news/2026/7/19/why-is-a-chinese-company-protesting-over-uk-nationalising-a-steel-plant?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-19T14:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Reino Unido está tomando medidas para nacionalizar a British Steel, o que está provocando uma disputa com China durante um período de transição no governo britânico.", "titulo_pt": "Por que a China se opõe à nacionalização da British Steel?", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 60483, "titulo": "‘Lucky’: Anya Taylor-Joy vive golpista perseguida em nova série da Apple", "url": "https://veja.abril.com.br/coluna/veja-recomenda/lucky-anya-taylor-joy-vive-golpista-perseguida-em-nova-serie-da-apple/", "fonte_id": "veja", "data_pub": "2026-07-19T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A série 'Lucky', da Apple, é baseada no best-seller de Marissa Stapley e estrelada por Annette Bening. Anya Taylor-Joy interpreta uma golpista perseguida na produção.", "titulo_pt": "'Sortuda': anya Taylor-Joy vive golpista perseguida em nova série da Apple", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}], "mundo__eventos": [], "economia": [{"id": 60533, "titulo": "Trump sob pressão: Irã, inflação e China entram no jogo eleitoral", "url": "https://www.cnnbrasil.com.br/internacional/trump-sob-pressao-ira-inflacao-e-china-entram-no-jogo-eleitoral/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Tensões com o Irã e acusações contra a China complicam o cenário político e econômico do presidente americano durante o ano eleitoral.", "titulo_pt": "Trump sob pressão: Irã, inflação e China entram no jogo eleitoral", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 60441, "titulo": "Meta tem problema técnico neste domingo, e usuários de Instagram e Facebook reclamam", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/tec/2026/07/meta-tem-instabilidade-tecnica-neste-domingo-e-usuarios-de-instagram-e-facebook-reclamam.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-19T13:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Meta, proprietária do Instagram, Facebook e WhatsApp, enfrentou problemas técnicos na madrugada de domingo (19), resultando em relatos de usuários de vários países sobre indisponibilidade dos serviços.", "titulo_pt": "Meta enfrenta problema técnico neste domingo, com usuários do Instagram e Facebook relatando falhas", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 60442, "titulo": "Elevador vira gargalo em obras e leva incorporadoras a antecipar encomendas em até 18 meses", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/elevador-vira-gargalo-em-obras-e-leva-incorporadoras-a-antecipar-encomendas-em-ate-18-meses.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-19T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As incorporadoras estão antecipando encomendas de elevadores em até 18 meses, já que o equipamento é um dos primeiros contratos assinados para novos prédios. A falta de manutenção adequada pode levar a longas interrupções nos serviços de elevador em edifícios antigos.", "titulo_pt": "Antecipação de encomendas de elevadores em obras", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 60735, "titulo": "How to slow down time when life keeps speeding up", "url": "https://www.vox.com/future-perfect/496045/slow-down-time-life-speeds-up-advice", "fonte_id": "vox", "data_pub": "2026-07-19T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A autora Shayla Love, jornalista científica e fã do site Your Mileage May Vary, está respondendo perguntas enviadas pelos leitores como substituta da escritora Sigal Samuel durante as férias parentais. Ela abordará os assuntos das perguntas através de vários prismas: filosófico, psicológico e mais além.", "titulo_pt": "Como diminuir o tempo quando a vida está se acelerando", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 60757, "titulo": "Gas prices are rising again — and so is GOP grief in the midterms", "url": "https://www.axios.com/2026/07/19/gas-prices-iran-war-trump-election", "fonte_id": "axios", "data_pub": "2026-07-19T11:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os preços do gás estão aumentando novamente, comprometendo a chance dos republicanos de melhorar sua narrativa sobre inflação antes das eleições de meios mandatos. O colapso do acordo nuclear com o Irã está levantando novas preocupações sobre os preços do gás.", "titulo_pt": "Preços do gás sobem novamente e causam dor de cabeça para republicanos nas eleições", "veiculo": "Axios", "pais": "EUA", "classe": "B"}, {"id": 59862, "titulo": "Entenda os impactos da inteligência artificial na inflação dos EUA", "url": "https://www.poder360.com.br/poder-economia/entenda-os-impactos-da-inteligencia-artificial-na-inflacao-dos-eua/", "fonte_id": "poder360", "data_pub": "2026-07-19T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Novas tecnologias têm um efeito paradoxal na economia dos Estados Unidos, desafiando as decisões do Federal Reserve, conforme especialistas afirmam.", "titulo_pt": "Entenda os impactos das novas tecnologias na inflação dos EUA", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 59896, "titulo": "O RH já paga a academia. Agora precisa convencer as pessoas a treinar", "url": "https://www.infomoney.com.br/carreira/o-rh-ja-paga-a-academia-agora-precisa-convencer-as-pessoas-a-treinar/", "fonte_id": "infomoney", "data_pub": "2026-07-19T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Especialistas indicam que o desafio atual para os departamentos de Recursos Humanos é criar uma cultura que transforme a intenção de exercícios físicos em hábito, após já terem oferecido incentivos financeiros. O post original do InfoMoney destaca essa mudança no foco dos RHs.", "titulo_pt": "RH já paga academia, agora precisa convencer pessoas a se exercitarem", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 60579, "titulo": "A corrida pelos remédios para emagrecer cria vencedores e fracassos na bolsa", "url": "https://exame.com/invest/mercados/a-corrida-pelos-remedios-para-emagrecer-cria-vencedores-e-fracassos-na-bolsa/", "fonte_id": "exame", "data_pub": "2026-07-19T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A corrida pelos medicamentos para tratamento da obesidade gerou um mercado bilionário na biotecnologia, com poucos projetos chegando ao mercado e o sucesso dependendo de longos períodos de testes.", "titulo_pt": "Corrida pelos remédios para emagrecer cria vencedores e fracassos na bolsa", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 59897, "titulo": "Como novas regras tributárias vão reformar Construção Civil", "url": "https://www.infomoney.com.br/business/mais-notas-menos-improviso-tributaria-faz-verdadeira-reforma-na-construcao-civil/", "fonte_id": "infomoney", "data_pub": "2026-07-19T10:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As novas regras tributárias vão transformar significativamente a gestão do setor de construção civil. A reforma parece técnica, mas impacta profundamente o negócio.", "titulo_pt": "Como novas regras tributárias vão transformar a Construção Civil", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 59953, "titulo": "IA deve gerar inflação antes de ajudar economia, diz especialista", "url": "https://www.cnnbrasil.com.br/economia/negocios/ia-deve-gerar-inflacao-antes-de-ajudar-economia-diz-especialista/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T10:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um especialista da Reach Capital, Igor Barenboim, afirmou à CNN que a expansão da tecnologia da inteligência artificial (IA) está pressionando os preços antes de trazer ganhos de produtividade para a economia.", "titulo_pt": "IA deve gerar inflação antes de ajudar economia, diz especialista", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 59898, "titulo": "Startups: Metade das empresas que demitiram por IA vai recontratar até 2027", "url": "https://www.infomoney.com.br/business/startups-metade-das-empresas-que-demitiram-por-ia-vai-recontratar-ate-2027/", "fonte_id": "infomoney", "data_pub": "2026-07-19T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma consultoria afirma que a inteligência artificial não está madura o suficiente para substituir a experiência humana. Metade das startups que demitiram funcionários por causa da IA planeja recontratá-los até 2027.", "titulo_pt": "Startups: metade das empresas que demitiram por IA vai recontratar até 2027", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 59899, "titulo": "SpaceX e OpenAI antes da bolsa: Investidores capturam mais valorização pré-IPO?", "url": "https://www.infomoney.com.br/mercados/spacex-e-openai-antes-da-bolsa-investidores-capturam-mais-valorizacao-pre-ipo/", "fonte_id": "infomoney", "data_pub": "2026-07-19T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A geração de valor ocorre principalmente fora dos mercados públicos e está concentrada nos investidores que conseguem acessar essas oportunidades antes do IPO. SpaceX e OpenAI são exemplos disso.", "titulo_pt": "Spacex e OpenAI antes da bolsa: investidores capturam mais valorização pré-ipo?", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 60375, "titulo": "How Yunnan’s mineral wealth and border corridors could solve China’s ‘Malacca dilemma’", "url": "https://www.scmp.com/news/china/military/article/3361079/how-yunnans-mineral-wealth-and-border-corridors-could-solve-chinas-malacca-dilemma?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-19T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A província ocidental chinesa de Yunnan, com suas vastas reservas estratégicas de minerais e corredores terrestres para o Sudeste Asiático, é crucial para a preparação da China contra riscos geopolíticos. De acordo com especialistas em fusão civil-militar, os recursos mineralísticos nacionalmente liderados do Yunnan, incluindo gálio, rares metais terrestres e outros minerais estratégicos essenciais para o desenvolvimento de armas avançadas, tornam a província indispensável para a mobilização da indústria defensiva chinesa.", "titulo_pt": "Como as riquezas minerais e corredores fronteiriços do Yunnan podem resolver o 'dilema Malacca' da China", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 60584, "titulo": "Gestor que antecip undo trimestre de 2026 será divulgado após o fechamento do mercado no dia 21 de julho.", "titulo_pt": "Quando sai o resultado da Vale (VALE3) do 2º tri de 2026?", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}], "economia__eventos": [], "tecnologia": [{"id": 60440, "titulo": "O Império do Meio contra-ataca (em inteligência artificial)", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/ronaldolemos/2026/07/o-imperio-do-meio-contra-ataca-em-inteligencia-artificial.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-19T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Nos últimos dias, a liderança dos Estados Unidos na inteligência artificial sofreu um revés, com o Brasil desempenhando um papel nisso.", "titulo_pt": "O Império do Meio contra-ataca (em inteligência artificial)", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 60860, "titulo": "‘Odyssey’ director Christopher Nolan calls AI an obvious ‘Trojan horse’", "url": "https://techcrunch.com/2026/07/19/odyssey-director-christopher-nolan-calls-ai-an-obvious-trojan-horse/", "fonte_id": "techcrunch", "data_pub": "2026-07-19T14:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Christopher Nolan, diretor do filme 'Odyssey', considera a inteligência artificial um claro 'cavalo de Troia'. O termo 'Everybody knows the Greeks are inside' é uma referência a essa ideia, sugerindo que a presença da inteligência artificial é inegável e potencialmente perigosa.", "titulo_pt": "Christopher Nolan chama IA de clara 'cavalo de troia'", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 60865, "titulo": "Evacuations ordered as Coupang warehouse blaze fuels collapse fears", "url": "https://www.koreaherald.com/article/10812951", "fonte_id": "korea_herald", "data_pub": "2026-07-19T14:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Autoridades ordenaram evacuações perto do centro de logística da Coupang em Incheon devido a um incêndio que estava fora de controle no depósito, levando a preocupações sobre o risco de colapso do prédio. As chamas continuavam alastrando após o objetivo inicial de conter o fogo ser descartado antes da meia-noite.", "titulo_pt": "Evacuações ordenadas devido ao incêndio no depósito da Coupang em incheon", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 60861, "titulo": "Nonprofit Current AI is racing to build the World Wide Web of AI, free for all", "url": "https://techcrunch.com/2026/07/19/nonprofit-current-ai-is-racing-to-build-the-world-wide-web-of-ai-free-for-all/", "fonte_id": "techcrunch", "data_pub": "2026-07-19T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Current AI, uma entidade sem fins lucrativos que busca garantir a inclusão cultural na inteligência artificial, está avançando significativamente em diversos campos como dispositivos e assistentes virtuais de conversação baseados em IA.", "titulo_pt": "O nonprofit Current AI está correndo para criar uma Web mundial da inteligência artificial gratuita", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 60816, "titulo": "Why were Andrew and Tristan Tate arrested? Will they be extradited to UK?", "url": "https://www.aljazeera.com/news/2026/7/19/why-were-andrew-and-tristan-tate-arrested-will-they-be-extradited-to-uk?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-19T13:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os irmãos influenciadores Andrew e Tristan Tate foram presos em Miami, e o Reino Unido busca sua extradição para responder a novas acusações de estupro, tráfico sexual e agressão.", "titulo_pt": "Por que Andrew e Tristan Tate foram presos? Eles serão extraditados para o reino unido?", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 60841, "titulo": "China’s AI weather warning system Mazu expanding across Global South", "url": "https://www.scmp.com/news/china/science/article/3361108/chinas-ai-weather-warning-system-mazu-expanding-across-global-south?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-19T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sete países em desenvolvimento estão utilizando um sistema de alerta meteorológico baseado em AI criado pela China para melhor preparar-se para desastres naturais como furacões e temporais. O sistema, chamado Mazu, foi descrito pelo engenheiro-chefe do Instituto Meteorológico Chinês como uma 'bem-aventurança internacional' que fornece serviços de alerta precoces personalizados para países em desenvolvimento.", "titulo_pt": "Sistema chinês de alerta meteorológico AI expande para sete países em desenvolvimento", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 60732, "titulo": "Government use of automated AI decision-making to be curbed under new Australian rules", "url": "https://www.theguardian.com/australia-news/2026/jul/19/national-ai-plan-labor-anthony-albanese-andrew-charlton", "fonte_id": "guardian_world", "data_pub": "2026-07-19T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo australiano está elaborando novas regras para o uso de inteligência artificial (IA) na tomada de decisões automatizadas por departamentos e agências governamentais, com foco em proteções consumistas, segurança no trabalho e privacidade. Essas regras são parte de um novo plano nacional e refletem a crescente preocupação do governo com o rápido avanço da IA.", "titulo_pt": "Novas regras para uso de inteligência artificial pelo governo australiano", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 60845, "titulo": "How Chinese tech giants from Ant to Tencent use AI agents to win over enterprise clients", "url": "https://www.scmp.com/tech/big-tech/article/3361109/how-chinese-tech-giants-ant-tencent-use-ai-agents-win-over-enterprise-clients?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-19T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As gigantes tecnológicas chinesas estão intensificando seus esforços em inteligência artificial para empresas, lançando novos produtos na principal conferência de IA do país. Durante a World Artificial Intelligence Conference (WAIC) em Shanghai, empresas como Ant Group, Tencent Holdings, Alibaba e Baidu apresentaram soluções voltadas para o mercado empresarial.", "titulo_pt": "Como gigantes chinesas de tecnologia, da Ant à Tencent, usam agentes de IA para conquistar clientes corporativos", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 60834, "titulo": "Japanese officials open X accounts to counter China’s cognitive warfare", "url": "https://www.japantimes.co.jp/news/2026/07/19/japan/sdf-x-accounts/", "fonte_id": "japan_times", "data_pub": "2026-07-19T11:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As autoridades japonesas estão abrindo contas X para contrabalançar a operação cognitiva da China, que é realizada através de desinformação. Isso se dá em meio à invasão russa da Ucrânia e reconhecimento pelo SDF (Exército de Defesa do Japão) sobre o papel crescente dessa forma de guerra na atualidade.", "titulo_pt": "Autoridades japonesas abrem contas X para combater operações cognitivas chinesas", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 60859, "titulo": "As mosquito ranges expand, better monitoring is key to preventing disease", "url": "https://arstechnica.com/science/2026/07/as-mosquito-ranges-expand-better-monitoring-is-key-to-preventing-disease/", "fonte_id": "ars_technica", "data_pub": "2026-07-19T11:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A expansão dos habitats de mosquitos é um desafio para a vigilância sanitária, pois monitorar essas mudanças pode ser caro e exigir muita mão-de nde-estao-os-maiores-ganhos-de-eficiencia/", "fonte_id": "olhar_digital", "data_pub": "2026-07-19T10:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os maiores ganhos de eficiência na hiperautomação ocorrem quando as organizações eliminam silos entre áreas e passam a operar com processos integrados.", "titulo_pt": "Hiperautomação: onde estão os maiores ganhos de eficiência?", "veiculo": "Olhar Digital", "pais": "Brasil", "classe": "C"}], "tecnologia__eventos": [], "ciencia": [{"id": 60450, "titulo": "Por que nossos dedos têm comprimentos diferentes", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/por-que-nossos-dedos-tem-comprimentos-diferentes.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-19T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O autor descreveu uma situação onde estava atrasado e, na pressa, derrubou algumas coisas da bancada, espalhando moedas pelo chão.", "titulo_pt": "Por que nossos dedos têm comprimentos diferentes?", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 60879, "titulo": "Should we trust AI in the search for alien life? Scientists aren't so sure", "url": "https://www.space.com/space-exploration/search-for-life/should-we-trust-ai-in-the-search-for-alien-life-scientists-arent-so-sure", "fonte_id": "space_com", "data_pub": "2026-07-19T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Novas pesquisas indicam que a inteligência artificial pode repetidamente enganar os cientistas, fazendo com que confundam não-vida com vida.", "titulo_pt": "Deveríamos confiar na IA na busca por vida extraterrestre?", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 60873, "titulo": "New AI blood test predicts heart disease 15 years early", "url": "https://www.sciencedaily.com/releases/2026/07/260716023603.htm", "fonte_id": "science_daily", "data_pub": "2026-07-19T14:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo teste sanguíneo baseado em IA pode fornecer uma advertência muito precoce de problemas cardíacos e circulatórios graves. Desenvolvido por pesquisadores da Universidade de Hong Kong, o CardiOmicScore analisa milhares de proteínas e metabólitos para estimar o risco de seis doenças cardiovasculares maiores, incluindo ataque cardíaco, stroke, insuficiência cardíaca e fibrilação auricular.", "titulo_pt": "Novo teste sanguíneo com IA prediz doenças cardíacas há 15 anos", "veiculo": "Science Daily", "pais": "EUA", "classe": "C"}, {"id": 60648, "titulo": "Científicos del Conicet, junto a otros investigadores, revelaron el inesperado comportamiento del hierro en el centro del planeta", "url": "https://www.lanacion.com.ar/ciencia/cientificos-del-conicet-junto-a-otros-investigadores-revelaron-el-inesperado-comportamiento-del-nid18072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-19T14:45:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Cientistas do Conicet, junto com outros pesquisadores, descobriram um comportamento inesperado do ferro no centro da Terra. Essa descoberta fornece novas informações sobre o campo magnético terrestre, a velocidade das ondas sísmicas e a evolução de planetas rochosos.", "titulo_pt": "Cientistas revelam comportamento surpreendente do ferro no centro da terra", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 60867, "titulo": "Researchers develop methods for breaking down forever chemicals", "url": "https://phys.org/news/2026-07-methods-chemicals.html", "fonte_id": "phys_org", "data_pub": "2026-07-19T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Investigadores do Helmholtz-Zentrum Dresden-Rossendorf desenvolveram dois processos—cavitação hidrodinâmica e plasma atmosférico frio combinado com dispersão de gás—tomando como alvo substâncias perfluoradas (PFAS), químicos industriais extremamente resistentes à degradação química. Os resultados foram publicados nas revistas Chemical Engineering Journal Advances e Scientific Reports.", "titulo_pt": "Investigadores desenvolvem métodos para quebrar químicos perene", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 60868, "titulo": "Are workplaces safer? Harassment and violence persist, survey finds", "url": "https://phys.org/news/2026-07-workplaces-safer-violence-persist-survey.html", "fonte_id": "phys_org", "data_pub": "2026-07-19T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo levantamento nacional canadense indica que assédio e violência nos ambientes de trabalho continuam sendo problemas generalizados no Canadá, embora haja alguns sinais de melhora. O estudo foi realizado pelo Centro para Pesquisa e Educação sobre Violência Contra Mulheres e Crianças da Universidade Western em parceria com o Congresso Nacional do Trabalho canadense.", "titulo_pt": "Os locais de trabalho são mais seguros? Assédio e violência persistem, pesquisa mostra", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 60880, "titulo": "How Christopher Nolan's 'Interstellar' turned general relativity into the bad guy", "url": "https://www.space.com/entertainment/space-movies-shows/how-christopher-nolans-interstellar-turned-general-relativity-into-the-bad-guy", "fonte_id": "space_com", "data_pub": "2026-07-19T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O filme de ficção científica 'Interstellar', dirigido por Christopher Nolan, apresentou a distorção do tempo como um personagem adverso. O filme é lembrado por explorar a teoria da relatividade geral de uma forma que torna o tempo um elemento cruel para os personagens.", "titulo_pt": "Como 'Interstellar' de Christopher Nolan transformou a relatividade geral em inimiga", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 60808, "titulo": "It’s time for Europe to embrace air conditioning", "url": "https://www.ft.com/content/cbeea953-1162-48f0-ac6d-e022c42353c6?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-19T13:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A frequência de verões mais quentes está prejudicando a produtividade e causando mortes. É hora da Europa adotar ar condicionado.", "titulo_pt": "É hora para a Europa aceitar o ar condicionado", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 60872, "titulo": "A tiny universe in a bottle reveals clues to the origins of life", "url": "https://www.sciencedaily.com/releases/2026/07/260718010156.htm", "fonte_id": "science_daily", "data_pub": "2026-07-19T13:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores criaram poeira cósmica artificialmente, recriando condições espaciais dentro de tubos de vidro. A poeira contém moléculas carboníferas complexas que podem ser essenciais para a vida e emite sinais infravermelhos semelhantes aos encontrados no espaço.", "titulo_pt": "Um pequeno universo em uma garrafa revela pistas sobre as origens da vida", "veiculo": "Science Daily", "pais": "EUA", "classe": "C"}, {"id": 60881, "titulo": "10 places in the US and Canada to see August's partial solar eclipse and Perseid meteor shower in 1 trip", "url": "https://www.space.com/stargazing/10-places-in-the-us-and-canada-to-see-augusts-partial-solar-eclipse-and-perseid-meteor-shower-in-1-trip", "fonte_id": "space_com", "data_pub": "2026-07-19T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O eclipse solar parcial de 12 de agosto de 2026 será visível em algumas partes do Norte América, enquanto a culminância da chuva de meteoros Perseides ocorrerá na mesma noite. Isso faz desta data uma das melhores para observação astronômica e acampamento ao ar livre nos últimos anos.", "titulo_pt": "10 Locais nos EUA e canadá para ver o eclipse solar parcial de agosto e a culminância da chuva de meteoros perseides em uma única viagem", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 60869, "titulo": "Hybrid work blurs the line between work and home—here's how couples can set boundaries", "url": "https://phys.org/news/2026-07-hybrid-blurs-line-home-couples.html", "fonte_id": "phys_org", "data_pub": "2026-07-19T12:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O trabalho híbrido trouxe benefícios como maior flexibilidade, mas também desafios para casais profissionais que buscam equilibrar duas carreiras com uma vida compartilhada.", "titulo_pt": "Trabalho híbrido confunde a linha entre trabalho e casa—saiba como estabelecer limites", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 60871, "titulo": "The mysterious hum heard around the world may finally have an explanation", "url": "https://www.sciencedaily.com/releases/2026/07/260719040002.htm", "fonte_id": "science_daily", "data_pub": "2026-07-19T12:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O som misterioso conhecido como The Hum tem sido relatado em todo o mundo há décadas, mas sua origem permanece incerta. Pesquisadores testaram se pessoas que ouvem esse som têm audição excepcionalmente sensível a baixos frequências ou sons gerados internamente, mas essas explicações não se aplicam a maioria dos participantes. A explicação mais forte é que muitos casos envolvem tinnitus de baixa frequência, apesar do som parecer completamente externo.", "titulo_pt": "O estranho ruído ouvido em todo o mundo pode ter uma explicação", "veiculo": "Science Daily", "pais": "EUA", "classe": "C"}, {"id": 60451, "titulo": "Webb revela galáxias ricas em hélio na infância do Universo", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/blogs/mensageiro-sideral/2026/07/webb-revela-galaxias-ricas-em-helio-na-infancia-do-universo.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-19T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo internacional, liderado por pesquisadores brasileiros e baseado em dados do Telescópio Espacial James Webb, revelou que algumas galáxias distantes têm uma quantidade de hélio muito maior do que se esperava. Este achado contribui para a compreensão da evolução química desde o Big Bang.", "titulo_pt": "Webb descobre galáxias ricas em hélio na infância do Universo", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 60846, "titulo": "China plans to hit an asteroid with a Mach 26 projectile in planet defence test", "url": "https://www.scmp.com/news/china/science/article/3360752/china-plans-hit-asteroid-mach-26-projectile-planet-defence-test?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-19T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A China planeja realizar uma missão de defesa planetária que, segundo um novo artigo, será mais ambiciosa do que a tarefa piloto Dart da NASA. O objetivo chinês é colidir um foguetão com velocidade Mach 26 em um asteroide antes de 2030, visando mudar diretamente a órbita deste asteroide em relação à Terra ou até mesmo fragmentá-lo.", "titulo_pt": "China planeja atingir um asteroide com projétil a Mach 26 em teste de defesa planetária", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 60870, "titulo": "Plants that make real dairy protein? Scientists discover an unexpected shortcut", "url": "https://phys.org/news/2026-07-real-dairy-protein-scientists-unexpected.html", "fonte_id": "phys_org", "data_pub": "2026-07-19T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas descobriram que as plantas podem produzir uma das proteínas mais importantes do leite, avançando para a possibilidade de se obter proteínas lácteas reais sem o uso de vacas. Este achado pode facilitar a produção sustentável de ingredientes lácteos e alimentos alternativos.", "titulo_pt": "Plantas que produzem proteína do leite? Pesq o AM", "url": "https://www.metropoles.com/colunas/mirelle-pinheiro/crianca-de-6-anos-morre-com-facada-nas-costas-e-pai-e-preso", "fonte_id": "metropoles", "data_pub": "2026-07-19T14:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um pai foi preso após sua filha de 6 anos morrer com uma facada nas costas durante um incidente em Itapiranga, Amazonas. O homem relatou à polícia que havia atingido a criança com uma mochila, sem se lembrar de que ela continha facas.", "titulo_pt": "Criança de 6 anos morre com facada nas costas e pai é preso no AM", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 60481, "titulo": "BP terceiriza hemodiálise à DaVita; pacientes relatam falhas na transição", "url": "https://veja.abril.com.br/coluna/radar-economico/bp-terceiriza-hemodialise-a-davita-pacientes-relatam-falhas-na-transicao/", "fonte_id": "veja", "data_pub": "2026-07-19T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A BP terceirizou a operação de hemodiálise para a empresa DaVita, transferindo equipamentos e insumos. Os pacientes relataram falhas na transição do serviço.", "titulo_pt": "BP terceiriza hemodiálise à DaVita; pacientes relatam problemas na transição", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 60576, "titulo": "A Geração Z bebe menos? Pesquisa mostra que os boomers são os mais moderados", "url": "https://exame.com/ciencia/a-geracao-z-bebe-menos-pesquisa-mostra-que-os-boomers-sao-os-mais-moderados/", "fonte_id": "exame", "data_pub": "2026-07-19T11:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa internacional indica que a moderação no consumo de álcool se tornou uma tendência estrutural, liderada por consumidores acima dos 60 anos. A geração Z não demonstra um comportamento diferenciado nesse aspecto em comparação com outras gerações mais velhas.", "titulo_pt": "A Geração Z bebe menos? Estudo mostra que os adultos mais velhos são os mais moderados", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 59942, "titulo": "A jovem que se recusa a abandonar os escombros onde estão os corpos de seus familiares após terremotos na Venezuela: 'Se sobrevivi, foi para encontrá-los'", "url": "https://www.bbc.com/portuguese/articles/czdm196m375o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-19T09:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Lorena Laya encontrou os restos mortais de sua madrasta e irmã mais nova após dois semanas dos terremotos na Venezuela. Ela continua buscando os corpos de seu pai e irmão em La Guaira.", "titulo_pt": "A jovem que se recusa a abandonar os escombros onde estão os corpos de seus familiares após terremotos na Venezuela: 'se sobrevivi, foi para encontrá-los'", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 59913, "titulo": "Armazéns Solidários superam meio milhão de atendimentos no 1º semestre", "url": "https://www.metropoles.com/conteudo-especial/armazens-solidarios", "fonte_id": "metropoles", "data_pub": "2026-07-19T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O programa de armazéns solidários da Prefeitura de São Paulo atendeu a mais de meio milhão de famílias de baixa renda no primeiro semestre, fornecendo alimentos saudáveis e nutritivos.", "titulo_pt": "Armazéns Solidários superam meio milhão de atendimentos no 1º semestre", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 59968, "titulo": "Férias e telas: entenda quando o lazer pode virar um problema para crianças", "url": "https://www.cnnbrasil.com.br/saude/ferias-e-telas-entenda-quando-o-lazer-pode-virar-um-problema-para-criancas/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T08:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Especialistas alertam que o uso prolongado de dispositivos eletrônicos durante as férias pode afetar a saúde física, mental e emocional das crianças. O excesso                 const tit = n.titulo_pt || n.titulo;

                return `<div class="item" data-flag-url="${esc(n.url)}">
