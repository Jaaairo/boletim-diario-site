letamente corantes têxteis da água em 90 minutos. O equipamento é capaz de decompor moléculas de corante persistente.", "titulo_pt": "Cientistas russos criam reator que remove corantes da água em 90 minutos", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 63782, "titulo": "NASA Sets Briefings for SpaceX Crew-13 Mission to Space Station", "url": "https://www.nasa.gov/news-release/nasa-sets-briefings-for-spacex-crew-13-mission-to-space-station/", "fonte_id": "nasa_news", "data_pub": "2026-07-20T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA e seus parceiros irão discutir a missão de rotação de tripulantes para a Estação Espacial Internacional durante duas conferências de imprensa no dia 3 de agosto, às 12h EDT. A liderança da missão fornecerá uma visão geral da missão Crew-13 da NASA e SpaceX, seguida por entrevistas com os membros da tripulação.", "titulo_pt": "NASA agendará conferências sobre missão Crew-13 para estação espacial", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 63783, "titulo": "NASA, GE Aerospace Work Enables Hybrid-Electric Flight Demonstration", "url": "https://www.nasa.gov/directorates/rtmd/nasa-ge-hybrid-electric-flight/", "fonte_id": "nasa_news", "data_pub": "2026-07-20T18:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um avião equipado com um motor híbrido-eletrico de megawatt desenvolvido em colaboração entre a NASA e a GE Aerospace realizou voos durante o Farnborough International Air Show no Reino Unido. Este teste demonstrativo pode informar novas gerações de sistemas de potência para aviões mais econômicos em termos de combustível.", "titulo_pt": "NASA e GE Aerospace realizam demonstração de voo com motor híbrido-eletrico", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 63784, "titulo": "New NASA Earth Missions Gear Up to Start Science Flights", "url": "https://science.nasa.gov/earth/new-nasa-earth-missions-gear-up-to-start-science-flights/", "fonte_id": "nasa_news", "data_pub": "2026-07-20T18:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A primeira das seis novas campanhas aéreas da NASA está programada para começar suas operações científicas este verão. Essa missão será o ponto de partida para uma série de estudos ambientais a partir de plataformas aéreas.", "titulo_pt": "Primeira missão aérea da NASA prepara-se para iniciar operações científicas", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 63251, "titulo": "Photos: 50 Years Since Viking 1 Landed on Mars", "url": "https://www.theatlantic.com/photography/2026/07/photos-50-years-since-viking-1-landed-on-mars/688001/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-07-20T17:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 20 de julho de 1976, o Viking 1, a primeira aterrisagem bem-sucedida na superfície do planeta Marte, pousou no planeta vermelho. O programa Viking da NASA enviou dois conjuntos de orbitadores e landers para Marte entre 1976 e 1982, coletando uma quantidade significativa de dados e imagens.", "titulo_pt": "Fotos: 50 anos desde que o Viking 1 aterrisse no marte", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 63770, "titulo": "Pompeii’s survivors shine in a new documentary series", "url": "https://www.sciencenews.org/article/pompeii-documentary-tom-hiddleston", "fonte_id": "science_news", "data_pub": "2026-07-20T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo documentário, apresentado pelo ator Tom Hiddleston, mistura fatos e ficção para trazer três romanos antigos reais à vida.", "titulo_pt": "Sobreviventes de pompeia ganham vida em nova série documental", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 63204, "titulo": "Antibiotic-resistant bacteria increasingly leaving children vulnerable to common infections, global study finds", "url": "https://www.theguardian.com/australia-news/2026/jul/21/antibiotic-resistant-bacteria-increasingly-leaving-children-vulnerable-to-common-infections-global-study-finds", "fonte_id": "guardian_world", "data_pub": "2026-07-20T16:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa global que abrange 82 países encontrou que a resistência antimicrobiana aumentou em todas as regiões entre 2004 e 2022. O caso de Harry Booth, um adolescente australiano com doenças renais, ilustra como essa resistência está deixando crianças mais vulneráveis a infecções comuns.", "titulo_pt": "Bactérias resistentes a antibióticos estão tornando as crianças mais suscetíveis a infecções comuns, mostra estudo global", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 63785, "titulo": "From Hampton to Mars: How NASA Langley Helped Land on the Red Planet", "url": "https://www.nasa.gov/general/from-hampton-to-mars-how-nasa-langley-helped-land-on-the-red-planet/", "fonte_id": "nasa_news", "data_pub": "2026-07-20T15:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Fazem 50 anos que os landers Viking 1 e 2 da NASA realizaram o primeiro pouso bem-sucedido na superfície do planeta Marte, iniciando uma nova era de exploração planetária. Trabalhadores da NASA Langley Research Center em Hampton, Virgínia, lideraram com eficiência e expertise técnica para transformar um projeto ambicioso em uma missão que revolucionou nossa compreensão do planeta vermelho.", "titulo_pt": "De Hampton até marte: como a NASA Langley contribuiu para o pouso no planeta vermelho", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 63786, "titulo": "Our First View of the Surface of Mars", "url": "https://www.nasa.gov/image-article/our-first-view-of-the-surface-of-mars/", "fonte_id": "nasa_news", "data_pub": "2026-07-20T15:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 20 de julho de 1976, às 5h12 da manhã (PDT), o Viking 1 aterrizou com sucesso na superfície de Marte. Quarenta minutos depois, os primeiros imagens do planeta foram recebidas no Laboratório de Propulsão a Jato da NASA.", "titulo_pt": "Nossa primeira vista da superfície de marte", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 63738, "titulo": "Inside the race to spot wildfires before they spiral out of control", "url": "https://www.scientificamerican.com/article/inside-the-race-to-spot-wildfires-before-they-spiral-out-of-control/", "fonte_id": "scientific_american", "data_pub": "2026-07-20T15:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Detectar incêndios florestais antes que eles se expandam pode salvar incontáveis vidas anualmente. Após décadas de desenvolvimento tecnológico, isso pode finalmente se tornar possível.", "titulo_pt": "Dentro da corrida para detectar incêndios florestais antes que eles saiam de controle", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 62727, "titulo": "Arqueólogos descobrem ruínas maias na península mexicana de Yucatán", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/arqueologos-descobrem-ruinas-maias-na-peninsula-mexicana-de-yucatan.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-20T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Arqueólogos encontraram ruínas maias na península de Yucatán, no México, após varreduras aéreas e uma exploração pessoal que envolveu caminhadas por trilhas florestais.", "titulo_pt": "Arqueólogos descobrem ruínas maias na península mexicana de Yucatán", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 63771, "titulo": "AI ‘ghosts’ can comfort mourners — even when the bots get the facts wrong", "url": "https://www.sciencenews.org/article/ai-ghosts-grief-facts-wrong-chatbot", "fonte_id": "science_news", "data_pub": "2026-07-20T15:00:00Z", "idioma": "en", "provavel_dup rca de 1.800 residentes foram evacuadas de comunidades pouco povoadas. O fumaça dos incêndios está persistindo em algumas partes dos Estados Unidos.", "titulo_pt": "Incêndios no ontário expandem-se com fumaça persistente nos EUA", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 62767, "titulo": "Brasil avança na corrida global para produção de combustível sustentável de aviação", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/brasil-avanca-na-corrida-global-para-producao-de-combustivel-sustentavel-de-aviacao.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-21T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A empresa Acelen, apoiada pelo fundo árabe Mubadala, firmou um acordo para comprar óleo de soja com o objetivo de produzir combustível sustentável de aviação em um projeto localizado na Bahia. O investimento previsto é de aproximadamente R$ 15 bilhões.", "titulo_pt": "Brasil avança na corrida global para produção de combustível sustentável de aviação", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 63564, "titulo": "Sri Lanka deploys military drones to fight worst dengue outbreak in almost a decade", "url": "https://www.scmp.com/news/asia/south-asia/article/3361274/sri-lanka-deploys-military-drones-fight-worst-dengue-outbreak-almost-decade?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-21T01:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sri Lanka está enfrentando a pior epidemia de dengue em quase uma década, com 53 mortes e mais de 76.000 infecções. O país está utilizando drones da força aérea e forças militares para identificar criadouros do mosquito transmissor da doença, além de intensificar inspeções domiciliárias e em locais públicos.", "titulo_pt": "Sri Lanka emprega drones militares na luta contra pior epidemia de dengue em quase uma década", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 62883, "titulo": "Adutora se rompe e causa vazamento na zona sul de São Paulo", "url": "https://www.metropoles.com/sao-paulo/adutora-se-rompe-e-causa-vazamento", "fonte_id": "metropoles", "data_pub": "2026-07-21T01:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um rompimento de adutora ocorreu na zona sul de São Paulo, no bairro do Grajaú. A Sabesp informou que o incidente não está relacionado a suas operações e acredita que tenha sido causado por uma obra realizada por terceiros.", "titulo_pt": "Adutora rompe e causa vazamento na zona sul de São Paulo", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 63163, "titulo": "Temporal: daños en la agricultura, viviendas y OOPP suben a US$400 millones, y se suman comercio y pequeña minería", "url": "https://www.latercera.com/pulso/noticia/temporal-danos-en-la-agricultura-viviendas-y-oopp-suben-a-us400-millones-y-se-suman-comercio-y-pequena-mineria/", "fonte_id": "la_tercera", "data_pub": "2026-07-21T01:07:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O biministro de Obras Públicas e Transportes, Louis de Grange, estimou que os danos na região de Coquimbo ultrapassariam vários cientos de milhões de dólares. Além disso, o ministro de Hacienda, Jorge Quiroz, declarou que recursos já estão disponíveis para auxiliar as áreas afetadas e que será determinado quanto será reatribuído ou adicionado como recurso novo.", "titulo_pt": "Temporal: danos na agricultura, casas e OOPP somam quase 400 milhões de dólares, com comercio e mineração pequena incluídos", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 62910, "titulo": "Rio Grande do Sul registra caso de gripe aviária em criação de subsistência", "url": "https://www.cnnbrasil.com.br/agro/rio-grande-do-sul-registra-caso-de-gripe-aviaria-em-criacao-de-subsistencia/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-21T00:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Rio Grande do Sul registrou um caso de gripe aviária em uma criação de subsistência. O país manteve seu reconhecimento internacional após o incidente, que ocorreu em maio de 2025.", "titulo_pt": "Rio Grande do Sul registra caso de gripe aviária em criação de subsistência", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 63355, "titulo": "In southern Lebanon, at the Secours populaire hospital in Nabatieh, caregivers strive to overcome the traumas of war", "url": "https://www.lemonde.fr/en/international/article/2026/07/21/in-southern-lebanon-at-the-secours-populaire-hospital-in-nabatieh-caregivers-strive-to-overcome-the-traumas-of-war_6755669_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-20T23:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Profissionais de saúde em um hospital da Secours populaire, em Nabatieh, no sul do Líbano, recebem orientação individual e terapia em grupo após quatro meses de conflito e uma situação de segurança instável. Médicos sem Fronteiras oferecem esses serviços.", "titulo_pt": "No sul do líbano, profissionais de saúde lutam para superar as traumas da guerra no hospital Secours populaire em Nabatieh", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 63790, "titulo": "Q&A: What the EU’s carbon market review means for climate action", "url": "https://www.carbonbrief.org/qa-what-the-eus-carbon-market-review-means-for-climate-action/", "fonte_id": "carbon_brief", "data_pub": "2026-07-20T16:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Comissão Europeia apresentou novos planos para reduzir emissões através da revisão do mercado de carbono da UE. O post Q&A: O que a revisão do mercado de carbono da UE significa para as ações climáticas apareceu primeiro no Carbon Brief.", "titulo_pt": "Perguntas e respostas: o que A revisão do mercado de carbono da ue significa para as ações climáticas", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 63384, "titulo": "Rare 48C heatwave forces Uzbekistan to adapt to extreme temperatures", "url": "http://www.euronews.com/2026/07/20/rare-48c-heatwave-forces-uzbekistan-to-adapt-to-extreme-temperatures", "fonte_id": "euronews", "data_pub": "2026-07-20T15:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As autoridades reduziram o serviço de metrô, limitaram veículos pesados e fecharam creches durante uma onda de calor incomum que atingiu partes do Uzbekistão com temperaturas de 48°C.", "titulo_pt": "Inusitada onda quente de 48C força o uzbekistão a adaptar-se a temperaturas extremas", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 63002, "titulo": "Crianças e adolescentes na rota do El Niño", "url": "https://www.jota.info/opiniao-e-analise/artigos/criancas-e-adolescentes-na-rota-do-el-nino", "fonte_id": "jota", "data_pub": "2026-07-20T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Sem uma política nacional de adaptação climática para escolas, secas, enchentes e ondas de calor continuarão a comprometer direitos fundamentais das crianças e adolescentes. O texto destaca a falta de um plano estratégico do governo nesse aspecto.", "titulo_pt": "Crianças e adolescentes na rota do El Niño", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 62235, "titulo": "Lluvias provocan millonarios daños a la agricultura: paltos y cítricos serían los más afectados", "url": "https://www.latercera.com/pulso/noticia/lluvias-provocan-millonarios-danos-a-la-agricultura-paltos-y-citricos-serian-los-mas-afectados/", "fonte_id": "la_tercera", "data_pub": "2026-07-20T11:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Segundo Rodrigo Gil, gerente do área de Campos Agrícolas de Colliers, os danos totais causados pelas chuvas superam US$200 milhões. Apesar dos estragos nas infraestruturas e alguns cultivos, a precipitação é vista como positiva por alguns gremios, pois alivia uma sequia prolongada.", "titulo_pt": "Chuvas causam danos milionários à agricultura: paltos e cítricos seriam os mais afetados", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 62193, "titulo": "It’s no longer illegal to destroy the one thing endangered species need most to survive", "url": "https://www.vox.com/climate/496053/trump-endangered-species-act-harm-rule", "fonte_id": "vox", "data_pub": "2026-07-20T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Adestramento de animais em áreas urbanizadas é o maior perigo para espécies endêmicas nos Estados Unidos e em todo o mundo. A lei americana que protege essas espécies, a Lei de Especies Ameaçadas, foi criada justamente para combater essa destruição de habitats.", "titulo_pt": "Não é mais ilegal destruir o que as espécies ameaçadas precisam mais para sobreviver", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 62597, "titulo": "UNESCO officials call for urgent global awakening to protect heritage sites from climate change, conflicts", "url": "https://en.yna.co.kr/view/AEN20260720008400315", "fonte_id": "yonhap_news", "data_pub": "2026-07-20T07:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Autoridades da UNESCO chamaram para uma ação urgente global para proteger os sítios culturais diante do impacto das mudanças climáticas e conflitos. O apelo ocorreu durante uma reunião em Busan, Coreia do Sul.", "titulo_pt": "Autoridades da UNESCO pedem alerta global urgente para proteger patrimônios devido às mudanças climáticas e conflitos", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 62043, "titulo": "35% dos ativos físicos de grandes empresas estão expostos a desastres climáticos", "url": "https://exame.com/bussola/35-dos-ativos-fisicos-de-grandes-empresas-estao-expostos-a-desastres-climaticos/", "fonte_id": "exame", "data_pub": "2026-07-20T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um levantamento da C-More indica que 35% dos ativos físicos de grandes empresas no Brasil estão expostos a desastres climáticos. Eventos climáticos já representam um risco direto para operações, investimentos e cadeias produtivas no país.", "titulo_pt": "35% Dos ativos físicos das grandes empresas brasileiras estão expostos a desastres climáticos", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 62488, "titulo": "Extreme heat grips Japan as rainy season officially ends in Tokyo", "url": "https://www.japantimes.co.jp/news/2026/07/20/japan/heat-rainy-season-end/", "fonte_id": "japan_times", "data_pub": "2026-07-20T06:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As temperaturas superaram os 35 graus Celsius em grande parte do país na segunda-feira. A estação chuvosa oficialmente terminou em Tóquio.", "titulo_pt": "Calor extremo assola Japão à medida que a estação chuvosa chega ao fim em tóquio", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 62056, "titulo": "Falta de combustível trava expansão da energia nuclear — e esta empresa quer ocupar esse espaço", "url": "https://exame.com/invest/mercados/falta-de-combustivel-trava-expansao-da-energia-nuclear-e-esta-empresa-quer-ocupar-esse-espaco/", "fonte_id": "exame", "data_pub": "2026-07-20T05:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A empresa Standard Nuclear fabrica um insumo crucial para a nova geração de reatores nucleares, mas ainda opera no prejuízo enquanto aumenta sua capacidade produtiva.", "titulo_pt": "Falta de combustível impede expansão da energia nuclear — e esta empresa busca aproveitar essa oportunidade", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 63561, "titulo": "In Indonesia’s island paradise, slavery remains a daily reality", "url": "https://www.scmp.com/news/asia/southeast-asia/article/3361278/indonesias-island-paradise-slavery-remains-daily-reality?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-21T02:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Na ilha indonésia de Sumba, perto das praias turísticas de Bali, a escravidão continua sendo uma realidade diária. As pessoas nascem em situação de servidão e trabalham sem remuneração, são transferidas no casamento e podem sofrer violência por parte dos senhores.", "titulo_pt": "Na ilha paradisíaca da indonésia, a escravidão é uma realidade cotidiana", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 63568, "titulo": "Chinese teenager lies to parents about holiday to secretly help flood victims in Guangxi", "url": "https://www.scmp.com/news/people-culture/trending-china/article/3361101/chinese-teenager-lies-parents-about-holiday-secretly-help-flood-victims-guangxi?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-21T01:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um adolescente de 18 anos de Shanghai, Wu Yulun, enganou seus pais ao dizer que ia passar o feriado. Na verdade, ele viajou com um amigo para uma região afetada por inundações no sudoeste da província de Guangxi para participar dos esforços de ajuda.", "titulo_pt": "Adolescente chinês engana pais para ajudar vítimas de inundações em Guangxi", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 63049, "titulo": "Gobierno decreta estado de catástrofe en Región de Coquimbo; Quiroz asegura que “hay recursos” para reconstrucción postemporal, e imputado por homicidio de cabo Nain queda en prisión preventiva", "url": "https://www.ciperchile.cl/2026/07/20/radar-20-07-26/?utm_source=rss&utm_medium=rss&utm_campaign=radar-20-07-26", "fonte_id": "ciper_chile", "data_pub": "2026-07-21T00:08:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O governo declarou estado de catástrofe na Região de Coquimbo. O responsável afirmou que há recursos para a rec const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml(topico) : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml(audioKey) {
  const audio = D.audio && D.audio.sumarios && D.audio.sumarios[audioKey];
  if (!audio || !audio.arquivo) return "";
  const src = audio.arquivo + (audio.versao ? "?v=" + encodeURIComponent(audio.versao) : "");
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta" data-audio-src="${esc(src)}" data-audio-key="${esc(audioKey)}">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";

  const totalArtigos = (d.artigos || []).length;

    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml("destaque")}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — audio pre-renderizado por Piper
(function () {
  var player = document.createElement('audio');
  player.preload = 'auto';
  player.setAttribute('playsinline', '');
  document.body.appendChild(player);
  var barAtual = null;

  function _resetBar(bar) {
    if (!bar) return;
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  function _setTocando(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _setPausado(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _tituloAudio(bar) {
    var h = bar.previousElementSibling;
    while (h && !/^H2$/i.test(h.tagName || '')) h = h.previousElementSibling;
    return h ? (h.innerText || h.textContent || 'Boletim Diario').trim() : 'Boletim Diario';
  }

  function _mediaSession(bar) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: _tituloAudio(bar),
      artist: 'Boletim Diario',
      album: 'Leitura dos sumarios',
    });
    navigator.mediaSession.setActionHandler('play', function () { player.play().catch(function () {}); });
    navigator.mediaSession.setActionHandler('pause', function () { player.pause(); });
    navigator.mediaSession.setActionHandler('stop', function () { player.pause(); player.currentTime = 0; });
  }

  window.ttsOuvir = function (btn) {
    var bar = btn.closest('.tts-bar');
    var src = bar && bar.dataset.audioSrc;
    if (!src) return;
    if (barAtual && barAtual !== bar) _resetBar(barAtual);
    barAtual = bar;
    if (player.src !== new URL(src, window.location.href).href) {
      player.src = src;
      player.currentTime = 0;
    } else {
      player.currentTime = 0;
    }
    _mediaSession(bar);
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _resetBar(bar);
    });
  };

  window.ttsPausar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    _setPausado(bar);
  };

  window.ttsContinuar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _setPausado(bar);
    });
  };

  window.ttsPar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    player.currentTime = 0;
    _resetBar(bar);
    if (barAtual === bar) barAtual = null;
  };

  player.addEventListener('ended', function () { _resetBar(barAtual); barAtual = null; });
  player.addEventListener('error', function () { _resetBar(barAtual); barAtual = null; });
  window.addEventListener('beforeunload', function () { player.pause(); });
})();
</script>
