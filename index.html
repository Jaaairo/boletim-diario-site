<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: none; border: 1px solid var(--border); border-radius: 4px;
             color: var(--texto2); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { border-color: var(--acento); color: var(--texto); }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 30/06/2026 09:41 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">

    <label for="inp-senha">Senha</label>

</div>

<div class="modal-overlay" id="modal-flag">

</div>

<div class="modal-overlay" id="modal-relatorio">

    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "30/06/2026 09:41", "stats": {"noticias_novas": 255, "resumos_gerados": 292}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O Brasil terá um presidente com alto nível de rejeição e sem maioria no Congresso, conforme uma pesquisa do BTG/Nexus indica. Além disso, o Senado deve votar uma Proposta de Emenda à Constituição (PEC) que beneficia agentes da saúde, gerando um impacto orçamentário estimado em R$ 28 bilhões na Previdência. O projeto aumentará o desgaste político do governo e intensificará a pressão sobre as contas públicas. Outro assunto importante é a Lei Falcão, que completou 50 anos, limitando a propaganda eleitoral durante a ditadura militar. Além disso, o Conselho Nacional de Justiça (CNJ) teve novos conselheiros negros, mas enfrenta problemas com a diversidade. A Procuradoria-Geral da República também acionou a PGR para proibir influenciadores como Paulo Figueiredo de se comunicar publicamente após ataques ao voto feminino.", "mundo": "Keiko Fujimori, filha do ex-presidente peruano Alberto Fujimori, condenado por corrupção e crimes contra a humanidade, venceu as eleições presidenciais no Peru com uma margem estreita sobre o candidato da esquerda Roberto Sánchez. Esta vitória representa uma importante vitória para o direito latino-americano ressurgente. Em outro desenvolvimento, o ministro da Defesa do Japão, Nobuo Kishi (Ahn Gyu-back é um nome errado), apoiou a criação de uma academia militar unificada como parte fundamental das reformas futuras. O Japão também planeja investir 150 bilhões de ienes no projeto satelital da Rakuten com o objetivo de desenvolver uma rede nacional e reduzir a dominância do Starlink no mercado. Além disso, um empresário chinês condenado por fraude nos Estados Unidos, Guo Wengui, foi sentenciado a 30 anos de prisão.\n\nA geopolítica global enfrenta diversos desafios e tensões. Em Mônaco, a procuradoria afirma que um ataque com bomba foi uma tentativa de assassinato, não terrorismo, sugerindo uma possível motivação política ou criminal. Na América Latina, especialistas apontam que o governo dos Estados Unidos pretende criar tensões durante as eleições no Brasil por medo da influência chinesa, refletindo a crescente rivalidade entre os dois países na região. A Coreia do Sul enfrenta restrições de exportação de aço impostas pela União Europeia, enquanto a Coreia do Norte continua com atividades suspeitas em seus portos, sugerindo o envolvimento em negócios ilícitos como o comércio de carvão. As tensões no Estreito de Ormuz persistem, com o Irã aumentando as pressões antes das próximas negociações sobre controle do estreito. Além disso, a Rússia enfrenta crescentes dificuldades econômicas devido à guerra na Ucrânia, enquanto o Japão planeja revisar sua política Arctic em face da crescente importância geopolítica da região.", "economia": "A economia global enfrenta diversos desafios e avanços neste momento. A União Europeia reduziu pela metade a quantidade de aço importado sem tarifas, mas aumentou os limites para 13 parceiros comerciais, incluindo o Reino Unido, em uma medida visando reduzir a entrada de aço chinês barato. No Japão, haverá um aumento de preços em 2.566 itens de alimentos em julho, devido à elevação nos custos de embalagens e matérias-primas. Na Coreia do Sul, o won cedeu mais contra o dólar americano devido à continuidade da venda de ações locais por investidores estrangeiros, enquanto as ações sul-coreanas fecharam com alta de 0,97%, impulsionadas pelos ganhos no setor tecnológico. No Brasil, há a possibilidade de expansão da área dedicada ao cultivo de sorgo em caso de El Niño intenso, o que pode afetar a plantação da soja e do milho safrinha. A Receita Federal pagará R$ 16 bilhões em restituições do Imposto de Renda 2026 a 9,6 milhões de contribuintes nesta terça-feira (30). Além disso, as fusões e aquisições na indústria elétrica dos Estados Unidos estão impulsionadas pela inteligência artificial, enquanto o plasma brasileiro está sendo coletado para reduzir a dependência internacional de medicamentos estratégicos. A partir de julho, os novos CNPJs poderão incluir letras e números, aplicando-se apenas para novas inscrições. Finalmente, as autoridades sul-coreanas venderam uma quantidade líquida de US$ 13,6 bilhões no primeiro trimestre para estabilizar o mercado de câmbio, enquanto o investimento direto sul-coreano no exterior aumentou 36% no mesmo período.", "tecnologia": "O presidente da Coreia do Sul, Lee Jae Myung, visitou Gwangju para promover o sul do país como um novo hub de inteligência artificial (IA), apoiado por investimentos massivos em chips e centros de dados. A Samsung Group e o SK Group planejam investir conjuntamente 896 trilhões de wones na região, visando transformá-la no epicentro da IA. Paralelamente, a China lançou sete padrões nacionais para a interconexão de agentes de IA, estabelecendo um quadro unificado sobre como esses agentes se identificam e colaboram. Além disso, empresas brasileiras estão integrando estratégias de inteligência artificial, como a Templo, que entrou na rede global Claude Partner Network para auxiliar organizações na integração da IA.", "ciencia": "A Coreia do Sul adiou o lançamento de um foguete espacial a propelente sólido devido às preocupações com a segurança, conforme relatório da Yonhap News. Em outro desenvolvimento científico, a China criou um sistema para desalinizar água do mar sem energia elétrica, uma inovação que promete estabilidade ecológica e financeira, informado pelo Exame. O Ebola se expandiu para a quarta província da República Democrática do Congo, afetando agora todo o nordeste do país, onde vivem aproximadamente 15 milhões de pessoas, com 360 mortes registradas até o momento, segundo relatório do Korea Herald. Em um avanço tecnológico, a LG Chem recebeu aprovação da FDA para iniciar estudos clínicos de um medicamento anticâncer que alvo uma mutação TP53 Y220C encontrada em 1 a 3% dos pacientes com câncer, também publicado pelo Korea Herald. Além disso, a Kakao Bank teve suas pesquisas sobre segurança de inteligência artificial reconhecidas globalmente, com quatro artigos sendo aceitos em conferências importantes relacionadas à IA este ano, conforme informado pelo Korea Herald. Finalmente, o Centro de Controle e Prevenção de Doenças (CDC) nos Estados Unidos anunciou que novos líderes prometeram reforçar a equipe esquelética restante após cortes no quadro do CDC, em um movimento para combater as preocupações com a segurança dos funcionários, informado pelo Japan Times.", "cultura": "Antes do sucesso da animação 'Moana' de 2016 e sua versão live-action remasterizada, existia um filme mudo de 1926 também chamado 'Moana'. Este filme pioneiro criou um novo gênero cinematográfico e serviu como inspiração para a produção moderna. No entanto, o BBC News anunciou que os repórteres deverão priorizar plataformas de mídia social como TikTok e Instagram acima de canais tradicionais como TV e rádio, incluindo o programa 'Today' da Radio 4, levantando preocupações sobre a relevância do programa em relação à vida nacional. A arquiteta italiana Lina Bo Bardi será o tema de uma exposição em Xangai, China, a partir do final de julho, apresentando croquis, maquetes e móveis da designer, destacando diferentes aspectos de seu trabalho. Além disso, um novo exposição traz à tona o caminho inusitado das cartas de tarô desde a Itália do século XV até sua associação com o ocultismo atual, passando por mãos de boêmios como Pamela Colman Smith e mistificadores como Aleister Crowley, antes de se tornar mainstream.", "sociedade": "A greve dos rodoviários no Rio de Janeiro está em seu segundo dia e já está causando congestionamentos nas estações de ônibus. Em São Paulo, intensas chuvas deixaram 523 pessoas desabrigadas e 2.500 desalojadas em Pernambuco. Na Venezuela, o sistema de saúde enfrenta dificuldades após os terremotos, conforme informou a Organização Mundial da Saúde (OMS). Um estudo da Fiocruz revela que metade das jovens brasileiras começa a vivenciar uma jornada dupla ou tripla a partir dos 18 anos, acumulando trabalho remunerado, doméstico e estudos. O governo do Brasil opera um hospital de campanha na Venezuela, em La Guaira, para atender às vítimas dos terremotos.", "meio_ambiente": "A Europa enfrenta sua pior ola de calor desde registros, com novos recordes sendo estabelecidos na região leste. A Slováquia registrou uma temperatura recorde de 41 graus Celsius em Turna nad Bodvou, enquanto a Ucrânia teve que implementar cortes de energia para lidar com o calor extremo. Na América do Sul, o sul do Brasil enfrenta temporais e tem alertas de perigo para chuva forte, trovoadas e temporais severos. Em Santa Catarina, a Defesa Civil emitiu um alerta para chuvas persistentes que podem causar rajadas de vento, raios, alagamentos e enxurradas. Além disso, a Anvisa proibiu a venda e uso do querosene Petrus e determinou seu recolhimento devido à falta da Autorização de Funcionamento de Empresa (AFE) necessária para produção de saneantes.", "direitos_humanos": "Um grupo de advocacy baseado em Bangkok relatou 56 prisões políticas no Vietnã no ano passado, o maior número desde 2018, indicando um novo 'válvula de repressão', conforme informado por uma organização dos direitos humanos. No Brasil, a Suprema Corte pode decidir sobre uma ADPF que busca revogar uma interpretação considerada um claro retrocesso social para mulheres trans no sistema de cotas de gênero nas eleições. Em Hong Kong, autoridades propuseram reformas abrangentes das leis sobre crimes sexuais, incluindo a definição de estupro e a idade mínima consentida em 16 anos. Em Seul, um grupo de ativistas pelos direitos das pessoas com deficiência anunciou que retomará as manifestações na cidade nesta semana. Além disso, há suspeitas de que assistentes sociais tenham ignorado evidências claras no caso do bebê Preston por medo de homofobia, e uma regra oficial do DHS nos Estados Unidos determina quais indivíduos devem se registrar e fornecer suas impressões digitais para evitar multas ou prisão. Finalmente, advogados estão pleiteando que trabalhadores migrantes tenham acesso às regras sobre bullying no trabalho em Taiwan."}, "resumo_do_dia": {"politica_nacional": [{"id": 27032, "titulo": "Senado vota pauta-bomba com impacto de R$ 30 bi sobre as contas públicas", "url": "https://veja.abril.com.br/economia/senado-vota-pauta-bomba-com-impacto-de-r-30-bi-sobre-as-contas-publicas/", "fonte_id": "veja", "data_pub": "2026-06-30T11:04:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Senado agendou para a terça-feira a votação de uma Proposta de Emenda à Constituição (PEC) que estabelece aposentadoria especial para agentes de saúde. A medida tem impacto financeiro estimado em R$ 30 bilhões nas contas públicas.", "titulo_pt": "Senado vota PEC de aposentadoria especial com impacto de R$ 30 bi", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27016, "titulo": "País terá presidente com alta rejeição e sem maioria no Congresso", "url": "https://veja.abril.com.br/coluna/jose-casado/pais-tera-presidente-com-alta-rejeicao-e-sem-maioria-no-congresso/", "fonte_id": "veja", "data_pub": "2026-06-30T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil terá um presidente com alta rejeição e sem maioria no Congresso. Flávio Bolsonaro se consolida como líder em rejeição, estatisticamente empatado com Lula.", "titulo_pt": "País terá presidente com alta rejeição e sem maioria no Congresso", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27031, "titulo": "Valdemar tenta conter crise entre Michelle e Flávio Bolsonaro, mas encontra resistência", "url": "https://g1.globo.com/politica/blog/andreia-sadi/post/2026/06/30/valdemar-crise-michelle-flavio-bolsonaro-resistencia.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Valdemar Costa Neto, presidente do PL, planeja conversar com Michelle Bolsonaro na tentativa de aliviar a tensão entre ela e o senador Flávio Bolsonaro. Michelle permanecia irredutível até então, e circula a possibilidade dela deixar a política para se dedicar à família.", "titulo_pt": "Valdemar tenta resolver crise entre Michelle e Flávio Bolsonaro, mas encontra resistência", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 26836, "titulo": "\"Defeca pela boca\", diz Thronicke após Figueiredo atacar voto feminino", "url": "https://www.metropoles.com/brasil/defeca-pela-boca-diz-thronicke-apos-figueiredo-atacar-voto-feminino", "fonte_id": "metropoles", "data_pub": "2026-06-30T10:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A senadora Thronicke acionou a Procuradoria-Geral da República (PGR) para proibir o influenciador Paulo Figueiredo de se comunicar publicamente via redes sociais e outros meios. Figueiredo havia atacado o voto feminino.", "titulo_pt": "Thronicke denuncia Figueiredo à PGR por ataques ao voto feminino", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 26841, "titulo": "PCERJ mira braço financeiro do ADA que movimenta R$ 500 mil por semana", "url": "https://www.metropoles.com/colunas/mirelle-pinheiro/pcerj-mira-braco-financeiro-do-ada-que-movimenta-r-500-mil-por-semana", "fonte_id": "metropoles", "data_pub": "2026-06-30T10:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As autoridades identificaram um esquema financiado pelo ADA envolvendo 14 pessoas, que movimentam em média R$ 5 mil por dia cada. O braço financeiro do ADA está gerando aproximadamente R$ 500 mil por semana.", "titulo_pt": "PCERJ alvo no braço financeiro do ADA com movimentação de R$ 500 mil por semana", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 26825, "titulo": "PSD deve anunciar Kassab como vice de Caiado nesta quarta", "url": "https://g1.globo.com/economia/blog/ana-flor/post/2026/06/30/psd-deve-anunciar-kassab-como-vice-de-caiado-nesta-quarta.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T10:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O PSD deve anunciar Gilberto Kassab como vice de Ronaldo Caiado na chapa para as eleições presidenciais de 2026. O anúncio está previsto para acontecer em Brasília nesta quarta-feira (1º).", "titulo_pt": "PSD deve confirmar Kassab como vice de Caiado para 2026 nesta quarta", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 26419, "titulo": "Tese de que eficácia de EPI não afasta adicional por ruído predomina no Carf", "url": "https://www.jota.info/tributos/tese-de-que-eficacia-de-epi-nao-afasta-adicional-por-ruido-predomina-no-carf", "fonte_id": "jota", "data_pub": "2026-06-30T09:42:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O entendimento do Carf (Conselho Administrativo de Recursos Fiscais) sobre a eficácia dos Equipamentos de Proteção Individual (EPIs) e o adicional por ruído se baseia no Tema 555 do STF (Supremo Tribunal Federal), que trata da caracterização do tempo de serviço especial quando fornecidos EPIs.", "titulo_pt": "Entendimento Carf sobre eficácia de EPIs e adicional por ruído", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 26276, "titulo": "Feminicídios caem em maio em SP, mas acumulado do ano segue em alta", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/feminicidios-caem-em-maio-em-sp-mas-acumulado-do-ano-segue-em-alta.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-30T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em maio de 2026, ocorreram 18 casos de feminicídio no estado de São Paulo, um decréscimo em relação aos 26 registros do mesmo mês em 2025. No entanto, o acumulado do ano até maio registra uma tendência de aumento.", "titulo_pt": "Feminicídios diminuem em maio em SP, mas acumulado do ano segue em alta", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 26353, "titulo": "Senado deve votar hoje PEC de agentes da saúde com impacto de R$ 28 bilhões", "url": "https://www.cnnbrasil.com.br/politica/senado-deve-votar-hoje-pec-de-agentes-da-saude-com-impacto-de-r-28-bilhoes/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T07:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Senado deve votar hoje a Proposta de Emenda à Constituição (PEC) que beneficia agentes da saúde, com um impacto orçamentário estimado em R$ 28 bilhões. O texto precisa ser apreciado em dois turnos e preocupa o governo por sua influência no orçamento federal.", "titulo_pt": "Senado deve votar hoje PEC de agentes da saúde com impacto de R$ 28 bilhões", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 26277, "titulo": "PL pagou R$ 600 mil a ONG que recebeu emendas de bolsonarista para fazer filme", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/pl-pagou-r-600-mil-a-ong-que-recebeu-emendas-de-bolsonarista-para-fazer-filme.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-30T07:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O diretório nacional do PL, comandado por Valdemar Costa Neto, gastou R$ 600 mil do fundo partidário para uma ONG prestar assessoria de comunicação em Minas Gerais. A entidade chamada Passos da Liberdade está produzindo um documentário sobre regimes autoritários comunistas com dinheiro de emendas parlamentares.", "titulo_pt": "PL gastou R$ 600 mil do fundo partidário para ONG que faz filme com dinheiro de emendas", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 26266, "titulo": "Justiça do Trabalho multa Ortobom em R$ 300 mil por falta de mulher na gerência", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/justica-do-trabalho-multa-ortobom-em-r-300-mil-por-falta-de-mulher-na-gerencia.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Terceira Turma do Tribunal Superior do Trabalho manteve a condenação da fabricante de colchões Ortobom a pagar uma multa de R$ 300 mil por desigualdade de gênero, que incluiu falta de mulheres na gerência.", "titulo_pt": "Justiça do Trabalho multa Ortobom em R$ 300 mil por desigualdade de gênero", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 26366, "titulo": "STF pauta para hoje análise de recurso da PGR sobre punição máxima a juízes", "url": "https://www.cnnbrasil.com.br/politica/stf-pauta-para-hoje-analise-de-recurso-da-pgr-sobre-punicao-maxima-a-juizes/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Corte Suprema Federal (STF) pautou para hoje a análise de um recurso apresentado pela Procuradoria-Geral da República (PGR) questionando uma decisão que permitiu aposentadorias compulsórias e abriu caminho para a remoção de juízes em casos graves.", "titulo_pt": "STF analisa recurso da PGR sobre punição máxima a juízes", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 26336, "titulo": "Alcolumbre pauta aposentadoria especial a agentes de saúde com impacto de R$ 28 bi na Previdência", "url": "https://exame.com/brasil/alcolumbre-pauta-aposentadoria-especial-a-agentes-de-saude-com-impacto-de-r-28-bi-na-previdencia/", "fonte_id": "exame", "data_pub": "2026-06-30T06:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente do Senado, Alcolumbre, propôs uma aposentadoria especial para agentes de saúde, que teria um impacto financeiro de R$ 28 bilhões na Previdência. A medida aumentaria o desgaste político do governo e intensificaria a pressão sobre as contas públicas.", "titulo_pt": "Alcolumbre pauta aposentadoria especial para agentes de saúde com impacto de R$ 28 bi na Previdência", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 26070, "titulo": "Trump pede que postos reduzam preço da gasolina nos EUA e faz ameaça", "url": "https://www.metropoles.com/mundo/trump-postos-reduzam-preco-gasolina-eua", "fonte_id": "metropoles", "data_pub": "2026-06-30T03:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Trump pressionou os postos a reduzirem os preços da gasolina, ameaçando grandes problemas se não ocorrer. O presidente defendeu um preço de cerca de US$ 2,50 por galão.", "titulo_pt": "Trump pede redução do preço da gasolina e faz ameaça a postos", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 26056, "titulo": "Câmara pode votar nesta terça PL da Misoginia, que equipara crime ao racismo e prevê penas maiores; entenda", "url": "https://g1.globo.com/politica/noticia/2026/06/30/camara-pode-votar-nesta-terca-pl-da-misoginia-que-equipara-crime-ao-racismo-e-preve-penas-maiores-entenda.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T03:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Câmara dos Deputados pode votar nesta terça-feira (30) o PL da Misoginia, que equipara a misoginia ao racismo e prevê penas mais severas para crimes de ódio contra mulheres. O projeto foi aprovado no Senado Federal em março e agora segue para votação na Câmara.", "titulo_pt": "Câmara pode votar nesta terça PL da Misoginia, que equipara crime ao racismo e prevê penas maiores; entenda", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 24746, "titulo": "Lei Falcão, 50, marcou mordaça da propaganda eleitoral antes do desafio das redes sociais", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/lei-falcao-50-marcou-mordaca-da-propaganda-eleitoral-antes-do-desafio-das-redes-sociais.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-30T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A lei Falcão, que completou 50 anos, limitou a propaganda eleitoral a uma lista de chamada no rádio e na televisão durante a ditadura militar. Esta medida visava restringir o avanço da oposição.", "titulo_pt": "Lei Falcão, 50, marcou mordaça da propaganda eleitoral antes do desafio das redes sociais", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 26922, "titulo": "Monaco bombing was ‘attempted assassination’, not terror attack, say prosecutors – Europe live", "url": "https://www.theguardian.com/world/live/2026/jun/30/monaco-bombing-ukraine-gerany-hungary-poland-baltics-heat-latest-news-updates", "fonte_id": "guardian_world", "data_pub": "2026-06-30T10:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Procuradores afirmam que o ataque em Mônaco foi um 'tentativa de assassinato' e não uma operação terrorista. Autoridades continuam buscando o suspeito, que está próximo à França e ao Mar do Ligúria.", "titulo_pt": "Bombing em Mônaco era tentativa de assassinato, não ataque terrorista, afirmam promotores", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 26921, "titulo": "Police units deployed across South Africa before anti-immigration marches", "url": "https://www.theguardian.com/world/2026/jun/30/south-africa-police-anti-immigrant-protests", "fonte_id": "guardian_world", "data_pub": "2026-06-30T10:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As autoridades sul-africanas mobilizaram polícias em várias cidades antes de manifestações contra imigrantes ilegais. A medida foi tomada após o medo de que possa ocorrer violência anti-imigrante, como naquele ano de 2008, quando houve roubos e 62 pessoas morreram.", "titulo_pt": "Forças policiais deslocadas em todo o país antes das marchas contra imigrantes ilegais", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 26939, "titulo": "British PM-in-waiting Burnham presents decentralization plans", "url": "https://www.lemonde.fr/en/international/article/2026/06/30/british-pm-in-waiting-burnham-presents-decentralization-plans_6755004_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-30T10:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O sucessor provável de Keir Starmer enfatizou a descentralização e a reindustrialização como suas prioridades principais. No entanto, diante das restrições orçamentárias apertadas, já existem dúvidas dentro do Partido Trabalhista sobre o espaço que ele tem para manobra.", "titulo_pt": "Sucessor do Labour apresenta planos de descentralização", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 26714, "titulo": "How Hunter Biden Won the Internet", "url": "https://www.wired.com/story/how-hunter-biden-won-the-internet/", "fonte_id": "wired", "data_pub": "2026-06-30T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Hunter Biden tem sido entrevistado por meses pela revista WIRED enquanto planejava sua volta à vida pública. Agora, ele está interagindo com trolls e o público geral.", "titulo_pt": "Como Hunter Biden Conquistou a Internet", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 26715, "titulo": "Venezuela Earthquake Destruction Revealed in New Satellite Images", "url": "https://www.wired.com/story/satellite-images-damage-caused-by-venezuela-earthquakes/", "fonte_id": "wired", "data_pub": "2026-06-30T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Imagens de satélite mostram o grau de destruição causado pelo terremoto na Venezuela e auxiliam as operações de resgate na busca por sobreviventes.", "titulo_pt": "Venezuela: destruição do terremoto revelada em novas imagens de satélite", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 26496, "titulo": "Labor’s gambling ad legislation a ‘capitulation’ to industry lobby, Liberal MP says", "url": "https://www.theguardian.com/australia-news/2026/jun/30/labors-gambling-ad-legislation-a-capitulation-to-industry-lobby-liberal-mp-says", "fonte_id": "guardian_world", "data_pub": "2026-06-30T09:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Oposição no parlamento australiano criticou as reformas propostas pelo Partido Trabalhista para regulamentar publicidade de apostas, considerando-as insuficientes. Os partidos da Coalizão, Verdes e terceiros dizem que as mudanças são frágeis e não vão além do necessário.", "titulo_pt": "Reforma das leis sobre publicidade de apostas é 'capitulação' para lobby, diz parlamentar liberal", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 26270, "titulo": "Governo Trump vai 'tensionar' eleições no Brasil por medo da China, diz especialista que mapeou direita na América Latina", "url": "https://g1.globo.com/mundo/noticia/2026/06/30/governo-trump-vai-tensionar-eleicoes-no-brasil-por-medo-da-china-diz-especialista-que-mapeou-direita-na-america-latina.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T08:49:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Regiane Bressan, especialista que mapeou a direita na América Latina, afirma que o governo dos Estados Unidos pretende tensionar as eleições no Brasil por medo da influência chinesa. A América Latina tem recentemente assistido à ascensão do movimento direitista nas presidências recém-eleitas.", "titulo_pt": "Governo Trump vai 'tensionar' eleições no Brasil por medo da China, diz especialista", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 26558, "titulo": "Venezuela earthquakes: 'The rescue workers didn't try anything. They say it's too dangerous. But we keep going'", "url": "https://www.lemonde.fr/en/international/article/2026/06/30/venezuela-earthquakes-the-rescue-workers-didn-t-try-anything-they-say-it-s-too-dangerous-but-we-keep-going_6755002_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-30T08:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Famílias de vítimas, em La Guaira, área mais afetada pelos dois terremotos, têm trabalhado ininterruptamente para resgatar parentes sob os escombros nos últimos cinco dias.", "titulo_pt": "Terremotos na Venezuela: 'As equipes de resgate não fizeram nada. Eles dizem que é muito perigoso. Mas nós continuamos'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 26747, "titulo": "S. Korea to face reduced quota under new EU steel safeguard", "url": "https://en.yna.co.kr/view/AEN20260630008600320", "fonte_id": "yonhap_news", "data_pub": "2026-06-30T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Coreia do Sul terá uma alocação reduzida de quota sob a nova salvaguarda da União Europeia para o aço. O país foi atribuído uma quota de 2,07 milhões.", "titulo_pt": "Coreia do Sul enfrentará quota reduzida sob nova salvaguarda da UE para o aço", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 26767, "titulo": "STAT+: The loophole in Trump’s obesity drug deal with Eli Lilly and Novo Nordisk", "url": "https://www.statnews.com/2026/06/30/medicare-medicaid-glp1-costs-explained-balance-out-bridge-in/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-30T08:30:00Z" veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 27011, "titulo": "Agência de mineração contrariou parecer interno e reativou alvarás abandonados por mineradora", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/agencia-de-mineracao-contrariou-parecer-interno-e-reativou-alvaras-abandonados-por-mineradora.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ANM reativou 11 alvarás de pesquisa abandonados pela mineradora australiana Slipstream Participações, devolvendo as áreas à empresa. Esta decisão contrariou o parecer jurídico interno da agência.", "titulo_pt": "Agência de mineração reativou alvarás abandonados por mineradora, contrariando parecer interno", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 26263, "titulo": "Varejo em alerta: descontos e bonificações podem sair caro", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/blogs/que-imposto-e-esse/2026/06/varejo-em-alerta-descontos-e-bonificacoes-podem-sair-caro.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "No varejo, práticas como descontos e bonificações são comuns para estimular as vendas. No entanto, a possibilidade de impacto tributário dessas estratégias ainda não é adequadamente mensurada por muitas empresas.", "titulo_pt": "Varejista em alerta: descontos e bonificações podem sair caro", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 26264, "titulo": "Grupo Trigo prevê primeiros resultados com Casa do Pão de Queijo no fim do ano", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/06/grupo-trigo-preve-primeiros-resultados-com-casa-do-pao-de-queijo-no-fim-do-ano.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Grupo Trigo, responsável pelas redes Spoleto, Koni e Gendai, espera obter os primeiros resultados da Casa do Pão de Queijo após a compra, previstos para o final de 2026. A empresa acredita que este será um ponto de inflexão para a marca.", "titulo_pt": "Grupo Trigo espera primeiros resultados da Casa do Pão de Queijo no fim de 2026", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 26500, "titulo": "EU halves duty-free steel quota but UK and other partners given better rate", "url": "https://www.theguardian.com/business/2026/jun/30/eu-duty-free-steel-quota-uk-rate-brexit", "fonte_id": "guardian_world", "data_pub": "2026-06-30T09:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A União Europeia reduziu pela metade a quantidade de aço importado sem tarifas, mas aumentou os limites para mais de uma dúzia de parceiros comerciais, incluindo o Reino Unido. A medida visa reduzir a entrada de aço chinês barato na União Europeia, mas 13 países com acordo de livre-comércio com Bruxelas tiveram seus limites reduzidos apenas em um terço.", "titulo_pt": "UE reduz metade da quota de aço sem tarifas, mas concede melhor rateio para parceiros comerciais", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 26637, "titulo": "Police investigate suspected fatal bear attack in Aomori Prefecture", "url": "https://www.japantimes.co.jp/news/2026/06/30/japan/aomori-bear-fatal-attack/", "fonte_id": "japan_times", "data_pub": "2026-06-30T09:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As autoridades disseram que um homem encontrado morto em uma montanha pode ter sido atacado por um urso.", "titulo_pt": "Polícia investiga suposto ataque fatal de urso no Präfúctio Aomori", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 26265, "titulo": "IA impulsiona recorde de US$ 200 bilhões em fusões e aquisições no setor elétrico dos EUA", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/ia-impulsiona-recorde-de-us-200-bilhoes-em-fusoes-e-aquisicoes-no-setor-eletrico-dos-eua.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A inteligência artificial está impulsionando um recorde de fusões e aquisições na indústria elétrica dos Estados Unidos, enquanto empresas buscam capital para desenvolver infraestrutura energética para data centers.", "titulo_pt": "IA impulsiona recorde de US$ 200 bilhões em fusões e aquisições no setor elétrico dos EUA", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 26749, "titulo": "S. Korean authorities sell net US$13.6 bln in Q1 to stabilize FX market", "url": "https://en.yna.co.kr/view/AEN20260630010200320", "fonte_id": "yonhap_news", "data_pub": "2026-06-30T08:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As autoridades sul-coreanas venderam uma quantidade líquida de US$ 13,6 bilhões no primeiro trimestre para estabilizar o mercado de câmbio.", "titulo_pt": "Autoridades sul-coreanas vendem US$ 13,6 bi no primeiro trimestre para estabilizar mercado de câmbio", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 26640, "titulo": "Japan to see price hikes for 2,566 food items in July", "url": "https://www.japantimes.co.jp/business/2026/06/30/economy/food-price-hike-july/", "fonte_id": "japan_times", "data_pub": "2026-06-30T08:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em julho, 2.566 itens de alimentos no Japão terão aumentos de preço devido a elevações nos custos de embalagens e matérias-primas, principalmente afetando produtos processados como macarrão instantâneo.", "titulo_pt": "Japão verá aumento de preços para 2.566 itens de alimentos em julho", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 26423, "titulo": "O plasma brasileiro e a corrida global por soberania em saúde", "url": "https://www.jota.info/opiniao-e-analise/artigos/o-plasma-brasileiro-e-a-corrida-global-por-soberania-em-saude", "fonte_id": "jota", "data_pub": "2026-06-30T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Hemobrás está avançando na coleta de plasma e investindo no Novo PAC para reduzir a dependência internacional de medicamentos estratégicos.", "titulo_pt": "O plasma brasileiro e a corrida global por soberania em saúde", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 26268, "titulo": "Novo CNPJ com letras e números começa em julho e 'mil ao contrário' pode mudar", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/novo-cnpj-com-letras-e-numeros-comeca-em-julho-e-mil-ao-contrario-pode-mudar.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A partir de julho, os novos CNPJs poderão incluir letras e números. A mudança será aplicada apenas para novas inscrições, mantendo inalterados os CNPJs já existentes.", "titulo_pt": "Novo CNPJ com letras e números começa em julho", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 26269, "titulo": "Receita paga R$ 16 bi no 2º lote do IR 2026; quais os próximos lotes e o que fazer se não entrou?", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/receita-paga-r-16-bi-no-2o-lote-do-ir-2026-quais-os-proximos-lotes-e-o-que-fazer-se-nao-entrou.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Receita Federal pagará R$ 16 bilhões em restituições do Imposto de Renda 2026 a 9,6 milhões de contribuintes nesta terça-feira (30). Segundo o fisco, todos os valores aos contribuintes com prioridade legal serão quitados.", "titulo_pt": "Receita paga R$ 16 bi no 2º lote do IR 2026; quais os próximos lotes e o que fazer se não entrou?", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 26756, "titulo": "(URGENT) Seoul shares end 0.97 pct higher on tech gains, with upcoming U.S.-Iran talks in focus", "url": "https://en.yna.co.kr/view/AEN20260630007300320", "fonte_id": "yonhap_news", "data_pub": "2026-06-30T06:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações de Seul fecharam com alta de 0,97% impulsionadas por ganhos no setor tecnológico, enquanto as negociações entre Estados Unidos e Irã estavam no centro da atenção dos investidores.", "titulo_pt": "(URGENTE) Ações de Seul encerram com alta de 0,97% apoiadas em ganhos tecnológicos, com conversas entre EUA e Irã sob observação", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 26185, "titulo": "Elliott’s acolytes: how Paul Singer’s hedge fund became a spinout factory", "url": "https://www.ft.com/content/b5fc43da-45b1-4e56-a278-6edbeba04b7d", "fonte_id": "financial_times", "data_pub": "2026-06-30T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Paul Singer, um investidor renomado, gerou uma série de novas empresas semelhantes às criadas por Julian Robertson, conhecidas como 'Tigres cubs'.", "titulo_pt": "Elliott's seguidores: como o fundo de Paul Singer se tornou uma fábrica de spinouts", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 26186, "titulo": "How the great wealth transfer is rattling Wall Street", "url": "https://www.ft.com/content/c914cbf5-4ede-4342-a4ac-9f1289c47dc9", "fonte_id": "financial_times", "data_pub": "2026-06-30T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Há uma transferência de trilhões de dólares entre gerações, e os herdeiros mais jovens sentem pouco compromisso com os conselheiros tradicionais.", "titulo_pt": "Como a grande transferência de riqueza está abalando o Wall Street", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 26215, "titulo": "Mizuho and SMFG fuel record Japanese corporate bond sales overseas", "url": "https://www.japantimes.co.jp/business/2026/06/30/companies/mizuho-smfg-foreign-currency-bond-sale/", "fonte_id": "japan_times", "data_pub": "2026-06-30T03:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A emissão recorde de títulos corporativos japoneses no exterior está sendo impulsionada, em parte, pela desvalorização do iene, que atingiu seu nível mais baixo desde 1986 em relação ao dólar esta semana.", "titulo_pt": "Mizuho e SMFG impulsionam recordes de vendas de títulos corporativos japoneses no exterior", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 24724, "titulo": "Se vier um El Niño intenso, a área de sorgo ganha mais espaço", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/vaivem/2026/06/se-vier-um-el-nino-intenso-a-area-de-sorgo-ganha-mais-espaco.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O El Niño intenso, que está previsto e pode ser um dos mais intensos recentes, traz riscos de atraso no plantio da soja e consequentemente do milho safrinha. A área dedicada ao cultivo de sorgo pode se expandir como resultado desses atrasos.", "titulo_pt": "Se vier um El Niño intenso, a área de sorgo ganha mais espaço", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 27082, "titulo": "What AI Will Do to Art", "url": "https://www.theatlantic.com/magazine/2026/08/ai-art-holly-herndon-mat-dryhurst/687619/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-30T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Holly Herndon e Mat Dryhurst acreditam que o futuro não precisa pertencer ao lixo.", "titulo_pt": "O que a IA fará com a arte", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 26989, "titulo": "Bernie Sanders Saw This Coming", "url": "https://www.wired.com/story/the-big-interview-podcast-senator-bernie-sanders/", "fonte_id": "wired", "data_pub": "2026-06-30T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Bernie Sanders tem defendido há décadas que a concentração de riqueza ameaça a democracia americana. Agora, ele aposta que a frustração com as grandes tecnológicas, bilionários e IA descontrolada está atingindo um ponto de inflexão.", "titulo_pt": "Bernie Sanders Preveu Isto", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 26546, "titulo": "America’s immigrant tech workers are paying an uncertainty tax", "url": "https://restofworld.org/2026/us-tech-immigration-bottleneck-h1b-talent-drain/?utm_source=rss&utm_medium=rss&utm_campaign=feeds", "fonte_id": "rest_of_world", "data_pub": "2026-06-30T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Muitos trabalhadores imigrantes de tecnologia nos Estados Unidos estão considerando se mudar para Canadá, o Reino Unido ou o Golfo após anos de regras migratórias incertas. Um tribunal anulou uma taxa de $100.000 para o H-1B, mas as incertezas persistem.", "titulo_pt": "Trabalhadores imigrantes de tecnologia dos EUA estão pagando um imposto de incerteza", "veiculo": "Rest of World", "pais": "EUA", "classe": "A"}, {"id": 26718, "titulo": "Samsung, SK hynix say Yongin won't be enough for AI era", "url": "https://www.koreaherald.com/article/10793513", "fonte_id": "korea_herald", "data_pub": "2026-06-30T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Samsung e SK hynix confirmaram planos de investir aproximadamente 800 trilhões de wones ($518 bilhões) para transformar a região sul da Coreia em um novo hub de semicondutores além de Yongin, devido à alta demanda por memórias impulsionadas pela IA. Os executivos das empresas apresentaram seus planos de investimento durante um evento governamental em Gwangju.", "titulo_pt": "Samsung e SK hynix dizem que Yongin não será suficiente para a era da IA", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 26348, "titulo": "Armadilha sem veneno captura e monitora escorpiões em áreas urbanas", "url": "https://www.cnnbrasil.com.br/tecnologia/armadilha-sem-veneno-captura-e-monitora-escorpioes-em-areas-urbanas/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T08:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma startup de Ribeirão Preto desenvolveu uma armadilha adesiva sem veneno para monitorar escorpiões-amarelos, espécie comumente envolvida em acidentes peçonhentos no Brasil.", "titulo_pt": "Armadilha adesiva sem veneno captura e monitora escorpiões-amarelos em áreas urbanas", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 26750, "titulo": "(LEAD) Samsung, SK eye 896 tln-won investment in southwest region amid gov't drive", "url": "https://en.yna.co.kr/view/AEN20260630007551320", "fonte_id": "yonhap_news", "data_pub": "2026-06-30T08:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Samsung Group e o SK Group planejam investir conjuntamente uma quantia de 896 trilhões de wones na região sudoeste, em meio a um esforço do governo para promover investimentos nessa área.", "titulo_pt": "Samsung e SK Planejam Investimento de 896 Trilhões de Wones no Sudoeste", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 26726, "titulo": "Lee goes to Gwangju to launch Korea's AI Industrial Revolution", "url": "https://www.koreaherald.com/article/10793367", "fonte_id": "korea_herald", "data_pub": "2026-06-30T07:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente Lee Jae Myung viajou a Gwangju para promover o sul da Coreia como ponto de partida para a 'Revolução Industrial de Inteligência Artificial' do país, apoiada por investimentos massivos em chips, centros de dados de inteligência artificial e indústrias relacionadas. Durante um evento na região, ele apresentou uma visão de desenvolvimento para as indústrias avançadas, após anúncios governamentais e corporativos sobre investimentos regionais significativos.", "titulo_pt": "Lee viaja a Gwangju para lançar a Revolução Industrial de Inteligência Artificial da Coreia", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 26703, "titulo": "China unveils national AI agent standards to accelerate interoperable AI ecosystem", "url": "https://www.digitimes.com/news/a20260630VL210/development-industrial.html", "fonte_id": "digitimes", "data_pub": "2026-06-30T07:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A China lançou sete padrões nacionais para a interconexão de agentes de inteligência artificial, estabelecendo um quadro unificado sobre como esses agentes se identificam, descobrem uns aos outros, colaboram e invocam ferramentas externas à medida que a inteligência artificial avança do gerenciamento de conteúdo para decisões autônomas e execução.", "titulo_pt": "China divulga padrões nacionais para agentes de IA para acelerar ecossistema interoperável", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 26267, "titulo": "Funcionários sabem que OpenAI não tem plano de negócios, diz autora de livro sobre a empresa", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/funcionarios-sabem-que-openai-nao-tem-plano-de-negocios-diz-autora-de-livro-sobre-a-empresa.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O livro 'O Império da IA', escrito pela jornalista americana Karen Hao, se tornou hletes. It’s a mistake", "url": "https://www.statnews.com/2026/06/30/florida-ekg-law-high-school-athletes/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-30T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Katherine Hofmann argumenta que existem métodos mais eficazes do que exigir EKGs para proteger os atletas nas escolas. O estado da Flórida foi o primeiro a implementar essa medida.", "titulo_pt": "Opinião: Flórida é o primeiro estado a exigir EKGs para atletas de escola. É um erro", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 26770, "titulo": "STAT+: Abivax seeks to ease safety concerns with new data, boosting shares", "url": "https://www.statnews.com/2026/06/30/abivax-obefazimod-ulcerative-colitis-maintenance-trial-safety-data/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-30T07:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Abivax buscou aliviar preocupações sobre a segurança de seu medicamento experimental para doenças do trato gastrointestinal com novos dados, resultando em um aumento nas ações da empresa. Anteriormente, essas mesmas preocupações haviam causado uma queda nas ações recentemente.", "titulo_pt": "Abivax busca aliviar preocupações com novos dados, elevando ações", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 26728, "titulo": "Kakao Bank AI safety research gains global recognition", "url": "https://www.koreaherald.com/article/10793298", "fonte_id": "korea_herald", "data_pub": "2026-06-30T06:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Kakao Bank teve suas pesquisas sobre segurança de inteligência artificial no setor financeiro reconhecidas globalmente, com quatro artigos sendo aceitos em conferências importantes relacionadas à IA este ano. Os trabalhos se concentram na segurança da IA gerativa e na melhoria da confiabilidade dos sistemas de IA usados no financiamento.", "titulo_pt": "Pesquisa
