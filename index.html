 pela Assembleia Legislativa de Santa Catarina demonstra um erro típico no planejamento das leis. O texto original menciona o incentivo financeiro de R$ 100 por javali abatido, mas não detalha os custos associados a esses incentivos.", "titulo_pt": "R$ 100 por javali abatido e os erros no planejamento das leis", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 66310, "titulo": "Intervention is the word after yen moves beyond ¥163 and sits there", "url": "https://www.japantimes.co.jp/business/2026/07/22/markets/163-yen/", "fonte_id": "japan_times", "data_pub": "2026-07-22T07:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O iene está na sua posição mais fraca contra o dólar em quatro décadas e caiu um terço em cinco anos.", "titulo_pt": "Intervenção é a palavra após o iene passar de ¥163", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 66480, "titulo": "S. Korean won weakens on further Middle East oil supply risk", "url": "https://en.yna.co.kr/view/AEN20260722007800320", "fonte_id": "yonhap_news", "data_pub": "2026-07-22T07:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O won sul-coreano cedeu valor em relação ao dólar americano devido a riscos adicionais relacionados à suprimento de petróleo no Oriente Médio.", "titulo_pt": "Won sul-coreano enfraquece diante do risco adicional de suprimento de petróleo no oriente médio", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 66312, "titulo": "Companies race to deliver autonomous uncrewed fighter jets", "url": "https://www.japantimes.co.jp/business/2026/07/22/tech/companies-autonomous-fighter-jets/", "fonte_id": "japan_times", "data_pub": "2026-07-22T07:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Empresas estão competindo para desenvolver aviões de combate sem tripulação autônomos, com o Exército dos Estados Unidos esperando que esses aviões custem um terço ou menos do custo de um caça F-35, que pode custar US$ 80 milhões ou mais.", "titulo_pt": "Empresas correm para entregar aviões de combate sem tripulação autônomos", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 65992, "titulo": "​World’s largest meat company faces legal challenge over green credentials of $6bn global expansion", "url": "https://www.theguardian.com/environment/2026/jul/22/meat-multinational-faces-legal-challenge-over-green-credentials-of-6bn-global-expansion-plan", "fonte_id": "guardian_world", "data_pub": "2026-07-22T06:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A maior empresa de carne do mundo, JBS, enfrenta um desafio legal histórico para divulgar como seu plano de expansão global de US$ 6 bilhões está alinhado com responsabilidades climáticas, ambientais e de direitos humanos. A Greenpeace apresentou uma petição aos tribunais holandeses pedindo informações sobre a conformidade da empresa com as leis holandesas de 'dever de cuidado' e suas próprias promessas públicas.", "titulo_pt": "Maiores empresa de carne do mundo enfrenta desafio legal sobre credenciais verdes de expansão global de us$ 6 bilhões", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 66376, "titulo": "LG Electronics to halt production at Huizhou plant in China after three decades", "url": "https://www.digitimes.com/news/a20260722VL216/production-lg-electronics-plant-manufacturing-subsidiary.html", "fonte_id": "digitimes", "data_pub": "2026-07-22T04:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "LG Electronics planeja encerrar a produção no seu planta em Huizhou, na China, a partir de outubro, após mais de três décadas. A unidade de produção foi a primeira do grupo naquele país.", "titulo_pt": "LG eletrônicos vai paralisar produção na planta de Huizhou, na China, após 30 anos", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}], "economia__eventos": [], "tecnologia": [{"id": 66577, "titulo": "Lightning Reach acquired by ETG as mission-driven govtech group expands portfolio", "url": "https://tech.eu/2026/07/22/lightning-reach-acquired-by-etg-as-mission-driven-govtech-group-expands-portfolio/", "fonte_id": "tech_eu", "data_pub": "2026-07-22T11:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A plataforma fintech Lightning Reach foi adquirida pela European Technology Group (ETG), uma empresa de tecnologia governamental com foco na missão e investidora a longo prazo. Esta aquisição expande o portfólio da ETG, que já atua como um grupo mission-alinhado de empresas de tecnologia governamental.", "titulo_pt": "Lightning Reach adquirida pela ETG como grupo de govtech com missão expande seu portfólio", "veiculo": "Tech.eu", "pais": "Bélgica", "classe": "B"}, {"id": 65640, "titulo": "Uso de IA em clínicas médicas na China supera média global", "url": "https://www.poder360.com.br/poder-china/uso-de-ia-em-clinicas-medicas-na-china-supera-media-global/", "fonte_id": "poder360", "data_pub": "2026-07-22T11:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "No China, 56% dos profissionais médicos integram a inteligência artificial em seus fluxos de trabalho, contra 49% globalmente.", "titulo_pt": "Uso de IA em clínicas médicas na China ultrapassa média global", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 66386, "titulo": "Meta made its own AI detection system. It should have just used Google’s", "url": "https://www.theverge.com/tech/968680/meta-ai-detection-labeling-content-seal-watermarks-synthid", "fonte_id": "the_verge", "data_pub": "2026-07-22T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em março, o Conselho de Supervisão da Meta pediu ao company que cumprisse suas promessas públicas e utilizasse seus próprios sistemas para combater o conteúdo enganoso gerado por AI. Em julho, a Meta lançou o Content Seal, um sistema de marca d'água invisível que identifica imagens criadas pelo seu novo modelo de IA.", "titulo_pt": "Meta desenvolveu seu próprio sistema de detecção de AI. Seria melhor ter usado o deles do Google.", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 66470, "titulo": "Heads of Samsung, SK, Hyundai to visit U.S. to meet with global tech leaders", "url": "https://en.yna.co.kr/view/AEN20260722009300320", "fonte_id": "yonhap_news", "data_pub": "2026-07-22T10:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Executivos das empresas sul-coreanas Samsung, SK e Hyundai irão visitar os Estados Unidos para se reunir com líderes tecnológicos globais.", "titulo_pt": "Líderes empresariais sul-coreanos visitarão EUA para se encontrar com líderes tecnológicos", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 66453, "titulo": "Beijing ramps up computing power to boost ‘token economy’ in tech race with US", "url": "https://www.scmp.com/tech/tech-trends/article/3361458/beijing-ramps-computing-power-boost-token-economy-tech-race-us?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-22T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pequim está aumentando sua capacidade computacional e implementando novas políticas para promover a economia de 'tokens' na cidade, enquanto China acelera o uso da IA em setores-chave em sua corrida tecnológica contra os Estados Unidos. A capital chinesa planeja adicionar 50.000 petaflops de potência computacional inteligente no segundo semestre de 2026, elevando sua capacidade total acima dos 130.000 petaflops ao final do ano.", "titulo_pt": "Pequim intensifica poder computacional para impulsionar 'economia de tokens' em corrida tecnológica com EUA", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 66081, "titulo": "Exclusive: Nvidia's Jensen Huang defends Chinese AI amid Kimi panic", "url": "https://www.axios.com/2026/07/22/nvidia-jensen-huang-china-open-source-ai", "fonte_id": "axios", "data_pub": "2026-07-22T10:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O CEO da Nvidia, Jensen Huang, defendeu os modelos de inteligência artificial chineses como excelentes e abertos, afirmando que as empresas americanas deveriam ser permitidas a usá-los. Ele expressou preocupação com o movimento para banir esses modelos.", "titulo_pt": "Nvidia defende modelos AI chineses contra tentativas de proibição", "veiculo": "Axios", "pais": "EUA", "classe": "B"}, {"id": 65920, "titulo": "La IA en América Latina como motor de desarrollo, crecimiento y equidad", "url": "https://www.latercera.com/opinion/noticia/la-ia-en-america-latina-como-motor-de-desarrollo-crecimiento-y-equidad/", "fonte_id": "la_tercera", "data_pub": "2026-07-22T10:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Inteligência Artificial (IA) na América Latina é vista como um motor para o desenvolvimento, crescimento econômico e equidade social. O artigo discute como a IA pode ser utilizada no continente para promover avanços significativos em diversas áreas.", "titulo_pt": "A IA na América Latina como motor de desenvolvimento, crescimento e equidade", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 66195, "titulo": "The U.S. wants to contain China’s AI. Silicon Valley keeps using it", "url": "https://restofworld.org/2026/china-siliconvalley-ai-moonshot-kimi/?utm_source=rss&utm_medium=rss&utm_campaign=feeds", "fonte_id": "rest_of_world", "data_pub": "2026-07-22T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Apple, Thinking Machines e desenvolvedores de todo o mundo estão adotando modelos de IA chineses como o Kimi K3, enquanto os policymaker dos Estados Unidos lutam para preservar a liderança em IA.", "titulo_pt": "EUA querem conter a China na IA, mas vale do silício continua usando-a", "veiculo": "Rest of World", "pais": "EUA", "classe": "A"}, {"id": 66394, "titulo": "Glow emerges from stealth at $1.2B valuation to challenge endpoint security in the AI era", "url": "https://techcrunch.com/2026/07/22/glow-emerges-from-stealth-at-1-2b-valuation-to-challenge-endpoint-security-in-the-ai-era/", "fonte_id": "techcrunch", "data_pub": "2026-07-22T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Glow está buscando entrar no mercado de segurança endpoint, focando em riscos novos e emergentes criados pela rápida adoção de agentes e ferramentas de desenvolvimento de inteligência artificial nas empresas.", "titulo_pt": "Luz surge da clandestinidade com avaliação de $1,2 bi para desafiar a segurança endpoint na era da IA", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 66411, "titulo": "A Teen Reporter Searched for His Community in the Epstein Files. Adults Freaked Out", "url": "https://www.wired.com/story/epstein-files-redwood-bark-school-newspaper/", "fonte_id": "wired", "data_pub": "2026-07-22T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma publicação no Instagram transformou um jornal estudantil de uma escola da Califórnia em um ponto de conflito sobre liberdade de expressão. Os alunos afirmam que simplesmente estavam fazendo seu trabalho.", "titulo_pt": "Jornalista teenbusca sua comunidade nos arquivos Epstein. Adultos entraram em panico", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 66306, "titulo": "U.S. and China to hold AI talks in September, sources say", "url": "https://www.japantimes.co.jp/news/2026/07/22/world/us-china-ai-talks/", "fonte_id": "japan_times", "data_pub": "2026-07-22T09:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As discussões sobre inteligência artificial entre os Estados Unidos e China estão programadas para acontecer em setembro, antes da visita planejada do Presidente chinês Xi Jinping aos Estados Unidos no dia 24 de setembro. Essas negociações são consideradas um resultado importante da cúpula Trump-Xi realizada em maio.", "titulo_pt": "Estados unidos e China vão realizar conversações sobre IA em setembro, dizem fontes", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 66361, "titulo": "Explainer: Why Wistron opened a factory in Texas — why it's the first node in America's reindustrialization", "url": "https://www.digitimes.com/news/a20260722VL228/wistron-plant-manufacturing-texas-production.html", "fonte_id": "digitimes", "data_pub": "2026-07-22T09:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Wistron inaugurou uma fábrica de 324 mil metros quadrados em Fort Worth, Texas, no dia 21 de julho. Esta é a primeira etapa na reindustrialização dos Estados Unidos.", "titulo_pt": "Explicação: por que a Wistron abriu uma fábrica no Texas — e por que isso marca o início da reindustrialização americana", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 66418, "titulo": "Lee takes Korea’s AI ambitions to Silicon Valley", "url": "https://www.koreaherald.com/article/10816887", "fonte_id": "korea_herald", "data_pub": "2026-07-22T09:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente sul-coreano Lee Jae Myung viajará para a Califórnia para se encontrar com líderes de empresas de inteligência artificial dos EUA e organizar uma conferência em São Francisco, buscando investimentos e parcerias para transformar três grandes projetos da Coreia do Sul em resultados concretos.", "titulo_pt": "Lee leva as ambições de AI da Coreia ao vale do silício", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 66360, "titulo": "Shape-shifting mirrors on NASA’s new space telescope could unveil Jupiters like our own", "url": "https://www.technologyreview.com/2026/07/22/1140701/shape-shifting-mirrors-roman-space-telescope/", "fonte_id": "mit_tech_review", "data_pub": "2026-07-22T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Telescópio Espacial Nancy Grace Roman da NASA, assim que for lançado, provavelmente no final deste mês, utilizará um coronágrafo ativo para bloquear a maioria da luz de uma estrela durante o registro fotográfico. Este instrumento permitirá aos astrônomos observar planetas menores, como Júpiter.", "titulo_pt": "Mímiras transformáveis no novo telescópio espacial da NASA podem revelar júpites como o nosso", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 66459, "titulo": "US levels AI sanctions threat as China models gain", "url": "https://www.scmp.com/plus/business/article/3361455/us-levels-ai-sanctions-threat-china-models-gain?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-22T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O secretário do Tesouro dos EUA, Scott Bessent, sinalizou possíveis sanções contra modelos de inteligência artificial abertos se forem encontradas evidências de propriedade intelectual roubada da China. Segundo ele, o governo americano apoia os modelos abertos, mas combate a violação de direitos autorais.", "titulo_pt": "EUA ameaçam sanções a modelos de IA abertos após acusações de China", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 66578, "titulo": "Ossprey secures $2.65M to stop software supply chain attacks", "url": "https://tech.eu/2026/07/22/ossprey-secures-265m-to-stop-software-supply-chain-attacks/", "fonte_id": "tech_eu", "data_pub": "2026-07-22T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A startup britânica Ossprey, especializada em segurança da cadeia de suprimentos de software, levantou $2,65 milhões em uma rodada pré-série A sob inscricao excedente para acelerar o desenvolvimento do produto e expandir suas equipes de engenharia e comercialização.", "titulo_pt": "Ossprey conquista $2,65 mi para combater ameaças na cadeia de suprimentos de software", "veiculo": "Tech.eu", "pais": "Bélgica", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 66443, "titulo": "Hong Kong loses 2030 maths congress to Glasgow. Does Asia need a stronger voice?", "url": "https://www.scmp.com/news/china/science/article/3361481/hong-kong-loses-2030-maths-congress-glasgow-does-asia-need-stronger-voice?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-22T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um matemático premiado chamou para a criação de uma união matemática asiática após Hong Kong perder a competição para sediar o Congresso Internacional de Matemáticos em 2030, que será realizado em Glasgow. A União Matemática Internacional (IMU) escolheu Glasgow como sede do evento.", "titulo_pt": "Hong Kong perde congresso matemático de 2030 para Glasgow; matemático sugere união asiática", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 66519, "titulo": "In Kyushu's decorated tombs, humans were never meant to be individuals", "url": "https://phys.org/news/2026-07-kyushu-tombs-humans-meant-individuals.html", "fonte_id": "phys_org", "data_pub": "2026-07-22T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As tumbas de Kyushu, no Japão, são inicialmente escurecidas e cheias de um odor terroso. Sem uma lanterna, é impossível se mover dentro delas.", "titulo_pt": "Em túmulos decorados da Kyushu, os humanos nunca foram vistos como indivíduos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 66547, "titulo": "Relativity Space to expand Terran R production in Florida", "url": "https://spacenews.com/relativity-space-to-expand-terran-r-production-in-florida/", "fonte_id": "spacenews", "data_pub": "2026-07-22T11:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Relativity Space firmou um acordo com a Space Florida para construir instalações de fabricação e teste do seu foguete Terran R na Região Espacial da Flórida. Esta expansão visa ampliar a produção deste veículo espacial no estado americano.", "titulo_pt": "Relativity Space vai expandir produção do Terran R na flórida", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 66445, "titulo": "Congo’s Ebola outbreak kills nearly 1,000 people, warning of worse to come", "url": "https://www.scmp.com/news/world/africa/article/3361493/congos-ebola-outbreak-kills-nearly-1000-people-warning-worse-come?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-22T11:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O surto de Ebola na República Democrática do Congo registra pelo menos 999 mortes, conforme dados oficiais divulgados. Até o momento, foram registradas 2.473 casos e 737 pacientes estão em isolamento ou hospitalização.", "titulo_pt": "Surto de Ebola na república democrática do congo mata quase 1.000 pessoas", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 66500, "titulo": "Job dissatisfaction and health care access uncertainty grows in the U.S., new study finds", "url": "https://www.statnews.com/2026/07/22/health-news-job-dissatisfaction-health-care-access-grows/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-22T11:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo estudo nos Estados Unidos indica que o descontentamento no trabalho e a incerteza sobre o acesso aos cuidados de saúde estão aumentando. O título em português seria: 'Insatisfação no emprego e incerteza sobre acesso à assistência médica crescem nos EUA, segundo nova pesquisa.'", "titulo_pt": "Insatisfação no emprego e incerteza sobre acesso à assistência médica crescem nos EUA, segundo nova pesquisa", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 65673, "titulo": "Ossada humana de quase 3 mil anos é encontrada em El Salvador", "url": "https://www.cnnbrasil.com.br/ciencia/ossada-humana-de-quase-3-mil-anos-e-encontrada-em-el-salvador/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-22T11:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma ossada humana de aproximadamente 3 mil anos foi descoberta no sítio arqueológico de Antiguo Cuscatlán, El Salvador. A datação pré-hispânica do local pode remontar a 850 a.C.", "titulo_pt": "Ossada humana de quase 3 mil anos é encontrada em El Salvador", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 66447, "titulo": "Japanese agency warns of ‘cruelly hot days’ amid 40 degrees and above heat", "url": "https://www.scmp.com/news/asia/east-asia/article/3361492/japanese-agency-warns-cruelly-hot-days-amid-40-degrees-and-above-heat?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-22T11:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cidades japonesas estão enfrentando dias de calor extremo, uma nova termologia meteorológica introduzida este ano para alertar sobre temperaturas acima de 40 graus Celsius. A emergência foi descrita como um desastre com pelo menos 14 mortes relacionadas ao calor nos últimos sete dias.", "titulo_pt": "Agência japonesa avisa sobre 'dias cruelmente quentes' em meio a temperaturas acima de 40 graus", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 65916, "titulo": "Cómo el café puede ayudar al cuerpo a combatir el estrés y el envejecimiento, según un nuevo estudio", "url": "https://www.latercera.com/tendencias/noticia/como-el-cafe-puede-ayudar-al-cuerpo-a-combatir-el-estres-y-el-envejecimiento-segun-un-nuevo-estudio/", "fonte_id": "la_tercera", "data_pub": "2026-07-22T10:02:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um novo estudo identificou uma via biológica que pode explicar os benefícios do café encontrados em pesquisas anteriores, relacionados ao combate ao stress e ao envelhecimento.", "titulo_pt": "Como o café pode ajudar o corpo a combater o estresse e o envelhecimento, de acordo com um novo estudo", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 66548, "titulo": "Artemis 2 astronaut advocates for equatorial lunar landings", "url": "https://spacenews.com/artemis-2-astronaut-advocates-for-equatorial-lunar-landings/", "fonte_id": "spacenews", "data_pub": "2026-07-22T10:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O piloto da missão Artemis 2 argumenta que o retorno da NASA à Lua deveria começar com aterragens humanas em regiões equatoriais menos desafiadoras, em vez de ir diretamente para a polos sul. O astronauta defende landings na região equatorial lunar.", "titulo_pt": "Astronauta da artemis 2 defende aterragens equatoriais na lua", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 66651, "titulo": "Can cells think?", "url": "https://aeon.co/videos/why-we-should-think-of-intelligence-in-terms-of-goals-not-brains", "fonte_id": "aeon", "data_pub": "2026-07-22T10:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O vídeo explora um laboratório de biólogos que buscam entender a inteligência focando na resolução de problemas, não nas neurônios. A abordagem destaca-se por não se concentrar nos neurônios tradicionalmente associados à inteligência.", "titulo_pt": "As células podem pensar?", "veiculo": "Aeon Magazine", "pais": "Reino Unido", "classe": "A"}, {"id": 65802, "titulo": "Estudo: combinação de compostos da cannabis melhora sintomas do Alzheimer", "url": "https://veja.abril.com.br/coluna/cannabis-e-cia/estudo-combinacao-de-compostos-da-cannabis-melhoram-sintomas-do-alzheimer/", "fonte_id": "veja", "data_pub": "2026-07-22T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo demonstrou que a combinação de compostos da cannabis pode melhorar os sintomas do Alzheimer, especialmente a agitação, em 87% dos voluntários ao longo de 12 semanas.", "titulo_pt": "Estudo: combinação de compostos da cannabis melhora sintomas do Alzheimer", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 66021, "titulo": "An HIV vaccine is within reach", "url": "https://www.vox.com/future-perfect/495791/mrna-vaccines-science-hiv-prevention-trump-funding", "fonte_id": "vox", "data_pub": "2026-07-22T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em janeiro de 2025, Linda-Gail Bekker visitou uma fábrica de vacinas e permitiu-se acreditar que o primeiro candidato à vacina HIV desenvolvido por cientistas africanos e liderado por africanos poderia finalmente se tornar realidade. A vacina seria baseada em tecnologia mRNA, a mesma usada para combater a pandemia da Covid-19.", "titulo_pt": "Uma vacina contra o HIV está ao alcance", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 66501, "titulo": "STAT+: ‘Cochlear implant for blindness’ debuts in Europe, could launch in U.S. in 2027", "url": "https://www.statnews.com/2026/07/22/prima-retinal-implant-for-macular-degeneration-us-timeline/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-22T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Science Corporation lançou seu implante retinal na Europa para pacientes com degeneração macular age-related. O dispositivo pode ser introduzido nos Estados Unidos em 2027.", "titulo_pt": "Implante para cegueira retiniana estreia na Europa e pode chegar aos EUA em 2027", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 65773, "titulo": "A lei que trouxe as pesquisas clínicas de volta ao Brasil", "url": "https://braziljournal.com/a-lei-que-trouxe-as-pesquisas-clinicas-de-volta-ao-brasil/", "fonte_id": "brazil_journal", "data_pub": "2026-07-22T09:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil enfrentava dificuldades na realização de pesquisas clínicas devido à burocracia e lentidão na aprovação de protocolos, o que levava estudos para mercados menores. Agora, a situação começa a mudar com a implementação de uma lei que favorece essas pesquisas no País.", "titulo_pt": "A lei que trouxe as pesquisas clínicas de volta ao Brasil", "veiculo": "Brazil Journal", "pais": "Brasil", "classe": "B"}, {"id": 66549, "titulo": "Gravity-1 sea launch off Shanghai puts 9 satellites into orbit", "url": "https://spacenews.com/gravity-1-sea-launch-off-shanghai-puts-9-satellites-into-orbit/", "fonte_id": "spacenews", "data_pub": "2026-07-22T09:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa comercial de lançamentos Orienspace realizou o terceiro lançamento do foguete sólido Gravity-1, catapultando nove satélites para órbita a partir das águas próximas a Shanghai. O lançamento ocorreu com sucesso na quarta-feira à tarde.", "titulo_pt": "Lançamento marítimo do gravity-1 da orienspace leva 9 satélites à órbita perto de Shanghai", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 65582, "titulo": "Cientistas descobrem sinais de duas estrelas companheiras que explodiram", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/cientistas-descobrem-sinais-de-duas-estrelas-companheiras-que-explodiram.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-22T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Cientistas identificaram pela primeira vez sinais de duas estrelas de um sistema binário que explodiram, cada uma deixando para trás uma nebulosa após esgotarem seu combustível. Este é o primeiro registro desse tipo de evento astronômico.", "titulo_pt": "Cientistas descobrem sinais de duas estrelas companheiras que explodiram", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 66565, "titulo": "The rise of the ‘hot literati’: how reading became sexy", "url": "https://www.theguardian.com/books/2026/jul/22/reading-books-fashion-brands-literary-clubs", "fonte_id": "guardian_culture", "data_pub": "2026-07-22T11:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Celebridades estão promovendo clubes literários e designers lançando produtos com as obras clássicas. Dior, Coach e Miu Miu são exemplos de marcas que se uniram à tendência de fazer do amor por livros uma moda.", "titulo_pt": "A ascensão da 'literatura quente': como a leitura se tornou sexy", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 65607, "titulo": "Primeiros poemas da juventude já revelavam grandeza de Orides Fontela", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-07/primeiros-poemas-da-juventude-ja-revelavam-grandeza-de-orides-fontela", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-07-22T11:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A escritora Orides Fontela, homenageada na Festa Literária Internacional de Paraty (Flip) deste ano, já demonstrava grandeza em seus primeiros poemas escritos durante a adolescência. Seus versos eram conhecidos por sua concisão e rigor linguístico desde cedo.", "titulo_pt": "Primeiros poemas da juventude revelavam grandeza de Orides Fontela", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 66566, "titulo": "‘The magnificent, the magical, the marvellous!’ It’s TV’s happiest endings", "url": "https://www.theguardian.com/tv-and-radio/2026/jul/22/tv-happiest-endings-mrs-maisel-parks-rec-brooklyn-nine-nine-only-fools-30-rock", "fonte_id": "guardian_culture", "data_pub": "2026-07-22T11:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo lista os finais mais emocionantes e encantadores de séries de TV, incluindo referências a elementos mágicos, acordos históricos significativos e estrelas do humor. O leitor deve se preparar para se emocionar com esses momentos felizes.", "titulo_pt": "Magníficos, mágicos e maravilhosos! Os finais mais emocionantes da TV", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 65608, "titulo": "Orides Fontela: a radicalidade de uma vida dedicada à poesia", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-07/orides-fontela-radicalidade-de-uma-vida-dedicada-poesia", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-07-22T10:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Orides Fontela (1940-1998) foi uma poeta brasileira que dedicou sua vida à escrita, buscando precisão e profundidade em seus poemas. Considerada por críticos uma das grandes poetas do século XX, sua obra é marcada pela originalidade e densidade filosófica.", "titulo_pt": "Orides Fontela: a radicalidade de uma vida dedicada à poesia", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 66589, "titulo": "Breezy louvre walls enclose restaurant in Thailand by Studio Locomotive", "url": "https://www.dezeen.com/2026/07/22/waankarn-restaurant-thailand-studio-locomotive/", "fonte_id": "dezeen", "data_pub": "2026-07-22T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O projeto 'Waankarn', um restaurante e espaço de eventos na vila costeira Khao Lak, Tailândia, foi concebido pela arquitetura local Studio Locomotive. As paredes revestidas de lâminas de madeira permitem a passagem da luz e do ar para os ambientes internos duplos de altura.", "titulo_pt": "Paredes de lâminas de madeira refrescantes envolvem restaurante na tailândia, projeto Studio Locomotive", "veiculo": "Dezeen (design e arquitetura)", "pais": "Reino Unido", "classe": "B"}, {"id": 66662, "titulo": "Lit Hub Daily: July 22, 2026", "url": "https://lithub.com/lit-hub-daily-july-22-2026/", "fonte_id": "lithub", "data_pub": "2026-07-22T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A escrita de descrições alternativas para imagens é considerada uma forma de tradução literária. O Neurociência da bloqueio de escritor e possíveis soluções são exploradas por April Dávila no campo da tecnologia literária. Langston Hughes e Zora Neale Hurston são mencionados na seção sobre técnica literária.", "titulo_pt": "Por que escrever descrições alternativas para imagens é uma forma de tradução literária", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 66181, "titulo": "How social media bans for young users, now in effect in France, have spread worldwide", "url": "https://www.lemonde.fr/en/pixels/article/2026/07/22/how-social-media-bans-for-young-users-now-in-effect-in-france-have-spread-worldwide_6755718_13.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-22T10:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A França proibiu o uso de plataformas como Instagram e TikTok para jovens menores de 15 anos. Esta medida se alinha com uma tendência global que tem crescido nos últimos anos.", "titulo_pt": "Como as proibições de uso de redes sociais por jovens, agora em vigor na França, se espalharam pelo mundo", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 65609, "titulo": "Casa Paraty será palco da cultura caiçara viva em estreia na Flip 2026", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-07/casa-paraty-sera-palco-da-cultura-caicara-viva-em-estreia-na-flip-2026", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-07-22T10:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Festa Literária Internacional de Paraty (Flip) terá uma nova área chamada Casa Paraty, dedicada à cultura caiçara durante a 24ª edição do festival, que ocorre de 22 a 26 de julho. O espaço receberá diversos artistas locais e tradições orais para valorizar a produção cultural da região.", "titulo_pt": "Casa Paraty será palco da cultura caiçara viva na Flip 2026", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 66567, "titulo": "Go woke, get rich: why rightwing hate campaigns don’t affect the box office", "url": "https://www.theguardian.com/film/2026/jul/22/the-odyssey-elon-musk-campaign", "fonte_id": "guardian_culture", "data_pub": "2026-07-22T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "The Odyssey, um filme de Christopher Nolan, id": 66180, "titulo": "French environment minister backtracks on resignation over 'urgency' to act on climate", "url": "https://www.lemonde.fr/en/france/article/2026/07/22/french-environment-minister-backtracks-on-resignation-over-urgency-to-act-on-climate_6755719_7.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-22T10:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Monique Barbut apresentou sua renúncia ao presidente Emmanuel Macron, mas ele a rejeitou e garantiu seu apoio. A informação foi divulgada pela assessoria de Barbut.", "titulo_pt": "Ministra do meio ambiente da França revoga demissão em nome da 'urgência' climática", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 66198, "titulo": "'It will get worse': World’s second-coldest capital faces record heat", "url": "http://www.euronews.com/2026/07/22/it-will-get-worse-worlds-second-coldest-capital-faces-record-heat", "fonte_id": "euronews", "data_pub": "2026-07-22T09:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Peritos alertam que o calor extremo reflete uma tendência climática mais ampla que está aumentando os riscos para a saúde, água e segurança alimentar na Ásia Central.", "titulo_pt": "A situação piorará: capital do segundo clima mais frio do mundo enfrenta recordes de calor", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 65560, "titulo": "Empresas criticam proposta do governo para exportação de créditos de carbono", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/empresas-criticam-proposta-do-governo-para-exportacao-de-creditos-de-carbono.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-22T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Empresas do setor de créditos de carbono expressaram preocupações com a proposta do governo federal, temendo que as novas regras possam reduzir sua competitividade e limitar investiment com.br/economia/noticia/2026-07/acusado-pelos-eua-brasil-e-referencia-no-combate-ao-trabalho-forcado", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-22T10:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil enfrenta uma tarifa de 25% sobre parte dos produtos vendidos aos Estados Unidos, resultado de uma decisão unilateral americana. O governo brasileiro espera ainda uma possível sobretaxa adicional de 12,5%, relacionada à percepção de que o país não impede a importação de mercadorias provenientes de países com trabalho forçado.", "titulo_pt": "Acusado pelos EUA, Brasil é referência no combate ao trabalho forçado", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 66410, "titulo": "States Want ICE Agents to Show Their Faces. The Trump Administration Is Blocking Them", "url": "https://www.wired.com/story/states-want-ice-agents-to-show-their-faces-the-trump-administration-is-blocking-them/", "fonte_id": "wired", "data_pub": "2026-07-22T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A administração Trump está impedindo que os estados exijam que agentes da ICE mostrem seus rostos, alegando que leis contra máscaras colocariam em risco os agentes. Os advogados federais argumentam que isso seria perigoso, citando um projeto de reconhecimento facial da ICE que não funciona efetivamente.", "titulo_pt": "Estados querem que agentes da ICE mostrem seus rostos. Administração Trump está bloqueando essa solicitação", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 66463, "titulo": "Hongkonger, 19, guilty of posting seditious graffiti in commercial complex toilet", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3361454/hongkonger-19-guilty-posting-seditious-graffiti-commercial-complex-toilet?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-22T08:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um jovem de 19 anos foi condenado     ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml(topico) : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml(audioKey) {
  const audio = D.audio && D.audio.sumarios && D.audio.sumarios[audioKey];
  if (!audio || !audio.arquivo) return "";
  const src = audio.arquivo + (audio.versao ? "?v=" + encodeURIComponent(audio.versao) : "");
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta" data-audio-src="${esc(src)}" data-audio-key="${esc(audioKey)}">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderPodcast() {
  const p = D.podcast;
  if (!p || !p.arquivo) return "";
  const src = p.arquivo + (p.versao ? "?v=" + encodeURIComponent(p.versao) : "");
  return `<div class="podcast-card">
    <div class="podcast-hd">Ou&ccedil;a Agora</div>
    <audio class="podcast-audio" controls preload="none" src="${esc(src)}"></audio>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml("destaque")}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    const temPodcast = D.podcast && D.podcast.arquivo;
    return `<div class="cards${temPodcast ? ' com-podcast' : ''}">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderPodcast()}
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — audio pre-renderizado por Piper
(function () {
  var player = document.createElement('audio');
  player.preload = 'auto';
  player.setAttribute('playsinline', '');
  document.body.appendChild(player);
  var barAtual = null;

  function _resetBar(bar) {
    if (!bar) return;
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  function _setTocando(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _setPausado(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _tituloAudio(bar) {
    var h = bar.previousElementSibling;
    while (h && !/^H2$/i.test(h.tagName || '')) h = h.previousElementSibling;
    return h ? (h.innerText || h.textContent || 'Boletim Diario').trim() : 'Boletim Diario';
  }

  function _mediaSession(bar) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: _tituloAudio(bar),
      artist: 'Boletim Diario',
      album: 'Leitura dos sumarios',
    });
    navigator.mediaSession.setActionHandler('play', function () { player.play().catch(function () {}); });
    navigator.mediaSession.setActionHandler('pause', function () { player.pause(); });
    navigator.mediaSession.setActionHandler('stop', function () { player.pause(); player.currentTime = 0; });
  }

  window.ttsOuvir = function (btn) {
    var bar = btn.closest('.tts-bar');
    var src = bar && bar.dataset.audioSrc;
    if (!src) return;
    if (barAtual && barAtual !== bar) _resetBar(barAtual);
    barAtual = bar;
    if (player.src !== new URL(src, window.location.href).href) {
      player.src = src;
      player.currentTime = 0;
    } else {
      player.currentTime = 0;
    }
    _mediaSession(bar);
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _resetBar(bar);
    });
  };

  window.ttsPausar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    _setPausado(bar);
  };

  window.ttsContinuar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _setPausado(bar);
    });
  };

  window.ttsPar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    player.currentTime = 0;
    _resetBar(bar);
    if (barAtual === bar) barAtual = null;
  };

  player.addEventListener('ended', function () { _resetBar(barAtual); barAtual = null; });
  player.addEventListener('error', function () { _resetBar(barAtual); barAtual = null; });
  window.addEventListener('beforeunload', function () { player.pause(); });
})();
</script>
