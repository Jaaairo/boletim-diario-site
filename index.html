o Bernardo do Campo, cidade onde iniciou sua carreira política, no dia 7 de dezembro de 2026.", "mundo": "Israel anunciou eleições gerais para o dia 27 de outubro, conforme confirmado pela coalizão governamental. O país enfrenta tensões políticas após um ataque do Hamas ocorrido em 2023. Em Bangkok, uma tragédia aconteceu quando um incêndio em um bar resultou na morte de pelo menos 27 pessoas, levantando dúvidas sobre as normas de segurança contra incêndios locais. No Japão, o preço do petróleo subiu mais de 3,5%, com o Brent cotado a 78,86 dólares por barril e o WTI a 74,02 dólares. A Índia está desenvolvendo um novo atlas do tronco encefálico, oferecendo uma representação sem precedentes de uma das regiões menos conhecidas do cérebro. O senador republicano Lindsey Graham faleceu recentemente, deixando um legado complexo e significativo, especialmente para a Ucrânia.\n\nO Oriente Médio enfrenta tensões geopolíticas agravadas por ataques e confrontos entre Estados Unidos, Irã e outros países. O papa Francisco pediu diálogo para terminar as guerras no Oriente Médio e na Ucrânia, enquanto o secretário-geral da ONU, António Guterres, também chamou para um fim imediato às escaladas de ataques no Golfo. Em meio a esses desafios, o Irã relatou novos ataques perto do Estreito de Ormuz e realizou 140 ataques a alvos militares nos Estados Unidos após o fim do cessar-fogo anunciado por Donald Trump em 2020. Por outro lado, Israel intensificou operações na Faixa de Gaza, matando mais de mil palestinos desde outubro de 2023. O senador republicano Lindsey Graham faleceu aos 71 anos, deixando um legado controverso no cenário político americano e internacional.", "economia": "Os preços do petróleo subiram 4% devido às tensões entre Estados Unidos e Irã sobre o controle do Estreito de Ormuz, levando traders a temerem que as hostilidades possam ainda mais reduzir o fluxo de crude pelo local. As exportações da Coreia do Sul aumentaram 53,9% no primeiro decênio de julho, principalmente devido às vendas robustas de produtos semicondutores. Em Hong Kong, os desenvolvedores estão planejando lançar novas unidades residenciais este mês diante de uma previsão de enfraquecimento das altas nos preços. No Brasil, a decisão do STF apontou que Eduardo Cunha usou um deputado para direcionar emendas, enquanto pequenos negócios estão ganhando com a associação como pontos de coleta e distribuição de encomendas para grandes redes de comércio eletrônico. Além disso, o Federal Reserve dos EUA criou cinco forças-tarefas lideradas por economistas renomados para reformar profundamente sua atuação.", "tecnologia": "A indústria tecnológica continua em expansão global, com destaque para a inteligência artificial e semicondutores. A Reserva Federal da Coreia do Sul afirma que o atual superciclo impulsionado por IA deve continuar, apesar das preocupações sobre um possível pico no ciclo das chipsets. As empresas de tecnologia relataram receitas sólidas, com destaque para a MediaTek, que superou as expectativas iniciais e registrou aumento na receita do segundo trimestre. A SK hynix está antecipando a adoção de tecnologias de ligação híbrida para memória de alto banda (HBM) avançada, em resposta à mudança na competição pela memória de inteligência artificial. Além disso, o aumento dos orçamentos de defesa globais está criando novas oportunidades para fabricantes de automóveis mainstream que buscam diversificar suas operações, com empresas como GM e Volkswagen acelerando sua expansão para a indústria de defesa. A inteligência artificial também está transformando as estratégias de segurança cibernética, com a Foxconn utilizando IA e equipes de segurança coordenadas na Ásia, Europa e Américas para proteger-se contra ataques cibernéticos.", "ciencia": "Um estudo recente publicado na revista Scientific Reports revela que as oscilações climáticas podem moldar os refúgios naturais dos corais em um oceano aquecido, destacando a importância dessas mudanças para a sobrevivência das réguas de coral. Em outro desenvolvimento científico notável, a missão Artemis II da NASA bateu seu próprio recorde de streaming ao alcançar 149 milhões de visualizações, impactando potencialmente centenas de milhões de pessoas. Além disso, pesquisadores do Instituto Weizmann de Ciência descobriram como produzir cinco substâncias psicodélicas e engenheiraram uma planta que pode sintetizar todas essas substâncias ao mesmo tempo, potencializando o uso terapêutico desses compostos. O estudo também destaca a importância da proteína tau na formação de memórias duradouras no cérebro, sugerindo um papel surpreendente dessa proteína no processo de aprendizagem e memória.", "cultura": "Madonna estabeleceu um novo recorde ao alcançar seu décimo álbum número um nas paradas musicais com 'Confessions II', tornando-se a primeira artista dos anos 2020 a atingir essa posição em quatro diferentes décadas. Em outro destaque cultural, o live-action de 'Moana' teve uma estreia mundial decepcionante, arrecadando apenas US$ 95 milhões, com a maior parte vindo da bilheteria internacional. No mundo da música, o videoclipe do single 'Life Goes On', do BTS, atingiu 600 milhões de visualizações no YouTube, sendo um marco para uma canção em coreano na Billboard Hot 100. Além disso, a Villa Suki, projetada pelo Alexis Dornier, é apresentada como um exemplo de arquitetura que integra geometria, paisagem e luz em uma residência privada. A Fundação da Casa de Bragança, em Vila Viçosa, Portugal, inaugurou novas salas que destacam o papel do Brasil na monarquia portuguesa, reforçando a importância histórica entre os dois países.", "sociedade": "Um homem faleceu enquanto aguardava atendimento no Hospital de Base, conforme mostram imagens cedidas ao Metrópoles. As servidores reanimaram o indivíduo na entrada do hospital. Em outro caso, a polícia suspeita que Berenice Ramos de Aguiar Faria, uma cozinheira, tenha sido assassinada por sua patroa para evitar o pagamento de rescisão. A Casa Branca criticou um museu de história por sua narrativa sobre a fundação dos Estados Unidos, refletindo as disputas políticas sobre como contar a história do país. O Brasil está envelhecendo sem se preparar para as consequências da longevidade, desafiando o modelo tradicional de cuidado familiar historicamente baseado em filhos e irmãos assumindo responsabilidades de cuidados. A população idosa na China está aumentando, levantando questões sobre a crescente isolamento social entre os idosos e as implicações para a sociedade. O número de suicídios confirmados entre jovens em Hong Kong atingiu um recorde de 10 anos no ano passado, com 46 casos entre adolescentes de 10 a 19 anos. A Venezuela continua recebendo ajuda humanitária após terremotos que afetaram mais de 86 mil famílias no país, com a presidente interina Delcy Rodríguez visitando um hospital de campanha em Caracas oferecido pelo Catar.", "meio_ambiente": "Um incêndio letal em um pub popular na Tailândia resultou na morte de 27 pessoas e deixou outras 22 em estado crítico. O incidente, ocorrido no último domingo à meia-noite, é considerado o mais fatal desse tipo na capital tailandesa recentemente. Em contraste, a região do Fontainebleau, perto de Paris, enfrenta um incêndio florestal grande com cerca de 400 bombeiros trabalhando para controlar as chamas, que coincidiu com o feriado nacional de 14 de julho. Em Portugal, partes do país estão em risco excepcional de incêndios florestais devido a uma onda de calor prolongada. Além disso, na Espanha, os bombeiros conseguiram controlar um grande incêndio no sul do país após dias de combate às chamas, permitindo a evacuação de cerca de 1.500 pessoas que foram forçadas a deixar suas casas. O fenômeno El Niño pode ser o mais forte desde 1950 e seus impactos variados devem ser monitorados no Brasil.", "direitos_humanos": "Um homem está em estado crítico após ser baleado por falsos carabineros durante um protesto em San Bernardo, Chile. A vítima foi levada ao hospital El Pino e encontra-se em situação de risco vital. Em Israel, ataques em um acampamento palestino no Gaza Strip resultaram em pelo menos seis mortes, incluindo uma menina de 9 anos, segundo autoridades locais. O número de mortos na Venezuela após um terremoto subiu para 4.490, com quase 18 mil pessoas desalojadas e 16.740 feridos. A UNICEF alertou para a necessidade urgente de proteger as dietas dos jovens afegãos, já que o pico da estação de desidratação crônica se aproxima e 3,7 milhões de crianças estão em risco aumentado de malnutrição. Além disso, um levantamento realizado por uma organização cívica sul-coreana mostrou que 37,3% dos meninos vítimas de crimes sexuais não relataram o ocorrido, enquanto 27% das vítimas informadas evitaram relatar os abusos. Em Senegal, a comunidade LGBTQ+ vive em constante medo de repressão após a aprovação de uma lei que aumenta as penas para relações entre pessoas do mesmo sexo."}, "resumo_do_dia": {"politica_nacional": [{"id": 48539, "titulo": "Leia os diálogos de Cunha com Fialek investigados pela PF", "url": "https://www.poder360.com.br/poder-justica/leia-os-dialogos-de-cunha-com-fialek-investigados-pela-pf/", "fonte_id": "poder360", "data_pub": "2026-07-13T00:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Diálogos entre Cunha e Fialek foram divulgados na decisão do ministro Flávio Dino, referentes a um inquérito sobre o direcionamento irregular de emendas.", "titulo_pt": "Leia os diálogos de Cunha com Fialek investigados pela PF", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 48505, "titulo": "Alcolumbre dá colher de chá para PDT e mantém cargos extras com senadores", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/alcolumbre-da-colher-de-cha-para-pdt-e-mantem-cargos-extras-com-senadores.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-13T00:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente do Senado, Davi Alcolumbre (União Brasil - AP), tem permitido que o PDT mantenha assessores e salas extras, mesmo após a data limite estabelecida. Este ato é visto como uma concessão por parte de Alcolumbre.", "titulo_pt": "Alcolumbre concede colher de chá ao PDT sobre cargos extras", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 48506, "titulo": "PF diz que assessora tinha aval da presidência da Câmara para desviar emendas a Cunha", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/pf-diz-que-assessora-tinha-aval-da-presidencia-da-camara-para-desviar-emendas-a-cunha.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-12T23:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal informou ao ministro Flávio Dino do STF que há indícios de que a presidência da Câmara autorizou uma assessora parlamentar a desviar emendas para o ex-deputado Eduardo Cunha.", "titulo_pt": "PF afirma que assessora tinha aval da presidência da Câmara para desviar emendas a Cunha", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 48540, "titulo": "Líder de caminhoneiros diz que haverá paralisação nesta 2ª feira", "url": "https://www.poder360.com.br/poder-economia/lider-de-caminhoneiros-diz-que-havera-paralisacao-nesta-2a-feira/", "fonte_id": "poder360", "data_pub": "2026-07-12T23:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A categoria de caminhoneiros anuncia uma greve nos portos do país a partir da meia-noite desta segunda-feira com o objetivo de pressionar o Senado a votar a MP do frete rodoviário.", "titulo_pt": "Líder de caminhoneiros anuncia paralisação em portos nesta segunda-feira", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 48541, "titulo": "Jannik Sinner vence Wimbledon e tem prêmio de R$ 25 milhões", "url": "https://www.poder360.com.br/poder-sportsmkt/jannik-sinner-vence-wimbledon-e-tem-premio-de-r-25-milhoes/", "fonte_id": "poder360", "data_pub": "2026-07-12T23:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Jannik Sinner, italiano e número 1 do ranking da ATP, venceu Alexander Zverev por 3 sets a 1 e conquistou o Wimbledon pela segunda vez consecutiva.", "titulo_pt": "Sinner vence Wimbledon e ganha prêmio de R$ 25 milhões", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 48542, "titulo": "Jorginho Mello usa Haaland feito com IA para divulgar cursos técnicos", "url": "https://www.poder360.com.br/poder-brasil/jorginho-mello-usa-haaland-feito-com-ia-para-divulgar-cursos-tecnicos/", "fonte_id": "poder360", "data_pub": "2026-07-12T23:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governador de Santa Catarina, Jorginho Mello, utilizou uma imagem do jogador Erling Haaland gerada por inteligência artificial para promover cursos técnicos. O governo também anunciou a disponibilização de mais de 50.000 vagas para treinamento técnico neste ano.", "titulo_pt": "Jorginho Mello usa imagem ai de Haaland para divulgar cursos técnicos", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 48544, "titulo": "Empresário dará um carro a cada integrante da delegação do Egito na Copa", "url": "https://www.poder360.com.br/copa-2026/empresario-dara-um-carro-para-cada-integrante-da-delegacao-do-egito-na-copa/", "fonte_id": "poder360", "data_pub": "2026-07-12T23:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Khalaf Ahmad Al Habtoor, um empresário dos Emirados Árabes, anunciou que irá presentear veículos da Mitsubishi a jogadores e membros do staff egípcios durante o torneio da Copa.", "titulo_pt": "Empresário dos emirados dará carros a integrantes da delegação egípcia na Copa", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 48563, "titulo": "Trump afirma que falou com senador horas antes dele ser achado morto", "url": "https://www.metropoles.com/mundo/trump-afirma-que-falou-com-senador-horas-antes-dele-ser-achado-morto", "fonte_id": "metropoles", "data_pub": "2026-07-12T23:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ex-presidente dos Estados Unidos, Donald Trump, afirmou ter conversado com o senador Lindsey Graham horas antes deste ser encontrado morto. Graham era um aliado próximo de Trump.", "titulo_pt": "Trump afirma ter falado com senador horas antes do seu óbito", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 48547, "titulo": "Saiba quem é Mariângela Fialek, citada por Dino em caso de emendas", "url": "https://www.poder360.com.br/poder-justica/saiba-quem-e-mariangela-fialek-citada-por-dino-em-caso-de-emendas/", "fonte_id": "poder360", "data_pub": "2026-07-12T22:47:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Mariângela Fialek é uma servidora da Câmara que está sendo investigada em três apurações. A Polícia Federal a citou como suposta operadora de demandas do ex-deputado Eduardo Cunha.", "titulo_pt": "Saiba quem é Mariângela Fialek, citada por Dino em caso de emendas", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 48522, "titulo": "Eduardo Cunha atua como ‘agente secreto’ e tem mais poder do que deputados eleitos, diz PF", "url": "https://veja.abril.com.br/politica/eduardo-cunha-atua-como-agente-secreto-e-tem-mais-poder-do-que-deputados-eleitos-diz-pf/", "fonte_id": "veja", "data_pub": "2026-07-12T22:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "De acordo com as investigações, Eduardo Cunha, mesmo após perder o mandato, continuava a orientar o 'direcionamento de valores públicos'. A Polícia Federal afirma que ele atuava como 'agente secreto' com mais poder do que os deputados eleitos.", "titulo_pt": "Eduardo Cunha atua como ‘agente secreto’ e tem mais poder do que deputados eleitos, diz PF", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 48513, "titulo": "Incêndio em bar deixa 27 mortos na Tailândia", "url": "https://www.cartacapital.com.br/mundo/incendio-em-bar-deixa-27-mortos-na-tailandia/", "fonte_id": "cartacapital", "data_pub": "2026-07-12T21:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um incêndio em um bar na Tailândia resultou em 27 mortes. Testemunhas relataram a observação de fumaça proveniente de um disjuntor, que foi seguida por uma queda de energia e uma explosão.", "titulo_pt": "Incêndio em bar deixa 27 mortos na Tailândia", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 48598, "titulo": "Renan Calheiros: Valdemar sabia da proximidade tóxica com Arthur Lira", "url": "https://www.infomoney.com.br/politica/renan-calheiros-valdemar-sabia-da-proximidade-toxica-com-arthur-lira/", "fonte_id": "infomoney", "data_pub": "2026-07-12T21:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Renan Calheiros afirmou que Valdemar era 'nitroglicerina' e sabia da proximidade tóxica com Arthur Lira. O comentário foi feito em um post do InfoMoney sobre as relações políticas no Congresso.", "titulo_pt": "Renan Calheiros: valdemar sabia da proximidade tóxica com Arthur Lira", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 48514, "titulo": "Rincon Sapiência exalta as vivências do corpo preto em disco profundo", "url": "https://www.cartacapital.com.br/blogs/augusto-diniz/rincon-sapiencia-exalta-as-vivencias-do-corpo-preto-em-disco-profundo/", "fonte_id": "cartacapital", "data_pub": "2026-07-12T21:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Rincon Sapiência discute a questão racial em seu novo álbum, mas aborda o tema sob aspectos espirituais, passionais e de sonhos. Em entrevista à CartaCapital, o rapper destaca as vivências do corpo preto.", "titulo_pt": "Rincon Sapiência exalta as vivências do corpo preto em disco profundo", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 48527, "titulo": "Zelensky anuncia saída de primeira-ministra como parte de ampla reforma governamental", "url": "https://veja.abril.com.br/mundo/zelensky-anuncia-saida-de-primeira-ministra-como-parte-de-ampla-reforma-governamental/", "fonte_id": "veja", "data_pub": "2026-07-12T21:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente ucraniano Volodymyr Zelensky anunciou a saída da primeira-ministra Yulia Svyrydenko como parte de uma ampla reforma governamental. Ela ocupava o cargo há quase um ano.", "titulo_pt": "Zelensky anuncia saída de primeira-ministra em reorganização governamental", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 48507, "titulo": "'Bolsonaro é que tem os votos', diz Valdemar, ao justificar carta sobre Flávio", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/bolsonaro-e-que-tem-os-votos-diz-valdemar-ao-justificar-carta-sobre-flavio.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-12T20:57:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Valdemar Costa Neto, presidente do PL, afirma que a carta de Jair Bolsonaro é crucial para a campanha de Flávio Bolsonaro, pois o ex-presidente possui os votos necessários para eleger seu filho.", "titulo_pt": "Valdemar diz que bolsonaro tem os votos importantes para Flávio", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 48508, "titulo": "A matemática eleitoral feita para favorecer os homens", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/lara-mesquita/2026/07/a-matematica-eleitoral-feita-para-favorecer-os-homens.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-12T20:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os partidos PT e PL, bem como outros, solicitaram ao presidente do TSE, Kassio Nunes Marques, que exclua as candidaturas de mulheres e pessoas negras do cálculo dos percentuais mínimos do fundo eleitoral para essas categorias. A justificativa apresentada é técnica, mas o impacto não parece ser apenas técnico.", "titulo_pt": "A matemática eleitoral feita para favorecer os homens", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 48900, "titulo": "Why Hong Kong must fill seat vacated by lawmaker promptly", "url": "https://www.scmp.com/opinion/hong-kong-opinion/article/3360078/why-hong-kong-must-fill-seat-vacated-lawmaker-promptly?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-13T01:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A vacância da cadeira do Legislativo ocupada pelo parlamentar William Wong Kam-fai requer a nomeação imediata. O governo deve preencher o vazio sem demora, dadas as responsabilidades atuais, como as consultas públicas para o último discurso de política do chefe do executivo e para o primeiro plano quinquenal da cidade.", "titulo_pt": "Por que Hong Kong precisa preencher rapidamente a cadeira deixada pelo parlamentar", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 48881, "titulo": "Trump will use 'overwhelming force' against Iran, says US Ambassador to NATO", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/trump-will-use-overwhelming-force-against-iran-says-us-ambassador-nato", "fonte_id": "middle_east_eye", "data_pub": "2026-07-13T01:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O embaixador dos Estados Unidos na OTAN, Matthew Whitaker, declarou em entrevista à Fox News que os EUA usarão 'força desproporcional' contra o Irã se este agir de forma beligerante. Essas declarações foram feitas após trocas de mísseis e drones entre os dois países no fim de semana.", "titulo_pt": "Trump usará 'força desproporcional' contra o Irã, diz embaixador dos EUA na Otan", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 48852, "titulo": "Japan’s pet care industry booms as ‘fur babies’ outnumber infants", "url": "https://www.aljazeera.com/economy/2026/7/13/japans-pet-care-industry-booms-as-fur-babies-outnumber-infants?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-13T01:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A indústria japonesa de produtos para bebês está se voltando para o mercado de pet care devido ao declínio da taxa de natalidade.", "titulo_pt": "Indústria japonesa de cuidados com pets floresce enquanto 'filhotes' superam recém-nascidos", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 48538, "titulo": "Israel terá eleições gerais em 27 de outubro, confirma coalizão", "url": "https://www.poder360.com.br/poder-internacional/israel-tera-eleicoes-gerais-em-27-de-outubro-confirma-coalizao/", "fonte_id": "poder360", "data_pub": "2026-07-13T01:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O primeiro-ministro de Israel, Benjamin Netanyahu (Likud, direita), confirmou que as eleições gerais serão realizadas no dia 27 de outubro. A votação será a primeira desde o ataque do Hamas em 2023.", "titulo_pt": "Israel terá eleições gerais em 27 de outubro, confirma coalizão", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 48848, "titulo": "CNBC Daily Open: Mideast tensions on the boil again as U.S., Iran trade strikes", "url": "https://www.cnbc.com/2026/07/13/cnbc-daily-open-mideast-tensions-on-the-boil-again-as-us-iran-trade-strikes-.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-13T01:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Tensões renovadas no Oriente Médio estão à frente, elevando os preços do petróleo novamente após ataques dos Estados Unidos e Irã.", "titulo_pt": "CNBC diário aberto: tensões no oriente médio aumentam com ataques dos EUA e Irã", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 48853, "titulo": "Can Nigeria’s drone industry deliver Africa’s defence sovereignty", "url": "https://www.aljazeera.com/news/2026/7/13/can-nigerias-drone-industry-deliver-africas-defence-sovereignty?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-13T00:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A indústria de drones no Nigéria pode estar expandindo, mas a soberania defensiva depende de fatores além da produção.", "titulo_pt": "Pode o setor de drones do nigéria assegurar a soberania defensiva da áfrica?", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 48882, "titulo": "US attack kills one in Iran's Mahshahr", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/us-attack-kills-one-irans-mahshahr", "fonte_id": "middle_east_eye", "data_pub": "2026-07-13T00:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um ataque dos Estados Unidos contra uma estação de irrigação em Mahshahr, na Irã, resultou em uma morte e quatro feridos. De acordo com a autoridade local de segurança e enforcement Valiollah Hayati, um guarda foi morto e outros quatro ficaram feridos após um projétil atingir a estação.", "titulo_pt": "Ataque dos EUA mata uma pessoa em Mahshahr, na Irã", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 48609, "titulo": "Ataques dos EUA ao Irã continuam após mais de três horas, diz autoridade", "url": "https://www.cnnbrasil.com.br/internacional/ataques-dos-eua-ao-ira-continuam-apos-mais-de-tres-horas-diz-autoridade/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-13T00:47:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ataques dos Estados Unidos ao Irã continuaram por mais de três horas, segundo uma autoridade. A mídia iraniana relata pelo menos uma morte e dois feridos após as ações militares americanas no sul do país.", "titulo_pt": "Ataques dos EUA ao Irã continuam após mais de três horas, diz autoridade", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 48883, "titulo": "Atomic energy organisation in Iran says Bushehr nuclear power plant 'safe and stable'", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/atomic-energy-organisation-iran-says-bushehr-nuclear-power-plant-safe", "fonte_id": "middle_east_eye", "data_pub": "2026-07-13T00:44:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Organização da Energia Atômica da Irã (AEOI) declarou que a usina nuclear de Bushehr está 'segura e estável', refutando rumores sobre um suposto ataque. De acordo com a organização, todas as unidades e instalações da usina estão operando normalmente e conforme os procedimentos padrão.", "titulo_pt": "Organização atômica iraniana afirma que usina nuclear de Bushehr é 'segura e estável'", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 48593, "titulo": "ONU expressa preocupação com escalada de ataques EUA-Irã; Teerã alega autodefesa", "url": "https://www.infomoney.com.br/mundo/onu-expressa-preocupacao-com-escalada-de-ataques-eua-ira-teera-alega-autodefesa/", "fonte_id": "infomoney", "data_pub": "2026-07-13T00:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ONU expressou preocupação com a escalada de ataques entre EUA e Irã, e Teerã alega autodefesa. O secretário-geral Guterres alertou para as consequências catastróficas de um retorno a hostilidades em grande escala.", "titulo_pt": "ONU expressa preocupação com escalada de ataques EUA-Irã; Teerã alega autodefesa", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 48837, "titulo": "Borsa: Tokyo, apertura in ribasso (-0,29%)", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/13/borsa-tokyo-apertura-in-ribasso-029_e345ffa6-aa5b-4236-b7bf-51846cc2a4d5.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-13T00:39:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "A bolsa de valores de Tóquio abriu com uma queda (-0,29%). A instabilidade no Oriente Médio e a recuperação do preço do petróleo foram os principais fatores que influenciaram o mercado.", "titulo_pt": "Bolsa: tóquio, abertura em baixa (-0,29%)", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 48724, "titulo": "EE.UU. e Irán retoman hostilidades tras ataque contra barco en estrecho de Ormuz", "url": "https://www.latercera.com/mundo/noticia/eeuu-e-iran-retoman-hostilidades-tras-ataque-contra-barco-en-estrecho-de-ormuz/", "fonte_id": "la_tercera", "data_pub": "2026-07-13T00:30:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Irã lançou ataques com misiles e drones contra países do Golfo e anunciou o fechamento do estreito de Ormuz como resposta a supostos novos ataques americanos. Estados Unidos nega o fechamento da rota marítima e afirma que Teerã 'tomou uma má decisão' e pagará os custos.", "titulo_pt": "EUA e Irã retomam hostilidades após ataque a navio no estreito de Ormuz", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 48938, "titulo": "Lee's approval rating rises for 2nd consecutive week: poll", "url": "https://en.yna.co.kr/view/AEN20260713003300315", "fonte_id": "yonhap_news", "data_pub": "2026-07-13T00:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A aprovação da presidente Lee Jae Myung subiu pela segunda semana consecutiva de acordo com uma pesquisa.", "titulo_pt": "Aprovação de lee aumenta por segundo dia seguido: pesquisa", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 48555, "titulo": "Flávio, Augusto do Anjos e reaças: entre desastre e esperança ao menos", "url": "https://www.metropoles.com/colunas/reinaldo-azevedo/flavio-augusto-do-anjos-e-reacas-entre-desastre-e-esperanca-ao-menos", "fonte_id": "metropoles", "data_pub": "2026-07-13T00:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Partido Progressista (PP), União e Republicanos resistem a formar alianças com o Partido Liberal (PL). A eleição está mais distante quanto mais próximo do calendário.", "titulo_pt": "Flávio, Augusto do Anjos e reaças: entre desastre e esperança ao menos", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 48854, "titulo": "US launches more strikes on Iran as Strait of Hormuz standoff deepens", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/13/aje-onl-nf_us-launches-more-strikes-on-iran-120726?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-13T00:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos realizaram novas operações militares contra a Irã, com o objetivo de comprometer a capacidade do país ameaçar o tráfego marítimo no Estreito de Ormuz.", "titulo_pt": "EUA lançam novos ataques à Irã em meio ao aumento da tensão no estreito de Ormuz", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 48762, "titulo": "Fire in Bangkok Bar Kills Dozens", "url": "https://www.nytimes.com/2026/07/12/world/asia/deadly-fire-bangkok-thailand.html", "fonte_id": "nyt_world", "data_pub": "2026-07-13T00:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio rápido propagou-se em um bar em Bangkok, resultando na morte de várias pessoas. As autoridades relataram que os sobreviventes fugiram para o banheiro e foram encontrados lá, levantando dúvidas sobre as normas de segurança contra incêndios.", "titulo_pt": "Incêndio em Bar de Bangkok causa várias mortes", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 48892, "titulo": "7-Eleven owner drops go-it-alone strategy with SoftBank deal", "url": "https://www.japantimes.co.jp/business/2026/07/13/companies/seven-i-selling-stake-softbank-paypay/", "fonte_id": "japan_times", "data_pub": "2026-07-13T01:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Seven & I Holdings está considerando emitir novas ações no valor de vários bilhões de ienes para SoftBank e PayPay.", "titulo_pt": "Dono da 7-eleven considera novo acordo com SoftBank e paypay", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 48847, "titulo": "Oil prices rise 4% as U.S. and Iran fight for control of Strait of Hormuz", "url": "https://www.cnbc.com/2026/07/12/oil-price-strait-hormuz-iran-trump-tanker.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-13T01:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os preços do petróleo subiram 4% devido a disputas entre Estados Unidos e Irã sobre o controle do Estreito de Ormuz após trocas de acusações durante o fim de semana.", "titulo_pt": "Preços do petróleo aumentam 4% em virtude das disputas entre EUA e Irã pelo estreito de Ormuz", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 48929, "titulo": "Seoul shares rebound after opening lower, tracking US gains", "url": "https://www.koreaherald.com/article/10806531", "fonte_id": "korea_herald", "data_pub": "2026-07-13T00:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações de Seul se recuperaram após abrir com perdas, seguindo os ganhos da Wall Street. No entanto, investidores permaneceram cautelosos diante das tensões renovadas no Oriente Médio.", "titulo_pt": "Seoul se recupera após abrir em baixa, seguindo ganhos nos EUA", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 48905, "titulo": "Are HSBC shares set for a turnover bump owing to Hong Kong’s board-lot reform?", "url": "https://www.scmp.com/business/banking-finance/article/3360270/are-hsbc-shares-set-turnover-bump-owing-hong-kongs-board-lot-reform?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-13T00:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Brokers esperam que as ações do HSBC Hongkong Guyoung vejam um aumento significativo no interesse de investidores locais e internacionais, devido ao ajuste na unidade mínima de negociação como parte da reforma das unidades de cotação da bolsa de valores. A mudança visa tornar a ação mais acessível para investidores minoristas.", "titulo_pt": "As ações do HSBC estão prestes a receber um aumento de interesse com a reforma das unidades de cotação na hongkong guyoung?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 48932, "titulo": "Exports up 54% in first 10 days of July on strong chip shipments", "url": "https://www.koreaherald.com/article/10806430", "fonte_id": "korea_herald", "data_pub": "2026-07-13T00:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As exportações da Coreia do Sul aumentaram 53,9% no primeiro decênio de julho em comparação com o mesmo período do ano anterior, principalmente devido às vendas robustas de produtos semicondutores. Este foi o maior volume para qualquer decênio dos últimos dados compilados pela Alfândega.", "titulo_pt": "Exportações da Coreia do sul aumentam 54% nos primeiros dez dias de julho, impulsionadas por vendas de semicondutores", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 48942, "titulo": "Exports up 54 pct in first 10 days of July", "url": "https://en.yna.co.kr/view/AEN20260713003000320", "fonte_id": "yonhap_news", "data_pub": "2026-07-13T00:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As exportações da Coreia do Sul aumentaram 53,9% nos primeiros 10 dias de julho em comparação com o mesmo período do ano anterior.", "titulo_pt": "Exportações da Coreia do sul sobem 53,9% nos primeiros 10 dias de julho", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 48430, "titulo": "Car crisis takes toll on Germany's young engineers", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/13/2003860638", "fonte_id": "taipei_times", "data_pub": "2026-07-13T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A crise no setor automotivo está afetando os engenheiros jovens na Alemanha, com muitos deles enfrentando dificuldades no mercado de trabalho e redução de oportunidades.", "titulo_pt": "Crise no setor automotivo impacta engenheiros jovens na Alemanha", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 48943, "titulo": "S. Korea to expand tariff-rate quota for soybeans for sprouts", "url": "https://en.yna.co.kr/view/AEN20260713002200320", "fonte_id": "yonhap_news", "data_pub": "2026-07-13T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Coreia do Sul expandirá o limite de importação com tarifa especial para soja usada na produção de sprouts. A decisão foi anunciada em Seul no dia 13 de julho.", "titulo_pt": "Coreia do sul ampliará quota de soja para sprouts", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 48604, "titulo": "Rivais querem comprar a Enel São Paulo. Falta combinar com os italianos", "url": "https://braziljournal.com/rivais-querem-comprar-a-enel-sao-paulo-falta-combinar-com-os-italianos/", "fonte_id": "brazil_journal", "data_pub": "2026-07-12T23:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Com a possibilidade de revogação do contrato da Enel São Paulo, várias empresas estão avaliando uma possível compra da concessão. No entanto, ainda não houve acordo com os italianos.", "titulo_pt": "Rivais querem comprar a Enel São Paulo, mas falta combinar com os italianos", "veiculo": "Brazil Journal", "pais": "Brasil", "classe": "B"}, {"id": 48605, "titulo": "Os notáveis que vão repensar o Fed", "url": "https://braziljournal.com/os-notaveis-que-vao-repensar-o-fed/", "fonte_id": "brazil_journal", "data_pub": "2026-07-12T23:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente do Federal Reserve, Kevin Warsh, criou cinco forças-tarefas lideradas por economistas renomados e executivos de empresas privadas para reformar profundamente a atuação do BC americano. Entre os membros destacam-se o Nobel de Economia Thomas Sargent, ex-CEO do Walmart Doug McMillon e um ex-presidente não especificado.", "titulo_pt": "Notáveis vão repensar o Fed", "veiculo": "Brazil Journal", "pais": "Brasil", "classe": "B"}, {"id": 48678, "titulo": "El Central busca \"anclar\" al dólar y para inversores vuelve a ser atractivo el carry trade", "url": "https://www.clarin.com/economia/central-busca-anclar-dolar-inversores-vuelve-atractivo-carry-trade_0_9mojc8nS5Y.html", "fonte_id": "clarin", "data_pub": "2026-07-12T23:03:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "No início de julho, o BCRA tentou estabilizar o dólar próximo a R$1.500. Com previsões de inflação decrescente, as aplicações em reais podem se tornar mais atrativas com as taxas atuais.", "titulo_pt": "Central busca 'anclar' o dólar e investimentos em reais voltem a ser atraentes", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 48909, "titulo": "Hong Kong developers ready new home launches amid forecasts of muted price increases", "url": "https://www.scmp.com/business/article/3360152/hong-kong-developers-ready-new-home-launches-amid-forecasts-muted-price-increases?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-12T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Desenvolvedores de Hong Kong, incluindo Sun Hung Kai Properties e Wheelock Properties, planejam lançar novas unidades residenciais este mês, diante da previsão de um enfriamento das altas nos preços.", "titulo_pt": "Desenvolvedores de hong Kong preparados para novos lançamentos imobiliários com previsões de aumento moderado dos preços", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 48845, "titulo": "Oil prices jump as US and Iran step up tit-for-tat strikes", "url": "https://www.ft.com/content/a3075fc2-74bd-4908-ab02-bbac79c32ee6", "fonte_id": "financial_times", "data_pub": "2026-07-12T22:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Preços do petróleo subiram após Estados Unidos e Irã intensificarem confrontos, levando traders a temerem que as hostilidades possam restrair ainda mais o fluxo de crude pelo Estreito de Ormuz.", "titulo_pt": "Preços do petróleo saltam com escalada de confrontos entre EUA e Irã", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 48632, "titulo": "Apesar de tarifaço, setor automotivo ainda vê oportunidades nos EUA", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/apesar-de-tarifaco-setor-automotivo-ainda-ve-oportunidades-nos-eua/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-12T22:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Embora haja um aumento nas tarifas, a maioria das montadoras opta por pagar essas tarifas em vez de investir bilhões em novas instalações nos Estados Unidos.", "titulo_pt": "Apesar do tarifamento, setor automotivo ainda vê oportunidades nos EUA", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 48499, "titulo": "Petróleo volta a subir após Irã anunciar fechamento do estreito de Hormuz", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/petroleo-volta-a-subir-com-fechamento-do-estreito-de-hormuz-pelo-ira.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-12T22:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os contratos futuros do barril de petróleo Brent para setembro deste ano abriram a sessão de negociações neste domingo (12) em alta. O Irã anunciou o fechamento do estreito de Hormuz, levando ao aumento dos preços.", "titulo_pt": "Petróleo sobe após Irã anunciar fechamento do estreito de Hormuz", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 48596, "titulo": "Decisão do STF aponta que Eduardo Cunha usou deputado para direcionar emendas", "url": "https://www.infomoney.com.br/politica/decisao-do-stf-aponta-que-eduardo-cunha-usou-deputado-para-direcionar-emendas/", "fonte_id": "infomoney", "data_pub": "2026-07-12T22:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A decisão do Supremo Tribunal Federal (STF) indicou que Eduardo Cunha usou um deputado para direcionar emendas. Cunha afirmou que irá contestar a decisão.", "titulo_pt": "Decisão do STF indica que Eduardo Cunha usou deputado para direcionar emendas", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}], "economia__eventos": [], "tecnologia": [{"id": 48924, "titulo": "How a Korean immigrant’s English struggle helped deaf users make phone calls", "url": "https://www.koreaherald.com/article/10806623", "fonte_id": "korea_herald", "data_pub": "2026-07-13T01:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Joseph Lee, um imigrante coreano nos Estados Unidos na década de 1980, encontrava-se com dificuldades para fazer ligações telefônicas devido ao seu aprendizado ainda incipiente do inglês. Essa experiência inspirou-o a criar InnoCaption.", "titulo_pt": "Como as dificuldades de um imigrante coreano no inglês ajudaram usuários surdos a fazerem chamadas", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 48937, "titulo": "Watchdog chief calls for better consumer protection amid market volatility", "url": "https://en.yna.co.kr/view/AEN20260713003100320", "fonte_id": "yonhap_news", "data_pub": "2026-07-13T01:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O chefe do órgão regulador financeiro do país pediu melhor proteção ao consumidor diante da volatilidade dos mercados.", "titulo_pt": "Chefe do órgão regulador financeiro solicita maior proteção ao consumidor em meio à volatilidade dos mercados", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 48931, "titulo": "BOK sees AI-driven chip supercycle continuing, dismisses 'peak-out' concerns", "url": "https://www.koreaherald.com/article/10806440", "fonte_id": "korea_herald", "data_pub": "2026-07-13T00:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Reserva Federal da Coreia do Sul afirma que o mercado global de semicondutores permanece subsuprido e que a atual superciclo impulsionada por inteligência artificial deve continuar por algum tempo. O banco central desconsidera preocupações dos investidores sobre um possível pico na ciclo das chipsets.", "titulo_pt": "Banco da Coreia do sul vê superciclo de chips alimentado por ai continuando, descarta 'pico'", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 48953, "titulo": "MediaTek revenue beat lifts second-quarter outlook as seasonal demand builds", "url": "https://www.digitimes.com/news/a20260713PD202/revenue-mediatek-2026-demand-growth.html", "fonte_id": "digitimes", "data_pub": "2026-07-13T00:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A MediaTek relatou receita de junho de 2026 no valor de NT$58,012 bilhões (US$1,81 bilhão), um aumento de 22,30% em comparação com o mês anterior e de 2,80% em comparação com o mesmo período do ano anterior. A empresa informou que a receita do segundo trimestre atingiu NT$152,183 bilhões, superando as expectativas iniciais.", "titulo_pt": "Receita da mediatek supera projeções e eleva perspectivas para o segundo trimestre", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 48954, "titulo": "KYEC approves US$1.4 billion US plant to expand chip testing capacity", "url": "https://www.digitimes.com/news/a20260713PD201/king-yuan-testing-plant-investment-manufacturing.html", "fonte_id": "digitimes", "data_pub": "2026-07-13T00:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "King Yuan Electronics (KYEC) aprovou uma investimento de até 1,4 bilhão de dólares para um plantão nos Estados Unidos, com o objetivo de expandir a capacidade de teste de semicondutores. Este será o maior projeto de expansão internacional da empresa e visa preencher uma lacuna crescente na capacidade de pós-fabricação e teste nos EUA.", "titulo_pt": "KYEC aprova investimento de 1,4 bilhão de dólares para planta de testes de semicondutores nos EUA", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 48955, "titulo": "Acer posts 13-year second-quarter revenue high on PC and diversified growth", "url": "https://www.digitimes.com/news/a20260713PD200/revenue-acer-pc-growth-business.html", "fonte_id": "digitimes", "data_pub": "2026-07-13T00:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Acer registrou receita consolidada de junho no valor de NT$27,818 bilhões (US$864,8 milhões), um aumento de 6,3% em comparação com maio. A receita líquida do segundo trimestre atingiu NT$85,296 bilhões, crescendo 28,2% em relação ao mesmo período do ano anterior, e a receita do primeiro semestre subiu 23,3% para NT$157,727 bilhões.", "titulo_pt": "Acer registra recorde de receita no segundo trimestre após crescimento em PC e outras áreas", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 48956, "titulo": "India roundup: India's chip strategy tests its ability to build a competitive ecosystem", "url": "https://www.digitimes.com/news/a20260710VL215/india-roundup-semiconductors-electronics-funding-investment-plant.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T23:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Índia está passando de uma fase de planejamento para a execução na estratégia semiconductor, utilizando financiamentos, alterações nas tarifas, aprovações de investimentos estrangeiros e esforços de desenvolvimento regional para construir um ecossistema mais amplo de eletrônicos além da simples montagem.", "titulo_pt": "Resumo da Índia: estratégia semiconductor testa capacidade de construção de um ecossistema competitivo", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 48957, "titulo": "SuperAlloy revenue climbs on recycled aluminum and semiconductor certification progress", "url": "https://www.digitimes.com/news/a20260710PD225/revenue-superalloy-aluminum-certification-2026.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T23:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A receita da SuperAlloy Industrial no mês de junho foi de 749 milhões de NT$ (23,36 milhões de USD), um aumento de 17,93% em comparação com maio e de 21,46% em relação ao mesmo período do ano anterior. A receita do segundo trimestre de 2026 atingiu 1,98 bilhões de NT$, uma elevação de 15,45% em relação a 2025, enquanto a receita do primeiro semestre de 2026 foi de 3,852 bilhões de NT$, um crescimento de 6,02%.", "titulo_pt": "Receita da superalloy cresce com reciclagem de alumínio e certificação em semicondutores", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 48958, "titulo": "Sitronix sees zero-capacitance TDDI and automotive DDI drive growth", "url": "https://www.digitimes.com/news/a20260710PD251/sitronix-tddi-automotive-ddi-growth-revenue.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T23:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa Sitronix Technology prevê que o crescimento em 2026 será impulsionado pela zero-capacitância TDDI e pelo IC DDI para automóveis, após a divulgação de receita sólida no mês de junho e na segunda metade do segundo trimestre. A empresa também indicou que a demanda deve permanecer positiva nos próximos meses.", "titulo_pt": "Sitronix vê crescimento em 2026 com TDDI zero-capacitância e ic DDI para automóveis", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 48959, "titulo": "AI buildouts accelerate MLCC shortages; Taiwan firms eye 2H26 spillover orders", "url": "https://www.digitimes.com/news/a20260710PD250/ai-server-taiwan-revenue-mlcc-market.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T23:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A demanda por componentes passivos de alta gama, especialmente capacitores cerâmicos multilayer (MLCCs), aumentou significativamente com a escalada das cadeias de suprimento de servidores de inteligência artificial. As empresas taiwanesas de componentes passivos apresentaram receita robusta no segundo trimestre de 2026, e estão esperando ganhar pedidos remanescentes de aplicações de servidores de IA na segunda metade do ano.", "titulo_pt": "Desenvolvimentos em AI agravam escassez de MLCC; empresas taiwanesas miram pedidos restantes no segundo semestre de 2026", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 48960, "titulo": "Trio revenue rises on AI server battery backup demand in June", "url": "https://www.digitimes.com/news/a20260710PD240/revenue-demand-2026-high-power-infrastructure.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T23:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A receita da Trio Technology aumentou em junho de 2026, impulsionada pela maior demanda por unidades de backup de bateria usadas em servidores de inteligência artificial, embora o segundo trimestre como um todo tenha continuado a ser pressionado devido à escassez global de memória. A empresa também notou que clientes de notebooks e PCs mantiveram uma certa demanda por reposição de estoque em vigor, empurrando parte do planejamento de envio de eletrônicos consumíveis para junho.", "titulo_pt": "Receita da trio sobe em junho com maior demanda por baterias para servidores de IA", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 48961, "titulo": "Global defense boom unlocks new paths for automakers", "url": "https://www.digitimes.com/news/a20260710PD243/automakers-military-worldwide-certification-policy.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T23:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O aumento dos orçamentos de defesa globais está criando novas oportunidades para fabricantes de automóveis mainstream que buscam diversificar suas operações. No entanto, a entrada no setor militar e de defesa apresenta desafios adicionais, como ciclos de certificação longos, especificações fragmentadas e incertezas relacionadas à continuidade das políticas.", "titulo_pt": "Aumento dos orçamentos de defesa abre novos caminhos para fabricantes de automóveis", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 48962, "titulo": "SK hynix hybrid bonding push signals next phase of HBM packaging race", "url": "https://www.digitimes.com/news/a20260710VL210/hbm-packaging-hbm4-bandwidth-equipment.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T23:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "SK hynix está antecipando a adoção de tecnologia de ligação híbrida para memória de alto banda (HBM) avançada, em resposta à mudança na competição pela memória de inteligência artificial (AI), que agora se concentra mais na densidade de embalagem, controle térmico e integração mais estreita com aceleradores AI.", "titulo_pt": "SK hynix avança com tecnologia de ligação híbrida para próxima fase da corrida por HBM", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 48963, "titulo": "Largan ramps variable aperture lens in 3Q as smartphone demand rebounds", "url": "https://www.digitimes.com/news/a20260710PD245/largan-precision-demand-high-end-smartphone-revenue.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T23:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Largan Precision informou que a demanda por novos smartphones está aumentando na segunda metade do ano. A empresa planeja lançar sua lente de apertura variável no terceiro trimestre, e atualizações de lentes periscópicas estão programadas para 2027.", "titulo_pt": "Largan inicia produção de lente de apertura variável no 3º trimestre com aumento da demanda por smartphones", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 48964, "titulo": "AI shifts toward 'slow thinking' as agent era approaches, says Google DeepMind's VP of research", "url": "https://www.digitimes.com/news/a20260710PD229/google-deepmind-ai-agent-llm.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T23:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ed Chi, vice-presidente de pesquisa da Google DeepMind, afirmou que o próximo marco do desenvolvimento da IA será a evolução de sua capacidade de pensamento rápido e baseado em reconhecimento de padrões para uma maior capacidade de raciocínio. A indústria está agora entrando em uma nova era de agentes de inteligência artificial, com modelos de linguagem grande se transformando em modelos de raciocínio grandes.", "titulo_pt": "IA se dirige para 'pensamento lento' à medida que a era dos agente se aproxima, diz vice-presidente de pesquisa da Google DeepMind", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 48965, "titulo": "Arm CEO: AI agents to drive CPU demand as infrastructure shifts beyond GPUs", "url": "https://www.digitimes.com/news/a20260710PD234/cpu-arm-infrastructure-demand-ceo.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T23:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os GPUs têm dominado as discussões sobre infraestrutura de inteligência artificial nas últimas duas anos, fornecendo suporte para uma variedade de aplicações. No entanto, a indústria está expandindo sua capacidade computacional e CPUs podem estar se tornando cada vez mais importantes na infraestrutura de IA.", "titulo_pt": "CEO da arm: agentes de inteligência artificial vão impulsionar a demanda por CPU à medida que a infraestrutura muda além dos GPUs", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 48936, "titulo": "Heat wave to persist across most of country", "url": "https://en.yna.co.kr/view/AEN20260713003500315", "fonte_id": "yonhap_news", "data_pub": "2026-07-13T01:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma onda de calor persistirá em grande parte do país até o próximo dia útil.", "titulo_pt": "Onda de calor continuará em maior parte do país", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 48894, "titulo": "Expert’s hundreds of warnings foretold Venezuelan quake disaster", "url": "https://www.japantimes.co.jp/news/2026/07/13/world/expert-warnings-venezuela-quake/", "fonte_id": "japan_times", "data_pub": "2026-07-13T01:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Carlos Genatios advertiu durante anos que a reconstrução inadequada após os deslizamentos de terra de 1999 e o continuado desenvolvimento em áreas de alto risco deixaram a região venezuelana vulnerável. Suas centenas de alertas preveem um desastre sequestrador de terremotos.", "titulo_pt": "Cientista advertiu centenas de vezes sobre desastre de terremoto na venezuela", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 48902, "titulo": "Japanese Astronomical Society ex-president Shigeru Ida joins China’s Westlake University", "url": "https://www.scmp.com/news/china/science/article/3360272/japanese-astronomical-society-ex-president-shigeru-ida-joins-chinas-westlake-university?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-13T01:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Shigeru Ida, um teórico da astropfisiologia e ex-presidente da Sociedade Astronômica do Japão, está transferindo sua experiência para a Universidade de Xiamen (Westlake University) na China. Ele tem mais de quatro décadas de pesquisa sobre o origem e evolução dos planetas.", "titulo_pt": "Ex-presidente da sociedade astronômica do Japão Shigeru Ida se junta à universidade de xiamen na China", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 48977, "titulo": "Jellyfish videos reveal why science content sparks curiosity for some viewers", "url": "https://phys.org/news/2026-07-jellyfish-videos-reveal-science-content.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo recente da Universidade de Georgia mostrou que vídeos científicos engraçados e cartunescos podem ser particularmente atraentes para alguns usuários das redes sociais, mas não para todos.", "titulo_pt": "Vídeos de jellyfish revelam por que conteúdos científicos despertam curiosidade em alguns espectadores", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48978, "titulo": "Trees for hotter cities: New approach can bolster community input in meeting targets", "url": "https://phys.org/news/2026-07-trees-hotter-cities-approach-bolster.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo instrumento para planejadores e grupos comunitários pode ajudar a aumentar o plantio de árvores nas cidades. Residentes, políticos e responsáveis por árvores em Cardiff, Milton Keynes, Edinburgh, York e Camden colaboraram com acadêmicos para desenvolver recomendações sobre como crescer mais árvores de maneira que beneficie tanto as pessoas quanto a natureza.", "titulo_pt": "Árvores para cidades mais quentes: novo método pode fortalecer a participação comunitária na atingir metas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48979, "titulo": "Machine learning calibration of biosensors for microcystin toxin monitoring in freshwater", "url": "https://phys.org/news/2026-07-machine-calibration-biosensors-microcystin-toxin.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T22:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Biosensores de eletrodo impresso a mão de carvão (SPCE) oferecem uma forma rápida e econômica de detectar microcistina-licina-arginina (MC-LR), um tóxico extremamente potente produzido por bactérias-cianofíceus durante os blooms algaicos nocivos em águas doce. A Organização Mundial da Saúde estabeleceu um valor guia de 1 microgramo por litro para MC-LR em água potável.", "titulo_pt": "Calibração de aprendizado automático de biosensores para monitoramento de toxinas microcistina em águas doce", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48980, "titulo": "The public isn't bored with economists, management scholars and sociologists but engaging people has conditions", "url": "https://phys.org/news/2026-07-isnt-economists-scholars-sociologists-engaging.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T21:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A afirmação de que o público não encontra a obra dos cientistas sociais, como economistas, estudiosos da administração e sociólogos interessante é questionada. O estudo sugere que há condições para engajar esse público.", "titulo_pt": "O público não se entediu com economistas, estudiosos de administração e sociólogos, mas as condições para envolvê-los existem", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48981, "titulo": "Tiny magnetic 'flowers' could expand how researchers image spintronic materials under stronger fields", "url": "https://phys.org/news/2026-07-tiny-magnetic-image-spintronic-materials.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Materiais com estruturas magnéticas nanoescamosas têm uma ampla variedade de aplicações potenciais. Uma área é a spintrônica, onde dispositivos codificam informações em domínios magnéticos.", "titulo_pt": "Pequenas flores magnéticas poderiam expandir como os pesquisadores imagem materiais spintrônicos sob campos mais fortes", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48571, "titulo": "Tumba de 3.000 anos é descoberta no sul do Egito", "url": "https://exame.com/mundo/tumba-de-3-000-anos-e-descoberta-no-sul-do-egito/", "fonte_id": "exame", "data_pub": "2026-07-12T20:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma tumba de 3.000 anos foi descoberta perto da cidade de Luxor, no sul do Egito. O achado foi realizado por uma expedição holandesa.", "titulo_pt": "Tumba de 3.000 anos é descoberta no sul do Egito", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 48985, "titulo": "STAT+: Tau in the spotlight at Alzheimer’s conference", "url": "https://www.statnews.com/2026/07/12/aaic-in-30-alzheimers-treaatments-focus-on-tau-blood-brain-barrier/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-12T20:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores se concentraram no tau e fizeram progressos na superação da barreira hematoencefálica durante a conferência AAIC. O tau é um foco importante em estudos sobre Alzheimer's.", "titulo_pt": "Tau sob destaque na conferência sobre Alzheimer", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 48982, "titulo": "How simple changes to PowerPoint presentations can make a big difference for learners", "url": "https://phys.org/news/2026-07-simple-powerpoint-big-difference-learners.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "PowerPoint é amplamente utilizado para apresentações educacionais e de treinamento, mas sua eficácia pode ser questionada. Os aprendizes enfrentam dificuldades ao tentar sincronizar as explicações do palestrante com os elementos visuais nas slides.", "titulo_pt": "Como mudanças simples em apresentações PowerPoint podem fazer uma grande diferença para os aprendizes", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48983, "titulo": "New imaging method offers fresh insight into LED materials", "url": "https://phys.org/news/2026-07-imaging-method-fresh-insight-materials.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo método de imagens permitiu identificar pequenas imperfeições cristalinas que podem reduzir a eficiência dos materiais LED. Esse avanço pode auxiliar os cientistas a compreender melhor como essas imperfeições formam, o que eventualmente pode apoiar o desenvolvimento de LEDs mais eficientes.", "titulo_pt": "Novo método de imagens oferece nova perspectiva sobre materiais LED", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48984, "titulo": "Textbook chemistry gains blue-light upgrade to build complex drug molecules in fewer steps", "url": "https://phys.org/news/2026-07-textbook-chemistry-gains-blue-complex.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T19:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A química textbook foi atualizada para incluir luz azul, permitindo a construção de moléculas complexas de medicamentos em menos etapas. No desenvolvimento de medicamentos, a rapidez na construção dessas moléculas é crucial.", "titulo_pt": "Química tradicional recebe atualização com luz azul para construir moléculas de medicamento complexas em poucos passos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48450, "titulo": "Climate change leaves northern tree swallows more vulnerable those in the southern US", "url": "https://phys.org/news/2026-07-climate-northern-tree-swallows-vulnerable.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A pesquisa, liderada por pesquisadores da Cornell University e publicada no Proceedings of the National Academy of Sciences, analisou quase 95.000 ninhos ao longo de cinco décadas e revelou que as golfinhas-águia do norte dos Estados Unidos e Canadá enfrentam o maior risco devido ao aquecimento global, apesar de responderem às temperaturas da mesma forma que as aves no sul dos Estados Unidos.", "titulo_pt": "Mudanças climáticas deixam golfinhas-águia do norte dos EUA e canadá mais vulneráveis em comparação com as do sul", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 48007, "titulo": "Baleias mães ficam de barriga para cima para relaxar, sugere estudo", "url": "https://www.metropoles.com/colunas/e-o-bicho/baleias-maes-ficam-de-barriga-para-cima-para-relaxar-sugere-estudo", "fonte_id": "metropoles", "data_pub": "2026-07-12T18:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo com baleias-francas-austrais observou que as fêmeas assumem uma posição invertida para se relaxarem após as funções da maternidade. O comportamento foi identificado como um método de descanso.", "titulo_pt": "Baleias mães ficam de barriga para cima para se relaxarem, sugere estudo", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 48451, "titulo": "We assessed dozens of programs for men who use violence. Here's what we learned", "url": "https://phys.org/news/2026-07-dozens-men-violence.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T18:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A violência doméstica e familiar é um problema grave, declarado como uma crise nacional pelo primeiro-ministro em 2024. Estudos demonstram que a maioria das agressões são cometidas por homens.", "titulo_pt": "Nós avaliamos várias programas para homens que usam violência. Aqui está o que aprendemos.", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 48899, "titulo": "This 13-year-old learned to play piano in a subdivided flat. Now he’s going on stage", "url": "https://www.scmp.com/news/hong-kong/society/article/3360281/13-year-old-learned-play-piano-subdivided-flat-now-hes-going-stage?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-13T01:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Yang Qi, um aluno de 13 anos que vive em um apartamento subdividido em Hong Kong com os pais, tem estudado piano há vários anos. Ele participará de uma concertação beneficente em outubro no Centro Cultural de Tsim Sha Tsui, que visa arrecadar fundos para combater a pobreza, incluindo apoiar crianças que não têm recursos para desenvolver seus interesses.", "titulo_pt": "Este garoto de 13 anos aprendeu piano em um apartamento subdividido e agora vai se apresentar", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 48766, "titulo": "Australia news live: royal commission witnesses endure ‘ugly antisemitic attacks’ after appearing, Virginia Bell says", "url": "https://www.theguardian.com/australia-news/live/2026/jul/13/australia-news-live-auction-clearances-property-market-richard-scolyer-state-memorial-royal-commission-antisemitism-university-albanese-labor-coalition-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-07-13T01:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Witnesseis de alta administração da educação, acadêmicos e estudantes estão prestes a dar depoimentos no mais recente bloco de audiências. Além disso, há uma diminuição do apoio à Pauline Hanson e ao Partido Uma Nação em nova pesquisa de opinião.", "titulo_pt": "Notícias da austrália vivas: testemunhos enfrentam 'ataques antisemitas brutais' após aparições, diz Virginia Bell", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 48923, "titulo": "BTS reaches 600m views with ‘Life Goes On’ music video", "url": "https://www.koreaherald.com/article/10806628", "fonte_id": "korea_herald", "data_pub": "2026-07-13T01:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O videoclipe da música 'Life Goes On', lançada pelo BTS em 2020, atingiu 600 milhões de visualizações no YouTube conforme informado pela gravadora Big Hit Music. A canção, que faz parte do EP 'Be' e foi principalmente escrita em coreano, alcançou o topo da Billboard Hot 100, uma primeira vez para um single dominante em língua coreana.", "titulo_pt": "BTS atinge 600 milhões de visualizações com asse": "C"}, {"id": 48904, "titulo": "Hong Kong IB students beat the global average this year. Here’s how they did it", "url": "https://www.scmp.com/news/hong-kong/education/article/3360290/hong-kong-ib-students-beat-global-average-year-heres-how-they-did-it?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-13T00:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Hong Kong superou a média global nos exames do International Baccalaureate (IB) este ano, com uma diferença de quase 20%. A cultura intensiva de tutoria e treinamento para exames na cidade contribuiu para o excelente desempenho local.", "titulo_pt": "Alunos de hong Kong superam a média global no IB. Veja como eles fizeram isso", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 48500, "titulo": "Madonna emplaca décimo álbum no topo da Billboard com 'Confessions II'", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/07/madonna-emplaca-decimo-album-no-topo-da-billboard-com-confessions-ii.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-12T23:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Madonna alcançou um novo recorde com o lançamento de 'Confessions II', que chegou ao topo da parada Billboard 200, sendo seu décimo álbum a atingir essa posição e o primeiro na década de 2020.", "titulo_pt": "Madonna conquista décimo álbum no topo da Billboard com 'Confessions II'", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 48731, "titulo": "Chile en las grandes vitrinas mundiales", "url": "https://www.latercera.com/opinion/noticia/chile-en-las-grandes-vitrinas-mundiales/", "fonte_id": "la_tercera", "data_pub": "2026-07-12T23:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O artigo destaca a presença do Chile em vitrines internacionais importantes.", "titulo_pt": "Chile nas grandes vitrinas mundiais", "veicu ulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 48240, "titulo": "Corte de Apelaciones deja en prisión preventiva a imputado que atacó con machete a su expareja en Labranza", "url": "https://www.latercera.com/nacional/noticia/corte-de-apelaciones-deja-en-prision-preventiva-a-imputado-que-ataco-con-machete-a-su-expareja-en-labranza/", "fonte_id": "la_tercera", "data_pub": "2026-07-12T15:27:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um homem que atacou sua ex-parceira com um machado foi mantido em prisão preventiva após a Corte de Apelaciones rejeitar medidas menos restritivas. Inicialmente, o acusado tinha sido liberado com arresto domiciliário e proibição de aproximação, mas a Procuradoria considerou que essas medidas não eram suficientes.", "titulo_pt": "Corte de apelações mantém prisão preventiva de suspeito que atacou ex-parceira com machado em Labranza", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 47925, "titulo": "Quem vai cuidar de você? Brasil envelhece sem se preparar para conta da longevidade", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/quem-vai-cuidar-de-voce-brasil-envelhece-sem-se-preparar-para-conta-da-longevidade.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-12T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil está envelhecendo sem se preparar para as consequências da longevidade, desafiando o modelo tradicional de cuidado familiar. Este sistema, historicamente baseado em filhos e irmãos assumindo responsabilidades de cuidados, começa a perder viabilidade.", "titulo_pt": "Quem vai cuidar de você? Brasil envelhece sem se preparar para conta da longevidade", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 48210, "titulo": "Dorothy’s aged care home charged $52 a day for Foxtel, wine and newspapers that were no use to her. She wasn’t alone", "url": "https://www.theguardian.com/australia-news/2026/jul/13/aged-care-charges-services-regulator-investigation", "fonte_id": "guardian_world", "data_pub": "2026-07-12T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Muitos idosos em casas de repouso na Austrália são cobrados por serviços que eles não podem usar ou entender, levando a uma investigação do regulador. Dorothy, uma residente de casa de repouso, era cobrada $52 diariamente por Foxtel, saídas, jornais e vinhos, embora nenhum desses serviços fossem úteis para ela.", "titulo_pt": "Casa de repouso na austrália cobra idosa por serviços inúteis", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 47528, "titulo": "RJ: Polícia investiga cinco mortes após confronto entre facções em Cordovil", "url": "https://www.cnnbrasil.com.br/nacional/sudeste/rj/rj-policia-investiga-cinco-mortes-apos-confronto-entre-faccoes-em-cordovil/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-12T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Civil do Rio de Janeiro investiga cinco mortes ocorridas durante um confronto entre facções no bairro de Cordovil. As vítimas não foram identificadas e a ocorrência segue em andamento.", "titulo_pt": "RJ: polícia investiga cinco mortes após confronto entre facções em Cordovil", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 48765, "titulo": "At least 27 killed in fire at Bangkok pub with another 22 critically injured", "url": "https://www.theguardian.com/world/2026/jul/12/at-least-27-killed-in-blaze-at-bangkok-pub-thai-officials-say", "fonte_id": "guardian_world", "data_pub": "2026-07-13T01:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio em um pub popular na capital tailandesa, Bangkok, resultou na morte de 27 pessoas e deixou outras 22 em estado crítico. O incidente é considerado um dos mais letais desse tipo no destino turístico recentemente.", "titulo_pt": "Pelo menos 27 mortos em incêndio em pub de Bangkok, com outros 22 em estado crítico", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 48823, "titulo": "Major fire rages in Fontainebleau forest near Paris", "url": "https://www.lemonde.fr/en/environment/article/2026/07/13/major-fire-rages-in-fontainebleau-forest-near-paris_6755419_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-13T00:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio florestal de grande escala atingiu a região do Fontainebleau, perto de Paris, com cerca de 400 bombeiros trabalhando para controlar as chamas. O fogo começou apenas algumas horas antes do feriado nacional de 14 de julho e coincidiu com o início das férias de verão.", "titulo_pt": "Grande incêndio florestal assola região perto de Paris", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 48896, "titulo": "Europe recorded 10,000 excess deaths during late-June heat wave, data show", "url": "https://www.japantimes.co.jp/environment/2026/07/13/climate-change/europe-excess-deaths-heatwave/", "fonte_id": "japan_times", "data_pub": "2026-07-12T23:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Foram registradas 10.000 mortes a mais na Europa durante o calor intenso no final de junho, e quase todas as vítimas (mais de 9.000) eram pessoas com 65 anos ou mais.", "titulo_pt": "Europa registrou 10.000 mortes a mais durante a onda de calor no fim de junho, maioria entre idosos", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 48708, "titulo": "Dengue: tras un inesperado aumento de casos y ante la amenaza de El Niño, buscan intensificar la prevención", "url": "https://www.lanacion.com.ar/sociedad/dengue-tras-un-inesperado-aumento-de-casos-buscan-intensificar-la-prevencion-ante-la-amenaza-de-el-nid12072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-12T23:00:00Z", "idioma": "es", "pro urce=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-12T20:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio explosivo em um pub popular em Bangkok, Tailândia, resultou na morte de 27 pessoas e deixou outras 22 em estado crítico. O primeiro-ministro Anutin Charnvirakul visitou o local do acidente, que ocorreu por volta da meia-noite no último domingo.", "titulo_pt": "Pelo menos 27 mortos e 22 criticamente feridos após incêndio em pub de Bangkok", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 48914, "titulo": "Parts of UK at ‘exceptional’ risk of wildfires as heatwave goes on", "url": "https://www.scmp.com/news/world/europe/article/3360299/parts-uk-exceptional-risk-wildfires-heatwave-goes?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-12T19:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Partes do Reino Unido estão sob risco excepcional de incêndios florestais devido à estação quente que se prolonga, alertaram os especialistas. Áreas no sul da Inglaterra e Midlands são consideradas as mais afetadas.", "titulo_pt": "Partes do reino unido em 'risco excepcional' de incêndios florestais durante onda de calor", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 48046, "titulo": "China: tufão Bavi enfraquece, mas ainda provoca ventos fortes e chuva", "url": "https://www.infomoney.com.br/mundo/china-tufao-bavi-enfraquece-mas-ainda-provoca-ventos-fortes-e-chuva/", "fonte_id": "infomoney", "data_pub": "2026-07-12T18:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O tufão Bavi enfraqueceu, mas ainda causa ventos fortes e chuva na China. Mais de 2,2 milhões de pessoas foram evacuadas no Zhejiang devido ao tufão.", "titulo_pt": "Tufão Bavi enfraquece, mas ainda provoca ventos fortes e chuva", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 47981, "titulo": "Vídeo: Com ventos de 145 km/h, supertufão Bavi
