<style>
  :root {
    --bg: #0e1116; --panel: #161b24; --panel2: #1d2430; --border: #2a3342;
    --texto: #e6e9ef; --texto2: #9aa5b5; --acento: #e8a849; --acento2: #5fb3a3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto); font: 15px/1.55 "Segoe UI", system-ui, sans-serif; }
  header { padding: 22px 28px 14px; border-bottom: 1px solid var(--border);
           display: flex; flex-wrap: wrap; align-items: baseline; gap: 14px; }
  header h1 { font-size: 21px; font-weight: 600; letter-spacing: .3px; }
  header h1 span { color: var(--acento); }
  header .sub { color: var(--texto2); font-size: 13px; }
  nav { display: flex; flex-wrap: wrap; gap: 4px; padding: 10px 24px 0; border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2); padding: 10px 14px; cursor: pointer;
               font-size: 14px; border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--acento); border-bottom-color: var(--acento); }
  nav button:hover { color: var(--texto); }
  main { padding: 24px 28px 60px; max-width: 1180px; margin: 0 auto; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 26px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .card .num { font-size: 28px; font-weight: 700; color: var(--acento); }
  .card .rot { color: var(--texto2); font-size: 12.5px; margin-top: 2px; }
  h2 { font-size: 17px; margin: 28px 0 14px; color: var(--acento2); font-weight: 600;
       padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  /* sumário narrativo */
  .sumario { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
             padding: 18px 20px; margin-bottom: 14px; line-height: 1.75; }
  .sumario p { margin-bottom: 10px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; padding: 12px 0; }
  /* drill-down: artigos individuais */
  .drill-toggle { background: none; border: 1px solid var(--border); color: var(--texto2);
                  border-radius: 6px; padding: 5px 12px; font-size: 12.5px; cursor: pointer;
                  margin-bottom: 10px; }
  .drill-toggle:hover { color: var(--texto); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }
  .item { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
          padding: 14px 16px; margin-bottom: 10px; }
  .item h3 { font-size: 14.5px; margin-bottom: 5px; }
  .item .meta { font-size: 12px; color: var(--texto2); display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 7px; }
  .tag { background: var(--panel2); border: 1px solid var(--border); border-radius: 20px; padding: 1px 9px; }
  .corpo p { color: var(--texto); font-size: 13.5px; line-height: 1.6; }
  a { color: var(--acento2); text-decoration: none; } a:hover { text-decoration: underline; }
  .vazio { color: var(--texto2); font-style: italic; padding: 12px 0; }
  /* filtros por botão-pill */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
  .filtros-secao button { background: var(--panel); border: 1px solid var(--border); color: var(--texto2);
                          border-radius: 20px; padding: 5px 15px; font-size: 13px; cursor: pointer; }
  .filtros-secao button.ativo { background: var(--acento2); border-color: var(--acento2);
                                 color: #0e1116; font-weight: 600; }
  .filtros-secao button:hover:not(.ativo) { color: var(--texto); }
  .noticia { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 2px; }
</style>
</head>

<script>
const D = {"gerado_em": "17/06/2026 23:41", "stats": {"noticias_total": 1280, "resumos_total": 64, "sem_topico": 0, "ultima_coleta": "2026-06-17T13:18:12Z"}, "rotulos_topico": {"politica_nacional": "Política Nacional", "politica_internacional": "Política Internacional", "cultura": "Cultura", "ciencia_tecnologia": "Ciência & Tecnologia"}, "topicos": ["politica_nacional", "politica_internacional", "cultura", "ciencia_tecnologia"], "sinteses": {"ciencia_tecnologia": "A Amazon anunciou uma série de descontos antecipados com produtos da Apple, incluindo auriculares sem fio e relógios inteligentes, como parte das promoções para o Prime Day que ocorrerá em 23 de junho. Em outro desenvolvimento na área tecnológica, a Solar Foods recebeu um pacote de financiamento no valor de €77,8 milhões para apoiar a construção da Factory 02, expandindo suas operações. A empresa também enfrenta ameaças de hackers que afirmam ter roubado dados sensíveis e consideram vender parte desses dados. O Thread Direct, uma nova funcionalidade do protocolo de rede inteligente Thread, promete simplificar a configuração de dispositivos sem a necessidade de um roteador border, facilitando a vida dos usuários de smart home.", "cultura": "O Festival Internacional de Animação de Annecy, que ocorre anualmente em junho, está se preparando para uma edição histórica em 2026. Com mais de 18.300 participantes confirmados de 118 países e o primeiro a receber o Class A status reconhecido pela International Federation of Film Producers Association, o evento promete ser um marco na indústria da animação global. O Marché International du Film d’Animation (MIFA) também está se adaptando à nova realidade econômica, apostando em estratégias como a fusão de IPs e o uso de inteligência artificial para atrair investidores internacionais, mesmo diante de uma crise de financiamento na indústria da animação. Além disso, o Festival de Annecy anunciou que sua edição de 2026 será marcada por um forte foco em crescimento global e inovação tecnológica.", "politica_internacional": "O Departamento de Justiça dos Estados Unidos pediu a um juiz para interromper o primeiro programa de reparações para afrodescendentes na história do país, em Evanston, Illinois. A cidade reservou 10 milhões de dólares das taxas de venda de cannabis para beneficiar residentes negros locais, mas o governo Trump argumenta que isso é 'discriminatório racialmente' e anti-constitucional. Em outro desenvolvimento, a Organização para a Segurança Coletiva da Europa (OSCE) está preparada para supervisionar um possível alto-félicito em Ucrânia, embora não tenha fornecido detalhes adicionais sobre a situação. Além disso, o euro registrou uma valorização significativa na sessão de 17 de junho no mercado de câmbio de Cuba.", "politica_nacional": "Lula concentra esforços para avançar três pautas importantes no Senado antes do recesso, incluindo o fim da escala 6×1, marco dos minerais críticos e PEC da Segurança, dependendo de um diálogo retomado com Davi Alcolumbre. O presidente também enfrenta desafios políticos, como a investigação que revela que o banqueiro Vorcaro financiou viagens do senador Ciro Nogueira no valor de quase R$ 470 mil e repasses mensais que podem somar mais de R$ 6 milhões. Além disso, o IBC-Br registrou uma expansão de 0,5% em abril, reforçando a resiliência da economia, enquanto o Banco Central informou que a prévia do PIB subiu 0,5% no mesmo mês, com variações positivas nos setores industrial e dos serviços."}, "resumo_do_dia": {"politica_nacional": [{"id": 81, "titulo": "‘Pacote de mimos’: tudo o que Vorcaro bancou para Ciro Nogueira, segundo a PF", "url": "https://veja.abril.com.br/brasil/pacote-de-mimos-tudo-o-que-vorcaro-bancou-para-ciro-nogueira-segundo-a-pf/", "fonte_id": "veja", "data_pub": "2026-06-17T13:15:00Z", "texto_pt": "Uma investigação da Polícia Federal revela que o banqueiro Vorcaro financiou viagens do senador Ciro Nogueira no valor de quase R$ 470 mil e repasses mensais que podem somar mais de R$ 6 milhões.", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 1, "titulo": "Frio persiste com risco de geada no Sul e Sudeste", "url": "https://www.cartacapital.com.br/clima/frio-persiste-com-risco-de-geada-no-sul-e-sudeste/", "fonte_id": "cartacapital", "data_pub": "2026-06-17T13:06:00Z", "texto_pt": "O frio persiste com risco de geada no Sul e Sudeste do Brasil. O Norte do país registra maiores volumes de chuva.", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 2, "titulo": "A um mês do recesso, Lula concentra esforços em três pautas no Senado", "url": "https://www.cartacapital.com.br/politica/a-um-mes-do-recesso-lula-concentra-esforcos-em-tres-pautas-no-senado/", "fonte_id": "cartacapital", "data_pub": "2026-06-17T13:01:00Z", "texto_pt": "Lula concentra esforços para avançar em três pautas importantes no Senado antes do recesso: fim da escala 6×1, marco dos minerais críticos e PEC da Segurança. O sucesso desses esforços depende da retomada do diálogo entre o presidente e Davi Alcolumbre.", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 46, "titulo": "Prêmio Nacional de Educação Fiscal abre inscrições para jornalistas", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/blogs/novo-em-folha/2026/06/premio-nacional-de-educacao-fiscal-abre-inscricoes-para-jornalistas.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-17T13:00:00Z", "texto_pt": "As inscrições para o Prêmio Nacional de Educação Fiscal estão abertas até 30 de junho e visam reconhecer reportagens sobre tributação, controle social e qualidade do gasto público. Podem participar jornalistas com trabalhos publicados em veículos impressos, rádio, televisão ou internet entre 1º de dezembro de 2025 e a data da inscrição.", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 71, "titulo": "Brasília quer ser o “Vale do Silício do Cerrado”, diz governadora", "url": "https://www.poder360.com.br/poder-tech/brasilia-quer-ser-o-vale-do-silicio-do-cerrado-diz-governadora/", "fonte_id": "poder360", "data_pub": "2026-06-17T12:57:00Z", "texto_pt": "A governadora Celina Leão afirmou que o Distrito Federal busca se tornar uma região de tecnologia similar ao Vale do Silício, com foco na atração de empresas de tecnologia, data centers e investimentos em inovação.", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 47, "titulo": "Governo do DF dá calote de R$ 17 milhões em Confederação Brasileira de Vôlei", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/governo-do-df-da-calote-de-r-17-milhoes-em-confederacao-brasileira-de-volei.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-17T12:50:00Z", "texto_pt": "O Governo do Distrito Federal não honrou um compromisso financeiro com a Confederação Brasileira de Vôlei, deixando de pagar R$ 17 milhões para cobrir custos de jogos realizados na capital federal. A maior parte desse valor se refere ao evento da Liga das Nações de Voleibol (VNL), que ocorreu em junho.", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 72, "titulo": "EUA tentam levar mãe de Vozinha à Copa", "url": "https://www.poder360.com.br/copa-2026/eua-tentam-levar-mae-de-vozinha-a-copa/", "fonte_id": "poder360", "data_pub": "2026-06-17T12:40:00Z", "texto_pt": "O Departamento de Estado dos Estados Unidos está buscando a família da goleira Vozinha com o objetivo de participar da Copa do Mundo feminina. A mãe de Vozinha ainda precisa obter um passaporte para poder viajar.", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 3, "titulo": "Presos por morte de jovem em rope jump são transferidos para presídio de Guarulhos", "url": "https://www.cartacapital.com.br/justica/presos-por-morte-de-jovem-em-rope-jump-sao-transferidos-para-presidio-de-guarulhos/", "fonte_id": "cartacapital", "data_pub": "2026-06-17T12:38:00Z", "texto_pt": "Três homens presos suspeitos da morte de Maria Eduarda Rodrigues de Freitas durante um rope jump não conseguiram explicar os erros que levaram à sua queda, segundo depoimentos.", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}], "politica_internacional": [{"id": 686, "titulo": "‘Not final’: Trump flips again on Iran deal, plans press conference in France", "url": "https://www.scmp.com/news/china/diplomacy/article/3357465/not-final-trump-flips-again-iran-deal-plans-press-conference-france?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-17T13:20:00Z", "texto_pt": "O presidente dos Estados Unidos, Donald Trump, declarou que o recente acordo com a Iran não está ainda finalizado e continua sendo uma proposta em negociação. Ele alertou que se não estiver satisfeito com os termos finais, as relações podem deteriorar-se rapidamente, levando potencialmente a conflitos militares ativos.", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 191, "titulo": "Extorsión golpea al transporte en el Callao: queman cúster y balean combi con pasajeros", "url": "https://www.infobae.com/peru/2026/06/17/extorsion-golpea-al-transporte-en-el-callao-queman-custer-y-balean-combi-con-pasajeros/", "fonte_id": "infobae", "data_pub": "2026-06-17T13:18:00Z", "texto_pt": "Empresas que operam a rota entre Callao e Ventanilla relatam meses de ameaças, cartas extorsivas e amedrontamentos. Recentemente, ocorreram atos de violência, com o incêndio de um cúster e a baleação de uma combi em serviço.", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 192, "titulo": "Mónica García: La ley de la eutanasia funciona, de 75 prestaciones en 2021 a medio millar", "url": "https://www.infobae.com/espana/agencias/2026/06/17/monica-garcia-la-ley-de-la-eutanasia-funciona-de-75-prestaciones-en-2021-a-medio-millar/", "fonte_id": "infobae", "data_pub": "2026-06-17T13:18:00Z", "texto_pt": "A lei de eutanasia em Bélgica registrou um aumento significativo no número de prestações desde 2021, passando de 75 para mais de 500 até o momento indicado.", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 193, "titulo": "Empresa de transporte sufrió tercer atentado extorsivo en el Callao", "url": "https://www.infobae.com/peru/2026/06/17/empresa-de-transporte-sufrio-tercer-atentado-extorsivo-en-el-callao/", "fonte_id": "infobae", "data_pub": "2026-06-17T13:18:00Z", "texto_pt": "Sicarios em motocicleta interceptaram uma unidade de transporte e dispararam pelo menos sete vezes na frente de uma guardería no Callao. Trata-se do terceiro atentado extorsivo contra a empresa neste local.", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 194, "titulo": "'La que se avecina','Operación Triunfo' y 'LOL' con Georgina, entre las novedades de Prime", "url": "https://www.infobae.com/espana/agencias/2026/06/17/la-que-se-avecinaoperacion-triunfo-y-lol-con-georgina-entre-las-novedades-de-prime/", "fonte_id": "infobae", "data_pub": "2026-06-17T13:18:00Z", "texto_pt": "As séries 'La que se avecina', 'Operación Triunfo' e 'LOL' com Georgina estão entre as novidades programadas para serem lançadas na plataforma Prime.", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 481, "titulo": "Trump administration asks judge to halt first reparations program for Black people in US", "url": "https://thehill.com/regulation/court-battles/5927763-justice-department-evanston-reparations-housing-discrimination/", "fonte_id": "the_hill", "data_pub": "2026-06-17T13:18:00Z", "texto_pt": "O Departamento de Justiça dos EUA pediu a um juiz para intervir em uma ação judicial contra um programa de reparações imobiliárias em Evanston, Illinois. A cidade reservou 10 milhões de dólares provenientes das taxas de vendas de cannabis para beneficiar residentes negros localmente, mas o governo Trump argumenta que isso é 'discriminatório racialmente' e anti-constitucional.", "veiculo": "The Hill", "pais": "EUA", "classe": "B"}, {"id": 195, "titulo": "Robles destaca el compromiso de España con la seguridad colectiva en el ejercicio MILEX 26", "url": "https://www.infobae.com/espana/agencias/2026/06/17/robles-destaca-el-compromiso-de-espana-con-la-seguridad-colectiva-en-el-ejercicio-milex-26/", "fonte_id": "infobae", "data_pub": "2026-06-17T13:17:00Z", "texto_pt": "Robles enfatizou o compromisso da Espanha com a segurança coletiva durante o exercício MILEX 26. O evento destaca a cooperação militar entre países participantes.", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 196, "titulo": "Un episodio persistente de mucho calor elevará desde el domingo el peligro de incendios", "url": "https://www.infobae.com/espana/agencias/2026/06/17/un-episodio-persistente-de-mucho-calor-elevara-desde-el-domingo-el-peligro-de-incendios/", "fonte_id": "infobae", "data_pub": "2026-06-17T13:17:00Z", "texto_pt": "Um episódio persistente de calor intenso está elevando o risco de incêndios a partir do domingo. As condições climáticas desfavoráveis estão aumentando as preocupações relacionadas aos incêndios florestais e agrícolas.", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}], "cultura": [{"id": 1248, "titulo": "Annecy’s MIFA Bets on Cross-IP, AI and Global Growth Amid Animation Financing Squeeze", "url": "https://variety.com/2026/film/focus/annecys-mifa-2026-1236782136/", "fonte_id": "variety", "data_pub": "2026-06-17T13:20:00Z", "texto_pt": "O Festival de Annecy continuará a crescer mesmo com uma contracção na indústria da animação - um contraste que definirá o Marché International du Film d’Animation (MIFA) neste ano, que ocorre de 23 a 26 de junho. Segundo a diretora do MIFA, Véronique Encrenaz, o que se chama de crise na animação é essencialmente uma crise de financiamento.", "veiculo": "Variety", "pais": "EUA", "classe": "B"}, {"id": 1249, "titulo": "Box Office: ‘Toy Story 5’ Eyes Record $150 Million-Plus Opening Weekend", "url": "https://variety.com/2026/film/box-office/toy-story-5-box-office-opening-weekend-estimates-1236782521/", "fonte_id": "variety", "data_pub": "2026-06-17T13:15:00Z", "texto_pt": "Toy Story 5", "veiculo": "Variety", "pais": "EUA", "classe": "B"}, {"id": 1250, "titulo": "‘Minions & Monsters’ Opens Annecy 2026 as Festival Eyes Record Crowds, New Class A Status and a Global Animation Spotlight", "url": "https://variety.com/2026/film/focus/annecy-2026-1236782107/", "fonte_id": "variety", "data_pub": "2026-06-17T13:15:00Z", "texto_pt": "O Festival Internacional de Animação de Annecy anunciou que sua edição de 2026, marcada para junho, será historicamente significativa com mais de 18.300 participantes confirmados de 118 países. Este evento será o primeiro a ser reconhecido pela International Federation of Film Producers Association como tendo Class A status.", "veiculo": "Variety", "pais": "EUA", "classe": "B"}, {"id": 266, "titulo": "Lionel Messi hizo tres goles, quedó en la historia de los Mundiales y alimentó la fe de un equipo en reconstrucción", "url": "https://www.lanacion.com.ar/deportes/futbol/lionel-messi-hizo-tres-goles-quedo-en-la-historia-de-los-mundiales-y-alimento-la-fe-de-un-equipo-en-nid17062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-17T13:13:00Z", "texto_pt": "A seleção argentina venceu a Argélia por 3-0, com três gols marcados pelo jogador número 10 Lionel Messi. O resultado fortalece o time durante sua reconstrução e consolida a história do atleta nas Copas do Mundo.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 267, "titulo": "Un verdadero héroe nacional: ¿quién fue y qué hizo Martín Miguel de Güemes?", "url": "https://www.lanacion.com.ar/sociedad/un-verdadero-heroe-nacional-quien-fue-y-que-hizo-martin-miguel-de-guemes-nid15062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-17T13:13:00Z", "texto_pt": "Martín Miguel de Güemes é lembrado por sua contribuição na luta pela independência do território nacional. Durante sua breve vida, liderou um exército conhecido como Los Infernales na causa independence.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 268, "titulo": "Juicio por Loan: la insólita excusa del imputado que no se presentó en la primera audiencia", "url": "https://www.lanacion.com.ar/seguridad/juicio-por-loan-la-insolita-excusa-del-imputado-que-no-se-presento-en-la-primera-audiencia-nid17062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-17T13:12:00Z", "texto_pt": "O Tribunal Oral Federal de Corrientes determinou a detenção do psicólogo Esteban Rossi Colombo, acusado no caso Loan, após ele não comparecer à primeira audiência. Rossi Colombo se conectou por videoconferência desde Tucumán.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 269, "titulo": "Mundial 2026: los medios internacionales se hacen eco de la actuación de Messi ante Argelia", "url": "https://www.lanacion.com.ar/deportes/futbol/mundial-2026-los-medios-internacionales-se-hacen-eco-de-la-actuacion-de-messi-ante-argelia-nid17062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-17T13:12:00Z", "texto_pt": "Os principais meios internacionais destacaram a atuação de Messi como fundamental para a vitória da Argentina contra Argélia, utilizando termos como 'fenômeno', 'rey' e 'goles magistrais'.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 270, "titulo": "Mundial 2026: Haaland habló de Messi tras su actuación con la selección ante Argelia", "url": "https://www.lanacion.com.ar/deportes/futbol/mundial-2026-haaland-hablo-de-messi-tras-su-actuacion-con-la-seleccion-ante-argelia-nid17062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-17T13:10:00Z", "texto_pt": "O jogador norueguês Erling Haaland, após o jogo contra Argélia onde Lionel Messi marcou três gols pela seleção argentina, escreveu em sua conta do Snapchat que Messi é 'um demente'.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}], "ciencia_tecnologia": [{"id": 771, "titulo": "The best Apple deals you can already get ahead of Prime Day", "url": "https://www.theverge.com/gadgets/949350/amazon-prime-day-sale-best-apple-deals-2026", "fonte_id": "the_verge", "data_pub": "2026-06-17T13:21:00Z", "texto_pt": "A partir do dia 23 de junho, a Amazon realizará o seu Prime Day, mas já estão surgindo algumas promoções notáveis com produtos da Apple. Varejistas como Walmart e Amazon estão oferecendo descontos significativos em itens como auriculares sem fio e relógios inteligentes antes do evento de vendas.", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 1038, "titulo": "Solar Foods wins €77.8M funding package for Factory 02 expansion", "url": "https://tech.eu/2026/06/17/solar-foods-wins-77-8m-funding-package-for-factory-02-expansion/", "fonte_id": "tech_eu", "data_pub": "2026-06-17T13:12:00Z", "texto_pt": "Solar Foods recebeu um pacote de financiamento no valor de €77,8 milhões, composto por uma subvenção de €39,6 milhões e um empréstimo de €38,1 milhões, para apoiar a construção e comissionamento da Factory 02.", "veiculo": "Tech.eu", "pais": "Bélgica", "classe": "B"}, {"id": 871, "titulo": "STAT+: Pharmalittle: We’re reading about hackers extorting Novo, an FDA about-face, and more", "url": "https://www.statnews.com/pharmalot/2026/06/17/hackers-extorting-novo-fda-about-face-on-uniqure-drug/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-17T13:09:00Z", "texto_pt": "Um grupo de hackers afirmou ter roubado mais de um terabyte de dados da Novo Nordisk e está considerando vender parte desses dados.", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 772, "titulo": "Got Thread problems? There’s an app for that", "url": "https://www.theverge.com/tech/949001/thread-network-diagnostic-tools-app-troubleshooting-matter-smart-home", "fonte_id": "the_verge", "data_pub": "2026-06-17T13:00:00Z", "texto_pt": "O aplicativo Diagnostics Tools da Thread Networks, desenvolvido pela Thread Group, responsável pelos protocolos de IoT sem fio, foi lançado em beta hoje. O app, disponível para iOS e já no alpha para Android há algumas semanas, oferece a primeira ferramenta dedicada para visualizar redes smart home baseadas em Thread.", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 773, "titulo": "Jackery announces ‘world’s slimmest’ fridge battery", "url": "https://www.theverge.com/tech/949683/jackery-fridgeguard-worlds-slimmest-fridge-battery", "fonte_id": "the_verge", "data_pub": "2026-06-17T13:00:00Z", "texto_pt": "Jackery lançou o FridgeGuard, descrito como a 'mais fina' bateria-refrigeradora do mundo. Diferente das estações de energia tradicionais, que geralmente remetem a ambientes profissionais, essa nova opção é projetada para ser mais estética e adequada para uso doméstico.", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 774, "titulo": "Thread Direct looks to solve Matter’s biggest setup headache", "url": "https://www.theverge.com/tech/950732/thread-direct-thread-2-0-smart-home-apple-google", "fonte_id": "the_verge", "data_pub": "2026-06-17T13:00:00Z", "texto_pt": "O protocolo de rede inteligente Thread está introduzindo uma nova maneira de configurar dispositivos sem a necessidade de um roteador Thread border. A funcionalidade, chamada Thread Direct, permite que os usuários configurem dispositivos com suporte ao Thread - como tomadas inteligentes e travessas inteligentes - usando apenas um telefone ou dispositivo móvel equipado com uma radiofrequência Thread.", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 775, "titulo": "GuliKit’s new mobile Switch 2 dock lets you play with or without a TV", "url": "https://www.theverge.com/tech/950827/gulikit-tv-docking-station-switch-2-oled-console-hdmi", "fonte_id": "the_verge", "data_pub": "2026-06-17T13:00:00Z", "texto_pt": "GuliKit lançou uma nova versão de sua TV Docking Station que agora suporta o Switch 2, além das versões anteriores do console, incluindo a original e o modelo OLED. O novo dock mantém um design semelhante ao da primeira geração.", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 776, "titulo": "Google’s first smart speaker in six years arrives next week", "url": "https://www.theverge.com/tech/951147/google-home-speaker-gemini-launch-date-price-specs-features", "fonte_id": "the_verge", "data_pub": "2026-06-17T13:00:00Z", "texto_pt": "O primeiro novo alto-falante inteligente da Google em seis anos começa a ser enviado no dia 29 de junho, perdendo o lançamento previsto para o primavera. As pré-vendas do Google Home Speaker começam hoje, 17 de junho. Nenhuma mudança foi feita no hardware desde que o alto-falante de R$99 foi anunciado há nove meses, mantendo sua designação ligeiramente alongada e botões tácteis.", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}]}, "noticias": [{"id": 771, "fonte_id": "the_verge", "titulo": "The best Apple deals you can already get ahead of Prime Day", "url": "https://www.theverge.com/gadgets/949350/amazon-prime-day-sale-best-apple-deals-2026", "data_pub": "2026-06-17T13:21:00Z", "topico": "ciencia_tecnologia", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 686, "fonte_id": "scmp", "titulo": "‘Not final’: Trump flips again on Iran deal, plans press conference in France", "url": "https://www.scmp.com/news/china/diplomacy/article/3357465/not-final-trump-flips-again-iran-deal-plans-press-conference-france?utm_source=rss_feed", "data_pub": "2026-06-17T13:20:00Z", "topico": "politica_internacional", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 1248, "fonte_id": "variety", "titulo": "Annecy’s MIFA Bets on Cross-IP, AI and Global Growth Amid Animation Financing Squeeze", "url": "https://variety.com/2026/film/focus/annecys-mifa-2026-1236782136/", "data_pub": "2026-06-17T13:20:00Z", "topico": "cultura", "veiculo": "Variety", "pais": "EUA", "classe": "B"}, {"id": 191, "fonte_id": "infobae", iculo": "The Intercept", "pais": "EUA", "classe": "B"}, {"id": 344, "fonte_id": "the_atlantic", "titulo": "Trump in Defeat", "url": "https://www.theatlantic.com/national-security/2026/06/trump-defeat-iran-war/687566/?utm_source=feed", "data_pub": "2026-06-17T09:00:00Z", "topico": "cultura", "veiculo": "The Atlantic", "pais": "EUA", "classe": "B"}]};
const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => `<div class="item">
           <h3><a href="${esc(n.url)}" target="_blank">${esc(n.titulo)}</a></h3>
           <div class="meta">
             <span class="tag">${esc(n.veiculo)}</span>
             ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             ${n.classe ? `<span class="tag">${esc(n.classe)}</span>` : ""}
           </div>
           <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
         </div>`).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
      <div class="card"><div class="num">${st.sem_topico}</div><div class="rot">aguardando classificação</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const rot = n.topico ? (D.rotulos_topico[n.topico] || n.topico) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      return `<div class="noticia" data-topico="${esc(n.topico || '')}">
        <a href="${esc(n.url)}" target="_blank">${esc(n.titulo)}</a>
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
ativar("resumo");
</script>
