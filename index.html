<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>
</head>

cidades brasileiras.", "politica_internacional": "A política internacional recentemente teve vários desenvolvimentos significativos. Na Europa, a decisão do presidente da Polônia, Karol Nawrocki, de revogar o título de cidadão honorário ao presidente ucraniano Volodymyr Zelenskyy gerou tensões diplomáticas e protestos. Em outro conflito regional, o Irã retirou sua participação nas conversas sobre um acordo de paz com os Estados Unidos após operações israelenses no Líbano, mas pouco depois Israel e Hezbollah concordaram em cessar fogo. Nos Estados Unidos, Donald Trump recebeu um novo avião presidencial do Catar avaliado em 400 milhões de dólares, o qual enfrenta controvérsias éticas. Em outro incidente ferroviário a norte de Londres, pelo menos uma pessoa morreu e várias ficaram gravemente feridas.", "politica_nacional": "O presidente Luiz Inácio Lula da Silva enfrenta novos desafios políticos e legais. O ministro Alexandre de Moraes autorizou que Lula preste depoimento à Polícia Civil em relação a uma arma apreendida, o que pode influenciar na avaliação do governo. Além disso, a Polícia Federal investiga o senador Jaques Wagner (PT-BA) na 9ª fase da Operação Compliance Zero, com o ex-ministro Fernando Haddad defendendo a legalidade das ações. Em outro front, o presidente dos Estados Unidos, Donald Trump, criticou Lula, chamando-o de 'muito volátil', em entrevistas recentes."}, "resumo_do_dia": {"politica_nacional": [{"id": 6339, "titulo": "Trump no Salão dos Espelhos", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/demetriomagnoli/2026/06/trump-no-salao-dos-espelhos.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T22:46:00Z", "idioma": "pt", "texto_pt": "O Tratado de Versalhes, assinado em 1919, estabeleceu as condições da rendição alemã após a Grande Guerra. Em 2018, o governo Trump firmou um Memorando de Entendimento oferecendo uma rendição condicional ao Irã, com a cerimônia prevista para ocorrer em um resort suíço.", "titulo_pt": "Trump no Salão dos Espelhos", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6340, "titulo": "Cidade paulista poderá seguir sem prefeito após duas eleições", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/cidade-paulista-podera-seguir-sem-prefeito-apos-duas-eleicoes.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T21:50:00Z", "idioma": "pt", "texto_pt": "A cidade de Tuiuti, com 7.000 habitantes, terá a segunda eleição para prefeito desde outubro de 2024 e corre o risco de permanecer sem chefe do Executivo municipal.", "titulo_pt": "Cidade paulista pode ficar sem prefeito após duas eleições", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6341, "titulo": "Moraes autoriza depoimento de Bolsonaro à Polícia Civil sobre arma apreendida", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/blogs/brasilia-hoje/2026/06/moraes-autoriza-depoimento-de-bolsonaro-a-policia-civil-sobre-arma-apreendida.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T21:28:00Z", "idioma": "pt", "texto_pt": "O ministro Alexandre de Moraes, do STF, permitiu que Jair Bolsonaro preste depoimento à Polícia Civil em relação ao caso da apreensão de uma arma em seu nome. O depoimento será realizado na próxima terça-feira (23) na residência do ex-presidente.", "titulo_pt": "Moraes autoriza depoimento de Bolsonaro sobre arma apreendida", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6342, "titulo": "Trump diz que Lula é 'muito volátil' e que não se importa com ele", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/trump-diz-que-lula-e-muito-volatil-e-que-nao-se-importa-com-ele.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T21:18:00Z", "idioma": "pt", "texto_pt": "O presidente dos EUA, Donald Trump, declarou em entrevista que o ex-presidente Luiz Inácio Lula da Silva é 'muito volátil' e manifestou não se importar com o atual presidente brasileiro.", "titulo_pt": "Trump afirma que Lula é 'muito volátil' e não se importa com ele", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6352, "titulo": "Moraes autoriza Polícia Civil a ouvir Bolsonaro na prisão domiciliar sobre arma apreendida em blitz", "url": "https://g1.globo.com/df/distrito-federal/noticia/2026/06/19/moraes-autoriza-policia-civil-a-ouvir-bolsonaro-na-prisao-domiciliar-sobre-arma-apreendida-em-blitz-no-df.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T21:03:00Z", "idioma": "pt", "texto_pt": "O ministro Alexandre de Moraes, do STF, permitiu que a Polícia Civil do Distrito Federal ouça o ex-presidente Jair Bolsonaro em relação à arma de fogo apreendida durante uma blitz. A pistola estava no carro de um militar do GSI e não tinha certificado de registro válido.", "titulo_pt": "Moraes autoriza ouvir Bolsonaro sobre arma apreendida", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 6343, "titulo": "Jeduca abre inscrições para financiar dez reportagens sobre educação pública", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/blogs/novo-em-folha/2026/06/jeduca-abre-inscricoes-para-financiar-dez-reportagens-sobre-educacao-publica.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T20:11:00Z", "idioma": "pt", "texto_pt": "Estão abertas até 24 de julho as inscrições para o 8º Edital de Jornalismo de Educação, que financiará a produção de dez reportagens ou séries sobre temas relevantes da educação pública brasileira. Ao menos duas pautas selecionadas deverão abordar educação integral.", "titulo_pt": "Jeduca abre inscrições para financiar reportagens sobre educação pública", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6353, "titulo": "'PF está no papel dela de investigar', diz Haddad sobre operação contra senador petista Jaques Wagner", "url": "https://g1.globo.com/sp/sao-paulo/eleicoes/2026/noticia/2026/06/19/pf-esta-no-papel-dela-de-investigar-diz-haddad-sobre-operacao-contra-senador-petista-jaques-wagner.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T20:06:00Z", "idioma": "pt", "texto_pt": "O pré-candidato do PT ao governo de São Paulo, Fernando Haddad, declarou que a Polícia Federal está agindo dentro da sua função ao investigar o senador Jaques Wagner (PT-BA), alvo da 9ª fase da Operação Compliance Zero.", "titulo_pt": "Haddad afirma que PF está cumprindo seu papel de investigar senador petista", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 6354, "titulo": "Lula é uma pessoa 'muito volátil', diz Trump", "url": "https://g1.globo.com/mundo/noticia/2026/06/19/trump-lula-pessoa-muito-volatil.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T19:33:00Z", "idioma": "pt", "texto_pt": "O presidente dos Estados Unidos, Donald Trump, afirmou em entrevista que o presidente do Brasil, Luiz Inácio Lula da Silva, é uma pessoa muito volátil e que não se importa com o líder brasileiro. A declaração foi dada no contexto de tensões entre os dois países.", "titulo_pt": "Trump diz que Lula é 'muito volátil'", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 6344, "titulo": "Anfavea pede que governo não prorrogue benefícios a montadoras chinesas", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/anfavea-pede-que-governo-nao-prorrogue-beneficios-a-montadoras-chinesas.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T19:15:00Z", "idioma": "pt", "texto_pt": "A Anfavea enviou um ofício ao presidente Lula e ministros pedindo que o governo não prorrogue os benefícios fiscais para as montadoras chinesas, em meio à pressão da BYD por uma retomada desses incentivos.", "titulo_pt": "Anfavea solicita ao governo não prorrogar benefícios a montadoras chinesas", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 5656, "titulo": "Lula assina decreto que prevê bloqueio de recursos de bets ilegais", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/lula-assina-decreto-que-preve-bloqueio-de-recursos-de-bets-ilegais", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-19T18:58:00Z", "idioma": "pt", "texto_pt": "O presidente Luiz Inácio Lula da Silva assinou um decreto que prevê o bloqueio imediato de fundos de empresas de apostas ilegais, com os recursos sendo direcionados ao Fundo Nacional de Segurança Pública para combate ao crime organizado.", "titulo_pt": "Lula assina decreto para bloqueio de recursos de apostas ilegais", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 5623, "titulo": "Camilo é tido como favorito para assumir liderança do governo no Senado caso Wagner deixe o cargo", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/camilo-e-tido-como-favorito-para-assumir-lideranca-do-governo-no-senado-caso-wagner-deixe-o-cargo.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T18:43:00Z", "idioma": "pt", "texto_pt": "O ex-ministro da Educação Camilo Santana (PT-CE) tem sido apontado como favorito para assumir a liderança do governo no Senado, caso o senador Jaques Wagner (PT-BA) deixe o cargo.", "titulo_pt": "Camilo é visto como favorito para liderar governo no Senado se Wagner sair", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 5624, "titulo": "Datafolha: Nova pesquisa sobre eleição presidencial é divulgada neste sábado (20)", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/datafolha-nova-pesquisa-sobre-eleicao-presidencial-e-divulgada-neste-sabado-20.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T18:01:00Z", "idioma": "pt", "texto_pt": "Uma nova pesquisa Datafolha será lançada neste sábado (20), trazendo informações sobre as intenções de voto para presidente e a avaliação do governo Lula.", "titulo_pt": "Datafolha divulga nova pesquisa sobre eleição presidencial neste sábado", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 5625, "titulo": "Fachin fala sobre penduricalhos e cita pagamentos exorbitantes sem justificativa", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/fachin-fala-sobre-penduricalhos-e-cita-pagamentos-exorbitantes-sem-justificativa.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T17:18:00Z", "idioma": "pt", "texto_pt": "O presidente do STF, Edson Fachin, admitiu a existência de pagamentos acima do teto constitucional para magistrados sem justificativa durante uma fala sobre o grupo de trabalho criado pelo CNJ para revisar os penduricalhos no Poder Judiciário.", "titulo_pt": "Fachin reconhece pagamentos exorbitantes a magistrados", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 5626, "titulo": "Lula evita falar de Jaques Wagner, mas faz sinal positivo ao ser questionado se ele segue líder do governo", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/lula-sinaliza-que-jaques-wagner-segue-na-lideranca-do-governo-apos-operacao-da-pf.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T16:38:00Z", "idioma": "pt", "texto_pt": "O presidente Lula não comentou diretamente sobre a permanência de Jaques Wagner como líder do governo no Senado, mas fez um gesto positivo quando questionado sobre o assunto.", "titulo_pt": "Lula evita comentar sobre Jaques Wagner, mas faz sinal positivo", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 5644, "titulo": "Zema diz que 'nunca foi próximo' de Flávio Bolsonaro e volta a criticar o STF: 'Poder incendiário'", "url": "https://g1.globo.com/pe/pernambuco/eleicoes/2026/noticia/2026/06/19/zema-diz-que-nunca-foi-proximo-de-flavio-bolsonaro-e-volta-a-criticar-o-stf-poder-incendiario.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T16:38:00Z", "idioma": "pt", "texto_pt": "O ex-governador de Minas Gerais Romeu Zema, pré-candidato à Presidência, declarou que nunca foi próximo ao senador Flávio Bolsonaro. Durante uma entrevista em Recife, Zema também criticou o Supremo Tribunal Federal, chamando-o de 'poder incendiário'.", "titulo_pt": "Zema afirma não ter sido próximo a Flávio Bolsonaro e critica STF", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 5646, "titulo": "Imposto do pecado: governo quer manter carga tributária sobre bebidas e cigarro enquanto durar período de transição", "url": "https://g1.globo.com/economia/noticia/2026/06/19/imposto-do-pecado-ideia-e-manter-em-transicao-o-atual-peso-de-tributos-para-bebidas-alcoolicas-e-cigarros-diz-ministro-da-fazenda.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T16:21:00Z", "idioma": "pt", "texto_pt": "O ministro da Fazenda, Dario Durigan, afirmou que não há intenção de adiar a implementação do imposto seletivo, conhecido como 'imposto do pecado', previsto para 2027. A ideia é manter a atual carga tributária sem aumento durante um período de transição.", "titulo_pt": "Imposto do pecado: governo quer manter carga tributária sobre bebidas e cigarro durante período de transição", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}], "politica_internacional": [{"id": 6659, "titulo": "Meloni 'stunned' by Trump's comment she 'begged' for photo", "url": "https://www.dw.com/en/meloni-stunned-by-trump-s-comment-she-begged-for-photo/a-77633016?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-19T23:00:00Z", "idioma": "en", "texto_pt": "A italiana Giorgia Meloni, primeira-ministra do país, respondeu com indignação a declarações de Donald Trump, que afirmou que ela 'pediu uma foto'.", "titulo_pt": "Meloni 'estupefata' por comentário de Trump sobre foto", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 6617, "titulo": "Lebanon Emerges as Weak Link in U.S.-Iran Deal to End War", "url": "https://www.nytimes.com/2026/06/19/world/middleeast/lebanon-us-iran-deal-ceasefire.html", "fonte_id": "nyt_world", "data_pub": "2026-06-19T22:31:00Z", "idioma": "en", "texto_pt": "O conflito entre Israel e Hezbollah se tornou um dos principais obstáculos para a conclusão de um acordo entre Estados Unidos e Irã, que antes era visto como uma frente secundária nessa disputa.", "titulo_pt": "Líbano emerge como fraca ligação no acordo entre EUA e Irã para encerrar guerra", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 6334, "titulo": "Trump recebe avião que ganhou do Qatar e deve integrar frota presidencial", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/trump-recebe-aviao-que-ganhou-do-qatar-e-deve-integrar-frota-presidencial.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-19T22:23:00Z", "idioma": "pt", "texto_pt": "O presidente dos Estados Unidos, Donald Trump, visitou um novo Boeing 747 modernizado, presenteado pelo Catar, na base aérea Andrews em Maryland. A aeronave será entregue para integrar a frota do Air Force One.", "titulo_pt": "Trump recebe avião que ganhou do Catar e deve integrar frota presidencial", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 6650, "titulo": "After US signals another review of its military presence in Europe, allies grapple with Washington's ambiguities", "url": "https://www.lemonde.fr/en/international/article/2026/06/20/after-us-signals-another-review-of-its-military-presence-in-europe-allies-grapple-with-washington-s-ambiguities_6754682_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-19T22:21:00Z", "idioma": "en", "texto_pt": "Em 18 de junho, o secretário americano da Defesa anunciou uma 'revisão' da distribuição das forças norte-americanas no continente europeu. A decisão causou preocupação, mesmo sendo apresentada como apenas uma 'ajuste', conforme informou um alto funcionário militar dos EUA à Le Monde.", "titulo_pt": "Após EUA sinalizarem revisão de presença militar na Europa, aliados lidam com ambiguidades de Washington", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 6544, "titulo": "Trump jubila el Air Force One, pero presenta su nuevo avión: un regalo de Qatar valorado en 400 millones", "url": "https://elpais.com/us/2026-06-19/trump-jubila-el-air-force-one-pero-presenta-su-nuevo-avion-un-regalo-de-qatar-valorado-en-400-millones.html", "fonte_id": "elpais_america", "data_pub": "2026-06-19T22:08:00Z", "idioma": "es", "texto_pt": "O governo qatarí presenteou o presidente Trump com um novo avião avaliado em 400 milhões de dólares. O presente gerou polêmica no ano anterior devido a preocupações sobre conflito de interesses e influência estrangeira na segurança presidencial.", "titulo_pt": "Trump recebe avião do Qatar, mas exibe Air Force One", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 6618, "titulo": "Trains Collide in UK, Killing at Least One and Injuring Dozens of Others", "url": "https://www.nytimes.com/2026/06/19/world/europe/uk-trains-collide-bedford-england.html", "fonte_id": "nyt_world", "data_pub": "2026-06-19T22:02:00Z", "idioma": "en", "texto_pt": "Um acidente envolvendo trens próximo a Bedford, Inglaterra, causou pelo menos uma morte e deixou varias outras pessoas feridas, conforme informaram as autoridades.", "titulo_pt": "Acidente de trens na Grã-Bretanha resulta em morte e várias pessoas feridas", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 6638, "titulo": "Zelensky stripped of highest Polish honour over WW2 name of army unit", "url": "https://www.bbc.com/news/articles/cr7xzg3dmj8o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-19T21:46:00Z", "idioma": "en", "texto_pt": "Ucrânia condenou a decisão, considerando-a uma 'mástrategia' e 'desrespeitosa'.", "titulo_pt": "Zelensky tem maior honra polonesa retirada devido ao nome da unidade militar da Segunda Guerra Mundial", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 6639, "titulo": "Scotland vs Morocco live: Scots caught cold as Saibari gives Atlas Lions early lead", "url": "https://www.france24.com/en/sport/20260619-scotland-vs-morocco-live-scots-eye-historic-world-cup-knockout-berth-against-atlas-lions", "fonte_id": "france24", "data_pub": "2026-06-19T21:41:00Z", "idioma": "en", "texto_pt": "A Escócia enfrenta o Marrocos em seu segundo jogo do Grupo C, na esperança de um empate que possa garantir sua classificação para as fases seguintes do Mundial pela primeira vez. A Escócia inicia com cinco defensores, enquanto o Marrocos mantém a mesma equipe usada no primeiro jogo.", "titulo_pt": "Escócia vs Marrocos ao vivo: Escoceses com resfriado enquanto Saibari dá vantagem aos Leões da Átles", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 6640, "titulo": "One dead and dozens injured after passenger trains collide north of London", "url": "https://www.france24.com/en/europe/20260619-one-dead-and-dozens-injured-after-passenger-trains-collide-north-of-london", "fonte_id": "france24", "data_pub": "2026-06-19T21:40:00Z", "idioma": "en", "texto_pt": "Um passageiro morreu e várias pessoas ficaram feridas, incluindo 11 com lesões graves, em uma colisão entre dois trens passageiros perto de Bedford, Inglaterra. Equipes de emergência responderam imediatamente ao incidente, um dos mais sérios envolvendo ferrovias na Grã-Bretanha recentemente.", "titulo_pt": "Pelo menos uma morte e dezenas feridos após colisão entre trens passageiros perto de Londres", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 6660, "titulo": "Poland's president strips Zelenskyy of top honor", "url": "https://www.dw.com/en/poland-s-president-strips-zelenskyy-of-top-honor/a-77632926?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-19T21:28:00Z", "idioma": "en", "texto_pt": "O presidente da Polônia, Karol Nawrocki, decidiu retirar à honra mais alta do presidente ucraniano Volodymyr Zelenskyy, o que provavelmente causará uma grave crise diplomática entre os dois países.", "titulo_pt": "Polônia remove honra máxima de Zelenskyy", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 6704, "titulo": "Trump accepts Qatar jet as new Air Force One despite ethics concerns", "url": "https://www.ft.com/content/2bb0efd9-fe82-4943-ab5f-ac80682bee00", "fonte_id": "financial_times", "data_pub": "2026-06-19T21:28:00Z", "idioma": "en", "texto_pt": "O governo dos EUA recebeu um jato avaliado em $400 milhões do Qatar para ser usado como o novo Air Force One, gerando acusações de conflito entre interesses pessoais e deveres oficiais.", "titulo_pt": "Trump aceita jato qatarí como novo Air Force One apesar das preocupações éticas", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 6543, "titulo": "Estados Unidos se gana un respeto", "url": "https://elpais.com/deportes/mundial-futbol/2026-06-19/estados-unidos-se-gana-un-respeto.html", "fonte_id": "elpais_america", "data_pub": "2026-06-19T21:19:00Z", "idioma": "es", "texto_pt": "A seleção comandada por Pochettino venceu a Austrália e conquistou sua segunda vitória no torneo, garantindo a classificação para a próxima fase.", "titulo_pt": "Estados Unidos conquistam respeito", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 6627, "titulo": "James Burrows, director of classic shows 'Cheers' and 'Friends,' dies at 85", "url": "https://www.npr.org/2026/06/19/g-s1-129137/james-burrows-death-obit-cheers-friends", "fonte_id": "npr_news", "data_pub": "2026-06-19T21:16:00Z", "idioma": "en", "texto_pt": "James Burrows dedicou sua carreira a direção de comédias situacionais. Embora poucos espectadores o conhecessem pessoalmente, seu trabalho era reconhecido nas cartas de abertura dos programas.", "titulo_pt": "James Burrows, diretor de clássicos como 'Cheers' e 'Friends', falece aos 85 anos", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 6628, "titulo": "Air Force One, gifted to Trump from Qatar, arrives at Joint Base Andrews", "url": "https://www.npr.org/2026/06/19/nx-s1-5864503/air-force-one-trump-qatar", "fonte_id": "npr_news", "data_pub": "2026-06-19T21:01:00Z", "idioma": "en", "texto_pt": "O luxuoso Boeing 747, inicialmente avaliado em US$ 400 milhões, chegou à Andrews Joint Base antes do previsto. O avião causou controvérsia como uma das maiores dádivas estrangeiras recebidas pelo governo dos EUA.", "titulo_pt": "Air Force One, doado para Trump por Catar, chega ao Andrews Joint Base", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 6336, "titulo": "Starmer é pressionado por aliados a dar data para sair do cargo de premiê do Reino Unido, diz imprensa", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/starmer-e-pressionado-por-aliados-a-dar-data-para-sair-do-cargo-de-premie-do-reino-unido-diz-imprensa.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-19T20:46:00Z", "idioma": "pt", "texto_pt": "Ministros aliados do premiê do Reino Unido, Keir Starmer, estão pressionando-o a divulgar um calendário para deixar o cargo até o fim de semana, caso contrário, ele corre o risco de ser expulso do partido.", "titulo_pt": "Aliados pressionam Starmer a anunciar data de saída como premiê", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 6629, "titulo": "Italy's Meloni, once Trump's closest ally in Europe, says he made up a story about her", "url": "https://www.npr.org/2026/06/19/nx-s1-5864264/meloni-trump-fight-beg", "fonte_id": "npr_news", "data_pub": "2026-06-19T20:32:00Z", "idioma": "en", "texto_pt": "Giorgia Meloni afirmou em vídeo nas redes sociais que a Itália não pede favores. O chefe da diplomacia italiana cancelou uma visita aos Estados Unidos em resposta às supostas declarações.", "titulo_pt": "Meloni, ex-alínea de Trump na Europa, afirma que Itália não implora", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}], "cultura": [{"id": 6345, "titulo": "Seis anos após fundação, CNN Brasil vai virar rede de TV aberta até 2027", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/seis-anos-apos-fundacao-cnn-brasil-vai-virar-rede-de-tv-aberta-ate-2027.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T22:25:00Z", "idioma": "pt", "texto_pt": "A CNN Brasil, que foi inicialmente um canal por assinatura, está expandindo suas operações para incluir uma rede nacional de televisão aberta. O canal pretende se associar a diversas emissoras locais brasileiras até 2027.", "titulo_pt": "Seis anos após fundação, CNN Brasil planeja se tornar rede de TV aberta até 2027", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 6346, "titulo": "Na MPB, Chico Buarque não está sozinho em sua aversão à autobiografia", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/colunas/gustavo-alonso/2026/06/na-mpb-chico-buarque-nao-esta-sozinho-em-sua-aversao-a-autobiografia.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T21:30:00Z", "idioma": "pt", "texto_pt": "Chico Buarque, com 82 anos, é reconhecido como um dos maiores artistas da MPB e também por sua produção literária variada. No entanto, a reportagem sugere que ele não está disposto a escrever uma autobiografia.", "titulo_pt": "Chico Buarque não planeja escrever autobiografia", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 6347, "titulo": "Alana Ambrósio fala de polêmica que afastou narrador da Amazon: 'Enquanto latiam, eu trabalhava'", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/alana-ambrosio-fala-de-polemica-que-afastou-narrador-da-amazon-enquanto-latiam-eu-trabalhava.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T20:32:00Z", "idioma": "pt", "texto_pt": "A repórter Alana Ambrósio deu sua versão sobre a controvérsia envolvendo o narrador Rômulo Mendonça e o comentarista Ricardo Bulgarelli, que resultou no afastamento dos dois da transmissão das finais da NBA na Amazon.", "titulo_pt": "Alana Ambrósio se pronuncia sobre polêmica que levou narrador à saída da Amazon", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 6348, "titulo": "Morre James Burrows, criador de 'Cheers' e 'Will e Grace', aos 85 anos", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/morre-james-burrows-criador-de-cheers-e-will-e-grace-aos-85-anos.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T20:17:00Z", "idioma": "pt", "texto_pt": "O diretor de televisão James Burrows faleceu nesta sexta-feira (19), aos 85 anos, sendo um dos nomes mais influentes da comédia na TV americana.", "titulo_pt": "James Burrows, criador de 'Cheers' e 'Will e Grace', morre aos 85 anos", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 6349, "titulo": "Festival da Folha celebra a gastronomia de inverno em restaurantes da região serrana de quatro estados", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/restaurantes/2026/06/festival-da-folha-celebra-a-gastronomia-de-inverno-em-restaurantes-da-regiao-serrana-de-quatro-estados.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T20:08:00Z", "idioma": "pt", "texto_pt": "A Folha realiza, até o dia 2 de agosto, a quarta edição do Festival Gastronômico Sabores da Montanha, que destaca pratos típicos do inverno utilizando ingredientes locais da região serrana de quatro estados.", "titulo_pt": "Festival da Folha comemora a gastronomia de inverno na região serrana de quatro estados", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 6620, "titulo": "Science Has a Name for What’s Plaguing the Reflecting Pool", "url": "https://www.theatlantic.com/politics/2026/06/reflecting-pool-algae-scientific-testing-trump/687649/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-19T19:50:00Z", "idioma": "en", "texto_pt": "Testes revelam que esforços para suprimir uma floridez algícola parecem estar alimentando outra.", "titulo_pt": "Ciência Identifica o Problema no Pântano Refletor", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 6350, "titulo": "'Várzea' e 'Os Estranhos - Capítulo 2': o que ver na TV e no streaming no sábado", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/varzea-e-os-estranhos-capitulo-2-o-que-ver-na-tv-e-no-streaming-no-sabado.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T19:24:00Z", "idioma": "pt", "texto_pt": "A série documental 'Várzea: Onde Nasce o Futebol' argumenta que o futebol brasileiro não se origina apenas nos estádios, mas também nas partidas de várzea, sendo citados exemplos como Cafu e Raphinha.", "titulo_pt": "Várzea e Os Estranhos - Capítulo 2: o que ver na TV e no streaming no sábado", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5659, "titulo": "TV Brasil transmite festas juninas da Bahia e de Pernambuco", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/tv-brasil-transmite-festas-juninas-da-bahia-e-de-pernambuco", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-19T18:36:00Z", "idioma": "pt", "texto_pt": "A TV Brasil exibe shows musicais na faixa Arraiá Brasil, transmitindo performances de Salvador, Amargosa (Bahia) e Petrolina (Pernambuco), além de Caruaru (Pernambuco) e Mossoró e Assú (Rio Grande do Norte).", "titulo_pt": "TV Brasil transmite festas juninas da Bahia e de Pernambuco", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 5631, "titulo": "Homem se liberta ao abandonar família no romance 'O Aniversário'", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/homem-se-liberta-ao-abandonar-familia-no-romance-o-aniversario.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T18:00:00Z", "idioma": "pt", "texto_pt": "Um homem mudou completamente sua vida há dez anos, alterando seu número de telefone, endereço e até continente. Desde então, ele não mais teve contato com seus pais e considera esses dez anos como os melhores de sua existência.", "titulo_pt": "Homem se liberta ao abandonar família no romance 'O Aniversário'", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5632, "titulo": "Amazon desiste de filme de Luca Guadagnino sobre a história do CEO da OpenAI", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/amazon-desiste-de-filme-de-luca-guadagnino-sobre-o-ceo-da-openai.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T17:45:00Z", "idioma": "pt", "texto_pt": "A Amazon MGM Studios abandonou a produção do filme baseado na história do CEO da OpenAI, Sam Altman, originalmente dirigido por Luca Guadagnino e estrelado por Andrew Garfield, oferecendo o projeto a outros estúdios.", "titulo_pt": "Amazon desiste de filme sobre Sam Altman", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5633, "titulo": "Funkeiro foragido por fraudes eletrônicas alcança 16º lugar no topo do Spotify", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/funkeiro-foragido-por-fraudes-eletronicas-alcanca-16a-posicao-no-spotify.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T17:35:00Z", "idioma": "pt", "texto_pt": "MC Negão Original, funkeiro foragido da polícia, está na 16ª posição das músicas mais ouvidas no Spotify desta semana com a canção 'Cuida do Pet', em parceria com outros artistas.", "titulo_pt": "Funkeiro foragido por fraudes eletrônicas atinge 16º lugar no Spotify", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5660, "titulo": "ABL reconhece obra de Cristóvão Tezza com Prêmio Machado de Assis", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/abl-reconhece-obra-de-cristovao-tezza-com-premio-machado-de-assis", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-19T16:58:00Z", "idioma": "pt", "texto_pt": "A Academia Brasileira de Letras (ABL) premiou o escritor Cristóvão Tezza com o Prêmio Machado de Assis, sua maior honraria, em reconhecimento ao conjunto de sua obra. A cerimônia de entrega ocorrerá no dia 23 de julho.", "titulo_pt": "Academia Brasileira de Letras concede Prêmio Machado de Assis a Cristóvão Tezza", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 5635, "titulo": "No Dia do Cinema Brasileiro, filmes nacionais têm ingresso a R$ 10 em sala de São Paulo", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/cinema/2026/06/no-dia-do-cinema-brasileiro-filmes-nacionais-tem-ingresso-a-r-10-em-sala-de-sao-paulo.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T16:29:00Z", "idioma": "pt", "texto_pt": "Em comemoração ao Dia do Cinema Brasileiro, a sala de cinema Belas Artes em São Paulo oferece ingressos por R$ 10 para filmes nacionais. O desconto é válido apenas para quem comparecer à bilheteria usando uma camiseta verde ou amarela.", "titulo_pt": "No Dia do Cinema Brasileiro, ingressos a R$ 10 para filmes nacionais em sala de São Paulo", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5636, "titulo": "Choro da Quitanda apresenta obra de Armando Neves em show gratuito em São Paulo", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/blogs/musica-em-letras/2026/06/choro-da-quitanda-apresenta-obra-de-armando-neves-em-show-gratuito-em-sao-paulo.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T16:09:00Z", "idioma": "pt", "texto_pt": "Neste domingo (21), às 11h, no palco Éden do Centro Cultural Vila Itororó, em São Paulo, ocorrerá um show gratuito com o grupo Choro da Quitanda apresentando o álbum 'O Dono da Bola: Choro da Quitanda revê Armando Neves'.", "titulo_pt": "Choro da Quitanda apresenta obra de Armando Neves em show gratuito em São Paulo", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5637, "titulo": "No livro 'Sub/Emerso', obra de Bob Wolfenson surge ressignificada", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/no-livro-subemerso-obra-de-bob-wolfenson-surge-ressignificada.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T16:00:00Z", "idioma": "pt", "texto_pt": "O autor destaca que rios transbordam naturalmente, mas a ocupação não planejada da cidade de São Paulo e o aquecimento global contribuíram para as grandes enchentes. As margens dos rios Pinheiros e Tietê foram retificadas e impermeabilizadas ao longo das décadas, desrespeitando o ciclo natural de cheia e vazante.", "titulo_pt": "No livro 'Sub/Emerso', obra de Bob Wolfenson surge ressignificada", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5638, "titulo": "Lorena em 'Três Graças', Alanis Guillen deve ficar fora da TV até o ano que vem", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/lorena-em-tres-gracas-alanis-guillen-deve-ficar-fora-da-tv-ate-o-ano-que-vem.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T15:59:00Z", "idioma": "pt", "texto_pt": "Alanis Guillen, que teve sucesso como Lorena em 'Três Graças', está se afastando da televisão para descansar a imagem e não retornará até o próximo ano, recusando convites para trabalhos imediatos.", "titulo_pt": "Alanis Guillen deve ficar fora da TV até o ano que vem após 'Três Graças'", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}], "ciencia_tecnologia": [{"id": 6732, "titulo": "A water treatment expert on what could actually fix the Reflecting Pool", "url": "https://www.scientificamerican.com/article/a-water-treatment-expert-on-what-could-actually-fix-the-reflecting-pool/", "fonte_id": "scientific_american", "data_pub": "2026-06-19T22:00:00Z", "idioma": "en", "texto_pt": "A administração Trump queria que a superfície da Piscina Refletora do Memorial Lincoln fosse azul como uma bandeira americana. Um especialista em tratamento de água explica por que a piscina continua verde-alga e por que o crescimento pode continuar ocorrendo.", "titulo_pt": "Um especialista em tratamento de água sobre o que realmente poderia corrigir a Piscina Refletora", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 6730, "titulo": "India’s Jio lays out sovereign LEO constellation plan ahead of IPO", "url": "https://spacenews.com/indias-jio-lays-out-sovereign-leo-constellation-plan-ahead-of-ipo/", "fonte_id": "spacenews", "data_pub": "2026-06-19T19:27:00Z", "idioma": "en", "texto_pt": "A Jio Platforms, proprietária do maior provedor de telecomunicações da Índia, está planejando alugar capacidade broadband de constelações orbitais para impulsionar sua própria rede LEO soberana no país. O anúncio foi feito antes da oferta inicial de ações (IPO) da empresa.", "titulo_pt": "Jio anuncia plano de constelação LEO soberana antes da IPO", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 6222, "titulo": "IEEE Rolls Out Large Language Models Virtual Training Course", "url": "https://spectrum.ieee.org/large-language-models-ieee-course", "fonte_id": "ieee_spectrum", "data_pub": "2026-06-19T18:00:00Z", "idioma": "en", "texto_pt": "Grandes modelos de linguagem saíram dos laboratórios de pesquisa e se integram ao fluxo diário de trabalho dos engenheiros. Eles são usados como motores de raciocínio para orquestrar tarefas complexas, incluindo a identificação de vulnerabilidades no código-fonte e a transformação de discussões projetuais fragmentadas em especificações técnicas rigorosas. A demanda por esse conhecimento está aumentando à medida que os modelos de IA se integram cada vez mais na prática técnica.", "titulo_pt": "IEEE Lança Curso Virtual de Treinamento sobre Grandes Modelos de Linguagem", "veiculo": "IEEE Spectrum", "pais": "EUA", "classe": "A"}, {"id": 6254, "titulo": "Scientists pop the cork on the hidden chemistry inside wine bottles", "url": "https://www.scientificamerican.com/article/scientists-pop-the-cork-on-the-hidden-chemistry-inside-wine-bottles/", "fonte_id": "scientific_american", "data_pub": "2026-06-19T18:00:00Z", "idioma": "en", "texto_pt": "Um novo estudo explora como carvalho, vinho e ar interagem ao longo do tempo dentro das garrafas. A pesquisa captura os detalhes da complexa química envolvida nesse processo.", "titulo_pt": "Cientistas abrem o champagne sobre a química oculta dentro das garrafas de vinho", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 5997, "titulo": "How to Think About AI Before It’s Too Late", "url": "https://www.theatlantic.com/podcasts/2026/06/how-to-think-about-ai-before-its-too-late/687644/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-19T17:00:00Z", "idioma": "en", "texto_pt": "O artigo discute a necessidade de refletir sobre as implicações da Inteligência Artificial antes que seu impacto seja irreversível. O autor sugere uma abordagem cautelosa e informada em relação às expectativas exageradas acerca das capacidades atuais e futuras da IA.", "titulo_pt": "Como Pensar Sobre IA Antes que Seja Tarde demais", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 6258, "titulo": "MDA Space to buy Blue Canyon Technologies to gain foothold in U.S. market", "url": "https://spacenews.com/mda-space-to-buy-blue-canyon-technologies-to-gain-foothold-in-u-s-market/", "fonte_id": "spacenews", "data_pub": "2026-06-19T16:03:00Z", "idioma": "en", "texto_pt": "A MDA Space está comprando a fabricante de satélites pequenos Blue Canyon Technologies por 620 milhões de dólares, expandindo assim sua presença no mercado lucrativo dos Estados Unidos.", "titulo_pt": "MDA Space adquire Blue Canyon Technologies para ampliar presença no mercado americano", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 6272, "titulo": "DeBriefed 19 June 2026: Bonn talks end in ‘gridlock’ | Energy’s ‘new era’ | Oceans in climate negotiations", "url": "https://www.carbonbrief.org/debriefed-19-june-2026-bonn-talks-end-in-gridlock-energys-new-era-oceans-in-climate-negotiations/", "fonte_id": "carbon_brief", "data_pub": "2026-06-19T15:39:00Z", "idioma": "en", "texto_pt": "O relatório desta semana do Carbon Brief aborda as conversações em Bonn que terminaram em impasse, a nova era da energia e o papel dos oceanos nos debates climáticos.", "titulo_pt": "DeBriefed 19 de junho de 2026: Conversações em Bonn terminam em 'impasse' | Nova era da energia | Oceanos nas negociações climáticas", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 6273, "titulo": "Bonn climate talks: Key outcomes from the June 2026 UN climate conference", "url": "https://www.carbonbrief.org/bonn-climate-talks-key-outcomes-from-the-june-2026-un-climate-conference/", "fonte_id": "carbon_brief", "data_pub": "2026-06-19T15:16:00Z", "idioma": "en", "texto_pt": "Duas semanas de negociações tensas nas Nações Unidas em Bonn, Alemanha, resultaram em poucos or-15-years/", "fonte_id": "wired", "data_pub": "2026-06-19T14:23:00Z", "idioma": "en", "texto_pt": "Depois de anos desde os primeiros testes, pesquisadores estão agora correndo para verificar se uma vacina desenvolvida em 2011 pode ajudar a combater a atual epidemia de Bundibugyo na Congo.", "titulo_pt": "A Vacina Mais Promissora contra a Ébola Estava Pronta há 15 Anos", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 6249, "titulo": "STAT+: Up and down the ladder: The latest comings and goings", "url": "https://www.statnews.com/pharmalot/2026/06/19/up-and-down-the-ladder-jobs-bristol-novartis-pfizer-moderna-astrazeneca/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-19T14:00:00Z", "idioma": "en", "texto_pt": "Este relatório abrange as últimas contratações, desligamentos, promoções e transferências na indústria farmacêutica.", "titulo_pt": "Subindo e descendo a escada: As últimas novidades de contratações e demissões na indústria farmacêutica", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 6260, "titulo": "Northrop Grumman says industry ready to scale solid rocket production, with longer contracts", "url": "https://spacenews.com/northrop-grumman-says-industry-ready-to-scale-solid-rocket-production-with-longer-contracts/", "fonte_id": "spacenews", "data_pub": "2026-06-19T14:00:00Z", "idioma": "en", "texto_pt": "A Northrop Grumman afirma que bilhões em investimentos privados criaram espaço para crescimento na produção de motores de foguetes sólidos, mas os fornecedores precisam de uma demanda previsível.", "titulo_pt": "Northrop Grumman afirma que o setor está pronto para aumentar a produção de motores de foguetes sólidos, com contratos mais longos", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 6101, "titulo": "GoPro and Roomba were U.S. pioneers. Chinese rivals now dominate", "url": "https://restofworld.org/2026/chinese-consumer-tech-brands/?utm_source=rss&utm_medium=rss&utm_campaign=feeds", "fonte_id": "rest_of_world", "data_pub": "2026-06-19T13:00:00Z", "idioma": "en", "texto_pt": "Um cliente experimenta a câmera Osmo Pocket 4 da DJI em uma loja da empresa em Shanghai, China. As empresas chinesas estão agora dominando mercados que antes eram liderados pelas empresas americanas GoPro e iRobot (fabricante do Roomba).", "titulo_pt": "GoPro e Roomba foram pioneiros americanos, mas rivais chineses agora dominam", "veiculo": "Rest of World", "pais": "EUA", "classe": "A"}, {"id": 6255, "titulo": "Scientists discover remnants of Jellyfish Nebula’s ‘sibling’ supernova", "url": "https://www.scientificamerican.com/article/scientists-discover-remnants-of-jellyfish-nebulas-sibling-supernova/", "fonte_id": "scientific_american", "data_pub": "2026-06-19T13:00:00Z", "idioma": "en", "texto_pt": "Astrônomos podem ter encontrado os restos de duas estrelas falecidas há muito tempo que eram irmãs. Eles suspeitam que uma dessas estrelas explodiu como supernova, deixando trás os restos detectados.", "titulo_pt": "Cientistas descobrem restos da 'irmã' supernova do Nebuloso dos Moluscos", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 6261, "titulo": "The MEO durability crisis: why LEO hardware will fail the new orbital economy", "url": "https://spacenews.com/the-meo-durability-crisis-why-leo-hardware-will-fail-the-new-orbital-economy/", "fonte_id": "spacenews", "data_pub": "2026-06-19T13:00:00Z", "idioma": "en", "texto_pt": "O espaço é visto por alguns como a última fronteira, mas na realidade existem várias fronteiras espaciais uma vez que se sai da atmosfera terrestre. O post discute a crise de durabilidade da MEO e explica por que o hardware da LEO pode falhar na nova economia orbital.", "titulo_pt": "A crise de durabilidade da MEO: por que o hardware da LEO falhará na nova economia orbital", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}]}, "noticias": [{"id": 6659, "fonte_id": "dw_english", "titulo": "Meloni 'stunned' by Trump's comment she 'be s-h5-bird-flu-heard.html", "data_pub": "2026-06-19T03:20:00Z", "topico": "ciencia_tecnologia", "idioma": "en", "titulo_pt": "Cientistas finalizam estudos sobre gripe aviária H5 nas viagens às ilhas Heard e McDonald", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}]};
const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const rot = n.topico ? (D.rotulos_topico[n.topico] || n.topico) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(n.topico || '')}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
