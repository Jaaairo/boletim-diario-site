strada", "pais": "Brasil", "classe": "A"}, {"id": 15348, "titulo": "Um misantropo assusta muita gente", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/colunas/marcelo-rubens-paiva/2026/06/um-misantropo-assusta-muita-gente.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-24T17:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Milhões de brasileiros receberam alertas no celular com o texto 'Misantropi4' após a partida entre Brasil e Haiti. O alerta foi enviado às 1h22 da madrugada de sábado. O texto parece ser uma expressão de ódio social.", "titulo_pt": "Um Misantropo Assusta Muitas Pessoas", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 15349, "titulo": "Videoinstalação que culpa Churchill por fome na Índia sai de exposição em Londres", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/videoinstalacao-que-culpa-churchill-por-fome-na-india-sai-de-exposicao-em-londres.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-24T17:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma artista retirou uma videoinstalação da National Portrait Gallery, em Londres, após críticas sobre a representação do papel de Winston Churchill durante uma fome na Índia colonial. Um historiador e outras pessoas alegaram que a caracterização de Churchill era imprecisa. A artista decidiu retirar a instalação.", "titulo_pt": "Videoinstalação que culpa Churchill por fome na Índia é retirada de exposição em Londres", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 15350, "titulo": "'Quem Ama Cuida': pesquisa leva Globo a investir em romance de jovem gay", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/quem-ama-cuida-pesquisa-leva-globo-a-investir-em-romance-de-jovem-gay.shtml", "fon re recognizable'", "url": "https://www.lemonde.fr/en/economy/article/2026/06/24/heatwave-puts-french-workers-in-harsh-conditions-we-have-to-keep-our-sleeveless-fleece-vests-on-so-we-re-recognizable_6754829_19.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-24T10:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais da metade do território francês continental foi colocada sob alerta vermelho por onda de calor na terça-feira. Funcionários e servidores públicos falaram ao Le Monde sobre suas condições de trabalho, revelando uma falta de preparação para ondas de calor entre os empregadores.", "titulo_pt": "Ondava de calor coloca trabalhadores franceses em condições adversas: 'Temos que manter os coletes sem mangas para sermos reconhecíveis'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 15063, "titulo": "Schools in Tokyo suburb to get bear sprays", "url": "https://www.japantimes.co.jp/news/2026/06/24/japan/tokyo-schools-bear-spray/", "fonte_id": "japan_times", "data_pub": "2026-06-24T10:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Japão registrou um recorde de 13 pessoas mortas por ursos no último ano fiscal.  Entre abril e maio deste ano, mais cinco pessoas morreram e 20 ficaram feridas em ataques de ursos.", "titulo_pt": "Escolas em subúrbio de Tóquio receberão sprays contra ursos", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 14758, "titulo": "How generosity became cringe", "url": "https://www.vox.com/the-highlight/489796/generosity-internet-cringe-optimism", "fonte_id": "vox", "data_pub": "2026-06-24T10:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Bill Gates desafiou Elon Musk, Ryan Seacrest e Chris Anderson do TED a participarem de um desafio de água fria.  Gates fez o desafio em seu jardim, puxando uma corda que liberou um barril de água gelada sobre si mesmo. O trecho original faz parte de uma história publicada no The Highlight.", "titulo_pt": "Como a Generosidade Tornou-se Um Ato Vergonhoso", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 15123, "titulo": "Hong Kong records 91 suspected student suicides in 3 years, majority boys", "url": "https://www.scmp.com/news/hong-kong/education/article/3358221/hong-kong-records-91-suspected-student-suicides-3-years-majority-boys?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-24T10:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As autoridades educacionais de Hong Kong revelaram que 91 alunos tiveram supostos casos de suicídio entre 2023 e 2025. A maioria dos casos envolveu alunos do ensino médio e meninos. O número de casos suspeitos fatais entre alunos do ensino fundamental e médio foi de 32 em 2023, 28 em 2024 e 31 em 2025.", "titulo_pt": "Hong Kong registra 91 suicídios suspeitos de estudantes em 3 anos, maioria meninos", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 16033, "titulo": "Venezuela rocked by two big earthquakes", "url": "https://www.ft.com/content/4eb25cfb-1b1e-4f9d-9562-3f8a3b9078c1", "fonte_id": "financial_times", "data_pub": "2026-06-25T02:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dois terremotos de grande magnitude atingiram a Venezuela. Autoridades locais alertam para possíveis vítimas fatais, com pessoas presas sob escombros.", "titulo_pt": "Venezuela abalada por dois terremotos fortes", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 15784, "titulo": "Declaran alerta ambiental en la Región Metropolitana para este jueves", "url": "https://www.latercera.com/nacional/noticia/declaran-alerta-ambiental-para-este-jueves-en-la-region-metropolitana/", "fonte_id": "la_tercera", "data_pub": "2026-06-25T01:15:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O pronóstico meteorológico indica que não haverá ventilação na bacia de Santiago. É importante verificar os dígitos da restrição veicular.", "titulo_pt": "Alerta ambiental declarado para a Região Metropolitana nesta quinta-feira", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 15475, "titulo": "Tremor de magnitude 6,9 atinge norte do Japão", "url": "https://veja.abril.com.br/mundo/tremor-de-magnitude-69-atinge-norte-do-japao/", "fonte_id": "veja", "data_pub": "2026-06-25T01:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um tremor com magnitude 6,9 atingiu a região de Iwate no norte do Japão. O epicentro do sismo foi registrado a 50 km de profundidade, segundo a Agência Meteorológica do Japão.", "titulo_pt": "Tremor de magnitude 6,9 atinge norte do Japão", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 15720, "titulo": "Los impactantes videos de los fuertes terremotos que sacudieron Venezuela", "url": "https://www.lanacion.com.ar/el-mundo/los-impactantes-videos-del-fuerte-terremoto-que-sacudio-venezuela-nid24062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-25T01:09:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Registros mostram corridas no aeroporto de Maiquetía, interrupções de energia, edifícios danificados em Caracas e moradores nas ruas após dois sismos consecutivos com magnitude 7,1 e 7,5. Os tremores atingiram a Venezuela.", "titulo_pt": "Vídeos impactantes dos fortes terremotos que abalaram a Venezuela", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 15602, "titulo": "Forte terremoto na Venezuela derruba prédios em Caracas e é sentido até no Brasil", "url": "https://www.bbc.com/portuguese/articles/cqj1e51p7vko?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-25T00:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um forte terremoto atingiu a Venezuela, causando o colapso de edifícios em Caracas. O tremor foi sentido com intensidade na capital venezuelana. A extensão total dos danos ainda não está conhecida.", "titulo_pt": "Forte terremoto na Venezuela derruba prédios em Caracas e é sentido no Brasil", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 15569, "titulo": "Terremoto de magnitude 7,1 atinge Caracas e o norte da Venezuela; governo pede calma e ativa protocolo de emergência", "url": "https://www.brasildefato.com.br/2026/06/24/terremoto-de-magnitude-71-atinge-caracas-e-o-norte-da-venezuela-governo-pede-calma-e-ativa-protocolo-de-emergencia/", "fonte_id": "brasil_de_fato", "data_pub": "2026-06-25T00:37:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um terremoto de magnitude 7,1 atingiu Caracas e outras localidades no norte da Venezuela na quarta-feira (24). O Serviço Geológico dos Estados Unidos (USGS) registrou dois tremores com epicentro a cerca de 100 quilômetros a oeste de Caracas. O governo venezuelano pediu calma à população e ativou o protocolo de emergência.", "titulo_pt": "Terremoto de magnitude 7,1 atinge Caracas e norte da Venezuela; governo pede calma e ativa protocolo de emergência", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 15564, "titulo": "Forte terremoto atinge Venezuela; alerta de tsunami é emitido após tremor", "url": "https://www.infomoney.com.br/mundo/forte-terremoto-atinge-venezuela-alerta-de-tsunami-e-emitido-apos-tremor/", "fonte_id": "infomoney", "data_pub": "2026-06-25T00:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um terremoto de magnitude 7,1 atingiu a Venezuela. Houve relatos de rachaduras em prédios e tremores sentidos na capital Caracas. Um alerta de tsunami foi emitido após o terremoto.", "titulo_pt": "Forte terremoto atinge Venezuela; alerta de tsunami emitido após tremor", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 16088, "titulo": "European heatwave, scorching weather triggers UK ‘red’ warning", "url": "https://www.aljazeera.com/video/newsfeed/2026/6/24/european-heatwave-scorching-weather-triggers-uk-red-warning?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-24T22:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Reino Unido enfrenta o calor mais intenso registrado para junho, enquanto uma onda de calor se espalha pela Europa. O país emitiu um alerta vermelho devido às altas temperaturas.", "titulo_pt": "Ondas de calor na Europa acendem alerta vermelho no Reino Unido", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 15606, "titulo": "Por que tantas pessoas estão morrendo afogadas em onda de calor na Europa?", "url": "https://www.bbc.com/portuguese/articles/c9v27lx1kwmo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-24T17:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A falta de experiência e os efeitos do choque térmico são alguns dos perigos comuns que podem levar a mortes por afogamento durante ondas de calor. As altas temperaturas podem causar fadiga e desorientação, aumentando o risco de acidentes aquáticos.", "titulo_pt": "Por que tantas pessoas estão morrendo afogadas na onda de calor na Europa?", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 16045, "titulo": "Court rules private jets belong on EU’s ‘green list’", "url": "https://www.euractiv.com/news/court-rules-private-jets-belong-on-eus-green-list/", "fonte_id": "euractiv", "data_pub": "2026-06-24T16:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Tribunal Geral da União Europeia decidiu que os jatos particulares devem estar na lista de investimentos sustentáveis da UE. A decisão foi baseada em detalhes técnicos dentro da lista de investimentos sustentáveis da UE.", "titulo_pt": "Tribunal diz que jatos particulares pertencem à lista verde da UE", "veiculo": "Euractiv", "pais": "Europa", "classe": "B"}, {"id": 16435, "titulo": "Mombasa: Key outcomes from the Our Ocean Conference in Kenya", "url": "https://www.carbonbrief.org/mombasa-key-outcomes-from-the-our-ocean-conference-in-kenya/", "fonte_id": "carbon_brief", "data_pub": "2026-06-24T15:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A grande conferência sobre oceanos terminou em Mombasa, Quênia, com um pequeno número de países fazendo compromissos específicos.  O foco da conferência foi a proteção dos oceanos e o combate à poluição marinha. Diversas iniciativas foram apresentadas durante o evento.", "titulo_pt": "Mombasa: Principais resultados da Conferência Our Ocean no Quênia", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 14852, "titulo": "In heatwave, some French museums and monuments become cool havens while others are forced to close", "url": "https://www.lemonde.fr/en/culture/article/2026/06/24/in-heatwave-some-french-museums-and-monuments-become-cool-havens-while-others-are-forced-to-close_6754832_30.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-24T12:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Diversos locais culturais se transformaram em refúgios climáticos oferecendo entrada gratuita. Outros tiveram que interromper as visitas devido ao calor extremo.", "titulo_pt": "Em onda de calor, alguns museus e monumentos franceses se tornam refúgios frios enquanto outros são fechados", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 14858, "titulo": "Heatwave-hit Europe must adapt health care, says WHO", "url": "https://www.lemonde.fr/en/environment/article/2026/06/24/heatwave-hit-europe-must-adapt-health-care-says-who_6754831_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-24T11:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Temperaturas continuaram a subir na Europa durante a onda de calor recorde, deixando milhares de pessoas sem energia. O continente está mal preparado para lidar com o calor intenso.", "titulo_pt": "Europa atingida por onda de calor precisa se adaptar à saúde, diz OMS", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 15117, "titulo": "Reducing fire risk to zero would cost huge amount, Tai Po blaze inquiry hears", "url": "https://www.scmp.com/news/hong-kong/society/article/3358229/reducing-fire-risk-zero-would-cost-huge-amout-tai-po-blaze-inquiry-hears?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-24T11:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma investigação pública sobre o incêndio mais mortal de Hong Kong em décadas ouviu que exigir materiais incombustíveis para grandes reformas em condomínios é irrealista. O uso de placas de poliuretano para vedar janelas foi um dos cinco fatores-chave que levaram à morte de 168 pessoas no Wang Fuk Court em Tai Po no ano passado, afirmaram especialistas na sessão da investigação pública.", "titulo_pt": "Reduzir risco de incêndio para zero teria custo enorme, ouve-se na investigação do incêndio em Tai Po", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 14926, "titulo": "France suffers major power outage as Europe sizzles in record-breaking heat", "url": "https://www.cnbc.com/2026/06/24/france-power-outage-europe-heat-wave.html", "fonte_id": "cnbc_international", "data_pub": "2026-06-24T10:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um apagão ligado ao calor deixou cerca de 68 mil residências sem eletricidade no oeste da França.  A Europa está enfrentando uma onda de calor com temperaturas recordes.", "titulo_pt": "França sofre grande apagão de energia enquanto Europa registra calor recorde", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 14919, "titulo": "Britain’s grid operator calls for more electricity as temperatures soar", "url": "https://www.ft.com/content/e06a95bb-f592-4abe-a58e-e314075b9db9", "fonte_id": "financial_times", "data_pub": "2026-06-24T10:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O calor extremo aumenta a demanda por energia e reduz a eficiência dos painéis solares. O operador da rede elétrica do Reino Unido pediu que as pessoas economizem energia devido ao aumento da demanda.", "titulo_pt": "Operador da rede elétrica britânica pede por mais energia com o aumento das temperaturas", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 16157, "titulo": "Loss of fugitive transfer deals a ‘pity’ and only helps criminals, Chris Tang says", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3358247/loss-fugitive-transfer-deals-pity-and-only-helps-criminals-chris-tang-says?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-25T02:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Chris Tang Ping-keung, secretário para a Segurança de Hong Kong, afirmou que a perda de acordos de extradição com alguns países é uma 'pena'. Tang disse que a decisão de retomar os acordos de transferência de fugitivos cabe aos países que os suspenderam. O oficial também afirmou que a perda dos acordos beneficia apenas criminosos.", "titulo_pt": "Perda de acordos de transferência de fugitivos é 'uma pena' e beneficia apenas criminosos, diz Chris Tang", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 15666, "titulo": "Venezuelanos no exterior pedem notícias de familiares, diz opositor", "url": "https://www.cnnbrasil.com.br/internacional/venezuelanos-no-exterior-pedem-noticias-de-familiares-diz-opositor/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-25T01:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Edmundo González, que reside na Espanha, ressaltou a incerteza causada pela ausência de informações oficiais sobre os impactos dos tremores. Ele mencionou a dificuldade em obter notícias de familiares na Venezuela após os abalos sísmicos.", "titulo_pt": "Venezuelanos no exterior buscam notícias sobre familiares, diz opositor", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 15783, "titulo": "Niños haitianos: Tohá defiende memorándum de Thayer y partidos de SD se cuadran con Contraloría", "url": "https://www.latercera.com/politica/noticia/ninos-haitianos-toha-defiende-memorandum-de-thayer-y-partidos-de-sd-se-cuadran-con-contraloria/", "fonte_id": "la_tercera", "data_pub": "2026-06-25T01:15:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A ex-diretora de Migrações, Tohá, afirmou que o memorando para flexibilizar a entrada de pessoas do Haiti é legal. Ela disse que não revisou o documento, mas que teria concordado com ele caso tivesse feito isso. Partidos da SD se alinhando com a Controladoria.", "titulo_pt": "Crianças haitianas: Tohá defende memorando de Thayer e partidos da SD se alinham com a Controladoria", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 15787, "titulo": "Caso Sartor", "url": "https://www.latercera.com/cartas-al-director/noticia/caso-sartor/", "fonte_id": "la_tercera", "data_pub": "2026-06-25T00:54:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O caso Sartor envolve a investigação de um possível crime de fraude fiscal e corrupção.  Acusações foram feitas contra o ex-presidente da empresa estatal Codelco, Patricio Contesse, por supostas irregularidades em contratos durante sua gestão. O caso está sob investigação judicial.", "titulo_pt": "Caso Sartor", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 15791, "titulo": "“Es injusta y clasista; raya lo inconstitucional”: Aníbal Mosa anuncia que Colo Colo apelará sanción contra Javier Correa", "url": "https://www.latercera.com/el-deportivo/noticia/es-injusta-y-clasista-raya-lo-inconstitucional-anibal-mosa-anuncia-que-colo-colo-apelara-sancion-contra-javier-correa/", "fonte_id": "la_tercera", "data_pub": "2026-06-25T00:34:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Aníbal Mosa, presidente do Colo Colo, afirmou que a punição de quatro jogos aplicada ao jogador Javier Correa por suas declarações contra o árbitro Nicolás Gamboa é injusta e classista. Mosa anunciou que o clube irá recorrer da decisão, argumentando que ela é inconstitucional.", "titulo_pt": "É injusta e classista; ultrapassa o inconstitucional”: Aníbal Mosa anuncia que Colo Colo apelará sanção contra Javier Correa", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 16082, "titulo": "Two years on, Kenyan families still seek justice after Gen Z protests", "url": "https://www.aljazeera.com/news/2026/6/25/two-years-on-kenyan-families-still-seek-justice-after-gen-z-protests?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-25T00:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Famílias das vítimas fatais e desaparecidas afirmam que as investigações estão paradas e a responsabilização continua fora de alcance. Os protestos da Geração Z ocorreram há dois anos no Quênia.", "titulo_pt": "Dois anos depois, famílias quenianas ainda buscam justiça após protestos da Geração Z", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 16267, "titulo": "Charlie Kirk’s legacy is a 30-year sentence for moving zines", "url": "https://www.theverge.com/policy/956404/prairieland-sentencing-zines-trump-antifa", "fonte_id": "the_verge", "data_pub": "2026-06-24T21:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O texto relata que oito pessoas no Texas foram presas por acusações relacionadas a um caso envolvendo a distribuição de fanzines. A notícia menciona que o caso aconteceu dias após o assassinato do ativista conservador Charlie Kirk e sugere uma possível ligação com as promessas do governo Trump de combater o", "titulo_pt": "Legado de Charlie Kirk é uma sentença de 30 anos por distribuir fanzines", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 16176, "titulo": "Brazil detains Spanish woman for racism, in latest high-profile arrest", "url": "https://www.scmp.com/news/world/americas/article/3358256/brazil-detains-spanish-woman-racism-latest-high-profile-arrest?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-24T18:35:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A polícia federal brasileira prendeu uma cidadã espanhola no Aeroporto Internacional de Guarulhos, em São Paulo, por racismo.  É o último caso de um estrangeiro preso por racismo no Brasil, que possui algumas das leis anti-racismo mais rigorosas da América Latina.", "titulo_pt": "Brasil detém mulher espanhola por racismo, em mais uma prisão de turista", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 16114, "titulo": "UN: RSF used rape and sexual slavery as weapons of war in Sudan since 2023", "url": "https://www.middleeasteye.net/news/un-rsf-used-rape-and-sexual-slavery-weapons-war-sudan-three-years", "fonte_id": "middle_east_eye", "data_pub": "2026-06-24T18:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um relatório do escritório da ONU para os Direitos Humanos (OHCHR) afirma que o grupo paramilitar Rapid Support Forces (RSF) é responsável por cerca de 87% dos incidentes verificados de estupro em bando e escravidão sexual no Sudão nos últimos três anos. Esses crimes podem constituir crimes contra a humanidade.", "titulo_pt": "ONU: RSF usou estupro e escravidão sexual como armas de guerra no Sudão desde 2023", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 16178, "titulo": "French woman rescued in Pakistan after husband allegedly held her captive for 12 years", "url": "https://www.scmp.com/news/asia/south-asia/article/3358254/french-woman-rescued-pakistan-after-husband-allegedly-held-her-captive-12-years?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-24T17:44:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A polícia paquistanesa resgatou uma mulher francesa e seus cinco filhos após ela informar as autoridades que havia sido mantida refém pelo marido por mais de uma década e submetida a anos de abuso doméstico no noroeste do país. A mulher, identificada como Sylvie Yasmina, de 54 anos, foi resgatada no início desta semana de uma casa de tijolos de barro em Bara, uma cidade na província de Khyber Pakhtunkhwa, perto da fronteira com o Afeganistão.", "titulo_pt": "Francesa resgatada no Paquistão após marido supostamente mantê-la refém por 12 anos", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 15611, "titulo": "Após mais de 20 condenações na Corte IDH, Brasil cria departamento de monitoramento", "url": "https://www.jota.info/coberturas-especiais/direitos-humanos/apos-mais-de-20-condenacoes-na-corte-idh-brasil-cria-departamento-de-monitoramento", "fonte_id": "jota", "data_pub": "2026-06-24T17:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Conselho Nacional de Justiça (CNJ) criou um departamento permanente para acompanhar as sentenças e recomendações da Corte Interamericana de Direitos Humanos (CIDH).  A medida foi tomada após o Brasil ter sido condenado mais de 20 vezes pela corte. O departamento terá a função de garantir que o país cumpra suas obrigações internacionais em relação aos direitos humanos.", "titulo_pt": "Após mais de 20 condenações na Corte IDH, Brasil cria departamento de monitoramento", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 15831, "titulo": "Brazilian federal police arrest Spanish citizen at São Paulo airport for racism", "url": "https://www.theguardian.com/world/2026/jun/24/brazilian-police-arrest-spanish-citizen-racism", "fonte_id": "guardian_world", "data_pub": "2026-06-24T17:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A polícia federal brasileira prendeu uma cidadã espanhola no Aeroporto Internacional de Guarulhos, em São Paulo, por acusações de racismo. A detenção ocorreu após a mulher supostamente ter feito comentários racistas contra trabalhadores que descarregavam bagagens. O Brasil possui algumas das leis anti-racismo mais rigorosas da América Latina.", "titulo_pt": "Polícia Federal Brasileira prende cidadã espanhola no aeroporto de São Paulo por racismo", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 16117, "titulo": "‘Genocidaires’ delight’: Israeli Ben & Jerry’s flavour sparks social media backlash", "url": "https://www.middleeasteye.net/trending/genocidaires-delight-israeli-ben-jerrys-flavour-sparks-social-media-backlash", "fonte_id": "middle_east_eye", "data_pub": "2026-06-24T17:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Ben & Jerry's Israel lançou um novo sabor exclusivo de sorvete chamado 'Milk and Honey'.  O lançamento gerou críticas nas redes sociais, com usuários criticando o sabor em meio ao conflito e à violência em Gaza. A empresa já teve desentendimentos com seus cofundadores e a Unilever sobre sua posição.", "titulo_pt": "'Delícia dos genocidas': Novo sabor da Ben & Jerry's no Israel causa reação nas redes sociais", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 16155, "titulo": "Croatia President Strips Branimir Glavas of Decorations After War Crimes Ruling", "url": "https://balkaninsight.com/2026/06/24/croatia-president-strips-branimir-glavas-of-decorations-after-war-crimes-ruling/btj/", "fonte_id": "balkan_insight", "data_pub": "2026-06-24T16:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente da Croácia revogou as decorações do general Branimir Glavas. Um tribunal croata confirmou a condenação de Glavas por crimes de guerra contra civis sérvios em 1991.", "titulo_pt": "Presidente da Croácia Revoca Decorações de Branimir Glavas Após Julgamento por Crimes de Guerra", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}, {"id": 16412, "titulo": "UNICEF Executive Director Catherine Russell's remarks at the United Nations Security Council Open Debate on Children and Armed Conflict", "url": "https://www.unicef.org/press-releases/unicef-executive-director-catherine-russells-remarks-united-nations-security-1", "fonte_id": "unicef", "data_pub": "2026-06-24T15:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Diretora Executiva da UNICEF, Catherine Russell, fez um discurso no Conselho de Segurança das Nações Unidas sobre o impacto dos conflitos armados nas crianças. Ela destacou a necessidade de proteger as crianças em zonas de conflito e garantir seu acesso à educação, saúde e segurança. Russell também apelou para que os países cumpram seus compromissos internacionais de proteção às crianças durante os conflitos.", "titulo_pt": "Discurso da Diretora Executiva da UNICEF, Catherine Russell, na Reunião Aberta do Conselho de Segurança das Nações Unidas sobre Crianças e Conflitos Armados", "veiculo": "UNICEF Global", "pais": "Global", "classe": "A"}, {"id": 15939, "titulo": "UN commission denounces ongoing 'genocide' in Gaza: 'By targeting children, Israel is attacking the very capacity of the Palestinian people to exist'", "url": "https://www.lemonde.fr/en/international/article/2026/06/24/un-commission-denounces-ongoing-genocide-in-gaza-by-targeting-children-israel-is-attacking-the-very-capacity-of-the-palestinian-people-to-exist_6754835_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-24T13:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma comissão internacional de investigação da ONU acusou unidades das forças de segurança israelenses de serem responsáveis por mortes de crianças palestinas. Israel condenou o relatório como 'difamatório'. O relatório foi publicado na terça-feira.", "titulo_pt": "Comissão da ONU denuncia 'genocídio' em Gaza: Israel ataca capacidade de existência do povo palestino", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}], "direitos_humanos__eventos": []}, "noticias": [{"id": 15683, "fonte_id": "elpais_a const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
