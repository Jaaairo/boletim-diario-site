ropoles", "data_pub": "2026-07-20T10:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A polícia realiza uma operação extensa com o objetivo de localizar os assassinos do policial civil no Rio de Janeiro e coletar novas evidências para o inquérito.", "titulo_pt": "Polícia realiza megaoperação para encontrar assassinos de policial civil no Rio", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 62194, "titulo": "Who counts as “working class”?", "url": "https://www.vox.com/politics/495834/dsa-working-class-college-educated", "fonte_id": "vox", "data_pub": "2026-07-20T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Democratic Socialists of America declara lutar pelo 'governo do, para e pela classe trabalhadora', mas sua base e candidatos são principalmente profissionais bem educados. Em 2021, 80% dos membros maiores de 25 anos tinham diploma universitário e 28% ganhavam mais de $100.000 por ano.", "titulo_pt": "Quem se classifica como 'classe trabalhadora'?", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 62151, "titulo": "Préstamos para inmigrantes: la nueva alerta a los bancos que pone el foco en los permisos de trabajo", "url": "https://www.lanacion.com.ar/estados-unidos/migraciones/prestamos-para-inmigrantes-la-nueva-alerta-a-los-bancos-que-pone-el-foco-en-los-permisos-de-trabajo-nid20072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-20T09:28:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A nova alerta bancária se concentra no uso de permisos de trabalho para obter empréstimos. A falta de autorização de emprego impede o acesso a esses serviços.", "titulo_pt": "Préstamos para imigrantes: a nova alerta aos bancos que destaca os permisos de trabalho", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 61977, "titulo": "Pagamentos do Bolsa Família de julho começam hoje: veja o calendário", "url": "https://veja.abril.com.br/brasil/pagamentos-do-bolsa-familia-de-julho-comecam-hoje-veja-o-calendario/", "fonte_id": "veja", "data_pub": "2026-07-20T08:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os pagamentos do Bolsa Família para julho começam hoje, com os beneficiários que possuem o dígito final 1 no Número de Identificação Social (NIS) recebendo primeiro. O calendário completo será divulgado posteriormente.", "titulo_pt": "Pagamentos do Bolsa Família de julho começam hoje: veja quem recebe primeiro", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 62130, "titulo": "Atrasar não é economizar: o paciente não pode esperar", "url": "https://www.jota.info/opiniao-e-analise/artigos/atrasar-nao-e-economizar-o-paciente-nao-pode-esperar", "fonte_id": "jota", "data_pub": "2026-07-20T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto destaca que o impacto financeiro na concessão de patentes não deve priorizar a economia sobre o acesso aos tratamentos médicos.", "titulo_pt": "Atrasar não é economizar: o paciente não pode esperar", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 62480, "titulo": "Japanese mayor makes history with maternity leave that caused a stir", "url": "https://www.japantimes.co.jp/news/2026/07/20/japan/politics/yawata-mayor-maternity-leave-history/", "fonte_id": "japan_times", "data_pub": "2026-07-20T07:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Shoko Kawata, de 33 anos, tornou-se a mais jovem prefeita feminina do Japão em 2023. Ela é a atual prefeita de Yawata, no Präfektura de Kyoto.", "titulo_pt": "Prefeita japonesa se destaca com licença maternidade que causou comoção", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 62198, "titulo": "Taxpayers could pay millions to abuse survivors if Christian Brothers goes bankrupt, court documents reveal", "url": "https://www.theguardian.com/australia-news/2026/jul/20/christian-brothers-australia-abuse-survivors-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-07-20T07:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O tribunal revelou que o Christian Brothers, uma ordem católica com um histórico de abuso infantil, está prestes a falir e não poderá pagar as vítimas. Isso pode fazer com que os contribuintes australianos tenham que cobrir até 65 milhões de dólares em indenizações para centenas de sobreviventes.", "titulo_pt": "Contribuintes poderiam pagar milhões por vítimas de abuso se Christian Brothers falir", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 62058, "titulo": "Pagamentos de julho do bolsa família começam hoje: confira calendário", "url": "https://exame.com/invest/minhas-financas/pagamentos-de-julho-do-bolsa-familia-comecam-hoje-confira-calendario/", "fonte_id": "exame", "data_pub": "2026-07-20T05:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os pagamentos do Bolsa Família para o mês de julho estarão disponíveis para movimentação entre os dias 20 e 31 desse mês.", "titulo_pt": "Pagamentos do bolsa família de julho começam hoje: confira calendário", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 62338, "titulo": "In Paris café, terror attack survivors find community: 'People want to tell each other: I am alive'", "url": "https://www.lemonde.fr/en/m-le-mag/article/2026/07/20/in-a-paris-cafe-terror-attack-survivors-find-community-people-want-to-tell-each-other-i-am-alive_6755639_117.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-20T03:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Surviventes e familiares das vítimas dos ataques de 2015 em Paris se encontram regularmente em um bar para compartilhar experiências, buscar consolo e se divertir juntos. Eles se reúnem mensalmente e incluem também pessoas que foram afetadas por outros atentados.", "titulo_pt": "Em cafés parisienses, sobreviventes de ataques encontram comunidade e apoio", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 62341, "titulo": "Hundreds of thousands of Venezuelans need aid after earthquakes: 'We have no income left'", "url": "https://www.lemonde.fr/en/international/article/2026/07/20/hundreds-of-thousands-of-venezuelans-need-aid-after-earthquakes-we-have-no-income-left_6755638_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-20T01:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Organização das Nações Unidas estima que 650 mil pessoas, incluindo 230 mil crianças, foram afetadas pelos terremotos devastadores de 24 de junho, que já causaram mais de 5.000 mortes - um número ainda em aumento. Trabalhadores humanitários alertam que a emergência sanitária não terminou.", "titulo_pt": "Centenas de milhares de venezuelanos precisam de ajuda após os terremotos: 'não temos mais renda'}", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 61195, "titulo": "College enrollment shows slump", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/20/2003861054", "fonte_id": "taipei_times", "data_pub": "2026-07-20T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O número de alunos matriculados em colégios mostrou uma diminuição. Essa tendência foi observada em várias instituições de ensino ao longo do período analisado.", "titulo_pt": "Matrículas em colégios registram decréscimo", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 62235, "titulo": "Lluvias provocan millonarios daños a la agricultura: paltos y cítricos serían los más afectados", "url": "https://www.latercera.com/pulso/noticia/lluvias-provocan-millonarios-danos-a-la-agricultura-paltos-y-citricos-serian-los-mas-afectados/", "fonte_id": "la_tercera", "data_pub": "2026-07-20T11:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Segundo Rodrigo Gil, gerente do área de Campos Agrícolas de Colliers, os danos totais causados pelas chuvas superam US$200 milhões. Apesar dos estragos nas infraestruturas e alguns cultivos, a precipitação é vista como positiva por alguns gremios, pois alivia uma sequia prolongada.", "titulo_pt": "Chuvas causam danos milionários à agricultura: paltos e cítricos seriam os mais afetados", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 62193, "titulo": "It’s no longer illegal to destroy the one thing endangered species need most to survive", "url": "https://www.vox.com/climate/496053/trump-endangered-species-act-harm-rule", "fonte_id": "vox", "data_pub": "2026-07-20T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Adestramento de animais em áreas urbanizadas é o maior perigo para espécies endêmicas nos Estados Unidos e em todo o mundo. A lei americana que protege essas espécies, a Lei de Especies Ameaçadas, foi criada justamente para combater essa destruição de habitats.", "titulo_pt": "Não é mais ilegal destruir o que as espécies ameaçadas precisam mais para sobreviver", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 62597, "titulo": "UNESCO officials call for urgent global awakening to protect heritage sites from climate change, conflicts", "url": "https://en.yna.co.kr/view/AEN20260720008400315", "fonte_id": "yonhap_news", "data_pub": "2026-07-20T07:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Autoridades da UNESCO chamaram para uma ação urgente global para proteger os sítios culturais diante do impacto das mudanças climáticas e conflitos. O apelo ocorreu durante uma reunião em Busan, Coreia do Sul.", "titulo_pt": "Autoridades da UNESCO pedem alerta global urgente para proteger patrimônios devido às mudanças climáticas e conflitos", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 62043, "titulo": "35% dos ativos físicos de grandes empresas estão expostos a desastres climáticos", "url": "https://exame.com/bussola/35-dos-ativos-fisicos-de-grandes-empresas-es const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml(topico) : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml(audioKey) {
  const audio = D.audio && D.audio.sumarios && D.audio.sumarios[audioKey];
  if (!audio || !audio.arquivo) return "";
  const src = audio.arquivo + (audio.versao ? "?v=" + encodeURIComponent(audio.versao) : "");
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta" data-audio-src="${esc(src)}" data-audio-key="${esc(audioKey)}">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml("destaque")}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}

  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — audio pre-renderizado por Piper
(function () {
  var player = document.createElement('audio');
  player.preload = 'auto';
  player.setAttribute('playsinline', '');
  document.body.appendChild(player);
  var barAtual = null;

  function _resetBar(bar) {
    if (!bar) return;
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  function _setTocando(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _setPausado(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _tituloAudio(bar) {
    var h = bar.previousElementSibling;
    while (h && !/^H2$/i.test(h.tagName || '')) h = h.previousElementSibling;
    return h ? (h.innerText || h.textContent || 'Boletim Diario').trim() : 'Boletim Diario';
  }

  function _mediaSession(bar) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: _tituloAudio(bar),
      artist: 'Boletim Diario',
      album: 'Leitura dos sumarios',
    });
    navigator.mediaSession.setActionHandler('play', function () { player.play().catch(function () {}); });
    navigator.mediaSession.setActionHandler('pause', function () { player.pause(); });
    navigator.mediaSession.setActionHandler('stop', function () { player.pause(); player.currentTime = 0; });
  }

  window.ttsOuvir = function (btn) {
    var bar = btn.closest('.tts-bar');
    var src = bar && bar.dataset.audioSrc;
    if (!src) return;
    if (barAtual && barAtual !== bar) _resetBar(barAtual);
    barAtual = bar;
    if (player.src !== new URL(src, window.location.href).href) {
      player.src = src;
      player.currentTime = 0;
    } else {
      player.currentTime = 0;
    }
    _mediaSession(bar);
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _resetBar(bar);
    });
  };

  window.ttsPausar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    _setPausado(bar);
  };

  window.ttsContinuar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _setPausado(bar);
    });
  };

  window.ttsPar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    player.currentTime = 0;
    _resetBar(bar);
    if (barAtual === bar) barAtual = null;
  };

  player.addEventListener('ended', function () { _resetBar(barAtual); barAtual = null; });
  player.addEventListener('error', function () { _resetBar(barAtual); barAtual = null; });
  window.addEventListener('beforeunload', function () { player.pause(); });
})();
</script>
</body>
