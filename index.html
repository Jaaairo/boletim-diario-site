06-23T20:57:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo brasileiro prorrogou por seis meses as cotas que permitem a importação de kits de peças para veículos elétricos sem pagamento de Imposto de Importação. Essa medida beneficia principalmente a fabricante chinesa BYD. A decisão aprofunda a disputa entre a BYD e as montadoras brasileiras.", "titulo_pt": "Governo renova cota de importação de peças para carros elétricos", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 13097, "titulo": "Lula melhora, mas rejeição cresce, aponta pesquisa Indexa", "url": "https://www.jota.info/eleicoes/eleicoes-2026/lula-melhora-mas-rejeicao-cresce-aponta-pesquisa-indexa", "fonte_id": "jota", "data_pub": "2026-06-23T19:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma nova pesquisa da Indexa revela que a rejeição ao presidente Lula aumentou de 46% para 49%.  A resistência à reeleição do presidente caiu de 59% para 51%.", "titulo_pt": "Lula melhora, mas rejeição aumenta, aponta pesquisa Indexa", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 13094, "titulo": "Banco de Edir Macedo, da Igreja Universal, é alvo de operação da PF contra fraudes no sistema financeiro: o que se sabe", "url": "https://www.bbc.com/portuguese/articles/c4gyjl3vdmro?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-23T19:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal (PF) realiza uma operação contra o Banco da Universal, banco ligado ao bispo Edir Macedo. A suspeita é que o banco tenha usado fundos de investimentos para esconder sua real situação financeira.", "titulo_pt": "Banco do Edir Macedo, da Igreja Universal, alvo de operação da PF contra fraudes no sistema financeiro", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 12851, "titulo": "PF descreve esquema no Digimais, de Edir Macedo, similar ao do Banco Master; veja ponto a ponto", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/pf-descreve-esquema-no-digimais-de-edir-macedo-similar-ao-do-banco-master-veja-ponto-a-ponto.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-23T19:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Operação Miragem, deflagrada pela Polícia Federal nesta terça-feira (23), investiga um suposto esquema fraudulento no Digimais. O esquema se assemelha em diversos pontos ao modus operandi do Banco Master.", "titulo_pt": "PF descreve esquema no Digimais, de Edir Macedo, similar ao do Banco Master; veja ponto a ponto", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 13099, "titulo": "Ortobom é condenada pelo TST a pagar R$ 300 mil em indenização por exclusão de mulheres em cargos de gerência", "url": "https://www.jota.info/trabalho/ortobom-e-condenada-pelo-tst-a-pagar-r-300-mil-em-indenizacao-por-exclusao-de-mulheres-em-cargos-de-gerencia", "fonte_id": "jota", "data_pub": "2026-06-23T17:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Tribunal Superior do Trabalho (TST) condenou a Ortobom a pagar R$ 300 mil em indenização por discriminação contra mulheres. Os ministros destacaram que as 22 gerências e 2 subgerências da empresa eram ocupadas exclusivamente por homens.", "titulo_pt": "Ortobom condenada a pagar R$ 300 mil por exclusão de mulheres em cargos de gerência", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 13100, "titulo": "Justiça Federal bloqueia R$ 670 milhões em bens de ligados ao Digimais, banco de Edir Macedo", "url": "https://www.jota.info/justica/justica-federal-bloqueia-r-670-milhoes-em-bens-de-ligados-ao-digimais-banco-de-edir-macedo", "fonte_id": "jota", "data_pub": "2026-06-23T17:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Justiça Federal bloqueou R$ 670 milhões em bens de pessoas relacionadas ao Digimais, banco do bispo Edir Macedo. A investigação apura crimes de gestão fraudulenta, inserção de dados falsos em demonstrativos contábeis e realização de operações de crédito vedadas.", "titulo_pt": "Justiça Federal bloqueia R$ 670 milhões em bens de pessoas ligadas ao Digimais, banco de Edir Macedo", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 12897, "titulo": "Flávio deve criticar Lula e defender punições individuais em audiência nos EUA, diz aliado", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/flavio-deve-criticar-lula-e-defender-punicoes-individuais-em-audiencia-nos-eua-diz-aliado.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-23T17:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio Bolsonaro irá participar de uma audiência pública no governo americano sobre tarifas de 25% para produtos brasileiros. Ele pretende citar o presidente Lula e pedir que as punições sejam direcionadas aos responsáveis pelas práticas investigadas, e não à economia brasileira como um todo.", "titulo_pt": "Flávio Bolsonaro deve criticar Lula e defender punições individuais em audiência nos EUA, diz aliado", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 12878, "titulo": "Datafolha: 59% dizem apoiar classificação de PCC e CV como terroristas; 74% são contra ação dos EUA sem autorização do Brasil", "url": "https://g1.globo.com/politica/eleicoes/2026/pesquisa-eleitoral/noticia/2026/06/23/datafolha-classificacao-de-pcc-e-cv-como-terroristas.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-23T16:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa Datafolha indica que 59% dos brasileiros concordam com a classificação do PCC e Comando Vermelho como organizações terroristas.  22% discordam totalmente da classificação, enquanto 11% discordam em parte.", "titulo_pt": "Datafolha: 59% apoiam classificação de PCC e CV como terroristas", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 12862, "titulo": "Polícia Federal aponta fraudes que geraram renda fictícia de R$ 199 milhões em banco de Edir Macedo", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/06/policia-federal-aponta-fraudes-que-geraram-renda-ficticia-de-r-199-milhoes-em-banco-de-edir-macedo.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-23T16:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal investiga o banco Digimais e aponta o uso de reavaliações de direitos creditórios para inflar o valor dos ativos. Essa prática gerou uma renda fictícia de R$ 199 milhões nos balanços do banco.", "titulo_pt": "Polícia Federal aponta fraudes que geraram renda fictícia de R$ 199 milhões no banco de Edir Macedo", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 12863, "titulo": "Polícia prende servidores do BRB por golpe contra mais de 3.500 aposentados", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/policia-prende-servidores-do-brb-por-golpe-contra-mais-de-3500-aposentados.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-23T16:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Civil do Distrito Federal prendeu três servidores do Banco de Brasília (BRB) suspeitos de descontos associativos não autorizados em contas de aposentados e pensionistas. O crime afetou mais de 3.500 pessoas.", "titulo_pt": "Polícia prende servidores do BRB por golpe contra mais de 3.500 aposentados", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 12879, "titulo": "Justiça da Flórida aceita Brasil em ação de Rumble e Trump Media contra Moraes e nega pedido para julgar ministro à revelia", "url": "https://g1.globo.com/politica/noticia/2026/06/23/justica-da-florida-aceita-brasil-em-acao-de-rumble-e-trump-media-contra-moraes.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-23T16:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Justiça Federal da Flórida aceitou o pedido para que o Brasil participe da ação movida por Trump Media e Rumble contra o ministro Alexandre de Moraes. O processo busca responsabilizar Moraes por supostas ações em relação a conteúdos online. A corte negou o pedido para julgar o caso à revelia, pois Moraes não se manifestou diretamente no processo.", "titulo_pt": "Justiça da Flórida inclui Brasil em ação de Rumble e Trump Media contra Moraes, mas nega julgamento à revelia", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 12898, "titulo": "Datafolha: 59% apoiam classificar PCC e CV como terroristas; 74% repelem ingerência dos EUA", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/datafolha-59-apoiam-classificar-pcc-e-cv-como-terroristas-74-repelem-ingerencia-dos-eua.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-23T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa Datafolha mostra que 59% dos brasileiros concordam com a classificação do PCC e do CV como organizações terroristas pelos Estados Unidos. A pesquisa também indica que 74% dos brasileiros se opõem à interferência dos EUA no Brasil.", "titulo_pt": "Datafolha: 59% apoiam classificar PCC e CV como terroristas; 74% repelem ingerência dos EUA", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 13104, "titulo": "Desconfianças rondam bastidores da política em SP", "url": "https://www.jota.info/opiniao-e-analise/colunas/coluna-do-bombig/desconfiancas-rondam-bastidores-da-politica-em-sp", "fonte_id": "jota", "data_pub": "2026-06-23T14:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Divisões dentro do partido de Haddad, receios de Tarcísio agir de forma passiva e incertezas sobre o papel de Kassab estão criando um clima negativo nos bastidores políticos de São Paulo.", "titulo_pt": "Desconfianças permeiam bastidores da política em São Paulo", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 14210, "titulo": "Germany rail network halted nationwide due to IT malfunction", "url": "https://www.bbc.co.uk/news/articles/crm0ek4z7ggo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-23T23:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A companhia ferroviária Deutsche Bahn interrompeu os serviços ferroviários em todo o país por mais de duas horas e meia. A paralisação foi causada por um problema técnico no sistema de informação.", "titulo_pt": "Rede ferroviária alemã paralisada nacionalmente por falha de sistema informático", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 14196, "titulo": "Alan Wilson, boosted by Trump’s late co-endorsement, wins South Carolina governor runoff", "url": "https://www.politico.com/news/2026/06/23/wilson-wins-south-carolina-governor-primary-00973028", "fonte_id": "politico", "data_pub": "2026-06-23T23:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Alan Wilson venceu o runoff para governador da Carolina do Sul. O presidente Donald Trump endossou a candidatura de Wilson após inicialmente apoiar seu oponente. A vitória de Wilson evita que Trump tenha outro erro em uma disputa primária.", "titulo_pt": "Alan Wilson vence runoff para governador da Carolina do Sul com apoio tardio de Trump", "veiculo": "Politico", "pais": "EUA", "classe": "A"}, {"id": 13979, "titulo": "Tribunal permite que Trump prossiga com esforços de deportação em massa", "url": "https://www.cnnbrasil.com.br/internacional/tribunal-permite-que-trump-prossiga-com-esforcos-de-deportacao-em-massa/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-23T23:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um tribunal autorizou o governo a continuar com os esforços de deportação em massa.  Anteriormente, um tribunal de primeira instância havia bloqueado essa medida do governo. O governo busca expandir uma política de deportação.", "titulo_pt": "Tribunal permite que Trump prossiga com esforços de deportação em massa", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 14211, "titulo": "Chinese e-commerce giant Alibaba sues US government over defence blacklist", "url": "https://www.bbc.co.uk/news/articles/ckg0258vpvqo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-23T23:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Alibaba está processando o Departamento de Defesa dos EUA após ser adicionada a uma lista de empresas com ligações ao exército chinês. A empresa foi incluída na lista sob alegações de vínculo com o setor militar chinês.", "titulo_pt": "Gigante do comércio eletrônico chinês Alibaba processa governo americano por lista de defesa", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 13925, "titulo": "Aprovação de Trump atinge 34%, o menor índice do 2º mandato, diz pesquisa", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/aprovacao-de-trump-atinge-34-o-menor-indice-do-2o-mandato-diz-pesquisa.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-23T23:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa Reuters/Ipsos revelou que a aprovação do presidente dos Estados Unidos, Donald Trump, atingiu 34%, o menor índice registrado durante seu segundo mandato. O cenário de desgastes se deve à guerra contra o Irã e a avaliações negativas sobre a economia.", "titulo_pt": "Aprovação de Trump atinge 34%, menor índice do segundo mandato, diz pesquisa", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 14229, "titulo": "Hormuz closure strands almost 1,200 cargo ships with $125bn worth of goods", "url": "https://www.ft.com/content/4d3dd2b7-cb6b-410b-8c15-203904f32294", "fonte_id": "financial_times", "data_pub": "2026-06-23T23:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O fechamento do Estreito de Ormuz deixou cerca de 1.200 navios mercantes presos, representando US$ 125 bilhões em bens. A situação é considerada inédita e causa preocupação sobre o futuro do comércio marítimo global, segundo a seguradora Allianz.", "titulo_pt": "Fechamento do Hormuz deixa quase 1.200 navios mercantes com US$ 125 bilhões em mercadorias", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 14249, "titulo": "Riprendono a circolare i primi treni in Germania", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/24/riprendono-a-circolare-i-primi-treni-in-germania_7a3c7f8b-2bd9-4cc0-82b7-ee435dc9a723.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-23T22:48:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Os trens voltaram a circular na Alemanha após um bloqueio causado por uma falha mecânica. O tráfego ferroviário havia sido interrompido devido ao problema.  Não há informações sobre o tipo de falha ou a extensão do impacto.", "titulo_pt": "Trens voltam a circular na Alemanha", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 14075, "titulo": "Irán se despide de Los Ángeles con un mensaje de reivindicación tras las restricciones de Estados Unidos", "url": "https://elpais.com/us/2026-06-23/iran-se-despide-de-los-angeles-con-un-mensaje-de-reivindicacion-tras-las-restricciones-de-estados-unidos.html", "fonte_id": "elpais_america", "data_pub": "2026-06-23T22:43:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A seleção iraniana de futebol agradeceu o apoio da diáspora iraniana na Califórnia. A equipe foi obrigada a se concentrar em Tijuana e cruzar a fronteira para cada partida devido às restrições dos Estados Unidos.", "titulo_pt": "Irã se despede de Los Angeles com mensagem de reivindicação após restrições dos Estados Unidos", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 13926, "titulo": "Comissão da ONU conclui que Exército de Israel 'visa deliberadamente' crianças em Gaza e comete genocídio", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/comissao-da-onu-conclui-que-exercito-de-israel-visa-deliberadamente-criancas-em-gaza-e-comete-genocidio.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-23T22:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma comissão internacional de investigação da ONU acusou Israel de 'visar deliberadamente' crianças palestinas na Faixa de Gaza. A comissão afirmou também que o que ocorre no território é um genocídio.", "titulo_pt": "Comissão da ONU conclui que Exército de Israel 'visa deliberadamente' crianças em Gaza e comete genocídio", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 14076, "titulo": "Inglaterra se atasca con Ghana y se jugará la primera plaza del grupo en la última jornada", "url": "https://elpais.com/deportes/mundial-futbol/2026-06-23/inglaterra-se-atasca-con-ghana-y-se-jugara-la-primera-plaza-del-grupo-en-la-ultima-jornada.html", "fonte_id": "elpais_america", "data_pub": "2026-06-23T22:38:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Inglaterra e Gana empataram em 0 a 0. O jogo foi dominado pela Inglaterra, mas com pouco futebol jogado. A partida decisiva para o primeiro lugar do grupo será na última rodada.", "titulo_pt": "Inglaterra empata com Gana e decidirá primeira colocação do grupo na última rodada", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 14194, "titulo": "Supreme Court rules that prison guards can't be sued for shaving Rastafarian's head", "url": "https://www.npr.org/2026/06/23/nx-s1-5867684/supreme-court-prison-guards-rastafarian-dreadlocks", "fonte_id": "npr_news", "data_pub": "2026-06-23T22:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal decidiu que um prisioneiro da Louisiana, cujos dreadlocks foram forçadamente aparados por guardas prisionais, não pode processar os guardas sob uma lei federal para proteger os direitos religiosos dos prisioneiros. A corte afirmou que a lei de 1978 não se aplica a casos em que o governo age para manter a ordem e segurança dentro das prisões.", "titulo_pt": "Supremo Tribunal decide que guardas prisionais não podem ser processados por cortar cabelo de rastafaari", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 13927, "titulo": "Exército de Mianmar matou mais de 700 civis durante período eleitoral, afirma ONU", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/exercito-de-mianmar-matou-mais-de-700-civis-durante-periodo-eleitoral-afirma-onu.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-23T22:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um relatório do Alto Comissariado da ONU para os Direitos Humanos afirmou que mais de 700 civis foram mortos pelo Exército de Mianmar entre agosto de 2025 e janeiro de 2026. O período abrangeu o ciclo eleitoral no país. O relatório foi lançado na segunda-feira (22).", "titulo_pt": "Exército de Mianmar matou mais de 700 civis durante período eleitoral, afirma ONU", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 14101, "titulo": "Subsecretaría de Prevención del Delito contrató a abogada que vende repuestos a Carabineros a través de sociedad involucrada en el Milicogate", "url": "https://www.ciperchile.cl/2026/06/23/subsecretaria-de-prevencion-del-delito-contrato-a-abogada-que-vende-repuestos-a-carabineros-a-traves-de-sociedad-involucrada-en-el-milicogate/?utm_source=rss&utm_medium=rss&utm_campaign=subsecretaria-de-prevencion-del-delito-contrato-a-abogada-que-vende-repuestos-a-carabineros-a-traves-de-sociedad-involucrada-en-el-milicogate", "fonte_id": "ciper_chile", "data_pub": "2026-06-23T22:21:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Subsecretaria de Prevenção do Crime contratou uma advogada que vende peças para a Carabineros através de uma sociedade envolvida no escândalo Milicogate. O caso Milicogate envolve corrupção e favorecimento em contratos com empresas que fornecem serviços à polícia chilena.", "titulo_pt": "Subsecretaria de Prevenção do Crime contratou advogada que vende peças para Carabineros por meio de sociedade envolvida no caso Milicogate", "veiculo": "CIPER Chile", "pais": "Chile", "classe": "A"}, {"id": 14217, "titulo": "Macron pays homage to late scholar and Resistance fighter Marc Bloch, who joins Pantheon", "url": "https://www.lemonde.fr/en/international/article/2026/06/24/macron-pays-homage-to-late-scholar-and-resistance-fighter-marc-bloch-who-joins-pantheon_6754809_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-23T22:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente francês Emmanuel Macron homenageou o historiador Marc Bloch como um 'homem da Ilustração'. Após a ocupação nazista da França, Bloch se juntou à Resistência Francesa em 1943. Ele foi preso em 1944, torturado pela Gestapo e executado pelos nazistas em 16 de junho de 1944.", "titulo_pt": "Macron homenageia Marc Bloch, estudioso e resistente francês, que entra no Panteão", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 14253, "titulo": "China beats U.S. with world’s fastest supercomputer, but race not geared for AI work", "url": "https://www.japantimes.co.jp/business/2026/06/24/tech/china-us-supercomputer-ai-work/", "fonte_id": "japan_times", "data_pub": "2026-06-23T22:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O China ganhou a lista de supercomputadores mais rápidos do mundo. A vitória chinesa provavelmente demonstra o desejo da China por reconhecimento por seus esforços no design de chips. O objetivo da competição não é necessariamente para trabalhos de inteligência artificial.", "titulo_pt": "China supera EUA com supercomputador mais rápido do mundo, mas corrida não visa trabalho de IA", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 14254, "titulo": "Trump, Iran at odds over nuclear inspections and frozen assets in deal to end war", "url": "https://www.japantimes.co.jp/news/2026/06/24/world/politics/trump-iran-nuclear-inspections-frozen-assets/", "fonte_id": "japan_times", "data_pub": "2026-06-23T22:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Estados Unidos e Irã apresentaram versões diferentes sobre incentivos financeiros, a passagem do Estreito de Ormuz e a guerra paralela do Israel no Líbano. As duas nações também discordam sobre as inspeções nucleares e os ativos congelados como parte de um possível acordo para encerrar o conflito.", "titulo_pt": "Trump e Irã divergem sobre inspeções nucleares e ativos congelados em acordo para fim da guerra", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 13920, "titulo": "Economia argentina mantém ritmo de crescimento no 1º trimestre com alta de 2,3% no PIB", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/economia-argentina-mantem-ritmo-de-crescimento-no-1o-trimestre-com-alta-de-23-no-pib.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-23T23:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A economia argentina cresceu 2,3% no primeiro trimestre de 2026 em relação ao mesmo período do ano anterior. As exportações impulsionaram o crescimento. O poder de compra e o emprego apresentaram sinais de deterioração.", "titulo_pt": "Economia argentina mantém ritmo de crescimento no primeiro trimestre de 2026", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 13930, "titulo": "Dólar sobe para R$ 5,18 e atinge maior valor desde fim de março", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/dolar-sobe-para-r-518-e-atinge-maior-valor-desde-fim-de-marco", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-23T23:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O dólar subiu nesta terça-feira (23) e fechou no nível mais elevado em quase três meses. A bolsa de valores brasileira teve leve alta, refletindo o alívio após a divulgação da ata do Copom. Investidores internacionais acompanharam a queda das ações de tecnologia nos Estados Unidos, as negociações envolvendo o petróleo e sinais sobre a política monetária do Federal Reserve.", "titulo_pt": "Dólar sobe para R$ 5,18 e atinge maior valor desde fim de março", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 13921, "titulo": "Itaú muda home office e aumenta dias de presencial a partir do próximo ano", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/itau-muda-home-office-e-aumenta-dias-de-presencial-a-partir-do-proximo-ano.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-23T23:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Itaú Unibanco anunciou uma mudança no modelo de trabalho, exigindo que os funcionários compareçam ao escritório com mais frequência. A nova política entra em vigor a partir do próximo ano.", "titulo_pt": "Itaú muda modelo de trabalho e aumenta dias de presencialidade a partir do próximo ano", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 14296, "titulo": "(LEAD) Seoul to continue push for MSCI developed market status bid after remaining in emerging category", "url": "https://en.yna.co.kr/view/AEN20260624000951320", "fonte_id": "yonhap_news", "data_pub": "2026-06-23T22:52:00Z", "idioma": "en", "provavel_duplicata_de": 14262, "texto_pt": "A Coreia do Sul continuará sua campanha para ser incluída no índice de mercados desenvolvidos da MSCI. O país permanece classificado como um mercado emergente pela MSCI, apesar dos esforços para mudar essa classificação.", "titulo_pt": "Seoul continuará a buscar status de mercado desenvolvido da MSCI após permanecer na categoria emergente", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 13922, "titulo": "Previsão de safra na UE é boa, mas calor poderá afetar setor", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/vaivem/2026/06/previsao-de-safra-na-ue-e-boa-mas-calor-podera-afetar-setor.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-23T22:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A produção de grãos na União Europeia deve cair para 277 milhões de toneladas este ano. Apesar da redução, o volume colhido permanecerá próximo à média dos últimos cinco anos. O calor intenso no continente europeu está impactando a produção.", "titulo_pt": "Previsão de safra na UE é boa, mas calor pode afetar setor", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 13923, "titulo": "Presidente do conselho da Vale acusa Previ de abuso de poder de voto", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/presidente-do-conselho-da-vale-acusa-previ-de-abuso-de-poder-de-voto.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-23T21:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Daniel Stieler, presidente do conselho de administração da Vale, afirma que a ação da Previ contra seu cargo viola regras internas e prejudica a governança da empresa. Ele acusa a fundação de usar seu poder de voto de forma abusiva.", "titulo_pt": "Presidente do Conselho da Vale acusa Previ de abuso de poder de voto", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 13924, "titulo": "Fabricante do Ozempic faz acordo com Re.green para restauração da amazônia", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/fabricante-do-ozempic-faz-acordo-com-regreen-para-restauracao-da-amazonia.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-23T21:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O laboratório dinamarquês Novo Nordisk, fabricante da caneta emagrecedora Ozempic, firmou um acordo com a empresa brasileira Re.green para a restauração da Amazônia. O anúncio foi feito nesta terça-feira (23).", "titulo_pt": "Fabricante do Ozempic faz acordo com Re.green para restauração da Amazônia", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 14041, "titulo": "Bradesco (BBDC4) anuncia pagamento de R$ 3,5 bilhões em juros sobre capital próprio", "url": "https://www.infomoney.com.br/mercados/bradesco-bbdc4-anuncia-pagamento-de-r-35-bilhoes-em-juros-sobre-capital-proprio/", "fonte_id": "infomoney", "data_pub": "2026-06-23T21:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Bradesco anunciou o pagamento de R$ 3,5 bilhões em juros sobre capital próprio. O valor será distribuído como R$ 0,315359035 por ação ordinária e R$ 0,346894939 por ação preferencial.", "titulo_pt": "Bradesco (BBDC4) anuncia pagamento de R$ 3,5 bilhões em juros sobre capital próprio", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 13030, "titulo": "Bitcoin hoje: cripto cai com aposta de alta de juros nos EUA e crise no Oriente Médio", "url": "https://www.infomoney.com.br/mercados/bitcoin-hoje-cripto-cai-com-aposta-de-alta-de-juros-nos-eua-e-crise-no-oriente-medio/", "fonte_id": "infomoney", "data_pub": "2026-06-23T20:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O bitcoin recuava 3,63%, cotado a US$ 62.146,90, enquanto o ethereum caía 5,10%, a US$ 1.653,67. As quedas ocorreram por volta das 16h (em Brasília), segundo dados da plataforma Coinbase.", "titulo_pt": "Bitcoin hoje: cripto cai com aposta de alta de juros nos EUA e crise no Oriente Médio", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 12849, "titulo": "Proibidas de entrar em campo", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/lorena-hakak/2026/06/proibidas-de-entrar-em-campo.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-23T20:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Copa do Mundo começou e o clima de torcida aumenta com cada jogo da seleção brasileira. As pessoas se divertem assistindo aos jogos em casa ou nos encontros com amigos.", "titulo_pt": "Proibidas de entrar em campo", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 13016, "titulo": "Bitcoin cai com previsão de alta dos juros nos EUA e crise no Oriente Médio", "url": "https://www.cnnbrasil.com.br/economia/mercado/criptomoedas-bitcoin-cai-com-apostas-de-elevacao-de-juros-nos-eua-e-crise-no-oriente-medio/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-23T20:13:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Bitcoin caiu devido à expectativa de aumento dos juros nos Estados Unidos e à crise no Oriente Médio. Analistas apontam que a moeda digital continua fortemente ligada ao mercado de ações americano, e as expectativas de juros mais altos diminuem o apetite por risco.", "titulo_pt": "Bitcoin cai com previsão de alta dos juros nos EUA e crise no Oriente Médio", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 12886, "titulo": "Pix por aproximação passa a mostrar saldo antes do pagamento", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/pix-por-aproximacao-passa-mostrar-saldo-antes-do-pagamento", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-23T20:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Pix por aproximação agora permite que os usuários visualizem seu saldo e limite de conta antes de realizar um pagamento. Essa funcionalidade, chamada 'jornada otimizada' pelo Banco Central, visa reduzir pagamentos falhos por falta de saldo e agilizar o processo. A opção é opcional e depende da autorização do cliente.", "titulo_pt": "Pix por aproximação passa a mostrar saldo antes do pagamento", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 12887, "titulo": "Fazenda lança painel que detalha R$ 340 bi em benefícios fiscais", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/fazenda-lanca-painel-que-detalha-r-340-bi-em-beneficios-fiscais", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-23T19:47:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério da Fazenda lançou um painel que detalha os benefícios fiscais no Brasil, totalizando R$ 340 bilhões. O painel permite consultar quem recebe esses benefícios e como os recursos são distribuídos entre setores, regiões e programas.  A ferramenta consolida informações da Receita Federal e permite análises sobre o perfil econômico dos beneficiários.", "titulo_pt": "Fazenda lança painel com detalhes sobre R$ 340 bi em benefícios fiscais", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 13524, "titulo": "Acclaimed bankruptcy lawyer James Sprayregen set to join Paul Weiss", "url": "https://www.ft.com/content/0965a607-f6e1-4553-a631-abd3533bc22b", "fonte_id": "financial_times", "data_pub": "2026-06-23T19:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "James Sprayregen, ex-sócio da Kirkland & Ellis, se juntará ao escritório de advocacia Paul Weiss. Sprayregen ajudou a transformar a Kirkland & Ellis em uma potência na área de reestruturação.", "titulo_pt": "renomado advogado especialista em falências James Sprayregen se junta ao Paul Weiss", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 12853, "titulo": "Fitoway cresce com venda de suplementos em farmácias e projeta R$ 3 bi em 2029", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/06/fitoway-cresce-com-venda-de-suplementos-em-farmacias-e-projeta-r-3-bi-em-2029.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-23T19:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Fitoway, dona da marca FTW de suplementos esportivos, está focando na venda de seus produtos em farmácias. A empresa fechou acordos com cerca de 5 mil drogarias para expandir sua presença além das lojas de fitness. O objetivo é alcançar uma receita de R$ 3 bilhões até 2029.", "titulo_pt": "Fitoway cresce com venda de suplementos em farmácias e projeta R$ 3 bi em 2029", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 13520, "titulo": "SpaceX pitches investors juicy yields in $25bn bond deal", "url": "https://www.ft.com/content/7ea76b60-ea21-4e50-b0e2-bbcc842af289", "fonte_id": "financial_times", "data_pub": "2026-06-23T18:44:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A SpaceX aumentou o valor da oferta de títulos para US$ 25 bilhões após atrair investidores com altos custos de empréstimo. Os bancos envolvidos no negócio ampliaram o montante inicial devido ao grande interesse dos investidores.", "titulo_pt": "SpaceX oferece títulos a investidores com juros atrativos em acordo de US$ 25 bilhões", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 14302, "titulo": "Amazon Prime Day Deal 2026: A Tushy Bidet for Under $100", "url": "https://www.wired.com/story/tushy-classic-wave-amazon-prime-day-deal-2026/", "fonte_id": "wired", "data_pub": "2026-06-23T23:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os bidets Tushy Classic 3.0 e Wave, em promoção durante o Prime Day, resolvem o problema de falta de tomadas perto do vaso sanitário em muitos banheiros americanos.  A oferta estará disponível em 2026.", "titulo_pt": "Promoção Prime Day 2026: Bidet Tushy por menos de R$100", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 14186, "titulo": "The AI Super PACs Trying to Influence the Midterms", "url": "https://www.theatlantic.com/newsletters/2026/06/ai-pac-elections-midterm-money/687676/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-23T23:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As eleições serão um teste para a capacidade do setor de transformar dinheiro em poder político. Os Super PACs alimentados por inteligência artificial estão sendo usados para coletar e analisar dados, direcionar anúncios e tentar influenciar os eleitores. O sucesso desses esforços será observado como um indicador da influência crescente da IA na política.", "titulo_pt": "Os Super PACs de IA tentando influenciar as eleições", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 13997, "titulo": "Empresa contrata inteligência artificial como advogada e vence em tribunal", "url": "https://www.cnnbrasil.com.br/internacional/empresa-contrata-inteligencia-artificial-como-advogada-e-vence-em-tribunal/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-23T22:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma empresa contratou uma inteligência artificial para atuar como advogada em um caso judicial no Reino Unido. O julgamento ocorreu em 14 de maio no Tribunal do Condado de Wandsworth e durou cerca de três horas.", "titulo_pt": "Empresa contrata inteligência artificial como advogada e vence em tribunal", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 14300, "titulo": "Seoul Int'l Book Fair set to open amid 'text-hip' boom", "url": "https://en.yna.co.kr/view/AEN20260623003100315", "fonte_id": "yonhap_news", "data_pub": "2026-06-23T22:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Feira Internacional do Livro de Seul, a maior feira literária do país, está programada para abrir em 24 de junho. A feira ocorre no centro de convenções COEX em Seul e atrairá mais de 1.000 expositores de todo o mundo. O evento coincide com um aumento na popularidade dos livros 'text-hip', que são livros baseados em textos digitais.", "titulo_pt": "Feira Internacional do Livro de Seul abre em meio ao boom 'text-hip'", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 13972, "titulo": "Instagram enfrenta instabilidade e fica fora do ar em diversos países", "url": "https://www.metropoles.com/entretenimento/instagram-enfrenta-instabilidade-e-fica-fora-do-ar-em-diversos-paises", "fonte_id": "metropoles", "data_pub": "2026-06-23T21:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Usuários de diversos países relataram problemas para usar o Instagram na noite desta terça-feira (23/6). A plataforma apresentou instabilidade, impedindo o acesso a algumas funções. O problema afetou usuários globalmente.", "titulo_pt": "Instagram enfrenta instabilidade e fica fora do ar em vários países", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 13652, "titulo": "Super Mario is mathier than you think", "url": "https://www.technologyreview.com/2026/06/23/1138262/super-mario-is-mathier-than-you-think/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-23T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo discute como os jogos de Super Mario envolvem elementos matemáticos. O jogador precisa resolver problemas e navegar por ambientes complexos, utilizando habilidades matemáticas para progredir no jogo. A história se concentra em um encanador que busca resgatar sua amada.", "titulo_pt": "Super Mario é mais matemático do que você imagina", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 13653, "titulo": "A man of many words", "url": "https://www.technologyreview.com/2026/06/23/1138267/a-man-of-many-words/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-23T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Brian Sietsema é o responsável por confirmar pronúncias e responder perguntas sobre as origens das palavras durante a Scripps National Spelling Bee. A competição é considerada uma das mais prestigiadas do mundo para campeões de ortografia. O artigo conta a história de como Sietsema escolheu sua palavra favorita.", "titulo_pt": "Um homem de muitas palavras", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 13654, "titulo": "Sharing a love for calculus", "url": "https://www.technologyreview.com/2026/06/23/1138271/sharing-a-love-for-calculus/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-23T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O debate nacional sobre o valor da educação está dominado por especulações sobre os riscos e o potencial positivo da inteligência artificial.  O MIT também trabalha em um desafio importante, embora mais tradicional: o acesso desigual dos estudantes do ensino médio americano à educação.", "titulo_pt": "Compartilhando o amor pelo cálculo", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 13655, "titulo": "Stand Up for Research, Innovation, and Education", "url": "https://www.technologyreview.com/2026/06/23/1138274/stand-up-for-research-innovation-and-education-6/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-23T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Alunos e amigos do MIT estão expressando apoio à liderança científica e tecnológica americana. Eles também defendem admissões baseadas no mérito e educação acessível, além de avanços que aumentam a saúde, segurança e prosperidade dos Estados Unidos. A comunidade está se manifestando em favor do MIT e sua missão de servir à nação e ao mundo.", "titulo_pt": "Defenda a Pesquisa, Inovação e Educação", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 13656, "titulo": "Ultrasound imaging turns a robot hand into a skillful mimic", "url": "https://www.technologyreview.com/2026/06/23/1138279/ultrasound-imaging-turns-a-robot-hand-into-a-skillful-mimic/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-23T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A pesquisa visa melhorar a destreza de robôs, que tem sido limitada pela dificuldade em replicar a complexidade dos movimentos humanos. Imagens por ultrassom estão sendo utilizadas para permitir que um robô monitore seus próprios movimentos e ajuste sua ação com mais precisão.", "titulo_pt": "Imagens por ultrassom transformam mão robótica em uma imitadora habilidosa", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 13657, "titulo": "Reinventing the zipper", "url": "https://www.technologyreview.com/2026/06/23/1138282/reinventing-the-zipper/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-23T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores do CSAIL desenvolveram um fecho adaptável que pode facilitar tarefas como montar uma barraca ou ajustar uma tala. A ideia foi inspirada em um protótipo de zíper trilateral patenteado por William Freeman, professor do MIT. O objetivo é tornar essas tarefas tão simples quanto fechar um casaco.", "titulo_pt": "Reinventando o zíper", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 13658, "titulo": "Engineered “mini livers” could be injected as an alternative to transplantation", "url": "https://www.technologyreview.com/2026/06/23/1138285/engineered-mini-livers-could-be-injected-as-an-alternative-to-transplantation/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-23T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma tecnologia desenvolvida por Sangeeta Bhatia e colegas pode oferecer novas esperanças para os milhares de americanos com doenças hepáticas crônicas que aguardam um transplante ou não são fortes o suficiente para tolerá-lo. O fígado regula a coagulação sanguínea, remove bactérias do sangue e metaboliza medicamentos.", "titulo_pt": "Mini fígados engenheirados poderiam ser injetados como alternativa a transplantes", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 13659, "titulo": "Plants appear to detect the patter of falling rain", "url": "https://www.technologyreview.com/2026/06/23/1138288/plants-appear-to-detect-the-patter-of-falling-rain/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-23T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Engenheiros do MIT descobriram a primeira evidência direta de que sementes de plantas podem sentir sons na natureza. Sementes de arroz submersas em água rasa germinaram 30% a 40% mais rápido quando expostas a vibrações de gotículas de água caindo na superfície. Os pesquisadores acreditam que outros tipos de sementes podem responder de forma semelhante.", "titulo_pt": "Plantas parecem detectar o som da chuva caindo", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 13660, "titulo": "A breath test could diagnose pneumonia in minutes", "url": "https://www.technologyreview.com/2026/06/23/1138291/a-breath-test-could-diagnose-pneumonia-in-minutes/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-23T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores do MIT estão desenvolvendo um teste portátil chamado PlasmoSniff que pode detectar marcadores de doenças respiratórias como a pneumonia. O teste usa sensores para capturar e identificar compostos sintéticos que indicam doenças, permitindo o diagnóstico através da respiração do paciente.", "titulo_pt": "Teste respiratório pode diagnosticar pneumonia em minutos", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 13696, "titulo": "Best Prime Day Deals on Yoto Players and Accessories", "url": "https://www.wired.com/story/yoto-player-prime-day-deal-2026/", "fonte_id": "wired", "data_pub": "2026-06-23T20:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Yoto Player é um ótimo presente sem tela para crianças. Durante o Dia dos Primeiros, há ofertas especiais no player e seus acessórios.", "titulo_pt": "Melhores ofertas do Dia dos Primeiros para Players e Acessórios Yoto", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 13697, "titulo": "Best Prime Day Streaming Deals I’ve Found (2026): HBO, Paramount Plus", "url": "https://www.wired.com/story/best-prime-day-streaming-deals-2026/", "fonte_id": "wired", "data_pub": "2026-06-23T20:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O dia da Prime não se trata apenas de TVs baratas. Também é sobre encontrar coisas baratas para assistir na sua TV barata. O artigo destaca as melhores ofertas de streaming disponíveis durante o evento, incluindo serviços como HBO e Paramount Plus.", "titulo_pt": "Melhores ofertas de streaming na Prime Day (2026): HBO, Paramount Plus", "veiculo": "Wired", "pais": "EUA", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 14340, "titulo": "STAT+: FDA drops enforcement against Whoop after it tweaks blood pressure feature", "url": "https://www.statnews.com/2026/06/23/fda-drops-enforcement-against-wearable-maker-whoop/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-23T23:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A FDA informou à fabricante de dispositivos vestíveis Whoop que não tomará mais medidas legais contra a empresa devido ao seu recurso de pressão arterial. A decisão foi tomada após a Whoop modificar o recurso.", "titulo_pt": "FDA abandona ação contra a Whoop após modificações no recurso de pressão arterial", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 14337, "titulo": "NASA’s inspector general warns launch sites nearing capacity", "url": "https://spacenews.com/nasas-inspector-general-warns-launch-sites-nearing-capacity/", "fonte_id": "spacenews", "data_pub": "2026-06-23T22:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um relatório do Inspetor Geral da NASA destaca os problemas causados pelo aumento no número de lançamentos para os centros espaciais. O relatório afirma que os locais de lançamento estão se aproximando da sua capacidade máxima.", "titulo_pt": "Inspetor Geral da NASA alerta que locais de lançamento estão se aproximando da capacidade máxima", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 14338, "titulo": "Boeing wins $2 billion Space Force contract for communications satellites", "url": "https://spacenews.com/boeing-wins-2-billion-space-force-contract-for-communications-satellites/", "fonte_id": "spacenews", "data_pub": "2026-06-23T22:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Boeing ganhou um contrato de até US$ 2 bilhões para construir dois satélites militares de comunicação de última geração para o Space Force dos EUA. A empresa superou a Lockheed Martin em uma competição. Os satélites serão usados para comunicações militares.", "titulo_pt": "Boeing vence contrato de US$ 2 bilhões do Space Force para satélites de comunicação", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 14109, "titulo": "Scientists find ‘smoking gun’ evidence of world’s oldest meteorite strike in Western Australia", "url": "https://www.theguardian.com/environment/2026/jun/24/worlds-oldest-meteorite-strike-pilbara-western-australia", "fonte_id": "guardian_world", "data_pub": "2026-06-23T22:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores da Universidade Curtin usaram técnicas inovadoras para datar um cratera de impacto com três bilhões de anos na região de Pilbara, na Austrália Ocidental. O evento ocorreu durante a era Arqueana, entre 4 e 2,5 bilhões de anos atrás, quando as placas tectônicas estavam começando a se formar e a vida primitiva estava surgindo.", "titulo_pt": "Cientistas encontram evidência 'de tiro' do impacto de meteoro mais antigo do mundo na Austrália Ocidental", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 14339, "titulo": "NASA Names Sean Gallagher as Chief Information Officer", "url": "https://www.nasa.gov/news-release/nasa-names-sean-gallagher-as-chief-information-officer/", "fonte_id": "nasa_news", "data_pub": "2026-06-23T21:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA escolheu Sean Gallagher como diretor-chefe de informação da agência. Gallagher é responsável por todo o portfólio de produtos e serviços de Tecnologia da Informação da agência. Ele estava atuando no cargo desde janeiro e seu papel permanente está em vigor imediatamente.", "titulo_pt": "NASA nomeia Sean Gallagher como Diretor-Chefe de Informação", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 13751, "titulo": "STAT+: Want high-quality generic drugs? One expert has ideas on how consumers can trust their supply", "url": "https://www.statnews.com/pharmalot/2026/06/23/high-quality-generic-drugs-lab-testing/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-23T19:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um especialista propõe soluções para garantir a consistência na qualidade dos medicamentos genéricos nos EUA. O foco é aumentar a confiança do consumidor no fornecimento desses medicamentos.  As sugestões visam melhorar a transparência e o controle de qualidade.", "titulo_pt": "Quer medicamentos genéricos de alta qualidade? Um especialista tem ideias sobre como os consumidores podem confiar no fornecimento.", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 13771, "titulo": "Commercial Space Federation (CSF) Welcomes New Associate Member", "url": "https://spacenews.com/commercial-space-federation-csf-welcomes-new-associate-member/", "fonte_id": "spacenews", "data_pub": "2026-06-23T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Federação Espacial Comercial (CSF) anunciou a recepção da Sophia Space como novo membro associado. A Sophia Space trabalha no desenvolvimento de infraestrutura de computação orbital para o processamento de dados espacial de próxima geração.", "titulo_pt": "Federação Espacial Comercial (CSF) Recebe Novo Membro Associado", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 13779, "titulo": "CSDA Selects Eight Commercial Satellite Data Providers for On-Ramp 2 Contract Awards", "url": "https://science.nasa.gov/science-research/earth-science/csda-selects-eight-commercial-satellite-data-providers-for-on-ramp-2-contract-awards/", "fonte_id": "nasa_news", "data_pub": "2026-06-23T18:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Oito fornecedores de dados comerciais receberam contratos para fornecer uma variedade de dados em apoio às prioridades científicas da Terra da NASA. Os dados serão usados para apoiar pesquisas e monitoramento da Terra. A seleção foi feita pelo Centro de Dados Científicos da Agência Espacial (CSDA).", "titulo_pt": "CSDA Seleciona Oito Fornecedores de Dados de Satélites Comerciais para Contratos do Programa On-Ramp 2", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 13780, "titulo": "58th Girl Scouts Unite Event", "url": "https://science.nasa.gov/earth/58th-girl-scouts-unite-event/", "fonte_id": "nasa_news", "data_pub": "2026-06-23T18:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O evento 58º Encontro das Girl Scouts acontecerá de 23 a 25 de julho de 2026. A NASA estará presente no Salão de Exposições (Estande #206) com histórias contadas através do Hyperwall, apresentadas por especialistas da agência. O programa completo do Hyperwall está disponível.", "titulo_pt": "58º Encontro das Girl Scouts", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 13721, "titulo": "How underappreciated mathematician Emmy Noether helped prove physics' most fundamental theories", "url": "https://www.scientificamerican.com/article/how-underappreciated-mathematician-emmy-noether-helped-prove-physics-most-fundamental-theories/", "fonte_id": "scientific_american", "data_pub": "2026-06-23T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O trabalho de Noether ajudou a provar a conservação de energia na física, uma base fundamental para a teoria da relatividade de Einstein.  Seus teoremas matemáticos também estabeleceram conexões entre simetrias e leis físicas.", "titulo_pt": "Como a matemática subestimada Emmy Noether ajudou a provar as teorias físicas mais fundamentais", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 13752, "titulo": "Judge rules government can’t stop SNAP dollars from buying candy and sugary drinks", "url": "https://www.statnews.com/2026/06/23/snap-dollars-buying-candy-sugary-drinks-judge-ruling/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-23T17:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um juiz decidiu que o governo federal não pode bloquear os benefícios do Programa Nacional de Assistência Alimentar (SNAP) de serem usados para comprar doces, refrigerantes e outras bebidas açucaradas. A decisão impede que o governo impeça as pessoas que recebem benefícios do programa de comprarem esses itens com seus cartões SNAP.", "titulo_pt": "Juiz decide que governo não pode impedir uso de benefícios do programa alimentar para comprar doces e bebidas açucaradas", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 13772, "titulo": "Ubotica raises $11 million to scale maritime-intelligence platform", "url": "https://spacenews.com/ubotica-raises-11-million-to-scale-maritime-intelligence-platform/", "fonte_id": "spacenews", "data_pub": "2026-06-23T17:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa irlandesa Ubotica Technologies captou US$ 11 milhões para aumentar as vendas comerciais de sua plataforma de inteligência marítima, Live Maritime. A plataforma utiliza inteligência artificial para coletar e analisar dados marítimos em tempo real. O objetivo é fornecer informações valiosas para empresas e organizações que operam no setor marítimo.", "titulo_pt": "Ubotica capta US$ 11 milhões para ampliar plataforma de inteligência marítima", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 13748, "titulo": "The ‘little brain’ may give the aging mind a big boost", "url": "https://www.sciencenews.org/article/cerebellum-brain-aging-boost", "fonte_id": "science_news", "data_pub": "2026-06-23T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O cerebelo, conhecido principalmente por seu papel no movimento, pode compensar a diminuição das funções mentais em outras partes do cérebro.  Pesquisas sugerem que o cerebelo pode desempenhar um papel importante na função cognitiva e memória.", "titulo_pt": "O 'pequeno cérebro' pode dar um grande impulso à mente idosa", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 13331, "titulo": "America Desperately Needs More Sterile Screwworms", "url": "https://www.theatlantic.com/science/2026/06/screwworm-problem-worse/687668/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-23T16:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Criadores aguardam a produção de centenas de milhões de moscas estéreis. Eles esperam também por uma inovação tecnológica para solucionar o problema.", "titulo_pt": "Estados Unidos Precisam Desesperadamente de Mais Mosca-do-Carne Estéril", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 13781, "titulo": "2026 ALA Hyperwall Schedule", "url": "https://science.nasa.gov/earth/2026-ala-hyperwall-schedule/", "fonte_id": "nasa_news", "data_pub": "2026-06-23T16:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA participará da Conferência Anual da American Library Association (ALA), de 25 a 29 de junho de 2026. Na Sala de Exposições, no estande #2243, especialistas da NASA apresentarão histórias através do Hyperwall. O cronograma completo das apresentações está disponível.", "titulo_pt": "Cronograma Hyperwall da ALA em 2026", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 13782, "titulo": "This is How NASA Flight Tests New Technology", "url": "https://www.nasa.gov/centers-and-facilities/armstrong/this-is-how-nasa-flight-tests-new-technology/", "fonte_id": "nasa_news", "data_pub": "2026-06-23T16:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Testes de voo são uma parte importante do processo da NASA para transformar ideias inovadoras em realidade. Os testes de voo transformam conceitos ousados ​​em tecnologias mais seguras e eficientes que beneficiam o público. A NASA utiliza testes de voo para garantir a segurança e eficácia das novas tecnologias antes de serem implementadas.", "titulo_pt": "Esta é a forma como a NASA testa novas tecnologias em voo", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 13928, "titulo": "Spin-off de 'The Big Bang Theory' terá trama com multiversos; veja trailer", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/spin-off-de-the-big-bang-theory-tera-trama-com-multiversos-veja-trailer.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-23T23:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A HBO Max divulgou o trailer de 'Stuart Não Consegue Salvar o Universo', um spin-off da série 'The Big Bang Theory'. A produção estreia em 23 de julho e conta a história de Stuart, personagem que vendia quadrinhos na série original.", "titulo_pt": "Spin-off de 'The Big Bang Theory' terá trama com multiversos; veja trailer", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 13932, "titulo": "Flip anuncia programa completo de sua 24ª edição", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/flip-anuncia-programa-completo-de-sua-24a-edicao", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-23T22:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Festa Literária Internacional de Paraty (Flip) divulgou o programa completo da sua 24ª edição, que acontecerá de 22 a 26 de julho. A poeta Orides Fontela será homenageada e o evento contará com mesas literárias sobre temas contemporâneos, com curadoria de Rita Palmeira.", "titulo_pt": "Flip anuncia programa completo da 24ª edição", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 13933, "titulo": "Orquestra juvenil feminina do Rio leva música brasileira para a China", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/orquestra-juvenil-feminina-do-rio-leva-musica-brasileira-para-china", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-23T21:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Orquestra Sinfônica Juvenil Chiquinha Gonzaga, formada por jovens estudantes de escolas públicas do Rio de Janeiro, fará sua sexta turnê internacional. A estudante Nathaly Joyce, flautista da orquestra, participará da viagem à China.", "titulo_pt": "Orquestra Juvenil Feminina do Rio leva Música Brasileira para a China", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 13929, "titulo": "'E.T.: Edu e Tatá' encara o 'tribunal da internet'", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/colunas/mauriciostycer/2026/06/et-edu-e-tata-encara-o-tribunal-da-internet.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-23T21:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Miguel Falabella comentou sobre a possibilidade de 'cancelamento' por piadas consideradas politicamente incorretas durante uma entrevista no Roda Viva. Ele acredita que esse temor está impedindo a criação de novos programas de humor na televisão.", "titulo_pt": "'E.T.: Edu e Tatá' enfrenta o 'tribunal da internet'", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 12911, "titulo": "O PL da misoginia e o novo punitivismo", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/colunas/wilson-gomes/2026/06/o-pl-da-misoginia-e-o-novo-punitivismo.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-23T21:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um projeto de lei (PL) que visa criminalizar a misoginia avançou no Congresso. O PL, aprovado no Senado e agora em fase decisiva na Câmara, argumenta que há uma lacuna jurídica na proteção das mulheres.", "titulo_pt": "O PL da Misoginia e o Novo Punitivismo", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 12912, "titulo": "'Avatar: Fogo e Cinzas' e 'As Ovelhas Detetives': o que ver na TV e no streaming quarta", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/avatar-fogo-e-cinzas-e-as-ovelhas-detetives-o-que-ver-na-tv-e-no-streaming-quarta.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-23T20:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em 'Avatar: Fogo e Cinzas', James Cameron apresenta novos inimigos para a família Sully, incluindo o enigmático Povo das Cinzas. A Folha Ilustrada recomenda também o filme 'As Ovelhas Detetives' para os dias de hoje.", "titulo_pt": "'Avatar: Fogo e Cinzas' e 'As Ovelhas Detetives': o que ver na TV e no streaming quarta", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 12913, "titulo": "Revi dir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/flip-2026-tera-zadie-smith-carmen-lucia-e-drauzio-varella-veja-a-programacao.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-23T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Festa Literária Internacional de Paraty divulgou a programação completa da edição de 2026. Entre os convidados estão a escritora britânica Zadie Smith, a ex-ministra do Supremo Tribunal Federal Cármen Lúcia e o médico Drauzio Varella.", "titulo_pt": "Flip 2026 terá Zadie Smith, Cármen Lúcia e Drauzio Varella; veja a programação", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 12918, "titulo": "'Língua' inverte lógica da opressão linguística e desafia plateia no Sesc", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/blogs/mise-en-scene/2026/06/lingua-inverte-logica-da-opressao-linguistica-e-desafia-plateia-no-sesc.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-23T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A peça 'Língua', de Vinicius Arneiro e Filipe Codeço, apresenta uma linguagem teatral bicultural e bilíngue, com Libras e português coabitando sem hierarquias. O espetáculo está em cartaz no Sesc Consolação e venceu o Prêmio Shell de Melhor Dramaturgia em 2025.", "titulo_pt": "'Língua' inverte lógica da opressão linguística e desafia plateia no Sesc", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 13811, "titulo": "‘A new world has been opened up’: how a London street got filled with art – and brought the neighbours together", "url": "https://www.theguardian.com/artanddesign/2026/jun/23/rooms-of-neighbours-experimental-art-project-peckham-south-london-gallery", "fonte_id": "guardian_culture", "data_pub": "2026-06-23T13:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma iniciativa chamada Rooms of Neighbours trouxe artistas contemporâneos para uma rua em Peckham, no sudeste de Londres. A curadora Ben Broome se inspirou na exposição Chambres d’Amis de 1986, que levou obras de arte para dentro das casas dos moradores em Ghent. O projeto envolve a criação de peças de arte personalizadas para os residentes da rua.", "titulo_pt": "'Um novo mundo foi aberto': como uma rua em Londres ficou cheia de arte - e uniu os vizinhos", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 13810, "titulo": "‘I’d pause then carry on’: Peter Marinker, star of Krapp’s Last Tape, on performing with Alzheimer’s", "url": "https://www.theguardian.com/stage/2026/jun/23/peter-marinker-krapps-last-tape-samuel-beckett-alzheimers", "fonte_id": "guardian_culture", "data_pub": "2026-06-23T13:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O ator de 84 anos passou décadas trazendo as peças de Samuel Beckett à vida. Seu diagnóstico recente dá a ele novas perspectivas para interpretar o 'palhaço triste' Krapp em uma peça sobre envelhecimento e o campo de batalha da memória? A obra-prima de Samuel Beckett de 1958, Krapp's Last Tape, está tendo um momento.", "titulo_pt": "'Eu pararia e continuaria': Peter Marinker, estrela de Krapp's Last Tape, sobre atuar com Alzheimer", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 12924, "titulo": "Sambistas debatem políticas públicas para trabalhadoras na cultura", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/direitos-das-mulheres-sao-debatidos-em-seminario-sobre-rodas-de-samba", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-23T13:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O 1º Seminário Nacional das Rodas de Samba, realizado no Rio de Janeiro, debate direitos trabalhistas e previdenciários para mulheres na cultura. O evento, promovido pelo Ministério da Cultura, busca elaborar propostas de políticas governamentais e le vel_duplicata_de": null, "texto_pt": "Centenas de milhares de pessoas morrem anualmente devido à solidão. Estar desconectado da sociedade tem efeitos na saúde equivalentes a fumar 15 cigarros por dia.  A BBC analisa o impacto da solidão em grandes cidades.", "titulo_pt": "Por que a solidão equivale a fumar 15 cigarros por dia (e os impactos desta epidemia nas grandes cidades)", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 13957, "titulo": "Animes e anúncio no X: como traficantes do CV vendiam drogas no Dona Marta", "url": "https://veja.abril.com.br/brasil/animes-e-anuncio-no-x-como-traficantes-do-cv-vendiam-drogas-no-dona-marta/", "fonte_id": "veja", "data_pub": "2026-06-23T22:13:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Traficantes do Comando Vermelho (CV) usavam redes sociais, como o X (antigo Twitter), para anunciar e vender drogas na comunidade Dona Marta.  As publicações incluíam animes e outros conteúdos para atrair clientes jovens.", "titulo_pt": "Animes e anúncios no X: como traficantes do CV vendiam drogas no Dona Marta", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 13971, "titulo": "Atriz revela diagnóstico de câncer de mama aos 32 anos", "url": "https://www.metropoles.com/colunas/fabia-oliveira/atriz-revela-diagnostico-de-cancer-de-mama-aos-32-anos", "fonte_id": "metropoles", "data_pub": "2026-06-23T21:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A atriz revelou que foi diagnosticada com câncer de mama aos 32 anos. Ela compartilhou a notícia nas redes sociais e pediu apoio dos fãs. A atriz não divulgou detalhes sobre o tipo de câncer ou tratamento.", "titulo_pt": "Atriz revela diagnóstico de câncer de mama aos 32 anos", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 13193, "titulo": "Qué pasó en Mar del Plata con el colectivo que perdió el control frente a la rambla y arrolló a varias personas", "url": "https://www.lanacion.com.ar/sociedad/que-paso-
