<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>

</div>

o jogo com um jogador a menos e enfrentará a Inglaterra nas semifinais. Em outro desenvolvimento, os Estados Unidos realizaram novas operações militares após um ataque a uma embarcação no Estreito de Ormuz, enquanto o Irã fechou o canal em resposta. No âmbito político, o governo indiano pretende fechar o Clube Gymkhana de Delhi, levantando questionamentos sobre as motivações reais por trás dessa decisão. O presidente da Colômbia, José Manuel Restrepo, enfatizou a importância da Colômbia como aliada dos Estados Unidos na Venezuela. Além disso, dois homens morreram durante um tiroteio em um festival de rua em Toronto, Canadá, e o secretário do Departamento de Segurança Nacional dos EUA acelerou os arrestos de migrantes usando métodos que buscam evitar a atenção pública.\n\nOs Estados Unidos e o Irã continuam a intensificar suas tensões geopolíticas com novos ataques e retaliações. Em resposta ao fechamento do Estreito de Ormuz pelo Irã, os EUA realizaram múltiplas operações militares contra alvos iranianos, causando danos significativos. A Guarda Revolucionária Islâmica (IRGC) atingiu um navio comercial no estreito e disparou mísseis contra instalações militares de países do Golfo, incluindo o Qatar e a Jordânia. O Irã acusou os EUA de tentarem impor sua vontade sobre governos locais ao tentar direcionar navios por caminhos considerados ilegais. Além disso, ataques cibernéticos contra o Exército sul-coreano foram registrados no ano passado, refletindo a crescente ameaça digital na região.", "economia": "A SK hynix, fabricante sul-coreana de memórios, alerta para uma possível pior crise de memória da história em 2027, com a demanda por chips superando a oferta até pelo menos 2037. Em outro desenvolvimento econômico, o Banco do Brasil enfrenta pressão sobre seu papel como fiador dos Correios, que estão lutando para cortar custos diante da pressão sindical. Além disso, novas regras publicadas no Brasil proíbem a publicidade de apostas esportivas a partir de 17 de julho deste ano, restringindo anúncios que incentivem ganhos fáceis e exigindo advertências do Ministério da Fazenda em todas as campanhas. Na economia sul-coreana, o Grupo Shinhan expandiu suas relações com investidores no Reino Unido, enquanto a Suno adquiriu 4,6% das ações da Gafisa com intuito de investimento estritamente financeiro. No mercado internacional, a União Europeia planeja investir 80 bilhões de euros em empresas de tecnologia, e a Argentina enfrenta uma queda significativa na produção de soja devido à política de retenciones, enquanto o Brasil exporta cerca de R$ 3 bilhões anuais com a venda de jogadores para clubes internacionais.", "tecnologia": "A Samsung Electronics planeja iniciar as operações da sua primeira fábrica de semicondutores no complexo de Yongin em 2029. A empresa alinha esse plano com o desenvolvimento do Complexo Nacional Industrial de Yongin, um projeto estratégico nacional destinado a se tornar o hub de fabricação de semicondutores da próxima geração. Em outro desenvolvimento relevante, a Greenfiltec registrou um aumento significativo na receita no primeiro semestre de 2026, impulsionada por uma maior entrega de filtros AMC. Na Coreia do Sul, a KB Financial Group está centralizando a inteligência artificial em sua próxima fase de crescimento, reorganizando suas operações para aproveitar as mudanças nos fluxos financeiros e fortalecer seus negócios de gestão de riquezas e ativos. Por outro lado, no Taiwan, o setor de placas de circuito impresso está entrando em uma nova fase de expansão, impulsionado por investimentos em data centers de inteligência artificial e outras aplicações emergentes.", "ciencia": "A NASA e a Agência Espacial Japonesa (JAXA) realizaram um avanço significativo na defesa contra asteroides com o sucesso do foguete Hayabusa2, que se aproximou da asteroide Torifune a menos de 800 metros. Este feito representa um passo importante no desenvolvimento de estratégias para prevenir impactos de asteroides em nosso planeta. Em outro estudo, cientistas da Columbia descobriram uma conexão inesperada entre serotonina e doenças cardíacas valvulares, sugerindo que pacientes com certas variantes genéticas podem sofrer mais danos nos valores do coração após tomar medicamentos antidepressivos SSRI. Estes avanços em ciência abrangem desde a saúde humana até o espaço e a proteção ambiental, demonstrando a amplitude dos desafios científicos contemporâneos que estão sendo enfrentados.", "cultura": "Yeonjun, membro do Tomorrow X Together, estabeleceu um novo recorde de vendas com seu segundo EP solo 'No Labels: Part 02', que vendeu 661.924 cópias no primeiro dia, superando suas próprias vendas iniciais e estabelecendo o maior lançamento inicial entre artistas solo coreanos neste ano. A Dior apresentou uma coleção ousada na alta-costura em Paris, com bolsas em formato de cacto, enquanto a Armani também ousou com elementos como trepadeiras venenosas. A atriz Isabelle Huppert será a próxima diretora da Cinemateca Francesa, e o filme 'A Margem do Rio', dirigido por Matheus Farias e Enock Carvalho, concorre ao prêmio principal no Festival de Locarno em agosto. Além disso, a artista Sofía Wiñazki começou uma série de acrílicas retratando o jogador Lionel Messi nas redes sociais. A Casa Pacheco Leão no Jardim Botânico do Rio de Janeiro recebe a exposição 'O Tempo das Plantas', que explora a circulação de espécies e intercâmbios culturais, utilizando o chá e o café como temas para promover desaceleração e reflexão.", "sociedade": "A sociedade enfrenta diversos desafios e transformações, conforme mostram os principais artigos desta edição. Em Hong Kong, a população idosa está aumentando, levantando questões sobre como o envelhecimento populacional afetará a cidade. No mesmo contexto, o número de suicídios entre jovens atingiu um recorde nos últimos 10 anos em Hong Kong, apesar da diminuição geral na taxa de suicídio na população. Em Araraquara, dois irmãos morreram no mesmo dia, levando a investigações policiais e suspeitas de violência doméstica. No Brasil, os desafios sociais continuam com o aumento do vício em apostas entre adolescentes, que pode ter raízes na infância, conforme alertam especialistas. Além disso, o Comando Vermelho estende sua influência em regiões estratégicas para o crime organizado no Rio de Janeiro.", "meio_ambiente": "Em Gyeongsan e Pohang, na Coreia do Sul, foram emitidos avisos para 'grande' calor. No Brasil, um temporal causou danos por granizo no Rio Grande do Sul, deixando 400 pessoas desalojadas; em Porto Alegre, uma chuva acompanhada de vendaval e granizo destelhou casas e deixou 460 pessoas sem abrigo na região metropolitana da cidade. Na Espanha, 12 pessoas morreram durante incêndios florestais intensos. Em Santiago, no Chile, uma nova alerta ambiental foi emitida devido a condições de ventilação desfavoráveis. Belém incluirá sua primeira Semana do Clima no calendário anual, similar à Londres e Nova York. A região de Bretanha na França não será um refúgio climático da mudança climática, segundo analistas. Na China, o tifão Bavi causou ferimentos em Taiwan e no Japão. O Instituto sul-coreano planeja intensificar seus esforços ambientais através de uma estratégia de baixo carbono.", "direitos_humanos": "Em 2022, a vítima de um ataque conhecido como 'chute circular de Busan' se opôs à decisão do governo da Coreia do Sul que aboliu o direito da procuradoria de realizar investigações adicionais. Ela argumentou que essas investigações revelaram intenções criminosas em seu caso. De forma paralela, equipes da CNN e jornalistas foram agredidos com barras de metal e pedras enquanto cobriam o aniversário do dia da morte de um palestino-americano durante a ocupação israelense de Cisjordânia. Em outro evento trágico, um barco de turismo que retornava de uma viagem à ilha no sul da Vietnã capotou no sábado, resultando na morte de 15 turistas indianos a menos de meio quilômetro da praia. Na Serra da Drina, em Bosnia, dez mais vítimas do genocídio de 1995 foram enterradas em cerimônias comemorativas, onde sobreviventes pediram aos responsáveis que reconhecessem a verdade e pedissem perdão. Em Houston, Texas, o assassinato de Lorenzo Salgado Araujo, um contratante mexicano aguardando regularização do seu status, por um agente da ICE reavivou debates sobre os direitos dos imigrantes nos Estados Unidos."}, "resumo_do_dia": {"politica_nacional": [{"id": 46967, "titulo": "Prédio da Justiça em SP recebe caixa com fogos e carta desconexa", "url": "https://www.cnnbrasil.com.br/nacional/sudeste/sp/predio-da-justica-em-sp-recebe-caixa-com-fogos-e-carta-desconexa/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-12T02:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Policiais militares e bombeiros foram chamados para verificar um pacote que continha fogos de artifício e uma carta desconexa deixado em frente ao prédio da Justiça em São Paulo.", "titulo_pt": "Prédio da Justiça em SP recebe caixa com fogos e carta desconexa", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 46930, "titulo": "Aliados de Flávio manifestam apoio à carta de Bolsonaro", "url": "https://www.poder360.com.br/poder-eleicoes/aliados-de-flavio-manifestam-apoio-a-carta-de-bolsonaro/", "fonte_id": "poder360", "data_pub": "2026-07-12T02:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Aliados de Flávio Bolsonaro manifestaram apoio à carta enviada pelo pai, Jair Bolsonaro. O objetivo é reforçar a unidade após um período de desgaste com Michelle Bolsonaro.", "titulo_pt": "Aliados de Flávio manifestam apoio à carta de Bolsonaro", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 46931, "titulo": "Moraes autoriza prisão domiciliar de Márcio Poncio, diz site", "url": "https://www.poder360.com.br/poder-justica/moraes-autoriza-prisao-domiciliar-de-marcio-poncio-diz-site/", "fonte_id": "poder360", "data_pub": "2026-07-12T02:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro do Supremo Tribunal Federal (STF) Alexandre Moraes autorizou a prisão domiciliar para Márcio Poncio, considerando o estado de saúde dele e uma gravidez em risco da sua esposa.", "titulo_pt": "Moraes autoriza prisão domiciliar para Márcio Poncio", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 46877, "titulo": "Liberais transitam por equipes de presidenciáveis da direita, e Durigan é escalado para defender Lula", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/liberais-transitam-por-equipes-de-presidenciaveis-da-direita-e-durigan-e-escalado-para-defender-lula.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-12T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Aproximadamente dez dias antes das convenções partidárias que vão definir os candidatos à presidência, as campanhas dos presidenciáveis da direita estão recrutando economistas liberais para elaborar planos de governo contra a política econômica do presidente Lula. Durigan foi escalado para trabalhar na equipe de Lula.", "titulo_pt": "Liberals transitam por equipes de presidenciáveis da direita, e Durigan é escalado para defender Lula", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 46886, "titulo": "Renan Santos usa cidades isoladas como laboratório de pré-campanha", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/renan-santos-usa-cidades-isoladas-como-laboratorio-de-pre-campanha.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-12T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Renan Santos, pré-candidato do partido Missão, realizou uma visita a um casebre de palafita no arquipélago do Marajó, onde recebeu moradores como Cilene Malheiro. A visita permitiu que Renan Santos se aproximasse das comunidades isoladas para sua pré-campanha.", "titulo_pt": "Renan Santos usa cidades isoladas como laboratório de pré-campanha", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 46887, "titulo": "Empresários contra fim da escala 6x1 bancam anúncios nas redes sociais para defender Alcolumbre", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/empresarios-contra-fim-da-escala-6x1-bancam-anuncios-nas-redes-sociais-para-defender-alcolumbre.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-12T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Abrasel gastou entre R$ 28,1 mil e R$ 33,2 mil para promover conteúdo nas redes sociais em favor do presidente do Senado Davi Alcolumbre (União Brasil - AP), que está impedindo a votação de uma PEC que proíbe a escala 6x1. O objetivo era defender Alcolumbre contra pressões do governo para acelerar o processo.", "titulo_pt": "Empresários bancam anúncios nas redes sociais para defender davi Alcolumbre", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 46888, "titulo": "Chegada de Vorcaro faz da Papudinha centro de detenção dos principais escândalos recentes do país", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/chegada-de-vorcaro-faz-da-papudinha-centro-de-detencao-dos-principais-escandalos-recentes-do-pais.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-12T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um batalhão de polícia instalado inicialmente para patrulhar um presídio serviu como local de detenção do ex-presidente Jair Bolsonaro (PL) e também abrigou os principais presos envolvidos nos três maiores escândalos recentes do país.", "titulo_pt": "Chegada de Vorcaro torna Papudinha centro de detenção dos principais escândalos recentes do país", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 46889, "titulo": "Aparente conflito entre Michelle e Flávio é método de mobilização do bolsonarismo", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/ilustrissima/2026/07/aparente-conflito-entre-michelle-e-flavio-e-metodo-de-mobilizacao-do-bolsonarismo.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-12T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A divulgação do vídeo de Michelle Bolsonaro criticando Flávio não deve ser vista como um sinal de desunião familiar, mas sim como parte de uma estratégia de mobilização política que inclui a exposição de possíveis fissuras na família.", "titulo_pt": "Divulgação do vídeo de Michelle com críticas a Flávio é método de mobilização do bolsonarismo", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 46891, "titulo": "Vícios oligárquicos estão nos três Poderes", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/eliogaspari/2026/07/vicios-oligarquicos-estao-nos-tres-poderes.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-12T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O professor Joaquim Falcão lançou um livro intitulado 'A Oligarquia dos Poderes e a Crise da Democracia', no qual discute os vícios oligárquicos presentes nos três poderes.", "titulo_pt": "Vícios oligárquicos estão nos três Poderes", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 46892, "titulo": "Zema ataca esquerda, e Caiado cobra Congresso após Senado dificultar aborto legal", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/zema-ataca-esquerda-e-caiado-cobra-congresso-apos-senado-dificultar-aborto-legal.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-12T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Senado aprovou um projeto de decreto legislativo para derrubar uma resolução do Conanda que estabelece diretrizes para o aborto legal em vítimas de violência sexual. Governadores como Zema atacaram a esquerda, enquanto Caiado pressionou o Congresso após essa decisão.", "titulo_pt": "Zema critica esquerda e Caiado cobra do Congresso após Senado dificultar aborto legal", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 46902, "titulo": "Lindbergh pede a Moraes a revogação da prisão domiciliar de Bolsonaro após carta a Flávio", "url": "https://www.cartacapital.com.br/justica/lindbergh-pede-a-moraes-a-revogacao-da-prisao-domiciliar-de-bolsonaro-apos-carta-a-flavio/", "fonte_id": "cartacapital", "data_pub": "2026-07-12T01:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O deputado Lindbergh Farias solicitou ao juiz federal Sergio Morais a revogação da prisão domiciliar do presidente Jair Bolsonaro após ele supostamente ter violado medidas cautelares, incluindo o acesso às redes sociais por meio de terceiros.", "titulo_pt": "Lindbergh pede a Moraes a revogação da prisão domiciliar de Bolsonaro após carta a Flávio", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 46933, "titulo": "“A partir de 2027 será pior do que Dilma 2”, diz Caiado", "url": "https://www.poder360.com.br/poder-eleicoes/a-partir-de-2027-sera-pior-do-que-dilma-2-diz-caiado/", "fonte_id": "poder360", "data_pub": "2026-07-12T01:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O pré-candidato Caiado afirma que a partir de 2027, o próximo presidente encontrará uma situação econômica mais difícil do que durante o governo Dilma Rousseff. Ele sugere que as medidas adotadas pelo governo Lula contribuíram para uma 'quebradeira' fiscal.", "titulo_pt": "A partir de 2027 será pior do que Dilma, avisa Caiado", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 46934, "titulo": "Caiado vê “extrema fragilidade” em apoio de Bolsonaro a Flávio", "url": "https://www.poder360.com.br/poder-eleicoes/caiado-ve-extrema-fragilidade-em-apoio-de-bolsonaro-a-flavio/", "fonte_id": "poder360", "data_pub": "2026-07-12T01:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O pré-candidato Caiado afirma que a 'extrema fragilidade' no apoio de Bolsonaro a Flávio mostra uma falta de autonomia na campanha.", "titulo_pt": "Caiado vê ‘extrema fragilidade’ em apoio de Bolsonaro a Flávio", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 46935, "titulo": "Temporal com granizo deixa 400 desalojados em Eldorado do Sul", "url": "https://www.poder360.com.br/poder-brasil/temporal-com-granizo-deixa-400-desalojados-em-eldorado-do-sul/", "fonte_id": "poder360", "data_pub": "2026-07-12T01:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um temporal com granizo atingiu Eldorado do Sul, danificando pelo menos 101 casas e deixando 400 pessoas desalojadas. O governo local distribuiu lonas e abriu um abrigo para os moradores afetados.", "titulo_pt": "Temporal com granizo deixa 400 desalojados em Eldorado do Sul", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 46959, "titulo": "Lindbergh diz que carta de Bolsonaro viola medidas e pede ao STF revogação da domiciliar", "url": "https://www.metropoles.com/brasil/lindbergh-diz-que-carta-de-bolsonaro-viola-medidas-e-pede-ao-stf-revogacao-da-domiciliar", "fonte_id": "metropoles", "data_pub": "2026-07-12T00:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O deputado Lindbergh Farias afirmou que a carta escrita pelo ex-presidente Jair Bolsonaro e divulgada pelo senador Flávio Bolsonaro (PL) viola as medidas cautelares. Lindbergh pediu ao Supremo Tribunal Federal (STF) a revogação da prisão domiciliar do ex-presidente.", "titulo_pt": "Lindbergh diz que carta de Bolsonaro viola medidas e pede STF para revogar prisão domiciliar", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 46893, "titulo": "PP e União divergem sobre quem preside federação em SP, mesmo após acordo de paz
