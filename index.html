<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=author@400&display=swap" rel="stylesheet">
<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: none; border: 1px solid var(--border); border-radius: 4px;
             color: var(--texto2); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { border-color: var(--acento); color: var(--texto); }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 30/06/2026 20:51 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">
    <div class="modal-erro" id="senha-erro" style="display:none">Senha incorreta.</div>
    <div class="modal-btns">
      <button class="btn-sec2" onclick="fecharModal('modal-senha')">Cancelar</button>

    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>
      <option value="classificacao_errada">Classificação errada</option>
      <option value="resumo_impreciso">Resumo impreciso</option>
      <option value="outro">Outro</option>
    </select>
    <label for="flag-nota">Nota (opcional)</label>
    <textarea id="flag-nota" placeholder="Descreva o problema..."></textarea>
    <div class="modal-btns">
      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "30/06/2026 20:51", "stats": {"noticias_novas": 584, "resumos_gerados": 239}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O presidente Luiz Inácio Lula da Silva lançou o Plano Safra para agricultura familiar, com R$ 85,2 bilhões em crédito rural, prometendo movimentar um total de R$ 97,1 bilhões. O plano inclui programas de crédito, seguro agrícola, compras públicas e assistência técnica. Em outro desenvolvimento político, Michelle Bolsonaro deixou a presidência do PL Mulher após uma crise pública com o senador Flávio Bolsonaro, se dedicando integralmente à família. O Senado aprovou um projeto que permite a venda e posse de sprays de pimenta para mulheres acima de 16 anos como meio de defesa pessoal, sancionado pelo presidente Lula, estabelecendo regras sobre o uso moderado do produto. O governo anunciou um sistema de alerta para calor extremo e um pacote de R$ 9 bilhões em medidas, visando antecipar riscos e fortalecer a proteção da população durante períodos de elevada temperatura.", "mundo": "A Venezuela continua os esforços de resgate após terremotos que ocorreram há seis dias. Até o momento, foram resgatados 6.640 sobreviventes, conforme informado pela Telesur. O governo venezuelano elevou o número de mortos para 1.943 e confirmou 10.571 feridos. A diplomacia espanhola relatou que 19 cidadãos espanhóis morreram, enquanto cerca de 130 permanecem desaparecidos. O governo venezuelano estima em 5,8 bilhões de euros os danos materiais causados pelos terremotos. Em outro desenvolvimento, o Brasil ofereceu assistência à Venezuela para a reconstrução após os terremotos que causaram mais de 1.900 mortes, segundo declarações do ministro da Defesa brasileiro, José Múcio Monteiro. Além disso, o Departamento de Estado dos Estados Unidos aprovou uma possível venda de mísseis Hellfire AGM-114R para Singapura no valor de US$22,3 milhões. No âmbito das relações internacionais, o governo dos Estados Unidos enviou uma solicitação formal ao Ministério das Relações Exteriores do Brasil para a indicação de Daniel Perez como novo embaixador americano no país, após indicá-lo no início de junho.\n\nO cenário geopolítico global permanece instável, com diversos eventos significativos. As tensões entre Estados Unidos e China aumentaram, com Washington pedindo a Pequim para evitar escaladas de ações retaliatórias. O Irã enfrenta pressões políticas internas sobre as negociações finais do memorando de entendimento com os EUA, enquanto o Irã e o Omã planejam cobrar taxas pelo uso do Estreito de Hormuz. Em um desenvolvimento preocupante, Israel intensificou sua estratégia 'matar primeiro' contra a Turquia, levantando temores sobre uma resposta regional. As tensões regionais também se refletem na escalada das ocupações territoriais israelenses no Gaza e na Cisjordânia, além de ataques de drones ucranianos que aprofundaram a crise de combustível na Rússia. Na América Latina, o número de mortes por terremotos na Venezuela aumentou para 1.943, com equipes de resgate internacionais auxiliando nas buscas. A ONU alerta sobre os riscos econômicos prolongados para economias vulneráveis devido a eventuais bloqueios no Estreito de Hormuz.", "economia": "No mês de maio, o Brasil registrou a geração de 72.9 mil vagas formais de emprego, o pior resultado para o mês desde 2020, conforme informou o Ministério do Trabalho e Emprego. O Ibovespa teve uma queda de 0,68% nesta terça-feira, encerrando junho com desempenho negativo, mas subiu quase 7% no semestre. O dólar comercial avançou pelo segundo mês consecutivo, com uma elevação de 2,39% em junho após subir 1,66% em maio, mas caiu 5,94% no semestre. Em outros desenvolvimentos econômicos, o governo federal anunciou a retirada gradual dos subsídios aos combustíveis, iniciando com o fim da subvenção de R$ 0,35 por litro do diesel a partir desta quarta-feira. O Banco Central lançou oficialmente a duplicata escritural, uma ferramenta digital que visa facilitar o crédito para empresas brasileiras. A Petrobras criou um mecanismo para mitigar os efeitos da variação dos preços do petróleo sobre o gás natural, enquanto a Philip Morris foi autorizada a comercializar os sachês de nicotina Zyn nos Estados Unidos, considerando-os menos prejudiciais do que fumar. O Mercosul está iniciando negociações com o Japão para formar uma área de livre comércio estimada em US$ 7 trilhões. Além disso, a Suprema Corte dos Estados Unidos bloqueou o presidente Donald Trump de demitir Lisa Cook, diretora do Fed, mas ele manteve seu desafio para obter mais influência sobre o banco central americano.", "tecnologia": "A China está competindo com os Estados Unidos na corrida tecnológica global, conforme relatado por uma audiência legislativa nos EUA. Isso incentivou o país a inovar mais rapidamente para contrabalançar o avanço chinês. A disputa na inteligência artificial (IA) é apresentada como um aspecto crucial dessa rivalidade. Em outro desenvolvimento, a Amazon foi multada em 2,25 milhões de dólares por não auxiliar clientes vítimas de fraude de identidade. Por sua vez, a NASA pode enviar um rover Mars equipado com reator nuclear e uma cópia de segurança para a Lua. A empresa Etched, concorrente da Nvidia no mercado de chips para IA, alcançou uma avaliação de 5 bilhões de dólares e já obteve contratos por sistemas inferenciais valorizando 1 bilhão de dólares com seu chip. Além disso, a Realta Fusion demonstrou a geração de eletricidade através de uma reação de fusão nuclear sem a necessidade de uma turbina de vapor, o que parece ser o primeiro caso desse tipo.", "ciencia": "A NASA anunciou novas missões para o programa Artemis, com foco na Base Lunar. Uma parte importante disso é o rover PROMISE, que será enviado à superfície lunar. As empresas Astrobotic, Intuitive Machines e Firefly foram selecionadas para realizar quatro poucos na Lua, recebendo um total de $600 milhões, preparando o terreno para uma futura base tripulada no solo lunar. Paralelamente, a NASA planeja capturar um telescópio espacial em queda, empurrá-lo de volta ao espaço e evitar que ele caia na atmosfera terrestre. Além disso, pesquisas importantes foram realizadas sobre hadronização com computação quântica, reações de lobos à presença de intrusos, sobrevivência de microrganismos terrestres em ambientes hostis e a simulação de processos físicos fundamentais usando tecnologia quântica.", "cultura": "O cenário cultural brasileiro e internacional tem sido dinâmico nos últimos tempos. O Cine Brasília, situado no Distrito Federal, corre o risco de encerrar suas atividades por causa dos atrasos na liberação de verbas pela Secretaria de Cultura do GDF, o que levanta preocupações sobre seu futuro. Por outro lado, a World Monuments Fund incluiu o prédio da Black Mountain College em sua lista de preservação dos Estados Unidos, reconhecendo sua importância histórica e cultural. Além disso, a HBO Max lançou 'Dona Beja', um remake que registrou a menor audiência na história da Bandeirantes, demonstrando os desafios enfrentados pelo mercado de novelas. O artista conceitual autodidata Rune Mields faleceu aos 91 anos, deixando uma herança significativa para o mundo das artes visuais e matemática. Outros eventos relevantes incluem a minissérie 'Justiça' retornando com sucesso para sua segunda temporada após um intervalo de oito anos, e a seleção de dez locais americanos como 'irreplacíveis' para celebrar os 250 anos dos Estados Unidos, entre eles o Dallas City Hall.", "sociedade": "Um homem foi condenado a mais de 15 anos de prisão por matar um passageiro de ônibus em Santiago, no Chile. O crime aconteceu quando o suspeito tentou ajudar uma vítima de roubo no Terminal Central de ônibus. A sentença reflete a gravidade do incidente e a necessidade de proteção dos passageiros. Em outro desenvolvimento, a Organização Pan-Americana da Saúde (PAHO) ampliou sua resposta à saúde na Venezuela após terremotos devastadores que causaram mais de 1.700 mortes e 5.000 feridos no país. A Marinha do Brasil instalou um hospital de campanha em La Guaira, na Venezuela, para atender às demandas emergenciais. No Brasil, o Conselho Nacional de Justiça revelou que mais da metade dos presídios estão superlotados, indicando uma precarização estrutural no sistema prisional. A Organização Mundial da Saúde (OMS) informou que o sistema de saúde venezuelano está sobrecarregado após os terremotos, com hospitais danificados e superlotados enfrentando falta de especialistas. Além disso, em São José, Santa Catarina, uma mulher de 55 anos foi morta por um invasor que a atingiu com um extintor após invadir seu apartamento, mobilizando as autoridades locais para investigar o caso.", "meio_ambiente": "A Venezuela enfrenta uma situação devastadora após terremotos que danificaram 58 mil edifícios, conforme constatado por imagens de satélite da NASA. O porto de La Guaira foi transformado em um necrotério temporário para lidar com o número crescente de vítimas, enquanto as buscas continuam nas áreas afetadas. Em Santa Catarina, a Defesa Civil emitiu alertas para chuvas persistentes e raios, causando preocupações sobre possíveis alagamentos e enxurradas. O El Niño prolongado pode mudar drasticamente o clima no Brasil, com previsões de um contraste nas chuvas e calor intenso.", "direitos_humanos": "A Suprema Corte dos Estados Unidos manteve as leis estaduais que proíbem atletas transexuais de competir em esportes femininos escolares, uma decisão criticada por organizações de direitos humanos. Em paralelo, a Comissão dos Direitos da Criança e UNICEF emitiram uma declaração conjunta sobre as dificuldades enfrentadas por crianças migrantes na África do Sul, destacando os desafios específicos que essas crianças enfrentam."}, "resumo_do_dia": {"politica_nacional": [{"id": 28317, "titulo": "Petrobras anuncia redução do preço do diesel em R$ 0,35", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/petrobras-anuncia-reducao-do-preco-do-diesel-em-r-035.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T22:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Petrobras anunciou uma redução no preço do diesel em suas refinarias de R$ 0,35, conforme o governo cortou a subvenção ao óleo diesel. Essa medida visa eliminar impactos para o consumidor final.", "titulo_pt": "Petrobras anuncia redução do preço do diesel em R$ 0,35", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 28302, "titulo": "Michelle Bolsonaro deixa presidência do PL Mulher e se queixa de ataques a aliados", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/michelle-bolsonaro-deixa-presidencia-do-pl-mulher-e-se-queixa-de-ataques-a-aliados.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-30T22:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Michelle Bolsonaro deixou a presidência do PL Mulher e expressou desânimo com a possibilidade de ser candidata ao Senado pelo Distrito Federal. Ela também enfrenta ataques a aliados.", "titulo_pt": "Michelle Bolsonaro deixa comando do PL Mulher e se desanima com possível candidatura", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 28406, "titulo": "Ato na Avenida Paulista pressiona Senado a favor do fim da 6x1", "url": "https://www.metropoles.com/sao-paulo/ato-na-avenida-paulista-pressiona-senado-a-favor-do-fim-da-6x1", "fonte_id": "metropoles", "data_pub": "2026-06-30T22:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Aprovado pela Câmara dos Deputados em maio, o projeto que propõe a mudança do sistema eleitoral de 6x1 para outro ainda não foi enviado à Comissão de Constituição e Justiça (CCJ) do Senado e permanece paralisado na Mesa Diretora da Casa.", "titulo_pt": "Ato na Avenida Paulista pressiona por fim da proposta 6x1", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 28331, "titulo": "Lula lança Plano Safra da agricultura familiar com R$ 85 bi em crédito rural", "url": "https://g1.globo.com/politica/noticia/2026/06/30/lula-lanca-plano-safra-da-agricultura-familiar.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T22:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Luiz Inácio Lula da Silva (PT) lançou o Plano Safra para agricultura familiar com uma oferta de R$ 85,2 bilhões em crédito para a temporada 2026-2027. O plano promete movimentar um total de R$ 97,1 bilhões e oferece juros variando de 0,5% a 7,5% ao ano no Pronaf.", "titulo_pt": "Lula lança Plano Safra para agricultura familiar com R$ 85 bi em crédito rural", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 28318, "titulo": "Governo Lula lança Plano Safra para agricultura familiar com R$ 97,3 bi de investimento", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/governo-lula-lanca-plano-safra-para-agricultura-familiar-com-r-973-bi-de-investimento.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T22:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo Lula destinou R$ 97,3 bilhões para o Plano Safra Agricultura Familiar 2026-2027. O plano inclui programas de crédito, seguro agrícola, compras públicas e assistência técnica.", "titulo_pt": "Governo Lula lança Plano Safra para agricultura familiar com R$ 97,3 bi de investimento", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 28303, "titulo": "Integrantes do PSD veem pressão de Kassab por apoio a Caiado com ingresso na chapa", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/integrantes-do-psd-veem-pressao-de-kassab-por-apoio-a-caiado-com-ingresso-na-chapa.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-30T22:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Gilberto Kassab anunciou sua candidatura como vice na chapa de Ronaldo Caiado, formando uma chapa única do PSD. Esta decisão foi vista por membros do partido como um esforço para influenciar os dirigentes estaduais a apoiarem Caiado em vez dos principais nomes nas pesquisas de intenção de voto.", "titulo_pt": "Membros do PSD veem pressão de Kassab por apoio a Caiado com ingresso na chapa", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 28332, "titulo": "Sirlange Maganhato, ex-primeira-dama de Sorocaba, confirma pré-candidatura a deputada federal", "url": "https://g1.globo.com/sp/sorocaba-jundiai/eleicoes/2026/noticia/2026/06/30/pre-candidatura-sirlange-maganhato.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T22:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Sirlange Maganhato, ex-primeira-dama de Sorocaba (SP) e esposa do atual prefeito da cidade, Rodrigo Manga, confirmou sua pré-candidatura a deputada federal pelo União Brasil para as eleições de 2026.", "titulo_pt": "Sirlange Maganhato confirma pré-candidatura a deputada federal", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 28304, "titulo": "CNMP marca julgamento que pode expulsar promotor acusado de favorecer ex-prefeito de Macapá", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/cnmp-marca-julgamento-que-pode-expulsar-promotor-acusado-de-favorecer-ex-prefeito-de-macapa.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-30T21:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O CNMP marcou para o dia 18 de agosto um julgamento que pode levar à expulsão do promotor de Justiça João Paulo Furlan, acusado de favorecer ex-prefeito de Macapá. O recurso final do promotor foi negado.", "titulo_pt": "CNMP marca julgamento que pode expulsar promotor acusado de favorecer ex-prefeito de Macapá", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 28305, "titulo": "Romário diz que devolverá salário ao Senado e que não pediu licença para votar pelo fim da 6x1", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/romario-diz-que-devolvera-salario-ao-senado-e-que-nao-pediu-licenca-para-votar-pelo-fim-da-6x1.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-30T21:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Romário (PL-RJ) afirmou que não pediu licença para votar a favor do fim da escala 6x1. Ele também declarou que devolverá o salário recebido durante esse período.", "titulo_pt": "Romário afirma não ter pedido licença para votar e devolverá salário", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 28334, "titulo": "Senado aprova projeto que autoriza venda de spray de pimenta para mulheres acima de 16 anos; veja regras", "url": "https://g1.globo.com/politica/noticia/2026/06/30/senado-aprova-projeto-que-autoriza-venda-de-spray-de-pimenta-para-mulheres-acima-de-16-anos.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T21:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Senado aprovou um projeto que permite a venda e posse de sprays de pimenta para mulheres acima de 16 anos como meio de defesa pessoal. A proposta, após ser sancionada pelo presidente Lula, estabelece regras sobre o uso moderado do produto.", "titulo_pt": "Senado aprova venda e posse de spray de pimenta para mulheres acima de 16 anos", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 28335, "titulo": "Cotado para ser candidato do PSD a vice-presidente, Kassab diz que decisão cabe a Ronaldo Caiado", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/06/30/kassab-entrevista-vice-chapa-presidencial.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T21:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Gilberto Kassab, presidente do PSD, afirmou que a escolha do vice na chapa presidencial do partido será feita pelo pré-candidato Ronaldo Caiado. Kassab disse que a decisão caberá ao governador após anunciar sua candidatura.", "titulo_pt": "Kassab diz que escolha de vice na chapa PSD é de Ronaldo Caiado", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 28581, "titulo": "Lula diz que Pix pode servir de modelo para criação de sistema de pagamentos no Mercosul", "url": "https://www.jota.info/executivo/lula-diz-que-pix-pode-servir-de-modelo-para-criacao-de-sistema-de-pagamentos-no-mercosul", "fonte_id": "jota", "data_pub": "2026-06-30T21:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Lula participou da sessão plenária da Cúpula do Mercosul em Assunção, Paraguai. Ele sugeriu que o sistema Pix pode servir de modelo para a criação de um sistema de pagamentos no bloco.", "titulo_pt": "Lula sugere Pix como modelo para sistema de pagamentos no Mercosul", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 28336, "titulo": "Presidente do Senado reclama de ser chamado de 'o homem das pautas-bomba' e de 'ataques' por 'autoridades da República'", "url": "https://g1.globo.com/politica/noticia/2026/06/30/presidente-do-senado-reclama-de-ser-chamado-de-o-homem-das-pautas-bomba-e-de-ataques-por-autoridades-da-republica.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T21:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente do Senado Federal, Davi Alcolumbre, reclamou de ser chamado de 'o homem das pautas-bomba' e de sofrer 'agressões, ofensas e ataques' por parte de autoridades em função de projetos que tem pautado no Senado. Ele fez essa declaração durante uma sessão do plenário do Senado.", "titulo_pt": "Presidente do Senado reclama de ser chamado de 'o homem das pautas-bomba' e de 'ataques' por 'autoridades da República'", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [{"titulo": "Michelle Bolsonaro deixa presidência do PL Mulher e se dedica à família", "sumario": "Michelle Bolsonaro deixou a presidência do partido PL Mulher e afirmou que se dedicará integralmente à família. Michelle se afastou do comando do PL Mulher em um acordo negociado durante uma reunião com o presidente nacional do PL, Valdemar Costa Neto. Michelle Bolsonaro decidiu deixar a presidência do PL Mulher após uma crise pública com o senador Flávio Bolsonaro.", "artigos": [{"id": 28378, "titulo": "Michelle Bolsonaro deixa presidência do PL Mulher e diz que vai se dedicar integralmente à família", "url": "https://veja.abril.com.br/politica/michelle-bolsonaro-deixa-presidencia-do-pl-mulher-e-diz-que-vai-se-dedicar-integralmente-a-familia/", "fonte_id": "veja", "data_pub": "2026-06-30T22:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Michelle Bolsonaro deixou a presidência do partido PL Mulher e afirmou que se dedicará integralmente à família. Ela não deve concorrer ao Senado neste ano.", "titulo_pt": "Michelle Bolsonaro deixa presidência do PL Mulher e se dedica à família", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 28379, "titulo": "Em crise com Flávio, Michelle se afasta de comando do PL Mulher", "url": "https://veja.abril.com.br/politica/em-crise-com-flavio-michelle-se-afasta-de-comando-do-pl-mulher/", "fonte_id": "veja", "data_pub": "2026-06-30T22:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Michelle se afastou do comando do PL Mulher em um acordo negociado durante uma reunião com o presidente nacional do PL, Valdemar Costa Neto. A crise com Flávio foi a razão principal para essa decisão.", "titulo_pt": "Michelle se afasta de comando do PL Mulher em crise com Flávio", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 28330, "titulo": "Michelle Bolsonaro decide deixar presidência do PL Mulher após crise com Flávio", "url": "https://g1.globo.com/politica/noticia/2026/06/30/michelle-bolsonaro-decide-deixar-presidencia-do-pl-mulher-apos-crise-com-flavio-bolsonaro.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T22:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Michelle Bolsonaro decidiu deixar a presidência do PL Mulher após uma crise pública com o senador Flávio Bolsonaro. O acordo foi fechado em reunião com Valdemar Costa Neto, presidente nacional do PL.", "titulo_pt": "Michelle Bolsonaro deixa presidência do PL Mulher após crise com Flávio", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}]}], "mundo": [{"id": 28071, "titulo": "Coast guard warns of Beijing’s new plan to normalize territory incursions", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/01/2003860041", "fonte_id": "taipei_times", "data_pub": "2026-07-01T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O serviço de guarda costeira advertiu sobre um novo plano da Beijing para normalizar as incursões territoriais. Segundo a fonte, o planos visa intensificar as operações de ocupação em territórios disputados.", "titulo_pt": "Guarda-costeira avisa sobre novo plano chinês para normalizar incursões territoriais", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 28073, "titulo": "Beijing’s policy transforming HK, MAC says", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/01/2003860043", "fonte_id": "taipei_times", "data_pub": "2026-07-01T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A política de Beijing está transformando Hong Kong e Macau, segundo afirma a fonte. O texto sugere que há mudanças significativas nessas regiões sob administração chinesa, sem entrar em detalhes específicos.", "titulo_pt": "Política de Beijing transforma HK e MAC, diz fonte", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 28776, "titulo": "Hong Kong, mainland China to start sharing data this year: tech minister Sun Dong", "url": "https://www.scmp.com/news/hong-kong/society/article/3358943/hong-kong-mainland-china-start-sharing-data-year-tech-minister-sun-dong?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Ministério da Tecnologia da China anunciou que Hong Kong e a China continental começarão a compartilhar dados fronteiriços no ano atual, quando mais empresas iniciarão operações no hub de inovação Hetao. Este anúncio foi feito durante uma entrevista com altos funcionários locais sobre os sucessos administrativos recentes e o que pode vir a acontecer no futuro.", "titulo_pt": "Hong Kong e China continental vão compartilhar dados fronteiriços este ano, diz ministro de tecnologia", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 28777, "titulo": "US, China should de-escalate from tit-for-tat actions, US lawmaker says", "url": "https://www.scmp.com/news/china/diplomacy/article/3358959/us-china-should-de-escalate-tit-tat-actions-says-us-lawmaker?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T22:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O senador republicano Steve Daines dos Estados Unidos pediu que Washington e Pequim evitem aumentar as tensões através de ações retaliatórias. Segundo ele, tais desenvolvimentos recentes incluem controles de exportação da China sobre empresas americanas de minerais raros e o banimento de várias empresas tecnológicas chinesas pelo Pentágono.", "titulo_pt": "EUA e China devem desescalar ações retaliatórias, diz senador", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 28340, "titulo": "Venezuela corre contra o tempo e já soma mais de 6 mil salvamentos", "url": "https://agenciabrasil.ebc.com.br/internacional/noticia/2026-06/venezuela-corre-contra-o-tempo-e-ja-soma-mais-de-6-mil-salvamentos", "fonte_id": "agencia_brasil_intl", "data_pub": "2026-06-30T22:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Venezuela continua os esforços de resgate após terremotos que ocorreram há seis dias, totalizando 6.640 sobreviventes resgatados até o momento. O governo venezuelano divulgou esse último balanço, conforme informado pela Telesur.", "titulo_pt": "Venezuela avança em resgate e já soma mais de 6 mil salvamentos", "veiculo": "Agência Brasil - Internacional", "pais": "Brasil", "classe": "A"}, {"id": 28778, "titulo": "US hollows out G20 agenda, casts Miami summit as ‘backdrop for Trump-Xi meeting’: sources", "url": "https://www.scmp.com/news/us/diplomacy/article/3358958/us-hollows-out-g20-agenda-casts-miami-summit-backdrop-trump-xi-meeting-sources?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T22:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos estão trabalhando para reduzir o agenda do G20 e transformar seu encontro programado para dezembro em um 'fundo' para uma possível reunião entre os presidentes Donald Trump e Xi Jinping no Miami. Isso ocorre conforme relatos de fontes que participaram das negociações com os sherpas, ou negociadores-chave, nos Estados Unidos.", "titulo_pt": "EUA enfraquecem agenda do G20 para tornar cúpula em Miami cenário para reunião Trump-Xi", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 28770, "titulo": "US and Gulf states sanction entities accused of financial links to Hezbollah", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/us-and-gulf-states-sanction-entities-accused-financial-links-hezbollah", "fonte_id": "middle_east_eye", "data_pub": "2026-06-30T22:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Departamento do Tesouro dos Estados Unidos anunciou sanções conjuntas com estados gulfenses contra cinco entidades e 16 indivíduos acusados de terem ligações financeiras com o Hezbollah. Essas sanções foram tomadas pelo Centro de Combate ao Financiamento do Terrorismo, um corpo multilateral co-presidido pelos Estados Unidos e Arábia Saudita.", "titulo_pt": "EUA e estados gulfenses sanccionam entidades acusadas de ligações financeiras com o Hezbollah", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 28620, "titulo": "Trump Officials Sideline Machado, Venezuela’s Opposition Leader, Over Earthquake Response", "url": "https://www.nytimes.com/2026/06/30/world/americas/trump-machado-venezuela-rift.html", "fonte_id": "nyt_world", "data_pub": "2026-06-30T22:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "María Corina Machado, líder da oposição venezuelana e vencedora do Prêmio Nobel da Paz, buscou retornar à Venezuela devastada por um terremoto, o que ofendeu autoridades dos EUA concentradas na recuperação e estabilidade.", "titulo_pt": "Funcionários de Trump Ignoram Machado, Líder da Oposição Venezuelana, em Resposta ao Terremoto", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 28590, "titulo": "Trump anuncia una convención republicana, “la primera de la historia”, como previa a las elecciones de noviembre", "url": "https://elpais.com/us/2026-06-30/trump-anuncia-una-convencion-republicana-la-primera-de-la-historia-como-previa-a-las-elecciones-de-noviembre.html", "fonte_id": "elpais_america", "data_pub": "2026-06-30T22:37:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O presidente dos Estados Unidos, Trump, anuncia uma convenção republicana inédita como prévia das eleições de novembro. Este evento será o primeiro da história do partido a ocorrer antes do período regular de quatro anos.", "titulo_pt": "Trump anuncia convenção republicana, 'a primeira de sempre', como prévia para as eleições de novembro", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 28352, "titulo": "Eleição presidencial na França será em 18 de abril e 2 de maio de 2027", "url": "https://www.cartacapital.com.br/mundo/eleicao-presidencial-na-franca-sera-em-18-de-abril-e-2-de-maio-de-2027/", "fonte_id": "cartacapital", "data_pub": "2026-06-30T22:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As eleições presidenciais na França estão programadas para os dias 18 de abril e 2 de maio de 2027. As pesquisas indicam que a extrema-direita pode liderar o primeiro turno.", "titulo_pt": "Eleição presidencial na França será em 18 de abril e 2 de maio de 2027", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 28710, "titulo": "US Supreme Court has dealt heavy defeats to Trump, while expanding his power", "url": "https://www.bbc.co.uk/news/articles/c4gyqeqe8xyo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-30T22:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A decisão sobre o nascimento trouxe ao fim um mandato do Supremo Tribunal dos EUA que concedeu ao presidente algumas vitórias cruciais. O tribunal também impôs derrotas significativas ao ex-presidente Trump, mas expandiu seu poder.", "titulo_pt": "Supremo Tribunal americano dá vitórias e derrotas a Trump, enquanto expande seu poder", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 28657, "titulo": "What the Supreme Court Rulings Mean for Trump", "url": "https://www.theatlantic.com/newsletters/2026/06/what-the-supreme-court-rulings-mean-for-trump/687751/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-30T22:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A conversa aborda como as decisões recentes do Supremo Tribunal Federal afetarão o poder de Trump.", "titulo_pt": "O que os Acórdãos do Supremo Tribunal Federal Significam para Trump", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 28621, "titulo": "China’s Plan to Save Jobs From A.I.", "url": "https://www.nytimes.com/2026/06/30/world/china-ai-jobs-birthright-hormuz.html", "fonte_id": "nyt_world", "data_pub": "2026-06-30T22:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ao incorporar a tecnologia de inteligência artificial em todas as indústrias, o China está considerando como manter os trabalhadores empregados.", "titulo_pt": "Plano da China para Manter Empregos Diante da Inteligência Artificial", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 28771, "titulo": "Israeli drone attack kills two north of Khan Younis", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/israeli-drone-attack-kills-two-north-khan-younis", "fonte_id": "middle_east_eye", "data_pub": "2026-06-30T22:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um ataque de drone israelense causou a morte de duas pessoas e feriu várias outras no norte de Khan Younis, na Faixa de Gaza. Nas últimas 24 horas, pelo menos oito pessoas foram mortas e 24 ficaram feridas em ataques israelenses.", "titulo_pt": "Ataque de drone israelense mata dois perto de Khan Younis", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 28746, "titulo": "Why India’s viral youth party is still protesting", "url": "https://www.aljazeera.com/video/newsfeed/2026/6/30/why-indias-viral-youth-party-is-still-protesting?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-30T22:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A jovem partido Cockroach Janta, viral na Índia, protestou por quase duas semanas, exigindo o renúncia do ministro da Educação.", "titulo_pt": "Por que o jovem partido Cockroach Janta ainda está em protesto", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 28722, "titulo": "Explosion in Monaco targets Ukrainian oligarch Vadim Ermolaev", "url": "https://www.lemonde.fr/en/international/article/2026/07/01/explosion-in-monaco-targets-ukrainian-oligarch-vadim-ermolaev_6755024_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-30T22:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um bomba caseira explodiu na noite de segunda-feira perto de um edifício em Mônaco, aparentemente visando o oligarca ucraniano Vadim Ermolaev. Embora tenha renunciado à cidadania ucraniana, ele manteve atividades empresariais obscuras relacionadas ao seu país de origem.", "titulo_pt": "Explosão em Mônaco alvo do oligarca ucraniano Vadim Ermolaev", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 28087, "titulo": "Taiwan’s 2025 domestic production of export orders hits record 52.9%", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/01/2003860014", "fonte_id": "taipei_times", "data_pub": "2026-07-01T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 2025, a produção interna para encomendas de exportação na Taiwan atingiu um recorde de 52,9%. Este aumento reflete o crescimento da capacidade produtiva local e a importância do setor exportador para a economia taiwanesa.", "titulo_pt": "Produção Interna de Encomendas de Exportação da Taiwan bate Recorde em 2025 com 52,9%", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 28380, "titulo": "EUA criaram mais de 1.200 novos milionários por dia em 2025, aponta UBS", "url": "https://veja.abril.com.br/economia/eua-criaram-mais-de-1-200-novos-milionarios-por-dia-em-2025-aponta-ubs/", "fonte_id": "veja", "data_pub": "2026-06-30T22:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O relatório da UBS indica que os Estados Unidos criaram mais de 1.200 novos milionários por dia em 2025. O país concentrou quase metade dos novos milionários globais no ano passado, impulsionado pela valorização das bolsas.", "titulo_pt": "EUA geraram mais de 1.200 novos milionários por dia em 2025, aponta UBS", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 28316, "titulo": "No Plano Safra, qualidade do crédito vale mais do que volume", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/vaivem/2026/06/no-plano-safra-qualidade-do-credito-vale-mais-do-que-volume.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T22:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Plano Safra agora enfatiza a qualidade do crédito mais que o volume de financiamento. Os aspectos como composição, custo, fonte, capacidade de contratação e distribuição por público devem ser avaliados.", "titulo_pt": "No Plano Safra, a qualidade do crédito vale mais do que o volume", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 28725, "titulo": "Trump's annual financial disclosure shows more than $580M in crypto-related income", "url": "https://www.cnbc.com/2026/06/30/trump-financial-disclosure-released.html", "fonte_id": "cnbc_international", "data_pub": "2026-06-30T22:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O relatório financeiro anual de Trump para 2025, com mais de 927 páginas, revela uma renda relacionada a criptomoedas superior a US$ 580 milhões. O documento detalha seus investimentos em criptomoedas e ações.", "titulo_pt": "Relatório financeiro anual de Trump mostra mais de US$ 580 milhões em renda relacionada a criptomoedas", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 28726, "titulo": "Record chip rally adds $2 trillion in combined value to Micron, Intel and AMD in second quarter", "url": "https://www.cnbc.com/2026/06/30/ai-chip-rally-in-q2-adds-2-trillion-in-value-to-micron-intel-amd-.html", "fonte_id": "cnbc_international", "data_pub": "2026-06-30T22:43:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações das fabricantes de chips Micron, Intel e AMD aumentaram valorizaram cerca de 2 trilhões de dólares no segundo trimestre, impulsionadas pela onda de crescimento do artificial intelligence que beneficiou mais fornecedores além da Nvidia.", "titulo_pt": "Recorde alta nas ações de fabricantes de chips adiciona 2 trilhões de dólares ao valor das empresas Micron, Intel e AMD no segundo trimestre", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 28739, "titulo": "Trump made more than $500mn from sale of family’s crypto tokens last year", "url": "https://www.ft.com/content/dab0dd71-2d95-4838-b0df-e942f9cc5dec", "fonte_id": "financial_times", "data_pub": "2026-06-30T22:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente dos Estados Unidos, Donald Trump, gerou mais de 500 milhões de dólares com a venda de tokens criptográficos pertencentes à família dele no ano anterior. Além disso, ele também ganhou centenas de milhares de dólares através do licenciamento de Bíblias, relógios e perfumes durante o seu mandato.", "titulo_pt": "Trump arrecadou mais de 500 milhões com venda de tokens criptográficos familiares no ano passado", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 28319, "titulo": "Impacto da redução de subsídio ao diesel depende da Petrobras, dizem executivos do setor", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/impacto-da-reducao-de-subsidio-ao-diesel-depende-da-petrobras-dizem-executivos-do-setor.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T21:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Executivos do setor de petróleo afirmam que o impacto da redução do subsídio ao diesel anunciada pelo governo Lula depende das ações da Petrobras. O anúncio foi feito na terça-feira (30) de junho de 2026.", "titulo_pt": "Impacto da redução de subsídio ao diesel depende da Petrobras, dizem executivos do setor", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 28475, "titulo": "Trump declara ao menos US$ 1,2 bilhão em ganhos com criptomoedas em 2025", "url": "https://www.infomoney.com.br/mundo/trump-declara-ao-menos-us-12-bilhao-em-ganhos-com-criptomoedas-em-2025/", "fonte_id": "infomoney", "data_pub": "2026-06-30T21:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Donald Trump declarou ter ganhos mínimos de pelo menos 1,2 bilhão de dólares com criptomoedas em 2025. O patrimônio inclui ativos como memecoins e World Liberty.", "titulo_pt": "Trump declara ao menos 1,2 bilhão em ganhos com criptomoedas em 2025", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 28345, "titulo": "Brasil acumula abertura de 767 mil novos postos de trabalho em 2026", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/brasil-acumula-abertura-de-767-mil-novos-postos-de-trabalho-em-2026", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-30T21:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério do Trabalho e Emprego informou que, entre janeiro e maio de 2026, foram criados 767.326 novos postos de trabalho com carteira assinada no Brasil. O salário médio real das pessoas admitidas em maio desse ano foi de R$ 2.384,10.", "titulo_pt": "Brasil acumula abertura de 767 mil novos postos de trabalho em 2026", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 28616, "titulo": "Precio promedio del cobre marca un hito en junio, mientras el oro sufre mayor caída en 13 años en el tercer trimestre", "url": "https://www.latercera.com/pulso/noticia/precio-promedio-del-cobre-marca-un-hito-en-junio-mientras-el-oro-sufre-mayor-caida-en-13-anos-en-el-tercer-trimestre/", "fonte_id": "la_tercera", "data_pub": "2026-06-30T21:22:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O preço médio do cobre no mês de junho atingiu um recorde, enquanto o ouro sofreu a maior queda em 13 anos durante o terceiro trimestre.", "titulo_pt": "Preço médio do cobre marca recorde em junho, enquanto o ouro sofre a maior queda em 13 anos no terceiro trimestre", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 28321, "titulo": "Você está pagando imposto antes da hora?", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/blogs/de-grao-em-grao/2026/06/voce-esta-pagando-imposto-antes-da-hora.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T21:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A história compara duas pessoas que vendem um apartamento com o mesmo lucro, mas uma paga imposto imediatamente enquanto a outra adia esse pagamento por alguns anos, mantendo o dinheiro investido. Quem termina mais rico não está claro sem mais detalhes.", "titulo_pt": "Você está pagando impostos antes da hora?", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 28346, "titulo": "Stablecoins concentram 80% de ativos cripto declarados à Receita", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/stablecoins-concentram-80-de-ativos-cripto-declarados-receita", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-30T20:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As stablecoins, criptomoedas que acompanham o valor de moedas tradicionais, representam cerca de 80% das operações com criptoativos declaradas à Receita Federal no Brasil. Este percentual reflete uma mudança no perfil do mercado brasileiro antes da implementação obrigatória da DeCripto, nova plataforma de declaração de criptoativos.", "titulo_pt": "Stablecoins concentram 80% dos ativos criptográficos declarados à Receita", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 28617, "titulo": "Empresa proveedora de Junaeb se querella contra nuevo director por denuncia calumniosa sobre programa de alimentación", "url": "https://www.latercera.com/nacional/noticia/empresa-proveedora-de-junaeb-se-querella-contra-nuevo-director-por-denuncia-calumniosa-sobre-programa-de-alimentacion/", "fonte_id": "la_tercera", "data_pub": "2026-06-30T20:19:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A empresa que fornece serviços para a Junaeb denunciou o novo diretor, Fernando Peña, por supostamente fazer acusações caluniosas sobre irregularidades no programa de alimentação. A empresa afirma que já investigou as suspeitas e descartou corrupção.", "titulo_pt": "Empresa fornecedora da Junaeb denuncia novo diretor por calúnia", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 28326, "titulo": "Real vira 'dano colateral' e cai quase 3% no pior mês do ano para o câmbio", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/real-vira-dano-colateral-e-cai-quase-3-no-pior-mes-do-ano-para-o-cambio.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T20:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O real brasileiro está registrando seu pior desempenho mensal do ano, caindo quase 3%. Isso ocorre devido à recuperação do dólar e às mudanças nas expectativas sobre os juros nos Estados Unidos, fazendo investidores desmontarem operações de 'carry trade'.", "titulo_pt": "Real vira 'dano colateral' e cai quase 3% no pior mês do ano para o câmbio", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 28347, "titulo": "BC lança duplicata escritural para facilitar crédito a empresas", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/bc-lanca-duplicata-escritural-para-facilitar-credito-empresas", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-30T19:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Banco Central lançou oficialmente a duplicata escritural, uma ferramenta digital que visa facilitar o crédito para empresas brasileiras. A implementação gradual da ferramenta está prevista até junho de 2028.", "titulo_pt": "BC lança duplicata digital para simplificar crédito empresarial", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 28348, "titulo": "Governo inicia retirada gradual de subsídios aos combustíveis", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/governo-inicia-retirada-gradual-de-subsidios-aos-combustiveis", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-30T19:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo federal anunciou a retirada gradual dos subsídios aos combustíveis, iniciando com o fim da subvenção de R$ 0,35 por litro do diesel a partir desta quarta-feira. A decisão foi motivada pela queda recente no preço do petróleo.", "titulo_pt": "Governo inicia retirada gradual de subsídios aos combustíveis", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 28813, "titulo": "Startup Battlefield Australia application closes in days: Apply before July 6", "url": "https://techcrunch.com/2026/06/30/last-chance-to-apply-startup-battlefield-australia-applications-close-july-6/", "fonte_id": "techcrunch", "data_pub": "2026-06-30T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O período de inscrição para o Startup Battlefield na Austrália terminará em poucos dias. As próximas startups que ainda não foram notadas podem apresentar algo significativo.", "titulo_pt": "Inscrição para Startup Battlefield Austrália encerra em poucos dias: inscreva-se até 6 de julho", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 28779, "titulo": "US must innovate faster to counter China’s tech rise, lawmakers told", "url": "https://www.scmp.com/news/us/article/3358957/us-must-innovate-faster-counter-chinas-tech-rise-lawmakers-told?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T22:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma audiência legislativa nos Estados Unidos incentivou o país a inovar mais rapidamente para contrabalançar o avanço tecnológico da China, mesmo que alguns congressistas criticassem as políticas do governo de Donald Trump. O depoimento à Comissão de Energia e Comércio da Câmara dos Representantes ocorre em um momento em que os dois gigantes econômicos se enfrentam cada vez mais agressivamente sobre padrões, modelos econômicos e cadeias de suprimentos.", "titulo_pt": "EUA devem inovar mais rápido para contrabalançar o avanço tecnológico chinês, dizem parlamentares", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 28744, "titulo": "“WhatsApp Privacy Changes”", "url": "https://www.aljazeera.com/video/newsfeed/2026/6/30/whatsapp-privacy?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-30T22:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O WhatsApp está implementando nomes de usuário para manter os números de telefone privados.", "titulo_pt": "WhatsApp Introduz Nomes de Usuário", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 28790, "titulo": "June research roundup: 6 cool science stories we almost missed", "url": "https://arstechnica.com/science/2026/06/june-research-roundup-6-cool-science-stories-we-almost-missed/", "fonte_id": "ars_technica", "data_pub": "2026-06-30T22:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Este resumo aborda seis histórias científicas interessantes que podem ter passado despercebidas. São discutidos temas como a ciência da forma característica das fezes, borônio de fullereno (boron buckyballs) e o segredo por trás do enganador de futebol.", "titulo_pt": "Resumo científico de junho: 6 histórias científicas que quase nos escaparam", "veiculo": "Ars Technica", "pais": "EUA", "classe": "B"}, {"id": 28782, "titulo": "The great AI reckoning: how China is flipping the script on US’ new industrial revolution", "url": "https://www.scmp.com/tech/article/3358925/great-ai-reckoning-how-china-flipping-script-us-new-industrial-revolution?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T22:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo explora como a China está revolucionando o cenário tecnológico global, desafiando as suposições americanas sobre inovação e tecnologia. A competição na inteligência artificial é apresentada como um aspecto crucial dessa rivalidade histórica entre os dois países.", "titulo_pt": "A grande controvérsia da IA: como a China está reescrevendo o roteiro da nova revolução industrial americana", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 28814, "titulo": "OpenClaw is finally available on Android and iOS", "url": "https://techcrunch.com/2026/06/30/openclaw-is-finally-available-on-android-and-ios/", "fonte_id": "techcrunch", "data_pub": "2026-06-30T21:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "OpenClaw, um programa livre e de código aberto voltado para agências, finalmente está disponível nas plataformas Android e iOS.", "titulo_pt": "OpenClaw está disponível no Android e no iOS", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 28436, "titulo": "Fachin cita 75 milhões de processos ao defender IA no Judiciário", "url": "https://www.cnnbrasil.com.br/politica/fachin-cita-75-milhoes-de-processos-ao-defender-ia-no-judiciario/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T21:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente do STF e do CNJ, ministro Luiz Fux, defendeu o uso da Inteligência Artificial no Judiciário para mapear abusos e prevenir litigância predatória. Ele citou cerca de 75 milhões de processos existentes no sistema.", "titulo_pt": "Fux cita 75 milhões de processos ao defender IA no Judiciário", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 28788, "titulo": "Claude Science is Anthropic’s newest flagship product", "url": "https://www.technologyreview.com/2026/06/30/1139987/claude-science-is-anthropics-newest-flagship-product/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-30T21:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Na apresentação para executivos da indústria farmacêutica, fundadores de biotecnologia e pesquisadores, a Anthropic lançou o Claude Science, um novo produto que visa apoiar a pesquisa científica como o Claude Code apoia a engenharia de software. O Claude Science pode realizar trabalhos significativos quando fornecidas instruções concisas e de alto nível.", "titulo_pt": "Claude Science é o novo flagship da Anthropic", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 28791, "titulo": "Reddit will require you to log in to use old.reddit.com", "url": "https://arstechnica.com/gadgets/2026/06/reddit-will-require-you-to-log-in-to-use-old-reddit-com/", "fonte_id": "ars_technica", "data_pub": "2026-06-30T21:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Reddit exigirá login para acessar old.reddit.com, e o acesso sem login era considerado uma fonte significativa de scraping abusivo.", "titulo_pt": "Reddit exigirá login para acessar old.reddit.com", "veiculo": "Ars Technica", "pais": "EUA", "classe": "B"}, {"id": 28439, "titulo": "Avião espacial secreto da China libera objeto misterioso em órbita", "url": "https://www.cnnbrasil.com.br/ciencia/aviao-espacial-secreto-da-china-libera-objeto-misterioso-em-orbita/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T21:37:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Segundo uma empresa de vigilância espacial, um objeto misterioso foi liberado pela espaçonave reutilizável chinesa Shenlong durante uma missão sigilosa. O evento ocorreu em órbita terrestre baixa.", "titulo_pt": "Avião espacial secreto da China libera objeto misterioso em órbita", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 28798, "titulo": "Amazon fined $2.25 million for failing to help identity theft victims", "url": "https://www.theverge.com/tech/959847/amazon-ftc-identity-theft-fine", "fonte_id": "the_verge", "data_pub": "2026-06-30T21:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Comissão Federal de Proteção ao Consumidor multou a Amazon em US$ 2,25 milhões por não auxiliar clientes vítimas de fraude de identidade. De acordo com a denúncia, a empresa negava-se a fornecer informações sobre compras realizadas com contas fraudulentas.", "titulo_pt": "Amazon multada em $2,25 milhões por não ajudar vítimas de fraude de identidade", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 28808, "titulo": "Daisy Sound’s First Headphones Are Premium, High-Quality—and Just a Little Bit Cheaper", "url": "https://www.wired.com/story/daisy-sound-yet-another-company-is-making-premium-high-end-headphones/", "fonte_id": "wired", "data_pub": "2026-06-30T21:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A startup californiana Daisy Sound lançou seus primeiros fones de ouvido, que são premium e de alta qualidade, com um preço ligeiramente mais baixo do que os concorrentes.", "titulo_pt": "Daisy Sound Lança Fones de Ouvido Premium e Levemente Mais Baratos", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 28792, "titulo": "Amazon blames piracy apps with malware for killing new Fire Stick sideloading", "url": "https://arstechnica.com/gadgets/2026/06/exec-blames-malware-threat-for-amazon-blocking-sideloading-on-new-fire-sticks/", "fonte_id": "ars_technica", "data_pub": "2026-06-30T21:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A nova versão do sistema operacional Fire Stick da Amazon visa bloquear aplicativos de terceiros que promovem a pirataria e malware, impedindo o carregamento de conteúdo não oficial. O sistema também inclui recursos para bloquear launchers de homepage e bloqueadores de anúncios.", "titulo_pt": "Amazon culpa aplicativos de pirataria com malware por causar problemas no novo Fire Stick sideloading", "veiculo": "Ars Technica", "pais": "EUA", "classe": "B"}, {"id": 28793, "titulo": "NASA may send a backup, nuclear-powered Mars rover to the Moon", "url": "https://arstechnica.com/space/2026/06/nasa-may-send-a-backup-nuclear-powered-mars-rover-to-the-moon/", "fonte_id": "ars_technica", "data_pub": "2026-06-30T20:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA pode enviar um rover Mars equipado com reator nuclear e uma cópia de segurança para a Lua.", "titulo_pt": "NASA pode enviar rover Mars nuclear e backup para a Lua", "veiculo": "Ars Technica", "pais": "EUA", "classe": "B"}, {"id": 28794, "titulo": "Google kills Tenor GIF API, forcing changes at X, Discord, and more", "url": "https://arstechnica.com/gadgets/2026/06/google-kills-tenor-gif-api-forcing-changes-at-x-discord-and-more/", "fonte_id": "ars_technica", "data_pub": "2026-06-30T20:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O serviço Tenor encerrou sua API de GIFs da Google, obrigando plataformas como X e Discord a buscar alternativas para os GIFs.", "titulo_pt": "Google encerra API de GIFs do Tenor, afetando X e Discord", "veiculo": "Ars Technica", "pais": "EUA", "classe": "B"}, {"id": 28815, "titulo": "The DeepMind trio who built a poker AI are now making money for quant hedge funds", "url": "https://techcrunch.com/2026/06/30/the-deepmind-trio-who-built-a-poker-ai-are-now-making-money-for-quant-hedge-funds/", "fonte_id": "techcrunch", "data_pub": "2026-06-30T20:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "EquiLibre Technologies, uma lab de IA baseada na República Tcheca fundada por três ex-membros da DeepMind, agora vale mais de 500 milhões de dólares.", "titulo_pt": "O trio da DeepMind que criou um AI de poker está gerando lucros para fundos quant", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 28079, "titulo": "Taiwan to roll out publicly funded rotavirus vaccine in 2027", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/01/2003860049", "fonte_id": "taipei_times", "data_pub": "2026-07-01T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Taiwan planeja implementar um programa de vacinação contra o rotavírus financiado pelo governo em 2027.", "titulo_pt": "Taiwan vai implementar vacina pública contra rotavírus em 2027", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 28804, "titulo": "[Graphic News] Major earthquakes around world in 2026", "url": "https://www.koreaherald.com/article/10793593", "fonte_id": "korea_herald", "data_pub": "2026-06-30T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 2026, dois terremotos seguidos na Venezuela em junho foram classificados como o segundo e sétimo mais forte do ano globalmente. O terremoto mais poderoso registrado no ano foi um de magnitude 7,8 que atingiu as Filipinas em 7 de junho.", "titulo_pt": "Terremotos importantes ao redor do mundo em 2026", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 28816, "titulo": "Grasslands could lose four times more carbon uptake under future drought conditions", "url": "https://phys.org/news/2026-06-grasslands-carbon-uptake-future-drought.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa da Universidade de Innsbruck mostrou que as condições de seca nas planícies verdes no futuro serão mais severas do que se supunha anteriormente. O estudo, liderado por Maud Tissink e Michael Bahn, indica que fatores climáticos ocorrem simultaneamente e influenciam-se mutuamente, com a elevação das concentrações de CO2 no ar contribuindo para o aquecimento global e intensificando os períodos de seca.", "titulo_pt": "Planícies verdes poderiam perder quatro vezes mais absorção de carbono sob condições futuras de seca", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28817, "titulo": "Shark‑spotting drones are about reassurance—not full protection", "url": "https://phys.org/news/2026-06-sharkspotting-drones-reassurance-full.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sharks são um grande preocupação para muitos moradores de Sydney e da costa do Novo Sul da Wales. Em janeiro, uma adolescente faleceu durante uma série de ataques no entorno de Sydney. Este mês, uma mulher foi atacada por um grande tubarão-branco enquanto nadava perto da praia de Coogee Beach.", "titulo_pt": "Vôos de drones para avistar tubarões são mais sobre alívio do que proteção completa", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28841, "titulo": "STAT+: AI company Anthropic announces it will begin developing drugs of its own", "url": "https://www.statnews.com/2026/06/30/anthropic-ai-drug-development/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-30T22:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa de inteligência artificial Anthropic anunciou que começará a desenvolver medicamentos próprios. A companhia já é uma potente figura no setor tecnológico e conhecida por usuários comuns de IA.", "titulo_pt": "Empresa de IA Anthropic anuncia desenvolvimento próprio de medicamentos", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 28300, "titulo": "Em manobra inédita, Nasa planeja capturar e empurrar telescópio espacial em queda", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/06/em-manobra-inedita-nasa-planeja-capturar-e-empurrar-telescopio-espacial-em-queda.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-30T22:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um telescópio espacial da Nasa está prestes a cair e será capturado para ser empurrado de volta ao espaço. A agência planeja uma manobra inédita para evitar que o equipamento caia na atmosfera terrestre.", "titulo_pt": "Em manobra inédita, NASA planeja capturar e empurrar telescópio espacial em queda", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 28818, "titulo": "Loss of DNA protector gene exposes vulnerabilities in cancerous cells", "url": "https://phys.org/news/2026-06-loss-dna-protector-gene-exposes.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T22:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O gene que protege o DNA é perdido, expõe vulnerabilidades nas células cancerosas. Cientistas estudam como as células identificam e reparam danos no DNA, bem como os resultados quando esse processo falha ou genes-chave são mutados.", "titulo_pt": "Perda do gene protetor de DNA expõe vulnerabilidades em células cancerosas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28819, "titulo": "Quantum computer simulates hadronization, reproducing string breaking with 104 qubits", "url": "https://phys.org/news/2026-06-quantum-simulates-hadronization-qubits.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T22:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um cientista de pesquisa do Lawrence Berkeley National Laboratory acessou remotamente uma computação quântica da IBM para simular um processo crucial na física de
