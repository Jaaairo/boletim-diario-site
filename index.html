<script>
const D = {"gerado_em": "25/06/2026 01:01", "stats": {"noticias_novas": 1223, "resumos_gerados": 302}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O Supremo Tribunal Federal (STF) manteve o ônus da prova com a acusação em processos e submeteu os partidos políticos à Lei de Improbidade Administrativa. O tribunal está analisando cada dispositivo questionado minuciosamente. Em outra decisão relevante, o STF pode dificultar o ressarcimento das vítimas do INSS que foram alvo da fraude dos descontos associativos. A corte pode utilizar a mesma estratégia jurídica aplicada aos poupadores dos planos econômicos caso decida agir nesse sentido. Fernando Haddad afirmou que tomará a decisão sobre seu candidato a vice-governador até esta quinta-feira na disputa pela governadoria de São Paulo. As opções consideradas são Marina Silva (Rede), Simone Tebet (PSB) e Márcio França (PSB). Michelle Bolsonaro criticou nas redes sociais a tentativa do PL de apoiar Ciro Gomes no Ceará, afirmando que seu enteado, Flávio Bolsonaro, a 'maltratou' e que está sendo tratada como 'idiota'. Ela busca influenciar a decisão do partido no estado.", "mundo": "Dois terremotos poderosos, com magnitudes de 7,2 e 7,5, abalaram o norte da Venezuela, atingindo a capital Caracas. Os tremores causaram grande pânico na cidade, levando os moradores às ruas enquanto prédios tremiam e alguns colapsavam. Voluntários, médicos e familiares das vítimas correram para a área de Altamira, em Caracas, na esperança de ajudar a salvar sobreviventes dos escombros de edifícios destruídos. Vídeos nas redes sociais mostram dezenas de prédios destruídos na capital venezuelana. Delcy Rodríguez, presidente da Venezuela, declarou estado de emergência no país e pediu calma e unidade à população, afirmando que a situação é grave. Até o momento, não há dados oficiais sobre possíveis vítimas.\n\nDois terremotos, com magnitudes de 7,2 e 7,5, atingiram a Venezuela, causando danos significativos na região de Moron. Edifícios desabaram e o pânico tomou conta das ruas, com pessoas correndo para se protegerem. O evento ocorreu após um tremor de magnitude 6,9 atingir o Japão, evidenciando a instabilidade geológica global. Paralelamente, as tensões entre os Estados Unidos e o Irã continuam a aumentar. Trump pediu ao Congresso US$87,6 bilhões em financiamento suplementar para cobrir os custos da guerra, intensificando o debate sobre os poderes de guerra presidenciais. A visita do primeiro-ministro holandês e líder da OTAN, Mark Rutte, a Washington busca gerenciar as tensões entre Trump e os aliados da organização.  Enquanto isso, a invasão russa à Ucrânia reacendeu o debate sobre o crime de agressão, com um tribunal especial criado para lidar com este tema, mas enfrentando obstáculos políticos. A Coreia do Norte reiterou sua alegação de que os Estados Unidos iniciaram a Guerra da Coreia sob um 'roteiro bem elaborado'. O país também afirmou que o ataque americano foi uma violação da soberania coreana e uma agressão premeditada.", "economia": "O Brasil formalizou sua intenção de emitir títulos de dívida em yuan chinês no mercado local, um movimento que demonstra o aceno do país à China e a outros membros do BRICS. A medida foi anunciada por meio de uma carta do ministro da Fazenda brasileiro ao presidente do Banco Popular da China. Paralelamente, empresas chinesas estão se preparando para abrir capital na Bolsa de Valores de Shenzhen. O braço de energia renovável de um conglomerado estatal chinês pretende levantar US$ 3,6 bilhões em um dos maiores IPOs da China continental em mais de quatro anos.  Nesse contexto global, o mercado brasileiro também está em movimento. A empresa chinesa Lingyi iTech precificou seu IPO em Hong Kong a R$ 6,73 por ação, visando levantar cerca de R$ 5,4 bilhões para expandir sua capacidade de inteligência artificial. No Brasil, a General Motors anunciou um novo investimento de R$ 3,5 bilhões em suas operações no país, elevando o total previsto para o período de 2024 a 2028 para R$ 10,5 bilhões. A empresa também criticou o benefício de cotas que favorece a BYD. O mercado de trabalho formal brasileiro cresceu 3,6% em um ano, atingindo 62,2 milhões de vínculos ativos em fevereiro de 2026. O aumento foi principalmente devido ao crescimento no número de servidores públicos, que superou a expansão dos empregos com carteira assinada.", "tecnologia": "A corrida armamentista de inteligência artificial entre China e EUA causa preocupação a pesquisadores dos dois países, que temem um evento catastrófico, semelhante ao desastre de Chernobyl. Paralelamente, a ONU anunciou a adoção das primeiras regras globais para veículos autônomos após anos de debate sobre segurança e custo de desenvolvimento. Em outro fórum, o premiê chinês Li Qiang alertou que os governos precisam acompanhar o ritmo do progresso tecnológico para evitar consequências graves, pedindo regulamentação da inteligência artificial. A compra da startup Modular pela Qualcomm por quase US$ 4 bilhões demonstra a crescente importância do software de IA e seus impactos no mercado de chips.  A Anthropic acusa a Alibaba de realizar o maior ataque de 'distilação' conhecido até hoje contra a empresa, buscando ilegalmente extrair as capacidades de inteligência artificial da Anthropic. A disputa entre empresas de IA americanas e chinesas se intensifica, com acusações mútuas e um debate acalorado sobre propriedade intelectual.", "ciencia": "A construção do International Thermonuclear Experimental Reactor (ITER), um dispositivo magnético de fusão nuclear massivo localizado na França, é um dos projetos científicos mais ambiciosos e caros da história. Trinta e cinco países trabalham em conjunto para comprovar a viabilidade da fusão nuclear como uma fonte de energia em grande escala e livre de carbono.  Em outras notícias científicas, um novo estudo publicado na revista Nature utiliza inteligência artificial para identificar pessoas com alto risco de morte súbita cardíaca e apontar uma possível causa. A pesquisa analisa dados para determinar fatores de risco e padrões que podem contribuir para o evento.  Cientistas descobriram um escorpião pré-histórico que foi o maior já encontrado, podendo ter caçado espécies terrestres e aquáticas. A descoberta, feita por pesquisadores, data de 415 milhões de anos atrás. Um rover em Marte encontrou moléculas de carbono orgânico em um rochedo.  Essas moléculas podem ter origem em vida ou em processos químicos comuns. Somente amostras trazidas para a Terra poderão confirmar sua origem.", "cultura": "O lançamento do musical 'Sinatra' no West End, após temporadas em Birmingham, marca um momento importante na cultura. A história se concentra nos anos 40 e início dos anos 50, período considerado o auge da carreira do cantor, com Joel Harper-Jackson interpretando Sinatra com energia e estilo. Paralelamente, a Netflix está integrando celulares como segunda tela no novo jogo 'Unhinged', reconhecendo que os usuários frequentemente usam seus celulares enquanto assistem aos conteúdos. O lançamento aconteceu em 24 de junho de 2026.  A Academia de Artes e Ciências Cinematográficas convidou 529 profissionais para integrar o grupo de membros em 2026, incluindo Marcelo Caetano e Adolpho Veloso, que poderão votar nas futuras edições do Oscar.  A Mostra de Cinema de Ouro Preto está realizando um tributo à cineasta brasileira Helena Solberg, destacando seu trabalho como a primeira cineasta a abordar o feminismo como tema central em uma produção brasileira. A banda punk californiana Redd Kross, inspiração para grupos como Sonic Youth e Sebadoh, se apresenta em São Paulo.  A banda fez parte da cena americana de rock alternativo dos anos 1980 e 1990, dividindo palco com artistas como os Ramones e tendo o mesmo empresário do Nirvana. O livro 'Sicko', reúne centenas de sacos do vômito de companhias aéreas. O autor, Trevor Cunning, começou seu projeto em 2023 e se tornou entusiasta da beleza dos designs dos sacos.  O livro explora histórias sobre os sacos, como um relato de uma viagem infernal de Delhi após passageiros beberem água insalubre.", "sociedade": "A situação das pessoas que vivem nas ruas no Chile é tema de um artigo publicado pela La Tercera. O texto discute as dificuldades enfrentadas por esse grupo, como a falta de moradia e acesso a serviços básicos, além das iniciativas do governo para auxiliá-las. Em outro caso, a ex-deputada brasileira Grazielle Machado faleceu após complicações decorrentes de uma refeição, com suspeita de infecção por Salmonella, conforme noticiado pelo Metropoles. A CNN Brasil informou sobre um gatilho clandestino em São Paulo onde 141 animais foram resgatados, incluindo gatos e cães spitz alemão desidratados e presos. O jornal também divulgou que uma cena do ator Tony Ramos na novela 'Quem Ama Cuida' gerou reações negativas nas redes sociais por ser considerada homofóbica por alguns espectadores. A Thelminha teve um aumento nas buscas após o fim de um processo judicial contra o empresário Rodrigo Branco, acusado de racismo. O caso envolveu comentários feitos por Branco durante a edição 20 do programa Big Brother Brasil.", "meio_ambiente": "Dois terremotos de grande magnitude atingiram a Venezuela, causando danos significativos em Caracas e outras áreas do norte do país. Autoridades locais alertam para possíveis vítimas fatais, com pessoas presas sob escombros. Vídeos mostram o caos no aeroporto de Maiquetía, interrupções de energia elétrica, edifícios danificados e moradores nas ruas após os tremores. A capital venezuelana foi fortemente atingida, com o colapso de alguns edifícios e um alerta de tsunami emitido pelas autoridades. O governo venezuelano pediu calma à população e ativou o protocolo de emergência para lidar com a crise. A extensão total dos danos ainda não está conhecida, mas o evento representa uma grave situação para a região.", "direitos_humanos": "Um relatório da ONU acusa unidades das forças de segurança israelenses de serem responsáveis por mortes de crianças palestinas durante o conflito. O relatório, publicado na terça-feira, foi condenado por Israel como 'difamatório'. A Comissão Internacional de Investigação da ONU afirma que a ação israelense configura um genocídio em Gaza, já que visaria diretamente as crianças, impedindo o futuro do povo palestino. Paralelamente, no Sudão, o grupo paramilitar Rapid Support Forces (RSF) é acusado pela ONU de usar estupro e escravidão sexual como armas de guerra desde 2023. Esses crimes podem constituir crimes contra a humanidade, segundo o relatório da OHCHR.  Em outros casos, uma mulher francesa foi resgatada no Paquistão após ser mantida refém pelo marido por mais de uma década. A polícia paquistanesa interveio e libertou Sylvie Yasmina, 54 anos, e seus cinco filhos. Ela havia sido submetida a anos de abuso doméstico na cidade de Bara, perto da fronteira com o Afeganistão. Em Hong Kong, 29 pessoas foram presas por participarem de uma organização criminosa envolvida com empréstimos usurais e lavagem de dinheiro. O grupo se passava por empresas financeiras licenciadas, oferecendo empréstimos a taxas de juros anuais de até 3000%. A polícia afirmou que o grupo estabeleceu um centro de chamadas secreto em Tsuen Wan e obteve informações pessoais das vítimas."}, "resumo_do_dia": {"politica_nacional": [{"id": 15386, "titulo": "A pressão política do Digimais", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/adriana-fernandes/2026/06/a-pressao-politica-do-digimais.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Daniel Vorcaro está tentando impedir a desliquidação do Master. O Banco Central enfrenta dificuldades para decretar uma liquidação extrajudicial do Digimais devido à pressão política.", "titulo_pt": "A pressão política sobre o Digimais", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 15364, "titulo": "Haddad diz que escolherá entre Marina, Tebet e França para vice em SP até esta quinta", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/haddad-diz-que-escolhera-entre-marina-tebet-e-franca-para-vice-em-sp-ate-esta-quinta.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-25T00:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Fernando Haddad afirmou que decidirá até esta quinta-feira (25) quem será seu candidato a vice-governador na disputa por São Paulo.  As opções consideradas são Marina Silva (Rede), Simone Tebet (PSB) e Márcio França (PSB), todos ex-auxiliares do presidente Lula.", "titulo_pt": "Haddad define até quinta para escolher vice em SP", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 15604, "titulo": "Michelle abre guerra nas redes contra Flávio Bolsonaro e tenta influenciar decisão do PL no Ceará: 'Me tratam como idiota'", "url": "https://www.bbc.com/portuguese/articles/c5yz8nd6538o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-24T22:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Michelle Bolsonaro criticou nas redes sociais a tentativa do PL de apoiar Ciro Gomes no Ceará. Ela afirmou que seu enteado, Flávio Bolsonaro, a 'maltratou' e que está sendo tratada como 'idiota'. Michelle busca influenciar a decisão do partido no estado.", "titulo_pt": "Michelle ataca Flávio Bolsonaro nas redes e tenta influenciar decisão do PL no Ceará: 'Me tratam como idiota'", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 15427, "titulo": "‘Traidores da Pátria’: Itamaraty reage ao pedido de Flávio de participar de reunião nos EUA sobre tarifas", "url": "https://www.cartacapital.com.br/politica/traidores-da-patria-itamaraty-reage-ao-pedido-de-flavio-de-participar-de-reuniao-nos-eua-sobre-tarifas/", "fonte_id": "cartacapital", "data_pub": "2026-06-24T22:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério das Relações Exteriores brasileiro criticou o pedido do deputado federal Flávio Bolsonaro para participar de uma reunião nos Estados Unidos sobre tarifas. O Itamaraty exigiu um pedido de desculpas por parte de Flávio devido às tarifas e aos prejuízos causados.", "titulo_pt": "'Traidores da Pátria': Itamaraty reage ao pedido de Flávio para participar de reunião nos EUA sobre tarifas", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 15443, "titulo": "Após Flávio pedir para participar de audiência sobre tarifas dos EUA contra Brasil, Itamaraty diz que 'traidores da pátria' devem pedido de desculpa", "url": "https://g1.globo.com/politica/noticia/2026/06/24/itamaraty-tarifas-estaods-unidos-traidores-patria.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-24T21:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério das Relações Exteriores afirmou que 'traidores da pátria' devem pedir desculpas pelas tarifas impostas pelos Estados Unidos ao Brasil. O gabinete do senador Flávio Bolsonaro informou ter solicitado participação em uma audiência sobre o assunto no dia 6 de julho.", "titulo_pt": "Após Flávio pedir para participar de audiência sobre tarifas dos EUA contra Brasil, Itamaraty diz que 'traidores da pátria' devem pedido de desculpa", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 15609, "titulo": "STF mantém ônus da prova com acusação e sujeita partidos à Lei de Improbidade", "url": "https://www.jota.info/stf/do-supremo/stf-mantem-onus-da-prova-com-acusacao-e-sujeita-partidos-a-lei-de-improbidade", "fonte_id": "jota", "data_pub": "2026-06-24T21:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal (STF) manteve o ônus da prova com a acusação em processos.  Além disso, os partidos políticos serão submetidos à Lei de Improbidade Administrativa. O STF está analisando cada dispositivo questionado item por item.", "titulo_pt": "STF mantém ônus da prova com a acusação e sujeita partidos à Lei de Improbidade", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 15399, "titulo": "Edir Macedo diz estar em paz após operação da PF contra banco Digimais", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/edir-macedo-diz-estar-em-paz-apos-operacao-da-pf-contra-banco-digimais.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T21:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O bispo Edir Macedo afirmou estar tranquilo e 'em paz com Deus' durante uma pregação. A declaração ocorreu um dia após a Operação Miragem, realizada pela Polícia Federal para investigar possíveis irregularidades no banco Digimais, controlado por ele.", "titulo_pt": "Edir Macedo diz estar em paz após operação da PF contra banco Digimais", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 15400, "titulo": "Primo de Vorcaro troca defesa e contrata advogado que atuou na Lava Jato", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/primo-de-vorcaro-troca-defesa-e-contrata-advogado-que-atuou-na-lava-jato.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T21:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Felipe Cançado Vorcaro, primo do ex-banqueiro Daniel Vorcaro, contratou o escritório do advogado Alberto Toron para representá-lo no caso Master. Toron atuou na Operação Lava Jato.", "titulo_pt": "Primo de Daniel Vorcaro troca defesa e contrata advogado da Lava Jato", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 15521, "titulo": "Jaques Wagner deixa liderança do governo em \"comum acordo\" com Lula", "url": "https://www.metropoles.com/brasil/jaques-wagner-deixa-lideranca-do-governo-em-comum-acordo-com-lula", "fonte_id": "metropoles", "data_pub": "2026-06-24T20:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Jaques Wagner deixou a liderança do governo federal após um acordo com o presidente Lula. A decisão ocorreu após Wagner ser alvo de uma operação da Polícia Federal sobre suspeitas relacionadas ao caso Master.", "titulo_pt": "Jaques Wagner deixa liderança do governo em acordo com Lula", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 15403, "titulo": "Governo adia envio de projeto que eleva teto do MEI e afirma que texto não está pronto", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/governo-adia-envio-de-projeto-que-eleva-teto-do-mei-e-afirma-que-texto-nao-esta-pronto.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T20:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo Lula decidiu adiar o envio do projeto que eleva o limite de faturamento do MEI para R$ 140 mil. A justificativa é que o texto ainda não está pronto para ser enviado à Câmara dos Deputados.", "titulo_pt": "Governo adiar envio do projeto que aumenta teto do MEI", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 15408, "titulo": "Petrobras estuda duplicar fábricas de fertilizantes para reduzir importações", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/petrobras-estuda-duplicar-fabricas-de-fertilizantes-para-reduzir-importacoes.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T19:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A presidente da Petrobras, Magda Chambriard, afirmou que a estatal está avaliando o aumento da produção de fertilizantes nitrogenados. O objetivo é reduzir a dependência do Brasil em relação a importações.", "titulo_pt": "Petrobras estuda duplicar fábricas de fertilizantes para diminuir importações", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 15610, "titulo": "Bolsonaro diz à polícia que ‘não poderia ficar desarmado’e Moraes pede parecer da PGR", "url": "https://www.jota.info/stf/do-supremo/bolsonaro-diz-a-policia-que-nao-poderia-ficar-desarmadoe-moraes-pede-parecer-da-pgr", "fonte_id": "jota", "data_pub": "2026-06-24T19:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ex-presidente Jair Bolsonaro afirmou à polícia que não poderia ficar desarmado. O ministro Alexandre de Moraes solicitou um parecer da Procuradoria-Geral da República (PGR) sobre o caso.", "titulo_pt": "Bolsonaro diz à polícia que 'não poderia ficar desarmado' e Moraes pede parecer da PGR", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 15523, "titulo": "Extradição: Gilmar garante prisão de Zambelli em penitenciária do DF", "url": "https://www.metropoles.com/colunas/mirelle-pinheiro/extradicao-gilmar-garante-prisao-de-zambelli-em-penitenciaria-do-df", "fonte_id": "metropoles", "data_pub": "2026-06-24T18:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro Gilmar Mendes enviou à Advocacia-Geral da União (AGU) as garantias exigidas pela Itália para uma possível extradição da ex-deputada Carla Zambelli. A garantia inclui a detenção de Zambelli em uma penitenciária no Distrito Federal.", "titulo_pt": "Extradição: Gilmar garante prisão de Zambelli em penitenciária do DF", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 15612, "titulo": "Anvisa abre consulta ao setor de dispositivos médicos para revisar regras de tecnovigilância", "url": "https://www.jota.info/saude/anvisa-abre-consulta-ao-setor-de-dispositivos-medicos-para-revisar-regras-de-tecnovigilancia", "fonte_id": "jota", "data_pub": "2026-06-24T17:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Agência Nacional de Vigilância Sanitária (Anvisa) iniciou uma consulta pública ao setor de dispositivos médicos. O objetivo é revisar as normas de monitoramento pós-mercado, conhecida como tecnovigilância. Empresas do setor podem enviar sugestões para atualização das regras.", "titulo_pt": "Anvisa abre consulta para revisão das regras de tecnovigilância de dispositivos médicos", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 15613, "titulo": "Julgamento da uberização no STF fica para o segundo semestre", "url": "https://www.jota.info/trabalho/julgamento-da-uberizacao-no-stf-fica-para-o-segundo-semestre", "fonte_id": "jota", "data_pub": "2026-06-24T16:04:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O julgamento sobre a regulamentação de plataformas digitais como Uber e 99 foi adiado pelo ministro Alexandre de Moraes. A decisão ocorreu após uma nova convenção da Organização Internacional do Trabalho (OIT) sobre trabalho em plataformas digitais.", "titulo_pt": "Julgamento da Uberização no STF vai para o segundo semestre", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 15614, "titulo": "Repensando a análise de políticas públicas no Sul Global em tempos de crises", "url": "https://www.jota.info/opiniao-e-analise/colunas/gestao-politica-sociedade/repensando-a-analise-de-politicas-publicas-no-sul-global-em-tempos-de-crises", "fonte_id": "jota", "data_pub": "2026-06-24T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Mudanças contemporâneas estão gerando um estado constante de perturbação.  Essa situação exige uma reavaliação da forma como as políticas públicas são analisadas no Sul Global. O objetivo é adaptar as estratégias às novas realidades e desafios.", "titulo_pt": "Repensando a Análise de Políticas Públicas no Sul Global em Tempos de Crises", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 15683, "titulo": "El terremoto en Venezuela, en vivo | El Gobierno decreta el estado de emergencia mientras evalúa los daños", "url": "https://elpais.com/america/2026-06-24/el-terremoto-en-venezuela-en-vivo.html", "fonte_id": "elpais_america", "data_pub": "2026-06-25T02:20:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Dois terremotos com magnitudes de 7,2 e 7,5 abalaram o norte da Venezuela e atingiram a capital Caracas. Não há dados oficiais sobre possíveis vítimas. Vídeos nas redes sociais mostram dezenas de edifícios destruídos em Caracas.", "titulo_pt": "Terremoto na Venezuela, ao vivo | Governo decreta estado de emergência enquanto avalia os danos", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 15935, "titulo": "By putting a French flag or Eiffel Tower on products, 'Frenchwashing' blurs lines over origin", "url": "https://www.lemonde.fr/en/economy/article/2026/06/25/by-putting-a-french-flag-or-eiffel-tower-on-products-frenchwashing-blurs-lines-over-origin_6754850_19.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-25T02:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo identificou 70 produtos não alimentícios, como acessórios infantis, luminárias e tecidos, que usam símbolos franceses, como a bandeira ou a Torre Eiffel, para sugerir origem no país. A prática pode enganar os consumidores sobre a verdadeira procedência dos produtos.", "titulo_pt": "Com 'frenchwashing', produtos usam símbolos franceses para confundir origem", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 15771, "titulo": "Venezuela Hit by 7.1-Magnitude Earthquake", "url": "https://www.nytimes.com/live/2026/06/24/world/venezuela-earthquake/earthquake-venezuela", "fonte_id": "nyt_world", "data_pub": "2026-06-25T02:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um terremoto de magnitude 7,1 atingiu a Venezuela na tarde de hoje. O epicentro do tremor foi localizado a cerca de 23 quilômetros ao sul da cidade de El Tocuyo. Não há relatos imediatos de danos ou vítimas.", "titulo_pt": "Venezuela atingida por terremoto de magnitude 7,1", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 16067, "titulo": "Delcy Rodriguez: 'Colpiti duramente, dichiaro lo stato di emergenza'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/25/delcy-rodriguez-colpiti-duramente-dichiaro-lo-stato-di-emergenza_32a67b10-0c74-4316-840b-913e2c337ccf.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-25T02:12:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Delcy Rodriguez declarou estado de emergência na Venezuela. Ela pediu calma e unidade, afirmando que a situação é grave.", "titulo_pt": "Delcy Rodriguez: 'Estamos atingidos duramente, declaro estado de emergência'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 15828, "titulo": "Venezuela earthquakes live: state of emergency declared after officials warn of widespread damage and high casualties", "url": "https://www.theguardian.com/world/live/2026/jun/25/venezuela-earthquake-live-updates-quake-aftershocks-terremoto-caracas-latest", "fonte_id": "guardian_world", "data_pub": "2026-06-25T02:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dois terremotos poderosos, com magnitudes de 7.2 e 7.5, causaram pânico em Caracas, levando os moradores às ruas enquanto prédios tremiam e colapsavam. Voluntários, médicos e familiares das vítimas correram para a área de Altamira na capital, na esperança de ajudar a salvar sobreviventes dos escombros de edifícios destruídos.", "titulo_pt": "Terremotos na Venezuela: estado de emergência declarado após autoridades alertarem sobre danos generalizados e altas baixas", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 16208, "titulo": "(LEAD) Senior U.S. diplomat to visit S. Korea, Japan this month: State Dept.", "url": "https://en.yna.co.kr/view/AEN20260625000351315", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T02:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um diplomata sênior dos Estados Unidos responsável pela diplomacia global irá visitar a Coreia do Sul e o Japão neste mês. O anúncio foi feito pelo Departamento de Estado americano. Não foram divulgados detalhes adicionais sobre a visita.", "titulo_pt": "Diplomata sênior dos EUA visitará Coreia do Sul e Japão este mês: Departamento de Estado", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 15708, "titulo": "Reportan nuevo temblor tras el terremoto en Venezuela: un sismo de 6,9 sacudió Japón", "url": "https://www.lanacion.com.ar/el-mundo/reportan-nuevo-temblor-tras-el-terremoto-en-venezuela-un-sismo-de-69-sacudio-japon-nid24062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-25T02:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A agência meteorológica nacional informou que um novo tremor com magnitude 6,9 atingiu o Japão.  O evento ocorreu após o terremoto registrado na Venezuela.", "titulo_pt": "Novo tremor registrado após terremoto na Venezuela: sismo de 6,9 atinge Japão", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 16210, "titulo": "Policy lenders, shipbuilders sign MOU to implement Seoul's U.S. investment initiative", "url": "https://en.yna.co.kr/view/AEN20260625003300320", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T02:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Instituições financeiras públicas da Coreia do Sul e grandes construtoras navais firmaram um memorando de entendimento (MOU) para implementar a iniciativa de investimento nos Estados Unidos de Seul. O objetivo é fortalecer as relações econômicas entre os dois países.", "titulo_pt": "Emprestadores públicos e construtoras navais assinam acordo para implementar a iniciativa de investimento dos EUA de Seul", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 16233, "titulo": "Trump, Republican senator in shouting match over unpopular Iran war", "url": "https://www.koreaherald.com/article/10787865", "fonte_id": "korea_herald", "data_pub": "2026-06-25T01:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente dos EUA, Donald Trump, enfrentou críticas contundentes sobre a guerra no Irã durante uma reunião fechada com outros republicanos. A administração de Trump pediu ao Congresso bilhões de dólares para financiar o conflito após a reunião. O senador republicano Bill Cassidy e Trump tiveram uma discussão acalorada durante a reunião.", "titulo_pt": "Trump e senador republicano entram em discussão sobre guerra no Irã", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 15932, "titulo": "Ukrainian strikes on Russian refineries are triggering shortages and rising discontent", "url": "https://www.lemonde.fr/en/international/article/2026/06/25/ukrainian-strikes-on-russian-refineries-are-triggering-shortages-and-rising-discontent_6754849_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-25T01:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Nos últimos três meses, drones de Kyiv têm atacado refinarias, portos, depósitos e oleodutos russos. Essa ação tem causado efeitos em toda a economia russa, levando à escassez de gasolina nas postos de abastecimento.", "titulo_pt": "Ataques ucranianos a refinarias russas causam escassez e descontentamento crescente", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 16077, "titulo": "Russian opposition leader jailed over anti-war social media posts", "url": "https://www.aljazeera.com/video/newsfeed/2026/6/25/russian-opposition-leader-jailed-over-anti-war-social-media-posts?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-25T01:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um líder da oposição russa foi preso devido a publicações contrárias à guerra nas redes sociais. As autoridades russas alegam que as postagens de Alexei Navalny incitavam ao desrespeito às forças armadas. Navalny já havia sido condenado anteriormente por acusações consideradas políticas.", "titulo_pt": "Líder da oposição russa preso por postagens anti-guerra nas redes sociais", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 16146, "titulo": "Buildings collapse as quakes rock Venezuela, ‘high casualties’ likely", "url": "https://www.japantimes.co.jp/news/2026/06/25/world/venezuela-quake/", "fonte_id": "japan_times", "data_pub": "2026-06-25T01:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um terremoto de magnitude 7,2 atingiu cerca de 160 km a oeste de Caracas.  Pouco depois, um tremor de magnitude 7,5 ocorreu. Os edifícios colapsaram devido aos terremotos e são esperadas muitas vítimas.", "titulo_pt": "Edifícios colapsam enquanto tremores abalam Venezuela, altas baixas prováveis", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 16162, "titulo": "Hong Kong can take the regulatory high road amid US-China AI decoupling", "url": "https://www.scmp.com/opinion/hong-kong-opinion/article/3357959/hong-kong-can-take-regulatory-high-road-amid-us-china-ai-decoupling?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-25T01:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações da empresa chinesa de inteligência artificial Zhipu AI dispararam após o anúncio do lançamento aberto do modelo GLM-5.2. O mercado está reagindo à estratégia de contenção tecnológica dos Estados Unidos, que visa isolar a tecnologia chinesa.", "titulo_pt": "Hong Kong pode seguir o caminho regulamentar durante o descolamento de IA entre EUA e China", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 15465, "titulo": "Terremotos atingem Venezuela e derrubam prédios", "url": "https://www.poder360.com.br/poder-internacional/terremotos-atingem-venezuela-e-derrubam-predios/", "fonte_id": "poder360", "data_pub": "2026-06-25T01:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Dois terremotos, com magnitudes de 7,2 e 7,5, atingiram a Venezuela. Os tremores ocorreram com menos de um minuto de diferença, segundo o Serviço Geológico dos EUA. A forte magnitude causou o desabamento de prédios na região.", "titulo_pt": "Terremotos atingem Venezuela e derrubam prédios", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 16078, "titulo": "Venezuela earthquakes live: Tremors of 7.5 and 7.2 hit near Caracas", "url": "https://www.aljazeera.com/news/liveblog/2026/6/25/venezuela-earthquakes-live-two-powerful-quakes-shake-s-american-country?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-25T01:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um terremoto de magnitude 7,2 atingiu a Venezuela perto da cidade de Moron. Seguiu-se um terremoto ainda mais forte, de magnitude 7,5, na mesma região.", "titulo_pt": "Terremotos na Venezuela: Sismos de 7,5 e 7,2 atingem perto de Caracas", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 16149, "titulo": "Trump asks U.S. Congress for more funds to fight Iran, defying rebuke on war powers", "url": "https://www.japantimes.co.jp/news/2026/06/25/world/politics/trump-more-funds-iran-war/", "fonte_id": "japan_times", "data_pub": "2026-06-25T01:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente americano Donald Trump pediu ao Congresso dos EUA mais fundos para combater o Irã. O pedido inclui US$ 67,15 bilhões para o setor militar, além de cerca de US$ 1 trilhão alocado no ano passado e dos US$ 1,5 trilhão que Trump deseja para o próximo ano.", "titulo_pt": "Trump pede ao Congresso dos EUA mais fundos para combater o Irã, desafiando a reprimenda sobre poderes de guerra", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 15385, "titulo": "Multifranqueados ganham força com estratégias para reduzir riscos e custos", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/multifranqueados-ganham-forca-com-estrategias-para-reduzir-riscos-e-custos.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Carmine Ribeiro, formada em farmácia, sempre quis ser comerciante. Ela cresceu vendo o pai trabalhar em um pequeno comércio de bairro em São Luís (MA).  Ribeiro trabalhou em grandes redes farmacêuticas, mas decidiu empreender no ramo da franquia.", "titulo_pt": "Multifranqueados ganham força com estratégias para reduzir riscos e custos", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 15387, "titulo": "Franquias de sorvetes e açaí se expandem pelo Brasil e miram mercado global", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/franquias-de-sorvetes-e-acai-se-expandem-pelo-brasil-e-miram-mercado-global.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O setor de alimentação teve o maior crescimento em número de operações no primeiro trimestre de 2026, segundo a ABF (Associação Brasileira de Franchising).  Comparado ao mesmo período de 2025, houve um aumento de 22% nos pontos de venda do segmento, superando saúde, beleza e bem-estar (18%) e limpeza e conservação (13,8%).", "titulo_pt": "Franquias de sorvetes e açaí se expandem pelo Brasil e visam mercado global", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 15388, "titulo": "Com juros altos, franquias ampliam opções de crédito para atrair empreendedores", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/com-juros-altos-franquias-ampliam-opcoes-de-credito-para-atrair-empreendedores.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Mesmo com a queda gradual da taxa Selic, os juros praticados no mercado ainda são um obstáculo para quem deseja abrir um negócio.  Franquias estão expandindo as opções de crédito para atrair empreendedores.", "titulo_pt": "Com juros altos, franquias ampliam opções de crédito para atrair empreendedores", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 15389, "titulo": "Crédito consignado do INSS encolhe 40% em dois anos com biometria e endividamento dos idosos", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/credito-consignado-do-inss-encolhe-40-em-dois-anos-com-biometria-e-endividamento-dos-idosos.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A concessão de novos empréstimos consignados a beneficiários do INSS diminuiu 40% nos últimos dois anos. Essa redução se deve à piora da situação financeira dos idosos e ao aumento das restrições para contratação, que tornaram um quarto dos aposentados inelegíveis para esse tipo de crédito.", "titulo_pt": "Crédito consignado do INSS encolhe 40% em dois anos com biometria e endividamento dos idosos", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 15390, "titulo": "Custo de operação reduzido impulsiona franquias de autosserviço; veja opções", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/custo-de-operacao-reduzido-impulsiona-franquias-de-autosservico-veja-opcoes.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Franquias de autosserviço estão ganhando espaço no mercado brasileiro. O baixo investimento inicial e o custo de operação menor, devido à ausência de atendimento presencial, são fatores que contribuem para esse crescimento.", "titulo_pt": "Custo reduzido impulsiona franquias de autosserviço; veja opções", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 15391, "titulo": "Brasil formaliza intenção de vender títulos em yuan em aceno à China e outros países do Brics", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/brasil-formaliza-intencao-de-vender-titulos-em-yuan-em-aceno-a-china-e-outros-paises-do-brics.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T01:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil formalizou a intenção de emitir títulos de dívida em yuan chinês no mercado local. O anúncio foi feito por meio de uma carta entregue pelo ministro da Fazenda, Dario Durigan, ao presidente do Banco Popular da China.", "titulo_pt": "Brasil formaliza intenção de vender títulos em yuan, acenando à China e outros países do Brics", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 16148, "titulo": "Japan’s LNG stocks seen to benefit from Middle East supply risk", "url": "https://www.japantimes.co.jp/business/2026/06/25/markets/japan-lng-stocks-middle-east/", "fonte_id": "japan_times", "data_pub": "2026-06-25T01:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Empresas japonesas são parte essencial de todas as etapas da cadeia de suprimentos de GNL, incluindo contratantes de plantas e fornecedores de turbinas. O Japão pode se beneficiar disso devido ao risco de fornecimento no Oriente Médio.", "titulo_pt": "Estoques de GNL do Japão podem se beneficiar do risco de fornecimento do Oriente Médio", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 16150, "titulo": "Toyota threatens GM’s sales crown as U.S. hybrid demand surges", "url": "https://www.japantimes.co.jp/business/2026/06/25/companies/toyota-gm-hybrid-sales-lead/", "fonte_id": "japan_times", "data_pub": "2026-06-25T01:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Toyota está ultrapassando a General Motors em vendas nos Estados Unidos.  Essa mudança histórica aconteceria no mercado doméstico da fabricante americana.", "titulo_pt": "Toyota ameaça o posto de vendas da GM no mercado americano", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 16218, "titulo": "Finance chief vows all-out efforts to fight inflation", "url": "https://en.yna.co.kr/view/AEN20260625002400320", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T00:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O principal responsável por políticas econômicas do país afirmou, na quinta-feira, que o governo fará todos os esforços possíveis para combater a inflação.  Ele fez esse pronunciamento em Seul.", "titulo_pt": "Chefe da Finanças Promete Esforços Incondicionais para Combater Inflação", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 16220, "titulo": "(LEAD) Seoul shares start sharply higher on tech gains led by Micron's strong earnings", "url": "https://en.yna.co.kr/view/AEN20260625001451320", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T00:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações sul-coreanas abriram com forte alta na quinta-feira. O aumento foi impulsionado pelo setor de tecnologia, liderado pelos bons resultados financeiros da Micron.", "titulo_pt": "Ações de Seul abrem com forte alta impulsionadas por ganhos no setor de tecnologia, liderados pelos resultados positivos da Micron", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 16223, "titulo": "Number of stock accounts hits record high on bull run", "url": "https://en.yna.co.kr/view/AEN20260625001800320", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T00:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O número de contas de negociação de ações na Coreia do Sul atingiu um novo recorde durante uma fase de alta no mercado.  Segundo a Yonhap News Agency, o número aumentou devido ao aumento da participação de investidores individuais.", "titulo_pt": "Número de contas de ações atinge recorde em alta do mercado", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 16224, "titulo": "(URGENT) Seoul shares open 2.74 higher on tech gains driven by Micron's strong earnings", "url": "https://en.yna.co.kr/view/AEN20260625001200320", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T00:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O mercado acionário de Seul abriu com alta de 2,74%, impulsionado por ganhos no setor tecnológico. A forte performance da Micron, empresa americana de semicondutores, contribuiu para o aumento das ações.", "titulo_pt": "Ações de Seul abrem 2,74% mais altas impulsionadas por ganhos tecnológicos impulsionados pelos lucros fortes da Micron", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 15392, "titulo": "Rede cresce com pizzas de filé com gorgonzola e coração de frango e projeta faturar R$ 120 milhões", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/06/rede-cresce-com-pizzas-de-file-com-gorgonzola-e-coracao-de-frango-e-projeta-faturar-r-120-milhoes.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T00:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A rede de pizzarias Di Blasi atingiu 50 unidades em 16 estados em 2026. O crescimento da rede se deve à oferta de pizzas que atendem aos paladares regionais do Brasil. A empresa projeta uma receita de R$ 120 milhões.", "titulo_pt": "Rede cresce com pizzas de filé com gorgonzola e coração de frango e projeta faturar R$ 120 milhões", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 16036, "titulo": "US banks would lose $700bn in economic crash, Fed stress tests find", "url": "https://www.ft.com/content/7f33dfda-bc49-4645-8e71-422ba7cc4d17", "fonte_id": "financial_times", "data_pub": "2026-06-24T23:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Testes de estresse realizados pelo Federal Reserve (Fed) indicaram que bancos da Wall Street perderiam US$ 700 bilhões em um cenário econômico de crise. Diversos bancos de Wall Street aumentaram os pagamentos aos investidores após receberem boas notas nos testes do Fed.", "titulo_pt": "Bancos dos EUA perderiam US$ 700 bilhões em uma crise econômica, apontam testes de estresse do Fed", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 15394, "titulo": "BTG Pactual não descarta compra do banco Digimais, alvo de operação da PF", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/btg-pactual-nao-descarta-compra-do-banco-digimais-alvo-de-operacao-da-pf.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T23:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O BTG Pactual afirmou que ainda considera a compra do banco Digimais. As instituições firmaram um acordo de intenção de compra em abril deste ano. A Polícia Federal realizou uma operação contra o Digimais, banco do bispo Edir Macedo.", "titulo_pt": "BTG Pactual não descarta compra do banco Digimais, alvo de operação da PF", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 15412, "titulo": "Dólar sobe a R$ 5,20 e volta a atingir maior valor em três meses", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/dolar-sobe-r-520-e-volta-atingir-maior-valor-em-tres-meses", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-24T22:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O dólar subiu nesta quarta-feira (24) e atingiu o valor mais alto em quase três meses. A bolsa de valores também teve queda, com destaque para as ações de petroleiras e mineradoras. O movimento foi influenciado pela expectativa de juros mais altos nos Estados Unidos e pela queda do preço do petróleo.", "titulo_pt": "Dólar sobe a R$ 5,20 e volta a atingir maior valor em três meses", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 16212, "titulo": "Privacy watchdog fines Bithumb 210 mln won for violating overseas data transfer rules", "url": "https://en.yna.co.kr/view/AEN20260625003400315", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T01:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A agência reguladora de privacidade da Coreia do Sul anunciou que multou a Bithumb em 210 milhões de won por violar as regras de transferência de dados para o exterior. A multa foi aplicada após uma investigação que revelou irregularidades na forma como a empresa lidava com os dados dos usuários. O órgão regulador não divulgou detalhes adicionais sobre as violações.", "titulo_pt": "Órgão regulador da privacidade multa a Bithumb com 210 milhões de won por violação de regras de transferência de dados para o exterior", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 16147, "titulo": "First global rules adopted for self-driving cars, U.N. says", "url": "https://www.japantimes.co.jp/business/2026/06/25/tech/self-driving-cars-global-rules/", "fonte_id": "japan_times", "data_pub": "2026-06-25T01:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A ONU anunciou a adoção das primeiras regras globais para veículos autônomos.  As preocupações com segurança e o custo de desenvolvimento de sistemas avançados foram fatores que atrasaram o progresso nesse setor.", "titulo_pt": "Primeiras regras globais adotadas para carros autônomos, diz ONU", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 16247, "titulo": "Anthropic accuses Alibaba of largest distillation attack on Claude, escalating the US-China AI fight", "url": "https://www.digitimes.com/news/a20260625VL203/anthropic-alibaba-claude-bloomberg.html", "fonte_id": "digitimes", "data_pub": "2026-06-25T01:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Anthropic alega que a Alibaba 'ilegalmente' coletou dados do seu modelo Claude. Esse caso marca o maior suposto exemplo de uma empresa chinesa copiando um laboratório de IA americano. A acusação aumenta o debate sobre propriedade intelectual de IA nos EUA, mesmo com Anthropic se envolvendo em conflitos com a Casa Branca sobre limites de exportação.", "titulo_pt": "Anthropic acusa Alibaba de maior ataque de destilação contra o Claude, intensificando a disputa de IA entre EUA e China", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 16307, "titulo": "The Skylight Calendar Is One of My Favorite Products On Sale for Prime Day", "url": "https://www.wired.com/story/skylight-calendar-prime-day-deal-2026/", "fonte_id": "wired", "data_pub": "2026-06-25T00:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os calendários digitais Skylight 2 e Calendar Max estão em promoção durante o Dia Prime.  A promoção é para quem deseja gerenciar a agenda familiar com um calendário digital.", "titulo_pt": "O Calendário Skylight é um dos Meus Produtos Favoritos em Promoção no Dia Prime", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 16221, "titulo": "KRX issues buy-side sidecar for KOSPI on sharp rise", "url": "https://en.yna.co.kr/view/AEN20260625001600320", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T00:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A operadora da bolsa de valores da Coreia do Sul, KRX, ativou um mecanismo de compra (sidecar) para o índice KOSPI nesta quinta-feira. A medida foi tomada em resposta a uma forte alta no mercado.", "titulo_pt": "KRX cria mecanismo para compras na KOSPI após forte alta", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 16222, "titulo": "(URGENT) Bourse operator issues buy-side sidecar on KOSPI's sharp rise.", "url": "https://en.yna.co.kr/view/AEN20260625001500320", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T00:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O operador da Bolsa de Valores de Seul emitiu um alerta para o lado comprador devido à forte alta do índice KOSPI. O aviso foi dado em resposta ao aumento significativo dos preços das ações no mercado.", "titulo_pt": "Operador da Bolsa emite alerta sobre forte alta do KOSPI", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 16308, "titulo": "Best Prime Day Deals on LED Masks and Hair Growth Tools That Actually Work", "url": "https://www.wired.com/story/best-led-devices-prime-day-deals-2026/", "fonte_id": "wired", "data_pub": "2026-06-24T22:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A lista destaca as melhores ofertas do Dia dos Primeiros na Wired para dispositivos de terapia de luz vermelha.  Os produtos incluem máscaras LED para cuidados com a pele e ferramentas para restauração capilar. A Wired recomenda esses dispositivos como eficazes.", "titulo_pt": "Melhores ofertas do Prime Day para máscaras LED e ferramentas de crescimento capilar que realmente funcionam", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 16309, "titulo": "How to Opt Out of Google Search’s New AI Data Training Feature", "url": "https://www.wired.com/story/how-to-opt-out-of-google-search-new-ai-data-training/", "fonte_id": "wired", "data_pub": "2026-06-24T22:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A atualização do histórico de pesquisa do Google armazena uploads de mídia de suas interações, como imagens usadas em pesquisas por imagem reversa, para treinar seus modelos de IA. Os usuários podem optar por não participar desse programa.", "titulo_pt": "Como sair do novo recurso de treinamento de dados de IA do Google Search", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 16028, "titulo": "Micron posts 15-fold profit surge as AI companies clamour for chips", "url": "https://www.ft.com/content/9b739203-3274-43f1-b61e-c1905061d32a", "fonte_id": "financial_times", "data_pub": "2026-06-24T22:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Micron Technology anunciou um aumento de 15 vezes no lucro. A empresa prevê uma demanda contínua por memória de computador, impulsionada pela procura de empresas de inteligência artificial por chips.", "titulo_pt": "Micron registra aumento de lucro 15 vezes maior enquanto empresas de IA disputam por chips", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 15395, "titulo": "Qualcomm irá adquirir startup Modular por US$ 4 bi para impulsionar software de IA", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://aovivo.folha.uol.com.br/mercado/2026/06/01/6449-dolar-empresas-e-bolsas-acompanhe-ao-vivo-o-mercado.shtml#post457271", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T22:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Qualcomm anunciou a compra da startup de inteligência artificial Modular em uma operação totalmente em ações avaliada em cerca de US$ 3,92 bilhões. A aquisição dará à Qualcomm acesso a um software capaz de executar modelos de IA em diferentes chips sem exigir código específico para cada processador.", "titulo_pt": "Qualcomm comprará startup Modular por US$ 4 bilhões para impulsionar software de IA", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 16029, "titulo": "Anthropic accuses Alibaba of obtaining ‘illicit’ access to Claude", "url": "https://www.ft.com/content/8496c940-fdc7-4554-bc8d-7bcc93e7d75c", "fonte_id": "financial_times", "data_pub": "2026-06-24T21:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa de inteligência artificial Anthropic alega que o gigante do comércio eletrônico chinês Alibaba usou contas falsas para 'extrair' as capacidades do chatbot Claude. A Anthropic afirma que essa ação foi ilegal e está investigando o incidente.", "titulo_pt": "Anthropic acusa Alibaba de acesso 'ilícito' ao Claude", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 16310, "titulo": "Up to $400 Off: The Smart Fridge That Haunts My Algorithm", "url": "https://www.wired.com/story/rocco-sale-june-amazon-prime-day-2026/", "fonte_id": "wired", "data_pub": "2026-06-24T21:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A geladeira Rocco está com desconto até 5 de julho, com até R$ 400 de economia. O aparelho pode rastrear bebidas e dar um toque moderno a qualquer ambiente.  A geladeira não está disponível na Amazon.", "titulo_pt": "Até R$ 400 de Desconto: A Geladeira Inteligente Que Assombra Meu Algoritmo", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 16007, "titulo": "Anthropic accuses Alibaba of campaign to 'brazenly' and 'illicitly' extract AI capabilities", "url": "https://www.cnbc.com/2026/06/24/anthropic-alibaba-distillation-campaign.html", "fonte_id": "cnbc_international", "data_pub": "2026-06-24T21:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Anthropic alega que a Alibaba realizou o maior ataque de 'distilação' conhecido até hoje contra a empresa.  A carta obtida pela CNBC afirma que a Alibaba tentou extrair ilegalmente as capacidades de inteligência artificial da Anthropic.", "titulo_pt": "Anthropic acusa Alibaba de campanha para 'descaradamente' e 'ilegalmente' extrair capacidades de IA", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 16311, "titulo": "The Best Roborock Deal This Prime Day (2026)", "url": "https://www.wired.com/story/amazon-prime-day-roborock-deals-2026/", "fonte_id": "wired", "data_pub": "2026-06-24T21:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A compra de modelos da Roborock pode ser complicada.  O Wired recomenda adquirir apenas um modelo durante a Prime Day. O artigo não especifica qual modelo é recomendado.", "titulo_pt": "Melhor Oferta da Roborock na Prime Day (2026)", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 16312, "titulo": "A24 Knows You’re Mad About the Google AI Collab", "url": "https://www.wired.com/story/a24-knows-youre-mad-about-the-google-ai-collab/", "fonte_id": "wired", "data_pub": "2026-06-24T21:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Fãs de filmes independentes estão irritados com o investimento de US$ 75 milhões da DeepMind, do Google, no estúdio A24. Essa ação ocorre enquanto empresas de inteligência artificial aumentam sua influência em Hollywood.", "titulo_pt": "A24 Sabe que Você Está Indignado com a Colaboração com a Inteligência Artificial do Google", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 16314, "titulo": "Best Red-Light Therapy Mask: WIRED's Top 5, Ranked (2026)", "url": "https://www.wired.com/story/led-face-masks-and-red-light-therapy/", "fonte_id": "wired", "data_pub": "2026-06-24T20:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A revista Wired publicou uma lista com os 5 melhores modelos de máscaras de terapia de luz vermelha disponíveis em 2026. A lista foi elaborada por especialistas e considera fatores como eficácia, segurança e preço. O objetivo é ajudar os consumidores a encontrar o produto ideal para suas necessidades.", "titulo_pt": "Melhores Máscaras de Terapia de Luz Vermelha: Top 5 do WIRED (2026)", "veiculo": "Wired", "pais": "EUA", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 16145, "titulo": "Global Ebola risk ‘remains low,’ WHO chief says after France case", "url": "https://www.japantimes.co.jp/news/2026/06/25/world/science-health/global-ebola-risk-low/", "fonte_id": "japan_times", "data_pub": "2026-06-25T02:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A França anunciou seu primeiro caso confirmado de Ebola no território francês: um médico que havia voado de volta do Congo. O chefe da Organização Mundial da Saúde (OMS) afirmou que o risco global de Ebola permanece baixo.", "titulo_pt": "Risco global de Ebola 'permanece baixo', diz chefe da OMS após caso na França", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 16427, "titulo": "NASA’s TESS Mission Reveals the “Puffiest” Planets Ever Found", "url": "https://science.nasa.gov/missions/tess/nasas-tess-mission-reveals-the-puffiest-planets-ever-found/", "fonte_id": "nasa_news", "data_pub": "2026-06-25T01:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA revelou dois novos planetas 'super-puffs', mundos gigantes tão leves que sua densidade é comparável à de algodão doce. Cientistas calculam que esses planetas do tamanho de Júpiter são os 'mais fofos' já encontrados.", "titulo_pt": "Missão TESS da NASA revela os planetas 'mais fofos' já encontrados", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 16151, "titulo": "Magnitude 6.9 quake hits northern Japan", "url": "https://www.japantimes.co.jp/news/2026/06/25/japan/tohoku-strong-earthquake/", "fonte_id": "japan_times", "data_pub": "2026-06-24T23:43:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um terremoto de magnitude 6,9 atingiu o norte do Japão. O tremor foi registrado na cidade de Hashikami, na prefeitura de Aomori. Não houve alerta de tsunami.", "titulo_pt": "Terremoto de magnitude 6,9 atinge norte do Japão", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 16152, "titulo": "More records fall as Europe’s deadly heat wave persists", "url": "https://www.japantimes.co.jp/news/2026/06/25/world/europe-heat-wave-records/", "fonte_id": "japan_times", "data_pub": "2026-06-24T23:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma onda de calor está matando pessoas na Europa e quebrando recordes de temperatura. Um estudo científico publicado nesta semana afirmou que o calor atual foi 'significativamente agravado pela mudança climática induzida pelo homem'.", "titulo_pt": "Mais recordes quebrados enquanto onda de calor mortal na Europa persiste", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 15929, "titulo": "France records its hottest day with relief on the horizon", "url": "https://www.lemonde.fr/en/environment/article/2026/06/25/france-records-its-hottest-day-with-relief-on-the-horizon_6754845_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-24T23:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A França registrou seu dia mais quente em 24 de junho, com uma temperatura média diária de 30°C. Os meteorologistas preveem o fim gradual da onda de calor na parte oeste do país até o final da semana. As altas temperaturas persistirão no restante do país até a terça ou quarta-feira.", "titulo_pt": "França registra dia mais quente com alívio na perspectiva", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 16428, "titulo": "NASA at the Ion: Orion Lessons from Artemis II Shape NASA’s Moon to Mars Path", "url": "https://www.nasa.gov/centers-and-facilities/johnson/nasa-at-the-ion-orion-lessons-from-artemis-ii-shape-nasas-moon-to-mars-path/", "fonte_id": "nasa_news", "data_pub": "2026-06-24T21:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sete semanas após o retorno do módulo espacial Orion com quatro astronautas da primeira viagem tripulada à Lua desde Apollo, a gerente do Veículo Orion da Artemis II, Branelle Rodriguez, refletiu sobre as conquistas da missão. Ela falou no evento Ion, organizado pelo Centro Espacial Johnson da NASA, e explicou como as lições da Artemis II estão moldando o retorno da NASA à superfície lunar e futuras missões a Marte.", "titulo_pt": "NASA no Ion: Lições da Artemis II moldam o caminho da NASA para a Lua e Marte", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 16421, "titulo": "Space Force seeks fresh bidders for satellite-control antennas", "url": "https://spacenews.com/space-force-seeks-fresh-bidders-for-satellite-control-antennas/", "fonte_id": "spacenews", "data_pub": "2026-06-24T21:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Após rescindir um contrato de US$ 1,7 bilhão, a Força Espacial dos EUA vai relançar o processo de licitação para o Sistema de Controle de Antenas Remotas (SCAR). O objetivo é adquirir antenas para controlar satélites militares.", "titulo_pt": "Força Espacial busca novos licitantes para antenas de controle de satélite", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 16429, "titulo": "La NASA compartirá los últimos avances del programa Base Lunar", "url": "https://www.nasa.gov/news-release/la-nasa-compartira-los-ultimos-avances-del-programa-base-lunar/", "fonte_id": "nasa_news", "data_pub": "2026-06-24T21:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O administrador da NASA, Jared Isaacman, fará uma conversa virtual em 30 de junho às 14h30 (horário de Brasília) para apresentar as novidades sobre os planos da agência para construir uma base lunar.  Isaacman discutirá os progressos e próximos passos do programa Base Lunar durante a transmissão.", "titulo_pt": "NASA compartilhará os últimos avanços do programa Base Lunar", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 16430, "titulo": "NASA to Share Latest Moon Base Mission Progress", "url": "https://www.nasa.gov/news-release/nasa-to-share-latest-moon-base-mission-progress/", "fonte_id": "nasa_news", "data_pub": "2026-06-24T21:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O administrador da NASA, Jared Isaacman, fará uma conversa virtual no dia 30 de junho às 14h30 (horário de Brasília) para compartilhar atualizações sobre os planos da agência espacial para construir uma base lunar. Isaacman e Carlos García-Galán, gerente do programa Base Lunar, discutirão o próximo conjunto de prêmios para novas missões de pouso lunar e apresentarão um preview dos próximos eventos.", "titulo_pt": "NASA compartilhará os últimos progressos da missão para a base lunar", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 16422, "titulo": "Shield Space and ClearSpace partner to defend satellites from orbital threats", "url": "https://spacenews.com/shield-space-and-clearspace-partner-to-defend-satellites-from-orbital-threats/", "fonte_id": "spacenews", "data_pub": "2026-06-24T21:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A startup britânica Shield Space vai combinar seu software de operações autônomas de satélite com as capacidades de serviço orbital da ClearSpace. A parceria visa lidar com as crescentes ameaças no espaço.", "titulo_pt": "Shield Space e ClearSpace se unem para defender satélites de ameaças orbitais", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 15404, "titulo": "Gripe aviária amplia presença no mundo e agora chega à Oceania", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/vaivem/2026/06/gripe-aviaria-amplia-presenca-no-mundo-e-agora-chega-a-oceania.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T20:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A gripe aviária, que já havia se espalhado pelo mundo, incluindo o Brasil, agora foi detectada na Austrália. Pelo menos 60 aves mortas ou doentes estão sendo analisadas e três casos foram confirmados. O vírus H5N1 se limita a aves migratórias e não atingiu granjas comerciais no país.", "titulo_pt": "Gripe aviária chega à Oceania", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 16403, "titulo": "STAT+: Eli Lilly dives into hair loss treatments with investment in AI startup Absci", "url": "https://www.statnews.com/2026/06/24/eli-lilly-absci-hair-loss-treatments/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-24T20:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Eli Lilly está investindo na startup Absci, que desenvolve medicamentos para estimular o crescimento do cabelo. O tratamento também tem potencial para ser usado no tratamento da endometriose.", "titulo_pt": "Eli Lilly investe em startup de tratamentos para queda de cabelo", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 16404, "titulo": "STAT+: U.S. health spending rose sharply in 2025, thanks to GLP-1 use and more care", "url": "https://www.statnews.com/2026/06/24/health-care-spending-up-7-point-3-percent-6-trillion-dollars-2026/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-24T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O aumento do acesso a cuidados médicos e o uso extensivo de medicamentos GLP-1 contribuíram para um aumento significativo nas despesas com saúde nos Estados Unidos em 2025.", "titulo_pt": "Despesas com saúde dos EUA aumentam consideravelmente em 2025, impulsionadas pelo uso de medicamentos GLP-1 e mais cuidados", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 16431, "titulo": "Roman Telescope Comes to Kennedy", "url": "https://www.nasa.gov/image-article/roman-telescope-comes-to-kennedy/", "fonte_id": "nasa_news", "data_pub": "2026-06-24T19:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Telescópio Espacial Nancy Grace Roman da NASA chegou ao Centro Espacial Kennedy na Flórida. O telescópio será transportado para a Estação de Manutenção de Carga Perigosa do centro espacial, onde será processado antes do lançamento, previsto para no mínimo 30 de agosto de 2026.", "titulo_pt": "Telescópio Romano Chega ao Centro Espacial Kennedy", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 16423, "titulo": "MDA Space wins contract for Radarsat replenishment satellite", "url": "https://spacenews.com/mda-space-wins-contract-for-radarsat-replenishment-satellite/", "fonte_id": "spacenews", "data_pub": "2026-06-24T19:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A MDA Space construirá um satélite de imagem radar para a Agência Espacial Canadense. O governo canadense está estudando opções para um sistema de satélite de próxima geração.", "titulo_pt": "MDA Space ganha contrato para satélite de reposição do Radarsat", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 16432, "titulo": "NASA’s HiRISE Captures Perseverance Marking a Milestone on Mars", "url": "https://science.nasa.gov/photojournal/nasas-hirise-captures-perseverance-marking-a-milestone-on-mars/", "fonte_id": "nasa_news", "data_pub": "2026-06-24T18:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A sonda espacial Perseverance da NASA foi capturada por uma imagem do HiRISE, aparecendo como um pequeno ponto verde na superfície de Marte em 13 de junho de 2026. O dia anterior, o explorador robótico marcou um marco de distância, tendo percorrido uma maratona completa (42,195 quilômetros) no planeta vermelho. Perseverance alcançou essa distância após cinco anos e quatro meses de condução.", "titulo_pt": "HiRISE da NASA Captura Perseverance Marcando um Milhão no Marte", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 15338, "titulo": "Casa Magnólia tem boa proposta de cardápio e execução ruim", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/restaurantes/2026/06/casa-magnolia-tem-boa-proposta-de-cardapio-e-execucao-ruim.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Casa Magnólia, localizada na Rua Garcia d'Avila, 151, em Ipanema, recebeu uma avaliação de uma estrela (Ruim). O estabelecimento possui um bom cardápio, porém a execução dos pratos é considerada ruim.", "titulo_pt": "Casa Magnólia: Boa proposta no cardápio, mas execução ruim", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 15339, "titulo": "Milly Alcock é heroína rebelde em 'Supergirl', que estreia nos cinemas", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/cinema/2026/06/milly-alcock-e-heroina-rebelde-em-supergirl-que-estreia-nos-cinemas.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O filme 'Supergirl' estreia nos cinemas com Milly Alcock interpretando a personagem-título. Kara Zor-el possui poderes como voo, super força e raios laser nos olhos, mas resiste em usá-los devido ao luto pelo colapso de seu planeta natal.", "titulo_pt": "Milly Alcock é heroína rebelde em 'Supergirl', que estreia nos cinemas", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 15340, "titulo": "Espólio de Whitney Houston rebate Oprah Winfrey após fala sobre queda em palco", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/espolio-de-whitney-houston-rebate-oprah-winfrey-apos-fala-sobre-queda-em-palco.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T00:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O espólio de Whitney Houston emitiu um comunicado refutando a afirmação de Oprah Winfrey de que a cantora estava sob efeito de drogas quando caiu do palco durante uma gravação do programa. Os representantes da artista consideraram a declaração de Oprah imprecisa e injusta. O comunicado foi publicado nas redes sociais oficiais de Whitney Houston.", "titulo_pt": "Espólio de Whitney Houston rebate Oprah Winfrey após fala sobre queda no palco", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 16455, "titulo": "Sinatra: The Musical review – life of a legend brims with hits but never gets under his skin", "url": "https://www.theguardian.com/stage/2026/jun/25/sinatra-the-musical-review-aldwych-theatre-london", "fonte_id": "guardian_culture", "data_pub": "2026-06-24T23:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O musical 'Sinatra' estreou no West End após temporadas em Birmingham. A história se concentra nos anos 40 e início dos anos 50, período considerado o auge da carreira do cantor. O ator Joel Harper-Jackson interpreta Sinatra com energia e estilo.", "titulo_pt": "Sinatra: O Musical - Revisão: Vida de uma Lenda Cheia de Sucessos, Mas Nunca Aproxima-se Dele", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 15842, "titulo": "Trump’s Other Paint Job", "url": "https://www.theatlantic.com/politics/2026/06/trump-reflecting-pool-paint-wall/687685/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-24T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Antes de prejudicar a piscina refletiva, o presidente queria que o muro da fronteira fosse preto.  Essa informação foi divulgada pelo The Atlantic.", "titulo_pt": "A outra pintura de Trump", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 15342, "titulo": "Live-action de 'Avatar' e filme do Iron Maiden: o que ver na TV e no streaming na quinta", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/live-action-de-avatar-e-filme-do-iron-maiden-o-que-ver-na-tv-e-no-streaming-quinta.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-24T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A segunda temporada da adaptação live-action de 'Avatar: O Último Mestre do Ar', série animada da Nickelodeon, está de volta.  O programa estará disponível a partir de 24 de junho às 17h00.", "titulo_pt": "Live-action de 'Avatar' e filme do Iron Maiden: o que ver na TV e no streaming na quinta", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 15343, "titulo": "Academia do Oscar convida Marcelo Caetano e Adolpho Veloso para votar no prêmio", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/academia-do-oscar-convida-marcelo-caetano-e-adolpho-veloso-para-votar-no-premio.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-24T19:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Academia de Artes e Ciências Cinematográficas convidou 529 profissionais para integrar o grupo de membros em 2026.  Os profissionais que aceitarem o convite poderão votar nas futuras edições do Oscar. A lista inclui Marcelo Caetano e Adolpho Veloso.", "titulo_pt": "Academia do Oscar convida Marcelo Caetano e Adolpho Veloso para votar no prêmio", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 15344, "titulo": "Mostra de Cinema de Ouro Preto faz tributo à cineasta pioneira Helena Solberg", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/mostra-de-cinema-de-ouro-preto-faz-tributo-a-cineasta-pioneira-helena-solberg.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-24T19:29:00Z", "idioma": "pt", "provavel_duplicata
