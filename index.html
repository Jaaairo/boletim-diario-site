<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
  /* Jornal do dia — area "Ouca Agora" (fundo escuro, compacta) */
  .podcast-card { background: var(--azul); border-radius: 8px;
                  padding: 12px 16px 14px; margin-bottom: 24px; }
  .podcast-hd { font-weight: 700; font-size: 14px; letter-spacing: .03em;
                text-transform: uppercase; color: #fff; margin-bottom: 8px; }
  /* Player custom (o <audio> nativo nao aceita cor; este mescla com o fundo escuro) */
  .pod-player { display: flex; align-items: center; gap: 12px; }
  .pod-audio { display: none; }
  .pod-btn { flex: none; width: 38px; height: 38px; border-radius: 50%; border: none;
             background: rgba(255,255,255,.14); color: #fff; font-size: 13px; line-height: 1;
             cursor: pointer; transition: background .15s; }
  .pod-btn:hover { background: rgba(255,255,255,.28); }
  .pod-cur, .pod-dur { font-size: 12px; color: rgba(255,255,255,.65);
                       font-variant-numeric: tabular-nums; min-width: 34px; }
  .pod-dur { text-align: right; }
  .pod-track { flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,.18);
               cursor: pointer; overflow: hidden; }
  .pod-fill { height: 100%; width: 0; background: var(--tint); border-radius: 3px; }
  /* Com podcast, o card ja separa visualmente: dispensa a linha abaixo dos numeros */
  .cards.com-podcast { border-bottom: none; padding-bottom: 0; margin-bottom: 20px; }
</style>
</head>

<nav id="nav"></nav>
<main id="main"></main>

</div>

<div class="modal-overlay" id="modal-flag">

</div>

<div class="modal-overlay" id="modal-relatorio">

    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "24/07/2026 16:20", "stats": {"noticias_novas": 750, "resumos_gerados": 245}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "A deputada Lívia Duarte, do PSOL-PA, recebeu nova ameaça de morte e pediu que as autoridades investigassem o caso. Diante das tensões comerciais, o setor produtivo brasileiro está pedindo negociação direta com os Estados Unidos em resposta às novas tarifas que podem chegar a 37,5%. O presidente Lula sancionou uma lei proibindo a venda e produção de foie gras no Brasil. Além disso, o governo liberou R$ 100 bilhões sem aval prévio do Congresso, levantando questionamentos na equipe de Flávio Bolsonaro. A Cemig foi condenada a devolver R$ 37,4 mil a um aposentado e pagar mais R$ 10 mil por danos morais após receber uma conta de luz exorbitante.", "mundo": "Os Estados Unidos aplicaram uma tarifa de 10% sobre Taiwan sob a seção 301 como parte de uma investigação comercial mais ampla. Em outro desenvolvimento, Israel e os Estados Unidos continuam realizando ataques noturnos contra alvos iranianos no Golfo Pérsico, com o Irã ameaçando retaliar. Na União Europeia, Trump ameaça com tarifas e a revogação de multas para empresas americanas. Em Madri, um incêndio está em seu auge, impossível de ser extinto.\n\nA política internacional enfrenta uma série de desafios geopolíticos significativos. Nos últimos dias, o presidente ucraniano Volodymyr Zelensky se reuniu com o ex-presidente dos Estados Unidos Donald Trump em Washington, buscando reativar negociações para pôr fim à guerra com a Rússia que dura quatro anos. Paralelamente, os Estados Unidos e o Reino Unido estão planejando uma conferência internacional no Estreito de Ormuz para formar uma coalizão para proteger o tráfego marítimo, em resposta às tensões com a Irã. Essas iniciativas refletem as crescentes preocupações sobre segurança global e a busca por soluções multilaterais para questões regionais complexas.", "economia": "As tensões comerciais entre os Estados Unidos e a União Europeia continuam dominando o cenário econômico global. O presidente Donald Trump ameaçou aplicar tarifas significativas contra a UE em resposta às multas impostas a gigantes tecnológicos americanos, o que pode afetar as negociações comerciais e potencialmente agravar as tensões entre os dois blocos. No Brasil, o Banco Central manteve sua postura restritiva com juros altos devido ao aumento do preço do petróleo e à economia resiliente. As tarifas de 12,5% impostas pelo governo americano sobre produtos brasileiros também geraram preocupações entre setores econômicos locais, que recomendam cautela em vez de reciprocidade. No mercado financeiro, a bolsa de valores do Brasil opera em baixa influenciada por esses fatores e pela pressão exercida pelos papéis das empresas PETR4 e VALE3.", "tecnologia": "A tecnologia continua influenciando significativamente diversos setores, com destaque para as empresas e inovações chinesas. A gigante de baterias CATL registrou recordes de receita e lucro no segundo trimestre, refletindo o boom do mercado verde. O fundador da Huawei, Ren Zhengfei, apoia a Lei de Escalonamento Tau como uma necessidade para sobreviver às sanções dos EUA. Paralelamente, a empresa está em negociações com empresas tecnológicas americanas durante a visita do presidente Lee Jae Myung ao Vale do Silício, visando fortalecer sua presença no mercado global. Em outro desenvolvimento importante, o Facebook lançou uma aplicação Marketplace dedicada para vendedores frequentes, introduzindo um sistema de verificação gratuita. Estas notícias refletem a crescente importância da tecnologia em diversos aspectos econômicos e sociais.", "ciencia": "A NASA anunciou a chegada de uma nova tripulação à Estação Espacial Internacional, composta por Anna Kikina e Pyotr Dubrov da Roscosmos, e Anil Menon da NASA. O evento ocorreu em 18 de julho de 2026 após um lançamento do Cosmódromo Baikonur. Em seguida, os astronautas começaram a realizar pesquisas científicas abordando vários temas. Entre eles, a identificação de oito motivos comuns nas canções dos pássaros pelo mundo, as descobertas sobre estruturas celulares de gordura que podem desempenhar um papel crucial na defesa contra vírus, e a importância do clima para agricultores. Além disso, cientistas identificaram quatro tipos diferentes de buracos negros classificados por suas massas, enquanto uma sonda chinesa capturou imagens detalhadas do cometa 3I/ATLAS perto de Marte, fornecendo novos insights sobre o objeto interestelar.", "cultura": "A cultura brasileira e internacional esteve em evidência com diversos eventos e lançamentos. O Museu Lucas deu início à exibição do seu primeiro programa cinematográfico, incluindo obras de Busby Berkeley e curtas-metragens inovadores, enquanto a New York Foundation for the Arts (NYFA) concedeu bolsas de artes para 132 artistas residentes em Nova York. O Festival Bonito CineSur promove integração audiovisual sul-americana com diversos filmes sendo exibidos até o próximo sábado. Em Paraty, Arnaldo Antunes realizou uma performance no escuro durante o Festival Literário de Paraty (Flip), reafirmando a identidade da cultura artística brasileira. A ministra do Supremo Tribunal Federal, Cármen Lúcia, foi bem recebida na Feira Literária Internacional de Paraty com gritos de admiração, enquanto a Alemanha nomeou Jürgen Klopp como novo treinador para reafirmar sua identidade como uma equipe protagonista. O artista Kevin Kallaugher, diretor de arte da The Economist que criou mais de duas mil capas icônicas retratando eventos geopolíticos importantes ao longo de três décadas, faleceu aos 65 anos após uma luta contra câncer.", "sociedade": "O governo de São Paulo enviou ajuda humanitária a Ribeirão Preto após um temporal que deixou uma morte e 250 ocorrências. Luisa Mell elogiou a proibição do foie gras no Brasil, medida sancionada pelo presidente Lula. No Chile, Sebastián Ugarte, da Sociedade Chilena de Medicina Crítica e Urgência, alertou sobre a baixa cobertura vacinal contra a gripe entre pessoas com mais de 50 anos, apontando o desapego e excesso de confiança em relação à vacinação após a pandemia. Em um evento controverso, 50 mulheres relataram ter sido forçadas a fazer sexo com estranhos após uma investigação sobre um site de troca de casais, denunciando pressão ou coerção por parte dos parceiros.", "meio_ambiente": "O fenômeno El Niño está atingindo intensidade sem precedentes para julho, aumentando o risco de um evento histórico, segundo alerta da Reuters. Em contexto de clima extremo, incêndios florestais em França e Espanha obrigaram mais de 80 mil pessoas a serem evacuadas, com o governo espanhol declarando emergência nacional, informa a Reuters. A Austrália investe quase quatro vezes mais em setores fósseis do que em energias renováveis, mantendo um investimento anual de cerca de US$ 14,1 bilhões no setor fóssil, conforme relata o The Guardian. Em contraste, a Amazônia registrou o menor nível de desmatamento para o primeiro semestre em oito anos, com uma redução significativa de 76% em relação ao recorde de 2022, informa o The Guardian.", "direitos_humanos": "O Tribunal aceitou o pedido da defesa de Karen Rojo, reduzindo sua pena de 1.463 dias, aproximadamente um ano a menos. Paralelamente, o Brasil sancionou uma lei que proíbe a venda e consumo de foie gras com o objetivo de combater maus-tratos aos animais. Especialistas em direitos humanos alertam sobre os riscos da paralisação do registro de novos refugiados na Malásia, enquanto o governo implementa um sistema biométrico que poderia comprometer a capacidade dos recém-chegados de comprovar sua necessidade de proteção. Além disso, um estudo indica que os assassinatos de mulheres no Brasil são antecedidos por uma escalada de violência, sugerindo negligência ou falta de ação preventiva das instituições. Por fim, o governo dos Estados Unidos confirmou um novo arancel de 12,5% para o Chile em relação ao 'trabalho forçado', além de outras medidas rigorosas para acelerar a saída de migrantes do país."}, "resumo_do_dia": {"politica_nacional": [{"id": 70208, "titulo": "Deputada do PSOL-PA sofre nova ameaça de morte e cobra apuração das autoridades", "url": "https://veja.abril.com.br/politica/deputada-do-psol-pa-sofre-nova-ameaca-de-morte-e-cobra-apuracao-das-autoridades/", "fonte_id": "veja", "data_pub": "2026-07-24T17:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A deputada Lívia Duarte, do PSOL-PA, sofreu mais uma ameaça de morte e acionou a Segurança Pública do estado e o Conselho Nacional de Direitos Humanos para apurar o caso.", "titulo_pt": "Deputada do PSOL-PA enfrenta nova ameaça de morte e cobra investigação", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 70170, "titulo": "'Brasil precisa agir com firmeza': setor produtivo pede negociação e rapidez após nova tarifa de até 37,5%", "url": "https://g1.globo.com/economia/noticia/2026/07/24/brasil-precisa-agir-com-firmeza-setor-produtivo-pede-negociacao-e-rapidez-apos-nova-tarifa-de-ate-375percent.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-24T17:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O setor produtivo brasileiro pede ao governo federal que negocie diretamente com os Estados Unidos após a anúncio de 17:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O vice-presidente Geraldo Alckmin afirmou que as novas tarifas impostas pelo governo Trump são descabidas e não fazem sentido, considerando o avanço das legislações trabalhistas do Brasil.", "titulo_pt": "Alckmin critica tarifa imposta pelo governo trump como descabida", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 70349, "titulo": "O ping-pong da impunidade: quando o STF chama de diálogo o que é fraude ao diálogo", "url": "https://www.jota.info/opiniao-e-analise/artigos/o-ping-pong-da-impunidade-quando-o-stf-chama-de-dialogo-o-que-e-fraude-ao-dialogo", "fonte_id": "jota", "data_pub": "2026-07-24T17:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto critica a decisão do STF (Supremo Tribunal Federal) que absolveu partidos políticos que não cumpriram a reserva de recursos para candidaturas negras, apesar da falha do legislativo em implementar efetivamente essa lei. O título sugere que o STF tratou esse caso como um diálogo, quando na verdade seria uma fraude ao processo democrático.", "titulo_pt": "O ping-pong da impunidade: quando o STF chama de diálogo o que é fraude ao diálogo", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 70350, "titulo": "Zanin autoriza investigação de Buzzi por venda de sentenças", "url": "https://www.jota.info/stf/do-supremo/zanin-autoriza-investigacao-de-buzzi-por-venda-de-sentencas", "fonte_id": "jota", "data_pub": "2026-07-24T17:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro Zanin autorizou uma investigação sobre o ministro Buzzi no STF, relacionada a denúncias de venda de sentenças. Esta é a segunda investigação contra Buzzi no tribunal.", "titulo_pt": "Zanin autoriza investigação de Buzzi por venda de sentenças", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 70214, "titulo": "Centrão vê Michelle com ‘passe mais caro’ e com intenções para emplacar vice", "url": "https://veja.abril.com.br/politica/centrao-ve-michelle-com-passe-mais-caro-e-com-intencoes-para-emplacar-vice/", "fonte_id": "veja", "data_pub": "2026-07-24T17:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Para os partidos do Centrão, o desfecho mostrou a influência de Michelle Bolsonaro no PL e sua potencial atratividade para eleitores estratégicos que podem apoiar Flávio Bolsonaro como vice.", "titulo_pt": "Centrão vê Michelle com 'passe mais caro' e intenções para emplacar vice", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 70219, "titulo": "Pesquisa Quaest testa a disputa Lula x Flávio no maior colégio eleitoral do Brasil", "url": "https://veja.abril.com.br/politica/pesquisa-quaest-testa-a-disputa-lula-x-flavio-no-maior-colegio-eleitoral-do-brasil/", "fonte_id": "veja", "data_pub": "2026-07-24T17:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A pesquisa Quaest testou a disputa entre Lula e Flávio Bolsonaro no estado do Rio de Janeiro, incluindo nomes como Renan Santos, Zema e Caiado em cenários de segundo turno. O levantamento foi realizado no maior colégio eleitoral do país.", "titulo_pt": "Pesquisa Quaest testa disputa Lula x Flávio no rio de janeiro", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 70220, "titulo": "Paz entre Flávio e Michelle vai colocar mais pressão sobre Tarcísio", "url": "https://veja.abril.com.br/politica/paz-entre-flavio-e-michelle-vai-colocar-mais-pressao-sobre-tarcisio/", "fonte_id": "veja", "data_pub": "2026-07-24T16:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governador de São Paulo será pressionado a aumentar sua participação na campanha e a atrair o Republicanos para a aliança. A paz entre Flávio e Michelle Bolsonaro pode aumentar a pressão sobre Tarcísio, que é considerado um importante cabo eleitoral.", "titulo_pt": "Paz de bolsonaro com família vai aumentar pressão sobre Tarcísio", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 70171, "titulo": "Lula quer mais investimentos em Defesa: 'Não deixar ninguém meter o nariz nesse país'", "url": "https://g1.globo.com/politica/noticia/2026/07/24/lula-quer-investimentos-em-defesa-preparados-para-nao-deixar-ninguem-meter-nariz-nesse-pais.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-24T16:47:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Lula defendeu investimentos adicionais no setor de Defesa, enfatizando a importância da soberania nacional. Ele destacou a necessidade de soldados bem treinados e equipados para garantir a segurança do país.", "titulo_pt": "Lula quer mais investimentos em Defesa: 'não deixar ninguém meter o nariz nesse país'", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 70258, "titulo": "PL oficializa Douglas Ruas ao governo do RJ, e Carlos Portinho ao Senado", "url": "https://www.cnnbrasil.com.br/eleicoes/pl-oficializa-douglas-ruas-ao-governo-do-rj-e-carlos-portinho-ao-senado/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-24T16:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O projeto de lei oficializou Douglas Ruas como governador do Rio de Janeiro e Carlos Portinho como senador. A chapa não definiu um vice, mas recebeu apoio da Federação União Progressista.", "titulo_pt": "PL oficializa Douglas Ruas ao governo do RJ e Carlos Portinho ao Senado", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 70141, "titulo": "Votação do fim da escala 6x1 deve ficar para depois das eleições, admite ministro do Trabalho", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/votacao-do-fim-da-escala-6x1-deve-ficar-para-depois-das-eleicoes-admite-ministro-do-trabalho.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-24T16:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro do Trabalho e Emprego, Luiz Marinho, afirmou que a votação da PEC que abroga a escala 6x1 provavelmente não será realizada pelo Congresso antes das eleições.", "titulo_pt": "Votação sobre fim da escala 6x1 deve ficar para depois das eleições, admite ministro", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 70162, "titulo": "Caso de mensagens pró-Bolsonaro no PR ainda não foi julgado, a menos de 3 meses de nova eleição", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/caso-de-mensagens-pro-bolsonaro-no-pr-ainda-nao-foi-julgado-a-menos-de-3-meses-de-nova-eleicao.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-24T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um caso envolvendo mensagens pró-Bolsonaro enviadas a eleitores no Paraná durante a campanha de 2022 ainda não foi julgado, com novas eleições agendadas para o próximo ano.", "titulo_pt": "Caso de mensagens pró-bolsonaro no PR ainda não julgado, a menos de 3 meses de nova eleição", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 70172, "titulo": "Presidente do BC compara cartão de crédito brasileiro a jabuticaba: 'É uma fruta legal, mas tem coisa que você não quer ser o único a ter’", "url": "https://g1.globo.com/economia/noticia/2026/07/24/presidente-do-bc-compara-cartao-de-credito-brasileiro-a-jabuticaba-e-uma-fruta-legal-mas-tem-coisa-que-voce-nao-quer-ser-o-unico-a-ter.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-24T15:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente do Banco Central, Gabriel Galípolo, comparou o sistema brasileiro de cartão de crédito a uma jabuticaba durante uma participação na 'XP Expert' em São Paulo. Ele defendeu a adoção de prazos menores de quitação para evitar maior endividamento.", "titulo_pt": "Presidente do BC compara cartão de crédito brasileiro a jabuticaba", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 70163, "t a.it/sito/notizie/topnews/2026/07/24/spagna-incendio-vicino-a-madrid-al-suo-apice-impossibile-spegnerlo_19745426-ef1f-469f-9779-8360175b0c4c.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-24T17:56:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O incêndio próximo a Madrid está no seu apogeu e é impossível ser extinto. De acordo com um assessor regional, as capacidades dos bombeiros atuais estão superadas.", "titulo_pt": "Espanha, incêndio perto de Madrid em seu auge, impossível de ser extinto", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 70596, "titulo": "Russia hits drone demonstration near Kyiv, killing 10", "url": "https://www.dw.com/en/russia-hits-drone-demonstration-near-kyiv-killing-10/a-78105704?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-24T17:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ucrânia afirma que 10 pessoas foram mortas e cerca de 100 ficaram feridas em um ataque com drones perto de Kyiv. Em St. Petersburgo, outro armazém do Wildberries foi alvo de ataques aéreos não tripulados.", "titulo_pt": "Rússia realiza demonstração de drone perto de Kyiv, deixando 10 mortos", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 70409, "titulo": "El colombiano del Movistar Einer Rubio dice adiós al Tour tras chocar violentamente con un coche en el colapsado ascenso a Alpe d’Huez", "url": "https://elpais.com/deportes/ciclismo/2026-07-24/el-colombiano-del-movistar-einer-rubio-dice-adios-al-tour-de-francia-tras-chocar-con-el-coche-del-uae.html", "fonte_id": "elpais_america", "data_pub": "2026-07-24T17:48:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O ciclista colombiano Einer Rubio, do Movistar, teve um acidente de bicicleta na ascensão ao Alpe d’Huez após o carro do UAE frear violentamente. Apesar de não sofrer lesões graves, ele ficou com vários cortes.", "titulo_pt": "O colombiano Einer Rubio se desliga da Tour após colidir com um carro no Alpe d’huez", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 70478, "titulo": "Iran War Live Updates: Netanyahu Says He Will Meet With Trump, as U.S.-Iran Strikes Continue", "url": "https://www.nytimes.com/live/2026/07/24/world/iran-war-us-strikes-trump-oil", "fonte_id": "nyt_world", "data_pub": "2026-07-24T17:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Netanyahu anunciou que irá se encontrar com Trump, após os Estados Unidos realizarem ataques noturnos contra a Irã pela 13ª noite consecutiva. A Irão reagiu atacando objetivos americanos no Golfo.", "titulo_pt": "Irã e EUA em conflito: netanyahu planeja reunião com Trump", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 70489, "titulo": "Trump’s Destruction of Iranian Life Is Strengthening the Regime", "url": "https://foreignpolicy.com/2026/07/24/trump-iran-water-environment-civilians/", "fonte_id": "foreign_policy", "data_pub": "2026-07-24T17:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações de Trump que atingiram infraestrutura civilian estão fortalecendo o regime iraniano. Essa abordagem é considerada tola e cruel.", "titulo_pt": "Destruição da vida iraniana por trump fortalece o Regime", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 70546, "titulo": "Dems pick South Carolina to lead 2028 primary calendar", "url": "https://www.politico.com/news/2026/07/24/democrats-dnc-2028-calendar-south-carolina-01011481", "fonte_id": "politico", "data_pub": "2026-07-24T17:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Carolina do Sul foi escolhida para ser o estado a realizar a primária inaugural em 2028, superando o Nevada. Este é um grande mudança na programação das primárias dos Estados Unidos.", "titulo_pt": "Democratas escolhem Carolina do sul para liderar calendário de primárias em 2028", "veiculo": "Politico", "pais": "EUA", "classe": "A"}, {"id": 70587, "titulo": "Arrests, denials and missing images: Gulf states’ response to Iranian strikes", "url": "https://www.france24.com/en/middle-east/20260724-iranian-strikes-gulf-states-arrests-denials-satellite-investigation", "fonte_id": "france24", "data_pub": "2026-07-24T17:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Desde o conflito entre Irã e Estados Unidos, iniciado em 28 de fevereiro, mais de mil pessoas foram detidas por tentar documentar os ataques iranianos na Jordânia e nos países do Golfo que são aliados dos EUA. Os governos dessas nações têm buscado impedir a circulação dessas imagens e manter uma narrativa oficial negando que os ataques tenham atingido seus alvos.", "titulo_pt": "Detenções, negações e imagens faltantes: resposta dos países do golfo aos ataques iranianos", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 70649, "titulo": "Trump minaccia l'Ue con dazi, 'la pagherà, revochi multe a società Usa'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/24/trump-minaccia-lue-con-dazi-la-paghera-revochi-multe-a-societa-usa_87077b9f-ce8b-48e7-92d6-1fc8d9e6e648.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-24T17:24:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Trump ameaça a União Europeia com tarifas, afirmando que 'pagará' e revogará multas das empresas americanas. Ele anuncia uma investigação, declarando que 'não somos o seu fundo de emergência'.", "titulo_pt": "Trump ameaça ue com tarifas: 'pagará', reverterá multas e não será 'salvadouro' do bloco", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 70650, "titulo": "Incendi nella regione di Madrid, 40.000 tra evacuati e confinati", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/24/incendi-nella-regione-di-madrid-40.000-tra-evacuati-e-confinati_3d153f54-606e-4423-8670-9cca70271ec5.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-24T17:13:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Houve incêndios na região de Madrid, com cerca de 40.000 pessoas sendo evacuadas ou confinadas. O prefeito afirmou que o vento forte continuará e não pode ser descartada a possibilidade de novas evacuações.", "titulo_pt": "Incêndios na região de Madrid: 40.000 entre evacuados e confinados", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 70609, "titulo": "Early Christian church that survived Muslim rule is found in southeastern Spain", "url": "https://english.elpais.com/culture/2026-07-24/early-christian-church-that-survived-muslim-rule-is-found-in-southeastern-spain.html", "fonte_id": "elpais_en", "data_pub": "2026-07-24T17:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um edifício cristão antigo que sobreviveu ao domínio muçulmano foi descoberto na municipalidade de Calasparra, Espanha. Os arqueólogos encontraram moedas, balanças e pesos, além do túmulo de uma jovem que faleceu durante o parto.", "titulo_pt": "Igreja cristã antiga que sobreviveu ao domínio muçulmano é descoberta em região sudeste da Espanha", "veiculo": "El País (inglês)", "pais": "Espanha", "classe": "A"}, {"id": 70606, "titulo": "Lawsuit alleges FEMA and DHS are withholding funds to 25 states that do not support Trump’s immigration and election policies", "url": "https://english.elpais.com/usa/2026-07-24/lawsuit-alleges-fema-and-dhs-are-withholding-funds-to-25-states-that-do-not-support-trumps-immigration-and-election-policies.html", "fonte_id": "elpais_en", "data_pub": "2026-07-24T17:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A ação judicial afirma que o FEMA e o DHS estão retendo fundos de 25 estados que não apoiam as políticas imigratórias e eleitorais do Trump. Os estados argumentam que o governo federal está exigindo mudanças nos sistemas eleitorais e cooperação com autoridades migratórias para liberar os recursos.", "titulo_pt": "Ação judicial acusa FEMA e DHS de reterem fundos de 25 estados por não apoiarem as políticas imigratórias e eleitorais do Trump", "veiculo": "El País (inglês)", "pais": "Espanha", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 70703, "titulo": "TIER lifts GDP forecast to 10.38 percent", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/25/2003861326", "fonte_id": "taipei_times", "data_pub": "2026-07-25T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A TIER elevou sua previsão do PIB para 10,38%. Sem mais detalhes disponíveis sobre o contexto ou a justificativa dessa revisão, não há informações adicionais para incluir no resumo.", "titulo_pt": "TIER aumenta projeção do pib para 10,38%", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 70521, "titulo": "Trump threatens EU with ‘substantial’ tariffs over fines of US tech giants", "url": "https://www.theguardian.com/us-news/2026/jul/24/trump-european-union-tariffs", "fonte_id": "guardian_world", "data_pub": "2026-07-24T17:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente dos Estados Unidos, Donald Trump, ameaçou o bloco europeu com tarifas substanciais após a União Europeia impor multas pesadas às gigantes tecnológicas americanas. Em uma publicação no Truth Social, plataforma de mídia social do próprio Trump, ele afirmou que os EUA não são um 'PIGGYBANK' para a Europa e que isso não será permitido.", "titulo_pt": "Trump ameaça ue com tarifas substanciais após multas a gigantes tecnológicos", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 70613, "titulo": "Trump threatens new EU tariffs in retaliation for fines on US tech groups", "url": "https://www.ft.com/content/9b819dfc-8248-4aa5-b670-3a14d05f252e?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-24T17:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente Trump ameaça aplicar novas tarifas sobre a União Europeia como retaliação por multas impostas a grupos tecnológicos americanos. Washington promete iniciar uma nova investigação que poderia agravar as tensões comerciais.", "titulo_pt": "Trump ameaça novas tarifas em EUA como retaliatória por multas em empresas tecnológicas", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 70138, "titulo": "Justiça manda bloquear R$ 135 mi para recuperar prejuízo do Rioprevidência ligado ao Master", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/justica-manda-bloquear-r-135-mi-para-recuperar-prejuizo-do-rioprevidencia-ligado-ao-master.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-24T17:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Justiça do Rio de Janeiro bloqueou R$ 135,2 milhões da Trustee Distribuidora de Títulos e Valores Mobiliários e dos diretores Alexandre Marchesani Canata e Felipe Mota Separovic Rodrigues para recuperar um prejuízo relacionado ao Rioprevidência ligado ao Master. A decisão foi tomada nesta quinta-feira (23).", "titulo_pt": "Justiça bloqueia R$ 135 mi para recuperar prejuízo do Rioprevidência ligado ao Master", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 70139, "titulo": "Europa ganha e Brasil perde com novas tarifas de Trump", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/europa-ganha-e-brasil-perde-com-novas-tarifas-de-trump.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-24T17:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Países europeus são os vencedores das novas tarifas impostas pelos EUA, enquanto o Brasil não beneficia dessa medida. A Suprema Corte dos Estados Unidos havia derrubado a antiga política tarifária no início do ano.", "titulo_pt": "Europa ganha e Brasil perde com novas tarifas de Trump", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 70269, "titulo": "Ibovespa Hoje Ao Vivo: Bolsa cai com tarifas dos EUA e pressão de PETR4 e VALE3", "url": "https://www.infomoney.com.br/mercados/ibovespa-hoje-bolsa-de-valores-ao-vivo-24072026/", "fonte_id": "infomoney", "data_pub": "2026-07-24T16:47:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A bolsa de valores do Brasil (Ibovespa) está em baixa, influenciada pelas tarifas dos Estados Unidos e pela pressão exercida pelos papéis das empresas PETR4 e VALE3. As bolsas norte-americanas operam de forma mista com o petróleo em queda e a tensão geopolítica como fator relevante.", "titulo_pt": "Ibovespa Hoje Ao Vivo: bolsa cai com tarifas dos EUA e pressão de PETR4 e VALE3", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 70616, "titulo": "Ship insurers restrict war coverage for Saudi Arabian cargoes in Red Sea", "url": "https://www.ft.com/content/52aa89e9-f014-498e-8415-2c435a1c858d?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-24T16:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As seguradoras de navios estão limitando a cobertura de riscos relacionados a guerras para cargas sauditas no Mar Vermelho. Ataques dos rebeldes hutíes, apoiados pelo Irã, ameaçam interromper ainda mais as suprimentos globais de petróleo.", "titulo_pt": "Seguradoras limitam cobertura de riscos para cargas sauditas no mar vermelho", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 70226, "titulo": "Devemos manter juros restritivos por mais tempo, diz presidente do Banco Central", "url": "https://veja.abril.com.br/economia/devemos-manter-juros-restritivos-por-mais-tempo-diz-presidente-do-banco-central/", "fonte_id": "veja", "data_pub": "2026-07-24T16:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente do Banco Central, Gabriel Galípolo, afirmou que a autarquia vai manter os juros restritivos por mais tempo. Ele mencionou o aumento no preço do petróleo e a economia resiliente como fatores de monitoramento.", "titulo_pt": "Presidente do Banco Central diz que deve manter juros restritivos por mais tempo", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 70142, "titulo": "Casas Bahia afirma ter obtido R$ 255 milhões com economia circular", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/07/casas-bahia-afirma-ter-obtido-r-255-milhoes-com-economia-circular.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-24T15:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Grupo Casas Bahia relatou economizar R$ 255,6 milhões no ano passado através da implementação de sua estratégia de economia circular, que inclui logística reversa, remanufatura e reciclagem.", "titulo_pt": "Casas Bahia afirma ter economizado R$ 255 milhões com economia circular", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 70173, "titulo": "Tarifaço dos EUA: setores veem risco para economia e pedem ao governo que insista no diálogo em vez de agir com reciprocidade", "url": "https://g1.globo.com/economia/noticia/2026/07/24/tarifaco-dos-eua-setores-veem-risco-para-economia-e-pedem-ao-governo-que-insista-no-dialogo-em-vez-de-agir-com-reciprocidade.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-24T15:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Entidades empresariais brasileiras recomendaram que o governo insista nas negociações em vez de retaliar após os Estados Unidos aumentarem tarifas sobre produtos brasileiros. O segundo aumento, de 12,5%, foi anunciado pela Casa Branca e está relacionado a práticas desleais na economia do Brasil.", "titulo_pt": "Tarifaço dos EUA: setores pedem diálogo ao governo em vez de reciprocidade", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 70728, "titulo": "Rivian sues the US government for ‘full refund’ of Trump tariffs", "url": "https://techcrunch.com/2026/07/24/rivian-sues-the-us-government-for-full-refund-of-trump-tariffs/", "fonte_id": "techcrunch", "data_pub": "2026-07-24T15:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Rivian ingressou com uma ação judicial contra o governo dos Estados Unidos pedindo um reembolso integral das tarifas impostas pelo governo de Trump. A empresa espera obter um reembolso no valor de 'várias dezenas de milhões de dólares'.", "titulo_pt": "Rivian processa o governo americano pela devolução total das tarifas de Trump", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 70144, "titulo": "Petróleo cai mais de 4% e volta a ficar abaixo de US$ 100 apesar de novas ameaças dos EUA", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/petroleo-cai-mais-de-4-e-volta-a-ficar-abaixo-de-us-100-apesar-de-novas-ameacas-dos-eua.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-24T15:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O preço do petróleo caiu mais de 4% e atingiu US$ 96,41 por barril, voltando a ficar abaixo dos US$ 100. O barril Brent, referência mundial, foi negociado nesta sexta-feira (24) com essa queda.", "titulo_pt": "Petróleo cai mais de 4% e volta a ficar abaixo de US$ 100 apesar de novas ameaças dos EUA", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 70146, "titulo": "Procuradoria pede ao Cade condenação de 2 executivos em caso de cartel do câmbio", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/procuradoria-pede-ao-cade-condenacao-de-2-executivos-em-caso-de-cartel-do-cambio.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-24T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério Público Federal, junto ao Cade, opinou pela condenação de dois executivos acusados de participar de um cartel no mercado de câmbio. O processo tem mais de dez anos e está em tramitação no órgão antitruste.", "titulo_pt": "Mpf pede ao Cade condenação de 2 executivos em caso de cartel do câmbio", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 70148, "titulo": "MP das blusinhas enfrenta ofensiva de empresários após tarifaço de Trump", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/mp-das-blusinhas-enfrenta-ofensiva-de-empresarios-apos-tarifaco-de-trump.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-24T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Empresários intensificaram a pressão para reverter no Congresso a medida provisória que zerou o imposto de importação de até US$ 50 em compras de sites como Shein, Shopee e AliExpress, após novos tarifaços do governo Trump.", "titulo_pt": "MP das blusinhas enfrenta pressão empresarial após tarifaço de Trump", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 70518, "titulo": "Australian households face prospect of interest rate hike and petrol prices rising above $2 a litre", "url": "https://www.theguardian.com/australia-news/2026/jul/25/australian-households-prospect-interest-rate-hike-petrol-prices-rising", "fonte_id": "guardian_world", "data_pub": "2026-07-24T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Economistas advertem que as famílias australianas podem enfrentar uma elevação das taxas de juros do Banco Reserve e preços do combustível acima de R$2 por litro nos próximos meses, devido à crise no Oriente Médio que está empurrando o petróleo global para cima dos US$100 por barril.", "titulo_pt": "Famílias australianas podem enfrentar aumento das taxas de juros e preços do combustível", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 70352, "titulo": "Pesquisa ou peça de acusação? O TST e o trabalho por aplicativos", "url": "https://www.jota.info/opiniao-e-analise/colunas/trabalho-previdencia-empresas/pesquisa-ou-peca-de-acusacao-o-tst-e-o-trabalho-por-aplicativos", "fonte_id": "jota", "data_pub": "2026-07-24T14:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A pesquisa aborda a necessidade de proteção para motoristas de aplicativos e segurança jurídica para as empresas. Discute também o método adequado para o Direito do Trabalho nesse contexto.", "titulo_pt": "Pesquisa ou peça de acusação? O TST e o trabalho por aplicativos", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 70705, "titulo": "Transcend’s net profit surges 46.5% to a new high", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/25/2003861328", "fonte_id": "taipei_times", "data_pub": "2026-07-25T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O lucro líquido da Transcend aumentou em 46,5% e atingiu um novo recorde.", "titulo_pt": "Lucro líquido da transcend surge 46,5% e bate novo recorde", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 70706, "titulo": "Intel’s revenue forecast beats estimates", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/25/2003861329", "fonte_id": "taipei_times", "data_pub": "2026-07-25T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A receita projetada pela Intel superou as expectativas dos analistas.", "titulo_pt": "Previsão de receita da intel supera estimativas", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 70720, "titulo": "US accuses American of allegedly wiping his phone using a ‘duress’ password during border search", "url": "https://techcrunch.com/2026/07/24/us-accuses-american-of-allegedly-wiping-his-phone-using-a-duress-password-during-border-search/", "fonte_id": "techcrunch", "data_pub": "2026-07-24T17:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um cidadão americano pediu a um tribunal que rejeite as acusações do governo de que ele forneceria uma senha para autoridades aduaneiras que apagou os dados do seu telefone, levantando novas questões sobre os direitos constitucionais das pessoas na fronteira dos Estados Unidos.", "titulo_pt": "Estados unidos acusa cidadão americano de supostamente apagar o telefone com uma ‘senha de pressão’ durante busca aduaneira", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 70734, "titulo": "Did Chinese AI Steal From Anthropic, and OpenAI Loses Control of Two Models", "url": "https://www.wired.com/story/uncanny-valley-podcast/", "fonte_id": "wired", "data_pub": "2026-07-24T17:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A discussão neste episódio de Uncanny Valley aborda acusações de que uma inteligência artificial chinesa, conhecida como Moonshot AI, teria copiado do Anthropic. O programa também menciona a necessidade da Força Armada dos Estados Unidos em reduzir o uso de IA.", "titulo_pt": "Acusações de plágio entre IA chinesa e Anthropic, e us army precisa reduzir uso de AI", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 70708, "titulo": "Iryna Terekh: the trained architect behind Ukraine’s deep-strike drones", "url": "https://www.scmp.com/news/world/russia-central-asia/article/3361808/iryna-terekh-trained-architect-behind-ukraines-deep-strike-drones?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-24T17:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Iryna Terekh, uma arquiteta de 34 anos, lidera a empresa Fire Point e é fundamental para as capacidades de ataque à distância da Ucrânia na guerra contra a Rússia. Ela participa de exibições internacionais de defesa, negocia com fabricantes de armas e discute rearmamento em Europa.", "titulo_pt": "Iryna Terekh: a arquiteta treinada por trás das drones de ataque à distância da Ucrânia", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 70721, "titulo": "Anduril reportedly in talks to raise funding at $100B valuation, more than 3x last year’s mark", "url": "https://techcrunch.com/2026/07/24/anduril-reportedly-in-talks-to-raise-funding-at-100b-valuation-more-than-3x-last-years-mark/", "fonte_id": "techcrunch", "data_pub": "2026-07-24T17:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Anduril estaria em negociações para levantar uma nova rodada de financiamento que poderia aumentar sua avaliação até cerca de 100 bilhões de dólares, mais do que o triplo da marca do ano passado, segundo relatos da Reuters.", "titulo_pt": "Anduril relatado como estaria em discussões para relevantar financiamento com avaliação de r$ 100 bi, mais do triplo do último marco", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 70413, "titulo": "A invasão de vídeos feitos com IA para 'hipnotizar' crianças no YouTube: 'Pode impactar pelo resto da vida'", "url": "https://www.bbc.com/portuguese/articles/cx2xx1gp6jgo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-24T17:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores notaram que vídeos de baixa qualidade são recomendados pelo algoritmo do YouTube e os criadores não informam sobre o uso da tecnologia de IA. Esses conteúdos podem ter um impacto duradouro nas crianças.", "titulo_pt": "Invasão de vídeos com IA para 'hipnotizar' crianças no YouTube pode causar impacto permanente", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 70737, "titulo": "You can’t ignore Google Zero anymore", "url": "https://www.theverge.com/podcast/970735/google-zero-reddit-ai-publishers-vergecast", "fonte_id": "the_verge", "data_pub": "2026-07-24T17:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O acordo entre a web e o Google parece ter terminado, pois agora as páginas da web não recebem o mesmo fluxo de tráfego que recebiam no passado. Este acordo permitia que o Google coletasse dados e indexasse páginas web em troca de enviar um grande volume de tráfego para esses sites.", "titulo_pt": "Você não pode ignorar mais o Google Zero", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 70719, "titulo": "The quest to keep organs alive outside the body", "url": "https://www.technologyreview.com/2026/07/24/1140790/the-quest-to-keep-organs-alive-outside-the-body/", "fonte_id": "mit_tech_review", "data_pub": "2026-07-24T17:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Há um esforço interessante para preservar órgãos fora do corpo, visando superar a escassez de órgãos doadores. Os órgãos sobrevivem apenas algumas horas fora do corpo, mesmo sendo mantidos refrigerados.", "titulo_pt": "A busca por manter órgãos vivos fora do corpo", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 70483, "titulo": "Is AI the End of Cheap Tech?", "url": "https://www.theatlantic.com/podcasts/2026/07/why-ai-is-making-things-more-expensive/688055/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-07-24T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A crise de memória impulsionada por inteligência artificial afeta todos nós. O aumento da demanda por recursos de armazenamento devido ao avanço na IA está causando problemas para a indústria tecnológica.", "titulo_pt": "É a inteligência artificial o fim dos produtos tecnológicos baratos?", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 70722, "titulo": "Build in public, fail in public: what it’s like to be a founder under 20 right now", "url": "https://techcrunch.com/2026/07/24/build-in-public-fail-in-public-what-its-like-to-be-a-founder-under-20-right-now/", "fonte_id": "techcrunch", "data_pub": "2026-07-24T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ferramentas de inteligência artificial têm democratizado a oportunidade de construção, reduzindo os prazos para o sucesso e permitindo que mais jovens iniciem empresas bem-sucedidas sem precisar trabalhar em grandes companhias tecnológicas.", "titulo_pt": "Construa abertamente, falhe abertamente: como é ser um fundador abaixo de 20 anos no momento", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 70723, "titulo": "Anthropic launches Opus 5", "url": "https://techcrunch.com/2026/07/24/anthropic-launches-opus-5/", "fonte_id": "techcrunch", "data_pub": "2026-07-24T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Opus 5 será mais barato e menos restritivo que Fable, provavelmente tornando-o preferível em a maioria dos casos de uso.", "titulo_pt": "Anthropic lança Opus 5", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 70253, "titulo": "IA vai te substituir? Google revela profissões que mais usam a tecnologia", "url": "https://www.cnnbrasil.com.br/inteligencia-artificial/ia-vai-te-substituir-google-revela-profissoes-que-mais-usam-a-tecnologia/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-24T16:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Google revelou que a tecnologia já está presente em grande parte das profissões. Essa presença indica uma integração significativa da inteligência artificial e outras tecnologias na maioria dos campos de trabalho.", "titulo_pt": "IA vai te substituir? Google revela profissões que mais usam a tecnologia", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 70732, "titulo": "Lee arrives in San Francisco, set to meet Jensen Huang, Sam Altman", "url": "https://en.yna.co.kr/view/AEN20260724004000315", "fonte_id": "yonhap_news", "data_pub": "2026-07-24T15:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente Lee Jae Myung chegou a São Francisco e está programado para se encontrar com Jensen Huang e Sam Altman.", "titulo_pt": "Lee chega a são Francisco para reuniões com executivos", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 70143, "titulo": "Ataque hacker com modelo da OpenAI é falha humana, dizem especialistas", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/ataque-hacker-com-modelo-da-openai-e-falha-humana-dizem-especialistas.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-24T15:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Especialistas afirmam que o incidente envolvendo modelos da OpenAI e a plataforma Hugging Face demonstra a capacidade de descoberta de falhas inéditas por inteligência artificial, mas enfatizam que atribuir responsabilidade a um robô poderoso esconde a responsabilidade humana na situação.", "titulo_pt": "Ataque hacker com modelo da OpenAI é falha humana, dizem especialistas", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 70617, "titulo": "Nvidia and Palantir urge US not to ban ‘open’ AI models after China scare", "url": "https://www.ft.com/content/3203fc9a-2321-44f8-8093-b7e16c8fc6d7?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-24T15:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Nvidia e Palantir pressionam os EUA a não banirem modelos de IA 'abertos' após o medo chinês. Empresas tecnológicas e investidores americanos reagem a chamados por restrições à tecnologia avançada chinesa.", "titulo_pt": "Nvidia e Palantir pressionam EUA a não banirem modelos de IA 'abertos' após medo chinês", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 70698, "titulo": "Experts suggest methods to reduce oil health risks", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/25/2003861361", "fonte_id": "taipei_times", "data_pub": "2026-07-25T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Expertos sugeriram métodos para reduzir os riscos à saúde associados ao óleo. Os especialistas apresentaram várias estratégias que podem ser implementadas para mitigar os impactos negativos do óleo na saúde humana.", "titulo_pt": "Experts sugerem métodos para reduzir riscos de saúde relacionados ao óleo", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 70749, "titulo": "How did inbred brown tree snakes take over the island of Guam?", "url": "https://phys.org/news/2026-07-inbred-brown-tree-snakes-island.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A espécie de cobra marron, nativa da Austrália e do Pacífico Sul, chegou a Guam após a Segunda Guerra Mundial, provavelmente a bordo de aviões de carga. Ela se tornou uma espécie invasora dominante na ilha.", "titulo_pt": "Como as cobras marrons endogámicas tomaram conta da ilha de Guam?", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 70750, "titulo": "Unraveling the climate behind the collapse of Bronze Age civilizations", "url": "https://phys.org/news/2026-07-unraveling-climate-collapse-bronze-age.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo estudo da Universidade de Estocolmo, publicado na Science Advances, indica que as secas mais severas no antigo Mediterrâneo Oriental ocorreram quando múltiplos ciclos climáticos naturais se alinharam. Esses achados oferecem novas informações sobre as condições climáticas relacionadas ao colapso da Idade do Bronze tardia e podem auxiliar na compreensão futura dos riscos de secas em um mundo aquecido.", "titulo_pt": "Desvendando o clima por trás do colapso das civilizações do Bronze", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 70751, "titulo": "Hydrogel electrode improves stability of insect-based odor sensors for drones", "url": "https://phys.org/news/2026-07-hydrogel-electrode-stability-insect-based.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Drones estão sendo cada vez mais utilizados para responder a desastres, inspecionar infraestruturas e monitorar o ambiente. No entanto, os sistemas de drone dependem principalmente de sensores visuais que podem falhar em situações como fumaça, poeira, escuridão ou estruturas colapsadas. O sensor olfativo poderia fornecer uma capacidade complementar valiosa ao permitir que os drones detectassem vazamentos gaseosos e emissões químicas que não podem ser identificadas apenas por sensores visuais. No entanto, um grande desafio limita o uso prático desses sensores biohíbridos: as antenas de insetos excisadas perdem gradualmente a qualidade do sinal à medida que secam.", "titulo_pt": "Eletrodo glicogênico melhora a estabilidade dos sensores olfativos de inseto para drones", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 70753, "titulo": "How fishing may be changing one fish species at the molecular level", "url": "https://phys.org/news/2026-07-fishing-fish-species-molecular.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T17:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O peixe pearly razorfish (Xyrichtys novacula) é uma espécie marinha pequena que habita águas costeiras arenosas e se alimenta de criaturas como camarões. Conhecido localmente nas Ilhas Baleares da Espanha como raors, é um prato popular em muitos lares e restaurantes da região.", "titulo_pt": "Como a pesca pode estar alterando uma espécie de peixe no nível molecular", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 70754, "titulo": "Malaria parasite selectively consumes linoleic acid fats, revealing drug target potential", "url": "https://phys.org/news/2026-07-malaria-parasite-consumes-linoleic-acid.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T17:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores do NYU Abu Dhabi descobriram que o parasita da malária depende de um tipo específico de gordura para sobreviver e se multiplicar no hospedeiro humano, revelando uma vulnerabilidade desconhecida que pode auxiliar no desenvolvimento de futuros tratamentos.", "titulo_pt": "Parasito da malária seleciona gorduras específicas para sobrevivência, identificando potencial de alvo terapêutico", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 70329, "titulo": "Pelos da pele podem ajudar o corpo a detectar coceira, sugere estudo", "url": "https://www.metropoles.com/saude/pelos-pele-ajudam-detectar-coceira", "fonte_id": "metropoles", "data_pub": "2026-07-24T17:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo sugere que as fibras cutâneas podem desempenhar um papel na detecção da coceira pelo corpo. Essa descoberta pode contribuir para o desenvolvimento de novos tratamentos relacionados à coceira.", "titulo_pt": "Pelos da pele podem auxiliar no reconhecimento de coceira, indica estudo", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 70755, "titulo": "Review finds lack of evidence as to whether planting around our homes reduces the pollution we breathe", "url": "https://phys.org/news/2026-07-lack-evidence-homes-pollution.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T17:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma revisão conduzida pela Universidade de East London revelou uma lacuna significativa na pesquisa sobre poluição do ar. Não há evidências diretas que demonstrem se os jardins residenciais reduzem os níveis de poluição ou melhoram a qualidade do ar respirado dentro das casas em áreas urbanas britânicas.", "titulo_pt": "Revisão destaca falta de evidências sobre impacto dos jardins nas casas na poluição do ar", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 70756, "titulo": "Rocks from unexplored far side of the moon help rewrite lunar history", "url": "https://phys.org/news/2026-07-unexplored-side-moon-rewrite-lunar.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T17:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Amostras antigas da face oculta da lua estão ajudando os cientistas a reescrever a história do início do sistema solar, desafiando décadas de conceitos sobre quando ocorreram os impactos asteroidais e fornecendo novas informações sobre as condições que influenciaram o desenvolvimento da Terra.", "titulo_pt": "Pedras da face inexplorada da lua reescrevem a história lunar", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 70126, "titulo": "4 pesquisas científicas que pareciam absurdas, mas tiveram resultados brilhantes", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/4-pesquisas-cientificas-que-pareciam-absurdas-mas-tiveram-resultados-brilhantes.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-24T17:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Há 25 anos, um grupo extremista transformou aviões comerciais em armas para ataques nos Estados Unidos. Este evento inesperado levou a pesquisas científicas que inicialmente pareciam absurdas, mas resultaram em descobertas importantes.", "titulo_pt": "4 Pesquisas científicas que pareciam absurdas, mas tiveram resultados brilhantes", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 70757, "titulo": "Trust among farmers is key to scaling climate-smart innovations", "url": "https://phys.org/news/2026-07-farmers-key-scaling-climate-smart.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A crescente variabilidade do clima e a frequência mais alta de eventos extremos tornaram prioridade acelerar o uso de inovações que possam fortalecer a resiliência agrícola. No entanto, garantir que o conhecimento sobre essas inovações chegue a mais agricultores e seja compreendido, adaptado e escalado continua sendo um dos maiores desafios na pesquisa para o desenvolvimento.", "titulo_pt": "A confiança entre os agricultores é crucial para ampliar inovações climatossensíveis", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 70758, "titulo": "Fat-storing cell structures may block viral spread by recruiting antiviral proteins", "url": "https://phys.org/news/2026-07-fat-cell-block-viral-antiviral.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas da Universidade La Trobe descobririram o papel crucial que estruturas celulares de gordura desempenham na detecção precoce e defesa contra vírus no corpo humano. Esta descoberta poderia levar ao desenvolvimento de uma nova estratégia antiviral que utiliza as defesas naturais do organismo, em vez de focar nos próprios vírus.", "titulo_pt": "Estruturas celulares de gordura podem recrutar proteínas antivirais para bloquear a propagação viral", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 70788, "titulo": "What’s to blame for Canada’s wildfires?", "url": "https://www.sciencenews.org/article/what-blame-canada-wildfires-toxic-smoke", "fonte_id": "science_news", "data_pub": "2026-07-24T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As chamas que enviaram fumaça tóxica para os Estados Unidos não serão a última ocorrência. Autoridades estão lidando com incêndios florestais e desinformação.", "titulo_pt": "O que é responsável pelos incêndios florestais no canadá?", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 70759, "titulo": "Why and how birdsong differs across the world—and the eight motifs that tie them together", "url": "https://phys.org/news/2026-07-birdsong-differs-world-motifs.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T16:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A canção dos pássaros transmite significado através do espaço aberto, auxiliando na atração de parceiros, defesa do território e comunicação com concorrentes. Pesquisadores franceses analisaram mais de 116 mil canções de 3.160 espécies passerinas em todo o mundo, identificando oito motivos comuns que explicam as diferenças nas canções dos pássaros.", "titulo_pt": "Por que e como a canção dos pássaros varia pelo mundo – e os oito motifos que unem-as", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 70793, "titulo": "New Crew Members Welcomed to International Space Station", "url": "https://www.nasa.gov/image-article/new-crew-members-welcomed-to-international-space-station/", "fonte_id": "nasa_news", "data_pub": "2026-07-24T16:43:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A tripulação formada por Anna Kikina e Pyotr Dubrov, da Roscosmos, e Anil Menon, da NASA, foi bem-vinda à Estação Espacial Internacional em 18 de julho de 2026. Eles chegaram à estação no dia 14 de julho de 2026 após um lançamento do Cosmódromo Baikonur.", "titulo_pt": "Novos tripulantes bem-vindos à estação espacial internacional", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 70760, "titulo": "More than 80,000 flee forest infernos in France and Spain", "url": "https://phys.org/news/2026-07-forest-infernos-france-spain.html", "fonte_id": "phys_org", "data_pub": "2026-07-24T16:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de 80 mil pessoas foram obrigadas a deixar suas casas devido às florestais na Europa, com evacuações em França e Espanha. Em um penhasco francês, férieiros embarcaram em barcos para escapar das chamas, enquanto autoridades espanholas ordenaram a evacuação em várias cidades próximas a Madri.", "titulo_pt": "Mais de 80 mil fogem dos incêndios florestais na Europa", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 70707, "titulo": "Largan says construction of new line is on schedule", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/25/2003861330", "fonte_id": "taipei_times", "data_pub": "2026-07-25T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Largan informou que a construção da nova linha está dentro do prazo previsto. Não há informações adicionais sobre o projeto ou sua situação atual.", "titulo_pt": "Largan diz que construção de nova linha está em conformidade com o cronograma", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 70828, "titulo": "Controversial Gelman Collection to Inaugurate Spain’s New Faro Santander in September", "url": "https://www.artnews.com/list/art-news/news/faro-santander-september-2026-opening-gelman-collection-1234793355/", "fonte_id": "artnews", "data_pub": "2026-07-24T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A coleção controversa Gelman inaugurará a nova Faro Santander em setembro, com obras raras e importantes do acervo do Banco Santander e uma exposição solo de Leonora Carrington.", "titulo_pt": "Controversa coleção Gelman inaugurará nova Faro Santander em setembro", "veiculo": "ARTnews", "pais": "EUA", "classe": "B"}, {"id": 70482, "titulo": "What Climate Fiction Should Accomplish", "url": "https://www.theatlantic.com/newsletters/2026/07/books-briefing-climate-fiction-accomplish/688057/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-07-24T17:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A literatura climática pode retratar a sensação de instabilidade planetária?", "titulo_pt": "O que a ficção científica sobre clima deve alcançar?", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 70128, "titulo": "Apresentador acusado de golpe do Pix vira réu por exibir vídeo íntimo de influenciador", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/07/apresentador-acusado-de-golpe-do-pix-vira-reu-por-exibir-video-intimo-de-influenciador.shtml", "fonte_id": "folha_ilustrada", "
