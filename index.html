heguardian.com/environment/2026/jun/28/temperature-records-tumble-across-europe-as-heatwave-moves-east", "fonte_id": "guardian_world", "data_pub": "2026-06-28T17:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Temperaturas recordes acima de 40C foram registradas na Alemanha, Tchecoslováquia, Polônia e Hungria durante uma onda de calor que se espalhou para leste. Mais de 191 milhões de pessoas em toda a Europa estiveram sujeitas a temperaturas acima de 35C.", "titulo_pt": "Alemanha, Tchecoslováquia, Polônia e Hungria enfrentam dias mais quentes da história", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 24151, "titulo": "Three firefighters killed in US wildfires along Colorado–Utah border", "url": "https://www.aljazeera.com/news/2026/6/28/three-firefighters-killed-in-us-wildfires-along-colorado-utah?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-28T15:16:00Z", "idioma": "en", "provavel_duplicata_de": 24078, "texto_pt": "Três bombeiros morreram durante incêndios florestais nos Estados Unidos, na fronteira entre Colorado e Utah. Este ano, o país enfrenta uma temporada severa de incêndios, impulsionada por secas prolongadas e condições secas.", "titulo_pt": "Três bombeiros mortos em incêndios florestais na fronteira do Colorado com o Utah", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 24157, "titulo": "European heatwave causes 1,000 excess deaths in France", "url": "https://www.aljazeera.com/news/2026/6/28/european-heatwave-causes-1000-excess-deaths-in-france?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-28T14:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A onda de calor na Europa causou pelo menos 1.000 mortes a mais na França. A AFP prevê que cerca de 191 milhões de pessoas em toda a Europa irão experimentar temperaturas acima dos 35°C.", "titulo_pt": "Onada de calor na Europa causa mil mortes extras na França", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 23291, "titulo": "Onda de calor extremo mata mil pessoas na França em apenas 3 dias", "url": "https://www.metropoles.com/mundo/onda-de-calor-extremo-mata-mil-pessoas-na-franca-em-apenas-3-dias", "fonte_id": "metropoles", "data_pub": "2026-06-28T10:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério da Saúde estimou que mil pessoas morreram devido a uma onda de calor extremo na França em apenas três dias. Este verão no hemisfério norte já quebrou diversos recordes históricos de temperatura.", "titulo_pt": "Onda de calor extremo mata mil pessoas na França em 3 dias", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 23294, "titulo": "Após dias congelantes, ciclone e frente fria levam temporais ao Sul", "url": "https://www.metropoles.com/brasil/apos-dias-congelantes-ciclone-e-frente-fria-levam-temporais-ao-sul", "fonte_id": "metropoles", "data_pub": "2026-06-28T09:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ciclone e frente fria levam temporais ao Sul do país, enquanto no Sudeste o tempo permanece relativamente estável com sol entre nuvens e temperaturas elevando.", "titulo_pt": "Após dias congelantes, ciclone e frente fria causam temporais no Sul", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 23602, "titulo": "India’s gig workers pay the price for exposure to New Delhi’s hazardous air", "url": "https://www.japantimes.co.jp/environment/2026/06/28/india-gig-workers-hazardous-air/", "fonte_id": "japan_times", "data_pub": "2026-06-28T09:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Milhões de trabalhadores gig na indústria de comércio eletrônico do país estão expostos a ar poluído nas cidades indianas, comprometendo sua saúde. A qualidade do ar continua um desafio para as cidades indianas.", "titulo_pt": "Trabalhadores gigger da Índia pagam o preço pela exposição ao ar perigoso de Nova Deli", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 23519, "titulo": "More than 68,000 people still missing in Venezuela after devastating earthquakes", "url": "http://www.euronews.com/2026/06/28/more-than-68000-people-still-missing-in-venezuela-after-devastating-earthquakes", "fonte_id": "euronews", "data_pub": "2026-06-28T08:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de 68 mil pessoas ainda estão desaparecidas na Venezuela após os terremotos devastadores. O Programa das Nações Unidas para o Desenvolvimento (PNUD) estima que o dano direto físico causado pelos terremotos custou aproximadamente 6,7 bilhões de dólares.", "titulo_pt": "Mais de 68 mil pessoas ainda desaparecidas na Venezuela após os terremotos devastadores", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 23315, "titulo": "Alemanha e Dinamarca registram temperaturas recordes; onda de calor avança ao leste", "url": "https://www.infomoney.com.br/mundo/alemanha-e-dinamarca-registram-temperaturas-recordes-onda-de-calor-avanca-ao-leste/", "fonte_id": "infomoney", "data_pub": "2026-06-28T07:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Dinamarca registrou sua temperatura mais alta de todos os tempos, e a onda de calor se deslocou para o leste, afetando também a Polônia. Antes disso, Alemanha, Reino Unido, França e Suíça já haviam enfrentado recordes de calor em junho.", "titulo_pt": "Alemanha e Dinamarca registram temperaturas recorde; onda de calor avança para o leste", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 23609, "titulo": "International workshop on Fukushima nuclear accident held in Futaba", "url": "https://www.japantimes.co.jp/news/2026/06/28/japan/international-workshop-nuclear-accident/", "fonte_id": "japan_times", "data_pub": "2026-06-28T05:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um workshop internacional sobre a tragédia nuclear de Fukushima foi realizado na cidade de Futaba, com a participação de aproximadamente 140 oficiais e especialistas reguladores nucleares de diversos países, incluindo Estados Unidos e França.", "titulo_pt": "Workshop Internacional sobre Acidente Nuclear de Fukushima Realizado em Futaba", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 22846, "titulo": "The debate on adapting to climate change: Face 'investment wall' or pay the price of inaction?", "url": "https://www.lemonde.fr/en/environment/article/2026/06/28/the-debate-on-adapting-to-climate-change-face-investment-wall-or-pay-the-price-of-inaction_6754939_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-28T00:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A onda de calor histórica recente expôs atrasos na adaptação climática da França, devido às restrições orçamentárias que agora dificultam as medidas necessárias mais do que nunca.", "titulo_pt": "Debate sobre adaptação ao clima: enfrentar 'parede de investimentos' ou pagar o preço da inação?", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 24188, "titulo": "China ethnicity law restricts room for neutrality: official", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/29/2003859915", "fonte_id": "taipei_times", "data_pub": "2026-06-29T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um oficial afirmou que a lei de etnia da China limita o espaço para neutralidade. A lei estabelece regras sobre a identidade étnica, possivelmente afetando a liberdade de expressão e perspectivas não-chinesas.", "titulo_pt": "Lei de etnia da China restrinja a neutralidade: oficial", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 23795, "titulo": "Marcas voltam a apoiar o Orgulho LGBT após temporadas conservadoras", "url": "https://www.metropoles.com/colunas/ilca-maria-estevao/marcas-voltam-a-apoiar-o-orgulho-lgbt-apos-temporadas-conservadoras", "fonte_id": "metropoles", "data_pub": "2026-06-28T18:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Orgulho LGBT+ é comemorado neste domingo, 28 de junho. Quatro marcas de moda que apoiam a causa são destacadas no artigo.", "titulo_pt": "Marcas voltam a apoiar o Orgulho LGBT+ após temporadas conservadoras", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 23800, "titulo": "Dia do Orgulho LGBTQIA+: 5 vezes que a coluna falou sobre o movimento", "url": "https://www.metropoles.com/colunas/pouca-vergonha/dia-do-orgulho-lgbtqia-5-vezes-que-a-coluna-falou-sobre-o-movimento", "fonte_id": "metropoles", "data_pub": "2026-06-28T18:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Dia do Orgulho LGBTQIA+ é celebrado neste domingo (29/6). A coluna discutiu cinco momentos relevantes para o movimento.", "titulo_pt": "Dia do Orgulho LGBTQIA+: 5 vezes que a coluna falou sobre o movimento", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 24172, "titulo": "Police in Turkey detain dozens at Istanbul Pride event after authorities banned march", "url": "https://www.scmp.com/news/world/europe/article/3358674/police-turkey-detain-dozens-istanbul-pride-event-after-authorities-banned-march?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T17:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Turcos detiveram pelo menos 50 pessoas, incluindo um jornalista, durante um evento Gay Pride em Istambul, apesar de uma proibição local e do lockdown da principal área de encontro da cidade. As autoridades locais também proibiram manifestações em pontos-chave de reunião, como o bairro asiático de Kadikoy.", "titulo_pt": "Polícia turca detém várias pessoas durante evento Gay Pride em Istambul, apesar da proibição", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 23746, "titulo": "ONU estima 50 mil desaparecidos enquanto resgates seguem na Venezuela", "url": "https://veja.abril.com.br/mundo/onu-estima-50-mil-desaparecidos-enquanto-resgates-seguem-na-venezuela/", "fonte_id": "veja", "data_pub": "2026-06-28T17:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ONU estima que cerca de 50 mil pessoas estejam desaparecidas enquanto os resgates continuam na Venezuela após um dos terremotos mais graves da América Latina. O Brasil realizou seu quarto voo humanitário para auxiliar as vítimas.", "titulo_pt": "ONU estima 50 mil desaparecidos enquanto resgates seguem na Venezuela", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 23593, "titulo": "Australian arrested after Thai teen girl found dead in suitcase", "url": "https://www.scmp.com/news/asia/southeast-asia/article/3358651/australian-arrested-after-thai-teen-girl-found-dead-suitcase?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T09:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um homem australiano de meia-idade foi preso e acusado de assassinato após o corpo de uma garota tailandesa de 17 anos ser encontrado em uma mala no resort de Pattaya. A família da vítima expressou profundo sofrimento com a morte da filha.", "titulo_pt": "Australiano preso após corpo de adolescente tailandesa ser encontrado em mala", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 23907, "titulo": "El territorio digital del Estado tiene 915 puertas. Solo 16 tienen timbre", "url": "https://www.ciperchile.cl/2026/06/28/el-territorio-digital-del-estado-tiene-915-puertas-solo-16-tienen-timbre/?utm_source=rss&utm_medium=rss&utm_campaign=el-territorio-digital-del-estado-tiene-915-puertas-solo-16-tienen-timbre", "fonte_id": "ciper_chile", "data_pub": "2026-06-28T08:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O território digital do Estado possui 915 portais, mas apenas 16 deles têm endereços específicos.", "titulo_pt": "Território Digital do Estado tem 915 Porta m para manter a tradição viva", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}], "destaque": null};
const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${artsHtml ? `<div class="destaque-fontes">
      <h3>Fontes desta edição</h3>
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}
</script>
