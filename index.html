alth risks after devastating earthquakes", "url": "https://www.paho.org/en/news/30-6-2026-paho-expands-health-response-venezuela-faces-mounting-health-risks-after-devastating", "fonte_id": "paho", "data_pub": "2026-06-30T14:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A PAHO ampliou a resposta à saúde após um série de terremotos devastadores na Venezuela, que aumentaram os riscos para a saúde local.", "titulo_pt": "PAHO expande resposta à saúde após terremotos na Venezuela", "veiculo": "PAHO/WHO", "pais": "Americas", "classe": "A"}, {"id": 27436, "titulo": "Marinha do Brasil monta primeiro hospital de campanha na Venezuela após terremoto", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/marinha-do-brasil-monta-primeiro-hospital-de-campanha-na-venezuela-apos-terremoto.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-30T12:47:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Marinha do Brasil instalou um hospital de campanha em La Guaira, na Venezuela, após um terremoto que atingiu o país. O hospital tem capacidade para realizar 150 atendimentos por dia.", "titulo_pt": "Marinha do Brasil monta primeiro hospital de campanha na Venezuela após terremoto", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 27226, "titulo": "SC: mulher é morta por homem que invadiu apartamento dela com extintor", "url": "https://www.metropoles.com/brasil/sc-mulher-e-morta-por-homem-que-invadiu-apartamento-dela-com-extintor", "fonte_id": "metropoles", "data_pub": "2026-06-30T12:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma mulher de 55 anos foi morta após ser atingida com um extintor por um invasor que invadiu seu apartamento no sábado em São José, Santa Catarina. A vítima sofreu lesões graves no rosto e não resistiu aos ferimentos.", "titulo_pt": "Mulher de 55 anos é morta após invasor atingi-la com extintor", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27198, "titulo": "Sistema de saúde da Venezuela está sobrecarregado após terremotos, afirma OMS", "url": "https://www.infomoney.com.br/mundo/sistema-de-saude-da-venezuela-esta-sobrecarregado-apos-terremotos-afirma-oms/", "fonte_id": "infomoney", "data_pub": "2026-06-30T12:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Organização Mundial da Saúde (OMS) informou que o sistema de saúde venezuelano está sobrecarregado após os terremotos, com hospitais danificados superlotados e enfrentando falta de especialistas. Os tremores causaram mais de 1.700 mortes e 5.000 feridos no país.", "titulo_pt": "Sistema de saúde da Venezuela sobrecarregado após terremotos, afirma OMS", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 27174, "titulo": "Polícia Civil faz operação contra esquema de lavagem de dinheiro do tráfico na Vila Vintém", "url": "https://veja.abril.com.br/brasil/policia-civil-faz-operacao-contra-esquema-de-lavagem-de-dinheiro-do-trafico-na-vila-vintem/", "fonte_id": "veja", "data_pub": "2026-06-30T12:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Civil realizou uma operação contra um esquema de lavagem de dinheiro relacionado ao tráfico na Vila Vintém. Segundo as investigações, o grupo criminoso movimentava cerca de R$ 500 mil por semana e até o momento três pessoas foram presas.", "titulo_pt": "Polícia Civil desbarata esquema de lavagem de dinheiro do tráfico na Vila Vintém", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27237, "titulo": "Menino prende cabeça em banco de madeira e mobiliza Corpo de Bombeiros", "url": "https://www.metropoles.com/distrito-federal/entorno/menino-prende-cabeca-em-banco-de-madeira-e-mobiliza-corpo-de-bombeiros", "fonte_id": "metropoles", "data_pub": "2026-06-30T12:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um menino ficou preso na cabeça em um banco de madeira em Águas Lindas de Goiás. O Corpo de Bombeiros foi acionado e conseguiu resgatar o garoto sem que ele se ferisse.", "titulo_pt": "Menino se prende na cabeça em banco de madeira e mobiliza Corpo de Bombeiros", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27380, "titulo": "Minimum wage gap narrows, but breakthrough still elusive", "url": "https://www.koreaherald.com/article/10793592", "fonte_id": "korea_herald", "data_pub": "2026-06-30T12:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Representantes de trabalhadores e empregadores reduziram as diferenças sobre o aumento do salário mínimo para o próximo ano, mas ainda não chegaram a um acordo, com uma diferença de 1,540 won. O salário mínimo proposto pelos trabalhadores foi de 11,900 won por hora, enquanto os empregadores ofereceram 10,360 won.", "titulo_pt": "Diferença no salário mínimo diminui, mas acordo ainda não foi alcançado", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 27245, "titulo": "Ministério recomenda vacinar bebês contra sarampo após novos casos", "url": "https://www.metropoles.com/saude/vacinar-bebes-contra-sarampo", "fonte_id": "metropoles", "data_pub": "2026-06-30T11:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério da Saúde recomenda a vacinação de bebês com seis a onze meses e vinte e nove dias contra o sarampo. A orientação envolve a aplicação da chamada 'dose zero' em São Paulo.", "titulo_pt": "Ministério recomenda vacinar bebês contra sarampo após novos casos", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27178, "titulo": "Operação Anáfora: PF mira esquema de lavagem de dinheiro de recursos desviados da Saúde", "url": "https://veja.abril.com.br/brasil/operacao-anafora-pf-mira-esquema-de-lavagem-de-dinheiro-de-recursos-desviados-da-saude/", "fonte_id": "veja", "data_pub": "2026-06-30T11:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal (PF) realizou uma operação para investigar um esquema de lavagem de dinheiro envolvendo recursos desviados do sistema de Saúde. Os mandados judiciais foram emitidos pela 6ª Vara Federal Criminal e pelo Tribunal Regional Federal da 2ª Região, considerando que alguns dos suspeitos têm foro privilegiado.", "titulo_pt": "Operação Anáfora: PF investiga esquema de lavagem de dinheiro com recursos desviados da Saúde", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27112, "titulo": "Rio: greve de rodoviários entra no 2º dia e deixa paradas lotadas", "url": "https://www.metropoles.com/brasil/rio-greve-de-rodoviarios-entra-no-2o-dia-e-deixa-paradas-lotadas", "fonte_id": "metropoles", "data_pub": "2026-06-30T11:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A greve de rodoviários no Rio de Janeiro entra no segundo dia, causando lotações nos pontos de ônibus. De acordo com a Rio Ônibus, cerca de 1.150 veículos estão em circulação.", "titulo_pt": "Greve de rodoviários no Rio entra no segundo dia e causa lotações", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27014, "titulo": "Brasil saiu do Mapa da Fome, mas ainda enfrenta muitos desafios nessa área", "url": "https://veja.abril.com.br/coluna/balanco-social/brasil-saiu-do-mapa-da-fome-mas-ainda-enfrenta-muitos-desafios-nessa-area/", "fonte_id": "veja", "data_pub": "2026-06-30T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A fome no Brasil diminuiu significativamente, mas ainda persiste. O país enfrenta desafios para manter a redução da fome e combater a obesidade.", "titulo_pt": "Brasil saiu do Mapa da Fome, mas enfrenta desafios", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 28066, "titulo": "Up to five storms or typhoons expected by year-end", "url": "https://www.taipeitimes.com/News/front/archives/2026/07/01/2003860030", "fonte_id": "taipei_times", "data_pub": "2026-07-01T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Até cinco furacões ou tempestades estão previstas para ocorrer até o fim do ano.", "titulo_pt": "Cinco a sete furacões ou tempestades esperados até o fim do ano", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 27838, "titulo": "Doomsday Climate Scenarios Were Wrong. That Doesn’t Help Europe.", "url": "https://foreignpolicy.com/2026/06/30/science-climate-europe-global-warming-heat-wave/", "fonte_id": "foreign_policy", "data_pub": "2026-06-30T19:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Estudos científicos recentes reforçam a necessidade de ação rápida contra o clima, ao invés de diminuí-la.", "titulo_pt": "Cenários Apocalípticos Climáticos Estavam Errados. Isso Não Ajuda Europa.", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 27622, "titulo": "Por que o número de mortos nos terremotos da Venezuela pode nunca ser conhecido", "url": "https://veja.abril.com.br/mundo/por-que-o-numero-de-mortos-nos-terremotos-da-venezuela-pode-nunca-ser-conhecido/", "fonte_id": "veja", "data_pub": "2026-06-30T18:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Especialistas afirmam que as buscas ainda estão no início, com milhares de pessoas desaparecidas e áreas devastadas continuando inacessíveis. O número exato de mortos nos terremotos da Venezuela pode nunca ser conhecido.", "titulo_pt": "Por que o número exato de mortos nos terremotos da Venezuela pode nunca ser conhecido", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27520, "titulo": "André de Paula cria grupo de trabalho para avaliar impactos do El Niño", "url": "https://www.cnnbrasil.com.br/agro/andre-de-paula-cria-grupo-de-trabalho-para-avaliar-impactos-do-el-nino/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T18:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "André de Paula, ministro da Agricultura, criou um grupo de trabalho para avaliar os impactos do El Niño. Durante o evento de divulgação do Plano Safra 2026/27, ele também divulgou uma minuta que estabelece padrões de identidade e qualidade para a produção da biorrefinaria de milho e cereais.", "titulo_pt": "André de Paula cria grupo de trabalho para avaliar impactos do El Niño", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 27835, "titulo": "Las impactantes imágenes de la morgue improvisada en un puerto de Venezuela", "url": "https://www.lanacion.com.ar/el-mundo/las-impactantes-imagenes-de-la-morgue-improvisada-en-un-puerto-de-venezuela-nid30062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T18:42:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Médicos forenses trabalham em uma morgue improvisada no Porto de La Guaira, local mais afetado pelos terremotos na Venezuela. Decenas de corpos estão apilados nas instalações marítimas.", "titulo_pt": "Imagens impactantes da morgue improvisada em um porto da Venezuela", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 27782, "titulo": "El problemático consumo de energéticas en niños", "url": "https://www.latercera.com/videos/noticia/el-problematico-consumo-de-energeticas-en-ninos/", "fonte_id": "la_tercera", "data_pub": "2026-06-30T18:29:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O acadêmico Rodrigo Valenzuela, da Universidade de Chile e membro do Comitê de Lácteos, discute o consumo preocupante de bebidas energéticas por crianças. As crianças estão substituindo leites e derivados na sua dieta, que geralmente os incluem, devido ao consumo dessas bebidas.", "titulo_pt": "Consumo problemático de energéticas em crianças", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 27789, "titulo": "Las olas de calor europeas vuelven a poner el aire condicionado en el centro del debate", "url": "https://www.latercera.com/mundo/noticia/las-olas-de-calor-europeas-vuelven-a-poner-el-aire-condicionado-en-el-centro-del-debate/", "fonte_id": "la_tercera", "data_pub": "2026-06-30T17:30:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Temperaturas elevadas, chegando a 42 graus, no verão na França, Reino Unido e Bélgica estão reforçando a necessidade de climatização nos edifícios da Europa.", "titulo_pt": "As ondas de calor europeias voltam a colocar o ar condicionado no centro do debate", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 27847, "titulo": "‘But we’re just 1% of emissions’: do smaller countries’ climate efforts matter?", "url": "https://www.theguardian.com/environment/2026/jun/30/emissions-do-smaller-countries-climate-efforts-matter", "fonte_id": "guardian_world", "data_pub": "2026-06-30T15:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Líderes de nações ricas como o Reino Unido e Alemanha argumentam que suas ações climáticas são insignificantes, citando baixas porcentagens de emissões globais. Por exemplo, Rishi Sunak afirmou em 2023 que, com menos de 1% das emissões mundiais, os britânicos não deveriam ser obrigados a sacrificar mais do que outros.", "titulo_pt": "Mas somos apenas 1% das emissões: importam os esforços climáticos dos países menores?", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 27554, "titulo": "A capital mais poluída do mundo paga até mil dólares para quem trocar veículos por elétricos", "url": "https://exame.com/esg/a-capital-mais-poluida-do-mundo-paga-ate-mil-dolares-para-quem-trocar-veiculos-por-eletricos/", "fonte_id": "exame", "data_pub": "2026-06-30T15:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo de Nova Delhi está oferecendo incentivos para mobilidade sustentável e planeja proibir o uso de motos a combustão até 2028 como parte de uma iniciativa para combater a poluição recorde.", "titulo_pt": "A capital mais poluída do mundo oferece até mil dólares por veículos elétricos", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 27229, "titulo": "Temporal assusta moradores de Blumenau na madrugada e causa alagamento", "url": "https://www.metropoles.com/brasil/temporal-assusta-moradores-de-blumenau-na-madrugada-e-causa-alagamento", "fonte_id": "metropoles", "data_pub": "2026-06-30T12:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Na madrugada, um temporal causou alagamentos em diferentes pontos de Blumenau. A Defesa Civil da cidade foi acionada para atender a diversos relatos de inundação.", "titulo_pt": "Temporal assusta moradores e causa alagamento em Blumenau na madrugada", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27297, "titulo": "“Nos preocupa lo que puede venir”: llovieron más de 200 milímetros en pocas horas en Misiones y hay preocupación por El Niño", "url": "https://www.lanacion.com.ar/economia/campo/mas-de-200-milimetros-en-pocas-horas-un-temporal-encendio-las-alarmas-en-misiones-y-hay-preocupacion-nid29062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T12:18:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Em Colonia Aurora, caiu um volume excepcional de água, e em San Javier foram registrados cerca de 160 milímetros. Os produtores já estão movendo a produção para áreas mais altas e expressam preocupação com o que pode acontecer nos próximos meses.", "titulo_pt": "Nos preocupa o que pode vir: choveu mais de 200 milímetros em poucas horas em Misiones e há preocupação com El Niño", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 27300, "titulo": "Renunció el subsecretario de Ambiente de la Nación, Fernando Brom", "url": "https://www.lanacion.com.ar/sociedad/renuncio-el-subsecretario-de-ambiente-de-la-nacion-fernando-brom-nid30062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T12:14:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Fernando Brom, subsecretário de Ambiente da Nação, renunciou após pouco mais de um ano no cargo. A renúncia foi reconhecida pelo governo por causa de comentários públicos inadequados e descuidos na administração.", "titulo_pt": "Subsecretário de Meio Ambiente da Nación Renuncia", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 27210, "titulo": "Alerta de tempestade e granizo no Sul e SP é emitido pelo Inmet; veja", "url": "https://www.cnnbrasil.com.br/nacional/sul/alerta-de-tempestade-e-granizo-no-sul-e-sp-e-emitido-pelo-inmet-veja/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T11:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um alerta de tempestade e granizo foi emitido pelo Inmet para os estados do Sul do Brasil e o litoral paulista nesta terça-feira (30). O aviso abrange áreas que podem ser afetadas por perigos potenciais relacionados ao mau tempo.", "titulo_pt": "Alerta de tempestade e granizo no Sul e SP é emitido pelo Inmet; veja", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 27250, "titulo": "Clima no Brasil pode mudar drasticamente com El Niño prolongado", "url": "https://olhardigital.com.br/2026/06/30/ciencia-e-espaco/clima-no-brasil-pode-mudar-drasticamente-com-el-nino-prolongado/", "fonte_id": "olhar_digital", "data_pub": "2026-06-30T11:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O El Niño pode afetar o Brasil por anos, de acordo com órgãos oficiais. As previsões indicam um contraste nas chuvas, calor intenso e impactos regionais.", "titulo_pt": "Clima no Brasil pode mudar drasticamente com El Niño prolongado", "veiculo": "Olhar Digital", "pais": "Brasil", "classe": "C"}, {"id": 27376, "titulo": "Iraq’s 14 million barrels of trapped oil travels through Strait of Hormuz", "url": "https://www.scmp.com/news/world/middle-east/article/3358920/iraqs-14-million-barrels-trapped-oil-travels-through-strait-hormuz?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T11:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O petróleo iraquiano que estava preso devido ao conflito no Oriente Médio saiu do Golfo Pérsico nas últimas dez dias, com cerca de 14 milhões de barris saindo em junho. As embarcações transportaram o óleo para compradores na Ásia, Europa e Estados Unidos através da Desembocadura do Hormuz, durante um cessar-fogo instável entre EUA e Irã.", "titulo_pt": "14 milhões de barris de petróleo iraquiano escapam do Golfo Pérsico", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 27251, "titulo": "Chuva forte ou tempo seco? Veja como fica o clima na sua região nesta semana", "url": "https://olhardigital.com.br/2026/06/30/ciencia-e-espaco/chuva-forte-ou-tempo-seco-veja-como-fica-o-clima-na-sua-regiao-nesta-semana/", "fonte_id": "olhar_digital", "data_pub": "2026-06-30T11:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A semana no Brasil apresentará condições climáticas variadas, com frente fria causando chuva forte no Sul e Norte do país, enquanto o tempo seco será predominante nas outras regiões.", "titulo_pt": "Chuva forte ou tempo seco? Confira como é o clima na sua região nesta semana", "veiculo": "Olhar Digital", "pais": "Brasil", "classe": "C"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 27609, "titulo": "Justiça condena guarda de BH por dizer que \"preto bom é preto morto\"", "url": "https://www.metropoles.com/minas-gerais/justica-condena-guarda-de-bh-por-dizer-preto-bom-e-preto-morto", "fonte_id": "metropoles", "data_pub": "2026-06-30T18:47:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um servidor público foi condenado por dizer que 'preto bom é preto morto' durante um seminário na Prefeitura de Belo Horizonte. A decisão judicial reconheceu a ofensa à coletividade negra.", "titulo_pt": "Justiça condena servidor por frase racista sobre pretos", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27610, "titulo": "Brasil fica em 75º em ranking global de impunidade, segundo estudo", "url": cipar de equipes que não correspondem ao sexo atribuído no nascimento.", "titulo_pt": "A decisão do Supremo sobre esportes para pessoas transexuais serve como advertência para advogados da esquerda", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 27629, "titulo": "Decisão mantém julgamento de uma das oito denúncias de assédio contra Melhem", "url": "https://veja.abril.com.br/brasil/decisao-mantem-julgamento-de-uma-das-oito-denuncias-de-assedio-contra-melhem/", "fonte_id": "veja", "data_pub": "2026-06-30T18:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A 3ª Câmara Criminal do TJ-RJ analisou um pedido de habeas corpus apresentado pela defesa do ex-diretor de humor da Globo no processo relacionado a uma das oito denúncias de assédio contra ele.", "titulo_pt": "Decisão mantém julgamento de uma das oito denúncias de assédio contra ex-diretor de humor da Globo", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27849, "titulo": "Like being ‘stabbed in the back’: abuse survivors left without trials after Christian Brothers’ unprecedented legal tactic", "url": "https://www.theguardian.com/world/2026/jul/01/like-being-stabbed-in-the-back-abuse-survivors-left-without-trials-after-christian-brothers-unprecedented-legal-tactic-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-06-30T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um sobrevivente de abuso sente que foi traído após o seu julgamento ser interrompido no último momento, devido a uma tática legal inédita adotada pelos Irmãos Cristãos. Essa ordem agora quer estabelecer um próprio esquema fora do tribunal para pagar os sobreviventes, embora estes tenham sido informados que não receberão o montante total a que têm direito.", "titulo_pt": "Como ser 'picado por trás': sobreviventes de abuso deixados sem julgamentos após tática legal inédita dos Irmãos Cristãos", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 27944, "titulo": "US Supreme Court upholds state bans on transgender athletes in school", "url": "https://www.lemonde.fr/en/international/article/2026/06/30/us-supreme-court-upholds-state-bans-on-transgender-athletes-in-school_6755014_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-30T14:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Suprema Corte dos Estados Unidos, com uma maioria de 6 a 3, manteve as leis estatais que proíbem atletas transexuais de competir em esportes femininos escolares.", "titulo_pt": "Suprema Corte dos EUA mantém proibição de atletas transexuais em esportes femininos escolares", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 28204, "titulo": "Joint statement by the Committee on the Rights of the Child and UNICEF on the plight of migrant children in South Africa", "url": "https://www.unicef.org/press-releases/joint-statement-committee-rights-child-and-unicef-plight-migrant-children-south", "fonte_id": "unicef", "data_pub": "2026-06-30T14:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Comissão dos Direitos da Criança e a UNICEF emitiram uma declaração conjunta sobre as dificuldades enfrentadas por crianças migrantes na África do Sul. A declaração destaca os desafios específicos que essas crianças enfrentam.", "titulo_pt": "Declaração conjunta da Comissão dos Direitos da Criança e UNICEF sobre a situação de crianças migrantes na África do Sul", "veiculo": "UNICEF Global", "pais": "Global", "classe": "A"}, {"id": 27988, "titulo": "South African protesters call for undocumented migrants to leave", "url": "http://www.euronews.com/video/2026/06/30/south-african-protesters-call-for-undocumented-migrants-to-leave", "fonte_id": "euronews", "data_pub": "2026-06-30T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Protestantes anti-imigrantes marcharam em Durban pedindo a saída de imigrantes ilegais, conforme solicitado pelo movimento March and March. A polícia esteve presente no local.", "titulo_pt": "Protestantes anti-imigrantes chamam para expulsão de imigrantes ilegais na África do Sul", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 28043, "titulo": "How six months in Israeli jail changed this Palestinian journalist’s life forever", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/how-six-months-israeli-jail-changed-palestinian-journalists-life-forever", "fonte_id": "middle_east_eye", "data_pub": "2026-06-30T13:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mujahid Bani Mufleh, um jornalista palestino de 36 anos, sofreu mudanças significativas após passar seis meses na prisão israelense sem acusação ou julgamento. Sua aparência alterou-se drasticamente, com ele aparecendo magro e frágil, com olhos sunken e parecendo mais velho do que quando entrou em prisão.", "titulo_pt": "Como seis meses na prisão israelense mudaram a vida deste jornalista palestino para sempre", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 27359, "titulo": "Balkan LGBTQ+ Communities Need Freedom All Year, Not Just at Pride", "url": "https://balkaninsight.com/2026/06/30/balkan-lgbtq-communities-need-freedom-all-year-not-just-at-pride/bi/", "fonte_id": "balkan_insight", "data_pub": "2026-06-30T11:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ao encerrar o mês de Pride, a pergunta principal não é sobre o número de pessoas que participaram das marchas, mas sim se as pessoas LGBTQ+ sentem-se mais seguras durante todo o ano.", "titulo_pt": "Comunidades LGBTQ+ do Bálcãs Necessitam de Liberdade ao Longo do Ano Todo, Não Só Durante a Pride", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}, {"id": 26830, "titulo": "Torturado, abusado e morto pelo pai adotivo: o caso do bebê Preston", "url": "https://veja.abril.com.br/coluna/mundialista/torturado-abusado-e-morto-pelo-pai-adotivo-o-caso-do-bebe-preston/", "fonte_id": "veja", "data_pub": "2026-06-30T10:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O indivíduo responsável pelo abuso foi condenado, mas há suspeitas de que os assistentes sociais ignoraram evidências claras por medo de homofobia.", "titulo_pt": "Torturado, abusado e morto pelo pai adotivo: o caso do bebê Preston", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 26431, "titulo": "Regla oficial del DHS: quiénes deben registrarse y dar sus huellas para evitar multas o cárcel", "url": "https://www.lanacion.com.ar/estados-unidos/visas-y-tramites/regla-oficial-del-dhs-quienes-deben-registrarse-y-dar-sus-huellas-para-evitar-multas-o-carcel-nid30062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T10:17:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A nova regra do DHS nos Estados Unidos determina quais indivíduos devem se registrar e fornecer suas impressões digitais, além das sanções previstas para aqueles que não o fizerem. O título em português é: 'Regra oficial do DHS: quem deve se registrar e fornecer as impressões digitais para evitar multas ou prisão nos EUA'.", "titulo_pt": "Regra oficial do DHS: quem deve se registrar e fornecer as impressões digitais para evitar multas ou prisão nos EUA", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 26660, "titulo": "What will Hong Kong’s proposed reforms to sexual offences laws change?", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3358898/what-will-hong-kongs-proposed-reforms-sexual-offences-laws-change?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T09:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As autoridades de Hong Kong propuseram uma reforma abrangente das leis sobre crimes sexuais da cidade, incluindo ampliar a definição de estupro, introduzir novos delitos envolvendo atos não consensuais com crianças e pessoas com deficiência mental, definir uma idade mínima consentida uniforme em 16 anos e remover disposições específicas de gênero. As propostas estão sendo consultadas publicamente durante um mês.", "titulo_pt": "O que as reformas propostas sobre leis de crimes sexuais em Hong Kong mudarão?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 26422, "titulo": "ADPF 1339: as mulheres trans e a cota de gênero nas eleições", "url": "https://www.jota.info/opiniao-e-analise/artigos/adpf-1339-as-mulheres-trans-e-a-cota-de-genero-nas-eleicoes", "fonte_id": "jota", "data_pub": "2026-06-30T08:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal (STF) pode decidir sobre uma ação que busca eliminar uma interpretação considerada um claro retrocesso social para mulheres trans no sistema de cotas de gênero nas eleições.", "titulo_pt": "ADPF 1339: as mulheres trans e a cota de gênero nas eleições", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 26528, "titulo": "Arrests Spike as Vietnam Sees New ‘Wave of Repression,’ Rights Group Says", "url": "https://thediplomat.com/2026/06/arrests-spike-as-vietnam-sees-new-wave-of-repression-rights-group-says/", "fonte_id": "the_diplomat", "data_pub": "2026-06-30T02:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de advocacy baseado em Bangkok registrou 56 prisões políticas no ano passado, o maior número desde 2018. Segundo uma organização dos direitos humanos, há um novo 'válio de repressão' na Vietnã.", "titulo_pt": "Prisões Políticas Spike como Nova ‘Válvula de Repressão’ no Vietnã, Diz Grupo de Direitos Humanos", "veiculo": "The Diplomat", "pais": "Japão", "classe": "B"}], "direitos_humanos__eventos": []}, "noticias": [{"id": 26814, "fonte_id": "its_nice_that", "titulo": "Falling under the map: Sasha Yazov’s airbrush art of The Sims turns pixels to paint", "url": "https://www.itsnicethat.com/articles/sasha-yazov-art-project-300626", "data_pub": "2026-07-02T08:00:00Z", "topico": "cultura", "idioma" let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">
      <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
      <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
      <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
      <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
    </div>` : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

function proximaAtualizacao() {

  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}

const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices();
    return (
      vs.find(function (v) { return v.lang === 'pt-BR'; }) ||
      vs.find(function (v) { return v.lang.startsWith('pt'); }) ||
      null
    );
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // sempre a .sumario imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
</body>
</html>
