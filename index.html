<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=author@400&display=swap" rel="stylesheet">
<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 18/07/2026 10:00 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">
    <div class="modal-erro" id="senha-erro" style="display:none">Senha incorreta.</div>
    <div class="modal-btns">
      <button class="btn-sec2" onclick="fecharModal('modal-senha')">Cancelar</button>
      <button class="btn-pri" onclick="verificarSenha()">Entrar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>
      <option value="classificacao_errada">Classificação errada</option>
      <option value="resumo_impreciso">Resumo impreciso</option>
      <option value="outro">Outro</option>
    </select>
    <label for="flag-nota">Nota (opcional)</label>
    <textarea id="flag-nota" placeholder="Descreva o problema..."></textarea>
    <div class="modal-btns">
      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "18/07/2026 10:00", "stats": {"noticias_novas": 640, "resumos_gerados": 225}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O ministro Alexandre de Moraes, do STF, manteve a domiciliar do ex-presidente Jair Bolsonaro e impôs novas restrições. Isso gerou reações dos filhos de Bolsonaro. Paralelamente, a comissão aprovou isenção do Imposto de Renda para profissionais da segurança pública, incluindo policiais e peritos. A bolsa de valores enfrenta pressões após o tarifaço, com o Ibovespa acumulando um mês negativo. Além disso, as convenções partidárias começam em 20 de julho, definindo os candidatos para as eleições. O governo Lula considera incluir um aporte menor nos Correios na proposta de Orçamento para 2027, abaixo do valor exigido pelos bancos que financiaram o empréstimo.", "mundo": "O conflito entre Ucrânia e Rússia continua, com ataques a instalações logísticas russas que resultaram na morte de sete trabalhadores. O Irã intensificou seus ataques contra alvos nos Estados Unidos, incluindo um ataque que danificou um complexo petroquímico no Kuwait. Em resposta, o governo alemão anunciou novas medidas para combater fraude fiscal e lavagem de dinheiro. No Canadá, metade dos incêndios florestais ocorre em áreas remotas inatingíveis, dificultando sua extinção. Na África, as autoridades do Laos não conseguiram determinar a causa das mortes de turistas relacionadas ao metanol, enquanto um novo centro de apoio para refugiados foi inaugurado na capital etíope Addis Ababa. Durante uma reunião técnica em Washington, o presidente eleito Luiz Inácio Lula da Silva evitou confronto direto com a primeira-ministra italiana Giorgia Meloni.\n\nOs Estados Unidos intensificaram suas operações militares contra o Irã, com ataques que se estendem pela sétima noite consecutiva. Na quinta noite, as Forças Armadas americanas anunciaram novos bombardeios, aumentando a tensão no Golfo Pérsico e ameaçando esforços para reabrir o Estreito de Ormuz. Em resposta, forças iranianas atacaram aliados e bases americanas na região, incluindo a base aérea de Ali Al Salem em Kuwait, levantando preocupações sobre a escalada da guerra. Além disso, ataques de drones ucranianos na Rússia resultaram em sete mortes e ferimentos para pelo menos 25 pessoas.", "economia": "A economia climática está emergindo como uma das maiores transformações econômicas futuras, comparada por especialistas à Revolução Digital. A China planeja aumentar as vendas no varejo para US$ 8,8 trilhões até 2030. Nesse cenário macroeconômico desafiador, a inteligência artificial se destaca, com ações relacionadas ao tema apresentando um aumento de 20% no primeiro semestre. A rotatividade recorde entre diretores financeiros indica uma transformação silenciosa na natureza do trabalho desses profissionais. No Estados Unidos, as IPOs de energia estão disparados aproveitando a demanda por oportunidades relacionadas ao boom da inteligência artificial.", "tecnologia": "A Índia realizou o voo inaugural de seu primeiro foguete orbital privado, o Vikram-1, construído pela Skyroot Aerospace, no Centro Espacial Satish Dhawan em Sriharikota. Este lançamento representa um passo significativo para o país no cenário global da economia espacial e reforça sua presença na exploração do espaço. Paralelamente, a China apresentou seu sistema de alerta climático AI MAZU como um bem público exportável durante a Conferência Mundial de Inteligência Artificial (WAIC) em Shanghai, visando 30 países no Global South nos próximos cinco anos. Em outro desenvolvimento, a Índia lançou com sucesso seu primeiro foguete orbital privado, o Vikram-1, construído pela Skyroot Aerospace, no Centro Espacial Satish Dhawan em Sriharikota. Este evento marca um importante avanço na economia espacial indiana e reforça sua presença global.", "ciencia": "A Organização das Nações Unidas pretende incluir vários locais na lista de tesouros mundiais em perigo, devido a conflitos ou mudanças climáticas. Essa lista incluirá um local bíblico, castelos libaneses, uma rota de migração de antílopes e o lago mais profundo do mundo. Em pesquisa científica, foi identificado um mecanismo natural que funcionava como um 'termostato', ajudando a prevenir mudanças climáticas extremas na Terra ao longo de milhões de anos. Além disso, uma vacina peptídica contra tumores cerebrais mostrou resultados promissórios em ensaios clínicos, treinando especificamente o sistema imunológico para combater células tumorais com mutações específicas. Outro estudo revelou como memórias negativas podem interferir no sono à noite, destacando a relação entre memória e sono. Finalmente, a Skyroot Aerospace lançou com sucesso seu foguete Vikram-1 em sua primeira missão, tornando-se o primeiro fogueto comercial indiano a alcançar a órbita.", "cultura": "No DF Instrumental Fest 2026, transmitido ao vivo pela Rádio Nacional Brasília FM e AM, o evento celebra a música instrumental no sábado (18), com apresentações de artistas como Tom Zé, Metá Metá e Edgard Scandurra Trio. Em outro destaque cultural, a antiga Tapestry de Bayeux, uma obra histórica que retrata as façanhas de Guilherme, o Conquistador, foi transferida para Londres para um exame de conservação antes de ser exibida no British Museum. A literatura também é tema com o estudo sobre o aumento e declínio dos romances de celular japoneses por Josh Cook na Porter Square Review of Books. O filme 'Into the Wild' inspirou uma vida de aventura, mas seu autor aprendeu que um escapismo contínuo pode ter custos significativos. Além disso, o documentário 'Pompeii: Out of Time With Tom Hiddleston' explora a erupção vulcânica que devastou Pompeia em 79 d.C., misturando história e talento ator com expertise acadêmica.", "sociedade": "A desinformação na área de saúde já se tornou um risco sanitário significativo, conforme alerta o Jota. Famílias migrantes, especialmente aquelas com medo da intervenção do ICE, estão aprendendo a se preparar melhor para possíveis situações, como memorizar números importantes e estabelecer diretrizes de segurança para os menores em casa, conforme relatado pela La Nación. Para aumentar as taxas de natalidade, diversos governos estão implementando subsídios como creches gratuitas e ajuda no salário das babás, segundo o Veja. No Brasil, a empresa Korin, pioneira na produção de frango orgânico, opera com base nos preceitos da Igreja Messiânica para oferecer alimentos livres de antibióticos e agrotóxicos, destacando-se em um mercado em expansão, conforme informa o Exame. Além disso, as capitais brasileiras como Rio de Janeiro, Belo Horizonte e São Paulo avançam contra a publicidade de apostas, enquanto o Congresso Nacional discute um projeto de lei que amplia essa proibição, e o governo federal endurece as regras para o setor. Em Hong Kong, a Sociedade de Exames Secundários (DSE) enfrenta um desafio significativo com a oferta limitada de vagas nas universidades públicas, deixando cerca de 85% dos estudantes do sétimo ano do ensino médio buscando opções de educação terciária local, conforme relata o SCMP.", "meio_ambiente": "Um sistema frontal que atingiu o país é considerado o mais intenso dos últimos 30 anos, devido à sua extensão geográfica e magnitude simultânea. Especialistas compararam esse evento com os temporais de 1982 e 1997, sugerindo que ele pode estar entre os fenômenos mais extremos do século. Em São Paulo, a Prefeitura plantou 480.108 árvores desde 2021 em diversas áreas da cidade, incluindo ruas, parques e praças. O hospital Moinhos de Vento está plantando uma árvore nativa a cada bebê nascido, totalizando mais de 11 mil mudas que ocupam cerca de 66 mil metros quadrados e estima capturar 1,8 mil toneladas de carbono em três anos. Em um contexto global, incêndios florestais intensos estão agravando as crises climáticas, forçando os bombeiros a fazer escolhas difíceis, enquanto um estudo descobriu microplásticos em uma grande maioria dos produtos de alimentos infantis analisados.", "direitos_humanos": "A ONU celebrou os direitos das mulheres no contexto da revisão da Lei Imperial do Palácio no Japão, que mantinha a regra de sucessão limitada aos membros masculinos. No entanto, o país enfrenta uma crise na sucessão real por falta de herdeiros. Em contraste, um ativista na Índia foi hospitalizado após 20 dias de greve de fome, levando a tensões entre os protestantes e as autoridades policiais. A Frontex continua sua missão na Grécia apesar de graves violações dos direitos dos migrantes, conforme mostram documentos da investigação do Le Monde, que indicam ineficácia em responder às advertências emitidas pela Seção de Direitos Humanos da agência europeia. Estes eventos refletem a diversidade de desafios e avanços na defesa dos direitos humanos ao redor do mundo."}, "resumo_do_dia": {"politica_nacional": [{"id": 58367, "titulo": "Tarifas: o “nem-nemismo” da imprensa é covardia e falta de ler Sartre", "url": "https://www.metropoles.com/colunas/reinaldo-azevedo/tarifas-o-nem-nemismo-da-imprensa-e-covardia-e-falta-de-ler-sartre", "fonte_id": "metropoles", "data_pub": "2026-07-18T12:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Setores da imprensa declararam um empate entre Lula e Flávio Bolsonaro, como se a questão de soberania ou entrega fosse uma questão subjetiva. O autor critica essa postura como covardia e falta de compreensão das ideias de Sartre.", "titulo_pt": "Tarifas: o ‘nem-nemismo’ da imprensa é covardia e falta de ler Sartre", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 58322, "titulo": "Comissão aprova isenção de Imposto de Renda na segurança pública", "url": "https://www.poder360.com.br/poder-congresso/projeto-isenta-profissionais-de-seguranca-publica-do-ir/", "fonte_id": "poder360", "data_pub": "2026-07-18T11:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A comissão aprovou isenção do Imposto de Renda para profissionais da segurança pública, incluindo policiais, peritos, guardas, agentes de trânsito e socioeducativos, bem como para aqueles que estão inativos.", "titulo_pt": "Comissão aprova isenção de Imposto de Renda para segurança pública", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 58442, "titulo": "Leia íntegra da decisão do Moraes que mantém domiciliar de Bolsonaro", "url": "https://www.cnnbrasil.com.br/politica/leia-integra-da-decisao-do-moraes-que-mantem-domiciliar-de-bolsonaro/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-18T11:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro do STF (Supremo Tribunal Federal) Alexandre de Moraes manteve a domiciliar do ex-presidente Jair Bolsonaro e impôs novas restrições ao ex-chefe de Estado.", "titulo_pt": "Leia íntegra da decisão de Moraes que mantém domiciliar de Bolsonaro", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 58323, "titulo": "Aplicativo do título de eleitor ganha novas funções", "url": "https://www.poder360.com.br/poder-eleicoes/justica-eleitoral-amplia-servicos-do-aplicativo-para-eleitores/", "fonte_id": "poder360", "data_pub": "2026-07-18T11:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O aplicativo do título de eleitor recebeu novas funcionalidades, permitindo justificar ausências por geolocalização, pagar multas e acompanhar pedidos feitos à Justiça Eleitoral.", "titulo_pt": "Aplicativo do título de eleitor ganha novas funções", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 58324, "titulo": "Bolsa perde fôlego com tarifaço e pode ter 5º mês negativo", "url": "https://www.poder360.com.br/poder-economia/bolsa-perde-folego-com-tarifaco-e-pode-ter-5o-mes-negativo/", "fonte_id": "poder360", "data_pub": "2026-07-18T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A bolsa de valores perdeu força após o anúncio do tarifaço, com o Ibovespa acumulando um mês com alta de apenas 0,98%. Em julho, até a segunda-feira (13.jul), o índice tinha avançado 2,16%.", "titulo_pt": "Bolsa perde fôlego após tarifaço e pode ter quinto mês negativo", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 58345, "titulo": "Agenda travada no Congresso põe no limbo projetos prioritários do governo Lula", "url": "https://veja.abril.com.br/brasil/agenda-travada-no-congresso-poe-no-limbo-projetos-prioritarios-do-governo-lula/", "fonte_id": "veja", "data_pub": "2026-07-18T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A agenda ocupada no Congresso impede o andamento de projetos importantes para o governo Lula. Dificuldades na articulação política, início do recesso e calendário eleitoral contribuem para atrasar a tramitação legislativa.", "titulo_pt": "Agenda ocupada no Congresso coloca em suspenso projetos prioritários do governo Lula", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 58325, "titulo": "FGC tem R$ 1,8 bilhão à espera de clientes do grupo Master", "url": "https://www.poder360.com.br/poder-economia/fgc-tem-r-18-bilhao-a-espera-de-clientes-do-grupo-master/", "fonte_id": "poder360", "data_pub": "2026-07-18T10:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Fundo de Garantia do Crédito (FGC) possui R$ 1,8 bilhão disponíveis para resgate pelos clientes do grupo Master; esses valores não recebem correção monetária desde a liquidação dos bancos envolvidos.", "titulo_pt": "FGC tem R$ 1,8 bi à disposição de clientes do Master", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 58374, "titulo": "Master repassou R$ 357 milhões em créditos a fundo citado na Carbono Oculto", "url": "https://www.metropoles.com/sao-paulo/master-repassou-r-357-milhoes-em-creditos-a-fundo-citado-na-carbono-oculto", "fonte_id": "metropoles", "data_pub": "2026-07-18T10:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O documento relata a repasses de R$ 357 milhões em créditos do banco Master a terceiros, ligados à investigação da Carbono Oculto. Este é apenas um dos itens de uma lista anexada a uma ação judicial.", "titulo_pt": "Master repassou R$ 357 milhões em créditos a fundos citados na Carbono oculta", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 58326, "titulo": "Flávio Bolsonaro promete celulares e internet de graça para mulheres", "url": "https://www.poder360.com.br/poder-eleicoes/flavio-bolsonaro-promete-celulares-e-internet-de-graca-para-mulheres/", "fonte_id": "poder360", "data_pub": "2026-07-18T10:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Flávio Bolsonaro, pré-candidato à Presidência pelo PL, afirmou que já conversou com empresas de telefonia móvel que se comprometeram a apoiar sua proposta de oferecer celulares e internet gratuitas para mulheres.", "titulo_pt": "Flávio Bolsonaro promete celulares e internet grátis para mulheres", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 58327, "titulo": "Convenções partidárias começam em 20 de julho", "url": "https://www.poder360.com.br/poder-eleicoes/convencoes-partidarias-comecam-em-20-de-julho/", "fonte_id": "poder360", "data_pub": "2026-07-18T10:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As convenções partidárias começam em 20 de julho e definirão os candidatos. Os pedidos de registro desses candidatos na Justiça Eleitoral devem ser feitos até o dia 15 de agosto.", "titulo_pt": "Convenções partidárias começam em 20 de julho", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 58333, "titulo": "Tarot do dia: previsão para os 12 signos em 18/07/2026", "url": "https://www.cartacapital.com.br/astrologia/tarot-do-dia-previsao-para-os-12-signos-em-18-07-2026/", "fonte_id": "cartacapital", "data_pub": "2026-07-18T10:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O tarot indica que o sábado trará momentos de escolhas e amadurecimento, com a necessidade de romper padrões limitantes para permitir crescimento. A energia favorecerá encontros, estabilidade e novas oportunidades, incentivando a agir com consciência.", "titulo_pt": "Tarot do dia: previsão para os 12 signos em 18/07/2026", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 58375, "titulo": "Vereador pede que MPSP apure evento de R$ 5 milhões no Anhangabaú", "url": "https://www.metropoles.com/sao-paulo/mpsp-evento-prefeitura-anhangabau", "fonte_id": "metropoles", "data_pub": "2026-07-18T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Prefeitura de São Paulo contratou a empresa Now Sports por R$ 5 milhões, sem licitação, para realizar o evento Fan Zone Anhangabaú. Um vereador solicitou que a MPSP ( MediaTek Public Security ) investigasse esse contrato.", "titulo_pt": "Vereador pede apuração de contrato de R$ 5 milhões para evento no Anhangabaú", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 58328, "titulo": "Comissão aprova reestruturação do quadro de pessoal do TRT da 4ª Região", "url": "https://www.poder360.com.br/poder-congresso/comissao-aprova-reestruturacao-do-quadro-de-pessoal-do-trt-da-4a-regiao/", "fonte_id": "poder360", "data_pub": "2026-07-18T09:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A comissão aprovou um projeto do TST que cria 165 funções comissionadas e 7 cargos em comissão para o Tribunal Regional Federal da 4ª Região. O projeto agora será analisado pelo plenário da Câmara.", "titulo_pt": "Comissão aprova criação de 165 funções comissionadas e 7 cargos em comissão no TRT da 4ª Região", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 58376, "titulo": "Filhos de Bolsonaro reagem à proibição de visita ao pai por 30 dias", "url": "https://www.metropoles.com/brasil/filhos-bolsonaro-reagem-proibicao-visita-pai", "fonte_id": "metropoles", "data_pub": "2026-07-18T09:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os filhos de Jair Bolsonaro, Flávio, Eduardo, Carlos e Jair Renan, criticaram a decisão do ministro Alexandre Moraes que proibiu temporariamente as visitas ao presidente por 30 dias.", "titulo_pt": "Filhos de Bolsonaro se posicionam contra proibição de visita ao pai", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 58312, "titulo": "Partidos criam mecanismos para fiscalizar candidaturas femininas", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/partidos-criam-mecanismos-para-fiscalizar-candidaturas-femininas.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-18T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Dos oito partidos com mais assentos na Câmara dos Deputados, o MDB e o União Brasil implementaram mecanismos para incentivar candidaturas femininas e fiscalizar as prestações de contas das campanhas após casos de fraude à cota de gênero nas eleições.", "titulo_pt": "Partidos criam mecanismos para incentivar e fiscalizar candidaturas femininas", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 58330, "titulo": "Após se opor ao acordo, Irlanda quer ampliar comércio com Mercosul", "url": "https://www.poder360.com.br/poder-internacional/apos-se-opor-ao-acordo-irlanda-quer-ampliar-comercio-com-mercosul/", "fonte_id": "poder360", "data_pub": "2026-07-18T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Irlanda expressou interesse em expandir o comércio com o Mercosul após se opor ao acordo entre a União Europeia e o bloco sul-americano. O embaixador irlandês Martin Gallagher considera o Brasil um mercado 'estável e aberto'.", "titulo_pt": "Irlanda busca ampliar comércio com Mercosul após contrapor-se a acordo", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 58703, "titulo": "Ukrainian drone strikes on Russian warehouses kill 7", "url": "https://www.dw.com/en/ukrainian-drone-strikes-on-russian-warehouses-kill-7/a-78018446?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-18T12:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Drones ucranianos atacaram depósitos e uma estação de combustível na Rússia, resultando na morte de sete trabalhadores da noite. Kyiv afirmou que as instalações forneciam componentes para drones e equipamentos de navegação.", "titulo_pt": "Ataques de drones ucranianos matam 7 em depósitos russos", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 58704, "titulo": "Germany: CDU's Jens Spahn resigns amid surrogacy controversy", "url": "https://www.dw.com/en/germany-cdu-s-jens-spahn-resigns-amid-surrogacy-controversy/a-78019238?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-18T12:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Jens Spahn, membro do CDU (Partido Unido Cristiano-Democrata), renunciou após uma controvérsia relacionada a um caso de surrogacia. A surrogacia não é permitida na Alemanha e o partido se opõe à sua legalização.", "titulo_pt": "Alemanha: Jens Spahn, do cdu, renuncia em meio a controvérsia sobre surrogacia", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 58603, "titulo": "Irán ataca bases militares de EE.UU. en Kuwait y Baréin tras ofensiva estadounidense", "url": "https://www.latercera.com/mundo/noticia/iran-ataca-bases-militares-de-eeuu-en-kuwait-y-barein-tras-ofensiva-estadounidense/", "fonte_id": "la_tercera", "data_pub": "2026-07-18T12:02:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Guarda Revolucionária iraniana atacou bases militares dos Estados Unidos em Kuwait e Baréin. Os ataques incluíram um radar, um hangar de manutenção de armas e um refúgio de drones na base de Ali al Salem, em Kuwait, além da base de aeronaves em Baréin.", "titulo_pt": "Irã ataca bases militares dos EUA em Kuwait e Baréin após ofensiva americana", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 58821, "titulo": "Weather weapons: why the atmosphere could become the next geopolitical battleground", "url": "https://www.scmp.com/news/china/diplomacy/article/3360967/weather-weapons-why-atmosphere-could-become-next-geopolitical-battleground?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-18T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Desastres climáticos como as cheias que atingiram Assam, no nordeste da Índia, em 2018, levantaram preocupações sobre a possibilidade de o controle do clima se tornar uma ferramenta de pressão geopolítica ou até mesmo um meio de guerra. A principal preocupação centrou-se na vizinha China.", "titulo_pt": "Armas climáticas: por que o clima poderia se tornar o próximo cenário de disputa geopolitical", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 58568, "titulo": "Most Forest Fires in Canada Are Simply Impossible to Put Out", "url": "https://www.nytimes.com/2026/07/18/world/canada/wildfires-canada-fire-fighting.html", "fonte_id": "nyt_world", "data_pub": "2026-07-18T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A metade dos incêndios florestais no Canadá ocorre em áreas remotas sem acesso por estradas, tornando-os inatingíveis e frequentemente deixados para queimar.", "titulo_pt": "Metade dos incêndios florestais no canadá são simplesmente inatingíveis", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 58648, "titulo": "Opinion: The continued courage of Captain Sully", "url": "https://www.npr.org/2026/07/18/nx-s1-5882194/opinion-the-continued-courage-of-captain-sully", "fonte_id": "npr_news", "data_pub": "2026-07-18T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O piloto reformado Chesley 'Sully' Sullenberger, famoso por pousar com segurança um avião no rio Hudson em 2009, anunciou recentemente que foi diagnosticado com Alzheimer.", "titulo_pt": "Opinião: a continuada coragem do capitão Sully", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 58662, "titulo": "Russian online retail warehouses hit by deadly Ukrainian strikes", "url": "https://www.bbc.co.uk/news/articles/clyxlm877p2o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-18T11:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Drones atacaram instalações de armazenamento da Wildberries perto de Moscou e em Tambov, na Rússia. O líder ucraniano classificou-as como importantes infraestruturas logísticas fornecendo componentes sujeitos a sanções.", "titulo_pt": "Instalações de comércio eletrônico da Rússia alvo de ataques ucranianos", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 58663, "titulo": "US strikes hit Iran for seventh consecutive night", "url": "https://www.bbc.co.uk/news/articles/cy748n8zx8ro?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-18T11:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Irã reagiu contra aliados dos Estados Unidos na região, com o Kuwait relatando que um parque de geração de energia e água foi atingido.", "titulo_pt": "EUA realizam ataques à Irã pela sétima noite consecutiva; kuwait relata dano a planta de energia", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 58809, "titulo": "(3rd LD) Fire breaks out at Coupang logistics center in Incheon", "url": "https://en.yna.co.kr/view/AEN20260718000853320", "fonte_id": "yonhap_news", "data_pub": "2026-07-18T11:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio ocorreu em um centro de logística operado pela Coupang na cidade de Incheon.", "titulo_pt": "Incêndio atinge centro de logística da Coupang em Incheon", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 58742, "titulo": "Iran strikes Saudi Arabia for first time in months", "url": "https://www.ft.com/content/e8e8adc5-7c56-45a8-99fc-bb5acfda263e?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-18T11:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ataques iranianos a Arábia Saudita marcam o primeiro ataque do Irã contra o país vizinho desde meses, comprometendo esforços para reabrir o Estreito de Ormuz.", "titulo_pt": "Irã ataca arábia saudita pela primeira vez em meses", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 58705, "titulo": "Germany cracks down on money laundering, tax fraud", "url": "https://www.dw.com/en/germany-cracks-down-on-money-laundering-tax-fraud/a-78011524?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-18T11:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo alemão planeja combater fraude fiscal, lavagem de dinheiro e ativos obtidos ilegalmente através de mais auditorias e penalidades mais severas.", "titulo_pt": "Alemanha intensifica medidas contra fraudes fiscais e lavagem de dinheiro", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 58567, "titulo": "They Called Sam Neill ‘Skux.’ (It Was a Compliment.)", "url": "https://www.nytimes.com/2026/07/18/world/australia/new-zealand-sam-neill-skux-meaning.html", "fonte_id": "nyt_world", "data_pub": "2026-07-18T11:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O termo neozelandês 'Skux', que remonta aos anos 1990, foi reintroduzido nas homenagens ao ator Sam Neill, falecido na terça-feira.", "titulo_pt": "Eles chamavam Sam Neill de ‘Skux’. (era um elogio.)", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 58562, "titulo": "Iran War Live Updates: Fighting Intensifies With Strikes on Critical Infrastructure", "url": "https://www.nytimes.com/live/2026/07/18/world/iran-war-strikes-trump-hormuz", "fonte_id": "nyt_world", "data_pub": "2026-07-18T11:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Desde que o cessar-fogo se rompeu, os Estados Unidos e Irã intensificaram seus ataques, com relatos de instalações de água e outras estruturas sendo alvo.", "titulo_pt": "Atualizações da guerra no Irã: intensificação dos ataques atinge infraestrutura Critical", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 58685, "titulo": "Ethiopian Drill explodes on the streets of Addis Ababa", "url": "https://www.france24.com/en/ethiopian-drill-explodes-on-the-streets-of-addis-ababa", "fonte_id": "france24", "data_pub": "2026-07-18T11:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O gênero de hip hop chamado Drill, agressivo e frequentemente acompanhado por letras violentas, ganhou popularidade rápida nas ruas de Addis Ababa nos últimos meses, dominando bares e clubes noturnos. A rapidez com que o Drill se tornou populoso é atribuída à falta de certeza política e econômica entre os jovens da geração Z.", "titulo_pt": "Drill explode nas ruas de Addis Ababa", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 58744, "titulo": "Ukrainian drone attacks on Russia kill at least 8, wound dozens", "url": "https://www.aljazeera.com/news/2026/7/18/ukrainian-drone-attacks-on-russia-kill-at-least-8-wound-dozens?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-18T11:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "De acordo com autoridades russas, ataques de drones ucranianos causaram baixas civis em depósitos de uma empresa de varejo. A cidade de Kyiv afirma que os locais atacados eram usados para produzir drones.", "titulo_pt": "Ataques de drone ucraniano matam pelo menos 8 e ferem vários na Rússia", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 58665, "titulo": "Laos says it can't determine cause of tourist deaths linked to methanol", "url": "https://www.bbc.co.uk/news/articles/cdx8rj99endo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-18T11:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As autoridades laotian afirmam que não conseguiram determinar a causa das mortes de turistas em 2024, pois exames de autópsia não foram realizados. Isso significa que não há evidências de intoxicação por metanol ou qualquer outra causa.", "titulo_pt": "Laos diz não poder determinar causa das mortes de turistas relacionadas a metanol", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 58420, "titulo": "Economia climática pode criar as próximas gigantes globais", "url": "https://www.infomoney.com.br/mercados/economia-climatica-pode-criar-as-proximas-gigantes-globais/", "fonte_id": "infomoney", "data_pub": "2026-07-18T12:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Especialistas compararam a transição climática à Revolução Digital e alertaram que investidores podem ficar de fora de uma das maiores transformações econômicas dos próximos anos. A economia climática pode criar as próximas gigantes globais.", "titulo_pt": "Economia climática pode criar as próximas gigantes globais", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 58421, "titulo": "De day trade a swing trade: operação de Ivy Hypolito alcançou 10 mil pontos no Índice", "url": "https://www.infomoney.com.br/mercados/de-day-trade-swing-trade-operacao-de-ivy-hypolito-alcancou-10-mil-pontos-no-indice/", "fonte_id": "infomoney", "data_pub": "2026-07-18T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ivy Hypolito realizou uma operação que passou de day trade para swing trade, alcançando um ganho de 10 mil pontos no Índice.", "titulo_pt": "De day trade a swing trade: operação de Ivy Hypolito alcançou 10 mil pontos no Índice", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 58321, "titulo": "China quer elevar vendas no varejo a US$ 8,8 tri até 2030", "url": "https://www.poder360.com.br/poder-china/china-quer-elevar-vendas-no-varejo-a-us-88-tri-ate-2030/", "fonte_id": "poder360", "data_pub": "2026-07-18T11:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O plano visa aumentar as vendas no varejo chinesa para 8,8 trilhões de dólares até 2030, buscando estimular o consumo interno através de incentivos a serviços, veículos, eletrodomésticos e elevação da renda familiar.", "titulo_pt": "China almeja elevar vendas no varejo para US$ 8,8 tri até 2030", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 58422, "titulo": "Os CFOs nunca mudaram tanto de emprego. E isso revela uma transformação silenciosa", "url": "https://www.infomoney.com.br/carreira/os-cfos-nunca-mudaram-tanto-de-emprego-e-isso-revela-uma-transformacao-silenciosa/", "fonte_id": "infomoney", "data_pub": "2026-07-18T11:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A rotatividade recorde entre diretores financeiros indica que o cargo passou a exigir habilidades de liderança, estratégia e condução da transformação dos negócios. Isso revela uma mudança silenciosa na natureza do trabalho desses profissionais.", "titulo_pt": "CFOs nunca trocaram tanto de emprego. E isso mostra uma transformação silenciosa", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 58423, "titulo": "Fundo de IA da Safra rende quase 150% e vira ‘aposta única na vida’", "url": "https://www.infomoney.com.br/onde-investir/fundo-de-ia-da-safra-rende-quase-150-e-vira-aposta-unica-na-vida/", "fonte_id": "infomoney", "data_pub": "2026-07-18T11:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O fundo de inteligência artificial da Safra rendeu quase 150% e se tornou uma 'aposta única na vida' para seus investidores. A gestora afirma ser a primeira no país a lançar um fundo direcionado ao tema.", "titulo_pt": "Fundo de IA da Safra rende quase 150% e vira ‘aposta única na vida’", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 58424, "titulo": "Ações ligadas a IA desafiam cenário macroeconômico e saltam 20% no 1º semestre", "url": "https://www.infomoney.com.br/mercados/acoes-ligadas-a-ia-desafiam-cenario-macroeconomico-e-saltam-20-no-1o-semestre/", "fonte_id": "infomoney", "data_pub": "2026-07-18T11:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ações relacionadas à inteligência artificial apresentaram um desempenho notável, aumentando 20% no primeiro semestre. Este resultado se destaca em um cenário macroeconômico desafiador, marcado por altas taxas de inflação e expectativa de juros elevados nos Estados Unidos.", "titulo_pt": "Ações ligadas à IA desafiam cenário macroeconômico e saltam 20% no 1º semestre", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 58549, "titulo": "Este es el precio del dólar con el que abre el lunes 20 de julio", "url": "https://www.lanacion.com.ar/economia/dolar/este-es-el-precio-del-dolar-con-el-que-abre-el-lunes-20-de-julio-nid18072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-18T11:42:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O dólar oficial abrirá com os mesmos valores de seu último dia de cotação. O mercado se posicionou assim no último dia útil.", "titulo_pt": "Este é o preço do dólar com o qual abre o lunes 20 de julio", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 58717, "titulo": "'WarshGPT': How Wall Street is adapting to the Fed's new era of communication", "url": "https://www.cnbc.com/2026/07/18/warshgpt-federal-reserve-communications-task-force-warsh.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-18T11:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As empresas de investimento estão se preparando para uma era com menos comentários públicos do Banco Central dos Estados Unidos. Alguns estão utilizando inteligência artificial para obter vantagem nesse novo cenário de comunicação.", "titulo_pt": "'Guerragpt': como a Wall Street está adaptando-se à nova era de comunicação da Fed", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 58426, "titulo": "Como astrônomos descobriram novo planeta após 11 anos de “esconde-esconde” cósmico", "url": "https://www.infomoney.com.br/mundo/como-astronomos-descobriram-novo-planeta-apos-11-anos-de-esconde-esconde-cosmico/", "fonte_id": "infomoney", "data_pub": "2026-07-18T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A equipe liderada pela Califórnia usou o Telescópio Espacial Webb, da NASA, para descobrir um novo planeta após uma busca de 11 anos. O planeta estava em esconderijo cósmico durante todo esse período.", "titulo_pt": "Como astrônomos descobririram novo planeta após 11 anos de ‘esconde-esconde’ cósmico", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 58614, "titulo": "Glencore reactiva emblemático proyecto minero El Pachón en Argentina, el vecino fronterizo de Los Pelambres", "url": "https://www.latercera.com/pulso/noticia/glencore-reactiva-emblematico-proyecto-minero-el-pachon-en-argentina-el-vecino-fronterizo-de-los-pelambres/", "fonte_id": "la_tercera", "data_pub": "2026-07-18T11:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A multinacional suiza Glencore está reativando o projeto minero El Pachón na Argentina, após solicitar adesão ao programa RIGI de incentivo à investimento. A empresa tem contratado profissionais e finalizou recentemente uma campanha de exploração que foi considerada bem-sucedida.", "titulo_pt": "Glencore reativa emblemático projeto minero El Pachón na Argentina", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 58741, "titulo": "Traders are increasingly betting against SpaceX just weeks after IPO", "url": "https://www.ft.com/content/2b96703d-440b-46db-8d86-9fff9ecc59d5?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-18T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações da empresa de foguetes e inteligência artificial de Elon Musk caíram abaixo do preço de lançamento pela primeira vez, semanas após sua oferta inicial de ações (IPO).", "titulo_pt": "Investidores estão cada vez mais apostando contra a SpaceX nas semanas após seu IPO", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 58427, "titulo": "Tarifaço contra Brasil e balanços nos EUA assumem foco; veja os destaques da semana", "url": "https://www.infomoney.com.br/onde-investir/tarifaco-perde-forca-e-balancos-assumem-o-foco-vejam-os-destaques-da-semana/", "fonte_id": "infomoney", "data_pub": "2026-07-18T10:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os principais produtos exportados pelo Brasil, como petróleo, café, carne bovina, aviões e celulose, não foram incluídos nas tarifas. O foco agora está nos balanços econômicos dos Estados Unidos.", "titulo_pt": "Tarifaço contra Brasil e balanços nos EUA assumem destaque; confira os destaques da semana", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 58470, "titulo": "Governo e Comitê Gestor estudam adiar obrigação de destaque de IBS/CBS", "url": "https://www.jota.info/coberturas-especiais/pulso-da-reforma/governo-e-comite-gestor-estudam-adiar-obrigacao-de-destaque-de-ibs-cbs", "fonte_id": "jota", "data_pub": "2026-07-18T10:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Empresas estão preocupadas com a possibilidade de o novo sistema inviabilizar a emissão de notas fora do padrão atual. Há uma tendência de que os contribuintes tenham mais um mês para se adaptarem à nova obrigação.", "titulo_pt": "Governo e Comitê Gestor estudam prorrogação da obrigatoriedade do destaque IBS/CBS", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 58828, "titulo": "Bali’s ‘big leap’: from holiday paradise to international financial centre", "url": "https://www.scmp.com/week-asia/economics/article/3361038/balis-big-leap-holiday-paradise-international-financial-centre?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-18T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Indonésia está promovendo a transformação da ilha de férias de Bali em um centro financeiro internacional, com o parlamento planejando debater novas leis e uma conferência estabelecendo metas baseadas no modelo de Hong Kong. O ministro das Investigações e Indústrias Derivadas do Petróleo, Rosan Roeslani, afirmou que o centro financeiro faz parte dos esforços de Jacarta para se tornar um destino confiável para investidores.", "titulo_pt": "Grande salto para bali: de paraíso de férias para centro financeiro internacional", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 58832, "titulo": "Germany to scale back renewable subsidies amid power grid strain", "url": "https://www.scmp.com/news/world/europe/article/3361045/germany-scale-back-renewable-subsidies-amid-power-grid-strain?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-18T09:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Alemanha planeja reduzir as subsídios para energias renováveis em uma reforma ampla do seu sistema de financiamento, devido ao aumento da produção solar que está colocando maior pressão na rede elétrica. A partir de 2027, novos geradores renováveis deverão receber suporte de forma a beneficiar tanto o mercado quanto o sistema, recompensando projetos mais alinhados à demanda de energia e não contribuindo para congestionamentos na rede.", "titulo_pt": "Alemanha reduzirá subsídios de energias renováveis diante da pressão na rede elétrica", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 58289, "titulo": "IPOs de energia disparam nos EUA enquanto investidores tentam lucrar com o boom da IA", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/ipos-de-energia-disparam-nos-eua-enquanto-investidores-tentam-lucrar-com-o-boom-da-ia.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-18T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Empresas de energia estão realizando IPOs no ritmo mais acelerado deste século, aproveitando a demanda dos investidores por oportunidades relacionadas ao boom da inteligência artificial, que requer grande quantidade de energia para os data centers.", "titulo_pt": "Ipos de energia disparam nos EUA com busca de investidores pelo boom da IA", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 58558, "titulo": "Buscan que los autos que se manejan solos no tengan freno ni volante", "url": "https://www.lanacion.com.ar/autos/buscan-que-los-autos-que-se-manejan-solos-no-tengan-freno-ni-volante-nid18072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-18T11:30:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A autoridade de segurança vial dos Estados Unidos propôs modificar as normas para veículos de condução autônoma completa. Isso inclui a possibilidade de remover o freio e o volante desses carros.", "titulo_pt": "Buscam que os carros autônomos não tenham freio nem volante", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 58825, "titulo": "Alibaba targets Nvidia’s dominant software ecosystem with open-source AI stack", "url": "https://www.scmp.com/tech/tech-war/article/3361048/alibaba-targets-nvidias-dominant-software-ecosystem-open-source-ai-stack?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-18T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A unidade de design de chip da Alibaba, T-Head, anunciou que estará disponibilizando gratuitamente seu conjunto de software proprietário, SAIL, na World AI Conference em Shanghai. Este movimento visa simplificar as operações para desenvolvedores e desafiar o domínio do ecossistema CUDA da Nvidia.", "titulo_pt": "Alibaba alinha contra o ecossistema dominante da Nvidia com pilha de software aberta", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 58827, "titulo": "India launches first private orbital rocket as space start-ups expand", "url": "https://www.scmp.com/news/asia/south-asia/article/3361049/india-launches-first-private-orbital-rocket-space-start-ups-expand?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-18T10:44:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Índia realizou o voo inaugural de seu primeiro foguete orbital privado, a Vikram-1, construído pela Skyroot Aerospace. O lançamento ocorreu do Centro Espacial Satish Dhawan em Sriharikota e representa um passo importante para o país no cenário global da economia espacial.", "titulo_pt": "Índia realiza primeiro foguete orbital privado como start-ups espaciais expandem", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 58861, "titulo": "Your Period Tracker Is (Probably) Spying on You", "url": "https://www.wired.com/story/security-news-this-week-your-period-tracker-is-probably-spying-on-you/", "fonte_id": "wired", "data_pub": "2026-07-18T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A ferramenta de rastreamento menstrual pode estar monitorando os usuários sem seu conhecimento. Além disso, hackers russos estão se voltando para o hacking de infraestrutura, o Departamento de Segurança Nacional dos EUA foi repetidamente hackeado e uma violação expôs as práticas de raspagem de um gerador de música artificial inteligente.", "titulo_pt": "Sua aplicativo de rastreamento menstrual está (provavelmente) espionando você", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 58684, "titulo": "The bench's AI balancing act", "url": "https://www.axios.com/2026/07/18/ai-lawyers-judges-balancing-act", "fonte_id": "axios", "data_pub": "2026-07-18T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Juízes estão se tornando barreiras de IA, estabelecendo diretrizes para advogados e litigantes que entram nos seus tribunais e repreendendo aqueles que não verificam a pesquisa ou citam casos gerados por IA falsos. Ao mesmo tempo, os juízes estão explorando como usar essa tecnologia em suas próprias decisões.", "titulo_pt": "A equilibrança dos juízes com IA", "veiculo": "Axios", "pais": "EUA", "classe": "B"}, {"id": 58862, "titulo": "FIFA Doesn’t Have a Plan to Deal With Climate Change", "url": "https://www.wired.com/story/fifa-doesnt-have-plan-to-deal-with-climate-change/", "fonte_id": "wired", "data_pub": "2026-07-18T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Mundial deste ano enfrentou calor e umidade extremas. Agora, pode precisar lidar com fumaça de incêndios florestais.", "titulo_pt": "FIFA não tem plano para lidar com mudanças climáticas", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 58863, "titulo": "How Google’s New Gemini Rates Work and How to Track Your Usage", "url": "https://www.wired.com/story/how-googles-new-gemini-rates-work-and-how-to-track-your-usage/", "fonte_id": "wired", "data_pub": "2026-07-18T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Agora que o Google alterou como suas cotas de uso são contabilizadas, você pode não obter tantas respostas de inteligência artificial quanto antes. A empresa modificou seus limites de uso, afetando assim a quantidade de interações com os assistentes baseados em IA.", "titulo_pt": "Como funcionam as novas cotas do Gemini do Google e como monitorar o uso", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 58775, "titulo": "India successfully launches first private orbital rocket", "url": "https://www.japantimes.co.jp/news/2026/07/18/asia-pacific/science-health/india-private-rocket-launch-success/", "fonte_id": "japan_times", "data_pub": "2026-07-18T09:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Índia lançou com sucesso seu primeiro foguete orbital privado, um passo significativo para o país na busca por uma fatia maior da economia global espacial.", "titulo_pt": "Índia lança com sucesso seu primeiro fogueto orbital privado", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 58288, "titulo": "Pesquisa na França identifica 15 mil sites falsos gerados com IA", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/pesquisa-na-franca-identifica-15-mil-sites-falsos-gerados-com-ia.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-18T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma investigação conduzida por um jornalista francês identificou 15 mil sites falsos gerados com inteligência artificial. Este desafio ao ecossistema de informação se aprofundou com o uso da IA generativa.", "titulo_pt": "Pesquisa na França identifica 15 mil sites falsos gerados com IA", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 58866, "titulo": "Prompt Injection Attacks Are Thwarting AI Hacking Agents", "url": "https://www.wired.com/story/prompt-injection-attacks-are-thwarting-ai-hacking-agents/", "fonte_id": "wired", "data_pub": "2026-07-18T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ataques de injeção de prompt estão impedindo os agentes maliciosos de inteligência artificial de causar dano. O método 'context bombing' faz com que essas agências sejam desativadas antes que possam realizar ações prejudiciais.", "titulo_pt": "Injeção de prompt está obstaculizando Hacking de IA", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 58471, "titulo": "Regulação da IA em compliance no Brasil", "url": "https://www.jota.info/opiniao-e-analise/artigos/regulacao-da-ia-em-compliance-no-brasil", "fonte_id": "jota", "data_pub": "2026-07-18T08:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto discute como a governança pode ser a linha que separa a eficiência das tecnologias de inteligência artificial (IA) da possibilidade de exclusão social.", "titulo_pt": "Governança como fronteira entre eficiência e exclusão na IA", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 58811, "titulo": "Wiz sign temporary fill-in Allen to full contract", "url": "https://en.yna.co.kr/view/AEN20260718002200315", "fonte_id": "yonhap_news", "data_pub": "2026-07-18T08:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A KT Wiz anunciou no sábado que contrataram temporariamente o jogador Allen, que posteriormente será promovido a um contrato permanente.", "titulo_pt": "Kt wiz anuncia contratação temporária de Allen para contrato permanente", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 58395, "titulo": "Entenda o papel dos chatbots de IA na ampliação do acesso ao cuidado emocional", "url": "https://exame.com/inteligencia-artificial/entenda-o-papel-dos-chatbots-de-ia-na-ampliacao-do-acesso-ao-cuidado-emocional/", "fonte_id": "exame", "data_pub": "2026-07-18T08:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ferramentas de inteligência artificial têm sido utilizadas como um primeiro ponto de apoi , "titulo": "LG bets on India as its biggest AC base, as its third plant runs ahead of schedule", "url": "https://www.digitimes.com/news/a20260717VL201/lg-electronics-home-appliance-india-plant-production.html", "fonte_id": "digitimes", "data_pub": "2026-07-18T05:35:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "LG está no caminho de colocar sua terceira fábrica na Índia online antes do previsto, o que tornaria a Índia a maior base de produção de condicionadores de ar para a empresa e um ponto de partida para exportações para o Global South.", "titulo_pt": "LG aposta na Índia como sua maior base de produção de ar condicionado, com terceira fábrica entrando em operação antecipadamente", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 58868, "titulo": "AI unlocks QLED recipe that doubles efficiency and boosts lifetime 40-fold", "url": "https://phys.org/news/2026-07-ai-qled-recipe-efficiency-boosts.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma tecnologia foi desenvolvida que utiliza inteligência artificial para inversamente determinar as condições do processo necessárias para dispositivos de diodo luminoso a pontos quânticos (QLED), o que anteriormente exigia um grande número de experimentos e erros.", "titulo_pt": "IA desbloqueia receita QLED que duplica eficiência e aumenta a vida útil 40 vezes", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 58610, "titulo": "Científicos desarrollan una vacuna contra tumores cerebrales que mostró resultados prometedores en un ensayo clínico", "url": "https://www.latercera.com/tendencias/noticia/cientificos-desarrollan-una-vacuna-contra-tumores-cerebrales-que-mostro-resultados-prometedores-en-un-ensayo-clinico/", "fonte_id": "la_tercera", "data_pub": "2026-07-18T11:02:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Cientistas desenvolv idental-mix-ups-of-sounds-reveal-how-the-brain-produces-speech/", "fonte_id": "scientific_american", "data_pub": "2026-07-18T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Spoonersismos são um dos tipos mais conhecidos de erros de fala, e para linguistas e psicólogos eles oferecem uma visão sobre como nossos cérebros produzem falas.", "titulo_pt": "Acidentes na mistura de sons revelam como o cérebro produz fala", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 58890, "titulo": "Who owns your bones?", "url": "https://www.sciencenews.org/article/who-owns-your-bones-ed-note-august-2026", "fonte_id": "science_news", "data_pub": "2026-07-18T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A editora-chefe Nancy Shute discute a história de práticas éticas questionáveis na pesquisa com restos humanos e os avanços rumo a padrões mais éticos.", "titulo_pt": "Quem detém seus ossos?", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 58303, "titulo": "Testosterona para militar é burrice ou lacração inócua trumpista", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/colunas/reinaldojoselopes/2026/07/testosterona-para-militar-e-burrice-ou-lacracao-inocua-trumpista.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-18T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo dos Estados Unidos planeja realizar medições de testosterona entre os militares com mais de 30 anos, oferecendo suplementação caso o nível do hormônio seja considerado baixo. A medida visa potencialmente melhorar o desempenho militar na luta contra o Irã.", "titulo_pt": "Testosterona para militares: burrice ou lacração inócua?", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 58909, "titulo": "Beyond the Perseids: 6 meteor showers worth watching this summer", "url": "https://www.space.com/stargazing/meteor-showers/beyond-the-perseids-6-meteor-showers-worth-watching-this-summer", "fonte_id": "space_com", "data_pub": "2026-07-18T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Além dos Perseides, seis chuvas de meteoros menos conhecidas também podem iluminar os céus de verão. A Perseide pode capturar a atenção, mas outras chuvas de meteoros merecem ser observadas.", "titulo_pt": "Além dos perseides: 6 chuvas de meteoros para assistir neste verão", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 58304, "titulo": "Estudo com camundongos leva a pistas sobre como memórias negativas atrapalham o sono", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/estudo-com-camundongos-leva-a-pistas-sobre-como-memorias-negativas-atrapalham-o-sono.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-18T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo publicado na revista Science demonstra como memórias negativas acumuladas durante o dia podem interferir no sono à noite. O pesquisamento busca compreender melhor a relação entre memória e sono, um campo em que ainda há pouca informação.", "titulo_pt": "Estudo mostra como memórias negativas afetam o sono", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 58869, "titulo": "UN to list more sites as 'in danger' from conflict or climate change", "url": "https://phys.org/news/2026-07-sites-danger-conflict-climate.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Organização das Nações Unidas planeja incluir um local bíblico, castelos libaneses, uma rota de migração de antílopes e o lago mais profundo do mundo na lista de tesouros mundiais em perigo, devido a conflitos ou mudanças climáticas.", "titulo_pt": "ONU vai listar mais sites como 'em perigo' por conflito ou mudança climática", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 58390, "titulo": "Como a Terra permaneceu habitável por milhões de anos? Estudo traz nova resposta", "url": "https://exame.com/ciencia/como-a-terra-permaneceu-habitavel-por-milhoes-de-anos-estudo-traz-nova-resposta/", "fonte_id": "exame", "data_pub": "2026-07-18T08:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo identificou o mecanismo que funcionava como um 'termostato natural', ajudando a prevenir mudanças climáticas extremas na Terra ao longo de milhões de anos.", "titulo_pt": "Como a Terra permaneceu habitável por milhões de anos? Estudo traz nova resposta", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 58391, "titulo": "Buraco visto no Google Maps revela cratera de meteoro com 390 milhões de anos", "url": "https://exame.com/ciencia/buraco-visto-no-google-maps-revela-cratera-de-meteoro-com-390-milhoes-de-anos/", "fonte_id": "exame", "data_pub": "2026-07-18T08:37:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A formação de 25 km de diâmetro, localizada no Canadá, foi identificada como uma cratera de meteoro com cerca de 390 milhões de anos. Ela se juntou à lista de aproximadamente 200 crateras conhecidas na Terra.", "titulo_pt": "Buraco visto no Google Maps revela cratera de meteoro com 390 milhões de anos", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 58870, "titulo": "Wildfire smoke from Canada and Minnesota pushes farther into the US and engulfs DC in haze", "url": "https://phys.org/news/2026-07-wildfire-canada-minnesota-engulfs-dc.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Millhões de pessoas nos estados do Lago Erie, Nordeste e Meio-Oeste dos Estados Unidos enfrentaram mais um dia com ar nocivo devido a incêndios florestais controlados no Canadá e Minnesota. A fumaça desses incêndios chegou até Washington DC, cobrindo a cidade em névoa.", "titulo_pt": "Fumaça de incêndios florestais do canadá e Minnesota chega ao df", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 58887, "titulo": "Opinion: STAT readers on the value of primary care, obesity as a disease, and more", "url": "https://www.statnews.com/2026/07/18/primary-care-debate-letters-to-editor/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-18T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os presidentes da AAFP, ACP e AAP escreveram sobre a oportunidade real de avançar além das políticas e narrativas que colocam especialidades médicas em conflito.", "titulo_pt": "Opinião: leitores de STAT sobre o valor do cuidado primário, obesidade como doença e mais", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 58871, "titulo": "'Chainsaw massacre': Europe mulls culls for fish-guzzling cormorant", "url": "https://phys.org/news/2026-07-chainsaw-massacre-europe-mulls-culls.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T08:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A cormorã grande da Europa recuperou-se quase de uma extinção próxima para um excesso populacional em meio século, gerando uma discussão prolongada entre pescadores preocupados com o apetite voraz e conservacionistas.", "titulo_pt": "Massacre com tesoura: Europa considera censurações para cormorãs vorazes de peixes", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 58891, "titulo": "Skyroot Aerospace reaches orbit on first Vikram-1 launch", "url": "https://spacenews.com/skyroot-aerospace-reaches-orbit-on-first-vikram-1-launch/", "fonte_id": "spacenews", "data_pub": "2026-07-18T08:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Skyroot Aerospace lançou com sucesso seu foguete Vikram-1 em sua primeira missão, no dia 18 de julho, tornando-se o primeiro foguete comercial indiano a alcançar a órbita.", "titulo_pt": "Skyroot Aerospace atinge órbita na primeira viagem do Vikram-1", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 58916, "titulo": "Heavy Song of the Week: The Ocean Deliver a Dynamic Banger with “Belligerence”", "url": "https://consequence.net/2026/07/heavy-song-of-the-week-the-ocean-belligerence/", "fonte_id": "consequence_sound", "data_pub": "2026-07-18T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "The Ocean apresenta 'Belligerence', uma faixa dinâmica de 10 minutos que cobre estilos como hardcore, thrash, prog e doom. A formação atual da banda demonstra seu valor com esta canção.", "titulo_pt": "Canção do dia pesada: the Ocean entregam um Banger dinâmico com 'belligerência'", "veiculo": "Consequence of Sound", "pais": "EUA", "classe": "C"}, {"id": 58555, "titulo": "Qué significa el popular refrán “a palabras necias, oídos sordos”", "url": "https://www.lanacion.com.ar/lifestyle/que-significa-el-popular-refran-a-palabras-necias-oidos-sordos-nid18072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-18T11:34:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A frase 'a palabras necias, oídos sordos' é uma expressão popular que faz parte da tradição e continua sendo utilizada nas conversas diárias. Ela sugere que se deve responder a quem fala besteira com indiferença.", "titulo_pt": "O que significa o refrão popular 'a palavras necias, oídos sordos'", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 58612, "titulo": "Claudia Sanhueza: “La agenda que está impulsando el ministro Quiroz responde a una batalla cultural, no a una estrategia de desarrollo”", "url": "https://www.latercera.com/pulso/noticia/claudia-sanhueza-la-agenda-que-esta-impulsando-el-ministro-quiroz-responde-a-una-batalla-cultural-no-a-una-estrategia-de-desarrollo/", "fonte_id": "la_tercera", "data_pub": "2026-07-18T11:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Claudia Sanhueza, exsubsecretária de Hacienda e Relações Ec
