<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: none; border: 1px solid var(--border); border-radius: 4px;
             color: var(--texto2); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { border-color: var(--acento); color: var(--texto); }
  .tts-bar[hidden] { display: none; }
</style>
</head>

<nav id="nav"></nav>
<main id="main"></main>

</div>

<div class="modal-overlay" id="modal-relatorio">

      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>

      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>

  </div>
</div>

<script>
const D = {"gerado_em": "30/06/2026 17:21", "stats": {"noticias_novas": 896, "resumos_gerados": 251}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O presidente do Supremo Tribunal Federal (STF), Edson Fachin, sugeriu uma 'reflexão estrutural' sobre os salários do funcionalismo público brasileiro. Após votar para liberar parte dos benefícios concedidos a juízes e membros do Ministério Público, ele propôs um debate mais amplo sobre o sistema de remuneração. O governo Lula anunciou uma redução gradual na subvenção do diesel, retirando R$ 0,35 por litro a partir de 1º de julho. Paralelamente, foi lançado o Plano Safra 2026/2027 com um investimento de R$ 525,1 bilhões para financiar a produção agrícola e pecuária. A economia brasileira gerou 73 mil empregos formais em maio, uma queda de 52% em comparação ao mesmo mês do ano anterior. O STF decidiu liberar parte dos benefícios que haviam sido barrados anteriormente, mantendo o limite estabelecido em 35% do teto constitucional.", "mundo": "O governo dos Estados Unidos enviou uma consulta formal ao novo governo brasileiro sobre a nomeação de Daniel Pérez como novo embaixador americano no Brasil, conforme informa a Folha de S. Paulo. Em outro desenvolvimento, o Mercosul e o Japão iniciaram negociações para um acordo comercial que visa criar um mercado avaliado em 7 trilhões de dólares, segundo o Poder360. Na América do Sul, um terremoto na Venezuela causou 1.943 mortes e 10.571 feridos, com cerca de 58.800 edifícios danificados, conforme relatório da NASA. No âmbito político, o Supremo Tribunal Federal dos Estados Unidos manteve a cidadania nascituro, rejeitando uma ordem do presidente Trump que pretendia limitar a cidadania automática para filhos de imigrantes, informa o The New York Times. Além disso, mais de um milhão de imigrantes ilegais na Espanha buscaram regularização legal através de um programa especial lançado pelo governo esquerdo em abril, conforme relatório da France 24.\n\nA geopolítica global enfrenta uma série de desafios significativos. Em primeiro lugar, a China alertou sobre seus planos para normalizar incursões territoriais, indicando um aumento nas operações de ocupação em disputas territoriais. Paralelamente, Israel intensificou sua estratégia 'matar primeiro' contra o Irã, agora direcionada à Turquia, levantando preocupações sobre uma resposta regional. Em outro front, a guerra na Ucrânia continua com drones atacando áreas próximas a Moscou, revelando novas estratégias militares. Na América do Sul, equipes de resgate de 30 países auxiliam no resgate após terremotos na Venezuela, enquanto o Irã e Omã planejam cobrar taxas pelo Estreito de Ormuz, afetando o comércio marítimo global. Outros pontos importantes incluem a aceleração das ocupações territoriais israelenses em Gaza e Cisjordânia, as negociações entre EUA e Irã sobre fundos congelados, e os planos de investimento militar do Reino Unido.", "economia": "O governo federal lançou o Plano Safra 2026/2027, prevendo investimentos de R$ 525,1 bilhões na agricultura empresarial. Esse plano inclui R$ 384,9 bilhões para despesas essenciais e R$ 140,2 bilhões para modernização produtiva. Em outro desenvolvimento econômico importante, a União Europeia eliminou suas tarifas sobre produtos americanos, conforme acordo anteriormente alcançado. Além disso, o preço do petróleo oscilava em torno de US$ 73 por barril, com esperança de novas negociações entre EUA e Irã para firmar um acordo de paz. No Brasil, a dívida bruta do governo federal atingiu 81,1% do PIB, enquanto o déficit primário no mês de maio foi de R$ 56,1 bilhões. A atividade industrial na China está crescendo novamente, impulsionada pelo boom da inteligência artificial (IA), com investimentos globais nessa tecnologia atuando como um importante amortecedor para os fabricantes chineses.", "tecnologia": "A tecnologia está em destaque com várias notícias importantes. A AWS investiu 1 bilhão de dólares em uma nova unidade de inteligência artificial (IA) para oferecer soluções autossuficientes aos clientes, refletindo o crescimento do mercado de IA. Além disso, a empresa Etched alcançou uma avaliação de 5 bilhões de dólares e vendeu sistemas inferenciais por 1 bilhão de dólares com seu chip de IA, competindo diretamente com a Nvidia. Em outro desenvolvimento, as mulheres representam mais da metade dos usuários do ChatGPT no Brasil, indicando um crescimento significativo na adoção global do aplicativo. No entanto, o uso de energia e recursos naturais pela Google para impulsionar seu boom em IA levou a um aumento nos níveis de emissões de gases de efeito estufa, destacando os desafios ambientais associados ao desenvolvimento avançado da tecnologia.", "ciencia": "A NASA anunciou novas missões científicas para a Base Lunar, selecionando três empresas — Astrobotic, Firefly Aerospace e Intuitive Machines — para levar cargas úteis à superfície lunar no final de 2028. Este avanço na exploração lunar é parte do programa da NASA e visa permitir uma presença humana duradoura na Lua através de atividades temáticas, redução de riscos e demonstrações lideradas pela indústria. Em outra frente científica, a Universidade Medical School Hannover (MHH) descobriu que os blocos de construção de açúcar sialic acid são cruciais para o processo de adesão viral, um avanço fundamental na compreensão do mecanismo de infecção de certas cepas do influenza e coronavírus. Além disso, a NASA registrou um gigantesco tsunami espacial gerado por um terremoto em uma galáxia distante, revelando ondas mais complexas do que os modelos científicos previam, destacando avanços significativos na observação de fenômenos cósmicos pelo espaço.", "cultura": "O mundo da cultura registrou diversas notícias relevantes recentemente. Entre elas, destaca-se a morte inesperada de Daniel Melingo, integrante das bandas Los Abuelos de la Nada e Los Twist, aos 68 anos, após uma crise cardíaca em sua casa. Em outro evento cultural, a atriz Blake Lively entrou em um conflito legal com Justin Baldoni, pedindo ao tribunal o reembolso de aproximadamente US$ 8 milhões em honorários jurídicos e custos processuais relacionados à sua defesa contra uma ação de difamação. No Brasil, a morte do comentarista João Pedro Sgarbi após cinco anos no Jogo Aberto na Band também foi um evento importante. Além disso, o mundo da arte viu importantes avanços, como a utilização de inteligência artificial para traduzir rolhas carbonizadas de 2.000 anos provenientes de Herculano, e a devolução de 18 objetos do Reino de Benin (agora Nigéria) por três museus suíços. No cenário da moda, a temporada de Paris para o verão 2027 foi marcada pela simplicidade nas coleções masculinas, enquanto no audiovisual, um filme com Armie Hammer obteve distribuição internacional após ser disponibilizado gratuitamente durante 48 horas em uma conta do X por Elon Musk.", "sociedade": "O Brasil enfrenta diversos desafios sociais e econômicos. De acordo com o Global Wealth Report 2026, divulgado pelo UBS, o país ganhou 9.215 novos milionários em 2025, elevando para cerca de 386 mil pessoas com patrimônio superior a R$ 5,1 milhões, apesar da persistente desigualdade. Em contraste, a Organização Mundial da Saúde (OMS) informou que o sistema de saúde venezuelano está sobrecarregado após uma série de terremotos devastadores. Os hospitais foram danificados e superlotados, resultando em mais de 1.700 mortes e 5.000 feridos no país. A Venezuela também enfrenta graves crises humanitárias, com a PAHO expandindo sua resposta à saúde após os terremotos. Em La Guaira, famílias formam filas para identificar mortos em um necrotério improvisado devido à falta de infraestrutura adequada. No Brasil, a Marinha instalou um hospital de campanha em La Guaira para atender às necessidades médicas emergenciais resultantes dos terremotos. Além disso, o Ministério da Saúde recomenda a vacinação de bebês contra sarampo após novos casos no estado de São Paulo.", "meio_ambiente": "As autoridades brasileiras e internacionais enfrentam diversos desafios ambientais. O ministro da Agricultura, André de Paula, formou um grupo para avaliar os impactos do El Niño no país. A Defesa Civil emitiu alertas para chuvas persistentes na região sul do Brasil e temporais severos. Em Santa Catarina, as previsões indicam riscos de alagamentos e rajadas de vento. No exterior, a Europa enfrenta sua pior ola de calor desde 2019, com novos recordes sendo estabelecidos em várias localidades, incluindo a Slováquia que registrou 41 graus Celsius. A República Democrática do Congo confirmou 1.307 casos de Ebola, com 377 mortes, enquanto o surto se espalha para uma quarta província. No Brasil, a cidade mais poluída, Nova Delhi, oferece incentivos para troca de veículos por elétricos em um esforço para combater a poluição, e a Anvisa proibiu a venda e uso do querosene Petrus. Além disso, o governo iraquiano está liberando petróleo preso no Golfo Pérsico através da Desembocadura do Hormuz, após um cessar-fogo instável entre EUA e Irã.", "direitos_humanos": "Um servidor público foi condenado após afirmar 'preto bom é preto morto' durante um seminário na Prefeitura de Belo Horizonte, reconhecendo a ofensa à comunidade negra. O Brasil ocupa o 75º lugar no ranking global de impunidade, com pior desempenho nas áreas de violência e conflito. A Suprema Corte dos Estados Unidos manteve as leis estatais que proíbem atletas transexuais de competir em esportes femininos escolares. Além disso, a Comissão dos Direitos da Criança e o UNICEF emitiram uma declaração conjunta sobre as dificuldades enfrentadas por crianças migrantes na África do Sul."}, "resumo_do_dia": {"politica_nacional": [{"id": 27429, "titulo": "Fachin sugere rever pagamentos do serviço público inteiro após polêmica com penduricalhos", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/fachin-sugere-rever-pagamentos-do-servico-publico-inteiro-apos-polemica-com-penduricalhos.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-30T19:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente do STF, Edson Fachin, sugeriu uma 'reflexão estrutural' sobre os pagamentos de todo o funcionalismo público brasileiro. Esta sugestão foi feita dias após ele votar para liberar parte dos penduricalhos de juízes e integrantes do Ministério Público que haviam sido barrados pela corte.", "titulo_pt": "Fachin sugere revisar pagamentos do funcionalismo público inteiro", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 27584, "titulo": "Governo estuda recorrer ao STF se pauta-bomba avançar no Senado", "url": "https://www.infomoney.com.br/politica/governo-estuda-recorrer-ao-stf-se-pauta-bomba-avancar-no-senado/", "fonte_id": "infomoney", "data_pub": "2026-06-30T19:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo considera recorrer ao Supremo Tribunal Federal (STF) se uma proposta de emenda à constituição (PEC) que cria regras especiais para aposentadoria avançar no Senado. A PEC pode custar mais de R$ 30 bilhões aos cofres públicos.", "titulo_pt": "Governo considera recorrer ao STF se pauta-bomba avançar no Senado", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 27465, "titulo": "Arma de Bolsonaro apreendida com militar foi inutilizada com aval de Michelle, dizem envolvidos na investigação", "url": "https://g1.globo.com/politica/blog/julia-duailibi/post/2026/06/30/arma-de-bolsonaro-apreendida.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T19:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A arma de Jair Bolsonaro, apreendida durante uma abordagem policial no Distrito Federal, foi temporariamente inutilizada por decisão da equipe de segurança com o aval de Michelle Bolsonaro. O militar Estácio Leite da Silva Filho era o condutor do veículo abordado.", "titulo_pt": "Arma de Bolsonaro apreendida com militar foi inutilizada com aval de Michelle, dizem investigadores", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 27617, "titulo": "Presidente da Alerj rebate governador interino e devolve críticas ao Judiciário", "url": "https://veja.abril.com.br/politica/presidente-da-alerj-rebate-governador-interino-e-devolve-criticas-ao-judiciario/", "fonte_id": "veja", "data_pub": "2026-06-30T19:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O pré-candidato ao governo Douglas Ruas respondeu às críticas do governador interino, Ricardo Couto, que entrevistou o desembargador Ricardo Couto para VEJA. Ruas retomou as críticas feitas pelo governador à Justiça.", "titulo_pt": "Presidenciável da Alerj rebate governador e devolve críticas ao Judiciário", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27600, "titulo": "Gilmar deixa presidência da 2ª Turma e fala sobre maior desafio de Fux", "url": "https://www.metropoles.com/colunas/manoela-alcantara/gilmar-deixa-presidencia-da-2a-turma-e-fala-sobre-maior-desafio-de-fux", "fonte_id": "metropoles", "data_pub": "2026-06-30T19:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro Gilmar Mendes deixou de presidir a 2ª Turma que julga as repercussões do caso Master. A partir de agosto, Fux assumirá o comando desta turma.", "titulo_pt": "Gilmar deixa presidência da 2ª Turma e Fux assume em agosto", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27602, "titulo": "Após debandada na Guarda Civil, Ouro Preto decreta emergência", "url": "https://www.metropoles.com/minas-gerais/apos-debandada-na-guarda-civil-ouro-preto-decreta-emergencia", "fonte_id": "metropoles", "data_pub": "2026-06-30T19:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A prefeitura de Ouro Preto nomeou um comandante interino para a Guarda Municipal após a exoneração coletiva dos membros atuais. A administração também planeja realizar uma investigação sobre os atestados médicos fornecidos pelos guardas municipais.", "titulo_pt": "Após demissão em massa na Guarda Civil, Ouro Preto declara emergência", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27466, "titulo": "Após críticas a Mendonça, Gilmar diz que divergências não significam desunião do STF diante do caso Master", "url": "https://g1.globo.com/politica/noticia/2026/06/30/apos-criticas-a-mendonca-gilmar-diz-que-divergencias-nao-significam-desuniao-do-stf-diante-do-caso-master.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T18:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Gilmar Mendes afirmou que divergências entre os ministros da 2ª Turma do STF não indicam desunião do tribunal no caso Master. Esta declaração foi feita após Gilmar ter criticado André Mendonça por participar das discussões sobre o inquérito do banco de Daniel Vorcaro.", "titulo_pt": "Gilmar Mendes diz que divergências não significam desunião do STF no caso Master", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 27430, "titulo": "Alcolumbre diz que não vai acelerar nova pauta-bomba e governo Lula ganha fôlego", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/alculumbre-diz-que-nao-vai-acelerar-nova-pauta-bomba-e-governo-lula-ganha-folego.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-30T18:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Davi Alcolumbre, presidente do Senado, decidiu adotar o rito normal para a proposta de aposentadoria especial para agentes comunitários de saúde. Esta decisão não inclui uma aceleração da pauta e dá fôlego ao governo Lula.", "titulo_pt": "Alcolumbre não acelerará nova pauta-bomba e governo Lula ganha fôlego", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 27467, "titulo": "Fila do INSS recua para 1,8 milhão de pedidos, o menor patamar em 21 meses, segundo o órgão", "url": "https://g1.globo.com/economia/noticia/2026/06/30/fila-do-inss-recua-para-18-milhao-de-pedidos-o-menor-patamar-em-21-meses-segundo-o-orgao.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T18:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O INSS informou que a fila de espera por benefícios reduziu para 1,831 milhão de pedidos em junho, o menor patamar desde setembro de 2024. O presidente Luiz Inácio Lula da Silva estabeleceu uma meta de zerar a fila até setembro deste ano.", "titulo_pt": "Fila do INSS cai para 1,8 milhão de pedidos, menor patamar em 21 meses", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 27530, "titulo": "Dino devolve vista e STF deve analisar mandato-tampão do Rio em agosto", "url": "https://www.cnnbrasil.com.br/politica/dino-devolve-vista-e-stf-deve-analisar-mandato-tampao-do-rio-em-agosto/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T18:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal (STF) deve analisar em agosto o mandato-tampão do Rio de Janeiro. O tribunal já tem quatro votos a favor da realização de uma eleição indireta após a vacância dos cargos de governador e vice-governador.", "titulo_pt": "Dino devolve vista e STF analisa mandato-tampão do Rio em agosto", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 27468, "titulo": "STF confirma decisão que extingue aposentadoria compulsória como punição para juízes", "url": "https://g1.globo.com/politica/noticia/2026/06/30/stf-confirma-decisao-que-extingue-aposentadoria-compulsoria-como-punicao-para-juizes.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T18:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Primeira Turma do Supremo Tribunal Federal (STF) manteve a decisão que extinguiu a aposentadoria compulsória como punição para juízes, por unanimidade. A Procuradoria-Geral da República havia recorrido, mas a turma decidiu que os magistrados devem ser punidos com a perda do cargo em casos de violações disciplinares graves.", "titulo_pt": "STF confirma extinção da aposentadoria compulsória como punição para juízes", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 27631, "titulo": "ANPD faz tomada de subsídios para estruturar atuação no Marco Civil da Internet", "url": "https://www.jota.info/executivo/anpd-faz-tomada-de-subsidios-para-estruturar-atuacao-no-marco-civil-da-internet", "fonte_id": "jota", "data_pub": "2026-06-30T17:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Agência Nacional de Proteção de Dados (ANPD) está realizando a coleta de subsídios para estruturar sua atuação no Marco Civil da Internet. A maior parte do decreto é autoaplicável, mas alguns pontos necessitarão de regulamentação faseada.", "titulo_pt": "ANPD realiza coleta de subsídios para estruturação na aplicação do Marco Civil da Internet", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 27411, "titulo": "Governo Lula anuncia redução de R$ 0,35 por litro na subvenção do diesel a partir de 1º de julho", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/governo-lula-vai-anunciar-reducao-gradual-de-subvencao-a-combustiveis.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T17:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo Lula anunciou uma redução gradual na subvenção aos combustíveis, retirando R$ 0,35 por litro do diesel a partir de 1º de julho. O governo também avaliará diariamente as demais subvenções.", "titulo_pt": "Governo Lula anuncia redução de R$ 0,35 por litro na subvenção do diesel a partir de 1º de julho", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 27632, "titulo": "Pesquisa mostra redução da vantagem do bolsonarismo no Distrito Federal", "url": "https://www.jota.info/eleicoes/eleicoes-2026/pesquisa-mostra-reducao-da-vantagem-do-bolsonarismo-no-distrito-federal", "fonte_id": "jota", "data_pub": "2026-06-30T17:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A pesquisa indica que o bolsonarismo mantém a liderança no Distrito Federal, com 33,7% das intenções de voto. O pré-candidato do PL obteve 32,8% dos votos.", "titulo_pt": "Pesquisa mostra redução da vantagem do bolsonarismo no Distrito Federal", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 27469, "titulo": "Brasil cria 73 mil empregos formais em maio; com forte queda de 52% em comparação ao mesmo mês de 2025", "url": "https://g1.globo.com/economia/noticia/2026/06/30/brasil-cria-73-mil-empregos-formais-em-maio-com-forte-queda-de-52percent-em-comparacao-ao-mesmo-mes-de-2025.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T17:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A economia brasileira gerou 73 mil empregos formais em maio de 2025, uma queda de 52% em comparação com o mesmo mês do ano anterior. Este foi o pior resultado para o mês de maio desde 2020.", "titulo_pt": "Brasil cria 73 mil empregos formais em maio; queda de 52% em relação a 2024", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 27448, "titulo": "Ato no Rio abre mobilização para pressionar Senado pelo fim da 6x1", "url": "https://agenciabrasil.ebc.com.br/politica/noticia/2026-06/ato-no-rio-abre-dia-nacional-para-pressionar-senado-pelo-fim-da-6x1", "fonte_id": "agencia_brasil_politica", "data_pub": "2026-06-30T17:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Operadoras de caixa participaram de uma manifestação no Rio de Janeiro para pressionar o Senado pelo fim da escala de trabalho 6x1. Fátima Dantas, de 22 anos, relatou que a mudança seria benéfica para sua saúde e bem-estar, já que ela trabalha em pé por oito horas diárias e atualmente tem apenas um dia de folga na semana.", "titulo_pt": "Ato no Rio inicia mobilização pela redução da jornada e fim da escala 6x1", "veiculo": "Agência Brasil - Política", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 28071, "titulo": "Coast guard warns of Beijing’s new plan to normalize territory incursions", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/01/2003860041", "fonte_id": "taipei_times", "data_pub": "2026-07-01T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O serviço de guarda costeira advertiu sobre um novo plano da Beijing para normalizar as incursões territoriais. Segundo a fonte, o planos visa intensificar as operações de ocupação em territórios disputados.", "titulo_pt": "Guarda-costeira avisa sobre novo plano chinês para normalizar incursões territoriais", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 28073, "titulo": "Beijing’s policy transforming HK, MAC says", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/01/2003860043", "fonte_id": "taipei_times", "data_pub": "2026-07-01T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A política de Beijing está transformando Hong Kong e Macau, segundo afirma a fonte. O texto sugere que há mudanças significativas nessas regiões sob administração chinesa, sem entrar em detalhes específicos.", "titulo_pt": "Política de Beijing transforma HK e MAC, diz fonte", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 27504, "titulo": "Mercosul e Japão iniciam negociações para acordo comercial", "url": "https://www.poder360.com.br/poder-internacional/mercosul-e-japao-iniciam-negociacoes-para-acordo-comercial/", "fonte_id": "poder360", "data_pub": "2026-06-30T19:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Mercosul e o Japão iniciaram negociações para um acordo comercial que visa criar um mercado de 7 trilhões de dólares. Durante a 68ª Cúpula, o bloco oficializou as tratativas com o objetivo de expandir sua presença global.", "titulo_pt": "Mercosul e Japão iniciam negociações para acordo comercial", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 27726, "titulo": "Última hora del terremoto en Venezuela, en directo | El Gobierno de Venezuela eleva a 1.943 los fallecidos por el terremoto y a 10.571 los heridos", "url": "https://elpais.com/america/2026-06-30/ultima-hora-del-terremoto-en-venezuela-en-directo.html", "fonte_id": "elpais_america", "data_pub": "2026-06-30T19:17:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O governo venezuelano elevou o número de mortos por terremotos para 1.943 e confirmou 10.571 feridos. A diplomacia espanhola relatou que 19 cidadãos espanhóis morreram, enquanto cerca de 130 permanecem desaparecidos. A ONU estimou em 5,8 bilhões de euros os danos materiais causados pelos terremotos.", "titulo_pt": "Últimas notícias sobre o terremoto na Venezuela", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 27730, "titulo": "Costa de Marfil - Noruega, en directo | Nusa y Haaland clasifican a los noruegos para los octavos (1-2)", "url": "https://elpais.com/deportes/mundial-futbol/2026-06-30/costa-de-marfil-noruega-en-directo-el-partido-de-los-dieciseisavos-de-final-del-mundial-en-vivo.html", "fonte_id": "elpais_america", "data_pub": "2026-06-30T19:14:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Nusa e Haaland marcaram os gols que classificaram a Noruega para os octavos de final, contra Costa do Marfim. O atacante do City foi fundamental no triunfo europeu.", "titulo_pt": "Costa do Marfim x Noruega, ao vivo | Nusa e Haaland garantem classificação norueguesa (1-2)", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 27437, "titulo": "Governo Trump pede aval do Brasil para envio de novo embaixador", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/governo-trump-pede-aval-do-brasil-para-envio-de-novo-embaixador.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-30T19:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo dos Estados Unidos enviou uma consulta formal para o novo governo brasileiro sobre a designação de Daniel Perez como novo embaixador americano no Brasil. O agrément foi encaminhado recentemente ao Itamaraty.", "titulo_pt": "Governo Trump solicita aval do Brasil para novo embaixador", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 27482, "titulo": "Venezuela: mapa da Nasa estima 59 mil prédios danificados em terremoto", "url": "https://agenciabrasil.ebc.com.br/internacional/noticia/2026-06/venezuela-mapa-da-nasa-estima-59-mil-predios-danificados-em-terremoto", "fonte_id": "agencia_brasil_intl", "data_pub": "2026-06-30T19:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores da Universidade Estadual de Oregon, nos EUA, analisaram imagens de satélites da Nasa e estimaram que cerca de 58.800 edifícios foram provavelmente danificados ou destruídos na região afetada pelos terremotos na Venezuela. O mapa da Nasa identifica os prédios com 75% de chances de terem sido afetados.", "titulo_pt": "Venezuela: mapa da Nasa estima 58,8 mil prédios danificados em terremoto", "veiculo": "Agência Brasil - Internacional", "pais": "Brasil", "classe": "A"}, {"id": 28036, "titulo": "Israel's 'kill first' strategy is now aimed at Turkey. Will the region respond?", "url": "https://www.middleeasteye.net/opinion/israels-kill-first-strategy-now-aimed-turkey-will-region-respond", "fonte_id": "middle_east_eye", "data_pub": "2026-06-30T18:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A estratégia israelense de 'matar primeiro' agora está direcionada para a Turquia, e há preocupações sobre uma resposta regional. O poder que Israel perdeu na negociação com o Irã foi transferido para outros países como Líbano.", "titulo_pt": "Estratégia israelense de 'matar primeiro' agora alvo da Turquia", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 27746, "titulo": "Shortages of Rescue Equipment Hampered Venezuela’s Earthquake Response", "url": "https://www.nytimes.com/2026/06/30/world/americas/venezuela-earthquake-rescue-equipment-aid.html", "fonte_id": "nyt_world", "data_pub": "2026-06-30T18:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Havia falta de equipamentos de resgate, como excavadoras, geradores e ferramentas especializadas, o que dificultou a resposta ao terremoto na Venezuela. Os residentes pediram ajuda e civis forneceram apoio às equipes trabalhando nos escombros.", "titulo_pt": "Falta de Equipamentos Afastou Resposta à Terremotos na Venezuela", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 27907, "titulo": "Firefighters struggle to contain deadly Greek wildfire", "url": "https://www.bbc.co.uk/news/articles/c0qy3nkex0qo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-30T18:43:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de cem bombeiros estão trabalhando para conter um incêndio perto de Thessaloniki, na Grécia, que já causou uma morte.", "titulo_pt": "Bombeiros lutam para controlar fogo letal na Grécia", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 27938, "titulo": "Multiple raids conducted over alleged far-right embezzlement at European Parliament", "url": "https://www.lemonde.fr/en/france/article/2026/06/30/multiple-raids-conducted-over-alleged-far-right-embezzlement-at-european-parliament_6755021_7.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-30T18:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Várias operações policiais foram realizadas em relação a supostas irregularidades financeiras envolvendo membros do partido extremamente direitista na Parlamento Europeu. O inquérito se baseia em uma denúncia que afirma que esses membros 'gastaram indevidamente' €4,33 milhões.", "titulo_pt": "Várias operações policiais realizadas sobre supostas irregularidades financeiras do partido extremamente direitista no Parlamento Europeu", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 27727, "titulo": "El terremoto en Venezuela evidencia la distancia entre Washington y la líder opositora María Corina Machado", "url": "https://elpais.com/america/2026-06-30/el-terremoto-en-venezuela-evidencia-la-distancia-entre-washington-y-la-lider-opositora-maria-corina-machado.html", "fonte_id": "elpais_america", "data_pub": "2026-06-30T18:40:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O terremoto na Venezuela evidencia a distância entre Washington e a líder opositora María Corina Machado. O Departamento de Estado dos Estados Unidos enfatiza que a prioridade é fornecer assistência após o terremoto.", "titulo_pt": "Terremoto na Venezuela ilustra distanciamento entre Washington e líder opositora venezuelana", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 27731, "titulo": "Estados Unidos amenaza con que no prorrogará el T-MEC con México y Canadá", "url": "https://elpais.com/america/2026-06-30/estados-unidos-amenaza-con-que-no-prorrogara-el-t-mec-con-mexico-y-canada.html", "fonte_id": "elpais_america", "data_pub": "2026-06-30T18:40:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A decisão dos Estados Unidos de não prorrogar o T-MEC com México e Canadá se interpreta como uma estratégia negociadora. Mesmo assim, as conversações continuarão, e em caso de falha no acordo, ocorrerá uma desconexão gradual até 2036.", "titulo_pt": "Estados Unidos ameaça não prorrogar T-MEC com México e Canadá", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 27842, "titulo": "Ukraine Takes the War to Putin", "url": "https://www.theatlantic.com/ideas/2026/06/moscow-ukraine-drone-attacks/687745/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-30T18:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Drone attacks na área de Moscou revelam uma estratégia múltipla.", "titulo_pt": "Ucrânia Leva a Guerra ao Putin", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 27905, "titulo": "What are US and Japanese soldiers doing in the middle of the Australian bush?", "url": "https://www.bbc.co.uk/news/videos/cyv09p2vy87o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-30T18:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Forças americanas e japonesas estão realizando exercícios militares no deserto australiano, uma região remota onde o país não está em guerra e que se encontra distante das principais conflitos atuais.", "titulo_pt": "O que soldados dos EUA e do Japão estão fazendo no meio da floresta australiana?", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 27956, "titulo": "Manhunt launched after Monaco blast targets Ukrainian-born oligarch", "url": "https://www.france24.com/en/manhunt-launched-after-monaco-blast-targets-ukrainian-born-oligarch", "fonte_id": "france24", "data_pub": "2026-06-30T18:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma busca está sendo realizada pela polícia de Mônaco e França para localizar um suspeito de ter cometido uma bomba, que feriu três pessoas no principado. A explosão envolveu um pacote-bomba e foi considerada como um ataque a um oligarca ucraniano-nascido.", "titulo_pt": "Busca policial após explosão em Mônaco alveja oligarca ucraniano", "veiculo": "France 24", "pais": "França", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 28087, "titulo": "Taiwan’s 2025 domestic production of export orders hits record 52.9%", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/01/2003860014", "fonte_id": "taipei_times", "data_pub": "2026-07-01T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 2025, a produção interna para encomendas de exportação na Taiwan atingiu um recorde de 52,9%. Este aumento reflete o crescimento da capacidade produtiva local e a importância do setor exportador para a economia taiwanesa.", "titulo_pt": "Produção Interna de Encomendas de Exportação da Taiwan bate Recorde em 2025 com 52,9%", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 27404, "titulo": "Julgamento sobre falência da Oi é suspenso após pedido de vista", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/julgamento-sobre-falencia-da-oi-e-suspenso-apos-pedido-de-vista.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T19:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O julgamento que poderia declarar a falência da Oi foi suspenso na terça-feira (30) após o desembargador Augusto Alves Moreira Júnior solicitar vista do processo. O julgamento estava sendo realizado pela Primeira Câmara de Direito Privado do TJ-RJ.", "titulo_pt": "Julgamento sobre falência da Oi é suspenso após pedido de vista", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 27618, "titulo": "A ação solidária da J&F na Venezuela", "url": "https://veja.abril.com.br/coluna/radar-economico/a-acao-solidaria-da-jf-para-a-venezuela/", "fonte_id": "veja", "data_pub": "2026-06-30T19:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O grupo J&F fretou três cargueiros para transportar 120 mil latas de proteína para as regiões afetadas pelos terremotos na Venezuela.", "titulo_pt": "Ação solidária da J&F leva ajuda à Venezuela", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27405, "titulo": "Empresário chinês é condenado nos EUA a 30 anos de prisão por fraude de US$ 550 milhões", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/empresario-chines-e-condenado-nos-eua-a-30-anos-de-prisao-por-fraude-de-us-550-milhoes.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T18:57:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O empresário chinês Guo Wengui foi condenado a 30 anos de prisão nos Estados Unidos por fraudar investidores, incluindo seguidores seus, em uma quantia de aproximadamente US$ 550 milhões. Ele era conhecido como um insider de Pequim e aliado da extrema direita norte-americana.", "titulo_pt": "Empresário chinês é condenado a 30 anos de prisão nos EUA por fraude de US$ 550 milhões", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 27407, "titulo": "Julgamento de Luigi Mangione é adiado para janeiro em corte federal", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/julgamento-de-luigi-mangione-e-adiado-para-janeiro-em-corte-federal.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T18:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O julgamento de Luigi Mangione foi adiado para janeiro de 2027 por uma juíza federal. O adiamento ocorreu para que o julgamento estadual do acusado, programado para setembro, pudesse ser realizado.", "titulo_pt": "Julgamento de Luigi Mangione é adiado para janeiro em corte federal", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 28035, "titulo": "Philip Morris allowed to market Zyn pouches in US as safer than smoking", "url": "https://www.ft.com/content/04518af1-0294-4ef7-bc24-507ac1197db1", "fonte_id": "financial_times", "data_pub": "2026-06-30T18:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Philip Morris foi autorizada a comercializar os sachê de nicotina Zyn nos Estados Unidos, considerando-os menos prejudiciais do que fumar. Os sachês de nicotina são uma área de foco para o setor tabagista em sua busca por novos mercados além dos cigarros.", "titulo_pt": "Philip Morris permitida a comercialização de Zyn nos EUA como mais segura que o smoking", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 27408, "titulo": "Único participante, consórcio arremata PPP de esgoto de 23 cidades no CE", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/unico-participante-consorcio-arremata-ppp-de-esgoto-de-23-cidades-no-ce.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T18:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O consórcio Ceará Saneamento arrematou o bloco 1 da PPP para os serviços de esgoto de 23 cidades no Ceará em uma cerimônia realizada na B3, a Bolsa de Valores de São Paulo.", "titulo_pt": "Único participante, consórcio arremata PPP de esgoto de 23 cidades no Ceará", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 28034, "titulo": "Egg producers settle US claims they manipulated benchmark prices", "url": "https://www.ft.com/content/55911ca2-9728-48ac-a874-5a3b37d3fb3e", "fonte_id": "financial_times", "data_pub": "2026-06-30T17:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Produtoras de ovos concordaram com acusações nos Estados Unidos sobre a manipulação das cotações de referência ao coordenar propostas que inflaram os preços. Autoridades federais e estatais descreveram um esforço de três dir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/vitoria-do-fed-na-suprema-corte-ainda-deixa-o-banco-vulneravel-a-trump.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T16:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Suprema Corte dos Estados Unidos bloqueou nesta segunda-feira o presidente Donald Trump de demitir Lisa Cook, diretora do Fed. Embora a decisão tenha favorecido o Fed, Trump manteve seu desafio para obter mais influência sobre o banco central americano.", "titulo_pt": "Vitória do Fed na Suprema Corte não impede Trump de buscar maior influência", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 27421, "titulo": "Academias e serviços de saúde são novas âncoras de centros comerciais, segundo HBR Realty", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/06/academias-e-servicos-de-saude-sao-novas-ancoras-de-centros-comerciais-segundo-hbr-realty.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A HBR Realty está incorporando academias, clínicas, laboratórios e farmácias como âncoras em seus shoppings e centros comerciais. Segundo o diretor de operações da empresa, a prestação de serviços focados na saúde se tornou uma tendência recorrente nos últimos lançamentos.", "titulo_pt": "Academias e serviços de saúde são novas âncoras de centros comerciais, segundo HBR Realty", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 27479, "titulo": "Governo federal lança Plano Safra 2026/2027 de R$ 525,1 bilhões", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/governo-federal-lanca-plano-safra-20262027-de-r-5251-bilhoes", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-30T15:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo federal lançou o P asse": "B"}, {"id": 28132, "titulo": "Google introduces a faster, cheaper image generator with Nano Banana 2 Lite", "url": "https://techcrunch.com/2026/06/30/google-introduces-a-faster-cheaper-image-generator-with-nano-banana-2-lite/", "fonte_id": "techcrunch", "data_pub": "2026-06-30T19:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Google está atualizando seu gerador de imagens para torná-lo mais rápido e econômico, o que o torna uma ferramenta mais útil para criadores que buscam produzir conteúdo baseado em IA.", "titulo_pt": "Google apresenta um gerador de imagem mais rápido e barato com o Nano Banana 2 Lite", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 27980, "titulo": "AWS puts $1 billion into new AI unit to embed engineers with customers, joining growing wave", "url": "https://www.cnbc.com/2026/06/30/aws-amazon-ai-forward-deployed-engineers.html", "fonte_id": "cnbc_international", "data_pub": "2026-06-30T18:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A AWS investirá 1 bilhão de dólares em uma nova unidade de IA para implantar engenheiros com clientes, proporcionando soluções e capacidades de IA autossuficientes em questão de semanas. A empresa planeja deixar atrás equipes auto-sustentáveis com novas soluções de IA prontas para uso nos próximos meses.", "titulo_pt": "AWS investe 1 bilhão em nova unidade de IA para implantar engenheiros com clientes", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 28148, "titulo": "Google's new Nano Banana 2 Lite image model is its fastest and cheapest yet", "url": "https://arstechnica.com/ai/2026/06/googles-new-nano-banana-2-lite-image-model-is-its-fastest-and-cheapest-yet/", "fonte_id": "ars_technica", "data_pub": "2026-06-30T18:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O modelo Nano Banana 2 Lite da Google é o mais rápido e barato entre os seus modelos de imagens. Apesar de não ser tão visualmente atraente, el "2026-06-30T18:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa Etched, concorrente da Nvidia no mercado de chips para inteligência artificial, alcançou uma avaliação de 5 bilhões de dólares e já obteve contratos por sistemas inferenciais valorizando 1 bilhão de dólares com seu chip.", "titulo_pt": "Concorrente da Nvidia, Etched atinge avaliação de 5 bilhões e vendas de 1 bilhão em chips para IA", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 28102, "titulo": "UK investors sue Binance and founder Zhao Changpeng for US$200 million", "url": "https://www.scmp.com/news/article/3358948/uk-investors-sue-binance-and-founder-zhao-changpeng-us200-million?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T18:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de mil e setecentos investidores britânicos estão processando a Binance e seu fundador, Zhao Changpeng, por pelo menos 150 milhões de libras (200 milhões de dólares), acusando a plataforma de criptomoedas de vender produtos derivativos arriscados e complexos sem autorização regulatória. Os reclamantes afirmam que perderam quantias significativas e que a Binance vendeu produtos como contratos alavancados, que podem amplificar ganhos ou perdas, desde o final de 2019.", "titulo_pt": "Investidores britânicos processam Binance por 200 milhões de dólares", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 28135, "titulo": "Anthropic launches Claude Sonnet 5 as a cheaper way to run agents", "url": "https://techcrunch.com/2026/06/30/anthropic-launches-claude-sonnet-5-as-a-cheaper-way-to-run-agents/", "fonte_id": "techcrunch", "data_pub": "2026-06-30T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Anthropic Claude Sonnet 5 oferece capacidades agientes mais fortes, preços mais baixos e segurança melhorada. O modelo é apresentado como uma opção mais econômica em comparação com Opus, GPT-5.5 e Gemini Pro.", "titulo_pt": "Anthropic lança Claude Sonnet 5 como forma mais barata de executar agentes", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 28098, "titulo": "Roundtables: Longevity’s Next Frontier: “Reprogramming” Your Body", "url": "https://www.technologyreview.com/2026/06/30/1139958/roundtables-longevitys-next-frontier-reprogramming-your-body/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-30T17:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A discussão explora os esforços científicos para revertê-lo envelhecimento, com investimentos bilionários direcionados a métodos que podem reverter o estado das células ao mais jovem. Os participantes debaterão sobre a viabilidade e prazo dessas tratamentos experimentais.", "titulo_pt": "Redesenhando a Longevidade: Fronteira do Envelhecimento", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 28033, "titulo": "Binance and founder sued by crypto investors in London lawsuit", "url": "https://www.ft.com/content/acf42280-a154-4407-a08a-94190d8986ca", "fonte_id": "financial_times", "data_pub": "2026-06-30T17:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de mil e setecentos usuários do Reino Unido alegam que a maior exchange de criptomoedas do mundo ofereceu produtos de alto risco sem aprovação regulatória. Eles estão processando a Binance e seu fundador em uma ação judicial em Londres.", "titulo_pt": "Binance e fundador são processados por investidores de criptomoedas no Reino Unido", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 28123, "titulo": "Rockstar workers push to unionize ahead of GTA VI’s launch", "url": "https://www.theverge.com/games/959668/rockstar-games-workers-union-gta-vi", "fonte_id": "the_verge", "data_pub": "2026-06-30T17:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Trabalhadores da Rockstar Games, desenvolvedora de Grand Theft Auto VI, solicitaram a reconhecimento voluntário do Sindicato dos Trabalhadores de Jogos IWGB. A solicitação ocorre após a empresa ter demitido mais de 30 funcionários no ano passado, um movimento que foi acusado de tentar desorganizar o sindicato.", "titulo_pt": "Trabalhadores da Rockstar Games buscam sindicalização antes do lançamento de GTA VI", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 28124, "titulo": "Google’s killing off Tenor GIF searches in other apps", "url": "https://www.theverge.com/tech/959658/google-tenor-api-shutdown-gif-picker", "fonte_id": "the_verge", "data_pub": "2026-06-30T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Google está encerrando o uso da API do Tenor para buscas de GIF em várias plataformas online, incluindo X, Discord, Bluesky e WhatsApp. O site do Tenor e sua biblioteca de GIFs permanecem disponíveis.", "titulo_pt": "Google encerra busca por GIF via API do Tenor em diversas plataformas", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 28150, "titulo": "Trump's plan to redesign every .gov website leads to AI-designed horrors", "url": "https://arstechnica.com/tech-policy/2026/06/trumps-plan-to-redesign-every-gov-website-leads-to-ai-designed-horrors/", "fonte_id": "ars_technica", "data_pub": "2026-06-30T16:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O National Design Studio, responsável pelo plano de redesenhar todos os sites .gov, adiou o projeto após um ano. A iniciativa visa atualizar os padrões web governamentais.", "titulo_pt": "Plano do National Design Studio para redesignar todos os sites .gov fica para depois", "veiculo": "Ars Technica", "pais": "EUA", "classe": "B"}, {"id": 27919, "titulo": "Google's AI boom sends emissions, power use soaring", "url": "https://www.axios.com/2026/06/30/google-ai-boom-emissions-power-use", "fonte_id": "axios", "data_pub": "2026-06-30T16:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O uso de energia, água e emissões de gases de efeito estufa da Google aumentaram para níveis recordes no ano passado à medida que a empresa acelerava o desenvolvimento de infraestrutura de inteligência artificial. Embora a Google tenha investido mais fortemente do que quase qualquer outra empresa de tecnologia em energia limpa, seu relatório ambiental mostrou como é difícil manter os objetivos climáticos no trilho diante do crescimento acelerado da infraestrutura de IA.", "titulo_pt": "Boom da IA da Google eleva uso de energia e emissões", "veiculo": "Axios", "pais": "EUA", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 28079, "titulo": "Taiwan to roll out publicly funded rotavirus vaccine in 2027", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/01/2003860049", "fonte_id": "taipei_times", "data_pub": "2026-07-01T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Taiwan planeja implementar um programa de vacinação contra o rotavírus financiado pelo governo em 2027.", "titulo_pt": "Taiwan vai implementar vacina pública contra rotavírus em 2027", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 28159, "titulo": "'Atomic zoom' brings gum disease bacteria into sharp focus", "url": "https://phys.org/news/2026-06-atomic-gum-disease-bacteria-sharp.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T19:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma tecnologia que está contribuindo para a 'revolução na resolução' permitiu aos cientistas da Yale revelar detalhes sobre os bactérias responsáveis pela doença dos dentes e gengivas.", "titulo_pt": "'Zoom atômico' revela segredos das bactérias da doenças periodontais", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28207, "titulo": "La NASA adjudica nuevas misiones científicas para Base Lunar y adelanta nuevas oportunidades", "url": "https://www.nasa.gov/news-release/la-nasa-adjudica-nuevas-misiones-cientificas-para-base-lunar-y-adelanta-nuevas-oportunidades/", "fonte_id": "nasa_news", "data_pub": "2026-06-30T19:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA selecionou três empresas para executar quatro novas missões à Lua no final de 2028 como parte do programa Base Lunar. Astrobotic, Firefly Aerospace e Intuitive Machines serão responsáveis por levar cargas úteis científicas da agência à superfície lunar.", "titulo_pt": "NASA seleciona empresas para missões científicas à Lua", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 28160, "titulo": "Why some wolves react more strongly to trespassers: Breeders may hold key to scent-based barriers", "url": "https://phys.org/news/2026-06-wolves-react-strongly-trespassers-breeders.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os lobos usam a urina para se comunicar entre si. Um estudo recente observou as reações de um grupo de lobos ao marcamento de um intruso, sendo este o primeiro passo para entender os fatores que atraem ou repelêm canídeos.", "titulo_pt": "Por que alguns lobos reagem mais fortemente a invasores: criadores podem ser chave para barreiras baseadas em cheiros", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28161, "titulo": "Legalized online sports betting drives fuel addiction's rise, study finds", "url": "https://phys.org/news/2026-06-legalized-online-sports-fuel-addiction.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Desde a invalidação do Professional and Amateur Sports Protection Act (PASPA) pelo Supremo Tribunal Federal em 2018, várias estados dos Estados Unidos legalizaram o apostando esportivo online. Um estudo descobriu que essa legalização está associada ao aumento da dependência de jogos de azar.", "titulo_pt": "Apostas esportivas online legalizadas impulsionam crescimento da adicção, estudo mostra", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28162, "titulo": "Industrial-era pollution and warming reshape Tibetan lake after 1,000 years of climate swings", "url": "https://phys.org/news/2026-06-industrial-era-pollution-reshape-tibetan.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T18:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A planície tibetana, juntamente com a região Hindu Kush–Karakorum–Himalaya, possui mais neve e gelo do que qualquer outra região do planeta, exceto as regiões polares. Nessa área de altitude elevada, os impactos do aquecimento global têm sido particularmente notáveis nos últimos anos, levando pesquisadores a investigar mudanças nas geoeconomias locais.", "titulo_pt": "Poluição industrial e aquecimento estão remodelando o lago tibetano após milênios de variações climáticas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28208, "titulo": "NextSTEP-3 B: Moon Base Demonstrations", "url": "https://www.nasa.gov/general/nextstep-3-b-moon-base-demonstrations/", "fonte_id": "nasa_news", "data_pub": "2026-06-30T18:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA está buscando ideias inovadoras de parceiros privados através de um novo anexo da solicitação NextSTEP-3 Omnibus Broad Agency Announcement. Especificamente, o Appendix B: Demonstrações de Base Lunar busca demonstrações lideradas pela indústria, redução de riscos e atividades temáticas que permitam uma presença humana duradoura na superfície da Lua.", "titulo_pt": "NextSTEP-3 B: Demonstrações de Base Lunar", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 28209, "titulo": "NASA Awards More Moon Base Science, Previews New Opportunities", "url": "https://www.nasa.gov/news-release/nasa-awards-more-moon-base-science-previews-new-opportunities/", "fonte_id": "nasa_news", "data_pub": "2026-06-30T18:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA selecionou três empresas para realizar quatro novas missões na superfície da Lua em 2028, como parte do programa de base lunar da agência. Astrobotic, Firefly Aerospace e Intuitive Machines serão responsáveis por levar cargas científicas da NASA à Lua enquanto a NASA constrói o primeiro posto avançado em outro mundo celestial.", "titulo_pt": "NASA Seleciona Empresas para Missões na Lua em 2028", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 27611, "titulo": "Pesquisa descobre proteína que ajuda o câncer de mama a se espalhar", "url": "https://www.metropoles.com/saude/proteina-cancer-de-mama-espalhar", "fonte_id": "metropoles", "data_pub": "2026-06-30T18:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Cientistas identificaram que a proteína METTL3, quando não está funcionando adequadamente, facilita a invasão dos tumores de mama em tecido saudável. Esta proteína desempenha um papel na propagação do câncer de mama.", "titulo_pt": "Cientistas descobrem proteína que auxilia no espalhamento do câncer de mama", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 28163, "titulo": "PFAS in most medicines can be replaced with alternatives", "url": "https://phys.org/news/2026-06-pfas-medicines-alternatives.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T18:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo publicado na Sustainable Chemistry and Pharmacy, realizado pela Universidade de Freiburg e encomendado pelo Agência Alemã do Meio Ambiente, demonstrou que muitos ingredientes ativos em medicamentos baseados em per- e poli-fluorotáticos alquilados (PFAS) podem ser substituídos por alternativas. Com base nesses achados, médicos poderão preferir prescrever medicamentos livres de PFAS quando isso for apropriado do ponto de vista terapêutico.", "titulo_pt": "Muitos ingredientes ativos em medicamentos podem ser substituídos por alternativas que não contêm PFAS", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28164, "titulo": "Computer scientists develop a new AI tool that rivals AlphaFold 3 in mapping RNA", "url": "https://phys.org/news/2026-06-scientists-ai-tool-rivals-alphafold.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T18:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas de computação desenvolveram uma nova ferramenta de inteligência artificial que rivaliza com o AlphaFold 3 no mapeamento da estrutura tridimensional das moléculas RNA. Este avanço utiliza a mesma tecnologia de geração de imagens que impulsiona os atuais geradores de imagens AI.", "titulo_pt": "Cientistas de computação desenvolvem ferramenta de IA que rivaliza com AlphaFold 3 no mapeamento de RNA", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 27628, "titulo": "Novo artigo questiona antiga teoria que explica a extinção dos neandertais", "url": "https://veja.abril.com.br/ciencia/novo-artigo-questiona-antiga-teoria-que-explica-a-extincao-dos-neandertais/", "fonte_id": "veja", "data_pub": "2026-06-30T18:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um novo artigo questiona a teoria tradicional sobre a extinção dos neandertais, sugerindo que eles não tinham dificuldade para se perpetuar e estavam saudáveis. Análises de DNA indicaram que a espécie não enfrentava problemas significativos para sobreviver.", "titulo_pt": "Novo artigo questiona teoria sobre extinção dos neandertais", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 28165, "titulo": "How a sugar building block influences viral attachment", "url": "https://phys.org/news/2026-06-sugar-block-viral.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T18:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores da Universidade Medical School Hannover (MHH) estudaram como os blocos de construção de açúcar sialic acid chegam a seus alvos. Este conhecimento fundamental é relevante, pois certas cepas do influenza e coronavírus utilizam sialic acids modificadas como receptores.", "titulo_pt": "Como um bloco de construção de açúcar influencia o attach viral", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28166, "titulo": "AI-powered platform lays the foundation for a new era of catalyst discovery", "url": "https://phys.org/news/2026-06-ai-powered-platform-lays-foundation.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T18:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A inteligência artificial está revolucionando a maneira como os cientistas buscam novos catalisadores, mas um obstáculo persiste: a falta de dados padronizados e completos para alimentar os sistemas de IA. Solucionar esse desafio de dados é crucial para avançar na descoberta de catalisadores impulsionada por IA.", "titulo_pt": "Plataforma baseada em inteligência artificial estabelece a base para uma nova era da descoberta de catalisadores", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28167, "titulo": "Scientists teach human cells to compute like tiny computers", "url": "https://phys.org/news/2026-06-scientists-human-cells-tiny.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T18:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas desenvolveram uma técnica para programar células humanas para realizar cálculos e tomar decisões autônomas, de maneira semelhante a como os chips de computador funcionam.", "titulo_pt": "Cientistas ensinam células humanas a calcular como pequenos computadores", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28168, "titulo": "New way to clean up environmental pollution using phage bioaugmentation", "url": "https://phys.org/news/2026-06-environmental-pollution-phage-bioaugmentation.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa liderada pela Flinders University sugere que o uso de vírus bacterianos compatíveis, conhecidos como fagógenos, pode acelerar a capacidade das bactérias a remover poluentes do solo, água, resíduos minerais e outros ambientes. O estudo, publicado em Communications Biology, indica que a bioaugmentação com fagógenos oferece uma nova direção promissora para a biotecnologia ambiental.", "titulo_pt": "Novo método para limpar poluição ambiental usando bioaugmentação de fagógenos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 26814, "titulo": "Falling under the map: Sasha Yazov’s airbrush art of The Sims turns pixels to paint", "url": "https://www.itsnicethat.com/articles/sasha-yazov-art-project-300626", "fonte_id": "its_nice_that", "data_pub": "2026-07-02T08:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As obras de arte digitais criadas pela artista Sasha Yazov retratam os aspectos visuais dos jogos de vídeo da década de 2000 com precisão de captura de tela, mas com pequenas diferenças que não refletem a memória do público.", "titulo_pt": "Caído sob o mapa: arte em spray digital de Sasha Yazov transforma pixels em pinturas de The Sims", "veiculo": "It's Nice That", "pais": "Reino Unido", "classe": "B"}, {"id": 27616, "titulo": "Caiado compara seu futuro vice com herói da virada do Brasil sobre o Japão", "url": "https://veja.abril.com.br/politica/caiado-compara-seu-futuro-vice-com-heroi-da-virada-do-brasil-sobre-o-japao/", "fonte_id": "veja", "data_pub": "2026-06-30T19:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governador de Goiás, Ronaldo Caiado, que pretende concorrer à presidência, comparou seu futuro vice-governador, Gilberto Kassab, com o jogador Gabriel Martinelli no momento em que este entrou na seleção brasileira. Segundo Caiado, Martinelli só se destacou quando entrou em campo.", "titulo_pt": "Caiado compara futuro vice com herói da virada da seleção brasileira", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27822, "titulo": "El
