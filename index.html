<style>
  :root {
    --bg: #0e1116; --panel: #161b24; --panel2: #1d2430; --border: #2a3342;
    --texto: #e6e9ef; --texto2: #9aa5b5; --acento: #e8a849; --acento2: #5fb3a3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto); font: 15px/1.55 "Segoe UI", system-ui, sans-serif; }
  header { padding: 22px 28px 14px; border-bottom: 1px solid var(--border);
           display: flex; flex-wrap: wrap; align-items: baseline; gap: 14px; }

  header h1 span { color: var(--acento); }
  header .sub { color: var(--texto2); font-size: 13px; }
  nav { display: flex; flex-wrap: wrap; gap: 4px; padding: 10px 24px 0; border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2); padding: 10px 14px; cursor: pointer;
               font-size: 14px; border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--acento); border-bottom-color: var(--acento); }
  nav button:hover { color: var(--texto); }
  main { padding: 24px 28px 60px; max-width: 1180px; margin: 0 auto; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 26px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .card .num { font-size: 28px; font-weight: 700; color: var(--acento); }
  .card .rot { color: var(--texto2); font-size: 12.5px; margin-top: 2px; }
  h2 { font-size: 17px; margin: 28px 0 14px; color: var(--acento2); font-weight: 600;
       padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  /* sumário narrativo */
  .sumario { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
             padding: 18px 20px; margin-bottom: 14px; line-height: 1.75; }
  .sumario p { margin-bottom: 10px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; padding: 12px 0; }
  /* drill-down: artigos individuais */
  .drill-toggle { background: none; border: 1px solid var(--border); color: var(--texto2);
                  border-radius: 6px; padding: 5px 12px; font-size: 12.5px; cursor: pointer;
                  margin-bottom: 10px; }
  .drill-toggle:hover { color: var(--texto); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }
  .item { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
          padding: 14px 16px; margin-bottom: 10px; }
  .item h3 { font-size: 14.5px; margin-bottom: 5px; }
  .item .meta { font-size: 12px; color: var(--texto2); display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 7px; }
  .tag { background: var(--panel2); border: 1px solid var(--border); border-radius: 20px; padding: 1px 9px; }
  .corpo p { color: var(--texto); font-size: 13.5px; line-height: 1.6; }
  a { color: var(--acento2); text-decoration: none; } a:hover { text-decoration: underline; }
  .vazio { color: var(--texto2); font-style: italic; padding: 12px 0; }
  /* filtros por botão-pill */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
  .filtros-secao button { background: var(--panel); border: 1px solid var(--border); color: var(--texto2);
                          border-radius: 20px; padding: 5px 15px; font-size: 13px; cursor: pointer; }
  .filtros-secao button.ativo { background: var(--acento2); border-color: var(--acento2);
                                 color: #0e1116; font-weight: 600; }
  .filtros-secao button:hover:not(.ativo) { color: var(--texto); }
  .noticia { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 2px; }
</style>

<script>
const D = {"gerado_em": "18/06/2026 03:41", "stats": {"noticias_total": 2718, "resumos_total": 128, "sem_topico": 0, "ultima_coleta": "2026-06-18T03:07:12Z"}, "rotulos_topico": {"politica_nacional": "Política Nacional", "politica_internacional": "Política Internacional", "cultura": "Cultura", "ciencia_tecnologia": "Ciência & Tecnologia"}, "topicos": ["politica_nacional", "politica_internacional", "cultura", "ciencia_tecnologia"], "sinteses": {"ciencia_tecnologia": "A Coreia do Sul enfrenta desafios econômicos relacionados à saúde e à tecnologia. Uma pesquisa realizada pela National Health Insurance Service e Kyung Hee University revelou que famílias de baixa renda são mais propensas a serem empurradas para a pobreza por conta de despesas médicas, devido à falta de acesso a seguros privados e outras formas de proteção financeira relacionada à saúde. Em contraste, o setor de semicondutores registrou fortes receitas em maio, com um forte recuperação nos preços de DRAM e uma crescente gastos com infraestrutura de inteligência artificial impulsionando a maioria das 27 companhias rastreadas do setor a ganhos anuais superiores a dois dígitos. As empresas de turismo na Nova Zelândia estão trabalhando para se tornar mais sustentáveis, mas um novo estudo revela que o processo é complexo e não é sempre direto.", "cultura": "O destaque da cultura nesta edição é o Las Culturistas Culture Awards, que ocorreu pela quinta vez e foi transmitido pela televisão pelo segundo ano consecutivo. O evento premiou personalidades do mundo da cultura pop com performances notáveis como Rachel Zegler cantando 'Fame Is a Gun' e Lisa Kudrow tomando parte no palco. Além disso, o Festival de Annecy 2026 foi anunciado com mais de 18.300 participantes confirmados de 118 países, sendo o primeiro a receber Class A status da International Federation of Film Producers Association. Outros temas relevantes incluem a vida do ex-jogador Lionel Messi após seu hat-trick na vitória da Argentina sobre Argélia, bem como as novidades no mercado imobiliário argentino e os avanços nas drogas contra a obesidade.", "politica_internacional": "O presidente dos Estados Unidos, Donald Trump, assinou um Memorando de Entendimento com a Irã na Palace of Versailles, antes de um jantar oferecido pelo presidente francês Emmanuel Macron, em 18 de junho de 2026. Esta cerimônia ocorreu no contexto de tensões políticas internacionais e é vista como um passo significativo nas relações entre os dois países. Além disso, a Interpol alertou sobre um 'aumento drástico' da ciberdelinquência na região do Ásia e Pacífico Sul, destacando o crescimento dos crimes cibernéticos na área. Estes eventos refletem as complexidades da política internacional atual, com questões diplomáticas e segurança cibernética emergindo como pontos críticos.", "politica_nacional": "O governo Lula enfrenta desafios políticos e econômicos, com aprovados projetos que garantem financiamentos para a Embraer e integram procuradores à Advocacia-Geral da União. O plano de segurança do pré-candidato Flávio Bolsonaro reforça sua aproximação com Sérgio Moro, enquanto Haddad critica Tarcísio por criticar condenações do STF. Na política internacional, os EUA e o Irã assinaram um memorando para encerrar conflitos no Oriente Médio, embora Trump ameace novos ataques se o Irã não se comportar."}, "resumo_do_dia": {"politica_nacional": [{"id": 1289, "titulo": "Lançamento de plano de segurança reforça aproximação de Flávio com Moro", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/lancamento-de-plano-de-seguranca-reforca-aproximacao-de-flavio-com-moro.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-18T02:59:00Z", "texto_pt": "O lançamento do plano de governo sobre segurança pública pelo pré-candidato a presidente Flávio Bolsonaro ocorreu em São Paulo e demonstra o apoio do senador Sérgio Moro ao projeto bolsonarista.", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 1290, "titulo": "Haddad diz que Tarcísio peca ao criticar STF: 'Mau exemplo'", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/haddad-diz-que-tarcisio-peca-ao-criticar-stf-mau-exemplo.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-18T02:51:00Z", "texto_pt": "O ex-ministro Fernando Haddad afirmou que o governador Tarcísio de Freitas cometeu um mau exemplo ao criticar a condenação do ex-deputado Eduardo Bolsonaro pelo STF. Haddad, pré-candidato ao Governo de São Paulo, fez essa declaração em entrevista nesta quarta-feira (17).", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 1454, "titulo": "Governo avança em garantia para encomendas de aeronaves da Embraer", "url": "https://www.poder360.com.br/poder-infra/governo-avanca-em-garantia-para-encomendas-de-aeronaves-da-embraer/", "fonte_id": "poder360", "data_pub": "2026-06-18T02:45:00Z", "texto_pt": "O Conselho Monetário Nacional (CMN) aprovou uma proposta nesta quarta-feira (17/6) que garante financiamentos de até 30% do valor das aeronaves produzidas pela Embraer.", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 1533, "titulo": "Decreto de Lula sobre big techs extrapola decisão do STF, diz especialista", "url": "https://www.cnnbrasil.com.br/politica/decreto-de-lula-sobre-big-techs-extrapola-decisao-do-stf-diz-especialista/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-18T02:44:00Z", "texto_pt": "Um especialista apontou diferenças entre o decreto do governo federal sobre big techs e a decisão recente do Supremo Tribunal Federal (STF) sobre responsabilidade dessas plataformas digitais. O professor comparou as duas medidas em entrevista ao CNN Brasil.", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 1455, "titulo": "Câmara dá aval a projeto que permite advocacia privada a procuradores", "url": "https://www.poder360.com.br/poder-congresso/camara-da-aval-a-projeto-que-permite-advocacia-privada-a-procuradores/", "fonte_id": "poder360", "data_pub": "2026-06-18T02:18:00Z", "texto_pt": "A Câmara dos Deputados aprovou um projeto que permite a procuradores atuarem na advocacia privada, desde que não representem interesses contrários à União e suas autarquias. Os beneficiados poderão prestar serviços em escritórios de advocacia ou em causas particulares.", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 1535, "titulo": "Menin sobre CNN Brasil liderar confiança no jornalismo: “Caminho certo”", "url": "https://www.cnnbrasil.com.br/nacional/menin-sobre-cnn-brasil-liderar-confianca-no-jornalismo-caminho-certo/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-18T02:15:00Z", "texto_pt": "O fundador e sócio-controlador da CNN Brasil comentou sobre a liderança do veículo em termos de confiança no jornalismo, conforme indicado por um relatório 2026 da Reuters e Universidade de Oxford. Ele projeta os próximos passos do canal nesse cenário.", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 1464, "titulo": "O tema da conversa entre Dario Durigan e dois ministros do STF", "url": "https://veja.abril.com.br/economia/o-tema-da-conversa-entre-dario-durigan-e-ministros-do-stf/", "fonte_id": "veja", "data_pub": "2026-06-18T02:02:00Z", "texto_pt": "Dario Durigan, titular da Receita Federal, se reuniu com ministros do Supremo Tribunal Federal (STF) para discutir uma questão de interesse da sua pasta. O tema da conversa não foi especificado na informação fornecida.", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 1291, "titulo": "Campanha de Flávio prioriza reanimar base bolsonarista após trocas na equipe e crise por 'Dark Horse'", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/campanha-de-flavio-prioriza-reanimar-base-bolsonarista-apos-trocas-na-equipe-e-crise-por-dark-horse.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-18T02:00:00Z", "texto_pt": "A pré-campanha presidencial do senador Flávio Bolsonaro (PL-RJ) passou por mudanças após uma crise interna e embates, focando agora em reanimar o apoio da base bolsonarista. Uma nova equipe foi definida para dar suporte à campanha.", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}], "politica_internacional": [{"id": 2087, "titulo": "Trump signing US-Iran MoU in Versailles", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/trump-signing-us-iran-mou-versailles", "fonte_id": "middle_east_eye", "data_pub": "2026-06-18T03:09:00Z", "texto_pt": "O presidente dos Estados Unidos, Donald Trump, assinou o Memorando de Entendimento com a Irã na Palace of Versailles, antes de um jantar oferecido pelo presidente francês Emmanuel Macron. A cerimônia ocorreu em 18 de junho de 2026.", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 1654, "titulo": "Aviación y navegación con Starlink: claves para ampliar la capacidad de datos", "url": "https://www.infobae.com/tecno/2026/06/18/aviacion-y-navegacion-con-starlink-claves-para-ampliar-la-capacidad-de-datos/", "fonte_id": "infobae", "data_pub": "2026-06-18T03:08:00Z", "texto_pt": "O Modo marítimo do Starlink permanece ativo até que o usuário decida desativá-lo e é obrigatório para a conectividade em águas internacionais.", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 1655, "titulo": "Colombia vs. Uzbekistán EN VIVO, Mundial 2026: Daniel Muñoz abrió el marcador en la Ciudad de México", "url": "https://www.infobae.com/colombia/2026/06/17/seleccion-colombia-vs-uzbekistan-en-vivo-siga-el-minuto-a-minuto-del-debut-en-el-grupo-k-del-mundial-2026/", "fonte_id": "infobae", "data_pub": "2026-06-18T03:08:00Z", "texto_pt": "O jogo entre Colômbia e Uzbekistão, válido para a Copa do Mundo de 2026, está sendo realizado no Estadio Azteca. O time colombiano, comandado por Néstor Lorenzo, joga após uma ausência de oito anos, enquanto os uzbeques são liderados por Fabio Cannavaro.", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 1656, "titulo": "Peruana de 18 años ingresó a tres universidades de Estados Unidos: la historia de una joven que venció obstáculos y alcanzó sus metas", "url": "https://www.infobae.com/peru/2026/06/18/peruana-de-18-anos-ingreso-a-tres-universidades-de-estados-unidos-la-historia-de-una-joven-que-vencio-obstaculos-y-alcanzo-sus-metas/", "fonte_id": "infobae", "data_pub": "2026-06-18T03:08:00Z", "texto_pt": "Yanhira Montalvo, uma peruana de 18 anos, foi admitida em três universidades dos Estados Unidos: Dartmouth, UC Berkeley e Arizona State University. Ela optou por estudar Ciências de Computação na Dartmouth.", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 1657, "titulo": "Jefferson Farfán revela que entrega S/7.000 a su hija con Darinka Ramírez y usuarios lo critican: “Eso vale un polo tuyo de marca”", "url": "https://www.infobae.com/peru/2026/06/18/jefferson-farfan-revela-que-entrega-s7000-a-su-hija-con-darinka-ramirez-y-usuarios-lo-critican-eso-vale-un-polo-tuyo-de-marca/", "fonte_id": "infobae", "data_pub": "2026-06-18T03:07:00Z", "texto_pt": "Jefferson Farfán divulgou publicamente o valor mensal de S/7.000 que destina para a manutenção da sua filha com Darinka Ramírez, mas suas declarações foram criticadas nas redes sociais por considerar a quantia insuficiente para alguém com sua economia.", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 1658, "titulo": "Caminar hacia atrás: el juego infantil que trae beneficios a los adultos mayores", "url": "https://www.infobae.com/generacion-silver/2026/06/18/caminar-hacia-atras-el-juego-infantil-que-trae-beneficios-a-los-adultos-mayores/", "fonte_id": "infobae", "data_pub": "2026-06-18T03:07:00Z", "texto_pt": "O artigo discorre sobre um jogo infantil que oferece benefícios para os adultos mais velhos. Este exercício simples pode trazer melhorias na saúde física e mental dos idosos.", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 1772, "titulo": "Colombia - Uzbekistán, el partido del Mundial en vivo | Daniel Muñoz quiebra la valla de Uzbekistán (0-1)", "url": "https://elpais.com/america-colombia/2026-06-18/colombia-uzbekistan-el-partido-del-mundial-en-vivo.html", "fonte_id": "elpais_america", "data_pub": "2026-06-18T03:07:00Z", "texto_pt": "O time colombiano, comandado por Néstor Lorenzo, estreia na Copa do Mundo contra o Uzbekistão em Ciudad de México. A partida será acompanhada por uma grande torcida colombiana nas ruas da capital mexicana.", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 1659, "titulo": "“¿Me extrañaban?”, el saludo de Neymar en su vuelta a las prácticas con Brasil: cómo está de la lesión y cuándo debutaría en el Mundial", "url": "https://www.infobae.com/deportes/2026/06/18/me-extranaban-el-saludo-de-neymar-en-su-vuelta-a-las-practicas-con-brasil-como-esta-de-la-lesion-y-cuando-debutaria-en-el-mundial/", "fonte_id": "infobae", "data_pub": "2026-06-18T03:06:00Z", "texto_pt": "Neymar trabalhou com seus companheiros durante as práticas do Brasil e aumenta as expectativas de sua retorno aos jogos oficiais. A lesão está em recuperação, mas ainda não há data confirmada para seu primeiro jogo no Mundial.", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}], "cultura": [{"id": 1696, "titulo": "Uzbekistán vs. Colombia, EN VIVO por el Mundial 2026: minuto a minuto del partido", "url": "https://www.lanacion.com.ar/deportes/futbol/uzbekistan-vs-colombia-en-vivo-por-el-mundial-2026-nid17062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-18T03:06:00Z", "texto_pt": "O jogo entre Uzbekistão e Colômbia está sendo realizado no Estádio Azteca, encerrando o Grupo K da Copa do Mundo 2026. Paralelamente, Portugal e Congo empataram em outro confronto do mesmo grupo.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 1699, "titulo": "Cambios", "url": "https://www.lanacion.com.ar/opinion/cambios-nid18062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-18T03:02:00Z", "texto_pt": "O título 'Cambios' sugere mudanças, mas não há detalhes adicionais sobre o contexto ou natureza dessas alterações na notícia fornecida. Sem informações específicas, não é possível resumir fatos concretos.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 1700, "titulo": "Avances, dudas y expectativa por las nuevas drogas contra la obesidad", "url": "https://www.lanacion.com.ar/sociedad/avances-dudas-y-expectativa-por-las-nuevas-drogas-contra-la-obesidad-nid18062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-18T03:02:00Z", "texto_pt": "A curva de obesidade se estabilizou em alguns países e aumentou em outros. Os prazos de tratamento e o alto custo representam barreiras para o uso dessas novas drogas contra a obesidade.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 1701, "titulo": "SUV híbrido enchufable vs. naftero: cuánto se ahorra en tres años de uso en la Argentina", "url": "https://www.lanacion.com.ar/autos/suv-hibrido-enchufable-vs-naftero-cuanto-se-ahorra-en-tres-anos-de-uso-en-la-argentina-nid18062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-18T03:01:00Z", "texto_pt": "Embora sejam destinados a usuários diferentes, o custo de manutenção a longo prazo se torna um fator importante na escolha entre um SUV híbrido enchufável e um modelo naftero.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 1702, "titulo": "Cuánto cambia un auto de calle para poder competir en las carreras más extremas del mundo", "url": "https://www.lanacion.com.ar/autos/cuanto-cambia-un-auto-de-calle-para-poder-competir-en-las-carreras-mas-extremas-del-mundo-nid18062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-18T03:01:00Z", "texto_pt": "A LA NACION relatou sobre o Defender Dakar D7X-R, utilizado pela marca britânica na competição mundial de rally raid; foram mantidos alguns componentes do modelo de produção, mas várias modificações foram necessárias para enfrentar provas extremas como o Dakar e o Desafio Ruta 40.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 1703, "titulo": "Un informe reveló cuál es el color de auto más elegido por los argentinos", "url": "https://www.lanacion.com.ar/autos/un-informe-revelo-cual-es-el-color-de-auto-mas-elegido-por-los-argentinos-nid18062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-18T03:01:00Z", "texto_pt": "O relatório indica que o escolha do cor de um carro pode ser uma das decisões mais complexas ao comprar um veículo novo; no entanto, o mercado de carros usados destaca quais são os tons mais procurados pelos compradores argentinos.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 1704, "titulo": "Hotline: terror argentino en clave de policial que llega unos 40 años tarde", "url": "https://www.lanacion.com.ar/espectaculos/cine/hotline-terror-argentino-en-clave-de-policial-que-llega-unos-40-anos-tarde-nid18062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-18T03:01:00Z", "texto_pt": "O filme 'Hotline', dirigido por Lucas Nicotti, recria o estilo dos anos 80 com foco em elementos policiais. Apesar de tentar capturar o espírito da época, a obra não consegue desenvolver complexidade ou consistência na narrativa.", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 1705, "titulo": "Lo que mata: fantasmas del pasado regresan bajo la forma de un thriller hipnótico", "url": "https://www.lanacion.com.ar/espectaculos/cine/lo-que-mata-fantasmas-del-pasado-regresan-bajo-la-forma-de-un-thriller-hipnotico-nid18062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-18T03:01:00Z", "texto_pt": "Uma película canadense, selecionada para a competição do Oscar deste ano, explora os fundamentos da cultura patriarcal através de uma história que envolve um professor universi 20", "fonte_id": "yonhap_news", "data_pub": "2026-06-18T03:00:00Z", "texto_pt": "O órgão regulador de concorrência da Coreia do Sul rejeitou as medidas corretivas voluntárias propostas pelas aplicativos de entrega de comida.", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 2415, "titulo": "Tourism firms face complex path to sustainability", "url": "https://phys.org/news/2026-06-tourism-firms-complex-path-sustainability.html", "fonte_id": "phys_org", "data_pub": "2026-06-18T03:00:00Z", "texto_pt": "Empresas de turismo na Nova Zelândia estão trabalhando para se tornar mais sustentáveis, mas um novo estudo revela que o processo é complexo e não é sempre direto. Baseado em entrevistas detalhadas, análise de dados e visitas a operadores turísticos estabelecidos pelo país inteiro, o estudo examina como as empresas passam de boas intenções para práticas mais sustentáveis no trabalho.", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 2179, "titulo": "Our ancient enemy: scientists discover oldest-known plague outbreak", "url": "https://www.scmp.com/news/world/article/3357493/our-ancient-enemy-scientists-discover-oldest-known-plague-outbreak?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-18T02:59:00Z", "texto_pt": "Cientistas descobriram evidências do plague mais antigas, datando de cerca de 5.500 anos atrás, ou seja, cerca de 200 anos antes do que se pensava anteriormente. A doença afetou humanos por milênios e foi responsável pela morte massiva da população europeia durante a Peste Negra no século XIV.", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 2370, "titulo": "Taiwan chip makers signal durable upcycle as memory prices and AI demand align", "url": "https://www.digitimes.com/news/a20260617VL225/taiwan-demand-revenue-recovery-growth.html", "fonte_id": "digitimes", "data_pub": "2026-06-18T02:58:00Z", "texto_pt": "As empresas semiconductoras listadas na Taiwan relataram fort const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => `<div class="item">
           <h3><a href="${esc(n.url)}" target="_blank">${esc(n.titulo)}</a></h3>
           <div class="meta">
             <span class="tag">${esc(n.veiculo)}</span>
             ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             ${n.classe ? `<span class="tag">${esc(n.classe)}</span>` : ""}
           </div>
           <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
         </div>`).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
      <div class="card"><div class="num">${st.sem_topico}</div><div class="rot">aguardando classificação</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const rot = n.topico ? (D.rotulos_topico[n.topico] || n.topico) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      return `<div class="noticia" data-topico="${esc(n.topico || '')}">
        <a href="${esc(n.url)}" target="_blank">${esc(n.titulo)}</a>
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
ativar("resumo");
</script>
</body>
</html>
