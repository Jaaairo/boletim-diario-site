do com ataxia de Friedreich aos 13 anos, uma doença neuromuscular rara e progressiva.", "titulo_pt": "'Como nadar no ar': meu emocionante papel em Giselle com os dançarinos de cadeira de rodas do Royal Ballet", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 16584, "titulo": "CineOP transforma Ouro Preto em capital da memória audiovisual", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/cineop-transforma-ouro-preto-em-capital-da-memoria-audiovisual", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-25T10:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A 21ª edição da CineOP – Mostra de Cinema de Ouro Preto acontece entre os dias 25 e 30 de junho em Ouro Preto. O evento é dedicado ao cinema como patrimônio cultural e busca a preservação audiovisual, a formação de público e a construção de políticas públicas.", "titulo_pt": "CineOP transforma Ouro Preto na capital da memória audiovisual", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 17358, "titulo": "Reset: Hat", "url": "https://aeon.co/videos/in-the-american-west-a-man-named-hat-sets-out-to-leave-no-trace", "fonte_id": "aeon", "data_pub": "2026-06-25T10:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Este retrato de uma vida reimaginada é uma meditação sobre identidade, felicidade e o equilíbrio entre liberdade e conformidade. O vídeo foi produzido pela Aeon Video.", "titulo_pt": "Reiniciar: Chapéu", "veiculo": "Aeon Magazine", "pais": "Reino Unido", "classe": "A"}, {"id": 16571, "titulo": "Turma da Mônica é tema de desfile grátis no Sambódromo do Anhembi; veja como retirar ingressos", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/passeios/2026/06/turma-da-monica-e-tema-de-desfile-gratis-no-sambodromo-do-anhembi-veja-como-retirar-ingressos.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um desfile com carros alegóricos temáticos da Turma da Mônica acontecerá no Sambódromo do Anhembi, em São Paulo, neste domingo (28). A ação celebra os 90 anos de Mauricio de Sousa.  Ingressos para o evento serão distribuídos gratuitamente.", "titulo_pt": "Turma da Mônica desfila gratuitamente no Sambódromo do Anhembi; veja como retirar ingressos", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 16685, "titulo": "O feito de Neymar na Copa de 2026 que o coloca ao lado de Pelé", "url": "https://veja.abril.com.br/esporte/o-feito-de-neymar-na-copa-de-2026-que-o-coloca-ao-lado-de-pele/", "fonte_id": "veja", "data_pub": "2026-06-25T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Neymar estreou no Mundial nesta quarta-feira, 24, no jogo do Brasil contra a Escócia.  Essa partida marca um feito para o jogador, colocando-o próximo a Pelé em termos de participações em Copas do Mundo.", "titulo_pt": "O feito de Neymar na Copa de 2026 que o coloca ao lado de Pelé", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 16901, "titulo": "El paso al frente de Lore: “Es muy solitario hacer un proyecto solista, pero es rico sentir que todo lo define una misma”", "url": "https://www.latercera.com/culto/noticia/el-paso-al-frente-de-lore-es-muy-solitario-hacer-un-proyecto-solista-pero-es-rico-sentir-que-todo-lo-define-una-misma/", "fonte_id": "la_tercera", "data_pub": "2026-06-25T10:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Lore, vocalista da banda Chicarica, lança seu primeiro EP como artista solo chamado 'Anónima'. O EP reúne músicas compostas ao longo dos anos e marca uma busca mais íntima, abstrata e pessoal.  O lançamento também significa o retorno do selo Cazador.", "titulo_pt": "A nova fase de Lore: 'É solitário fazer um projeto solo, mas é rico sentir que tudo define uma mesma'", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 16572, "titulo": "Globo confirma Dira Paes como protagonista de próxima novela das seis da emissora", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/globo-confirma-dira-paes-como-protagonista-de-proxima-novela-das-seis-da-emissora.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Globo confirmou que a atriz Dira Paes será a protagonista da novela 'Lá na Minha Terra'. As gravações começam em agosto e a estreia está prevista para novembro, após o fim da novela 'A Nobreza do Amor'.", "titulo_pt": "Globo confirma Dira Paes como protagonista da próxima novela das seis", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 17155, "titulo": "‘All the Lovers in the Night’ film adaptation brings ‘unstable beauty’ to the screen", "url": "https://www.japantimes.co.jp/culture/2026/06/25/film/cannes-mieko-kawakami-adaptation-all-the-lovers-in-the-night/", "fonte_id": "japan_times", "data_pub": "2026-06-25T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Durante o Festival de Cannes, a diretora Yukiko Sode e os atores Yukino Kishii e Tadanobu Asano refletiram sobre o processo de adaptar o romance de Mieko Kawakami para o cinema. O filme se chama 'Todos os Amantes da Noite' e traz a 'beleza instável' para a tela.", "titulo_pt": "'Todos os Amantes da Noite': Adaptação do Filme Traz 'Beleza Instável' para a Tela", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 17326, "titulo": "Marginalized for her ‘immense ambition’, the genius of director Elaine May is finally being recognized", "url": "https://www.theguardian.com/film/2026/jun/25/elaine-may-director-film-series", "fonte_id": "guardian_culture", "data_pub": "2026-06-25T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma nova retrospectiva sobre a obra de Elaine May, diretora do filme Mikey e Nicky, abriu. Colaboradores do filme falaram sobre como ela abriu caminho para mulheres diretores em Hollywood. Em 1975, May vendeu o filme Mikey e Nicky para Alyce Films, uma empresa fictícia, para manter controle sobre ele.", "titulo_pt": "Marginaizada por sua 'imensa ambição', o gênio da diretora Elaine May finalmente está sendo reconhecido", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 17325, "titulo": "Hot Mess and Acid’s Reign: the romcom and queer cabaret spotlighting climate crisis", "url": "https://www.theguardian.com/stage/2026/jun/25/hot-mess-acids-reign-romcom-cabaret-climate-crisis", "fonte_id": "guardian_culture", "data_pub": "2026-06-25T08:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo movimento musical está explorando as dificuldades do planeta com uma abordagem divertida e esperançosa.  'Hot Mess', um musical criado por Jack Godfrey e Ellie Coote, conta a história de uma relação tóxica entre a Terra e a Humanidade. O musical foi um sucesso no Festival Fringe de Edimburgo e agora está em cartaz em Londres.", "titulo_pt": "Desastre e o Reinado do Ácido: O Romântico e o Cabaret Queer Pontuando a Crise Climática", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 17240, "titulo": "Academy invites 'KPop Demon Hunters' team to be members", "url": "https://www.koreaherald.com/article/10788453", "fonte_id": "korea_herald", "data_pub": "2026-06-25T07:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Academia de Artes e Ciências Cinematográficas convidou 529 pessoas para se juntarem à organização em 2026. Entre os novos membros estão diversos profissionais que trabalharam no filme de animação 'Caçadores de Demônios do K-Pop', lançado em 2022. Os diretores Maggie Kang e Chris Appelhans, além da cantora Ejae (voz da personagem Rumi e co-autora da música", "titulo_pt": "Academia convida equipe dos 'Caçadores de Demônios do K-Pop' a se tornarem membros", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 16573, "titulo": "Como 'Supergirl' leva às telas a heroína complicada do gibi desenhado por brasileiros", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/como-supergirl-leva-as-telas-a-heroina-complicada-do-gibi-desenhado-por-brasileiros.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A quadrinista paulista Bilquis Evely se inspirou na Rua 25 de Março para criar cenas da personagem Supergirl em um ônibus cheio de alienígenas. A ideia foi utilizada no que se tornou um dos gibis mais aclamados da personagem. O trecho foi publicado em 25 de junho de 2026.", "titulo_pt": "Como 'Supergirl' leva às telas a heroína complicada do gibi desenhado por brasileiros", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 17327, "titulo": "‘Rude, heavy-drinking and a committed communist’: the Frida Kahlo you can’t buy in the gift shop", "url": "https://www.theguardian.com/artanddesign/2026/jun/25/frida-kahlo-making-icon-exhibition-tate-modern-london", "fonte_id": "guardian_culture", "data_pub": "2026-06-25T07:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A exposição da artista em Londres levanta questões sobre se a imagem comercializada de Frida Kahlo obscureceu sua realidade. A artista é frequentemente retratada em produtos de consumo como um símbolo de resistência e heroísmo. O artigo explora essa dualidade, questionando se a versão comercializada de Kahlo é completa.", "titulo_pt": "'Rude, bebedora e uma comunista dedicada': a Frida Kahlo que você não encontra na loja de presentes'", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 17324, "titulo": "Bello! Why gen Alpha subconsciously speaks the language of the Minions", "url": "https://www.theguardian.com/film/2026/jun/25/bello-minions-speak-gen-alpha-language", "fonte_id": "guardian_culture", "data_pub": "2026-06-25T06:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo discute a semelhança entre a gíria da Geração Alpha e a língua falada pelos Minions no filme Despicable Me. O autor sugere que a linguagem dos Minions pode ter influenciado a forma como as crianças mais novas se comunicam, com elementos de gírias globais e italiano distorcido presentes em ambas as línguas.", "titulo_pt": "Bello! Por que a Geração Alpha fala subconscientemente a língua dos Minions?", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 17329, "titulo": "‘Above all, there is love’: single mothers caring for disabled children – in pictures", "url": "https://www.theguardian.com/artanddesign/gallery/2026/jun/25/above-all-there-is-love-single-mothers-caring-for-disabled-children-in-pictures", "fonte_id": "guardian_culture", "data_pub": "2026-06-25T06:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As imagens íntimas de Carol Allen-Storey capturam os desafios que as mães enfrentam ao cuidar de crianças com deficiências. As fotos também mostram o grande amor dos pais e das crianças.", "titulo_pt": "'Antes de tudo, há amor': Mães solteiras cuidando de crianças com deficiência - em fotos", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 17328, "titulo": "Edge of Armageddon: why does one of the world’s top thinkers believe we’re nearing nuclear apocalypse?", "url": "https://www.theguardian.com/books/2026/jun/25/armageddon-physicist-carlo-rovelli-nuclear-apocalypse", "fonte_id": "guardian_culture", "data_pub": "2026-06-25T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O físico teórico Carlo Rovelli afirma em seu novo livro que o mundo está novamente à beira de uma crise nuclear. Ele argumenta que os líderes atuais não possuem a mesma capacidade estratégica de Kennedy e Khrushchev durante a Guerra Fria. Rovelli, um físico italiano de 70 anos, se opõe ao rearmeamento e defende sua posição no livro '85 Segundos para Meio-Dia: Um Argumento de um Físico Contra o Rearmamento'.", "titulo_pt": "Na Areia do Apocalipse: Por que um dos maiores pensadores do mundo acredita que estamos perto de uma catástrofe nuclear?", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}], "cultura__eventos": [], "sociedade": [{"id": 17174, "titulo": "Hong Kong is world’s most unequal society for wealth distribution, study finds", "url": "https://www.scmp.com/news/hong-kong/society/article/3358368/hong-kong-worlds-most-unequal-society-wealth-distribution-study-finds?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-25T11:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo descobriu que Hong Kong se tornou a sociedade mais desigual do mundo em termos de distribuição de riqueza. Os principais fatores para essa desigualdade mudaram de disparidades salariais para concentração de capital, reduzindo a mobilidade social.", "titulo_pt": "Hong Kong é a sociedade mais desigual do mundo em distribuição de riqueza, revela estudo", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 16828, "titulo": "Barrio triste: un experimento visual provocador y algo fallido montado en zonas periféricas de Medellín", "url": "https://www.lanacion.com.ar/espectaculos/cine/barrio-triste-un-experimento-visual-provocador-y-algo-fallido-montado-en-zonas-perifericas-de-nid25062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-25T11:04:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O filme 'Barrio Triste', produzido por Harmony Korine e dirigido por Stillz, foi estrelado no último Festival de Veneza. O filme é um experimento visual que se passa em zonas periféricas de Medellín.", "titulo_pt": "Bairro Triste: Um Experimento Visual Provocante e Algo Fallido Montado em Zonas Periféricas de Medellín", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 16721, "titulo": "Investir em Ensino Médio Integral traz retorno para comunidade, diz estudo", "url": "https://www.cnnbrasil.com.br/educacao/investir-em-ensino-medio-integral-traz-retorno-para-comunidade-diz-estudo/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-25T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa avaliou dados de ex-alunos da rede pública para demonstrar a importância do Ensino Médio Integral na elevação da renda da população local. O estudo reforça a ideia de que investir no Ensino Médio Integral gera benefícios para a comunidade como um todo.", "titulo_pt": "Investir em Ensino Médio Integral traz retorno para a comunidade, diz estudo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 16722, "titulo": "Unifesp promove inclusão de imigrantes com aulas gratuitas de português", "url": "https://www.cnnbrasil.com.br/educacao/unifesp-promove-inclusao-de-imigrantes-com-aulas-gratuitas-de-portugues/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-25T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Universidade Federal de São Paulo (Unifesp) está oferecendo aulas gratuitas de português para imigrantes. O ensino será realizado presencialmente aos sábados, das 9h às 13h, no Anfiteatro Flávio da Fonseca, até outubro.", "titulo_pt": "Unifesp promove inclusão de imigrantes com aulas gratuitas de português", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 16686, "titulo": "Terremotos na Venezuela deixam dezenas de mortos e feridos", "url": "https://veja.abril.com.br/mundo/terremotos-na-venezuela-deixam-dezenas-de-mortos-e-feridos/", "fonte_id": "veja", "data_pub": "2026-06-25T09:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Terremotos atingiram a Venezuela, causando mortes e feridos. La Guaira, cidade próxima a Caracas, foi a área mais afetada pelos tremores.", "titulo_pt": "Terremotos na Venezuela deixam dezenas de mortos e feridos", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 16705, "titulo": "TDAH: reconhecer para incluir, incluir para transformar", "url": "https://www.jota.info/opiniao-e-analise/artigos/tdah-reconhecer-para-incluir-incluir-para-transformar", "fonte_id": "jota", "data_pub": "2026-06-25T08:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A aprovação do PL 4225 pela Câmara dos Deputados é considerada uma vitória histórica para milhões de brasileiros com transtornos do neurodesenvolvimento. O projeto visa garantir o acesso a diagnóstico e tratamento adequado para pessoas com TDAH.", "titulo_pt": "TDAH: reconhecer para incluir, incluir para transformar", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 17248, "titulo": "Why are more young Koreans walking away from elite careers?", "url": "https://www.koreaherald.com/article/10788360", "fonte_id": "korea_herald", "data_pub": "2026-06-25T06:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A promessa tradicional na Coreia do Sul era estudar, entrar em uma universidade prestigiada, conseguir um emprego seguro em um grande conglomerado e subir na carreira.  Mais jovens coreanos agora questionam se essa promessa ainda vale a pena, considerando o dinheiro, autonomia, bem-estar mental e a capacidade de construir uma vida satisfatória.", "titulo_pt": "Por que mais jovens coreanos estão desistindo de carreiras de elite?", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 17167, "titulo": "Reports of missing dementia sufferers in Japan fell in 2025 but remain high", "url": "https://www.japantimes.co.jp/news/2026/06/25/japan/society/17000-people-with-dementia-missing/", "fonte_id": "japan_times", "data_pub": "2026-06-25T05:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O número de relatos de desaparecimento de pessoas com demência no Japão diminuiu em 2025, mas ainda permanece elevado. Entre os encontrados, 139 usavam dispositivos de rastreamento de localização, como GPS ou etiquetas de prevenção de perda, por motivos de segurança.", "titulo_pt": "Relatos de desaparecimento de pessoas com demência no Japão caíram em 2025, mas ainda são altos", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 17070, "titulo": "America's child population is shrinking everywhere but the South", "url": "https://www.axios.com/2026/06/25/south-child-population-census", "fonte_id": "axios", "data_pub": "2026-06-25T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A população infantil dos Estados Unidos diminuiu em 1,8 milhão de 2020 a 2025. A única região onde a população infantil aumentou foi o Sul, com 303.969 crianças adicionais em 2025 em comparação com 2020. O resto do país se prepara para menos estudantes e famílias jovens, enquanto o Sul enfrenta o problema oposto: salas de aula lotadas, pressão por moradia nova e aumentos nas apostas políticas.", "titulo_pt": "População infantil americana diminui em todos os lugares, exceto no Sul", "veiculo": "Axios", "pais": "EUA", "classe": "B"}, {"id": 15670, "titulo": "Sobrevivente descreve terremoto na Venezuela: “Como um filme de terror”", "url": "https://www.cnnbrasil.com.br/internacional/sobrevivente-descreve-terremoto-na-venezuela-como-um-filme-de-terror/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-25T01:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Terremotos de magnitude 7,2 e 7,5 atingiram a Venezuela com menos de um minuto de intervalo. Um sobrevivente descreveu os eventos como 'um filme de terror'. As informações são da CNN Brasil.", "titulo_pt": "Sobrevivente descreve terremoto na Venezuela: 'Como um filme de terror'", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 15786, "titulo": "Escuelas desprotegidas", "url": "https://www.latercera.com/cartas-al-director/noticia/tc-y-escuelas-protegidas/", "fonte_id": "la_tercera", "data_pub": "2026-06-25T00:58:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um relatório da ONG Techo Chile revelou que 30% das escolas do país não possuem sistemas de segurança básicos. As instituições carecem de medidas como alarmes, câmeras e iluminação adequada. A falta de proteção aumenta o risco de vandalismo, roubos e até violência contra alunos e funcionários.", "titulo_pt": "Escolas Desprotegidas", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 15788, "titulo": "Personas en situación de calle", "url": "https://www.latercera.com/cartas-al-director/noticia/personas-en-situacion-de-calle/", "fonte_id": "la_tercera", "data_pub": "2026-06-25T00:52:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O artigo discute a situação de pessoas que vivem nas ruas no Chile. Ele menciona as dificuldades enfrentadas por essas pessoas, como falta de moradia e acesso a serviços básicos. O texto também aborda as iniciativas governamentais para ajudar esse grupo.", "titulo_pt": "Pessoas em situação de rua", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 16884, "titulo": "Temblor hoy, jueves 25 de junio en Chile: consulta epicentro y magnitud", "url": "https://www.latercera.com/servicios/noticia/temblor-hoy-jueves-25-de-junio-en-chile-consulta-epicentro-y-magnitud/", "fonte_id": "la_tercera", "data_pub": "2026-06-25T11:26:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Centro Sismológico Nacional da Universidade do Chile registrou movimentos sísmicos recentes. O Senapred oferece recomendações sobre o que fazer em caso de terremoto.", "titulo_pt": "Tremo hoje, 25 de junho no Chile: consulte epicentro e magnitude", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 16869, "titulo": "UK Met Office extends red heat warning into Friday night as extreme heat grips Europe pa, elevando as temperaturas em até 4 graus Celsius. Países europeus registraram temperaturas recordes devido ao calor intenso.", "titulo_pt": "A Europa está aquecendo mais rápido que o resto do planeta. Entenda por quê", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 16723, "titulo": "Cidades do Sul têm segundo dia de temperaturas negativas; veja locais", "url": "https://www.cnnbrasil.com.br/nacional/sul/cidades-do-sul-tem-segundo-dia-de-temperaturas-negativas-veja-locais/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-25T10:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma massa de ar polar causa frio intenso em Santa Catarina e Rio Grande do Sul. Bom Jardim da Serra atingiu -8,5°C nesta quinta-feira (25).", "titulo_pt": "Cidades do Sul registram segundo dia com temperaturas negativas", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 16733, "titulo": "Onda de frio no Brasil: veja quando as temperaturas voltam a subir", "url": "https://www.cnnbrasil.com.br/nacional/brasil/onda-de-frio-no-brasil-veja-quando-as-temperaturas-voltam-a-subir/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-25T10:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma massa de ar polar está causando baixas temperaturas no Brasil. A partir da sexta-feira (26), essa massa de ar perderá força e as temperaturas começarão a subir gradualmente.", "titulo_pt": "Onda de frio no Brasil: veja quando as temperaturas voltam a subir", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 17318, "titulo": "Analysis: UK sales of electric vehicles just overtook petrol cars for the first time", "url": "https://www.carbonbrief.org/analysis-uk-sales-of-electric-vehicles-just-overtook-petrol-cars-for-the-first-time/", "fonte_id": "carbon_brief", "data_pub": "2026-06-25T10:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pela primeira vez no Reino Unido, mais novos veículos elétricos (VE) foram vendidos do que carros a gasolina.  Em junho de 2023, as vendas de VE registraram um aumento de 75% em comparação com o mesmo período do ano anterior.", "titulo_pt": "Análise: Vendas de veículos elétricos no Reino Unido superam as de carros a gasolina pela primeira vez", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 16864, "titulo": "Datacentres facing increase in global climate-related legal cases, report finds", "url": "https://www.theguardian.com/environment/2026/jun/25/datacentres-facing-increase-in-global-climate-related-legal-cases-report-finds", "fonte_id": "guardian_world", "data_pub": "2026-06-25T10:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um relatório da London School of Economics (LSE) analisou cerca de 3.600 ações climáticas desde 2015 e encontrou um número crescente de casos que contestam as fontes de energia, o consumo de água e a poluição do ar dos centros de dados. Esses centros de dados e a inteligência artificial estão cada vez mais no centro das disputas judiciais ambientais em todo o mundo, desde o Chile até a Irlanda.", "titulo_pt": "Centros de dados enfrentam aumento de processos judiciais relacionados ao clima, aponta relatório", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 16899, "titulo": "Los efectos que dejará el “veranito de San Juan” en la Región Metropolitana desde hoy", "url": "https://www.latercera.com/tendencias/noticia/los-efectos-que-dejara-el-veranito-de-san-juan-en-la-region-metropolitana-desde-hoy/", "fonte_id": "la_tercera", "data_pub": "2026-06-25T10:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O 'veranito de São João' mudará o tempo em Santiago por alguns dias. O pronóstico indica que as chuvas voltarão para a Região Metropolitana em breve.", "titulo_pt": "Os efeitos do 'veranito de São João' na Região Metropolitana a partir de hoje", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 16980, "titulo": "Paris Mayor Grégoire on the climate crisis: 'To adapt together, we need to change our way of life'", "url": "https://www.lemonde.fr/en/politics/article/2026/06/25/paris-mayor-gregoire-on-the-climate-crisis-to-adapt-together-we-need-to-change-our-way-of-life_6754853_5.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-25T08:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em uma entrevista ao Le Monde, o líder socialista da capital francesa descreveu o ar condicionado individual como um 'flagelo' e defendeu 'flexibilidade' e 'soluções improvisadas' para responder ao desafio urgente das ondas de calor. Grégoire afirmou que a adaptação conjunta exige mudanças no estilo de vida.", "titulo_pt": "Prefeito de Paris, Grégoire, sobre a crise climática: 'Para nos adaptarmos juntos, precisamos mudar nosso estilo de vida'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 17319, "titulo": "Guest post: How US renewable-energy growth persists despite federal policy uncertainty", "url": "https://www.carbonbrief.org/guest-post-how-us-renewable-energy-growth-persists-despite-federal-policy-uncertainty/", "fonte_id": "carbon_brief", "data_pub": "2026-06-25T08:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Apesar das recentes mudanças nas políticas energéticas federais, uma análise mostra que a transição dos EUA para energias renováveis continua. O crescimento é impulsionado por fatores como custos de energia solar e eólica em queda e investimentos privados.", "titulo_pt": "Crescimento da energia renovável nos EUA persiste apesar da incerteza política federal", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 17043, "titulo": "Heatwave scorches Europe from London to Madrid as temperatures near 39C", "url": "http://www.euronews.com/video/2026/06/25/heatwave-scorches-europe-from-london-to-madrid-as-temperatures-near-39c", "fonte_id": "euronews", "data_pub": "2026-06-25T07:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma onda de calor intensa atravessa a Europa, desde França até Espanha e Bélgica. As temperaturas estão chegando perto dos 39°C, gerando preocupações sobre segurança pública e pressão sobre as infraestruturas.", "titulo_pt": "Ondada de calor assola a Europa, de Londres a Madrid, com temperaturas próximas de 39°C", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 17088, "titulo": "VOLTAGE: Green versus lean in Luxembourg", "url": "https://www.euractiv.com/news/voltage-green-versus-lean-in-luxembourg/", "fonte_id": "euractiv", "data_pub": "2026-06-25T07:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo aborda a reforma REACH, os padrões de emissões de CO2 para carros e o aumento do número de pessoas na cúpula do Conselho.  O foco é a disputa entre as posições verdes e mais econômicas em relação às políticas ambientais.", "titulo_pt": "VOLTAGEM: Verde versus enxuto no Luxemburgo", "veiculo": "Euractiv", "pais": "Europa", "classe": "B"}, {"id": 17092, "titulo": "HARVEST: The seal of excellence", "url": "https://www.euractiv.com/news/harvest-the-seal-of-excellence/", "fonte_id": "euractiv", "data_pub": "2026-06-25T06:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A edição de hoje aborda a estratégia para o setor pecuário, a situação na Ucrânia e as UPFs.  O foco é sobre um selo de excelência que será concedido em uma área específica.", "titulo_pt": "COLHEITA: O selo de excelência", "veiculo": "Euractiv", "pais": "Europa", "classe": "B"}, {"id": 17196, "titulo": "Crocodile discovered on balcony triggers arrest after 100 more reptiles found", "url": "https://www.scmp.com/news/hong-kong/health-environment/article/3358305/crocodile-discovered-balcony-triggers-arrest-after-100-more-reptiles-found?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-25T06:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Policiais de Hong Kong pr b": "2026-06-25T11:20:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um menino de 3 anos foi encontrado morto dentro de um carro estacionado na porta de sua casa pelos pais. O incidente ocorreu durante uma onda de calor em França, onde outras 40 pessoas morreram devido às altas temperaturas.", "titulo_pt": "Menino de 3 anos encontrado morto dentro de carro durante onda de calor na França", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 16741, "titulo": "Dos periodistas suecos triunfan con un thriller que reivindica el periodismo ante la corrupción", "url": "https://www.clarin.com/cultura/periodistas-suecos-triunfan-thriller-reivindica-periodismo-corrupcion_0_v4mvHDwP3V.html", "fonte_id": "clarin", "data_pub": "2026-06-25T11:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O livro 'Jaque à Rainha', ambientado em Malmö, uma das cidades mais diversas da Suécia, é um thriller do gênero nordic noir. A trama gira em torno do assassinato de uma ativista e uma investigação que questiona as versões oficiais. Os autores se inspiraram em experiências jornalísticas reais para criar a história.", "titulo_pt": "Dos jornalistas suecos vencem com thriller que reivindica o jornalismo contra a corrupção", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 17184, "titulo": "Laser aimed at Punch the monkey in Japan prompts zoo’s ‘unacceptable’ warning", "url": "https://www.scmp.com/week-asia/lifestyle-culture/article/3358353/laser-aimed-punch-monkey-japan-prompts-zoos-unacceptable-warning?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-25T10:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um zoológico no Japão emitiu uma advertência após um visitante ser visto apontando um laser para Punch, o macaco bebê que se tornou sensação viral. O Ichikawa City Zoo and Botanical Gardens afirmou ter recebido denúncia sobre um vídeo do YouTube mostrando alguém brilhando um laser em Punch.", "titulo_pt": "Laser apontado para macaco viral no Japão provoca advertência da zoológico", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 17188, "titulo": "Watchdog seeks HK$250,000 for family of late helper sacked during cancer battle", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3358335/watchdog-seeks-hk250000-family-late-helper-sacked-during-cancer-battle?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-25T09:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O órgão regulador de igualdade de Hong Kong está buscando cerca de HK$250.000 (US$31.900) em compensação para a família de uma empregada doméstica que foi demitida por seu empregador em 2019 após ser diagnosticada com câncer cervical avançado e posteriormente faleceu. A Comissão de Oportunidades Iguais (EOC) iniciou ações legais sob a Lei de Discriminação contra Deficientes em 2020 contra Jamil Bushra por demitir Baby Jane Allas em fevereiro de 2019 enquanto ela estava em licença médica.", "titulo_pt": "Órgão regulador busca HK$250 mil para família de empregada doméstica demitida durante batalha contra câncer", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 17209, "titulo": "Vietnamese woman sentenced to 10 yrs in prison for abandoning, killing own baby", "url": "https://en.yna.co.kr/view/AEN20260625011000315", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T08:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um tribunal em Seul sentenciou uma mulher vietnamita a 10 anos de prisão por abandonar e matar seu próprio bebê. O crime ocorreu em 2022, e a mulher foi condenada por homicídio e abandono de incapaz.", "titulo_pt": "Mulher vietnamita sentenciada a 10 anos de prisão por abandonar e matar bebê próprio", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 17237, "titulo": "Vietnamese student gets 10 years for death of abandoned newborn", "url": "https://www.koreaherald.com/article/10788548", "fonte_id": "korea_herald", "data_pub": "2026-06-25T08:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma estudante universitária vietnamita foi condenada a 10 anos de prisão por abandonar seu bebê recém-nascido perto da Universidade Dongguk no ano passado, causando a morte do bebê. O Tribunal Distrital Central de Seul a declarou culpada de abuso infantil resultante em morte sob a Lei sobre Casos Especiais Relativos à Punção de Crimes de Abuso Infantil.", "titulo_pt": "Estudante vietnamita recebe 10 anos de prisão por morte de bebê abandonado", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 17117, "titulo": "Kenya passes controversial bill two years after deadly Gen Z protests", "url": "https://www.aljazeera.com/video/newsfeed/2026/6/25/kenya-passes-controversial-bill-two-years-after-deadly-gen-z-protests?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-25T06:35:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Quênia aprovou uma lei controversa que regulamenta as plataformas online. A aprovação ocorre dois anos após protestos violentos envolvendo jovens, conhecidos como Geração Z, que se opunham a um projeto de lei semelhante.", "titulo_pt": "Quênia aprova projeto controverso dois anos após protestos fatais de jovens", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 17198, "titulo": "Woman in Singapore goes undercover to expose ex-boyfriend in porn group, gets him jailed", "url": "https://www.scmp.com/news/asia/southeast-asia/article/3358302/woman-singapore-goes-undercover-expose-ex-boyfriend-porn-group-gets-him-jailed?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-25T06:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um homem em Singapura fingiu ser sua ex-namorada e compartilhou fotos dela nuas em um grupo de bate-papo sexual com tema religioso. A vítima descobriu a situação e se infiltrou no grupo para investigar, encontrando muitas imagens e vídeos obscenos de mulheres vestidas com roupas religiosas. Ela registrou um boletim de ocorrência contra o homem.", "titulo_pt": "Mulher em Singapura se infiltra para expor ex-namorado em grupo de pornografia, o que leva à sua prisão", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 16867, "titulo": "Fortescue class action: female workers claim sexual harassment at remote mine sites", "url": "https://www.theguardian.com/business/2026/jun/25/fortescue-class-action-female-workers-remote-mining-sites-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-06-25T05:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Trabalhadoras da mineradora de ferro Fortescue estão processando a empresa por alegadas práticas sistêmicas de assédio sexual, violência e retaliação em seus locais de trabalho remotos. A ação coletiva, apresentada na corte federal da Victoria na quinta-feira, inclui alegações de que uma mulher foi arrastada para um beco escuro onde um homem tentou…", "titulo_pt": "Ação coletiva contra Fortescue: trabalhadoras afirmam assédio sexual em minas remotas", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 16157, "titulo": "Loss of fugitive transfer deals a ‘pity’ and only helps criminals, Chris Tang says", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3358247/loss-fugitive-transfer-deals-pity-and-only-helps-criminals-chris-tang-says?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-25T02:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Chris Tang Ping-keung, secretário para a Segurança de Hong Kong, afirmou que a perda de acordos de extradição com alguns países é uma 'pena'. Tang disse que a decisão de retomar os acordos de transferência de fugitivos cabe aos países que os suspenderam. O oficial também afirmou que a perda dos uplicata_de": null, "texto_pt": "O caso Sartor envolve a investigação de um possível crime de fraude fiscal e corrupção.  Acusações foram feitas contra o ex-presidente da empresa estatal Codelco, Patricio Contesse, por supostas irregularidades em contratos durante sua gestão. O caso está sob investigação judicial.", "titulo_pt": "Caso Sartor", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 15791, "titulo": "“Es injusta y clasista; raya lo inconstitucional”: Aníbal Mosa anuncia que Colo Colo apelará sanción contra Javier Correa", "url": "https://www.latercera.com/el-deportivo/noticia/es-injusta-y-clasista-raya-lo-inconstitucional-anibal-mosa-anuncia-que-colo-colo-apelara-sancion-contra-javier-correa/", "fonte_id": "la_tercera", "data_pub": "2026-06-25T00:34:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Aníbal Mosa, presidente do Colo Colo, afirmou que a punição de quatro jogos aplicada ao jogador Javier Correa por suas declarações contra o árbitro Nicolás Gamboa é injusta e classista. Mosa anunciou que o clube irá recorrer da decisão, argumentando que ela é inconstitucional.", "titulo_pt": "É injusta e classista; ultrapassa o inconstitucional”: Aníbal Mosa anuncia que Colo Colo apelará sanção contra Javier Correa", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 16082, "titulo": "Two years on, Kenyan families still seek justice after Gen Z protests", "url": "https://www.aljazeera.com/news/2026/6/25/two-years-on-kenyan-families-still-seek-justice-after-gen-z-protests?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-25T00:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Famílias das vítimas fatais e desaparecidas afirmam que as investigações estão paradas e a responsabilização continua fora de alcance. Os protestos da Geração Z ocorreram há dois anos no Quênia.", "titulo_pt": "Dois anos depois, famílias quenianas ainda buscam justiça após protestos da Geração Z", "veiculo": "A };
const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
