<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>

<script>
const D = {"gerado_em": "22/06/2026 21:45", "stats": {"noticias_total": 11114, "resumos_total": 2312, "sem_topico": 0, "ultima_coleta": "2026-06-22T23:29:50Z"}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O presidente Luiz Inácio Lula da Silva afirmou que os bons resultados do Banco Nacional de Desenvolvimento Econômico e Social (BNDES) são resultado da retomada da confiança dos técnicos na gestão atual. Durante a cerimônia de aniversário de 74 anos do BNDES, Lula anunciou também o reforço de R$ 140 bilhões para o programa Nova Indústria Brasil (NIB). Paralelamente, o Tribunal Superior Eleitoral (TSE) retirou do ar uma publicação que usava uma imagem falsa, produzida com a técnica 'deep fake', associando o pré-candidato à presidência Flávio Bolsonaro ao banqueiro Daniel Vorcaro. O pedido foi feito pelo Partido Liberal (PL).  Em outro evento, o presidente Lula chamou o governador interino do Rio de Janeiro, Ricardo Couto, de 'interventor' durante uma cerimônia. Durante a cerimônia, Lula e Couto se elogiaram mutuamente. A direção nacional do PSDB impediu que filiados de São Paulo articulassem apoio à reeleição do governador Tarcísio de Freitas (Republicanos), afirmando que a decisão sobre o apoio será tomada posteriormente, considerando uma estratégia para todo o país.", "mundo": "Abelardo de la Espriella, advogado e milionário que era um outsider antes da eleição, venceu as eleições presidenciais colombianas, marcando o fim do primeiro governo de esquerda no país. Essa vitória marca uma tendência política para o lado direito na América Latina, com Colômbia e Peru se juntando a Argentina, Chile, Equador, Bolívia e Panamá nessa direção. A votação teve o maior número de participantes na história da Colômbia. Em outro resultado político importante, Keir Starmer renunciou ao cargo de Primeiro-Ministro do Reino Unido após menos de dois anos no cargo. Ele afirmou que a mensagem do partido é que ele deve deixar o posto, após semanas de pressão interna e baixa popularidade. A decisão ocorre em um momento de instabilidade política no país, com facções internas disputando poder e uma população cética.  Em Montreal, um tiroteio deixou três pessoas mortas, incluindo o suspeito e um policial. Um segundo policial foi ferido gravemente no confronto. Os detalhes sobre a identidade da vítima civil não foram divulgados. A prefeita de Montreal, Soraya Martinez Ferrada, pediu o fim das checagens aleatórias da polícia enquanto a força policial enfrenta uma investigação interna sobre racismo e perfil racial por parte de 16 policiais.\n\nEm meio a tensões crescentes na região da Coreia do Norte, o líder Kim Jong-un pediu esforços para expandir o arsenal nuclear do país durante uma reunião chave do Partido dos Trabalhadores. A informação foi divulgada pela KCNA, agência de notícias estatal da Coreia do Norte, e ocorre após uma série de testes de mísseis realizados por Pyongyang.  A China impôs novas restrições de exportação de terras raras, reforçando seu controle sobre a cadeia de suprimentos e intensificando as tensões com Washington. O governo americano afirmou que as sanções demonstram que os fornecedores chineses são 'não confiáveis', em resposta às restrições impostas por Pequim após o governo americano impor restrições à venda de chips para empresas chinesas.  Em um cenário geopolítico complexo, o Irã recebeu isenções para exportação de petróleo, oferecendo apoio financeiro à sua economia durante as negociações sobre o acordo nuclear iraniano. Apesar dos avanços nas conversas na Suíça com os Estados Unidos, preocupações persistem sobre a situação no Estreito de Ormuz e os conflitos no Líbano. O governo israelense expressa preocupação com a diplomacia americana com o Irã, temendo que isso legitime a influência iraniana no Líbano e erodir a liberdade de ação de Israel.", "economia": "As exportações de algodão do Brasil superaram o total exportado em junho de 2025, alcançando 146,8 mil toneladas até a terceira semana de junho de 2026. O ritmo de embarques tem apresentado forte aceleração.  Em outros setores da economia brasileira, o mercado financeiro elevou a previsão para o IPCA (Índice Nacional de Preços ao Consumidor Amplo) para 5,33% este ano, marcando a décima quinta semana consecutiva de aumento na estimativa. O programa Nova Indústria Brasil (NIB) receberá um aporte adicional de R$ 140 bilhões até o fim do ano, totalizando R$ 750 bilhões em investimentos desde 2023.  Empresários do ramo industrial listaram redução de impostos, consolidação da reforma tributária e equilíbrio fiscal como prioridades para a gestão 2027-2030. A Receita Federal liberará a consulta ao segundo lote da restituição do Imposto de Renda Pessoa Física (IRPF) nesta terça-feira (23), com o maior lote da história, contemplando 9.585.797 contribuintes e pagamentos totais de R$ 16 bilhões.  No cenário internacional, a ação da empresa espacial SpaceX perdeu cerca de US$ 400 bilhões em valor de mercado após aumento das taxas de juros dos títulos americanos, enquanto o sentimento do consumidor sul-coreano aumentou pela segunda vez seguida em junho devido ao desempenho forte nas exportações e à alta no mercado de ações.  Em Argentina, a redução das taxas hipotecárias aumentou o interesse por crédito imobiliário. As casas pré-fabricadas estão ganhando popularidade na Argentina devido aos seus tempos de construção mais rápidos e custos previsíveis.", "tecnologia": "A SK hynix Inc. superou a Samsung Electronics na capitalização de mercado nesta segunda-feira, tornando-se a empresa mais valiosa da Coreia do Sul. O valor de mercado da SK hynix é superior ao da Samsung Electronics.  Em meio à corrida por investimentos em inteligência artificial (IA), o governo chinês abriu caminho para empresas de modelos de linguagem grandes (LLM) no Mercado STAR, facilitando sua entrada no mercado de capitais. A China também adicionou 10 empresas americanas à sua lista de controle de exportações, proibindo a exportação de itens de uso dual para essas empresas. Enquanto isso, nos Estados Unidos, o governo busca minimizar o impacto da automação no mercado de trabalho, analisando as consequências da substituição de trabalhadores por IA e propondo soluções governamentais para mitigar os efeitos negativos. Grupos de private equity estão utilizando a tecnologia 'vibecoding' para criar réplicas de softwares e avaliar suas vantagens competitivas, enquanto a Bain & Company testa essa abordagem para identificar potenciais alvos de aquisição no setor de software. A intensificação da competição e a queda de lucros no mercado de veículos elétricos (NEV) na China estão levando os fabricantes automotivos a buscarem novos motores de crescimento em robôs humanoides.  A empresa sul-coreana GS Engineering & Construction (E&C) Corp. e o fundo global de investimento I Squared Capital anunciarão uma parceria para desenvolver projetos de energia renovável, investindo em projetos solares e eólicos na América do Norte e Europa.", "ciencia": "François Englert, físico laureado com o Prêmio Nobel por sua contribuição para a previsão da existência do bóson de Higgs, conhecido como 'partícula de Deus', faleceu aos 93 anos.  O trabalho de Englert foi fundamental para confirmar a existência do campo que confere massa às outras partículas, um marco na física moderna. Paralelamente, a NASA prepara-se para celebrar o Acordo Artemis com o Botswana, durante uma cerimônia em sua sede. O acordo visa promover a cooperação espacial entre os dois países e fortalecer as relações internacionais no setor. Em outro desenvolvimento, a indústria farmacêutica está vivenciando um período de intensa atividade, com empresas como a AbbVie realizando aquisições estratégicas para expandir seus portfólios de medicamentos. A AbbVie adquiriu a Apogee Therapeutics por cerca de US$ 11 bilhões, buscando fortalecer sua presença no mercado de tratamentos para dermatite atópica.  A Definium Therapeutics também anunciou resultados promissores em seu ensaio clínico de Fase 3 com uma terapia com LSD para depressão major, aproximando o medicamento psicodélico de uma possível aprovação pela FDA. A empresa busca revolucionar o tratamento da depressão com essa nova abordagem terapêutica.", "cultura": "O produtor musical e executivo de gravadora Clive Davis faleceu aos 94 anos. Davis foi responsável por lançar a carreira de vários artistas famosos da música popular, incluindo Whitney Houston.  No mundo literário, o autor do texto 'O Cão sem Plumas' de João Cabral de Melo Neto fez com que o leitor chorasse ao ler seu poema. O artista Vik Muniz usou cinzas do Museu Nacional para recriar relíquias perdidas no incêndio de 2018.  No cinema, a exposição 'Ritrovato' em Bolonha lotou as salas com a restauração do filme 'Aurora', de F.W. Murnau. A série 'Justiça 2', que estreou no Globoplay em 2024, será exibida na TV aberta em julho. O programa 'Conversa com Bial' retornará à Globo em julho, com a maioria dos episódios gravados no Copacabana Palace.  No cenário musical, o cantor porto-riquenho Bad Bunny está atraindo grande atenção no Reino Unido, com o Seven Sisters Latin Village homenageando o artista com construções e eventos especiais. Gilberto Gil lançará um álbum ao vivo gravado durante sua turnê 'Tempo Rei' para celebrar seu aniversário. Hermeto Pascoal será homenageado em uma edição especial do programa Jazz Livre da Rádio MEC.  O filme 'Saccharine', sobre a relação de Hana Hitching com compulsão alimentar e rotinas de exercícios rigorosos, é um exemplo de como Hollywood explora as ansiedades em relação à imagem corporal. A exposição Frida no Tate Modern, Londres, explora a obra de Frida Kahlo, mas o texto critica a inclusão de obras de artistas menos conhecidos na mostra.  O estudante chinês Zhou Xin relaciona a obra 'Retirantes' de Portinari com o sofrimento chinês, demonstrando como a arte brasileira pode ser compreendida em diferentes culturas. O livro 'O Guia Invertido do Centauro para a Vida Após a IA' de Cory Doctorow critica a crescente rejeição à inteligência artificial por parte dos estudantes.", "sociedade": "Uma tragédia abalou o sul da França quando dois irmãos, de 2 e 4 anos, foram encontrados mortos dentro do carro da família em Carpentras. A mãe das crianças encontrou os filhos no veículo estacionado na garagem da casa familiar. Os serviços de emergência tentaram reanimá-los, mas não conseguiram salvá-los.  Em Taiwan, o suicídio foi a décima principal causa de morte em 2022, com 689 mortes registradas, representando uma taxa de 3 por 100 mil habitantes. O número de suicídios aumentou em relação ao ano anterior. Em contraste, o Banco Central de Taiwan relata que a confiança dos consumidores no país está alta, atribuindo essa confiança ao crescimento econômico recente e às políticas governamentais.  Em outros países, uma série de eventos chamou atenção para questões sociais. No Chile, um estudo analisa como os hospitais estão assumindo o papel da rede de cuidados primários, com pacientes buscando atendimento hospitalar para problemas que poderiam ser resolvidos na atenção básica. Essa tendência pode sobrecarregar os sistemas hospitalares e impactar a qualidade do atendimento. Em Minas Gerais, uma mulher foi encontrada morta e decapitada em seu quarto, e seu filho confessou o crime após a chegada das tropas militares ao local. Uma vizinha teria ouvido gritos vindos da casa antes do crime.  Em Lucknow, Índia, um incêndio em um prédio comercial que abrigava uma biblioteca e um estúdio de animação resultou na morte de pelo menos 14 pessoas, sendo a maioria estudantes universitários. O Japão enfrenta desafios com seu sistema de reabilitação, dependendo fortemente de assistentes de liberdade condicional voluntários, mas o envelhecimento da força de trabalho e as escassez estão colocando pressão no sistema.  A Coreia do Sul testemunha um novo fenômeno: jovens adultos permanecendo em casa, ajudando a administrar o lar e cuidando de pais idosos, devido à escassez de empregos e ao aumento dos custos habitacionais. Essa sequência tradicional de sucesso na Coreia do Sul está sendo questionada por um número crescente de jovens.", "meio_ambiente": "Uma onda de calor na França resultou em 18 mortes, incluindo duas crianças, enquanto a Europa enfrenta temperaturas recordes. O país fechou mais de 1.350 escolas devido ao calor extremo e a temperatura média da França quebrou um recorde para junho.  Em Manaus, autoridades pretendem ampliar as ecobarreiras utilizadas para diminuir a poluição dos rios. Desde o início de 2023, as barreiras já retiraram nove piscinas olímpicas de lixo das águas. No Peru, vastas camadas de permafrost se encontram abaixo das encostas superiores do mais alto vulcão do país. O permafrost pode se tornar uma fonte regional de água à medida que os glaciares dos Andes retrocedam.  O Carbon Brief lançou um banco de dados chamado Cosmos que contém mais de 1,8 milhão de estudos acadêmicos sobre o clima. O banco de dados visa fornecer acesso a uma vasta gama de pesquisas e evidências científicas sobre mudanças climáticas. Em Novo México, foi inaugurado o parque eólico SunZia, equipado com 916 turbinas de vento e capaz de gerar 3.650 megawatts de energia. Isso representa 45% da capacidade eólica de Novo México.", "direitos_humanos": "Um tiroteio ocorrido no bairro Côte-des-Neiges, em Montreal, resultou na morte de três pessoas: um policial, um civil e o suspeito do ataque. As autoridades ainda investigam a motivação por trás do incidente.  Em outro caso, um relatório do Ministério da Justiça e da Gendarmerie Nacional identificou uma série de erros e falta de cumprimento de procedimentos por parte do Ministério Público em Auch e da Gendarmerie em Lectoure, na França, no caso da morte da criança de 11 anos, Lyhanna.  Na Coreia do Sul, investigações procuram um mandado de prisão para o líder da seita Shincheonji, Lee Man-hee, em relação ao surto de COVID-19 que teve origem em uma igreja da seita. O caso destaca a importância de medidas rigorosas para conter a propagação de doenças infecciosas e garantir a segurança pública.  Em Taiwan, um comandante militar foi indiciado por abuso verbal racista contra soldados durante uma reunião no quartel da 2ª Brigada de Infantaria Mecanizada do Exército. A situação demonstra a necessidade de combater o racismo e promover a igualdade dentro das forças armadas."}, "resumo_do_dia": {"politica_nacional": [{"id": 9896, "titulo": "Cidadania se irrita com líder do PSDB e estuda lançar candidato ao Governo de SP", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/cidadania-se-irrita-com-lider-do-psdb-e-estuda-lancar-candidato-ao-governo-de-sp.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-22T23:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Cidadania está considerando a possibilidade de colocar um candidato à disputa pelo governo de São Paulo. Essa decisão surge após o presidente do PSDB paulista, Paulo Serra, ter desistido de concorrer à sucessão de Tarcísio de Freitas.", "titulo_pt": "Cidadania se irrita com líder do PSDB e estuda lançar candidato ao Governo de SP", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 9928, "titulo": "Procuradoria é contra suspensão por Nunes Marques de pesquisa que mostrou queda de intenção de votos de Flávio Bolsonaro", "url": "https://g1.globo.com/politica/noticia/2026/06/22/procuradoria-e-contra-suspensao-por-nunes-marques-de-pesquisa-que-mostrou-queda-de-intencao-de-votos-de-flavio-bolsonaro.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-22T22:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Procuradoria-Geral Eleitoral pediu ao Tribunal Superior Eleitoral (TSE) que reverta a decisão do presidente Kassio Nunes Marques, que suspendeu a divulgação de uma pesquisa do Instituto AtlasIntel. A pesquisa indicava queda na intenção de voto do senador Flávio Bolsonaro (PL-RJ). O TSE ainda não se manifestou sobre o pedido.", "titulo_pt": "Procuradoria se opõe à suspensão da pesquisa sobre intenção de votos de Flávio Bolsonaro", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 9897, "titulo": "PGR defende envio do caso 'Dark Horse' a Mendonça, e Fachin definirá relator após pedido de Moraes", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/pgr-defende-envio-do-caso-dark-horse-a-mendonca-e-fachin-definira-relator-apos-pedido-de-moraes.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-22T22:13:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro Alexandre de Moraes pediu ao presidente do STF, Edson Fachin, para decidir se um pedido de investigação sobre o filme 'Dark Horse' ficará sob sua relatoria ou do ministro André Mendonça. O procurador-geral da República (PGR) defendeu que o caso seja enviado a Mendonça.", "titulo_pt": "PGR defende envio do caso 'Dark Horse' a Mendonça, e Fachin definirá relator após pedido de Moraes", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 9898, "titulo": "Entidades pedem participação em processo que acusa Universal de assédio judicial contra jornalista", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/entidades-pedem-participacao-em-processo-que-acusa-universal-de-assedio-judicial-contra-jornalista.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-22T21:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Seis organizações defenderam a liberdade de expressão e da imprensa pediram para participar como amigos da corte de uma ação. O Ministério Público Federal no Rio de Janeiro acusa a Igreja Universal do Reino de Deus de assédio judicial contra o escritor e jornalista João Paulo Cuenca.", "titulo_pt": "Entidades pedem participação em processo que acusa Universal de assédio judicial contra jornalista", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 9976, "titulo": "Preso por estupro, Thiago Brennand vai se casar com Karina Kufa, ex-advogada de Bolsonaro", "url": "https://veja.abril.com.br/brasil/preso-por-estupro-thiago-brennand-vai-se-casar-com-karina-kufa-ex-advogada-de-bolsonaro/", "fonte_id": "veja", "data_pub": "2026-06-22T21:47:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Thiago Brennand, preso por estupro, irá se casar com Karina Kufa, ex-advogada de Jair Bolsonaro. O casamento está previsto para 2 de julho no cartório de Potim, interior paulista.", "titulo_pt": "Preso por estupro, Thiago Brennand vai se casar com Karina Kufa, ex-advogada de Bolsonaro", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 9929, "titulo": "Jaques Wagner recorre ao STF e pede anulação da operação da PF que teve o senador como um dos alvos", "url": "https://g1.globo.com/politica/noticia/2026/06/22/jaques-wagner-recorre-ao-stf-e-pede-anulacao-da-operacao-da-pf-que-teve-o-senador-como-um-dos-alvos.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-22T21:37:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Jaques Wagner (PT-BA), líder do governo no Senado, pediu ao Supremo Tribunal Federal (STF) a anulação da operação da Polícia Federal (PF) que o alvo. A 9ª fase da Operação Compliance Zero apontou que Wagner atuou em defesa de interesses do Banco Master.", "titulo_pt": "Jaques Wagner recorre ao STF para anular operação da PF que o atingiu", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 9930, "titulo": "Com voz rouca, Lula reduz duração de discursos em agendas no Rio", "url": "https://g1.globo.com/politica/noticia/2026/06/22/com-voz-rouca-lula-reduz-duracao-de-discursos-durante-agendas-no-rio.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-22T21:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Luiz Inácio Lula da Silva apresentou-se com voz rouca durante compromissos no Rio de Janeiro. Devido à rouquidão, o presidente diminuiu a duração dos seus discursos nos eventos. Lula tem intensificado os compromissos públicos em estados para apresentar entregas antes das restrições eleitorais.", "titulo_pt": "Com voz rouca, Lula reduz duração de discursos em agendas no Rio", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 9899, "titulo": "Deputada usa carro oficial para lançamento de pré-candidatura em SP", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/deputada-usa-carro-oficial-para-lancamento-de-pre-candidatura-em-sp.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-22T21:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A deputada estadual Marina Helou (PSB) utilizou um carro oficial da Assembleia Legislativa de São Paulo (Alesp) para ir a um evento no qual anunciou sua pré-candidatura à deputado federal. O evento ocorreu neste domingo (21), em São Paulo.", "titulo_pt": "Deputada usa carro oficial para lançamento da pré-candidatura em SP", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 9900, "titulo": "GSI erra e nomeia major 'Fulano de Tal' e tenente 'Cicrano de Tal' para segurança de Lula", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/gsi-erra-e-nomeia-major-fulano-de-tal-e-tenente-cicrano-de-tal-para-seguranca-de-lula.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-22T20:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Gabinete de Segurança Institucional (GSI) publicou uma portaria com erro, nomeando o major do Exército como 'Fulano de Tal' e o tenente da Polícia Militar do Distrito Federal como 'Cicrano de Tal'. Ambos foram designados para atuarem como assistentes na Secretaria de Segurança Presidencial.", "titulo_pt": "GSI comete erro e nomeia major 'Fulano de Tal' e tenente 'Cicrano de Tal' para segurança de Lula", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 9901, "titulo": "Propostas de castração química defendidas por Flávio emperram no Congresso", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/propostas-de-castracao-quimica-defendidas-por-flavio-emperram-no-congresso.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-22T20:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Propostas de castração química para estupradores, defendidas pelo presidenciável Flávio Bolsonaro (PL), foram apresentadas como projetos de lei por deputados e senadores nos últimos anos.  As propostas não avançaram no Congresso.", "titulo_pt": "Propostas de castração química defendidas por Flávio Bolsonaro emperram no Congresso", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 9902, "titulo": "Zema diz que exigirá estudo só de homem no Bolsa Família porque mulher 'tem outras atribuições em casa'", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/zema-diz-que-exigira-estudo-so-de-homem-no-bolsa-familia-porque-mulher-tem-outras-atribuicoes-em-casa.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-22T20:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O candidato à presidência Romeu Zema afirmou que, caso seja eleito, exigirá dos homens beneficiários do Bolsa Família a conclusão de estudos e cursos técnicos. Para as mulheres, essa exigência não será imposta, pois Zema afirmou que elas 'têm outras atribuições em casa'.", "titulo_pt": "Zema afirma que exigirá estudo para homens no Bolsa Família, mas não para mulheres", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 9931, "titulo": "'Dark Horse': PGR avalia que cabe a Mendonça, e não Moraes, decidir sobre pedido para investigar repasse de Vorcaro", "url": "https://g1.globo.com/politica/noticia/2026/06/22/dark-horse-pgr-avalia-que-cabe-a-mendonca-e-nao-moraes-decidir-sobre-pedido-para-investigar-repasse-de-vorcaro.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-22T20:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O procurador-geral da República, Paulo Gonet, afirmou em parecer que o ministro André Mendonça deve ser o relator de um pedido para investigar valores solicitados pelo senador Flávio Bolsonaro ao ex-banqueiro Daniel Vorcaro. O pedido foi apresentado pelo deputado Lindebrgh Farias no inquérito relatado por Alexandre de Moraes.", "titulo_pt": "'Cavalo Negro': PGR avalia que cabe a Mendonça, e não Moraes, decidir sobre pedido para investigar repasse de Vorcaro", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 9932, "titulo": "Flávio Bolsonaro critica decisões monocráticas de ministros do STF e diz que insegurança jurídica afasta investimentos", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/06/22/flavio-bolsonaro-critica-decisoes-monocraticas-de-ministros-do-stf-e-diz-que-inseguranca-juridica-afasta-investimentos.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-22T20:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio Bolsonaro criticou as decisões monocráticas dos ministros do Supremo Tribunal Federal (STF). Ele afirmou que é inaceitável que um ministro possa desfazer uma decisão do Congresso Nacional. Bolsonaro também disse que a insegurança jurídica afastaria investimentos.", "titulo_pt": "Flávio Bolsonaro critica decisões isoladas de ministros do STF e diz que insegurança jurídica afasta investimentos", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 9933, "titulo": "Partidos já protocolaram 135 representações no TSE contra campanha antecipada", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/06/22/partidos-ja-protocolaram-135-representacoes-no-tse-contra-campanha-antecipada.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-22T20:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Tribunal Superior Eleitoral (TSE) recebeu 135 representações de partidos políticos sobre campanhas eleitorais antecipadas desde janeiro deste ano.  Essa quantidade é um aumento de 335% em comparação com o mesmo período em 2022, quando foram registradas apenas 31 representações. O PT e o PL são os partidos que mais protocolaram as representações.", "titulo_pt": "Partidos já protocolaram 135 representações no TSE contra campanha antecipada", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 9903, "titulo": "Flávio e Tarcísio terão novas agendas conjuntas nesta terça, após ato no final de semana", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/flavio-e-tarcisio-terao-novas-agendas-conjuntas-apos-ato-no-final-de-semana.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-22T19:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O pré-candidato a presidente Flávio Bolsonaro (PL) e o governador de São Paulo, Tarcísio de Freitas (Republicanos), se encontrarão em Presidente Prudente (SP) nesta terça-feira (23).  A reunião ocorre após um ato realizado no final de semana.", "titulo_pt": "Flávio e Tarcísio terão novas agendas conjuntas nesta terça, após ato no final de semana", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 10006, "titulo": "Atlas/Intel: Lula lidera pesquisa no Piauí com 63,9%. Flávio tem 15%", "url": "https://www.metropoles.com/brasil/atlas-intel-lula-lidera-pesquisa-no-piaui-com-639-contra-15-de-flavio", "fonte_id": "metropoles", "data_pub": "2026-06-22T18:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa Atlas/Intel mostra que o presidente Lula lidera a corrida eleitoral no Piauí com 63,9% das intenções de voto. O candidato do PL, Flávio Dino, aparece em segundo lugar com 15%. A pesquisa foi realizada no estado piauiense.", "titulo_pt": "Atlas/Intel: Lula lidera pesquisa no Piauí com 63,9%, Flávio tem 15%", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 10829, "titulo": "N. Korea vows to expand nuclear arsenal at key party meeting: KCNA", "url": "https://en.yna.co.kr/view/AEN20260623000900315", "fonte_id": "yonhap_news", "data_pub": "2026-06-22T22:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O líder norte-coreano, Kim Jong-un, pediu esforços para expandir o arsenal nuclear da Coreia do Norte durante uma reunião chave do Partido dos Trabalhadores. A informação foi divulgada pela KCNA, agência de notícias estatal da Coreia do Norte. O anúncio foi feito em meio a tensões crescentes na região após uma série de testes de mísseis realizados por Pyongyang.", "titulo_pt": "NK promete expandir arsenal nuclear em reunião importante do partido: KCNA", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 10511, "titulo": "Shooting in Montreal leaves three dead, including suspect and a police officer", "url": "https://www.lemonde.fr/en/international/article/2026/06/23/shooting-in-montreal-leaves-three-dead-including-suspect-and-a-police-officer_6754764_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-22T22:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um tiroteio em Montreal resultou na morte de três pessoas, incluindo o suspeito e um policial. Um segundo policial foi ferido gravemente no confronto. Os detalhes sobre a identidade da vítima civil não foram divulgados.", "titulo_pt": "Tiroteio em Montreal deixa três mortos, incluindo suspeito e um policial", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 10659, "titulo": "Iran oil waiver offers lifeline to Tehran as talks proceed", "url": "https://www.japantimes.co.jp/news/2026/06/23/world/politics/iran-oil-waiver-tehran-talks/", "fonte_id": "japan_times", "data_pub": "2026-06-22T22:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Irã recebeu isenções para exportação de petróleo, o que oferece um apoio financeiro à economia do país. As negociações sobre o acordo nuclear iraniano estão em andamento, mas ainda há preocupações sobre a situação no Estreito de Ormuz e os conflitos no Líbano.", "titulo_pt": "Isenções para petróleo iraniano oferecem suporte a Teerã enquanto as negociações prosseguem", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 10658, "titulo": "Burnham poised for power in U.K. after Starmer steps aside", "url": "https://www.japantimes.co.jp/news/2026/06/23/world/burnham-uk-pm-starmer-resign/", "fonte_id": "japan_times", "data_pub": "2026-06-22T22:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Keir Starmer enfrenta dificuldades para manter o poder após a vitória de Burnham nas eleições. A vitória de Burnham sobre o candidato do Reform foi decisiva e tornou a posição de Starmer cada vez mais frágil.", "titulo_pt": "Burnham pronto para assumir poder no Reino Unido após Starmer se retirar", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 10388, "titulo": "Starmer Resigns as Burnham Eyes Top Job", "url": "https://foreignpolicy.com/2026/06/22/keir-starmer-uk-prime-minister-resignation-andy-burnham-labour/", "fonte_id": "foreign_policy", "data_pub": "2026-06-22T22:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Após uma década do Brexit, o Reino Unido ainda enfrenta dificuldades para se estabilizar. Starmer renunciou ao cargo de líder do Partido Trabalhista, abrindo caminho para que Burnham concorra à liderança.", "titulo_pt": "Starmer Renuncia Enquanto Burnham Almeja Cargo Superior", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 10377, "titulo": "Trump Can’t Spin His Way Out of His Two Latest Crises", "url": "https://www.theatlantic.com/newsletters/2026/06/trump-iran-reflecting-pool-reality/687665/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-22T21:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo discute as duas crises recentes enfrentadas por Trump: o estado do Lago Reflecting Pool e a perda da guerra.  Ele argumenta que Trump está tentando negar a realidade dessas situações.", "titulo_pt": "Trump Não Consegue Manipular Seus Dois Últimos Crise", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 10447, "titulo": "Israel fears Trump is strengthening Iran's hand in Lebanon", "url": "https://www.axios.com/2026/06/22/israel-lebanon-ceasefire", "fonte_id": "axios", "data_pub": "2026-06-22T21:44:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo israelense está preocupado que os Estados Unidos estejam legitimando a influência do Irã no Líbano e erodir a liberdade de operação de Israel por meio de novos entendimentos alcançados na Suíça e do memorando de entendimento assinado com o Irã na última semana.  As autoridades israelenses temem que o governo Trump esteja agora limitando as ações de Israel no Líbano para promover sua diplomacia com o Irã.", "titulo_pt": "Israel teme que Trump esteja fortalecendo a mão da Irã no Líbano", "veiculo": "Axios", "pais": "EUA", "classe": "B"}, {"id": 10684, "titulo": "‘I will do what I have to do’ if Iran does not stick to deal, says Trump", "url": "https://www.scmp.com/news/world/united-states-canada/article/3357978/i-will-do-what-i-have-do-if-iran-does-not-stick-deal-says-trump?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-22T21:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente dos EUA, Donald Trump, afirmou que tomará medidas caso o Irã não cumpra o acordo com Washington. Trump disse que, se o Irã não honrar o acordo ou se comportar de forma inadequada, ele fará o necessário.  Trump e o presidente iraniano, Masoud Pezeshkian, assinaram um acordo provisório entre EUA e Irã na semana passada.", "titulo_pt": "'Farei o que tiver que fazer' se Irã não cumprir acordo, diz Trump", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 10278, "titulo": "Keir Starmer Resigns as UK Prime Minister", "url": "https://www.nytimes.com/2026/06/22/world/europe/keir-starmer-andy-burnham-prime-minister-britain.html", "fonte_id": "nyt_world", "data_pub": "2026-06-22T21:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Keir Starmer irá renunciar ao cargo de Primeiro Ministro do Reino Unido nas próximas semanas.  Essa decisão abre caminho para Andy Burnham, prefeito popular do Partido Trabalhista, se tornar o sétimo primeiro-ministro do país em uma década.", "titulo_pt": "Keir Starmer renuncia como Primeiro Ministro do Reino Unido", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 10389, "titulo": "China Flexes Its Rare-Earth Muscle—Again", "url": "https://foreignpolicy.com/2026/06/22/china-us-rare-earth-export-control-trade/", "fonte_id": "foreign_policy", "data_pub": "2026-06-22T21:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A China impôs novas restrições de exportação. As medidas reforçam o controle da China sobre a cadeia de suprimentos de terras raras, no contexto das tensões com Washington.", "titulo_pt": "China Flexa Seu Poder sobre Terras Raras - Novamente", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 10390, "titulo": "Why Is Alibaba on a Pentagon Blacklist?", "url": "https://foreignpolicy.com/2026/06/22/china-military-civil-fusion-pentagon-blacklist-alibaba-baidu/", "fonte_id": "foreign_policy", "data_pub": "2026-06-22T21:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa chinesa Alibaba foi incluída na lista negra do Pentágono. A decisão se baseia na dificuldade dos Estados Unidos em separar as atividades militares e civis da China.", "titulo_pt": "Por que a Alibaba está na lista negra do Pentágono?", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 10622, "titulo": "Burnham poised to succeed Starmer as UK prime minister", "url": "https://www.ft.com/content/71001d5b-4567-4ac3-b4ec-355fa89efaf6", "fonte_id": "financial_times", "data_pub": "2026-06-22T20:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O atual prefeito do Grande Manchester, Andy Burnham, está se preparando para assumir o cargo de primeiro-ministro do Reino Unido. Burnham entrará em negociações com o serviço civil e se espera que entre no número 10 dentro de algumas semanas.", "titulo_pt": "Burnham pronto para suceder Starmer como primeiro-ministro do Reino Unido", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 10581, "titulo": "15 killed after a fire ignited in a coaching centre in Lucknow, India", "url": "https://www.aljazeera.com/video/newsfeed/2026/6/22/15-killed-after-a-fire-ignited-in-a-coaching-centre-in-lucknow-india?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-22T20:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio ocorreu em um centro de coaching em Lucknow, Índia, resultando na morte de 15 pessoas. O incidente aconteceu no dia [data do evento]. As autoridades estão investigando as causas do incêndio.", "titulo_pt": "15 mortos após incêndio em centro de coaching em Lucknow, Índia", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 10392, "titulo": "How the Iran Deal Sets the Stage for More Conflict", "url": "https://foreignpolicy.com/2026/06/22/trump-iran-israel-war-oil-deal-gaza/", "fonte_id": "foreign_policy", "data_pub": "2026-06-22T20:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo argumenta que o acordo nuclear com o Irã pode levar a mais conflitos. O autor cita o acordo de Gaza como exemplo do presidente Trump sendo melhor em fazer anúncios do que em cumprir compromissos.  A publicação sugere que a falta de acompanhamento e implementação podem resultar em consequências negativas.", "titulo_pt": "Como o Acordo com o Irã Prepara o Cenário para Mais Conflitos", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 10834, "titulo": "U.S. official: China's new sanctions on U.S. firms show Chinese suppliers are 'unreliable'", "url": "https://en.yna.co.kr/view/AEN20260623000300315", "fonte_id": "yonhap_news", "data_pub": "2026-06-22T19:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "China impôs novas sanções a algumas empresas americanas. Um funcionário americano afirmou que as sanções demonstram que os fornecedores chineses são 'não confiáveis'. As sanções foram anunciadas após o governo americano impor restrições à venda de chips para empresas chinesas.", "titulo_pt": "Funcionário americano: Novas sanções chinesas a empresas americanas mostram que fornecedores chineses são 'não confiáveis'", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 10393, "titulo": "The White House’s New Pro-Ukraine Tone Shift", "url": "https://foreignpolicy.com/2026/06/22/trump-administration-ukraine-russia-war-zelensky-rhetoric/", "fonte_id": "foreign_policy", "data_pub": "2026-06-22T19:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Conquistas ucranianas no campo de batalha podem estar influenciando uma mudança de humor entre altos funcionários dos EUA.  Essa possível mudança de tom pode ser vista nas declarações e ações recentes do governo americano em relação à guerra na Ucrânia.", "titulo_pt": "Nova Mudança de Tom Favorável à Ucrânia na Casa Branca", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 10042, "titulo": "Exportação de algodão brasileiro já supera total de junho de 2025", "url": "https://www.cnnbrasil.com.br/agro/exportacao-de-algodao-ja/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-22T23:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "De acordo com o Secex, as exportações de algodão do Brasil atingiram 146,8 mil toneladas até a terceira semana. Essa cifra supera o total exportado em junho de 2025. O ritmo de embarques tem apresentado forte aceleração.", "titulo_pt": "Exportação de algodão brasileiro já ultrapassa total de junho de 2025", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 10044, "titulo": "Cota chinesa para carne bovina pode atingir 94,5% até o fim de junho", "url": "https://www.cnnbrasil.com.br/agro/cota-chinesa-para-carne-bovina-pode-atingir-945-ate-o-fim-de-junho/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-22T23:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Terra Investimentos projetou que o limite para importações de carne bovina brasileira para a China será atingido entre os dias 12 e 14 de junho.  O limite máximo previsto é de 94,5%. A projeção considera as cotas atuais e as tendências de exportação.", "titulo_pt": "Cota chinesa para carne bovina pode chegar a 94,5% até o fim de junho", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 9938, "titulo": "Redução de impostos e equilíbrio fiscal são prioridades, aponta CNI", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/reducao-de-impostos-e-equilibrio-fiscal-sao-prioridades-aponta-cni", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-22T22:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Empresários do ramo industrial listaram redução de impostos, consolidação da reforma tributária e equilíbrio fiscal como prioridades para a gestão 2027-2030. A pesquisa da CNI com executivos revela que temas fiscais são mais importantes do que políticas industriais.", "titulo_pt": "Redução de impostos e equilíbrio fiscal são prioridades, aponta CNI", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 9939, "titulo": "Brasil bate recorde de passageiros em voos domésticos em 2026", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/brasil-bate-recorde-de-passageiros-em-voos-domesticos-em-2026", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-22T21:42:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil registrou um novo recorde de passageiros em voos domésticos nos primeiros cinco meses de 2026. De janeiro a maio, foram transportados 42 milhões de pessoas no país, um aumento de 6% em relação ao mesmo período de 2025.", "titulo_pt": "Brasil bate recorde de passageiros em voos domésticos em 2026", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 10618, "titulo": "SpaceX sheds $400bn in market value as debut rally hits reverse", "url": "https://www.ft.com/content/c11d08ed-6668-4678-b829-1d50acbd12d4", "fonte_id": "financial_times", "data_pub": "2026-06-22T21:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações da empresa espacial SpaceX, de Elon Musk, caíram mais de 16% após o aumento das taxas de juros dos títulos americanos. O declínio fez com que a empresa perdesse cerca de US$ 400 bilhões em valor de mercado.", "titulo_pt": "SpaceX perde US$ 400 bilhões de valor de mercado após queda na bolsa", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 10833, "titulo": "Consumer sentiment rises for 2nd month in June on strong exports, stock rally", "url": "https://en.yna.co.kr/view/AEN20260622008900320", "fonte_id": "yonhap_news", "data_pub": "2026-06-22T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O sentimento do consumidor sul-coreano aumentou pela segunda vez seguida em junho. O aumento foi atribuído a um desempenho forte nas exportações e à alta no mercado de ações. Os dados foram divulgados pelo Banco da Coreia.", "titulo_pt": "Sentimento do consumidor aumenta por segundo mês consecutivo em junho, impulsionado por exportações fortes e alta na bolsa", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 9940, "titulo": "Programa de incentivo à indústria receberá mais R$ 140 bilhões em 2026", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/programa-de-incentivo-industria-recebera-mais-r-140-bilhoes-em-2026", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-22T19:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O programa Nova Indústria Brasil (NIB) terá um aporte adicional de R$ 140 bilhões até o fim do ano. Com esse aumento, o programa chegará a R$ 750 bilhões em investimentos desde 2023. Dos novos recursos, R$ 102,5 bilhões virão do BNDES.", "titulo_pt": "Programa de incentivo à indústria receberá mais R$ 140 bilhões em 2026", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 10021, "titulo": "Mercado de tokenização pode sair de US$ 10 bilhões para US$ 6,8 trilhões, diz corretora", "url": "https://exame.com/future-of-money/mercado-de-tokenizacao-pode-sair-de-us-10-bilhoes-para-us-68-trilhoes-diz-corretora/", "fonte_id": "exame", "data_pub": "2026-06-22T18:04:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma corretora prevê que o mercado de tokenização poderá crescer de US$ 10 bilhões para US$ 6,8 trilhões. O relatório também estima que a oferta de produtos financeiros registrados em blockchain chegará a pelo menos US$ 203 bilhões.", "titulo_pt": "Mercado de tokenização pode saltar de US$ 10 bilhões para US$ 6,8 trilhões, afirma corretora", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 10026, "titulo": "Ibovespa sobe mais de 1% e fecha acima dos 170 mil pontos; dólar cai a R$ 5,14", "url": "https://exame.com/invest/mercados/ibovespa-sobe-mais-de-1-e-fecha-acima-dos-170-mil-pontos-dolar-cai-a-r-514/", "fonte_id": "exame", "data_pub": "2026-06-22T17:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ibovespa teve alta de mais de 1%, fechando o dia acima dos 170 mil pontos. O dólar registrou queda, sendo negociado a R$ 5,14.", "titulo_pt": "Ibovespa sobe mais de 1% e fecha acima dos 170 mil pontos; dólar cai a R$ 5,14", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 9942, "titulo": "Segundo lote de restituição do IRPF 2026 pode ser consultado amanhã", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/segundo-lote-de-restituicao-do-irpf-2026-pode-ser-consultado-amanha", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-22T17:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Receita Federal liberará a consulta ao segundo lote da restituição do Imposto de Renda Pessoa Física (IRPF) nesta terça-feira (23). O lote é o maior da história, com 9.585.797 contribuintes contemplados e pagamentos totais de R$ 16 bilhões.", "titulo_pt": "Segundo lote de restituição do IRPF 2026 pode ser consultado amanhã", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 9944, "titulo": "TV Brasil exibe especial sobre 74 anos do BNDES com foco nos desafios", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/tv-brasil-exibe-especial-sobre-74-anos-do-bndes-com-foco-nos-desafios", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-22T16:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A TV Brasil exibirá um especial sobre os 74 anos do BNDES nesta terça-feira (23), às 22h. O programa, apresentado por Luciana Barreto, abordará ideias, desafios e soluções que moldam o futuro do país e do mundo. O economista Aloiz também participará do especial.", "titulo_pt": "TV Brasil exibe especial sobre 74 anos do BNDES com foco nos desafios", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 9945, "titulo": "Mercado eleva projeção de inflação e vê Selic em 14% ao ano em 2026", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/mercado-eleva-projecao-de-inflacao-e-ve-selic-em-14-ao-ano-em-2026", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-22T13:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O mercado financeiro elevou a previsão para o IPCA (Índice Nacional de Preços ao Consumidor Amplo) para 5,33% este ano. A estimativa está no Boletim Focus do Banco Central, que reúne as expectativas de instituições financeiras sobre indicadores econômicos.  A projeção para o IPCA foi aumentada pela décima quinta semana consecutiva.", "titulo_pt": "Mercado aumenta projeção da inflação e vê Selic a 14% ao ano em 2026", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 10744, "titulo": "Stocks Drift Despite Drop in Oil on US-Iran Talks: Markets Wrap", "url": "https://www.koreaherald.com/article/10784396", "fonte_id": "korea_herald", "data_pub": "2026-06-22T12:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações americanas tendem a abrir com pouco movimento após o feriado prolongado. Os preços do petróleo caíram, mas os mercados não encontraram grande apoio devido aos sinais de progresso nas negociações entre os Estados Unidos e o Irã. As obrigações dos EUA caíram em todas as faixas após o feriado de sexta-feira.", "titulo_pt": "Ações Subam Apesar da Queda do Preço do Petróleo em Discussões EUA-Irã: Resumo de Mercado", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 10108, "titulo": "Como a economia dos EUA continua superando seus rivais apesar de toda turbulência do governo Trump", "url": "https://www.bbc.com/portuguese/articles/c0my9w0nlzdo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-22T10:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto analisa como os Estados Unidos conseguiram superar impactos globais que afetaram negativamente outros países. A matéria busca entender os fatores que permitiram essa resiliência econômica americana em um cenário marcado por instabilidade política.", "titulo_pt": "Como a economia dos EUA continua superando seus rivais apesar de toda turbulência do governo Trump", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 10667, "titulo": "Nomura raises CEO pay to $10 million after profit hits a record", "url": "https://www.japantimes.co.jp/business/2026/06/22/companies/nomura-ceo-pay-hike/", "fonte_id": "japan_times", "data_pub": "2026-06-22T08:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sob a liderança de Kentaro Okuda, a maior corretora japonesa gerou um segundo ano consecutivo de lucro líquido recorde. O pagamento anual do CEO foi elevado para US$ 10 milhões.", "titulo_pt": "Nomura aumenta salário do CEO para US$ 10 milhões após lucro recorde", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 10672, "titulo": "Yen continues to test fresh lows as Nikkei 225 hits new highs", "url": "https://www.japantimes.co.jp/business/2026/06/22/economy/yen-new-lows/", "fonte_id": "japan_times", "data_pub": "2026-06-22T07:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O iene japonês está testando novos mínimos, enquanto o índice de ações Nikkei 225 alcança novos recordes. A intervenção verbal no mercado cambial tem sido mais moderada do que no passado.", "titulo_pt": "Iene continua a testar mínimos históricos enquanto o Nikkei 225 atinge novos patamares", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 10781, "titulo": "Nvidia says its AI data center design runs hotter to use a lot less water", "url": "https://www.theverge.com/tech/954139/nvidia-data-centers-rubin-liquid-cooling", "fonte_id": "the_verge", "data_pub": "2026-06-22T23:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Nvidia destaca seu design de referência Rubin, para centros de dados totalmente refrigerados por líquido, afirmando que ele eliminou grandes quantidades de consumo de energia e quase todo o uso de água. O anúncio vem em meio à pressão pública contra os centros de dados devido ao seu consumo de água e energia.  No entanto, não aborda todas as preocupações em torno dos centros de dados de IA.", "titulo_pt": "Nvidia afirma que design de centro de dados com IA opera mais quente para usar muito menos água", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 10810, "titulo": "A Source of Mysterious Repeating Radio Signals From Space Has Been Identified", "url": "https://www.wired.com/story/a-source-of-mysterious-repeating-radio-signals-from-space-has-been-identified/", "fonte_id": "wired", "data_pub": "2026-06-22T22:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores identificaram a fonte de sinais rádio repetitivos misteriosos provenientes do espaço. A descoberta pode ser uma espécie de 'pedra Rosetta' para os sinais cósmicos, permitindo melhor compreensão deles.  A localização exata da fonte ainda não foi divulgada.", "titulo_pt": "Fonte de Sinais Rádicos Repetitivos do Espaço Identificada", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 10990, "titulo": "Trump executive order directs NASA to plan quantum space applications", "url": "https://spacenews.com/trump-signs-executive-order-to-accelerate-quantum-space-infrastructure/", "fonte_id": "spacenews", "data_pub": "2026-06-22T21:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Casa Branca emitiu uma ordem executiva visando unificar e acelerar o desenvolvimento de tecnologias quânticas nos EUA, incluindo sistemas espaciais que poderiam permitir navegação, sensoriamento e comunicações seguras de última geração. A ordem direciona a NASA a planejar aplicações espaciais para essas tecnologias quânticas.", "titulo_pt": "Ordem Executiva de Trump Direciona a NASA a Planejar Aplicações Espaciais Quânticas", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 10811, "titulo": "Meta Pauses Employee-Tracking Program Following Internal Data Leak", "url": "https://www.wired.com/story/meta-pauses-employee-tracking-program-following-internal-security-breach/", "fonte_id": "wired", "data_pub": "2026-06-22T21:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Meta interrompeu seu programa de rastreamento de funcionários após a exposição interna de dados potencialmente sensíveis. O programa foi deixado inacessível por funcionários internos, resultando no vazamento dos dados.", "titulo_pt": "Meta pausa programa de rastreamento de funcionários após vazamento interno de dados", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 10812, "titulo": "Meta Exposed Data Internally From Its Controversial Employee-Tracking Program", "url": "https://www.wired.com/story/meta-accidentally-let-employees-access-each-others-keystroke-data/", "fonte_id": "wired", "data_pub": "2026-06-22T20:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Funcionários da Meta já haviam expressado preocupações sobre um programa que coleta dados de digitação dos trabalhadores para treinar modelos de inteligência artificial. O programa foi revelado por meio de documentos internos.", "titulo_pt": "Meta expôs dados internamente de programa controverso de rastreamento de funcionários", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 10813, "titulo": "We Tried the Most Popular Mushroom Coffees. These Are the Best (2026)", "url": "https://www.wired.com/gallery/best-mushroom-coffee/", "fonte_id": "wired", "data_pub": "2026-06-22T18:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cafés feitos com cogumelos funcionais como o leão e a chaga estão em alta. O Wired testou as marcas mais populares para encontrar as mais agradáveis ao paladar. Os resultados foram publicados no ano de 2026.", "titulo_pt": "Tentamos os Cafés de Cogumelos Mais Populares. Estes São os Melhores (2026)", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 10778, "titulo": "Three things to watch amid Anthropic’s latest feud with the government", "url": "https://www.technologyreview.com/2026/06/22/1139424/three-things-to-watch-amid-anthropics-latest-feud-with-the-government/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-22T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em abril, a empresa Anthropic afirmou ter criado um modelo de IA chamado Mythos. O governo americano está agora investigando o modelo e a empresa.  O caso envolve preocupações sobre a segurança e os impactos potenciais da IA.", "titulo_pt": "Três pontos a observar durante a última disputa do Anthropic com o governo", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 10826, "titulo": "Commemorating 70 Years of Artificial Intelligence", "url": "https://spectrum.ieee.org/70-years-of-artificial-intelligence", "fonte_id": "ieee_spectrum", "data_pub": "2026-06-22T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A inteligência artificial é a tecnologia transformadora e estratégica do início do século XXI. Ela está remodelando praticamente todos os aspectos de nossas vidas, de maneiras que provavelmente ninguém antecipou. O campo da IA como um todo foi formalmente estabelecido em 1956 no Projeto de Pesquisa de Verão de Dartmouth sobre Inteligência Artificial.", "titulo_pt": "Comemorando 70 Anos de Inteligência Artificial", "veiculo": "IEEE Spectrum", "pais": "EUA", "classe": "A"}, {"id": 10628, "titulo": "Indian entrepreneur to lead WhatsApp as Zuckerberg brings in new blood", "url": "https://www.ft.com/content/075009d5-9f5e-4127-ab0c-1c87b6be1d8f", "fonte_id": "financial_times", "data_pub": "2026-06-22T17:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Kunal Shah, fundador de uma empresa de fintech, substituirá Will Cathcart como líder do WhatsApp. Cathcart deixa a posição após sete anos à frente do aplicativo de mensagens, que pertence ao Meta.", "titulo_pt": "Empreendedor indiano liderará o WhatsApp enquanto Zuckerberg traz novos talentos", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 10814, "titulo": "The Ninja Slushi Is Only $200: Early Amazon Prime Day Deal 2026", "url": "https://www.wired.com/story/ninja-slushi-amazon-prime-day-deal-2026/", "fonte_id": "wired", "data_pub": "2026-06-22T17:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dois anos após transformar o 'Marg Monday' em um dia diário, o Ninja Slushi está sendo vendido por apenas R$ 100. Esta é a oferta mais barata já vista para este produto.", "titulo_pt": "O Ninja Slushi está a apenas R$ 100: Oferta Antecipada do Dia de Promoções da Amazon 2026", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 10816, "titulo": "OpenAI Launches Full-Scale Effort to Patch Open-Source Bugs as It Takes on Anthropic’s Mythos", "url": "https://www.wired.com/story/openai-launches-full-scale-effort-to-patch-open-source-bugs-as-it-takes-on-anthropics-mythos/", "fonte_id": "wired", "data_pub": "2026-06-22T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A OpenAI revelou uma versão aprimorada do GPT-5.5-Cyber e sua iniciativa 'Patch the Planet' para corrigir bugs em softwares open-source. Essa ação ocorre em meio a preocupações sobre as capacidades de segurança cibernética dos modelos de IA.", "titulo_pt": "OpenAI lança esforço completo para corrigir bugs em software open-source, desafiando o Mythos da Anthropic", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 10817, "titulo": "They’re Making Clip-On Frames for Smart Glasses Now", "url": "https://www.wired.com/story/lorika-ontop-cases-for-smart-glasses-now/", "fonte_id": "wired", "data_pub": "2026-06-22T16:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os óculos inteligentes estão se tornando populares, então as empresas estão entrando no mercado de acessórios.  Isso inclui a fabricação de armações encaixáveis para os óculos inteligentes.", "titulo_pt": "Eles estão fabricando armações encaixáveis para óculos inteligentes agora", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 10624, "titulo": "AI-powered threats may succeed ‘within months’, Five Eyes warns", "url": "https://www.ft.com/content/df50c416-9308-46cc-af14-8f069bba9aa6", "fonte_id": "financial_times", "data_pub": "2026-06-22T15:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Governos e empresas ocidentais alertam que a vantagem na inteligência artificial pode não durar muito. O grupo de inteligência Five Eyes, composto por Estados Unidos, Reino Unido, Canadá, Austrália e Nova Zelândia, emitiu o aviso.", "titulo_pt": "Ameaças impulsionadas por IA podem ser bem-sucedidas 'em meses', alerta Cinco Olhos", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 10343, "titulo": "AI models capable of devastating attacks on governments and business months away, rare Five Eyes statement warns", "url": "https://www.theguardian.com/technology/2026/jun/22/anthropic-claude-fable-ai-model-artificial-intelligence-national-security", "fonte_id": "guardian_world", "data_pub": "2026-06-22T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Agências de inteligência do Five Eyes (Austrália, Estados Unidos, Reino Unido, Nova Zelândia e Canadá) alertaram que modelos de IA poderosos podem causar ataques cibernéticos devastadores a governos e empresas em poucos meses. O alerta público surge após o governo Trump ter bloqueado cidadãos estrangeiros do acesso ao modelo de IA Fable da Anthropic.", "titulo_pt": "Modelos de IA capazes de ataques devastadores a governos e empresas estão a meses de distância, alerta raro do Five Eyes", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 10779, "titulo": "The Download: record-breaking subsea tunnels and flexible data centers", "url": "https://www.technologyreview.com/2026/06/22/1139385/the-download-rogfast-subsea-tunnel-flexible-data-centers/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-22T12:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Esta edição do The Download, boletim informativo semanal sobre tecnologia, apresenta notícias sobre um túnel subaquático. O túnel é o mais profundo e longo do mundo, localizado no Mar do Norte a cerca de 300 metros de profundidade.  O artigo também aborda centros de dados flexíveis.", "titulo_pt": "O Download: Túneis Submarinos Recordes e Centros de Dados Flexíveis", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 10501, "titulo": "Chinese universities are cutting language majors to make way for AI", "url": "https://restofworld.org/2026/chinese-universities-drop-humanities-ai/?utm_source=rss&utm_medium=rss&utm_campaign=feeds", "fonte_id": "rest_of_world", "data_pub": "2026-06-22T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Universidades estão encerrando programas de tradução e línguas estrangeiras. Ao mesmo tempo, estão adicionando cursos em inteligência artificial incorporada, IA e robótica.", "titulo_pt": "Universidades chinesas reduzem cursos de idiomas para dar espaço à inteligência artificial", "veiculo": "Rest of World", "pais": "EUA", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 10849, "titulo": "STAT+: Closely watched Pfizer lung cancer drug falls short in clinical trial", "url": "https://www.statnews.com/2026/06/22/pfizer-lung-cancer-sigvotatug-vedotin/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-22T21:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O medicamento experimental da Pfizer, que tinha o potencial de substituir uma quimioterapia amplamente utilizada em um dos tipos mais comuns de câncer de pulmão, não atingiu os objetivos em um ensaio clínico. A empresa anunciou que o medicamento não demonstrou eficácia superior à quimioterapia padrão.", "titulo_pt": "Medicamento experimental da Pfizer para câncer de pulmão não atinge objetivo em teste clínico", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 10914, "titulo": "NASA Awards Solutions for Federal Enterprise Procurement Contracts", "url": "https://www.nasa.gov/news-release/nasa-awards-solutions-for-federal-enterprise-procurement-contracts/", "fonte_id": "nasa_news", "data_pub": "2026-06-22T21:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA iniciará o processo de concessão de múltiplos contratos para o Contrato de Aquisição Governamental de Soluções para Compras Empresariais (SEWP) VI. O contrato fornece acesso simplificado a produtos e serviços comerciais, incluindo hardware, software, serviços em nuvem, ferramentas de segurança cibernética, serviços de engenharia e consultoria e capacidades de suporte de missão intensivo em dados.", "titulo_pt": "NASA concede soluções para contratos de compras da empresa federal", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 10991, "titulo": "Rocket Lab launches satellite for U.S. Space Force Victus Haze responsive space exercise", "url": "https://spacenews.com/rocket-lab-launches-satellite-for-u-s-space-force-victus-haze-responsive-space-exercise/", "fonte_id": "spacenews", "data_pub": "2026-06-22T20:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A missão combina a nave espacial Rocket Lab com um veículo True Anomaly em órbita para demonstrar caracterização rápida de ameaças e operações de encontro. O objetivo é testar a capacidade de resposta do espaço.", "titulo_pt": "Rocket Lab lança satélite para exercício espacial Victus Haze da Força Espacial dos EUA", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 10915, "titulo": "NASA Sounding Rocket to Launch Student Experiments", "url": "https://www.nasa.gov/centers-and-facilities/wallops/nasa-sounding-rocket-to-launch-student-experiments/", "fonte_id": "nasa_news", "data_pub": "2026-06-22T20:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA planeja lançar um foguete de sondagem do Centro de Voo Wallops, na Virgínia, carregando experimentos desenvolvidos por estudantes. O lançamento está previsto para entre 5h30 e 9h30 EDT de quarta-feira, 24 de junho, com um dia alternativo em quinta-feira, 25 de junho. Os programas RockSatX e RockOn fornecem treinamento técnico e experiências práticas que preparam e equipam estudantes para trabalhos científicos.", "titulo_pt": "Foguete da NASA lançará experimentos desenvolvidos por estudantes", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 10908, "titulo": "Why the paint is peeling off the Lincoln Memorial Reflecting Pool—experts explain", "url": "https://www.scientificamerican.com/article/why-the-paint-is-peeling-off-the-lincoln-memorial-reflecting-pool-experts-explain/", "fonte_id": "scientific_american", "data_pub": "2026-06-22T19:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Especialistas apontam para uma possível má preparação e aplicação inadequada da pintura como causas para o descascamento da nova pintura no espelho d'água do Memorial de Lincoln. A qualidade da pintura e a execução do trabalho podem estar relacionadas ao problema.", "titulo_pt": "Por que a pintura do espelho d'água do Memorial de Lincoln está descascando - especialistas explicam", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 10916, "titulo": "NASA Invites Media to Botswana Artemis Accords Signing Ceremony", "url": "https://www.nasa.gov/news-release/nasa-invites-media-to-botswana-artemis-accords-signing-ceremony/", "fonte_id": "nasa_news", "data_pub": "2026-06-22T19:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Botswana assinará o Acordo Artemis durante uma cerimônia às 9h30 EDT (horário de Washington) na quinta-feira, 25 de junho, na Sede da NASA. O evento será conduzido por Matt Anderson, vice-administrador da NASA, e contará com a presença do Ministro das Comunicações e Inovação do Botswana, David Tshere, e o Consultor Sênior para Espaço do Departamento de Estado dos EUA, Gregory Autry.", "titulo_pt": "NASA convida a mídia para cerimônia de assinatura do Acordo Artemis pelo Botswana", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 10917, "titulo": "NASA’s Experimental Fabrication Branch Fuels Aircraft Innovation", "url": "https://www.nasa.gov/centers-and-facilities/armstrong/nasas-experimental-fabrication-branch-fuels-aircraft-innovation/", "fonte_id": "nasa_news", "data_pub": "2026-06-22T17:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Departamento de Fabricação Experimental da NASA no Centro de Pesquisa de Voo Armstrong, na Califórnia, transforma conceitos de engenharia em equipamentos prontos para missões para aeronaves de pesquisa e desenvolvimento tecnológico. Essa capacidade ajuda a agência a entregar avanços que beneficiam o público ao melhorar a segurança, eficiência e sustentabilidade da aviação.", "titulo_pt": "Rampa Experimental da NASA Impulsiona Inovação Aeronáutica", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 10992, "titulo": "Chinese spaceplane releases object into orbit, according to commercial space surveillance", "url": "https://spacenews.com/chinese-spaceplane-releases-object-into-orbit-according-to-commercial-space-surveillance/", "fonte_id": "spacenews", "data_pub": "2026-06-22T17:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "De acordo com a empresa de vigilância espacial LeoLabs, o planador espacial secreto da China liberou um objeto em órbita durante sua quarta missão. Esta é a primeira vez que se observa algo semelhante durante uma missão do planador chinês.", "titulo_pt": "Planador espacial chinês libera objeto em órbita, segundo vigilância espacial comercial", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 10918, "titulo": "NASA’s Chandra Finds Possible Supernova Remnant", "url": "https://www.nasa.gov/image-article/nasas-chandra-finds-possible-supernova-remnant/", "fonte_id": "nasa_news", "data_pub": "2026-06-22T17:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Astrônomos podem ter encontrado um resto de supernova usando dados do Observatório de Raios-X Chandra da NASA. O resto está localizado no centro da galáxia Via Láctea e é composto pelos restos expandidos de estrelas explodidas.", "titulo_pt": "Chandra da NASA encontra possível resto de supernova", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 10863, "titulo": "The New World screwworm has returned to the U.S. Now what?", "url": "https://www.sciencenews.org/article/new-world-screwworm-spread-us-eradicate", "fonte_id": "science_news", "data_pub": "2026-06-22T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pelo menos uma dúzia de animais foram encontrados com as larvas que comem carne. Especialistas alertam que pode levar mais de um ano para erradicar o parasita novamente.", "titulo_pt": "O carrapato-do-novo-mundo voltou aos EUA. E agora?", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 10919, "titulo": "NASA to Cover US Spacewalk 95, Host Preview News Conference", "url": "https://www.nasa.gov/n
