leira caem para nível histórico baixo em 2025", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 64484, "titulo": "Everything from cells to stars to particles exists on the edge of chaos", "url": "https://www.newscientist.com/article/2580285-everything-from-cells-to-stars-to-particles-exists-on-the-edge-of-chaos/?utm_campaign=RSS|NSNS&utm_content=home&utm_medium=RSS&utm_source=NSNS", "fonte_id": "new_scientist", "data_pub": "2026-07-21T08:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sistemas complexos, sejam seres vivos ou partículas fundamentais, precisam ter estrutura suficiente para permanecer unidos e uma dose de imprevisibilidade que permita mudanças. O colunista Thomas Lewton investiga se essa ideia é apenas um padrão observado em todo o cosmos ou se pode ser uma 'teoria de tudo'.", "titulo_pt": "De células a estrelas a partículas, tudo existe na borda do caos", "veiculo": "New Scientist", "pais": "Reino Unido", "classe": "B"}, {"id": 64461, "titulo": "IHI explores Kuva hyperspectral satellites for Japan’s multi-sensor constellation", "url": "https://spacenews.com/ihi-explores-kuva-hyperspectral-satellites-for-japans-multi-sensor-constellation/", "fonte_id": "spacenews", "data_pub": "2026-07-21T07:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A IHI, uma empresa japonesa, está avaliando a inclusão de satélites hiperspectrais da startup finlandesa Kuva Space em sua constelação multi-sensor de observação terrestre planejada com 100 sensores. Este passo visa fortalecer o sistema de monitoramento do país.", "titulo_pt": "IHI considera satélites hiperspectrais da Kuva space para constelação multi-sensor do Japão", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 63940, "titulo": "Meteorito que matou os dinossauros pode finalmente ter sido identificado", "url": "https://exame.com/ciencia/meteorito-que-matou-os-dinossauros-pode-finalmente-ter-sido-identificado/", "fonte_id": "exame", "data_pub": "2026-07-21T06:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma análise inédita sugere que o asteroide responsável pela extinção dos dinossauros tinha uma composição rara, alterando a compreensão sobre o evento catastrófico.", "titulo_pt": "Meteorito que matou os dinossauros pode finalmente ter sido identificado", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 64331, "titulo": "Japan scientists identify clusters of protein believed to trigger Alzheimer’s disease", "url": "https://www.japantimes.co.jp/news/2026/07/21/japan/science-health/alzheimers-study/", "fonte_id": "japan_times", "data_pub": "2026-07-21T06:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas japoneses identificaram agrupamentos de uma nova forma da proteína beta-amilóide, que écreditado como um gatilho para a doença de Alzheimer. Essa descoberta pode levar ao desenvolvimento de terapias para doenças neurodegenerativas no estágio inicial.", "titulo_pt": "Cientistas japoneses identificam agrupamentos de proteína associada à doença de Alzheimer", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 64483, "titulo": "Luis Manuel Otero Alcántara Is Free", "url": "https://hyperallergic.com/luis-manuel-otero-alcantara-is-free/", "fonte_id": "hyperallergic", "data_pub": "2026-07-21T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artista dissidente cubano Luis Manuel Otero Alcántara está exilado nos Estados Unidos. Um especialista em Homero analisa a obra de Christopher Nolan, 'Odisseia'.", "titulo_pt": "Luis Manuel Otero Alcántara está livre", "veiculo": "Hyperallergic (arte)", "pais": "EUA", "classe": "B"}, {"id": 64066, "titulo": "La teoría bíblica que fue prohibida de las escrituras sagradas por vaticinar el fin del mundo", "url": "https://www.lanacion.com.ar/lifestyle/la-teoria-biblica-que-fue-prohibida-de-las-escrituras-sagradas-por-vaticinar-el-fin-del-mundo-nid20072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-21T09:35:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Estudos sobre o Antigo Testamento sugerem a existência de uma prisão oculta com um segredo que o catolicismo decidiu esconder por milênios. Esta teoria bíblica foi proibida das escrituras sagradas porque preveria o fim do mundo.", "titulo_pt": "A teoria bíblica que foi proibida das escrituras sagradas por vaticinar o fim do mundo", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 64211, "titulo": "Far-right mayor cancels show dedicated to Queen in Southern France", "url": "https://www.lemonde.fr/en/culture/article/2026/07/21/far-right-mayor-cancels-show-dedicated-to-queen-in-southern-france_6755683_30.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-21T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O prefeito do Rassemblement National, Jean-Dominique Artaud, cancelou um show dedicado à Rainha na cidade de Orange por motivos orçamentários. Centenas de cantores voluntários ficaram sem o seu palco no evento agendado para o dia 4 de setembro.", "titulo_pt": "Prefeito da extrema-direita cancela show em homenagem à rainha na França", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 64479, "titulo": "These Wild English by Nicola Wilding review – explaining a mother’s drift to the far right", "url": "https://www.theguardian.com/books/2026/jul/21/these-wild-english-by-nicola-wilding-review-explaining-a-mothers-drift-to-the-far-right", "fonte_id": "guardian_culture", "data_pub": "2026-07-21T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Nicola Wilding, documentarista, investiga a história familiar e as áreas mais sombrias da internet para resolver um enigma político urgente. Ao descobrir que sua mãe Sandra Forsyth estava marchando em apoio à Liga de Defesa Inglesa, ela inicialmente pensou tratar-se apenas de uma fase passageira.", "titulo_pt": "Estas selvas inglesas por Nicola Wilding: examinando a história familiar e as esferas mais escuros da internet para resolver um enigma político urgente", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 64501, "titulo": "Why We Need More Woman-Centric Retellings of The Odyssey", "url": "https://lithub.com/why-we-need-more-woman-centric-retellings-of-the-odyssey/", "fonte_id": "lithub", "data_pub": "2026-07-21T09:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Na Odisséia, Circe envia Odisseu ao Reino dos Mortos para encontrar um sábio que possa orientá-lo sobre como retornar à casa após mais de uma década longe. Essa é uma cena crucial que ilustra a jornada interior e as dificuldades enfrentadas por Odisseu.", "titulo_pt": "Por que precisamos de mais versões centradas em mulheres da odisséia", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 64502, "titulo": "Claire Vaye Watkins on Writing a Love Letter to the Mojave Desert", "url": "https://lithub.com/claire-vaye-watkins-on-writing-a-love-letter-to-the-mojave-desert/", "fonte_id": "lithub", "data_pub": "2026-07-21T09:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Claire Vaye Watkins cresceu no Mojave Desert, com raízes profundas na região que se refletem em sua escrita. Ela nasceu em Bishop e foi criada em Tecopa, perto de Death Valley.", "titulo_pt": "Claire Vaye Watkins sobre escrever uma carta de amor ao deserto de Mojave", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 64503, "titulo": "What Romance Novels Taught Me About Writing Literary Fiction", "url": "https://lithub.com/what-romance-novels-taught-me-about-writing-literary-fiction/", "fonte_id": "lithub", "data_pub": "2026-07-21T09:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em agosto de 2021, a autora não conseguia ler após sofrer uma gravidez complicada e perder o bebê. Seus problemas com a leitura se deviam à dificuldade em manter a atenção nos livros.", "titulo_pt": "O que romances Me ensinaram sobre escrever ficção literária", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 64504, "titulo": "How Jean-Paul Sartre Attempted to Marry Marxism and Existentialism", "url": "https://lithub.com/how-jean-paul-sartre-attempted-to-marry-marxism-and-existentialism/", "fonte_id": "lithub", "data_pub": "2026-07-21T09:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Jean-Paul Sartre tentou combinar o marxismo com o existencialismo durante os anos 1950 e 1960, quando intelectuais franceses tinham grande entusiasmo pela teoria marxista. Marx era considerado o filósofo mais importante de todos os tempos, enquanto Sartre era o filósofo vivo mais influente na França nessa época.", "titulo_pt": "Como Jean-Paul Sartre tentou combinar marxismo e existencialismo", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 63911, "titulo": "Após três anos afastada, Vitória Strada pode voltar à Globo em novela das sete", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/07/apos-tres-anos-afastada-vitoria-strada-pode-voltar-a-globo-em-novela-das-sete.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-21T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Vitória Strada, que não atuou na Globo desde 2023, pode retornar para a emissora em 2027, possivelmente em 'Elas Que Lutem', uma novela das sete.", "titulo_pt": "Vitória Strada pode voltar à Globo em 2027", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 64404, "titulo": "From GD's heartfelt message to music-led finale, Won Il explains vision behind UNESCO's ceremony", "url": "https://www.koreaherald.com/article/10815418", "fonte_id": "korea_herald", "data_pub": "2026-07-21T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um espetáculo musical foi realizado no Busan, com a participação de guarda-roupa real coreano e uma renderização digital da Porta Gwanghwamun. O Royal Guard Team de Gyeongbokgung, que faz parte do Korea Heritage Service, não esteve presente para guardar o palácio, mas sim executando em um evento único.", "titulo_pt": "Do movimento sincero de GD à conclusão musical: Won Il explica a visão por trás da cerimônia da UNESCO", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 64471, "titulo": "The Odyssey: jaw-dropping action, dark magic and dolphin cameos – discuss with spoilers", "url": "https://www.theguardian.com/film/2026/jul/21/odyssey-christopher-nolan-discussion", "fonte_id": "guardian_culture", "data_pub": "2026-07-21T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "The Odyssey estreou com bilheteria global de $264 milhões no fim de semana, recebendo críticas positivas, incluindo cinco estrelas do Guardian. O filme, dirigido por Christopher Nolan, apresenta a épica história dos deuses e monstros em formatos Imax avançados.", "titulo_pt": "The Odyssey: ação impressionante, magia sombria e cenas com delfins – discutir com spoilers", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 64480, "titulo": "\"Women are living in a physical world that is too often designed without them in mind\"", "url": "https://www.dezeen.com/2026/07/21/man-made-book-karen-korellis-reuther-opinion/", "fonte_id": "dezeen", "data_pub": "2026-07-21T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A designer argumenta que o design de produtos precisa abandonar a ideia de que podem ser criados com base num 'homem médio'. Mulheres bomberas enfrentam dificuldades ao usar equipamentos projetados para homens, como amarrar botas e ajustar luvas grandes.", "titulo_pt": "Mulheres vivem em um mundo físico frequentemente projetado sem consideração delas", "veiculo": "Dezeen (design e arquitetura)", "pais": "Reino Unido", "classe": "B"}, {"id": 64505, "titulo": "How to Date a Fanatic", "url": "https://lithub.com/how-to-date-a-fanatic/", "fonte_id": "lithub", "data_pub": "2026-07-21T08:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Antes que molotovs chegassem, antes que uma multidão com facas, machados e clubes de madeira aparecesse, foi um grande pedaço de rocha que invadiu nossa mesa ao almoço. Ele passou perto do meu ouvido esquerdo e bateu na nossa mesa, espalhando.", "titulo_pt": "Como datare um fanático", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 64506, "titulo": "Colson Whitehead, Michael Cunningham, Claire Vaye Watkins, and more: 20 new books out today!", "url": "https://lithub.com/colson-whitehead-michael-cunningham-claire-vaye-watkins-and-more-20-new-books-out-today/", "fonte_id": "lithub", "data_pub": "2026-07-21T08:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Este semana, quatro novos livros são lançados, incluindo o último volume da trilogia de Colson Whitehead, um memórias sobre técnica literária de Michael Cunningham e um novo trabalho de Claire Vaye Watkins. Além dessas obras destacadas, há outros títulos interessantes.", "titulo_pt": "Colson Whitehead, Michael Cunningham, Claire Vaye Watkins e mais: 20 novos livros lançados hoje!", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 64481, "titulo": "Sunflower Network opens modular children's hospital in Ukraine", "url": "https://www.dezeen.com/2026/07/21/sunflower-network-project-horizon-hospital-ukraine/", "fonte_id": "dezeen", "data_pub": "2026-07-21T08:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A organização sem fins lucrativos Sunflower Network inaugurou uma clínica pediátrica em Brody, Ucrânia, que alega ser o primeiro novo equipamento de saúde do país desde a invasão russa em 2022. Localizada ao lado do Hospital Central de Brody, a clínica oferece um novo espaço dedicado para crianças, com salas de tratamento modulares que podem ser combinadas conforme necessário.", "titulo_pt": "Sunflower Network inaugura clínica pediátrica modular em Ucrânia", "veiculo": "Dezeen (design e arquitetura)", "pais": "Reino Unido", "classe": "B"}, {"id": 64498, "titulo": "Pablo Rochat on turning suburban Atlanta into a medieval fantasy for Phoebe Bridger’s new music video", "url": "https://www.itsnicethat.com/articles/pablo-rochat-lost-boys-film-animation-project-210726", "fonte_id": "its_nice_that", "data_pub": "2026-07-21T08:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Directores Pablo Rochat e Lance Oppenheim transformaram uma gas-station em um cenário medieval fantástico para o videoclipe da música nova de Phoebe Bridger. O vídeo apresenta verdadeiros jousters e um toque nostálgico do jogo Old School RuneScape, tratando a imaginação como realidade.", "titulo_pt": "Pablo Rochat sobre transformar Atlanta suburbana em fantasia medieval para videoclipe de Phoebe Bridger", "veiculo": "It's Nice That", "pais": "Reino Unido", "classe": "B"}], "cultura__eventos": [], "sociedade": [{"id": 63967, "titulo": "Caso Helena: \"ficante\" da mãe de bebê de 10 meses morta é solto", "url": "https://www.metropoles.com/distrito-federal/na-mira/caso-helena-ficante-da-mae-de-bebe-de-10-meses-morta-e-solto", "fonte_id": "metropoles", "data_pub": "2026-07-21T09:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Civil do Ceará (PCCE) indiciou a mãe da bebê Helena e Roberto Levy no caso de morte da menina de 10 meses. Francisco Ray, que mantinha um relacionamento com a mãe da criança, não foi indiciado.", "titulo_pt": "Caso Helena: 'ficante' da mãe de bebê de 10 meses morta é solto", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 63973, "titulo": "No primeiro ou no segundo?", "url": "https://www.metropoles.com/blog-do-noblat/enquetes/no-primeiro-ou-no-segundo", "fonte_id": "metropoles", "data_pub": "2026-07-21T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A enquete propõe a pergunta sobre o primeiro ou segundo algo, mas não fornece detalhes adicionais sobre o assunto da enquete. O título original sugere uma escolha entre duas opções básicas.", "titulo_pt": "Primeiro ou segundo?", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 64071, "titulo": "Una alumna repitió el año por su conducta y la Justicia respaldó al colegio: el detalle que complicó a la familia", "url": "https://www.clarin.com/internacional/alumna-repitio-ano-conducta-justicia-respaldo-colegio-detalle-complico-familia_0_nLEB1yMBhs.html", "fonte_id": "clarin", "data_pub": "2026-07-21T08:06:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Tribunal Administrativo confirmou a decisão do colégio que fez a aluna repetir o ano por sua conduta. A família apresentou uma certificação médica para justificar parte do comportamento da estudante, mas isso não alterou a decisão.", "titulo_pt": "Aluna foi reprovada e justiça confirmou a decisão escolar: detalhe que complicou a situação familiar", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 64098, "titulo": "O cuidado do outro e o cuidado de si: como apoiar no transtorno bipolar sem adoecer", "url": "https://www.jota.info/opiniao-e-analise/colunas/estado-da-saude/o-cuidado-do-outro-e-o-cuidado-de-si-como-apoiar-no-transtorno-bipolar-sem-adoecer", "fonte_id": "jota", "data_pub": "2026-07-21T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O bem-estar nas relações depende de um acordo que valoriza a independência e garante a segurança do cuidador. Este pacto é crucial para apoiar efetivamente alguém com transtorno bipolar sem colocar o próprio bem-estar em risco.", "titulo_pt": "Cuidado mútuo: equilibrando apoio e autonomia no transtorno bipolar", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 64410, "titulo": "Teen gamblers turn to loan sharks, classmates and parents’ bank accounts", "url": "https://www.koreaherald.com/article/10815350", "fonte_id": "korea_herald", "data_pub": "2026-07-21T07:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um jovem de 18 anos, na Província de Gyeonggi, pegou emprestado cerca de 5 milhões de wones (equivalente a aproximadamente US$3.400) com cerca de dez prestadores ilegais de dinheiro para financiar seu jogo online. Sua situação levou-o a denunciar o problema à polícia através de um programa voluntário de auto-denúncia para jogadores menores de idade, sendo que apenas no primeiro bimestre desse programa foram registrados 806 casos semelhantes.", "titulo_pt": "Jovens apostadores recorrem a juros altos, ladrões de dívidas e contas dos pais", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 63981, "titulo": "Bolsa Família: beneficiários ocuparam 91% dos empregos criados em 2025", "url": "https://www.metropoles.com/brasil/bolsa-familia-ocuparam-91-empregos-2025", "fonte_id": "metropoles", "data_pub": "2026-07-21T07:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério do Trabalho e Emprego (MTE) realizou um levantamento que mostrou que, em 2025, os beneficiários do Bolsa Família ocuparam 91% dos empregos criados. O estudo destaca a participação predominante de mulheres, jovens e pretos ou pardos no mercado formal.", "titulo_pt": "Bolsa Família: beneficiários ocuparam 91% dos empregos criados em 2025", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 64024, "titulo": "A epidemia de violência contra professores no Brasil: 'Fui ameaçada de morte pelo pai de um aluno de 6 anos'", "url": "https://www.bbc.com/portuguese/articles/cy04zpyy11go?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-21T07:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Mais de 65% dos professores brasileiros relataram ter sofrido algum tipo de agressão na sala de aula ou ambiente escolar, segundo pesquisa a-em-2025-mas-cerrado-segue-liderando/", "fonte_id": "exame", "data_pub": "2026-07-21T06:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil reduziu em 31% a área queimada em 2025, totalizando 12,7 milhões de hectares. A maior parte do fogo continua concentrado no Cerrado e na Amazônia, responsáveis por 86% dos incêndios desde 1985.", "titulo_pt": "Brasil reduz 31% a área queimada em 2025, mas Cerrado segue liderando", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 64324, "titulo": "‘Obviously Dangerous’: Unlicensed Jet Skis Pose Growing Hazard on Albania’s Coast", "url": "https://balkaninsight.com/2026/07/21/obviously-dangerous-unlicensed-jet-skis-pose-growing-hazard-on-albanias-coast/bi/", "fonte_id": "balkan_insight", "data_pub": "2026-07-21T05:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Acidentes envolvendo jet skis ilegais estão aumentando na costa albanesa, e multas e ações policiais não parecem dissuadir os operadores imprudentes.", "titulo_pt": "'Claramente perigosos': Jet Skis ilegais representam crescente ameaça na costa albana", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}, {"id": 64169, "titulo": "Senapred declara alerta roja para Limache, Quintero, Concón y Quillota por riesgo de desborde del río Aconcagua", "url": "https://www.latercera.com/nacional/noticia/senapred-declara-alerta-roja-para-limache-quintero-concon-y-quillota-por-riesgo-de-desborde-del-rio-aconcagua/", "fonte_id": "la_tercera", "data_pub": "2026-07-21T04:42:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Senapred declarou um alerta vermelho para as cidades de Limache, Quintero, Concón e Quillota devido ao risco de transbordamento do Rio Aconcágua. Isso ocorreu após uma elevação contínua no volume de água na estação hidrométrica Puente Colmo atingir o nível crítico.", "titulo_pt": "Senapred emite alerta vermelho para Limache, Quintero, Concón e Quillota por risco de transbordamento do rio aconcágua", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 64082, "titulo": "Climate and rock art advocates take on Woodside’s ‘carbon bomb’ WA gas project in federal court", "url": "https://www.theguardian.com/environment/2026/jul/21/north-west-shelf-gas-project-woodside-wa-federal-court-challenge", "fonte_id": "guardian_world", "data_pub": "2026-07-21T04:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Australian Conservation Foundation e Friends of Australian Rock Art estão apresentando uma ação judicial contra o governo Albanese por sua aprovação do projeto de expansão de um dos maiores campos gás da Austrália no estado de Western Australia. Essa ação visa testar como as leis ambientais australianas lidam com os desafios climáticos.", "titulo_pt": "Oposição e arte rupestre australianas entraram em court contra projeto de bomba de carbono do gasoduto na austrália", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 63547, "titulo": "Ontario wildfires expand as smoke lingers in parts of the U.S.", "url": "https://www.japantimes.co.jp/news/2026/07/21/world/ontario-wildfires-smoke-us/", "fonte_id": "japan_times", "data_pub": "2026-07-21T02:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A província canadense de Ontário enfrenta 190 incêndios ativos e cerca de 1.800 residentes foram evacuadas de comunidades pouco povoadas. O fumaça dos incêndios está persistindo em algumas partes dos Estados Unidos.", "titulo_pt": "Incêndios no ontário expandem-se com fumaça persistente nos EUA", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 62767, "titulo": "Brasil avança na corrida global para produção de combustível sustentável de aviação", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/brasil-avanca-na-corrida-global-para-producao-de-combustivel-sustentavel-de-aviacao.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-21T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A empresa Acelen, apoiada pelo fundo árabe Mubadala, firmou um acordo para comprar óleo de soja com o objetivo de produzir combustível sustentável de aviação em um projeto localizado na Bahia. O investimento previsto é de aproximadamente R$ 15 bilhões.", "titulo_pt": "Brasil avança na corrida global para produção de combustível sustentável de aviação", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 63564, "titulo": "Sri Lanka deploys military drones to fight worst dengue outbreak in almost a decade", "url": "https://www.scmp.com/news/asia/south-asia/article/3361274/sri-lanka-deploys-military-drones-fight-worst-dengue-outbreak-almost-decade?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-21T01:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sri Lanka está enfrentando a pior epidemia de dengue em quase uma década, com 53 mortes e mais de 76.000 infecções. O país está utilizando drones da força aérea e forças militares para identificar criadouros do mosquito transmissor da doença, além de intensificar inspeções domiciliárias e em locais públicos.", "titulo_pt": "Sri Lanka emprega drones militares na luta contra pior epidemia de dengue em quase uma década", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 62883, "titulo": "Adutora se rompe e causa vazamento na zona sul de São Paulo", "url": "https://www.metropoles.com/sao-paulo/adutora-se-rompe-e-causa-vazamento", "fonte_id": "metropoles", "data_pub": "2026-07-21T01:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um rompimento de adutora ocorreu na zona sul de São Paulo, no bairro do Grajaú. A Sabesp informou que o incidente não está relacionado a suas operações e acredita que tenha sido causado por uma obra realizada por terceiros.", "titulo_pt": "Adutora rompe e causa vazamento na zona sul de São Paulo", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 63163, "titulo": "Temporal: daños en la agricultura, viviendas y OOPP suben a US$400 millones, y se suman comercio y pequeña minería", "url": "https://www.latercera.com/pulso/noticia/temporal-danos-en-la-agricultura-viviendas-y-oopp-suben-a-us400-millones-y-se-suman-comercio-y-pequena-mineria/", "fonte_id": "la_tercera", "data_pub": "2026-07-21T01:07:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O biministro de Obras Públicas e Transportes, Louis de Grange, estimou que os danos na região de Coquimbo ultrapassariam vários cientos de milhões de dólares. Além disso, o ministro de Hacienda, Jorge Quiroz, declarou que recursos já estão disponíveis para auxiliar as áreas afetadas e que será determinado quanto será reatribuído ou adicionado como recurso novo.", "titulo_pt": "Temporal: danos na agricultura, casas e OOPP somam quase 400 milhões de dólares, com comercio e mineração pequena incluídos", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 62910, "titulo": "Rio Grande do Sul registra caso de gripe aviária em criação de subsistência", "url": "https://www.cnnbrasil.com.br/agro/rio-grande-do-sul-registra-caso-de-gripe-aviaria-em-criacao-de-subsistencia/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-21T00:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Rio Grande do Sul registrou um caso de gripe aviária em uma criação de subsistência. O país manteve seu reconhecimento internacional após o incidente, que ocorreu em maio de 2025.", "titulo_pt": "Rio Grande do Sul registra caso de gripe aviária em criação de subsistência", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 63355, "titulo": "In southern Lebanon, at the Secours populaire hospital in Nabatieh, caregivers strive to overcome the traumas of war", "url": "https://www.lemonde.fr/en/international/article/2026/07/21/in-southern-lebanon-at-the-secours-populaire-hospital-in-nabatieh-caregivers-strive-to-overcome-the-traumas-of-war_6755669_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-20T23:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Profissionais de saúde em um hospital da Secours populaire, em Nabatieh, no sul do Líbano, recebem orientação individual e terapia em grupo após quatro meses de conflito e uma situação de segurança instável. Médicos sem Fronteiras oferecem esses serviços.", "titulo_pt": "No sul do líbano, profissionais de saúde lutam para superar as traumas da guerra no hospital Secours populaire em Nabatieh", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 63790, "titulo": "Q&A: What the EU’s carbon market review means for climate action", "url": "https://www.carbonbrief.org/qa-what-the-eus-carbon-market-review-means-for-climate-action/", "fonte_id": "carbon_brief", "data_pub": "2026-07-20T16:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Comissão Europeia apresentou novos planos para reduzir emissões através da revisão do mercado de carbono da UE. O post Q&A: O que a revisão do mercado de carbono da UE significa para as ações climáticas apareceu primeiro no Carbon Brief.", "titulo_pt": "Perguntas e respostas: o que A revisão do mercado de carbono da ue significa para as ações climáticas", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 64062, "titulo": "Samuel L. Jackson acusó a Argentina de ser “uno de los países más racistas del mundo”", "url": "https://www.lanacion.com.ar/espectaculos/samuel-l-jackson-acuso-a-argentina-de-ser-uno-de-los-paises-mas-racistas-del-mundo-nid20072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-21T09:39:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Samuel L. Jackson acusou a Argentina de ser um dos países mais racistas do mundo, utilizando um personagem famoso para questionar membros da comunidade negra que apoiaram a seleção argentina durante o Mundial 2026.", "titulo_pt": "Samuel L. Jackson acusa Argentina de ser um dos países mais racistas do mundo", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 64451, "titulo": "State awards revoked for individuals involved in 1979 military coup, acts of state violence", "url": "https://en.yna.co.kr/view/AEN20260721008000315", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T06:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo revogou os prêmios estatais concedidos a indivíduos envolvidos no golpe militar de 1979 e em atos de violência estatal.", "titulo_pt": "Governo revoga prêmios para indivíduos envolvidos no golpe militar de 1979 e em atos de violência", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 64080, "titulo": "Holocaust survivors president says exclusion of Jews from public life has ‘disturbing parallels’ to Nazi Germany", "url": "https://www.theguardian.com/australia-news/2026/jul/21/holocaust-survivors-australia-exclusion-nazi-germany-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-07-21T05:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente da Associação Australiana de Sobreviventes do Holocausto e Descendentes, George Foster, afirmou que há 'paralelos perturbadores' entre o aumento do antisemitismo na Austrália e a atmosfera social da Alemanha nazista. Ele disse que as instituições democráticas australianas são diferentes, mas não pode ignorar esses paralelos.',", "titulo_pt": "Presidente de sobreviventes do holocausto diz que aumento de antisemitismo na austrália tem 'paralelos perturbadores' com época Nazi", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 63561, "titulo": "In Indonesia’s island paradise, slavery remains a daily reality", "url": "https://www.scmp.com/news/asia/southeast-asia/article/3361278/indonesias-island-paradise-slavery-remains-daily-reality?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-21T02:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Na ilha indonésia de Sumba, perto das praias turísticas de Bali, a escravidão continua sendo uma realidade diária. As pessoas nascem em situação de servidão e trabalham sem remuneração, são transferidas no casamento e podem sofrer violência por parte dos senhores.", "titulo_pt": "Na ilha paradisíaca da indonésia, a escravidão é uma realidade cotidiana", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 63568, "titulo": "Chinese teenager lies to parents about holiday to secretly help flood victims in Guangxi", "url": "https://www.scmp.com/news/people-culture/trending-china/article/3361101/chinese-teenager-lies-parents-about-holiday-secretly-help-flood-victims-guangxi?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-21T01:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um adolescente de 18 anos de Shanghai, Wu Yulun, enganou seus pais ao dizer que ia passar o feriado. Na verdade, ele viajou com um amigo para uma região afetada por inundações no sudoeste da província de Guangxi para participar dos esforços de ajuda.", "titulo_pt": "Adolescente chinês engana pais para ajudar vítimas de inundações em Guangxi", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 63049, "titulo": "Gobierno decreta estado de catástrofe en Región de Coquimbo; Quiroz asegura que “hay recursos” para reconstrucción postemporal, e imputado por homicidio de cabo Nain queda en prisión preventiva", "url": "https://www.ciperchile.cl/2026/07/20/radar-20-07-26/?utm_source=rss&utm_medium=rss&utm_campaign=radar-20-07-26", "fonte_id": "ciper_chile", "data_pub": "2026-07-21T00:08:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O governo declarou estado de catástrofe na Região de Coquimbo. O responsável afirmou que há recursos para a reconstrução após o evento temporal, e um suspeito do assassinato do cabo Nain foi colocado sob prisão preventiva.", "titulo_pt": "Governo declara estado de catástrofe na região de Coquimbo; suspeito do assassinato do cabo Nain fica em prisão preventiva", "veiculo": "CIPER Chile", "pais": "Chile", "classe": "A"}, {"id": 63468, "titulo": "MSF demands Israel release detained Palestinian healthcare workers", "url": "https://www.aljazeera.com/news/2026/7/20/msf-demands-israel-release-detained-palestinian-healthcare-workers?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-20T23:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A ONG MSF está 'outra' pela forma como Israel trata os profissionais de saúde palestinos detidos e alerta que o silêncio se tornou complicidade.", "titulo_pt": "MSF denuncia tratamento israelense a trabalhadores de saúde palestinos detidos", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 63788, "titulo": "Children continue to be killed and injured in attacks across Ukraine, as UNICEF warehouse is damaged and critical humanitarian supplies destroyed", "url": "https://www.unicef.org/press-releases/children-continue-be-killed-and-injured-attacks-across-ukraine-unicef-warehouse", "fonte_id": "unicef", "data_pub": "2026-07-20T15:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Crianças continuam a ser mortas e feridas em ataques em todo o território ucraniano, e um depósito da UNICEF foi danificado, resultando na destruição de suprimentos humanitários cruciais.", "titulo_pt": "Crianças continuam a sofrer em ataques em Ucrânia; depósito da UNICEF é danificado", "veiculo": "UNICEF Global", "pais": "Global", "classe": "A"}, {"id": 62011, "titulo": "Venezuelana é morta por ex com fio elétrico em Cuiabá", "url": "https://www.cnnbrasil.com.br/nacional/centro-oeste/mt/venezuelana-e-morta-por-ex-com-fio-eletrico-em-cuiaba/", "fonte_id": "cnn_brasil", "data_pub": "20 let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml(topico) : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml(audioKey) {
  const audio = D.audio && D.audio.sumarios && D.audio.sumarios[audioKey];
  if (!audio || !audio.arquivo) return "";
  const src = audio.arquivo + (audio.versao ? "?v=" + encodeURIComponent(audio.versao) : "");
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta" data-audio-src="${esc(src)}" data-audio-key="${esc(audioKey)}">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderPodcast() {
  const p = D.podcast;
  if (!p || !p.arquivo) return "";
  const src = p.arquivo + (p.versao ? "?v=" + encodeURIComponent(p.versao) : "");
  return `<div class="podcast-card">
    <div class="podcast-hd"><span class="podcast-ico">&#127908;</span> Jornal do dia</div>
    <div class="podcast-sub">Dois &acirc;ncoras apresentam as not&iacute;cias de hoje.</div>
    <audio class="podcast-audio" controls preload="none" src="${esc(src)}"></audio>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml("destaque")}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

    ).join("");

    const itens = D.noticias.map(n => {

      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}

}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — audio pre-renderizado por Piper
(function () {
  var player = document.createElement('audio');
  player.preload = 'auto';
  player.setAttribute('playsinline', '');
  document.body.appendChild(player);
  var barAtual = null;

  function _resetBar(bar) {
    if (!bar) return;
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  function _setTocando(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _setPausado(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _tituloAudio(bar) {
    var h = bar.previousElementSibling;
    while (h && !/^H2$/i.test(h.tagName || '')) h = h.previousElementSibling;
    return h ? (h.innerText || h.textContent || 'Boletim Diario').trim() : 'Boletim Diario';
  }

  function _mediaSession(bar) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: _tituloAudio(bar),
      artist: 'Boletim Diario',
      album: 'Leitura dos sumarios',
    });
    navigator.mediaSession.setActionHandler('play', function () { player.play().catch(function () {}); });
    navigator.mediaSession.setActionHandler('pause', function () { player.pause(); });
    navigator.mediaSession.setActionHandler('stop', function () { player.pause(); player.currentTime = 0; });
  }

  window.ttsOuvir = function (btn) {
    var bar = btn.closest('.tts-bar');
    var src = bar && bar.dataset.audioSrc;
    if (!src) return;
    if (barAtual && barAtual !== bar) _resetBar(barAtual);
    barAtual = bar;
    if (player.src !== new URL(src, window.location.href).href) {
      player.src = src;
      player.currentTime = 0;
    } else {
      player.currentTime = 0;
    }
    _mediaSession(bar);
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _resetBar(bar);
    });
  };

  window.ttsPausar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    _setPausado(bar);
  };

  window.ttsContinuar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _setPausado(bar);
    });
  };

  window.ttsPar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    player.currentTime = 0;
    _resetBar(bar);
    if (barAtual === bar) barAtual = null;
  };

  player.addEventListener('ended', function () { _resetBar(barAtual); barAtual = null; });
  player.addEventListener('error', function () { _resetBar(barAtual); barAtual = null; });
  window.addEventListener('beforeunload', function () { player.pause(); });
})();
</script>
</body>
