, "fonte_id": "metropoles", "data_pub": "2026-07-04T12:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Guilherme Silva Teixeira, de 24 anos, é acusado do assassinato do professor João Emmanuel Ribeiro durante uma parada de ônibus em Sobradinho, Distrito Federal.", "titulo_pt": "Justiça vê indícios de crime e encaminha assassino de professor a júri", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 35148, "titulo": "MG: 2 vilas disputam selo da ONU entre as melhores do turismo mundial", "url": "https://www.metropoles.com/minas-gerais/mg-2-vilas-disputam-selo-da-onu-entre-as-melhores-do-turismo-mundial", "fonte_id": "metropoles", "data_pub": "2026-07-04T14:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Conceição de Ibitipoca e Delfinópolis estão entre os sete destinos brasileiros indicados para o reconhecimento internacional pelo Programa das Nações Unidas para o Meio Ambiente (PNUMA).", "titulo_pt": "MG: 2 vilas disputam selo da ONU entre as melhores do turismo mundial", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 34847, "titulo": "Italian rice crops suffer in drought, worst European heatwave ever", "url": "https://www.scmp.com/news/world/europe/article/3359427/italian-rice-crops-suffer-drought-worst-european-heatwave-ever?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T12:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em uma das piores ondas de calor da Europa, culturas de arroz na região mais importante para a produção do grão na Itália estão sofrendo. Sharon Angoli, de 22 anos, observa campos secos e sem perspectivas de recuperação mesmo com chuvas abundantes.", "titulo_pt": "Cultivos de arroz na Itália sofrem com onda de calor extremamente severa", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 34795, "titulo": "Firefighters race to contain flames in northeastern Spain", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/4/firefighters-race-to-contain-flames-in-northeastern-spain?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T12:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Incêndios florestais estão ocorrendo no nordeste da Espanha e bombeiros estão trabalhando para conter as chamas.", "titulo_pt": "Bombeiros correm contra o tempo para controlar incêndios na Espanha", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 34532, "titulo": "Casal morre em colisão com caminhão elétrico da Tesla nos EUA", "url": "https://www.infomoney.com.br/consumo/caminhao-eletrico-tesla-semi-colisao/", "fonte_id": "infomoney", "data_pub": "2026-07-04T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um casal morreu em uma colisão envolvendo um Volkswagen Beetle e um caminhão elétrico Tesla Semi nos Estados Unidos. Este é o primeiro acidente registrado com o Tesla Semi desde que ele começou a ser utilizado.", "titulo_pt": "Casal morre em colisão com caminhão elétrico da Tesla nos EUA", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 34495, "titulo": "Clima: frio intenso e geada marcam o sábado em grande parte do país", "url": "https://www.metropoles.com/brasil/clima-frio-intenso-e-geada-marcam-o-sabado-em-grande-parte-do-pais", "fonte_id": "metropoles", "data_pub": "2026-07-04T10:42:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Frio intenso e geada afetaram grande parte do país no sábado, com uma massa de ar polar responsável por baixar as temperaturas no Sul. O litoral do Sul e Sudeste enfrentou risco de ressaca e ventos fortes.", "titulo_pt": "Clima: frio intenso e geada marcam o sábado em grande parte do país", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 34639, "titulo": "El casi terminado Parque Cerro Chena está en riesgo", "url": "https://www.latercera.com/opinion/noticia/el-casi-terminado-parque-cerro-chena-esta-en-riesgo/", "fonte_id": "la_tercera", "data_pub": "2026-07-04T10:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Parque Cerro Chena, que está quase concluído, corre risco de não ser finalizado. O projeto enfrenta dificuldades que ameaçam sua conclusão.", "titulo_pt": "Parque Cerro Chena, quase pronto, está em risco", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 34519, "titulo": "88% das casas impactadas: IBGE revela dimensão das enchentes no RS", "url": "https://exame.com/esg/88-das-casas-impactadas-ibge-revela-dimensao-das-enchentes-no-rs/", "fonte_id": "exame", "data_pub": "2026-07-04T08:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Instituto Brasileiro de Geografia e Estatística (IBGE) revelou que 88% das casas no Rio Grande do Sul foram impactadas pelas enchentes. Os dados indicam que a maioria dos domicílios enfrentou ocorrências relacionadas às enchentes, afetando tanto a estrutura das casas quanto o bem-estar psicológico da população.", "titulo_pt": "88% das casas afetadas: IBGE revela dimensão das enchentes no RS", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 34866, "titulo": "Australia’s Great Barrier Reef avoids ‘in danger’ listing by Unesco", "url": "https://www.scmp.com/news/asia/australasia/article/3359403/australias-great-barrier-reef-avoids-danger-listing-unesco?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T07:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Great Barrier Reef, um importante destino turístico na Austrália, evitou ser listado como em perigo pela Unesco, apesar da preocupação máxima expressa pela Organização das Nações Unidas sobre a bleaching de massa de corais e os impactos do aquecimento global. Canberra comemorou a decisão preliminar da Unesco de manter o status de Patrimônio Mundial do recife.", "titulo_pt": "Grande Barreira de Corais da Austrália evita ser classificado como em perigo pela Unesco", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 34685, "titulo": "Sydney records hottest June since 1859 as expert warns new high a ‘signature’ of global warming", "url": "https://www.theguardian.com/australia-news/2026/jul/04/sydney-records-hottest-june-since-1859-as-expert-warns-new-high-a-signature-of-global-warming", "fonte_id": "guardian_world", "data_pub": "2026-07-04T04:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sydney registrou o mês de junho mais quente desde 1859, com uma temperatura média de 16,1°C. O registro foi confirmado pelo Bureau of Meteorology após um mês atípico de clima primaveral no inverno.", "titulo_pt": "Sídney registra junho mais quente desde 1859 como sinal do aquecimento global", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 34200, "titulo": "Heatwave upends Fourth of July events across US, strains power grids", "url": "https://www.scmp.com/news/world/united-states-canada/article/3359394/heatwave-upends-fourth-july-events-across-us-strains-power-grids?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T03:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma onda de calor perigosa interrompeu celebrações do Dia da Independência nos Estados Unidos, cancelando ou adiando várias paradas, concertos e exibições de fogos em diversas cidades. O Great American State Fair no National Mall, em Washington, foi um dos eventos afetados.", "titulo_pt": "Onda de calor interrompe festivais do Dia da Independência nos EUA", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 33825, "titulo": "Declaran alerta ambiental para este sábado en la RM", "url": "https://www.latercera.com/nacional/noticia/declaran-alerta-ambiental-para-este-sabado-en-la-rm/", "fonte_id": "la_tercera", "data_pub": "2026-07-04T01:35:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Delegação Presidencial da Região Metropolitana declarou uma alerta ambiental para este sábado devido às condições de ventilação previstas na cuenca de Santiago.", "titulo_pt": "Alerta Ambiental Declared para Este Sábado na RM", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 34026, "titulo": "Devastating heatwave leaves France's wildlife in crisis", "url": "https://www.lemonde.fr/en/environment/article/2026/07/04/devastating-heatwave-leaves-france-s-wildlife-in-crisis_6755134_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-04T01:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma onda de calor recente levou a uma situação crítica para a vida selvagem na França, com um centro de resgate de aves da Liga Francesa para a Proteção dos Animais Selvagens (LPO) em Audenge, Gironde, relatando um número recorde de animais afetados pelo calor extremo. Este padrão foi observado em muitos outros locais de resgate de vida selvagem.", "titulo_pt": "Ona de Calor Devastadora Deixa a Vida Selvagem da França em Crise", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 35261, "titulo": "Gobierno concreta tercer envío de ayuda humanitaria a Venezuela: 35 mil vacunas y 13 toneladas de carga", "url": "https://www.latercera.com/nacional/noticia/gobierno-concreta-tercer-envio-de-ayuda-humanitaria-a-venezuela-35-mil-vacunas-y-13-toneladas-de-carga/", "fonte_id": "la_tercera", "data_pub": "2026-07-04T14:26:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O governo confirmou o terceiro envio de ajuda humanitária para Venezuela, incluindo 35 mil vacinas e 13 toneladas de suprimentos. A operação também visa o retorno dos 45 bombeiros chilenos que estavam em missão no país.", "titulo_pt": "Governo concretiza terceiro envio de ajuda humanitária a Venezuela: 35 mil vacinas e 13 toneladas de carga", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 35128, "titulo": "Watch Mark Ruffalo, Sarah Jessica Parker, Margaret Atwood, Judd Apatow and More Give Instructions to Combat Trump’s Tyranny on July 4th", "url": "https://variety.com/2026/politics/news/july-4-trump-warning-mark-ruffalo-sarah-jessica-parker-margaret-atwood-judd-apatow-1236801648/", "fonte_id": "variety", "data_pub": "2026-07-04T13:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de atores, ativistas, intelectuais e comediantes se uniram para emitir um alerta sobre a fragilidade da democracia americana. Timothy Snyder, historiador e autor best-seller especializado em fascismo, reuniu diversas figuras proeminentes para ler trechos de sua obra.", "titulo_pt": "Veja Mark Ruffalo, Sarah Jessica Parker, Margaret Atwood, Judd Apatow e Outros Dar Instruções para Combater a Tirania de Trump no Dia 4 de Julho", "veiculo": "Variety", "pais": "EUA", "classe": "C"}, {"id": 35119, "titulo": "Pope Leo urges migrant protection, integration on visit to Lampedusa", "url": "https://www.aljazeera.com/news/2026/7/4/pope-urges-protection-integration-of-migrants-on-visit-to-island-frontier?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T12:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Papa Leão encoraja a Europa e os Estados Unidos a acolherem e ajudarem migrantes durante uma viagem simbólica à ilha italiana de Lampedusa.", "titulo_pt": "Papa Leo incentiva proteção e integração de migrantes em visita a Lampedusa", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 34681, "titulo": "‘The situation is terrible’: aid workers on life in Sudanese city pummelled by drone strikes", "url": "https://www.theguardian.com/world/2026/jul/04/el-obeid-aid-workers-sudan-war-drone-strikes", "fonte_id": "guardian_world", "data_pub": "2026-07-04T11:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A cidade de El Obeid, no Sudão, está sendo atacada por drones das forças armadas do pa const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">
      <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
      <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
      <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
      <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
    </div>` : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>

  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";

      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}

    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));

function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices().filter(function(v) { return v.lang === 'pt-BR' || v.lang.startsWith('pt'); });
    return vs[0] || null;
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // sempre a .sumario imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
