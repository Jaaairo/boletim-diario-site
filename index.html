<style>

@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: none; border: 1px solid var(--border); border-radius: 4px;
             color: var(--texto2); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { border-color: var(--acento); color: var(--texto); }
  .tts-bar[hidden] { display: none; }
</style>
</head>

ções entre Teerã e Washington serão retomadas. Em outro desenvolvimento, Donald Trump enfrentou uma série de controvérsias, incluindo um vídeo criado com inteligência artificial criticando estrelas de Hollywood e fazendo piadas sobre ter 'ménage à trois' com seus filhos durante a cerimônia de inauguração da Biblioteca Presidencial Theodore Roosevelt. As tarifas comerciais entre Brasil e Estados Unidos também estão em pauta, com Flávio Bolsonaro pedindo uma pausa de 180 dias antes de novas medidas serem aplicadas.\n\nUm ataque aéreo massivo realizado pela Rússia contra Kyiv resultou na morte de 17 pessoas, conforme informado pelo prefeito da cidade. Este é o ataque mais letal em cinco anos de guerra na Ucrânia. O Kremlin declarou que intensificará ainda mais as pressões sobre a capital ucraniana. Em resposta, o presidente Zelenskyy expressou esperança de um rápido resultado das investigações irlandesas sobre exportações de alumina para a Rússia. Além disso, a China informou que o piloto do avião pequeno que colidiu com o prédio mais alto de Beijing apresentava problemas de saúde mental. Esses eventos ocorrem em um contexto geopolítico tenso, com várias partes do mundo enfrentando desafios significativos, incluindo a guerra na Ucrânia, as sanções econômicas entre Estados Unidos e Brasil, e os esforços internacionais para lidar com questões climáticas.", "economia": "As bolsas asiáticas registraram movimentações significativas nesta semana. Na Coreia do Sul, as ações subiram 2,1% no final da manhã desta sexta-feira, impulsionadas por compras a preço baixo. Em contraste, a Bolsa de Seul despencou quase 8% na quinta-feira, com destaque para as fortes quedas de Samsung (-8,95%) e SK Hynix (-12,04%). No cenário internacional, o Canadá planeja construir uma nova linha de petróleo para suprir a Ásia com 1 milhão de barris por dia, como parte dos esforços para reduzir sua dependência dos Estados Unidos. O governo brasileiro apresentou um 'mapa do caminho' para evitar tarifas dos EUA durante uma reunião virtual com o representante de Comércio dos Estados Unidos. Além disso, a Embraer entregou 65 aeronaves no segundo trimestre, seu melhor desempenho em 16 anos, enquanto o Tesouro Nacional realizou leilões de títulos prefixados e os juros futuros dispararam logo após o evento.", "tecnologia": "A Coreia do Sul discutiu cooperação em tecnologias quânticas com Canadá, Reino Unido e União Europeia durante reuniões separadas. A operadora de telefonia móvel SoftBank planeja estabelecer uma nova empresa para fornecer capacidade de centrais de dados em escala de 10 gigawatts até cerca de 2030, com foco na computação de inteligência artificial (IA) nos Estados Unidos. Tesla liderou as vendas de carros importados na Coreia do Sul no primeiro semestre de 2023. A joint venture entre a LG Energy Solution e a Honda começou a produzir células de bateria para sistemas de armazenamento de energia em 3 de julho. O Global AI Frontiers Symposium ocorreu em Seul, promovendo discussões sobre IA. A OpenAI propôs transferir uma participação de 5% ao governo dos Estados Unidos, conforme relatado, seguindo o crescente contrarremédio público nos EUA em relação aos possíveis impactos econômicos da IA. A Anthropic liberou o modelo de inteligência artificial Fable 5 para todos os usuários após a remoção das proibições dos EUA. Daniela Amodei, presidente da start-up americana de IA, compartilha sua perspectiva sobre as principais questões enfrentadas pelo setor. A plataforma Spotify removeu mais de half um milhão de streams da música 'Earrings', do artista Malcolm Todd, após suspeitas de apostas no Kalshi que teriam levado a canção ao topo das paradas. O CEO da Uber afirma que a tecnologia de veículos autônomos pode substituir gradualmente os motoristas humanos no setor de transporte nos próximos anos. A OpenAI e Anthropic não estão gerando o valor prometido, diz o CEO da Palantir, criticando o modelo de negócios das empresas e afirmando que ferramentas de IA de código aberto podem ser mais vantajosas para reduzir custos e manter o controle sobre os dados.", "ciencia": "A NASA estabeleceu um novo recorde de visualizações ao vivo com a missão Artemis II, que gerou mais de 149,4 milhões de visualizações. A missão, que incluiu o lançamento e splashdown da espaçonave, mostrou forte engajamento global. Em Cabo Verde, cientistas criaram células vivas que se alimentam, crescem e se reproduzem, um avanço significativo na biologia celular. Além disso, o Telescópio Espacial James Webb da NASA capturou imagens de estrelas nascendo em comemoração ao aniversário dos Estados Unidos, revelando galáxias distantes que brilham como fogos de artifício.", "cultura": "A escritora portuguesa Lídia Jorge ganhou o Prêmio Camões de Literatura 2026, considerado a maior distinção literária da língua portuguesa. O anúncio foi feito após uma reunião virtual do júri. Em outra notícia cultural, G-Dragon, famoso cantor do K-pop, foi nomeado embaixador honorário para a 48ª sessão do Comitê do Patrimônio Mundial da UNESCO, que será realizada em Busan no final deste mês. Essa nomeação reconhece sua influência global e contribuições para a cultura e as artes. No Brasil, o Festival Folha Sabores da Montanha destaca a produção vinícola da Serra da Mantiqueira e a gastronomia de inverno em 29 restaurantes e bares espalhados por regiões serranas de quatro estados, promovendo uma experiência culinária rica e diversificada.", "sociedade": "A sociedade enfrenta diversos desafios e situações dramáticas em diferentes partes do mundo. Primeiramente, os terremotos na Venezuela continuam a causar devastação, com relatos de pessoas ainda vivas sendo resgatadas após sete ou oito dias sob os escombros. Enquanto isso, uma equipe de jovens voluntários gerencia um abrigo para sobreviventes em La Guaira. A situação do sistema de saúde venezuelano é crítica e tem dificuldade em atender as vítimas dos terremotos. Além disso, a Igreja Católica lançou uma campanha humanitária para auxiliar o país. No Brasil, um grupo da J&F mobiliza operações humanitárias enviando mantimentos por meio de aviões cargueiros. Em outro contexto, jovens pobres enfrentam desafios em obter empregos estáveis, enquanto a lei propõe mudanças na transferência de adolescentes condenados para cárceis administradas pela Gendarmeria. No âmbito médico, um caso envolveu maus-tratos a um bebê que levou uma enfermeira a alertar sobre o abuso e resultou em acusações contra a mãe e padrasto do menino. Outro caso envolveu um jogador argentino que perdeu sua família durante os terremotos na Venezuela, refletindo as tragédias pessoais associadas aos desastres naturais.", "meio_ambiente": "Um novo estudo revela que o Pantanal perdeu 80% de sua água superficial em quatro décadas, afetando significativamente o bioma. Paralelamente, a França enfrenta uma onda de calor extremo desde junho, com mais de 90 pessoas mortas por afogamento até agora e incêndios florestais se espalhando rapidamente pelo sul do país, causados pelas altas temperaturas. Além disso, a Alemanha está pressionada para implementar rapidamente medidores inteligentes básicos devido ao esforço de expansão da rede elétrica.", "direitos_humanos": "Mais de 400 pessoas morreram durante a expansão da epidemia de Ebola na República Democrática do Congo, conforme relatos. Em outro desenvolvimento, um novo decreto sobre unidade étnica entrou em vigor na China, mas grupos de direitos humanos e a ONU temem que ele possa ameaçar os direitos dos minoritários uigures e tibetanos, considerando-o como 'força de assimilação'. No Chile, um presunto assassino do carregador de fuzis Emmanuel Sánchez foi identificado e está sob prisão preventiva. Além disso, uma rede internacional organizada de estupro facilitado por drogas foi revelada pela Agência Nacional de Crime do Reino Unido, com atividades ocorrendo através de redes online não identificadas pela lei. Em um incidente no Brasil, a presidenta Delcy Rodríguez expressou que a Venezuela está profundamente impactada pelas perdas humanas, admitindo pela primeira vez que há uma estimativa de cerca de 10.000 mortes e sobrecarregando os serviços funerários com corpos em número incerto. No Chile, um homem acusado de abusos sexuais contra um menor foi preso preventivamente. Em outro caso, dois casais indonésios foram chicoteados publicamente por beijarem durante um vivo no TikTok."}, "resumo_do_dia": {"politica_nacional": [{"id": 32705, "titulo": "O que se sabe sobre a morte de um casal de idosos em MG; diarista suspeita foi presa", "url": "https://www.cartacapital.com.br/sociedade/o-que-se-sabe-sobre-a-morte-de-um-casal-de-idosos-em-mg-diarista-suspeita-foi-presa/", "fonte_id": "cartacapital", "data_pub": "2026-07-03T11:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Paola Stefany Meto Cirino, uma diarista de 30 anos, foi encontrada em um hotel em Itabira, na região central do estado. Ela é suspeita de envolvimento na morte de um casal de idosos.", "titulo_pt": "O que se sabe sobre a morte de um casal de idosos em MG; diarista suspeita foi presa", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 32717, "titulo": "Lula inaugura túnel da transposição sem água no RN", "url": "https://www.poder360.com.br/poder-governo/lula-inaugura-tunel-da-transposicao-sem-agua-no-rn/", "fonte_id": "poder360", "data_pub": "2026-07-03T11:42:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Lula inaugurou um túnel da transposição no Rio Grande do Norte, mas o local não tinha água. O governo afirmou que a estrutura estava operacional.", "titulo_pt": "Lula inaugura túnel da transposição sem água no RN", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 32719, "titulo": "Carro elétrico mais barato do Brasil tem vendas suspensas", "url": "https://www.poder360.com.br/poder-china/carro-eletrico-mais-barato-do-brasil-tem-vendas-suspensas/", "fonte_id": "poder360", "data_pub": "2026-07-03T11:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As vendas do carro elétrico mais barato do Brasil foram suspensas devido ao aumento dos custos da operação de importação, principalmente relacionado aos contêineres.", "titulo_pt": "Vendas do carro elétrico mais barato do Brasil são suspensas", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 32706, "titulo": "Sobe para 10 o número de monges mortos após atropelamento por caminhonete dirigida por criança na Tailândia", "url": "https://www.cartacapital.com.br/mundo/sobe-para-10-o-numero-de-monges-mortos-apos-atropelamento-por-caminhonete-dirigida-por-crianca-na-tailandia/", "fonte_id": "cartacapital", "data_pub": "2026-07-03T11:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O número de monges mortos após o atropelamento por uma caminhonete dirigida por uma criança na Tailândia aumentou para dez. Outras dez pessoas estão internadas, duas delas em estado crítico.", "titulo_pt": "Número de monges mortos após atropelamento por caminhonete com criança chega a 10", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 32768, "titulo": "Perdi meu filho para as bets", "url": "https://apublica.org/podcast/2026/07/podcast-pauta-publica/perdi-meu-filho-para-as-bets/", "fonte_id": "agencia_publica", "data_pub": "2026-07-03T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma mãe descreve a dor de ter perdido seu filho para o vício em apostas online, que oferecem ganhos impossíveis. O relato destaca a triste realidade da perda causada por esses jogos fraudulentos.", "titulo_pt": "Perdi meu filho para as apostas online", "veiculo": "Agência Pública", "pais": "Brasil", "classe": "B"}, {"id": 32803, "titulo": "Anac endurece regras para uso de drones após ocorrências em aeroportos", "url": "https://www.cnnbrasil.com.br/infra/anac-endurece-regras-para-uso-de-drones-apos-ocorrencias-em-aeroportos/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-03T10:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Anac (Agência Nacional de Aviação Civil) implementou novas regras para o uso de drones, criando categorias com base no risco e estabelecendo um prazo de dois anos para que os operadores se adequem às novas normas. Essa medida foi tomada após incidentes envolvendo drones em aeroportos.", "titulo_pt": "Anac endurece regras para uso de drones após ocorrências em aeroportos", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 32707, "titulo": "Justiça adia o julgamento do tenente-coronel Geraldo Leite Rosa Neto, acusado de matar a PM Gisele", "url": "https://www.cartacapital.com.br/justica/justica-adia-o-julgamento-do-tenente-coronel-geraldo-leite-rosa-neto-acusado-de-matar-a-pm-gisele/", "fonte_id": "cartacapital", "data_pub": "2026-07-03T10:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O julgamento do tenente-coronel Geraldo Leite Rosa Neto, acusado de matar a PM Gisele, foi adiado para agosto. O procedimento inicialmente estava programado para esta sexta-feira.", "titulo_pt": "Justiça adia julgamento do tenente-coronel Geraldo Leite Rosa Neto, acusado de matar a PM Gisele", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 32708, "titulo": "Acidente com ônibus deixa pelo menos 40 mortos no Paquistão", "url": "https://www.cartacapital.com.br/mundo/acidente-com-onibus-deixa-pelo-menos-40-mortos-no-paquistao/", "fonte_id": "cartacapital", "data_pub": "2026-07-03T10:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um ônibus, que estava lotado, despencou por mais de 20 metros em um desfiladeiro no Paquistão, deixando pelo menos 40 mortos.", "titulo_pt": "Acidente com ônibus deixa pelo menos 40 mortos no Paquistão", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 32721, "titulo": "Gratuidade do Farmácia Popular é maior acerto de Lula, diz AtlasIntel", "url": "https://www.poder360.com.br/poder-eleicoes/gratuidade-do-farmacia-popular-e-maior-acerto-de-lula-diz-atlasintel/", "fonte_id": "poder360", "data_pub": "2026-07-03T10:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um levantamento da AtlasIntel/Bloomberg indica que a gratuidade do programa Farmácia Popular é vista de forma muito positiva pelos eleitores. A isenção do Imposto de Renda também lidera as avaliações positivas entre os eleitores.", "titulo_pt": "Gratuidade do Farmácia Popular é maior acerto de Lula, afirma pesquisa", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 32685, "titulo": "Professores da Uerj suspendem greve, após três meses de paralisação", "url": "https://agenciabrasil.ebc.com.br/politica/noticia/2026-07/professores-da-uerj-suspendem-greve-apos-tres-meses-de-paralisacao", "fonte_id": "agencia_brasil_politica", "data_pub": "2026-07-03T10:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os professores da Universidade do Estado do Rio de Janeiro (UERJ) decidiram encerrar a greve após três meses, retornando às atividades no dia 13 de julho. A paralisação iniciou em 25 de março e envolveu representantes dos professores, técnicos administrativos e alunos que farão uma vigília para buscar consenso com o governo do estado.", "titulo_pt": "Professores da Uerj encerram greve após três meses de paralisação", "veiculo": "Agência Brasil - Política", "pais": "Brasil", "classe": "A"}, {"id": 32722, "titulo": "Para 50%, novos casos de corrupção de Lula são “muito prováveis”", "url": "https://www.poder360.com.br/poder-pesquisas/para-50-novos-casos-de-corrupcao-de-lula-sao-muito-provaveis/", "fonte_id": "poder360", "data_pub": "2026-07-03T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "De acordo com um levantamento do AtlasIntel/Bloomberg, 50% das pessoas consideram muito prováveis novos casos de corrupção envolvendo Lula. Só 7% acham que não haverá novas revelações sobre esquemas fraudulentos durante o terceiro mandato presidencial.", "titulo_pt": "Para metade, novos casos de corrupção de Lula são 'muito prováveis'", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 32723, "titulo": "Para 52%, economia do Brasil está “ruim”", "url": "https://www.poder360.com.br/poder-pesquisas/para-52-economia-do-brasil-esta-ruim/", "fonte_id": "poder360", "data_pub": "2026-07-03T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo da AtlasIntel/Bloomberg revela que a economia do Brasil é considerada ruim por 52% das pessoas, enquanto 48% esperam uma melhora nos próximos meses.", "titulo_pt": "Para 52%, economia brasileira está 'ruim'", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 32724, "titulo": "PT explora críticas de aliado de Flávio Bolsonaro sobre voto feminino", "url": "https://www.poder360.com.br/poder-eleicoes/pt-explora-criticas-de-aliado-de-flavio-bolsonaro-sobre-voto-feminino/", "fonte_id": "poder360", "data_pub": "2026-07-03T09:49:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O partido PT publicou uma postagem lembrando comentários de Paulo Figueiredo, aliado de Flávio Bolsonaro, que afirmava que mulheres solteiras 'votam muito mal'.", "titulo_pt": "PT explora críticas de aliado de Flávio Bolsonaro sobre voto feminino", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 32704, "titulo": "Brasil cria centro para produzir insumos farmacêuticos e reduzir dependência do exterior; projeto não tem prazo nem meta definidos", "url": "https://g1.globo.com/saude/noticia/2026/07/03/brasil-cria-centro-para-produzir-insumos-farmaceuticos-e-reduzir-dependencia-do-exterior-projeto-nao-tem-prazo-nem-meta-definidos.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-03T09:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil lançou um centro de pesquisa para desenvolver insumos farmacêuticos a partir da biodiversidade nacional, com o objetivo de reduzir a dependência do país em relação às importações. No entanto, não há metas específicas ou prazos definidos para este projeto.", "titulo_pt": "Brasil cria centro para produzir insumos farmacêuticos e reduzir dependência do exterior", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 32690, "titulo": "Concessionária pressiona governo Lula contra plano de segundo aeroporto no RS", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/concessionaria-pressiona-governo-lula-contra-plano-de-segundo-aeroporto-no-rs.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-03T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A concessionária alemã Fraport, que opera o Aeroporto Internacional Salgado Filho, pressionou o Ministério de Portos e Aeroportos para rechaçar a proposta de construção de um segundo aeroporto em Porto Alegre. O plano foi defendido por empresários e políticos gaúchos.", "titulo_pt": "Concessionária pressiona governo Lula contra plano de segundo aeroporto no RS", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 32691, "titulo": "Vamos salvar o Código de Defesa do Consumidor", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/vamos-salvar-o-codigo-de-defesa-do-consumidor.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-03T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Código de Defesa do Consumidor é considerado uma das principais legislações consumeristas do mundo e tem sido aplicada no cotidiano dos cidadãos.", "titulo_pt": "Vamos salvar o Código de Defesa do Consumidor", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 33002, "titulo": "July 4th events threatened by heat wave. And, Russia strikes on Ukraine's capital", "url": "https://www.npr.org/2026/07/03/g-s1-131920/up-first-newsletter-america-250-heat-wave-ukraine-russia-democratic-party", "fonte_id": "npr_news", "data_pub": "2026-07-03T11:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Eventos do Dia dos Estados Unidos estão ameaçados por uma onda de calor extremamente quente. Além disso, a Rússia realizou ataques no capital ucraniano, resultando em várias mortes e sendo considerados vinganças.", "titulo_pt": "Feriado americano ameaçado por onda de calor; Rússia ataca capital ucraniana", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 33115, "titulo": "From hooligans to exemplary fans: the English return to Mexico after 40 years", "url": "https://english.elpais.com/sports/2026-07-03/from-hooligans-to-exemplary-fans-the-english-return-to-mexico-after-40-years.html", "fonte_id": "elpais_en", "data_pub": "2026-07-03T11:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 1986, torcedores ingleses foram violentos durante a Copa do Mundo, levando à adoção de medidas de segurança mais rigorosas no México. Hoje, o perfil dos fãs ingleses mudou significativamente.", "titulo_pt": "De hooligans a torcedores exemplares: a volta da Inglaterra ao México após 40 anos", "veiculo": "El País (inglês)", "pais": "Espanha", "classe": "A"}, {"id": 32919, "titulo": "Allies Converge on Iran as Funeral Ceremonies for Supreme Leader Begin", "url": "https://www.nytimes.com/2026/07/03/world/middleeast/iran-funeral-supreme-leader.html", "fonte_id": "nyt_world", "data_pub": "2026-07-03T11:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Diplomatas estrangeiros de países como China, Rússia e Paquistão estão programados para prestar homenagem ao Altoiatolá Ali Khamenei durante cerimônias que começarão na sexta-feira.", "titulo_pt": "Aliados se Reúnem no Irã à medida que Cerimônias Funebres para o Líder Supremo Começam", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 33003, "titulo": "Just gave birth or are about to? Share your story and questions about costs", "url": "https://www.npr.org/2026/07/03/nx-s1-5879531/birth-pregnancy-costs-healthcare-us", "fonte_id": "npr_news", "data_pub": "2026-07-03T11:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As despesas relacionadas ao nascimento de um bebê nos Estados Unidos podem ser difíceis de prever e orçar. A NPR News está buscando relatos pessoais e perguntas sobre como navegar neste sistema.", "titulo_pt": "Apenas planejando para ter um bebê? Compartilhe sua história e dúvidas sobre os custos", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 33004, "titulo": "Former USAID head grieves its closure while hoping for its future", "url": "https://www.npr.org/2026/07/03/nx-s1-5877408/former-usaid-head-grieves-its-closure-while-hoping-for-its-future", "fonte_id": "npr_news", "data_pub": "2026-07-03T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um ex-diretor do USAID reflete sobre o ano desde a sua suspensão e a nova direção das assistências externas dos Estados Unidos.", "titulo_pt": "Ex-diretor do USAID reflete sobre seu encerramento e perspectivas futuras", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 33022, "titulo": "Ukrainian woman named by Interpol as main suspect in Monaco bomb attack", "url": "https://www.bbc.co.uk/news/articles/c4gy603z2qlo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-03T10:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A procuradoria de Mônaco informou que a suspeita não mais se encontra no país. Uma mulher ucraniana foi identificada pela Interpol como principal suspeita do ataque com bomba em Mônaco.", "titulo_pt": "Mulher ucraniana é identificada pela Interpol como principal suspeita do ataque com bomba em Mônaco", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 32720, "titulo": "PF prende alvo de sanção dos EUA em operação contra PCC", "url": "https://www.poder360.com.br/poder-seguranca-publica/pf-prende-alvo-de-sancao-dos-eua-em-operacao-contra-pcc/", "fonte_id": "poder360", "data_pub": "2026-07-03T10:57:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal realizou uma operação contra o PCC (Patrulha Criminal do Comando Vermelho), prendendo Stella Stefanie, que também está sancionada pelos EUA. A ação investigava uma rede envolvida em movimentações financeiras no valor de R$ 10 bilhões.", "titulo_pt": "PF prende alvo de sanções dos EUA em operação contra PCC", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 33049, "titulo": "Venezuela: Two weeks after the earthquakes, rescuers hunt for last signs of life", "url": "https://www.france24.com/en/video/20260703-venezuela-two-weeks-after-the-earthquakes-rescuers-hunt-for-last-signs-of-life", "fonte_id": "france24", "data_pub": "2026-07-03T10:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dois semanas após os terremotos que devastaram a Venezuela, equipes de resgate continuam procurando sinais de vida, enquanto as esperanças de encontrar sobreviventes diminuem. Mais de 2.500 pessoas já morreram.", "titulo_pt": "Venezuela: Dois semanas após os terremotos, equipes de resgate buscam últimos sinais de vida", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 32921, "titulo": "Long Lines for Gas Shatter the Illusion of Normalcy in Wartime Russia", "url": "https://www.nytimes.com/2026/07/03/world/europe/russia-gas-shortages.html", "fonte_id": "nyt_world", "data_pub": "2026-07-03T10:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Longas filas para abastecimento de gasolina estão desafiando a percepção de normalidade durante o período de guerra na Rússia.", "titulo_pt": "Filas longas por combustível quebram a ilusão de normalidade em tempos de guerra na Rússia", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 33068, "titulo": "Monaco IDs suspect in bomb attack on Ukrainian oligarch", "url": "https://www.dw.com/en/monaco-ids-suspect-in-bomb-attack-on-ukrainian-oligarch/a-77814163?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-03T10:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Autoridades emitiram uma Nota Vermelha da Interpol e um mandado de prisão contra uma mulher ucraniana suspeita de ter cometido um atentado com bomba que feriu um empresário sanionado pelo governo ucraniano e duas outras pessoas.", "titulo_pt": "Monaco identifica suspeita em explosão contra oligarca ucraniano", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 33021, "titulo": "Nasa launches mission to save falling space telescope", "url": "https://www.bbc.co.uk/news/articles/c0ry4xx7rk8o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-03T10:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um robô financiado pela Nasa foi lançado para capturar um telescópio em queda no espaço e devolvê-lo à segurança antes que ele se incendeie.", "titulo_pt": "Nasa lança missão para salvar telescópio caindo no espaço", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 33050, "titulo": "The USA has survived 250 years, but can it survive Donald Trump?", "url": "https://www.france24.com/en/tv-shows/press-review/20260703-the-usa-has-survived-250-years-but-can-it-survive-donald-trump", "fonte_id": "france24", "data_pub": "2026-07-03T10:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As notícias dos Estados Unidos estão focadas na celebração do bicentenário do país. O The New York Times destaca a derretimento rápido das geleiras da Europa devido aos recentes ondas de calor.", "titulo_pt": "EUA completará 250 anos, mas como será com Donald Trump à frente?", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 33019, "titulo": "France records 2,025 excess deaths at peak of heatwave as Europe braces for more extreme weather", "url": "https://www.bbc.co.uk/news/articles/c3ry307rxqro?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-03T10:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A França registrou 2.025 mortes a mais durante o pico da onda de calor, e meteorologistas prevêem temperaturas extremas na Europa nos próximos dias.", "titulo_pt": "França registra 2.025 mortes a mais em pico de onda de calor enquanto Europa se prepara para condições climáticas mais extremas", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 33179, "titulo": "Moldova PM Steps Down Abruptly as Corruption Scandals Unfold", "url": "https://balkaninsight.com/2026/07/03/moldova-pm-steps-down-abruptly-as-corruption-scandals-unfold/bi/", "fonte_id": "balkan_insight", "data_pub": "2026-07-03T10:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Prime minister Alexandru Munteanu surpreendentemente renunciou, aumentando a incerteza política no país. A renúncia ocorre em meio a escândalos de corrupção que ameaçam o credibilidade do governo pró-europeu.", "titulo_pt": "Prime-ministro da Moldova Renuncia Suddenamente Diante de Escândalos de Corrupção", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}, {"id": 33069, "titulo": "Moldova: Prime Minister Munteanu resigns", "url": "https://www.dw.com/en/moldova-prime-minister-munteanu-resigns/a-77817415?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-03T10:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O primeiro-ministro Alexandru Munteanu apresentou sua demissão após apenas oito meses no cargo. A presidente Maia Sandu declarou que um sucessor será nomeado rapidamente para manter o curso pró-UE do país.", "titulo_pt": "Moldova: Primeiro-Ministro Munteanu renuncia", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 33180, "titulo": "ARTE Europe Weekly: EU States’ Dilemmas About Crackdowns on Youth Crime", "url": "https://balkaninsight.com/2026/07/03/arte-europe-weekly-eu-states-dilemmas-about-crackdowns-on-youth-crime/rd/", "fonte_id": "balkan_insight", "data_pub": "2026-07-03T10:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A criminalidade juvenil está aumentando, levando alguns países europeus a considerarem baixar a idade da responsabilidade penal e encarcerar menores.", "titulo_pt": "ARTE Europe Semanal: Dilemas das Nações Europeias diante de Repressões à Criminalidade Juvenil", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 32702, "titulo": "Valores democráticos são essenciais em acordos, diz chanceler alemão", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-07/valores-democraticos-sao-essenciais-em-acordos-diz-chanceler-alemao", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-03T11:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O chanceler alemão, Johann Wadephul, defendeu alianças com governos democráticos e protecionismo econômico durante um painel no Brasil. Ele enfatizou que valores democráticos são essenciais em acordos internacionais.", "titulo_pt": "Valores democráticos são essenciais em acordos, diz chanceler alemão", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 33106, "titulo": "This is nuts upon nuts. When’s the crash?", "url": "https://www.ft.com/content/8e9337f8-9191-48e9-9289-a8defda89431", "fonte_id": "financial_times", "data_pub": "2026-07-03T10:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa está descrevendo uma situação onde os lucros e as avaliações das empresas estão inflados a um grau extremamente elevado, comparando-a a um período do Pleistoceno. Isso sugere que o mercado está altamente valorizado e pode estar prestes a sofrer uma correção.", "titulo_pt": "Isso é loucura pura. Quando vai haver a queda?", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 32809, "titulo": "AgTech alemã de fertilizantes capta R$ 106 milhões para expansão no Brasil", "url": "https://www.cnnbrasil.com.br/agro/agtech-alema-de-fertilizantes-capta-r-106-milhoes-para-expansao-no-brasil/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-03T10:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Stenon, uma empresa alemã especializada em análise de nitrogênio em tempo real, está priorizando o mercado brasileiro para investimentos e expansão das operações. A companhia captou R$ 106 milhões recentemente.", "titulo_pt": "AgTech alemã de fertilizantes captura R$ 106 milhões para expansão no Brasil", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 32912, "titulo": "Fazenda torna vinculantes 51 súmulas do Carf para a Receita Federal", "url": "https://www.jota.info/tributos/fazenda-torna-vinculantes-51-sumulas-do-carf-para-a-receita-federal", "fonte_id": "jota", "data_pub": "2026-07-03T10:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A fazenda tornou vinculantes 51 súmulas do Conselho Administrativo de Recursos Fiscais (Carf) para a Receita Federal. Isso significa que os entendimentos consolidados devem ser observados por toda a administração tributária federal.", "titulo_pt": "Fazenda torna vinculantes 51 súmulas do Carf para a Receita Federal", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 32823, "titulo": "“Higher for longer.” Quanto vale a Vale se o minério ficar onde está?", "url": "https://braziljournal.com/higher-for-longer-quanto-vale-a-vale-se-o-minerio-ficar-onde-esta/", "fonte_id": "brazil_journal", "data_pub": "2026-07-03T09:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os preços do minério de ferro não desabaram como se esperava, mantendo-se estáveis. Este mineral continua crucial para a produção de aço.", "titulo_pt": "Mais alto por mais tempo.", "veiculo": "Brazil Journal", "pais": "Brasil", "classe": "B"}, {"id": 33185, "titulo": "Japan’s 2026 wage talks result in third year of gains above 5%", "url": "https://www.japantimes.co.jp/business/2026/07/03/economy/rengo-wage-talks-gains/", "fonte_id": "japan_times", "data_pub": "2026-07-03T09:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os trabalhadores de 5.368 empresas associadas ao Rengo, o maior grupo sindical do país, conseguiram um aumento médio salarial de 5,01% em 2026.", "titulo_pt": "Negociações salariais de 2026 resultam em terceiro ano consecutivo de aumentos superiores a 5%", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 32692, "titulo": "Além de Trump, vice-presidente e primeira-dama dos EUA também aumentaram fortunas em 2025", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/alem-de-trump-vice-presidente-e-primeira-dama-dos-eua-tambem-aumentaram-fortunas-em-2025.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-03T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O vice-presidente e a primeira-dama dos Estados Unidos também aumentaram suas fortunas em 2025, conforme revelam as declarações financeiras publicadas recentemente. Além de Donald Trump, cujo império de criptomoedas e imóveis gerou lucros significativos, os rendimentos do vice-presidente e da primeira-dama também registraram crescimento.", "titulo_pt": "Além de Trump, vice-presidente e primeira-dama dos EUA aumentaram fortunas em 2025", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 32914, "titulo": "Reforma tributária e agronegócio: regulamentações e preocupações", "url": "https://www.jota.info/opiniao-e-analise/artigos/reforma-tributaria-e-agronegocio-regulamentacoes-e-preocupacoes", "fonte_id": "jota", "data_pub": "2026-07-03T08:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A reforma tributária e o agronegócio passam a se concentrar na estrutura do sistema fiscal, além da alíquota nominal. As preocupações centram-se na arquitetura desse novo sistema.", "titulo_pt": "Reforma tributária e agronegócio: regulamentações e preocupações", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 32772, "titulo": "Estados podem reduzir ICMS sobre equipamentos de data centers", "url": "https://exame.com/brasil/estados-podem-reduzir-icms-sobre-equipamentos-de-data-centers/", "fonte_id": "exame", "data_pub": "2026-07-03T08:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os estados podem reduzir a alíquota do ICMS sobre equipamentos de data centers para estimular investimentos no setor. A medida visa compensar o atraso na aprovação do programa federal de incentivos no Senado.", "titulo_pt": "Estados podem reduzir ICMS sobre equipamentos de data centers", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 32774, "titulo": "Governo apresenta plano aos EUA para negociar tarifas de 25%", "url": "https://exame.com/brasil/governo-apresenta-plano-aos-eua-para-negociar-tarifas-de-25/", "fonte_id": "exame", "data_pub": "2026-07-03T08:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo apresentou um plano aos EUA visando negociar as tarifas de 25% sobre produtos chineses. O documento aborda seis temas da investigação comercial americana e busca avançar nas negociações antes do prazo de 15 de julho.", "titulo_pt": "Governo apresenta plano aos EUA para negociar tarifas de 25%", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 32917, "titulo": "A governança dos minerais críticos e estratégicos", "url": "https://www.jota.info/opiniao-e-analise/artigos/a-governanca-dos-minerais-criticos-e-estrategicos", "fonte_id": "jota", "data_pub": "2026-07-03T08:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto discute a governança dos minerais críticos e estratégicos, enfatizando a importância da soberania com segurança jurídica.", "titulo_pt": "Governança de Minerais Críticos e Estratégicos com Soberania e Segurança Jurídica", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 32776, "titulo": "Operação da PF mira lavagem de dinheiro e bloqueia R$ 10,4 bilhões em bens", "url": "https://exame.com/brasil/operacao-da-pf-mira-lavagem-de-dinheiro-e-bloqueia-r-104-bilhoes-em-bens/", "fonte_id": "exame", "data_pub": "2026-07-03T07:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal investiga um esquema de lavagem de dinheiro relacionado ao tráfico internacional de drogas. A justiça bloqueou R$ 10,4 bilhões em bens e criptoativos.", "titulo_pt": "Operação da PF desarticula esquema de lavagem de dinheiro e bloqueia R$ 10,4 bilhões", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 33266, "titulo": "(2nd LD) Seoul stocks jump nearly 6 pct as bargain buying lifts chipmakers", "url": "https://en.yna.co.kr/view/AEN20260703007752320", "fonte_id": "yonhap_news", "data_pub": "2026-07-03T07:48:00Z", "idioma": "en", "provavel_duplicata_de": 33253, "texto_pt": "As ações sul-coreanas subiram cerca de 6% na sexta-feira, impulsionadas pelo aumento nas ações das empresas de semicondutores.", "titulo_pt": "Seoul: Bolsa sobe quase 6% com compras de barganha levantam fabricantes de chips", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 32777, "titulo": "Wall Street perde US$ 17,2 bi em semana marcada por preocupação com ações de IA", "url": "https://exame.com/invest/mercados/wall-street-perde-us-172-bi-em-semana-marcada-por-preocupacao-com-acoes-de-ia/", "fonte_id": "exame", "data_pub": "2026-07-03T07:37:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os fundos de ações dos Estados Unidos registraram o maior volume de resgates desde março, perdendo US$ 17,2 bilhões na semana. Essa perda foi motivada pela preocupação com as ações relacionadas à inteligência artificial.", "titulo_pt": "Wall Street perde R$ 17,2 bi em semana de preocupações com ações de IA", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 33296, "titulo": "China's polarizer makers seek price hikes as material bottlenecks bite", "url": "https://www.digitimes.com/news/a20260703VL211/polarizer-price-lcd-materials-production.html", "fonte_id": "digitimes", "data_pub": "2026-07-03T07:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Fornecedores de filme polarizador na China estão buscando aumentar os preços para fabricantes de painéis devido ao aumento dos custos de materiais e logísticos no segundo trimestre. Isso expõe uma fraqueza na cadeia de suprimentos de materiais de exibição da China.", "titulo_pt": "Fornecedores de polarizador chinês buscam aumentar preços diante de escassez de matérias-primas", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 33192, "titulo": "Iran war exposed, but hasn’t changed, Japan’s reliance on imported oil", "url": "https://www.japantimes.co.jp/news/2026/07/03/japan/society/solar-wind-iran/", "fonte_id": "japan_times", "data_pub": "2026-07-03T07:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Japão importava mais de 93% do seu petróleo através do Estreito de Ormuz no ano anterior, antes que ele ficasse efetivamente fechado. A dependência japonesa da importação de petróleo não mudou significativamente desde então.", "titulo_pt": "Guerra no Irã expôs, mas não alterou a dependência do Japão em relação aos importados de petróleo", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 33281, "titulo": "Best Bone Conduction Headphones (2026): Shokz, Suunto, Mojawa", "url": "https://www.wired.com/gallery/best-bone-conduction-headphones/", "fonte_id": "wired", "data_pub": "2026-07-03T11:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os auriculares de conduction óssea foram identificados como uma opção segura para ouvir música durante corridas ao ar livre. Eles são recomendados para quem precisa se manter conectado com o ambiente enquanto usa seus dispositivos auditivos.", "titulo_pt": "Melhores Auriculares de Condução Óssea (2026): Shokz, Suunto e Mojawa", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 33095, "titulo": "The Tech Download: Amazon’s devices chief Panos Panay on tech giant's AI gadget push", "url": "https://www.cnbc.com/2026/07/03/the-tech-download-amazon-devices-chief-panos-panay.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-03T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Panos Panay, chefe de dispositivos da Amazon, foi entrevistado pelo apresentador Arjun Kharpal no mais recente episódio do podcast The Tech Download.", "titulo_pt": "Tech Download: Panos Panay, chefe de dispositivos da Amazon, sobre a expansão da empresa em gadgets com IA", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 33208, "titulo": "‘Machine warfare is coming’: US, China urged to address military AI as global rules stall", "url": "https://www.scmp.com/news/china/diplomacy/article/3359277/machine-warfare-coming-us-china-urged-address-military-ai-global-rules-stall?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-03T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O diretor do Instituto das Nações Unidas para a Desarmamentologia (Unidir) advertiu que a comunidade internacional e o setor privado precisam focar em diálogos pragmáticos sobre inteligência artificial na guerra, já que uma convenção regulatória global é improvável no curto prazo. Ele afirmou que 'guerra de máquinas' está se aproximando.", "titulo_pt": "Guerra de máquinas: ONU e China são incentivadas a discutir IA militar diante da falta de regras globais", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 33282, "titulo": "All Your Favorite Gadgets Are Getting Way More Expensive … Again", "url": "https://www.wired.com/story/we-are-in-the-knockout-round-of-price-increases-for-consumer-electronics/", "fonte_id": "wired", "data_pub": "2026-07-03T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Devido à escassez de chips controlada por inteligência artificial, os preços dos telefones, computadores e consoles estão altos e continuam a subir.", "titulo_pt": "Todos Os Seus Gadgets Favoritos Estão Tornando-se Mais Caros Novamente", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 33283, "titulo": "7 Best Phones You Can’t Buy in the US (2026)", "url": "https://www.wired.com/gallery/best-phones-you-cant-buy-in-the-united-states/", "fonte_id": "wired", "data_pub": "2026-07-03T10:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A lista apresenta os 7 melhores smartphones que não são vendidos oficialmente nos Estados Unidos, mas estão disponíveis no mercado britânico e europeu. O artigo sugere evitar o 'medo de ficar sem' (FOMO) adquirindo um desses dispositivos.", "titulo_pt": "7 Melhores Telefones Que Você Não Pode Comprar Nos EUA", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 33284, "titulo": "The FDA Ruled That ZYN Pouches Are Safer Than Cigarettes. That Doesn’t Mean They’re Safe", "url": "https://www.wired.com/story/the-fda-ruled-that-zyn-pouches-are-safer-than-cigarettes-that-doesnt-mean-theyre-safe/", "fonte_id": "wired", "data_pub": "2026-07-03T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A FDA decidiu que os frascos ZYN de nicotina podem ser anunciados como uma opção menos prejudicial para fumantes adultos. No entanto, parar com todos os produtos de tabaco e nicotina continua sendo a melhor escolha.", "titulo_pt": "FDA Considera Pouches ZYN Menos Prejudiciais Que Cigarros, Mas Ainda Assim Não São Seguras", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 33240, "titulo": "S. Korea to establish low-Earth orbit communications network by 2035", "url": "https://www.koreaherald.com/article/10797876", "fonte_id": "korea_herald", "data_pub": "2026-07-03T10:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Korea AeroSpace Administration (KASA) planeja estabelecer uma rede de comunicações por satélite de baixa órbita composta por centenas de satélites até 2035 e acelerar o primeiro pouso lunar do país para 2030. Esses objetivos foram aprovados pelo Conselho Nacional Espacial, presidido pelo presidente Lee Jae Myung.", "titulo_pt": "Coreia do Sul planeja rede de satélites de baixa órbita e pouso lunar em 2030", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 33285, "titulo": "The Best Ultralight Backpacking Quilts (2026): Zenbivy, REI", "url": "https://www.wired.com/story/the-best-ultralight-backpacking-quilts/", "fonte_id": "wired", "data_pub": "2026-07-03T10:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os melhores cobertores ultraleves para acampamento deste verão podem ser encontrados nas opções da Zenbivy e REI. Eles recomendam que você considere usar um desses cobertores em vez de uma manta de dormir pesada.", "titulo_pt": "As Melhores Coberturas Ultraleves para Acampamento (2026): Zenbivy, REI", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 33214, "titulo": "China’s BYD surpasses Tesla to regain lead in global EV race", "url": "https://www.scmp.com/business/china-business/article/3359287/chinas-byd-surpasses-tesla-regain-lead-global-ev-race?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-03T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "BYD, fabricante chinesa de veículos elétricos, superou a Tesla para se tornar o maior produtor mundial de carros elétricos, apesar da queda de 8,2% nas entregas no ano. A vitória de BYD sobre a Tesla indica que as habilidades chinesas em veículos elétricos são cada vez mais reconhecidas globalmente, especialmente durante uma crise energética.", "titulo_pt": "BYD supera Tesla e se torna líder mundial em fabricação de carros elétricos", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 33242, "titulo": "KB Financial shortlists 6 candidates for chair post", "url": "https://www.koreaherald.com/article/10797866", "fonte_id": "korea_herald", "data_pub": "2026-07-03T09:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A KB Financial Group reduziu o número de candidatos para a próxima presidência do grupo para seis, incluindo a atual presidente Yang Jong-hee. Os outros quatro candidatos são Lee Jae-keun, Lee Chang-kwon e Lee Hwan-ju, todos funcionários internos do grupo.", "titulo_pt": "KB Financial Group reduz campo de candidatos para chefia", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 32822, "titulo": "Uma startup brasileira quer liderar a AI contra o câncer de pele. A Nvidia aposta nisso", "url": "https://braziljournal.com/uma-startup-brasileira-quer-liderar-a-ai-contra-o-cancer-de-pele-a-nvidia-aposta-nisso/", "fonte_id": "brazil_journal", "data_pub": "2026-07-03T09:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Willian Boelcke, que perdeu o pai para câncer de pele diagnosticado tardiamente, fundou a AI Pathology, uma startup que usa inteligência artificial para identificar lesões suspeitas de câncer de pele. A Nvidia apoia essa iniciativa.", "titulo_pt": "Uma startup brasileira quer liderar a IA contra o câncer de pele. A Nvidia aposta nisso", "veiculo": "Brazil Journal", "pais": "Brasil", "classe": "B"}, {"id": 33286, "titulo": "When the Law Kills Your Electric Car Dealership", "url": "https://www.wired.com/story/when-the-law-kills-your-polestar-electric-car-dealership/", "fonte_id": "wired", "data_pub": "2026-07-03T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dealers que investiram na Polestar não poderão vender seus veículos nos EUA a partir do próximo ano, após o governo federal negar uma autorização que permitiria à empresa evitar um banimento chinês de tecnologia.", "titulo_pt": "Quando a Lei Mata sua Concessionária de Carros Elétricos", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 33244, "titulo": "Lee pledges push to make South Korea a space power", "url": "https://www.koreaherald.com/article/10797830", "fonte_id": "korea_herald", "data_pub": "2026-07-03T09:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente Lee Jae Myung prometeu apoiar o desenvolvimento da indústria espacial e aeroespacial de South Korea como um pilar estratégico para a segurança nacional e crescimento futuro. Ele enfatizou que a competição tecnológica global está se expandindo rapidamente além da Terra.", "titulo_pt": "Lee promete avanço para tornar a Coreia do Sul uma potência espacial", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 33205, "titulo": "The UK’s generational tobacco ban might not work. I’m supporting it anyway.", "url": "https://www.technologyreview.com/2026/07/03/1140036/uk-tobacco-ban-might-not-work-children-smoking/", "fonte_id": "mit_tech_review", "data_pub": "2026-07-03T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O autor, pai de duas meninas, observa que a geração atual é mais consciente sobre o tabagismo, com as crianças se sentindo repelidas pela ideia de fumar. Isso contrasta com sua própria infância.", "titulo_pt": "A proibição generacional de tabaco no Reino Unido pode não funcionar. Eu apóio mesmo assim.", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 33288, "titulo": "Sony Erases Digital Content From Libraries, a Reminder That You Don’t Own What You Buy", "url": "https://www.wired.com/story/sony-erases-digital-content-from-libraries/", "fonte_id": "wired", "data_pub": "2026-07-03T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em setembro, alguns clientes PlayStation não poderão mais acessar alguns conteúdos de filmes e programas que compraram. Isso reforça o conceito de que as compras digitais são mais como aluguéis a longo prazo.", "titulo_pt": "Sony Exclui Conteúdo Digital das Bibliotecas, Recordando que Você Não Propriedade do Que Compra", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 33264, "titulo": "(LEAD) Lee pledges to establish 'aerospace industry belt' along southern coast", "url": "https://en.yna.co.kr/view/AEN20260703008451315", "fonte_id": "yonhap_news", "data_pub": "2026-07-03T08:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente Lee Jae Myung prometeu criar uma 'indústria aeroespacial' ao longo da costa sul do país. Este anúncio foi feito em Seul no dia 3 de julho.", "titulo_pt": "Lee promete estabelecer 'indústria aeroespacial' na costa sul", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 33320, "titulo": "Rescue mission launches to save NASA telescope that's falling back to Earth", "url": "https://phys.org/news/2026-07-mission-nasa-telescope-falling-earth.html", "fonte_id": "phys_org", "data_pub": "2026-07-03T11:43:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um foguete com três braços foi lançado em órbita para resgatar um telescópio espacial da NASA que corre o risco de cair na Terra.", "titulo_pt": "Missão de resgate lança foguete para salvar telescópio espacial da NASA que pode cair na Terra", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 33321, "titulo": "Mapping men's violence programs reveals major Indo-Pacific research gaps", "url": "https://phys.org/news/2026-07-men-violence-reveals-major-indo.html", "fonte_id": "phys_org", "data_pub": "2026-07-03T11:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A taxa de violência doméstica e familiar no Indo-Pacífico é uma das maiores do mundo, mas há uma falta de foco, tanto na pesquisa quanto na política, sobre o assunto na região. Em análise pioneira, pesquisadores da Universidade de Griffith realizaram uma revisão panorâmica dos programas de intervenção para perseguidores masculinos de violência doméstica e familiar no Indo-Pacífico.", "titulo_pt": "Mapeamento de programas contra violência masculina revela lacunas importantes no Indo-Pacífico", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 33322, "titulo": "Ph.D. project gives critical insights into vulnerable green turtles", "url": "https://phys.org/news/2026-07-phd-critical-insights-vulnerable-green.html", "fonte_id": "phys_org", "data_pub": "2026-07-03T11:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa sobre os hábitos alimentares de tartarugas verdes no Território do Norte utilizou uma técnica inovadora de levantamento que pode se tornar um importante instrumento para monitorar habitats marinhos em áreas remotas e desafiadoras.", "titulo_pt": "Projeto de doutorado oferece insights críticos sobre hábitos alimentares de tartarugas verdes", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 33323, "titulo": "Congo River freshwater rides 49-day Atlantic eddy to travel 200 kilometers offshore", "url": "https://phys.org/news/2026-07-congo-river-freshwater-day-atlantic.html", "fonte_id": "phys_org", "data_pub": "2026-07-03T11:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Corrente do Congo é a segunda maior do mundo, liberando uma média de 40.000 metros cúbicos de água por segundo no Oceano Atlântico. Esta enorme taxa de descarga cria um grande plúmbeo de água doce que se espalha 800 quilômetros para além da costa.", "titulo_pt": "Corrente do Congo leva água doce 49 dias até viajar 200 km offshore", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 32842, "titulo": "Terremotos na Venezuela: isso pode acontecer no Brasil? Descubra no Olhar Espacial", "url": "https://olhardigital.com.br/2026/07/03/ciencia-e-espaco/terremotos-na-venezuela-isso-pode-acontecer-no-brasil-descubra-no-olhar-espacial/", "fonte_id": "olhar_digital", "data_pub": "2026-07-03T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Rede Sismológica Brasileira registrou tremores no país durante os terremotos na Venezuela. Não há informações sobre a possibilidade de ocorrerem terremotos semelhantes no Brasil.", "titulo_pt": "Terremotos na Venezuela: esses movimentos podem ser sentidos no Brasil?", "veiculo": "Olhar Digital", "pais": "Brasil", "classe": "C"}, {"id": 33324, "titulo": "Complex food webs sustain ecosystem functioning", "url": "https://phys.org/news/2026-07-complex-food-webs-sustain-ecosystem.html", "fonte_id": "phys_org", "data_pub": "2026-07-03T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ecosistemas saudáveis dependem não apenas de uma grande diversidade de espécies, mas também das complexas relações entre plantas, presas e predadores, conforme mostrou um novo estudo internacional liderado pela Universidade de Waikato e pelo German Center for Integrative Biodiversity Research (iDiv), publicado na revista Nature. Ecosistemas com maior diversidade de espécies, especialmente de predadores, funcionam mais eficientemente, ajudando a manter processos naturais que os humanos dependem, como controle de pragas, regulação do clima e estabilidade dos ecossistemas.", "titulo_pt": "Ecosistemas saudáveis dependem de relações complexas entre espécies", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 33329, "titulo": "Archaeologists uncover new history from the Battle of Bunker Hill, the first major battle of the American Revolution", "url": "https://www.scientificamerican.com/article/archaeologists-uncover-new-history-from-the-battle-of-bunker-hill-the-first-major-battle-of-the-american-revolution/", "fonte_id": "scientific_american", "data_pub": "2026-07-03T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Arqueólogos descobriram diversos itens, como balas de mosquete e pentes para cachos de cabelo, no local da Batalha de Bunker Hill, a primeira grande confronto da Revolução Americana.", "titulo_pt": "Arqueólogos revelam nova história da Batalha de Bunker Hill", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 33330, "titulo": "What will happen to the moon in the far future?", "url": "https://www.scientificamerican.com/article/what-will-happen-to-the-moon-in-the-far-future/", "fonte_id": "scientific_american", "data_pub": "2026-07-03T10:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A lua é companheira constante da Terra. No entanto, isso pode não ser verdade para sempre.", "titulo_pt": "O que acontecerá com a Lua no futuro distante?", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 32738, "titulo": "Injeção semestral baixa o colesterol sem aumentar o risco de efeitos colaterais como dores musculares", "url": "https://veja.abril.com.br/saude/injecao-semestral-baixa-o-colesterol-sem-aumentar-o-risco-de-efeitos-colaterais-como-dores-musculares/", "fonte_id": "veja", "data_pub": "2026-07-03T10:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A medicação é uma terapia genética já disponível no Brasil que reduz o colesterol sem aumentar o risco de efeitos colaterais como dores musculares. Ela representa uma estratégia para pessoas com intolerância às estatinas tradicionais.", "titulo_pt": "Injeção semestral reduz colesterol sem causar efeitos colaterais", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 33331, "titulo": "The biological dogma that women don’t make new eggs after birth may be wrong", "url": "https://www.scientificamerican.com/article/the-biological-dogma-that-women-dont-make-new-eggs-after-birth-may-be-wrong/", "fonte_id": "scientific_american", "data_pub": "2026-07-03T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisas recentes estão questionando a crença de que mulheres nascem com todos os óvulos que terão ao longo da vida. Até agora, era considerado que as fêmeas humanas e animais nascem com um número fixo de óvulos, que se esgotam durante a idade adulta.", "titulo_pt": "A dogmática ideia de que mulheres não fazem novos óvulos após o nascimento pode estar errada", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 33332, "titulo": "The Lincoln Memorial Reflecting Pool’s algae problem has better solutions than hydrogen peroxide, experts say", "url": "https://www.scientificamerican.com/article/the-lincoln-memorial-reflecting-pools-algae-problem-has-better-solutions-than-hydrogen-peroxide-experts-say/", "fonte_id": "scientific_american", "data_pub": "2026-07-03T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um ecologista de água doce afirma que existem soluções mais seguras e eficazes do que o uso de peróxido de hidrogênio para controlar algas em piscinas comunitárias ou outras características d'água.", "titulo_pt": "Problema de algas no Pool Lincoln Memorial tem soluções melhores que o peróxido de hidrogênio, diz especialista", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 33347, "titulo": "America at 500: Where will we be in space in 2276?", "url": "https://www.space.com/space-exploration/america-at-500-where-will-we-be-in-space-in-2276", "fonte_id": "space_com", "data_pub": "2026-07-03T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 500 anos, a humanidade ainda não havia realizado voo com balão. O artigo questiona onde poderíamos estar espacialmente em 2276 se os Estados Unidos sobreviverem por mais esse tempo.", "titulo_pt": "América aos 500: Onde estaremos no espaço em 2276?", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 33315, "titulo": "Scientists make quantum time flow backward in stunning physics breakthrough", "url": "https://www.sciencedaily.com/releases/2026/06/260625014802.htm", "fonte_id": "science_daily", "data_pub": "2026-07-03T09:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas desenvolveram técnicas de controle quântico que podem fazer um sistema parecer funcionar no sentido contrário do tempo. Essas técnicas permitem reconfigurar a seta do tempo do sistema e até mesmo gerar energia durante o processo de medição.", "titulo_pt": "Cientistas fazem o tempo quântico fluir para trás em avanço físico impressionante", "veiculo": "Science Daily", "pais": "EUA", "classe": "C"}, {"id": 32684, "titulo": "Processo geológico levou polo Sul a congelar antes do Norte", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/processo-geologico-levou-polo-sul-a-congelar-antes-do-norte.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-03T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um processo geológico explicou por que a Antártida congelou há cerca de 34 milhões de anos, enquanto o Ártico só congelou aproximadamente 25 milhões de anos depois. Essa descoberta foi publicada na revista Science.", "titulo_pt": "Processo geológico explica congelamento da Antártida antes do Ártico", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 33325, "titulo": "Modest meat and dairy cuts could help Scotland lower emissions and keep diets affordable", "url": "https://phys.org/news/2026-07-modest-meat-dairy-scotland-emissions.html", "fonte_id": "phys_org", "data_pub": "2026-07-03T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa mostrou que reduzir ligeiramente o consumo de carne e leite substituindo-os por vegetais, feijões e ovos pode auxiliar Escócia a atingir seus objetivos climáticos sem aumentar os custos dos alimentos. Essas mudanças também podem melhorar a saúde e nutrição das pessoas.", "titulo_pt": "Pequenas alterações no consumo de carne e leite podem ajudar a Escócia a cumprir metas climáticas e
