 partículas: a hadronização. Este projeto, embora baseado em um modelo simplificado de mecânica quântica, estabelece como os físicos podem aproveitar o poder das computações quânticas para realizar cálculos científicos grandes que ultrapassam as capacidades dos supercomputadores clássicos.", "titulo_pt": "Computador quântico simula hadronização com 104 qubits", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28853, "titulo": "TechnoMile Recognized among Notable Vendors in Contract Lifecycle Management Platforms Landscape Report", "url": "https://spacenews.com/technomile-recognized-among-notable-vendors-in-contract-lifecycle-management-platforms-landscape-report/", "fonte_id": "spacenews", "data_pub": "2026-06-30T22:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "TechnoMile, uma solução de IA líder que une fluxos de trabalho de crescimento, contratos, conformidade e segurança, foi incluída no relatório The Contract Lifecycle Management Platforms Landscape da Forrester, publicado em Q2 de 2026.", "titulo_pt": "TechnoMile Reconhecido entre Vendedores Notáveis em Relatório sobre Plataformas de Gerenciamento do Ciclo de Vida de Contratos", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 28820, "titulo": "3,000-year-old Irish Bronze Age site may be one of Europe's earliest 'town-like' settlements", "url": "https://phys.org/news/2026-06-year-irish-bronze-age-site.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T22:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um importante centro pré-histórico na Irlanda foi identificado como um dos primeiros grandes assentamentos organizados a se desenvolver na Europa Ocidental há mais de 3.000 anos, segundo uma nova pesquisa. O estudo, publicado recentemente na revista Antiquity, aponta para Haughey's Fort, próximo a Armagh no norte da Irlanda, como o ponto central de um vasto e cuidadosamente planejado território onde moradia, produção artesanal e rituais foram combinados em uma escala sem precedentes por volta de 1200 a.C.", "titulo_pt": "Sítio irlandês do Bronze Idade pode ser um dos primeiros assentamentos 'cidades' da Europa", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28821, "titulo": "Earth microbes can survive individual martian hazards—and evade astronaut immune systems", "url": "https://phys.org/news/2026-06-earth-microbes-survive-individual-martian.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T22:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo trabalho de tese de doutorado de Tommaso Zaccaria, da Radboud University, demonstra que microrganismos terrestres são bem adaptados a sobreviver em ambientes hostis. A pesquisa também sugere que esses microrganismos podem escapar do sistema imunológico dos astronautas.", "titulo_pt": "Microrganismos terrestres podem sobreviver aos desafios martianos e enganar o sistema imunológico dos astronautas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28385, "titulo": "Cannabis ganha espaço no tratamento da insônia", "url": "https://veja.abril.com.br/coluna/cannabis-e-cia/cannabis-ganha-espaco-no-tratamento-da-insonia/", "fonte_id": "veja", "data_pub": "2026-06-30T22:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Estudos indicam que a cannabis medicinal pode ser uma alternativa eficaz e segura para tratar casos crônicos de insônia.", "titulo_pt": "Cannabis ganha espaço no tratamento da insônia", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 28781, "titulo": "UK patient tested for possible Ebola as cases rise in Africa", "url": "https://www.scmp.com/news/world/europe/article/3358955/uk-patient-tested-possible-ebola-cases-rise-africa?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T22:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um paciente foi testado para Ebola em um hospital na Escócia, enquanto a África Central enfrenta uma explosão letal do vírus. A Public Health Scotland informou que não há casos confirmados no país e o risco à população é baixo.", "titulo_pt": "Reino Unido realiza teste de possível Ebola com aumento de casos na África", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 28822, "titulo": "Tens of millions swelter as heat wave blasts US", "url": "https://phys.org/news/2026-06-tens-millions-swelter-blasts.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T22:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Millhões de americanos estiveram sob temperaturas elevadíssimas, com cidades central e orientais preparando-se para uma onda de calor que durará pelo menos até o feriado do Dia do Trabalho em 4 de julho.", "titulo_pt": "Dezenas de milhões suportam onda de calor no Estados Unidos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28823, "titulo": "Black locust deploys peptides to steer root bacteria into nitrogen fixation", "url": "https://phys.org/news/2026-06-black-locust-deploys-peptides-root.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T22:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A carvalho-preto (Robinia pseudoacacia) usa uma família de pequenas proteínas para reprogramar específicamente suas bactérias simbióticas, permitindo a fixação de nitrogênio sem prejudicá-las. Esta descoberta ilumina um novo mecanismo de regulação da simbiose por parte das plantas perenes.", "titulo_pt": "Carvalho-preto emprega peptídeos para reprogramar bactérias simbióticas na fixação de nitrogênio", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 28824, "titulo": "Jellyfish reveal rapid repair system behind scar-free healing", "url": "https://phys.org/news/2026-06-jellyfish-reveal-rapid-scar-free.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T21:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A décadas atrás, Jocelyn Malamy, professora associada de genética molecular e células biológicas na Universidade de Chicago, observou células de medusas-jelatinosas se movendo para fechar uma ferida pela primeira vez. Essa pesquisa ocorreu no Laboratório Biológico Marinho.", "titulo_pt": "Medusas revelam sistema rápido de reparo por cicatrização sem marca", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 26814, "titulo": "Falling under the map: Sasha Yazov’s airbrush art of The Sims turns pixels to paint", "url": "https://www.itsnicethat.com/articles/sasha-yazov-art-project-300626", "fonte_id": "its_nice_that", "data_pub": "2026-07-02T08:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As obras de arte digitais criadas pela artista Sasha Yazov retratam os aspectos visuais dos jogos de vídeo da década de 2000 com precisão de captura de tela, mas com pequenas diferenças que não refletem a memória do público.", "titulo_pt": "Caído sob o mapa: arte em spray digital de Sasha Yazov transforma pixels em pinturas de The Sims", "veiculo": "It's Nice That", "pais": "Reino Unido", "classe": "B"}, {"id": 28565, "titulo": "Abre solo los sábados, le compran chefs premiados y rescató el sabor perdido en la carne que comía su abuelo en España", "url": "https://www.lanacion.com.ar/que-sale/abre-solo-los-sabados-le-compran-chefs-premiados-y-encontro-el-sabor-perdido-en-la-carne-que-comia-nid30062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-01T10:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O estabelecimento Estancia Jesús María, sob a gestão de alguém que cresceu entre reses, cuchillos e mostradores, utiliza carne de vaca madura e busca promover a cultura carnicera tanto para restaurantes quanto para consumidores. O local abre apenas aos sábados e atrai clientes por oferecer pratos preparados por chefs premiados.", "titulo_pt": "Abre somente aos sábados, compra chefs premiados e resgata o sabor da carne que seu avô comia na Espanha", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 28398, "titulo": "Cine Brasília pode suspender atividades após atraso em repasse do GDF", "url": "https://www.metropoles.com/entretenimento/cultura/cine-brasilia-pode-suspender-atividades-apos-atraso-em-repasse-do-gdf", "fonte_id": "metropoles", "data_pub": "2026-06-30T22:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A administração do Cine Brasília está reclamando de atrasos no repasse de verba da Secretaria de Cultura do Distrito Federal e considera a possibilidade de suspender as atividades.", "titulo_pt": "Cine Brasília pode paralisar operações por atraso na liberação de recursos", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 28311, "titulo": "Neon deve lançar filme de Luca Guadagnino sobre IA rejeitado pela Amazon", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/neon-deve-lancar-filme-de-luca-guadagnino-sobre-ia-rejeitado-pela-amazon.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-30T22:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O filme 'Artificial', dirigido por Luca Guadagnino e baseado na empresa de inteligência artificial OpenAI, está sendo negociado para distribuição pelo estúdio Neon, conforme informou a revista The Hollywood Reporter.", "titulo_pt": "Neon deve lançar filme sobre IA de Luca Guadagnino", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 28391, "titulo": "Os dez melhores discos de 2026 até agora, de Olivia Rodrigo a Paul McCartney", "url": "https://veja.abril.com.br/cultura/os-dez-melhores-discos-de-2026-ate-agora-de-olivia-rodrigo-a-paul-mccartney/", "fonte_id": "veja", "data_pub": "2026-06-30T21:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A lista inclui grandes nomes internacionais e trabalhos brasileiros excelentes, como Lô Borges e o trio Dominguinho.", "titulo_pt": "Os dez melhores discos de 2026 até agora, de Olivia Rodrigo a Paul McCartney", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 28859, "titulo": "World Monuments Fund Adds Black Mountain College Building to U.S. Preservation Watch List", "url": "https://www.artnews.com/art-news/news/world-monuments-fund-adds-black-mountain-college-building-to-u-s-preservation-watch-list-1234790886/", "fonte_id": "artnews", "data_pub": "2026-06-30T21:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Fundo Mundial para Monumentos adicionou o prédio da Black Mountain College à lista de preservação dos Estados Unidos. Dez locais históricos, incluindo a famosa Black Mountain College, foram considerados 'irreplaceáveis' para a história americana.", "titulo_pt": "Fundo Mundial para Monumentos Adiciona Colégio Montanha Negra ao Monitoramento de Preservação dos EUA", "veiculo": "ARTnews", "pais": "EUA", "classe": "B"}, {"id": 28805, "titulo": "Uzbek participants take top prizes at regional Korean language contest", "url": "https://www.koreaherald.com/article/10793490", "fonte_id": "korea_herald", "data_pub": "2026-06-30T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Participantes do Uzbekistão venceram todos os prêmios principais no concurso internacional de língua coreana para Ásia Central e Rússia. O evento, realizado em Tashkent, teve como anfitrião o Centro Coreano de Educação em Almaty.", "titulo_pt": "Participantes do Uzbekistão levantam troféus no concurso internacional de língua coreana para Ásia Central e Rússia", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 28312, "titulo": "'O Verão de 1936' e 'X-Men 97': o que assistir na TV e no streaming na quarta-feira", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/o-verao-de-1936-e-x-men-97-o-que-assistir-na-tv-e-no-streaming-na-quarta-feira.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-30T20:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em 'O Verão de 1936', quatro mulheres de origens diferentes se envolvem na investigação após um promotor ser assassinado em um hotel, enquanto milhares de trabalhadores chegam à Riviera Francesa para aproveitar as férias remuneradas pela primeira vez no país. O cenário social e cultural da época expõe tensões entre a elite local e os trabalhadores.", "titulo_pt": "O Verão de 1936", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 28806, "titulo": "[Kim Seong-kon] When education and politics fail us", "url": "https://www.koreaherald.com/article/10793460", "fonte_id": "korea_herald", "data_pub": "2026-06-30T20:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A educação e a política estão fortemente interligadas, pois o fracasso na educação leva ao fracasso na política. Embora muitas pessoas estejam desiludidas com seus sistemas educacionais e climas políticos, nenhuma dessas situações parece mudar.", "titulo_pt": "Quando a educação e a política nos decepcionam", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 28807, "titulo": "[LZ Granderson] How fearmongering sets policy", "url": "https://www.koreaherald.com/article/10793459", "fonte_id": "korea_herald", "data_pub": "2026-06-30T20:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "No esforço para construir ou impedir a construção de centrais de dados pelo país, é importante lembrar que o governo dos Estados Unidos está investindo mais em inteligência artificial do que qualquer outro. De acordo com o Brookings Institute, o número de contratos de IA no governo federal aumentou significativamente, passando de 472 em 2022 para mais de 1.700 em 2026.", "titulo_pt": "Como a disseminação de medo define a política", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 28313, "titulo": "As duas faces do bolsonarismo", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/colunas/wilson-gomes/2026/06/as-duas-faces-do-bolsonarismo.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-30T20:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Há alguns anos, o debate público se concentrava na 'normalização' do bolsonarismo, uma expressão usada para criticar diferentes aspectos da extrema direita sem explicar adequadamente o que estava sendo normalizado, por quem e com quais consequências.", "titulo_pt": "As duas faces do bolsonarismo", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 28314, "titulo": "Não é fácil agradar a gregos e troianos", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/colunas/mauriciostycer/2026/06/nao-e-facil-agradar-a-gregos-e-troianos.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-30T20:13:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A minissérie 'Justiça', exibida pela Globo com sucesso em 2016, retornou para uma segunda temporada em 2024, após um intervalo de oito anos. Esse longo período entre as temporadas indica que a emissora enfrentou alguma dificuldade ou dúvida durante o processo decisório.", "titulo_pt": "Não é fácil agradar gregos e troianos", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 28867, "titulo": "Lucio Castro on the Time-Bending Queer Desire of ‘Drunken Noodles’ — and the Personal Tragedy That Inspired His Next Movie", "url": "https://www.indiewire.com/features/interviews/drunken-noodles-director-lucio-castro-interview-1235202472/", "fonte_id": "indiewire", "data_pub": "2026-06-30T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Lucio Castro, um cineasta argentino que vive em Brooklyn, fala com a IndieWire sobre seu novo filme erótico que é uma continuação do favorito gay 'Fim do Século'.", "titulo_pt": "Lucio Castro sobre o desejo queer e temporal de 'Drunken Noodles' — e a tristeza pessoal que inspirou seu próximo filme", "veiculo": "IndieWire (cinema)", "pais": "EUA", "classe": "B"}, {"id": 28860, "titulo": "5 Books to Keep Your Brain From Melting in July", "url": "https://www.artnews.com/list/art-in-america/columns/art-book-recommendations-july-1234790821/", "fonte_id": "artnews", "data_pub": "2026-06-30T19:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo destaca cinco livros recomendados para manter a mente ocupada durante o mês de julho. Os autores mencionados são Yvonne Rainer, Eyal Weizman e Huey Copeland.", "titulo_pt": "5 Livros para Manter Sua Mente Ativa em Julho", "veiculo": "ARTnews", "pais": "EUA", "classe": "B"}, {"id": 28869, "titulo": "Human DNA in Cave Paintings Can Survive For Millennia, Study Finds", "url": "https://hyperallergic.com/human-dna-in-cave-paintings-can-survive-for-millennia-study-finds/", "fonte_id": "hyperallergic", "data_pub": "2026-06-30T19:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo mostrou que DNA humano pode sobreviver milênios em pinturas rupestres, o que sugere possibilidades futuras para a arqueogenética na recuperação das identidades de artistas antigos.", "titulo_pt": "DNA Humano nas Pinturas Rupestres Pode Sobreviver por Milênios, Descobrimento Revela", "veiculo": "Hyperallergic (arte)", "pais": "EUA", "classe": "B"}, {"id": 28861, "titulo": "Rune Mields, Self-Taught German Conceptual Artist, Dies at 91", "url": "https://www.artnews.com/art-news/news/rune-mields-conceptual-artist-dead-1234790852/", "fonte_id": "artnews", "data_pub": "2026-06-30T19:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Rune Mields, um artista conceitual autodidata alemão, faleceu aos 91 anos. Ela disse em 2025 que para compreender a vida é necessário entender matemática.", "titulo_pt": "Rune Mields, Artista Conceitual Autodidata Alemão, Morre aos 91", "veiculo": "ARTnews", "pais": "EUA", "classe": "B"}], "cultura__eventos": [], "sociedade": [{"id": 28410, "titulo": "Vizinho é condenado a pagar R$ 19 mil após barulho incomodar criança autista", "url": "https://www.metropoles.com/distrito-federal/vizinho-e-condenado-a-pagar-r-19-mil-apos-barulho-incomodar-crianca-autista", "fonte_id": "metropoles", "data_pub": "2026-06-30T22:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um vizinho foi condenado a pagar R$ 19 mil após o barulho dele incomodar uma criança autista. A sentença incluiu indenização de R$ 7 mil para o filho com autismo, R$ 7 mil para a mãe e R$ 5 mil para o pai.", "titulo_pt": "Vizinho é condenado a pagar R$ 19 mil após barulho incomodar criança autista", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 28411, "titulo": "Assaltantes \"bem vestidos\" assustam moradores de condomínios em BH", "url": "https://www.metropoles.com/minas-gerais/assaltantes-bem-vestidos-assustam-moradores-de-condominios-de-bh", "fonte_id": "metropoles", "data_pub": "2026-06-30T22:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um grupo suspeito de assaltantes, descrito como 'bem vestidos', teria tentado invadir condomínios em Belo Horizonte. Especialistas recomendam que protocolos de segurança devem ser aplicados uniformemente.", "titulo_pt": "Assaltantes 'bem vestidos' assustam moradores de condomínios em BH", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 28414, "titulo": "Comemoração por Brasil x Japão termina com tiros e prisão", "url": "https://www.metropoles.com/sao-paulo/comemoracao-por-brasil-x-japao-termina-com-tiros-e-prisao", "fonte_id": "metropoles", "data_pub": "2026-06-30T22:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Imagens obtidas pela reportagem mostram um homem sacando uma arma e disparando cinco vezes para cima durante a comemoração do jogo Brasil x Japão, no interior de São Paulo. A ocorrência resultou em prisão.", "titulo_pt": "Comemoração por Brasil x Japão termina com tiros e prisão", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 28388, "titulo": "A curiosidade virou método", "url": "https://veja.abril.com.br/coluna/historias-de-sucesso/a-curiosidade-virou-metodo/", "fonte_id": "veja", "data_pub": "2026-06-30T22:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Alberto Luiz Goulart Gonçalves, diretor global de vendas de perfumes da BVLGARI, construiu sua carreira baseada na escuta, adaptação e reinvenção.", "titulo_pt": "A curiosidade virou método", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 28425, "titulo": "ONU adquire 10 mil sacos para cadáveres para Venezuela após terremotos", "url": "https://www.cnnbrasil.com.br/internacional/onu-adquire-10-mil-sacos-para-cadaveres-para-venezuela-apos-terremotos/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T22:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ONU comprou 10 mil sacos para cadáveres para a Venezuela após terremotos. Autoridades locais temem que o número de mortos possa aumentar consideravelmente.", "titulo_pt": "ONU adquire 10 mil sacos para cadáveres para Venezuela após terremotos", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 28608, "titulo": "Fijan más de 15 años de cárcel para integrantes de banda que mató a pasajero de bus RED en Estación Central", "url": "https://www.latercera.com/nacional/noticia/fijan-mas-de-15-anos-de-carcel-para-integrantes-de-banda-que-mato-a-pasajero-de-bus-red-en-estacion-central/", "fonte_id": "la_tercera", "data_pub": "2026-06-30T22:03:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Em agosto de 2023, integrantes de uma banda foram condenados a mais de 15 anos de prisão por matar um homem de 57 anos que tentou ajudar um jovem vítima de roubo no Terminal Central de ônibus em Santiago.", "titulo_pt": "Mais de 15 anos de prisão para membros da banda que assassinaram passageiro de ônibus em Estação Central", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 28440, "titulo": "Mais de 66% dos presídios no Brasil estão com superlotação, segundo CNJ", "url": "https://www.cnnbrasil.com.br/nacional/brasil/mais-de-66-dos-presidios-no-brasil-estao-com-superlotacao-segundo-cnj/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T21:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O relatório do Conselho Nacional de Justiça revela que mais de 66% dos presídios no Brasil estão com superlotação. O documento indica um cenário de precarização estrutural no sistema prisional brasileiro.", "titulo_pt": "Mais de 66% dos presídios no Brasil estão com superlotação, segundo CNJ", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 28394, "titulo": "O desafio de bombeiros brasileiros que atuam nos resgates na Venezuela", "url": "https://veja.abril.com.br/mundo/o-desafio-de-bombeiros-brasileiros-que-atuam-nos-resgates-na-venezuela/", "fonte_id": "veja", "data_pub": "2026-06-30T21:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Bombeiros brasileiros participam de resgates na Venezuela, com foco nas áreas mais fáceis de acesso. Equipes internacionais chegaram posteriormente a estas operações.", "titulo_pt": "Desafio de bombeiros brasileiros em resgates na Venezuela", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 28397, "titulo": "Presos do 8 de Janeiro cumprem penas a até 3.000 quilômetros de distância das famílias", "url": "https://veja.abril.com.br/brasil/presos-do-8-de-janeiro-cumprem-penas-a-ate-3-000-quilometros-de-distancia-das-familias/", "fonte_id": "veja", "data_pub": "2026-06-30T20:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Comissão de Direitos Humanos do Senado registrou pedidos de transferência de presos envolvidos no 8 de Janeiro para penitenciárias de outros estados. Esses presos estão a até 3.000 quilômetr "texto_pt": "Os deputados do Rio de Janeiro aprovaram um projeto que permitiria o uso de armas de eletrochoque para mulheres. O projeto ainda precisa ser aprovado pelo governador em exercício, Ricardo Couto.", "titulo_pt": "Deputados do Rio aprovariam uso de arma de eletrochoque para mulheres", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27630, "titulo": "‘Não podemos ficar marcadas pelo ódio’, diz Maria do Rosário sobre PL da Misoginia", "url": "https://veja.abril.com.br/brasil/nao-podemos-ficar-marcadas-pelo-odio-diz-maria-do-rosario-sobre-pl-da-misoginia/", "fonte_id": "veja", "data_pub": "2026-06-30T18:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A deputada Maria do Rosário afirmou que não se deve ficar marcadas pelo ódio em relação aos ataques do presidente Jair Bolsonaro. Ela defendeu a proposta do PL da Misoginia, que visa evitar novas formas de violência contra mulheres.", "titulo_pt": "‘Não podemos ficar marcadas pelo ódio’, diz Maria do Rosário sobre PL da Misoginia", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27772, "titulo": "Del sueño petrolero a la tragedia del terremoto: la historia de los miles de chilenos que decidieron migrar a Venezuela", "url": "https://www.latercera.com/nacional/noticia/del-sueno-petrolero-a-la-tragedia-del-terremoto-la-historia-de-los-miles-de-chilenos-que-decidieron-migrar-a-venezuela/", "fonte_id": "la_tercera", "data_pub": "2026-06-30T17:28:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Durante a primeira década da ditadura chilena, coincidiu com um período próspero na Venezuela que levou mais de 25 mil chilenos a migrarem para o país caribenho. No entanto, essa população diminuiu gradualmente ao longo do tempo.", "titulo_pt": "Do sonho petroleiro à tragédia do terremoto: a história dos milhares de chilenos que migraram para a Venezuela", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 27417, "titulo": "Brasil ganha 9.215 novos milionários no último ano, mas desigualdade permanece alta", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/brasil-ganha-9215-novos-milionarios-no-ultimo-ano-mas-desigualdade-permanece-alta.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T16:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil ganhou 9.215 novos milionários em 2025, aumentando para cerca de 386 mil pessoas com patrimônio superior a R$ 5,1 milhões. O Global Wealth Report 2026, divulgado pelo UBS, registrou esse crescimento, que representa um aumento de 2,4% em relação ao ano anterior.", "titulo_pt": "Brasil ganha 9.215 novos milionários no último ano, mas desigualdade permanece alta", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 28599, "titulo": "Familia de niño que perdió la vida en encerrona en San Bernardo se reúne con general director de Carabineros", "url": "https://www.latercera.com/nacional/noticia/familia-de-nino-que-perdio-la-vida-en-encerrona-en-san-bernardo-se-reune-con-general-director-de-carabineros/", "fonte_id": "la_tercera", "data_pub": "2026-06-30T16:39:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A família do menino falecido na encerrona em San Bernardo se reuniu com o general diretor da Carabineros. Força policial foi destacada pela detenção dos responsáveis pelo ocorrido.", "titulo_pt": "Família de criança morta em encerrona em San Bernardo se encontra com chefe da Carabineros", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 28066, "titulo": "Up to five storms or typhoons expected by year-end", "url": "https://www.taipeitimes.com/News/front/archives/2026/07/01/2003860030", "fonte_id": "taipei_times", "data_pub": "2026-07-01T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Até cinco furacões ou tempestades estão previstas para ocorrer até o fim do ano.", "titulo_pt": "Cinco a sete furacões ou tempestades esperados até o fim do ano", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 28405, "titulo": "Três terremotos atingem a costa oeste do México em menos de 1h30", "url": "https://www.metropoles.com/mundo/tres-terremotos-atingem-a-costa-oeste-do-mexico-em-menos-de-1h30", "fonte_id": "metropoles", "data_pub": "2026-06-30T22:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em menos de 1 hora e 30 minutos, a costa oeste do México foi atingida por três terremotos, com a magnitude chegando a 6,0. Não há relatos de vítimas nem de alerta de tsunami.", "titulo_pt": "Três terremotos atingem a costa oeste do México em menos de 1h30", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 28387, "titulo": "Sarampo: mais dois casos são confirmados em São Paulo e vacinação é intensificada", "url": "https://veja.abril.com.br/saude/sarampo-mais-dois-casos-sao-confirmados-em-sao-paulo-e-vacinacao-e-intensificada/", "fonte_id": "veja", "data_pub": "2026-06-30T22:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Neste ano, São Paulo já registrou sete casos de sarampo. A vacinação está sendo intensificada na capital paulista e Guarulhos.", "titulo_pt": "Sarampo: dois novos casos confirmados em SP e vacinação intensificada", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 28426, "titulo": "Oito em cada 10 edifícios colapsados na Venezuela estavam em La Guaira", "url": "https://www.cnnbrasil.com.br/internacional/oito-em-cada-10-edificios-colapsados-na-venezuela-estavam-em-la-guaira/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T22:04:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Oito em cada dez edifícios colapsados na Venezuela estão localizados em La Guaira, de acordo com o presidente da Assembleia Nacional. No entanto, uma agência espacial aponta para cerca de 60 mil estruturas afetadas no país.", "titulo_pt": "Oito em cada dez edifícios colapsados na Venezuela estavam em La Guaira", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 27838, "titulo": "Doomsday Climate Scenarios Were Wrong. That Doesn’t Help Europe.", "url": "https://foreignpolicy.com/2026/06/30/science-climate-europe-global-warming-heat-wave/", "fonte_id": "foreign_policy", "data_pub": "2026-06-30T19:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Estudos científicos recentes reforçam a necessidade de ação rápida contra o clima, ao invés de diminuí-la.", "titulo_pt": "Cenários Apocalípticos Climáticos Estavam Errados. Isso Não Ajuda Europa.", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 27622, "titulo": "Por que o número de mortos nos terremotos da Venezuela pode nunca ser conhecido", "url": "https://veja.abril.com.br/mundo/por-que-o-numero-de-mortos-nos-terremotos-da-venezuela-pode-nunca-ser-conhecido/", "fonte_id": "veja", "data_pub": "2026-06-30T18:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Especialistas afirmam que as buscas ainda estão no início, com milhares de pessoas desaparecidas e áreas devastadas continuando inacessíveis. O número exato de mortos nos terremotos da Venezuela pode nunca ser conhecido.", "titulo_pt": "Por que o número exato de mortos nos terremotos da Venezuela pode nunca ser conhecido", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27520, "titulo": "André de Paula cria grupo de trabalho para avaliar impactos do El Niño", "url": "https://www.cnnbrasil.com.br/agro/andre-de-paula-cria-grupo-de-trabalho-para-avaliar-impactos-do-el-nino/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T18:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "André de Paula, ministro da Agricultura, criou um grupo de trabalho para avaliar os impactos do El Niño. Durante o evento de divulgação do Plano Safra 2026/27, ele também divulgou uma minuta que estabelece padrões de identidade e qualidade para a produção da biorrefinaria de milho e cereais.", "titulo_pt": "André de Paula cria grupo de trabalho para avaliar impactos do El Niño", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 27835, "titulo": "Las impactantes imágenes de la morgue improvisada en un puerto de Venezuela", "url": "https://www.lanacion.com.ar/el-mundo/las-impactantes-imagenes-de-la-morgue-improvisada-en-un-puerto-de-venezuela-nid30062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T18:42:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Médicos forenses trabalham em uma morgue improvisada no Porto de La Guaira, local mais afetado pelos terremotos na Venezuela. Decenas de corpos estão apilados nas instalações marítimas.", "titulo_pt": "Imagens impactantes da morgue improvisada em um porto da Venezuela", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 27782, "titulo": "El problemático consumo de energéticas en niños", "url": "https://www.latercera.com/videos/noticia/el-problematico-consumo-de-energeticas-en-ninos/", "fonte_id": "la_tercera", "data_pub": "2026-06-30T18:29:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O acadêmico Rodrigo Valenzuela, da Universidade de Chile e membro do Comitê de Lácteos, discute o consumo preocupante de bebidas energéticas por crianças. As crianças estão substituindo leites e derivados na sua dieta, que geralmente os incluem, devido ao consumo dessas bebidas.", "titulo_pt": "Consumo problemático de energéticas em crianças", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 27789, "titulo": "Las olas de calor europeas vuelven a poner el aire condicionado en el centro del debate", "url": "https://www.latercera.com/mundo/noticia/las-olas-de-calor-europeas-vuelven-a-poner-el-aire-condicionado-en-el-centro-del-debate/", "fonte_id": "la_tercera", "data_pub": "2026-06-30T17:30:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Temperaturas elevadas, chegando a 42 graus, no verão na França, Reino Unido e Bélgica estão reforçando a necessidade de climatização nos edifícios da Europa.", "titulo_pt": "As ondas de calor europeias voltam a colocar o ar condicionado no centro do debate", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 27847, "titulo": "‘But we’re just 1% of emissions’: do smaller countries’ climate efforts matter?", "url": "https://www.theguardian.com/environment/2026/jun/30/emissions-do-smaller-countries-climate-efforts-matter", "fonte_id": "guardian_world", "data_pub": "2026-06-30T15:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Líderes de nações ricas como o Reino Unido e Alemanha argumentam que suas ações climáticas são insignificantes, citando baixas porcentagens de emissões globais. Por exemplo, Rishi Sunak afirmou em 2023 que, com menos de 1% das emissões mundiais, os britânicos não deveriam ser obrigados a sacrificar mais do que outros.", "titulo_pt": "Mas somos apenas 1% das emissões: importam os esforços climáticos dos países menores?", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 27554, "titulo": "A capital mais poluída do mundo paga até mil dólares para quem trocar veículos por elétricos", "url": "https://exame.com/esg/a-capital-mais-poluida-do-mundo-paga-ate-mil-dolares-para-quem-trocar-veiculos-por-eletricos/", "fonte_id": "exame", "data_pub": "2026-06-30T15:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo de Nova Delhi está oferecendo incentivos para mobilidade sustentável e planeja proibir o uso de motos a combustão até 2028 como parte de uma iniciativa para combater a poluição recorde.", "titulo_pt": "A capital mais poluída do mundo oferece até mil dólares por veículos elétricos", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 27229, "titulo": "Temporal assusta moradores de Blumenau na madrugada e causa alagamento", "url": "https://www.metropoles.com/brasil/temporal-assusta-moradores-de-blumenau-na-madrugada-e-causa-alagamento", "fonte_id": "metropoles", "data_pub": "2026-06-30T12:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Na madrugada, um temporal causou alagamentos em diferentes pontos de Blumenau. A Defesa Civil da cidade foi acionada para atender a diversos relatos de inundação.", "titulo_pt": "Temporal assusta moradores e causa alagamento em Blumenau na madrugada", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27297, "titulo": "“Nos preocupa lo que puede venir”: llovieron más de 200 milímetros en pocas horas en Misiones y hay preocupación por El Niño", "url": "https://www.lanacion.com.ar/economia/campo/mas-de-200-milimetros-en-pocas-horas-un-temporal-encendio-las-alarmas-en-misiones-y-hay-preocupacion-nid29062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T12:18:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Em Colonia Aurora, caiu um volume excepcional de água, e em San Javier foram registrados cerca de 160 milímetros. Os produtores já estão movendo a produção para áreas mais altas e expressam preocupação com o que pode acontecer nos próximos meses.", "titulo_pt": "Nos preocupa o que pode vir: choveu mais de 200 milímetros em poucas horas em Misiones e há preocupação com El Niño", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 27300, "titulo": "Renunció el subsecretario de Ambiente de la Nación, Fernando Brom", "url": "https://www.lanacion.com.ar/sociedad/renuncio-el-subsecretario-de-ambiente-de-la-nacion-fernando-brom-nid30062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T12:14:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Fernando Brom, subsecretário de Ambiente da Nação, renunciou após pouco mais de um ano no cargo. A renúncia foi reconhecida pelo governo por causa de comentários públicos inadequados e descuidos na administração.", "titulo_pt": "Subsecretário de Meio Ambiente da Nación Renuncia", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 27210, "titulo": "Alerta de tempestade e granizo no Sul e SP é emitido pelo Inmet; veja", "url": "https://www.cnnbrasil.com.br/nacional/sul/alerta-de-tempestade-e-granizo-no-sul-e-sp-e-emitido-pelo-inmet-veja/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T11:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um alerta de tempestade e granizo foi emitido pelo Inmet para os estados do Sul do Brasil e o litoral paulista nesta terça-feira (30). O aviso abrange áreas que podem ser afetadas por perigos potenciais relacionados ao mau tempo.", "titulo_pt": "Alerta de tempestade e granizo no Sul e SP é emitido pelo Inmet; veja", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 28752, "titulo": "Five humanitarian workers killed in convoy ambush in South Sudan", "url": "https://www.aljazeera.com/news/2026/6/30/five-humanitarian-workers-killed-in-convoy-ambush-in-south-sudan?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-30T20:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cinco trabalhadores humanitários foram mortos em uma emboscada contra um convoio na segunda-feira no estado de Jonglei, Sudão do Sul. A ONU expressou profundo pesar pelo ataque e pediu uma investigação.", "titulo_pt": "Cinco trabalhadores humanitários mortos em emboscada no Sudão do Sul", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 27609, "titulo": "Justiça condena guarda de BH por dizer que \"preto bom é preto morto\"", "url": "https://www.metropoles.com/minas-gerais/justica-condena-guarda-de-bh-por-dizer-preto-bom-e-preto-morto", "fonte_id": "metropoles", "data_pub": "2026-06-30T18:47:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um servidor público foi condenado por dizer que 'preto bom é preto morto' durante um seminário na Prefeitura de Belo Horizonte. A decisão judicial reconheceu a ofensa à coletividade negra.", "titulo_pt": "Justiça condena servidor por frase racista sobre pretos", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27610, "titulo": "Brasil fica em 75º em ranking global de impunidade, segundo estudo", "url": "https://www.metropoles.com/colunas/grande-angular/brasil-fica-em-75o-em-ranking-global-de-impunidade-segundo-estudo", "fonte_id": "metropoles", "data_pub": "2026-06-30T18:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil ocupa o 75º lugar entre 172 nações no ranking global de impunidade, com o pior desempenho nas áreas de violência e conflito.", "titulo_pt": "Brasil fica em 75º lugar no ranking global de impunidade", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 28101, "titulo": "Macron warns against restarting death penalty debate as executions rise around the world", "url": "https://www.scmp.com/news/world/europe/article/3358949/macron-warns-against-restarting-death-penalty-debate-executions-rise-around-world?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T18:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente francês Emmanuel Macron advertiu contra uma nova discussão a favor da pena de morte e expressou espanto com o aumento do número de execuções no mundo. Em discurso durante o nono Congresso Mundial Contra a Pena de Morte em Paris, ele enfatizou a necessidade de se opor à pena capital.", "titulo_pt": "Macron avisa contra renascimento da discussão sobre pena de morte diante do aumento global de execuções", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 27836, "titulo": "The Supreme Court’s trans sports ruling is a cautionary tale for all left-leaning lawyers", "url": "https://www.vox.com/politics/493711/supreme-court-bpj-west-virginia-trans-sports", "fonte_id": "vox", "data_pub": "2026-06-30T18:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Suprema Corte decidiu que estados podem impedir mulheres transgênero de competirem em times femininos de escolas secundárias, faculdades e universidades. A decisão foi esperada, considerando que mais de vinte estados já possuem leis proibindo atletas transgêneros de participar de equipes que não correspondem ao sexo atribuído no nascimento.", "titulo_pt": "A decisão do Supremo sobre esportes para pessoas transexuais serve como advertência para advogados da esquerda", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 27629, "titulo": "Decisão mantém julgamento de uma das oito denúncias de assédio contra Melhem", "url": "https://veja.abril.com.br/brasil/decisao-mantem-julgamento-de-uma-das-oito-denuncias-de-assedio-contra-melhem/", "fonte_id": "veja", "data_pub": "2026-06-30T18:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A 3ª Câmara Criminal do TJ-RJ analisou um pedido de habeas corpus apresentado pela defesa do ex-diretor de humor da Globo no processo relacionado a uma das oito denúncias de assédio contra ele.", "titulo_pt": "Decisão mantém julgamento de uma das oito denúncias de assédio contra ex-diretor de humor da Globo", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27849, "titulo": "Like being ‘stabbed in the back’: abuse survivors left without trials after Christian Brothers’ unprecedented legal tactic", "url": "https://www.theguardian.com/world/2026/jul/01/like-being-stabbed-in-the-back-abuse-survivors-left-without-trials-after-christian-brothers-unprecedented-legal-tactic-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-06-30T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um sobrevivente de abuso sente que foi traído após o seu julgamento ser interrompido no último momento, devido a uma tática legal inédita adotada pelos Irmãos Cristãos. Essa ordem agora quer estabelecer um próprio esquema fora do tribunal para pagar os sobreviventes, embora estes tenham sido informados que não receberão o montante total a que têm direito.", "titulo_pt": "Como ser 'picado por trás': sobreviventes de abuso deixados sem julgamentos após tática legal inédita dos Irmãos Cristãos", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 27944, "titulo": "US Supreme Court upholds state bans on transgender athletes in school", "url": "https://www.lemonde.fr/en/international/article/2026/06/30/us-supreme-court-upholds-state-bans-on-transgender-athletes-in-school_6755014_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-30T14:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Suprema Corte dos Estados Unidos, com uma maioria de 6 a 3, manteve as leis estatais que proíbem atletas transexuais de competir em esportes femininos escolares.", "titulo_pt": "Suprema Corte dos EUA mantém proibição de atletas transexuais em esportes femininos escolares", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 28204, "titulo": "Joint statement by the Committee on the Rights of the Child and UNICEF on the plight of migrant children in South Africa", "url": "https://www.unicef.org/press-releases/joint-statement-committee-rights-child-and-unicef-plight-migrant-children-south", "fonte_id": "unicef", "data_pub": "2026-06-30T14:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Comissão dos Direitos da Criança e a UNICEF emitiram uma declaração conjunta sobre as dificuldades enfrentadas por crianças migrantes na África do Sul. A declaração destaca os desafios específicos que essas crianças enfrentam.", "titulo_pt": "Declaração conjunta da Comissão dos Direitos da Criança e UNICEF sobre a situação de crianças migrantes na África do Sul", "veiculo": "UNICEF Global", "pais": "Global", "classe": "A"}, {"id": 27988, "titulo": "South African protesters call for undocumented migrants to leave", "url": "http://www.euronews.com/video/2026/06/30/south-african-protesters-call-for-undocumented-migrants-to-leave", "fonte_id": "euronews", "data_pub": "2026-06-30T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Protestantes anti-imigrantes marcharam em Durban pedindo a saída de imigrantes ilegais, conforme solicitado pelo movimento March and March. A polícia esteve presente no local.", "titulo_pt": "Protestantes anti-imigrantes chamam para expulsão de imigrantes ilegais na África do Sul", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 28043, "titulo": "How six months in Israeli jail changed this Palestinian journalist’s life forever", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/how-six-months-israeli-jail-changed-palestinian-journalists-life-forever", "fonte_id": "middle_east_eye", "data_pub": "2026-06-30T13:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mujahid Bani Mufleh, um jornalista palestino de 36 anos, sofreu mudanças significativas após passar seis meses na prisão israelense sem acusação ou julgamento. Sua aparência alterou-se drasticamente, com ele aparecendo magro e frágil, com olhos sunken e parecendo mais velho do que quando entrou em prisão.", "titulo_pt": "Como seis meses na prisão israelense mudaram a vida deste jornalista palestino para sempre", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 27359, "titulo": "Balkan LGBTQ+ Communities Need Freedom All Year, Not Just at Pride", "url": "https://balkaninsight.com/2026/06/30/balkan-lgbtq-communities-need-freedom-all-year-not-just-at-pride/bi/", "fonte_id": "balkan_insight", "data_pub": "2026-06-30T11:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ao encerrar o mês de Pride, a pergunta principal não é sobre o número de pessoas que participaram das marchas, mas sim se as pessoas LGBTQ+ sentem-se mais seguras durante todo o ano.", "titulo_pt": "Comunidades LGBTQ+ do Bálcãs Necessitam de Liberdade ao Longo do Ano Todo, Não Só Durante a Pride", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}, {"id": 26830, "titulo": "Torturado, abusado e morto pelo pai adotivo: o caso do bebê Preston", "url": "https://veja.abril.com.br/coluna/mundialista/torturado-abusado-e-morto-pelo-pai-adotivo-o-caso-do-bebe-preston/", "fonte_id": "veja", "data_pub": "2026-06-30T10:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O indivíduo responsável pelo abuso foi condenado, mas há suspeitas de que os assistentes sociais ignoraram evidências claras por medo de homofobia.", "titulo_pt": "Torturado, abusado e morto pelo pai adotivo: o caso do bebê Preston", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 26431, "titulo": "Regla oficial del DHS: quiénes deben registrarse y dar sus huellas para evitar multas o cárcel", "url": "https://www.lanacion.com.ar/estados-unidos/visas-y-tramites/regla-oficial-del-dhs-quienes-deben-registrarse-y-dar-sus-huellas-para-evitar-multas-o-carcel-nid30062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T10:17:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A nova regra do DHS nos Estados Unidos determina quais indivíduos devem se registrar e fornecer suas impressões digitais, além das sanções previstas para aqueles que não o fizerem. O título em português é: 'Regra oficial do DHS: quem deve se registrar e fornecer as impressões digitais para evitar multas ou prisão nos EUA'.", "titulo_pt": "Regra oficial do DHS: quem deve se registrar e fornecer as impressões digitais para evitar multas ou prisão nos EUA", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 26660, "titulo": "What will Hong Kong’s proposed reforms to sexual offences laws change?", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3358898/what-will-hong-kongs-proposed-reforms-sexual-offences-laws-change?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T09:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As autoridades de Hong Kong propuseram uma reforma abrangente das leis sobre crimes sexuais da cidade, incluindo ampliar a definição de estupro, introduzir novos delitos envolvendo atos não consensuais com crianças e pessoas com deficiência mental, definir uma idade mínima consentida uniforme em 16 anos e remover disposições específicas de gênero. As propostas estão sendo consultadas publicamente durante um mês.", "titulo_pt": "O que as reformas propostas sobre leis de crimes sexuais em Hong Kong mudarão?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 26422, "titulo": "ADPF 1339: as mulheres trans e a cota de gênero nas eleições", "url": "https://www.jota.info/opiniao-e-analise/artigos/adpf-1339-as-mulheres-trans-e-a-cota-de-genero-nas-eleicoes", "fonte_id": "jota", "data_pub": "2026-06-30T08:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal (STF) pode decidir sobre uma ação que busca eliminar uma interpretação considerada um claro retrocesso social para mulheres trans no sistema de cotas de gênero nas eleições.", "titulo_pt": "ADPF 1339: as mulheres trans e a cota de gênero nas eleições", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}], "direitos_humanos__eventos": []}, "noticias": [{"id": 26814, "fonte_id": "its_nice_that", "titulo": "Falling under the map: Sasha Yazov’s airbrush art of The Sims turns pixels to paint", "url": "https://www.itsnicethat.com/articles/sasha-yazov-art-project-300626", "data_pub": "2026-07-02T08:00:00Z", "topico": "cultura", "idioma": "en", "titulo_pt": "Caído sob o mapa: arte em spray digital de Sasha Yazov transforma pixels em pinturas de The Sims", "veiculo": "It's Nice That", "pais": "Reino Unido", "classe": "B"}, {"id": 28565, "fonte_id": "la_nacion_ar", "titulo": "Abre solo los sábados, le compran chefs premiados y rescató el sabor perdido en la carne que comía su abuelo en España", "url": "https://www.lanacion.com const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">
      <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
      <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
      <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
      <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
    </div>` : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices();
    return (
      vs.find(function (v) { return v.lang === 'pt-BR'; }) ||
      vs.find(function (v) { return v.lang.startsWith('pt'); }) ||
      null
    );
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // sempre a .sumario imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
