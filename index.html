<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=author@400&display=swap" rel="stylesheet">
<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 07/07/2026 08:34 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">
    <div class="modal-erro" id="senha-erro" style="display:none">Senha incorreta.</div>
    <div class="modal-btns">
      <button class="btn-sec2" onclick="fecharModal('modal-senha')">Cancelar</button>
      <button class="btn-pri" onclick="verificarSenha()">Entrar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>
      <option value="classificacao_errada">Classificação errada</option>
      <option value="resumo_impreciso">Resumo impreciso</option>
      <option value="outro">Outro</option>
    </select>
    <label for="flag-nota">Nota (opcional)</label>
    <textarea id="flag-nota" placeholder="Descreva o problema..."></textarea>
    <div class="modal-btns">
      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "07/07/2026 08:34", "stats": {"noticias_novas": 880, "resumos_gerados": 0}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O governo Lula destinou R$ 33,89 bilhões em emendas até julho de 2026, superando o montante registrado nos últimos cinco ciclos eleitorais. Paralelamente, a equipe do senador Flávio Bolsonaro está preparando sua esposa para aumentar seu envolvimento na campanha presidencial, com foco nas mulheres. A justiça de Goiás reduziu o número de seguranças de Ronaldo Caiado e dos familiares dele para quatro policiais militares, em decisão provisória. A Procuradoria-Geral da República defendeu que Flávio Bolsonaro seja ouvido pela Polícia Federal na investigação sobre calúnia contra Lula.", "mundo": "O governo alemão planeja contrair um empréstimo de 800 bilhões de euros para rearmamento, uma mudança histórica no gasto público. Este aumento orçamentário será impulsionado pelo chefe do governo, Friedrich Merz, e envolverá investimentos significativos em armas não vistos desde a reunificação alemã. Em contraste, o presidente sul-coreano Lee Jae Myung estava programado para viajar à Turquia na terça-feira com o objetivo de participar do encontro da OTAN em Ancara, onde Keir Starmer buscará apoio dos aliados europeus para fortalecer a NATO. Devido às preocupações sobre as declarações do presidente dos EUA, Donald Trump, este evento ocorrerá em Ancara. Além disso, a França retirou todos os seus diplomatas do Burkina Faso após o país, sob governança militar, cortar relações com seu antigo colonizador. Em outro desenvolvimento, a Corte Europeia de Direitos Humanos ordenou que o estado italiano pague indenização a uma mulher cujas acusações de estupro repetido por seu parceiro foram descartadas como 'normal' por um promotor, argumentando-se que tal atitude perpetuou estereótipos sexistas e minimizou a violência contra as mulheres.\n\nA China realizou um teste de lançamento de um míssil balístico, o que irritou seus vizinhos e levantou preocupações geopolíticas na região. O evento foi criticado pela Austrália e Taiwan, que descreveram o teste como potencialmente instável. Em outro desenvolvimento, a construção de submarinos para o Canadá avançou com a escolha da construtora naval alemã TKMS em parceria com a norueguesa, superando a proposta sul-coreana. Essas movimentações refletem as tensões e alianças internacionais na esfera militar e diplomática.", "economia": "A Microsoft anunciou uma reestruturação que resultará na demissão de cerca de 4.800 funcionários, representando aproximadamente 2,1% da força de trabalho global. Em outro desenvolvimento econômico, a CVC vendeu o grupo D-Marin, especializado em marinas de iates de luxo, por mais de 1 bilhão de euros para um grupo francês, refletindo o interesse crescente no setor de superiores. As autoridades brasileiras enfrentam desafios com a regulamentação dos mercados de previsão, enquanto a Polícia Federal realiza uma operação contra a lavagem de dinheiro relacionada à exploração ilegal de apostas. A Microsoft também se prepara para mudanças nas comunicações com os investidores, com um alto executivo do Fed apoiando as propostas do novo chefe da instituição. Além disso, o Banco Central reduziu pela primeira vez sua previsão para a inflação em 2026, refletindo a melhora na situação econômica global devido à guerra no Irã.", "tecnologia": "A Samsung registrou um lucro operacional recorde de 89,4 trilhões de wones no segundo trimestre de 2023, impulsionado pelo ciclo supercíclico da inteligência artificial (IA). Além disso, houve uma proposta para permitir que famílias americanas adquiram uma participação minoritária na OpenAI por cerca de 300 dólares com o aumento do investimento na área de semicondutores. No entanto, as empresas de streaming como Netflix contestaram novas regras francesas que exigem a destinação de 20% dos investimentos em conteúdo local, consideradas uma ameaça à liberdade criativa. A Microsoft planeja cortar 4,8 mil empregos na unidade de jogos para ajustar a empresa às margens frágeis e queda no setor de hardware da indústria de videogames.", "ciencia": "Um estudo recente publicado no Scientific American sugere que a falta de sono pode levar ao ganho de peso e à maior sedentariedade, com os cientistas notando um impacto significativo mesmo após uma redução de apenas 90 minutos no horário de sono. Na área da biotecnologia, a empresa Vertex Pharmaceuticals adquiriu a Crinetics Pharmaceuticals por 10 bilhões de dólares em uma transação que reflete o aumento das aquisições no setor. A NASA anunciou um projeto-piloto buscando feedback das empresas americanas para o próximo estágio da sua estratégia de estações espaciais comerciais, com o objetivo de assegurar uma transição suave após o International Space Station. Além disso, a Agência Japonesa de Exploração Aeroespacial (Jaxa) divulgou imagens feitas por uma sonda que se aproximou do asteroide Torifune, revelando detalhes nunca antes vistos da rocha interestelar.", "cultura": "O cardiólogo Jorge Tartaglione defendeu a eficácia e importância dos medicamentos para o colesterol, como as estatinas, afirmando que são benéficos e salvam vidas. Em outra notícia cultural, Kihyun do Monsta X está lançando um novo projeto solo com uma abordagem ousada no rock, da China, o tufão Maysak causou mortes e forçou milhares a se evadirem, com rompimentos em barragens na província de Guangxi.", "direitos_humanos": "A entidade das Nações Unidas para os direitos humanos exigiu a libertação do médico palestiniano Hussam Abu Safia, que está detido pela Israel. Segundo sua família e advogado, ele corre risco iminente de vida e apresenta sinais de ter sido torturado. Em outro caso, o ministro de Esportes da França e o jogador Kylian Mbappé condenaram fortes declarações racistas feitas por uma senadora paraguaia após a eliminação do Paraguai em um torneio esportivo. Além disso, um juiz manteve a justa causa contra um ex-funcionário negro da empresa Coco Bambu que ofendeu um colega de forma racista, destacando que as manifestações racistas não podem ser consideradas apenas brincadeiras, independentemente do coro do ofensor."}, "resumo_do_dia": {"politica_nacional": [{"id": 39087, "titulo": "Governo Lula libera R$ 33,89 bilhões de emendas em 2026 e bate recorde", "url": "https://www.metropoles.com/brasil/governo-lula-libera-r-3389-bilhoes-em-emendas-e-bate-recorde-em-2026", "fonte_id": "metropoles", "data_pub": "2026-07-06T22:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo Lula liberou R$ 33,89 bilhões em emendas até a primeira semana de julho deste ano. Esse valor supera o registrado nos últimos cinco ciclos eleitorais.", "titulo_pt": "Governo Lula libera R$ 33,89 bilhões de emendas em 2026 e bate recorde", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 38961, "titulo": "Equipe de Flávio Bolsonaro prepara esposa para reforçar campanha em gesto a mulheres", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/equipe-de-flavio-bolsonaro-prepara-esposa-para-reforcar-campanha-em-gesto-a-mulheres.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-06T21:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A equipe do senad egação de impostos na França", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 38099, "titulo": "Indústria estima que 4,1 mil produtos podem ser afetados caso EUA imponha novo tarifaço", "url": "https://g1.globo.com/economia/noticia/2026/07/06/industria-estima-que-41-mil-produtos-exportados-para-os-eua-podem-ser-afetados-por-novo-tarifaco.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-06T13:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Confederação Nacional da Indústria (CNI) estima que 4,1 mil produtos brasileiros podem ser afetados por um novo tarifaço dos Estados Unidos. O governo americano está considerando a possibilidade de implementar o tarifaço sugerido pelo Escritório do Representante de Comércio, e as audiências públicas sobre o possível aumento das taxas estão em andamento.", "titulo_pt": "Indústria estima que 4,1 mil produtos podem ser afetados caso EUA imponha novo tarifaço", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 38324, "titulo": "Autorização para empresa estrangeira ser sócia no Brasil causaria impacto bilionário", "url": "https://www.jota.info/coberturas-especiais/jurisprudente/autorizacao-para-empresa-estrangeira-ser-socia-no-brasil-causaria-impacto-bilionario", "fonte_id": "jota", "data_pub": "2026-07-06T13:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O novo Código Civil prevê que a autorização do Executivo é necessária para que empresas estrangeiras possam ser sócias ou acionistas de companhias brasileiras. Este processo poderia ter um impacto financeiro significativo no país.", "titulo_pt": "Autorização do Executivo seria crucial para empresas estrangeiras se tornarem sócios em Brasil", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 38326, "titulo": "Defesa da concorrência requer participação da sociedade civil", "url": "https://www.jota.info/opiniao-e-analise/artigos/defesa-da-concorrencia-requer-participacao-da-sociedade-civil", "fonte_id": "jota", "data_pub": "2026-07-06T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O futuro da internet deve envolver a participação da sociedade civil na decisão sobre questões importantes relacionadas à concorrência.", "titulo_pt": "Defesa da concorrência exige envolvimento da sociedade civil", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 38327, "titulo": "O novo protagonismo das agências de fomento", "url": "https://www.jota.info/opiniao-e-analise/colunas/tendencias/o-novo-protagonismo-das-agencias-de-fomento", "fonte_id": "jota", "data_pub": "2026-07-06T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O espaço deixado pelos incentivos fiscais dificilmente permanecerá vazio, sugerindo que novas entidades ou políticas podem ocupar essa lacuna.", "titulo_pt": "Novo protagonismo das agências de fomento", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 38088, "titulo": "Economistas reduzem previsão para inflação pela primeira vez desde o início da guerra no Irã", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/economistas-reduzem-previsao-para-inflacao-pela-primeira-vez-desde-o-inicio-da-guerra-no-ira.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-06T12:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os economistas ouvidos pelo Banco Central reduziram pela primeira vez a previsão para a inflação neste ano desde o início da guerra no Irã, em 28 de fevereiro. A nova projeção foi divulgada em 7 de junho de 2026.", "titulo_pt": "Economistas reduzem previsão para inflação após guerra no Irã", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 39454, "titulo": "(URGENT) Samsung's Q2 operating profit reaches 89.4 tln won, sets fresh high", "url": "https://en.yna.co.kr/view/AEN20260707001300320", "fonte_id": "yonha AI", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 38650, "titulo": "Microsoft to axe 4,800 jobs as it resets Xbox", "url": "https://www.ft.com/content/41091f2f-0916-4532-82c9-0634ab8ff64c", "fonte_id": "financial_times", "data_pub": "2026-07-06T14:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Microsoft planeja cortar 4,800 postos de trabalho na unidade de jogos por causa das margens frágeis e pela forte queda no setor de hardware da indústria de videogames.", "titulo_pt": "Microsoft anuncia corte de 4.800 postos de trabalho na divisão de Xbox", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 38082, "titulo": "Filósofos são contratados por empresas de IA para debater consciência das máquinas", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/tec/2026/07/filosofos-sao-contratados-por-empresas-de-ia-para-debater-consciencia-das-maquinas.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-06T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Robert Long, que cresceu na Geórgia, Estados Unidos, tinha o hábito de refletir sobre questões filosóficas desde cedo. Antes dos 10 anos, já questionava seu próprio livre-arbítrio.", "titulo_pt": "Filósofos são contratados por empresas de IA para discutir consciência das máquinas", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 38820, "titulo": "VHF Propagation: What Every RF Engineer Should Know", "url": "https://content.knowledgehub.wiley.com/understanding-vhf-very-high-frequency-propagation/", "fonte_id": "ieee_spectrum", "data_pub": "2026-07-06T13:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Este guia prático aborda modos comuns e menos comuns de propagação VHF, explicando a física subjacente, as implicações na distância de alcance e os comportamentos reais que os engenheiros precisam entender. Os participantes aprender mark-ii/", "fonte_id": "wired", "data_pub": "2026-07-06T10:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A televisão Sony Bravia 7 Mark II, uma televisão de médio porte com tecnologia mini RGB LED, possui um preço elevado para sua categoria, mas não atinge a mesma luminosidade e contraste que modelos mais avançados.", "titulo_pt": "Sony Bravia 7 Mark II: médio de gama mas preço elevado (2026)", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 37888, "titulo": "Good News! Turns Out the Earth Will Never Be Swallowed by the Sun", "url": "https://www.wired.com/story/good-news-it-turns-out-the-earth-will-never-be-swallowed-by-the-sun/", "fonte_id": "wired", "data_pub": "2026-07-06T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo estudo sugere que a Terra pode evitar ser engolida pelo fim letal do Sol quando o astro se tornar instável daqui a aproximadamente 5 bilhões de anos.", "titulo_pt": "Boa notícia! Estudo indica que a Terra não será engolida pelo Sol", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 37642, "titulo": "China’s web novel platforms embraced AI. Now they are fighting it", "url": "https://restofworld.org/2026/china-ai-web-novels/?utm_source=rss&utm_medium=rss&utm_campaign=feeds", "fonte_id": "rest_of_world", "data_pub": "2026-07-06T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Plataformas chinesas de histórias em linha, como as do Tencent, ByteDance e Baidu, estabeleceram limites diários de palavras para os autores e padrões mais rigorosos para combater a produção de ficção de baixa qualidade através da inteligência artificial.", "titulo_pt": "Plataformas chinesas de histórias em linha adotaram restrições para combater IA", "veiculo": "Rest of World", "pais": "EUA", "classe": "A"}, {"id": 37889, "titulo": "ICE’s Internal Watchdog Is Now Investigating Online Critics", "url": "https://www.wired.com/story/ices-internal-watchdog-is-now-investigating-online-critics/", "fonte_id": "wired", "data_pub": "2026-07-06T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Office of Professional Responsibility da ICE iniciou mais de 100 casos relacionados a ocorrências de doxing e ameaças contra empregados da ICE.", "titulo_pt": "ICE inicia investigação interna em relatione a críticos online", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 37890, "titulo": "What if the Universe Isn’t as Uniform as Scientists Think?", "url": "https://www.wired.com/story/what-if-the-universe-wasnt-as-uniform-as-scientists-think/", "fonte_id": "wired", "data_pub": "2026-07-06T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa com base em 47 milhões de galáxias revelou que a rede cósmica mantém padrões em escalas enormes, o que poderia levar à reavaliação de um pilar da cosmologia.", "titulo_pt": "E se o universo não for tão uniforme como cientistas pensam?", "veiculo": "Wired", "pais": "EUA", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 39463, "titulo": "Too many sleepless nights may lead to weight gain", "url": "https://www.scientificamerican.com/article/too-many-sleepless-nights-may-lead-to-weight-gain/", "fonte_id": "scientific_american", "data_pub": "2026-07-06T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo descobriu que ficar até 90 minutos menos do que o normal de sono pode levar ao ganho de peso e à maior sedentarismo.", "titulo_pt": "Poucas noites sem dormir podem levar a ganho de peso", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 39465, "titulo": "STAT+: Vertex acquires Crinetics Pharmaceuticals for $10 billion as biotech M&A booms", "url": "https://www.statnews.com/2026/07/06/vertex-acquires-crinetics-pharmaceuticals/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-06T20:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa Vertex Pharmaceuticals adquiriu a Crinetics Pharmaceuticals e seu medicamento para um distúrbio endócrino raro por 10 bilhões de dólares. Esta aquisição ocorre em um período de aumento das transações no setor biotecnológico.", "titulo_pt": "Vertex adquire Crinetics Pharmaceuticals por 10 bilhões de dólares", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 39470, "titulo": "Blue Origin continues work on lunar landers during recovery from New Glenn explosion", "url": "https://spacenews.com/blue-origin-continues-work-on-lunar-landers-during-recovery-from-new-glenn-explosion/", "fonte_id": "spacenews", "data_pub": "2026-07-06T20:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Blue Origin está continuando o desenvolvimento de seus módulos lunares Blue Moon, com sete veículos em produção, enquanto se recupera de uma explosão na plataforma New Glenn há mais de um mês.", "titulo_pt": "Blue Origin continua desenvolvendo módulos lunares durante a recuperação da explosão do New Glenn", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 39466, "titulo": "Obamacare rolls shrank dramatically in many states over the past year, new federal data shows", "url": "https://www.statnews.com/2026/07/06/obamacare-rolls-shrank-dramatically-affordable-care-act-states/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-06T19:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Novos dados federais mostram que o número de pessoas cobertas pela Lei de Saúde Affordable Care Act (Obamacare) diminuiu dramaticamente em vários estados nos últimos doze meses.", "titulo_pt": "Planos Obamacare registraram significativa redução no número de segurados em muitos estados no último ano", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 39464, "titulo": "Did our modern human ancestors and Neanderthals share a common culture?", "url": "https://www.scientificamerican.com/article/did-our-human-ancestors-and-neanderthals-share-a-common-culture/", "fonte_id": "scientific_american", "data_pub": "2026-07-06T19:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Estudos sugerem que Neandertais e Homo sapiens podem ter compartilhado ferramentas e práticas comportamentais.", "titulo_pt": "Os antepassados modernos humanos e os neandertais compartilharam uma cultura comum?", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 39471, "titulo": "Iridium folds Aireon aviation safety service into Rocket Lab-bound business", "url": "https://spacenews.com/iridium-folds-aireon-aviation-safety-service-into-rocket-lab-bound-business/", "fonte_id": "spacenews", "data_pub": "2026-07-06T19:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Iridium completou a aquisição da Aireon, incorporando o serviço de monitoramento de aviação à sua operação antes do planejado venda de US$ 8 bilhões para a Rocket Lab. O Aireon é um serviço de segurança aeronáutica que utiliza satélites para rastrear aviões.", "titulo_pt": "Iridium integra serviço de segurança aeronáutico da Aireon à operação antes da venda para a Rocket Lab", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 38039, "titulo": "Viajando a 18.000 km/h, sonda japonesa chega perto de asteroide e o fotografa", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/viajando-a-18000-kmh-sonda-japonesa-chega-perto-de-asteroide-e-o-fotografa.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-06T16:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Agência Japonesa de Exploração Aeroespacial (Jaxa) divulgou imagens feitas por uma sonda que se aproximou do asteroide Torifune. A divulgação ocorreu na segunda-feira, 6 de junho de 2026.", "titulo_pt": "Sonda japonesa chega perto de asteroide e o fotografa", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 38858, "titulo": "Wordle, but for art history—Anthropeum turns the Met Museum into an online game", "url": "https://www.scientificamerican.com/article/wordle-but-for-art-history-anthropeum-turns-the-met-museum-into-an-online-game/", "fonte_id": "scientific_american", "data_pub": "2026-07-06T16:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Anthropeum é um jogo diário que utiliza os dados abertos do Met para destacar obras de arte e artefatos menos representados. O jogo transforma o Museu Metropolitano de Arte em uma experiência online interativa.", "titulo_pt": "Wordle, mas para história da arte – Anthropeum transforma o Met Museum em um jogo online", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 38865, "titulo": "Webb reveals millions of stars in nearby galaxy", "url": "https://www.esa.int/Science_Exploration/Space_Science/Webb/Webb_reveals_millions_of_stars_in_nearby_galaxy", "fonte_id": "esa_space", "data_pub": "2026-07-06T16:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A nova imagem do Telescópio Espacial James Webb revela milhões de estrelas na galáxia Centaurus A, com uma visibilidade nunca antes vista, devido à sensibilidade inédita em comprimentos de onda infravermelhos próximos e médios. Essas imagens celebram o quarto aniversário científico do telescópio e mostram uma galáxia mais rica e complexa do que jamais imaginado.", "titulo_pt": "Webb revela milhões de estrelas na galáxia vizinha Centaurus A", "veiculo": "ESA - Space Science", "pais": "Europa", "classe": "A"}, {"id": 38861, "titulo": "NASA adds three European firms to the commercial data program", "url": "https://spacenews.com/nasa-adds-three-european-firms-to-the-commercial-data-program/", "fonte_id": "spacenews", "data_pub": "2026-07-06T15:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA anunciou, em 23 de junho, novos contratos com oito provedores comerciais de dados satelitares, incluindo três empresas europeias: Kuva Space (Finlandês) e OroraTech. O programa Commercial Satellite Data Acquisition (CSDA) da NASA está expandindo sua base de fornecedores internacionais.", "titulo_pt": "NASA adiciona três empresas européias ao programa de dados satelitares comerciais", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 38867, "titulo": "NASA Seeks Industry Input on Second Phase of Commercial Space Stations", "url": "https://www.nasa.gov/humans-in-space/commercial-space/nasa-seeks-industry-input-on-second-phase-of-commercial-space-stations/", "fonte_id": "nasa_news", "data_pub": "2026-07-06T15:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA divulgou um projeto-piloto de convite a propostas (RFP) buscando feedback das empresas americanas para o próximo estágio da sua estratégia de estações espaciais comerciais, com o objetivo de assegurar uma transição suave das atividades na órbita baixa da Terra após o International Space Station. A revisão da NASA reflete as informações que a agência tem recebido do setor ao longo deste processo.", "titulo_pt": "NASA solicita feedback das empresas americanas para segunda fase de estações espaciais comerciais", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 38847, "titulo": "STAT+: Online GLP-1 prescriptions are often fast, easy — and low on clinical oversight", "url": "https://www.statnews.com/2026/07/06/glp-1-telehealth-prescriptions-jama-yale-secret-shopper-study/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-06T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma nova pesquisa que utilizou assessores secretos descobriu que as prescrições de GLP-1 por sites de telemedicina não são frequentemente apoiadas por cuidados clínicos apropriados.", "titulo_pt": "Prescrições online de GLP-1 são frequentes, mas com baixa supervisão clínica", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 38852, "titulo": "Pickles glow when you plug them in. Science explains why", "url": "https://www.sciencenews.org/article/pickle-glow-electricity-experiment", "fonte_id": "science_news", "data_pub": "2026-07-06T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um cientista, uma lata de maionese e um adaptador elétrico entram em uma sala. O trocadilho envolve física, molhos que brilham e um truque científico.", "titulo_pt": "Maionese brilha quando conectada a energia. Ciência explica o porquê", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 38868, "titulo": "NASA’s CAPSTONE Completes Extended Mission Testing Lunar Technologies", "url": "https://www.nasa.gov/technology/space-comms/nasas-capstone-completes-extended-mission-testing-lunar-technologies/", "fonte_id": "nasa_news", "data_pub": "2026-07-06T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "CAPSTONE, uma missão da NASA, validou e avançou tecnologias necessárias para navegação e comunicação em órbita lunar sem conexão direta com a Terra. A missão foi projetada para testar e validar tecnologias em órbita lunar.", "titulo_pt": "Missão CAPSTONE completa testes de tecnologias lunar", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 38859, "titulo": "NASA’s exoplanet mission accidentally discovers a world it was never meant to find", "url": "https://www.scientificamerican.com/article/nasas-exoplanet-mission-accidentally-discovers-a-world-it-was-never-meant-to-find/", "fonte_id": "scientific_american", "data_pub": "2026-07-06T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A missão espacial TESS, projetada para detectar exoplanetas, descobriu um mundo distante usando um método de detecção diferente do planejado.", "titulo_pt": "Missão da NASA encontra planeta não programado com método inesperado", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 38869, "titulo": "NASA Webb Uncovers Unusual Galaxy Shaped by Cosmic Collision", "url": "https://science.nasa.gov/missions/webb/nasa-webb-uncovers-unusual-galaxy-shaped-by-cosmic-collision/", "fonte_id": "nasa_news", "data_pub": "2026-07-06T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Imagens do Telescópio Espacial James Webb da NASA, celebrando o quarto aniversário científico, revelam uma galáxia chamada Centaurus A de forma mais rica e complexa que nunca antes visto. A sensibilidade inigualável do Webb em comprimentos de onda infravermelhos permite ver através das faixas escuras de poeira que obscurecem o centro da galáxia em luz visível.", "titulo_pt": "Webb da NASA descobre galáxia incomum moldada por colisão cósmica", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 38007, "titulo": "Stanley Plowman’s Garble is machine-executed typography filled with human mess", "url": "https://www.itsnicethat.com/articles/stanley-plowman-garble-graphic-design-publication-project-060726", "fonte_id": "its_nice_that", "data_pub": "2026-07-08T08:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Stanley Plowman criou uma tipografia inovadora utilizando um plotador de caneta, relembrando técnicas manuais como espirografia, estêncils e canetas felt. O resultado é publicado em uma zine.", "titulo_pt": "Stanley Plowman’s Garble: Tipografia criada por máquina com toque humano", "veiculo": "It's Nice That", "pais": "Reino Unido", "classe": "B"}, {"id": 39212, "titulo": "La psicología explica la resiliencia de los nacidos en los años 60 y 70 por crecer en una realidad marcada por la exigencia y la libertad", "url": "https://www.lanacion.com.ar/salud/mente/la-psicologia-explica-la-resiliencia-de-los-nacidos-en-los-anos-60-y-70-por-crecer-en-una-realidad-nid06072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-06T22:45:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Expertos analisam como a criação baseada na disciplina e na autonomia obrigatória de décadas atrás formou uma UA", "classe": "B"}, {"id": 39473, "titulo": "The Met Museum's Staff Have Some Thoughts About the Art", "url": "https://hyperallergic.com/the-met-museums-staff-have-some-thoughts-about-the-art/", "fonte_id": "hyperallergic", "data_pub": "2026-07-06T21:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo livro reúne ensaios escritos por curadores, pesquisadores, bibliotecários e conservadores do Museu Metropolitano de Arte sobre diversos temas, incluindo a pintura renascentista e o trabalho da artista Wendy Red Star.", "titulo_pt": "Curadores e pesquisadores do Met refletem sobre a arte", "veiculo": "Hyperallergic (arte)", "pais": "EUA", "classe": "B"}, {"id": 39478, "titulo": "Former Marlborough Gallery Space in Chelsea Sells for $7.5 M.", "url": "https://www.artnews.com/art-news/news/former-marlborough-gallery-chelsea-sells-7-5-million-gazelli-1234791228/", "fonte_id": "artnews", "data_pub": "2026-07-06T21:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um espaço da galeria Marlborough no Chelsea foi vendido por US$ 7,5 milhões. Esta venda marca mais uma etapa na desativação do legado da galeria.", "titulo_pt": "Espaço da Galeria Marlborough no Chelsea vende por US$ 7,5 milhões", "veiculo": "ARTnews", "pais": "EUA", "classe": "B"}, {"id": 39474, "titulo": "Carmelita Tropicana Was Born Out of the Closet", "url": "https://hyperallergic.com/carmelita-tropicana-was-born-out-of-the-closet/", "fonte_id": "hyperallergic", "data_pub": "2026-07-06T21:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A artista Alina Troyano conversou com o Hyperallergic sobre sua performance lesbian na Lower East Side dos anos 1980, satirizando estereótipos e representando seu alter ego icônico.", "titulo_pt": "Carmelita Tropicana nasceu do armário", "veiculo": "Hyperallergic (arte)", "pais": "EUA", "classe": "B"}, {"id": 39475, "titulo": "Thieves Steal Over $4.5M in Jewelry From French Museum", "url": "https://hyperallergic.com ": "Comissão especial para PEC da redução da maioridade penal é criada por Motta", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 38154, "titulo": "Professor de jiu-jítsu é preso por estuprar 7 alunas e “vendê-las” a empresários", "url": "https://www.metropoles.com/distrito-federal/na-mira/professor-de-jiu-jitsu-e-preso-por-estuprar-7-alunas-e-vende-las-a-empresarios", "fonte_id": "metropoles", "data_pub": "2026-07-06T18:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um professor de jiu-jítsu foi preso por estuprar sete alunas e oferecê-las a empresários em troca de vantagens financeiras. Ele estava foragido há um mês.", "titulo_pt": "Professor de jiu-jítsu é preso por estuprar 7 alunas e 'vendê-las' a empresários", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 38252, "titulo": "MG: três são presos suspeitos por morte de mulheres após briga em praça", "url": "https://www.cnnbrasil.com.br/nacional/sudeste/mg/mg-tres-sao-presos-suspeitos-por-morte-de-mulheres-apos-briga-em-praca/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-06T18:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Três pessoas foram presas suspeitas de envolvimento na morte de duas mulheres após uma briga em uma praça. Segundo a informação, as vítimas teriam tido uma discussão com um dos suspeitos, que saiu do local e retornou momentos depois armado para atirar contra elas.", "titulo_pt": "MG: três são presos suspeitos por morte de mulheres após briga em praça", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 39266, "titulo": "“Esta no es una visión ideológica”: Quiroz defiende en Comisión de Medio Ambiente técnica legislativa para la megarreforma", "url": "https://www.latercera.com/politica/noticia/esta-no-es-una-vision-ideologica-quiroz-defiende-en-comision-de-medio-ambiente-tecnica-legislativa-para-la-megarreforma/", "fonte_id": "la_tercera", "data_pub": "2026-07-06T22:14:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O ministro de Hacienda, Quiroz, defendeu uma legislação técnica para a megarreforma durante uma discussão na Comisión de Medio Ambiente. Ele enfatizou a importância da liberdade econômica das pessoas e empresas acima do controle estatal.", "titulo_pt": "Esta não é uma visão ideológica: Quiroz defende legislação técnica para a megarreforma ambiental", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 39058, "titulo": "Super El Niño ameaça embaralhar o agro global", "url": "https://braziljournal.com/super-el-nino-ameaca-embaralhar-o-agro-global/", "fonte_id": "brazil_journal", "data_pub": "2026-07-06T20:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O relatório Visão Agro do Itaú BBA indica que o Super El Niño representa um risco para praticamente todas as lavouras globais. Após quatro anos de excesso de oferta no mercado agrícola, este fenômeno climático volta a ser uma preocupação.", "titulo_pt": "Super El Niño ameaça o agro global", "veiculo": "Brazil Journal", "pais": "Brasil", "classe": "B"}, {"id": 38349, "titulo": "Terremotos en Venezuela hoy, EN VIVO: actualización del número de víctimas y desaparecidos, y últimas noticias de este lunes 6 de julio", "url": "https://www.lanacion.com.ar/el-mundo/terremotos-en-venezuela-hoy-en-vivo-actualizacion-del-numero-de-victimas-y-desaparecidos-y-ultimas-nid06072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-06T18:46:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Dias após os terremotos na Venezuela, famílias realizam rituais para despedir-se das vítimas. Existem inconsistências nas informações sobre o número de mortos e desaparecidos.", "titulo_pt": "Terremotos na Venezuela: famílias despidem-se de vítimas e há inconsistências nos números", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 38142, "titulo": "Cuba enfrenta novo apagão geral e 10 milhões ficam sem luz", "url": "https://www.metropoles.com/mundo/cuba-enfrenta-novo-apagao-geral-e-10-milhoes-ficam-sem-luz", "fonte_id": "metropoles", "data_pub": "2026-07-06T18:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Cuba enfrenta um novo apagão geral, afetando 10 milhões de pessoas. Este é o terceiro colapso total do sistema elétrico no país em 2026, sendo que a rede obsoleta e a falta de combustível agravam a situação.", "titulo_pt": "Cuba enfrenta novo apagão geral e 10 milhões ficam sem luz", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 38659, "titulo": "Artists create giant sea animals from sand", "url": "http://www.euronews.com/video/2026/07/06/artists-create-giant-sea-animals-from-sand", "fonte_id": "euronews", "data_pub": "2026-07-06T18:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Artistas criam esculturas de areia gigantes de animais marinhos na Ilha Rab, Croácia, durante o Festival de Esculturas de Areia, transformando a praia em uma exposição temporária.", "titulo_pt": "Artistas criam grandes esculturas de areia de animais marinhos", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 38607, "titulo": "France faces new heatwave with temperatures reaching 40°C", "url": "https://www.lemonde.fr/en/environment/article/2026/07/06/france-faces-new-heatwave-with-temperatures-reaching-40-c_6755211_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-06T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma onda de calor atingiu grande parte do país, com temperaturas chegando a 38°C e até 40°C no sudoeste. A terceira ola de calor do ano é esperada para ser intensa e durar cerca de 12 dias.", "titulo_pt": "França enfrenta nova onda de calor com temperaturas atingindo 40°C", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 39128, "titulo": "Preservação da Amazônia depende de recursos globais e cooperação internacional", "url": "https://exame.com/esg/preservacao-da-amazonia-depende-de-recursos-globais-e-cooperacao-internacional/", "fonte_id": "exame", "data_pub": "2026-07-06T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A preservação da Amazônia depende de recursos globais e cooperação internacional. Um museu local utiliza totens interativos para aproximar o público do conhecimento científico da região amazônica, demonstrando como dados locais podem orientar a bioeconomia.", "titulo_pt": "Preservação da Amazônia depende de recursos globais e cooperação internacional", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 38477, "titulo": "Typhoon Maysak kills two and forces thousands to evacuate in China", "url": "https://www.theguardian.com/world/2026/jul/06/typhoon-maysak-kills-two-and-forces-thousands-to-evacuate-in-china", "fonte_id": "guardian_world", "data_pub": "2026-07-06T17:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um tufão chamado Maysak causou a morte de duas pessoas e forçou milhares a evacuarem no sul da China. O tufão também provocou rompimentos em barragens na província de Guangxi.", "titulo_pt": "Tufão Maysak mata dois e força milhares a se evadirem na China", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 38277, "titulo": "Novo apagão generalizado em Cuba deixa quase 10 milhões no escuro", "url": "https://veja.abril.com.br/mundo/novo-apagao-generalizado-em-cuba-deixa-quase-10-milhoes-no-escuro/", "fonte_id": "veja", "data_pub": "2026-07-06T17:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um novo apagão generalizado afetou Cuba, deixando quase 10 milhões de pessoas sem eletricidade. Este é o terceiro evento de falta de energia desde o início do ano, ocorrendo em meio ao bloqueio energético imposto pelos Estados Unidos.", "titulo_pt": "Novo apagão generalizado atinge Cuba, afetando quase 10 milhões", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 38474, "titulo": "Cuba suffers third nationwide blackout in six months", "url": "https://www.theguardian.com/world/2026/jul/06/cuba-suffers-third-nationwide-blackout-in-six-months", "fonte_id": "guardian_world", "data_pub": "2026-07-06T17:35:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cuba experimentou seu terceiro apagão nacional desde o início do ano, ocorrendo após um bloqueio de óleo imposto pelos Estados Unidos em janeiro. O país já enfrentava dificuldades para manter a energia antes dessa medida.", "titulo_pt": "Cuba sofre com terceiro apagão nacional em seis meses", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 38175, "titulo": "Tufão Maysak atinge a China, provoca enchentes e leva governo a ampliar medidas de emergência", "url": "https://www.brasildefato.com.br/2026/07/06/tufao-maysak-atinge-a-china-provoca-enchentes-e-leva-governo-a-ampliar-medidas-de-emergencia/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-06T17:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O tufão Maysak, após atingir o sul da China, continua a provocar enchentes devido às chuvas persistentes. O governo chinês expandiu as operações de emergência em várias regiões afetadas, incluindo Guangxi.", "titulo_pt": "Tufão Maysak atinge China e amplia medidas de emergência", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 39136, "titulo": "Número de mortos por terremotos na Venezuela sobe para 3.535", "url": "https://exame.com/mundo/numero-de-mortos-por-terremotos-na-venezuela-sobe-para-3-535/", "fonte_id": "exame", "data_pub": "2026-07-06T17:11:00Z", "idioma": "pt", "provavel_duplicata_de": 38995, "texto_pt": "O governo venezuelano atualizou o balanço das vítimas do terremoto que ocorreu no dia 24 de junho, informando que 3.535 pessoas morreram e 16.740 ficaram feridas. O número oficial de desaparecidos ainda não foi divulgado pelas autoridades.", "titulo_pt": "Número de mortos por terremoto na Venezuela sobe para 3.535", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 38107, "titulo": "Cuba sofre mais um apagão generalizado", "url": "https://www.cartacapital.com.br/mundo/cuba-sofre-mais-um-apagao-generalizado/", "fonte_id": "cartacapital", "data_pub": "2026-07-06T16:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Cuba enfrenta mais um apagão generalizado em meio a uma crise energética aprofundada pelo bloqueio petrolífero dos Estados Unidos.", "titulo_pt": "Cuba sofre com novo apagão generalizado", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 38479, "titulo": "Extreme high temperatures double young people’s risk of mental health admissions, Australian research shows", "url": "https://www.theguardian.com/australia-news/2026/jul/07/extreme-high-temperatures-young-people-mental-health-hospital-admission", "fonte_id": "guardian_world", "data_pub": "2026-07-06T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa exclusiva da Universidade de Sydney mostrou que altas temperaturas extremas aumentam o risco de internações hospitalares por saúde mental entre jovens em 100%. O estudo, que analisou 720.000 internações de pessoas com até 24 anos no estado do Nova Gales do Sul, sugere que a crise climática pode agravar o declínio da saúde mental dos jovens.", "titulo_pt": "Temperaturas extremas dobram risco de internações por saúde mental entre jovens, mostra estudo", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 38662, "titulo": "Wildfire rages in eastern Spain, forcing hundreds to flee", "url": "http://www.euronews.com/video/2026/07/06/wildfire-rages-in-eastern-spain-forcing-hundreds-to-flee", "fonte_id": "euronews", "data_pub": "2026-07-06T11:35:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio florestal na Castellón, na Espanha Oriental, obrigou a evacuação de 500 pessoas. Bombeiros e aviões estão lutando para conter as chamas function renderSecao(topico) {

          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}

            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">

         }).join("")}

    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml() : ""}

}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml() {
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">

    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml()}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices().filter(function(v) { return v.lang === 'pt-BR' || v.lang.startsWith('pt'); });
    return vs[0] || null;
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // .sumario ou .destaque-analise imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
