<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 17/07/2026 20:44 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">

</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>

    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>

      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "17/07/2026 20:44", "stats": {"noticias_novas": 204, "resumos_gerados": 230}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O ex-presidente Jair Bolsonaro pediu autorização ao ministro Alexandre de Moraes para receber o economista Leandro Milei, que virá ao Brasil para apoiar a candidatura do filho Flávio Bolsonaro à Presidência. Em outra notícia política, o PT anunciará na próxima segunda-feira Patrus Ananias como seu candidato ao governo de Minas Gerais. A defesa do empresário Marcelo Conde solicitou ao STF que Moraes seja declarado impedido no caso dos vazamentos de dados da Receita Federal. O presidente Lula afirmou que usará a 'arma da palavra' para enfrentar Donald Trump na disputa de narrativas após novas tarifas sobre produtos brasileiros, enquanto o governo mantém optimismo sobre os embarques de carnes para a União Europeia.", "mundo": "O presidente dos Estados Unidos, Donald Trump, continuou ameaçando o Canadá com tarifas devido às queimadas que poluem o ar nos estados norte-americanos. Segundo ele, as queimadas refletem uma falta de gestão florestal adequada e os custos da poluição deveriam ser incluídos nas tarifas. O Canadá já reagiu, afirmando que ambos os países têm igual responsabilidade na luta contra as mudanças climáticas, agravando ainda mais o conflito ambiental entre os dois vizinhos. Em outro desenvolvimento, Portugal aprovou uma lei proibindo o uso da burca em locais públicos, gerando controvérsia política e social no país. Além disso, um terremoto de magnitude 7,3 na costa do México e Guatemala levantou preocupações sobre a possibilidade de tsunami, afetando três países. No Oriente Médio, ataques israelenses em Gaza resultaram na morte de sete pessoas, enquanto o Irã intensificava seus ataques contra alvos iranianos pela sétima noite consecutiva, conforme informado pela mídia estatal iraniana.\n\nA tensão geopolítica entre Estados Unidos e Irã continua a se intensificar. Os EUA realizaram mais uma noite de ataques contra o Irã, sendo que foram sete consecutivas desde o início de setembro. O Irã acusa os Estados Unidos de terem atingido alvos civis. Paralelamente, o Irã atacou um navio petroleiro perto da Ilha de Kharg, na costa do Omã, em seu segundo incidente em dois dias. Além disso, a Força Armada dos EUA realizou ataques contra infraestruturas iranianas nos Estados do Golfo, incluindo mísseis e drones.", "economia": "O mercado financeiro enfrenta volatilidade devido às tensões geopolíticas, especialmente no Oriente Médio. O dólar encerrou o dia com alta contra o real, cotado a R$5,11, enquanto a bolsa brasileira manteve-se estável apesar da incerteza global. O petróleo registrou uma forte alta, contribuindo para as quedas na bolsa. As tensões entre Estados Unidos e Irã continuam afetando o mercado de petróleo, com o Brent subindo 15,9% nesta semana. A Petrobras (PETR4) viu suas ações subirem novamente devido ao avanço dos preços do petróleo. O governo federal discute soluções conjuntas com a indústria para mitigar os efeitos das tarifas impostas pelos Estados Unidos, enquanto o Brasil estuda medidas de reciprocidade em resposta às tarifas. A Anvisa suspendeu a importação de colírios e géis da empresa francesa Excelvision após irregularidades identificadas pela agência reguladora francesa. O especialista Fernando Berardo analisa como as tensões no Oriente Médio estão afetando os preços do petróleo, que por sua vez influenciam a inflação e os mercados financeiros.", "tecnologia": "A Taiwan decidiu manter a tecnologia mais avançada da TSMC, apesar das pressões dos EUA, visando garantir sua liderança global. A Powertech planeja investir em uma joint venture com a Broadcom para desenvolver soluções tecnológicas avançadas. O valor de mercado da Databricks aumentou para US$ 188 bilhões e se manteve como uma das empresas preferidas do setor de inteligência artificial, publicando pesquisas sobre os custos reduzidos dos modelos de peso abertos na codificação. A startup chinesa Moonshot lançou o maior modelo de inteligência artificial aberto do mundo, levantando novos questionamentos sobre a liderança tecnológica americana. O governo Trump está tomando medidas para controlar o acesso às últimas modelagens avançadas de inteligência artificial, transferindo o poder sobre esses modelos dos gigantes da tecnologia. A Apple processou a OpenAI acusando a empresa de ter roubado segredos comerciais e empregado mais de 400 ex-funcionários da Apple, afetando os planos de IPO da OpenAI.", "ciencia": "Um avanço significativo na compreensão da saúde intestinal foi alcançado com a criação de um novo banco de dados, fornecendo informações valiosas para pesquisadores e profissionais de saúde. Sete cientistas do Butantan foram reconhecidos como os mais influentes do mundo, destacando-se nas áreas de imunologia, medicina, biologia molecular e bioquímica. A NASA convidou jornalistas para o lançamento do telescópio espacial Nancy Grace Roman, programado para 30 de agosto de 2026, no Complexo de Lançamento 39A. Além disso, uma nova pesquisa da Queen Mary University of London apresenta uma perspectiva sobre como a gravidade na teoria da entropia pode conectar o segundo princípio da termodinâmica com a emergência de estruturas cósmicas, explorando como o universo se torna cada vez mais complexo sem violar esse princípio.", "cultura": "O Festival de Veneza estreou o filme 'Ink', dirigido por Danny Boyle. O longa-metragem conta a história de Larry Lamb e Rupert Murdoch, focando no nascimento do jornal The Sun. Outro destaque foi a apresentação do grupo sul-coreano BTS em Paris nos dias 17 e 18 de julho, celebrando seu impacto significativo na indústria musical global com o K-pop. O primeiro concerto dos Proms em Londres homenageou os 250 anos da independência dos Estados Unidos, com obras de Copland, Gershwin e uma nova peça inspirada em Emily Dickinson. Além disso, o Festival Internacional de Teatro de São José de Rio Preto abriu com a peça 'FÉsta', do Coletivo Prot{agô}nistas, no Anfiteatro Nelson Castro, sem cerimônias burocráticas.", "sociedade": "Uma série de notícias abrangendo diversos aspectos da sociedade foram publicadas. A primeira destaca a morte de um bebê após trabalho de parto prolongado no Hospital Regional do Gama, no Distrito Federal. A Secretaria está investigando o caso, mas ainda não forneceu uma explicação clara para a perda do recém-nascido. Em outro fato, a deputada Fernanda Melchionna acionou a Procuradoria-Geral da República contra um parlamentar bolsonarista por aprovar uma emenda que busca fragilizar o PL da Misoginia, mostrando tensões políticas e sociais. Além disso, foi relatado um caso de violência doméstica na cidade de Belo Horizonte: uma mulher esfaqueou seu marido e foi baleada pela polícia durante a intervenção, ilustrando os desafios enfrentados em situações familiares tensas. Estes eventos refletem questões sociais complexas, incluindo saúde materna e neonatal, violência doméstica, políticas públicas e relações familiares.", "meio_ambiente": "Uma pesquisa mostrou a presença de microplásticos em uma grande parte dos produtos alimentares infantis examinados, levantando preocupações sobre a contaminação do meio ambiente e a saúde humana. Por outro lado, o Senado brasileiro apresentou um Plano Legislativo que reduz a proteção de uma área florestal no Pará, permitindo o uso da região para agricultura e mineração. Ao mesmo tempo, um terremoto com magnitude 7,3 atingiu a costa do México, acionando um alerta de tsunami na América Latina. Além disso, o número de mortes causadas por terremotos na Venezuela já ultrapassou 5 mil pessoas.", "direitos_humanos": "Um juiz federal americano decidiu a favor do ativista palestino-americano Osama Abu Irshaid, declarando ilegais as buscas e apreensões de seus telefones por agentes alfandegários no Aeroporto Internacional Washington Dulles em 2024. Esta decisão é considerada uma vitória importante na luta contra a discriminação. A diretora executiva do UNICEF, Catherine Russell, visitou o Nigéria enfatizando que o investimento nas crianças é crucial para o futuro do país, destacando seu potencial como a maior oportunidade nacional. Além disso, 19 homens foram acusados de estupro em massa na França, incluindo Christophe B., que foi acusado de ter forçado seis ex-parceiros a participarem de encontros sexuais violentos com dezenas de homens recrutados online ao longo de mais de 20 anos."}, "resumo_do_dia": {"politica_nacional": [{"id": 58094, "titulo": "Justiça nega pedido de anulação de júri do caso Henry", "url": "https://www.cartacapital.com.br/justica/justica-nega-pedido-de-anulacao-de-juri-do-caso-henry/", "fonte_id": "cartacapital", "data_pub": "2026-07-17T22:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ex-vereador Dr. Jairinho foi condenado a 43 anos e 9 meses de prisão pelo julgamento do caso Henry, que envolveu tortura e morte do enteado.", "titulo_pt": "Justiça nega pedido de anulação do júri no caso Henry", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 58102, "titulo": "Patrus Ananias conversa com Lula e deve ser anunciado ao governo de Minas na segunda", "url": "https://veja.abril.com.br/politica/patrus-ananias-conversa-com-lula-e-deve-ser-anunciado-ao-governo-de-minas-na 30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governador interino chorou durante um evento com Lula, que incentivou o governante a não ter medo. Durante a visita à carreta da saúde da mulher na Fiocruz, o governador expressou emoção ao agradecer Lula.", "titulo_pt": "Couto chora em encontro com Lula, que pede para governador 'não ter medo'", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 58142, "titulo": "Aumento da dívida pública recoloca títulos isentos em debate", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/aumento-da-divida-publica-recoloca-titulos-isentos-em-debate/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T22:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Tesouro Nacional está considerando alterações nos investimentos isentos de imposto de renda enquanto procura aumentar a demanda por títulos públicos. Este movimento surge em um momento em que a dívida pública do governo tem aumentado.", "titulo_pt": "Aumento da dívida pública recoloca títulos isentos em debate", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 58087, "titulo": "Lucas Kallas deixa comando do grupo Cedro semanas após ser indiciado pela PF", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/lucas-kallas-deixa-comando-do-grupo-cedro-semanas-apos-ser-indiciado-pela-pf.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T22:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Lucas Kallas deixou o comando da presidência do conselho de administração da Cedro Participações após ser indiciado pela Polícia Federal. José Carlos Martins, que já integra a companhia desde 2018, assumiu o cargo.", "titulo_pt": "Lucas Kallas deixa comando da Cedro semanas após ser indiciado", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 58092, "titulo": "Flávio tem 42% dos votos contra 36% de Lula , {"id": 58090, "titulo": "Defesa de Buzzi apresenta laudo de disfunção erétil e pede absolvição em caso de assédio sexual", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/defesa-de-buzzi-apresenta-laudo-de-disfuncao-eretil-e-pede-absolvicao-em-caso-de-assedio-sexual.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-17T22:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A defesa de Marco Buzzi solicitou ao STJ a absolvição do ministro das acusações de importunação e assédio sexual. Os advogados argumentam que as alegações são falsas e que os depoimentos das vítimas apresentam contradições sem suporte por outras provas.", "titulo_pt": "Defesa de Buzzi pede absolvição em caso de assédio sexual", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 58098, "titulo": "9 sopas deliciosas e nutritivas para ajudar a emagrecer", "url": "https://www.cartacapital.com.br/receitas/9-sopas-deliciosas-e-nutritivas-para-ajudar-a-emagrecer/", "fonte_id": "cartacapital", "data_pub": "2026-07-17T22:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As sopas são uma ótima opção para quem deseja perder peso de forma equilibrada e saborosa, pois são nutritivas e promovem maior sensação de saciedade. Elas podem ser preparadas com diversos ingredientes, facilitando a criação de refeições leves.", "titulo_pt": "9 Sopas deliciosas e nutritivas para ajudar a emagrecer", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 58099, "titulo": "Torta vegetariana proteica: 3 receitas práticas para o lanche da tarde", "url": "https://www.cartacapital.com.br/receitas/torta-vegetariana-proteica-3-receitas-praticas-para-o-lanche-da-tarde/", "fonte_id": "cartacapital", "data_pub": "2026-07-17T22:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As tortas vegetarianas são uma boa opção para diversificar a dieta sem perder o sabor, utilizando i b": "2026-07-17T22:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Parlamento de Portugal aprovou uma lei que proíbe o uso da burca em locais públicos. A candidata Rita Matias, do partido Chega (ultradireita), havia expressado publicamente seuposição contra o uso do hijab em campanha eleitoral.", "titulo_pt": "Parlamento de Portugal aprova lei que proíbe uso da burca em locais públicos", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 58268, "titulo": "White House defends Argentina team over Falklands banner", "url": "https://www.bbc.co.uk/news/articles/cx2rmjk0740o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-17T22:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo dos Estados Unidos defendeu a equipe argentina durante o incidente envolvendo uma bandeira das Falklands. Isso pode agravar a disputa sobre o ocorrido, que já viu o governo britânico apoiar as chamadas para investigação da Fifa.", "titulo_pt": "Branco casa defende time argentino sobre bandeira das Falklands", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 58273, "titulo": "US launches seventh straight night of strikes on Iran", "url": "https://www.aljazeera.com/news/2026/7/17/us-launches-seventh-straight-night-of-strikes-on-iran?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-17T22:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Força Armada dos Estados Unidos realizou mais uma noite de ataques contra o Irã, sendo que esta é a sétima noite consecutiva. O Irã acusa os EUA de alvos civis, enquanto as forças americanas afirmam estar degradando as capacidades militares iranianas.", "titulo_pt": "EUA lançam sétimo dia consecutivo de ataques ao Irã", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 58275, "titulo": "Five blasts heard in Yazd, in center of Iran, report says", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/five-blasts-heard-yazd-center-iran-report-says", "fonte_id": "middle_east_eye", "data_pub": "2026-07-17T22:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cinco explosões foram ouvidas na cidade de Yazd, no centro da Irã, na madrugada de sábado. A Agência Estatal de Notícias IRNA informou que essas explosões ocorreram após anúncios de novos ataques dos Estados Unidos contra o país. Uma outra agência iraniana, a Mehr, relatou explosões em várias províncias do sul do país.", "titulo_pt": "Cinco explosões ouvidas em Yazd, no centro da Irã", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 58179, "titulo": "Estados Unidos rechaza que México se meta en la gestión del ICE y le devuelve las cartas de protesta por las muertes de migrantes", "url": "https://elpais.com/mexico/2026-07-17/estados-unidos-rechaza-que-mexico-se-meta-en-la-gestion-del-ice-y-le-devuelve-las-cartas-de-protesta-por-las-muertes-de-migrantes.html", "fonte_id": "elpais_america", "data_pub": "2026-07-17T22:02:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O governo de Sheinbaum solicitou a Washington o fim das ações e omissões nas instalações do ICE após 17 mexicanos morrerem. Os Estados Unidos rejeitaram que o México interfira em questões que competem à soberania norte-americana.", "titulo_pt": "EUA rejeitam intervenção do México na gestão do ICE sobre mortes de migrantes", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 58093, "titulo": "Canadá tem mais de 200 incêndios florestais fora de controle", "url": "https://www.poder360.com.br/poder-internacional/canada-tem-mais-de-200-incendios-florestais-fora-de-controle/", "fonte_id": "poder360", "data_pub": "2026-07-17T22:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Canadá registra mais de 200 incêndios florestais fora de controle nesta sexta-feira (17.jul), com 897 focos ativos. A fumaça proveniente desses lasse": "A"}, {"id": 58086, "titulo": "Petróleo sobe mais de 4% nesta sexta (17) e registra maior alta semanal desde abril", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://aovivo.folha.uol.com.br/mercado/2026/07/01/6533-dolar-empresas-e-bolsas-acompanhe-ao-vivo-o-mercado.shtml#post466183", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T22:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O petróleo Brent subiu 4,63% para US$ 88,13 nesta sexta-feira (17), após a escalada da guerra no Irã. A tensão aumentou com ataques entre Estados Unidos e Irã que afetaram infraestruturas essenciais.", "titulo_pt": "Petróleo sobe mais de 4% nesta sexta (17) e registra maior alta semanal desde abril", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 58205, "titulo": "Pampa Energía invertirá US$2700 millones para construir la planta de urea más grande de la región", "url": "https://www.lanacion.com.ar/economia/pampa-energia-invertira-us2700-millones-para-construir-la-planta-de-urea-mas-grande-de-la-region-nid17072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-17T22:35:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A empresa Pampa Energía investirá US$2.7 bilhões na construção de uma planta de ureia, que criará mais de 3.500 empregos e será a maior do região. A instalação será localizada em Bahía Blanca, na província de Buenos Aires.", "titulo_pt": "Pampa Energía investirá r$9,78 bilhões para construir a maior planta de ureia da região no rio grande do sul", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 58143, "titulo": "BRB encerra negociação com gestora para vender R$ 15 bi em ativos do Master", "url": "https://www.cnnbrasil.com.br/economia/negocios/brb-encerra-negociacao-com-gestora-para-vender-r-15-bi-em-ativos-do-master/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T22:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Banco Regional de Brasília encerrou as negociações com uma gestora de investimentos para a venda de R$ 15 bilhões em ativos que foram adquiridos da instituição de Daniel Vorcaro.", "titulo_pt": "BRB interrompe negociação com gestora para vender R$ 15 bi em ativos", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 58148, "titulo": "Petróleo fecha em alta com escalada de tensões no Oriente Médio", "url": "https://www.cnnbrasil.com.br/economia/mercado/petroleo-fecha-em-alta-com-escalada-de-tensoes-no-oriente-medio/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T22:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O preço do petróleo fechou em alta durante a semana, impulsionado por aumentos de 14,5% no WTI e de 15,9% no Brent. As tensões crescentes no Oriente Médio contribuíram para essa elevação.", "titulo_pt": "Petróleo fecha em alta com aumento da tensão no Oriente Médio", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 58153, "titulo": "Tarifaço: Governo se reúne com indústria para discutir solução conjunta", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/tarifaco-governo-se-reune-com-industria-para-discutir-solucao-conjunta/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T22:04:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo se reúne com a indústria para discutir soluções conjuntas diante do tarifaço. A criação de uma sétima missão da Nova Indústria Brasil visa mitigar os efeitos da tarifa adicional.", "titulo_pt": "Tarifaço: governo se reúne com indústria para discutir solução conjunta", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 58088, "titulo": "BRB e Quadra Capital encerram negociações para fundo de R$ 15 bi com ativos do Master", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/brb-e-quadra-capital-encerram-negociacoes-para-fundo-de-r-15-bi-com-ativos-do-master.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T22:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O BRB e a gestora Quadra Capital encerraram as negociações para a criação de um fundo com ativos do Banco Master no valor de R$ 15 bilhões. As tratativas envolviam a venda desses ativos.", "titulo_pt": "BRB e Quadra Capital encerram negociações para fundo de R$ 15 bi com ativos do Master", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 58156, "titulo": "Consumidores de açúcar dos EUA pedem que governo permita mais importações", "url": "https://www.cnnbrasil.com.br/agro/consumidores-de-acucar-dos/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T22:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Consumidores de açúcar dos Estados Unidos estão pedindo ao governo que permita maiores importações com tarifas menores, alegando estoques insuficientes.", "titulo_pt": "Consumidores de açúcar dos EUA pedem mais importações", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 58157, "titulo": "IPCA abaixo do esperado faz títulos prefixados dispararem", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/ipca-abaixo-do-esperado-faz-titulos-prefixados-dispararem/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T22:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A desaceleração da inflação, medida pelo IPCA abaixo do esperado, fez os juros futuros caírem e valorizar os títulos prefixados, recolocando a renda fixa no interesse dos investidores.", "titulo_pt": "Ipc abaixo do esperado faz títulos prefixados dispararem", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 57262, "titulo": "CVM institui GT para estudar tokenização de valores mobiliários", "url": "https://www.cnnbrasil.com.br/economia/cvm-institui-gt-para-estudar-tokenizacao-de-valores-mobiliarios/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T21:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A CVM instituiu um Grupo de Trabalho para estudar a tokenização de valores mobiliários e deverá apresentar, em 60 dias, uma proposta de regime regulatório experimental.", "titulo_pt": "CVM institui GT para estudar tokenização de valores mobiliários", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 57265, "titulo": "China orienta montadoras a reforçarem verificações de segurança e qualidade", "url": "https://www.cnnbrasil.com.br/economia/negocios/china-orienta-montadoras-a-reforcarem-verificacoes-de-seguranca-e-qualidade/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T21:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As montadoras chinesas são orientadas a reforçar as verificações de segurança e qualidade, identificando problemas relacionados à consistência da produção, confiabilidade e durabilidade. Elas devem avaliar completamente os riscos à segurança ao lançarem novos projetos e produtos.", "titulo_pt": "China instrui montadoras a intensificar verificações de segurança e qualidade", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 57104, "titulo": "'Não saímos da mesa de negociação', diz Alckmin após Trump impor novo tarifaço a produtos brasileiros", "url": "https://g1.globo.com/politica/blog/julia-duailibi/post/2026/07/17/nao-saimos-da-mesa-de-negociacao-diz-alckmin-apos-trump-impor-novo-tarifaco-a-produtos-brasileiros.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-17T21:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Geraldo Alckmin afirmou que o Brasil não deixou a mesa de negociação com os Estados Unidos após a imposição de novas tarifas. O vice-presidente criticou a medida, considerando-a injusta e descabida.", "titulo_pt": "Alckmin afirma que Brasil permanece na mesa de negociação após nova tarifa dos EUA", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 57867, "titulo": "Taiwan to keep best TSMC tech despite US push", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/18/2003860953", "fonte_id": "taipei_times", "data_pub": "2026-07-18T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Taiwan decidiu manter a tecnologia mais avançada da TSMC, apesar das pressões dos EUA. A decisão visa garantir que a empresa mantenha sua liderança tecnológica global.", "titulo_pt": "Taiwan manterá melhor tecnologia da TSMC contra pressão dos EUA", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 57884, "titulo": "Powertech to invest in venture with Broadcom", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/18/2003860928", "fonte_id": "taipei_times", "data_pub": "2026-07-18T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Powertech planeja investir em uma joint venture com a Broadcom. Este acordo visa combinar as habilidades das duas empresas para desenvolver soluções tecnológicas avançadas.", "titulo_pt": "Powertech vai investir em joint venture com a Broadcom", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 58279, "titulo": "Vertu wants executives to pay $6,880 for an AI agent — here’s how it actually performs", "url": "https://techcrunch.com/2026/07/17/vertu-wants-executives-to-pay-6880-for-an-ai-agent-heres-how-it-actually-performs/", "fonte_id": "techcrunch", "data_pub": "2026-07-17T22:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os executivos podem pagar US$ 6,880 por um agente de inteligência artificial no Vertu. O dispositivo oferece funcionalidades como fluxos de trabalho de IA, vida útil da bateria e segurança, mas não há detalhes específicos sobre o desempenho diário do dispositivo.", "titulo_pt": "Vertu quer executivos pagarem us$ 6,880 por um agente de inteligência artificial - aqui está como ele realmente se porta", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 58280, "titulo": "Databricks hits $188B valuation, extending its run as AI’s favorite second act", "url": "https://techcrunch.com/2026/07/17/databricks-hits-188b-valuation-extending-its-run-as-ais-favorite-second-act/", "fonte_id": "techcrunch", "data_pub": "2026-07-17T22:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Databricks aumentou sua avaliação para US$ 188 bilhões, mantendo-se como uma das empresas preferidas do setor de inteligência artificial. A empresa publicou pesquisas sobre os custos reduzidos dos modelos de peso abertos na codificação.", "titulo_pt": "Databricks atinge valorização de us$ 188 bilhões e continua como favorita do AI", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 58270, "titulo": "The White House is dictating access to frontier AI models, shifting power from tech giants", "url": "https://www.cnbc.com/2026/07/17/white-house-ai-access-anthropic-openai.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-17T22:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo Trump está tomando medidas para controlar o acesso às últimas modelos avançados de inteligência artificial, segundo fontes informadas ao CNBC. O poder sobre esses modelos está sendo transferido dos gigantes da tecnologia.", "titulo_pt": "Governo trump está regulando acesso a modelos avançados de IA", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 58277, "titulo": "‘Made in EU’: How Europe plans to use China’s tech to pull level with its EV rival by 2028", "url": "https://www.scmp.com/economy/china-economy/article/3356569/made-eu-how-europe-plans-use-chinas-tech-pull-level-its-ev-rival-2028?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-17T22:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Policitantes europeus têm observado a ascensão das montadoras chinesas, que chegaram de forma gradual e dominante, ameaçando uma das principais realizações industriais da Europa. O setor automotivo representa mais de 13 milhões de empregos na União Europeia.", "titulo_pt": "'Feito na ue': como a Europa planeja usar a tecnologia chinesa para se igualar ao rival EV até 2028", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 57263, "titulo": "Startup chinesa Moonshot revela maior modelo de IA aberto do mundo", "url": "https://www.cnnbrasil.com.br/economia/negocios/startup-chinesa-moonshot-revela-maior-modelo-de-ia-aberto-do-mundo/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T21:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A startup chinesa Moonshot lançou o maior modelo de inteligência artificial aberto do mundo, destacando a rápida evolução do ecossistema chinês de IA. O lançamento reduz a diferença entre os sistemas avançados da China e os Estados Unidos.", "titulo_pt": "Startup chinesa Moonshot revela maior modelo de IA aberto do mundo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 57900, "titulo": "The Zoom hack that says, ‘Don’t record me’", "url": "https://techcrunch.com/2026/07/17/the-zoom-hack-that-says-dont-record-me/", "fonte_id": "techcrunch", "data_pub": "2026-07-17T21:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Se todas as reuniões, conversas no watercooler e encontros amorosos forem transcritas e resumidas, quem realmente lê qualquer uma dessas informações?", "titulo_pt": "O hack do Zoom que diz 'não me grave'", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 57531, "titulo": "Acciones de SpaceX se hunden a nuevos mínimos luego del fallido lanzamiento su cohete Starship", "url": "https://www.latercera.com/pulso/noticia/acciones-de-spacex-se-hunden-a-nuevos-minimos-luego-del-fallido-lanzamiento-su-cohete-starship/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T21:18:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A SpaceX cancelou o lançamento de seu foguete Starship, previsto para Texas às 17:45 da quinta-feira, devido a uma falha nos motores. As ações da empresa caíram para novos mínimos após o fracasso.", "titulo_pt": "Ações da SpaceX caem a novos mínimos após falha no lançamento do Starship", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 57260, "titulo": "Moonshot: a startup chinesa que desafia os LLMs americanos", "url": "https://braziljournal.com/moonshot-a-startup-chinesa-que-desafia-os-llms-americanos/", "fonte_id": "brazil_journal", "data_pub": "2026-07-17T20:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um modelo de inteligência artificial da startup chinesa Moonshot, chamado Kimi K3, com 2,8 trilhões de parâmetros, alcançou desempenho semelhante aos dos melhores sistemas de AI das empresas americanas. Isso levanta novos questionamentos sobre os valores das grandes tecnológicas norte-americanas.", "titulo_pt": "Moonshot: a startup chinesa que desafia os modelos de IA americanos", "veiculo": "Brazil Journal", "pais": "Brasil", "classe": "B"}, {"id": 57286, "titulo": "ChatGPT hacker: OpenAI lança IA para detectar falhas em futuros modelos", "url": "https://www.cnnbrasil.com.br/tecnologia/chatgpt-hacker-openai-lanca-ia-para-detectar-falhas-em-futuros-modelos/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T20:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um hacker usou o modelo GPT-5.6 Sol, a IA mais potente da OpenAI até agora, para treinar outro modelo. A notícia não fornece detalhes adicionais sobre as consequências ou o propósito dessa atividade.", "titulo_pt": "Hacker usa gpt-5.6 sol, IA mais avançada da openai, para treinar novo modelo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 57901, "titulo": "Agility Robotics plants its flag in Tesla’s backyard", "url": "https://techcrunch.com/2026/07/17/agility-robotics-plants-its-flag-in-teslas-backyard/", "fonte_id": "techcrunch", "data_pub": "2026-07-17T20:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Agility Robotics está abrindo um novo centro de treinamento para seus robôs Digit em Fremont, Califórnia. A localização do centro de treinamento se encontra perto da sede da Tesla, também em Fremont.", "titulo_pt": "Agility Robotics estende sua presença na porta da Tesla", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 57902, "titulo": "AI-driven memory crunch jolts India’s smartphone market", "url": "https://techcrunch.com/2026/07/17/ai-driven-memory-crunch-jolts-indias-smartphone-market/", "fonte_id": "techcrunch", "data_pub": "2026-07-17T20:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O desaceleramento do mercado de smartphones na Índia destaca como a onda de AI está remodelando os eletrônicos consumísticos, afetando tanto o preço e a demanda quanto as estratégias corporativas.", "titulo_pt": "Ai impulsiona reestruturação no mercado de smartphones indiano", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 57847, "titulo": "Google-backed satellites for wildfire detection launch as smoke chokes US, Canada", "url": "https://arstechnica.com/space/2026/07/google-backed-satellites-for-wildfire-detection-launch-as-smoke-chokes-us-canada/", "fonte_id": "ars_technica", "data_pub": "2026-07-17T19:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Satélites do programa FireSat, apoiados pela Google, foram lançados para detecção de incêndios florestais. Esses satélites podem identificar focos de incêndio que outros satélites deixam passar.", "titulo_pt": "Satélites apoiados pela google para detecção de incêndios florestais são lançados durante período de fumaça no canadá e estados unidos", "veiculo": "Ars Technica", "pais": "EUA", "classe": "B"}, {"id": 57915, "titulo": "AWS Billing Glitch Hits Customers With Billion-Dollar Fees", "url": "https://www.wired.com/story/amazon-web-services-glitch-oh-no/", "fonte_id": "wired", "data_pub": "2026-07-17T19:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um erro no sistema de cobrança da AWS fez com que algumas contas de clientes fossem faturadas em bilhões de dólares, ao invés dos valores normais que variam apenas alguns centavos.", "titulo_pt": "Erro na faturação da AWS causa cobranças em bilhões para clientes", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 57903, "titulo": "Apple and Google ordered to purge ‘nudify’ apps from App Stores", "url": "https://techcrunch.com/2026/07/17/apple-and-google-ordered-to-purge-nudify-apps-from-app-stores/", "fonte_id": "techcrunch", "data_pub": "2026-07-17T19:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O procurador-geral de São Francisco, David Chiu, enviou cartas a Apple e Google exigindo que as duas empresas removam aplicativos que violam a lei local. Ambas as empresas são acusadas de hospedarem apps ilegais por um longo período.", "titulo_pt": "Apple e Google ordenados a removerem aplicativos 'nudify' das lojas de aplicativos", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 57877, "titulo": "Breakthrough made in gut health with new database", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/18/2003860963", "fonte_id": "taipei_times", "data_pub": "2026-07-18T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo banco de dados foi desenvolvido que avançou na compreensão da saúde intestinal. Este banco de dados proporciona informações valiosas para pesquisadores e profissionais de saúde.", "titulo_pt": "Avanço na saúde intestinal com novo banco de dados", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 58158, "titulo": "Butantan tem sete pesquisadores entre cientistas mais influentes do mundo", "url": "https://www.cnnbrasil.com.br/ciencia/butantan-tem-sete-pesquisadores-entre-cientistas-mais-influentes-do-mundo/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T22:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Butantan teve sete pesquisadores reconhecidos como cientistas mais influentes do mundo pelo levantamento internacional da Research. Os pesquisas foram destacados nas áreas de imunologia, medicina, biologia molecular e bioquímica.", "titulo_pt": "Butantan tem sete pesquisadores entre os mais influentes do mundo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 58283, "titulo": "Remembering 'Ulysses 31', the '80s cartoon that transported 'The Odyssey' to outer space", "url": "https://www.space.com/entertainment/space-movies-shows/remembering-ulysses-31-the-80s-cartoon-that-transported-the-odyssey-to-outer-space", "fonte_id": "space_com", "data_pub": "2026-07-17T22:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ulysses 31 foi uma animação da década de 1980 que adaptou a Odisséia de Homero para o espaço exterior. O programa era conhecido por sua melodia memorável.", "titulo_pt": "Lembrando 'Ulysses 31', a animação dos anos 80 que levou 'a odisséia' ao espaço", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 57937, "titulo": "Tuberculosis drug discovery gets smarter with AI", "url": "https://phys.org/news/2026-07-tuberculosis-drug-discovery-smarter-ai.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T21:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os pesquisadores frequentemente acabam com muitas opções ao screening de possíveis medicamentos para tuberculose, algumas das quais parecem promissoras mas acabam sendo caminhos sem saída financeiramente onerosos.", "titulo_pt": "Descoberta de medicamentos contra tuberculose ganha inteligência artificial", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 57290, "titulo": "Descubra data e onde será possível ver o próximo eclipse total do Sol", "url": "https://veja.abril.com.br/ciencia/descubra-data-e-onde-sera-possivel-ver-o-proximo-eclipse-total-do-sol/", "fonte_id": "veja", "data_pub": "2026-07-17T21:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O próximo eclipse total do Sol está programado para o dia 12 de agosto, mas não será visível no Brasil.", "titulo_pt": "Descubra data e onde será possível ver o próximo eclipse total do Sol", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 57974, "titulo": "Inside the fight against the parasite Cyclospora", "url": "https://www.sciencenews.org/article/cyclospora-outbreak-lettuce-diarrhea", "fonte_id": "science_news", "data_pub": "2026-07-17T21:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O parasita Cyclospora está causando casos de diarreia explosiva nos Estados Unidos. Contenção da epidemia será desafiadora.", "titulo_pt": "Dentro da luta contra o parasita Cyclospora", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 57980, "titulo": "Establishing a VTE Risk Score for Astronauts Algorithm", "url": "https://www.nasa.gov/organizations/ochmo/establishing-a-vte-risk-score-for-astronauts-algorithm/", "fonte_id": "nasa_news", "data_pub": "2026-07-17T21:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em abril de 2026, o Escritório do Chefe da Saúde e Medicina Espacial (OCHMO) da NASA formou um grupo de trabalho para revisar informações atualizadas sobre casos de DVT, analisar dados adicionais que revelam alterações no fluxo sanguíneo em uma amostra de astronautas, e discutir o progresso das pesquisas e atividades clínicas visando mitigar o risco de DVT durante a viagem espacial.", "titulo_pt": "Estabelecendo um índice de risco para VTE entre astronautas", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 58015, "titulo": "These 'metallic' dunes on Mars look like sci-fi. What are they really?", "url": "https://www.space.com/astronomy/mars/these-metallic-dunes-on-mars-look-like-sci-fi-what-are-they-really", "fonte_id": "space_com", "data_pub": "2026-07-17T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Imagens recentes do órbitar Mars Express da Agência Espacial Europeia mostram ondulações estranhas nas dunas de areia vermelha do Planeta Vermelho. Essas formações lembram efeitos de ficção científica.", "titulo_pt": "Essas 'ondulações metálicas' em marte parecem ficção científica. Mas o que são elas realmente?", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 57962, "titulo": "Opinion: What the 20th-century war on smog tells us about today’s wildfire smoke", "url": "https://www.statnews.com/2026/07/17/wildfire-smoke-air-quality-smog-policy-climate-change/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-17T20:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo explica como a evolução das políticas de controle da poluição do ar pode fornecer lições sobre como responder à névoa perigosa causada pelos incêndios florestais canadenses.", "titulo_pt": "Opinião: o que a guerra contra a sujeira do ar do século xx nos diz sobre as fumaças dos incêndios florestais atuais", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 57938, "titulo": "Herbularyo card game blends Filipino folklore and organic chemistry", "url": "https://phys.org/news/2026-07-herbularyo-card-game-blends-filipino.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T20:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Planta medicinal têm sido uma parte importante da medicina filipina tradicional há gerações. Herbs como tawa-tawa, aloe vera, guava leaves e yerba buena são usados para tratar dengue, feridas e dores leves, enquanto ampalaya ajuda no controle da diabetes.", "titulo_pt": "Jogo de cartas combina mitologia filipina com química orgânica", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 57981, "titulo": "NASA Awards Facilities Support Services Contract for Ames Research Center", "url": "https://www.nasa.gov/centers-and-facilities/ames/nasa-awards-facilities-support-services-contract-for-ames-research-center/", "fonte_id": "nasa_news", "data_pub": "2026-07-17T20:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA contratou a Chugach Intelligence Solutions LLC para fornecer serviços de operações, manutenção e reparos completos para o Centro Ames de Pesquisas na Califórnia. O contrato garante que as instalações históricas e especializadas do centro estejam adequadamente mantidas e prontas para suportar as missões da agência e os parceiros locais no Parque de Pesquisa da NASA.", "titulo_pt": "NASA contrata serviços de manutenção para o centro Ames de pesquisas", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 57982, "titulo": "NASA’s Chandra and IXPE Study Pulsar in Lighthouse Nebula", "url": "https://www.nasa.gov/image-article/nasas-chandra-and-ixpe-study-pulsar-in-lighthouse-nebula/", "fonte_id": "nasa_news", "data_pub": "2026-07-17T20:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Esta imagem composta, lançada em 9 de julho de 2026, mostra a região ao redor de um pulsar – uma estrela de neutrons com campo magnético forte que rota com incrível velocidade – dentro da Nuvem Lanterninha. A imagem incorpora dados X-rays do Observatório X-ray Chandra da NASA em purpura e X-rays do Explorador X-ray Polarimetria Imagem IXPE da NASA em azul.", "titulo_pt": "Estudo da nasa com Chandra e IXPE no Pulsar da nuvem lanterninha", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 57939, "titulo": "Amazon soy pact collapse could add 1.4 million hectares of deforestation by 2036", "url": "https://phys.org/news/2026-07-amazon-soy-pact-collapse-million.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T19:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O colapso de um pacto importante sobre soja na Amazônia levará a uma extração adicional de pelo menos 1,4 milhão de hectares de floresta em território brasileiro nos próximos dez anos, liberando emissões de carbono equivalentes às anuais da Canadá.", "titulo_pt": "Colapso do pacto soja na amazônia pode gerar 1,4 milhões de hectares a mais de desmatamento até 2036", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 57309, "titulo": "As pessoas com tipo raro de nanismo que podem guardar 'segredo' contra câncer e diabetes: 'Vivemos em um mundo de gigantes'", "url": "https://www.bbc.com/portuguese/articles/c70gjd479k9o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-17T19:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Cerca de um terço dos casos de síndrome de Laron do mundo estão no Equador, especialmente no sul do país. Essas pessoas têm uma menor probabilidade de desenvolver câncer ou sofrer de diabetes.", "titulo_pt": "Pessoas com raro tipo de nanismo podem ter 'segredo' contra câncer e diabetes: 'vivemos em um mundo de gigantes'", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 57983, "titulo": "La NASA invita a los medios de comunicación al lanzamiento del telescopio espacial Roman", "url": "https://www.nasa.gov/news-release/la-nasa-invita-a-los-medios-de-comunicacion-al-lanzamiento-del-telescopio-espacial-roman/", "fonte_id": "nasa_news", "data_pub": "2026-07-17T19:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Está aberto o prazo de inscrição para a credencialização de jornalistas interessados no lançamento do telescópio espacial Nancy Grace Roman da NASA, programado para não antes das 7:20 da manhã do domingo, 30 de agosto. O evento ocorrerá em horário local doeste dos Estados Unidos.", "titulo_pt": "NASA convoca mídia para lançamento do telescópio espacial Roman", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 57940, "titulo": "Fatal car crashes in the US rise the day after a major mass shooting incident, finds new study", "url": "https://phys.org/news/2026-07-fatal-car-day-major-mass.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T19:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo recente descobriu que os acidentes de carro fatais nos Estados Unidos tendem a aumentar no dia seguinte a um incidente de mass shooting. As coberturas constantes dessas tragédias podem deixar as pessoas ansiosas, distraídas e emocionalmente sobrecarregadas.", "titulo_pt": "Acidentes de carro fatais nos EUA aumentam após incidentes de mass shooting", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 58285, "titulo": "Danny Boyle’s ‘Ink’ Sells to Netflix in First Big Sale (Way) Ahead of Venice Premiere", "url": "https://www.indiewire.com/news/breaking-news/danny-boyle-ink-netflix-venice-sale-1235206128/", "fonte_id": "indiewire", "data_pub": "2026-07-17T22:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O filme 'Ink', sobre Larry Lamb, Rupert Murdoch e a origem do jornal The Sun, será o filme de abertura no Festival de Veneza. A Netflix adquiriu os direitos do filme antes mesmo da exibição no festival.", "titulo_pt": "Danny Boyle’s ‘Ink’ Sells to Netflix como filme de abertura antecipado de veneza", "veiculo": "IndieWire (cinema)", "pais": "EUA", "classe": "B"}, {"id": 58269, "titulo": "BTS, the South Korean group that propelled K-pop to the top of the global music industry", "url": "https://www.lemonde.fr/en/culture/article/2026/07/18/bts-the-south-korean-group-that-propelled-k-pop-to-the-top-of-the-global-music-industry_6755587_30.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-17T22:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O grupo sul-coreano BTS se apresenta no Stade de France nos dias 17 e 18 de julho. A banda começou sua jornada em 2013 e teve um inesperado ascenso global, levando o K-pop à liderança da indústria musical mundial.", "titulo_pt": "BTS, o grupo sul-coreano que elevou o K-pop ao topo da indústria musical global", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 58282, "titulo": "First Night of the Proms review – 250th anniversary of US independence takes centre stage", "url": "https://www.theguardian.com/music/2026/jul/17/first-night-of-the-proms-review-250th-anniversary-of-us-independence-takes-centre-stage", "fonte_id": "guardian_culture", "data_pub": "2026-07-17T22:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O primeiro concerto dos Proms celebrou os 250 anos da independência dos Estados Unidos, com obras de Copland, Gershwin e uma nova peça baseada em Emily Dickinson. O evento marca o início de mais uma temporada do festival, que é considerado o maior festival de música clássica do mundo.", "titulo_pt": "Primeira noite dos Proms: celebração da independência dos EUA comemora 250 anos", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 58110, "titulo": "‘Xica da Silva’: clássico com Zezé Motta volta remasterizado aos cinemas", "url": "https://veja.abril.com.br/coluna/veja-recomenda/xica-da-silva-classico-com-zeze-motta-volta-remasterizado-aos-cinemas/", "fonte_id": "veja", "data_pub": "2026-07-17T22:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O filme 'Xica da Silva', dirigido por Cacá Diegues, estreou há 50 anos no Brasil e agora retorna aos cinemas remasterizado.", "titulo_pt": "'Xica da Silva': clássico com Zezé Motta volta remasterizado aos cinemas", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 58286, "titulo": "‘The Doomies’ Could Be the Spiritual Successor to ‘Gravity Falls’ That Animation Needs", "url": "https://www.indiewire.com/features/commentary/the-doomies-disney-plus-show-gravity-falls-1235206088/", "fonte_id": "indiewire", "data_pub": "2026-07-17T22:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "The Doomies é uma obra de animação no Disney+ que mistura elementos de 'Evil Dead' e 'Buffy the Vampire Slayer', criando um filme de comédia e horr nto-de-alimentos-producto-de-las-lluvias/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T21:16:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Sociedade Nacional de Agricultura (SNA) informou que, até o momento, não foram registrados danos significativos na produção agrícola devido às chuvas. Até agora, não há riscos percebidos para o abastecimento de alimentos.", "titulo_pt": "Gremio da agricultura descarta, por now, riscos para o abastecimento de alimentos devido às chuvas", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 57190, "titulo": "Número de mortes por terremotos na Venezuela ultrapassa 5 mil", "url": "https://www.metropoles.com/mundo/numero-de-mortes-por-terremotos-na-venezuela-ultrapassa-5-mil", "fonte_id": "metropoles", "data_pub": "2026-07-17T21:03:00Z", "idioma": "pt", "provavel_duplicata_de": 57120, "texto_pt": "O número de mortes por terremotos na Venezuela aumentou para mais de 5 mil, com 139 novas vítimas fatais registradas nesta sexta-feira (17/7). Mais de 16,7 mil pessoas foram feridas.", "titulo_pt": "Número de mortos por terremotos na Venezuela passa de 5 mil", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 57227, "titulo": "Mortes por terremotos na Venezuela passam de 5 mil", "url": "https://www.brasildefato.com.br/2026/07/17/mortes-por-terremotos-na-venezuela-passam-de-5-mil/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-17T20:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O número de mortes por terremotos na Venezuela atingiu 5.069, conforme balanço oficial divulgado pela Assembleia Nacional. Além disso, foram registrados 16.740 feridos e 17.907 pessoas sem moradia.", "titulo_pt": "Mortes por terremotos na Venezuela ultrapassam 5 mil", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 57543, "titulo": "Aguas Andinas mantiene monitoreo de ríos Maipo y Mapocho por lluvias e indica que no se reportan episodios de turbiedades", "url": "https://www.latercera.com/nacional/noticia/aguas-andinas-mantiene-monitoreo-de-rios-maipo-y-mapocho-por-lluvias-e-indica-que-no-se-reportan-episodios-de-turbiedades/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T19:07:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Aguas Andinas continua monitorando os rios Maipo e Mapocho devido às chuvas, sem relatos de turbidez. As instalações de produção de água potável da empresa estão operando normalmente.", "titulo_pt": "Aguas Andinas mantém monitoramento dos rios Maipo e Mapocho por causa das chuvas", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 57240, "titulo": "Terremoto de magnitude 7,3 atinge costa do México e aciona alerta de tsunami na América Latina", "url": "https://www.brasildefato.com.br/2026/07/17/terremoto-de-magnitude-73-atinge-costa-do-mexico-e-aciona-alerta-de-tsunami-na-america-latina/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-17T18:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um terremoto de magnitude 7,3 atingiu a costa do México e acionou um alerta de tsunami na América Latina. A presidente do México, Claudia Sheinbaum, informou que não há registro de danos ou vítimas até o momento.", "titulo_pt": "Terremoto de magnitude 7,3 atinge costa do México e aciona alerta de tsunami em toda a região", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 57492, "titulo": "Photos: Wildfire Smoke Blankets Parts of North America", "url": "https://www.theatlantic.com/photography/2026/07/photos-wildfire-smoke-blankets-parts-north-america/687973/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-07-17T18:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Grandes incêndios florestais no Canadá e Minnesota estão lançando nuvens de fumaça na atmosfera, tingindo o céu com tons amarelos ou laranjas desde o Meio-Oeste dos Estados Unidos até a costa leste, e causando inúmeras alertas sobre qualidade do
