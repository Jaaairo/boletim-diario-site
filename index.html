d": 69510, "titulo": "A desigualdade racial que o voto eleitoral não corrige", "url": "https://www.jota.info/opiniao-e-analise/colunas/como-anda-democracia/a-desigualdade-racial-que-o-voto-eleitoral-nao-corrige", "fonte_id": "jota", "data_pub": "2026-07-24T08:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Deputados federais brancos ocupam com mais frequência e de forma estável posições que dão controle sobre o trabalho legislativo. O voto eleitoral não corrige a desigualdade racial nesse contexto.", "titulo_pt": "A desigualdade racial no controle do trabalho legislativo", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 67966, "titulo": "O ponto cego das medidas protetivas no combate ao feminicídio", "url": "https://veja.abril.com.br/brasil/o-ponto-cego-das-medidas-protetivas-no-combate-ao-feminicidio/", "fonte_id": "veja", "data_pub": "2026-07-24T00:57:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Anuário da Segurança Pública destaca que as medidas protetivas enfrentam desafios além da simples concessão das ordens judiciais, revelando dificuldades na proteção de mulheres em situação de risco.", "titulo_pt": "O ponto cego das medidas protetivas no combate ao feminicídio", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 68122, "titulo": "Policial militar morre atropelado na zona sul de São Paulo; veja vídeo", "url": "https://www.cnnbrasil.com.br/nacional/sudeste/sp/policial-militar-morre-atropelado-na-zona-sul-de-sao-paulo-veja-video/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-24T00:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um policial militar de 50 anos morreu após ser atingido por um motorista que estava na contramão na avenida Nove de Julho, na zona sul de São Paulo.", "titulo_pt": "Policial militar morre atropelado na zona sul de São Paulo; veja vídeo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 68418, "titulo": "Casi un tercio de las personas de más 50 años está fuera del mercado laboral y mayoría se ha sentido discriminada por la edad", "url": "https://www.latercera.com/pulso/noticia/casi-un-tercio-de-las-personas-de-mas-50-anos-esta-fuera-del-mercado-laboral-y-mayoria-se-ha-sentido-discriminada-por-la-edad/", "fonte_id": "la_tercera", "data_pub": "2026-07-24T00:40:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um estudo chamado Cincuentímeter, desenvolvido pela Caja Los Andes e realizado por Cadem, analisou o bem-estar laboral, previsional, digital, físico e emocional das pessoas com 50 anos ou mais no Chile. O estudo indica que quase um terço dessas pessoas estão fora do mercado de trabalho e a maioria se sentiu discriminada por causa da idade.", "titulo_pt": "Quase um terço das pessoas acima dos 50 anos está fora do mercado de trabalho e a maioria se sentiu discriminada pela idade", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 68428, "titulo": "Sebastián Ugarte, jefe de la Unidad Paciente Crítico de Clínica Indisa: “La cobertura de vacunación contra la influenza no ha sido óptima”", "url": "https://www.latercera.com/nacional/noticia/sebastian-ugarte-jefe-de-la-unidad-paciente-critico-de-clinica-indisa-la-cobertura-de-vacunacion-contra-la-influenza-no-ha-sido-optima/", "fonte_id": "la_tercera", "data_pub": "2026-07-24T00:27:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O diretor da Sociedade Chilena de Medicina Crítica e Urgência, Sebastián Ugarte, destaca que a cobertura vacinal contra a gripe não foi óptima. Ele alerta para o desapego e excesso de confiança em relação à vacinação após a pandemia.", "titulo_pt": "Sebastián Ugarte, chefe da unidade Paciente Crítico da Clínica Indisa: cobertura vacinal contra a gripe não foi óptima", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 67994, "titulo": "Adolescentes eram exploradas sexualmente em prédio da Asa Norte", "url": "https://www.metropoles.com/distrito-federal/na-mira/adolescentes-eram-exploradas-sexualmente-em-predio-da-asa-norte", "fonte_id": "metropoles", "data_pub": "2026-07-24T00:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Civil realizou uma busca e apreensão relacionada a suspeitas de exploração sexual de menores de idade em um prédio da Asa Norte, especificamente na quadra 704/705.", "titulo_pt": "Polícia investiga supostas explorações sexuais com adolescentes em edifício da Asa Norte", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 68430, "titulo": "Fiscalía logra condena contra adolescentes por graves desórdenes en el Instituto Nacional: molotov llegó a sala de profesores", "url": "https://www.latercera.com/nacional/noticia/fiscalia-logra-condena-contra-adolescentes-por-graves-desordenes-en-el-instituto-nacional-molotov-llego-a-sala-de-profesores/", "fonte_id": "la_tercera", "data_pub": "2026-07-24T00:25:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Em 14 de novembro de 2025, adolescentes encapuchados causaram desordem no Instituto Nacional, paralisando o trânsito e lançando artefactos incendiários que chegaram até a sala de professores. A fiscalia obteve uma condenação contra os envolvidos.", "titulo_pt": "Fiscalia obtém condenação de adolescentes por graves desordens no Instituto Nacional", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 69329, "titulo": "Nevasca deixa 39 mineradores presos em acampamento remoto no Chile", "url": "https://www.metropoles.com/mundo/nevasca-chile-mineradores-presos", "fonte_id": "metropoles", "data_pub": "2026-07-24T12:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um nevão deixou 39 mineradores presos em um acampamento remoto no Chile. Enquanto a empresa afirma que os trabalhadores estão bem e têm instalações funcionando, os mineradores denunciam falta de condições mínimas.", "titulo_pt": "Nevasca deixa 39 mineradores presos em acampamento remoto no Chile", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 69480, "titulo": "Un feroz incendio azota Madrid y el sur de Francia: al menos 80 mil evacuados", "url": "https://www.lanacion.com.ar/el-mundo/un-feroz-incendio-azota-madrid-y-el-sur-de-francia-al-menos-80-mil-evacuados-nid24072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-24T12:49:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O governo espanhol declarou a emergência nacional após um incêndio severo atingir Madrid e o sul da França, obrigando ao menos 80 mil pessoas a serem evacuadas. A onda histórica de calor está intensificando os incêndios em toda a Europa.", "titulo_pt": "Feroz incêndio assola Madrid e sul da França: pelo menos 80 mil evacuados", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 69361, "titulo": "Espanha declara estado de emergência nacional devido aos incêndios florestais", "url": "https://www.infomoney.com.br/mundo/espanha-declara-estado-de-emergencia-nacional-devido-aos-incendios-florestais/", "fonte_id": "infomoney", "data_pub": "2026-07-24T12:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Espanha declarou estado de emergência nacional devido aos incêndios florestais, que ameaçam comunidades próximas a Madri e Ávila em meio a condições climáticas extremas. Este é um dos períodos mais letais para incêndios florestais nos últimos décadas no país.", "titulo_pt": "Espanha declara estado de emergência nacional devido aos incêndios florestais", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 69805, "titulo": "Spain declares national emergency over wildfires", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/24/spain-declares-national-emergency-over-wildfires?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-24T12:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pelo menos 10 mil pessoas foram evacuadas devido a incêndios florestais na região central de Madrid.", "titulo_pt": "Espanha declara estado de emergência por causa dos incêndios", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 69309, "titulo": "França manda esvaziar península inteira por incêndio e 40.000 fogem das chamas; veja fotos", "url": "https://veja.abril.com.br/mundo/franca-manda-esvaziar-peninsula-inteira-por-incendio-e-40-000-fogem-das-chamas-veja-fotos/", "fonte_id": "veja", "data_pub": "2026-07-24T12:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A França ordenou o esvaziamento de toda a península de Cap Ferret, um destino turístico popular na costa do Atlântico, devido a incêndios que consumiram 10.000 hectares de área. Quarenta mil pessoas tiveram que fugir das chamas. O calor extremo no sul da Europa persiste e contribui para as condições propícias aos incêndios.", "titulo_pt": "França ordena esvaziamento total de península por incêndio; 40.000 fogem das chamas", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 69638, "titulo": "Smoky Skies Are Coming Back", "url": "https://www.theatlantic.com/technology/2026/07/what-aqi-readings-really-mean/688048/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-07-24T11:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A qualidade do ar está melhorando, mas ainda há preocupações sobre quando é seguro sair ao ar livre.", "titulo_pt": "Vai voltar o aquecimento das nuvens", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 69613, "titulo": "France orders total evacuation of Cap Ferret peninsula as wildfire spreads", "url": "https://www.theguardian.com/world/2026/jul/24/france-evacuation-cap-ferret-peninsula-wildfire", "fonte_id": "guardian_world", "data_pub": "2026-07-24T11:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A França ordenou o total deslocamento de mais de 40 mil pessoas da península de Cap Ferret, na costa atlântica, devido a uma 'chama intensa e altamente imprevisível'. O incêndio avança em um dos principais destinos de férias do país. A Espanha também declarou estado de emergência nacional por causa de uma série de incêndios fora do controle que ameaçam áreas próximas a Madri, devido ao clima extremo causado pela crise climática.", "titulo_pt": "França ordena total deslocamento da península de Cap Ferret diante de incêndio", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 70057, "titulo": "Access to finance ‘strengthens climate resilience’ among sub-Saharan women", "url": "https://www.carbonbrief.org/access-to-finance-strengthens-climate-resilience-among-sub-saharan-women", "fonte_id": "carbon_brief", "data_pub": "2026-07-24T11:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma nova pesquisa indica que a capacitação financeira das mulheres na África subsaariana pode fortalecer a resiliência familiar face aos choques climáticos. O acesso maior à financiamento poderia melhorar a capacidade das famílias se adaptarem e resistirem a eventos climáticos adversos.", "titulo_pt": "Acesso ao crédito 'fortalece a resiliência climática' entre mulheres da áfrica subsaariana", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 70058, "titulo": "State of the climate: Rapidly developing El Niño raises chance of record-warm 2026", "url": "https://www.carbonbrief.org/state-of-the-climate-rapidly-developing-el-nino-raises-chance-of-record-warm-2026", "fonte_id": "carbon_brief", "data_pub": "2026-07-24T10:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O El Niño está se desenvolvendo rapidamente, aumentando as chances de 2026 ser o ano mais quente desde registros meteorológicos. O fenômeno climático já está em sua metade inicial deste ano.", "titulo_pt": "Estado do clima: El Niño em rápida evolução aumenta probabilidades de 2026 ser o ano mais quente", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 69770, "titulo": "Wildfire emergency near Madrid forces over 10,000 to flee as Spain sounds alarm", "url": "http://www.euronews.com/video/2026/07/24/wildfire-emergency-near-madrid-forces-over-10000-to-flee-as-spain-sounds-alarm", "fonte_id": "euronews", "data_pub": "2026-07-24T10:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Fogos florestais intensos perto de Madrid obrigaram mais de 10 mil pessoas a deixar suas casas, enquanto equipes do Exército e bombeiros combatem as chamas em meio ao calor extremo.", "titulo_pt": "Emergência de incêndios na região de Madrid faz mais de 10 mil pessoas serem evacuadas", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 69852, "titulo": "Wildfires force evacuation of Cap Ferret resort on Atlantic coast", "url": "https://www.ft.com/content/6e1d4a14-b7ad-4a36-86d9-3990497272a3?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-24T09:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Milhares de pessoas foram ordenadas a se retirar na França e Espanha devido aos incêndios florestais. As chamas estão ativas durante um verão extremamente quente.", "titulo_pt": "Incêndios obrigam evacuação no resort de Cap Ferret, na costa atlântica", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 69605, "titulo": "Weather tracker: More than 900 wildfires rage across Canada", "url": "https://www.theguardian.com/environment/2026/jul/24/weather-tracker-wildfires-canada-argentina-heat", "fonte_id": "guardian_world", "data_pub": "2026-07-24T08:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de 900 incêndios florestais estão em curso no Canadá, com focos de maior preocupação nos Territórios do Norte e Ontário. A situação tem levado a qualidade ruim da ar atmosférica e fumaça de incêndio foi transportada até os Estados Unidos e até mesmo para o norte da Europa.", "titulo_pt": "Monitoramento meteorológico: mais de 900 focos de incêndios florestais atingem o canadá", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 69773, "titulo": "France: Massive blaze engulfs Cap Ferret forests as thousands evacuated", "url": "http://www.euronews.com/video/2026/07/24/france-massive-blaze-engulfs-cap-ferret-forests-as-thousands-evacuated", "fonte_id": "euronews", "data_pub": "2026-07-24T08:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio florestal rápido avançou pelo entire Cap Ferret, obrigando a evacuação de milhares de pessoas e destruindo várias residências. Cerca de 700 bombeiros trabalham para conter o fogo.", "titulo_pt": "França: incêndio massivo destrói Cap ferrat e obriga à evacuação em massa", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 69425, "titulo": "Defesa Civil alerta para frente fria e chuva forte em São Paulo; veja previsão para os próximos dias", "url": "https://exame.com/brasil/defesa-civil-alerta-para-frente-fria-e-chuva-forte-em-sao-paulo-veja-previsao-para-os-proximos-dias/", "fonte_id": "exame", "data_pub": "2026-07-24T08:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Defesa Civil alerta para a chegada de uma frente fria que trará chuva forte, raios e rajadas de vento até 70 km/h à região metropolitana de São Paulo nesta sexta-feira.", "titulo_pt": "Defesa Civil avisa sobre frente fria e chuva forte em São Paulo; veja previsão para os próximos dias", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 69888, "titulo": "The world has an anchovy problem", "url": "https://www.japantimes.co.jp/commentary/2026/07/24/world/world-anchovy-problem/", "fonte_id": "japan_times", "data_pub": "2026-07-24T06:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os pequenos peixes anchovas têm um papel econômico global mais significativo do que simplesmente a satisfação da paixão pelos amantes de sabores intensos.", "titulo_pt": "O mundo tem um problema com anchovas", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 69608, "titulo": "Adelaide airport pulls ads from conservation groups but keeps gas and mining ads during ALP conference", "url": "https://www.theguardian.com/australia-news/2026/jul/24/adelaide-airport-cancels-environment-ads-keeps-gas-mining-advertisements", "fonte_id": "guardian_world", "data_pub": "2026-07-24T04:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Aeroporto de Adelaide cancelou anúncios de grupos ambientalistas que alvoavam parlamentares do Partido Trabalhista, argumentando que esses anúncios são 'demasiadamente políticos'. Anúncios promovendo gás e mineração permaneceram ativos durante a conferência nacional do partido.", "titulo_pt": "Aeroporto de adelaide cancela anúncios ambientalistas mas mantém publicidade de petróleo e mineração", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 69343, "titulo": "Lula sanciona lei que proíbe venda e consumo de foie gras no Brasil", "url": "https://www.metropoles.com/brasil/lula-sanciona-lei-que-proibe-venda-e-consumo-de-foie-gras-no-brasil", "fonte_id": "metropoles", "data_pub": "2026-07-24T12:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A lei proíbe a venda e consumo de foie gras no Brasil, com origem no combate a maus-tratos aos animais. O foie gras é feito à base de fígado de pato ou ganso.", "titulo_pt": "Lula sanciona lei que proíbe venda e consumo de foie gras no Brasil", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 69917, "titulo": "Malaysia’s refugee registration halt risks ‘ultimate disaster’ for new arrivals", "url": "https://www.scmp.com/week-asia/politics/article/3361746/malaysias-refugee-registration-halt-risks-ultimate-disaster-new-arrivals?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-24T09:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Malásia ordenou ao Alto Comissariado das Nações Unidas para os Refugiados (ACNUR) paralisar o registro de novos refugiados enquanto constrói um sistema de identificação biométrica. Especialistas em direitos humanos alertam que essa medida pode colocar em risco a capacidade dos recém-chegados comprovar sua necessidade de proteção.", "titulo_pt": "Paralisação do registro de refugiados em malásia pode ser 'disaster'", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 69512, "titulo": "Violência digital de gênero precisa ser tratada como questão de segurança internacional", "url": "https://www.jota.info/opiniao-e-analise/colunas/direitos-tecnologias/violencia-digital-de-genero-precisa-ser-tratada-como-questao-de-seguranca-internacional", "fonte_id": "jota", "data_pub": "2026-07-24T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "É necessária uma resposta transnacional à violência digital de gênero, onde a perspectiva de gênero não seja mais tratada como um tema secundário.", "titulo_pt": "Violência digital de gênero precisa ser tratada como questão de segurança internacional", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 67965, "titulo": "O dado que explica por que o feminicídio continua crescendo no Brasil", "url": "https://veja.abril.com.br/brasil/o-dado-que-explica-por-que-o-feminicidio-continua-crescendo-no-brasil/", "fonte_id": "veja", "data_pub": "2026-07-24T01:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O dado indica que os assassinatos de mulheres no Brasil são antecedidos por uma escalada de violência, muitas vezes já registrada pelas autoridades. Isso sugere um padrão de negligência ou falta de ação preventiva das instituições.", "titulo_pt": "Dados revelam que assassinatos de mulheres são precedidos por escalada de violência", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 68220, "titulo": "EE. UU. confirma nuevo arancel de 12,5% a Chile const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml(topico) : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml(audioKey) {
  const audio = D.audio && D.audio.sumarios && D.audio.sumarios[audioKey];
  if (!audio || !audio.arquivo) return "";
  const src = audio.arquivo + (audio.versao ? "?v=" + encodeURIComponent(audio.versao) : "");
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta" data-audio-src="${esc(src)}" data-audio-key="${esc(audioKey)}">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderPodcast() {
  const p = D.podcast;
  if (!p || !p.arquivo) return "";
  const src = p.arquivo + (p.versao ? "?v=" + encodeURIComponent(p.versao) : "");
  return `<div class="podcast-card">
    <div class="podcast-hd">Ou&ccedil;a Agora</div>
    <div class="pod-player">
      <button class="pod-btn" onclick="podToggle(this)" aria-label="Tocar">&#9654;</button>
      <span class="pod-cur">0:00</span>
      <div class="pod-track" onclick="podSeek(event, this)"><div class="pod-fill"></div></div>
      <span class="pod-dur">0:00</span>
      <audio class="pod-audio" preload="metadata" src="${esc(src)}"
        onloadedmetadata="podMeta(this)" ontimeupdate="podTick(this)" onended="podEnd(this)"></audio>
    </div>
  </div>`;
}

function _podFmt(s) {
  s = Math.max(0, Math.floor(s || 0));
  return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
}
function podToggle(btn) {
  const a = btn.parentElement.querySelector(".pod-audio");
  if (a.paused) { a.play(); btn.innerHTML = "&#10073;&#10073;"; btn.setAttribute("aria-label", "Pausar"); }
  else { a.pause(); btn.innerHTML = "&#9654;"; btn.setAttribute("aria-label", "Tocar"); }
}
function podMeta(a) {
  a.closest(".pod-player").querySelector(".pod-dur").textContent = _podFmt(a.duration);
}
function podTick(a) {
  const p = a.closest(".pod-player");
  p.querySelector(".pod-cur").textContent = _podFmt(a.currentTime);
  p.querySelector(".pod-fill").style.width = (a.duration ? a.currentTime / a.duration * 100 : 0) + "%";
}
function podEnd(a) {
  const b = a.closest(".pod-player").querySelector(".pod-btn");
  b.innerHTML = "&#9654;"; b.setAttribute("aria-label", "Tocar");
}
function podSeek(e, track) {
  const a = track.parentElement.querySelector(".pod-audio");
  if (!a.duration) return;
  const r = track.getBoundingClientRect();
  a.currentTime = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width)) * a.duration;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml("destaque")}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    const temPodcast = D.podcast && D.podcast.arquivo;
    return `<div class="cards${temPodcast ? ' com-podcast' : ''}">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>

    </div>
    ${renderPodcast()}
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — audio pre-renderizado por Piper
(function () {
  var player = document.createElement('audio');
  player.preload = 'auto';
  player.setAttribute('playsinline', '');
  document.body.appendChild(player);
  var barAtual = null;

  function _resetBar(bar) {
    if (!bar) return;
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  function _setTocando(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _setPausado(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _tituloAudio(bar) {
    var h = bar.previousElementSibling;
    while (h && !/^H2$/i.test(h.tagName || '')) h = h.previousElementSibling;
    return h ? (h.innerText || h.textContent || 'Boletim Diario').trim() : 'Boletim Diario';
  }

  function _mediaSession(bar) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: _tituloAudio(bar),
      artist: 'Boletim Diario',
      album: 'Leitura dos sumarios',
    });
    navigator.mediaSession.setActionHandler('play', function () { player.play().catch(function () {}); });
    navigator.mediaSession.setActionHandler('pause', function () { player.pause(); });
    navigator.mediaSession.setActionHandler('stop', function () { player.pause(); player.currentTime = 0; });
  }

  window.ttsOuvir = function (btn) {
    var bar = btn.closest('.tts-bar');
    var src = bar && bar.dataset.audioSrc;
    if (!src) return;
    if (barAtual && barAtual !== bar) _resetBar(barAtual);
    barAtual = bar;
    if (player.src !== new URL(src, window.location.href).href) {
      player.src = src;
      player.currentTime = 0;
    } else {
      player.currentTime = 0;
    }
    _mediaSession(bar);
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _resetBar(bar);
    });
  };

  window.ttsPausar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    _setPausado(bar);
  };

  window.ttsContinuar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _setPausado(bar);
    });
  };

  window.ttsPar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    player.currentTime = 0;
    _resetBar(bar);
    if (barAtual === bar) barAtual = null;
  };

  player.addEventListener('ended', function () { _resetBar(barAtual); barAtual = null; });
  player.addEventListener('error', function () { _resetBar(barAtual); barAtual = null; });
  window.addEventListener('beforeunload', function () { player.pause(); });
})();
</script>
</body>
