taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O número de vagas para trabalhos verdes, conhecidos como 'green-collar', atingiu um recorde. Esses empregos estão relacionados a áreas ambientais e sustentáveis.", "titulo_pt": "Vagas de trabalho verde batem recorde", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35366, "titulo": "Com sensação de 46°C, EUA têm onda de calor no Dia da Independência", "url": "https://www.metropoles.com/mundo/com-sensacao-de-46c-eua-tem-onda-de-calor-no-dia-da-independencia", "fonte_id": "metropoles", "data_pub": "2026-07-04T21:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A onda de calor extremo nos Estados Unidos, com temperaturas chegando a 46°C, obrigou autoridades a cancelar feiras e shows das comemorações do Dia da Independência, que marcou os 250 anos do evento.", "titulo_pt": "Com sensação térmica de 46°C, EUA cancelam eventos no Dia da Independência", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35368, "titulo": "MG registra três tremores de terra em apenas quatro dias", "url": "https://www.metropoles.com/minas-gerais/mg-registra-tres-tremores-de-terra-em-apenas-quatro-dias", "fonte_id": "metropoles", "data_pub": "2026-07-04T21:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em Minas Gerais, foram registrados três tremores de terra entre segunda-feira (30/6) e quinta-feira (2/7), em Pirajuba, Planura e Sete Lagoas.", "titulo_pt": "MG registra três tremores de terra em quatro dias", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35664, "titulo": "Climate change: 'We cannot meet the challenge of adapting housing with the tools of the past. A thorough overhaul is needed'", "url": "https://www.lemonde.fr/en/economy/article/2026/07/04/climate-change-we-cannot-meet-the-challenge-of-adapting-housing-with-the-tools-of-the-past-a-thorough-overhaul-is-needed_6755153_19.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-04T20:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Christophe Rodriguez, diretor do Instituto Francês de Eficiência Energética dos Edifícios, explica à Le Monde a urgência de reformar as instituições para implementar o 'projeto do século' – a renovação da carteira imobiliária francesa. É necessário um overhaul significativo para enfrentar o desafio de adaptar o abrigamento às mudanças climáticas.", "titulo_pt": "Mudanças climáticas: não podemos enfrentar o desafio de adaptar habitações com ferramentas do passado", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 35476, "titulo": "Calor extremo nos EUA impacta comemorações do 4 de julho e cancela eventos", "url": "https://www.cnnbrasil.com.br/internacional/calor-extremo-nos-eua-impacta-comemoracoes-do-4-de-julho-e-cancela-eventos/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T20:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A onda de calor extremo nos Estados Unidos atingirá o pico durante as comemorações do 4 de julho, com temperaturas acima de 37°C e risco de tempestades. Eventos públicos podem ser afetados por causa dessas condições climáticas.", "titulo_pt": "Calor extremo impacta comemorações do 4 de julho nos EUA", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 35344, "titulo": "Número de mortos após terremotos na Venezuela vai a 2.645", "url": "https://www.poder360.com.br/poder-internacional/numero-de-mortos-apos-terremotos-na-venezuela-vai-a-2-645/", "fonte_id": "poder360", "data_pub": "2026-07-04T18:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Terremotos de magnitudes 7,2 e 7,5 ocorreram na Venezuela em 24 de junho, causando a morte de 2.645 pessoas.", "titulo_pt": "Número de mortos após terremotos na Venezuela chega a 2.645", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35400, "titulo": "Incêndio florestal mobiliza mais de 1.000 bombeiros em Portugal", "url": "https://exame.com/mundo/incendio-florestal-mobiliza-mais-de-1-000-bombeiros-em-portugal/", "fonte_id": "exame", "data_pub": "2026-07-04T16:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um incêndio florestal no norte de Portugal mobilizou mais de mil bombeiros e resultou em pelo menos nove feridos. O governo português pediu apoio internacional devido à onda de calor extremo.", "titulo_pt": "Incêndio florestal mobiliza mais de mil bombeiros em Portugal", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 35148, "titulo": "MG: 2 vilas disputam selo da ONU entre as melhores do turismo mundial", "url": "https://www.metropoles.com/minas-gerais/mg-2-vilas-disputam-selo-da-onu-entre-as-melhores-do-turismo-mundial", "fonte_id": "metropoles", "data_pub": "2026-07-04T14:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Conceição de Ibitipoca e Delfinópolis estão entre os sete destinos brasileiros indicados para o reconhecimento internacional pelo Programa das Nações Unidas para o Meio Ambiente (PNUMA).", "titulo_pt": "MG: 2 vilas disputam selo da ONU entre as melhores do turismo mundial", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 34847, "titulo": "Italian rice crops suffer in drought, worst European heatwave ever", "url": "https://www.scmp.com/news/world/europe/article/3359427/italian-rice-crops-suffer-drought-worst-european-heatwave-ever?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T12:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em uma das piores ondas de calor da Europa, culturas de arroz na região mais importante para a produção do grão na Itália estão sofrendo. Sharon Angoli, de 22 anos, observa campos secos e sem perspectivas de recuperação mesmo com chuvas abundantes.", "titulo_pt": "Cultivos de arroz na Itália sofrem com onda de calor extremamente severa", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 34795, "titulo": "Firefighters race to contain flames in northeastern Spain", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/4/firefighters-race-to-contain-flames-in-northeastern-spain?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T12:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Incêndios florestais estão ocorrendo no nordeste da Espanha e bombeiros estão trabalhando para conter as chamas.", "titulo_pt": "Bombeiros correm contra o tempo para controlar incêndios na Espanha", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 34532, "titulo": "Casal morre em colisão com caminhão elétrico da Tesla nos EUA", "url": "https://www.infomoney.com.br/consumo/caminhao-eletrico-tesla-semi-colisao/", "fonte_id": "infomoney", "data_pub": "2026-07-04T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um casal morreu em uma colisão envolvendo um Volkswagen Beetle e um caminhão elétrico Tesla Semi nos Estados Unidos. Este é o primeiro acidente registrado com o Tesla Semi desde que ele começou a ser utilizado.", "titulo_pt": "Casal morre em colisão com caminhão elétrico da Tesla nos EUA", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 34495, "titulo": "Clima: frio intenso e geada marcam o sábado em grande parte do país", "url": "https://www.metropoles.com/brasil/clima-frio-intenso-e-geada-marcam-o-sabado-em-grande-parte-do-pais", "fonte_id": "metropoles", "data_pub": "2026-07-04T10:42:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Frio intenso e geada afetaram grande parte do país no sábado, com uma massa de ar polar responsável por baixar as temperaturas no Sul. O litoral do Sul e Sudeste enfrentou risco de ressaca e ventos fortes.", "titulo_pt": "Clima: frio intenso e geada marcam o sábado em grande parte do país", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 34639, "titulo": "El casi terminado Parque Cerro Chena está en riesgo", "url": "https://www.latercera.com/opinion/noticia/el-casi-terminado-parque-cerro-chena-esta-en-riesgo/", "fonte_id": "la_tercera", "data_pub": "2026-07-04T10:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Parque Cerro Chena, que está quase concluído, corre risco de não ser finalizado. O projeto enfrenta dificuldades que ameaçam sua conclusão.", "titulo_pt": "Parque Cerro Chena, quase pronto, está em risco", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 34519, "titulo": "88% das casas impactadas: IBGE revela dimensão das enchentes no RS", "url": "https://exame.com/esg/88-das-casas-impactadas-ibge-revela-dimensao-das-enchentes-no-rs/", "fonte_id": "exame", "data_pub": "2026-07-04T08:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Instituto Brasileiro de Geografia e Estatística (IBGE) revelou que 88% das casas no Rio Grande do Sul foram impactadas pelas enchentes. Os dados indicam que a maioria dos domicílios enfrentou ocorrências relacionadas às enchentes, afetando tanto a estrutura das casas quanto o bem-estar psicológico da população.", "titulo_pt": "88% das casas afetadas: IBGE revela dimensão das enchentes no RS", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 34866, "titulo": "Australia’s Great Barrier Reef avoids ‘in danger’ listing by Unesco", "url": "https://www.scmp.com/news/asia/australasia/article/3359403/australias-great-barrier-reef-avoids-danger-listing-unesco?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T07:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Great Barrier Reef, um importante destino turístico na Austrália, evitou ser listado como em perigo pela Unesco, apesar da preocupação máxima expressa pela Organização das Nações Unidas sobre a bleaching de massa de corais e os impactos do aquecimento global. Canberra comemorou a decisão preliminar da Unesco de manter o status de Patrimônio Mundial do "provavel_duplicata_de": null, "texto_pt": "O Papa Leão 14 visitou a ilha de Lampedusa, na Itália, no dia do aniversário da independência dos Estados Unidos, para celebrar uma missa e relembrar a crise migratória global. Durante a celebração, ele fez um apelo contra a indiferença mundial em relação aos imigrantes.", "titulo_pt": "Papa Leão 14 reza por imigrantes durante visita à Lampedusa", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 35607, "titulo": "Aumentan a 473 muertes por ébola en República Democrática del Congo y casos superan los 1.500", "url": "https://www.latercera.com/mundo/noticia/aumentan-a-473-muertes-por-ebola-en-republica-democratica-del-congo-y-casos-superan-los-1500/", "fonte_id": "la_tercera", "data_pub": "2026-07-04T18:42:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O número de mortes por ebola na República Democrática do Congo aumentou para 473, e o número total de casos superou os 1.500. Atualmente, 628 pacientes estão sob a 'isolamento' ou 'hospitalização', enquanto outras 213 pessoas já se recuperaram da doença.", "titulo_pt": "Número de mortes por ebola na República Democrática do Congo aumenta para 473 e casos superam 1.500", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 35261, "titulo": "Gobierno concreta tercer envío de ayuda humanitaria a Venezuela: 35 mil vacunas y 13 toneladas de carga", "url": "https://www.latercera.com/nacional/noticia/gobierno-concreta-tercer-envio-de-ayuda-humanitaria-a-venezuela-35-mil-vacunas-y-13-toneladas-de-carga/", "fonte_id": "la_tercera", "data_pub": "2026-07-04T14:26:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O governo confirmou o terceiro envio de ajuda humanitária para Venezuela, incluindo 35 mil vacinas e 13 toneladas de suprimentos. A operação também visa o retorno dos 45 bombeiros chilenos que estavam em missão no país.", "titulo_pt": "Governo concretiza terceiro envio de ajuda humanitária a Venezuela: 35 mil vacinas e 13 toneladas de carga", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 35128, "titulo": "Watch Mark Ruffalo, Sarah Jessica Parker, Margaret Atwood, Judd Apatow and More Give Instructions to Combat Trump’s Tyranny on July 4th", "url": "https://variety.com/2026/politics/news/july-4-trump-warning-mark-ruffalo-sarah-jessica-parker-margaret-atwood-judd-apatow-1236801648/", "fonte_id": "variety", "data_pub": "2026-07-04T13:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de atores, ativistas, intelectuais e comediantes se uniram para emitir um alerta sobre a fragilidade da democracia americana. Timothy Snyder, historiador e autor best-seller especializado em fascismo, reuniu diversas figuras proeminentes para ler trechos de sua obra.", "titulo_pt": "Veja Mark Ruffalo, Sarah Jessica Parker, Margaret Atwood, Judd Apatow e Outros Dar Instruções para Combater a Tirania de Trump no Dia 4 de Julho", "veiculo": "Variety", "pais": "EUA", "classe": "C"}, {"id": 35119, "titulo": "Pope Leo urges migrant protection, integration on visit to Lampedusa", "url": "https://www.aljazeera.com/news/2026/7/4/pope-urges-protection-integration-of-migrants-on-visit-to-island-frontier?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T12:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Papa Leão encoraja a Europa e os Estados Unidos a acolherem e ajudarem migrantes durante uma viagem simbólica à ilha italiana de Lampedusa.", "titulo_pt": "Papa Leo incentiva proteção e integração de migrantes em visita a Lampedusa", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 34681, "titulo": "‘The situation is terrible’: aid workers on life in Sudanese city pummelled by drone strikes", "url": "https://www.theguardian.com/world/2026/jul/04/el-obeid-aid-workers-sudan-war-drone-strikes", "fonte_id": "guardian_world", "data_pub": "2026-07-04T11:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A cidade de El Obeid, no Sudão, está sendo atacada por drones das forças armadas do país e dos paramilitares RSF. Nesses ataques recentes, mais de 20 pessoas, incluindo estudantes, foram mortas em escolas e estações de combustível.", "titulo_pt": "A situação é terrível: trabalhadores humanitários relatam os ataques por drones na cidade do Sudão", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 34467, "titulo": "Análise: China pressiona minorias com nova lei de unidade", "url": "https://www.cnnbrasil.com.br/internacional/analise-china-pressiona-minorias-com-nova-lei-de-unidade/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A China implementou uma nova legislação que entrou em vigor no dia 1º de julho, proibindo atos que 'minem a unidade étnica' e exigindo lealdade ao Partido Comunista Chinês. Essa lei visa pressionar as minorias etnícnicas do país.", "titulo_pt": "Análise: China aperta minorias com nova lei de unidade", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 34837, "titulo": "Huge crowds gather as funeral ceremonies for Iranian supreme leader Khamenei begin", "url": "https://www.japantimes.co.jp/news/2026/07/04/world/funeral-ceremonies-iran-ali-khamenei/", "fonte_id": "japan_times", "data_pub": "2026-07-04T06:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Há grandes multidões reunidas para as cerimônias fúnebres do líder supremo da Irã, Khamenei. As autoridades iranianas esperam entre 15 e 20 milhões de participantes apenas na cidade de Teerã nos próximos três dias.", "titulo_pt": "Grande número de pessoas se reúne para cerimônias fúnebres do líder supremo da Irã em Teerã", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 34198, "titulo": "‘Cherry-picked’ crimes: call for legal reforms to cover long-term child sexual abuse", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3359377/cherry-picked-crimes-call-legal-reforms-cover-long-term-child-sexual-abuse?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Bobo, uma jovem que sofreu abuso sexual por um parente, passou sua infância escolar constantemente buscando esconderijos em seu apartamento para evitar o agressor. Mui, outra vítima, relatou que as noites e os feriados escolares eram os momentos mais assustadores devido ao medo do abuso.", "titulo_pt": "Crimes 'selecionados': chamado para reformas legais para abordar o abuso sexual infantil a longo prazo", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 35687, "titulo": "The massacre America forgot", "url": "https://www.ft.com/content/46ba4db6-4133-4db2-ac8f-2936273f402c", "fonte_id": "financial_times", "data_pub": "2026-07-04T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os eventos de 1919 foram praticamente esquecidos na cidade de Elaine, Arkansas. Agora, uma nova geração está documentando a herança do conflito racial para si mesmo.", "titulo_pt": "O massacre que América esqueceu", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 34126, "titulo": "UN condemns 'extrajudicial execution' of Palestinian accused of collaboration", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/un-condemns-extrajudicial-execution-palestinian-accused-collaboration", "fonte_id": "middle_east_eye", "data_pub": "2026-07-04T02:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A ONU condenou a execução extrajudicial de um palestiniano acusado de colaborar com forças israelenses por um grupo afiliado ao Hamas. A agência afirmou que o assassinato faz parte de uma série mais ampla de execuções ilegais e supostas violações em Gaza.", "titulo_pt": "ONU condena 'execução extrajudicial' de palestiniano acusado de colaboração", "veiculo": "Middl function renderSecao(topico) {

  const drillId = "drill-" + (++drillCounter);

    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>

             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

    </div>` : ""}

}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

function ativar(id) {

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices().filter(function(v) { return v.lang === 'pt-BR' || v.lang.startsWith('pt'); });
    return vs[0] || null;
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // sempre a .sumario imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
