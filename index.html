<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 17/07/2026 08:59 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">

  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>

      <option value="resumo_impreciso">Resumo impreciso</option>

    <div class="modal-btns">
      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "17/07/2026 08:59", "stats": {"noticias_novas": 690, "resumos_gerados": 218}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O Brasil enfrenta diversos desafios políticos e econômicos antes das eleições de outubro. O senador Flávio Bolsonaro negou a autenticidade de uma suposta foto com um indivíduo chamado 'Sicário', atribuindo-a à manipulação por inteligência artificial. Em contrapartida, o presidente Lula confirmou seu apoio à reeleição da senadora Soraya Thronicke para o Senado. Um prefeito de uma cidade se tornou alvo de uma ação do Ministério Público após o vazamento de um vídeo nas redes sociais. Além disso, a Safra Asset recomendou cautela aos investidores três meses antes das eleições, destacando que a disputa política já está influenciando os preços. A inflação da Zona do Euro caiu para 2,8% em junho, e o Fies encerra suas inscrições nesta sexta-feira, 17 de julho.", "mundo": "Os Estados Unidos intensificaram seus ataques na infraestrutura iraniana durante seis dias consecutivos, levando a uma reação do Irã que resultou em danos a uma usina de energia e desalinização no Kuwait. Em outro desenvolvimento, a Alemanha permitiu a concorrência ferroviária com a decisão final da Agência Federal das Redes, permitindo à Italo operar no mercado alemão. A Rússia continua recrutando africanos para combater na Ucrânia, com cerca de 3.000 soldados identificados e um em cada seis já morto. Além disso, o presidente dos Estados Unidos, Donald Trump, reavivou suas acusações sobre fraude nas eleições presidenciais americanas, afirmando que a China teria uma suposta brecha histórica nos dados eleitorais. A União Europeia reduziu as exigências de emissões de CO2 para veículos novos após 2030, enquanto a China rejeitou veementemente acusações de interferência nas eleições americanas feitas por Trump.\n\nOs Estados Unidos intensificaram suas operações militares no Oriente Médio, realizando ataques noturnos contra alvos iranianos e afetando estruturas importantes no Irã. Segundo relatos, mais de 50 mil soldados americanos estão ativos na região. Os EUA também planejam limitar os vistos para estudantes e jornalistas estrangeiros, uma medida que precisa ser aprovada pelo Congresso. A escalada militar levou o Irã a retaliar contra vários países do Golfo Pérsico, incluindo Bahrain, Qatar, Oman, Jordânia e Síria, em resposta aos ataques americanos. Essa tensão geopolítica tem impactado a segurança regional e as relações entre potências mundiais, com a China reforçando sua visão global de governança tecnológica em contraste com os Estados Unidos.", "economia": "A economia global enfrenta diversos desafios e mudanças. Destaque-se o recente aprovamento de uma pílula para reduzir o colesterol nos Estados Unidos, que é o primeiro medicamento dessa classe a ser autorizado. No Brasil, as tarifas impostas pelos EUA sobre exportações brasileiras, estimadas em US$ 11 bilhões, estão causando preocupação. Além disso, há necessidade de auditoria dos fornecedores do Simples Nacional para melhorar a eficiência da reforma tributária. O cenário econômico também se desenha com a possibilidade de uma produção menor de carne na próxima safra, levantando preocupações sobre a inflação nos alimentos. Adicionalmente, a China e os Emirados Árabes Unidos estabeleceram uma ligação de pagamentos QR entre seus sistemas, visando ampliar a internacionalização do yuan chinês.", "tecnologia": "A China assumiu a liderança global na inteligência artificial (IA) com o lançamento do modelo Kimi K3, que superou os principais modelos de IA da OpenAI e Anthropic em testes de codificação front-end. Este avanço marcou o fim ao domínio americano nessa área. A Oracle prevê um aumento significativo nas despesas das empresas chilenas com tecnologia cloud neste ano, destacando a inteligência artificial como uma tendência crescente. Além disso, a SAP adquiriu a Prior Labs por mais de 1 bilhão de euros em uma transação ocorrida apenas 18 meses após o lançamento da empresa, refletindo a importância do mercado de IA avançada. Em outro desenvolvimento importante, a China planeja um hub tecnológico focado em AI e minerais críticos no norte de Manila, embora isso tenha levantado preocupações sobre o impacto nas comunidades locais.", "ciencia": "A União Europeia apresentou reformas em sua bolsa de carbono após intensas discussões, visando se adaptar às mudanças rápidas no cenário climático. Segundo um novo estudo publicado na New Scientist, os piores temporais solares podem causar impactos maiores do que se pensava anteriormente, justificando a consideração de um desastre solar como 'uma vez em mil anos'. Em outra pesquisa, cientistas italianos descobriram que idosos que tomaram placebo durante três semanas melhoraram sua memória e reduziram o nível de estresse. Além disso, a ONU oferece um guia prático para o desenvolvimento de economias azuis sustentáveis, enquanto uma startup chamada Sonothera está desenvolvendo uma nova técnica para entregar genes em células, potencialmente revolucionando o tratamento de distrofia muscular e outras doenças.", "cultura": "O filme 'A Odisséia', dirigido por Christopher Nolan e baseado na famosa história grega, apresenta personagens inovadores como Helena negra e um personagem trans, destacando a continuidade da narrativa ao longo de 2.800 anos desde a escrita original. Em outro destaque cultural, a atriz Li Sitong, que interpretou Zia Lamgi no filme 'Dear You', um drama coreano sobre migração que se tornou um grande sucesso de bilheteria na China, expressou desejo de continuar sua carreira como atriz após formatura. A arquitetura contemporânea também está em destaque com a Villa Österlen, uma casa de férias no sul da Suécia projetada pela Note Design Studio como uma interpretação moderna das casas rurais tradicionais da região de Skåne, capaz de acolher grandes reuniões familiares.", "sociedade": "A proposta do partido Podemos, com relatoria do PSOL, foi aprovada pela Comissão da Câmara dos Deputados e pode permitir que mulheres que já tenham tido filhos recebam um adicional de até 15% na aposentadoria. Em Santiago, Chile, 41 estudantes foram expulsos por faltas graves desde o início do ano, com 40 desses casos ocorridos através do programa Aula Segura. Um adolescente de 14 anos foi detido sob suspeita de lesão corporal após supostamente empurrar um colega de classe; este permanece em estado grave há duas semanas. O prefeito de Cerro Navia apontou a possibilidade de uma intervenção externa após a morte de um homem que foi electrocutado por um poste energizado. Na Coreia do Sul, cerca de um terço das adolescentes sexualmente ativas não usaram anticoncepcionais consistentemente no último ano, com muitas delas relatando a inexistência de contraceptivos ou influências dos parceiros. Elza Berquó, demógrafa centenária, faleceu em São Paulo, sendo uma referência em estudos populacionais e atuando por décadas na compreensão do Brasil através da análise de dados demográficos. A UNICEF e seus parceiros lançaram uma aliança para ampliar empregos verdes no Brasil com o objetivo de potencializar 1 milhão de vagas no setor, alinhando a formação profissional à demanda por mão de obra qualificada na economia de baixo carbono.", "meio_ambiente": "A qualidade do ar nos Estados Unidos e no Canadá foi severamente afetada pela fumaça proveniente de incêndios florestais na região norte do Minnesota, no Canadá e na Espanha, conforme relataram Axios e Euronews. Em Toronto, a cidade registrou a pior qualidade do ar entre as maiores cidades do mundo em 15 de julho, com uma camada de fumaça laranja pairando sobre o local. As altas temperaturas combinadas com a fumaça dos incêndios podem causar danos significativos à saúde, conforme alertou o Japan Times. No Brasil, o fim da Moratória da Soja pode aumentar o desmatamento da Amazônia em 17% na próxima década, segundo uma análise publicada na revista Science. Além disso, a França divulgou sua terceira estratégia nacional de baixo carbono para 2050, estabelecendo metas mais ambiciosas do que as políticas anteriores, mas enfrentando desafios em comprovar sua credibilidade, conforme relatado pelo Le Monde.", "direitos_humanos": "Dezenove homens foram acusados de participar de casos de estupro em massa na França. Um deles, identificado como Christophe B., é acusado de ter forçado seis ex-parceiros a participarem de encontros sexuais violentos com dezenas de homens recrutados online ao longo de mais de 20 anos. Em outros desenvolvimentos, Wu Shaoping, um advogado chinês de direitos humanos que fugiu da repressão no país em 2019, foi detido nos Estados Unidos e aguarda uma decisão sobre seu pedido de asilo. Além disso, a ONU relata que mais de 500 imigrantes podem ter morrido após um naufrágio envolvendo refugiados rohingya na Mianmar. Estes incidentes ilustram os diversos desafios enfrentados pelos direitos humanos em diferentes partes do mundo."}, "resumo_do_dia": {"politica_nacional": [{"id": 56358, "titulo": "‘Nossa Natureza’: novo podcast de CartaCapital investiga os vínculos entre a saúde e o planeta", "url": "https://www.cartacapital.com.br/carta-capital/nossa-natureza-novo-podcast-de-cartacapital-investiga-os-vinculos-entre-a-saude-e-o-planeta/", "fonte_id": "cartacapital", "data_pub": "2026-07-17T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O podcast 'Nossa Natureza', apresentado pela médica Elnara Negri, reúne especialistas para explorar como o meio ambiente, os hábitos e as desigualdades afetam a saúde humana.", "titulo_pt": "‘Nossa Natureza’: novo podcast de CartaCapital investiga os vínculos entre a saúde e o planeta", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 56359, "titulo": "Acidente com ônibus mata 20 crianças e um adulto em Uganda", "url": "https://www.cartacapital.com.br/mundo/acidente-com-onibus-mata-20-criancas-e-um-adulto-em-uganda/", "fonte_id": "cartacapital", "data_pub": "2026-07-17T10:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um acidente envolvendo um ônibus matou 20 crianças e um adulto na Uganda. O grupo de estudantes estava retornando de um passeio quando o veículo tombou.", "titulo_pt": "Acidente com ônibus mata 20 crianças e um adulto em Uganda", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 56470, "titulo": "Flávio diz que foto com Sicário é manipulação por IA: “Mindinho de 20 cm”", "url": "https://www.cnnbrasil.com.br/politica/flavio-diz-que-foto-com-sicario-e-manipulacao-por-ia-mindinho-de-20-cm/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T10:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Flávio disse que a foto dele ao lado do suposto cúmplice de Daniel Vorcaro foi manipulada por inteligência artificial. A imagem teria sido tirada em um hotel no Rio de Janeiro em 2022.", "titulo_pt": "Flávio afirma que foto com suposto Sicário é manipulação por IA", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 56424, "titulo": "Prefeito vira alvo do MP: “Joga no nosso time ou pede para sair”", "url": "https://www.metropoles.com/colunas/mirelle-pinheiro/prefeito-vira-alvo-do-mp-joga-no-nosso-time-ou-pede-para-sair", "fonte_id": "metropoles", "data_pub": "2026-07-17T10:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O prefeito se tornou alvo de uma ação do Ministério Público após o vazamento de um vídeo de dez minutos nas redes sociais. O caso gerou repercussão pública.", "titulo_pt": "Prefeito vira alvo do MP: 'joga no nosso time ou pede para sair'", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 56467, "titulo": "‘Não é hora de tomar muito risco’, diz Safra Asset a três meses da eleição", "url": "https://www.infomoney.com.br/onde-investir/nao-e-hora-de-tomar-muito-risco-diz-safra-asset-a-tres-meses-da-eleicao/", "fonte_id": "infomoney", "data_pub": "2026-07-17T10:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Safra Asset recomendou que os investidores não tomem grandes riscos três meses antes das eleições. A empresa observa que a disputa política já está influenciando os preços, embora ainda não tenha esquentado completamente.", "titulo_pt": "Não é hora de tomar muito risco", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 56389, "titulo": "Inflação da Zona do Euro cai para 2,8% em junho", "url": "https://www.poder360.com.br/poder-internacional/inflacao-da-zona-do-euro-cai-para-28-em-junho/", "fonte_id": "poder360", "data_pub": "2026-07-17T10:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A inflação da Zona do Euro caiu para 2,8% em junho. Os serviços foram a principal contribuição para o índice anual da UE que recuou para 2,9%.", "titulo_pt": "Inflação da Zona do Euro cai para 2,8% em junho", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 56403, "titulo": "Guerra de facções na CBF tem demissões e novas denúncias de gastos irregulares de Samir Xaud", "url": "https://veja.abril.com.br/politica/guerra-de-faccoes-na-cbf-tem-demissoes-e-novas-denuncias-de-gastos-irregulares-de-samir-xaud/", "fonte_id": "veja", "data_pub": "2026-07-17T10:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A CBF enfrenta novas denúncias de gastos irreg _duplicata_de": null, "texto_pt": "A cientista política Gabriela Rollemberg analisou o peso do eleitorado feminino e os desafios das candidatas em 2026 durante a estreia do PoderDataCast.", "titulo_pt": "Democracia é irreal no Brasil porque exclui maioria da população", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 56397, "titulo": "Só mulheres são capazes de romper a polarização, diz Gabriela Rollemberg", "url": "https://www.poder360.com.br/poderdata/so-mulheres-sao-capazes-de-romper-a-polarizacao-diz-gabriela-rollemberg/", "fonte_id": "poder360", "data_pub": "2026-07-17T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A cientista política Gabriela Rollemberg afirma que as mulheres terão um peso decisivo na eleição de 2026 e que elas devem ocupar mais espaços nos centros de poder.", "titulo_pt": "Somente mulheres podem romper a polarização, diz Gabriela Rollemberg", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 56500, "titulo": "Ricardo Nunes tenta entregar gestão de escolas municipais a ONGs e reabre atrito com educadores em São Paulo", "url": "https://www.brasildefato.com.br/2026/07/17/ricardo-nunes-tenta-entregar-gestao-de-escolas-municipais-de-sao-paulo-a-ongs-e-reabre-atrito-com-educadores/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-17T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Prefeitura de São Paulo, sob a gestão de Ricardo Nunes (MDB), anunciou um edital para contratar Organizações Não-Governamentais (ONGs) para gerir escolas municipais. Este passo gerou atritos com os educadores da cidade.", "titulo_pt": "Ricardo Nunes anuncia contrato de ONGs para gestão de escolas municipais e reabre disputa com educadores", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 56508, "titulo": "Com novo tarifaço de Trump e déficit fiscal crescente, Brasil chega à eleição mais importante do mundo em 2026 sem margem para erro, diz analista", "url": "https://www.bbc.com/portuguese/articles/ce85dlnv602o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-17T07:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estrategista global avaliou que os efeitos do tarifaço de Trump sobre o investimento estrangeiro e, principalmente, sobre o tabuleiro eleitoral para outubro são complexos de calcular. O Brasil chega às eleições mais importantes do mundo em 2026 sem margem para erro, segundo analista.", "titulo_pt": "Com tarifaço de Trump e déficit fiscal crescente, Brasil enfrenta desafios na eleição de 2026", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 56344, "titulo": "Presidente de entidade usou filha de deputado para chantageá-lo no caso INSS, diz PF", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/presidente-de-entidade-usou-filha-de-deputado-para-chantagea-lo-no-caso-inss-diz-pf.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal informou que o presidente da Conafer, Carlos Lopes, tentou chantagear o deputado Eros Biondini (PL-MG) ameaçando divulgar que a filha do parlamentar recebeu pagamentos da entidade. O caso envolve acusações contra Carlos Lopes e Eros Biondini.", "titulo_pt": "Presidente de entidade usou filha de deputado para chantageá-lo no caso INSS, diz PF", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 56354, "titulo": "Multa para quem não vota é de R$ 3,51, valor que não é reajustado desde 1993", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/multa-para-quem-nao-vota-e-de-r-351-valor-que-nao-e-reajustado-desde-1993.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-17T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A multa para quem não vota varia de R$ 1,05 a R$ 3,51 por turno e não foi reajustada desde 1993. Se tivesse sido corrigida pela inflação, o valor hoje seria aproximadamente R$ 27.", "titulo_pt": "Multa para não votar é de R$ 3,51, sem reajuste desde 1993", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 56355, "titulo": "Cunha usa rádios para articular pré-campanha a deputado em MG e é isolado por correligionários locais", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/cunha-usa-radios-para-articular-pre-campanha-a-deputado-em-mg-e-e-isolado-por-correligionarios-locais.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-17T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Eduardo Cunha utilizava rádios para articular sua pré-campanha, convidando representantes locais para participar de estreias de emissoras em Minas Gerais. No entanto, ele foi isolado por correligionários locais.", "titulo_pt": "Cunha usa rádios para articular pré-campanha a deputado em MG e é isolado por correligionários locais", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 56950, "titulo": "U.S. hits bridges and energy targets, Iran says, as strikes widen", "url": "https://www.washingtonpost.com/world/2026/07/17/us-hits-bridges-energy-targets-iran-says-strikes-widen/", "fonte_id": "washington_post_world", "data_pub": "2026-07-17T10:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos realizaram ataques na infraestrutura iraniana por seis dias consecutivos. Uma reação de Teerã resultou em danos a uma usina de energia e desalinização no Kuwait.", "titulo_pt": "EUA atacam infraestrutura iraniana e causam dano a planta de energia no kuwait, diz Irã", "veiculo": "Washington Post - World", "pais": "EUA", "classe": "A"}, {"id": 56774, "titulo": "US Central Command: Over 50,000 American military personnel operating in Middle East", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/us-central-command-over-50000-american-military-personnel-operating", "fonte_id": "middle_east_eye", "data_pub": "2026-07-17T10:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Comando Central dos Estados Unidos informou que mais de 50 mil militares americanos estão operando no Oriente Médio. A força militar americana realizou ataques noturnos consecutivos contra alvos iranianos, afirmando ter atingido várias instalações militares, incluindo sites de vigilância costeira e defesa aérea, infraestrutura logística e capacidades marítimas.", "titulo_pt": "Mais de 50 mil militares americanos operando no oriente médio", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 56824, "titulo": "La Germania apre alla concorrenza ferroviaria, assist a Italo", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/17/la-germania-apre-alla-concorrenza-ferroviaria-assist-a-italo_0a0356e7-c130-460c-94c3-92766bae7db1.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-17T10:41:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "A Alemanha permitiu a concorrência ferroviária, com a chegada da decisão final da Agência Federal das Redes. A Italo será uma das empresas a operar no mercado alemão.", "titulo_pt": "Alemanha abre para concorrência ferroviária, Italo participa", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 56690, "titulo": "Trump's team says 'no children' died from USAID cuts. Consider these 3 cases", "url": "https://www.npr.org/2026/07/17/g-s1-133651/usaid-elon-musk-rubio-deaths", "fonte_id": "npr_news", "data_pub": "2026-07-17T10:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ambos Marco Rubio e Elon Musk afirmaram que nenhum óbito foi ligado aos cortes no financiamento da agência de ajuda internacional. No entanto, há relatos de três casos em que isso não é verdade.", "titulo_pt": "Equipe de trump diz 'nenhuma criança' morreu com corte no USAID. Conheça 3 casos", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 56825, "titulo": "Fonte militare siriana nega che l'Iran abbia bombardato la base di Al-Tanf", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/17/fonte-militare-siriana-nega-che-liran-abbia-bombardato-la-base-di-al-tanf_da3c338e-2c19-4806-bf7b-9200003729a2.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-17T10:36:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Forças americanas afirmaram ter retirado suas tropas da base de Al-Tanf no início do ano. Uma fonte militar síria negou que o Irã tenha bombardeado a mesma base.", "titulo_pt": "Fonte militar síria nega que o Irã tenha bombardeado a base de Al-Tanf", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 56723, "titulo": "Who are Russia's 3,000 African army recruits fighting in Ukraine?", "url": "https://www.france24.com/en/who-are-russia-s-3-000-african-army-recruits-fighting-in-ukraine", "fonte_id": "france24", "data_pub": "2026-07-17T10:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Rússia continua a recrutar africanos para combater na Ucrânia. O número de recrutas identificados pelo plataforma Stop Russian Recruiters, ligada ao Ministério da Defesa ucraniano, chega a quase 3.000, com cerca de um em cada seis já morto.", "titulo_pt": "Quem são os 3.000 recrutas africanos que a Rússia está enviando para lutar na Ucrânia?", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 56775, "titulo": "Israeli forces continue drone strikes in southern Lebanon", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/israeli-forces-continue-drone-strikes-southern-lebanon", "fonte_id": "middle_east_eye", "data_pub": "2026-07-17T10:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Forças israelenses realizaram ataques com drones na região de Al-Mansouri, no sul do Líbano. Segundo a Agência Nacional de Notícias do Líbano (NNA), uma operação militar noturna também bloqueou os moradores de Haris. Até ontem, 4.324 pessoas foram mortas por ataques israelenses no Líbano desde 3 de março.", "titulo_pt": "Forças israelenses continuam com ataques a drones no sul do líbano", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 56625, "titulo": "The 20-Somethings Running Ukraine’s War Machine", "url": "https://www.nytimes.com/2026/07/17/world/europe/youth-ukraine-defense-innovation.html", "fonte_id": "nyt_world", "data_pub": "2026-07-17T10:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma nova geração está trabalhando para acelerar a entrega de armamentos aos frontline, mas o establishment resistiu, e agora o jovem ministro da defesa ucraniano foi demitido.", "titulo_pt": "Os vinte-somethings liderando a máquina de guerra da Ucrânia", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 56724, "titulo": "Trump reviving election fraud claims to contest midterm results, say Democrats", "url": "https://www.france24.com/en/trump-reviving-election-fraud-claims-to-contest-midterm-results-say-democrats", "fonte_id": "france24", "data_pub": "2026-07-17T10:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Trump está reavivando suas acusações antigo sobre a segurança das eleições nos EUA. Em um discurso televisado, o presidente acusou China de uma suposta brecha histórica em dados eleitorais e divulgou documentos que ele afirma mostram interferência estrangeira, apesar da falta de evidências de que atores estrangeiros alteraram os resultados das eleições nos EUA.", "titulo_pt": "Trump reaviva acusações de fraudes nas eleições para contestar os resultados dos gerais, dizem democratas", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 56622, "titulo": "Iran War Live Updates: U.S. Hits Bridges and a Port in Country’s South, Iranian Media says", "url": "https://www.nytimes.com/live/2026/07/17/world/iran-war-trump-hormuz", "fonte_id": "nyt_world", "data_pub": "2026-07-17T10:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O comando central das Forças Armadas dos Estados Unidos informou que os últimos ataques haviam atingido várias infraestruturas militares iranianas, sem mencionar qualquer estrutura civil. A mídia iraniana relata que os Estados Unidos atacaram pontes e um porto no sul do país.", "titulo_pt": "Atualizações da guerra no Irã: EUA atacam pontes e porto no sul do países, diz mídia iraniana", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 56826, "titulo": "Scade il 31 luglio termine per adesione enti locali a rottamazione quinquies", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/17/scade-il-31-luglio-termine-per-adesione-enti-locali-a-rottamazione-quinquies_c4f5086c-c4f9-499d-b6cf-f19607adcd40.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-17T10:25:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "A data limite para a adesão de entidades locais ao processo de rottamazione quinquies é 31 de julho. O prazo vence para os carregamentos referentes à IMU, TARII, bollo do carro e multas de trânsito.", "titulo_pt": "Termina em 31 de julho prazo para adesão de entidades locais ao processo de rottamazione quinquies", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 56725, "titulo": "'Project Afrika': Inside Russia's propaganda machine", "url": "https://www.france24.com/en/tv-shows/reporters/20260717-project-afrika-inside-russia-s-propaganda-machine", "fonte_id": "france24", "data_pub": "2026-07-17T10:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "FRANCE 24 produziu um relatório especial sobre como agentes russos estavam publicando centenas de artigos em mídias francesas na África Ocidental e Central. A equipe do canal viajou para Dakar, Senegal, para investigar essa operação secreta.", "titulo_pt": "'Projecto Afrika': dentro da máquina de propaganda russa", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 56827, "titulo": "L'Ue allenta la stretta sulle quote di CO2 dopo il 2030", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/17/lue-allenta-la-stretta-sulle-quote-di-co2-dopo-il-2030_0d4ebb12-596d-4db8-b1dd-28e699edf143.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-17T10:18:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "A União Europeia reduzirá a exigência de emissões de CO2 para veículos novos, passando do teto atual de 4,4% até 2030 para 3,7% entre 2031 e 2035. A partir de 2036, o limite será reduzido para 1,7%, abaixo das expectativas iniciais.", "titulo_pt": "União europeia relaxa restrições sobre emissões de CO2 após 2030", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 56735, "titulo": "How AI and satellites help fight wildfires", "url": "https://www.dw.com/en/how-ai-and-satellites-help-fight-wildfires/a-77966509?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-17T10:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Fogos florestais estão ativos na Europa e no Canadá, entre outros lugares. A detecção precoce por satélite e o uso de análise de dados com inteligência artificial podem auxiliar na luta contra esses incêndios.", "titulo_pt": "Como a IA e os satélites ajudam a combater incêndios florestais", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 56828, "titulo": "Lupi, al Senato Noi Moderati riproporrà il tema delle preferenze", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/17/lupi-al-senato-noi-moderati-riproporra-il-tema-delle-preferenze_9b034b01-399c-406e-980b-00c09fe9c039.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-17T10:06:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O grupo moderado do partido Forza Italia planeja apresentar o tema das preferências eleitorais ao Senado. O objetivo é estabelecer um sistema que assegure estabilidade e governabilidade.", "titulo_pt": "Líderes moderados de força Itália proporão tema das preferências eleitorais", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 56718, "titulo": "School bus crash kills at least 20 pupils in Uganda", "url": "https://www.bbc.co.uk/news/articles/c151gegwqv1o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-17T10:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um acidente de ônibus escolar resultou na morte de pelo menos 20 alunos no Uganda. Várias outras pessoas, incluindo funcionários da escola, ficaram feridas e o incidente é suspeito de ter sido causado por falha mecânica.", "titulo_pt": "Acidente de ônibus escolar mata ao menos 20 estudantes no Uganda", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 56632, "titulo": "Bodegas en zonas industriales del norte y poniente de la RM se han encarecido 71% desde la pandemia", "url": "https://www.latercera.com/pulso/noticia/bodegas-en-zonas-industriales-del-norte-y-poniente-de-la-rm-se-han-encarecido-71-desde-la-pandemia/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T11:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "As bodegas localizadas nas zonas industriais do norte e oeste da Região Metropolitana de Santiago se valorizaram em 71% desde a pandemia, conforme relatório da agência imobiliária Newmark. O estudo comparou as vendas de diferentes tipos de instalações e constatou que os espaços flexíveis tiveram um valor maior por metro quadrado em comparação com os industriais.", "titulo_pt": "Bodegas nas zonas industriais do norte e oeste da RM se valorizaram 71% desde a pandemia", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 56462, "titulo": "Com o novo tarifaço nos EUA, qual será o impacto na economia brasileira?", "url": "https://www.infomoney.com.br/economia/com-o-novo-tarifaco-nos-eua-qual-sera-o-impacto-na-economia-brasileira/", "fonte_id": "infomoney", "data_pub": "2026-07-17T10:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Câmara Americana de Comércio para o Brasil estima que US$ 11 bilhões em exportações brasileiras possam ser afetados pelo novo tarifaço nos Estados Unidos, mas especialistas destacam que 62% dos itens envolvidos estão na lista de exceções.", "titulo_pt": "Qual será o impacto da nova tarifa nos EUA na economia brasileira?", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 56463, "titulo": "Tarifa dos EUA para produtos do Brasil será 2ª maior dentre todos os países; entenda", "url": "https://www.infomoney.com.br/economia/tarifa-dos-eua-para-produtos-do-brasil-sera-2a-maior-dentre-todos-os-paises-entenda/", "fonte_id": "infomoney", "data_pub": "2026-07-17T10:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A tarifa média sobre produtos importados dos EUA do Brasil será a segunda maior entre todos os países, atingindo um pico de 18,2% por quatro dias. O monitor de comércio exterior registrou essa informação.", "titulo_pt": "Tarifa dos EUA para produtos do Brasil será a segunda maior entre todos os países; entenda", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 56471, "titulo": "Bolsas da Ásia fecham em forte baixa com tombo de ações ligadas à IA", "url": "https://www.cnnbrasil.com.br/economia/mercado/bolsas-da-asia-fecham-em-forte-baixa-com-tombo-de-acoes-ligadas-a-ia/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T10:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As bolsas da Ásia fecharam em forte baixa, influenciadas por uma queda nas ações relacionadas à inteligência artificial. Este movimento ocorreu após as bolsas de Nova York terem encerrado em baixa generalizada no dia anterior, com destaque para as ações de tecnologia.", "titulo_pt": "Bolsas da Ásia fecham em forte baixa com tombo de ações ligadas à IA", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 56388, "titulo": "EUA aprovam pílula da Merck para reduzir colesterol", "url": "https://www.poder360.com.br/poder-saude/eua-aprovam-pilula-da-merck-para-reduzir-colesterol/", "fonte_id": "poder360", "data_pub": "2026-07-17T10:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos aprovaram uma pílula desenvolvida pela Merck para reduzir o nível de colesterol no organismo. É o primeiro medicamento dessa classe, conhecida como inibidores de PCSK9, a ser autorizado pelo país.", "titulo_pt": "EUA aprovam pílula da Merck para reduzir colesterol", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 56339, "titulo": "Juiz vê litigância de má-fé e multa Stone em acusação de fraudes no Pix", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/07/juiz-ve-litigancia-de-ma-fe-e-multa-stone-em-acusacao-de-fraudes-no-pix.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O juiz Luiz Gustavo Giuntini de Rezende, do TJSP, determinou litigância de má-fé e aplicou uma multa à fintech Stone em uma ação que investiga supostas fraudes no Pix. A cliente da empresa é autora do processo, que está em fase inicial.", "titulo_pt": "Juiz considera litigância de má-fé e multa Stone em acusação de fraudes no Pix", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 56473, "titulo": "Imposto Seletivo desafia contratos de infraestrutura na Reforma Tributária", "url": "https://www.cnnbrasil.com.br/infra/imposto-seletivo-desafia-contratos-de-infraestrutura-na-reforma-tributaria/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Imposto Seletivo é um componente da Reforma Tributária que já está levantando dúvidas sobre sua aplicação, conforme expôs Haroldo Domingos Bertoni Filho em artigo à CNN. O tributo ainda depende de regulamentação.", "titulo_pt": "Imposto Seletivo desafia contratos de infraestrutura na Reforma Tributária", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 56648, "titulo": "Megarreforma: Donaciones y crédito al empleo parten de inmediato y exención de contribuciones para adultos mayores en enero del 2027", "url": "https://www.latercera.com/pulso/noticia/megarreforma-donaciones-y-credito-al-empleo-parten-de-inmediato-y-exencion-de-contribuciones-para-adultos-mayores-en-enero-del-2027/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T10:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Senado aprovou a megarreforma e encaminhou o projeto à Câmara dos Deputados para seu terceiro e último trâmite legislativo. As alterações feitas no Senado serão somente revisadas na Câmara.", "titulo_pt": "Megasreforma: doações e crédito ao emprego entram em vigor imediatamente e exenção de contribuições para idosos começa em 2027", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 56503, "titulo": "“Céu Único”: Brasil dá passo para acordo que pode mudar o mercado aéreo", "url": "https://braziljournal.com/ceu-unico-brasil-da-passo-para-acordo-que-pode-mudar-o-mercado-aereo/", "fonte_id": "brazil_journal", "data_pub": "2026-07-17T09:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil assinou um memorando de entendimento com Argentina, Chile e Paraguai para avançar no acordo de 'Céu Único Sul-Americano', o primeiro passo para uma política que permitiria a liberação de voos por todo o espaço aéreo sul-americano. Este acordo visa introduzir competição no mercado aéreo nacional.", "titulo_pt": "Céu Único: Brasil avança em acordo que pode transformar o mercado aéreo", "veiculo": "Brazil Journal", "pais": "Brasil", "classe": "B"}, {"id": 56505, "titulo": "Subestimar a Meta em AI é um erro, diz a Arbor Capital", "url": "https://braziljournal.com/subestimar-a-meta-em-ai-e-um-erro-diz-a-arbor-capital/", "fonte_id": "brazil_journal", "data_pub": "2026-07-17T09:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ação da Meta tem caído nos últimos 12 meses, contrariando o desempenho do S&P 500, devido ao ceticismo sobre seus investimentos pesados em inteligência artificial. No entanto, os gestores da Arbor Capital consideram subestimar esses investimentos como um erro.", "titulo_pt": "Subestimar a Meta em AI é um erro, diz a Arbor Capital", "veiculo": "Brazil Journal", "pais": "Brasil", "classe": "B"}, {"id": 56514, "titulo": "Adicionais de até R$ 64 mil e jetons de R$ 46 mil dividem Comitê Gestor do IBS", "url": "https://www.jota.info/coberturas-especiais/pulso-da-reforma/adicionais-de-ate-r-64-mil-e-jetons-de-r-46-mil-dividem-comite-gestor-do-ibs", "fonte_id": "jota", "data_pub": "2026-07-17T09:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os conselheiros do Comitê Gestor do IBS pediram vista para analisar propostas de adicionais salariais que chegam a R$ 64 mil e jetons que podem atingir R$ 46 mil. A proposta deve voltar à votação após essa solicitação.", "titulo_pt": "Adicionais e jetons elevados dividem Comitê Gestor do IBS", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 56340, "titulo": "É provável que produtividade aumente com menos horas de trabalho, diz Nobel de Economia", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/e-provavel-que-produtividade-aumente-com-menos-horas-de-trabalho-diz-nobel-de-economia.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O economista Christopher Pissarides, vencedor do Prêmio Nobel de Economia de 2010, afirma que a redução da carga horária de trabalho provavelmente levará ao aumento da produtividade.", "titulo_pt": "É provável que produtividade aumente com menos horas de trabalho, diz Nobel de Economia", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 56342, "titulo": "BNDES pede R$ 7,25 bilhões à Fazenda para reforçar socorro a setores afetados por tarifas dos EUA", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/bndes-pede-r-725-bilhoes-a-fazenda-para-reforcar-socorro-a-setores-afetados-por-tarifas-dos-eua.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O BNDES solicitou ao Ministério da Fazenda a liberação de R$ 7,25 bilhões para reforçar as linhas de crédito destinadas a empresas afetadas pelas tarifas impostas pelos Estados Unidos. O objetivo é auxiliar setores econômicos impactados por essas medidas comerciais.", "titulo_pt": "BNDES pede R$ 7,25 bilhões à Fazenda para reforçar socorro a empresas afetadas por tarifas dos EUA", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 56517, "titulo": "Reforma tributária: necessidade de auditar fornecedores do Simples Nacional", "url": "https://www.jota.info/opiniao-e-analise/artigos/reforma-tributaria-necessidade-de-auditar-fornecedores-do-simples-nacional", "fonte_id": "jota", "data_pub": "2026-07-17T08:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A reforma tributária requer a auditoria de fornecedores do Simples Nacional para extrair eficiência do novo sistema. As análises não podem ser fragmentadas, devendo abranger toda a cadeia de suprimentos.", "titulo_pt": "Necessidade de auditar fornecedores do Simples Nacional na reforma tributária", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 56519, "titulo": "Lei do Bem: a pergunta que todo profissional tributário deveria fazer ao cliente", "url": "https://www.jota.info/opiniao-e-analise/colunas/women-in-tax-brazil/lei-do-bem-a-pergunta-que-todo-profissional-tributario-deveria-fazer-ao-cliente", "fonte_id": "jota", "data_pub": "2026-07-17T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Empresas investem em inovação sem aproveitar completamente os benefícios fiscais previstos na legislação. Isso ocorre porque muitos profissionais tributários não questionam adequadamente as vantagens legais com seus clientes.", "titulo_pt": "Lei do Bem: a pergunta que todo profissional tributário deveria fazer ao cliente", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 56912, "titulo": "China, Netherlands urge Nexperia talks as Wingtech warns of 1H loss", "url": "https://www.digitimes.com/news/a20260717VL215/nexperia-netherlands-loss-2025-luxshare.html", "fonte_id": "digitimes", "data_pub": "2026-07-17T07:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo da China e dos Países Baixos concordaram que devem criar um ambiente favorável para empresas resolverem o conflito envolvendo a Nexperia por meio de consultas. A declaração foi feita pelo Ministério do Comércio da China em 16 de julho.", "titulo_pt": "China e países baixos pressionam negociações entre empresas sobre disputa da Nexperia", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}], "economia__eventos": [], "tecnologia": [{"id": 56637, "titulo": "Oracle sobre el uso de IA en Chile: “Estamos saliendo de procesos exploratorios a procesos más productivos”", "url": "https://www.latercera.com/pulso/noticia/oracle-sobre-el-uso-de-ia-en-chile-estamos-saliendo-de-procesos-exploratorios-a-procesos-mas-productivos/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T11:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Oracle projeta um aumento de 23% no gasto das empresas chilenas com tecnologia cloud neste ano, e um incremento de 87% em inteligência artificial. Essas estimativas foram detalhadas pelo country manager da empresa no Chile, Christian Delfino.", "titulo_pt": "Oracle sobre o uso de IA no Chile: ‘saímos de processos exploratórios para processos mais produtivos’", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 56887, "titulo": "The war on ‘woke science’ comes for space research", "url": "https://www.theverge.com/science/966711/omb-grant-science-space-nasa-planetary-society", "fonte_id": "the_verge", "data_pub": "2026-07-17T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo Trump está conduzindo uma guerra cultural contra a ciência, e o último ataque é uma proposta burocrática do Office of Management and Budget (OMB) que pode ameaçar o futuro da pesquisa científica nos Estados Unidos. A proposta dá poderes políticos inéditos para aprovadores designados sobre os fundos de bolsa.", "titulo_pt": "Guerra cultural contra a ciência atinge pesquisas espaciais", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 56974, "titulo": "Meet the startup tackling AI's forgotten challenge: your camera roll", "url": "https://tech.eu/2026/07/17/meet-the-startup-tackling-ais-forgotten-challenge-your-camera-roll/", "fonte_id": "tech_eu", "data_pub": "2026-07-17T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma startup de Londres está abordando um desafio diferente no setor de IA: interpretar as enormes arquivagens pessoais que já foram criadas, em vez da obsessão com a geração de imagens, vídeos e texto.", "titulo_pt": "Conheça a startup que enfrenta o desafio esquecido da IA: sua galeria de fotos", "veiculo": "Tech.eu", "pais": "Bélgica", "classe": "B"}, {"id": 56889, "titulo": "Panasonic Japanese Microwave Review (2026): True 1-Button Cooking", "url": "https://www.wired.com/review/panasonic-japanese-microwave/", "fonte_id": "wired", "data_pub": "2026-07-17T10:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O micro-ondas japonês mede a temperatura do alimento durante o cozimento e para automaticamente quando o alimento estiver pronto. É considerado bastante eficaz.", "titulo_pt": "Panasonic micro-ondas japonês: cozimento automático por temperatura", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 56891, "titulo": "A $10K Bounty Aims to Make Sony’s PlayStation 5 a Computer Again", "url": "https://www.wired.com/story/a-10k-bounty-aims-to-make-the-ps5-a-computer-again/", "fonte_id": "wired", "data_pub": "2026-07-17T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma recompensa de $10.000 foi oferecida para que o PlayStation 5 possa rodar sistemas operacionais Linux, transformando-o em um computador.", "titulo_pt": "Prêmio de $10K visa fazer do PlayStation 5 um computador", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 56817, "titulo": "Apple targets dozens of OpenAI employees with legal letters", "url": "https://www.ft.com/content/1b8c9d52-88a9-426b-ba47-f1811f859166?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-17T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Apple enviou cartas legais a dezenas de funcionários da OpenAI, intensificando sua estratégia agressiva no conflito sobre segredos industriais. A empresa está em disputa com o laboratório de inteligência artificial por questões relacionadas a tecnologia.", "titulo_pt": "Apple alvo de dezenas de empregados da OpenAI com cartas legais", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 56892, "titulo": "San Francisco Demands Apple and Google Delete AI ‘Nudify’ Apps From App Stores", "url": "https://www.wired.com/story/san-francisco-demands-apple-and-google-delete-ai-nudify-apps-from-app-stores/", "fonte_id": "wired", "data_pub": "2026-07-17T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A promotora de justiça de São Francisco enviou cartas de paralisação a Apple e Google, exigindo que eles removam 13 aplicativos de troca facial (face-swap) dos seus respectivos lojas de aplicativos. Esses aplicativos são principalmente usados para alvo mulheres e meninas.", "titulo_pt": "São Francisco require Apple e Google remover aplicativos 'Nudify' inteligentes da loja", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 56975, "titulo": "SAP acquires Prior Labs just 18 months after launch in €1B+ deal", "url": "https://tech.eu/2026/07/17/sap-acquires-prior-labs-just-18-months-after-launch-in-eur1b-deal/", "fonte_id": "tech_eu", "data_pub": "2026-07-17T09:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A SAP adquiriu a empresa de IA avançada Prior Labs, fundada na Alemanha, por mais de 1 bilhão de euros. A transação ocorreu apenas 18 meses após o lançamento da Prior Labs.", "titulo_pt": "SAP adquire Prior Labs por mais de 1 bilhão de euros", "veiculo": "Tech.eu", "pais": "Bélgica", "classe": "B"}, {"id": 56710, "titulo": "China just erased America's AI lead", "url": "https://www.axios.com/2026/07/17/china-ai-kimi-k3-open-source-anthropic-opus", "fonte_id": "axios", "data_pub": "2026-07-17T09:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A China lançou um novo modelo de IA chamado Kimi K3, que rapidamente se posicionou no topo dos principais modelos globais, superando Fable 5 da Anthropic e GPT-5.6 Sol da OpenAI em testes de codificação front-end. Isso indica o fim do domínio americano na IA avançada.", "titulo_pt": "China eliminou a liderança americana na IA", "veiculo": "Axios", "pais": "EUA", "classe": "B"}, {"id": 56893, "titulo": "The Group Behind ‘2000 Mules’ Is Back With Another Election Conspiracy Film", "url": "https://www.wired.com/story/the-group-behind-2000-mules-is-back-with-another-election-conspiracy-film/", "fonte_id": "wired", "data_pub": "2026-07-17T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "True the Vote está trabalhando com um pastor de Detroit para produzir um novo documentário chamado Trap, baseado em acusações que já foram rejeitadas em julgamentos judiciais.", "titulo_pt": "O grupo por trás de '2000 mulas' volta com outro documentário sobre conspiração eleitoral", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 56820, "titulo": "Global tech stocks fall as AI trade goes into reverse", "url": "https://www.ft.com/content/79a15abd-5892-4f1c-b038-b09a1ceecabb?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-17T09:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações de tecnologia global estão caindo, e o índice das ações de semicondutores dos EUA está prestes a registrar sua pior semana desde o colapso de 2022. O mercado está revertendo a tendência positiva recente do trade em inteligência artificial.", "titulo_pt": "Ações de tecnologia globais caem com reversão no trade de IA", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 56894, "titulo": "The CDC Has a Cyclospora Lab. DOGE Downsized It Last Year", "url": "https://www.wired.com/story/cdc-cyclospora-lab-doge-downsized-it-last-year/", "fonte_id": "wired", "data_pub": "2026-07-17T09:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O laboratório do CDC que trabalha com Cyclospora reduziu suas operações no ano passado, o que, segundo ex-diretor do laboratório, vai significativamente diminuir as respostas rápidas e imediatas necessárias para responder a surtos.", "titulo_pt": "O CDC reduziu seu laboratório de Cyclospora. Isso vai diminuir respostas a surtos.", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 56883, "titulo": "There’s a lot of hype around perimenopause. Don’t buy it.", "url": "https://www.technologyreview.com/2026/07/17/1140608/theres-a-lot-of-hype-around-perimenopause-dont-buy-it/", "fonte_id": "mit_tech_review", "data_pub": "2026-07-17T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Perimenopausa é um tópico cada vez mais discutido, graças à influência de médicos na televisão e influenciadores nas redes sociais. Ela era considerada tabu no passado, mas isso mudou recentemente.", "titulo_pt": "Há muito hype em torno da perimenopausa. Não compreenda.", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 56761, "titulo": "Chinese startup Moonshot AI unveils Kimi model it says rivals OpenAI, Anthropic", "url": "https://www.cnbc.com/2026/07/17/moonshot-ai-kimi-k3-model-openai-anthropic-china.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-17T08:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A startup chinesa Moonshot AI apresentou o modelo Kimi, que a empresa afirma competir com os modelos de inteligência artificial desenvolvidos pela OpenAI e Anthropic. Este é o último dos modelos de IA da China a reduzir o gap de desempenho em relação aos laboratórios de AI líderes nos Estados Unidos.", "titulo_pt": "Inovação chinesa: Moonshot AI revela modelo Kimi que rivaliza com OpenAI e Anthropic", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 56870, "titulo": "Agentic AI: the next battleground for Chinese brands", "url": "https://www.scmp.com/opinion/china-opinion/article/3360497/agentic-ai-next-battleground-chinese-brands?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-17T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As empresas chinesas dominaram os guias de marketing nas mídias sociais, mas agora precisam conquistar a confiança dos agentes de inteligência artificial (IA) que cada vez mais influenciarão as decisões de consumo. Estes assistentes pessoais estão começando a escolher as melhores opções para cada usuário, balanceando preço, qualidade, fiabilidade, sustentabilidade e preferências individuais.", "titulo_pt": "IA agente: o próximo campo de batalha para marcas chinesas", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 56872, "titulo": "Philippines’ Pax Silica AI hub plan slammed for mineral ‘plunder’", "url": "https://www.scmp.com/week-asia/economics/article/3360932/philippines-pax-silica-ai-hub-plan-slammed-mineral-plunder?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-17T08:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Philippine e americanos planejam um hub tecnológico em uma área de 1.620 hectares no norte de Manila, focado em AI, semicondutores e minerais críticos. No entanto, os críticos veem o projeto como prova adicional de investimentos ambiciosos sobre terras contestadas, prejudicando as comunidades locais e suas fontes de renda.", "titulo_pt": "Plano de hub tecnológico Pax Silica do filipinas criticado por 'exploração mineral'", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 56952, "titulo": "Research finds that dropping SAT and ACT requirements may improve access, but may also hinder college admissions", "url": "https://phys.org/news/2026-07-sat-requirements-access-hinder-college.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A eliminação das exigências de testes padronizados como SAT e ACT pode tornar a admissão na universidade mais acessível para alguns candidatos, mas também pode dificultar para as instituições identificarem estudantes de alto potencial. O estudo indica que essa decisão envolve equilíbrios sutis entre o valor informativo dos scores e os barreiras à acessibilidade.", "titulo_pt": "Estudo conclui que eliminar exigências de testes padronizados pode aumentar a acessibilidade, mas também dificultar a identificação de alunos promissores", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 56953, "titulo": "At least 12,000 excess deaths in Europe's June heat wave", "url": "https://phys.org/news/2026-07-excess-deaths-europe-june.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T10:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pelo menos 12 mil mortes a mais foram registradas durante a onda de calor de junho em nove países europeus, conforme indicaram as estatísticas nacionais. O número pode aumentar à medida que novos dados forem divulgados.", "titulo_pt": "Pelo menos 12 mil mortes a mais na onda de calor de junho em Europa", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 56965, "titulo": "Serbia signs the Artemis Accords", "url": "https://spacenews.com/serbia-signs-the-artemis-accords/", "fonte_id": "spacenews", "data_pub": "2026-07-17T10:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Sérvia assinou os Acordos Artemis, se juntando ao esforço liderado pelos Estados Unidos mais de dois anos após aderir ao projeto de base lunar chinês.", "titulo_pt": "Sérvia assina os acordos Artemis", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 56642, "titulo": "El extraño efecto de una pastilla falsa que mejoró la memoria de los pacientes en un estudio", "url": "https://www.latercera.com/tendencias/noticia/el-extrano-efecto-de-una-pastilla-falsa-que-mejoro-la-memoria-de-los-pacientes-en-un-estudio/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T10:03:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa italiana descobriu que idosos que tomaram um placebo durante três semanas melhoraram sua memória, diminuíram o nível de estresse e até aumentaram seu desempenho físico.", "titulo_pt": "Efeito estranho de uma pílula falsa que melhorou a memória dos pacientes em estudo", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 56954, "titulo": "With climate ambitions in question, EU reforms carbon market", "url": "https://phys.org/news/2026-07-climate-ambitions-eu-reforms-carbon.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A União Europeia apresenta, nesta sexta-feira, reformas na sua bolsa de carbono após intensas discussões entre países, indústria e ativistas sobre o ritmo da agenda climática do bloco.", "titulo_pt": "Com as ambições climáticas em questionamento, ue reforma mercado de carbono", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 56981, "titulo": "Why a Ukrainian cruise missile is flying with hobby drone hardware", "url": "https://www.newscientist.com/article/2580002-why-a-ukrainian-cruise-missile-is-flying-with-hobby-drone-hardware/?utm_campaign=RSS|NSNS&utm_content=home&utm_medium=RSS&utm_source=NSNS", "fonte_id": "new_scientist", "data_pub": "2026-07-17T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um sistema de controle de voo aberto-fonte, encontrado em drones consumistas, foi instalado na mais recente míssil cruise da Ucrânia. Isso demonstra como tecnologia barata está tornando equipamentos militares acessíveis a uma ampla gama de usuários.", "titulo_pt": "Por que um míssil cruzeiro ucraniano utiliza hardware de drone amador", "veiculo": "New Scientist", "pais": "Reino Unido", "classe": "B"}, {"id": 57000, "titulo": "Are we underestimating the threat of solar storms? A 'once-in-a-thousand-year' disaster is worth considering, scientists say", "url": "https://www.space.com/astronomy/sun/are-we-underestimating-the-threat-of-solar-storms-a-once-in-a-thousand-year-disaster-is-worth-considering-scientists-say", "fonte_id": "space_com", "data_pub": "2026-07-17T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo estudo sugere que os piores temporais solares podem causar impactos maiores nos satélites, redes de energia e comunicações do que se pensava anteriormente. Os cientistas consideram que um desastre solar 'uma vez em mil anos' merece ser levado em conta.", "titulo_pt": "Estudo sugere maior impacto de temporais solares extremos na terra", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 57009, "titulo": "Transit of wonder", "url": "https://aeon.co/essays/why-has-venus-obsessed-so-many-astronomers", "fonte_id": "aeon", "data_pub": "2026-07-17T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A cada 122 anos, Vênus cruza o Sol como uma gota preta e efêmera, despertando a admiração de todos que se aventuram a conhecer - por Ananya Palivela. Este fenômeno celestial ocorre aproximadamente duas vezes em um século.", "titulo_pt": "Transito de maravilha", "veiculo": "Aeon Magazine", "pais": "Reino Unido", "classe": "A"}, {"id": 56955, "titulo": "Wildfire smoke makes air unhealthy from the US Midwest to East Coast. Officials say stay inside", "url": "https://phys.org/news/2026-07-wildfire-air-unhealthy-midwest-east.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T09:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A fumaça pesada e pungente das chamas de incêndios florestais escurou o céu dos Estados Unidos, desde os Grandes Lagos até partes da costa leste, reduzindo a visibilidade e levando autoridades a alertarem sobre o perigo de respirar o ar ao ar livre.", "titulo_pt": "Fumaça de incêndios florestais torna o ar inseguro do meio-oeste aos lados", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 56956, "titulo": "SpaceX Starship launch aborted on the pad at the last moment", "url": "https://phys.org/news/2026-07-spacex-starship-aborted-pad-moment.html", "fonte_id": "phys_org", "data_pub": "2026-07-17T09:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A SpaceX teve um aborto de lançamento poucos segundos antes do mega foguete Starship decolar para uma voo de teste. Ocorreu um falha nos motores, causando o cancelamento do lançamento em meio a nuvens de fumaça e vapor.", "titulo_pt": "Lançamento da spacex Starship abortado no último momento na plataforma", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 56356, "titulo": "Rei de 'Odisseia' não era real, mas teve adoradores de verdade em Ítaca", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/rei-de-odisseia-nao-era-real-mas-teve-adoradores-de-verdade-em-itaca.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-17T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A obra 'Odisseia', de Homero, tem sido considerada a maior jornada épica da literatura por cerca de 3.000 anos e teve diversas adaptações cinematográficas. A história se centra em um rei exilado que enfrenta desafios para retornar ao seu trono na ilha jônica de Ítaca.", "titulo_pt": "Rei de 'Odisseia' não era real, mas teve adoradores de verdade em Ítaca", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 56512, "titulo": "O que necropsias revelam sobre o risco de morte cardíaca entre fisiculturistas", "url": "https://www.bbc.com/portuguese/articles/ckg311jkj73o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-17T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A morte do fisiculturista Mailson Araújo, no estado da Bahia, reviveu um debate sobre o risco de mortes cardíacas entre atletas de musculação. Necropsias realizadas em outros atletas do esporte indicam que corações anormalmente grandes são comuns e podem estar relacionados ao uso de anabolizantes.", "titulo_pt": "O que necropsias revelam sobre o risco de morte cardíaca entre fisiculturistas", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 56961, "titulo": "Cyclospora outbreak linked to iceberg lettuce supplied to Taco Bell", "url": "https://www.scientificamerican.com/article/cyclospora-outbreak-linked-to-iceberg-lettuce-supplied-to-taco-bell/", "fonte_id": "scientific_american", "data_pub": "2026-07-17T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ocorreu uma explosão de casos de diarreia causada por um parasita em cinco estados dos Estados Unidos, que foi rastreada a iceberg lettuce servida em estabelecimentos da cadeia de fast-food Taco Bell.", "titulo_pt": "Epidemia de parasitas relacionada à
