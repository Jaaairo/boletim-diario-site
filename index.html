asaron-newton-y-einstein-por-primera-vez-un-investigador-chileno-integra-la-sociedad-cientifica-mas-selecta-del-mundo/", "fonte_id": "la_tercera", "data_pub": "2026-06-26T20:21:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O biólogo chileno, professor do University College de Londres e da U. Mayor, se tornou o primeiro chileno membro da Royal Society. A instituição é a academia científica mais antiga e prestigiosa do mundo. Sua entrada se deu por seu papel como mentor e formador.", "titulo_pt": "Tem 85 Nobel e por suas fileiras passaram Newton e Einstein: pela primeira vez um pesquisador chileno integra a sociedade científica mais seleta do mundo", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 19850, "titulo": "Aranha-balista: nova espécie cria “catapulta” para caçar formigas", "url": "https://www.metropoles.com/ciencia/aranha-catapulta-cacar-formigas", "fonte_id": "metropoles", "data_pub": "2026-06-26T20:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma nova espécie de aranha, ainda sem nome oficial, usa uma técnica similar à catapulta romana para capturar formigas como presa. O apelido balista foi dado em referência ao dispositivo militar antigo.", "titulo_pt": "Aranha-balista: nova espécie cria 'catapulta' para caçar formigas", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 20161, "titulo": "No todas las grasas son iguales: cuál aumenta el riesgo de diabetes tipo 2 y cuál ayuda a combatir la enfermedad", "url": "https://www.latercera.com/tendencias/noticia/no-todas-las-grasas-son-iguales-cual-aumenta-el-riesgo-de-diabetes-tipo-2-y-cual-ayuda-a-combatir-la-enfermedad/", "fonte_id": "la_tercera", "data_pub": "2026-06-26T20:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Compreender quais gorduras beneficiam o organismo e quais podem prejudicá-lo pode ser crucial para prevenir a diabetes tipo 2. A doença afeta milhões de pessoas em todo o mundo.", "titulo_pt": "Nem todas as gorduras são iguais: qual aumenta o risco de diabetes tipo 2 e qual ajuda a combatê-la", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 20579, "titulo": "Will humans one day talk to animals? This scientist is bringing us closer", "url": "https://www.scientificamerican.com/article/will-humans-one-day-talk-to-animals-this-scientist-is-bringing-us-closer/", "fonte_id": "scientific_american", "data_pub": "2026-06-26T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Julie Elie estuda vocalizações de pintassilgos-zebra há anos. Ela recebeu o Prêmio Coller-Dolittle por avanços na direção de um mundo onde humanos podem conversar com animais.", "titulo_pt": "Cientista aproxima humanos da comunicação com animais", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 20593, "titulo": "NASA Announces Winners for 2026 Human Lander Challenge", "url": "https://www.nasa.gov/directorates/esdmd/artemis-campaign-development-division/human-landing-system-program/nasa-announces-winners-for-2026-human-lander-challenge/", "fonte_id": "nasa_news", "data_pub": "2026-06-26T19:44:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA anunciou as melhores soluções desenvolvidas por estudantes para sistemas de controle ambiental e suporte à vida em futuros pousadores lunares tripulados. O anúncio marca o fim de meses de pesquisa por equipes universitárias trabalhando para avançar tecnologias que apoiam o programa Artemis da agência, que retornará astronautas americanos à Lua.", "titulo_pt": "NASA anuncia vencedores do Desafio Lunar para Lander Humano de 2026", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 19832, "titulo": "Real-Bari: entenda projeto-piloto que vai avaliar caneta antiobesidade no SUS", "url": "https://veja.abril.com.br/saude/real-bari-entenda-projeto-piloto-vai-avaliar-caneta-antiobesidade-no-sus/", "fonte_id": "veja", "data_pub": "2026-06-26T19:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo de dois anos, envolvendo 250 pacientes com obesidade grave, será realizado em um hospital de Porto Alegre para avaliar a eficácia da semaglutida no sistema único de saúde.", "titulo_pt": "Real-Bari: entenda projeto-piloto que vai avaliar caneta antiobesidade no SUS", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 20551, "titulo": "NASA's PACE mission studies smoke and fires", "url": "https://phys.org/news/2026-06-nasa-pace-mission.html", "fonte_id": "phys_org", "data_pub": "2026-06-26T19:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O satélite Plankton, Aerosol, Cloud, and ocean Ecosystem (PACE) da NASA está monitorando precursoras de incêndios florestais, bem como plumes de fumaça e suas movimentações durante a temporada de incêndios na América do Norte. Esses dados auxiliarão os cientistas a compreender melhor os incêndios florestais.", "titulo_pt": "Missão PACE da NASA estuda fumaça e incêndios", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 20594, "titulo": "NASA Tests New Refuel Device for Future In-Space Refueling Missions", "url": "https://www.nasa.gov/directorates/stmd/tech-demo-missions-program/cryogenic-fluid-management-cfm/nasa-tests-new-refuel-device-for-future-in-space-refueling-missions/", "fonte_id": "nasa_news", "data_pub": "2026-06-26T18:44:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA está testando um novo dispositivo de reabastecimento para as próximas missões espaciais profundas. O dispositivo seria usado para abastecer espaçonaves em órbita terrestre antes de irem mais longe no sistema solar.  É semelhante a um bocal que se encaixa no tanque de combustível de um carro.", "titulo_pt": "NASA testa novo dispositivo de reabastecimento para futuras missões no espaço", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 21130, "titulo": "Murió Ernestina Pais: fue arrollada por un tren en San Isidro", "url": "https://www.lanacion.com.ar/seguridad/murio-ernestina-pais-fue-arrollada-por-un-tren-en-san-isidro-nid26062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-27T00:14:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A vítima, de 54 anos, foi arrollada por um trenvem em um cruzamento nivelado quando dirigia seu veículo.", "titulo_pt": "Ernestina Pais morreu após ser atingida por um trem em San Isidro", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 21170, "titulo": "Mansplashing: Why do men splash everyone at the pool?", "url": "https://www.lemonde.fr/en/france/article/2026/06/27/mansplashing-why-do-men-splash-everyone-at-the-pool_6754918_7.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-27T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O comportamento do chamado 'homem da piscina', que se movimenta agitadamente na água e se estende por várias faixas de nadador, destaca as dinâmicas de poder em jogo no espaço social compartilhado das piscinas públicas.", "titulo_pt": "Mansplashing: Por que os homens molham todo mundo na piscina?", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 21188, "titulo": "Trooper Salute marches to its own beat on dazzling debut album", "url": "https://www.japantimes.co.jp/culture/2026/06/27/music/trooper-salute-debut-album/", "fonte_id": "japan_times", "data_pub": "2026-06-27T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O quinteto lançou seu primeiro álbum 'Tomogachi Ga Imashita' no dia 17 de junho, apresentando uma variedade notável de estilos influenciados por diferentes fontes das bandas.", "titulo_pt": "Trooper Salute lança impressionante álbum de estreia", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 21194, "titulo": "Malaysia has never had so many Chinese tourists. It wants more", "url": "https://www.scmp.com/week-asia/lifestyle-cult o': Brasileiro Narra Desabamentos e Solidariedade Após Tragédia na Venezuela", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 20829, "titulo": "Arbitragem feminina do DF é escalada pela primeira vez na Série C", "url": "https://www.metropoles.com/esportes/arbitragem-feminina-do-df-e-escalada-pela-primeira-vez-na-serie-c", "fonte_id": "metropoles", "data_pub": "2026-06-26T22:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Isabela Vivas, Leila Cruz e Cássia França serão as árbitras que representarão o Distrito Federal na Série C do futebol nacional. As três mulheres foram escaladas pela primeira vez para a competição.", "titulo_pt": "Arbitragem feminina do Distrito Federal é escalada pela primeira vez na Série C", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 20745, "titulo": "Como funcionava central de monitoramento do tráfico descoberta pela polícia no Rio", "url": "https://veja.abril.com.br/brasil/como-funcionava-central-de-monitoramento-do-trafico-descoberta-pela-policia-no-rio/", "fonte_id": "veja", "data_pub": "2026-06-26T22:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Policiais descobriram um centro de monitoramento de tráfego criminoso em Cabo Frio. Criminosos instalaram câmeras nas entradas, saídas e becos da comunidade Buraco do Boi para controlar as atividades ilegais.", "titulo_pt": "Como Funcionava o Centro de Monitoramento do Tráfico Descoberto na Polícia no Rio", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 19842, "titulo": "Morte em alto-mar: dono de moto aquática é indiciado por homicídio", "url": "https://www.metropoles.com/sao-paulo/morte-em-alto-mar-dono-de-moto-aquatica-e-indiciado-por-homicidio", "fonte_id": "metropoles", "data_pub": "2026-06-26T20:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Bruna Damaris foi encontrada após 42 horas à deriva em alto mar. Dheorge Bernardino morreu e seu corpo foi encontrado após nove dia  creche. O caso foi registrado na 24ª DP (Recanto das Emas) e está sendo investigado. Segundo a mãe, a menina foi agredida e obrigada a comer restos de comida.", "titulo_pt": "Mãe denuncia agressão e maus-tratos contra filha autista em creche", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 20460, "titulo": "Heavy rains flood Taiwan, leaving at least two dead", "url": "https://www.taipeitimes.com/News/front/archives/2026/06/27/2003859816", "fonte_id": "taipei_times", "data_pub": "2026-06-27T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Chuvas intensas atingiram Taiwan, causando inundações e deslizamentos de terra. Pelo menos duas pessoas morreram como resultado das chuvas. As autoridades estão trabalhando para fornecer ajuda às áreas afetadas.", "titulo_pt": "Chuvas torrenciais causam inundações em Taiwan, deixando pelo menos duas pessoas mortas", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 20740, "titulo": "Novo terremoto de magnitude 4,9 atinge a Venezuela", "url": "https://veja.abril.com.br/mundo/novo-terremoto-de-magnitude-49-atinge-venezuela/", "fonte_id": "veja", "data_pub": "2026-06-26T23:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Venezuela ainda busca desaparecidos e conta as vítimas dos dois tremores ocorridos na quarta-feira.", "titulo_pt": "Novo terremoto de magnitude 4,9 atinge Venezuela", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 20996, "titulo": "Frozen feasts and cool pools help Rome zoo animals survive heatwave", "url": "http://www.euronews.com/video/2026/06/26/frozen-feasts-and-cool-pools-help-rome-zoo-animals-survive-heatwave", "fonte_id": "euronews", "data_pub": "2026-06-26T21:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Diante de uma severa onda de calor na Itália, o Bioparco de Roma está mantendo seus animais frescos com guloseimas congeladas, piscinas refrigeradas e abrigos climatizados enquanto a capital permanece sob alerta vermelho de calor.", "titulo_pt": "Banquetes congelados e piscinas frias ajudam animais do zoológico de Roma a suportar a onda de calor", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 20108, "titulo": "Uno por uno todos los cuidados y prevenciones a tener en cuenta ante el descenso de temperaturas, explicado por expertos", "url": "https://www.lanacion.com.ar/lifestyle/cuidado-cuerpo-belleza/uno-por-uno-todos-los-cuidados-y-prevenciones-a-tener-en-cuenta-ante-el-descenso-de-temperaturas-nid26062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-26T20:30:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A chegada do frio intenso aumenta o risco de doenças respiratórias, hipotermia e acidentes domésticos devido ao uso de sistemas de aquecimento.  Especialistas recomendam medidas para proteger a saúde durante as baixas temperaturas.", "titulo_pt": "Cuidados e precauções para o frio intenso, segundo especialistas", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 20156, "titulo": "Registran pulso de cenizas en el complejo volcánico Nevados de Chillán", "url": "https://www.latercera.com/nacional/noticia/registran-pulso-de-cenizas-en-el-complejo-volcanico-nevados-de-chillan/", "fonte_id": "la_tercera", "data_pub": "2026-06-26T18:58:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um pulso de cinzas foi registrado no complexo vulcânico Nevados de Chillán.  A coluna de cinzas atingiu cerca de 240 metros de altura. Um alerta técnico amarelo está ativo para o sistema vulcânico e há um perímetro de segurança de 1 quilômetro ao redor do cráter ativo.", "titulo_pt": "Registram pulso de cinzas no complexo vulcânico Nevados de Chillán", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 20114, "titulo": "Fourth toddler dies in France as Europe’s brutal heatwave forecast to shift east", "url": "https://www.theguardian.com/environment/2026/jun/26/europe-heatwave-shift-east-child-deaths-france-cities-heat-stress", "fonte_id": "guardian_world", "data_pub": "2026-06-26T17:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O número de mortes na França relacionadas à onda de calor aumentou para quatro crianças e mais de 55 afogamentos. As condições quentes que assolaram a Europa estão previstas para se mover para o leste, atingindo 150 milhões de pessoas com temperaturas acima de 35°C. Cientistas afirmam que esta é a onda de calor mais severa e abrangente já registrada, com quase metade das 850 maiores cidades da região enfrentando estresse térmico sem precedentes.", "titulo_pt": "Quarto bebê morre na França enquanto onda de calor brutal da Europa se move para o leste", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 20601, "titulo": "DeBriefed 26 June 2026: Heat records broken across Europe | London climate action week | Introducing ‘Project Cosmos’", "url": "https://www.carbonbrief.org/debriefed-26-june-2026-heat-records-broken-across-europe-london-climate-action-week-introducing-project-cosmos/", "fonte_id": "carbon_brief", "data_pub": "2026-06-26T14:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Carbon Brief publica o DeBriefed, um guia semanal sobre as principais notícias climáticas. O resumo destaca a quebra de recordes de temperatura na Europa, a semana de ação climática em Londres e o lançamento do 'Projeto Cosmos'.", "titulo_pt": "DeBriefed 26 de Junho de 2026: Recordes de calor quebrados na Europa | Semana de ação climática em Londres | Apresentação do 'Projeto Cosmos'", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 20602, "titulo": "Q&A: What change of power in Colombia could mean for world’s fossil-fuel transition", "url": "https://www.carbonbrief.org/qa-what-change-of-power-in-colombia-could-mean-for-worlds-fossil-fuel-transition/", "fonte_id": "carbon_brief", "data_pub": "2026-06-26T14:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Carbon Brief publica um artigo com perguntas e respostas sobre o impacto da mudança de governo na Colômbia para a transição mundial para fontes de energia renováveis. A Colômbia tem sido um defensor vocal da ação contra as mudanças climáticas nos últimos quatro anos. O artigo analisa como a nova administração pode afetar as políticas energéticas colombianas.", "titulo_pt": "Perguntas e Respostas: O que a mudança de poder na Colômbia pode significar para a transição global para combustíveis fósseis?", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 20430, "titulo": "Burning Issue: Landfill Fire Leaves Bosnia’s Mostar Gasping for Breath", "url": "https://balkaninsight.com/2026/06/26/burning-issue-landfill-fire-leaves-bosnias-mostar-gasping-for-breath/bi/", "fonte_id": "balkan_insight", "data_pub": "2026-06-26T13:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um aterro sanitário notório fora de Mostar está em chamas há dias. Os moradores estão sofrendo as consequências de anos de inação das autoridades na cidade politicamente instável.", "titulo_pt": "Problema Ardente: Incêndio em aterro sanitário deixa Mostar sufocando", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}, {"id": 20603, "titulo": "Media reaction: How climate change intensified Europe’s record-breaking June heat", "url": "https://www.carbonbrief.org/media-reaction-how-climate-change-intensified-europes-record-breaking-june-heat/", "fonte_id": "carbon_brief", "data_pub": "2026-06-26T12:44:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Por segundo mês consecutivo, a Europa Ocidental e Central foi atingida por ondas de calor intensas. Diversos meios de comunicação destacaram a ligação entre as temperaturas recordes e as mudanças climáticas.  Especialistas em clima atribuíram o aumento da temperatura ao aquecimento global.", "titulo_pt": "Reação da mídia: Como as mudanças climáticas intensificaram o calor recorde de junho na Europa", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 20450, "titulo": "Southeast Asia’s ‘red alert’ haze fight faces economic test", "url": "https://www.scmp.com/week-asia/health-environment/article/3358548/southeast-asias-red-alert-haze-fight-faces-economic-test?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-26T12:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma temporada de neblina potencialmente perigosa se aproxima do Sudeste Asiático. Custos crescentes de energia e fertilizantes ameaçam enfraquecer os esforços de prevenção de incêndios, enquanto padrões climáticos extremos aumentam o risco de incêndios florestais e em terras agrícolas. Analistas alertam que empresas agrícolas pressionadas por custos de produção mais altos podem cortar gastos com práticas sustentáveis de desmatamento, incluindo o uso do fogo em vez de máquinas.", "titulo_pt": "Combate à névoa vermelha no Sudeste Asiático enfrenta teste econômico", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 20452, "titulo": "Hong Kong moves to curb flow of high liquid content waste in landfills", "url": "https://www.scmp.com/news/hong-kong/health-environment/article/3358537/hong-kong-moves-curb-flow-high-liquid-content-waste-landfills?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-26T12:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Hong Kong está buscando diminuir a quantidade de resíduos com alto teor de líquido, como bebidas vencidas, produtos de higiene pessoal e detergentes descartados, que vão para os aterros sanitários. Conservacionistas afirmam que essa medida protegerá as águas e as linhas costeiras locais do risco de vazamento tóxico. O setor varejista expressou preocupação de que o novo requisito pode resultar em custos mais altos de reciclagem e mão de obra, que poderiam ser repassados aos consumidores.", "titulo_pt": "Hong Kong busca reduzir o volume de resíduos líquidos em aterros sanitários", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 19330, "titulo": "Climate change the culprit for Europe’s ‘most severe’ heatwave: Report", "url": "https://www.aljazeera.com/news/2026/6/26/climate-change-the-culprit-for-europes-most-severe-heatwave-report?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-26T11:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O grupo World Weather Attribution afirma que as temperaturas extremas registradas em junho seriam 'quase impossíveis' há 50 anos. O relatório atribui a intensidade do evento à mudança climática.", "titulo_pt": "Mudanças climáticas são culpadas pela onda de calor mais severa da Europa: Relatório", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 19441, "titulo": "European hospitals overwhelmed by heatwave, more misery to come", "url": "https://www.scmp.com/news/world/europe/article/3358535/european-hospitals-overwhelmed-heatwave?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-26T11:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma onda de calor mortal na Europa, que sobrecarregou os hospitais com temperaturas recorde, está se deslocando para o leste. Pelo menos 101 milhões de europeus sofreram com temperaturas acima de 35 graus Celsius por vários dias, e estima-se que algumas centenas de pessoas, incluindo crianças, morreram como resultado.", "titulo_pt": "Hospitais Europeus Sobrecarregados pela Ondada de Calor, Mais Sofrimento por vir", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 19243, "titulo": "French hospitals at 'tipping point' after seven days of heatwave", "url": "https://www.lemonde.fr/en/france/article/2026/06/26/french-hospitals-at-tipping-point-after-seven-days-of-heatwave_6754898_7.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-26T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Serviços de emergência observaram a aceleração das consequências do calor para a saúde entre quarta-feira e quinta-feira. O primeiro-ministro ativou o nível 3 do plano ORSAN, que visa aumentar os níveis de pessoal hospitalar.", "titulo_pt": "Hospitais franceses no 'ponto de ruptura' após sete dias de onda de calor", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 19578, "titulo": "Wastewater management reverses widespread freshwater deoxygenation in China", "url": "https://phys.org/news/2026-06-wastewater-reverses-widespread-freshwater-deoxygenation.html", "fonte_id": "phys_org", "data_pub": "2026-06-26T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ecosistemas de água doce em todo o mundo têm sofrido com a diminuição dos níveis de oxigênio, uma tendência conhecida como desoxigenação, que ameaça a biodiversidade, as pescarias e a estabilidade do ecossistema. Um novo estudo publicado na Nature Geoscience oferece esperança: o manejo direcionado de nutrientes através do controle de águas residuais pode reverter essa tendência, mesmo diante do rápido aquecimento global.", "titulo_pt": "Gestão de águas residuais reverte desoxigenação generalizada de água doce na China", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 20465, "titulo": "Diabolo instructor’s spying appeal rejected", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/27/2003859825", "fonte_id": "taipei_times", "data_pub": "2026-06-27T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O apelo de um instrutor de diabolo contra a condenação por espionagem foi rejeitado. O homem foi condenado por enviar informações militares para a China. Ele alegou inocência durante o julgamento.", "titulo_pt": "Apelo do instrutor de diabolo por espionagem rejeitado", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 20473, "titulo": "Foundation head promotes deeper indigenous ties", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/27/2003859833", "fonte_id": "taipei_times", "data_pub": "2026-06-27T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O chefe da Fundação para o Desenvolvimento de Taiwan,  promove uma maior integração entre os povos indígenas e a sociedade taiwanesa. A fundação busca fortalecer as relações através de projetos culturais e educativos. O objetivo é promover a compreensão mútua e o respeito às culturas indígenas.", "titulo_pt": "Chefe da Fundação promove laços mais profundos com os povos indígenas", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 19713, "titulo": "Animador mexicano morre atropelado por trem durante Festival de Annecy na França", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/animador-mexicano-morre-atropelado-por-trem-durante-festival-de-annecy-na-franca.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-26T21:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O animador e ilustrador mexicano Luis de la Rosa morreu aos 34 anos após ser atropelado por um trem no Festival Internacional de Cinema de Animação de Annecy, na França. O acidente ocorreu durante o festival que acontece anualmente.", "titulo_pt": "Animador mexicano morre atropelado por trem durante Festival de Annecy", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 21004, "titulo": "UN rights chief calls for probe into migrant deaths in US detention centres", "url": "https://www.aljazeera.com/news/2026/6/26/un-rights-chief-calls-for-probe-into-migrant-deaths-in-us-detention-centres?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-26T20:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O número de mortes de imigrantes detidos nos centros de detenção dos Estados Unidos aumentou durante o segundo mandato de Donald Trump.", "titulo_pt": "Chefe das direitos humanos da ONU pede investigação sobre mortes de imigrantes em centros de detenção dos EUA", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 19858, "titulo": "Número de mortos por terremotos na Venezuela chega a 920, informa presidente da Assembleia Nacional", "url": "https://www.brasildefato.com.br/2026/06/26/numero-de-mortos-por-terremotos-na-venezuela-chega-a-920/", "fonte_id": "brasil_de_fato", "data_pub": "2026-06-26T20:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente da Assembleia Nacional da Venezuela, Jorge Rodríguez, anunciou que o número de vítimas fatais dos terremotos de magnitudes 7,2 e 7,5 registrados na quarta-feira (24) atingiu 920. O número de feridos também aumentou em relação ao balanço anterior divulgado.", "titulo_pt": "Número de mortos por terremotos na Venezuela chega a 920, informa presidente da Assembleia Nacional", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 19852, "titulo": "Homem que estuprava filha e enteada é condenado a 109 anos de prisão", "url": "https://www.metropoles.com/sao-paulo/homem-que-estuprava-filha-e-enteada-e-condenado-a-109-anos-de-prisao", "fonte_id": "metropoles", "data_pub": "2026-06-26T19:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um homem foi condenado a 109 anos de prisão por estupro de sua filha e enteada. O crime ocorreu no interior de São Paulo e durou vários anos. A filha do homem se casou para escapar do abuso.", "titulo_pt": "Homem que estuprava filha e enteada é condenado a 109 anos de prisão", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 19833, "titulo": "Modelo brasileira está entre as vítimas dos terremotos na Venezuela", "url": "https://veja.abril.com.br/mundo/modelo-brasileira-esta-entre-as-vitimas-dos-terremotos-na-venezuela/", "fonte_id": "veja", "data_pub": "2026-06-26T19:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Vanessa Zacarias da Silva, 44 anos, era modelo e morava há cerca de dois meses em La Guaira, na Venezuela. Ela morreu durante os recentes terremotos que atingiram o país.", "titulo_pt": "Modelo brasileira está entre as vítimas dos terremotos na Venezuela", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 20382, "titulo": "Advocates warn of wide-ranging implications of US Supreme Court TPS ruling", "url": "https://www.aljazeera.com/news/2026/6/26/advocates-warn-of-wide-ranging-implications-of-us-supreme-court-tps-ruling?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-26T18:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal dos EUA permitiu que o governo de Trump encerrasse o status de proteção temporária (TPS) para Haiti e Síria. Defensores argumentam que essa decisão ameaça a separação familiar.", "titulo_pt": "Defensores alertam sobre implicações amplas da decisão do Supremo Tribunal dos EUA sobre o TPS", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 19800, "titulo": "Sobe para 920 o número de mortos por terremotos na Venezuela", "url": "https://www.cartacapital.com.br/mundo/sobe-para-920-o-numero-de-mortos-por-terremotos-na-venezuela/", "fonte_id": "cartacapital", "data_pub": "2026-06-26T17:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O número de vítimas fatais dos terremotos na Venezuela atingiu 920. O estado de La Guaira, o mais afetado, está sob controle militar, segundo o presidente da Assembleia Nacional.", "titulo_pt": "Número de mortos por terremotos na Venezuela chega a 920", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 20172, "titulo": "The Supreme Court’s Era of Meaningless Rights", "url": "https://www.theatlantic.com/ideas/2026/06/supreme-court-decisions-unenforceable-rights/687713/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-26T17:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal não está dizendo que as pessoas não têm certos direitos, apenas que os tribunais não podem ajudar quando esses direitos são violados. Essa posição significa que os direitos declarados podem ser ignorados sem consequências legais.", "titulo_pt": "A Era de Direitos Sem Sentido do Supremo Tribunal", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 19887, "titulo": "FIFA tem tensões com o Irã e o Egito sobre simbolismo LGBT em partida", "url": "https://exame.com/mundo/fifa-tem-tensoes-com-o-ira-e-o-egito-sobre-simbolismo-lgbt-em-partida/", "fonte_id": "exame", "data_pub": "2026-06-26T17:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A FIFA está enfrentando tensões com as seleções de Irã e Egito devido a festividades do Orgulho Gay programadas para a partida entre os dois países. A organização teme que o evento possa gerar conflitos com as equipes, que se opõem à promoção de símbolos LGBT.", "titulo_pt": "FIFA enfrenta tensões com Irã e Egito sobre simbolismo LGBT em partida", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 20408, "titulo": "'I was doxxed': UK doctors welcome BMA protections for criticism of Israel", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/i-was-doxxed-uk-doctors-welcome-bma-protections-criticism-israel", "fonte_id": "middle_east_eye", "data_pub": "2026-06-26T16:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Associação Médica Britânica (AMA), que representa mais de 200 mil médicos no Reino Unido, votou para rejeitar o uso da definição do Conselho Internacional para a Rememorança do Holocausto (IHRA) sobre anti-semitismo dentro do Sistema Nacional de Saúde (NHS). A moção, aprovada na reunião anual dos representantes da associação, levantou preocupações sobre a aplicação da definição e pediu uma investigação imediata sobre seu impacto no discurso político legítimo e na expressão profissional sobre as ações de Israel em Palestina.", "titulo_pt": "'Fui exposto': Médicos britânicos celebram proteções da AMA para críticas ao Israel", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 20411, "titulo": "Rights groups file complaint against Polish TNT producer over Gaza war crimes", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/rights-groups-file-complaint-against-polish-tnt-producer-over-gaza-war", "fonte_id": "middle_east_eye", "data_pub": "2026-06-26T15:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Três organizações internacionais entraram com uma queixa criminal contra a empresa estatal polonesa Nitro-Chem. As organizações acusam representantes da maior produtora de TNT da OTAN de envolvimento em crimes internacionais contra palestinos na Gaza. A queixa foi apresentada pela Fundação Hind Rajab, pela Federação Internacional dos Direitos Humanos (FIDH) e pelo Centro Europeu de Apoio Jurídico (ELSC).", "titulo_pt": "Grupos de direitos humanos processam produtor polonês de TNT por crimes de guerra na Gaza", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 20959, "titulo": "Can China’s Dong Minority Keep Their Unique Cultural Heritage?", "url": "https://thediplomat.com/2026/06/can-chinas-dong-minority-keep-their-unique-cultural-heritage/", "fonte_id": "the_diplomat", "data_pub": "2026-06-26T13:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um ambicioso projeto de pesquisa, liderado por uma universidade, está documentando a arquitetura distinta dos dong, revelando muito sobre sua forma de vida como grupo indígena marginalizado.", "titulo_pt": "Orientação Universitária Pode Manter o Patrimônio Cultural Único dos Dong?", "veiculo": "The Diplomat", "pais": "Japão", "classe": "B"}, {"id": 20592, "titulo": "UNICEF Deputy Executive Director Hannan Sulieman's remarks at the United Nations Security Council Briefing on the humanitarian situation in Sudan", "url": "https://www.unicef.org/press-releases/unicef-deputy-executive-director-hannan-suliemans-remarks-united-nations-security", "fonte_id": "unicef", "data_pub": "2026-06-26T13:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Hannan Sulieman, vice-diretora executiva do UNICEF, fez um discurso no Conselho de Segurança da ONU sobre a crise humanitária no Sudão. Ela destacou o impacto devastador do conflito na população civil, especialmente nas crianças. O UNICEF está trabalhando para fornecer assistência humanitária às pessoas afetadas pelo conflito.", "titulo_pt": "Discurso da vice-diretora executiva do UNICEF, Hannan Sulieman, na reunião informativa do Conselho de Segurança das Nações Unidas sobre a situação humanitária no Sudão", "veiculo": "UNICEF Global", "pais": "Global", "classe": "A"}, {"id": 20451, "titulo": "‘We love guns’: school shooting exposes reality of Philippine crisis", "url": "https://www.scmp.com/week-asia/people/article/3358541/we-love-guns-school-shooting-exposes-reality-philippine-crisis?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-26T12:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um tiroteio escolar nas Filipinas resultou na morte de três estudantes e ferimento de dezenas. O incidente destacou o problema de proliferação de armas no país, onde o acesso a armas é fácil apesar das leis teoricamente rigorosas. Vídeos do tiroteio mostraram uma grande quantidade de balas disparadas e os atiradores adolescentes pareciam familiarizados com armas.", "titulo_pt": "'Amamos armas': tiroteio escolar expõe a realidade da crise nas Filipinas", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}], "direitos_humanos__eventos": []}, "noticias": [{"id": 21124, "fonte_id": "la_nacion_ar", "titulo": "Murió Ernestina País: qué se sabe del accidente de tren en San Isidro y las const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${artsHtml ? `<div class="destaque-fontes">
      <h3>Fontes desta edição</h3>
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}
</script>
</body>
