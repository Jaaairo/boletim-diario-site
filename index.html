<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=author@400&display=swap" rel="stylesheet">
<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
</style>
</head>
<body>
<header>
  <h1>Pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 27/06/2026 01:11 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">
    <div class="modal-erro" id="senha-erro" style="display:none">Senha incorreta.</div>
    <div class="modal-btns">
      <button class="btn-sec2" onclick="fecharModal('modal-senha')">Cancelar</button>
      <button class="btn-pri" onclick="verificarSenha()">Entrar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>
      <option value="classificacao_errada">Classificação errada</option>
      <option value="resumo_impreciso">Resumo impreciso</option>
      <option value="outro">Outro</option>
    </select>
    <label for="flag-nota">Nota (opcional)</label>
    <textarea id="flag-nota" placeholder="Descreva o problema..."></textarea>
    <div class="modal-btns">
      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "27/06/2026 01:11", "stats": {"noticias_novas": 160, "resumos_gerados": 262}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O presidente Luiz Inácio Lula da Silva visitou um estaleiro no estado de Santa Catarina para inspecionar embarcações construídas para a Petrobras, reforçando a importância de fortalecer as defesas nacionais. Em meio a uma série de investigações e disputas políticas, o senador Flávio Bolsonaro foi acusado novamente de caluniar Lula ao associar-o a crimes como tráfico de drogas e lavagem de dinheiro. A Polícia Federal concluiu que ele cometeu crime de calúnia. O governo também regulamentou o uso do FGTS como garantia para operações de crédito consignado, limitando os juros a 1,99% ao mês. Enquanto isso, Lula defendeu a inclusão da defesa nacional em seu plano de governo, apontando para a necessidade de equipar as Forças Armadas diante das instabilidades globais.", "mundo": "Um terremoto com magnitude 4,9 atingiu a Venezuela na sexta-feira (26), causando destruição e deixando pelo menos 920 mortos e mais de 50 mil desaparecidos. O governo venezuelano limitou o acesso à área afetada, enquanto a administração de Delcy Rodríguez enfrenta pressões para resgatar vítimas, restaurar infraestrutura e buscar assistência internacional. Além disso, um jogador do Marítimo de La Guaira perdeu sua esposa no terremoto, compartilhando a tragédia nas redes sociais. Em outro desenvolvimento, o regime venezuelano restringiu o acesso à região afetada em Caracas e La Guaira, e Vanessa Zacarias da Silva, de 44 anos, foi confirmada como uma das vítimas do terremoto na Venezuela.\n\nAs tensões geopolíticas aumentaram na região do Estreito de Ormuz após ataques mútuos entre Estados Unidos e Irã. Em 25 de junho, os EUA realizaram uma série de bombardeios contra alvos iranianos, incluindo depósitos de mísseis e drones, alegando que o Irã havia violado o cessar-fogo após um ataque iraniano a um navio cargueiro no estreito. Em resposta, a Guarda Revolucionária do Irã anunciou ataques contra posições norte-americanas na região. A tensão entre os EUA e Irã se intensificou com acusações de violação de trégua e ameaças de retaliação. Adicionalmente, o presidente dos Estados Unidos, Donald Trump, ameaçou impor uma tarifa de 100% sobre produtos de países que adotarem impostos digitais a empresas americanas, em meio a discussões comerciais globais.", "economia": "A economia brasileira enfrenta desafios significativos, com a dívida pública projetada para atingir 115% do PIB em 2036, conforme relatado pelo Instituto Financeiro Internacional (IFI). A Agência Nacional de Energia Elétrica (Aneel) informou que as contas de luz continuarão amarelas em julho, resultando em um aumento médio de R$1,885 por 100 kWh consumidos. O Ibovespa atingiu marcas acima dos 173 mil pontos, refletindo uma inflação IPCA-15 mais baixa e sinais positivos do Banco Central, o que contribuiu para a queda de R$5,16 no dólar. Em contraste, a economia global enfrenta tensões devido à 'guerra comercial' baseada em retaliações, conforme alertou Pierre-Olivier Gourinchas, ex-chefe da economia do Fundo Monetário Internacional (FMI).", "tecnologia": "As empresas sul-coreanas Samsung e SK Hynix planejam aumentar seus investimentos em inteligência artificial (IA), conforme informa um relatório. A decisão visa acompanhar o crescimento do mercado de chips para IA, refletindo a importância dessa tecnologia na indústria global. Paralelamente, a Universal Pictures decidiu não realizar exibições antecipadas do filme 'Odisseia' para influenciadores digitais, uma decisão que gerou debate entre críticos de cinema tradicionais. Em outro desenvolvimento, o mercado de previsões Polymarket está sob investigação pelo órgão regulador de derivados dos Estados Unidos, devido à falta de transparência e regulamentação. Essas notícias destacam a crescente importância da IA na tecnologia e as mudanças nas estratégias de marketing do setor cinematográfico.", "ciencia": "A Royal Society, a mais antiga e prestigiada academia científica do mundo, recebeu seu primeiro membro chileno, o biólogo e professor do University College de Londres e da U. Mayor. Este evento destaca a importância da ciência no Chile e em todo o mundo. Em um desenvolvimento relacionado à exploração espacial, a NASA anunciou os vencedores do Desafio de Pousadistas Humanos 2026, com soluções criadas por estudantes para sistemas de controle ambiental e suporte à vida em futuros pousadores lunares tripulados. Este avanço marca um passo significativo na preparação para missões futuras à Lua. Na área do meio ambiente, novos estudos indicam que a poluição de carvão atinge até as montanhas mais remotas dos Himalaias, impactando o Tibete. Além disso, uma nova espécie de aranha foi descoberta e chamada de 'aranha-balista', que usa técnicas inovadoras para capturar presas em seus habitats.", "cultura": "No 59º Festival de Parintins, que começa nesta sexta-feira com a disputa entre os bois Garantido e Caprichoso, ocorrem apresentações antes da grande batalha que durará três dias. Em outra notícia cultural, o Vaticano está lançando uma importante restauração das famosas pinturas de Raffaello nas Loggias do Palácio Apostólico, que foram decoradas há séculos. Na mesma linha, a artista Ed Woodham discute seu trabalho e ativismo em uma entrevista com o Hyperallergic, enquanto a série 'The Bear' encerra sua jornada com um final que valoriza memórias pessoais sobre os personagens. Além disso, a Agência Brasil Cultura destaca que, apesar de ser uma grande potência cultural, o Brasil não está aproveitando plenamente sua influência cultural e diplomática global.", "sociedade": "Um terremoto na Venezuela no sábado à tarde causou destruição, com pelo menos 164 mortes e danos significativos em prédios e infraestrutura. A cidade de La Guaira foi particularmente afetada, sendo militarizada para acelerar a distribuição de ajuda e evitar vandalismo. Voluntários estão buscando sobreviventes nos escombros. Paralelamente, a Unipar informou ter beneficiado 13,5 milhões de pessoas com projetos sociais no Brasil e na Argentina nas últimas quatro anos, abrangendo diversas áreas e ajudando comunidades em ambos os países. Além disso, a cidade de Seul oferecerá até 3 milhões de won (aproximadamente R$ 15 mil) a casais que realizarem casamentos em locais públicos selecionados, com o objetivo de reduzir a competição por salões tradicionais e aliviar o custo financeiro para os recém-casados.", "meio_ambiente": "A Europa enfrenta uma onda de calor extremo, com temperaturas recorde atingindo partes da Alemanha e Polônia a 40°C. Em junho, o Reino Unido e a Suíça também registraram recordes de calor. A Organização Meteorológica Mundial prevê que as condições quentes se espalhem para o leste, afetando cerca de 150 milhões de pessoas com temperaturas acima de 35°C. Em Paris, os serviços de emergência estão lidando com agravamentos nas consequências do calor na saúde humana e animal, levando o primeiro-ministro a ativar um plano de emergência para aumentar o pessoal hospitalar. A onda de calor também sobrecarregou hospitais em outros países europeus, com pelo menos 101 milhões de europeus afetados por temperaturas acima de 35°C, resultando na morte de algumas centenas de pessoas, incluindo crianças. Para combater o calor, a EDF anunciou que financiará mais de 100 mil sistemas de refrigeração em escolas. No Sudeste Asiático, há preocupações com um período potencialmente perigoso de nebulosidade e incêndios florestais. Em relação ao Brasil, as autoridades meteorológicas alertam para a possibilidade de grandes inundações nas próximas semanas devido à intensa chuva prevista. Em La Guaira, na Venezuela, operações de busca continuam após dois terremotos devastadores que resultaram em pelo menos 235 mortes e cerca de 1.500 feridos. No Chile, um pulso de cinzas foi registrado no complexo vulcânico Nevados de Chillán, com uma coluna atingindo 240 metros de altura, levando a um alerta técnico amarelo para o sistema vulcânico.", "direitos_humanos": "O Supremo Tribunal dos Estados Unidos decidiu encerrar o Status de Proteção Temporária (TPS) para haitianos e sírios, uma decisão que foi criticada por defensores das migrações. A medida, tomada após três julgamentos sem vereditos, pode levar à deportação de milhares de imigrantes. Em outro desenvolvimento, o número de mortes causadas pelo terremoto na Venezuela atingiu 920, segundo a Assembleia Nacional do país. O Itamaraty confirmou a morte de cidadãos brasileiros no terramoto e a OAB manifestou solidariedade. Organizações não governamentais pedem a libertação de presos políticos na Venezuela após os desastres naturais, enquanto a FIFA confirma a exibição da bandeira do arco-íris durante um jogo entre Egito e Irã, em meio a tensões com equipes que se opõem à promoção de símbolos LGBT."}, "resumo_do_dia": {"politica_nacional": [{"id": 21049, "titulo": "Lucas Barreto confirma pré-candidatura à reeleição ao Senado pelo Amapá", "url": "https://g1.globo.com/ap/amapa/eleicoes/2026/noticia/2026/06/26/lucas-barreto-confirma-pre-candidatura-a-reeleicao-ao-senado-pelo-amapa.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-26T23:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Lucas Barreto (PSD) confirmou sua intenção de concorrer novamente ao Senado nas eleições de 2026. Com experiência política que inclui mandatos como deputado estadual e vereador, Barreto está filiado ao PSD desde 2019.", "titulo_pt": "Lucas Barreto confirma pré-candidatura à reeleição ao Senado pelo Amapá", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 20834, "titulo": "Quando o Brasil exportava maconha: o passado de um comércio esquecido", "url": "https://www.bbc.com/portuguese/articles/c5yrn6w61nwo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-26T23:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil já permitia o cultivo, comercialização e consumo de maconha e seus derivados. O país fazia parte do cenário internacional de importação e exportação da droga.", "titulo_pt": "Quando o Brasil exportava maconha: o passado de um comércio esquecido", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 20710, "titulo": "PF conclui que Flávio Bolsonaro caluniou Lula ao associá-lo ao tráfico de drogas", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/pf-conclui-que-flavio-bolsonaro-caluniou-lula-ao-associa-lo-ao-trafico-de-drogas.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-26T23:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal concluiu que Flávio Bolsonaro caluniou o presidente Lula ao associá-lo ao crime de tráfico de drogas. O pré-candidato à Presidência pelo PL foi investigado por difamação. A conclusão da investigação foi divulgada em 26 de junho de 2023.", "titulo_pt": "PF conclui que Flávio Bolsonaro caluniou Lula ao associá-lo ao tráfico de drogas", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 20711, "titulo": "Em carta a Lula, Mulheres do Brasil defende empresária negra como vice do PT ao governo do DF", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/em-carta-a-lula-mulheres-do-brasil-defende-empresaria-negra-como-vice-do-pt-ao-governo-do-df.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-26T22:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O grupo Mulheres do Brasil enviou uma carta ao presidente Lula defendendo a empresária Dora Gomes para a vaga de vice na chapa do PT ao governo do Distrito Federal. A carta foi enviada em meio à disputa pela vaga.", "titulo_pt": "Mulheres do Brasil defendem empresária negra como vice do PT no governo do DF", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 20804, "titulo": "Flávio cometeu crime de calúnia contra Lula por post sobre Maduro, diz PF", "url": "https://www.cnnbrasil.com.br/politica/pf-conclui-que-flavio-caluniou-lula-em-postagem-sobre-maduro/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-26T22:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O relatório final do caso sobre o senador Flávio Bolsonaro foi enviado ao Supremo Tribunal Federal (STF). O documento afirma que Flávio cometeu crime de calúnia contra Lula em um post sobre Nicolás Maduro. Cabe à Procuradoria-Geral da República decidir se denuncia o senador, pede novas investigações ou arquivará o caso.", "titulo_pt": "Flávio Cometeu Crime de Calúnia Contra Lula por Post Sobre Maduro, Diz PF", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 20854, "titulo": "PRD aciona STF para derrubar decreto do governo Lula que regulamentou Marco Civil da Internet", "url": "https://www.jota.info/stf/do-supremo/prd-aciona-stf-para-derrubar-decreto-do-governo-lula-que-regulamentou-marco-civil-da-internet", "fonte_id": "jota", "data_pub": "2026-06-26T21:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Partido da República (PRD) entrou com uma ação no Supremo Tribunal Federal (STF) para invalidar um decreto do governo Lula. O partido alega que o decreto concede poderes de polícia à Agência Nacional de Telecomunicações (ANPD), sem base legal.", "titulo_pt": "PRD aciona STF para derrubar decreto do governo Lula que regulamentou Marco Civil da Internet", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 20738, "titulo": "PF conclui que Flávio Bolsonaro caluniou Lula atribuindo crimes como tráfico de drogas e lavagem de dinheiro", "url": "https://g1.globo.com/politica/noticia/2026/06/26/pf-conclui-que-flavio-bolsonaro-caluniou-lula-atribuindo-crimes-como-trafico-de-drogas-e-lavagem-de-dinheiro.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-26T21:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal (PF) afirmou ao Supremo Tribunal Federal (STF) que o senador Flávio Bolsonaro cometeu crime de calúnia contra o presidente Luiz Inácio Lula da Silva. A PF alega que Bolsonaro fez uma postagem atribuindo crimes como tráfico de drogas e lavagem de dinheiro a Lula.", "titulo_pt": "PF conclui que Flávio Bolsonaro caluniou Lula atribuindo crimes como tráfico de drogas e lavagem de dinheiro", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 20700, "titulo": "A patacoada de Jaques Wagner", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/adriana-fernandes/2026/06/a-patacoada-de-jaques-wagner.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-26T21:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Jacques Wagner não está sozinho na tentativa de normalizar relações com Daniel Vorcaro e seus aliados.  Políticos e autoridades ligados ao esquema de influência do dono do Master também estão agindo dessa forma. A informação foi publicada em 26 de junho de 2026 às 18h18.", "titulo_pt": "A Articulação de Jacques Wagner", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 19683, "titulo": "Flávio prepara plano para mulheres com foco em proteção e autonomia financeira", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/flavio-prepara-plano-para-mulheres-com-foco-em-protecao-e-autonomia-financeira.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-26T21:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Após lançar um programa de segurança pública com medidas voltadas ao público feminino, Flávio Bolsonaro prepara um novo plano focado nas mulheres. O plano terá como objetivos a proteção e a autonomia financeira das mulheres.", "titulo_pt": "Flávio Bolsonaro prepara plano para mulheres com foco em proteção e autonomia financeira", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 19773, "titulo": "Lula visita estaleiro que constrói embarcações para a Petrobras", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/lula-visita-estaleiro-que-constroi-embarcacoes-para-petrobras", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-26T21:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Luiz Inácio Lula da Silva visitou o estaleiro Detroit Brasil, em Itajaí, Santa Catarina.  O local produz dez embarcações de apoio marítimo offshore para a Petrobras.", "titulo_pt": "Lula visita estaleiro que constrói embarcações para a Petrobras", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 20080, "titulo": "STF vai recomeçar julgamento de regra que flexibiliza seguros de grandes riscos", "url": "https://www.jota.info/stf/do-supremo/stf-vai-recomecar-julgamento-de-regra-que-flexibiliza-seguros-de-grandes-riscos", "fonte_id": "jota", "data_pub": "2026-06-26T21:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal (STF) irá retomar o julgamento da regra que flexibiliza os seguros de grandes riscos. O modelo visa atender bancos, setores como petróleo, aeronáutico, marítimo e nuclear, além de empresas com ativos de alto valor.", "titulo_pt": "STF vai recomeçar julgamento de regra que flexibiliza seguros de grandes riscos", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 19684, "titulo": "Deputado apresenta projeto para criar modelo de 'ativos abertos' entre bancos", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/deputado-apresenta-projeto-para-criar-modelo-de-ativos-abertos-entre-bancos.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-26T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O deputado Jadyel Alencar apresentou um projeto de lei que visa criar o sistema “Open Assets”. Essa iniciativa busca permitir a troca segura de dados e ativos financeiros entre instituições bancárias. O projeto foi apresentado em 26 de junho de 2026.", "titulo_pt": "Deputado propõe modelo de 'ativos abertos' para troca de dados entre bancos", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 19685, "titulo": "Cotada para vice de Flávio filiou-se ao Republicanos sem avisar à direção da legenda", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/cotada-para-vice-de-flavio-filiou-se-ao-republicanos-sem-avisar-a-direcao-da-legenda.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-26T19:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Daniella Marques, que era cotada para ser ministra da área econômica em um governo de Flávio Bolsonaro, filiou-se ao Republicanos. A filiação aconteceu sem o conhecimento da direção nacional do partido.", "titulo_pt": "Cotada para vice de Flávio, Daniella Marques filiou-se ao Republicanos sem avisar a direção", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 19686, "titulo": "Em audiência nos EUA, Paulo Figueiredo dirá que tarifa fortalece Lula e pedirá Magnitsky a Moraes", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/em-audiencia-nos-eua-paulo-figueiredo-dira-que-tarifa-fortalece-lula-e-pedira-magnitsky-a-moraes.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-26T19:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O empresário Paulo Figueiredo irá argumentar na audiência pública dos Estados Unidos contra as tarifas impostas ao Brasil que elas beneficiam o presidente Lula. Ele também pedirá a aplicação da Lei Magnitsky contra o ministro Alexandre de Moraes, do STF.", "titulo_pt": "Em audiência nos EUA, Paulo Figueiredo defenderá que tarifa fortalece Lula e pedirá Magnitsky a Moraes", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 19687, "titulo": "Jerônimo exalta Jaques Wagner em agenda política na Bahia: 'Para eles, o erro é cuidar de pobre'", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/jeronimo-exalta-jaques-wagner-em-agenda-politica-na-bahia-para-eles-o-erro-e-cuidar-de-pobre.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-26T19:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governador da Bahia, Jerônimo Rodrigues (PT), defendeu publicamente o senador e pré-candidato à reeleição Jaques Wagner (PT). A declaração ocorreu nesta sexta-feira (26) durante uma agenda política no estado.", "titulo_pt": "Jerônimo exalta Jaques Wagner em agenda política na Bahia: 'Para eles, o erro é cuidar do pobre'", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 19756, "titulo": "Marinha lança fragata e Lula fala em fortalecer defesa do país", "url": "https://agenciabrasil.ebc.com.br/politica/noticia/2026-06/marinha-lanca-fragata-e-lula-fala-em-fortalecer-defesa-do-pais", "fonte_id": "agencia_brasil_politica", "data_pub": "2026-06-26T19:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Marinha brasileira lançou a fragata Cunha Moreira em Itajaí, Santa Catarina. O presidente Luiz Inácio Lula da Silva participou do evento e enfatizou a necessidade de fortalecer as defesas nacionais contra ameaças estrangeiras.", "titulo_pt": "Marinha lança fragata e Lula fala em fortalecer defesa do país", "veiculo": "Agência Brasil - Política", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 21199, "titulo": "Trump Administration Allows Anthropic to Release Mythos to Select US Organizations", "url": "https://www.wired.com/story/anthropic-restores-access-to-mythos/", "fonte_id": "wired", "data_pub": "2026-06-27T00:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Depois de semanas de negociações, a Casa Branca permitiu que a Anthropic restaurasse o acesso ao seu modelo de inteligência artificial mais avançado para um grupo selecionado de empresas e agências governamentais americanas.", "titulo_pt": "Administração Trump Permite que Anthropic Restaure Acesso ao Modelo AI Avançado para Organizações Escolhidas dos EUA", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 21167, "titulo": "Pete Buttigieg and his kids subject to CPS, police investigation after false report", "url": "https://www.npr.org/2026/06/26/nx-s1-5872821/pete-buttigieg-cps-police-swatting", "fonte_id": "npr_news", "data_pub": "2026-06-27T00:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pete Buttigieg, que pode ser um candidato democrata à presidência em 2028, relatou que policiais e Serviço de Proteção Infantil (CPS) visitaram sua casa para investigar uma denúncia anônima falsa sobre sua família.", "titulo_pt": "Buttigieg e sua família submetidos a investigação da CPS e polícia após denúncia falsa", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 21184, "titulo": "++ Usa revocano il blocco su due modelli IA di Anthropic ++", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/27/-usa-revocano-il-blocco-su-due-modelli-ia-di-anthropic-_05cc7c75-4457-4eaf-8e46-cb561cce5d25.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-27T00:26:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "A Itália permitirá a distribuição de mais de 100 modelos de inteligência artificial da empresa Anthropic para empresas e entidades federais americanas.", "titulo_pt": "Itália revoga o bloqueio em dois modelos de IA da Anthropic", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 21135, "titulo": "Convicted Rapist Who Fled to Scotland and Faked His Own Death Dies in Utah", "url": "https://www.nytimes.com/2026/06/26/us/nicholas-rossi-fugitive-rape-death.html", "fonte_id": "nyt_world", "data_pub": "2026-06-27T00:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Nicholas Rossi, de 38 anos, foi condenado por estupro em 2008 após ter fugido para a Escócia. Ele foi identificado por uma enfermeira atenta que o tratava da Covid-19 em 2021.", "titulo_pt": "Rapaz Condenado que Fugiu para a Escócia e Fingiu Sua Própria Morte Morre no Utah", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 21185, "titulo": "Venezuela: nuova scossa di magnitudo 4.9 avvertita nel centro del Paese", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/27/venezuela-nuova-scossa-di-magnitudo-4.9-avvertita-nel-centro-del-paese_85319884-79f2-49da-8028-4f04b01e599c.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-27T00:17:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Um terremoto de magnitude 4,9 foi sentido no centro da Venezuela, com o epicentro localizado a norte de Maracay. O sismo também foi percebido em Caracas e La Guaira.", "titulo_pt": "Venezuela: nova sacudida de magnitude 4,9 sentida no centro do país", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 21080, "titulo": "Guarda Revolucionária do Irã diz que atacou posições dos EUA em resposta", "url": "https://www.infomoney.com.br/mundo/guarda-revolucionaria-do-ira-diz-que-atacou-posicoes-dos-eua-em-resposta/", "fonte_id": "infomoney", "data_pub": "2026-06-27T00:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Guarda Revolucionária do Irã afirmou ter atacado posições norte-americanas na região como resposta a alguma ação, mas não forneceu detalhes sobre as posições atacadas.", "titulo_pt": "Guarda Revolucionária do Irã afirma ter atacado posições dos EUA em resposta", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 21150, "titulo": "Irán ataca posiciones de EE.UU. en respuesta a su ofensiva en el estrecho de Ormuz", "url": "https://www.latercera.com/mundo/noticia/iran-ataca-posiciones-de-eeuu-en-respuesta-a-su-ofensiva-en-el-estrecho-de-ormuz/", "fonte_id": "la_tercera", "data_pub": "2026-06-27T00:13:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Guardia Revolucionária iraniana afirmou que a Casa Branca violou o artigo cinco do pré-acordo e advertiu que, se a infração se repetir, sua resposta será mais contundente.", "titulo_pt": "Irã ataca posições dos EUA em resposta à ofensiva no Estreito de Ormuz", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 21045, "titulo": "Regime na Venezuela restringe acesso à zona mais afetada por terremoto, e Delcy é vaiada em Caracas", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/regime-na-venezuela-restringe-acesso-a-zona-mais-afetada-por-terremoto-e-delcy-e-vaiada-em-caracas.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-27T00:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O regime venezuelano anunciou restrições de acesso ao estado de La Guaira, região afetada pelos terremotos, a partir das 20h desta sexta-feira. Além disso, Delcy Rodríguez foi vaiada na capital Caracas.", "titulo_pt": "Regime na Venezuela restringe acesso à área mais afetada por terremotos e Delcy é vaiada em Caracas", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 21046, "titulo": "Família confirma morte de modelo do DF em terremoto na Venezuela", "url": "https://agenciabrasil.ebc.com.br/internacional/noticia/2026-06/familia-confirma-morte-de-modelo-do-df-em-terremoto-na-venezuela", "fonte_id": "agencia_brasil_intl", "data_pub": "2026-06-27T00:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A brasiliense Vanessa Zacarias da Silva, de 44 anos, foi confirmada como uma das vítimas do terremoto que atingiu a Venezuela na última quarta-feira (24), segundo informações divulgadas por familiares. A modelo estava em La Guaira quando ocorreu o desastre.", "titulo_pt": "Família confirma morte de modelo brasiliense no terremoto da Venezuela", "veiculo": "Agência Brasil - Internacional", "pais": "Brasil", "classe": "A"}, {"id": 20462, "titulo": "Kim Jong-un hails tests of arms that threaten Seoul", "url": "https://www.taipeitimes.com/News/front/archives/2026/06/27/2003859818", "fonte_id": "taipei_times", "data_pub": "2026-06-27T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O líder norte-coreano, Kim Jong-un, elogiou os recentes testes de armas. Ele afirmou que os testes demonstram a capacidade do país de defender seu território contra ameaças vindas de Seul e Washington. Os testes incluíram mísseis balísticos intercontinentais (ICBM) e outros sistemas de armamento.", "titulo_pt": "Kim Jong-un elogia testes de armas que ameaçam Seul", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 21085, "titulo": "Egito x Irã: modelo matemático aponta possível resultado do jogo; veja", "url": "https://www.infomoney.com.br/esportes/egito-x-ira-modelo-matematico-aponta-possivel-resultado-do-jogo-veja/", "fonte_id": "infomoney", "data_pub": "2026-06-27T00:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma análise estatística da Fundação Getúlio Vargas projeta que uma das seleções terá mais probabilidade de ganhar o jogo entre Egito e Irã na madrugada deste sábado.", "titulo_pt": "Egito x Irã: modelo matemático prediz seleção com maiores chances de vencer partida", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 21173, "titulo": "Iran war live: US strikes Iran after attack on vessel in Strait of Hormuz", "url": "https://www.aljazeera.com/news/liveblog/2026/6/27/iran-war-live-us-strikes-iran-after-fire-on-vessel-in-strait-of-hormuz?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-27T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A IRGC do Irã afirmou que atacou forças militares dos Estados Unidos no região após a administração de Trump realizar um ataque contra o país.", "titulo_pt": "Irã em guerra ao vivo: Irã ataca Estados Unidos após ataques na Strait of Hormuz", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 21121, "titulo": "Caso Flores: presidente de la Asociación de Notarios declaró ante la fiscalía en calidad de imputado", "url": "https://www.ciperchile.cl/2026/06/26/caso-flores-presidente-de-la-asociacion-de-notarios-declaro-ante-la-fiscalia-en-calidad-de-imputado/?utm_source=rss&utm_medium=rss&utm_campaign=caso-flores-presidente-de-la-asociacion-de-notarios-declaro-ante-la-fiscalia-en-calidad-de-imputado", "fonte_id": "ciper_chile", "data_pub": "2026-06-26T23:59:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O presidente da Associação de Notários declarou-se ante a fiscalia no âmbito do caso Flores, assumindo o status de imputado.", "titulo_pt": "Caso Flores: presidente da Associação de Notários compareceu à fiscalia como investigado", "veiculo": "CIPER Chile", "pais": "Chile", "classe": "A"}, {"id": 21180, "titulo": "Hezbollah supporters block Beirut road to protest Israel-Lebanon agreement", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/hezbollah-supporters-block-beirut-road-burn-tires-protest-israel-lebanon", "fonte_id": "middle_east_eye", "data_pub": "2026-06-26T23:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Suportadores do Hezbollah bloquearam uma estrada em Beirute para protestar contra um acordo recentemente assinado entre Israel e o Líbano. Os manifestantes, que incluíram ciclistas motorizados, bloquearam pelo menos uma via com pneus inflamados e gritaram slogans.", "titulo_pt": "Suportadores do Hezbollah bloqueiam estrada de Beirute para protestar contra acordo entre Israel e Líbano", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 21186, "titulo": "Iran: Guardie Rivoluzionarie, colpite posizioni militari Usa in risposta ai raid", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/27/iran-guardie-rivoluzionarie-colpite-posizioni-militari-usa-in-risposta-ai-raid_a4871f20-8bd2-41f0-8c25-a379e674ba1e.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-26T23:36:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "As Guardiões da Revolução do Irã lançaram ataques contra posições militares dos Estados Unidos como resposta a operações anteriores. A declaração sugere que se os ataques americanos forem repetidos, as reações iranianas serão mais amplas.", "titulo_pt": "Irã: Guardiões da Revolução atacam posições militares dos EUA em resposta aos ataques", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 21181, "titulo": "‘Washington violated commitments’: IRGC says it targeted US forces in the region", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/washington-violated-commitments-irgc-says-it-targeted-us-forces-region", "fonte_id": "middle_east_eye", "data_pub": "2026-06-26T23:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Corpo de Guerra Revolucionário Islâmico do Irã (IRGC) afirmou que alvejou posições onde estão forças americanas na região e advertiu sobre uma resposta mais ampla se a agressão se repetir. O IRGC também criticou os ataques dos EUA contra o país, afirmando que Washington violou seus compromissos.", "titulo_pt": "Washington violou compromissos", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}], "mundo__eventos": [], "economia": [{"id": 21069, "titulo": "Aneel destinará até R$ 5,6 bi para aliviar conta de luz em 19 estados", "url": "https://www.cnnbrasil.com.br/infra/aneel-destinara-ate-r-56-bi-para-aliviar-conta-de-luz-em-19-estados/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-27T00:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Agência Nacional de Energia Elétrica (Aneel) destinará até R$ 5,6 bilhões para aliviar as contas de luz em 19 estados. Os reajustes tarifários para consumidores de baixa tensão nas áreas beneficiadas deverão ser abaixo ou próximos a 4,51%.", "titulo_pt": "Aneel destinará até R$ 5,6 bi para aliviar conta de luz em 19 estados", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 20476, "titulo": "Economy stays ‘red’ hot for sixth month", "url": "https://www.taipeitimes.com/News/biz/archives/2026/06/27/2003859799", "fonte_id": "taipei_times", "data_pub": "2026-06-27T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A economia manteve-se em níveis elevados durante o sexto mês consecutivo, sem informações adicionais sobre indicadores específicos ou causas.", "titulo_pt": "Economia permanece 'quente' vermelha por sexto mês", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 21193, "titulo": "Growth agenda: Hong Kong vows stronger exchange with reforms, bond futures and gold push", "url": "https://www.scmp.com/business/banking-finance/article/3358546/growth-agenda-hong-kong-vows-stronger-exchange-reforms-bond-futures-and-gold-push?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-27T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O vice-secretário financeiro de Hong Kong, Michael Wong Wai-lun, anunciou a implementação de uma revisão nas regras de listagem da bolsa e o lançamento de novos produtos, durante um evento em comemoração aos 26 anos da HKEX. As reformas incluem otimização dos direitos de voto ponderados, facilitação das listagens secundárias de emissores estrangeiros e expansão da flexibilidade.", "titulo_pt": "Agenda de crescimento: Hong Kong promete maior intercâmbio com reformas e futuros de títulos", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 20889, "titulo": "La suba del dólar impulsó las ventas de soja: queda comercializar grano por más de US$13.000 millones", "url": "https://www.lanacion.com.ar/economia/campo/la-mejora-del-dolar-impulso-las-ventas-de-soja-queda-comercializar-grano-por-mas-de-us13000-millones-nid26062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-26T23:14:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O fortalecimento da taxa de câmbio reativou as operações recentemente, mas o ritmo de comercialização permanece semelhante ao histórico. Até agora, foram vendidas cerca de 41% da produção estimada.", "titulo_pt": "Aumento do dólar impulsionou vendas de soja, com volume superior a US$13 bilhões", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 20794, "titulo": "Cenário de juros exige cautela com prefixados e inflação", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/cenario-de-juros-exige-cautela-com-prefixados-e-inflacao/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-26T22:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Após a superquarta-feira, o mercado brasileiro está reavaliando as expectativas para os juros futuros.  Investir em títulos prefixados e estratégias de proteção contra a inflação exigem atenção neste cenário.", "titulo_pt": "Cenário de juros exige cautela com prefixados e inflação", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 20697, "titulo": "Petróleo cai mais de 8% na semana com retomada de fluxo no estreito de Hormuz", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/petroleo-cai-mais-de-8-na-semana-com-retomada-de-fluxo-no-estreito-de-hormuz.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-26T22:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O preço do petróleo caiu nesta sexta-feira (26), totalizando uma queda de 8,16% na semana. A queda ocorreu em meio à retomada gradual do fluxo de navios pelo estreito de Hormuz.", "titulo_pt": "Petróleo cai mais de 8% na semana com retomada de fluxo no estreito de Hormuz", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 20799, "titulo": "Dívida vai subir para 115% do PIB em 2036, diz IFI", "url": "https://www.cnnbrasil.com.br/economia/divida-vai-subir-para-115-do-pib-em-2036-diz-ifi/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-26T22:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Instituto Financeiro Internacional (IFI) publicou um relatório que prevê uma trajetória preocupante para a dívida bruta brasileira. O estudo indica que a dívida pública pode atingir 115% do Produto Interno Bruto (PIB) em 2036.  O IFI também aponta para déficits primários sucessivos nos próximos anos.", "titulo_pt": "Dívida pública chegará a 115% do PIB em 2036, segundo IFI", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 20726, "titulo": "Painel ajuda empresas a identificar oportunidades de negócios com a UE", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/painel-ajuda-empresas-a-identificar-oportunidades-de-negocios-com-a-ue", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-26T22:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ApexBrasil lançou um painel para ajudar empresas brasileiras a identificar oportunidades de negócios com a União Europeia, com base no Acordo Mercosul-União Europeia. O painel visa auxiliar as empresas a conhecerem os mercados europeus e os produtos brasileiros que se beneficiam da redução ou eliminação de tarifas.", "titulo_pt": "Painel auxilia empresas a encontrar oportunidades comerciais com a UE", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 21007, "titulo": "‘Tit-for-tat’ trade warfare threatens global economy, says IMF chief economist", "url": "https://www.ft.com/content/8199cd6d-e513-4c9a-9beb-8a7acd2b65dc", "fonte_id": "financial_times", "data_pub": "2026-06-26T21:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pierre-Olivier Gourinchas, que está deixando o Fundo Monetário Internacional (FMI), alerta que tentativas de obter pequenas vantagens serão 'autodestrutivas'. Ele afirma que uma guerra comercial baseada em retaliações prejudicará a economia global.", "titulo_pt": "'Olho por Olho' na Guerra Comercial Ameaça Economia Global, Diz Chefe Economista do FMI", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 20728, "titulo": "CNPJ de autônomos, prestadores e produtores rurais é adiado para 2027", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/cnpj-de-autonomos-prestadores-e-produtores-rurais-e-adiado-para-2027", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-26T21:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Receita Federal e o Comitê Gestor do Imposto sobre Bens e Serviços (CGIBS) prorogaram a obrigatoriedade de inscrição de autônomos, prestadores e produtores rurais no Cadastro Nacional da Pessoa Jurídica (CNPJ) para 1º de janeiro de 2027. A regra, que fazia parte das mudanças previstas pela Reforma Tributária sobre o consumo, estava inicialmente prevista para entrar em vigor em 1º de julho.", "titulo_pt": "Prazo para inscrição de autônomos, prestadores e produtores rurais no CNPJ é adiado para 2027", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 20699, "titulo": "Bandeira tarifária continua amarela em julho, e conta de luz terá custo extra pelo terceiro mês consecutivo", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/bandeira-tarifaria-continua-amarela-em-julho-e-conta-de-luz-tera-custo-extra-pelo-terceiro-mes-consecutivo.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-26T21:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Agência Nacional de Energia Elétrica (Aneel) anunciou que a bandeira tarifária continuará amarela em julho.  Isso resultará em um acréscimo de R$1,885 por cada 100 kWh consumidos, marcando o terceiro mês consecutivo com aumento no custo da conta de luz.", "titulo_pt": "Bandeira tarifária permanece amarela em julho, aumentando custo da conta de luz", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 19731, "titulo": "Gênio ou ingenuidade do mercado?", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/blogs/de-grao-em-grao/2026/06/genio-ou-ingenuidade-do-mercado.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-26T21:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto discute o hábito dos mercados financeiros de atribuir a riqueza a gênios. O autor questiona se essa riqueza é resultado de habilidade excepcional ou de oportunidades raras e repetitivas.", "titulo_pt": "Gênio ou ingenuidade do mercado?", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 20321, "titulo": "SpaceX bonds sell off days after AI and rocket group’s $25bn debt deal", "url": "https://www.ft.com/content/04f98e21-4ce7-43d2-8651-44557e12c31c", "fonte_id": "financial_times", "data_pub": "2026-06-26T20:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os rendimentos dos títulos da SpaceX estão se aproximando dos níveis geralmente associados a empresas classificadas como lixo. O movimento ocorre dias após o grupo de inteligência artificial e foguetes fechar um acordo de dívida de US$ 25 bilhões.", "titulo_pt": "Títulos da SpaceX caem dias após acordo de dívida de US$ 25 bilhões", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 19732, "titulo": "Dívida pública federal do Brasil sobe 2,66% em maio e supera R$ 9 trilhões", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/divida-publica-federal-do-brasil-sobe-266-em-maio-e-supera-r-9-trilhoes.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-26T20:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A dívida pública federal do Brasil aumentou 2,66% em maio, atingindo R$ 9 trilhões. O custo de rolagem e as novas emissões de títulos também registraram alta durante o mês.", "titulo_pt": "Dívida pública federal brasileira supera R$ 9 trilhões em maio", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 19733, "titulo": "Braskem recebe proteção judicial de 60 dias para renegociar dívidas", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/braskem-recebe-protecao-judicial-de-60-dias-para-renegociar-dividas.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-26T20:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A petroquímica Braskem obteve proteção judicial contra credores por 60 dias. O pedido à Justiça foi feito como parte de um plano de reestruturação financeira que ainda não convenceu os maiores credores.", "titulo_pt": "Braskem recebe proteção judicial de 60 dias para renegociar dívidas", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 19734, "titulo": "Tesouro pode fazer atuação extraordinária no mercado de títulos se necessário, diz coordenador", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/tesouro-pode-fazer-atuacao-extraordinaria-no-mercado-de-titulos-se-necessario-diz-coordenador.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-26T20:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Helano Dias, coordenador-geral de Operações da Dívida Pública do Tesouro Nacional, afirmou que a gestão busca financiar o governo e manter o mercado funcionando. Ele ressaltou que o Tesouro poderá realizar ações extraordinárias caso necessário.", "titulo_pt": "Tesouro pode agir excepcionalmente no mercado de títulos, diz coordenador", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 20480, "titulo": "Samsung, SK Hynix plan AI spending push: report", "url": "https://www.taipeitimes.com/News/biz/archives/2026/06/27/2003859803", "fonte_id": "taipei_times", "data_pub": "2026-06-27T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Segundo um relatório, a Samsung e a SK Hynix pretendem aumentar seus investimentos em inteligência artificial (IA). A decisão visa acompanhar o crescimento do mercado de chips para IA. As duas empresas sul-coreanas são líderes na produção de memória e processadores.", "titulo_pt": "Samsung e SK Hynix planejam aumento no investimento em IA: relatório", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 21029, "titulo": "Film Critics Are Thrilled Universal Is Skipping Influencer Screenings for ‘The Odyssey’", "url": "https://www.wired.com/story/film-critics-thrilled-universal-is-skipping-influencer-screenings-for-the-odyssey/", "fonte_id": "wired", "data_pub": "2026-06-26T23:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Universal Pictures decidiu não realizar exibições antecipadas do filme 'Odisseia' para influenciadores digitais. A primeira reação ao filme virá dos críticos de cinema tradicionais, e alguns estão comemorando essa decisão. O filme de Christopher Nolan já está gerando grande expectativa e debate.", "titulo_pt": "Críticos de cinema comemoram a decisão da Universal de ignorar pré-exibições para influenciadores em 'A Odisseia'", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 21008, "titulo": "US derivatives watchdog probes predictions market Polymarket", "url": "https://www.ft.com/content/fc145fc0-16e6-4240-8f63-35288f61a4f6", "fonte_id": "financial_times", "data_pub": "2026-06-26T22:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O órgão regulador de derivados dos Estados Unidos está investigando o mercado de previsões Polymarket. Oficialmente, a investigação se concentra na falta de transparência e regulamentação do mercado.  Advocates e autoridades estaduais estão pedindo por mais supervisão sobre o rápido crescimento da plataforma.", "titulo_pt": "Órgão regulador de derivados dos EUA investiga mercado de previsões Polymarket", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 21030, "titulo": "The Best Prime Day Laptop Deals on My Personal Favorites", "url": "https://www.wired.com/story/best-prime-day-laptop-deals-06-26-2026/", "fonte_id": "wired", "data_pub": "2026-06-26T21:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo lista as melhores ofertas de notebooks durante o Amazon Prime Day, incluindo MacBooks e notebooks para jogos.  As ofertas são consideradas entre os favoritos do autor. O texto destaca os modelos com descontos.", "titulo_pt": "Melhores ofertas de notebooks na Prime Day: Favoritos pessoais", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 20517, "titulo": "How People in China Keep Outsmarting Anthropic’s Geolocation Restrictions", "url": "https://www.wired.com/story/how-people-in-china-keep-outsmarting-anthropics-geolocation-restrictions/", "fonte_id": "wired", "data_pub": "2026-06-26T21:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Apesar das restrições impostas pela Anthropic ao acesso do modelo de linguagem Claude na China, os usuários estão encontrando novas maneiras de contorná-las. Essas estratégias incluem o uso de serviços proxy e a criação de identidades falsas adquiridas em grupos do Telegram.", "titulo_pt": "Como pessoas na China continuam contornando as restrições de geolocalização da Anthropic", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 20519, "titulo": "Best Ninja Prime Day Deals (2026) Slushi, Creami, Crispi, Cafe Luxe", "url": "https://www.wired.com/story/ninja-creami-slushi-prime-day-deals-2026/", "fonte_id": "wired", "data_pub": "2026-06-26T20:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os produtos Ninja Creami Swirl, Crispi, Slushi e Cafe Luxe Pro estão em promoção durante o Dia do Prime e essas ofertas terão prazo de validade.", "titulo_pt": "Melhores ofertas da Ninja no Dia do Prime (2026) - Slushi, Creami, Crispi e Cafe Luxe", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 19974, "titulo": "Big techs exploram e vendem nossas vulnerabilidades emocionais, diz pesquisadora britânica", "url": "https://www.bbc.com/portuguese/articles/c1m2j9jdr4yo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-26T20:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Kaitlyn Regehr, autora do livro 'Nação Smartphone', afirma que o modelo de negócios das redes sociais é estruturado para maximizar atenção. Segundo ela, essa estratégia pode amplificar conteúdos nocivos, polarização e vulnerabilidades emocionais.", "titulo_pt": "Big techs exploram e vendem nossas vulnerabilidades emocionais, diz pesquisadora britânica", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 20520, "titulo": "10 Best Prime Day Streaming Deals, Including Half Off Apple TV (2026)", "url": "https://www.wired.com/story/best-prime-day-streaming-deals-06-26-2026/", "fonte_id": "wired", "data_pub": "2026-06-26T18:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Dia dos Primeiros não se trata apenas de TVs baratas. Também oferece ofertas em conteúdo para assistir na sua TV barata. O Wired listou as 10 melhores ofertas de streaming do dia, incluindo uma oferta de 50% de desconto no Apple TV.", "titulo_pt": "10 Melhores Ofertas de Streaming no Dia dos Primeiros, incluindo Apple TV com 50% de Desconto (2026)", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 20521, "titulo": "How to See the Giant Asteroid That Will Pass by Earth This Weekend", "url": "https://www.wired.com/story/how-to-see-1997-nc1-asteroid-pass-by-earth-this-weekend/", "fonte_id": "wired", "data_pub": "2026-06-26T18:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O asteroide será visível por várias noites em diferentes partes do mundo. O texto fornecerá informações sobre quando e onde observá-lo, além dos equipamentos necessários para avistamento.", "titulo_pt": "Como ver o gigante asteroide que passará perto da Terra neste fim de semana", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 20522, "titulo": "I'm Adding These Bose Headphones to My Prime Day Cart (2026)", "url": "https://www.wired.com/story/bose-headphones-amazon-prime-day-2026/", "fonte_id": "wired", "data_pub": "2026-06-26T18:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os fones de ouvido da Bose já são um dos favoritos por conforto, som e cancelamento de ruído. Agora eles estão mais baratos.", "titulo_pt": "Vou adicionar esses fones de ouvido Bose ao meu carrinho no Dia do Consumidor (2026)", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 20567, "titulo": "This Senior Member Solves Complex Product Lifecycle Challenges", "url": "https://spectrum.ieee.org/product-lifecycle-ajay-prasad", "fonte_id": "ieee_spectrum", "data_pub": "2026-06-26T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ajay Prasad é Diretor de Processo Industrial na Dassault Systèmes em Detroit. Seu foco é a supervisão global de especialistas em processos industriais que se especializam em Enovia, uma solução de gerenciamento de ciclo de vida de produtos (PLM) e um dos produtos principais da empresa.  A inclinação de Prasad para consertar coisas e o pânico global de 1999 sobre se os computadores sobreviveriam à mudança de data para 2000 ajudaram a moldar sua carreira.", "titulo_pt": "Este Membro Sênior Resolve Desafios Complexos do Ciclo de Vida de Produtos", "veiculo": "IEEE Spectrum", "pais": "EUA", "classe": "A"}, {"id": 20523, "titulo": "I Just Saw That Eufy’s Floodlight Security Camera Is Cheaper Than Ever (2026)", "url": "https://www.wired.com/story/amazon-prime-day-eufy-floodlight-security-camera-june-2026/", "fonte_id": "wired", "data_pub": "2026-06-26T17:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A câmera de segurança Floodlight da Eufy é uma boa opção para aumentar a segurança do lar durante o Prime Day. A câmera está disponível por um preço mais baixo que nunca.", "titulo_pt": "Câmera de Segurança com Iluminação Eufy Está Mais Barata Que Nunca (2026)", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 20524, "titulo": "OpenAI Has New AI Models. Here’s Why You Can’t Use Them", "url": "https://www.wired.com/story/openai-gpt-56-model-release-trump-admin-approval/", "fonte_id": "wired", "data_pub": "2026-06-26T17:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Casa Branca pediu à OpenAI que adiasse o lançamento dos seus modelos de IA GPT-5.6. Essa solicitação ocorre duas semanas após a Anthropic ter retirado seus modelos de IA mais avançados do ar.", "titulo_pt": "OpenAI Tem Novos Modelos de IA. Aqui Está o Porquê de Você Não Poder Usá-los", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 20283, "titulo": "OpenAI limits new AI models to 'trusted partners' at request of U.S. government", "url": "https://www.cnbc.com/2026/06/26/openai-limits-new-ai-models-to-trusted-partners-request-us-government.html", "fonte_id": "cnbc_international", "data_pub": "2026-06-26T17:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "OpenAI apresentou as capacidades das novas modelagens de inteligência artificial ao governo antes do lançamento. O governo solicitou que os novos modelos fossem restritos a parceiros confiáveis.", "titulo_pt": "OpenAI limita novos modelos de IA a 'parceiros confiáveis' a pedido do governo dos EUA", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 20525, "titulo": "The Pentagon Is Looking Into the Dialog Data Exposure for Unmasking National Security Officials", "url": "https://www.wired.com/story/the-pentagon-is-looking-into-the-dialog-data-exposure-for-unmasking-national-security-officials/", "fonte_id": "wired", "data_pub": "2026-06-26T16:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Registros divulgados de um grupo privado revelaram informações pessoais de um alto oficial de inteligência da Casa Branca e um oficial de operações especiais em serviço ativo. O Pentágono está investigando a exposição dos dados.", "titulo_pt": "Pentágono investiga exposição de dados de diálogo para desmascarar oficiais de segurança nacional", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 19898, "titulo": "Da base ao topo global: como essa empresa centenária usa IA para exportar talentos do Brasil", "url": "https://exame.com/carreira/da-base-ao-topo-global-como-essa-empresa-centenaria-usa-ia-para-exportar-talentos-do-brasil/", "fonte_id": "exame", "data_pub": "2026-06-26T16:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A empresa, com mais de um século de história, implementa inteligência artificial para formar lideranças locais no Brasil e promove profissionais para cargos importantes em sua sede global.", "titulo_pt": "Da base ao topo global: como essa empresa centenária usa IA para desenvolver líderes no Brasil e exportá-los para posições de destaque no exterior", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 21133, "titulo": "Qué es la mancha fría que se profundiza en el océano Atlántico y por qué alarma a los científicos", "url": "https://www.lanacion.com.ar/ciencia/que-es-la-mancha-fria-que-se-profundiza-en-el-oceano-atlantico-y-por-que-alarma-a-los-cientificos-nid26062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-26T23:57:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A mancha fria no Oceano Atlântico é um fenômeno que está enfriando a região, causando preocupação entre os cientistas. Este resumo analisa o impacto desse fenômeno na área.", "titulo_pt": "O que é a mancha fria que se aprofunda no Oceano Atlântico e por que preocupa os cientistas", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 21031, "titulo": "Uranus, Neptune may be magma worlds, not ice giants", "url": "https://phys.org/news/2026-06-uranus-neptune-magma-worlds-ice.html", "fonte_id": "phys_org", "data_pub": "2026-06-26T23:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Urano e Netuno permanecem entre os objetos mais misteriosos do sistema solar, já que foram visitados apenas pelo Voyager 2 da NASA em 1986 e 1989. A hipótese dos gigantes de gelo deriva das suposições de que seus núcleos contêm uma camada de elementos gelatinosos sob suas atmosferas de hidrogênio e hélio.", "titulo_pt": "Urano e Netuno podem ser mundos de magma, não gigantes de gelo", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 20830, "titulo": "Nova espécie de planta é descoberta na Serra do Espinhaço, em Minas", "url": "https://www.metropoles.com/minas-gerais/nova-especie-de-planta-e-descoberta-na-serra-do-espinhaco-em-minas", "fonte_id": "metropoles", "data_pub": "2026-06-26T22:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A espécie Eriope barrinhae foi identificada no Parque Estadual Caminhos dos Gerais, localizado no Norte de Minas Gerais.", "titulo_pt": "Nova espécie de planta descoberta na Serra do Espinhaço, em Minas", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 21032, "titulo": "Proactive employees with high emotional intelligence do a better job, study finds", "url": "https://phys.org/news/2026-06-proactive-employees-high-emotional-intelligence.html", "fonte_id": "phys_org", "data_pub": "2026-06-26T22:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo da Departamento de Psicologia da Universidade Lingnan descobriu que funcionários proativos, dispostos a aprender e com maior inteligência emocional, realizam seu trabalho de forma mais eficiente e estão mais engajados.", "titulo_pt": "Funcionários proativos com alto QI emocional realizam melhor trabalho, estudo mostra", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 21038, "titulo": "Rocket Lab launches 10th Synspective satellite", "url": "https://spacenews.com/rocket-lab-launches-10th-synspective-satellite/", "fonte_id": "spacenews", "data_pub": "2026-06-26T22:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Rocket Lab lançou um satélite de imagem por radar para a empresa japonesa Synspective em 26 de junho. O lançamento foi adiado devido a uma missão espacial de resposta.", "titulo_pt": "Rocket Lab lança 10º satélite da Synspective", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 21033, "titulo": "Coal pollution reaches one of Earth's most remote mountain regions", "url": "https://phys.org/news/2026-06-coal-pollution-earth-remote-mountain.html", "fonte_id": "phys_org", "data_pub": "2026-06-26T22:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Novos estudos, publicados na Geophysical Research Letters, indicam que a cordilheira dos Himalaias não serve como barreira impenetrável para poluição atmosférica, permitindo que partículas de carvão cheguem até o Tibete.", "titulo_pt": "Poluição de carvão atinge uma das regiões montanhosas mais remotas da Terra", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 21034, "titulo": "Why Ho Chi Minh City's pollution sources may have been misread for years", "url": "https://phys.org/news/2026-06-ho-chi-minh-city-pollution.html", "fonte_id": "phys_org", "data_pub": "2026-06-26T21:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A queima de biomassa, como a combustão de madeira, carvão e resíduos agrícolas, é uma importante fonte de PM2.5, partículas finas que deterioram a qualidade do ar e representam riscos à saúde humana. Grande parte dessa poluição é monitorada através dos níveis de levoglucosan, um composto formado pela queima do celulose em plantas, resultante da combustão de biomassa como uso residencial de combustível, cozimento e queimadas abertas.", "titulo_pt": "As fontes de poluição de Ho Chi Minh City podem ter sido mal interpretadas por anos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 20591, "titulo": "Spain-backed fund joins FOSSA’s sovereign satellite communications push", "url": "https://spacenews.com/spain-backed-fund-joins-fossas-sovereign-satellite-communications-push/", "fonte_id": "spacenews", "data_pub": "2026-06-26T20:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A startup espanhola FOSSA Systems levantou cerca de US$ 10,5 milhões para expandir sua constelação de conectividade em uma rodada de financiamento que incluiu um veículo de investimento em tecnologia apoiado pelo governo espanhol. O objetivo é impulsionar as comunicações por satélite soberanas.", "titulo_pt": "Fundo apoiado pela Espanha junta-se ao esforço de comunicações por satélite soberanas da FOSSA", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 20155, "titulo": "Tiene 85 Nobel y por sus filas pasaron Newton y Einstein: por primera vez un investigador chileno integra la sociedad científica más selecta del mundo", "url": "https://www.latercera.com/educacion/noticia/tiene-85-nobel-y-por-sus-filas-p
