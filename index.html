const D = {"gerado_em": "20/07/2026 09:33", "stats": {"noticias_novas": 773, "resumos_gerados": 241}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "A semana será marcada por debates sobre tarifas comerciais nos Estados Unidos e pelo prazo final para os partidos políticos oficializarem seus candidatos, que encerra no dia 5 de agosto. Na segunda-feira, o presidente Jair Bolsonaro sancionará um projeto na área da saúde e participará de reuniões com ministros e membros do governo. Celina Leão lidera as simulações para o governo do Distrito Federal, enquanto Patrus Ananias será lançado como candidato ao governo de Minas Gerais pelo Partido dos Trabalhadores. O ministro Moraes negou a visita do deputado Milei durante sua viagem ao Brasil.", "mundo": "Andy Burnham, ex-prefeito de Manchester e novo líder do Partido Trabalhista britânico, assume o cargo de primeiro-ministro após a renúncia de Keir Starmer. Ele promete 'trazer de volta a esperança' ao país e buscar fazer coisas diferentes em relação aos seus antecessores. O Reino Unido enfrenta tensões com o Irã, que ataca alvos militares americanos no Oriente Médio após alegações de explosão de petroleiros no Estreito de Ormuz. Israel critica um projeto de política palestina proposto pelo Partido Trabalhista australiano, argumentando que ele atribui culpa a Israel pelo conflito no Gaza e não destaca suficientemente o papel do Hamas. O Irã recebeu propostas de mediadores para negociar com os Estados Unidos sobre seus direitos no Estreito de Ormuz, reafirmando que esses direitos são inegociáveis.\n\nA tensão geopolítica entre Estados Unidos e Irã continua a se intensificar com ataques mútuos e retaliações. Após soldados americanos terem sido mortos no final de semana, o presidente Donald Trump anunciou novas operações militares contra alvos iranianos, marcando a nona noite consecutiva de ataques dos EUA. Em resposta, o líder supremo iraniano Ayatollah Ali Khamenei declarou que a assinatura do acordo provisório por Trump é inútil e que Teerã está suspendo suas obrigações. A Guarda Revolucionária iraniana também anunciou ataques contra bases no Oriente Médio, incluindo na Síria. As retaliações dos EUA aos recentes assassinatos de tropas jordanianas por parte do Irã resultaram em novos ataques ao país. O conflito prolongado deve aumentar a demanda por sistemas de defesa aérea sul-coreanas, beneficiando empresas como LIG Defesa & Aeroespacial e Hanwha Aeroespacial. Além disso, o Irã continua ameaçando o Estreito de Ormuz, elevando os riscos para a navegação e os preços do petróleo.", "economia": "As previsões de inflação no Brasil foram reduzidas pela terceira semana consecutiva, com os analistas do mercado financeiro estimando uma taxa de 5,15% para 2026. Em contraste, o preço do petróleo subiu para US$ 90 por barril devido a preocupações com perturbações na cadeia de suprimentos causadas pelos ataques iranianos aos navios-pipa. A AliExpress foi multada em um recorde de €550 milhões pela União Europeia por vender produtos ilegais e falsificados, incluindo roupas perigosas e cosméticos. No Brasil, o Bolsa Família de julho começou a ser pago nesta segunda-feira (20), beneficiando usuários com NIS final 1 em 175 municípios de seis estados brasileiros. Além disso, os mercados europeus buscam recuperação monitorando negociações relacionadas às tensões entre EUA e Irã no Oriente Médio. A bolsa de valores de Hong Kong considera alongar as horas de negociação para se alinhar com movimentos de concorrentes globais, enquanto a Receita Federal abriu adesão a dois novos editais de transação tributária. No exterior, o mercado sul-coreano sofreu uma queda superior a 4% devido à prolongada queda nos preços dos chips e tensões no Oriente Médio.", "tecnologia": "O cenário tecnológico global está sendo moldado por diversos avanços e desafios. Em primeiro lugar, a China tem se destacado na corrida pela liderança em inteligência artificial (IA), com empresas como Moonshot e Alibaba lançando modelos que competem diretamente com os líderes do setor, como o OpenAI e a Anthropic, sugerindo uma diminuição da vantagem dos Estados Unidos. Além disso, a indústria de veículos elétricos chinesa enfrenta mudanças significativas com o fim das isenções fiscais que ajudaram seu crescimento, pressionando as margens já estreitas das fabricantes. Em seguida, a tecnologia está se tornando cada vez mais central em diversos setores, como no desenvolvimento de medicamentos, onde a inteligência artificial está acelerando significativamente os processos pré-clínicos e reduzindo custos em até 70%, estimulando a demanda por ferramentas avançadas. No entanto, há preocupações sobre o uso de IA, como a possibilidade de preconceitos algorítmicos e a necessidade de manter a confiança pública frente às mudanças disruptivas tecnológicas. Por fim, países como a Coreia do Sul enfatizam a importância de desenvolver sua própria inteligência artificial avançada, considerando-a um ativo estratégico, enquanto empresas locais investem em novas tecnologias para superar limitações atuais, como no caso da Samsung e SK hynix que estão desenvolvendo uma nova classe de memória para sistemas de IA.", "ciencia": "Em 2023, a China registrou um aumento significativo na inovação farmacêutica, com mais de 80% dos novos medicamentos aprovados tendo sido desenvolvidos localmente. Cerca de 31 novos fármacos foram aprovados no primeiro semestre do ano, contribuindo para o avanço da indústria farmacêutica chinesa (SCMP). Paralelamente, cientistas estão buscando entender a primeira vida complexa na Terra, considerada fundamental para a astrobiologia. A maioria da história biológica terrestre foi dominada por microorganismos, mas a busca pela vida complexa continua sendo um desafio importante (Phys.org).", "cultura": "O evento mais destacado na cultura global é o planejado Festival de Artes Performáticas de Hong Kong (HKPAX), marcado para outubro de 2026. Este festival visa manter os números de participantes dos dois anos anteriores sem aumentar o orçamento, enfrentando desafios econômicos e buscando reduzir os preços dos ingressos e diversificar seu programa. Em outro contexto cultural notável, a atriz Dua Lipa inaugurou uma biblioteca em Portugal para promover a liberdade de expressão, transformando a famosa livraria Lello no Porto. No cinema, o ator Ben Platt estreia um musical que explora sua experiência como cantor de Greenwich Village dos anos 1960, abordando questões de ansiedade e identidade. Chris Packham investiga uma série de crimes ambientais envolvendo a morte de aves e animais na Inglaterra. Nas artes visuais, o fotógrafo italiano Andrea Ferro registra as últimas moradias em domos em Dakar antes da possível demolição. No teatro, a companhia brasileira Deborah Colker apresenta 'Remix' no Teatro Sérgio Cardoso, revisando seu repertório, e o documentário 'The Skinner Revolution' examina as ideias controversas do psicólogo B.F. Skinner. O filme épico 'The Odyssey', dirigido por Christopher Nolan, estreou com sucesso global, arrecadando US$264 milhões no fim de semana, marcando seu melhor lançamento ajustado para inflação desde 2012.", "sociedade": "A mãe de Helena obteve uma medida protetiva após relatos de ataques e ameaças por parte das facções, com um laudo indicando lesões na região anal da bebê. O GDF sancionou a lei que permite 'internação humanizada involuntária', entrando em vigor 90 dias depois sem local definido para o atendimento. A pesquisa do A.C. Camargo Cancer Center revela que 80% dos brasileiros reconhecem os sintomas do câncer colorretal, mas apenas 60% das pessoas com sangue nas fezes procuram um médico imediatamente.", "meio_ambiente": "Autoridades da UNESCO chamaram para uma ação urgente global para proteger sítios culturais diante do impacto das mudanças climáticas e conflitos. Em outro desenvolvimento, 35% dos ativos físicos de grandes empresas no Brasil estão expostos a desastres climáticos, segundo um levantamento da C-More. As recentes chuvas causaram danos estimados em mais de US$200 milhões à agricultura, com destaque para palmeiras e citros, mas aliviaram uma sequência prolongada de seca. Além disso, forças brasileiras estão combatendo a mineração ilegal que está destruindo áreas protegidas do território indígena na Amazônia.", "direitos_humanos": "Protestos e violência contra direitos humanos continuam a ser um tema preocupante em várias partes do mundo. Em Cuiabá, uma venezuelana foi morta por seu ex-companheiro usando um fio elétrico, o que denota uma grave violação de direitos humanos. Na China, um homem com deficiência intelectual foi condenado a 28 meses de prisão por incitar subversão e promover ideologias anti-partido comunista. Em contraste, um tribunal de Hong Kong ordenou a soltura de 14 acusados no caso supostamente envolvendo o assassinato de um ex-membro de uma tribo criminosa há cinco anos, após determinar que os procuradores não conseguiram provar que as lesões fatais foram causadas intencionalmente. Em Houston, Texas, manifestantes continuam a exigir justiça no assassinato do homem mexicano Lorenzo Salgado Araujo, de 52 anos, por agentes da ICE. Por fim, restrições de viagem impostas pelos Estados Unidos e Congo podem dificultar a resposta humanitária à epidemia de Ebola, ameaçando retardar o deslocamento de profissionais médicos necessários para contê-la."}, "resumo_do_dia": {"politica_nacional": [{"id": 61944, "titulo": "Como formar liderança preparada para o futuro do trabalho?", "url": "https://www.cartacapital.com.br/do-micro-ao-macro/como-preparar-lideranca-para-o-futuro/", "fonte_id": "cartacapital", "data_pub": "2026-07-20T11:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Pesquisas indicam que os jovens estão cada vez mais utilizando ferramentas de Inteligência Artificial (IA) para tomar decisões, o que pode afetar a formação de futuros líderes. Isso sugere uma necessidade crescente de desenvolver habilidades de pensamento crítico e tomada de decisão fora das capacidades da IA.", "titulo_pt": "Como formar liderança preparada para o futuro do trabalho?", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 61956, "titulo": "Bolsa Família de julho começa a ser pago nesta 2ª; leia calendádio", "url": "https://www.poder360.com.br/poder-economia/bolsa-familia-de-julho-comeca-a-ser-pago-nesta-2a-leia-calendadio/", "fonte_id": "poder360", "data_pub": "2026-07-20T11:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Bolsa Família de julho começa a ser pago nesta segunda-feira, com o pagamento unificado em seis Estados. Os beneficiários com NIS final 1 serão os primeiros a receber.", "titulo_pt": "Bolsa Família de julho começa a ser pago nesta seg; veja calendário", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 61945, "titulo": "O que se sabe sobre a morte de piloto de avião ‘batizado’ com banho de óleo", "url": "https://www.cartacapital.com.br/sociedade/o-que-se-sabe-sobre-a-morte-de-piloto-de-aviao-batizado-com-banho-de-oleo/", "fonte_id": "cartacapital", "data_pub": "2026-07-20T11:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Gustavo Henrique Lara, de 27 anos, teria sofrido uma reação alérgica a um produto que resultou em três paradas cardiorrespiratórias. A vítima foi 'batizada' com banho de óleo antes de morrer.", "titulo_pt": "O que se sabe sobre a morte do piloto de avião 'batizado' com banho de óleo", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 61957, "titulo": "Dino afasta secretário do Maranhão e impõe prisão domiciliar", "url": "https://www.poder360.com.br/poder-justica/dino-afasta-secretario-do-maranhao-e-impoe-prisao-domiciliar/", "fonte_id": "poder360", "data_pub": "2026-07-20T11:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governador Dino afastou o secretário Raimundo Cutrim do cargo e impôs prisão domiciliar. Cutrim é investigado sob sigilo por suspeita de coação e obstrução da Justiça, e a Polícia Federal apreendeu armas na sua casa.", "titulo_pt": "Dino afasta secretário do Maranhão e impõe prisão domiciliar", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 61958, "titulo": "Ferrari é multada após Hamilton atropelar mecânico em pit stop", "url": "https://www.poder360.com.br/poder-sportsmkt/ferrari-e-multada-apos-hamilton-atropelar-mecanico-em-pit-stop/", "fonte_id": "poder360", "data_pub": "2026-07-20T11:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Ferrari foi multada com 30.000 euros e exigida a apresentação de um relatório detalhado sobre o incidente no pit stop envolvendo Lewis Hamilton em Spa-Francorchamps.", "titulo_pt": "Ferrari é multada após Hamilton atropelar mecânico em pit stop", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 61998, "titulo": "TJ abre auditoria após expor ação de Bob Esponja contra Lula Molusco", "url": "https://www.metropoles.com/colunas/mirelle-pinheiro/tj-abre-auditoria-apos-expor-acao-de-bob-esponja-contra-lula-molusco", "fonte_id": "metropoles", "data_pub": "2026-07-20T11:04:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A auditoria foi aberta após a descoberta de processos simulados na unidade de homologação do sistema e-SAJ. A ação judicial de Bob Esponja contra Lula Molusco gerou repercussão.", "titulo_pt": "TJ abre auditoria após descoberta de processos simulados relacionados a ação de Bob Esponja contra Lula Molusco", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 62033, "titulo": "Moraes barra visita de Milei a Bolsonaro durante viagem ao Brasil", "url": "https://www.congressoemfoco.com.br/noticia/120602/moraes-barra-visita-de-milei-a-bolsonaro-durante-viagem-ao-brasil", "fonte_id": "congresso_em_foco", "data_pub": "2026-07-20T10:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro Moraes negou a visita do deputado Milei ao presidente Bolsonaro durante a viagem do deputado ao Brasil. O pedido foi considerado prejudicado após Moraes suspender temporariamente as visitas do ex-presidente.", "titulo_pt": "Moraes nega visita de Milei a Bolsonaro durante viagem ao Brasil", "veiculo": "Congresso em Foco", "pais": "Brasil", "classe": "B"}, {"id": 61947, "titulo": "Celina Leão lidera a disputa pelo governo do DF, mostra Paraná Pesquisas", "url": "https://www.cartacapital.com.br/politica/celina-leao-lidera-a-disputa-pelo-governo-do-df-mostra-parana-pesquisas/", "fonte_id": "cartacapital", "data_pub": "2026-07-20T10:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A governadora Celina Leão está na liderança nas duas simulações de votos para o governo do Distrito Federal realizadas pela Paraná Pesquisas.", "titulo_pt": "Celina Leão lidera disputa pelo governo do DF, segundo Paraná Pesquisas", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 61960, "titulo": "Agenda da semana: tarifaço e largada das convenções eleitorais", "url": "https://www.poder360.com.br/poder360/agenda-da-semana-tarifaco-e-largada-das-convencoes-eleitorais/", "fonte_id": "poder360", "data_pub": "2026-07-20T10:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A semana será marcada por debates sobre tarifas comerciais dos Estados Unidos e pelo prazo final para os partidos políticos oficializarem seus candidatos, que encerra no dia 5 de agosto.", "titulo_pt": "Agenda da semana: tarifação e início das convenções eleitorais", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 61949, "titulo": "Tarot do dia: previsão para os 12 signos em 20/07/2026", "url": "https://www.cartacapital.com.br/astrologia/tarot-do-dia-previsao-para-os-12-signos-em-20-07-2026/", "fonte_id": "cartacapital", "data_pub": "2026-07-20T10:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Para a segunda-feira, o tarot indica movimentos de encerramentos e recomeços com importantes aprendizados emocionais. A energia do dia convida para confiar na intuição e agir.", "titulo_pt": "Tarô do dia: previsão para os 12 signos em 20/07/2026", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 61961, "titulo": "Agenda de Lula: leia os compromissos do presidente nesta 2ª feira", "url": "https://www.poder360.com.br/poder-governo/agenda-de-lula-leia-os-compromissos-do-presidente-nesta-2a-feira/", "fonte_id": "poder360", "data_pub": "2026-07-20T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente sanciona um projeto na área da saúde e participa de reuniões com ministros e membros do governo.", "titulo_pt": "Agenda de Lula: leia os compromissos do presidente nesta segunda-feira", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 61962, "titulo": "Sem Arruda, Celina venceria no 1º turno no DF", "url": "https://www.poder360.com.br/poder-eleicoes-2026/sem-arruda-celina-venceria-no-1o-turno-no-df/", "fonte_id": "poder360", "data_pub": "2026-07-20T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Segundo uma pesquisa da Paraná Pesquisas, Celina Rocha venceria no primeiro turno na eleição do Distrito Federal se o ex-governador Rodrigo Arruda não estivesse na disputa. Ela teria 45,9% das intenções de voto nesse cenário.", "titulo_pt": "Sem Arruda, Celina seria vencedora no 1º turno no DF", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 61964, "titulo": "Eleições 2026: saiba o que os pré-candidatos ao Planalto farão nesta 2ª feira", "url": "https://www.poder360.com.br/poder-eleicoes-2026/eleicoes-2026-saiba-o-que-os-pre-candidatos-ao-planalto-farao-nesta-2a-feira/", "fonte_id": "poder360", "data_pub": "2026-07-20T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os pré-candidatos à Presidência têm compromissos programados para esta segunda-feira, incluindo entrevistas, encontros e eventos institucionais.", "titulo_pt": "Eleições 2026: saiba o que os pré-candidatos ao Planalto farão nesta segunda-feira", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 61965, "titulo": "PT lança Patrus Ananias como candidato ao governo de MG nesta 2ª feira", "url": "https://www.poder360.com.br/poder-eleicoes-2026/pt-lanca-patrus-ananias-como-candidato-ao-governo-de-mg-nesta-2a-feira/", "fonte_id": "poder360", "data_pub": "2026-07-20T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Partido dos Trabalhadores (PT) lançou Patrus Ananias como candidato ao governo de Minas Gerais nesta segunda-feira. O deputado federal decidiu não buscar a reeleição para a Câmara Federal, optando em vez disso por concorrer ao cargo de líder do Executivo estadual.", "titulo_pt": "PT lança Patrus Ananias como candidato ao governo de MG nesta segunda-feira", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 61951, "titulo": "Gabinete de Netanyahu critica prefeito de Nova York após comentário sobre prisão", "url": "https://www.cartacapital.com.br/mundo/gabinete-de-netanyahu-critica-prefeito-de-nova-york-apos-comentario-sobre-prisao/", "fonte_id": "cartacapital", "data_pub": "2026-07-20T09:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Zohran Mamdani, prefeito de Nova York, comentou sobre a possibilidade de ordenar a detenção do primeiro-ministro israelense durante a Assembleia Geral da ONU. O gabinete de Benjamin Netanyahu criticou essa declaração.", "titulo_pt": "Gabinete de Netanyahu critica prefeito de Nova York após comentário sobre prisão", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 61935, "titulo": "Após patrocínio do Corinthians, parlamentares propõem restringir publicidade de site adulto", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/apos-patrocinio-do-corinthians-parlamentares-propoem-restringir-publicidade-de-site-adulto.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-20T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Deputadas estaduais e municipais propuseram projetos de lei para restringir a publicidade de sites adultos após o patrocínio do Corinthians. Marina Helou (PSB) apresentou o projeto na Alesp, enquanto Marina Bragante (PSB) fez o mesmo na Câmara Municipal de São Paulo.", "titulo_pt": "Após patrocínio do Corinthians, parlamentares propõem restringir publicidade de sites adultos", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 62633, "titulo": "A U.K. prime minister takes charge with a promise to dilute power", "url": "https://www.washingtonpost.com/world/2026/07/20/andy-burnham-take-charge-uk-prime-minister-replacing-keir-starmer/", "fonte_id": "washington_post_world", "data_pub": "2026-07-20T11:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Andy Burnham, ex-morador-geral de Manchester, substitui Keir Starmer como líder do Partido Trabalhista britânico. Burnham será o próximo primeiro-ministro no próximo Monday.", "titulo_pt": "Um novo líder do partido trabalhista assume com promessa de reduzir poder", "veiculo": "Washington Post - World", "pais": "EUA", "classe": "A"}, {"id": 61955, "titulo": "EUA mantêm ataques; Irã diz que petroleiros explodiram em Ormuz", "url": "https://agenciabrasil.ebc.com.br/internacional/noticia/2026-07/eua-mantem-ataques-ira-diz-que-petroleiros-explodiram-em-ormuz", "fonte_id": "agencia_brasil_intl", "data_pub": "2026-07-20T11:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As forças americanas atacaram o Irã pelo nono dia consecutivo, em resposta à alegação de que dois petroleiros haviam explodido no Estreito de Ormuz. A Guarda Revolucionária Islâmica do Irã informou ter atacado alvos militares dos EUA na Jordânia, Kuwait e Síria.", "titulo_pt": "EUA mantêm ataques; Irã diz que petroleiros explodiram em Ormuz", "veiculo": "Agência Brasil - Internacional", "pais": "Brasil", "classe": "A"}, {"id": 62346, "titulo": "Switch in UK prime minister comes amid growing voter scepticism", "url": "https://www.france24.com/en/switch-in-uk-prime-minister-comes-amid-growing-voter-scepticism", "fonte_id": "france24", "data_pub": "2026-07-20T11:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Andy Burnham, que se tornará o próximo primeiro-ministro do Reino Unido, promete 'trazer de volta a esperança' ao país. Ele sucede Keir Starmer e é o sétimo chefe de governo britânico em uma década, sendo o quarto desde 2022.", "titulo_pt": "Troca no primeiro-ministro do reino unido ocorre diante da crescente desconfiança dos eleitores", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 62182, "titulo": "Zelensky Faces Pressure to Remove Ukraine’s Top General", "url": "https://www.nytimes.com/2026/07/20/world/europe/ukraine-zelensky-general-defense-minister.html", "fonte_id": "nyt_world", "data_pub": "2026-07-20T11:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Soldados e manifestantes pressionam o presidente ucraniano Volodymyr Zelensky a reafirmar a visão de guerra com drones proposta pelo ministro da defesa demitido recentemente.", "titulo_pt": "Zelensky enfrenta pressão para remover o General mais alto da Ucrânia", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 62329, "titulo": "JD Vance says wife Usha and son 'happy and healthy' after birth of fourth child", "url": "https://www.bbc.co.uk/news/articles/cj63kngxpxpo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-20T11:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "JD Vance e sua esposa Usha bem-sucedidamente deram à luz seu quarto filho, Alec Neel Vance, no domingo pela manhã. A família está relatando que ambos estão felizes e saudáveis.", "titulo_pt": "JD Vance diz que esposa Usha e filho 'felizes e saudáveis' após nascimento do quarto filho", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 61967, "titulo": "Irã dá atualização sobre processo diplomático em meio à escalada do conflito com EUA", "url": "https://veja.abril.com.br/mundo/ira-da-atualizacao-sobre-processo-diplomatico-em-meio-a-escalada-do-conflito-com-eua/", "fonte_id": "veja", "data_pub": "2026-07-20T11:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Países intensificaram os ataques verbais após mortes de soldados americanos no final de semana. O Irã forneceu atualizações sobre seus esforços diplomáticos durante esse período de tensão.", "titulo_pt": "Irã atualiza sobre processo diplomático em meio à escalada do conflito com EUA", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 62347, "titulo": "Andy Burnham wants to lead the UK 'differently': how different can he be?", "url": "https://www.france24.com/en/andy-burnham-wants-to-lead-the-uk-differently-how-different-can-he-be", "fonte_id": "france24", "data_pub": "2026-07-20T11:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Andy Burnham, ex-prefeito de Greater Manchester e novo líder do Partido Trabalhista britânico, está se preparando para assumir o cargo de primeiro-ministro após Keir Starmer. Ele promete fazer coisas diferentes, mas enfrentará os mesmos desafios.", "titulo_pt": "Andy Burnham quer liderar a grã-bretanha 'diferentemente': como será essa diferença?", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 62457, "titulo": "Hamas, Khalil al-Hayya eletto nuovo leader del gruppo", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/20/hamas-khalil-al-hayya-eletto-nuovo-leader-del-gruppo_68eda8aa-00d0-48b7-bec2-a40807392f35.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-20T11:26:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Khalil al-Hayya foi eleito novo líder do Hamas, sucedendo a Yahya Sinwar.", "titulo_pt": "Hamas elege Khalil al-hayya como novo líder", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 62326, "titulo": "Trump says US strikes hit Iran in 'honour' of American soldiers killed", "url": "https://www.bbc.co.uk/news/articles/cly52xzjd3qo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-20T11:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em resposta às mortes de soldados americanos, Trump afirmou que os Estados Unidos realizaram ataques no Irã. Em resposta, o Irã atacou alvos na Síria e em Jordânia, além de dois navios terem explodido no Estreito de Ormuz.", "titulo_pt": "Trump diz que EUA lançaram ataques no Irã 'em honra' de soldados americanos mortos", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 62436, "titulo": "Trump is slipping into an Iran quagmire", "url": "https://www.ft.com/content/59f83b04-3c5a-41f3-b0b6-9238dd4186b8?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-20T11:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A América não pode alcançar seus objetivos por meio de negociações com o Irã. Portanto, a ideia de mudança de regime está novamente na agenda.", "titulo_pt": "Trump está se enrolando em uma lama iraniana", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 62066, "titulo": "Irã: recebemos propostas de mediadores com EUA; direitos sobre Ormuz são inegociáveis", "url": "https://www.infomoney.com.br/mundo/ira-recebemos-propostas-de-mediadores-com-eua-direitos-sobre-ormuz-sao-inegociaveis/", "fonte_id": "infomoney", "data_pub": "2026-07-20T11:13:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Irã recebeu propostas de mediadores para negociar com os Estados Unidos, mas reafirmou que seus direitos sobre o Estreito de Ormuz não são negociáveis.", "titulo_pt": "Irã: recebemos propostas de mediadores com EUA; direitos sobre Ormuz são inegociáveis", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 62391, "titulo": "How 'blue dot fever' is affecting concerts", "url": "https://www.dw.com/en/how-blue-dot-fever-is-affecting-concerts/a-78005612?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-20T11:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A popularidade da música ao vivo continua, mas muitos concertos enfrentam problemas com ingressos não vendidos e cancelamentos. Enquanto superestrelas lotam estádios, pequenas salas de shows e artistas menores estão passando por uma crise.", "titulo_pt": "Como a 'febre da ponta azul' está afetando os concertos", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 62459, "titulo": "Domani ancora 18 città con il bollino rosso ma 8 saranno verdi", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/20/domani-ancora-18-citta-con-il-bollino-rosso-ma-8-saranno-verdi_dd434196-a89e-4a88-84f4-d3a081ef5ee1.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-20T11:04:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "A partir de quarta-feira, a situação melhora com sete centros sendo classificados como 'bollenti' (em italiano, significando 'quentes'). Dezesseis cidades continuarão com o bollino rosso (vermelho) e oito serão classificadas como verdes.", "titulo_pt": "A partir de quarta-feira, 18 cidades ainda terão o bollino vermelho, mas 8 ficarão verdes", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 62348, "titulo": "Haute Couture Fall-Winter 2027: Big on spectacle and on message", "url": "https://www.france24.com/en/tv-shows/fashion/20260720-haute-couture-fall-winter-2027-big-on-spectacle-and-on-message", "fonte_id": "france24", "data_pub": "2026-07-20T11:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Alta Costura da temporada outono/inverno de 2027 destaca-se por sua grandiosidade e mensagens poderosas. A coleção apresenta designs de Viktor & Rolf, Yuima Nakazato, Stéphane Rolland e Adeline André.", "titulo_pt": "Alta costura outono/inverno 2027: grande em espetáculo e mensagem", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 62238, "titulo": "La centroderecha francesa reajusta su estrategia frente al avance de Le Pen de cara a 2027", "url": "https://www.latercera.com/mundo/noticia/la-centroderecha-francesa-reajusta-su-estrategia-frente-al-avance-de-le-pen-de-cara-a-2027/", "fonte_id": "la_tercera", "data_pub": "2026-07-20T11:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O candidato centrista Édouard Philippe pretendesse explorar a 'irresponsabilidade fiscal' e as inconsistências do programa da Frente Nacional, liderada por Marine Le Pen, como parte de uma nova estratégia para as eleições de 2027.", "titulo_pt": "Centro-direita francesa ajusta estratégia diante do avanço de Le Pen para 2027", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 62082, "titulo": "Análise: Burnham é o 5º premiê em 4 anos — e agora tenta contrariar tendência no Reino Unido", "url": "https://www.bbc.com/portuguese/articles/c62v96ndnjvo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-20T10:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Burnham, que é o 5º premiê do Reino Unido em quatro anos, busca iniciar seu mandato de forma acelerada e manter a liderança característica adotada como prefeito de Manchester.", "titulo_pt": "Análise: burnham é o 5º premiê em 4 anos — e agora tenta contrariar tendência no Reino Unido", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 61989, "titulo": "Focus: mercado reduz previsão de inflação pela 3ª semana seguida", "url": "https://www.metropoles.com/brasil/focus-mercado-reduz-previsao-de-inflacao-pela-3a-semana-seguida", "fonte_id": "metropoles", "data_pub": "2026-07-20T11:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os analistas do mercado financeiro reduziram pela terceira semana consecutiva a previsão de inflação para 2026, estimando agora uma taxa de 5,15%.", "titulo_pt": "Focus: mercado reduz previsão de inflação pela 3ª semana seguida", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 62376, "titulo": "Oil prices erase gains after Iran says U.S. talks could be pursued based on national interests", "url": "https://www.cnbc.com/2026/07/20/oil-prices-today-brent-wti-crude-us-iran-centcom-hormuz.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-20T11:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Preços do petróleo perderam as ganhos após Irã dizer que conversas com EUA podem ser baseadas nos interesses nacionais. Forças americanas iniciaram o nono ataque noturno consecutivo contra alvos iranianos.", "titulo_pt": "Preços do petróleo perdem ganhos após Irã indicar que conversas com EUA poderiam ser baseadas em interesses nacionais", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 61966, "titulo": "Grupo de ‘óticas independentes’ busca enfrentar avanço de grandes redes", "url": "https://veja.abril.com.br/economia/grupo-de-oticas-independentes-busca-enfrentar-avanco-de-grandes-redes/", "fonte_id": "veja", "data_pub": "2026-07-20T11:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um grupo de 140 lojas de ótica, distribuídas em mais de dez estados, está buscando enfrentar o avanço das grandes redes de ópticas. A iniciativa visa unificar esforços e fortalecer a presença do setor independente.", "titulo_pt": "Grupo de ‘óticas independentes’ busca combater expansão de grandes redes", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 62438, "titulo": "Oil touches $90 as Iran hits tankers", "url": "https://www.ft.com/content/52e98fc4-32e3-4ed9-90fd-dcbba6188df5?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-20T11:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O preço do petróleo atingiu US$ 90 por barril devido a preocupações com perturbações na cadeia de suprimentos causadas pela Irã, que atacou navios-pipa. Mais tarde, o preço caiu após Teerã informar que recebeu propostas de mediadores sobre a guerra.", "titulo_pt": "Óleo toca us$ 90 após ataques da Irã a navios-pipa", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 62201, "titulo": "AliExpress fined record €550m by EU for failing to stop sale of illegal and fake goods", "url": "https://www.theguardian.com/business/2026/jul/20/aliexpress-fined-by-eu-sale-of-illegal-fake-goods", "fonte_id": "guardian_world", "data_pub": "2026-07-20T10:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A plataforma de comércio eletrônico chinesa AliExpress foi multada em um recorde de €550 milhões pela União Europeia por não ter impedido a venda de bens ilegais e falsificados, incluindo roupas perigosas, cosméticos e utensílios domésticos. Esta é a maior multa aplicada pelo bloco sob a Digital Services Act (DSA), que entrou em vigor em 2024 para proteger os consumidores de bens ilegais e técnicas publicitárias enganosas ou adictivas.", "titulo_pt": "Aliexpress é multado em €550 milhões pela ue por vender produtos ilegais", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 61971, "titulo": "Alerta no Crédito do Trabalhador: saúde financeira de 69% dos usuários está comprometida", "url": "https://veja.abril.com.br/economia/alerta-no-credito-do-trabalhador-saude-financeira-de-69-dos-usuarios-esta-comprometida/", "fonte_id": "veja", "data_pub": "2026-07-20T10:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um levantamento revelou que 69% dos usuários da nova linha de crédito privada estão com a saúde financeira comprometida. A facilidade no acesso ao dinheiro na folha gerou, porém, um aumento nas dívidas.", "titulo_pt": "Alerta na saúde financeira do Trabalhador: 69% dos usuários estão comprometidos", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 62379, "titulo": "U.S. Treasury yields edge higher as Wall Street monitors Middle East tensions", "url": "https://www.cnbc.com/2026/07/20/treasury-yields-wall-street-iran-war-tensions.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-20T10:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A taxa de juros do título do Tesouro dos Estados Unidos com vencimento em 10 anos subiu mais de 1 base ponto, atingindo 4,558%. Este é o principal indicador para empréstimos governamentais nos EUA.", "titulo_pt": "Taxa de juros do tesouro americano sobe ligeiramente enquanto Wall Street acompanha tensões no oriente médio", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 62032, "titulo": "Bolsas da Europa tentam recuperação de olho com EUA-Irã no radar", "url": "https://www.cnnbrasil.com.br/economia/mercado/bolsas-da-europa-tentam-recuperacao-de-olho-com-eua-ira-no-radar/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-20T10:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os mercados europeus buscam recuperação, monitorando negociações relacionadas às tensões entre EUA e Irã no Oriente Médio.", "titulo_pt": "Bolsas da Europa tentam recuperação de olho nas negociações EUA-Irã", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 61954, "titulo": "Beneficiários com NIS de final 1 recebem Bolsa Família de julho", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-07/beneficiarios-com-nis-de-final-1-recebem-bolsa-familia-de-julho", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-20T10:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Caixa Econômica Federal começou a pagar a parcela de julho do Bolsa Família. Os beneficiários com NIS final 1 estão recebendo o benefício nesta segunda-feira (20), em 175 municípios de seis estados brasileiros.", "titulo_pt": "Beneficiários com NIS final 1 recebem Bolsa Família de julho", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 62253, "titulo": "Tras dos bajas, bencinas volverían a subir $30 a fines de julio por escalada de la guerra en Medio Oriente", "url": "https://www.latercera.com/pulso/noticia/tras-dos-bajas-bencinas-volverian-a-subir-30-a-fines-de-julio-por-escalada-de-la-guerra-en-medio-oriente/", "fonte_id": "la_tercera", "data_pub": "2026-07-20T10:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Os economistas afirmam que é cedo para prever como estarão os preços de combustíveis em agosto, pois ainda não se sabe como o conflito no Oriente Médio evoluirá.", "titulo_pt": "Depois das baixas, preços da bencina voltariam a subir r$30 no final de julho por escalada do conflito no Oriente médio", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 62504, "titulo": "Hong Kong bourse operator weighs longer trading hours to sharpen hub edge, sources say", "url": "https://www.scmp.com/business/markets/article/3361218/hong-kong-bourse-operator-weighs-longer-trading-hours-sharpen-hub-edge-sources-say?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-20T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A operadora da bolsa de valores de Hong Kong, Hong Kong Exchanges and Clearing (HKEX), está considerando alongar as horas de negociação para se alinhar com movimentos de concorrentes globais e fortalecer a competitividade da cidade como centro financeiro internacional. A HKEX e a Comissão de Valores Mobiliários (SFC) confirmaram que estão discutindo o assunto, mas não forneceram detalhes.", "titulo_pt": "Operadora da bolsa de hong Kong considera alongar horário de negociação", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 62126, "titulo": "Receita Federal abre adesão a dois novos editais de transação tributária", "url": "https://www.jota.info/tributos/receita-federal-abre-adesao-a-dois-novos-editais-de-transacao-tributaria", "fonte_id": "jota", "data_pub": "2026-07-20T09:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Receita Federal abriu a adesão a dois novos editais de transação tributária que permitem negociação de débitos em contencioso administrativo, mas limitam o uso de prejuízo fiscal e base negativa da CSLL.", "titulo_pt": "Receita Federal abre adesão a dois novos programas de transação tributária", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 61925, "titulo": "Plano para gasolina com 35% de etanol avança; nova fase de testes está prevista para setembro", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/eduardosodre/2026/07/plano-para-gasolina-com-35-de-etanol-avanca-nova-fase-de-testes-esta-prevista-para-setembro.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-20T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O plano de aumentar o teor de etanol anidro na gasolina para 35%, criando o E35, continua em andamento. As próximas fases de testes devem começar em setembro e os critérios a serem adotados estão sendo discutidos.", "titulo_pt": "Plano para gasolina com 35% de etanol avança; nova fase de testes prevista para setembro", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 62387, "titulo": "China's car market heads for worst year since 2021 as sales plunge 20%", "url": "https://www.cnbc.com/2026/07/20/china-automotive-car-worst-year-sales-fall-20percent.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-20T08:43:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As vendas de carros na China registram uma queda de 20% no ano, o pior resultado desde 2021. O consumo de veículos diminuiu após um recorde de 23,7 milhões de unidades vendidas em 2025.", "titulo_pt": "Mercado de carros da china enfrenta pior ano desde 2021 com queda de 20% nas vendas", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 62127, "titulo": "Tributar o céu tem um preço", "url": "https://www.jota.info/opiniao-e-analise/artigos/tributar-o-ceu-tem-um-preco", "fonte_id": "jota", "data_pub": "2026-07-20T08:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O investimento está sendo paralisado não apenas pela conta final do tributo sobre o uso da água subterrânea, mas também pela incerteza associada a essa conta.", "titulo_pt": "Taxar o céu tem um custo", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 62128, "titulo": "O ESG na era omnibus da União Europeia", "url": "https://www.jota.info/opiniao-e-analise/colunas/praticas-esg/o-esg-na-era-omnibus-da-uniao-europeia", "fonte_id": "jota", "data_pub": "2026-07-20T08:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A União Europeia está avançando para uma governança mais robusta em sustentabilidade, mas as alterações legislativas podem se tornar um obstáculo.", "titulo_pt": "ESG na era omnibus da União Europeia", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 62587, "titulo": "(2nd LD) Coupang warehouse blaze brought under initial control", "url": "https://en.yna.co.kr/view/AEN20260720000452315", "fonte_id": "yonhap_news", "data_pub": "2026-07-20T11:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio em um depósito da Coupang foi controlado inicialmente. O incidente ocorreu em Incheon, Coreia do Sul, no dia 20 de julho.", "titulo_pt": "Incêndio em depósito da Coupang sob controle inicial", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 62529, "titulo": "AliExpress fined almost $630 million over illegal product sales", "url": "https://www.theverge.com/policy/967802/aliexpress-eu-dsa-fine-illegal-products", "fonte_id": "the_verge", "data_pub": "2026-07-20T11:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "AliExpress foi multado em cerca de 629 milhões de dólares por violar as regras da Digital Services Act (DSA) da Europa, que exigem a plataforma evitar o comércio ilegal e de produtos falsificados. A Comissão Europeia determinou que AliExpress não tomou medidas eficazes para reduzir a disseminação desses produtos.", "titulo_pt": "Aliexpress multado quase 630 milhões por vendas ilegais", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 62582, "titulo": "A Beginner’s Guide to Growing Mushrooms at Home (2026)", "url": "https://www.wired.com/story/mushroom-growing-methods/", "fonte_id": "wired", "data_pub": "2026-07-20T10:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O autor passou um ano testando diferentes métodos populares para cultivar cogumelos em casa, desde kits de bancada até uma balde no banheiro cheio de palha. Alguns métodos produziram cogumelos, enquanto outros apenas geraram mofo.", "titulo_pt": "Guia inicial para cultivar cogumelos em casa", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 62530, "titulo": "China delivers a one-two punch to America’s AI dominance", "url": "https://www.theverge.com/ai-artificial-intelligence/967781/chinese-ai-models-open-source-moonshot-kimi-k3-alibaba-qwen", "fonte_id": "the_verge", "data_pub": "2026-07-20T10:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As empresas chinesas de IA, como Moonshot e Alibaba, estão lançando modelos que competem com os melhores do OpenAI e Anthropic, oferecendo uma opção mais barata. Esses lançamentos rápidos sugerem que a vantagem dos EUA na fronteira da IA está se tornando cada vez menor.", "titulo_pt": "China dá um golpe duplo no domínio de IA dos EUA", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 62583, "titulo": "An Ebike Company Was Sued for Misleading Info on Safety. It Points to a Big Problem", "url": "https://www.wired.com/story/an-ebike-company-was-sued-for-misleading-on-safety-it-points-to-a-big-problem/", "fonte_id": "wired", "data_pub": "2026-07-20T10:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Várias empresas chinesas ligadas à marca de bicicletas elétricas Aipas concordaram com um acordo judicial com a Amazon e a empresa de certificação de segurança UL em julho.", "titulo_pt": "Empresa de bicicleta elétrica foi sujeita a ação por informações mentirosas sobre segurança", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 61972, "titulo": "A farmacêutica que virou referência mundial em IA sem querer ficar rica", "url": "https://veja.abril.com.br/coluna/planeta-ia/a-farmaceutica-que-virou-referencia-mundial-em-ia-sem-querer-ficar-rica/", "fonte_id": "veja", "data_pub": "2026-07-20T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ana Helena Ulbrich, co-criadora de um algoritmo que revisa receitas médicas, relata como e por que ela decidiu fornecer a tecnologia gratuitamente para o Sistema Único de Saúde (SUS).", "titulo_pt": "A farmacêutica que virou referência mundial em IA sem querer ficar rica", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 62256, "titulo": "Christopher Nolan y La Odisea: “Este poema aún fascina porque nuestras preocupaciones humanas no han cambiado tanto”", "url": "https://www.latercera.com/culto/noticia/christopher-nolan-y-la-odisea-este-poema-aun-fascina-porque-nuestras-preocupaciones-humanas-no-han-cambiado-tanto/", "fonte_id": "la_tercera", "data_pub": "2026-07-20T10:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Christopher Nolan, diretor britânico, conversou com RFI sobre sua abordagem para adaptar a Odisséia, usando uma 'textura realista' e tecnologia IMAX. A versão já está disponível nas salas de cinema chilenas.", "titulo_pt": "Christopher Nolan e a odisséia: ‘este poema ainda fascina por causa das nossas preocupações humanas não terem mudado tanto’", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 62502, "titulo": "China’s EV industry rose with the aid of tax breaks. What happens when they end?", "url": "https://www.scmp.com/economy/china-economy/article/3361207/chinas-ev-industry-rose-aid-tax-breaks-what-happens-when-they-end?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-20T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A China está eliminando isenções fiscais que ajudaram a impulsionar o crescimento de sua indústria de veículos elétricos (VE) e solar, o que pode aumentar os custos de produção de um VE em cerca de 1.000 yuan (US$147), pressionando as margens já estreitas das fabricantes. Com isso, Pequim intensifica esforços para combater a sobreprodução e as guerras de preços.", "titulo_pt": "China encerra incentivos fiscais para veículos elétricos e solar: o que vem depois?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 62584, "titulo": "The ACLU Is Arming Lawyers to Expose State Surveillance Secrets", "url": "https://www.wired.com/story/the-aclu-is-arming-lawyers-to-expose-state-surveillance-secrets/", "fonte_id": "wired", "data_pub": "2026-07-20T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O ACLE fornece um novo conjunto de ferramentas para advogados no Massachusetts que visam as tecnologias policiais usadas e escondidas para construir casos criminais, incluindo reconhecimento facial e relatórios policiais escritos por inteligência artificial.", "titulo_pt": "Acle arma advogados para revelar segredos de vigilância estatal", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 62585, "titulo": "Elite Young Runners Are Becoming Freakishly Fast. Welcome to ‘Trackflation’", "url": "https://www.wired.com/story/teenagers-running-trackflation/", "fonte_id": "wired", "data_pub": "2026-07-20T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Tempos de milha em menos de quatro minutos são comuns agora. Jovens e adolescentes estão superando corredores universitários, indicando um boom nas atividades de atletismo para jovens.", "titulo_pt": "Jovens corredores estão tornando-se incrivelmente rápidos. Bem-vindo ao 'Trackflation'", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 62377, "titulo": "Bezos backs CuspAI as startup teams up with Nvidia to hunt for chipmaking materials", "url": "https://www.cnbc.com/2026/07/20/bezos-cuspai-new-chip-materials-nvidia.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-20T09:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "CuspAI é parte de uma nova onda de empresas que buscam usar IA para resolver desafios no mundo físico. A startup está trabalhando com a Nvidia para encontrar materiais para produção de chips.", "titulo_pt": "Bezos apoia CuspAI enquanto startup se associa à Nvidia em busca de materiais para fabricação de chips", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 62321, "titulo": "How AI is supercharging drug development", "url": "https://www.axios.com/2026/07/20/artificial-intelligence-drug-development-impact", "fonte_id": "axios", "data_pub": "2026-07-20T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A inteligência artificial está acelerando significativamente o desenvolvimento de medicamentos, com um levantamento privado mostrando como ela está impulsionando a automação em pesquisas iniciais da indústria farmacêutica. Segundo uma pesquisa da TD Cowen com 80 líderes e insider do setor biofarmacêutico, o uso de AI reduz os custos pré-clínicos e as linhas temporais dos desenvolvedores em até 70%, estimulando a demanda por software avançado, ferramentas de sequenciamento e modelos computacionais para a produção de tratamentos experimentais nos próximos cinco anos.", "titulo_pt": "Como a IA está potencializando o desenvolvimento de medicamentos", "veiculo": "Axios", "pais": "EUA", "classe": "B"}, {"id": 62586, "titulo": "Apps Marketed to US Troops Are Shipping Chinese and Russian Code", "url": "https://www.wired.com/story/apps-marketed-to-us-troops-are-shipping-chinese-and-russian-code/", "fonte_id": "wired", "data_pub": "2026-07-20T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma análise inédita descobriu que mais de um em cada oito apps desenvolvidos para membros dos serviços militares americanos contêm código estrangeiro, incluindo empresas de países designados pelo Pentágono como adversários.", "titulo_pt": "Apps para tropas americanas estariam enviando código chinês e russo", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 62557, "titulo": "China's AI smartphone race pits ZTE, StepFun, and Honor against limits of agentic computing", "url": "https://www.digitimes.com/news/a20260720VL210/china-ai-agent-smartphone-waic-honor-zte.html", "fonte_id": "digitimes", "data_pub": "2026-07-20T08:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A indústria de smartphones chinesa está incorporando a inteligência artificial agente como sua próxima narrativa de crescimento, com ZTE (Nubia), StepFun e Honor apresentando visões distintas sobre como os telefones devem planejar tarefas, coordenar aplicativos e processar dados pessoais.", "titulo_pt": "Corrida chinesa de smartphones com IA agente coloca ZTE, StepFun e Honor contra as limitações da computação agente", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 62521, "titulo": "AI is more likely than humans to form biases when hiring", "url": "https://www.technologyreview.com/2026/07/20/1140655/ai-biases-hiring-humans/", "fonte_id": "mit_tech_review", "data_pub": "2026-07-20T08:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Estudos mostram que os modelos de inteligência artificial podem desenvolver suas próprias tendências de preconceito além dos vieses humanos adquiridos através dos dados de treinamento. Isso pode ocorrer durante o processo de seleção de currículos para vagas de emprego.", "titulo_pt": "A IA é mais propensa do que os humanos a formar vieses na contratação", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 62131, "titulo": "A confiança na era digital: uma herança sem testamento?", "url": "https://www.jota.info/opiniao-e-analise/colunas/advogadas-publicas-em-debate/a-confianca-na-era-digital-uma-heranca-sem-testamento", "fonte_id": "jota", "data_pub": "2026-07-20T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A confiança na era digital é um tema abordado, destacando a importância de manter os vínculos humanos frente às disruptivas mudanças tecnológicas.", "titulo_pt": "A confiança na era digital: uma herança sem testamento?", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 62532, "titulo": "Singer-actress IU cancels concert, postpones album release due to worsened ear disorder", "url": "https://www.koreaherald.com/article/10814152", "fonte_id": "korea_herald", "data_pub": "2026-07-20T11:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A cantora e atriz IU cancelou seu show programado para setembro na cidade de Goyang e adiou o lançamento do novo álbum devido a uma piora no transtorno do tubo estacioso. Segundo ela, a decisão foi tomada após consultar profissionais médicos devido aos sintomas crônicos da patologia.", "titulo_pt": "A artista IU cancela show e adia lançamento de álbum devido a piora em problema auditivo", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 62610, "titulo": "Burnout isn't new: 18th‑century farm records show workers describing the same exhaustion", "url": "https://phys.org/news/2026-07-burnout-isnt-18thcentury-farm-workers.html", "fonte_id": "phys_org", "data_pub": "2026-07-20T11:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo com registros agrícolas do século XVIII demonstra que a sensação de esgotamento não é uma inovação recente. Cerca de 40% dos trabalhadores canadenses relatam sentir-se constantemente ou sempre esgotados, conforme um levantamento realizado em 2025 pela Mental Health Research Canada e Canada Life.", "titulo_pt": "Esgotamento não é novidade: registros agrícolas do século xviii mostram trabalhadores descrevendo a mesma exaustão", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 62497, "titulo": "‘Systemic leap’: China’s drug innovation push yields bumper crop", "url": "https://www.scmp.com/business/china-business/article/3361181/systemic-leap-chinas-drug-innovation-push-yields-bumper-crop?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-20T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 2023, mais de 80% dos novos medicamentos aprovados no mercado chinês foram desenvolvidos localmente. Foram aprovados 38 novos medicamentos no primeiro semestre, sendo que 31 são produtos nacionais.", "titulo_pt": "Passo sistêmico: avanço na inovação farmacêutica chinesa", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 62611, "titulo": "On the hunt for Earth's first complex life", "url": "https://phys.org/news/2026-07-earth-complex-life.html", "fonte_id": "phys_org", "data_pub": "2026-07-20T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A busca pela primeira vida complexa na Terra é considerada tão importante para a astrobiologia quanto o descobrimento de vida em outros planetas distantes. A maioria da história biológica da Terra (90%) foi dominada por microorganismos.", "titulo_pt": "Na caça à primeira vida complexa na terra", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 62605, "titulo": "STAT+: Bristol Myers Squibb becomes latest company to claim it’s building pharma’s largest NVIDIA AI supercomputer", "url": "https://www.statnews.com/2026/07/20/bms-nvidia-assembling-largest-pharma-ai-supercomputer/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-20T10:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Bristol Myers Squibb se juntou a outras duas farmacêuticas nos últimos nove meses ao anunciar a construção do maior supercomputador de inteligência artificial na indústria farmacêutica.", "titulo_pt": "Bristol Myers Squibb se torna a última farmacêutica a construir o maior supercomputador de IA da indústria farmacêutica", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 62471, "titulo": "Researchers find tiny marine ecosystem — population 307 — in a bottle cap", "url": "https://www.japantimes.co.jp/news/2026/07/20/japan/tiny-ecosystem-bottle-cap/", "fonte_id": "japan_times", "data_pub": "2026-07-20T10:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de pesquisadores japoneses descobriu um pequeno ecossistema marinho, com uma população de 307 organismos, dentro de uma tampinha de garrafa. A pesquisa demonstra que grande quantidade de resíduos plásticos flutuantes no oceano podem se tornar veículos para a vida marinha.", "titulo_pt": "Pesquisadores encontram pequeno ecossistema marinho — população 307 — em uma tampinha de garrafa", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 62612, "titulo": "Africa's wildfire season is actually getting shorter, scientists think they know why", "url": "https://phys.org/news/2026-07-africa-wildfire-season-shorter-scientists.html", "fonte_id": "phys_org", "data_pub": "2026-07-20T10:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A África é responsável por cerca de 70% da área queimaada do mundo anualmente, tornando-a o principal foco mundial de incêndios florestais. No entanto, observações por satélite mostram uma tendência inesperada nos últimos vinte anos: a área de terra queimada na África tem diminuído gradualmente.", "titulo_pt": "A temporada de incêndios na áfrica está ficando mais curta, cientistas suspeitam do motivo", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 62250, "titulo": "Científicos desarrollan un tratamiento con azúcar contra la forma más agresiva de cáncer cerebral", "url": "https://www.latercera.com/tendencias/noticia/cientificos-desarrollan-un-tratamiento-con-azucar-contra-la-forma-mas-agresiva-de-cancer-cerebral/", "fonte_id": "la_tercera", "data_pub": "2026-07-20T10:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Cientistas utilizaram um tipo de açúcar em experimentos com ratos e observaram um aumento médio de 50% na sobrevivência. Os resultados podem contribuir para o desenvolvimento de novos tratamentos contra o glioblastoma, uma forma agressiva de câncer cerebral.", "titulo_pt": "Cientistas desenvolvem tratamento com açúcar contra a forma mais agressiva de câncer cerebral", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 62613, "titulo": "How to keep the air inside your home clean during wildfires", "url": "https://phys.org/news/2026-07-air-home-wildfires.html", "fonte_id": "phys_org", "data_pub": "2026-07-20T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A poluição do ar causada por incêndios florestais pode ser assustadora, mas o principal risco não é visível e está relacionado à qualidade do ar respirável dentro das residências.", "titulo_pt": "Como manter o ar da sua casa limpo durante incêndios florestais", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 62645, "titulo": "An artificial 'Saturn's ring' of satellites could soon fill the sky, astronomers warn", "url": "https://www.space.com/space-exploration/satellites/an-artificial-saturns-ring-of-satellites-could-soon-fill-the-sky-astronomers-warn", "fonte_id": "space_com", "data_pub": "2026-07-20T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Astrônomos alertam que, se os planos para lançar um milhão de centros de dados orbitais e dezenas de milhares de espelhos espaciais forem realizados, uma faixa brilhante de satélites poderá circundar a Terra, similar aos anéis de Saturno.", "titulo_pt": "Um 'anel de saturno' artificial de satélites pode soon preencher o céu, advertem astrônomos", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 62614, "titulo": "Greece braces for year's first heat wave", "url": "https://phys.org/news/2026-07-greece-braces-year.html", "fonte_id": "phys_org", "data_pub": "2026-07-20T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Grécia está se preparando para sua primeira onda de calor do ano, após escapar da heat wave extremamente quente que atingiu a maioria da Europa em junho.", "titulo_pt": "Grécia se prepara para a primeira onda de calor do ano", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 61924, "titulo": "Preferência por ser destro surgiu há 550 milhões de anos, sugere análise de fósseis", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/preferencia-por-ser-destro-surgiu-ha-550-milhoes-de-anos-sugere-analise-de-fosseis.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-20T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo de fósseis do sul da Austrália indica que a preferência por ser destro tem existido há mais de 550 milhões de anos. Cerca de 90% das pessoas são atualmente destros, mas esta característica não é recente.", "titulo_pt": "Preferência por ser destro surgiu há 550 milhões de anos, sugere análise de fósseis", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 62616, "titulo": "AI tool reveals climate shifts may have fueled bursts of bird evolution", "url": "https://phys.org/news/2026-07-ai-tool-reveals-climate-shifts.html", "fonte_id": "phys_org", "data_pub": "2026-07-20T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores da Universidade do Michigan utilizaram uma ferramenta de inteligência artificial para mostrar que as aves do grupo Passeriformes evoluíram em pulsos rápidos e frequentemente coincidiram com mudanças climáticas ao longo da história geológica da Terra.", "titulo_pt": "Ferramenta de IA revela que mudanças climáticas podem ter impulsionado explosões evolutivas de pássaros", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 62617, "titulo": "Scientists map how the flu virus rewires the human cell from the inside", "url": "https://phys.org/news/2026-07-scientists-flu-virus-rewires-human.html", "fonte_id": "phys_org", "data_pub": "2026-07-20T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas do EMBL Hamburg e colaboradores do Leibniz Research Institute for Molecular Pharmacology mapearam com detalhes inéditos como o vírus da gripe A reconfigura as células humanas infectadas. Para isso, os pesquisadores utilizaram um fluxo de trabalho experimental personalizado para observar diretamente como proteínas interagem dentro das células infectadas intactas.", "titulo_pt": "Cientistas mapeiam como vírus da gripe reconfigura células humanas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 62606, "titulo": "Opinion: It’s time to treat pandemics as threats to national security", "url": "https://www.statnews.com/2026/07/20/pandemics-national-security-threats/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-20T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "David Blumenthal e James A. Morone argumentam que pandemias devem ser vistas e combatidas como ameaças à segurança nacional.", "titulo_pt": "É hora de considerar pandemias como ameaças à segurança nacional", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 62607, "titulo": "STAT+: State audit of Medicaid records points to methods used by PBMs to obscure drug costs", "url": "https://www.statnews.com/pharmalot/2026/07/20/iowa-medicaid-pbm-audit-circumvention-spread-pricing-ban/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-20T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma auditoria nos registros do Medicaid estatal revelou táticas complexas empregadas por administradoras de planos de saúde (PBMs) para processar reivindicações de medicamentos que, no final, resultam em sobrecustos aos contribuintes.", "titulo_pt": "Auditoria dos registros do Medicaid aponta métodos usados por PBMs para obscurecer custos de medicamentos", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 62499, "titulo": "Hong Kong Palace Museum partners with Uzbek cultural centre for future projects", "url": "https://www.scmp.com/news/hong-kong/society/article/3361228/hong-kong-palace-museum-partners-uzbek-cultural-centre-future-projects?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-20T10:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Museu Real de Hong Kong assinou um acordo com o Centro da Civilização Islâmica do Uzbekistão para colaborar em futuras exposições, pesquisas acadêmicas e outros projetos. Esta parceria marca a primeira visita oficial recíproca de uma instituição cultural da Ásia Central desde a delegação liderada pelo Chefe do Executivo John Lee Ka-chiu ao região.", "titulo_pt": "Museu real de hong Kong se associa com centro cultural uzbeco para projetos futuros", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 62629, "titulo": "YN Studio extends London home around light-filled stairwell", "url": "https://www.dezeen.com/2026/07/20/yn-studio-tile-house/", "fonte_id": "dezeen", "data_pub": "2026-07-20T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "YN Studio expandiu e atualizou uma casa térrea vitoriana em Londres, chamada Tile House, com uma extensão dormer revestida com tacos de plástico reciclado que imitam pedra natural. O projeto contrasta um exterior escuro e revestido de tacos com um interior mais contemporâneo.", "titulo_pt": "YN Studio expande casa londrina com extensão dormer revestida em plástico reciclado", "veiculo": "Dezeen (design e arquitetura)", "pais": "Reino Unido", "classe": "B"}, {"id": 62665, "titulo": "Lit Hub Daily: July 20, 2026", "url": "https://lithub.com/lit-hub-daily-july-20-2026/", "fonte_id": "lithub", "data_pub": "2026-07-20T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A autora Fiona Sampson escreve sobre sua experiência de tentar obter a cidadania grega, uma tarefa que tem sido um processo prolongado. Ela explora o significado dessa busca em meio ao luto familiar.", "titulo_pt": "Fiona sampson sobre a busca pela cidadania grega e os laços familiares", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 62663, "titulo": "The Skinner revolution", "url": "https://aeon.co/videos/how-bf-skinner-upended-our-understanding-of-behaviour-and-control", "fonte_id": "aeon", "data_pub": "2026-07-20T10:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O documentário de 1979 examina a vida e as ideias de B.F. Skinner, com foco em seus experimentos comportamentais radicais e controversos.", "titulo_pt": "A revolução de Skinner", "veiculo": "Aeon Magazine", "pais": "Reino Unido", "classe": "A"}, {"id": 61917, "titulo": "Dua Lipa abre biblioteca em Portugal em defesa da liberdade de expre um ambiente familiar relaxado. Xu Yifang, que concluiu o ensino médio na Escola Secundária Xuchang no centro da província de Henan neste verão.", "titulo_pt": "Aluna chinesa aceita em universidade top sem aulas extras causa debate", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 62628, "titulo": "A Stolen Dove Takes Flight Again", "url": "https://hyperallergic.com/7/", "fonte_id": "hyperallergic", "data_pub": "2026-07-20T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma obra de arte participativa homenageia Alex Odeh, os mundos alegremente sinistros de Trevor Winkfield e questiona por que Zendaya está usando artefatos iranianos com 3.000 anos.", "titulo_pt": "A pombinha roubada vai voar novamente", "veiculo": "Hyperallergic (arte)", "pais": "EUA", "classe": "B"}, {"id": 62630, "titulo": "Andrea Ferro photographs Dakar's under-threat bubble houses", "url": "https://www.dezeen.com/2026/07/20/dakar-bubble-houses-andrea-ferro/", "fonte_id": "dezeen", "data_pub": "2026-07-20T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O fotógrafo italiano Andrea Ferro registrou as últimas moradias de domo dos anos 1950 em Dakar, Senegal, antes da sua possível demolição. Ferro capturou essas casas concretas em forma de bolha para mostrar suas formas únicas e oferecer uma visão do cotidiano nelas.", "titulo_pt": "Andrea Ferro fotografa moradias de domo ameaçadas em Dakar", "veiculo": "Dezeen (design e arquitetura)", "pais": "Reino Unido", "classe": "B"}, {"id": 62638, "titulo": "Acting the fool: why have Hollywood press tours become so gimmicky?", "url": "https://www.theguardian.com/film/2026/jul/20/hollywood-press-tours-gimmicky", "fonte_id": "guardian_culture", "data_pub": "2026-07-20T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Hollywood tem realizado turnês promocionais mais engenhosas este verão, com estrelas de primeira linha participando de atividades como o 'Jogo da Verdade' e a classificação de guloseimas. Essa abordagem engraçada acompanha as entrevistas e insights sobre novos filmes dirigidos por Steven Spielberg e Christopher Nolan.", "titulo_pt": "Atuando como bobo: por que as turnês promocionais do Hollywood se tornaram tão engenhosas?", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 62656, "titulo": "In the burgeoning Nigerian animation industry, these creatives are turning myth, memory and mischief into moving image", "url": "https://www.itsnicethat.com/articles/the-view-from-lagos-nigerian-animation-200726", "fonte_id": "its_nice_that", "data_pub": "2026-07-20T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Criadores na indústria de animação nigeriana estão transformando mitos, memórias e malícias em imagens em movimento, desde jingles da NTA e anúncios de sabonete em stop-motion até a animação Iwájú de Lagos, Disney, e uma nova onda de histórias espíritas.", "titulo_pt": "Na emergente indústria de animação nigeriana, esses criativos estão transformando mito, memória e malícia em imagens em movimento", "veiculo": "It's Nice That", "pais": "Reino Unido", "classe": "B"}, {"id": 62508, "titulo": "Can Hong Kong ‘mega’ arts event HKPAX 2026 meet targets in tough economic times?", "url": "https://www.scmp.com/lifestyle/arts/article/3361151/can-hong-kong-mega-arts-event-hkpax-2026-meet-targets-tough-economic-times?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-20T09:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O evento de Artes Performáticas de Hong Kong (HKPAX), um evento bilanual com duração de cinco dias e orçamento de 40 milhões de HKD, planejado para outubro de 2026, está reduzindo preços de ingressos e diversificando o programa para atrair público em tempos econômicos difíceis. O evento visa manter os números de delegados de dois anos atrás sem aumentar o orçamento.", "titulo_pt": "HKPAX 2026: evento de artes pode atingir metas em tempos econômicos desafiadores?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 62666, "titulo": "This Week in Literary History: O. Henry is Released from Prison", "url": "https://lithub.com/this-week-in-literary-history-o-henry-is-released-from-prison/", "fonte_id": "lithub", "data_pub": "2026-07-20T09:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O. Henry, cujo nome real era William Sydney Porter e que escreveu 'A Magia dos Presentes', foi libertado da prisão. Ele era um dos escritores de contos mais celebrados de sua geração.", "titulo_pt": "Esta semana na história literária: o. Henry é libertado da prisão", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 62667, "titulo": "A Dialogue With the Facts: On Writing Literary Biography in a Post-Truth Age", "url": "https://lithub.com/a-dialogue-with-the-facts-on-writing-literary-biography-in-a-post-truth-age/", "fonte_id": "lithub", "data_pub": "2026-07-20T09:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O texto questiona a origem da 'literariedade' na biografia literária, ponderando se ela pertence ao tema do livro ou à sua autora. Tradicionalmente, essa característica é atribuída tanto ao sujeito quanto ao autor do texto.", "titulo_pt": "Um diálogo com os fatos: sobre a escrita de biografias literárias em uma era pós-verdade", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 62668, "titulo": "The Old Streets of Athens: On Living and Dying Away From One’s Homeland", "url": "https://lithub.com/the-old-streets-of-athens-on-living-and-dying-away-from-ones-homeland/", "fonte_id": "lithub", "data_pub": "2026-07-20T09:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O texto cita duas passagens poéticas que exploram a nostalgia e a memória de lugares perdidos, uma de Etel Adnan sobre rios desaparecidos e outra de Phoebe Giannisi sobre pedras ao longo do rio acordando com a luz da manhã.", "titulo_pt": "As ruas velhas de atenas: sobre viver e morrer longe do lar", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 61918, "titulo": "Após boa audiência, Globo aumenta Chef de Alto Nível e dá mais destaque a Ana Maria Braga", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/07/apos-boa-audiencia-globo-aumenta-chef-de-alto-nivel-e-da-mais-destaque-a-ana-maria-braga.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-20T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Globo aumentou o número de episódios do Chef de Alto Nível, reality show comandado por Ana Maria Braga, para a próxima temporada. A apresentadora terá mais participação na atração que será exibida em horário nobre.", "titulo_pt": "Globo amplia Chef de Alto Nível e dá mais destaque a Ana Maria Braga", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}], "cultura__eventos": [], "sociedade": [{"id": 61990, "titulo": "Caso Helena: mãe consegue protetiva após ataques e ameaça de facções", "url": "https://www.metropoles.com/distrito-federal/na-mira/caso-helena-mae-consegue-protetiva-apos-ataques-e-ameaca-de-faccoes", "fonte_id": "metropoles", "data_pub": "2026-07-20T11:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A mãe obteve uma medida protetiva após relatos de ataques e ameaças por parte de facções. Um laudo constatou que a bebê não sofreu violência sexual, mas o documento do hospital indicou lesões anal.", "titulo_pt": "Caso Helena: mãe obtém medida protetiva após ataques e ameaças de facções", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 61992, "titulo": "GDF sanciona lei que permite \"internação humanizada involuntária\"", "url": "https://www.metropoles.com/distrito-federal/gdf-sanciona-lei-que-permite-internacao-humanizada-involuntaria", "fonte_id": "metropoles", "data_pub": "2026-07-20T11:30:00Z", "id
