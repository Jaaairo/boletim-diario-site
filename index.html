<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>
</head>

<script>
const D = {"gerado_em": "21/06/2026 18:14", "stats": {"noticias_total": 9369, "resumos_total": 1652, "sem_topico": 0, "ultima_coleta": "2026-06-21T20:38:11Z"}, "rotulos_topico": {"politica_nacional": "Política Nacional", "politica_internacional": "Política Internacional", "cultura": "Cultura", "ciencia_tecnologia": "Ciência & Tecnologia"}, "topicos": ["politica_nacional", "politica_internacional", "cultura", "ciencia_tecnologia"], "sinteses": {"ciencia_tecnologia": "O Telescópio Espacial James Webb identificou o que pode ser um precursor de aglomerados de galáxias atuais, segundo dois estudos publicados em 21 de junho de 2026. Astrônomos internacionais utilizaram dados do telescópio para realizar as pesquisas.  Em outro estudo, cientistas descobriram que os níveis de testosterona aumentam ou se estabilizam em pessoas que tomam medicamentos GLP-1, embora mais pesquisas sejam necessárias para confirmar os resultados. A experiência de interagir com polvos é comparada à de se deparar com seres alienígenas devido à sua biologia única, como discutido no artigo 'Interagir com um polvo é como encontrar uma inteligência alienígena'.  Pesquisadores brasileiros mapearam a perda do canto dos grilos ao longo da evolução, indicando que desafios evolutivos estão levando alguns grilos a se tornarem mais discretos ou totalmente silenciosos. A Samsung Electronics Co. discutiu maneiras de expandir as vendas de memória HBM e a possibilidade de firmar acordos a longo prazo com seus clientes mais importantes.", "cultura": "A terceira temporada de 'A Casa do Dragão' estreia neste domingo (21), após dois anos de pausa. A série, parte do universo de 'Game of Thrones', pode ser confusa para os fãs por conta dos diversos reis, rainhas, lordes e cavaleiros.  Taís Araújo irá apresentar novas temporadas da peça 'Mudando de Pele' em São Paulo. Após o sucesso da temporada no Sesc 14 Bis, a atriz estreará no Teatro Faap em 13 de agosto. A cantora Dua Lipa divulgou fotos do seu casamento com o ator  na grade curricular da educação básica. As matérias relacionadas à educação política serão parte do ensino fundamental e médio a partir de agora.  Em outro evento político, Marina Silva (Rede) e Márcio França (PSB) se encontraram em um evento em São Paulo. Apesar de ambos buscarem uma vaga no Senado por São Paulo, os ex-ministros trocaram elogios durante o evento. O prefeito de São Paulo, Ricardo Nunes (MDB), contribuiu para três temas do plano de governo de Flávio Bolsonaro (PL) para a pré-candidatura à Presidência da República: transporte, segurança alimentar e segurança pública.  Nunes também está colaborando com as pré-campanhas de Tarcísio de Freitas. Paulo Serra (PSDB), presidente estadual do PSDB e ex-prefeito de Santo André, anunciou que não buscará mais o governo de São Paulo nas eleições deste ano. Ele irá concorrer à uma cadeira na Câmara dos Deputados federal. O presidente da Câmara, Arthur Lira, teria parado o andamento de um recurso apresentado por bolsonaristas que foram excluídos do grupo de trabalho sobre a reforma tributária.  A decisão se deu por temor de uma derrota na Comissão de Constituição e Justiça (CCJ), o que poderia desmoralizar a imagem de Lira."}, "resumo_do_dia": {"politica_nacional": [{"id": 9072, "titulo": "A hipocrisia de PT e PL ao defender a criação da CPMI do Master", "url": "https://veja.abril.com.br/politica/a-hipocrisia-de-pt-e-pl-ao-defender-a-criacao-da-cpmi-do-master/", "fonte_id": "veja", "data_pub": "2026-06-21T20:38:00Z", "idioma": "pt", "texto_pt": "Partidos políticos reagiram às suspeitas contra Flávio Bolsonaro e Jacques Wagner pedindo um inquérito parlamentar.  Alguns partidos manifestaram interesse em uma Comissão Parlamentar de Inquérito (CPMI) para investigar o caso, apesar de não demonstrarem real interesse na investigação.", "titulo_pt": "A hipocrisia do PT e do PL ao defender a criação da CPMI do Master", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 9116, "titulo": "Pressão por renúncia de Starmer no Reino Unido cresce; Trump diz que premiê falhou", "url": "https://www.infomoney.com.br/mundo/pressao-renuncia-starmer-reino-unido/", "fonte_id": "infomoney", "data_pub": "2026-06-21T20:38:00Z", "idioma": "pt", "texto_pt": "Existe expectativa de que o primeiro-ministro do Reino Unido, Starmer, anuncie um cronograma para sua renúncia na segunda-feira (22). Donald Trump afirmou que Starmer foi um fracasso como premiê.", "titulo_pt": "Pressão por renúncia de Starmer no Reino Unido cresce; Trump diz que premiê falhou", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 9090, "titulo": "Atraso no TSE deixa eleição de Roraima sob impasse jurídico", "url": "https://www.poder360.com.br/poder-eleicoes/atraso-no-tse-deixa-eleicao-de-roraima-sob-impasse-juridico/", "fonte_id": "poder360", "data_pub": "2026-06-21T20:37:00Z", "idioma": "pt", "texto_pt": "O processo que cassou a chapa Denarium-Damião saiu da pauta em 2024 e só foi concluído em 2026. O atraso encurtou o calendário eleitoral e gerou uma disputa sobre a decisão do STF.", "titulo_pt": "Atraso no TSE deixa eleição de Roraima em impasse jurídico", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 9165, "titulo": "Por que o nome de uma síndrome que afeta mais de 170 milhões de mulheres no mundo foi mudado", "url": "https://www.bbc.com/portuguese/articles/cz0jymx4z97o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-21T20:35:00Z", "idioma": "pt", "texto_pt": "O nome de uma doença antiga foi alterado para refletir melhor sua natureza. A condição agora é conhecida como uma síndrome multissistêmica, que afeta mais de 170 milhões de mulheres globalmente.", "titulo_pt": "Por que o nome de uma síndrome que afeta mais de 170 milhões de mulheres no mundo foi mudado", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 9091, "titulo": "Após pausa de 2 anos, Rebeca Andrade leva ouro no Pan do Rio", "url": "https://www.poder360.com.br/poder-sportsmkt/apos-pausa-de-2-anos-rebeca-andrade-leva-ouro-no-pan-do-rio/", "fonte_id": "poder360", "data_pub": "2026-06-21T20:22:00Z", "idioma": "pt", "texto_pt": "Rebeca Andrade conquistou o ouro na ginástica artística do Pan-Americano no Rio de Janeiro. A equipe brasileira de ginástica também ganhou seis medalhas adicionais, incluindo uma prata de Diego Soares na barra fixa.", "titulo_pt": "Após pausa de 2 anos, Rebeca Andrade conquista ouro no Pan do Rio", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 9127, "titulo": "Paulo Serra desiste de disputar governo de SP", "url": "https://www.cnnbrasil.com.br/eleicoes/paulo-serra-desiste-de-disputar-governo-de-sp/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-21T20:16:00Z", "idioma": "pt", "texto_pt": "O ex-prefeito de Santo André, Paulo Serra, anunciou que não irá disputar o governo do estado de São Paulo. Ele declarou sua pré-candidatura para deputado federal.", "titulo_pt": "Paulo Serra desiste de candidatura ao governo de SP", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 9067, "titulo": "Rebeca Andrade volta com ouro no Pan de ginástica artística", "url": "https://www.cartacapital.com.br/esporte/rebeca-andrade-volta-com-ouro-no-pan-de-ginastica-artistica/", "fonte_id": "cartacapital", "data_pub": "2026-06-21T20:09:00Z", "idioma": "pt", "texto_pt": "A campeã olímpica Rebeca Andrade venceu a prova do salto na ginástica artística durante o Pan-Americano.  Essa conquista marca o retorno de Rebeca às competições após os Jogos Olímpicos de Tóquio.", "titulo_pt": "Rebeca Andrade volta com ouro no Pan de ginástica artística", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 9058, "titulo": "Pesquisa mostra que 38,2% dos brasileiros se autocensuram em conversas políticas com a família", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/pesquisa-mostra-que-382-dos-brasileiros-se-autocensuram-em-conversas-politicas-com-a-familia.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-21T20:00:00Z", "idioma": "pt", "texto_pt": "Uma pesquisa do Instituto Sivis revelou que 38,2% dos brasileiros praticam autocensura em conversas políticas com familiares.  O estudo aponta o medo de retaliações sociais, profissionais ou legais como motivo para essa autocensura.", "titulo_pt": "Pesquisa indica que 38,2% dos brasileiros se autocensuram em conversas políticas com a família", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 9092, "titulo": "Projeto dispensa licitação para medicamentos da Hemobrás", "url": "https://www.poder360.com.br/poder-congresso/projeto-dispensa-licitacao-para-medicamentos-da-hemobras/", "fonte_id": "poder360", "data_pub": "2026-06-21T20:00:00Z", "idioma": "pt", "texto_pt": "Um projeto proposto no Congresso Nacional pode dispensar a realização de licitações para a compra de medicamentos produzidos pela Hemobrás pelo Sistema Único de Saúde (SUS). A dispensa se aplica quando a produção do medicamento for exclusiva da Hemobrás. O objetivo é agilizar o fornecimento de medicamentos essenciais ao SUS.", "titulo_pt": "Projeto isenta licitação para medicamentos da Hemobrás", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 9117, "titulo": "Calendário econômico: ata do Copom e IPCA-15 no Brasil e inflação nos EUA serão foco", "url": "https://www.infomoney.com.br/mercados/calendario-economico-ata-do-copom-e-ipca-15-no-brasil-e-inflacao-nos-eua-serao-foco/", "fonte_id": "infomoney", "data_pub": "2026-06-21T20:00:00Z", "idioma": "pt", "texto_pt": "A semana terá como destaque a divulgação da ata do Comitê de Política Monetária (Copom) e o Índice Nacional de Preços ao Consumidor Amplo (IPCA-15) no Brasil. Além disso, os Estados Unidos divulgarão dados sobre inflação.", "titulo_pt": "Calendário econômico: ata do Copom, IPCA-15 e inflação dos EUA serão foco", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 9118, "titulo": "Onde assistir Uruguai x Cabo Verde?", "url": "https://www.infomoney.com.br/esportes/onde-assistir-uruguai-cabo-verde/", "fonte_id": "infomoney", "data_pub": "2026-06-21T20:00:00Z", "idioma": "pt", "texto_pt": "O jogo entre Uruguai e Cabo Verde acontece às 19h deste domingo no Hard Rock Stadium. A partida será transmitida pelo InfoMoney.", "titulo_pt": "Onde assistir Uruguai x Cabo Verde?", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 9119, "titulo": "Maioria dos britânicos está decepcionada com Brexit, aponta pesquisa", "url": "https://www.infomoney.com.br/mundo/maioria-dos-britanicos-esta-decepcionada-com-brexit-aponta-pesquisa/", "fonte_id": "infomoney", "data_pub": "2026-06-21T19:50:00Z", "idioma": "pt", "texto_pt": "Uma pesquisa indica que a maioria dos britânicos expressa decepção com os resultados do Brexit.  A pesquisa foi publicada pelo site InfoMoney.", "titulo_pt": "Maioria dos britânicos está decepcionada com o Brexit, aponta pesquisa", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 9113, "titulo": "Histórico comandante da Revolução Cubana, Ramiro Valdés morre aos 93 anos", "url": "https://www.brasildefato.com.br/2026/06/21/historico-comandante-da-revolucao-cubana-ramiro-valdes-morre-aos-93-anos/", "fonte_id": "brasil_de_fato", "data_pub": "2026-06-21T19:49:00Z", "idioma": "pt", "texto_pt": "Ramiro Valdés Menéndez, comandante da Revolução Cubana e guerrilheiro histórico, faleceu aos 93 anos no domingo (21).  Valdés participou de importantes batalhas na revolução cubana, como o ataque ao quartel Moncada, o desembarque do iate Granma e a formação do Exército Rebelde na Sierra Maestra. O presidente cubano, Miguel Díaz-Canel, lamentou a morte.", "titulo_pt": "Comandante histórico da Revolução Cubana, Ramiro Valdés morre aos 93 anos", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 9068, "titulo": "Irã pede que EUA ‘meça palavras’, após ameaça de Trump", "url": "https://www.cartacapital.com.br/mundo/ira-pede-que-eua-meca-palavras-apos-ameaca-de-trump/", "fonte_id": "cartacapital", "data_pub": "2026-06-21T19:47:00Z", "idioma": "pt", "texto_pt": "O presidente dos Estados Unidos, Donald Trump, pediu ao Irã para impedir seus aliados no Líbano de causar problemas e ameaçou retomar os ataques contra o país. Em resposta, o Irã pediu que os EUA 'meçam suas palavras'.", "titulo_pt": "Irã pede cautela aos EUA após ameaça de Trump", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 9120, "titulo": "Estreito de Ormuz não será reaberto até cessar-fogo no Líbano, diz agência do Irã", "url": "https://www.infomoney.com.br/mundo/estreito-de-ormuz-nao-sera-reaberto-ate-cessar-fogo-no-libano-diz-agencia-do-ira/", "fonte_id": "infomoney", "data_pub": "2026-06-21T19:44:00Z", "idioma": "pt", "texto_pt": "Uma fonte próxima à equipe de negociação afirmou que o Estreito de Ormuz continuará fechado. A decisão foi tomada em resposta ao conflito no Líbano. O estreito só será reaberto quando houver um cessar-fogo.", "titulo_pt": "Estreito de Ormuz permanecerá fechado até cessar-fogo no Líbano, diz agência do Irã", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 9059, "titulo": "Paulo Serra (PSDB) desiste de disputar governo de SP e discute apoio a Tarcísio", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/paulo-serra-psdb-desiste-de-disputar-governo-de-sp-e-discute-apoio-a-tarcisio.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-21T19:41:00Z", "idioma": "pt", "texto_pt": "Paulo Serra, presidente estadual do PSDB e ex-prefeito de Santo André, anunciou que não buscará mais o governo de São Paulo.  Serra pretende se candidatar a deputado federal. O político afirmou que está negociando apoio a Tarcísio de Freitas (Republicans) para o governo paulista.", "titulo_pt": "Paulo Serra (PSDB) desiste da corrida ao governo de SP e negocia apoio a Tarcísio", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}], "politica_internacional": [{"id": 9298, "titulo": "Switzerland talks enter tough phase after Trump renews threats against Iran", "url": "https://www.france24.com/en/middle-east/20260621-switzerland-talks-enter-tough-phase-after-trump-renews-threats-against-iran", "fonte_id": "france24", "data_pub": "2026-06-21T20:36:00Z", "idioma": "en", "texto_pt": "As negociações entre Estados Unidos e Irã na Suíça entraram em uma fase delicada. O vice-presidente americano, JD Vance, afirmou que há uma chance de", "titulo_pt": "Conversas na Suíça entram em fase difícil após Trump renovar ameaças contra Irã", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 9308, "titulo": "Media, fra Usa e Iran progressi su Hormuz, in Svizzera si è parlato si nucleare", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/21/media-fra-usa-e-iran-progressi-su-hormuz-in-svizzera-si-e-parlato-si-nucleare_77429edc-8d14-426b-b8cf-e3b4b50f6583.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-21T20:31:00Z", "idioma": "it", "texto_pt": "Segundo a Axios, diplomatas dos Estados Unidos afirmaram que as negociações entre os EUA e o Irã sobre o acordo nuclear estão progredindo. As conversas aconteceram em Genebra, na Suíça.  As partes também discutiram a situação no Estreito de Hormuz.", "titulo_pt": "Mídias, EUA e Irã progressivos sobre Hormuz, na Suíça conversas nucleares", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 9309, "titulo": "Media, i colloqui con l'Iran e i mediatori continuano nella notte", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/21/media-i-colloqui-con-liran-e-i-mediatori-continuano-nella-notte_35146771-3233-4c58-95e8-3529264d5e93.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-21T20:31:00Z", "idioma": "it", "texto_pt": "As conversas de alto nível sobre o acordo nuclear iraniano se encerraram hoje, mas as equipes técnicas continuarão negociando amanhã. A mídia italiana relata que os trabalhos continuam durante a noite.", "titulo_pt": "Mídias: Conversas com o Irã e mediadores continuam durante a noite", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 9299, "titulo": "LIVE | Colombia Presidential Runoff: Final minutes of voting", "url": "https://www.france24.com/en/americas/20260621-colombia-presidential-election-live-cepeda-de-la-espriella-face-off-in-second-round", "fonte_id": "france24", "data_pub": "2026-06-21T20:23:00Z", "idioma": "en", "texto_pt": "Abelardo de la Espriella, candidato de direita radical, e Ivan Cepeda, aliado do primeiro governo de esquerda da Colômbia, disputam a segunda volta das eleições presidenciais. O resultado determinará se o país tomará uma direção radical ou permanecerá no seu curso atual em meio ao aumento da violência entre grupos armados.", "titulo_pt": "Eleição Presidencial na Colômbia: Últimos Momentos do Voto", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 9314, "titulo": "Philippines fears China may move to seize full control of disputed atoll", "url": "https://www.ft.com/content/d5191b00-dccb-465e-8afb-e61cc8260f93", "fonte_id": "financial_times", "data_pub": "2026-06-21T20:19:00Z", "idioma": "en", "texto_pt": "O secretário de Defesa das Filipinas alertou sobre um aumento da atividade militar chinesa ao redor do Recife de Scarborough. O governo filipino expressou preocupação com a possibilidade da China assumir o controle total do atol, que é objeto de disputa territorial entre os dois países.", "titulo_pt": "Filipinas teme que China possa tomar controle total do atol disputado", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 9300, "titulo": "What's the state of the Strait?", "url": "https://www.france24.com/en/tv-shows/spotlight/20260621-what-s-the-state-of-the-strait", "fonte_id": "france24", "data_pub": "2026-06-21T19:50:00Z", "idioma": "en", "texto_pt": "Funcionários dos EUA e do Irã iniciaram conversas na Suíça, cinco dias após um acordo de cessar-fogo de 60 dias que já parece estar sob pressão. Teerã afirma ter fechado o Estreito de Ormuz, citando os combates continuados no Líbano, enquanto Washington diz que as negociações se concentram em encerrar as ambições nucleares do Irã e garantir um fim duradouro ao conflito.", "titulo_pt": "Qual é o estado do Estreito?", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 9100, "titulo": "Bolívia: caem bloqueios após estado de exceção e acordo com sindicato", "url": "https://agenciabrasil.ebc.com.br/internacional/noticia/2026-06/bolivia-caem-bloqueios-apos-estado-de-excecao-e-acordo-com-sindicato", "fonte_id": "agencia_brasil_intl", "data_pub": "2026-06-21T19:44:00Z", "idioma": "pt", "texto_pt": "O número de bloqueios de rodovias na Bolívia diminuiu após um acordo entre o governo e a Central Operária da Bolívia (COB). O estado de exceção, decretado pelo governo, permite ao presidente Rodrigo Paz usar as Forças Armadas para reprimir manifestantes.", "titulo_pt": "Bolívia: bloqueios caem após estado de exceção e acordo com sindicato", "veiculo": "Agência Brasil - Internacional", "pais": "Brasil", "classe": "A"}, {"id": 9301, "titulo": "The last hours of Starmer?", "url": "https://www.france24.com/en/tv-shows/spotlight/20260621-the-last-hours-of-starmer", "fonte_id": "france24", "data_pub": "2026-06-21T19:36:00Z", "idioma": "en", "texto_pt": "O Primeiro-Ministro britânico, Keir Starmer, está sob pressão crescente devido a especulações sobre seu futuro político. Relatórios sugerem que o apoio dentro do seu próprio partido está diminuindo e há conversas em torno de uma possível disputa pela liderança.", "titulo_pt": "Últimas horas de Starmer?", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 9313, "titulo": "Building materials group CRH nears its biggest-ever deal to buy Arcosa", "url": "https://www.ft.com/content/6c95c41b-7bf1-4adf-84e9-08356f8a4981", "fonte_id": "financial_times", "data_pub": "2026-06-21T19:31:00Z", "idioma": "en", "texto_pt": "A empresa irlandesa CRH está perto de adquirir a empresa de construção com sede em Dallas, Arcosa. A capitalização de mercado da Arcosa é de quase US$ 7 bilhões.", "titulo_pt": "Grupo de materiais de construção CRH se aproxima da maior transação de sua história para comprar a Arcosa", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 9302, "titulo": "Serena Williams handed Wimbledon singles wildcard in grand slam comeback", "url": "https://www.france24.com/en/sport/20260621-serena-williams-handed-wimbledon-singles-wildcard-in-grand-slam-comeback", "fonte_id": "france24", "data_pub": "2026-06-21T19:22:00Z", "idioma": "en", "texto_pt": "Serena Williams retornará ao torneio de simples do Wimbledon após receber um convite especial. Ela não competiu em simples no Wimbledon desde 2022 e esteve afastada das competições por grande parte dos últimos quatro anos.", "titulo_pt": "Serena Williams recebe convite especial para Wimbledon", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 9163, "titulo": "O país europeu que nunca teve exército e agora tem que reavaliar sua defesa", "url": "https://www.bbc.com/portuguese/articles/c75y46y1x1qo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-21T19:06:00Z", "idioma": "pt", "texto_pt": "A Islândia sempre contou com a segurança dos Estados Unidos e da OTAN. A volta de Donald Trump à presidência americana coloca essa garantia em dúvida, levando o país a reconsiderar suas defesas.", "titulo_pt": "O país europeu que nunca teve exército e agora precisa reavaliar sua defesa", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 9228, "titulo": "La crisis en Líbano y nuevas amenazas de Trump tensan la negociación entre EE UU e Irán en Suiza", "url": "https://elpais.com/internacional/2026-06-21/estados-unidos-e-iran-se-disponen-a-iniciar-la-negociacion-de-un-acuerdo-definitivo-en-suiza.html", "fonte_id": "elpais_america", "data_pub": "2026-06-21T18:58:00Z", "idioma": "es", "texto_pt": "Delegações dos Estados Unidos e do Irã se reúnem na Suíça com os mediadores Catar e Paquistão para tentar chegar a um acordo de paz. A crise no Líbano e novas ameaças do presidente americano Donald Trump à região aumentam a tensão nas negociações.", "titulo_pt": "Crise no Líbano e novas ameaças de Trump aumentam tensão na negociação entre EUA e Irã na Suíça", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 9230, "titulo": "España despierta con Lamine y golea a Arabia Saudí", "url": "https://elpais.com/deportes/mundial-futbol/2026-06-21/espana-despierta-con-lamine-y-golea-a-arabia-saudi.html", "fonte_id": "elpais_america", "data_pub": "2026-06-21T18:30:00Z", "idioma": "es", "texto_pt": "Lamine marcou o primeiro gol da Espanha no Mundial. A equipe espanhola venceu a Arábia Saudita por um placar expressivo após um desempenho inicial lento.", "titulo_pt": "Espanha acorda com Lamine e goleia Arábia Saudita", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 9326, "titulo": "Severe heat wave sweeps Europe, triggering alerts and disruptions", "url": "https://www.dw.com/en/severe-heat-wave-sweeps-europe-triggering-alerts-and-disruptions/a-77648446?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-21T18:05:00Z", "idioma": "en", "texto_pt": "Autoridades na Europa alertaram sobre temperaturas superiores a 39 e 40 graus Celsius devido a um 'domo de calor'. A Alemanha também enfrenta o risco de tempestades extremas.", "titulo_pt": "Ondas de calor severas atravessam a Europa, acionando alertas e interrupções", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 9311, "titulo": "Wars trigger $12bn venture capital rush into defence tech", "url": "https://www.ft.com/content/cb535f43-d2b7-4d14-82fe-abdd14765dfe", "fonte_id": "financial_times", "data_pub": "2026-06-21T18:00:00Z", "idioma": "en", "texto_pt": "O investimento em tecnologia de defesa já ultrapassou o total previsto para 2025.  A alta valorização das empresas está alimentando preocupações com um ciclo especulativo.", "titulo_pt": "Guerras impulsionam corrida de US$ 12 bilhões em capital de risco para tecnologia de defesa", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 9312, "titulo": "Warsh’s push to axe Fed guidance may lift US borrowing costs, investors warn", "url": "https://www.ft.com/content/6a9330ad-a2db-494b-bf61-7dd417ab9c9a", "fonte_id": "financial_times", "data_pub": "2026-06-21T18:00:00Z", "idioma": "en", "texto_pt": "Traders esperam maior volatilidade à medida que o novo presidente do banco central se recusa a fornecer uma projeção sobre a trajetória futura das taxas de juros. Investidores alertam que a decisão de Warsh pode resultar em custos de empréstimo mais altos nos Estados Unidos.", "titulo_pt": "Pressão de Warsh para eliminar diretrizes do Fed pode aumentar custos de empréstimo nos EUA, alertam investidores", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}], "cultura": [{"id": 9063, "titulo": "Roda Viva de Gilmar Mendes e 'O Profeta': o que ver na TV e no streaming na segunda", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/roda-viva-de-gilmar-mendes-e-o-profeta-o-que-ver-na-tv-e-no-streaming-na-segunda.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T20:00:00Z", "idioma": "pt", "texto_pt": "A segunda temporada de 'A Agência' estreia. O personagem de Michael Fassbender, um agente duplo, enfrenta sua missão mais perigosa quando a mulher que ama é presa politicamente no Sudão.", "titulo_pt": "Roda Viva com Gilmar Mendes e 'O Profeta': o que ver na TV e no streaming na segunda", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9064, "titulo": "O filme de 1975 que o famoso diretor Wim Wenders tirou de cartaz por ter topless de atriz de 13 anos", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/o-filme-de-1975-que-o-famoso-diretor-wim-wenders-tirou-de-cartaz-por-ter-topless-de-atriz-de-13-anos.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T19:41:00Z", "idioma": "pt", "texto_pt": "O diretor alemão Wim Wenders afirmou que vai restringir o acesso ao seu filme de 1975 'Movimento Em Falso' após pedidos da atriz que aparece sem blusa no longa quando tinha 13 anos.  Wenders foi indicado três vezes ao Oscar.", "titulo_pt": "O filme de 1975 que o diretor Wim Wenders tirou de cartaz por ter topless de atriz de 13 anos", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9162, "titulo": "Por que cada vez mais mulheres chinesas preferem usar roupas masculinas?", "url": "https://www.bbc.com/portuguese/articles/c3eynwjgwedo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-21T18:26:00Z", "idioma": "pt", "texto_pt": "O guarda-roupa das jovens chinesas está mudando. Discussões sobre o tema têm destacado vantagens de roupas masculinas, como modelagem, bolsos maiores e preços mais baixos.", "titulo_pt": "Por que cada vez mais mulheres chinesas preferem roupas masculinas?", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 8315, "titulo": "Morre Robson Barros, empresário que foi paquito da Xuxa, aos 57 anos", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/morre-robson-barros-empresario-que-foi-paquito-da-xuxa-aos-57-anos.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T16:57:00Z", "idioma": "pt", "texto_pt": "Robson Barros, ex-paquito do programa 'Xou da Xuxa', morreu aos 57 anos. A família confirmou a morte nas redes sociais, mas não divulgou a causa. O velório e o sepultamento acontecem neste domingo em São Paulo.", "titulo_pt": "Morre Robson Barros, empresário que foi paquito da Xuxa, aos 57 anos", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 8316, "titulo": "'Toy Story 5', com US$ 160 mi de bilheteria, é a maior estreia do ano nos EUA", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/toy-story-5-com-us-160-mi-de-bilheteria-e-a-maior-estreia-do-ano-nos-eua.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T16:03:00Z", "idioma": "pt", "texto_pt": "O filme de animação 'Toy Story 5' arrecadou cerca de US$ 160 milhões (R$ 825 milhões) em sua estreia nos cinemas americanos. Esse valor supera o de 'Super Mario Galaxy', que faturou US$ 131,7 milhões (R$ 678,5 milhões). O filme se tornou a maior estreia do ano nos Estados Unidos.", "titulo_pt": "'Toy Story 5' é a maior estreia do ano nos EUA", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 8317, "titulo": "Livro reconstrói o terror de campo de concentração no Chile da ditadura Pinochet", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/livro-reconstroi-o-terror-de-campo-de-concentracao-no-chile-da-ditadura-pinochet.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T16:00:00Z", "idioma": "pt", "texto_pt": "O livro aborda dois episódios trágicos na história do Chile, separados por quase um século, que ocorreram na ilha Dawson, no estreito de Magalhães. O ambiente subantártico da ilha foi palco desses eventos históricos.", "titulo_pt": "Livro reconstrui o terror do campo de concentração no Chile da ditadura Pinochet", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 8661, "titulo": "Imperfect Ghazal on Weightless Living", "url": "https://www.theatlantic.com/books/2026/06/poem-ayesha-asad-imperfect-ghazal/687625/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-21T16:00:00Z", "idioma": "en", "texto_pt": "O artigo apresenta um poema Ghazal que explora a sensação de leveza e liberdade. O poeta utiliza metáforas para descrever a experiência de se sentir livre das preocupações e da gravidade física. A obra evoca uma atmosfera contemplativa e introspectiva.", "titulo_pt": "Ghazal Imperfeito sobre Viver sem Peso", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 8733, "titulo": "Paris's Quai Branly Museum turns 20: A look back at its turbulent history", "url": "https://www.lemonde.fr/en/culture/article/2026/06/21/paris-s-quai-branly-museum-turns-20-a-look-back-at-its-turbulent-history_6754721_30.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-21T15:03:00Z", "idioma": "en", "texto_pt": "O museu em Paris está celebrando seu aniversário com grande festa neste fim de semana. Apesar das festividades, o museu continua enfrentando muitos desafios, principalmente econômicos. O museu foi inaugurado em 2003.", "titulo_pt": "Museu Quai Branly de Paris comemora 20 anos: Uma retrospectiva de sua história turbulenta", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 8318, "titulo": "Taís Araujo fará nova temporada de 'Mudando de Pele' em São Paulo", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/teatro/2026/06/tais-araujo-fara-nova-temporada-de-mudando-de-pele-em-sao-paulo.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T15:00:00Z", "idioma": "pt", "texto_pt": "Taís Araújo irá apresentar novas temporadas da peça 'Mudando de Pele' em São Paulo. Após o sucesso da temporada no Sesc 14 Bis, a atriz estreará no Teatro Faap em 13 de agosto.", "titulo_pt": "Taís Araújo fará nova temporada de 'Mudando de Pele' em São Paulo", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 8319, "titulo": "Dua Lipa usou vestido de casamento da Chanel com 25 mil plumas; veja detalhes", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/dua-lipa-usou-vestido-de-casamento-da-chanel-com-25-mil-penas-veja-detalhes.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T14:52:00Z", "idioma": "pt", "texto_pt": "A cantora Dua Lipa divulgou fotos do seu casamento com o ator Callum Turner, realizado na Sicília. O casamento teve três noites de festa com mais de 300 convidados e foi fotografado por David Sims.", "titulo_pt": "Dua Lipa usa vestido de noiva da Chanel com 25 mil penas; veja detalhes", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 8332, "titulo": "União da Orquestra Ouro Preto com Carlinhos Brown traz criação inédita", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/uniao-da-orquestra-ouro-preto-com-carlinhos-brown-traz-criacao-inedita", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-21T14:25:00Z", "idioma": "pt", "texto_pt": "A Orquestra Ouro Preto (OOP) lançou dois volumes do álbum 'Afrossinfonicidade' em parceria com o cantor e compositor Carlinhos Brown. O primeiro volume já está disponível nas plataformas digitais e o segundo será lançado em 26 de junho.  O maestro Rodrigo Toffolo descreveu a colaboração como um encontro afro sinfônico autêntico.", "titulo_pt": "União da Orquestra Ouro Preto com Carlinhos Brown resulta em criação inédita", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 9306, "titulo": "'Despite the tracksuits, we have brains': The French youth staging literary battles in housing projects", "url": "https://www.lemonde.fr/en/m-le-mag/article/2026/06/21/despite-the-tracksuits-we-have-brains-the-french-youth-staging-literary-battles-in-housing-projects_6754720_117.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-21T14:04:00Z", "idioma": "en", "texto_pt": "Um clube do livro em conjuntos habitacionais francês chamado 'Geronimo' está se tornando popular nas redes sociais. O grupo desafia leitores com confrontos entre autores como Zola e Flaubert, e pensadores como Adam Smith e Karl Marx, usando humor. A iniciativa busca aproximar escritores e sociólogos de novos públicos.", "titulo_pt": "'Apesar dos macacões, temos cérebro': Jovens franceses protagonizam batalhas literárias em conjuntos habitacionais", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 8333, "titulo": "Masp oferece bolsas para programa de ensino artístico-cultural", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/masp-oferece-bolsas-para-programa-de-ensino-artistico-cultural", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-21T13:41:00Z", "idioma": "pt", "texto_pt": "O Museu de Arte de São Paulo Assis Chateaubriand (Masp) está oferecendo 20 bolsas para o programa Pré-Universitário. O programa oferece ensino artístico-cultural e preparação de portfólios na área, sendo elegíveis estudantes que têm bolsas em suas escolas.", "titulo_pt": "Masp oferece bolsas para programa de ensino artístico-cultural", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 9354, "titulo": "A to B review – relentless mishaps as nothing goes to plan on blind date", "url": "https://www.theguardian.com/stage/2026/jun/21/a-to-b-review-blind-date-soho-theatre-london", "fonte_id": "guardian_culture", "data_pub": "2026-06-21T13:07:00Z", "idioma": "en", "texto_pt": "A peça 'A to B', do Soho Theatre em Londres, conta a história de Brianna e Armani através de dois monólogos sobrepostos. Os personagens se preparam para uma noite que pode mudar suas vidas, já que foram combinados em um encontro às cegas por amigos em comum. Eles só têm uma foto do parceiro potencial para guiá-los.", "titulo_pt": "Crítica A to B - Desastres sem fim enquanto nada sai como o planejado em um encontro às cegas", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 8320, "titulo": "Em disco, Dado Villa-Lobos transforma a tensão da pandemia em leveza musical", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/em-disco-dado-villa-lobos-transforma-a-tensao-da-pandemia-em-leveza-musical.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-21T13:00:00Z", "idioma": "pt", "texto_pt": "Dado Villa-Lobos inicialmente considerou o título 'Exílio no Bairro dos Mortos' para seu novo álbum. O título refletia o período em que ficou preso em Lisboa durante a pandemia. No entanto, ele optou por um título mais leve, já que o álbum busca superar as dificuldades com música.", "titulo_pt": "Em disco, Dado Villa-Lobos transforma a tensão da pandemia em leveza musical", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 8334, "titulo": "Museu Nacional lança exposições inéditas em comemoração aos 208 anos", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/museu-nacional-lanca-exposicoes-ineditas-em-comemoracao-aos-208-anos", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-21T13:00:00Z", "idioma": "pt", "texto_pt": "O Museu Nacional, no Rio de Janeiro, inaugura duas exposições inéditas a partir de domingo (21). As exposições ocupam seis salas do Paço de São Cristóvão e celebram os 208 anos do museu.", "titulo_pt": "Museu Nacional lança exposições inéditas para celebrar 208 anos", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}], "ciencia_tecnologia": [{"id": 9164, "titulo": "O primeiro passo para controlar seu tempo de tela (e se manter no controle), segundo especialistas", "url": "https://www.bbc.com/portuguese/articles/c1e2edvjy91o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-21T17:44:00Z", "idioma": "pt", "texto_pt": "Um relatório da Virgin Media O2 indica que, em média, 36% do tempo gasto em celulares não tem um objetivo definido. Especialistas sugerem ações para controlar esse tempo de tela.", "titulo_pt": "O primeiro passo para controlar o tempo no celular (e se manter no controle), segundo especialistas", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 8311, "titulo": "Interagir com um polvo é como encontrar uma inteligência alienígena", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/06/interagir-com-um-polvo-e-como-encontrar-uma-inteligencia-alienigena.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-21T15:00:00Z", "idioma": "pt", "texto_pt": "O texto discute a dificuldade de imaginar vida extraterrestre baseada em premissas diferentes das da Terra. A autora compara a experiência de interagir com polvos à de se deparar com seres alienígenas devido à sua biologia única.", "titulo_pt": "Interagir com um polvo é como encontrar uma inteligência alienígena", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 8312, "titulo": "Webb vê estágios iniciais da formação de aglomerado de galáxias", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/blogs/mensageiro-sideral/2026/06/webb-ve-estagios-iniciais-da-formacao-de-aglomerado-de-galaxias.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-21T12:00:00Z", "idioma": "pt", "texto_pt": "O Telescópio Espacial James Webb identificou o que pode ser um precursor de aglomerados de galáxias atuais.  Astrônomos internacionais realizaram dois estudos utilizando dados do telescópio. A pesquisa foi publicada em 21 de junho de 2026.", "titulo_pt": "Webb observa estágios iniciais da formação de aglomerado de galáxias", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 9021, "titulo": "Can GLP-1s boost testosterone levels?", "url": "https://www.scientificamerican.com/article/can-glp-1s-boost-testosterone-levels/", "fonte_id": "scientific_american", "data_pub": "2026-06-21T12:00:00Z", "idioma": "en", "texto_pt": "Um estudo preliminar descobriu que os níveis de testosterona aumentam ou se estabilizam em pessoas que tomam medicamentos GLP-1.  Os resultados do estudo ainda precisam ser confirmados por pesquisas maiores e mais abrangentes.", "titulo_pt": "GLP-1s podem aumentar os níveis de testosterona?", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 8313, "titulo": "Custo da crise do clima se mede em vidas perdidas", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/colunas/marceloleite/2026/06/custo-da-crise-do-clima-se-mede-em-vidas-perdidas.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-21T11:30:00Z", "idioma": "pt", "texto_pt": "O texto menciona que, no Sudeste e Sul do Brasil, as pessoas têm reclamado do frio.  Apesar do desconforto, não há ações significativas para lidar com a situação. O artigo será publicado em 06 de junho de 2026 às 8h30.", "titulo_pt": "Custo da crise climática se mede em vidas perdidas", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 8950, "titulo": "Wooting 60HE v2: Peak Keyboard Perfection", "url": "https://www.wired.com/review/review-wooting-60he-v2/", "fonte_id": "wired", "data_pub": "2026-06-21T11:01:00Z", "idioma": "en", "texto_pt": "O Wooting 60HE v2 é um teclado com efeito Hall. O teclado é considerado excelente, não apenas por seu efeito Hall, mas também como um teclado geral.", "titulo_pt": "Wooting 60HE v2: Perfeição em Teclados", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 8664, "titulo": "J. D. Vance’s AI Doctrine", "url": "https://www.theatlantic.com/national-security/2026/06/what-does-jd-vance-think-ai/687591/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-21T11:00:00Z", "idioma": "en", "texto_pt": "O vice-presidente está defendendo uma posição que mistura elementos do Vale do Silício com o movimento MAGA.  Ele argumenta que a inteligência artificial deve ser usada para promover os valores americanos e combater o comunismo.", "titulo_pt": "A Doutrina de IA de J. D. Vance", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 9022, "titulo": "How becoming a dad changes men’s brains", "url": "https://www.scientificamerican.com/article/how-becoming-a-dad-changes-mens-brains/", "fonte_id": "scientific_american", "data_pub": "2026-06-21T11:00:00Z", "idioma": "en", "texto_pt": "Pais demonstram mudanças em algumas das mesmas áreas do cérebro que as mães. O efeito da paternidade nos pais não é tão bem estudado quanto no caso das mães.", "titulo_pt": "Como se tornar pai muda o cérebro dos homens", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 8951, "titulo": "The Best NAS Devices for Your Home After Months of Testing", "url": "https://www.wired.com/story/best-nas-devices/", "fonte_id": "wired", "data_pub": "2026-06-21T10:30:00Z", "idioma": "en", "texto_pt": "Dispositivos de armazenamento conectado à rede (NAS) fornecem espaço compartilhado acessível na sua rede doméstica. Após testes, este artigo apresenta os dispositivos NAS favoritos do autor.", "titulo_pt": "Os melhores dispositivos NAS para sua casa após meses de testes", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 8953, "titulo": "If You’re Searching for a New Skillet, Consider Stainless Steel", "url": "https://www.wired.com/story/stainless-steel-skillets-are-great/", "fonte_id": "wired", "data_pub": "2026-06-21T10:30:00Z", "idioma": "en", "texto_pt": "Panelas de aço inoxidável podem não ter revestimentos antiaderentes, mas são simples de usar, selam bem e são projetadas para durar uma vida útil longa e difícil.", "titulo_pt": "Se você está procurando uma nova frigideira, considere aço inoxidável", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 8954, "titulo": "Buying a Used iPhone Makes More Sense Than Ever", "url": "https://www.wired.com/story/buying-a-used-iphone-makes-more-sense-than-ever/", "fonte_id": "wired", "data_pub": "2026-06-21T10:00:00Z", "idioma": "en", "texto_pt": "Com a Apple aumentando os preços em breve, comprar um aparelho usado ou atualizar um dispositivo antigo pode "idioma": "pt", "titulo_pt": "Governo busca súmula de Gilmar para limitar gastos aprovados pelo Congresso", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 8309, "fonte_id": "folha_poder", "titulo": "Indecisos veem eleição sem entusiasmo e adiam escolha para depois de debates", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/indecisos-veem-eleicao-sem-entusiasmo-e-adiam-escolha-para-depois-de-debates.shtml", "data_pub": "2026-06-21T02:00:00Z", "topico": "politica_nacional", "idioma": "pt", "titulo_pt": "Eleitores indecisos aguardam debates antes de escolher candidato", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 8322, "fonte_id": "folha_ilustrada", "titulo": "Mooca ganha parque com áreas de lazer, academia ao ar livre e árvore centenária", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/passeios/2026/06/mooca-ganha-parque-com-areas-de-lazer-academia-ao-ar-livre-e-arvore-centenaria.shtml", "data_pub": "2026-06-21T02:00:00Z", "topico": "cultura", "idioma": "pt", "titulo_pt": "Mooca ganha parque com áreas de lazer, academia ao ar livre e árvore centenária", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 8323, "fonte_id": "folha_ilustrada", "titulo": "Está perdido em 'A Casa do Dragão'? Leia resumo e saiba onde ver as séries da saga 'Game of Thrones'", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/streaming/2026/06/esta-perdido-em-a-casa-do-dragao-leia-resumo-e-saiba-onde-ver-as-series-da-saga-game-of-thrones.shtml", "data_pub": "2026-06-21T02:00:00Z", "topico": "cultura", "idioma": "pt", "titulo_pt": "Está perdido em 'A Casa do Dragão'? Leia resumo e saiba onde ver as séries da saga 'Game of Thrones'", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 8992, "fonte_id": "yonhap_news", "titulo": "Samsung reviews HBM sales strategy, long-term agreements with key customers", "url": "https://en.yna.co.kr/view/AEN20260621000900320", "data_pub": "2026-06-21T01:29:00Z", "topico": "ciencia_tecnologia", "idioma": "en", "titulo_pt": "Samsung revisa estratégia de vendas de HBM e acordos a longo prazo com clientes-chave", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 8875, "fonte_id": "japan_times", "titulo": "Portugal’s unofficial exorcism fever worries Catholic Church", "url": "https://www.japantimes.co.jp/news/2026/06/21/world/portugal-exorcism-catholic-church/", "data_pub": "2026-06-21T01:21:00Z", "topico": "cultura", "idioma": "en", "titulo_pt": "Febre por exorcismos não oficiais preocupa Igreja Católica de Portugal", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 8310, "fonte_id": "folha_poder", "titulo": "PL já discute substituto para lugar de Eduardo Bolsonaro como suplente de senador", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/pl-ja-discute-substituto-para-lugar-de-eduardo-bolsonaro-como-suplente-de-senador.shtml", "data_pub": "2026-06-21T00:00:00Z", "topico": "politica_nacional", "idioma": "pt", "titulo_pt": "PL já discute substituto para vaga de Eduardo Bolsonaro como suplente de senador", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}]};
const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const rot = n.topico ? (D.rotulos_topico[n.topico] || n.topico) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(n.topico || '')}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
