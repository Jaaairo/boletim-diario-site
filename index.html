<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
</style>
</head>

<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>

</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">

    <label for="inp-senha">Senha</label>

</div>

<div class="modal-overlay" id="modal-flag">

    <select id="flag-tipo">

      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "28/06/2026 08:53", "stats": {"noticias_novas": 442, "resumos_gerados": 278}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "Os Republicanos e o PL apoiam candidatos diferentes na eleição de Roraima, criando divisões entre as forças da direita. O senador Flávio Bolsonaro (PL) ainda busca o apoio do Republicano para a disputa presidencial. Em outra frente, o ex-presidente Lula teve uma das conversas mais difíceis de sua vida durante uma reunião com o senador Jaques Wagner, que resultou na perda da liderança do governo. O governo de Santa Catarina acusou o ex-presidente Lula de xenofobia após um comentário feito por ele em um evento em Itajaí. Além disso, a defesa de Jair Bolsonaro solicitou ao ministro Alexandre de Moraes que não considere a posse de arma como uma 'falta grave' e mantenha a prisão domiciliar do ex-presidente. O Supremo Tribunal Federal formou maioria para liberar parte dos penduricalhos aos juízes e promotores, permitindo os pagamentos em dinheiro de verbas retroativas e suspensas desde que o Conselho Nacional de Justiça verifique a legalidade.", "mundo": "A situação geopolítica no Oriente Médio permanece volátil. O Irã ameaçou que qualquer interferência no Estreito de Ormuz agravará a tensão, enquanto o Bahrein solicita uma intervenção internacional para conter as agressões do Irã. Israel intensificou suas operações militares em territórios vizinhos, atacando o Líbano e a Síria, apesar de um suposto acordo de paz recentemente assinado. Em contraste, a Nova Caledônia realiza eleições provinciais pela primeira vez desde 2019, com uma alta taxa de participação, enquanto a França registra cerca de mil mortes a mais do que o esperado durante uma onda de calor recorde. O Japão e a Índia planejam estabelecer uma força-tarefa para armazenar gás natural liquefeito (GNL), buscando fortalecer sua cooperação em segurança energética.\n\nA tensão geopolítica no Oriente Médio atingiu um novo nível com uma série de ataques e contraintegrações entre Estados Unidos e Irã. O Irã confirmou o lançamento de mísseis e drones contra bases militares dos EUA em Kuwait e Bahrein, como resposta a operações recentes americanas perto do Estreito de Ormuz. As autoridades iranianas também anunciaram planos para dois dias de despedida pública e funeral do líder supremo Ayatollah Seyyed Ali Khamenei, morto durante os ataques. Em contrapartida, o Exército dos Estados Unidos realizou novos ataques em instalações militares iranianas, incluindo navios costeiros. O Irã reagiu com mais ataques a bases americanas no Kuwait e Bahrein, mantendo a escalada de violência na disputa pelo controle do Estreito de Ormuz.", "economia": "O economista Adauto Lima, da Franklin Templeton, afirma que o Banco Central (BC) não reduzirá as taxas de juros Selic até observar os efeitos do El Niño e a estabilidade dos preços do petróleo. A suspensão das sanções sobre o petróleo iraniano pelos Estados Unidos beneficiou o Irã economicamente, mas não há menção de impactos diretos no mercado interno brasileiro nos artigos fornecidos. O Canadá está enviando uma missão comercial para o Japão com o objetivo de aumentar as relações comerciais, aproveitando seus recursos naturais e forças na inteligência artificial e produtos agrícolas. A bolsa brasileira pode parecer caro a primeira vista, mas seu valor potencial de investimento deve ser avaliado considerando fatores como rentabilidade e qualidade das empresas listadas.", "tecnologia": "A tecnologia está passando por um período de reflexão e ajustes, conforme relatos indicam. A União dos Trabalhadores da Samsung Biologics decidiu sair da União Samsung Group United Union, sinalizando mudanças na estrutura corporativa do conglomerado sul-coreano. Em outro desenvolvimento, a China enfrentou restrições impostas pelos EUA ao construir o supercomputador LineShine, que foi classificado como o mais rápido do mundo, apesar de não utilizar GPUs. A Samsung e SK hynix planejam anunciar planos de investimento nesta semana, conforme informado pelo escritório presidencial sul-coreano, com a empresa de eletrônicos planejando um investimento recorde que abrange várias áreas e filiais. Outro destaque é o lançamento do Sealion 6 DM-i, primeiro veículo plug-in híbrido da BYD para o mercado sul-coreano, que busca atender a uma lacuna no mercado de veículos elétricos na Coreia. Além disso, a inteligência artificial está se tornando mais presente em diversos setores, desde o processo seletivo de emprego até o desenvolvimento de supercomputadores e a automatização da produção em fábricas, com empresas como a Rolls-Royce buscando apoio governamental para um motor que pode impulsionar os próximos modelos de aviões de corpos finos com voos curtos. A expansão do uso de veículos autônomos e a eletrificação dos caminhões pesados também estão sendo observadas, especialmente na China, onde as fabricantes locais estão se beneficiando da aceleração da eletrificação nas estradas do país graças a avanços tecnológicos e custos de propriedade mais baixos.", "ciencia": "O maior supercondutor magnético do mundo foi ativado na China para um projeto de fusão nuclear, superando marcos internacionais e representando um grande avanço tecnológico. Paralelamente, cientistas da Universidade de Alberta desenvolveram um peptídeo promissor como alternativa aos antibióticos, potencialmente combatendo a resistência antimicrobiana. Esses dois eventos destacados refletem o progresso em áreas cruciais para a ciência e tecnologia global.", "cultura": "A cultura global tem sido um assunto importante nos últimos dias com diversos eventos e tendências. A embarcação francesa Tara, que tem ligações com o Japão, continua suas pesquisas ambientais sobre microplásticos e recifes de corais, contribuindo para a compreensão das questões globais do meio ambiente. Em outro desenvolvimento cultural notável, o artista coreano Lee Bae transformou um mosteiro medieval francês em uma exposição contemplativa com suas obras feitas a carvão, criando um diálogo interessante entre arte contemporânea e história arquitetônica. A música também foi destaque, com a colaboração 'Iconic by Mistake' de Le Sserafim, Illit e Katseye continuando a ganhar momentum nas paradas globais do K-pop, se tornando um dos lançamentos mais bem-sucedidos do ano. Além disso, o ator Eddie Marsan compartilhou sua playlist musical, revelando sua paixão por funk e louvor, enquanto David Sedaris relatou sua obsessão com a plataforma de aprendizado de idiomas Duolingo, caminhando 10 milhas diariamente para subir na tabela de liderança.", "sociedade": "A França registrou 1.000 mortes a mais durante um período de calor extremo, conforme informou a agência de saúde pública, que alerta para o número real poder ser maior. Em outro destaque, o salário mínimo em certos condados da Califórnia será aumentado a partir do dia 1º de julho de 2026, conforme anunciado pelo governo estadual. A União Europeia anunciou uma ajuda emergencial no valor de 5 milhões de euros para as comunidades venezuelanas afetadas por terremotos. Tragaticamente, um menino de 10 a 12 anos morreu após supostamente sofrer de calorstroke em Hong Kong. Além disso, a Organização das Nações Unidas chamou uma organização brasileira para resgatar animais afetados por terremotos na Venezuela. No Chile, a ministra da Educação defende reformas sem desmontar mudanças implementadas durante o governo anterior. Em um outro caso, um subdefensor foi exonerado após duas denúncias de assédio no Brasil. A saúde mental dos jovens em Hong Kong é debatida, com um conselheiro do governo aconselhando a ampliação do apoio para além dos casos de alto risco. No Distrito Federal, famílias gastam até 18% do salário mínimo com transporte público. Em Mato Grosso, uma defensoria pública exonerou um subdefensor após denúncias de assédio. A situação política no Brasil é analisada por especialistas, destacando-se a questão do peronismo unido e das dificuldades futuras para o candidato Milei. O número de estudantes vocacionais tem diminuído em vários contextos educacionais. No Chile, investigam-se as circunstâncias da morte de um condutor após disparo de carabinero durante fiscalização no cemitério de La Serena. A situação dos direitos dos professores é questionada por grupos que expressam preocupação sobre o plano do Ministério da Educação. Em Goiás, um casal foi identificado como suspeito de ter feito uma emboscada para matar o amante da esposa em Cristalina. No Haiti, a comunidade haitiana no Chile reacendeu traumas com o caso de 64 crianças supostamente desaparecidas. O número de mulheres gerentes rurais é significativo, mas elas controlam apenas uma pequena porcentagem da área total administrada. A prática de atividade física no mundo se mantém estagnada há duas décadas, apesar das políticas implementadas para incentivar exercícios regulares.", "meio_ambiente": "A Europa está enfrentando uma onda de calor extremo que já resultou na morte de mais de mil pessoas na França. Este verão, o país registrou recordes de temperatura, com temperaturas superando 41,3 °C em algumas regiões. Em outras partes do mundo, a situação também é alarmante: na Venezuela, há um aumento no número de mortos por terremotos, chegando a 1.430 pessoas; e Taiwan enfrenta inundações severas causadas pelo ciclone Mekkhala. O El Niño está trazendo chuvas intensas ao sul do Brasil, enquanto na Suíça os glaciares estão derretendo em ritmo acelerado devido à onda de calor.", "direitos_humanos": "Um homem australiano da meia-idade foi preso e acusado de assassinato após o corpo de uma garota tailandesa, de 17 anos, ser encontrado em uma mala no resort de Pattaya. Isso levantou preocupações sobre crimes contra jovens estrangeiras. No Distrito Federal do Brasil, 9 mil idosos têm direitos humanos violados diariamente, ocupando a quarta posição entre as unidades da federação com o maior número de violações. O governo sul-coreano planeja reduzir o limite de idade para menores em casos penais sob certas condições. Em um caso específico na Índia, uma família espera justiça após um incidente ocorrido há 8 anos envolvendo a infância estuprada do seu filho em Delhi. No conflito entre Israel e Gaza, uma criança palestina de 10 anos morreu no hospital de Gaza após sofrer ferimentos de um ataque israelense na região sul, elevando o número total de mortes a 73.043 desde outubro de 2023. Além disso, a UNICEF enviou uma aeronave com assistência humanitária para Venezuela após terremotos que afetaram cerca de 680 mil crianças."}, "resumo_do_dia": {"politica_nacional": [{"id": 23227, "titulo": "Republicanos e PL apoiam candidatos rivais em Roraima e dividem a direita", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/republicanos-e-pl-apoiam-candidatos-rivais-em-roraima-e-dividem-a-direita.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os Republicanos e o PL apoiam candidatos diferentes na eleição de Roraima, causando divisões entre as forças da direita. A campanha de Flávio Bolsonaro (PL) busca ainda o apoio do Republicanos para a disputa presidencial.", "titulo_pt": "Republicanos e PL apóiam candidatos rivais em Roraima e dividem a direita", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 23326, "titulo": "Constituição promete, política não entrega e cortes avançam ao centro do poder", "url": "https://www.jota.info/opiniao-e-analise/artigos/constituicao-promete-politica-nao-entrega-e-cortes-avancam-ao-centro-do-poder", "fonte_id": "jota", "data_pub": "2026-06-28T08:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Constituição promete direitos e garantias, mas a política não consegue entregar esses benefícios na prática. Os cortes judiciais têm se tornado um elemento central no exercício do poder em ambos os países.", "titulo_pt": "Constituição promete, política não entrega e cortes avançam ao centro do poder", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 23269, "titulo": "Moraes avalia domiciliar de Bolsonaro após manifestação de PGR e defesa", "url": "https://www.cnnbrasil.com.br/politica/arma-apreendida-vira-peca-chave-sobre-domiciliar-de-bolsonaro/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T07:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O juiz federal Sérgio Morais está avaliando a possibilidade de manter o presidente Jair Bolsonaro em prisão domiciliar humanitária. A Procuradoria-Geral da República defendeu aguardar o resultado da investigação policial, enquanto a defesa do presidente negou a existência de uma falta grave e pediu a manutenção da prisão domiciliar.", "titulo_pt": "Moraes avaliará domiciliar de Bolsonaro após posicionamento de PGR e defesa", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 23233, "titulo": "Especialistas veem MEI com custo elevado e recomendam reduzir benefício; governo quer ampliar limite e contratações", "url": "https://g1.globo.com/economia/noticia/2026/06/28/especialistas-veem-mei-com-custo-elevado-e-recomendam-reduzir-beneficio-governo-quer-ampliar-limite-e-contratacoes.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-28T07:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Especialistas recomendam reduzir os benefícios do microempreendedor individual (MEI) para garantir a sustentabilidade da Previdência Social, devido ao custo elevado aos cofres públicos. O governo pretende ampliar o limite e as contratações do MEI.", "titulo_pt": "Especialistas veem MEI com custo alto e recomendam reduzir benefícios; governo quer expandir programa", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 23234, "titulo": "A um mês das convenções, presidenciáveis negociam vice pensando em reduzir resistências do eleitorado e em tempo de TV", "url": "https://g1.globo.com/politica/noticia/2026/06/28/a-um-mes-das-convencoes-presidenciaveis-negociam-vice-pensando-em-reduzir-resistencias-do-eleitorado-e-em-tempo-de-tv.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-28T05:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A menos de um mês das convenções partidárias, os pré-candidatos presidenciais estão negociando nomes para vice-candidatos com o objetivo de reduzir resistências do eleitorado. Os candidatos buscam alianças que possam atrair votos de diferentes seções da população.", "titulo_pt": "A um mês das convenções, pré-candidatos buscam vices para reduzir resistências do eleitorado", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 22508, "titulo": "Governo de SC acusa Lula de xenofobia e aciona PGR", "url": "https://www.metropoles.com/brasil/governo-de-sc-diz-que-vai-acionar-pgr-por-fala-de-lula-sobre", "fonte_id": "metropoles", "data_pub": "2026-06-28T02:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo de Santa Catarina acusou o ex-presidente Lula de xenofobia após um comentário feito durante um evento em Itajaí. O governo entendeu que houve uma discriminação.", "titulo_pt": "Governo de SC acusa Lula de xenofobia", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 22408, "titulo": "Flávio Bolsonaro se ausentou em 43% das votações nominais do Senado este ano", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/flavio-bolsonaro-se-ausentou-em-43-das-votacoes-nominais-do-senado-este-ano.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio Bolsonaro (PL-RJ) não votou em 43% das deliberações nominais do Senado neste ano, de acordo com um levantamento da Folha. Ele é o quinto parlamentar que mais se ausentou nas votações, entre as 49 matérias analisadas até 22 de junho.", "titulo_pt": "Flávio Bolsonaro se ausentou em 43% das votações nominais do Senado este ano", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 22409, "titulo": "Entrada da PF pode mudar o jogo no caso Lojas Americanas", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/eliogaspari/2026/06/entrada-da-pf-pode-mudar-o-jogo-no-caso-lojas-americanas.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal realizou uma entrada nas instalações das Lojas Americanas e bloqueou até R$ 54 bilhões de bens da empresa, indicando que o caso de fraude na companhia pode estar sendo reaberto.", "titulo_pt": "Entrada da PF pode mudar o jogo no caso Lojas Americanas", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 22410, "titulo": "Lula teve uma das conversas mais difíceis de seus 80 anos", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/eliogaspari/2026/06/lula-teve-uma-das-conversas-mais-dificeis-de-seus-80-anos.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Lula teve uma das conversas mais difíceis de sua vida durante uma reunião com o senador Jaques Wagner, que resultou na perda da liderança do governo. Esta foi considerada uma das conversas mais complicadas em seus 80 anos.", "titulo_pt": "Lula teve uma das conversas mais difíceis de seus 80 anos", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 22411, "titulo": "Divisão de fundo eleitoral para campanha causa divergência no PT", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/divisao-de-fundo-eleitoral-para-campanha-causa-divergencia-no-pt.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente nacional do PT, Edinho Silva, propôs enviar o fundo eleitoral para os diretórios estaduais decidirem a divisão. A sugestão gerou divergência com a bancada atual da sigla, que prefere manter a decisão na direção nacional.", "titulo_pt": "Divisão do fundo eleitoral causa divergência no PT", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 22412, "titulo": "Decano da Alerj denunciou aplicações milionárias do Master no Rioprevidência e defende Casa", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/decano-da-alerj-denunciou-aplicacoes-milionarias-do-master-no-rioprevidencia-e-defende-casa.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em 2024, o deputado estadual Luiz Paulo Corrêa da Rocha denunciou ao TCE-RJ aplicações milionárias suspeitas do Rioprevidência no Banco Master. Ele também divulgou a denúncia em suas redes sociais.", "titulo_pt": "Decano da Alerj denuncia aplicações milionárias de Rioprevidência no Master e defende Casa", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 22413, "titulo": "Trump fez Joesley falar espanhol para testá-lo", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/eliogaspari/2026/06/trump-fez-joesley-falar-espanhol-para-testa-lo.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O livro 'Regime Change', escrito pela repórter Maggie Haberman e seu colega Jonathan Swan, foi lançado nos Estados Unidos. O livro detalha o primeiro ano do governo de Donald Trump, descrevendo-o como vingativo, egocêntrico e instável. Elon Musk, que trabalhava na Casa Branca, passou de ser considerado um gênio a ser visto como um doido.", "titulo_pt": "Trump fez Joesley falar espanhol para testá-lo? (título traduzido do original)", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 22414, "titulo": "Quando instituições são reconstruídas", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/ana-paula-vescovi/2026/06/quando-instituicoes-sao-reconstruidas.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil tende a ver suas crises institucionais como permanentes, mas o Espírito Santo demonstrou que instituições podem ser reconstruídas com liderança política, disciplina fiscal e cooperação entre Estado e sociedade.", "titulo_pt": "Quando as instituições são reconstruídas", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 22415, "titulo": "Bolsonaro pede que Moraes descarte falta grave por posse de arma e mantenha prisão domiciliar", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/bolsonaro-pede-que-moraes-descarte-falta-grave-por-posse-de-arma-e-mantenha-prisao-domiciliar.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-27T23:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A defesa de Jair Bolsonaro solicitou ao ministro Alexandre de Moraes que não considere a posse de arma como uma 'falta grave' e mantenha a prisão domiciliar do ex-presidente.", "titulo_pt": "Bolsonaro pede para Moraes não considerar falta grave por posse de arma", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 22639, "titulo": "STF forma maioria para liberar parte do pagamento dos penduricalhos a juízes e promotores", "url": "https://www.jota.info/stf/do-supremo/stf-forma-maioria-para-liberar-parte-do-pagamento-dos-penduricalhos-a-juizes-e-promotores", "fonte_id": "jota", "data_pub": "2026-06-27T21:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Corte Suprema do Brasil formou maioria para permitir o pagamento parcial de algumas gratificações e do adicional por tempo de serviço a juízes e promotores. Ficaram liberados os pagamentos de algumas gratificações e o adicional por tempo de serviço.", "titulo_pt": "STF autoriza parte do pagamento dos penduricalhos a magistrados e ministros", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 22416, "titulo": "Após prisão, vereador de SP Senival Moura pede afastamento do PT", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/apos-prisao-vereador-de-sp-senival-moura-pede-afastamento-do-pt.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-27T20:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O vereador paulistano Senival Moura, preso desde quinta-feira (25), pediu afastamento do PT neste sábado para se dedicar à sua defesa e não prejudicar a imagem do partido.", "titulo_pt": "Vereador de SP Senival Moura pede afastamento do PT após prisão", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 23550, "titulo": "Bahrein chiede un'azione internazionale per fermare l'aggressione dell'Iran", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/28/bahrein-chiede-unazione-internazionale-per-fermare-laggressione-delliran_7dd244fe-6d33-4864-80db-8f42ee3d5ff5.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-28T10:45:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O Bahrein pede uma ação internacional para parar a agressão do Irã. O país também solicita um intervenção do Conselho de Segurança da ONU.", "titulo_pt": "Bahreim pede ação internacional para frear agressão do Irã", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 23374, "titulo": "Trump Cut a Billion-Dollar Mining Deal. His Sons Stand to Profit.", "url": "https://www.nytimes.com/2026/06/28/world/europe/trump-lutnick-sons-kazakhstan.html", "fonte_id": "nyt_world", "data_pub": "2026-06-28T10:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo dos Estados Unidos e o Kazagistão chegaram a um acordo que permitiu que investidores americanos, com conexões ao presidente Donald Trump e ao secretário de Comércio Wilbur Ross, tenham acesso a uma das maiores reservas não exploradas de tungstênio do mundo. Essa parceria pode resultar em lucros para os filhos do presidente.", "titulo_pt": "Trump Fechou Acordo Milionário com Mineração. Filhos Podem Beneficiar", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 23498, "titulo": "New Caledonia polls close in French territory's first provincial elections since 2019", "url": "https://www.france24.com/en/france/20260628-new-caledonia-polls-close-in-french-territory-s-first-provincial-elections-since-2019", "fonte_id": "france24", "data_pub": "2026-06-28T10:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As urnas para as primeiras eleições provinciais da Nova Caledônia desde 2019 foram fechadas com uma taxa de participação de 54,42%. Os resultados dessas eleições, inicialmente planejadas para 2024, vão definir o equilíbrio de poder na região antes de novas negociações sobre o status da Nova Caledônia com a França, com a independência sendo o principal tema político.", "titulo_pt": "Eleições provinciais encerradas em Nova Caledônia após quatro anos", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 23497, "titulo": "Uganda's leading media outlets shut down by army chief", "url": "https://www.bbc.co.uk/news/articles/cj9gyk1z7ngo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-28T10:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As principais empresas de mídia de Uganda, NTV e Daily Monitor, relatam que suas sedes na capital estão sob 'assedio militar'.", "titulo_pt": "Uganda: principais veículos de mídia sob asseio militar", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 23257, "titulo": "Imagens militares mostram degradação das forças armadas de Cuba", "url": "https://www.cnnbrasil.com.br/internacional/imagens-militares-mostram-degradacao-das-forcas-armadas-de-cuba/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Imagens militares exibem equipamentos obsoletos intencionalmente, pois foram projetadas para transmitir uma imagem de desafio ao invés de força.", "titulo_pt": "Imagens militares mostram degradação das forças armadas de Cuba", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 23468, "titulo": "July 4th fireworks in Washington: What's different for America's 250th?", "url": "https://www.npr.org/2026/06/28/nx-s1-5869604/dc-fireworks-trump-250-world-record", "fonte_id": "npr_news", "data_pub": "2026-06-28T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O show de fogos de artifício programado para Washington, D.C., este ano marca o 250º aniversário da independência dos Estados Unidos. O evento será significativo devido ao jubileu.", "titulo_pt": "Fogos de artifício em Washington: O que mudou para a celebração do 250º aniversário da independência americana?", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 23551, "titulo": "Araghchi, qualsiasi interferenza su Hormuz aggraverà la situazione", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/28/araghchi-qualsiasi-interferenza-su-hormuz-aggravera-la-situazione_ff78c624-1876-4ed3-87eb-2237dead626b.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-28T09:58:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "De acordo com o acordo com os Estados Unidos, o Estreito de Ormuz retornará à gestão do Irã. O ministro das Relações Exteriores iraniano, Hossein Amir-Abdollahian, alertou que qualquer interferência no estreito agravará a situação.", "titulo_pt": "Araghchi: Qualquer interferência no Hormuz agravará a situação", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 23552, "titulo": "Governo Israele approva all'unanimità riconoscimento genocidio armeno", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/28/governo-israele-approva-allunanimita-riconoscimento-genocidio-armeno_1e3193ca-6f48-44b6-8ae3-dd6fc70ef2ea.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-28T09:55:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O governo israelense aprovou, por unanimidade, o reconhecimento do genocídio armeno. O ministro Sa'ar afirmou que 'não é nunca tarde demais para fazer a coisa certa'.", "titulo_pt": "Governo israelense aprova reconhecimento unânime de genocídio armeno", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 23553, "titulo": "Bri, rischio bolla Ai, alto debito e inflazione minacce a crescita", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/28/bri-rischio-bolla-ai-alto-debito-e-inflazione-minacce-a-crescita_004e4f08-ba9e-4b00-a4bc-5a668557c41a.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-28T09:54:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O relatório anual destaca que a estabilidade financeira está ameaçada por um aumento no número , "texto_pt": "Kazáquia está intensificando os laços com a presidência de Washington para contrabalançar suas vizinhos poderosos, Rússia e China.", "titulo_pt": "Líder da Kazáquia Aprofunda Relações com EUA, Chamando Trump de 'Enviado do Céu'", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 23380, "titulo": "Venezuelan earthquakes test Trump’s new western hemisphere policy after gutting of USAID", "url": "https://www.theguardian.com/us-news/2026/jun/28/venezuelan-earthquakes-test-trumps-new-western-hemisphere-policy-after-gutting-of-usaid", "fonte_id": "guardian_world", "data_pub": "2026-06-28T09:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo dos Estados Unidos está mobilizando uma resposta rápida e eficaz às recentes terremotos na Venezuela, considerando o país agora como um aliado na América Latina após a deposição do presidente Nicolás Maduro em janeiro. Este evento serve como uma prova do novo enfoque americano na região.", "titulo_pt": "Terremotos na Venezuela testam nova política hemisférica de Trump após derrube de Maduro", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 23228, "titulo": "Líbano sofre novo bombardeio israelense, afirma agência estatal", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/libano-sofre-novo-bombardeio-israelense-afirma-agencia-estatal.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-28T09:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A agência estatal libanesa NNA relatou um novo bombardeio aéreo israelense no sul do Líbano, dois dias após o país assinar um acordo com Israel visando uma 'paz duradoura'.", "titulo_pt": "Líbano registra novo bombardeio israelense, duas dias após acordo", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 23522, "titulo": "With 'Operation Purgatory,' Magyar moves to demolish Orban system", "url": ": "MacKenzie Scott levantando o patamar da filantropia americana", "veiculo": "Brazil Journal", "pais": "Brasil", "classe": "B"}, {"id": 23324, "titulo": "Como Juscelino matou o mercado", "url": "https://braziljournal.com/como-juscelino-matou-o-mercado/", "fonte_id": "brazil_journal", "data_pub": "2026-06-28T09:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Juscelino Kubitschek foi presidente durante o período dos '50 anos em cinco', do desenvolvimentismo e da construção da nova capital. Sua administração esteve alinhada com uma visão cultural moderna, como a bossa nova e o cinema novo.", "titulo_pt": "Como Juscelino matou o mercado", "veiculo": "Brazil Journal", "pais": "Brasil", "classe": "B"}, {"id": 23325, "titulo": "STJ nega uso de prejuízo fiscal de empresa para quitar dívida pessoal no Pert", "url": "https://www.jota.info/tributos/stj-nega-uso-de-prejuizo-fiscal-de-empresa-para-quitar-divida-pessoal-no-pert", "fonte_id": "jota", "data_pub": "2026-06-28T09:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Superior Tribunal de Justiça (STJ) manteve a decisão que negou o uso do prejuízo fiscal de uma empresa para quitar uma dívida pessoal. Este entendimento foi mantido pelo TRF da 2ª Região.", "titulo_pt": "STJ mantém negativa ao uso de prejuízo fiscal empresarial para quitar dívida pessoal", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 23236, "titulo": "EUA fazem enorme concessão ao suspender sanções sobre petróleo do Irã", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/eua-fazem-enorme-concessao-ao-suspender-sancoes-sobre-petroleo-do-ira.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-28T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos suspenderam sanções sobre o petróleo iraniano, concedendo uma vantagem econômica ao país. As equipes iranianas também obtiveram resultados positivos em jogos de futebol.", "titulo_pt": "EUA suspendem sanções sobre petróleo do Irã, dando vantagem econômica ao país", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 23604, "titulo": "Canada sends trade mission to Japan in diversification effort", "url": "https://www.japantimes.co.jp/business/2026/06/28/canada-trade-mission-japan/", "fonte_id": "japan_times", "data_pub": "2026-06-28T08:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Canadá está enviando uma missão comercial para o Japão com o objetivo de aumentar as relações comerciais, aproveitando seus recursos naturais e forças na inteligência artificial e produtos agrícolas.", "titulo_pt": "Canadá envia missão comercial ao Japão em esforço por diversificação", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 23327, "titulo": "Déficit dos Correios: há solução", "url": "https://www.jota.info/opiniao-e-analise/artigos/deficit-dos-correios-ha-solucao", "fonte_id": "jota", "data_pub": "2026-06-28T08:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A prioridade para resolver o déficit dos Correios é reduzir custos. O foco está na necessidade de cortar despesas para melhorar a situação financeira da empresa.", "titulo_pt": "Déficit dos Correios: prioridade é reduzir custos", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 23328, "titulo": "O split payment e a Divisão Pré-Crime", "url": "https://www.jota.info/opiniao-e-analise/artigos/o-split-payment-e-a-divisao-pre-crime", "fonte_id": "jota", "data_pub": "2026-06-28T08:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto questiona a proteção dos direitos de propriedade e do devido processo quando as máquinas tomam decisões antes que o evento ocorra.", "titulo_pt": "Split Payment e Divisão Pré-Crime", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 23329, "titulo": "Gamificação, jogos eletrônicos e ECA Digital: os limites legais do engajamento", "url": "https://www.jota.info/opiniao-e-analise/colunas/fronteiras-concorrencia-regulacao/gamificacao-jogos-eletronicos-e-eca-digital-os-limites-legais-do-engajamento", "fonte_id": "jota", "data_pub": "2026-06-28T08:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A avaliação da gamificação deve levar em consideração as premissas legais, a arquitetura do produto e os interesses dos usuários. O título em português é: Avaliação da gamificação, jogos eletrônicos e ECA Digital: os limites legais do engajamento.", "titulo_pt": "Avaliação da gamificação, jogos eletrônicos e ECA Digital: os limites legais do engajamento", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 23330, "titulo": "O juiz natural na era da inteligência artificial", "url": "https://www.jota.info/opiniao-e-analise/artigos/o-juiz-natural-na-era-da-inteligencia-artificial", "fonte_id": "jota", "data_pub": "2026-06-28T08:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A inteligência artificial veio para transformar o Direito, mas não para substituir a perspicácia humana.", "titulo_pt": "O juiz natural na era da inteligência artificial", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 23331, "titulo": "Integridade corporativa e combate ao crime organizado", "url": "https://www.jota.info/opiniao-e-analise/artigos/integridade-corporativa-e-combate-ao-crime-organizado", "fonte_id": "jota", "data_pub": "2026-06-28T08:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Programas de compliance devem ser implementados com seriedade, não sendo considerados apenas itens decorativos. É importante a adoção de medidas efetivas contra o crime organizado.", "titulo_pt": "Integridade corporativa e combate ao crime organizado", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 23263, "titulo": "Sucessão em PMEs: Por que planejamento não pode esperar negócio “dar certo”", "url": "https://www.cnnbrasil.com.br/economia/negocios/sucessao-em-pmes-por-que-planejamento-nao-pode-esperar-negocio-dar-certo/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "91% das pequenas e médias empresas no Brasil não possuem um plano estruturado para a transição de liderança. O artigo destaca a importância do planejamento nesse processo.", "titulo_pt": "Sucessão em PMEs: Por que o planejamento não pode esperar até que o negócio 'dê certo'", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 23332, "titulo": "O tratamento dos depósitos judiciais na transação tributária", "url": "https://www.jota.info/opiniao-e-analise/colunas/pauta-fiscal/o-tratamento-dos-depositos-judiciais-na-transacao-tributaria", "fonte_id": "jota", "data_pub": "2026-06-28T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A análise critica a isonomia e a eficácia do instituto dos depósitos judiciais na transação tributária.", "titulo_pt": "Análise crítica sobre a isonomia e a eficácia dos depósitos judiciais na transação tributária", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 23333, "titulo": "O impacto da LC 224 sobre a tributação de federações e confederações esportivas", "url": "https://www.jota.info/opiniao-e-analise/artigos/o-impacto-da-lc-224-sobre-a-tributacao-de-federacoes-e-confederacoes-esportivas", "fonte_id": "jota", "data_pub": "2026-06-28T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Lei Complementar 224 gerou significativa inquietação no meio jurídico e econômico.", "titulo_pt": "O impacto da LC 224 sobre a tributação de federações e confederações esportivas", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 23280, "titulo": "Selic só deve voltar a cair após El Niño e alívio do petróleo, diz economista", "url": "https://exame.com/economia/selic-so-deve-voltar-a-cair-apos-el-nino-e-alivio-do-petroleo-diz-economista/", "fonte_id": "exame", "data_pub": "2026-06-28T07:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O economista Adauto Lima, da Franklin Templeton, acredita que o Banco Central (BC) não reduzirá as taxas de juros Selic até que os efeitos do El Niño e a estabilidade dos preços do petróleo sejam observados. Ele sugere que o BC manterá as taxas elevadas até que os choques inflacionários diminuam.", "titulo_pt": "Selic só deve voltar a cair após fenômeno El Niño e alívio no petróleo, diz economista", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 23273, "titulo": "PEC da 6×1 completa um mês parada no Senado em meio a debate econômico", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/pec-da-6x1-completa-um-mes-parada-no-senado-em-meio-a-debate-economico/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T07:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Proposta de Emenda à Constituição (PEC) da 6×1 está parada no Senado há um mês. O Senado planeja realizar uma sessão de debate temático na próxima quarta-feira para discutir os impactos econômicos da medida.", "titulo_pt": "PEC da 6×1 completa um mês parada no Senado em meio a debate econômico", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 23632, "titulo": "Why Korea’s chip-heavy stock market isn’t overheating", "url": "https://www.koreaherald.com/article/10790562", "fonte_id": "korea_herald", "data_pub": "2026-06-28T05:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A exposição do Índice Kospi sul-coreano a mais de 50% das duas maiores fabricantes de chips, SK hynix e Samsung Electronics, não é excessiva considerando o forte prognóstico de lucros da indústria. Segundo Park Yeon-ju, da Mirae Asset Securities, as melhorias nos lucros dessas empresas são significativas e ainda não estão plenamente refletidas nas avaliações atualmente disponíveis.", "titulo_pt": "Por que a bolsa sul-coreana, com forte presença de fabricantes de chips, não está aquecendo", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}], "economia__eventos": [], "tecnologia": [{"id": 23640, "titulo": "Why Wear Anything Other Than a Sun Hoodie This Summer? Our Picks for the Best", "url": "https://www.wired.com/story/im-addicted-to-sun-hoodies/", "fonte_id": "wired", "data_pub": "2026-06-28T10:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sun hoodies são considerados a melhor nova peça de roupa desde o hoodie original. As escolhas para os melhores modelos estão disponíveis.", "titulo_pt": "Por que usar algo diferente de um suéter com chapéu de sol neste verão? Nossas escolhas para os melhores", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 23382, "titulo": "‘Tech firms are losing the public’: social media age bans near tipping point", "url": "https://www.theguardian.com/world/2026/jun/28/tech-firms-are-losing-the-public-social-media-age-bans-near-tipping-point", "fonte_id": "guardian_world", "data_pub": "2026-06-28T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Reino Unido se juntou a outros países em estabelecer uma idade mínima para acesso a plataformas de mídia social, enquanto grandes empresas de tecnologia enfrentam resistência global contra limitações. Arturo Béjar, ex-funcionário e informante da Meta (anteriormente Facebook), relatou que pais de todo o mundo temem o momento em que seus filhos poderão acessar a internet.", "titulo_pt": "Tecnológicas enfrentam crise com limitações de idade para acesso às redes sociais", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 23436, "titulo": "Paolo Benanti, el fraile que asesora al Vaticano en IA: “Las nuevas tecnologías se comieron parte de la realidad”", "url": "https://www.latercera.com/mundo/noticia/paolo-benanti-el-fraile-que-asesora-al-vaticano-en-ia-las-nuevas-tecnologias-se-comieron-parte-de-la-realidad/", "fonte_id": "la_tercera", "data_pub": "2026-06-28T10:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Paolo Benanti, um freio franciscano e principal especialista do Vaticano sobre Inteligência Artificial (IA), afirma que as novas tecnologias estão definindo a realidade atual. Ele argumenta que as empresas que desenvolvem essas tecnologias exercem poder significativo.", "titulo_pt": "Paolo Benanti, o freio que conselheia o Vaticano sobre IA: 'As novas tecnologias secomeram parte da realidade'", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 23443, "titulo": "There Are Three Types of AI Users", "url": "https://www.theatlantic.com/ideas/2026/06/ai-open-ai-anthropic/687689/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-28T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O texto destaca que a diferença entre os usuários de inteligência artificial não será baseada na inteligência, mas sim no seu relacionamento com o esforço mental.", "titulo_pt": "Existem Três Tipos de Usuários de IA", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 23641, "titulo": "This Is the Most Detailed Image Yet of the Milky Way's Center", "url": "https://www.wired.com/story/this-is-the-most-detailed-image-yet-of-the-milky-ways-center/", "fonte_id": "wired", "data_pub": "2026-06-28T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A telescopiographia espacial Euclid capturou uma imagem impressionante do centro da Via Láctea, que inclui mais de 60 milhões de estrelas. Este é o detalhamento mais aprofundado até agora obtido dessa região.", "titulo_pt": "Esta É a Imagem Mais Detalhada Ainda do Coração da Via Láctea", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 23642, "titulo": "The Ebike Accessories You Need to Help You Haul the Most Stuff", "url": "https://www.wired.com/story/how-to-trick-out-your-ebike/", "fonte_id": "wired", "data_pub": "2026-06-28T09:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um e-bicicleta básico é uma base para personalização. O artigo oferece dicas sobre como maximizar as capacidades de transporte de cargas e pessoas através do uso de acessórios.", "titulo_pt": "Os Acessórios de E-bike que Você Precisa Para Transportar a Maior Quantidade de Coisas", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 23535, "titulo": "AI ‘exuberance’ risks ending in lengthy investment bust, BIS warns", "url": "https://www.ft.com/content/e81ce414-e4bd-4e8c-bac7-94f7bf17def4", "fonte_id": "financial_times", "data_pub": "2026-06-28T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O BIS alerta que a exagerada confiança na inteligência artificial pode levar a um longo período de baixos retornos, o que ameaça o financiamento para empresas tecnológicas globalmente. Isso poderia resultar em uma forte redução no apoio financeiro para essas companhias.", "titulo_pt": "Exagero na IA pode levar a longo período de baixos retornos e ameaçar financiamento das empresas tecnológicas, avisa BIS", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 23643, "titulo": "China Defies US Restrictions and Builds the World’s Fastest Supercomputer", "url": "https://www.wired.com/story/china-defies-us-restrictions-and-builds-the-worlds-fastest-supercomputer/", "fonte_id": "wired", "data_pub": "2026-06-28T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O supercomputador chinês LineShine foi classificado como o mais rápido do mundo, apesar de não utilizar GPUs.", "titulo_pt": "China Desafia Restrições dos EUA e Constrói o Supercomputador Mais Rápido do Mundo", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 23644, "titulo": "(LEAD) Samsung, SK hynix to unveil investment plans this week: presidential office", "url": "https://en.yna.co.kr/view/AEN20260628002751320", "fonte_id": "yonhap_news", "data_pub": "2026-06-28T08:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Samsung Electronics Co. e SK hynix Inc. planejam anunciar seus planos de investimento nesta semana, conforme informou o escritório presidencial.", "titulo_pt": "Samsung e SK hynix vão divulgar planos de investimento esta semana: escritório presidencial", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 23279, "titulo": "A geração Z usa IA todo dia — mas está cada vez mais desconfiada", "url": "https://exame.com/inteligencia-artificial/a-geracao-z-usa-ia-todo-dia-mas-esta-cada-vez-mais-desconfiada-dela/", "fonte_id": "exame", "data_pub": "2026-06-28T07:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O uso da IA por jovens americanos continua estável, mas eles estão cada vez mais desconfiados e irritados, conforme indicou um levantamento da Gallup.", "titulo_pt": "A geração Z usa IA diariamente — mas está cada vez mais desconfiada", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 23282, "titulo": "Como Messi entrou para a IA, virou empresário e atraiu parcerias milionárias", "url": "https://exame.com/esporte/como-messi-entrou-para-a-ia-virou-empresario-e-atraiu-parcerias-milionarias/", "fonte_id": "exame", "data_pub": "2026-06-28T07:37:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Lionel Messi marcou 4 gols pela seleção argentina no Mundial, se tornando o recordista de gols na história da competição. Além disso, ele entrou para a indústria da inteligência artificial e se tornou empresário, atraiendo parcerias milionárias.", "titulo_pt": "Como Messi entrou na IA, se tornou empresário e conquistou parcerias milionárias", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 23270, "titulo": "Após disparada, tech volta a perder fôlego com questionamento sobre retorno", "url": "https://www.cnnbrasil.com.br/economia/mercado/apos-disparada-tech-volta-a-perder-folego-com-questionamento-sobre-retorno/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T07:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A tecnologia perdeu parte do fôlego após um crescimento explosivo que obrigou as empresas a gastarem e contratarem empréstimos de dezenas de bilhões de dólares para desenvolver tecnologia. Agora, há questionamentos sobre o retorno dessa investida.", "titulo_pt": "Após disparada, tech perde fôlego com questionamento sobre retorno", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 23648, "titulo": "(LEAD) Unionized workers of Samsung Biologics vote to leave Samsung Group United Union", "url": "https://en.yna.co.kr/view/AEN20260628002852320", "fonte_id": "yonhap_news", "data_pub": "2026-06-28T07:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Trabalhadores sindicalizados da Samsung Biologics votaram a favor de sair da União Samsung Group United Union.", "titulo_pt": "Trabalhadores da Samsung Biologics votam para deixar união com grupo Samsung", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 23598, "titulo": "Experts offer tips to secure data after Mirror star Stanley Yau loses phone", "url": "https://www.scmp.com/news/hong-kong/society/article/3358640/experts-offer-tips-secure-data-after-mirror-star-stanley-yau-loses-phone?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T06:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O membro do grupo de boy band Mirror, Stanley Yau Sze-chun, perdeu seu iPhone na cidade de Hong Kong e ficou surpreso ao descobrir que ele havia aparecido em um mercado vizinho a Shenzhen. Especialistas em tecnologia destacaram que recuperar dispositivos perdidos ou roubados da China continental pode ser difícil.", "titulo_pt": "Expertos oferecem dicas para proteger dados após membro do grupo Mirror perder o telefone", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 23288, "titulo": "A BlackBerry está de volta — mas esqueça o teclado: o foco agora são os robôs", "url": "https://exame.com/tecnologia/a-blackberry-esta-de-volta-mas-esqueca-o-teclado-o-foco-agora-sao-os-robos/", "fonte_id": "exame", "data_pub": "2026-06-28T06:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A BlackBerry está voltando ao mercado com foco no QNX, sua plataforma de software, para aplicações de inteligência artificial e robótica. A empresa está ganhando destaque com parcerias estratégicas com Nvidia e AMD.", "titulo_pt": "BlackBerry retorna, mas o foco agora são os robôs", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 23289, "titulo": "Você sabe quais dados a IA coleta sobre você?", "url": "https://exame.com/inteligencia-artificial/voce-sabe-quais-dados-a-ia-coleta-sobre-voce/", "fonte_id": "exame", "data_pub": "2026-06-28T06:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os prompts, arquivos enviados e histórico de conversas podem ser utilizados pelas plataformas de inteligência artificial de várias maneiras. Entender esse processo é essencial para proteger informações pessoais e corporativas.", "titulo_pt": "Você sabe quais dados a IA coleta sobre você?", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 23585, "titulo": "‘I see hope’: how mindset shifts help Hong Kong cancer patients cope with diagnosis", "url": "https://www.scmp.com/news/hong-kong/health-environment/article/3358611/i-see-hope-how-mindset-shifts-help-hong-kong-cancer-patients-cope-diagnosis?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sasa Hui Yuen-sim, uma aposentada de 67 anos, enfrenta diagnósticos múltiplos de câncer desde o verão de 2024 e sofre com o impacto psicológico da doença. A série Health Matters sobre câncer em Hong Kong explora os desafios psicológicos dos pacientes e como programas de apoio estão transformando a abordagem ao tratamento.", "titulo_pt": "Eu vejo esperança: como mudanças de mindset ajudam pacientes com câncer em Hong Kong a lidar com a diagnóstico", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 23586, "titulo": "3 seriously injured after minibus mounts pavement in Hong Kong", "url": "https://www.scmp.com/news/hong-kong/health-environment/article/3358662/3-seriously-injured-after-minibus-mounts-pavement-hong-kong?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T10:44:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um ônibus pequeno atingiu o calçamento em Kowloon City, Hong Kong, ferindo 20 pessoas. Três delas ficaram gravemente feridas.", "titulo_pt": "Três gravemente feridos após ônibus pequeno invadir calçada em Hong Kong", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 23653, "titulo": "Climate change to blame for intensity of Europe heat wave: Scientists", "url": "https://phys.org/news/2026-06-climate-blame-intensity-europe-scientists.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T10:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas afirmam que o aquecimento global humano é 'inquestionávelmente' responsável pela intensidade de uma onda de calor recorde atingindo a Europa.", "titulo_pt": "Clima quente na Europa atribuído ao aquecimento global: cientistas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 23254, "titulo": "Museu do Amanhã lança Escola de Ciências para debater futuro da sociedade", "url": "https://www.cnnbrasil.com.br/educacao/museu-do-amanha-lanca-escola-de-ciencias-para-debater-o-futuro-da-sociedade/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T10:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Museu do Amanhã lançou a Escola de Ciências com o objetivo de debater temas emergentes. O local atuará como um centro de discussão e guiará as atividades da instituição nos próximos dez anos.", "titulo_pt": "Museu do Amanhã lança Escola de Ciências para debater futuro da sociedade", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 23589, "titulo": "China fires up world’s biggest superconducting magnet for nuclear fusion project", "url": "https://www.scmp.com/news/china/science/article/3358642/china-fires-worlds-biggest-superconducting-magnet-nuclear-fusion-project?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O maior supercondutor magnético do mundo para um reator de fusão nuclear passou por testes finais como parte do projeto CRAFT ‘sol artificial’ da China, superando marcos internacionais. O equipamento consiste em dois bobinas: uma magnetização toroidal que atua como uma gaiola magnética e um solenoide central que serve de ignitores.", "titulo_pt": "China ativa maior supercondutor magnético do mundo para projeto de fusão nuclear", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 23654, "titulo": "How to tell a comet from an asteroid and a meteor from a meteorite", "url": "https://www.scientificamerican.com/article/how-to-tell-a-comet-from-an-asteroid-and-a-meteor-from-a-meteorite/", "fonte_id": "scientific_american", "data_pub": "2026-06-28T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Este guia descreve como diferenciar cometas, asteroides e meteoros de meteoritos que podem ser observados brilhando no céu noturno.", "titulo_pt": "Como distinguir cometas de asteroides e meteoros de meteoritos", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 23667, "titulo": "Could future astronauts use oysters as water filters? Here's why one company thinks so", "url": "https://www.space.com/technology/could-future-astronauts-use-oysters-as-water-filters-heres-why-one-company-thinks-so", "fonte_id": "space_com", "data_pub": "2026-06-28T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma protótipo de habitat de ostras para filtragem de água está sendo desenvolvida com o objetivo potencial de ser lançada no espaço no futuro. Uma versão inicial do dispositivo foi apresentada ao público este ano.", "titulo_pt": "Poderiam os astronautas usar ostras como filtros d'água no futuro? Veja por que uma empresa acredita nisso", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 23510, "titulo": "'Our infrastructure was designed for a climate that no longer exists': France's unfinished reckoning with increasing heatwaves", "url": "https://www.lemonde.fr/en/france/article/2026/06/28/our-infrastructure-was-designed-for-a-climate-that-no-longer-exists-france-s-unfinished-reckoning-with-increasing-heatwaves_6754944_7.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-28T09:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 2003, uma onda de calor inédita atingiu a França no meio do mês de agosto durante um período de férias do governo. O evento resultou na morte de 15 mil pessoas e transformou o sistema de alerta para doenças relacionadas ao calor, mas a França não aprendeu lições suficientes sobre adaptação às mudanças climáticas necessárias.", "titulo_pt": "Nossa infraestrutura foi projetada para um clima que mais não existe: a contínua procrastinação da França frente aos increasing heatwaves", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 23232, "titulo": "Perto do fim, neandertais europeus eram saudáveis e se reproduziam normalmente", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/06/perto-do-fim-neandertais-europeus-eram-saudaveis-e-se-reproduziam-normalmente.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-28T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O DNA de alguns dos últimos neandertais da Europa Ocidental indica que, antes de desaparecerem, esses primos extintos da humanidade não enfrentavam dificuldades para se perpetuar. Os dados anteriores sugeriam o contrário.", "titulo_pt": "Perto do fim, neandertais europeus eram saudáveis e se reproduziam normalmente", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 23458, "titulo": "Algo que no cambió en 15 millones de años: por qué las cosquillas revelan que humanos y simios se ríen casi igual", "url": "https://www.lanacion.com.ar/sociedad/algo-que-no-cambio-en-15-millones-de-anos-por-que-las-cosquillas-revelan-que-humanos-y-simios-se-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T09:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um estudo comparou a risada de crianças e grandes simiados e descobriu um padrão rítmico comum que remonta a um ancestral compartilhado, fornecendo pistas sobre o origem do linguajar.", "titulo_pt": "Algo que não mudou em 15 milhões de anos: por que as gargalhadas humanas e simianas são semelhantes", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 23286, "titulo": "Dinossauro de quatro asas pode ter sido predador das primeiras aves da Terra", "url": "https://exame.com/ciencia/dinossauro-de-quatro-asas-pode-ter-sido-predador-das-primeiras-aves-da-terra/", "fonte_id": "exame", "data_pub": "2026-06-28T06:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma espécie de dinossauro recém-descoberta na China pode ter sido predador das primeiras aves da Terra, explicando misteriosos aglomerados de ossos de aves fossilizadas há 120 milhões de anos.", "titulo_pt": "Dinossauro de quatro asas pode ter sido predador das primeiras aves da Terra", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 23287, "titulo": "Se reconhecer no espelho e truques: o que torna os golfinhos tão inteligentes?", "url": "https://exame.com/ciencia/se-reconhecer-no-espelho-e-truques-o-que-torna-os-golfinhos-tao-inteligentes/", "fonte_id": "exame", "data_pub": "2026-06-28T06:28:00Z", "idioma": "pt", "provavel_duplicata_de": n y-el-fetiche-historias-y-cicatrices-de-una-obsesion-milenaria-por-el-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T09:49:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Os orígenes exatos do primeiro sapato são desconhecidos e existem evidências de que eles surgiram há tempos pré-históricos. A obsessão milenar pelo calçado envolve tanto prazer quanto sofrimento, além do fetiche.", "titulo_pt": "Entre o prazer, o sofrimento e o fetichismo: histórias e marcas de uma obsessão milenar pelo calçado", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 23603, "titulo": "A French ship with close ties to Japan combines arts and sciences on the high seas", "url": "https://www.japantimes.co.jp/environment/2026/06/28/france-research-ship-japan/", "fonte_id": "japan_times", "data_pub": "2026-06-28T09:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A embarcação francesa Tara, com laços estreitos com o Japão, realiza pesquisas sobre microplásticos e a saúde dos recifes de corais, contribuindo para o entendimento das questões ambientais globais que se aguçam.", "titulo_pt": "Embarcação francesa com laços estreitos ao Japão combina arte e ciência nas águas", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 23457, "titulo": "La tragedia interminable de un país que aprendió a salvarse solo tras años de chavismo", "url": "https://www.lanacion.com.ar/el-mundo/la-tragedia-interminable-de-un-pais-que-aprendio-a-salvarse-solo-tras-anos-de-chavismo-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T09:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A devastação na costa carioca revelou novamente a instabilidade institucional, a desconfiança no poder e a resiliência da sociedade, que aprendeu a se manter sem muita esperança em um Estado fraco.", "titulo_pt": "A trágédia interminável de um país que aprendeu a se salvar sozinho após anos de chavismo", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 23657, "titulo": "I’m a psychiatrist who was terrified of horror films – until I learned about ‘cinematic neurosis’", "url": "https://www.theguardian.com/film/2026/jun/28/why-some-people-hate-horror-films-psychiatrist-cinematic-neurosis", "fonte_id": "guardian_culture", "data_pub": "2026-06-28T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O autor, um psiquiatra, relata sua infância e seu primeiro contato com um filme de horror que o deixou terrivelmente assustado. Isso marcou o início de sua vida longa medo do gênero.", "titulo_pt": "Eu sou um psiquiatra que tinha medo de filmes de terror – até aprender sobre 'neurose cinematográfica'", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 23664, "titulo": "Eight imaginative buildings with curving brickwork", "url": "https://www.dezeen.com/2026/06/28/curved-brick-buildings-roundup/", "fonte_id": "dezeen", "data_pub": "2026-06-28T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo apresenta oito edifícios com estruturas curvas feitas de tijolo, incluindo uma biblioteca em forma de concha no China e um mausoléu torretado. O design destes prédios utiliza a habilidade de moldar o tijolo em formas fluidas.", "titulo_pt": "Oito edifícios imaginativos com trabalhos de tijolo curvado", "veiculo": "Dezeen (design e arquitetura)", "pais": "Reino Unido", "classe": "B"}, {"id": 23658, "titulo": "‘I’ve only been addicted to two things – funk and praise’: Eddie Marsan’s honest playlist", "url": "https://www.theguardian.com/culture/2026/jun/28/eddie-marsan-honest-playlist-eric-clapton-james-brown-cameo-chas-dave", "fonte_id": "guardian_culture", "data_pub": "2026-06-28T08:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O ator Eddie Marsan compartilha suas primeiras experiências musicais, incluindo a canção My Sweet Lord de George Harrison e o singl
