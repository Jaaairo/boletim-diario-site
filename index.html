<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 09/07/2026 13:06 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">
    <div class="modal-erro" id="senha-erro" style="display:none">Senha incorreta.</div>

  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>
      <option value="classificacao_errada">Classificação errada</option>
      <option value="resumo_impreciso">Resumo impreciso</option>
      <option value="outro">Outro</option>
    </select>
    <label for="flag-nota">Nota (opcional)</label>
    <textarea id="flag-nota" placeholder="Descreva o problema..."></textarea>
    <div class="modal-btns">
      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "09/07/2026 13:06", "stats": {"noticias_novas": 716, "resumos_gerados": 0}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O governo Lula destinou R$ 33,89 bilhões em emendas até julho de 2026, superando o montante registrado nos últimos cinco ciclos eleitorais. Paralelamente, a equipe do senador Flávio Bolsonaro está preparando sua esposa para aumentar seu envolvimento na campanha presidencial, com foco nas mulheres. A justiça de Goiás reduziu o número de seguranças de Ronaldo Caiado e dos familiares dele para quatro policiais militares, em decisão provisória. A Procuradoria-Geral da República defendeu que Flávio Bolsonaro seja ouvido pela Polícia Federal na investigação sobre calúnia contra Lula.", "mundo": "O governo alemão planeja contrair um empréstimo de 800 bilhões de euros para rearmamento, uma mudança histórica no gasto público. Este aumento orçamentário será impulsionado pelo chefe do governo, Friedrich Merz, e envolverá investimentos significativos em armas não vistos desde a reunificação alemã. Em contraste, o presidente sul-coreano Lee Jae Myung estava programado para viajar à Turquia na terça-feira com o objetivo de participar do encontro da OTAN em Ancara, onde Keir Starmer buscará apoio dos aliados europeus para fortalecer a NATO. Devido às preocupações sobre as declarações do presidente dos EUA, Donald Trump, este evento ocorrerá em Ancara. Além disso, a França retirou todos os seus diplomatas do Burkina Faso após o país, sob governança militar, cortar relações com seu antigo colonizador. Em outro desenvolvimento, a Corte Europeia de Direitos Humanos ordenou que o estado italiano pague indenização a uma mulher cujas acusações de estupro repetido por seu parceiro foram descartadas como 'normal' por um promotor, argumentando-se que tal atitude perpetuou estereótipos sexistas e minimizou a violência contra as mulheres.\n\nA China realizou um teste de lançamento de um míssil balístico, o que irritou seus vizinhos e levantou preocupações geopolíticas na região. O evento foi criticado pela Austrália e Taiwan, que descreveram o teste como potencialmente instável. Em outro desenvolvimento, a construção de submarinos para o Canadá avançou com a escolha da construtora naval alemã TKMS em parceria com a norueguesa, superando a proposta sul-coreana. Essas movimentações refletem as tensões e alianças internacionais na esfera militar e diplomática.", "economia": "A Microsoft anunciou uma reestruturação que resultará na demissão de cerca de 4.800 funcionários, representando aproximadamente 2,1% da força de trabalho global. Em outro desenvolvimento econômico, a CVC vendeu o grupo D-Marin, especializado em marinas de iates de luxo, por mais de 1 bilhão de euros para um grupo francês, refletindo o interesse crescente no setor de superiores. As autoridades brasileiras enfrentam desafios com a regulamentação dos mercados de previsão, enquanto a Polícia Federal realiza uma operação contra a lavagem de dinheiro relacionada à exploração ilegal de apostas. A Microsoft também se prepara para mudanças nas comunicações com os investidores, com um alto executivo do Fed apoiando as propostas do novo chefe da instituição. Além disso, o Banco Central reduziu pela primeira vez sua previsão para a inflação em 2026, refletindo a melhora na situação econômica global devido à guerra no Irã.", "tecnologia": "A Samsung registrou um lucro operacional recorde de 89,4 trilhões de wones no segundo trimestre de 2023, impulsionado pelo ciclo supercíclico da inteligência artificial (IA). Além disso, houve uma proposta para permitir que famílias americanas adquiram uma participação minoritária na OpenAI por cerca de 300 dólares com o aumento do investimento na área de semicondutores. No entanto, as empresas de streaming como Netflix contestaram novas regras francesas que exigem a destinação de 20% dos investimentos em conteúdo local, consideradas uma ameaça à liberdade criativa. A Microsoft planeja cortar 4,8 mil empregos na unidade de jogos para ajustar a empresa às margens frágeis e queda no setor de hardware da indústria de videogames.", "ciencia": "Um estudo recente publicado no Scientific American sugere que a falta de sono pode levar ao ganho de peso e à maior sedentariedade, com os cientistas notando um impacto significativo mesmo após uma redução de apenas 90 minutos no horário de sono. Na área da biotecnologia, a empresa Vertex Pharmaceuticals adquiriu a Crinetics Pharmaceuticals por 10 bilhões de dólares em uma transação que reflete o aumento das aquisições no setor. A NASA anunciou um projeto-piloto buscando feedback das empresas americanas para o próximo estágio da sua estratégia de estações espaciais comerciais, com o objetivo de assegurar uma transição suave após o International Space Station. Além disso, a Agência Japonesa de Exploração Aeroespacial (Jaxa) divulgou imagens feitas por uma sonda que se aproximou do asteroide Torifune, revelando detalhes nunca antes vistos da rocha interestelar.", "cultura": "Stanley Plowman desenvolveu uma tipografia inovadora chamada 'Garble', que combina técnicas manuais tradicionais com processos digitais. Utilizando um plotador de caneta, ele cria designs complexos e intricados, lembrando estilos como espirografia, stencil e canetas felt. Este trabalho é publicado em uma zine, destacando a harmoniosa fusão entre o manual e o digital na arte gráfica contemporânea.", "sociedade": "Keelung revogará a exigência de licenciamento para uma creche após um caso de abuso infantil. O cacique Raoni, com 93 anos, deixou a Unidade de Terapia Intensiva (UTI) e apresenta evolução clínica favorável, após ser diagnosticado com pneumonia. Um projeto oferece um bono de R$ 30 mil por filho para apoiar famílias vulneráveis na região sul do Brasil. Uma jovem de 22 anos morreu em Paraty após ser atingida por um tiro no pescoço, levando a investigação da Polícia Civil. O governo eleito da Colômbia planeja implementar um programa de ajuste fiscal que visa reduzir o tamanho do Estado em 40%, ameaçando avanços sociais conquistados pelo presidente Petro. A CPTM está oferecendo vacinação gratuita contra sarampo em estações das linhas 11-Coral e 12-Safira na zona Leste de São Paulo, até o dia 20 de julho.", "meio_ambiente": "O Super El Niño representa um risco significativo para as lavouras globais, conforme relatório do Itaú BBA. Em Cuba, um novo apagão afetou 10 milhões de pessoas, sendo que este é o terceiro colapso total do sistema elétrico no país em 2026, refletindo a crise energética aprofundada pelo bloqueio petrolífero dos Estados Unidos. No Brasil, alertas foram emitidos para chuvas intensas no Sul, Norte e Nordeste, além de baixa umidade no Centro-Oeste, enquanto incêndios florestais na Espanha obrigaram a evacuação de 500 pessoas. No sul da China, o tufão Maysak causou mortes e forçou milhares a se evadirem, com rompimentos em barragens na província de Guangxi.", "direitos_humanos": "A entidade das Nações Unidas para os direitos humanos exigiu a libertação do médico palestiniano Hussam Abu Safia, que está detido pela Israel. Segundo sua família e advogado, ele corre risco iminente de vida e apresenta sinais de ter sido torturado. Em outro caso, o ministro de Esportes da França e o jogador Kylian Mbappé condenaram fortes declarações racistas feitas por uma senadora paraguaia após a eliminação do Paraguai em um torneio esportivo. Além disso, um juiz manteve a justa causa contra um ex-funcionário negro da empresa Coco Bambu que ofendeu um colega de forma racista, destacando que as manifestações racistas não podem ser consideradas apenas brincadeiras, independentemente do coro do ofensor."}, "resumo_do_dia": {"politica_nacional": [{"id": 42121, "titulo": "Cefet-MG pode virar universidade após Senado aprovar projeto. Entenda", "url": "https://www.metropoles.com/minas-gerais/cefet-mg-pode-virar-universidade-apos-senado-aprovar-projeto-entenda", "fonte_id": "metropoles", "data_pub": "2026-07-09T10:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O projeto que transforma o Cefet-MG (Centro Federal de Educação Tecnológica de Minas Gerais) em uma universidade foi aprovado no Senado e agora segue para a sanção do presidente Lula.", "titulo_pt": "cefet-mg pode virar universidade após senado aprovar projeto. entenda", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 42079, "titulo": "Ideia da seleção como alma da brasilidade perdeu sentido", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/marcosaugustogoncalves/2026/07/ideia-da-selecao-como-alma-da-brasilidade-perdeu-sentido.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-09T07:04:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ideia do futebol, especialmente o apresentado pela seleção brasileira, como expressão da nacionalidade e das características do país já realizou seu papel histórico. Essa noção teve destaque em determinados momentos do século XX, conforme analisado por intérpretes como José Miguel Wisnik.", "titulo_pt": "ideia da seleção como alma da brasilidade perdeu sentido", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 42092, "titulo": "Falta de policiamento é principal problema da segurança para moradores de SP, aponta Datafolha", "url": "https://g1.globo.com/sp/sao-paulo/eleicoes/2026/noticia/2026/07/09/falta-de-policiamento-e-principal-problema-da-seguranca-para-moradores-de-sp-aponta-datafolha.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-09T04:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A falta de policiamento foi apontada como o principal problema da segurança pública em São Paulo por 20% dos moradores, segundo uma pesquisa Datafolha divulgada recentemente. A pesquisa ouviu 1.608 eleitores entre 1º e 3 de julho em 71 cidades do estado.", "titulo_pt": "falta de policiamento é principal problema da segurança para moradores de sp, aponta datafolha", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 40588, "titulo": "Flávio foi ‘omisso’ com Michelle, diz ex-ministro de Bolsonaro", "url": "https://veja.abril.com.br/politica/flavio-foi-omisso-com-michelle-diz-ex-ministro-de-bolsonaro/", "fonte_id": "veja", "data_pub": "2026-07-09T01:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ex-ministro Ricardo Salles afirma que o senador Flávio Bolsonaro foi omisso no tratamento dado à ex-primeira-dama Michelle dentro do grupo político. Segundo Salles, os ataques a Michelle foram deixados de lado e ele compreende a reação dela.", "titulo_pt": "flávio foi ‘omisso’ com michelle, diz ex-ministro de bolsonaro", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 40430, "titulo": "Oncoclínicas não consegue quórum para debater recuperação extrajudicial", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/oncoclinicas-nao-consegue-quorum-para-debater-recuperacao-extrajudicial.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-09T01:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As duas assembleias convocadas pela Oncoclínicas para discutir um plano de recuperação extrajudicial não conseguiram atingir 0Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um ex-funcionário sênior dos Estados Unidos afirmou que a armamentização nuclear da Coreia do Sul levaria a um aumento da tensão. A declaração foi feita em Seul, na Coreia do Sul, no dia 9 de julho.", "titulo_pt": "ex-trocomercial diz que armamento nuclear da coreia do sul aumentaria tensão", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 42712, "titulo": "(URGENT) N. Korea's premier to visit China to attend event marking 65th anniv. of signing of friendship treaty: KCNA", "url": "https://en.yna.co.kr/view/AEN20260709007300315", "fonte_id": "yonhap_news", "data_pub": "2026-07-09T07:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O primeiro-ministro da Coreia do Norte visitará a China para participar de um evento que comemora o 65º aniversário do tratado de amizade entre os dois países. A informação foi divulgada pela Agência Central de Notícias da Coreia (KCNA).", "titulo_pt": "(urgente) primeiro-ministro da coreia do norte visita china para evento comemorando 65º aniversário do tratado de amizade: kcna", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 42713, "titulo": "S. Korean won weakens on renewed tensions in Middle East", "url": "https://en.yna.co.kr/view/AEN20260709007100320", "fonte_id": "yonhap_news", "data_pub": "2026-07-09T07:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O won sul-coreano enfraqueceu em relação ao dólar americano devido a novas tensões no Oriente Médio.", "titulo_pt": "coreia do sul: won se desvaloriza diante do dólar devido a tensões no oriente médio", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 42564, "titulo": "The Albanian Files: The Irregular Anatomy of an ‘Architectural Renaissance’", "url": "https://balkaninsight.com/2026/07/09/the-albanian-files-the-irregular-anatomy-of-albanias-architectural-renaissance/bi/", "fonte_id": "balkan_insight", "data_pub": "2026-07-09T05:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo livro de arquitetura revela o papel pessoal do primeiro-ministro Edi Rama na atração de arquitetos renomados para Albânia, o que levanta preocupações sobre uma forma informal de governança que prioriza pouco as regras e a transparência.", "titulo_pt": "Os Arquivos Albaneses: A Anatomia Irregular de Uma ‘Renaissance Arquitetônica’", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}, {"id": 42381, "titulo": "How to Save the UN From Irrelevance", "url": "https://www.foreignaffairs.com/ukraine/how-save-irrelevance", "fonte_id": "foreign_affairs", "data_pub": "2026-07-09T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo sugere formas de resolver a paralisia dos mantenedores da paz das Nações Unidas. O objetivo é evitar que a organização se torne irrelevante.", "titulo_pt": "como salvar as nações unidas da irrelevância", "veiculo": "Foreign Affairs", "pais": "EUA", "classe": "A"}, {"id": 42380, "titulo": "Trump Is Remaking Latin America", "url": "https://www.foreignaffairs.com/americas/trump-remaking-latin-america", "fonte_id": "foreign_affairs", "data_pub": "2026-07-09T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo discute os resultados a curto prazo e os riscos a longo prazo da 'Doença de Donroe'.", "titulo_pt": "trump está remodelando a América Latina", "veiculo": "Foreign Affairs", "pais": "EUA", "classe": "A"}, {"id": 42093, "titulo": "O colapso na trégua entre EUA e Irã - O Assunto #1757", "url": "https://g1.globo.com/podcast/o-assunto/noticia/2026/07/09/o-colapso-na-tregua-entre-eua-e-ira-o-assunto-1757.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-09T03:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente dos Estados Unidos, Donald Trump, declarou que não quer mais lidar com o Irã após novos ataques entre os países. A trég tems to counter Ukrainian drones", "url": "https://www.japantimes.co.jp/news/2026/07/09/world/russia-musk-starlink-ukraine-drones/", "fonte_id": "japan_times", "data_pub": "2026-07-09T01:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Kyiv tem desenvolvido drones que podem atingir alvos azenovéis de 30 quilômetros atrás das linhas avançadas, e muitos desses drones são controlados por meio dos sistemas Starlink. A Rússia está tentando interferir nos sistemas Starlink para contrapor essa capacidade ucraniana.", "titulo_pt": "Rússia tenta interromper sistemas Starlink para combater drones ucranianos", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 41697, "titulo": "Hanwha Systems launches unmanned surface vessel for sea trials", "url": "https://en.yna.co.kr/view/AEN20260709002200320", "fonte_id": "yonhap_news", "data_pub": "2026-07-09T00:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A divisão de defesa da Hanwha Group, conhecida como Hanwha Systems, lançou uma embarcação à superfície não tripulada para testes em alto mar. O evento ocorreu em Seul no dia 9 de julho.", "titulo_pt": "hanwha systems lança embarcação não tripulada para testes em alto mar", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 42118, "titulo": "Anvisa aprova medicamento para tratar doença de Chagas em crianças", "url": "https://www.metropoles.com/brasil/anvisa-aprova-medicamento-para-tratar-doenca-de-chagas-em-criancas", "fonte_id": "metropoles", "data_pub": "2026-07-09T10:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Agência Nacional de Vigilância Sanitária (Anvisa) aprovou um medicamento para o tratamento da doença de Chagas em crianças com idades entre 0 e 17 anos. A doença é uma das principais negligenciadas no Brasil.", "titulo_pt": "anvisa aprova medicamento para tratar doença de chagas em crianças", "veiculo": "Metrópoles", "pai undador da identidade coletiva. Apesar de se despedirem na fase de 16 avos de final, os Tubarões Azuis surpreenderam ao empatar com equipes campeãs mundiais e enfrentarem a Argentina.", "titulo_pt": "tubarões azuis dão lição de humildade e resiliência", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 42784, "titulo": "Africa’s cultural landmarks: rock-hewn churches of Lalibela, Ethiopia", "url": "https://aeon.co/videos/explore-the-wondrous-ethiopian-churches-that-are-carved-into-the-earth", "fonte_id": "aeon", "data_pub": "2026-07-09T10:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As igrejas de Lalibela na Étiopía foram esculpidas diretamente em uma única rocha, do topo ao fundo. Elas são únicas porque a maioria das edificações é construída de baixo para cima, pedra por pedra.", "titulo_pt": "África’s cultural landmarks: rock-hewn churches of Lalibela, Étiopía", "veiculo": "Aeon Magazine", "pais": "Reino Unido", "classe": "A"}, {"id": 42747, "titulo": "Bonnie Tyler totally eclipsed her power-ballad peers, and created an astonishingly wide variety of pop", "url": "https://www.theguardian.com/music/2026/jul/09/bonnie-tyler-totally-eclipsed-her-power-ballad-peers", "fonte_id": "guardian_culture", "data_pub": "2026-07-09T09:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Bonnie Tyler teve uma carreira notável com dois picos de sucesso global, um na década de 1970 e outro nos anos 80. Sua música 'Total Eclipse of the Heart' se tornou um hit mundial, embora seus primeiros sucessos tenham sido em outros gêneros musicais.", "titulo_pt": "bonnie tyler totally eclipsed sua peers e criou uma variedade impressionante de pop", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 42749, "titulo": "‘A lot of art in Ireland was made by one type of man’: Richard Malone on taking his colourful fabric creations to the EU Council", "url": "https://www.theguardian.com/artanddesign/2026/jul/09/richard-malone-ireland-eu-presidency-council", "fonte_id": "guardian_culture", "data_pub": "2026-07-09T09:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artista irlandês Richard Malone está exibindo suas esculturas coloridas e delicadas nos edifícios de vidro da Bélgica, durante a presidência irlandesa do Conselho da UE. Ele fala sobre sua colaboração com Björk e seu pai decorador, além de mencionar um cavalo que faz barulhos no estúdio rural onde trabalha.", "titulo_pt": "muita arte irlandesa foi feita por homens: richard malone sobre suas esculturas coloridas na europa", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 42751, "titulo": "PlayStation says it will stop making physical games – and that should worry us all", "url": "https://www.theguardian.com/games/2026/jul/07/playstation-sony-ending-physical-game-production", "fonte_id": "guardian_culture", "data_pub": "2026-07-09T08:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Sony anunciou que cessará a produção de jogos físicos para a PlayStation em 2028, marcando o fim do ecossistema criado pelos colecionadores entusiastas e sinalizando um movimento preocupante na indústria. O anúncio foi feito no blog da PlayStation, aproximadamente uma semana após a empresa admitir que removeria funcionalidades de jogos digitais.", "titulo_pt": "playstation anuncia fim da produção de jogos físicos - e isso nos preocupa", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 42584, "titulo": "‘Princess Mononoke’ comes alive in Super Kabuki staging", "url": "https://www.japantimes.co.jp/culture/2026/07/09/stage/ghibli-mononoke-kabuki-show/", "fonte_id": "japan_times", "data_pub": "2026-07-09T07:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O filme 'Princesa Mononoke' do Studio Ghibli está sendo adaptado para um espetáculo de Kabuki, uma das formas mais antigas de arte cênica no Japão. Este const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml() : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml() {
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml()}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

    const st = D.stats;

function filtrarSecao(topico) {

  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices().filter(function(v) { return v.lang === 'pt-BR' || v.lang.startsWith('pt'); });
    return vs[0] || null;
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // .sumario ou .destaque-analise imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
</body>
</html>
