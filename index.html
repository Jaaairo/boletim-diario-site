 "url": "https://exame.com/ciencia/a-california-esta-mais-perto-de-um-grande-terremoto-estudo-traz-novo-alerta/", "fonte_id": "exame", "data_pub": "2026-06-28T16:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa detectou o acúmulo de tensão mais significativo em mil anos nas principais falhas geológicas da Califórnia. Isso sugere que a região pode estar se aproximando do risco de um grande terremoto.", "titulo_pt": "A Califórnia está mais perto de um grande terremoto? Estudo traz novo alerta", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 24233, "titulo": "Better unemployment welfare could curb rise of populism", "url": "https://phys.org/news/2026-06-unemployment-welfare-curb-populism.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T16:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A pesquisa, conduzida pelos pesquisadores Chase Foster (King's College London) e Jeffry Frieden (Columbia University), analisou 134 eleições nacionais em 16 países entre 1990 e 2021, além de dados de 11 ondas da Enquete Social Europeia. Os resultados foram publicados na revista European Union Politics.", "titulo_pt": "Melhor assistência ao desemprego poderia reduzir o aumento do populismo", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24247, "titulo": "SpaceX sends 24 Starlink satellites into Earth orbit on Falcon 9 launch from California (video)", "url": "https://www.space.com/space-exploration/launches-spacecraft/spacex-starlink-17-40-b1088-vsfb-ocisly", "fonte_id": "space_com", "data_pub": "2026-06-28T16:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um foguete Falcon 9 da SpaceX lançou 24 satélites Starlink do Base Aérea Vandenberg, no estado da Califórnia, em 28 de junho de 2026.", "titulo_pt": "SpaceX lança 24 satélites Starlink a partir da Califórnia", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 24234, "titulo": "Australia boosts shark-spotting drone coverage at Sydney beaches", "url": "https://phys.org/news/2026-06-australia-boosts-shark-drone-coverage.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T15:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A partir de 1º de julho, a Austrália vai expandir o uso de drones para monitorar tubarões nas praias de Sydney e regiões adjacentes ao longo do ano inteiro. Esta medida foi tomada em resposta ao aumento no número de ataques e observações de tubarões.", "titulo_pt": "Austrália ampliará cobertura de drones para monitoramento de tubarões nas praias de Sydney", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24235, "titulo": "Shining blue light on gold-graphene nanodots achieves wound healing trifecta", "url": "https://phys.org/news/2026-06-blue-gold-graphene-nanodots-wound.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T15:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Através da exposição a uma luz azul brilhante, nanodotinhos de ouro grafeno podem atingir um triunvirato na cura de feridas, fornecendo três componentes necessários: um para matar bactérias, outro para limpar a ferida e um para promover a recuperação.", "titulo_pt": "Luz azul brilhante sobre nanodotinhos de ouro grafeno realiza triunvirato na cura de feridas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 24236, "titulo": "NASA races to save Swift telescope from falling back to Earth with daring rescue mission", "url": "https://phys.org/news/2026-06-nasa-swift-telescope-falling-earth.html", "fonte_id": "phys_org", "data_pub": "2026-06-28T15:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA está realizando uma missão ousada para evitar que um telescópio velho caia na Terra.", "titulo_pt": "NASA corre para salvar telescopio Swift de cair na Terra com missão arriscada", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 24615, "titulo": "Inside Japan’s rigid adoption system, a British family finds a way", "url": "https://www.japantimes.co.jp/community/2026/06/29/our-lives/british-family-japan-adoption/", "fonte_id": "japan_times", "data_pub": "2026-06-28T22:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "James Benstead afirma que a parte mais difícil do processo de adoção no Japão foi o tempo de espera além dos obstáculos burocráticos e linguísticos.", "titulo_pt": "Dentro do sistema rígido de adoção do Japão, uma família britânica encontra um jeito", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 24324, "titulo": "“Michael” supera “Oppenheimer” e se torna a maior cinebiografia da história", "url": "https://www.cnnbrasil.com.br/pop/cinema/michael-supera-oppenheimer-e-se-torna-a-maior-cinebiografia-da-historia/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T21:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A produção da Lionsgate, intitulada 'Michael', superou 'Oppenheimer' para se tornar a maior cinebiografia de todos os tempos. A obra continua batendo recordes em seu décimo fim de semana em cartaz globalmente.", "titulo_pt": "‘Michael’ supera ‘Oppenheimer’ e se torna a maior cinebiografia da história", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 24285, "titulo": "Comédia 'Tomando Rumo' e Billie Eilish: o que ver na TV e no streaming na segunda", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/comedia-tomando-rumo-e-billie-eilish-o-que-ver-na-tv-e-no-streaming-na-segunda.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-28T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um grupo de adolescentes rouba um carro de autoescola para ajudar o colega a rastrear e reconquistar sua namorada, que foi para a faculdade. Durante uma viagem de um dia, a amizade dos personagens enfrenta vários imprevistos.", "titulo_pt": "Comédia 'Tomando Rumo' e Billie Eilish: o que ver na TV e no streaming na segunda-feira", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 24286, "titulo": "'Supergirl' afunda em bilheteria mundial liderada por 'Toy Story 5'; veja lista", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/supergirl-afunda-em-bilheteria-mundial-liderada-por-toy-story-5-veja-lista.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-28T19:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O filme 'Supergirl', do universo da DC, arrecadou US$ 68 milhões no mundo durante sua primeira semana de exibição. Este resultado foi inferior às expectativas e comparado a 'Coringa: Delírio a Dois', que obteve US$ 114,8 milhões na mesma semana.", "titulo_pt": "Supergirl despenca nas bilheterias mundialmente lideradas por Toy Story 5; confira a lista", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 24307, "titulo": "Renato Russo e Cazuza adiantaram temas, diz autor de livro do rock", "url": "https://veja.abril.com.br/coluna/veja-gente/renato-russo-e-cazuza-adiantaram-temas-diz-autor-de-livro-do-rock/", "fonte_id": "veja", "data_pub": "2026-06-28T19:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O autor Fabrício Mazocco escreveu o livro 'Esse Tal de Rock'N'Roll', no qual discute como Renato Russo e Cazuza anteciparam temas em suas músicas.", "titulo_pt": "Renato Russo e Cazuza adiantaram temas, diz autor de livro do rock", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 23733, "titulo": "O curioso produto que esgotou nas vendas do Rock in Rio Lisboa", "url": "https://veja.abril.com.br/coluna/veja-gente/o-curioso-produto-que-esgotou-nas-vendas-do-rock-in-rio-lisboa/", "fonte_id": "veja", "data_pub": "2026-06-28T18:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Rock in Rio Lisboa encerra suas atividades no último dia, 28 de outubro. Um produto específico esgotou nas vendas durante o evento.", "titulo_pt": "Produto curioso esgota nas vendas do Rock in Rio Lisboa", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 24080, "titulo": "French research thrown into turmoil by a multifaceted crisis", "url": "https://www.lemonde.fr/en/science/article/2026/06/28/french-research-thrown-into-turmoil-by-a-multifaceted-crisis_6754955_10.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-28T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A comunidade científica francesa enfrenta diversos desafios, incluindo recursos financeiros limitados, ataques ideológicos e a ascensão da inteligência artificial. Isso está preocupando os pesquisadores em um momento em que a França também está perdendo terreno na publicação científica.", "titulo_pt": "Investigação francesa mergulha em turbulências diante de uma crise multifacetada", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 23932, "titulo": "Marina Lambertini: la ingeniera agrónoma detrás de un trabajo poco conocido y que es clave para uno de los principales alimentos", "url": "https://www.lanacion.com.ar/economia/campo/marina-lambertini-la-ingeniera-agronoma-detras-de-un-trabajo-poco-conocido-y-que-define-uno-de-los-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T17:56:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Marina Lambertini é uma engenheira agrônoma que conselha produtores hortícolas de diferentes regiões do país, focando na compartilhamento de conhecimentos, tecnologias e tracabilidade. Ela trabalha em um campo menos conhecido mas crucial para alguns dos alimentos mais importantes.", "titulo_pt": "Marina Lambertini: a engenheira agrônoma por trás de um trabalho pouco conhecido e que é essencial para um dos principais alimentos", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 23933, "titulo": "Conrado Estol sobre las relaciones personales y la longevidad: “La base de todo son los vínculos”", "url": "https://www.lanacion.com.ar/sociedad/conrado-estol-sobre-las-relaciones-personales-y-la-longevidad-la-base-de-todo-son-los-vinculos-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T17:55:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O neurologista Conrado Estol questiona a ideia de que o sucesso profissional é responsável pela felicidade. Segundo ele, a qualidade dos relacionamentos humanos é fundamental para uma vida longa e satisfeita.", "titulo_pt": "Conrado Estol sobre relações pessoais e longevidade: 'A base de tudo são os vínculos'", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 23950, "titulo": "Vodanovic duda de mesa de diálogo en el Senado por megarreforma: “La voluntad política la tienen los ministros”", "url": "https://www.latercera.com/politica/noticia/vodanovic-duda-de-mesa-de-dialogo-en-el-senado-por-megarreforma-la-voluntad-politica-la-tienen-los-ministros/", "fonte_id": "la_tercera", "data_pub": "2026-06-28T17:54:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Vodanovic expressou dúvidas sobre a mesa de diálogo proposta pelo Senado para discutir a megareforma, afirmando que não sabe quanto poder essa instância teria se o governo não concordasse. O parlamentar questiona a força política dessa medida.", "titulo_pt": "Vodanovic duvida da mesa de diálogo no Senado sobre megareforma", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 23828, "titulo": "Relembre 10 personagens LGBT+ que fizeram história nas telas do streaming", "url": "https://www.cnnbrasil.com.br/pop/streaming/relembre-10-personagens-lgbt-que-fizeram-historia-nas-telas-do-streaming/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T17:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Dia Internacional do Orgulho, comemorado neste domingo (28), é lembrado pela CNN Br id": 24318, "titulo": "Família é assaltada e policial militar aposentado é baleado no Itaim Bibi", "url": "https://www.cnnbrasil.com.br/nacional/sudeste/sp/familia-e-assaltada-e-policial-militar-aposentado-e-baleado-no-itaim-bibi/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T22:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma família foi assaltada e um policial militar aposentado foi baleado no bairro de Itaim Bibi. Os suspeitos, armados e utilizando motocicletas, estavam realizando roubos em comércios locais na tarde deste domingo (28) quando abordaram as vítimas.", "titulo_pt": "Família assaltada e policial militar aposentado baleado no Itaim Bibi", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 24287, "titulo": "Após terremotos, FAB resgata 13 brasileiros que estavam na Venezuela", "url": "https://g1.globo.com/politica/noticia/2026/06/28/governo-resgata-brasileiros-venezuela.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-28T22:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo federal resgatou 13 brasileiros que estavam na Venezuela após terremotos no país. Os cidadãos foram levados de avião pela FAB do Rio de Janeiro, via Caracas, capital venezuelana. O voo retornou ao Brasil vazio com ajuda humanitária.", "titulo_pt": "Governo resgata 13 brasileiros na Venezuela após terremotos", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 24451, "titulo": "El Gobierno busca a tres argentinos desaparecidos durante los terremotos en Venezuela", "url": "https://www.lanacion.com.ar/sociedad/el-gobierno-busca-a-tres-argentinos-desaparecidos-durante-los-terremotos-en-venezuela-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T22:20:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Três argentinos desaparecidos durante os terremotos na Venezuela foram reportados como desaparecidos. Quatro dos sete cidadãos argentinos foram localizados vivos, enquanto seis morreram e uma pessoa está internada em um centro de saúde local.", "titulo_pt": "Governos buscam três argentinos desaparecidos durante os terremotos na Venezuela", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 24453, "titulo": "Crimen en José C. Paz: mataron a tiros a un joven durante una reunión con amigos y detuvieron al principal sospechoso", "url": "https://www.lanacion.com.ar/seguridad/crimen-en-jose-c-paz-mataron-a-tiros-a-un-joven-durante-una-reunion-con-amigos-y-detuvieron-al-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T22:15:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um jovem foi morto a tiros durante uma reunião com amigos em José C. Paz, após uma discussão que levou um dos envolvidos a usar uma arma. O principal suspeito já foi detido.", "titulo_pt": "Caso em José C. Paz: jovem morto a tiros durante briga entre amigos e prisão do suspeito", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 24296, "titulo": "Venezuela: 680 mil crianças precisam de assistência humanitária, diz UNICEF", "url": "https://veja.abril.com.br/mundo/venezuela-680-mil-criancas-precisam-de-assistencia-humanitaria-diz-unicef/", "fonte_id": "veja", "data_pub": "2026-06-28T21:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A UNICEF estima que 680 mil crianças na Venezuela necessitam de assistência humanitária, e serão necessários 52 milhões de dólares para atender a emergência.", "titulo_pt": "Venezuela: 680 mil crianças precisam de assistência humanitária, avisa UNICEF", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 24620, "titulo": "To tackle elderly poverty crisis, Hong Kong needs to rethink retirement", "url": "https://www.scmp.com/opinion/hong-kong-opinion/article/3358216/tackle-elderly-poverty-crisis-hong-kong-needs-rethink-retirement?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T21:30:00Z", "idioma": "en" 568, "titulo": "Grim legacy of ‘Chavismo’ hinders Venezuela’s earthquake response", "url": "https://www.ft.com/content/ff881e75-92ed-4bcc-beb6-cd833b57fd4c", "fonte_id": "financial_times", "data_pub": "2026-06-28T20:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A herança do regime socialista, apoiado pelos Estados Unidos, está prejudicando a resposta à emergência causada pelo terremoto na Venezuela. A frustração crescente em relação aos esforços insuficientes de resgate estão levantando crise para o líder do governo.", "titulo_pt": "Herança do ‘Chavismo’ compromete resposta ao terremoto na Venezuela", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 24404, "titulo": "Cresce frustração com demora dos resgates na Venezuela: 'Há edifícios onde não foi removida uma única pedra sequer'", "url": "https://www.bbc.com/portuguese/articles/c04y1729k7wo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-28T19:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Venezuelanos expressam frustração com a demora nos resgates após o terremoto, denunciando uma resposta insuficiente das autoridades. O governo afirma estar trabalhando sem descanso para encontrar sobreviventes.", "titulo_pt": "Cresce frustração com demora dos resgates na Venezuela", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 23947, "titulo": "Carabineros detiene a sujeto apuntado como el responsable de incendio en edificio del centro de Santiago", "url": "https://www.latercera.com/nacional/noticia/carabineros-detiene-a-sujeto-apuntado-como-el-responsable-de-incendio-en-edificio-del-centro-de-santiago/", "fonte_id": "la_tercera", "data_pub": "2026-06-28T18:43:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um homem de nacionalidade peruana, com antecedentes por hurto, violência intrafamiliar e consumo de bebidas alcohólicas, foi detido como suspeito do incêndio em um edifício no centro de Santiago.", "titulo_pt": "Carabineiros detém homem peruano suspeito de incêndio em edifício central de Santiago", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 23798, "titulo": "Homem e mulher são achados mortos em galpão de fantasias de Carnaval", "url": "https://www.metropoles.com/sao-paulo/mortos-galpao-fantasias", "fonte_id": "metropoles", "data_pub": "2026-06-28T18:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um homem e uma mulher foram encontrados mortos em um galpão que armazena fantasias de Carnaval. Os corpos apresentaram sinais de perfuração e o caso está sendo investigado como possível homicídio pela Polícia Civil.", "titulo_pt": "Homem e mulher são achados mortos em galpão de fantasias de Carnaval", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 23817, "titulo": "Solidão e saúde mental são problema para Geração Z no trabalho, diz estudo", "url": "https://www.cnnbrasil.com.br/saude/solidao-e-saude-mental-sao-problema-para-geracao-z-no-trabalho-diz-estudo/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-28T18:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo aponta que a solidão e os problemas de saúde mental são desafios para a Geração Z no ambiente de trabalho. Quase 80% dos jovens nos Estados Unidos expressam interesse em carreiras relacionadas ao cuidado, buscando sentido e propósito na vida.", "titulo_pt": "Solidão e saúde mental são problema para Geração Z no trabalho, diz estudo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 24196, "titulo": "Carbon footprint labels added to tea products: station", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/29/2003859923", "fonte_id": "taipei_times", "data_pub": "2026-06-29T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Etiquetas de rastro de carbono foram adicionadas a produtos de chá. Esta medida visa aumentar a transparência sobre o impacto ambiental desses produtos.", "titulo_pt": "Etiquetas de rastro de carbono para produtos de chá", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 24198, "titulo": "Officials monitor Wanli River amid heavy rain", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/29/2003859925", "fonte_id": "taipei_times", "data_pub": "2026-06-29T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Autoridades monitoram o Rio Wanli devido a chuvas intensas.", "titulo_pt": "Autoridades monitoram Rio Wanli durante fortes chuvas", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 24405, "titulo": "O que está por trás da onda de calor na Europa associada a 1.300 mortes", "url": "https://www.bbc.com/portuguese/articles/czdeq4mvz53o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-28T22:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O chefe da OMS, Tedros Adhanom Ghebreyesus, advertiu que a Europa não está preparada para as altas temperaturas associadas às cúpulas de calor e mudanças climáticas. Mais de 1.300 mortes foram registradas em conexão com essa onda de calor.", "titulo_pt": "O que está por trás da onda de calor na Europa associada a mais de 1.300 mortes", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 24356, "titulo": "Calor recorde na Europa deforma asfalto, mata milhares e paralisa usinas", "url": "https://exame.com/esg/calor-recorde-na-europa-deforma-asfalto-mata-milhares-e-paralisa-usinas/", "fonte_id": "exame", "data_pub": "2026-06-28T18:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A onda de calor recorde avança pela Europa, afetando cidades que ainda não se prepararam adequadamente para esse tipo de fenômeno. O calor extremo é considerado a mais severa já registrada para o mês de junho e está causando danos significativos.", "titulo_pt": "Onda de calor recorde atinge Europa, causando danos em cidades despreparadas", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 24315, "titulo": "Sobe para 1.450 número de mortos por terremoto na Venezuela", "url": "https://www.brasildefato.com.br/2026/06/28/sobe-para-1450-numero-de-mortos-por-terremoto-na-venezuela/", "fonte_id": "brasil_de_fato", "data_pub": "2026-06-28T18:45:00Z", "idioma": "pt", "provavel_duplicata_de": 23824, "texto_pt": "O número de mortos por terremotos na Venezuela aumentou para 1.450, conforme informado pelo presidente da Assembleia Nacional, Jorge Rodríguez, no domingo (28). Foram realizados 3.150 atendimentos a pessoas feridas.", "titulo_pt": "Número de mortos por terremotos na Venezuela sobe para 1.450", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 23919, "titulo": "Ola de calor en Europa: más de 1300 muertes vinculadas a las temperaturas extremas en una semana", "url": "https://www.lanacion.com.ar/el-mundo/ola-de-calor-en-europa-mas-de-1300-muertes-vinculadas-a-las-temperaturas-extremas-en-una-semana-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-28T18:31:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Mais de 1.300 mortes foram atribuídas ao calor extremo na Europa durante uma semana, segundo a OMS. O diretor geral da organização, Tedros Adhanom Ghebreyesus, relatou que cerca de 150 milhões de pessoas vivem sob condições de calor extremo, com encerramento de escolas e falhas nas redes elétricas.", "titulo_pt": "Onda de calor na Europa: mais de 1.300 mortes ligadas ao clima extremo em uma semana", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 24001, "titulo": "Germany, Czechia, Poland and Hungary swelter through hottest days on record", "url": "https://www.theguardian.com/environment/2026/jun/28/temperature-records-tumble-across-europe-as-heatwave-moves-east", "fonte_id": "guardian_world", "data_pub": "2026-06-28T17:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Temperaturas recordes acima de 40C foram registradas na Alemanha, Tchecoslováquia, Polônia e Hungria durante uma onda de calor que se espalhou para leste. Mais de 191 milhões de pessoas em toda a Europa estiveram sujeitas a temperaturas acima de 35C.", "titulo_pt": "Alemanha, Tchecoslováquia, Polônia e Hungria enfrentam dias mais quentes da história", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 24151, "titulo": "Three firefighters killed in US wildfires along Colorado–Utah border", "url": "https://www.aljazeera.com/news/2026/6/28/three-firefighters-killed-in-us-wildfires-along-colorado-utah?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-28T15:16:00Z", "idioma": "en", "provavel_duplicata_de": 24078, "texto_pt": "Três bombeiros morreram durante incêndios florestais nos Estados Unidos, na fronteira entre Colorado e Utah. Este ano, o país enfrenta uma temporada severa de incêndios, impulsionada por secas prolongadas e condições secas.", "titulo_pt": "Três bombeiros mortos em incêndios florestais na fronteira do Colorado com o Utah", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 23291, "titulo": "Onda de calor extremo mata mil pessoas na França em apenas 3 dias", "url": "https://www.metropoles.com/mundo/onda-de-calor-extremo-mata-mil-pessoas-na-franca-em-apenas-3-dias", "fonte_id": "metropoles", "data_pub": "2026-06-28T10:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério da Saúde estimou que mil pessoas morreram devido a uma onda de calor extremo na França em apenas três dias. Este verão no hemisfério norte já quebrou diversos recordes históricos de temperatura.", "titulo_pt": "Onda de calor extremo mata mil pessoas na França em 3 dias", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 23294, "titulo": "Após dias congelantes, ciclone e frente fria levam temporais ao Sul", "url": "https://www.metropoles.com/brasil/apos-dias-congelantes-ciclone-e-frente-fria-levam-temporais-ao-sul", "fonte_id": "metropoles", "data_pub": "2026-06-28T09:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ciclone e frente fria levam temporais ao Sul do país, enquanto no Sudeste o tempo permanece relativamente estável com sol entre nuvens e temperaturas elevando.", "titulo_pt": "Após dias congelantes, ciclone e frente fria causam temporais no Sul", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 23602, "titulo": "India’s gig workers pay the price for exposure to New Delhi’s hazardous air", "url": "https://www.japantimes.co.jp/environment/2026/06/28/india-gig-workers-hazardous-air/", "fonte_id": "japan_times", "data_pub": "2026-06-28T09:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Milhões de trabalhadores gig na indústria de comércio eletrônico do país estão expostos a ar poluído nas cidades indianas, comprometendo sua saúde. A qualidade do ar continua um desafio para as cidades indianas.", "titulo_pt": "Trabalhadores gigger da Índia pagam o preço pela exposição ao ar perigoso de Nova Deli", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 23519, "titulo": "More than 68,000 people still missing in Venezuela after devastating earthquakes", "url": "http://www.euronews.com/2026/06/28/more-than-68000-people-still-missing-in-venezuela-after-devastating-earthquakes", "fonte_id": "euronews", "data_pub": "2026-06-28T08:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de 68 mil pessoas ainda estão desaparecidas na Venezuela após os terremotos devastadores. O Programa das Nações Unidas para o Desenvolvimento (PNUD) estima que o dano direto físico causado pelos terremotos custou aproximadamente 6,7 bilhões de dólares.", "titulo_pt": "Mais de 68 mil pessoas ainda desaparecidas na Venezuela após os terremotos devastadores", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 23315, "titulo": "Alemanha e Dinamarca registram temperaturas recordes; onda de calor avança ao leste", "url": "https://www.infomoney.com.br/mundo/alemanha-e-dinamarca-registram-temperaturas-recordes-onda-de-calor-avanca-ao-leste/", "fonte_id": "infomoney", "data_pub": "2026-06-28T07:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Dinamarca registrou sua temperatura mais alta de todos os tempos, e a onda de calor se deslocou para o leste, afetando também a Polônia. Antes disso, Alemanha, Reino Unido, França e Suíça já haviam enfrentado recordes de calor em junho.", "titulo_pt": "Alemanha e Dinamarca registram temperaturas recorde; onda de calor avança para o leste", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}], "meio_ambiente__eventos": [{"titulo": "Registram-se mil mortes em três dias por causa do calor na França", "sumario": "Em três dias, mais de mil pessoas morreram na França devido à onda de calor extremo que começou em 24 de junho. A França registrou mais de mil mortes relacionadas ao calor extremo, com a maioria das vítimas sendo idosos. A onda de calor na Europa causou pelo menos 1.000 mortes a mais na França.", "artigos": [{"id": 24314, "titulo": "Recordes de calor se espalham pela Europa; França registra mais de mil mortes em três dias", "url": "https://www.brasildefato.com.br/2026/06/28/recordes-de-calor-se-espalham-pela-europa-franca-registra-mais-de-mil-mortes-em-tres-dias/", "fonte_id": "brasil_de_fato", "data_pub": "2026-06-28T19:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em três dias, mais de mil pessoas morreram na França devido à onda de calor extremo que começou em 24 de junho. O serviço de ambulância foi acionado para atender a mais de 120 mil chamados durante esse período.", "titulo_pt": "Registram-se mil mortes em três dias por causa do calor na França", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 23841, "titulo": "Calor recorde causa transtornos na Europa; França registra 1.000 mortes", "url": "https://www.infomoney.com.br/mundo/calor-recorde-causa-transtornos-na-europa-franca-registra-1-000-mortes/", "fonte_id": "infomoney", "data_pub": "2026-06-28T17:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A França registrou mais de mil mortes relacionadas ao calor extremo, com a maioria das vítimas sendo idosos. A agência francesa de saúde pública alertou que o número de óbitos pode aumentar.", "titulo_pt": "Calor recorde causa transtornos na Europa; França registra mais de mil mortes", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 24157, "titulo": "European heatwave causes 1,000 excess deaths in France", "url": "https://www.aljazeera.com/news/2026/6/28/european-heatwave-causes-1000-excess-deaths-in-france?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-28T14:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A onda de calor na Europa causou pelo menos 1.000 mortes a mais na França. A AFP prevê que cerca de 191 milhões de pessoas em toda a Europa irão experimentar temperaturas acima dos 35°C.", "titulo_pt": "Onada de calor na Europa causa mil mortes extras na França", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}]}], "direitos_humanos": [{"id": 24188, "titulo": "China ethnicity law restricts room for neutrality: official", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/29/2003859915", "fonte_id": "taipei_times", "data_pub": "2026-06-29T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um oficial afirmou que a lei de etnia da China limita o espaço para neutralidade. A lei estabelece regras sobre a identidade étnica, possivelmente afetando a liberdade de expressão e perspectivas não-chinesas.", "titulo_pt": "Lei de etnia da China restrinja a neutralidade: oficial", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 23795, "titulo": "Marcas voltam a apoiar o Orgulho LGBT após temporadas conservadoras", "url": "https://www.metropoles.com/colunas/ilca-maria-estevao/marcas-voltam-a-apoiar-o-orgulho-lgbt-apos-temporadas-conservadoras", "fonte_id": "metropoles", "data_pub": "2026-06-28T18:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Orgulho LGBT+ é comemorado neste domingo, 28 de junho. Quatro marcas de moda que apoiam a causa são destacadas no artigo.", "titulo_pt": "Marcas voltam a apoiar o Orgulho LGBT+ após temporadas conservadoras", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 23800, "titulo": "Dia do Orgulho LGBTQIA+: 5 vezes que a coluna falou sobre o movimento", "url": "https://www.metropoles.com/colunas/pouca-vergonha/dia-do-orgulho-lgbtqia-5-vezes-que-a-coluna-falou-sobre-o-movimento", "fonte_id": "metropoles", "data_pub": "2026-06-28T18:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Dia do Orgulho LGBTQIA+ é celebrado neste domingo (29/6). A coluna discutiu cinco momentos relevantes para o movimento.", "titulo_pt": "Dia do Orgulho LGBTQIA+: 5 vezes que a coluna falou sobre o movimento", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 24172, "titulo": "Police in Turkey detain dozens at Istanbul Pride event after authorities banned march", "url": "https://www.scmp.com/news/world/europe/article/3358674/police-turkey-detain-dozens-istanbul-pride-event-after-authorities-banned-march?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T17:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Turcos detiveram pelo menos 50 pessoas, incluindo um jornalista, durante um evento Gay Pride em Istambul, apesar de uma proibição local e do lockdown da principal área de encontro da cidade. As autoridades locais também proibiram manifestações em pontos-chave de reunião, como o bairro asiático de Kadikoy.", "titulo_pt": "Polícia turca detém várias pessoas durante evento Gay Pride em Istambul, apesar da proibição", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 23746, "titulo": "ONU estima 50 mil desaparecidos enquanto resgates seguem na Venezuela", "url": "https://veja.abril.com.br/mundo/onu-estima-50-mil-desaparecidos-enquanto-resgates-seguem-na-venezuela/", "fonte_id": "veja", "data_pub": "2026-06-28T17:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ONU estima que cerca de 50 mil pessoas estejam desaparecidas enquanto os resgates continuam na Venezuela após um dos terremotos mais graves da América Latina. O Brasil realizou seu quarto voo humanitário para auxiliar as vítimas.", "titulo_pt": "ONU estima 50 mil desaparecidos enquanto resgates seguem na Venezuela", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 24605, "titulo": "Israel took wounded Palestinian from hospital; 18 months later, family told he is dead", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/israel-took-wounded-palestinian-hospital-18-months-later-family-told-he", "fonte_id": "middle_east_eye", "data_pub": "2026-06-28T17:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O pai do Palestiniano Majdi Nour Abu Ara foi informado, 18 meses após o ocorrido, que seu filho foi morto quando um veículo em que ele viajava foi bombardeado por forças israelenses no norte de Tubas, na Cisjordânia ocupada. As autoridades israelenses teriam ocultado a informação sobre seu paradeiro durante esse período.", "titulo_pt": "Israel retirou ferido palestiniano do hospital; 18 meses depois, família é informada de que ele está morto", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 23593, "titulo": "Australian arrested after Thai teen girl found dead in suitcase", "url": "https://www.scmp.com/news/asia/southeast-asia/article/3358651/australian-arrested-after-thai-teen-girl-found-dead-suitcase?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-28T09:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um homem australia eiculo": "NPR News", "pais": "EUA", "classe": "A"}], "destaque": {"titulo_evento": "Irã ataca Bahrain e Kuwait após operações dos EUA", "texto_pt": "O Irã lançou uma série de ataques contra Bahrain e Kuwait em resposta a recentes operações militares realizadas pelos Estados Unidos na região. Estas ações, que incluíram o uso de drones e mísseis, foram vistas como uma reação direta aos bombardeios americanos. O Irã ameaçou interromper as negociações e fechar o Estreito de Ormuz se os Estados Unidos continuarem suas atividades militares na área. As ações do Irã agravaram a crise no Estreito de Ormuz, um local estratégico para o comércio global. Além disso, as operações dos EUA e as reações do Irã parecem indicar uma instabilidade crescente nas relações entre os dois países. As ameaças de paralisação das negociações sugerem que a situação pode se deteriorar ainda mais, com possíveis implicações significativas para a economia global, especialmente no setor de petróleo e gás, que depende do fluxo seguro através do Estreito de Ormuz. As ações do Irã também podem ter impactos humanitários locais, particularmente em Bahrain e Kuwait, além de possíveis consequências científicas, como interrupções no funcionamento de infraestruturas críticas para o monitoramento ambiental da região.", "data_edicao": "2026-06-28", "artigos": [{"id": 24186, "titulo": "Iran attacks Bahrain and Kuwait following US strikes", "url": "https://www.taipeitimes.com/News/front/archives/2026/06/29/2003859908", "fonte_id": "taipei_times", "data_pub": "2026-06-29T00:00:00Z", "topico": "geopolitica", "idioma": "en", "texto_resumo": "O Irã criticou e atacou Bahrain e Kuwait após operações militares realizadas pelos Estados Unidos. As ações do Irã foram vistas como uma resposta às recentes atividades dos EUA na região.", "titulo_pt": "Irã critica e ataca Bahrain e Kuwait após operações dos EUA", "texto_pt": "O Irã criticou e atacou Bahrain e Kuwait após operações militares realizadas pelos Estados Unidos. As a const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${artsHtml ? `<div class="destaque-fontes">
      <h3>Fontes desta edição</h3>
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}
</script>
</body>
</html>
