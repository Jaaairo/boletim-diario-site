<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>
</head>

<script>
const D = {"gerado_em": "25/06/2026 21:07", "stats": {"noticias_novas": 187, "resumos_gerados": 284}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O Supremo Tribunal Federal (STF) decidiu que a ausência de provas no âmbito penal não impede automaticamente um processo por improbidade administrativa, estabelecendo limites para os casos em que a absolvição criminal pode ser considerada como impedimento para ações de improbidade. Em outro caso relevante, o STF vai retomar o julgamento da Lei de Improbidade Administrativa na quarta-feira, definindo as regras de prescrição para casos de improbidade. O ministro André Mendonça determinou a transferência do ex-banqueiro Daniel Vorcaro para a Penitenciária Papudinha em Brasília e suspendeu a aplicação de multas por descumprimento às regras de saúde mental previstas na NR-1, convocando uma conciliação entre as partes envolvidas. A Polícia Federal (PF) investiga executivos do Itaú, Bradesco e Santander, além de Beto Sicupira e o filho de Jorge Paulo Lemann, por suspeita de envolvimento em fraude na Americanas.  A PF também deflagrou a segunda fase da operação Disclosure, que investiga fraudes contábeis na varejista Americanas, visando pessoas suspeitas de participação nas fraudes. O presidente Lula assinou os contratos para a conclusão da planta de fertilizantes Nitrogenados III em Três Lagoas, Mato Grosso do Sul, e anunciou Teresa Leitão como a nova líder do governo no Senado, substituindo Wagner. Márcio França (PSB) será o candidato a vice-governador na chapa de Fernando Haddad (PT) para as eleições em São Paulo.", "mundo": "Dois terremotos de grande magnitude abalaram a Venezuela, causando centenas de mortes e deixando o país devastado. Equipes trabalham incansavelmente para resgatar pessoas presas sob os escombros e avaliar os danos causados pelos sismos. O presidente venezuelano anunciou ajuda humanitária internacional, incluindo uma missão do Brasil com bombeiros e técnicos da Defesa Civil. A tragédia coloca à prova a relação recém-estabelecida entre a Venezuela e os Estados Unidos após o governo Trump ter declarado o sucesso de uma intervenção militar na região.\n\nPelo menos 188 pessoas morreram após dois terremotos de grande magnitude atingirem a Venezuela. Os tremores, que ocorreram em rápida sucessão, causaram danos significativos e deixaram milhares de pessoas desaparecidas. Equipes de resgate trabalham para encontrar sobreviventes presos sob os escombros de edifícios colapsados. O governo venezuelano solicitou ajuda internacional para lidar com as consequências da tragédia.  Em outros eventos geopolíticos, o Irã afirmou que navios que navegarem por rotas fora do quadro designado pelo PGSA no Estreito de Ormuz não terão cobertura de garantia de passagem segura. A Autoridade do Golfo Pérsico (PGSA) advertiu os navios para utilizarem apenas as rotas aprovadas por Teerã. Israel afirmou que suas forças militares permanecerão indefinidamente nos territórios do Líbano, Gaza e Síria, apesar dos esforços diplomáticos em andamento e da pressão internacional. A decisão ocorre em meio a tensões persistentes na região. No cenário global, o debate sobre a China no cenário político americano se intensifica, com autoridades americanas expressando preocupação com o avanço tecnológico do país.", "economia": "O Banco Central do Brasil reduziu a taxa Selic de 14,5% para 14,25% ao ano, justificando a decisão pela ampliação do horizonte relevante para controlar a inflação. A partir de agora, o primeiro trimestre de 2028 será considerado como meta.  Em meio à crise econômica global, o Banco Central do México manteve a taxa básica de juros em 6,50%, sinalizando que a taxa deve permanecer estável por mais tempo devido às incertezas sobre a inflação e à fraqueza da atividade econômica. No Brasil, a arrecadação federal atingiu R$ 266,8 bilhões em maio de 2026, o maior valor para o mês desde 1995. O aumento foi impulsionado pelo crescimento das receitas ligadas ao petróleo, pela atividade econômica e por mudanças na tributação. As vendas de títulos públicos a pessoas físicas pelo Tesouro Direto alcançaram R$ 10,22 bilhões em maio, representando um aumento significativo em relação aos meses anteriores, impulsionado pelo lançamento do novo título Tesouro Reserva.  A inflação brasileira desacelerou, com o IPCA-15 registrando 0,41% em junho, a segunda queda consecutiva na taxa de inflação. O mercado financeiro acompanha de perto as decisões do Federal Reserve (Fed) nos Estados Unidos, que enfrenta um cenário inflacionário desafiador. Apesar da alta inflação, o mercado apostou que o Fed não elevará a taxa de juros em julho, mas prevê um aumento em setembro.", "tecnologia": "A Apple aumentou os preços dos seus MacBooks e iPads em 20%, justificando o aumento pela escassez de memória impulsionada pela inteligência artificial. O valor de mercado da empresa diminuiu US$ 263 bilhões após o anúncio. Em outro evento tecnológico, a empresa Colossal e o governo americano estão criando um 'BioVault', um banco de dados genético para espécies ameaçadas, em meio à tentativa do governo Trump de enfraquecer leis de proteção ambiental.  A intensificação da competição no setor de inteligência artificial coloca pressão sobre empresas como Anthropic e OpenAI, que precisam convencer investidores sobre o valor de seus modelos proprietários antes das Ofertas Públicas Iniciais (OPIs). A Dell defende a adoção de servidores próprios para acesso à inteligência artificial corporativa, argumentando que as empresas não devem depender apenas de provedores de nuvem. Segundo a empresa, essa abordagem garante maior proteção de informações confidenciais. Enquanto isso, a IBM desenvolveu um novo protótipo de chip com cerca de 100 bilhões de transistores, ocupando uma área do tamanho de uma unha. A densidade é duas vezes maior que a tecnologia anterior da empresa, o que pode abrir caminho para computadores mais rápidos e eficientes em termos de energia no futuro.", "ciencia": "A NASA anunciou um novo acordo com a Rocket Lab para lançar três missões científicas utilizando foguetes Electron em 2027. As missões farão parte do programa de lançamento de pequenos satélites da NASA, demonstrando o compromisso da agência espacial americana com a exploração científica e o uso de tecnologias inovadoras.  Em outro evento importante, a República de Botswana assinou os Acordos Artemis, tornando-se o 68º signatário dessa iniciativa que visa promover a exploração espacial pacífica, transparente e responsável. Essa adesão reforça o compromisso global com a pesquisa e desenvolvimento no espaço. Cientistas chineses realizaram um avanço significativo na área da biologia ao criar um modelo de embrião humano em laboratório. O modelo simula a gastrulação, fase crucial no desenvolvimento humano que marca a formação inicial dos órgãos, abrindo novas possibilidades para pesquisas sobre o processo de desenvolvimento humano.  Pesquisadores também estão utilizando inteligência artificial para decifrar pergaminhos antigos queimados há 2.000 anos na erupção do Monte Vesúvio em Herculano. Um pergaminho fechado foi completamente lido pela primeira vez, revelando um texto que pode fornecer valiosas informações sobre a vida e cultura romana da época.", "cultura": "A 21ª edição da CineOP – Mostra de Cinema de Ouro Preto acontece entre os dias 25 e 30 de junho, transformando a cidade mineira em capital da memória audiovisual. O evento, dedicado ao cinema como patrimônio cultural, busca a preservação audiovisual, a formação de público e a construção de políticas públicas.  Em outra esfera artística, o filme 'Apenas Coisas Boas', dirigido por Daniel Nolasco, se destaca por sua criatividade e ousadia no retrato da comunidade LGBTQIA+ brasileira. A obra, lançada em 25 de junho de 2026 às 10h00, busca retratar a essência do movimento queer, diferenciando-se de outros filmes que podem idealizar a comunidade.  O mundo dos games também traz novidades: as pré-vendas para Grand Theft Auto VI já estão disponíveis desde a noite passada. O jogo será lançado em 19 de novembro para PlayStation 5 e Xbox Series S/X, com a edição padrão custando US$ 80.", "sociedade": "Dois terremotos de magnitudes 7,2 e 7,5 atingiram a Venezuela, causando danos significativos em edifícios e infraestruturas, especialmente na região do estado de Sucre. O número de vítimas fatais já ultrapassa 164 e muitos ficaram feridos. La Guaira, cidade próxima a Caracas, foi a área mais afetada pelos tremores. Um sobrevivente descreveu os eventos como 'um filme de terror'. Os terremotos provocaram o colapso de edifícios, levando ao fechamento do principal aeroporto do país e à paralisação de serviços essenciais. A Organização Pan-Americana da Saúde (OPAS) está mobilizando uma resposta de emergência à saúde após os terremotos na Venezuela, enviando suprimentos médicos e especialistas para ajudar as equipes locais no atendimento às vítimas. Um jogador argentino que atua em um clube venezuelano procura sua esposa e filhos, que desapareceram após os terremotos. Ele afirma que o prédio onde vivia a família desabou durante os tremores. Paralelamente, em outros países, uma pesquisa avaliou dados de ex-alunos da rede pública para demonstrar a importância do Ensino Médio Integral na elevação da renda da população local. O estudo reforça a ideia de que investir no Ensino Médio Integral gera benefícios para a comunidade como um todo.", "meio_ambiente": "Dois terremotos de grande magnitude atingiram a Venezuela, causando destruição generalizada na cidade costeira de La Guaira. Imagens divulgadas mostram edifícios danificados, estradas destruídas e infraestrutura pública comprometida. Enquanto isso, a Europa enfrenta um calor extremo, com temperaturas próximas aos 39°C em diversas regiões, desde a França até a Espanha. Essa onda de calor causa preocupação sobre a segurança pública e coloca pressão sobre as infraestruturas.  Em paralelo, um estudo realizado pela SOS Mata Atlântica revelou que nenhum trecho do rio Tietê está livre de poluição, incluindo a região de Salesópolis, anteriormente considerada um dos pontos mais limpos. A pesquisa destaca a gravidade da contaminação e a necessidade urgente de ações para proteger o meio ambiente.", "direitos_humanos": "Terremotos de magnitude 7,2 e 7,5 atingiram a Venezuela na quarta-feira, causando pelo menos 188 mortes e deixando mais de 200 pessoas presas sob escombros. Mais de 1.500 pessoas ficaram feridas e milhares estão desaparecidas. A presidente interina da Venezuela, Delcy Rodríguez, confirmou que o número de vítimas fatais dos terremotos chegou a 164. Além disso, foram registradas 30 réplicas desde os eventos iniciais. O Papa Leão XIII enviou 100 mil euros para a Venezuela como ajuda humanitária após os terremotos que atingiram o país. A ajuda será destinada às áreas afetadas pelos tremores. Em meio à tragédia, venezuelanos formavam filas em postos de gasolina e supermercados por medo de escassez de combustível e alimentos.  No Quênia, uma lei controversa que regulamenta as plataformas online foi aprovada dois anos após protestos violentos envolvendo jovens, conhecidos como Geração Z, que se opunham a um projeto de lei semelhante. Famílias das vítimas fatais e desaparecidas afirmam que as investigações estão paradas e a responsabilização continua fora de alcance.  Em Hong Kong, o órgão regulador de igualdade está buscando cerca de HK$250.000 (US$31.900) em compensação para a família de uma empregada doméstica que foi demitida por seu empregador após ser diagnosticada com câncer cervical avançado e posteriormente faleceu."}, "resumo_do_dia": {"politica_nacional": [{"id": 18568, "titulo": "STF limita casos em que a absolvição criminal barra ação de improbidade", "url": "https://www.cnnbrasil.com.br/politica/stf-limita-casos-em-que-a-absolvicao-criminal-barra-acao-de-improbidade/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-25T22:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal (STF) decidiu que a falta de provas na esfera penal não impede automaticamente um processo por improbidade administrativa. A corte estabeleceu limites para os casos em que a absolvição criminal pode ser considerada como impedimento para ações de improbidade.", "titulo_pt": "STF limita casos em que a absolvição criminal impede ação de improbidade", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 17678, "titulo": "Guerra pública entre Michelle e filhos de Bolsonaro se arrasta desde 2021", "url": "https://www.infomoney.com.br/politica/guerra-publica-entre-michelle-e-filhos-de-bolsonaro-se-arrasta-desde-2021/", "fonte_id": "infomoney", "data_pub": "2026-06-25T22:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O relacionamento entre Michelle Bolsonaro e os filhos do ex-presidente Jair Bolsonaro tem sido marcado por conflitos públicos desde 2021.  Um novo episódio desse conflito ocorreu em 24 de agosto de 2023.", "titulo_pt": "Guerra pública entre Michelle e filhos de Bolsonaro se arrasta desde 2021", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 17377, "titulo": "Governo apresenta nova manifestação para extradição de Zambelli em caso de perseguição armada", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/governo-apresenta-nova-manifestacao-para-extradicao-de-zambelli-em-caso-de-perseguicao-armada.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-25T21:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo brasileiro pediu à Justiça italiana a extradição da ex-deputada Carla Zambelli. A solicitação se refere ao episódio em que ela sacou e apontou uma arma para um homem na véspera do segundo turno das eleições de 2022.", "titulo_pt": "Governo apresenta nova manifestação para extradição de Zambelli em caso de perseguição armada", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 17464, "titulo": "Daniel Vorcaro é transferido para cela na Papudinha, em Brasília", "url": "https://g1.globo.com/df/distrito-federal/noticia/2026/06/25/daniel-vorcaro-e-transferido-para-a-papudinha-em-brasilia.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-25T21:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ex-banqueiro Daniel Vorcaro foi transferido para uma cela no 19º Batalhão da Polícia Militar em Brasília, conhecido como 'Papudinha'. A transferência ocorreu nesta quinta-feira (25) e Vorcaro estava na Superintendência da Polícia Federal desde março.", "titulo_pt": "Daniel Vorcaro é transferido para cela na Papudinha, em Brasília", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 17402, "titulo": "PGR recusa acordo de delação premiada de Paulo Henrique Costa, ex-presidente do BRB", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/pgr-recusa-acordo-de-delacao-premiada-de-paulo-henrique-costa-ex-presidente-do-brb.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T21:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Procurador-Geral da República, Paulo Gonet, decidiu rejeitar a delação premiada do ex-presidente do Banco de Brasília (BRB), Paulo Henrique Costa. A decisão foi tomada em 25 de junho de 2026, às 18h40.", "titulo_pt": "PGR recusa acordo de delação premiada de Paulo Henrique Costa, ex-presidente do BRB", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 17465, "titulo": "STF adia conclusão de julgamento sobre lei de improbidade administrativa, mas decide sobre perda de cargo e bloqueio de bens", "url": "https://g1.globo.com/politica/noticia/2026/06/25/stf-adia-conclusao-de-julgamento-sobre-lei-de-improbidade-administrativa-mas-decide-sobre-perda-de-cargo-e-bloqueio-de-bens.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-25T21:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal (STF) vai retomar o julgamento da Lei de Improbidade Administrativa na quarta-feira. A Corte já decidiu sobre a perda do cargo público, o bloqueio de bens de acusados e a forma de enquadramento dos atos de improbidade. O STF ainda precisa definir as regras de prescrição para casos de improbidade.", "titulo_pt": "STF adiar conclusão sobre lei de improbidade, mas decide sobre perda de cargo e bloqueio de bens", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 17496, "titulo": "Pacto quer garantir trabalho decente em grandes eventos no Brasil", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/pacto-quer-garantir-trabalho-decente-em-grandes-eventos-no-brasil", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-25T21:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo federal, centrais sindicais, representantes patronais e outras instituições assinaram o Pacto pelo Trabalho Decente em Grandes Eventos. O pacto abrange atividades relacionadas à cadeia produtiva de eventos como shows, festivais, eventos esportivos e feiras.", "titulo_pt": "Pacto visa garantir trabalho decente em grandes eventos no Brasil", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 17378, "titulo": "Dramalhão sem fim da família Bolsonaro pode afetar Flávio mais que caso Dark Horse", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/dramalhao-sem-fim-da-familia-bolsonaro-pode-afetar-flavio-mais-que-caso-dark-horse.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-25T21:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Michelle Bolsonaro acusou o senador Flávio Bolsonaro, seu enteado, de desrespeito, dizendo que foi apunhalada e maltratada. O episódio faz parte de uma série de conflitos dentro da família Bolsonaro.", "titulo_pt": "Dramalhão da família Bolsonaro pode afetar Flávio mais que caso Dark Horse", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 17466, "titulo": "Ciro Gomes diz que 'não viu e não vai ver' vídeo de Michelle e que crise com Flávio Bolsonaro não envolve 'paróquia' local", "url": "https://g1.globo.com/ce/ceara/eleicoes/2026/noticia/2026/06/25/ciro-gomes-diz-que-nao-viu-e-nao-vai-ver-video-de-michelle-e-que-crise-com-flavio-bolsonaro-nao-envolve-paroquia-local.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-25T21:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ciro Gomes afirmou que não viu o vídeo de Michelle Bolsonaro, em que ela alega ter sido maltratada por Flávio Bolsonaro. O pré-candidato ao governo do Ceará disse que o problema é do PL Nacional e que a situação envolve questões mais complexas do que o estado do Ceará.", "titulo_pt": "Ciro Gomes diz que 'não viu e não vai ver' vídeo de Michelle e que crise com Flávio Bolsonaro não envolve 'paróquia' local", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 17467, "titulo": "Datafolha: 79% dos brasileiros apoiam a redução da maioridade penal", "url": "https://g1.globo.com/politica/noticia/2026/06/25/datafolha-reducao-da-maioridade-penal.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-25T21:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa Datafolha revelou que 79% dos brasileiros apoiam a redução da maioridade penal. Esse é o menor percentual registrado desde 2003, quando a série histórica começou. O apoio à medida vem diminuindo desde 2015, enquanto o número de pessoas contrárias aumentou.", "titulo_pt": "Datafolha: 79% dos brasileiros apoiam redução da maioridade penal", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 17379, "titulo": "Vereadora do MBL pede cassação de petista preso em operação que mirou PCC", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/vereadora-pede-cassacao-de-petista-preso-em-operacao-que-mirou-pcc.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-25T20:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A vereadora Amanda Vettorazzo (União Brasil) pediu a cassação do mandato do vereador Senival Moura (PT). O pedido foi feito na corregedoria da Câmara Municipal de São Paulo. Senival Moura foi preso em uma operação policial que visava o PCC.", "titulo_pt": "Vereadora do MBL pede cassação de petista preso em operação contra o PCC", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 17728, "titulo": "Mendonça determina que Vorcaro seja transferido da Superintendência da PF para a Papudinha", "url": "https://www.jota.info/stf/do-supremo/mendonca-determina-que-vorcaro-seja-transferido-da-superintendencia-da-pf-para-a-papudinha", "fonte_id": "jota", "data_pub": "2026-06-25T20:47:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro Mendonça determinou que o preso Vorcaro seja transferido da Superintendência da Polícia Federal (PF) para a Penitenciária Papudinha. A troca deve ocorrer em 24 horas, conforme decisão do ministro, relator do inquérito sobre fraudes no Banco Master.", "titulo_pt": "Mendonça determina transferência de Vorcaro da Superintendência da PF para a Papudinha", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 17405, "titulo": "Mendonça suspende multas por saúde mental nas empresas por 90 dias", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/mendonca-suspende-multas-por-saude-mental-nas-empresas-por-90-dias.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T20:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro André Mendonça, do STF, suspendeu a aplicação de multas por descumprimento às regras de saúde mental previstas na NR-1. A suspensão valerá por 90 dias. A decisão foi tomada em 25 de junho de 2026.", "titulo_pt": "Mendonça suspende multas por saúde mental nas empresas por 90 dias", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 17556, "titulo": "O sinal que revela o peso de Michelle nas escolhas de Bolsonaro para as eleições", "url": "https://veja.abril.com.br/politica/o-sinal-que-indica-o-peso-de-michelle-nas-escolhas-de-bolsonaro-nas-eleicoes/", "fonte_id": "veja", "data_pub": "2026-06-25T20:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Michelle Bolsonaro publicou um vídeo revelando uma briga com o senador Flávio Bolsonaro. No vídeo, ela menciona uma 'punhalada' recebida do enteado e mostra um racha no clã político.", "titulo_pt": "Sinal que revela a influência de Michelle Bolsonaro nas escolhas do presidente para as eleições", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 17408, "titulo": "Mendonça manda Vorcaro para Papudinha e delação volta à estaca zero", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/mendonca-determina-que-daniel-vorcaro-seja-transferido-para-a-papudinha.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Daniel Vorcaro, ex-banqueiro dono do Banco Master, será transferido para a unidade prisional Papudinha no Distrito Federal.  Vorcaro teve suas propostas de delação premiada negadas pela Polícia Federal e pela Procuradoria-Geral da República.", "titulo_pt": "Mendonça manda Vorcaro para Papudinha e delação volta à estaca zero", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 17471, "titulo": "Mendonça determina transferência de Daniel Vorcaro para Papudinha", "url": "https://g1.globo.com/politica/noticia/2026/06/25/mendonca-determina-transferencia-de-daniel-vorcaro.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-25T19:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro André Mendonça, do Supremo Tribunal Federal (STF), ordenou a transferência de Daniel Vorcaro para uma cela na Papudinha. Vorcaro estava preso na Superintendência da Polícia Federal em Brasília desde março deste ano.", "titulo_pt": "Mendonça determina transferência de Daniel Vorcaro para Papudinha", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 18257, "titulo": "M1A2T Abrams tanks deployed in combat readiness drill", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/26/2003859775", "fonte_id": "taipei_times", "data_pub": "2026-06-26T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Exército taiwanês realizou um exercício de prontidão para combate, com o uso de tanques M1A2T Abrams. O objetivo do exercício foi testar a capacidade de resposta rápida e a coordenação entre as unidades militares. A demonstração incluiu manobras de ataque e defesa em terreno variado.", "titulo_pt": "Tanques M1A2T Abrams em exercício de prontidão para combate", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 18258, "titulo": "Taiwan Drill Simulates Maritime ‘Quarantine’ by Chinese Forces", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/26/2003859776", "fonte_id": "taipei_times", "data_pub": "2026-06-26T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Taiwan realizou um exercício militar simulando uma 'quarentena marítima' por parte das forças chinesas. O exercício teve como objetivo testar a capacidade de resposta da ilha em caso de bloqueio naval.  As autoridades taiwanesas afirmaram que o treinamento foi bem-sucedido e demonstraram sua determinação em defender o país.", "titulo_pt": "Exercício de Taiwan simula 'quarentena marítima' por forças chinesas", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 18644, "titulo": "Congo Ebola Crisis: Contact Tracing Is Dangerously Behind, Officials Warn", "url": "https://www.nytimes.com/2026/06/25/world/africa/africa-cdc-congo-ebola.html", "fonte_id": "nyt_world", "data_pub": "2026-06-25T22:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A maioria das pessoas que estão testando positivo para Ebola na República Democrática do Congo não está no radar dos trabalhadores da saúde. Isso sugere que o rastreamento de contatos está atrasado de forma perigosa.", "titulo_pt": "Crise de Ebola no Congo: Rastreamento de Contatos Está Severamente Atraso, Afirmam Funcionários", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 18695, "titulo": "Yonhap to hold forum on shifting alliances, economic security challenges", "url": "https://en.yna.co.kr/view/AEN20260626001200315", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T22:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Yonhap News Agency, principal agência de notícias da Coreia do Sul, promoverá um fórum sobre mudanças nas alianças internacionais e desafios à segurança econômica. O evento ocorrerá em Seul em 26 de junho. A Yonhap pretende discutir as novas dinâmicas geopolíticas e seus impactos na região.", "titulo_pt": "Yonhap promove fórum sobre realinhamentos e desafios à segurança econômica", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 18690, "titulo": "Hezbollah says Israeli strike killed two civilians in southern Lebanon", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/hezbollah-says-israeli-strike-killed-two-civilians-southern-lebanon", "fonte_id": "middle_east_eye", "data_pub": "2026-06-25T22:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Hezbollah afirmou que um ataque israelense na estrada Zouat al-Sharqiyah-Mifdoun matou duas pessoas e feriu outra. O grupo libanês disse que as vítimas estavam indo inspecionar suas casas após o anúncio do cessar-fogo.", "titulo_pt": "Hezbollah diz que ataque israelense matou dois civis no sul do Líbano", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 18580, "titulo": "El rey Felipe VI y Claudia Sheinbaum entierran el distanciamiento entre España y México con un encuentro en Palacio Nacional", "url": "https://elpais.com/mexico/2026-06-25/el-rey-felipe-vi-y-claudia-sheinbaum-entierran-el-distanciamiento-entre-espana-y-mexico-con-un-encuentro-en-palacio-nacional.html", "fonte_id": "elpais_america", "data_pub": "2026-06-25T22:51:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O rei Felipe VI da Espanha e a presidente mexicana Claudia Sheinbaum se encontraram no Palácio Nacional. A reunião marca a normalização das relações diplomáticas entre os dois países após sete anos de tensão. O encontro busca deixar para trás a controvérsia causada por uma carta de perdão.", "titulo_pt": "Rei Felipe VI e Claudia Sheinbaum selam o fim do distanciamento entre Espanha e México", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 18645, "titulo": "How Long Can a Person Survive Under Rubble?", "url": "https://www.nytimes.com/2026/06/25/world/americas/earthquake-rubble-survival-venezuela-rescue.html", "fonte_id": "nyt_world", "data_pub": "2026-06-25T22:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A sobrevivência sob escombros depende da disponibilidade de água e ar, além da rapidez com que os resgateiros conseguem encontrar as pessoas. Fatores como a temperatura ambiente e o tipo de material dos escombros também influenciam na sobrevivência.", "titulo_pt": "Quanto Tempo uma Pessoa Pode Sobreviver Sob Escombros?", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 18682, "titulo": "US seeks Iran deal, but 'not at any price,' Rubio says", "url": "https://www.france24.com/en/middle-east/20260625-us-seeks-iran-deal-not-at-any-price-rubio", "fonte_id": "france24", "data_pub": "2026-06-25T22:35:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Secretário de Estado dos EUA, Marco Rubio, afirmou que Washington não aceitaria um acordo com o Irã que permita a Teerã impor taxas no trânsito pelo Estreito de Ormuz. Rubio alertou que isso causaria 'total caos'. As declarações vêm após um ataque a uma embarcação forçar a suspensão das operações de evacuação marítima pelas Nações Unidas.", "titulo_pt": "EUA buscam acordo com Irã, mas 'não a qualquer preço', diz Rubio", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 18698, "titulo": "Venezuela’s Powerful Earthquakes Were a Rare ‘Seismic Doublet’", "url": "https://www.wired.com/story/venezuelas-powerful-earthquakes-rare-seismic-doublet/", "fonte_id": "wired", "data_pub": "2026-06-25T22:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Venezuela foi atingida por dois terremotos fortes que ocorreram em rápida sucessão. Os tremores provavelmente foram causados pelo estresse sendo transferido de uma parte da falha que atravessa o país para outra.", "titulo_pt": "Terremotos Poderosos na Venezuela Foram um Raro 'Duplo Sísmico'", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 18561, "titulo": "Promotores retiram acusação de estupro contra Harvey Weinsten", "url": "https://www.cnnbrasil.com.br/pop/celebridades/promotores-retiram-acusacao-de-estupro-contra-harvey-weinsten/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-25T22:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A promotoria decidiu retirar a acusação de estupro contra o produtor Harvey Weinstein. Jessica Mann, uma das vítimas que acusou Weinstein, descreveu o processo como 'extraordinariamente desgastante'.", "titulo_pt": "Promotores Retiram Acusação de Estupro Contra Harvey Weinstein", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 18669, "titulo": "Orange gush: KC mayor parties with the Dutch", "url": "https://www.politico.com/live-updates/2026/06/25/world-cup-2026/kansas-city-mayor-party-netherlands-links-rechts-anthem-fifa-world-cup-2026-00977245", "fonte_id": "politico", "data_pub": "2026-06-25T22:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O prefeito de Kansas City, Mark Funkhouser, comemorou o Dia da Holanda no Museu Nacional de História do Kansas.  Funkhouser e outros oficiais participaram de uma festa que incluiu música holandesa e alimentos tradicionais.", "titulo_pt": "Explosão de laranja: Prefeito de Kansas City celebra com holandeses", "veiculo": "Politico", "pais": "EUA", "classe": "A"}, {"id": 18667, "titulo": "America Gets a Trump Rally for Its Birthday", "url": "https://www.theatlantic.com/politics/2026/06/america-250-fair-washington/687705/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-25T22:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As celebrações do 250º aniversário dos Estados Unidos começaram com um evento promovido pelo movimento MAGA. O evento foi realizado no mesmo dia em que o país comemorou seu aniversário.", "titulo_pt": "Estados Unidos Recebem um Comício Trumpiano para o Aniversário Nacional", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 18681, "titulo": "A Chinese box office hit sparks a debate about identity in Singapore", "url": "https://www.bbc.co.uk/news/articles/c5yzv23g75eo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-25T22:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um filme chinês que retrata uma história nostálgica sobre família, esperança e dificuldades gerou um debate inesperado. O filme abordou temas relacionados à identidade em Singapura.", "titulo_pt": "Sucesso de bilheteria chinês acende debate sobre identidade em Singapura", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 18526, "titulo": "Brasil envia nesta sexta missão humanitária à Venezuela, anuncia Lula", "url": "https://agenciabrasil.ebc.com.br/internacional/noticia/2026-06/brasil-envia-nesta-sexta-missao-humanitaria-venezuela-anuncia-lula", "fonte_id": "agencia_brasil_intl", "data_pub": "2026-06-25T22:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Luiz Inácio Lula da Silva anunciou que um avião KC-390 da Força Aérea Brasileira (FAB) com uma missão humanitária partirá para a Venezuela na sexta-feira (26). A missão terá 36 bombeiros e técnicos da Defesa Civil Nacional e Agência Nacional de Vigilância Sanitária.", "titulo_pt": "Brasil envia missão humanitária à Venezuela nesta sexta, anuncia Lula", "veiculo": "Agência Brasil - Internacional", "pais": "Brasil", "classe": "A"}, {"id": 17823, "titulo": "Iran Strikes Ship in Strait of Hormuz, Undermining Efforts to Restore Traffic", "url": "https://www.nytimes.com/2026/06/25/world/middleeast/iran-strait-of-hormuz-threat-rubio-bahrain.html", "fonte_id": "nyt_world", "data_pub": "2026-06-25T22:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um ataque a um navio no Estreito de Hormuz foi confirmado por autoridades americanas e iranianas. O ataque ocorreu após Teerã ameaçar interromper o tráfego marítimo na região e enquanto Washington busca apoio regional para seu acordo de paz.", "titulo_pt": "Irã ataca navio no Estreito de Ormuz, prejudicando esforços para restaurar o tráfego", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 18665, "titulo": "The Geopolitics of SpaceX and Elon Musk", "url": "https://foreignpolicy.com/2026/06/25/spacex-elon-musk-geopolitics-ai-x-quinn-slobodian/", "fonte_id": "foreign_policy", "data_pub": "2026-06-25T22:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo discute o impacto geopolítico da SpaceX e de Elon Musk.  Ele levanta questões sobre a concentração de poder em uma única empresa e pessoa no setor espacial.", "titulo_pt": "A Geopolítica da SpaceX e Elon Musk", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 18266, "titulo": "Apple raises prices of MacBooks, iPads as memory costs skyrocket", "url": "https://www.taipeitimes.com/News/biz/archives/2026/06/26/2003859740", "fonte_id": "taipei_times", "data_pub": "2026-06-26T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Apple aumentou os preços de seus produtos MacBook e iPad devido ao aumento nos custos de memória. O preço dos modelos base do MacBook Air e MacBook Pro foi aumentado em US$ 10, enquanto o preço do iPad básico foi aumentado em US$ 15.", "titulo_pt": "Apple aumenta preços de MacBooks e iPads com aumento dos custos de memória", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 18524, "titulo": "CMN passa a exigir fotos com localização comprovada em seguro rural", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/cmn-passa-exigir-fotos-com-localizacao-comprovada-em-seguro-rural", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-25T22:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Conselho Monetário Nacional (CMN) passou a exigir que produtores rurais usem fotos georreferenciadas (com localização por GPS) nas vistorias para solicitar o seguro rural. A medida visa comprovar que as imagens foram capturadas na área afetada pelas perdas.", "titulo_pt": "CMN exige fotos com localização comprovada em seguro rural", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 18525, "titulo": "Conselho Monetário regulamenta bloqueio de contas de apostas ilegais", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/conselho-monetario-regulamenta-bloqueio-de-contas-de-apostas-ilegais", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-25T22:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Conselho Monetário Nacional (CMN) regulamentou o decreto que permite bloquear contas e impedir transações financeiras de operadores de apostas ilegais. O governo busca dificultar a operação de sites e empresas consideradas irregulares, estabelecendo regras para bancos e instituições de pagamento.", "titulo_pt": "Conselho Monetário regulamenta bloqueio de contas de apostas ilegais", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 17400, "titulo": "Safra de milho é boa, mas renda de produtor é menor neste ano", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/vaivem/2026/06/safra-de-milho-e-boa-mas-renda-de-produtor-e-menor-neste-ano.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T22:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A segunda safra de milho (safrinha) não bateu o recorde do ano passado, mas superou as expectativas iniciais. A Agroconsult elevou sua previsão para a produção de milho para este ano.", "titulo_pt": "Safra de Milho é Boa, mas Renda do Produtor é Menor este Ano", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 17401, "titulo": "Horizonte relevante, choque no petróleo, El Niño e a Selic", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/braulio-borges/2026/06/horizonte-relevante-choque-no-petroleo-el-nino-e-a-selic.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T22:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Banco Central do Brasil reduziu a taxa Selic de 14,5% para 14,25% ao ano. O BC justificou a decisão ao ampliar o horizonte relevante para controlar a inflação, considerando agora o primeiro trimestre de 2028 como meta.", "titulo_pt": "Horizonte relevante, choque no petróleo, El Niño e a Selic", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 17682, "titulo": "Banco central do México mantém juro em 6,50% e sinaliza pausa mais longa", "url": "https://www.infomoney.com.br/economia/banco-central-do-mexico-mantem-juro-em-650-e-sinaliza-pausa-mais-longa/", "fonte_id": "infomoney", "data_pub": "2026-06-25T21:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Banco Central do México manteve a taxa básica de juros em 6,50%. A instituição justificou a decisão citando incertezas sobre a inflação e a fraqueza da atividade econômica. O Banco Central sinalizou que a taxa deve permanecer estável por mais tempo.", "titulo_pt": "Banco Central do México mantém juros em 6,50% e sinaliza pausa mais longa", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 17403, "titulo": "Apple aumenta preços de MacBook e iPad em 20%", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/tec/2026/06/apple-aumenta-precos-de-macbook-e-ipad-em-20.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T21:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Apple aumentou os preços dos MacBooks e iPads em cerca de 20% globalmente. A empresa atribuiu o aumento à escassez de chips de memória devido ao crescimento da infraestrutura de inteligência artificial.", "titulo_pt": "Apple aumenta preços de MacBook e iPad em 20%", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 17497, "titulo": "Caixa libera dinheiro de antigo fundo PIS/Pasep; veja como sacar", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/caixa-libera-dinheiro-de-antigo-fundo-pispasep-veja-como-sacar", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-25T21:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Caixa Econômica Federal começou a pagar um novo lote de valores esquecidos do antigo fundo PIS/Pasep. Empregados com carteira assinada e servidores públicos que trabalharam entre 1971 e 1988 podem reaver o valor, dependendo da data do pedido e dos dados trabalhistas.", "titulo_pt": "Caixa libera dinheiro de antigo fundo PIS/Pasep; veja como sacar", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 17404, "titulo": "Indigo Brasil cria ferramenta para auxiliar gestão de shoppings a partir do estacionamento", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/06/indigo-brasil-cria-ferramenta-para-auxiliar-gestao-de-shoppings-a-partir-do-estacionamento.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T21:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Indigo, multinacional francesa de estacionamentos, lança uma plataforma de inteligência de dados para ajudar na gestão de 180 shoppings no Brasil. A empresa pretende usar dados sobre o perfil dos consumidores coletados nos estacionamentos para apoiar a administração dos centros comerciais.", "titulo_pt": "Indigo Brasil cria ferramenta para auxiliar gestão de shoppings a partir do estacionamento", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 17498, "titulo": "Jovens ocupados são a maioria, mas 6,2 milhões seguem como “nem-nem”", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/jovens-ocupados-sao-maioria-mas-62-milhoes-seguem-como-nem-nem", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-25T20:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um levantamento do Ministério do Trabalho e Emprego revelou que, no primeiro trimestre de 2026, a maioria dos jovens entre 14 e 24 anos (13,9 milhões) estava ocupada. Outros 6,2 milhões estavam fora da escola e do trabalho, sendo classificados como 'nem-nem'. Os dados são do Diagnóstico da Juventude Brasileira, que cruzou informações de diversas bases.", "titulo_pt": "Jovens ocupados são maioria, mas 6,2 milhões seguem como 'nem-nem'", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 17406, "titulo": "Iraque pressiona Opep por maior cota de produção de petróleo e cogita abandonar grupo", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/iraque-pressiona-opep-por-maior-cota-de-producao-de-petroleo-e-cogita-abandonar-grupo.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T20:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Iraque está pressionando a Organização dos Países Exportadores de Petróleo (Opep) para aumentar sua cota de produção de petróleo. O país afirmou que pode abandonar o cartel se não conseguir ampliar sua participação na produção. A medida visa ajudar o Iraque a se recuperar da crise financeira causada pela guerra entre Estados Unidos e Irã.", "titulo_pt": "Iraque pressiona Opep por maior cota de produção e ameaça sair do grupo", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 17698, "titulo": "Petróleo volta ao pré-guerra, aliviando a curva de juros", "url": "https://braziljournal.com/petroleo-volta-ao-pre-guerra-aliviando-a-curva-de-juros/", "fonte_id": "brazil_journal", "data_pub": "2026-06-25T20:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O preço do petróleo voltou ao nível anterior aos ataques dos EUA e Israel ao Irã. O Brent, que chegou a US$ 118 no final de abril, está atualmente negociado em torno de US$ 73. Essa retração nas cotações sugere que as maiores pressões inflacionárias globais podem ter passado.", "titulo_pt": "Petróleo volta ao patamar pré-guerra, aliviando a curva de juros", "veiculo": "Brazil Journal", "pais": "Brasil", "classe": "B"}, {"id": 17500, "titulo": "Com novo título, vendas do Tesouro Direto superam R$ 10 bi em maio", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/com-novo-titulo-vendas-do-tesouro-direto-superam-r-10-bi-em-maio", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-25T20:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As vendas de títulos públicos a pessoas físicas pelo Tesouro Direto alcançaram R$ 10,22 bilhões em maio. Esse valor representa um aumento de 19,46% em relação a abril e de 48,98% em comparação com maio de 2022. O lançamento do novo título Tesouro Reserva contribuiu para o recorde.", "titulo_pt": "Com novo título, vendas do Tesouro Direto superam R$ 10 bi em maio", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 17501, "titulo": "Arrecadação federal bate recorde de R$ 266,8 bilhões em maio", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/arrecadacao-federal-bate-recorde-de-r-2668-bilhoes-em-maio", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-25T19:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A arrecadação federal atingiu R$ 266,8 bilhões em maio de 2026, o maior valor para o mês desde 1995. O resultado foi impulsionado pelo aumento das receitas ligadas ao petróleo, pela atividade econômica e por mudanças na tributação.", "titulo_pt": "Arrecadação federal bate recorde de R$ 266,8 bilhões em maio", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 17409, "titulo": "FMI vê economia dos EUA em ritmo sólido e diz que Fed está certo em manter taxa de juros", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/fmi-ve-economia-dos-eua-em-ritmo-solido-e-diz-que-fed-esta-certo-em-manter-taxa-de-juros.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T19:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Fundo Monetário Internacional (FMI) afirmou que a economia dos Estados Unidos tem crescido a um ritmo sólido. O FMI também disse que a inflação deve atingir o objetivo de 2% do Federal Reserve até o final de 2027.", "titulo_pt": "FMI vê economia dos EUA em ritmo sólido e diz que Fed está certo em manter taxa de juros", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 17410, "titulo": "Sexto mais rico do Brasil e sócio da Americanas: saiba quem é Beto Sicupira, alvo da PF", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/sexto-mais-rico-do-brasil-e-socio-da-americanas-saiba-quem-e-beto-sicupira-alvo-da-pf.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T19:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Carlos Alberto Sicupira, empresário brasileiro de 78 anos e sexto homem mais rico do país, foi alvo de uma ação da Polícia Federal nesta quinta-feira (25) na Operação Disclosure. A operação investiga fraudes contábeis na Lojas Americanas.", "titulo_pt": "Sexto mais rico do Brasil e sócio da Americanas: saiba quem é Beto Sicupira, alvo da PF", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 18083, "titulo": "Apple increases MacBook and iPad prices by 20%", "url": "https://www.ft.com/content/0f067265-2baf-4b6e-8fb2-ed56daef6f3c", "fonte_id": "financial_times", "data_pub": "2026-06-25T20:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Apple aumentou os preços dos seus MacBooks e iPads em 20%. A empresa atribuiu o aumento de custos à escassez de memória impulsionada pela inteligência artificial. O valor de mercado da Apple diminuiu em US$ 263 bilhões após o anúncio.", "titulo_pt": "Apple aumenta preços de MacBook e iPad em 20%", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 18317, "titulo": "A Fatal Tesla Crash in Texas Sets Up a Legal Showdown", "url": "https://www.wired.com/story/a-fatal-tesla-crash-in-texas-sets-up-a-legal-showdown/", "fonte_id": "wired", "data_pub": "2026-06-25T17:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um acidente fatal envolvendo um Tesla no Texas pode levar a uma disputa legal.  A investigação busca determinar se o recurso de assistência ao motorista 'Full Self-Driving' (Supervisionado) da Tesla teve algum papel na morte da mulher.", "titulo_pt": "Acidente Fatal com Tesla no Texas Imita Uma Batalha Legal", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 17418, "titulo": "Lula diz que IA é um monstro que vai fugir do controle do ser humano", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/tec/2026/06/lula-diz-que-ia-e-um-monstro-que-vai-fugir-do-controle-do-ser-humano.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T17:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Luiz Inácio Lula da Silva afirmou que a inteligência artificial (IA) pode escapar do controle humano. Segundo ele, é preciso se preparar para o avanço da IA. O presidente fez o comentário nesta quinta-feira (25).", "titulo_pt": "Lula diz que IA é um monstro que vai fugir do controle humano", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 17597, "titulo": "Galípolo diz que BC enviou informações sobre Pix aos EUA para investigação", "url": "https://exame.com/brasil/galipolo-diz-que-bc-enviou-informacoes-sobre-pix-aos-eua-para-investigacao/", "fonte_id": "exame", "data_pub": "2026-06-25T17:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Gabriel Galípolo afirmou que o Banco Central está auxiliando o governo americano na análise do USTR, que apontou supostos prejuízos a empresas de pagamento dos Estados Unidos. O órgão brasileiro enviou informações sobre o sistema Pix para os EUA como parte da investigação.", "titulo_pt": "Galípolo diz que BC enviou informações sobre Pix aos EUA para investigação", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 18351, "titulo": "Why Does a Bank Need a Chief Scientist?", "url": "https://spectrum.ieee.org/capital-one-science-ai-finance-innovation", "fonte_id": "ieee_spectrum", "data_pub": "2026-06-25T17:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Prem Natarajan, ex-líder da organização Alexa AI na Amazon, assumiu o cargo de Cientista-Chefe no Capital One.  Natarajan, com experiência em pesquisa financiada pelo DARPA e academia, acredita que os modelos de aprendizado de máquina são interessantes para a área financeira. O Capital One serve mais de 100 milhões de clientes americanos.", "titulo_pt": "Por que um banco precisa de um cientista-chefe?", "veiculo": "IEEE Spectrum", "pais": "EUA", "classe": "A"}, {"id": 18079, "titulo": "Competition intensifies for Anthropic and OpenAI ahead of IPOs", "url": "https://www.ft.com/content/8c02de04-5516-405b-941d-289e586d8eb8", "fonte_id": "financial_times", "data_pub": "2026-06-25T16:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Modelos open-source desafiam as empresas de inteligência artificial Anthropic e OpenAI.  As empresas precisam convencer investidores sobre o valor de seus modelos proprietários antes de suas Ofertas Públicas Iniciais (OPIs). A intensificação da competição coloca pressão sobre as duas empresas para demonstrarem seu potencial.", "titulo_pt": "Concorrência aumenta para Anthropic e OpenAI antes das ofertas públicas iniciais", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 18319, "titulo": "17 Best Prime Day Fitness Tech Deals (2026) Up to $250 Off", "url": "https://www.wired.com/story/amazon-prime-day-fitness-deals-06-25-2026/", "fonte_id": "wired", "data_pub": "2026-06-25T16:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma lista com as melhores ofertas em tecnologia para fitness durante a Amazon Prime Day foi compilada. Inclui smartwatches, esteiras e equipamentos de recuperação. Os descontos podem chegar a até R$ 250.", "titulo_pt": "17 Melhores Ofertas em Tecnologia para Fitness na Prime Day (2026) - Até R$ 250 de Desconto", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 18285, "titulo": "(LEAD) Senior U.S. official hails S. Korea as punching far above its weight in chip production, expertise", "url": "https://en.yna.co.kr/view/AEN20260625011651315", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T15:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um alto funcionário americano elogiou a Coreia do Sul por sua capacidade de produzir chips além do que seria esperado para seu tamanho. O funcionário destacou o conhecimento e a expertise da Coreia do Sul na indústria de semicondutores.", "titulo_pt": "Alto funcionário americano elogia Coreia do Sul por superar expectativas na produção de chips", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 18320, "titulo": "Stop Mowing Your Grass Forever With One of These Highly Rated Robot Mowers On Sale", "url": "https://www.wired.com/story/amazon-prime-day-robot-mower-deals-june-2026/", "fonte_id": "wired", "data_pub": "2026-06-25T15:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A maioria dos cortadores robóticos mais bem avaliados testados estão em promoção no Dia do Cliente Prime.  Isso significa que você não precisa cortar seu próprio grama.", "titulo_pt": "Pare de Cortar o Grama para Sempre com um desses Cortadores Robóticos Bem Avaliados em Promoção", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 18321, "titulo": "Kobo Libra Colour Sale (2026): The E-Reader Deal Worth Jumping on This Prime Day", "url": "https://www.wired.com/story/amazon-prime-day-kobo-deal-2026/", "fonte_id": "wired", "data_pub": "2026-06-25T14:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O e-reader colorido que mais vale a pena neste dia da Prime não é da Amazon.  É o Kobo Libra Color (2026) que está com desconto. A Wired recomenda este modelo como o melhor negócio para quem busca um e-reader colorido.", "titulo_pt": "Promoção do Kobo Libra Color (2026): O melhor negócio para e-reader nesta Prime Day", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 18234, "titulo": "Repositioning retail for the AI era", "url": "https://www.technologyreview.com/2026/06/25/1137848/repositioning-retail-for-the-ai-era/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-25T14:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A inteligência artificial está remodelando rapidamente o varejo, mas não necessariamente das maneiras que os consumidores iriam notar imediatamente. A maior transformação pode não ser por tentativas virtuais chamativas ou assistentes de compras com chatbots, mas sim em como as decisões são tomadas nos bastidores: como produtos aparecem nos resultados de pesquisa, como o estoque se move pelas cadeias de suprimentos e como os engenheiros enviam código mais rápido.", "titulo_pt": "Reposicionando o varejo para a era da IA", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 18322, "titulo": "21 Best Prime Day Beauty Deals of 2026 (We Sifted Through Hundreds to Pick Them)", "url": "https://www.wired.com/story/best-prime-day-beauty-deals-06-25-2026/", "fonte_id": "wired", "data_pub": "2026-06-25T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O site Wired compilou uma lista das melhores ofertas de beleza para o Dia da Amazon Prime em 2026. A lista inclui 21 produtos selecionados a partir de centenas de opções disponíveis.  As ofertas cobrem diversas categorias de beleza.", "titulo_pt": "21 Melhores Ofertas de Beleza do Dia da Amazon Prime de 2026 (Selecionamos Entre Centenas)", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 18324, "titulo": "Colossal and the US Government Are Creating an Endangered Species ‘BioVault’", "url": "https://www.wired.com/story/colossal-interior-department-team-up-endangered-species-dna/", "fonte_id": "wired", "data_pub": "2026-06-25T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa Colossal e o governo americano estão criando um 'BioVault', um banco de dados genético para espécies ameaçadas. Esta iniciativa ocorre enquanto a administração Trump tenta enfraquecer a lei que visa proteger as espécies em risco de extinção.", "titulo_pt": "Colossal e o Governo dos EUA Criam 'BioVault' para Espécies Ameaçadas", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 18325, "titulo": "Apple and Audi Alumni Have Made a Luxe EV Based on the Moon Buggy", "url": "https://www.wired.com/story/amble-one-luxe-ev-buggy/", "fonte_id": "wired", "data_pub": "2026-06-25T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Amble One é um buggy elétrico legal para ruas, custando US$ 25.000, projetado para resorts de luxo. A empresa também está desenvolvendo um carro.", "titulo_pt": "Ex-funcionários da Apple e Audi criam um EV de luxo inspirado no buggy lunar", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 18352, "titulo": "What it Means to Be a Mathematician When AI Does the Math", "url": "https://spectrum.ieee.org/ai-in-mathematics", "fonte_id": "ieee_spectrum", "data_pub": "2026-06-25T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um artigo discute como a inteligência artificial (IA) pode automatizar tarefas matemáticas, como simulações de ondas de luz em cristais líquidos. O autor reflete sobre sua própria pesquisa em matemática aplicada, realizada durante a década de 2000, e imagina que agora poderia ser concluída com a ajuda da IA em pouco tempo. No entanto, o artigo sugere que a pesquisa em matemática pura ainda não pode ser completamente substituída pela IA.", "titulo_pt": "O que significa ser matemático quando a IA faz as contas?", "veiculo": "IEEE Spectrum", "pais": "EUA", "classe": "A"}, {"id": 18326, "titulo": "21 Walmart Deals We Like Better Than That Other Sale Happening Right Now", "url": "https://www.wired.com/story/walmart-deals-apd-06-25-2026/", "fonte_id": "wired", "data_pub": "2026-06-25T12:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Wired lista 21 ofertas de produtos eletrônicos na Walmart que são consideradas melhores do que as promoções da Amazon durante o Prime Day. A seleção inclui diversos gadgets com descontos atrativos. O artigo destaca as ofertas da Walmart como uma alternativa para quem prefere não comprar na Amazon.", "titulo_pt": "21 Ofertas da Walmart que São Melhor do Que a Venda da Amazon", "veiculo": "Wired", "pais": "EUA", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 18705, "titulo": "Rocket Lab wins NASA award for three Electron launches", "url": "https://spacenews.com/rocket-lab-wins-nasa-award-for-three-electron-launches/", "fonte_id": "spacenews", "data_pub": "2026-06-25T22:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA selecionou a Rocket Lab para lançar um par de missões científicas em três foguetes Electron em 2027. Os lançamentos serão realizados pelo programa de lançamento de pequenos satélites da NASA.", "titulo_pt": "Rocket Lab ganha prêmio da NASA para três lançamentos do Electron", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 18411, "titulo": "Weather Stream releases first light imagery from GEMS2 microwave radiometer", "url": "https://spacenews.com/weather-stream-releases-first-light-imagery-from-gems2-microwave-radiometer/", "fonte_id": "spacenews", "data_pub": "2026-06-25T22:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa Weather Stream, com sede em Boulder, Colorado, está coletando observações atmosféricas globais com o satélite GEMS2-Amethyst. O satélite foi lançado em 30 de março a bordo da missão Transporter 16 da SpaceX.", "titulo_pt": "Weather Stream lança primeiras imagens do radiometro GEMS2", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 18412, "titulo": "Space Force’s new MUOS satellites to use Boeing’s 702MP spacecraft platform", "url": "https://spacenews.com/space-forces-new-muos-satellites-to-use-boeings-702mp-spacecraft-platform/", "fonte_id": "spacenews", "data_pub": "2026-06-25T21:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Força Espacial dos Estados Unidos (Space Force) utilizará a plataforma espacial 702MP da Boeing para seus novos satélites MUOS. A plataforma 702MP já foi usada em missões militares e comerciais de banda larga.", "titulo_pt": "Novos satélites MUOS da Força Espacial usarão plataforma espacial 702MP da Boeing", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 18404, "titulo": "Expedition 73 Crew Reflects on Science, Teamwork, and Life in Orbit", "url": "https://www.nasa.gov/centers-and-facilities/johnson/expedition-73-crew-reflects-on-science-teamwork-and-life-in-orbit/", "fonte_id": "nasa_news", "data_pub": "2026-06-25T21:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Astronautas e cosmonautas se reuniram no Centro Espacial Houston para compartilhar histórias de suas missões a bordo da Estação Espacial Internacional. A cerimônia de Boas-vindas à Expedição 73 reuniu membros das missões NASA SpaceX Crew-10, Soyuz MS-27 e NASA’s SpaceX Crew-11. O evento reconheceu o trabalho em equipe e as pessoas no chão que tornaram suas missões possíveis.", "titulo_pt": "Tripulação da Expedição 73 Reflete sobre Ciência, Trabalho em Equipe e Vida na Órbita", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 18405, "titulo": "NASA, US Small Business Administration to Announce Partnership", "url": "https://www.nasa.gov/news-release/nasa-us-small-business-administration-to-announce-partnership/", "fonte_id": "nasa_news", "data_pub": "2026-06-25T21:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA e a Administração de Pequenas Empresas dos EUA irão assinar um memorando de acordo durante uma cerimônia em 29 de junho às 13h00 EDT na sede da NASA em Washington. O acordo criará uma nova iniciativa interinstitucional que responde à Política Nacional Espacial do Presidente Donald J. Trump e apoia o crescimento do setor espacial americano.", "titulo_pt": "NASA e a Administração de Pequenas Empresas dos EUA Anunciam Parceria", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 18406, "titulo": "NASA Welcomes Botswana as 68th Artemis Accords Signatory", "url": "https://www.nasa.gov/organizations/oiir/nasa-welcomes-botswana-as-68th-artemis-accords-signatory/", "fonte_id": "nasa_news", "data_pub": "2026-06-25T21:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A República de Botswana assinou os Acordos Artemis na quinta-feira durante uma cerimônia realizada pela NASA na sede da agência em Washington. Botswana se torna a sexta nação africana a se juntar à comunidade crescente de países comprometidos com a exploração espacial pacífica, transparente e responsável. O vice-administrador da NASA,  declarou que é um privilégio dar as boas-vindas ao Botswana como o mais recente signatário dos Acordos Artemis.", "titulo_pt": "NASA recebe Botswana como 68º signatário dos Acordos Artemis", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 17460, "titulo": "Uma neurocientista vai a Santiago de Compostela", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/colunas/suzanaherculanohouzel/2026/06/uma-neurocientista-vai-a-santiago-de-compostela.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-25T21:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Após uma conferência em Bilbao, uma neurocientista decidiu passar suas férias viajando pela costa noroeste da Espanha e norte de Portugal. Ela planejou o roteiro com seu marido, que também irá acompanhá-la na viagem.", "titulo_pt": "Uma neurocientista vai a Santiago de Compostela", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 18413, "titulo": "Botswana signs the Artemis Accords", "url": "https://spacenews.com/botswana-signs-the-artemis-accords/", "fonte_id": "spacenews", "data_pub": "2026-06-25T20:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Botswana se tornou o último país a assinar os Acordos Artemis, que definem as melhores práticas para a exploração espacial. Os acordos visam promover a cooperação internacional e um uso responsável do espaço.", "titulo_pt": "Botswana assina os Acordos Artemis", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 18389, "titulo": "New science on algae die-offs is too late for the Reflecting Pool", "url": "https://www.sciencenews.org/article/algae-die-offs-reflecting-pool", "fonte_id": "science_news", "data_pub": "2026-06-25T20:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O ferro e o peróxido de hidrogênio desencadeiam a morte celular por ferroptose, que propaga moléculas letais pela população, causando mortes em massa de algas. Essa descoberta científica ocorre após eventos já ocorridos na piscina refletida.", "titulo_pt": "Nova ciência sobre mortandade de algas chega tarde para a Piscina Refletida", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 18338, "titulo": "New ACIP charter broadens criteria for members, calls for review of alternatives to vaccines", "url": "https://www.statnews.com/2026/06/25/acip-charter-responsibilities-rfk-jr/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-25T20:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O novo estatuto do grupo que aconselha o CDC sobre o uso de vacinas redefine as responsabilidades do comitê, diminuindo seu papel na recomendação do uso de novas vacinas. O estatuto também exige uma revisão de alternativas às vacinas.", "titulo_pt": "Novo estatuto do ACIP amplia critérios para membros e pede revisão de alternativas às vacinas", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 18407, "titulo": "NASA Selects Rocket Lab to Launch Sun, Earth Science Missions", "url": "https://www.nasa.gov/missions/tsis-2/nasa-selects-rocket-lab-to-launch-sun-earth-science-missions/", "fonte_id": "nasa_news", "data_pub": "2026-06-25T20:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA selecionou a Rocket Lab para fornecer o serviço de lançamento para as missões PolSIR (Polarized Submillimeter Ice-cloud Radiometer) e TSIS-2 (Total and Spectral Solar Irradiance Sensor-2). As duas seleções fazem parte do contrato de serviços de lançamento VADR (Venture-Class Acquisition of Dedicated and Rideshare) da NASA.", "titulo_pt": "NASA escolhe a Rocket Lab para lançar missões de ciência solar e terrestre", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 18339, "titulo": "STAT+: At BIO 2026, industry wrestled with Washington politics, and making AI work better", "url": "https://www.statnews.com/2026/06/25/bio-2026-biotech-conference-san-diego-key-takeaways/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-25T19:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Executivos do setor de biotecnologia expressaram preocupações sobre a biotecnologia chinesa, a rentabilidade da inteligência artificial e a sustentabilidade das medidas de preços de medicamentos do ex-presidente Trump. O evento BIO 2026 foi palco de discussões sobre esses temas.", "titulo_pt": "STAT+: Indústria farmacêutica debate política em Washington e eficiência da inteligência artificial no BIO 2026", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 17700, "titulo": "Por que países vizinhos sofrem tanto com grandes terremotos, mas Brasil é 'poupado'?", "url": "https://www.bbc.com/portuguese/articles/cgjxdy1lnn7o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-25T19:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil é menos afetado por grandes terremotos devido à sua localização geográfica. A crosta terrestre é formada por placas tectônicas e a posição do Brasil se encontra fora das zonas de maior atividade sísmica.", "titulo_pt": "Por que países vizinhos sofrem tanto com grandes terremotos, mas o Brasil é 'poupado'?", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 18340, "titulo": "The mysterious case of Eli Lilly’s obesity drug", "url": "https://www.statnews.com/2026/06/25/readout-loud-podcast-eli-lilly-fda-obesity-trump-absci-regenxbio/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-25T18:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O programa 'Readout LOUD' discute o acesso exclusivo ao candidato a medicamento para obesidade da Eli Lilly e os motivos pelos quais as farmacêuticas estão investindo tanto em aquisições. O episódio explora esses tópicos.", "titulo_pt": "O caso misterioso do medicamento para obesidade da Eli Lilly", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 17586, "titulo": "Cientistas chineses criam modelo de embrião humano em laboratório", "url": "https://exame.com/ciencia/cientistas-chineses-criam-modelo-de-embriao-humano-em-laboratorio/", "fonte_id": "exame", "data_pub": "2026-06-25T18:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Cientistas chineses desenvolveram um modelo de embrião humano em laboratório. O modelo simula a gastrulação, fase crucial no desenvolvimento humano que marca a formação inicial dos órgãos. A pesquisa avança o entendimento sobre esse processo fundamental.", "titulo_pt": "Cientistas chineses criam m
