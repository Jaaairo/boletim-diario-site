<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>
</head>

temas místicos e subconscientes através da pintura, revelando uma surpresa inesperada durante a visita à mostra. Paralelamente, o economista Thomas Piketty propôs um referendo para adotar um imposto mais rigoroso sobre os ricos na França, estimando que isso poderia arrecadar até €800 bilhões, com impactos significativos no cenário político e econômico do país.", "politica_internacional": "O conflito no Oriente Médio continua com ataques israelenses e tensionamento entre Estados Unidos e Irã. Israel realizou novos bombardeios no Líbano, resultando na morte de sete pessoas, incluindo duas crianças, o que ameaça um acordo temporário entre os dois países para encerrar a guerra no Oriente Médio. Este cenário se agrava com o fato de que o acordo interino entre Estados Unidos e Irã, que tem como objetivo parar a guerra, está sob pressão. Além disso, na Bolívia, o presidente declarou estado de emergência para desobstruir estradas bloqueadas há 50 dias, enquanto em Peru os eleitores aguardam os resultados da eleição presidencial mais disputada da história do país.", "politica_nacional": "O Tribunal Superior Eleitoral (TSE) firmou um acordo com os partidos políticos para assegurar o cumprimento das cotas destinadas a mulheres, pessoas negras e indígenas nas candidaturas. O caso Mariana Ferrer, que chamou atenção para a culpabilização das vítimas em crimes sexuais, foi anulado pelo Supremo Tribunal Federal (STF), refletindo um amadurecimento no respeito às mulheres pelas instituições brasileiras. O governo do Distrito Federal exigiu R$ 1 milhão de uma ONG presidida por Karina Ferreira da Gama, ligada ao filme de Bolsonaro, por falhas na execução de um convênio na área de educação. Além disso, o presidente Lula assinou um decreto que prevê o bloqueio imediato de fundos de empresas de apostas ilegais, com os recursos sendo direcionados ao Fundo Nacional de Segurança Pública para combate ao crime organizado."}, "resumo_do_dia": {"politica_nacional": [{"id": 6925, "titulo": "'Misantropia': a mensagem enviada com alerta pela Defesa Nacional após invasão hacker", "url": "https://www.bbc.com/portuguese/articles/cjeglwx4jnjo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-20T09:49:00Z", "idioma": "pt", "texto_pt": "Uma invasão hacker na plataforma de alertas da Defesa Civil Nacional resultou na distribuição de uma mensagem estranha para usuários na noite de sexta-feira, 20/06.", "titulo_pt": "Misantropia: mensagem incomum enviada após invasão hacker na Defesa Civil Nacional", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 6923, "titulo": "Por que caso Mariana Ferrer se tornou emblemático e será julgado de novo após decisão do STF", "url": "https://www.bbc.com/portuguese/articles/czx50xwvl9yo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-20T09:16:00Z", "idioma": "pt", "texto_pt": "O caso Mariana Ferrer chamou atenção para a culpabilização das vítimas em crimes sexuais. A anulação pelo STF reflete um amadurecimento no respeito às mulheres por parte das instituições brasileiras.", "titulo_pt": "Por que o caso Mariana Ferrer se tornou emblemático e será julgado de novo após decisão do STF", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 6751, "titulo": "Pré-candidato ao governo de MG cotado como nome de Lula pediu impeachment de Dilma", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/pre-candidato-ao-governo-de-mg-cotado-como-nome-de-lula-pediu-impeachment-de-dilma.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-20T09:00:00Z", "idioma": "pt", "texto_pt": "O pré-candidato ao governo de Minas Gerais, Gabriel Azevedo (MDB), já protocolou um pedido de impeachment contra Dilma Rousseff (PT) quando ela era presidente.", "titulo_pt": "Pré-candidato a governador de MG que pode apoiar Lula pediu impeachment de Dilma", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6752, "titulo": "Governo do DF cobra R$ 1 milhão de ONG ligada ao filme de Bolsonaro por falhas em convênio", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/governo-do-df-cobra-r-1-milhao-de-ong-ligada-ao-filme-de-bolsonaro-por-falhas-em-convenio.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-20T07:02:00Z", "idioma": "pt", "texto_pt": "O Governo do Distrito Federal está exigindo R$ 1 milhão de uma ONG presidida por Karina Ferreira da Gama devido a falhas na execução de um convênio na área de educação.", "titulo_pt": "Governo do DF cobra R$ 1 milhão de ONG por falhas em convênio", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6770, "titulo": "TSE firma acordo com partidos para evitar fraudes de cotas para mulheres, pretos e indígenas; veja casos polêmicos", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/06/20/tse-faz-acordo-com-partidos-para-evitar-fraudes-de-cotas-para-mulheres-pretos-e-indigenas-veja-casos-polemicos.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T07:00:00Z", "idioma": "pt", "texto_pt": "O Tribunal Superior Eleitoral (TSE) firmou um acordo com os partidos políticos para assegurar o cumprimento das cotas destinadas a mulheres, pessoas negras e indígenas nas candidaturas. A Lei das Eleições estabelece que pelo menos 30% das candidaturas devem ser de mulheres.", "titulo_pt": "TSE estabelece acordo com partidos para garantir cumprimento de cotas eleitorais; veja casos polêmicos", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 6771, "titulo": "Fundo Eleitoral do PL, de Flávio Bolsonaro, triplica em 4 anos", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/06/20/fundo-eleitoral-partidos-2026.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T03:00:00Z", "idioma": "pt", "texto_pt": "O Fundo Especial de Financiamento de Campanha (FEFC) para o Partido Liberal (PL) aumentou significativamente, triplicando entre as eleições de 2022 e 2026. O PL receberá R$ 881,6 milhões desse fundo em 2026, representando cerca de 17,7% do total disponível.", "titulo_pt": "Fundo Eleitoral do PL de Flávio Bolsonaro triplica em 4 anos", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 6772, "titulo": "'Taxa das blusinhas': após fim do imposto, varejo e importadores levam disputa ao Congresso e à Justiça", "url": "https://g1.globo.com/economia/noticia/2026/06/20/taxa-das-blusinhas-apos-fim-do-imposto-varejo-e-importadores-levam-disputa-ao-congresso-e-a-justica.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T03:00:00Z", "idioma": "pt", "texto_pt": "Após o fim da 'taxa das blusinhas', que era um imposto de 20% sobre compras vindas da China, representantes do varejo nacional, importadores e consumidores brasileiros intensificaram suas ações nas redes sociais, no Congresso Nacional e até mesmo no Judiciário.", "titulo_pt": "'Taxa das blusinhas': após fim do imposto, varejo e importadores levam disputa ao Congresso e à Justiça", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 6753, "titulo": "Estados e capitais destinam R$ 15,4 bi a emendas parlamentares locais em ano eleitoral", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/estados-e-capitais-destinam-r-154-bi-a-emendas-parlamentares-locais-em-ano-eleitoral.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-20T02:00:00Z", "idioma": "pt", "texto_pt": "Deputados estaduais e vereadores de capitais alocaram R$ 15,4 bilhões dos orçamentos respectivos para emendas parlamentares em 2026, ano eleitoral, segundo levantamento da Folha.", "titulo_pt": "Estados e capitais destinam R$ 15,4 bi a emendas parlamentares locais em ano eleitoral", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6754, "titulo": "Campanha de Flávio dirá que operação contra Wagner é mais grave que áudio com Vorcaro", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/campanha-de-flavio-dira-que-operacao-contra-wagner-e-mais-grave-que-audio-com-vorcaro.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-20T02:00:00Z", "idioma": "pt", "texto_pt": "A pré-campanha de Flávio Bolsonaro rejeita a ideia de que tenha apenas 'empatado' o jogo com a campanha de Lula em relação ao caso Master, após a operação contra Jaques Wagner.", "titulo_pt": "Campanha de Flávio afirmará que operação contra Wagner é mais séria do que áudio com Vorcaro", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6773, "titulo": "PT aciona TSE contra Flávio Bolsonaro por vídeo com IA e alega propaganda antecipada", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/06/19/pt-aciona-tse-contra-flavio-bolsonaro-por-video.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T23:30:00Z", "idioma": "pt", "texto_pt": "O PT apresentou uma representação no Tribunal Superior Eleitoral (TSE) contra o senador Flávio Bolsonaro, acusando-o de usar inteligência artificial e realizar propaganda eleitoral antecipada em um vídeo publicado nas redes sociais.", "titulo_pt": "PT aciona TSE contra Flávio Bolsonaro por vídeo com IA e alega propaganda antecipada", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 6755, "titulo": "STF tem 6 a 4 para manter perdão a partidos que descumpriram cotas", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/stf-tem-6-a-4-para-manter-perdao-a-partidos-que-descumpriram-cotas.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T23:26:00Z", "idioma": "pt", "texto_pt": "O STF decidiu por 6 votos against 4 válidar um perdão aos partidos políticos que não atingiram as cotas raciais para financiamento de candidaturas em eleições anteriores a 2022.", "titulo_pt": "STF mantém perdão a partidos que não cumpriram cotas raciais", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6339, "titulo": "Trump no Salão dos Espelhos", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/demetriomagnoli/2026/06/trump-no-salao-dos-espelhos.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T22:46:00Z", "idioma": "pt", "texto_pt": "O Tratado de Versalhes, assinado em 1919, estabeleceu as condições da rendição alemã após a Grande Guerra. Em 2018, o governo Trump firmou um Memorando de Entendimento oferecendo uma rendição condicional ao Irã, com a cerimônia prevista para ocorrer em um resort suíço.", "titulo_pt": "Trump no Salão dos Espelhos", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6340, "titulo": "Cidade paulista poderá seguir sem prefeito após duas eleições", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/cidade-paulista-podera-seguir-sem-prefeito-apos-duas-eleicoes.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T21:50:00Z", "idioma": "pt", "texto_pt": "A cidade de Tuiuti, com 7.000 habitantes, terá a segunda eleição para prefeito desde outubro de 2024 e corre o risco de permanecer sem chefe do Executivo municipal.", "titulo_pt": "Cidade paulista pode ficar sem prefeito após duas eleições", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6341, "titulo": "Moraes autoriza depoimento de Bolsonaro à Polícia Civil sobre arma apreendida", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/blogs/brasilia-hoje/2026/06/moraes-autoriza-depoimento-de-bolsonaro-a-policia-civil-sobre-arma-apreendida.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T21:28:00Z", "idioma": "pt", "texto_pt": "O ministro Alexandre de Moraes, do STF, permitiu que Jair Bolsonaro preste depoimento à Polícia Civil em relação ao caso da apreensão de uma arma em seu nome. O depoimento será realizado na próxima terça-feira (23) na residência do ex-presidente.", "titulo_pt": "Moraes autoriza depoimento de Bolsonaro sobre arma apreendida", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6342, "titulo": "Trump diz que Lula é 'muito volátil' e que não se importa com ele", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/trump-diz-que-lula-e-muito-volatil-e-que-nao-se-importa-com-ele.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T21:18:00Z", "idioma": "pt", "texto_pt": "O presidente dos EUA, Donald Trump, declarou em entrevista que o ex-presidente Luiz Inácio Lula da Silva é 'muito volátil' e manifestou não se importar com o atual presidente brasileiro.", "titulo_pt": "Trump afirma que Lula é 'muito volátil' e não se importa com ele", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6352, "titulo": "Moraes autoriza Polícia Civil a ouvir Bolsonaro na prisão domiciliar sobre arma apreendida em blitz", "url": "https://g1.globo.com/df/distrito-federal/noticia/2026/06/19/moraes-autoriza-policia-civil-a-ouvir-bolsonaro-na-prisao-domiciliar-sobre-arma-apreendida-em-blitz-no-df.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T21:03:00Z", "idioma": "pt", "texto_pt": "O ministro Alexandre de Moraes, do STF, permitiu que a Polícia Civil do Distrito Federal ouça o ex-presidente Jair Bolsonaro em relação à arma de fogo apreendida durante uma blitz. A pistola estava no carro de um militar do GSI e não tinha certificado de registro válido.", "titulo_pt": "Moraes autoriza ouvir Bolsonaro sobre arma apreendida", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}], "politica_internacional": [{"id": 7123, "titulo": "Could Israel lose Donald Trump’s support by continuing to drop bombs in Lebanon?", "url": "https://www.france24.com/en/could-israel-lose-donald-trump-s-support-by-continuing-to-drop-bombs-in-lebanon", "fonte_id": "france24", "data_pub": "2026-06-20T10:46:00Z", "idioma": "en", "texto_pt": "Israel realizou ataques em território libanês no sábado, resultando na morte de pelo menos sete pessoas, incluindo duas crianças. Esses combates persistentes ameaçam um acordo temporário entre os Estados Unidos e Irã para encerrar a guerra no Oriente Médio.", "titulo_pt": "Israel poderia perder o apoio de Trump ao continuar bombardear o Líbano?", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 7093, "titulo": "These nuns spent a lifetime helping others. In their last years, who will help them?", "url": "https://www.npr.org/2026/06/20/g-s1-128632/nuns-convent-africa-hospice", "fonte_id": "npr_news", "data_pub": "2026-06-20T10:45:00Z", "idioma": "en", "texto_pt": "Freiras ugandenses desempenham papéis como educadoras e defensoras da saúde. No entanto, na fase final de suas vidas, elas precisam de assistência.", "titulo_pt": "Estas freiras passaram toda a vida ajudando outros. Agora, em seus últimos anos, quem as ajudará?", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 7145, "titulo": "Pakistan: Roadside bombs kill 7 in northwest", "url": "https://www.dw.com/en/pakistan-roadside-bombs-kill-7-in-northwest/a-77636194?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-20T10:42:00Z", "idioma": "en", "texto_pt": "Duas explosões, presumivelmente detonadas remotamente, ocorreram na província de Khyber Pakhtunkhwa, no noroeste do Paquistão. Até o momento, nenhuma organização assumiu a responsabilidade pelos ataques.", "titulo_pt": "Bombas no lado da estrada matam 7 no noroeste do Paquistão", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 7146, "titulo": "India news: Hundreds attend 'Cockroach' party protest in New Delhi", "url": "https://www.dw.com/en/india-news-hundreds-attend-cockroach-party-protest-in-new-delhi/live-77634329?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-20T10:28:00Z", "idioma": "en", "texto_pt": "O Partido Lagarta viral está aumentando a pressão sobre o governo, usando irregularidades nas provas e suicídios entre os estudantes como argumentos contra o Ministro da Educação Dharmendra Pradhan.", "titulo_pt": "Índia: Centenas participam de protesto da 'Partido Lagarta' em Nova Deli", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 7067, "titulo": "Game Change", "url": "https://www.nytimes.com/2026/06/20/briefing/game-change.html", "fonte_id": "nyt_world", "data_pub": "2026-06-20T10:21:00Z", "idioma": "en", "texto_pt": "A recuperação do time dos Knicks está transformando temporariamente Nova York de forma positiva, oferecendo uma visão de um mundo mais amigável e conectado.", "titulo_pt": "Mudança no Jogo", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 7113, "titulo": "Bolivia's president declares state of emergency after six weeks of protests", "url": "https://www.lemonde.fr/en/international/article/2026/06/20/bolivia-s-president-declares-state-of-emergency-after-six-weeks-of-protests_6754694_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-20T10:12:00Z", "idioma": "en", "texto_pt": "O presidente da Bolívia declarou estado de emergência horas após assinar um acordo com a maior entidade sindical do país, que é rejeitado por alguns grupos de protesto.", "titulo_pt": "Presidente da Bolívia declara estado de emergência após seis semanas de protestos", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 7125, "titulo": "US-Iran ceasefire negociations underway in Switzerland", "url": "https://www.france24.com/en/us-iran-ceasefire-negociations-underway-in-switzerland", "fonte_id": "france24", "data_pub": "2026-06-20T10:12:00Z", "idioma": "en", "texto_pt": "Um cessar-fogo no Líbano parece ter revivido as negociações. Envio dos Estados Unidos, Steve Witkoff, se juntará ao conselheiro de Estado de Donald Trump, Jared Kushner, na Suíça para se encontrar com o Ministro das Relações Exteriores do Irã, Abbas Araghtchi. Um memorando foi assinado recentemente pelos EUA e Irã para parar a guerra, mas ainda há detalhes a serem acertados.", "titulo_pt": "Negociações para cessar-fogo entre EUA e Irã retomadas na Suíça", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 7126, "titulo": "Rare Mozart manuscript discovered by French curator", "url": "https://www.france24.com/en/rare-mozart-manuscript-discovered-by-french-curator", "fonte_id": "france24", "data_pub": "2026-06-20T10:09:00Z", "idioma": "en", "texto_pt": "Foi encontrado um caderno com composições inéditas assinadas por Wolfgang Amadeus Mozart, datadas do período em que ele dava aulas de música. As peças serão apresentadas publicamente pela primeira vez durante o Fête de la Musique, dia dedicado à música celebrado anualmente no dia 21 de junho, por músicos da orquestra filarmônica da Radio France.", "titulo_pt": "Manuscrito raro de Mozart descoberto na biblioteca nacional francesa", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 7207, "titulo": "Idf, 'raid contro Hezbollah in risposta al lancio di 50 proiettili sulle truppe'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/20/idf-raid-contro-hezbollah-in-risposta-al-lancio-di-50-proiettili-sulle-truppe_879df396-295a-4b83-8f57-6ae28459bf00.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-20T10:07:00Z", "idioma": "it", "texto_pt": "Forças israelianas realizaram um raio-X na zona de segurança no sul do Líbano como resposta a um ataque com 50 projéteis lançados sobre suas tropas.", "titulo_pt": "Forças israelenses realizam operação contra Hezbollah em resposta ao lançamento de 50 projéteis nas tropas", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 7094, "titulo": "Fighting persists in Lebanon despite a ceasefire as U.S.-Iran deal is under threat", "url": "https://www.npr.org/2026/06/20/nx-s1-5865006/fighting-lebanon-despite-ceasefire", "fonte_id": "npr_news", "data_pub": "2026-06-20T10:02:00Z", "idioma": "en", "texto_pt": "Israel realizou ataques em território libanês do sul, causando pelo menos sete mortes, incluindo duas crianças, horas após relatos de um acordo de cessar-fogo. O acordo entre EUA e Irã está sob ameaça.", "titulo_pt": "Conflito persiste no Líbano apesar de cessar-fogo e ameaça ao acordo entre EUA e Irã", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 6759, "titulo": "Explosões à beira de estrada deixam sete mortos no Paquistão", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/explosoes-a-beira-de-estrada-deixam-sete-mortos-no-paquistao.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-20T10:00:00Z", "idioma": "pt", "texto_pt": "Duas explosões ocorridas à beira de uma estrada resultaram em sete mortos na província de Jaiber Pastunjuá, localizada no noroeste do Paquistão.", "titulo_pt": "Explosões na beira da estrada causam sete mortes no Paquistão", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 7068, "titulo": "A Court Case Reveals Some of Tim Hortons’ Secrets", "url": "https://www.nytimes.com/2026/06/20/world/canada/tim-hortons-prices-quebec-court.html", "fonte_id": "nyt_world", "data_pub": "2026-06-20T10:00:00Z", "idioma": "en", "texto_pt": "A cadeia de doce de leite e café possui um sistema complexo para aumentar os preços e garantir que clientes fiéis paguem por seus programas de recompensas.", "titulo_pt": "Um Caso Judicial Revela Alguns Segredos da Tim Hortons", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 7127, "titulo": "Paint from Trump renovation peels off Washington's Reflecting Pool", "url": "https://www.france24.com/en/paint-from-trump-renovation-peels-off-washington-s-reflecting-pool", "fonte_id": "france24", "data_pub": "2026-06-20T09:57:00Z", "idioma": "en", "texto_pt": "O icônico lago refletor, localizado entre o Monumento Lincoln e o Monumento do Washington na Mall Nacional de DC, ficou verde devido à proliferação de algas. Menos de duas semanas após ser reaberto após a renovação ordenada por Donald Trump, que incluiu a pintura com azul da bandeira americana, a pintura já está descascando.", "titulo_pt": "Pintura da renovação de Washington's Reflecting Pool está descascando", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 7208, "titulo": "Protezione Civile, 'almeno 16 morti in raid israeliani nel sud del Libano'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/20/protezione-civile-almeno-16-morti-in-raid-israeliani-nel-sud-del-libano_22640e6b-cb31-419a-b27a-a66b8e6e46e1.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-20T09:55:00Z", "idioma": "it", "texto_pt": "Na região de Nabatieh, ocorreram operações militares israelenses que resultaram em pelo menos 16 mortes.", "titulo_pt": "Proteção Civil, 'pelo menos 16 mortes em operações israelenses no sul do Líbano'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 7104, "titulo": "Lebanon ceasefire between Israel and Hezbollah remains fragile under US-Iran pressure", "url": "https://www.lemonde.fr/en/international/article/2026/06/20/lebanon-ceasefire-between-israel-and-hezbollah-remains-fragile-under-us-iran-pressure_6754692_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-20T09:41:00Z", "idioma": "en", "texto_pt": "Um ceipamento foi estabelecido desde a tarde de sexta-feira, mas ameaças de escalada hostilidade colocam em risco o acordo entre Washington e Teerã, já que Israel não demonstra intenção de retirar suas forças do sul do Líbano.", "titulo_pt": "Ceipamento entre Israel e Hezbollah no Líbano permanece frágil sob pressão dos EUA e Irã", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 7128, "titulo": "This small kamikaze helicopter defends Ukraine from Shahed drones", "url": "https://www.france24.com/en/this-small-kamikaze-helicopter-defends-ukraine-from-shahed-drones", "fonte_id": "france24", "data_pub": "2026-06-20T09:37:00Z", "idioma": "en", "texto_pt": "As operações aéreas da Rússia na Ucrânia envolvem uma combinação de drones, mísseis balísticos e cruise missiles. Desde o último verão, a Ucrânia tem utilizado dron interceptador para se defender contra os drones Shahed iranianos.", "titulo_pt": "Este pequeno dron kamikaze defende a Ucrânia de drones Shahed", "veiculo": "France 24", "pais": "França", "classe": "A"}], "cultura": [{"id": 7105, "titulo": "German government stokes up the memory wars surrounding the 'displaced persons' of 1945", "url": "https://www.lemonde.fr/en/international/article/2026/06/20/german-government-stokes-up-the-memory-wars-surrounding-the-displaced-persons-of-1945_6754696_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-20T10:58:00Z", "idioma": "en", "texto_pt": "O governo cristão-democrata da Alemanha está comemorando o Dia Internacional dos Refugiados, lembrando os 12 milhões de alemães expulsos da Europa Central e Oriental após a Segunda Guerra Mundial. Sob pressão do extremismo direito, o governo optou por tratar o assunto através do Ministério do Interior em vez do Ministério da Cultura.", "titulo_pt": "Alemanha reaviva debate sobre 'deslocados' após a Segunda Guerra Mundial", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 7103, "titulo": "Is air conditioning essential for coping with heatwaves? France might be changing its mind on the issue", "url": "https://www.lemonde.fr/en/environment/article/2026/06/20/is-air-conditioning-essential-for-coping-with-heatwaves-france-might-be-changing-its-mind-on-the-issue_6754695_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-20T10:38:00Z", "idioma": "en", "texto_pt": "Enquanto mais pessoas instalam ar condicionado, muitos ainda veem essa tecnologia como uma resposta equivocada às mudanças climáticas. A França está enfrentando temperaturas atípicamente altas, o que levou alguns especialistas a questionarem esse argumento.", "titulo_pt": "É necessário ar condicionado para enfrentar ondas de calor? França pode estar reconsiderando a questão", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 7329, "titulo": "Granta stops publishing short story award winners over AI controversy", "url": "https://www.theguardian.com/books/2026/jun/20/granta-magazine-commonwealth-short-story-prize-ai", "fonte_id": "guardian_culture", "data_pub": "2026-06-20T09:00:00Z", "idioma": "en", "texto_pt": "A revista literária Granta decidiu não mais publicar os vencedores do prêmio Commonwealth de contos após acusações generalizadas de uso de inteligência artificial. A publicação afirmou que não participará mais de parcerias editoriais externas onde não tem controle editorial.", "titulo_pt": "Granta para de publicar vencedores do prêmio Commonwealth por controvérsia sobre AI", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 7328, "titulo": "Candice Carty-Williams: ‘People feel very attached to Queenie’", "url": "https://www.theguardian.com/books/2026/jun/20/candice-carty-williams-people-feel-very-attached-to-queenie", "fonte_id": "guardian_culture", "data_pub": "2026-06-20T08:00:00Z", "idioma": "en", "texto_pt": "A autora Candice Carty-Williams discute a possibilidade de abandonar a adaptação para TV do seu primeiro romance e explica por que considera o momento ideal para escrever um segundo livro. Seu primeiro sucesso, 'Queenie', aborda temas como racismo e relacionamentos em Londres sul.", "titulo_pt": "Candice Carty-Williams: 'As pessoas se sentem muito ligadas à Queenie'", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 6765, "titulo": "Tiago Tebet materializa o subconsciente e o místico em nova exposição de pinturas", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/tiago-tebet-materializa-o-subconsciente-e-o-mistico-em-nova-exposicao-de-pinturas.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-20T07:00:00Z", "idioma": "pt", "texto_pt": "As pinturas de Tiago Tebet fazem parte da mostra 'Between You and Me, the Sun and the Moon', que está aberta até 27 de junho na galeria Luciana Brito, em São Paulo. Durante a visita à exposição, o artista descobriu que uma das telas havia sido guardada ao contrário.", "titulo_pt": "Tiago Tebet materializa o subconsciente e o místico em nova exposição de pinturas", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 7078, "titulo": "‘A kind of massive rave’: Paris braces for 2m revellers as Fête de la Musique returns amid heatwave warnings", "url": "https://www.theguardian.com/world/2026/jun/20/paris-braces-tourist-influx-street-festival-fete-de-la-musique", "fonte_id": "guardian_world", "data_pub": "2026-06-20T07:00:00Z", "idioma": "en", "texto_pt": "Paris está se preparando para uma festa de rua sem precedentes neste domingo, com mais de 2 milhões de pessoas esperadas para participar da Festa da Música francesa, que já dura mais de 40 anos e é a maior manifestação cultural do país. A cidade expandiu as medidas de segurança devido ao aumento significativo de fãs de música vindos do Reino Unido e às previsões de temperaturas recorde.", "titulo_pt": "Um tipo de grande rave: Paris se prepara para 2 milhões de visitantes na Festa da Música durante aviso de onda de calor", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 7327, "titulo": "David Guetta and Sia’s song Titanium got me through my fertility treatment", "url": "https://www.theguardian.com/culture/2026/jun/20/my-cultural-awakening-david-guetta-sia-titanium-fertility-treatment", "fonte_id": "guardian_culture", "data_pub": "2026-06-20T06:00:00Z", "idioma": "en", "texto_pt": "A canção 'Titanium' dos artistas David Guetta e Sia foi um ponto de virada para a autora, que estava passando por tratamentos de fertilidade desde 2009. Ela relatou estar em sua véspera de festas no final de 2011, mas com o corpo sobrecarregado de hormônios e a cabeça cheia de esperança e exaustão.", "titulo_pt": "Canção de David Guetta e Sia me ajudou durante o tratamento de fertilidade", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 7330, "titulo": "Would You Rather: Decide to Survive – Romesh Ranganathan’s gameshow is so low-effort it’s almost avant garde", "url": "https://www.theguardian.com/tv-and-radio/2026/jun/20/would-you-rather-decide-to-survive-romesh-ranganathans-gameshow-is-so-low-effort-its-almost-avant-garde", "fonte_id": "guardian_culture", "data_pub": "2026-06-20T06:00:00Z", "idioma": "en", "texto_pt": "O programa Would You Rather, apresentado pelo comediante Romesh Ranganathan no Prime Video, envolve 10 celebridades online desconhecidas fazendo tarefas absurdas. O jogo é comparado a uma versão moderna de It's a Knockout e parece ter custado apenas £420 para montar.}", "titulo_pt": "Would You Rather: Decidir para Sobreviver – Jogo de Comediante é tão simples que parece avant-garde", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 7332, "titulo": "From Funboys to Olivia Rodrigo: the week in rave reviews", "url": "https://www.theguardian.com/culture/2026/jun/20/from-funboys-to-olivia-rodrigo-the-week-in-rave-reviews", "fonte_id": "guardian_culture", "data_pub": "2026-06-20T05:01:00Z", "idioma": "en", "texto_pt": "A revista Guardian selecionou as principais críticas culturais desta semana, incluindo comentários sobre o comediante Steve Coogan em uma comédia irlandesa e a cantora Olivia Rodrigo explorando mistérios relacionamentais.", "titulo_pt": "De Funboys a Olivia Rodrigo: a semana com críticas de destaque", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 7080, "titulo": "Can we electrify the world? Ambition moves from nerdish backwater to centre stage", "url": "https://www.theguardian.com/environment/2026/jun/20/electrification-takes-centre-stage-bonn-climate-talks", "fonte_id": "guardian_world", "data_pub": "2026-06-20T04:00:00Z", "idioma": "en", "texto_pt": "A eletrificação do mundo, incluindo veículos elétricos, aquecimento e refrigeração elétricos e indústria pesada modernizada, pode ser a próxima grande etapa na eliminação dos combustíveis fósseis. Esta mudança poderia economizar bilhões de dólares para consumidores e empresas, reduzindo a demanda global por energia pela metade, segundo uma estimativa.", "titulo_pt": "Podemos eletrificar o mundo? Ambição passa de área nerd para centro das atenções", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 7106, "titulo": "Thomas Piketty: 'To clarify its own stance and unite its ranks, the left must propose a referendum to adopt a national solidarity tax'", "url": "https://www.lemonde.fr/en/opinion/article/2026/06/20/thomas-piketty-to-clarify-its-own-stance-and-unite-its-ranks-the-left-must-propose-a-referendum-to-adopt-a-national-solidarity-tax_6754687_23.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-20T03:01:00Z", "idioma": "en", "texto_pt": "O economista Thomas Piketty propõe que as partidos da esquerda francesa inspirem-se numa proposta de 1945 e promovam um referendo para implementar um imposto mais rigoroso sobre os ricos, estimando que isso poderia arrecadar até €800 bilhões.", "titulo_pt": "Piketty sugere referendo para aprovar imposto solidário sobre os ricos", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 6767, "titulo": "Time Out Market anuncia unidade em São Paulo, a primeira na América do Sul", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/restaurantes/2026/06/time-out-market-anuncia-unidade-em-sao-paulo-a-primeira-na-america-do-sul.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-20T02:00:00Z", "idioma": "pt", "texto_pt": "A Time Out Market planeja abrir sua primeira unidade na América do Sul em São Paulo no primeiro semestre de 2027. O mercado incluirá restaurantes, cafeterias e bares locais, além de programação cultural.", "titulo_pt": "Time Out Market anuncia unidade em São Paulo, primeira na América do Sul", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 6768, "titulo": "Mapeamento expõe como o mercado editorial brasileiro se concentra no Sudeste", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/colunas/walter-porto/2026/06/mapeamento-expoe-como-o-mercado-editorial-brasileiro-se-concentra-no-sudeste.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-20T02:00:00Z", "idioma": "pt", "texto_pt": "Um mapeamento recente, realizado pelo Sindicato Nacional dos Editores de Livros com a consultoria Nielsen, forneceu uma visão mais precisa sobre o mercado editorial brasileiro, destacando sua forte concentração nas regiões do Sudeste.", "titulo_pt": "Mapeamento revela concentração do mercado editorial brasileiro no Sudeste", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 7302, "titulo": "BTS' RM named global ambassador of Nat'l Museum of Korea", "url": "https://en.yna.co.kr/view/AEN20260620000700315", "fonte_id": "yonhap_news", "data_pub": "2026-06-20T00:49:00Z", "idioma": "en", "texto_pt": "RM, líder do grupo de K-pop BTS, foi nomeado embaixador global do Museu Nacional da Coreia em 20 de junho.", "titulo_pt": "RM do BTS nomeado embaixador global do Museu Nacional da Coreia", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 7240, "titulo": "Beyond crabs and dinos: Japan’s least-touristed region rethinks appeal", "url": "https://www.japantimes.co.jp/life/2026/06/20/travel/fukui-tourism-rural-japan-crafts-rural-life/", "fonte_id": "japan_times", "data_pub": "2026-06-19T23:05:00Z", "idioma": "en", "texto_pt": "Fukui Prefecture, frequentemente classificada como uma das prefeituras menos visitadas do Japão, está reavaliando seu potencial turístico com a ajuda de profissionais jovens da indústria de turismo.", "titulo_pt": "Onde além dos carciníacos e dinossauros? Prefeitura de Fukui repensa sua atratividade", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 6345, "titulo": "Seis anos após fundação, CNN Brasil vai virar rede de TV aberta até 2027", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/seis-anos-apos-fundacao-cnn-brasil-vai-virar-rede-de-tv-aberta-ate-2027.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T22:25:00Z", "idioma": "pt", "texto_pt": "A CNN Brasil, que foi inicialmente um canal por assinatura, está expandindo suas operações para incluir uma rede nacional de televisão aberta. O canal pretende se associar a diversas emissoras locais brasileiras até 2027.", "titulo_pt": "Seis anos após fundação, CNN Brasil planeja se tornar rede de TV aberta até 2027", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}], "ciencia_tecnologia": [{"id": 7293, "titulo": "Home Batteries: How They're Installed and How Much They Cost", "url": "https://www.wired.com/story/how-to-buy-a-home-battery/", "fonte_id": "wired", "data_pub": "2026-06-20T11:00:00Z", "idioma": "en", "texto_pt": "Após instalar uma bateria em minha residência, este artigo explica por que você pode querer ter uma bateria doméstica, como elas funcionam e quais fatores considerar, além de fornecer algumas dicas de instalação.", "titulo_pt": "Baterias Domésticas: Como Elas são Instaladas e Qual é o Custo", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 7319, "titulo": "Is NASA falling out of love with Mars?", "url": "https://www.sciencenews.org/article/nasa-mars-exploration-july-2026-ed-note", "fonte_id": "science_news", "data_pub": "2026-06-20T11:00:00Z", "idioma": "en", "texto_pt": "A editora-chefe Nancy Shute discute a relação instável da NASA com as explorações no Marte.", "titulo_pt": "NASA estaria perdendo interesse na exploração do Marte?", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 7295, "titulo": "16 Best Greens Powders (2026): Taste-Tested for Months", "url": "https://www.wired.com/gallery/best-greens-powders/", "fonte_id": "wired", "data_pub": "2026-06-20T10:31:00Z", "idioma": "en", "texto_pt": "O autor realizou pesquisa e testes de gosto para identificar os melhores pó verdes valiosos em termos de qualidade. Bloom Nutrition’s Superfood Greens Powder foi seu escolhido preferido.", "titulo_pt": "16 Melhores Pó Verdes Testados em Gosto (2026)", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 6756, "titulo": "Herbívoros domésticos não substituem megafauna, afirma pesquisa", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/colunas/reinaldojoselopes/2026/06/herbivoros-domesticos-nao-substituem-megafauna-afirma-pesquisa.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-20T10:00:00Z", "idioma": "pt", "texto_pt": "Uma pesquisa concluiu que os ecossistemas brasileiros, apesar de serem considerados maravilhosos, estão 'esburacados' do ponto de vista ecológico e que herbívoros domésticos não podem substituir a megafauna.", "titulo_pt": "Pesquisa afirma que herbívoros domésticos não substituem megafauna", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 7296, "titulo": "Siri AI Hands On: A Smart, Helpful Assistant", "url": "https://www.wired.com/story/siri-ai-hands-on-iphone/", "fonte_id": "wired", "data_pub": "2026-06-20T10:00:00Z", "idioma": "en", "texto_pt": "O novo Siri AI é conversacional, presente em todo lugar e realmente útil.", "titulo_pt": "Testando o Novo Siri AI: Um Assistente Inteligente e Auxiliar", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 7297, "titulo": "Hackers Claim to Leak Stolen Madison Square Garden Data", "url": "https://www.wired.com/story/security-news-this-week-hackers-claim-to-leak-stolen-madison-square-garden-data/", "fonte_id": "wired", "data_pub": "2026-06-20T09:30:00Z", "idioma": "en", "texto_pt": "Os hackers afirmaram ter roubado e revelado dados de Madison Square Garden. Além disso, bares gay em São Francisco estão usando escaneadores faciais, a França deixou de usar serviços da Palantir e a Apple planeja mudar seu serviço de email privado.", "titulo_pt": "Hackers Afirmam Ter Roubado e Revelado Dados de Madison Square Garden", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 6757, "titulo": "Radiotelescópio Bingo não serve a interesses chineses, diz um dos líderes do projeto", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/06/radiotelescopio-bingo-nao-serve-a-interesses-chineses-diz-um-dos-lideres-do-projeto.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-20T09:00:00Z", "idioma": "pt", "texto_pt": "Um dos líderes do projeto no Brasil rechaça as acusações de que o futuro radiotelescópio Bingo seria parte de um esforço chinês para coletar inteligência e fortalecer infraestruturas na América Latina.", "titulo_pt": "Líder do projeto Bingo nega que radiotelescópio sirva a interesses chineses", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 7298, "titulo": "Scientists Invent a Way to Brew Espresso With Ultrasonic Waves—No Hot Water Required", "url": "https://www.wired.com/story/scientists-brew-espresso-with-ultrasonic-waves/", "fonte_id": "wired", "data_pub": "2026-06-20T09:00:00Z", "idioma": "en", "texto_pt": "Pesquisadores demonstraram que podem fazer café equivalente ao espresso convencional usando ondas ultrasôlicas. A técnica não requer água quente e consome 75% menos energia em comparação com o método tradicional.", "titulo_pt": "Cientistas Inventam Método para Fazer Expresso com Ondas Ultrasônicas - Não Precisa de Água Quente", "veiculo": "Wired", "pais" const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const rot = n.topico ? (D.rotulos_topico[n.topico] || n.topico) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(n.topico || '')}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
</body>
</html>
