<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>

le Bolsonaro, mas afirmou que não é correspondido por ela.", "mundo": "Dois terremotos fortes abalaram a região norte da Venezuela na noite de quarta-feira, causando pelo menos 164 mortes e centenas de desaparecidos. As autoridades venezuelanas estão trabalhando intensamente para encontrar sobreviventes e o impacto total dos danos ainda está sendo avaliado. O presidente americano Donald Trump se manifestou oferecendo ajuda ao país após os terremotos. Em Manaus e Belém, moradores foram retirados de seus imóveis como medida de segurança devido aos tremores sentidos nas cidades brasileiras.  Paralelamente, uma onda de calor extremo está assolando a Europa, com temperaturas recorde registradas em vários países. As altas temperaturas estão causando problemas de saúde e incêndios florestais, levando as autoridades a alertar a população sobre os riscos da exposição ao calor intenso. O ministério da saúde espanhol estima que cerca de 200 pessoas podem ter morrido desde domingo devido à onda de calor.\n\nDois terremotos de grande magnitude atingiram a Venezuela, causando danos significativos e deixando muitas pessoas feridas. Um tremor inicial de 7,2 foi seguido por outro ainda mais forte, de 7,5, na mesma região. Edifícios desabaram em Caracas, a capital do país, e espera-se um número elevado de vítimas. A situação gerou preocupação internacional, com países como o Japão também registrando tremores após o evento. Paralelamente, tensões geopolíticas persistem no Oriente Médio. O Irã anunciou que qualquer navio que tentar atravessar o Estreito de Hormuz sem permissão será interceptado, intensificando as preocupações sobre a segurança da região. A China também se prepara para realizar o lançamento inaugural do foguete Long March 10B em julho, demonstrando seu avanço no setor espacial. Enquanto isso, a Coreia do Norte reiterou sua alegação de que os Estados Unidos iniciaram a Guerra da Coreia e pediu apoio ao Congresso americano para o fornecimento de submarinos nucleares à Coreia do Sul. A disputa entre os EUA e a China em relação à inteligência artificial também continua, com legisladores americanos buscando formas de conter o avanço das empresas chinesas no setor.", "economia": "O Banco Central elevou sua projeção de crescimento do Produto Interno Bruto (PIB) para 2% este ano, impulsionada pela expectativa de maior dinamismo da demanda interna e dos setores mais sensíveis ao ciclo econômico, além das medidas de estímulo implementadas pelo governo.  Enquanto isso, a Polícia Federal deflagrou a segunda fase da Operação Disclosure para investigar fraudes contábeis na Americanas, com mandados de busca e apreensão cumpridos no Rio de Janeiro e São Paulo. A empresa Micron Technology reportou uma receita de US$ 41,46 bilhões no último trimestre, um aumento de mais do que quatro vezes em relação ao ano anterior, o que impulsionou as ações de tecnologia global após a divulgação dos resultados financeiros.  A B3 concluiu um programa de treinamento em inteligência artificial para todos os seus funcionários, com níveis básico, intermediário e avançado, visando proteger empregos da automação. Já a reforma tributária brasileira pode levar à revisão do Simples Nacional, que muitos empresários escolhem para simplificar o pagamento de impostos e reduzir burocracias.  No cenário internacional, o mercado acionário de Seul registrou uma forte alta, com os índices subindo mais de 5%, aproximando-se de 9.000 pontos, impulsionado pelo setor de chips em resposta aos resultados positivos divulgados pela Micron. O petróleo Brent caiu por quarto dia consecutivo, ficando abaixo de US$ 72,48 por barril — seu preço de fechamento antes da guerra — antes de flutuar em torno desse nível, devido à reabertura do Estreito de Ormuz.", "tecnologia": "A União Europeia anunciou novas medidas que visam os serviços em nuvem da Amazon Web Services e do Azure, da Microsoft. O governo americano já criticou as regras da UE, afirmando que elas são uma barreira comercial injusta. Em meio a um cenário de avanços tecnológicos, empresas como a Dell apostam na inteligência artificial corporativa com servidores próprios para maior proteção de informações confidenciais. A IBM desenvolveu um novo protótipo de chip com cerca de 100 bilhões de transistores, ocupando uma área do tamanho de uma unha. A densidade é duas vezes maior que a tecnologia anterior da empresa anunciada em 2021 e pode abrir caminho para computadores mais rápidos e eficientes em termos de energia no futuro.  A Amazon Prime Day oferece diversas ofertas para produtos Apple, com descontos até 30%. O evento também apresenta as melhores ofertas da Amazon, com produtos que valem a pena comprar e descontos de até 50%. A Sony Pictures investiu US$ 100 milhões na startup Cosm, que oferece comida e assentos, incluindo mesas altas e banquetas projetados para criar uma experiência teatral mais social.  A agência reguladora de privacidade da Coreia do Sul multou a Bithumb em 210 milhões de won por violar as regras de transferência de dados para o exterior. A ONU anunciou a adoção das primeiras regras globais para veículos autônomos, após preocupações com segurança e o custo de desenvolvimento de sistemas avançados.", "ciencia": "O Comitê de Arquivamento da Câmara dos Estados Unidos aprovou um orçamento de US$ 55,5 bilhões para a Força Espacial dos EUA. O comitê pediu por mais competição no setor de comunicações via satélite e criticou a dependência do processo de conciliação para financiar o Golden Dome.  Em outras áreas científicas, pesquisadores japoneses estão estudando o uso de tendões bovinos para reconstrução de ligamentos cruzados anteriores (LCA). O objetivo é aproveitar a estrutura e as propriedades dos tendões para reparar os ligamentos danificados. No futuro, esse material pode ser usado em outras partes do corpo, como tornozelos e cotovelos. A indústria de vacinas enfrenta um período desafiador, mas participantes da conferência BIO desta semana afirmam que a situação não é totalmente desanimadora. Apesar das dificuldades atuais, há perspectivas otimistas para o futuro do setor.  A Organização Mundial da Saúde (OMS) afirmou que o risco global de Ebola permanece baixo após a França anunciar seu primeiro caso confirmado de Ebola no território francês: um médico que havia voltado do Congo. A NASA revelou dois novos planetas 'super-puffs', mundos gigantes tão leves que sua densidade é comparável à de algodão doce. Cientistas calculam que esses planetas, do tamanho de Júpiter, são os 'mais fofos' já encontrados.", "cultura": "O Festival de Cannes foi palco para diversos acontecimentos culturais relevantes. O filme 'Todos os Amantes da Noite', baseado no romance de Mieko Kawakami, teve sua adaptação cinematográfica discutida pelos diretores Yukiko Sode e atores Yukino Kishii e Tadanobu Asano. A obra busca retratar a 'beleza instável' através das telas.  Em outro evento, o espólio de Whitney Houston emitiu um comunicado refutando as declarações da apresentadora Oprah Winfrey sobre a queda da cantora durante uma gravação do programa. Os representantes consideraram a afirmação de Oprah imprecisa e injusta, destacando a necessidade de cuidado com informações que possam prejudicar a memória da artista.  A Turma da Mônica completa 90 anos e será tema de um desfile gratuito no Sambódromo do Anhembi, em São Paulo, neste domingo (28). A ação celebra a trajetória da criação de Mauricio de Sousa e os ingressos para o evento serão distribuídos gratuitamente. No mundo musical, uma nova tendência une humor e esperança para abordar as dificuldades do planeta. 'Hot Mess', um musical criado por Jack Godfrey e Ellie Coote, conta a história de uma relação tóxica entre a Terra e a Humanidade, explorando temas como crise climática com uma abordagem divertida. O espetáculo teve sucesso no Festival Fringe de Edimburgo e agora está em cartaz em Londres.", "sociedade": "Um estudo revelou que Hong Kong se tornou a sociedade mais desigual do mundo em termos de distribuição de riqueza. Os principais fatores para essa desigualdade mudaram de disparidades salariais para concentração de capital, reduzindo a mobilidade social.  Em meio a esse cenário global, no Brasil, uma pesquisa avaliou dados de ex-alunos da rede pública para demonstrar a importância do Ensino Médio Integral na elevação da renda da população local. O estudo reforça a ideia de que investir no Ensino Médio Integral gera benefícios para a comunidade como um todo.  A Unifesp está oferecendo aulas gratuitas de português para imigrantes, com o ensino realizado presencialmente aos sábados, das 9h às 13h, no Anfiteatro Flávio da Fonseca, até outubro. A aprovação do PL 4225 pela Câmara dos Deputados é considerada uma vitória histórica para milhões de brasileiros com transtornos do neurodesenvolvimento. O projeto visa garantir o acesso a diagnóstico e tratamento adequados para pessoas com TDAH.  No Chile, um relatório da ONG Techo Chile revelou que 30% das escolas do país não possuem sistemas de segurança básicos como alarmes, câmeras e iluminação adequada. Essa falta de proteção aumenta o risco de vandalismo, roubos e até violência contra alunos e funcionários. O artigo também discute a situação de pessoas que vivem nas ruas no Chile, mencionando as dificuldades enfrentadas por essas pessoas, como a falta de moradia e acesso a serviços básicos.", "meio_ambiente": "Dois terremotos de grande magnitude atingiram a Venezuela na quarta-feira (24), causando o colapso de edifícios em Caracas e gerando um alerta de tsunami. O primeiro tremor, com magnitude 7,1, foi seguido por outro de magnitude 7,5 horas depois. Vídeos divulgados nas redes sociais mostram pessoas correndo no aeroporto de Maiquetía, interrupções de energia e edifícios danificados na capital venezuelana.  O Serviço Geológico dos Estados Unidos (USGS) registrou os tremores com epicentro a cerca de 100 quilômetros a oeste de Caracas. O governo venezuelano pediu tranquilidade à população e ativou o protocolo de emergência para lidar com as consequências do desastre natural. A extensão total dos danos ainda é desconhecida, mas autoridades locais alertam para a possibilidade de vítimas fatais.", "direitos_humanos": "Dois terremotos atingiram a Venezuela, resultando na morte de 164 pessoas e deixando mais de 900 feridos. A presidente interina da Venezuela, Delcy Rodríguez, confirmou o número de vítimas fatais e informou que foram registradas 30 réplicas dos eventos iniciais.  Em outra tragédia, um menino de 3 anos foi encontrado morto dentro de um carro estacionado na porta de sua casa na França durante uma onda de calor que causou outras 40 mortes devido às altas temperaturas. Em Hong Kong, a Comissão de Oportunidades Iguais (EOC) está buscando cerca de HK$250.000 (US$31.900) em compensação para a família de uma empregada doméstica que foi demitida por seu empregador após ser diagnosticada com câncer cervical avançado e posteriormente falecer. A EOC iniciou ações legais contra o empregador por discriminação contra pessoas com deficiência.  Em Seul, uma mulher vietnamita foi sentenciada a 10 anos de prisão por abandonar e matar seu próprio bebê em 2022. Uma estudante universitária vietnamita também foi condenada a 10 anos de prisão por abandonar seu bebê recém-nascido perto da Universidade Dongguk no ano passado, causando a morte do bebê.  Em Singapura, um homem foi preso após fingir ser sua ex-namorada e compartilhar fotos dela nuas em um grupo de bate-papo sexual com tema religioso. A vítima descobriu a situação e se infiltrou no grupo para investigar, encontrando muitas imagens e vídeos obscenos de mulheres vestidas com roupas religiosas.  Em outros eventos, o Quênia aprovou uma lei controversa que regulamenta as plataformas online dois anos após protestos violentos envolvendo jovens, conhecidos como Geração Z, que se opunham a um projeto de lei semelhante."}, "resumo_do_dia": {"politica_nacional": [{"id": 16548, "titulo": "PF faz buscas contra deputado do PL condenado no STF por desvio de emendas", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/pf-faz-buscas-contra-deputado-do-pl-condenado-no-stf-por-desvio-de-emendas.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-25T11:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal cumpriu mandados de busca e apreensão em endereços do deputado Josimar Maranhãozinho (PL-MA). Os mandados foram expedidos pelo ministro Flávio Dino, do STF. O deputado foi condenado no STF por desvio de emendas.", "titulo_pt": "PF faz buscas contra deputado do PL condenado no STF por desvio de emendas", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 16575, "titulo": "Após atrito com Flávio, Michelle nega 'briga' e diz que vão 'trabalhar juntos' nas eleições", "url": "https://g1.globo.com/politica/noticia/2026/06/25/flavio-michelle-nega-briga-e-diz-que-vao-trabalhar-juntos.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-25T11:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Michelle Bolsonaro afirmou nas redes sociais que não tem raiva de ninguém e pediu união entre aliados para derrotar o atual governo. A declaração veio após um atrito público entre Michelle e Flávio Bolsonaro sobre as alianças do PL no Ceará.", "titulo_pt": "Michelle Bolsonaro nega 'briga' com Flávio e diz que irão trabalhar juntos nas eleições", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 16576, "titulo": "Com estímulos à economia em um ano eleitoral, BC eleva para 2% estimativa de alta do PIB em 2026", "url": "https://g1.globo.com/economia/noticia/2026/06/25/banco-central-eleva-para-2percent-estimativa-de-alta-do-pib-em-2026.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-25T11:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Banco Central elevou sua projeção de crescimento do PIB brasileiro para 2%, em relação à estimativa anterior de 1,6%. A revisão para cima se deve a estímulos fiscais e creditícios. Apesar dos altos juros e da guerra entre Estados Unidos e Irã, o BC acredita que a economia brasileira crescerá.", "titulo_pt": "Com estímulos à economia em ano eleitoral, BC eleva para 2% estimativa de alta do PIB em 2026", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 16553, "titulo": "Cade quer criar equipe dedicada à investigação de big techs", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/cade-quer-criar-equipe-dedicada-a-investigacao-de-big-techs.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente interino do Conselho Administrativo de Defesa Econômica (CADE), Diogo Thomson de Andrade, afirmou que o órgão pretende criar uma equipe específica para investigar grandes plataformas de tecnologia. Essa equipe será dedicada a lidar com casos envolvendo as big techs.", "titulo_pt": "CADE quer criar equipe para investigar big techs", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 16554, "titulo": "Luana Piovani assinou contrato de R$ 300 mil com sindicato do BC para criticar PEC da autonomia financeira", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/luana-piovani-assinou-contrato-de-r-300-mil-com-sindicato-do-bc-para-criticar-pec-da-autonomia-financeira.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O sindicato que representa servidores do Banco Central contratou a atriz Luana Piovani para gravar um vídeo contra a PEC que concede autonomia financeira e administrativa ao banco. O valor do contrato foi de R$ 300 mil.", "titulo_pt": "Luana Piovani assina contrato de R$ 300 mil com sindicato do BC para criticar PEC da autonomia financeira", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 16680, "titulo": "PF faz operação sobre fraude contábil na Americanas e bloqueia R$ 54 bi em bens", "url": "https://veja.abril.com.br/economia/pf-faz-operacao-sobre-fraude-contabil-na-americanas-e-bloqueia-r-54-bi-em-bens/", "fonte_id": "veja", "data_pub": "2026-06-25T10:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal (PF) realizou uma operação contra fraude contábil na empresa Americanas. O objetivo da operação é investigar os sócios controladores Jorge Paulo Lemann e Carlos Alberto Sicupira.  R$ 54 bilhões em bens foram bloqueados durante a operação.", "titulo_pt": "PF realiza operação sobre fraude contábil na Americanas e bloqueia R$ 54 bi em bens", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 16555, "titulo": "PF cumpre mandados em investigação sobre fraude bilionária na Americanas", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/pf-cumpre-mandados-em-investigacao-sobre-fraude-bilionaria-nas-americanas.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T10:47:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal deflagrou a segunda fase da Operação Disclosure para investigar fraudes contábeis bilionárias. A operação foi realizada em conjunto com o Ministério Público Federal nesta quinta-feira (25).", "titulo_pt": "PF cumpre mandados na investigação sobre fraude bilionária na Americanas", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 16577, "titulo": "Maranhãozinho é alvo de buscas da PF em operação sobre suspeita de desvio de emendas", "url": "https://g1.globo.com/politica/blog/camila-bomfim/post/2026/06/25/maranhaozinho-e-alvo-de-buscas-da-pf-em-operacao-sobre-suspeita-de-desvio-de-emendas.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-25T10:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O deputado federal Josimar Maranhãozinho (PL-MA) é alvo de buscas da Polícia Federal (PF) na Operação Afluente. A operação investiga a suspeita de desvio de emendas do chamado 'orçamento secreto'.  A PF busca provas de corrupção, desvio de recursos públicos e lavagem de dinheiro.", "titulo_pt": "Maranhãozinho é alvo de buscas da PF em operação sobre suspeita de desvio de emendas", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 16558, "titulo": "Como regularizar a biometria para ter benefícios do INSS?", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/como-regularizar-a-biometria-para-ter-beneficios-do-inss.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O INSS exige biometria para pedidos de benefícios como aposentadoria, BPC e auxílio-reclusão. A exigência vale desde o final de 2024 para o BPC e desde novembro de 2025 para as aposentadorias. Uma portaria recente trouxe novidades sobre a regularização da biometria para os segurados.", "titulo_pt": "Como regularizar a biometria para receber benefícios do INSS?", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 16737, "titulo": "O pedido de desculpas de Flávio Bolsonaro após vídeo de Michelle", "url": "https://www.bbc.com/portuguese/articles/c4gy3ljr4lmo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-25T09:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Flávio Bolsonaro afirmou que nunca ofendeu ou teve a intenção de ofender Michelle Bolsonaro. O senador e pré-candidato à Presidência fez o pedido após o vazamento de um vídeo em que Michelle afirma ter recebido 'punhalada' do enteado.", "titulo_pt": "Pedido de desculpas de Flávio Bolsonaro após vídeo de Michelle", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 16687, "titulo": "Esclarecimentos de Bolsonaro sobre arma podem adiar decisão de Moraes sobre prisão domiciliar", "url": "https://veja.abril.com.br/politica/esclarecimentos-de-bolsonaro-sobre-arma-podem-adiar-decisao-de-moraes-sobre-prisao-domiciliar/", "fonte_id": "veja", "data_pub": "2026-06-25T09:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A defesa de Jair Bolsonaro informou ao STF que a arma registrada em seu nome havia sido inutilizada por sua equipe de segurança. Essa informação pode influenciar a decisão do ministro Alexandre de Moraes sobre o pedido de prisão domiciliar do ex-presidente.", "titulo_pt": "Esclarecimentos de Bolsonaro sobre arma podem adiar decisão de Moraes sobre prisão domiciliar", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 16701, "titulo": "Entre promessa de neutralidade e aumento de carga no setor financeiro", "url": "https://www.jota.info/opiniao-e-analise/colunas/radar-reforma-tributaria/entre-promessa-de-neutralidade-e-aumento-de-carga-no-setor-financeiro", "fonte_id": "jota", "data_pub": "2026-06-25T08:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Lei Complementar 214 reestrutura a tributação sobre serviços financeiros. A transição para o IBS (Imposto sobre Operações Financeiras) e o CBS (Custo do Banco Central) apresenta desafios operacionais para o setor.", "titulo_pt": "Entre promessa de neutralidade e aumento de carga no setor financeiro", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 16702, "titulo": "Matar o médico para curar a doença: o projeto que quer acabar com o Carf", "url": "https://www.jota.info/opiniao-e-analise/artigos/matar-o-medico-para-curar-a-doenca-o-projeto-que-quer-acabar-com-o-carf", "fonte_id": "jota", "data_pub": "2026-06-25T08:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O PL 2665 propõe transferir os processos do Conselho Administrativo de Recursos Fiscais (Carf) para a Justiça Federal. O Carf possui um acervo trilionário de processos, o que geraria sobrecarga na Justiça Federal já existente.", "titulo_pt": "Matar o médico para curar a doença: projeto que quer acabar com o Carf", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 16706, "titulo": "Postes organizados, conectividade e segurança", "url": "https://www.jota.info/opiniao-e-analise/artigos/postes-organizados-conectividade-e-seguranca", "fonte_id": "jota", "data_pub": "2026-06-25T08:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Congresso tem a oportunidade de aprovar uma solução equilibrada para solucionar os problemas da rede de telecomunicações. A proposta visa organizar os postes, garantir conectividade e aumentar a segurança na infraestrutura.", "titulo_pt": "Postes organizados, conectividade e segurança", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 16707, "titulo": "O fim da gincana documental após 5 anos da nova Lei de Licitações", "url": "https://www.jota.info/opiniao-e-analise/artigos/o-fim-da-gincana-documental-apos-5-anos-da-nova-lei-de-licitacoes", "fonte_id": "jota", "data_pub": "2026-06-25T08:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Empresas podem competir com base em qualidade e eficiência, sem se preocupar tanto com formalidades. A mudança ocorreu após 5 anos da implementação da nova Lei de Licitações.", "titulo_pt": "Fim da gincana documental após 5 anos da nova Lei de Licitações", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 16626, "titulo": "Jaques é 1ª \"demissão\" de Lula no Congresso e expõe articulação frágil", "url": "https://www.metropoles.com/brasil/jaques-e-1a-demissao-de-lula-no-congresso-e-expoe-articulacao-fragil", "fonte_id": "metropoles", "data_pub": "2026-06-25T08:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Jaques Wagner foi demitido pelo presidente Lula, sendo o primeiro caso de saída de um ministro do governo federal durante sua gestão. A demissão ocorre em meio a uma crise política e não está relacionada a nenhum rearranjo ministerial. O sucessor de Wagner terá o desafio de reconstruir o diálogo com o presidente do Senado, Rodrigo Pacheco, destravar pautas legislativas e evitar derrotas.", "titulo_pt": "Jaques é a primeira 'demissão' de Lula no Congresso e expõe articulação frágil", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 16802, "titulo": "Live Updates: Spain Warns of High Death Toll in Heat Wave", "url": "https://www.nytimes.com/live/2026/06/25/weather/europe-heat-wave-uk-france", "fonte_id": "nyt_world", "data_pub": "2026-06-25T11:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O ministério da saúde espanhol estima que cerca de 200 pessoas podem ter morrido desde domingo devido à onda de calor. O clima em toda a Europa deve permanecer acima da média nesta quinta-feira.", "titulo_pt": "Espanha Adverte sobre Alto Número de Mortes na Ondada de Calor", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 16801, "titulo": "Venezuela Live Updates: Death Toll Rises as Rescuers Mount Frantic Search for Quake Survivors", "url": "https://www.nytimes.com/live/2026/06/25/world/venezuela-earthquake", "fonte_id": "nyt_world", "data_pub": "2026-06-25T11:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Terremotos de magnitude 7,2 e 7,5 atingiram a Venezuela, causando pelo menos 164 mortes e centenas de desaparecidos. As autoridades ainda estão avaliando o impacto total dos danos.", "titulo_pt": "Venezuela: Número de mortos aumenta enquanto equipes buscam sobreviventes do terremoto", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 17071, "titulo": "Emergenza caldo, sospese udienze al Tribunale di Palermo", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/25/emergenza-caldo-sospese-udienze-al-tribunale-di-palermo_01a27cd3-2c5d-471d-9906-40d11036b87d.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-25T11:26:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O Presidente do Tribunal de Palermo, Morosini, suspendeu as audiências até 29 de junho devido à emergência de calor. A suspensão foi tomada por causa dos condicionadores de ar danificados.", "titulo_pt": "Emergência de calor, audiências suspensas no Tribunal de Palermo", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 16667, "titulo": "Moradores são retirados de imóveis em Manaus e Belém após terremotos na Venezuela", "url": "https://www.infomoney.com.br/brasil/moradores-sao-retirados-de-imoveis-em-manaus-e-belem-apos-terremotos-na-venezuela/", "fonte_id": "infomoney", "data_pub": "2026-06-25T11:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Após terremotos registrados na Venezuela, moradores de Manaus e Belém foram retirados de seus imóveis como medida de segurança. Usuários nas redes sociais relataram que prédios balançaram em bairros de Manaus, incluindo Ponta Negra, Adrianópolis, Dom Pedro e Parque 10.", "titulo_pt": "Moradores são retirados de imóveis em Manaus e Belém após terremotos na Venezuela", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 16971, "titulo": "Police seal off key roads in Nairobi as Kenya braces for Gen Z protests", "url": "https://www.bbc.co.uk/news/articles/cgqjl8kj8wpo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-25T11:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Protestadores exigem justiça pelas mortes de mais de 80 pessoas durante as manifestações de 2024 e os protestos do aniversário do ano passado. A polícia fechou algumas vias principais em Nairobi como medida preventiva.", "titulo_pt": "Polícia fecha ruas importantes em Nairobi enquanto Quênia se prepara para protestos da Geração Z", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 16669, "titulo": "Preso nos EUA, Nicolás Maduro pede união após terremoto que atingiu a Venezuela", "url": "https://www.infomoney.com.br/mundo/preso-nos-eua-nicolas-maduro-pede-uniao-apos-terremoto-que-atingiu-a-venezuela/", "fonte_id": "infomoney", "data_pub": "2026-06-25T11:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Nicolás Maduro pediu união à população venezuelana após o terremoto que atingiu o país. Ele também afirmou que a população deve agir com serenidade e ajudar os mais vulneráveis.", "titulo_pt": "Preso nos EUA, Nicolás Maduro pede união após terremoto na Venezuela", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 16813, "titulo": "Deadly Heat Scorches Europe", "url": "https://www.nytimes.com/live/2026/06/25/weather/europe-heat-wave-uk-france/heres-the-latest", "fonte_id": "nyt_world", "data_pub": "2026-06-25T11:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma onda de calor extremo está atingindo a Europa, com temperaturas recorde registradas em vários países. As altas temperaturas estão causando problemas de saúde e incêndios florestais.  As autoridades estão alertando a população sobre os riscos da exposição ao calor intenso.", "titulo_pt": "Cão Mortífera Assola a Europa", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 17072, "titulo": "Oman, non previste tariffe marittime nella futura gestione di Hormuz", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/25/oman-non-previste-tariffe-marittime-nella-futura-gestione-di-hormuz_26797975-036c-4104-bb2b-5d4d2f5ba524.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-25T11:17:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O ministro das Relações Exteriores do Omã afirmou em Bahrein, durante uma reunião com o secretário de Estado americano Antony Blinken, que não há planos para tarifas marítimas na futura gestão da estratégica baía de Hormuz. A declaração foi feita em resposta a preocupações sobre potenciais custos adicionais para navios que passam pela região.", "titulo_pt": "Omã não prevê tarifas marítimas na futura gestão de Hormuz", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 17073, "titulo": "Aula Camera rapita dal \"Va pensiero\", Fontana canta l'aria di Verdi", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/25/aula-camera-rapita-dal-va-pensiero-fontana-canta-laria-di-verdi_8e04c459-ae40-4f8c-93cd-319e12305217.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-25T11:14:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Ex-presidentes das Câmaras também estavam presentes na aula. Alguns pessoas filmaram o evento com celulares.", "titulo_pt": "Aula da Câmara é tomada pelo 'Va pensiero', Fontana canta a aria de Verdi", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 17050, "titulo": "Fact check: No, Zelenskyy wasn't killed in a Russian airstrike", "url": "https://www.dw.com/en/fact-check-no-zelenskyy-wasn-t-killed-in-a-russian-airstrike/a-77704409?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-25T11:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Posts virais afirmam que o presidente ucraniano Volodymyr Zelenskyy morreu durante uma escalada de violência entre Rússia e Ucrânia. A verificação de fatos da DW analisou as alegações. Não há evidências para apoiar a afirmação de que Zelenskyy foi morto em um ataque aéreo russo.", "titulo_pt": "Verificação de fatos: Zelenskyy não morreu em um ataque aéreo russo", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 17145, "titulo": "Lithium Before Democracy: A Serbian Strongman and His German Shadow", "url": "https://balkaninsight.com/2026/06/25/lithium-before-democracy-a-serbian-strongman-and-his-german-shadow/bi/", "fonte_id": "balkan_insight", "data_pub": "2026-06-25T11:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Documentos obtidos pelo BIRN/Der Spiegel mostram que Jörg Heeskens, um consultor alemão pago com dinheiro público alemão, tem aconselhado o presidente sérvio Aleksandar Vucic desde que ele assumiu o poder. Os documentos revelam a estreita colaboração de Heeskens com Vucic em um projeto de mineração de lítio profundamente impopular, expondo o que críticos dizem ser cumplicidade alemã na subversão da democracia pelo presidente.", "titulo_pt": "Lítio Antes da Democracia: Um Chefe de Estado Sérvio e Sua Sombra Alemã", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}, {"id": 17074, "titulo": "Greenpeace-Cgil, 1,5 milioni di lavoratori a rischio caldo nei prossimi giorni", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/25/greenpeace-cgil-15-milioni-di-lavoratori-a-rischio-caldo-nei-prossimi-giorni_33f48a07-510b-4bb3-95b3-a5c9eba85084.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-25T11:10:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Um estudo da Greenpeace e da Cgil, baseado em dados do Cnr, Inail e Istat, indica que 1,5 milhão de trabalhadores italianos estão em risco devido ao calor nos próximos dias. O estudo analisa os dados sobre temperatura e número de trabalhadores em setores vulneráveis.", "titulo_pt": "Greenpeace e Cgil: 1,5 milhão de trabalhadores em risco por calor nos próximos dias", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 16916, "titulo": "2 earthquakes in Venezuela kill at least 164. And, Trump cancels housing bill signing", "url": "https://www.npr.org/2026/06/25/g-s1-130184/up-first-newsletter-venezuela-earthquakes-trump-senate-tensions-chris-donahue", "fonte_id": "npr_news", "data_pub": "2026-06-25T11:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dois terremotos fortes na Venezuela resultaram no óbito de pelo menos 164 pessoas e ferimentos a centenas. O presidente Trump cancelou a cerimônia de assinatura de um grande projeto de lei habitacional bipartidário.", "titulo_pt": "Dois terremotos na Venezuela matam pelo menos 164 pessoas e Trump cancela assinatura de projeto de lei habitacional", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 17075, "titulo": "Mit, nei prossimi giorni Donnarumma rassegnerà le dimissioni da Fs", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/25/mit-nei-prossimi-giorni-donnarumma-rassegnera-le-dimissioni-da-fs_69307552-ec8c-4a26-8782-5c6463907c91.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-25T11:02:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O ministro italiano das Finanças, Giancarlo Giorgetti, e o administrador da FS (Ferrovie dello Stato), Luigi Ferraris, concordaram que o mandato de  Donnarumma como presidente da FS será encerrado antecipadamente. Nos próximos dias, Donnarumma apresentará as suas demissões.", "titulo_pt": "Mit, nos próximos dias Donnarumma apresentará as demissões da Fs", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 16806, "titulo": "Two Earthquakes Hit Venezuela: What to Know About Death Toll, Damage and Rescue Response", "url": "https://www.nytimes.com/2026/06/25/world/americas/venezuela-earthquakes-death-toll-aid-response.html", "fonte_id": "nyt_world", "data_pub": "2026-06-25T11:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dois terremotos fortes atingiram a região norte da Venezuela na noite de quarta-feira. O segundo terremoto foi o mais forte a atingir o país em mais de um século. As autoridades estão realizando esforços de resgate para encontrar sobreviventes.", "titulo_pt": "Dois Terremotos Atingiram a Venezuela: O que Saber Sobre o Número de Vítimas, Danos e Resposta de Salvamento", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 17177, "titulo": "Did the Iran war just prove that China’s ageing DF-15Bs are still big guns?", "url": "https://www.scmp.com/news/china/military/article/3358345/did-iran-war-just-prove-chinas-ageing-df-15bs-are-still-big-guns?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-25T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Analistas militares sugerem que os mísseis de curto alcance Dongfeng-15B da China podem ser mais eficientes em penetrar defesas modernas do que se pensava. Um artigo publicado na revista Ordnance Science and Technology argumenta que os mísseis com veículos de reentrada manobráveis biónicos podem alcançar um efeito de penetração próximo ao de projéteis hipersônicos.", "titulo_pt": "Guerra no Irã prova que mísseis chineses DF-15B ainda são eficazes?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}], "mundo__eventos": [], "economia": [{"id": 16665, "titulo": "BC eleva projeção de alta do PIB no ano para 2% e cita medidas de estímulo do governo", "url": "https://www.infomoney.com.br/economia/bc-eleva-projecao-de-alta-do-pib-no-ano-para-2-e-cita-medidas-de-estimulo-do-governo/", "fonte_id": "infomoney", "data_pub": "2026-06-25T11:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Banco Central elevou sua projeção de crescimento do Produto Interno Bruto (PIB) para 2% este ano. A autarquia afirmou que a revisão se baseia na expectativa de maior dinamismo da demanda interna e dos setores mais sensíveis ao ciclo econômico, além das medidas de estímulo implementadas pelo governo.", "titulo_pt": "BC eleva projeção de alta do PIB para 2% e cita medidas de estímulo do governo", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 16595, "titulo": "Caso Americanas: PF deflagra segunda fase da Operação Disclosure", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/caso-americanas-pf-deflagra-segunda-fase-da-operacao-disclosure", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-25T11:13:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal (PF) e o Ministério Público Federal (MPF) iniciaram a segunda fase da Operação Disclosure para investigar fraudes contábeis na Americanas. Nove mandados de busca e apreensão foram cumpridos, incluindo buscas pessoais, no Rio de Janeiro e São Paulo.", "titulo_pt": "Caso Americanas: PF deflagra segunda fase da Operação Disclosure", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 16982, "titulo": "France's public debt soars above €3.5 trillion", "url": "https://www.lemonde.fr/en/politics/article/2026/06/25/france-s-public-debt-soars-above-3-5-trillion_6754865_5.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-25T10:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A dívida pública francesa atingiu €3,536 trilhões no final de março, segundo o instituto nacional de estatística. Esse valor corresponde a 117,5% do PIB, próximo ao registrado após a pandemia de Covid-19. O aumento não mostra sinais de desaceleração.", "titulo_pt": "Dívida pública da França ultrapassa €3,5 trilhões", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 17018, "titulo": "Micron stock jumps over 16% in premarket trading after blockbuster earnings", "url": "https://www.cnbc.com/2026/06/25/micron-stock-3q-earnings-memory.html", "fonte_id": "cnbc_international", "data_pub": "2026-06-25T10:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Micron Technology reportou uma receita de US$ 41,46 bilhões no último trimestre, um aumento de mais do que quatro vezes em relação ao ano anterior. A empresa divulgou os resultados na quarta-feira.", "titulo_pt": "Ações da Micron sobem mais de 16% antes do mercado após resultados excepcionais", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 16557, "titulo": "B3 aposta em requalificação em IA para proteger empregos da automação", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/06/b3-aposta-em-requalificacao-em-ia-para-proteger-empregos-da-automacao.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A B3 concluiu um programa de treinamento em inteligência artificial para todos os seus funcionários, com níveis básico, intermediário e avançado. O programa, iniciado em 2023, conta com trilhas específicas por área e função, além de parcerias com Microsoft, Oracle e Alura.", "titulo_pt": "B3 investe em requalificação com IA para proteger empregos da automação", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 16559, "titulo": "Reforma tributária exige revisão do Simples Nacional e muda estratégia das empresas", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/blogs/que-imposto-e-esse/2026/06/reforma-tributaria-exige-revisao-do-simples-nacional-e-muda-estrategia-das-empresas.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A reforma tributária brasileira pode levar à revisão do Simples Nacional. Muitos empresários escolhem o Simples Nacional para simplificar pagamentos de impostos e reduzir burocracias.", "titulo_pt": "Reforma tributária exige revisão do Simples Nacional e altera estratégia das empresas", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 16966, "titulo": "What happened to China’s overseas EV factory boom?", "url": "https://restofworld.org/2026/china-ev-makers-overseas-factories-exports/?utm_source=rss&utm_medium=rss&utm_campaign=feeds", "fonte_id": "rest_of_world", "data_pub": "2026-06-25T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Três gráficos mostram que a produção prometida pela China no exterior ainda não se concretizou. A produção de veículos elétricos (EV) na China fora do país não atingiu as expectativas iniciais.  A expansão internacional da indústria automotiva chinesa enfrenta desafios.", "titulo_pt": "O que aconteceu com o boom de fábricas de carros elétricos chinesas no exterior?", "veiculo": "Rest of World", "pais": "EUA", "classe": "A"}, {"id": 16596, "titulo": "Caixa paga Bolsa Família a beneficiários com NIS de final 7", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/caixa-paga-bolsa-familia-beneficiarios-com-nis-de-final-7", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-25T09:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Caixa Econômica Federal pagará nesta quarta-feira (24) o valor do Bolsa Família para beneficiários com Número de Inscrição Social (NIS) terminando em 7. O valor mínimo é de R$ 600, mas com o adicional, o benefício médio chega a R$ 677,66.", "titulo_pt": "Caixa paga Bolsa Família a beneficiários com NIS de final 7", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 17038, "titulo": "Global tech stocks rebound after Micron’s profit surge", "url": "https://www.ft.com/content/b3ad976b-9967-4952-92ff-822a8e253fb1", "fonte_id": "financial_times", "data_pub": "2026-06-25T09:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os resultados trimestrais surpreendentes da fabricante americana de chips Micron acalmaram os temores dos investidores após uma queda no mercado nesta semana. As ações de tecnologia global registraram um aumento após a notícia, revertendo parte das perdas recentes.", "titulo_pt": "Ações tecnológicas globais se recuperam após alta de lucro da Micron", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 16560, "titulo": "STJ condena Bradesco a pagar mais de R$ 600 milhões em ação envolvendo construtora falida", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/stj-condena-bradesco-a-pagar-mais-de-r-600-milhoes-em-acao-envolvendo-construtora-falida.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Superior Tribunal de Justiça (STJ) condenou o Bradesco a pagar mais de R$ 600 milhões à massa falida da Montreal Engenharia. A incorporadora teve a falência decretada em 2006 e suas atividades foram suspensas em 1998.", "titulo_pt": "STJ condena Bradesco a pagar mais de R$ 600 milhões em ação envolvendo construtora falida", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 17261, "titulo": "China specialty foundry Hua Hong Grace rides 40nm low-power process and Wuxi 12-inch ramp", "url": "https://www.digitimes.com/news/a20260624VL208/hua-hong-semiconductor-semiconductor-foundry-12-inch-40nm-capacity.html", "fonte_id": "digitimes", "data_pub": "2026-06-25T08:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Hua Hong Grace Semiconductor (HHGrace) está tendo sucesso com a tecnologia de processo e a expansão de capacidade. Sua fabricação especializada de 40nm ultra-baixo consumo entrou em produção em massa estável, enquanto sua linha de 12 polegadas em Wuxi continua a aumentar.", "titulo_pt": "Fundição especializada chinesa Hua Hong Grace se beneficia de processo de baixo consumo e expansão da capacidade em Wuxi", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 16704, "titulo": "Trabalho em plataformas: nova convenção da OIT é piso global, não CLT mundial", "url": "https://www.jota.info/opiniao-e-analise/colunas/trabalho-previdencia-empresas/trabalho-em-plataformas-nova-convencao-da-oit-e-piso-global-nao-clt-mundial", "fonte_id": "jota", "data_pub": "2026-06-25T08:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Organização Internacional do Trabalho (OIT) aprovou uma nova convenção sobre trabalho em plataformas digitais. A convenção estabelece um piso salarial global para trabalhadores de plataformas, mas não cria um equivalente brasileiro ao contrato de trabalho (CLT). O próximo passo será a tradução e implementação da convenção no Brasil.", "titulo_pt": "Trabalho em plataformas: nova convenção da OIT é piso global, não CLT mundial", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 16708, "titulo": "Acordo Mercosul-UE: o Brasil está pronto para colher resultados positivos?", "url": "https://www.jota.info/opiniao-e-analise/artigos/acordo-mercosul-ue-o-brasil-esta-pronto-para-colher-resultados-positivos", "fonte_id": "jota", "data_pub": "2026-06-25T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Empresas que não mapeiarem a cadeia de fornecimento e seus riscos perderão competitividade antes mesmo da redução das tarifas do acordo Mercosul-UE. Essa é a avaliação feita por especialistas, que destacam a importância da preparação empresarial para o acordo.", "titulo_pt": "Acordo Mercosul-UE: Brasil pronto para colher resultados positivos?", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 17213, "titulo": "(2nd LD) KOSPI spikes over 5 pct, briefly topping 9,000 level again on chip rally after Micron earnings", "url": "https://en.yna.co.kr/view/AEN20260625007552320", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T07:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O índice de ações sul-coreano KOSPI subiu mais de 5% na quinta-feira, atingindo brevemente o nível de 9.000 pontos. A alta foi impulsionada pelo rally nas ações de empresas de semicondutores após a divulgação dos resultados financeiros da Micron Technology.", "titulo_pt": "(2ª Edição) KOSPI sobe mais de 5%, atingindo brevemente os 9 mil pontos novamente impulsionado pela alta nas ações de chips após os resultados da Micron", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 17161, "titulo": "Japan’s government blueprint nudges BOJ to fuel demand, clouding rates path", "url": "https://www.japantimes.co.jp/business/2026/06/25/economy/japan-government-economic-blueprint-draft/", "fonte_id": "japan_times", "data_pub": "2026-06-25T07:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O projeto de lei incentiva o Banco do Japão a alinhar suas decisões com a iniciativa da Primeira-Ministra Sanae Takaichi para reavivar o crescimento. O plano visa estimular o refluxo econômico no Japão.", "titulo_pt": "Plano do governo japonês incentiva o Banco do Japão a impulsionar a demanda, obscurecendo o caminho das taxas", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 16563, "titulo": "Inflação dos mais pobres é o dobro da registrada por mais ricos em maio", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/inflacao-dos-mais-pobres-e-o-dobro-da-registrada-por-mais-ricos-em-maio.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A inflação das famílias com renda muito baixa no Brasil foi de 0,83% em maio. O aumento foi influenciado pelos preços da alimentação e energia elétrica, segundo cálculos do Ipea. A taxa de inflação para as famílias mais ricas foi menor.", "titulo_pt": "Inflação dos mais pobres é o dobro da registrada por mais ricos em maio", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 17291, "titulo": "Best Bluetooth Speakers (2026): JBL, Sonos, Bose, and More", "url": "https://www.wired.com/gallery/best-bluetooth-speakers/", "fonte_id": "wired", "data_pub": "2026-06-25T11:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo apresenta uma lista dos melhores alto-falantes Bluetooth disponíveis no mercado. A seleção inclui modelos de diferentes tamanhos e funcionalidades, desde opções compactas e resistentes à água até caixas de som potentes.  A lista destaca marcas populares como JBL, Sonos e Bose.", "titulo_pt": "Melhores alto-falantes Bluetooth (2026): JBL, Sonos, Bose e mais", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 17150, "titulo": "Ghosn says calls for his Nissan return show investor anger over results", "url": "https://www.japantimes.co.jp/business/2026/06/25/companies/ghosn-nissan-investors/", "fonte_id": "japan_times", "data_pub": "2026-06-25T11:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Carlos Ghosn, que liderou a Nissan por quase duas décadas, vive no Líbano desde que fugiu do Japão no final de 2019. Ele afirmou que as chamadas para seu retorno à empresa indicam a insatisfação dos investidores com os resultados financeiros recentes.", "titulo_pt": "Ghosn diz que pedidos para seu retorno à Nissan demonstram raiva dos investidores com os resultados", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 16987, "titulo": "EU says Amazon, Microsoft cloud services should face stricter rules", "url": "https://www.lemonde.fr/en/pixels/article/2026/06/25/eu-says-amazon-microsoft-cloud-services-should-face-stricter-rules_6754866_13.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-25T10:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A União Europeia (UE) anunciou novas medidas nesta quinta-feira visando os serviços em nuvem da Amazon Web Services e do Azure, da Microsoft. O governo americano sob a presidência de Donald Trump já criticou as regras da UE, afirmando que elas são uma barreira comercial injusta.", "titulo_pt": "UE diz que serviços em nuvem da Amazon e Microsoft devem ter regras mais rigorosas", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 17294, "titulo": "Amazon Prime Day 3 is for the Real Heads, And We're Live-Blogging For Them", "url": "https://www.wired.com/live/amazon-prime-day-live-tracker-july-25-2026/", "fonte_id": "wired", "data_pub": "2026-06-25T10:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O blog ao vivo do Wired continuará a cobrir as ofertas, tendências e comentários durante o terceiro dia da venda de verão anual da Amazon. O objetivo é fornecer informações sobre as melhores ofertas e tendências durante a promoção.", "titulo_pt": "O terceiro dia da Amazon Prime Day é para os verdadeiros entusiastas, e nós estamos fazendo um blog ao vivo para eles.", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 17295, "titulo": "This Buy-It-For-Life Coffee Maker Just Won Prime Day", "url": "https://www.wired.com/story/amazon-prime-day-deal-2026-moccamaster/", "fonte_id": "wired", "data_pub": "2026-06-25T10:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Moccamaster está com desconto na Prime Day. É o melhor preço visto este ano para uma cafeteira que provavelmente durará mais do que você.", "titulo_pt": "Cafeteira para a Vida Inteira Ganha Desconto na Prime Day", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 17297, "titulo": "After More Than a Decade of Waiting, ‘GTA VI’ Is Finally Around the Corner", "url": "https://www.wired.com/story/after-more-than-a-decade-of-waiting-gta-vi-is-finally-around-the-corner/", "fonte_id": "wired", "data_pub": "2026-06-25T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Grand Theft Auto VI está sendo lançado, prometendo ser um dos maiores lançamentos de jogos da história. O jogo é aguardado há mais de uma década pelos fãs.", "titulo_pt": "Após Mais de Uma Década de Espera, 'GTA VI' Está Finalmente Próximo", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 17204, "titulo": "(LEAD) President, Samsung Electronics chief discuss chip cluster investment in southern region", "url": "https://en.yna.co.kr/view/AEN20260625008551320", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T10:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente Lee Jae Myung se reuniu com o chefe da Samsung Electronics, Han Jong-hee. Eles conversaram sobre um possível investimento em um clúster de chips na região sul da Coreia do Sul.", "titulo_pt": "Presidente e chefe da Samsung Electronics discutem investimento em clúster de chips no sul do país", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 16556, "titulo": "Dell aposta em IA corporativa com servidores próprios e alerta para riscos", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/dell-aposta-em-ia-corporativa-com-servidores-proprios-e-alerta-para-riscos.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-25T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Dell afirma que empresas não devem depender apenas de provedores de nuvem para acessar modelos avançados de inteligência artificial. A empresa defende a adoção de servidores próprios para maior proteção de informações confidenciais.", "titulo_pt": "Dell investe em IA corporativa com servidores próprios e alerta para riscos", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 17199, "titulo": "What Europe’s heat wave means for the power grid", "url": "https://www.technologyreview.com/2026/06/25/1139690/europe-heat-wave-grid/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-25T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Europa está enfrentando uma onda de calor com temperaturas recorde, ameaçando vidas, fechando escolas e até cancelando eventos sobre o tema. O calor intenso pode ter impactos significativos na rede elétrica do continente.", "titulo_pt": "O que a onda de calor na Europa significa para a rede elétrica", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 17200, "titulo": "IBM has unveiled chip technology that could help extend Moore’s Law another decade", "url": "https://www.technologyreview.com/2026/06/25/1139696/ibm-unveils-sub1nm-chip/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-25T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A IBM desenvolveu um novo protótipo de chip com cerca de 100 bilhões de transistores, ocupando uma área do tamanho de um unha. A densidade é duas vezes maior que a tecnologia anterior da empresa anunciada em 2021. O design pode abrir caminho para computadores mais rápidos e eficientes em termos de energia no futuro.", "titulo_pt": "IBM revela tecnologia de chip que pode estender a Lei de Moore por mais uma década", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 17252, "titulo": "Cellebrite said it cut off Russia, but Russia used is tools anyway", "url": "https://techcrunch.com/2026/06/25/cellebrite-said-it-cut-off-russia-but-russia-used-is-tools-anyway/", "fonte_id": "techcrunch", "data_pub": "2026-06-25T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores de segurança encontraram evidências de que as autoridades russas hackearam o iPhone de um oponente político usando um dispositivo para desbloquear telefones fabricado pela Cellebrite. Isso aconteceu mesmo após a empresa afirmar que interromperia as vendas ao governo de Putin.", "titulo_pt": "Cellebrite afirmou ter cortado relações com a Rússia, mas a Rússia usou suas ferramentas de qualquer maneira", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 17298, "titulo": "British Police Built a Sprawling Crime-Prediction Machine. Some Results Couldn’t Be Trusted", "url": "https://www.wired.com/story/british-police-built-a-sprawling-crime-prediction-machine-some-results-couldnt-be-trusted/", "fonte_id": "wired", "data_pub": "2026-06-25T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma investigação da WIRED revela detalhes sobre um experimento com análise preditiva realizado por uma região do Reino Unido. A polícia britânica está abraçando a revolução da inteligência artificial, e esse experimento é parte disso.  Alguns resultados obtidos não foram confiáveis.", "titulo_pt": "Polícia Britânica Construiu Máquina de Previsão de Crimes; Alguns Resultados Não Poderiam Ser Confiáveis", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 16703, "titulo": "Influencers políticos criados por IA", "url": "https://www.jota.info/opiniao-e-analise/colunas/constituicao-empresa-e-mercado/influencers-politicos-criados-por-ia", "fonte_id": "jota", "data_pub": "2026-06-25T08:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O artigo discute a necessidade de definir o conceito de cidadania e as possibilidades de participação na esfera pública. A criação de influenciadores políticos por inteligência artificial é mencionada como um tema relevante para essa discussão.", "titulo_pt": "Influenciadores Políticos Criados por IA", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 17299, "titulo": "17 Best Prime Day Apple Deals Offering Up to 30% Off: iPad, Apple Watch, MacBooks, and More (2026)", "url": "https://www.wired.com/story/best-prime-day-apple-deals-06-25-2026/", "fonte_id": "wired", "data_pub": "2026-06-25T08:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Amazon Prime Day oferece diversas ofertas para produtos Apple. Entre as melhores ofertas estão relógios Apple, iPhones, MacBooks, iPads e acessórios.  Os descontos chegam a até 30%.", "titulo_pt": "17 Melhores Ofertas da Apple na Prime Day com Descontos de Até 30%: iPad, Apple Watch, MacBooks e Mais (2026)", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 17300, "titulo": "99 Prime Day Deals on Gear We Stand By, Up To 50% Off (2026)", "url": "https://www.wired.com/story/amazon-prime-day-absolute-best-deals-06-25-2026/", "fonte_id": "wired", "data_pub": "2026-06-25T08:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Wired selecionou as melhores ofertas da Amazon para o Prime Day, incluindo produtos que valem a pena comprar. As ofertas cobrem uma variedade de categorias e oferecem descontos de até 50%. O site recomenda os produtos com base em sua avaliação.", "titulo_pt": "99 Ofertas do Prime Day com Descontos de até 50% (2026)", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 17163, "titulo": "U.S. defense firm Anduril in talks for Nissan plant to build drones in Japan, sources say", "url": "https://www.japantimes.co.jp/business/2026/06/25/us-defense-firm-nissan-oppama-plant-drones/", "fonte_id": "japan_times", "data_pub": "2026-06-25T06:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa americana de defesa Anduril está em negociações com a Nissan para utilizar uma fábrica da empresa no Japão na produção de drones. Ainda não há decisão final sobre o acordo, mas se for fechado, transformaria uma das primeiras grandes fábricas automotivas japonesas após a Segunda Guerra Mundial em um centro de armas.", "titulo_pt": "Empresa americana de defesa Anduril negocia com a Nissan para construir drones em planta japonesa, dizem fontes", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 17320, "titulo": "House Appropriations Committee approves $55.5 billion for U.S. Space Force", "url": "https://spacenews.com/house-appropriations-committee-approves-55-5-billion-for-u-s-space-force/", "fonte_id": "spacenews", "data_pub": "2026-06-25T11:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Comitê de Arquivamento da Câmara dos Estados Unidos aprovou um orçamento de US$ 55,5 bilhões para a Força Espacial dos EUA. O comitê pediu mais competição em comunicações via satélite e criticou a dependência do processo de conciliação para financiar o Golden Dome.", "titulo_pt": "Comitê de Arquivamento da Câmara aprova US$ 55,5 bilhões para Força Espacial dos EUA", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 17321, "titulo": "Canceled NASA exploration projects suffered billions of dollars in overruns", "url": "https://spacenews.com/canceled-nasa-exploration-projects-suffered-billions-of-dollars-in-overruns/", "fonte_id": "spacenews", "data_pub": "2026-06-25T11:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Quatro projetos de exploração da NASA que foram interrompidos no início do ano sofreram com aumentos nos custos, fazendo com que os valores se duplicassem. Espera-se um aumento adicional de mais de US$ 1 bilhão.", "titulo_pt": "Projetos de exploração da NASA cancelados tiveram bilhões de dólares em excessos", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 17308, "titulo": "Weight loss drugs don't work for everyone—here’s why", "url": "https://www.scientificamerican.com/article/weight-loss-drugs-dont-work-for-everyone-heres-why/", "fonte_id": "scientific_american", "data_pub": "2026-06-25T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Alguns indivíduos que utilizam medicamentos GLP-1, como semaglutide e tirzepatide, apresentam poucas ou nenhuma mudança no peso. A razão para isso pode estar relacionada à genética.", "titulo_pt": "Remédios para perda de peso não funcionam para todos - e essa pode ser a razão", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 17359, "titulo": "Who are the fire-tamers?", "url": "https://aeon.co/essays/who-are-the-fire-taming-healers-of-modern-france", "fonte_id": "aeon", "data_pub": "2026-06-25T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um mundo secreto de curandeiros franceses opera paralelamente à medicina convencional, desde casas rurais até clínicas oncológicas. A jornalista Susanna Crossman explora esse universo no Aeon.", "titulo_pt": "Quem são os domtadores de fogo?", "veiculo": "Aeon Magazine", "pais": "Reino Unido", "classe": "A"}, {"id": 16738, "titulo": "Tumor com menos de 1 centímetro fez adolescente ganhar 40 quilos em 6 meses", "url": "https://www.bbc.com/portuguese/articles/cy5v0ye9wn5o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-25T09:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Gustavo de Oliveira, de 16 anos, ganhou 40 quilos em seis meses antes de ser diagnosticado com a doença de Cushing. Um tumor benigno, menor que 1 centímetro, causou um desequilíbrio na produção do hormônio cortisol no corpo dele.", "titulo_pt": "Tumor menor que 1 cm fez adolescente ganhar 40 kg em 6 meses", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 16547, "titulo": "Quase todo mundo vira à esquerda ao caminhar, aponta estudo", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/06/quase-todo-mundo-vira-a-esquerda-ao-caminhar-aponta-estudo.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-25T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo da Universidade de Navarra observou que a maioria dos participantes desviava espontaneamente para a esquerda durante a caminhada. O físico Iñaki Echeverría-Huarte conduziu cerca de 40 experimentos para chegar a essa conclusão.", "titulo_pt": "Quase todo mundo vira à esquerda ao caminhar, aponta estudo", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 17303, "titulo": "STAT+: Facing a brutal run, battered vaccine makers still see cause for hope", "url": "https://www.statnews.com/2026/06/25/vaccine-industry-dark-period-causes-for-hope/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-25T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A indústria de vacinas está passando por um período desafiador. No entanto, participantes da conferência BIO desta semana afirmam que a situação não é totalmente desanimadora. Apesar das dificuldades atuais, há perspectivas otimistas para o futuro do setor.", "titulo_pt": "Fabricantes de vacinas enfrentam momento difícil, mas ainda veem motivos para esperança", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 17304, "titulo": "Opinion: My adult daughter has Down syndrome. Her life is entirely different from what experts expected", "url": "https://www.statnews.com/2026/06/25/prenatal-down-syndrome-diagnosis-screening-life-expectancy-health-facts/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-25T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Michelle Sie Whitten, da Fundação Global Down Syndrome, afirma que mulheres são capazes de tomar decisões difíceis. Ela argumenta que a escolha significativa requer informações confiáveis e verificadas.  Whitten escreve sobre sua filha adulta com síndrome de Down e como sua vida difere das expectativas dos especialistas.", "titulo_pt": "Minha filha adulta tem síndrome de Down. Sua vida é totalmente diferente do que os especialistas esperavam", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 17305, "titulo": "Bipartisan bill seeks to allow direct prescribing of methadone for opioid addiction", "url": "https://www.statnews.com/2026/06/25/bipartisan-bill-methadone-prescription-pharmacy-pickup/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-25T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Atualmente, a metadona para o tratamento da dependência de opioides só está disponível em clínicas especializadas. Um projeto de lei bipartidário visa ampliar significativamente o acesso à medicação.", "titulo_pt": "Proposta bipartidária busca permitir prescrição direta de metadona para dependência de opioides", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 17317, "titulo": "Smile reaches science orbit", "url": "https://www.esa.int/ESA_Multimedia/Images/2026/06/Smile_reaches_science_orbit", "fonte_id": "esa_space", "data_pub": "2026-06-25T08:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma imagem de um sorriso foi enviada para a órbita. A imagem faz parte da missão da ESA, que envia imagens e dados científicos do espaço. A imagem será utilizada por cientistas para pesquisas.", "titulo_pt": "Sorriso atinge órbita científica", "veiculo": "ESA - Space Science", "pais": "Europa", "classe": "A"}, {"id": 17158, "titulo": "Cow tendons eyed as ligament material for ACL reconstruction surgery", "url": "https://www.japantimes.co.jp/news/2026/06/25/japan/science-health/acl-cow-tendons/", "fonte_id": "japan_times", "data_pub": "2026-06-25T07:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores japoneses estão estudando o uso de tendões de vaca para reconstrução de ligamentos cruzados anteriores (LCA). O objetivo é utilizar a estrutura e propriedades dos tendões bovinos para reparar os ligamentos danificados.  O material pode ser utilizado em outras partes do corpo, como tornozelos e cotovelos no futuro.", "titulo_pt": "Tendões de vaca vistos como material para reconstrução de ligamentos do LCA", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 16641, "titulo": "Terremotos na Venezuela deixam 164 mortos e 971 feridos", "url": "https://exame.com/mundo/terremotos-na-venezuela-deixam-164-mortos-e-971-feridos/", "fonte_id": "exame", "data_pub": "2026-06-25T07:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A presidente interina da Venezuela, Delcy Rodríguez, atualizou o número de vítimas dos terremotos para 164 mortos e 971 feridos.  Uma sequência de abalos sísmicos e quase 30 réplicas foram registradas no país.", "titulo_pt": "Terremotos na Venezuela Deixam 164 Mortos e 971 Feridos", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 17316, "titulo": "A Turquoise Tint for the Black Sea", "url": "https://science.nasa.gov/earth/earth-observatory/a-turquoise-tint-for-the-black-sea/", "fonte_id": "nasa_news", "data_pub": "2026-06-25T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "No primavera e verão de 2026, fitoplâncton deu uma coloração azul-esverdeada às águas do Mar Negro e de áreas próximas. Essa mudança na cor foi observada em diversas regiões.", "titulo_pt": "Uma tonalidade turquesa para o Mar Negro", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 16145, "titulo": "Global Ebola risk ‘remains low,’ WHO chief says after France case", "url": "https://www.japantimes.co.jp/news/2026/06/25/world/science-health/global-ebola-risk-low/", "fonte_id": "japan_times", "data_pub": "2026-06-25T02:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A França anunciou seu primeiro caso confirmado de Ebola no território francês: um médico que havia voado de volta do Congo. O chefe da Organização Mundial da Saúde (OMS) afirmou que o risco global de Ebola permanece baixo.", "titulo_pt": "Risco global de Ebola 'permanece baixo', diz chefe da OMS após caso na França", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 16427, "titulo": "NASA’s TESS Mission Reveals the “Puffiest” Planets Ever Found", "url": "https://science.nasa.gov/missions/tess/nasas-tess-mission-reveals-the-puffiest-planets-ever-found/", "fonte_id": "nasa_news", "data_pub": "2026-06-25T01:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA revelou dois novos planetas 'super-puffs', mundos gigantes tão leves que sua densidade é comparável à de algodão doce. Cientistas calculam que esses planetas do tamanho de Júpiter são os 'mais fofos' já encontrados.", "titulo_pt": "Missão TESS da NASA revela os planetas 'mais fofos' já encontrados", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 17323, "titulo": "‘Like swimming through the air’: my thrilling role in Giselle with the Royal Ballet’s wheelchair dancers", "url": "https://www.theguardian.com/stage/2026/jun/25/royal-ballet-school-wheelchair-dance-kate-stanforth", "fonte_id": "guardian_culture", "data_pub": "2026-06-25T11:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O autor usa uma cadeira de rodas e deseja dançar como fazia quando criança. Ele participou de uma aula ministrada por Kate Stanforth, estrela da dança deficiente, e pelo Royal Ballet. O autor foi diagnostica
