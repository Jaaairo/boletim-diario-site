<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=author@400&display=swap" rel="stylesheet">
<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 10/07/2026 16:58 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">

</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>

      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "10/07/2026 16:58", "stats": {"noticias_novas": 1258, "resumos_gerados": 226}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O Supremo Tribunal Federal (STF) tomou decisões importantes sobre a política e o mercado brasileiro. O ministro Flávio Dino concedeu uma liminar no STF para suspender a janela extraordinária de concessão de linhas de transporte interestadual pela Agência Nacional de Transportes Terrestres (ANTT). Além disso, Dino também bloqueou R$ 119 milhões em bens do presidente nacional do PL, Valdemar Costa Neto, acusado de desvio de emendas parlamentares. O STF encerrou definitivamente o julgamento da revisão automática das aposentadorias, marcando o fim dessa prática. Em outro desenvolvimento, a Justiça Eleitoral bloqueou R$ 227,7 mil em contas bancárias de Ana Cristina Siqueira Valle, ex-esposa do ex-presidente Jair Bolsonaro. O governo Lula iniciou uma campanha para aprovar o projeto de lei dos Mercados Digitais na Câmara dos Deputados, distribuindo panfletos às bancadas partidárias em defesa do projeto.", "mundo": "Um grave incêndio florestal na Andaluzia, Espanha, resultou em pelo menos 12 mortes e deixou mais de 20 pessoas desaparecidas. O fogo, considerado um dos mais letais da história do país, causou danos significativos e levou a uma intensa evacuação de milhares de pessoas. Em outro desenvolvimento, o governo Trump reduziu as proteções ambientais para espécies em perigo, permitindo a exploração de áreas habitadas, o que pode acelerar a extinção de muitas espécies ameaçadas. O presidente dos Estados Unidos declarou que os EUA concordaram em manter conversações com o Irã, apesar das negociações em andamento sobre um cessar-fogo. Além disso, a EasyJet britânica aceitou uma proposta de compra da parte de uma empresa de private equity americana, marcando o início de uma guerra de ofertas pelo transportador aéreo de baixo custo.\n\nO cenário geopolítico global continua tenso com várias frentes de conflito e negociação. Em primeiro lugar, o Irã e os Estados Unidos mantêm uma escalada contínua de tensões, com a passagem de navios pelo Estreito de Ormuz diminuindo após o encerramento do cessar-fogo pelos EUA, ameaçando a recuperação comercial. Além disso, Israel intensificou suas operações em território palestino, resultando em ferimentos e mortes entre civis, enquanto a Rússia continua seus ataques no Leste da Ucrânia, levando à morte de quatro pessoas, incluindo um adolescente. Na Ásia, o Brasil expressou preocupação com a China em relação ao domínio sobre terras raras e recursos minerais críticos, enquanto Israel se aproxima de parcerias asiáticas para compensar a diminuição das relações tradicionais com os Estados Unidos e alguns países europeus. As negociações diplomáticas e a escalada militar persistem em diversos pontos do mundo, refletindo um cenário geopolítico complexo e instável.", "economia": "A economia global enfrenta diversos desafios e avanços. No Brasil, o poder regulatório do Conselho Administrativo de Defesa Econômica (CADE) tem se expandido, especialmente no mercado de gás natural, onde a concorrência está aumentando. Um relatório proposto por Aliel Machado sugere um modelo semelhante ao da União Europeia que ampliará as funções do CADE para supervisionar as grandes tecnológicas, o que tem gerado controvérsias. Paralelamente, a Agência Nacional de Petróleo (ANP) está abrindo uma consulta pública sobre o acesso aos gasodutos e retomando o debate sobre a liberalização desse setor, considerada um passo importante para aumentar a concorrência no mercado de gás natural.", "tecnologia": "A China fez um avanço significativo no setor espacial ao recuperar com sucesso o primeiro estágio de um foguete Long March 10B após seu lançamento, uma primeira vez para o país. Este feito marca um importante passo na reutilização de foguetes e foi divulgado pela mídia estatal chinesa. A SK Hynix, gigante sul-coreana de chips, viu suas ações dispararem 14% em sua estreia na bolsa dos EUA, impulsionadas pela crescente demanda por inteligência artificial (IA). O chairman do SK Group, Chey Tae-won, declarou que a estreia na Nasdaq é um momento histórico e espera grandes investimentos em IA. Além disso, o World Artificial Intelligence Conference de 2026 em Shanghai destacará um sistema de inteligência artificial chinês autônomo, desde os semicondutores até os dispositivos agentes, reforçando a importância da IA na economia global.", "ciencia": "Os dados do setor espacial europeu mostram um aumento significativo nas vendas de satélites de observação da Terra, que superaram as vendas dos satélites de comunicação em 2025. A NASA divulgou imagens raras do voo F-18 sobre Washington, enquanto a China realizou testes bem-sucedidos para recuperar um boostere orbital marítimo, visando romper o domínio americano na tecnologia reutilizável. O padrão climático El Niño está previsto para atingir seu pico entre outubro e dezembro, podendo ser considerado uma das maiores intensificações na história registrada. Além disso, a Agência Espacial Europeia (ESA) com o telescópio Euclid identificou 31 quasares antigos, sendo um dos objetos mais brilhantes do Universo. A divisão social em relação à inteligência artificial nos Estados Unidos está se aprofundando, com os usuários avançados experimentando a IA como uma revolução transformadora, enquanto a maioria vê-a apenas como pequenas melhorias no dia a dia.", "cultura": "Taís Araujo retorna às novelas da Globo como rainha revolucionária na novela 'A Nobreza do Amor', que estreará no mês de setembro. Um leilão recorde foi registrado com o par de botas Tabi grafitadas vendido por cerca de R$ 2,3 milhões no leilão do arquivo pessoal de Martin Margiela. A cantora Shakira criticou a circulação indevida de imagens feitas por inteligência artificial que retratam situações fictícias dela. Já o filme 'Free Willy' deve ganhar uma nova versão, com a Warner Bros. planejando lançar um remake do sucesso dos anos 1990. A morte da cantora Bonnie Tyler, conhecida por 'Holding Out for a Hero', foi lamentada pelo ator Kevin Bacon, que completou 68 anos no mesmo dia. O Festival de Teatro de São Paulo terá peças de Débora Falabella, Vera Holtz e Reynaldo Gianecchini entre os dias 1º e 27 de setembro, incluindo 22 espetáculos, debates e oficinas. Além disso, o sertanejo Panda liderou as paradas de música no primeiro semestre do ano, com a Rádio MEC exibindo um novo episódio da série infantil Blim-Blem-Blom com a participação do contrabaixista Ricardo Candido.", "sociedade": "A população de Taipei registrou uma queda por 30 meses consecutivos, conforme informado pelo Taipei Times. Em Goiânia, uma criança foi resgatada de um apartamento insalubre onde vivia com sua mãe, que foi detida por maus-tratos. A força-tarefa do Brasil realizou mais de mil atendimentos médicos na Venezuela após terremotos e foi o primeiro país a instalar um hospital de campanha no local. No Rio Grande do Sul, Mayanna, esposa de um missionário, se envolveu em uma situação trágica quando seu filho foi morto pelo pai após não dar as cartas ao sacerdote como era esperado.", "meio_ambiente": "Um estudo publicado pela Olhar Digital revela que eventos extremos como El Niño podem transformar a Amazônia de aliada em inimiga do clima, fazendo com que as florestas tropicais parem de absorver carbono. Em 2025, a ONU relatou intensas tempestades de areia e poeira na China e nos Estados Unidos, causando impactos significativos nos dois países. No sul da Espanha, um incêndio devastador em Almería deixou pelo menos 12 mortes durante uma onda de calor, consumindo rapidamente 3.800 hectares. A França enfrenta seu terceiro calorão desde maio com incêndios florestais ativos, especialmente no sul, onde a área total estimada queimada ultrapassa 25.000 hectares. O diretor-geral de segurança civil, Julien Marion, informou sobre o avanço dos incêndios.", "direitos_humanos": "O direito à transparência na distribuição de ajuda após desastres naturais foi debatido na Venezuela, com Edmundo González enfatizando a importância dessa prática. Em outros assuntos, a Palestine Action, uma organização que atua contra as armas israelenses, enfrenta críticas por suas operações policiais. Um ex-irmão católico acusado de abuso sexual infantil em propriedades do Christian Brothers foi apontado como um dos maiores prejudicados pela organização religiosa. Em Hong Kong, políticos estão pressionando pelo acesso a serviços de fertilidade para mulheres solteiras e por incentivos financeiros para famílias com mais filhos. Por fim, a espionagem contra jornalistas foi destacada como uma ameaça à democracia em um artigo que discute o impacto dessa prática no sistema político e social."}, "resumo_do_dia": {"politica_nacional": [{"id": 44056, "titulo": "Defesa de Valdemar diz que decisão de Dino parte de 'premissas frágeis' e criminaliza atividade política", "url": "https://g1.globo.com/politica/noticia/2026/07/10/defesa-de-valdemar-diz-que-decisao-de-dino-parte-de-premissas-frageis.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-10T18:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A defesa de Valdemar Costa Neto, presidente do PL, negou a prática de qualquer crime e considerou a decisão do ministro Flávio Dino do STF como baseada em premissas frágeis que criminalizam atividade política.", "titulo_pt": "defesa de valdemar diz que decisão de dino parte de 'premissas frágiles' e criminaliza atividade política", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 43991, "titulo": "STF concede liminar para suspender processo de concessão de linhas de transporte interestaduais", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/07/stf-concede-liminar-para-suspender-processo-de-concessao-de-linhas-de-transporte-interestaduais.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-10T18:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro André Mendonça, do STF, concedeu uma liminar suspendo a janela extraordinária de mercado da ANTT para concessão de linhas de transporte rodoviário interestadual de passageiros. A decisão foi tomada nesta quinta-feira (9).", "titulo_pt": "stf concede liminar para suspender processo de concessão de linhas de transporte interestadual", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 44425, "titulo": "Depoimento de Flávio à PF ganha tom político, e defesa aposta em comparação com caso Lulinha", "url": "https://veja.abril.com.br/politica/depoimento-de-flavio-ao-stf-ganha-tom-politico-e-defesa-aposta-em-comparacao-com-caso-lulinha/", "fonte_id": "veja", "data_pub": "2026-07-10T17:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O depoimento de Flávio Bolsonaro à Polícia Federal ganhou tom político, e sua defesa está usando essa situação como parte da estratégia eleitoral do senador. A investigação conduzida por Alexandre de Moraes deve ser incorporada a essa estratégia, segundo analistas.", "titulo_pt": "Depoimento De Flávio à PF Gana Tom Político E Deve Ser Usado na Estratégia Eleitoral", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 43995, "titulo": "Tribunal de Contas do Paraná confirma texto oculto em pedido de cautelar e promete investigar", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/07/tribunal-de-contas-do-parana-confirma-texto-oculto-em-pedido-de-cautelar-e-promete-investigar.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-10T17:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Tribunal de Contas do Paraná confirmou a presença de comandos ocultos, conhecidos como prompt injection, em um pedido de medida cautelar para paralisar o programa Olho Vivo. O tribunal promete investigar o caso.", "titulo_pt": "tribunal de contas do paraná confirma texto oculto em pedido de cautelar e promete investigar", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 44057, "titulo": "PP e União Brasil não devem apoiar Flávio Bolsonaro nas eleições presidenciais", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/07/10/pp-uniao-brasil-flavio-bolsonaro.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-10T17:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os partidos União Brasil e Progressistas não devem apoiar a pré-candidatura do senador Flávio Bolsonaro à Presidência da República. Os diretórios estaduais desses partidos terão liberdade para apoiar o candidato que considerarem mais conveniente em cada estado.", "titulo_pt": "pp e união brasil não devem apoiar flávio bolsonaro nas eleições presidenciais", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 44338, "titulo": "Dino bloqueia R$ 119 milhões em bens de Valdemar e suspende emendas", "url": "https://www.jota.info/stf/do-supremo/dino-bloqueia-r-119-milhoes-em-bens-de-valdemar-e-suspende-emendas", "fonte_id": "jota", "data_pub": "2026-07-10T16:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal bloqueou R$ 119 milhões em bens de Valdemar e suspendeu suas emendas. De acordo com a PF,  "https://www.jota.info/eleicoes/eleicoes-2026/quem-sao-os-pre-candidatos-ao-governo-do-rio-grande-do-sul-rs-eleicoes-2026-julho", "fonte_id": "jota", "data_pub": "2026-07-10T15:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Até o momento, sete pré-candidatos estão disputando a candidatura ao governo do Rio Grande do Sul para as eleições de 2026: o atual vice-governador e cinco outros políticos.", "titulo_pt": "quem são os pré-candidatos ao governo do rio grande do sul nas eleições 2026", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 44060, "titulo": "'Fechou o valor do Pres Valdemar?', 'Pode colocar o máximo que der': leia diálogos que basearam bloqueio de R$ 119 milhões de Valdemar Costa Neto", "url": "https://g1.globo.com/politica/noticia/2026/07/10/fechou-o-valor-do-pres-valdemar-pode-colocar-o-maximo-que-der-leia-dialogos-em-que-a-pf-se-baseia-para-bloquear-r-119-milhoes-de-valdemar-costa-neto.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-10T15:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro Flávio Dino, do Supremo Tribunal Federal, bloqueou bens de Valdemar Costa Neto, presidente do PL, em um valor de R$ 119,2 milhões, suspeito de controlar a indicação irregular de emendas parlamentares. As investigações se baseiam em diálogos encontrados no celular de uma ex-servidora da Câmara dos Deputados.", "titulo_pt": "fechou o valor do pres valdemar?", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 43983, "titulo": "PF diz que Valdemar desviou R$ 119 milhões em emendas, e Dino bloqueia bens de dirigente do PL", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/pf-diz-que-valdemar-desviou-r-119-milhoes-em-emendas-e-dino-bloqueia-bens-de-dirigente-do-pl.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-10T15:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro Flávio Dino, do STF, bloqueou R$ 119 milhões em bens de Valdemar Costa Neto, presidente do PL, após a PF apontar que ele estaria desviando emendas parlamentares sem mandato no Congresso.", "titulo_pt": "pf diz que valdemar desviou r$ 119 milhões em emendas e dino bloqueia bens de dirigente do pl", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 43984, "titulo": "Fazenda faz ofensiva e distribui panfletos em defesa de projeto que regula concorrência de big techs", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/fazenda-faz-ofensiva-e-distribui-panfletos-em-defesa-de-projeto-que-regula-concorrencia-de-big-techs.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-10T15:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A equipe econômica do governo Lula iniciou uma campanha para aprovar o projeto de lei dos Mercados Digitais na Câmara dos Deputados, distribuindo panfletos às bancadas partidárias para esclarecer os pontos do projeto e buscar apoio.", "titulo_pt": "Fazenda faz ofensiva e distribui panfletos em defesa de projeto que regula concorrência de big techs", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 44061, "titulo": "Valdemar é suspeito de desvio de R$ 119 milhões em emendas e de associação criminosa, aponta PF", "url": "https://g1.globo.com/politica/noticia/2026/07/10/valdemar-investigacao-pf.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-10T15:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Valdemar Costa Neto, presidente nacional do PL, é suspeito de desvio de R$ 119 milhões em emendas e associação criminosa, conforme aponta uma decisão judicial do ministro Flávio Dino do STF. A informação faz parte dos resultados da 'Operação Transparência' que investiga um esquema de desvio de recursos públicos por meio de emendas parlamentares.", "titulo_pt": "valdemar é suspeito de desvio de r$ 119 milhões e associação criminosa, aponta pf", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 44062, "titulo": "PF aponta servidora Mariângela Fialek, a 'Tuca', como operadora do esquema de emendas atribuído a Valdemar Costa Neto", "url": "https://g1.globo.com/politica/noticia/2026/07/10/pf-aponta-servidora-mariangela-fialek-a-tuca-como-operadora-do-esquema-de-emendas-atribuido-a-valdemar-costa-neto.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-10T15:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal identificou Mariângela Fialek, conhecida como 'Tuca', como operadora central de um esquema que manipulava emendas parlamentares atribuídas ao ex-deputado Valdemar Costa Neto. O relatório foi encaminhado ao Supremo Tribunal Federal (STF) e resultou no bloqueio de R$ 119,2 milhões.", "titulo_pt": "pf aponta servidora tuca como operadora do esquema de emendas atribuído a valdemar costa neto", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 43985, "titulo": "Câmara declara perda de mandato dos deputados Paulão e Dayany Bittencourt após retotalização", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/blogs/brasilia-hoje/2026/07/camara-declara-perda-de-mandato-dos-deputados-paulao-e-dayany-bittencourt-apos-retotalizacao.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-10T15:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Câmara dos Deputados declarou a perda de mandato para os deputados Paulão (PT-AL) e Dayany Bittencourt (União-CE) após retotalização dos votos em razão da cassação de outros parlamentares. A decisão foi tomada após rejeição de recursos apresentados pelos deputados no Tribunal Superior Eleitoral.", "titulo_pt": "Câmara declara perda de mandato dos deputados Paulão e Dayany Bittencourt após retotalização", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 44063, "titulo": "Dino cita indicação d strong em Edwards, Califórnia, capturou imagens aéreas raras dos voos F-18 sobre Washington. Essas fotos documentam missões importantes da agência espacial e fornecem uma visão privilegiada para o público.", "titulo_pt": "nasa fotógrafo captura imagens de f-18 sobre washington", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 45078, "titulo": "How could loosened radiation exposure rules affect public health?", "url": "https://www.scientificamerican.com/article/how-could-laxer-radiation-exposure-rules-affect-public-health/", "fonte_id": "scientific_american", "data_pub": "2026-07-10T16:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A proposta de mudança nas regras de exposição à radiação poderia expor mais americanos a doses maiores de radiação proveniente das instalações nucleares.", "titulo_pt": "como uma possível alteração nas regras de exposição à radiação pode afetar a saúde pública", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 45074, "titulo": "Here’s what happens when you put politicians in charge of science", "url": "https://www.sciencenews.org/article/omb-politicians-lysenko-science-history", "fonte_id": "science_news", "data_pub": "2026-07-10T15:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Propostas de regras federais nos Estados Unidos pretendem que políticos escolham como a ciência será conduzida. Histórias passadas indicam que tais ações podem ter consequências negativas.", "titulo_pt": "O que acontece quando políticos gerenciam a ciência", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 45101, "titulo": "Waxing Gibbous Moon", "url": "https://www.nasa.gov/image-article/waxing-gibbous-moon-6/", "fonte_id": "nasa_news", "data_pub": "2026-07-10T15:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA publicou uma imagem da Lua crescente, conhecida como waxing gibbous, tirada pelo Estação Espacial Internacional em 26 de junh 3679, "titulo": "Microsoft’s carbon emissions went up 25 percent last year", "url": "https://www.theverge.com/tech/963728/microsoft-sustainability-report-2026", "fonte_id": "the_verge", "data_pub": "2026-07-10T00:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "De acordo com o relatório de sustentabilidade de 2026 da Microsoft, as emissões de carbono da empresa aumentaram 25% no ano passado, totalizando 34 milhões de toneladas métricas. O aumento foi principalmente causado pelo crescimento das operações da companhia.", "titulo_pt": "emissões de carbono da microsoft aumentaram 25%", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 44747, "titulo": "‘We just disappeared’: Palestine Action defendant recalls ‘horrifying’ arrest", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/we-just-disappeared-palestine-action-defendant-recalls-horrifying-arrest", "fonte_id": "middle_east_eye", "data_pub": "2026-07-10T18:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma acusada que enfrenta processos relacionados a uma operação da Palestine Action contra um depósito de armas israelense disse que ela e seus co-acusados ainda sofrem de transtorno de estresse pós-traumático após suas prisões policiais. Hannah Davidson, 53 anos, e outros seis acusados enfrentam acusações de tumulto violento e danos criminosos.", "titulo_pt": "‘Nós simplesmente desaparecemos’: defensora da Palestine Action relata ‘horrorizante’ prisão", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 44434, "titulo": "Child abuser who preyed on orphans housed at Christian Brothers property", "url": "https://www.theguardian.com/australia-news/2026/jul/11/christian-brothers-properties-housing-convicted-child-sexual-abuse-offenders-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-07-10T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Propriedad const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml() : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml() {
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml()}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices().filter(function(v) { return v.lang === 'pt-BR' || v.lang.startsWith('pt'); });
    return vs[0] || null;
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // .sumario ou .destaque-analise imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
