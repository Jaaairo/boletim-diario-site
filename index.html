<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: none; border: 1px solid var(--border); border-radius: 4px;
             color: var(--texto2); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { border-color: var(--acento); color: var(--texto); }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 30/06/2026 13:09 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">

    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">

  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>

      <option value="resumo_impreciso">Resumo impreciso</option>

      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "30/06/2026 13:09", "stats": {"noticias_novas": 255, "resumos_gerados": 252}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O Brasil enfrenta diversos desafios políticos e sociais neste momento. O ex-presidente Lula participará da 68ª Cúpula do Mercosul no Paraguai, onde o acordo permitirá a entrada de seus cidadãos em outros países com Carteira Nacional de Identificação (CNI). Em outro front político, o PSDB deve anunciar Gilberto Kassab como vice de Ronaldo Caiado na chapa para as eleições presidenciais de 2026 após reuniões marcadas para Brasília. No âmbito econômico e social, a Sabesp planeja captar mais água na bacia que abastece o Rio de Janeiro para socorrer o sistema Cantareira, enquanto a Receita Federal pagou o maior lote de restituição do Imposto de Renda da história, totalizando aproximadamente 9,5 milhões de pagamentos no valor de R$16 bilhões. As contas públicas apresentam um déficit de R$56,1 bilhões em maio e a proposta de aposentadoria especial para agentes comunitários e de combate às endemias deve ser votada pelo Senado, impactando financeiramente as contas públicas por cerca de R$30 bilhões. Além disso, o Congresso agiliza gastos de olho na eleição, enquanto a PF realiza operações contra desvios na saúde no Rio de Janeiro e investiga lavagem de dinheiro envolvendo recursos da área de saúde do estado.", "mundo": "Keiko Fujimori, eleita presidente do Peru, proclamou sua vitória após a apuração de 100% das urnas. Ainda aguarda a decisão final do Tribunal Superior Eleitoral (TSE). Em Mônaco, uma explosão envolvendo um pacote-bomba feriu um oligarca ucraniano e duas outras pessoas; o suspeito fugiu após o ataque. O sistema de saúde venezuelano enfrenta um colapso crescente devido a terremotos recentes, com hospitais superlotados e falta de profissionais médicos. Na Itália, cinco mortes foram registradas em 24 horas devido ao calor extremo, levando à realização de uma reunião de emergência da União Europeia. O governo do Reino Unido anunciou o maior investimento em defesa desde a Guerra Fria, com um orçamento de 15 bilhões de libras nos próximos quatro anos. Além disso, a taxa de homicídios nos Estados Unidos está se aproximando de um novo nível baixo, enquanto o Supremo Tribunal Federal vai julgar sobre a cidadania por nascimento.\n\nAs negociações entre Estados Unidos e Irã seguem incertas, apesar de sinais de que uma reunião pode ocorrer em Doha. Os EUA enviaram representantes para conversações com mediadores no Catar, mas o Irã confirmou que enviará apenas uma delegação técnica para discutir a liberação de ativos financeiros congelados, negando-se a se encontrar diretamente com os representantes americanos. Além disso, Israel continua realizando ataques em territórios palestinos e no Líbano, resultando em mortes e feridos. Em outra frente geopolítica, o Irã declarou que a era de interferência dos EUA na região terminou e rejeitou a ideia de desarmar o Hezbollah. A Coreia do Sul enfrenta restrições de exportação de aço da União Europeia, enquanto o conflito na Ucrânia persiste sem garantias de um congelamento negociado. Por fim, a atividade marítima nos portos da Coreia do Norte aumentou significativamente desde 2019, sugerindo possíveis operações ilícitas envolvendo carvão.", "economia": "O governo oficializou o Plano Safra 2026/2027, voltado para a agricultura empresarial, com taxas de juros que variam entre 8% e 12,5%, representando uma redução de até 1,5 ponto percentual em relação ao ciclo anterior. O Plano Safra será anunciado hoje, com expectativa de redução nos juros, conduzido pelo governador Geraldo Alckmin e pelo ministro da Agricultura, enquanto Jair Bolsonaro não participará pela primeira vez durante seu mandato. A Receita Federal pagará R$ 16 bilhões em restituições do Imposto de Renda 2026 a cerca de 9,5 milhões de contribuintes nesta terça-feira (30), sendo o maior lote de restituição da história. As cooperativas aumentaram sua participação no financiamento do agronegócio brasileiro, passando de 13% para 25% das operações em dez anos, num cenário de pressão orçamentária. Além disso, a União Europeia ampliou a proteção à indústria de aço, reduzindo o limite anual e criando uma tarifa de 50% para incentivar a produção local. A ANTT enfrenta problemas decorrentes das suas decisões, levando o setor de ônibus a passar por mais litígios. No varejo, práticas como descontos e bonificações são comuns para estimular as vendas, mas a possibilidade de impacto tributário dessas estratégias ainda não é adequadamente mensurada por muitas empresas.", "tecnologia": "A Coreia do Sul e a China estão intensificando suas iniciativas tecnológicas, com investimentos significativos na inteligência artificial (IA) e semicondutores. A Samsung e SK hynix confirmaram planos de investir cerca de 800 trilhões de wones ($518 bilhões) para transformar a região sul da Coreia em um novo hub de produção de semicondutores, além de Yongin, devido à alta demanda por memórias impulsionada pela IA. A China lançou sete padrões nacionais para a interconexão de agentes de IA, estabelecendo um quadro unificado sobre como esses agentes se identificam e colaboram. Em contraste, as grandes tecnológicas perderam US$ 2,3 trilhões em um mês, com a Microsoft liderando as perdas com uma queda de 20%. Além disso, a WhatsApp anunciou que permitirá que os usuários se identifiquem por nomes de usuário, ao invés de números de telefone, destacando a privacidade.", "ciencia": "A NASA anunciará nesta tarde um importante desenvolvimento sobre seus planos para uma base lunar, conforme informou a Space News. Em outra notícia científica, a China criou um sistema que desaliniza água do mar sem energia elétrica, um avanço promissor na tecnologia solar. Um estudo publicado no Journal of Developmental Disabilities destaca os irmãos adultos de pessoas com deficiências intelectuais e/ou desenvolvimentais, conduzido pela assistente professora Jessika Boles. Na área da saúde, um novo tipo de laser promete prevenir a cegueira associada à degeneração macular em testes clínicos humanos próximos. Além disso, o diretor científico de Ames da NASA destacou as contribuições notáveis de Sungshin Choi, Yi-Chun Chen, Emma Yates e Eduardo Bendek como cientistas do mês de julho de 2026. Por fim, a Kakao Bank teve suas pesquisas sobre segurança de inteligência artificial reconhecidas globalmente, com quatro artigos sendo aceitos em conferências importantes este ano, focando na segurança da IA gerativa e na confiabilidade dos sistemas de IA usados no financiamento.", "cultura": "A cultura global ganha destaque nas últimas semanas com diversos eventos e lançamentos. A participação africana no Biênal de Veneza atingiu um recorde, mas há preocupações persistentes sobre a representatividade. Em outro contexto, o jornalista e escritor italiano Oriana Fallaci, lembrado por ser a primeira mulher italiana a trabalhar como corresponsal de guerra, é homenageado em efemérides do dia 30 de junho. Entre os lançamentos literários, Jenny Jackson lança 'The Shampoo Effect', enquanto Claire Atkin enfrenta ameaças após sua ativismo. No cinema, Seth Rogen adiciona humor à comédia 'The Invite' dirigida por Olivia Wilde. Na arquitetura, a empresa The Collective apresenta um sistema modular de teto para ambientes de trabalho, enquanto o estúdio Meister Varma realiza a construção da residência Shilaya em Tamil Nadu utilizando pedra recuperada. A fotógrafa Da’Shaunae Marisa explora a beleza da vida afro-americana em sua carreira de photojournalismo, destacando a importância do luto e os laços com suas raízes. Além disso, uma exposição inédita no Reino Unido segue o caminho das cartas de tarô desde o século XV até sua associação moderna com leituras ocultistas.", "sociedade": "Um homem foi executado a tiros enquanto caminhava por uma rua no Distrito Federal, na capital brasileira. A informação é do Metrópoles e ocorreu no Recanto das Emas. O caso mobilizou testemunhas que relataram o crime envolvendo três criminosos rendendo a vítima antes dos disparos. Na Venezuela, após terremotos devastadores, os sistemas de saúde estão sobrecarregados, conforme informado pela Organização Mundial da Saúde (OMS) e pelo Metrópoles. Em La Guaira, região mais afetada, famílias formam filas para identificar mortos em um necrotério improvisado devido à falta de infraestrutura adequada. No Brasil, o Ministério da Saúde recomenda a vacinação de bebês contra sarampo, com aplicação da chamada 'dose zero' em São Paulo, conforme noticiou o Metrópoles.", "meio_ambiente": "Um temporal assustador na madrugada atingiu Blumenau, causando alagamentos e levando a Defesa Civil à intervenção. Em Misiones, Argentina, uma quantidade excepcional de chuva foi registrada, com preocupação crescente por conta do El Niño. O subsecretário de Ambiente da Nación, Fernando Brom, renunciou após fazer comentários públicos inadequados e enfrentar problemas na gestão. Alertas de tempestade foram emitidos pelo Inmet para o Sul do Brasil e litoral paulista, com possíveis perigos relacionados ao mau tempo. O El Niño pode afetar drasticamente o clima no Brasil, levando a um contraste nas chuvas e calor intenso em diferentes regiões.", "direitos_humanos": "As reformas propostas na legislação de crimes sexuais em Hong Kong são consideradas um ponto crucial no panorama global de direitos humanos. As mudanças, que incluem a ampliação da definição de estupro e a introdução de novos delitos relacionados a atos não consensuais com crianças e pessoas com deficiência mental, refletem uma tentativa de fortalecer a proteção legal para grupos vulneráveis. No entanto, essas iniciativas enfrentam críticas por parte de organizações de direitos humanos que veem as propostas como um passo em direção à normalização do estupro e do abuso sexual. Em outro contexto, o DHS dos Estados Unidos exige que indivíduos específicos se registrem e fornecam impressões digitais para evitar multas ou prisão, destacando as complexidades das políticas de imigração e segurança no país. Além disso, um grupo de ativistas pelos direitos das pessoas com deficiência em Seul planeja retomar manifestações na cidade, reforçando a necessidade de atenção constante aos direitos desse grupo social. Em países como o Vietnã, há relatos de aumento da repressão política, com um grupo de advocacy registrando 56 prisões políticas no ano passado, o maior número desde 2018, indicando preocupações crescentes sobre liberdade de expressão e direitos humanos no país. Por fim, a ADPF 1339 no Supremo Tribunal Federal (STF) pode decidir sobre uma interpretação que prejudica as mulheres trans no sistema de cotas de gênero nas eleições, enquanto o papel do Comitê dos Direitos da Criança é discutido em tempos críticos, mostrando a importância contínua da proteção e promoção dos direitos humanos infantis."}, "resumo_do_dia": {"politica_nacional": [{"id": 27163, "titulo": "Ao vivo: governo Lula lança o Plano Safra para empresários", "url": "https://www.poder360.com.br/poder-governo/ao-vivo-governo-lula-lanca-o-plano-safra-para-empresarios/", "fonte_id": "poder360", "data_pub": "2026-06-30T12:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo Lula lançará o Plano Safra para empresários às 10h no Palácio do Planalto. O programa inclui crédito rural e incentivos para médios e grandes produtores.", "titulo_pt": "Governo Lula lança Plano Safra para empresários", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 27149, "titulo": "Estudo revela como redes sociais moldam relação de jovens com política", "url": "https://agenciabrasil.ebc.com.br/politica/noticia/2026-06/estudo-revela-como-redes-sociais-moldam-relacao-de-jovens-com-politica", "fonte_id": "agencia_brasil_politica", "data_pub": "2026-06-30T12:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo entre jovens brasileiros com idade de 21 a 34 anos mostrou que as redes sociais estão transformando profundamente como essa faixa etária se relaciona com a política no Brasil. A pesquisa ouviu 24 jovens em 2022, vivendo em diversas metrópoles brasileiras, sobre temas relacionados à política e às redes sociais.", "titulo_pt": "Estudo revela como as redes sociais moldam a relação dos jovens com a política no Brasil", "veiculo": "Agência Brasil - Política", "pais": "Brasil", "classe": "A"}, {"id": 27156, "titulo": "'Tarcísio tem fama de gestor por falta de escrutínio. Em todas as áreas no governo dele há problemas', diz Haddad", "url": "https://g1.globo.com/sp/sao-paulo/eleicoes/2026/noticia/2026/06/30/tarcisio-tem-fama-de-gestor-por-falta-de-escrutinio-em-todas-as-areas-no-governo-dele-ha-problemas-diz-haddad.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T12:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O pré-candidato do PT ao governo de São Paulo, Fernando Haddad, criticou o atual governador Tarcísio de Freitas, afirmando que ele tem fama de gestor por falta de escrutínio. Haddad também comentou sobre a privatização da Sabesp e o aumento das tarifas.", "titulo_pt": "Haddad critica Tarcísio por 'fama de gestor' e privatização", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 27230, "titulo": "Moraes derruba seguro extra para mototáxi operar em São Paulo", "url": "https://www.metropoles.com/colunas/manoela-alcantara/moraes-derruba-seguro-extra-para-mototaxi-operar-em-sao-paulo", "fonte_id": "metropoles", "data_pub": "2026-06-30T12:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro Moraes derrubou a exigência de seguro adicional para mototaxis operarem em São Paulo. A Prefeitura havia exigido essa cobertura securitária extra das plataformas, mas o ministro considerou que as medidas ultrapassam a competência administrativa.", "titulo_pt": "Moraes anula seguro extra para mototáxi operar em SP", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27173, "titulo": "O principal motivo que pode levar Kassab a ser vice na chapa de Caiado", "url": "https://veja.abril.com.br/politica/o-principal-motivo-que-pode-levar-kassab-a-ser-vice-chapa-de-caiado/", "fonte_id": "veja", "data_pub": "2026-06-30T12:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os políticos Kassab e Caiado devem se reunir na terça-feira para discutir a possibilidade de formar uma chapa. Se os acordos forem confirmados, ambos irão a Brasília no dia seguinte para formalizar o acordo.", "titulo_pt": "O motivo que pode levar Kassab a ser vice de Caiado", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27160, "titulo": "Lula vai ao Paraguai participar da 68ª Cúpula do Mercosul", "url": "https://www.cartacapital.com.br/politica/lula-vai-ao-paraguai-participar-da-68a-cupula-do-mercosul/", "fonte_id": "cartacapital", "data_pub": "2026-06-30T12:13:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ex-presidente Lula participará da 68ª Cúpula do Mercosul no Paraguai. O acordo prevê a entrada nos países membros com Carteira Nacional de Identificação.", "titulo_pt": "Lula participa da 68ª Cúpula do Mercosul no Paraguai", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 27206, "titulo": "MPRJ denuncia PMs por venda de arma apreendida em operação", "url": "https://www.cnnbrasil.com.br/nacional/sudeste/rj/mprj-denuncia-pms-por-venda-de-arma-apreendida-em-operacao/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T12:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Policiais militares estão sendo denunciados por supostamente venderem uma arma apreendida durante uma operação na Baixada Fluminense. Mandados de prisão e busca foram expedidos contra os envolvidos.", "titulo_pt": "MPRJ denuncia PMs por venda de arma apreendida em operação", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 27233, "titulo": "PF investiga grupo após celular revelar fraude para soltar presos", "url": "https://www.metropoles.com/colunas/mirelle-pinheiro/pf-investiga-grupo-apos-celular-revelar-fraude-para-soltar-presos", "fonte_id": "metropoles", "data_pub": "2026-06-30T12:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma operação foi realizada contra suspeitos de fraudar processos de execução penal para beneficiar presos. A Polícia Federal investiga um grupo após a descoberta de uma fraude através do celular dos criminosos.", "titulo_pt": "PF investiga grupo após celular revelar fraude para soltar presos", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27157, "titulo": "Misoginia é citada em mais de 2 mil decisões judiciais no Brasil desde 2015", "url": "https://g1.globo.com/politica/noticia/2026/06/30/misoginia-decisoes-judiciais-brasil.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T11:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A palavra misoginia foi mencionada em 2.029 decisões judiciais no Brasil desde 2015, mesmo sem existir uma tipificação criminal específica para a prática. Este levantamento foi realizado pelo G1 analisando bases de jurisprudência de tribunais.", "titulo_pt": "Misoginia é citada em mais de 2 mil decisões judiciais no Brasil desde 2015", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 27211, "titulo": "Análise: Governo e Congresso aceleram gastos de olho na eleição", "url": "https://www.cnnbrasil.com.br/politica/analise-governo-e-congresso-aceleram-gastos-de-olho-na-eleicao/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T11:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo Lula lançou a campanha 'Desenrola Adimplentes' e apresentou uma proposta para microempreendedores individuais (MEI) ao presidente da Câmara. Paralelamente, o Congresso avançou com medidas que afetam as contas públicas.", "titulo_pt": "Análise: Governo e Congresso aceleram gastos de olho na eleição", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 27165, "titulo": "Sabesp vai captar mais água na bacia que abastece o Rio de Janeiro", "url": "https://www.poder360.com.br/poder-brasil/sabesp-vai-captar-mais-agua-na-bacia-que-abastece-o-rio-de-janeiro/", "fonte_id": "poder360", "data_pub": "2026-06-30T11:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Sabesp planeja captar mais água na bacia hidrográfica que abastece a região metropolitana do Rio de Janeiro. A medida visa socorrer o sistema Cantareira, responsável por fornecer água para aproximadamente 10 milhões de pessoas.", "titulo_pt": "Sabesp vai captar mais água na bacia que abastece o Rio de Janeiro", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 27166, "titulo": "PSDB faz formação para pré-candidatos em Minas Gerais", "url": "https://www.poder360.com.br/poder-partidos-politicos/psdb-faz-formacao-para-pre-candidatos-em-minas-gerais/", "fonte_id": "poder360", "data_pub": "2026-06-30T11:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O PSDB realizou uma formação para pré-candidatos em Minas Gerais, com encontro em Belo Horizonte que contou com cerca de 150 participantes. Durante o evento, foram fornecidas orientações sobre legislação eleitoral.", "titulo_pt": "PSDB realiza formação para pré-candidatos em Minas Gerais", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 27167, "titulo": "Greve de ônibus no Rio chega ao 2º dia com expectativa de reunião", "url": "https://www.poder360.com.br/poder-brasil/greve-de-onibus-no-rio-chega-ao-2o-dia-com-expectativa-de-reuniao/", "fonte_id": "poder360", "data_pub": "2026-06-30T11:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A greve de ônibus no Rio de Janeiro entrou no segundo dia com a expectativa de uma reunião conciliatória marcada para a manhã desta terça-feira (30.jun). No primeiro dia, foram depredados 60 ônibus.", "titulo_pt": "Greve de ônibus no Rio chega ao segundo dia com reunião agendada", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 27158, "titulo": "Contas públicas têm déficit de R$ 56,1 bilhões em maio; dívida sobe para o maior nível em cinco anos", "url": "https://g1.globo.com/economia/noticia/2026/06/30/contas-publicas-tem-deficit-de-r-561-bilhoes-em-maio-divida-sobe-para-811percent-do-pib.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-30T11:37:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As contas do setor público consolidado apresentaram um déficit primário de R$ 56,1 bilhões em maio. Este resultado representa uma piora em comparação com o mesmo mês do ano anterior, quando houve um saldo negativo de R$ 33,7 bilhões.", "titulo_pt": "Contas públicas têm déficit de R$ 56,1 bilhões em maio; dívida atinge nível recorde", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 27161, "titulo": "PF investiga lavagem de dinheiro desviado da área de saúde do Rio", "url": "https://www.cartacapital.com.br/politica/pf-investiga-lavagem-de-dinheiro-desviado-da-area-de-saude-do-rio/", "fonte_id": "cartacapital", "data_pub": "2026-06-30T11:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Policiais federais realizam 14 mandados de busca e apreensão relacionados a uma investigação sobre lavagem de dinheiro envolvendo recursos da área de saúde do Rio de Janeiro.", "titulo_pt": "PF investiga lavagem de dinheiro desviado da área de saúde do Rio", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 27169, "titulo": "PF faz nova fase de operação contra desvios na saúde no RJ", "url": "https://www.poder360.com.br/poder-justica/pf-faz-nova-fase-de-operacao-contra-desvios-na-saude-no-rj/", "fonte_id": "poder360", "data_pub": "2026-06-30T11:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal realizou uma nova fase de operação contra desvios na saúde no Rio de Janeiro nesta terça-feira, cumprindo 14 mandados em Niterói e Duque de Caxias.", "titulo_pt": "PF realiza nova fase de operação contra desvios na saúde no RJ", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 27164, "titulo": "Keiko diz que Peru está perto de “caminho de ordem e esperança”", "url": "https://www.poder360.com.br/poder-internacional/keiko-diz-que-peru-esta-perto-de-caminho-de-ordem-e-esperanca/", "fonte_id": "poder360", "data_pub": "2026-06-30T12:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A presidente eleita do Peru, Keiko Fujimori, fez uma declaração após a apuração de 100% das atas eleitorais. A proclamação oficial ainda depende da decisão do Tribunal Superior Eleitoral (JNE).", "titulo_pt": "Keiko afirma que o Peru está próximo do 'caminho de ordem e esperança'", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 27153, "titulo": "Explosão de 'pacote-bomba' deixa oligarca ucraniano e mais dois feridos em Mônaco", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/explosao-de-pacote-bomba-deixa-oligarca-ucraniano-e-mais-dois-feridos-em-monaco.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-30T12:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um oligarca ucraniano, Vadim Irmolaiev, e mais 68-pact-on-shipping-routes-in-the-strait-of-hormuz-that-iran-is-rejecting.html", "fonte_id": "nyt_world", "data_pub": "2026-06-30T12:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Por décadas, um acordo marítimo negociado entre Irã e Omã regulava as principais rotas através do Estreito de Ormuz. Iran está rejeitando esse pacto.", "titulo_pt": "O Acordo Marítimo de 1968 no Estreito de Ormuz que o Irã Rejeita", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 27360, "titulo": "Oms, 'in Italia 5 decessi in 24 ore per il caldo'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/30/oms-in-italia-5-decessi-in-24-ore-per-il-caldo_147c6777-9ade-458b-bd02-66590d523a12.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-30T12:05:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Houve cinco mortes relacionadas ao calor em 24 horas na Itália. Na reunião de emergência sobre o calor, realizada no dia 6 de julho, membros da União Europeia discutiram a situação.", "titulo_pt": "OmS: Cinco Mortes Relacionadas ao Calor em 24 Horas na Itália", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 27328, "titulo": "For Israel, the Oct. 7 War Is Effectively Over", "url": "https://foreignpolicy.com/2026/06/30/israel-war-netanyahu-palestinians-gaza-hamas-lebanon-hezbollah-iran-trump/", "fonte_id": "foreign_policy", "data_pub": "2026-06-30T12:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 984 dias de luta, Benjamin Netanyahu não conseguiu obter uma vitória total em nenhum dos aspectos.", "titulo_pt": "Para Israel, a Guerra de 7 de Outubro está Técnicamente Concluída", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 27361, "titulo": "I banchieri della Bce restano cauti sulla frenata dell'inflazione", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/30/i-banchieri-della-bce-restano-cauti-sulla-frenata-dellinflazione_9b97b1a7-1548-4615-9dc6-10f0f1e91452.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-30T12:02:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Os banqueiros da BCE mantêm uma postura cautelosa em relação à redução da inflação, com efeitos da guerra no Irã ainda presentes.", "titulo_pt": "Bancos Centrais da BCE permanecem cautos sobre a redução da inflação", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 27240, "titulo": "América do Sul se torna ótima região para pesquisa paleontológica", "url": "https://www.metropoles.com/ciencia/america-do-sul-paleontologia", "fonte_id": "metropoles", "data_pub": "2026-06-30T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Países sul-americanos, incluindo Brasil, Argentina e Chile, se tornaram um importante local para a pesquisa paleontológica, especialmente para os estudiosos de dinossauros.", "titulo_pt": "América do Sul se torna ótima região para pesquisa paleontológica", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27356, "titulo": "Are US and Iranian negotiators meeting in Doha? What we know about talks", "url": "https://www.aljazeera.com/news/2026/6/30/are-us-and-iranian-negotiators-meeting-in-doha-what-we-know-about-talks?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-30T11:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Trump afirma que Irã deseja se encontrar nos Emirados Árabes Unidos após ataques, enquanto Teerã informa que enviará uma delegação apenas para discutir fundos congelados.", "titulo_pt": "Estão negociadores americanos e iranianos se encontrando em Doha? O que sabemos sobre as conversas", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 27325, "titulo": "Parcel Bomb Explodes in Monaco, Injuring 3", "url": "https://www.nytimes.com/2026/06/30/world/europe/monaco-parcel-bomb-explosion.html", "fonte_id": "nyt_world", "data_pub": "2026-06-30T11:54:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma explosão de um pacote-bomba ocorreu em Mônaco, ferindo três pessoas, incluindo uma criança. As autoridades informaram que o suspeito está fugindo.", "titulo_pt": "Explosão de Pacote-Bomba Feri Three Pessoas em Mônaco", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 27362, "titulo": "In Francia l'inflazione a giugno frena al +1,8% contro +2,4% di maggio", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/30/in-francia-linflazione-a-giugno-frena-al-18-contro-24-di-maggio_492c0a81-815f-4808-b9d5-4a241f6b3284.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-30T11:50:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Em junho, a inflação na Itália ficou em +1,8%, contra +2,4% em maio. O efeito do calo nos preços da energia contribuiu para essa redução.", "titulo_pt": "Na Itália, inflação de junho diminui para +1,8% frente a +2,4% de maio", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 27336, "titulo": "SCOTUS to rule on birthright citizenship. And, U.S. murder rate nears new low", "url": "https://www.npr.org/2026/06/30/g-s1-131004/up-first-newsletter-supreme-court-tps-birthright-citizenship-iran-war-us-murder-rate", "fonte_id": "npr_news", "data_pub": "2026-06-30T11:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal vai emitir um julgamento esperado sobre a cidadania por nascimento hoje, no último dia do seu período judicial. Além disso, a taxa de homicídios nos Estados Unidos se aproxima de um novo baixo nível.", "titulo_pt": "Supremo Tribunal Federal decidirá sobre a cidadania por nascimento e taxa de homicídios nos EUA atinge novo baixíssimo nível", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 27155, "titulo": "Reino Unido anuncia maior gasto com defesa desde a Guerra Fria", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/reino-unido-anuncia-maior-gasto-com
