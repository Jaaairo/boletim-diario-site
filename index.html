<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: none; border: 1px solid var(--border); border-radius: 4px;
             color: var(--texto2); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { border-color: var(--acento); color: var(--texto); }
  .tts-bar[hidden] { display: none; }
</style>
</head>

<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>

</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">

    <label for="inp-senha">Senha</label>

</div>

<div class="modal-overlay" id="modal-flag">

      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

ções entre Teerã e Washington serão retomadas. Em outro desenvolvimento, Donald Trump enfrentou uma série de controvérsias, incluindo um vídeo criado com inteligência artificial criticando estrelas de Hollywood e fazendo piadas sobre ter 'ménage à trois' com seus filhos durante a cerimônia de inauguração da Biblioteca Presidencial Theodore Roosevelt. As tarifas comerciais entre Brasil e Estados Unidos também estão em pauta, com Flávio Bolsonaro pedindo uma pausa de 180 dias antes de novas medidas serem aplicadas.\n\nUm ataque aéreo massivo realizado pela Rússia contra Kyiv resultou na morte de 17 pessoas, conforme informado pelo prefeito da cidade. Este é o ataque mais letal em cinco anos de guerra na Ucrânia. O Kremlin declarou que intensificará ainda mais as pressões sobre a capital ucraniana. Em resposta, o presidente Zelenskyy expressou esperança de um rápido resultado das investigações irlandesas sobre exportações de alumina para a Rússia. Além disso, a China informou que o piloto do avião pequeno que colidiu com o prédio mais alto de Beijing apresentava problemas de saúde mental. Esses eventos ocorrem em um contexto geopolítico tenso, com várias partes do mundo enfrentando desafios significativos, incluindo a guerra na Ucrânia, as sanções econômicas entre Estados Unidos e Brasil, e os esforços internacionais para lidar com questões climáticas.", "economia": "As bolsas asiáticas registraram movimentações significativas nesta semana. Na Coreia do Sul, as ações subiram 2,1% no final da manhã desta sexta-feira, impulsionadas por compras a preço baixo. Em contraste, a Bolsa de Seul despencou quase 8% na quinta-feira, com destaque para as fortes quedas de Samsung (-8,95%) e SK Hynix (-12,04%). No cenário internacional, o Canadá planeja construir uma nova linha de petróleo para suprir a Ásia com 1 milhão de barris por dia, como parte dos esforços para reduzir sua dependência dos Estados Unidos. O governo brasileiro apresentou um 'mapa do caminho' para evitar tarifas dos EUA durante uma reunião virtual com o representante de Comércio dos Estados Unidos. Além disso, a Embraer entregou 65 aeronaves no segundo trimestre, seu melhor desempenho em 16 anos, enquanto o Tesouro Nacional realizou leilões de títulos prefixados e os juros futuros dispararam logo após o evento.", "tecnologia": "No primeiro semestre de 2023, a Tesla foi o maior vendedor de carros importados na Coreia do Sul. Em outro desenvolvimento tecnológico, a joint venture entre a LG Energy Solution e a Honda começou a produzir células de bateria para sistemas de armazenamento de energia (ESS) em julho. Durante reuniões separadas, a Coreia do Sul discutiu cooperação em tecnologias quânticas com o Canadá, Reino Unido e União Europeia. Em um evento importante na capital sul-coreana, o Global AI Frontiers Symposium ocorreu no dia 3 de julho, promovendo discussões sobre a inteligência artificial. A OpenAI propôs transferir uma participação de 5% ao governo dos Estados Unidos, em meio ao crescente contrarremédio público nos EUA em relação aos possíveis impactos econômicos da IA, como demissões. Além disso, um importante modelo de IA chinês chamado GLM-5.2 do Z.ai está competindo com os líderes OpenAI e Anthropic na corrida pela inteligência artificial.", "ciencia": "A NASA estabeleceu um novo recorde de visualizações ao vivo com a missão Artemis II, que gerou mais de 149,4 milhões de visualizações. A missão, que incluiu o lançamento e splashdown da espaçonave, mostrou forte engajamento global. Em Cabo Verde, cientistas criaram células vivas que se alimentam, crescem e se reproduzem, um avanço significativo na biologia celular. Além disso, o Telescópio Espacial James Webb da NASA capturou imagens de estrelas nascendo em comemoração ao aniversário dos Estados Unidos, revelando galáxias distantes que brilham como fogos de artifício.", "cultura": "A escritora portuguesa Lídia Jorge ganhou o Prêmio Camões de Literatura 2026, considerado a maior distinção literária da língua portuguesa. O anúncio foi feito após uma reunião virtual do júri. Em outra notícia cultural, G-Dragon, famoso cantor do K-pop, foi nomeado embaixador honorário para a 48ª sessão do Comitê do Patrimônio Mundial da UNESCO, que será realizada em Busan no final deste mês. Essa nomeação reconhece sua influência global e contribuições para a cultura e as artes. No Brasil, o Festival Folha Sabores da Montanha destaca a produção vinícola da Serra da Mantiqueira e a gastronomia de inverno em 29 restaurantes e bares espalhados por regiões serranas de quatro estados, promovendo uma experiência culinária rica e diversificada.", "sociedade": "A sociedade enfrenta diversos desafios e situações dramáticas em diferentes partes do mundo. Primeiramente, os terremotos na Venezuela continuam a causar devastação, com relatos de pessoas ainda vivas sendo resgatadas após sete ou oito dias sob os escombros. Enquanto isso, uma equipe de jovens voluntários gerencia um abrigo para sobreviventes em La Guaira. A situação do sistema de saúde venezuelano é crítica e tem dificuldade em atender as vítimas dos terremotos. Além disso, a Igreja Católica lançou uma campanha humanitária para auxiliar o país. No Brasil, um grupo da J&F mobiliza operações humanitárias enviando mantimentos por meio de aviões cargueiros. Em outro contexto, jovens pobres enfrentam desafios em obter empregos estáveis, enquanto a lei propõe mudanças na transferência de adolescentes condenados para cárceis administradas pela Gendarmeria. No âmbito médico, um caso envolveu maus-tratos a um bebê que levou uma enfermeira a alertar sobre o abuso e resultou em acusações contra a mãe e padrasto do menino. Outro caso envolveu um jogador argentino que perdeu sua família durante os terremotos na Venezuela, refletindo as tragédias pessoais associadas aos desastres naturais.", "meio_ambiente": "Um novo estudo revela que o Pantanal perdeu 80% de sua água superficial em quatro décadas, afetando significativamente o bioma. Paralelamente, a França enfrenta uma onda de calor extremo desde junho, com mais de 90 pessoas mortas por afogamento até agora e incêndios florestais se espalhando rapidamente pelo sul do país, causados pelas altas temperaturas. Além disso, a Alemanha está pressionada para implementar rapidamente medidores inteligentes básicos devido ao esforço de expansão da rede elétrica.", "direitos_humanos": "Mais de 400 pessoas morreram durante a expansão da epidemia de Ebola na República Democrática do Congo, conforme relatos. Em outro desenvolvimento, um novo decreto sobre unidade étnica entrou em vigor na China, mas grupos de direitos humanos e a ONU temem que ele possa ameaçar os direitos dos minoritários uigures e tibetanos, considerando-o como 'força de assimilação'. No Chile, um presunto assassino do carregador de fuzis Emmanuel Sánchez foi identificado e está sob prisão preventiva. Além disso, uma rede internacional organizada de estupro facilitado por drogas foi revelada pela Agência Nacional de Crime do Reino Unido, com atividades ocorrendo através de redes online não identificadas pela lei. Em um incidente no Brasil, a presidenta Delcy Rodríguez expressou que a Venezuela está profundamente impactada pelas perdas humanas, admitindo pela primeira vez que há uma estimativa de cerca de 10.000 mortes e sobrecarregando os serviços funerários com corpos em número incerto. No Chile, um homem acusado de abusos sexuais contra um menor foi preso preventivamente. Em outro caso, dois casais indonésios foram chicoteados publicamente por beijarem durante um vivo no TikTok."}, "resumo_do_dia": {"politica_nacional": [{"id": 32533, "titulo": "Evento de Haddad na Unicamp tem confusão e briga com integrantes do MBL", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/evento-de-haddad-na-unicamp-tem-confusao-e-briga-com-integrantes-do-mbl.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-03T03:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um evento com Fernando Haddad, pré-candidato ao Governo de São Paulo, na Unicamp teve confusão e agressões entre seus apoiadores e integrantes do MBL.", "titulo_pt": "Evento de Haddad na Unicamp tem confusão e briga com integrantes do MBL", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 32534, "titulo": "Pré-candidatos miram eleitoras e reforçam falas sobre mulheres em meio a polêmicas na pré-campanha", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/07/03/pre-candidatos-miram-eleitoras-e-reforcam-falas-sobre-mulheres-em-meio-a-polemicas-na-pre-campanha.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-03T03:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Pré-candidatos à Presidência da República intensificaram discursos voltados às mulheres nas últimas semanas, refletindo a disputa pelo eleitorado feminino, que representa 52,85% do eleitorado brasileiro. Este movimento ocorre em meio a polêmicas envolvendo Michelle e Flávio Bolsonaro.", "titulo_pt": "Pré-candidatos miram eleitoras e reforçam falas sobre mulheres", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 32542, "titulo": "6×1: Arquitetura jurídica da PEC impede o resultado esperado, afirma juiz", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/6x1-arquitetura-juridica-da-pec-impede-o-resultado-esperado-afirma-juiz/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-03T02:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O juiz Otavio Calvet identificou três erros na Proposta de Emenda à Constituição (PEC) que visa extinguir a escala 6x1, afirmando que eles podem levar ao aumento de custos de até 18,2% para os empregadores. A arquitetura jurídica da PEC, segundo ele, não produzirá o resultado esperado.", "titulo_pt": "6×1: Arquitetura jurídica da PEC pode impor aumento de custos aos empregadores, afirma juiz", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": r/2026/07/defesa-de-bolsonaro-diz-ao-stf-que-ele-abre-mao-de-arma-em-casa-para-seguir-em-prisao-domiciliar.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-02T23:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A defesa de Jair Bolsonaro defendeu ao ministro Alexandre de Moraes, do STF, a manutenção da prisão domiciliar, afirmando que o ex-presidente não teria acesso à arma em casa.", "titulo_pt": "Defesa de Bolsonaro ao STF: ele abriria mão da arma para ficar em prisão domiciliar", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 31579, "titulo": "Ministério da Gestão autoriza AGU a realizar concurso para 170 carreiras jurídicas", "url": "https://www.jota.info/executivo/ministerio-da-gestao-autoriza-agu-a-realizar-concurso-para-170-carreiras-juridicas", "fonte_id": "jota", "data_pub": "2026-07-02T23:37:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério da Gestão autorizou a Advocacia-Geral da União (AGU) a realizar um concurso para 170 vagas de carreiras jurídicas. De acordo com o advogado-geral da União, Jorge Messias, o edital será lançado ainda neste ano.", "titulo_pt": "Ministério autoriza AGU a realizar concurso para 170 carreiras jurídicas", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 31333, "titulo": "Apesar de prejuízo recorde nos Correios, estatais federais têm lucro maior em 2025", "url": "https://g1.globo.com/economia/noticia/2026/07/02/apesar-de-prejuizo-recorde-nos-correios-estatais-federais-tem-lucro-maior-em-2025.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-02T22:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O conjunto das estatais federais registrou um lucro líquido de R$ 169,4 bilhões em 2025. A Petrobras foi responsável por 65% desse lucro, somando R$ 110,6 bilhões.", "titulo_pt": "Apesar do prejuízo recorde nos Correios, estatais federais têm lucro maior em 2025", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 32606, "titulo": "China says man who flew plane into Beijing skyscraper had mental health problems", "url": "https://www.theguardian.com/world/2026/jul/03/china-man-small-plane-beijing-skyscraper-tower-mental-health-problems-statement", "fonte_id": "guardian_world", "data_pub": "2026-07-03T03:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As autoridades chinesas informaram que o homem de 66 anos, que pilotou um avião pequeno e colidiu com o prédio mais alto de Beijing na sexta-feira passada, apresentava problemas de saúde mental. Este é o relato mais detalhado oficial sobre o incidente incomum ocorrido no centro empresarial da cidade.", "titulo_pt": "China afirma que homem que pilotou avião em edifício de Beijing tinha problemas de saúde mental", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 32536, "titulo": "Flávio pede aos EUA pausa de 180 dias antes de novas tarifas", "url": "https://www.poder360.com.br/poder-eleicoes/flavio-pede-aos-eua-pausa-de-180-dias-antes-de-novas-tarifas/", "fonte_id": "poder360", "data_pub": "2026-07-03T03:13:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O documento propõe uma pausa de 180 dias nas tarifas antes do Brasil e Estados Unidos iniciarem negociações. Caso não haja avanços concretos, as medidas serão automaticamente aplicadas.", "titulo_pt": "Flávio sugere pausa de 180 dias antes de novas tarifas entre Brasil e EUA", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 32632, "titulo": "Middle East live: Iran prepares to say final goodbye to Supreme Leader Khamenei", "url": "https://www.france24.com/en/middle-east/20260703-middle-east-live-iran-prepares-to-say-final-goodbye-to-supreme-leader-khamenei", "fonte_id": "france24", "data_pub": "2026-07-03T03:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Irã advertiu os Estados Unidos e Israel contra qualquer ataqu Coreia do Sul assina acordo antiterrorismo com agência da ONU", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 32378, "titulo": "Suprema Corte dá uma esperada lição em Trump", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/colunas/laura-greenhalgh/2026/07/suprema-corte-da-uma-esperada-licao-em-trump.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-07-03T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Suprema Corte confirmou o direito à cidadania para todos nascidos ou naturalizados nos Estados Unidos, conforme estabelecido na 14ª Emenda da Constituição. Donald Trump criticou a decisão e afirmou que não precisa de emendas constitucionais.", "titulo_pt": "Suprema Corte confirma cidadania para nascidos nos EUA e Trump critica decisão", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 32010, "titulo": "Sale il bilancio delle vittime in Venezuela, 2.595 morti", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/03/sale-il-bilancio-delle-vittime-in-venezuela-2.595-morti_22aa84e9-8b4a-4e60-a701-48e1c5e88c5a.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-03T01:56:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "A presidente interina da Venezuela, Delcy Rodríguez, anunciou o balanço de vítimas. Houve 2.595 mortes registradas.", "titulo_pt": "Venda o balanço das vítimas na Venezuela: 2.595 mortos", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 32426, "titulo": "'If Ukraine falls, this will be the end of the European Union and the end of Europe's future'", "url": "https://www.france24.com/en/video/20260703-if-ukraine-falls-this-will-be-the-end-of-the-european-union-and-the-end-of-europe-s-future", "fonte_id": "france24", "data_pub": "2026-07-03T01:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dr. Volodymyr Yermolenko, filósofo ucraniano e presidente da PEN Ucrânia, afirma que a guerra não é apenas uma confrontação militar, mas também ameaça o futuro da Europa. Ele argumenta que os ataques russos em áreas residenciais refletem frustração militar mais do que progresso estratégico.", "titulo_pt": "Se a Ucrânia cair, isso marcará o fim da União Europeia e o fim do futuro europeu", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 31591, "titulo": "Última hora del terremoto en Venezuela, en directo | Delcy Rodríguez: “Politizar una situación humanitaria como esta es miserable”", "url": "https://elpais.com/america/2026-07-02/ultima-hora-del-terremoto-en-venezuela-en-directo.html", "fonte_id": "elpais_america", "data_pub": "2026-07-03T01:46:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um homem resgatado após sete dias sob os escombros, resultado de um resgate intensivo que durou quase 72 horas. O terremoto na Venezuela já causou mais de 2.200 mortos e 11.200 feridos.", "titulo_pt": "Últimas notícias do terremoto em Venezuela, em tempo real | Delcy Rodríguez: ‘Politizar uma situação humanitária como esta é miserable’", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 32044, "titulo": "South Korea opens 24-hour won trading at a fraught moment", "url": "https://www.japantimes.co.jp/business/2026/07/03/markets/south-korea-won-24-trading/", "fonte_id": "japan_times", "data_pub": "2026-07-03T01:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Coréia do Sul introduziu o comércio de won 24 horas por dia em um momento tenso, quando a moeda está retornando a níveis baixos não vistos desde 2009. Isso expõe a corretagem e a economia à especulação.", "titulo_pt": "Coréia do Sul inicia negociação de won 24 horas em momento tenso", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 31240, "titulo": "Sobe para 2.595 o número de mortes confirmadas em terremotos na Venezuela", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/07/sobe-para-2595-o-numero-de-mortes-confirmadas-em-terremotos-na-venezuela.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-07-03T01:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Oito dias após os terremotos, o número de mortes confirmadas aumentou para 2.595. O regime venezuelano informou que mais de 11 mil pessoas ficaram feridas e 12.841 foram desalojadas.", "titulo_pt": "Número de mortos em terremotos na Venezuela sobe para 2.595", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 31737, "titulo": "Carney Unveils Multibillion Dollar Oil Pipeline Project to Boost Trade With Asia", "url": "https://www.nytimes.com/2026/07/02/world/canada/carney-trade-oil-pipeline-alberta-british-columbia.html", "fonte_id": "nyt_world", "data_pub": "2026-07-03T01:43:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Investimentos multibilionários, incluindo um novo oleoduto do Alberta até a costa do Pacífico e instalações de gás natural, visam diversificar as exportações para fora dos Estados Unidos.", "titulo_pt": "Carney Anuncia Projeto Multibilionário de Oleoduto para Aumentar Comércio com Ásia", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 32666, "titulo": "Seoul shares up 2.1 pct late Fri. morning on bargain hunting", "url": "https://en.yna.co.kr/view/AEN20260703005500320", "fonte_id": "yonhap_news", "data_pub": "2026-07-03T02:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações de Seul subiram 2,1% no final da manhã desta sexta-feira, impulsionadas por compras a preço baixo.", "titulo_pt": "Seoul avança 2,1% na tarde desta sexta-feira com compra a preços baixos", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 32518, "titulo": "Japan’s convertible bonds regain favor as rates continue to rise", "url": "https://www.japantimes.co.jp/business/2026/07/03/compani oas votando através do seu aplicativo. Segundo o produtor executivo, esse número é maior que o de muitas eleições políticas norte-americanas em andamento.", "titulo_pt": "Quanto É Grande 'Love Island USA'? Mais de 10 Milhões de Pessoas Já Usaram Seu App", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 31267, "titulo": "Anthropic libera modelo de IA Fable 5 para todos os usuários após fim de proibição dos EUA", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/tec/2026/07/anthropic-libera-modelo-de-ia-fable-5-para-todos-os-usuarios-apos-fim-de-proibicao-dos-eua.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-02T20:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Anthropic liberou o modelo de inteligência artificial Fable 5 para todos os usuários após a remoção das proibições dos EUA. O Mythos 5 também foi novamente disponibilizado para organizações americanas autorizadas.", "titulo_pt": "Anthropic libera modelo de IA Fable 5 para todos os usuários após fim de proibição dos EUA", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 32634, "titulo": "Anthropic President Daniela Amodei: 'We must embrace both the positive side and the dark side of AI'", "url": "https://www.lemonde.fr/en/economy/article/2026/07/02/anthropic-president-daniela-amodei-we-must-embrace-both-the-positive-side-and-the-dark-side-of-ai_6755092_19.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-02T18:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Daniela Amodei, presidente da start-up americana de inteligência artificial avaliada em 965 bilhões de dólares e conhecida por alertar sobre os riscos dessa tecnologia, compartilha sua perspectiva com o Le Monde sobre as principais questões enfrentadas pelo setor.", "titulo_pt": "Presidente da Anthropic: 'Devemos abraçar tanto o lado positivo quanto o lado sombrio da IA'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 32531, "titulo": "S. Korea identifies FMD outbreak at farms in N. Gyeongsang Province", "url": "https://en.yna.co.kr/view/AEN20260703004500320", "fonte_id": "yonhap_news", "data_pub": "2026-07-03T02:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A ministra da Agricultura confirmou uma epidemia de vírus da peste suína africana em fazendas na Província de Gyeongsang do Norte. O incidente ocorreu no dia 3 de julho.", "titulo_pt": "Coreia do Sul confirma surto de FMD em fazendas na Província de Gyeongsang do Norte", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 32047, "titulo": "Tokyo hospital baby hatch accepts 20 newborns in first year", "url": "https://www.japantimes.co.jp/news/2026/07/03/japan/society/tokyo-hospital-baby-hatch/", "fonte_id": "japan_times", "data_pub": "2026-07-03T01:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um hospital em Tóquio recebeu 20 bebês abandonados no primeiro ano de operação de sua hatch. Sete dos bebês foram nascidos sob condições de confidencialidade, com apenas alguns funcionários do hospital sabendo sobre as identidades das mães.", "titulo_pt": "Hospital de Tóquio registra 20 bebês em primeira ano de uso da hatch", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 31254, "titulo": "Permitências Cabo Verde já tem, agora só precisa de mais oportunidades", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/colunas/suzanaherculanohouzel/2026/07/permitencias-cabo-verde-ja-tem-agora-so-precisa-de-mais-oportunidades.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-02T21:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O autor passou uma semana na capital de Cabo Verde, Praia, onde deu aulas para alunos aspirantes a pós-graduação. Ele expressa desejo de ver um time africano vencer em um futuro próximo, mas reconhece as dificuldades econômicas do país.", "titulo_pt": "Cabo Verde já tem potencial, agora precisa de oportunidades", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 31753, "titulo": "Medicare is now offering $50 GLP-1 prescriptions. The US may never be the same.", "url": "https://www.vox.com/health/493926/medicare-bridge-cover-weight-loss-glp-1-zepbound-wegovy-foundayo", "fonte_id": "vox", "data_pub": "2026-07-02T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A partir de julho de 2023, o Medicare está oferecendo prescrições de GLP-1 por apenas $50 para perda de peso. Este programa, chamado GLP-1 Bridge Program, pode permitir que milhões de americanos tenham acesso a esses medicamentos, amplamente publicitados.", "titulo_pt": "Medicare agora oferece receitas GLP-1 por apenas R$ 50. Os EUA podem nunca mais ser os mesmos.", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 32256, "titulo": "STAT+: Medicare takes another swing at 340B cuts to hospitals", "url": "https://www.statnews.com/2026/07/02/medicare-hospital-payment-340b-drugs-cut/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-02T19:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Medicare está considerando reduzir os pagamentos para medicamentos sob o programa 340B, que é uma proposta recente dentro do debate sobre o programa de descontos de medicamentos.", "titulo_pt": "Medicare propõe cortes nos pagamentos de medicamentos 340B aos hospitais", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 32257, "titulo": "STAT+: Lawmakers urge HHS to force Eli Lilly to provide 340B drug discounts to hospitals", "url": "https://www.statnews.com/pharmalot/2026/07/02/lawmakers-urge-lilly-to-provide-340b-drug-discounts-to-hospitals/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-02T19:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Legisladores intervêm em um conflito entre a Eli Lilly e hospitais relacionado ao programa de descontos de medicamentos 340b.", "titulo_pt": "Parlamentares se envolvem na disputa entre Eli Lilly e hospitais sobre o programa de descontos de medicamentos 340b", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 32273, "titulo": "Perovskite solar panel startup Verde Technologies shifts focus to space", "url": "https://spacenews.com/perovskite-solar-panel-startup-verde-technologies-shifts-focus-to-space/", "fonte_id": "spacenews", "data_pub": "2026-07-02T19:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Verde Technologies está se voltando para o espaço para comercializar painéis solares baseados em perovskita, desviando sua atenção inicial das telhadas em favor de aplicativos orbitais como centros de dados e constelações grandes. A empresa acredita que o material de filme fino pode ser útil para fornecer energia a esses sistemas espaciais.", "titulo_pt": "Startup de painéis solares perovskita Verde Technologies dirige-se ao espaço", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 32265, "titulo": "NASA needs volunteers to spend a year locked in a Mars simulation", "url": "https://www.scientificamerican.com/article/nasa-needs-volunteers-to-spend-a-year-locked-in-a-mars-simulation/", "fonte_id": "scientific_american", "data_pub": "2026-07-02T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA está buscando voluntários para participar de uma simulação de missão a Marte que durará um ano. O programa, chamado Moon & Mars Exploration Analog, imita os desafios de uma missão espacial de longa duração.", "titulo_pt": "NASA busca voluntários para simulação de missão a Marte", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 32258, "titulo": "STAT+: Elevance sues government over $115 million tied to Medicare Advantage star ratings", "url": "https://www.statnews.com/2026/07/02/elevance-lawsuit-medicare-advantage-star-ratings-clover/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-02T18:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A seguradora de saúde Elevance processou o governo, reivindicando US$ 115 milhões relacionados às suas classificações de estrelas no Medicare Advantage. A empresa afirma que a CMS não calculou corretamente suas classificações de estrelas.", "titulo_pt": "Elevance processa governo por US$ 115 milhões em relação às classificações de estrelas do Medicare Advantage", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 32274, "titulo": "Isar Aerospace to launch German-built Planet imaging satellite", "url": "https://spacenews.com/isar-aerospace-to-launch-german-built-planet-imaging-satellite/", "fonte_id": "spacenews", "data_pub": "2026-07-02T18:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Isar Aerospace foi contratada para lançar um satélite de imagens da empresa Planet, uma subsidiária alemã. Este contrato representa uma capacidade espacial completa para o país.", "titulo_pt": "Isar Aerospace vai lançar satélite de imagens alemão da Planet", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 32280, "titulo": "NASA’s Artemis II Breaks Agency Streaming Record", "url": "https://www.nasa.gov/general/nasas-artemis-ii-breaks-agency-streaming-record/", "fonte_id": "nasa_news", "data_pub": "2026-07-02T18:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A cobertura ao vivo da missão Artemis II da NASA gerou interesse público sem precedentes, com mais de 149,4 milhões de visualizações do lançamento e da splashdown. A transmissão contínua durante todo o missionário demonstrou forte engajamento global.", "titulo_pt": "NASA’s Artemis II Breaks Agency Streaming Record (Artemis II destrói recorde de streaming da agência da NASA)", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 32262, "titulo": "Giant trees have tricks to work around drought", "url": "https://www.sciencenews.org/article/giant-trees-tricks-drought-water", "fonte_id": "science_news", "data_pub": "2026-07-02T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Amostras coletadas a alturas impressionantes fornecem evidências para uma teoria não testada sobre adaptação de árvores à seca, desafiando outra teoria.", "titulo_pt": "Grandes árvores têm truques para lidar com a seca", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 32275, "titulo": "Polish space tech company Sybilla Technologies secures funds to enter U.S. market", "url": "https://spacenews.com/polish-space-tech-company-sybilla-technologies-secures-funds-to-enter-u-s-market/", "fonte_id": "spacenews", "data_pub": "2026-07-02T17:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa polonesa de tecnologia espacial Sybilla Technologies recebeu uma investimento de cerca de 35 milhões de zlotys (cerca de $10 milhões) do banco estatal BGK e da firma de capital de risco europeia 3TS Capital Partners. O financiamento visa permitir que a empresa entre no mercado americano.", "titulo_pt": "Empresa polonesa de tecnologia espacial Sybilla Technologies obtém investimento para entrar no mercado dos EUA", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 31255, "titulo": "Cientistas anunciam célula sintética que se alimenta, cresce e se reproduz", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/cientistas-anunciam-celula-sintetica-que-se-alimenta-cresce-e-se-reproduz.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-02T17:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Cientistas da Universidade de Minnesota, nos Estados Unidos, sintetizaram células que se alimentam, crescem e se reproduzem. Essas células também competem entre si.", "titulo_pt": "Cientistas anunciam célula sintética que se alimenta, cresce e se reproduz", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 32259, "titulo": "STAT+: What does DeGette’s loss mean for pharma?", "url": "https://www.statnews.com/2026/07/02/degette-loses-to-kiros-pharma-presidential-fitness-test-dc-diagnosis/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-02T16:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A deputada democrata da Colorado, Diana DeGette, perdeu sua primária. Ela era bem informada sobre biotecnologia e farmacêutica, embora não sempre fosse amiga do setor.", "titulo_pt": "O que a derrota de DeGette significa para o setor farmacêutico?", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 32266, "titulo": "Male marathoners might be twice as likely to ‘hit the wall’ as women—the reason why might surprise you", "url": "https://www.scientificamerican.com/article/male-marathoners-might-be-twice-as-likely-to-hit-the-wall-as-women-the-reason-why-might-surprise-you/", "fonte_id": "scientific_american", "data_pub": "2026-07-02T16:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Estudos indicam que corredores masculinos podem ser duas vezes mais propensos a 'parar de repente' durante maratonas do que as mulheres. A diferença no uso de energia enquanto correm é fundamentalmente diferente entre os sexos.", "titulo_pt": "Corredores masculinos podem ter maior probabilidade de 'parar de repente' nas maratonas do que as mulheres - e a razão pode surpreender", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 31210, "titulo": "The Weekend With Rene Matic", "url": "https://www.itsnicethat.com/features/the-weekend-with-rene-matic-030726", "fonte_id": "its_nice_that", "data_pub": "2026-07-03T08:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O guia de fim de semana que você não sabia precisava – veja o que Rene Matić está fazendo e o que você também poderia fazer!", "titulo_pt": "O Guia de Fim de Semana Que Você Não Sabia Precisava", "veiculo": "It's Nice That", "pais": "Reino Unido", "classe": "B"}, {"id": 32580, "titulo": "Cartas de lectores: Conciencia, barreras, ignorar la política", "url": "https://www.lanacion.com.ar/opinion/carta-de-lectores/cartas-de-lectores-conciencia-barreras-ignorar-la-politica-nid03072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-03T03:05:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Os leitores enviaram cartas expressando suas opiniões sobre a importância de ter consciência política, as barreiras que podem impedir essa conscientização e o fato de muitos ignorarem a política em sua rotina diária.", "titulo_pt": "Cartas dos leitores: Consciência, Barreiras, Ignorar a Política", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 32582, "titulo": "Otros campeones mundiales", "url": "https://www.lanacion.com.ar/editoriales/otros-campeones-mundiales-nid03072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-03T03:04:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O texto se refere a outros campeões mundiais, mas não fornece detalhes adicionais sobre qual esporte ou categoria esses campeões pertencem. Não há informações específicas para resumir.", "titulo_pt": "Outros Campeões Mundiais", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 32585, "titulo": "La ciudad que quedó bajo el agua y hoy es meca del turismo", "url": "https://www.lanacion.com.ar/revista-lugares/la-ciudad-que-quedo-bajo-el-agua-y-hoy-es-meca-del-turismo-nid03072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-03T03:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A cidade foi forçosamente transferida em 1979 antes de ser submersa pela construção de uma represa; 15 anos depois, ressurgiu graças às águas termais.", "titulo_pt": "A cidade que ficou sob a água e hoje é destino turístico", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 32648, "titulo": "Inside Japan’s $25 billion consumer market built on fan devotion", "url": "https://www.japantimes.co.jp/business/2026/07/03/oshikatsu-consumer-economy/", "fonte_id": "japan_times", "data_pub": "2026-07-03T02:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A economia de merchandise baseada no fandom no Japão, que inclui itens como brinquedos de mangás e produtos relacionados à Hello Kitty, é avaliada em aproximadamente 410 bilhões de ienes (cerca de 25 bilhões de dólares).", "titulo_pt": "Dentro do mercado consumista japonês de 25 bilhões de dólares alimentado pelo fandom", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 32527, "titulo": "La Plata names BTS ‘Guests of Honor’ ahead of Argentina concerts", "url": "https://www.koreaherald.com/article/10797252", "fonte_id": "korea_herald", "data_pub": "2026-07-03T02:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O conselho municipal de La Plata, na Argentina, aprovou uma resolução declarando o grupo BTS como 'Hóspedes de Honra' antes dos seus concertos em Buenos Aires, programados para outubro. A distinção de Hóspede de Honra é concedida formalmente por governos municipais ou nacionais na Argentina a visitantes estrangeiros distinguidos em reconhecimento de suas contribuições culturais, científicas ou sociais.", "titulo_pt": "La Plata nomeia BTS como 'Hóspedes de Honra' antes dos concertos em Buenos Aires", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 32471, "titulo": "Cabo Verde: la historia detrás del pueblo reconstruido desde las cenizas", "url": "https://www.lanacion.com.ar/propiedades/construccion-y-diseno/cabo-verde-la-historia-del-pueblo-reconstruido-desde-las-cenizas-nid02072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-03T02:21:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A comunidade de Chã das Caldeiras, com 950 habitantes, tem um forte senso de pertencimento apesar dos riscos associados à residência no local.", "titulo_pt": "Cabo Verde: a história por trás da comunidade reconstruída desde as cinzas", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 32519, "titulo": "Russian envoy to skip Hiroshima peace ceremony", "url": "https://www.japantimes.co.jp/news/2026/07/03/japan/russia-envoy-to-skip-hiroshima-ceremony/", "fonte_id": "japan_times", "data_pub": "2026-07-03T02:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O representante russo não participará da cerimônia de paz anual em Hiroshima pela quinta vez consecutiva, desde o início da invasão da Ucrânia em 2022.", "titulo_pt": "Representante russo não comparecerá à cerimônia de paz de Hiroshima", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 32520, "titulo": "Following petition, female lawmakers in Japan get two more toilets", "url": "https://www.japantimes.co.jp/news/2026/07/03/japan/politics/parliament-women-toilets/", "fonte_id": "japan_times", "data_pub": "2026-07-03T02:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Feministas japonesas conseguiram a adição de dois banheiros femininos no edifício do parlamento após apresentarem uma petição assinada por 58 legisladoras, incluindo o atual primeiro-ministro Sanae Takaichi.", "titulo_pt": "Após petição, parlamentares mulheres em japonês ganham mais dois banheiros", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 32438, "titulo": "'O Urso' corta excessos e se despede com final delicado e memorável", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/colunas/lucianacoelho/2026/07/o-urso-corta-excessos-e-se-despede-com-final-delicado-e-memoravel.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-03T02:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": a_pub": "2026-07-03T02:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "De julho a agosto, as bibliotecas públicas de Seul se tornam refúgios climatizados durante o verão, oferecendo programas culturais além dos livros. Mais de 200 bibliotecas participarão da campanha 'Bibliotecas são Frios: Desligado & Biblioteca', com cerca de 1665 atividades.", "titulo_pt": "As bibliotecas de Seul se tornam os refúgios mais frescos do verão", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 32055, "titulo": "Portrait exhibit brings 47 American presidencies to life", "url": "https://www.axios.com/2026/07/03/us-presidents-portrait-exhibit-america-250", "fonte_id": "axios", "data_pub": "2026-07-03T01:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo exposição na entrada do escritório global da Goldman Sachs em Nova York apresenta 47 presidências americanas através de pinturas e citações que refletem os tempos ou as individualidades dos presidentes. O artista Salvatore Catalano dedica tempo ao desenvolvimento de um estilo único de cores, sombras e luz para cada presidente.", "titulo_pt": "Exposição retrata 47 presidências americanas em novas pinturas", "veiculo": "Axios", "pais": "EUA", "classe": "B"}, {"id": 31872, "titulo": "250 years of American independence: 'Enslaved and freed Black people were not merely witnesses to the Atlantic Revolutions, they were active participants'", "url": "https://www.lemonde.fr/en/opinion/article/2026/07/03/250-years-of-american-independence-enslaved-and-freed-black-people-were-not-merely-witnesses-to-the-atlantic-revolutions-they-were-active-participants_6755100_23.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-03T01:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A professora de história Elisabeth Landi argumenta neste artigo publicado no Le Monde que as comemorações do aniversário dos Estados Unidos devem reconhecer plenamente a participação dos escravos e livres negros na Revolução Atlântica, que não questionou a instituição da escravidão.", "titulo_pt": "250 anos de independência americana: 'Escravos e libertos negros foram participantes ativos das revoluções atlânticas, não apenas espectadores'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 32074, "titulo": "'Teach You a Lesson' becomes Netflix's fifth most-watched Korean series ever", "url": "https://www.koreaherald.com/article/10797068", "fonte_id": "korea_herald", "data_pub": "2026-07-03T01:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A série 'Ensine-Lhe uma Lição' se tornou a quinta série coreana mais vista no Netflix, superando o drama de vingança 'A Glória', lançado em 2022. Entre sua estreia em 5 de junho e 28 de junho, a série acumulou 46,6 milhões de visualizações.", "titulo_pt": "Ensine-Lhe uma Lição se torna quinta série coreana mais vista no Netflix", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}], "cultura__eventos": [], "sociedade": [{"id": 32444, "titulo": "Brasileiro busca ajuda para encontrar pai sob escombros na Venezuela", "url": "https://www.cnnbrasil.com.br/internacional/brasileiro-busca-ajuda-para-encontrar-pai-sob-escombros-na-venezuela/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-03T02:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Daniel Medina está buscando ajuda para localizar Félix Tovar, que desapareceu após os terremotos que atingiram a Venezuela na última quarta-feira (24).", "titulo_pt": "Brasileiro busca ajuda para encontrar pai sob escombros na Venezuela", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 31392, "titulo": "Bebê de 2 anos morre após 4 consultas e família questiona ação médica", "url": "https://www.metropoles.com/sao-paulo/bebe-de-2-anos-morre-apos-4-consultas-e-familia-questiona-acao-medica", "fonte_id": "metropoles", "data_pub": "2026-07-03T01:50:00Z", "idioma": "pt", "provavel_dupli al/medicos-transformam-mcdonalds-na-venezuela-em-hospital-apos-terremoto/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-03T00:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Médicos transformaram um restaurante McDonald’s na Venezuela em um centro médico após um terremoto. O local já atendeu diversos tipos de pacientes, incluindo casos de cesarianas e fraturas, bem como pessoas com hipertensão e desnutrição.", "titulo_pt": "Médicos transformam McDonald’s na Venezuela em hospital após terremoto", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 31970, "titulo": "Relief efforts shift as Venezuela quake survivors seek aid", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/3/relief-efforts-shift-as-venezuela-quake-survivors-seek-aid?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-03T00:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As esforços de ajuda emergencial estão se concentrando na estado de La Guaira, Venezuela, com estações de auxílio distribuindo alimentos aos sobreviventes do terremoto.", "titulo_pt": "Esforços de ajuda mudam foco para a distribuição de alimentos em La Guaira, Venezuela", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 31429, "titulo": "Deputada do PT propõe auxílio para que vítimas de violência doméstica ‘reconstruam’ vidas", "url": "https://veja.abril.com.br/politica/deputada-do-pt-propoe-auxilio-para-que-vitimas-de-violencia-domestica-reconstruam-vidas/", "fonte_id": "veja", "data_pub": "2026-07-02T22:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma deputada do PT propôs um auxílio financeiro de 5 mil reais para vítimas de violência doméstica, com o objetivo de ajudá-las a reconstruir suas vidas. O benefício poderia ser usado para comprar móveis, eletrodomésticos e itens essenciais necessários para a montagem de uma nova moradia.", "titulo_pt": "Deputada do PT sugere auxílio para vítimas de violência do tos", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 31553, "titulo": "O jogador argentino que perdeu a mulher e os filhos em terremotos na Venezuela", "url": "https://www.bbc.com/portuguese/articles/cd95v04jnqdo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-02T18:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O jogador argentino Lucas Trejo perdeu a esposa e os dois filhos durante terremotos na Venezuela. Eles ficaram presos sob os escombros de seu prédio em La Guaira.", "titulo_pt": "Jogador argentino perde família em desastres na Venezuela", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 31551, "titulo": "Venezuelano é resgatado vivo após 8 dias sob escombros de terremoto: 'Resgate tecnicamente mais difícil'", "url": "https://www.bbc.com/portuguese/articles/ckg7ed8y3x6o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-02T18:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um venezuelano chamado Hernán Gil foi resgatado vivo após ficar preso sob os escombros de um edifício de estacionamento por oito dias. Durante o resgate, ele orientou os socorristas e brincava com eles.", "titulo_pt": "Venezuelano é resgatado vivo após 8 dias sob escombros de terremoto", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 31990, "titulo": "‘Miracle’: Trapped man rescued eight days after Venezuela earthquakes", "url": "https://www.aljazeera.com/news/2026/7/2/miracle-trapped-man-rescued-eight-days-after-venezuela-earthquakes?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-02T18:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um homem foi resgatado oito dias após os terremotos na Venezuela, enquanto a resposta humanitária se concentra em pelo menos 2.295 mortos e 13.000 desabrigados.", "titulo_pt": "Milagre: Homem é resgatado após oito dias dos terremotos na Venezuela", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 31443, "titulo": "J&F mobiliza operação humanitária para vítimas na Venezuela", "url": "https://www.congressoemfoco.com.br/noticia/120188/j-f-mobiliza-operacao-humanitaria-para-vitimas-na-venezuela", "fonte_id": "congresso_em_foco", "data_pub": "2026-07-02T15:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O grupo J&F está mobilizando uma operação humanitária para vítimas na Venezuela, enviando mais de 50 toneladas de mantimentos por meio de três aviões cargueiros.", "titulo_pt": "J&F mobiliza operação humanitária para vítimas na Venezuela", "veiculo": "Congresso em Foco", "pais": "Brasil", "classe": "B"}, {"id": 31748, "titulo": "Australia’s median wealth falls almost 7% since 2020 despite the rich getting richer, report says", "url": "https://www.theguardian.com/australia-news/2026/jul/03/australia-median-wealth-falls-but-rich-getting-richer", "fonte_id": "guardian_world", "data_pub": "2026-07-02T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um relatório da Suíça Bank UBS revela que a mediana de riqueza na Austrália caiu quase 7% desde 2020, enquanto o número de milionários no país aumentou em mais de 25.000. O relatório indica um crescimento da disparidade entre os mais ricos e a população geral.", "titulo_pt": "Riqueza média na Austrália cai 7% desde 2020, enquanto milionários aumentam", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 32496, "titulo": "Health committee nears risk-based overhaul of medical device rules", "url": "https://www.euractiv.com/news/new-health-committee-backs-risk-based-overhaul-of-medical-device-rules/", "fonte_id": "euractiv", "data_pub": "2026-07-02T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A comissão de saúde está próxima de aprovar uma revisão baseada no risco das regras sobre dispositivos médicos. A indústria elogiou o projeto-piloto por reconhecer os desafios reais eio-dia por causa do risco de carcinogênico", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 31868, "titulo": "French PM Lecornu warns of 'fairly severe' wildfires arriving unusually early", "url": "https://www.lemonde.fr/en/environment/article/2026/07/03/french-pm-lecornu-warns-of-fairly-severe-wildfires-arriving-unusually-early_6755097_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-02T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O primeiro-ministro francês, Lecornu, advertiu que a temporada de incêndios florestais está chegando com pelo menos duas semanas antecipadas em relação ao normal. Diante da vegetação já extremamente seca, ele expressou preocupações sobre as 'capacidades' dos recursos de combate a incêndios.", "titulo_pt": "Primeiro-ministro francês avisa que temporada de incêndios florestais chegou com antecedência", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 31461, "titulo": "Venezuela: sobrevivente do terremoto é resgatado após passar mais de oito dias sob os escombros", "url": "https://www.brasildefato.com.br/2026/07/02/venezuela-sobrevivente-do-terremoto-e-resgatado-apos-passar-mais-de-oito-dias-sob-os-escombros/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-02T22:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um homem de 47 anos, Hernán Alberto Gil Flores, que trabalhava como segurança no shopping Galerías Playa Grande, foi resgatado após passar mais de oito dias sob os escombros. Este resgate foi considerado um dos mais complexos e emocionantes desde os terremotos de magnitude 7,2 e 7,5 que atingiram a Venezuela recentemente.", "titulo_pt": "Venezuela: sobrevivente do terremoto é resgatado após passar mais de oito dias sob os escombros", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 31494, "titulo": "Onda de calor na França: mais de 90 pessoas morreram afogadas desde 19 de junho, diz autoridade", "url": "https://exame.com/mundo/onda-de-calor-na-franca-mais-de-90-pessoas-morreram-afogadas-desde-19-de-junho-diz-autoridade/", "fonte_id": "exame", "data_pub": "2026-07-02T18:57:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Mais de 90 pessoas morreram afogadas na França desde o dia 19 de junho, segundo a autoridade local. As autoridades observaram que o número de casos decresceu acompanhando a diminuição das temperaturas nas últimas semanas.", "titulo_pt": "Onda de calor na França: mais de 90 pessoas morreram afogadas desde 19 de junho, diz autoridade", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 31280, "titulo": "Google emite 18% mais carbono com IA e fala em meta climática mais desafiadora do que nunca", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/google-emite-18-mais-carbono-com-ia-e-fala-em-meta-climatica-mais-desafiadora-do-que-nunca.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-02T16:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As emissões de gases de efeito estufa do Google aumentaram 18% em 2025, influenciadas pelo avanço da inteligência artificial e pela maior demanda por energia nos data centers. Este incremento é o maior registrado desde 2022.", "titulo_pt": "Google registra aumento de 18% nas emissões de carbono com IA e fala em meta climática mais desafiadora", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 31590, "titulo": "Amazônia urbana e adaptação climática", "url": "https://www.jota.info/opiniao-e-analise/colunas/em-clima-de-justica/amazonia-urbana-e-adaptacao-climatica", "fonte_id": "jota", "data_pub": "2026-07-02T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto aborda os desafios relacionados à integração do tema da adaptação climática na elaboração de instrumentos territoriais municipais no contexto da Amazônia urbana.", "titulo_pt": "Amazônia urbana e adaptação climática", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 32498, "titulo": "Germany to rush out basic smart meters as electricity grid buckles", "url": "https://www.euractiv.com/news/germany-to-rush-out-basic-smart-meters-as-electricity-grid-buckles/", "fonte_id": "euractiv", "data_pub": "2026-07-02T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Alemanha está pressionada a lançar rapidamente medidores inteligentes básicos devido ao esforço de expansão da rede elétrica. O governo anterior preferiu modelos mais complexos, o que resultou em uma baixa adesão após uma década.", "titulo_pt": "Alemanha deve apressar lançamento de medidores inteligentes básicos devido à sobrecarga na rede elétrica", "veiculo": "Euractiv", "pais": "Europa", "classe": "B"}, {"id": 30545, "titulo": "Onda de calor na França: Bombeiros combatem incêndios no sul do país", "url": "https://www.cnnbrasil.com.br/internacional/onda-de-calor-na-franca-bombeiros-combatem-incendios-no-sul-do-pais/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-02T12:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Temperaturas extremas no sul da França estão causando incêndios, e autoridades de saúde estimam que essas condições podem ter resultado em cerca de mil mortes no país.", "titulo_pt": "Onda de calor na França: Bombeiros combatem incêndios no sul do país", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 31169, "titulo": "Q&A: Where do the UN secretary general candidates stand on climate change?", "url": "https://www.carbonbrief.org/qa-where-do-the-un-secretary-general-candidates-stand-on-climate-change/", "fonte_id": "carbon_brief", "data_pub": "2026-07-02T12:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Candidatos estão sendo nomeados para assumir o cargo de Secretário-Geral da ONU, após António Guterres. Este artigo discute onde os candidatos se posicionam em relação ao clima.", "titulo_pt": "Perguntas e Respostas: Em Qual Posição Estão os Candidatos ao Cargo de Secretário-Geral da ONU em Relatione ao Clima?", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 31951, "titulo": "11-year-old boy dies from rabies in Canada after waking up to a bat on his face", "url": "http://www.euronews.com/2026/07/02/11-year-old-boy-dies-from-rabies-in-canada-after-waking-up-to-a-bat-on-his-face", "fonte_id": "euronews", "data_pub": "2026-07-02T11:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um menino de 11 anos morreu por raiva no Canadá após acordar com uma veiga em seu rosto. A raiva é uma infecção rara mas letal, geralmente transmitida por mordeduras ou arranhões de animais infectados, sendo praticamente sempre fatal quando os sintomas aparecem.", "titulo_pt": "Menino de 11 anos morre de raiva no Canadá após acidente com veiga", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 30489, "titulo": "Pantanal perdeu 80% da água superficial em quatro décadas, aponta novo estudo", "url": "https://veja.abril.com.br/agenda-verde/pantanal-perdeu-80-da-agua-superficial-em-quatro-decadas-aponta-novo-estudo/", "fonte_id": "veja", "data_pub": "2026-07-02T11:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um novo estudo da Unesp, utilizando imagens de satélite, revela que o Pantanal perdeu 80% da água superficial em quatro décadas. A pesquisa mostra uma redução significativa nos corpos d'água do bioma.", "titulo_pt": "Pantanal perdeu 80% da água superficial em quatro décadas, aponta novo estudo", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 31953, "titulo": "Fast-moving wildfire spreads across southern France", "url": "http://www.euronews.com/video/2026/07/02/fast-moving-wildfire-spreads-across-southern-france", "fonte_id": "euronews", "data_pub": "2026-07-02T11:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Incêndios florestais se espalharam rapidamente pelo sul da França, após chamas que originaram no Hérault se propagarem e destruírem mais de 800 hectares. Bombeiros estão lutando para controlar o fogo em Aude.", "titulo_pt": "Incêndio florestal avança rapidamente pelo sul da França", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 32505, "titulo": "MEPs recommend 10% biodiversity spending in EU budget", "url": "https://www.euractiv.com/news/meps-recommend-10-biodiversity-spending-in-eu-budget/", "fonte_id": "euractiv", "data_pub": "2026-07-02T10:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os parlamentares europeus recomendaram que 10% do orçamento da União Europeia seja destinado à biodiversidade. O comitê de meio ambiente busca garantir financiamento para a restauração da natureza.", "titulo_pt": "Parlamentares europeus recomendam 10% de investimento em biodiversidade no orçamento da UE", "veiculo": "Euractiv", "pais": "Europa", "classe": "B"}, {"id": 31073, "titulo": "In heatwave-baked France, ‘madness’ and chaos grip air-conditioner shoppers", "url": "https://www.scmp.com/news/world/europe/article/3359185/heatwave-baked-france-madness-and-chaos-grip-air-conditioner-shoppers?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-02T09:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em Paris e arredores, centenas de pessoas invadiram supermercados Lidl na quinta-feira à procura de condicionadores de ar baratos antes da próxima onda de calor. A situação se tornou caótica com briga e discussões entre os compradores.", "titulo_pt": "Em Paris, loucura e caos tomam conta dos compradores de condicionadores de ar em supermercados", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 32607, "titulo": "Christian Brothers kept nine child abusers in religious order due to Gospel imperative to help ‘the needy’, court documents reveal", "url": "https://www.theguardian.com/world/2026/j
