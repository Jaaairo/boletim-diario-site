<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: none; border: 1px solid var(--border); border-radius: 4px;
             color: var(--texto2); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { border-color: var(--acento); color: var(--texto); }
  .tts-bar[hidden] { display: none; }
</style>
</head>

</div>

<script>
const D = {"gerado_em": "04/07/2026 12:09", "stats": {"noticias_novas": 156, "resumos_gerados": 204}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "As regras do período de defeso eleitoral entram em vigor neste sábado, proibindo o uso da máquina pública para fins políticos. O Supremo Tribunal Federal (STF) retoma suas sessões plenárias no dia 3 de agosto, discutindo temas como a regulamentação dos aplicativos de transporte e os jogos de azar. Segundo uma pesquisa do Datafolha, 65% dos entrevistados consideram que depender menos do governo melhora a qualidade de vida. O metrô de São Paulo inaugura a estação Água Branca, a mais profunda da América Latina, enquanto o estado autoriza um concurso para 4.000 vagas de aluno-soldado da Polícia Militar.", "mundo": "O funeral do antigo Líder Supremo iraniano Ayatollah Ali Khamenei, que governou a República Islâmica do Irã por 37 anos, reuniu centenas de milhares de pessoas em Teerã. De acordo com Tara Kangarlou, jornalista especializada em assuntos globais, o público era formado principalmente por facções radicais da sociedade iraniana. Em outro evento, Donald Trump, durante um discurso no Mount Rushmore, descreveu seus oponentes políticos como comunistas ímpios e malignos, quatro meses antes das eleições intermediárias nos Estados Unidos. A Ucrânia atingiu um terminal de petróleo em São Petersburgo, capital russa, enquanto a Rússia afirma ter tomado o controle da cidade estratégica de Kostiantynivka no leste do país ucraniano, embora o presidente Volodymyr Zelenski negue essas afirmações. No Reino Unido, o Dia da Independência dos Estados Unidos é comemorado de forma discreta, com instituições culturais marcando o dia e o Rei Carlos III emitindo um comunicado. Além disso, a corrida do Tour de France começou em Barcelona com uma atmosfera festiva.\n\nA Rússia está recrutando estudantes para manter seus esforços militares na Ucrânia, em um conflito que já dura cinco anos. O Irã iniciou seis dias de funeral oficial para o ex-Líder Supremo Ali Khamenei, com milhões esperados a comparecerem e líderes estrangeiros chegando ao país. A China enviou uma nova força de guarda-costas para águas ao leste de Taiwan, em um movimento que ocorre após pedidos de cautela dos EUA. O funeral do ex-Líder Supremo Khamenei reuniu milhares de pessoas em Teerã, onde gritos de 'morte à América' e 'vingança' foram ouvidos. As tensões na região sul do Líbano continuam após um acordo de cessar-fogo entre Israel e o Líbano, apoiado pelos EUA, que prevê a desarmamentização do grupo Hezbollah e uma retirada gradual israelense do sul do país.", "economia": "A economia brasileira enfrenta diversos desafios e oportunidades, como destacam os artigos. O Ministério da Economia, conforme Durigan, não é diretamente responsável pelos juros elevados; ele destaca a necessidade de ajuste fiscal para controlar a dívida pública. A alta dos juros prejudica o cenário atual. No mercado de capitais, Carolina Zang analisou a última reforma na Comissão Nacional do Mercado de Valores Mobiliários (CNV), destacando prazos mais curtos e facilitação para pequenas empresas. Sobre o mercado financeiro, a bolsa brasileira registrou uma baixa em junho, com o Ibovespa caindo 1%. As criptomoedas também sofreram, refletindo pressões inflacionárias e tensões geopolíticas. O cenário econômico também abrange setores como o de café, que atingiu 52% da safra para a temporada 2026/27, beneficiado por condições climáticas favoráveis.", "tecnologia": "O reboot do Batman nos cinemas está aguardado com expectativa, especialmente após o sucesso do filme Superman (2025), dirigido por James Gunn. No entanto, a tecnologia também tem se destacado em diversos setores, como no desenvolvimento de chips microscópicos que podem modelar estruturas cerebrais complexas, potencialmente transformando diagnósticos e tratamentos para condições como Alzheimer. A empresa Inteligência Artificial (IA) Wake planeja expandir seu mercado e aumentar sua base de clientes em 20% até 2026, com a ajuda da tecnologia. Além disso, o iPhone 17 Pro Max de 512 GB está disponível com um desconto agressivo na Amazon para assinantes do Amazon Prime, enquanto a Samsung oferece combos de TV e soundbar em promoção. A comunidade de fanfiction enfrenta uma nova movimentação que visa identificar autores usando inteligência artificial gerativa, o que pode afetar escritores independentemente da sua posição no ecossistema literário.", "ciencia": "A ciência está em constante movimento com diversos avanços e descobertas. Em primeiro lugar, um estudo publicado no Phys.org revela que as inundações extremas, que eram raras nas comunidades costeiras, agora ocorrem 12 vezes mais frequentemente devido ao aumento dos níveis do mar causado pelo aquecimento global. Isso impacta diretamente o planejamento para enfrentar as inundações e a infraestrutura costeira. Em seguida, cientistas no México identificaram um novo fóssil de axolotl chamado Ambystoma quetzalcoatli, sendo o primeiro fóssil de salamandrinho formalmente identificado no país. Além disso, pesquisadores do Phys.org descobriram que leveduras estavam crescendo no estômago do mummificado Oetzi, o Iceman, há milhares de anos, permitindo a produção de um pão de semente-sourdo. Em outro desenvolvimento, cientistas costarriquenhos podem ter encontrado uma nova espécie de peixe fantasma nas águas do Pacífico próximas a Cabo Blanco e Cano Island, conforme relatos no Phys.org e Science Magazine. Estes avanços científicos abrangem desde fenômenos climáticos até novas espécies em risco, destacando o papel crucial da ciência na compreensão do mundo ao nosso redor.", "cultura": "Dustin Hoffman, vencedor de dois Oscars, recebeu o Crystal Globe por sua contribuição artística para o cinema mundial durante um festival. Apesar dos Estados Unidos estarem divididos, como na Guerra do Vietnã, Hoffman brincou sobre seu próprio autoconhecimento. O livro 'Poesia completa', traduzido pelo brasileiro Frederico Lourenço, reúne a obra de Horácio em português e latim, formando uma edição bilíngue. O Papa Francisco visitou a ilha de Lampedusa para chamar atenção sobre os direitos dos migrantes na Europa, coincidindo com políticas anti-migratórias nos Estados Unidos e na União Europeia. Além disso, o documentário sobre Woody Guthrie continua a inspirar novas gerações, conectando sua vida à luta social contemporânea. O ator e cantor Donald Trump afirmou que transformou 'Y.M.C.A.', do Village People, em um grande sucesso novamente, décadas após seu lançamento original em 1978, como uma homenagem ao vocalista Victor Willis.", "sociedade": "A Polícia Militar do Distrito Federal chamou o esquadrão antibombas após suspeitar que explosivos tenham sido deixados na 33ª Delegacia de Polícia, em Brasília. Um levantamento do Datafolha revelou que 40% dos brasileiros atribuem a pobreza à falta de vontade de trabalhar, o maior índice registrado desde o início da série histórica. O cantor Netinho desabafou sobre um momento difícil do seu tratamento contra o câncer nas redes sociais. O sistema de saúde no Iêmen está enfraquecido devido à saída de profissionais qualificados em busca de melhores oportunidades e segurança no exterior. A histórica loja La Favorita, com 130 anos em Rosário, encerrou suas operações por causa do fechamento forçado. O Conselho Nacional de Justiça recebe inscrições para a 4ª edição do Prêmio Justiça & Saúde, destinando prêmios a projetos que visem reduzir a judicialização e promover a resolução de conflitos no setor de saúde.", "meio_ambiente": "O Great Barrier Reef, um importante destino turístico na Austrália, evitou ser incluído na lista de patrimônios em perigo pela Unesco, apesar da preocupação máxima expressa sobre o bleaching de massa de corais e os impactos do aquecimento global. Em um dos eventos mais quentes recentes, Sydney registrou o mês de junho mais quente desde 1859 com uma temperatura média de 16,1°C, reforçando as preocupações sobre o aquecimento global. No Brasil, a região metropolitana de São Paulo declarou um alerta ambiental para este sábado devido às condições de ventilação previstas na bacia do Rio Santiago. Paralelamente, o Rio Grande do Sul enfrenta a maior crise hídrica em 70 anos, com 88% das casas impactadas pelas enchentes. No exterior, uma onda de calor perigosa interrompeu as celebrações do Dia da Independência nos Estados Unidos, enquanto incêndios florestais no nordeste da Espanha e problemas ambientais na Itália também são destaque nas notícias internacionais sobre o meio ambiente.", "direitos_humanos": "A China implementou uma nova legislação que entrou em vigor no dia 1º de junho, proibindo atos que 'minem a unidade étnica' e exigindo lealdade ao Partido Comunista Chinês. Essa lei visa pressionar as minorias etnícnicas do país, conforme análise publicada pelo jornal brasileiro CNN Brasil. Em outro desenvolvimento, o Papa Francisco encorajou a Europa e os Estados Unidos a acolherem e ajudarem migrantes durante uma viagem simbólica à ilha italiana de Lampedusa. Além disso, em 30 de maio, a cidade de El Obeid, no Sudão, está sendo atacada por drones das forças armadas do país e dos paramilitares RSF, resultando em mais de 20 mortes entre estudantes e civis nos últimos ataques. Segundo relatos do Japan Times, as violações aos direitos humanos na Irã continuam alarmantes, com relatos de tortura e prisões arbitrárias."}, "resumo_do_dia": {"politica_nacional": [{"id": 35137, "titulo": "Lei cria rota turística de cidades coloniais de Alagoas", "url": "https://www.poder360.com.br/poder-cultura/lei-cria-rota-turistica-de-cidades-coloniais-de-alagoas/", "fonte_id": "poder360", "data_pub": "2026-07-04T14:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A lei estabeleceu uma rota turística que passa pelas cidades coloniais de Alagoas, incluindo Marechal Deodoro, Penedo, Piranhas, Delmiro Gouveia, União dos Palmares, Porto Calvo e Água Branca.", "titulo_pt": "Lei cria rota turística para cidades coloniais de Alagoas", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35138, "titulo": "Regras do período de defeso eleitoral passam a valer neste sábado", "url": "https://www.poder360.com.br/poder-eleicoes/regras-do-periodo-de-defeso-eleitoral-passam-a-valer-neste-sabado/", "fonte_id": "poder360", "data_pub": "2026-07-04T14:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Começam a valer as regras do período de defeso eleitoral, que proíbe o uso da máquina pública para benefício político. Este período se estende por 3 meses antes do primeiro turno das eleições.", "titulo_pt": "Regras do período de defeso eleitoral passam a valer neste sábado", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35176, "titulo": "STF pauta uberização, mandato-tampão do RJ e jogos de azar para pós-recesso", "url": "https://www.cnnbrasil.com.br/politica/stf-pauta-uberizacao-mandato-tampao-do-rj-e-jogos-de-azar-para-pos-recesso/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T14:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal (STF) retoma suas sessões plenárias no dia 3 de agosto com uma pauta que inclui temas como uberização, mandato-tampão do Rio de Janeiro e jogos de azar. As discussões sobre esses assuntos ocorrerão após o recesso judicial.", "titulo_pt": "STF retoma sessões plenárias em agosto com pauta que inclui uberização, mandato-tampão do RJ e jogos de azar", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 35171, "titulo": "Turquia barra cruzeiro LGBTQ+ e obriga mudança de rota antes de chegada ao país", "url": "https://www.infomoney.com.br/mundo/turquia-barra-cruzeiro-lgbtq/", "fonte_id": "infomoney", "data_pub": "2026-07-04T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo turco impôs a um cruzeiro LGBTQ+ que mudasse sua rota antes de chegar ao país, justificando a decisão para preservar 'valores familiares' e 'padrões morais'.", "titulo_pt": "Turquia barra cruzeiro LGBTQ+ e obriga mudança de rota antes de chegada", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 35140, "titulo": "TSE impõe restrições de publicidade a partir deste sábado", "url": "https://www.poder360.com.br/poder-eleicoes/tse-impoe-restricoes-de-publicidade-a-partir-deste-sabado/", "fonte_id": "poder360", "data_pub": "2026-07-04T13:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As regras do Tribunal Superior Eleitoral (TSE) proíbem a propaganda de obras, a presença de candidatos em inaugurações e o uso de estruturas públicas antes das eleições. O 1º turno das eleições está previsto para o dia 4 de outubro.", "titulo_pt": "TSE impõe restrições de publicidade a partir deste sábado", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35141, "titulo": "Pandemia de covid é tema de exposição no Rio", "url": "https://www.poder360.com.br/poder-brasil/pandemia-de-covid-e-tema-de-exposicao-no-rio/", "fonte_id": "poder360", "data_pub": "2026-07-04T13:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A exposição sobre a pandemia de COVID-19 está aberta ao público desde 1º de julho de 2026 e permanecerá até abril de 2027.", "titulo_pt": "Pandemia de COVID-19 é tema de exposição no Rio", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 34932, "titulo": "Queda nas mortes por meningite desacelera e ameaça meta da OMS", "url": "https://www.poder360.com.br/poder-saude/queda-nas-mortes-por-meningite-desacelera-e-ameaca-meta-da-oms/", "fonte_id": "poder360", "data_pub": "2026-07-04T13:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A taxa de redução nas mortes por meningite desacelerou em 2023, com 259 mil óbitos registrados. Isso não atinge a meta da OMS de reduzir em 70% os casos fatais até 2030.", "titulo_pt": "Desaceleração nas mortes por meningite ameaça meta da OMS", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 34966, "titulo": "Datafolha: 65% consideram que depender menos do governo melhora a vida", "url": "https://www.cnnbrasil.com.br/politica/datafolha-65-consideram-que-depender-menos-do-governo-melhora-a-vida/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T13:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Datafolha realizou uma pesquisa entre os dias 17 e 18 de junho, entrevistando 2.004 eleitores em 139 municípios, e constatou que 65% dos entrevistados consideram que depender menos do governo melhora a qualidade de vida.", "titulo_pt": "65% dos brasileiros acreditam que reduzir dependência do governo melhoraria a vida", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 34933, "titulo": "Prática de atividade física no mundo está estagnada há 20 anos", "url": "https://www.poder360.com.br/poder-saude/pratica-de-atividade-fisica-no-mundo-esta-estagnada-ha-20-anos/", "fonte_id": "poder360", "data_pub": "2026-07-04T13:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A prática de atividade física no mundo permanece estagnada há duas décadas, apesar das políticas de incentivo existentes. Falta de metas claras e financiamento insuficiente mantêm o sedentarismo em níveis elevados.", "titulo_pt": "Prática de atividade física no mundo está estagnada há 20 anos", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 34935, "titulo": "Flávio ganhou mais seguidores que Michelle em junho", "url": "https://www.poder360.com.br/poder-eleicoes/flavio-ganhou-mais-seguidores-que-michelle-em-junho/", "fonte_id": "poder360", "data_pub": "2026-07-04T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em junho, Flávio Bolsonaro ganhou mais seguidores no Instagram que Michelle Bolsonaro, com 190 mil perfis se tornando seguidores dele contra 73 mil para a ex-primeira-dama. Ambos tiveram atritos públicos nesse período.", "titulo_pt": "Flávio ganhou mais seguidores que Michelle em junho", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 34936, "titulo": "Congressistas e ex-Caixa estão entre as cotadas para vice de Flávio", "url": "https://www.poder360.com.br/poder-eleicoes/congressistas-e-ex-caixa-estao-entre-as-cotadas-para-vice-de-flavio/", "fonte_id": "poder360", "data_pub": "2026-07-04T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Membros do Congresso e ex-executivos da Caixa são considerados possíveis candidatos para o cargo de vice-governador ao lado de Flávio. A pré-campanha busca atrair mais mulheres, um grupo no qual Lula tem uma vantagem.", "titulo_pt": "Congressistas e ex-Caixa são cotados para vice de Flávio; campanha alvo do eleitorado feminino", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 34958, "titulo": "Redução da maioridade penal pode terminar em embate no STF", "url": "https://veja.abril.com.br/brasil/reducao-da-maioridade-penal-pode-terminar-em-embate-no-stf/", "fonte_id": "veja", "data_pub": "2026-07-04T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Proposta de Emenda à Constituição (PEC) que reduz a maioridade penal foi aprovada na Comissão de Constituição e Justiça (CCJ) da Câmara dos Deputados no início de junho. O texto agora precisa ser analisado por uma comissão especial para poder avançar no processo legislativo.", "titulo_pt": "Redução da maioridade penal pode enfrentar novo desafio no STF", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 34937, "titulo": "Dormir com luz acesa pode aumentar o risco de doenças cardíacas", "url": "https://www.poder360.com.br/poder-saude/dormir-com-luz-acesa-pode-aumentar-o-risco-de-doencas-cardiacas/", "fonte_id": "poder360", "data_pub": "2026-07-04T12:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo com quase 89.000 pessoas mostrou que a exposição à luz noturna interfere no ritmo circadiano. Dormir com luz acesa pode aumentar o risco de doenças cardíacas.", "titulo_pt": "Dormir com luz acesa pode aumentar o risco de doenças cardíacas", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 34979, "titulo": "Lei Mariana Ferrer e o futuro do direitos das vítimas", "url": "https://www.congressoemfoco.com.br/artigo/120234/lei-mariana-ferrer-e-o-futuro-do-direitos-das-vitimas", "fonte_id": "congresso_em_foco", "data_pub": "2026-07-04T12:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A lei Mariana Ferrer estabelece diretrizes para a proteção das vítimas durante audiências, trazendo avanços e desafios na implementação dessa norma. Ela visa mitigar constrangimentos enfrentados pelas vítimas em processos judiciais.", "titulo_pt": "Lei Mariana Ferrer e o futuro dos direitos das vítimas", "veiculo": "Congresso em Foco", "pais": "Brasil", "classe": "B"}, {"id": 34931, "titulo": "A disputa entre JHC e Renan Filho em Alagoas, segundo nova pesquisa", "url": "https://www.cartacapital.com.br/politica/a-disputa-entre-jhc-e-renan-filho-em-alagoas-segundo-nova-pesquisa/", "fonte_id": "cartacapital", "data_pub": "2026-07-04T12:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Paraná Pesquisas realizou uma pesquisa entre 28 de junho e 1º de julho com 1.400 eleitores alagoanos sobre a disputa entre JHC e Renan Filho.", "titulo_pt": "A disputa entre JHC e Renan Filho em Alagoas, segundo nova pesquisa", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 34938, "titulo": "Entenda como SP monitora por satélite e IA os rios Pinheiros e Tietê", "url": "https://www.poder360.com.br/poder-tech/entenda-como-sp-monitora-por-satelite-e-ia-os-rios-pinheiros-e-tiete/", "fonte_id": "poder360", "data_pub": "2026-07-04T12:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O sistema utiliza imagens do satélite e inteligência artificial para analisar a superfície dos rios Pinheiros e Tietê, monitorando o crescimento de algas nos reservatórios.", "titulo_pt": "Entenda como São Paulo monitora por satélite e IA os rios Pinheiros e Tietê", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 35273, "titulo": "Germany news: AfD elects leaders amid massive protests", "url": "https://www.dw.com/en/germany-news-afd-elects-leaders-amid-massive-protests/live-77830605?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-04T14:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Delegados do partido de extrema-direita AfD estão se reunindo em Erfurt enquanto centenas de milhares de pessoas protestam contra o evento. Simultaneamente, Jürgen Klopp expressou disposição para assumir o cargo de técnico da seleção nacional de futebol alemã.", "titulo_pt": "Notícias da Alemanha: AfD elege lideranças em meio a grandes manifestações", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 35189, "titulo": "Rússia recorre a estudantes para repor as crescentes baixas na Ucrânia", "url": "https://www.bbc.com/portuguese/articles/cvgdzjr1180o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-04T14:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Rússia está recrutando estudantes para assinar contratos com o Exército durante um quinto ano consecutivo de guerra na Ucrânia, em que o governo busca manter os esforços militares.", "titulo_pt": "Rússia recruta estudantes para reforçar as forças no conflito ucraniano", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 35278, "titulo": "Japan pledges US$3 million for Kazakhstan’s Caspian Sea water decline", "url": "https://www.scmp.com/news/asia/east-asia/article/3359435/japan-pledges-us3-million-kazakhstans-caspian-sea-water-decline?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T14:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Japão prometeu um financiamento de 465 milhões de ienes (US$3 milhões) ao Programa das Nações Unidas para o Desenvolvimento (PNUD) para apoiar esforços da Kazakistão em relação à queda do nível d'água no Mar Cáspio, afetada pelo aquecimento global. Sob a iniciativa, o Japão busca promover a cooperação entre os países limítrofes na gestão dos recursos hídricos e melhorar os sistemas de monitoramento.", "titulo_pt": "Japão promete US$3 milhões para combater a diminuição do nível d'água no Mar Cáspio, na Caucásia", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 35267, "titulo": "China's military promotes 2 new generals after anti-corruption purge thins ranks", "url": "https://www.npr.org/2026/07/04/g-s1-131994/chinas-military-promotes-2-new-generals-after-anti-corruption-purge-thins-ranks", "fonte_id": "npr_news", "data_pub": "2026-07-04T14:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A China promoveu dois novos generais após uma purga anti-corrupção que reduziu o número de oficiais. A mudança visa assegurar a lealdade do exército ao Partido Comunista e seu líder, Xi Jinping.", "titulo_pt": "China promove dois novos generais após purga anti-corrupção", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 35276, "titulo": "Iran begins six-day state funeral for Ali Khamenei", "url": "https://www.middleeasteye.net/news/iran-begins-six-day-state-funeral-ali-khamenei", "fonte_id": "middle_east_eye", "data_pub": "2026-07-04T14:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Irã começou seis dias de funeral oficial para o ex-Líder Supremo Ali Khamenei, com milhões esperados a comparecerem às cerimônias em Teerã. Líderes estrangeiros também estão chegando ao país.", "titulo_pt": "Irã inicia seis dias de funeral oficial para Ali Khamenei", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 35157, "titulo": "Petistas e bolsonaristas investem em memes contra Michelle Bolsonaro", "url": "https://www.metropoles.com/colunas/grande-angular/petistas-e-bolsonaristas-investem-em-memes-contra-michelle", "fonte_id": "metropoles", "data_pub": "2026-07-04T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Petistas e bolsonaristas produzem memes associando Michelle Bolsonaro ao PT após um vídeo contra Flávio. O conteúdo envolve o uso de imagens manipuladas para criticar a ex-primeira dama.", "titulo_pt": "Petistas e bolsonaristas investem em memes contra Michelle Bolsonaro", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35229, "titulo": "The funeral comes amid fraught, sluggish U.S.-Iran peace talks.", "url": "https://www.nytimes.com/live/2026/07/04/world/iran-funeral-ayatollah-khamenei/the-funeral-comes-amid-fraught-sluggish-us-iran-peace-talks", "fonte_id": "nyt_world", "data_pub": "2026-07-04T13:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O funeral ocorre em meio a negociações entre Estados Unidos e Irã que são tensoas e lentas.", "titulo_pt": "O funeral acontece durante negociações tensas e lentas entre EUA e Irã", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 35136, "titulo": "Ucrânia nega que russos tenham tomado cidade de Kostiantynivka", "url": "https://www.cartacapital.com.br/mundo/ucrania-nega-que-russos-tenham-tomado-cidade-de-kostiantynivka/", "fonte_id": "cartacapital", "data_pub": "2026-07-04T13:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Ucrânia nega que as forças russas tenham conquistado a cidade de Kostiantynivka. A batalha pela cidade, com uma população anterior de aproximadamente 78.000 habitantes, tem sido travada desde o final de 2025.", "titulo_pt": "Ucrânia nega que russos tenham tomado a cidade de Kostiantynivka", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 35134, "titulo": "No monte Rushmore, Trump chama opositores de 'malignos' e 'comunistas'", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/07/no-monte-rushmore-trump-chama-opositores-de-malignos-e-comunistas.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-07-04T13:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Quatro meses antes das eleições intermediárias, Trump utilizou um evento no monte Rushmore para descrever seus oponentes políticos como comunistas ímpios e malignos.", "titulo_pt": "Em monte Rushmore, Trump chama opositores de 'ímpios' e 'malignos'", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 35230, "titulo": "In Britain, July 4 Is Mostly Just a Saturday", "url": "https://www.nytimes.com/2026/07/04/world/europe/uk-july-fourth-us-independence.html", "fonte_id": "nyt_world", "data_pub": "2026-07-04T13:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "No Reino Unido, o Dia da Independência dos Estados Unidos não é muito importante para a imaginação pública. No entanto, instituições culturais marcaram o dia e o Rei Carlos III emitiu um comunicado.", "titulo_pt": "Em Londres, 4 de julho é basicamente apenas um sábado", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 35277, "titulo": "Il principe Harry andrà a Londra senza Meghan e i bambini", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/04/il-principe-harry-andra-a-londra-senza-meghan-e-i-bambini_0c68ead4-1c2a-4e48-99f3-20fd78087df2.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-04T13:39:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Prince Harry irá a Londres sem Meghan e os filhos, segundo Sky News. Não se sabe se outros membros da família acompanhá-lo-ão em outras ocasiões.", "titulo_pt": "Príncipe Harry viajará para Londres sem Meghan e os filhos", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 35279, "titulo": "Lebanon’s president urges US solidarity as Israeli troops occupy south", "url": "https://www.scmp.com/news/world/middle-east/article/3359432/lebanons-president-urges-us-solidarity-israeli-troops-occupy-south?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T13:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente do Líbano, Joseph Aoun, pediu ao Estados Unidos que se mantivesse solidário com o país após um acordo de cessar-fogo entre Israel e o Líbano, apoiado pelos EUA. O acordo, alcançado em Washington, prevê a desarmamentização do grupo Hezbollah, uma retirada gradual israelense do sul do Líbano e a implantação da força armada libanesa na região.", "titulo_pt": "Líbano pede solidariedade dos EUA enquanto tropas israelenses ocupam o sul", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 35126, "titulo": "In Tehran, huge throngs mourn assassinated supreme leader Ali Khamenei", "url": "https://www.washingtonpost.com/world/2026/07/04/tehran-huge-throngs-mourn-assassinated-supreme-leader-ali-khamenei/", "fonte_id": "washington_post_world", "data_pub": "2026-07-04T13:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Hordas de pessoas se reuniram em Teerã para homenagear o suprime líder assassinado Ali Khamenei, que governou a República Islâmica do Irã por 37 anos. Ele foi morto juntamente com vários membros da família em um ataque aéreo em fevereiro.", "titulo_pt": "Em Teerã, multidões homenageiam líder supremo assassinado Ali Khamenei", "veiculo": "Washington Post - World", "pais": "EUA", "classe": "A"}, {"id": 35120, "titulo": "Da domani stop a treni Firenze. Giani, emergenza nazionale, verificate gli orari", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/04/da-domani-stop-a-treni-firenze.-giani-emergenza-nazionale-verificate-gli-orari_ced62dbb-fcab-4556-9a02-59e335f9087d.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-04T13:27:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "A recomendação foi dada para adotar trabalho remoto e os tempos de viagem podem aumentar até 3 horas. O título traduzido é 'Da domani stop a treni Firenze. Giani, emergência nacional, verifique os horários'.", "titulo_pt": "Da domani stop a treni Firenze. Giani, emergência nacional, verifique os horários", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 35086, "titulo": "Mali government says rebels attacking northern towns", "url": "https://www.france24.com/en/video/20260704-mali-government-says-rebels-attacking-northern-towns", "fonte_id": "france24", "data_pub": "2026-07-04T13:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo maliano informou que rebeldes estão atacando várias cidades no norte do país, incluindo Gao e Sévaré. Um porta-voz do Frente de Libertação da Azawad afirmou que o município de Anefis também está sendo alvo dos separatistas.", "titulo_pt": "Governo maliano relata ataques de rebeldes em cidades do norte", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 35087, "titulo": "Iran holds funeral for Ali Khamenei: Attendees 'hardline factions' of society, specialist says", "url": "https://www.france24.com/en/iran-holds-funeral-for-ali-khamenei-attendees-hardline-factions-of-society-specialist-says", "fonte_id": "france24", "data_pub": "2026-07-04T13:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Centenas de milhares de pessoas se reuniram em Teerã no sábado para o início das cerimônias fúnebres do antigo Líder Supremo iraniano Ayatollah Ali Khamenei. Segundo Tara Kangarlou, jornalista especializada em assuntos globais e autora de The Heartbeat of Iran, a maioria dos participantes eram 'mais facções radicais da sociedade', fazendo com que o público não representasse as atitudes mais amplas do povo em relação ao regime.", "titulo_pt": "Irã realiza funeral para Ali Khamenei: maioria dos presentes seria de facções mais radicais da sociedade, diz especialista", "veiculo": "France 24", "pais": "França", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 35170, "titulo": "Durigan diz que Fazenda é a menos culpada por juros altos e defende ajuste fiscal", "url": "https://www.infomoney.com.br/politica/durigan-diz-que-fazenda-e-a-menos-culpada-por-juros-altos-e-defende-ajuste-fiscal/", "fonte_id": "infomoney", "data_pub": "2026-07-04T14:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Durigan afirma que o Ministério da Economia é a menos responsável pelos juros elevados e defende a necessidade de ajuste fiscal. Ele argumenta que a alta dos juros prejudica a dívida pública atual.", "titulo_pt": "Durigan diz que Fazenda é a menos culpada por juros altos e defende ajuste fiscal", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 35135, "titulo": "Publicação propõe alternativas para exploração de terras raras no país", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-07/publicacao-propoe-alternativas-para-exploracao-de-terras-raras-no-pais", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-04T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Centro de Gestão e Estudos Estratégicos (CGEE) lançou um livro sobre terras raras no Brasil, analisando cenários nacionais e internacionais e estudando cadeias industriais para a produção desses elementos químicos metálicos. A publicação foi assinada por dez engenheiros, pesquisadores e professores universitários.", "titulo_pt": "Publicação sugere alternativas para exploração de terras raras no Brasil", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 35144, "titulo": "Dexco mira economia com inovação trazida por startups", "url": "https://veja.abril.com.br/coluna/radar-economico/dexco-mira-caixa-com-startups/", "fonte_id": "veja", "data_pub": "2026-07-04T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O programa de inovação aberta da Dexco já resultou em economias no valor de R$ 10 milhões e está iniciando uma nova fase.", "titulo_pt": "Dexco mira economia com inovação trazida por startups", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 34989, "titulo": "Datafolha: 70% dos brasileiros defendem punir adolescentes infratores como adultos", "url": "https://www.infomoney.com.br/brasil/datafolha-70-dos-brasileiros-defendem-punir-adolescentes-infratores-como-adultos/", "fonte_id": "infomoney", "data_pub": "2026-07-04T13:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa do Datafolha mostrou que 70% dos brasileiros apoiam a punição de adolescentes infratores como adultos. Em comparação com 2022, houve um aumento na proporção de pessoas que defendem essa medida, passando de 65% para 70%. A reeducação foi escolhida por 27% dos entrevistados.", "titulo_pt": "Datafolha: 70% dos brasileiros apoiam punição de adolescentes infratores como adultos", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 34926, "titulo": "De Cachorro Crente a sex shop gospel, marcas evangélicas disputam mercado bilionário", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/de-cachorro-crente-a-sex-shop-gospel-marcas-evangelicas-disputam-mercado-bilionario.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-04T13:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": atoriedade-do-cumprimento-de-cotas-de-inclusao-para-participacao-em-licitacoes", "fonte_id": "jota", "data_pub": "2026-07-04T13:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Terceira Turma do Tribunal Regional Federal da Quarta Região (TRF4) confirmou a obrigatoriedade do cumprimento de cotas de inclusão para participação em licitações. A legislação estabelece que empresas devem contratar um percentual entre 2% e 5% de seus empregados entre beneficiários reabilitados ou pessoas com deficiência (PcDs).", "titulo_pt": "TRF4 confirma obrigatoriedade do cumprimento de cotas para inclusão em licitações", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 34969, "titulo": "Mercado vê oportunidade em queda de ações de tech, diz especialista", "url": "https://www.cnnbrasil.com.br/economia/mercado/mercado-ve-oportunidade-em-queda-de-acoes-de-tech-diz-especialista/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um especialista avaliou que a correção nas ações de tecnologia não representa o fim do ciclo. O mercado vê oportunidades durante essa queda, segundo Felipe Cima, da Manchester Investimentos.", "titulo_pt": "Mercado enxerga oportunidade em queda de ações de tech, diz especialista", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 34991, "titulo": "Disputa por suplências de Tebet e Marina abre nova tensão na chapa de Haddad em SP", "url": "https://www.infomoney.com.br/politica/disputa-por-suplencias-de-tebet-e-marina-abre-nova-tensao-na-chapa-de-haddad-em-sp/", "fonte_id": "infomoney", "data_pub": "2026-07-04T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "PT, PSB, PSOL, PDT, PV e PCdoB disputam as suplências de Marina Silva e Tebet para o Senado no caso delas assumirem cargos governamentais. Essa disputa está gerando nova tensão na chapa de Haddad em São Paulo.", "titulo_pt": "Disputa por suplências de Marina e Tebet abr ram que inundações extremas, que eram raras em comunidades costeiras, estão se tornando 12 vezes mais frequentes devido ao aumento dos níveis do mar causado pelo aquecimento global. Essa frequência aumentada é crucial para a planejamento de enfrentamento às inundações e infraestrutura costeira.", "titulo_pt": "Águas altas fazem inundações costeiras extremas 12 vezes mais comuns", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 35152, "titulo": "Saúde metabólica influencia risco de arritmias, dizem estudos", "url": "https://www.metropoles.com/saude/idade-saude-metabolica-risco-de-arritmias", "fonte_id": "metropoles", "data_pub": "2026-07-04T14:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Estudos indicam que a saúde metabólica, incluindo alterações como resistência à insulina, obesidade e inflamação, influencia o risco de arritmias cardíacas. Essas condições passaram a ser consideradas fatores importantes para o coração.", "titulo_pt": "Saúde metabólica influencia risco de arritmias, dizem estudos", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35285, "titulo": "Human flight was still 7 years away in 1776. Now, we're headed back to the moon", "url": "https://www.space.com/astronomy/moon/human-flight-was-still-7-years-away-in-1776-now-were-headed-back-to-the-moon", "fonte_id": "space_com", "data_pub": "2026-07-04T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 1776, quando os Estados Unidos da América foram fundados, a humanidade ainda não havia feito grandes avanços na navegação ou vôo. O primeiro voo humano só ocorreu sete anos depois.", "titulo_pt": "A humanidade ainda estava no chão em 1776. Agora, estamos voltando à lua.", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 35282, "titulo": "Astronomers may have caught an early galaxy in the process of dying", "url": "https://phys.org/news/2026-06-astronomers-caught-early-galaxy-dying.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T13:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Astrônomos podem ter observado uma galáxia em um estágio inicial de sua morte, perdendo seu material formador de estrelas apenas 1,4 bilhões de anos após o Big Bang. Eles notaram sinais que indicam a possível perda de gás estelar naquela época.", "titulo_pt": "Astrônomos podem ter capturado uma galáxia jovem no processo de morrer", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 34968, "titulo": "Ave jurássica com menor cauda longa do mundo surpreende sobre evolução", "url": "https://www.cnnbrasil.com.br/ciencia/ave-jurassica-com-menor-cauda-longa-do-mundo-surpreende-sobre-evolucao/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T13:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ave jurássica 'Zhengheornis buyu' possui a cauda mais longa proporcionalmente do que qualquer outro dinossaoro da linhagem aviar conhecido, indicando uma redução rápida no tamanho corporal dessas espécies. Isso sugere que o processo de miniaturização ocorreu muito mais rapidamente do que se supunha anteriormente.", "titulo_pt": "Ave jurássica com menor cauda longa do mundo surpreende sobre evolução", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 35222, "titulo": "Santiago Ramón y Cajal, premio Nobel de medicina: “La casualidad no sonríe a quien la desea, si no al que la merece”", "url": "https://www.clarin.com/internacional/santiago-ramon-cajal-premio-nobel-medicina-casualidad-sonrie-desea-merece_0_EcPIFCcn5S.html", "fonte_id": "clarin", "data_pub": "2026-07-04T13:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Santiago Ramón y Cajal, premiado com o Nobel de Medicina, afirma que a sorte não se conquista através da desejava, mas sim por quem merece. Ele destaca a importância do trabalho e do esforço na realização dos objetivos.", "titulo_pt": "Santiago Ramón y Cajal, vencedor do Nobel de Medicina: 'A sorte não sorri àquele que a deseja, mas ao que a merece'", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 35122, "titulo": "Nobel-winning materials scientist Omar Yaghi joins China’s Tsinghua University from the US", "url": "https://www.scmp.com/news/china/science/article/3359430/nobel-prize-winning-materials-scientist-omar-yaghi-joins-tsinghua-university-us?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Omar Yaghi, vencedor do Prêmio Nobel de Química do ano passado, deixou os Estados Unidos para liderar um novo centro de pesquisa baseado em inteligência artificial na Universidade Tsinghua da China. Ele vai direcionar uma equipe focada no uso de AI para transformar a criação de novos materiais e acelerar significativamente seu desenvolvimento.", "titulo_pt": "Omar Yaghi, vencedor do Nobel de Química, passa para a Tsinghua University", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 35125, "titulo": "Trained AI outperforms biologists at spotting salmon lice", "url": "https://phys.org/news/2026-07-ai-outperforms-biologists-salmon-lice.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores treinaram modelos de inteligência artificial com mais de 120.000 imagens de larvas de pulgas-do-salmonete e descobriram que as máquinas foram muito mais rápidas e precisas do que biólogos experientes na identificação desses parasitas.", "titulo_pt": "IA treinada supera biólogos em identificar larvas de pulgas-do-salmonete", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 35063, "titulo": "Why Americans are living longer again", "url": "https://www.vox.com/future-perfect/494256/united-states-life-expectancy-death-rates-health-overdose", "fonte_id": "vox", "data_pub": "2026-07-04T12:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os EUA são um país de saúde única e precária, segundo afirmam seus cidadãos. O atual secretário de Saúde dos Estados Unidos argumenta que a geração atual é a mais doente da história.", "titulo_pt": "Por que os americanos estão vivendo mais novamente", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 34848, "titulo": "Renowned neurobiologist and former taekwondo captain Chih-Ying Su leaves US for China", "url": "https://www.scmp.com/news/china/science/article/3359281/renowned-neurobiologist-and-former-taekwondo-captain-chih-ying-su-leaves-us-china?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A neurobiologista renomada Chih-Ying Su, especializada na pesquisa do sentido do cheiro usando moscas e mosquitos, deixou sua posição como vice-chefe de faculdade da Universidade da Califórnia em San Diego para se juntar à Shenzhen Academy of Medical Sciences (SMART) como investigadora sênior. A nomeação foi confirmada pelo SMART em 2 de julho.", "titulo_pt": "Neurobióloga Chih-Ying Su, ex-capitã de taekwondo, muda-se para China", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 34896, "titulo": "A young gull's mottled brown plumage acts as a 'not a threat' signal to territorial adults", "url": "https://phys.org/news/2026-07-young-gull-mottled-brown-plumage.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Algumas espécies de gaviões, como o gavião-heroniano, passam vários anos desenvolvendo suas penas adultas. Durante esse período, a plumagem marmorizada e café da jovem gavião serve como um sinal 'não é uma ameaça' para os adultos territoriais.", "titulo_pt": "A plumagem marmorizada de jovens gaviões-heronianos atua como um sinal 'não é uma ameaça' para adultos territoriais", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 34916, "titulo": "What did the night sky look like on the 1st Independence Day 250 years ago?", "url": "https://www.space.com/stargazing/what-did-the-night-sky-look-like-on-the-1st-independence-day-250-years-ago", "fonte_id": "space_com", "data_pub": "2026-07-04T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "No aniversário de 250 anos dos Estados Unidos, o céu noturno visto pelos colonos, incluindo Benjamin Franklin, no dia 4 de julho de 1776, é descrito.", "titulo_pt": "O que o céu noturno parecia no primeiro Dia da Independência há 250 anos?", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 34689, "titulo": "The evidence against “ultra-processed” foods is weaker than you think", "url": "https://www.vox.com/future-perfect/494045/ultra-processed-foods-science-rcts", "fonte_id": "vox", "data_pub": "2026-07-04T11:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O termo ' alimentos ultra-processados' (UPFs) passou de uma expressão acadêmica para um dos conceitos mais influentes na imaginação alimentar americana em menos de uma década. A menção a esses alimentos dominou as coberturas midiáticas sobre dieta e doenças, gerando guias que ensinam os consumidores a identificá-los nos supermercados.", "titulo_pt": "A evidência contra 'alimentos ultra-processados' pode não ser tão forte quanto você pensa", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 34904, "titulo": "NASA’s Hubble Spies Stellar Sparkler for July 4th", "url": "https://science.nasa.gov/missions/hubble/nasas-hubble-spies-stellar-sparkler-for-july-4th/", "fonte_id": "nasa_news", "data_pub": "2026-07-04T11:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA's Hubble Space Telescope capturou uma imagem que imita um fureteiro brilhando no céu noturno, com cores vermelho, branco e azul.", "titulo_pt": "Hubble da NASA Captura Estrelas Brilhantes como Fureteiro para o Dia de Independência", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 34903, "titulo": "For July 4, NASA unveils an astronomical fireworks show, complete with sound effects", "url": "https://www.scientificamerican.com/article/for-july-4-nasa-unveils-an-astronomical-fireworks-show-complete-with-sound-effects/", "fonte_id": "scientific_american", "data_pub": "2026-07-04T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em julho 4, a NASA divulgou imagens da Chandra X-ray Observatory mostrando um espetáculo astronômico, completo com efeitos sonoros. As imagens exibem um show de fogos celestes que superam o tradicional 'glorioso vermelho' dos fogos de artifício.", "titulo_pt": "Para 4 de julho, NASA revela espetáculo astronômico completo com efeitos sonoros", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 34917, "titulo": "30 years on, \"Independence Day\" still proves the versatility of the original \"The War of the Worlds\"", "url": "https://www.space.com/entertainment/space-movies-shows/30-years-on-independence-day-still-proves-the-versatility-of-the-original-the-war-of-the-worlds", "fonte_id": "space_com", "data_pub": "2026-07-04T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Independence Day não é tecnicamente uma adaptação direta de 'A Guerra dos Mundos', mas continua sendo uma das adaptações mais bem-sucedidas do clássico da literatura científica de HG Wells.", "titulo_pt": "30 anos depois, Independence Day mantém a versatilidade de A Guerra dos Mundos", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 35283, "titulo": "Dustin Hoffman Says America Is as ‘Divided’ as During Vietnam War … and Jokes He Is Still Trying to Figure Out Who He Is", "url": "https://variety.com/2026/film/global/dustin-hoffman-america-divided-vietnam-war-1236801687/", "fonte_id": "variety", "data_pub": "2026-07-04T14:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dustin Hoffman afirmou que os Estados Unidos estão tão divididos quanto du sequence_sound", "data_pub": "2026-07-04T13:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Beyoncé lançou uma nova single surpresa chamada 'MORNING DEW (DONK)' que aparecerá no reeditamento em comemoração ao 20º aniversário do seu segundo álbum solo, B'DAY.", "titulo_pt": "Beyoncé Lança Nova Single Surpresa 'MORNING DEW (DONK)'", "veiculo": "Consequence of Sound", "pais": "EUA", "classe": "C"}, {"id": 35284, "titulo": "Sweating It Out: The Best Home Saunas to Try Out The Latest Wellness Craze", "url": "https://variety.com/2026/shopping/news/best-home-saunas-buy-online-1235955729/", "fonte_id": "variety", "data_pub": "2026-07-04T13:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Saunas domésticas, que eram originalmente associadas apenas aos círculos de Hollywood, se tornaram mais acessíveis e populares junto com a crescente indústria da wellness. Elas permitem que as pessoas aproveitem os benefícios das spas sem sair de casa.", "titulo_pt": "Transpirando: As Melhores Saunas Domésticas para Experimentar a Última Moda em Wellness", "veiculo": "Variety", "pais": "EUA", "classe": "C"}, {"id": 35265, "titulo": "Comienzan funerales públicos de Alí Jameneí en Irán: se extenderán cinco días", "url": "https://www.latercera.com/mundo/noticia/comienzan-funerales-publicos-de-ali-jamenei-en-iran-se-extenderan-cinco-dias/", "fonte_id": "la_tercera", "data_pub": "2026-07-04T13:42:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Os funerais públicos de Ali Jamenei começaram em Irã e se estenderão por cinco dias. O corpo será enterrado no mausoléu do Imam Reza, na cidade natal de Jamenei, localizada no norte do país.", "titulo_pt": "Inícios dos funerais públicos de Ali Jamenei em Irã: se estenderão por cinco dias", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 35130, "titulo": "Woody Guthrie, Nearly 60 Years After His Death, Keeps Speaking to New Generations", "url": "https://www.rollingstone.com/music/music-features/woody-guthrie-protest-music-lasting-impact-1235588067/", "fonte_id": "rolling_stone_music", "data_pub": "2026-07-04T13:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo documentário conecta a vida e a música do cantor e compositor Woody Guthrie, que viveu na era da Grande Depressão, com as lutas atuais pela justiça social, igualdade e direitos dos imigrantes. O trabalho de Guthrie continua inspirando novas gerações.", "titulo_pt": "Woody Guthrie, Quase 60 Anos Depois do Seu Falecimento, Continua Falando para Novas Gerações", "veiculo": "Rolling Stone - Música", "pais": "EUA", "classe": "C"}, {"id": 35131, "titulo": "It’s a Love Story: Fans React to Taylor Swift and Travis Kelce’s Happily Ever After", "url": "https://www.rollingstone.com/music/music-news/taylor-swift-travis-kelce-wedding-fan-reactions-1235588934/", "fonte_id": "rolling_stone_music", "data_pub": "2026-07-04T12:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Fãs reagiram positivamente à feliz história de amor entre Taylor Swift e Travis Kelce. A declaração sobre o amor funcionar de maneira misteriosa tocou os fãs.", "titulo_pt": "É uma História de Amor: Fãs Reagem Positivamente ao Casamento Feliz de Taylor Swift e Travis Kelce", "veiculo": "Rolling Stone - Música", "pais": "EUA", "classe": "C"}, {"id": 34411, "titulo": "Tati Bernardi discute masculinidade nas novelas com roteirista Daniel Berlinsky; veja vídeo", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/tv/2026/07/tati-bernardi-discute-masculinidade-nas-novelas-com-roteirista-daniel-berlinsky-veja-video.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-04T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O roteirista Daniel Berlinsky discute com a escritora Tati Bernardi sobre a necessidade de desconstruir padrões tradicionais de masculinidade nas novelas brasileiras. Eles falam sobre como os protagonistas masculinos são criados e evoluem na dramaturgia atual.", "titulo_pt": "Tati Bernardi e Daniel Berlinsky debatem masculinidade nas novelas", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 34725, "titulo": "What America gets right", "url": "https://www.axios.com/2026/07/04/america-4th-of-july-patriotism-capitalism-business", "fonte_id": "axios", "data_pub": "2026-07-04T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos estão vivendo o momento mais extraordinário na história americana e humana, segundo a fonte. A melhoria nas áreas de longevidade, qualidade de vida, riqueza, saúde e liberdade em comparação com gerações anteriores é evidente. No entanto, há um sentimento generalizado de pessimismo que o autor considera exagerado.", "titulo_pt": "O que os Estados Unidos fazem bem", "veiculo": "Axios", "pais": "EUA", "classe": "B"}, {"id": 34597, "titulo": "La historia de Vaguito, el perro que pasó de ser rescatado a convertirse en un héroe de la Policía", "url": "https://www.lanacion.com.ar/lifestyle/mascotas/la-historia-de-vaguito-el-perro-que-paso-de-ser-rescatado-a-convertirse-en-un-heroe-de-la-policia-nid04072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-04T11:47:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O cão herói da Polícia Nacional do Peru recebeu uma emocionante despedida na cidade de Trujillo, onde policiais e autoridades homenagearam seu zelo e anos de serviço.", "titulo_pt": "A história de Vaguito, o cachorro que passou de ser resgatado a se tornar um herói da Polícia", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 34923, "titulo": "Karlovy Vary Focuses on Next Generation of European Filmmakers With Future Frames Program", "url": "https://variety.com/2026/film/global/karlovy-vary-future-frames-1236801671/", "fonte_id": "variety", "data_pub": "2026-07-04T11:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_  "https://www.latercera.com/nacional/noticia/condenan-a-excarabinero-que-omitio-denunciar-a-conductor-ebrio-a-cambio-de-recibir-un-vehiculo/", "fonte_id": "la_tercera", "data_pub": "2026-07-04T14:16:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um ex-carregador de polícia foi condenado por não denunciar um condutor bêbado, mesmo após o motorista ter marcado 1,88 gramas de álcool por litro em uma teste respiratória. O ex-carregador solicitou a entrega de um veículo como compensação pelos danos causados ao seu carro particular.", "titulo_pt": "Ex-carregador de polícia condenado por omitir denúncia de condutor bêbado, trocando informações pelo veículo", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 35155, "titulo": "Polícia diz que presos por matar e incendiar DJ armaram emboscada", "url": "https://www.metropoles.com/distrito-federal/na-mira/policia-diz-que-presos-por-matar-e-incendiar-dj-armaram-emboscada", "fonte_id": "metropoles", "data_pub": "2026-07-04T14:04:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Dois suspeitos do crime de matar e incendiar um DJ, ocorrido em dezembro de 2025, foram presos por policiais civis na sexta-feira (3/7).", "titulo_pt": "Polícia prende suspeitos do crime que matou e incendiou DJ", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35179, "titulo": "Número de brasileiros que liga pobreza à preguiça vai a 40%, diz Datafolha", "url": "https://www.cnnbrasil.com.br/nacional/brasil/numero-de-brasileiros-que-liga-pobreza-a-preguica-vai-a-40-diz-datafolha/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T13:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O levantamento Datafolha mostrou um aumento significativo na percepção de que a pobreza é causada pela falta de vontade de trabalhar, com 40% dos brasileiros concordando com essa ideia. Este foi o maior índice registrado desde o início da série histórica.", "titulo_pt": "40% dos brasileiros as pt": "Saída de profissionais prejudica setor de saúde em Yemen", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 34942, "titulo": "Dois homens são presos por morte de jovem na Bahia; 3º suspeito morreu", "url": "https://www.metropoles.com/brasil/homens-presos-jovem-morreu", "fonte_id": "metropoles", "data_pub": "2026-07-04T13:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Dois homens foram presos em relação à morte de Karla Naiany, uma jovem de 21 anos que sumiu em São Gabriel e foi encontrada morta após 13 dias. O terceiro suspeito faleceu durante a investigação.", "titulo_pt": "Dois homens são presos por morte de jovem na Bahia; 3º suspeito morreu", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35028, "titulo": "El mensaje de Mamdani a las familias migrantes de Nueva York: “La ciudadanía por nacimiento jamás debió estar en duda”", "url": "https://www.lanacion.com.ar/estados-unidos/nueva-york/el-mensaje-de-mamdani-a-las-familias-migrantes-de-nueva-york-la-ciudadania-por-nacimiento-jamas-nid01072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-04T13:23:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Zohran Mamdani fez um discurso às famílias migrantes de Nova York sobre a cidadeanidade por nascimento, afirmando que ela nunca esteve em dúvida. A decisão da Corte Suprema impacta milhões de imigrantes.", "titulo_pt": "Mensagem de Mamdani para as famílias migrantes de Nova York: 'A cidadeanidade por nascimento jamais deveria estar em dúvida'", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 35219, "titulo": "Cerró una histórica tienda de 130 años que se reconvirtió en shopping tras la salida de Falabella de la Argentina", "url": "https://www.clarin.com/economia/cerro-historica-tienda-130-anos-reconvirtio-shopping-salida-falabella-argentina_0_K0RPzQCm5A.html", "fonte_id": "clarin", "data_pub": "2026-07-04T13:15:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A histórica loja La Favorita, que tem 130 anos e é um ícone comercial de Rosario, encerrou suas operações. O fechamento ocorreu devido à queda do consumo, a presença de locais sem ocupação e a disputa entre a empresa responsável e os herdeiros do imóvel.", "titulo_pt": "Fechará uma histórica loja de 130 anos que se transformou em shopping após saída da Falabella", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 34955, "titulo": "Correios terão que pagar R$ 50 mil a gerente vítima de machismo", "url": "https://veja.abril.com.br/brasil/correios-terao-que-pagar-r-50-mil-a-gerente-vitima-de-machismo/", "fonte_id": "veja", "data_pub": "2026-07-04T13:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um gerente que sofreu com casos de machismo na empresa Correios receberá uma indenização no valor de R$ 50 mil. O superintendente responsável por motivar essa indenização permanece em seu cargo.", "titulo_pt": "Correios terão que pagar R$ 50 mil a gerente vítima de machismo", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 34959, "titulo": "O aviso do Tesouro que piscou nas tesourarias de bancos", "url": "https://veja.abril.com.br/coluna/radar-economico/o-aviso-do-tesouro-que-piscou-nas-tesourarias-de-bancos/", "fonte_id": "veja", "data_pub": "2026-07-04T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Grandes dealers foram informados de que o governo pode realizar recompras extraordinárias com o objetivo de controlar a elevação dos juros reais.", "titulo_pt": "Aviso do Tesouro sobre possíveis recompras para conter juros", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 34960, "titulo": "O extraordinário salto em detenções de adolescentes com armas de fogo no Brasil", "url": "https://veja.abril.com.br/brasil/o-extraordinario-salto-em-detencoes-de-adolescentes-com-armas-de-fogo-no-brasil/", "fonte_id": "veja", "data_pub": "2026-07-04T13:00:00Z", "idioma": "pt", "provav
