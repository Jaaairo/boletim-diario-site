ews-release/nasa-to-cover-us-spacewalk-95-host-preview-news-conference/", "fonte_id": "nasa_news", "data_pub": "2026-06-22T16:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Astronautas da NASA sairão para realizar uma caminhada espacial na Estação Espacial Internacional no dia 30 de junho para substituir uma articulação do pulso do braço robótico Canadarm2. A caminhada espacial está programada para começar por volta das 8h35 EDT. Especialistas da NASA e da Agência Espacial Canadiana (CSA) apresentarão a próxima caminhada espacial durante uma conferência de imprensa às 14h.", "titulo_pt": "NASA vai cobrir caminhada espacial 95, sediar conferência de imprensa prévia", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 10850, "titulo": "STAT+: FDA to launch pilot program to speed up early-stage clinical trials", "url": "https://www.statnews.com/2026/06/22/fda-speed-up-early-stage-single-study-clinical-trials/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-22T15:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Autoridades de saúde federais pretendem acelerar o desenvolvimento de medicamentos e competir melhor com a China. O programa piloto visa agilizar os ensaios clínicos em fase inicial.", "titulo_pt": "FDA lançará programa piloto para acelerar ensaios clínicos iniciais", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 10864, "titulo": "Sea cucumbers harbor ‘zombie’ tissues that won’t die", "url": "https://www.sciencenews.org/article/sea-cucumber-zombie-tissues-tentacles", "fonte_id": "science_news", "data_pub": "2026-06-22T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Tecidos separados dos pés tubulares e tentáculos alimentadores de pepinos do mar sobreviveram por mais de três anos. Essa descoberta pode influenciar o estudo do envelhecimento.", "titulo_pt": "Pepinos do mar abrigam tecidos 'zumbi' que não morrem", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 10909, "titulo": "Interstellar Comet 3I/ATLAS is almost as old as the universe itself", "url": "https://www.scientificamerican.com/article/interstellar-comet-3i-atlas-is-almost-as-old-as-the-universe-itself/", "fonte_id": "scientific_american", "data_pub": "2026-06-22T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Evidências indicam que o cometa 3I/ATLAS, visitante interestelar, é mais antigo e peculiar do que se pensava.  Cientistas analisaram a composição do cometa e descobriram traços químicos incomuns, sugerindo uma origem muito antiga.", "titulo_pt": "Cometa Interstelar 3I/ATLAS é quase tão velho quanto o universo", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 10913, "titulo": "Webb finds clues to ancient origin of Comet 3I/ATLAS", "url": "https://www.esa.int/Science_Exploration/Space_Science/Webb/Webb_finds_clues_to_ancient_origin_of_Comet_3I_ATLAS", "fonte_id": "esa_space", "data_pub": "2026-06-22T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O terceiro cometa interestelar identificado na história da humanidade possui uma composição química surpreendente. Essa descoberta levanta questões sobre a frequência, ou raridade, de condições semelhantes ao nosso Sistema Solar. O Telescópio Espacial James Webb foi usado para realizar essa descoberta.", "titulo_pt": "Webb descobre pistas sobre a origem antiga do cometa 3I/ATLAS", "veiculo": "ESA - Space Science", "pais": "Europa", "classe": "A"}, {"id": 9925, "titulo": "François Englert, Nobel que ajudou a prever a 'partícula de Deus', morre aos 93 anos", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/06/francois-englert-nobel-que-ajudou-a-prever-a-particula-de-deus-morre-aos-93-anos.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-22T14:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O físico François Englert, laureado com o Prêmio Nobel, faleceu aos 93 anos. Englert contribuiu para a previsão da existência do bóson de Higgs, conhecido como 'partícula de Deus'.  A detecção do bóson de Higgs em 2012 confirmou a existência de um campo que confere massa às outras partículas.", "titulo_pt": "François Englert, Nobel que ajudou a prever a 'partícula de Deus', morre aos 93 anos", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 9882, "titulo": "Clive Davis, produtor que lançou Whitney Houston na música, morre aos 94 anos", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/clive-davis-produtor-que-lancou-whitney-houston-na-musica-morre-aos-94-anos.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T22:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O produtor musical e executivo de gravadora Clive Davis morreu aos 94 anos. Davis foi responsável por lançar a carreira de vários artistas famosos da música popular. Ele havia sido hospitalizado recentemente devido a problemas respiratórios.", "titulo_pt": "Clive Davis, produtor que lançou Whitney Houston, morre aos 94 anos", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9884, "titulo": "O único poeta que me fez chorar foi João Cabral de Melo Neto", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/colunas/socorro-acioli/2026/06/o-unico-poeta-que-me-fez-chorar-foi-joao-cabral-de-melo-neto.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T21:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O autor do texto afirma ter chorado ao ler o poema 'O Cão sem Plumas' de João Cabral de Melo Neto. O autor também menciona ter sentido emoção ao navegar no rio Capibaribe recentemente.", "titulo_pt": "O único poeta que me fez chorar foi João Cabral de Melo Neto", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 10378, "titulo": "First the Kennedy Center, Now the Smithsonian", "url": "https://www.theatlantic.com/culture/2026/06/trump-bunch-smithsonian/687660/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-22T20:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo discute a situação do líder do sistema de museus americano, Lonnie Bunch.  Bunch enfrenta críticas após incidentes no Centro Kennedy e agora também no Smithsonian. O artigo questiona a capacidade de Bunch em manter seu cargo.", "titulo_pt": "Primeiro o Centro Kennedy, Agora o Smithsonian", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 9885, "titulo": "Policial 'Caso 137' e 'Falha de Cobertura': o que ver na TV e no streaming na terça-feira", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/policial-caso-137-e-falha-de-cobertura-o-que-ver-na-tv-e-no-streaming-na-terca.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O filme 'Caso 137' retrata uma investigadora francesa que investiga um jovem ferido por uma bala de borracha durante uma manifestação em Paris. O filme estará disponível para assistir na TV e no streaming nesta terça-feira.", "titulo_pt": "Caso 137' e 'Falha de Cobertura': o que assistir na TV e no streaming na terça-feira", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9886, "titulo": "Japan House realiza evento sobre café com oficinas e experiências de prova", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://guia.folha.uol.com.br/passeios/2026/06/japan-house-realiza-evento-sobre-cafe-com-oficinas-e-experiencias-de-prova.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T19:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Japan House São Paulo promove a Semana do Café entre 24 e 26 de agosto. O evento contará com chefs, produtores, baristas e pesquisadores para discutir o café sob diferentes perspectivas, como técnica, consumo, cadeia produtiva e práticas culturais.", "titulo_pt": "Japan House realiza evento sobre café com oficinas e experiências de prova", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9887, "titulo": "STF nega recurso de Rachel Sheherazade e apresentadora perde processo contra o SBT", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/stf-nega-recurso-de-rachel-sheherazade-e-apresentadora-perde-processo-contra-o-sbt.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T19:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro André Mendonça do STF negou o pedido da apresentadora Rachel Sheherazade para que o tribunal julgasse novamente seu processo contra o SBT. Com isso, o processo será encerrado com vitória para a emissora.", "titulo_pt": "STF nega recurso de Rachel Sheherazade e apresentadora perde processo contra o SBT", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9888, "titulo": "Dois anos após a estreia, 'Justiça 2' será exibida pela Globo na TV aberta em julho", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/dois-anos-apos-a-estreia-justica-2-sera-exibida-pela-globo-na-tv-aberta-em-julho.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T17:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Globo vai exibir a série 'Justiça 2', que estreou no Globoplay em 2024, na TV aberta em julho. A série é escrita por Manuela Dias, autora também do remake de 'Vale Tudo' em 2025.", "titulo_pt": "Dois anos após estreia, 'Justiça 2' será exibido pela Globo na TV aberta em julho", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9889, "titulo": "Vik Muniz usa cinzas do Museu Nacional para recriar relíquias perdidas em incêndio", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/vik-muniz-usa-cinzas-do-museu-nacional-para-recriar-reliquias-perdidas-em-incendio.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O artista Vik Muniz, que trabalhava com flores na Holanda, ficou comovido pelo incêndio no Museu Nacional em 2018. Ele decidiu usar cinzas do museu para criar réplicas de objetos perdidos no incêndio.", "titulo_pt": "Vik Muniz usa cinzas do Museu Nacional para recriar relíquias perdidas no incêndio", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9890, "titulo": "Copacabana Palace será cenário de nova versão do Conversa com Bial na Globo", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/copacabana-palace-sera-cenario-de-nova-versao-do-conversa-com-bial-na-globo.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T15:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O programa 'Conversa com Bial' retornará à Globo em julho.  A maioria dos episódios da nova temporada será gravado no Copacabana Palace.", "titulo_pt": "Copacabana Palace será cenário da nova temporada do Conversa com Bial", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 10962, "titulo": "Bad Bunny sparks UK’s Latino moment as 100,000 fans line up to see him perform", "url": "https://www.theguardian.com/music/2026/jun/22/bad-bunny-sparks-uks-latino-moment-as-100000-fans-line-up-to-see-him-perform", "fonte_id": "guardian_culture", "data_pub": "2026-06-22T14:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O cantor s de cinema com calor de 37ºC", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/ritrovato-restaura-aurora-de-fw-murnau-e-lota-salas-de-cinema-com-calor-de-37oc.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T14:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "No primeiro dia do festival Cinema Ritrovato, em Bolonha, o calor extremo (38ºC) fez com que os frequentadores buscassem refúgio no ar condicionado das salas de cinema. A exibição da restauração do filme 'Aurora', de F.W. Murnau, lotou as salas.", "titulo_pt": "Restaurado 'Aurora', de F.W. Murnau, e lota salas de cinema com calor intenso", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 10960, "titulo": "‘Guys would think I was a girl then get aggressive when they found out my name was Brian’: how Placebo made Nancy Boy", "url": "https://www.theguardian.com/culture/2026/jun/22/how-placebo-made-nancy-boy", "fonte_id": "guardian_culture", "data_pub": "2026-06-22T14:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Brian Molko, vocalista do Placebo, escreveu a música 'Nancy Boy' como uma resposta aos insultos homofóbicos que sofria por causa de sua aparência. Ele dizia que as pessoas reagiam com hostilidade quando ele entrava em bares e que alguns homens ficavam agressivos ao descobrir seu nome verdadeiro. Molko queria usar a música para celebrar a debauchery e irritar aqueles que o criticavam.", "titulo_pt": "'Garotas pensariam que eu era uma menina e ficariam agressivas quando descobrissem meu nome era Brian': Como o Placebo fez Nancy Boy", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 9893, "titulo": "Polícia encontra quadro roubado de Picasso durante apreensão de drogas", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/policia-encontra-quadro-roubado-de-picasso-durante-apreensao-de-drogas.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T13:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A polícia francesa encontrou um quadro roubado de Pablo Picasso durante uma operação para apreender drogas em Champigny-sur-Marn, a sudeste de Paris. O quadro foi encontrado durante a busca da casa onde as drogas estavam armazenadas.", "titulo_pt": "Polícia encontra quadro roubado de Picasso durante apreensão de drogas", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 9894, "titulo": "Marina Saleme reúne em exposição paisagens movediças e evanescentes", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/marina-saleme-reune-em-exposicao-paisagens-movedicas-e-evanescentes.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A exposição de Marina Saleme apresenta paisagens com uma sensação de fragilidade e movimento. As obras retratam montanhas encobertas por neblina e nuvens que parecem flutuar. A artista cria a impressão de um mundo em constante mudança.", "titulo_pt": "Marina Saleme reúne em exposição paisagens movediças e evanescentes", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}], "cultura__eventos": [], "sociedade": [{"id": 10716, "titulo": "Suicide 10th-leading cause of death last year", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/23/2003859582", "fonte_id": "taipei_times", "data_pub": "2026-06-23T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O suicídio foi a décima principal causa de morte em Taiwan em 2022.  Foram registradas 689 mortes por suicídio, representando uma taxa de 3 por 100 mil habitantes. O número de suicídios aumentou em relação ao ano anterior.", "titulo_pt": "Suicídio é a décima causa de morte no ano passado", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 10728, "titulo": "Bank says people feel good about economy", "url": "https://www.taipeitimes.com/News/biz/archives/2026/06/23/2003859551", "fonte_id": "taipei_times", "data_pub": "2026-06-23T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo relatório do Banco Central de Taiwan indica que a confiança dos consumidores no país está alta.  A pesquisa mostra que as pessoas estão mais otimistas sobre a situação econômica atual e as perspectivas futuras. O banco atribui essa confiança ao crescimento econômico recente e às políticas governamentais.", "titulo_pt": "Banco diz que pessoas se sentem bem com a economia", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 9881, "titulo": "Alex Escobar passa mal ao vivo na Globo e é levado a hospital nos Estados Unidos", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/alex-escobar-passa-mal-ao-vivo-na-globo-e-e-levado-a-hospital-nos-estados-unidos.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-22T23:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O apresentador Alex Escobar teve um pico de pressão durante uma participação no programa Encontro com Patrícia Poeta. Ele foi encaminhado para um hospital em Nova Jersey, nos Estados Unidos. O incidente ocorreu nesta segunda-feira (22).", "titulo_pt": "Alex Escobar passa mal ao vivo na Globo e é levado a hospital nos Estados Unidos", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 10358, "titulo": "Cuando el hospital reemplaza a la red de cuidados", "url": "https://www.latercera.com/opinion/noticia/cuando-el-hospital-reemplaza-a-la-red-de-cuidados/", "fonte_id": "la_tercera", "data_pub": "2026-06-22T23:04:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um estudo chileno analisa como os hospitais estão assumindo o papel da rede de cuidados primários. A pesquisa mostra que, em alguns casos, os pacientes buscam atendimento hospitalar para problemas que poderiam ser resolvidos na atenção básica. Essa tendência pode sobrecarregar os sistemas hospitalares e impactar a qualidade do atendimento.", "titulo_pt": "Quando o hospital substitui a rede de cuidados", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 10003, "titulo": "Vizinha ouviu mãe implorando ao filho antes de ser decapitada em MG", "url": "https://www.metropoles.com/minas-gerais/vizinha-ouviu-mae-implorando-ao-filho-antes-de-ser-decapitada-em-mg", "fonte_id": "metropoles", "data_pub": "2026-06-22T21:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma mulher foi encontrada morta e decapitada em seu quarto em Minas Gerais. O filho dela confessou o crime após a chegada das tropas militares ao local. Uma vizinha teria ouvido gritos vindos da casa antes do crime.", "titulo_pt": "Vizinha ouviu mãe implorando ao filho antes de ser decapitada em MG", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 10578, "titulo": "Fire at animation studio in India’s Lucknow kills at least 14", "url": "https://www.aljazeera.com/news/2026/6/22/fire-at-animation-studio-in-indias-lucknow-kills-at-least-14?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-22T20:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio ocorreu em um prédio comercial que abrigava uma biblioteca e um estúdio de animação em Lucknow, Índia. A maioria das vítimas eram estudantes universitários. Pelo menos 14 pessoas morreram no incêndio.", "titulo_pt": "Incêndio em estúdio de animação na Lucknow, Índia, mata pelo menos 14", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 10743, "titulo": "[Lim Woong] What Korea's school crisis is really about", "url": "https://www.koreaherald.com/article/10784248", "fonte_id": "korea_herald", "data_pub": "2026-06-22T20:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A série de TV coreana 'Ensine-lhe uma Lição' tem conquistado as paradas globais e gerado discussões sobre os problemas do sistema educacional coreano. A trama acompanha um grupo fictício chamado Escritório de Proteção dos Direitos dos Professores que combate a violência escolar e a corrupção. A série recebeu elogios da crítica por seu elenco, roteiro e temas relevantes.", "titulo_pt": "O que a crise escolar da Coreia realmente é?", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 10690, "titulo": "2 young children found dead in locked car during France heatwave", "url": "https://www.scmp.com/news/world/europe/article/3357973/2-young-children-found-dead-locked-car-during-france-heatwave?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-22T20:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dois irmãos, de 2 e 4 anos, foram encontrados mortos dentro do carro da família em Carpentras, no sul da França. A mãe das crianças encontrou os filhos no carro estacionado na garagem da casa familiar. Os serviços de emergência tentaram reanimá-los, mas não conseguiram salvá-los.", "titulo_pt": "Duas crianças pequenas encontradas mortas dentro do carro durante onda de calor na França", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 10665, "titulo": "Study finds large gap in daily steps people in Japan take, depending on area", "url": "https://www.japantimes.co.jp/news/2026/06/22/japan/daily-steps-regional-gap/", "fonte_id": "japan_times", "data_pub": "2026-06-22T08:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo da Universidade de Tóquio descobriu que a média de passos diários tende a ser maior em municípios com ambientes mais propícios para caminhadas.  Environments conducive to walking were found to have higher average step counts.", "titulo_pt": "Estudo revela grande diferença no número de passos diários das pessoas no Japão, dependendo da região", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 10762, "titulo": "Why more South Koreans are becoming ‘full-time children’", "url": "https://www.koreaherald.com/article/10784133", "fonte_id": "korea_herald", "data_pub": "2026-06-22T06:43:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A escassez de empregos e o aumento dos custos habitacionais levaram ao surgimento de um novo papel familiar: jovens adultos que permanecem em casa, ajudam a administrar o lar e, em alguns casos, cuidam de pais idosos. Essa sequência tradicional de sucesso na Coreia do Sul - graduação, emprego estável, mudança para fora de casa, casamento e início da família - está sendo questionada por um número crescente de jovens.", "titulo_pt": "Por que mais sul-coreanos estão se tornando 'crianças em tempo integral'", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 10678, "titulo": "Miyagi volunteer probation officers seek sustainable rehabilitation system", "url": "https://www.japantimes.co.jp/news/2026/06/22/japan/crime-legal/japan-volunteer-probation-officers/", "fonte_id": "japan_times", "data_pub": "2026-06-22T06:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Japão depende fortemente de assistentes de liberdade condicional voluntários para apoiar a reabilitação. No entanto, o envelhecimento da força de trabalho, as escassez e os receios de segurança estão colocando uma crescente pressão no sistema.  Assistentes de liberdade condicional voluntários em Miyagi buscam um sistema de reabilitação mais sustentável.", "titulo_pt": "Assistentes de liberdade condicional voluntários no Miyagi buscam sistema de reabilitação sustentável", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 11059, "titulo": "Building Public Life: How Bogotá and Mexico City Addressed Urban Inequality", "url": "https://www.archdaily.com/1042536/building-public-life-how-bogota-and-mexico-city-addressed-urban-inequality", "fonte_id": "archdaily", "data_pub": "2026-06-22T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Muitas cidades latino-americanas têm periferias com menos acesso a recursos que tornam a vida urbana mais do que apenas habitável.  Essa falta se manifesta na ausência de espaços para reunir, aprender, descansar e participar da vida coletiva. A ausência desses espaços significa que a cidade não apenas falha em fornecer um serviço, mas também ignora a presença das pessoas.", "titulo_pt": "Construindo a Vida Pública: Como Bogotá e Cidade do México Abordaram a Desigualdade Urbana", "veiculo": "ArchDaily", "pais": "Chile", "classe": "B"}, {"id": 9791, "titulo": "California lanza el “pasaporte laboral” que puede ayudar a conseguir empleo sin título universitario", "url": "https://www.lanacion.com.ar/estados-unidos/california/california-lanza-el-pasaporte-laboral-que-puede-ayudar-a-conseguir-empleo-sin-titulo-universitario-nid21062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-22T01:58:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Califórnia está testando um 'passaporte laboral' digital para contratar pessoas qualificadas sem diploma universitário. O objetivo é facilitar o acesso ao mercado de trabalho para profissionais com experiência e habilidades valiosas, mesmo sem formação acadêmica formal.", "titulo_pt": "Califórnia lança 'passaporte laboral' que pode ajudar a conseguir emprego sem título universitário", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 9493, "titulo": "Lo anunció JB Pritzker en Illinois: quiénes pueden recibir los pagos únicos de US$400 para familias que perdieron SNAP", "url": "https://www.lanacion.com.ar/estados-unidos/illinois/lo-anuncio-jb-pritzker-en-illinois-quienes-pueden-recibir-los-pagos-unicos-de-us400-para-familias-nid21062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-22T01:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O governador do Illinois, JB Pritzker, anunciou pagamentos únicos de US$400 para famílias que perderam o benefício do programa SNAP. Os pagamentos serão destinados a famílias elegíveis que tiveram suas inscrições no SNAP canceladas ou suspensas em 2023.", "titulo_pt": "JB Pritzker anuncia pagamentos únicos de US$400 para famílias que perderam o SNAP no Illinois", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 9586, "titulo": "Sala cuna universal: redistribuir, no cargar", "url": "https://www.latercera.com/cartas-al-director/noticia/sala-cuna-universal-redistribuir-no-cargar/", "fonte_id": "la_tercera", "data_pub": "2026-06-22T00:50:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O artigo discute a proposta de um berço universal como forma de garantir o acesso à segurança e bem-estar infantil para todas as crianças. A ideia é que os recursos sejam redistribuídos para esse fim, em vez de serem acumulados por uma pequena parcela da população.", "titulo_pt": "Berço universal: redistribuir, não carregar", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 9481, "titulo": "Henry Ford: \"Prefiero que 20.000 empleados estén contentos y bien alimentados a que unos pocos se hagan millonarios\"", "url": "https://www.clarin.com/estados-unidos/henry-ford-prefiero-20000-empleados-contentos-bien-alimentados-pocos-hagan-millonarios_0_I5GukOYQEo.html", "fonte_id": "clarin", "data_pub": "2026-06-22T00:35:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O empresário Henry Ford afirmou preferir que 20 mil empregados estivessem satisfeitos e bem alimentados ao invés de poucos ficarem ricos.  Ford acreditava que essa visão colocava o bem-estar dos trabalhadores acima da acumulação de riqueza individual.", "titulo_pt": "Henry Ford: 'Prefiro que 20 mil empregados estejam contentes e bem alimentados a que alguns se tornem milionários'", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 10657, "titulo": "Two children die in France as heatwave blasts Europe", "url": "https://www.japantimes.co.jp/environment/2026/06/23/climate-change/france-heatwave-europe/", "fonte_id": "japan_times", "data_pub": "2026-06-22T23:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A temperatura média da França quebrou um recorde para junho. O país fechou mais de 1.350 escolas devido ao calor extremo.", "titulo_pt": "Dois crianças morrem na França enquanto onda de calor atinge a Europa", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 9963, "titulo": "Manaus quer ampliar ecobarreiras para dimunir poluição nos rios", "url": "https://veja.abril.com.br/agenda-verde/manaus-quer-ampliar-ecobarreiras-para-dimunir-poluicao-nos-rios/", "fonte_id": "veja", "data_pub": "2026-06-22T23:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A cidade de Manaus pretende ampliar as ecobarreiras utilizadas para diminuir a poluição dos rios. Desde o início de 2023, as barreiras já retiraram nove piscinas olímpicas de lixo das águas.", "titulo_pt": "Manaus quer aumentar barreiras ecológicas para reduzir poluição nos rios", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 9960, "titulo": "Onda de calor deixa 18 mortos na França, incluindo duas crianças", "url": "https://www.poder360.com.br/poder-internacional/onda-de-calor-deixa-18-mortos-na-franca-incluindo-duas-criancas/", "fonte_id": "poder360", "data_pub": "2026-06-22T22:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma onda de calor na França resultou em 18 mortes, incluindo duas crianças. A Europa está enfrentando temperaturas recordes e vários países estão reforçando medidas de emergência devido ao calor extremo.", "titulo_pt": "Onda de calor deixa 18 mortos na França, incluindo duas crianças", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 10865, "titulo": "A tropical permafrost layer in Peru may be one of the world’s largest", "url": "https://www.sciencenews.org/article/tropical-permafrost-peru-worlds-largest", "fonte_id": "science_news", "data_pub": "2026-06-22T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Vastas camadas de permafrost se encontram abaixo das encostas superiores do mais alto vulcão do Peru. O permafrost pode se tornar uma fonte regional de água à medida que os glaciares dos Andes retrocedam.", "titulo_pt": "Camada de permafrost tropical no Peru pode ser uma das maiores do mundo", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 10947, "titulo": "Project Cosmos", "url": "https://www.carbonbrief.org/project-cosmos/", "fonte_id": "carbon_brief", "data_pub": "2026-06-22T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Projeto Cosmos foi lançado pelo Carbon Brief em junho. O projeto visa fornecer informações detalhadas sobre as emissões de gases do efeito estufa e a mitigação climática.  Mais detalhes podem ser encontrados no site oficial do projeto.", "titulo_pt": "Projeto Cosmos", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 10948, "titulo": "Mapped: Inside Carbon Brief’s Cosmos database of 1.8 million climate studies", "url": "https://www.carbonbrief.org/mapped-inside-carbon-briefs-cosmos-database-of-1-8-million-climate-studies/", "fonte_id": "carbon_brief", "data_pub": "2026-06-22T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Carbon Brief lançou um banco de dados chamado Cosmos que contém mais de 1,8 milhão de estudos acadêmicos sobre o clima. O banco de dados visa fornecer acesso a uma vasta gama de pesquisas e evidências científicas sobre mudanças climáticas. O Cosmos pode ser usado para pesquisar estudos por tópicos, autores e outros critérios.", "titulo_pt": "Mapeando: Dentro do banco de dados Cosmos do Carbon Brief com 1,8 milhão de estudos sobre clima", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 10951, "titulo": "Introducing Project Cosmos: Carbon Brief’s ‘universe’ of climate science", "url": "https://www.carbonbrief.org/introducing-project-cosmos-carbon-briefs-universe-of-climate-science/", "fonte_id": "carbon_brief", "data_pub": "2026-06-22T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Projeto Cosmos da Carbon Brief é um esforço colaborativo para criar o maior banco de dados do mundo sobre ciência climática.  O projeto reunirá dados e pesquisas de diversas fontes para fornecer uma visão abrangente do conhecimento científico sobre as mudanças climáticas.", "titulo_pt": "Apresentando o Projeto Cosmos: O 'universo' de ciências climáticas da Carbon Brief", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 9487, "titulo": "Los ingenieros no dan crédito: Nuevo México inaugura el parque eólico más grande de Estados Unidos, equipado con 916 turbinas de viento y capaz de generar 3.650 megavatios, suficiente para abastecer simultáneamente a un millón de hogares en verano", "url": "https://www.clarin.com/estados-unidos/ingenieros-dan-credito-nuevo-mexico-inaugura-parque-eolico-grande-estados-unidos-equipado-916-turbinas-viento-capaz-generar-3650-megavatios-suficiente-abastecer-simultaneamente-millon-hogares-verano_0_zoIJ9sb4I4.html", "fonte_id": "clarin", "data_pub": "2026-06-22T00:23:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O parque eólico SunZia foi inaugurado em Novo México. O parque possui 916 turbinas de vento e é capaz de gerar 3.650 megawatts de energia. Isso representa 45% da capacidade eólica de Novo México.", "titulo_pt": "Engenheiros não dão crédito: Novo México inaugura o parque eólico mais grande dos Estados Unidos, equipado com 916 turbinas de vento e capaz de gerar 3.650 megawatts, suficiente para abastecer simultaneamente um milhão de lares no verão", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}], "meio_ambiente__eventos": [{"titulo": "Ranking das Publicações Climáticas Mais Citadas pelo Carbon Brief", "sumario": "O Carbon Brief publicou um ranking das publicações climáticas mais citadas em seu banco de dados Cosmos. O Carbon Brief publicou um ranking dos cientistas climáticos mais citados, baseado no projeto Cosmos, o maior banco de dados conhecido de pesquisas sobre mudanças climáticas. A análise do banco de dados Cosmos da Carbon Brief revelou as principais instituições para pesquisa sobre clima no mundo.", "artigos": [{"id": 10949, "titulo": "Carbon Brief’s ranking of the most highly cited climate publications", "url": "https://www.carbonbrief.org/carbon-briefs-ranking-of-the-most-highly-cited-climate-publications/", "fonte_id": "carbon_brief", "data_pub": "2026-06-22T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Carbon Brief publicou um ranking das publicações climáticas mais citadas em seu banco de dados Cosmos. O ranking revela as principais fontes que sustentam a pesquisa e o conhecimento sobre mudanças climáticas.  As informações são baseadas na frequência com que esses trabalhos científicos são mencionados por outros autores.", "titulo_pt": "Ranking das Publicações Climáticas Mais Citadas pelo Carbon Brief", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 10950, "titulo": "Carbon Brief’s ranking of the most highly cited climate scientists", "url": "https://www.carbonbrief.org/carbon-briefs-ranking-of-the-most-highly-cited-climate-scientists-2/", "fonte_id": "carbon_brief", "data_pub": "2026-06-22T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Carbon Brief publicou um ranking dos cientistas climáticos mais citados, baseado no projeto Cosmos, o maior banco de dados conhecido de pesquisas sobre mudanças climáticas. O projeto Cosmos contém mais de 180 milhões de citações a artigos científicos e foi usado para identificar os autores com o maior número de citações.", "titulo_pt": "Ranking do Carbon Brief dos cientistas climáticos mais citados", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 10952, "titulo": "Carbon Brief’s ranking of the most highly cited institutions", "url": "https://www.carbonbrief.org/carbon-briefs-ranking-of-the-most-highly-cited-institutions/", "fonte_id": "carbon_brief", "data_pub": "2026-06-22T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A análise do banco de dados Cosmos da Carbon Brief revelou as principais instituições para pesquisa sobre clima no mundo. O ranking está disponível no site da Carbon Brief.", "titulo_pt": "Ranking da Carbon Brief das instituições mais citadas", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}]}], "direitos_humanos": [{"id": 10718, "titulo": "Military company commander indicted for racist verbal abuse", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/23/2003859584", "fonte_id": "taipei_times", "data_pub": "2026-06-23T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um comandante militar foi indiciado por abuso verbal racista contra soldados. O caso ocorreu no quartel da 2ª Brigada de Infantaria Mecanizada do Exército em Taiwan.  O comandante fez comentários racistas durante uma reunião.", "titulo_pt": "Comandante militar indiciado por abuso verbal racista", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 10199, "titulo": "Imputaron a otro integrante de un clan narco por el asesinato de un agente de la Policía Federal", "url": "https://www.lanacion.com.ar/seguridad/imputaron-a-otro-integrante-de-un-clan-narco-por-el-asesinato-de-un-agente-de-la-policia-federal-nid22062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-22T23:30:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Jorge Muñoz foi indiciado por envolvimento no assassinato de um agente da Polícia Federal. O Ministério de Segurança Nacional oferece 20 milhões de pesos para quem fornecer informações sobre o paradeiro de seu irmão, Eduardo Muñoz.", "titulo_pt": "Outro integrante de um clã narco é acusado pelo assassinato de um agente da Polícia Federal", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 10848, "titulo": "Trump administration targets disability integration mandate in DOJ memo", "url": "https://www.statnews.com/2026/06/22/doj-memo-targets-disability-integration-olmstead-mandate/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-22T22:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo memorando do Departamento de Justiça busca reverter leis e decisões judiciais históricas sobre direitos das pessoas com deficiência. O documento visa modificar a regra que exige a integração de pessoas com deficiência em ambientes educacionais e profissionais.", "titulo_pt": "Administração Trump visa revogar mandato de integração para pessoas com deficiência em memorando do DOJ", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 10579, "titulo": "Palestinian children ‘unprotected’ as NGOs forced out of Gaza and West Bank", "url": "https://www.aljazeera.com/news/2026/6/22/palestinian-children-unprotected-as-ngos-forced-out-of-gaza-and-west-bank?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-22T20:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Israel está pressionando grupos humanitários e defensores dos direitos humanos a reduzir suas operações nos territórios palestinos ocupados. A saída dessas organizações deixa crianças palestinianas mais vulneráveis, segundo relatórios.", "titulo_pt": "Crianças palestinianas 'desprotegidas' com ONGs forçadas a sair de Gaza e Cisjordânia", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 10742, "titulo": "[Vitit Muntarbhorn] New cogs in international law", "url": "https://www.koreaherald.com/article/10784260", "fonte_id": "korea_herald", "data_pub": "2026-06-22T20:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Recentemente, um conferência sobre direito internacional foi realizada pelo Ministério de Relações Exteriores em Bangkok para dar espaço a uma nova geração de advogados. O evento serviu como um lembrete oportuno de que, embora o sistema internacional seja frágil, a Tailândia deve se engajar ativamente com os restos desse sistema.  O direito internacional é basicamente o conjunto de regras para orientar o comportamento entre estados e entre estados e outros atores internacionais.", "titulo_pt": "Novos engrenagens no direito internacional", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 10505, "titulo": "Preliminary report on killing of 11-year-old Lyhanna points to serious failings in case handling", "url": "https://www.lemonde.fr/en/france/article/2026/06/22/preliminary-report-on-killing-of-11-year-old-lyhanna-points-to-serious-failings-in-case-handling_6754761_7.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-22T19:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um relatório do Ministério da Justiça e da Gendarmerie Nacional identificou uma série de erros e falta de cumprimento de procedimentos por parte do Ministério Público em Auch e da Gendarmerie em Lectoure. O relatório se refere à morte da criança de 11 anos, Lyhanna.", "titulo_pt": "Relatório preliminar sobre morte da menina Lyhanna aponta falhas graves no caso", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 10105, "titulo": "A explosão de cubanos pedindo refúgio no Brasil: 'Com o salário de psicólogo em Cuba não dava para comprar nem 30 ovos'", "url": "https://www.bbc.com/portuguese/articles/cyv0e8j0r8zo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-22T18:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O número de cubanos buscando refúgio no Brasil superou o de venezuelanos desde 2025.  Eles usam diversos métodos para chegar ao país, incluindo rotas na mata, barcos e pagamento a 'coiotes' por US$ 10 mil.", "titulo_pt": "A explosão de cubanos pedindo refúgio no Brasil: 'Com o salário de psicólogo em Cuba não dava para comprar nem 30 ovos'", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 10025, "titulo": "Tiroteio ocorre em bairro judaico de Montreal e deixa três mortos", "url": "https://exame.com/mundo/tiroteio-ocorre-em-bairro-judaico-de-montreal-e-deixa-tres-mortos/", "fonte_id": "exame", "data_pub": "2026-06-22T17:42:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um tiroteio ocorreu no bairro Côte-des-Neiges, em Montreal, deixando três pessoas mortas. As vítimas incluem um policial, um civil e o suspeito do ataque. As autoridades ainda investigam a motivação por trás do incidente.", "titulo_pt": "Tiroteio em bairro judaico de Montreal deixa três mortos", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 10695, "titulo": "Fatal shooting exposes ‘systemic failures’ in Philippine schools", "url": "https://www.scmp.com/week-asia/people/article/3357964/fatal-shooting-exposes-systemic-failures-philippine-schools?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-22T15:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um tiroteio raro em uma escola pública no centro das Filipinas resultou na morte de três estudantes e ferimento de sete. Dois alunos do 9º ano, com 14 e 15 anos, foram presos pelo incidente na Escola Nacional de Ensino Médio de São José em Tacloban City, província de Leyte. As armas envolvidas foram um revólver calibre .38 e uma pistola 9mm.", "titulo_pt": "Tiro Fatal Exibe 'Falhas Sistêmicas' nas Escolas Filipinas", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 10696, "titulo": "Survivors fear scrutiny gaps as Hong Kong fire probe declines statutory powers", "url": "https://www.scmp.com/news/hong-kong/society/article/3357963/survivors-fear-scrutiny-gaps-hong-kong-fire-probe-declines-statutory-powers?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-22T15:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um comitê independente investigando o incêndio mais mortal de Hong Kong em décadas decidiu não buscar poderes estatutários para obrigar testemunhas a depor. O presidente do comitê, Justice David Lok Kai-hong, afirmou que o painel não pedirá ao chefe executivo para transformá-lo em uma comissão de inquérito estatutária durante a investigação do incêndio no Edifício Wang Fuk Court, ocorrido no ano passado.", "titulo_pt": "Sobreviventes temem lacunas na investigação após incêndio em Hong Kong", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 10381, "titulo": "What Happened to Tony Carruthers Is Horrifying", "url": "https://www.theatlantic.com/ideas/2026/06/lethal-injection-execution-tennessee-tony-carruthers/687639/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-22T13:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A injeção letal era considerada uma forma humana de execução. A realidade, porém, é sangrenta e brutal. O artigo discute os problemas e a crueldade da prática.", "titulo_pt": "O que aconteceu com Tony Carruthers é horrível", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 10705, "titulo": "Doctor boyfriend of sacked Hong Kong medical intern also fired for misconduct", "url": "https://www.scmp.com/news/hong-kong/health-environment/article/3357951/hong-kong-doctor-fired-over-misconduct-linked-medical-intern-case?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-22T12:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um médico do Hospital Tuen Mun, em Hong Kong, foi demitido por realizar um procedimento não autorizado em um paciente. O caso está ligado à sua namorada, uma estagiária médica que havia sido demitida e presa anteriormente por supostamente acessar dados de pacientes sem permissão. A Autoridade Hospitalar (HA) afirmou que a investigação concluiu que o médico residente agiu de forma desonesta e cometeu má conduta grave.", "titulo_pt": "Médico namorado de estagiária médica demitida em Hong Kong também é demitido por má conduta", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 10405, "titulo": "Why Indian Women Are Being Driven to Suicide", "url": "https://thediplomat.com/2026/06/why-indian-women-are-being-driven-to-suicide/", "fonte_id": "the_diplomat", "data_pub": "2026-06-22T11:35:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A perseguição por dote e a incapacidade de gerar herdeiros do sexo masculino estão levando mulheres indianas ao suicídio. O problema está forçando as mulheres a tomarem suas próprias vidas.", "titulo_pt": "Por que Mulheres Indianas estão sendo Levadas ao Suicídio", "veiculo": "The Diplomat", "pais": "Japão", "classe": "B"}, {"id": 10747, "titulo": "EU reaffirms opposition to death penalty", "url": "https://www.koreaherald.com/article/10784365", "fonte_id": "korea_herald", "data_pub": "2026-06-22T10:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A União Europeia pediu, em uma conferência em Seul, esforços globais renovados para abolir a pena de morte. A Coreia do Sul mantém um moratorium há décadas sobre execuções e é considerada por grupos internacionais de direitos humanos como 'aboliionista na prática', apesar da pena capital ainda ser legal.", "titulo_pt": "UE reafirma oposição à pena capital", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 10349, "titulo": "Marius Borg Høiby rape conviction renews focus in Norway on consent in digital age", "url": "https://www.theguardian.com/world/2026/jun/22/marius-borg-hiby-rape-conviction-case-norway-consent-digital-age-sexual-violence", "fonte_id": "guardian_world", "data_pub": "2026-06-22T10:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Marius Borg Høiby, neto do rei da Noruega, foi condenado a quatro anos de prisão por violência doméstica e duas acusações de estupro. O caso destaca o problema persistente de violência sexual na Noruega, apesar de ser considerada um dos países mais igualitários em relação ao gênero.", "titulo_pt": "Conviction de Marius Borg Høiby renova foco na Noruega sobre consentimento na era digital", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 10664, "titulo": "Japan commemorates victims of discriminatory leprosy policy", "url": "https://www.japantimes.co.jp/news/2026/06/22/japan/society/leprosy-patients-honor-restoring/", "fonte_id": "japan_times", "data_pub": "2026-06-22T08:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um cerimonial foi realizado em Tóquio para restaurar a honra de pacientes com hanseníase no Japão, que sofreram discriminação severa devido a uma política de isolamento forçado. O evento busca reconhecer os danos causados por essa política e honrar as vítimas.", "titulo_pt": "Japão comemora vítimas da política discriminatória contra hanseníase", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}], "direitos_humanos__eventos": []}, "noticias": [{"id": 10716, "fonte_id": "taipei_times", "titulo": "Suicide 10th-leading cause of death last year", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/23/2003859582", "data_pub": "2026-06-23T00:00:00Z", "topico": "sociedade", "idioma": "en", "titulo_pt": "Suicídio é a décima causa de morte no ano passado", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 10718, "fonte_id": "taipei_times", "titulo": "Military company commander indicted for racist verbal abuse", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/23/2003859584", "data_pub": "2026-06-23T00:00:00Z", "topico": "direitos_humanos", "idioma": " const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
