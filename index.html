more Revelam um Mundo de Misticismo Medieval Mágico", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 15265, "titulo": "Pass the sick bag! Why I published a book on the art of the airline essential", "url": "https://www.theguardian.com/books/2026/jun/24/sicko-sick-bag-book-elizabeth-mccaferty", "fonte_id": "guardian_culture", "data_pub": "2026-06-24T11:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O livro Sicko reúne centenas de sacos do vômito de companhias aéreas. O autor, Trevor Cunning, começou seu projeto em 2023 e se tornou entusiasta da beleza dos designs dos sacos. O livro explora histórias sobre os sacos, como um relato de uma viagem infernal de Delhi após passageiros beberem água insalubre.", "titulo_pt": "Passe o saco do vômito! Por que publiquei um livro sobre a arte do essencial da companhia aérea", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 14411, "titulo": "Acervo da USP revela novas faces do pensador negro Milton Santos", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/acervo-da-usp-revela-novas-faces-do-pensador-negro-milton-santos", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-24T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Vinte e cinco anos após a morte de Milton Santos, pesquisas no Instituto de Estudos Brasileiros (IEB-USP) estão revelando aspectos pouco conhecidos do pensador. O acervo de Santos, com cerca de 60 mil itens, tem sido analisado por uma nova geração de estudantes que buscam reformular as pesquisas sobre intelectuais negros.", "titulo_pt": "Acervo da USP revela novas faces do pensador negro Milton Santos", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 14557, "titulo": "Festa Junina: a origem da celebração pagã que virou religiosa e 'caipira' no Brasil", "url": "https://www.bbc.com/portuguese/articles/crggg1np8dxo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-24T10:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As festas pagãs de antigas civilizações foram incorporadas pelo catolicismo, dando origem às festas juninas. No Brasil, as festas juninas foram reinventadas com características próprias.", "titulo_pt": "Festa Junina: a origem da celebração pagã que se tornou religiosa e 'caipira' no Brasil", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 15273, "titulo": "Misan Harriman to step down as chair of Southbank Centre", "url": "https://www.theguardian.com/culture/2026/jun/24/misan-harriman-to-step-down-chair-southbank-centre", "fonte_id": "guardian_culture", "data_pub": "2026-06-24T09:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Misan Harriman anunciou que não buscará outro mandato como presidente do Southbank Centre e deixará o cargo no outono. A decisão ocorre após um mês de pressão devido a acusações de que ele compartilhou uma teoria da conspiração sobre o ataque em Golders Green.", "titulo_pt": "Misan Harriman deixa cargo no Southbank Centre", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 15270, "titulo": "‘A mermaid brushed her hair while people put objects under her boobs’: discover the tiny secret festivals rivalling Glasto for vibes", "url": "https://www.theguardian.com/music/2026/jun/24/secret-festivals-loveshack-killer-wales-come-bye-oddfolk", "fonte_id": "guardian_culture", "data_pub": "2026-06-24T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Alguns fãs de festivais estão criando eventos anárquicos e gratuitos, repletos de brilho e tolices, como alternativa a festivais caros e com muita publicidade. Esses festivais costumam ser realizados em locais inesperados, como estábulos rurais, e têm temas de fantasia e fantasias. Os participantes geralmente trazem seus próprios objetos para compartilhar e criar uma atmosfera única.", "titulo_pt": "'Uma sereia penteou o cabelo enquanto as pessoas colocavam objetos sob seus seios': descubra os pequenos festivais secretos que rivalizam com o Glastonbury por vibrações", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 14362, "titulo": "Ana Castela não descarta carreira de atriz após 'Coração Acelerado': 'Se couber na agenda'", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/ana-castela-nao-descarta-carreira-de-atriz-apos-coracao-acelerado-se-couber-na-agenda.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-24T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ana Castela, que está atuando na novela 'Coração Acelerado', da Globo, afirmou que não descarta seguir carreira como atriz. O desempenho da cantora no papel tem recebido elogios nas redes sociais e a novela tem registrado aumento de audiência com suas aparições.", "titulo_pt": "Ana Castela não descarta carreira de atriz após 'Coração Acelerado': 'Se couber na agenda'", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 15269, "titulo": "‘The American experiment is clearly ongoing’: Netflix series examines how the US was founded", "url": "https://www.theguardian.com/tv-and-radio/2026/jun/24/the-american-experiment-netflix-series", "fonte_id": "guardian_culture", "data_pub": "2026-06-24T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma nova série documental apresenta figuras como Kamala Harris, Al Gore, Mike Pence e Hillary Clinton refletindo sobre as origens dos Estados Unidos. O primeiro episódio termina com a música 'Devil's Spoke' de Laura Marling, que alerta sobre a fragilidade da nação. A série se aproxima do 250º aniversário da fundação americana.", "titulo_pt": "'O experimento americano está claramente em curso': série da Netflix examina como os EUA foram fundados", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 15271, "titulo": "The best American LGBTQ+ books, chosen by authors", "url": "https://www.theguardian.com/books/ng-interactive/2026/jun/24/best-american-lgbtq-books-authors", "fonte_id": "guardian_culture", "data_pub": "2026-06-24T08:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Escritores como Michael Cunningham, Hilton Als e Eileen Myles compartilharam seus livros favoritos sobre a vida LGBTQ+. O artigo destaca 'Joseph and His Friend: A Story of Pennsylvania', de 1870, como o primeiro livro LGBTQ+ americano aclamado. O texto compara a tradição literária americana LGBTQ+ com a britânica, mencionando autores como Oscar Wilde e Jeanette Winterson.", "titulo_pt": "Os melhores livros LGBTQ+ americanos, escolhidos por autores", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 15272, "titulo": "I’ve seen Chekhov’s Cherry Orchard 20 times – and it blossoms when tended by the British | Michael Billington", "url": "https://www.theguardian.com/stage/2026/jun/24/ive-seen-chekhov-cherry-orchard-20-times-blossoms-british", "fonte_id": "guardian_culture", "data_pub": "2026-06-24T07:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Helen Hunt e Kristin Scott Thomas estão liderando revivals do clássico russo cuja mistura de comédia e tragédia está incorporada à nossa própria herança dramática. Uma nova produção estrelando Helen Hunt e Kenneth Branagh está sendo apresentada em Stratford, lembrando que o tipo de peça que é O Jardim das Cerejeiras é uma questão que as pessoas têm feito desde a sua criação.", "titulo_pt": "Eu vi A Gaiola de Passarinho de Chekhov 20 vezes – e floresce quando cuidada pelos britânicos", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 14363, "titulo": "Globo dobra tempo do pré-jogo de Brasil x Escócia após avanço do SBT na audiência", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/globo-dobra-tempo-do-pre-jogo-de-brasil-x-escocia-apos-avanco-do-sbt-na-audiencia.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-24T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Globo mudou a programação da transmissão do jogo entre Brasil e Escócia, aumentando o tempo do pré-jogo. A mudança foi motivada pela alta audiência do SBT na cobertura da partida.", "titulo_pt": "Globo aumenta tempo do pré-jogo do Brasil x Escócia após SBT ganhar audiência", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 14364, "titulo": "'O Urso', na temporada final, tenta recuperar seu prestígio com substituição na cozinha", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/o-urso-na-temporada-final-tenta-recuperar-seu-prestigio-com-substituicao-na-cozinha.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-24T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A série 'O Urso' está chegando ao fim e busca recuperar sua popularidade. Carmen Berzatto, personagem interpretado por Jeremy Allen White, herdou a lanchonete de família após a morte do irmão mais velho. O restaurante foi transformado em um estabelecimento de luxo, mas o personagem continua com as mesmas características.", "titulo_pt": "'O Urso', na temporada final, tenta recuperar seu prestígio com mudança na cozinha", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 15276, "titulo": "‘Like a phoenix rising from its ashes’: queer Muslim life in France – in pictures", "url": "https://www.theguardian.com/artanddesign/gallery/2026/jun/24/queer-muslim-life-in-france-in-pictures-camille-farrah-lenain-made-of-smokeless-fire", "fonte_id": "guardian_culture", "data_pub": "2026-06-24T06:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O livro de fotografias 'Made of Smokeless Fire', de Camille Farrah Lenain, foi inspirado pela tristeza pelo seu tio gay Farid.  Lenain diz que ele partiu sem responder às perguntas que ela tinha para ele. O livro explora a vida queer muçulmana na França através de fotos.", "titulo_pt": "'Como um fenix nascendo das cinzas': a vida queer muçulmana na França - em fotos", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 15266, "titulo": "‘I carry the pain of the world’: Oscar-winning singer Camille on her tumultuous triple album about motherhood", "url": "https://www.theguardian.com/music/2026/jun/24/pain-oscar-winning-singer-camille-triple-album-motherhood", "fonte_id": "guardian_culture", "data_pub": "2026-06-24T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A cantora francesa Camille lançou um álbum triplo chamado 'The Sound of Milk', que documenta as fases da vida de seus dois filhos. O álbum foi composto em três partes: 'Naissance' (2015), 'Enfance' (2020) e 'Adolescence' (2025). Camille poderia ter lançado cada parte quando estava completa, mas decidiu esperar até estar pronta.", "titulo_pt": "'Eu carrego a dor do mundo': Camille, vencedora do Oscar, sobre seu álbum triplo tumultuado sobre maternidade", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 15267, "titulo": "From The West Wing to Blackadder: the best fictional prime ministers on TV", "url": "https://www.theguardian.com/tv-and-radio/2026/jun/24/best-fictional-tv-prime-ministers-west-wing-blackadder", "fonte_id": "guardian_culture", "data_pub": "2026-06-24T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo discute os melhores primeiros-ministros fictícios da televisão britânica, como Stephen Fry, Emma Thompson e Alan B'Stard.  Ele também observa que o Reino Unido está procurando um novo primeiro-ministro pela sétima vez em dez anos, levando a especulações sobre uma porta giratória no número 10 de Downing Street.", "titulo_pt": "Do West Wing a Blackadder: os melhores primeiros-ministros fictícios na TV", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 15274, "titulo": "UK’s museums and galleries left vulnerable to cyber-attack and theft, MPs warn", "url": "https://www.theguardian.com/culture/2026/jun/24/museums-galleries-vulnerable-cyber-attack-theft", "fonte_id": "guardian_culture", "data_pub": "2026-06-24T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um relatório da comissão de contas públicas (PAC) afirmou que falhas de segurança recentes em museus britânicos, como o roubo de milhares de artefatos do British Museum e um ataque cibernético ao British Library, expuseram fraquezas no setor. O relatório também indica que o governo não adotou uma abordagem estratégica para prevenir futuros incidentes.", "titulo_pt": "Museus e galerias do Reino Unido deixados vulneráveis a ataques cibernéticos e roubos, alertam parlamentares", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}], "cultura__eventos": [], "sociedade": [{"id": 14720, "titulo": "Crisis de natalidad: la urgencia de la corresponsabilidad social en el cuidado", "url": "https://www.latercera.com/paula/noticia/crisis-de-natalidad-la-urgencia-de-la-corresponsabilidad-social-en-el-cuidado/", "fonte_id": "la_tercera", "data_pub": "2026-06-24T12:45:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Consultório Legal desta edição aborda o caso de Carolina, que hesita em ter outro filho não por falta de desejo, mas pela desigual distribuição das tarefas de cuidado. Essa realidade pode estar relacionada à crise demográfica do país e levanta questões sobre as condições atuais da criação de filhos.", "titulo_pt": "Crise natalícia: a urgência da responsabilidade social no cuidado", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 14542, "titulo": "Na Alemanha, falha em manutenção programada paralisa todos os trens do país", "url": "https://www.infomoney.com.br/mundo/na-alemanha-falha-em-manutencao-programada-paralisa-todos-os-trens-do-pais/", "fonte_id": "infomoney", "data_pub": "2026-06-24T12:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um problema no sistema digital de comunicação interrompeu o tráfego ferroviário na Alemanha por duas horas na noite de terça-feira. A falha ocorreu durante uma manutenção programada e gerou caos e críticas à infraestrutura ferroviária alemã.", "titulo_pt": "Falha na Alemanha paralisa todos os trens do país", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 14485, "titulo": "Polícia resgata 141 animais em gatil clandestino na zona Leste de SP", "url": "https://www.cnnbrasil.com.br/nacional/sudeste/sp/policia-resgata-141-animais-em-gatil-clandestino-na-zona-leste-de-sp/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-24T12:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Policiais encontraram 136 gatos de raça e 5 cães spitz alemão desidratados e presos em um galpão na zona Leste de São Paulo. Uma médica veterinária foi presa em flagrante durante a operação.", "titulo_pt": "Polícia resgata 141 animais em abrigo clandestino na zona Leste de SP", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 14489, "titulo": "Cena de Tony Ramos em “Quem Ama Cuida” gera revolta: “Difícil de assistir”", "url": "https://www.cnnbrasil.com.br/pop/tv/cena-de-tony-ramos-em-quem-ama-cuida-gera-revolta-dificil-de-assistir/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-24T12:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma cena do ator Tony Ramos na novela 'Quem Ama Cuida' gerou reações negativas nas redes sociais. A sequência foi considerada por alguns como homofóbica. O público se manifestou sobre o ocorrido nas plataformas digitais.", "titulo_pt": "Cena de Tony Ramos em 'Quem Ama Cuida' gera revolta: 'Difícil de assistir'", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 14502, "titulo": "Thelminha atinge pico de buscas após fim de disputa judicial por racismo", "url": "https://www.cnnbrasil.com.br/pop/celebridades/thelminha-atinge-pico-de-buscas-apos-fim-de-disputa-judicial-por-racismo/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-24T11:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A médica Thelminha teve um aumento nas buscas na internet após o fim do processo judicial que movia contra o empresário Rodrigo Branco.  O caso envolveu comentários feitos por Branco durante a edição 20 do programa Big Brother Brasil, considerados racistas por Thelminha.", "titulo_pt": "Thelminha registra pico de buscas após fim da disputa judicial por racismo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 15063, "titulo": "Schools in Tokyo suburb to get bear sprays", "url": "https://www.japantimes.co.jp/news/2026/06/24/japan/tokyo-schools-bear-spray/", "fonte_id": "japan_times", "data_pub": "2026-06-24T10:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Japão registrou um recorde de 13 pessoas mortas por ursos no último ano fiscal.  Entre abril e maio deste ano, mais cinco pessoas morreram e 20 ficaram feridas em ataques de ursos.", "titulo_pt": "Escolas em subúrbio de Tóquio receberão sprays contra ursos", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 14758, "titulo": "How generosity became cringe", "url": "https://www.vox.com/the-highlight/489796/generosity-internet-cringe-optimism", "fonte_id": "vox", "data_pub": "2026-06-24T10:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Bill Gates desafiou Elon Musk, Ryan Seacrest e Chris Anderson do TED a participarem de um desafio de água fria.  Gates fez o desafio em seu jardim, puxando uma corda que liberou um barril de água gelada sobre si mesmo. O trecho original faz parte de uma história publicada no The Highlight.", "titulo_pt": "Como a Generosidade Tornou-se Um Ato Vergonhoso", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 15123, "titulo": "Hong Kong records 91 suspected student suicides in 3 years, majority boys", "url": "https://www.scmp.com/news/hong-kong/education/article/3358221/hong-kong-records-91-suspected-student-suicides-3-years-majority-boys?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-24T10:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As autoridades educacionais de Hong Kong revelaram que 91 alunos tiveram supostos casos de suicídio entre 2023 e 2025. A maioria dos casos envolveu alunos do ensino médio e meninos. O número de casos suspeitos fatais entre alunos do ensino fundamental e médio foi de 32 em 2023, 28 em 2024 e 31 em 2025.", "titulo_pt": "Hong Kong registra 91 suicídios suspeitos de estudantes em 3 anos, maioria meninos", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 14741, "titulo": "Por qué estamos agotados y cómo dejar de culparnos por ello, según Claudia Lewis y Camilo Pino", "url": "https://www.latercera.com/tendencias/noticia/por-que-estamos-agotados-y-como-dejar-de-culparnos-por-ello-segun-claudia-lewis-y-camilo-pino/", "fonte_id": "la_tercera", "data_pub": "2026-06-24T10:02:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Os filósofos Claudia Lewis e Camilo Pino lançaram o livro 'Por que Nos Sentimos tão Mal?', onde analisam a causa do mal-estar generalizado na sociedade.  Eles argumentam que esse sentimento é um sintoma de uma época que transformou a vida em uma competição infinita.", "titulo_pt": "Por que Estamos Cansados e Como Parar de Nos Culpar por Isso, Segundo Claudia Lewis e Camilo Pino", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 15124, "titulo": "Wife of ALS-stricken China e-commerce tycoon refuses divorce despite request", "url": "https://www.scmp.com/news/people-culture/china-personalities/article/3358200/wife-als-stricken-china-e-commerce-tycoon-refuses-divorce-despite-request?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-24T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cai Lei, um dos pacientes mais conhecidos de Esclerose Lateral Amiotrófica (ELA) da China, luta contra a doença há sete anos.  Após receber o diagnóstico em 2019, ele se tornou um dos maiores defensores globais contra a doença, investindo mais de 100 milhões de yuan (US$ 15 milhões). Sua esposa, Duan Rui, tem apoiado-o e também se tornado uma referência para outras famílias afetadas por ELA.", "titulo_pt": "Esposa do magnata chinês com ELA se recusa a divorciar apesar do pedido", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 14563, "titulo": "Os 'Messias' da machosfera: o negócio por trás do desprezo pelas mulheres na internet", "url": "https://www.bbc.com/portuguese/articles/cp3xvqxp0d1o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-24T07:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O movimento machista conhecido como 'machosfera', iniciado em países ricos, se espalhou globalmente. Influenciadores digitais ligados a essa ideologia estão presentes na África e América Latina.  A BBC Brasil investiga o negócio por trás do discurso de ódio e desprezo às mulheres promovido nesse ambiente online.", "titulo_pt": "Os 'Messias' da Machosfera: O Negócio Por Trás do Desprezo pelas Mulheres na Internet", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 15153, "titulo": "(LEAD) Seoul city council passes ordinance on free bus rides for people aged over 70", "url": "https://en.yna.co.kr/view/AEN20260624006651315", "fonte_id": "yonhap_news", "data_pub": "2026-06-24T07:44:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Conselho Metropolitano de Seul aprovou uma ordenança que estabelece o transporte público gratuito para pessoas com mais de 70 anos. A nova regra entrará em vigor a partir de janeiro de 2024. O objetivo é facilitar o acesso ao transporte público para idosos.", "titulo_pt": "Câmara Municipal de Seul aprova ordenança sobre transporte público gratuito para pessoas acima de 70 anos", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 15079, "titulo": "Trapped on Everest for days, Nepali survivor recounts escape", "url": "https://www.japantimes.co.jp/news/2026/06/24/asia-pacific/everest-nepali-survivor-escape/", "fonte_id": "japan_times", "data_pub": "2026-06-24T05:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um alpinista nepalês ficou preso no Monte Everest por vários dias e quase desistiu da esperança. Sua família começou a se preparar para o falecimento dele quando uma avalanche o ajudou a escapar.", "titulo_pt": "Preso no Everest por dias, sobrevivente nepalês relata fuga", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 14744, "titulo": "Play puts spotlight on Kenya’s crisis of gender-based violence", "url": "https://www.theguardian.com/world/2026/jun/24/kenya-play-free-me-gender-based-violence", "fonte_id": "guardian_world", "data_pub": "2026-06-24T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A peça autobiográfica 'Free Me', escrita por Gathoni Kimuyu, retrata uma cena de agressão doméstica que causa reações no público em Nairobi. A peça visa encorajar vítimas de violência a se manifestarem no país onde os casos estão aumentando. Gathoni Kimuyu é uma produtora teatral e televisiva queniana que passou por um casamento abusivo.", "titulo_pt": "Peça teatral destaca crise de violência contra a mulher no Quênia", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 14918, "titulo": "Aircon: the latest front in France’s culture wars", "url": "https://www.ft.com/content/b9abbdc4-0993-4e7b-bb68-75d02d644ecc", "fonte_id": "financial_times", "data_pub": "2026-06-24T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "À medida que a onda de calor se intensifica, grupos de direita defendem o ar-condicionado enquanto a esquerda defende reformas e espaços verdes.  O debate surge em meio à busca por soluções para lidar com as altas temperaturas.", "titulo_pt": "Ar condicionado: a última frente nas guerras culturais da França", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 14467, "titulo": "Homem morto em acidente no Eixinho saía de local onde trabalhava há 23 anos", "url": "https://www.metropoles.com/distrito-federal/homem-morto-em-acidente-no-eixinho-saia-de-local-onde-trabalhava-ha-23-anos", "fonte_id": "metropoles", "data_pub": "2026-06-24T03:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um homem morreu em um acidente no Eixinho, em Brasília. Ele estava saindo do local onde trabalhava há 23 anos quando o acidente ocorreu.", "titulo_pt": "Homem morto em acidente no Eixinho saía de local onde trabalhava há 23 anos", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 14852, "titulo": "In heatwave, some French museums and monuments become cool havens while others are forced to close", "url": "https://www.lemonde.fr/en/culture/article/2026/06/24/in-heatwave-some-french-museums-and-monuments-become-cool-havens-while-others-are-forced-to-close_6754832_30.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-24T12:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Diversos locais culturais se transformaram em refúgios climáticos oferecendo entrada gratuita. Outros tiveram que interromper as visitas devido ao calor extremo.", "titulo_pt": "Em onda de calor, alguns museus e monumentos franceses se tornam refúgios frios enquanto outros são fechados", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 14858, "titulo": "Heatwave-hit Europe must adapt health care, says WHO", "url": "https://www.lemonde.fr/en/environment/article/2026/06/24/heatwave-hit-europe-must-adapt-health-care-says-who_6754831_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-24T11:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Temperaturas continuaram a subir na Europa durante a onda de calor recorde, deixando milhares de pessoas sem energia. O continente está mal preparado para lidar com o calor intenso.", "titulo_pt": "Europa atingida por onda de calor precisa se adaptar à saúde, diz OMS", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 15117, "titulo": "Reducing fire risk to zero would cost huge amount, Tai Po blaze inquiry hears", "url": "https://www.scmp.com/news/hong-kong/society/article/3358229/reducing-fire-risk-zero-would-cost-huge-amout-tai-po-blaze-inquiry-hears?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-24T11:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma investigação pública sobre o incêndio mais mortal de Hong Kong em décadas ouviu que exigir materiais incombustíveis para grandes reformas em condomínios é irrealista. O uso de placas de poliuretano para vedar janelas foi um dos cinco fatores-chave que levaram à morte de 168 pessoas no Wang Fuk Court em Tai Po no ano passado, afirmaram especialistas na sessão da investigação pública.", "titulo_pt": "Reduzir risco de incêndio para zero teria custo enorme, ouve-se na investigação do incêndio em Tai Po", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 14926, "titulo": "France suffers major power outage as Europe sizzles in record-breaking heat", "url": "https://www.cnbc.com/2026/06/24/france-power-outage-europe-heat-wave.html", "fonte_id": "cnbc_international", "data_pub": "2026-06-24T10:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um apagão ligado ao calor deixou cerca de 68 mil residências sem eletricidade no oeste da França.  A Europa está enfrentando uma onda de calor com temperaturas recordes.", "titulo_pt": "França sofre grande apagão de energia enquanto Europa registra calor recorde", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 14919, "titulo": "Britain’s grid operator calls for more electricity as temperatures soar", "url": "https://www.ft.com/content/e06a95bb-f592-4abe-a58e-e314075b9db9", "fonte_id": "financial_times", "data_pub": "2026-06-24T10:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O calor extremo aumenta a demanda por energia e reduz a eficiência dos painéis solares. O operador da rede elétrica do Reino Unido pediu que as pessoas economizem energia devido ao aumento da demanda.", "titulo_pt": "Operador da rede elétrica britânica pede por mais energia com o aumento das temperaturas", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 14964, "titulo": "How to stay cool and treat heatstroke during a heatwave", "url": "https://www.aljazeera.com/news/2026/6/24/how-to-stay-cool-and-treat-heatstroke-during-a-heatwave?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-24T10:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O golpe de calor é uma condição médica grave que ocorre quando a temperatura interna do corpo humano excede 40°C (104°F). É importante tomar medidas para se manter fresco durante uma onda de calor, como beber bastante água e evitar o sol forte. Se você suspeitar que alguém está com golpe de calor, procure ajuda médica imediatamente.", "titulo_pt": "Como se manter fresco e tratar golpe de calor durante uma onda de calor", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 14742, "titulo": "Las regiones de Chile que tendrán lluvia los próximos días, según el tiempo", "url": "https://www.latercera.com/tendencias/noticia/las-regiones-de-chile-que-tendran-lluvia-los-proximos-dias-segun-el-tiempo/", "fonte_id": "la_tercera", "data_pub": "2026-06-24T10:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um novo sistema frontal trará chuva para várias regiões do Chile. O pronóstico detalha onde se espera chuva nos próximos dias.", "titulo_pt": "Regiões do Chile que terão chuva nos próximos dias, segundo o tempo", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 14853, "titulo": "Heatwave in Europe: From Spain to Germany, an unprecedented 'red zone' sweeps across continent", "url": "https://www.lemonde.fr/en/climate-change/article/2026/06/24/heatwave-from-spain-to-germany-an-unprecedented-red-zone-sweeps-across-europe_6754827_152.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-24T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Países vizinhos da França também estão enfrentando temperaturas recordes. Apesar de alguns países do sul estarem mais acostumados a esse tipo de clima, a Europa ainda não está suficientemente preparada para as mudanças climáticas, apesar de ser altamente exposta aos seus efeitos.", "titulo_pt": "Ondas de calor na Europa: de Espanha a Alemanha, uma 'zona vermelha' sem precedentes atravessa o continente", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 14752, "titulo": "Bird flu confirmed in South Australia as infected petrel brings deadly H5N1 cases to three", "url": "https://www.theguardian.com/environment/2026/jun/24/bird-flu-case-confirmed-south-australia-western-australia-suspected", "fonte_id": "guardian_world", "data_pub": "2026-06-24T08:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A gripe aviária mortal H5N1 foi confirmada em dois estados australianos após um ave marinheira migratória testar positivo na Austrália do Sul.  Há também um caso suspeito na Austrália Ocidental, em um petrel gigante do sul encontrado morto na região de Quindalup.", "titulo_pt": "Gripe aviária confirmada na Austrália do Sul, enquanto petrel infectado traz casos de H5N1 para três", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 15069, "titulo": "Double barrage of storms to hit Japan this week", "url": "https://www.japantimes.co.jp/news/2026/06/24/japan/typhoons-june-japan/", "fonte_id": "japan_times", "data_pub": "2026-06-24T07:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Japão enfrentará duas tempestades simultaneamente: o Tufão Mekkhala e a Tempestade Tropical Higos. As previsões indicam ventos fortes e chuvas intensas em todo o país.", "titulo_pt": "Dupla barreira de tempestades atingir o Japão nesta semana", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 14986, "titulo": "Dead tree painted red to highlight climate change impact", "url": "http://www.euronews.com/video/2026/06/24/dead-tree-painted-red-to-highlight-climate-change-impact", "fonte_id": "euronews", "data_pub": "2026-06-24T07:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma carvalho pintada de vermelho, morta na onda de calor de 2022 no Kew Gardens, está ao lado de uma árvore chamada 'Árvore da Esperança', que sobreviveu. A instalação visa destacar os impactos da mudança climática no Reino Unido.", "titulo_pt": "Árvore morta pintada de vermelho para destacar impacto da mudança climática", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 15028, "titulo": "HARVEST: Crisis? What crisis?", "url": "https://www.euractiv.com/news/harvest-crisis-what-crisis/", "fonte_id": "euractiv", "data_pub": "2026-06-24T06:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A edição de hoje aborda o Conselho da CAP, o Conselho Agrícola e Pesqueiro e a UE-México.  O texto destaca as principais discussões e decisões tomadas em cada área.", "titulo_pt": "COLHEITA: Crise? Que crise?", "veiculo": "Euractiv", "pais": "Europa", "classe": "B"}, {"id": 14978, "titulo": "Deadly heatwave grips Europe as temperatures soar across continent", "url": "https://www.aljazeera.com/video/newsfeed/2026/6/24/aje-onl-nf_deadly-heatwave-grips-europe-as-temperatures-soars-240626?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-24T05:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma onda de calor intensa atingiu a Europa, levando a alertas vermelhos de calor, o nível mais alto, tanto na Grã-Bretanha quanto na França. As altas temperaturas estão causando preocupação em todo o continente.", "titulo_pt": "Ondas de calor mortais afetam a Europa enquanto as temperaturas sobem pelo continente", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 15030, "titulo": "Beyond Fossil Thinking: Electrifying Our Future Resilience", "url": "https://www.euractiv.com/opinion/beyond-fossil-thinking-electrifying-our-future-resilience/", "fonte_id": "euractiv", "data_pub": "2026-06-24T05:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A transição para uma economia de baixo carbono não é mais uma ambição distante, mas uma necessidade operacional. Na Sappi, a jornada de decarbonização se baseia em intervenções práticas e escaláveis que fortalecem tanto o desempenho ambiental quanto a resiliência empresarial a longo prazo.", "titulo_pt": "Além do Pensamento Fósseis: Eletrificando Nossa Resiliência Futura", "veiculo": "Euractiv", "pais": "Europa", "classe": "B"}, {"id": 14915, "titulo": "Heatwave shows we are marinating in a crisis of our own making", "url": "https://www.ft.com/content/f059869e-294b-42b7-bf38-fe55b46ad812", "fonte_id": "financial_times", "data_pub": "2026-06-24T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A inação política na batalha contra as mudanças climáticas é cara e está ficando cada vez mais cara. O custo das consequências do aquecimento global, como ondas de calor intensas, aumenta a cada dia.", "titulo_pt": "Ondas de calor mostram que estamos imersos em uma crise de nossa própria criação", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 14560, "titulo": "40 mortos por afogamento na França: o que é o 'domo de calor' que está causando temperaturas extremas na Europa", "url": "https://www.bbc.com/portuguese/articles/c17y9nlz0v1o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-24T01:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um domo de calor causa temperaturas extremas na Europa, com 40 mortes registradas por afogamento na França. A onda de calor se intensificará nos próximos dias na Europa Ocidental e Central, com previsões de temperaturas acima de 40 graus Celsius.", "titulo_pt": "40 mortos por afogamento na França: o que é o 'domo de calor' que está causando temperaturas extremas na Europa", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 14743, "titulo": "France confirms first Ebola case in doctor who had worked in DRC", "url": "https://www.theguardian.com/world/2026/jun/24/france-ebola-first-case-doctor-drc", "fonte_id": "guardian_world", "data_pub": "2026-06-24T12:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A França confirmou o primeiro caso de Ebola em um médico que retornou de uma missão humanitária na República Democrática do Congo. O paciente foi transferido para uma instalação especializada e está em estado estável. As autoridades estão rastreando os contatos do paciente.", "titulo_pt": "França confirma primeiro caso de Ebola em médico que trabalhou na República Democrática do Congo", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 15115, "titulo": "29 arrested in crackdown on loan sharks who charged victims 3,000% in interest", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3358236/29-arrested-crackdown-loan-sharks-who-charged-victims-3000-interest?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-24T11:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A polícia de Hong Kong prendeu 29 pessoas por participarem de uma organização criminosa envolvida com empréstimos usurais e lavagem de dinheiro. O grupo se passava por empresas financeiras licenciadas, contatando pessoas aleatoriamente para oferecer empréstimos com taxas de juros anuais de até 3000%. A polícia afirmou que o sindicato estabeleceu um centro de chamadas secreto em Tsuen Wan e obteve informações pessoais das vítimas.", "titulo_pt": "29 pessoas presas em crackdown contra emprestadores de dinheiro que cobravam 3000% de juros", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 15168, "titulo": "Korea gives stalking victims real-time access to suspects’ location", "url": "https://www.koreaherald.com/article/10787153", "fonte_id": "korea_herald", "data_pub": "2026-06-24T08:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo da Coreia do Sul lançou um novo sistema de alerta móvel para proteger melhor as vítimas de perseguição. O sistema permite que as vítimas vejam a localização atual e a direção de movimento de um stalker suspeito usando monitor eletrônico no tornozelo. A medida foi introduzida após crescentes preocupações sobre a eficácia das proteções existentes.", "titulo_pt": "Coreia do Sul dá às vítimas de perseguição acesso em tempo real à localização dos suspeitos", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 15150, "titulo": "Gov't to seek disciplinary measures for 17 fire officials over death of female firefighter", "url": "https://en.yna.co.kr/view/AEN20260624010000315", "fonte_id": "yonhap_news", "data_pub": "2026-06-24T08:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo coreano decidiu solicitar medidas disciplinares contra 17 oficiais de incêndio devido à morte de uma bombeira. A decisão foi tomada após uma investigação que apontou falhas no procedimento durante um incêndio.", "titulo_pt": "Governo buscará medidas disciplinares contra 17 oficiais de incêndio por morte de bombeiro feminina", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 15133, "titulo": "Singaporean woman jailed for slapping, punching helper over job performance", "url": "https://www.scmp.com/news/asia/southeast-asia/article/3358181/singaporean-woman-jailed-slapping-punching-helper-over-job-performance?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-24T07:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma mulher de 67 anos, Hazel Phang Fong Yen, foi condenada a quatro meses de prisão por agressão contra sua empregada doméstica. A mulher ficou irritada com o desempenho da empregada em tarefas como lavar roupa e limpar garrafas, batendo, socando e arranhando a vítima.  A vítima relatou o abuso ao Centro para Empregados Domésticos (CDE) durante uma chamada de rotina.", "titulo_pt": "Mulher de Singapura é presa por agredir empregada doméstica", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 14554, "titulo": "Mãe denuncia ameaça a filho de 3 anos em escola militar no RS: 'Chora com vontade, senão vou te dar um tiro'", "url": "https://www.bbc.com/portuguese/articles/crlw3djpxl9o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-24T07:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma mãe denunciou uma ameaça contra o filho de 3 anos em uma escola militar no Rio Grande do Sul. A criança começou a demonstrar medo ao chegar na escola, levando a mãe a gravar o que acontecia dentro da instituição. O caso está sendo investigado pelo Ministério Público gaúcho.", "titulo_pt": "Mãe denuncia ameaça a filho de 3 anos em escola militar no RS: 'Chora com vontade, senão vou te dar um tiro'", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 15156, "titulo": "Police identify, summon woman over solo blockade of vote counting center", "url": "https://en.yna.co.kr/view/AEN20260624008100315", "fonte_id": "yonhap_news", "data_pub": "2026- o": "meio_ambiente", "idioma": "en", "titulo_pt": "Evacuações recomendadas após formação de lago barreira em Hualien", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 14369, "fonte_id": "folha_ilustrada", "titulo": "Angela Davis estará na Flip pela primeira vez em programação do Sesc", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/angela-davis-estara-na-flip-pela-primeira-vez-em-programacao-do-sesc.shtml", "data_pub": "2026-06-24T00:00:00Z", "topico": "cultura", "idioma": "pt", "titulo_pt": "Angela Davis estará na Flip pela primeira vez na programação do Sesc", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}]};
const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
