res americanas nos países do Golfo, destruindo um centro de manutenção e reparo de aviões e um centro de comando e controle em Al Udeid, base aérea da Qatar. A Defesa do Qatar afirmou que interceptou o ataque.", "titulo_pt": "IRGC afirma ataques a instalações militares americanas nos países do golfo e interrompe outra embarcação", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 47399, "titulo": "Navy searches for sailor missing during East Sea patrol", "url": "https://en.yna.co.kr/view/AEN20260712001800315", "fonte_id": "yonhap_news", "data_pub": "2026-07-12T04:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um marinheiro desapareceu durante uma patrulha no Mar do Leste a bordo de um navio da marinha. As buscas estão sendo realizadas.", "titulo_pt": "Marinheiro desaparece durante patrulha no mar do leste", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 47141, "titulo": "As India Erases Its Colonial Past, Delhi’s Elite Feel Targeted", "url": "https://www.nytimes.com/2026/07/12/world/asia/india-gymkhana-club-eviction-colonialism.html", "fonte_id": "nyt_world", "data_pub": "2026-07-12T04:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo da Índia pretende fechar o Clube Gymkhana de Delhi, que o primeiro-ministro considera um resquício do colonialismo. Alguns membros suspeitam de motivações diferentes além da eliminação do passado colonial.", "titulo_pt": "Índia elimina seu passado Colonial, clubes de Elite sentem-se alvo", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 47142, "titulo": "How Putin Turned Japan Into a Den of Spies", "url": "https://www.nytimes.com/2026/07/12/world/asia/russia-spies-japan-war-drones-electronics.html", "fonte_id": "nyt_world", "data_pub": "2026-07-12T04:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um departamento de inteligência militar russo opera de alto nível em um edifício de Tóquio, onde encontra o equipamento tecnológico avançado necessário para a guerra.", "titulo_pt": "Como Putin transformou tóquio em um Den de espiões", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 47174, "titulo": "José Manuel Restrepo: “Colombia es un aliado casi incondicional y clave para que Estados Unidos logre su cometido en Venezuela”", "url": "https://elpais.com/america-colombia/2026-07-12/jose-manuel-restrepo-colombia-es-un-aliado-casi-incondicional-y-clave-para-que-estados-unidos-logre-su-cometido-en-venezuela.html", "fonte_id": "elpais_america", "data_pub": "2026-07-12T04:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O vice-presidente eleito José Manuel Restrepo afirma que o novo governo, que assume em 7 de agosto, não se enquadra na ultradireita, direita ou centro e priorizará a pragmatismo. Restrepo destaca que Colômbia é um aliado quase incondicional dos Estados Unidos para alcançar seus objetivos na Venezuela.", "titulo_pt": "José Manuel Restrepo: 'colômbia é um aliado quase incondicional e crucial para os EUA em relação à Venezuela'", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 47178, "titulo": "México sin el Mayo Zambada: año dos", "url": "https://elpais.com/mexico/2026-07-12/mexico-sin-el-mayo-zambada-ano-dos.html", "fonte_id": "elpais_america", "data_pub": "2026-07-12T04:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O episódio do sequestro do capo e seu traslado para os Estados Unidos ressurge atualmente como um desacordo bilateral. A guerra que levou à sua saída da criminalidade continua, embora de forma menos intensa.", "titulo_pt": "México sem o Mayo Zambada: ano dois", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 47200, "titulo": "Victorian crossbench MP warns voting system overhaul must be backed by broader reform – as it happened", "url": "https://www.theguardian.com/australia-news/live/2026/jul/12/anthony-albanese-pat-conroy-labor-liberal-angus-taylor-one-nation-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-07-12T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A parlamentar Georgie Purcell, do Partido da Justiça Animal Victoriano, alerta que a eliminação do sistema de votação por chapas sem mudanças adicionais poderia beneficiar o Partido One Nation. O governo Allan planeja introduzir legislação para reformar o sistema eleitoral quando o parlamento retornar das férias inverno.", "titulo_pt": "Parlamentar avisa que reforma do sistema de votação deve acompanhar outras mudanças", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 47305, "titulo": "The world is plunging into a dangerous spiral of military spending", "url": "https://english.elpais.com/international/2026-07-12/the-world-is-plunging-into-a-dangerous-spiral-of-military-spending.html", "fonte_id": "elpais_en", "data_pub": "2026-07-12T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A escalada global das despesas militares está se acelerando devido a tensões geopolíticas, revoluções tecnológicas, interesses econômicos e ausência de tratados internacionais.", "titulo_pt": "O mundo está mergulhando em uma espiral perigosa de gastos militares", "veiculo": "El País (inglês)", "pais": "Espanha", "classe": "A"}, {"id": 47306, "titulo": "Ukraine’s biggest defense gap: More than 92% of Russian ballistic missiles hit their targets", "url": "https://english.elpais.com/international/2026-07-12/ukraines-biggest-defense-gap-more-than-92-of-russian-ballistic-missiles-hit-their-targets.html", "fonte_id": "elpais_en", "data_pub": "2026-07-12T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O ataque recente do Kremlin à capital ucraniana revelou que mais de 92% dos foguetes balísticos russos acertaram seus alvos. Essa situação destaca um dos principais pontos fracos da defesa ucraniana.", "titulo_pt": "Ucrânia enfrenta grande vulnerabilidade: mais de 92% dos foguetes balísticos russos atingem suas metas", "veiculo": "El País (inglês)", "pais": "Espanha", "classe": "A"}, {"id": 47307, "titulo": "From libertarian dream to political weapon: How the far right appropriated the crypto wave", "url": "https://english.elpais.com/economy-and-business/2026-07-12/from-libertarian-dream-to-political-weapon-how-the-far-right-appropriated-the-crypto-wave.html", "fonte_id": "elpais_en", "data_pub": "2026-07-12T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Líderes como Trump, Milei e Bukele elevam esses ativos como bandeira para atrair cidadãos desiludidos enquanto se aproveitam da popularidade dessas figuras.", "titulo_pt": "Do sonho libertário à arma política: como a extrema-direita adotou a onda cripto", "veiculo": "El País (inglês)", "pais": "Espanha", "classe": "A"}, {"id": 47308, "titulo": "Abelardo de la Espriella embraces Trump's 'Donroe doctrine' as it spreads across Latin America", "url": "https://english.elpais.com/international/2026-07-12/abelardo-de-la-espriella-embraces-trumps-donroe-doctrine-as-it-spreads-across-latin-america.html", "fonte_id": "elpais_en", "data_pub": "2026-07-12T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O novo presidente da Colômbia apoia a doutrina de Trump sobre imigração, aumentando as políticas anti-imigrantes e duras na região.", "titulo_pt": "Abelardo de la Espriella adere à 'doutrina Donroe' de Trump como ela se espalha pela américa latina", "veiculo": "El País (inglês)", "pais": "Espanha", "classe": "A"}, {"id": 47309, "titulo": "Solomy Balungi Bossa, member of the International Criminal Court: ‘Trump views us the same way as terrorists and drug peddlers’", "url": "https://english.elpais.com/international/2026-07-12/solomy-balungi-bossa-member-of-the-international-criminal-court-trump-views-us-the-same-way-as-terrorists-and-drug-peddlers.html", "fonte_id": "elpais_en", "data_pub": "2026-07-12T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Solomy Balungi Bossa, uma juíza ugandesa de 70 anos que integra o Conselho Penal Internacional (ICC), está entre os magistrados sanccionados pela administração americana devido às investigações do tribunal envolvendo Estados Unidos e Israel.", "titulo_pt": "Solomy Balungi Bossa, membro do conselho penal internacional: 'trump vê a gente da mesma forma que terroristas e traficantes de drogas'", "veiculo": "El País (inglês)", "pais": "Espanha", "classe": "A"}, {"id": 47358, "titulo": "Cyberattacks against S. Korean military top 18,000 last year: report", "url": "https://www.koreaherald.com/article/10805958", "fonte_id": "korea_herald", "data_pub": "2026-07-12T03:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Exército sul-coreano enfrentou mais de 18.000 tentativas de ataques cibernéticos no ano passado, um aumento de 31% em comparação com o ano anterior. A situação reflete uma queda nos esforços para manter especialistas capazes de defender contra essas ameaças.", "titulo_pt": "Ataques cibernéticos contra exército sul-coreano superam 18.000 no último ano: relatório", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 47287, "titulo": "Centcom claims 140 Iranian military targets struck in latest strikes", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/centcom-claims-140-iranian-military-targets-struck-latest-strikes", "fonte_id": "middle_east_eye", "data_pub": "2026-07-12T03:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A US Central Command (Centcom) afirmou ter atingido cerca de 140 alvos militares iranianos usando munições precisas lançadas por aeronaves, drones e navios. As operações foram realizadas como resposta à ataque a uma embarcação comercial no Estreito de Ormuz.", "titulo_pt": "Centcom afirma ter atingido 140 alvos militares iranianos em novas operações", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 47237, "titulo": "At least two killed in Toronto street festival shooting", "url": "https://www.bbc.co.uk/news/articles/ce3e66e1x3go?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-12T03:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pelo menos duas pessoas foram mortas durante uma troca de tiros entre dois indivíduos em um festival na cidade de Toronto. As autoridades recuperaram dois armamentos do local.", "titulo_pt": "Pelo menos duas mortas em tiroteio durante festival em Toronto", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 47349, "titulo": "Shinhan board expands dialogue with UK investors", "url": "https://www.koreaherald.com/article/10805975", "fonte_id": "korea_herald", "data_pub": "2026-07-12T04:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A diretoria do Grupo Shinhan realizou uma série de reuniões com investidores no Reino Unido para fortalecer suas relações globais. O presidente da diretoria, Kwak Su-keun, liderou uma viagem de cinco dias pelo Reino Unido, passando por Londres e Edimburgo.", "titulo_pt": "Diretoria do shinhan expande diálogo com investidores britânicos", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 47350, "titulo": "SK hynix dollar inflow expected to bolster South Korea's FX market", "url": "https://www.koreaherald.com/article/10805974", "fonte_id": "korea_herald", "data_pub": "2026-07-12T04:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "SK hynix pretende injetar uma grande quantidade de dólares no mercado cambial sul-coreano após levantar cerca de 40 trilhões de wones (cerca de 26,5 bilhões de dólares) através de uma oferta pública de títulos em Nasdaq. A empresa planeja usar a maioria dos fundos para investimentos domésticos, incluindo o clúster semiconductor de Yongin.", "titulo_pt": "Injeção de dólares esperada para fortalecer mercado cambial sul-coreano", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 47351, "titulo": "Hoban tops 20% in Hanjin KAL, narrows gap with Cho", "url": "https://www.koreaherald.com/article/10805973", "fonte_id": "korea_herald", "data_pub": "2026-07-12T04:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa de construção Hoban Group aumentou sua participação na holding Hanjin KAL, do grupo pai da Korean Air, para mais de 20%, reduzindo a diferença com o bloco controlador liderado pelo presidente do Hanjin Group, Walter Cho, para menos de 1 ponto percentual. A Hoban informou que seu stake na Hanjin KAL subiu para 20,15% após suas afiliadas compraram mais 1,13 milhões de ações no mercado aberto.", "titulo_pt": "Hoban supera 20% em Hanjin KAL e diminui gap com Cho", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 47071, "titulo": "Confirmado el precio del dólar este lunes 13 de julio cuando abran los bancos", "url": "https://www.lanacion.com.ar/economia/dolar/confirmado-el-precio-del-dolar-este-lunes-13-de-julio-cuando-abran-los-bancos-nid11072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-12T04:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O preço do dólar oficial será confirmado quando os bancos abrirem na próxima segunda-feira, 13 de julho. Geralmente, o valor inicial do dólar é o mesmo do último dia útil.", "titulo_pt": "Confirmado o preço do dólar nesta segunda-feira 13 de julio quando os bancos abrirem", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 47382, "titulo": "Porsche warns China luxury car demand remains weak, product gap may extend to 2028", "url": "https://www.digitimes.com/news/a20260710PD200/porsche-demand-sales-2028-market.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T02:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Porsche relatou entregas globais de 122.300 veículos no primeiro semestre de 2026, uma diminuição de 16% em comparação com o mesmo período do ano anterior, com as vendas na China continuando a ser frágeis e caindo mais de 30% anualmente.", "titulo_pt": "Porsche avisa que demanda por carros luxuosos na China permanece fraca e discrepância pode durar até 2028", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 46875, "titulo": "El Niño pode atrasar plantio de grãos, reduzir safras e dificultar pecuária", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/el-nino-pode-atrasar-plantio-de-graos-reduzir-safras-e-dificultar-pecuaria.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-12T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A chegada do El Niño pode atrasar o plantio de grãos, reduzir as safras e dificultar a pecuária a partir do segundo semestre deste ano.", "titulo_pt": "El Niño pode atrasar plantio de grãos, reduzir safras e dificultar pecuária", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 47340, "titulo": "EU isn’t just selling aircraft to China. It’s helping strengthen a competitor", "url": "https://www.scmp.com/opinion/china-opinion/article/3359345/eu-isnt-just-selling-aircraft-china-its-helping-strengthen-competitor?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-12T01:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "China Eastern, a companhia aérea chinesa que opera voos comerciais iniciais do jato C919 nacional, encomendou 25 aviões A330neo da Airbus no mês anterior. Essas encomendas totalizam bilhões de dólares e competem com o desenvolvimento local da China.", "titulo_pt": "EUA não está apenas vendendo aviões para a China. Também está fortalecendo um concorrente", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 46993, "titulo": "Quina hoje, concurso 7063: confira o resultado sorteado neste sábado (11)", "url": "https://www.infomoney.com.br/consumo/quina-hoje-concurso-7063-confira-o-resultado-sorteado-neste-sabado-11/", "fonte_id": "infomoney", "data_pub": "2026-07-12T00:14:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O concurso da Quina número 7063 foi realizado neste sábado (11). Os apostadores podem escolher de 5 a 15 números entre os 80 disponíveis.", "titulo_pt": "Quina hoje, concurso 7063: confira o resultado sorteado neste sábado", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 46673, "titulo": "Oil firm ordered to suspend production", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/12/2003860618", "fonte_id": "taipei_times", "data_pub": "2026-07-12T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma empresa de petróleo foi ordenada a suspender suas operações de produção.", "titulo_pt": "Empresa de petróleo ordered to suspend production", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 46879, "titulo": "O hábito que constrói patrimônio", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/blogs/de-grao-em-grao/2026/07/o-habito-que-constroi-patrimonio.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-11T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Dois agricultores cultivavam plantações semelhantes lado a lado, um dos quais passou a observar detalhadamente as práticas do vizinho com o objetivo de melhorar suas colheitas.", "titulo_pt": "O hábito que constrói patrimônio", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 46216, "titulo": "Suno adquire 4,6% das ações da Gafisa; objetivo é ‘estritamente de investimento’", "url": "https://www.infomoney.com.br/mercados/suno-adquire-46-das-acoes-da-gafisa-objetivo-e-estritamente-de-investimento/", "fonte_id": "infomoney", "data_pub": "2026-07-11T19:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Suno adquiriu 4,6% das ações da Gafisa com o objetivo estritamente de investimento. A Gafisa enfrenta problemas financeiros e anunciou um aumento de capital no mês de abril.", "titulo_pt": "Suno compra 4,6% das ações da Gafisa; intenção é 'estritamente de investimento'", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 46880, "titulo": "Antes do Dia Mundial do Rock, franquia de escolas de música planeja expansão", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/07/antes-do-dia-mundial-do-rock-franquia-de-escolas-de-musica-planeja-expansao.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-11T19:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A rede de escolas de música Academia do Rock planeja expandir suas operações, com a intenção de abrir mais duas unidades até o final do ano e chegar a 40 unidades até 2030. A empresa faz essa divulgação poucos dias antes do Dia Mundial do Rock, celebrado em 13 de julho.", "titulo_pt": "Antes do Dia Mundial do Rock, rede de escolas de música planeja expansão", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 46330, "titulo": "La soja y una década perdida: cómo la “plaga” de las retenciones favoreció el avance de Brasil", "url": "https://www.lanacion.com.ar/economia/campo/la-soja-y-una-decada-perdida-como-las-retenciones-favorecieron-el-avance-de-brasil-nid11072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-11T18:15:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Argentina viu sua produção de soja diminuir em 86% enquanto o Brasil expandiu significativamente suas exportações e manteve seu domínio no mercado internacional. A redução na produção argentina resultou em perda de área plantada e menor participação nas exportações de harina.", "titulo_pt": "Soja e uma década perdida: como as retenciones favoreceram o avanço do Brasil", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 46067, "titulo": "Fundo de florestas corre para atrair US$ 3,2 bi até o fim do ano, mas guerras dificultam", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/fundo-de-florestas-corre-para-atrair-us-32-bi-ate-o-fim-do-ano-mas-guerras-dificultam.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-11T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Fundo Florestas Tropicais para Sempre (TFFF) precisa arrecadar mais US$ 3,2 bilhões até o fim do ano para atingir sua meta de US$ 10 bilhões. No entanto, as guerras dificultam a captação desses fundos.", "titulo_pt": "Fundo de florestas busca atrair US$ 3,2 bi até o fim do ano, mas guerras complicam", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 46242, "titulo": "Gasolina nos EUA está mais cara do que há um ano", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/gasolina-nos-eua-esta-mais-cara-do-que-ha-um-ano/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-11T17:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O preço da gasolina nos Estados Unidos está mais alto do que há um ano. O Estreito de Ormuz, importante roteiro marítimo para o transporte de petróleo, está em foco devido a novas tensões nesta semana.", "titulo_pt": "Gasolina nos EUA custa mais do que há um ano", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 46246, "titulo": "Europa fará investimento de 80 bilhões de euros em empresas de tecnologia", "url": "https://www.cnnbrasil.com.br/economia/negocios/europa-fara-investimento-de-80-bilhoes-de-euros-em-empresas-de-tecnologia/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-11T17:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A União Europeia investirá 80 bilhões de euros em empresas de tecnologia, envolvendo estados-membros da UE, Grupo Banco Europeu de Investimento, investidores institucionais e gestores de ativos.", "titulo_pt": "Europa fará investimento de 80 bilhões de euros em empresas de tecnologia", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}], "economia__eventos": [], "tecnologia": [{"id": 47352, "titulo": "KT launches cybersecurity advisory committee", "url": "https://www.koreaherald.com/article/10805972", "fonte_id": "korea_herald", "data_pub": "2026-07-12T04:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A KT lançou um conselho de consultoria em proteção de informações para fortalecer suas capacidades de segurança cibernética, diante das mudanças na paisagem de ameaças causadas pela inteligência artificial e transformação digital. O conselho reúne especialistas em segurança cibernética, IA e direito para fornecer orientações sobre tecnologias de segurança da IA, arquitetura zero-trust, segurança em nuvem, sistemas de monitoramento e autenticação, resposta a ataques cibernéticos, conformidade com padrões globais e cooperação mais ampla no ecossistema de segurança.", "titulo_pt": "KT lança conselho de consultoria em proteção de informações", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 47354, "titulo": "Children's brand caught using photo without permission, turning Asian boy into white child with AI", "url": "https://www.koreaherald.com/article/10805969", "fonte_id": "korea_herald", "data_pub": "2026-07-12T04:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A marca sul-coreana de roupas infantis Susu & Cra se retratou após usar uma foto pertencente à empresa de produtos de cama Boni Moire sem autorização e modificar a imagem com inteligência artificial. A Boni Moire acusou a Susu & Cra publicamente de alterar uma foto de um menino asiático, fazendo-o parecer branco.", "titulo_pt": "Marca infantil sul-coreana se retrata por usar foto do filho de outra empresa sem autorização e modificar com IA", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 47356, "titulo": "Samsung Electronics to bring forward opening of 1st Yongin chip plant to 2029", "url": "https://www.koreaherald.com/article/10805962", "fonte_id": "korea_herald", "data_pub": "2026-07-12T04:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Samsung Electronics planeja iniciar as operações de sua primeira fábrica de semicondutores no complexo de Yongin um a dois anos antes do previsto, em 2029. A aceleração está alinhada com o acelerado desenvolvimento do Complexo Nacional Industrial de Yongin, um projeto estratégico nacional destinado a se tornar o hub de fabricação de semicondutores da próxima geração da empresa.", "titulo_pt": "Samsung avança data para operações na primeira fábrica de chip de Yongin para 2029", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 47375, "titulo": "Infinitix signs Sarawak AI pact to expand Southeast Asia cloud services", "url": "https://www.digitimes.com/news/a20260710PD221/infrastructure-asia-government-software-gpu.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T02:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa taiwanesa Infinitix, fornecedora de software de infraestrutura de inteligência artificial, assinou um memorando de entendimento com a Sarawak Information Systems Sdn. Bhd. (SAINS) para promover a infraestrutura de IA, nuvem privada GPU e serviços de nuvem de IA na Malásia e na Ásia Oriental. Os dois lados planejam construir um ecossistema autônomo de IA e nuvem de IA centrado em uma nova modelo computacional chamado Fábrica de Tokens.", "titulo_pt": "Infinitix assina acordo com sains para expandir serviços de nuvem de inteligência artificial na ásia oriental", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 47378, "titulo": "Palo Alto Networks says AI agents are driving demand for identity security", "url": "https://www.digitimes.com/news/a20260710PD204/palo-alto-networks-cybersecurity-security-expansion-software.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T02:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A utilização de agências de inteligência artificial está transformando as operações empresariais e levantando novos riscos cibernéticos, com a autenticação de identidade se tornando uma preocupação crucial para equipes de TI. Segundo a Palo Alto Networks, 99% das empresas estão agora utilizando ferramentas de inteligência artificial autônomas, conversacionais e gerativas, enquanto as identidades máquinas em redes corporativas já superaram o número de empregados humanos.", "titulo_pt": "Agências de IA estão impulsionando a demanda por segurança de identidade", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 47379, "titulo": "SmartSens targets 2027 commercialization of Micro LED optical interconnects for AI infrastructure", "url": "https://www.digitimes.com/news/a20260709PD217/expansion-language-data-center-photonics-demand.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T02:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O rápido crescimento de servidores de inteligência artificial (IA) e modelos grandes de linguagem (LLMs) está gerando uma demanda sem precedentes para computação em centros de dados, tornando tecnologias de interconexão de alta velocidade um dos próximos principais campos de batalha na infraestrutura de IA. A empresa SmartSens almeja a comercialização comercial de interconectores baseados em Micro LED para AI em 2027.", "titulo_pt": "Smartsens visa comércio de interconectores de Micro LED para IA em 2027", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 47380, "titulo": "Taiwan PCB leaders launch fundraising wave for AI data centers", "url": "https://www.digitimes.com/news/a20260709PD222/pcb-taiwan-data-fundraising-expansion.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T02:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A indústria de placas de circuito impresso (PCB) na Taiwan está entrando em uma nova fase de expansão, impulsionada pela investimento em data centers de inteligência artificial e outras aplicações emergentes. Desde 2025, várias empresas fabricantes de placas e fornecedores de materiais upstream lançaram planos de arrecadação de fundos em larga escala tanto no país quanto no exterior, incluindo três líderes: Zhen Ding Tech, Unimicron e Compeq.", "titulo_pt": "Líderes taiwaneses da PCB lançam onda de arrecadação para data centers de IA", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 47381, "titulo": "InP supply crunch leaves South Korea exposed", "url": "https://www.digitimes.com/news/a20260710VL216/inp-coherent-substrate-capacity-production.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T02:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Coherent concordou com um pré-pagamento de US$22,3 milhões para a AXT por capacidade de substrato indígenio fosfórico (InP) de 6 polegadas durante três anos, demonstrando como compradores estão reservando futuras entregas em face da pressão sobre o mercado concentrado de materiais fotonênicos devido à investimento em centrais de dados de IA.", "titulo_pt": "Falta de inp expõe Coreia do sul", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 47383, "titulo": "Greenfiltec revenue climbed 19% in 1H26 on stronger AMC filter shipments", "url": "https://www.digitimes.com/news/a20260710PD203/revenue-2026-shipments-market-materials.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T02:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A receita consolidada da Greenfiltec aumentou 14,87% em junho de 2026 e 18,35% no primeiro semestre em comparação com o mesmo período do ano anterior, totalizando NT$311 milhões. O aumento foi impulsionado por uma maior entrega de filtros AMC.", "titulo_pt": "Receita da greenfiltec cresceu 19% no primeiro semestre de 2026, impulsionada por maior envio de filtros AMC", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 47384, "titulo": "Hermes Testing's June revenue more than doubles as advanced chip test demand surges", "url": "https://www.digitimes.com/news/a20260710PD232/revenue-demand-testing-2026-equipment.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T02:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A receita de junho de 2026 da Hermes Testing Solutions aumentou significativamente, impulsionada pela alta demanda por testes avançados de chips. O crescimento foi motivado pela continuidade da atividade robusta na teste de semicondutores de alto nível.", "titulo_pt": "Receita de junho da hermes Testing dobra com aumento na demanda por testes avançados de chips", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 47385, "titulo": "South Korean startup CSO eyes global Earth observation market as optical payload heads for orbit", "url": "https://www.digitimes.com/news/a20260709PD223/south-korea-cubesat-launch-optics-startup.html", "fonte_id": "digitimes", "data_pub": "2026-07-12T02:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A startup sul-coreana CSO está preparando a lançamento de seu carregamento óptico de alta resolução a bordo do DaejeonSat, um microsatélite desenvolvido localmente, programado para decolar no segundo semestre de 2026 em uma missão da Nuri. A missão visa servir como um marco-chave de validação orbital enquanto a empresa expande seus negócios além do Kazakhstan Satellite Constellation para os mercados europeus e norte-americanos de observação da Terra.", "titulo_pt": "Startup sul-coreana CSO almeja mercado global de observação da terra ao lançar payload óptico", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 47364, "titulo": "KB chair puts AI at center of next growth phase", "url": "https://www.koreaherald.com/article/10805895", "fonte_id": "korea_herald", "data_pub": "2026-07-12T01:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Yang Jong-hee, presidente do conselho da KB Financial Group, incentivou a empresa a reorganizar suas operações ao redor da inteligência artificial e aproveitar as mudanças nas fluxos financeiros para fortalecer seus negócios de gestão de riquezas e ativos. Cerca de 270 executivos participaram de um workshop de dois dias no centro de treinamento KB Injaenium, em Sacheon.", "titulo_pt": "Diretor da KB financial group destaca AI como foco para próxima fase de crescimento", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 47401, "titulo": "Relocation of Gwangju military airport speeds up for chip cluster", "url": "https://en.yna.co.kr/view/AEN20260712000500315", "fonte_id": "yonhap_news", "data_pub": "2026-07-12T01:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O reassentamento do aeroporto militar de Gwangju está acelerando para atender a uma região industrializada por chips.", "titulo_pt": "Reassentamento do aeroporto militar de Gwangju avança para cluster de chips", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 47163, "titulo": "Inteligencia artificial y humanidades", "url": "https://www.latercera.com/cartas-al-director/noticia/inteligencia-artificial-y-humanidades/", "fonte_id": "la_tercera", "data_pub": "2026-07-12T00:58:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O artigo discute a relação entre inteligência artificial e humanidades, explorando como essas duas áreas interagem.", "titulo_pt": "Inteligência artificial e humanidades", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 47373, "titulo": "Reed Jobs would rather talk about curing cancer than his last name", "url": "https://techcrunch.com/2026/07/11/reed-jobs-would-rather-talk-about-curing-cancer-than-his-last-name/", "fonte_id": "techcrunch", "data_pub": "2026-07-12T00:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Reed Jobs afirmou que prefere discutir a cura do câncer em vez de seu sobrenome. Desde a última entrevista, há três anos, sua empresa de venture capital Yosemite passou por mudanças significativas, incluindo o aumento da importância da inteligência artificial no trabalho da empresa.", "titulo_pt": "Reed Jobs prefere falar sobre curar câncer em vez do seu sobrenome", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 46663, "titulo": "Taiwan eyes US$4bn robot dog market amid global race", "url": "https://www.taipeitimes.com/News/front/archives/2026/07/12/2003860603", "fonte_id": "taipei_times", "data_pub": "2026-07-12T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Taiwan está interessada no mercado de cães robóticos avaliado em 4 bilhões de dólares, ocorrendo num contexto global de concorrência nessa indústria.", "titulo_pt": "Taiwan presta atenção ao mercado de cães robóticos avaliado em 4 bilhões de dólares durante corrida global", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 47335, "titulo": "Nasa knows how to deflect an asteroid. Can Japan’s Hayabusa2 pull it off?", "url": "https://www.scmp.com/week-asia/politics/article/3360222/nasa-knows-how-deflect-asteroid-can-japans-hayabusa2-pull-it?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-12T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A passagem do Hayabusa2 perto da asteroide Torifune representa um avanço na defesa contra asteroides, demonstrando o crescimento das capacidades espaciais do Japão e seu papel de ciência benéfica. O foguete japonês, nomeado em homenagem ao falcão-peregrino local, realizou com sucesso uma aproximação a menos de 800 metros da asteroide conforme informado pela Agência Espacial Japonesa (JAXA).", "titulo_pt": "Nasa sabe como desviar um asteróide. E o Hayabusa2 do Japão?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 47395, "titulo": "Columbia scientists discover surprising link between serotonin and heart valve disease", "url": "https://www.sciencedaily.com/releases/2026/07/260711010131.htm", "fonte_id": "science_daily", "data_pub": "2026-07-12T03:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas descobriram que serotonina, conhecida por regular o humor, pode acelerar a progressão de uma doença cardíaca valvular comum em alguns pacientes. A pesquisa indica que pessoas com regurgitação mitral degenerativa que tomam medicamentos antidepressivos SSRI e carregam um determinado gene variante podem sofrer mais danos nos valores do coração antes, potencialmente exigindo cirurgia mais cedo na vida.", "titulo_pt": "Cientistas colombianos descobrem link surpreendente entre serotonina e doença de válvula cardíaca", "veiculo": "Science Daily", "pais": "EUA", "classe": "C"}, {"id": 47386, "titulo": "Almost a quarter of Dutch bee colonies did not survive last winter", "url": "https://phys.org/news/2026-07-quarter-dutch-bee-colonies-survive.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T02:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "No inverno de 2025-2026, cerca de 24% das colmeias de abelhas melíferas na Holanda não sobreviveram. Os dados são baseados em uma pesquisa anual realizada entre apicultores holandeses e mostram diferenças regionais significativas.", "titulo_pt": "Quase um quarto das colmeias de abelhas da holanda não sobreviveu ao inverno passado", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 47397, "titulo": "Why gold never tarnishes has finally been explained", "url": "https://www.sciencedaily.com/releases/2026/07/260710003511.htm", "fonte_id": "science_daily", "data_pub": "2026-07-12T02:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores descobriram que átomos na superfície do ouro se reorganizam em padrões que bloqueiam a reação com o oxigênio, suprimindo a oxidação em uma escala trilionária. Este mecanismo pode auxiliar no desenvolvimento de catalisadores mais poderosos baseados em ouro para produção e energia limpa além de explicar por que brincos de ouro permanecem brilhantes por gerações.", "titulo_pt": "Por que o ouro nunca enferruja foi finalmente explicado", "veiculo": "Science Daily", "pais": "EUA", "classe": "C"}, {"id": 47362, "titulo": "The next drug lab is in orbit", "url": "https://www.koreaherald.com/article/10805911", "fonte_id": "korea_herald", "data_pub": "2026-07-12T02:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A indústria farmacêutica está se preparando para entrar no espaço, graças à aceleração da corrida comercial de veículos espaciais. A microgravidade no espaço permite que proteínas cresçam em cristais maiores e mais uniformes, auxiliando na compreensão das estruturas tridimensionais de proteínas relacionadas a doenças, o que é crucial para a descoberta de novos medicamentos.", "titulo_pt": "O próximo laboratório de drogas está no espaço", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 47396, "titulo": "Yale scientists may have found how Parkinson's disease spreads through the brain", "url": "https://www.sciencedaily.com/releases/2026/07/260710003529.htm", "fonte_id": "science_daily", "data_pub": "2026-07-12T02:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas da Yale descobriram dois proteínas nas superfícies das neurônios que parecem auxiliar no espalhamento da proteína tóxica associada à doença de Parkinson. Bloquear essas proteínas nos ratos reduziu significativamente a progressão da doença, oferecendo um potencial novo alvo para futuros tratamentos.", "titulo_pt": "Cientistas da yale podem ter encontrado como a doença de Parkinson se espalha pelo cérebro", "veiculo": "Science Daily", "pais": "EUA", "classe": "C"}, {"id": 47387, "titulo": "Q&A: Unforeseen consequences of the 'great aging' of America", "url": "https://phys.org/news/2026-07-qa-unforeseen-consequences-great-aging.html", "fonte_id": "phys_org", "data_pub": "2026-07-12T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O título original 'Q&A: Unforeseen consequences of the 'great aging' of America' sugere uma conversa sobre as consequências inesperadas do envelhecimento significativo da população americana. A passagem destaca que, durante os primeiros 100 anos da existência dos Estados Unidos, a expectativa de vida era de cerca de 40 anos. No entanto, após 1880, avanços na medicina moderna e saúde pública levaram a uma significativa elevação na expectativa de vida, alcançando 60 anos em 1930.", "titulo_pt": "Perguntas e respostas: consequências inesperadas do envelhecimento massivo dos estados unidos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 47398, "titulo": "Common blood pressure drug could make cancer therapy far more powerful", "url": "https://www.sciencedaily.com/releases/2026/07/260709160648.htm", "fonte_id": "science_daily", "data_pub": "2026-07-11T23:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os pesquisadores descobriram que o medicamento comum para pressão arterial telmisartan pode significativamente melhorar a eficácia da droga contra câncer olaparib, potencialmente expandindo seus benefícios além dos pacientes com tumores relacionados ao gene BRCA. A combinação já está sendo testada em ensaios clínicos humanos após mostrar fortes efeitos imunológicos e anticânceres nos estudos pré-clínicos.", "titulo_pt": "Medicamento para pressão arterial pode intensificar a eficácia de tratamentos contra câncer", "veiculo": "Science Daily", "pais": "EUA", "classe": "C"}, {"id": 47388, "titulo": "Drawing the line: Virtual fences trigger the same cattle behavior as physical ones", "url": "https://phys.org/news/2026-07-line-virtual-trigger-cattle-behavior.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo estudo da Universidade de Göttingen demonstrou que cercas virtuais podem induzir comportamentos semelhantes aos das cercas elétricas convencionais em gado, o que pode melhorar a gestão e o bem-estar dos animais nas propriedades rurais. Os resultados foram publicados na revista Animal.", "titulo_pt": "Desenhando o limite: cercas virtuais provocam comportamentos semelhantes às cercas físicas em gado", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 47389, "titulo": "Secure glass containers for storing chemical waste through laser welding", "url": "https://phys.org/news/2026-07-glass-chemical-laser-welding.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T22:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A crescente adoção de veículos elétricos está aumentando a necessidade de armazenamento seguro e permanente dos materiais das baterias e do resíduo químico industrial. Os contêineres devem garantir proteção ambiental, manipulação segura e uma longa integridade estrutural para atender aos requisitos rigorosos de descarte em aterros sanitários da categoria IV.", "titulo_pt": "Contêineres seguros de vidro para armazenamento de resíduos químicos através do soldado à laser", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 46901, "titulo": "Camundongo dos Andes adaptado a altitudes extremas abre caminhos para medicina", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/camundongo-dos-andes-adaptado-a-altitudes-extremas-abre-caminhos-para-medicina.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-11T21:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O camundongo-orelhudo-andino, uma espécie de roedor, é capaz de viver acima de 6.700 metros de altitude, desafiando os limites fisiológicos conhecidos. Este animal surpreende pela sua capacidade adaptativa em ambientes extremos.", "titulo_pt": "Camundongo dos Andes adaptado a altitudes extremas abre caminhos para medicina", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 47254, "titulo": "Why heatwaves disrupt our sleep – and how we can protect it", "url": "https://www.lemonde.fr/en/science/article/2026/07/11/why-heatwaves-disrupt-our-sleep-and-how-we-can-protect-it_6755384_10.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-11T21:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A elevada temperatura diminui o tempo de sono, comprometendo a saúde pública. Um especialista recomenda manter as atividades matinais para evitar perturbações adicionais no relógio biológico.", "titulo_pt": "Por que ondas de calor interrompem o nosso sono – e como podemos protegê-lo", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 47390, "titulo": "Synthetic rotation brings black hole energy theory into lab, amplifying waves", "url": "https://phys.org/news/2026-07-synthetic-rotation-black-hole-energy.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de meio século atrás, Sir Roger Penrose propôs que energia poderia ser extraída de um buraco negro girando a velocidades extremas. Ele sugeriu que uma partícula entrando na ergosfera desse buraco negro se dividiria em duas partes, com uma caindo nele e outra escapando com mais energia do que a original. Baseado nessa teoria, o físico Yakov Zel'dovich previu que uma onda interagindo com um objeto girando suficientemente rápido poderia extrair energia dele e se ampliar.", "titulo_pt": "Rotacionamento sintético traz teoria de extração de energia de buracos negros para a sala de experimentos, ampliando ondas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 47391, "titulo": "The Vikings were more than bearded marauders, but Scandinavia's national museums continue to project that image", "url": "https://phys.org/news/2026-07-vikings-bearded-marauders-scandinavia-national.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Noruega, Suécia e Dinamarca têm muitas exposições sobre vikings para visitar. No entanto, essas exposições frequentemente retratam os vikings como apenas bárbaros barbados, ignorando a complexidade da cultura viking.", "titulo_pt": "Os Vikings eram mais do que bárbaros barbados, mas as museus nacionais da escandinávia continuam a projetar essa imagem", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 47392, "titulo": "Reimagining the furnace: How a new magnetic design could supercharge industrial plasma", "url": "https://phys.org/news/2026-07-reimagining-furnace-magnetic-supercharge-industrial.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A engenharia de plasma a altas temperaturas busca capturar uma miniatura de estrela dentro de uma máquina sem permitir que ela entre em contato com as paredes ou se apague. Esta é a principal e crucial tarefa nesta área.", "titulo_pt": "Reimaginando o forno: como um novo design magnético poderia potencializar plasma industrial", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 47393, "titulo": "Immune cells get transformed into fungus-fighting nanoparticles", "url": "https://phys.org/news/2026-07-immune-cells-fungus-nanoparticles.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Engenheiros da Universidade do California San Diego desenvolveram nanopartículas feitas das membranas de células imunológicas humanas que podem oferecer uma nova maneira promissora para combater infecções fúngicas que estão se tornando mais difíceis de tratar. Em mice com infecções severas de Candida, essas nanopartículas reduziram significativamente a quantidade de fungo em órgãos principais e melhoraram consideravelmente a sobrevivência.", "titulo_pt": "Células imunológicas se transformam em nanopartículas antifúngicas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 47353, "titulo": "Yeonjun tops first-day sales among Korean soloists this year", "url": "https://www.koreaherald.com/article/10805970", "fonte_id": "korea_herald", "data_pub": "2026-07-12T04:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Yeonjun, membro do Tomorrow X Together, bateu um novo recorde de vendas com seu segundo EP solo 'No Labels: Part 02', que vendeu 661.924 cópias no primeiro dia, superando suas próprias vendas iniciais e estabelecendo o maior lançamento inicial entre artistas solo coreanos neste ano.", "titulo_pt": "Yeonjun lidera vendas no primeiro dia entre intérpretes solo sul-coreanos em 2023", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 47359, "titulo": "Trump suggests a standing order to attack Iran if it assassinates him. But Vance would make the call", "url": "https://www.koreaherald.com/article/10805952", "fonte_id": "korea_herald", "data_pub": "2026-07-12T03:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente dos Estados Unidos, Donald Trump, sugeriu que deixou ordens para o exército norte-americano atacar a Irã com intensidade nunca antes vista em caso de assassinato contra ele. No entanto, não existe um mecanismo automático de autorização prévia para uma resposta imediata.", "titulo_pt": "Trump sugere ordem permanente para ataque à Irã se o país o assassinar, mas Vance faria a decisão", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 46882, "titulo": "Dior e Armani ousam na alta-costura em Paris para fugir da irrelevância", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/07/dior-e-armani-ousam-na-alta-costura-em-paris-para-fugir-da-irrelevancia.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-12T00:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As grifes Dior e Armani apresentaram coleções ousadas na alta-costura em Paris, tentando se distanciar de uma percepção de irrelevância. As bolsas em formato de cacto da Dior e as trepadeiras venenosas da Chanel foram mencionadas como elementos marcantes.", "titulo_pt": "Dior e Armani apostam na ousadia para evitar a irrelevância na alta-costura em Paris", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 47171, "titulo": "La niña que fue vendida por amor: un relato de Jaime Bayly", "url": "https://www.latercera.com/culto/noticia/la-nina-que-fue-vendida-por-amor-un-relato-de-jaime-bayly/", "fonte_id": "la_tercera", "data_pub": "2026-07-12T00:26:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Jaime Bayly escreveu uma carta emocionada a Mercedes, agradecendo o amor que ela dedicou às suas filhas e prometendo vê-la no além-mundo. Ele pediu para que ela não tivesse medo de partir.", "titulo_pt": "A menina vendida pelo amor: um relato de Jaime Bayly", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 47369, "titulo": "Linda Noskova recovers from 2nd-set meltdown to win Wimbledon and claim her 1st Grand Slam title", "url": "https://www.koreaherald.com/article/10805830", "fonte_id": "korea_herald", "data_pub": "2026-07-12T00:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Linda Noskova, uma tenista czech de 21 anos, venceu Wimbledon e conquistou seu primeiro título do Grand Slam após superar Karolina Muchova em um final all-Czech. Noskova recuperou-se de uma melhora na segunda parcial, onde perdeu cinco pontos de match, para vencer com placar de 6-2, 5-7, 6-3.", "titulo_pt": "Linda Noskova vence Wimbledon e conquista seu primeiro título do Grand Slam", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 47213, "titulo": "A Free-Speech Meltdown", "url": "https://www.theatlantic.com/books/2026/07/why-pen-americas-president-dinaw-mengestu-resigned/687891/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-07-11T23:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A presidente da PEN America renunciou após um artigo detalhar a isolamento e exclusão sentida por muitos escritores israelenses e judeus desde outubro de 7.", "titulo_pt": "Colapso na liberdade de expressão", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 46985, "titulo": "Live-action de “Moana” decepciona com bilheteria e recebe duras críticas", "url": "https://www.cnnbrasil.com.br/pop/cinema/live-action-de-moana-decepciona-com-bilheteria-e-recebe-duras-criticas/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-11T23:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O filme live-action de 'Moana' estreou com um desempenho inferior às expectativas, conforme relatado por grandes portais. O longa recebeu críticas negativas e não atingiu as marcas esperadas nas bilheterias.", "titulo_pt": "Live-action de ‘Moana’ decepciona com bilheteria e crítica", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 46913, "titulo": "Com lei do astronauta Marcos Pontes, Ayrton Senna entra para lista de ‘Heróis da Pátria’", "url": "https://veja.abril.com.br/brasil/ayrton-senna-entra-para-lista-de-herois-da-patria/", "fonte_id": "veja", "data_pub": "2026-07-11T22:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ayrton Senna foi incluído na lista de 'Heróis da Pátria' por meio de uma lei proposta pelo astronauta Marcos Pontes. O piloto agora faz parte do 'Livro de Aço', que registra personalidades consideradas relevantes para a história do Brasil.", "titulo_pt": idioma": "es", "provavel_duplicata_de": null, "texto_pt": "As previsões meteorológicas indicam que as condições de ventilação continuarão desfavoráveis durante este domingo, levando a uma nova alerta ambiental em Santiago. As projeções sugerem que isso ocorrerá devido à persistência de circunstâncias pouco favoráveis para a dispersão de contaminantes.", "titulo_pt": "Santiago enfrenta nova alerta ambiental neste domingo por condições desfavoráveis de ventilação", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 47400, "titulo": "Eco-friendly cars account for half of new car registrations in H1", "url": "https://en.yna.co.kr/view/AEN20260712000600320", "fonte_id": "yonhap_news", "data_pub": "2026-07-12T01:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "No primeiro semestre de 2023, metade das novas inscrições de veículos foram de carros ecológicos.", "titulo_pt": "Carros ecológicos representam metade das novas inscrições no primeiro semestre", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 46678, "titulo": "Institute to enhance green efforts with low-carbon strategy", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/12/2003860623", "fonte_id": "taipei_times", "data_pub": "2026-07-12T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O instituto planeja intensificar seus esforços ambientais através de uma estratégia de baixo carbono.", "titulo_pt": "Instituto vai aprimorar esforços verdes com estratégia de baixo carbono", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 46686, "titulo": "How to be prepared for disasters", "url": "https://www.taipeitimes.com/News/editorials/archives/2026/07/12/2003860597", "fonte_id": "taipei_times", "data_pub": "2026-07-12T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo discute como se preparar para desastres, abordando medidas preventivas e de resposta.", "titulo_pt": "Como se preparar para desastres", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 47252, "titulo": "'No region is safe from climate change: Brittany will not be a climate refuge'", "url": "https://www.lemonde.fr/en/opinion/article/2026/07/12/no-region-is-safe-from-climate-change-brittany-will-not-be-a-climate-refuge_6755386_23.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-11T23:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A região de Bretanha não será refúgio climático da mudança climática, alertam os analistas Clément Jeanneau e Antoine Poincaré. Confundir a exposição geográfica de uma região com sua vulnerabilidade ao clima pode criar uma sensação falsa de segurança.", "titulo_pt": "Nenhuma região está segura das mudanças climáticas: bretanha não será refúgio climático", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 46918, "titulo": "Temporal destelha casas e deixa 460 desalojados na região metropolitana de Porto Alegre", "url": "https://veja.abril.com.br/brasil/temporal-destelha-mais-de-100-casas-e-deixa-460-desalojados-na-regiao-metropolitana-de-porto-alegre/", "fonte_id": "veja", "data_pub": "2026-07-11T21:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A chuva acompanhada de vendaval e granizo atingiu várias cidades da região metropolitana de Porto Alegre, destelhando casas e deixando 460 pessoas desalojadas. As áreas afetadas incluem Eldorado do Sul e Canoas.", "titulo_pt": "Temporal causa estragos e desaloja 460 pessoas na região metropolitana de Porto Alegre", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 46215, "titulo": "Clima ajuda e combate aos incêndios na Espanha se intensifica; 12 pessoas morreram", "url": "https://www.infomoney.com.br/mundo/clima-ajuda-e-combate-aos-incendios-na-espanha-se-intensifica-12-pessoas-morreram/", "fonte_id": "infomoney", "data_pub": "2026-07-11T19:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A situação dos incêndios na Espanha continua intensa, com 12 pessoas falecidas. As autoridades alertam que ainda há 23 pessoas não localizadas no território afetado pela floresta ardente em Andaluzia.", "titulo_pt": "Clima ajuda e combate aos incêndios na Espanha se intensifica; 12 pessoas morreram", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 47018, "titulo": "Terremoto na Venezuela: número de mortos sobe para 4.333 e cerca de 17 mil seguem desalojados", "url": "https://exame.com/mundo/terremoto-na-venezuela-numero-de-mortos-sobe-para-4-333-e-cerca-de-17-mil-seguem-desalojados/", "fonte_id": "exame", "data_pub": "2026-07-11T18:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O número de mortos no terremoto na Venezuela aumentou para 4.333 e cerca de 17 mil pessoas permanecem desalojadas. O balanço oficial registra 16.740 feridos após os terremotos de magnitudes 7,2 e 7,5.", "titulo_pt": "Número de mortos em terremoto na Venezuela sobe para 4.333", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 46332, "titulo": "China evacuó a casi 2 millones de personas ante la llegada del tifón Bavi", "url": "https://www.lanacion.com.ar/el-mundo/china-evacua-a-mas-de-un-millon-de-personas-ante-la-llegada-del-tifon-bavi-nid11072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-11T18:07:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O tifão Bavi tocou terra antes do previsto na última hora de sábado, causando 87 feridos em Taiwan e cinco lesões leves no Japão. A China evacuou quase 2 milhões de pessoas como medida preventiva.", "titulo_pt": "China evacua quase 2 milhões de pessoas ante chegada do tifão Bavi", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 46210, "titulo": "Temporal com granizo destelha casas e deixa 400 desalojados no RS", "url": "https://www.metropoles.com/brasil/temporal-granizo-rs-porto-alegre", "fonte_id": "metropoles", "data_pub": "2026-07-11T17:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um temporal causou danos por granizo nos municípios de Eldorado do Sul, Canoas, Butiá, Capão Bonito do Sul e Glorinha no Rio Grande do Sul. Quatrocentas pessoas foram desalojadas.", "titulo_pt": "Temporal com granizo destela casas e deixa 400 desalojados no RS", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 46179, "titulo": "Assim como Londres e Nova York, Belém terá Semana do Clima incluída no calendário anual", "url": "https://exame.com/esg/assim-como-londres-e-nova-york-belem-tera-semana-do-clima-incluida-no-calendario-anual/", "fonte_id": "exame", "data_pub": "2026-07-11T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Belém terá uma Semana do Clima incluída no calendário anual, similar a Londres e Nova York. O evento reuniu mais de 30 instituições em dois dias de debates oficiais após a COP, com apenas quatro outros estados brasileiros tendo programação fixa para discutir mudanças climáticas.", "titulo_pt": "Assim como Londres e Nova York, Belém terá Semana do Clima incluída no calendário anual", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 46655, "titulo": "More than 1.7 million evacuated as Typhoon Bavi makes landfall in China", "url": "https://www.aljazeera.com/news/2026/7/11/hundreds-of-thousands-evacuated-as-typhoon-bavi-barrels-towards-china?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-11T09:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de 1,7 milhão de pessoas foram evacuadas à medida que o Super Furacão Bavi toca terra na China. O furacão foi desclassificado, mas meteorologistas consideram que ainda é perigoso.", "titulo_pt": "Mais de 1,7 milhão evacuados com chegada do super furacão Bavi à China", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 46691, "titulo": "In Shenzhen, the surprise isn't the tech -- it's the green", "url": "https://www.koreaherald.com/article/10803862", "fonte_id": "korea_herald", "data_pub": "2026-07-11T07:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em Shenzhen, o que chama a atenção não é apenas a tecnologia, mas também a sustentabilidade. A cidade, conhecida pela produção de eletrônicos, está investindo na imagem verde e transformando isso em um negócio.", "titulo_pt": "No shenzen, o que impressiona não são só os gadgets -- é a verdeza", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 46586, "titulo": "Japanese school teaches children how to stay safe around wild bears", "url": "http://www.euronews.com/2026/07/11/japanese-school-teaches-children-how-to-stay-safe-around-wild-bears", "fonte_id": "euronews", "data_pub": "2026-07-11T04:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Alunos de uma escola primária no centro do Japão participam de um programa que aumenta a conscientização sobre urus, ensinando-lhes como conviverem de maneira segura com os ursos silvestres, já que as observações desses animais são frequentes na região.", "titulo_pt": "Escola japonesa ensina crianças a se manterem seguras em presença de urus", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 47360, "titulo": "Murder attempt victim protests abolishing prosecution's right to additional investigation", "url": "https://www.koreaherald.com/article/10805932", "fonte_id": "korea_herald", "data_pub": "2026-07-12T02:35:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A vítima do ataque conhecido como 'chute circular de Busan' em 2022 se opôs à abolição pelo governo do direito da procuradoria de realizar investigações suplementares, argumentando que essas investigações revelaram intenções criminosas no seu caso. A investigação policial inicial concluiu que o incidente era um caso de lesão corporal qualificada, mas a procuradoria encontrou evidências indicativas de tentativa de estupro e assassinato.", "titulo_pt": "Vítima do ataque de busan se opõe à abolição do direito de investigação adicional", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 46233, "titulo": "Colonos israelenses atacam jornalistas e equipe da CNN na Cisjordânia", "url": "https://www.cnnbrasil.com.br/internacional/colonos-israelenses-atacam-jornalistas-e-equipe-da-cnn-na-cisjordania/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-11T18:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Equipes da CNN e outros jornalistas foram agredidos com barras de metal e pedras enquanto cobriam o aniversário do dia da morte de um palestino-americano em Cisjordânia.", "titulo_pt": "Colônios israelenses atacam jornalistas e equipe da CNN na Cisjordânia", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 46754, "titulo": "Vietnam tourist speedboat capsizes, killing 15 Indian tourists", "url": "https://www.scmp.com/news/asia/southeast-asia/article/3360241/vietnam-tourist-speedboat-capsizes-killing-15-indian-tourists?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-11T14:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um barco de turismo que estava retornando de uma viagem à ilha no sul da Vietnã capotou no sábado, resultando na morte de 15 turistas indianos a menos de meio quilômetro da praia. O barco transportava 32 turistas indianos e quatro membros da tripulação quando se virou após sair da Ilha Hon May Rut Ngoai, perto da maior ilha do Vietnã, Phu Quoc.", "titulo_pt": "Turismo de velocípede capota no vietnã, matando 15 turistas indianos", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 46615, "titulo": "Bosnia Marks 31st Anniversary of Srebrenica Genocide with Mass Burial", "url": "https://balkaninsight.com/2026/07/11/bosnia-marks-31st-anniversary-of-srebrenica-genocide-with-mass-burial/btj/", "fonte_id": "balkan_insight", "data_pub": "2026-07-11T13:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Na cerimônia de sábado, dez mais vítimas do genocídio de 1995 foram enterradas no Centro Memorial Srebrenica. Sobreviventes pediram aos responsáveis que reconhecessem a verdade e pedissem perdão.", "titulo_pt": "Bósnia marca o 31º aniversário do genocídio de Srebrenica com cerimônia de sepultamento", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}, {"id": 46066, "titulo": "Hasan Hasanovich, sobreviviente de Srebrenica: “Lo que ocurrió es una mancha negra en la conciencia de la sociedad holandesa”", "url": "https://www.latercera.com/mundo/noticia/hasan-hasanovich-sobreviviente-de-srebrenica-lo-que-ocurrio-es-una-mancha-negra-en-la-conciencia-de-la-sociedad-holandesa/", "fonte_id": "la_tercera", "data_pub": "2026-07-11T10:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Hasan Hasanovich, sobrevivente e historiador do Centro Memorial de Srebrenica, conversa com La Tercera sobre o genocídio na Serra da Drina há 31 anos e a persistência de negadores e incitadores de ódio.", "titulo_pt": "Hasan Hasanovich, sobrevivente de Srebrenica: 'o que ocorreu é uma mancha negra na consciência da sociedade holandesa'", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 46518, "titulo": "Houston killing of Mexican man by ICE reignites debate over US immigration agency", "url": "https://www.lemonde.fr/en/international/article/2026/07/11/houston-killing-of-mexican-man-by-ice-reignites-debate-over-us-immigration-agency_6755370_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-11T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Lorenzo Salgado Araujo, um contratante de 52 anos aguardando a regularização do seu status, foi morto por um agente da ICE que alegou ter agido em auto-defesa. A afirmação do agente é contestada pelos amigos e familiares da vítima.", "titulo_pt": "Morte de mexicano por ICE em houston reaviva debate sobr const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml() : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">

      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}

  }).join("");
  return `<div>

    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

Object.entries(abas).forEach(([id, a]) => {

});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");

const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}
