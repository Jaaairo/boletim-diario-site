orea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 25737, "titulo": "LG Chem secures FDA clearance for TP53-targeting cancer candidate", "url": "https://www.koreaherald.com/article/10792746", "fonte_id": "korea_herald", "data_pub": "2026-06-30T02:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A LG Chem recebeu a aprovação da FDA para iniciar um estudo clínico fase 1/2 do candidato a medicamento anticâncer LG00313112, que alvo uma mutação TP53 Y220C encontrada em 1 a 3% dos pacientes com câncer. O medicamento visa estabilizar a proteína p53, estruturalmente instável devido à mutação, e restaurar sua função supressora tumoral.", "titulo_pt": "LG Chem obtém aprovação da FDA para teste clínico do candidato a medicamento anticâncer", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 25639, "titulo": "New CDC leaders vow to boost skeleton staff left after DOGE cuts", "url": "https://www.japantimes.co.jp/news/2026/06/30/world/politics/cdc-leaders-staff-doge-cuts/", "fonte_id": "japan_times", "data_pub": "2026-06-30T01:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Nos últimos 18 meses, cerca de um quarto do quadro do Centro de Controle e Prevenção de Doenças (CDC) deixou o emprego ou foi cortado pelo Departamento de Eficiência Governamental liderado por Elon Musk. Os novos líderes do CDC prometeram reforçar a equipe esquelética que restou após essas cortes.", "titulo_pt": "Novos líderes do CDC prometem fortalecer quadro reduzido após cortes DOGE", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 25903, "titulo": "Study argues bigger launch vehicles may not always be better", "url": "https://spacenews.com/study-argues-bigger-launch-vehicles-may-not-always-be-better/", "fonte_id": "spacenews", "data_pub": "2026-06-30T01:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo sugere que não há necessariamente vantagens em desenvolver veículos de lançamento muito grandes. A SpaceX e outras empresas estão avançando com o desenvolvimento desses grandes veículos, mas o estudo argumenta que pode haver um tamanho máximo para os foguetes.", "titulo_pt": "Estudo argumenta que maiores veículos de lançamento não podem sempre ser melhores", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 26771, "titulo": "Child online safety needs more than social-media bans", "url": "https://www.nature.com/articles/d41586-026-02068-5", "fonte_id": "nature_news", "data_pub": "2026-06-30T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A segurança online dos crianças requer mais do que proibições de mídias sociais. Pesquisa publicada no Nature sugere que medidas adicionais são necessárias para proteger efetivamente as crianças na internet.", "titulo_pt": "Segurança online infantil precisa de mais do que banimentos de redes sociais", "veiculo": "Nature News", "pais": "Reino Unido", "classe": "A"}, {"id": 26772, "titulo": "Ebola preparedness must start with ecosystems and before humans show symptoms", "url": "https://www.nature.com/articles/d41586-026-02070-x", "fonte_id": "nature_news", "data_pub": "2026-06-30T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A preparação para a ebola deve começar com os ecossistemas e antes dos humanos apresentarem sintomas. Este é o principal ponto levantado na publicação.", "titulo_pt": "Preparação para ebola deve iniciar nos ecossistemas antes dos sintomas em humanos", "veiculo": "Nature News", "pais": "Reino Unido", "classe": "A"}, {"id": 26773, "titulo": "AI tools can speed up thinking, but evidence still comes from the lab bench", "url": "https://www.nature.com/articles/d41586-026-02069-4", "fonte_id": "nature_news", "data_pub": "2026-06-30T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A pesquisa indica que ferramentas de inteligência artificial podem acelerar o processo de pensamento, mas a evidência ainda é obtida no laboratório.", "titulo_pt": "Ferramentas de IA podem acelerar o pensamento, mas as provas vêm da bancada", "veiculo": "Nature News", "pais": "Reino Unido", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 26997, "titulo": "The original Moana: did a 1926 documentary give birth to a 21st century Disney blockbuster?", "url": "https://www.theguardian.com/film/2026/jun/30/the-original-moana-did-a-1926-documentary-give-birth-to-a-21st-century-disney-blockbuster", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T10:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Antes do sucesso da animação de 2016 e sua remasterização em live-action, existia um filme mudo de 1926 intitulado Moana. Este filme pioneiro criou um novo gênero cinematográfico e serviu como inspiração para a produção moderna.", "titulo_pt": "Moana original: o documentário de 1926 que antecedeu o blockbuster do século XXI", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 27000, "titulo": "Chris Martin’s lost James Bond theme goes on auction with unheard Coldplay tapes", "url": "https://www.theguardian.com/music/2026/jun/30/chris-martin-coldplay-recordings-auction-lost-james-bond-theme", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T10:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um demo de uma canção que Chris Martin, vocalista da Coldplay, teria escrito para o filme James Bond The World Is Not Enough está sendo leiloado junto com gravações iniciais do grupo. O material faz parte de um acervo disponibilizado pelo produtor britânico Chris Allison.", "titulo_pt": "Demo de tema James Bond de Chris Martin vai ao leilão junto com gravações iniciais da Coldplay", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 26995, "titulo": "It’s a love story – or is it? The surprising conflict and chaos in Taylor Swift’s songs about commitment", "url": "https://www.theguardian.com/music/2026/jun/30/taylor-swift-songs-about-marriage-and-commitment", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T10:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Taylor Swift, frequentemente vista como uma romântica, na verdade tem escrito principalmente canções sobre amor marcadas por conflitos, fantasmas e ilusões. Antes de seu casamento, analisa-se o que a Swift, como compositora, tem nos contado através das suas letras ao longo de 20 anos.", "titulo_pt": "É uma história de amor – ou não? O surpreendente conflito e caos nas canções de Taylor Swift sobre compromisso", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 26998, "titulo": "The Invite review – Seth Rogen adds zest and bite to fruity dinner party comedy", "url": "https://www.theguardian.com/film/2026/jun/30/the-invite-review-seth-rogen-olivia-wilde-penelope-cruz-edward-norton", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Seth Rogen adiciona humor e frescor a esta comédia de festa estranha, onde Olivia Wilde dirige e atua ao lado de Penélope Cruz e Edward Norton. A história envolve dois casais da classe média que se convidam para uma excruciante reunião em casa.", "titulo_pt": "O Convite: Seth Rogen traz frescor a comédia de festa estranha", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 26996, "titulo": "‘Four white presenters feels retro’ – is the BBC Today programme doomed?", "url": "https://www.theguardian.com/tv-and-radio/2026/jun/30/bbc-today-programme-radio-4-diversity-lack-social-media", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T09:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O BBC News anunciou que os repórteres deverão priorizar plataformas de mídia social como TikTok e Instagram acima de canais tradicionais como TV e rádio, incluindo o programa Today da Radio 4. Isso tem levantado preocupações sobre a relevância do programa em relação à vida nacional.", "titulo_pt": "Quatro apresentadores brancos parece retródeo – o programa de hoje da BBC está condenado?", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 26272, "titulo": "ESPN faz proposta para recuperar Copa do Brasil após 11 anos sem transmissão", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/espn-faz-proposta-para-recuperar-copa-do-brasil-apos-11-anos-sem-transmissao.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-30T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ESPN fez uma proposta para transmitir a Copa do Brasil a partir de 2027, entrando em negociações com a CBF. O canal da Disney está entre outros participantes interessados na adquirição dos jogos.", "titulo_pt": "ESPN apresenta proposta para retornar Copa do Brasil após 11 anos sem transmissão", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 26999, "titulo": "From card game to a tool of divination: the artistic history of tarot", "url": "https://www.theguardian.com/artanddesign/2026/jun/30/tarot-artistic-history-exhibition-morgan-library-nyc", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo exposição segue o caminho inusitado das cartas de tarô desde a Itália do século XV até sua associação com a ocultismo atual. Durante esse tempo, o tarô passou por mãos de boêmios como Pamela Colman Smith e de mistificadores como Aleister Crowley, antes de se tornar mainstream, com uma busca crescente por leituras de tarô durante a pandemia.", "titulo_pt": "Do jogo de cartas ao instrumento de divinação: a história artística do tarô", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 26793, "titulo": "‘I felt like Orpheus’: how the designer of Gears of War bounced back from studio closure by producing Hadestown", "url": "https://www.theguardian.com/games/2026/jun/30/designer-gears-of-war-hadestown-cliff-bleszinski", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cliff Bleszinski, conhecido como CliffyB, criador da série Gears of War, sofreu com a rejeição do público após o fracasso de seu jogo LawBreakers em 2017. No entanto, ele encontrou redenção com o sucesso do musical Hadestown no Teatro Tony.", "titulo_pt": "'Eu me senti como Orfeu': como o designer de Gears of War buscou a redenção após o fechamento da sua própria empresa por conta do fracasso do jogo LawBreakers, graças ao sucesso do musical Hadestown", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 26794, "titulo": "Not a Pretty Picture review – Martha Coolidge’s recreation of her rape remains shockingly powerful", "url": "https://www.theguardian.com/film/2026/jun/30/not-a-pretty-picture-review-martha-coolidge", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T08:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Fifty years after its release, Coolidge’s dramatisation of the key moments before and after her rape is still absolutely essential. Martha Coolidge, em 1976, criou um documentário dramático honesto e corajoso sobre sua própria experiência de estupro, que continua sendo crucial.", "titulo_pt": "Não uma Vizualização Agradável: a reconstrução de Martha Coolidge da sua violência sexual permanece poderosamente impactante", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 26795, "titulo": "International Freak by M Syd Rosen review – the British Timothy Leary", "url": "https://www.theguardian.com/books/2026/jun/30/international-freak-by-m-syd-rosen-review-the-british-timothy-leary", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T08:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Robin Farquharson era um teórico de jogos premiado, ativista anti-apartheid e comerciante do contracultura. Desde outubro, ele tem cortado amigos nas ruas, dormindo alternadamente em estranhos alpendres da George Street e criptas colégiais obscurecidas.", "titulo_pt": "O Estranho Internacional por M Syd Rosen - o Britânico Timothy Leary", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 26796, "titulo": "Louis CK: Ridiculous review – the troubled comedian returns … with a whimper", "url": "https://www.theguardian.com/culture/2026/jun/30/louis-ck-ridiculous-review-netflix", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T07:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Louis C.K., que enfrentou acusações de conduta sexual inadequada em 2017, retorna com um especial de Netflix que tem alguns momentos, mas não é suficiente. O comediante, ator e roteirista diretor, após admitir sua culpa, passou por uma breve exilado antes de voltar a se apresentar e lançar quatro specials de comédia.", "titulo_pt": "Louis C.K.: Avaliação irônica - o comediante problemático retorna... com um suspiro", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 26273, "titulo": "SBT desiste de emplacar entrevistas com presidenciáveis no Programa Silvio Santos", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/sbt-desiste-de-emplacar-entrevistas-com-presidenciaveis-no-programa-silvio-santos.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-30T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O SBT tentou repetir uma ideia de Silvio Santos, de 1989, para as eleições deste ano, mas desistiu de entrevistar os candidatos à Presidência da República no programa dominical apresentado por Patrícia Abravanel.", "titulo_pt": "SBT desiste de emplacar entrevistas com presidenciáveis no Programa Silvio Santos", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 26274, "titulo": "Por que os homens estão mostrando tanto o bumbum nos filmes e nas séries?", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/por-que-os-homens-estao-mostrando-tanto-o-bumbum-nos-filmes-e-nas-series.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-30T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O bumbum masculino tem ganhado mais visibilidade nas produções audiovisuais, tanto no cinema quanto na televisão. Atores de diferentes nacionalidades estão se sentindo mais à vontade para exibir essa parte do corpo em suas performances.", "titulo_pt": "Por que os homens estão mostrando tanto o bumbum nos filmes e nas séries?", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 26799, "titulo": "TV tonight: tense times with biscuits in the Bake Off tent", "url": "https://www.theguardian.com/tv-and-radio/2026/jun/30/tv-tonight-tense-times-with-biscuits-in-the-bake-off-tent", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T06:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As equipes restantes no programa The Great British Bake Off devem produzir doces salgados perfeitos e exibirem obras de biscuitaria inspiradas nas antigas maravilhas do mundo. O título em português é: 'Noite na TV: tempos tensores com biscoitos no estúdio do Bake Off'.", "titulo_pt": "Noite na TV: tempos tensores com biscoitos no estúdio do Bake Off", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 26792, "titulo": "Queenie Is Working On It by Candice Carty-Williams review – a smart sequel to a breakout bestseller", "url": "https://www.theguardian.com/books/2026/jun/30/queenie-is-working-on-it-by-candice-carty-williams-review-a-smart-sequel-to-a-breakout-bestseller", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T06:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Queenie Jenkins, a protagonista da série, enfrenta uma nova fase de sua vida ao se submeter a um exame de fertilidade. A autora Candice Carty-Williams continua o sucesso de seu primeiro livro com essa sequência sábia e engraçada.", "titulo_pt": "Queenie Está Trabalhando Nisso", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 26797, "titulo": "‘He’d been wounded deeply’: the wild photographic life of Ed van der Elsken – in pictures", "url": "https://www.theguardian.com/artanddesign/gallery/2026/jun/30/ed-van-der-elsken-dutch-photographer-in-pictures", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T06:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ed van der Elsken, fotógrafo holandês, acreditava que dominar o uso da cor indicava um verdadeiro talento artístico e foi pioneiro em um estilo influente descrito como 'caos organizado'.", "titulo_pt": "‘Ele havia sido ferido profundamente’: a vida fotográfica selvagem de Ed van der Elsken – em imagens", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}], "cultura__eventos": [], "sociedade": [{"id": 27112, "titulo": "Rio: greve de rodoviários entra no 2º dia e deixa paradas lotadas", "url": "https://www.metropoles.com/brasil/rio-greve-de-rodoviarios-entra-no-2o-dia-e-deixa-paradas-lotadas", "fonte_id": "metropoles", "data_pub": "2026-06-30T11:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A greve de rodoviários no Rio de Janeiro entra no segundo dia, causando lotações nos pontos de ônibus. De acordo com a Rio Ônibus, cerca de 1.150 veículos estão em circulação.", "titulo_pt": "Greve de rodoviários no Rio entra no segundo dia e causa lotações", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27014, "titulo": "Brasil saiu do Mapa da Fome, mas ainda enfrenta muitos desafios nessa área", "url": "https://veja.abril.com.br/coluna/balanco-social/brasil-saiu-do-mapa-da-fome-mas-ainda-enfrenta-muitos-desafios-nessa-area/", "fonte_id": "veja", "data_pub": "2026-06-30T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A fome no Brasil diminuiu significativamente, mas ainda persiste. O país enfrenta desafios para manter a redução da fome e combater a obesidade.", "titulo_pt": "Brasil saiu do Mapa da Fome, mas enfrenta desafios", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27080, "titulo": "El trabajo que Chile no puede seguir postergando", "url": "https://www.latercera.com/opinion/noticia/el-trabajo-que-chile-no-puede-seguir-postergando/", "fonte_id": "la_tercera", "data_pub": "2026-06-30T11:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Chile precisa sair do pessimismo e conformismo para enfrentar trabalhos essenciais, como investimento, produtividade e geração de empregos. O crescimento econômico exige avanços significativos nesses aspectos.", "titulo_pt": "O trabalho que Chile não pode mais adiar", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 26985, "titulo": "South Africa anti-migrant demos draw thousands, plus huge police presence", "url": "https://www.scmp.com/news/world/africa/article/3358913/south-africa-anti-migrant-demos-draw-thousands-plus-huge-police-presence?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T10:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Milhares de pessoas participaram de protestos anti-imigrantes na África do Sul, sob a vigilância de uma presença policial significativa. Os protestos, organizados pela March and March, exigem que todos os imigrantes ilegais deixem o país.", "titulo_pt": "Protestos anti-imigrantes congregam milhares na África do Sul, com forte presença policial", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 26835, "titulo": "Adolescentes em moto atropelam criança de 4 anos em Mauá", "url": "https://www.metropoles.com/sao-paulo/adolescentes-moto-atropelam-crianca", "fonte_id": "metropoles", "data_pub": "2026-06-30T10:49:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Adolescentes estavam pilotando uma moto quando perderam o controle, atropelando uma criança de 4 anos. Testemunhas relataram que os jovens desciam e subiam em via no momento do acidente.", "titulo_pt": "Adolescentes em moto atropelam criança de 4 anos em Mauá", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 26994, "titulo": "UNICEF aid shipment lands in Venezuela following devastating earthquakes", "url": "https://www.unicef.org/press-releases/unicef-aid-shipment-lands-venezuela-following-devastating-earthquakes", "fonte_id": "unicef", "data_pub": "2026-06-30T10:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma carga de 47 metros cúbicos com suprimentos para saúde, água e educação foi mobilizada do estoque da União Europeia em Copenhague e chegou a Venezuela após os terríveis terremotos. Mais auxílio será enviado nos próximos dias.", "titulo_pt": "Envio de ajuda chega à Venezuela após terríveis terremotos", "veiculo": "UNICEF Global", "pais": "Global", "classe": "A"}, {"id": 26846, "titulo": "Sistema de saúde da Venezuela está sobrecarregado após terremotos, diz OMS", "url": "https://www.cnnbrasil.com.br/internacional/sistema-de-saude-da-venezuela-esta-sobrecarregado-apos-terremotos-diz-oms/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T10:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O sistema de saúde venezuelano está sobrecarregado após os terremotos, conforme informou a Organização Mundial da Saúde. Milhares de pessoas correm o risco de contrair doenças como febre amarela e dengue devido à baixa cobertura vacinal na região.", "titulo_pt": "Sistema de saúde venezuelano sobrecarregado após terremotos, alerta OMS", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 26300, "titulo": "Idosa de 91 anos abusada por pastor tinha machucados antigos, diz neta", "url": "https://www.metropoles.com/sao-paulo/idosa-de-91-anos-abusada-por-pastor-tinha-machucados-antigos-diz-neta", "fonte_id": "metropoles", "data_pub": "2026-06-30T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A neta da vítima, uma idosa de 91 anos que teria sido abusada por um pastor, relatou a presença de machucados antigos na avó. A técnica em enfermagem que cuidava da idosa afirmou que ela já apresentava esses ferimentos antes do ocorrido.", "titulo_pt": "Neta relata machucados antigos na avó abusada por pastor", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 26302, "titulo": "Polícia prende pais de gêmeas que morreram em onda de calor na França", "url": "https://www.metropoles.com/mundo/policia-prende-pais-de-gemeas-que-morreram-em-onda-de-calor-na-franca", "fonte_id": "metropoles", "data_pub": "2026-06-30T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A polícia prendeu os pais de duas gêmeas que faleceram durante uma onda de calor na França. O país registrou mais de mil mortes em apenas três dias por causa dessas condições climáticas extremas.", "titulo_pt": "Polícia detém pais de gêmeas que morreram durante onda de calor na França", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 26306, "titulo": "Venezuelanos improvisam necrotério em porto de La Guaira", "url": "https://www.metropoles.com/mundo/venezuelanos-improvisam-necroterio-em-porto-de-la-guaira", "fonte_id": "metropoles", "data_pub": "2026-06-30T09:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "La Guaira é a região mais afetada pela tragédia na Venezuela, onde famílias formam filas para identificar os mortos causados pelos terremotos. Devido à falta de infraestrutura adequada, um necrotério improvisado foi estabelecido no porto da cidade.", "titulo_pt": "Venezuelanos improvisam necrotério em porto de La Guaira", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 26559, "titulo": "'I resisted xenophobic pressure in the past. But now, we have to leave': In South Africa, a violent campaign against foreigners", "url": "https://www.lemonde.fr/en/le-monde-africa/article/2026/06/30/i-resisted-xenophobic-pressure-in-the-past-but-now-we-have-to-leave-in-south-africa-a-violent-campaign-against-foreigners_6755003_124.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-30T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ativistas anti-imigrantes do movimento March and March deram prazo até 30 de junho para estrangeiros deixarem o país. Milhares estão se preparando para partir.", "titulo_pt": "Eu resisti à pressão xenofóbica no passado. Mas agora, temos que nos mudar", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 26724, "titulo": "Police refer 20 hospital staff over unprescribed anti-anxiety drugs", "url": "https://www.koreaherald.com/article/10793455", "fonte_id": "korea_herald", "data_pub": "2026-06-30T08:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A polícia referiu 20 funcionários de um hospital, incluindo o chefe do hospital, médicos e enfermeiros, para promotores sob suspeita de repetidamente administrarem medicamentos psicotrópicos não prescritos aos pacientes. Eles são acusados de violar a Lei sobre Controle de Narcóticos e a Lei sobre Serviço Médico.", "titulo_pt": "Polícia refere 20 funcionários de hospital por administração indevida de medicamentos psicotropicos", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 26670, "titulo": "Malaysia enlists military veterans to boot bullies out of schools: ‘you touch, you go’", "url": "https://www.scmp.com/week-asia/health-environment/article/3358870/malaysia-enlists-military-veterans-boot-bullies-out-schools-you-touch-you-go?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T07:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Malásia está empregando ex-militares como vigilantes residenciais permanentes em oito escolas internas de ciências da Marajú a partir desta semana, com o objetivo de combater casos de bullying. Esta medida foi tomada após uma série de incidentes abusivos causarem indignação pública sobre a segurança dos alunos.", "titulo_pt": "Malásia envolve ex-militares para expulsar bullies das escolas: 'toque e sai'", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 26646, "titulo": "Anti-migrant politics sparking resurgence of racism in the U.K., polls suggest", "url": "https://www.japantimes.co.jp/news/2026/06/30/world/politics/anti-migrant-politics-racism-uk/", "fonte_id": "japan_times", "data_pub": "2026-06-30T06:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Poluições sugerem que a política anti-imigrante está contribuindo para um ressurgimento do racismo no Reino Unido, especialmente por causa das atividades de extrema-direita que enfatizam crimes cometidos por membros de minorias étnicas.", "titulo_pt": "Políticas anti-imigrantes estimulando renascimento do racismo no Reino Unido, pesquisas indicam", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 26337, "titulo": "Bairro da Zona Leste lidera ranking de roubos e furtos de carros em SP; veja a lista", "url": "https://exame.com/brasil/bairro-da-zona-leste-de-sp-lidera-ranking-de-roubos-e-furtos-de-carros-veja-a-lista/", "fonte_id": "exame", "data_pub": "2026-06-30T06:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O bairro da Zona Leste de São Paulo lidera o ranking de roubos e furtos de carros. Vila Matilde, que era a líder anteriormente, caiu para a quinta posição após reduzir as ocorrências.", "titulo_pt": "Bairro da Zona Leste lidera ranking de roubos e furtos de carros em SP; veja a lista", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 26069, "titulo": "Chuvas em Pernambuco deixam 523 desabrigados e 2.500 desalojados", "url": "https://www.metropoles.com/brasil/chuvas-em-pernambuco-deixam-523-desabrigados-e-2-500-desalojados", "fonte_id": "metropoles", "data_pub": "2026-06-30T04:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As chuvas em Pernambuco deixaram 523 desabrigados e 2.500 desalojados. O governo do estado enviou cerca de 4 mil itens de ajuda humanitária às cidades afetadas.", "titulo_pt": "Chuvas em Pernambuco deixam 523 desabrigados e 2.500 desalojados", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 27104, "titulo": "Defesa Civil de SC emite alerta para chuvas persistentes em seis regiões", "url": "https://www.cnnbrasil.com.br/nacional/sul/sc/defesa-civil-de-sc-emite-alerta-para-chuvas-persistentes-em-seis-regioes/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T11:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Defesa Civil do estado de Santa Catarina emitiu um alerta para chuvas persistentes em seis regiões, com risco de rajadas de ventos, raios, alagamentos e enxurradas. O alerta foi emitido mais cedo por precaução.", "titulo_pt": "Defesa Civil de SC emite alerta para chuvas persistentes em seis regiões", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 26840, "titulo": "Anvisa proíbe venda e uso de querosene Petrus e determina recolhimento", "url": "https://www.metropoles.com/brasil/anvisa-proibe-venda-e-uso-de-querosene-petrus-e-determina-recolhimento", "fonte_id": "metropoles", "data_pub": "2026-06-30T10:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Anvisa proibiu a venda e o uso do querosene Petrus e determinou seu recolhimento. A fabricante não possui a Autorização de Funcionamento de Empresa (AFE) necessária para produzir saneantes.", "titulo_pt": "Anvisa proíbe venda e uso de querosene Petrus e determina recolhimento", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 26904, "titulo": "Está en peligro de extinción: rescataron a un ciervo de los pantanos en la Panamericana y ahora se recupera en un santuario", "url": "https://www.lanacion.com.ar/sociedad/esta-en-peligro-de-extincion-rescataron-a-un-ciervo-de-los-pantanos-en-la-panamericana-y-ahora-se-nid25062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T10:28:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um ciervo foi resgatado dos pantanos na Panamericana e está sendo tratado em um santuário. Enquanto se investiga o motivo pelo qual o animal chegou à rodovia, ele já recebeu atendimento médico e exames para avaliar seu estado de saúde.", "titulo_pt": "Está em perigo de extinção: resgataram um ciervo dos pantanos na Panamericana e agora ele se recupera em um santuário", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 26291, "titulo": "O tamanho da destruição na Venezuela, segundo balanço da Nasa", "url": "https://veja.abril.com.br/mundo/o-tamanho-da-destruicao-na-venezuela-segundo-balanco-da-nasa/", "fonte_id": "veja", "data_pub": "2026-06-30T10:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Imagens de satélite indicam que milhares de edifícios foram danificados ou destruídos na Venezuela após os terremotos. A avaliação é preliminar.", "titulo_pt": "Tamanho da destruição na Venezuela, segundo balanço da Nasa", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 26289, "titulo": "Terremotos danificaram 58 mil edifícios na Venezuela", "url": "https://www.cartacapital.com.br/mundo/terremotos-danificaram-58-mil-edificios-na-venezuela/", "fonte_id": "cartacapital", "data_pub": "2026-06-30T09:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma avaliação preliminar realizada por satélite pela Nasa indicou que 58 mil edifícios foram danificados por terremotos na Venezuela.", "titulo_pt": "Terremotos danificaram 58 mil edifícios na Venezuela", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 26385, "titulo": "\"Es el mayor problema productivo\": los suelos argentinos están en rojo por falta de nutrientes y cae la producción", "url": "https://www.clarin.com/rural/mayor-problema-productivo-suelos-argentinos-rojo-falta-nutrientes-cae-produccion_0_CI2iyxZDxt.html", "fonte_id": "clarin", "data_pub": "2026-06-30T09:20:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Nos últimos anos, as terras agrícolas argentinas passaram de um estado de abundância a um déficit extremo de nutrientes. O desempenho da soja está diminuindo significativamente, com uma brecha de rendimento de 28% devido à falta de fertilizantes.", "titulo_pt": "É o maior problema produtivo dos solos argentinos: estão em vermelho por falta de nutrientes e queda na produção", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 26956, "titulo": "Venezuela earthquake: La Guaira port turned into makeshift morgue", "url": "http://www.euronews.com/video/2026/06/30/venezuela-earthquake-la-guaira-port-turned-into-makeshift-morgue", "fonte_id": "euronews", "data_pub": "2026-06-30T09:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O porto de La Guaira na Venezuela foi convertido em um necrotério temporário após os terremotos, onde equipes forenses trabalham nos corpos e as famílias aguardam informações.", "titulo_pt": "Terremotos na Venezuela transformam porto de La Guaira em necrotério provisório", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 26314, "titulo": "Clima: Sul enfrenta temporais e Sudeste e Centro-Oeste têm tempo firme", "url": "https://www.metropoles.com/brasil/clima-sul-enfrenta-temporais-e-sudeste-e-centro-oeste-tem-tempo-firme", "fonte_id": "metropoles", "data_pub": "2026-06-30T08:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Sul do país enfrenta temporais e tem alerta de perigo para chuva forte, trovoadas e temporais severos. O Sudeste e Centro-Oeste têm tempo firme.", "titulo_pt": "Clima: Sul enfrenta temporais e Sudeste e Centro-Oeste têm tempo firme", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 26600, "titulo": "DR Congo says 1,307 Ebola cases confirmed, including 377 deaths", "url": "https://www.aljazeera.com/news/2026/6/30/dr-congo-says-1307-ebola-cases-confirmed-including-377-deaths?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-30T07:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A República Democrática do Congo confirmou 1.307 casos de Ebola, incluindo 377 mortes. A doença se espalhou para a quarta província, Haut-Uele, que faz fronteira com Sudão do Sul e República Centro-Africana.", "titulo_pt": "República Democrática do Congo registra 1.307 casos de Ebola, incluindo 377 mortes", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 26181, "titulo": "In the DRC's Ebola hotspot, a 'cascade of deaths' and fear of contamination", "url": "https://www.lemonde.fr/en/le-monde-africa/article/2026/06/30/in-the-drc-s-ebola-hotspot-a-cascade-of-deaths-and-fear-of-contamination_6754997_124.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-30T03:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Le Monde visitou Mongbwalu, uma cidade na região oriental da República Democrática do Congo, onde o surto de Ebola começou. O aumento contínuo no número de mortes sobrecarregou as instalações de saúde locais e organizações não-governamentais, prejudicadas por uma falta de recursos.", "titulo_pt": "Em zona atingida pelo Ebola na República Democrática do Congo, 'cascata de mortes' e medo de contaminação", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 25721, "titulo": "Europe's deadly heat wave scorches east, Slovakia hits record", "url": "https://www.koreaherald.com/article/10792925", "fonte_id": "korea_herald", "data_pub": "2026-06-30T02:43:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Europa enfrenta sua pior ola de calor registrada, com novos recordes sendo estabelecidos na região leste. A Slováquia registrou uma temperatura recorde de 41 graus Celsius em Turna nad Bodvou, enquanto Ucrânia foi obrigada a implementar cortes de energia para lidar com o calor extremo.", "titulo_pt": "Onda de calor mortal assola Europa; Ucrânia adota medidas de economia de energia", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 25736, "titulo": "Govt. to lower energy security alert on crude by notch amid eased uncertainties", "url": "https://www.koreaherald.com/article/10792757", "fonte_id": "korea_herald", "data_pub": "2026-06-30T02:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo planeja baixar o alerta de segurança energética para óleo cru uma notação, para o nível 2, devido à estabilização dos preços globais de petróleo e avanços nas negociações entre Estados Unidos e Irã. Além disso, o alerta para gás natural será totalmente levantado.", "titulo_pt": "Governo reduz alerta de segurança energética para óleo cru em uma notação", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 26560, "titulo": "'The heatwave shows, beyond any doubt, that without strong mitigation measures, adaptation will be impossible'", "url": "https://www.lemonde.fr/en/environment/article/2026/06/30/the-heatwave-shows-beyond-any-doubt-that-without-strong-mitigation-measures-adaptation-will-be-impossible_6754995_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-30T02:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A onda de calor demonstra, indubitavelmente, que sem medidas fortes de mitigação do clima, a adaptação será impossível. Combater o aquecimento global exige muito mais do que simples ajustes técnicos, escreve Stéphane Foucart em sua coluna para Le Monde.", "titulo_pt": "A onda de calor mostra, indubitavelmente, que sem medidas fortes de mitigação, a adaptação será impossível", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 25389, "titulo": "'We should not accept that heatwaves cause thousands of deaths. That is not normal'", "url": "https://www.lemonde.fr/en/environment/article/2026/06/30/we-should-not-accept-that-heatwaves-cause-thousands-of-deaths-that-is-not-normal_6754994_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-30T01:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Julien Dossier, fundador de uma empresa de consultoria ambiental e autor de 'Renaissance écologique', ofereceu uma avaliação política inicial da resposta francesa à mais intensa onda de calor registrada no país em uma entrevista ao Le Monde.", "titulo_pt": "Não devemos aceitar que ondas de calor causam milhares de mortes. Isso não é normal", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 25620, "titulo": "Ministry to hold public urban forest talks", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/30/2003859979", "fonte_id": "taipei_times", "data_pub": "2026-06-30T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Ministério planeja realizar discussões públicas sobre florestas urbanas.", "titulo_pt": "Ministério vai realizar debates públicos sobre florestas urbanas", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 26830, "titulo": "Torturado, abusado e morto pelo pai adotivo: o caso do bebê Preston", "url": "https://veja.abril.com.br/coluna/mundialista/torturado-abusado-e-morto-pelo-pai-adotivo-o-caso-do-bebe-preston/", "fonte_id": "veja", "data_pub": "2026-06-30T10:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O indivíduo responsável pelo abuso foi condenado, mas há suspeitas de que os assistentes sociais ignoraram evidências claras por medo de homofobia.", "titulo_pt": "Torturado, abusado e morto pelo pai adotivo: o caso do bebê Preston", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 26431, "titulo": "Regla oficial del DHS: quiénes deben registrarse y dar sus huellas para evitar multas o cárcel", "url": "https://www.lanacion.com.ar/estados-unidos/visas-y-tramites/regla-oficial-del-dhs-quienes-deben-registrarse-y-dar-sus-huellas-para-evitar-multas-o-carcel-nid30062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T10:17:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A nova regra do DHS nos Estados Unidos determina quais indivíduos devem se registrar e fornecer suas impressões digitais, além das sanções previstas para aqueles que não o fizerem. O título em português é: 'Regra oficial do DHS: quem deve se registrar e fornecer as impressões digitais para evitar multas ou prisão nos EUA'.", "titulo_pt": "Regra oficial do DHS: quem deve se registrar e fornecer as impressões digitais para evitar multas ou prisão nos EUA", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 26660, "titulo": "What will Hong Kong’s proposed reforms to sexual offences laws change?", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3358898/what-will-hong-kongs-proposed-reforms-sexual-offences-laws-change?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T09:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As autoridades de Hong Kong propuseram uma reforma abrangente das leis sobre crimes sexuais da cidade, incluindo ampliar a definição de estupro, introduzir novos delitos envolvendo atos não consensuais com crianças e pessoas com deficiência mental, definir uma idade mínima consentida uniforme em 16 anos e remover disposições específicas de gênero. As propostas estão sendo consultadas publicamente durante um mês.", "titulo_pt": "O que as reformas propostas sobre leis de crimes sexuais em Hong Kong mudarão?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 26422, "titulo": "ADPF 1339: as mulheres trans e a cota de gênero nas eleições", "url": "https://www.jota.info/opiniao-e-analise/artigos/adpf-1339-as-mulheres-trans-e-a-cota-de-genero-nas-eleicoes", "fonte_id": "jota", "data_pub": "2026-06-30T08:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal (STF) pode decidir sobre uma ação que busca eliminar uma interpretação considerada um claro retrocesso social para mulheres trans no sistema de cotas de gênero nas eleições.", "titulo_pt": "ADPF 1339: as mulheres trans e a cota de gênero nas eleições", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 26528, "titulo": "Arrests Spike as Vietnam Sees New ‘Wave of Repression,’ Rights Group Says", "url": "https://thediplomat.com/2026/06/arrests-spike-as-vietnam-sees-new-wave-of-repression-rights-group-says/", "fonte_id": "the_diplomat", "data_pub": "2026-06-30T02:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de advocacy baseado em Bangkok registrou 56 prisões políticas no ano passado, o maior número desde 2018. Segundo uma organização dos direitos humanos, há um novo 'válio de repressão' na Vietnã.", "titulo_pt": "Prisões Políticas Spike como Nova ‘Válvula de Repressão’ no Vietnã, Diz Grupo de Direitos Humanos", "veiculo": "The Diplomat", "pais": "Japão", "classe": "B"}, {"id": 25767, "titulo": "Disability rights activists to resume protests in Seoul this week", "url": "https://en.yna.co.kr/view/AEN20260630004800315", "fonte_id": "yonhap_news", "data_pub": "2026-06-30T02:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de ativistas pelos direitos das pessoas com deficiência anunciou que vai retomar as manifestações na cidade de Seul nesta semana.", "titulo_pt": "Ativistas dos direitos das pessoas com deficiência planejam retomar protestos em Seul esta semana", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">
      <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
      <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
      <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
      <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
    </div>` : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices();
    return (
      vs.find(function (v) { return v.lang === 'pt-BR'; }) ||
      vs.find(function (v) { return v.lang.startsWith('pt'); }) ||
      null
    );
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // sempre a .sumario imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
