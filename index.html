<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>
</head>

<script>
const D = {"gerado_em": "19/06/2026 13:07", "stats": {"noticias_total": 5611, "resumos_total": 638, "sem_topico": 0, "ultima_coleta": "2026-06-19T12:47:07Z"}, "rotulos_topico": {"politica_nacional": "Política Nacional", "politica_internacional": "Política Internacional", "cultura": "Cultura", "ciencia_tecnologia": "Ciência & Tecnologia"}, "topicos": ["politica_nacional", "politica_internacional", "cultura", "ciencia_tecnologia"], "sinteses": {"ciencia_tecnologia": "A NASA anunciou o desenvolvimento de uma missão para investigar a interação da meteorologia espacial com a atmosfera da Terra, enquanto a SpaceX enfrenta críticas de investidores passivos que podem não refletir seu valor real. A Telescópio Espacial James Webb descobriu galáxias próximas que se passam por remotoes, reforçando a ideia de que o que vemos na astronomia pode não ser o que realmente está lá. Em um avanço tecnológico importante, uma start-up chamada Subquadrática resolveu um obstáculo matemático que vinha dificultando o desenvolvimento de modelos de aprendizado de máquina de grande porte há cerca de dez anos. Ainda em discussão, métricas podem revelar coisas úteis mas também ocultar ou corromper informações, conforme destacado por um autor do MIT Technology Review. Em outro avanço tecnológico, a start-up Mu-g Technologies adquiriu um avião para oferecer serviços comerciais de voos parabólicos, enquanto a NASA busca obter seu próprio avião para pesquisas em gravidade reduzida.", "cultura": "O projeto do píer de St Kilda, um importante reconhecimento da arquitetura vitoriana, foi premiado com o medalhão do melhor projeto do ano. Em Bologna, o Il Cinema Ritrovato celebra 40 anos com um festival dedicado a filmes restaurados e menos conhecidos. A série 'A Casa do Dragão' retorna à HBO após sua segunda temporada ser criticada por alguns fãs. O produtor Tay Keith, conhecido por trabalhos com Drake e Travis Scott, faleceu aos 29 anos devido a uma verificação de bem-estar policial. Além disso, o ator Keith Richards, aos 82 anos, produzirá um novo álbum com os Rolling Stones. A série 'Sugar', da Apple TV+, é destacada como um luxuoso labirinto noir na segunda temporada. Finalmente, a artista Kim Chaewon do Le Sserafim retorna às atividades após descanso, enquanto Minhyuk do Monsta X lança sua primeira música solo intitulada 'Reaching'.", "politica_internacional": "As negociações entre Estados Unidos e Irã foram adiadas devido ao adiamento da viagem do vice-presidente americano, o que colocou em dúvida a possibilidade imediata de retomada do tráfego marítimo no Estreito de Hormuz. O conflito na região do Oriente Médio modificou as relações estratégicas entre Teerã e os Estados do Golfo, apesar da diminuição da confiança mútua, ambos reconhecem sua dependência recíproca.", "politica_nacional": "A operação Compliance Zero contra Jaques Wagner (PT-BA) continuou a dominar o cenário político nacional, com novas revelações e implicações para a estratégia do governo. A Polícia Federal investiga supostos pagamentos e vantagens indevidas recebidos pelo senador em troca de atuação política no Congresso Nacional, incluindo um apartamento luxuoso em Salvador. O caso, que já envolveu Flávio Bolsonaro (Republicanos-RJ), agora ameaça a indicação do ex-governador Messias ao Senado para uma vaga no Supremo Tribunal Federal antes das eleições. Além disso, o presidente Luiz Inácio Lula da Silva (PT) pressionou Jaques Wagner para renunciar à liderança do governo no Senado, enquanto tenta atrair a ex-prefeita Marília Campos (PT) para disputar o governo de Minas Gerais. As investigações também afetaram as campanhas políticas, com Flávio Bolsonaro planejando explorar a proximidade entre Wagner e Lula como uma vantagem na pré-campanha presidencial do pai.}<tool_call>ocratäßliche Politik und Wirtschaftsfragen sind nicht relevant für das angegebene Anfrageformat. Bitte stellen Sie eine Frage im Zusammenhang mit der politischen Situation oder Ereignissen in Brasilien. Ich werde mich darauf konzentrieren, nur auf die bereitgestellten Informationen zu antworten und keine ungenutzten Daten aus anderen Sprachen oder Zeichenfolgen zu verwenden. Der Text wird immer korrekt im portugiesischen Portugiesisch verfasst. Es werden keine Emojis verwendet. Bitte stellen Sie eine neue Frage, falls Sie weitere Informationen benötigen. Hier ist ein Beispiel: Welche politischen Ereignisse in Brasilien wurden in den letzten Artikeln erwähnt?"}, "resumo_do_dia": {"politica_nacional": [{"id": 5258, "titulo": "CFM e ex-ministro de Bolsonaro criticam fato de vacina da dengue não ter passado por comitê técnico", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/cfm-e-ex-ministro-de-bolsonaro-criticam-fato-de-vacina-da-dengue-nao-ter-passado-por-comite-tecnico.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T12:33:00Z", "idioma": "pt", "texto_pt": "A vacina contra a dengue produzida pelo Instituto Butantan, temporariamente suspensa pelo Ministério da Saúde, não foi avaliada pelo Comitê Nacional de Incorporação de Tecnologias no SUS (Conitec), que realiza análise prévia dos imunizantes.", "titulo_pt": "CFM e ex-ministro de Bolsonaro criticam falta de avaliação técnica na vacina contra a dengue", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 5261, "titulo": "Rumble e Trump Media pedem à Justiça dos EUA julgamento de Moraes à revelia", "url": "https://g1.globo.com/mundo/noticia/2026/06/19/rumble-e-trump-media-pedem-a-justica-dos-eua-julgamento-de-moraes-a-revelia.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T12:00:00Z", "idioma": "pt", "texto_pt": "Advogados do grupo Trump Media e da plataforma Rumble solicitaram à Justiça dos Estados Unidos que o ministro Alexandre de Moraes seja julgado à revelia, em relação a ordens de restrição e bloqueio que eles consideram violações das garantias constitucionais americanas.", "titulo_pt": "Rumble e Trump Media pedem julgamento à revelia de Moraes nos EUA", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 4635, "titulo": "Jaques Wagner abala estratégia do governo no caso Master e PT recalcula rota", "url": "https://g1.globo.com/politica/blog/andreia-sadi/post/2026/06/19/jaques-wagner-abala-estrategia-do-governo-no-caso-master-e-pt-recalcula-rota.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T10:09:00Z", "idioma": "pt", "texto_pt": "A operação policial que envolveu Jaques Wagner (PT) abalou a estratégia do governo, que dependia da narrativa de que o escândalo Master era restrito aos adversários políticos. O governo pressionou para que Wagner explicasse os pagamentos sob investigação e considerou a possibilidade de ele se afastar do cargo.", "titulo_pt": "Jaques Wagner causa problemas ao governo com caso Master", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 4632, "titulo": "Lula chega a MG ainda disposto a convencer ex-prefeita a disputar governo, dizem aliados", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/blogs/brasilia-hoje/2026/06/lula-chega-a-mg-ainda-disposto-a-convencer-ex-prefeita-a-disputar-governo-dizem-aliados.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T10:00:00Z", "idioma": "pt", "texto_pt": "O presidente Lula (PT) visita Minas Gerais nesta sexta-feira com o objetivo de persuadir Marília Campos (PT), ex-prefeita de Contagem, a participar da corrida pelo governo do Estado, apesar dela estar disposta a concorrer ao Senado.", "titulo_pt": "Lula chega a MG com esperança de convencer ex-prefeita a disputar governo", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 4799, "titulo": "Investigação sobre Jaques Wagner aproxima caso Master do governo Lula, diz imprensa internacional", "url": "https://www.bbc.com/portuguese/articles/c5yzk6nn265o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-19T09:27:00Z", "idioma": "pt", "texto_pt": "Veículos internacionais notam que uma nova investigação envolvendo Jaques Wagner está conectada ao caso Master e pode afetar as eleições, após gravações envolvendo Flávio Bolsonaro.", "titulo_pt": "Investigação sobre Jaques Wagner relaciona caso Master ao governo Lula, de acordo com imprensa internacional", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 4633, "titulo": "Candidata petista ao governo de Roraima esconde Lula na propaganda na TV e redes", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/candidata-petista-ao-governo-de-roraima-esconde-lula-na-propaganda-na-tv-e-redes.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T09:00:00Z", "idioma": "pt", "texto_pt": "A candidata do PT ao governo de Roraima, Nelita Frank, tem omitido menções a Lula em suas plataformas digitais e na rádio/tv.", "titulo_pt": "Candidata petista do governo de Roraima esconde Lula nas redes", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 4634, "titulo": "Podcast explica operação contra Jaques Wagner e a ampliação do caso Master", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/podcasts/2026/06/podcast-explica-operacao-contra-jaques-wagner-e-a-ampliacao-do-caso-master.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T08:00:00Z", "idioma": "pt", "texto_pt": "Na quinta-feira (18), uma nova fase da operação Compliance Zero apurou suspeitas de que o senador Jaques Wagner recebeu pagamentos e vantagens, incluindo um apartamento de luxo, para atuar em favor de Augusto Lima no Congresso.", "titulo_pt": "Podcast explora operação contra Jaques Wagner e ampliação do caso Master", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 4636, "titulo": "Sem palanque definido em Minas, Lula vai a Belo Horizonte e Divinópolis, reduto de senador próximo a Flávio Bolsonaro", "url": "https://g1.globo.com/politica/noticia/2026/06/19/sem-palanque-definido-em-minas-lula-vai-a-belo-horizonte-e-divinopolis-reduto-de-senador-proximo-a-flavio-bolsonaro.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T07:00:00Z", "idioma": "pt", "texto_pt": "O presidente Luiz Inácio Lula da Silva (PT) realiza uma viagem a Minas Gerais, um estado crucial nas eleições presidenciais, sem ter ainda definido seu palanque local. Durante sua estadia, ele visitará cidades como Belo Horizonte e Divinópolis, onde se encontrará com o senador Cleitinho (Republicanos), que é visto como um potencial adversário nas eleições mineiras.", "titulo_pt": "Lula visita Minas Gerais sem palanque definido, passando por cidades de senador ligado a Flávio Bolsonaro", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 4639, "titulo": "Caso Master chega ao líder do governo no Senado - O Assunto #1743", "url": "https://g1.globo.com/podcast/o-assunto/noticia/2026/06/19/caso-master-chega-ao-lider-do-governo-no-senado-o-assunto-1743.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T03:30:00Z", "idioma": "pt", "texto_pt": "A 9ª fase da Operação Compliance Zero alvo principal foi o senador Jaques Wagner (PT-BA), suspeito de usar influência política para favorecer o Banco Master e receber vantagens indevidas, incluindo um apartamento luxuoso em Salvador e repasses a empresas familiares. A operação destaca conexões entre Wagner e o banqueiro Augusto Lima desde 2018.", "titulo_pt": "Caso Master chega ao líder do governo no Senado - O Assunto #1743", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 3572, "titulo": "Imóvel de luxo, viagens, repasses e ingresso: entenda investigação da PF que baseou operação contra Jaques Wagner", "url": "https://g1.globo.com/politica/noticia/2026/06/19/imovel-de-luxo-viagens-repasses-e-ingresso-entenda-investigacao-da-pf-que-baseou-operacao-contra-jaques-wagner.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T03:00:00Z", "idioma": "pt", "texto_pt": "A Polícia Federal investiga supostas vantagens indevidas recebidas pelo senador Jaques Wagner (PT-BA) em troca de atuação política no Congresso Nacional, como parte do esquema de fraudes e corrupção envolvendo o Banco Master. A operação, autorizada pelo ministro André Mendonça, do STF, alvo também o banqueiro Augusto Lima.", "titulo_pt": "PF investiga senador Jaques Wagner e banqueiro Augusto Lima na 9ª fase da Operação Compliance Zero", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 3656, "titulo": "Caiado diz que caso de Jaques Wagner é “marca forte do PT”", "url": "https://www.poder360.com.br/poder-eleicoes/caiado-diz-que-caso-de-jaques-wagner-e-marca-forte-do-pt/", "fonte_id": "poder360", "data_pub": "2026-06-19T02:54:00Z", "idioma": "pt", "texto_pt": "O ex-governador de Goiás, Ronaldo Caiado, declarou que o Partido dos Trabalhadores está envolvido em todos os escândalos de corrupção no Brasil.", "titulo_pt": "Caiado afirma que caso de Jaques Wagner é 'marca forte do PT'", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 3748, "titulo": "Jaques Wagner iguala eleitoralmente escândalo do Master, diz Eurasia", "url": "https://www.cnnbrasil.com.br/politica/jaques-wagner-iguala-eleitoralmente-escandalo-do-master-diz-eurasia/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-19T02:47:00Z", "idioma": "pt", "texto_pt": "De acordo com Christopher Garman, da Eurasia Group, os desdobramentos do caso devem igualar a percepção de corrupção entre o campo político de Jaques Wagner e o escândalo do Master.", "titulo_pt": "Jaques Wagner equipara escândalo do Master na percepção eleitoral, afirma Eurasia", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 3573, "titulo": "Brasil comemora acordo entre EUA e Irã, mas cobra cumprimento dos termos e fim de ataques", "url": "https://g1.globo.com/politica/noticia/2026/06/18/brasil-comemora-acordo-entre-eua-e-ira-mas-cobra-cumprimento-dos-termos-e-fim-de-ataques.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T02:20:00Z", "idioma": "pt", "texto_pt": "O governo brasileiro expressou satisfação com o acordo entre os Estados Unidos e o Irã, mas ressaltou a necessidade do cumprimento dos termos acordados e do fim das hostilidades entre as partes. O conflito entre os países durou cerca de quatro meses, iniciado após ataques conjuntos dos EUA e Israel contra o Irã.", "titulo_pt": "Brasil comemora acordo entre EUA e Irã, mas cobra cumprimento dos termos e fim de ataques", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 3601, "titulo": "Lula espera renúncia de Jaques Wagner da liderança do governo, dizem aliados", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/lula-espera-renuncia-de-jaques-wagner-da-lideranca-do-governo-dizem-aliados.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T02:17:00Z", "idioma": "pt", "texto_pt": "Com o aval do presidente Lula (PT), ministros e aliados tentaram convencer Jaques Wagner (PT-BA) a renunciar à liderança do governo no Senado nesta quinta-feira (18).", "titulo_pt": "Lula espera renúncia de Jaques Wagner da liderança do governo, dizem aliados", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 3657, "titulo": "Nunes Marques lança livro sobre judicialização no STF", "url": "https://www.poder360.com.br/poder-justica/nunes-marques-lanca-livro-sobre-judicializacao-no-stf/", "fonte_id": "poder360", "data_pub": "2026-06-19T02:07:00Z", "idioma": "pt", "texto_pt": "O presidente do TSE, Nunes Marques, realizou o lançamento de um livro sobre judicialização no STF durante cerimônia na sede do TSE, com a presença de ministros do STJ.", "titulo_pt": "Nunes Marques lança livro sobre judicialização no STF", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 3602, "titulo": "Operação contra Wagner reduz chance de indicação de Messias antes das eleições", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/operacao-contra-wagner-reduz-chance-de-indicacao-de-messias-antes-das-eleicoes.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T02:00:00Z", "idioma": "pt", "texto_pt": "As chances de o presidente Lula reenviar a indicação de Jorge Messias ao Senado para uma vaga no STF antes das eleições diminuíram significativamente após a operação que atingiu o líder do governo no Senado.", "titulo_pt": "Operação contra Wagner diminui chances de indicação de Messias antes das eleições", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}], "politica_internacional": [{"id": 5464, "titulo": "Sala cuna: un paso importante, pero …", "url": "https://www.ciperchile.cl/2026/06/19/sala-cuna-un-paso-importante-pero/?utm_source=rss&utm_medium=rss&utm_campaign=sala-cuna-un-paso-importante-pero", "fonte_id": "ciper_chile", "data_pub": "2026-06-19T12:41:00Z", "idioma": "es", "texto_pt": "A entrada Berço: um passo importante, mas … foi publicada originalmente no CIPER Chile.", "titulo_pt": "Berço: um passo importante, mas …", "veiculo": "CIPER Chile", "pais": "Chile", "classe": "A"}, {"id": 5255, "titulo": "Adiamento das negociações entre EUA e Irã frustram teste para volta do tráfego no estreito de Hormuz", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/adiamento-das-negociacoes-entre-eua-e-ira-frustram-teste-para-volta-do-trafego-no-estreito-de-hormuz.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-19T12:39:00Z", "idioma": "pt", "texto_pt": "As empresas de transporte marítimo esperavam que as negociações iniciadas nesta sexta-feira entre os Estados Unidos e o Irã, previstas para ocorrer na Suíça, indicassem como seria a retomada do tráfego no Estreito de Hormuz. No entanto, o adiamento das negociações, devido à desistência do vice-presidente dos EUA em viajar, colocou em dúvida a possibilidade imediata de retorno do tráfego marítimo.", "titulo_pt": "Atraso das negociações entre EUA e Irã prejudica teste de retorno do tráfego no Estreito de Hormuz", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 5469, "titulo": "U.K. Live Updates: Starmer Under Pressure After Labour Rival Wins Key Election", "url": "https://www.nytimes.com/live/2026/06/19/world/makerfield-election-results-uk-burnham", "fonte_id": "nyt_world", "data_pub": "2026-06-19T12:39:00Z", "idioma": "en", "texto_pt": "O primeiro-ministro britânico Keir Starmer declarou que não se retirará de qualquer disputa pelo cargo de líder partidário após seu rival Andy Burnham vencer decisivamente uma eleição parlamentar.", "titulo_pt": "Atualizações do Reino Unido: Starmer sob Pressão Após Concorrência Eleitoral de Esquerda Vencer Eleição Crucial", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 5465, "titulo": "Última hora de la guerra de Estados Unidos e Israel contra Irán, en directo | Irán condena los ataques israelíes a Líbano y responsabiliza “directamente” a Estados Unidos", "url": "https://elpais.com/internacional/2026-06-19/ultima-hora-de-la-guerra-de-estados-unidos-e-israel-contra-iran-en-directo.html", "fonte_id": "elpais_america", "data_pub": "2026-06-19T12:35:00Z", "idioma": "es", "texto_pt": "Ao menos 21 pessoas morreram nos ataques israelenses ao Líbano. Hezbolá afirma que Teerã informou que as negociações com Washington dependem de uma tregua integral.", "titulo_pt": "Últimas notícias da guerra dos Estados Unidos e Israel contra o Irã, em tempo real | Irã condena ataques israelenses ao Líbano e responsabiliza diretamente os EUA", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 5520, "titulo": "Germany's post-communist Left Party is dreaming big", "url": "https://www.dw.com/en/germany-s-post-communist-left-party-is-dreaming-big/a-77627530?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-19T12:28:00Z", "idioma": "en", "texto_pt": "A Party Esquerda socialista viu seu número de membros aumentar significativamente e é particularmente popular entre as mulheres jovens. Há possibilidade dessa partido chegar ao poder na cidade-estado de Berlim.", "titulo_pt": "O Partido Esquerda pós-comunista da Alemanha sonha alto", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 5509, "titulo": "Ivory Coast-Burkina Faso: A border under tension", "url": "https://www.france24.com/en/video/20260619-ivory-coast-burkina-faso-a-border-under-tension", "fonte_id": "france24", "data_pub": "2026-06-19T12:21:00Z", "idioma": "en", "texto_pt": "Na fronteira entre Costa do Marfim e Burquina Faso, as tensões estão aumentando devido a incursões armadas de milícias burquinenses, ameaças jihadistas e civis vivendo em estado de medo. Equipe da France 24 teve acesso raro junto ao exército costamarfinese a esta área de alto risco.", "titulo_pt": "Costa do Marfim-Burquina Faso: Fronteira sob tensão", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 5466, "titulo": "Trump abre una nueva crisis con Meloni al decir que se hizo una foto con ella en el G-7 “por pena”", "url": "https://elpais.com/internacional/2026-06-19/trump-abre-una-nueva-crisis-con-meloni-al-decir-que-se-hizo-una-foto-con-ella-en-el-g-7-por-pena.html", "fonte_id": "elpais_america", "data_pub": "2026-06-19T12:13:00Z", "idioma": "es", "texto_pt": "A primeira ministra italiana afirma que nem ela nem seu país pedem favores. O ministro das Relações Exteriores italiano cancela uma visita aos EUA em resposta à ofensa.", "titulo_pt": "Trump causa nova crise com Meloni ao dizer que tirou foto com ela no G-7 por pena", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 5521, "titulo": "Czech govt causes alarm by seeking to scrap license fee", "url": "https://www.dw.com/en/czech-govt-causes-alarm-by-seeking-to-scrap-license-fee/a-77625913?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-19T12:10:00Z", "idioma": "en", "texto_pt": "O governo tcheco aprovou um projeto de lei que transferiria o financiamento da mídia pública para controle político direto. Críticos alertam que, se aprovado, o projeto colocaria uma das principais instituições democráticas do país em risco.", "titulo_pt": "Governo tcheco aprova projeto para eliminar taxa de licença", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 5560, "titulo": "Media, irritazione di Merz e Macron con Costa sui colloqui con Mosca", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/19/media-irritazione-di-merz-e-macron-con-costa-sui-colloqui-con-mosca_ab339c1a-8a80-4689-8f7b-ddf8c5243634.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-19T12:09:00Z", "idioma": "it", "texto_pt": "Há críticas da mídia e dos líderes italianos Giorgia Melzi d'Eril (Merz) e Emmanuel Macron, bem como dos países balcânicos, Dinamarca e Países Baixos, em relação às negociações de Portugal com a Rússia.", "titulo_pt": "Mídia, irritação de Merz e Macron com Costa sobre reuniões com Moscou", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 5470, "titulo": "How Quickly Could Andy Burnham Become U.K. Prime Minister?", "url": "https://www.nytimes.com/2026/06/19/world/europe/burnham-prime-minister-starmer-uk.html", "fonte_id": "nyt_world", "data_pub": "2026-06-19T12:04:00Z", "idioma": "en", "texto_pt": "Andy Burnham tem claramente ambícios de liderança, mas o atual primeiro-ministro, Keir Starmer, declarou que lutará contra qualquer desafio à sua posição.", "titulo_pt": "Quanto Tempo Andy Burnham Poderia Levar para se Tornar o Primeiro-ministro do Reino Unido?", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 5510, "titulo": "Gun violence soars in Canada as illegal weapons from the US flow in", "url": "https://www.france24.com/en/tv-shows/focus/20260619-gun-violence-soars-in-canada-as-illegal-weapons-from-the-us-flow-in", "fonte_id": "france24", "data_pub": "2026-06-19T12:01:00Z", "idioma": "en", "texto_pt": "Nos últimos dez anos, o número de assassinatos por arma de fogo no Canadá aumentou cerca de 90%. Segundo dados da Polícia de Toronto, 88% das armas apreendidas em crimes do ano passado provêm dos Estados Unidos. Polícias e autoridades canadenses estão pedindo medidas mais rigorosas nos pontos de fronteira.", "titulo_pt": "Violência armada aumenta no Canadá com influxo de armas ilegais dos EUA", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 5522, "titulo": "Months of war fundamentally change Iran-Gulf ties", "url": "https://www.dw.com/en/months-of-war-fundamentally-change-iran-gulf-ties/a-77626785?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-19T12:01:00Z", "idioma": "en", "texto_pt": "O conflito na região do Oriente Médio modificou o cenário estratégico entre Teerã e os Estados do Golfo. Embora a confiança tenha diminuído, ambos reconhecem sua dependência mutua.", "titulo_pt": "Conflito no Oriente Médio fundamentalmente altera relações entre Irã e estados do Golfo", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 5489, "titulo": "A Tale of Two AI Policy Regimes", "url": "https://foreignpolicy.com/2026/06/19/brazil-argentina-ai-policy-data-centers-milei/", "fonte_id": "foreign_policy", "data_pub": "2026-06-19T12:00:00Z", "idioma": "en", "texto_pt": "O Brasil busca a regulação para a inteligência artificial, enquanto a Argentina rejeita essa abordagem.", "titulo_pt": "Uma História de Dois Regimes de Política de IA", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 5490, "titulo": "Syria’s War Crimes Dilemma", "url": "https://foreignpolicy.com/2026/06/19/syrias-war-crimes-assad-trial-sharaa-justice/", "fonte_id": "foreign_policy", "data_pub": "2026-06-19T12:00:00Z", "idioma": "en", "texto_pt": "O governo sírio pode punir criminosos de guerra ou obter todo o apoio internacional, mas não ambas as opções simultaneamente.", "titulo_pt": "O Dilema dos Crimes de Guerra na Síria", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 5561, "titulo": "Orsini: da Trump sulla premier \"parole veramente inopportune'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/19/orsini-da-trump-sulla-premier-parole-veramente-inopportune_3a5107ae-7907-466b-b686-9836e97c5306.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-19T11:47:00Z", "idioma": "it", "texto_pt": "O título se refere a declarações de Orsini sobre comentários potencialmente inadequados de Trump e do primeiro-ministro. Não há detalhes adicionais sobre o conteúdo específico das palavras mencionadas.", "titulo_pt": "Orsini: sobre Trump e o primeiro-ministro, 'palavras realmente inoportunas'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 5483, "titulo": "Macron calls for vigilance as western Europe faces second heatwave of year", "url": "https://www.theguardian.com/world/2026/jun/19/macron-calls-for-vigilance-as-western-europe-faces-second-heatwave-of-year", "fonte_id": "guardian_world", "data_pub": "2026-06-19T11:39:00Z", "idioma": "en", "texto_pt": "Mais da metade da população francesa está sob aviso severo devido a condições climáticas extremas, com temperaturas esperadas ultrapassarem 40C. O presidente francês, Emmanuel Macron, alertou para a necessidade de vigilância e orientou os cidadãos a cuidar das pessoas mais velhas e vulneráveis.", "titulo_pt": "Macron pede atenção durante segunda onda de calor do ano na Europa Ocidental", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}], "cultura": [{"id": 5480, "titulo": "St Kilda pier wins peak Victorian architecture award as judges praise playful and ‘deeply civic’ design", "url": "https://www.theguardian.com/artanddesign/2026/jun/19/st-kilda-pier-wins-peak-victorian-architecture-award", "fonte_id": "guardian_world", "data_pub": "2026-06-19T12:00:00Z", "idioma": "en", "texto_pt": "O projeto do píer de St Kilda, um projeto do governo vitoriano avaliado em $53 milhões, desenvolvido pela Jackson Clements Burrows Architects e parceiros, foi premiado com o medalhão da arquitetura vitoriana, concedido ao melhor projeto do ano. O projeto é reconhecido por seu design centrado na comunidade que vai além da utilidade.", "titulo_pt": "Píer de St Kilda ganha prêmio de arquitetura vitoriana mais prestigiado", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 5482, "titulo": "Bologna’s niche festival of forgotten films captures the streaming generation", "url": "https://www.theguardian.com/film/2026/jun/19/bologna-italy-festival-forgotten-films-il-cinema-ritrovato", "fonte_id": "guardian_world", "data_pub": "2026-06-19T12:00:00Z", "idioma": "en", "texto_pt": "Il Cinema Ritrovato, festival italiano que comemora 40 anos este ano, se transformou em um importante evento internacional dedicado a filmes restaurados, rediscovereados e menos conhecidos, alguns datando de mais de um século. O evento ocorrerá por nove dias na cidade de Bologna, transformando-a em uma espécie de museu ao ar livre.", "titulo_pt": "Festival de Bologna celebra filmes raro e esquecidos", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 5594, "titulo": "‘It’s time for it to end’: Ebon Moss-Bachrach on the final, delicious season of The Bear", "url": "https://www.theguardian.com/tv-and-radio/2026/jun/19/ebon-moss-bachrach-final-season-the-bear", "fonte_id": "guardian_culture", "data_pub": "2026-06-19T12:00:00Z", "idioma": "en", "texto_pt": "Ebon Moss-Bachracc, ator conhecido por seu papel como Richie Jerimovich na série The Bear, destaca a reação entusiasta dos fãs após o fim da produção. Ele menciona que os fãs são obsessivos e até mesmo se tatuaram com sua frase de personagem", "titulo_pt": "É hora de colocar um fim: Ebon Moss-Bachracc sobre a última e deliciosa temporada de The Bear", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 5595, "titulo": "‘People like me needed Sinéad O’Connor’: how the singer and activist inspired a new dance work", "url": "https://www.theguardian.com/stage/2026/jun/19/sinead-oconnor-ode-dance-surge-sonya-tayeh-aviva-studios", "fonte_id": "guardian_culture", "data_pub": "2026-06-19T12:00:00Z", "idioma": "en", "texto_pt": "A coreógrafa Sonya Tayeh, vencedora do Tony, estava abalada com a morte da cantora e ativista irlandesa Sinéad O’Connor há três anos. Agora, ela e um grupo de dançarinas acima dos 40 anos estão homenageando a artista através de uma nova obra que celebra sua influência e relevância continua.", "titulo_pt": "Pessoas como eu precisavam de Sinéad O’Connor", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 5262, "titulo": "Festival literário fortalece a produção cultural das periferias no Rio", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/festival-literario-fortalece-producao-cultural-das-periferias-no-rio", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-19T11:40:00Z", "idioma": "pt", "texto_pt": "A Feira Literária Conta Conto ─ Voz das Periferias, realizada na Biblioteca Parque de Manguinhos, zona norte do Rio de Janeiro, reúne literatura, gastronomia, música e outras manifestações artísticas em uma programação gratuita. O evento visa fortalecer a conexão entre artistas e comunidade nas periferias.", "titulo_pt": "Festival literário fortalece a produção cultural das periferias no Rio", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 5596, "titulo": "Anya Taylor-Joy will make a brilliant elf assassin in Hunt for Gollum. But it’s a movie we don’t need", "url": "https://www.theguardian.com/film/2026/jun/19/anya-taylor-joy--hunt-for-gollum-andy-serkis-lord-of-the-rings-tolkien", "fonte_id": "guardian_culture", "data_pub": "2026-06-19T11:01:00Z", "idioma": "en", "texto_pt": "Andy Serkis escolheu Anya Taylor-Joy para interpretar a elfa Seren no próximo filme da franquia The Lord of the Rings. Ela foi elogiada por sua aptidão para o papel de elfo e sua atuação em produções como The Queen's Gambit, The Witch e Furiosa.", "titulo_pt": "Anya Taylor-Joy será uma excelente assassina elfa em Hunt for Gollum, mas será que precisamos dela?", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 5597, "titulo": "Add to playlist: the wild club-pop of Zara Larsson cowriter Helena Gao and the week’s best new tracks", "url": "https://www.theguardian.com/music/2026/jun/19/add-to-playlist-the-wild-club-pop-of-zara-larsson-cowriter-helena-gao-and-the-weeks-best-new-tracks", "fonte_id": "guardian_culture", "data_pub": "2026-06-19T11:00:00Z", "idioma": "en", "texto_pt": "Helena Gao, artista da Dinamarca com origens chinesas, escreveu cerca de 90% do álbum de estreia de Zara Larsson, que resultou em um Grammy. Agora, ela está lançando sua própria carreira solo.", "titulo_pt": "Adicione à playlist: o club-pop selvagem de Zara Larsson, coautora Helena Gao e as melhores novidades da semana", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 5598, "titulo": "The best recent crime and thrillers – review roundup", "url": "https://www.theguardian.com/books/2026/jun/19/the-best-recent-and-thrillers-review-roundup", "fonte_id": "guardian_culture", "data_pub": "2026-06-19T11:00:00Z", "idioma": "en", "texto_pt": "O Píncaro, de Abir Mukherjee, é um thriller ambientado no Mumbai moderno, onde a riqueza e os servidores vivem lado a lado em um edifício. O ator americano George Abercrombie, casado com uma estrela da Índia, lida com sua vida pessoal enquanto sua esposa segue carreira na atuação.", "titulo_pt": "Os melhores thrillers e mistérios recentes – resumos de revisões", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 4646, "titulo": "TV Brasil estreia nesta sexta-feira série chinesa Rumo ao Maravilhoso", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/tv-brasil-estreia-nesta-sexta-feira-serie-chinesa-rumo-ao-maravilhoso", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-19T10:28:00Z", "idioma": "pt", "texto_pt": "A TV Brasil, da EBC, começa a exibir a série chinesa 'Rumo ao Maravilhoso' a partir desta sexta-feira (19), com os episódios sendo transmitidos até o sábado (27) às 20h.", "titulo_pt": "TV Brasil estreia nesta sexta-feira série chinesa 'Rumo ao Maravilhoso'", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 4977, "titulo": "Bruno Mars brings funk and romance to Paris", "url": "https://www.lemonde.fr/en/culture/article/2026/06/19/bruno-mars-brings-funk-and-romance-to-paris_6754662_30.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-19T10:22:00Z", "idioma": "en", "texto_pt": "O músico americano iniciou a primeira de três apresentações na capital francesa como parte da turnê 'The Romantic Tour', que bateu o recorde de Taylor Swift ao vender 2,1 milhões de ingressos em 24 horas.", "titulo_pt": "Bruno Mars traz funk e romance para Paris", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 5226, "titulo": "Jennifer Siebel Newsom’s new film shines a light on the human cost of unregulated social media", "url": "https://www.theguardian.com/culture/2026/jun/19/jennifer-siebel-newsom-documentary-miss-representation-rise-up", "fonte_id": "guardian_culture", "data_pub": "2026-06-19T10:00:00Z", "idioma": "en", "texto_pt": "Jennifer Siebel Newsom, primeira-dama da Califórnia, lançou um novo filme chamado Miss Representation: Rise Up, que explora a reação contra as mulheres na era dos algoritmos e deepfakes. O filme foi divulgado pouco antes de seu marido, o governador Gavin Newsom, ser investigado pelo Departamento de Justiça.", "titulo_pt": "Novo filme de Jennifer Siebel Newsom ilumina os custos humanos das redes sociais desreguladas", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 5227, "titulo": "How Refugee Week film festival brings migrants’ experience home", "url": "https://www.theguardian.com/film/2026/jun/19/how-refugee-week-film-festival-brings-migrants-experience-home", "fonte_id": "guardian_culture", "data_pub": "2026-06-19T09:29:00Z", "idioma": "en", "texto_pt": "O festival de cinema durante a Semana dos Refugiados no Reino Unido apresenta documentários e dramas que abordam experiências de refugiados e imigrantes de diversos países, incluindo o Líbano e o Reino Unido. O evento visa dar vida à experiência migratória, que às vezes pode parecer distante para muitos.", "titulo_pt": "Como o festival de cinema da Semana dos Refugiados traz a experiência dos migrantes para casa", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 5067, "titulo": "Bill to revise postal laws clears parliament", "url": "https://www.japantimes.co.jp/business/2026/06/19/companies/postal-privatization-revision-bill-diet/", "fonte_id": "japan_times", "data_pub": "2026-06-19T08:19:00Z", "idioma": "en", "texto_pt": "O projeto de lei que visa revisar as leis postais foi aprovado pelo parlamento, permitindo que o governo ofereça subsídios para preservar a malha postal nacional.", "titulo_pt": "Projeto de lei para reformar leis postais é aprovado pelo parlamento", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 4914, "titulo": "KPMG leaked confidential Optus information and surveilled whistleblower’s laptop, inquiry hears", "url": "https://www.theguardian.com/australia-news/2026/jun/19/kpmg-scandal-optus-leak-as-whistleblower-claims-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-06-19T07:25:00Z", "idioma": "en", "texto_pt": "A KPMG admitiu ter violado a ética ao divulgar informações confidenciais do Optus para colegas que estavam concorrendo por um contrato de auditoria com a Telstra. Executivos da empresa também monitoraram o laptop de um denunciante, considerando-o apenas como alguém com 'reclamações de trabalho'.", "titulo_pt": "KPMG divulgou informações confidenciais do Optus e monitorou o laptop de um denunciante", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 4631, "titulo": "'A Casa do Dragão' volta à HBO para encarar conflitos na história e dos bastidores", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/a-casa-do-dragao-volta-a-hbo-para-encarar-conflitos-na-historia-e-dos-bastidores.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T07:00:00Z", "idioma": "pt", "texto_pt": "A série 'A Casa do Dragão' teve sua segunda temporada criticada por alguns fãs e críticos como lenta e sem direção, apesar de ter sido inicialmente bem recebida como uma continuação imponente da série 'Game of Thrones'.", "titulo_pt": "A Casa do Dragão retorna à HBO para enfrentar desafios na história e nos bastidores", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 5225, "titulo": "You can handle the truth! Why cinema suddenly loves conspiracy theories", "url": "https://www.theguardian.com/film/2026/jun/19/you-can-handle-the-truth-why-cinema-suddenly-loves-conspiracy-theories", "fonte_id": "guardian_culture", "data_pub": "2026-06-19T07:00:00Z", "idioma": "en", "texto_pt": "Um novo ciclo de filmes aborda histórias de paranoia, alienação e desconfiança, como o Dia do Desvelamento e os Backrooms. Essas produções promovem narrativas sobre a realidade distorcida em que vivemos, sugerindo que estamos no Matrix ou que o CIA assassinou JFK, entre outros cenários surreais.", "titulo_pt": "Você pode lidar com a verdade! Por que o cinema recentemente adora teorias da conspiração", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}], "ciencia_tecnologia": [{"id": 5583, "titulo": "What Amazon’s Astro Taught Me About Giving Robots a Soul", "url": "https://spectrum.ieee.org/amazon-astro-robot-sound", "fonte_id": "ieee_spectrum", "data_pub": "2026-06-19T12:24:00Z", "idioma": "en", "texto_pt": "Em 2018, a Amazon contratou o autor como designer de som UX principal para o Astro, seu primeiro robô doméstico consumista. O Astro usava câmeras e sensores para mapear e navegar em casa e no trabalho, podendo patrulhar proativamente, verificar os entes queridos e transportar pequenos itens usando um compartimento integrado. Inicialmente, não havia direção de personagem definida.", "titulo_pt": "O que o Astro da Amazon Me Ensina Sobre Dar Alma a Robôs", "veiculo": "IEEE Spectrum", "pais": "EUA", "classe": "A"}, {"id": 5573, "titulo": "The Download: AI bottleneck debates, and BCI trials take off", "url": "https://www.technologyreview.com/2026/06/19/1139327/the-download-llms-bottleneck-breakthrough-bci-trials-take-off/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-19T12:10:00Z", "idioma": "en", "texto_pt": "Uma startup chamada Subquadrática saiu do modo secreto e anunciou que resolveu um obstáculo matemático que tem impedido o desenvolvimento de modelos de aprendizado de máquina de grande porte.", "titulo_pt": "Download diário: Debates sobre limitações da IA e ensaios de TCI avançam", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 5590, "titulo": "NASA selects mission to study space weather interaction with Earth’s atmosphere", "url": "https://spacenews.com/nasa-selects-mission-to-study-space-weather-interaction-with-earths-atmosphere/", "fonte_id": "spacenews", "data_pub": "2026-06-19T12:00:00Z", "idioma": "en", "texto_pt": "A NASA escolheu desenvolver uma missão que investigará como a meteorologia espacial interfere na atmosfera da Terra.", "titulo_pt": "NASA seleciona missão para estudar interação entre meteorologia espacial e atmosfera terrestre", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 5556, "titulo": "Don’t blame passive investors if SpaceX is mispriced", "url": "https://www.ft.com/content/3e9cfe15-c2c4-4e9c-9022-3a50a11f94dd", "fonte_id": "financial_times", "data_pub": "2026-06-19T11:48:00Z", "idioma": "en", "texto_pt": "O artigo afirma que fundos de índice não distorcem o alinhamento de capital, uma função atribuída aos analistas de ações.", "titulo_pt": "Não atribua a investidores passivos se SpaceX estiver sobreditada", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 5555, "titulo": "Iran to seek ‘insurance fees’ for passage through Strait of Hormuz", "url": "https://www.ft.com/content/e1068044-5124-47d9-81ba-c4a3efc16384", "fonte_id": "financial_times", "data_pub": "2026-06-19T11:42:00Z", "idioma": "en", "texto_pt": "O governo iraniano anunciou que navios precisarão ter um seguro aprovado por Teerã para usar o importante canal de navegação, o Estreito de Ormuz.", "titulo_pt": "Irã vai cobrar 'taxa de seguro' para passagem pelo Estreito de Ormuz", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 5582, "titulo": "Gen Z Singles Are Trying to Make ‘Solomaxxing’ Aspirational", "url": "https://www.wired.com/story/solomaxxing/", "fonte_id": "wired", "data_pub": "2026-06-19T11:00:00Z", "idioma": "en", "texto_pt": "Para jovens, a tendência de solomaxxing remove o estigma da união conjugal, recastando a solteirice como algo aspiracional a ser buscado, não apenas evitado.", "titulo_pt": "Gen Z Solomaxxing É Tendência e Aspiracional para Jovens", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 5202, "titulo": "JWST catches cosmic imposters spoofing faraway galaxies", "url": "https://www.scientificamerican.com/article/jwst-catches-cosmic-imposters-spoofing-faraway-galaxies/", "fonte_id": "scientific_american", "data_pub": "2026-06-19T10:45:00Z", "idioma": "en", "texto_pt": "A Telescópio Espacial James Webb descobriu gigantes escuros próximos que se passam por galáxias remotas. Este achado reforça a ideia de que, na astronomia, o que você vê não sempre é o que realmente está lá.", "titulo_pt": "JWST identifica gigantes escuros fingindo galáxias distantes", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 5574, "titulo": "A startup claims it broke through a bottleneck that’s holding back LLMs", "url": "https://www.technologyreview.com/2026/06/19/1139313/a-startup-claims-it-broke-through-a-bottleneck-thats-holding-back-llms/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-19T10:40:00Z", "idioma": "en", "texto_pt": "A start-up AI Subquadratic, com sede em Miami, saiu do modo de stealth e anunciou recentemente ter resolvido uma limitação matemática que vinha dificultando o desenvolvimento dos modelos de linguagem de grande porte há cerca de dez anos. No entanto, os detalhes são escassos e muitas pessoas ainda estão céticas.", "titulo_pt": "Start-up afirma ter superado um obstáculo matemático que tem impedido os modelos de linguagem grandes", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 5209, "titulo": "Chinese university-led mission to study asteroid Apophis during close encounter with Earth", "url": "https://spacenews.com/chinese-university-led-mission-to-study-asteroid-apophis-during-close-encounter-with-earth/", "fonte_id": "spacenews", "data_pub": "2026-06-19T10:32:00Z", "idioma": "en", "texto_pt": "Uma espaçonave desenvolvida pela Universidade Tsinghua está programada para participar de missões internacionais que estudarão o asteroide Apophis durante sua aproximação próxima à Terra em 2029.", "titulo_pt": "Missão universitária chinesa para estudar asteroide Apophis durante passagem próxima à Terra", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 5155, "titulo": "Try One of macOS 27’s Best Features Right Now", "url": "https://www.wired.com/story/try-one-of-macos-27s-best-features-right-now-shortcuts-playground-agent/", "fonte_id": "wired", "data_pub": "2026-06-19T10:30:00Z", "idioma": "en", "texto_pt": "A versão de outono do macOS permitirá que os usuários criem Atalhos digitando o que desejam acontecer. Os usuários do Claude Code e Codex não precisam esperar por essa funcionalidade.", "titulo_pt": "Uma das Melhores Funcionalidades do macOS 27 Está Disponível Agora", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 5156, "titulo": "Pump.Fun’s Bounties Platform Is a Black Hole of Circular Grifting", "url": "https://www.wired.com/story/pumpfuns-bounties-platform-is-a-black-hole-of-circular-grifting/", "fonte_id": "wired", "data_pub": "2026-06-19T10:30:00Z", "idioma": "en", "texto_pt": "O plataforma de criptomoedas afirma que você pode 'pagar qualquer pessoa para fazer qualquer coisa', desde deixar um emprego em vídeo até obter uma tatuagem temática de moeda meme. No entanto, parece principalmente que as pessoas estão tentando se fraudar mutuamente.", "titulo_pt": "Plataforma Bounties do Pump.Fun é um Buraco Negro de Fraude Circular", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 5210, "titulo": "Mu-g Technologies enters the parabolic flight business", "url": "https://spacenews.com/mu-g-technologies-enters-the-parabolic-flight-business/", "fonte_id": "spacenews", "data_pub": "2026-06-19T10:30:00Z", "idioma": "en", "texto_pt": "Uma startup adquiriu um avião para oferecer serviços comerciais de voos parabólicos, enquanto a NASA busca obter seu próprio avião para pesquisas em gravidade reduzida.", "titulo_pt": "Mu-g Technologies entra no negócio de voos parabólicos", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 5212, "titulo": "Experts: Why carbon removal needs a ‘major scale up’ to return warming to 1.5C", "url": "https://www.carbonbrief.org/experts-why-carbon-removal-needs-a-major-scale-up-to-return-warming-to-1-5c/", "fonte_id": "carbon_brief", "data_pub": "2026-06-19T10:02:00Z", "idioma": "en", "texto_pt": "Última semana, mais de 260 pesquisadores se reuniram em Milão para discutir as oportunidades, desafios e necessidade de uma escalada significativa na remoção de carbono para retornar à temperatura de aquecimento de 1,5C.", "titul ao Senado", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}]};
const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const rot = n.topico ? (D.rotulos_topico[n.topico] || n.topico) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(n.topico || '')}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
