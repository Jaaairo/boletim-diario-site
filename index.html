<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 19/07/2026 19:30 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">
    <div class="modal-erro" id="senha-erro" style="display:none">Senha incorreta.</div>
    <div class="modal-btns">
      <button class="btn-sec2" onclick="fecharModal('modal-senha')">Cancelar</button>
      <button class="btn-pri" onclick="verificarSenha()">Entrar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>
      <option value="classificacao_errada">Classificação errada</option>
      <option value="resumo_impreciso">Resumo impreciso</option>
      <option value="outro">Outro</option>
    </select>
    <label for="flag-nota">Nota (opcional)</label>
    <textarea id="flag-nota" placeholder="Descreva o problema..."></textarea>
    <div class="modal-btns">
      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "19/07/2026 19:30", "stats": {"noticias_novas": 313, "resumos_gerados": 143}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O presidente Luiz Inácio Lula da Silva expressou seu pesar pela morte de Matheus Azevedo, irmão do senador Cleitinho. Esta notícia destaca-se entre os principais eventos desta edição, mostrando o apoio político e pessoal que Lula demonstra ao senador cearense. Além disso, as pesquisas de julho indicam uma vantagem significativa para Lula na corrida presidencial, com ele liderando tanto no primeiro quanto no segundo turno das eleições. Em outro destaque, uma balsa que transportava 133 pessoas naufragou na Guiana, resultando em 67 resgatados até o momento. Outras notícias abordam a política partidária e os desafios enfrentados pelas empresas na adoção de inteligência artificial.", "mundo": "Um terremoto com magnitude 5.5 ocorreu na região central dos altos Andes do Peru, resultando em seis mortes e o deslocamento de centenas de pessoas. Como resposta às mortes de dois soldados americanos, os Estados Unidos intensificaram seus ataques contra o Irã, aprofundando as tensões entre as duas nações. Israel também anunciou que interceptou um míssil iraniano direcionado à cidade de Aqaba, Jordânia. Durante a final do Mundial de 2026, Shakira, Coldplay, BTS e Gustavo Dudamel apresentaram shows que encheram o estádio de alegria. A partida entre Argentina e Espanha na final reavivou o debate sobre a soberania das Malvinas.\n\nAs tensões geopolíticas na região do Oriente Médio e no sul da Ásia têm aumentado, com ataques mútuos entre Irã e Estados Unidos, Israel e Palestina, bem como Rússia e Ucrânia. O Irã realizou ataques contra alvos militares em Kiev e Kharkiv, o que levou a uma escalada de tensões e ao envio de mais aviões-tanque dos EUA para Israel. Em resposta, o primeiro-ministro do Iraque planeja visitar Teerã esta semana para discutir cooperação. No Peru, um terremoto de magnitude 5,5 causou pelo menos cinco mortes e deslocou cerca de 300 pessoas. Além disso, navios foram envolvidos em incidentes no Estreito de Ormuz após desviar da rota do Irã, enquanto Israel continuava enfrentando violações do acordo de cessar-fogo no Gaza Strip.", "economia": "A economia brasileira enfrenta desafios significativos, como alertou recentemente o Ipea. O instituto destacou que a pulverização dos investimentos devido às emendas parlamentares pode ser um risco, sugerindo a necessidade de acabar com as 'emendas Pix' e criar um índice de risco para monitorar os repasses feitos pelos legisladores. Além disso, a dívida pública do Brasil pode chegar a mais de 100% do PIB entre 2032 e 2035, exigindo um superávit orçamentário mínimo de 2%. Para frear essa tendência, é necessário um ajuste fiscal coordenado pelo Executivo e Legislativo. No cenário internacional, a Boeing está estudando aumentar a produção do modelo 737 MAX, enquanto a Embraer firmou uma carta de intenções para fornecer até 30 veículos aéreos não tripulados (eVTOLs) para uso em Cabo Verde. Essas decisões refletem o interesse crescente no setor de transporte aéreo e na inovação tecnológica.", "tecnologia": "A inteligência artificial (IA) continua sendo um tema importante na indústria tecnológica, com várias empresas e governos explorando suas potencialidades. A Universidade de Chicago está utilizando IA para melhorar as previsões do tempo, transformando esses pronósticos em informações úteis para milhões de pessoas. Um CEO espera que uma nova fase de adoção da IA seja alcançada, enquanto o governo sul-coreano registrou sucessos significativos na expansão das exportações de semicondutores e equipamentos relacionados à indústria de IA. A indústria de jogos está se movendo para um modelo digital, o que pode reduzir a utilização dos discos. Entre as novidades tecnológicas, destacam-se os smartwatches promocionais da Amazon, os headsets 7.1 Surround em oferta e os roteadores Wi-Fi Mesh com descontos significativos. A Samsung está cortando vagas nos Estados Unidos durante a transferência da sede para o Texas, coincidindo com aumento de investimentos em chips de IA. Além disso, a indústria de data centers de IA enfrenta revolta popular e tensões eleitorais nos EUA, enquanto a fusão entre ASTRI e NAMI está gerando resultados tangíveis com a combinação de tecnologias de IA e materiais avançados.", "ciencia": "Um estudo publicado na PNAS sugere que a confiança na ciência e o apoio popular podem promover mudanças sociais sem intervenção governamental, destacando o papel da ciência na formação das percepções públicas. O James Webb Space Telescope descobriu galáxias ricas em hélio no início do Universo, contribuindo para a compreensão da evolução química desde o Big Bang. Além disso, pesquisadores do Helmholtz-Zentrum Dresden-Rossendorf desenvolveram métodos inovadores para degradar substâncias perfluoradas (PFAS), químicos industriais extremamente resistentes à degradação química. Estudos sobre realidade virtual e a imersão cinematográfica mostram como essa tecnologia pode tornar conceitos tecnológicos mais compreensíveis, enquanto pesquisas em astrofísica exploram os mecanismos pelos quais buracos negros supermassivos se alimentam, e o comportamento inesperado do ferro no centro da Terra fornece novas informações sobre o campo magnético terrestre.", "cultura": "O filme 'A Odisséia', dirigido por Christopher Nolan, estreou com uma bilheteria global recorde de US$ 264,1 milhões, se tornando o maior lançamento internacional da carreira do diretor. O longa-metragem, que é um drama de ação sem conexão com uma franquia majoritária, arrecadou US$ 124,5 milhões nos Estados Unidos e Canadá em sua estreia, sendo o terceiro lançamento mais bem-sucedido do ano. Paralelamente, a Globo lançou dois especiais sobre Preta Gil no Globoplay e na TV, abordando sua trajetória artística e tratamento contra o câncer. A frase latina 'Tempora mutantur, nos et mutamur in illis' foi interpretada como um lembrete da constante transformação do tempo e das pessoas que nele vivem. Além disso, a seleção argentina preparava-se para a final da Copa do Mundo, com jogadores aproveitando o tempo livre para passar com as famílias. Mick Jagger atribui sua vitalidade artística aos exercícios físicos aprendidos na infância. O festival de dança de Joinville consolida seu prestígio ao receber Marcelo Gomes em sua despedida como intérprete clássico durante a 43ª edição do evento, marcando um momento importante para o teatro musical.", "sociedade": "Um prédio com três andares desabou em Minas Gerais. A sorte foi do segundo andar, onde uma mulher cadeirante conseguiu escapar pulando para fora e salvando a própria vida. Ela e seu filho foram resgatados vivos e levados ao hospital. Em outro desenvolvimento, um estudo mostrou que assistir a jogos de basquete ao vivo pode fortalecer as conexões sociais, aumentando a produção de ocitocina e reduzindo o nível de estresse dos espectadores presentes.", "meio_ambiente": "Um incêndio florestal na costa da França está forçando moradores a deixarem suas casas devido aos ventos fortes e às condições de seca. O fenômeno El Niño afeta o Rio Grande do Sul e pode impactar outros estados, como São Paulo e Mato Grosso do Sul, conforme alerta do meteorologista Alexandre Nascimento. Em Espanha, incêndios florestais estão atingindo áreas extensas, com trabalhadores de emergência lidando com o maior incêndio do ano. Além disso, um terremoto no departamento de Junín, Peru, deixou cinco mortos e mais de 20 feridos. Em relação ao meio ambiente, pesquisadores brasileiros defendem a conservação dos tubarões nas costas do país, destacando sua importância para o ecossistema marinho.", "direitos_humanos": "Israel aprovou uma lei para desmantelar o sistema educacional palestino na parte oriental de Jerusalém, segundo relatos do Al Jazeera. No Brasil, um turista argentino foi condenado à prisão por injúria racial após filmar-se imitando um macaco em uma partida de futebol, onde a Argentina venceu o Brasil, conforme informou o CNN Brasil. Em relação aos direitos animais, os Estados Unidos alteraram uma regra importante da Lei de Espécies em Peligro, eliminando a proteção automática para espécies classificadas como 'amenazadas', gerando preocupações entre ambientalistas (CNN Brasil). Por fim, especialistas estão recomendando a criação de uma entidade independente responsável por direitos humanos, conforme relatado pelo CIPER Chile."}, "resumo_do_dia": {"politica_nacional": [{"id": 61424, "titulo": "Netanyahu critica prefeito de Nova York após ameaça de prisão", "url": "https://www.poder360.com.br/poder-internacional/netanyahu-critica-prefeito-de-nova-york-apos-ameaca-de-prisao/", "fonte_id": "poder360", "data_pub": "2026-07-19T21:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O gabinete do premiê israelense Netanyahu respondeu às declarações do prefeito de Nova York, Zohran Mamdani, que considera-o criminoso de guerra. Mamdani ameaçou processar Netanyahu criminalmente.", "titulo_pt": "Netanyahu critica prefeito de Nova York após ameaça de prisão", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 61425, "titulo": "“O poder de compra do brasileiro acabou”, afirma Flávio Bolsonaro em vídeo", "url": "https://www.poder360.com.br/poder-eleico te/israel-committed-3795-ceasefire-violations-gaza-report", "fonte_id": "middle_east_eye", "data_pub": "2026-07-19T21:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "De acordo com um relatório, Israel violou o acordo de cessar-fogo no Gaza Strip 3.795 vezes desde outubro. Ismail al-Thawabta, diretor geral do governo de Gaza, informou que 1.168 palestinos foram mortos e 3.734 feridos, além disso, Israel tem restrito severamente a entrega de ajuda humanitária.", "titulo_pt": "Israel cometeu 3.795 violações do acordo de cessar-fogo no Gaza: relatório", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 61688, "titulo": "US death toll climbs as Iran war expands", "url": "https://www.ft.com/content/7aa5493a-a2ba-4824-b3d0-03b9309ae3ea?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-19T20:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O número de mortes nos Estados Unidos aumentou após uma explosão controlada de um dron, enquanto outro soldado morreu em Jordânia e um terceiro está desaparecido.", "titulo_pt": "Contagem de mortos dos EUA cresce à medida que a guerra contra o Irã se expande", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 61671, "titulo": "Israeli ministers join march to Gaza to demand return of settlements", "url": "https://www.aljazeera.com/news/2026/7/19/israeli-ministers-join-march-to-gaza-to-demand-return-of-settlements?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-19T20:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ministros israelenses participam de uma marcha perto da fronteira com Gaza para exigir a reconstrução das comunidades evacuadas em 2005.", "titulo_pt": "Ministros israelenses se juntam à marcha na fronteira com Gaza para reivindicar a reconstrução dos assentamentos", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 61578, "titulo": "Estados Unidos e Irán intensifican el intercambio de ataques y elevan el riesgo de una guerra regional", "url": "https://www.lanacion.com.ar/el-mundo/estados-unidos-e-iran-intensifican-el-intercambio-de-ataques-y-elevan-el-riesgo-de-una-guerra-nid19072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-19T20:49:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Irã denunciou um bombardeo contra um complexo nuclear em construção, enquanto o Exército dos Estados Unidos informou a morte de outro soldado no Iêmen e advertiu sobre a continuidade de suas operações. Essas ações elevam o risco de uma guerra regional.", "titulo_pt": "EUA e Irã intensificam troca de ataques e aumentam risco de guerra regional", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 61517, "titulo": "Catar condena ataques do Irã contra Jordânia, Bahrein e Kuwait e cita violação", "url": "https://www.infomoney.com.br/mundo/catar-condena-ataques-do-ira-contra-jordania-bahrein-e-kuwait-e-cita-violacao/", "fonte_id": "infomoney", "data_pub": "2026-07-19T20:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério das Relações Exteriores do Catar condenou os bombardeios contra usinas de energia elétrica e dessalinização no Kuwait, afirmando que esses ataques violam a Resolução 2817 do Conselho de Segurança da ONU.", "titulo_pt": "Catar condena ataques do Irã contra Kuwait e cita violação à resolução da ONU", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 61665, "titulo": "India bans march on parliament by ‘Cockroach’ activists, risking a standoff", "url": "https://www.france24.com/en/asia-pacific/20260719-india-bans-march-on-parliament-by-cockroach-activists-risking-a-standoff", "fonte_id": "france24", "data_pub": "2026-07-19T20:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A polícia de Nova Deli proibiu um passeio planejado até o parlamento indiano por apoiadores do Partido Popular das Lagartas, uma formação política viral e de oposição. A manifestação estava programada para ocorrer na segunda-feira, início da sessão monsoon do parlamento, após crescentes pedidos pela renúncia do ministro da Educação em razão de vazamentos nas provas e remoção forçada de um ativista que estava fazendo greve de fome.", "titulo_pt": "Índia proíbe marcha no parlamento por apoiadores do 'partido das lagartas', correndo risco de confronto", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 61585, "titulo": "Y la final del Mundial se convirtió en una Super Bowl: Shakira, Coldplay, BTS y Dudamel llenan la final de música y espectáculo", "url": "https://elpais.com/us/2026-07-19/y-la-final-del-mundial-se-convirtio-en-una-super-bowl-shakira-coldplay-bts-y-dudamel-llenan-la-final-de-musica-y-espectaculo.html", "fonte_id": "elpais_america", "data_pub": "2026-07-19T20:37:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Na pausa da final do Mundial, Shakira, Coldplay, BTS e Gustavo Dudamel apresentaram performances que encheram o estádio de alegria. Madonna exibiu um show pré-gravado, enquanto Justin Bieber realizou uma atuação acústica mais triste.", "titulo_pt": "E a final do Mundial se tornou uma Super Bowl: shakira, Coldplay, BTS e Dudamel preenchem o estádio com música e diversão", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 61189, "titulo": "US senator warns about economic blockade", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/20/2003861047", "fonte_id": "taipei_times", "data_pub": "2026-07-20T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um senador dos Estados Unidos advertiu sobre o risco de uma possível bloqueio econômico. O senador alertou para as consequências potenciais disso.", "titulo_pt": "Senador dos EUA avisa sobre risco de bloqueio econômico", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 61515, "titulo": "Dino determina prisão domiciliar e afastamento de secretário do Maranhão", "url": "https://www.infomoney.com.br/politica/dino-determina-prisao-domiciliar-e-afastamento-de-secretario-do-maranhao/", "fonte_id": "infomoney", "data_pub": "2026-07-19T21:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governador Flávio Dino determinou a prisão domiciliar e o afastamento do secretário Raimundo Cutrim, acusado de coação e obstrução de Justiça.", "titulo_pt": "Dino determina prisão domiciliar e afastamento de secretário do Maranhão", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 61414, "titulo": "Os três erros mais comuns ao avaliar um investimento", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/blogs/de-grao-em-grao/2026/07/os-tres-erros-mais-comuns-ao-avaliar-um-investimento.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-19T21:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O cérebro humano tende a simplificar informações complexas, levando às conclusões erradas na avaliação de investimentos. Este processo de simplificação pode resultar em decisões inadequadas ao avaliar empresas ou ativos financeiros.", "titulo_pt": "Os três erros mais comuns ao avaliar um investimento", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 61516, "titulo": "Dezenas de pessoas estão desaparecidas após balsa de passageiros afundar na Guiana", "url": "https://www.infomoney.com.br/mundo/dezenas-de-pessoas-estao-desaparecidas-apos-balsa-de-passageiros-afundar-na-guiana/", "fonte_id": "infomoney", "data_pub": "2026-07-19T21:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Dezenas de pessoas estão desaparecidas após uma balsa com passageiros e tripulantes afundar na costa do Atlântico Norte, perto da vila de Port Kaituma.", "titulo_pt": "Dezenas de pessoas desaparecem após afundamento de balsa com passageiros na Guiana", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 61519, "titulo": "Grupo MM, fundado no Paraná, aposta no interior e mira Top 10 do varejo brasileiro", "url": "https://www.infomoney.com.br/business/grupo-mm-fundado-no-parana-aposta-no-interior-e-mira-top-10-do-varejo-brasileiro/", "fonte_id": "infomoney", "data_pub": "2026-07-19T20:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Grupo MM, fundado no Paraná, possui mais de 230 lojas físicas distribuídas por quatro estados brasileiros e opera nacionalmente através de canais digitais e atacado. A empresa almeja entrar no Top 10 do varejo nacional.", "titulo_pt": "Grupo MM, fundado no Paraná, aposta no interior e mira Top 10 do varejo brasileiro", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 61520, "titulo": "Calendário econômico da semana: decisão do BCE e PMIs globais serão foco", "url": "https://www.infomoney.com.br/mercados/calendario-economico-da-semana-decisao-do-bce-e-pmis-globais-serao-foco/", "fonte_id": "infomoney", "data_pub": "2026-07-19T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A semana será marcada pela decisão do BCE e pelo acompanhamento de PMIs globais. Estes eventos serão os principais focos para os investidores.", "titulo_pt": "Calendário econômico da semana: decisão do BCE e PMIs globais serão foco", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 61521, "titulo": "Ibovespa recua após três semanas de alta; correção pode ganhar força na semana?", "url": "https://www.infomoney.com.br/mercados/ibovespa-recua-apos-tres-semanas-de-alta-correcao-pode-ganhar-forca/", "fonte_id": "infomoney", "data_pub": "2026-07-19T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ibovespa registrou uma queda após três semanas consecutivas de alta, enquanto as bolsas americanas também apresentaram desempenho fraco. O dólar futuro testa regiões importantes e o Bitcoin tenta manter-se acima dos US$ 70 mil.", "titulo_pt": "Ibovespa recua após três semanas de alta; correção pode ganhar força na semana?", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 61524, "titulo": "Eve Air, da Embraer, assina carta de intenções para fornecer até 30 ‘carros voadores’", "url": "https://www.infomoney.com.br/business/eve-air-da-embraer-assina-carta-de-intencoes-para-fornecer-ate-30-carros-voadores/", "fonte_id": "infomoney", "data_pub": "2026-07-19T19:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Eve Air, divisão da Embraer, assinou uma carta de intenções para fornecer até 30 veículos aéreos não tripulados (eVTOLs) para uso em Cabo Verde. A parceria envolverá o estudo de diferentes aplicações desses veículos, como voos panorâmicos e serviços de transporte entre locais turísticos.", "titulo_pt": "Eve Air, da Embraer, assina carta de intenções para fornecer até 30 ‘carros voadores’", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 61447, "titulo": "Emendas parlamentares pulverizam investimentos e aumentam desigualdades, alerta Ipea", "url": "https://veja.abril.com.br/politica/emendas-parlamentares-pulverizam-investimentos-e-aumentam-desigualdades-alerta-ipea/", "fonte_id": "veja", "data_pub": "2026-07-19T19:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ipea alerta que as emendas parlamentares estão pulverizando os investimentos e aumentando as desigualdades. O instituto sugere o fim das 'emendas Pix' e a criação de um índice de risco para monitorar os repasses indicados pelos legisladores.", "titulo_pt": "Emendas parlamentares fragmentam investimentos e ampliam desigualdades, avisa Ipea", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 61514, "titulo": "Análise: Para travar dívida brasileira, é preciso superávit de 2%", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/analise-para-travar-divida-brasileira-e-preciso-superavit-de-2/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T19:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo sugere que a dívida pública do Brasil pode atingir mais de 100% do PIB entre 2032 e 2035. Para conter isso, é necessário um superávit orçamentário de pelo menos 2%. O ajuste fiscal deve envolver ações coordenadas entre o Executivo e o Legislativo.", "titulo_pt": "Para frear dívida brasileira, é preciso superávit de 2%", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 61304, "titulo": "Semana começa com tempestades no Sul e alerta de vendaval no interior de SP", "url": "https://www.infomoney.com.br/mercados/semana-comeca-com-tempestades-no-sul-e-alerta-de-vendaval-no-interior-de-sp/", "fonte_id": "infomoney", "data_pub": "2026-07-19T19:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A semana começa com tempestades no Sul do Brasil e um alerta de possíveis vendavais no interior de São Paulo. As condições climáticas variam entre regiões, com destaque para essas duas áreas mais afetadas.", "titulo_pt": "Semana inicia com tempestades no Sul e alerta de vendaval no interior de SP", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 61307, "titulo": "Brasil pode virar sócio de Portugal em nova fronteira dos biocombustíveis", "url": "https://www.infomoney.com.br/business/brasil-pode-virar-socio-de-portugal-em-nova-fronteira-dos-biocombustiveis/", "fonte_id": "infomoney", "data_pub": "2026-07-19T18:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil pode se tornar um parceiro de Portugal no setor de biocombustíveis, com o plano prevendo a construção de uma ou duas usinas para suprir a demanda por combustíveis de baixo carbono na Europa.", "titulo_pt": "Brasil pode ser sócio de Portugal em nova fronteira dos biocombustíveis", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 61266, "titulo": "Saiba como funciona o VIX, “índice do medo” do mercado", "url": "https://www.cnnbrasil.com.br/economia/mercado/saiba-como-funci pais": "Brasil", "classe": "A"}, {"id": 61272, "titulo": "Agentes do ICE usarão câmeras corporais durante abordagens de trânsito", "url": "https://www.cnnbrasil.com.br/internacional/agentes-do-ice-usarao-cameras-corporais-durante-abordagens-de-transito/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T18:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Tom Homan, responsável pela política de fronteiras, anunciou que agentes do ICE usarão câmeras corporais durante abordagens de trânsito. A medida foi tomada após dois casos fatais envolvendo agentes federais de imigração.", "titulo_pt": "Agentes do ICE usará câmeras corporais durante abordagens de trânsito", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}], "economia__eventos": [], "tecnologia": [{"id": 61190, "titulo": "AI could threaten children: experts", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/20/2003861049", "fonte_id": "taipei_times", "data_pub": "2026-07-20T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Expertos afirmam que a inteligência artificial pode representar um risco para crianças. Pesquisas indicam possíveis ameaças relacionadas à IA que devem ser monitoradas cuidadosamente.", "titulo_pt": "IA poderia ameaçar crianças: especialistas", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 61205, "titulo": "Chip stocks slide in AI unwind", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/20/2003861021", "fonte_id": "taipei_times", "data_pub": "2026-07-20T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações de chips registraram uma queda, relacionada à desinvestimento em inteligência artificial.", "titulo_pt": "Ações de chips caem com desinvestimento em AI", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 61206, "titulo": "Altos expects new phase of AI adoption, CEO says", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/20/2003861022", idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Lua foi exposta ao vento solar por bilhões de anos, no entanto, as duas metades da Lua são atingidas por ventos solares com velocidades e energias diferentes.", "titulo_pt": "Amostras revelam como a terra faz com que o vento solar atinja a lua em velocidades e energias variáveis", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 61410, "titulo": "Quantum entanglement without transport: Leaky qubits offer route around noisy channels", "url": "https://phys.org/news/2026-07-quantum-entanglement-leaky-qubits-route.html", "fonte_id": "phys_org", "data_pub": "2026-07-19T18:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores demonstraram que a liberação inevitável de energia e informação de um sistema quântico para seu ambiente pode ser explorada para gerar entrelaçamento, o recurso utilizado por tecnologias quânticas para realizar tarefas inatingíveis pelas tecnologias clássicas.", "titulo_pt": "Entrelaçamento quântico sem transporte: qubits vazamentos oferecem caminho ao redor de canais ruinosos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 61340, "titulo": "Rafael Guzmán García, experto en longevidad: \"Uno de los mayores errores que cometemos en el día a día y que acelera el envejecimiento es no dormir lo suficiente\"", "url": "https://www.clarin.com/estados-unidos/rafael-guzman-garcia-experto-longevidad-mayores-errores-cometemos-dia-dia-acelera-envejecimiento-dormir-suficiente_0_IeryFpXHJJ.html", "fonte_id": "clarin", "data_pub": "2026-07-19T18:07:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Rafael Guzmán García, um especialista em longevidade, afirma que dormir menos de sete horas diariamente pode acelerar o envelhecimento. O especialista destaca que essa prática tem consequências além do cansaço.", "titulo_pt": "Rafael Guzmán García, especialista em longevidade: 'um dos maiores erros no dia a dia e que acelera o envelhecimento s/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T20:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um incêndio florestal na costa da França está forçando moradores a deixarem suas casas. As chamas se espalham rapidamente devido aos ventos fortes e às condições de seca.", "titulo_pt": "Incêndio florestal na costa da França força moradores a abandonarem casas", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 61488, "titulo": "Terremoto no Peru deixa cinco mortos e mais de 20 feridos em região andina", "url": "https://www.brasildefato.com.br/2026/07/19/terremoto-no-peru-deixa-cinco-mortos-e-mais-de-20-feridos-em-regiao-andina/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-19T19:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um terremoto de magnitude 5,1 ocorreu no departamento de Junín, Peru, deixando cinco mortos e mais de 20 feridos. A Polícia Nacional informou que mantém mais de 250 pessoas sob observação.", "titulo_pt": "Terremoto no Peru causa cinco mortes e mais de 20 feridos em região andina", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 61283, "titulo": "El Niño afeta o RS e chegará a outros estados do Brasil, diz especialista", "url": "https://www.cnnbrasil.com.br/nacional/el-nino-afeta-o-rs-e-chegara-a-outros-estados-do-brasil-diz-especialista/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T17:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O fenômeno El Niño está afetando o Rio Grande do Sul e pode impactar outros estados como São Paulo e Mato Grosso do Sul, conforme alerta do meteorologista Alexandre Nascimento.", "titulo_pt": "El Niño atinge RS e chegará a outros estados, avisa especialista", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 61141, "titulo": "The forest's slow return after fires: 'It feels like all life is gone, but in reality, much remains'", "url": "https://www.lemonde.fr/en/environment/article/2026/07/19/the-forest-s-slow-return-after-fires-it-feels-like-all-life-is-gone-but-in-reality-much-remains_6755629_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-19T16:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As consequências ecológicas das chamas florestais são difíceis de quantificar e variam dependendo de muitos fatores. É certo que a intensidade e frequência dos incêndios podem ser particularmente danosas aos ecossistemas.", "titulo_pt": "A volta lenta da floresta após os incêndios: 'sentimos que tudo está morto, mas na realidade, muito ainda permanece'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 60940, "titulo": "Tempestades deixam estragos em 21 cidades do Rio Grande do Sul", "url": "https://www.metropoles.com/brasil/tempestades-deixam-estragos-em-21-cidades-do-rio-grande-do-sul", "fonte_id": "metropoles", "data_pub": "2026-07-19T16:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Há previsão de instabilidades meteorológicas com chuvas persistentes em 21 cidades do Rio Grande do Sul neste domingo (19/7).", "titulo_pt": "Tempestades causam estragos em 21 cidades do Rio Grande do Sul", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 61253, "titulo": "Tudo sobre o incêndio na Espanha que já desabrigou 700 pessoas", "url": "https://exame.com/mundo/tudo-sobre-o-incendio-na-espanha-que-ja-desabrigou-700-pessoas/", "fonte_id": "exame", "data_pub": "2026-07-19T15:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um incêndio na província de Guadalajara, Espanha, já consumiu mais de 13 mil hectares e está atingindo um parque nacional. O fogo desabrigou cerca de 700 pessoas.", "titulo_pt": "Tudo sobre o incêndio na Espanha que já desabrigou 700 pessoas", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 61260, "titulo": "Terremoto deixa ao menos seis mortos e mais de 30 feridos no Peru", "url": "https://exame.com/mundo/terremoto-deixa-ao-menos-seis-mortos-e-mais-de-30-feridos-no-peru/", "fonte_id": "exame", "data_pub": "2026-07-19T15:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um terremoto causou ao menos seis mortes e mais de 30 feridos no Peru. O abalo foi seguido por uma réplica de magnitude 3,7 e gerou danos em hospitais, residências, rede elétrica e pontos turísticos.", "titulo_pt": "Terremoto deixa ao menos seis mortos e mais de 30 feridos no Peru", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 61153, "titulo": "Wildfires sweep across thousands of hectares in Spain", "url": "https://www.euractiv.com/news/wildfires-sweep-across-thousands-of-hectares-in-spain/", "fonte_id": "euractiv", "data_pub": "2026-07-19T14:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Incêndios florestais estão atingindo áreas extensas na Espanha. Os trabalhadores de emergência lidam com o maior incêndio do ano, em meio a temperaturas mais altas e condições mais secas na Europa.", "titulo_pt": "Incêndios florestais assolam milhares de hectares na Espanha", "veiculo": "Euractiv", "pais": "Europa", "classe": "B"}, {"id": 60479, "titulo": "Terremoto deixa cinco mortos e 21 feridos no Peru", "url": "https://veja.abril.com.br/mundo/terremoto-deixa-cinco-mortos-e-21-feridos-no-peru/", "fonte_id": "veja", "data_pub": "2026-07-19T14:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um terremoto ocorreu às 21h24 locais (23h24 no horário de Brasília), com epicentro a 300 quilômetros a leste de Lima e uma profundidade de 24 quilômetros. O evento geológico deixou cinco mortos e 21 feridos.", "titulo_pt": "Terremoto deixa cinco mortos e 21 feridos no Peru", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 60759, "titulo": "Gaza's children, traumatized and mutilated by war: 'His prosthesis hurts, but he endures it to show that he isn't different'", "url": "https://www.lemonde.fr/en/international/article/2026/07/19/gaza-s-children-traumatized-and-mutilated-by-war-his-prosthesis-hurts-but-he-endures-it-to-show-that-he-isn-t-different_6755626_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-19T13:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Devido aos bombardeios israelenses desde 7 de outubro de 2023, a Faixa de Gaza detém o recorde mundial de crianças amputadas por habitante, segundo a Organização Mundial da Saúde. Apesar do deslocamento forçado e da falta de cuidados médicos em território devastado, essas crianças buscam reconstruir suas vidas.", "titulo_pt": "Crianças de gaza traumatizadas e amputadas pela guerra: 'sua prótese dói, mas ele suporta para mostrar que não é diferente'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 60541, "titulo": "El Niño pode reduzir safra de arroz em 2026/27", "url": "https://www.cnnbrasil.com.br/agro/el-nino-pode-reduzir-safra-de-arroz-em-2026-27/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T13:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um analista da Safras & Mercado salienta que o fenômeno El Niño pode reduzir a safra de arroz no ciclo 2026/27. O clima seco associado ao El Niño é crucial para determinar a área cultivada e o calendário agrícola.", "titulo_pt": "El Niño pode reduzir safra de arroz em 2026/27", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 60779, "titulo": "Passenger ferry carrying 116 people sinks off the coast of Guyana", "url": "http://www.euronews.com/2026/07/19/passenger-ferry-carrying-116-people-sinks-off-the-coast-of-guyana", "fonte_id": "euronews", "data_pub": "2026-07-19T11:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um chamado de emergência para a guarda costeira foi feito por volta das 23h locais. A operação de busca e resgate continua.", "titulo_pt": "Ferry com 116 passageiros afunda perto da costa da guiana", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 60823, "titulo": "Iranians suffer from power blackouts during war and heatwave", "url": "https://www.aljazeera.com/news/2026/7/19/iranians-suffer-from-power-blackouts-during-war-and-heatwave?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-19T11:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os sistemas elétricos do Irã estão colapsando, afetados por ataques militares e sobrecarga de investimentos insuficientes, deixando os iranianos suportando calor extremo sem eletricidade.", "titulo_pt": "Irâs sofrem com falhas no fornecimento de energia durante guerra e onda de calor", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 60587, "titulo": "Governo prevê avanço do El Niño e maior risco de queimadas entre agosto e outubro", "url": "https://exame.com/esg/governo-preve-avanco-do-el-nino-e-maior-risco-de-queimadas-entre-agosto-e-outubro/", "fonte_id": "exame", "data_pub": "2026-07-19T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo prevê o avanço do El Niño e maior risco de queimadas nos estados do Amazonas, Pará, Tocantins, Maranhão e Mato Grosso entre agosto e outubro. Esses estados estão entre os com maior probabilidade de ocorrência de fogo nos próximos meses.", "titulo_pt": "Governo prevê avanço do El Niño e maior risco de queimadas entre agosto e outubro", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 61158, "titulo": "Israel uses law to destroy Palestinian education in East Jerusalem", "url": "https://www.aljazeera.com/opinions/2026/7/19/israel-uses-law-to-destroy-palestinian-education-in-east-jerusalem?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-19T15:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Knesseste, o parlamento israelense, aprovou recentemente uma lei com o intuito de desmantelar o sistema educacional palestino na parte oriental de Jerusalém.", "titulo_pt": "Israel aprova lei par const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml(topico) : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml(audioKey) {
  const audio = D.audio && D.audio.sumarios && D.audio.sumarios[audioKey];
  if (!audio || !audio.arquivo) return "";
  const src = audio.arquivo + (audio.versao ? "?v=" + encodeURIComponent(audio.versao) : "");
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta" data-audio-src="${esc(src)}" data-audio-key="${esc(audioKey)}">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml("destaque")}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>

    const botoes = opcoes.map(([v, l]) =>

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";

      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));

function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");

const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';

}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — audio pre-renderizado por Piper
(function () {
  var player = document.createElement('audio');
  player.preload = 'auto';
  player.setAttribute('playsinline', '');
  document.body.appendChild(player);
  var barAtual = null;

  function _resetBar(bar) {
    if (!bar) return;
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  function _setTocando(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _setPausado(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _tituloAudio(bar) {
    var h = bar.previousElementSibling;
    while (h && !/^H2$/i.test(h.tagName || '')) h = h.previousElementSibling;
    return h ? (h.innerText || h.textContent || 'Boletim Diario').trim() : 'Boletim Diario';
  }

  function _mediaSession(bar) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: _tituloAudio(bar),
      artist: 'Boletim Diario',
      album: 'Leitura dos sumarios',
    });
    navigator.mediaSession.setActionHandler('play', function () { player.play().catch(function () {}); });
    navigator.mediaSession.setActionHandler('pause', function () { player.pause(); });
    navigator.mediaSession.setActionHandler('stop', function () { player.pause(); player.currentTime = 0; });
  }

  window.ttsOuvir = function (btn) {
    var bar = btn.closest('.tts-bar');
    var src = bar && bar.dataset.audioSrc;
    if (!src) return;
    if (barAtual && barAtual !== bar) _resetBar(barAtual);
    barAtual = bar;
    if (player.src !== new URL(src, window.location.href).href) {
      player.src = src;
      player.currentTime = 0;
    } else {
      player.currentTime = 0;
    }
    _mediaSession(bar);
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _resetBar(bar);
    });
  };

  window.ttsPausar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    _setPausado(bar);
  };

  window.ttsContinuar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _setPausado(bar);
    });
  };

  window.ttsPar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    player.currentTime = 0;
    _resetBar(bar);
    if (barAtual === bar) barAtual = null;
  };

  player.addEventListener('ended', function () { _resetBar(barAtual); barAtual = null; });
  player.addEventListener('error', function () { _resetBar(barAtual); barAtual = null; });
  window.addEventListener('beforeunload', function () { player.pause(); });
})();
</script>
</body>
