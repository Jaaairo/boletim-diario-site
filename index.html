<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>

<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>

</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">

<div class="modal-overlay" id="modal-flag">

</div>

<div class="modal-overlay" id="modal-relatorio">

    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "19/07/2026 16:39", "stats": {"noticias_novas": 179, "resumos_gerados": 218}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "As convenções partidárias para as eleições de 2022 começam nesta segunda-feira (20), com o PL marcada para 25 de julho e o PT em 2 de agosto, conforme informa o cartacapital. O prazo estabelecido pelo Tribunal Superior Eleitoral termina no dia 5 de agosto, período no qual os partidos políticos escolherão oficialmente suas candidaturas. Durante esse período, as pesquisas indicam que o atual presidente Lula está à frente do candidato Flávio em todos os cenários, tanto no primeiro quanto no segundo turno da corrida presidencial, de acordo com a cartacapital. Além disso, essas convenções também marcam o início das campanhas com a definição dos candidatos para as eleições deste ano.", "mundo": "Um terremoto de magnitude 5,5 atingiu a região central dos altos Andes do Peru, causando seis mortes e deixando centenas de pessoas deslocadas. O evento sismológico foi o mais forte na área em quase meio século. Em seguida, um conflito entre Estados Unidos e Irã intensificou-se após a morte de dois soldados americanos no Iêmen, com Israel monitorando uma crescente tensão entre as duas potências. Além disso, mísseis russos atingiram um navio mercante turco no Mar Negro, resultando na morte de cinco pessoas e deixando outros feridos. Em outro incidente grave, Kiev registrou 20 mortes e pelo menos 142 feridos nos últimos 24 horas devido a ataques russos. O conflito ucraniano continua com intensa violência em Kiev e na região de Kharkiv.\n\nOs Estados Unidos realizaram ataques após o Irã matar tropas jordanianas, intensificando o conflito entre as duas potências. Paralelamente, Moscou atingiu Kiev com foguetes, aumentando a escalada de tensões na Ucrânia. Exercícios militares inter-regionais em Taiwan foram avaliados como uma validação dos planos de guerra da província. Além disso, o Irã afirma ter destruído um dron americano e os Estados Unidos realizaram ataques para 'punir' o país após a morte de tropas iranianas. Em outro front, Israel atacou assentamentos palestinos no sul de Hebron, enquanto a Rússia atingiu alvos militares em Kiev e um porto ucraniano.", "economia": "O senador dos Estados Unidos alertou sobre os riscos de um possível bloqueio econômico, enfatizando as potenciais consequências desse cenário. O Brasil pode se tornar um parceiro estratégico de Portugal no setor de biocombustíveis, com planos para a construção de usinas que suprirão a demanda por combustíveis de baixo carbono na Europa. A Boeing está estudando aumentar a produção de aeronaves 737 MAX, enquanto a Embraer anunciou o lançamento de carros voadores. As bolsas da Colômbia e do Peru lideram o desempenho na América Latina com ganhos significativos no ano, superando o Brasil que registrou um crescimento menor. O setor de biocombustíveis está em foco com a possibilidade de expansão para mercados europeus, enquanto as incorporadoras antecipam encomendas de elevadores devido aos gargalos na produção.", "tecnologia": "A inteligência artificial (IA) continua sendo um tema de grande importância na tecnologia global. O CEO de uma empresa espera que uma nova fase de adoção da IA seja alcançada, enquanto especialistas alertam sobre os riscos potenciais associados à IA para as crianças. Em Michigan, EUA, a questão dos data centers de IA se tornou um foco de protestos populares e tensões eleitorais. O Brasil desempenhou um papel importante na contra-ataque contra o domínio dos Estados Unidos na IA. A Current AI, uma entidade sem fins lucrativos, está avançando em projetos para garantir a inclusão cultural na IA. Além disso, a Samsung está cortando vagas nos Estados Unidos durante a transferência da sede para o Texas, coincidindo com o aumento de investimentos em chips de IA. Entre as ofertas promocionais, destaca-se a Amazon que oferece uma variedade de produtos como roteadores Wi-Fi Mesh, headsets 7.1 Surround, soundbars e monitores gamer, todos adequados para diferentes necessidades do consumidor.", "ciencia": "Um estudo internacional liderado por pesquisadores brasileiros e baseado nos dados do Telescópio Espacial James Webb mostrou que algumas galáxias distantes têm uma quantidade de hélio muito maior do que se esperava. Este achado é um dos mais significativos mencionados nos artigos fornecidos, ajudando a compreender a evolução química desde o Big Bang. Além disso, cientistas do Conicet e outros pesquisadores descobriram comportamentos inesperados do ferro no centro da Terra, fornecendo novas informações sobre o campo magnético terrestre, as velocidades das ondas sísmicas e a evolução de planetas rochosos. Em outro desenvolvimento importante, os investigadores do Helmholtz-Zentrum Dresden-Rossendorf criaram dois processos—cavitação hidrodinâmica e plasma atmosférico frio combinado com dispersão de gás—para degradar substâncias perfluoradas (PFAS), químicos industriais extremamente resistentes à degradação química. Isso representa um avanço significativo na descontaminação ambiental.", "cultura": "O filme 'A Odisséia', dirigido por Christopher Nolan, estreou com bilheteria global recorde de US$ 264 milhões, sendo o maior lançamento internacional da carreira do diretor. O sucesso financeiro desafia as previsões negativas e ganha apoio dos conservadores, que consideram a obra muito boa. Em outro projeto, Roberto Feith, após uma longa carreira, lança seu primeiro romance aos 73 anos. A HUMA Arquitetura projetou um penthouse no Rio de Janeiro para uma atriz e diretora teatral, integrando linhas em estampas. A Unesco analisará candidaturas ao Patrimônio Mundial entre os dias 24 e 26 de julho, incluindo a proposta dos teatros da Amazônia. O documentário 'Preta - Eu não ando só', que mostrará intimidade de Preta Gil em seus últimos dias, será exibido na Globo nesta segunda-feira após o programa 'Quem Ama Cuida'.", "sociedade": "O número de alunos matriculados em colégios diminuiu, conforme relatório do Taipei Times. A fundação propôs reformas educacionais para melhorar o sistema de ensino. Em Minas Gerais, um prédio desabou e uma mulher cadeirante escapou após saltar do segundo andar para evitar a tragédia. O jornal Clarín informa que o número de contribuintes para a Segurança Social diminuiu em 38.532 no último ano, impactando os recursos destinados aos pensionistas. O Colégio de Professores defendeu a suspensão das aulas e propôs uma revisão do calendário escolar para 2027.", "meio_ambiente": "O fenômeno El Niño está causando preocupações no Brasil e no mundo. Em São Paulo, Mato Grosso do Sul e Rio Grande do Sul, o fenômeno pode afetar a safra de arroz na temporada 2026/27 e aumentar o risco de queimadas entre agosto e outubro, conforme alerta do governo brasileiro. No exterior, incêndios florestais na Espanha estão atingindo grandes áreas, enquanto no Peru um terremoto causou ao menos seis mortes e 30 feridos. Em Gaza, a Faixa de Gaza registra o maior número de crianças amputadas por habitante devido aos bombardeios israelenses desde outubro de 2023. No Rio Grande do Sul, tempestades deixaram estragos em várias cidades neste domingo (19/7), enquanto no Guyana um ferry com 116 passageiros afundou, levando a uma operação de busca e resgate. Na Ásia, o Irã enfrenta problemas de energia elétrica devido a ataques militares e sobrecarga, resultando em cortes de luz durante o calor extremo.", "direitos_humanos": "O parlamento israelense, o Knesseste, aprovou uma lei com o objetivo de desmantelar o sistema educacional palestino na parte oriental de Jerusalém. Este desenvolvimento é considerado uma violação dos direitos humanos, especialmente no que diz respeito à educação, um direito fundamental para a comunidade palestiniana."}, "resumo_do_dia": {"politica_nacional": [{"id": 61243, "titulo": "Salário de Ancelotti é maior do que o dos técnicos finalistas da Copa", "url": "https://www.poder360.com.br/copa-2026/salario-de-ancelotti-e-maior-do-que-o-dos-tecnicos-finalistas-da-copa/", "fonte_id": "poder360", "data_pub": "2026-07-19T18:42:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ancelotti recebe o maior salário entre os técnicos das seleções nacionais; a CBF renovou seu contrato com ele até o próximo Mundial.", "titulo_pt": "Salário de Ancelotti é maior do que o dos técnicos finalistas da Copa", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 61238, "titulo": "Questionado sobre apoio a presidenciáveis, ACM Neto diz respeitar aliados e que estará com Ronaldo Caiado: 'É a minha posição'", "url": "https://g1.globo.com/ba/feira-de-santana-regiao/eleicoes/2026/noticia/2026/07/19/acm-neto-diz-que-estara-com-ronaldo-caiado-apoio-eleicao-presidencial.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-19T18:38:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "ACM Neto, pré-candidato ao governo da Bahia pelo União Brasil, declarou que estará com Ronaldo Caiado na disputa presidencial. Ele afirmou que reconhece a amizade e a parceria política com Caiado.", "titulo_pt": "ACM Neto define apoio a Ronaldo Caiado para a presidência", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 61289, "titulo": "Lula lamenta morte de Matheus Azevedo, irmão caçula de Cleitinho", https://www.cnnbrasil.com.br/politica/entenda-como-funcionam-os-trabalhos-do-congresso-em-periodo-eleitoral/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Durante o período eleitoral, os parlamentares que buscam reeleição tendem a se concentrar nas regiões onde têm maior apoio dos eleitores. Eles normalmente direcionam mais esforços para essas áreas.", "titulo_pt": "Entenda como funcionam os trabalhos do Congresso durante o período eleitoral", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 60887, "titulo": "Saiba por que Lula podia receber visitas políticas e divulgar cartas e Bolsonaro não pode", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/saiba-por-que-lula-podia-receber-visitas-politicas-e-divulgar-cartas-e-bolsonaro-nao-pode.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-19T17:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As restrições a Jair Bolsonaro, preso por liderar uma tentativa de golpe de Estado, foram comparadas por seus aliados às medidas aplicadas a Luiz Inácio Lula da Silva quando este foi preso em 2018 durante a Operação Lava Jato.", "titulo_pt": "Entenda por que Bolsonaro tem restrições mais duras e como isso é comparado ao caso Lula", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 60897, "titulo": "Ciro fala em votar em Caiado ou em Renan Santos, mas não em Flávio", "url": "https://www.poder360.com.br/poder-congresso/ciro-fala-em-votar-em-caiado-ou-em-renan-santos-mas-nao-em-flavio/", "fonte_id": "poder360", "data_pub": "2026-07-19T17:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ciro Gomes afirmou que votará em either Celso Caiado ou Renan Santos nas eleições para o governo do Ceará, mas não em Flávio Dino. O candidato é apoiado pelo senador na disputa.", "titulo_pt": "Ciro diz que votará em Caiado ou Renan Santos, mas não em Flávio", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 60975, "titulo": "Michelle Bolsonaro descarta ser vice de Romeu Zema: ‘Nenhuma possibilidade’", "url": "https://www.infomoney.com.br/politica/michelle-bolsonaro-descarta-ser-vice-de-romeu-zema-nenhuma-possibilidade/", "fonte_id": "infomoney", "data_pub": "2026-07-19T17:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Michelle Bolsonaro declarou que não há possibilidade de ela ser vice-governadora ao lado de Romeu Zema. Sua prioridade atual é cuidar da saúde do ex-presidente Jair Bolsonaro.", "titulo_pt": "Michelle Bolsonaro descarta ser vice de Romeu Zema: 'nenhuma possibilidade'", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 60916, "titulo": "PF segue trilha de desvios do orçamento secreto que pode atingir em cheio o centrão", "url": "https://veja.abril.com.br/brasil/pf-segue-trilha-de-desvios-do-orcamento-secreto-que-pode-atingir-em-cheio-o-centrao/", "fonte_id": "veja", "data_pub": "2026-07-19T17:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Investigações no Dnocs, determinadas pelo ministro Flávio Dino, estão examinando possíveis desvios do orçamento secreto que podem afetar figuras importantes do Parlamento.", "titulo_pt": "PF investiga desvios do orçamento secreto que podem atingir parlamentares", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 60888, "titulo": "A política da nova opacidade", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/marcus-melo/2026/07/a-politica-da-nova-opacidade.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-19T17:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Durante décadas, os parlamentares buscavam reconhecimento público ao financiar obras e inaugurar projetos na sua base eleitoral. Agora, há uma mudança no comportamento político que questiona essa lógica tradicional de busca por visibilidade e votos.", "titulo_pt": "A política da nova opacidade", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 60898, "titulo": "IA não converte o esperado em empresas; entenda os motivos", "url": "https://www.poder360.com.br/poder-tech/ia-nao-converte-o-esperado-em-empresas-entenda-os-motivos/", "fonte_id": "poder360", "data_pub": "2026-07-19T17:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A adoção de inteligência artificial não atingiu os níveis esperados nas empresas, segundo especialista. Falta de visão estratégica da alta gestão e processos internos rígidos são apontados como limitantes para a produtividade.", "titulo_pt": "IA não alcança o esperado em empresas; entenda as razões", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 60908, "titulo": "Digitalização impulsiona busca por segurança jurídica em pequenos negócios", "url": "https://www.cartacapital.com.br/do-micro-ao-macro/digitalizacao-seguranca-juridica-pequenas-empresas/", "fonte_id": "cartacapital", "data_pub": "2026-07-19T17:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em 2025, os certificados digitais atingiram um novo recorde e auxiliaram micro e pequenas empresas no processo de formalização de contratos, admissões e operações sem o uso de documentos físicos.", "titulo_pt": "Digitalização impulsiona busca por segurança jurídica em pequenos negócios", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [{"titulo": "Como funcionam as convenções partidárias que começam nesta segunda-feira", "sumario": "As convenções partidárias começam nesta segunda-feira com o objetivo de selecionar os candidatos para as eleições deste ano, prazo final para conclusão do processo no dia 5 de agosto. As convenções partidárias para definir os candidatos nas eleições de 2022 começam nesta segunda-feira, com o PL marcado para 25 de julho e o PT em 2 de agosto. As convenções partidárias para as eleições de 2026 começam nesta segunda-feira (20) e irão até 5 de agosto, período no qual os partidos políticos escolherão oficialmente suas candidaturas.", "artigos": [{"id": 61250, "titulo": "Como funcionam as convenções partidárias que começam nesta segunda-feira", "url": "https://veja.abril.com.br/politica/como-funcionam-as-convencoes-partidarias-que-comecam-nesta-segunda-feira/", "fonte_id": "veja", "data_pub": "2026-07-19T18:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As convenções partidárias começam nesta segunda-feira com o objetivo de selecionar os candidatos para as eleições deste ano, prazo final para conclusão do processo no dia 5 de agosto.", "titulo_pt": "Como funcionam as convenções partidárias que começam nesta segunda-feira", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 60907, "titulo": "Prazo para convenções partidárias começa nesta segunda-feira", "url": "https://www.cartacapital.com.br/politica/prazo-para-convencoes-partidarias-comeca-nesta-segunda-feira/", "fonte_id": "cartacapital", "data_pub": "2026-07-19T17:23:00Z", "idioma": "pt", "provavel_duplicata_de": 60444, "texto_pt": "As convenções partidárias para definir os candidatos nas eleições de 2022 começam nesta segunda-feira, com o PL marcado para 25 de julho e o PT em 2 de agosto. Todos os partidos têm até o dia 5 de agosto para concluir esse processo.", "titulo_pt": "Prazo para convenções partidárias começa nesta segunda-feira", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 60970, "titulo": "Convenções partidárias para escolha de candidatos começam nesta segunda (20)", "url": "https://www.brasildefato.com.br/2026/07/19/convencoes-partidarias-para-escolha-de-candidatos-comecam-nesta-segunda-20/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-19T17:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As convenções partidárias para as eleições de 2026 começam nesta segunda-feira (20) e irão até 5 de agosto, período no qual os partidos políticos escolherão oficialmente suas candidaturas. O prazo estabelecido pelo Tribunal Superior Eleitoral (TSE) inclui também a formação de coligações.", "titulo_pt": "Convenções partidárias para escolha de candidatos começam nesta segunda (20)", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}]}], "mundo": [{"id": 61187, "titulo": "Civilian toll rises as Moscow pounds Kyiv with missiles", "url": "https://www.taipeitimes.com/News/front/archives/2026/07/20/2003861040", "fonte_id": "taipei_times", "data_pub": "2026-07-20T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O número de civis feridos aumentou enquanto Moscou atingiu Kyiv com foguetes.", "titulo_pt": "Pazienza aumenta o número de vítimas civis enquanto moscou bombardeia Kyiv com mísseis", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 61194, "titulo": "Cross-regional military drills validate Taiwan’s wartime plans: Experts", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/20/2003861053", "fonte_id": "taipei_times", "data_pub": "2026-07-20T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Expertos afirmam que os exercícios militares inter-regionais validam os planos de guerra da Taiwan. Essa é a principal conclusão apresentada na reportagem.", "titulo_pt": "Exercícios militares inter-regionais confirman planos de guerra da Taiwan: especialistas", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 61183, "titulo": "Foreign minister reveals Germany trip", "url": "https://www.taipeitimes.com/News/front/archives/2026/07/20/2003861036", "fonte_id": "taipei_times", "data_pub": "2026-07-20T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O ministro dos negócios estrangeiros revelou uma viagem à Alemanha.", "titulo_pt": "Ministro de relações exteriores anuncia viagem à Alemanha", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 61402, "titulo": "Merz accusa Sinistra e Verdi, 'al Bundestag hanno lo stesso tono dell'AfD'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/19/merz-accusa-sinistra-e-verdi-al-bundestag-hanno-lo-stesso-tono-dellafd_0623f23a-a5d4-4ab5-a1e4-fca021e3dd8c.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-19T18:36:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O chanceler alemão expressou preocupação com o tom dos partidos Sinistra e Verdi no Parlamento, comparando-os ao partido AfD. Ele acusou ambos de terem um estilo de discurso semelhante ao do AfD.", "titulo_pt": "Merz acusa Sinistra e Verdi, 'o Bundestag tem o mesmo tom da afd'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 61403, "titulo": "Marina ucraina, missili russi su una nave mercantile turca, 5 morti", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/19/marina-ucraina-missili-russi-su-una-nave-mercantile-turca-5-morti_0650e1f1-1ed7-4af6-b7fd-703b7aae973b.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-19T18:32:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Missiles russos atingiram uma navio mercante turco no Mar Negro, resultando na morte de cinco pessoas. Além disso, cinco passageiros estão desaparecidos e oito ficaram feridos.", "titulo_pt": "Marina ucraniana, mísseis russos em um navio mercante turco, 5 mortos", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 61396, "titulo": "‘Sacred unity’: Iran’s supreme leader calls for calm amid political divides", "url": "https://www.aljazeera.com/news/2026/7/19/sacred-unity-irans-supreme-leader-calls-for-calm-amid-political-divides?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-19T18:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O líder supremo da Irã emitiu um decreto pedindo calma durante os divisórios políticos. Isso ocorreu após apoiadores radicais do governo acusarem funcionários de traição por assinar um memorando de entendimento com os EUA.", "titulo_pt": "Unidade sagrada: líder supremo da Irã pede calma diante das divisões políticas", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 61362, "titulo": "Rusia lanzó uno de los mayores ataques con misiles balísticos sobre Kiev y volvió a exponer las falencias defensivas de Ucrania", "url": "https://www.lanacion.com.ar/el-mundo/rusia-lanzo-uno-de-los-mayores-ataques-con-misiles-balisticos-sobre-kiev-y-volvio-a-exponer-las-nid19072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-19T18:23:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Rússia realizou um dos maiores ataques com misseis balísticos sobre Kiev, Kharkiv e Zaporiyia, deixando pelo menos sete mortos e muitos feridos. Moscovo atirou 41 mísseis e 125 drones durante a noite, enquanto Ucrânia reitera a necessidade urgente de reforçar seu sistema defensivo com interceptores Patriot.", "titulo_pt": "Rússia realiza um dos maiores ataques com misseis sobre Kiev e expõe falhas na defesa ucraniana", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 61363, "titulo": "Earthquake in Peru Kills 6 and Displaces Hundreds", "url": "https://www.nytimes.com/2026/07/19/world/americas/peru-earthquake.html", "fonte_id": "nyt_world", "data_pub": "2026-07-19T18:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um terremoto de magnitude 5.5 atingiu a região central dos altos andes do Peru, causando seis mortes e deslocando centenas de pessoas. O evento sismológico foi o mais forte na área em quase meio século.", "titulo_pt": "Terremoto no Peru mata seis e desloca centenas", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 61319, "titulo": "Casa Branca defende seleção da Argentina por faixa sobre as Ilhas Falklands/Malvinas", "url": "https://www.bbc.com/portuguese/articles/cd69qp2dj5jo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-19T18:13:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Casa Branca defendeu a seleção argentina por causa de uma faixa sobre as Ilhas Falklands/Malvinas, o que pode aumentar a polêmica. O gabinete do primeiro-ministro britânico apoiou pedidos para que a Fifa investigue o caso.", "titulo_pt": "Casa Branca defende seleção Argentina por faixa sobre as Ilhas Falklands/Malvinas", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 61302, "titulo": "Rússia atinge alvos militares em Kiev após ataques ucranianos em Moscou", "url": "https://www.brasildefato.com.br/2026/07/19/russia-atinge-alvos-militares-em-kiev-apos-ataques-ucranianos-em-moscou/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-19T18:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério da Defesa da Rússia anunciou um ataque noturno contra alvos militares e logísticos na capital ucrainiana, Kiev, e no porto de Yuzhny em Odessa. Este ocorreu após ataques ucranianos com drones a centros logísticos russos no sábado.", "titulo_pt": "Rússia ataca alvos militares em Kiev após ataques ucranianos em Moscou", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 61392, "titulo": "Israel says Iran missile towards Jordan's Aqaba intercepted", "url": "https://www.france24.com/en/israel-says-iran-missile-towards-jordan-s-aqaba-intercepted", "fonte_id": "france24", "data_pub": "2026-07-19T18:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Forças israelenses e jordanianas interceptaram um míssil iraniano que estava alvo da cidade de Aqaba, Jordânia. Israel relatou danos por fragmentos resultantes dessa ação, mas ninguém ficou ferido.", "titulo_pt": "Israel afirma ter interceptado míssil iraniano em direção à Aqaba", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 61404, "titulo": "Incendio a 100 km a nord di Madrid, 13.000 ettari bruciati", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/19/incendio-a-100-km-a-nord-di-madrid-13.000-ettari-bruciati_696ec400-809a-4ca1-82fc-9cce65f13a0b.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-19T18:03:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Um incêndio florestal ocorreu a aproximadamente 100 km ao norte de Madrid, com uma área de 13.000 ettari queimada. Até o momento, não há relatos de vítimas.", "titulo_pt": "Incêndio a 100 km ao norte de Madrid queima 13.000 ettari", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 61405, "titulo": "Morto a Bologna, questura 'a disposizione dei pm filmati bodycam degli agenti'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/19/morto-a-bologna-questura-a-disposizione-dei-pm-filmati-bodycam-degli-agenti_aadcbfa0-a687-4dc3-baec-7df4d31175d2.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-19T18:01:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Um policial morreu na cidade de Bolonha, Itália. A delegacia da polícia está à disposição dos promotores e os vídeos das câmeras corporais dos agentes foram fornecidos.", "titulo_pt": "Morto em bolonha, delegacia da polícia à disposição dos promotores e vídeos de bodycam disponibilizados", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 61364, "titulo": "Israel watches tensely as the fighting between U.S. and Iran escalates.", "url": "https://www.nytimes.com/live/2026/07/19/world/iran-war-strikes-trump-hormuz/israel-watches-tensely-as-the-fighting-between-us-and-iran-escalates", "fonte_id": "nyt_world", "data_pub": "2026-07-19T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Israel está monitorando com tensão o aumento das hostilidades entre Estados Unidos e Irã.", "titulo_pt": "Israel vigia de perto como a luta entre EUA e Irã se intensifica", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 61179, "titulo": "L'ufficio di Netanyahu a Mamdani, 'vuole distogliere attenzione dai suoi fallimenti'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/19/lufficio-di-netanyahu-a-mamdani-vuole-distogliere-attenzione-dai-suoi-fallimenti_c1baced4-d2a6-442d-abaa-b814cf62f658.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-19T17:59:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O escritório de Netanyahu enviou uma carta ao prefeito Mamdani, afirmando que deseja desviar a atenção dos seus fracassos. A carta respondeu à afirmação do prefeito de poder arrestar o ex-primeiro-ministro israelense se ele visitasse Nova York para as Nações Unidas.", "titulo_pt": "Escritório de Netanyahu responde prefeito, dizendo quer desviar atenção dos seus fracassos", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 61101, "titulo": "Troy Jackson has effectively secured the Maine Senate Democratic nomination", "url": "https://www.politico.com/news/2026/07/19/troy-jackson-likely-maine-senate-nominee-platner-01004490", "fonte_id": "politico", "data_pub": "2026-07-19T17:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Troy Jackson tem garantido a nomeação democrata para o Senado do Maine, com seus delegados preferidos vencendo a maioria das vagas no conclave de nomeação que ocorrerá na próxima semana para substituir Graham Platner.", "titulo_pt": "Troy Jackson assegura nomeação democrata para o senado do Maine", "veiculo": "Politico", "pais": "EUA", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 61189, "titulo": "US senator warns about economic blockade", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/20/2003861047", "fonte_id": "taipei_times", "data_pub": "2026-07-20T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um senador dos Estados Unidos advertiu sobre o risco de uma possível bloqueio econômico. O senador alertou para as consequências potenciais disso.", "titulo_pt": "Senador dos EUA avisa sobre risco de bloqueio econômico", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 61304, "titulo": "Semana começa com tempestades no Sul e alerta de vendaval no interior de SP", "url": "https://www.infomoney.com.br/mercados/semana-comeca-com-tempestades-no-sul-e-alerta-de-vendaval-no-interior-de-sp/", "fonte_id": "infomoney", "data_pub": "2026-07-19T19:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A semana começa com tempestades no Sul do Brasil e um alerta de possíveis vendavais no interior de São Paulo. As condições climáticas variam entre regiões, com destaque para essas duas áreas mais afetadas.", "titulo_pt": "Semana inicia com tempestades no Sul e alerta de vendaval no interior de SP", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 61307, "titulo": "Brasil pode virar sócio de Portugal em nova fronteira dos biocombustíveis", "url": "https://www.infomoney.com.br/business/brasil-pode-virar-socio-de-portugal-em-nova-fronteira-dos-biocombustiveis/", "fonte_id": "infomoney", "data_pub": "2026-07-19T18:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil pode se tornar um parceiro de Portugal no setor de biocombustíveis, com o plano prevendo a construção de uma ou duas usinas para suprir a demanda por combustíveis de baixo carbono na Europa.", "titulo_pt": "Brasil pode ser sócio de Portugal em nova fronteira dos biocombustíveis", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 61266, "titulo": "Saiba como funciona o VIX, “índice do medo” do mercado", "url": "https://www.cnnbrasil.com.br/economia/mercado/saiba-como-funciona-o-vix-indice-do-medo-do-mercado/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T18:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O VIX, conhecido como 'índice do medo', mede a expectativa de volatilidade das bolsas. É usado como uma ferramenta de proteção para carteiras de investimentos.", "titulo_pt": "Saiba como funciona o VIX, ‘índice do medo’ do mercado", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 61310, "titulo": "O ‘carry trade’ mais seguro nos mercados emergentes está nas moedas da América Latina", "url": "https://www.infomoney.com.br/mercados/o-carry-trade-mais-seguro-nos-mercados-emergentes-esta-nas-moedas-da-america-latina/", "fonte_id": "infomoney", "data_pub": "2026-07-19T18:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As moedras latino-americanas são consideradas as mais atraentes entre os países emergentes, segundo uma métrica utilizada por operadores financeiros que compara o carry trade com o risco associado.", "titulo_pt": "O 'carry trade' mais seguro nos mercados emergentes está nas moedas da América Latina", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 61235, "titulo": "Eve, da Embraer, anuncia venda de até 46 'carros voadores'", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/eve-da-embraer-anuncia-venda-de-ate-46-carros-voadores.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-19T18:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Eve, subsidiária da Embraer, anunciou a assinatura de cartas de intenções para vender 46 eVTOLs (carros voadores), sendo 30 para a Moov, empresa suíça de aviação, e 16 para a Shearwater Global Capital, empresa de financiamento aeronáutico com opções globais de ativos. O anúncio foi feito neste domingo (19).", "titulo_pt": "Eve, da Embraer, anuncia venda potencial de 46 'carros voadores'", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 61272, "titulo": "Agentes do ICE usarão câmeras corporais durante abordagens de trânsito", "url": "https://www.cnnbrasil.com.br/internacional/agentes-do-ice-usarao-cameras-corporais-durante-abordagens-de-transito/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T18:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Tom Homan, responsável pela política de fronteiras, anunciou que agentes do ICE usarão câmeras corporais durante abordagens de trânsito. A medida foi tomada após dois casos fatais envolvendo agentes federais de imigração.", "titulo_pt": "Agentes do ICE usará câmeras corporais durante abordagens de trânsito", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 61236, "titulo": "Grupo Itajobi pede cautelar para reestruturar dívida de R$ 3,7 bilhões", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/07/grupo-itajobi-pede-cautelar-para-reestruturar-divida-de-r-37-bilhoes.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-19T18:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Grupo Itajobi, que controla as usinas Itajobi, Carolo e Rio Pardo, solicitou mediação empresarial no Cejusc de São José do Rio Preto para reestruturar uma dívida de R$ 3,7 bilhões. A empresa também apresentou uma medida cautelar antecedente.", "titulo_pt": "Itajobi pede mediação e cautelar para reestruturar dívida de R$ 3,7 bilhões", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 61237, "titulo": "Boeing prioriza aumentar produção após 737 Max vender menos que Airbus A320", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/boeing-prioriza-aumentar-producao-apos-737-max-vender-menos-que-airbus-a320.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-19T18:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Boeing, liderada pela chefe da divisão de aviões comerciais Stephanie Pope, está focada em aumentar e melhorar a produção de aeronaves, segundo ela, sem se preocupar com anúncios de novos pedidos. A empresa busca reverter o desempenho inferior do 737 Max em comparação ao Airbus A320.", "titulo_pt": "Boeing prioriza aumento da produção após 737 Max vender menos que Airbus A320", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 61277, "titulo": "O que é layoff? Medida volta ao radar dos frigoríficos após cota da China", "url": "https://www.cnnbrasil.com.br/agro/o-que-e-layoff-medida-volta-ao-radar-dos-frigorificos-apos-cota-da-china/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T18:04:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A medida de layoff está sendo avaliada pelo setor de frigoríficos para ajustar a produção diante da sobretaxa de 67% imposto pela China sobre a carne bovina brasileira. Este cenário levou o setor a voltar sua atenção para essa possibilidade após um período sem ela.", "titulo_pt": "O que é layoff? Medida volta ao radar dos frigoríficos após sobretaxa da China", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 61313, "titulo": "“A Odisséia” arrecada US$264,1 mi em bilheteria mundial, diz estúdio", "url": "https://www.infomoney.com.br/consumo/a-odisseia-arrecada-us2641-mi-em-bilheteria-mundial-diz-estudio/", "fonte_id": "infomoney", "data_pub": "2026-07-19T18:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O filme 'A Odisséia', dirigido por Christopher Nolan, gerou arrecadação global de US$264,1 milhões nas bilheterias. Este é o primeiro trabalho do diretor desde 'Oppenheimer', que obteve sucesso tanto comercial quanto crítico em 2023.", "titulo_pt": "'A Odisséia' arrecada US$264,1 mi em bilheteria mundial, diz estúdio", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 61279, "titulo": "Saiba os carros fabricados na Argentina que são vendidos no Brasil", "url": "https://www.cnnbrasil.com.br/auto/saiba-os-carros-fabricados-na-argentina-que-sao-vendidos-no-brasil/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Argentina fabrica diversos modelos de carros que são comercializados no Brasil. O país é conhecido por sua produção automotiva além de ser famoso pelo futeb e, research shows", "url": "https://phys.org/news/2026-07-cinematic-vr-immerses-viewers-narrative.html", "fonte_id": "phys_org", "data_pub": "2026-07-19T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O uso de realidade virtual (VR) e a metaverso oferecem novas possibilidades de narrativa, onde o espectador não apenas observa a história, mas experimenta-a como se estivesse no centro das ações. Estudos mostram que essa imersão cinematográfica VR pode tornar conceitos tecnológicos mais compreensíveis e interessantes para muitos usuários.", "titulo_pt": "VR cinematográfico immerge os espectadores na narrativa, pesquisa mostra", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 61409, "titulo": "Samples reveal how Earth slows solar wind striking moon's near side", "url": "https://phys.org/news/2026-07-samples-reveal-earth-solar-moon.html", "fonte_id": "phys_org", "data_pub": "2026-07-19T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Lua foi exposta ao vento solar por bilhões de anos, no entanto, as duas metades da Lua são atingidas por ventos solares com velocidades e energias diferentes.", "titulo_pt": "Amostras revelam como a terra faz com que o vento solar atinja a lua em velocidades e energias variáveis", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 61410, "titulo": "Quantum entanglement without transport: Leaky qubits offer route around noisy channels", "url": "https://phys.org/news/2026-07-quantum-entanglement-leaky-qubits-route.html", "fonte_id": "phys_org", "data_pub": "2026-07-19T18:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores demonstraram que a liberação inevitável de energia e informação de um sistema quântico para seu ambiente pode ser explorada para gerar entrelaçamento, o recurso utilizado por tecnologias quânticas para realizar tarefas inatingíveis pelas tecnologias clássicas.", "titulo_pt": "Entrelaçamento quântico sem transporte: qubits vazamentos oferecem caminho ao redor de canais ruinosos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 61340, "titulo": "Rafael Guzmán García, experto en longevidad: \"Uno de los mayores errores que cometemos en el día a día y que acelera el envejecimiento es no dormir lo suficiente\"", "url": "https://www.clarin.com/estados-unidos/rafael-guzman-garcia-experto-longevidad-mayores-errores-cometemos-dia-dia-acelera-envejecimiento-dormir-suficiente_0_IeryFpXHJJ.html", "fonte_id": "clarin", "data_pub": "2026-07-19T18:07:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Rafael Guzmán García, um especialista em longevidade, afirma que dormir menos de sete horas diariamente pode acelerar o envelhecimento. O especialista destaca que essa prática tem consequências além do cansaço.", "titulo_pt": "Rafael Guzmán García, especialista em longevidade: 'um dos maiores erros no dia a dia e que acelera o envelhecimento é não dormir o suficiente'", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 61215, "titulo": "AirPods-sized fluorescence analytical device holds promise for timely home molecular testing", "url": "https://phys.org/news/2026-07-airpods-sized-fluorescence-analytical-device.html", "fonte_id": "phys_org", "data_pub": "2026-07-19T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O avanço na tecnologia médica tem melhorado a saúde ao trazer aspectos-chave do atendimento à domicílio, tornando o acompanhamento de sintomas e até mesmo o teste para certas doenças fora de laboratórios ou ambientes clínicos. Isso dá mais controle aos pacientes.", "titulo_pt": "Dispositivo analítico do tamanho dos airpods promete testes moleculares domiciliares rápidos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 61216, "titulo": "When work and family collide, job flexibility helps shape who adjusts", "url": "https://phys.org/news/2026-07-family-collide-job-flexibility-adjusts.html", "fonte_id": "phys_org", "data_pub": "2026-07-19T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Durante a pandemia de COVID-19, milhões de pais trabalhadores enfrentaram a difícil escolha entre alterar seu trabalho ou cuidar dos filhos quando as escolas fecharam e o serviço de creche desapareceu.", "titulo_pt": "Quando trabalho e família colidem, flexibilidade no emprego ajuda a definir quem se adapta", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 61233, "titulo": "'Aliens' at 40: James Cameron's sequel is a sci-fi icon, but did you know he quit the movie twice?", "url": "https://www.space.com/entertainment/space-movies-shows/aliens-at-40-james-camerons-sequel-is-a-sci-fi-icon-but-did-you-know-he-quit-the-movie-twice", "fonte_id": "space_com", "data_pub": "2026-07-19T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Aliens, lançado há 40 anos, se tornou um ícone do sci-fi, mas teve problemas estúdios e duas vezes James Cameron deixou o projeto.", "titulo_pt": "Aliens: 40 anos depois, filme quase não saiu da estaca devido a problemas comestúdio", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 61217, "titulo": "Carnaby's cockatoos exposed to dangerous pesticide concentrations in WA's Wheatbelt", "url": "https://phys.org/news/2026-07-carnaby-cockatoos-exposed-dangerous-pesticide.html", "fonte_id": "phys_org", "data_pub": "2026-07-19T16:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa da Universidade Murdoch descobriu altos níveis de contaminação por pesticidas nos alimentos dos cockatoos de Carnaby ameaçados de extinção na região do Wheatbelt, incluindo concentrações acima dos limites regulatórios perto de silos de grãos.", "titulo_pt": "Cockatoos de carnaby expostos a concentrações perigosas de pesticidas no oeste australiano", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 61218, "titulo": "A century-old stellar mystery may finally have an explanation", "url": "https://phys.org/news/2026-07-century-stellar-mystery-explanation.html", "fonte_id": "phys_org", "data_pub": "2026-07-19T16:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Para mais de um século, astrônomos se perguntaram sobre uma discrepância estranha na documentação histórica. Uma nova pesquisa, publicada no arXiv em 29 de junho, sugere uma possível explicação para o mistério envolvendo a estrela Theta Eridani.", "titulo_pt": "Mistério centenário da astronomia pode ter fim", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 61160, "titulo": "Designing cities for a hotter future", "url": "https://www.aljazeera.com/video/talk-to-al-jazeera/2026/7/19/designing-cities-for-a-hotter-future?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-19T15:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A ativista pelo clima Mina Hasman tem uma visão de projetar cidades que funcionem como florestas e edifícios que atuem como árvores.", "titulo_pt": "Projetando cidades para um futuro mais quente", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 60450, "titulo": "Por que nossos dedos têm comprimentos diferentes", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/por-que-nossos-dedos-tem-comprimentos-diferentes.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-19T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O autor descreveu uma situação onde estava atrasado e, na pressa, derrubou algumas coisas da bancada, espalhando moedas pelo chão.", "titulo_pt": "Por que nossos dedos têm comprimentos diferentes?", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 60879, "titulo": "Should we trust AI in the search for alien life? Scientists aren't so sure", "url": "https://www.space.com/space-exploration/search-for-life/should-we-trust-ai-in-the-search-for-alien-life-scientists-arent-so-sure", "fonte_id": "space_com", "data_pub": "2026-07-19T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Novas pesquisas indicam que a inteligência artificial pode repetidamente enganar os cientistas, fazendo com que confundam não-vida com vida.", "titulo_pt": "Deveríamos confiar na IA na busca por vida extraterrestre?", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 60968, "titulo": "Existe horário ideal para estudar? Ciência explica", "url": "https://www.cnnbrasil.com.br/educacao/existe-horario-ideal-para-estudar-ciencia-explica/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os especialistas ouvidos pela CNN Brasil afirmam que o cronotipo, a qualidade do sono e o tipo de tarefa são fatores mais importantes do que a hora exata do relógio para definir o horário ideal para estudar. Eles também alertam contra o risco de sacrificar o descanso para ganhar mais horas de estudo.", "titulo_pt": "Existe horário ideal para estudar? Ciência explica", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 60873, "titulo": "New AI blood test predicts heart disease 15 years early", "url": "https://www.sciencedaily.com/releases/2026/07/260716023603.htm", "fonte_id": "science_daily", "data_pub": "2026-07-19T14:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo teste sanguíneo baseado em IA pode fornecer uma advertência muito precoce de problemas cardíacos e circulatórios graves. Desenvolvido por pesquisadores da Universidade de Hong Kong, o CardiOmicScore analisa milhares de proteínas e metabólitos para estimar o risco de seis doenças cardiovasculares maiores, incluindo ataque cardíaco, stroke, insuficiência cardíaca e fibrilação auricular.", "titulo_pt": "Novo teste sanguíneo com IA prediz doenças cardíacas há 15 anos", "veiculo": "Science Daily", "pais": "EUA", "classe": "C"}, {"id": 60648, "titulo": "Científicos del Conicet, junto a otros investigadores, revelaron el inesperado comportamiento del hierro en el centro del planeta", "url": "https://www.lanacion.com.ar/ciencia/cientificos-del-conicet-junto-a-otros-investigadores-revelaron-el-inesperado-comportamiento-del-nid18072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-19T14:45:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Cientistas do Conicet, junto com outros pesquisadores, descobriram um comportamento inesperado do ferro no centro da Terra. Essa descoberta fornece novas informações sobre o campo magnético terrestre, a velocidade das ondas sísmicas e a evolução de planetas rochosos.", "titulo_pt": "Cientistas revelam comportamento surpreendente do ferro no centro da terra", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 60867, "titulo": "Researchers develop methods for breaking down forever chemicals", "url": "https://phys.org/news/2026-07-methods-chemicals.html", "fonte_id": "phys_org", "data_pub": "2026-07-19T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Investigadores do Helmholtz-Zentrum Dresden-Rossendorf desenvolveram dois processos—cavitação hidrodinâmica e plasma atmosférico frio combinado com dispersão de gás—tomando como alvo substâncias perfluoradas (PFAS), químicos industriais extremamente resistentes à degradação química. Os resultados foram publicados nas revistas Chemical Engineering Journal Advances e Scientific Reports.", "titulo_pt": "Investigadores desenvolvem métodos para quebrar químicos perene", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 61294, "titulo": "Tempo em família e videogame: como a Espanha se preparou para a final", "url": "https://www.metropoles.com/vida-e-estilo/tempo-em-familia-e-videogame-como-a-espanha-se-preparou-para-a-final", "fonte_id": "metropoles", "data_pub": "2026-07-19T18:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os jogadores da seleção espanhola aproveitam o tempo livre para passar com a família e desfrutar de momentos de lazer, além das atividades preparatórias para a final da Copa.", "titulo_pt": "Tempo em família e videogame: como a Espanha se preparou para a final", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 61411, "titulo": "Japanese port town regeneration among projects from Singapore University of Technology and Design", "url": "https://www.dezeen.com/2026/07/19/japanese-port-town-regeneration-singapore-university-technology-design-schoolshows/", "fonte_id": "dezeen", "data_pub": "2026-07-19T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Singapore University of Technology and Design apresentou projetos para a regeneração de uma antiga cidade portuária japonesa, para infraestrutura de cuidados em um cemitério na Manila e para um masterplano ecológico da costa de Singapura. Entre essas propostas está um projeto que busca reimaginar o histórico porto japonês de Tomonoura.", "titulo_pt": "Regeneração do porto japonês entre projetos da universidade de tecnologia e Design de singapura", "veiculo": "Dezeen (design e arquitetura)", "pais": "Reino Unido", "classe": "B"}, {"id": 61343, "titulo": "Qué significa la frase latina: \"Tempora mutantur, nos et mutamur in illis\"", "url": "https://www.clarin.com/estados-unidos/significa-frase-latina-tempora-mutantur-et-mutamur-in-illis_0_M0REJLs07S.html", "fonte_id": "clarin", "data_pub": "2026-07-19T17:59:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Esta frase latina significa que as épocas mudam e nós também nos modificamos nelas. Ela refere-se à transformação do tempo e como as pessoas se adaptam a essas mudanças.", "titulo_pt": "O que significa a frase latina: 'temporas mutantur, nos et mutamur in illis'", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 61221, "titulo": "‘The Odyssey’ Becomes Christopher Nolan’s Biggest Global Debut of All Time With $264 Million", "url": "https://variety.com/2026/film/box-office/the-odyssey-christopher-nolan-biggest-global-debut-1236815981/", "fonte_id": "variety", "data_pub": "2026-07-19T17:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O filme 'A Odisséia', de Christopher Nolan, estreou com um bilheteria global de $264,1 milhões, sendo seu lançamento internacional o maior da carreira do diretor. O filme é um drama de ação que estreou R-classificado e não faz parte de uma franquia majoritária.", "titulo_pt": "'A odisséia' se torna o maior estreia Global de Christopher Nolan com $264 milhões", "veiculo": "Variety", "pais": "EUA", "classe": "C"}, {"id": 61347, "titulo": "Nico González, la apuesta de Scaloni en el 11 de Argentina para la final del Mundial: qué buscó el DT y su antecedente fatal con Lamine Yamal", "url": "https://www.clarin.com/deportes/nico-gonzalez-apuesta-scaloni-11-argentina-final-mundial-busco-dt-antecedente-fatal-lamine-yamal_0_XkNBc1Zk4n.html", "fonte_id": "clarin", "data_pub": "2026-07-19T17:44:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Nico González foi incluído no time titular pela seleção argentina para a final do Mundial, sob o apelido de 'Cabalo', dado pelo técnico. Ele oferece desempenho defensivo e ofensivo, além de habilidades aéreas notáveis. Em abril, enfrentou o Barcelona e marcou contra Lionel Messi, mas foi expulso.", "titulo_pt": "Nico González, a aposta de Scaloni para a final do Mundial: qual foi o propósito do treinador e seu incidente anterior com Lamine Yamal", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 61222, "titulo": "HBO’s ‘Harry Potter’ Cinematographer Says It’s ‘Brutal’ Working Around the Young Stars’ Strict Shooting Schedules: ‘Have to Pre-Shoot All the Scenes While They’re in Class’", "url": "https://variety.com/2026/film/news/hbo-harry-potter-brutal-working-stars-strict-schedules-1236816011/", "fonte_id": "variety", "data_pub": "2026-07-19T17:35:00Z", "idioma": "en" Brasil", "pais": "Brasil", "classe": "B"}, {"id": 61141, "titulo": "The forest's slow return after fires: 'It feels like all life is gone, but in reality, much remains'", "url": "https://www.lemonde.fr/en/environment/article/2026/07/19/the-forest-s-slow-return-after-fires-it-feels-like-all-life-is-gone-but-in-reality-much-remains_6755629_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-19T16:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As consequências ecológicas das chamas florestais são difíceis de quantificar e variam dependendo de muitos fatores. É certo que a intensidade e frequência dos incêndios podem ser particularmente danosas aos ecossistemas.", "titulo_pt": "A volta lenta da floresta após os incêndios: 'sentimos que tudo está morto, mas na realidade, muito ainda permanece'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 60940, "titulo": "Tempestades deixam estragos em 21 cidades do Rio Grande do Sul", "url": "https://www.metropoles.com/brasil/tempestades-deixam-estragos-em-21-cidades-do-rio-grande-do-sul", "fonte_id": "metropoles", "data_pub": "2026-07-19T16:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Há previsão de instabilidades meteorológicas com chuvas persistentes em 21 cidades do Rio Grande do Sul neste domingo (19/7).", "titulo_pt": "Tempestades causam estragos em 21 cidades do Rio Grande do Sul", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 61253, "titulo": "Tudo sobre o incêndio na Espanha que já desabrigou 700 pessoas", "url": "https://exame.com/mundo/tudo-sobre-o-incendio-na-espanha-que-ja-desabrigou-700-pessoas/", "fonte_id": "exame", "data_pub": "2026-07-19T15:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um incêndio na província de Guadalajara, Espanha, já consumiu mais de 13 mil hectares e está atingindo um parque nacional. O fogo desabrigou cerca de 700 pessoas.", "titulo_pt": "Tudo sobre o incêndio na Espanha que já desabrigou 700 pessoas", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 61260, "titulo": "Terremoto deixa ao menos seis mortos e mais de 30 feridos no Peru", "url": "https://exame.com/mundo/terremoto-deixa-ao-menos-seis-mortos-e-mais-de-30-feridos-no-peru/", "fonte_id": "exame", "data_pub": "2026-07-19T15:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um terremoto causou ao menos seis mortes e mais de 30 feridos no Peru. O abalo foi seguido por uma réplica de magnitude 3,7 e gerou danos em hospitais, residências, rede elétrica e pontos turísticos.", "titulo_pt": "Terremoto deixa ao menos seis mortos e mais de 30 feridos no Peru", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 61153, "titulo": "Wildfires sweep across thousands of hectares in Spain", "url": "https://www.euractiv.com/news/wildfires-sweep-across-thousands-of-hectares-in-spain/", "fonte_id": "euractiv", "data_pub": "2026-07-19T14:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Incêndios florestais estão atingindo áreas extensas na Espanha. Os trabalhadores de emergência lidam com o maior incêndio do ano, em meio a temperaturas mais altas e condições mais secas na Europa.", "titulo_pt": "Incêndios florestais assolam milhares de hectares na Espanha", "veiculo": "Euractiv", "pais": "Europa", "classe": "B"}, {"id": 60479, "titulo": "Terremoto deixa cinco mortos e 21 feridos no Peru", "url": "https://veja.abril.com.br/mundo/terremoto-deixa-cinco-mortos-e-21-feridos-no-peru/", "fonte_id": "veja", "data_pub": "2026-07-19T14:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um terremoto ocorreu às 21h24 locais (23h24 no horário de Brasília), com epicentro a 300 quilômetros a leste de Lima e uma profundidade de 24 quilômetros. O evento geológico deixou cinco mortos e 21 feridos.", "titulo_pt": "Terremoto deixa cinco mortos e 21 feridos no Peru", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 60759, "titulo": "Gaza's children, traumatized and mutilated by war: 'His prosthesis hurts, but he endures it to show that he isn't different'", "url": "https://www.lemonde.fr/en/international/article/2026/07/19/gaza-s-children-traumatized-and-mutilated-by-war-his-prosthesis-hurts-but-he-endures-it-to-show-that-he-isn-t-different_6755626_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-19T13:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Devido aos bombardeios israelenses desde 7 de outubro de 2023, a Faixa de Gaza detém o recorde mundial de crianças amputadas por habitante, segundo a Organização Mundial da Saúde. Apesar do deslocamento forçado e da falta de cuidados médicos em território devastado, essas crianças buscam reconstruir suas vidas.", "titulo_pt": "Crianças de gaza traumatizadas e amputadas pela guerra: 'sua prótese dói, mas ele suporta para mostrar que não é diferente'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 60541, "titulo": "El Niño pode reduzir safra de arroz em 2026/27", "url": "https://www.cnnbrasil.com.br/agro/el-nino-pode-reduzir-safra-de-arroz-em-2026-27/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-19T13:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um analista da Safras & Mercado salienta que o fenômeno El Niño pode reduzir a safra de arroz no ciclo 2026/27. O clima seco associado ao El Niño é crucial para determinar a área cultivada e o calendário agrícola.", "titulo_pt": "El Niño pode reduzir safra de arroz em 2026/27", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 60779, "titulo": "Passenger ferry carrying 116 people sinks off the coast of Guyana", "url": "http://www.euronews.com/2026/07/19/passenger-ferry-carrying-116-people-sinks-off-the-coast-of-guyana", "fonte_id": "euronews", "data_pub": "2026-07-19T11:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um chamado de emergência para a guarda costeira foi feito por volta das
