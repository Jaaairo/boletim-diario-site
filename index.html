<html lang="pt-BR">
<head>
<meta charset="utf-8">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>

  <h1>pan<span class="logo-o">o</span>rama</h1>

</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">

<div class="modal-overlay" id="modal-relatorio">

      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>

      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>

  </div>
</div>

<script>
const D = {"gerado_em": "09/07/2026 23:43", "stats": {"noticias_novas": 1186, "resumos_gerados": 223}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O Supremo Tribunal Federal encerrou o julgamento sobre a revisão da aposentadoria, publicando o trânsito em julgado. Isso significa que não cabem mais recursos sobre esse direito para os aposentados do INSS. Em outro desenvolvimento, Aécio Neves anunciou que não disputará a presidência e rejeitou a possibilidade de um nome do PSDB ser candidato. O partido ficará sem candidato ao Planalto em 2026. Flávio Bolsonaro continua apresentando queda nas pesquisas, com alternativas a seu nome sendo consideradas. Além disso, o governo anunciou que vai restringir publicidade de apostas esportivas e obrigar as empresas autorizadas a exibir alertas sobre perda financeira e possíveis dependências. A Polícia Federal realizou operações contra publicitários ligados a Vorcaro e Daniel, suspeitos de intimidar jornalistas e realizar atividades contra o Banco Central.", "mundo": "O Irã enterrou o ex-líder supremo aiatolá Ali Khamenei após meses de cerimônias fúnebres públicas na cidade de Mashhad, no nordeste do país. As celebrações duraram seis dias e marcam um momento crucial na política iraniana. Em outro desenvolvimento, o presidente turco presenteou o primeiro-ministro belga com uma arma de fogo e munição durante a cúpula da OTAN em seu país, gerando surpresa e preocupação entre os líderes presentes. As tensões geopolíticas também aumentaram com relatos de que Israel compartilhou informações sobre um suposto plano do Irã para assassinar o ex-presidente americano Donald Trump, conforme relatado pelo jornal Wall Street Journal.\n\nA geopolítica global continua agitada por uma série de incidentes que refletem tensões entre as principais potências mundiais. No Oriente Médio, o cenário mais tenso se desenrola com a morte de um menino palestiniano na Faixa de Gaza, cometida por Israel, reforçando a instabilidade regional. O Irã também acelerou sua retirada do mercado petrolífero e realizou ataques contra alvos militares dos Estados Unidos no Golfo Pérsico. Em resposta, os EUA intensificaram seus próprios ataques à infraestrutura iraniana, levantando preocupações sobre uma escalada em conflito aberto. Essas ações refletem um clima de tensão crescente entre as duas potências, com relatos persistentes de ataques mútuos e ameaças.", "economia": "A SK Hynix, uma fabricante sul-coreana de chips de memória, arrecadou US$ 26,5 bilhões com a maior oferta pública inicial (IPO) realizada por uma empresa estrangeira no mercado americano. Diante das tensões comerciais e tarifas, a Coreia do Sul implementou medidas como a imposição de tarifas antidumping sobre a resina de PVC pastosa importada de quatro países europeus e planeja expandir suas relações com a Mongólia em áreas emergentes. O Banco Central dos Estados Unidos convocou Arminio Fraga para coordenar uma das cinco forças-tarefa que analisarão as operações do Fed, enquanto o petróleo recuou mais de 2% no mercado internacional e a bolsa sul-coreana subiu 1,22%. A Coreia do Sul também enfrenta críticas sobre tarifas impostas pelo governo dos Estados Unidos relacionadas ao trabalho forçado. Além disso, as fintechs foram notificadas para interromper relações financeiras com empresas de casas de apostas ilegais, e a lavagem de dinheiro é abordada em operações do Banco Central que visam países com 'deficiências estratégicas'.", "tecnologia": "A SK hynix registrou um recorde de US$ 26,5 bilhões em sua oferta pública inicial (IPO) de American Depositary Receipts (ADRs) no Nasdaq, com cada ADR sendo negociado a US$ 149. Este evento ocorre num momento em que as exportações dos EUA estão restritas à China, especialmente quando se trata de chips e tecnologias mais avançadas. Em Shanghai, o 2026 World Artificial Intelligence Conference (WAIC) destaca um sistema de inteligência artificial chinês autônomo, desde os semicondutores até os dispositivos agente. Além disso, uma equipe liderada pela Universidade de Stanford desenvolveu Biomni, um agente AI geral para biomedicina capaz de trabalhar em paralelo com cientistas humanos. Por fim, a OpenAI lançou ChatGPT Work, uma ferramenta que permite ao chatbot realizar tarefas em diferentes aplicativos e arquivos, ampliando a concorrência no mercado de ferramentas profissionais de IA.", "ciencia": "O fenômeno El Niño está previsto para atingir seu pico este ano e pode se tornar um dos maiores na história registrada, de acordo com previsões da agência dos Estados Unidos. Este padrão climático extremo pode intensificar a precipitação e as temperaturas em várias regiões do mundo, afetando significativamente os climas das estações de verão futuras. Em outro desenvolvimento científico, a NASA planeja enviar sua astronauta Anil Menon para a Estação Espacial Internacional no dia 14 de julho, juntamente com cosmonautas Pyotr Dubrov e Anna Kikina. Este voo marca uma importante missão espacial. Além disso, a empresa The Exploration Company criou uma filial nos Estados Unidos para concorrer a contratos governamentais, enquanto a NASA utilizou sua IXPE (Imaging X-ray Polarimetry Explorer) para medir os campos magnéticos de um pulsar, fornecendo novas informações sobre objetos extremos no universo.", "cultura": "Bonnie Tyler, famosa por seu hit 'Total Eclipse of the Heart', faleceu aos 75 anos. A cantora britânica deixou um legado de sucessos atemporais na música pop e rock dos anos 1980 e 1990. Em memória dela, a cantora galesa Guto Ap Gwilym gravou uma música com Fábio Júnior, marcando um momento histórico em suas carreiras. No mundo literário, César Aira incluiu detalhes inesperados na escrita de sua história, como o registro de um pássaro que entrou no café onde estava escrevendo. Além disso, a exposição 'Liberdade: Bairro Plural' no Museu do Ipiranga celebra a diversidade cultural e histórica do bairro da Liberdade em São Paulo, destacando sua complexa trajetória ao longo dos anos. A história do bairro está intrinsecamente ligada à imigração japonesa e suas contribuições para a cidade.", "sociedade": "O presidente Lula recebeu representantes do MST no Palácio da Alvorada para discutir ações de apoio à Venezuela após os terremotos que causaram mais de 3.800 mortos e 16 mil feridos. Em outro destaque, a força-tarefa brasileira realizou mais de 1.200 atendimentos médicos na Venezuela, sendo o primeiro país a instalar um hospital de campanha no local após os terremotos. No entanto, denúncias sobre uma suposta rede de pornografia infantil em um colégio Marista em Rancagua, Chile, levaram à investigação do caso. Em Goiás, uma criança foi picada por uma cobra jararaca e levada ao hospital por helicóptero, enquanto no Paraná, um policial militar é investigado após agredir um caminhoneiro durante uma abordagem policial. Além disso, o Superior Tribunal de Justiça estendeu os direitos de pacientes que podem plantar e vaporizar cannabis medicinal para transportar a planta quando necessário.", "meio_ambiente": "Em junho, a Europa Ocidental registrou as temperaturas mais altas da história, levando a milhares de mortes principalmente na França, Espanha e Bélgica. O calor extremo também atingiu Barcelona, que registrou sua temperatura mais alta nos últimos 112 anos. Na América do Sul, um duplo terremoto com magnitudes 7,2 e 7,5 na Venezuela resultou em 3.889 mortes e deixou 17.907 pessoas desabrigadas. No Chile, a Região Metropolitana de Santiago entrou em novo alerta ambiental devido à piora das condições de ventilação na cuenca de Santiago. Na Ásia, o Super Tufão Bavi se aproxima da China e Taiwan, servindo como um lembrete do aumento dos desastres climáticos. Além disso, a Microsoft registrou um aumento de 25% nas emissões de carbono no ano passado, totalizando 34 milhões de toneladas métricas. No contexto global, o número de iniciativas em relação ao clima lançadas ou gerenciadas pela China tem aumentado desde 2016, conforme relatado por Dr. Sun Yixian.", "direitos_humanos": "Um bebê de três meses, chamado Ahmad Zaid, morreu após as forças israelenses bloquearem o acesso de uma ambulância. Seu pai implorou para ser morto apenas para que seu filho pudesse passar. Este caso causou indignação e levantou questionamentos sobre as políticas de saúde em situações de emergência. Em outro evento notável, Lyhanna, uma menina de 11 anos, foi estuprada e assassinada na França, o que levou a questionamentos sobre o sistema judicial francês. Na China, vídeos de crianças influenciadoras estão causando controvérsia por apresentar cenas chocantes, como uma menina de três anos com um peso excessivo devido a refeições pesadas e outra que come vermiformes vivos. Em São Paulo, a justiça manteve uma multa de R$ 24,8 milhões à Prefeitura por interromper serviços no Hospital Vila Nova Cachoeirinha, enquanto o Instituto Nacional de Direitos Humanos (INDH) propôs seis medidas para melhorar o registro de vândalos e sugeriu que a legislação deve ser baseada em dados empíricos."}, "resumo_do_dia": {"politica_nacional": [{"id": 42800, "titulo": "Revisão da vida toda chega ao fim no STF", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/revisao-da-vida-toda-chega-ao-fim-no-stf.shtml", "fonte_id": "folha_me EN20260710002900315", "fonte_id": "yonhap_news", "data_pub": "2026-07-10T01:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em Seul, no dia 10 de julho, o gabinete do primeiro-ministro realizou uma palestra matinal sobre inteligência artificial.", "titulo_pt": "gabinete do primeiro-ministro realiza palestra matinal sobre ia", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 42799, "titulo": "Entidades do Brasil e EUA propõem acordo para evitar novo tarifaço de Trump", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/entidades-do-brasil-e-eua-propoem-acordo-para-evitar-novo-tarifaco-de-trump.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-10T01:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Amcham Brasil, a CNI e a U.S. Chamber of Commerce enviaram uma carta aos governos brasileiro e americano pedindo um acordo temporário para evitar novas tarifas sobre produtos brasileiros, antes da conclusão de uma investigação comercial dos EUA contra o Brasil.", "titulo_pt": "entidades do brasil e eua propõem acordo para evitar novo tarifaço", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 43017, "titulo": "Análise: EUA e Irã trocam ataques a alvos estratégicos", "url": "https://www.cnnbrasil.com.br/internacional/analise-eua-e-ira-trocam-ataques-a-alvos-estrategicos/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-10T01:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O conflito entre Estados Unidos e Irã se intensificou com ataques a alvos estratégicos; o Estreito de Ormuz permanece parcialmente fechado enquanto mediadores buscam retomar as negociações.", "titulo_pt": "eua e irã trocam ataques a alvos estratégicos", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 43582, "titulo": "Israeli forces shoot dead Palestinian child in central Gaza", "url": "https://www ar-ahora-es-muy-peligroso-para-los-rivales.html", "fonte_id": "elpais_america", "data_pub": "2026-07-10T01:07:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Luis de la Fuente, selecionador espanhol, declarou que o melhor estado de forma de Lamine Sakho está por chegar e que ele é atualmente muito perigoso para os adversários. O treinador acredita que o jogador do Barcelona precisa recuperar seu brilhantismo após ter se recuperado de uma lesão.", "titulo_pt": "luis de la fuente: o melhor lamine está por chegar; agora ele é muito perigoso para os rivais", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 43136, "titulo": "Mueren al menos 12 personas en el incendio de Los Gallardos, en Almería", "url": "https://elpais.com/espana/2026-07-09/mas-de-200-bomberos-luchan-contra-dos-incendios-en-almeria-y-malaga.html", "fonte_id": "elpais_america", "data_pub": "2026-07-10T01:06:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Pelo menos 12 pessoas morreram no incêndio em Los Gallardos, Almería. Vítimas foram encontradas dentro de veículos queimados. Este é o incêndio mais grave até agora ocorrido na Andaluzia.", "titulo_pt": "Muem ao menos 12 pessoas no incêndio de los gallardos, em almería", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 43476, "titulo": "UK police: Mosque model on loyalist bonfire is hate crime", "url": "https://www.dw.com/en/uk-police-mosque-model-on-loyalist-bonfire-is-hate-crime/a-77898043?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-10T01:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A polícia do Noroeste da Irlanda declarou que o colocar de uma réplica de mesquita sobre um fogueira lealista é um crime de ódio. Líderes políticos e religiosos condenaram a ação, embora os organizadores do fogo tenham insistido que se trata de um protesto político.", "titulo_pt": "polícia: colocação de mesquita em fogueira lealista é crime de ódio", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 43345, "titulo": "In private call, Education Dept. tried, but failed, to reassure disability advocates", "url": "https://www.npr.org/2026/07/09/nx-s1-5887650/education-department-special-ed-hhs", "fonte_id": "npr_news", "data_pub": "2026-07-10T01:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A comunidade de pessoas com deficiência tem preocupações sobre o que aconteceria se a supervisão da educação especial fosse transferida do Departamento de Educação para outra agência. Agora, essas possíveis mudanças estão ganhando mais realidade.", "titulo_pt": "em privado, departamento de educação tentou, mas falhou, em aliviar preocupações dos defensores das pessoas com deficiência", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 42825, "titulo": "Inteligência israelense alertou EUA sobre suposto plano do Irã para matar Trump, diz jornal", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/07/inteligencia-israelense-alertou-eua-sobre-suposto-plano-do-ira-para-matar-trump-diz-jornal.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-07-10T01:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A inteligência de Israel compartilhou informações com o governo dos Estados Unidos sobre um suposto plano do Irã para assassinar o presidente Donald Trump, segundo relato do jornal americano Wall Street Journal.", "titulo_pt": "inteligência israelense alertou eua sobre suposto plano iraniano para matar trump", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 43738, "titulo": "BOK, Bank of Mongolia sign renewed MOU to boost partnership", "url": "https://en.yna.co.kr/view/AEN20260710002300320", "fonte_id": "yonhap_news", "data_pub": "2026-07-10T01:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Banco da Coreia (BOK) anunciou que assinou um de": null, "texto_pt": "Líderes da OTAN se acostumaram a obter um presidente americano mais amigável de Donald Trump, através de elogios quando necessário. Os líderes enfrentaram uma série de desafios com Trump no último summit da OTAN, mas agora estão familiarizados com seu estilo.", "titulo_pt": "De ameaças a elogios, Trump mantém aliados em suspense na cimeira da OTAN", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 43658, "titulo": "Uniqlo defies sluggish China market with double-digit profit growth", "url": "https://www.scmp.com/business/companies/article/3360017/uniqlo-defies-sluggish-china-market-double-digit-profit-growth?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-10T01:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Uniqlo registrou aumento nas receitas e lucros de dígito duplo no mercado chinês nos três primeiros meses encerrados em maio, contrariando o consumo doméstico lento e tensões bilaterais persistentes. As vendas em lojas existentes subiram, impulsionadas por marketing aprimorado e alta demanda para produtos de verão, especialmente calças leves, itens com proteção contra raios UV e camisetas.", "titulo_pt": "uniqlo defiende mercado chinês lento com crescimento de lucros em dígito duplo", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 43737, "titulo": "Gov't to impose anti-dumping tariffs on PVC paste resin from 4 European nations", "url": "https://en.yna.co.kr/view/AEN20260710001300320", "fonte_id": "yonhap_news", "data_pub": "2026-07-10T01:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Ministério da Fazenda da Coreia do Sul anunciou que vai impor tarifas antidumping sobre a resina de PVC pastosa importada de quatro países europeus. A medida entrará em vigor a partir desta sexta-feira.", "titulo_pt": "governo vai impor tarifas antidumping sobre resina de pvc pastosa", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 43739, "titulo": "Seoul eyes advancing ties with Mongolia in emerging areas: finance minister", "url": "https://en.yna.co.kr/view/AEN20260710002400320", "fonte_id": "yonhap_news", "data_pub": "2026-07-10T01:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Ministério da Finanças da Coreia do Sul planeja expandir as relações com Mongólia em áreas emergentes. O objetivo é promover laços mutuamente benéficos entre os dois países.", "titulo_pt": "seul busca ampliar laços com mongólia em áreas emergentes: ministro das finanças", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 43774, "titulo": "Malaysia solar firms rush to secure stock before China tax breaks end", "url": "https://www.digitimes.com/news/a20260710PD214/solar-2026-renewable-energy-market-data-center.html", "fonte_id": "digitimes", "data_pub": "2026-07-10T00:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O mercado de energia renovável na Malásia deve continuar a expandir-se em 2026, impulsionado pela construção de centros de dados e pela adoção crescente de tecnologias solares. Empresas locais de solar e armazenamento estão ajustando seus planos de compra em resposta aos aumentos de custo e ao fim iminente de importantes reembolsos fiscais na China.", "titulo_pt": "Malásia: empresas de energia solar pressionadas antes do fim dos incentivos chineses", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 43523, "titulo": "SK Hynix raises $26.5bn in US market debut", "url": "https://www.ft.com/content/33133a86-925e-4395-9f60-35e2a4052500", "fonte_id": "financial_times", "data_pub": "2026-07-10T00:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A SK Hynix, uma fabricante sul-coreana de chips de memória, concluiu a maior oferta pública inicial (IPO) realizada por uma empresa estrangeira no mercado americano, arrecadando US$ 26,5 bilhões.", "titulo_pt": "sk hynix eleva u$s 26,5 bi em estreia no mercado norte-americano", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 43745, "titulo": "Seoul shares open 3.57 pct higher on tech gains", "url": "https://en.yna.co.kr/view/AEN20260710001700320", "fonte_id": "yonhap_news", "data_pub": "2026-07-10T00:04:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações sul-coreanas abriram com forte alta de 3,57% nesta sexta-feira, lideradas por ganhos no setor tecnológico.", "titulo_pt": "seul shares opens 3,57% higher on tech gains", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 43662, "titulo": "How the RMB Business Facility will help consolidate Hong Kong’s financial role", "url": "https://www.scmp.com/business/banking-finance/article/3359981/how-rmb-business-facility-will-help-consolidate-hong-kongs-financial-role?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-10T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Hong Kong lançou uma nova ferramenta de financiamento em yuan com um limite 150% maior do que o anterior, visando aumentar a utilização da moeda chinesa no comércio global diário. O RMB Business Facility é uma janela de financiamento gerida pelo Banco Monetário de Hong Kong (HKMA) que permite aos bancos participantes emprestar yuan a uma taxa relativamente baixa do mercado interbancário de três meses de Shanghai, cerca de 2 pontos percentuais menor.", "titulo_pt": "como o pacote de negócios em yuan vai fortalecer o papel financeiro de Hong Kong", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 43746, "titulo": "SK hynix to raise 40 tln won through Nasdaq ADR listing", "url": "https://en.yna.co.kr/view/AEN20260710001400320", "fonte_id": "yonhap_news", "data_pub": "2026-07-09T23:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa sul-coreana de fabricação de chips SK hynix planeja arrecadar 40 trilhões de wons através da listagem de suas ADRs na Nasdaq.", "titulo_pt": "sk hynix pretende levantar 40 tln won com listagem nas adrs na nasdaq", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 42880, "titulo": "Imposto de 12% sobre exportação de petróleo é estendido por 60 dias", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-07/imposto-de-12-sobre-exportacao-de-petroleo-e-estendido-por-60-dias", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-09T23:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Imposto de Exportação sobre petróleo bruto e minerais betuminosos continuará a ser cobrado a uma alíquota de 12% por mais 60 dias, conforme decisão do Gecex-Camex. A medida será reavaliada após 30 dias.", "titulo_pt": "imposto de 12% sobre exportação de petróleo é estendido por 60 dias", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 42848, "titulo": "Entidades do setor produtivo do Brasil e dos EUA propõem nova rodada de negociação para evitar tarifaço", "url": "https://g1.globo.com/economia/noticia/2026/07/09/entidades-do-setor-produtivo-do-brasil-e-dos-eua-propoem-nova-rodada-de-negociacao-para-evitar-tarifaco.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-09T22:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Confederação Nacional da Indústria (CNI), a Câmara Americana de Comércio para o Brasil (Amcham Brasil) e a U.S. Chamber of Commerce propuseram uma nova rodada de negociação para evitar tarifas adicionais sobre produtos brasileiros nos Estados Unidos, prazo termina em 15 de julho.", "titulo_pt": "Entidades do setor produtivo do brasil e dos eua propõem nova rodada de negociação", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 42881, "titulo": "Dólar cai ao menor nível em três semanas; bolsa sobe 1,22%", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-07/dolar-cai-ao-menor-nivel-em-tres-semanas-bolsa-sobe-122", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-09T22:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O dólar caiu e atingiu o menor nível em três semanas, enquanto a bolsa de valores subiu 1,22%. O petróleo recuou mais de 2% no mercado internacional.", "titulo_pt": "dólar cai ao menor nível em três semanas; bolsa sobe 1,22%", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 43063, "titulo": "Lavagem de dinheiro: BC orienta sobre operações com países que tenham ‘deficiências estratégicas’", "url": "https://www.jota.info/executivo/lavagem-de-dinheiro-bc-orienta-sobre-operacoes-com-paises-que-tenham-deficiencias-estrategicas", "fonte_id": "jota", "data_pub": "2026-07-09T22:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Instrução Normativa do Banco Central se refere à implementação de recomendações do Gafi, órgão internacional que cita Angola, Bolívia e Haiti como países com 'deficiências estratégicas'.", "titulo_pt": "lavagem de dinheiro: bc orienta sobre operações com países que tenham ‘deficiências estratégicas’", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 43511, "titulo": "Micron shares rise almost 5% after company announces billions more in U.S. chipmaking investments", "url": "https://www.cnbc.com/2026/07/09/micron-stock-us-chipmaking.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-09T21:57:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Micron anunciou novos investimentos para fortalecer a cadeia de suprimento de semicondutores nos Estados Unidos. As ações da empresa subiram cerca de 5% como resultado desta notícia.", "titulo_pt": "ações da micron sobem quase 5% após anúncio de bilhões em investimentos de fabricação de chips nos eua", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 42803, "titulo": "Quem é Arminio Fraga, ex-presidente do BC escolhido para força-tarefa do Fed", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/quem-e-arminio-fraga-ex-presidente-do-bc-escolhido-para-forca-tarefa-do-fed.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-09T21:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Arminio Fraga Neto, economista de 68 anos, foi escolhido para supervisionar uma das cinco forças-tarefa do Fed que analisarão as operações do BC americano. Ele já ocupou o cargo de presidente do Banco Central do Brasil no segundo governo FHC, entre 1999 e 2002.", "titulo_pt": "quem é arminio fraga, ex-presidente do bc escolhido para força-tarefa do fed", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 43065, "titulo": "Caso Master: PF diz que Thiago Miranda acessou informações sigilosas de CEO do Itaú e de Malu Gaspar", "url": "https://www.jota.info/stf/do-supremo/caso-master-pf-diz-que-thiago-miranda-acessou-informacoes-sigilosas-de-ceo-do-itau-e-de-malu-gaspar", "fonte_id": "jota", "data_pub": "2026-07-09T21:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal autorizou a 10ª fase da operação Compliance Zero, que visou um publicitário dono da agência MiThi. Thiago Miranda foi apontado como ter acessado informações sigilosas de CEO do Itaú e de Malu Gaspar.", "titulo_pt": "Caso Master: Pf Diz Que Thiago Miranda Acessou Informações Sigilosas De Cfo Do Itaú E De Malu Gaspar", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 42805, "titulo": "Warsh convoca Arminio Fraga, ex-presidente do BC, para coordenar revisão de comunicações do Fed", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/warsh-convoca-arminio-fraga-ex-presidente-do-bc-para-coordenar-revisao-de-comunicacoes-do-fed.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-09T21:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente do Federal Reserve, Kevin Warsh, convocou o ex-presidente do Banco Central brasileiro Arminio Fraga para coordenar uma das cinco forças-tarefa que estão analisando as operações do BC americano.", "titulo_pt": "warsh convoca arminio fraga para coordenar revisão de comunicações do fed", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 43756, "titulo": "SK hynix seals record $26.5b Nasdaq ADR listing", "url": "https://www.koreaherald.com/article/10804650", "fonte_id": "korea_herald", "data_pub": "2026-07-10T01:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "SK hynix listou suas American Depositary Receipts (ADRs) no Nasdaq por US$ 149 cada, levantando aproximadamente US$ 26,5 bilhões. A oferta foi feita a um preço que representa cerca de 2,9% a mais do que o valor da empresa no mercado sul-coreano na véspera.", "titulo_pt": "sk hynix consolida listagem nasadr por US$ 26,5 bi", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 43722, "titulo": "Thousands of ‘Pokémon Go’ Players Descend on Times Square to Defeat Mewtwo", "url": "https://www.wired.com/story/thousands-of-pokemon-go-players-descend-on-times-square-to-defeat-mewtwo/", "fonte_id": "wired", "data_pub": "2026-07-10T01:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um evento surpresa para marcar o 10º aniversário do jogo 'Pokémon Go' viu a empresa Niantic cumprir uma promessa anunciada no trailer de lançamento original em 2016. Milhares de jogadores se reuniram na Times Square para derrotar Mewtwo, um dos Pokémon mais raros e poderosos.", "titulo_pt": "milhares de 'pokemon go' players descem sobre times square para derrotar mewtwo", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 43785, "titulo": "China's silicon-to-agent AI stack headlines WAIC 2026 in Shanghai", "url": "https://www.digitimes.com/news/a20260709VL217/2026-shanghai-huawei-chips-atlas.html", "fonte_id": "digitimes", "data_pub": "2026-07-10T00:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O 2026 World Artificial Intelligence Conference (WAIC) será realizado em Shanghai a partir de 17 de julho, com uma exibição que destaca um sistema de inteligência artificial chinês autônomo, desde os semicondutores até os dispositivos agentes. Este evento ocorre no momento em que as exportações dos Estados Unidos estão rígidas quanto ao acesso da China a chips e modelos mais avançados.", "titulo_pt": "china's silicon-to-agent ai stack headlines waic 2026 in shanghai", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 43022, "titulo": "Big techs temem que projeto sobre mercados digitais intervenha em algoritmo", "url": "https://www.cnnbrasil.com.br/politica/big-techs-temem-que-projeto-sobre-mercados-digitais-intervenha-em-algoritmo/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-10T00:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O deputado Aliel Machado apresentou um parecer que amplia os poderes do Conselho Administrativo de Defesa Econômica (CADE) para fiscalizar mais intensivamente as grandes tecnológicas e impedir a formação de monopólios no setor digital.", "titulo_pt": "big techs temem que projeto sobre mercados digitais intervenha em algoritmo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 43216, "titulo": "Negocio de baterías BESS para IA e infraestructura sostiene el mercado del litio y anticipa sólida demanda para 2026", "url": "https://www.latercera.com/pulso/noticia/negocio-de-baterias-bess-para-ia-e-infraestructura-sostiene-el-mercado-del-litio-y-anticipa-solida-demanda-para-2026/", "fonte_id": "la_tercera", "data_pub": "2026-07-10T00:40:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "As projeções globais de crescimento das baterias para armazenamento energético estão acima dos 160% até 2030, compensando a ralentização do mercado norte-americano de veículos elétricos. O mercado espera preços mais altos devido à demanda estrutural do setor de baterias.", "titulo_pt": "negócio de baterias beess para ia e infraestrutura sustenta o mercado do litio e antecipa sólida demanda para 2026", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 43033, "titulo": "GPT-Live e ChatGPT Work: IA da OpenAI conversa, cria e executa tarefas", "url": "https://www.cnnbrasil.com.br/tecnologia/gpt-live-e-chatgpt-work-ia-da-openai-conversa-cria-e-executa-tarefas/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-10T00:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "GPT-Live processa fala e responde em tempo real, enquanto ChatGPT Work executa tarefas complexas com baixa intervenção do usuário.", "titulo_pt": "gpt-live e chatgpt work: ia da openai conversa, cria e executa tarefas", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 43627, "titulo": "AI boom still lifting Taiwan exports", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/10/2003860490", "fonte_id": "taipei_times", "data_pub": "2026-07-10T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A expansão do uso da inteligência artificial ainda está impulsionando as exportações de Taiwan. O país tem se beneficiado significativamente desse crescimento tecnológico.", "titulo_pt": "boom da ia ainda levantando exportações da taiwan", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 43630, "titulo": "Government to help 20,000 firms adopt AI technology", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/10/2003860493", "fonte_id": "taipei_times", "data_pub": "2026-07-10T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo planeja auxiliar 20 mil empresas a adotarem tecnologia de inteligência artificial. A iniciativa visa promover o uso de AI entre as empresas participantes.", "titulo_pt": "governo ajudará 20,000 empresas a adotarem tecnologia de inteligência artificial", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 43508, "titulo": "OpenAI exec Fidji Simo says she's stepping down due to chronic illness, will transition to advisor", "url": "https://www.cnbc.com/2026/07/09/openai-exec-fidji-simo-says-she-will-step-down-and-transition-to-part-time-advisor.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-09T23:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Fidji Simo, uma executiva da OpenAI, está deixando a empresa devido a uma doença crônica e agora se dedicará à recuperação como consultora.", "titulo_pt": "fidji simo deixa openai para se focar na recuperação", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 43723, "titulo": "OpenAI’s CEO of AGI Deployment, Fidji Simo, Is Stepping Down", "url": "https://www.wired.com/story/fidji-simo-ceo-agi-deployment-openai/", "fonte_id": "wired", "data_pub": "2026-07-09T23:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Fidji Simo, CEO de AGI Deployment da OpenAI, está deixando a posição após ter tomado licença médica significativa. Ela continuará como consultora parte-tempo.", "titulo_pt": "ceo de agi deployment da openai, fidji simo, está deixando a posição", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 42801, "titulo": "OpenAI lança ChatGPT Work e amplia concorrência no mercado de ferramentas profissionais de IA", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/tec/2026/07/openai-lanca-chatgpt-work-e-amplia-concorrencia-no-mercado-de-ferramentas-profissionais-de-ia.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-09T23:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A OpenAI lançou o ChatGPT Work, uma ferramenta que permite ao chatbot realizar tarefas em diferentes aplicativos e arquivos. Esta é a mais recente inovação da startup no campo da automação do amb bição do documentário 'The Oldest Person in the World' antes de sua estreia nos cinemas.", "titulo_pt": "Venha Ver o Documentário The Oldest Person in the World em Sessão Exclusiva!", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 43644, "titulo": "Anthropic found a hidden space where Claude puzzles over concepts", "url": "https://www.technologyreview.com/2026/07/09/1140293/anthropic-found-a-hidden-space-where-claude-puzzles-over-concepts/", "fonte_id": "mit_tech_review", "data_pub": "2026-07-09T20:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa de IA Anthropic criou uma técnica que lhe permitiu observar melhor o funcionamento interno dos modelos de linguagem grandes enquanto eles respondem a perguntas ou realizam tarefas. Os resultados variaram desde coisas comuns até situações perturbadoras.", "titulo_pt": "anthropic descobriu um espaço oculto onde claude se questiona sobre conceitos", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 43634, "titulo": "Strengthening El Nino likely to ‘rank among largest’ on record, U.S. agency says", "url": "https://www.japantimes.co.jp/environment/2026/07/10/climate-change/el-nino-strength-forecast/", "fonte_id": "japan_times", "data_pub": "2026-07-10T01:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O padrão climático El Niño intensificou-se nos últimos meses e atingirá seu pico entre outubro e dezembro. A agência dos EUA prevê que a intensificação do El Niño possa ser considerada uma das maiores na história registrada.", "titulo_pt": "fortalecimento el niño provavelmente 'entre os maiores' no registro, agência dos EUA diz", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 43455, "titulo": "'In trying to avoid accusations of exaggerating, the IPCC has instead underestimated the severity of our summers'", "url": "https://www.lemonde.fr/en/opinion/article/2026/07/10/in-trying-to-avoid-accusations-of-exaggerating-the-ipcc-has-instead-underestimated-the-severity-of-our-summers_6755317_23.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-10T00:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Intergovernmental Panel on Climate Change (IPCC) tem sido acusado de ser cauteloso demais, subestimando a velocidade do aquecimento global e suas consequências. O historiador Jean-Baptiste Fressoz argumenta que o IPCC tem tentado evitar acusações de exagerar, mas acabou subestimando a severidade dos verões futuros.", "titulo_pt": "tentando evitar acusações de exagerar, o ipcc subestimou a severidade dos nossos verões", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 43846, "titulo": "Interior Department requests information on offshore launch options", "url": "https://spacenews.com/interior-department-requests-information-on-offshore-launch-options/", "fonte_id": "spacenews", "data_pub": "2026-07-09T23:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Departamento do Interior dos EUA está buscando informações sobre conceitos para lançamentos orbitais offshore, como parte de um esforço maior para reduzir a congestão nos existing spaceports. Este pedido visa explorar novas opções de lançamento fora das instalações existentes.", "titulo_pt": "departamento do interior solicita informações sobre lançamentos orbitais offshore", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 43847, "titulo": "SDA TAP Lab Evolves Into BMC3I TAP Lab And In Partnership With Catalyst Campus Launches A New Multi-Phased Program To Accelerate Mission-Focused Technology Development", "url": "https://spacenews.com/sda-tap-lab-evolves-into-bmc3i-tap-lab-and-in-partnership-with-catalyst-campus-launches-a-new-multi-phased-program-to-accelerate-mission-focused-technology-development/", "fonte_id": "spacenews", "data_pub": "2026-07-09T22:35:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Catalyst Campus for Technology and Innovation (CCTI) e o BMC3I TAP Lab Colorado lançaram um novo programa multi-fase com o objetivo de acelerar o desenvolvimento de tecnologias focadas em missões, promovendo a colaboração entre inovadores comerciais e órgãos governamentais.", "titulo_pt": "sdacatalyst campus para tecnologia e inovação e bmc3i tap lab colorado lançam novo programa multi-fase para acelerar o desenvolvimento de tecnologias focadas em missões", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 43863, "titulo": "NASA Sets Coverage for Astronaut Anil Menon Launch to Space Station", "url": "https://www.nasa.gov/news-release/nasa-sets-coverage-for-astronaut-anil-menon-launch-to-space-station/", "fonte_id": "nasa_news", "data_pub": "2026-07-09T22:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A astronauta Anil Menon, da NASA, vai lançar-se na nave Soyuz MS-29, junto com os cosmonautas Pyotr Dubrov e Anna Kikina, para a Estação Espacial Internacional no dia 14 de julho às 10:47 horário doeste dos EUA (às 23:47 no horário local em Baikonur).", "titulo_pt": "nasa define cobertura para lançamento de astronauta anil menon à estação espacial", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 43460, "titulo": "El Niño on track to rank among strongest ever recorded, US forecasters say", "url": "https://www.lemonde.fr/en/environment/article/2026/07/09/el-nino-on-track-to-rank-among-strongest-ever-recorded-us-forecasters-say_6755312_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-09T20:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O fenômeno El Niño está previsto para atingir seu pico este ano e pode intensificar o clima extremo em várias continentes. Este padrão climático altera a precipitação, as temperaturas e os caminhos das tempestades ao redor do mundo.", "titulo_pt": "el niño no caminho para ser um dos mais fortes já registrados, informam os Estados Unidos", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 43848, "titulo": "The Exploration Company establishes US entity to pursue government contracts", "url": "https://spacenews.com/the-exploration-company-establishes-us-entity-to-pursue-government-contracts/", "fonte_id": "spacenews", "data_pub": "2026-07-09T20:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa de transporte espacial The Exploration Company, sediada na Alemanha, criou a TEC Federal nos Estados Unidos com o objetivo de concorrer a contratos governamentais. Esta iniciativa permitirá que a empresa explore oportunidades em programas e contratos governamentais.", "titulo_pt": "a exploration company estabelece entidade nos estados unidos para buscar contratos governamentais", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 43864, "titulo": "NASA Space Telescope Maps Magnetic Fields of ‘Lighthouse’ Pulsar", "url": "https://science.nasa.gov/missions/ixpe/nasa-space-telescope-maps-magnetic-fields-of-lighthouse-pulsar/", "fonte_id": "nasa_news", "data_pub": "2026-07-09T20:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pela primeira vez, cientistas usaram a IXPE (Imaging X-ray Polarimetry Explorer) da NASA para medir os campos magnéticos do pulsar PSR J1101−6101. Os resultados fornecem novas informações sobre a estrutura de alguns dos objetos mais extremos no universo, localizados na Nebulosa da Torre.", "titulo_pt": "NASA Space Telescope Mapa Campos Magnéticos 'Farol' Pulsar", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 43835, "titulo": "Whistleblower takes on health insurance and FDA commissioner candidates", "url": "https://www.statnews.com/2026/07/09/readout-loud-podcast-fda-commissioner-candidates-health-insurance-costs/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-09T20:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O podcast 'The Readout LOUD' desta semana aborda o custo elevado da saúde familiar através de emprego e a possibilidade de novos candidatos para comissários de saúde e FDA.", "titulo_pt": "Denunciante se dirige a candidatos para comissários de saúde e FDA", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 43849, "titulo": "Environmental groups urge FCC to pause orbital data center applications", "url": "https://spacenews.com/environmental-groups-seek-fcc-pause-on-orbital-data-center-constellations/", "fonte_id": "spacenews", "data_pub": "2026-07-09T19:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Organizações ambientalistas e científicas estão pedindo para que a FCC pare o processamento de solicitações de centrais de dados orbitais, argumentando que o rush para mover infraestrutura computacional para o espaço aumentou os riscos em uma campanha mais ampla pela supervisão de megaconstelações.", "titulo_pt": "Organizações ambientalistas urgem à FCC a pausa nas solicitações de centrais de dados orbitais", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 42795, "titulo": "Morre Wally Funk, que foi rejeitada pela Nasa e voou ao espaço aos 82 anos pela Blue Origin", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/morre-wally-funk-que-foi-rejeitada-pela-nasa-e-voou-ao-espaco-aos-82-anos-pela-blue-origin.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-09T19:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Wally Funk, que foi uma das pilotos mais talentosas de sua época e se tornou uma das pessoas mais velhas a voar ao espaço aos 82 anos pela Blue Origin, faleceu em sua casa em Grapevine, Texas, nos Estados Unidos, aos 87 anos.", "titulo_pt": "morre wally funk, que foi rejeitada pela nasa e voou ao espaço aos 82 anos", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 43865, "titulo": "Principal Investigator and Quality Assessment Reports Evaluate Umbra Synthetic Aperture Radar Data", "url": "https://science.nasa.gov/science-research/earth-science/principal-investigator-and-quality-assessment-reports-evaluate-umbra-synthetic-aperture-radar-data/", "fonte_id": "nasa_news", "data_pub": "2026-07-09T18:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os relatórios contribuem para a documentação crescente sobre as contribuições dos dados comerciais para a pesquisa e aplicações da ciência da Terra. Os relatórios avaliam os dados do Radar de Apertura Sintética (RAS) da Umbra.", "titulo_pt": "relatórios avaliam dados rás da umbra", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 43825, "titulo": "Physicist says splashy new cosmology study made ‘elemental’ mistake", "url": "https://www.scientificamerican.com/article/physicist-says-splashy-new-cosmology-study-made-elemental-mistake/", "fonte_id": "scientific_american", "data_pub": "2026-07-09T18:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo recente publicado na revista Nature tem implicações revolucionárias para nossa compreensão do universo, mas um novo pré-print afirma que o estudo é errôneo.", "titulo_pt": "Físico diz que novo estudo sobre cosmologia cometeu ‘erro elemental’", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 43843, "titulo": "Summit living isn’t a problem for this tiny mouse", "url": "https://www.sciencenews.org/article/summit-living-isnt-a-problem-for-this-tiny-mouse", "fonte_id": "science_news", "data_pub": "2026-07-09T18:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Aumentos na produção de calor e na absorção de oxigênio podem ajudar os ratos-earriscos andinos a sobreviverem nas altitudes elevadas.", "titulo_pt": "O habitat alto não é um problema para este pequeno rato", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 43826, "titulo": "These absurdly cute mice live at higher altitudes than any other mammal—here’s how they do it", "url": "https://www.scientificamerican.com/article/these-absurdly-cute-mice-live-at-higher-altitudes-than-any-other-mammal-heres-how-they-do-it/", "fonte_id": "scientific_american", "data_pub": "2026-07-09T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Estes ratos extremamente adoráveis vivem a altitudes superiores a qualquer outro mamífero. Eles adaptaram-se ao ambiente com menos de metade do oxigênio na superfície do mar.", "titulo_pt": "esses absurdamente fofos roedores habitam altitudes maiores que as de qualquer outro mamífero - aqui está como eles fazem isso", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 43866, "titulo": "Curiosity Sees Martian Sulfur Up Close", "url": "https://www.nasa.gov/image-article/curiosity-sees-martian-sulfur-up-close/", "fonte_id": "nasa_news", "data_pub": "2026-07-09T16:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A roboete Curiosity do NASA encontrou cristais de sulfeto de sódio no Marte, sendo a primeira vez que esse tipo de mineral foi observado diretamente na superfície vermelha. Os cristais foram descobertos após o veículo lunar acidentalmente esmagar uma pedra em 30 de maio de 2024.", "titulo_pt": "curiosity vê cristais de sulfeto de sódio no marte", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 43626, "titulo": "Creative endeavor", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/10/2003860530", "fonte_id": "taipei_times", "data_pub": "2026-07-10T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo destaca uma iniciativa criativa. Não há detalhes adicionais sobre o conteúdo específico do texto original.", "titulo_pt": "creative endeavor", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 43665, "titulo": "Iran mourners defiant as Khamenei buried: ‘only revenge can soothe the pain’", "url": "https://www.scmp.com/news n staged online videos", "url": "https://www.scmp.com/news/people-culture/china-personalities/article/3359967/china-child-influencers-slammed-distorting-values-staged-online-videos?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-09T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Vídeos de crianças que se apresentam como influenciadores online estão causando controvérsia na China. Cenas chocantes incluem uma menina de três anos com um peso excessivo devido a refeições pesadas, dois jovens que simulam relações íntimas e outro que come vermiformes vivos.", "titulo_pt": "crianças influenciadoras chinesas criticadas por 'distorcer valores' em vídeos enganosos", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 42524, "titulo": "Inside King’s College London’s crackdown on pro-Palestine students", "url": "https://www.aljazeera.com/news/2026/7/9/kcl-pro-palestine-tensions?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-09T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "King's College London, que possui laços com o setor de defesa, disciplinou pelo menos 26 estudantes em dois anos.", "titulo_pt": "dentro da king’s college london: repressão aos estudantes pró-palestinos", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 42525, "titulo": "‘Shoot me, Just let my son pass’: Final moments of Palestinian Ahmad Zaid", "url": "https://www.aljazeera.com/news/2026/7/9/shoot-me-just-let-my-son-pass-the-last-moments-of-ahmad-zaid?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-09T08:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um bebê de três meses, que estava em estado crítico, morreu após forças israelenses bloquearem o acesso de uma ambulância. O pai do menino pediu para ser morto apenas para que seu filho pudesse passar.", "titulo_pt": "'dispare em mim, apenas permita que meu filho passe': últimos momentos do palestiniano Ahmad Zaid", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 42235, "titulo": "Igualdade de gênero como fato constitucional e elemento de legitimidade democrática", "url": "https://www.jota.info/opiniao-e-analise/colunas/elas-no-jota/igualdade-de-genero-como-fato-constitucional-e-elemento-de-legitimidade-democratica", "fonte_id": "jota", "data_pub": "2026-07-09T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A observância do protocolo de julgamento com perspectiva de gênero é apresentada como um fato constitucional relevante. Este protocolo visa garantir a igualdade entre os gêneros no processo judicial, contribuindo para a legitimidade democrática.", "titulo_pt": "igualdade de gênero como fato constitucional e elemento de legitimidade democrática", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 42695, "titulo": "Refugees, activists rally against asylum bill over fair review concerns", "url": "https://www.koreaherald.com/article/10803856", "fonte_id": "korea_herald", "data_pub": "2026-07-09T06:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Refugiados e ativistas de direitos humanos se reuniram na National Assembly para pedir que os legisladores revoguem uma proposta de revisão da Lei do Refugiado, que permitiria ao ministro da Justiça rejeitar algumas solicitações de asilo antes de elas passarem pela revisão formal. O projeto foi apresentado em março pelo Republicano Kim Gi-pyo do Partido Democrático.", "titulo_pt": "Refugiados e ativistas se mobilizam contra projeto de lei sobre asilos", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 42335, "titulo": "Director del INDH plantea seis reparos al registro de vándalos y pide legislar con “datos empíricos”", "url": "https://www.latercera.com/nacional/noticia/director-del-indh-plantea-seis-reparos-al-registro-de-vandalos-y-pide-legislar-con-datos-empiricos/", "fonte_id": "la_tercera", "d
