<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=author@400&display=swap" rel="stylesheet">
<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 10/07/2026 21:00 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">
    <div class="modal-erro" id="senha-erro" style="display:none">Senha incorreta.</div>
    <div class="modal-btns">
      <button class="btn-sec2" onclick="fecharModal('modal-senha')">Cancelar</button>
      <button class="btn-pri" onclick="verificarSenha()">Entrar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>
      <option value="classificacao_errada">Classificação errada</option>
      <option value="resumo_impreciso">Resumo impreciso</option>
      <option value="outro">Outro</option>
    </select>
    <label for="flag-nota">Nota (opcional)</label>
    <textarea id="flag-nota" placeholder="Descreva o problema..."></textarea>
    <div class="modal-btns">
      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "10/07/2026 21:00", "stats": {"noticias_novas": 491, "resumos_gerados": 223}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O cenário político brasileiro está bastante agitado com diversos desafios e movimentações. A deputada Júlia Zanatta (PL-SC) acionou o Tribunal de Contas da União (TCU) para investigar possíveis fraudes no programa Bolsa Família após a mudança que dispensou a apresentação do comprovante de residência. Em outra frente, Valdemar Costa Neto, presidente do PL, é alvo de uma operação policial que aponta desvio de R$ 119 milhões em emendas parlamentares e associação criminosa. O ministro Flávio Dino, do STF, bloqueou bens de Valdemar e suspendeu suas emendas, enquanto a defesa nega qualquer irregularidade. Em meio a essas investigações, Flávio Bolsonaro, pré-candidato pelo PL, defende seu pai, senador Flávio Bolsonaro, que teve R$ 227,7 mil bloqueados em contas bancárias pela Justiça Eleitoral. Além disso, o governo autorizou a nomeação de 219 aprovados para vagas em diversos ministérios e instituições federais, com destaque para o INSS. A campanha presidencial também está em andamento, com Javier Milei anunciando visita ao Brasil para apoiar Flávio Bolsonaro.", "mundo": "Os terremotos na Venezuela continuam causando graves danos, com 4.118 mortes confirmadas e 16.740 feridos, conforme informado pelo governo local. O presidente Luiz Inácio Lula da Silva reafirmou o apoio do Brasil à reconstrução do país durante uma conversa telefônica com a presidenta Delcy Rodríguez. Em outros desenvolvimentos internacionais, os Estados Unidos assumiram a presidência da coalizão 'FORGE' de minerais críticos, enquanto a França enfrentava um alerta de calor extremo que afetava grande parte do país, exceto o sul e a Córsega. O presidente Donald Trump demitiu comissários do Comitê Especial de Eleições, movimento que pode ser visto como uma tentativa de evitar a identificação de irregularidades nas próximas eleições parciais no país.\n\nAs tensões geopolíticas continuam dominando o cenário internacional. Os Estados Unidos rebateram as críticas da China sobre o chefe do Instituto Americano de Relações com Taiwan, enquanto um especialista considera que as relações entre Taiwan e Japão são cruciais para a estabilidade do Estreito de Taiwan. Em outro desenvolvimento, 17 pessoas morreram em ataques aéreos dos Estados Unidos no Irã, conforme informou o ministério da Saúde iraniano. O governo americano não deseja envolver Israel na escalada militar contra o Irã, apesar das pressões de Benjamin Netanyahu para participar de ofensivas conjuntas. A Geórgia enfrenta acusações de isolamento após ser excluída do encontro da NATO em Turquia. Por outro lado, a CIA teve um fracasso na tentativa de golpe na Albânia durante o período comunista. A escalada das tensões entre Estados Unidos e Irã continua com declarações de que o cessar-fogo já terminou, enquanto o Irã rejeita qualquer rendição em negociações futuras.", "economia": "A economia brasileira e global apresentou movimentações significativas nas últimas semanas. A bolsa de valores do Brasil encerrou a sexta-feira com uma alta de quase 3%, atingindo seu maior nível desde maio, influenciada pela desaceleração da inflação medida pelo IPCA em junho. O Banco Central ainda deve aguardar a aplicação da nova etapa do tarifaço dos Estados Unidos antes de reagir. Paralelamente, o governo Lula considera estratégias para aumentar a participação estatal na mineração de minerais críticos, como o pré-sal. Além disso, a Volkswagen anunciou que cortará pela metade o número de modelos produzidos no mundo para reduzir custos e se tornar mais competitiva, enquanto o Nubank recebeu autorização para operar como banco no México. No cenário global, as preocupações com a inflação persistem, com investidores vendendo títulos relacionados à inteligência artificial devido à diminuição da demanda. A Agência Nacional do Petróleo, Gás Natural e Biocombustíveis (ANP) iniciou uma consulta pública sobre o acesso a gasodutos, enquanto o Federal Reserve continua preocupado com a inflação e avaliando aumentos nas taxas de juros se ela permanecer alta por mais tempo.", "tecnologia": "A Apple processou o OpenAI acusando-o de roubo de segredos comerciais. A ação foi apresentada no tribunal federal de São José, Califórnia, após o ex-funcionário da Apple ter sido contratado pelo OpenAI e supostamente induzido outros funcionários a revelarem informações confidenciais. Esta disputa marcou o fim da parceria entre as duas empresas tecnológicas notáveis. Paralelamente, a China fez um importante passo na reutilização de foguetes ao recuperar com sucesso o primeiro estágio do foguete Long March 10B após uma missão orbital. Esta conquista representa um avanço significativo no programa espacial chinês e alinha-se com esforços similares da SpaceX. Em outro desenvolvimento, a SK Group, empresa sul-coreana, estreou na Nasdaq em meio à crescente demanda por inteligência artificial, levando suas ações a dispararem 14%. O evento gerou expectativas de grandes investimentos no setor AI.", "ciencia": "A China conseguiu recuperar um sistema de reboque de foguetes com sucesso, mas os detalhes específicos da operação não foram divulgados. Em Lake Victoria, pesquisadores do King's College London registraram sinais de advertência de baixa oxigenação horas antes das mortes de peixes locais, demonstrando a urgência de sistemas de alerta mais precoces. A NASA anunciou prêmios para carreiras acadêmicas jovens com foco em diagnósticos avançados e métodos de aprendizado de máquina para controle autônomo de naves espaciais. Um estudo publicado na The Plant Cell mostrou que a microalga Chlamydomonas reinhardtii altera a atividade de cerca de um terço de seus genes proteínicos em resposta a mudanças moderadas nas temperaturas, sugerindo consequências significativas do aquecimento global para os ecossistemas aquáticos e o solo. Além disso, a NASA publicou imagens raras da Lua crescente tiradas pelo Estação Espacial Internacional em 26 de junho de 2026.", "cultura": "O Festival de Curtas Kinoforum, que acontecerá de 20 a 30 de agosto em São Paulo com entrada gratuita, selecionou 102 obras nacionais para sua próxima edição. Um dos destaques é a participação das atrizes Camila Pitanga e Malu Galli. O evento homenageará Mercedes Sosa, conhecida como a 'Voz da América Latina', que será celebrada no Rio de Janeiro neste domingo (12) em um evento que marca o aniversário de dois anos do coletivo Argentines Organizades. Paralelamente, o Festival de Teatro de São Paulo terá peças de renomados atores e atrizes como Débora Falabella, Vera Holtz e Reynaldo Gianecchini entre 1º a 27 de setembro, com 22 espetáculos, debates e oficinas. O filme 'O Convite', dirigido por Olivia Wilde, explorará as dinâmicas do relacionamento dos personagens principais interpretados por ela mesma e Seth Rogen, usando o humor para analisar a dinâmica de um casal que convida vizinhos para jantar, resultando em tensões sexuais e revelações sobre atividades íntimas dos convidados.", "sociedade": "A população de Taipei registrou uma queda por 30 meses consecutivos, conforme relatório do Taipei Times. Em Buenos Aires, seis delinquentes morreram durante confrontos com a polícia nos últimos dias, incluindo cinco que foram abatidos enquanto tentavam roubos e um caso envolvendo perseguição na cidade de La Matanza. O Brasil enviou 4,9 toneladas de insumos médicos à Venezuela, elevando o volume total encaminhado ao país vizinho para cerca de 12 toneladas de medicamentos e insumos. A Dataprev está abrindo concursos para preencher 212 vagas com salários a partir de R$ 8,3 mil, buscando profissionais de tecnologia da informação e outras áreas como direito e administração. Um advogado foi preso em Manaus suspeito de abusar sexualmente de sua filha adolescente, além de outras duas adolescentes no Distrito Federal.", "meio_ambiente": "A França enfrenta seu terceiro calorão desde maio com incêndios florestais ativos, especialmente no sul do país. De acordo com o diretor-geral de segurança civil, Julien Marion, a área total estimada queimada ultrapassa 25.000 hectares. Em outro desenvolvimento relacionado ao meio ambiente, um estudo acompanhou mais de 500 mil árvores por 30 anos em seis países e revelou que eventos extremos, como o El Niño, podem fazer as florestas tropicais pararem de absorver carbono. Além disso, a China aumentou o alerta e evacuou milhares de pessoas no leste do país antes da chegada do tufão Bavi. No Chile, o patrimônio arqueológico está sob ameaça devido à megarreforma, que prioriza a destruição antes do conhecimento detalhado.", "direitos_humanos": "Várias dezenas de alunos e professores foram resgatados após terem sido sequestrados em três escolas diferentes no estado de Oyo, na região sudeste do Nigéria, em maio. A situação dos acusados pela Palestine Action, que enfrentam processos relacionados a uma operação contra um depósito de armas israelense, tem causado impacto psicológico e trauma. Um ex-irmão católico foi condenado por abuso sexual infantil cometido em orfanatos, enquanto a proposta de Hong Kong para acesso a serviços de fertilização assistida para mulheres solteiras é debatida. A espionagem contra jornalistas na América Latina é vista como ameaça à democracia, e o sistema de saúde cubano está passando por uma grave crise devido às sanções econômicas dos EUA e a crise energética. Um pai chinesasado foi condenado a 22 anos de prisão por matar sua filha adolescente durante uma discussão."}, "resumo_do_dia": {"politica_nacional": [{"id": 45334, "titulo": "Zanatta aciona TCU por aumento da população de rua no Bolsa Família", "url": "https://www.metropoles.com/brasil/zanatta-aciona-tcu-por-aumento-da-populacao-de-rua-no-bolsa-familia", "fonte_id": "metropoles", "data_pub": "2026-07-10T22:47:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A deputada Júlia Zanatta (PL-SC) acionou o Tribunal de Contas da União (TCU) para realizar uma auditoria no programa Bolsa Família. Ela apontou a possibilidade de fraudes após a mudança que dispensou a apresentação do comprovante de residência.", "titulo_pt": "zanatta aciona tcu por aumento da população de rua no bolsa família", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 45270, "titulo": "Haddad chama críticas de Tarcísio a Marina e Tebet de 'agressão gratuita a duas mulheres'", "url": "https://g1.globo.com/sp/sao-paulo/eleicoes/2026/noticia/2026/07/10/haddad-chama-criticas-de-tarcisio-a-marina-e-tebet-de-agressao-gratuita-a-duas-mulheres.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-10T22:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O pré-candidato do PT, Fernando Haddad, classificou as críticas feitas pelo governador Tarcísio de Freitas às pré-candidatas Marina Silva e Simone Tebet como uma 'agressão gratuita'. Haddad expressou surpresa com as falas do adversário político.", "titulo_pt": "haddad chama críticas de tarcísio a marina e tebet de agressão gratuita", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 45314, "titulo": "Valdemar diz que todos os presidentes de partidos sugerem destinação de emendas: ‘Isso é fazer política’", "url": "https://veja.abril.com.br/politica/valdemar-diz-que-todos-os-presidentes-de-partidos-sugerem-destinacao-de-emendas-isso-e-fazer-politica/", "fonte_id": "veja", "data_pub": "2026-07-10T22:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente do Partido Liberal (PL), Valdemar da Costa Neto, afirmou em entrevista que todos os presidentes de partidos sugerem destinação de emendas. Segundo ele, isso é uma prática comum 'a vida inteira'.", "titulo_pt": "valdemar diz que todos os presidentes de partidos sugerem destinação de emendas: ‘isso é fazer política’", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 45272, "titulo": "Pré-campanhas de presidenciáveis se dividem sobre uso de inteligência artificial nas eleições", "url": "https://g1.globo.com/sp/sao-paulo/eleicoes/2026/noticia/2026/07/10/pre-campanhas-de-presidenciaveis-se-dividem-sobre-uso-de-inteligencia-artificial-nas-eleicoes.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-10T21:47:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Pré-campanhas de presidenciáveis discutem o uso de inteligência artificial nas eleições, com algumas campanhas apoiando a tecnologia e outras querendo limitar seu uso. O debate abrange questões como custos reduzidos e acessibilidade da tecnologia versus a possibilidade de criar propaganda artificialista que pode afastar os eleitores.", "titulo_pt": "pré-campanhas de presidenciáveis se dividem sobre uso de inteligência artificial nas eleições", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 45465, "titulo": "Caminhoneiros de Santos decidem paralisar atividades para pressionar por MP do Frete", "url": "https://www.jota.info/legislativo/caminhoneiros-de-santos-decidem-paralisar-atividades-para-pressionar-por-mp-do-frete", "fonte_id": "jota", "data_pub": "2026-07-10T21:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Caminhoneiros de Santos decidiram paralisar suas atividades na segunda-feira (13/7) para pressionar o presidente do Sena olitica/eleicoes/2026/noticia/2026/07/10/flavio-bolsonaro-defende-valdemar.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-10T20:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio Bolsonaro, pré-candidato à Presidência pelo PL, criticou a decisão do ministro Flávio Dino que resultou no bloqueio de R$119,2 milhões em bens de Valdemar Costa Neto, presidente do partido. Flávio defendeu Valdemar, afirmando que seu trabalho é regular.", "titulo_pt": "flávio bolsonaro sai em defesa de valdemar, investigado por desvio de dinheiro público", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 45275, "titulo": "Milei diz que viajará ao Brasil para apoiar a candidatura de Flávio Bolsonaro", "url": "https://g1.globo.com/mundo/noticia/2026/07/10/milei-revela-que-viajara-ao-brasil-para-apoiar-candidatura-de-flavio-bolsonaro.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-10T20:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente da Argentina, Javier Milei, anunciou que viajará ao Brasil no dia 25 de julho para apoiar a pré-candidatura de Flávio Bolsonaro à Presidência. Ele visitará São Paulo e Brasília durante a viagem.", "titulo_pt": "milei diz que viajará ao brasil para apoiar flávio bolsonaro", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 45265, "titulo": "Patrus Ananias diz 'sim' ao PT, mas condiciona candidatura em MG a encontro com Lula", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/patrus-ananias-diz-sim-ao-pt-mas-condiciona-candidatura-em-mg-a-encontro-com-lula.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-10T20:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O deputado federal e ex-prefeito de Belo Horizonte Patrus Ananias (PT-MG) expressou interesse em concorrer ao governo de Minas Gerais, mas sua decisão final dependerá de uma conversa com o presidente Lula.", "titulo_pt": "patrus ananias diz 'sim' ao pt, mas condiciona candidatura a encontro com lula", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 45266, "titulo": "'Prefeito tiktoker' de Socorocaba admite que pode ser expulso de seu partido", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/prefeito-tiktoker-de-socorocaba-admite-que-pode-ser-expulso-de-seu-partido.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-10T20:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O prefeito de Sorocaba, Rodrigo Manga (Republicanos), admitiu que pode ser expulso do seu partido durante uma crise envolvendo ele e sua mulher, pré-candidata a deputada federal.", "titulo_pt": "prefeito tiktoker de sorocaba admite possível expulsão do partido", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 45267, "titulo": "Valdemar nega irregularidades envolvendo emendas e diz que decisão de Dino criminaliza política", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/blogs/brasilia-hoje/2026/07/valdemar-nega-irregularidades-envolvendo-emendas-e-diz-que-decisao-de-dino-criminaliza-politica.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-10T20:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Valdemar Costa Neto, presidente do PL, negou ter cometido irregularidades envolvendo emendas parlamentares e criticou a decisão de Flávio Dino que determinou o bloqueio de R$ 119 milhões.", "titulo_pt": "valdemar nega irregularidades envolvendo emendas e diz que decisão de dino criminaliza política", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 45268, "titulo": "Alvo da PF por desvio de emendas, Valdemar já foi condenado no mensalão e citado na lava jato", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/alvo-da-pf-por-desvio-de-emendas-valdemar-ja-foi-condenado-do-mensalao-e-citado-na-lava-jato.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-10T19:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Valdemar Costa Neto, presidente do PL, é alvo de uma investigação sobre desvio de emendas. Ele já foi condenado no mensalão, investigado na Lava Jato e indiciado em relação a uma tentativa de golpe.", "titulo_pt": "agora alvo de investigação que apura o desvio de emendas valdemar já foi condenado no mensalão e citado na lava jato", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 45269, "titulo": "Flávio Bolsonaro diz que PF age de forma seletiva ao mirar Valdemar", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/flavio-bolsonaro-diz-que-pf-age-de-forma-seletiva-ao-mirar-valdemar.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-10T19:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio Bolsonaro afirmou que a Polícia Federal age de forma seletiva ao investigar o presidente do PL, Valdemar Costa Neto. Ele considera que essa atuação visa constranger um adversário político do governo Lula.", "titulo_pt": "flávio bolsonaro diz que pf age de forma seletiva ao mirar valdemar", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 44127, "titulo": "Secom de Lula diz à Câmara que propagandas passarão pelo TSE no defeso", "url": "https://www.metropoles.com/colunas/igor-gadelha/secom-de-lula-diz-a-camara-que-propagandas-passarao-pelo-tse-no-defeso", "fonte_id": "metropoles", "data_pub": "2026-07-10T18:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Secom de Lula informou à Câmara que as propagandas institucionais passarão pelo Tribunal Superior Eleitoral (TSE) durante o defeso eleitoral. Publicidade institucional fica suspensa no período eleitoral, mas exceções prec junho. O telefonema entre Lula e Delcy Rodríguez foi mencionado como parte desse contexto.", "titulo_pt": "novo telefonema de lula para a presidenta da venezuela", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}], "mundo__eventos": [], "economia": [{"id": 44909, "titulo": "Nanya to increase capital expenditure", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/11/2003860548", "fonte_id": "taipei_times", "data_pub": "2026-07-11T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa Nanya está aumentando suas despesas em capital. A informação não fornece detalhes adicionais sobre o montante ou os projetos específicos envolvidos nessa ação.", "titulo_pt": "nanya aumentar despesas em capital", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 44913, "titulo": "Taiwan’s AI boom widens finance gap", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/11/2003860552", "fonte_id": "taipei_times", "data_pub": "2026-07-11T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A ascensão da inteligência artificial na Taiwan está ampliando a disparidade no setor financeiro. O país tem visto avanços significativos na adoção de tecnologias de IA, mas isso tem criado uma diferença crescente entre diferentes empresas e organizações financeiras.", "titulo_pt": "boom da ai amplia gap financeiro", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 45255, "titulo": "CEO de gigante de chips de memória prevê que 2027 terá a pior crise de oferta da história do setor", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/tec/2026/07/ceo-de-gigante-de-chips-de-memoria-preve-que-2027-tera-a-pior-crise-de-oferta-da-historia-do-setor.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-10T23:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O CEO da SK Hynix, Kwak Noh-jung, prevê que a indústria global de chips de memória enfrentará a pior crise de oferta em 2027. Segundo ele, a demanda continuará superando a capacidade produtiva da empresa durante boa parte da próxima década, apesar das expansões significativas da produção.", "titulo_pt": "ceo de gigante de chips de memória prevê que 2027 terá a pior crise de oferta da história do setor", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 45276, "titulo": "Bolsa sobe quase 3% e fecha no maior nível desde maio", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-07/bolsa-sobe-quase-3-e-fecha-no-maior-nivel-desde-maio", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-10T22:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A bolsa de valores do Brasil encerrou a sexta-feira com uma elevação de quase 3%, atingindo seu maior nível desde maio. O Índice Nacional de Preços ao Consumidor Amplo (IPCA) ficou abaixo das expectativas, contribuindo para o desempenho positivo dos ativos domésticos.", "titulo_pt": "bolsa sobe quase 3% e fecha no maior nível desde maio", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 45277, "titulo": "Juros do Fies Empreendedor incidirão durante período de carência", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-07/juros-do-fies-empreendedor-incidirao-durante-periodo-de-carencia", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-10T22:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os juros do Fies Empreendedor serão cobrados durante o período de carência, conforme decisão do Conselho Monetário Nacional. A regulamentação anterior não incluía a incidência de juros nesse período.", "titulo_pt": "juros do fies empreendedor incidirão durante período de carência", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 45386, "titulo": "Juros futuros fecham em queda firme após IPCA abaixo do esperado", "url": "https://www.cnnbrasil.com.br/economia/mercado/juros-futuros-fecham-em-queda-firme-apos-ipca-abaixo-do-esperado/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-10T22:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os juros futuros encerraram o dia em queda, após o IPCA ter ficado abaixo do esperado. A taxa para janeiro de 2028 caiu de 14,04% para 13,85%.", "titulo_pt": "juros futuros fecham em queda firme após ipca abaixo do esperado", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 45394, "titulo": "Crédito rural empresarial soma R$ 477,2 bilhões na safra 2025/26", "url": "https://www.cnnbrasil.com.br/agro/credito-rural-empresarial-soma-r-4772-bilhoes-na-safra-2025-26/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-10T22:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O crédito rural empresarial atingiu R$ 477,2 bilhões na safra 2025/26. O CPR se consolidou como o principal instrumento financeiro privado do modelo empresarial, com R$ 205 bilhões.", "titulo_pt": "crédito rural empresarial soma r$ 477,2 bilhões na safra 2025/26", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 45278, "titulo": "Prazo de crédito antecipado para exportadores é ampliado", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-07/prazo-de-credito-antecipado-para-exportadores-e-ampliado", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-10T22:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O prazo para exportadores terem acesso a crédito antecipado foi ampliado pelo Conselho Monetário Nacional, permitindo agora até dois anos e meio antes do embarque da mercadoria. A medida visa facilitar o acesso ao crédito, especialmente para micro, pequenas e médias empresas.", "titulo_pt": "prazo de crédito antecipado para exportadores é ampliado", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 45396, "titulo": "Déficit fiscal altera percepção de investidores sobre títulos públicos", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/deficit-fiscal-altera-percepcao-de-investidores-sobre-titulos-publicos/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-10T22:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O déficit fiscal está alterando a percepção dos investidores sobre os títulos públicos brasileiros, pressionando os juros e a inflação e reduzindo o apetite por ativos do país.", "titulo_pt": "déficit fiscal altera percepção de investidores sobre títulos públicos", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 45256, "titulo": "IPCA mais baixo mostra que barulho contra BC foi exagerado", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/adriana-fernandes/2026/07/ipca-mais-baixo-mostra-que-ruido-contra-bc-foi-exagerado.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-10T21:13:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A inflação medida pelo IPCA registrou uma desaceleração de 0,58% em maio para 0,16% em junho. Essa diminuição mostrou que a preocupação do mercado financeiro com a decisão do Banco Central de cortar os juros foi exagerada.", "titulo_pt": "ipca mais baixo mostra que barulho contra bc foi exagerado", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 45259, "titulo": "Governo deve esperar aplicação de nova fase do tarifaço dos EUA para calibrar reação", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/governo-deve-esperar-aplicacao-de-nova-fase-do-tarifaco-dos-eua-para-calibrar-reacao.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-10T20:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo brasileiro vai aguardar a aplicação da nova etapa do tarifaço dos Estados Unidos, prevista para o dia 15 de julho, antes de decidir como reagir. A Lei de Reciprocidade permite que medidas equivalentes sejam tomadas em situações semelhantes.", "titulo_pt": "governo deve aguardar tarifaço dos eua", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 45261, "titulo": "Lula trata minerais críticos como novo pré-sal, e governo avalia entrada de BNDES e Petrobras em empresas do setor", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/lula-trata-minerais-criticos-como-novo-pre-sal-e-governo-avalia-entrada-de-bndes-e-petrobras-em-empresas-do-setor.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-10T20:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo de Luiz Inácio Lula da Silva está avaliando a possibilidade de aumentar a participação estatal na mineração, focando nos minerais críticos. Durante uma reunião no Palácio do Planalto, foram discutidas estratégias como o envolvimento do BNDES e da Petrobras, além da criação de linhas de crédito para pesquisas.", "titulo_pt": "lula trata minerais críticos como novo pré-sal", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 45262, "titulo": "Volkswagen anuncia que cortará pela metade número de modelos produzidos no mundo", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/volkswagen-anuncia-que-cortara-pela-metade-a-producao-de-carros.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-10T19:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Volkswagen anunciou que reduzirá até pela metade o número de modelos produzidos para cortar custos e aumentar sua competitividade com empresas chinesas. A empresa não detalhou os impactos para seus funcionários, já preparados para possíveis cortes de empregos e fechamento de fábricas.", "titulo_pt": "volkswagen anuncia redução drástica no número de modelos produzidos", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "c  "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 45403, "titulo": "Astronautas do ônibus espacial Columbia registraram OVNI na órbita da Terra", "url": "https://www.cnnbrasil.com.br/ciencia/astronautas-do-onibus-espacial-columbia-registraram-ovni-na-orbita-da-terra/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-10T21:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Astronautas do ônibus espacial Columbia registraram um objeto voador não identificado (OVNI) na órbita da Terra. Fotos divulgadas pelo Departamento de Guerra dos EUA mostram o corpo em órbita baixa.", "titulo_pt": "astronautas do ônibus espacial columbia registraram ovni na órbita da terra", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 45689, "titulo": "Dark energy flips its sign, but the Hubble tension refuses to budge", "url": "https://phys.org/news/2026-07-dark-energy-flips-hubble-tension.html", "fonte_id": "phys_org", "data_pub": "2026-07-10T21:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A expansão do universo está acelerando há cerca de um século, descoberto pela equipe Supernova Cosmology Project e High-Z Supernova Search Team. A explicação predominante para essa aceleração é a 'energia escura', que impulsiona o espaço em separado no modelo LCDM.", "titulo_pt": "energia escura inverte seu sinal, mas a tensão de hubble persiste", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 45708, "titulo": "A ravenous black hole in our backyard could be our window into the ancient universe", "url": "https://www.space.com/astronomy/black-holes/a-ravenous-black-hole-in-our-backyard-could-be-our-window-into-the-ancient-universe", "fonte_id": "space_com", "data_pub": "2026-07-10T21:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um buraco negro alimentando no centro de uma galáxia próxima está se comportando da mesma maneira que buracos negros existentes logo após o Big Bang. Este fenômeno poderia nos dar uma janela para entender a antiguidade do universo.", "titulo_pt": "um ravenous black hole em nossa backyard poderia ser nosso window into the ancient universe", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 45690, "titulo": "Children back group claims over evidence, but privacy reduces bias, experiments reveal", "url": "https://phys.org/news/2026-07-children-group-evidence-privacy-bias.html", "fonte_id": "phys_org", "data_pub": "2026-07-10T20:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Aproximando-se do dia das eleições de 2026, as preferências de votos estão sendo analisadas novamente. Entretanto, menos frequentemente questionado é quando os americanos demonstram comportamento partidário: logo após atingirem a idade legal para votar ou durante a infância, na adolescência?", "titulo_pt": "Crianças reforçam grupos sobre evidências de comportamento político, mas privacidade reduz viés, experimentos revelam", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 45254, "titulo": "'Baratas ciborgues' são aposta para melhorar buscas após desastres", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/baratas-ciborgues-sao-aposta-para-melhorar-buscas-apos-desastres.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-10T20:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O estudo envolve o uso de baratas equipadas com tecnologia para auxiliar nas buscas após desastres naturais. O objetivo é aproveitar a capacidade das baratas de se moverem em espaços apertados e sua resistência aos danos ambientais.", "titulo_pt": "baratas ciborgues são aposta para melhorar buscas após desastres", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 45691, "titulo": "Why natural forests survive heat waves better than planted forests", "url": "https://phys.org/news/2026-07-natural-forests-survive.html", "fonte_id": "phys_org", "data_pub": "2026-07-10T19:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 2022, uma seca e calor extremos afetaram as florestas da Bacia do Rio Yangtze na China. Este evento permitiu que os pesquisadores comparassem como diferentes tipos de florestas reagiam a altas temperaturas e escassez d'água simultaneamente.", "titulo_pt": "porque as florestas naturais sobrevivem melhores a ondas de calor do que as plantadas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 45693, "titulo": "Nominee for key federal health role has a history of questioning vaccines", "url": "https://www.statnews.com/2026/07/10/sean-kaufman-hhs-nominee-past-statements-question-vaccine-safety/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-10T19:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sean Kaufman tem uma história de questionar vacinas, o que pode gerar desacordos com Senador Bill Cassidy durante a próxima sessão de confirmação.", "titulo_pt": "nominee para importante cargo federal de saúde tem histórico de questionar vacinas", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 45694, "titulo": "Early Career Faculty (ECF) 2025 Awards", "url": "https://www.nasa.gov/directorates/stmd/space-tech-research-grants/ecf/early-career-faculty-ecf-2025-awards/", "fonte_id": "nasa_news", "data_pub": "2026-07-10T19:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA oferece prêmios para carreiras acadêmicas jovens (ECF 2025) com foco em diagnósticos avançados para instalações de teste a alta entalpia, planejamento de entrada atmosférica de naves espaciais e métodos de aprendizado de máquina para controle a bordo de naves espaciais autônomas.", "titulo_pt": "Prêmios Para Carreiras Acadêmicas Jovens 2025", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 45042, "titulo": "Moderate warming rewires one-third of microalga's genes, study finds", "url": "https://phys.org/news/2026-07-moderate-rewires-microalga-genes.html", "fonte_id": "phys_org", "data_pub": "2026-07-10T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores demonstraram pela primeira vez que a microalga Chlamydomonas reinhardtii altera a atividade de cerca de um terço de seus genes proteínicos em resposta até mesmo a mudanças moderadas nas temperaturas. O estudo, publicado na revista The Plant Cell, sugere consequências significativas do aquecimento global para os ecossistemas aquáticos e o solo.", "titulo_pt": "moderada aquecimentode reescreve um terço das genes de uma microalga, estudo descobre", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 45695, "titulo": "NASA Volunteers Help Zooniverse Reach 1 Billion Classifications", "url": "https://science.nasa.gov/get-involved/citizen-science/nasa-volunteers-help-zooniverse-reach-1-billion-classifications/", "fonte_id": "nasa_news", "data_pub": "2026-07-10T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Zooniverse, um projeto de NASA que administra a maior plataforma global para pesquisa com participação humana online, atingiu o marco impressionante de 1 bilhão de classificações fornecidas por voluntários do mundo inteiro. Este feito é uma homenagem a todos os participantes que marcaram variações em curvas de luz e confirmaram a presença de objetos em movimento.", "titulo_pt": "nasa voluntários ajudam zooniverse atingir 1 bilhão de classificações", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 45043, "titulo": "What is 'social media'? Study highlights public confusion about the term", "url": "https://phys.org/news/2026-07-social-media-highlights-term.html", "fonte_id": "phys_org", "data_pub": "2026-07-10T18:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa da Universidade Aston demonstrou que a população não possui uma definição claramente aceita para o termo 'social media' e não há consenso sobre quais sites e plataformas são consideradas social media.", "titulo_pt": "O que é 'social media'? Estudo mostra confusão pública", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 45044, "titulo": "Visible light triggers three-step cascade to make 3D drug-like molecules", "url": "https://phys.org/news/2026-07-visible-triggers-cascade-3d-drug.html", "fonte_id": "phys_org", "data_pub": "2026-07-10T18:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um time de químicos, liderado pelo professor Frank Glorius da Universidade de Münster, desenvolveu uma sequência de reações controladas por luz que ocorre em três etapas. Nessa catálise tripla, um passo reage ao próximo como se fossem dominós, resultando em transformações moleculares consecutivas dentro de uma única vasilha.", "titulo_pt": "Luz visível desencadeia cadeia de três etapas para criar moléculas medicamentosas 3D", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 45045, "titulo": "Giant kangaroos survived until 6,500 years ago on the New Guinea coast", "url": "https://phys.org/news/2026-07-giant-kangaroos-survived-years-guinea.html", "fonte_id": "phys_org", "data_pub": "2026-07-10T18:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Aqui estão alguns gigantes de cangurus viviam nas florestas de montanha da costa da Nova Guiné há aproximadamente 50.000 anos. Esses cangurus eram diferentes dos que existem hoje e sobreviveram até cerca de 6.500 anos atrás.", "titulo_pt": "gigantes de cangurus sobreviveram até 6,500 anos atrás na costa da nova guiné", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 45093, "titulo": "Earth observation satellites pass telecom in European space industry sales", "url": "https://spacenews.com/earth-observation-satellites-pass-telecom-in-european-space-industry-sales/", "fonte_id": "spacenews", "data_pub": "2026-07-10T18:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As vendas do setor espa 103, "titulo": "Interview: COP31 president says electrification is ‘surest way to protect citizens’", "url": "https://www.carbonbrief.org/interview-cop31-president-says-electrification-is-surest-way-to-protect-citizens/", "fonte_id": "carbon_brief", "data_pub": "2026-07-10T15:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Murat Kurum, presidente-designado da COP31, estabeleceu um objetivo para que 35% do mundo finalmente se electrifique. Ele afirma que a electrificação é o meio mais seguro de proteger os cidadãos.", "titulo_pt": "Entrevista: presidente da COP31 diz que electrificação é 'o meio mais seguro para proteger os cidadãos'", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 45104, "titulo": "DeBriefed 10 July 2026: Deadly Europe heat | EU electrification leak | COP31 president interview", "url": "https://www.carbonbrief.org/debriefed-10-july-2026-deadly-europe-heat-eu-electrification-leak-cop31-president-interview/", "fonte_id": "carbon_brief", "data_pub": "2026-07-10T15:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O DeBriefed desta semana aborda o calor letal na Europa, uma fuga de informação sobre a eletrificação da UE e uma entrevista com o presidente do COP31. O resumo fornece uma visão geral dos principais desenvolvimentos relacionados ao clima naquele período.", "titulo_pt": "debriefed 10 julho 2026: calor letal na europa | fuga de informação sobre eletrificação da eu | entrevista com presidente do cop31", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 44199, "titulo": "Terremoto de magnitude 3,9 atinge o norte da Venezuela e provoca evacuações e pânico", "url": "https://exame.com/mundo/terremoto-de-magnitude-39-atinge-o-norte-da-venezuela-e-provoca-evacuacoes-e-panico/", "fonte_id": "exame", "data_pub": "2026-07-10T14:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um terremoto de magnitude 3,9 atingiu o norte da Venezue let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">

          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>

                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}

                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";

    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>

           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>

    <div class="sumario">${textoSint}</div>

function toggleDrill(id) {

}

    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>

    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>

    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

(function () {

  function _voz() {

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // .sumario ou .destaque-analise imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
</body>
</html>
