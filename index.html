<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'Cardo', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'Cardo', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'Cardo', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'Cardo', Georgia, serif;
                 font-size: 17px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>
</head>

const D = {"gerado_em": "19/06/2026 01:39", "stats": {"noticias_total": 4625, "resumos_total": 384, "sem_topico": 0, "ultima_coleta": "2026-06-19T03:31:16Z"}, "rotulos_topico": {"politica_nacional": "Política Nacional", "politica_internacional": "Política Internacional", "cultura": "Cultura", "ciencia_tecnologia": "Ciência & Tecnologia"}, "topicos": ["politica_nacional", "politica_internacional", "cultura", "ciencia_tecnologia"], "sinteses": {"ciencia_tecnologia": "A Coreia do Sul expandiu a cobertura de seguros para tratar casos severos de calvície localizada, incluindo o uso do medicamento Olumiant (baricitinib), a partir de 1º de julho. A SK Hynix realizou reuniões com autoridades dos Estados Unidos sobre a possibilidade de fornecer memórias de alta banda e planos de investimento local. O G7 passou a focar em como controlar o acesso aos sistemas mais avançados de inteligência artificial, enquanto a Apple anunciou uma parceria com a Intel para projetar e produzir chips norte-americanos. A SK hynix atingiu pela primeira vez uma capitalização de mercado superior a 2 trilhões de wones, impulsionada por um rally nos semicondutores, elevando o índice Kospi a novos recordes históricos. As pesquisas científicas incluem a publicação dos achados sobre a disseminação da gripe aviária H5 nas ilhas Heard e McDonald, bem como um estudo que revela uma nova função enzimática no cérebro humano. Além disso, a China está testando equipamentos para gerar energia solar no espaço, enquanto a Índia enfrenta desafios na rastreabilidade dos produtos em cadeias de suprimentos.", "cultura": "A seleção mexicana conquistou o primeiro lugar no grupo de sua competição ao vencer a Coreia do Sul por 1-0, marcando presença nas oitavas de final. Em outro destaque, o integrante do Le Sserafim, Kim Chaewon, retornará às atividades após um mês de descanso para tratar de problemas no pescoço e promoverá a música 'Boompala'. Ainda na cena cultural, Monsta X lançou sua primeira música solo intitulada 'R , "fonte_id": "poder360", "data_pub": "2026-06-19T02:54:00Z", "idioma": "pt", "texto_pt": "O ex-governador de Goiás, Ronaldo Caiado, declarou que o Partido dos Trabalhadores está envolvido em todos os escândalos de corrupção no Brasil.", "titulo_pt": "Caiado afirma que caso de Jaques Wagner é 'marca forte do PT'", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 3748, "titulo": "Jaques Wagner iguala eleitoralmente escândalo do Master, diz Eurasia", "url": "https://www.cnnbrasil.com.br/politica/jaques-wagner-iguala-eleitoralmente-escandalo-do-master-diz-eurasia/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-19T02:47:00Z", "idioma": "pt", "texto_pt": "De acordo com Christopher Garman, da Eurasia Group, os desdobramentos do caso devem igualar a percepção de corrupção entre o campo político de Jaques Wagner e o escândalo do Master.", "titulo_pt": "Jaques Wagner equipara escândalo do Master na percepção eleitoral, afirma Eurasia", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 3573, "titulo": "Brasil comemora acordo entre EUA e Irã, mas cobra cumprimento dos termos e fim de ataques", "url": "https://g1.globo.com/politica/noticia/2026/06/18/brasil-comemora-acordo-entre-eua-e-ira-mas-cobra-cumprimento-dos-termos-e-fim-de-ataques.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T02:20:00Z", "idioma": "pt", "texto_pt": "O governo brasileiro expressou satisfação com o acordo entre os Estados Unidos e o Irã, mas ressaltou a necessidade do cumprimento dos termos acordados e do fim das hostilidades entre as partes. O conflito entre os países durou cerca de quatro meses, iniciado após ataques conjuntos dos EUA e Israel contra o Irã.", "titulo_pt": "Brasil comemora acordo entre EUA e Irã, mas cobra cumprimento dos termos e fim de ataques", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 3601, "titulo": "Lula espera renúncia de Jaques Wagner da liderança do governo, dizem aliados", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/lula-espera-renuncia-de-jaques-wagner-da-lideranca-do-governo-dizem-aliados.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T02:17:00Z", "idioma": "pt", "texto_pt": "Com o aval do presidente Lula (PT), ministros e aliados tentaram convencer Jaques Wagner (PT-BA) a renunciar à liderança do governo no Senado nesta quinta-feira (18).", "titulo_pt": "Lula espera renúncia de Jaques Wagner da liderança do governo, dizem aliados", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 3657, "titulo": "Nunes Marques lança livro sobre judicialização no STF", "url": "https://www.poder360.com.br/poder-justica/nunes-marques-lanca-livro-sobre-judicializacao-no-stf/", "fonte_id": "poder360", "data_pub": "2026-06-19T02:07:00Z", "idioma": "pt", "texto_pt": "O presidente do TSE, Nunes Marques, realizou o lançamento de um livro sobre judicialização no STF durante cerimônia na sede do TSE, com a presença de ministros do STJ.", "titulo_pt": "Nunes Marques lança livro sobre judicialização no STF", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 3602, "titulo": "Operação contra Wagner reduz chance de indicação de Messias antes das eleições", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/operacao-contra-wagner-reduz-chance-de-indicacao-de-messias-antes-das-eleicoes.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T02:00:00Z", "idioma": "pt", "texto_pt": "As chances de o presidente Lula reenviar a indicação de Jorge Messias ao Senado para uma vaga no STF antes das eleições diminuíram significativamente após a operação que atingiu o líder do governo no Senado.", "titulo_pt": "Operação contra Wagner diminui chances de indicação de Messias antes das eleições", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 3603, "titulo": "Campanha de Flávio quer cautela em resposta à ação da PF contra líder de Lula", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/campanha-de-flavio-quer-cautela-em-resposta-a-acao-da-pf-contra-lider-de-lula.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T02:00:00Z", "idioma": "pt", "texto_pt": "A campanha do senador Flávio Bolsonaro orienta uma reação cautelosa à operação da Polícia Federal contra Jaques Wagner, líder do governo Lula no Senado. O objetivo é explorar o fato sem afetar a lançamento de propostas para sua pré-candidatura presidencial.", "titulo_pt": "Campanha de Flávio Bolsonaro busca cautela na resposta à operação contra Jaques Wagner", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 3604, "titulo": "Delúbio Soares nega que candidatura em 2026 seja para resgatar imagem após escândalos", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/delubio-soares-nega-que-candidatura-em-2026-seja-para-resgatar-imagem-apos-escandalos.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T02:00:00Z", "idioma": "pt", "texto_pt": "Ex-tesoureiro do PT, Delúbio Soares, de 70 anos, está se candidatando a deputado federal em 2026 por Goiás. Ele foi preso duas vezes em conexão com escândalos que afetaram o partido, como mensalão e Lava Jato, mas nega que sua candidatura seja para resgatar sua imagem.", "titulo_pt": "Delúbio Soares nega que candidatura em 2026 seja para resgatar imagem após escândalos", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 3605, "titulo": "Ação da PF contra Jaques Wagner gera temor no governo e afeta discurso de Lula para campanha", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/acao-da-pf-contra-jaques-wagner-gera-temor-no-governo-e-afeta-discurso-de-lula-para-campanha.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T02:00:00Z", "idioma": "pt", "texto_pt": "Uma operação da Polícia Federal contra Jaques Wagner, líder do governo no Senado (PT-BA), gerou preocupação no entorno de Lula (PT) e pode impactar o discurso eleitoral petista.", "titulo_pt": "Ação da PF contra Jaques Wagner causa temor no governo e afeta discurso de Lula", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 3753, "titulo": "Caso Master: Bolsonarismo deve explorar elo entre Jaques Wagner e Lula", "url": "https://www.cnnbrasil.com.br/politica/caso-master-bolsonarismo-deve-explorar-elo-entre-jaques-wagner-e-lula/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-19T01:54:00Z", "idioma": "pt", "texto_pt": "A equipe de Flávio Bolsonaro planeja utilizar a proximidade entre Jaques Wagner e Lula como uma vantagem na pré-campanha presidencial. A informação foi apurada pela analista política da CNN Clarissa Oliveira.", "titulo_pt": "Caso Master: Bolsonarismo deve explorar conexão entre Jaques Wagner e Lula", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 3636, "titulo": "Governo interino da Venezuela e oposição se reúnem", "url": "https://www.cartacapital.com.br/mundo/governo-interino-da-venezuela-e-oposicao-se-reunem/", "fonte_id": "cartacapital", "data_pub": "2026-06-19T01:45:00Z", "idioma": "pt", "texto_pt": "O governo interino da Venezuela e a oposição realizaram uma reunião. Este encontro ocorreu quase seis meses após a suposta captura de Nicolás Maduro em uma intervenção militar americana, mas não há detalhes adicionais sobre as discussões ou resultados.", "titulo_pt": "Governo interino da Venezuela e oposição se reúnem", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 3756, "titulo": "Renato Gaúcho não é mais técnico do Vasco", "url": "https://www.cnnbrasil.com.br/esportes/futebol/vasco-da-gama/renato-gaucho-nao-e-mais-tecnico-do-vasco/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-19T01:41:00Z", "idioma": "pt", "texto_pt": "De acordo com nota oficial do clube, a decisão de Renato Gaúcho deixar o cargo de técnico do Vasco foi tomada em comum acordo.", "titulo_pt": "Renato Gaúcho não é mais técnico do Vasco", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 3757, "titulo": "Liderança do PT defende Jaques Wagner, mas desconfiança cresce no partido", "url": "https://www.cnnbrasil.com.br/politica/lideranca-do-pt-defende-jaques-wagner-mas-desconfianca-cresce-no-partido/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-19T01:39:00Z", "idioma": "pt", "texto_pt": "Edinho Silva afirmou que Jaques Wagner tem a confiança do partido. No entanto, interlocutores reservados expressaram sua preferência por sua saída da liderança no Senado.", "titulo_pt": "Líder do PT defende Jaques Wagner, mas desconfiança cresce no partido", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}], "politica_internacional": [{"id": 3829, "titulo": "Gobierno panameño aplaza por un año la implementación de la “Ley de Precio Único”", "url": "https://www.infobae.com/panama/2026/06/19/gobierno-panameno-aplaza-por-un-ano-la-implementacion-de-la-ley-de-precio-unico/", "fonte_id": "infobae", "data_pub": "2026-06-19T03:33:00Z", "idioma": "es", "texto_pt": "O governo panamenho prorrogou por um ano a implementação da 'Ley de Precio Único', justificando que essa decisão visa permitir que os comerciantes e fornecedores realizem as mudanças tecnológicas e operacionais necessárias.", "titulo_pt": "Governo panamenho adia por um ano a implementação da 'Ley de Precio Único'", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 3830, "titulo": "Buscan a 4 desaparecidos en Presa de Zimapán tras volcamiento de lancha: ya se recuperó un cuerpo", "url": "https://www.infobae.com/mexico/2026/06/19/buscan-a-4-desaparecidos-en-presa-de-zimapan-tras-volcamiento-de-lancha-ya-se-recupero-un-cuerpo/", "fonte_id": "infobae", "data_pub": "2026-06-19T03:33:00Z", "idioma": "es", "texto_pt": "Um acidente ocorreu próximo a Loma Bonita quando uma lancha, projetada para seis pessoas, capotou. Uma operação de resgate continua nas fronteiras de Hidalgo e Querétaro, após o qual um corpo já foi encontrado.", "titulo_pt": "Buscam quatro desaparecidos na Presa de Zimapán após capotamento de lancha; um corpo já foi recuperado", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 3831, "titulo": "Cáncer de riñón en Costa Rica: aumentan los diagnósticos y expertos alertan sobre factores de riesgo y prevención", "url": "https://www.infobae.com/costa-rica/2026/06/19/cancer-de-rinon-en-costa-rica-aumentan-los-diagnosticos-y-expertos-alertan-sobre-factores-de-riesgo-y-prevencion/", "fonte_id": "infobae", "data_pub": "2026-06-19T03:33:00Z", "idioma": "es", "texto_pt": "Os casos de câncer de rim na Costa Rica aumentaram em 18% no último ano. Obesidade, hipertensão e tabagismo são os principais fatores associados ao câncer de rim nesse país.", "titulo_pt": "Câncer de rim na Costa Rica: aumento nos diagnósticos e especialistas alertam sobre fatores de risco e prevenção", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 3832, "titulo": "México derrota 1-0 a Corea del Sur en el Estadio Guadalajara y asegura su boleto a la siguiente fase", "url": "https://www.infobae.com/mexico/deportes/2026/06/18/mexico-vs-corea-del-sur-en-vivo-minuto-a-minuto-el-tri-busca-el-pase-a-la-siguiente-fase/", "fonte_id": "infobae", "data_pub": "2026-06-19T03:33:00Z", "idioma": "es", "texto_pt": "O México venceu a Coreia do Sul por 1-0 no Estádio Guadalajara, com gol de Romo e defesa crucial de Rangel, assumindo o primeiro lugar do Grupo A.", "titulo_pt": "México vence 1-0 a Coreia do Sul no Estadio Guadalajara e garante vaga para próxima fase", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 3833, "titulo": "Un adolescente regresaba de la escuela y fue atacado a golpes por dos motochorros para robarle en La Plata", "url": "https://www.infobae.com/sociedad/policiales/2026/06/19/un-adolescente-regresaba-de-la-escuela-y-fue-brutalmente-golpeado-por-dos-motochorros-para-robarle/", "fonte_id": "infobae", "data_pub": "2026-06-19T03:31:00Z", "idioma": "es", "texto_pt": "Um adolescente foi atacado a golpes por dois motochorros em uma esquina de Los Hornos, La Plata, durante o dia. O episódio foi registrado por uma câmera de segurança e a vítima conseguiu escapar.", "titulo_pt": "Adolescente foi agredido a golpes por motochorros na rua durante o dia em La Plata", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 3834, "titulo": "Este es el Pico y Placa en Cali para este viernes 19 de junio", "url": "https://www.infobae.com/colombia/2026/06/19/este-es-el-pico-y-placa-en-cali-para-este-viernes-19-de-junio/", "fonte_id": "infobae", "data_pub": "2026-06-19T03:31:00Z", "idioma": "es", "texto_pt": "Os veículos com placas terminadas em 1 e 2 não podem circular em Cali neste viernes, 19 de junho. Os motoristas devem verificar as restrições para evitar multas.", "titulo_pt": "Estes são os horários de Pico e Placa em Cali para este viés de junho", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 3929, "titulo": "Exjefe de Policía de Investigación de Sinaloa busca retiro anticipado; EU solicitó extradición por presuntos vínculos con crimen organizado", "url": "https://www.eluniversal.com.mx/estados/exjefe-de-policia-de-investigacion-de-sinaloa-busca-retiro-anticipado-eu-solicito-extradicion-por-presuntos-vinculos-con-crimen-organizado/", "fonte_id": "el_universal_mx", "data_pub": "2026-06-19T03:31:00Z", "idioma": "es", "texto_pt": "O governo do estado propôs conceder pensão de aposentadoria antecipada no valor de 67 mil pesos mensais ao ex-chefe da Polícia de Investigação de Sinaloa. Simultaneamente, os EUA solicitaram sua extradição por supostos vínculos com o crime organizado.", "titulo_pt": "Ex-chefe da Polícia de Investigação de Sinaloa busca aposentadoria antecipada; EU solicita extradição por supostos laços com o crime organizado", "veiculo": "El Universal (México)", "pais": "México", "classe": "B"}, {"id": 3962, "titulo": "México afianza el liderato de grupo tras una sufrida victoria ante Corea del Sur", "url": "https://elpais.com/mexico/2026-06-19/mexico-enfila-el-liderato-de-grupo-tras-una-sufrida-victoria-ante-corea-del-sur.html", "fonte_id": "elpais_america", "data_pub": "2026-06-19T03:31:00Z", "idioma": "es", "texto_pt": "A seleção mexicana, com uma formação inédita, superou um adversário coreano agressivo e valente.", "titulo_pt": "México consolida liderança do grupo com vitória suada sobre a Coreia do Sul", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 3835, "titulo": "Crónica del México - Corea del Sur: 1-0", "url": "https://www.infobae.com/america/agencias/2026/06/19/cronica-del-mexico-corea-del-sur-1-0/", "fonte_id": "infobae", "data_pub": "2026-06-19T03:30:00Z", "idioma": "es", "texto_pt": "Este título refere-se a um relato sobre um jogo entre México e Coreia do Sul, com o resultado final sendo uma vitória do México por 1 a 0.", "titulo_pt": "Crônica do México - Coreia do Sul: 1-0", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 3837, "titulo": "12 años de la coronación de Felipe VI en 12 hitos históricos: del referendum de Cataluña a su encuentro con las víctimas de la DANA", "url": "https://www.infobae.com/espana/2026/06/19/12-anos-de-la-coronacion-de-felipe-vi-en-12-hitos-historicos-del-referendum-de-cataluna-a-su-encuentro-con-las-victimas-de-la-dana/", "fonte_id": "infobae", "data_pub": "2026-06-19T03:30:00Z", "idioma": "es", "texto_pt": "Felipe VI subiu ao trono em 19 de junho de 2014, após mais de 38 anos de reinado do seu pai. Durante sua coroação, ele passou por diversos momentos históricos significativos.", "titulo_pt": "12 anos da coroação de Felipe VI em 12 momentos históricos: do referendo da Catalunha a seu encontro com as vítimas da DANA", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 3838, "titulo": "Orden de desahucio para Adolfo, su hija y su nieto de 4 años en Madrid: “Con mi salario nadie te alquila nada, no tenemos dónde ir”", "url": "https://www.infobae.com/espana/2026/06/19/orden-de-desahucio-para-adolfo-su-hija-y-su-nieto-de-4-anos-en-madrid-con-mi-salario-nadie-te-alquila-nada-no-tenemos-donde-ir/", "fonte_id": "infobae", "data_pub": "2026-06-19T03:30:00Z", "idioma": "es", "texto_pt": "A ordem de desalojamento está programada para o dia 24 de junho. A Plataforma de Afectados por la Hipoteca de Vallecas afirma que o banco nunca quis negociar.", "titulo_pt": "Ordem de Despejo para Adolfo, Sua Filha e Seu Neto de 4 Anos em Madrid", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 3839, "titulo": "La catedral sin techo de Mallorca: una obra modernista del ayudante de Gaudí que es clave para la cultura de la isla", "url": "https://www.infobae.com/espana/viajes/2026/06/19/la-catedral-sin-techo-de-mallorca-una-obra-modernista-del-ayudante-de-gaudi-que-es-clave-para-la-cultura-de-la-isla/", "fonte_id": "infobae", "data_pub": "2026-06-19T03:30:00Z", "idioma": "es", "texto_pt": "A construção da Igreja Nova teve início durante o período em que Joan Rubió i Bellver trabalhou após colaborar na Sagrada Família. Esta obra modernista é significativa para a cultura de Mallorca.", "titulo_pt": "A Catedral sem Tetos de Mallorca: uma obra modernista do auxiliar de Gaudí que é crucial para a cultura da ilha", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 3840, "titulo": "Las 10 mejores películas españolas en lo que va de año: de Pedro Almodóvar y su ‘Amarga Navidad’ a Isabel Coixet, pasando por Paco León y ‘Aída y vuelta’", "url": "https://www.infobae.com/espana/cultura/2026/06/19/las-10-mejores-peliculas-espanolas-en-lo-que-va-de-ano-de-pedro-almodovar-y-su-amarga-navidad-a-isabel-coixet-pasando-por-paco-leon-y-aida-y-vuelta/", "fonte_id": "infobae", "data_pub": "2026-06-19T03:30:00Z", "idioma": "es", "texto_pt": "O artigo destaca alguns dos filmes espanhóis mais importantes deste ano, apresentando uma variedade que inclui nomes consagrados como Pedro Almodóvar, além de promissores novos talentos como Paco León.", "titulo_pt": "As 10 Melhores Filmes Espanhóis do Ano Até Agora: de Pedro Almodóvar e sua 'Navideña Amarga' a Isabel Coixet, passando por Paco León e 'Aída e Vuelta'", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 3841, "titulo": "A días de declarar en el juicio, el padre de Loan se despegó de su hermana Laudelina: “No es parte de la familia”, dijo su abogada", "url": "https://www.infobae.com/sociedad/policiales/2026/06/19/a-dias-de-declarar-en-el-juicio-el-padre-de-loan-se-despego-de-su-hermana-laudelina-no-es-parte-de-la-familia-dijo-su-abogada/", "fonte_id": "infobae", "data_pub": "2026-06-19T03:30:00Z", "idioma": "es", "texto_pt": "O pai de Loan, José Peña, declarará em um juízo sobre a desaparição do filho, enquanto sua mãe também testemunhará. A abogada afirmou que Laudelina, irmã da vítima, não é mais considerada parte da família. O julgamento está programado para próxima semana.", "titulo_pt": "Pai de Loan se afasta da irmã Laudelina antes do julgamento", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 3842, "titulo": "Guía de Arte y Cultura: semana del 19 al 26 de junio de 2026", "url": "https://www.infobae.com/cultura/agenda-cultura/2026/06/19/guia-de-arte-y-cultura-semana-del-19-al-26-de-junio-de-2026/", "fonte_id": "infobae", "data_pub": "2026-06-19T03:30:00Z", "idioma": "es", "texto_pt": "A programação inclui uma variedade de atividades, como música, teatro, cinema, feiras, exposições e cursos, oferecendo várias opções imperdíveis durante a semana.", "titulo_pt": "Guia de Arte e Cultura: semana do 19 ao 26 de junho de 2026", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}, {"id": 3843, "titulo": "Vivir en un barrio pobre hace que pases más calor en verano: las ciudades dejan sin zonas verdes al 60% de la población y Ourense y Valencia son las peores", "url": "https://www.infobae.com/espana/2026/06/19/vivir-en-un-barrio-pobre-hace-que-pases-mas-calor-en-verano-las-ciudades-dejan-sin-zonas-verdes-al-60-de-la-poblacion-y-ourense-y-valencia-son-las-peores/", "fonte_id": "infobae", "data_pub": "2026-06-19T03:30:00Z", "idioma": "es", "texto_pt": "Nos bairros com menor renda, a área verde por habitante é menor do que nas áreas mais ricas, devido à maior densidade populacional. As cidades de Ourense e Valencia são consideradas as piores neste aspecto.", "titulo_pt": "Viver em bairros pobres aumenta o calor no verão devido à falta de áreas verdes", "veiculo": "Infobae", "pais": "Argentina", "classe": "B"}], "cultura": [{"id": 3861, "titulo": "El bar con cócteles de autor y cocina franco-vietnamita que se convirtió en una referencia de la noche porteña", "url": "https://www.lanacion.com.ar/revista-lugares/el-bar-con-cocteles-de-autor-y-cocina-franco-vietnamita-que-se-convirtio-en-una-referencia-de-la-nid19062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-19T03:30:00Z", "idioma": "es", "texto_pt": "CoChinChina, liderado pela mixologista Inés de los Santos, é hoje um dos bares argentinos mais bem posicionados em rankings internacionais, conhecido por sua decoração e coquetéis que transportam os clientes para outras partes do mundo.", "titulo_pt": "O bar com coquetéis de autor e cozinha franco-vietnamita que se tornou uma referência da noite porteña", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 3862, "titulo": "Así quedó la tabla de posiciones del grupo de México, tras la fecha 2", "url": "https://www.lanacion.com.ar/deportes/futbol/asi-quedo-la-tabla-de-posiciones-del-grupo-de-mexico-tras-la-fecha-2-nid19062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-19T03:27:00Z", "idioma": "es", "texto_pt": "O México venceu Coreia do Sul por 1 a 0 e assumiu o primeiro lugar no grupo, garantindo sua classificação para as oitavas de final; República Tcheca e África do Sul empataram em 1 a 1.", "titulo_pt": "Assim ficou a tabela de classificação do grupo do México, após a terceira rodada", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 4336, "titulo": "Le Sserafim’s Chaewon to resume activities", "url": "https://www.koreaherald.com/article/10781854", "fonte_id": "korea_herald", "data_pub": "2026-06-19T03:26:00Z", "idioma": "en", "texto_pt": "Kim Chaewon, integrante do Le Sserafim, voltará a se juntar aos colegas de banda na próxima semana após um mês de descanso para tratar dores no pescoço. A artista recuperou-se o suficiente para retomar as atividades e a música 'Boompala', parte do álbum 'Pureflow Pt. 1', será promovida novamente.", "titulo_pt": "Chaewon do Le Sserafim retornará às atividades", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 3863, "titulo": "México le ganó a Corea del Sur con un gol insólito y se aseguró el primer puesto de su grupo", "url": "https://www.lanacion.com.ar/deportes/futbol/mexico-vs-corea-del-sur-en-vivo-por-el-mundial-2026-nid18062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-19T03:24:00Z", "idioma": "es", "texto_pt": "No estádio Guadalajara, a seleção mexicana venceu a Coreia do Sul por 1-0 aproveitando uma falha do goleiro adversário e se classificou para os 16avos de final jogando em casa.", "titulo_pt": "México venceu Coreia do Sul com gol inusitado e garantiu primeiro lugar no grupo", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 4337, "titulo": "Monsta X’s Minhyuk releases 1st solo music", "url": "https://www.koreaherald.com/article/10781851", "fonte_id": "korea_herald", "data_pub": "2026-06-19T03:22:00Z", "idioma": "en", "texto_pt": "Minhyuk, membro do Monsta X, lançará sua primeira música solo digital intitulada 'Reaching' nesta sexta-feira. A canção é um rock moderno que reflete a jornada do artista em chegar aos seus fãs, com colaboração na letra e melodia por Ha Hyunsang. O Monsta X também concluiu sua turnê latino-americana intitulada 'The X'.", "titulo_pt": "Minhyuk do Monsta X lança seu primeiro single solo", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 4338, "titulo": "TXT Yeonjun’s 2nd solo EP to serve up ‘Ice Cream’", "url": "https://www.koreaherald.com/article/10781848", "fonte_id": "korea_herald", "data_pub": "2026-06-19T03:19:00Z", "idioma": "en", "texto_pt": "Yeonjun, membro do Tomorrow X Together, revelou o título da faixa-título de seu segundo EP solo, intitulado 'No Labels: Part 02', que será lançado em 10 de julho com o single 'Ice Cream'.", "titulo_pt": "TXT Yeonjun lança seu segundo EP com o single 'Ice Cream' no dia 10 de julho", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 3865, "titulo": "Día del Padre", "url": "https://www.lanacion.com.ar/opinion/dia-del-padre-nid19062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-19T03:15:00Z", "idioma": "es", "texto_pt": "O texto questiona a dificuldade e natureza do papel de pai, descrevendo-o como uma profissão sem formação prévia ou exame.", "titulo_pt": "Dia do Pai", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 4589, "titulo": "Jelly Roll Calls Out Cheating Rumors Amid Bunnie Xo Divorce: ‘My Best Friend Forever’", "url": "https://www.rollingstone.com/music/music-news/jelly-roll-bunnie-xo-divorce-cheating-rumors-1235580887/", "fonte_id": "rolling_stone_music", "data_pub": "2026-06-19T03:15:00Z", "idioma": "en", "texto_pt": "O cantor country negou rumores de infidelidade circulando online após anunciar o divórcio com Bunnie Xo.", "titulo_pt": "Jelly Roll Desafia Mídia sobre Acusações de Infidelidade Durante Divórcio com Bunnie Xo", "veiculo": "Rolling Stone - Música", "pais": "EUA", "classe": "B"}, {"id": 3867, "titulo": "Una ansiada espera", "url": "https://www.lanacion.com.ar/editoriales/una-ansiada-espera-nid19062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-19T03:10:00Z", texto_pt": "A atriz Florencia Peña informou erroneamente que o pai do jogador Lionel Messi havia falecido. A família do atleta precisou emitir um comunicado para esclarecer a situação de saúde de Jorge Messi.", "titulo_pt": "Florencia Peña foi demitida da Luzu por notícias falsas sobre o pai de Messi", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 3871, "titulo": "Los peligros del falso periodismo", "url": "https://www.lanacion.com.ar/espectaculos/los-peligros-del-falso-periodismo-nid19062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-19T03:05:00Z", "idioma": "es", "texto_pt": "Uma notícia falsa sobre o pai de Messi levantou debates sobre as armadilhas de um ambiente de comunicação sem regras.", "titulo_pt": "Perigos do Falso Jornalismo", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 3872, "titulo": "La absolución de De Vido", "url": "https://www.lanacion.com.ar/editoriales/la-absolucion-de-de-vido-nid19062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-19T03:05:00Z", "idioma": "es", "texto_pt": "O texto se refere à absolvição de De Vido, mas não fornece detalhes adicionais sobre o contexto ou as circunstâncias específicas desse julgamento.", "titulo_pt": "A absolvição de De Vido", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 3873, "titulo": "El bar con impronta inglesa que se transformó en el más icónico de San Telmo", "url": "https://www.lanacion.com.ar/sabado/el-bar-con-impronta-inglesa-que-se-transformo-en-el-mas-iconico-de-san-telmo-nid19062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-19T03:02:00Z", "idioma": "es", "texto_pt": "Em 2001, Alex Fullin retornou inspirado da Europa e inaugurou um pub com uma ampla variedade de cervejas, um ambiente de clube e muitas histórias.", "titulo_pt": "O bar com influência inglesa que se tornou o mais icônico de San Telmo", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 3874, "titulo": "24 horas en el monasterio: cómo se vive entre monjes de semiclausura, salmos al amanecer y comida frugal", "url": "https://www.lanacion.com.ar/revista-lugares/24-horas-en-el-monasterio-como-se-vive-entre-monjes-de-semiclausura-salmos-al-amanecer-y-comida-nid19062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-19T03:02:00Z", "idioma": "es", "texto_pt": "Crônica sobre uma experiência marcada pela austera e introspectiva vida em um mosteiro localizado a 310 km de Buenos Aires.", "titulo_pt": "24 horas no mosteiro: como se vive entre monges de semiclaustro, salmos ao amanhecer e comida frugal", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}], "ciencia_tecnologia": [{"id": 4335, "titulo": "Korea expands insurance coverage for treatment of severe hair loss", "url": "https://www.koreaherald.com/article/10781855", "fonte_id": "korea_herald", "data_pub": "2026-06-19T03:26:00Z", "idioma": "en", "texto_pt": "A partir de 1º de julho, a Coreia do Sul incluirá na cobertura do programa de seguro estatal o uso de Olumiant (baricitinib) para tratar casos severos de calvície localizada (alopecia areata).", "titulo_pt": "Coreia do Sul amplia cobertura de seguros para tratamento de queda severa de cabelo", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 4410, "titulo": "SK Hynix reportedly held U.S. talks on HBM supply and local investment plans", "url": "https://www.digitimes.com/news/a20260618PD233/sk-hynix-hbm-investment-shipments-supply-chain.html", "fonte_id": "digitimes", "data_pub": "2026-06-19T03:23:00Z", "idioma": "en", "texto_pt": "De acordo com fontes da indústria, a SK Hynix teria realizado uma reunião privada com Allison Hooker, subsecretária do Departamento de Estado dos Estados Unidos, onde possivelmente foram discutidos acordos sobre memória de alta banda e planos de expansão de investimento em semicondutores nos EUA.", "titulo_pt": "SK Hynix teria mantido reuniões privadas com subsecretária dos EUA sobre fornecimento de HBM e planos de investimento", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 4411, "titulo": "EU fast-tracks US tariff deal, adds three Trump safeguards", "url": "https://www.digitimes.com/news/a20260618PD234/eu-market-donald-trump-exports.html", "fonte_id": "digitimes", "data_pub": "2026-06-19T03:23:00Z", "idioma": "en", "texto_pt": "O European Union acelerou um acordo sobre tarifas com os Estados Unidos após Donald Trump exigir que a União Europeia concluísse o acordo até o feriado da Independência dos EUA em 4 de julho, ameaçando aumentar as tarifas para 25% sobre importações de veículos e peças. O Parlamento Europeu realizou uma votação emergencial para aprovar o acordo, enquanto a UE adicionou três salvaguardas para proteger-se contra novos aumentos de tarifas.", "titulo_pt": "UE acelera acordo de tarifas com EUA, adicionando três salvaguardas de Trump", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 4412, "titulo": "GBC returns to capital markets with three technology platforms", "url": "https://www.digitimes.com/news/a20260618PD238/technology-2025-testing-revenue-brand.html", "fonte_id": "digitimes", "data_pub": "2026-06-19T03:22:00Z", "idioma": "en", "texto_pt": "A General Biologicals (GBC) realizou sua assembleia geral de acionistas no dia 17, anunciando que a empresa está passando de uma fase de reestruturação para um crescimento escalável e internacional. A companhia de medicina personalizada investe em demanda global clara em medicina personalizada, saúde inteligente e medicina regenerativa, expandindo seus sistemas CLIA/AIO, tecnologia de teste de células tumorais circulantes (CTC), marca Oh care e presença internacional.", "titulo_pt": "GBC retorna aos mercados de capitais com três plataformas tecnológicas", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 4444, "titulo": "Scientists finalize H5 bird flu findings from Heard Island and McDonald Island voyages", "url": "https://phys.org/news/2026-06-scientists-h5-bird-flu-heard.html", "fonte_id": "phys_org", "data_pub": "2026-06-19T03:20:00Z", "idioma": "en", "texto_pt": "Cientistas do Programa Antártico Australiano estão contribuindo para o entendimento global da disseminação da influenza aviar H5 (gripe aviária) com a publicação de seus achados recentes das viagens às remotas ilhas sub-Antárticas Heard e McDonald. Os resultados, que incluem níveis de mortalidade e possíveis caminhos do vírus para Heard Island, foram enviados para consideração em uma revista científica e estão disponíveis no servidor preprint bioRxiv.", "titulo_pt": "Cientistas finalizam estudos sobre gripe aviária H5 nas viagens às ilhas Heard e McDonald", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 4413, "titulo": "Cornelis-powered Lynx supercomputer enters service at LLNL, expanding NNSA computing capacity", "url": "https://www.digitimes.com/news/a20260618VL201/capacity-intel-hpc-production-nvidia.html", "fonte_id": "digitimes", "data_pub": "2026-06-19T02:54:00Z", "idioma": "en", "texto_pt": "O Cornelis Networks anunciou o lançamento bem-sucedido do cluster supercomputacional Lynx na Lawrence Livermore National Laboratory, dos EUA, como parte do programa Commodity Technology Systems (CTS-2) do National Nuclear Security Administration (NNSA). Este evento representa um marco para a plataforma de rede CN5000 Omni-Path da Cornelis Networks.", "titulo_pt": "Supercomputador Lynx, alimentado por Cornelis, entra em serviço no LLNL, expandindo a capacidade de cálculos do NNSA", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 4414, "titulo": "China chip supply chain feels squeeze from AI server MLCCs to 8-bit MCUs", "url": "https://www.digitimes.com/news/a20260618VL202/passive-components-mlcc-mcu-demand-ai-server-supply-chain.html", "fonte_id": "digitimes", "data_pub": "2026-06-19T02:54:00Z", "idioma": "en", "texto_pt": "A cadeia de suprimentos c const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const rot = n.topico ? (D.rotulos_topico[n.topico] || n.topico) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(n.topico || '')}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
