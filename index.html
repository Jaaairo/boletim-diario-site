<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
  /* Podcast do dia — dois apresentadores */
  .podcast-card { background: var(--panel); border: 1px solid var(--border);
                  border-left: 4px solid var(--acento); border-radius: 8px;
                  padding: 16px 18px; margin-bottom: 28px; }
  .podcast-hd { font-weight: 700; font-size: 18px; color: var(--azul);
                display: flex; align-items: center; gap: 8px; }
  .podcast-ico { font-size: 20px; }
  .podcast-sub { color: var(--texto2); font-size: 14px; margin: 4px 0 12px; }
  .podcast-audio { width: 100%; }
</style>
</head>

  <h1>pan<span class="logo-o">o</span>rama</h1>

</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">
    <div class="modal-erro" id="senha-erro" style="display:none">Senha incorreta.</div>
    <div class="modal-btns">

  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>
      <option value="classificacao_errada">Classificação errada</option>
      <option value="resumo_impreciso">Resumo impreciso</option>
      <option value="outro">Outro</option>

    <label for="flag-nota">Nota (opcional)</label>
    <textarea id="flag-nota" placeholder="Descreva o problema..."></textarea>
    <div class="modal-btns">
      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

em caso de inadimplência.", "mundo": "O novo primeiro-ministro do Reino Unido, Andy Burnham, prometeu alívio financeiro para a classe média britânica e enfrenta críticas de seus adversários. Em conversas recentes por telefone com Donald Trump, eles discutiram questões sobre o petróleo do Mar do Norte, comércio internacional e segurança na região de Ormuz. No Afeganistão, flashfloods deixaram pelo menos 23 mortos em Nuristan, enquanto o presidente iraniano declarou que seu país está em guerra aberta contra os Estados Unidos. Em Nigeria, 19 milhões de crianças evitam a escola por medo de sequestros, refletindo as constantes ameaças à segurança local. A Coreia do Sul viu o Parlamento aprovar uma extensão da investigação do procurador especial sobre o ex-presidente Yoon, enquanto o governo japonês atualizou seu código de governança corporativa para empresas listadas. No Brasil, Daniel Ortega, presidente da Nicarágua, anunciou que não haverá mais eleições no país e estabeleceu leis para impedir a volta da oposição ao poder. Além disso, em agosto, o príncipe e a princesa do Japão visitarão o Paraguai, onde se encontrarão com autoridades e imigrantes japoneses residentes lá.\n\nA situação geopolítica internacional continua marcada por tensões e confrontos. De acordo com relatos da mídia israelense, a Turquia estaria disposta a fornecer apoio aéreo ao Irã se milícias curdas tivessem invadido o país iraniano, uma possibilidade que levantou preocupações em Washington, onde Donald Trump pediu à Ankará para manter-se afastada. Em outro desenvolvimento importante, um navio de guerra russo realizou um raro exercício de tiro ao vivo a 45 milhas sul da Plymouth na costa britânica, destacando o aumento das atividades militares russas no Atlântico Ocidental. Além disso, a Coreia do Sul e Austrália se comprometeram a expandir as trocas e cooperação militares, refletindo a crescente preocupação com a estabilidade regional na Ásia-Pacífico.", "economia": "O Brasil enfrenta uma nova ameaça no mercado de proteína, especialmente no setor do frango, com a China se tornando um concorrente direto. De acordo com um relatório do BTG, o país asiático passou a ser não apenas um grande comprador de produtos brasileiros nesse segmento, mas também uma potencial concorrência. Por outro lado, os Estados Unidos estão prestes a perder seu status como maior exportador agrícola mundial, conforme informado pelo Financial Times. No cenário internacional, o Japão está expandindo seus produtos financeiros e movendo-se para negócios mais arriscados e de maior lucratividade, em um novo período para as instituições bancárias japonesas, conforme relatado pela Japan Times. A Coreia do Sul registrou uma forte recuperação nas ações da indústria dos semicondutores, com os mercados locais encerrando o dia com altas significativas, segundo relatos da Yonhap News e outros veículos. Além disso, as exportações sul-coreanas aumentaram 52% nos primeiros 20 dias de julho, impulsionadas por uma demanda robusta para chips, conforme noticiado pela mesma fonte. No âmbito doméstico, o Brasil enfrenta desafios na implementação da reforma tributária, com representantes do setor tecnológico alertando que o prazo insuficiente pode comprometer a concretização do novo modelo de tributos IBS e CBS, conforme informado pelo Folha Mercado.", "tecnologia": "A tecnologia está progredindo em vários setores, com destaque para a expansão da inteligência artificial e novas aplicações. A empresa Gritt, que recentemente saiu do modo stealth, recebeu $34 milhões para automatizar tarefas nas construções de parques solares e planeja expandir sua tecnologia posteriormente. Em outro desenvolvimento, a Google estaria trabalhando em um novo chip que incorpora informações dos seus modelos de IA Gemini diretamente no silício com o objetivo de aumentar a eficiência. Além disso, a China está consultando empresas sobre como impedir que o Ocidente adquira suas tecnologias avançadas e startups promissoras, considerando a possibilidade de implementar controles mais rígidos nas exportações de modelos de inteligência artificial e chips. Em um desenvolvimento legal, o parlamento francês está prestes a aprovar uma lei que proibirá as redes sociais para menores de 15 anos, tornando a França o primeiro país europeu a estabelecer um limite de idade digital, com a aplicação da lei começando em setembro. Essas notícias destacam o rápido avanço tecnológico e suas implicações legais e sociais.", "ciencia": "Astrônomos capturaram pela terceira vez em 35 anos uma erupção de buraco negro no centro da galáxia IC 3599, permitindo observar a erupção em tempo real. Este é o primeiro caso registrado de tal evento sendo acompanhado desde o início. Paralelamente, um comitê concluiu que aproximadamente 10% das mortes no acidente de multidão de 2022 podem ter sido causadas por razões diferentes do sufocamento. Em outro estudo, pesquisadores da Unifesp identificaram cerca de 450 espécies de animais e algas vivendo sobre bancos de rodolitos no litoral brasileiro utilizando DNA ambiental. A Genu-in Academy lançou uma plataforma que reúne evidências científicas sobre colágeno, oferecendo webinars e materiais técnicos relacionados ao tema. Além disso, a JBS investiu em ciência e inovação com essa plataforma. Um estudo indica que o conhecimento tradicional e indígena pode desempenhar um papel crucial na solução de desafios globais como mudança climática e perda da biodiversidade. Outro trabalho sugere que uma hormona produzida pelo timo ajuda a reduzir a inflamação associada ao envelhecimento, conforme descoberto em pesquisas com ratos.", "cultura": "O artista cubano Luis Manuel Otero Alcántara, que está exilado nos Estados Unidos após ter sido dissidente na Cuba, é destacado por um especialista em Homero. Por outro lado, uma teoria bíblica sugere que um segredo oculto nas Escrituras Sagradas poderia prever o fim do mundo, mas esse conhecimento foi suprimido pelo catolicismo ao longo de milênios. O prefeito do Rassemblement National, Jean-Dominique Artaud, cancelou um show dedicado à Rainha em Orange por questões orçamentárias, afetando os planos de centenas de cantores voluntários. A renovação do contrato de Virgílio Silva com a Globo até 2029 e o possível retorno de Vitória Strada para uma novela das sete na emissora são notícias sobre a indústria da TV brasileira. O Festival de Joinville abriu com 'Don Quixote', enquanto o Museu de Arte Moderna de São Paulo reabre após obras de restauro, oferecendo uma instalação luminosa de Carmela Gross para apreciação pública.", "sociedade": "Um jovem de 18 anos na Província de Gyeonggi, na Coreia do Sul, enfrentou problemas financeiros após investir em jogos online e acabou denunciando o problema à polícia através de um programa voluntário. De acordo com relatos, foram registrados 806 casos semelhantes no primeiro bimestre desse programa. Em outro fato importante, a França está avançando com uma proposta que proibirá o uso de redes sociais por menores de 15 anos, salvo surpresa; o texto deverá ser aprovado na terça-feira. Além disso, um sistema frontal no Chile causou 10 mortes e deixou cerca de 2.400 pessoas afetadas nas regiões do Atacama e La Araucanía, com evacuações preventivas continuas sendo realizadas.", "meio_ambiente": "Um temporal causou 10 mortes e deixou cerca de 100 mil pessoas isoladas no Chile, com milhares de moradias destruídas. Por outro lado, a China está implementando um plano para expandir as fontes renováveis até 2030, apostando em energias limpas como estratégia principal para atingir suas metas ambientais. No Brasil, a área queimada foi reduzida em 31% em 2025, mas o Cerrado e a Amazônia continuam sendo os principais focos de incêndios, responsáveis por 86% dos focos de fogo desde 1985. Em Rio Grande do Sul, foi destacada a falta de uma política nacional de adaptação climática para escolas e crianças, enquanto o governo local registrou um caso de gripe aviária em uma criação de subsistência sem afetar a boa reputação internacional do país. Além disso, a falta de proteção para habitats de espécies endêmicas e a necessidade urgente de ações globais para proteger sítios culturais diante das mudanças climáticas foram abordados em outros artigos.", "direitos_humanos": "O governo da Argentina revogou prêmios estatais concedidos a indivíduos envolvidos no golpe militar de 1976 e em atos de violência estatal, sinalizando um passo importante na busca por justiça para as vítimas passadas. Em outro desenvolvimento, o presidente da Associação Australiana de Sobreviventes do Holocausto e Descendentes, George Foster, alertou sobre paralelos perturbadores entre a exclusão dos judeus na Austrália e a atmosfera social da Alemanha nazista, enfatizando que instituições democráticas devem estar atentas a esses riscos. Na Indonésia, a escravidão continua sendo uma realidade quotidiana em Sumba, onde pessoas nascem em situação de servidão e trabalham sem remuneração, refletindo uma violação grave dos direitos humanos."}, "resumo_do_dia": {"politica_nacional": [{"id": 63930, "titulo": "Flávio oscila para cima e volta a empatar com Lula em segundo turno, diz pesquisa", "url": "https://veja.abril.com.br/politica/flavio-oscila-para-cima-e-volta-a-empatar-com-lula-em-segundo-turno-diz-pesquisa/", "fonte_id": "veja", "data_pub": "2026-07-21T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma nova pesquisa da Real Time Big Data indica que o senador Flávio Bolsonaro tem oscilado dentro do intervalo de erro permitido, mantendo-se em segundo lugar nas intenções de voto para as eleições presidenciais. O levantamento sugere uma estabilidade na posição dele, sem grandes variações.", "titulo_pt": "Flávio oscila para cima e volta a empatar com Lula no segundo turno, diz pesquisa", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 63909, "titulo": "Cotada para vice de Flávio usa tarifaço para pedir impeachment de Lula", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/cotada-para-vice-de-flavio-usa-tarifaco-para-pedir-impeachment-de-lula.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-21T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A deputada Júlia Zanatta, cotada para vice do candidato Flávio, está coletando assinaturas para apresentar um pedido de impeachment contra o presidente Lula. Ela planeja apresentar o pedido quando retorna do recesso parlamentar.", "titulo_pt": "Deputada cotada para vice usa tarifaço para pedir impeachment de Lula", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 64097, "titulo": "O novo papel da reclamação no recurso especial", "url": "https://www.jota.info/opiniao-e-analise/artigos/o-novo-papel-da-reclamacao-no-recurso-especial", "fonte_id": "jota", "data_pub": "2026-07-21T08:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O novo papel da reclamação no recurso especial aproxima a relevância da questão federal, o uso de precedentes qualificados e o controle excepcional de observância.", "titulo_pt": "Novo papel da reclamação no recurso especial", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 64099, "titulo": "A retirada da substituição tributária e os desafios da implementação da reforma", "url": "https://www.jota.info/opiniao-e-analise/artigos/a-retirada-da-substituicao-tributaria-e-os-desafios-da-implementacao-da-reforma", "fonte_id": "jota", "data_pub": "2026-07-21T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A implementação da reforma tributária enfrentará desafios na transição, com a administração fiscal sendo crucial para garantir uma mudança segura.", "titulo_pt": "A retirada da substituição tributária e os desafios de implementar a reforma", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 64016, "titulo": "Cenário fiscal: “Pecado mortal” está em pautas-bomba, diz economista", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/cenario-fiscal-pecado-mortal-esta-em-pautas-bomba-diz-economista/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-21T07:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Especialistas alertam que o próximo governo precisará implementar reformas para controlar a dívida pública. O cenário fiscal está sendo descrito como um 'pecado mortal' devido aos desafios financeiros atuais.", "titulo_pt": "Cenário fiscal: ‘pecado mortal’ está em pautas-bomba, diz economista", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 63910, "titulo": "Paes tenta quebrar jejum de ex-prefeitos do Rio no governo após ascensão de lideranças da Baixada", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/paes-tenta-quebrar-jejum-de-ex-prefeitos-do-rio-no-governo-apos-ascensao-de-liderancas-da-baixada.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-21T07:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ex-prefeito do Rio de Janeiro Eduardo Paes (PSD) busca levar um ex-prefeito da capital fluminense ao governo do estado pela primeira vez desde 1994. Marcello Alencar, do PSDB, foi o último egresso do Palácio da Cidade a governar o Rio de Janeiro.", "titulo_pt": "Paes tenta trazer ex-prefeito do Rio para o governo após longo jejum", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 63901, "titulo": "Governo propõe que União arque com salário de servidores afastados para sindicatos; custo é de R$ 15,4 milhões ao ano", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/governo-propoe-que-uniao-arque-com-salario-de-servidores-afastados-para-sindicatos-custo-e-de-r-154-milhoes-ao-ano.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-21T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo propôs um projeto de lei que passa a fazer com que a União arque com os salários dos servidores licenciados para exercer mandatos sindicais, sem o ressarcimento atualmente feito pelas entidades. A mudança implicaria um custo anual de cerca de R$ 15,4 milhões.", "titulo_pt": "Governo propõe que União arque com salário de servidores afastados para sindicatos", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 62683, "titulo": "Planalto incentiva ministros a darem entrevistas, mas pede cautela para não ferirem lei eleitoral", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/planalto-incentiva-ministros-a-darem-entrevistas-mas-pede-cautela-para-nao-ferirem-lei-eleitoral.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-21T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ministra da Casa Civil, Miriam Belchior, incentivou os ministros a concederem entrevistas sobre as ações do governo Lula durante uma reunião na semana passada. No entanto, ela enfatizou a necessidade de evitar que essas entrevistas possam ser consideradas propaganda eleitoral.", "titulo_pt": "Planalto incentiva ministros a darem entrevistas com cautela para não violar lei eleitoral", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 62684, "titulo": "Lula avalia faltar a debates na TV durante a campanha, e tema divide cúpula do PT", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/lula-avalia-faltar-a-debates-na-tv-durante-a-campanha-e-tema-divide-cupula-do-pt.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-21T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente Lula está avaliando não participar dos debates com outros candidatos durante o primeiro turno da campanha. Este tema divide a cúpula do PT.", "titulo_pt": "Lula considera não comparecer a debates na TV e divisão no PT", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 62766, "titulo": "Amapá admitiu rombo de quase R$ 1 bi no caixa 44 dias após tomar crédito com garantia da União", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/amapa-admitiu-rombo-de-quase-r-1-bi-no-caixa-44-dias-apos-tomar-credito-com-garantia-da-uniao.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-21T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo do Amapá anunciou um rombo financeiro de quase R$ 1 bilhão no caixa, apenas 44 dias após contratar um empréstimo de R$ 536 milhões com garantia do Tesouro Nacional. O crédito foi concedido para garantir os pagamentos em caso de inadimplência.", "titulo_pt": "Amapá admite rombo de quase R$ 1 bi no caixa 44 dias após contratar empréstimo com garantia da União", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 62770, "titulo": "Um plano fiscal para o Brasil: da comunicação com o povo à reforma orçamentária", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/um-plano-fiscal-para-o-brasil-da-comunicacao-com-o-povo-a-reforma-orcamentaria.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-21T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O artigo é o quinto e último da série que aborda a gestão fiscal no Brasil, desde a comunicação com o público até as reformas orçamentárias.", "titulo_pt": "Um plano fiscal para o Brasil: da comunicação ao ajuste orçamentário", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 62855, "titulo": "O fator que pode fazer o eleitor recorrer ao voto útil na eleição presidencial de 2026", "url": "https://veja.abril.com.br/politica/o-fator-que-pode-fazer-eleitor-recorrer-ao-voto-util-na-eleicao-presidencial-de-2026/", "fonte_id": "veja", "data_pub": "2026-07-21T01:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um cientista político destaca uma mudança no comportamento do eleitorado que pode influenciar a dinâmica da disputa presidencial de 2026 nas próximas semanas.", "titulo_pt": "Fator que pode fazer o eleitor recorrer ao voto útil na eleição presidencial de 2026", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 62899, "titulo": "Sudeste é a única região do país que perdeu eleitores desde 2022, diz TSE", "url": "https://www.cnnbrasil.com.br/eleicoes/sudeste-e-a-unica-regiao-do-pais-que-perdeu-eleitores-desde-2022-diz-tse/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-21T01:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Sudeste é a única região do Brasil que registrou uma perda de eleitores desde 2022, segundo dados do TSE. O Norte foi a região com maior crescimento proporcional no número de eleitores aptos para as eleições de outubro, totalizando 158,7 milhões de eleitores.", "titulo_pt": "Sudeste é a única região que perdeu eleitores desde 2022, diz TSE", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 62886, "titulo": "Milei na Convenção do PL e Dudu com “green card”: o caminho das pedras", "url": "https://www.metropoles.com/colunas/reinaldo-azevedo/milei-na-convencao-do-pl-e-dudu-com-green-card-o-caminho-das-pedras", "fonte_id": "metropoles", "data_pub": "2026-07-21T01:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto destaca a importância de não mudar o rumo do bolsonarismo, afirmando que isso seria melhor para o Brasil. Além disso, é mencionado um possível 'green card' para Dudu e Milei na Convenção do PL.", "titulo_pt": "Bolsonarismo deve manter rumo: declarações sobre Convenção e 'green card'", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 62903, "titulo": "Waack: Dino quer tirar o supremo poder dos caciques", "url": "https://www.cnnbrasil.com.br/politica/waack-dino-quer-tirar-o-supremo-poder-dos-caciques/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-21T01:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O ministro parece disposto a limitar o poder dos caciques, defendendo a supremacia do Supremo Tribunal Federal sobre os poderes legislativo e executivo.", "titulo_pt": "Waack: dino quer tirar o poder supremo dos caciques", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 62904, "titulo": "Câmara diz ao STF que indicação de emendas seguiu regras de transparência", "url": "https://www.cnnbrasil.com.br/politica/camara-diz-ao-stf-que-indicacao-de-emendas-seguiu-regras-de-transparencia/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-21T00:57:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Advocacia da Câmara informou ao Supremo Tribunal Federal (STF) que a indicação de beneficiários para recebimento de recursos das emendas parlamentares seguiu as regras de transparência. O ministro Flávio Dino solicitou explicações sobre o processo.", "titulo_pt": "Câmara informa STF que indicação de emendas cumpriu regras de transparência", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 64157, "titulo": "These men went to college in search of stable careers. They found it in nursing", "url": "https://www.npr.org/2026/07/21/nx-s1-5869813/nursing-men-jobs-male-nurses", "fonte_id": "npr_news", "data_pub": "2026-07-21T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A proporção de homens entre os enfermeiros está aumentando, com cerca de 12% dos enfermeiros sendo homens atualmente. O mercado de trabalho forte para enfermeiros e esforços contínuos para recrutar homens no campo têm contribuído para este crescimento, incluindo na região sul dos Estados Unidos.", "titulo_pt": "Esses homens foram à faculdade em busca de carreiras estáveis. Eles encontraram em enfermagem", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 64088, "titulo": "New UK Prime Minister Burnham Promises Hope and Change. The Hurdles Are High.", "url": "https://www.nytimes.com/2026/07/21/world/europe/andy-burnham-new-uk-prime-minister-policies.html", "fonte_id": "nyt_world", "data_pub": "2026-07-21T09:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O novo primeiro-ministro do Reino Unido, Andy Burnham, prometeu políticas que darão aos britânicos de classe média alívio financeiro. No entanto, seus adversários já estão criticando suas propostas.", "titulo_pt": "Novo Prime Minister britânico Burnham promete esperança e mudanças. Os obstáculos são altos.", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 63988, "titulo": "Trump discute petróleo do Mar do Norte, comércio e Ormuz em ligação com Burnham", "url": "https://www.infomoney.com.br/mundo/trump-discute-petroleo-do-mar-do-norte-comercio-e-ormuz-em-ligacao-com-burnham/", "fonte_id": "infomoney", "data_pub": "2026-07-21T09:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Trump conversou com o novo primeiro-ministro do Reino Unido sobre petróleo do Mar do Norte, comércio e a região de Ormuz. A discussão ocorreu por meio de uma ligação telefônica.", "titulo_pt": "Trump discute petróleo do Mar do Norte, comércio e Ormuz com novo primeiro-ministro do reino unido", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 64215, "titulo": "'We're living in fear': 19 million children in Nigeria are out of school to avoid kidnappings", "url": "https://www.france24.com/en/video/20260721-we-re-living-in-fear-19-million-children-in-nigeria-are-out-of-school-to-avoid-kidnappings", "fonte_id": "france24", "data_pub": "2026-07-21T09:44:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em Nigeria, 19 milhões de crianças evitam ir à escola por medo de sequestros. Desde a abdução em massa das meninas de Chibok em 2014, o país tem enfrentado ondas de sequestros de alunos. A falta de acesso à educação é uma das maiores barreiras para as crianças estudarem.", "titulo_pt": "Nós vivemos com medo: 19 milhões de crianças na nigéria estão fora da escola para evitar sequestradores", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 64507, "titulo": "A Red Sea blockade threatens a new front in U.S.-Iran war", "url": "https://www.washingtonpost.com/world/2026/07/21/red-sea-blockade-threatens-new-front-us-iran-war/", "fonte_id": "washington_post_world", "data_pub": "2026-07-21T09:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos realizaram mais uma noite de ataques, e Teerã respondeu com novas operações em Jordânia e Bahrein.", "titulo_pt": "Bloqueio do mar vermelho ameaça nova frente na guerra entre EUA e Irã", "veiculo": "Washington Post - World", "pais": "EUA", "classe": "A"}, {"id": 64312, "titulo": "Meloni, a Bologna fatto inaccettabile, accertare la verità con rigore", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/21/meloni-a-bologna-fatto-inaccettabile-accertare-la-verita-con-rigore_d63a99e0-0caf-40c2-8256-01228402fa9e.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-21T09:40:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "A declaração de Meloni sobre o incidente em Bologna afirma que não há espaço para preconceitos ou desculpas, mas também rejeita a violência contra os agentes.", "titulo_pt": "Meloni, em Bologna, considera inaceitável violência contra agentes; busca ver a verdade com rigor", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 64089, "titulo": "UK’s New Prime Minister Burnham Orders Cut in Taxes on Electricity", "url": "https://www.nytimes.com/2026/07/21/world/europe/uk-andy-burnham-electricity-tax-vat.html", "fonte_id": "nyt_world", "data_pub": "2026-07-21T09:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O novo primeiro-ministro do Reino Unido, Andy Burnham, ordenou uma redução nas taxas de eletricidade como parte das medidas para enfrentar o alto custo de vida. O presidente dos Estados Unidos, Donald Trump, telefonou para parabenizá-lo recentemente.", "titulo_pt": "Novo primeiro-ministro do reino unido ordena corte nas taxas de eletricidade", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 64313, "titulo": "Terna, domanda elettricità giugno al top da 10 anni, pesa il caldo", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/21/terna-domanda-elettricita-giugno-al-top-da-10-anni-pesa-il-caldo_ccb1f004-1b3d-421a-8f8d-749fb1cd9a4c.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-21T09:39:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O consumo de eletricidade na Itália no mês de junho registrou um aumento de 1,8%, marcando o décimo aumento consecutivo. Este aumento foi influenciado pelas condições climáticas quentes.", "titulo_pt": "Terna, demanda elétrica de junho atinge topo dos últimos 10 anos, pesa calor", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 64090, "titulo": "Flash Floods Kill at Least 23 in Afghanistan", "url": "https://www.nytimes.com/2026/07/21/world/asia/afghanistan-floods-deaths-nuristan.html", "fonte_id": "nyt_world", "data_pub": "2026-07-21T09:38:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Floods in Nuristan, uma província isolada no leste do Afeganistão, deixaram pelo menos 23 mortos e várias pessoas desaparecidas.", "titulo_pt": "Inundações matam ao menos 23 em nuristan, afeganistão", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 63995, "titulo": "Presidente do Irã diz que país está em “guerra em grande escala”", "url": "https://www.cnnbrasil.com.br/internacional/presidente-do-ira-diz-que-pais-esta-em-guerra-em-grande-escala/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-21T09:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente do Irã afirmou que o país está em guerra em grande escala e que os EUA não podem forçar rendição por ataques militares, concentrando-se no confronto econômico.", "titulo_pt": "Presidente do Irã diz que país está em 'guerra em grande escala'", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 64121, "titulo": "The Western Myth of Russian Greatness", "url": "https://foreignpolicy.com/2026/07/21/russia-myths-great-power-putin-war-ukraine/", "fonte_id": "foreign_policy", "data_pub": "2026-07-21T09:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Existe uma longa história de estrangeiros idealizando a Rússia e exagerando seu poder.", "titulo_pt": "A grandeza russa na mente ocidental: uma história idealizada", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 64227, "titulo": "U.S. strikes Iran and Houthis threaten Saudi Arabia shipping as mediators push 10-day ceasefire", "url": "https://www.cnbc.com/2026/07/21/us-iran-war-trump-hormuz-houthis.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-21T09:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Houve novos ataques dos Estados Unidos contra a Irã e os Houthis, enquanto mediadores regionais propuseram uma pausa de 10 dias para o conflito.", "titulo_pt": "Estados unidos atacam Irã e Houthis ameaçam navegação saudita enquanto mediadores sugerem cessar-fogo de 10 dias", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 64178, "titulo": "Trump \"public charge\" rule resets health test for green cards", "url": "https://www.axios.com/2026/07/21/public-charge-health-test-green-cards", "fonte_id": "axios", "data_pub": "2026-07-21T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo Trump estabeleceu formalmente a base para avaliar o uso de programas como Medicaid e CHIP por imigrantes ao determinar se eles devem obter residência permanente. Essa mudança na política pode dissuadir famílias imigrantes de buscar cobertura médica, o que poderia aumentar o uso dos pronto-socorros e ampliar as disparidades de saúde.", "titulo_pt": "Regra 'public charge' do governo trump redefine teste de saúde para cartões verdes", "veiculo": "Axios", "pais": "EUA", "classe": "B"}, {"id": 64282, "titulo": "Israeli media says Turkey was ready to intervene over Kurdish incursion into Iran", "url": "https://www.middleeasteye.net/news/israeli-media-says-turkey-was-ready-intervene-over-kurdish-incursion-iran", "fonte_id": "middle_east_eye", "data_pub": "2026-07-21T09:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "De acordo com a mídia israelense, a Turquia estaria disposta a fornecer apoio aéreo a Irã se milícias curdas tivessem invadido o país. O presidente americano, Donald Trump, teria pedido ao Erdogan que se mantivesse fora da guerra.", "titulo_pt": "Mídia israelense afirma que Turquia estaria disposta a auxiliar Irã em caso de invasão curda", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 64255, "titulo": "Philippine Foreign Secretary says ASEAN must work together", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/21/philippine-foreign-secretary-says-asean-must-work-together-2?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-21T09:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O secretário de Estado das Relações Exteriores filipino afirmou que a ASEAN deve trabalhar em conjunto.", "titulo_pt": "Secretário de estado das relações exteriores filipino diz que ASEAN deve trabalhar em conjunto", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 64283, "titulo": "Exclusive: President of ICC oversight body confirms no finding of retaliation by Khan", "url": "https://www.middleeasteye.net/news/exclusive-president-icc-oversight-body-confirms-no-retaliation-by-prosecutor-karim-khan", "fonte_id": "middle_east_eye", "data_pub": "2026-07-21T09:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente do Conselho de Supervisão da Corte Penal Internacional, Paivi Kaukoranta, enviou uma carta aos membros do tribunal confirmado que não foram encontradas provas de retaliação contra o procurador-chefe Fatou Bensouda. Este foi em resposta a acusações levantadas por funcionários no próprio escritório da procuradora.", "titulo_pt": "Exclusivo: presidente do conselho de supervisão da corte penal internacional nega acusações de retaliação contra procurador-chefe", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}], "mundo__eventos": [], "economia": [{"id": 64092, "titulo": "Após repercussão negativa, Comitê Gestor do IBS suspende proposta de remuneração", "url": "https://www.jota.info/coberturas-especiais/pulso-da-reforma/apos-repercussao-negativa-comite-gestor-do-ibs-suspende-proposta-de-remuneracao", "fonte_id": "jota", "data_pub": "2026-07-21T09:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Comitê Gestor do IBS suspendeu uma proposta de remuneração que incluía adicionais de até R$ 64,6 mil e jetons de R$ 46 mil. Um projeto na Câmara dos Deputados tenta limitar esses pagamentos.", "titulo_pt": "Comitê Gestor do IBS suspende proposta de remuneração após repercussão negativa", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 64093, "titulo": "Da autorregulação de vitrine à autorregulação que funciona", "url": "https://www.jota.info/opiniao-e-analise/colunas/mulheres-na-regulacao/da-autorregulacao-de-vitrine-a-autorregulacao-que-funciona", "fonte_id": "jota", "data_pub": "2026-07-21T08:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Novos decretos e a abertura da tomada de subsídios pela ANPD até 17/8 estão definindo o novo desenho da autorregulação das plataformas digitais.", "titulo_pt": "Da autorregulação de vitrine à autorregulação que funciona", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 64094, "titulo": "Como o outsourcing fiscal se torna estratégico na nova agenda tributária", "url": "https://www.jota.info/opiniao-e-analise/artigos/como-o-outsourcing-fiscal-se-torna-estrategico-na-nova-agenda-tributaria", "fonte_id": "jota", "data_pub": "2026-07-21T08:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O outsourcing fiscal se transforma em uma estratégia estratégica para a nova agenda tributária, além de ser mais do que apenas uma solução operacional.", "titulo_pt": "Como o outsourcing fiscal se torna estratégico na nova agenda tributária", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 64234, "titulo": "Treasury yields edge lower as investors map geopolitical risks", "url": "https://www.cnbc.com/2026/07/21/treasury-yields-bonds-iran-us-politics.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-21T08:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os rendimentos das notas do Tesouro dos EUA de 10 anos, que servem como principal indicador da dívida governamental americana, permaneceram estáveis em 4,594%.", "titulo_pt": "Rendimentos das notas do tesouro dos EUA de 10 anos se mantêm estáveis enquanto investidores avaliam riscos geopolíticos", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 64233, "titulo": "Boeing and Airbus prepare for next narrow-body battle – but airlines aren’t pushing for new jets yet", "url": "https://www.cnbc.com/2026/07/21/boeing-airbus-narrow-body-planes-deliveries-737max-a320.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-21T08:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Boeing e Airbus estão desenvolvendo seus próximos aviões de corpo único, mas as companhias aéreas e investidores ainda se concentram na produção, nas entregas e nos atuais aviões.", "titulo_pt": "Boeing e Airbus preparam o próximo confronto no segmento de corpos únicos – mas as companhias aéreas não estão pedindo novos jatos ainda", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 64096, "titulo": "O ‘viés do reequilíbrio oportunista’", "url": "https://www.jota.info/opiniao-e-analise/colunas/farol-infraestrutura/o-vies-do-reequilibrio-oportunista", "fonte_id": "jota", "data_pub": "2026-07-21T08:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto aborda uma visão parcial que considera um contratado que busca compensação como alguém a ser desconfiado, em vez de reconhecer seu direito.", "titulo_pt": "O 'viesamento oportunista'", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 64326, "titulo": "JPMorgan among banks to help finance Japan’s $550 billion U.S. investment plan: sources", "url": "https://www.japantimes.co.jp/business/2026/07/21/companies/us-banks-help-japan-investment-pledge-in-us/", "fonte_id": "japan_times", "data_pub": "2026-07-21T08:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Bancos estão sendo mobilizados para financiar um plano de investimento de 550 bilhões de dólares dos Estados Unidos, proposto por Japan. As bancas japonesas têm sido relutantes, pois sua base de financiamento está em ienes e obter dólares para projetos de longo prazo de infraestrutura pode ser caro.", "titulo_pt": "Jpmorgan entre bancos a ajudar a financiar plano de investimento de 550 bilhões de dólares dos EUA no Japão: fontes", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 64327, "titulo": "Cabinet approves Japan economic blueprint with BOJ independence stressed", "url": "https://www.japantimes.co.jp/business/2026/07/21/economy/honebuto-cabinet-approval/", "fonte_id": "japan_times", "data_pub": "2026-07-21T07:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo japonês aprovou um plano econômico que enfatiza a independência do Banco do Japão. Uma passagem sugerindo uma redução da autonomia do banco central foi retirada do documento final.", "titulo_pt": "Gabinete aprova plano econômico do Japão, reforçando independência do BOJ", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 64443, "titulo": "S. Korean won strengthens as foreign investors remain net buyers of local stocks", "url": "https://en.yna.co.kr/view/AEN20260721009000320", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T07:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O won sul-coreano fortaleceu contra o dólar americano, com investidores estrangeiros continuando a ser compradores líquidos de ações locais.", "titulo_pt": "Won sul-coreano fortalece com compras estrangeiras de ações", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 64444, "titulo": "(2nd LD) Seoul stocks close over 3 pct higher on chip rebound", "url": "https://en.yna.co.kr/view/AEN20260721007552320", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T07:38:00Z", "idioma": "en", "provavel_duplicata_de": 64415, "texto_pt": "As ações na Séul encerraram o dia com alta superior a 3%, interrompendo uma sequência de duas sessões negativas, impulsionadas pelo desempenho das empresas fabricantes de chips.", "titulo_pt": "(2º LD) ações da séul fecham com ganhos superiores a 3% após recuperação do setor de semicondutores", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 64328, "titulo": "GPIF makes first direct private equity investment amid allocation bets", "url": "https://www.japantimes.co.jp/business/2026/07/21/gpif-direct-private-equity-investment/", "fonte_id": "japan_times", "data_pub": "2026-07-21T07:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A GPIF, uma das maiores pensões do mundo, investiu 20 bilhões de ienes em um fundo privado de equidade gerenciado pela empresa japonesa Advantage Partners por período de 10 anos.", "titulo_pt": "GPIF realiza primeira investimento direto em private equity", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 63902, "titulo": "74% dos trabalhadores com consignado CLT têm dois ou mais empréstimos ativos", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/74-dos-trabalhadores-com-consignado-clt-tem-dois-ou-mais-emprestimos-ativos.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-21T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um ano após o lançamento do Crédito do Trabalhador, 74% dos trabalhadores com carteira assinada que aderiram ao programa têm dois ou mais empréstimos consignados ativos. Segundo um estudo da Serasa Experian.", "titulo_pt": "74% Dos trabalhadores CLT com consignado têm dois ou mais empréstimos ativos", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 63903, "titulo": "Fusões e aquisições caem 6% em valor no 1º semestre no Brasil, com menor número de transações desde 2018", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/fusoes-e-aquisicoes-caem-6-em-valor-no-1o-semestre-no-brasil-com-menor-numero-de-transacoes-desde-2018.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-21T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As fusões e aquisições no Brasil diminuíram 6% em valor no primeiro semestre de 2026, com o número de transações sendo o menor desde 2018. Globalmente, o mercado de fusões e aquisições está aquecido.", "titulo_pt": "Fusões e aquisições caem 6% em valor no 1º semestre no Brasil, com menor número de transações desde 2018", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 64452, "titulo": "(URGENT) Seoul stocks close sharply higher on chip rally", "url": "https://en.yna.co.kr/view/AEN20260721006600320", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T06:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As bolsas de valores de Seul fecharam significativamente altas, impulsionadas por uma forte recuperação nos preços das ações da indústria dos semicondutores.", "titulo_pt": "(Urgente) ações de seul encerram com forte alta na véspera graças à recuperação do setor de chips", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 63946, "titulo": "O Brasil pode ter uma nova ameaça que vem da China — e a 'vítima' é o frango", "url": "https://exame.com/agro/o-brasil-pode-ter-uma-nova-ameaca-que-vem-da-china-e-a-vitima-e-o-frango/", "fonte_id": "exame", "data_pub": "2026-07-21T06:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil pode enfrentar uma nova ameaça de mercado proveniente da China, que passa a ser concorrente no segmento de proteína, especialmente no setor do frango. Um relatório do BTG destaca essa mudança, notando que o país asiático não se limita mais apenas a ser um grande comprador de produtos brasileiros nessa área.", "titulo_pt": "Brasil enfrenta nova ameaça chinesa no mercado de proteína, especialmente frango", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 64275, "titulo": "The fall of America’s farm superpower", "url": "https://www.ft.com/content/8aa89209-dc0b-4678-9b6a-01029398b304?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-21T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos estão prestes a perder seu status como maior exportador agrícola do mundo.", "titulo_pt": "A queda da superpotência agrícola dos EUA", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 64402, "titulo": "Gritt exits stealth with $34 million for robots to build solar plants—then, everything else", "url": "https://techcrunch.com/2026/07/21/gritt-exits-stealth-with-34-million-for-robots-to-build-solar-plants-then-everything-else/", "fonte_id": "techcrunch", "data_pub": "2026-07-21T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Gritt saiu do modo stealth e recebeu $34 milhões para automatizar as tarefas mais difíceis nos canteiros de obras. A empresa planeja usar essa tecnologia inicialmente em projetos de construção de parques solares, mas tem intenção de expandir seu escopo posteriormente.", "titulo_pt": "Gritt sai do modo stealth com $34 milhões para automatizar tarefas em canteiros de obras", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 64463, "titulo": "deltaVision raises €10.2M to accelerate orbital refuelling technology", "url": "https://tech.eu/2026/07/21/deltavision-raises-eur102m-to-accelerate-orbital-refuelling-technology/", "fonte_id": "tech_eu", "data_pub": "2026-07-21T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A deltaVision, uma empresa sediada em Munique que fabrica sistemas fluidicos para veículos de lançamento, satélites, módulos lunares e veículos de serviço orbital, levantou €10,2 milhões em sua primeira rodada de financiamento com o objetivo de expandir suas operações.", "titulo_pt": "Deltavision arrecada €10,2 milhões para acelerar tecnologia de refueling orbital", "veiculo": "Tech.eu", "pais": "Bélgica", "classe": "B"}, {"id": 64464, "titulo": "Circular Materials secures €11.8M to scale critical raw material recovery technology", "url": "https://tech.eu/2026/07/21/circular-materials-secures-eur118m-to-scale-critical-raw-material-recovery-technology/", "fonte_id": "tech_eu", "data_pub": "2026-07-21T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa italiana de tecnologia limpa Circular Materials, que desenvolve tecnologias para recuperar matérias-primas críticas e estratégicas a partir de esgoto industrial, conseguiu financiamento no valor de €11,8 milhões.", "titulo_pt": "Circular Materials obtém €11,8 milhões para escalar tecnologia de recuperação de matérias-primas críticas", "veiculo": "Tech.eu", "pais": "Bélgica", "classe": "B"}, {"id": 64465, "titulo": "Meet the winners of The European Prize for Women Innovators [Sponsored]", "url": "https://tech.eu/2026/07/21/meet-the-winners-of-the-european-prize-for-women-innovators/", "fonte_id": "tech_eu", "data_pub": "2026-07-21T09:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A European Innovation Council (EIC) e o European Institute of Innovation and Technology (EIT) anunciaram as vencedoras do prêmio Europeu para Inovadoras Femininas deste ano, reconhecendo mulheres inovadoras.", "titulo_pt": "Conheça as vencedoras do prêmio europeu de inovação feminina", "veiculo": "Tech.eu", "pais": "Bélgica", "classe": "B"}, {"id": 64428, "titulo": "The Army Is Burning Through Its AI Tokens", "url": "https://www.wired.com/story/the-army-is-burning-through-its-ai-tokens/", "fonte_id": "wired", "data_pub": "2026-07-21T09:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os membros do Exército receberam um e-mail informando que estavam rapidamente esgotando seus tokens de IA, necessitando limitar o uso.", "titulo_pt": "Exército está rapidamente esgotando seus Tokens de IA", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 64345, "titulo": "Landmark insurance policy clears Shenzhen’s flying vehicle for Hong Kong lift-off", "url": "https://www.scmp.com/tech/article/3361344/landmark-insurance-policy-clears-shenzhens-flying-vehicle-hong-kong-lift?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-21T09:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma inovação de seguro cross-fronteiriço cobrindo um avião pilotado foi aprovada, permitindo que o veículo elétrico de decolagem e pouso vertical (eVTOL) de Shenzhen opere em Hong Kong. A Yivtol, empresa sediada em Shenzhen, obteve um seguro com garantia total de HK$20 milhões para este avião, válido por um ano até junho de 2027.", "titulo_pt": "Pioneira apólice de seguros permite voo de veículo aéreo em Hong Kong", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 64429, "titulo": "Etsy Is In Its Flop Era, and Sellers Are Fleeing", "url": "https://www.wired.com/story/etsy-is-in-its-flop-era-and-sellers-are-fleeing/", "fonte_id": "wired", "data_pub": "2026-07-21T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Etsy, uma vez um refúgio criativo para joalheiros amadores e retratos de animais de estimação, agora está sobrecarregada com mercadorias em massa e cópias feitas por IA. Embora alguns clientes não pareçam se importar, vendedores estão deixando a plataforma.", "titulo_pt": "Etsy encontra-se em sua Era de falhas, e vendedores estão fugindo", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 64347, "titulo": "Malaysia cracks down on cybercrime with new rules for digital space: ‘necessary reset’", "url": "https://www.scmp.com/week-asia/politics/article/3361336/malaysia-cracks-down-cybercrime-new-rules-digital-space-necessary-reset?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-21T08:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Malásia está prestes a reformar sua lei anticybercrime de quase 30 anos e fornecer às autoridades ferramentas para perseguir fraudes online, imitação digital e abuso gerado por IA. No entanto, especialistas afirmam que o impacto da proposta dependerá da capacidade das investigações para aplicar a lei efetivamente e evitar seu uso abusivo.", "titulo_pt": "Malásia reforça lei anticybercrime com novas regras para espaço digital: 'reset necessário'", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 64367, "titulo": "Haesung DS lands CXMT as DDR5 substrate customer, weighs panel production for DDR6", "url": "https://www.digitimes.com/news/a20260721VL212/ddr5-substrate-production-cxmt-panel.html", "fonte_id": "digitimes", "data_pub": "2026-07-21T08:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Haesung DS incluiu a China's CXMT como cliente para substratos de pacote DDR5, ampliando seu negócio de DDR5 e considerando produção baseada em painéis para produtos com mais camadas esperados na geração DDR6.", "titulo_pt": "Haesung DS adiciona CXMT como cliente de substrato DDR5 e considera produção de painéis para DDR6", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 64368, "titulo": "Google developing 'frozen' chip that embeds Gemini models for efficiency gains", "url": "https://www.digitimes.com/news/a20260721VL213/google-gemini-efficiency-chips-nvidia.html", "fonte_id": "digitimes", "data_pub": "2026-07-21T08:44:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Google estaria desenvolvendo um novo chip que incorpora informações dos seus modelos de IA Gemini diretamente na silício com o objetivo de aumentar a eficiência. Se os ganhos de desempenho esperados se concretizarem, essa nova designação marcaria uma integração mais profunda das capacidades de hardware e AI da gigante tecnológica.", "titulo_pt": "Google desenvolvendo novo chip que incorpora modelos Gemini para aumentar a eficiência", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 64207, "titulo": "France set to ban social media for under-15s, a first in the EU", "url": "https://www.lemonde.fr/en/france/article/2026/07/21/france-set-to-pass-eu-first-ban-on-social-media-for-under-15s_6755681_7.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-21T08:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O parlamento francês está prestes a aprovar uma lei que proibirá as redes sociais para menores de 15 anos, tornando a França o primeiro país europeu a estabelecer um limite de idade digital. A aplicação da lei começará em setembro.", "titulo_pt": "França pode ser primeira na Europa a proibir redes sociais para menores de 15 anos", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 64369, "titulo": "Goldkey secures NT$3.6 billion loan to expand AI server memory business", "url": "https://www.digitimes.com/news/a20260721PD228/loan-business-equipment-inventory-financing.html", "fonte_id": "digitimes", "data_pub": "2026-07-21T08:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Goldkey Technology firmou um empréstimo sindicado de três anos no valor de NT$3,6 bilhões (US$111,3 milhões) para apoiar o crescimento do estoque e as necessidades de caixa-corrente relacionadas aos servidores de IA e outros mercados altamente demandados. A empresa planeja utilizar os fundos também para aquisições de materiais em preparação ao expansionismo de sua linha de memórias RDIMM de alto nível no segundo semestre de 2026.", "titulo_pt": "Goldkey obtém empréstimo de NT$3,6 bilhões para expandir negócios de servidores de IA", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 64466, "titulo": "AI minister to attend cabinet, as DSIT axed", "url": "https://tech.eu/2026/07/21/ai-minister-to-attend-cabinet-as-dsit-axed/", "fonte_id": "tech_eu", "data_pub": "2026-07-21T08:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Kanishka Narayan foi nomeado como ministro da Inteligência Artificial no novo governo do primeiro-ministro britânico. Em seu novo cargo, ele participará das reuniões do conselho de ministros.", "titulo_pt": "Ministro da IA para acompanhar as reuniões do conselho de ministros; DSIT foi extinta", "veiculo": "Tech.eu", "pais": "Bélgica", "classe": "B"}, {"id": 64370, "titulo": "Huawei Kirin 9030 shows SMIC's 7nm gains and ongoing efficiency gap", "url": "https://www.digitimes.com/news/a20260721PD236/huawei-kirin-efficiency-7nm-smic.html", "fonte_id": "digitimes", "data_pub": "2026-07-21T08:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um desmonte do processador Kirin 9030 da Huawei, que usa o processo N+3 de 7nm da SMIC, mostra avanços contínuos na densidade dos componentes. No entanto, ainda existe uma significativa diferença de eficiência em relação aos concorrentes globais.", "titulo_pt": "Kirin 9030 da huawei revela progresso de densidade da SMIC, mas mantém gap de eficiência", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 64414, "titulo": "Kbank partners with HashKey on stablecoin remittances", "url": "https://www.koreaherald.com/article/10815307", "fonte_id": "korea_herald", "data_pub": "2026-07-21T07:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Banco Kbank firmou um acordo com a empresa de blockchain BPMG e o grupo digital HashKey Group para desenvolver serviços de transferências internacionais baseadas em stablecoins. O objetivo é conectar uma plataforma de remessas criada pela Kbank e BPMG à rede do HashKey, inicialmente para usuários na Hong Kong e na Ásia Oriental, com planos futuros de expandir a rede regional.", "titulo_pt": "Kbank se associa com HashKey em serviços de remessa baseados em stablecoins", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 64357, "titulo": "As BYD marks Brazil milestone, Europe weighs response to surge in Chinese EVs", "url": "https://www.scmp.com/business/china-business/article/3361304/byd-marks-brazil-milestone-europe-weighs-response-surge-chinese-evs?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-21T07:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "BYD produziu seu 100.000º veículo elétrico na fábrica brasileira de Camacari, demonstrando o potencial de crescimento dos produtos chineses no continente sul-americano. Este marco ocorre enquanto a Europa enfrenta tensões crescentes devido à expansão dos veículos elétricos chineses.", "titulo_pt": "BYD atinge marcaço de 100.000 veículos elétricos no Brasil e Europa debate resposta às incursões chinesas", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 64434, "titulo": "Astronomers catch a recurring black hole eruption in real time", "url": "https://phys.org/news/2026-07-astronomers-recurring-black-hole-eruption.html", "fonte_id": "phys_org", "data_pub": "2026-07-21T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Para a terceira vez em 35 anos, o buraco negro no centro da galáxia IC 3599 entrou em erupção. Desta vez, astrônomos puderam observar o evento em tempo real. Este é o primeiro caso registrado de uma erupção deste tipo sendo acompanhada desde o início.", "titulo_pt": "Astrônomos capturam erupção recorrente de buraco negro no momento exato", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 64485, "titulo": "Galaxy cluster's magnetic field reconstructed for 1st time with record-breaking astronomy map", "url": "https://www.space.com/astronomy/galaxies/galaxy-clusters-magnetic-field-reconstructed-for-1st-time-with-record-breaking-astronomy-map", "fonte_id": "space_com", "data_pub": "2026-07-21T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Astrônomos criaram pela primeira vez uma mapeamento detalhado do campo magnético de um aglomerado de galáxias. Eles acreditam que o mecanismo responsável por acender as emissões radiofáticas gigantes está relacionado ao processo de formação desses aglomerados.", "titulo_pt": "Mapeamento histórico do campo magnético de um aglomerado de galáxias realizado pela primeira vez", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 64439, "titulo": "About 10 pct of 2022 crowd crush deaths possibly caused by reasons besides suffocation: committee", "url": "https://en.yna.co.kr/view/AEN20260721009800315", "fonte_id": "yonhap_news", "data_pub": "2026-07-21T09:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um comitê concluiu que aproximadamente 10% das mais de cem pessoas mortas no acidente de multidão de 2022 podem ter sido causadas por razões diferentes da sufocamento.", "titulo_pt": "Aproximadamente 10% dos óbitos nos incidentes de multidão de 2022 podem não ter sido causados apenas pela sufocamento, selon comitê", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 63908, "titulo": "DNA ambiental revela biodiversidade escondida em bancos de algas no litoral brasileiro", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/dna-ambiental-revela-biodiversidade-escondida-em-bancos-de-algas-no-litoral-brasileiro.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-21T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores da Unifesp identificaram cerca de 450 espécies de animais e algas vivendo sobre bancos de rodolitos em Abrolhos, na Bahia, e na costa da ilha da Queimada Grande, em São Paulo. O estudo utilizou DNA ambiental para revelar a biodiversidade escondida nos bancos de algas.", "titulo_pt": "DNA ambiental descobre biodiversidade oculta em bancos de algas no litoral brasileiro", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 63975, "titulo": "Nova plataforma reúne evidências científicas sobre colágeno", "url": "https://www.metropoles.com/conteudo-especial/jbs-colageno", "fonte_id": "metropoles", "data_pub": "2026-07-21T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Genu-in Academy oferece webinars, estudos clínicos e materiais técnicos relacionados ao colágeno. A plataforma reforça os investimentos da JBS em ciência e inovação.", "titulo_pt": "Nova plataforma reúne evidências científicas sobre colágeno", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 64435, "titulo": "Indigenous knowledge key to building healthier and more sustainable food systems", "url": "https://phys.org/news/2026-07-indigenous-knowledge-key-healthier-sustainable.html", "fonte_id": "phys_org", "data_pub": "2026-07-21T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A pesquisa indica que o conhecimento tradicional e indígena pode desempenhar um papel crucial na solução de alguns dos maiores desafios globais, como mudança climática, perda da biodiversidade e má nutrição. Este estudo revisou a literatura atual sobre o assunto.", "titulo_pt": "Conhecimento tradicional é fundamental para construir sistemas alimentares mais saudáveis e sustentáveis", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 64460, "titulo": "This tiny, forgotten organ could help us live longer, healthier", "url": "https://www.scientificamerican.com/article/this-tiny-forgotten-organ-could-help-us-live-longer-healthier/", "fonte_id": "scientific_american", "data_pub": "2026-07-21T09:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma hormona produzida pelo timo ajuda a reduzir a inflamação associada ao envelhecimento, conforme descoberto por uma nova pesquisa com ratos.", "titulo_pt": "Este pequeno órgão esquecido poderia nos ajudar a viver mais tempo e melhor", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 64431, "titulo": "Opinion: Science and the public are learning the wrong lessons from Covid", "url": "https://www.statnews.com/2026/07/21/covid-non-pharmaceutical-interventions-masks-distancing-research/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-21T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Marc Lipsitch e Sara Cody alertam que a polarização pós-pandemia pode fazer com que as memórias sobre o Covid-19 sejam distorcidas, levando a conclusões atraentes mas falsas que nos deixarão vulneráveis em futuras crises.", "titulo_pt": "Opinião: ciência e público estão aprendendo lições erradas sobre o Covid", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 64432, "titulo": "Opinion: How a controversial rule could hurt the NIH’s ability to manage risk", "url": "https://www.statnews.com/2026/07/21/omb-nih-grant-review-politics-scientific-risk/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-21T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O projeto de regra poderia 'debilitar o influente papel do NIH na gestão de riscos em
