<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>

  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 11/07/2026 16:59 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">

</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>

    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>

      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

pressões sobre empresas para reduzir preços, apesar das preocupações de que isso possa se tornar um 'jogo político populista'. Na França, Marine Le Pen teve seu banimento de candidatura reduzido a 15 meses após sua condenação por desvio de fundos do Parlamento Europeu, o que lhe permitirá concorrer nas eleições presidenciais de 2027. Em Israel e Líbano, os bombardeios continuam no sul do Líbano, enquanto o Líbano confirmou sua participação nos diálogos de Roma com Israel. Na Coreia do Norte, o líder supremo Ali Khamenei prometeu vingança pelo assassinato do seu pai, atribuído a Estados Unidos e Israel em 28 de fevereiro, data que marca o início desse conflito.\n\nA geopolítica global continua marcada por tensões e confrontos. No leste europeu, ataques de mísseis russos contra Kiev resultaram em 10 feridos, agravando a guerra na Ucrânia. Diante da escassez de munições, Kyiv enfrenta uma crescente vulnerabilidade. A tensão aumentou ainda mais após relatos do assassinato do líder supremo iraniano, Khamenei, com o presidente americano Trump ameaçando responder com milhares de mísseis. No Oriente Médio, o Estreito de Ormuz continua sob intensa vigilância, com os EUA exigindo liberdade de navegação e o Irã reivindicando controle exclusivo do local. Em Svalbard, Noruega, a disputa geopolítica entre Rússia, China e Estados Unidos ganha novas dimensões à medida que o gelo do Ártico derrete rapidamente.", "economia": "A economia global enfrenta diversos desafios e oportunidades neste momento. As tensões no Estreito de Ormuz estão elevando os preços do petróleo, afetando diretamente o mercado americano, com a gasolina nos Estados Unidos sendo mais cara do que há um ano. O Brasil também está sob pressão: as vendas de jogadores para clubes internacionais geraram cerca de R$ 3 bilhões em 2025 e a Petrobras teve que suspender suas operações de produção de petróleo. A Argentina sofreu uma queda significativa na produção de soja, enquanto o Brasil manteve seu domínio no mercado internacional. Em outro front, a União Europeia planeja investir 80 bilhões de euros em empresas de tecnologia, com destaque para a proposta que expande o CBAM (Imposto sobre Produtos Importados) para 180 novos produtos e fecha brechas no sistema, necessitando aprovação pelo plenário. Além disso, a reforma tributária municipal e as expectativas de uma eleição presidencial em outubro influenciam decisões econômicas. Empresas como a XP Investimentos mantêm sua visão otimista sobre o PIB do Brasil e prevêem que o dólar se cotará a R$ 5,00 no futuro.", "tecnologia": "A China realizou um feito histórico ao recuperar com sucesso seu primeiro foguete orbital reutilizável, gerando debates acalorados nas redes sociais. Este evento, ocorrido num momento de otimismo crescente no setor satelital, reflete a rápida evolução do programa espacial chinês e levanta questões sobre as possíveis tensões com os Estados Unidos. Paralelamente, Taiwan expressou interesse no mercado global de cães robóticos avaliado em 4 bilhões de dólares, destacando-se num contexto de concorrência internacional na indústria de robôs. A tecnologia artificial inteligente também ganhou destaque com o anúncio da Meta de uma ferramenta chamada 'Muse Image', que foi rapidamente descontinuada após críticas. Por outro lado, a OpenAI está expandindo suas experiências para famílias e cuidadores através do ChatGPT. Estas notícias ilustram as diversas aplicações e implicações da tecnologia atual em diversos setores, desde o espaço até a educação e a indústria de beleza.", "ciencia": "Um estudo recente realizado pela POSTECH descobriu uma nova plataforma chamada 'ciclo gene RNA-base', que permite às células lerem múltiplos sinais simultaneamente e gerarem respostas programadas de forma independente, representando um avanço significativo na manipulação genética. Paralelamente, pesquisadores da Universidade de Lund na Suécia encontraram que florestas de flores nas margens das estradas podem atrair abelhas-rei, mas também podem ser perigosas para os insetos se o tráfego for muito intenso. Outro importante estudo, liderado pelo professor Chaogu Zheng da Universidade de Hong Kong, descobriu como os circuitos sensoriais-motores permanecem confiáveis mesmo quando alguns genes ou conexões neurais são interrompidos, revelando backups que mantêm os reflexos vitais dos animais. Estes avanços científicos abrangem desde a biotecnologia até a ecologia urbana e neurociência, demonstrando o amplo espectro de pesquisa em ciências atuais.", "cultura": "A cultura brasileira e internacional são destaque neste resumo. O evento 'Julho das Pretas' homenageará a escritora Conceição Evaristo, com debates, ações de valorização e um festival cultural durante o mês de julho. Em Salvador, a Festa Literária Internacional do Pelourinho (Flipelô) celebra sua décima edição com mais de 500 escritores participantes nos dias 5 a 9 de agosto. O Brasil perdeu uma figura importante da música italiana, Peppino di Capri, aos 86 anos, conhecido por sucessos como 'Champagne'. No cenário literário, Catherine Lacey discute a importância do livro físico em sua obra 'El libro moebius', enquanto o documentário 'Toquinho: Encontros e um Violão' resgata o legado de Toquinho na MPB. No exterior, a França comemora Isabelle Huppert como diretora da Cinemateca Francesa pela primeira vez, enquanto o Festival Naadam em Mongolia encerra oficialmente uma visita do presidente sul-coreano Lee Jae Myung. Ainda sobre eventos culturais, o documentário 'The Sentinels' é destacado na programação televisiva, retratando super-soldados do Primeiro Mundo com toque de ficção científica.", "sociedade": "O Instituto Nacional do Seguro Social (INSS) realizou um mutirão adicional de 18 mil vagas para perícias médicas relacionadas ao auxílio-doença e Benefício de Prestação Continuada (BPC-Loas), nos dias 11 e 12 de julho, com a maioria dos atendimentos sendo feitos por teleatendimento. Em outro desenvolvimento, o ex-jogador de futebol Antonio Rattín, ídolo do Boca Juniors, faleceu aos 89 anos, deixando um legado significativo no esporte. O presidente Luiz Inácio Lula da Silva publicou um vídeo sem camisa na esteira, demonstrando sua boa forma física e reiterando seu compromisso com a saúde pública.", "meio_ambiente": "Os incêndios florestais na Espanha continuam intensos, com 12 mortes e 23 pessoas desaparecidas no território afetado. As autoridades alertam para a gravidade da situação e as medidas preventivas permanecem em vigor. Paralelamente, o Super Furacão Bavi atingiu a China, levando à evacuação de mais de 1,7 milhão de pessoas como medida de segurança. No Brasil, um temporal com granizo causou danos em várias cidades do Rio Grande do Sul, deixando quatrocentas pessoas sem casa. Belém está se preparando para incluir a Semana do Clima no calendário anual, similar à Londres e Nova York, e reuniu mais de 30 instituições em dois dias de debates oficiais após a COP.", "direitos_humanos": "Na Cisjordânia, equipes da CNN e outros jornalistas foram agredidos por colonos israelenses durante a cobertura do aniversário do dia de morte de um palestino-americano. Os agressores usaram barras de metal e pedras. Em outro evento grave no Vietnã, um barco de turismo capotou perto da ilha de Phu Quoc, resultando na morte de 15 turistas indianos. Na Bosnia, durante cerimônia em memória das vítimas do genocídio em Srebrenica, ocorreu uma massiva exumação e sepultamento. Hasan Hasanovich, sobrevivente e historiador do Centro Memorial de Srebrenica, criticou a sociedade holandesa por seu papel no genocídio que aconteceu há 31 anos. No Chile, a megareforma avança sem levar em consideração as opiniões dos especialistas. Por outro lado, nos Estados Unidos, a Suprema Corte decidiu que leis estaduais proibindo mulheres transexuais de competir em equipes esportivas femininas devem ser mantidas."}, "resumo_do_dia": {"politica_nacional": [{"id": 46122, "titulo": "AGU defende avanço de processo que pode tirar Enel de São Paulo", "url": "https://www.poder360.com.br/poder-energia/agu-defende-avanco-de-processo-que-pode-tirar-enel-de-sao-paulo/", "fonte_id": "poder360", "data_pub": "2026-07-11T18:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Procuradoria Federal rejeitou os argumentos da Enel contra o processo administrativo na Aneel que analisa a perda da concessão. O avanço desse processo pode levar à saída da empresa do mercado de distribuição de energia em São Paulo.", "titulo_pt": "AGU defende avanço do processo que pode retirar Enel de São Paulo", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 46076, "titulo": "Esposa de Valdemar diz que investigação contra marido é criminosa, não criminal", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/esposa-de-valdemar-diz-que-investigacao-contra-marido-e-criminosa-nao-criminal.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-11T18:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A presidente do PL Mulher Mogi das Cruzes, Dana Costa, afirmou que a investigação contra o marido dela, Valdemar Costa Neto, é 'criminosa' e 'indecente'. Ela considera que a investigação não se enquadra na categoria criminal.", "titulo_pt": "Esposa de Valdemar diz que investigação contra marido é criminosa, não criminal", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 46077, "titulo": "Flávio mentiu para os americanos", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/celso-rocha-de-barros/2026/07/flavio-mentiu-para-os-americanos.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-11T18:49:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Flávio Bolsonaro viajou a Washington para pedir que Donald Trump suspendesse temporariamente o tarifaço. O tarifaço foi organizado por Eduardo Bolsonaro, irmão de Flávio.", "titulo_pt": "Flávio mentiu aos americanos", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 46123, "titulo": "Novo vídeo de ovnis mostra objeto escuro registrado sobre o Atlântico", "url": "https://www.poder360.com.br/poder-internacional/novo-video-de-ovnis-mostra-objeto-escuro-registrado-sobre-o-atlantico/", "fonte_id": "poder360", "data_pub": "2026-07-11T18:37:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um novo vídeo de ovnis foi divulgado pelo Pentágono, mostrando um objeto escuro registrado sobre o Atlântico em 2020 por um sensor infravermelho de uma plataforma militar dos Estados Unidos; a origem do objeto ainda não tem explicação oficial.", "titulo_pt": "Novo vídeo de ovnis registra objeto escuro sobre o Atlântico", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 46227, "titulo": "Governo bloqueia acesso a bets de 2,8 mi que recebem Bolsa Família ou BPC", "url": "https://www.cnnbrasil.com.br/politica/governo-bloqueia-acesso-a-bets-de-28-mi-que-recebem-bolsa-familia-ou-bpc/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-11T18:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo bloqueou o acesso a apostas de aproximadamente 2,8 milhões de pessoas que recebem Bolsa Família ou Benefício de Prestação Continuada (BPC). Cerca de 10% dos beneficiários desses programas sociais tiveram suas contas bloqueadas.", "titulo_pt": "Governo bloqueia acesso a apostas de 2,8 milhões que recebem Bolsa Família ou BPC", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 46220, "titulo": "Quais os potenciais impactos do ‘Super El Niño’ no agronegócio? Governo monitora", "url": "https://www.infomoney.com.br/brasil/governo-monitora-potenciais-impactos-do-super-el-nino-no-agronegocio/", "fonte_id": "infomoney", "data_pub": "2026-07-11T18:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo está monitorando a possibilidade de um 'Super El Niño', que pode afetar a produção agrícola brasileira na safra 2026/27. A equipe agrícola do Executivo está à frente dessa vigilância.", "titulo_pt": "Quais os potenciais impactos do ‘Super elniño’ no agronegócio? Governo monitora", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 46124, "titulo": "Motta chama decisão de Dino sobre emendas de “indevida intervenção”", "url": "https://www.poder360.com.br/poder-congresso/motta-chama-decisao-de-dino-sobre-emendas-de-indevida-intervencao/", "fonte_id": "poder360", "data_pub": "2026-07-11T18:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente da Câmara, Motta, criticou a decisão do governador Dino sobre emendas, afirmando que não foram identificados desvios ou abusos na aplicação de verbas públicas.", "titulo_pt": "Motta critica intervenção de Dino em emendas", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 46078, "titulo": "Pará define detalhes para cobrar agressores por tornozeleira eletrônica", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/para-define-detalhes-para-cobrar-agressores-por-tornozeleira-eletronica.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-11T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os órgãos do Sistema de Segurança Pública e Defesa Social do Pará planejam se reunir após o dia 15 de novembro para definir os detalhes da cobrança a ser aplicada aos agressores de mulheres monitorados por tornozeleira eletrônica. Atualmente, 308 homens estão sob esse tipo de monitoramento no estado.", "titulo_pt": "Pará planeja cobrar agressores por uso de tornozeleira eletrônica", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 46132, "titulo": "Em meio a racha familiar, Flávio Bolsonaro divulga carta de Jair com pedido de apoio à sua pré-candidatura", "url": "https://www.brasildefato.com.br/2026/07/11/em-meio-a-racha-familiar-flavio-bolsonaro-divulga-carta-de-jair-com-pedido-de-apoio-a-sua-pre-candidatura/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-11T17:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Flávio Bolsonaro divulgou uma carta de Jair Bolsonaro pedindo apoio à sua pré-candidatura. O ex-presidente, que está sob prisão domiciliar, tenta contornar a crise familiar causada pelo rompimento público entre Michelle e Flávio em relação a acordos eleitorais com o PSDB no Ceará.", "titulo_pt": "Em meio ao racha familiar, Flávio Bolsonaro divulga carta de Jair com pedido de apoio à sua pré-candidatura", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 46125, "titulo": "Lula não convence aliadas e terá palanque frágil em Goiás", "url": "https://www.poder360.com.br/poder-eleicoes/lula-nao-convence-aliadas-e-tera-palanque-fragil-em-goias/", "fonte_id": "poder360", "data_pub": "2026-07-11T17:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Lula enfrenta dificuldades para formar alianças no estado de Goiás, o que pode limitar sua chance de chegar a um segundo turno nas eleições. Adriana Accorsi e Aava Santiago permanecem como pré-candidatas a vagas na Câmara Municipal.", "titulo_pt": "Lula terá palanque frágil em Goiás", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 46244, "titulo": "“Fui idiota”, diz Cleitinho sobre foto com Virgínia na CPI das Bets", "url": "https://www.cnnbrasil.com.br/politica/cleitinho-diz-ter-sido-idiota-ao-pedir-foto-com-virginia-em-cpi/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-11T17:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Cleitinho admitiu que foi 'afobado' ao pedir uma foto para sua filha durante a CPI das Bets. Ele também declarou apoio à proposta de encerrar as plataformas virtuais de apostas.", "titulo_pt": "Fui idiota", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 46148, "titulo": "MPF investiga impacto de corte de verbas imposto pelo governo Lula a agências reguladoras", "url": "https://veja.abril.com.br/brasil/mpf-investiga-impacto-de-corte-de-verbas-imposto-pelo-governo-lula-a-agencias-reguladoras/", "fonte_id": "veja", "data_pub": "2026-07-11T17:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério Público Federal (MPF) iniciou uma investigação sobre os efeitos do corte de verbas imposto pelo governo Lula às agências reguladoras. O procedimento foi aberto em resposta a denúncias feitas por entidades do setor.", "titulo_pt": "MPF investiga impacto de corte de verbas no governo Lula a agências reguladoras", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 46079, "titulo": "Motta diz que decisão de Dino contra Valdemar é 'indevida intervenção judicial' no Parlamento", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/motta-diz-que-decisao-de-dino-contra-valdemar-e-indevida-intervencao-judicial-no-parlamento.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-11T16:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente da Câmara dos Deputados, Hugo Motta, criticou a decisão do ministro Flávio Dino no STF que afetou Valdemar Costa Neto e os servidores da Casa. Motta defendeu Valdemar após o bloqueio de R$ 119 milhões em emendas por suspeita de desvio.", "titulo_pt": "Motta critica decisão de Dino contra Valdemar como 'intervenção judicial' no Parlamento", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 46151, "titulo": "Bolsonaro diz que Flávio é seu ‘porta-voz’ em carta lida por pré-candidato", "url": "https://veja.abril.com.br/politica/bolsonaro-diz-que-flavio-e-seu-porta-voz-em-carta-lida-por-pre-candidato/", "fonte_id": "veja", "data_pub": "2026-07-11T16:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Flávio Bolsonaro mencionou um encontro com o pai, Jair Bolsonaro, que está sob prisão domiciliar. Durante a carta, Flávio relatou ataques e falta de unidade que afetam sua candidatura.", "titulo_pt": "Bolsonaro chama Flávio de 'porta-voz' em carta sobre encontro e candidatura", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 46110, "titulo": "Em carta, Bolsonaro diz que Flávio é seu ‘porta-voz’", "url": "https://www.cartacapital.com.br/politica/em-carta-bolsonaro-diz-que-flavio-e-seu-porta-voz/", "fonte_id": "cartacapital", "data_pub": "2026-07-11T16:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em uma carta, Jair Bolsonaro afirmou que seu filho Flávio é seu porta-voz. Essa declaração acontece durante um período de tensão entre o senador e Michelle Bolsonaro.", "titulo_pt": "Em carta, Bolsonaro diz que Flávio é seu ‘porta-voz’", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 46152, "titulo": "Presidente da Câmara manifesta ‘inconformismo’ após decisão de Flávio Dino", "url": "https://veja.abril.com.br/politica/presidente-da-camara-manifesta-inconformismo-apos-decisao-de-flavio-dino/", "fonte_id": "veja", "data_pub": "2026-07-11T16:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Hugo Motta, presidente da Câmara dos Deputados, expressou sua insatisfação após a decisão do ministro do STF envolvendo Valdemar Costa Neto. Motta criticou o julgamento.", "titulo_pt": "Presidente da Câmara manifesta ‘inconformismo’ após decisão sobre valdemar costa neto", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 46667, "titulo": "Russian missile attacks on Kyiv wound eleven people", "url": "https://www.taipeitimes.com/News/front/archives/2026/07/12/2003860607", "fonte_id": "taipei_times", "data_pub": "2026-07-12T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Missiles lançados pela Rússia atingiram Kyiv, resultando em onze feridos.", "titulo_pt": "Ataques de mísseis russos a Kyiv deixam onze feridos", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 46671, "titulo": "Japanese ships in Strait shows strong ties, legislator says", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/12/2003860616", "fonte_id": "taipei_times", "data_pub": "2026-07-12T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Navios japoneses no Estreito de Taiwan demonstram fortes laços, afirma um legislador.", "titulo_pt": "Navios japoneses no estreito de taiwan mostram fortes laços, diz legislador", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 46320, "titulo": "EE.UU. reclama a Irán que libere el estrecho de Ormuz mientras los dos países intercambian amenazas", "url": "https://www.lanacion.com.ar/el-mundo/eeuu-reclama-a-iran-que-libere-el-estrecho-de-ormuz-mientras-los-dos-paises-intercambian-amenazas-nid11072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-11T18:51:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Os EUA exigem que o Irã permita um trânsito livre e seguro pelo Estreito de Ormuz, enquanto Teerã reivindica o controle exclusivo do local cobrando taxas dos navios. Os dois países estão trocando ameaças sobre a utilização deste importante passo marítimo.", "titulo_pt": "EUA exigem liberdade de navegação no estreito de Ormuz enquanto Irã reivindica controle", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 46094, "titulo": "Governo Trump intima jornalistas do New York Times após reportagem sobre avião doado pelo Qatar", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/07/governo-trump-intima-jornalistas-do-new-york-times-apos-reportagem-sobre-aviao-doado-pelo-qatar.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-07-11T18:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo de Donald Trump intimou jornalistas do The New York Times após a publicação de uma reportagem que questionava a segurança da nova aeronave presidencial doada pel ras por assentados armados quando visitava a Cisjordânia Ocidental ocupada, segundo ele mesmo relata.", "titulo_pt": "Democrata dos EUA Ro Khanna diz ter sido detido por assentados armados na cisjordânia", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 46539, "titulo": "Noskova survives tearful meltdown to win first Wimbledon title", "url": "https://www.france24.com/en/sport/20260711-noskova-survives-tearful-meltdown-to-win-first-wimbledon-title", "fonte_id": "france24", "data_pub": "2026-07-11T17:49:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Linda Noskova venceu seu primeiro título de Wimbledon no sábado, superando Karolina Muchova em uma final emocionante e reviravolteada. Noskova é a terceira mulher tcheca a ganhar o torneio de grama nos últimos quatro anos, após Marketa Vondrousova e Barbora Krejcikova.", "titulo_pt": "Noskova vence Wimbledon em emocionante final", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 46607, "titulo": "Il Libano conferma partecipazione ai colloqui di Roma con Israele", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/11/il-libano-conferma-partecipazione-ai-colloqui-di-roma-con-israele_a37c9806-bcab-45ab-be77-621805a118c6.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-11T17:45:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O Líbano confirmou sua participação nos diálogos de Roma com Israel, conforme declarado por um funcionário anônimo.", "titulo_pt": "Líbano confirma participação nos diálogos de Roma com israel", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 46640, "titulo": "US lawmaker slams Israeli army after settlers detain him on Palestine trip", "url": "https://www.aljazeera.com/news/2026/7/11/us-lawmaker-slams-israeli-army-after-settlers-detain-him-on-palestine-trip?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-11T17:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O congressista Khanna criticou o exército israelense após os settlers detê-lo durante uma viagem a Palestina, acusando as forças de apoio aos colonizadores e advertindo que isso foi um 'grande erro'.", "titulo_pt": "Congressista dos EUA critica exército israelense após ser detido por settlers em visita a palestina", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}], "mundo__eventos": [], "economia": [{"id": 46673, "titulo": "Oil firm ordered to suspend production", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/12/2003860618", "fonte_id": "taipei_times", "data_pub": "2026-07-12T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma empresa de petróleo foi ordenada a suspender suas operações de produção.", "titulo_pt": "Empresa de petróleo ordered to suspend production", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 46330, "titulo": "La soja y una década perdida: cómo la “plaga” de las retenciones favoreció el avance de Brasil", "url": "https://www.lanacion.com.ar/economia/campo/la-soja-y-una-decada-perdida-como-las-retenciones-favorecieron-el-avance-de-brasil-nid11072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-11T18:15:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Argentina viu sua produção de soja diminuir em 86% enquanto o Brasil expandiu significativamente suas exportações e manteve seu domínio no mercado internacional. A redução na produção argentina resultou em perda de área plantada e menor participação nas exportações de harina.", "titulo_pt": "Soja e uma década perdida: como as retenciones favoreceram o avanço do Brasil", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 46067, "titulo": "Fundo de florestas corre para atrair US$ 3,2 bi até o fim do ano, mas guerras dificultam", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/fundo-de-florestas-corre-para-atrair-us-32-bi-ate-o-fim-do-ano-mas-guerras-dificultam.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-11T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Fundo Florestas Tropicais para Sempre (TFFF) precisa arrecadar mais US$ 3,2 bilhões até o fim do ano para atingir sua meta de US$ 10 bilhões. No entanto, as guerras dificultam a captação desses fundos.", "titulo_pt": "Fundo de florestas busca atrair US$ 3,2 bi até o fim do ano, mas guerras complicam", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 46242, "titulo": "Gasolina nos EUA está mais cara do que há um ano", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/gasolina-nos-eua-esta-mais-cara-do-que-ha-um-ano/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-11T17:43:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O preço da gasolina nos Estados Unidos está mais alto do que há um ano. O Estreito de Ormuz, importante roteiro marítimo para o transporte de petróleo, está em foco devido a novas tensões nesta semana.", "titulo_pt": "Gasolina nos EUA custa mais do que há um ano", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 46246, "titulo": "Europa fará investimento de 80 bilhões de euros em empresas de tecnologia", "url": "https://www.cnnbrasil.com.br/economia/negocios/europa-fara-investimento-de-80-bilhoes-de-euros-em-empresas-de-tecnologia/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-11T17:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A União Europeia investirá 80 bilhões de euros em empresas de tecnologia, envolvendo estados-membros da UE, Grupo Banco Europeu de Investimento, investidores institucionais e gestores de ativos.", "titulo_pt": "Europa fará investimento de 80 bilhões de euros em empresas de tecnologia", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 46068, "titulo": "Donald Trump aumenta pressão sobre empresas americanas em campanha para baixar preços", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/donald-trump-aumenta-pressao-sobre-empresas-americanas-em-campanha-para-baixar-precos.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-11T17:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Donald Trump está aumentando a pressão sobre as empresas americanas para que reduzam os preços, diante da alta dos custos devido à guerra e da inflação em seu maior nível em três anos.", "titulo_pt": "Trump intensifica pressão nas empresas para baixar preços", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 46069, "titulo": "'Sudeste cresceu nas costas do Nordeste por décadas, agora é a nossa vez', diz ex-J.Macêdo, que investe no sertão do Ceará", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/07/sudeste-cresceu-nas-costas-do-nordeste-por-decadas-agora-e-a-nossa-vez-diz-ex-jmacedo-que-investe-no-sertao-do-ceara.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-11T17:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Amarílio Macêdo, ex-presidente da J.Macêdo, empresa especializada em moagem de trigo, está investindo na estruturação de uma ZPE no sertão do Ceará. Sua decisão visa beneficiar a região que historicamente contribuiu para o crescimento econômico do Sudeste.", "titulo_pt": "Sudeste cresceu nas costas do Nordeste por décadas, agora é a nossa vez", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 46071, "titulo": "Venda de atletas ao exterior rende quase R$ 3 bi ao Brasil em 2025", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/venda-de-atletas-ao-exterior-rende-quase-r-3-bi-ao-brasil-em-2025.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-11T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em 2025, as vendas de jogadores brasileiros para clubes internacionais geraram aproximadamente R$ 3 bilhões. O Brasil continua sendo o país que exporta mais jogadores de futebol no mundo.", "titulo_pt": "Venda de atletas ao exterior rende quase R$ 3 bi ao Brasil em 2025", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 46163, "titulo": "Banco do Brasil no risco de ser o fiador dos Correios", "url": "https://veja.abril.com.br/coluna/radar-economico/banco-do-brasil-no-risco-de-ser-o-fiador-dos-correios/", "fonte_id": "veja", "data_pub": "2026-07-11T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Banco do Brasil está sendo observado com maior atenção pelos analistas devido ao risco de se tornar o fiador dos Correios, que estão enfrentando dificuldades para cortar custos diante da pressão sindical.", "titulo_pt": "Banco do Brasil sob risco de ser fiador dos Correios", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 46182, "titulo": "SK Hynix alerta para pior crise de memória da história em 2027", "url": "https://exame.com/invest/mercados/sk-hynix-alerta-para-pior-crise-de-memoria-da-historia-em-2027/", "fonte_id": "exame", "data_pub": "2026-07-11T13:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A SK Hynix, fabricante sul-coreana de memórias, prevê que a demanda por chips de memória continuará superando a oferta até pelo menos 2037. A empresa alerta para o que pode ser a pior crise de memória da história em 2027.", "titulo_pt": "SK Hynix avisa sobre pior crise de memória da história em 2027", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 46100, "titulo": "Publicadas regras que restringem publicidade de bets no país", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-07/publicadas-regras-que-restringem-publicidade-de-bets-no-pais", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-11T13:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Foram publicadas regras que restringem a publicidade de plataformas de apostas esportivas no Brasil. As novas medidas, que entram em vigor em 17 de julho, exigem a exibição de advertências do Ministério da Fazenda e proíbem anúncios que incentivem as apostas como forma de ganho ou utilização de comentaristas para influenciar o público.", "titulo_pt": "Publicadas regras que restringem publicidade de apostas esportivas no país", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 46575, "titulo": "Berkshire Hathaway gains ground, but still trails the S&P 500 as '26 enters second half", "url": "https://www.cnbc.com/2026/07/11/berkshire-hathaway-gains-ground-but-still-trails-the-sp-500-as-26-enters-second-half.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-11T13:07:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações de B shares da Berkshire Hathaway estão com uma queda de 1,8% no ano até agora e estão 12,4 pontos percentuais atrás do ganho de 10,7% do S&P 500. Com o ano de 2026 passando para sua metade final, a performance da empresa ainda está abaixo da média do índice.", "titulo_pt": "Berkshire Hathaway perde terreno, mas continua atrás do S&P 500 no meio de 2026", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 46580, "titulo": "Apple sues OpenAI over alleged theft of trade secrets - here's what to know", "url": "http://www.euronews.com/next/2026/07/11/apple-sues-openai-over-alleged-theft-of-trade-secrets-heres-what-to-know", "fonte_id": "euronews", "data_pub": "2026-07-11T11:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Apple acionou a OpenAI por suposto roubo de segredos comerciais. A OpenAI nega interesse em segredos comerciais alheios.", "titulo_pt": "Apple processa OpenAI por suposto roubo de segredos comerciais", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 45865, "titulo": "Governo publica por ulo": "Veja", "pais": "Brasil", "classe": "B"}], "economia__eventos": [], "tecnologia": [{"id": 46663, "titulo": "Taiwan eyes US$4bn robot dog market amid global race", "url": "https://www.taipeitimes.com/News/front/archives/2026/07/12/2003860603", "fonte_id": "taipei_times", "data_pub": "2026-07-12T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Taiwan está interessada no mercado de cães robóticos avaliado em 4 bilhões de dólares, ocorrendo num contexto global de concorrência nessa indústria.", "titulo_pt": "Taiwan presta atenção ao mercado de cães robóticos avaliado em 4 bilhões de dólares durante corrida global", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 46670, "titulo": "Drone bills face review", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/12/2003860615", "fonte_id": "taipei_times", "data_pub": "2026-07-12T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As leis sobre drones estão sendo revisadas. O processo visa avaliar e possivelmente modificar as regulamentações atuais para drones.", "titulo_pt": "Leis sobre drones passam por revisão", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 46687, "titulo": "AI offers us education without any community", "url": "https://www.taipeitimes.com/News/editorials/archives/2026/07/12/2003860598", "fonte_id": "taipei_times", "data_pub": "2026-07-12T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo sugere que a tecnologia artificial inteligente pode proporcionar educação sem a necessidade de uma comunidade ou ambiente social convencional.", "titulo_pt": "IA oferece educação sem a necessidade de uma comunidade", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 46728, "titulo": "Smart glasses without a camera? Even Realities bets productivity beats recording everyone", "url": "https://techcrunch.com/2026/07/11/smart-glasses-without-a-camera-even-realities-bets-productivity-beats-recording-everyone/", "fonte_id": "techcrunch", "data_pub": "2026-07-11T17:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O dispositivo é direcionado para indivíduos que passam a maior parte do tempo em reuniões, apresentações e viagens para países onde se falam línguas diferentes. Mesmo a Realities aposta na produtividade como vantagem sobre a possibilidade de gravação.", "titulo_pt": "Óculos inteligentes sem câmera? Mesmo a Realities aposta na produtividade", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 46146, "titulo": "Em três dias, Instagram lança e cancela IA que podia alterar fotos dos usuários sem permissão", "url": "https://veja.abril.com.br/tecnologia/em-tres-dias-instagram-lanca-e-cancela-ia-que-permitia-alterar-fotos-dos-usuarios-sem-permissao/", "fonte_id": "veja", "data_pub": "2026-07-11T17:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ferramenta 'Muse Image', anunciada pela Meta na terça-feira, foi descontinuada na sexta-feira após críticas e repercussão negativa.", "titulo_pt": "Em três dias, Instagram lança e cancela IA que podia alterar fotos dos usuários sem permissão", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 46587, "titulo": "How AI rebrands fail to deliver a lasting share price boost", "url": "https://www.ft.com/content/07fa9ce9-ac21-484c-a57c-078b0bb0fd3b", "fonte_id": "financial_times", "data_pub": "2026-07-11T15:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A maioria das empresas que mudaram sua estratégia para incluir inteligência artificial não conseguiu manter os ganhos de valorização de suas ações, conforme analisado pela Financial Times.", "titulo_pt": "Como a IA rebranding não garante uma elevação duradoura no preço das ações", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 46729, "titulo": "OpenAI bets on families as ChatGPT goes deeper into households", "url": "https://techcrunch.com/2026/07/11/openai-bets-on-families-as-chatgpt-goes-deeper-into-households/", "fonte_id": "techcrunch", "data_pub": "2026-07-11T14:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A OpenAI está contratando um gerente de produto dedicado para desenvolver experiências para famílias, cuidadores e idosos. ChatGPT está expandindo sua presença nas casas através desses esforços.", "titulo_pt": "Openai investe em famílias com o ChatGPT", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 46574, "titulo": "While Musk's Neuralink drills into skulls, China's BrainCo bets the future of brain tech is wearable", "url": "https://www.cnbc.com/2026/07/11/chinas-brainco-bets-on-wearable-brain-tech.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-11T13:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A interesse pelas interfaces cérebro-computador está aumentando, pois prometem auxiliar pessoas com funções neurais comprometidas. Enquanto a Neuralink de Musk opera diretamente no cérebro, a BrainCo aposta que o futuro da tecnologia cerebral será baseado em dispositivos vestíveis.", "titulo_pt": "Enquanto a Neuralink de Musk perfura crânios, a BrainCo aposta no futuro das tecnologias cerebrais nos dispositivos vestíveis", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 46073, "titulo": "Musk mira IA impulsionada pelo espaço, mas estrutura na Terra sustenta SpaceX no curto prazo", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/musk-mira-ia-impulsionada-pelo-espaco-mas-estrutura-na-terra-sustenta-spacex-no-curto-prazo.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-11T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Analistas de Wall Street afirmam que, no curto prazo, o valor da SpaceX está mais ligado à construção de infraestrutura na Terra do que ao potencial futuro de inteligência artificial impulsionada pelo espaço. Elon Musk apresentou um cenário onde a IA e o espaço se integram, mas a empresa ainda depende dos projetos terrestres para seu crescimento imediato.", "titulo_pt": "Musk aponta IA com base no espaço, mas infraestrutura na Terra sustenta SpaceX no curto prazo", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 46758, "titulo": "China’s Long March-10B rocket feat lights up social media: is SpaceX set to lose crown?", "url": "https://www.scmp.com/news/china/science/article/3360231/chinas-long-march-10b-rocket-feat-lights-social-media-spacex-set-lose-crown?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-11T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "China realizou um feito histórico ao recuperar de forma controlada o primeiro foguete orbital reutilizável, gerando debates acalorados nas redes sociais sobre a rápida evolução do programa espacial chinês e possíveis tensões com os Estados Unidos. O evento ocorre em um momento de otimismo crescente no setor satelital, impulsionado pela alta demanda por constelações de internet.", "titulo_pt": "China realiza recuperação controlada de foguete orbital: SpaceX pode perder o título?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 46759, "titulo": "In China, parents turn to AI to help children select a university degree", "url": "https://www.scmp.com/economy/china-economy/article/3360144/china-parents-turn-ai-help-children-select-university-degree?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-11T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Zhang Qi, um motorista de aplicativo em Guangzhou, está utilizando inteligência artificial para auxiliar seu filho na escolha do curso universitário. Este é um dos principais desafios enfrentados por milhões de jovens chineses que acabam de receber seus resultados do exame vestibular.", "titulo_pt": "Em China, pais recorrem à IA para ajudar filhos a escolher curso universitário", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 46714, "titulo": "A Jupiter-size planet that escaped its star's death", "url": "https://arstechnica.com/science/2026/07/a-jupiter-size-planet-that-escaped-its-stars-death/", "fonte_id": "ars_technica", "data_pub": "2026-07-11T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A pesquisa não esclarece como o planeta de tamanho similar a Júpiter evitou a fase expansiva do seu estrela quando ela se tornou uma gigante vermelha.", "titulo_pt": "Um planeta do tamanho de júpiter que escapou da morte de sua estrela", "veiculo": "Ars Technica", "pais": "EUA", "classe": "B"}, {"id": 45893, "titulo": "JBL para Dia dos Pais: 5 opções de caixa de som que ele vai amar", "url": "https://canaltech.com.br/produtos/jbl-para-dia-dos-pais-5-opcoes-de-caixa-de-som-que-ele-vai-amar/", "fonte_id": "canaltech", "data_pub": "2026-07-11T11:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A JBL oferece cinco opções de caixa de som para presentear no Dia dos Pais, incluindo modelos Bluetooth recentes e modernos. As opções disponíveis são o JBL Go 5, JBL Clip 5, JBL Flip 7, JBL Charge 6 e JBL Boombox 4.", "titulo_pt": "JBL para Dia dos Pais: 5 opções de caixa de som ideais", "veiculo": "Canaltech", "pais": "Brasil", "classe": "C"}, {"id": 46715, "titulo": "Overhaul of public lands grazing regulations seeks to cut public involvement", "url": "https://arstechnica.com/tech-policy/2026/07/overhaul-of-public-lands-grazing-regulations-seeks-to-cut-public-involvement/", "fonte_id": "ars_technica", "data_pub": "2026-07-11T11:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Bureau of Land Management está pela primeira vez desde 1995 revisando suas regulamentações sobre pastoreio público. O objetivo é reduzir a participação pública no processo.", "titulo_pt": "Revisão das regulamentações de pastoreio em terras públicas busca diminuir a participação pública", "veiculo": "Ars Technica", "pais": "EUA", "classe": "B"}, {"id": 45851, "titulo": "Novas tecnologias apresentadas pela gigante L’Oréal indicam a próxima revolução da beleza", "url": "https://veja.abril.com.br/comportamento/novas-tecnologias-apresentadas-pela-gigante-loreal-indicam-a-proxima-revolucao-da-beleza/", "fonte_id": "veja", "data_pub": "2026-07-11T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A empresa L’Oréal apresentou novas tecnologias que indicam uma transformação na indústria da beleza, focando em tratamentos personalizados. O futuro da beleza será baseado em protocolos altamente individualizados.", "titulo_pt": "Novas tecnologias da L’Oréal sinalizam próxima revolução na beleza", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 45894, "titulo": "8 jogos japoneses que nunca viraram um anime", "url": "https://canaltech.com.br/games/8-jogos-japoneses-que-nunca-viraram-um-anime/", "fonte_id": "canaltech", "data_pub": "2026-07-11T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Videogames baseados em anime são comuns desde os anos 80, mas existem também jogos que se tornaram animes. Pokémon é um exemplo popular de jogo que virou série animada.", "titulo_pt": "8 Jogos japoneses que nunca viraram um anime", "veiculo": "Canaltech", "pais": "Brasil", "classe": "C"}], "tecnologia__eventos": [], "ciencia": [{"id": 46775, "titulo": "Ribosome-based gene circuit lets cells read six signals and trigger responses", "url": "https://phys.org/news/2026-07-ribosome-based-gene-circuit-cells.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de pesquisa da POSTECH desenvolveu uma nova plataforma chamada 'ciclo gene RNA-base', que permite às células lerem simultaneamente múltiplos sinais e gerarem respostas programadas autonomamente. Este avanço representa um passo além da manipulação genética simples, direcionando-se para uma era nas quais as próprias células podem funcionar como 'computadores vivos'.", "titulo_pt": "Maquinaria ribossomal serve de 'interruptor' e permite que células leiam seis sinais e gerem respostas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 46776, "titulo": "The gap between forecasts and reality can change public emotions during disasters", "url": "https://phys.org/news/2026-07-gap-reality-emotions-disasters.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A equipe de pesquisa, liderada pelo professor Jonghun Kam e Kiru Kim da Department of Environmental Engineering na POSTECH, analisou como diferentes tipos de erro nas previsões meteorológicas afetaram as emoções do público durante o desembarco do Furacão Khanun. Usando inteligência artificial (IA) e processamento de linguagem natural (PLN), os pesquisadores descobriram que erros de previsão diferentes (como sobre-estimação e sub-estimação) provocaram respostas emocionais distintas.", "titulo_pt": "A diferença entre as previsões e a realidade pode influenciar as emoções do público durante desastres", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 46074, "titulo": "Sobreviventes da pior extinção em massa suportaram melhor aquecimento global", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/sobreviventes-da-pior-extincao-em-massa-suportaram-melhor-aquecimento-global.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-11T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo recente indica que os grupos de animais atuais, como moluscos e peixes, sobreviveram melhor durante a maior extinção em massa da história terrestre há 250 milhões de anos, pois foram mais resistentes ao aquecimento global e à diminuição do oxigênio nas águas marinhas.", "titulo_pt": "Sobreviventes da pior extinção em massa resistiram melhor ao aquecimento global", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 46777, "titulo": "Heavy traffic can turn flower-rich verges into bumblebee traps, study finds", "url": "https://phys.org/news/2026-07-heavy-traffic-rich-verges-bumblebee.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A pesquisa da Universidade de Lund na Suécia descobriu que florestas de flores nas margens das estradas podem atraír abelhas-rei, mas também podem ser perigosas para os insetos se o tráfego for muito intenso. Os cientistas usaram cães treinados para detectar ninhos de abelha-rei e examinaram 60 margens de estrada no sul da Suécia, comparando a quantidade de abelhas-rei vivas e mortas em locais com diferentes níveis de tráfego.", "titulo_pt": "Tráfego pesado pode transformar margens florestadas de flores em armadilhas para abelhas-rei, estudo mostra", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 46778, "titulo": "Managing water with local wisdom and science", "url": "https://phys.org/news/2026-07-local-wisdom-science.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em uma pequena bacia hidrográfica de Asakura, na cidade rural de Fukuoka Prefecture, canais de pedra centenários ainda direcionam a água pelos campos e para o rio abaixo. Hoje, esses mesmos sistemas são objeto de estudo por pesquisadores do Laboratório de Engenharia de Sistemas de Bacias Hidrográficas da Universidade de Kyushu.", "titulo_pt": "Gerenciando água com sabedoria local e ciência", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 46779, "titulo": "A robot that reads bacteria by touch, without staining or chemical labels", "url": "https://phys.org/news/2026-07-robot-bacteria-chemical.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A identificação rápida de bactérias é crucial para a saúde, segurança alimentar, monitoramento ambiental e controle de infecções. Um método comum é a classificação gram, que divide as bactérias em positivas e negativas, mas o processo tradicional requer várias etapas químicas, pessoal treinado e interpretação manual.", "titulo_pt": "Um robô que lê bactérias pela sensação, sem corantes ou rótulos químicos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 46780, "titulo": "World's largest whale graveyard discovered by Chinese sub", "url": "https://phys.org/news/2026-06-world-largest-whale-graveyard-chinese.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T16:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas chineses descobriram o maior necrotério de baleias do mundo no fundo do Oceano Índico, onde uma grande quantidade de baleias novas e antigas suporta enormes comunidades de vida marinha profunda.", "titulo_pt": "Maior necrotério de baleias do mundo descoberto pelo submarino chinês", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 46781, "titulo": "Tiny worms reveal backup circuits that keep survival reflexes from failing", "url": "https://phys.org/news/2026-07-tiny-worms-reveal-backup-circuits.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T16:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de pesquisa liderado pelo professor Chaogu Zheng da Universidade de Hong Kong, em colaboração com cientistas da Princeton University e Columbia University, descobriu como as circuitos sensoriais-motores permanecem confiáveis mesmo quando alguns genes ou conexões neurais são interrompidos.", "titulo_pt": "Pequenos vermes revelam circuitos de backup que mantêm os refleitos de sobrevivência funcionando", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 46826, "titulo": "Your lost dog can now call home with the world's 1st satellite-connected dog collar", "url": "https://www.space.com/space-exploration/satellites/your-lost-dog-can-now-call-home-with-the-worlds-1st-satellite-connected-dog-collar", "fonte_id": "space_com", "data_pub": "2026-07-11T16:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo colar para cães com rastreamento GPS promete conectividade de praticamente qualquer lugar, graças à rede Starlink da SpaceX que transmite diretamente para os telefones móveis.", "titulo_pt": "Seu cachorro perdido pode agora ligar para casa com o primeiro collário de cachorro conectado por satélite", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 46782, "titulo": "Could permanent magnets protect astronauts from solar storms?", "url": "https://phys.org/news/2026-07-permanent-magnets-astronauts-solar-storms.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T15:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A proteção de astronautas da radiação letal que enfrentam é um desafio central para projetos de missões espaciais a longo prazo. Um novo estudo, publicado em pré-impressão no arXiv por Valerio Parisi e uma equipe de pesquisadores italianos e alemães, examina a viabilidade do uso de magnéticos permanentes como meio de proteção.", "titulo_pt": "Magnéticos permanentes poderiam proteger astronautas de tempestades solares?", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 46827, "titulo": "This Week In Space podcast: Episode 218 — Which Way to the Moonbase?", "url": "https://www.space.com/entertainment/space-movies-shows/this-week-in-space-podcast-episode-218-which-way-to-the-moonbase", "fonte_id": "space_com", "data_pub": "2026-07-11T15:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Na Episode 218 do This Week In Space, Rod Pyle e Tariq Malik conversam com o cientista planetário Dr. Pascal Lee sobre os novos planos da NASA para uma base lunar.", "titulo_pt": "Episódio 218 do this Week In Space: conversa sobre novos planos da nasa para uma base lunar", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 46783, "titulo": "X-ray tracking reveals uneven expansion in young supernova remnant G292.0+1.8", "url": "https://phys.org/news/2026-07-ray-tracking-reveals-uneven-expansion.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Astrônomos holandeses analisaram dados da Observatória Espacial Chandra do NASA para investigar um resíduo de supernova jovem conhecido como G292.0+1.8, rico em oxigênio. Os resultados publicados no servidor pré-impresso arXiv fornecem importantes insights sobre a expansão deste resíduo.", "titulo_pt": "Rastreamento x revela expansão desigual em jovem resíduo de supernova G292.0+1.8", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 46821, "titulo": "How a 1,900-year-old latrine helps explain why Roman concrete lasts", "url": "https://www.scientificamerican.com/article/how-a-1-900-year-old-latrine-helps-explain-why-roman-concrete-lasts/", "fonte_id": "scientific_american", "data_pub": "2026-07-11T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um exemplo antigo demonstra calcita se infiltrando nas fissuras e poros do material, oferecendo possíveis lições para a fabricação de concreto moderno mais duradouro.", "titulo_pt": "Como uma latrina de 1.900 anos ajuda a explicar por que o concreto romano dura", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 46828, "titulo": "Sci-fi action movies were better in the '90s. 'Independence Day' is full of reasons why", "url": "https://www.space.com/entertainment/space-movies-shows/sci-fi-action-movies-were-better-in-the-90s-independence-day-is-full-of-reasons-why", "fonte_id": "space_com", "data_pub": "2026-07-11T15:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Super-heróis e franquias não dominavam os cinemas na década de 1990. 'Independência Day' é um exemplo disso.", "titulo_pt": "Ação de ficção científica era melhor nos anos 90. 'independência Day' tem razões para isso", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 46784, "titulo": "'Their story is our story': Pigeons and humans, 3,500 years together", "url": "https://phys.org/news/2026-05-story-pigeons-humans-years.html", "fonte_id": "phys_org", "data_pub": "2026-07-11T14:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pombas têm sido fonte de alimento, fertilizante e símbolo religioso para humanos há milhares de anos. Embora atualmente sejam geralmente consideradas pragas urbanas sujas, elas desempenharam um papel importante na sociedade humana por muito tempo.", "titulo_pt": "Sua história é a nossa história: pombas e humanos, 3.500 anos juntos", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 46756, "titulo": "What happened before Chinese semiconductor scientist Wang Danhao took his life in the US?", "url": "https://www.scmp.com/news/china/science/article/3360236/what-happened-chinese-semiconductor-scientist-wang-danhao-took-his-life-us?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-11T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As cinzas do cientista de semicondutores chinês Wang Danhao foram devolvidas à China, quatro meses após ele se suicidar após ser questionado pela polícia dos EUA. O pesquisador de 31 anos, lembrado por colegas como talentoso e trabalhador com um futuro promissor, está agora com sua mãe, a única parente imediata que o criou sozinha.", "titulo_pt": "O que aconteceu antes do cientista chinês Wang Danhao se suicidar nos EUA?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 46197, "titulo": "\"Julho das Pretas\" homenageia escritora mineira Conceição Evaristo", "url": "https://www.metropoles.com/minas-gerais/julho-das-pretas-homenageia-escritora-mineira-conceicao-evaristo", "fonte_id": "metropoles", "data_pub": "2026-07-11T18:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A campanha 'Julho das Pretas' homenageará a escritora mineira Conceição Evaristo com debates, ações de valorização e um festival cultural durante o mês de julho.", "titulo_pt": "Julho das Pretas", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 46145, "titulo": "O feito inédito de Isabelle Huppert na cena cinematográfica da França", "url": "https://veja.abril.com.br/coluna/veja-gente/o-feito-inedito-de-isabelle-huppert-na-cena-cinematografica-da-franca/", "fonte_id": "veja", "data_pub": "2026-07-11T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Isabelle Huppert será a próxima diretora da prestigiada Cinemateca Francesa.", "titulo_pt": "Feito inédito: Isabelle Huppert assumirá direção da cinemateca francesa", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 46522, "titulo": "Noskova defeats fellow Czech Muchova to win first Wimbledon", "url": "https://www.lemonde.fr/en/sports/article/2026/07/11/noskova-defeats-fellow-czech-muchova-to-win-first-wimbledon_6755383_9.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-11T17:47:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Linda Noskova, de 21 anos, venceu três sets contra sua compatriota Karolina Muchova e conquistou seu primeiro título do Grand Slam no Wimbledon.", "titulo_pt": "Noskova derrota Muchova e vence primeiro título do grand slam em Wimbledon", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 46850, "titulo": "Andrew Salgado’s Gestural Still Lifes Pulse with Energy", "url": "https://www.thisiscolossal.com/2026/07/andrew-salgado-flower-still-life-paintings/", "fonte_id": "colossal", "data_pub": "2026-07-11T17:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As cores ondulam em cada tela, exibindo flores estilizadas em diferentes estágios de floração e decomposição. O artista Andrew Salgado cria obras gestuais que pulsam com energia.", "titulo_pt": "Andrew Salgado’s Gestural Still Lifes Pulse with Energy - vidas estilizadas gestuais pulsam com energia", "veiculo": "Colossal (arte)", "pais": "EUA", "classe": "B"}, {"id": 46101, "titulo": "Exposição O Tempo das Plantas propõe troca cultural e desaceleração", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-07/exposicao-o-tempo-das-plantas-propoe-troca-cultural-e-desaceleracao", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-07-11T17:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A partir deste sábado, a Casa Pacheco Leão no Jardim Botânico do Rio de Janeiro recebe a exposição 'O Tempo das Plantas', que explora a circulação de espécies e intercâmbios culturais. A mostra, parte do Ano Cultural Brasil-China, utiliza o chá e o café como temas para promover desaceleração e reflexão.", "titulo_pt": "Exposição O Tempo das Plantas propõe troca cultural e desaceleração", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 46085, "titulo": "'Quem Ama Cuida': Pilar ameaça demitir Rosa para transformar Adriana em sem-teto", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/07/quem-ama-cuida-pilar-ameaca-demitir-rosa-para-transformar-adriana-em-sem-teto.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-11T17:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Na novela 'Quem Ama Cuida', Pilar ameaça demitir Rosa para colocar Adriana em situação de rua. Os próximos capítulos apresentarão um novo conflito entre Adriana e Pilar.", "titulo_pt": "Pilar ameaça demitir Rosa para deixar Adriana sem-teto", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 46133, "titulo": "Onda de calor na França leva Torre Eiffel e museus de Paris a fecharem mais cedo", "url": "https://www.brasildefato.com.br/2026/07/11/onda-de-calor-na-franca-leva-torre-eiffel-e-museus-de-paris-a-fecharem-mais-cedo/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-11T17:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A intensa onda de calor na França fez com que a Torre Eiffel e museus como o Louvre e Orsay anunciarem o fechamento antecipado no fim de semana. A medida foi tomada devido às altas temperaturas previstas para sábado (11) e domingo (12).", "titulo_pt": "Onda de calor na França faz Torre Eiffel e museus de Paris fecharem mais cedo", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 46086, "titulo": "De 'Champagne' a 'Roberta', relembre outros sucessos do cantor Peppino di Capri", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/07/de-champagne-a-roberta-relembre-outros-sucessos-do-cantor-peppino-di-capri.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-11T16:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Peppino di Capri, um dos ícones da música do século 20, teve grandes sucessos como 'Champagne', 'Roberta' e 'Let's Twist Again'.", "titulo_pt": "De 'Champagne' a 'Roberta', relembre outros sucessos do cantor Peppino di Capri", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 46087, "titulo": "Atriz de 'Elle: Legalmente Loira' consulta vidente e reflete sobre sua carreira", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/07/atriz-de-elle-legalmente-loira-consulta-vidente-e-reflete-sobre-sua-carreira.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-11T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A atriz June Diane Raphael consultou uma vidente que lhe aconselhou a deixar o passado para trás e abraçar as mudanças. Ela refletiu sobre sua carreira, mencionando possivelmente estar passando por perimenopausa.",
