<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>

<script>
const D = {"gerado_em": "21/06/2026 23:55", "stats": {"noticias_total": 9848, "resumos_total": 2015, "sem_topico": 0, "ultima_coleta": "2026-06-22T02:15:04Z"}, "rotulos_topico": {"politica_nacional": "Política Nacional", "politica_internacional": "Política Internacional", "geopolitica": "Geopolítica", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "politica_internacional", "geopolitica", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "sinteses": {"direitos_humanos": "Em uma notícia urgente da Coreia do Sul, investigadores estão buscando um mandado de prisão para o líder da seita Shincheonji, Lee Man-hee. A investigação está relacionada ao surto de COVID-19 que teve origem em uma igreja da seita.  No Chile, o país enfrenta o desafio do deslocamento forçado, buscando soluções que vão além de medidas emergenciais. O objetivo é implementar políticas e programas a longo prazo para abordar as causas raiz do problema. Especialistas defendem uma abordagem multidimensional que inclua direitos humanos, proteção social e desenvolvimento sustentável.  Em Hong Kong, Xia Baolong, responsável por assuntos de Hong Kong e Macau em Pequim, visitou a cidade para revisar o progresso do governo local. O governo lançou uma consulta pública sobre o primeiro plano quinquenal da cidade antes da visita de Xia e publicou um relatório sobre o impacto de suas ações para aliviar a pobreza após a visita. Nos Estados Unidos, um novo listado de taxas para solicitantes de asilo entrou em vigor a partir de 29 de junho. O governo americano anunciou as taxas que serão cobradas dos solicitantes de asilo.  Em São Paulo, um homem foi condenado por injúria religiosa contra sua mãe e ameaça contra seu pai. A Justiça determinou uma pena de um ano de reclusão, um mês de detenção e pagamento de R$ 1 mil de indenização.", "meio_ambiente": "O parque eólico SunZia foi inaugurado em Novo México, Estados Unidos. O parque possui 916 turbinas de vento e é capaz de gerar 3.650 megawatts de energia, o que representa 45% da capacidade eólica do estado. Essa quantidade de energia é suficiente para abastecer simultaneamente um milhão de domicílios durante o verão. A inauguração marca um importante passo na busca por energias renováveis no país.", "sociedade": "O governador do Illinois, JB Pritzker, anunciou pagamentos únicos de US$400 para famílias que perderam o benefício do programa SNAP. Os pagamentos serão destinados a famílias elegíveis que tiveram suas inscrições no SNAP canceladas ou suspensas em 2023.  Em outro caso social, a Califórnia está testando um 'passaporte laboral' digital para contratar pessoas qualificadas sem diploma universitário. O objetivo é facilitar o acesso ao mercado de trabalho para profissionais com experiência e habilidades valiosas, mesmo sem formação acadêmica formal. A proposta de um berço universal no Chile busca garantir o acesso à segurança e bem-estar infantil para todas as crianças, redistribuindo os recursos em vez de acumular por uma pequena parcela da população. O empresário Henry Ford defendia que 20 mil empregados satisfeitos e bem alimentados eram mais importantes do que poucos ficarem ricos, colocando o bem-estar dos trabalhadores acima da riqueza individual.  Especialistas apontam que a quantidade de interações sociais não sempre indica a profundidade dos vínculos. Adultos amáveis, porém sem relacionamentos fortes, podem descobrir que serem abordados por pessoas é diferente de serem escolhidos como amigos.", "cultura": "A PhotoEspaña, principal festival de fotografia da Espanha, abriu oficialmente em Madrid este mês e apresentará até setembro quase 100 exposições com o trabalho de mais de 300 artistas visuais na capital e pelo país.  Em São Paulo, a peça 'Mudando de Pele', protagonizada por Taís Araújo, terá novas temporadas no Teatro Faap a partir de 13 de agosto. O evento acontecerá após o sucesso da temporada no Sesc 14 Bis. A cantora Dua Lipa usou um vestido de casamento da Chanel com 25 mil plumas em seu casamento com o ator Callum Turner na Sicília.  O casamento teve três noites de festa com mais de 300 convidados e foi fotografado por David Sims. O Museu Nacional, no Rio de Janeiro, está inaugurando duas exposições inéditas a partir de domingo (21) para celebrar os 208 anos do museu. As exposições ocupam seis salas do Paço de São Cristóvão.  Em Londres, o Globe Theatre apresenta uma versão elegante e vibrante da peça problemática de Shakespeare 'Much Ado About Nothing'. A interação entre Beatrice (Pippa Nixon) e Benedick (Ken Nwosu) é repleta de energia romântica, com momentos divertidos de brincadeiras e escutas furtivas. As músicas, danças e figurinos são visualmente deslumbrantes.", "ciencia": "O El Niño, fenômeno caracterizado por temperaturas da água do Pacífico equatorial mais quentes que o normal, retornou em junho de 2026 e se fortaleceu durante aquele mês, segundo observações feitas pelo satélite Sentinel-6 Michael Freilich.  Pesquisadores descobriram uma característica estrutural na Grande Pirâmide de Gizé que permite a dissipação de vibrações sísmicas, garantindo sua resistência a terremotos ao longo dos séculos. Essa descoberta explica como a pirâmide sobreviveu a diversos tremores ao longo do tempo.  Em um estudo realizado no Paraná, o fungo Sporothrix foi detectado em 11 de 81 vertebrados silvestres mortos em rodovias na região da Mata Atlântica. A pesquisa analisou a presença do fungo responsável pela esporotricose em animais atropelados. Uma mulher na China desenvolveu erupções cutâneas e coceira após aplicar medidas extremas de proteção solar, incluindo chapéu e máscara que cobrem o rosto inteiro.  Vírus desempenham um papel fundamental no funcionamento dos ecossistemas, influenciando a dinâmica das comunidades microbianas, o fluxo de matéria e os ciclos biogeoquímicos globais. Apesar da sua importância ecológica, muitos deles permaneciam invisíveis à ciência por muito tempo. Uma equipe de pesquisadores descobriu centenas de restos fósseis de baleias na costa sudoeste da Austrália, formando o maior, mais profundo e antigo cemitério de ossos de cetáceos já observado.  A mecânica quântica pode funcionar sem números imaginários, segundo uma nova análise realizada por físicos da Universidade Heinrich Heine de Düsseldorf (HHU) e do Centro Aeroespacial Alemão (DLR). Um estudo sugere que gatos podem não ser os melhores companheiros para consolar pessoas tristes, pois podem reagir com hostilidade ou indiferença quando buscam conforto. Pesquisadores da Tufts descobriram novas maneiras de expandir o potencial do uso de esporos bacterianos como catalisadores para reações químicas, produção de biocombustíveis ou decomposição de poluentes.", "tecnologia": "A indústria de bebidas alcoólicas da Coreia do Sul está se preparando para mudanças abrangentes na embalagem após o governo ordenar que os rótulos de advertência sejam exibidos de forma proeminente na frente de cada garrafa. As novas diretrizes anunciadas pelo Ministério da Saúde e Bem-estar em 8 de maio exigem que avisos sobre o consumo excessivo de álcool e direção embriagada sejam colocados abaixo do rótulo principal da marca em todas as bebidas alcoólicas produzidas.  Em paralelo, empresas japonesas estão intensificando seus esforços sobre diversidade, equidade e inclusão (DEI) com o objetivo de melhorar a gestão de recursos humanos dentro das empresas. A inteligência artificial agentica está entrando no setor financeiro, com um futuro onde agentes realizam compras e gerenciam patrimônio em nome das pessoas se aproximando.  A discussão sobre a definição de AGI pode influenciar o desenvolvimento futuro dessa tecnologia.", "economia": "As negociações entre EUA e Irã sobre o programa nuclear iraniano geraram incerteza no mercado global de petróleo, levando a um aumento nos preços do barril.  A situação é acompanhada com atenção por investidores que aguardam informações sobre o andamento das conversas e seu impacto potencial na região. A volatilidade também se refletiu nas bolsas de valores, como a sul-coreana, que abriu em baixa devido à incerteza. Paralelamente, a Coreia do Sul registrou um aumento significativo nas exportações nos primeiros 20 dias de junho, impulsionado por vendas robustas de chips. O país busca superar os desafios econômicos globais e fortalecer sua posição no mercado internacional. Em outro contexto, o ministro da economia da Coreia do Sul discutiu a direção da política econômica com especialistas, em meio a um aumento significativo nas receitas tributárias. A reunião teve como objetivo analisar as tendências econômicas e definir prioridades para o orçamento.", "geopolitica": "As negociações entre os Estados Unidos e o Irã na Suíça resultaram no levantamento do bloqueio e na liberação de ativos congelados para o Irã, afirmou Teerã. O ministro das Relações Exteriores iraniano, Seyed Abbas Araghchi, disse que a mediação paquistanesa e catarrense produziu avanços significativos para pôr fim à guerra no Líbano.  Em outros acontecimentos, um ex-ministro da Defesa sul-coreano foi indiciado por tentar usar uma unidade de inteligência militar para criar um pretexto para o estado de sítio do ex-presidente Yoon Suk Yeol. O presidente dos Estados Unidos, Donald Trump, criticou Itália e a primeira-ministra Giorgia Meloni por não se juntarem aos Estados Unidos e Israel em uma campanha militar contra o Irã.  O ministro de defesa interino do Irã, Majid Ibn al-Reza, pediu a países islâmicos que estabeleçam uma faixa de segurança regional. A Coreia do Norte criticou os Estados Unidos e outros países do Ocidente, acusando-os de reviver o nazismo. O país também defendeu a posição da Rússia na guerra com a Ucrânia.", "politica_internacional": "Abelardo de la Espriella, um advogado ultraconservador e aliado de Donald Trump, foi eleito presidente da Colômbia em uma votação apertada contra o candidato de esquerda Iván Cepeda. O resultado coloca a Colômbia na tendência de países latino-americanos que têm escolhido líderes ultradireitistas nos últimos anos. De la Espriella venceu com 49,66% dos votos contra 48,7% para Cepeda, em uma disputa acirrada que levou dias para ser definida. O presidente em exercício Gustavo Petro pediu calma à população e aguardo o escrutínio oficial antes de declarar um vencedor.  Enquanto isso, os Estados Unidos e o Irã continuam conversas na Suíça, com representantes dos dois países, Catar e Paquistão presentes. As negociações se concentram em um plano de ação, mas uma nova ameaça do ex-presidente americano Donald Trump gerou irritação em Teerã.  Em outro evento, o presidente da Guatemala, Bernardo Arévalo, anunciou um plano para encontrar os restos mortais de 45 mil pessoas que desapareceram durante a guerra civil do país. O objetivo é dar paz aos familiares das vítimas e promover a verdade histórica. No Equador, os cidadãos aprovaram por maioria o fim das atividades exploratórias no bloco 43-ITT, localizado no Parque Nacional Yasuní. A área abriga milhares de espécies de plantas e animais, territórios indígenas e grandes reservas petrolíferas.", "politica_nacional": "A Colômbia viveu um segundo turno eleitoral extremamente acirrado, com a vitória do candidato de extrema-direita Abelardo de la Espriella sobre o senador Iván Cepeda. De la Espriella obteve uma pequena vantagem, com menos de 1% de diferença nos votos. O resultado ainda está sendo definido e a apuração final deve confirmar a vitória. A disputa foi marcada por polarização política e tensões sociais.  Em paralelo, no Brasil, o ex-ministro Márcio França voltou a considerar uma candidatura ao governo de São Paulo, argumentando que sua participação poderia garantir um segundo turno nas eleições. Enquanto isso, o vice-presidente do TSE, André Mendonça, determinou a exclusão de um vídeo publicado pelo deputado Sóstenes Cavalcante, que sugeria, sem provas, que o PT é financiado por facções criminosas. A polícia também apreendeu 50 toneladas de cocaína escondidas em cargas de madeira nos estados de Mato Grosso e Mato Grosso do Sul, o que pode ser a maior apreensão da história do país.", "ciencia_tecnologia": "O Telescópio Espacial James Webb identificou o que pode ser um precursor de aglomerados de galáxias atuais, segundo dois estudos publicados em 21 de junho de 2026. Astrônomos internacionais utilizaram dados do telescópio para realizar as pesquisas.  Em outro estudo, cientistas descobriram que os níveis de testosterona aumentam ou se estabilizam em pessoas que tomam medicamentos GLP-1, embora mais pesquisas sejam necessárias para confirmar os resultados. A experiência de interagir com polvos é comparada à de se deparar com seres alienígenas devido à sua biologia única, como discutido no artigo 'Interagir com um polvo é como encontrar uma inteligência alienígena'.  Pesquisadores brasileiros mapearam a perda do canto dos grilos ao longo da evolução, indicando que desafios evolutivos estão levando alguns grilos a se tornarem mais discretos ou totalmente silenciosos. A Samsung Electronics Co. discutiu maneiras de expandir as vendas de memória HBM e a possibilidade de firmar acordos a longo prazo com seus clientes mais importantes."}, "resumo_do_dia": {"politica_nacional": [{"id": 9765, "titulo": "Moro reforça parceria com Tarcísio em campanha e quer copiar programa para saúde", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/moro-reforca-parceria-com-tarcisio-em-campanha-e-quer-copiar-programa-para-saude.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-22T02:00:00Z", "idioma": "pt", "texto_pt": "O pré-candidato ao governo do Paraná, Sergio Moro (PL), pretende adotar medidas implementadas por Tarcísio de Freitas (Republicanos) em São Paulo. Moro quer fortalecer o discurso da parceria entre os estados durante a campanha e considera realizar eventos conjuntos.", "titulo_pt": "Moro reforça parceria com Tarcísio na campanha e quer copiar programa de saúde", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 9766, "titulo": "'Chegou-se ao 8 de Janeiro por tolerarmos o que era intolerável', diz presidente do STM", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/chegou-se-ao-8-de-janeiro-por-tolerarmos-o-que-era-intoleravel-diz-presidente-do-stm.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-22T02:00:00Z", "idioma": "pt", "texto_pt": "O presidente do Superior Tribunal Militar (STM) afirmou que o país chegou a 8 de Janeiro devido à tolerância a atos intoleráveis. Maria Elizabeth Rocha, primeira mulher a presidir o STM,  está na presidência da corte mais antiga do Brasil.", "titulo_pt": "'Chegamos ao 8 de Janeiro por tolerarmos o que era intolerável', diz presidente do STM", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 9768, "titulo": "Juízes e procuradores flexibilizam férias para terem seis meses de folga por ano", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/juizes-e-procuradores-flexibilizam-ferias-para-terem-seis-meses-de-folga-por-ano.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-22T02:00:00Z", "idioma": "pt", "texto_pt": "Juízes e membros do Ministério Público conseguiram flexibilizar as regras de férias para terem seis meses de descanso anual. A mudança permite parcelar o período de folga e a possibilidade de ampliar o tempo livre com outras licenças. O ajuste também facilita o aumento do pagamento de indenizações sem comprometer longos períodos de descanso.", "titulo_pt": "Juízes e procuradores flexibilizam férias para terem seis meses de folga por ano", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 9769, "titulo": "Cena política nacional em alta definição", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/cena-politica-nacional-em-alta-definicao.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-22T02:00:00Z", "idioma": "pt", "texto_pt": "O texto discute como a tecnologia digital impulsiona mudanças rápidas em diversos aspectos da vida, desde processos produtivos até comportamentos humanos.  A autora menciona que vivemos em uma era de temporalidade acelerada devido às tecnologias digitais.", "titulo_pt": "Cena Política Nacional em Alta Definição", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 9783, "titulo": "Sub Judice, Arthur Henrique é mais votado em RR; resultado aguarda justiça", "url": "https://www.cnnbrasil.com.br/eleicoes/sub-judice-arthur-henrique-e-mais-votado-em-rr-resultado-aguarda-justica/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-22T01:32:00Z", "idioma": "pt", "texto_pt": "Arthur Henrique lidera as eleições para o mandato tampão de governador de Roraima. O resultado ainda está pendente de análise e decisão judicial.", "titulo_pt": "Arthur Henrique é o mais votado em Roraima, mas resultado aguarda decisão da justiça", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 9770, "titulo": "Candidato do PL é o mais votado em Roraima, mas TRE diz não poder declará-lo eleito", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/candidato-do-pl-e-o-mais-votado-em-roraima-mas-tre-diz-nao-poder-declara-lo-eleito.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-22T01:31:00Z", "idioma": "pt", "texto_pt": "Arthur Henrique Brandão Machado (PL) foi o candidato mais votado para governador de Roraima na suplementar deste domingo (21), com 60,87% dos votos. O Tribunal Regional Eleitoral (TRE) de Roraima ainda não proclamou o vencedor da eleição.", "titulo_pt": "Candidato do PL é o mais votado em Roraima, mas TRE diz não poder declará-lo eleito", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 9735, "titulo": "Abelardo de la Espriella arrasó en EE.UU.: la contundente diferencia que logró en las elecciones de Colombia 2026", "url": "https://www.lanacion.com.ar/estados-unidos/abelardo-de-la-espriella-arraso-en-eeuu-la-contundente-diferencia-que-logro-en-las-elecciones-de-nid21062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-22T01:25:00Z", "idioma": "es", "texto_pt": "Nas eleições colombianas para 2026, Abelardo de la Espriella obteve 80,79% dos votos no exterior, enquanto Gustavo Petro teve 18,22%. De la Espriella recebeu apoio de Donald Trump durante a campanha.", "titulo_pt": "Abelardo de la Espriella vence com larga diferença nas eleições colombianas no EUA", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 9722, "titulo": "Janja posta vídeo e exalta campanha federal contra feminicídio", "url": "https://www.poder360.com.br/poder-gente/janja-posta-video-e-exalta-campanha-federal-contra-feminicidio/", "fonte_id": "poder360", "data_pub": "2026-06-22T01:22:00Z", "idioma": "pt", "texto_pt": "A primeira-dama Janja publicou um vídeo nas redes sociais exaltando a campanha federal contra o feminicídio. O Pacto Nacional Brasil Contra o Feminicídio busca prevenir discriminação, misoginia e violência de gênero contra mulheres e meninas.", "titulo_pt": "Janja publica vídeo e elogia campanha federal contra feminicídio", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 9602, "titulo": "Australia politics live: Tim Wilson says it’s ‘silly’ to ask if house prices should go up or down amid debate over property tax reform", "url": "https://www.theguardian.com/australia-news/live/2026/jun/22/australia-politics-live-labor-coalition-one-nation-capital-gains-tax-reform-ndis-anthony-albanese-angus-taylor-question-time-ntwnfb", "fonte_id": "guardian_world", "data_pub": "2026-06-22T01:02:00Z", "idioma": "en", "texto_pt": "Tim Wilson afirmou que seria 'bobagem' questionar se os preços das casas devem subir ou descer durante o debate sobre a reforma do imposto imobiliário. Jane Hume, por outro lado, declarou que a coalizão não tem problemas com mais debates sobre as mudanças no NDIS, mas criticou as negociações entre o Partido Trabalhista e os Verdes.", "titulo_pt": "Política na Austrália ao vivo: Tim Wilson diz que é 'bobagem' perguntar se os preços das casas devem subir ou descer no meio do debate sobre reforma de imposto imobiliário", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 9577, "titulo": "Propuesta de Squella de subir los quórums para reformas constitucionales genera resistencias en parte del oficialismo", "url": "https://www.latercera.com/politica/noticia/propuesta-de-squella-de-subir-los-quorums-para-reformas-constitucionales-genera-resistencias-en-parte-del-oficialismo/", "fonte_id": "la_tercera", "data_pub": "2026-06-22T01:00:00Z", "idioma": "es", "texto_pt": "O senador Matías Walker chamou a proposta do Partido Republicano de 'provocativa'. Outros argumentam que a proposta falta transversalidade e pedem que o projeto, que busca elevar os requisitos para acusações constitucionais, seja aprovado. O projeto foi anunciado por parlamentares de diferentes setores.", "titulo_pt": "Proposta de Squella para aumentar maioria para reformas constitucionais gera resistência dentro do oficialismo", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 9578, "titulo": "Oposición se divide ad portas de la votación en general de la megarreforma", "url": "https://www.latercera.com/politica/noticia/oposicion-se-divide-ad-portas-de-la-votacion-en-general-de-la-megarreforma/", "fonte_id": "la_tercera", "data_pub": "2026-06-22T01:00:00Z", "idioma": "es", "texto_pt": "Lideranças opositoras esperavam apresentar uma contraproposta à lei de reconstrução até quarta-feira, quando a proposta será votada.  Diferenças internas impediu que um texto único fosse elaborado.", "titulo_pt": "Oposição se divide antes da votação geral da megapreforma", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 9668, "titulo": "Investigators to question election workers over ballot shortage", "url": "https://www.koreaherald.com/article/10783428", "fonte_id": "korea_herald", "data_pub": "2026-06-22T00:51:00Z", "idioma": "en", "texto_pt": "Investiguadores irão interrogar um grupo de servidores públicos que trabalharam em seções de votação que enfrentaram escassez de cédulas durante as eleições locais de 3 de junho. Oito indivíduos foram convocados para comparecer a uma equipe conjunta da polícia e do Ministério Público investigando as faltas de cédulas que suspenderam temporariamente o voto em 26 seções eleitorais em todo o país.", "titulo_pt": "Investigadores vão questionar funcionários eleitorais sobre falta de cédulas", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 9371, "titulo": "Eduardo Suplicy comemora 85 anos com missa, ocupação e Marcha da Maconha", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/eduardo-suplicy-comemora-85-anos-com-missa-ocupacao-e-marcha-da-maconha.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-22T00:45:00Z", "idioma": "pt", "texto_pt": "O deputado estadual Eduardo Suplicy iniciou as celebrações de seu aniversário de 85 anos com uma missa na Capela São Judas Tadeu. O padre Júlio Lancellotti celebrou a missa no campus da Universidade São Judas, na zona leste de São Paulo.", "titulo_pt": "Eduardo Suplicy comemora 85 anos com missa, ocupação e Marcha da Maconha", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 9418, "titulo": "Eleição na Colômbia: Quem é Abelardo de la Espriella", "url": "https://www.cnnbrasil.com.br/internacional/quem-e-abelardo-de-la-espriella-candidato-direitista-na-colombia/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-22T00:41:00Z", "idioma": "pt", "texto_pt": "Abelardo de la Espriella é um advogado que disputou o segundo turno das eleições presidenciais colombianas contra o senador Iván Cepeda.  O resultado da eleição determinará o próximo presidente da Colômbia.", "titulo_pt": "Eleição na Colômbia: Quem é Abelardo de la Espriella", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 9387, "titulo": "Entenda como funciona apuração preliminar dos votos na Colômbia", "url": "https://veja.abril.com.br/brasil/entenda-como-funciona-apuracao-preliminar-dos-votos-na-colombia/", "fonte_id": "veja", "data_pub": "2026-06-22T00:29:00Z", "idioma": "pt", "texto_pt": "Uma pré-contagem indicou a vitória do advogado de extrema-direita Abelardo de la Espriella. O resultado ainda precisa ser confirmado. A apuração preliminar é o primeiro passo no processo eleitoral colombiano.", "titulo_pt": "Entenda como funciona a apuração preliminar dos votos na Colômbia", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 9420, "titulo": "De la Espriella celebra vitória em pré-contagem e diz que Trump parabenizou", "url": "https://www.cnnbrasil.com.br/internacional/de-la-espriella-celebra-vitoria-em-pre-contagem-e-diz-que-trump-parabenizou/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-22T00:23:00Z", "idioma": "pt", "texto_pt": "O candidato de direita De la Espriella recebeu mais votos que Iván Cepeda, da esquerda, de acordo com a apuração preliminar. De la Espriella afirmou que o ex-presidente americano Donald Trump o parabenizou pela vitória.", "titulo_pt": "De la Espriella celebra vitória em pré-contagem e diz que Trump parabenizou", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}], "politica_internacional": [{"id": 9771, "titulo": "Cepeda, aliado de Petro, não declara derrota em eleição na Colômbia e diz esperar resultado final", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/cepeda-aliado-de-petro-nao-declara-derrota-em-eleicao-na-colombia-e-diz-esperar-resultado-final.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-22T02:03:00Z", "idioma": "pt", "texto_pt": "Ivan Cepeda, candidato de esquerda do partido Pacto Histórico, não reconheceu a derrota nas eleições presidenciais da Colômbia. Ele afirmou que, caso se confirme o resultado preliminar que aponta a vitória de Abelardo de la Espriella, o resultado será validado.", "titulo_pt": "Cepeda, aliado de Petro, não declara derrota nas eleições na Colômbia e espera resultado final", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 9772, "titulo": "Quando o povo votou contra a exploração do petróleo", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/colunas/bianca-santana/2026/06/quando-o-povo-votou-contra-a-exploracao-do-petroleo.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-22T02:00:00Z", "idioma": "pt", "texto_pt": "Em agosto de 2023, os cidadãos do Equador aprovaram por maioria o fim das atividades exploratórias no bloco 43-ITT, localizado no Parque Nacional Yasuní. A área abriga milhares de espécies de plantas e animais, territórios indígenas e grandes reservas petrolíferas.", "titulo_pt": "Quando o povo votou contra a exploração do petróleo", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 9844, "titulo": "Seoul, Beijing to hold 15th round of FTA follow-up talks on services", "url": "https://en.yna.co.kr/view/AEN20260622001200320", "fonte_id": "yonhap_news", "data_pub": "2026-06-22T02:00:00Z", "idioma": "en", "texto_pt": "Coreia do Sul e China iniciaram a 15ª rodada de negociações sobre o Acordo de Livre Comércio (ALC) em serviços. As discussões se concentram na implementação e desenvolvimento do acordo existente entre os dois países.", "titulo_pt": "Seul e Pequim realizarão 15ª rodada de conversas sobre o acordo de livre comércio", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 9815, "titulo": "US-Iran talks end in Switzerland, mediators say", "url": "https://www.dw.com/en/us-iran-talks-end-in-switzerland-mediators-say/live-77641405?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-22T01:31:00Z", "idioma": "en", "texto_pt": "As conversas entre autoridades dos Estados Unidos e do Irã na Suíça chegaram ao fim.  Mediadores do Catar e do Paquistão afirmaram que ambas as partes concordaram em um plano de ação. Conversas técnicas continuarão.", "titulo_pt": "Fala entre EUA e Irã terminam na Suíça, dizem mediadores", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 9758, "titulo": "Pakistan-Qatar, finito il primo round dei colloqui fra Iran e Usa", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/22/pakistan-qatar-finito-il-primo-round-dei-colloqui-fra-iran-e-usa_737417c1-643f-46a7-bb2e-0b5b343f999a.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-22T01:21:00Z", "idioma": "it", "texto_pt": "O primeiro encontro entre representantes do Irã e dos Estados Unidos, mediado por Paquistão e Catar, foi concluído. Os mediadores descreveram a atmosfera como positiva.", "titulo_pt": "Paquistão-Catar, finalizado o primeiro encontro entre Irã e EUA", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 9787, "titulo": "El ultra De la Espriella será el próximo presidente de Colombia, según el preconteo de votos", "url": "https://elpais.com/america-colombia/elecciones-presidenciales/2026-06-22/el-ultra-de-la-espriella-sera-el-proximo-presidente-de-colombia-segun-el-preconteo-de-votos.html", "fonte_id": "elpais_america", "data_pub": "2026-06-22T01:16:00Z", "idioma": "es", "texto_pt": "O advogado penalista controverso, De la Espriella, venceu o candidato de esquerda Iván Cepeda por menos de um ponto percentual (49,66% contra 48,70%), cerca de 250 mil votos. O candidato oficialista reconheceu a pré-contagem, mas pediu para aguardar o escrutínio.", "titulo_pt": "Ultra De la Espriella será o próximo presidente da Colômbia, segundo pré-contagem de votos", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 9640, "titulo": "Guatemala, piano per la ricerca di 45.000 scomparsi nella guerra civile", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/22/guatemala-piano-per-la-ricerca-di-45.000-scomparsi-nella-guerra-civile_28d7a123-f98b-41fa-a5ca-eabac80b831c.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-22T01:12:00Z", "idioma": "it", "texto_pt": "O presidente da Guatemala, Bernardo Arévalo, anunciou um plano para encontrar os restos mortais de 45 mil pessoas que desapareceram durante a guerra civil do país. O objetivo é dar paz aos familiares das vítimas e promover a verdade histórica. Arévalo afirmou que o plano marca o início de uma jornada para curar as feridas do passado.", "titulo_pt": "Guatemala, plano para a busca de 45 mil desaparecidos na guerra civil", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 9573, "titulo": "Abelardo De La Espriella, Trump-Backed Rightist, Headed for Win in Colombia", "url": "https://www.nytimes.com/2026/06/21/world/americas/colombia-election-de-la-espriella.html", "fonte_id": "nyt_world", "data_pub": "2026-06-22T01:03:00Z", "idioma": "en", "texto_pt": "Abelardo De La Espriella, um advogado sem experiência política prévia, está em posição de vencer as eleições na Colômbia.  Uma vitória dele seria vista como uma derrota para a esquerda e outra vitória para o lado direito na América Latina.", "titulo_pt": "Abelardo De La Espriella, apoiador de Trump, caminha para a vitória na Colômbia", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 9641, "titulo": "Sindaco Mosca, 'respinto un nuovo attacco con droni sulla città'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/22/sindaco-mosca-respinto-un-nuovo-attacco-con-droni-sulla-citta_8c61818b-1f0f-443c-a6e9-b9de9c029c6a.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-22T01:02:00Z", "idioma": "it", "texto_pt": "Em 24 horas, foram abatidos 14 veículos aéreos não tripulados. O prefeito de uma cidade italiana afirmou que um novo ataque com drones foi repelido.", "titulo_pt": "Prefeito Mosca: 'Novo ataque com drones à cidade repelido'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 9379, "titulo": "Morre Ramiro Valdés, herói da Revolução Cubana e ex-vice-presidente, aos 94 anos", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/morre-ramiro-valdes-heroi-da-revolucao-cubana-e-ex-vice-presidente-aos-94-anos.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-22T01:01:00Z", "idioma": "pt", "texto_pt": "Ramiro Valdés, colaborador de Fidel Castro e considerado herói da Revolução Cubana, morreu aos 94 anos. O presidente cubano Miguel Díaz-Canel anunciou a morte nas redes sociais. A causa do falecimento não foi divulgada.", "titulo_pt": "Morre Ramiro Valdés, herói da Revolução Cubana e ex-vice-presidente, aos 94 anos", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 9479, "titulo": "Candidato pró-Trump ganha na Colômbia por pequena margem na apuração preliminar, mas presidente Petro pede para aguardar contagem", "url": "https://www.bbc.com/portuguese/articles/cgl3nykn3d9o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-22T00:59:00Z", "idioma": "pt", "texto_pt": "Abelardo de la Espriella lidera nas apurações preliminares da eleição colombiana contra Iván Cepeda. A contagem final pode levar dias e a diferença entre os resultados preliminares e oficiais costuma ser pequena. O presidente Gustavo Petro pediu para aguardar o resultado oficial.", "titulo_pt": "Candidato pró-Trump vence na Colômbia por pequena margem, mas presidente pede para aguardar contagem", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 9630, "titulo": "Colombia election: Hard-right candidate claims victory", "url": "https://www.dw.com/en/colombia-election-hard-right-candidate-claims-victory/a-77650646?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-22T00:59:00Z", "idioma": "en", "texto_pt": "O candidato presidencial de direita, Abelardo de la Espriella, obteve 49,66% dos votos colombianos, segundo resultados preliminares. O presidente em exercício Gustavo Petro afirmou que 'nenhum dos candidatos pode ser declarado presidente'.", "titulo_pt": "Eleição na Colômbia: Candidato de extrema-direita afirma vitória", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 9698, "titulo": "Lee's disapproval rating exceeds approval rating for 1st time since inauguration", "url": "https://en.yna.co.kr/view/AEN20260622002600315", "fonte_id": "yonhap_news", "data_pub": "2026-06-22T00:43:00Z", "idioma": "en", "texto_pt": "A taxa de desaprovação do presidente sul-coreano Lee Jae Myung superou sua taxa de aprovação pela primeira vez desde sua posse.  Uma pesquisa recente revelou que 49% dos entrevistados discordam do trabalho de Lee, enquanto 42% o aprovam. A pesquisa foi realizada pelo instituto Gallup Korea.", "titulo_pt": "Desaprovação a Lee Jae Myung supera aprovação pela primeira vez desde posse", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 9560, "titulo": "La derecha colombiana y una parte del centro felicitan a Abelardo de la Espriella: “Hará un Gobierno de recuperación democrática”", "url": "https://elpais.com/america-colombia/elecciones-presidenciales/2026-06-22/la-derecha-colombiana-y-una-parte-del-centro-felicitan-a-abelardo-de-la-espriella-hara-un-gobierno-de-recuperacion-democratica.html", "fonte_id": "elpais_america", "data_pub": "2026-06-22T00:41:00Z", "idioma": "es", "texto_pt": "Personalidades como os ex-presidentes Álvaro Uribe e Juan Manuel Santos reconheceram a vitória de Abelardo De La Espriella. A esquerda colombiana pediu para aguardar o resultado da apuração judicial.", "titulo_pt": "Direita colombiana e parte do centro celebram vitória de Abelardo De La Espriella: 'Formará um governo de recuperação democrática'", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 9559, "titulo": "Trump y Rubio felicitan a De la Espriella por su triunfo en Colombia", "url": "https://elpais.com/america-colombia/elecciones-presidenciales/2026-06-22/trump-y-rubio-felicitan-a-de-la-espriella-por-su-triunfo-en-colombia.html", "fonte_id": "elpais_america", "data_pub": "2026-06-22T00:38:00Z", "idioma": "es", "texto_pt": "O ex-presidente dos Estados Unidos, Donald Trump, e o senador Marco Rubio felicitaram o candidato ultraconservador Gustavo Petro por sua vitória nas eleições presidenciais colombianas. Líderes da direita e ultradireita da América Latina também celebraram a vitória de De la Espriella.", "titulo_pt": "Trump e Rubio celebram vitória de De la Espriella na Colômbia", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 9642, "titulo": "Colombia, de la Espriella vince di un soffio e la sinistra vuole il riconteggio", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/22/colombia-de-la-espriella-vince-di-un-soffio-e-la-sinistra-vuole-il-riconteggio_0eb2126f-fc22-4de8-b889-2d21346d0a56.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-22T00:29:00Z", "idioma": "it", "texto_pt": "De acordo com dados não oficiais, os dois candidatos estão divididos por apenas 1%. Agora cabe aos juízes decidir o resultado.", "titulo_pt": "Colômbia, de la Espriella vence por um voto e a esquerda quer recontagem", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}], "geopolitica": [{"id": 9833, "titulo": "Ex-defense minister booked over alleged attempt to provoke N. Korea for martial law bid", "url": "https://www.koreaherald.com/article/10783738", "fonte_id": "korea_herald", "data_pub": "2026-06-22T02:18:00Z", "idioma": "en", "texto_pt": "Uma equipe especial de procuradores indiciou o ex-ministro da Defesa Kim Yong-hyun sob suspeita de tentar usar uma unidade de inteligência militar para criar um pretexto para a tentativa de estado de sítio do ex-presidente Yoon Suk Yeol. O procurador especial Kwon Chang-young tem investigado alegações de que o Comando de Inteligência da Defesa tentou pressionar por operações contra a Coreia do Norte para aumentar as tensões intercoreanas e estabelecer uma justificativa para Yoon declarar estado de sítio em dezembro.", "titulo_pt": "Ex-ministro da Defesa indiciado por suposta tentativa de provocar Coreia do Norte para um pedido de estado de sítio", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 9813, "titulo": "Teherán anuncia la suspensión de las conversaciones tras las amenazas de Trump de atacar a Irán", "url": "https://www.latercera.com/mundo/noticia/teheran-anuncia-la-suspension-de-las-conversaciones-tras-las-amenazas-de-trump-de-atacar-a-iran/", "fonte_id": "la_tercera", "data_pub": "2026-06-22T02:00:00Z", "idioma": "es", "texto_pt": "As ameaças do presidente americano provocaram a delegação iraniana a abandonar as negociações. Não se sabe quando as conversas serão retomadas, segundo os meios de comunicação iranianos.", "titulo_pt": "Teerã anuncia suspensão das conversas após ameaças de ataque de Trump ao Irã", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 9828, "titulo": "Blockade lifted, assets to be returned to Iran in Swiss talks breakthrough", "url": "https://www.scmp.com/news/china/diplomacy/article/3357857/blockade-lifted-assets-be-returned-iran-swiss-talks-breakthrough?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-22T01:58:00Z", "idioma": "en", "texto_pt": "As negociações entre os EUA e o Irã na Suíça resultaram no levantamento do bloqueio e na liberação de ativos congelados para o Irã, afirmou Teerã. O ministro das Relações Exteriores iraniano, Seyed Abbas Araghchi, disse que a mediação paquistanesa e catarrense produziu avanços significativos para pôr fim à guerra no Líbano.", "titulo_pt": "Bloqueio levantado, ativos a serem devolvidos ao Irã em avanço das negociações suíças", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 9816, "titulo": "Iran says implementation in Lebanon will determine deal's future", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/iran-says-implementation-lebanon-will-determine-deals-future", "fonte_id": "middle_east_eye", "data_pub": "2026-06-22T01:54:00Z", "idioma": "en", "texto_pt": "O ministro das Relações Exteriores do Irã, Abbas Araghchi, elogiou os resultados das últimas conversas entre EUA e Irã na Suíça. Araghchi afirmou que houve progressos significativos em direção ao fim da guerra no Líbano, incluindo a isenção de exportações de petróleo e petroquímicos de restrições e o lançamento de um programa de reconstrução e desenvolvimento para o Irã.", "titulo_pt": "Irã diz que implementação no Líbano determinará futuro do acordo", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 9817, "titulo": "Iran says negotiating team's work in Switzerland is complete", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/iran-says-negotiating-teams-work-switzerland-complete", "fonte_id": "middle_east_eye", "data_pub": "2026-06-22T01:54:00Z", "idioma": "en", "texto_pt": "O porta-voz do Ministério das Relações Exteriores do Irã, Esmaeil Baghaei, afirmou que o trabalho da delegação iraniana em negociações na Suíça foi finalizado.  A próxima fase das discussões será conduzida por equipes técnicas responsáveis por implementar o memorando de entendimento entre o Irã e os Estados Unidos. Foi acordado que as equipes técnicas continuarão trabalhando nos assuntos necessários para a implementação eficaz do acordo.", "titulo_pt": "Irã diz que trabalho da equipe negociadora na Suíça está concluído", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 9818, "titulo": "US and Iran mediators announce Lebanon de-confliction mechanism", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/us-and-iran-mediators-announce-lebanon-de-confliction-mechanism", "fonte_id": "middle_east_eye", "data_pub": "2026-06-22T01:46:00Z", "idioma": "en", "texto_pt": "Os mediadores das negociações entre os EUA e o Irã divulgaram uma declaração conjunta afirmando que as partes concordaram em estabelecer um grupo de trabalho para evitar conflitos com o objetivo de apoiar a implementação dos termos do memorando de entendimento sobre o Líbano. O mecanismo envolverá representantes dos Estados Unidos, do Irã e do governo libanês, com apoio mediador dos países que facilitam as conversas.", "titulo_pt": "Mediadores dos EUA e Irã anunciam mecanismo para evitar conflitos no Líbano", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 9819, "titulo": "Iran says talks format changed after US ‘threatening statement’", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/iran-says-talks-format-changed-after-us-threatening-statement", "fonte_id": "middle_east_eye", "data_pub": "2026-06-22T01:32:00Z", "idioma": "en", "texto_pt": "O porta-voz do Ministério das Relações Exteriores do Irã, Esmaeil Baghaei, afirmou que a delegação iraniana se recusou a continuar as negociações quadrilaterais envolvendo os Estados Unidos, Paquistão e Catar na Suíça após o que ele descreveu como uma 'declaração ameaçadora' do presidente dos EUA, Donald Trump. O Irã rejeitou a proposta de Qatar e Paquistão para manter o formato de quatro partes.", "titulo_pt": "Irã diz que formato das negociações mudou após declaração 'ameaçadora' dos EUA", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 9759, "titulo": "Australia makes record cocaine bust after 2.7 tonnes found buried in Sydney", "url": "https://www.scmp.com/news/asia/australasia/article/3357854/australia-makes-record-cocaine-bust-after-27-tonnes-found-buried-sydney?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-22T01:28:00Z", "idioma": "en", "texto_pt": "A polícia australiana apreendeu 2,7 toneladas de cocaína escondidas em recipientes plásticos enterrados nas margens de Sydney. Esta é a maior apreensão de cocaína na história da Austrália. A polícia alega que um grupo criminoso com base em Sydney organizou o desembarque do carregamento de cocaína no norte do Queensland antes de transportá-lo para Sydney para distribuição.", "titulo_pt": "Austrália faz apreensão recorde de cocaína após encontrar 2,7 toneladas em Sydney", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 9742, "titulo": "Pakistan and Qatar announce roadmap towards final US-Iran agreement", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/pakistan-and-qatar-announce-roadmap-towards-final-us-iran-agreement", "fonte_id": "middle_east_eye", "data_pub": "2026-06-22T01:23:00Z", "idioma": "en", "texto_pt": "Paquistão e Catar afirmaram que as conversas entre os Estados Unidos e o Irã na Suíça foram conduzidas em uma atmosfera 'positiva e construtiva', com mediadores relatando progressos encorajadores em várias questões-chave. As partes concordaram em criar um mecanismo para conversas técnicas adicionais, enquanto os esforços continuam para construir sobre o memorando de entendimento alcançado anteriormente.", "titulo_pt": "Paquistão e Catar anunciam plano para acordo final entre EUA e Irã", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 9753, "titulo": "US and Iran meet for ‘tense’ but ‘constructive’ ceasefire talks", "url": "https://www.aljazeera.com/video/newsfeed/2026/6/22/us-and-iran-meet-for-tense-but-constructive-ceasefire-talks?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-22T01:19:00Z", "idioma": "en", "texto_pt": "Representantes dos EUA e do Irã concluíram um dia de negociações na Suíça. As conversas foram descritas como 'tensas' mas também 'construtivas'. Os detalhes específicos das discussões não foram divulgados publicamente.", "titulo_pt": "EUA e Irã se reúnem para conversas de cessar-fogo 'tensas' mas 'construtivas'", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 9743, "titulo": "Tehran says talks advance on sanctions and frozen assets", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/tehran-says-talks-advance-sanctions-and-frozen-assets", "fonte_id": "middle_east_eye", "data_pub": "2026-06-22T01:15:00Z", "idioma": "en", "texto_pt": "Durante o primeiro dia de negociações com os Estados Unidos, Teerã afirmou ter registrado 'bons progressos' em questões como a liberação de ativos iranianos e alívio de sanções relacionadas ao petróleo. O porta-voz do ministério das Relações Exteriores iraniano, Esmaeil Baghaei, disse que a delegação iraniana enfatizou que o conflito deve terminar em todos os fronts, incluindo o Líbano, enquanto as discussões também abordaram 'a emissão de licenças necessárias para vendas de petróleo e a liberação de ativos iranianos'.", "titulo_pt": "Teerã afirma que conversas avançam sobre sanções e ativos congelados", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 9755, "titulo": "Ebola closure cuts off a lifeline between DRC’s Goma and Rwanda", "url": "https://www.aljazeera.com/news/2026/6/22/ebola-closure-cuts-off-a-lifeline-between-drcs-goma-and-rwanda?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-22T01:06:00Z", "idioma": "en", "texto_pt": "Autoridades de saúde defendem as restrições impostas devido ao surto de Ebola.  Comerciantes afirmam que as medidas interromperam o fluxo de mercadorias e a geração de renda.", "titulo_pt": "Fechamento por Ebola corta ligação entre Goma, na República Democrática do Congo, e Ruanda", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 9744, "titulo": "Negotiations with Iran will continue overnight, US official says", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/negotiations-iran-remain-under-way-us-official-says", "fonte_id": "middle_east_eye", "data_pub": "2026-06-22T01:02:00Z", "idioma": "en", "texto_pt": "Discussões entre representantes americanos e iranianos na Suíça continuam e devem se estender durante a noite. Um alto funcionário americano envolvido nas negociações afirmou que os EUA estão em reuniões contínuas desde a manhã e negou relatos de que a delegação iraniana deixou o local, afirmando que as negociações ainda estão em andamento. As discussões abordaram mensagens iranianas sobre o Estreito de Ormuz.", "titulo_pt": "Negociações com Irã continuarão durante a noite, diz funcionário americano", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 9745, "titulo": "Trump questions Nato allies' support during Iran conflict", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/trump-questions-nato-allies-support-during-iran-conflict", "fonte_id": "middle_east_eye", "data_pub": "2026-06-22T00:54:00Z", "idioma": "en", "texto_pt": "O presidente dos Estados Unidos, Donald Trump, criticou Itália e a primeira-ministra Giorgia Meloni por não se juntarem aos Estados Unidos e Israel em uma campanha militar contra o Irã. Em um post nas redes sociais, Trump argumentou que os aliados da NATO se beneficiaram do apoio americano por décadas, mas não retribuíram durante o conflito.", "titulo_pt": "Trump questiona apoio dos aliados da NATO durante conflito com Irã", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 9746, "titulo": "Iranian defence official calls for regional Islamic security alliance", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/iranian-defence-official-calls-regional-islamic-security-alliance", "fonte_id": "middle_east_eye", "data_pub": "2026-06-22T00:52:00Z", "idioma": "en", "texto_pt": "O ministro de defesa interino do Irã, Majid Ibn al-Reza, pediu a países islâmicos que estabeleçam uma faixa de segurança regional. Al-Reza fez a proposta durante uma conversa telefônica com o ministro da Defesa do Paquistão, Khawaja Asif.  A declaração ocorre enquanto os países do Golfo reavaliam os arranjos de segurança regional após o conflito que começou no final de fevereiro.", "titulo_pt": "Oficial de defesa iraniano pede aliança de segurança islâmica regional", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 9699, "titulo": "N. Korea blames U.S., West for 'revival of Nazism,' defends Russia over Ukraine war", "url": "https://en.yna.co.kr/view/AEN20260622002700315", "fonte_id": "yonhap_news", "data_pub": "2026-06-22T00:39:00Z", "idioma": "en", "texto_pt": "A Coreia do Norte criticou os Estados Unidos e outros países do Ocidente, acusando-os de reviver o nazismo. O país também defendeu a posição da Rússia na guerra com a Ucrânia.", "titulo_pt": "Coreia do Norte culpa EUA e Ocidente pelo 'ressurgimento do nazismo', defende Rússia na guerra da Ucrânia", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}], "economia": [{"id": 9820, "titulo": "Dissent by Takaichi’s BOJ pick hints at case for faster hikes", "url": "https://www.japantimes.co.jp/business/2026/06/22/economy/boj-dissent-time-crunch/", "fonte_id": "japan_times", "data_pub": "2026-06-22T02:10:00Z", "idioma": "en", "texto_pt": "Toichiro Asada, o primeiro membro do conselho de política monetária nomeado pela Primeira-Ministra Sanae Takaichi, deixou claro seu compromisso com o estímulo monetário.  Asada é visto como um indicado conservador para o Banco do Japão (BOJ). Sua posição pode indicar uma possível mudança na postura do banco em relação às taxas de juros.", "titulo_pt": "Desacordo do indicado para o BOJ de Takaichi sugere caso a favor de altas mais rápidas", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 9821, "titulo": "Yogurt wars: Danone-Chobani clash underscores wider protein battle", "url": "https://www.japantimes.co.jp/business/2026/06/22/companies/yogurt-danone-chobani-protein/", "fonte_id": "japan_times", "data_pub": "2026-06-22T02:00:00Z", "idioma": "en", "texto_pt": "A disputa pelo domínio das proteínas é particularmente importante nos Estados Unidos, onde um número crescente de usuários de medicamentos para perda de peso GLP-1 buscam proteínas para combater o desgaste muscular. A rivalidade entre as empresas Danone e Chobani ilustra essa competição.", "titulo_pt": "Guerras do Iogurte: Choque entre Danone e Chobani reflete batalha maior por proteínas", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 9845, "titulo": "Budget minister discusses policy direction with experts amid sharp tax gains", "url": "https://en.yna.co.kr/view/AEN20260622003300320", "fonte_id": "yonhap_news", "data_pub": "2026-06-22T02:00:00Z", "idioma": "en", "texto_pt": "O ministro do orçamento da Coreia do Sul discutiu a direção da política com especialistas na segunda-feira. A reunião ocorreu em meio a um aumento significativo nas receitas tributárias. O objetivo foi analisar as tendências econômicas e definir prioridades para o orçamento.", "titulo_pt": "Ministro do Orçamento discute direção da política com especialistas em meio a ganhos tributários acentuados", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 9797, "titulo": "Créditos hipotecarios: las razones por las que los bancos bajan las tasas y el impacto que puede tener en los precios de las propiedades", "url": "https://www.lanacion.com.ar/propiedades/casas-y-departamentos/creditos-hipotecarios-las-razones-por-las-que-los-bancos-bajan-las-tasas-y-el-impacto-que-puede-nid21062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-22T01:42:00Z", "idioma": "es", "texto_pt": "A redução das taxas hipotecárias aumentou o interesse por crédito imobiliário. Um especialista explica as possíveis consequências para as parcelas e os preços dos imóveis.", "titulo_pt": "Créditos hipotecários: razões para a queda das taxas e impacto nos preços de imóveis", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 9799, "titulo": "Cuánto cuesta una casa prefabricada de 2 dormitorios, 1 baño y cocina en Argentina en junio 2026", "url": "https://www.lanacion.com.ar/propiedades/construccion-y-diseno/cuanto-cuesta-una-casa-prefabricada-de-2-dormitorios-1-bano-y-cocina-en-argentina-en-junio-2026-nid19062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-22T01:39:00Z", "idioma": "es", "texto_pt": "Casas pré-fabricadas estão ganhando popularidade na Argentina devido aos seus tempos de construção mais rápidos e custos previsíveis. O artigo irá explorar o custo dessas casas em junho de 2026.", "titulo_pt": "Quanto custa uma casa pré-fabricada de 2 dormitórios, 1 banheiro e cozinha na Argentina em junho de 2026?", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 9825, "titulo": "Taiwanese brothers amass $1 billion from boom in display chips", "url": "https://www.japantimes.co.jp/business/2026/06/22/tech/taiwanese-brothers-1b-display-chips/", "fonte_id": "japan_times", "data_pub": "2026-06-22T01:19:00Z", "idioma": "en", "texto_pt": "Biing-seng Wu e Jordan Wu são donos de 24% da Himax, empresa listada nos Estados Unidos. As ações da Himax dobraram de valor este ano.", "titulo_pt": "Irmãos taiwaneses faturam US$ 1 bilhão com boom de chips para telas", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 9579, "titulo": "Acusación a Grau no convence ni a economistas ni a abogados: además de las críticas, varios se excusaron de exponer", "url": "https://www.latercera.com/politica/noticia/acusacion-a-grau-no-convence-ni-a-economistas-ni-a-abogados-ademas-de-las-criticas-varios-se-excusaron-de-exponer/", "fonte_id": "la_tercera", "data_pub": "2026-06-22T01:00:00Z", "idioma": "es", "texto_pt": "A comissão revisora teve dificuldade em encontrar especialistas para falar sobre o processo de acusação contra Pedro Castillo.  Deputados acusadores não conseguiram apoio claro de acadêmicos e especialistas para sua apresentação.", "titulo_pt": "Acusação contra Grau não convence nem economistas nem advogados: além das críticas, vários se recusaram a falar", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 9747, "titulo": "Oil prices rise amid uncertainty over US-Iran talks", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/oil-prices-rise-amid-uncertainty-over-us-iran-talks", "fonte_id": "middle_east_eye", "data_pub": "2026-06-22T00:48:00Z", "idioma": "en", "texto_pt": "Os preços do petróleo subiram no domingo enquanto os negociadores avaliavam as implicações das negociações em curso entre EUA e Irã e a durabilidade do cessar-fogo entre os dois países. O aumento ocorreu em meio à incerteza contínua sobre o fornecimento futuro de petróleo e o resultado das negociações diplomáticas.", "titulo_pt": "Preços do petróleo sobem no meio da incerteza sobre as negociações entre EUA e Irã", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 9451, "titulo": "Netanyahu descarta críticas de que Israel não teria atingido objetivos contra Irã", "url": "https://www.infomoney.com.br/mundo/netanyahu-descarta-criticas-israel-objetivos/", "fonte_id": "infomoney", "data_pub": "2026-06-22T00:40:00Z", "idioma": "pt", "texto_pt": "O primeiro-ministro israelense, Benjamin Netanyahu, negou as críticas de que Israel não atingiu seus objetivos na campanha contra o Irã. Netanyahu afirmou que um dos objetivos iniciais era criar condições para uma revolta popular no país.", "titulo_pt": "Netanyahu descarta críticas sobre objetivos contra Irã", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 9670, "titulo": "Seoul shares open lower amid Iran peace talks uncertainty", "url": "https://www.koreaherald.com/article/10783383", "fonte_id": "korea_herald", "data_pub": "2026-06-22T00:35:00Z", "idioma": "en", "texto_pt": "As ações sul-coreanas abriram em baixa nesta segunda-feira devido à intensificação da incerteza sobre as negociações de paz entre os EUA e o Irã após contínuas ameaças do presidente dos EUA, Donald Trump, a Teerã. O índice de preços das ações compostas da Coreia caiu 124,2 pontos, ou 1,37%, para 8.928,2 nos primeiros 15 minutos de negociação.", "titulo_pt": "Ações de Seul abrem em queda no meio da incerteza sobre as negociações de paz com o Irã", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 9588, "titulo": "Los nuevos hábitos de compra de los chilenos", "url": "https://www.latercera.com/videos/noticia/los-nuevos-habitos-de-compra-de-los-chilenos/", "fonte_id": "la_tercera", "data_pub": "2026-06-22T00:30:00Z", "idioma": "es", "texto_pt": "Um novo estudo da Cadem revela que a forma favorita de compra dos chilenos é combinar lojas físicas e compras online. Oito em cada dez pessoas preferem esse modelo, pois as lojas são importantes para garantir a retirada do produto, troca e devolução, além de permitir ver e tocar os produtos.", "titulo_pt": "Novos hábitos de compra dos chilenos", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 9701, "titulo": "(LEAD) Exports up 60 pct in first 20 days of June on robust chip sales", "url": "https://en.yna.co.kr/view/AEN20260622001851320", "fonte_id": "yonhap_news", "data_pub": "2026-06-22T00:28:00Z", "idioma": "en", "texto_pt": "As exportações da Coreia do Sul aumentaram 60,4% em relação ao ano anterior nos primeiros 20 dias de junho. O aumento foi impulsionado por vendas fortes de chips. Os dados foram divulgados pela Yonhap News Agency.", "titulo_pt": "(LÍDER) Exportações aumentam 60% nos primeiros 20 dias de junho com vendas robustas de chips", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 9704, "titulo": "Exports up 60 pct in first 20 days of June", "url": "https://en.yna.co.kr/view/AEN20260622001800320", "fonte_id": "yonhap_news", "data_pub": "2026-06-22T00:11:00Z", "idioma": "en", "texto_pt": "As exportações da Coreia do Sul aumentaram 60,4% em relação ao mesmo período do ano anterior, durante os primeiros 20 dias de junho. O valor foi divulgado pela Yonhap News Agency em 22 de junho.  O aumento nas exportações ocorreu apesar da desaceleração econômica global.", "titulo_pt": "Exportações aumentam 60% nos primeiros 20 dias de junho", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 9674, "titulo": "KEPCO to keep electricity rates frozen for Q3 amid financial troubles", "url": "https://www.koreaherald.com/article/10783299", "fonte_id": "korea_herald", "data_pub": "2026-06-22T00:08:00Z", "idioma": "en", "texto_pt": "A Korea Electric Power Corp. (KEPCO) anunciou que manterá as tarifas de eletricidade inalteradas no terceiro trimestre, apesar de fatores que indicavam uma redução. O custo de combustível ajustado, um componente-chave das tarifas de eletricidade do país, permanecerá no nível máximo de 5 won por quilowatt-hora para o período de julho a setembro.", "titulo_pt": "KEPCO mantém tarifas de eletricidade congeladas no terceiro trimestre", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 9705, "titulo": "(URGENT) Seoul shares open 1.08 pct lower amid Iran peace talks uncertainty", "url": "https://en.yna.co.kr/view/AEN20260622001400320", "fonte_id": "yonhap_news", "data_pub": "2026-06-22T00:01:00Z", "idioma": "en", "texto_pt": "O mercado de ações de Seul abriu nesta segunda-feira com queda de 1,08%, impulsionado pela incerteza em torno das negociações de paz com o Irã. Investidores aguardam por mais informações sobre o andamento das negociações e seu potencial impacto na região.", "titulo_pt": "Ações de Seul abrem 1,08% abaixo em meio à incerteza sobre as negociações de paz com o Irã", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 9453, "titulo": "Na Colômbia, La Espriella vence eleição, segundo apuração preliminar", "url": "https://www.infomoney.com.br/mundo/na-colombia-la-espriella-vence-eleicao/", "fonte_id": "infomoney", "data_pub": "2026-06-22T00:00:00Z", "idioma": "pt", "texto_pt": "De acordo com as autoridades eleitorais colombianas, De la Espriella venceu a eleição contra o senador Iván Cepeda. A diferença de votos foi inferior a 250 mil.", "titulo_pt": "Na Colômbia, La Espriella vence eleição, segundo apuração preliminar", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}], "tecnologia": [{"id": 9843, "titulo": "Kakao Games says no decision made on merger with Line Games", "url": "https://en.yna.co.kr/view/AEN20260622004400320", "fonte_id": "yonhap_news", "data_pub": "2026-06-22T02:01:00Z", "idioma": "en", "texto_pt": "A Kakao Games Corp. afirmou que nenhuma decisão foi tomada sobre uma possível fusão com a Line Games. A empresa esclareceu a situação após rumores de negociações entre as duas empresas.", "titulo_pt": "Kakao Games diz que não houve decisão sobre fusão com Line Games", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 9840, "titulo": "China places 10 US entities on export control list, restricts dual-use exports", "url": "https://www.digitimes.com/news/a20260622VL202/exports-security.html", "fonte_id": "digitimes", "data_pub": "2026-06-22T01:58:00Z", "idioma": "en", "texto_pt": "O Ministério do Comércio da China adicionou 10 empresas americanas à sua lista de controle de exportações. Essa medida proíbe a exportação de itens de uso dual para essas empresas e impede qualquer organização ou indivíduo de transferir itens chineses de uso dual para elas.", "titulo_pt": "China coloca 10 entidades americanas na lista de controle de exportações, restringe exportações de uso dual", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 9841, "titulo": "Analysis: BYD's robotics ambitions ignite new battleground with startups", "url": "https://www.digitimes.com/news/a20260622PD207/competition-robotics-byd-automakers-robot.html", "fonte_id": "digitimes", "data_pub": "2026-06-22T01:56:00Z", "idioma": "en", "texto_pt": "A intensificação da competição e a queda de lucros no mercado de veículos elétricos (NEV) na China estão levando os fabricantes automotivos a buscarem novos motores de crescimento em robôs humanoides.  Muitos desses fabricantes têm sido clientes importantes de startups de robótica humanoides nos últimos dois anos. Agora, com os fabricantes automotivos começando a desenvolver seus próprios robôs, a competição que define o mercado NEV pode se espalhar para o setor de robótica humanoides.", "titulo_pt": "Ambições robóticas da BYD acendem nova batalha com startups", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 9763, "titulo": "GS E&C, I Squared Capital to team up for renewable energy projects", "url": "https://en.yna.co.kr/view/AEN20260622003200320", "fonte_id": "yonhap_news", "data_pub": "2026-06-22T01:20:00Z", "idioma": "en", "texto_pt": "A GS Engineering & Construction (E&C) Corp. e a I Squared Capital anunciarão uma parceria para desenvolver projetos de energia renovável. A empresa sul-coreana de construção e o fundo global de investimento planejam investir em projetos solares e eólicos na América do Norte e Europa.", "titulo_pt": "GS E&C e I Squared Capital se unem para projetos de energia renovável", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 9664, "titulo": "PM nominee apologizes for information leak from 'Startup for All' website", "url": "https://www.koreaherald.com/article/10783519", "fonte_id": "korea_herald", "data_pub": "2026-06-22T01:16:00Z", "idioma": "en", "texto_pt": "Han Seong-sook, indicado para primeiro-ministro da Coreia do Sul, pediu desculpas por um vazamento de informações no site do programa 'Startup for All'. Uma empresa de soluções de inteligência artificial, parceira do projeto, explorou uma falha de segurança no site e coletou emails, resumos de ideias de startups e avaliações dos juízes de 5 mil pessoas que passaram na primeira fase da seleção. O vazamento foi descoberto após a empresa ter sido investigada.", "titulo_pt": "Indicado a primeiro-ministro se desculpa por vazamento de informações do site 'Startup for All'", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 9666, "titulo": "Warning overload? Korean liquor firms push back on new label rules", "url": "https://www.koreaherald.com/article/10783488", "fonte_id": "korea_herald", "data_pub": "2026-06-22T01:08:00Z", "idioma": "en", "texto_pt": "A indústria de bebidas alcoólicas da Coreia do Sul está se preparando para mudanças abrangentes na embalagem após o governo ordenar que os rótulos de advertência sejam exibidos de forma proeminente na frente de cada garrafa. As novas diretrizes anunciadas pelo Ministério da Saúde e Bem-estar em 8 de maio exigem que avisos sobre o consumo excessivo de álcool e direção embriagada sejam colocados abaixo do rótulo principal da marca em todas as bebidas alcoólicas produzidas.", "titulo_pt": "Sobrecarga de advertências? Empresas de bebidas alcoólicas coreanas se opõem às novas regras de rótulos", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 9826, "titulo": "Japanese companies get serious about workplace DEI", "url": "https://www.japantimes.co.jp/news/2026/06/22/japan/society/japan-workplace-diversity-equity-inclusion/", "fonte_id": "japan_times", "data_pub": "2026-06-22T01:01:00Z", "idioma": "en", "texto_pt": "Empresas japonesas estão intensificando seus esforços sobre diversidade, equidade e inclusão (DEI). O objetivo é melhorar a gestão de recursos humanos dentro das empresas.", "titulo_pt": "Empresas japonesas se dedicam a DEI no ambiente de trabalho", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 9697, "titulo": "(LEAD) PM nominee apologizes for information leak from 'Startup for All' website", "url": "https://en.yna.co.kr/view/AEN20260622002451315", "fonte_id": "yonhap_news", "data_pub": "2026-06-22T00:43:00Z", "idioma": "en", "texto_pt": "Han Seong-sook, indicado para o cargo de primeiro-ministro da Coreia do Sul, pediu desculpas por um vazamento de informações no site 'Startup for All'. O vazamento ocorreu durante a gestão de Han como ministra das Ciências e Tecnologia. A investigação sobre o incidente está em andamento.", "titulo_pt": "Indicado a primeiro-ministro se desculpa por vazamento de informações do site 'Startup for All'", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 9684, "titulo": "India roundup: Apple's India manufacturing bet faces reminder of operational risks after Tata probe closure", "url": "https://www.digitimes.com/news/a20260621VL200/manufacturing-probe-apple-electronics-market.html", "fonte_id": "digitimes", "data_pub": "2026-06-21T23:45:00Z", "idioma": "en", "texto_pt": "A Índia está acelerando seus objetivos de fabricação eletrônica por meio de infraestrutura de IA, embalagem de semicondutores, desenvolvimento de terras raras e investimento estrangeiro.  Desafios como conformidade regulatória, rastreabilidade e resiliência da cadeia de suprimentos permanecem importantes.", "titulo_pt": "Aposta da Apple na fabricação na Índia enfrenta lembrete sobre riscos operacionais após fechamento da investigação da Tata", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 9685, "titulo": "Interview: MetaComp on its KYA framework and the agentic future of finance", "url": "https://www.digitimes.com/news/a20260618VL212/finance-governance-regulation.html", "fonte_id": "digitimes", "data_pub": "2026-06-21T23:45:00Z", "idioma": "en", "texto_pt": "A inteligência artificial agentica está entrando no setor financeiro. Um futuro onde agentes realizam compras e gerenciam patrimônio em nome das pessoas está se aproximando.  É questionado se o sistema financeiro está pronto para isso.", "titulo_pt": "Entrevista: MetaComp sobre sua estrutura KYA e o futuro financeiro com agentes", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 9686, "titulo": "MSScorps expands Taiwan investment again for silicon photonics", "url": "https://www.digitimes.com/news/a20260618PD236/taiwan-investment-msscorps-silicon-photonics.html", "fonte_id": "digitimes", "data_pub": "2026-06-21T23:44:00Z", "idioma": "en", "texto_pt": "O escritório de investimento da Taiwan, InvesTaiwan, aprovou planos de investimento expandidos de quatro empresas. A MSScorps liderará com um investimento de NT$1,5 bilhão (US$47,4 milhões) e está solicitando pela terceira vez. A empresa planeja adicionar linhas de produção e adotar tecnologia de IA em suas instalações no Parque Industrial de Alta Tecnologia Tai Yuen Hsinchu e no Parque Científico do Sul da Taiwan.", "titulo_pt": "MSScorps amplia investimento na Taiwan novamente para fotonica de silício", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 9687, "titulo": "Qatari LNG could reach Taiwan by September — if the Strait of Hormuz reopens in time", "url": "https://www.digitimes.com/news/a20260618PD232/taiwan-shipping-shipments-2026-market.html", "fonte_id": "digitimes", "data_pub": "2026-06-21T23:44:00Z", "idioma": "en", "texto_pt": "A CPC Corporation, da Taiwan, afirmou que embarques de gás natural líquido (GNL) do Catar poderiam começar a chegar à Taiwan no início de setembro de 2026.  Essa previsão depende da abertura da Estreita de Hormuz, o que está sendo negociado entre os EUA e o Irã. Os detalhes específicos do acordo ainda não estão claros.", "titulo_pt": "Gás natural líquido do Catar pode chegar ao Taiwan em setembro — se a Estreita de Ormuz reabrir a tempo", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 9688, "titulo": "Hongkang ramps silicon photonics testing investment with first system due in August", "url": "https://www.digitimes.com/news/a20260618PD229/testing-silicon-photonics-2026-cpo.html", "fonte_id": "digitimes", "data_pub": "2026-06-21T23:44:00Z", "idioma": "en", "texto_pt": "A empresa de ser
