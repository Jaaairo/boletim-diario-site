odelo de embrião humano em laboratório", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 18390, "titulo": "Ancient flowering plants may have used dinosaurs to spread their seeds", "url": "https://www.sciencenews.org/article/flowering-plants-dinosaurs-spread-seeds", "fonte_id": "science_news", "data_pub": "2026-06-25T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas acreditavam que as angiospermas não usavam animais para dispersão de sementes até após a Era dos Dinossauros.  Fósseis de frutos dessas plantas desafiam essa ideia. Os fósseis sugerem que as angiospermas poderiam ter usado dinossauros para espalhar suas sementes.", "titulo_pt": "Plantas com flores antigas podem ter usado dinossauros para espalhar sementes", "veiculo": "Science News", "pais": "EUA", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 18617, "titulo": "Murió Daniel Castellani. Su última entrevista con LA NACION, en la que reveló la enfermedad que padecía: “Me dejó sensible”", "url": "https://www.lanacion.com.ar/deportes/murio-daniel-castellani-su-ultima-entrevista-con-la-nacion-en-la-que-revelo-su-enfermedad-me-dejo-nid25062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-25T22:53:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Daniel Castellani, lenda do vôlei argentino, voltou ao país após 40 anos no exterior e assumiu o comando das Panteras enquanto lutava contra um câncer.  Ele faleceu recentemente.", "titulo_pt": "Daniel Castellani faleceu. Sua última entrevista com a LA NACION, na qual ele revelou a doença que sofria: 'Me deixou sensível'", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 17439, "titulo": "Burro de 'Shrek' ganhará filme spin-off com estreia prevista para junho de 2028", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/burro-de-shrek-ganhara-filme-spin-off-com-estreia-prevista-para-junho-de-2028.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T20:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Universal e a DreamWorks confirmaram um filme spin-off do personagem Burro, da franquia Shrek. O filme está previsto para ser lançado em junho de 2028.", "titulo_pt": "Burro de 'Shrek' terá filme spin-off com estreia em junho de 2028", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 18425, "titulo": "Transcription by Ben Lerner wins Orwell prize for political fiction", "url": "https://www.theguardian.com/books/2026/jun/25/transcription-by-ben-lerner-wins-orwell-prize-for-political-fiction", "fonte_id": "guardian_culture", "data_pub": "2026-06-25T20:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ben Lerner ganhou o Prêmio Orwell de Ficção Política de 2023 por seu romance 'Transcription', que explora tecnologia e memória. Karen Bartlett ganhou o prêmio de não-ficção por 'The Escape from Kabul', que examina mulheres advogadas afegãs ameaçadas após a queda de Cabul em 2021.", "titulo_pt": "Transcrição, de Ben Lerner, ganha Prêmio Orwell de Ficção Política", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 17440, "titulo": "Profissionais da TV assinam carta contra clonagem de vozes de crianças por IA", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/profissionais-da-tv-assinam-carta-contra-clonagem-de-vozes-de-criancas-por-ia.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T20:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Cerca de mil atores, agentes, pais e profissionais da indústria audiovisual assinaram uma carta aberta contra o uso de vozes de atores mirins em ferramentas de inteligência artificial. O documento afirma que um grande estúdio exigiu que crianças cedam os direitos sobre suas vozes para aplicações comerciais de IA.", "titulo_pt": "Profissionais da TV criticam clonagem de vozes de crianças por IA", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 17441, "titulo": "Filme de comédia 'Little Brother' e 'Afiadas': o que ver na TV e no streaming sexta", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/filme-de-comedia-little-brother-e-afiadas-o-que-ver-na-tv-e-no-streaming-sexta.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O filme 'Menino Pequeno' conta a história de John Cena, um corretor de imóveis bem-sucedido cujo mundo é desorganizado quando seu afilhado (Eric André) reaparece. O programa 'Afiadas' também está disponível para assistir.", "titulo_pt": "Filme 'Menino Pequeno' e 'Afiadas': o que ver na TV e no streaming sexta", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 17442, "titulo": "SBT renova 'O Picapau Amarelo' para quarta temporada e recria cena icônica", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/sbt-renova-o-picapau-amarelo-para-quarta-temporada-e-recria-cena-iconica.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T19:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O SBT renovou a série infantil 'O Picapau Amarelo' para uma quarta temporada. O último episódio da terceira temporada, que será exibido neste sábado (27), encerrará o ciclo com um remake de uma cena icônica.", "titulo_pt": "SBT renova 'O Picapau Amarelo' para quarta temporada e recria cena icônica", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 17526, "titulo": "Pessoas com HIV e aids falam de sua marginalização na sociedade", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/pessoas-com-hiv-e-aids-fala-de-sua-marginalizacao-na-sociedade", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-25T18:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Coletivo Contágio apresentará a peça teatral 'Ferida$ Política' no Centro Cultural Grajaú, em São Paulo, no próximo domingo (28). A peça aborda a discriminação contra pessoas que vivem com HIV e AIDS. Após a apresentação, será realizado o bate-papo (Com)verso Positivo.", "titulo_pt": "Pessoas com HIV e AIDS falam sobre sua marginalização na sociedade", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 17443, "titulo": "Acusação de estupro contra Harvey Weinstein é arquivada em Nova York", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/acusacao-de-estupro-contra-harvey-weinstein-e-arquivada-em-nova-york.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T18:44:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Promotores de Nova York desistiram da acusação de estupro em terceiro grau contra Harvey Weinstein. A decisão ocorreu após dois júris diferentes não conseguirem chegar a um veredicto sobre a denúncia apresentada por Jessica Mann.", "titulo_pt": "Acusação de estupro contra Harvey Weinstein é arquivada em Nova York", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 17444, "titulo": "'Não adianta ser só bonito, tem que ter estudo', diz Henrique Barreira, aposta da Globo", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/televisao/2026/06/nao-adianta-ser-so-bonito-tem-que-ter-estudo-diz-henrique-barreira-aposta-da-globo.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T18:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Henrique Barreira, intérprete de André na novela 'Quem Ama Cuida' da Globo, estreia no horário nobre. A emissora o considera uma das apostas para renovar seu elenco.", "titulo_pt": "'Não adianta ser só bonito, tem que ter estudo', diz Henrique Barreira, aposta da Globo", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 18427, "titulo": "Plymouth’s the Box wins 2026 Art Fund museum of the year award", "url": "https://www.theguardian.com/culture/2026/jun/25/the-box-plymouth-wins-2026-art-fund-museum-of-the-year-award", "fonte_id": "guardian_culture", "data_pub": "2026-06-25T18:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "The Box, em Plymouth, ganhou o prestigiado prêmio Art Fund Museum of the Year. O museu foi elogiado por seu abordagem ambiciosa e acolhedora. Os jurados descreveram The Box como uma revelação e uma joia no sul-vest do país.", "titulo_pt": "The Box de Plymouth ganha prêmio Art Fund Museum of the Year 2026", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 17445, "titulo": "Paramount não venderá canal esportivo e pede fusão sem restrição com Warner ao Cade", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/paramount-nao-vendera-canal-esportivo-e-pede-fusao-sem-restricao-com-warner-ao-cade.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T18:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Paramount pediu aprovação de fusão com a Warner Bros. ao Cade (Conselho Administrativo de Defesa Econômica) sem restrições. A empresa afirmou que outros países já aprovaram fusões similares e citou exemplos para o Brasil.", "titulo_pt": "Paramount não venderá canal esportivo e pede fusão sem restrições com Warner ao Cade", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 17446, "titulo": "'O Sol Nasce para Todos' faz de trama folhetinesca um retrato social urbano", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/o-sol-nasce-para-todos-faz-de-trama-folhetinesca-um-retrato-social-urbano.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O filme 'O Sol Nasce Para Todos', dirigido por Cai Shangjun, pode parecer um folhetim a princípio. No entanto, o longa-metragem se transforma em um retrato social urbano ao disfarçar ou atenuar elementos que o tornariam uma história típica de folhetim.", "titulo_pt": "O Sol Nasce Para Todos", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 17447, "titulo": "Band investe no Rio de Janeiro e transfere Juliano Dip, ex-CQC, para capital fluminense", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/colunistas/outro-canal/2026/06/band-investe-no-rio-de-janeiro-e-transfere-juliano-dip-ex-cqc-para-capital-fluminense.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T17:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Juliano Dip será o novo reforço da Band no Rio de Janeiro. A partir de julho, ele fará reportagens para o Jornal da Band na capital fluminense.", "titulo_pt": "Band investe no Rio e transfere Juliano Dip, ex-CQC, para capital fluminense", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 18426, "titulo": "Rembrandt painting was altered to erase turban from man’s head, restorers find", "url": "https://www.theguardian.com/artanddesign/2026/jun/25/rembrandt-painting-was-altered-to-erase-turban-from-mans-head-restorers-find", "fonte_id": "guardian_culture", "data_pub": "2026-06-25T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Restauradores removeram camadas de tinta sobreposta de uma pintura do século XVII, confirmando que ela foi pintada por Rembrandt. A alteração revelou que um turbante em um dos personagens havia sido substituído por um boné holandês tradicional.", "titulo_pt": "Pintura de Rembrandt foi alterada para apagar turbante do homem, encontram restauradores", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 17448, "titulo": "Morre o cantor David Clayton-Thomas, do Blood, Sweat & Tears, aos 84 anos", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/morre-o-cantor-david-clayton-thomas-do-blood-sweat-tears-aos-84-anos.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T16:57:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O cantor David Clayton-Thomas, conhecido por seu trabalho no grupo musical Blood, Sweat & Tears, faleceu nesta quarta-feira (24), aos 84 anos. A causa da morte ainda não foi divulgada, mas ele morreu em um hospital em Toronto.", "titulo_pt": "Morre cantor David Clayton-Thomas, do Blood, Sweat & Tears, aos 84 anos", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 17450, "titulo": "Exposição reúne obras para refletir sobre a dimensão estética e política das cores", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/exposicao-reune-obras-para-refletir-sobre-a-dimensao-estetica-e-politica-das-cores.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-25T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A exposição apresenta obras que exploram as cores sob uma perspectiva estética e política. O artista sul-coreano Nam June Paik retratou a barra de cores de televisores antigos, combinando-a com elementos da caligrafia chinesa.", "titulo_pt": "Exposição reúne obras para refletir sobre a dimensão estética e política das cores", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}], "cultura__eventos": [], "sociedade": [{"id": 18247, "titulo": "Twin earthquakes shake Venezuela, killing at least 164", "url": "https://www.taipeitimes.com/News/front/archives/2026/06/26/2003859759", "fonte_id": "taipei_times", "data_pub": "2026-06-26T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dois terremotos atingiram a Venezuela na tarde de sábado. Os tremores causaram danos significativos em edifícios e infraestruturas, especialmente na região do estado de Sucre. O número de vítimas fatais já ultrapassa 164.", "titulo_pt": "Terremotos gêmeos abalam Venezuela, deixando pelo menos 164 mortos", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 18614, "titulo": "Qué pasó en Venezuela tras dos terremotos consecutivos: horas dramáticas, cientos de muertos y miles de desaparecidos", "url": "https://www.lanacion.com.ar/el-mundo/que-paso-en-venezuela-tras-dos-terremotos-consecutivos-horas-dramaticas-cientos-de-muertos-y-miles-nid25062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-25T22:54:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Terremotos com magnitudes 7,2 e 7,5 atingiram a Venezuela, causando o colapso de edifícios. O principal aeroporto do país foi fechado e serviços essenciais foram paralisados.", "titulo_pt": "O que aconteceu na Venezuela após dois terremotos consecutivos: horas dramáticas, centenas de mortos e milhares de desaparecidos", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 18621, "titulo": "Daniel López Rosetti: “La actividad física tiene efectos muy positivos en el ánimo; mucho más rápido en casos de depresión”", "url": "https://www.lanacion.com.ar/sociedad/daniel-lopez-rosetti-la-actividad-fisica-tiene-efectos-muy-positivos-en-el-animo-mucho-mas-rapido-en-nid25062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-25T22:51:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O especialista Daniel López Rosetti destacou a importância da atividade física para prevenir doenças. Em entrevista, ele falou sobre a relação entre a atividade física e o bem-estar emocional, mencionando seus efeitos positivos no ânimo, especialmente em casos de depressão.", "titulo_pt": "Daniel López Rosetti: 'A atividade física tem efeitos muito positivos no ânimo; muito mais rápido em casos de depressão'", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 17567, "titulo": "Cálculo revela quanto Neymar Jr. poderia gastar por dia até o fim da vida", "url": "https://www.metropoles.com/celebridades/calculo-revela-quanto-neymar-jr-poderia-gastar-por-dia-ate-o-fim-da-vida", "fonte_id": "metropoles", "data_pub": "2026-06-25T21:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um cálculo revelou que Neymar Jr. poderia gastar cerca de R$ 1,7 milhão por dia até o fim da vida. O valor leva em consideração seu patrimônio e os gastos atuais do jogador. A estimativa foi feita pelo site 'The Richest'.", "titulo_pt": "Cálculo mostra quanto Neymar Jr. poderia gastar por dia até o fim da vida", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 17561, "titulo": "Rope jump: testemunha diz que jovem morta não demonstrou medo antes do salto", "url": "https://www.metropoles.com/sao-paulo/rope-jump-testemunha-diz-que-jovem-morta-nao-demonstrou-medo-antes-do-salto", "fonte_id": "metropoles", "data_pub": "2026-06-25T21:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma testemunha afirmou que a jovem que morreu após pular de um prédio usando uma corda não demonstrou medo antes do salto. O caso está sendo investigado pelas autoridades locais.", "titulo_pt": "Pulo com corda: testemunha diz que jovem morta não demonstrou medo antes do salto", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 18387, "titulo": "PAHO mobilizes emergency health response following earthquakes in Venezuela", "url": "https://www.paho.org/en/news/25-6-2026-paho-mobilizes-emergency-health-response-following-earthquakes-venezuela", "fonte_id": "paho", "data_pub": "2026-06-25T20:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Organização Pan-Americana da Saúde (OPAS) está mobilizando uma resposta de emergência à saúde após os terremotos que atingiram a Venezuela. A OPAS enviou suprimentos médicos e especialistas para ajudar as equipes locais no atendimento às vítimas.", "titulo_pt": "Organização Pan-Americana da Saúde mobiliza resposta de emergência após terremotos na Venezuela", "veiculo": "PAHO/WHO", "pais": "Americas", "classe": "A"}, {"id": 17555, "titulo": "Jogador argentino procura esposa e filhos desaparecidos após terremotos na Venezuela", "url": "https://veja.abril.com.br/mundo/jogador-argentino-procura-esposa-e-filhos-desaparecidos-apos-terremotos-na-venezuela/", "fonte_id": "veja", "data_pub": "2026-06-25T20:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um jogador argentino que atua em um clube venezuelano procura sua esposa e filhos, que desapareceram após os terremotos na Venezuela. O atleta afirma que o prédio onde vivia a família desabou durante os tremores.", "titulo_pt": "Jogador argentino busca esposa e filhos desaparecidos após terremotos na Venezuela", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 17564, "titulo": "Mulher agride marido após funcionária expor assédio em loja da Cacau Show", "url": "https://www.metropoles.com/viralizou/mulher-agride-marido-apos-funcionaria-expor-suposto-assedio-na-cacau-show", "fonte_id": "metropoles", "data_pub": "2026-06-25T19:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma mulher agrediu seu marido após uma funcionária de uma loja da Cacau Show expor um caso de assédio. O incidente ocorreu em São Paulo e envolveu a esposa do homem que teria assediado a funcionária. A polícia foi chamada ao local para registrar o ocorrido.", "titulo_pt": "Mulher agride marido após funcionária denunciar assédio em loja da Cacau Show", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 17591, "titulo": "Do grêmio ao governo: no Colégio Cândido Portinari, eleições estudantis ajudam a formar líderes", "url": "https://exame.com/carreira/do-gremio-ao-governo-no-colegio-candido-portinari-eleicoes-estudantis-ajudam-a-formar-lideres/", "fonte_id": "exame", "data_pub": "2026-06-25T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Colégio Cândido Portinari utiliza inteligência de dados e voto eletrônico para transformar a gestão estudantil em um ambiente de aprendizado de liderança. As eleições estudantis, que vão desde o Grêmio até cargos governamentais, servem como plataforma para o desenvolvimento de habilidades de liderança.", "titulo_pt": "Do Grêmio ao Governo: Eleições Estudantis no Colégio Cândido Portinari Formam Líderes", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 17864, "titulo": "‘Paralysed by fear’: Venezuelans tell of escape and loss after huge earthquakes", "url": "https://www.theguardian.com/world/2026/jun/25/paralysed-by-fear-venezuelans-tell-of-escape-and-loss-after-huge-earthquakes", "fonte_id": "guardian_world", "data_pub": "2026-06-25T16:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dois terremotos poderosos abalaram a costa norte da Venezuela na quarta-feira, causando o colapso de edifícios e resultando em pelo menos 164 mortes. Moradores do capital Caracas saíram correndo dos prédios que tremiam e rachavam. Sebastian Rodríguez, de 18 anos, descreveu como sentiu seu lar se movendo de forma diferente da terra e teve que levar sua mãe para fora por causa do medo.", "titulo_pt": "'Paralisados pelo medo': Venezuelanos relatam fuga e perda após terremotos de grande magnitude", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 17873, "titulo": "Unions urge teachers to strike as French school exams go ahead in up to 40C heat", "url": "https://www.theguardian.com/world/2026/jun/25/unions-urge-teachers-strike-french-school-exams-heat", "fonte_id": "guardian_world", "data_pub": "2026-06-25T16:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sindicatos franceses de educação estão pedindo uma greve de professores devido às condições de trabalho consideradas inaceitáveis ​​em escolas superaquecidas durante uma onda de calor. Os sindicatos afirmam que a saúde dos professores e alunos está em risco, pois as temperaturas em algumas salas de aula chegaram a 40 graus Celsius.", "titulo_pt": "Sindicatos pedem greve de professores enquanto exames escolares acontecem com até 40 graus Celsius na França", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 18003, "titulo": "'Impossible to sleep': A night in sweltering France, in search of a cool spot", "url": "https://www.lemonde.fr/en/politics/article/2026/06/25/impossible-to-sleep-a-night-in-sweltering-france-in-search-of-a-cool-spot_6754874_5.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-25T15:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Com uma onda de calor intensa, os franceses estão vivendo após o anoitecer para buscar alívio do calor persistente do sol. De Paris a Saint-Malo, passando por Orléans, parques e piscinas ficaram movimentados assim que o dia terminou.", "titulo_pt": "'Impossível Dormir': Uma Noite no Calor Extremo da França, Em Busca de um Lugar Fresco", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 17734, "titulo": "Sucesso no Fonajus leva pacientes a repetir mobilização nos conselhos locais", "url": "https://www.jota.info/saude/sucesso-no-fonajus-leva-pacientes-a-repetir-mobilizacao-nos-conselhos-locais", "fonte_id": "jota", "data_pub": "2026-06-25T13:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A participação de pacientes no Fonajus (Fórum Nacional de Articulação das Juventudes) foi um sucesso.  Isso motivou os pacientes a se engajarem em mobilizações nos conselhos locais, buscando influenciar as diretrizes desde a primeira fase da formulação. A entidade acredita que esse novo formato permite inserir as demandas dos pacientes diretamente no processo de criação de políticas.", "titulo_pt": "Sucesso no Fonajus leva pacientes a repetir mobilização nos conselhos locais", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 18072, "titulo": "Laissons Parler Les Gens: Podcast addresses issues facing young Africans online", "url": "http://www.euronews.com/2026/06/25/laissons-parler-les-gens-podcast-addresses-issues-facing-young-africans-online", "fonte_id": "euronews", "data_pub": "2026-06-25T13:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O podcast 'Deixemos as Pessoas Falarem' discute os desafios enfrentados por jovens africanos online. O rapper Youssoupha reconheceu que cyberbullying e assédio são problemas, mas incentivou a juventude a focar nos aspectos positivos.", "titulo_pt": "Deixemos as Pessoas Falarem: Podcast Aborda Desafios Enfrentados por Jovens Africanos Online", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 17174, "titulo": "Hong Kong is world’s most unequal society for wealth distribution, study finds", "url": "https://www.scmp.com/news/hong-kong/society/article/3358368/hong-kong-worlds-most-unequal-society-wealth-distribution-study-finds?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-25T11:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo descobriu que Hong Kong se tornou a sociedade mais desigual do mundo em termos de distribuição de riqueza. Os principais fatores para essa desigualdade mudaram de disparidades salariais para concentração de capital, reduzindo a mobilidade social.", "titulo_pt": "Hong Kong é a sociedade mais desigual do mundo em distribuição de riqueza, revela estudo", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 16828, "titulo": "Barrio triste: un experimento visual provocador y algo fallido montado en zonas periféricas de Medellín", "url": "https://www.lanacion.com.ar/espectaculos/cine/barrio-triste-un-experimento-visual-provocador-y-algo-fallido-montado-en-zonas-perifericas-de-nid25062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-25T11:04:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O filme 'Barrio Triste', produzido por Harmony Korine e dirigido por Stillz, foi estrelado no último Festival de Veneza. O filme é um experimento visual que se passa em zonas periféricas de Medellín.", "titulo_pt": "Bairro Triste: Um Experimento Visual Provocante e Algo Fallido Montado em Zonas Periféricas de Medellín", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 18259, "titulo": "Agencies warn of major floods", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/26/2003859777", "fonte_id": "taipei_times", "data_pub": "2026-06-26T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Agências meteorológicas internacionais alertam para a possibilidade de grandes inundações nas próximas semanas. A chuva intensa e prolongada é prevista em várias regiões, o que aumenta o risco de alagamentos e deslizamentos. As autoridades recomendam aos moradores das áreas afetadas que se preparem para as condições climáticas extremas.", "titulo_pt": "Agências alertam sobre grandes inundações", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 18262, "titulo": "Wildlife groups urge more action on stray dog issue", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/06/26/2003859780", "fonte_id": "taipei_times", "data_pub": "2026-06-26T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Grupos de proteção animal na Taiwan estão pedindo ao governo que tome medidas mais eficazes para lidar com o crescente número de cães-vagalumes. Eles argumentam que a situação representa um risco para a saúde pública e bem-estar animal.", "titulo_pt": "Grupos ambientalistas pressionam por mais ações sobre o problema dos cães-vagalumes", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 18586, "titulo": "Inglaterra bajo una histórica ola de calor: un incendio forestal arrasó un parque natural", "url": "https://www.clarin.com/internacional/inglaterra-historica-ola-calor-incendio-forestal-arraso-parque-natural_0_GmtkE8trvM.html", "fonte_id": "clarin", "data_pub": "2026-06-25T22:13:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Reino Unido registrou seu recorde histórico de temperatura em junho, com 36,7°C. Na mesma noite, um incêndio devastou um dos parques naturais mais icônicos do país.", "titulo_pt": "Inglaterra sob uma onda histórica de calor: incêndio forestal destrói parque natural", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 17543, "titulo": "Onda de calor em Paris gera proibição do consumo de álcool na cidade", "url": "https://veja.abril.com.br/agenda-verde/onda-de-calor-em-paris-gera-proibicao-do-consumo-de-alcool-na-cidade/", "fonte_id": "veja", "data_pub": "2026-06-25T21:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Paris está proibindo o consumo de álcool em espaços públicos devido a uma onda de calor. A Europa também enfrenta um período de intenso calor, com temperaturas elevadas em várias regiões.", "titulo_pt": "Onda de calor em Paris leva à proibição do consumo de álcool na cidade", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 17546, "titulo": "Estudo: Rio Tietê não tem trecho livre de poulição", "url": "https://veja.abril.com.br/agenda-verde/estudo-rio-tiete-nao-tem-trecho-livre-de-poulicao/", "fonte_id": "veja", "data_pub": "2026-06-25T21:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo realizado pela SOS Mata Atlântica analisou todo o curso do rio Tietê e concluiu que nenhum trecho está livre de poluição.  A pesquisa também constatou a presença de contaminantes na região de Salesópolis, anteriormente considerada um dos pontos mais limpos do rio.", "titulo_pt": "Estudo: Rio Tietê não possui trecho livre de poluição", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 18002, "titulo": "Pesticide use rises again in France, especially for PFAS family chemicals", "url": "https://www.lemonde.fr/en/environment/article/2026/06/25/pesticide-use-rises-again-in-france-especially-for-pfas-family-chemicals_6754881_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-25T19:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O grupo de advocacy Générations futures divulgou um cálculo sobre o uso de pesticidas na França baseado em dados de vendas de produtos e no método oficial. O cálculo indica um aumento no uso de pesticidas, com destaque para a família de produtos químicos PFAS.", "titulo_pt": "Uso de pesticidas aumenta novamente na França, especialmente para produtos químicos da família PFAS", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 17872, "titulo": "City of Paris achieves partial victory over TotalEnergies in climate risks case", "url": "https://www.theguardian.com/world/2026/jun/25/paris-partial-victory-totalenergies-climate-risks-case", "fonte_id": "guardian_world", "data_pub": "2026-06-25T16:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um tribunal de Paris decidiu que a empresa francesa de petróleo TotalEnergies deve divulgar os riscos climáticos relacionados às emissões de seus produtos de petróleo e gás, além de apresentar planos para enfrentá-los. A decisão é uma vitória parcial para ONGs de mudança climática que buscam aplicar a lei francesa de 2017 sobre dever de vigilância corporativa à crise climática. O tribunal não determinou medidas específicas como limitar as emissões.", "titulo_pt": "Cidade de Paris registra vitória parcial contra TotalEnergies em caso sobre riscos climáticos", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 18000, "titulo": "Court rules oil and gas giant TotalEnergies must account for its clients' CO₂ emissions", "url": "https://www.lemonde.fr/en/environment/article/2026/06/25/court-rules-oil-and-gas-giant-totalenergies-must-account-for-its-clients-co-emissions_6754878_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-25T16:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Grupos de defesa ambiental e a prefeitura de Paris processaram a TotalEnergies desde 2020 para forçá-la a reduzir suas emissões de gases do efeito estufa. Um novo julgamento exige que a empresa inclua as emissões de seus clientes em seu próprio plano de diligência, o que representa um passo significativo.", "titulo_pt": "Tribunal determina que TotalEnergies deve considerar emissões de CO₂ dos seus clientes", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 18009, "titulo": "Water shortages and heat waves: France on track toward severe summer drought", "url": "https://www.lemonde.fr/en/environment/article/2026/06/25/water-shortages-and-heat-waves-france-on-track-toward-severe-summer-drought_6754873_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-25T15:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Rio, lençóis freáticos e solos estão sob grande pressão devido à falta de chuva e temperaturas elevadas. A situação levou muitos departamentos a impor restrições de água e muitos temem um verão desafiador para o gerenciamento da água.", "titulo_pt": "Escassez de água e ondas de calor: França caminha para uma grave seca no verão", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 18409, "titulo": "China Briefing 25 June 2026: Five-year plans passed | Critical-mineral tensions | Industrial decarbonisation plan", "url": "https://www.carbonbrief.org/china-briefing-25-june-2026-five-year-plans-passed-critical-mineral-tensions-industrial-decarbonisation-plan/", "fonte_id": "carbon_brief", "data_pub": "2026-06-25T14:25:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Carbon Brief publica o China Briefing, que resume as principais notícias sobre clima e energia na China. A edição de 25 de junho de 2026 aborda a aprovação dos planos quinquenais, tensões por minerais críticos e um plano de descarbonização industrial.", "titulo_pt": "China Briefing 25 de Junho de 2026: Planos Quinquenais Aprovados | Tensões por Minerais Críticos | Plano de Descarbonização Industrial", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 18071, "titulo": "La Guaira, Venezuela’s port city, shows extensive earthquake damage after the quake", "url": "http://www.euronews.com/video/2026/06/25/la-guaira-venezuelas-port-city-shows-extensive-earthquake-damage-after-the-quake", "fonte_id": "euronews", "data_pub": "2026-06-25T14:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Novas imagens de La Guaira, em 25 de junho, revelaram destruição generalizada após dois terremotos atingirem a costa caribenha da Venezuela. Os tremores danificaram edifícios, estradas e infraestrutura pública essencial.", "titulo_pt": "La Guaira, cidade portuária da Venezuela, mostra danos extensos após o terremoto", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 18410, "titulo": "Livestock heat deaths in transit doubled in UK record-hot summer of 2025", "url": "https://www.carbonbrief.org/livestock-heat-deaths-in-transit-doubled-in-uk-record-hot-summer-of-2025/", "fonte_id": "carbon_brief", "data_pub": "2026-06-25T13:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O número de animais que morreram devido ao estresse térmico durante o transporte para abatedouros dobrou durante o verão de 2025 no Reino Unido. O verão de 2025 foi o mais quente já registrado no país.  Dados coletados pelo Carbon Brief mostram o aumento nas mortes por calor.", "titulo_pt": "Mortes por calor de animais em trânsito duplicam no verão de 2025, recorde de calor no Reino Unido", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 16884, "titulo": "Temblor hoy, jueves 25 de junio en Chile: consulta epicentro y magnitud", "url": "https://www.latercera.com/servicios/noticia/temblor-hoy-jueves-25-de-junio-en-chile-consulta-epicentro-y-magnitud/", "fonte_id": "la_tercera", "data_pub": "2026-06-25T11:26:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Centro Sismológico Nacional da Universidade do Chile registrou movimentos sísmicos recentes. O Senapred oferece recomendações sobre o que fazer em caso de terremoto.", "titulo_pt": "Tremo hoje, 25 de junho no Chile: consulte epicentro e magnitude", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 16869, "titulo": "UK Met Office extends red heat warning into Friday night as extreme heat grips Europe – live", "url": "https://www.theguardian.com/world/live/2026/jun/25/europe-heatwave-uk-italy-france-record-temperature-latest-news-updates", "fonte_id": "guardian_world", "data_pub": "2026-06-25T11:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O escritório meteorológico do Reino Unido prevê as temperaturas mais altas no leste e sudeste da Inglaterra. Os óbitos relacionados a ondas de calor aumentaram na Europa. A empresa de água South East Water anunciou uma proibição temporária de mangueiras em Kent devido à crescente pressão causada pela onda de calor.", "titulo_pt": "Escritório Meteorológico do Reino Unido estende alerta vermelho para calor até sexta à noite enquanto calor extremo afeta a Europa - ao vivo", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 16825, "titulo": "Hay alerta amarilla por frío extremo, nevadas y vientos para este jueves 25 de junio: las provincias afectadas", "url": "https://www.lanacion.com.ar/sociedad/hay-alerta-amarilla-por-frio-extremo-nevadas-y-vientos-para-este-jueves-25-de-junio-las-provincias-nid25062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-25T11:08:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Serviço Meteorológico Nacional emitiu um alerta amarelo para condições climáticas adversas em várias regiões do país. A temperatura mínima na cidade de Buenos Aires será de 8°C.", "titulo_pt": "Alerta amarelo por frio extremo, neve e ventos para este 25 de junho: as províncias afetadas", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 16676, "titulo": "A Europa está aquecendo mais rápido que o resto do planeta. Entenda por quê", "url": "https://veja.abril.com.br/agenda-verde/a-europa-esta-aquecendo-mais-rapido-que-o-resto-do-planeta-entenda-por-que/", "fonte_id": "veja", "data_pub": "2026-06-25T11:04:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A mudança climática intensificou a onda de calor na Europa, elevando as temperaturas em até 4 graus Celsius. Países europeus registraram temperaturas recordes devido ao calor intenso.", "titulo_pt": "A Europa está aquecendo mais rápido que o resto do planeta. Entenda por quê", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 18532, "titulo": "Suprema Corte dos EUA valida barrar pedidos de asilo na fronteira", "url": "https://www.poder360.com.br/poder-internacional/suprema-corte-dos-eua-valida-barrar-pedidos-de-asilo-na-fronteira/", "fonte_id": "poder360", "data_pub": "2026-06-25T22:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal dos EUA autorizou o governo Trump a impedir solicitantes de asilo quando os postos de fronteira com o México estiverem lotados. A decisão permite que o governo rejeite pedidos de asilo sem análise individual, caso haja excesso de solicitações. Esta medida foi implementada durante a administração Trump e agora foi validada pela Suprema Corte.", "titulo_pt": "Suprema Corte dos EUA valida barreira a pedidos de asilo na fronteira", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 18666, "titulo": "What the Prairieland Prosecutions Reveal About Trump’s America", "url": "https://www.theatlantic.com/newsletters/2026/06/trump-justice-antifa-texas-january-6/687707/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-25T22:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sentenças severas geraram questões desconfortáveis sobre a igualdade na aplicação da lei. As acusações contra manifestantes em Kansas envolvendo protestos contra um pipeline de petróleo levantaram preocupações com o tratamento diferenciado de grupos políticos.", "titulo_pt": "O que as acusações no campo das pradarias revelam sobre a América de Trump", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 18583, "titulo": "Los venezolanos buscan a sus víctimas entre los escombros: “Lo que nos faltaba”, dicen con resignación en Caracas", "url": "https://www.clarin.com/mundo/venezolanos-buscan-victimas-escombros-faltaba-dicen-resignacion-caracas_0_6r97YqrV3c.html", "fonte_id": "clarin", "data_pub": "2026-06-25T22:21:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um dia após o terremoto, os moradores de Caracas formavam filas em postos de gasolina e supermercados por medo de escassez de combustível e alimentos. A tragédia deixou muitas pessoas sem casa.", "titulo_pt": "Venezuelanos buscam vítimas entre escombros: 'O que nos faltava', dizem em Caracas com resignacão", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 17530, "titulo": "Papa Leão 14 envia 100 mil euros para Venezuela após terremotos", "url": "https://www.poder360.com.br/poder-internacional/papa-leao-14-envia-100-mil-euros-para-venezuela-apos-terremotos/", "fonte_id": "poder360", "data_pub": "2026-06-25T21:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Papa Leão XIII enviou 100 mil euros para a Venezuela como ajuda humanitária após os terremotos que atingiram o país. A ajuda será destinada às áreas afetadas pelos tremores. Mais de 180 pessoas morreram em decorrência dos terremotos.", "titulo_pt": "Papa Leão XIII envia 100 mil euros para Venezuela após terremotos", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 18103, "titulo": "WNBA: Alyssa Thomas suspended one game for fist into Cailtin Clark’s throat", "url": "https://www.aljazeera.com/sports/2026/6/25/wnba-alyssa-thomas-suspended-one-game-for-fist-into-cailtin-clarks-throat?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-25T21:48:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Alyssa Thomas foi suspensa por um jogo pela WNBA após socar a garganta de Cailtin Clark durante uma partida. O incidente ocorreu quando ambas as jogadoras estavam no chão. Thomas empurrou o punho para dentro da garganta de Clark antes de se levantar e pisar sobre ela.", "titulo_pt": "WNBA: Alyssa Thomas suspenso por um jogo após soco na garganta de Cailtin Clark", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 17859, "titulo": "Declaran culpable al hijo del líder de la CAM y a otros cuatro comuneros por atentados incendiarios en Lautaro y Temuco de 2022", "url": "https://www.latercera.com/nacional/noticia/declaran-culpable-al-hijo-del-lider-de-la-cam-y-a-otros-cuatro-comuneros-por-atentados-incendiarios-en-lautaro-y-temuco-de-2022/", "fonte_id": "la_tercera", "data_pub": "2026-06-25T20:49:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Pelentaro Héctor Llaitul Pezoa foi condenado por incêndio reiterado, roubo em concurso com sequestro simples, roubo e porte ilegal de munições. A leitura da sentença está marcada para o dia 13 de julho.", "titulo_pt": "Filho do líder da CAM e outros quatro comuneros declarados culpados por atentados incendiários em Lautaro e Temuco de 2022", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 18213, "titulo": "Venezuelans search rubble for survivors after twin earthquakes kill at least 188", "url": "https://www.scmp.com/news/world/americas/article/3358404/venezuelans-search-rubble-survivors-after-twin-earthquakes-kill-least-188?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-25T20:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Terremotos de magnitude 7,2 e 7,5 atingiram a Venezuela na quarta-feira, causando pelo menos 188 mortes e deixando mais de 200 pessoas presas sob escombros. Mais de 1.500 pessoas ficaram feridas e milhares estão desaparecidos.", "titulo_pt": "Venezuelanos buscam sobreviventes após terremotos duplos matarem pelo menos 188 pessoas", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 17552, "titulo": "Harvey Weinstein tem acusação de estupro retirada após três julgamentos fracassados", "url": "https://veja.abril.com.br/cultura/harvey-weinstein-tem-acusacao-de-estupro-retirada-apos-tres-julgamentos-fracassados/", "fonte_id": "veja", "data_pub": "2026-06-25T20:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma acusação de estupro contra Harvey Weinstein foi retirada após três julgamentos terminarem sem resultado. Weinstein continua cumprindo pena de 16 anos de prisão por outras condenações.", "titulo_pt": "Harvey Weinstein tem acusação de estupro retirada após três julgamentos fracassados", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 18283, "titulo": "Bill to reauthorize N. Korean human rights act reintroduced to Senate", "url": "https://en.yna.co.kr/view/AEN20260626000300315", "fonte_id": "yonhap_news", "data_pub": "2026-06-25T20:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um legislador americano apresentou novamente um projeto de lei ao Senado dos EUA. O projeto visa reautorizar a Lei de Direitos Humanos da Coreia do Norte.  A lei, que expira em dezembro, visa pressionar o governo norte-coreano sobre suas violações de direitos humanos.", "titulo_pt": "Projeto de lei para reautorizar o ato sobre direitos humanos da Coreia do Norte é apresentado novamente no Senado", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 18197, "titulo": "'The face of a tortured man': Photos of Palestinian journalist released from Israeli prison spark outrage", "url": "https://www.middleeasteye.net/trending/photos-palestinian-journalist-following-release-israeli-detention-spark-outrage", "fonte_id": "middle_east_eye", "data_pub": "2026-06-25T15:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Fotos antes e depois do jornalista palestino Mujahed Bani Mufleh, após oito meses de detenção em Israel, foram divulgadas nas redes sociais.  Bani Mufleh sofreu um derrame cerebral e precisou passar por cirurgias enquanto estava preso. A imagem gerou indignação e pedidos de responsabilização por parte de jornalistas e organizações de direitos humanos.", "titulo_pt": "'O rosto de um homem torturado': Fotos de jornalista palestino libertado da prisão israelense geram indignação", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 18201, "titulo": "Why Palestinian Christians can view the archbishop of Canterbury's visit with cautious hope", "url": "https://www.middleeasteye.net/opinion/why-palestinian-christians-can-view-archbishop-canterburys-visit-cautious-hope", "fonte_id": "middle_east_eye", "data_pub": "2026-06-25T14:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O arcebispo de Canterbury, Dame Sarah Mullally, visitou a Terra Santa para mostrar solidariedade aos cristãos palestinos. Em Birzeit, ela falou sobre buscar a paz e  a justiça para os palestinos. A visita foi vista como um sinal de apoio por alguns cristãos palestinos.", "titulo_pt": "Por que cristãos palestinos podem ver a visita do arcebispo de Canterbury com cauteloso otimismo", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 18005, "titulo": "Death of Lyhanna: 'Comprehensive law' on Assemblée Nationale's agenda marks victory for feminist and child advocacy groups", "url": "https://www.lemonde.fr/en/politics/article/2026/06/25/death-of-lyhanna-comprehensive-law-on-assemblee-nationale-s-agenda-marks-victory-for-feminist-and-child-advocacy-groups_6754868_5.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-25T13:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O projeto de lei, que visa fortalecer a luta contra a violência de gênero e sexual, será debatido no outono. O primeiro-ministro Sébastien Lecornu anunciou a mudança de política após uma reversão de decisão. Uma revisão pelo Conselho de Estado é esperada para remodelar o escopo da lei.", "titulo_pt": "Morte de Lyhanna: Lei abrangente sobre violência contra mulheres na agenda da Assemblée Nationale marca vitória para grupos feministas e de defesa da criança", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 18233, "titulo": "German doctor admits to killing 12 patients in high-profile trial", "url": "https://www.scmp.com/news/world/europe/article/3358376/german-doctor-admits-killing-12-patients-high-profile-trial?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-25T12:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um médico paliativo alemão de 40 anos admitiu em tribunal ter matado 12 pacientes. O médico é acusado de matar um total de 15 pacientes, entre setembro de 2021 e julho de 2024, administrando uma mistura letal de drogas. As vítimas tinham idades entre 25 e 87 anos.", "titulo_pt": "Médico alemão admite ter matado 12 pacientes em julgamento de grande repercussão", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 16885, "titulo": "Autoridades confirman 164 fallecidos y más de 900 heridos tras doble terremoto en Venezuela", "url": "https://www.latercera.com/nacional/noticia/autoridades-confirman-164-fallecidos-y-mas-de-900-heridos-tras-doble-terremoto-en-venezuela/", "fonte_id": "la_tercera", "data_pub": "2026-06-25T11:25:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A presidente interina da Venezuela, Delcy Rodríguez, confirmou que o número de vítimas fatais dos terremotos chegou a 164.  Além disso, foram registradas 30 réplicas desde os eventos iniciais.", "titulo_pt": "Autoridades confirmam 164 mortos e mais de 900 feridos após duplo terremoto na Venezuela", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 16820, "titulo": "Encontraron a un niño muerto dentro de un auto en plena ola de calor en Francia", "url": "https://www.lanacion.com.ar/el-mundo/encontraron-a-un-nino-muerto-dentro-de-un-auto-en-plena-ola-de-calor-en-francia-nid25062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-25T11:20:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um menino de 3 anos foi encontrado morto dentro de um carro estacionado na porta de sua casa pelos pais. O incidente ocorreu durante uma onda de calor em França, onde outras 40 pessoas morreram devido às altas temperaturas.", "titulo_pt": "Menino de 3 anos encontrado morto dentro de carro durante onda de calor na França", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 16741, "titulo": "Dos periodistas suecos triunfan con un thriller que reivindica el periodismo ante la corrupción", "url": "https://www.clarin.com/cultura/periodistas-suecos-triunfan-thriller-reivindica-periodismo-corrupcion_0_v4mvHDwP3V.html", "fonte_id": "clarin", "data_pub": "2026-06-25T11:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O livro 'Jaque à Rainha', ambientado em Malmö, uma das cidades mais diversas da Suécia, é um thriller do gênero nordic noir. A trama gira em torno do assassinato de uma ativista e uma investigação que questiona as versões oficiais. Os autores se inspiraram em experiências jornalísticas reais para criar a história.", "titulo_pt": "Dos jornalistas suecos vencem com thriller que reivindica o jornalismo contra a corrupção", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}], "direitos_humanos__eve                   <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
</body>
</html>
