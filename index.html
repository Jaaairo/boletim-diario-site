<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 18/07/2026 19:38 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">
    <div class="modal-erro" id="senha-erro" style="display:none">Senha incorreta.</div>
    <div class="modal-btns">
      <button class="btn-sec2" onclick="fecharModal('modal-senha')">Cancelar</button>
      <button class="btn-pri" onclick="verificarSenha()">Entrar</button>

  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>
      <option value="classificacao_errada">Classificação errada</option>
      <option value="resumo_impreciso">Resumo impreciso</option>
      <option value="outro">Outro</option>
    </select>
    <label for="flag-nota">Nota (opcional)</label>
    <textarea id="flag-nota" placeholder="Descreva o problema..."></textarea>
    <div class="modal-btns">
      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "18/07/2026 19:38", "stats": {"noticias_novas": 583, "resumos_gerados": 233}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O pré-candidato Romeu Zema, do partido Novo, anunciou que planeja privatizar a Petrobras e o Banco do Brasil para investir nas obras de infraestrutura no país. Durante um discurso na convenção nacional do seu partido em São Paulo, ele defendeu a desobstrução das estradas, ferrovias, hidrovias e portos com os recursos dessas vendas. Além disso, Zema criticou o sistema de cotas e atacou o Supremo Tribunal Federal (STF), pedindo o impeachment do ministro Alexandre Moraes e criticando Gilmar Mendes.", "mundo": "O prefeito de Nova York está considerando a possibilidade de prisão do primeiro-ministro israelense, Benjamin Netanyahu, durante a Assembleia da ONU. Em outro desenvolvimento, o Irã não confirmou oficialmente uma tregua e matou dois soldados dos Estados Unidos na Jordânia após ataques iranianos contra forças aliadas no Iêmen. Além disso, o presidente da Hungria concordou em renunciar ao cargo após o parlamento apoiar sua remoção. Em Israel, um município quer separar homens e mulheres em certas ruas, enquanto políticos israelenses votaram a favor de uma separação de gêneros em cursos universitários. A qualidade do ar melhorou no nordeste dos Estados Unidos, mas fumaça de incêndios florestais persiste no meio-oeste. No Canadá, fogos florestais continuam ocorrendo e enviam fumaça para cidades nos Estados Unidos.\n\nOs últimos acontecimentos na geopolítica global têm sido marcados por tensões e confrontos entre potências. Em primeiro lugar, a escalada de ataques iranianos tem causado preocupações significativas. De acordo com relatos, pelo menos 50 pessoas foram mortas em ataques dos Estados Unidos contra o Irã, levando o governo iraniano a suspender acordos e advertir sobre as consequências para o país. Além disso, dois militares americanos foram mortos durante ataques iranianos no Iêmen, aumentando a tensão entre as duas nações. Esses incidentes têm levantado preocupações sobre uma possível retomada da guerra à escala regional. Em outro front geopolítico, o conflito ucraniano continua com ataques de drones que resultaram em pelo menos oito mortos e danos significativos a instalações russas, como a maior plataforma de comércio eletrônico do país. A escalada das tensões levou a advertências de que o bloqueio marítimo imposto pelos Estados Unidos aos portos iranianos deve aumentar a pressão sobre a população e os mercados globais de energia. Por fim, as relações entre China e Reino Unido também estão em pauta com a empresa chinesa Jingye exigindo uma solução justa após o governo britânico nacionalizar a British Steel, destacando preocupações sobre segurança e investimentos estrangeiros.", "economia": "A economia global enfrenta diversos desafios e oportunidades neste momento. O Brasil está sob pressão para fortalecer sua defesa contra as tarifas impostas pelos Estados Unidos, conforme apontou um especialista em negociação internacional. Além disso, o Fundo de Inteligência Artificial da Safra rendeu quase 150% em seu primeiro ano, se tornando uma 'aposta única na vida' para seus investidores, destacando a crescente importância das tecnologias emergentes no cenário econômico atual. Em outro desenvolvimento global, as empresas de Wall Street estão se adaptando à nova era de comunicação do Fed, utilizando inteligência artificial para obter vantagens nesse novo cenário. No mercado de câmbio, o dólar oficial abrirá com os mesmos valores de seu último dia de cotação no próximo lunes, 20 de julho.", "tecnologia": "A reforma das telecomunicações no Taiwan pode permitir a operação do serviço Starlink, conforme informou o Taipei Times. A China está avançando rapidamente no desenvolvimento de inteligência artificial (IA), pressionando empresas como as do Vale do Silício a considerarem alternativas mais baratas e acessíveis, segundo o Axios. O governo dos Estados Unidos está testando um programa que usa IA para decisões de cobertura de seguros, com o objetivo de explorar se a tecnologia pode melhorar ou trazer novos desafios ao processo de autorização prévia, conforme relatado pelo Ars Technica. A China realizou uma conferência global sobre IA em Shanghai no dia 17 de julho, refletindo a crescente competição entre o país e os Estados Unidos neste campo, informa o Le Monde en. Além disso, a reforma das telecomunicações também pode permitir a operação do Starlink no Taiwan, conforme divulgado pelo Taipei Times.", "ciencia": "A pesquisa conduzida pela Universidade Otto von Guericke, em Magdeburg, sob a liderança do professor Dr. Dieter Schinzer, é um destaque na ciência. Eles conseguiram sintetizar pela primeira vez os componentes-chave da substância natural Neosorangicin A no laboratório. Este avanço abre caminho para o desenvolvimento desta substância como possível remédio antibacteriano alternativo contra a resistência antimicrobiana. Em outro importante desenvolvimento, a missão Psyche da NASA conseguiu com sucesso encontrar Marte e os cientistas estão analisando dados recolhidos durante a passagem por Marte em preparação para a chegada ao asteroide Psyche em 2029. Outro destaque é uma pesquisa que demonstra a importância do apoio emocional dos pets para pessoas vulneráveis, como moradores de rua e vítimas de violência doméstica, publicada na revista Frontiers in Psychology. Finalmente, o Japão lançou com sucesso seu protótipo de foguete reutilizável RV-X no teste inaugural de voo, aumentando o limite máximo do contrato de lançamento da Força Espacial dos Estados Unidos para $17 bilhões em meio ao aumento da demanda.", "cultura": "A estreia de Shania Twain em um pequeno bar em Toronto, Canadá, marcou uma nova fase na carreira da cantora. Ela tocou sucessos e canções do seu novo álbum 'Little Miss Twain', atendendo aos pedidos dos fãs. No outro destaque cultural, o filme 'The Odyssey' de Christopher Nolan estreou com um primeiro dia lucrativo nos cinemas norte-americanos, arrecadando 51 milhões de dólares. A obra, baseada na épica grega, teve uma sessão especial em Manhattan durante a qual a temperatura atingiu 90 graus e fumaça de incêndios florestais tingiu o céu com um tom avermelhado. No cinema brasileiro, 'Article 370' foi destaque, vencendo o prêmio de melhor filme na 72ª edição dos Prêmios Nacional de Cinema da Índia e premiando Yami Gautam como a melhor atriz por seu papel no drama político. Além disso, uma pintura do século XVIII foi descoberta durante obras de restauração no Mosteiro de São Bento, em Olinda, um achado significativo para o patrimônio cultural local após 18 meses de trabalhos.", "sociedade": "O Rio Grande do Sul investiga uma suspeita de que uma mãe tenha matado seu bebê de 1 ano, com marcas de lesões e queimaduras no corpo da criança. O caso gerou comoção na região. Em Santiago, duas pessoas em situação de rua morreram durante a noite por causa das chuvas, levando a municipalidade a alertar para uma 'noite difícil'. No Paraná, um assalto a tiros ocorreu em Campo Mourão, deixando dois mortos e três feridos, incluindo uma mulher de 40 anos. O Tribunal de Justiça de São Paulo negou um habeas corpus apresentado pela defesa da influenciadora Deolane Bezerra, que está envolvida no caso do assassinato de sua prima Nícolas, com a defesa anunciando intenção de recorrer. A Polícia Civil do Rio Grande do Sul confirmou também a morte de um bebê de 1 ano por traumatismo craniano, descartando engasgamento como causa da morte. Em Santiago, o prefeito Mario Desbordes informou sobre duas mortes em situação de rua devido às chuvas e os ministérios mexicanos estão investigando um surto alimentar associado a alface fornecida pela rede Taco Bell. As famílias migrantes na Argentina aprendem a se preparar para possíveis intervenções do ICE, memorizando números importantes e estabelecendo diretrizes de segurança para os menores em casa. O Brasil enfrenta uma crise na área da saúde mental, enquanto diversos países implementam subsídios para incentivar casais a ter bebês, oferecendo creches e até ajuda no salário das babás. A desinformação na área de saúde se tornou um risco sanitário significativo, levando à necessidade de uma resposta rápida do Estado. As capitais brasileiras como Rio de Janeiro, Belo Horizonte e São Paulo adotaram medidas contra a publicidade de apostas, com o Congresso Nacional ainda discutindo um projeto de lei que amplia essa proibição.", "meio_ambiente": "Um sistema frontal extremo, considerado o mais intenso dos últimos 30 anos, está afetando várias regiões do Chile, causando socavões nas cidades de Reñaca e Puchuncaví. No Brasil, pesquisadores enfatizam a importância dos tubarões para os ecossistemas costeiros e sugerem medidas de conservação. Paralelamente, o Hospital Moinhos de Vento planta uma árvore nativa a cada bebê nascido, totalizando mais de 11 mil mudas em três anos. Em Santa Catarina, um projeto prevê o pagamento de R$ 100 por cada javali morto para controlar a população da espécie.", "direitos_humanos": "A Câmara dos Deputados apresentou uma proposta que tornaria o estupro infantil imprescritível, visando proteger a dignidade e integridade sexual das crianças. Por outro lado, Israel enfrenta críticas internacionais após um relatório da Comissão da ONU acusar a nação de cometer um genocídio deliberado contra crianças palestinas, exigindo uma intervenção global para parar esse 'assalto inédito'. Além disso, especialistas recomendaram a independência de uma entidade responsável por direitos humanos, enfatizando a necessidade de um organismo autônomo para garantir a efetividade das medidas."}, "resumo_do_dia": {"politica_nacional": [{"id": 58998, "titulo": "TJ-SP nega novo pedido de habeas corpus de Deolane", "url": "https://www.poder360.com.br/poder-justica/tj-sp-nega-novo-pedido-de-habeas-corpus-de-deolane/", "fonte_id": "poder360", "data_pub": "2026-07-18T19:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Tribunal de Justiça do Estado de São Paulo negou um novo pedido de habeas corpus apresentado pela defesa de Deolane Bezerra. A defesa argumentava que, como advogada, ela tinha direito a uma Sala de Estado-Maior da OAB, mas o relator do caso citou a perda da carteira da OAB como justificativa para negar o pedido.", "titulo_pt": "TJ-SP nega novo pedido de habeas corpus de Deolane", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 58999, "titulo": "Zema diz que Michelle é opção para vice em sua chapa", "url": "https://www.poder360.com.br/poder-eleicoes-2026/zema-diz-que-michelle-e-opcao-para-vice-em-sua-chapa/", "fonte_id": "poder360", "data_pub": "2026-07-18T19:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O pré-candidato Zema busca um nome com ficha limpa para o cargo de vice-governador. Além disso, ele também está conversando com o Podemos sobre a possibilidade de formar uma aliança eleitoral.", "titulo_pt": "Zema busca nome ficha limpa e conversa com podemos para vice", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 58936, "titulo": "DC descarta candidatura de Aldo Rebelo mesmo com desistência de Joaquim Barbosa", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/dc-descarta-candidatura-de-aldo-rebelo-mesmo-com-desistencia-de-joaquim-barbosa.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-18T19:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O DC não considera a possibilidade de uma reconciliação com Aldo Rebelo, que afirma ser o pré-candidato da sigla à Presidência da República, mesmo após Joaquim Barbosa desistir do pleito.", "titulo_pt": "DC rejeita reconciliação com Aldo Rebelo após desistência de Joaquim Barbosa", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 58980, "titulo": "O slogan que o partido Novo vai adotar na campanha", "url": "https://veja.abril.com.br/politica/o-slogan-que-o-partido-novo-vai-adotar-na-campanha/", "fonte_id": "veja", "data_pub": "2026-07-18T18:57:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O partido Novo planeja adotar um slogan enfatizando seu discurso contra os 'intocáveis' e apresentando seus membros como estranhos à política.", "titulo_pt": "Slogan do partido Novo destaca discurso contra 'intocáveis'", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 59001, "titulo": "IA chinesa da Moonshot supera interface de norte-americanas", "url": "https://www.poder360.com.br/poder-china/ia-chinesa-da-moonshot-supera-interface-de-americanas-pela-1a-vez/", "fonte_id": "poder360", "data_pub": "2026-07-18T18:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A IA chinesa Kimi K3, com 2,8 trilhões de parâmetros, é considerada o maior modelo de pesos abertos já lançado no mundo. Esta IA superou interfaces norte-americanas em desafios recentes.", "titulo_pt": "IA chinesa da Moonshot supera interfaces norte-americanas", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 58966, "titulo": "Polícia investiga morte de homem no Parque Augusta, em São Paulo", "url": "https://www.cartacapital.com.br/sociedade/policia-investiga-morte-de-homem-no-parque-augusta-em-sao-paulo/", "fonte_id": "cartacapital", "data_pub": "2026-07-18T18:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A polícia está investigando a morte de um homem no Parque Augusta, em São Paulo. O local foi fechado após o corpo ser encontrado.", "titulo_pt": "Polícia investiga morte de homem no Parque Augusta, em São Paulo", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 59002, "titulo": "”Não vou baixar a cabeça para tirano”, diz Flávio sobre Moraes", "url": "https://www.poder360.com.br/poder-eleicoes-2026/nao-vou-baixar-a-cabeca-para-tirano-diz-flavio-sobre-moraes/", "fonte_id": "poder360", "data_pub": "2026-07-18T18:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio Bolsonaro criticou a restrição de visitas impostas pelo ministro do STF, Alexandre Moraes, a Jair Bolsonaro. Ele afirmou que Moraes age como um 'demônio' e declarou que não baixará a cabeça diante dessa decisão.", "titulo_pt": "‘Não vou baixar a cabeça para tirano’, diz Flávio sobre Moraes", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 59087, "titulo": "Novo negocia com Podemos vice para chapa presidencial de Zema", "url": "https://www.cnnbrasil.com.br/politica/novo-negocia-com-podemos-vice-para-chapa-presidencial-de-zema/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-18T18:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente nacional do Podemos, Eduardo Ribeiro, confirmou que o partido está em negociações para formar uma chapa presidencial com o vice de Guilherme Zema. As conversas estão avançadas e devem ser concluídas até 5 de agosto.", "titulo_pt": "Novo negocia com Podemos para chapa presidencial de Zema", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 58952, "titulo": "Após decisão sobre prisão domiciliar de Bolsonaro, Flávio chama Moraes de 'sem alma' em evento do PL no ES", "url": "https://g1.globo.com/es/espirito-santo/eleicoes/2026/noticia/2026/07/18/decisao-prisao-domiciliar-bolsonaro-flavio-moraes-evento-pl-es.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-18T18:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Após a decisão do ministro Alexandre de Moraes que manteve a prisão domiciliar de Jair Bolsonaro e restringiu suas visitas, o senador Flávio Bolsonaro criticou publicamente o magistrado, chamando-o de 'sem alma' em um evento do PL no Espírito Santo.", "titulo_pt": "Flávio chama Moraes de 'sem alma' após prisão domiciliar de Bolsonaro", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 59046, "titulo": "\"O Brasil não aguenta mais quatro anos de cotas\", afirma Zema em SP", "url": "https://www.metropoles.com/sao-paulo/o-brasil-nao-aguenta-mais-quatro-anos-de-cotas-afirma-zema-em-sp", "fonte_id": "metropoles", "data_pub": "2026-07-18T18:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governador de Minas Gerais, Romeu Zema, afirmou durante um evento que o Brasil não aguenta mais quatro anos de cotas. Ele também criticou o Supremo Tribunal Federal (STF), defendendo o impeachment de Alexandre Moraes e criticando Gilmar Mendes.", "titulo_pt": "Zema afirma que Brasil não aguenta mais quatro anos de cotas em SP", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 59090, "titulo": "Comissão aprova projeto que cria prisão especial para agentes de segurança", "url": "https://www.cnnbrasil.com.br/politica/comissao-aprova-projeto-que-cria-prisao-especial-para-agentes-de-seguranca/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-18T18:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A comissão aprovou um projeto de lei que cria uma prisão especial para agentes de segurança. O transporte desses presos será feito separadamente dos demais detentos.", "titulo_pt": "Comissão aprova projeto de prisão especial para agentes de segurança", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 58937, "titulo": "Kassab nega ao STF ter influenciado destinação de emendas parlamentares como presidente do PSD", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/kassab-nega-ao-stf-ter-influenciado-destinacao-de-emendas-parlamentares-como-presidente-do-psd.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-18T18:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente do PSD, Gilberto Kassab, negou ao STF que tenha influenciado a destinação de emendas parlamentares enquanto estava à frente do partido.", "titulo_pt": "Kassab nega ter influenciado emendas parlamentares como presidente do PSD", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 59093, "titulo": "Operação contra Jaques fez PT evitar Master nas redes e pôs PL na ofensiva", "url": "https://www.cnnbrasil.com.br/politica/operacao-contra-jaques-fez-pt-evitar-master-nas-redes-e-pos-pl-na-ofensiva/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-18T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma operação da Polícia Federal contra o senador do PT, Jaques Wagner, levou a um aumento nas publicações do PL nas redes sociais e uma redução nos conteúdos sobre o tema em perfis petistas.", "titulo_pt": "Operação contra Jaques fez PL aumentar presença nas redes e PT diminuir conteúdo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [{"titulo": "Zema promete privatizar Petrobras e Banco do Brasil para investir em infraestrutura", "sumario": "O pré-candidato do Novo à Presidência da República, Zema, prometeu privatizar a Petrobras e o Banco do Brasil para investir na infraestrutura durante um discurso no Encontro Nacional do partido em São Paulo. Romeu Zema, pré-candidato do Novo à Presidência da República, declarou que pretende privatizar a Petrobras e o Banco do Brasil para investir em infraestrutura no país. O pré-candidato defendeu a privatização da Petrobras e do Banco do Brasil para investir em infraestrutura.", "artigos": [{"id": 59056, "titulo": "Zema promete privatizar Petrobras e Banco do Brasil para investir em infraestrutura", "url": "https://www.infomoney.com.br/politica/zema-promete-privatizar-petrobras-e-banco-do-brasil-para-investir-em-infraestrutura/", "fonte_id": "infomoney", "data_pub": "2026-07-18T19:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O pré-candidato do Novo à Presidência da República, Zema, prometeu privatizar a Petrobras e o Banco do Brasil para investir na infraestrutura durante um discurso no Encontro Nacional do partido em São Paulo.", "titulo_pt": "Zema promete privatizar Petrobras e Banco do Brasil para investir em infraestrutura", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 58953, "titulo": "Zema promete privatizar Petrobras e Banco do Brasil e usar recursos em obras de infraestrutura", "url": "https://g1.globo.com/sp/sao-paulo/eleicoes/2026/noticia/2026/07/18/zema-promete-privatizar-petrobras-e-banco-do-brasil-e-usar-recursos-em-obras-de-infraestrutura.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-18T18:33:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Romeu Zema, pré-candidato do Novo à Presidência da República, declarou que pretende privatizar a Petrobras e o Banco do Brasil para investir em infraestrutura no país. Segundo ele, os recursos obtidos com as vendas serão usados para construir estradas, ferrovias, hidrovias e portos.", "titulo_pt": "Zema promete privatizar Petrobras e Banco do Brasil e usar recursos em obras de infraestrutura", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 59091, "titulo": "Zema defende privatizar Petrobras e BB para investir em infraestrutura", "url": "https://www.cnnbrasil.com.br/politica/zema-defende-privatizar-petrobras-e-bb-para-investir-em-infraestrutura/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-18T18:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O pré-candidato defendeu a privatização da Petrobras e do Banco do Brasil para investir em infraestrutura. Além disso, ele apresentou propostas de segurança pública que incluem o uso das Forças Armadas no combate ao crime organizado.", "titulo_pt": "Zema defende privatizar Petrobras e BB para investir em infraestrutura", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}]}], "mundo": [{"id": 59448, "titulo": "Beijing’s new scramble for Africa", "url": "https://www.taipeitimes.com/News/editorials/archives/2026/07/19/2003860979", "fonte_id": "taipei_times", "data_pub": "2026-07-19T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo discute a nova iniciativa chinesa de expansão na África.", "titulo_pt": "Beijing’s new scramble for Africa (a nova corrida chinesa pela áfrica)", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 59449, "titulo": "China channels the Third Reich", "url": "https://www.taipeitimes.com/News/editorials/archives/2026/07/19/2003860980", "fonte_id": "taipei_times", "data_pub": "2026-07-19T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A China está usando estratégias semelhantes às do Terceiro Reich, de acordo com o artigo. O texto sugere que há paralelos nas abordagens das duas entidades.", "titulo_pt": "China adota estratégias do terceiro Reich", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 58965, "titulo": "Prefeito de Nova York diz que cogita prisão de Netanyahu durante Assembleia da ONU", "url": "https://www.cartacapital.com.br/mundo/prefeito-de-nova-york-diz-que-cogita-prisao-de-netanyahu-durante-assembleia-da-onu/", "fonte_id": "cartacapital", "data_pub": "2026-07-18T19:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O prefeito de Nova York considera a possibilidade de prisão do primeiro-ministro de Israel, Benjamin Netanyahu, durante a Assembleia da ONU. Segundo Zohran Mamdani, o primeiro-ministro israelense é descrito como um criminoso de guerra.", "titulo_pt": "Prefeito de Nova York cogita prisão de Netanyahu durante Assembleia da ONU", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 59317, "titulo": "Two US troops killed and one missing after Iranian attack in Jordan", "url": "https://www.bbc.co.uk/news/articles/cn8nynv8ze8o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-18T19:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dois soldados dos Estados Unidos foram mortos e um está desaparecido após um ataque iraniano com mísseis que foi interceptado por Jordânia. A Jordânia afirmou ter interceptado 10 mísseis iranianos lançados em sua área aérea durante a madrugada de sábado.", "titulo_pt": "Dois soldados americanos mortos e um desaparecido após ataque iraniano em jordânia", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 59171, "titulo": "Ukraine’s Top General Becomes a Target of Protesters’ Anger", "url": "https://www.nytimes.com/2026/07/18/world/europe/ukraine-protests-general-syrskyi-fedorov.html", "fonte_id": "nyt_world", "data_pub": "2026-07-18T19:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Protestantes que apoiam o ex-ministro de Defesa da Ucrânia começaram a criticar o general Oleksandr Syrskyi, com quem este último teve conflitos enquanto estava no cargo.", "titulo_pt": "General mais alto do comando ucraniano se torna alvo das protestações", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 59364, "titulo": "Iran supreme leader warns of ‘unforgettable lessons’ if US attacks continue", "url": "https://www.aljazeera.com/news/2026/7/18/iran-supreme-leader-warns-of-unforgettable-lessons-if-us-attacks-continue?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-18T18:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O filho do líder supremo iraniano, Mojtaba Khamenei, afirmou que o sinalado de Donald Trump é 'inútil' e que a 'ameaça' faz parte fundamental da política externa dos Estados Unidos. Ele advertiu que lições 'inefectáveis' podem ser ensinadas aos EUA se as hostilidades continuarem.", "titulo_pt": "Líder supremo do Irã ameaça retaliar com 'lições inefáveis' caso ataques americanos continuem", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 59365, "titulo": "Israeli attacks on residential areas in Gaza kill eight", "url": "https://www.aljazeera.com/news/2026/7/18/israeli-attacks-on-residential-areas-in-gaza-kill-eight?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-18T18:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ataques israelenses em áreas residenciais de Gaza City resultaram na morte de oito pessoas. Os ataques ocorreram além da linha que as forças israelenses deveriam manter sob o acordo de cessar-fogo.", "titulo_pt": "Ataques israelenses em áreas residenciais de Gaza matam oito", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 59356, "titulo": "Israel: How real is threat of gender segregation on street?", "url": "https://www.dw.com/en/israel-how-real-is-threat-of-gender-segregation-on-street/a-78020879?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-18T18:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um município israelense, com uma população judaica ultraortodoxa significativa, quer separar homens e mulheres em certas ruas. Politistas israelenses votaram a favor da separação de gêneros em cursos universitários.", "titulo_pt": "Israel: quão real é a ameaça de segregação por gênero nas ruas?", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 59386, "titulo": "UKMTO reports tanker incident involving military forces east of Oman's Duqm", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/ukmto-reports-tanker-incident-involving-military-forces-east-omans-duqm", "fonte_id": "middle_east_eye", "data_pub": "2026-07-18T18:42:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incidente envolvendo uma embarcação mercante e forças militares ocorreu a aproximadamente 100 milhas náuticas leste da cidade de Duqm, Omã. De acordo com o UKMTO (United Kingdom Maritime Trade Operations), o navio-tanque foi objeto de interação como parte das atividades militares em andamento na região.", "titulo_pt": "UKMTO relata incidente envolvendo embarcação mercante e forças militares a leste de Duqm, omã", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 59405, "titulo": "Diecimila persone partecipano alla parata del Pride a Bratislava", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/18/diecimila-persone-partecipano-alla-parata-del-pride-a-bratislava_e3f3e8f6-c5f2-4fe7-8b68-3ce2a567d702.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-18T18:42:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "A polícia estadual e municipal mobilizou um grande número de agentes para a parada do Orgulho LGBT+ em Bratislava. Cerca de dez mil pessoas participaram da manifestação.", "titulo_pt": "Dez mil pessoas participam da parada do orgulho em Bratislava", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 59406, "titulo": "A Giffoni il premio della Zecca dello Stato a Cecchettin, Bella Ramsey e Zerocalcare", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/18/a-giffoni-il-premio-della-zecca-dello-stato-a-cecchettin-bella-ramsey-e-zerocalcare_4866db25-3271-4cd6-b71d-afd23178e85b.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-18T18:35:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "A cerimônia de premiação em Giffoni atribuiu prêmios a Cecchettin, Bella Ramsey e Zerocalcare. O tema da Future foi 'Rendere possibile l'impossibile', que significa 'Fazer o impossível possível'.", "titulo_pt": "Em Giffoni, Zecca dello Stato premia Cecchettin, Bella Ramsey e Zerocalcare", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 59074, "titulo": "Campeão da Copa de 2010 pela Espanha pede ajuda a Trump após ter negada permissão de entrada nos EUA", "url": "https://www.bbc.com/portuguese/articles/cyvlyl9z03lo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-18T18:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Joan Capdevila, ex-jogador da seleção espanhola e campeão da Copa de 2010, pediu ajuda ao presidente dos EUA, Donald Trump, após ter seu pedido de visto negado para entrar no país.", "titulo_pt": "Ex-jogador da Espanha pede ajuda a Trump após negativa de vistos", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 58967, "titulo": "Líder supremo do Irã promete ‘lições inesquecíveis’ aos EUA após novos ataques", "url": "https://www.cartacapital.com.br/mundo/lider-supremo-do-ira-promete-licoes-inesqueciveis-aos-eua-apos-novos-ataques/", "fonte_id": "cartacapital", "data_pub": "2026-07-18T18:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Mojtaba Khamenei, filho do líder supremo do Irã, declarou que os EUA aprenderão com os recentes ataques. Ele afirmou que a assinatura de Trump não tem valor.", "titulo_pt": "Líder do Irã promete 'lições inesquecíveis' aos EUA após novos ataques", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 59215, "titulo": "Irán deja “en suspenso” la tregua y mata a dos soldados de Estados Unidos en Jordania", "url": "https://elpais.com/internacional/2026-07-18/iran-deja-en-suspenso-la-tregua-con-estados-unidos-tras-acusarle-de-matar-a-50-personas-en-tres-semanas.html", "fonte_id": "elpais_america", "data_pub": "2026-07-18T18:19:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O Irã não confirmou oficialmente uma tregua e matou dois soldados dos Estados Unidos na Jordânia. O líder supremo iraniano afirmou que chegar a acordos com Trump é sem valor após sete noites de ataques contra o país.", "titulo_pt": "Irã suspende tregua e mata dois soldados americanos em jordânia", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 59313, "titulo": "Air quality improving in northeast, while wildfire smoke hangs over midwest", "url": "https://www.npr.org/2026/07/18/nx-s1-5899009/us-canada-wildfire-smoke", "fonte_id": "npr_news", "data_pub": "2026-07-18T18:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A qualidade do ar melhorou no nordeste, mas a fumaça de incêndios florestais persiste e se move para o meio-oeste. O presidente Trump pediu uma explicação à Canadá sobre a situação da poluição pelo fumo de incêndios.", "titulo_pt": "Qualidade do ar melhora no nordeste, enquanto fumaça de incêndios paira no meio-oeste e trump pede explicações ao canadá", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}, {"id": 59314, "titulo": "2 U.S. service members killed, 1 missing after Iranian attack in Jordan", "url": "https://www.npr.org/2026/07/18/nx-s1-5899039/us-troops-killed-missing-iran-jordan", "fonte_id": "npr_news", "data_pub": "2026-07-18T18:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dois membros dos serviços militares americanos foram mortos durante ataques iranianos de mísseis balísticos e drones contra forças parceiras no Iêmen. Um militar americano está desaparecido.", "titulo_pt": "Dois soldados americanos mortos, um desaparecido após ataque iraniano no iêmen", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 59055, "titulo": "TJ-SP nega cela especial a Deolane Bezerra, ré em processo com Marcola, do PCC", "url": "https://www.infomoney.com.br/brasil/tj-sp-nega-cela-especial-a-deolane-bezerra-re-em-processo-com-marcola-do-pcc/", "fonte_id": "infomoney", "data_pub": "2026-07-18T19:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Justiça do Estado de São Paulo negou a influenciadora Deolane Bezerra uma cela especial, mesmo ela alegando ter prerrogativa de advogada para ser transferida para uma Sala de Estado-Maior. Ela está detida desde maio em Tupi Paulista e é ré em um processo relacionado ao líder do PCC, Marcola.", "titulo_pt": "TJ-SP nega cela especial a Deolane Bezerra, ré em processo com Marcola, do PCC", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 59185, "titulo": "Agro, energía y minería impulsarán una liquidación de dólares récord en 2026", "url": "https://www.lanacion.com.ar/economia/agro-energia-y-mineria-impulsaran-una-liquidacion-de-dolares-record-en-2026-nid18072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-18T19:12:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um relatório da Bolsa de Comércio de Rosario destaca que os setores agrícola, energético e minero vão impulsionar a liquidação de dólares no segundo semestre de 2026. A estimativa é de que mais divisas sejam liquidadas neste período do que no primeiro.", "titulo_pt": "Agricultura, energia e mineração devem impulsionar liquidação recorde de dólares em 2026", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 59345, "titulo": "Korean beauty products are becoming mainstream in the U.S. Why there may be even more growth ahead", "url": "https://www.cnbc.com/2026/07/18/korean-beauty-products-are-becoming-mainstream-in-the-us.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-18T19:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Morgan Stanley projeta que as vendas de produtos de beleza coreanos nos Estados Unidos podem chegar a aproximadamente 4 bilhões de dólares em 2026. Os produtos de beleza coreanos estão se tornando cada vez mais populares no mercado americano.", "titulo_pt": "Produtos de beleza coreanos estão se tornando mainstream nos EUA e pode haver ainda mais crescimento", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 59038, "titulo": "Empresas em sobrado no DF lavaram R$ 304 milhões na Farra do INSS", "url": "https://www.metropoles.com/distrito-federal/empresas-em-sobrado-no-df-lavaram-r-304-milhoes-na-farra-do-inss", "fonte_id": "metropoles", "data_pub": "2026-07-18T19:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Empresas localizadas no Recanto das Emas, sobrados, lavaram R$ 304 milhões na Farra do INSS. Estas empresas estão em nome de integrantes de ONGs envolvidas neste esquema.", "titulo_pt": "Empresas em sobrado no DF lavaram R$ 304 milhões na Farra do INSS", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 59065, "titulo": "China estimula desenvolvimento de comunidades rurais remotas unindo planejamento estatal, cooperativas e plataformas digitais", "url": "https://www.brasildefato.com.br/2026/07/18/china-estimula-desenvolvimento-de-comunidades-rurais-remotas-unindo-planejamento-estatal-cooperativas-e-plataformas-digitais/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-18T19:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em Kunyimi, na província de Yunnan, China, políticas públicas, cooperativas camponesas e plataformas digitais foram combinadas para fortalecer o desenvolvimento rural em uma aldeia habitada pela etnia Hani. Este exemplo demonstra como essas diferentes abordagens podem ser articuladas para promover o progresso nas comunidades rurais remotas.", "titulo_pt": "China estimula desenvolvimento de comunidades rurais remotos unindo planejamento estatal, cooperativas e plataformas digitais", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 59128, "titulo": "Quiniela de Córdoba: resultado del sorteo de la Matutina de hoy, sábado 18 de julio", "url": "https://www.clarin.com/loterias-y-quinielas/quiniela-cordoba-resultado-sorteo-matutina-hoy-sabado-18-julio_0_sGe16DdB3d.html", "fonte_id": "clarin", "data_pub": "2026-07-18T18:27:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O sorteio da Quiniela Matutina de Córdoba ocorreu hoje, no sábado 18 de julho. Os números ganhadores foram divulgados.", "titulo_pt": "Quiniela de Córdoba: resultado do sorteio da Matutina de hoje, sábado 18 de julho", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 59098, "titulo": "Brasil deveria ter tido defesa mais robusta contra taxas, diz especialista", "url": "https://www.cnnbrasil.com.br/economia/analise-brasil-deveria-ter-apresentado-uma-defesa-robusta-frente-tarifas/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-18T17:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um especialista em negociação internacional avaliou que o Brasil deveria ter uma defesa mais forte contra as novas tarifas impostas pelos Estados Unidos. O advogado Antonio Carlos Rodrigues do Amaral comentou sobre a posição brasileira diante dessas medidas.", "titulo_pt": "Brasil precisava de defesa mais robusta contra tarifas, diz especialista", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 58929, "titulo": "Por tarifas menores, EUA ofereceram ao Brasil propostas inegociáveis", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/por-tarifas-menores-eua-ofereceram-ao-brasil-propostas-inegociaveis.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-18T15:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As propostas iniciais dos EUA para um acordo comercial com o Brasil não causam surpresa, mas requerem uma análise cuidadosa. Essas propostas são semelhantes às firmadas recentemente com Argentina, Equador e Guatemala nos Acordos Recíprocos de Comércio.", "titulo_pt": "EUA ofereceram propostas inegociáveis ao Brasil por tarifas menores", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 58930, "titulo": "Indústria negocia cotas para barrar produtos asiáticos como remédio ao tarifaço de Trump", "url": "https://redir.f : "spacenews", "data_pub": "2026-07-18T18:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A ilha de Maurício assinou os Acordos Artemis no dia 17 de julho, se juntando à lista de 70 nações que o fizeram em menos de seis anos.", "titulo_pt": "Mauritius se torna a 70ª nação a assinar os acordos Artemis", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 59475, "titulo": "Nanoparticles could remove harmful immune molecules from blood", "url": "https://phys.org/news/2026-07-nanoparticles-immune-molecules-blood.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T17:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Partículas nanométricas podem remover moléculas imunes prejudiciais do sangue. O sistema imunológico, que defende o corpo contra infecções e lesões, pode às vezes se tornar muito ativo, produzindo excessivamente mediadores imunes, fragmentos de material genético ou proteínas que regulam respostas imunes.", "titulo_pt": "Partículas nanométricas poderiam remover moléculas imunes prejudiciais do sangue", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 59486, "titulo": "Space Force triples launch contract ceiling amid rising demand", "url": "https://spacenews.com/space-force-triples-launch-contract-ceiling-amid-rising-demand/", "fonte_id": "spacenews", "data_pub": "2026-07-18T17:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O limite máximo do contrato de lançamento Nacional de Segurança Espacial Fase 3 Lote 1 da Força Espacial foi aumentado de $5,6 bilhões para $17 bilhões. Este aumento ocorre em meio ao aumento da demanda.", "titulo_pt": "Força espacial triplica limite do contrato de lançamento de segurança nacional", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 59476, "titulo": "Butterfly experts are planting 15,000 milkweed plants along Florida roadsides to help monarchs", "url": "https://phys.org/news/2026-07-butterfly-experts-milkweed-florida-roadsides.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T17:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Expertos em borboletas estão plantando 15.000 plantas de leite-flor ao longo das estradas rurais da Flórida para ajudar as monarcas. As áreas adjacentes às vias já são indicadas como áreas de flores silvestres e estão repletas de plantas de leite-flor em plena floração.", "titulo_pt": "Peritos em borboletas estão plantando 15.000 plantas de leite-flor ao longo das estradas rurais da flórida para ajudar as monarcas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 59487, "titulo": "Pentagon awards $7.1 million to expand U.S. production of cover glass for satellites", "url": "https://spacenews.com/pentagon-awards-7-1-million-to-expand-u-s-production-of-cover-glass-for-satellites/", "fonte_id": "spacenews", "data_pub": "2026-07-18T16:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Pentágono concedeu um financiamento de $7,1 milhões à Martin Materials Solutions, uma pequena empresa que produz vidro resistente a radiação usado em painéis solares e sistemas de controle térmico de satélites. O objetivo é expandir a produção desse material nos Estados Unidos.", "titulo_pt": "Pentágono destina $7,1 milhões para ampliar produção norte-americana de vidro protetor para satélites", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 59477, "titulo": "More than 2,700 excess deaths estimated in England and Wales during May and June", "url": "https://phys.org/news/2026-07-excess-deaths-england-wales-june.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T16:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de 2.700 mortes atribuídas ao calor foram estimadas durante os recordistas meses de maio e junho de 2026 na Inglaterra e Gales, conforme um relatório rápido de análise liderado por pesquisadores da London School of Hygiene & Tropical Medicine (LSHTM), Imperial College London e do Met , "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A pesquisa, realizada pela Affinity Foundation Chair for Animals and Health da Universitat Autònoma de Barcelona (UAB) e pelo FAADA Foundation e publicada na revista Frontiers in Psychology, destaca a importância do apoio emocional que os animais oferecem para pessoas em situação vulnerável, como moradores de rua, vítimas de violência doméstica e aqueles economicamente vulneráveis. Essa análise se baseia nas experiências de 100 indivíduos em situações de vulnerabilidade social.", "titulo_pt": "Estudo ressalta a importância do apoio emocional dos pets para pessoas vulneráveis", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 59480, "titulo": "New super strong glue grips non-stick surfaces and wipes away easily", "url": "https://phys.org/news/2026-07-super-strong-surfaces-easily.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T14:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em um laboratório da Universidade de Tóquio, cientistas desenvolveram uma nova espécie de cola que é extremamente forte e altamente elástica, mas pode ser removida facilmente com um pouco de álcool.", "titulo_pt": "Novo adesivo superforte gruda em superfícies não aderentes e pode ser esfregado facilmente", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 59481, "titulo": "Half a century of sightings reveals Ireland remains a haven for endangered basking sharks", "url": "https://phys.org/news/2026-07-century-sightings-reveals-ireland-haven.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo recente indica que as águas irlandesas continuam a ser um refúgio importante sazonal para o peixe-baleia de banho, uma espécie em perigo de extinção.", "titulo_pt": "Cinquenta anos de relatos mostram que a irlanda continua sendo um refúgio importante para o peixe-baleia de banho", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 59482, "titulo": "Heat-stressed cells use nuclear stress bodies to restart RNA splicing, study finds", "url": "https://phys.org/news/2026-07-stressed-cells-nuclear-stress-bodies.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa descobriu que células sob estresse térmico usam corpos de stress nucleares para reiniciar a cispanificação RNA. As respostas celulares às condições ambientais ainda são pouco conhecidas, apesar das repetidas investigações sobre as respostas ao estresse celular.", "titulo_pt": "Células sob estresse térmico usam corpos de stress nucleares para reiniciar a cispanificação RNA", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 59441, "titulo": "Beginning with a song", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/19/2003861009", "fonte_id": "taipei_times", "data_pub": "2026-07-19T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O texto discute um início com uma música, mas não fornece detalhes adicionais sobre o conteúdo.", "titulo_pt": "Começando com uma canção", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 59443, "titulo": "Nighttime sights", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/19/2003861011", "fonte_id": "taipei_times", "data_pub": "2026-07-19T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O texto descreve vistas noturnas, mas não fornece detalhes específicos sobre o que foi visto ou onde isso ocorreu. O título 'Nighttime sights' foi traduzido para 'Vistas noturnas'.", "titulo_pt": "Vistas noturnas", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 58943, "titulo": "Aos estudantes do futuro: nós não entendemos o que acontece em 2026 também", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/colunas/ri  florestais", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 58974, "titulo": "Fumaça de incêndios no Canadá chega aos EUA e deixa Fifa em alerta para final da Copa", "url": "https://www.cartacapital.com.br/mundo/fumaca-de-incendios-no-canada-chega-aos-eua-e-deixa-fifa-em-alerta-para-final-da-copa/", "fonte_id": "cartacapital", "data_pub": "2026-07-18T14:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A fumaça de incêndios no Canadá atingiu os Estados Unidos, levando a entidades como a FIFA a estarem em alerta para o evento final da Copa. O presidente dos EUA, Donald Trump, ameaçou aumentar tarifas sobre produtos canadenses para compensar os prejuízos causados pelos incêndios.", "titulo_pt": "Fumaça de incêndios no Canadá atinge EUA e trump ameaça aumento de tarifas", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 59206, "titulo": "Air quality warnings remain in place across US as wildfire smoke continues to swathe country", "url": "https://www.theguardian.com/world/2026/jul/18/air-quality-warnings-canada-wildfires", "fonte_id": "guardian_world", "data_pub": "2026-07-18T14:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Alertas de qualidade do ar permanecem em vigor nos Estados Unidos devido às condições atmosféricas causadas por fumaça de incêndios florestais. Chuvas podem aliviar as condições na região do Meio-Ocidental e Nordeste, mas alertas perigosos devem continuar até sábado.", "titulo_pt": "Alertas de qualidade do ar permanecem em vigor nos EUA devido a fumaça de incêndios florestais", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 58615, "titulo": "Estudio del CEP: casinos online representan en Chile un 35% de los ingresos de toda la industria de juegos de azar", "url": "https://www.latercera.com/pulso/noticia/estudio-del-cep-casinos-online-representan-en-chile-un-35-de-los-ingresos-de-toda-la-industria-de-juegos-de-azar/", "fon poles", "pais": "Brasil", "classe": "B"}, {"id": 58460, "titulo": "Vendavais de até 100 km/h são favorecidos por impactos do El Niño no Brasil", "url": "https://www.cnnbrasil.com.br/nacional/brasil/vendavais-de-ate-100-km-h-sao-favorecidos-por-impactos-do-el-nino-no-brasil/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-18T08:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Vendavais de até 100 km/h estão ocorrendo no Brasil devido à passagem de frentes frias e ao transporte de umidade. Um alerta de perigo foi emitido pelo Inmet nesta sexta-feira (17).", "titulo_pt": "Vendavais de até 100 km/h são favorecidos por impactos do El Niño no Brasil", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 58402, "titulo": "A cada bebê nascido, hospital planta uma árvore nativa — e já passou de 11 mil mudas", "url": "https://exame.com/esg/a-cada-bebe-nascido-hospital-planta-uma-arvore-nativa-e-ja-passou-de-11-mil-mudas/", "fonte_id": "exame", "data_pub": "2026-07-18T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O hospital Moinhos de Vento está plantando uma árvore nativa a cada bebê nascido, totalizando mais de 11 mil mudas. A iniciativa ocupa cerca de 66 mil metros quadrados e estima capturar 1,8 mil toneladas de carbono em três anos.", "titulo_pt": "A cada bebê nascido, hospital planta uma árvore nativa — já são mais de 11 mil mudas", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 58602, "titulo": "‘It’s only going to get worse’: wildfires forcing firefighters to make impossible choices", "url": "https://www.theguardian.com/news/ng-interactive/2026/jul/18/the-impossible-choices-of-a-deadly-wildfire-season", "fonte_id": "guardian_world", "data_pub": "2026-07-18T05:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O agravamento das crises climáticas está causando incêndios mais intensos e espalhados, forçando os bombeiros a rationar recursos e decidir quais focos de fogo combatem. César Alcaraz, um oficial de bombeiros em Alicante, explica como as condições atualmente exigem que os equipes façam escolhas difíceis.", "titulo_pt": "É só piorar: incêndios obrigando bombeiros a fazer escolhas impossíveis", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 57874, "titulo": "Microplastics found in the majority of baby food products", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/18/2003860960", "fonte_id": "taipei_times", "data_pub": "2026-07-18T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo descobriu microplásticos em uma grande maioria dos produtos de alimentos infantis analisados. Os pesquisadores examinaram diversos tipos de alimentos para bebês e encontraram partículas plásticas em mais da metade das amostras.", "titulo_pt": "Microplásticos encontrados em maioria dos produtos de alimentos infantis", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 59433, "titulo": "Experts urge independence for rights body", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/19/2003861001", "fonte_id": "taipei_times", "data_pub": "2026-07-19T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Expertos estão recomendando a independência de uma entidade responsável por direitos humanos.", "titulo_pt": "Peritos recomendam independência para corpo de direitos humanos", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 59041, "titulo": "Maria da Penha é \"pedaço de papel\" que não defende mulher, diz Flávio", "url": "https://www.metropoles.com/brasil/maria-da-penha-e-pedaco-de-papel-que-nao-defende-mulher-diz-flavio", "fonte_id": "metropoles", "data_pub": "2026-07-18T18:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O pré-candidato Flávio defendeu uma abordagem mais severa para os agressores de mulheres, comparando a Lei Maria da Penha ao 'ped const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml(topico) : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml(audioKey) {
  const audio = D.audio && D.audio.sumarios && D.audio.sumarios[audioKey];
  if (!audio || !audio.arquivo) return "";
  const src = audio.arquivo + (audio.versao ? "?v=" + encodeURIComponent(audio.versao) : "");
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta" data-audio-src="${esc(src)}" data-audio-key="${esc(audioKey)}">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml("destaque")}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}
