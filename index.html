<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>
</head>

const D = {"gerado_em": "24/06/2026 11:15", "stats": {"noticias_novas": 972, "resumos_gerados": 322}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "A Polícia Federal investiga se uma sacola transportada por Mauro Caputti Mattosinho em um voo para Brasília continha R$ 350 mil. O piloto afirma ter filmado a sacola e o dinheiro seria destinado ao senador Ciro Nogueira (PP-PI).  O caso é investigado desde agosto de 2024. Paralelamente, o governo estuda atualizar o teto de faturamento do Simples Nacional para até R$ 140 mil, mas pretende restringir as mudanças ao Microempreendedor Individual (MEI). O relator Jorge Goetten defende a atualização do Simples Nacional e a desoneração fiscal.  O Ministério da Fazenda lançou um painel com dados sobre incentivos fiscais. As desonerações tributárias totalizaram R$ 339,8 bilhões e beneficiaram mais de 86 mil empresas. A procuradora-geral do Estado de São Paulo, Inês Coimbra, afirmou que o principal desafio das transações tributárias é a mudança de cultura dentro do órgão. Segundo ela, o papel da Procuradoria deixou de ser apenas litigar e fatores como economicidade e viabilidade da demanda são agora mais importantes. A decisão dos Estados Unidos de classificar o PCC e o CV como organizações terroristas tem mais apoio entre homens, evangélicos e eleitores de Jair Bolsonaro, segundo pesquisa Datafolha. A pesquisa também aponta que a decisão é menos apoiada por mulheres, católicos e eleitores do PT.", "mundo": "Keiko Fujimori foi eleita presidente do Peru com uma pequena margem de votos sobre seu rival Roberto Sánchez, após uma disputa acirrada que dividiu o país. A vitória da conservadora Fujimori marca um momento importante na política peruana.  Por outro lado, no Irã, o governo busca negociar acordos com os países do Golfo Pérsico, buscando uma reconciliação após anos de tensão. Conversas entre as partes estão previstas na Arábia Saudita, com o objetivo de reduzir as tensões regionais e promover a cooperação. A Organização Meteorológica Mundial (OMM) alertou para a persistência da onda de calor que afeta grande parte da Europa nas próximas semanas, com temperaturas recorde em junho na Espanha. Essa situação gerou debates sobre o funcionamento das escolas durante o calor extremo, especialmente na Grã-Bretanha e França, onde muitas instituições não possuem ar condicionado.  Em meio a este cenário global, os Estados Unidos aprovaram uma resolução simbólica que aumenta a pressão sobre a Casa Branca para acabar com o conflito com o Irã, demonstrando o apoio do Congresso à desescalada da situação.\n\nO presidente norte-coreano Kim Jong Un anunciou que a Coreia do Norte está equipando sua marinha com armas nucleares durante o lançamento do navio de guerra Choe Hyon. O navio, com 5 mil toneladas, foi apresentado na terça-feira. Paralelamente, o ex-presidente americano Donald Trump compartilhou um artigo nas redes sociais classificando as eleições brasileiras como o 'próximo grande teste' para a América Latina.  Em meio a tensões geopolíticas, especialistas analisam as negociações entre os Estados Unidos e o Irã, consideradas frágeis devido ao programa nuclear iraniano. O ex-embaixador dos EUA na Coreia do Sul, Harry Harris, afirmou que a segurança precisa se estender além da defesa em um mundo fragmentado, enfatizando a importância da cooperação internacional para enfrentar os desafios globais. A China busca união entre os países do BRICS para lidar com questões como a obtenção de minerais estratégicos e crises globais.  Por outro lado, o governo japonês enfrenta dificuldades na produção de mísseis, expondo vulnerabilidades nas cadeias de suprimentos industriais de defesa do país devido às restrições chinesas.", "economia": "O Japão anunciou um plano de investimento de US$ 2,3 trilhões para os próximos 14 anos, visando impulsionar o crescimento econômico do país em meio às mudanças tecnológicas e tensões geopolíticas.  Em paralelo, a China prepara-se para o maior IPO continental em mais de quatro anos, com o braço de energia renovável de um conglomerado estatal chinês buscando levantar US$ 3,6 bilhões na Bolsa de Valores de Shenzhen. O mercado financeiro global demonstra grande movimentação, com instituições financeiras priorizando a duplicata escritural e uma nova plataforma conectando investidores chineses à bolsa brasileira.  No Brasil, o governo paga a parcela do Bolsa Família aos beneficiários com NIS de final 6, enquanto aposentados do INSS receberão R$ 2,1 bilhões em atrasados da Justiça. O mercado de debêntures vive um 'boom', alcançando volume inédito, e o preço do petróleo cai para US$ 75, atingindo o menor nível desde o início da guerra na Ucrânia. A Venezuela planeja apresentar um plano para reestruturar sua dívida, considerada a maior do mundo, e a unidade suíça do HSBC está sob investigação por suspeita de envolvimento em um esquema de embezzlement.", "tecnologia": "O premiê chinês Li Qiang alertou que os governos precisam acompanhar o ritmo do progresso tecnológico para evitar consequências graves, pedindo regulamentação da inteligência artificial durante o evento conhecido como 'Davos de Verão'. Paralelamente, a Qualcomm adquiriu a empresa Modular por quase US$ 4 bilhões. A startup era uma das mais promissoras da era de IA e essa aquisição demonstra o grande investimento na área.  A China lidera o ranking TOP500 de supercomputadores com o LineShine, um sistema capaz de sustentar mais de dois exaflops no benchmark HPL padrão usando apenas CPUs. Essa é a primeira vez desde 2017 que um sistema baseado na China lidera o ranking. A SK hynix Inc. anunciou planos para levantar até 45 trilhões de won através de uma oferta de ações, visando financiar sua entrada no mercado de ações da Nasdaq nos Estados Unidos.  A empresa americana Sceye lançará em agosto uma plataforma solar com cerca de 60 metros de comprimento a 18 quilômetros acima da superfície do oceano entre os Estados Unidos e o Japão. O objetivo é fornecer internet melhor na região. Uma startup de IA que ganhou destaque por alegar vínculos com Donald Trump está lutando para sobreviver. O CEO polêmico e ex-governador do Texas anunciaram planos em 2022 para construir o maior campus de energia para data centers de IA nos Estados Unidos, mas a empresa agora enfrenta dificuldades.", "ciencia": "A premiação nacional da edição de 2025 da Olimpíada Brasileira de Matemática das Escolas Públicas (Obmep) está acontecendo no Rio de Janeiro, com a presença de autoridades como o presidente da República, o ministro da Educação e a ministra da Ciência, Tecnologia e Inovação.  684 estudantes do 6º ano do ensino fundamental até a 3ª série do ensino médio, de todo o Brasil, aguardam para receber suas medalhas de ouro. Em outra área da ciência, cientistas descobriram ossos de um dinossauro parente próximo do velociraptor. O espécime, batizado de Jian changmaensis, provavelmente era coberto de penas e viveu tanto no solo quanto nas árvores. É possível que ele tenha sido capaz de planar como um esquilo-voador para atacar presas.  Em meio a esses avanços científicos, também há desafios. Um teste clínico abandonado para insuficiência cardíaca oferece uma visão rara sobre dispositivos considerados 'revolucionários' pela FDA, mas que nunca chegaram aos pacientes. O estudo foi interrompido porque os resultados não mostraram benefícios suficientes, levantando questões sobre como garantir que as inovações médicas cheguem às pessoas que precisam.", "cultura": "A edição de 2026 da Flip receberá pela primeira vez a ativista americana Angela Davis, que participará das casas paralelas do festival, e não da programação principal. Em Paraty, entre os dias 22 e 26 de julho, o evento contará com sua presença, além de outros eventos culturais importantes como o SP Coffee Festival, que acontecerá no pavilhão da Bienal, no Parque Ibirapuera, entre sexta-feira (26) e domingo (28). O festival reúne produtores e torrefatores de todo o país, oferecendo degustações e aulas sobre café.  No Rio de Janeiro, a banda Kid Abelha se apresenta no Nubank Parque neste sábado (27), após 13 anos fora dos palcos. A banda marcou os anos 1980 e retorna aos shows com uma turnê que já passou pelo Rio de Janeiro. O grupo está em alta após o sucesso da novela 'Coração Acelerado', onde a cantora Ana Castela tem atuado,  e que pode ter uma carreira na televisão.", "sociedade": "Em um caso que ilustra a complexidade da vida moderna, uma médica veterinária foi presa em São Paulo após ser encontrada com 136 gatos de raça e 5 cães Spitz Alemães desidratados e presos em um galpão. Essa situação chocante revela as condições cruéis em que alguns animais são mantidos, evidenciando a necessidade de maior fiscalização e responsabilidade no cuidado com os animais. Paralelamente, o debate sobre a desigualdade na divisão das tarefas de cuidado familiar ganha força. Carolina, personagem de um caso abordado por um Consultório Legal, hesita em ter outro filho devido à falta de apoio para a criação das crianças. Essa realidade pode estar relacionada à crise demográfica do país e levanta questões sobre as condições atuais da criação de filhos no Brasil. Outro tema que causa polêmica é o machismo online. O movimento 'machosfera', presente na África e América Latina, propaga discursos de ódio e desprezo às mulheres através de influenciadores digitais. A BBC Brasil investiga o negócio por trás desse discurso nocivo.", "meio_ambiente": "Uma onda de calor recorde assola a Europa, com temperaturas alarmantes que levam a alertas vermelhos de calor em países como França e Grã-Bretanha. Essa situação causa preocupação e impacta diversos setores. O aumento na demanda por energia elétrica devido ao calor extremo levou o operador da rede elétrica do Reino Unido a pedir aos cidadãos que economizem energia.  As altas temperaturas também estão impactando outras áreas, com escolas fechadas em vários países europeus e recomendações de precaução emitidas pelas autoridades para proteger a saúde pública.", "direitos_humanos": "A falta de insulina e equipamentos médicos em Gaza coloca a vida de pacientes diabéticos em risco, que enfrentam uma batalha pela sobrevivência devido à escassez agravada pela guerra. Em Hong Kong, 29 pessoas foram presas por participarem de uma organização criminosa envolvida em empréstimos usurais. O grupo cobrava taxas de juros anuais de até 3000% e se passava por empresas financeiras licenciadas, obtendo informações pessoais das vítimas através de um centro de chamadas secreto. Na Coreia do Sul, o governo lançou um novo sistema de alerta móvel para proteger as vítimas de perseguição. O sistema permite que elas vejam a localização atual e a direção de movimento de um stalker suspeito usando monitor eletrônico no tornozelo.  Em Singapura, uma mulher foi condenada a quatro meses de prisão por agressão contra sua empregada doméstica após ficar irritada com o desempenho da vítima em tarefas domésticas como lavar roupa e limpar garrafas."}, "resumo_do_dia": {"politica_nacional": [{"id": 14569, "titulo": "Teto do MEI: Relator, Jorge Goetten defende atualização do Simples e desoneração", "url": "https://www.jota.info/legislativo/teto-do-mei-relator-jorge-goetten-defende-atualizacao-do-simples-e-desoneracao", "fonte_id": "jota", "data_pub": "2026-06-24T12:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O relator Jorge Goetten defende a atualização do Simples Nacional e a desoneração. O governo estuda atualizar o teto de faturamento para até R$ 140 mil, mas pretende restringir as mudanças ao MEI.", "titulo_pt": "Teto do MEI: Relator defende atualização do Simples Nacional e desoneração", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 14388, "titulo": "Piloto filmou sacola com suposto dinheiro destinado a Ciro Nogueira, diz relatório da PF; veja vídeo", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/piloto-filmou-sacola-com-suposto-dinheiro-destinado-a-ciro-nogueira-diz-relatorio-da-pf-veja-video.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal investiga se uma sacola transportada por Mauro Caputti Mattosinho em um voo para Brasília continha R$ 350 mil. O piloto afirma ter filmado a sacola e o dinheiro seria destinado ao senador Ciro Nogueira (PP-PI). O caso é investigado desde agosto de 2024.", "titulo_pt": "Piloto filmou sacola com suposto dinheiro para Ciro Nogueira, diz relatório da PF; veja vídeo", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 14390, "titulo": "STF pode atrapalhar o ressarcimento das vítimas do INSS", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/romulo-saraiva/2026/06/stf-pode-atrapalhar-o-ressarcimento-das-vitimas-do-inss.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Aposentados que foram vítimas da fraude dos descontos associativos no INSS podem enfrentar dificuldades para receber o ressarcimento. O Supremo Tribunal Federal (STF) pode usar a mesma estratégia jurídica aplicada aos poupadores dos planos econômicos, caso decida agir nesse sentido.", "titulo_pt": "STF pode dificultar ressarcimento de vítimas do INSS", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 14395, "titulo": "Reforma tributária e concessões: a urgência que o poder público está criando para si mesmo", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/mauricio-portugal-ribeiro/2026/06/reforma-tributaria-e-concessoes-a-urgencia-que-o-poder-publico-esta-criando-para-si-mesmo.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto discute a necessidade de planejamento estratégico por parte do poder público brasileiro na gestão de concessões e parcerias público-privadas, em relação à reforma tributária.  Os autores comparam a situação com os gregos Prometeu e Epimeteu, representando o planejamento antecipado versus as ações tardias.", "titulo_pt": "Reforma Tributária e Concessões: a Urgência que o Poder Público Está Criando para Si Mesmo", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 14571, "titulo": "Desonerações tributárias somam R$ 339,8 bilhões e beneficiam mais de 86 mil empresas", "url": "https://www.jota.info/tributos/desoneracoes-tributarias-somam-r-3398-bilhoes-e-beneficiam-mais-de-86-mil-empresas", "fonte_id": "jota", "data_pub": "2026-06-24T09:57:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério da Fazenda lançou um painel com dados sobre incentivos fiscais. As desonerações tributárias totalizam R$ 339,8 bilhões e beneficiaram mais de 86 mil empresas.", "titulo_pt": "Desonerações tributárias somam R$ 339,8 bilhões e beneficiam mais de 86 mil empresas", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 14572, "titulo": "Desafio da transação tributária é mudança de cultura, diz procuradora-geral do Estado de SP", "url": "https://www.jota.info/tributos/desafio-da-transacao-tributaria-e-mudanca-de-cultura-diz-procuradora-geral-do-estado-de-sp", "fonte_id": "jota", "data_pub": "2026-06-24T09:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A procuradora-geral do Estado de São Paulo, Inês Coimbra, afirmou que o principal desafio das transações tributárias é a mudança de cultura dentro do órgão. Segundo ela, o papel da Procuradoria deixou de ser apenas litigar e fatores como economicidade e viabilidade da demanda são agora mais importantes.", "titulo_pt": "Desafio da transação tributária é mudança de cultura, afirma procuradora-geral do Estado de SP", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 14573, "titulo": "A rejeição da Repercussão Geral e o (esquecido) Tema 1005 na jurisprudência do STF", "url": "https://www.jota.info/opiniao-e-analise/artigos/a-rejeicao-da-repercussao-geral-e-o-esquecido-tema-1005-na-jurisprudencia-do-stf", "fonte_id": "jota", "data_pub": "2026-06-24T08:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto discute a rejeição da Repercussão Geral e o Tema 1005 na jurisprudência do Supremo Tribunal Federal (STF).  A crítica central é a substituição do ônus argumentativo por um silêncio decisório, considerado incompatível com a coerência exigida pelo sistema de precedentes.", "titulo_pt": "A Rejeição da Repercussão Geral e o (Esquecido) Tema 1005 na Jurisprudência do STF", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 14575, "titulo": "Conectando o Brasil ao futuro: os próximos cinco anos da Lei do Gás", "url": "https://www.jota.info/opiniao-e-analise/artigos/conectando-o-brasil-ao-futuro-os-proximos-cinco-anos-da-lei-do-gas", "fonte_id": "jota", "data_pub": "2026-06-24T08:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A lei do gás visa criar um mercado competitivo e eficiente para garantir crescimento econômico, segurança no fornecimento de gás e redução de emissões.  Os próximos cinco anos serão cruciais para a implementação e desenvolvimento dessa lei.", "titulo_pt": "Conectando o Brasil ao futuro: os próximos cinco anos da Lei do Gás", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 14576, "titulo": "Decreto 12.975 inaugura nova fase da responsabilização no Marco Civil da Internet", "url": "https://www.jota.info/opiniao-e-analise/artigos/decreto-12-975-inaugura-nova-fase-da-responsabilizacao-no-marco-civil-da-internet", "fonte_id": "jota", "data_pub": "2026-06-24T08:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Decreto 12.975 estabelece uma mudança significativa na forma como o Estado considera a atuação das plataformas digitais. A norma visa fortalecer a responsabilização dessas plataformas por conteúdos ilegais e abusivos publicados em seus espaços.", "titulo_pt": "Decreto 12.975 inicia nova fase de responsabilização no Marco Civil da Internet", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 14397, "titulo": "Podcast explica operação contra o Digimais e analisa semelhanças com caso Master", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/podcasts/2026/06/podcast-explica-operacao-contra-o-digimais-e-analisa-semelhancas-com-caso-master.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal cumpriu mandados na terça-feira (23) contra diretores do banco Digimais. O banco é controlado pelo bispo Edir Macedo, fundador da Igreja Universal do Reino de Deus e dono da RecordTV.  Um podcast está analisando a operação e comparando-a com o caso Master.", "titulo_pt": "Podcast explica operação contra o Digimais e analisa semelhanças com caso Master", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 14579, "titulo": "Desconsideração da personalidade jurídica e o Tema 1.232 do STF", "url": "https://www.jota.info/opiniao-e-analise/artigos/desconsideracao-da-personalidade-juridica-e-o-tema-1-232-do-stf", "fonte_id": "jota", "data_pub": "2026-06-24T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto discute a interpretação correta do item 2 do Tema 1.232 de repercussão geral do Supremo Tribunal Federal.  A análise se concentra na desconsideração da personalidade jurídica em casos específicos.", "titulo_pt": "Desconsideração da personalidade jurídica e o Tema 1.232 do STF", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 14398, "titulo": "Entenda em 4 pontos as investigações sobre o banco de Edir Macedo", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/entenda-em-4-pontos-as-investigacoes-sobre-o-banco-de-edir-macedo.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T07:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal cumpriu mandados de busca e apreensão contra diretores, conselheiros e empresas ligadas ao banco Digimais. A Justiça Federal em São Paulo autorizou o bloqueio de bens de até R$ 670 milhões e a quebra de sigilo bancário e fiscal dos alvos.", "titulo_pt": "Entenda em 4 pontos as investigações sobre o banco de Edir Macedo", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 14358, "titulo": "Datafolha: Homens, evangélicos e eleitores de Bolsonaro concordam mais com decisão dos EUA sobre facções", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/datafolha-homens-evangelicos-e-eleitores-de-bolsonaro-concordam-mais-com-decisao-dos-eua-sobre-faccoes.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-24T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A pesquisa Datafolha indica que a decisão dos Estados Unidos de classificar o PCC e o CV como organizações terroristas tem mais apoio entre homens, evangélicos e eleitores de Jair Bolsonaro. A pesquisa também aponta que a decisão é menos apoiada por mulheres, católicos e eleitores do PT.", "titulo_pt": "Datafolha: Homens, evangélicos e eleitores de Bolsonaro concordam mais com decisão dos EUA sobre facções", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 14404, "titulo": "O banco de Edir Macedo no templo da perdição que junta finança, crime e política no Brasil", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/viniciustorres/2026/06/o-banco-de-edir-macedo-no-templo-da-perdicao-que-junta-financa-crime-e-politica-no-brasil.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T00:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O texto afirma que há corrupção financeira no Brasil que se estende do crime organizado à política.  Ele menciona o uso de instituições financeiras por gangues, fintechs e fundos para lavagem de dinheiro com apoio político. O autor também cita a empresa Americanas como exemplo de problemas contábeis.", "titulo_pt": "O banco de Edir Macedo no templo da perdição que junta finanças, crime e política no Brasil", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}], "politica_nacional__eventos": [], "mundo": [{"id": 14386, "titulo": "Venezuela deve anunciar dívidas que somam US$ 240 bilhões", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/venezuela-deve-anunciar-dividas-que-somam-us-240-bilhoes.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T12:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Venezuela vai revelar dívidas no valor de US$ 240 bilhões, um total maior do que o estimado anteriormente. O anúncio ocorre durante a reestruturação soberana da Venezuela após o governo dos Estados Unidos derrubar Nicolás Maduro.", "titulo_pt": "Venezuela deve anunciar dívidas que somam US$ 240 bilhões", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 15061, "titulo": "Keiko Fujimori: Peru’s biggest political loser poised to win election", "url": "https://www.japantimes.co.jp/news/2026/06/24/world/fujimori-peru-election/", "fonte_id": "japan_times", "data_pub": "2026-06-24T12:44:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Com quase todos os votos contados, Keiko Fujimori obteve 50,12% dos votos, uma vantagem de pouco mais de 43 mil sobre seu rival de esquerda Roberto Sanchez, segundo as autoridades eleitorais.", "titulo_pt": "Keiko Fujimori, a maior derrotada política do Peru, está prestes a vencer as eleições", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 15001, "titulo": "Nato, Rutte ha sottolineato come accordi con Usa siano stati rispettati", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/24/nato-rutte-ha-sottolineato-come-accordi-con-usa-siano-stati-rispettati_f19168c6-1d18-4565-911f-71528f7efe96.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-24T12:39:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O primeiro-ministro holandês, Mark Rutte, afirmou durante uma reunião da NATO que os acordos firmados com os Estados Unidos foram cumpridos.  Rutte destacou a importância da cooperação entre os aliados durante a reunião.", "titulo_pt": "NATO, Rutte destaca que acordos com EUA foram respeitados", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 14804, "titulo": "As Ebola cases surge above 1,000, experts say outbreak could be worst ever", "url": "https://www.washingtonpost.com/world/2026/06/24/ebola-outbreak-could-be-worst-ever-cases-surge-past-1000-congo/", "fonte_id": "washington_post_world", "data_pub": "2026-06-24T12:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O número de casos de Ebola aumentou para mais de 1.000. Especialistas afirmam que a falta de rastreamento de contatos e a recusa de muitos moradores em evitar contato com os corpos dos entes queridos mortos por causa do vírus Ebola estão acelerando a epidemia.", "titulo_pt": "Casos de Ebola ultrapassam mil, especialistas dizem que surto pode ser o pior já registrado", "veiculo": "Washington Post - World", "pais": "EUA", "classe": "A"}, {"id": 15002, "titulo": "Nastri, La Grazia di Sorrentino sbanca con otto premi", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/24/nastri-la-grazia-di-sorrentino-sbanca-con-otto-premi_b552208b-b6da-4caf-a0c4-01280e7d0749.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-24T12:33:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O filme 'A Graça' de Paolo Sorrentino ganhou oito prêmios no Festival do Cinema Italiano Nastri d'Argento. Entre os premiados estão os atores  Ferzetti, Marigliano, Servillo e Mastandrea.", "titulo_pt": "Nastri, a Graça de Sorrentino vence com oito prêmios", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 14352, "titulo": "Trump compartilha artigo que chama eleições brasileiras de 'grande teste' na América Latina", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/trump-compartilha-artigo-que-chama-eleicoes-brasileiras-de-grande-teste-na-america-latina.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-24T12:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Donald Trump compartilhou um artigo nas redes sociais nesta terça-feira (23) que classifica as eleições brasileiras como o 'próximo grande teste' para a América Latina. O artigo foi publicado em 06/24/2026 às 09h32.", "titulo_pt": "Trump compartilha artigo que chama eleições brasileiras de 'grande teste' na América Latina", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 14619, "titulo": "La Organización Meteorológica Mundial prevé que el episodio de calor continúe en gran parte de Europa dos semanas más", "url": "https://elpais.com/clima-y-medio-ambiente/2026-06-24/la-ola-de-calor-deja-dos-fallecidos-el-pais-vasco-y-andalucia.html", "fonte_id": "elpais_america", "data_pub": "2026-06-24T12:32:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Organização Meteorológica Mundial (OMM) prevê que a onda de calor continuará em grande parte da Europa nas próximas semanas.  O calor está quebrando recordes de temperaturas diárias mais altas em junho na Espanha.", "titulo_pt": "Organização Meteorológica Mundial prevê que onda de calor continue na maior parte da Europa por semanas", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 14833, "titulo": "UN nuclear chief says inspectors will visit Iran sites as part of war deal", "url": "https://www.bbc.co.uk/news/articles/cpd395zv81vo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-24T12:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Rafael Grossi, chefe da Agência Internacional de Energia Atômica (AIEA), afirmou que a agência está trabalhando nos detalhes para visitas a locais no Irã. Um ministro iraniano disse que esse tipo de acesso só faria parte de um acordo final com os EUA.", "titulo_pt": "Chefe da ONU sobre núcleo diz que inspetores visitarão sites do Irã como parte do acordo de guerra", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 14708, "titulo": "Extreme Heat Across Europe Creates Divide Over Leaving Schools Open", "url": "https://www.nytimes.com/2026/06/24/world/europe/heat-wave-schools-open-closed-france-uk.html", "fonte_id": "nyt_world", "data_pub": "2026-06-24T12:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Poucas escolas na Grã-Bretanha ou França possuem ar condicionado para manter as crianças frescas nas temperaturas elevadas, levando pais, professores e autoridades a divergir sobre o que fazer. A falta de ar condicionado em muitas escolas europeias durante o calor extremo gera debate.", "titulo_pt": "Crise de calor na Europa causa divisão sobre se manter escolas abertas", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 14922, "titulo": "Trump claims Iran has assured U.S. there won't be tolls on the Strait of Hormuz", "url": "https://www.cnbc.com/2026/06/24/trump-claims-iran-has-assured-us-there-wont-be-tolls-on-the-strait-of-hormuz.html", "fonte_id": "cnbc_international", "data_pub": "2026-06-24T12:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente Donald Trump afirmou que o Irã assegurou aos Estados Unidos que não haverá pedágios, custos de seguro ou quaisquer outras taxas para navios que desejarem passar pelo Estreito de Hormuz.  Trump fez essa afirmação sem fornecer detalhes sobre como a garantia foi dada ou por quem.", "titulo_pt": "Trump afirma que Irã garantiu aos EUA que não haverá pedágios no Estreito de Ormuz", "veiculo": "CNBC International", "pais": "EUA", "classe": "B"}, {"id": 14944, "titulo": "Trump offers Iran an economic lifeline — with strings", "url": "https://www.dw.com/en/trump-offers-iran-an-economic-lifeline-with-strings/a-77621800?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-24T12:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Irã viu um rápido aumento nas exportações de petróleo após o acordo entre os EUA e o Irã conceder isenções imediatas às sanções americanas. O alívio dos ativos congelados e um fundo de reconstrução de US$ 300 bilhões agora dependem do Teerã cumprir condições-chave.", "titulo_pt": "Trump oferece socorro econômico ao Irã — com condições", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 15003, "titulo": "'In Arabia Saudita previsti colloqui Iran-Paesi del Golfo per riconciliazione'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/24/in-arabia-saudita-previsti-colloqui-iran-paesi-del-golfo-per-riconciliazione_18c55d04-4ee7-47bd-921f-655222ca3597.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-24T12:21:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "Fontes diplomáticas afirmam que conversas entre o Irã e os países do Golfo Pérsico estão previstas na Arábia Saudita. O objetivo das negociações é a busca por uma reconciliação entre as partes.", "titulo_pt": "'Conversas entre Irã e países do Golfo previstas na Arábia Saudita para reconciliação'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 15004, "titulo": "La mamma delle sorelle ritrovate, 'loro vogliono stare con me'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/24/la-mamma-delle-sorelle-ritrovate-loro-vogliono-stare-con-me_6f1c0921-329a-405c-a1e9-f0da299a3c82.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-24T12:14:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "A mãe das irmãs encontradas recentemente afirmou à garantidora dos detenutos que deseja reencontrá-las o mais rápido possível. Ela também disse que as irmãs querem ficar com ela.", "titulo_pt": "A mãe das irmãs encontradas diz que elas querem ficar com ela", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 14406, "titulo": "Após longa apuração, Keiko Fujimori é eleita presidente no Peru", "url": "https://agenciabrasil.ebc.com.br/internacional/noticia/2026-06/apos-longa-apuracao-keiko-fujimori-e-eleita-presidente-no-peru", "fonte_id": "agencia_brasil_intl", "data_pub": "2026-06-24T12:09:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Keiko Fujimori, do partido Fuerza Popular, venceu as eleições presidenciais no Peru com 50,11% dos votos.  Roberto Sánchez ficou em segundo lugar com 49,88%. O Escritório Nacional de Processos Eleitorais (ONPE) confirmou a vitória após a apuração de 99,9% das urnas.", "titulo_pt": "Keiko Fujimori eleita presidente do Peru após apuração longa", "veiculo": "Agência Brasil - Internacional", "pais": "Brasil", "classe": "A"}, {"id": 14496, "titulo": "Análise: Programa nuclear desafia acordo duradouro entre EUA-Irã", "url": "https://www.cnnbrasil.com.br/internacional/analise-programa-nuclear-desafia-acordo-duradouro-entre-eua-ira/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-24T12:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Especialistas analisam as tensões nas negociações entre os Estados Unidos e o Irã. O memorando de entendimento assinado na semana passada é visto como frágil devido ao programa nuclear iraniano.", "titulo_pt": "Análise: Programa nuclear desafia acordo duradouro entre EUA e Irã", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 15144, "titulo": "Security must extend beyond defense in fragmented world: ex-U.S. ambassador", "url": "https://en.yna.co.kr/view/AEN20260624011000315", "fonte_id": "yonhap_news", "data_pub": "2026-06-24T11:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O ex-embaixador dos Estados Unidos na Coreia do Sul, Harry Harris, afirmou que a segurança precisa se estender além da defesa em um mundo fragmentado. Ele fez esse comentário durante uma conferência em Jeju, Coreia do Sul, em 24 de junho. Harris enfatizou a importância da cooperação internacional para enfrentar os desafios globais.", "titulo_pt": "Segurança deve ir além da defesa em mundo fragmentado: ex-embaixador dos EUA", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 15062, "titulo": "Japan unveils $2.3 trillion investment plan for next 14 years", "url": "https://www.japantimes.co.jp/business/2026/06/24/economy/investment-plan-unveiled-14-years/", "fonte_id": "japan_times", "data_pub": "2026-06-24T12:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Japão lançou um plano de investimento de US$ 2,3 trilhões para os próximos 14 anos. O plano visa impulsionar o crescimento econômico do país em meio às mudanças tecnológicas e tensões geopolíticas. A ministra da Economia, Koichi Hagiuda, afirmou que o plano é crucial para garantir a competitividade do Japão no cenário global.", "titulo_pt": "Japão revela plano de investimento de US$ 2,3 trilhões para os próximos 14 anos", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 14387, "titulo": "Empresa chinesa de energia renovável se prepara para IPO de US$ 3,6 bilhões", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/empresa-chinesa-de-energia-renovavel-se-prepara-para-ipo-de-us-36-bilhoes.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T12:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O braço de energia renovável de um conglomerado estatal chinês vai abrir capital na Bolsa de Valores de Shenzhen.  Será o maior IPO da China continental em mais de quatro anos. A empresa pretende levantar US$ 3,6 bilhões.", "titulo_pt": "Empresa chinesa de energia renovável se prepara para IPO de US$ 3,6 bilhões", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 14570, "titulo": "Instituições financeiras encaram duplicata escritural como prioridade estratégica, diz pesquisa", "url": "https://www.jota.info/tributos-e-empresas/mercado/instituicoes-financeiras-encaram-duplicata-escritural-como-prioridade-estrategica-diz-pesquisa", "fonte_id": "jota", "data_pub": "2026-06-24T11:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa ouviu 32 participantes do mercado financeiro, incluindo bancos e empresas. Os resultados indicam que as instituições financeiras consideram a duplicata escritural uma prioridade estratégica.", "titulo_pt": "Instituições financeiras veem duplicata escritural como prioridade estratégica, diz pesquisa", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 14408, "titulo": "Nova plataforma aproxima investidores chineses da bolsa brasileira", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/nova-plataforma-aproxima-investidores-chineses-da-bolsa-brasileira", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-24T11:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil lançou uma plataforma que disponibiliza dados do mercado de capitais brasileiro na Wind Financial Terminal, principal ferramenta financeira da China. A iniciativa conecta a B3 à plataforma usada por investidores chineses, criando uma ponte direta entre ativos brasileiros e investidores asiáticos.", "titulo_pt": "Nova plataforma aproxima investidores chineses da bolsa brasileira", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 14391, "titulo": "CEO da Xbox defende 'reset' da marca e estúdios se preparam para cortes", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/tec/2026/06/ceo-da-xbox-defende-reset-da-marca-e-estudios-se-preparam-para-cortes.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O CEO da Xbox, Phil Spencer, defendeu uma reestruturação da marca. Estúdios da empresa estão se preparando para cortes em seus quadros de funcionários.", "titulo_pt": "CEO da Xbox defende 'reset' da marca e estúdios se preparam para cortes", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 14392, "titulo": "Acionistas liderados pela família Hering negociam saída da marca da Azzas", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/acionistas-liderados-pela-familia-hering-negociam-saida-da-marca-da-azzas.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um grupo de acionistas liderados pela família Hering busca negociar a saída da marca Hering da empresa Azzas 2154. A decisão se deve à relação conflituosa entre os principais sócios do Azzas e ao desempenho financeiro da rede, que não apresenta bons resultados.", "titulo_pt": "Acionistas liderados pela família Hering negociam saída da marca da Azzas", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 14393, "titulo": "Demanda dos americanos por gasolina pode não se recuperar após guerra com o Irã", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/demanda-dos-americanos-por-gasolina-pode-nao-se-recuperar-apos-guerra-com-o-ira.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um artigo da Folha de Mercado discute a possibilidade de a demanda americana por gasolina não se recuperar após uma guerra hipotética com o Irã. O texto apresenta Judy Vassallo, uma professora aposentada que reduziu seu uso de carro devido ao aumento do preço da gasolina.", "titulo_pt": "Demanda dos americanos por gasolina pode não se recuperar após guerra com o Irã", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 14409, "titulo": "Caixa paga Bolsa Família a beneficiários com NIS de final 6", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/caixa-paga-bolsa-familia-beneficiarios-com-nis-de-final-6", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-24T10:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Caixa Econômica Federal pagará a parcela de junho do Bolsa Família nesta quarta-feira (24) aos beneficiários com Número de Inscrição Social (NIS) de final 6. O valor mínimo é de R$ 600, mas o adicional eleva o valor médio para R$ 677,66.", "titulo_pt": "Caixa paga Bolsa Família a beneficiários com NIS final 6", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 14394, "titulo": "Aposentados do INSS vão receber R$ 2,1 bilhões em atrasados da Justiça; veja quem tem direito", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/aposentados-do-inss-vao-receber-r-21-bilhoes-em-atrasados-da-justica-veja-quem-tem-direito.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-24T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Aposentados e pensionistas do INSS que venceram processos na Justiça receberão R$ 2,1 bilhões em pagamentos devidos. O Conselho da Justiça Federal liberou os valores no início desta semana.", "titulo_pt": "Aposentados do INSS recebem R$ 2,1 bilhões em atrasados da Justiça", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 14508, "titulo": "Mercado de debêntures vive 'boom' e alcança volume inédito", "url": "https://exame.com/invest/mercados/mercado-de-debentures-vive-boom-e-alcanca-volume-inedito/", "fonte_id": "exame", "data_pub": "2026-06-24T09:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O mercado de debêntures está experimentando um crescimento significativo. O volume acumulado até os cinco primeiros meses do ano atingiu R$ 179,4 bilhões, o maior valor já registrado para esse período.", "titulo_pt": "Mercado de Debêntures Vive Boom e Alcança Volume Inédita", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 14859, "titulo": "French-German tank maker KNDS announces IPO launch within weeks", "url": "https://www.lemonde.fr/en/international/article/2026/06/24/french-german-tank-maker-knds-announces-ipo-launch-within-weeks_6754826_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-24T09:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "França e Alemanha chegaram a um acordo para governar conjuntamente o fabricante de tanques Leopard e Leclerc, entre outros sistemas terrestres. Ambos os países terão participação igualitária na empresa. O lançamento da oferta pública inicial (IPO) está previsto para acontecer em algumas semanas.", "titulo_pt": "Fabricante francês-alemão de tanques KNDS anuncia lançamento da oferta pública inicial dentro de semanas", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 14578, "titulo": "Promessa de abertura do transporte rodoviário esbarra em incertezas regulatórias", "url": "https://www.jota.info/opiniao-e-analise/artigos/promessa-de-abertura-do-transporte-rodoviario-esbarra-em-incertezas-regulatorias", "fonte_id": "jota", "data_pub": "2026-06-24T08:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O setor de transporte rodoviário enfrenta incertezas regulatórias que impedem a concretização da promessa de abertura.  A falta de estabilidade regulamentar impede que o potencial de expansão do setor se transforme em resultados.", "titulo_pt": "Promessa de abertura do transporte rodoviário encontra obstáculos regulatórios", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 14580, "titulo": "As novas diretrizes europeias de Better Regulation", "url": "https://www.jota.info/opiniao-e-analise/colunas/defensor-legis/as-novas-diretrizes-europeias-de-better-regulation", "fonte_id": "jota", "data_pub": "2026-06-24T08:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A União Europeia lançou novas diretrizes para regulamentação, com foco na qualidade das normas e na simplicidade e efetividade dos processos regulatórios. O objetivo é garantir que as regras sejam claras, eficientes e contribuam para o bem-estar dos cidadãos e empresas.", "titulo_pt": "Novas Diretrizes Europeias de Regulamentação Aprimorada", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 14528, "titulo": "Petróleo cai a US$ 75 e atinge menor nível desde o início da guerra", "url": "https://exame.com/invest/mercados/barril-do-petroleo-cai-para-us-75-menor-nivel-desde-o-comeco-da-guerra/", "fonte_id": "exame", "data_pub": "2026-06-24T07:49:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O preço do petróleo caiu para US$ 75, atingindo o menor nível desde o início da guerra na Ucrânia. A diminuição se deve a preocupações reduzidas sobre o Estreito de Ormuz e a solicitação de investigação sobre preços em petroleiras por Donald Trump.", "titulo_pt": "Petróleo cai para US$ 75 e marca menor nível desde o início da guerra", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 14463, "titulo": "CDBs do Digimais explodiram 1.130% em oito anos e chegam a R$ 8,5 bilhões", "url": "https://www.metropoles.com/colunas/tacio-lorran/cdbs-do-digimais-explodiram-1-130-em-oito-anos-e-chegam-a-r-85-bilhoes", "fonte_id": "metropoles", "data_pub": "2026-06-24T05:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os Certificados de Depósito Bancário (CDBs) do banco Digimais registraram um aumento de 1.130% em oito anos, atingindo o valor de R$ 8,5 bilhões. A Polícia Federal investiga a gestão do banco, que pertence ao bispo Edir Macedo, da Igreja Universal do Reino de Deus, suspeitando de fraudes.", "titulo_pt": "CDBs do Digimais Explodiram 1.130% em Oito Anos e Chegam a R$ 8,5 Bilhões", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 14912, "titulo": "Venezuela to reveal $240bn debt pile in world’s largest restructuring", "url": "https://www.ft.com/content/b7f25ca2-827c-40f9-ab1a-57067d8ec90d", "fonte_id": "financial_times", "data_pub": "2026-06-24T04:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Venezuela irá revelar que possui uma dívida muito maior do que o esperado após a queda de Nicolás Maduro. O país planeja apresentar um plano para reestruturar sua dívida, que é considerada a maior do mundo.", "titulo_pt": "Venezuela revelará dívida de US$ 240 bilhões na maior reestruturação do mundo", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 15195, "titulo": "Qualcomm Buys Buzzy Chip Startup Modular for Nearly $4 Billion", "url": "https://www.wired.com/story/qualcomm-buys-buzzy-chip-startup-modular-for-nearly-dollar4-billion/", "fonte_id": "wired", "data_pub": "2026-06-24T12:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Modular, uma das startups de software de chips mais promissoras da era de IA, será vendida pela quantia de vários bilhões de dólares. A Qualcomm adquiriu a empresa por quase US$ 4 bilhões.", "titulo_pt": "Qualcomm Compra Startup Modular por Quase US$ 4 Bi", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 15196, "titulo": "My Family Loves Board Games—Here Are the 9 I'd Buy On Sale During Prime Day", "url": "https://www.wired.com/story/amazon-prime-day-board-game-deals-june-2026/", "fonte_id": "wired", "data_pub": "2026-06-24T12:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O WIRED recomenda jogos de tabuleiro para compras durante o Dia da Prime. A lista inclui nove jogos que são recomendados para diversão em família durante o verão. Os jogos podem ser encontrados com desconto durante a promoção.", "titulo_pt": "Minha Família Ama Jogos de Tabuleiro - Aqui estão os 9 que compraria em Promoção no Dia da Prime", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 15197, "titulo": "107 Prime Day Deals on Gear We Stand By, Up To 52% Off (2026)", "url": "https://www.wired.com/story/amazon-prime-day-absolute-best-deals-06-24-2026/", "fonte_id": "wired", "data_pub": "2026-06-24T12:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Wired selecionou as melhores ofertas do Dia Prime da Amazon em equipamentos que valem a pena comprar. As ofertas cobrem uma variedade de produtos, com descontos de até 52%.  A lista está disponível para consulta no site do Wired.", "titulo_pt": "107 Ofertas do Dia Prime em Equipamentos Recomendados, com Descontos de até 52% (2026)", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 14448, "titulo": "Mundo corre risco de ‘perder o controle’ da IA, alerta China em apelo por regulamentação", "url": "https://veja.abril.com.br/mundo/mundo-corre-risco-de-perder-o-controle-da-ia-alerta-china-em-apelo-por-regulamentacao/", "fonte_id": "veja", "data_pub": "2026-06-24T12:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O premiê chinês Li Qiang alertou que governos precisam acompanhar o ritmo do progresso tecnológico para evitar consequências graves.  Li fez o alerta no evento conhecido como 'Davos de Verão'. O líder chinês pediu regulamentação da inteligência artificial.", "titulo_pt": "Mundo corre risco de 'perder o controle' da IA, alerta China em apelo por regulamentação", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 15135, "titulo": "The Download: introducing the Engineering issue", "url": "https://www.technologyreview.com/2026/06/24/1139658/the-download-introducing-engineering-issue/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-24T12:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Esta é a edição de hoje do The Download, boletim informativo semanal que fornece uma dose diária do que está acontecendo no mundo da tecnologia. O novo número foca na engenharia e como ela pode ser usada para melhorar o mundo através da inteligência humana.", "titulo_pt": "O Download: Apresentando a edição sobre Engenharia", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 15136, "titulo": "Stripe, Anthropic and OpenAI are backing an effort to stop respiratory infections", "url": "https://www.technologyreview.com/2026/06/24/1139621/stripe-anthropic-and-openai-are-backing-an-effort-to-stop-respiratory-infections/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-24T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa de pagamentos Stripe, fundada pelos irmãos Patrick e John Collison, anunciou que financiará um novo esforço para combater infecções respiratórias. A iniciativa conta com o apoio da Anthropic e da OpenAI. O objetivo é desenvolver novas tecnologias para prevenir e tratar essas infecções.", "titulo_pt": "Stripe, Anthropic e OpenAI apoiam iniciativa para combater infecções respiratórias", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 15198, "titulo": "With a Range Bump, the $25K Slate Is the Most Affordable EV Truck in the US", "url": "https://www.wired.com/story/slate-ev-truck-price-specs-release-date/", "fonte_id": "wired", "data_pub": "2026-06-24T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O novo modelo elétrico da Slate, apoiado por Bezos, foi lançado com especificações melhores do que o esperado. A picape sem muitos recursos visa competir com a Ford Maverick e oferecer uma opção acessível para os consumidores que desejam fazer suas próprias manutenções.", "titulo_pt": "Com aumento de alcance, o Slate de US$ 25 mil é a picape elétrica mais acessível dos EUA", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 15137, "titulo": "The emergence of the web data infrastructure layer for AI", "url": "https://www.technologyreview.com/2026/06/24/1139202/the-emergence-of-the-web-data-infrastructure-layer-for-ai/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-24T11:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A inteligência artificial (IA) está em expansão, com novos casos de uso surgindo diariamente. Para aproveitar o potencial da tecnologia, as empresas precisam de dados em grande escala. Muitas vezes, as informações relevantes são bloqueadas ou não estruturadas, o que limita seu uso por modelos de IA.", "titulo_pt": "O surgimento da camada de infraestrutura de dados da web para IA", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 15199, "titulo": "We're Tracking Prime Day Live To Find Sales Worth Shopping in 2026", "url": "https://www.wired.com/live/amazon-prime-day-live-tracker-july-24-2026/", "fonte_id": "wired", "data_pub": "2026-06-24T11:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Prime Day ainda está acontecendo e nosso blog ao vivo continua.  Vamos trazer ofertas, tendências e comentários durante o segundo dia da venda de verão anual da Amazon.", "titulo_pt": "Estamos Acompanhando o Prime Day ao Vivo para Encontrar Ofertas Válidas em 2026", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 15200, "titulo": "18 Walmart Deals We Like Better Than That Other Sale Happening Right Now", "url": "https://www.wired.com/story/walmart-deals-apd-06-24-2026/", "fonte_id": "wired", "data_pub": "2026-06-24T11:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo lista 18 ofertas de produtos eletrônicos na Walmart que são consideradas melhores do que as promoções da Amazon durante o Prime Day.  A publicação destaca os melhores preços em gadgets disponíveis atualmente na loja.", "titulo_pt": "18 Ofertas da Walmart Que São Melhores do Que a Outra Venda Happening Agora", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 15201, "titulo": "Form Smart Swim 2 LT Goggles Include Innovative Form Correction", "url": "https://www.wired.com/review/form-smart-swim-2-lt-goggles/", "fonte_id": "wired", "data_pub": "2026-06-24T11:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os óculos Form Smart Swim 2 LT possuem uma tela excelente, rastreamento métrico sólido e um recurso 'SwimStraight' para águas abertas. Mas a verdadeira tecnologia inteligente requer uma assinatura.", "titulo_pt": "Óculos Form Smart Swim 2 LT Incluem Correção de Forma Inovadora", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 15064, "titulo": "Shizuoka governor to approve maglev line construction", "url": "https://www.japantimes.co.jp/news/2026/06/24/japan/shizuoka-governor-maglev-construction/", "fonte_id": "japan_times", "data_pub": "2026-06-24T10:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governador de Shizuoka, Yasutomo Suzuki, planeja anunciar a aprovação da construção da linha maglev durante uma reunião da assembleia prefectural em 7 de julho. A decisão será tomada na reunião.", "titulo_pt": "Governador de Shizuoka aprovará construção da linha maglev", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 15204, "titulo": "Best Prime Day Action Cameras Deals I've Found (2026): GoPro, Insta360, DJI", "url": "https://www.wired.com/story/prime-day-camera-deals-06-24-2026/", "fonte_id": "wired", "data_pub": "2026-06-24T10:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Câmeras de ação são ideais para registrar aventuras, vlogs e mais. Aproveite as excelentes ofertas do Prime Day.  O artigo lista promoções das marcas GoPro, Insta360 e DJI.", "titulo_pt": "Melhores ofertas de câmeras de ação no Prime Day (2026): GoPro, Insta360, DJI", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 15205, "titulo": "London Climate Action Week Foiled by Extreme Heat", "url": "https://www.wired.com/story/london-climate-action-week-foiled-by-climate-change/", "fonte_id": "wired", "data_pub": "2026-06-24T10:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Com o calor recorde que afeta a Europa, os organizadores estão transferindo eventos para online. Essa medida visa evitar expor as pessoas a temperaturas perigosamente altas.", "titulo_pt": "Semana de Ação Climática de Londres prejudicada pelo calor extremo", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 15305, "titulo": "The memories of others", "url": "https://aeon.co/videos/a-japanese-photographers-striking-perceptive-images-of-the-troubles", "fonte_id": "aeon", "data_pub": "2026-06-24T10:01:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Este vídeo da Aeon explora a história de um fotógrafo de guerra japonês que se tornou um dos relatores mais perspicazes sobre os conflitos na Irlanda do Norte. O fotógrafo documentou o conflito durante décadas, capturando momentos cruciais e oferecendo uma visão única sobre as complexidades da situação.", "titulo_pt": "As Memórias dos Outros", "veiculo": "Aeon Magazine", "pais": "Reino Unido", "classe": "A"}, {"id": 14805, "titulo": "China and the West are taking opposite paths on EV battery recycling", "url": "https://restofworld.org/2026/ev-battery-recycling-china-us/?utm_source=rss&utm_medium=rss&utm_campaign=feeds", "fonte_id": "rest_of_world", "data_pub": "2026-06-24T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A China possui 85% da capacidade mundial de reciclagem de baterias de veículos elétricos e exige o processamento de baterias antigas. Os Estados Unidos, por outro lado, propõem usar essas baterias para auxiliar a rede elétrica antes da reciclagem.", "titulo_pt": "China e Ocidente seguem caminhos distintos na reciclagem de baterias de veículos elétricos", "veiculo": "Rest of World", "pais": "EUA", "classe": "A"}], "tecnologia__eventos": [], "ciencia": [{"id": 15253, "titulo": "Vantor selects BAE Systems to build next-generation imaging satellites", "url": "https://spacenews.com/vantor-selects-bae-systems-to-build-next-generation-imaging-satellites/", "fonte_id": "spacenews", "data_pub": "2026-06-24T12:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Vantor selecionou a BAE Systems para construir sua próxima geração de satélites de imagem de alta resolução. Esta escolha reunirá a Vantor com o antigo negócio da Ball Aerospace que ajudou a desenvolver o DigitalGlobe.", "titulo_pt": "Vantor escolhe a BAE Systems para construir satélites de imagem de nova geração", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 15235, "titulo": "STAT+: Wagering on FDA changes, Regenxbio will submit Duchenne gene therapy for approval", "url": "https://www.statnews.com/2026/06/24/regenxbio-duchenne-gene-therapy-fda-submission/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-24T11:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Regenxbio planeja enviar seu tratamento genético para Duchenne à Agência Americana de Alimentos e Medicamentos (FDA) para aprovação. A empresa tomará essa medida um mês depois que os reguladores solicitaram outro ensaio clínico.", "titulo_pt": "Regenxbio aposta em mudanças na FDA e enviará terapia gênica para Duchenne para aprovação", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 15236, "titulo": "FDA finally analyzed its own youth tobacco data", "url": "https://www.statnews.com/2026/06/24/health-news-fda-finally-analyzed-its-own-youth-tobacco-data/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-24T11:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Agência Americana de Alimentos e Medicamentos (FDA) analisou seus próprios dados sobre o uso de tabaco entre jovens.  Outros destaques incluem a decisão do governo de não restringir os dólares do programa SNAP para compra de doces e a diminuição dos retornos das adições ao tratamento de fertilização in vitro.", "titulo_pt": "FDA finalmente analisa dados próprios sobre tabaco entre jovens", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 15254, "titulo": "SpaceX launches secretive Starfall reentry demo mission", "url": "https://spacenews.com/spacex-launches-secretive-starfall-reentry-demo-mission/", "fonte_id": "spacenews", "data_pub": "2026-06-24T11:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A SpaceX lançou o primeiro voo de teste da cápsula de reentrada Starfall em 23 de junho. A missão permaneceu tão secreta quanto o próprio programa. Mais detalhes sobre a missão não foram divulgados.", "titulo_pt": "SpaceX lança missão secreta de teste de reentrada Starfall", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 15234, "titulo": "Extreme heat is muddling animals’ brains—and even triggering aggression", "url": "https://www.scientificamerican.com/article/extreme-heat-is-muddling-animals-brains-and-even-triggering-aggression/", "fonte_id": "scientific_american", "data_pub": "2026-06-24T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Com o aumento das temperaturas, algumas espécies estão se tornando mais agressivas, enquanto outras têm dificuldades para aprender.  Cientistas afirmam que o calor extremo pode afetar o comportamento animal, levando a mudanças na cognição e na interação social.", "titulo_pt": "Calor extremo atrapalha o cérebro de animais e até provoca agressividade", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 15237, "titulo": "STAT+: Ophthalmology venture grabs investors’ attention, raises $330 million", "url": "https://www.statnews.com/2026/06/24/ophthalmology-biotech-ollin-biosciences/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-24T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A startup que desenvolve tratamentos para doenças oculares levantou US$ 330 milhões de investidores. A empresa está se preparando para testes em fase avançada. O objetivo é desenvolver novos tratamentos para doenças oculares.", "titulo_pt": "Startup de Oftalmologia Capta Investimento de US$ 330 Milhões", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 14855, "titulo": "France detects first ebola case in doctor returning from DRC", "url": "https://www.lemonde.fr/en/france/article/2026/06/24/first-ebola-case-identified-in-france-in-doctor-returning-from-drc_6754828_7.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-24T10:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A França detectou seu primeiro caso de Ebola. O paciente é um médico que retornou da República Democrática do Congo (DRC). O primeiro-ministro francês, Sébastien Lecornu, está monitorando a situação.", "titulo_pt": "França detecta primeiro caso de Ebola em médico que retornava do DRC", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 15255, "titulo": "NGSO trade association launches without industry giant SpaceX", "url": "https://spacenews.com/ngso-trade-association-launches-without-industry-giant-spacex/", "fonte_id": "spacenews", "data_pub": "2026-06-24T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Amazon e outros operadores de satélites não geoestacionários formaram uma associação comercial para representar seu mercado em rápido crescimento. A SpaceX, apesar de possuir a maior constelação de satélites NGSO, não faz parte da associação.", "titulo_pt": "Associação comercial de satélites não geoestacionários lança sem a SpaceX", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 15257, "titulo": "ESA’s Euclid captures the Milky Way’s crowded heart", "url": "https://www.esa.int/ESA_Multimedia/Videos/2026/06/ESA_s_Euclid_captures_the_Milky_Way_s_crowded_heart", "fonte_id": "esa_space", "data_pub": "2026-06-24T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O telescópio espacial Euclid, da Agência Espacial Europeia (ESA), capturou a maior imagem de alta resolução do centro da galáxia Via Láctea em luz visível. A imagem, tirada em 23 de março de 2025, contém mais de 60 milhões de estrelas e permitirá que os cientistas confirmem a existência de exoplanetas nesta região e meçam sua massa.", "titulo_pt": "Telescópio Euclid da ESA captura o coração lotado da Via Láctea", "veiculo": "ESA - Space Science", "pais": "Europa", "classe": "A"}, {"id": 14360, "titulo": "Cientistas descobrem fóssil de parente próximo do velocirraptor", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/06/cientistas-descobrem-fossil-de-parente-proximo-do-velocirraptor.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-24T09:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Cientistas descobriram ossos de um dinossauro parente próximo do velociraptor. O espécime, batizado de Jian changmaensis, provavelmente era coberto de penas e viveu no solo e nas árvores. É possível que ele tenha sido capaz de planar como um esquilo-voador para atacar presas.", "titulo_pt": "Cientistas descobrem fóssil de parente próximo do velociraptor", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 15238, "titulo": "Opinion: How I used public radio to recruit 20,000 participants for a peer-reviewed study on walking breaks", "url": "https://www.statnews.com/2026/06/24/short-walking-breaks-sitting-health-research/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-24T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Manoush Zomorodi escreveu sobre como usou a rádio pública para recrutar participantes para um estudo revisado por pares sobre pausas para caminhar. O estudo teve 20 mil participantes.  Zomorodi acredita que, com a estrutura correta, os americanos se engajarão na pesquisa e confiarão nos resultados.", "titulo_pt": "Opinião: Como usei a rádio pública para recrutar 20 mil participantes para um estudo revisado por pares sobre pausas para caminhar", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 15239, "titulo": "Opinion: New human embryo editing advances require tough conversations on ethical boundaries", "url": "https://www.statnews.com/2026/06/24/embryo-editing-dieter-egli-ethical-boundaries-moratorium/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-24T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cientistas precisam considerar as complexidades éticas dos novos avanços na edição de embriões. O artigo argumenta que a comunidade científica precisa ter discussões abertas e transparentes sobre os limites éticos dessa tecnologia.", "titulo_pt": "Opinião: Novas avanços na edição de embriões humanos exigem conversas difíceis sobre limites éticos", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 15240, "titulo": "STAT+: What an abandoned heart failure trial says about ‘breakthrough’ devices that don’t reach patients", "url": "https://www.statnews.com/2026/06/24/fda-breakthrough-devices-what-we-learned-livanova-vitaria-results/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-24T08:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um teste clínico abandonado para insuficiência cardíaca oferece uma visão rara sobre dispositivos considerados 'revolucionários' pela FDA, mas que nunca chegaram aos pacientes. O estudo foi interrompido porque os resultados não mostraram benefícios suficientes. A situação levanta questões sobre como garantir que as inovações médicas cheguem às pessoas que precisam.", "titulo_pt": "Teste abandonado para insuficiência cardíaca revela dispositivos 'revolucionários' que não chegam aos pacientes", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 15258, "titulo": "End of the blue glow: BepiColombo turns off solar electric propulsion for Mercury arrival", "url": "https://www.esa.int/Enabling_Support/Operations/End_of_the_blue_glow_BepiColombo_turns_off_solar_electric_propulsion_for_Mercury_arrival", "fonte_id": "esa_space", "data_pub": "2026-06-24T07:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 15 de junho de 2026, às 15h24 (horário de verão centro-europeu), o sistema de propulsão elétrica solar (SEP) da sonda espacial BepiColombo foi desligado pela última vez. Após alimentar a jornada de oito anos do BepiColombo pelo Sistema Solar interno, o SEP completou seu último arco de empuxo, marcando o fim da fase de cruzeiro longo e o início da chegada a Mercúrio.", "titulo_pt": "Fim do brilho azul: BepiColombo desliga propulsão elétrica solar para chegada a Mercúrio", "veiculo": "ESA - Space Science", "pais": "Europa", "classe": "A"}, {"id": 15081, "titulo": "Australia ramps up bird flu surveillance and testing after first cases reported", "url": "https://www.japantimes.co.jp/news/2026/06/24/world/science-health/australia-bird-flu-surveillance/", "fonte_id": "japan_times", "data_pub": "2026-06-24T05:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Após a confirmação de dois casos, autoridades australianas estão realizando testes em aves marinhas subantárticas encontradas mortas, além de um pelicano. As aves foram encontradas mais de 1200 quilômetros do local onde os primeiros casos foram registrados.", "titulo_pt": "Austrália intensifica vigilância e testes contra gripe aviária após primeiros casos", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 15259, "titulo": "Curiosity Blog, Sols 4927–4933: Let’s Drive to That Smooth Area", "url": "https://science.nasa.gov/blog/curiosity-blog-sols-4927-4933-lets-drive-to-that-smooth-area/", "fonte_id": "nasa_news", "data_pub": "2026-06-24T04:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A equipe científica mapeou áreas com diferentes texturas de superfície nas imagens orbitais da região que Curiosity está explorando. Uma dessas áreas é lisa e o rover será direcionado para lá. A professora Susanne P. Schwenzer, do The Open University, Reino Unido, escreveu um blog sobre as atividades.", "titulo_pt": "Curiosity Blog, Sols 4927–4933: Vamos Dirigir para Essa Área Lisa", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 15268, "titulo": "Game of stones: how paintings of marble reveal a world of magical medieval mysticism", "url": "https://www.theguardian.com/artanddesign/2026/jun/24/game-of-stones-how-paintings-of-marble-reveal-a-world-of-magical-medieval-mysticism", "fonte_id": "guardian_culture", "data_pub": "2026-06-24T12:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo livro explora a arte gótica e renascentista para revelar o significado sobrenatural atribuído ao mármore. Antes da era moderna, o mármore era visto como uma estrutura viva com propriedades espirituais. O livro analisa pinturas que retratam o mármore de maneiras diferentes, desde giros psicodélicos até blocos ensanguentados.", "titulo_pt": "Jogo de Pedras: Como Pinturas de Már
