olha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 55333, "titulo": "Atentado a la AMIA: se realizó una nueva jornada de reflexión sobre antisemitismo y discriminación", "url": "https://www.lanacion.com.ar/politica/atentado-a-la-amia-se-realizo-una-nueva-jornada-de-reflexion-sobre-antisemitismo-y-discriminacion-nid16072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-17T01:48:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um evento foi organizado pelo Congreso Judío Latinoamericano na Faculdade de Direito da UBA para reflexão sobre antisemitismo e discriminação, em comemoração ao 32º aniversário do atentado à AMIA que resultou na morte de 85 pessoas.", "titulo_pt": "Ataque à AMIA: realizada nova jornada de reflexão sobre antisemitismo e discriminação", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 55824, "titulo": "S. Korea's exports of K-pop albums hit record high of US$257.48 mln in H1", "url": "https://en.yna.co.kr/view/AEN20260717001500320", "fonte_id": "yonhap_news", "data_pub": "2026-07-17T00:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As exportações de álbuns de k-pop da Coreia do Sul atingiram um recorde histórico no primeiro semestre de 2023, totalizando US$257,48 milhões.", "titulo_pt": "Exportações de álbuns de K-pop da Coreia do sul batem recorde", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 55877, "titulo": "When heritage meets pop culture: K-drama", "url": "https://www.koreaherald.com/article/10811339", "fonte_id": "korea_herald", "data_pub": "2026-07-17T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A cultura hereditária sul-coreana está ganhando destaque, com uma crescente quantidade de dramas coreanos (K-dramas) usando o patrimônio cultural do país como um dos principais atrativos para audiências globais. Em 2026, a MBC estreou 'Perfeito Trono', uma dramatização fictícia da monarquia constitucional do século XXI, protagonizada por IU e Byeon Woo-seok.", "titulo_pt": "Quando patrimônio cultural encontra cultura pop: k-drama", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}], "cultura__eventos": [], "sociedade": [{"id": 56214, "titulo": "¿Plaga o habitante legítima? Las cotorras se adaptaron, coparon la ciudad y generan fricciones", "url": "https://www.lanacion.com.ar/revista-jardin/plaga-o-habitante-legitima-las-cotorras-se-adaptaron-coparon-la-ciudad-y-generan-fricciones-nid17072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-17T03:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "As cotorras se adaptaram à cidade e estão causando conflitos com os moradores. Elas ocupam espaços públicos e privados, gerando disputas sobre o uso do espaço urbano.", "titulo_pt": "Plaga ou habitante legítima? As cotorras dominaram a cidade e criaram fricções", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 56218, "titulo": "Alcalde de Cerro Navia apunta a una posible intervención de terceros tras muerte de hombre electrocutado por un poste energizado", "url": "https://www.latercera.com/nacional/noticia/alcalde-de-cerro-navia-apunta-a-una-posible-intervencion-de-terceros-tras-muerte-de-hombre-electrocutado-por-un-poste-energizado/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T02:57:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O prefeito de Cerro Navia apontou a possibilidade de uma intervenção de terceiros após a morte de um homem que foi electrocutado por um poste energizado. Segundo ele, o poste é antigo e pertence ao Transantiago, não sendo da Enel, e as perícias serão realizadas para determinar se houve uma conexão ilegal à rede elétrica.", "titulo_pt": "Prefeito de Cerro Navia suspeita de intervenção de terceiros após morte por electrocussão", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 56312, "titulo": "1 in 3 Korean teens are inconsistent with birth control use", "url": "https://www.koreaherald.com/article/10811960", "fonte_id": "korea_herald", "data_pub": "2026-07-17T02:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo mostrou que cerca de um terço das adolescentes sexualmente ativas na Coreia do Sul não utilizaram anticoncepcionais consistentemente no último ano, com muitas delas relatando a inexistência de contraceptivos ou influências dos parceiros. Em 2025, 67,3% das respostantes adolescentes disseram ter usado anticoncepcionais sempre durante o sexo nos últimos 12 meses.", "titulo_pt": "Um em três adolescentes coreanos não são consistentes no uso de contracepção", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 55188, "titulo": "Pedro Turra será julgado por forçar adolescente a ingerir álcool", "url": "https://www.metropoles.com/distrito-federal/pedro-turra-sera-julgado-por-forcar-adolescente-a-ingerir-alcool", "fonte_id": "metropoles", "data_pub": "2026-07-17T01:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Justiça aceitou a denúncia contra Pedro Turra e determinou a realização da audiência de instrução e do julgamento sobre o caso em que ele foi acusado de forçar uma adolescente a ingerir álcool.", "titulo_pt": "Pedro Turra será julgado por forçar adolescente a consumir álcool", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 55173, "titulo": "Câmeras flagram advogado entrando em adega antes de ser encontrado morto SP", "url": "https://www.cnnbrasil.com.br/nacional/sudeste/sp/cameras-flagram-advogado-entrando-em-adega-antes-de-ser-encontrado-morto-sp/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T00:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um advogado chamado Pedro Ely foi visto por câmeras de segurança com outro homem por volta das 2h50 da madrugada de sexta-feira antes de ser encontrado morto. O local do incidente envolve uma adega.", "titulo_pt": "Câmeras flagram advogado entrando em adega antes de ser encontrado morto em SP", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 55457, "titulo": "El temporal demográfico", "url": "https://www.latercera.com/cartas-al-director/noticia/el-temporal-demografico/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T00:54:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O artigo discute sobre o aumento populacional, sem entrar em detalhes específicos ou análises.", "titulo_pt": "O temporal demográfico", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 55459, "titulo": "Fuente de ahorros: la subejecución presupuestaria", "url": "https://www.latercera.com/cartas-al-director/noticia/fuente-de-ahorros-la-subejecucion-presupuestaria/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T00:50:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A subejecução orçamentária é uma fonte de economia. Os recursos não utilizados ou mal aplicados podem ser direcionados a outras finalidades.", "titulo_pt": "Fonte de economias: a subexecução orçamentária", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 55193, "titulo": "Preço do mesmo remédio varia até 25 vezes entre farmácias de São Paulo", "url": "https://www.metropoles.com/sao-paulo/preco-do-mesmo-remedio-varia-ate-25-vezes-entre-farmacias-de-sao-paulo", "fonte_id": "metropoles", "data_pub": "2026-07-17T00:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa realizada pelo Procon-SP revelou que o preço do mesmo medicamento pode variar até 25 vezes entre diferentes farmácias na cidade de São Paulo. A comparação de preços e a opção por compras online podem resultar em economia para os consumidores.", "titulo_pt": "Preço do mesmo remédio varia até 25 vezes entre farmácias de São Paulo", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 55752, "titulo": "Taiwan jumps nine places in freedom, prosperity indexes", "url s no Brasil", "url": "https://exame.com/esg/unicef-e-parceiros-lancam-alianca-para-ampliar-empregos-verdes-no-brasil/", "fonte_id": "exame", "data_pub": "2026-07-16T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A UNICEF e parceiros lançaram uma aliança com o objetivo de alinhar a formação profissional à demanda por mão de obra qualificada na economia de baixo carbono, visando potenciais 1 milhão de vagas no Brasil.", "titulo_pt": "UNICEF e parceiros lançam aliança para ampliar empregos verdes no Brasil", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 54325, "titulo": "Vazamento de gás em Manaus: 16 pessoas dão entrada em unidades de saúde", "url": "https://www.cnnbrasil.com.br/nacional/norte/am/vazamento-de-gas-em-manaus-16-pessoas-dao-entrada-em-unidades-de-saude/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-16T12:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um vazamento de gás ocorreu em uma indústria no Distrito Industrial de Manaus, levando 16 pessoas a serem atendidas em unidades de saúde. O quadro de saúde dos pacientes é considerado estável.", "titulo_pt": "Vazamento de gás em Manaus: 16 pessoas atendidas em hospitais", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 54232, "titulo": "O reduto da direita na Amazônia onde o bolsonarismo lidera ao Planalto, governo e Senado", "url": "https://veja.abril.com.br/brasil/o-reduto-da-direita-na-amazonia-onde-o-bolsonarismo-lidera-ao-planalto-governo-e-senado/", "fonte_id": "veja", "data_pub": "2026-07-16T12:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em Rondônia, Flávio Bolsonaro lidera com 42 pontos de vantagem sobre Lula nas intenções de voto e Marcos Rogério é favorito para o governo estadual, segundo uma pesquisa Real Time Big Data.", "titulo_pt": "O reduto da direita na Amazônia onde o bolsonarismo lidera ao Planalto, governo e Senado", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 54277, "titulo": "Motorista morre prensado por concreto após acidente na BR-050, em MG", "url": "https://www.metropoles.com/minas-gerais/motorista-morre-prensado-por-concreto-apos-acidente-na-br-050-em-mg", "fonte_id": "metropoles", "data_pub": "2026-07-16T11:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um motorista morreu prensado por blocos de concreto durante um acidente na BR-050, em Araguari (MG). O homem ficou preso às ferragens após a colisão entre duas carretas que levaram à invasão da cabine pelo concreto.", "titulo_pt": "Motorista morre prensado por concreto após acidente na BR-050, em MG", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 54431, "titulo": "Adolescentes de entornos desfavorecidos son más vulnerables al uso problemático de redes sociales, según un estudio", "url": "https://www.latercera.com/tendencias/noticia/adolescentes-de-entornos-desfavorecidos-son-mas-vulnerables-al-uso-problematico-de-redes-sociales-segun-un-estudio/", "fonte_id": "la_tercera", "data_pub": "2026-07-16T11:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa com dados de mais de 330.000 adolescentes de 43 países descobriu que o uso problemático das redes sociais está associado a um menor bem-estar, especialmente entre aqueles oriundos de lares menos favorecidos economicamente.", "titulo_pt": "Adolescentes de baixa renda são mais vulneráveis ao uso problemático de redes sociais, indica estudo", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 56202, "titulo": "Continúan los cierres parciales del parque nacional por la aparición de un yaguareté en los senderos públicos", "url": "https://www.lanacion.com.ar/revista-lugares/continuan-los-cierres-parciales-del-parque-nacional-por-la-aparicion-de-un-yaguarete-en-los-senderos-nid17072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-17T03:15:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O dilema do yaguareté continua afetando a agenda turística, com os senderos do Parque Nacional ainda fechados duas semanas após o incidente. Os prestadores de serviço em Carlos Pellegrini aumentaram suas reclamações diretamente à autoridade máxima da Administração de Parques Nacionais durante as férias invernosas.", "titulo_pt": "Continuam os fechamentos parciais do parque nacional devido à presença de um yaguareté nos senderos públicos", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 55732, "titulo": "Heat and wildfire smoke become a dangerous new climate reality", "url": "https://www.japantimes.co.jp/environment/2026/07/17/climate-change/heat-wildfire-smoke-climate-reality/", "fonte_id": "japan_times", "data_pub": "2026-07-17T01:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As altas temperaturas combinadas com fumaça de incêndios florestais podem causar danos significativos à saúde. O perigo associado a cada um desses fatores pode ser aumentado quando ocorrem simultaneamente.", "titulo_pt": "Calor e fumaça de incêndios florestais se tornam uma nova realidade climática perigosa", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 55451, "titulo": "Temporal de lluvia y viento arriba con fuerza a la zona central: tres fallecidos, marejadas, evacuaciones y 555 mil personas sin luz", "url": "https://www.latercera.com/nacional/noticia/temporal-de-lluvia-y-viento-arriba-con-fuerza-a-la-zona-central-un-fallecido-marejadas-evacuaciones-y-555-mil-personas-sin-luz/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T01:05:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O temporal de chuva e vento intensificou-se na região central do Chile, causando três mortes em Negrete (Biobío), Temuco (La Araucanía) e Cerro Navia (Região Metropolitana). O governo declarou a suspensão das aulas entre Atacama e La Araucanía devido às condições meteorológicas. Além disso, houve marejadas, evacuações e 555 mil pessoas sem energia elétrica.", "titulo_pt": "Temporal intensifica na região central do chile: três mortes, evacuações e interrupção no fornecimento de energia", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 55753, "titulo": "Two more contaminated oil batches found: FDA", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/17/2003860892", "fonte_id": "taipei_times", "data_pub": "2026-07-17T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Agência Americana de Alimentos e Medicamentos (FDA) encontrou mais duas loteações de óleo contaminadas.", "titulo_pt": "Dois novos lotes de óleo contaminado descobertos: FDA", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 55441, "titulo": "‘We are waiting with bated breath’: gathering El Niño could be the strongest on record, BoM says", "url": "https://www.theguardian.com/environment/2026/jul/17/record-el-nino-forecast-2027-hottest-year-on-record-bom-says", "fonte_id": "guardian_world", "data_pub": "2026-07-16T23:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O fenômeno El Niño, que já está estabelecido no Oceano Pacífico e está associado a recordes de temperaturas globais, pode se desenvolver para se tornar o mais forte na história, segundo o Bureau of Meteorology da Austrália. Climatologistas estão monitorando intensamente esse sistema em fortalecimento com crescente preocupação.", "titulo_pt": "Aguardamos com ansiedade: El Niño poderia ser o mais forte já registrado, diz BoM", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 55467, "titulo": "Ministra de Energía informa que más de 555 mil clientes permanecen sin suministro eléctrico por sistema frontal", "url": "https://www.latercera.com/nacional/noticia/ministra-de-energia-informa-que-mas-de-555-mil-clientes-permanecen-sin-suministro-electrico-por-sistema-frontal/", "fonte_id": "la_tercera", "data_pub": "2026-07-16T22:59:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A ministra de Energía, Ximena Rincón, informou que mais de 555 mil clientes permanecem sem energia elétrica em regiões como La Araucanía, Los Ríos e Biobío devido a um sistema frontal. A recuperação será mais lenta devido aos ventos fortes e ao risco para as equipes de reparo.", "titulo_pt": "Maior de 555 mil clientes permanecem sem energia elétrica em regiões chilenas", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 55436, "titulo": "Air quality plummets in 20 US states as smoke from Canadian wildfires spreads", "url": "https://www.theguardian.com/us-news/2026/jul/16/smoke-canadian-wildfires-air-quality", "fonte_id": "guardian_world", "data_pub": "2026-07-16T22:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A qualidade do ar piorou em 20 estados dos EUA devido ao fumaça proveniente das queimadas no Canadá. Autoridades recomendam que as pessoas permaneçam em ambientes internos para evitar condições de ar consideradas indesejáveis.", "titulo_pt": "Qualidade do ar deteriora-se em 20 estados americanos devido às chamas canadenses", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 56263, "titulo": "Spain battles major Aragon wildfire amid heatwave", "url": "http://www.euronews.com/video/2026/07/16/spain-battles-major-aragon-wildfire-amid-heatwave-and-climate-fears", "fonte_id": "euronews", "data_pub": "2026-07-16T21:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de 400 bombeiros e 19 aeronaves foram empregados para combater um incêndio florestal rápido no nordeste da Espanha, na região de Aragão. Até 16 de julho, as chamas haviam consumido aproximadamente 7.600 hectares.", "titulo_pt": "Espanha enfrenta grande incêndio florestal em aragão durante onda de calor", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 56265, "titulo": "Fire at Algerian orphanage kills 11 children, injures 19", "url": "http://www.euronews.com/2026/07/16/fire-at-algerian-orphanage-kills-11-children-injures-19", "fonte_id": "euronews", "data_pub": "2026-07-16T18:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio em um orfanato na Argélia resultou na morte de 11 crianças e deixou outras 19 feridas. O incidente ocorreu durante uma onda de calor que causou quase mil incêndios.", "titulo_pt": "Incêndio em orfanato na argélia mata 11 crianças e lesiona 19", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 54997, "titulo": "Fim da Moratória da Soja aumentará desmate da amazônia em 17% na próxima década, diz análise", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/fim-da-moratoria-da-soja-aumentara-desmate-da-amazonia-em-17-na-proxima-decada-diz-analise.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-16T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A análise publicada na revista Science indica que o fim da Moratória da Soja aumentará o desmatamento da Amazônia brasileira em 17% na próxima década (2025-2035) em relação aos anos anteriores (2014-2024). O desmatamento ameaçará áreas florestais equivalentes ao tamanho de Portugal e Itália juntos.", "titulo_pt": "Fim da Moratória da Soja aumentará desmate da amazônia em 17% na próxima década, diz análise", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 56266, "titulo": "Algeria investigates Mohammadia orphanage fire that killed 11 people", "url": "http://www.euronews.com/video/2026/07/16/algeria-investigates-mohammadia-orphanage-fire-that-killed-11-people", "fonte_id": "euronews", "data_pub": "2026-07-16T17:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio ocorrido num orfanato perto de Argel, Albânia, no dia 16 de julho matou pelo menos 11 pessoas e feriu 19. O incidente aconteceu durante uma onda de calor e um aumento recente de mais de mil focos de incêndio.", "titulo_pt": "Albânia investiga incêndio letal em orfanato que matou 11 pessoas", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 55629, "titulo": "Canadian wildfire smoke chokes US cities from Midwest to Northeast", "url": "https://www.lemonde.fr/en/environment/article/2026/07/16/canadian-wildfire-smoke-chokes-us-cities-from-midwest-to-northeast_6755550_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-16T16:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Incêndios florestais fora de controle no Ontário enviaram fumaça perigosa para os Estados Unidos, cobrindo cidades do Meio-Oeste ao Nordeste e levando a avisos sobre a qualidade do ar em Minnesota e Nova York.", "titulo_pt": "Fumaça de incêndios canadenses atinge cidades dos estados unidos", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 54236, "titulo": "Anvisa manda recolher dois lotes da água Mamba Water após contaminação por bactéria; saiba quais são", "url": "https://veja.abril.com.br/saude/anvisa-manda-recolher-dois-lotes-da-agua-mamba-water-apos-contaminacao-por-bacteria-saiba-quais-sao/", "fonte_id": "veja", "data_pub": "2026-07-16T11:57:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Anvisa ordenou o recolhimento de dois lotes da água Mamba Water após a identificação de bactéria em testes de rotina. O microrganismo encontrado é o mesmo detectado em lotes de produtos Ypê e água Crystal.", "titulo_pt": "Anvisa determina recolher dois lotes de água Mamba Water por contaminação; veja quais são", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 54742, "titulo": "Venezuelans left to fend for themselves after quakes as rescuers leave", "url": "https://www.japantimes.co.jp/news/2026/07/16/world/venezuela-quake-rescuers-leave/", "fonte_id": "japan_times", "data_pub": "2026-07-16T10:44:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Cidadãos venezuelanos que perderam suas casas devido a terremotos estão começando a se estabelecer em abrigos temporários montados pelo governo nas escolas e parques. Eles passaram vários dias retornando aos escombros das suas residências.", "titulo_pt": "Venezuelanos deixados à própria sorte após terremotos enquanto resgatadores se retiram", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 54669, "titulo": "Climate funding: Who pays for the transition?", "url": "https://www.aljazeera.com/video/counting-the-cost/2026/7/16/climate-funding-who-pays-for-the-transition?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-16T10:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Países desenvolvidos estão reduzindo o financiamento climático, mas países em desenvolvimento ainda precisam de bilhões para se adaptarem às mudanças climáticas.", "titulo_pt": "Financiamento climático: quem paga pela transição?", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 54575, "titulo": "France faces water shortages after successive heatwaves: 'Conservation must become a collective reflex'", "url": "https://www.lemonde.fr/en/environment/article/2026/07/16/france-faces-water-shortages-after-successive-heatwaves-conservation-must-become-a-collective-reflex_6755535_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-16T10:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A França enfrenta uma 'doradeira excepcional', tanto pela sua 'precoce ocorrência quanto pela sua severidade', segundo o ministro do Meio Ambiente. Restrições no uso da água estão em vigor em grande parte do país.", "titulo_pt": "França enfrenta escassez de água após ondas de calor sucessivas: 'conservação deve se tornar um reflexo coletivo'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 55455, "titulo": "Corte Penal Internacional", "url": "https://www.latercera.com/cartas-al-director/noticia/corte-penal-internacional/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T00:58:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O texto se refere à Corte Penal Internacional, mas não fornece detalhes adicionais sobre seu conteúdo. Sem informações específicas, não é possível resumir fatos.", "titulo_pt": "Corte Penal Internacional", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 55440, "titulo": "Family devastated by ‘unacceptable’ charges over methanol deaths of Australian teenagers in Laos", "url": "https://www.theguardian.com/australia-news/2026/jul/17/laos-methanol-poisoning-charges-bianca-jones-holly-bowles-deaths", "fonte_id": "guardian_world", "data_pub": "2026-07-17T00:34:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo australiano expressou frustração e disse que continuará pressionando para obter acusações mais severas relacionadas à morte por envenenamento de metanol de duas jovens turistas, Bianca Jones e Holly Morton-Bowles, em Laos. As autoridades locais estão prestes a apresentar acusações menores, que foram consideradas 'bitterly' decepcionantes.", "titulo_pt": "Família devastada por ‘acusações inaceitáveis’ nos óbitos de adolescentes australianas intoxicadas por metanol em Laos", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 55749, "titulo": "Lai expresses solidarity with arrested HK booksellers", "url": "https://www.taipeitimes.com/News/front/archives/2026/07/17/2003860883", "fonte_id": "taipei_times", "data_pub": "2026-07-17T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Lai expressou solidariedade aos livradores de Hong Kong que foram detidos. O político fez declarações mostrando apoio aos envolvidos no caso.", "titulo_pt": "Lai expressa solidariedade aos livradores detidos em hong kong", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 55754, "titulo": "Two police officers report of interrogation in China", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/17/2003860893", "fonte_id": "taipei_times", "data_pub": "2026-07-17T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dois policiais relataram uma sessão de interrogatório na China.", "titulo_pt": "Dois policiais relatam sessão de interrogatório na China", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 55619, "titulo": "Assisted dying, revolution or ethical dilemma? French healthcare workers divided on new law", "url": "https://www.lemonde.fr/en/france/article/2026/07/16/assisted-dying-revolution-or-ethical-dilemma-french-healthcare-workers-divided-on-new-law_6755552_7.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-16T18:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Profissionais de saúde franceses estão divididos sobre a nova lei que permite o suicídio assistido, com alguns vendo-a como um passo positivo e outros considerando-a um campo minado ético. A lei, aprovada pelo Parlamento na quarta-feira, inclui uma cláusula de consciência para os profissionais de saúde.", "titulo_pt": "Assistido suicídio: revolução ou dilema ético? Profissionais de saúde franceses divididos", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 54625, "titulo": "Trump's deportation push is rewiring American policing, ACLU report says", "url": "https://www.axios.com/2026/07/16/aclu-immigration-local-policing-deportations", "fonte_id": "axios", "data_pub": "2026-07-16T11:37:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um relatório da ACLU afirma que a campanha de deportação do presidente Trump ampliou significativamente, transformando agentes federais, policiais estaduais, policiais locais e até mesmo agentes de conservação em uma força de 50.000 pessoas para a aplicação das leis imigratórias internas. Isso está mudando fundamentalmente a natureza da segurança pública nos Estados Unidos.", "titulo_pt": "Campanha de deportação do trump reconfigura o policiamento americano, diz relatório da ACLU", "veiculo": "Axios", "pais": "EUA", "classe": "B"}, {"id": 54719, "titulo": "Indonesian migrant fishers hooked by false promises, reeled into slavery on high seas", "url": "https://www.scmp.com/news/asia/southeast-asia/article/3360818/indonesian-migrant-fishers-hooked-false-promises-reeled-slavery-high-seas?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-16T11:10:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Akhmad, um trabalhador migrante indonésio, foi atraído por promessas de bom salário trabalhando a bordo de uma embarcação pesqueira estrangeira e sofreu abuso e exploração durante meses, ficando isolado do mundo. Milhares de trabalhadores indonésios são recrutados para o setor pesqueiro global, muitos sem informações adequadas sobre seus direitos.", "titulo_pt": "Pescadores migrantes indonésios atraídos por promessas falsas caem em escravidão no alto mar", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 54346, "titulo": "Mais de 500 imigrantes podem ter morrido após naufrágio em Mianmar, diz ONU", "url": "https://www.cnnbrasil.com.br/internacional/mais-de-500-imigrantes-podem-ter-morrido-apos-naufragio-em-mianmar-diz-onu/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-16T10:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Mais de 500 imigrantes podem ter morrido após um naufrágio envolvendo refugiados rohingya na Mianmar. As travessias não seguiam a temporada regular de navegação, aumentando os riscos de acidentes.", "titulo_pt": "Mais de 500 imigrantes podem ter morrido após naufrágio envolvendo refugiados rohingya em Mianmar, diz ONU", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 54668, "titulo": "Fire at orphanage in Algeria kills 11 people, including children", "url": "https://www.aljazeera.com/news/2026/7/16/fire-at-orphanage-in-algeria-kills-11-people-including-children?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-16T10:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um incêndio atingiu uma instituição de assistência a crianças no leste de Argel, capital do Aléxandreia. Dezessete pessoas morreram e 19 ficaram feridas.", "titulo_pt": "Incêndio em orfanato na argélia mata 11 pessoas, incluindo crianças", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 54723, "titulo": "Bar security footage helps clear Hong Kong rugby player of molestation charge", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3360813/bar-security-footage-helps-clear-hong-kong-rugby-player-molestation-charge?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-16T10:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um jogador profissional de rugby de Hong Kong foi absolvido do acusação de abuso sexual contra uma mulher após um juiz decidir que o atleta havia tocado acidentalmente nos quadris da vítima. No entanto, ele admitiu um crime menor de lesão corporal comum e outro de danos criminosos, sendo condenado a pagar uma multa de 12.000 dólares hongkoneses.", "titulo_pt": "Vídeo de segurança ajuda a absolver jogador de rugby de acusação de abuso sexual", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 54674, "titulo": "Decades of denial: Death certificate for disappeared reopens Kashmir wounds", "url": "https://www.aljazeera.com/news/2026/7/16/decades-of-denial-death-certificate-for-disappeared-reopens-kashmir-wounds?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-16T09:39:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Depois de anos de busca e batalhas judiciais, um juiz declara o que Junaid Rashid já suspeitava: seu pai havia morrido. O certificado de óbito reabre feridas na região do Caxemira.", "titulo_pt": "Decadência da negação: certificado de morte dos desaparecidos reabre feridas no caxemira", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 55300, "titulo": "¿Represión o diálogo? La respuesta del gobierno a la salud comunitaria", "url": "https://www.ciperchile.cl/2026/07/16/represion-o-dialogo-la-respuesta-del-gobierno-a-la-salud-comunitaria/?utm_source=rss&utm_medium=rss&utm_campaign=represion-o-dialogo-la-respuesta-del-gobierno-a-la-salud-comunitaria", "fonte_id": "ciper_chile", "data_pub": "2026-07-16T08:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O artigo discute a resposta do governo ao movimento pela saúde comunitária, focando na questão entre represão e diálogo. Não há detalhes específicos sobre o conteúdo do artigo além deste título.", "titulo_pt": "Repressão ou diálogo? A resposta do governo à saúde comunitária", "veiculo": "CIPER Chile", "pais": "Chile", "classe": "A"}, {"id": 54482, "titulo": "How Social Media Posts Are Fueling the Dehumanization of Malaysia’s Rohingya Population", "url": "https://thediplomat.com/2026/07/how-social-media-posts-are-fueling-the-dehumanization-of-malaysias-rohingya-population/", "fonte_id": "the_diplomat", "data_pub": "2026-07-16T05:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As postagens nas redes sociais estão alimentando a desumanização da comunidade rohingya no Malaysia. O sentimento negativo crescente sobre o grupo se assemelha alarmantemente às narrativas que justificaram sua expulsão em massa do Myanmar em 2017.", "titulo_pt": "Como postagens nas redes sociais estão aumentando a desumanização da comunidade Rohingya no Malaysia", "veiculo": "The Diplomat", "pais": "Japão", "classe": "B"}, {"id": 53087, "titulo": "Oficial y confirmado por el ICE: el nuevo récord de arrestos migratorios en Texas en una sola jornada", "url": "https://www.lanacion.com.ar/estados-unidos/texas/oficial-y-confirmado-por-el-ice-el-nuevo-record-de-arrestos-migratorios-en-texas-en-una-sola-jornada-nid15072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-16T01:53:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Foram realizados mais de 200 arrestos migratórios na fronteira do Texas em uma única operação conduzida pelo ICE. Este é o novo recorde de detenções nessa área.", "titulo_pt": "Revelado novo recorde de arrestos migratórios em Texas: operação do ICE resultou em mais de 200 detidos", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 53010, "titulo": "Caso Fundamenta: Fiscalía detecta que Lagos ordenó un pago de $13 millones a pareja de la entonces jueza Vivanco", "url": "https://www.ciperchile.cl/2026/07/15/caso-fundamenta-fiscalia-detecta-que-lagos-ordeno-un-pago-de-13-millones-a-pareja-de-la-entonces-jueza-vivanco/?utm_source=rss&utm_medium=rss&utm_campaign=caso-fundamenta-fiscalia-detecta-que-lagos-ordeno-un-pago-de-13-millones-a-pareja-de-la-entonces-jueza-vivanco", "fonte_id": "ciper_chile", "data_pub": "2026-07-16T01:49:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Procuradoria detectou que durante o caso Fundamenta, o ex-presidente Lagos ordenou um pagamento de $13 milhões para a então esposa da juíza Vivanco.", "titulo_pt": "Caso Fundamenta: procuradoria descobre que Lagos autorizou pagamento de r$ 13 milhões à namorada da juíza Vivanco", "veiculo": "CIPER Chile", "pais": "Chile", "classe": "A"}, {"id": 54417, "titulo": "Five arrested in Hong Kong bookstore raids in ‘seditious’ materials crackdown", "url": "https://www.theguardian.com/world/2026/jul/16/hong-kong-bookstore-bookshop-raids-arrests", "fonte_id": "guardian_world", "data_pub": "2026-07-16T01:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Hong Kong autoridades realizaram a terceira onda de prisões relacionadas a livrarias independentes, acusando-as de venderem supostos materiais seditivos. Dois estabelecimentos foram invadidos e cinco pessoas detidas.", "titulo_pt": "Cinco pessoas presas em livrarias de Hong Kong durante o async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices().filter(function(v) { return v.lang === 'pt-BR' || v.lang.startsWith('pt'); });
    return vs[0] || null;
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // .sumario ou .destaque-analise imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
