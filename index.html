<html lang="pt-BR">
<head>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: none; border: 1px solid var(--border); border-radius: 4px;
             color: var(--texto2); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { border-color: var(--acento); color: var(--texto); }
  .tts-bar[hidden] { display: none; }
</style>
</head>

</div>

<script>
const D = {"gerado_em": "04/07/2026 18:49", "stats": {"noticias_novas": 513, "resumos_gerados": 102}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O Supremo Tribunal Federal (STF) retoma suas sessões plenárias no dia 3 de agosto com temas como a 'uberização', mandato-tampão do Rio de Janeiro e jogos de azar na pauta. Paralelamente, o Brasil enfrenta diversos desafios em diferentes áreas: há duas décadas, a prática de atividade física está estagnada; as mortes por meningite estão diminuindo, ameaçando atingir metas da Organização Mundial da Saúde (OMS); e há discussões sobre a redução da maioridade penal. Além disso, o governo de São Paulo autorizou um concurso público para 4.000 vagas de aluno-soldado na Polícia Militar. Em junho, Flávio Bolsonaro ganhou mais seguidores no Instagram que Michelle Bolsonaro. A exposição sobre a pandemia do COVID-19 no Rio de Janeiro permanece aberta ao público desde 1º de julho de 2026 e o metrô de São Paulo inaugurou sua estação mais profunda da América Latina.", "mundo": "No funeral do antigo Líder Supremo iraniano Ayatollah Ali Khamenei, que governou a República Islâmica do Irã por 37 anos, multidões se reuniram em Teerã. De acordo com Tara Kangarlou, jornalista especializada no assunto, a maioria dos participantes eram 'mais facções radicais da sociedade', o que sugere uma representatividade limitada das atitudes mais amplas do povo iraniano em relação ao regime. Em outro evento na região, o governo maliano informou que rebeldes estão atacando várias cidades no norte do país, incluindo Gao e Sévaré, enquanto um porta-voz do Frente de Libertação da Azawad afirmou que o município de Anefis também está sendo alvo dos separatistas. No contexto internacional, a Ucrânia atingiu um terminal de petróleo importante em São Petersburgo, capital russa, como parte de suas operações militares contra a Rússia. O presidente ucraniano Volodymyr Zelensky afirma que o alvo é infraestrutura crucial 'que gera receita para a guerra da Rússia'.\n\nA China intensificou as patrulhas marítimas nas águas orientais de Taiwan, levando a MAC (provavelmente a Autoridade Estratégica do Leste de Taiwan) a condenar as ações chinesas. Taiwan enfrenta desafios para manter sua influência regional e tem sido marginalizada em certos aspectos. Em contraste, o Irã celebrou seis dias de funeral oficial para seu ex-Líder Supremo Ali Khamenei, com milhões esperados a comparecerem, enquanto o país enfrenta tensões políticas internas e pressões dos Estados Unidos. No contexto geopolítico global, os Estados Unidos comemoram seus 250 anos de existência, embora as celebrações estejam repletas de controvérsias. A Ucrânia negou que tenha perdido a cidade estratégica de Kostiantynivka para as forças russas e realizou um ataque noturno com drones contra São Petersburgo, causando danos materiais mas sem vítimas. O governo russo reagiu afirmando ter abatido 72 drones ucranianos.", "economia": "A economia brasileira enfrenta diversos desafios e avanços, conforme mostram vários estudos e notícias recentes. O Ministério da Economia é frequentemente apontado como responsável pelos juros elevados, mas Durigan defende o ajuste fiscal para controlar a dívida pública. Outro destaque é a publicação do CGEE sobre terras raras no Brasil, analisando cenários nacionais e internacionais com foco em cadeias industriais para produção desses elementos químicos metálicos. A pesquisa do Datafolha revela que 59% dos eleitores de Lula preferem pagar mais impostos para receber serviços públicos gratuitos, refletindo uma mudança no comportamento dos votos. Além disso, a safra de café do Brasil para a temporada 2026/27 atingiu 52% da colheita, e o mercado brasileiro de beleza é destacado por sua diversidade e consumo de tendências, conforme especialistas. O cenário econômico também está sendo impactado pela saída de investidores estrangeiros da Bolsa brasileira em junho, mas com saldo acumulado acima do previsto para 2025.", "tecnologia": "O Brasil realizou o lançamento de seu primeiro foguete movido a propulsão líquida, chamado FTL-Perseu, colocando o país entre as poucas nações que dominam motores de alta precisão e controle. Este evento é um marco tecnológico importante. Em seguida, no mercado médico australiano, houve avanço significativo com a inteligência artificial, já que o governo expressou preocupações sobre a privacidade dos dados médicos gerados por ferramentas automatizadas. Na área de Tecnologia da Informação (TI), a Meta anunciou que seu novo modelo de IA, chamado Watermelon, alcançou as capacidades do GPT-5.5 em termos de computação, refletindo um avanço significativo na tecnologia de inteligência artificial.", "ciencia": "O aumento das inundações costeiras devido ao aquecimento global é um problema emergente, com estudos indicando que inundações extremas que eram raras estão se tornando 12 vezes mais frequentes. Isso tem implicações significativas para o planejamento urbano e a infraestrutura costeira. Em outro campo científico, a saúde metabólica está sendo reconhecida como um fator crucial no risco de arritmias cardíacas, além do histórico cardiovascular tradicional. A astronomia também proporcionou insights inovadores, com pesquisas sugerindo que uma galáxia pode estar em seu fim inicial, perdendo gás estelar logo após o Big Bang. Outros avanços incluem a identificação de uma nova espécie de axolotl no México e um micro-joaninha no Japão. A NASA divulgou imagens da Chandra X-ray Observatory que parecem um espetáculo de fogos de artifício celestes, enquanto estudos sobre El Niño preveem uma onda forte entre julho e setembro. Essas descobertas científicas abrangem desde a evolução de aves jurássicas até o impacto das mudanças climáticas no café arábica, passando por novos materiais criados com inteligência artificial na China. Há ainda preocupações sobre a exploração indígena sem consentimento na construção da IA.", "cultura": "Taiwan está participando de um espetáculo teatral no Festival Off Avignon, na França, com uma apresentação inicial que incluiu um desfile. Beyoncé surpreendeu ao lançar uma nova música intitulada 'Morning Dew (Donk)' nas plataformas de streaming sem dar nenhum aviso prévio. A atriz Magali Moraes apresentou um show no Festival Latinidades em Brasília, abordando temas como racismo, xenofobia, machismo e homofobia através do humor. O bairro boêmio da Lapa, no Rio de Janeiro, foi transformado em um Distrito de Arte e Cultura com a implantação do Boulevard Selarón ao redor da Escadaria Selarón, tornando o local mais acessível para moradores e visitantes. Estes eventos destacam a diversidade cultural e artística presente no cenário global atual, desde performances teatrais internacionais até lançamentos musicais inesperados e iniciativas de arte urbana em bairros tradicionais.", "sociedade": "Um jovem de 18 anos faleceu após descompensar-se no boliche Wabi Fun Club, em Mendoza, na Argentina. O incidente aconteceu depois que o jovem foi ao local com amigos após assistir ao jogo da seleção argentina. Em outro caso, a Polícia Militar chamou o esquadrão antibombas para inspecionar a 33ª Delegacia de Polícia em Brasília, no Distrito Federal, após uma suspeita de que explosivos haviam sido deixados lá. O número de mortos por terremotos na Venezuela aumentou para 2.954, conforme o balanço oficial, com 16.592 pessoas feridas e 16.309 casas destruídas. A Lei do Piauí obriga as empresas contratadas a reservar vagas para ex-presos, promovendo sua reintegração social e profissional. Além disso, o número de mortos em terremotos na Venezuela subiu para 2.954, conforme informado pelo governo, representando um aumento de 309 pessoas em relação ao relato anterior.", "meio_ambiente": "Foi realizado um fórum sobre economia circular no Ministério para discutir estratégias de sustentabilidade. O número de empregos verdes, conhecidos como 'green-collar', atingiu um recorde, refletindo a crescente demanda por profissionais em áreas ambientais e sustentáveis. Em Minas Gerais, três terremotos ocorreram entre 30 de junho e 2 de julho, causando preocupação local. No exterior, a França enfrentou uma onda de calor recente que levou à crise na vida selvagem, com centros de resgate relatando um número recorde de animais afetados pelo calor extremo. Em Portugal, um incêndio florestal mobilizou mais de mil bombeiros e resultou em nove feridos, devido a uma onda de calor intenso. No Brasil, o Rio Grande do Sul enfrentou graves problemas com 88% das casas impactadas pelas enchentes, enquanto o Great Barrier Reef na Austrália evitou ser listado como em perigo pela Unesco, apesar dos desafios ambientais enfrentados.", "direitos_humanos": "O Papa Leão XIII visitou a ilha italiana de Lampedusa no dia do aniversário da independência dos Estados Unidos, celebrando uma missa e relembrando a crise migratória global. Durante o evento, ele fez um apelo contra a indiferença mundial em relação aos imigrantes. Em outro desenvolvimento, a China detalhou suas estratégias de repressão no exterior, mas não forneceu detalhes específicos sobre os métodos utilizados. No Brasil, uma jornalista desaparecida desde junho foi encontrada morta, levando à prisão de oito suspeitos, incluindo quatro policiais municipais. Em um cenário mais amplo, a China implementou uma nova legislação que proíbe atos que 'minem a unidade étnica' e exige lealdade ao Partido Comunista Chinês, pressionando as minorias etnícnicas do país. Além disso, o número de mortes por Ebola na República Democrática do Congo aumentou para 473, com mais de 1.500 casos registrados, e a ONU condenou a execução extrajudicial de um palestiniano acusado de colaborar com forças israelenses em Gaza."}, "resumo_do_dia": {"politica_nacional": [{"id": 35137, "titulo": "Lei cria rota turística de cidades coloniais de Alagoas", "url": "https://www.poder360.com.br/poder-cultura/lei-cria-rota-turistica-de-cidades-coloniais-de-alagoas/", "fonte_id": "poder360", "data_pub": "2026-07-04T14:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A lei estabeleceu uma rota turística que passa pelas cidades coloniais de Alagoas, incluindo Marechal Deodoro, Penedo, Piranhas, Delmiro Gouveia, União dos Palmares, Porto Calvo e Água Branca.", "titulo_pt": "Lei cria rota turística para cidades coloniais de Alagoas", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35138, "titulo": "Regras do período de defeso eleitoral passam a valer neste sábado", "url": "https://www.poder360.com.br/poder-eleicoes/regras-do-periodo-de-defeso-eleitoral-passam-a-valer-neste-sabado/", "fonte_id": "poder360", "data_pub": "2026-07-04T14:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Começam a valer as regras do período de defeso eleitoral, que proíbe o uso da máquina pública para benefício político. Este período se estende por 3 meses antes do primeiro turno das eleições.", "titulo_pt": "Regras do período de defeso eleitoral passam a valer neste sábado", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35176, "titulo": "STF pauta uberização, mandato-tampão do RJ e jogos de azar para pós-recesso", "url": "https://www.cnnbrasil.com.br/politica/stf-pauta-uberizacao-mandato-tampao-do-rj-e-jogos-de-azar-para-pos-recesso/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T14:03:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal (STF) retoma suas sessões plenárias no dia 3 de agosto com uma pauta que inclui temas como uberização, mandato-tampão do Rio de Janeiro e jogos de azar. As discussões sobre esses assuntos ocorrerão após o recesso judicial.", "titulo_pt": "STF retoma sessões plenárias em agosto com pauta que inclui uberização, mandato-tampão do RJ e jogos de azar", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 35171, "titulo": "Turquia barra cruzeiro LGBTQ+ e obriga mudança de rota antes de chegada ao país", "url": "https://www.infomoney.com.br/mundo/turquia-barra-cruzeiro-lgbtq/", "fonte_id": "infomoney", "data_pub": "2026-07-04T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo turco impôs a um cruzeiro LGBTQ+ que mudasse sua rota antes de chegar ao país, justificando a decisão para preservar 'valores familiares' e 'padrões morais'.", "titulo_pt": "Turquia barra cruzeiro LGBTQ+ e obriga mudança de rota antes de chegada", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 35140, "titulo": "TSE impõe restrições de publicidade a partir deste sábado", "url": "https://www.poder360.com.br/poder-eleicoes/tse-impoe-restricoes-de-publicidade-a-partir-deste-sabado/", "fonte_id": "poder360", "data_pub": "2026-07-04T13:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As regras do Tribunal Superior Eleitoral (TSE) proíbem a propaganda de obras, a presença de candidatos em inaugurações e o uso de estruturas públicas antes das eleições. O 1º turno das eleições está previsto para o dia 4 de outubro.", "titulo_pt": "TSE impõe restrições de publicidade a partir deste sábado", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35141, "titulo": "Pandemia de covid é tema de exposição no Rio", "url": "https://www.poder360.com.br/poder-brasil/pandemia-de-covid-e-tema-de-exposicao-no-rio/", "fonte_id": "poder360", "data_pub": "2026-07-04T13:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A exposição sobre a pandemia de COVID-19 está aberta ao público desde 1º de julho de 2026 e permanecerá até abril de 2027.", "titulo_pt": "Pandemia de COVID-19 é tema de exposição no Rio", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 34932, "titulo": "Queda nas mortes por meningite desacelera e ameaça meta da OMS", "url": "https://www.poder360.com.br/poder-saude/queda-nas-mortes-por-meningite-desacelera-e-ameaca-meta-da-oms/", "fonte_id": "poder360", "data_pub": "2026-07-04T13:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A taxa de redução nas mortes por meningite desacelerou em 2023, com 259 mil óbitos registrados. Isso não atinge a meta da OMS de reduzir em 70% os casos fatais até 2030.", "titulo_pt": "Desaceleração nas mortes por meningite ameaça meta da OMS", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 34966, "titulo": "Datafolha: 65% consideram que depender menos do governo melhora a vida", "url": "https://www.cnnbrasil.com.br/politica/datafolha-65-consideram-que-depender-menos-do-governo-melhora-a-vida/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T13:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Datafolha realizou uma pesquisa entre os dias 17 e 18 de junho, entrevistando 2.004 eleitores em 139 municípios, e constatou que 65% dos entrevistados consideram que depender menos do governo melhora a qualidade de vida.", "titulo_pt": "65% dos brasileiros acreditam que reduzir dependência do governo melhoraria a vida", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 34933, "titulo": "Prática de atividade física no mundo está estagnada há 20 anos", "url": "https://www.poder360.com.br/poder-saude/pratica-de-atividade-fisica-no-mundo-esta-estagnada-ha-20-anos/", "fonte_id": "poder360", "data_pub": "2026-07-04T13:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A prática de atividade física no mundo permanece estagnada há duas décadas, apesar das políticas de incentivo existentes. Falta de metas claras e financiamento insuficiente mantêm o sedentarismo em níveis elevados.", "titulo_pt": "Prática de atividade física no mundo está estagnada há 20 anos", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 34935, "titulo": "Flávio ganhou mais seguidores que Michelle em junho", "url": "https://www.poder360.com.br/poder-eleicoes/flavio-ganhou-mais-seguidores-que-michelle-em-junho/", "fonte_id": "poder360", "data_pub": "2026-07-04T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em junho, Flávio Bolsonaro ganhou mais seguidores no Instagram que Michelle Bolsonaro, com 190 mil perfis se tornando seguidores dele contra 73 mil para a ex-primeira-dama. Ambos tiveram atritos públicos nesse período.", "titulo_pt": "Flávio ganhou mais seguidores que Michelle em junho", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 34936, "titulo": "Congressistas e ex-Caixa estão entre as cotadas para vice de Flávio", "url": "https://www.poder360.com.br/poder-eleicoes/congressistas-e-ex-caixa-estao-entre-as-cotadas-para-vice-de-flavio/", "fonte_id": "poder360", "data_pub": "2026-07-04T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Membros do Congresso e ex-executivos da Caixa são considerados possíveis candidatos para o cargo de vice-governador ao lado de Flávio. A pré-campanha busca atrair mais mulheres, um grupo no qual Lula tem uma vantagem.", "titulo_pt": "Congressistas e ex-Caixa são cotados para vice de Flávio; campanha alvo do eleitorado feminino", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 34958, "titulo": "Redução da maioridade penal pode terminar em embate no STF", "url": "https://veja.abril.com.br/brasil/reducao-da-maioridade-penal-pode-terminar-em-embate-no-stf/", "fonte_id": "veja", "data_pub": "2026-07-04T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Proposta de Emenda à Constituição (PEC) que reduz a maioridade penal foi aprovada na Comissão de Constituição e Justiça (CCJ) da Câmara dos Deputados no início de junho. O texto agora precisa ser analisado por uma comissão especial para poder avançar no processo legislativo.", "titulo_pt": "Redução da maioridade penal pode enfrentar novo desafio no STF", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 34937, "titulo": "Dormir com luz acesa pode aumentar o risco de doenças cardíacas", "url": "https://www.poder360.com.br/poder-saude/dormir-com-luz-acesa-pode-aumentar-o-risco-de-doencas-cardiacas/", "fonte_id": "poder360", "data_pub": "2026-07-04T12:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo com quase 89.000 pessoas mostrou que a exposição à luz noturna interfere no ritmo circadiano. Dormir com luz acesa pode aumentar o risco de doenças cardíacas.", "titulo_pt": "Dormir com luz acesa pode aumentar o risco de doenças cardíacas", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 34979, "titulo": "Lei Mariana Ferrer e o futuro do direitos das vítimas", "url": "https://www.congressoemfoco.com.br/artigo/120234/lei-mariana-ferrer-e-o-futuro-do-direitos-das-vitimas", "fonte_id": "congresso_em_foco", "data_pub": "2026-07-04T12:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A lei Mariana Ferrer estabelece diretrizes para a proteção das vítimas durante audiências, trazendo avanços e desafios na implementação dessa norma. Ela visa mitigar constrangimentos enfrentados pelas vítimas em processos judiciais.", "titulo_pt": "Lei Mariana Ferrer e o futuro dos direitos das vítimas", "veiculo": "Congresso em Foco", "pais": "Brasil", "classe": "B"}, {"id": 34931, "titulo": "A disputa entre JHC e Renan Filho em Alagoas, segundo nova pesquisa", "url": "https://www.cartacapital.com.br/politica/a-disputa-entre-jhc-e-renan-filho-em-alagoas-segundo-nova-pesquisa/", "fonte_id": "cartacapital", "data_pub": "2026-07-04T12:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Paraná Pesquisas realizou uma pesquisa entre 28 de junho e 1º de julho com 1.400 eleitores alagoanos sobre a disputa entre JHC e Renan Filho.", "titulo_pt": "A disputa entre JHC e Renan Filho em Alagoas, segundo nova pesquisa", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 34938, "titulo": "Entenda como SP monitora por satélite e IA os rios Pinheiros e Tietê", "url": "https://www.poder360.com.br/poder-tech/entenda-como-sp-monitora-por-satelite-e-ia-os-rios-pinheiros-e-tiete/", "fonte_id": "poder360", "data_pub": "2026-07-04T12:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O sistema utiliza imagens do satélite e inteligência artificial para analisar a superfície dos rios Pinheiros e Tietê, monitorando o crescimento de algas nos reservatórios.", "titulo_pt": "Entenda como São Paulo monitora por satélite e IA os rios Pinheiros e Tietê", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 35726, "titulo": "MAC condemns China’s sea patrols", "url": "https://www.taipeitimes.com/News/front/archives/2026/07/05/2003860246", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A MAC (provavelmente uma abreviação para alguma autoridade ou instituição) condenou as patrulhas marítimas da China. O contexto sugere que há tensões relacionadas a controle territorial ou soberania nas águas.", "titulo_pt": "MAC condena patrulhas marítimas chinesas", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35748, "titulo": "EDITORIAL: Taiwan anchors First Island Chain", "url": "https://www.taipeitimes.com/News/editorials/archives/2026/07/05/2003860237", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo discute a posição estratégica de Taiwan no Primeiro Círculo da Ilha. A passagem destaca o papel crucial desempenhado por Taiwan nesta estrutura geopolítica.", "titulo_pt": "Editorial: Taiwan é o Pilar do Primeiro Círculo da Ilha", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35750, "titulo": "Taiwan risks losing out in region", "url": "https://www.taipeitimes.com/News/editorials/archives/2026/07/05/2003860239", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Taiwan corre o risco de ser marginalizada na região. O país enfrenta desafios significativos que podem afetar sua influência e posição no contexto regional.", "titulo_pt": "Taiwan corre risco de perder influência na região", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35689, "titulo": "Masses of Iranians defy heatwave on second day of Khamenei’s funeral", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/4/masses-of-iranians-defy-heatwave-on-second-day-of-khameneis-funeral?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T21:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As multidões iranianas continuaram a participar nos funerais do antigo líder supremo Ali Khamenei em sua segunda jornada. A cerimônia está sendo realizada em meio a uma onda de calor.", "titulo_pt": "Massas iranianas desafiam calor em segundo dia dos funerais de Khamenei", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 35432, "titulo": "Como expansão territorial e populacional dos EUA em 250 anos transformou o país em uma potência marcada por divisões", "url": "https://www.bbc.com/portuguese/articles/cgevppylv24o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-04T20:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Nos 250 anos desde a declaração de independência, os Estados Unidos expandiram-se de pequenos assentamentos para uma potência global que abrange um continente inteiro e além.", "titulo_pt": "Como expansão territorial e populacional dos EUA em 250 anos transformou o país em uma potência marcada por divisões", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 35336, "titulo": "Drones ucranianos atingem terminal e porto de petróleo na Rússia", "url": "https://www.poder360.com.br/poder-internacional/drones-ucranianos-atingem-terminal-e-porto-de-petroleo-na-russia/", "fonte_id": "poder360", "data_pub": "2026-07-04T20:49:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo russo afirmou ter abatido 72 drones e que a ofensiva perto de São Petersburgo não resultou em vítimas. O presidente ucraniano, Zelensky, reivindicou a autoria da operação.", "titulo_pt": "Drones ucranianos atingem terminal e porto de petróleo na Rússia", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35424, "titulo": "Unidade momentânea em funeral esconde divisão na cúpula do Irã", "url": "https://www.infomoney.com.br/business/global/unidade-momentanea-em-funeral-esconde-divisao-na-cupula-do-ira/", "fonte_id": "infomoney", "data_pub": "2026-07-04T19:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ausência do aiatolá Mojtaba Khamenei levantou dúvidas sobre o comando real do país e permitiu que divisões internas na cúpula iraniana se aprofundassem durante um funeral.", "titulo_pt": "Unidade momentânea em funeral esconde divisão na cúpula do Irã", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 35692, "titulo": "A politically charged holiday: The US celebrates its 250th anniversary", "url": "https://www.aljazeera.com/gallery/2026/7/4/a-politically-charged-holiday-the-us-celebrates-its-250th-anniversary?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T19:43:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O aniversário de 250 anos dos Estados Unidos tem enfrentado controvérsias, com o presidente Trump buscando influenciar a celebração.", "titulo_pt": "Um feriado politicamente carregado: Os EUA completam 250 anos", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 35694, "titulo": "Has the US reckoned with its own history?", "url": "https://www.aljazeera.com/video/upfront/2026/7/4/has-the-us-reckoned-with-its-own-history?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T19:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Marc Lamont Hill conversa com a scholar Kimberle Crenshaw sobre se os Estados Unidos estão retrocedendo nos direitos civis.", "titulo_pt": "Os EUA conseguiram lidar com sua própria história?", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 35695, "titulo": "Will economic pressure move the Kremlin towards talks with Kyiv?", "url": "https://www.aljazeera.com/video/inside-story/2026/7/4/will-economic-pressure-move-the-kremlin-towards-talks-with-kyiv?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T19:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ucrânia tem realizado constantes ataques a refinarias, causando uma crise de combustível na Rússia.", "titulo_pt": "A pressão econômica fará o Kremlin entrar em negociações com Kiev?", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 35696, "titulo": "At least 20 drown as boat carrying students after exams sinks in DR Congo", "url": "https://www.aljazeera.com/news/2026/7/4/at-least-20-drown-as-boat-carrying-students-after-exams-sinks-in-dr-congo?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T19:16:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pelo menos 20 pessoas morreram quando uma embarcação transportando estudantes afundou na República Democrática do Congo. Testemunhas afirmam que o barco poderia estar carregando mais de 200 passageiros.", "titulo_pt": "Pelo menos 20 morrem após barco com estudantes afundar em DR Congo", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 35721, "titulo": "Zelensky denies Russia captured key Ukraine city, challenges Putin to meet him there", "url": "https://www.scmp.com/news/world/russia-central-asia/article/3359441/zelensky-denies-russia-captured-key-ukraine-city-challenges-putin-meet-him-there?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T19:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ucrânia afirma ainda controlar a cidade estratégica de Kostiantynivka, segundo o presidente Volodymyr Zelensky e o Alto Comando. A Rússia nega essas declarações e afirma que mopping up restantes resistências no local, oferecendo um encontro com Zelensky na cidade.", "titulo_pt": "Zelensky nega que Ucrânia tenha perdido importante cidade para a Rússia; Putin é desafiado a se encontrar nele", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 35589, "titulo": "Ukrainian drones hit St Petersburg oil terminal and nearby port", "url": "https://www.theguardian.com/world/2026/jul/04/ukrainian-drones-hit-st-petersburg-oil-terminal-and-nearby-port", "fonte_id": "guardian_world", "data_pub": "2026-07-04T19:09:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ukrânia realizou uma grande ataque noturno com drones contra São Petersburgo e área circunvizinha, atingindo a terminal de óleo da cidade e infraestrutura portuária local. O governador de São Petersburgo relatou que não houve vítimas.", "titulo_pt": "Drones ucranianos atingem terminal de óleo e porto de São Petersburgo", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 35345, "titulo": "Mesmo rompido diplomaticamente, Israel manda ajuda à Venezuela", "url": "https://www.poder360.com.br/poder-internacional/mesmo-rompido-diplomaticamente-israel-manda-ajuda-a-venezuela/", "fonte_id": "poder360", "data_pub": "2026-07-04T18:51:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Israel enviou uma delegação de especialistas para a Venezuela após os terremotos, apoiando a recuperação do país. Apesar do rompimento diplomático entre as duas nações, Israel forneceu ajuda humanitária.", "titulo_pt": "Mesmo com rompimento diplomático, Israel envia ajuda à Venezuela", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 35697, "titulo": "Russia’s Medvedev says Strait of Hormuz is Iran’s ‘nuclear weapon’", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/4/russias-medvedev-says-strait-of-hormuz-is-irans-nuclear?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T18:46:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dmitry Medvedev, ex-presidente da Rússia, comparou a capacidade do Irã de interromper o tráfego no Estreito de Ormuz ao posse de uma arma nuclear. Segundo ele, o Irã pode usar este poder como um meio de pressão internacional.", "titulo_pt": "Medvedev compara capacidade do Irã no Estreito de Ormuz à posse de uma arma nuclear", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}, {"id": 35698, "titulo": "Trump hints Israel’s Benjamin Netanyahu may visit US as early as next week", "url": "https://www.aljazeera.com/news/2026/7/4/trump-hints-israels-benjamin-netanyahu-may-visit-us-as-early-as-next-week?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-04T18:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Netanyahu pode visitar os EUA a qualquer momento no próximo semana, o que marcaria sua sétima viagem ao país desde que Trump retornou para seu segundo mandato como presidente.", "titulo_pt": "Trump sugere possibilidade de visita de Netanyahu aos EUA em breve", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}], "mundo__eventos": [], "economia": [{"id": 35170, "titulo": "Durigan diz que Fazenda é a menos culpada por juros altos e defende ajuste fiscal", "url": "https://www.infomoney.com.br/politica/durigan-diz-que-fazenda-e-a-menos-culpada-por-juros-altos-e-defende-ajuste-fiscal/", "fonte_id": "infomoney", "data_pub": "2026-07-04T14:05:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Durigan afirma que o Ministério da Economia é a menos responsável pelos juros elevados e defende a necessidade de ajuste fiscal. Ele argumenta que a alta dos juros prejudica a dívida pública atual.", "titulo_pt": "Durigan diz que Fazenda é a menos culpada por juros altos e defende ajuste fiscal", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 35135, "titulo": "Publicação propõe alternativas para exploração de terras raras no país", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-07/publicacao-propoe-alternativas-para-exploracao-de-terras-raras-no-pais", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-04T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Centro de Gestão e Estudos Estratégicos (CGEE) lançou um livro sobre terras raras no Brasil, analisando cenários nacionais e internacionais e estudando cadeias industriais para a produção desses elementos químicos metálicos. A publicação foi assinada por dez engenheiros, pesquisadores e professores universitários.", "titulo_pt": "Publicação sugere alternativas para exploração de terras raras no Brasil", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 35144, "titulo": "Dexco mira economia com inovação trazida por startups", "url": "https://veja.abril.com.br/coluna/radar-economico/dexco-mira-caixa-com-startups/", "fonte_id": "veja", "data_pub": "2026-07-04T14:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O programa de inovação aberta da Dexco já resultou em economias no valor de R$ 10 milhões e está iniciando uma nova fase.", "titulo_pt": "Dexco mira economia com inovação trazida por startups", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 34989, "titulo": "Datafolha: 70% dos brasileiros defendem punir adolescentes infratores como adultos", "url": "https://www.infomoney.com.br/brasil/datafolha-70-dos-brasileiros-defendem-punir-adolescentes-infratores-como-adultos/", "fonte_id": "infomoney", "data_pub": "2026-07-04T13:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa do Datafolha mostrou que 70% dos brasileiros apoiam a punição de adolescentes infratores como adultos. Em comparação com 2022, houve um aumento na proporção de pessoas que defendem essa medida, passando de 65% para 70%. A reeducação foi escolhida por 27% dos entrevistados.", "titulo_pt": "Datafolha: 70% dos brasileiros apoiam punição de adolescentes infratores como adultos", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 34926, "titulo": "De Cachorro Crente a sex shop gospel, marcas evangélicas disputam mercado bilionário", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/de-cachorro-crente-a-sex-shop-gospel-marcas-evangelicas-disputam-mercado-bilionario.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-04T13:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Leandro Lima, que trabalhava na produção de shows evangélicos, decidiu se voltar para sua fé e pediu a Deus um projeto fora desse mercado. Ele deixou o ambiente de ego e vaidade para entrar no universo das marcas evangélicas.", "titulo_pt": "De Cachorro Crente a sex shop gospel, marcas evangélicas disputam bilionário mercado", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 34990, "titulo": "Datafolha: brasileiro prefere pagar menos imposto do que ter serviço público gratuito", "url": "https://www.infomoney.com.br/brasil/datafolha-brasileiro-prefere-pagar-menos-imposto-do-que-ter-servico-publico-gratuito/", "fonte_id": "infomoney", "data_pub": "2026-07-04T13:13:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A pesquisa Datafolha revelou que 59% dos eleitores de Lula preferem pagar mais impostos para receber serviços públicos gratuitos, contra 29% dos eleitores do filho de Jair Bolsonaro.", "titulo_pt": "Datafolha: brasileiro prefere pagar menos imposto do que ter serviço público gratuito", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 35220, "titulo": "La última reforma de la CNV y el mercado de capitales que siempre quisimos tener", "url": "https://www.clarin.com/economia/ultima-reforma-cnv-mercado-capitales-siempre-quisimos-tener_0_iWeWUTtIKp.html", "fonte_id": "clarin", "data_pub": "2026-07-04T13:12:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Carolina Zang, socia de ZBV Abogados, explica os principais aspectos da última reforma na CNV e no mercado de capitais. Os novos regulamentos têm prazos mais curtos e facilitam a entrada de pequenas empresas.", "titulo_pt": "Última reforma da CNV e o mercado de capitais que sempre quisemos ter", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 35061, "titulo": "TRF4 confirma obrigatoriedade do cumprimento de cotas de inclusão para participação em licitações", "url": "https://www.jota.info/trabalho/trf4-confirma-obrigatoriedade-do-cumprimento-de-cotas-de-inclusao-para-participacao-em-licitacoes", "fonte_id": "jota", "data_pub": "2026-07-04T13:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Terceira Turma do Tribunal Regional Federal da Quarta Região (TRF4) confirmou a obrigatoriedade do cumprimento de cotas de inclusão para participação em licitações. A legislação estabelece que empresas devem contratar um percentual entre 2% e 5% de seus empregados entre beneficiários reabilitados ou pessoas com deficiência (PcDs).", "titulo_pt": "TRF4 confirma obrigatoriedade do cumprimento de cotas para inclusão em licitações", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 34969, "titulo": "Mercado vê oportunidade e , "pais": "Brasil", "classe": "B"}, {"id": 34993, "titulo": "Churrasqueira, esportes e mais: 5 atrativos populares ao escolher o barco ideal", "url": "https://www.infomoney.com.br/mercados/churrasqueira-esportes-o-que-precisa-ter-barco-ideal/", "fonte_id": "infomoney", "data_pub": "2026-07-04T12:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os compradores de barcos procuram por experiências únicas, incluindo churrasqueiras e atividades esportivas. O post discute cinco atrativos populares ao escolher o barco ideal.", "titulo_pt": "Churrasqueira, esportes e mais: 5 atrativos populares ao escolher o barco ideal", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 34531, "titulo": "Fila da perícia médica do INSS cai 68% e chega ao menor patamar em 34 meses", "url": "https://www.infomoney.com.br/brasil/fila-da-pericia-medica-do-inss-cai-68-e-chega-ao-menor-patamar-em-34-meses/", "fonte_id": "infomoney", "data_pub": "2026-07-04T12:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A fila para a perícia médica do INSS reduziu 68% e atingiu o menor nível em 34 meses, com 391 mil pedidos pendentes de avaliação.", "titulo_pt": "Fila da perícia médica do INSS cai 68% e chega ao menor patamar em 34 meses", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 34533, "titulo": "40% dos brasileiros associam pobreza à preguiça, diz Datafolha", "url": "https://www.infomoney.com.br/brasil/40-dos-brasileiros-associam-pobreza-a-preguica-diz-datafolha/", "fonte_id": "infomoney", "data_pub": "2026-07-04T11:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa do Datafolha revela que 40% dos brasileiros associam a pobreza à preguiça. Este percentual dobrou nos últimos quatro anos, e entre empresários, 56% compartilham essa percepção.", "titulo_pt": "40% dos brasileiros associam pobreza à preguiça, mostra pesquisa", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 34534, "titulo": "Datafolha: direita ultrapassa esquerda entre eleitores pela 1ª vez desde 2014", "url": "https://www.infomoney.com.br/brasil/datafolha-direita-ultrapassa-esquerda-entre-eleitores-pela-1a-vez-desde-2014/", "fonte_id": "infomoney", "data_pub": "2026-07-04T11:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O estudo do Datafolha indica que a direita superou a esquerda entre os eleitores pela primeira vez desde 2014. A pesquisa destaca uma mudança no comportamento dos votos, com 52% para a direita, 29% para a esquerda e 20% para o centro.", "titulo_pt": "Datafolha: direita ultrapassa esquerda entre eleitores pela primeira vez desde 2014", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 34536, "titulo": "Junho marca 2º mês de saída de estrangeiro da Bolsa, mas saldo segue acima de 2025", "url": "https://www.infomoney.com.br/mercados/junho-marca-2o-mes-de-saida-de-estrangeiro-da-bolsa-mas-saldo-segue-acima-de-2025/", "fonte_id": "infomoney", "data_pub": "2026-07-04T11:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em junho, ocorreu o segundo mês consecutivo de saída de investidores estrangeiros da Bolsa brasileira. No entanto, o saldo acumulado permanece acima do previsto para 2025.", "titulo_pt": "Junho marca segundo mês seguido de saída de estrangeiros da Bolsa, mas saldo mantém-se acima de 2025", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}], "economia__eventos": [], "tecnologia": [{"id": 35745, "titulo": "Chinese firm sells hyper-real, ‘always loyal’ humanoid robots", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/05/2003860234", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma empresa chinesa está vendendo robôs humanóides hiper-realistas e sempre leais. Esses robôs são projetados para parecer muito humanos e oferecem um alto grau de fidelidade emocional.", "titulo_pt": "Empresa chinesa vende robôs humanóides hiper-realistas e sempre leais", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35755, "titulo": "New Google commercial imagines a Declaration of Independence written with help from AI", "url": "https://techcrunch.com/2026/07/04/new-google-commercial-imagines-a-declaration-of-independence-written-with-help-from-ai/", "fonte_id": "techcrunch", "data_pub": "2026-07-04T20:55:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma nova campanha publicitária da Google imagina o que aconteceria se os Pais Fundadores tivessem acesso ao Google Workspace na redação da Declaração de Independência há 250 anos. O comercial questiona como a tecnologia poderia ter impactado essa história importante dos Estados Unidos.", "titulo_pt": "Novo comercial da Google imagina a Declaração de Independência com ajuda do AI", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 35475, "titulo": "Brasil lança primeiro foguete movido a propulsão líquida; veja imagens", "url": "https://www.cnnbrasil.com.br/ciencia/brasil-lanca-primeiro-foguete-movido-a-propulsao-liquida-veja-imagens/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T20:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Brasil realizou o lançamento de seu primeiro foguete movido a propulsão líquida, denominado FTL-Perseu. Este evento coloca o país entre as poucas nações que dominam motores de alta precisão e controle.", "titulo_pt": "Brasil lança primeiro foguete com propulsão líquida; veja imagens", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 35588, "titulo": "Doctors’ soaring use of AI scribes prompts Australian government warning over privacy", "url": "https://www.theguardian.com/australia-news/2026/jul/05/doctors-ai-scribes-australia-government-privacy-warning", "fonte_id": "guardian_world", "data_pub": "2026-07-04T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo australiano expressou preocupações sobre o uso crescente de ferramentas de transcrição por inteligência artificial (AI) nas consultas médicas, enquanto as reguladoras avaliam a necessidade de medidas de segurança. Essas ferramentas automatizam a transcrição e resumo das conversas entre médicos e pacientes para notas médicas.", "titulo_pt": "Regulador australiano alerta sobre uso de AI em consultórios médicos", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 35293, "titulo": "Governo investiga brinquedos com IA por suspeita de violarem privacidade de crianças", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/governo-investiga-brinquedos-com-ia-por-suspeita-de-violarem-privacidade-de-criancas.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-04T19:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério da Justiça está investigando brinquedos inteligentes que podem estar violando as normas do ECA Digital, relativas à privacidade online de crianças e adolescentes. A avaliação indica que esses brinquedos podem não estar cumprindo com as regras estabelecidas pelo estatuto.", "titulo_pt": "Governo investiga brinquedos inteligentes por suspeita de violação de privacidade infantil", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 35397, "titulo": "Gavekal: SpaceX enriqueceu muita gente muito rápido - e isso também tem um lado ruim", "url": "https://exame.com/invest/mercados/gavekal-spacex-enriqueceu-muita-gente-muito-rapido-e-isso-tambem-tem-um-lado-ruim/", "fonte_id": "exame", "data_pub": "2026-07-04T18:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Louis Gave, da Gavekal, observa que o IPO da SpaceX pode representar um risco não bem discutido, relacionado à possibilidade de um fluxo significativo de talentos e riqueza. O sucesso financeiro rápido da empresa está levando a uma dispersão de talentos importantes.", "titulo_pt": "Gavekal: IPO da SpaceX pode levar ao deslocamento de talentos", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 35392, "titulo": "Escola de Bioinsumos na China: Sul Global pode suprir até 50% da demanda de fertilizantes com resíduos orgânicos", "url": "https://www.brasildefato.com.br/2026/07/04/escola-de-bioinsumos-na-china-sul-global-pode-suprir-ate-50-da-demanda-de-fertilizantes-com-residuos-organicos/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-04T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O professor Li Ji, da Universidade de Agricultura da China, afirmou que os países do Sul Global poderiam suprir entre 30% e 50% da demanda por fertilizantes usando resíduos orgânicos locais. Essa afirmação foi feita durante a sexta edição da Escola Internacional de Bioinsumos em Suzhou, China.", "titulo_pt": "Escola de Bioinsumos na China: Sul Global pode suprir até 50% da demanda de fertilizantes com resíduos orgânicos", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 35753, "titulo": "Matic’s robot vacuum is getting a $250 price hike in September", "url": "https://www.theverge.com/gadgets/960753/matic-robot-vacuum-mop-price-increase-cost-buy", "fonte_id": "the_verge", "data_pub": "2026-07-04T16:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Matic está aumentando o preço do seu robô aspirador de pó, elevando-o de US$ 1.245 para US$ 1.495 a partir de 9 de setembro. O aumento reflete uma mudança na estratégia de preços da empresa.", "titulo_pt": "Preço do robô aspirador de pó Matic aumenta em $250 em setembro", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 35760, "titulo": "Submit Your Questions: Inside The World of Online Romance Scams", "url": "https://www.wired.com/story/livestream-book-club-inside-the-world-of-online-romance-scams/", "fonte_id": "wired", "data_pub": "2026-07-04T16:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Carlos Barragão, autor do livro 'Os Meninos da Yahoo', irá responder perguntas sobre os golpistas de romance na Nigéria junto com Kate Knibbs.", "titulo_pt": "Pergunte Sua Pergunta: Dentro do Mundo dos Golpes de Romance Online na Nigéria", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 35405, "titulo": "Meta diz que novo modelo de IA alcançou o GPT-5.5 em capacidades", "url": "https://exame.com/inteligencia-artificial/meta-diz-que-novo-modelo-de-ia-alcancou-gpt-5-5/", "fonte_id": "exame", "data_pub": "2026-07-04T15:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Alexandr Wang anunciou durante uma reunião interna que o novo modelo de IA do Meta, chamado Watermelon, utiliza dez vezes mais computação do que seu modelo anterior e se aproxima das capacidades dos rivais como OpenAI e Anthropic.", "titulo_pt": "Meta afirma que novo modelo de IA atingiu nível equivalente ao GPT-5,5 em capacidades", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 35409, "titulo": "A heterotopia de São Francisco que mostra o futuro de muitos cargos qualificados", "url": "https://exame.com/inteligencia-artificial/a-heterotopia-de-sao-francisco-que-mostra-o-futuro-de-muitos-cargos-qualificados/", "fonte_id": "exame", "data_pub": "2026-07-04T15:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Em São Francisco, observa-se a presença constante de IAs trabalhando nas mesas dos cafés, escrevendo e executando código. Isso reflete uma transformação no mercado de desenvolvimento de software, onde o foco passou de digitar linhas de código para supervisionar as máquinas.", "titulo_pt": "A heterotopia de São Francisco que mostra o futuro de muitos cargos qualificados", "veiculo": "Exame", "pais": "Brasil", "classe": "B"}, {"id": 35186, "titulo": "5 produtos para começar uma casa inteligente pronta para qualquer imprevisto", "url": "https://canaltech.com.br/produtos/5-produtos-para-comecar-uma-casa-inteligente-pronta-para-qualquer-imprevisto/", "fonte_id": "canaltech", "data_pub": "2026-07-04T14:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Investir em dispositivos inteligentes que operam localmente pode evitar problemas caso as marcas encerrem suas atividades. É recomendado optar por produtos compatíveis com padrões de funcionamento autônomo para garantir a continuidade do uso mesmo se os servidores forem desativados.", "titulo_pt": "5 produtos para iniciar uma casa inteligente preparada para imprevistos", "veiculo": "Canaltech", "pais": "Brasil", "classe": "C"}, {"id": 35187, "titulo": "Como o reboot de Batman pode redefinir o super-herói nos cinemas?", "url": "https://canaltech.com.br/entretenimento/como-o-reboot-de-batman-pode-redefinir-o-super-heroi-nos-cinemas/", "fonte_id": "canaltech", "data_pub": "2026-07-04T14:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O reboot de Batman está sendo aguardado com expectativa, especialmente após o sucesso de Superman (2025) dirigido por James Gunn. Nos últimos 40 anos, dez filmes focados em Batman foram lançados, incluindo a Liga da Justiça (2017).", "titulo_pt": "Como o reboot do Batman pode redefinir o super-herói nos cinemas?", "veiculo": "Canaltech", "pais": "Brasil", "classe": "C"}, {"id": 35280, "titulo": "Hey number pad lovers, this is a keyboard we can finally agree on", "url": "https://www.theverge.com/tech/960837/epomaker-rt98-mechanical-keyboard-modular-numpad-review", "fonte_id": "the_verge", "data_pub": "2026-07-04T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O teclado Epomaker RT98 é um mecanográfico com uma estética retrô agradável, uma tela que lembra monitores CRT e compatibilidade VIA. Ele tem sido apreciado por usuários de teclados com padrão numérico, especialmente após o autor ter experimentado este modelo.", "titulo_pt": "Oi amantes do pad numérico, este é um teclado que podemos finalmente concordar", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 35188, "titulo": "Combo de cinema da Samsung: TV QLED 55\" e soundbar por R$ 3 mil", "url": "https://canaltech.com.br/tv/combo-de-cinema-da-samsung-tv-qled-55-e-soundbar-por-r-3-mil/", "fonte_id": "canaltech", "data_pub": "2026-07-04T13:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O combo da Samsung composto pela Smart TV QLED 55\" Vision AI e a soundbar HW-B450F foi descontado, passando de R$ 5.098,00 para R$ 3.004,50 no pagamento via Pix, oferecendo uma economia de mais de R$ 2 mil.", "titulo_pt": "Combo de cinema da Samsung: TV QLED 55\" e soundbar por R$ 3 mil", "veiculo": "Canaltech", "pais": "Brasil", "classe": "C"}, {"id": 35182, "titulo": "Som imersivo sem gastar muito: headsets 7.1 Surround em oferta na Amazon", "url": "https://olhardigital.com.br/2026/07/04/reviews/som-imersivo-sem-gastar-muito-headsets-7-1-surround-em-oferta-na-amazon/", "fonte_id": "olhar_digital", "data_pub": "2026-07-04T13:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os headsets com som surround 7.1 são opções de qualidade para quem busca uma experiência sonora mais imersiva nos jogos, e estão disponíveis em oferta na Amazon. Duas alternativas foram destacadas: o Havit H2230d, que possui drivers de 50mm.", "titulo_pt": "Som imersivo sem gastar muito: headsets 7.1 surround em oferta na Amazon", "veiculo": "Olhar Digital", "pais": "Brasil", "classe": "C"}], "tecnologia__eventos": [], "ciencia": [{"id": 35281, "titulo": "Rising seas make once-rare coastal floods 12 times more likely", "url": "https://phys.org/news/2026-06-seas-rare-coastal.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T14:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Estudos mostram que inundações extremas, que eram raras em comunidades costeiras, estão se tornando 12 vezes mais frequentes devido ao aumento dos níveis do mar causado pelo aquecimento global. Essa frequência aumentada é crucial para a planejamento de enfrentamento às inundações e infraestrutura costeira.", "titulo_pt": "Águas altas fazem inundações costeiras extremas 12 vezes mais comuns", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 35152, "titulo": "Saúde metabólica influencia risco de arritmias, dizem estudos", "url": "https://www.metropoles.com/saude/idade-saude-metabolica-risco-de-arritmias", "fonte_id": "metropoles", "data_pub": "2026-07-04T14:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Estudos indicam que a saúde metabólica, incluindo alterações como resistência à insulina, obesidade e inflamação, influencia o risco de arritmias cardíacas. Essas condições passaram a ser consideradas fatores importantes para o coração.", "titulo_pt": "Saúde metabólica influencia risco de arritmias, dizem estudos", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 35285, "titulo": "Human flight was still 7 years away in 1776. Now, we're headed back to the moon", "url": "https://www.space.com/astronomy/moon/human-flight-was-still-7-years-away-in-1776-now-were-headed-back-to-the-moon", "fonte_id": "space_com", "data_pub": "2026-07-04T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em 1776, quando os Estados Unidos da América foram fundados, a humanidade ainda não havia feito grandes avanços na navegação ou vôo. O primeiro voo humano só ocorreu sete anos depois.", "titulo_pt": "A humanidade ainda estava no chão em 1776. Agora, estamos voltando à lua.", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 35282, "titulo": "Astronomers may have caught an early galaxy in the process of dying", "url": "https://phys.org/news/2026-06-astronomers-caught-early-galaxy-dying.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T13:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Astrônomos podem ter observado uma galáxia em um estágio inicial de sua morte, perdendo seu material formador de estrelas apenas 1,4 bilhões de anos após o Big Bang. Eles notaram sinais que indicam a possível perda de gás estelar naquela época.", "titulo_pt": "Astrônomos podem ter capturado uma galáxia jovem no processo de morrer", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 34968, "titulo": "Ave jurássica com menor cauda longa do mundo surpreende sobre evolução", "url": "https://www.cnnbrasil.com.br/ciencia/ave-jurassica-com-menor-cauda-longa-do-mundo-surpreende-sobre-evolucao/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-04T13:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ave jurássica 'Zhengheornis buyu' possui a cauda mais longa proporcionalmente do que qualquer outro dinossaoro da linhagem aviar conhecido, indicando uma redução rápida no tamanho corporal dessas espécies. Isso sugere que o processo de miniaturização ocorreu muito mais rapidamente do que se supunha anteriormente.", "titulo_pt": "Ave jurássica com menor cauda longa do mundo surpreende sobre evolução", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 35222, "titulo": "Santiago Ramón y Cajal, premio Nobel de medicina: “La casualidad no sonríe a quien la desea, si no al que la merece”", "url": "https://www.clarin.com/internacional/santiago-ramon-cajal-premio-nobel-medicina-casualidad-sonrie-desea-merece_0_EcPIFCcn5S.html", "fonte_id": "clarin", "data_pub": "2026-07-04T13:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Santiago Ramón y Cajal, premiado com o Nobel de Medicina, afirma que a sorte não se conquista através da desejava, mas sim por quem merece. Ele destaca a importância do trabalho e do esforço na realização dos objetivos.", "titulo_pt": "Santiago Ramón y Cajal, vencedor do Nobel de Medicina: 'A sorte não sorri àquele que a deseja, mas ao que a merece'", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 35122, "titulo": "Nobel-winning materials scientist Omar Yaghi joins China’s Tsinghua University from the US", "url": "https://www.scmp.com/news/china/science/article/3359430/nobel-prize-winning-materials-scientist-omar-yaghi-joins-tsinghua-university-us?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Omar Yaghi, vencedor do Prêmio Nobel de Química do ano passado, deixou os Estados Unidos para liderar um novo centro de pesquisa baseado em inteligência artificial na Universidade Tsinghua da China. Ele vai direcionar uma equipe focada no uso de AI para transformar a criação de novos materiais e acelerar significativamente seu desenvolvimento.", "titulo_pt": "Omar Yaghi, vencedor do Nobel de Química, passa para a Tsinghua University", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 35125, "titulo": "Trained AI outperforms biologists at spotting salmon lice", "url": "https://phys.org/news/2026-07-ai-outperforms-biologists-salmon-lice.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T13:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores treinaram modelos de inteligência artificial com mais de 120.000 imagens de larvas de pulgas-do-salmonete e descobriram que as máquinas foram muito mais rápidas e precisas do que biólogos experientes na identificação desses parasitas.", "titulo_pt": "IA treinada supera biólogos em identificar larvas de pulgas-do-salmonete", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 35063, "titulo": "Why Americans are living longer again", "url": "https://www.vox.com/future-perfect/494256/united-states-life-expectancy-death-rates-health-overdose", "fonte_id": "vox", "data_pub": "2026-07-04T12:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Os EUA são um país de saúde única e precária, segundo afirmam seus cidadãos. O atual secretário de Saúde dos Estados Unidos argumenta que a geração atual é a mais doente da história.", "titulo_pt": "Por que os americanos estão vivendo mais novamente", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 34848, "titulo": "Renowned neurobiologist and former taekwondo captain Chih-Ying Su leaves US for China", "url": "https://www.scmp.com/news/china/science/article/3359281/renowned-neurobiologist-and-former-taekwondo-captain-chih-ying-su-leaves-us-china?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-04T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A neurobiologista renomada Chih-Ying Su, especializada na pesquisa do sentido do cheiro usando moscas e mosquitos, deixou sua posição como vice-chefe de faculdade da Universidade da Califórnia em San Diego para se juntar à Shenzhen Academy of Medical Sciences (SMART) como investigadora sênior. A nomeação foi confirmada pelo SMART em 2 de julho.", "titulo_pt": "Neurobióloga Chih-Ying Su, ex-capitã de taekwondo, muda-se para China", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 34896, "titulo": "A young gull's mottled brown plumage acts as a 'not a threat' signal to territorial adults", "url": "https://phys.org/news/2026-07-young-gull-mottled-brown-plumage.html", "fonte_id": "phys_org", "data_pub": "2026-07-04T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Algumas espécies de gaviões, como o gavião-heroniano, passam vários anos desenvolvendo suas penas adultas. Durante esse período, a plumagem marmorizada e café da jovem gavião serve como um sinal 'não é uma ameaça' para os adultos territoriais.", "titulo_pt": "A plumagem marmorizada de jovens gaviões-heronianos atua como um sinal 'não é uma ameaça' para adultos territoriais", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 34916, "titulo": "What did the night sky look like on the 1st Independence Day 250 years ago?", "url": "https://www.space.com/stargazing/what-did-the-night-sky-look-like-on-the-1st-independence-day-250-years-ago", "fonte_id": "space_com", "data_pub": "2026-07-04T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "No aniversário de 250 anos dos Estados Unidos, o céu noturno visto pelos colonos, incluindo Benjamin Franklin, no dia 4 de julho de 1776, é descrito.", "titulo_pt": "O que o céu noturno parecia no primeiro Dia da Independência há 250 anos?", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 34689, "titulo": "The evidence against “ultra-processed” foods is weaker than you think", "url": "https://www.vox.com/future-perfect/494045/ultra-processed-foods-science-rcts", "fonte_id": "vox", "data_pub": "2026-07-04T11:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O termo ' alimentos ultra-processados' (UPFs) passou de uma expressão acadêmica para um dos conceitos mais influentes na imaginação alimentar americana em menos de uma década. A menção a esses alimentos dominou as coberturas midiáticas sobre dieta e doenças, gerando guias que ensinam os consumidores a identificá-los nos supermercados.", "titulo_pt": "A evidência contra 'alimentos ultra-processados' pode não ser tão forte quanto você pensa", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 34904, "titulo": "NASA’s Hubble Spies Stellar Sparkler for July 4th", "url": "https://science.nasa.gov/missions/hubble/nasas-hubble-spies-stellar-sparkler-for-july-4th/", "fonte_id": "nasa_news", "data_pub": "2026-07-04T11:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA's Hubble Space Telescope capturou uma imagem que imita um fureteiro brilhando no céu noturno, com cores vermelho, branco e azul.", "titulo_pt": "Hubble da NASA Captura Estrelas Brilhantes como Fureteiro para o Dia de Independência", "veiculo": "NASA Breaking News", "pais": "EUA", "classe": "A"}, {"id": 34903, "titulo": "For July 4, NASA unveils an astronomical fireworks show, complete with sound effects", "url": "https://www.scientificamerican.com/article/for-july-4-nasa-unveils-an-astronomical-fireworks-show-complete-with-sound-effects/", "fonte_id": "scientific_american", "data_pub": "2026-07-04T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em julho 4, a NASA divulgou imagens da Chandra X-ray Observatory mostrando um espetáculo astronômico, completo com efeitos sonoros. As imagens exibem um show de fogos celestes que superam o tradicional 'glorioso vermelho' dos fogos de artifício.", "titulo_pt": "Para 4 de julho, NASA revela espetáculo astronômico completo com efeitos sonoros", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 34917, "titulo": "30 years on, \"Independence Day\" still proves the versatility of the original \"The War of the Worlds\"", "url": "https://www.space.com/entertainment/space-movies-shows/30-years-on-independence-day-still-proves-the-versatility-of-the-original-the-war-of-the-worlds", "fonte_id": "space_com", "data_pub": "2026-07-04T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Independence Day não é tecnicamente uma adaptação direta de 'A Guerra dos Mundos', mas continua sendo uma das adaptações mais bem-sucedidas do clássico da literatura científica de HG Wells.", "titulo_pt": "30 anos depois, Independence Day mantém a versatilidade de A Guerra dos Mundos", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 35742, "titulo": "Taiwan troupes launch 3-week run at Festival Off Avignon with parade", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/05/2003860267", "fonte_id": "taipei_times", "data_pub": "2026-07-05T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Atrizes e atores de Taiwan estão participando de um espetáculo teatral que durará três semanas no Festival Off Avignon, com uma apresentação inaugural incluindo um desfile.", "titulo_pt": "Troupe de Taiwan inicia espetáculo de 3 semanas no Festival Off Avignon com parade", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 35743, "titulo": "Floating wonders", "url": "https://www.taipeitimes.com/News/taiwan/archiv
