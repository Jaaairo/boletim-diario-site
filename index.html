<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>

</div>

Em primeiro lugar, dois soldados americanos foram mortos no Iêmen após ataques iranianos, elevando para 16 o número total de mortes de tropas norte-americanas na guerra com a Irã. O presidente dos Estados Unidos, Donald Trump, expressou tristeza pelo ocorrido e prometeu vingança. O Irã não confirmou oficialmente uma tregua, mas matou dois soldados americanos na Jordânia em sete noites de ataques, reforçando a tensão entre as duas nações. Em outro desenvolvimento, o artista cubano Luis Manuel Otero Alcántara chegou aos Estados Unidos após cinco anos na prisão, refletindo a crescente pressão política contra seu governo. Além disso, o presidente da Hungria concordou em renunciar após a aprovação de uma emenda constitucional pelo partido de governo, enquanto as relações entre China e Coreia do Norte intensificaram-se com comemorações do 65º aniversário do tratado de defesa mútua.\n\nAs tensões geopolíticas continuam a aumentar com novos ataques e declarações de ambas as partes. Um desenvolvimento importante ocorreu quando dois militares americanos foram mortos durante ataques iranianos na Jordânia, conforme informaram o Exército dos Estados Unidos e a mídia local. As autoridades iranianas ameaçaram responder de forma não limitada, enquanto o presidente Donald Trump declarou que as mortes são 'muito tristes' e afirmou que os EUA não permitiriam que o Irã obtivesse uma arma nuclear. Em resposta, o Irã atacou instalações militares americanas no Golfo, resultando em mais mortes. As tensões se estendem a outros locais: Israel matou uma mulher palestiniana e feriu várias outras durante operações militares em Gaza, enquanto a escassez de combustível afeta a Rússia. A escalada regional tem levado a um aumento das hostilidades no Estreito de Ormuz, com o Irã ameaçando fechar permanentemente o canal sem condições.", "economia": "O Brasil enfrenta desafios econômicos significativos, conforme apontado por um estudo que projeta a dívida pública alcançar 100% do Produto Interno Bruto (PIB) até 2035. Especialistas alertam para a necessidade de novas soluções estruturais na Lei de Diretrizes Orçamentárias de 2028, em face da 'fadiga fiscal'. Em outro desenvolvimento, o Iraque e empresas dos EUA assinaram acordos valendo US$ 60 bilhões para investimentos em rotas alternativas de escoamento de petróleo, visando reduzir a dependência do Estreito de Ormuz. Outros eventos destacados incluem o aumento de capital da Casas Bahia e a proposta de cotas de importação para produtos asiáticos por setores industriais brasileiros, em resposta às tarifas impostas pelos EUA.", "tecnologia": "Uma reforma nas telecomunicações no Taiwan pode permitir a operação do Starlink, conforme anunciado pela Taipei Times. Na área de jogos, as mudanças nos planos da PlayStation Plus em 2026 deixam os usuários em dúvida sobre qual opção é mais vantajosa, segundo o CanalTech. A startup americana Reflect Orbital planeja implantar uma rede de satélites para gerar energia limpa à noite, mas a comunidade científica expressa preocupações com as implicações na observação astronômica. O prédio do Carrefour em São Paulo vai ultrapassar o edifício Platina 220 e definir a nova paisagem urbana da Zona Sul de São Paulo, conforme informado pelo Exame.", "ciencia": "Um estudo recente da NASA indica que a missão Psyche da agência espacial conseguiu um encontro bem-sucedido com Marte, preparando o caminho para a chegada ao asteroide Psyche em 2029. Este evento marca um importante passo na exploração planetária e científica, oferecendo novas perspectivas sobre os materiais constituintes do núcleo de asteroides. Paralelamente, cientistas da Universidade Otto von Guericke Magdeburg conseguiram sintetizar pela primeira vez os componentes-chave da substância natural Neosorangicin A no laboratório, o que abre caminho para o desenvolvimento desta substância como um possível remédio antibacteriano alternativo contra a resistência antimicrobiana. Estudos também indicam que nanopartículas podem remover moléculas imunes prejudiciais do sangue, oferecendo potenciais novos tratamentos para condições autoimunes e inflamatórias. Além disso, um relatório rápido de análise liderado por pesquisadores da London School of Hygiene & Tropical Medicine estima que mais de 2.700 mortes atribuídas ao calor foram registradas na Inglaterra e Gales durante os meses mais quentes do ano, destacando a importância das respostas à mudança climática em saúde pública.", "cultura": "O filme 'A Ódissea', dirigido por Christopher Nolan, teve uma recepção positiva nos cinemas norte-americanos ao arrecadar US$ 51 milhões no primeiro dia de exibição. O longa-metragem, que contou com a atuação intensa da atriz Samantha Morton como Circe, gerou debate acadêmico e público sobre a adaptação do épico de Homero. Em outra notícia cultural, uma pintura do século XVIII foi descoberta durante obras de restauração no Mosteiro de São Bento, em Olinda, após 18 meses de trabalhos. A casa JNG House, projetada pelos arquitetos da BodinChapa Architects, reflete a personalidade do proprietário e se destaca por sua simplicidade e clareza arquitetônica. Além disso, o cantor pernambucano Almério foi o foco da nova edição do programa Cena Musical na TV Brasil, exibida no sábado (18) à meia-noite, apresentando músicas autorais e sucessos em um show exclusivo para a emissora pública.", "sociedade": "A Anvisa proibiu a venda de antissépticos e remédios à base de chicória que não possuem registro sanitário, alertando os consumidores para verificar o registro dos produtos. Em outro evento importante, um homem foi encontrado com múltiplos impactos balísticos em Las Vizcachas, Chile, levando a uma investigação pela Fiscalía ECOH e a Brigada de Homicídios Sur da PDI. A crise na área da saúde mental também é um problema significativo, embora sem detalhes específicos. Além disso, o governo argentino está enfrentando dificuldades na venda da empresa de água AYSÁ, com poucos interessados e restrições legais. Famílias migrantes estão se preparando para possíveis intervenções do ICE, memorizando números de telefone importantes e estabelecendo diretrizes de segurança.", "meio_ambiente": "Um sistema frontal considerado o mais intenso nos últimos 30 anos está afetando grande parte do país, causando danos na rede viária e em sistemas sanitários rurais. O Ministério das Obras Públicas registrou 119 danos na rede viária e 113 problemas nos sistemas sanitários rurais devido à passagem deste sistema frontal. Como resposta, cerca de 1.300 máquinas estão sendo deslocadas para desobstruir neve, rochas e sedimentos em várias regiões do país. Além disso, o impacto da fumaça de incêndios florestais no Canadá também é notável, com o governo planejando evacuar uma comunidade de 600 pessoas ameaçada por incêndios que liberam grande quantidade de fumaça nos Estados Unidos. A fumaça chegou a causar preocupação para a FIFA, que está em alerta para o evento final da Copa no país. Um estudo indica que as plataformas de apostas não autorizadas online representariam cerca de 35% dos rendimentos da indústria de jogos de azar no Chile em 2025, gerando uma arrecadação tributária estimada em US$94 milhões. Em relação à conservação marinha, pesquisadores brasileiros defendem a importância dos tubarões para o ecossistema marinho e sugerem medidas para sua preservação. No Brasil, São Paulo plantou 480.108 árvores desde 2021 em diversas áreas da cidade. O hospital Moinhos de Vento está plantando uma árvore nativa a cada bebê nascido, totalizando mais de 11 mil mudas. Além disso, um estudo descobriu microplásticos em uma grande maioria dos produtos de alimentos infantis analisados, levantando preocupações sobre a segurança alimentar para crianças.", "direitos_humanos": "A Câmara dos Deputados brasileira apresentou uma proposta para tornar o estupro infantil imprescritível, com o objetivo de proteger a dignidade e integridade sexual das crianças. Em contraste, Israel foi acusado de um ataque inédito contra crianças palestinas durante sua campanha atual, conforme relatado por um relatório da Comissão da ONU. Internamente, a Frontex continua suas operações na Grécia, apesar de relatórios do Le Monde mostrarem violações sérias dos direitos dos migrantes. Além disso, em discussões locais sobre direitos humanos no Brasil, o pré-candidato político Flávio criticou a Lei Maria da Penha, comparando-a a um 'pedaço de papel' que não garante proteção efetiva às vítimas de violência doméstica."}, "resumo_do_dia": {"politica_nacional": [{"id": 59581, "titulo": "Girão acompanha Michelle e volta a criticar apoio da direita a Ciro Gomes no Ceará", "url": "https://www.infomoney.com.br/politica/girao-acompanha-michelle-e-volta-a-criticar-apoio-da-direita-a-ciro-gomes-no-ceara/", "fonte_id": "infomoney", "data_pub": "2026-07-18T22:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Girão, pré-candidato ao governo do Ceará pelo partido Novo, acompanhou Michelle Bolsonaro na campanha e criticou novamente o apoio da direita a Ciro Gomes no estado. Esta aliança gerou desgastes na pré-campanha de Flávio Bolsonaro à Presidência após divergências entre eles.", "titulo_pt": "Girão acompanha Michelle e critica novo apoio da direita a Ciro Gomes no Ceará", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 59526, "titulo": "Boeing estima demanda global por 43.625 novos aviões até 2045", "url": "https://www.poder360.com.br/poder-economia/boeing-estima-demanda-global-por-43-625-novos-avioes-ate-2045/", "fonte_id": "poder360", "data_pub": "2026-07-18T22:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Boeing projeta que a demanda global por novos aviões chegará a 43.625 unidades até 2045, com metade dessas entregas destinadas para substituir modelos antigos. A empresa estima uma frota mundial de 50.000 unidades em 2045.", "titulo_pt": "Boeing projeta demanda global por 43.625 novos aviões até 2045", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {" 2026/07/19/2003860979", "fonte_id": "taipei_times", "data_pub": "2026-07-19T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O artigo discute a nova iniciativa chinesa de expansão na África.", "titulo_pt": "Beijing’s new scramble for Africa (a nova corrida chinesa pela áfrica)", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 59449, "titulo": "China channels the Third Reich", "url": "https://www.taipeitimes.com/News/editorials/archives/2026/07/19/2003860980", "fonte_id": "taipei_times", "data_pub": "2026-07-19T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A China está usando estratégias semelhantes às do Terceiro Reich, de acordo com o artigo. O texto sugere que há paralelos nas abordagens das duas entidades.", "titulo_pt": "China adota estratégias do terceiro Reich", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 59702, "titulo": "Deaths of 2 U.S. Troops in Jordan Brings American Toll in the War With Iran to 16", "url": "https://www.nytimes.com/2026/07/18/world/middleeast/us-troops-killed-iran-war-jordan.html", "fonte_id": "nyt_world", "data_pub": "2026-07-18T22:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Dois soldados americanos morreram no Iêmen, aumentando o número de mortes de tropas norte-americanas na guerra com a Irã para 16. O presidente Trump prometeu vingança pelos óbitos.", "titulo_pt": "Mortes de 2 soldados americanos no iêmen elevam balanço da guerra com a Irã para 16; trump promete vingança", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 59590, "titulo": "EUA lançam novos ataques para “punir” Irã por morte de militares americanos", "url": "https://www.cnnbrasil.com.br/internacional/eua-lancam-novos-ataques-para-punir-ira-por-morte-de-militares-americanos/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-18T22:41:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os Estados Unidos lançaram novos ataques como uma reação aos militares americanos que morreram e a um militar desaparecido durante combates. O incidente ocorreu no Comando Central.", "titulo_pt": "EUA lançam novos ataques para 'punir' Irã por mortes de militares americanos", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 59592, "titulo": "EUA emitem alerta a americanos do mundo todo em meio à guerra", "url": "https://www.cnnbrasil.com.br/internacional/eua-emitem-alerta-a-americanos-do-mundo-todo-em-meio-a-guerra/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-18T22:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Departamento de Estado dos Estados Unidos aconselhou seus cidadãos a exercerem maior cautela, especialmente no Oriente Médio. Este alerta foi emitido durante um período de guerra.", "titulo_pt": "EUA emitem alerta para americanos em todo o mundo durante guerra", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 59679, "titulo": "Ucrania lanzó un ataque con drones contra uno de los mercados más grandes de Rusia: 7 muertos y 25 heridos", "url": "https://www.lanacion.com.ar/el-mundo/ucrania-lanzo-un-ataque-con-drones-contra-uno-de-los-mercados-mas-grandes-de-rusia-al-menos-siete-nid18072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-18T22:37:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Ucrânia realizou um ataque com drones contra o maior mercado de Wildberries, na cidade de Kotovsk, região de Tambov, Rússia. O incidente resultou em sete mortes e vinte e cinco feridos, além de causar um incêndio e uma grande coluna de fumaça.", "titulo_pt": "Ucrânia realiza ataque com drones contra mercado russo: 7 mortos e 25 feridos", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 59782, "titulo": "US launches new strikes on Iran after deaths of service members in Jordan", "url": "https://www.middleeasteye.net/live-blog/live-blog-update/us-launches-new-strikes-iran-after-deaths-service-members-jordan", "fonte_id": "middle_east_eye", "data_pub": "2026-07-18T22:35:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Forças dos Estados Unidos iniciaram novos ataques aéreos contra o Irã, conforme determinação do presidente Donald Trump. Os golpes visam diminuir ainda mais as capacidades iranianas de ameaçar o comércio marítimo no Estreito de Ormuz e punir rapidamente forças da Guarda Revolucionária Islâmica.", "titulo_pt": "EUA lançam novos ataques aéreos ao Irã após mortes de militares em jordânia", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"id": 59772, "titulo": "Cuban dissident artist arrives in US after 5 years in prison", "url": "https://www.dw.com/en/cuban-dissident-artist-arrives-in-us-after-5-years-in-prison/a-78021940?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-18T22:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Luis Manuel Otero Alcantara, um artista cubano proeminente e dissidente, chegou aos Estados Unidos após cinco anos na prisão. Ele foi detido em julho de 2021 durante tentativas de participar das massivas manifestações inéditas que ocorreram na ilha comunistade.", "titulo_pt": "Artista cubano dissidente chega aos EUA após 5 anos na prisão", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 59791, "titulo": "Usa, 'iniziati nuovi attacchi contro l'Iran in risposta a raid in Giordania'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/19/usa-iniziati-nuovi-attacchi-contro-liran-in-risposta-a-raid-in-giordania_242189c3-d2a8-4106-87ab-72c2fc18fe6e.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-18T22:28:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O Comando Central dos Estados Unidos iniciou novos ataques contra o Irã como resposta a um ataque no Iêmen. As operações foram lançadas às 18 horas local (meia-noite em Roma).", "titulo_pt": "Estados unidos inicia novos ataques ao Irã em resposta a ataque no iêmen", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 59547, "titulo": "Vídeo mostra ataque do Irã que matou 2 soldados dos EUA na Jordânia", "url": "https://www.metropoles.com/mundo/video-mostra-ataque-do-ira-que-matou-2-soldados-dos-eua-na-jordania", "fonte_id": "metropoles", "data_pub": "2026-07-18T22:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um vídeo mostra um ataque do Irã que resultou na morte de dois soldados dos EUA na Jordânia. Um terceiro soldado está desaparecido.", "titulo_pt": "Vídeo mostra ataque iraniano que matou dois soldados dos EUA na Jordânia", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 59696, "titulo": "El artista cubano Luis Manuel Otero Alcántara llega exiliado a Estados Unidos", "url": "https://elpais.com/us/2026-07-18/el-artista-cubano-luis-manuel-otero-alcantara-llega-exiliado-a-estados-unidos.html", "fonte_id": "elpais_america", "data_pub": "2026-07-18T22:27:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O artista cubano Luis Manuel Otero Alcántara chegou exilado a Miami após o governo dos Estados Unidos conceder um permissoes humanitário. Seu caso reforça as acusações de que o governo cubano usa o desterro como uma condição para libertar seus opositores.", "titulo_pt": "O artista cubano Luis Manuel Otero Alcántara chega exilado a Estados Unidos", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 59792, "titulo": "Trump, 'l'Iran ha annullato l'intesa? Non me ne importa nulla'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/19/trump-liran-ha-annullato-lintesa-non-me-ne-importa-nulla_b0a255a4-20b9-47d5-bea2-1018e8eb5239.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-18T22:21:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O título sugere que Trump comentou sobre as declarações de Teerã, mas não se importa com o anúncio da revogação do acordo nuclear entre Irã e Estados Unidos. Não há informações adicionais sobre o conteúdo das declarações.", "titulo_pt": "Trump, 'o Irã cancelou o acordo? Não me interessa'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 59800, "titulo": "N. Korean state media confirms FM Choe's Russia visit", "url": "https://en.yna.co.kr/view/AEN20260719000300315", "fonte_id": "yonhap_news", "data_pub": "2026-07-18T22:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A mídia estatal norte-coreana confirmou que o Ministro dos Negócios Estrangeiros, Choe Son-hui, visitou a Rússia. A informação foi divulgada em 19 de julho pela agência Yonhap.", "titulo_pt": "Mídia norte-coreana confirma visita do ministro das relações exteriores à Rússia", "veiculo": "Yonhap News Agency", "pais": "Coreia do Sul", "classe": "A"}, {"id": 59724, "titulo": "Hungary’s president agrees to stand down after law change ends his term", "url": "https://www.theguardian.com/world/2026/jul/18/hungarys-president-agrees-to-stand-down-after-law-change-ends-his-term", "fonte_id": "guardian_world", "data_pub": "2026-07-18T22:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente da Hungria, Tamás Sulyok, concordou em renunciar após a aprovação de uma emenda constitucional pelo partido de governo Tisza. A emenda menciona uma 'grave falta de confiança' do povo na liderança eleita em 2024 por parlamentares do antigo partido governante Fidesz.", "titulo_pt": "Presidente da hungria concorda em renunciar após mudança na lei", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 59793, "titulo": "Trump, 'la morte dei due soldati americani in Giordania è molto triste'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/19/trump-la-morte-dei-due-soldati-americani-in-giordania-e-molto-triste_afe27ba7-fbf9-4fa2-a6ce-43d48530b295.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-18T22:09:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O presidente dos Estados Unidos, Donald Trump, expressou tristeza pelo falecimento de dois soldados americanos no Iêmen e reafirmou que a Irã não terá acesso à arma nuclear.", "titulo_pt": "Trump, 'a morte dos dois soldados americanos no iêmen é muito triste'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 59630, "titulo": "Resposta do Irã deixa mortos e aumenta escalada com EUA após rompimento do cessar-fogo", "url": "https://www.bbc.com/portuguese/articles/c5yrjwrr3n8o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-07-18T22:07:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Irã atacou instalações militares americanas na região do Golfo, aumentando a escalada de tensões com os EUA após o rompimento do cessar-fogo. Os ataques resultaram em mortes.", "titulo_pt": "Resposta iraniana causa mortes e intensifica escalada com EUA no golfo", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}], "mundo__eventos": [], "economia": [{"id": 59582, "titulo": "Ilha de excelência que impulsiona o agro, Embrapa enfrenta risco de deterioração", "url": "https://www.infomoney.com.br/economia/ilha-de-excelencia-que-impulsiona-o-agro-embrapa-enfrenta-risco-de-deterioracao/", "fonte_id": "infomoney", "data_pub": "2026-07-18T22:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um relatório de pesquisadores aponta dificuldades financeiras e desafios na contratação de especialistas em IA para a Embrapa, uma empresa estatal. A instituição contesta as conclusões do relatório.", "titulo_pt": "Ilha de excelência que impulsiona o agro enfrenta risco de deterioração", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 59601, "titulo": "País enfrenta “fadiga fiscal” e dívida pode bater 100% até 2035, diz estudo", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/pais-enfrenta-fadiga-fiscal-e-divida-pode-bater-100-ate-2035-diz-estudo/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-18T21:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo indica que o Brasil enfrentará 'fadiga fiscal' e a dívida pública pode atingir 100% do Produto Interno Bruto até 2035. O consultor destaca a necessidade de apresentar novas soluções estruturais para o quadro fiscal no projeto da Lei de Diretrizes Orçamentárias de 2028.", "titulo_pt": "País enfrenta 'fadiga fiscal' e dívida pode chegar a 100% até 2035, diz estudo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 59532, "titulo": "Iraque e empresas dos EUA assinam acordos de US$ 60 bilhões", "url": "https://www.poder360.com.br/poder-internacional/iraque-e-empresas-dos-eua-assinam-acordos-de-us-60-bilhoes/", "fonte_id": "poder360", "data_pub": "2026-07-18T21:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Iraque e empresas dos EUA assinaram acordos valorizados em US$ 60 bilhões. O pacote engloba investimentos em rotas alternativas de escoamento de petróleo com o objetivo de reduzir a dependência do estreito de Ormuz.", "titulo_pt": "Iraque e empresas dos EUA assinam acordos de US$ 60 bilhões", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 59585, "titulo": "Médicos questionam evidências de plano do Pentágono para rastreio de testosterona", "url": "https://www.infomoney.com.br/mundo/medicos-questionam-evidencias-de-plano-do-pentagono-para-rastreio-de-testosterona/", "fonte_id": "infomoney", "data_pub": "2026-07-18T21:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Secretário de Defesa dos Estados Unidos determinou a realização de exames anuais de testosterona em militares ativos. Médicos questionam as evidências subjacentes ao plano do Pentágono.", "titulo_pt": "Médicos questionam evidências de plano do Pentágono para rastreio de testosterona", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 59586, "titulo": "Zema reforça apoio a Ricardo Salles ao Senado e diz que São Paulo atrai oportunistas" r/brasil/tj-sp-nega-cela-especial-a-deolane-bezerra-re-em-processo-com-marcola-do-pcc/", "fonte_id": "infomoney", "data_pub": "2026-07-18T19:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Justiça do Estado de São Paulo negou a influenciadora Deolane Bezerra uma cela especial, mesmo ela alegando ter prerrogativa de advogada para ser transferida para uma Sala de Estado-Maior. Ela está detida desde maio em Tupi Paulista e é ré em um processo relacionado ao líder do PCC, Marcola.", "titulo_pt": "TJ-SP nega cela especial a Deolane Bezerra, ré em processo com Marcola, do PCC", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 59185, "titulo": "Agro, energía y minería impulsarán una liquidación de dólares récord en 2026", "url": "https://www.lanacion.com.ar/economia/agro-energia-y-mineria-impulsaran-una-liquidacion-de-dolares-record-en-2026-nid18072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-18T19:12:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um relatório da Bolsa de Comércio de Rosario destaca que os setores agrícola, energético e minero vão impulsionar a liquidação de dólares no segundo semestre de 2026. A estimativa é de que mais divisas sejam liquidadas neste período do que no primeiro.", "titulo_pt": "Agricultura, energia e mineração devem impulsionar liquidação recorde de dólares em 2026", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 59345, "titulo": "Korean beauty products are becoming mainstream in the U.S. Why there may be even more growth ahead", "url": "https://www.cnbc.com/2026/07/18/korean-beauty-products-are-becoming-mainstream-in-the-us.html", "fonte_id": "cnbc_international", "data_pub": "2026-07-18T19:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Morgan Stanley projeta que as vendas de produtos de beleza coreanos nos Estados Unidos podem chegar a aproximadamente 4 bilhões de dólares em 2026. Os produtos de beleza coreanos es fonte_id": "taipei_times", "data_pub": "2026-07-19T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A estação de pesquisa está desenvolvendo novas variedades de aveia-casca. O objetivo é melhorar as propriedades agronômicas e nutricionais das plantas.", "titulo_pt": "Estação de pesquisa cultiva novas variedades de aveia-casca", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 59795, "titulo": "A hard-boiled fact: Eggs work for dessert, too", "url": "https://www.japantimes.co.jp/life/2026/07/19/food-drink/yudetama-mousse-recipe-dessert-eggs-boiled/", "fonte_id": "japan_times", "data_pub": "2026-07-18T23:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Eggs que estão fora do prazo podem ser transformados em um lanche doce relativamente saudável. Existem algumas maneiras de usar ovos velhos para criar sobremesas.", "titulo_pt": "Fato duro e cru: os ovos também servem para sobremesa", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 59803, "titulo": "New environmental performance index highlights sustainability gains, and the challenges ahead", "url": "https://phys.org/news/2026-07-environmental-index-highlights-sustainability-gains.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T21:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Índice de Desempenho Ambiental 2026 indica que os países europeus continuam liderando no desempenho ambiental, mas poucos estão em linha com o objetivo global de emissões líquidas zero até 2050. O progresso tem se acentuado nas áreas de controle da poluição e gestão dos recursos naturais.", "titulo_pt": "Novo índice de desempenho ambiental destaca avanços e desafios para sustentabilidade", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 59805, "titulo": "Opinion: Beware the unintended consequences of testosterone screening for military servicemembers", "url": "https://www.statnews.com/2026/07/18/military-testosterone-screening-supplements/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-07-18T21:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um urologista que estuda testosterona expressa preocupação sobre as possíveis consequências imprevistas da ampla implementação de exames de testosterona entre militares.", "titulo_pt": "Cuide-se das consequências imprevistas do teste de testosterona para militares", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 59804, "titulo": "Florida bloom toxins turn up in air, suggesting inhalation risk beyond shorelines", "url": "https://phys.org/news/2026-07-florida-bloom-toxins-air-inhalation.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T20:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Estudos sobre as blooms de cianobactérias na Flórida Ocidental demonstram que as toxinas produzidas por essas bactérias podem ser aerossolizadas e, potencialmente, inaladas por pessoas distantes das águas contaminadas.", "titulo_pt": "Toxinas de blooms de cianobactérias na flórida podem ser inhaladas em áreas distantes", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 59472, "titulo": "Scientists use relay synthesis to create key building blocks of reserve antibiotic to combat resistance", "url": "https://phys.org/news/2026-07-scientists-relay-synthesis-key-blocks.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Químicos da Universidade Otto von Guericke Magdeburg, liderados pelo professor Dr. Dieter Schinzer, conseguiram sintetizar pela primeira vez os componentes-chave do substância natural Neosorangicin A no laboratório. Isso abre caminho para o desenvolvimento desta substância como um possível remédio antibacteriano alternativo contra a resistência antimicrobiana.", "titulo_pt": "Cientistas usam síntese relâmpago para criar componentes-chave de substância natural com potencial como reserva antibiótico", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 59473, "titulo": "How virtual reality can transform behavioral science and enhance reproducibility", "url": "https://phys.org/news/2026-07-virtual-reality-behavioral-science.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T19:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de 41 autores, provenientes de todo o mundo, publicou um artigo na Proceedings of the National Academy of Sciences argumentando que a realidade virtual tem potencial para transformar a ciência comportamental e ajudar a resolver a crise de reproduzibilidade.", "titulo_pt": "Como a realidade virtual pode transformar a ciência comportamental e melhorar a reproduzibilidade", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 59474, "titulo": "NASA's Psyche mission delivers Mars flyby data, time-lapse video", "url": "https://phys.org/news/2026-07-nasa-psyche-mission-mars-flyby.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T18:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A missão Psyche da NASA conseguiu com sucesso o encontro com Marte. Agora, os cientistas estão analisando dados recolhidos durante a passagem por Marte em preparação para a chegada ao asteroide Psyche em 2029.", "titulo_pt": "Missão Psyche da nasa realiza voo por marte e coleta dados", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 59485, "titulo": "Mauritius becomes 70th nation to sign the Artemis Accords", "url": "https://spacenews.com/mauritius-becomes-70th-nation-to-sign-the-artemis-accords/", "fonte_id": "spacenews", "data_pub": "2026-07-18T18:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A ilha de Maurício assinou os Acordos Artemis no dia 17 de julho, se juntando à lista de 70 nações que o fizeram em menos de seis anos.", "titulo_pt": "Mauritius se torna a 70ª nação a assinar os acordos Artemis", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 59475, "titulo": "Nanoparticles could remove harmful immune molecules from blood", "url": "https://phys.org/news/2026-07-nanoparticles-immune-molecules-blood.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T17:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Partículas nanométricas podem remover moléculas imunes prejudiciais do sangue. O sistema imunológico, que defende o corpo contra infecções e lesões, pode às vezes se tornar muito ativo, produzindo excessivamente mediadores imunes, fragmentos de material genético ou proteínas que regulam respostas imunes.", "titulo_pt": "Partículas nanométricas poderiam remover moléculas imunes prejudiciais do sangue", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 59486, "titulo": "Space Force triples launch contract ceiling amid rising demand", "url": "https://spacenews.com/space-force-triples-launch-contract-ceiling-amid-rising-demand/", "fonte_id": "spacenews", "data_pub": "2026-07-18T17:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O limite máximo do contrato de lançamento Nacional de Segurança Espacial Fase 3 Lote 1 da Força Espacial foi aumentado de $5,6 bilhões para $17 bilhões. Este aumento ocorre em meio ao aumento da demanda.", "titulo_pt": "Força espacial triplica limite do contrato de lançamento de segurança nacional", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 59476, "titulo": "Butterfly experts are planting 15,000 milkweed plants along Florida roadsides to help monarchs", "url": "https://phys.org/news/2026-07-butterfly-experts-milkweed-florida-roadsides.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T17:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Expertos em borboletas estão plantando 15.000 plantas de leite-flor ao longo das estradas rurais da Flórida para ajudar as monarcas. As áreas adjacentes às vias já são indicadas como áreas de flores silvestres e estão repletas de plantas de leite-flor em plena floração.", "titulo_pt": "Peritos em borboletas estão plantando 15.000 plantas de leite-flor ao longo das estradas rurais da flórida para ajudar as monarcas", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 59487, "titulo": "Pentagon awards $7.1 million to expand U.S. production of cover glass for satellites", "url": "https://spacenews.com/pentagon-awards-7-1-million-to-expand-u-s-production-of-cover-glass-for-satellites/", "fonte_id": "spacenews", "data_pub": "2026-07-18T16:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O Pentágono concedeu um financiamento de $7,1 milhões à Martin Materials Solutions, uma pequena empresa que produz vidro resistente a radiação usado em painéis solares e sistemas de controle térmico de satélites. O objetivo é expandir a produção desse material nos Estados Unidos.", "titulo_pt": "Pentágono destina $7,1 milhões para ampliar produção norte-americana de vidro protetor para satélites", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 59477, "titulo": "More than 2,700 excess deaths estimated in England and Wales during May and June", "url": "https://phys.org/news/2026-07-excess-deaths-england-wales-june.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T16:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de 2.700 mortes atribuídas ao calor foram estimadas durante os recordistas meses de maio e junho de 2026 na Inglaterra e Gales, conforme um relatório rápido de análise liderado por pesquisadores da London School of Hygiene & Tropical Medicine (LSHTM), Imperial College London e do Met Office.", "titulo_pt": "Mais de 2.700 mortes a mais registradas durante os recordistas meses de maio e junho de 2026 na inglaterra e gales, devido ao calor", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 59478, "titulo": "Seasonal gene switch locks fruit flies in winter mode", "url": "https://phys.org/news/2026-07-seasonal-gene-fruit-flies-winter.html", "fonte_id": "phys_org", "data_pub": "2026-07-18T16:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores da Washington State University descobriram um mecanismo molecular que mantém os insetos em um estado de inatividade durante o inverno até que as condições favoráveis retornem. Este achado pode melhorar o controle de pragas e contribuir para uma melhor compreensão das condições sazonais de saúde nos humanos.", "titulo_pt": "Mecanismo molecular mantém insetos em modo de inverno até a chegada das condições favoráveis", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 58935, "titulo": "Vida nas profundezas do mar se beneficia de pedras deixadas por icebergs", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/07/vida-nas-profundezas-do-mar-se-beneficia-de-pedras-deixadas-por-icebergs.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-07-18T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Cientistas a bordo do navio Polarstern observaram um iceberg incomum no estreito de Fram em 2021. Este evento ocorreu entre a Groenlândia e o arquipélago norueguês de Svalbard.", "titulo_pt": "Vida nas profundezas do mar se beneficia de pedras deixadas por icebergs", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}], "ciencia__eventos": [], "cultura": [{"id": 59441, "titulo": "Beginning with a song", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/19/2003861009", "fonte_id": "taipei_times", "data_pub": "2026-07-19T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O texto discute um início com uma música, mas não fornece detalhes adicionais sobre o conteúdo.", "titulo_pt": "Começando com uma canção", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 59443, "titulo": "Nighttime sights", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/19/2003861011", "fonte_id": "ta  "titulo": "Leaks Spotted in New Museum Gallery with WangShui Work as NYC Braces for Floods", "url": "https://www.artnews.com/art-news/news/new-museum-leaks-closure-flash-floods-wangshui-work-1234792787/", "fonte_id": "artnews", "data_pub": "2026-07-18T21:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Furos foram notados em uma nova galeria do Museu New York City, onde está exposta a obra de WangShui. O museu informou que medidas rápidas foram tomadas para resolver o problema e nenhum artefato foi danificado.", "titulo_pt": "Galeria do New Museum com obra de WangShui apresenta furos", "veiculo": "ARTnews", "pais": "EUA", "classe": "B"}, {"id": 59767, "titulo": "'We are trapped in a climate dystopia, a black comedy scenario, where the grotesque rivals the Orwellian farce'", "url": "https://www.lemonde.fr/en/opinion/article/2026/07/18/we-are-trapped-in-a-climate-dystopia-a-black-comedy-scenario-where-the-grotesque-rivals-the-orwellian-farce_6755609_23.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-18T21:31:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ondas de calor se multiplicam e os debates públicos frequentemente se limitam a gestos vazios. Decisões recentes do governo, como o corte nos fundos verdes e a devolução de imóveis energicamente ineficientes ao mercado aluguel, refletem a negação que prevalece entre grande parte da classe política.", "titulo_pt": "Estamos presos em uma dystopia climática, um esboço de comédia negra", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 59512, "titulo": "Marcos Mion admite ter mudado personalidade após críticas de 'haters': 'Dei uma travada'", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://f5.folha.uol.com.br/televisao/2026/07/marcos-mion-admite-ter-mudado-personalidade-apos-criticas-de-haters-dei-uma-travada.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-07-18T21:15:00Z", "idioma": "pt", "provavel_duplicata_de": orte de um bebê de 1 ano foi causada por traumatismo craniano, descartando a possibilidade de engasgamento. A mãe, suspeita de maus-tratos, permanece livre e não compareceu ao velório da criança.", "titulo_pt": "Mãe é presa suspeita de maus-tratos após morte de filho de 1 ano no RS", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 59336, "titulo": "After three heatwaves, French people worry: 'Next year will be worse. How will we cope?'", "url": "https://www.lemonde.fr/en/environment/article/2026/07/18/after-three-heatwaves-french-people-worry-next-year-will-be-worse-how-will-we-cope_6755606_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-18T17:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Franceses de todas as idades têm percebido sua vulnerabilidade às temperaturas extremas, que surpreenderam o país nas últimas semanas. Três ondas de calor consecutivas fizeram com que as pessoas se preocupassem com como lidarão com a situação no próximo ano.", "titulo_pt": "Após três ondas de calor, franceses se preocupam: 'ano que vem será pior. Como vamos aguentar?'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 59444, "titulo": "Brazilian researchers defend the sharks of their coastline", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/19/2003860975", "fonte_id": "taipei_times", "data_pub": "2026-07-19T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pesquisadores brasileiros defendem os tubarões nas costas do país. O estudo destaca a importância dos tubarões para o ecossistema marinho e sugere medidas para sua conservação.", "titulo_pt": "Pesquisadores brasileiros defendem os tubarões das suas praias", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 59711, "titulo": "MOP reporta 119 afectaciones en la red vial y despliega cerca de 1.300 máquinas por sistema frontal", "url": "https://www.latercera.co ontal deja dos socavones en Reñaca y Puchuncaví: cortan rutas y evalúan daños del terreno", "url": "https://www.latercera.com/nacional/noticia/sistema-frontal-deja-dos-socavones-en-renaca-y-puchuncavi-cortan-rutas-y-evaluan-danos-del-terreno/", "fonte_id": "la_tercera", "data_pub": "2026-07-18T16:45:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O sistema frontal causou socavões nas cidades de Reñaca e Puchuncaví, interrompendo rotas e levando as autoridades a pedirem para evitar deslocamentos desnecessários.", "titulo_pt": "Sistema frontal deixa socavões em Reñaca e Puchuncaví: cortam rota e avaliam danos", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 59417, "titulo": "Canada to evacuate Ontario community as wildfire smoke chokes US", "url": "https://www.scmp.com/news/world/united-states-canada/article/3361064/canada-evacuate-ontario-community-wildfire-smoke-chokes-us?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-18T15:05:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo canadense planeja evacuar uma comunidade de 600 pessoas no norte-oeste da Ontario, ameaçada por incêndios florestais que liberam fumaça em larga escala nos Estados Unidos. A ministra federal de Emergências, Eleanor Olszewski, anunciou que o Exército canadense usará aviões para realizar as evacuações na área de Fort Hope.", "titulo_pt": "Canadá planeja evacuar comunidade em Ontario por causa da fumaça dos incêndios florestais", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 58974, "titulo": "Fumaça de incêndios no Canadá chega aos EUA e deixa Fifa em alerta para final da Copa", "url": "https://www.cartacapital.com.br/mundo/fumaca-de-incendios-no-canada-chega-aos-eua-e-deixa-fifa-em-alerta-para-final-da-copa/", "fonte_id": "cartacapital", "data_pub": "2026-07-18T14:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A fumaça de incêndios no Canadá atingiu os Estados Unidos, levando a entidades como a FIFA a estarem em alerta para o evento final da Copa. O presidente dos EUA, Donald Trump, ameaçou aumentar tarifas sobre produtos canadenses para compensar os prejuízos causados pelos incêndios.", "titulo_pt": "Fumaça de incêndios no Canadá atinge EUA e trump ameaça aumento de tarifas", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 59206, "titulo": "Air quality warnings remain in place across US as wildfire smoke continues to swathe country", "url": "https://www.theguardian.com/world/2026/jul/18/air-quality-warnings-canada-wildfires", "fonte_id": "guardian_world", "data_pub": "2026-07-18T14:13:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Alertas de qualidade do ar permanecem em vigor nos Estados Unidos devido às condições atmosféricas causadas por fumaça de incêndios florestais. Chuvas podem aliviar as condições na região do Meio-Ocidental e Nordeste, mas alertas perigosos devem continuar até sábado.", "titulo_pt": "Alertas de qualidade do ar permanecem em vigor nos EUA devido a fumaça de incêndios florestais", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 58615, "titulo": "Estudio del CEP: casinos online representan en Chile un 35% de los ingresos de toda la industria de juegos de azar", "url": "https://www.latercera.com/pulso/noticia/estudio-del-cep-casinos-online-representan-en-chile-un-35-de-los-ingresos-de-toda-la-industria-de-juegos-de-azar/", "fonte_id": "la_tercera", "data_pub": "2026-07-18T11:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um estudo do Centro de Estudos Públicos indica que as plataformas de apostas não autorizadas online representariam cerca de 35% dos rendimentos da indústria de jogos de azar no Chile em 2025. Isso poderia gerar uma arrecadação tributária estimada em US$94 milhões, com base numa alíquota específica de 20% sobre os ganhos brutos.", "titulo_pt": "Estudo do CEP: casinos online representam 35% dos io", "fonte_id": "metropoles", "data_pub": "2026-07-18T18:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O pré-candidato Flávio defendeu uma abordagem mais severa para os agressores de mulheres, comparando a Lei Maria da Penha ao 'pedaço de papel' que não garante proteção efetiva às vítimas. Ele busca ganhar apoio do eleitorado feminino com essa proposta.", "titulo_pt": "Flávio diz que maria da Penha é 'pedaço de papel' e não defende as mulheres", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 59089, "titulo": "Câmara avança com proposta de imprescritibilidade para estupro infantil", "url": "https://www.cnnbrasil.com.br/politica/camara-avanca-com-proposta-de-imprescritibilidade-para-estupro-infantil/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-18T18:24:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Câmara dos Deputados aprovou uma proposta que altera o artigo 5º da Constituição Federal para estabelecer a imprescritibilidade do estupro infantil. A medida visa proteger a dignidade e integridade sexual das crianças.", "titulo_pt": "Câmara aprova proposta de imprescritibilidade para estupro infantil", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 59399, "titulo": "The world must stop Israel's unprecedented assault on Palestinian children", "url": "https://www.middleeasteye.net/opinion/world-must-stop-israels-unprecedented-assault-palestinian-children", "fonte_id": "middle_east_eye", "data_pub": "2026-07-18T12:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um relatório da Comissão da ONU divulgado recentemente revela que Israel está deliberadamente alvo de crianças palestinas em sua campanha atual de genocídio. A comunidade internacional deve intervir para parar essa assalto inédito aos menores palestinos.", "titulo_pt": "Mundo deve impedir ataque inédito de Israel contra crianças palestinas", "veiculo": "Middle East Eye", "pais": "Reino Unido", "classe": "B"}, {"         ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml(topico) : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml(audioKey) {
  const audio = D.audio && D.audio.sumarios && D.audio.sumarios[audioKey];
  if (!audio || !audio.arquivo) return "";
  const src = audio.arquivo + (audio.versao ? "?v=" + encodeURIComponent(audio.versao) : "");
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta" data-audio-src="${esc(src)}" data-audio-key="${esc(audioKey)}">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml("destaque")}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — audio pre-renderizado por Piper
(function () {
  var player = document.createElement('audio');
  player.preload = 'auto';
  player.setAttribute('playsinline', '');
  document.body.appendChild(player);
  var barAtual = null;

  function _resetBar(bar) {
    if (!bar) return;
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  function _setTocando(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _setPausado(bar) {
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
    bar.querySelector('.tts-parar').hidden     = false;
  }

  function _tituloAudio(bar) {
    var h = bar.previousElementSibling;
    while (h && !/^H2$/i.test(h.tagName || '')) h = h.previousElementSibling;
    return h ? (h.innerText || h.textContent || 'Boletim Diario').trim() : 'Boletim Diario';
  }

  function _mediaSession(bar) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: _tituloAudio(bar),
      artist: 'Boletim Diario',
      album: 'Leitura dos sumarios',
    });
    navigator.mediaSession.setActionHandler('play', function () { player.play().catch(function () {}); });
    navigator.mediaSession.setActionHandler('pause', function () { player.pause(); });
    navigator.mediaSession.setActionHandler('stop', function () { player.pause(); player.currentTime = 0; });
  }

  window.ttsOuvir = function (btn) {
    var bar = btn.closest('.tts-bar');
    var src = bar && bar.dataset.audioSrc;
    if (!src) return;
    if (barAtual && barAtual !== bar) _resetBar(barAtual);
    barAtual = bar;
    if (player.src !== new URL(src, window.location.href).href) {
      player.src = src;
      player.currentTime = 0;
    } else {
      player.currentTime = 0;
    }
    _mediaSession(bar);
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _resetBar(bar);
    });
  };

  window.ttsPausar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    _setPausado(bar);
  };

  window.ttsContinuar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.play().then(function () {
      _setTocando(bar);
    }).catch(function () {
      _setPausado(bar);
    });
  };

  window.ttsPar = function (btn) {
    var bar = btn.closest('.tts-bar');
    player.pause();
    player.currentTime = 0;
    _resetBar(bar);
    if (barAtual === bar) barAtual = null;
  };

  player.addEventListener('ended', function () { _resetBar(barAtual); barAtual = null; });
  player.addEventListener('error', function () { _resetBar(barAtual); barAtual = null; });
  window.addEventListener('beforeunload', function () { player.pause(); });
})();
</script>
