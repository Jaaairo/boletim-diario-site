<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=new-title@500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=author@400&display=swap" rel="stylesheet">
<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 28/06/2026 02:48 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">
  <div class="modal-box">
    <h4>Modo Editorial</h4>
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password">
    <div class="modal-erro" id="senha-erro" style="display:none">Senha incorreta.</div>
    <div class="modal-btns">
      <button class="btn-sec2" onclick="fecharModal('modal-senha')">Cancelar</button>
      <button class="btn-pri" onclick="verificarSenha()">Entrar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-flag">
  <div class="modal-box">
    <h4 id="flag-modal-titulo" style="font-size:17px;margin-bottom:14px"></h4>
    <label for="flag-tipo">Tipo de problema</label>
    <select id="flag-tipo">
      <option value="erro_factual">Erro factual</option>
      <option value="erro_traducao">Erro de tradução</option>
      <option value="classificacao_errada">Classificação errada</option>
      <option value="resumo_impreciso">Resumo impreciso</option>
      <option value="outro">Outro</option>
    </select>
    <label for="flag-nota">Nota (opcional)</label>
    <textarea id="flag-nota" placeholder="Descreva o problema..."></textarea>
    <div class="modal-btns">
      <button class="btn-peri" id="btn-rm-flag" onclick="removerFlagAtual()" style="display:none;margin-right:auto">Remover</button>
      <button class="btn-sec2" onclick="fecharModal('modal-flag')">Cancelar</button>
      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "28/06/2026 02:48", "stats": {"noticias_novas": 68, "resumos_gerados": 283}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "O ex-presidente Luiz Inácio Lula da Silva enfrentou uma das conversas mais difíceis de sua vida durante uma reunião com o senador Jaques Wagner, que resultou na perda da liderança do governo. Este episódio foi descrito como um dos momentos mais complicados em seus 80 anos. Em Goiás, Flávio Bolsonaro e Valdemar Costa Neto lançaram as pré-candidaturas do PL para as eleições de 2024. No Rio de Janeiro, a empresa Marcopolo planeja ter mais de 800 carretas privadas até 2030, baseando-se em sua estratégia para o transporte urbano na cidade. A CPTM (Companhia Paulista de Trens Metropolitanos) implantará um horário especial para atender ao jogo do Brasil contra o Japão, marcado para segunda-feira.", "mundo": "Os Estados Unidos e o Irã continuam em conflito após novos ataques militares, com tensões aumentando no Oriente Médio. O governo americano atacou alvos iranianos em Kuwait e Bahrein como resposta a recentes operações contra navios comerciais, enquanto o Irã realizou contra-ataques na região. Donald Trump ameaçou que o Irã 'não existirá mais' se os ataques americanos forem intensificados, colocando sob crescente tensão um acordo frágil de cessar-fogo. Além disso, a Coreia do Sul e Japão concordaram em manter as trocas de defesa, incluindo inteligência artificial, enquanto a Colômbia encerrou o Mundial com uma boa performance contra Portugal. No entanto, um terremoto na Venezuela deixou vítimas brasileiras, como o pastor Romildo Batista de Lima, que morreu ao tentar visitar a família da esposa no país.\n\nOs Estados Unidos e o Irã continuam trocando acusações no Oriente Médio, com ambos alegando que o outro está violando acordos. Após um ataque do Irã a navios comerciais perto do Estreito de Ormuz, os Estados Unidos realizaram novas operações militares em Bahrain e Kuwait, sem relatos de baixas americanas. O Irã respondeu com ataques a instalações militares dos EUA na Bahrein e Kuwait, aumentando as tensões na região. O primeiro-ministro israelense Benjamin Netanyahu descreveu um acordo recente com o Líbano como uma 'marcante vitória' contra o Irã, enquanto o Irã anunciou planos para dois dias de homenagem pública e funeral do líder supremo Ayatollah Seyyed Ali Khamenei. O presidente dos Estados Unidos ameaçou ampliar a ofensiva contra alvos iranianos após novos ataques a navios comerciais no Estreito de Ormuz, com o Irã reivindicando que os Estados Unidos violaram um acordo de cessar-fogo.", "economia": "A economia global e brasileira enfrenta diversos desafios e oportunidades. Em primeiro lugar, a Argentina está considerando emitir novos títulos no exterior devido à redução do risco país e melhorias nas classificações de crédito, o que divide opiniões entre especialistas. No Brasil, a Bolsa pode parecer caro à primeira vista, mas seu potencial de investimento deve ser avaliado considerando fatores como rentabilidade e qualidade das empresas listadas. Além disso, o mercado imobiliário brasileiro está se preparando para investimentos em tecnologias digitais no valor de R$ 2 trilhões até 2029, com destaque para data centers. Em outro contexto, a Coreia do Sul registrou um preço médio do combustível abaixo de R$ 1,30 por litro pela segunda vez consecutiva, refletindo uma queda nos preços globais. No exterior, a SpaceX continua expandindo suas operações no setor imobiliário dos Estados Unidos, enquanto empresas como Polymarket enfrentam investigações sobre a legalidade de seus mercados de previsões. Ainda, o governo Trump liberou um novo modelo da empresa Anthropic para um grupo limitado de parceiros, após tensões com o setor da inteligência artificial por causa das políticas regulatórias do governo.", "tecnologia": "As tecnologias de inteligência artificial (IA) continuam a dominar o cenário global. Nota-se especialmente a decisão das defesas sul-coreana e japonesa de intensificar sua cooperação em projetos de AI. O iPhone dobrável da Apple também avança rumo ao lançamento previsto para 2026, mantendo-se no cronograma apesar dos desafios técnicos. Em Shenzhen, a China expande o uso de veículos autônomos como parte de sua transição para um mercado net-zero. Empresas taiwanesas e internacionais buscam novos mercados e soluções tecnológicas nessa área. A preocupação com o lixo eletrônico cresce no setor de semicondutores, levando as indústrias a buscar alternativas mais sustentáveis. Além disso, a IA se estende para áreas como relógios inteligentes e segurança cibernética, com empresas adaptando suas estratégias em resposta à rápida evolução tecnológica.", "ciencia": "Um terremoto de magnitude 6.1 ocorreu perto da costa do estado de Iwate, no Japão, aumentando a preocupação com o aumento das temperaturas e as consequências para a saúde pública. O governo japonês planeja reduzir o número anual de mortes por calor abaixo de 1.000, uma vez que as temperaturas extremas têm causado recordes em vários países da Europa. Um novo estudo publicado na revista Scientific American destaca um biólogo e neurocientista brasileiro como emergente no campo científico, reconhecido pela sua contribuição promissora. Além disso, pesquisadores do Instituto de Ciência Física de Hefei, na Academia Chinesa de Ciências, desenvolveram um sistema tridimensional baseado em laser que permite a visualização de microfendas e recuperação quantitativa das taxas de emissão de metano. Um novo estudo liderado pelo Professor Joongoo Lee, da POSTECH, reduziu o custo de construção de sistemas celulares reconstituídos por 95%, um avanço que pode revolucionar a produção de proteínas fora das células vivas.", "cultura": "A CineOP - Mostra Internacional de Cinema de Ouro Preto, na sua 21ª edição, se destacou como um importante evento cultural. Reunindo pesquisadores, realizadores e educadores, o festival debatia sobre a preservação do patrimônio audiovisual e políticas públicas. Durante o evento, foram exibidos filmes e realizadas oficinas que discutiam o futuro da preservação no Brasil. A mostra também consolidou seu papel como principal espaço nacional para discussões sobre o tema, reunindo arquivistas e gestores culturais. Além disso, promoveu a formação de novas gerações através das discussões e atividades realizadas. Em outro contexto cultural, a atriz Eva Green foi hospitalizada após sofrer uma lesão na perna durante as gravações da terceira temporada de 'Wandinha', da Netflix, em Dublin, destacando um evento mais específico mas relevante no cenário artístico internacional.", "sociedade": "Um terremoto na Venezuela, ocorrido na última quarta-feira, 24 de junho, agravou ainda mais um sistema de saúde já deteriorado. De acordo com relatos do BBC Brasil, os hospitais estão completamente lotados e a infraestrutura médica está sendo testada por esta emergência médica descomunal. A situação é crítica, com ajuda internacional e venezuelanos trabalhando juntos para resgatar sobreviventes, incluindo animais como o cão Tsunami, um farejador especializado em deslizamentos de escombros que salvou vidas durante os terremotos. Além disso, o Brasil enviou kits médicos para auxiliar a Venezuela, que podem atender até 1,5 mil pessoas por mês. Em outro contexto, o número de estudantes vocacionais tem diminuído em vários sistemas educacionais, conforme relata o Taipei Times.", "meio_ambiente": "A onda de calor extremamente atípica que assola a Europa tem causado preocupação e mortes. Desde junho, foram registrados 74 afogamentos na França. Em várias partes da região, temperaturas acima de 40°C têm quebrado recordes históricos. A Alemanha registrou o recorde nacional de calor este ano com 41,3 °C, enquanto a Itália e outros países enfrentam condições semelhantes. Na Amazônia, um sistema indígena de agricultura milenar oferece uma alternativa sustentável à agricultura moderna, sem a utilização de agrotóxicos e retornando áreas cultivadas à floresta após cinco anos. No entanto, na Venezuela, a situação nos Andes é alarmante: 1.430 mortes foram registradas em terremotos que afetaram cerca de 6,8 milhões de pessoas, gerando preocupação entre as equipes de resgate e operações de socorro. Além disso, na China, o governo implementou o maior projeto de desvio d'água do mundo, com planos ambiciosos ainda por vir, enquanto na Suíça os glaciares estão derretendo a um ritmo alarmante devido à onda de calor.", "direitos_humanos": "Um neonazista brasileiro, João Guilherme Correa, condenado por assassinato, foi preso na Itália após fugir desde março de 2025. Além do crime, ele deve ser julgado por pertencer a um grupo internacional que adora Hitler. As autoridades estão investigando um femicídio em Labranza e a fiscalia pediu ampliação da detenção do suspeito. Em outro caso, uma família na Índia espera justiça há oito anos após seu filho ser estuprado. A situação humanitária de crianças na Venezuela é grave, com cerca de 680 mil necessitando de assistência após os terremotos. Enquanto isso, a China celebra a história de Xu Junyun, conhecida como 'Mulher Aranha', que limpa edifícios altos para sustentar o filho e sua mãe doente. O caso de um instrutor de diabolo condenado por espionagem foi rejeitado em apelação, enquanto uma fundação taiwanesa trabalha para promover a integração entre indígenas e a sociedade local através de projetos culturais e educativos."}, "resumo_do_dia": {"politica_nacional": [{"id": 22508, "titulo": "Governo de SC acusa Lula de xenofobia e aciona PGR", "url": "https://www.metropoles.com/brasil/governo-de-sc-diz-que-vai-acionar-pgr-por-fala-de-lula-sobre", "fonte_id": "metropoles", "data_pub": "2026-06-28T02:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo de Santa Catarina acusou o ex-presidente Lula de xenofobia após um comentário feito durante um evento em Itajaí. O governo entendeu que houve uma discriminação.", "titulo_pt": "Governo de SC acusa Lula de xenofobia", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 22408, "titulo": "Flávio Bolsonaro se ausentou em 43% das votações nominais do Senado este ano", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/flavio-bolsonaro-se-ausentou-em-43-das-votacoes-nominais-do-senado-este-ano.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio Bolsonaro (PL-RJ) não votou em 43% das deliberações nominais do Senado neste ano, de acordo com um levantamento da Folha. Ele é o quinto parlamentar que mais se ausentou nas votações, entre as 49 matérias analisadas até 22 de junho.", "titulo_pt": "Flávio Bolsonaro se ausentou em 43% das votações nominais do Senado este ano", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 22409, "titulo": "Entrada da PF pode mudar o jogo no caso Lojas Americanas", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/eliogaspari/2026/06/entrada-da-pf-pode-mudar-o-jogo-no-caso-lojas-americanas.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-28T02:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal realizou u
