<style>
  :root {
    --bg:     #FDFAF5;
    --panel:  #EBE1D1;
    --border: #D4C5AF;
    --texto:  #1C2E20;
    --texto2: #41644A;
    --verde:  #0D4715;
    --acento: #E9762B;
    --tint:   #F7C5A0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--verde); border-bottom: 3px solid var(--acento); }
  header h1 { font-family: 'Cinzel', Georgia, serif;
              font-size: 76px; font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: 3px;
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--verde); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--verde); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'Cormorant Infant', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--acento); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'Cormorant Infant', Georgia, serif;
       font-size: 48px; font-style: italic; font-weight: 700;
       color: var(--verde); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'Cormorant Infant', Georgia, serif;
             font-size: 20px; font-weight: 600; line-height: 1.35;
             margin-bottom: 6px; color: var(--verde); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--verde); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--verde); color: var(--verde); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--verde); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }
</style>
</head>

<script>
const D = {"gerado_em": "18/06/2026 10:18", "stats": {"noticias_total": 3535, "resumos_total": 256, "sem_topico": 0, "ultima_coleta": "2026-06-18T12:53:18Z"}, "rotulos_topico": {"politica_nacional": "Política Nacional", "politica_internacional": "Política Internacional", "cultura": "Cultura", "ciencia_tecnologia": "Ciência & Tecnologia"}, "topicos": ["politica_nacional", "politica_internacional", "cultura", "ciencia_tecnologia"], "sinteses": {"ciencia_tecnologia": "A Waymo está recuperando cerca de 4.000 veículos autônomos por questões de segurança, após incidentes onde os carros entraram em zonas de construção sem reconhecer o risco. Em outro desenvolvimento na área da inteligência artificial, as ações da consultoria Accenture estão caindo significativamente devido às preocupações sobre como a tecnologia pode afetar seu modelo de negócios. Na ciência, dois físicos dos Estados Unidos propõem que os nove anéis concêntricos na galáxia LEDA 1313424 foram formados por partículas de matéria escura em comportamento quântico. A Boeing demonstrou um dispositivo quântico terrestre antes do experimento orbital programado para 2027, enquanto a busca pela matéria escura foi reaberta com foco em candidatos alternativos como as partículas pesadas interagindo debilmente (WIMPs). Em tecnologia doméstica, o Samsung The Frame Pro 2026 apresenta melhorias significativas e a série de bruxas 'As Bruxas Mayfair' estreou na Netflix. A NASA anunciou que o Telescópio Espacial Hubble Space Telescope capturou imagens de um grupo de galáxias em fusão, enquanto pesquisadores da Texas A&M AgriLife enviaram sementes de uvas para a Estação Espacial Internacional para estudos sobre a radiação cósmica. Além disso, uma missão de reboost orbital está programada para lançamento e a União Europeia rejeitou a proposta de manter jogos antigos vivos após o fim do ciclo comercial.", "cultura": "O Dia da Bandeira será comemorado no sábado, 19 de junho, em todo o país argentino. A cidade de Buenos Aires prepara-se para receber diversas atividades gratuitas durante a Fiesta do Sol, que inclui música ao vivo, opções gastronômicas e artesanatos. Além disso, os valores da Asignación Universal por Hijo (AUH) foram ajustados em 2,15% para julho, enquanto os benefícios previdenciários dos aposentados também receberão um reajuste equivalente ao último índice de inflação, com um bono extraordinário.", "politica_internacional": "Um acordo de paz entre Estados Unidos e Irã foi assinado, oferecendo esperança para o fluxo de petróleo no Estreito de Ormuz. O estreito, usado por cerca de um quinto da produção mundial de petróleo, poderia ser reaberto após os conflitos recentes. No entanto, as projeções de preços do barril feitas pelos grandes bancos estão diminuindo, sugerindo incertezas sobre a estabilidade econômica global. Paralelamente, o Secretário de Defesa dos Estados Unidos, Pete Hegseth, anunciou uma revisão de seis meses das forças americanas na Europa e criticou os aliados da OTAN por não cumprir compromissos financeiros. As discussões sobre a presença militar americana em bases europeias, como as espanholas, continuam tensionadas com ameaças de redução de contribuições se os países não aumentarem seus gastos militares.", "politica_nacional": "A Polícia Federal (PF) deflagrou uma nova fase da Operação Compliance Zero, a 9ª, com foco no senador Jaques Wagner (PT-BA), líder do governo Lula no Senado. A decisão judicial que autorizou esta operação, emitida pelo ministro André Mendonça do Supremo Tribunal Federal (STF), detalha suspeitas envolvendo mensagens e repasses financeiros. Segundo a PF, Wagner teria atuado em favor do Banco Master em temas relacionados a crédito consignado. O senador, de 75 anos, é pré-candidato à reeleição e aliado próximo ao presidente Lula, tendo sido considerado para ser o candidato petista em 2018 antes de uma operação policial em seu apartamento. A PF também investiga indícios de que Wagner teria recebido vantagens indevidas, incluindo um apartamento e R$ 3,5 milhões, em troca de atuação política no Congresso Nacional. O ministro Durigan da Fazenda defendeu o senador após a operação, afirmando confiar nele e que ele poderá esclarecer as suspeitas. Além disso, a CNI divulgou uma carta com sugestões para pré-candidatos à Presidência, abordando mudanças em regras trabalhistas, previdenciárias e de segurança no trabalho."}, "resumo_do_dia": {"politica_nacional": [{"id": 2947, "titulo": "Leia a decisão de André Mendonça que autorizou operação da PF contra Jaques Wagner", "url": "https://www.cartacapital.com.br/politica/leia-a-decisao-de-andre-mendonca-que-autorizou-operacao-da-pf-contra-jaques-wagner/", "fonte_id": "cartacapital", "data_pub": "2026-06-18T12:57:00Z", "idioma": "pt", "texto_pt": "A decisão judicial detalha as suspeitas apuradas pela Polícia Federal contra o senador Jaques Wagner, mencionando mensagens, repasses financeiros e possíveis atuações em favor do Master.", "titulo_pt": "Leia a decisão de André Mendonça que autorizou operação da PF contra Jaques Wagner", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 2798, "titulo": "Quem é Augusto Lima, ex-sócio de Vorcaro e alvo de operação da PF", "url": "https://www.cnnbrasil.com.br/politica/quem-e-augusto-lima-ex-socio-de-vorcaro-e-alvo-de-operacao-da-pf/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-18T12:55:00Z", "idioma": "pt", "texto_pt": "Investigadores realizaram buscas em 18 mandados na manhã desta quinta-feira.", "titulo_pt": "Quem é Augusto Lima, ex-sócio de Vorcaro e alvo de operação da PF?", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 2825, "titulo": "Rüdiger não liga para a fama de bicho-papão: “meu nome gera muitos cliques”", "url": "https://www.infomoney.com.br/esportes/rudiger-nao-liga-para-a-fama-de-bicho-papao-meu-nome-gera-muitos-cliques/", "fonte_id": "infomoney", "data_pub": "2026-06-18T12:54:00Z", "idioma": "pt", "texto_pt": "O jogador da Alemanha e reserva da seleção, Rüdiger, enfrent ulo": "Partido Comunista de Cuba aprova reformas para maior economia de mercado", "url": "https://www.cartacapital.com.br/mundo/partido-comunista-de-cuba-aprova-reformas-para-maior-economia-de-mercado/", "fonte_id": "cartacapital", "data_pub": "2026-06-18T12:41:00Z", "idioma": "pt", "texto_pt": "O Partido Comunista de Cuba aprovou medidas que prevêem a abertura de novos setores para investimentos privados e uma redução no tamanho do Estado.", "titulo_pt": "Partido Comunista de Cuba aprova reformas para maior economia de mercado", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 2727, "titulo": "Saiba como Jaques Wagner teria atuado em benefício do Banco Master, segundo a PF", "url": "https://g1.globo.com/politica/blog/andreia-sadi/post/2026/06/18/pf-operacao-jaques-wagner.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-18T12:40:00Z", "idioma": "pt", "texto_pt": "A Polícia Federal autorizou mandados contra o senador Jaques Wagner (PT-BA) na 9ª fase da Operação Compliance Zero. Segundo relatos, haveriam indícios de que ele teria atuado em favor do Banco Master em temas relacionados a crédito consignado.", "titulo_pt": "Saiba como Jaques Wagner teria atuado a favor do Banco Master, segundo a PF", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 2744, "titulo": "Durigan diz que governo socializou ganhos extras com guerra no Irã", "url": "https://www.poder360.com.br/poder-economia/durigan-diz-que-governo-socializou-ganhos-extras-com-guerra-no-ira/", "fonte_id": "poder360", "data_pub": "2026-06-18T12:40:00Z", "idioma": "pt", "texto_pt": "O ministro afirmou que receitas adicionais provenientes do aumento do preço do petróleo foram empregadas sem violar a meta fiscal estabelecida.", "titulo_pt": "Durigan afirma que governo utilizou ganhos extras da guerra no Irã sem descumprir meta fiscal", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 2807, "titulo": "Segurança e proteção de investimentos no Inter: veja perguntas e respostas", "url": "https://www.cnnbrasil.com.br/economia/negocios/seguranca-e-protecao-de-investimentos-no-inter-veja-perguntas-e-respostas/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-18T12:40:00Z", "idioma": "pt", "texto_pt": "A instituição financeira oferece serviços regulados por autoridades, possui um desempenho positivo e implementa várias camadas de segurança em suas plataformas.", "titulo_pt": "Segurança e proteção de investimentos no Inter: veja perguntas e respostas", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 2745, "titulo": "Bolsas de Japão e Coreia do Sul fecham em alta recorde", "url": "https://www.poder360.com.br/poder-economia/bolsas-de-japao-e-coreia-do-sul-fecham-em-alta-recorde/", "fonte_id": "poder360", "data_pub": "2026-06-18T12:39:00Z", "idioma": "pt", "texto_pt": "As bolsas de valores de Tóquio, no Japão, e Seul, na Coreia do Sul, encerraram o dia com altas recordistas, impulsionadas pelo bom desempenho das empresas de tecnologia e por um acordo de paz entre Estados Unidos e Irã.", "titulo_pt": "Bolsas de Tóquio e Seul fecham em alta recorde", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 2746, "titulo": "Durigan afirma que ainda vê espaço para novos cortes na Selic", "url": "https://www.poder360.com.br/poder-economia/durigan-afirma-que-ainda-ve-espaco-para-novos-cortes-na-selic/", "fonte_id": "poder360", "data_pub": "2026-06-18T12:37:00Z", "idioma": "pt", "texto_pt": "O ministro declara que o governo já realizou medidas para contenção orçamentária e espera que a política monetária considere melhorias na inflação.", "titulo_pt": "Durigan afirma que há espaço para novos cortes na Selic", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 2793, "titulo": "BH decide liberar servidores 2h antes de partidas do Brasil na Copa", "url": "https://www.metropoles.com/minas-gerais/bh-decide-liberar-servidores-2h-antes-de-partidas-do-brasil-na-copa", "fonte_id": "metropoles", "data_pub": "2026-06-18T12:37:00Z", "idioma": "pt", "texto_pt": "A Prefeitura de Belo Horizonte permitirá que os servidores saiam 2 horas antes dos jogos da seleção brasileira na Copa. Quem optar por essa medida precisará compensar as horas não trabalhadas até o dia 31 de agosto, conforme informado pela administração municipal.", "titulo_pt": "Belo Horizonte decide liberar servidores 2 horas antes das partidas do Brasil na Copa", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}], "politica_internacional": [{"id": 2959, "titulo": "Petróleo está cerca de su nivel previo a la guerra mientras bajan proyecciones de los grandes bancos para el precio del barril", "url": "https://www.latercera.com/pulso/noticia/petroleo-baja-y-caen-proyecciones-para-precio-tras-fin-guerra/", "fonte_id": "la_tercera", "data_pub": "2026-06-18T12:56:00Z", "idioma": "es", "texto_pt": "Um acordo de paz entre Estados Unidos e Irã inclui a abertura do Estrecho de Ormuz, que era usado por cerca de um quinto da produção mundial de petróleo antes dos conflitos. As projeções de preços do barril feitas pelos grandes bancos estão diminuindo.", "titulo_pt": "Petroleo está perto do seu nível previo à guerra enquanto baixam projeções de grandes bancos para o preço do barril", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 3032, "titulo": "EE UU anuncia una revisión de su presencia militar en Europa y del compromiso de los aliados con Trump", "url": "https://elpais.com/internacional/2026-06-18/ee-uu-lanza-una-revision-de-su-presencia-militar-en-europa-y-del-compromiso-de-los-aliados-con-trump.html", "fonte_id": "elpais_america", "data_pub": "2026-06-18T12:55:00Z", "idioma": "es", "texto_pt": "Um representante dos EUA criticou países, como a Espanha, que negaram o uso de suas bases militares para operações contra o Irã. O governo americano ameaçou reduzir sua contribuição na Aliança se os aliados não aumentarem seus gastos militares.", "titulo_pt": "EUA anuncia revisão de presença militar na Europa e compromisso dos aliados com Trump", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 2799, "titulo": "Lenda do México, Jorge Campos será “presidente da Fifa” por um dia; entenda", "url": "https://www.cnnbrasil.com.br/esportes/futebol/copa-do-mundo/lenda-do-mexico-jorge-campos-sera-presidente-da-fifa-por-um-dia-entenda/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-18T12:54:00Z", "idioma": "pt", "texto_pt": "O ex-goleiro mexicano Jorge Campos fez uma aparição ao lado do presidente da FIFA após assistir a um jogo da Copa.", "titulo_pt": "Lenda do México, Jorge Campos será 'presidente da Fifa' por um dia; entenda", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 2800, "titulo": "Israel negocia com os EUA a continuidade de tropas no Líbano, dizem fontes", "url": "https://www.cnnbrasil.com.br/internacional/israel-negocia-com-os-eua-a-continuidade-de-tropas-no-libano-dizem-fontes/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-18T12:54:00Z", "idioma": "pt", "texto_pt": "Acordo firmado entre Washington e Teerã prevê a proteção da soberania libanesa, mas Israel não está disposto a retirar suas forças do país.", "titulo_pt": "Israel negocia com EUA a permanência de tropas no Líbano, dizem fontes", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 2960, "titulo": "Kast encabeza cita de emergencia en La Moneda con los tres poderes del Estado por eventual tráfico de niños haitianos", "url": "https://www.latercera.com/politica/noticia/kast-encabeza-cita-de-emergencia-en-la-moneda-con-los-tres-poderes-del-estado-por-eventual-trafico-de-ninos-haitianos/", "fonte_id": "la_tercera", "data_pub": "2026-06-18T12:53:00Z", "idioma": "es", "texto_pt": "O caso de menores haitianos está sendo investigado pela Procuradoria Centro Norte e gerou preocupação entre as principais autoridades do país. Uma reunião de emergência foi convocada na La Moneda envolvendo os três poderes do Estado para discutir a situação.", "titulo_pt": "Kast lidera reunião de emergência na La Moneda com os três poderes do Estado sobre possível tráfico de crianças haitianas", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 3016, "titulo": "Iran War Live Updates: Oil Prices Fall as U.S.-Iran Deal Offers Hope for Shipping", "url": "https://www.nytimes.com/live/2026/06/18/world/iran-war-trump-us-deal", "fonte_id": "nyt_world", "data_pub": "2026-06-18T12:53:00Z", "idioma": "en", "texto_pt": "Um acordo inicial foi assinado por ambas as partes, o que pode permitir o fluxo de petróleo novamente pelo Estreito de Ormuz. No entanto, os termos de um possível acordo a longo prazo permanecem incertos enquanto discussões mais difíceis estão por vir.", "titulo_pt": "Atualizações da Guerra do Irã: Preços do Petróleo Caem com Acordo Inicial entre EUA e Irã", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 2986, "titulo": "Tomará, ahora, CNTE oficinas de Afores en Reforma", "url": "https://www.reforma.com/tomara-ahora-cnte-oficinas-de-afores-en-reforma/ar3224891", "fonte_id": "reforma_mx", "data_pub": "2026-06-18T12:52:00Z", "idioma": "es", "texto_pt": "A CNTE (Conselho Nacional dos Trabalhadores da Educação) iniciará mobilizações nas oficinas de principais Afores localizadas no Paseo de la Reforma, após quase um mês de manifestações na capital.", "titulo_pt": "CNTE tomará agora as sedes das Afores em Reforma", "veiculo": "Reforma (México)", "pais": "México", "classe": "B"}, {"id": 3273, "titulo": "Funda shakes up its fees, will let sellers advertise directly", "url": "https://www.dutchnews.nl/2026/06/funda-shakes-up-its-fees-will-let-sellers-advertise-directly/", "fonte_id": "dutch_news", "data_pub": "2026-06-18T12:52:00Z", "idioma": "en", "texto_pt": "A plataforma imobiliária Funda está elevando seus preços, o que pode custar mais para corretoras de imóveis e outros vendedores. A empresa também permitirá que os vendedores anunciem diretamente em seu site.", "titulo_pt": "Funda aumenta suas ://www.latercera.com/culto/noticia/las-claves-de-la-serie-star-city-o-todo-lo-que-nunca-supimos-del-programa-espacial-de-la-urss/", "fonte_id": "la_tercera", "data_pub": "2026-06-18T12:35:00Z", "idioma": "es", "texto_pt": "A série de ficção Apple TV+ explora os esforços da União Soviética para dominar o espaço durante a Guerra Fria. Os criadores e um ator da produção explicam como desenvolveram uma ucronia baseada em fatos reais, destacando que a necessidade de contar mais histórias levou à criação independente dessa série.", "titulo_pt": "As Chaves da Série Star City (ou Tudo o Que Nunca Sabemos do Programa Espacial da URSS)", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 2936, "titulo": "¿Es feriado mañana, viernes 19 de junio, por el Día de la Bandera en la Argentina?", "url": "https://www.lanacion.com.ar/feriados/2026/es-feriado-manana-viernes-19-de-junio-por-el-dia-de-la-bandera-nid18062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-18T12:32:00Z", "idioma": "es", "texto_pt": "O Dia da Bandeira será comemorado no sábado, 19 de junho, em todo o país argentino. Há possibilidade de um feriado prolongado se houver um 'puente' feriados consecutivos.", "titulo_pt": "Será feriado no sábado, 19 de junho, pelo Dia da Bandeira na Argentina?", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 3473, "titulo": "Post your questions for Minions supremo Pierre Coffin", "url": "https://www.theguardian.com/film/2026/jun/18/post-your-questions-for-minions-supremo-pierre-coffin", "fonte_id": "guardian_culture", "data_pub": "2026-06-18T12:32:00Z", "idioma": "en", "texto_pt": "O animador e dublador Pierre Coffin, responsável por dirigir cinco filmes da franquia Minions, está respondendo a perguntas do público. O filme 'Minions & Monsters' será lançado no próximo mês, aproveitando o fim de semana do feriado da Independência dos Estados Unidos para aumentar as vendas nas bilheterias.", "titulo_pt": "Pergunte ao criador dos Minions", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "B"}, {"id": 2937, "titulo": "A dos horas de CABA y gratis: llega el festival ideal para festejar el Día de la Bandera en familia", "url": "https://www.lanacion.com.ar/sociedad/a-dos-horas-de-caba-y-gratis-llega-el-festival-ideal-para-festejar-el-dia-de-la-bandera-en-familia-nid16062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-18T12:31:00Z", "idioma": "es", "texto_pt": "A poucos kilômetros da cidade, haverá música ao vivo, opções gastronômicas e artesanatos durante a Fiesta do Sol, ideal para celebrar o Dia da Bandeira em família de forma gratuita.", "titulo_pt": "A duas horas de CABA e gratuito: chega o festival perfeito para comemorar o Dia da Bandeira em família", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}], "ciencia_tecnologia": [{"id": 3374, "titulo": "Waymo Recalls Robotaxis Over Risk They'll Drive at Speed Into Freeway Construction Zones", "url": "https://www.wired.com/story/waymo-recalls-robotaxis-over-risk-theyll-drive-at-speed-into-freeway-construction-zones/", "fonte_id": "wired", "data_pub": "2026-06-18T12:50:00Z", "idioma": "en", "texto_pt": "A Waymo está recuperando 3.871 veículos após incidentes em que seus carros autônomos priorizaram outros perigos ou não reconheceram zonas fechadas por construção, o que poderia levar a situações de risco ao motorista.", "titulo_pt": "Waymo Recupera Veículos Autônomos devido ao Risco de Eles Dirigirem Velocemente para Zonas de Construção na Rodovia", "veiculo": "Wired", "pais": "EUA", "classe": "B"}, {"id": 3236, "titulo": "Accenture shares set to fall to lowest since 2018 as AI threat mounts", "url": "https://www.ft.com/content/9f063b07-da39-4feb-92ab-ee0f91385c62", "fonte_id": "financial_times", "data_pub": "2026-06-18T12:42:00Z", "idioma": "en", "texto_pt": "As ações da consultoria de tecnologia Accenture estão enfrentando preocupações sobre como a tecnologia, especialmente a inteligência artificial, pode prejudicar seu modelo de negócios.", "titulo_pt": "Ações da Accenture devem cair para nível mais baixo desde 2018 diante do aumento da ameaça da inteligência artificial", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 3427, "titulo": "Ripple-like rings of the 'Bullseye galaxy' could be explained by dark matter", "url": "https://phys.org/news/2026-06-ripple-bullseye-galaxy-dark.html", "fonte_id": "phys_org", "data_pub": "2026-06-18T12:40:00Z", "idioma": "en", "texto_pt": "Dois físicos dos Estados Unidos sugerem que os nove anéis concêntricos ao redor da galáxia LEDA 1313424, conhecida como a galáxia do alvo, foram formados através do comportamento quântico de partículas de matéria escura. Segundo uma análise publicada na Revista Astrophysical Journal, Pierre Sikivie e Yuxin Zhao da Universidade da Flórida argumentam que a estrutura extraordinária não foi criada por colisões entre galáxias, como teorias anteriores sugeriram, mas por um condensado de Bose-Einstein de axions.", "titulo_pt": "Círculos ondulantes da 'galáxia do alvo' podem ser explicados pela matéria escura", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 3447, "titulo": "Boeing demonstrates quantum protocol in payload set for 2027 launch", "url": "https://spacenews.com/boeing-demonstrates-quantum-protocol-in-payload-set-for-2027-launch/", "fonte_id": "spacenews", "data_pub": "2026-06-18T12:30:00Z", "idioma": "en", "texto_pt": "A Boeing realizou testes terrestres de um compacto dispositivo quântico antes do experimento orbital programado para 2027, demonstrando o 'troca de entrelaçamento com alta fiabilidade'.", "titulo_pt": "Boeing demonstra protocolo quântico em carga útil prevista para lançamento em 2027", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 3320, "titulo": "The Download: a new hunt for dark matter and Kenya’s case for going solar", "url": "https://www.technologyreview.com/2026/06/18/1139261/the-download-dark-matter-hunt-kenya-solar-power/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-18T12:10:00Z", "idioma": "en", "texto_pt": "A busca pela matéria escura foi reaberta. Por décadas, físicos têm procurado partículas pesadas interagindo debilmente (WIMPs), um candidato principal para a matéria escura, mas seus esforços ainda não foram bem-sucedidos.", "titulo_pt": "Download Diário: uma nova busca por matéria escura e o caso de Kenia pela energia solar", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 2835, "titulo": "Lei para pilotar drones tem mudanças; veja quais são as novas regras", "url": "https://canaltech.com.br/carros/lei-para-pilotar-drones-tem-mudancas-veja-quais-sao-as-novas-regras/", "fonte_id": "canaltech", "data_pub": "2026-06-18T12:05:00Z", "idioma": "pt", "texto_pt": "A Agência Nacional de Aviação Civil (ANAC) publicou no Diário Oficial da União uma atualização nas regras para o uso de drones no Brasil, substituindo o modelo baseado no peso dos equipamentos por diretrizes focadas no risco operacional. O novo regulamento, alinhado aos padrões internacionais, introduz o Regulamento Brasileiro da Aviação Civil (RBAC) nº 100 com mais flexibilidade para o avanço tecnológico.", "titulo_pt": "Lei para operar drones sofre alterações; confira as novas regras", "veiculo": "Canaltech", "pais": "Brasil", "classe": "B"}, {"id": 3448, "titulo": "Swift reboost mission ready for launch", "url": "https://spacenews.com/swift-reboost-mission-ready-for-launch/", "fonte_id": "spacenews", "data_pub": "2026-06-18T12:04:00Z", "idioma": "en", "texto_pt": "Uma missão de alto risco para elevar a órbita de uma nave espacial de astropfysics da NASA está programada para ser lançada em menos de um mês após menos de um ano de desenvolvimento.", "titulo_pt": "Missão de reboost do Swift está pronta para lançamento", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 3375, "titulo": "Samsung The Frame Pro 2026 Review: Pricey But Worth It", "url": "https://www.wired.com/review/samsung-the-frame-pro-2026/", "fonte_id": "wired", "data_pub": "2026-06-18T12:01:00Z", "idioma": "en", "texto_pt": "O Samsung The Frame Pro 2026 apresenta melhorias significativas, como a combinação de tecnologia de áudio e imagem avançada com uma nova camada antirreflexo, resultando em benefícios impressionantes.", "titulo_pt": "Review do Samsung The Frame Pro 2026: Caro, Mas Vale a Pena", "veiculo": "Wired", "pais": "EUA", "classe": "B"}, {"id": 2836, "titulo": "As Bruxas Mayfair: série de bruxas da Netflix foge do clichê com terror sombrio", "url": "https://canaltech.com.br/entretenimento/as-bruxas-mayfair-serie-de-bruxas-da-netflix-foge-do-cliche-com-terror-sombrio/", "fonte_id": "canaltech", "data_pub": "2026-06-18T12:00:00Z", "idioma": "pt", "texto_pt": "A série 'As Bruxas Mayfair', estrelada por Alexandra Daddario e baseada no trabalho de Anne Rice, foi lançada na Netflix em 2023. A produção promete trazer um universo sobrenatural inovador, com duas temporadas completas já disponíveis e uma terceira em desenvolvimento.", "titulo_pt": "As Bruxas Mayfair: série de terror sombrio da Netflix evita clichés", "veiculo": "Canaltech", "pais": "Brasil", "classe": "B"}, {"id": 3323, "titulo": "This Ghost in the Shell keyboard makes me want to activate the hundred spidery robot fingers inside my regular fingers", "url": "https://www.theverge.com/tech/951371/iqunix-ev63-ghost-in-the-shell-edition-anime-gaming-mechanical-keyboard-review", "fonte_id": "the_verge", "data_pub": "2026-06-18T12:00:00Z", "idioma": "en", "texto_pt": "Teclados inspirados no anime Ghost in the Shell da marca Iqunix são considerados alguns dos exemplos mais cool de tecnologia diária baseada em animes. Eles têm um design impressionante e funcionam bem, embora o preço de US$ 249 seja considerado alto.", "titulo_pt": "Este teclado Ghost in the Shell faz com que eu quero ativar as cem dedos aranha dentro dos meus dedos regulares", "veiculo": "The Verge", "pais": "EUA", "classe": "B"}, {"id": 33   const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const rot = n.topico ? (D.rotulos_topico[n.topico] || n.topico) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(n.topico || '')}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
</body>
</html>
