<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boletim Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>
<body>
<header>
  <h1>pan<span class="logo-o">o</span>rama</h1>
  <div class="sub">notícias do mundo · atualizado em 05/07/2026 22:27 · próxima atualização às <span id="prox-hora"></span></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal-senha">

    <label for="inp-senha">Senha</label>

<div class="modal-overlay" id="modal-flag">

      <button class="btn-pri" onclick="salvarFlagAtual()">Marcar</button>

  </div>
</div>

<div class="modal-overlay" id="modal-relatorio">
  <div class="modal-box" style="max-width:620px">
    <h4>Relatório de Flags</h4>
    <div class="flag-rep-box" id="relatorio-conteudo"></div>
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-peri" onclick="limparFlags()" style="margin-right:auto">Limpar tudo</button>
      <button class="btn-sec2" onclick="exportarFlags()">Exportar JSON</button>
      <button class="btn-sec2" onclick="copiarRelatorio()">Copiar</button>
      <button class="btn-pri" onclick="fecharModal('modal-relatorio')">Fechar</button>
    </div>
  </div>
</div>

<script>
const D = {"gerado_em": "05/07/2026 22:27", "stats": {"noticias_novas": 355, "resumos_gerados": 108}, "rotulos_topico": {"politica_nacional": "Brasil", "mundo": "Mundo", "economia": "Economia", "tecnologia": "Tecnologia", "ciencia": "Ciência", "cultura": "Cultura", "sociedade": "Sociedade", "meio_ambiente": "Meio Ambiente", "direitos_humanos": "Direitos Humanos"}, "topicos": ["politica_nacional", "mundo", "economia", "tecnologia", "ciencia", "cultura", "sociedade", "meio_ambiente", "direitos_humanos"], "grupo_de_topico": {"politica_nacional": "politica_nacional", "politica_internacional": "mundo", "geopolitica": "mundo", "economia": "economia", "tecnologia": "tecnologia", "ciencia": "ciencia", "cultura": "cultura", "sociedade": "sociedade", "meio_ambiente": "meio_ambiente", "direitos_humanos": "direitos_humanos"}, "sinteses": {"politica_nacional": "As pesquisas eleitorais indicam uma polarização significativa na corrida presidencial, com Lula liderando as intenções de voto, seguido por Flávio Bolsonaro. Em São Paulo, Tarcísio Meira está à frente no primeiro turno das eleições para prefeito, com 46% dos votos contra 30% de Fernando Haddad. O governo do estado de São Paulo planeja investir R$ 64 bilhões nas universidades entre 2023 e 2026, com destaque para o Fundo de Amparo à Pesquisa do Estado de São Paulo (Fapesp), que receberá R$ 5 bilhões para financiar estudos. Além disso, a Bahia enfrenta tensões políticas durante a celebração do 2 de Julho, com grupos posicionados para provocar adversários.", "mundo": "O presidente americano Donald Trump ofereceu ajuda ao líder russo Vladimir Putin para um acordo de paz na Ucrânia antes da cúpula da OTAN, sugerindo uma colaboração entre os dois líderes. Em outro desenvolvimento, calor extremo está causando incêndios florestais em França, Espanha e Portugal, com centenas de bombeiros trabalhando para conter as chamas. A capital iraniana Teerã utilizou o funeral do Ayatollah Khamenei como ocasião para projetar força, com o metrô registrando 3 milhões de viagens durante as cerimônias. Além disso, Israel planeja uma visita de Benjamin Netanyahu a Washington na próxima segunda-feira para discutir questões relacionadas ao Irã e um novo acordo de segurança.\n\nA Autoridade de Controladoria de Macau (MAC) condenou as patrulhas marítimas da China, indicando tensões relacionadas ao controle territorial ou soberania nas águas. Este evento reflete um contexto geopolítico complexo na região, onde Taiwan desempenha um papel estratégico como parte do Primeiro Círculo das Ilhas, uma estrutura que tem sido fundamental para a segurança regional. No entanto, Taiwan enfrenta desafios significativos que podem levar ao risco de ser marginalizada na região, o que pode afetar sua influência e posição geopolítica.", "economia": "A Ásia, que consome uma grande quantidade de energia, deve aprender com a crise iraniana e buscar soluções para se adaptar aos desafios energéticos atuais. De acordo com o Taipei Times, o continente precisa encontrar maneiras de garantir sua segurança energética e reduzir a dependência de fornecedores vulneráveis ou instáveis, como o Irã. Isso inclui investimentos em tecnologias renováveis, aumento da eficiência energética e diversificação das fontes de suprimento. Essas medidas não apenas ajudarão a mitigar riscos futuros, mas também contribuirão para um crescimento econômico mais sustentável.", "tecnologia": "A China está se consolidando como um importante centro global de inovação robótica, com o Vale dos Robôs localizado na cidade de Shenzhen. Este ecossistema abriga mais de 200 empresas de robótica e cerca de uma dúzia de universidades, destacando a importância do setor para a economia chinesa. No cenário global, a inteligência artificial (IA) está transformando diversos aspectos da tecnologia e dos negócios. A empresa Bending Spoons, que foi anteriormente parte da AOL e Vimeo, agora listada na bolsa de valores, tem impulsionado o crescimento de novas empresas unicórnio, com quase 90 novas startups alcançando esse status este ano, graças ao investimento frenético gerado pela IA. Além disso, a IA está sendo usada para transformar estagiários em superprofissionais, automatizando tarefas básicas e aumentando a produtividade dos profissionais com alto nível de conhecimento. Na Coreia do Sul, o governo planeja criar um novo fundo de investimento financiado por uma receita tributária proveniente do boom das semicondutores para projetos de inteligência artificial e manufatura avançada, visando aprimorar o crescimento econômico no país. Outros desenvolvimentos importantes incluem a expansão da rede fúngica global, que suporta a vida vegetal e auxilia no regulamento do clima da Terra; a IA poderia eventualmente substituir trabalhadores humanos em diversas indústrias, como na entrega de mercadorias por robôs na JD.com. Ainda, o uso de ferramentas falsas de codificação por hackers norte-coreanos para invadir sistemas de desenvolvedores de software é uma preocupação crescente no setor tecnológico.", "ciencia": "A Space.com comemorou os 250 anos dos Estados Unidos destacando o progresso espacial americano desde a independência, além de possíveis direções futuras. Um avanço científico notável foi a descoberta internacional do DNA humano de pelo menos 2.000 anos em cavernas da Espanha e Portugal, publicado na revista Nature. O estudo sobre a peste antiga também merece destaque, com evidências datando do período mais remoto, cerca de 5.500 anos atrás na Sibéria. As inundações extremas causadas pelo aumento dos níveis do mar, que agora ocorrem 12 vezes mais frequentemente, também ganharam atenção, afetando comunidades costeiras globalmente.", "cultura": "A Rio Brass Band participará da 21ª Conferência Internacional WASBE no Rio de Janeiro, entre os dias 20 e 26 de julho. O evento marcará o início do festival com um concerto na Igreja de São Francisco de Paula. Outro destaque cultural será a inauguração, por Bruce Springsteen, de um centro cultural dedicado ao seu legado em Nova Jersey. Este centro reflete sua conexão com a cidade, mesmo após ele ter frequentemente expressado desejo de escapar dela em suas músicas. A atriz chilena Paulina Garcia será homenageada no festival Bonito Cinesur na quarta edição do evento, que apresentará 32 produções cinematográficas de 13 países sul-americanos.", "sociedade": "Taiwan enfrenta desafios significativos no sistema de trânsito, levando a uma necessidade urgente de reformas para melhorar as condições atuais. Paralelamente, pais em Keelung protestaram contra práticas em uma creche local, embora não sejam fornecidos detalhes específicos sobre o conteúdo do protesto na notícia disponibilizada.", "meio_ambiente": "O ministério realizou um fórum sobre economia circular, focando em discussões e estratégias para promover a sustentabilidade através de ciclos de uso eficiente dos recursos. Paralelamente, o número de vagas para trabalhos verdes, conhecidos como 'green-collar', atingiu um recorde. Esses empregos estão relacionados a áreas ambientais e sustentáveis, demonstrando uma crescente demanda por profissionais capacitados em temas ligados à conservação do meio ambiente.", "direitos_humanos": "O governo chinês divulgou detalhes sobre suas estratégias de repressão no exterior, conforme relatado pela Taipei Times. Embora o texto não forneça informações específicas sobre os métodos utilizados, essa divulgação representa um importante evento na discussão dos direitos humanos internacionais. A divulgação pode ser vista como uma tentativa do governo chinês de esclarecer ou justificar suas ações no exterior, sem fornecer detalhes adicionais sobre os mecanismos e práticas empregados nesses esforços de repressão."}, "resumo_do_dia": {"politica_nacional": [{"id": 36779, "titulo": "PT teme vitória de Tarcísio em 1º turno em SP, mas avalia que ainda há espaço para Haddad crescer", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/pt-teme-vitoria-de-tarcisio-em-1o-turno-em-sp-mas-avalia-que-ainda-ha-espaco-para-haddad-crescer.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-05T16:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A pesquisa Datafolha divulgada neste domingo (5) indica que Tarcísio de Freitas está à frente de Fernando Haddad na corrida pelo governo de São Paulo. O resultado gerou preocupação no partido petista, mas também esperança para os mais otimistas.", "titulo_pt": "PT teme vitória de Tarcísio em 1º turno em SP, mas vê potencial para Haddad crescer", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 36810, "titulo": "Ferramenta do TSE mostra participação do eleitorado no exterior", "url": "https://www.poder360.com.br/poder-eleicoes/ferramenta-do-tse-mostra-participacao-do-eleitorado-no-exterior/", "fonte_id": "poder360", "data_pub": "2026-07-05T16:16:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ferramenta do Tribunal Superior Eleitoral (TSE) agrupa dados para auxiliar na logística da votação e detectar dificuldades no processo. Ela também mostra a participação dos eleitores residentes no exterior.", "titulo_pt": "Ferramenta do TSE revela participação dos eleitores no exterior", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 36811, "titulo": "Flávio assiste jogo Brasil x Noruega de Washington", "url": "https://www.poder360.com.br/poder-eleicoes/flavio-assiste-jogo-brasil-x-noruega-de-washington/", "fonte_id": "poder360", "data_pub": "2026-07-05T16:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O senador Flávio Bolsonaro chegou aos Estados Unidos no domingo (5 de julho) e acompanhará a partida entre Brasil e Noruega à distância antes de participar de uma audiência sobre o tarifaço.", "titulo_pt": "Flávio assiste jogo Brasil x Noruega de longe antes de audiência", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 36792, "titulo": "5 signos mais confiantes do zodíaco", "url": "https://www.cartacapital.com.br/astrologia/5-signos-mais-confiantes-do-zodiaco/", "fonte_id": "cartacapital", "data_pub": "2026-07-05T16:02:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A confiança pode manifestar-se de várias formas, desde a tomada de decisões seguras até a persistência diante dos desafios. Na astrologia, todos os signos podem exibir essa característica.", "titulo_pt": "5 signos mais confiantes do zodíaco", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 36105, "titulo": "Qual a melhor chapinha: vale trocar um modelo antigo por um lançamento?", "url": "https://www.cartacapital.com.br/toquetec/qual-a-melhor-chapinha-vale-trocar-um-modelo-antigo-por-um-lancamento/", "fonte_id": "cartacapital", "data_pub": "2026-07-05T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A tecnologia nas chapinhas está evoluindo, oferecendo modelos mais práticos e versáteis. Algumas novidades demonstram como a inovação pode melhorar a rotina de uso.", "titulo_pt": "Qual é a melhor chapinha: vale trocar um modelo antigo por um lançamento?", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 36106, "titulo": "MOPs ganham espaço como melhor opção de limpeza sem esforço e mais controle da sujeira", "url": "https://www.cartacapital.com.br/toquetec/mops-ganham-espaco-como-melhor-opcao-de-limpeza-sem-esforco-e-mais-controle-da-sujeira/", "fonte_id": "cartacapital", "data_pub": "2026-07-05T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Tecnologias de microfibra e sistemas sem contato direto com água suja transformam a faxina em uma tarefa mais prática e higiênica. MOPs ganham espaço como melhor opção de limpeza sem esforço e mais controle da sujeira.", "titulo_pt": "MOPs ganham espaço como melhor opção de limpeza sem esforço e mais controle da sujeira", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 36107, "titulo": "Epic Games Store passará por reformulação para acelerar e competir com a Steam", "url": "https://www.cartacapital.com.br/toquetec/epic-games-store-passara-por-reformulacao-para-acelerar-e-competir-com-a-steam/", "fonte_id": "cartacapital", "data_pub": "2026-07-05T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Epic Games Store irá passar por reformulações para melhorar a interface e o desempenho nos próximos 12 meses. A plataforma reconheceu publicamente as deficiências atuais.", "titulo_pt": "Epic Games Store passará por reformulação para acelerar e competir com a Steam", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 36793, "titulo": "Falta de governança em IA pode criar riscos jurídicos e regulatórios para PMEs", "url": "https://www.cartacapital.com.br/do-micro-ao-macro/falta-governanca-ia-riscos-pmes/", "fonte_id": "cartacapital", "data_pub": "2026-07-05T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa da Serasa Experian indica que pequenas e médias empresas (PMEs) estão utilizando inteligência artificial para aumentar a produtividade, mas sem estabelecer regras internas claras. Isso pode gerar riscos jurídicos e regulatórios para essas empresas.", "titulo_pt": "Falta de governança em IA cria riscos para PMEs", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 36812, "titulo": "Governo de SP investe R$ 64 bi em universidades de 2023 a 2026", "url": "https://www.poder360.com.br/poder-educacao/governo-de-sp-investe-r-64-bi-em-universidades-de-2023-a-2026/", "fonte_id": "poder360", "data_pub": "2026-07-05T15:56:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo do estado de São Paulo investirá R$ 64 bilhões nas universidades entre 2023 e 2026, com destaque para o Fundo de Amparo à Pesquisa do Estado de São Paulo (Fapesp), que receberá R$ 5 bilhões para financiar estudos por meio de bolsas e auxílio à pesquisa.", "titulo_pt": "Governo de SP investirá R$ 64 bi em universidades de 2023 a 2026", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 36794, "titulo": "Internado, cacique Raoni tem saúde estável e respira sem aparelhos", "url": "https://www.cartacapital.com.br/sociedade/internado-cacique-raoni-tem-saude-estavel-e-respira-sem-aparelhos/", "fonte_id": "cartacapital", "data_pub": "2026-07-05T15:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O cacique Raoni está com saúde estável, sem febre e respirando sem auxílio de ventilação mecânica. Ele também melhorou na ingestão alimentar oral, mas ainda utiliza um dreno no tórax.", "titulo_pt": "Internado, cacique Raoni tem saúde estável e respira sem aparelhos", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 36780, "titulo": "Bahia vive tensão com investigação do Master, que impulsiona ofensiva eleitoral", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/bahia-vive-tensao-com-investigacao-do-master-que-impulsiona-ofensiva-eleitoral.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-05T15:23:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Bahia enfrenta tensões políticas durante a celebração do 2 de Julho, com militantes posicionados para provocar adversários. O cortejo do 2 de Julho foi utilizado como plataforma para a ofensiva eleitoral de grupos políticos.", "titulo_pt": "Bahia experimenta tensão política durante investigação do Master e celebração do 2 de Julho", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 36814, "titulo": "Sesi e Senai lançam cartilhas para conscientizar sobre riscos de bets", "url": "https://www.poder360.com.br/poder-economia/sesi-e-senai-lancam-cartilhas-para-conscientizar-sobre-riscos-de-bets/", "fonte_id": "poder360", "data_pub": "2026-07-05T15:12:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Sesi e o Senai lançaram cartilhas para conscientizar sobre os riscos dos betamesetamfetaminas. Existem duas versões do material, uma destinada aos alunos das escolas e outra para trabalhadores da indústria.", "titulo_pt": "Sesi e Senai lançam cartilhas para conscientizar sobre riscos de betamesetamfetaminas", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 36801, "titulo": "Oposição já tem data para retomar pressão por reforma administrativa", "url": "https://veja.abril.com.br/politica/oposicao-ja-tem-data-para-retomar-pressao-por-reforma-administrativa/", "fonte_id": "veja", "data_pub": "2026-07-05T15:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A oposição já tem uma data marcada para retomar a pressão pelos parlamentares em relação à reforma administrativa. No entanto, o timing não favorece a proposição, fazendo com que ela volte para a gaveta.", "titulo_pt": "Oposição já tem data para retomar pressão pela reforma administrativa", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 36781, "titulo": "Presidente da CCJ se reúne com líder do governo para discutir cronograma da PEC da 6x1", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/presidente-da-ccj-se-reune-com-lider-do-governo-para-discutir-cronograma-da-pec-da-6x1.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-05T15:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente da Comissão de Constituição e Justiça, senador Otto Alencar (PSD-BA), pretende se reunir com a líder do governo no Senado, Teresa Leitão (PT-PE), para discutir o cronograma da PEC que trata do fim da escala 6x1.", "titulo_pt": "Presidente da CCJ quer se encontrar com líder do governo para tratar cronograma da PEC da 6x1", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 36816, "titulo": "Cadastro de missão de observação eleitoral acaba neste domingo", "url": "https://www.poder360.com.br/poder-eleicoes/cadastro-de-missao-de-observacao-eleitoral-acaba-neste-domingo/", "fonte_id": "poder360", "data_pub": "2026-07-05T14:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O cadastro de missões de observação eleitoral encerra neste domingo com o objetivo de contribuir para aperfeiçoamento do processo eleitoral e ampliar a transparência.", "titulo_pt": "Cadastro de missão de observação eleitoral acaba neste domingo", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 36108, "titulo": "Bruto, animal, eu sou o homem de neandertal do menino Ney e da Paulliny Tort", "url": "https://www.cartacapital.com.br/opiniao/bruto-animal-eu-sou-o-homem-de-neandertal-do-menino-ney-e-da-paulliny-tort/", "fonte_id": "cartacapital", "data_pub": "2026-07-05T14:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Milhares de anos se passaram e os seres humanos continuam sendo os personagens centrais da história do livro Os Imortais. O Neandertal do menino Ney e a Paulliny Tort são mencionados como exemplos.", "titulo_pt": "Bruto, animal, eu sou o homem de neandertal do menino Ney e da Paulliny Tort", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 36820, "titulo": "Trump oferece ajuda a Putin para fim da guerra contra a Ucrânia", "url": "https://www.metropoles.com/mundo/trump-oferece-ajuda-a-putin-para-fim-da-guerra-contra-a-ucrania", "fonte_id": "metropoles", "data_pub": "2026-07-05T16:42:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Trump oferece ajuda a Putin para alcançar um acordo de paz antes da cúpula da OTAN. O presidente americano propõe uma colaboração entre os dois líderes para terminar a guerra na Ucrânia.", "titulo_pt": "Trump oferece ajuda a Putin para fim da guerra contra a Ucrânia", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 36790, "titulo": "Calor extremo alimenta incêndios florestais na Europa", "url": "https://www.cartacapital.com.br/mundo/calor tudies-others-in-limbo/a-77816921?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-05T16:28:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Mais de três anos após o início da guerra israelense no Gaza, mais estudantes palestinos estão retomando estudos em universidades estrangeiras. A educação ainda não retornou à normalidade e as escolas expandiram suas aulas online.", "titulo_pt": "Estudantes palestinos deixam Gaza para continuar estudos, outros em situação incerta", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 36974, "titulo": "Exhausted by Iran War, Tehran Transforms for Khamenei’s Funeral", "url": "https://www.nytimes.com/2026/07/05/world/middleeast/iran-funeral-khamenei-tehran.html", "fonte_id": "nyt_world", "data_pub": "2026-07-05T16:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A capital iraniana está utilizando o funeral do Ayatollah Ali Khamenei para projetar força em um momento de grande incerteza para o país.", "titulo_pt": "Exaustos pela Guerra no Irã, Teerã Transforma-se para o Funeral de Khamenei", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 37054, "titulo": "Isaac Del Toro overcomes mechanical setback to win Tour de France 2nd stage", "url": "https://www.france24.com/en/sport/20260705-isaac-del-toro-overcomes-mechanical-setback-to-win-tour-de-france-2nd-stage", "fonte_id": "france24", "data_pub": "2026-07-05T16:12:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Isaac Del Toro venceu a segunda etapa do Tour de France após superar um problema mecânico e esperar por tempo para trocar sua bicicleta. Ele se destacou no contragrelho em Barcelona e se tornou o segundo ciclista mexicano a vencer uma etapa da corrida, após Raul Alcala.", "titulo_pt": "Isaac Del Toro vence segunda etapa do Tour de France apesar de problema mecânico", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 36871, "titu const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml() : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml() {
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml()}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices().filter(function(v) { return v.lang === 'pt-BR' || v.lang.startsWith('pt'); });
    return vs[0] || null;
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // .sumario ou .destaque-analise imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
