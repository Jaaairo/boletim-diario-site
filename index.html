<head>
<meta charset="utf-8">

<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>

</div>

 dos EUA, Donald Trump, ameaçou aplicar tarifas ao Canadá devido à fumaça das queimadas que atinge cidades norte-americanas. No âmbito político, o Partido Trabalhista britânico anunciou um novo líder, Andy Burnham, que priorizará a justiça social em seu mandato. Além disso, os Estados Unidos acusaram a China de interferir nas eleições americanas, levantando dúvidas sobre futuras reuniões bilaterais entre os países.\n\nAs tensões geopolíticas continuam dominando o cenário internacional. Em primeiro lugar, os ataques recentes contra infraestruturas civis no Irã, liderados pelos Estados Unidos, aumentaram as preocupações com uma escalada da guerra. O chefe da ONU, António Guterres, condenou essas ações, considerando-as inaceitáveis. Em seguida, o conflito na Ucrânia permanece intenso, com ataques recentes resultando em pelo menos 10 mortos. A reestruturação do governo ucraniano, liderado por Volodymyr Zelensky, expôs fragilidades internas no momento da escalada militar. Paralelamente, o Irã intensificou seus ataques contra navios-petroleiros no Estreito de Ormuz, levando a uma situação crítica para os transportes marítimos. A China também está usando símbolos culturais, como a deusa marítima Mazu, para promover sua narrativa de unificação com Taiwan. As relações entre Estados Unidos e China estão mais voláteis do que nunca, com ambas as partes enfraquecendo instituições diplomáticas. Além disso, o Oriente Médio continua em estado de alerta, com Israel realizando ataques com drones na região sul do Líbano, enquanto a União Europeia considera a possibilidade de substituir suas forças de manutenção da paz no Líbano.", "economia": "As bolsas asiáticas experimentaram fortes quedas devido a uma venda maciça nos setores tecnológicos, com o índice TAIEX caindo 2.953,71 pontos. No Brasil, a atividade econômica cresceu 0,1% em maio, superando as expectativas, mas há preocupações sobre uma possível desaceleração futura devido à política monetária restritiva. O governo brasileiro reagiu severamente ao novo tarifaço dos EUA, que afetará cerca de 36,5% das exportações agrícolas para os Estados Unidos. A tarifa média sobre produtos importados do Brasil será a segunda maior entre todos os países, atingindo um pico de 18,2%. O Reino Unido enfrenta desafios econômicos para revitalizar sua economia, enquanto a farmacêutica Eli Lilly adquiriu uma empresa de medicamentos psicodélicos por US$ 3,8 bilhões. As bolsas asiáticas e americanas sofreram com quedas generalizadas após a desaceleração das empresas ligadas à inteligência artificial, refletindo preocupações sobre o impacto econômico da guerra comercial entre os EUA e China.", "tecnologia": "A China continua avançando no ecossistema de inteligência artificial (IA) com a startup Moonshot lançando o maior modelo de IA aberto do mundo, igualando os sistemas avançados dos Estados Unidos. A empresa taiwanesa TSMC decidiu manter sua tecnologia mais avançada, desafiando as pressões dos EUA para garantir sua liderança global. A SpaceX enfrentou um fracasso no lançamento de seu foguete Starship, o que levou a quedas nas ações da empresa. A Apple recuperou o posto de empresa mais valiosa do mundo, superando a Nvidia após uma queda nas ações da fabricante de chips durante a sessão da Nasdaq. O Grupo de Trabalho formado pela Comissão de Valores Mobiliários (CVM) para discutir a futura regulação da tokenização incluirá representantes de 14 componentes organizacionais, além de entidades governamentais e especialistas.", "ciencia": "A NASA está se preparando para o lançamento do telescópio espacial Nancy Grace Roman, previsto para 30 de agosto. As inscrições estão abertas para credenciais de jornalistas interessados no evento. A missão visa estudar detalhes da superfície de Marte durante um voo rasante, capturando imagens coloridas aprimoradas. Além disso, a agência espacial convidou Maurícia a se juntar aos Acordos Artemis, tornando-a o 70º assinante e o sétimo país africano a aderir ao acordo. Em outra notícia científica, a Eli Lilly adquiriu a AtaiScience por US$ 2,8 bilhões, finalizando as esperanças de Amanda Feilding em transformar o setor de saúde mental com psicodélicos. A qualidade do ar nas cidades dos Estados Unidos atinge níveis críticos devido à fumaça das chamas silvestres, que pode ser 10 vezes mais perigosa que outras formas de poluição. Por outro lado, uma proposta de mudança no Medicare aumentaria o reembolso para médicos que oferecem conselhos sobre cessação do tabagismo e da bebida alcoólica durante as consultas em 19%.", "cultura": "O Festival Internacional de Teatro de São José do Rio Preto começou com a peça 'Festa', do Coletivo Protagônicos, no Anfiteatro Nelson Castro. O evento não teve discursos oficiais ou cerimônias burocráticas e marca o início das apresentações teatrais. Em São Paulo, Harry Styles fará quatro shows no Morumbi entre os dias 17 e 24, gerando interesse sobre transporte, horários e ingressos para os fãs. O cantor Milton Nascimento, de 83 anos, foi internado por pneumonia desde a quinta-feira (16), mas apresenta evolução positiva segundo sua equipe médica. A segunda temporada da série 'Cem Anos de Solidão', adaptada do livro de Gabriel García Márquez e produzida pela Netflix, lançou um trailer e será disponibilizada no dia 5 de agosto.", "sociedade": "A justiça brasileira tomou uma decisão inédita para uma mulher de 25 anos que causou tumulto durante comemorações após a vitória do time local contra a Inglaterra, optando por impor-lhe normas de conduta alternativas à prisão preventiva. Em Belo Horizonte, um incidente envolvendo violência doméstica resultou em uma mulher que esfaqueou o marido e foi baleada pela polícia. Além disso, os hospitais estão restringindo atendimentos a beneficiários da Geap Saúde devido à inadimplência da empresa, que não reconhece os valores devedores. No Distrito Federal, policiais civis realizam uma operação contra donos de uma distribuidora usada como fachada para o tráfico de drogas em Ceilândia. Em São Paulo, um advogado foi visto por câmeras de segurança com outro homem antes de ser encontrado morto, envolvendo uma adega na região da cidade.", "meio_ambiente": "Um terremoto de magnitude 7,3 ocorreu na costa do México e gerou um alerta de tsunami para toda a América Latina. No Brasil, o governo sul-coreano recomendou preparação para emergências devido à previsão de chuvas intensas nas regiões centrais. Um estudo revelou que mais da metade dos produtos alimentícios infantis analisados contém microplásticos, levantando preocupações sobre a contaminação ambiental. Além disso, relatos indicam incêndios florestais no Canadá e em Minnesota, lançando fumaça que polui o ar desde o Meio-Oeste dos Estados Unidos até a costa leste.", "direitos_humanos": "Um juiz federal dos Estados Unidos decidiu a favor de um ativista palestino-americano, Osama Abu Irshaid, declarando que a busca e apreensão de seus telefones por agentes alfandegários foram ilegais. Abu Irshaid, diretor executivo da American Muslims for Palestine (AMP), teve seus telefones confiscados duas vezes no Aeroporto Internacional Washington Dulles em 2024 ao retornar das viagens para o Oriente Médio. Além disso, a diretora executiva do UNICEF, Catherine Russell, visitou o Nigéria e enfatizou o potencial das crianças como a maior oportunidade para o país, destacando a importância de investir nas crianças para o futuro do Nigéria."}, "resumo_do_dia": {"politica_nacional": [{"id": 57176, "titulo": "Master emprestou R$ 45 milhões a ex-ministro e fundador da Biomm", "url": "https://www.metropoles.com/colunas/demetrio-vecchioli/master-emprestou-r-45-milhoes-a-ex-ministro-e-fundador-da-biomm", "fonte_id": "metropoles", "data_pub": "2026-07-17T21:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Master emprestou R$ 45 milhões a um ex-ministro e fundador da Biomm. Daniel Vorcaro, principal acionista da farmacêutica na época, foi envolvido no empréstimo.", "titulo_pt": "Master emprestou R$ 45 milhões a ex-ministro e fundador da Biomm", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 57150, "titulo": "EUA tentaram limitar capital externo em minerais críticos do Brasil", "url": "https://www.poder360.com.br/poder-governo/eua-tentaram-limitar-capital-externo-em-minerais-criticos-do-brasil/", "fonte_id": "poder360", "data_pub": "2026-07-17T21:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo Lula registrou uma tentativa dos Estados Unidos de limitar o fluxo de capital externo relacionado a minerais críticos do Brasil. O Planalto entende que o pedido americano está vinculado à concorrência com a China no setor.", "titulo_pt": "EUA buscaram limitar capital externo em minerais críticos do Brasil", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 57087, "titulo": "Adversários de Tarcísio exploram tarifaço enquanto governador evita o tema", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/adversarios-de-tarcisio-exploram-tarifaco-enquanto-governador-evita-o-tema.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-17T21:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os adversários de Tarcísio de Freitas exploraram o tarifaço de Donald Trump no estado de São Paulo, enquanto o governador evitou comentar sobre o assunto. A operação dos opositores contrasta com a postura do governador que, por ora, não se manifestou sobre o tema.", "titulo_pt": "Adversários de Tarcísio exploram tarifaço enquanto governador evita o tema", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 57296, "titulo": "Rejeição ao bolsonarismo cresce e ao petismo cai, mostra pesquisa", "url": "https://veja.abril.com.br/politica/rejeicao-ao-bolsonarismo-cresce-e-ao-petismo-cai-mostra-pesquisa/", "fonte_id": "veja", "data_pub": "2026-07-17T21:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A pesquisa Quaest mo o no cargo de secretário da Pasta", "url": "https://g1.globo.com/politica/blog/octavio-guedes/post/2026/07/17/governador-interino-exige-auditoria-em-todos-os-contratos-da-defesa-civil-para-manter-coronel-bombeiro-no-cargo-de-secretario-da-pasta.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-17T20:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governador interino do Rio de Janeiro, Ricardo Couto, exigiu uma auditoria em todos os contratos da Defesa Civil para manter o coronel bombeiro Tarciso Salles no cargo de secretário. Como condição, Couto convocou Salles para uma reunião na terça-feira (14) e solicitou a realização de uma auditoria externa independente.", "titulo_pt": "Governador interino exige auditoria em contratos da Defesa Civil para manter coronel bombeiro no cargo", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 57066, "titulo": "Governo de SP suspende contratação de consignados com banco Digimais", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/governo-de-sp-suspende-contratacao-de-consignados-com-banco-digimais.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo do estado de São Paulo suspendeu a contratação de novos empréstimos consignados com o Banco Digimais. A medida foi tomada após a Operação Miragem da Polícia Federal, que investiga crimes contra o sistema financeiro na instituição ligada à Igreja Universal do Reino de Deus.", "titulo_pt": "Governo de SP suspende contratação de consignados com banco Digimais", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 57089, "titulo": "Entidade judaica de alunos da USP vai homenagear presidente do STF", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/entidade-judaica-de-alunos-da-usp-vai-homenagear-presidente-do-stf.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-17T19:36:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Fraternidade Judaica de Alunos da USP realizará a próxima edição de sua premiação bienal, que homenageará personalidades por suas contribuições em direitos humanos e justiça. O evento ocorrerá na universidade e destinará prêmios a figuras notáveis no campo jurídico.", "titulo_pt": "Entidade judaica de alunos da USP vai homenagear personalidades pela justiça e direitos humanos", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 57347, "titulo": "Como funcionará o filtro de relevância do STJ, aprovado pela Câmara nesta semana", "url": "https://www.jota.info/justica/como-funcionara-o-filtro-de-relevancia-do-stj-aprovado-pela-camara-nesta-semana", "fonte_id": "jota", "data_pub": "2026-07-17T19:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O projeto busca transformar o STJ de 'Corte revisora' em 'Corte de precedentes', segundo processualistas. No entanto, ainda existem pontos em aberto.", "titulo_pt": "Como funcionará o filtro de relevância do STJ, aprovado pela Câmara nesta semana", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 57090, "titulo": "PT lança novo slogan contra família Bolsonaro após difundir 'tariflávio'", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/pt-lanca-novo-slogan-contra-familia-bolsonaro-apos-difundir-tariflavio.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-17T19:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O PT lançou um novo slogan 'Defenda o Brasil do tarifaço dos Bolsonaros' após difundir o apelido 'tariflávio' para associar Flávio Bolsonaro ao aumento de tarifas imposto por Trump.", "titulo_pt": "PT lança novo slogan contra família Bolsonaro após 'tariflávio'", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 57091, "titulo": "Alcolumbre articula CPMI com Motta para investigar atuação de ministro na sucessão da Vale", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/07/alcolumbre-articula-cpmi-com-motta-para-investigar-atuacao-de-ministro-na-sucessao-da-vale.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-17T19:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente do Senado, Davi Alcolumbre, e o presidente da Câmara, Hugo Motta, estão articulando a criação de uma CPMI para investigar supostas tentativas de ingerência do ministro Alexandre Silveira na sucessão da Vale.", "titulo_pt": "Alcolumbre e Motta planejam CPMI para investigar interferência de ministro na Vale", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 57092, "titulo": "Hormuz, estreito da humilhação", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/demetriomagnoli/2026/07/hormuz-estreito-da-humilhacao.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-17T18:57:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O desastre iraniano, durante o segundo governo de Donald Trump, será objeto de estudo semelhante ao da Guerra do Vietnã, que foi arquitetada pelo secretário de Defesa Robert McNamara entre 1961 e 1968. Este último caso envolveu um dos maiores fracassos da política externa americana desde a Segunda Guerra Mundial.", "titulo_pt": "Hormuz, estreito da humilhação", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 57093, "titulo": "Governador interino do RJ chora em evento com Lula e ouve grito de 'fica'", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/07/governador-interino-do-rj-chora-em-evento-com-lula-e-ouve-grito-de-fica.shtml", "fonte_id": "folha_poder", "data_pub": "2026-07-17T18:48:00Z", "idioma": "pt", "provav "EUA", "classe": "A"}, {"id": 57178, "titulo": "Trump culpa Canadá por fumaça e ameaça ampliar tarifas ao país", "url": "https://www.metropoles.com/mundo/trump-canada-fumaca-tarifas", "fonte_id": "metropoles", "data_pub": "2026-07-17T21:35:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O presidente dos Estados Unidos, Donald Trump, culpa o Canadá pelas queimadas e ameaça aumentar as tarifas sobre o país. Segundo ele, as queimadas refletem uma falta de gestão florestal adequada e o custo da poluição deve ser incluído nas tarifas.", "titulo_pt": "Trump culpa Canadá por fumaça e ameaça aumentar tarifas", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 57808, "titulo": "L'artista dissidente cubano Alcántara ottiene il visto per gli Usa", "url": "https://www.ansa.it/sito/notizie/topnews/2026/07/17/lartista-dissidente-cubano-alcantara-ottiene-il-visto-per-gli-usa_a5989eca-f11a-4d19-ae13-b204887c2ebf.html", "fonte_id": "ansa_italy", "data_pub": "2026-07-17T21:32:00Z", "idioma": "it", "provavel_duplicata_de": null, "texto_pt": "O artista dissidente cubano Alcántara não está mais em contato desde 7 de julho. Suas apoiantes denunciam o recebimento de um visto dos Estados Unidos como condicionado.", "titulo_pt": "Artista dissidente cubano alcântara obtém visto para os EUA", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 57711, "titulo": "Gaza officials say several killed in Israeli strike", "url": "https://www.dw.com/en/gaza-officials-say-several-killed-in-israeli-strike/a-78014902?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-07-17T21:29:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Autoridades palestinas relataram que pelo menos oito pessoas morreram durante um funeral. O Exército israelense afirmou ter atacado uma célula terrorista do grupo militante Islâmico Jihãd.", "titulo_pt": "Oficiais de gaza dizem que várias pessoas foram mortas em ataque israelense", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 57830, "titulo": "Trump envoy met with protests in Venice as he arrives on superyacht", "url": "https://www.scmp.com/news/world/europe/article/3361021/trump-envoy-met-protests-venice-he-arrives-superyacht?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-07-17T21:26:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em Veneza, cerca de quinhentas pessoas protestaram contra o embaixador dos EUA na Itália, Tilman Fertitta, quando ele chegou à cidade a bordo do seu iate. O evento ocorreu durante uma visita de Fertitta ao peninsula italiano, que incluiu medidas de segurança reforçadas por autoridades locais devido à proximidade de um importante festival.", "titulo_pt": "Embaixador dos EUA enfrenta protestos em veneza", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 57559, "titulo": "U.S., Iranian Forces Target Civilian Infrastructure", "url": "https://foreignpolicy.com/2026/07/17/us-iran-strikes-civilian-infrastructure-bridges-kuwait-desalination-syria/", "fonte_id": "foreign_policy", "data_pub": "2026-07-17T21:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ataques a pontes, usinas de energia e plantas de dessalinização poderiam ser considerados crimes de guerra.", "titulo_pt": "EUA e forças iranianas alvo da infraestrutura civil", "veiculo": "Foreign Policy", "pais": "EUA", "classe": "A"}, {"id": 57654, "titulo": "Democrats' Israel split widens ahead of US midterms", "url": "https://www.lemonde.fr/en/international/article/2026/07/17/democrats-israel-split-widens-ahead-of-us-midterms_6755586_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-17T21:18:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Membros democratas do Congresso dos EUA votaram para cortar auxílio militar a Israel, ampliando o divórcio entre membros da esquerda e direita do partido. Pro-Israel democratas alertam que o partido está se movendo rapidamente para um lado, o que pode ser usado pelos republicanos para desacreditar os democratas em relação à segurança de Israel.", "titulo_pt": "Divisão nos democratas sobre Israel amplia antes das eleições médias nos EUA", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 57641, "titulo": "Trump threatens to tariff Canada over wildfire smoke choking northern US cities", "url": "https://www.bbc.co.uk/news/articles/cwyq93j34lgo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-07-17T21:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O presidente dos Estados Unidos, Donald Trump, ameaçou aplicar tarifas sobre a Canadá devido à fumaça das queimadas que atinge cidades do norte dos EUA. O líder canadense Mark Carney afirmou que ambos os países têm igual responsabilidade na luta contra as mudanças climáticas, que especialistas dizem estar agravando as condições de incêndios florestais.", "titulo_pt": "Trump ameaça tarifas ao canadá por fumaça de queimadas", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 57431, "titulo": "Taylor Farms, el proveedor de lechuga de Taco Bell señalado por el brote de ciclosporiasis", "url": "https://elpais.com/us/2026-07-17/taylor-farms-el-proveedor-de-lechuga-de-taco-bell-senalado-por-el-brote-de-ciclosporiasis.html", "fonte_id": "elpais_america", "data_pub": "2026-07-17T21:03:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "As autoridades sanitárias continuam investigando se outros estabelecimentos nos Estados Unidos serviram alimentos contaminados relacionados ao brote de ciclosporíase. Taylor Farms, fornecedora da lechuga do Taco Bell envolvida no incidente, é o principal foco das pesquisas.", "titulo_pt": "Taylor Farms, fornecedor de alface do Taco Bell suspeito em caso de ciclosporíase, é objeto de investigação", "veiculo": "El País América", "pais": "Espanha", "classe": "A"}, {"id": 57443, "titulo": "Lam Wing-Kee, Hong Kong Bookseller Who Defied Authorities, Dies at 70", "url": "https://www.nytimes.com/2026/07/17/world/asia/lam-wing-kee-dead.html", "fonte_id": "nyt_world", "data_pub": "2026-07-17T21:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Lam Wing-Kee, um dos cinco livradores sequestrados por autoridades chinesas em 2015, falou publicamente após ser libertado e se tornou um caso internacionalmente famoso.", "titulo_pt": "Lam Wing-Kee, vendedor de livros de Hong Kong que desafiou autoridades, morre aos 70 anos", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 57771, "titulo": "Houthi supporters rally in Sanaa against ‘Saudi-led blockade’", "url": "https://www.aljazeera.com/video/newsfeed/2026/7/17/houthi-supporters-rally-in-sanaa-against-saudi-led?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-17T20:59:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Milhares de apoiadores do movimento Houthi se reuniram em Sanaa, capital da Yemen, contra o que eles descreveram como um bloqueio liderado pelos sauditas.", "titulo_pt": "Suporte aos houthis reúne milhares em Sanaa contra 'bloqueio saudita'", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}], "mundo__eventos": [{"titulo": "Número de mortos em terremotos na Venezuela ultrapassa 5.000", "sumario": "O número de mortos nos terremotos que afetaram a Venezuela no mês passado ultrapassou 5.000, conforme informado pela ditadura venezuelana nesta sexta-feira (17). Ocorreram dois terremotos consecutivos de magnitudes 7,2 e 7,5 no norte da Venezuela, especialmente na região de La Guaira. O número de mortes no terremoto que ocorreu na Venezuela em 24 de junho superou os 5.000.", "artigos": [{"id": 57031, "titulo": "Número de mortos em terremotos na Venezuela ultrapassa 5.000", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/07/numero-de-mortos-em-terremotos-na-venezuela-ultr "2026-07-18T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O índice TAIEX caiu 2,953.71 pontos devido a uma venda massiva nos setores tecnológicos.", "titulo_pt": "TAIEX cai 2,953.71 pontos em meio à venda em massa nas tecnologias", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 57265, "titulo": "China orienta montadoras a reforçarem verificações de segurança e qualidade", "url": "https://www.cnnbrasil.com.br/economia/negocios/china-orienta-montadoras-a-reforcarem-verificacoes-de-seguranca-e-qualidade/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T21:19:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As montadoras chinesas são orientadas a reforçar as verificações de segurança e qualidade, identificando problemas relacionados à consistência da produção, confiabilidade e durabilidade. Elas devem avaliar completamente os riscos à segurança ao lançarem novos projetos e produtos.", "titulo_pt": "China instrui montadoras a intensificar verificações de segurança e qualidade", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 57104, "titulo": "'Não saímos da mesa de negociação', diz Alckmin após Trump impor novo tarifaço a produtos brasileiros", "url": "https://g1.globo.com/politica/blog/julia-duailibi/post/2026/07/17/nao-saimos-da-mesa-de-negociacao-diz-alckmin-apos-trump-impor-novo-tarifaco-a-produtos-brasileiros.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-07-17T21:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Geraldo Alckmin afirmou que o Brasil não deixou a mesa de negociação com os Estados Unidos após a imposição de novas tarifas. O vice-presidente criticou a medida, considerando-a injusta e descabida.", "titulo_pt": "Alckmin afirma que Brasil permanece na mesa de negociação após nova tarifa dos EUA", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 57418, "titulo": "El riesgo país se acercó a los 420 puntos y el dólar volvió a $1500", "url": "https://www.lanacion.com.ar/economia/el-riesgo-pais-trepa-hasta-los-420-puntos-y-el-dolar-se-vende-a-1500-nid17072026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-07-17T21:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O indicador de riesgo país subiu para 420 pontos, atingindo seu valor mais alto desde a gestão de Javier Milei. Diversos tipos de câmbio apresentaram ligeiras elevações.", "titulo_pt": "Risco país chega a 420 pontos e dólar volta a r$1500", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 57063, "titulo": "O custo invisível dos investimentos no exterior", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/blogs/de-grao-em-grao/2026/07/o-custo-invisivel-dos-investimentos-no-exterior.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T21:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Milhares de brasileiros começaram a investir no exterior nos últimos anos, graças ao crescimento das plataformas internacionais e aos bons rendimentos desses ativos.", "titulo_pt": "O custo invisível dos investimentos no exterior", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 57064, "titulo": "França bloqueia acesso a mercado preditivo da Polymarket", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/franca-bloqueia-acesso-a-mercado-preditivo-da-polymarket.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T20:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A França bloqueou o acesso ao site de apostas Polymarket, segundo informou o órgão regulador do país. A decisão foi tomada devido a preocupações sobre possíveis perdas significativas para os usuários e a possibilidade de manipulação de apostas na plataforma.", "titulo_pt": "França bloqueia acesso ao site de apostas Polymarket", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 57258, "titulo": "Dólar hoje sobe a R$ 5,11, com ataques entre EUA e Irã; na semana, moeda fica estável", "url": "https://www.infomoney.com.br/mercados/dolar-hoje-abertura-fechamento-comercial-turismo-17072026/", "fonte_id": "infomoney", "data_pub": "2026-07-17T20:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O dólar à vista encerrou a sessão de quinta-feira com uma alta de 0,40%, cotado a R$5,0984. Durante a semana, a moeda manteve-se estável.", "titulo_pt": "Dólar hoje sobe a R$ 5,11, com ataques entre EUA e Irã; na semana, moeda fica estável", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 57065, "titulo": "EUA pediram que Brasil zerasse tarifa sobre bens industriais, químicos e aeroespaciais", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/eua-pediram-que-brasil-zerasse-tarifa-sobre-bens-industriais-quimicos-e-aeroespaciais.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T20:22:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Ao longo das negociações da nova etapa do tarifaço, os Estados Unidos solicitaram ao Brasil que eliminasse as tarifas de importação sobre bens aeroespaciais, industriais, químicos e automotivo. Os EUA pediram que fossem zeradas essas tarifas para produtos desses setores.", "titulo_pt": "EUA pediram que Brasil extinguisse tarifas sobre bens industriais, químicos e aeroespaciais", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 57747, "titulo": "Apple briefly leapfrogs Nvidia as world’s most valuable company", "url": "https://www.ft.com/content/9586223a-8339-4a57-9e2f-251899ebd211?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-17T20:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As ações da Apple superaram temporariamente as do Nvidia, tornando-a a empresa mais valiosa do mundo. Isso ocorreu enquanto o mercado de venda de ações de empresas ligadas à inteligência artificial está afetado, exceto pelas do fabricante de iPhones.", "titulo_pt": "Apple bate temporariamente Nvidia como empresa mais valiosa do mundo", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 57067, "titulo": "Fabricantes de sorvete projetam alta de 10% nas vendas de inverno", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/07/fabricantes-de-sorvete-projetam-alta-de-10-nas-vendas-de-inverno.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T20:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A maioria das fabricantes de sorvete no país (54%) projeta uma alta de 10% nas vendas de inverno deste ano em comparação com o mesmo período do ano anterior. Para alcançar esse crescimento, as empresas estão apostando no segmento food service.", "titulo_pt": "Fabricantes de sorvete projetam alta de 10% nas vendas de inverno", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 57140, "titulo": "Brasil não deixará de negociar tarifas impostas pelos EUA, diz Durigan", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-07/brasil-nao-deixara-de-negociar-tarifas-impostas-pelos-eua-diz-durigan", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-17T19:32:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministro da Fazenda, Dario Durigan, afirmou que o Brasil estuda medidas de reciprocidade em resposta às tarifas impostas pelos Estados Unidos. O governo brasileiro não utiliza a palavra 'retaliação' e segue um procedimento legal para proteger seus interesses nacionais.", "titulo_pt": "Brasil não deixará de negociar tarifas impostas pelos EUA, diz Durigan", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 57068, "titulo": "RJ move ação para reaver R$ 641 mi investidos pelo Rioprevidência em fundos do Master", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/rj-move-acao-para-reaver-r-641-mi-investidos-pelo-rioprevidencia-em-fundos-do-master.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T19:31:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Procuradoria-Geral do Estado do Rio de Janeiro moveu uma ação judicial para recuperar R$ 641,4 milhões investidos pelo Rioprevidência em fundos ligados ao Banco Master. A fundação que gere as aposentadorias dos servidores estaduais foi o responsável pelos investimentos questionados.", "titulo_pt": "RJ move ação para reaver R$ 641 mi investidos pelo Rioprevidência em fundos do Master", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 57070, "titulo": "Novo premiê do Reino Unido enfrenta o velho desafio econômico: como retomar crescimento?", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/novo-premie-do-reino-unido-enfrenta-o-velho-desafio-economico-como-retomar-crescimento.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T19:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O novo primeiro-ministro do Reino Unidade enfrenta o desafio de revitalizar a economia, um problema que seus antecessores não conseguiram resolver. Cada líder recente prometeu crescimento econômico, mas esses objetivos permaneceram inatingíveis.", "titulo_pt": "Novo primeiro-ministro do Reino Unido enfrenta velho desafio: como retomar o crescimento econômico?", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 57071, "titulo": "Dona da Mounjaro compra empresa que produz antidepressivos por US$ 3,8 bilhões", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/07/dona-da-mounjaro-compra-empresa-que-produz-antidepressivos-por-us-38-bilhoes.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T18:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A farmacêutica Eli Lilly comprou a AtaiBeckley, empresa desenvolvedora de medicamentos psicodélicos, por até US$ 3,8 bilhões. A compra foi realizada após o sucesso financeiro obtido com o medicamento Mounjaro, usado no tratamento da obesidade.", "titulo_pt": "Eli lilly adquire empresa de medicamentos psicodélicos por US$ 3,8 bilhões", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 57072, "titulo": "Fusões e aquisições chegam a R$ 166 bilhões no primeiro semestre", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/07/fusoes-e-aquisicoes-chegam-a-r-166-bilhoes-no-primeiro-semestre.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-07-17T18:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O mercado brasileiro de fusões e aquisições movimentou R$ 166,8 bilhões no primeiro semestre de 2026, com 593 transações anunciadas entre janeiro e junho. Apesar da redução no número de negócios (queda de 35,3% em comparação ao mesmo período do ano anterior), o capital mobilizado cresceu 3,4%.", "titulo_pt": "Fusões e aquisições chegam a R$ 166 bilhões no primeiro semestre", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 57141, "titulo": "São Paulo e Santa Catarina sofrem 52% do impacto do tarifaço dos EUA", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-07/sao-paulo-e-santa-catarina-sofrem-52-do-impacto-do-tarifaco-dos-eua", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-07-17T18:08:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Os estados de São Paulo e Santa Catarina são os mais afetados pelo tarifaço dos EUA contra o Brasil, com 52% do impacto total. São Paulo concentra 41,6% das exportações afetadas, enquanto Santa Catarina tem 68% de suas exportações aos Estados Unidos impactadas.", "titulo_pt": "São Paulo e Santa Catarina são os estados mais afetados pelo tarifaço dos EUA", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 57867, "titulo": "Taiwan to keep best TSMC tech despite US push", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/18/2003860953", "fonte_id": "taipei_times", "data_pub": "2026-07-18T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Taiwan decidiu manter a tecnologia mais avançada da TSMC, apesar das pressões dos EUA. A decisão visa garantir que a empresa mantenha sua liderança tecnológica global.", "titulo_pt": "Taiwan manterá melhor tecnologia da TSMC contra pressão dos EUA", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 57884, "titulo": "Powertech to invest in venture with Broadcom", "url": "https://www.taipeitimes.com/News/biz/archives/2026/07/18/2003860928", "fonte_id": "taipei_times", "data_pub": "2026-07-18T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Powertech planeja investir em uma joint venture com a Broadcom. Este acordo visa combinar as habilidades das duas empresas para desenvolver soluções tecnológicas avançadas.", "titulo_pt": "Powertech vai investir em joint venture com a Broadcom", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 57263, "titulo": "Startup chinesa Moonshot revela maior modelo de IA aberto do mundo", "url": "https://www.cnnbrasil.com.br/economia/negocios/startup-chinesa-moonshot-revela-maior-modelo-de-ia-aberto-do-mundo/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T21:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A startup chinesa Moonshot lançou o maior modelo de inteligência artificial aberto do mundo, destacando a rápida evolução do ecossistema chinês de IA. O lançamento reduz a diferença entre os sistemas avançados da China e os Estados Unidos.", "titulo_pt": "Startup chinesa Moonshot revela maior modelo de IA aberto do mundo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 57900, "titulo": "The Zoom hack that says, ‘Don’t record me’", "url": "https://techcrunch.com/2026/07/17/the-zoom-hack-that-says-dont-record-me/", "fonte_id": "techcrunch", "data_pub": "2026-07-17T21:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Se todas as reuniões, conversas no watercooler e encontros amorosos forem transcritas e resumidas, quem realmente lê qualquer uma dessas informações?", "titulo_pt": "O hack do Zoom que diz 'não me grave'", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 57531, "titulo": "Acciones de SpaceX se hunden a nuevos mínimos luego del fallido lanzamiento su cohete Starship", "url": "https://www.latercera.com/pulso/noticia/acciones-de-spacex-se-hunden-a-nuevos-minimos-luego-del-fallido-lanzamiento-su-cohete-starship/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T21:18:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A SpaceX cancelou o lançamento de seu foguete Starship, previsto para Texas às 17:45 da quinta-feira, devido a uma falha nos motores. As ações da empresa caíram para novos mínimos após o fracasso.", "titulo_pt": "Ações da SpaceX caem a novos mínimos após falha no lançamento do Starship", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 57260, "titulo": "Moonshot: a startup chinesa que desafia os LLMs americanos", "url": "https://braziljournal.com/moonshot-a-startup-chinesa-que-desafia-os-llms-americanos/", "fonte_id": "brazil_journal", "data_pub": "2026-07-17T20:29:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um modelo de inteligência artificial da startup chinesa Moonshot, chamado Kimi K3, com 2,8 trilhões de parâmetros, alcançou desempenho semelhante aos dos melhores sistemas de AI das empresas americanas. Isso levanta novos questionamentos sobre os valores das grandes tecnológicas norte-americanas.", "titulo_pt": "Moonshot: a startup chinesa que desafia os modelos de IA americanos", "veiculo": "Brazil Journal", "pais": "Brasil", "classe": "B"}, {"id": 57286, "titulo": "ChatGPT hacker: OpenAI lança IA para detectar falhas em futuros modelos", "url": "https://www.cnnbrasil.com.br/tecnologia/chatgpt-hacker-openai-lanca-ia-para-detectar-falhas-em-futuros-modelos/", "fonte_id": "cnn_brasil", "data_pub": "2026-07-17T20:27:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um hacker usou o modelo GPT-5.6 Sol, a IA mais potente da OpenAI até agora, para treinar outro modelo. A notícia não fornece detalhes adicionais sobre as consequências ou o propósito dessa atividade.", "titulo_pt": "Hacker usa gpt-5.6 sol, IA mais avançada da openai, para treinar novo modelo", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 57901, "titulo": "Agility Robotics plants its flag in Tesla’s backyard", "url": "https://techcrunch.com/2026/07/17/agility-robotics-plants-its-flag-in-teslas-backyard/", "fonte_id": "techcrunch", "data_pub": "2026-07-17T20:19:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Agility Robotics está abrindo um novo centro de treinamento para seus robôs Digit em Fremont, Califórnia. A localização do centro de treinamento se encontra perto da sede da Tesla, também em Fremont.", "titulo_pt": "Agility Robotics estende sua presença na porta da Tesla", "veiculo": "TechCrunch", "pais": "EUA", "classe": "B"}, {"id": 57915, "titulo": "AWS Billing Glitch Hits Customers With Billion-Dollar Fees", "url": "https://www.wired.com/story/amazon-web-services-glitch-oh-no/", "fonte_id": "wired", "data_pub": "2026-07-17T19:50:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um erro no sistema de cobrança da AWS fez com que algumas contas de clientes fossem faturadas em bilhões de dólares, ao invés dos valores normais que variam apenas alguns centavos.", "titulo_pt": "Erro na faturação da AWS causa cobranças em bilhões para clientes", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 57916, "titulo": "What Cities From Chicago to Washington, DC, Look Like Under a Blanket of Wildfire Smoke", "url": "https://www.wired.com/story/cities-from-chicago-to-washington-dc-look-like-wildfire-smoke/", "fonte_id": "wired", "data_pub": "2026-07-17T19:17:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A cidade de Chicago até Washington, DC, está sendo coberta por uma camada de fumaça proveniente de incêndios florestais controlados em 120 áreas canadenses. O Estados Unidos enfrenta alguns dos níveis mais altos de poluição do ar do planeta devido a essa situação.", "titulo_pt": "Cidades da Chicago até Washington, DC, sob camada de fumaça de incêndios florestais canadenses", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 57746, "titulo": "Meta and Anthropic in talks for up to $10bn data centre deal", "url": "https://www.ft.com/content/0ae58f76-3386-464a-9248-090cc68e9864?syn-25a6b1a6=1", "fonte_id": "financial_times", "data_pub": "2026-07-17T18:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Meta está considerando a possibilidade de lançar um negócio de nuvem e está em negociações com a Anthropic para um centro de dados que pode valer até 10 bilhões de dólares. A empresa social também está investindo 145 bilhões de dólares em infraestrutura.", "titulo_pt": "Meta e Anthropic em discussões para acordo de centro de dados no valor de até 10 bilhões", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 57917, "titulo": "Polymarket’s Corporate Structure Is a Mystery—Even to Some of Its Former Employees", "url": "https://www.wired.com/story/whats-up-with-polymarkets-panama-entity/", "fonte_id": "wired", "data_pub": "2026-07-17T18:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A estrutura operacional da Polymarket no Panamá é incomum, mesmo para uma empresa cujo CEO teve seu 2026/7/17/why-is-pakistans-sindh-province-facing-a-major-child-hiv-outbreak?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-07-17T07:33:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo surto de HIV entre crianças está ligado a um hospital em Karachi, Sindh, Paquistão. Especialistas afirmam que este surto reflete falhas sistêmicas.", "titulo_pt": "Por que o estado de Sindh do paquistão está enfrentando uma grave epidemia de HIV infantil?", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 57874, "titulo": "Microplastics found in the majority of baby food products", "url": "https://www.taipeitimes.com/News/taiwan/archives/2026/07/18/2003860960", "fonte_id": "taipei_times", "data_pub": "2026-07-18T00:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um estudo descobriu microplásticos em uma grande maioria dos produtos de alimentos infantis analisados. Os pesquisadores examinaram diversos tipos de alimentos para bebês e encontraram partículas plásticas em mais da metade das amostras.", "titulo_pt": "Microplásticos encontrados em maioria dos produtos de alimentos infantis", "veiculo": "Taipei Times", "pais": "Taiwan", "classe": "B"}, {"id": 57292, "titulo": "O desafio de descarbonizar e melhorar o transporte público", "url": "https://veja.abril.com.br/coluna/cidade-cidada/o-desafio-descarbonizar-e-melhorar-o-transporte-publico/", "fonte_id": "veja", "data_pub": "2026-07-17T21:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "É crucial atrair usuários para o transporte coletivo através de serviços com qualidade, conforto e eficiência.", "titulo_pt": "O desafio de descarbonizar e melhorar o transporte público", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 57532, "titulo": "Gremio de la agricultura descarta hasta el momento riesgos para el abastecimiento de alimentos producto de las lluvias", "url": "https://www.latercera.com/pulso/noticia/gremio-de-la-agricultura-descarta-hasta-el-momento-riesgos-para-el-abastecimiento-de-alimentos-producto-de-las-lluvias/", "fonte_id": "la_tercera", "data_pub": "2026-07-17T21:16:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A Sociedade Nacional de Agricultura (SNA) informou que, até o momento, não foram registrados danos significativos na produção agrícola devido às chuvas. Até agora, não há riscos percebidos para o abastecimento de alimentos.", "titulo_pt": "Gremio da agricultura descarta, por now, riscos para o abastecimento de alimentos devido às chuvas", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 57190, "titulo": "Número de mortes por terremotos na Venezuela ultrapassa 5 mil", "url": "https://www.metropoles.com/mundo/numero-de-mortes-por-terremotos-na-venezuela-ultrapassa-5-mil", "fonte_id": "metropoles", "data_pub": "2026-07-17T21:03:00Z", "idioma": "pt", "provavel_duplicata_de": 57120, "texto_pt": "O número de mortes por terremotos na Venezuela aumentou para mais de 5 mil, com 139 novas vítimas fatais registradas nesta sexta-feira (17/7). Mais de 16,7 mil pessoas foram feridas.", "titulo_pt": "Número de mortos por terremotos na Venezuela passa de 5 mil", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 57227, "titulo": "Mortes por terremotos na Venezuela passam de 5 mil", "url": "https://www.brasildefato.com.br/2026/07/17/mortes-por-terremotos-na-venezuela-passam-de-5-mil/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-17T20:55:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O número de mortes por terremotos na Venezuela atingiu 5.069, conforme balanço oficial divulgado pela Assembleia Nacional. Além disso, foram registrados 16.740 feridos e 17.907 pessoas sem moradia.", "titulo_pt": "Mortes por terremotos na Venezuela ultrapassam 5 mil", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 57543, "titulo": "Aguas Andinas mantiene moni odiversity-fears-flowerhorn-cichlids-philippines-lake", "fonte_id": "guardian_world", "data_pub": "2026-07-17T14:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Peixes híbridos chamados flowerhorn cichlids, criados por humanos e conhecidos por sua cor dourada brilhante e prominente promontório craniano, escaparam de instalações de criação para o Lago Sampaloc nas Filipinas durante um tufão. Esses peixes estão causando preocupação entre os cientistas devido ao potencial ameaça à biodiversidade nativa do lago e a possibilidade de parasitas infectarem humanos.", "titulo_pt": "Medo pela biodiversidade com peixes híbridos escapados no lago filipino", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 57656, "titulo": "French Greens push for national debate on climate leave", "url": "https://www.lemonde.fr/en/politics/article/2026/07/17/french-greens-push-for-national-debate-on-climate-leave_6755576_5.html", "fonte_id": "le_monde_en", "data_pub": "2026-07-17T13:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A proposta para um debate nacional sobre o 'clima de férias' foi amplamente comentada, mas recebeu pouca apoio na discussão pública francesa.", "titulo_pt": "Verdes franceses impulsionam debate nacional sobre clima de férias", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 57926, "titulo": "(LEAD) Heavy rain forecast for central regions, gov't orders emergency readiness", "url": "https://en.yna.co.kr/view/AEN20260717004651315", "fonte_id": "yonhap_news", "data_pub": "2026-07-17T13:15:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo sul-coreano ordenou a preparação para emergências devido à previsão de chuvas intensas nas regiões centrais. O Primeiro Ministro Han Seong-sook deu as instruções.", "titulo_pt": "Chuva forte prevista para regiões centrais, governo ordene preparação para emergências", "veiculo": "Yonhap News Agency", "pais": "Coreia do S             <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml() : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml() {
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml()}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices().filter(function(v) { return v.lang === 'pt-BR' || v.lang.startsWith('pt'); });
    return vs[0] || null;
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // .sumario ou .destaque-analise imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
