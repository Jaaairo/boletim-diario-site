<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>
</head>

<script>
const D = {"gerado_em": "19/06/2026 08:29", "stats": {"noticias_total": 5254, "resumos_total": 512, "sem_topico": 0, "ultima_coleta": "2026-06-19T11:00:18Z"}, "rotulos_topico": {"politica_nacional": "Política Nacional", "politica_internacional": "Política Internacional", "cultura": "Cultura", "ciencia_tecnologia": "Ciência & Tecnologia"}, "topicos": ["politica_nacional", "politica_internacional", "cultura", "ciencia_tecnologia"], "sinteses": {"ciencia_tecnologia": "A OpenAI anunciou que planeja introduzir anúncios na versão gratuita e no plano Go do ChatGPT, embora eles não serão exibidos para usuários menores de 18 anos ou para aqueles que se inscreverem em planos mais caros. Em outro desenvolvimento importante, a SK Hynix realizou uma reunião privada com Allison Hooker, subsecretária do Departamento de Estado dos Estados Unidos, onde possivelmente foram discutidos acordos sobre memória de alta banda e planos de expansão de investimento em semicondutores nos EUA. Esses eventos refletem as complexidades da interação entre a tecnologia avançada e questões econômicas globais. Além disso, cientistas do Programa Antártico Australiano publicaram resultados recentes das viagens às ilhas Heard e McDonald, que contribuem para o entendimento global da disseminação da influenza aviar H5 (gripe aviária). Estudos também indicam que infecções virais diárias podem gradualmente alterar a rede molecular do corpo, potencialmente elevando o risco de câncer ao longo do tempo.", "cultura": "A TV Brasil estreia nesta sexta-feira (19) a série chinesa 'Rumo ao Maravilhoso', que será exibida até o sábado (27), às 20h. No exterior, o músico americano Bruno Mars iniciou sua turnê 'The Romantic Tour' em Paris, com três apresentações marcadas e um recorde de vendas de ingressos. Em outros países, a série 'A Casa do Dragão' segue em disputa por críticas positivas e negativas, enquanto o prefeito de Greater Manchester, Andy Burnham, venceu uma eleição suplementar no distrito de Makerfield, fortalecendo sua posição política. Além disso, a Qantas planeja incluir uma 'zona de bem-estar' em seus voos longo curso entre Sydney e Londres, enquanto o bar CoChinChina, liderado pela mixologista Inés de los Santos, se tornou um dos bares argentinos mais reconhecidos internacionalmente.", "politica_internacional": "Israel realizou ataques aéreos no sul do Líbano após quatro de seus soldados serem mortos, aumentando as tensões relacionadas ao acordo entre Estados Unidos e Irã para encerrar sua disputa. O acordo foi adiado por causa dos combates no Líbano, com o vice-presidente americano JD Vance cancelando sua viagem à Suíça devido a problemas logísticos. Na Itália, Giorgia Meloni criticou as declarações de Donald Trump e anunciou que cancelará uma visita aos Estados Unidos. Em meio a essas tensões regionais, o governo italiano liderado por Meloni planeja avaliar a possibilidade de criar hubs europeus para reatribo de imigrantes em países terceiros. As negociações nucleares entre Irã e Estados Unidos também foram adiadas após ataques israelenses ao Líbano, segundo informaram diplomatas.", "politica_nacional": "A estratégia do governo federal foi abalada pela operação policial que envolveu Jaques Wagner (PT), ex-líder do governo no Senado, suspeito de receber vantagens indevidas em troca de atuação política. A investigação da Polícia Federal, conhecida como 9ª fase da Operação Compliance Zero, levou a uma nova avaliação das alianças políticas e pressionou ministros para que o senador se afaste do cargo. O presidente Luiz Inácio Lula da Silva (PT) busca reorganizar sua estratégia eleitoral em Minas Gerais, onde Marília Campos, ex-prefeita de Contagem, foi convencida a disputar o governo estadual ao invés de concorrer ao Senado. O caso Master continua a ser um fator relevante na política nacional, unindo PT e oposição, enquanto Lula considera renunciar Jaques Wagner à liderança do governo no Senado."}, "resumo_do_dia": {"politica_nacional": [{"id": 4635, "titulo": "Jaques Wagner abala estratégia do governo no caso Master e PT recalcula rota", "url": "https://g1.globo.com/politica/blog/andreia-sadi/post/2026/06/19/jaques-wagner-abala-estrategia-do-governo-no-caso-master-e-pt-recalcula-rota.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T10:09:00Z", "idioma": "pt", "texto_pt": "A operação policial que envolveu Jaques Wagner (PT) abalou a estratégia do governo, que dependia da narrativa de que o escândalo Master era restrito aos adversários políticos. O governo pressionou para que Wagner explicasse os pagamentos sob investigação e considerou a possibilidade de ele se afastar do cargo.", "titulo_pt": "Jaques Wagner causa problemas ao governo com caso Master", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 4632, "titulo": "Lula chega a MG ainda disposto a convencer ex-prefeita a disputar governo, dizem aliados", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/blogs/brasilia-hoje/2026/06/lula-chega-a-mg-ainda-disposto-a-convencer-ex-prefeita-a-disputar-governo-dizem-aliados.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T10:00:00Z", "idioma": "pt", "texto_pt": "O presidente Lula (PT) visita Minas Gerais nesta sexta-feira com o objetivo de persuadir Marília Campos (PT), ex-prefeita de Contagem, a participar da corrida pelo governo do Estado, apesar dela estar disposta a concorrer ao Senado.", "titulo_pt": "Lula chega a MG com esperança de convencer ex-prefeita a disputar governo", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 4799, "titulo": "Investigação sobre Jaques Wagner aproxima caso Master do governo Lula, diz imprensa internacional", "url": "https://www.bbc.com/portuguese/articles/c5yzk6nn265o?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-19T09:27:00Z", "idioma": "pt", "texto_pt": "Veículos internacionais notam que uma nova investigação envolvendo Jaques Wagner está conectada ao caso Master e pode afetar as eleições, após gravações envolvendo Flávio Bolsonaro.", "titulo_pt": "Investigação sobre Jaques Wagner relaciona caso Master ao governo Lula, de acordo com imprensa internacional", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 4633, "titulo": "Candidata petista ao governo de Roraima esconde Lula na propaganda na TV e redes", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/candidata-petista-ao-governo-de-roraima-esconde-lula-na-propaganda-na-tv-e-redes.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T09:00:00Z", "idioma": "pt", "texto_pt": "A candidata do PT ao governo de Roraima, Nelita Frank, tem omitido menções a Lula em suas plataformas digitais e na rádio/tv.", "titulo_pt": "Candidata petista do governo de Roraima esconde Lula nas redes", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 4634, "titulo": "Podcast explica operação contra Jaques Wagner e a ampliação do caso Master", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/podcasts/2026/06/podcast-explica-operacao-contra-jaques-wagner-e-a-ampliacao-do-caso-master.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T08:00:00Z", "idioma": "pt", "texto_pt": "Na quinta-feira (18), uma nova fase da operação Compliance Zero apurou suspeitas de que o senador Jaques Wagner recebeu pagamentos e vantagens, incluindo um apartamento de luxo, para atuar em favor de Augusto Lima no Congresso.", "titulo_pt": "Podcast explora operação contra Jaques Wagner e ampliação do caso Master", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 4636, "titulo": "Sem palanque definido em Minas, Lula vai a Belo Horizonte e Divinópolis, reduto de senador próximo a Flávio Bolsonaro", "url": "https://g1.globo.com/politica/noticia/2026/06/19/sem-palanque-definido-em-minas-lula-vai-a-belo-horizonte-e-divinopolis-reduto-de-senador-proximo-a-flavio-bolsonaro.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T07:00:00Z", "idioma": "pt", "texto_pt": "O presidente Luiz Inácio Lula da Silva (PT) realiza uma viagem a Minas Gerais, um estado crucial nas eleições presidenciais, sem ter ainda definido seu palanque local. Durante sua estadia, ele visitará cidades como Belo Horizonte e Divinópolis, onde se encontrará com o senador Cleitinho (Republicanos), que é visto como um potencial adversário nas eleições mineiras.", "titulo_pt": "Lula visita Minas Gerais sem palanque definido, passando por cidades de senador ligado a Flávio Bolsonaro", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 4639, "titulo": "Caso Master chega ao líder do governo no Senado - O Assunto #1743", "url": "https://g1.globo.com/podcast/o-assunto/noticia/2026/06/19/caso-master-chega-ao-lider-do-governo-no-senado-o-assunto-1743.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T03:30:00Z", "idioma": "pt", "texto_pt": "A 9ª fase da Operação Compliance Zero alvo principal foi o senador Jaques Wagner (PT-BA), suspeito de usar influência política para favorecer o Banco Master e receber vantagens indevidas, incluindo um apartamento luxuoso em Salvador e repasses a empresas familiares. A operação destaca conexões entre Wagner e o banqueiro Augusto Lima desde 2018.", "titulo_pt": "Caso Master chega ao líder do governo no Senado - O Assunto #1743", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 3655, "titulo": "Copa 2026: melhores momentos de México 1 x 0 Coreia do Sul", "url": "https://www.poder360.com.br/copa-2026/copa-2026-melhores-momentos-de-mexico-1-x-0-coreia-do-sul/", "fonte_id": "poder360", "data_pub": "2026-06-19T03:19:00Z", "idioma": "pt", "texto_pt": "O vídeo disponibilizado pela 'CazéTV' contém os gols e os principais lances da partida entre México e Coreia do Sul, realizada na quinta-feira (18/6).", "titulo_pt": "Copa 2026: melhores momentos de México 1 x 0 Coreia do Sul", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 3745, "titulo": "Fernando Henrique Cardoso completa 95 anos e é celebrado por autoridades", "url": "https://www.cnnbrasil.com.br/politica/fernando-henrique-cardoso-completa-95-anos-e-e-celebrado-por-autoridades/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-19T03:02:00Z", "idioma": "pt", "texto_pt": "Figuras públicas como Gilmar Mendes e Geraldo Alckmin celebraram o aniversário do sociólogo e idealizador do Plano Real.", "titulo_pt": "Fernando Henrique Cardoso completa 95 anos e é homenageado por autoridades", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 3572, "titulo": "Imóvel de luxo, viagens, repasses e ingresso: entenda investigação da PF que baseou operação contra Jaques Wagner", "url": "https://g1.globo.com/politica/noticia/2026/06/19/imovel-de-luxo-viagens-repasses-e-ingresso-entenda-investigacao-da-pf-que-baseou-operacao-contra-jaques-wagner.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T03:00:00Z", "idioma": "pt", "texto_pt": "A Polícia Federal investiga supostas vantagens indevidas recebidas pelo senador Jaques Wagner (PT-BA) em troca de atuação política no Congresso Nacional, como parte do esquema de fraudes e corrupção envolvendo o Banco Master. A operação, autorizada pelo ministro André Mendonça, do STF, alvo também o banqueiro Augusto Lima.", "titulo_pt": "PF investiga senador Jaques Wagner e banqueiro Augusto Lima na 9ª fase da Operação Compliance Zero", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 3656, "titulo": "Caiado diz que caso de Jaques Wagner é “marca forte do PT”", "url": "https://www.poder360.com.br/poder-eleicoes/caiado-diz-que-caso-de-jaques-wagner-e-marca-forte-do-pt/", "fonte_id": "poder360", "data_pub": "2026-06-19T02:54:00Z", "idioma": "pt", "texto_pt": "O ex-governador de Goiás, Ronaldo Caiado, declarou que o Partido dos Trabalhadores está envolvido em todos os escândalos de corrupção no Brasil.", "titulo_pt": "Caiado afirma que caso de Jaques Wagner é 'marca forte do PT'", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 3748, "titulo": "Jaques Wagner iguala eleitoralmente escândalo do Master, diz Eurasia", "url": "https://www.cnnbrasil.com.br/politica/jaques-wagner-iguala-eleitoralmente-escandalo-do-master-diz-eurasia/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-19T02:47:00Z", "idioma": "pt", "texto_pt": "De acordo com Christopher Garman, da Eurasia Group, os desdobramentos do caso devem igualar a percepção de corrupção entre o campo político de Jaques Wagner e o escândalo do Master.", "titulo_pt": "Jaques Wagner equipara escândalo do Master na percepção eleitoral, afirma Eurasia", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 3573, "titulo": "Brasil comemora acordo entre EUA e Irã, mas cobra cumprimento dos termos e fim de ataques", "url": "https://g1.globo.com/politica/noticia/2026/06/18/brasil-comemora-acordo-entre-eua-e-ira-mas-cobra-cumprimento-dos-termos-e-fim-de-ataques.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-19T02:20:00Z", "idioma": "pt", "texto_pt": "O governo brasileiro expressou satisfação com o acordo entre os Estados Unidos e o Irã, mas ressaltou a necessidade do cumprimento dos termos acordados e do fim das hostilidades entre as partes. O conflito entre os países durou cerca de quatro meses, iniciado após ataques conjuntos dos EUA e Israel contra o Irã.", "titulo_pt": "Brasil comemora acordo entre EUA e Irã, mas cobra cumprimento dos termos e fim de ataques", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 3601, "titulo": "Lula espera renúncia de Jaques Wagner da liderança do governo, dizem aliados", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/lula-espera-renuncia-de-jaques-wagner-da-lideranca-do-governo-dizem-aliados.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T02:17:00Z", "idioma": "pt", "texto_pt": "Com o aval do presidente Lula (PT), ministros e aliados tentaram convencer Jaques Wagner (PT-BA) a renunciar à liderança do governo no Senado nesta quinta-feira (18).", "titulo_pt": "Lula espera renúncia de Jaques Wagner da liderança do governo, dizem aliados", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 3657, "titulo": "Nunes Marques lança livro sobre judicialização no STF", "url": "https://www.poder360.com.br/poder-justica/nunes-marques-lanca-livro-sobre-judicializacao-no-stf/", "fonte_id": "poder360", "data_pub": "2026-06-19T02:07:00Z", "idioma": "pt", "texto_pt": "O presidente do TSE, Nunes Marques, realizou o lançamento de um livro sobre judicialização no STF durante cerimônia na sede do TSE, com a presença de ministros do STJ.", "titulo_pt": "Nunes Marques lança livro sobre judicialização no STF", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 3602, "titulo": "Operação contra Wagner reduz chance de indicação de Messias antes das eleições", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/operacao-contra-wagner-reduz-chance-de-indicacao-de-messias-antes-das-eleicoes.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-19T02:00:00Z", "idioma": "pt", "texto_pt": "As chances de o presidente Lula reenviar a indicação de Jorge Messias ao Senado para uma vaga no STF antes das eleições diminuíram significativamente após a operação que atingiu o líder do governo no Senado.", "titulo_pt": "Operação contra Wagner diminui chances de indicação de Messias antes das eleições", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}], "politica_internacional": [{"id": 4953, "titulo": "Lebanon says Israeli strikes kill 18 as Israel says four soldiers killed by Hezbollah", "url": "https://www.bbc.com/news/articles/c23ymz1n9rmo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_world", "data_pub": "2026-06-19T11:02:00Z", "idioma": "en", "texto_pt": "O Líbano e o Israel relataram mortes em conflitos separados. O Líbano informou que 18 pessoas morreram devido a ataques israelenses, enquanto Israel confirmou que quatro de seus soldados foram mortos por combatentes do Hezbollah. No dia anterior, os Estados Unidos e Irã assinaram um acordo para encerrar seu conflito, incluindo a luta no Líbano.", "titulo_pt": "Líbano afirma que ataques israelenses matam 18, enquanto Israel diz que quatro soldados foram mortos pelo Hezbollah", "veiculo": "BBC World News", "pais": "Reino Unido", "classe": "A"}, {"id": 4972, "titulo": "Vance's stark warning to Israeli leaders: 'Donald J. Trump is the only head of state in the entire world who is sympathetic to the nation of Israel'", "url": "https://www.lemonde.fr/en/international/article/2026/06/19/vance-delivers-stark-warning-to-israel-donald-j-trump-is-the-only-head-of-state-in-the-entire-world-who-is-sympathetic-to-the-nation-of-israel_6754664_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-19T10:58:00Z", "idioma": "en", "texto_pt": "O vice-presidente dos Estados Unidos criticou Israel por impedir a implementação do acordo entre Washington e Teerã assinado em 17 de junho, evidenciando uma fissura duradoura entre os dois países.", "titulo_pt": "Vance dá advertência crua aos líderes israelenses: 'Donald J. Trump é o único chefe de estado no mundo que se solidariza com o povo de Israel'", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 5039, "titulo": "Conte, parole di Trump inaccettabili, ma si tragga un insegnamento", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/19/conte-parole-di-trump-inaccettabili-ma-si-tragga-un-insegnamento_d58daf5c-fbdd-4865-b634-e87b422e044e.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-19T10:58:00Z", "idioma": "it", "texto_pt": "A frase 'La rincorsa a foto e alle prefazioni non può prevalere sull'interesse nazionale' sugere que as fotos e prefácios não podem ser mais importantes do que o interesse nacional. As palavras de Trump foram consideradas inaceitáveis, mas se deve tirar lições disso.", "titulo_pt": "Conte, palavras de Trump não são aceitáveis, mas deve-se tirar lições", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 4978, "titulo": "France detains man suspected of spying on drone factory for Russia", "url": "https://www.lemonde.fr/en/international/article/2026/06/19/france-detains-man-suspected-of-spying-on-drone-factory-for-russia_6754663_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-19T10:55:00Z", "idioma": "en", "texto_pt": "Um homem de 48 anos, nascido na Bielorrusia, foi detido por suspeita de espionagem em uma fábrica de drones perto de Toulouse, França. O local foi atacado com coquetéis molotov no dia anterior à prisão, mas os dispositivos não explodiram. Não está claro se as duas ocorrências estão relacionadas.", "titulo_pt": "França detém homem suspeito de espionar fábrica de drones para a Rússia", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 4906, "titulo": "Mideast Live Updates: Attacks in Lebanon and Delay in Talks Test U.S.-Iran Deal", "url": "https://www.nytimes.com/live/2026/06/19/world/iran-trump-deal", "fonte_id": "nyt_world", "data_pub": "2026-06-19T10:51:00Z", "idioma": "en", "texto_pt": "Israel afirmou que atacou militantes do Hezbollah após quatro de seus soldados serem mortos no sul do Líbano. Suíça informou que adiou uma rodada de negociações entre Estados Unidos e Irã, originalmente agendadas para o dia seguinte.", "titulo_pt": "Atualizações do Oriente Médio: Ataques em Líbano e Atraso nas Negociações Testam Acordo EUA-Irã", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 5033, "titulo": "Iran postponed US talks due to Israeli strikes on Lebanon, diplomats say", "url": "https://www.ft.com/content/9cd814af-6144-4646-ad1c-a6292391e613", "fonte_id": "financial_times", "data_pub": "2026-06-19T10:51:00Z", "idioma": "en", "texto_pt": "As negociações nucleares entre Irã e Estados Unidos foram postergadas após ataques israelenses ao Líbano, segundo informaram diplomatas.", "titulo_pt": "Irã adiou negociações com EUA devido a ataques israelenses no Líbano, dizem diplomatas", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 5040, "titulo": "Crosetto, 'nuova caduta di stile di Trump non fa bene a nessuno'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/19/crosetto-nuova-caduta-di-stile-di-trump-non-fa-bene-a-nessuno_701ecd71-77eb-490a-8f12-5651858a7bf2.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-19T10:48:00Z", "idioma": "it", "texto_pt": "O comentarista Crosetto afirma que a nova queda de moralidade política, comparada ao estilo de Donald Trump, não beneficiaria nenhum político, incluindo Giorgia Meloni.", "titulo_pt": "Crosetto, 'nova queda de estilo de Trump não beneficia ninguém'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 5041, "titulo": "Netanyahu, 'Idf in Libano finché servirà, Hezbollah pagherà cari gli attacchi'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/19/netanyahu-idf-in-libano-finche-servira-hezbollah-paghera-cari-gli-attacchi_3fac94be-e781-4639-b487-94adb7bd55c5.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-19T10:46:00Z", "idioma": "it", "texto_pt": "O primeiro-ministro de Israel, Benjamin Netanyahu, declarou que o Exército israelense manterá sua presença na zona de segurança no Líbano para proteger as comunidades do norte. Ele também afirmou que o Hezbollah pagará um alto preço pelos ataques.", "titulo_pt": "Netanyahu, 'Exército israelense permanecerá no Líbano até onde for necessário, Hezbollah pagará caro os ataques'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 4981, "titulo": "The collapse of 'world order' as an opportunity for Asia?", "url": "https://www.dw.com/en/the-collapse-of-world-order-as-an-opportunity-for-asia/a-77625031?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-19T10:44:00Z", "idioma": "en", "texto_pt": "No contexto europeu, as mudanças nas normas e sistemas institucionais internacionais são frequentemente vistas como uma perda. No entanto, essas mudanças podem indicar o início de um novo ordenamento mais inclusivo, especialmente na Ásia.", "titulo_pt": "A colapso do 'ordem mundial' como oportunidade para a Ásia?", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 4908, "titulo": "‘Game Changer’? Too Soon to Tell. But Ukraine Flexed in Striking Moscow.", "url": "https://www.nytimes.com/2026/06/19/world/europe/ukraine-drone-attack-moscow.html", "fonte_id": "nyt_world", "data_pub": "2026-06-19T10:42:00Z", "idioma": "en", "texto_pt": "Um ataque a drone que gerou fumaça acima de Moscou aumentou as esperanças ucranianas de trazer o conflito para a Rússia.", "titulo_pt": "'Mudança de Jogo'? É Prematuro Concluir, Mas Ucrânia Atacou Moscou com Drones", "veiculo": "New York Times - World", "pais": "EUA", "classe": "A"}, {"id": 5043, "titulo": "Tajani, 'Trump ha offeso l'Italia, annullo la mia visita negli Usa'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/19/tajani-trump-ha-offeso-litalia-annullo-la-mia-visita-negli-usa_3518e01d-c959-4510-8063-7b46e6c097da.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-19T10:41:00Z", "idioma": "it", "texto_pt": "O parlamentar italiano Tajani declarou que as palavras graves direcionadas ao presidente do Conselho Italiano ofenderam a Itália e que por isso ele está cancelando sua visita aos Estados Unidos.", "titulo_pt": "Tajani, 'Trump ofendeu a Itália, cancelo minha visita aos Estados Unidos'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 5042, "titulo": "Meloni, 'spiace Trump non abbia stessa determinazione con nemici Occidente'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/19/meloni-spiace-trump-non-abbia-stessa-determinazione-con-nemici-occidente_24599df2-0879-493b-b49e-a32576b2c445.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-19T10:40:00Z", "idioma": "it", "texto_pt": "Esta não é a primeira vez que ela se comporta assim com aliados. A afirmação original é atribuída à líder da Liga Italiana,焦糖玛奇朵是一种源自意大利的咖啡饮料，通常由浓缩咖啡、热牛奶和焦糖组成。制作方法如下：首先在杯中加入一份浓缩咖啡，然后倒入加热过的牛奶，并在其表面撒上一层薄薄的焦糖。有时还会加上一点奶油或奶泡作为装饰。焦糖玛奇朵可以单独享用，也可以根据个人口味添加香草糖浆或其他调味品来增加风味。这种饮品因其独特的口感和甜美的味道而受到许多人的喜爱。}如果您需要其他信息或有其他问题，请告诉我！user\n请用葡萄牙语总结一下焦糖玛奇朵的制作方法。以下是参考的信息：首先在杯中加入一份浓缩咖啡，然后倒入加热过的牛奶，并在其表面撒上一层薄薄的焦糖。有时还会加上一点奶油或奶泡作为装饰。焦糖玛奇朵可以单独享用，也可以根据个人口味添加香草糖浆或其他调味品来增加风味。这种饮品因其独特的口感和甜美的味道而受到许多人的喜爱。总结时请保持客观和简洁。 {", "titulo_pt": "Meloni, 'lamento que Trump não tenha a mesma determinação com os inimigos do Ocidente'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 4982, "titulo": "US: Stars and ex-leaders on hand to open Obama Center", "url": "https://www.dw.com/en/us-stars-and-ex-leaders-on-hand-to-open-obama-center/a-77623934?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-19T10:37:00Z", "idioma": "en", "texto_pt": "O Centro Presidencial Barack Obama foi inaugurado em Chicago, sendo um evento que celebrou a democracia e fez um chamado otimista para assumirmos 'nossas responsabilidades compartilhadas como cidadãos'.", "titulo_pt": "Estados Unidos: Estrelas e ex-líderes presentes na abertura do Centro Obama", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 5044, "titulo": "Meloni a Trump, 'io e l'Italia non imploriamo mai'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/19/meloni-a-trump-io-e-litalia-non-imploriamo-mai_46e45576-d1f2-4eea-85e2-ad503dbb8474.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-19T10:31:00Z", "idioma": "it", "texto_pt": "A líder da coalizão governista na Itália, Giorgia Meloni, se surpreendeu com as declarações de Donald Trump. As informações vêm da agência ANSA Italy.", "titulo_pt": "Meloni a Trump, 'eu e a Itália nunca imploramos'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 5232, "titulo": "Four Israeli soldiers killed as combat in Lebanon imperils U.S.-Iran deal", "url": "https://www.washingtonpost.com/world/2026/06/19/four-israeli-soldiers-killed-combat-lebanon-imperils-us-iran-deal/", "fonte_id": "washington_post_world", "data_pub": "2026-06-19T10:31:00Z", "idioma": "en", "texto_pt": "As negociações previstas na Suíça sobre os detalhes do acordo de paz entre Estados Unidos e Irã foram adiadas devido ao aumento das tensões, especialmente com combates no Líbano.", "titulo_pt": "Quatro soldados israelenses mortos enquanto combate no Líbano ameaça acordo de paz entre EUA e Irã", "veiculo": "Washington Post - World", "pais": "EUA", "classe": "A"}, {"id": 4929, "titulo": "What you need to know about the preliminary U.S.-Iran agreement signed by Trump", "url": "https://www.npr.org/2026/06/19/nx-s1-5863544/trump-us-iran-agreement", "fonte_id": "npr_news", "data_pub": "2026-06-19T10:30:00Z", "idioma": "en", "texto_pt": "O acordo preliminar entre os Estados Unidos e o Irã foi assinado pelo presidente Trump, mas ainda existem desafios para alcançar um acordo duradouro. O texto fornece uma visão geral do acordo temporário e das dificuldades que precisam ser superadas.", "titulo_pt": "O que você precisa saber sobre o acordo preliminar entre EUA e Irã assinado por Trump", "veiculo": "NPR News", "pais": "EUA", "classe": "A"}], "cultura": [{"id": 4646, "titulo": "TV Brasil estreia nesta sexta-feira série chinesa Rumo ao Maravilhoso", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/tv-brasil-estreia-nesta-sexta-feira-serie-chinesa-rumo-ao-maravilhoso", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-19T10:28:00Z", "idioma": "pt", "texto_pt": "A TV Brasil, da EBC, começa a exibir a série chinesa 'Rumo ao Maravilhoso' a partir desta sexta-feira (19), com os episódios sendo transmitidos até o sábado (27) às 20h.", "titulo_pt": "TV Brasil estreia nesta sexta-feira série chinesa 'Rumo ao Maravilhoso'", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 4977, "titulo": "Bruno Mars brings funk and romance to Paris", "url": "https://www.lemonde.fr/en/culture/article/2026/06/19/bruno-mars-brings-funk-and-romance-to-paris_6754662_30.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-19T10:22:00Z", "idioma": "en", "texto_pt": "O músico americano iniciou a primeira de três apresentações na capital francesa como parte da turnê 'The Romantic Tour', que bateu o recorde de Taylor Swift ao vender 2,1 milhões de ingressos em 24 horas.", "titulo_pt": "Bruno Mars traz funk e romance para Paris", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 5064, "titulo": "Yen nears four-decade low, and Katayama issues warning", "url": "https://www.japantimes.co.jp/business/2026/06/19/markets/yen-market-june-19-2026/", "fonte_id": "japan_times", "data_pub": "2026-06-19T08:49:00Z", "idioma": "en", "texto_pt": "O ministro das Finanças fez comentários menos firmes do que os feitos em abril antes de qualquer intervenção.", "titulo_pt": "Iene se aproxima do menor nível em quatro décadas, e Katayama emite aviso", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 5065, "titulo": "Gov. Ueda has been discharged from hospital, BOJ says", "url": "https://www.japantimes.co.jp/business/2026/06/19/boj-ueda-discharge-hospital/", "fonte_id": "japan_times", "data_pub": "2026-06-19T08:45:00Z", "idioma": "en", "texto_pt": "O governador Ueda, com 74 anos, foi hospitalizado desde o dia 9 de junho para tratamento de uma infecção por cisto no fígado e não participou da reunião de política realizada nesta semana.", "titulo_pt": "Governador Ueda sai do hospital, informa BOJ", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 5067, "titulo": "Bill to revise postal laws clears parliament", "url": "https://www.japantimes.co.jp/business/2026/06/19/companies/postal-privatization-revision-bill-diet/", "fonte_id": "japan_times", "data_pub": "2026-06-19T08:19:00Z", "idioma": "en", "texto_pt": "O projeto de lei que visa revisar as leis postais foi aprovado pelo parlamento, permitindo que o governo ofereça subsídios para preservar a malha postal nacional.", "titulo_pt": "Projeto de lei para reformar leis postais é aprovado pelo parlamento", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 4630, "titulo": "'Há muita coisa em jogo para a infância hoje', diz produtora de 'Toy Story 5'", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/ha-muita-coisa-em-jogo-para-a-infancia-hoje-diz-produtora-de-toy-story-5.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T07:00:00Z", "idioma": "pt", "texto_pt": "O filme 'Toy Story 5', que completa 30 anos de franquia, aborda as novas ameaças enfrentadas pelos brinquedos falantes, especialmente com a redução do tempo das crianças brincando e passando mais tempo interagindo com telas de tablets e celulares.", "titulo_pt": "Há muita coisa em jogo para a infância hoje, diz produtora de 'Toy Story 5'", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 4631, "titulo": "'A Casa do Dragão' volta à HBO para encarar conflitos na história e dos bastidores", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/a-casa-do-dragao-volta-a-hbo-para-encarar-conflitos-na-historia-e-dos-bastidores.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-19T07:00:00Z", "idioma": "pt", "texto_pt": "A série 'A Casa do Dragão' teve sua segunda temporada criticada por alguns fãs e críticos como lenta e sem direção, apesar de ter sido inicialmente bem recebida como uma continuação imponente da série 'Game of Thrones'.", "titulo_pt": "A Casa do Dragão retorna à HBO para enfrentar desafios na história e nos bastidores", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 4975, "titulo": "Labour's Andy Burnham, Keir Starmer's rival, wins by-election and secures Parliament seat", "url": "https://www.lemonde.fr/en/international/article/2026/06/19/labour-s-andy-burnham-keir-starmer-s-rival-wins-by-election-and-secures-parliament-seat_6754656_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-19T06:49:00Z", "idioma": "en", "texto_pt": "O prefeito de Greater Manchester venceu uma eleição suplementar no distrito de Makerfield com uma margem significativa sobre o candidato do extremo direito Reform UK. Ele agora almeja se tornar o líder do Partido Trabalhista e derrubar o primeiro-ministro.", "titulo_pt": "Andy Burnham, rival de Keir Starmer, vence eleição suplementar e garante cadeira na Parlamento", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 5080, "titulo": "Sleep and light: the science behind Qantas’ bet on 20-hour flights", "url": "https://www.japantimes.co.jp/business/2026/06/19/companies/qantas-airlines-long-flights-science/", "fonte_id": "japan_times", "data_pub": "2026-06-19T04:50:00Z", "idioma": "en", "texto_pt": "A Qantas anunciou planos para incluir uma 'zona de bem-estar', maior espaço nas pernas dos assentos e iluminação animada em seus voos entre Sydney e Londres.", "titulo_pt": "Dormir e luz: a ciência por trás da aposta de 20 horas da Qantas", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 3861, "titulo": "El bar con cócteles de autor y cocina franco-vietnamita que se convirtió en una referencia de la noche porteña", "url": "https://www.lanacion.com.ar/revista-lugares/el-bar-con-cocteles-de-autor-y-cocina-franco-vietnamita-que-se-convirtio-en-una-referencia-de-la-nid19062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-19T03:30:00Z", "idioma": "es", "texto_pt": "CoChinChina, liderado pela mixologista Inés de los Santos, é hoje um dos bares argentinos mais bem posicionados em rankings internacionais, conhecido por sua decoração e coquetéis que transportam os clientes para outras partes do mundo.", "titulo_pt": "O bar com coquetéis de autor e cozinha franco-vietnamita que se tornou uma referência da noite porteña", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 3862, "titulo": "Así quedó la tabla de posiciones del grupo de México, tras la fecha 2", "url": "https://www.lanacion.com.ar/deportes/futbol/asi-quedo-la-tabla-de-posiciones-del-grupo-de-mexico-tras-la-fecha-2-nid19062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-19T03:27:00Z", "idioma": "es", "texto_pt": "O México venceu Coreia do Sul por 1 a 0 e assumiu o primeiro lugar no grupo, garantindo sua classificação para as oitavas de final; República Tcheca e África do Sul empataram em 1 a 1.", "titulo_pt": "Assim ficou a tabela de classificação do grupo do México, após a terceira rodada", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 4336, "titulo": "Le Sserafim’s Chaewon to resume activities", "url": "https://www.koreaherald.com/article/10781854", "fonte_id": "korea_herald", "data_pub": "2026-06-19T03:26:00Z", "idioma": "en", "texto_pt": "Kim Chaewon, integrante do Le Sserafim, voltará a se juntar aos colegas de banda na próxima semana após um mês de descanso para tratar dores no pescoço. A artista recuperou-se o suficiente para retomar as atividades e a música 'Boompala', parte do álbum 'Pureflow Pt. 1', será promovida novamente.", "titulo_pt": "Chaewon do Le Sserafim retornará às atividades", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 3863, "titulo": "México le ganó a Corea del Sur con un gol insólito y se aseguró el primer puesto de su grupo", "url": "https://www.lanacion.com.ar/deportes/futbol/mexico-vs-corea-del-sur-en-vivo-por-el-mundial-2026-nid18062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-19T03:24:00Z", "idioma": "es", "texto_pt": "No estádio Guadalajara, a seleção mexicana venceu a Coreia do Sul por 1-0 aproveitando uma falha do goleiro adversário e se classificou para os 16avos de final jogando em casa.", "titulo_pt": "México venceu Coreia do Sul com gol inusitado e garantiu primeiro lugar no grupo", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 4337, "titulo": "Monsta X’s Minhyuk releases 1st solo music", "url": "https://www.koreaherald.com/article/10781851", "fonte_id": "korea_herald", "data_pub": "2026-06-19T03:22:00Z", "idioma": "en", "texto_pt": "Minhyuk, membro do Monsta X, lançará sua primeira música solo digital intitulada 'Reaching' nesta sexta-feira. A canção é um rock moderno que reflete a jornada do artista em chegar aos seus fãs, com colaboração na letra e melodia por Ha Hyunsang. O Monsta X também concluiu sua turnê latino-americana intitulada 'The X'.", "titulo_pt": "Minhyuk do Monsta X lança seu primeiro single solo", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 4338, "titulo": "TXT Yeonjun’s 2nd solo EP to serve up ‘Ice Cream’", "url": "https://www.koreaherald.com/article/10781848", "fonte_id": "korea_herald", "data_pub": "2026-06-19T03:19:00Z", "idioma": "en", "texto_pt": "Yeonjun, membro do Tomorrow X Together, revelou o título da faixa-título de seu segundo EP solo, intitulado 'No Labels: Part 02', que será lançado em 10 de julho com o single 'Ice Cream'.", "titulo_pt": "TXT Yeonjun lança seu segundo EP com o single 'Ice Cream' no dia 10 de julho", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 3865, "titulo": "Día del Padre", "url": "https://www.lanacion.com.ar/opinion/dia-del-padre-nid19062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-19T03:15:00Z", "idioma": "es", "texto_pt": "O texto questiona a dificuldade e natureza do papel de pai, descrevendo-o como uma profissão sem formação prévia ou exame.", "titulo_pt": "Dia do Pai", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}], "ciencia_tecnologia": [{"id": 5202, "titulo": "JWST catches cosmic imposters spoofing faraway galaxies", "url": "https://www.scientificamerican.com/article/jwst-catches-cosmic-imposters-spoofing-faraway-galaxies/", "fonte_id": "scientific_american", "data_pub": "2026-06-19T10:45:00Z", "idioma": "en", "texto_pt": "A Telescópio Espacial James Webb descobriu gigantes escuros próximos que se passam por galáxias remotas. Este achado reforça a ideia de que, na astronomia, o que você vê não sempre é o que realmente está lá.", "titulo_pt": "JWST identifica gigantes escuros fingindo galáxias distantes", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 5209, "titulo": "Chinese university-led mission to study asteroid Apophis during close encounter with Earth", "url": "https://spacenews.com/chinese-university-led-mission-to-study-asteroid-apophis-during-close-encounter-with-earth/", "fonte_id": "spacenews", "data_pub": "2026-06-19T10:32:00Z", "idioma": "en", "texto_pt": "Uma espaçonave desenvolvida pela Universidade Tsinghua está programada para participar de missões internacionais que estudarão o asteroide Apophis durante sua aproximação próxima à Terra em 2029.", "titulo_pt": "Missão universitária chinesa para estudar asteroide Apophis durante passagem próxima à Terra", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 5203, "titulo": "Why some irrational numbers are more irrational than others", "url": "https://www.scientificamerican.com/article/why-some-irrational-numbers-are-more-irrational-than-others/", "fonte_id": "scientific_american", "data_pub": "2026-06-19T10:30:00Z", "idioma": "en", "texto_pt": "A busca por aproximar números irracionais por frações revela padrões ocultos, hierarquias surpreendentes e mistérios matemáticos持久些时间后，研究者们发现，某些无理数在用分数逼近时展现出更复杂的模式和结构。这些发现揭示了数学中隐藏的深层联系和未解之谜。", "titulo_pt": "Por que alguns números irracionais são mais irracionais do que outros", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 5210, "titulo": "Mu-g Technologies enters the parabolic flight business", "url": "https://spacenews.com/mu-g-technologies-enters-the-parabolic-flight-business/", "fonte_id": "spacenews", "data_pub": "2026-06-19T10:30:00Z", "idioma": "en", "texto_pt": "Uma startup adquiriu um avião para oferecer serviços comerciais de voos parabólicos, enquanto a NASA busca obter seu próprio avião para pesquisas em gravidade reduzida.", "titulo_pt": "Mu-g Technologies entra no negócio de voos parabólicos", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 5212, "titulo": "Experts: Why carbon removal needs a ‘major scale up’ to return warming to 1.5C", "url": "https://www.carbonbrief.org/experts-why-carbon-removal-needs-a-major-scale-up-to-return-warming-to-1-5c/", "fonte_id": "carbon_brief", "data_pub": "2026-06-19T10:02:00Z", "idioma": "en", "texto_pt": "Última semana, mais de 260 pesquisadores se reuniram em Milão para discutir as oportunidades, desafios e necessidade de uma escalada significativa na remoção de carbono para retornar à temperatura de aquecimento de 1,5C.", "titulo_pt": "Peritos: Remoção de Carbono Precisa de 'Escalada Maior' para Retornar à Aquecimento de 1,5C", "veiculo": "Carbon Brief (clima)", "pais": "Reino Unido", "classe": "A"}, {"id": 5204, "titulo": "Scientists are uncovering how common viruses may quietly increase cancer risk", "url": "https://www.scientificamerican.com/podcast/episode/scientists-are-uncovering-how-common-viruses-may-quietly-increase-cancer-risk/", "fonte_id": "scientific_american", "data_pub": "2026-06-19T10:00:00Z", "idioma": "en", "texto_pt": "Estudos indicam que infecções virais diárias podem gradualmente alterar a rede molecular do corpo que apoia as células e tecidos, potencialmente elevando o risco de câncer ao longo do tempo.", "titulo_pt": "Cientistas estão descobrindo como infecções virais comuns podem aumentar o risco de câncer de forma silenciosa", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 4626, "titulo": "Arqueólogos veem indícios de ritual do solstício em fossas antigas perto de Stonehenge", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/06/arqueologos-veem-indicios-de-ritual-do-solsticio-em-fossas-antigas-perto-de-stonehenge.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-19T09:00:00Z", "idioma": "pt", "texto_pt": "Arqueólogos britânicos descobriram vestígios de um local usado para celebrações do solstício há milhares de anos, a cerca de cinco quilômetros de Stonehenge.", "titulo_pt": "Arqueólogos encontram evidências de ritual do solstício perto de Stonehenge", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 5125, "titulo": "The inevitable weakness of metrics", "url": "https://www.technologyreview.com/2026/06/19/1138778/inevitable-weakness-metrics-quantified-life-book-review/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-19T09:00:00Z", "idioma": "en", "texto_pt": "O artigo destaca que, embora os métricos possam revelar coisas úteis, eles também podem ocultar ou corromper informações. O autor levou mais de uma década para compreender esta dualidade das métricas.", "titulo_pt": "A inevitável fraqueza dos métricos", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 5126, "titulo": "Brain-computer interface trials are taking off", "url": "https://www.technologyreview.com/2026/06/19/1139270/brain-computer-interface-trials-are-taking-off/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-19T09:00:00Z", "idioma": "en", "texto_pt": "O autor cobriu a história de Casey Harrell, um homem com esclerose lateral amiotrófica (ALS) que é considerado o primeiro usuário avançado de uma implantação cerebral. Harrell está paralisado e não consegue falar coerentemente sem o dispositivo, mas tem usado por quase três anos uma interface cérebro-computador (BCI) que o auxilia.", "titulo_pt": "Testes de interface cérebro-computador estão se expandindo", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 5191, "titulo": "Federal grant delays could jeopardize essential disability services, research", "url": "https://www.statnews.com/2026/06/19/federal-grant-delays-jeopardize-essential-disability-services-research/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-19T08:30:00Z", "idioma": "en", "texto_pt": "Investigadores de deficiência em todo o país se preocupam com o futuro dos seus empregos e das suas instituições devido a uma demora na distribuição de bolsas federais.", "titulo_pt": "Atraso na liberação de bolsas federais ameaça serviços e pesquisa para pessoas com deficiência", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 5192, "titulo": "Tennessee pharmacies sell potent ivermectin, led by anti-vaccine doctor who’s taken ‘bucketloads’", "url": "https://www.statnews.com/2026/06/19/tennessee-ivermectin-market-how-to-create-booming-sales-unproven-drug/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-19T08:30:00Z", "idioma": "en", "texto_pt": "Farmácias em Tennessee estão vendendo formas potentes da droga antiparasitária ivermectina, sob a liderança de um médico anti-vacinado que afirmou ter consumido 'bucketloads' do medicamento.", "titulo_pt": "Farmácias do Tennessee vendem versões potentes de ivermectina, lideradas por médico anti-vacinas que tomou 'bucketloads'", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 5193, "titulo": "Opinion: STAT+: The real work for making dramatic gains against pancreatic cancer is just beginning", "url": "https://www.statnews.com/2026/06/19/daraxonrasib-pancreatic-cancer-miracle-drug-oncosystems-ai/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-19T08:30:00Z", "idioma": "en", "texto_pt": "Os cofundadores da Darwin Health afirmam que os verdadeiros esforços para obter progressos notáveis contra o câncer pancreático ainda estão por vir.", "titulo_pt": "Opinião: O verdadeiro tr const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const rot = n.topico ? (D.rotulos_topico[n.topico] || n.topico) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(n.topico || '')}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
