anual e cria tarifa de 50%", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/uniao-europeia-amplia-protecao-a-industria-de-aco-reduz-limite-anual-e-cria-tarifa-de-50.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T11:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Comissão Europeia estabeleceu novas cotas para limitar as importações de aço isentas de tarifas, com o objetivo de proteger a indústria siderúrgica da União Europeia e aumentar sua utilização de capacidade para 80%. O limite anual foi reduzido e uma tarifa de 50% foi criada para incentivar a produção local.", "titulo_pt": "União Europeia amplia proteção à indústria de aço, reduz limite anual e cria tarifa de 50%", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 27213, "titulo": "Governo oficializa Plano Safra 2026/27 empresarial de R$ 525,1 bilhões", "url": "https://www.cnnbrasil.com.br/agro/governo-federal-oficializa-plano-safra-2026-2027-com-r-5251-bilhoes/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T11:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O governo divulgou o Plano Safra 2026/2027, destinado à agricultura empresarial, com taxas de juros variando entre 8% e 12,5%, representando uma redução de até 1,5 ponto percentual em comparação com o ciclo anterior.", "titulo_pt": "Governo anuncia Plano Safra 2026/27 empresarial com limite de juros de R$ 525,1 bilhões", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 27180, "titulo": "Dívida bruta sobe para 81,1% do PIB e déficit primário chega a R$ 56,1 bilhões", "url": "https://veja.abril.com.br/economia/divida-bruta-sobe-para-811-do-pib-e-deficit-primario-chega-a-r-561-bilhoes/", "fonte_id": "veja", "data_pub": "2026-06-30T11:46:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O déficit primário do governo federal no mês de maio atingiu R$ 56,1 bilhões e a dívida bruta aumentou para 81,1% do PIB.", "titulo_pt": "Dívida bruta cresce para 81,1% do PIB e déficit primário chega a R$ 56,1 bilhões", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27216, "titulo": "Atividade industrial na China volta a crescer impulsionada pelo boom da IA", "url": "https://www.cnnbrasil.com.br/economia/macroeconomia/atividade-industrial-na-china-volta-a-crescer-impulsionada-pelo-boom-da-ia/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T11:39:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A atividade industrial na China está crescendo novamente, impulsionada pelo boom da inteligência artificial (IA). Os dados indicam que o investimento global em IA está atuando como um importante amortecedor para os fabricantes na economia chinesa.", "titulo_pt": "Atividade Industrial na China Cresce com o Boom da IA", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 27011, "titulo": "Agência de mineração contrariou parecer interno e reativou alvarás abandonados por mineradora", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/mercado/2026/06/agencia-de-mineracao-contrariou-parecer-interno-e-reativou-alvaras-abandonados-por-mineradora.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A ANM reativou 11 alvarás de pesquisa abandonados pela mineradora australiana Slipstream Participações, devolvendo as áreas à empresa. Esta decisão contrariou o parecer jurídico interno da agência.", "titulo_pt": "Agência de mineração reativou alvarás abandonados por mineradora, contrariando parecer interno", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 27108, "titulo": "Saiba quanto as entidades do agro pediram para o Plano Safra", "url": "https://www.cnnbrasil.com.br/agro/saiba-quanto-as-entidades-do-agro-pediram-para-o-plano-safra/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As entidades do setor agrícola solicitaram um total de R$ 623 a R$ 670 bilhões para o Plano Safra, pedindo também por uma ampliação dos mecanismos que gerenciam riscos.", "titulo_pt": "Saiba quanto as entidades do agro pediram para o Plano Safra", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 27367, "titulo": "Japan nears longest postwar growth even as households struggle", "url": "https://www.japantimes.co.jp/business/2026/06/30/japan-postwar-growth/", "fonte_id": "japan_times", "data_pub": "2026-06-30T10:53:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O governo manteve a avaliação de que a economia está 'recuperando moderadamente', indicando que o crescimento ainda tem potencial para se estender. A expansão econômica pode alcançar seu período mais longo desde a guerra mesmo enquanto as famílias enfrentam dificuldades.", "titulo_pt": "Japão se aproxima do maior crescimento pós-guerra, mas famílias lutam", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 26826, "titulo": "Receita paga nesta terça maior lote de restituição do IR da história", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/receita-paga-nesta-terca-maior-lote-de-restituicao-do-ir-da-historia", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-30T10:25:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Nesta terça-feira (30), a Receita Federal pagará R$ 16 bilhões a cerca de 9,5 milhões de contribuintes com o maior lote de restituição do Imposto de Renda da história. O pagamento inclui o segundo lote da Declaração do IR Pessoa Física de 2026 e restituições residuais de anos anteriores.", "titulo_pt": "Receita paga nesta terça maior lote de restituição do IR da história", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}, {"id": 26847, "titulo": "Cooperativas avançam e redesenham o financiamento do agro brasileiro", "url": "https://www.cnnbrasil.com.br/agro/cooperativas-avancam-e-redesenham-o-financiamento-do-agro-brasileiro/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T10:01:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As cooperativas aumentaram sua participação no financiamento do agronegócio brasileiro, passando de 13% para 25% das operações em dez anos. Este crescimento ocorreu num cenário de pressão orçamentária.", "titulo_pt": "Cooperativas expandem participação no financiamento do agro brasileiro", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 26263, "titulo": "Varejo em alerta: descontos e bonificações podem sair caro", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/blogs/que-imposto-e-esse/2026/06/varejo-em-alerta-descontos-e-bonificacoes-podem-sair-caro.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "No varejo, práticas como descontos e bonificações são comuns para estimular as vendas. No entanto, a possibilidade de impacto tributário dessas estratégias ainda não é adequadamente mensurada por muitas empresas.", "titulo_pt": "Varejista em alerta: descontos e bonificações podem sair caro", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 26264, "titulo": "Grupo Trigo prevê primeiros resultados com Casa do Pão de Queijo no fim do ano", "url": "https://redir.folha.com.br/redir/online/mercado/rss091/*https://www1.folha.uol.com.br/colunas/painelsa/2026/06/grupo-trigo-preve-primeiros-resultados-com-casa-do-pao-de-queijo-no-fim-do-ano.shtml", "fonte_id": "folha_mercado", "data_pub": "2026-06-30T10:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Grupo Trigo, responsável pelas redes Spoleto, Koni e Gendai, espera obter os primeiros resultados da Casa do Pão de Queijo após a compra, previstos para o final de 2026. A empresa acredita que este será um ponto de inflexão para a marca.", "titulo_pt": "Grupo Trigo espera primeiros resultados da Casa do Pão de Queijo no fim de 2026", "veiculo": "Folha de S.Paulo - Mercado", "pais": "Brasil", "classe": "A"}, {"id": 26500, "titulo": "EU halves duty-free steel quota but UK and other partners given better rate", "url": "https://www.theguardian.com/business/2026/jun/30/eu-duty-free-steel-quota-uk-rate-brexit", "fonte_id": "guardian_world", "data_pub": "2026-06-30T09:51:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A União Europeia reduziu pela metade a quantidade de aço importado sem tarifas, mas aumentou os limites para mais de uma dúzia de parceiros comerciais, incluindo o Reino Unido. A medida visa reduzir a entrada de aço chinês barato na União Europeia, mas 13 países com acordo de livre-comércio com Bruxelas tiveram seus limites reduzidos apenas em um terço.", "titulo_pt": "UE reduz metade da quota de aço sem tarifas, mas concede melhor rateio para parceiros comerciais", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 26271, "titulo": "Caixa conclui pagamento da parcela de junho do Bolsa Família", "url": "https://agenciabrasil.ebc.com.br/economia/noticia/2026-06/caixa-conclui-pagamento-da-parcela-de-junho-do-bolsa-familia", "fonte_id": "agencia_brasil_economia", "data_pub": "2026-06-30T09:45:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Caixa Econômica Federal concluiu o pagamento da parcela de junho do Bolsa Família para os beneficiários com Número de Inscrição Social (NIS) final 0. O programa atingiu 19,34 milhões de famílias no mês, com um gasto total de R$ 13,08 bilhões.", "titulo_pt": "Caixa conclui pagamento da parcela de junho do Bolsa Família", "veiculo": "Agência Brasil - Economia", "pais": "Brasil", "classe": "A"}], "economia__eventos": [], "tecnologia": [{"id": 27384, "titulo": "Poetry for Engineers: Nine Lives of Nikola Tesla", "url": "https://spectrum.ieee.org/poetry-for-engineers-nine-lives-of-nikola-tesla", "fonte_id": "ieee_spectrum", "data_pub": "2026-06-30T12:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Nikola Tesla nasceu num dia de tempestade, com relâmpagos no céu. Sua primeira vida começou ao tocar o pelo de um gato, criando faíscas na escuridão. Sua mãe alertou sobre perigos, mas ele já buscava a luz que retornaria. Sua segunda vida ocorreu debaixo d'água, onde o silêncio e a falta de ar contrastavam com sua determinação.", "titulo_pt": "Poesia para Engenheiros: Nove Vidas de Nikola Tesla", "veiculo": "IEEE Spectrum", "pais": "EUA", "classe": "A"}, {"id": 27298, "titulo": "WhatsApp suma nombres de usuario para compartirlos en vez del número de celular", "url": "https://www.lanacion.com.ar/tecnologia/whatsapp-suma-nombres-de-usuario-para-compartirlos-en-vez-del-numero-de-celular-nid29062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T12:15:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O WhatsApp introduziu a reserva de nomes de usuário (@nome_de_usuario) como uma nova função que destaca a privacidade e as empresas. Essa funcionalidade permite compartilhar o nome de usuário, mas manter oculto o número de telefone.", "titulo_pt": "WhatsApp adota nomes de usuário para compartilhar em vez do número de celular", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 27372, "titulo": "Asean hopes to tap Greater Bay Area’s tech skills with closer ties: industry chiefs", "url": "https://www.scmp.com/news/hong-kong/hong-kong-economy/article/3358926/asean-hopes-tap-greater-bay-areas-tech-skills-closer-ties-industry-chiefs?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T12:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Países da ASEAN buscam aprofundar a integração de cadeias produtivas com a Região do Grande Baixo Extremo Oriente para aproveitar as habilidades tecnológicas avançadas e de manufatura da região, segundo líderes industriais e autoridades. A artificial inteligência e a tecnologia verde foram destacados como áreas-chave de cooperação.", "titulo_pt": "Países da ASEAN buscam aproximação com Região do Grande Baixo Extremo Oriente para aproveitar expertise em tecnologias avançadas", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 27392, "titulo": "Hypefy AI raises $7.2M Series A to automate global influencer campaigns", "url": "https://tech.eu/2026/06/30/hypefy-ai-raises-72m-series-a-to-automate-global-influencer-campaigns/", "fonte_id": "tech_eu", "data_pub": "2026-06-30T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A Hypefy AI, uma plataforma croata que usa IA para automatizar campanhas de marketing por influenciadores, levantou $7,2 milhões em uma rodada de financiamento Serie A. A rodada foi liderada pela AYMO Ventures.", "titulo_pt": "Hypefy AI levanta $7,2M em rodada Serie A para automatizar campanhas com influenciadores globais", "veiculo": "Tech.eu", "pais": "Bélgica", "classe": "B"}, {"id": 27365, "titulo": "Aflac Japan reports data breach affecting over 4 million customers", "url": "https://www.japantimes.co.jp/business/2026/06/30/aflac-hack-4-million/", "fonte_id": "japan_times", "data_pub": "2026-06-30T11:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Aflac Japan relatou uma violação de dados que afetou mais de 4 milhões de clientes. Para cerca de 230 mil desses clientes, informações sobre contas de pagamento de prêmios também foram comprometidas.", "titulo_pt": "Aflac Japan relata vazamento de dados de mais de 4 milhões de clientes", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 27101, "titulo": "Digiclean raises €2.5M to optimise industrial cleaning with AI", "url": "https://tech.eu/2026/06/30/digiclean-raises-eur25m-to-optimise-industrial-cleaning-with-ai/", "fonte_id": "tech_eu", "data_pub": "2026-06-30T11:11:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa sueca de tecnologia profunda Digiclean levantou €2,5 milhões em uma rodada de financiamento seed para avançar seu plataforma de otimização da limpeza e manutenção industrial. A rodada foi liderada conjuntamente por Unconventional Ventures.", "titulo_pt": "Digiclean arrecada €2,5 milhões para otimizar limpeza industrial com AI", "veiculo": "Tech.eu", "pais": "Bélgica", "classe": "B"}, {"id": 26984, "titulo": "Chip supply chain braces for more price hikes as upstream parts create new bottlenecks", "url": "https://www.scmp.com/tech/tech-trends/article/3358907/chip-supply-chain-braces-more-price-hikes-upstream-parts-create-new-bottlenecks?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O aumento de preços impulsionado por inteligência artificial na cadeia de suprimentos de semicondutores está se expandindo para componentes e materiais mais upstream, criando novos gargalos que podem retardar a construção da infraestrutura global de inteligência artificial. Fornecedores de partes menos visíveis estão ganhando poder de negociação à medida que clientes concorrem por capacidade limitada.", "titulo_pt": "Cadeia de suprimentos de chips se prepara para novos aumentos de preço devido a gargalos upstream", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 27079, "titulo": "La desalmada IA", "url": "https://www.latercera.com/opinion/noticia/la-desalmada-ia/", "fonte_id": "la_tercera", "data_pub": "2026-06-30T11:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A inteligência artificial não pode ser prudente porque falta experiência prática. A prudência envolve ponderação e compreensão, enquanto a IA é vista como a antítesis de um sábio da tribo por sua incapacidade de considerar experiências passadas.", "titulo_pt": "A desalmada IA", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 27082, "titulo": "What AI Will Do to Art", "url": "https://www.theatlantic.com/magazine/2026/08/ai-art-holly-herndon-mat-dryhurst/687619/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-30T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Holly Herndon e Mat Dryhurst acreditam que o futuro não precisa pertencer ao lixo.", "titulo_pt": "O que a IA fará com a arte", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 26987, "titulo": "Wemade sold to China-linked NeoPulse for W920b", "url": "https://www.koreaherald.com/article/10793568", "fonte_id": "korea_herald", "data_pub": "2026-06-30T10:35:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A empresa sul-coreana de desenvolvimento de jogos Wemade foi vendida à companhia chinesa NeoPulse. O fundador da Wemade, Park Kwan-ho, assinou um acordo para vender sua participação majoritária na empresa ao NeoPulse, avaliada em cerca de 920 bilhões de wones (aproximadamente 593 milhões de dólares).", "titulo_pt": "Wemade vendida à NeoPulse, companhia chinesa", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 26989, "titulo": "Bernie Sanders Saw This Coming", "url": "https://www.wired.com/story/the-big-interview-podcast-senator-bernie-sanders/", "fonte_id": "wired", "data_pub": "2026-06-30T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Bernie Sanders tem defendido há décadas que a concentração de riqueza ameaça a democracia americana. Agora, ele aposta que a frustração com as grandes tecnológicas, bilionários e IA descontrolada está atingindo um ponto de inflexão.", "titulo_pt": "Bernie Sanders Preveu Isto", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 26988, "titulo": "Building tech in the world’s secret R&D hub", "url": "https://www.technologyreview.com/2026/06/30/1139661/building-tech-in-the-worlds-secret-rd-hub/", "fonte_id": "mit_tech_review", "data_pub": "2026-06-30T10:23:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ao longo dos últimos vinte anos, muitas das empresas de tecnologia mais influentes do mundo estabeleceram centros de pesquisa e desenvolvimento (R&D) em uma cidade com cerca de 400 mil habitantes. Esta localização é menor que a cidade de São Francisco e abriga sedes de companhias como Apple, Anthropic, Disney Research, Google, Meta, Microsoft, NVIDIA e OpenAI.", "titulo_pt": "Construindo tecnologia no hub secreto de R&D do mundo", "veiculo": "MIT Technology Review", "pais": "EUA", "classe": "A"}, {"id": 27100, "titulo": "Walmart signs first nuclear power agreement to secure 176 MW of zero-emission supply", "url": "https://www.digitimes.com/news/a20260630PD240/nuclear-electricity-plant-infrastructure.html", "fonte_id": "digitimes", "data_pub": "2026-06-30T10:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Walmart e Constellation Energy assinaram um acordo para a compra de energia nuclear, garantindo uma capacidade de geração de cerca de 176 MW de eletricidade zero-emissão a partir do Centro Dresden Clean Energy Center em Illinois. O contrato inclui duas parcerias de 15 anos que começarão em 2029 e 2030, com 30 MW de nova capacidade geradora.", "titulo_pt": "Walmart firma primeiro acordo nuclear para garantir 176 MW de energia zero-emissão", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 26546, "titulo": "America’s immigrant tech workers are paying an uncertainty tax", "url": "https://restofworld.org/2026/us-tech-immigration-bottleneck-h1b-talent-drain/?utm_source=rss&utm_medium=rss&utm_campaign=feeds", "fonte_id": "rest_of_world", "data_pub": "2026-06-30T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Muitos trabalhadores imigrantes de tecnologia nos Estados Unidos estão considerando se mudar para Canadá, o Reino Unido ou o Golfo após anos de regras migratórias incertas. Um tribunal anulou uma taxa de $100.000 para o H-1B, mas as incertezas persistem.", "titulo_pt": "Trabalhadores imigrantes de tecnologia dos EUA estão pagando um imposto de incerteza", "veiculo": "Rest of World", "pais": "EUA", "classe": "A"}, {"id": 26692, "titulo": "Asia Neo Tech and Brooks sign 15-year FOUP deal", "url": "https://www.digitimes.com/news/a20260630PD237/asia-technology-equipment-market-licensing.html", "fonte_id": "digitimes", "data_pub": "2026-06-30T09:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Asia Neo Tech firmou um acordo de licenciamento tecnológico por 15 anos com a Brooks Automation, empresa americana, para colaborar na produção de equipamentos de limpeza FOUP e expandir sua presença em mercados globais. O contrato foi assinado em 30 de junho de 2026.", "titulo_pt": "Asia Neo Tech e Brooks Automation firmam acordo de 15 anos", "veiculo": "DIGITIMES (Taiwan)", "pais": "Taiwan", "classe": "B"}, {"id": 26658, "titulo": "Is Singapore facing ‘public fatigue’ over ex-MP Raeesah Khan saga?", "url": "https://www.scmp.com/week-asia/politics/article/3358904/singapore-facing-public-fatigue-over-ex-mp-raeesah-khan-saga?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T09:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Há quase cinco anos, a ex-deputada Raeesah Khan do Partido Trabalhista (WP) disse sua primeira mentira no Parlamento de Singapura e os efeitos dessa ação continuam. Alguns observadores políticos sugerem que o público está se cansando da questão e que seria melhor para ambos os partidos, o Partido da Ação Popular (PAP) e o WP, evitar prolongar o assunto, especialmente com questões mais urgentes para os cidadãos.", "titulo_pt": "Singapura enfrenta 'cansaço público' na saga de ex-deputada Raeesah Khan?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}], "tecnologia__eventos": [], "ciencia": [{"id": 27393, "titulo": "SSC Space, Firefly set 2028 target for first orbital launch from Sweden’s Esrange", "url": "https://spacenews.com/ssc-space-firefly-set-2028-target-for-first-orbital-launch-from-swedens-esrange/", "fonte_id": "spacenews", "data_pub": "2026-06-30T12:21:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "SSC Space e Firefly estabeleceram 2028 como o objetivo para a primeira lançamento orbital do Esrange, localizado na Suécia. A infraestrutura crucial e as regulamentações necessárias estão sendo implementadas.", "titulo_pt": "SSC Space e Firefly definem 2028 como data para primeiro lançamento orbital do Esrange, da Suécia", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 27386, "titulo": "By 2050, many Sydney apartments built to today's standards could be too hot for weeks at a time", "url": "https://phys.org/news/2026-06-sydney-apartments-built-today-standards.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T12:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Sydney enfrenta frequente calor extremo, com o registro mais alto de 48,9°C registrado na Penrith, no oeste da cidade, em janeiro de 2020. Até 2050, muitos apartamentos construídos conforme os padrões atuais podem ficar muito quentes por semanas a cada vez.", "titulo_pt": "Até 2050, muitos apartamentos de Sydney poderiam ficar insuportavelmente quentes", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 27385, "titulo": "Half of states sue over Medicaid work requirements", "url": "https://www.statnews.com/2026/06/30/health-news-half-of-states-sue-over-medicaid-work-requirements/?utm_campaign=rss", "fonte_id": "stat_news", "data_pub": "2026-06-30T12:14:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Metade dos estados dos EUA estão processando o governo federal por exigir que os beneficiários de Medicaid trabalhem ou busquem trabalho para receber assistência. A FDA está formando um painel de peptídeos, e há um novo estudo sobre vacinas contra Covid e influenza.", "titulo_pt": "Metade dos estados dos EUA processam governo por exigências de trabalho em Medicaid", "veiculo": "STAT News (saúde)", "pais": "EUA", "classe": "A"}, {"id": 27387, "titulo": "Study investigates stress, coping among adult siblings of individuals with intellectual and developmental disabilities", "url": "https://phys.org/news/2026-06-stress-coping-adult-siblings-individuals.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa conduzida pela assistente professora de prática em psicologia e desenvolvimento humano, membro do VKC Jessika Boles, Ph.D., e colegas foi publicada no jornal Research in Developmental Disabilities. O estudo detalha as experiências complexas de irmãos adultos de pessoas com deficiências intelectuais e/ou desenvolvimentais.", "titulo_pt": "Estudo investiga estresse e estratégias de enfrentamento entre irmãos adultos de pessoas com deficiências intelectuais e/ou desenvolvimentais", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 27395, "titulo": "NASA will announce moon base news today: Watch it live", "url": "https://www.space.com/astronomy/moon/nasa-will-announce-moon-base-news-today-watch-it-live", "fonte_id": "space_com", "data_pub": "2026-06-30T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A NASA fornecerá uma atualização sobre seus planos para uma base na lua nesta tarde, e o evento poderá ser assistido ao vivo.", "titulo_pt": "NASA anunciará atualizações sobre base lunar: acompanhe ao vivo", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 27394, "titulo": "Orbital files plans for 100,000 orbital data centers", "url": "https://spacenews.com/orbital-files-plans-for-100000-orbital-data-centers/", "fonte_id": "spacenews", "data_pub": "2026-06-30T11:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A startup Orbital apresentou ao Federal Communications Commission um plano para implantar até 100.000 data centers orbitais, com o objetivo de fornecer 10 gigawatts de poder computacional do espaço para atender à crescente demanda por inteligência artificial.", "titulo_pt": "Orbital apresenta planos para 100.000 data centers orbitais", "veiculo": "SpaceNews", "pais": "EUA", "classe": "A"}, {"id": 27388, "titulo": "How guaranteed income can support working families facing economic hardship", "url": "https://phys.org/news/2026-06-income-families-economic-hardship.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T11:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma parceria inovadora entre a George Mason University, o Condado de Fairfax e a United Way está explorando como renda garantida pode apoiar famílias trabalhadoras enfrentando dificuldades econômicas.", "titulo_pt": "Como renda garantida pode apoiar famílias trabalhadoras em situações de dificuldade econômica", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 27148, "titulo": "The blueprint to reducing Lismore floods by up to 2 meters", "url": "https://phys.org/news/2026-06-blueprint-lismore-meters.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T11:20:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O hidrólogo do CSIRO, Dr. Jai Vaze, tem sido frequentemente questionado sobre a possibilidade de proteger contra inundações no Vale do Nordão da Nova Gales do Sul há quatro anos.", "titulo_pt": "Plano para reduzir inundações em Lismore em até 2 metros", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 27030, "titulo": "Stop the sting! Fire ant control tips", "url": "https://phys.org/news/2026-06-ant.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T11:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As formigas ferrugineiras são uma perturbação comum nos Estados Unidos, conhecidas por suas picadas dolorosas e pelas colinas de terra visíveis no gramado e espaços ao ar livre. A Universidade Estendida do Tennessee está compartilhando dicas para o controle eficaz desses insetos neste verão.", "titulo_pt": "Parar a picada! Dicas de controle de formigas ferrugineiras", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 27389, "titulo": "Chaotic pigeons are helping redefine what we know about learning", "url": "https://www.scientificamerican.com/article/chaotic-pigeons-are-helping-redefine-what-we-know-about-learning/", "fonte_id": "scientific_american", "data_pub": "2026-06-30T10:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Pombas parecem desafiar uma lei psicológica centenária sobre como recompensas e consequências nos ajudam a aprender.", "titulo_pt": "Pombas caóticas estão reformulando o que sabemos sobre aprendizado", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 26992, "titulo": "One of the most distant 'leaky' galaxies ever found may reveal how the universe reionized", "url": "https://phys.org/news/2026-06-distant-leaky-galaxies-reveal-universe.html", "fonte_id": "phys_org", "data_pub": "2026-06-30T10:40:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Astrônomos identificaram uma das galáxias mais distantes conhecidas que liberam radiação ionizante—o mesmo tipo de radiação supostamente responsável pela transformação do universo primitivo durante o período da reionização.", "titulo_pt": "Uma das galáxias mais distantes já identificadas que libera radiação ionizante pode revelar como o universo foi reionizado", "veiculo": "Phys.org", "pais": "EUA", "classe": "B"}, {"id": 26859, "titulo": "Celulares Android podem ajudar a prever terremoto?", "url": "https://www.bbc.com/portuguese/articles/cz0jg47kn7zo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-30T10:28:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Mais de 11 milhões de celulares na Venezuela receberam um alerta sobre a iminência de um terremoto. O sistema utiliza dados dos smartphones para prever e avisar sobre possíveis eventos sísmicos.", "titulo_pt": "Celulares Android podem ajudar a prever terremoto?", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 26803, "titulo": "June's Strawberry Moon serves up a low-hanging treat for skywatchers worldwide. Here are our favorite photos", "url": "https://www.space.com/stargazing/junes-strawberry-moon-serves-up-a-low-hanging-treat-for-skywatchers-worldwide-here-are-our-favorite-photos", "fonte_id": "space_com", "data_pub": "2026-06-30T10:08:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A lua cheia de junho subiu baixa no céu, oferecendo um espetáculo celestial impressionante para observadores de estrelas ao redor do mundo. Fotos capturaram a cena.", "titulo_pt": "Lua Cheia de Junho Presentea Astronômicos Mundiais com Espetáculo Celestial", "veiculo": "Space.com", "pais": "EUA", "classe": "B"}, {"id": 26508, "titulo": "Estudio encuentra que los adultos jóvenes están envejeciendo más rápido: cuáles serían las consecuencias", "url": "https://www.latercera.com/tendencias/noticia/estudio-encuentra-que-los-adultos-jovenes-estan-envejeciendo-mas-rapido-cuales-serian-las-consecuencias/", "fonte_id": "la_tercera", "data_pub": "2026-06-30T10:01:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Uma pesquisa concluiu que as gerações mais jovens estão envelhecendo biologicamente mais rapidamente do que as gerações mais velhas. Os autores da pesquisa associam esse envelhecimento acelerado a um maior risco de cânceres de aparência precoce.", "titulo_pt": "Estudo descobre que gerações jovens estão envelhecendo mais rápido: qual o impacto?", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 26920, "titulo": "The organ donation boom complicating the boundary between life and death", "url": "https://www.vox.com/future-perfect/492921/the-organ-donation-boom-after-circulatory-death", "fonte_id": "vox", "data_pub": "2026-06-30T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Em fevereiro de 2023, Emily Hoffman, de 34 anos, foi atropelada por um motorista que virava à esquerda na região de Squirrel Hill, Pittsburgh. Após sofrer parada cardíaca, ela foi conectada a uma máquina que fornecia assistência respiratória automática.", "titulo_pt": "Aumento do transplante de órgãos complicando a fronteira entre vida e morte", "veiculo": "Vox", "pais": "EUA", "classe": "B"}, {"id": 26294, "titulo": "Novo tipo de laser pode barrar cegueira ligada ao avançar da idade antes de ela se instalar", "url": "https://veja.abril.com.br/saude/novo-tipo-de-laser-pode-barrar-cegueira-ligada-ao-avancar-da-idade-antes-de-ela-se-instalar/", "fonte_id": "veja", "data_pub": "2026-06-30T09:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um novo tipo de laser foi desenvolvido com o objetivo de prevenir a cegueira associada à degeneração macular, uma das principais causas de perda de visão no avanço da idade. O teste clínico em humanos começará em breve.", "titulo_pt": "Novo laser pode impedir cegueira ligada ao envelhecimento antes dela se instalar", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}], "ciencia__eventos": [], "cultura": [{"id": 26814, "titulo": "Falling under the map: Sasha Yazov’s airbrush art of The Sims turns pixels to paint", "url": "https://www.itsnicethat.com/articles/sasha-yazov-art-project-300626", "fonte_id": "its_nice_that", "data_pub": "2026-07-02T08:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As obras de arte digitais criadas pela artista Sasha Yazov retratam os aspectos visuais dos jogos de vídeo da década de 2000 com precisão de captura de tela, mas com pequenas diferenças que não refletem a memória do público.", "titulo_pt": "Caído sob o mapa: arte em spray digital de Sasha Yazov transforma pixels em pinturas de The Sims", "veiculo": "It's Nice That", "pais": "Reino Unido", "classe": "B"}, {"id": 27241, "titulo": "Zion Suzuki reacende debate sobre identidade hafu e padrões de beleza", "url": "https://www.metropoles.com/vida-e-estilo/zion-suzuki-reacende-debate-sobre-identidade-hafu-e-padroes-de-beleza", "fonte_id": "metropoles", "data_pub": "2026-06-30T12:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Zion Suzuki, goleiro do Japão, ganha destaque tanto dentro quanto fora de campo. A sua popularidade contribui para debates sobre identidade hafu e padrões de beleza japoneses.", "titulo_pt": "Zion Suzuki renova debate sobre identidade hafu e estética japonesa", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27332, "titulo": "The Freedom to Be Ugly", "url": "https://www.theatlantic.com/books/2026/06/fairyington-ugly-beauty-values-book-review/687662/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-30T12:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um novo livro questiona o que poderíamos ganhar se aceitássemos nossa aparência.", "titulo_pt": "A Liberdade de Ser Feio", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 27397, "titulo": "Elon Musk promotes ‘anti-migrant’ Armie Hammer film with free download on X", "url": "https://www.theguardian.com/film/2026/jun/30/elon-musk-anti-migrant-armie-hammer-film-free-download-citizen-vigilante", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T11:41:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O filme 'Citizen Vigilante', estrelado por Armie Hammer e dirigido por Uwe Boll, foi postado gratuitamente no perfil de Elon Musk na plataforma X após críticas negativas. O filme segue um empresário que se vinga sangrentamente de criminosos imigrantes e viu seu número de visualizações aumentar significativamente.", "titulo_pt": "Elon Musk promove filme 'anti-imigrante' com download gratuito em X", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 27001, "titulo": "The Venice Biennale’s Record African Participation Comes With Caveats", "url": "https://www.artnews.com/art-in-america/columns/venice-biennale-in-minor-keys-koyokouoh-pavilions-equatorial-guinea-sierra-leone-1234790523/", "fonte_id": "artnews", "data_pub": "2026-06-30T10:52:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A participação africana no Biênal de Veneza atingiu um recorde, mas há preocupações persistentes. O século passado testemunhou progressos significativos e problemas crônicos.", "titulo_pt": "Participação Africana Recorde no Biênal de Veneza Venha com Cavernatas", "veiculo": "ARTnews", "pais": "EUA", "classe": "B"}, {"id": 27398, "titulo": "Grand Theft Auto workers seek union recognition after mass firings", "url": "https://www.theguardian.com/politics/2026/jun/30/grand-theft-auto-workers-seek-union-recognition-rockstar-games", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T10:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Funcionários da Rockstar Games estão buscando reconhecimento sindical após demissões em massa no ano passado. Eles trabalham com a IWGB Game Workers Union para se unificarem antes do lançamento do GTA VI, previsto para novembro.", "titulo_pt": "Trabalhadores de Grand Theft Auto buscam reconhecimento sindical antes do lançamento de GTA VI", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 27002, "titulo": "2027 Skulptur Projekte Münster Will Include ‘Communal Cooking,’ Examinations of Power", "url": "https://www.artnews.com/art-news/news/skulptur-projekte-munster-2027-first-details-1234790716/", "fonte_id": "artnews", "data_pub": "2026-06-30T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Oscar Murillo, Selma Selman e Hew Locke serão alguns dos artistas incluídos na primeira edição do 2027 Skulptur Projekte Münster, que não terá a participação de Kasper König. O evento examinará questões relacionadas à cozinheira comunitária e ao poder.", "titulo_pt": "2027 Skulptur Projekte Münster Incluirá Cozinha Comunitária e Análises de Poder", "veiculo": "ARTnews", "pais": "EUA", "classe": "B"}, {"id": 27004, "titulo": "Meister Varma Architects uses salvaged stone for home in India", "url": "https://www.dezeen.com/2026/06/30/meister-varma-architects-shilaya-cottage/", "fonte_id": "dezeen", "data_pub": "2026-06-30T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A arquitetura Meister Varma, estúdio indiano, concluiu a construção de Shilaya, uma residência em Tamil Nadu, utilizando pedra recuperada de uma cabana ruínas que outrora ocupava o mesmo local. O nome Shilaya deriva do termo sânscrito śilā, que significa pedra.", "titulo_pt": "Meister Varma Architects usa pedra recuperada para casa em Índia", "veiculo": "Dezeen (design e arquitetura)", "pais": "Reino Unido", "classe": "B"}, {"id": 27403, "titulo": "Lit Hub Daily: June 30, 2026", "url": "https://lithub.com/lit-hub-daily-june-30-2026/", "fonte_id": "lithub", "data_pub": "2026-06-30T10:30:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Livros românticos antigos da Roma Antiga eram intensos. Agora é possível adquirir edições em papel dos autores Slutty Cheff, Nicholas Boggs e Benedict Nguyen.", "titulo_pt": "Você sabia que os romances romanos antigos eram intensos?", "veiculo": "Literary Hub", "pais": "EUA", "classe": "B"}, {"id": 26997, "titulo": "The original Moana: did a 1926 documentary give birth to a 21st century Disney blockbuster?", "url": "https://www.theguardian.com/film/2026/jun/30/the-original-moana-did-a-1926-documentary-give-birth-to-a-21st-century-disney-blockbuster", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T10:24:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Antes do sucesso da animação de 2016 e sua remasterização em live-action, existia um filme mudo de 1926 intitulado Moana. Este filme pioneiro criou um novo gênero cinematográfico e serviu como inspiração para a produção moderna.", "titulo_pt": "Moana original: o documentário de 1926 que antecedeu o blockbuster do século XXI", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 26433, "titulo": "Oriana Fallaci, corresponsal de guerra: “Quien se resigna no vive, sobrevive”", "url": "https://www.lanacion.com.ar/sociedad/oriana-fallaci-corresponsal-de-guerra-quien-se-resigna-no-vive-sobrevive-nid29062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T10:15:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Oriana Fallaci, jornalista e escritora lembrada, foi a primeira mulher italiana a trabalhar como corresponsal de guerra.", "titulo_pt": "Oriana Fallaci, correspondente de guerra: 'Quem se resigna não vive, sobrevive'", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 26435, "titulo": "Efemérides del 30 de junio: ¿qué pasó un día como hoy?", "url": "https://www.lanacion.com.ar/lifestyle/efemerides-del-30-de-junio-que-paso-un-dia-como-hoy-nid30062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T10:13:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Este lunes 30 de junio marca o Dia Mundial das Redes Sociais, além de outros eventos e aniversários relacionados à data. O dia é celebrado por várias ocasiões ligadas ao universo digital.", "titulo_pt": "Efemérides do 30 de junho: qual foi um dia como hoje?", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 27000, "titulo": "Chris Martin’s lost James Bond theme goes on auction with unheard Coldplay tapes", "url": "https://www.theguardian.com/music/2026/jun/30/chris-martin-coldplay-recordings-auction-lost-james-bond-theme", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T10:06:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um demo de uma canção que Chris Martin, vocalista da Coldplay, teria escrito para o filme James Bond The World Is Not Enough está sendo leiloado junto com gravações iniciais do grupo. O material faz parte de um acervo disponibilizado pelo produtor britânico Chris Allison.", "titulo_pt": "Demo de tema James Bond de Chris Martin vai ao leilão junto com gravações iniciais da Coldplay", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 26995, "titulo": "It’s a love story – or is it? The surprising conflict and chaos in Taylor Swift’s songs about commitment", "url": "https://www.theguardian.com/music/2026/jun/30/taylor-swift-songs-about-marriage-and-commitment", "fonte_id": "guardian_culture", "data_pub": "2026-06-30T10:03:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Taylor Swift, frequentemente vista como uma romântica, na verdade tem escrito principalmente canções sobre amor marcadas por conflitos, fantasmas e ilusões. Antes de seu casamento, analisa-se o que a Swift, como compositora, tem nos contado através das suas letras ao longo de 20 anos.", "titulo_pt": "É uma história de amor – ou não? O surpreendente conflito e caos nas canções de Taylor Swift sobre compromisso", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 26784, "titulo": "If Artists Mapped the World", "url": "https://hyperallergic.com/if-artists-mapped-the-world/", "fonte_id": "hyperallergic", "data_pub": "2026-06-30T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Três exposições exploram a política da cartografia. Além disso, uma nova estátua de Messi parece com ... isso.", "titulo_pt": "Se os artistas mapeassem o mundo", "veiculo": "Hyperallergic (arte)", "pais": "EUA", "classe": "B"}, {"id": 26785, "titulo": "Dezeen's top five houses of June 2026", "url": "https://www.dezeen.com/2026/06/30/top-houses-june-2026/", "fonte_id": "dezeen", "data_pub": "2026-06-30T10:00:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A lista das cinco casas mais notáveis de junho de 2026, publicada pelo Dezeen, inclui três residências revestidas de tijolo: uma cabana de férias na Holanda, um pequeno lar britânico em um terreno intersticial e outro que imita seus vizinhos dos anos 1930. As outras duas casas são um refúgio malasioês feito com bambu e aço e mais uma residência britânica.", "titulo_pt": "Top 5 Casas do Mês de Junho de 2026, Publicado pelo Dezeen", "veiculo": "Dezeen (design e arquitetura)", "pais": "Reino Unido", "classe": "B"}], "cultura__eventos": [], "sociedade": [{"id": 27226, "titulo": "SC: mulher é morta por homem que invadiu apartamento dela com extintor", "url": "https://www.metropoles.com/brasil/sc-mulher-e-morta-por-homem-que-invadiu-apartamento-dela-com-extintor", "fonte_id": "metropoles", "data_pub": "2026-06-30T12:26:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma mulher de 55 anos foi morta após ser atingida com um extintor por um invasor que invadiu seu apartamento no sábado em São José, Santa Catarina. A vítima sofreu lesões graves no rosto e não resistiu aos ferimentos.", "titulo_pt": "Mulher de 55 anos é morta após invasor atingi-la com extintor", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27198, "titulo": "Sistema de saúde da Venezuela está sobrecarregado após terremotos, afirma OMS", "url": "https://www.infomoney.com.br/mundo/sistema-de-saude-da-venezuela-esta-sobrecarregado-apos-terremotos-afirma-oms/", "fonte_id": "infomoney", "data_pub": "2026-06-30T12:20:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Organização Mundial da Saúde (OMS) informou que o sistema de saúde venezuelano está sobrecarregado após os terremotos, com hospitais danificados superlotados e enfrentando falta de especialistas. Os tremores causaram mais de 1.700 mortes e 5.000 feridos no país.", "titulo_pt": "Sistema de saúde da Venezuela sobrecarregado após terremotos, afirma OMS", "veiculo": "InfoMoney", "pais": "Brasil", "classe": "B"}, {"id": 27174, "titulo": "Polícia Civil faz operação contra esquema de lavagem de dinheiro do tráfico na Vila Vintém", "url": "https://veja.abril.com.br/brasil/policia-civil-faz-operacao-contra-esquema-de-lavagem-de-dinheiro-do-trafico-na-vila-vintem/", "fonte_id": "veja", "data_pub": "2026-06-30T12:15:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Civil realizou uma operação contra um esquema de lavagem de dinheiro relacionado ao tráfico na Vila Vintém. Segundo as investigações, o grupo criminoso movimentava cerca de R$ 500 mil por semana e até o momento três pessoas foram presas.", "titulo_pt": "Polícia Civil desbarata esquema de lavagem de dinheiro do tráfico na Vila Vintém", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27237, "titulo": "Menino prende cabeça em banco de madeira e mobiliza Corpo de Bombeiros", "url": "https://www.metropoles.com/distrito-federal/entorno/menino-prende-cabeca-em-banco-de-madeira-e-mobiliza-corpo-de-bombeiros", "fonte_id": "metropoles", "data_pub": "2026-06-30T12:06:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um menino ficou preso na cabeça em um banco de madeira em Águas Lindas de Goiás. O Corpo de Bombeiros foi acionado e conseguiu resgatar o garoto sem que ele se ferisse.", "titulo_pt": "Menino se prende na cabeça em banco de madeira e mobiliza Corpo de Bombeiros", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27380, "titulo": "Minimum wage gap narrows, but breakthrough still elusive", "url": "https://www.koreaherald.com/article/10793592", "fonte_id": "korea_herald", "data_pub": "2026-06-30T12:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Representantes de trabalhadores e empregadores reduziram as diferenças sobre o aumento do salário mínimo para o próximo ano, mas ainda não chegaram a um acordo, com uma diferença de 1,540 won. O salário mínimo proposto pelos trabalhadores foi de 11,900 won por hora, enquanto os empregadores ofereceram 10,360 won.", "titulo_pt": "Diferença no salário mínimo diminui, mas acordo ainda não foi alcançado", "veiculo": "The Korea Herald", "pais": "Coreia do Sul", "classe": "B"}, {"id": 27245, "titulo": "Ministério recomenda vacinar bebês contra sarampo após novos casos", "url": "https://www.metropoles.com/saude/vacinar-bebes-contra-sarampo", "fonte_id": "metropoles", "data_pub": "2026-06-30T11:53:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Ministério da Saúde recomenda a vacinação de bebês com seis a onze meses e vinte e nove dias contra o sarampo. A orientação envolve a aplicação da chamada 'dose zero' em São Paulo.", "titulo_pt": "Ministério recomenda vacinar bebês contra sarampo após novos casos", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27178, "titulo": "Operação Anáfora: PF mira esquema de lavagem de dinheiro de recursos desviados da Saúde", "url": "https://veja.abril.com.br/brasil/operacao-anafora-pf-mira-esquema-de-lavagem-de-dinheiro-de-recursos-desviados-da-saude/", "fonte_id": "veja", "data_pub": "2026-06-30T11:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Polícia Federal (PF) realizou uma operação para investigar um esquema de lavagem de dinheiro envolvendo recursos desviados do sistema de Saúde. Os mandados judiciais foram emitidos pela 6ª Vara Federal Criminal e pelo Tribunal Regional Federal da 2ª Região, considerando que alguns dos suspeitos têm foro privilegiado.", "titulo_pt": "Operação Anáfora: PF investiga esquema de lavagem de dinheiro com recursos desviados da Saúde", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27112, "titulo": "Rio: greve de rodoviários entra no 2º dia e deixa paradas lotadas", "url": "https://www.metropoles.com/brasil/rio-greve-de-rodoviarios-entra-no-2o-dia-e-deixa-paradas-lotadas", "fonte_id": "metropoles", "data_pub": "2026-06-30T11:18:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A greve de rodoviários no Rio de Janeiro entra no segundo dia, causando lotações nos pontos de ônibus. De acordo com a Rio Ônibus, cerca de 1.150 veículos estão em circulação.", "titulo_pt": "Greve de rodoviários no Rio entra no segundo dia e causa lotações", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27014, "titulo": "Brasil saiu do Mapa da Fome, mas ainda enfrenta muitos desafios nessa área", "url": "https://veja.abril.com.br/coluna/balanco-social/brasil-saiu-do-mapa-da-fome-mas-ainda-enfrenta-muitos-desafios-nessa-area/", "fonte_id": "veja", "data_pub": "2026-06-30T11:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A fome no Brasil diminuiu significativamente, mas ainda persiste. O país enfrenta desafios para manter a redução da fome e combater a obesidade.", "titulo_pt": "Brasil saiu do Mapa da Fome, mas enfrenta desafios", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 27075, "titulo": "Solo el 14% de las relaciones laborales termina con indemnización, y el 60% de quienes acceden llevan dos años o menos en el empleo", "url": "https://www.latercera.com/pulso/noticia/solo-el-14-de-las-relaciones-laborales-termina-con-indemnizacion-y-el-60-de-quienes-acceden-llevan-dos-anos-o-menos-en-el-empleo/", "fonte_id": "la_tercera", "data_pub": "2026-06-30T11:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Apenas 14% das relações trabalhistas terminam com indenização, de acordo com um relatório da Pivotes. A sugestão é implementar um sistema a todo evento com uma contribuição mensal do empregador de 2%, que iria para uma conta individual do trabalhador, independentemente das circunstâncias do fim do contrato.", "titulo_pt": "Somente 14% dos contratos terminam com indenização e proposta é por sistema a todo evento", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 27080, "titulo": "El trabajo que Chile no puede seguir postergando", "url": "https://www.latercera.com/opinion/noticia/el-trabajo-que-chile-no-puede-seguir-postergando/", "fonte_id": "la_tercera", "data_pub": "2026-06-30T11:00:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Chile precisa sair do pessimismo e conformismo para enfrentar trabalhos essenciais, como investimento, produtividade e geração de empregos. O crescimento econômico exige avanços significativos nesses aspectos.", "titulo_pt": "O trabalho que Chile não pode mais adiar", "veiculo": "La Tercera", "pais": "Chile", "classe": "B"}, {"id": 26985, "titulo": "South Africa anti-migrant demos draw thousands, plus huge police presence", "url": "https://www.scmp.com/news/world/africa/article/3358913/south-africa-anti-migrant-demos-draw-thousands-plus-huge-police-presence?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T10:58:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Milhares de pessoas participaram de protestos anti-imigrantes na África do Sul, sob a vigilância de uma presença policial significativa. Os protestos, organizados pela March and March, exigem que todos os imigrantes ilegais deixem o país.", "titulo_pt": "Protestos anti-imigrantes congregam milhares na África do Sul, com forte presença policial", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 26835, "titulo": "Adolescentes em moto atropelam criança de 4 anos em Mauá", "url": "https://www.metropoles.com/sao-paulo/adolescentes-moto-atropelam-crianca", "fonte_id": "metropoles", "data_pub": "2026-06-30T10:49:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Adolescentes estavam pilotando uma moto quando perderam o controle, atropelando uma criança de 4 anos. Testemunhas relataram que os jovens desciam e subiam em via no momento do acidente.", "titulo_pt": "Adolescentes em moto atropelam criança de 4 anos em Mauá", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 26994, "titulo": "UNICEF aid shipment lands in Venezuela following devastating earthquakes", "url": "https://www.unicef.org/press-releases/unicef-aid-shipment-lands-venezuela-following-devastating-earthquakes", "fonte_id": "unicef", "data_pub": "2026-06-30T10:45:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Uma carga de 47 metros cúbicos com suprimentos para saúde, água e educação foi mobilizada do estoque da União Europeia em Copenhague e chegou a Venezuela após os terríveis terremotos. Mais auxílio será enviado nos próximos dias.", "titulo_pt": "Envio de ajuda chega à Venezuela após terríveis terremotos", "veiculo": "UNICEF Global", "pais": "Global", "classe": "A"}, {"id": 26905, "titulo": "Paritaria con aumento: cuánto cobran las empleadas domésticas en julio 2026", "url": "https://www.lanacion.com.ar/economia/paritaria-con-aumento-cuanto-cobran-las-empleadas-domesticas-en-julio-2026-nid30062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T10:28:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "O último aumento salarial para empregadas domésticas é de 1,4%. Os novos valores variam according to the different categories.", "titulo_pt": "Paridade com Aumento: Quanto as Trabalhadoras Domésticas Ganham em Julho 2026", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 26906, "titulo": "Becas Progresar 2026: quiénes no cobran y cómo saber si te corresponde el pago de julio", "url": "https://www.lanacion.com.ar/economia/becas-progresar-2026-quienes-no-cobran-y-como-saber-si-te-corresponde-el-pago-de-julio-nid28062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T10:28:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Os beneficiários desta ajuda estatal podem verificar se estão habilitados para receber o pagamento de julho e a data exata de crédito. O título traduzido para o português brasileiro é: 'Bolsas Progresar 2026: quem não recebe e como saber sobre o pagamento de julho'.", "titulo_pt": "Bolsas Progresar 2026: quem não recebe e como saber sobre o pagamento de julho", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}], "sociedade__eventos": [], "meio_ambiente": [{"id": 27229, "titulo": "Temporal assusta moradores de Blumenau na madrugada e causa alagamento", "url": "https://www.metropoles.com/brasil/temporal-assusta-moradores-de-blumenau-na-madrugada-e-causa-alagamento", "fonte_id": "metropoles", "data_pub": "2026-06-30T12:21:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Na madrugada, um temporal causou alagamentos em diferentes pontos de Blumenau. A Defesa Civil da cidade foi acionada para atender a diversos relatos de inundação.", "titulo_pt": "Temporal assusta moradores e causa alagamento em Blumenau na madrugada", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 27297, "titulo": "“Nos preocupa lo que puede venir”: llovieron más de 200 milímetros en pocas horas en Misiones y hay preocupación por El Niño", "url": "https://www.lanacion.com.ar/economia/campo/mas-de-200-milimetros-en-pocas-horas-un-temporal-encendio-las-alarmas-en-misiones-y-hay-preocupacion-nid29062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T12:18:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Em Colonia Aurora, caiu um volume excepcional de água, e em San Javier foram registrados cerca de 160 milímetros. Os produtores já estão movendo a produção para áreas mais altas e expressam preocupação com o que pode acontecer nos próximos meses.", "titulo_pt": "Nos preocupa o que pode vir: choveu mais de 200 milímetros em poucas horas em Misiones e há preocupação com El Niño", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 27300, "titulo": "Renunció el subsecretario de Ambiente de la Nación, Fernando Brom", "url": "https://www.lanacion.com.ar/sociedad/renuncio-el-subsecretario-de-ambiente-de-la-nacion-fernando-brom-nid30062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T12:14:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Fernando Brom, subsecretário de Ambiente da Nação, renunciou após pouco mais de um ano no cargo. A renúncia foi reconhecida pelo governo por causa de comentários públicos inadequados e descuidos na administração.", "titulo_pt": "Subsecretário de Meio Ambiente da Nación Renuncia", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 27210, "titulo": "Alerta de tempestade e granizo no Sul e SP é emitido pelo Inmet; veja", "url": "https://www.cnnbrasil.com.br/nacional/sul/alerta-de-tempestade-e-granizo-no-sul-e-sp-e-emitido-pelo-inmet-veja/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T11:59:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um alerta de tempestade e granizo foi emitido pelo Inmet para os estados do Sul do Brasil e o litoral paulista nesta terça-feira (30). O aviso abrange áreas que podem ser afetadas por perigos potenciais relacionados ao mau tempo.", "titulo_pt": "Alerta de tempestade e granizo no Sul e SP é emitido pelo Inmet; veja", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 27250, "titulo": "Clima no Brasil pode mudar drasticamente com El Niño prolongado", "url": "https://olhardigital.com.br/2026/06/30/ciencia-e-espaco/clima-no-brasil-pode-mudar-drasticamente-com-el-nino-prolongado/", "fonte_id": "olhar_digital", "data_pub": "2026-06-30T11:58:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O El Niño pode afetar o Brasil por anos, de acordo com órgãos oficiais. As previsões indicam um contraste nas chuvas, calor intenso e impactos regionais.", "titulo_pt": "Clima no Brasil pode mudar drasticamente com El Niño prolongado", "veiculo": "Olhar Digital", "pais": "Brasil", "classe": "C"}, {"id": 27376, "titulo": "Iraq’s 14 million barrels of trapped oil travels through Strait of Hormuz", "url": "https://www.scmp.com/news/world/middle-east/article/3358920/iraqs-14-million-barrels-trapped-oil-travels-through-strait-hormuz?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T11:36:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O petróleo iraquiano que estava preso devido ao conflito no Oriente Médio saiu do Golfo Pérsico nas últimas dez dias, com cerca de 14 milhões de barris saindo em junho. As embarcações transportaram o óleo para compradores na Ásia, Europa e Estados Unidos através da Desembocadura do Hormuz, durante um cessar-fogo instável entre EUA e Irã.", "titulo_pt": "14 milhões de barris de petróleo iraquiano escapam do Golfo Pérsico", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 27251, "titulo": "Chuva forte ou tempo seco? Veja como fica o clima na sua região nesta semana", "url": "https://olhardigital.com.br/2026/06/30/ciencia-e-espaco/chuva-forte-ou-tempo-seco-veja-como-fica-o-clima-na-sua-regiao-nesta-semana/", "fonte_id": "olhar_digital", "data_pub": "2026-06-30T11:34:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A semana no Brasil apresentará condições climáticas variadas, com frente fria causando chuva forte no Sul e Norte do país, enquanto o tempo seco será predominante nas outras regiões.", "titulo_pt": "Chuva forte ou tempo seco? Confira como é o clima na sua região nesta semana", "veiculo": "Olhar Digital", "pais": "Brasil", "classe": "C"}, {"id": 27104, "titulo": "Defesa Civil de SC emite alerta para chuvas persistentes em seis regiões", "url": "https://www.cnnbrasil.com.br/nacional/sul/sc/defesa-civil-de-sc-emite-alerta-para-chuvas-persistentes-em-seis-regioes/", "fonte_id": "cnn_brasil", "data_pub": "2026-06-30T11:11:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Defesa Civil do estado de Santa Catarina emitiu um alerta para chuvas persistentes em seis regiões, com risco de rajadas de ventos, raios, alagamentos e enxurradas. O alerta foi emitido mais cedo por precaução.", "titulo_pt": "Defesa Civil de SC emite alerta para chuvas persistentes em seis regiões", "veiculo": "CNN Brasil", "pais": "Brasil", "classe": "B"}, {"id": 26840, "titulo": "Anvisa proíbe venda e uso de querosene Petrus e determina recolhimento", "url": "https://www.metropoles.com/brasil/anvisa-proibe-venda-e-uso-de-querosene-petrus-e-determina-recolhimento", "fonte_id": "metropoles", "data_pub": "2026-06-30T10:30:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A Anvisa proibiu a venda e o uso do querosene Petrus e determinou seu recolhimento. A fabricante não possui a Autorização de Funcionamento de Empresa (AFE) necessária para produzir saneantes.", "titulo_pt": "Anvisa proíbe venda e uso de querosene Petrus e determina recolhimento", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 26904, "titulo": "Está en peligro de extinción: rescataron a un ciervo de los pantanos en la Panamericana y ahora se recupera en un santuario", "url": "https://www.lanacion.com.ar/sociedad/esta-en-peligro-de-extincion-rescataron-a-un-ciervo-de-los-pantanos-en-la-panamericana-y-ahora-se-nid25062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T10:28:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Um ciervo foi resgatado dos pantanos na Panamericana e está sendo tratado em um santuário. Enquanto se investiga o motivo pelo qual o animal chegou à rodovia, ele já recebeu atendimento médico e exames para avaliar seu estado de saúde.", "titulo_pt": "Está em perigo de extinção: resgataram um ciervo dos pantanos na Panamericana e agora ele se recupera em um santuário", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 26291, "titulo": "O tamanho da destruição na Venezuela, segundo balanço da Nasa", "url": "https://veja.abril.com.br/mundo/o-tamanho-da-destruicao-na-venezuela-segundo-balanco-da-nasa/", "fonte_id": "veja", "data_pub": "2026-06-30T10:17:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Imagens de satélite indicam que milhares de edifícios foram danificados ou destruídos na Venezuela após os terremotos. A avaliação é preliminar.", "titulo_pt": "Tamanho da destruição na Venezuela, segundo balanço da Nasa", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 26289, "titulo": "Terremotos danificaram 58 mil edifícios na Venezuela", "url": "https://www.cartacapital.com.br/mundo/terremotos-danificaram-58-mil-edificios-na-venezuela/", "fonte_id": "cartacapital", "data_pub": "2026-06-30T09:54:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Uma avaliação preliminar realizada por satélite pela Nasa indicou que 58 mil edifícios foram danificados por terremotos na Venezuela.", "titulo_pt": "Terremotos danificaram 58 mil edifícios na Venezuela", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 26385, "titulo": "\"Es el mayor problema productivo\": los suelos argentinos están en rojo por falta de nutrientes y cae la producción", "url": "https://www.clarin.com/rural/mayor-problema-productivo-suelos-argentinos-rojo-falta-nutrientes-cae-produccion_0_CI2iyxZDxt.html", "fonte_id": "clarin", "data_pub": "2026-06-30T09:20:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "Nos últimos anos, as terras agrícolas argentinas passaram de um estado de abundância a um déficit extremo de nutrientes. O desempenho da soja está diminuindo significativamente, com uma brecha de rendimento de 28% devido à falta de fertilizantes.", "titulo_pt": "É o maior problema produtivo dos solos argentinos: estão em vermelho por falta de nutrientes e queda na produção", "veiculo": "Clarín", "pais": "Argentina", "classe": "C"}, {"id": 26956, "titulo": "Venezuela earthquake: La Guaira port turned into makeshift morgue", "url": "http://www.euronews.com/video/2026/06/30/venezuela-earthquake-la-guaira-port-turned-into-makeshift-morgue", "fonte_id": "euronews", "data_pub": "2026-06-30T09:02:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "O porto de La Guaira na Venezuela foi convertido em um necrotério temporário após os terremotos, onde equipes forenses trabalham nos corpos e as famílias aguardam informações.", "titulo_pt": "Terremotos na Venezuela transformam porto de La Guaira em necrotério provisório", "veiculo": "Euronews", "pais": "Europa", "classe": "B"}, {"id": 26314, "titulo": "Clima: Sul enfrenta temporais e Sudeste e Centro-Oeste têm tempo firme", "url": "https://www.metropoles.com/brasil/clima-sul-enfrenta-temporais-e-sudeste-e-centro-oeste-tem-tempo-firme", "fonte_id": "metropoles", "data_pub": "2026-06-30T08:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Sul do país enfrenta temporais e tem alerta de perigo para chuva forte, trovoadas e temporais severos. O Sudeste e Centro-Oeste têm tempo firme.", "titulo_pt": "Clima: Sul enfrenta temporais e Sudeste e Centro-Oeste têm tempo firme", "veiculo": "Metrópoles", "pais": "Brasil", "classe": "B"}, {"id": 26600, "titulo": "DR Congo says 1,307 Ebola cases confirmed, including 377 deaths", "url": "https://www.aljazeera.com/news/2026/6/30/dr-congo-says-1307-ebola-cases-confirmed-including-377-deaths?traffic_source=rss", "fonte_id": "al_jazeera", "data_pub": "2026-06-30T07:32:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "A República Democrática do Congo confirmou 1.307 casos de Ebola, incluindo 377 mortes. A doença se espalhou para a quarta província, Haut-Uele, que faz fronteira com Sudão do Sul e República Centro-Africana.", "titulo_pt": "República Democrática do Congo registra 1.307 casos de Ebola, incluindo 377 mortes", "veiculo": "Al Jazeera English", "pais": "Catar", "classe": "B"}], "meio_ambiente__eventos": [], "direitos_humanos": [{"id": 27359, "titulo": "Balkan LGBTQ+ Communities Need Freedom All Year, Not Just at Pride", "url": "https://balkaninsight.com/2026/06/30/balkan-lgbtq-communities-need-freedom-all-year-not-just-at-pride/bi/", "fonte_id": "balkan_insight", "data_pub": "2026-06-30T11:27:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Ao encerrar o mês de Pride, a pergunta principal não é sobre o número de pessoas que participaram das marchas, mas sim se as pessoas LGBTQ+ sentem-se mais seguras durante todo o ano.", "titulo_pt": "Comunidades LGBTQ+ do Bálcãs Necessitam de Liberdade ao Longo do Ano Todo, Não Só Durante a Pride", "veiculo": "Balkan Insight (BIRN)", "pais": "Sérvia", "classe": "A"}, {"id": 26830, "titulo": "Torturado, abusado e morto pelo pai adotivo: o caso do bebê Preston", "url": "https://veja.abril.com.br/coluna/mundialista/torturado-abusado-e-morto-pelo-pai-adotivo-o-caso-do-bebe-preston/", "fonte_id": "veja", "data_pub": "2026-06-30T10:48:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O indivíduo responsável pelo abuso foi condenado, mas há suspeitas de que os assistentes sociais ignoraram evidências claras por medo de homofobia.", "titulo_pt": "Torturado, abusado e morto pelo pai adotivo: o caso do bebê Preston", "veiculo": "Veja", "pais": "Brasil", "classe": "B"}, {"id": 26431, "titulo": "Regla oficial del DHS: quiénes deben registrarse y dar sus huellas para evitar multas o cárcel", "url": "https://www.lanacion.com.ar/estados-unidos/visas-y-tramites/regla-oficial-del-dhs-quienes-deben-registrarse-y-dar-sus-huellas-para-evitar-multas-o-carcel-nid30062026/", "fonte_id": "la_nacion_ar", "data_pub": "2026-06-30T10:17:00Z", "idioma": "es", "provavel_duplicata_de": null, "texto_pt": "A nova regra do DHS nos Estados Unidos determina quais indivíduos devem se registrar e fornecer suas impressões digitais, além das sanções previstas para aqueles que não o fizerem. O título em português é: 'Regra oficial do DHS: quem deve se registrar e fornecer as impressões digitais para evitar multas ou prisão nos EUA'.", "titulo_pt": "Regra oficial do DHS: quem deve se registrar e fornecer as impressões digitais para evitar multas ou prisão nos EUA", "veiculo": "La Nación (Argentina)", "pais": "Argentina", "classe": "B"}, {"id": 26660, "titulo": "What will Hong Kong’s proposed reforms to sexual offences laws change?", "url": "https://www.scmp.com/news/hong-kong/law-and-crime/article/3358898/what-will-hong-kongs-proposed-reforms-sexual-offences-laws-change?utm_source=rss_feed", "fonte_id": "scmp", "data_pub": "2026-06-30T09:22:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "As autoridades de Hong Kong propuseram uma reforma abrangente das leis sobre crimes sexuais da cidade, incluindo ampliar a definição de estupro, introduzir novos delitos envolvendo atos não consensuais com crianças e pessoas com deficiência mental, definir uma idade mínima consentida uniforme em 16 anos e remover disposições específicas de gênero. As propostas estão sendo consultadas publicamente durante um mês.", "titulo_pt": "O que as reformas propostas sobre leis de crimes sexuais em Hong Kong mudarão?", "veiculo": "South China Morning Post", "pais": "Hong Kong", "classe": "B"}, {"id": 26422, "titulo": "ADPF 1339: as mulheres trans e a cota de gênero nas eleições", "url": "https://www.jota.info/opiniao-e-analise/artigos/adpf-1339-as-mulheres-trans-e-a-cota-de-genero-nas-eleicoes", "fonte_id": "jota", "data_pub": "2026-06-30T08:10:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O Supremo Tribunal Federal (STF) pode decidir sobre uma ação que busca eliminar uma interpretação considerada um claro retrocesso social para mulheres trans no sistema de cotas de gênero nas eleições.", "titulo_pt": "ADPF 1339: as mulheres trans e a cota de gênero nas eleições", "veiculo": "JOTA", "pais": "Brasil", "classe": "A"}, {"id": 26528, "titulo": "Arrests Spike as Vietnam Sees New ‘Wave of Repression,’ Rights Group Says", "url": "https://thediplomat.com/2026/06/arrests-spike-as-vietnam-sees-new-wave-of-repression-rights-group-says/", "fonte_id": "the_diplomat", "data_pub": "2026-06-30T02:56:00Z", "idioma": "en", "provavel_duplicata_de": null, "texto_pt": "Um grupo de advocacy baseado em Bangkok registrou 56 prisões políticas no ano passado, o maior número desde 2018. Segundo uma organização dos direitos humanos, há um novo 'válio de repressão' na Vietnã.", "titulo_pt": "Prisões Políticas Spike como Nova ‘Válvula de Repressão’ no Vietnã, Diz Grupo de Direitos Humanos", "veiculo": "The Diplomat", "pais": "Japão", let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">

      <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
    </div>` : ""}

}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");

  b.onclick = () => ativar(id);

  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;
