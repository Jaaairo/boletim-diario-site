<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}

<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'New Title', Georgia, serif;
              font-size: clamp(83px, 17.5vw, 157px); font-weight: 500; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  .logo-o { font-family: 'Author', Georgia, serif; font-weight: 400; font-size: 1.365em;
            margin-left: -0.058em; letter-spacing: -0.049em; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }
  .evento { padding: 20px 0 8px; border-top: 1px solid var(--border); }
  .evento > h3 { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 28px; line-height: 1.25; color: var(--azul);
                 margin-bottom: 8px; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    header h1 { font-size: clamp(100px, 21vw, 120px); }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
    .modal-overlay { align-items: flex-end; }
    .modal-box { width: 100%; border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
                 max-height: 85vh; }
  }

  /* Seção Destaque */
  .destaque-label { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                    letter-spacing: 2px; text-transform: uppercase;
                    background: var(--azul); color: var(--panel);
                    padding: 4px 12px; border-radius: 2px; margin-bottom: 18px; }
  .destaque-analise { line-height: 1.9; font-size: 17px; margin-bottom: 32px; }
  .destaque-analise p { margin-bottom: 18px; }
  .destaque-analise p:last-child { margin-bottom: 0; }
  .destaque-fontes { border-top: 2px solid var(--azul); padding-top: 24px; margin-top: 8px; }
  .destaque-fontes h3 { font-family: 'EB Garamond', Georgia, serif; font-size: 20px;
                        color: var(--texto2); margin-bottom: 16px; font-weight: 400; }
  .destaque-art { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .destaque-art:last-child { border-bottom: none; }
  .destaque-art h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 24px;
                     font-weight: 700; line-height: 1.25; margin-bottom: 6px; color: var(--azul); }
  .destaque-art h4 a { color: inherit; text-decoration: none; }
  .destaque-art h4 a:hover { color: var(--acento); }
  .destaque-art .dmeta { font-size: 12px; color: var(--texto2);
                         display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .destaque-art .dcorpo { font-size: 15px; line-height: 1.75; color: var(--texto); }

  /* Sistema de flags */
  .flag-btn { background: none; border: none; cursor: pointer; padding: 6px 0 0;
              font-size: 13px; color: var(--border); display: block; line-height: 1;
              margin-top: 4px; text-align: left; }
  .flag-btn:hover { color: #b03a2e; }
  .flag-btn.flag-ativo { color: #b03a2e; }
  .editorial-btn { margin-left: auto; font-size: 17px; color: var(--texto2);
                   background: none; border: none; cursor: pointer; padding: 14px 16px 13px; }
  .editorial-btn:hover { color: var(--azul); }
  .editorial-btn.ativo { color: #b03a2e; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,42,56,.52);
                   z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.aberta { display: flex; }
  .modal-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
               padding: 28px 32px; max-width: 480px; width: 90%;
               max-height: 90vh; overflow-y: auto;
               box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h4 { font-family: 'EB Garamond', Georgia, serif; font-size: 22px;
                  color: var(--azul); margin-bottom: 18px; line-height: 1.2; }
  .modal-box label { display: block; font-size: 11px; color: var(--texto2); margin-bottom: 4px;
                     text-transform: uppercase; letter-spacing: .5px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=password] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; color: var(--texto); font: 14px 'LINE Seed JP', sans-serif;
    margin-bottom: 14px; outline: none; }
  .modal-box select:focus, .modal-box textarea:focus, .modal-box input:focus { border-color: var(--acento); }
  .modal-box textarea { resize: vertical; min-height: 68px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .modal-btns button { padding: 7px 18px; border-radius: 4px;
                       font: 13px 'LINE Seed JP', sans-serif; cursor: pointer; }
  .btn-pri { background: var(--azul); color: var(--panel); border: none; }
  .btn-pri:hover { background: var(--acento); }
  .btn-sec2 { background: none; border: 1px solid var(--border); color: var(--texto2); }
  .btn-sec2:hover { border-color: var(--texto2); color: var(--azul); }
  .btn-peri { background: none; border: 1px solid #b03a2e; color: #b03a2e; }
  .btn-peri:hover { background: #b03a2e; color: #fff; }
  .modal-erro { color: #b03a2e; font-size: 13px; margin: -8px 0 12px; }
  .flag-rep-box { max-height: 65vh; overflow-y: auto; }
  .flag-rep-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .flag-rep-item:last-child { border-bottom: none; }
  .flag-tipo-tag { display: inline-block; font: 700 11px 'LINE Seed JP', sans-serif;
                   background: var(--panel); border: 1px solid var(--border);
                   color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                   margin-right: 6px; vertical-align: middle; }
  /* TTS — leitura em voz alta dos sumários */
  .tts-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tts-btn { background: var(--azul); border: 1px solid var(--azul); border-radius: 4px;
             color: var(--panel); font: 13px 'LINE Seed JP', sans-serif;
             padding: 4px 12px; cursor: pointer; }
  .tts-btn:hover { background: var(--acento); border-color: var(--acento); color: #fff; }
  .tts-bar[hidden] { display: none; }
</style>
</head>

</div>

a Independência dos Estados Unidos, enquanto na Rússia, estudantes estão sendo empregados em operações militares na Ucrânia sem treinamento adequado.\n\nA geopolítica global enfrenta diversos desafios e tensões. Na Ásia, a China mantém patrulhas marítimas que são criticadas pelo Taiwan, refletindo tensões territoriais na região. O Irã celebrou o funeral do líder supremo Ali Khamenei com um evento histórico, repleto de aliados e rivais, enquanto os Estados Unidos comemoraram seu bicentésimo quinto aniversário de independência, enfrentando controvérsias em torno da celebração. No Leste Europeu, a Ucrânia intensificou ataques com drones contra São Petersburgo, enquanto a Rússia nega ter controlado uma cidade estratégica na Ucrânia. Além disso, Israel enviou ajuda humanitária à Venezuela após terremotos, demonstrando que relações diplomáticas podem não impedir cooperação em situações de emergência. A geopolítica regional e global continua complexa, com desafios econômicos, militares e políticos que afetam a estabilidade internacional.", "economia": "A economia global enfrenta diversos desafios e oportunidades. A Ásia, que consome intensamente energia, deve aprender com a crise iraniana para se adaptar aos novos cenários energéticos (Taiwan Times). No Brasil, a dívida dos EUA continua sendo uma preocupação, mas também foi um marco revolucionário na consolidação financeira do país, liderada por Alexander Hamilton (Infomoney). A Madesa planeja expandir suas operações internacionais para representar 40% de seu faturamento atualmente em 20%, investindo R$ 51 milhões em um centro de distribuição (Folha Mercado). No Paraguai, o país registra um crescimento econômico médio de 5% nos últimos três anos, apresentando um dos cenários macroeconômicos mais favoráveis da América do Sul (BBC Brasil).", "tecnologia": "O Brasil recentemente lançou seu primeiro foguete movido a propulsão líquida, chamado FTL-Perseu. Este evento coloca o país entre as poucas nações com capacidade para desenvolver motores de alta precisão. Paralelamente, empresas como Samsung e Xiaomi estão oferecendo smartphones em promoção, incluindo os modelos Galaxy A57 e Redmi com até 256GB de armazenamento, respectivamente. Além disso, a empresa chinesa GWM reduziu o preço do seu modelo Ora 03 após a chegada do concorrente GWM Ora 05 ao mercado brasileiro, tornando-o mais acessível para os consumidores. A tecnologia de inteligência artificial também está ganhando destaque com a Midjourney buscando revelar detalhes sobre o uso de AI por estúdios cinematográficos e a possibilidade de um IPO da SpaceX que pode levar à dispersão de talentos importantes, segundo observações do Gavekal.", "ciencia": "A Space.com comemorou os 250 anos dos Estados Unidos destacando o progresso espacial americano desde a independência, além de possíveis direções futuras. Um avanço científico notável foi a descoberta internacional do DNA humano de pelo menos 2.000 anos em cavernas da Espanha e Portugal, publicado na revista Nature. O estudo sobre a peste antiga também merece destaque, com evidências datando do período mais remoto, cerca de 5.500 anos atrás na Sibéria. As inundações extremas causadas pelo aumento dos níveis do mar, que agora ocorrem 12 vezes mais frequentemente, também ganharam atenção, afetando comunidades costeiras globalmente.", "cultura": "Um espetáculo teatral de Taiwan está sendo apresentado no Festival Off Avignon na França, durante três semanas. A atriz e os atores taiwaneses participam de um evento cultural que inclui uma apresentação inaugural seguida por desfiles. Em outro destaque, avena e trigo foram cultivados com sucesso perto do glaciar Perito Moreno em uma experiência inédita no país, registrando rendimentos próximos a 3500 kg/ha de avena e 3000 kg/ha de trigo. Além disso, o bairro boêmio da Lapa, no Rio de Janeiro, foi transformado em um Distrito de Arte e Cultura através de um decreto, com a implantação do Boulevard Selarón ao redor da Escadaria Selarón, visando tornar o local mais acessível para moradores e visitantes. Estes eventos destacam a diversidade cultural e inovação em diferentes áreas, desde o teatro até a agricultura e o desenvolvimento urbano artístico.", "sociedade": "A sociedade enfrenta diversos desafios em diferentes regiões. Em Nablus, na Cisjordânia ocupada pelo Israel, a economia e os padrões de vida têm diminuído significativamente devido ao controle financeiro israelense e aos bloqueios militares, refletindo um cenário de crescente pobreza. No Brasil, segundo levantamento do Datafolha, 70% dos entrevistados apoiam a punição de adolescentes como adultos. Por outro lado, o estado do Piauí exige que as empresas reservem vagas para ex-presidiários, visando à reintegração social. Em contraste, em Taiwan há necessidade de reformar o sistema de trânsito, e na Argentina, o governo continua negociando mudanças na Lei de Propriedade Privada, levantando preocupações sobre a soberania nacional.", "meio_ambiente": "O número de vagas para trabalhos verdes, conhecidos como 'green-collar', atingiu um recorde, destacando a crescente demanda por profissionais nas áreas ambientais e sustentáveis. Paralelamente, o Ministério realizou um fórum sobre economia circular, focado em estratégias de uso eficiente dos recursos para promover a sustentabilidade. O Brasil enfrentou uma onda de calor extremo, com temperaturas chegando a 46°C no Chile, afetando as comemorações do Dia da Independência e colocando diversos eventos públicos sob risco. Além disso, terremotos na Venezuela causaram a morte de mais de 2.600 pessoas, enquanto um incêndio florestal no norte de Portugal mobilizou mais de mil bombeiros e resultou em pelo menos nove feridos. A onda de calor também impactou as culturas de arroz na Itália, levando a preocupações sobre a produção agrícola.", "direitos_humanos": "O Papa Leão visitou a ilha de Lampedusa na Itália para lembrar a crise migratória global e apelar contra a indiferença mundial em relação aos imigrantes. Durante sua missa, ele reforçou o pedido para que os Estados Unidos e a Europa acolham e ajudem os refugiados. Em outro evento, atores, ativistas, intelectuais e comediantes se uniram para alertar sobre a fragilidade da democracia americana sob o governo de Trump. Além disso, a China detalhou suas estratégias de repressão no exterior após implementar uma nova lei que proíbe atos que 'minem a unidade étnica'. Em outros casos, uma menina de 12 anos morreu em consequência de um deslizamento de terra em Panamá. Na República Democrática do Congo, o número de mortes por ebola aumentou para 473. Na Bolívia, um bebê de seis meses faleceu em um caso que revelou uma suposta rede de tráfico infantil destinada a mendicidade."}, "resumo_do_dia": {"politica_nacional": [{"id": 36105, "titulo": "Qual a melhor chapinha: vale trocar um modelo antigo por um lançamento?", "url": "https://www.cartacapital.com.br/toquetec/qual-a-melhor-chapinha-vale-trocar-um-modelo-antigo-por-um-lancamento/", "fonte_id": "cartacapital", "data_pub": "2026-07-05T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A tecnologia nas chapinhas está evoluindo, oferecendo modelos mais práticos e versáteis. Algumas novidades demonstram como a inovação pode melhorar a rotina de uso.", "titulo_pt": "Qual é a melhor chapinha: vale trocar um modelo antigo por um lançamento?", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 36106, "titulo": "MOPs ganham espaço como melhor opção de limpeza sem esforço e mais controle da sujeira", "url": "https://www.cartacapital.com.br/toquetec/mops-ganham-espaco-como-melhor-opcao-de-limpeza-sem-esforco-e-mais-controle-da-sujeira/", "fonte_id": "cartacapital", "data_pub": "2026-07-05T16:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Tecnologias de microfibra e sistemas sem contato direto com água suja transformam a faxina em uma tarefa mais prática e higiênica. MOPs ganham espaço como melhor opção de limpeza sem esforço e mais control exões, decisões conscientes e crescimento em diversas áreas. Será um bom momento para confiar na intuição, agir com equilíbrio e aproveitar as oportunidades que surgirem.", "titulo_pt": "Tarot semanal: previsão para os signos de 06 a 12 de julho de 2026", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 36111, "titulo": "Dependência em bets desafia RHs a fortalecer estratégias de saúde mental e bem-estar", "url": "https://www.cartacapital.com.br/do-micro-ao-macro/bets-rh-saude-mental/", "fonte_id": "cartacapital", "data_pub": "2026-07-05T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "Um estudo da Unifesp indica que 10,9 milhões de brasileiros sofrem prejuízos relacionados ao jogo. Empresas estão reavaliando suas políticas para cuidar melhor dos trabalhadores em relação à saúde mental e bem-estar.", "titulo_pt": "Dependência em apostas desafia recursos humanos a fortalecer estratégias de saúde mental e bem-estar", "veiculo": "CartaCapital", "pais": "Brasil", "classe": "B"}, {"id": 36123, "titulo": "Código de ética, Bolsonaro e eleições pautam STF no 2º semestre", "url": "https://www.poder360.com.br/poder-justica/codigo-de-etica-bolsonaro-e-eleicoes-pautam-stf-no-2o-semestre/", "fonte_id": "poder360", "data_pub": "2026-07-05T13:00:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "O STF deve discutir temas relevantes para as eleições, incluindo o Código de Ética e questões relacionadas a Bolsonaro. A pauta inclui decisões sobre eleições suplementares e o sistema de ficha limpa.", "titulo_pt": "Código de ética, Bolsonaro e eleições pautam STF no 2º semestre", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 36154, "titulo": "De Bangladesh à Jamaica: como a seleção brasileira virou patrimônio global", "url": "https://www.brasildefato.com.br/2026/07/05/de-bangladesh-a-jamaica-como-a-selecao-brasileira-virou-patrimonio-global/", "fonte_id": "brasil_de_fato", "data_pub": "2026-07-05T12:52:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A seleção brasileira de futebol se tornou um patrimônio global, com comemorações em locais distantes como Bangladesh e Jamaica. Mesmo sem conexão direta com o Brasil ou conhecimento do português, milhares de fãs celebram as vitórias da equipe.", "titulo_pt": "Do Bangladesh à Jamaica: como a seleção brasileira se tornou um patrimônio global", "veiculo": "Brasil de Fato", "pais": "Brasil", "classe": "B"}, {"id": 36124, "titulo": "SP lança Rotas da Cerveja e fortalece cadeia produtiva em municípios", "url": "https://www.poder360.com.br/poder-economia/sp-lanca-rotas-da-cerveja-e-fortalece-cadeia-produtiva-em-municipios/", "fonte_id": "poder360", "data_pub": "2026-07-05T12:50:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "A iniciativa SP lança Rotas da Cerveja reúne 107 cervejarias e visa impulsionar o turismo de experiência, fortalecendo a posição do estado de São Paulo como líder na produção e exportação de cervejas.", "titulo_pt": "SP lança Rotas da Cerveja e fortalece cadeia produtiva em municípios", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}, {"id": 36125, "titulo": "Denúncias de violência infantojuvenil crescem 125% em 5 anos", "url": "https://www.poder360.com.br/poder-seguranca-publica/denuncias-de-violencia-infantojuvenil-crescem-125-em-5-anos/", "fonte_id": "poder360", "data_pub": "2026-07-05T12:40:00Z", "idioma": "pt", "provavel_duplicata_de": null, "texto_pt": "As denúncias de violência infantojuvenil aumentaram 125% nos últimos cinco anos. Crianças e adolescentes do sexo feminino representam 62% das vítimas.", "titulo_pt": "Denúncias de violência infantojuvenil crescem 125% em 5 anos", "veiculo": "Poder360", "pais": "Brasil", "classe": "B"}], "politica_nacional__eventos": [], "mundo": [{"id": 36678, "titulo": "Lee congratulates Trump, U.S. citizens on 250th anniv. of American independence", "url": "https://en.yna.co.kr/view/AEN20260705001100315", "fonte_id": "yonhap_news", const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];
  const eventos = D.resumo_do_dia[topico + "__eventos"] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const eventosHtml = eventos.length
    ? `<div class="eventos">
        ${eventos.map(ev => {
          const evId = "drill-" + (++drillCounter);
          return `<div class="evento">
            <h3>${esc(ev.titulo)}</h3>
            ${ev.sumario ? `<div class="sumario"><p>${esc(ev.sumario)}</p></div>` : ""}
            <button class="drill-toggle" onclick="toggleDrill('${evId}')">▶ ${ev.artigos.length} fontes sobre este evento</button>
            <div class="drill-lista" id="${evId}">
              ${ev.artigos.map(n => {
                const tit = n.titulo_pt || n.titulo;
                const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
                return `<div class="item" data-flag-url="${esc(n.url)}">
                  <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
                  <div class="meta">
                    <span class="tag">${esc(n.veiculo)}</span>
                    ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
                  </div>
                  <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
                  ${flagBtn(n.url, tit)}
                </div>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`
    : "";
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item" data-flag-url="${esc(n.url)}">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
             ${flagBtn(n.url, tit)}
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${sint ? ttsBarHtml() : ""}
    ${eventosHtml}
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

function ttsBarHtml() {
  return `<div class="tts-bar" role="group" aria-label="Leitura em voz alta">
    <button class="tts-btn tts-ouvir" onclick="ttsOuvir(this)">&#9654; Ouvir sum&#225;rio</button>
    <button class="tts-btn tts-pausar" onclick="ttsPausar(this)" hidden>&#9646;&#9646; Pausar</button>
    <button class="tts-btn tts-continuar" onclick="ttsContinuar(this)" hidden>&#9654; Continuar</button>
    <button class="tts-btn tts-parar" onclick="ttsPar(this)" hidden>&#9632; Parar</button>
  </div>`;
}

function renderDestaque() {
  const d = D.destaque;
  if (!d) return "";
  const drillId = "drill-" + (++drillCounter);
  const totalArtigos = (d.artigos || []).length;
  const paragrafos = d.texto_pt.split(/\n+/).filter(p => p.trim())
    .map(p => `<p>${esc(p)}</p>`).join("");
  const artsHtml = (d.artigos || []).map(n => {
    const tit = n.titulo_pt || n.titulo;
    const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt')
      ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
    return `<div class="destaque-art" data-flag-url="${esc(n.url)}">
      <h4><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h4>
      <div class="dmeta">
        <span class="tag">${esc(n.veiculo)}</span>
        ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
      </div>
      ${n.texto_pt ? `<div class="dcorpo">${esc(n.texto_pt)}</div>` : ""}
      ${flagBtn(n.url, tit)}
    </div>`;
  }).join("");
  return `<div>
    <span class="destaque-label">Destaque</span>
    <h2 style="margin-top:8px">${esc(d.titulo_evento)}</h2>
    <div class="destaque-analise">${paragrafos}</div>
    ${ttsBarHtml()}
    ${artsHtml ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${totalArtigos} artigo${totalArtigos > 1 ? "s" : ""} deste destaque</button>
    <div class="drill-lista destaque-fontes" id="${drillId}">
      ${artsHtml}
    </div>` : ""}
  </div>`;
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_novas}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_gerados}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${renderDestaque()}
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const grupo = n.topico ? (D.grupo_de_topico[n.topico] || n.topico) : "";
      const rot = grupo ? (D.rotulos_topico[grupo] || grupo) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(grupo)}" data-flag-url="${esc(n.url)}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
        ${flagBtn(n.url, tit)}
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});

function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

// ── Sistema de Flags ──────────────────────────────────────────────────────────
const FLAG_HASH = "f9c45d8d3a32f9ad4e9e9719901ab6dd8d94e48c0f0ae07a05584955c2a3f7d1";
const FLAG_ON = FLAG_HASH.length === 64;

let flagAuth = sessionStorage.getItem('flagAuth') === '1';
let flags = {};
try { flags = JSON.parse(localStorage.getItem('boletim_flags') || '{}'); } catch(e) {}

ativar("resumo");

let _fUrl = '', _fTit = '';

async function sha256hex(t) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

function abrirModal(id) { document.getElementById(id).classList.add('aberta'); }
function fecharModal(id) {
  document.getElementById(id).classList.remove('aberta');
  if (id === 'modal-senha') {
    document.getElementById('inp-senha').value = '';
    document.getElementById('senha-erro').style.display = 'none';
  }
}

async function verificarSenha() {
  const h = await sha256hex(document.getElementById('inp-senha').value);
  if (h === FLAG_HASH) {
    sessionStorage.setItem('flagAuth', '1'); flagAuth = true;
    fecharModal('modal-senha');
    document.body.classList.add('modo-editorial');
    const b = document.getElementById('btn-ed');
    if (b) { b.classList.add('ativo'); b.title = 'Modo editorial ativo'; }
  } else {
    document.getElementById('senha-erro').style.display = '';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') verificarSenha(); });
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) fecharModal(m.id); });
});

function abrirFlagBtn(btn) {
  if (!flagAuth) { abrirModal('modal-senha'); return; }
  _fUrl = btn.dataset.url;
  _fTit = btn.dataset.titulo;
  const f = flags[_fUrl];
  document.getElementById('flag-modal-titulo').textContent = _fTit.slice(0, 72) + (_fTit.length > 72 ? '…' : '');
  document.getElementById('flag-tipo').value = f ? f.tipo : 'erro_factual';
  document.getElementById('flag-nota').value = f ? f.nota : '';
  document.getElementById('btn-rm-flag').style.display = f ? '' : 'none';
  abrirModal('modal-flag');
}

function _saveFlags() { localStorage.setItem('boletim_flags', JSON.stringify(flags)); }

function _updateBtn(url, ativo) {
  document.querySelectorAll('[data-flag-url]').forEach(function(el) {
    if (el.dataset.flagUrl !== url) return;
    const btn = el.querySelector('.flag-btn');
    if (!btn) return;
    btn.classList.toggle('flag-ativo', ativo);
    btn.title = ativo ? 'Flagged — clique para editar' : 'Marcar problema';
    btn.textContent = ativo ? '⚑' : '⚐';
  });
}

function salvarFlagAtual() {
  flags[_fUrl] = {
    titulo: _fTit, url: _fUrl,
    tipo: document.getElementById('flag-tipo').value,
    nota: document.getElementById('flag-nota').value.trim(),
    edicao: D.gerado_em, ts: new Date().toISOString()
  };
  _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, true);
}

function removerFlagAtual() {
  delete flags[_fUrl]; _saveFlags(); fecharModal('modal-flag'); _updateBtn(_fUrl, false);
}

const TIPO_LABEL = {
  erro_factual: 'Erro factual', erro_traducao: 'Erro de tradução',
  classificacao_errada: 'Classificação errada', resumo_impreciso: 'Resumo impreciso', outro: 'Outro'
};

function abrirRelatorio() {
  const list = Object.values(flags);
  const div = document.getElementById('relatorio-conteudo');
  div.innerHTML = list.length ? list.map(f =>
    `<div class="flag-rep-item">
      <span class="flag-tipo-tag">${esc(TIPO_LABEL[f.tipo] || f.tipo)}</span>
      <a href="${esc(f.url)}" target="_blank" style="color:var(--azul);font-size:15px">${esc(f.titulo)}</a>
      ${f.nota ? `<div style="color:var(--texto2);font-size:13px;margin-top:3px">${esc(f.nota)}</div>` : ''}
      <div style="color:var(--texto2);font-size:12px;margin-top:3px">${esc(f.edicao)} · ${esc(new Date(f.ts).toLocaleString('pt-BR'))}</div>
    </div>`).join('') :
    '<p style="color:var(--texto2);font-style:italic;padding:12px 0">Nenhuma flag registrada.</p>';
  abrirModal('modal-relatorio');
}

function exportarFlags() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(Object.values(flags), null, 2));
  a.download = 'flags_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function copiarRelatorio() {
  const list = Object.values(flags);
  if (!list.length) { alert('Nenhuma flag para copiar.'); return; }
  const txt = list.map((f, i) =>
    `${i + 1}. [${TIPO_LABEL[f.tipo] || f.tipo}] ${f.titulo}\n   ${f.url}${f.nota ? '\n   Nota: ' + f.nota : ''}\n   Edição: ${f.edicao}`
  ).join('\n\n');
  navigator.clipboard.writeText(txt).catch(() => prompt('Copie o relatório:', txt));
}

function limparFlags() {
  if (!confirm('Limpar todas as flags? Essa ação não pode ser desfeita.')) return;
  flags = {}; _saveFlags(); fecharModal('modal-relatorio');
}

function flagBtn(url, titulo) {
  if (!FLAG_ON) return '';
  const ativo = !!flags[url];
  const su = esc(url).replace(/"/g, '&quot;');
  const st = esc(titulo).replace(/"/g, '&quot;');
  return `<button class="flag-btn${ativo ? ' flag-ativo' : ''}" data-url="${su}" data-titulo="${st}" title="${ativo ? 'Flagged — clique para editar' : 'Marcar problema'}" onclick="event.preventDefault();event.stopPropagation();abrirFlagBtn(this)">${ativo ? '⚑' : '⚐'}</button>`;
}

if (FLAG_ON) {
  const bEd = document.createElement('button');
  bEd.id = 'btn-ed'; bEd.className = 'editorial-btn';
  bEd.title = 'Modo editorial (flags)'; bEd.textContent = '⚑';
  if (flagAuth) {
    document.body.classList.add('modo-editorial');
    bEd.classList.add('ativo'); bEd.title = 'Modo editorial ativo';
  }
  bEd.onclick = () => { if (flagAuth) abrirRelatorio(); else abrirModal('modal-senha'); };
  nav.appendChild(bEd);
}

// TTS — Web Speech API nativa
(function () {
  var ss = window.speechSynthesis;
  if (!ss) {
    // ocultar todas as barras TTS se a API não estiver disponível
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.tts-bar').forEach(function (b) { b.hidden = true; });
    });
    return;
  }

  function _voz() {
    var vs = ss.getVoices().filter(function(v) { return v.lang === 'pt-BR' || v.lang.startsWith('pt'); });
    return vs[0] || null;
  }

  function _resetBar(bar) {
    bar.querySelector('.tts-ouvir').hidden     = false;
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = true;
  }

  window.ttsOuvir = function (btn) {
    ss.cancel();
    var bar      = btn.closest('.tts-bar');
    var sumario  = bar.previousElementSibling; // .sumario ou .destaque-analise imediatamente antes
    if (!sumario) return;
    var txt = (sumario.innerText || sumario.textContent || '').replace(/\s+/g, ' ').trim();
    if (!txt) return;

    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'pt-BR';
    var voz = _voz();
    if (voz) u.voice = voz;
    u.onend   = function () { _resetBar(bar); };
    u.onerror = function () { _resetBar(bar); };

    ss.speak(u);
    bar.querySelector('.tts-ouvir').hidden     = true;
    bar.querySelector('.tts-pausar').hidden    = false;
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-parar').hidden     = false;
  };

  window.ttsPausar = function (btn) {
    ss.pause();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-pausar').hidden    = true;
    bar.querySelector('.tts-continuar').hidden = false;
  };

  window.ttsContinuar = function (btn) {
    ss.resume();
    var bar = btn.closest('.tts-bar');
    bar.querySelector('.tts-continuar').hidden = true;
    bar.querySelector('.tts-pausar').hidden    = false;
  };

  window.ttsPar = function (btn) {
    ss.cancel();
    _resetBar(btn.closest('.tts-bar'));
  };

  window.addEventListener('beforeunload', function () { ss.cancel(); });
})();
</script>
