<style>
/* EB Garamond variable font local — GSUB liga/dlig/rlig/calt intactos em todos os pesos */
@font-face {
  font-family: 'EB Garamond'; font-style: normal; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-vf.woff2') format('woff2');
}
@font-face {
  font-family: 'EB Garamond'; font-style: italic; font-weight: 400 800; font-display: swap;
  src: url('fonts/ebgaramond-italic-vf.woff2') format('woff2');
}
</style>
<style>
  :root {
    /* paleta base: Navy · Teal · Sky · Beige · White, expandida para 8 tons */
    --bg:     #F5EFEB;  /* Beige — fundo principal (quente, claro)            */
    --panel:  #EAF1F6;  /* Azul pálido — áreas secundárias, badges            */
    --border: #C8D9E6;  /* Sky Blue — bordas e divisores                      */
    --texto:  #1A2A38;  /* Deep Navy — texto principal                        */
    --texto2: #567C8D;  /* Teal — texto secundário, metadados                 */
    --azul:   #2F4156;  /* Navy — cabeçalhos, header                          */
    --acento: #3D6070;  /* Steel Blue — estados ativos, destaques             */
    --tint:   #7EA8BC;  /* Sky médio — hover, números, acentos leves          */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--texto);
         font: 17px/1.75 'LINE Seed JP', 'Segoe UI', system-ui, sans-serif; }

  header { padding: 28px max(48px, calc((100% - 1100px) / 2 + 48px)) 22px;
           background: var(--azul); border-bottom: 3px solid var(--tint); }
  header h1 { font-family: 'Inknut Antiqua', Georgia, serif;
              font-size: clamp(32px, 8vw, 72px); font-weight: 700; line-height: 1;
              color: var(--panel); letter-spacing: clamp(0px, 0.2vw, 2px);
              margin-bottom: 6px; }
  header .sub { color: var(--border); font-size: 13px; }

  nav { display: flex; padding: 0 max(48px, calc((100% - 1100px) / 2 + 48px));
        background: var(--bg); border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--texto2);
               padding: 14px 20px 13px; cursor: pointer;
               font: 14px 'LINE Seed JP', sans-serif;
               border-bottom: 2px solid transparent; }
  nav button.ativo { color: var(--azul); border-bottom-color: var(--acento); font-weight: 700; }
  nav button:hover { color: var(--azul); }

  main { padding: 52px 48px 100px; max-width: 1100px; margin: 0 auto; }

  /* Stats: números grandes sem caixas */
  .cards { display: flex; flex-wrap: wrap; gap: 48px;
           padding-bottom: 48px; margin-bottom: 8px;
           border-bottom: 1px solid var(--border); }
  .card { background: none; }
  .card .num { font-family: 'EB Garamond', Georgia, serif;
               font-size: 52px; font-weight: 700; color: var(--tint); line-height: 1; }
  .card .rot { color: var(--texto2); font-size: 13px; margin-top: 5px; }

  /* Títulos de seção: editorial, dobro do tamanho anterior */
  h2 { font-family: 'EB Garamond', Georgia, serif;
       font-size: 48px; font-style: normal; font-weight: 700;
       font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
       font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
       text-rendering: optimizeLegibility;
       color: var(--azul); line-height: 1.1;
       margin: 64px 0 28px; }

  /* Sumário narrativo: só texto, sem caixa */
  .sumario { line-height: 1.9; font-size: 17px; margin-bottom: 28px; }
  .sumario p { margin-bottom: 18px; }
  .sumario p:last-child { margin-bottom: 0; }
  .sem-sintese { color: var(--texto2); font-style: italic; }

  /* Drill-down: link de texto simples */
  .drill-toggle { background: none; border: none; color: var(--texto2);
                  padding: 10px 0; font: 13px 'LINE Seed JP', sans-serif;
                  cursor: pointer; display: block;
                  border-top: 1px solid var(--border); width: 100%; text-align: left; }
  .drill-toggle:hover { color: var(--acento); }
  .drill-lista { display: none; }
  .drill-lista.aberta { display: block; }

  /* Artigos individuais: separados por linha, sem caixa */
  .item { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .item:first-child { border-top: none; }
  .item h3 { font-family: 'EB Garamond', Georgia, serif;
             font-size: 30px; font-style: normal; font-weight: 700; line-height: 1.25;
             font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
             font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
             text-rendering: optimizeLegibility;
             margin-bottom: 8px; color: var(--azul); }
  .item h3 a { color: inherit; text-decoration: none; }
  .item h3 a:hover { color: var(--acento); }
  .item .meta { font-size: 12px; color: var(--texto2);
                display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .tag { color: var(--texto2); font-size: 12px; }
  .tag + .tag::before { content: '·'; margin-right: 10px; }
  .idioma-badge { font: 700 10px/1 'LINE Seed JP', sans-serif; letter-spacing: .5px;
                  background: var(--panel); border: 1px solid var(--border);
                  color: var(--texto2); border-radius: 3px; padding: 1px 5px;
                  vertical-align: middle; margin-left: 6px; }
  .corpo p { font-size: 15px; line-height: 1.75; color: var(--texto); }

  a { color: var(--texto2); text-decoration: none; }
  a:hover { color: var(--azul); }
  .vazio { color: var(--texto2); font-style: italic; }

  /* Filtros: pills minimalistas sem fundo */
  .filtros-secao { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 36px; }
  .filtros-secao button { background: none; border: 1px solid var(--border);
                          color: var(--texto2); border-radius: 20px;
                          padding: 5px 18px; font: 13px 'LINE Seed JP', sans-serif;
                          cursor: pointer; }
  .filtros-secao button.ativo { border-color: var(--azul); color: var(--azul); font-weight: 700; }
  .filtros-secao button:hover:not(.ativo) { border-color: var(--texto2); color: var(--azul); }

  .noticia { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .noticia > a { font-family: 'EB Garamond', Georgia, serif;
                 font-size: 20px; font-weight: 700; color: var(--azul); line-height: 1.35;
                 font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
                 font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
                 text-rendering: optimizeLegibility; }
  .noticia > a:hover { color: var(--acento); }
  .noticia .fonte { color: var(--texto2); font-size: 12px; margin-top: 5px; }

  @media (max-width: 700px) {
    header { padding: 20px 20px 16px; }
    nav { padding: 0 20px; }
    main { padding: 28px 20px 60px; }
    h2 { font-size: 34px; margin: 40px 0 16px; }
    .cards { gap: 28px; padding-bottom: 28px; margin-bottom: 4px; }
    .card .num { font-size: 38px; }
    .item h3 { font-size: 22px; }
  }
</style>
</head>

<script>
const D = {"gerado_em": "20/06/2026 11:21", "stats": {"noticias_total": 7624, "resumos_total": 1147, "sem_topico": 0, "ultima_coleta": "2026-06-20T13:52:28Z"}, "rotulos_topico": {"politica_nacional": "Política Nacional", "politica_internacional": "Política Internacional", "cultura": "Cultura", "ciencia_tecnologia": "Ciência & Tecnologia"}, "topicos": ["politica_nacional", "politica_internacional", "cultura", "ciencia_tecnologia"], "sinteses": {"ciencia_tecnologia": "Uma pesquisa recente revelou que pessoas com estilos de apego inseguros 'temerosos' ou 'preocupados' tiveram mais filhos, enquanto aqueles com apego seguro tiveram menos. Paralelamente, um estudo concluiu que os ecossistemas brasileiros estão fragilizados do ponto de vista ecológico e a substituição da megafauna por herbívoros domésticos não é uma solução viável.  Em outro campo, hackers afirmaram ter roubado dados do Madison Square Garden e divulgado-os. Barres gay em São Francisco estão utilizando escaneadores faciais, a França abandonou os serviços da Palantir e a Apple planeja reformular seu serviço de email privado. A empresa Anthropic alertou sobre os perigos da inteligência artificial avançada mais vezes este ano do que sua rival, a OpenAI, o que pode ter contribuído para uma possível proibição de exportação de IA para a Anthropic.  Pesquisadores demonstraram a capacidade de fazer café equivalente ao espresso utilizando ondas ultrasônicas, sem necessidade de água quente e com 75% menos consumo energético em comparação com o método tradicional.", "cultura": "Paris se prepara para uma festa de rua histórica neste domingo, com a expectativa de receber mais de 2 milhões de pessoas na Festa da Música francesa. A celebração, que já dura mais de 40 anos, é o maior evento cultural do país e atrairá fãs de música do Reino Unido e outros lugares, além de gerar um aumento nas medidas de segurança devido às previsões de temperaturas recorde.  Em outro evento cultural importante, a Time Out Market anunciou sua  a mulheres, pessoas negras e indígenas nas candidaturas. A medida visa garantir a representatividade dessas grupos na política brasileira. O Fundo Especial de Financiamento de Campanha (FEFC) para o Partido Liberal (PL) aumentou significativamente entre as eleições de 2022 e 2026, triplicando o valor recebido pelo partido.  O PL receberá R$ 881,6 milhões desse fundo em 2026, representando cerca de 17,7% do total disponível. Em Minas Gerais, o pré-candidato ao governo Gabriel Azevedo (MDB) já protocolou um pedido de impeachment contra Dilma Rousseff (PT) quando ela era presidente.  A revelação coloca em xeque a postura política do candidato e levanta questões sobre suas posições em relação à ex-presidente."}, "resumo_do_dia": {"politica_nacional": [{"id": 6925, "titulo": "'Misantropia': a mensagem enviada com alerta pela Defesa Nacional após invasão hacker", "url": "https://www.bbc.com/portuguese/articles/cjeglwx4jnjo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-20T09:49:00Z", "idioma": "pt", "texto_pt": "Uma invasão hacker na plataforma de alertas da Defesa Civil Nacional resultou na distribuição de uma mensagem estranha para usuários na noite de sexta-feira, 20/06.", "titulo_pt": "Misantropia: mensagem incomum enviada após invasão hacker na Defesa Civil Nacional", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 6923, "titulo": "Por que caso Mariana Ferrer se tornou emblemático e será julgado de novo após decisão do STF", "url": "https://www.bbc.com/portuguese/articles/czx50xwvl9yo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-20T09:16:00Z", "idioma": "pt", "texto_pt": "O caso Mariana Ferrer chamou atenção para a culpabilização das vítimas em crimes sexuais. A anulação pelo STF reflete um amadurecimento no respeito às mulheres por parte das instituições brasileiras.", "titulo_pt": "Por que o caso Mariana Ferrer se tornou emblemático e será julgado de novo após decisão do STF", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 6751, "titulo": "Pré-candidato ao governo de MG cotado como nome de Lula pediu impeachment de Dilma", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/pre-candidato-ao-governo-de-mg-cotado-como-nome-de-lula-pediu-impeachment-de-dilma.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-20T09:00:00Z", "idioma": "pt", "texto_pt": "O pré-candidato ao governo de Minas Gerais, Gabriel Azevedo (MDB), já protocolou um pedido de impeachment contra Dilma Rousseff (PT) quando ela era presidente.", "titulo_pt": "Pré-candidato a governador de MG que pode apoiar Lula pediu impeachment de Dilma", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6752, "titulo": "Governo do DF cobra R$ 1 milhão de ONG ligada ao filme de Bolsonaro por falhas em convênio", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/governo-do-df-cobra-r-1-milhao-de-ong-ligada-ao-filme-de-bolsonaro-por-falhas-em-convenio.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-20T07:02:00Z", "idioma": "pt", "texto_pt": "O Governo do Distrito Federal está exigindo R$ 1 milhão de uma ONG presidida por Karina Ferreira da Gama devido a falhas na execução de um convênio na área de educação.", "titulo_pt": "Governo do DF cobra R$ 1 milhão de ONG por falhas em convênio", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6770, "titulo": "TSE firma acordo com partidos para evitar fraudes de cotas para mulheres, pretos e indígenas; veja casos polêmicos", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/06/20/tse-faz-acordo-com-partidos-para-evitar-fraudes-de-cotas-para-mulheres-pretos-e-indigenas-veja-casos-polemicos.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T07:00:00Z", "idioma": "pt", "texto_pt": "O Tribunal Superior Eleitoral (TSE) firmou um acordo com os partidos políticos para assegurar o cumprimento das cotas destinadas a mulheres, pessoas negras e indígenas nas candidaturas. A Lei das Eleições estabelece que pelo menos 30% das candidaturas devem ser de mulheres.", "titulo_pt": "TSE estabelece acordo com partidos para garantir cumprimento de cotas eleitorais; veja casos polêmicos", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 6771, "titulo": "Fundo Eleitoral do PL, de Flávio Bolsonaro, triplica em 4 anos", "url": "https://g1.globo.com/politica/eleicoes/2026/noticia/2026/06/20/fundo-eleitoral-partidos-2026.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T03:00:00Z", "idioma": "pt", "texto_pt": "O Fundo Especial de Financiamento de Campanha (FEFC) para o Partido Liberal (PL) aumentou significativamente, triplicando entre as eleições de 2022 e 2026. O PL receberá R$ 881,6 milhões desse fundo em 2026, representando cerca de 17,7% do total disponível.", "titulo_pt": "Fundo Eleitoral do PL de Flávio Bolsonaro triplica em 4 anos", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 6772, "titulo": "'Taxa das blusinhas': após fim do imposto, varejo e importadores levam disputa ao Congresso e à Justiça", "url": "https://g1.globo.com/economia/noticia/2026/06/20/taxa-das-blusinhas-apos-fim-do-imposto-varejo-e-importadores-levam-disputa-ao-congresso-e-a-justica.ghtml", "fonte_id": "g1_politica", "data_pub": "2026-06-20T03:00:00Z", "idioma": "pt", "texto_pt": "Após o fim da 'taxa das blusinhas', que era um imposto de 20% sobre compras vindas da China, representantes do varejo nacional, importadores e consumidores brasileiros intensificaram suas ações nas redes sociais, no Congresso Nacional e até mesmo no Judiciário.", "titulo_pt": "'Taxa das blusinhas': após fim do imposto, varejo e importadores levam disputa ao Congresso e à Justiça", "veiculo": "G1 Política", "pais": "Brasil", "classe": "A"}, {"id": 6753, "titulo": "Estados e capitais destinam R$ 15,4 bi a emendas parlamentares locais em ano eleitoral", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/poder/2026/06/estados-e-capitais-destinam-r-154-bi-a-emendas-parlamentares-locais-em-ano-eleitoral.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-20T02:00:00Z", "idioma": "pt", "texto_pt": "Deputados estaduais e vereadores de capitais alocaram R$ 15,4 bilhões dos orçamentos respectivos para emendas parlamentares em 2026, ano eleitoral, segundo levantamento da Folha.", "titulo_pt": "Estados e capitais destinam R$ 15,4 bi a emendas parlamentares locais em ano eleitoral", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}, {"id": 6754, "titulo": "Campanha de Flávio dirá que operação contra Wagner é mais grave que áudio com Vorcaro", "url": "https://redir.folha.com.br/redir/online/poder/rss091/*https://www1.folha.uol.com.br/colunas/painel/2026/06/campanha-de-flavio-dira-que-operacao-contra-wagner-e-mais-grave-que-audio-com-vorcaro.shtml", "fonte_id": "folha_poder", "data_pub": "2026-06-20T02:00:00Z", "idioma": "pt", "texto_pt": "A pré-campanha de Flávio Bolsonaro rejeita a ideia de que tenha apenas 'empatado' o jogo com a campanha de Lula em relação ao caso Master, após a operação contra Jaques Wagner.", "titulo_pt": "Campanha de Flávio afirmará que operação contra Wagner é mais séria do que áudio com Vorcaro", "veiculo": "Folha de S.Paulo - Poder", "pais": "Brasil", "classe": "A"}], "politica_internacional": [{"id": 7595, "titulo": "Iran chiude Hormuz, 'raid di Israele in Libano violano accordo'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/20/iran-chiude-hormuz-raid-di-israele-in-libano-violano-accordo_55a33f93-d2e1-48c7-af60-a1c1cb552ede.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-20T13:42:00Z", "idioma": "it", "texto_pt": "O comando militar iraniano informou que o Irã fechou o Estreito de Ormuz. O comando afirma que um ataque israelense ao Líbano violou um acordo.", "titulo_pt": "Irã fecha Estreito de Ormuz, 'raide israelense no Líbano viola acordo'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 7560, "titulo": "French presidential candidates capitalize on social media, bypassing journalists", "url": "https://www.lemonde.fr/en/politics/article/2026/06/20/french-presidential-candidates-capitalize-on-social-media-bypassing-journalists_6754698_5.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-20T13:32:00Z", "idioma": "en", "texto_pt": "O crescimento das redes sociais e plataformas digitais oferece aos candidatos à presidência novas formas de comunicação com o público francês. Essa tendência ocorre em detrimento dos meios de comunicação tradicionais, que precisam se adaptar às condições impostas pelos políticos.", "titulo_pt": "Candidatos à presidência francesa exploram mídias sociais, contornando jornalistas", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 7572, "titulo": "Ukraine officials return Polish honors after Zelenskyy stripped of award", "url": "https://www.dw.com/en/ukraine-officials-return-polish-honors-after-zelenskyy-stripped-of-award/a-77637366?maca=en-rss-en-all-1573-rdf", "fonte_id": "dw_english", "data_pub": "2026-06-20T13:14:00Z", "idioma": "en", "texto_pt": "Oficiais ucranianos afirmaram que a decisão de retirar o prêmio mais alto do estado polaco do líder ucraniano Zelenskyy beneficiou Moscou. Varsóvia tem sido um dos principais aliados de Kyiv desde o início da guerra da Rússia na Ucrânia.", "titulo_pt": "Funcionários ucranianos devolvem honraria polonesa após Zelenski ser privado da premiação", "veiculo": "Deutsche Welle English", "pais": "Alemanha", "classe": "A"}, {"id": 7563, "titulo": "Israel strikes Lebanon despite ceasefire, at least 16 killed", "url": "https://www.france24.com/en/israel-strikes-lebanon-despite-ceasefire-at-least-16-killed", "fonte_id": "france24", "data_pub": "2026-06-20T13:05:00Z", "idioma": "en", "texto_pt": "Ataques israelenses no Líbano resultaram no morte de pelo menos 16 pessoas no sábado, segundo o Defesa Civil Libanesa. Os ataques ocorreram horas após um cessar-fogo com o Hezbollah entrar em vigor. Israel afirmou estar respondendo a projéteis disparados pelo grupo apoiado pelo Irã.", "titulo_pt": "Israel ataca Líbano apesar do cessar-fogo, pelo menos 16 mortos", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 7538, "titulo": "US treasury chief urged Trump not to host ‘Mr Bean on crack’ Zelenskyy, book says", "url": "https://www.theguardian.com/us-news/2026/jun/20/scott-bessent-volodymyr-zelenskyy-trump", "fonte_id": "guardian_world", "data_pub": "2026-06-20T13:00:00Z", "idioma": "en", "texto_pt": "Segundo um novo livro de jornalistas do The New York Times, o ex-secretário do Tesouro dos EUA, Scott Bessent, aconselhou Donald Trump a não receber Volodymyr Zelenskyy na Casa Branca. O livro alega que Bessent chamou Zelenskyy de 'pequeno filho da puta', 'criança com necessidades especiais' e 'Mr Bean em crack'.  O livro, intitulado 'Regime Change', descreve o segundo mandato de Trump.", "titulo_pt": "Secretário do Tesouro dos EUA Induziu Trump a Não Receber Zelenskyy, Diz Livro", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 7564, "titulo": "NGOs in Lebanon denounce Israeli attacks on medics amid ceasefire", "url": "https://www.france24.com/en/ngos-in-lebanon-denounce-israeli-attacks-on-medics-amid-ceasefire", "fonte_id": "france24", "data_pub": "2026-06-20T12:57:00Z", "idioma": "en", "texto_pt": "Organizações não governamentais no Líbano estão denunciando ataques israelenses a profissionais de saúde durante o cessar-fogo. O conflito começou em 2 de março, quando o Hezbollah lançou foguetes contra Israel em retaliação à morte do líder supremo do Irã. A campanha militar israelense resultou na morte de mais de 3.900 pessoas e deslocou 20% da população libanesa.", "titulo_pt": "ONGs no Líbano denunciam ataques israelenses a médicos durante cessar-fogo", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 7521, "titulo": "¿Neutralidad o agenda?", "url": "https://www.ciperchile.cl/2026/06/20/neutralidad-o-agenda/?utm_source=rss&utm_medium=rss&utm_campaign=neutralidad-o-agenda", "fonte_id": "ciper_chile", "data_pub": "2026-06-20T12:52:00Z", "idioma": "es", "texto_pt": "O artigo discute a neutralidade jornalística e se ela pode ser realmente alcançada.  Ele examina como diferentes fatores podem influenciar a cobertura de notícias, levando à percepção de viés. O autor argumenta que é importante estar ciente dessas influências para compreender melhor o conteúdo midiático.", "titulo_pt": "Neutralidade ou agenda?", "veiculo": "CIPER Chile", "pais": "Chile", "classe": "A"}, {"id": 7351, "titulo": "Irã anuncia novo fechamento do estreito de Hormuz após ataques de Israel ao Líbano", "url": "https://redir.folha.com.br/redir/online/mundo/rss091/*https://www1.folha.uol.com.br/mundo/2026/06/israel-e-hezbollah-trocam-ataques-no-libano-horas-apos-inicio-de-novo-cessar-fogo.shtml", "fonte_id": "folha_mundo", "data_pub": "2026-06-20T12:46:00Z", "idioma": "pt", "texto_pt": "O Irã anunciou o fechamento do estreito de Hormuz ao tráfego marítimo. O comando militar iraniano, Quartel-General Central Khatam al-Anbiya, afirmou que a decisão se deve à violação do acordo de cessar-fogo pelos EUA e Israel.", "titulo_pt": "Irã fecha Estreito de Hormuz após ataques de Israel ao Líbano", "veiculo": "Folha de S.Paulo - Mundo", "pais": "Brasil", "classe": "A"}, {"id": 7565, "titulo": "Europe swelters in gruelling heatwave, authorities ramp up warnings", "url": "https://www.france24.com/en/extreme-heat-tears-through-europe-how-do-countries-deal", "fonte_id": "france24", "data_pub": "2026-06-20T12:45:00Z", "idioma": "en", "texto_pt": "Uma forte onda de calor está atingindo grande parte da Europa, levando a reuniões de emergência na França, avisos nacionais na Alemanha e sobrecarga para turistas e moradores na Itália. As temperaturas chegaram a níveis recordes e devem atingir 40°C.", "titulo_pt": "Europa sofre com onda de calor intensa, autoridades intensificam alertas", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 7566, "titulo": "Poland strips Zelensky of top state honour over WWII dispute", "url": "https://www.france24.com/en/poland-strips-zelensky-of-top-state-honour-over-wwii-dispute", "fonte_id": "france24", "data_pub": "2026-06-20T12:44:00Z", "idioma": "en", "texto_pt": "A Polônia retirou a maior honraria estatal do presidente ucraniano, Volodymyr Zelensky. A decisão foi tomada após Kiev nomear uma unidade militar em homenagem a um grupo nacionalista que massacrou civis poloneses durante a Segunda Guerra Mundial. O ato pode causar uma crise diplomática entre os dois países.", "titulo_pt": "Polônia retira honraria máxima de Zelensky por disputa sobre Segunda Guerra Mundial", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 7561, "titulo": "Court bans Spanish PM's wife from leaving country before corruption trial", "url": "https://www.lemonde.fr/en/international/article/2026/06/20/court-bans-spanish-pm-s-wife-from-leaving-country-before-corruption-trial_6754697_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-20T12:43:00Z", "idioma": "en", "texto_pt": "A juíza Juan Carlos Peinado ordenou que Begona Gomez entregue seu passaporte e compareça ao tribunal duas vezes por mês até que um veredito seja alcançado no caso. Este é um dos vários casos de corrupção que envolveram a família do primeiro-ministro socialista espanhol e seus antigos aliados.", "titulo_pt": "Juiz proíbe esposa do primeiro-ministro espanhol de deixar o país antes do julgamento por corrupção", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 7567, "titulo": "African fashion takes centre stage at France's Galerie Lafayette", "url": "https://www.france24.com/en/african-fashion-takes-centre-stage-at-france-s-galerie-lafayette", "fonte_id": "france24", "data_pub": "2026-06-20T12:42:00Z", "idioma": "en", "texto_pt": "A moda africana está se estabelecendo como um estilo próprio, com suas próprias marcas e aspirações. A Galeria Lafayette de Paris realizou o evento 'Africa Now' para celebrar essa tendência. Adama N'Diaye, designer senegalesa por trás da marca Adama Paris, foi uma das figuras chave do movimento.", "titulo_pt": "Moda africana ganha destaque na Galerie Lafayette da França", "veiculo": "France 24", "pais": "França", "classe": "A"}, {"id": 7596, "titulo": "Trump, 'contribuiamo con miliardi a difesa Italia ma ci ha negato basi per Iran'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/20/trump-contribuiamo-con-miliardi-a-difesa-italia-ma-ci-ha-negato-basi-per-iran_0e0437e9-6693-44df-8405-f41ab6296986.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-20T12:17:00Z", "idioma": "it", "texto_pt": "Donald Trump criticou a Itália em seu perfil no Truth Social. Ele afirmou que os Estados Unidos contribuíram com bilhões de dólares para a defesa italiana, mas que a Itália se recusou a fornecer bases americanas para operações contra o Irã.  Trump alegou que isso aconteceu durante sua presidência.", "titulo_pt": "Trump: 'Contribuímos com bilhões à defesa da Itália, mas ele nos negou bases para o Irã'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 7474, "titulo": "Por que o polêmico bilionário de tecnologia Peter Thiel se mudou para a Argentina e qual sua ligação com Javier Milei", "url": "https://www.bbc.com/portuguese/articles/c3eyvw3589vo?at_medium=RSS&at_campaign=rss", "fonte_id": "bbc_brasil", "data_pub": "2026-06-20T12:16:00Z", "idioma": "pt", "texto_pt": "O fundador da empresa de análise de dados Palantir, Peter Thiel, mudou-se para a Argentina em abril com sua família.  Thiel mantém contato com Javier Milei, líderes políticos e empreendedores locais do setor de tecnologia na Argentina.", "titulo_pt": "Por que o bilionário Peter Thiel se mudou para a Argentina e sua ligação com Javier Milei", "veiculo": "BBC Brasil", "pais": "Reino Unido", "classe": "A"}, {"id": 7597, "titulo": "Trump, 'Meloni vuole tornare amica per far risalire suoi numeri. No grazie'", "url": "https://www.ansa.it/sito/notizie/topnews/2026/06/20/trump-meloni-vuole-tornare-amica-per-far-risalire-suoi-numeri._9590527c-f740-47be-bf13-a1ca5eef2bc2.html", "fonte_id": "ansa_italy", "data_pub": "2026-06-20T12:15:00Z", "idioma": "it", "texto_pt": "Donald Trump afirmou que a presidente italiana Giorgia Meloni está tentando se aproximar dos Estados Unidos para melhorar sua popularidade. Trump alega que a popularidade de Meloni está diminuindo porque ela se afastou dos EUA em relação ao Irã.", "titulo_pt": "Trump: 'Meloni quer ser amiga para aumentar sua popularidade. Não obrigado'", "veiculo": "ANSA (Itália)", "pais": "Itália", "classe": "A"}, {"id": 7593, "titulo": "Hizbollah and Israel clashes threaten reopening of Strait of Hormuz", "url": "https://www.ft.com/content/fad77f6e-b1db-460a-a0c8-c2fd132932f5", "fonte_id": "financial_times", "data_pub": "2026-06-20T12:01:00Z", "idioma": "en", "texto_pt": "Trocas de tiros entre o Hezbollah e Israel destacam a fragilidade do último cessar-fogo. O conflito ameaça a reabertura do Estreito de Ormuz, uma via marítima crucial para o transporte de petróleo.", "titulo_pt": "Clashes entre Hezbollah e Israel ameaçam reabertura do Estreito de Ormuz", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}], "cultura": [{"id": 7354, "titulo": "Estudo aponta que 85% dos brasileiros vão participar de festas juninas", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/estudo-aponta-que-85-dos-brasileiros-vao-participar-de-festas-juninas", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-20T13:12:00Z", "idioma": "pt", "texto_pt": "Uma pesquisa do Instituto Locomotiva revelou que 85% dos brasileiros maiores de 18 anos planejam participar das festas juninas este ano. O número é maior que o interesse em festas juninas em 2025 (81%), mas próximo à margem de erro da pesquisa (3%). O estudo foi realizado entre 29 de abril e 6 de maio, seguindo os parâmetros da Pesquisa Nacional por Amostra de Domicílios (PNAD/IBGE).", "titulo_pt": "Estudo: 85% dos brasileiros vão participar de festas juninas", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 7353, "titulo": "O cinema não deveria ser uma ferramenta política, diz o cineasta László Nemes", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/o-cinema-nao-deveria-ser-uma-ferramenta-politica-diz-o-cineasta-laszlo-nemes.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-20T13:00:00Z", "idioma": "pt", "texto_pt": "László Nemes, diretor húngaro conhecido por filmes como 'O Filho de Saul', afirma que o cinema não deveria ser usado como ferramenta política.  Seu novo filme, 'O Órfão', disponível na Mubi, aborda a busca de uma criança pelo pai desaparecido durante o Holocausto.", "titulo_pt": "O cinema não deve ser uma ferramenta política, diz o cineasta László Nemes", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 7355, "titulo": "Rádio Animada celebra Bethânia e Dia Nacional do Orgulho Autista", "url": "https://agenciabrasil.ebc.com.br/cultura/noticia/2026-06/radio-animada-celebra-bethania-e-dia-nacional-do-orgulho-autista", "fonte_id": "agencia_brasil_cultura", "data_pub": "2026-06-20T12:30:00Z", "idioma": "pt", "texto_pt": "O programa Rádio Animada deste domingo (21) abordará os 80 anos de Maria Bethânia, a conscientização sobre a preservação da água e o combate à seca. O dia também será dedicado ao Dia Nacional do Orgulho Autista.", "titulo_pt": "Rádio Animada celebra Bethânia e Dia Nacional do Orgulho Autista", "veiculo": "Agência Brasil - Cultura", "pais": "Brasil", "classe": "A"}, {"id": 7545, "titulo": "The Eternal Allure of the Rabbit Hole", "url": "https://www.theatlantic.com/technology/2026/06/jfk-assassination-epstein-ufo-conspiracy-theories/687577/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-20T12:00:00Z", "idioma": "en", "texto_pt": "Durante a pesquisa sobre uma mulher que se aprofundou na conspiração sobre a morte de JFK, o autor também foi atraído para esse mundo. O texto explora como a busca por respostas pode levar a um mergulho profundo em teorias e informações controversas.", "titulo_pt": "O Encanto Eterno do Buraco do Coelho", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 7618, "titulo": "‘Once my tummy stopped shaking, I was absorbed by the scale, spectacle and wonder’: your Steven Spielberg film favourites", "url": "https://www.theguardian.com/film/2026/jun/20/readers-favourite-spielberg-films-close-encounters-et-raiders-hook", "fonte_id": "guardian_culture", "data_pub": "2026-06-20T12:00:00Z", "idioma": "en", "texto_pt": "O The Guardian pediu aos leitores para compartilharem seus filmes favoritos do diretor Steven Spielberg. O artigo apresenta relatos de leitores sobre suas experiências com os filmes de Spielberg, incluindo a primeira vez que viram um filme dele no cinema e como se sentiram durante a experiência.", "titulo_pt": "'Depois que meu estômago parou de tremer, fiquei absorvido pela escala, espetáculo e maravilha': seus filmes favoritos do Steven Spielberg", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 7539, "titulo": "Ralph Lauren bridges generations with menswear tie-up in Milan", "url": "https://www.theguardian.com/fashion/2026/jun/20/ralph-lauren-milan-fashion-week-menswear-ties", "fonte_id": "guardian_world", "data_pub": "2026-06-20T11:21:00Z", "idioma": "en", "texto_pt": "No segundo desfile solo de menswear em Milão, Ralph Lauren voltou a usar gravatas, o acessório que lançou seu império em 1967. Gravatas finas de seda com estampas sutis foram usadas como toque final para ternos elegantes em listras, enquanto gravata mais coloridas ou listradas foram usadas como se estivessem saindo de baixo de peças de tricô e camisas de rugby.", "titulo_pt": "Ralph Lauren une gerações com colaboração de peças masculinas em Milão", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 7617, "titulo": "‘How do I deal with my rage? I put it in everything I do’: Killing Eve’s Sandra Oh on fury, friendship and hitting her prime in midlife", "url": "https://www.theguardian.com/tv-and-radio/2026/jun/20/sandra-oh-interview-killing-eve-theatre", "fonte_id": "guardian_culture", "data_pub": "2026-06-20T11:00:00Z", "idioma": "en", "texto_pt": "Sandra Oh está em Londres para uma peça no National Theatre. A atriz de 54 anos falou sobre como encontrou seu ritmo na carreira e como o sucesso da série Killing Eve mudou tudo. Ela também mencionou receber conselhos de celebridades e a decisão de se dedicar ao teatro.", "titulo_pt": "'Como lido com minha raiva? Coloco tudo no que faço': Sandra Oh de Killing Eve sobre fúria, amizade e atingir seu auge na meia-idade", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 7105, "titulo": "German government stokes up the memory wars surrounding the 'displaced persons' of 1945", "url": "https://www.lemonde.fr/en/international/article/2026/06/20/german-government-stokes-up-the-memory-wars-surrounding-the-displaced-persons-of-1945_6754696_4.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-20T10:58:00Z", "idioma": "en", "texto_pt": "O governo cristão-democrata da Alemanha está comemorando o Dia Internacional dos Refugiados, lembrando os 12 milhões de alemães expulsos da Europa Central e Oriental após a Segunda Guerra Mundial. Sob pressão do extremismo direito, o governo optou por tratar o assunto através do Ministério do Interior em vez do Ministério da Cultura.", "titulo_pt": "Alemanha reaviva debate sobre 'deslocados' após a Segunda Guerra Mundial", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 7103, "titulo": "Is air conditioning essential for coping with heatwaves? France might be changing its mind on the issue", "url": "https://www.lemonde.fr/en/environment/article/2026/06/20/is-air-conditioning-essential-for-coping-with-heatwaves-france-might-be-changing-its-mind-on-the-issue_6754695_114.html", "fonte_id": "le_monde_en", "data_pub": "2026-06-20T10:38:00Z", "idioma": "en", "texto_pt": "Enquanto mais pessoas instalam ar condicionado, muitos ainda veem essa tecnologia como uma resposta equivocada às mudanças climáticas. A França está enfrentando temperaturas atípicamente altas, o que levou alguns especialistas a questionarem esse argumento.", "titulo_pt": "É necessário ar condicionado para enfrentar ondas de calor? França pode estar reconsiderando a questão", "veiculo": "Le Monde (inglês)", "pais": "França", "classe": "A"}, {"id": 7329, "titulo": "Granta stops publishing short story award winners over AI controversy", "url": "https://www.theguardian.com/books/2026/jun/20/granta-magazine-commonwealth-short-story-prize-ai", "fonte_id": "guardian_culture", "data_pub": "2026-06-20T09:00:00Z", "idioma": "en", "texto_pt": "A revista literária Granta decidiu não mais publicar os vencedores do prêmio Commonwealth de contos após acusações generalizadas de uso de inteligência artificial. A publicação afirmou que não participará mais de parcerias editoriais externas onde não tem controle editorial.", "titulo_pt": "Granta para de publicar vencedores do prêmio Commonwealth por controvérsia sobre AI", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 7328, "titulo": "Candice Carty-Williams: ‘People feel very attached to Queenie’", "url": "https://www.theguardian.com/books/2026/jun/20/candice-carty-williams-people-feel-very-attached-to-queenie", "fonte_id": "guardian_culture", "data_pub": "2026-06-20T08:00:00Z", "idioma": "en", "texto_pt": "A autora Candice Carty-Williams discute a possibilidade de abandonar a adaptação para TV do seu primeiro romance e explica por que considera o momento ideal para escrever um segundo livro. Seu primeiro sucesso, 'Queenie', aborda temas como racismo e relacionamentos em Londres sul.", "titulo_pt": "Candice Carty-Williams: 'As pessoas se sentem muito ligadas à Queenie'", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 6765, "titulo": "Tiago Tebet materializa o subconsciente e o místico em nova exposição de pinturas", "url": "https://redir.folha.com.br/redir/online/ilustrada/rss091/*https://www1.folha.uol.com.br/ilustrada/2026/06/tiago-tebet-materializa-o-subconsciente-e-o-mistico-em-nova-exposicao-de-pinturas.shtml", "fonte_id": "folha_ilustrada", "data_pub": "2026-06-20T07:00:00Z", "idioma": "pt", "texto_pt": "As pinturas de Tiago Tebet fazem parte da mostra 'Between You and Me, the Sun and the Moon', que está aberta até 27 de junho na galeria Luciana Brito, em São Paulo. Durante a visita à exposição, o artista descobriu que uma das telas havia sido guardada ao contrário.", "titulo_pt": "Tiago Tebet materializa o subconsciente e o místico em nova exposição de pinturas", "veiculo": "Folha de S.Paulo - Ilustrada", "pais": "Brasil", "classe": "A"}, {"id": 7078, "titulo": "‘A kind of massive rave’: Paris braces for 2m revellers as Fête de la Musique returns amid heatwave warnings", "url": "https://www.theguardian.com/world/2026/jun/20/paris-braces-tourist-influx-street-festival-fete-de-la-musique", "fonte_id": "guardian_world", "data_pub": "2026-06-20T07:00:00Z", "idioma": "en", "texto_pt": "Paris está se preparando para uma festa de rua sem precedentes neste domingo, com mais de 2 milhões de pessoas esperadas para participar da Festa da Música francesa, que já dura mais de 40 anos e é a maior manifestação cultural do país. A cidade expandiu as medidas de segurança devido ao aumento significativo de fãs de música vindos do Reino Unido e às previsões de temperaturas recorde.", "titulo_pt": "Um tipo de grande rave: Paris se prepara para 2 milhões de visitantes na Festa da Música durante aviso de onda de calor", "veiculo": "The Guardian World", "pais": "Reino Unido", "classe": "A"}, {"id": 7327, "titulo": "David Guetta and Sia’s song Titanium got me through my fertility treatment", "url": "https://www.theguardian.com/culture/2026/jun/20/my-cultural-awakening-david-guetta-sia-titanium-fertility-treatment", "fonte_id": "guardian_culture", "data_pub": "2026-06-20T06:00:00Z", "idioma": "en", "texto_pt": "A canção 'Titanium' dos artistas David Guetta e Sia foi um ponto de virada para a autora, que estava passando por tratamentos de fertilidade desde 2009. Ela relatou estar em sua véspera de festas no final de 2011, mas com o corpo sobrecarregado de hormônios e a cabeça cheia de esperança e exaustão.", "titulo_pt": "Canção de David Guetta e Sia me ajudou durante o tratamento de fertilidade", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 7330, "titulo": "Would You Rather: Decide to Survive – Romesh Ranganathan’s gameshow is so low-effort it’s almost avant garde", "url": "https://www.theguardian.com/tv-and-radio/2026/jun/20/would-you-rather-decide-to-survive-romesh-ranganathans-gameshow-is-so-low-effort-its-almost-avant-garde", "fonte_id": "guardian_culture", "data_pub": "2026-06-20T06:00:00Z", "idioma": "en", "texto_pt": "O programa Would You Rather, apresentado pelo comediante Romesh Ranganathan no Prime Video, envolve 10 celebridades online desconhecidas fazendo tarefas absurdas. O jogo é comparado a uma versão moderna de It's a Knockout e parece ter custado apenas £420 para montar.}", "titulo_pt": "Would You Rather: Decidir para Sobreviver – Jogo de Comediante é tão simples que parece avant-garde", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}, {"id": 7332, "titulo": "From Funboys to Olivia Rodrigo: the week in rave reviews", "url": "https://www.theguardian.com/culture/2026/jun/20/from-funboys-to-olivia-rodrigo-the-week-in-rave-reviews", "fonte_id": "guardian_culture", "data_pub": "2026-06-20T05:01:00Z", "idioma": "en", "texto_pt": "A revista Guardian selecionou as principais críticas culturais desta semana, incluindo comentários sobre o comediante Steve Coogan em uma comédia irlandesa e a cantora Olivia Rodrigo explorando mistérios relacionamentais.", "titulo_pt": "De Funboys a Olivia Rodrigo: a semana com críticas de destaque", "veiculo": "The Guardian Culture", "pais": "Reino Unido", "classe": "A"}], "ciencia_tecnologia": [{"id": 7543, "titulo": "Are GLP-1s Performance-Enhancing Drugs?", "url": "https://www.theatlantic.com/health/2026/06/glp1-weight-loss-doping-sports-serena-williams/687634/?utm_source=feed", "fonte_id": "the_atlantic", "data_pub": "2026-06-20T13:00:00Z", "idioma": "en", "texto_pt": "A medicação para perda de peso facilitou o retorno de Serena Williams ao tênis. Especialistas não concordam se isso conta como doping.", "titulo_pt": "GLP-1s Serão Drogas Aprimoradoras de Performance?", "veiculo": "The Atlantic", "pais": "EUA", "classe": "A"}, {"id": 7609, "titulo": "War Taught this Ukrainian Entrepreneur the Value of Resilience", "url": "https://spectrum.ieee.org/mikadze-struk-resilience-in-entrepreneurship", "fonte_id": "ieee_spectrum", "data_pub": "2026-06-20T13:00:00Z", "idioma": "en", "texto_pt": "Salome Mikadze-Struk, filha de refugiados, fundou uma empresa de desenvolvimento de software durante a pandemia de COVID-19. Ela manteve o negócio funcionando mesmo com o início da guerra na Ucrânia. Agora, ela usa suas experiências para mentorar fundadores de startups de tecnologia e falar sobre a importância da resiliência no empreendedorismo.", "titulo_pt": "Guerra Ensinou essa Empreendedora Ucraniana o Valor da Resiliência", "veiculo": "IEEE Spectrum", "pais": "EUA", "classe": "A"}, {"id": 7615, "titulo": "Silicon Valley's longevity biohackers are engaged in a dangerous experiment", "url": "https://www.scientificamerican.com/article/silicon-valleys-longevity-biohackers-are-engaged-in-a-dangerous-experiment/", "fonte_id": "scientific_american", "data_pub": "2026-06-20T12:00:00Z", "idioma": "en", "texto_pt": "Influenciadores e pessoas ultra-ricas que desejam prolongar sua vida estão compartilhando dicas e truques sobre como ganhar mais anos. Essas práticas, consideradas biohacking de longevidade, são discutidas em grupos online e eventos exclusivos.", "titulo_pt": "Biohackers do Vale do Silício buscam longevidade em experimento perigoso", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 7293, "titulo": "Home Batteries: How They're Installed and How Much They Cost", "url": "https://www.wired.com/story/how-to-buy-a-home-battery/", "fonte_id": "wired", "data_pub": "2026-06-20T11:00:00Z", "idioma": "en", "texto_pt": "Após instalar uma bateria em minha residência, este artigo explica por que você pode querer ter uma bateria doméstica, como elas funcionam e quais fatores considerar, além de fornecer algumas dicas de instalação.", "titulo_pt": "Baterias Domésticas: Como Elas são Instaladas e Qual é o Custo", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 7319, "titulo": "Is NASA falling out of love with Mars?", "url": "https://www.sciencenews.org/article/nasa-mars-exploration-july-2026-ed-note", "fonte_id": "science_news", "data_pub": "2026-06-20T11:00:00Z", "idioma": "en", "texto_pt": "A editora-chefe Nancy Shute discute a relação instável da NASA com as explorações no Marte.", "titulo_pt": "NASA estaria perdendo interesse na exploração do Marte?", "veiculo": "Science News", "pais": "EUA", "classe": "A"}, {"id": 7594, "titulo": "Did Anthropic talk its way into an AI export ban?", "url": "https://www.ft.com/content/16ace46c-aeac-40c9-8598-3c01fa4481cb", "fonte_id": "financial_times", "data_pub": "2026-06-20T11:00:00Z", "idioma": "en", "texto_pt": "Uma análise do Financial Times mostra que a empresa Anthropic alertou sobre os perigos da inteligência artificial avançada mais vezes este ano do que sua rival, a OpenAI. Essa série de advertências pode ter contribuído para uma possível proibição de exportação de IA para a Anthropic.", "titulo_pt": "Anthropic teria se auto-banido de exportação de IA?", "veiculo": "Financial Times", "pais": "Reino Unido", "classe": "A"}, {"id": 7616, "titulo": "Attachment style may influence how many kids people have", "url": "https://www.scientificamerican.com/article/attachment-style-may-influence-how-many-kids-people-have/", "fonte_id": "scientific_american", "data_pub": "2026-06-20T11:00:00Z", "idioma": "en", "texto_pt": "Um estudo recente descobriu que pessoas com estilos de apego inseguros 'temerosos' ou 'preocupados' tiveram mais filhos. Por outro lado, pessoas com apego seguro tiveram menos filhos.", "titulo_pt": "Estilo de apego pode influenciar o número de filhos que as pessoas têm", "veiculo": "Scientific American", "pais": "EUA", "classe": "A"}, {"id": 7295, "titulo": "16 Best Greens Powders (2026): Taste-Tested for Months", "url": "https://www.wired.com/gallery/best-greens-powders/", "fonte_id": "wired", "data_pub": "2026-06-20T10:31:00Z", "idioma": "en", "texto_pt": "O autor realizou pesquisa e testes de gosto para identificar os melhores pó verdes valiosos em termos de qualidade. Bloom Nutrition’s Superfood Greens Powder foi seu escolhido preferido.", "titulo_pt": "16 Melhores Pó Verdes Testados em Gosto (2026)", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 6756, "titulo": "Herbívoros domésticos não substituem megafauna, afirma pesquisa", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/colunas/reinaldojoselopes/2026/06/herbivoros-domesticos-nao-substituem-megafauna-afirma-pesquisa.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-20T10:00:00Z", "idioma": "pt", "texto_pt": "Uma pesquisa concluiu que os ecossistemas brasileiros, apesar de serem considerados maravilhosos, estão 'esburacados' do ponto de vista ecológico e que herbívoros domésticos não podem substituir a megafauna.", "titulo_pt": "Pesquisa afirma que herbívoros domésticos não substituem megafauna", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 7296, "titulo": "Siri AI Hands On: A Smart, Helpful Assistant", "url": "https://www.wired.com/story/siri-ai-hands-on-iphone/", "fonte_id": "wired", "data_pub": "2026-06-20T10:00:00Z", "idioma": "en", "texto_pt": "O novo Siri AI é conversacional, presente em todo lugar e realmente útil.", "titulo_pt": "Testando o Novo Siri AI: Um Assistente Inteligente e Auxiliar", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 7297, "titulo": "Hackers Claim to Leak Stolen Madison Square Garden Data", "url": "https://www.wired.com/story/security-news-this-week-hackers-claim-to-leak-stolen-madison-square-garden-data/", "fonte_id": "wired", "data_pub": "2026-06-20T09:30:00Z", "idioma": "en", "texto_pt": "Os hackers afirmaram ter roubado e revelado dados de Madison Square Garden. Além disso, bares gay em São Francisco estão usando escaneadores faciais, a França deixou de usar serviços da Palantir e a Apple planeja mudar seu serviço de email privado.", "titulo_pt": "Hackers Afirmam Ter Roubado e Revelado Dados de Madison Square Garden", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 6757, "titulo": "Radiotelescópio Bingo não serve a interesses chineses, diz um dos líderes do projeto", "url": "https://redir.folha.com.br/redir/online/ciencia/rss091/*https://www1.folha.uol.com.br/ciencia/2026/06/radiotelescopio-bingo-nao-serve-a-interesses-chineses-diz-um-dos-lideres-do-projeto.shtml", "fonte_id": "folha_ciencia", "data_pub": "2026-06-20T09:00:00Z", "idioma": "pt", "texto_pt": "Um dos líderes do projeto no Brasil rechaça as acusações de que o futuro radiotelescópio Bingo seria parte de um esforço chinês para coletar inteligência e fortalecer infraestruturas na América Latina.", "titulo_pt": "Líder do projeto Bingo nega que radiotelescópio sirva a interesses chineses", "veiculo": "Folha de S.Paulo - Ciência", "pais": "Brasil", "classe": "A"}, {"id": 7298, "titulo": "Scientists Invent a Way to Brew Espresso With Ultrasonic Waves—No Hot Water Required", "url": "https://www.wired.com/story/scientists-brew-espresso-with-ultrasonic-waves/", "fonte_id": "wired", "data_pub": "2026-06-20T09:00:00Z", "idioma": "en", "texto_pt": "Pesquisadores demonstraram que podem fazer café equivalente ao espresso convencional usando ondas ultrasôlicas. A técnica não requer água quente e consome 75% menos energia em comparação com o método tradicional.", "titulo_pt": "Cientistas Inventam Método para Fazer Expresso com Ondas Ultrasônicas - Não Precisa de Água Quente", "veiculo": "Wired", "pais": "EUA", "classe": "A"}, {"id": 7218, "titulo": "TEPCO ends second round of fiscal 2026 treated water release", "url": "https://www.japantimes.co.jp/business/2026/06/20/tepco-water-release-second-round/", "fonte_id": "japan_times", "data_pub": "2026-06-20T08:57:00Z", "idioma": "en", "texto_pt": "Na última rodada, cerca de 7.900 toneladas de água contendo pequenas quantidades de tritúrio foram liberadas.", "titulo_pt": "TEPCO encerra segunda rodada de liberação de água tratada para 2026", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 7219, "titulo": "Japan to enhance global cooperation on AI risks", "url": "https://www.japantimes.co.jp/business/2026/06/20/japan-ai-global-cooperation/", "fonte_id": "japan_times", "data_pub": "2026-06-20T08:37:00Z", "idioma": "en", "texto_pt": "O projeto de revisão do Plano Básico de Inteligência Artificial destaca o aumento dos riscos de ciberataques que exploram a IA.", "titulo_pt": "Japão vai intensificar cooperação global sobre riscos de inteligência artificial", "veiculo": "The Japan Times", "pais": "Japão", "classe": "A"}, {"id": 7313, "titulo": "Opinion: STAT readers debate blue zones, open-access publishing fees, and more", "url": "https://www.statnews.com/2026/06/20/blue-zones-real-open-access-publishing-fees-letters-to-editor/?utm_campaign=rss", "fonte_id": "stat_news", "dat const esc = t => (t ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let drillCounter = 0;

function renderSecao(topico) {
  const rot = esc(D.rotulos_topico[topico] || topico);
  const sint = D.sinteses[topico];
  const arts = D.resumo_do_dia[topico] || [];

  const textoSint = sint
    ? sint.split(/\n+/).filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join("")
    : `<span class="sem-sintese">Sumário narrativo não disponível — execute o pipeline para gerar.</span>`;

  const drillId = "drill-" + (++drillCounter);
  const drillHtml = arts.length
    ? `<button class="drill-toggle" onclick="toggleDrill('${drillId}')">▶ ${arts.length} artigo${arts.length > 1 ? "s" : ""} desta edição</button>
       <div class="drill-lista" id="${drillId}">
         ${arts.map(n => {
           const tit = n.titulo_pt || n.titulo;
           const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
           return `<div class="item">
             <h3><a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}</h3>
             <div class="meta">
               <span class="tag">${esc(n.veiculo)}</span>
               ${n.pais ? `<span class="tag">${esc(n.pais)}</span>` : ""}
             </div>
             <div class="corpo"><p>${esc(n.texto_pt)}</p></div>
           </div>`;
         }).join("")}
       </div>`
    : "";

  return `<h2>${rot}</h2>
    <div class="sumario">${textoSint}</div>
    ${drillHtml}`;
}

function toggleDrill(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const aberta = el.classList.toggle("aberta");
  btn.textContent = (aberta ? "▼ " : "▶ ") + btn.textContent.slice(2);
}

const abas = {
  resumo: { rotulo: "Resumo do Dia", render() {
    drillCounter = 0;
    const st = D.stats;
    return `<div class="cards">
      <div class="card"><div class="num">${st.noticias_total}</div><div class="rot">notícias coletadas</div></div>
      <div class="card"><div class="num">${st.resumos_total}</div><div class="rot">resumos gerados</div></div>
    </div>
    ${D.topicos.map(renderSecao).join("")}`;
  }},
  noticias: { rotulo: "Todas as Notícias", render() {
    const opcoes = [["", "Todas"], ...D.topicos.map(t => [t, D.rotulos_topico[t] || t])];
    const botoes = opcoes.map(([v, l]) =>
      `<button onclick="filtrarSecao('${v}')" id="btn-sec-${v || 'todas'}">${esc(l)}</button>`
    ).join("");

    const itens = D.noticias.map(n => {
      const rot = n.topico ? (D.rotulos_topico[n.topico] || n.topico) : "não classificado";
      const pais = n.pais ? ` · ${esc(n.pais)}` : "";
      const tit = n.titulo_pt || n.titulo;
      const lang = (!n.titulo_pt && n.idioma && n.idioma !== 'pt') ? ` <span class="idioma-badge">${esc(n.idioma.toUpperCase())}</span>` : '';
      return `<div class="noticia" data-topico="${esc(n.topico || '')}">
        <a href="${esc(n.url)}" target="_blank">${esc(tit)}</a>${lang}
        <div class="fonte"><strong>${esc(n.veiculo || n.fonte_id)}</strong>${pais} · <span class="tag">${esc(rot)}</span></div>
      </div>`;
    }).join("");

    return `<div class="filtros-secao" id="filtros-secao">${botoes}</div>
      <div id="lista-noticias">${itens}</div>`;
  }},
};

function filtrarSecao(topico) {
  document.querySelectorAll("#filtros-secao button").forEach(b => b.classList.remove("ativo"));
  const btn = document.getElementById(topico ? "btn-sec-" + topico : "btn-sec-todas");
  if (btn) btn.classList.add("ativo");
  document.querySelectorAll("#lista-noticias .noticia").forEach(el => {
    el.style.display = (!topico || el.dataset.topico === topico) ? "" : "none";
  });
}

const nav = document.getElementById("nav"), main = document.getElementById("main");
Object.entries(abas).forEach(([id, a]) => {
  const b = document.createElement("button");
  b.textContent = a.rotulo;
  b.onclick = () => ativar(id);
  b.id = "btn-" + id;
  nav.appendChild(b);
});
function ativar(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + id).classList.add("ativo");
  main.innerHTML = abas[id].render();
  if (id === "noticias") filtrarSecao("");
}
function proximaAtualizacao() {
  const m = new Date().getHours() * 60 + new Date().getMinutes();
  for (const h of [8, 16, 20]) if (h * 60 > m) return h + "h";
  return "8h";
}
const elProx = document.getElementById("prox-hora");
if (elProx) elProx.textContent = proximaAtualizacao();

ativar("resumo");
</script>
